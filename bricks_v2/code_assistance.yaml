# 知识积木 v2 — 代码辅助（开发者工具）
# 用途：代码审查、重构建议、Bug 分析、测试用例生成

# === 信封层（给系统看）===
id: code-assistance-v1
name: 代码辅助（开发者工具）
version: 1.0.0
category:
  - 开发工具
  - 代码质量
tags:
  - 代码审查
  - 重构
  - Bug分析
  - 测试生成
  - ruff
  - ESLint
  - tree-sitter
  - AST
  - SonarCloud
capability_type: transform
data_source: filesystem

inputs:
  code_content:
    type: text
    required: true
    description: "待分析的源代码文本内容，支持任意语言"
  language:
    type: enum
    required: true
    description: "编程语言，决定使用哪套 lint 规则和 AST 解析器"
    enum_values:
      - python
      - javascript
      - typescript
      - go
      - rust
      - java
      - other
  analysis_mode:
    type: enum
    required: false
    default: "review"
    description: "分析模式：review=代码审查，refactor=重构建议，bugfix=Bug 分析，testgen=测试生成"
    enum_values:
      - review
      - refactor
      - bugfix
      - testgen
  use_ast:
    type: boolean
    required: false
    default: true
    description: "是否启用 AST 级别分析（tree-sitter），false 则退化为文本级分析"
  coverage_threshold:
    type: float
    required: false
    default: 80.0
    description: "testgen 模式下的目标测试覆盖率百分比"
    validation: "0 < value <= 100"

outputs:
  issues:
    type: "list[dict]"
    description: "发现的问题列表，每项含 severity/line/message/rule_id 字段"
  suggestions:
    type: "list[str]"
    description: "重构或改进建议列表，自然语言描述"
  test_cases:
    type: "list[dict]"
    description: "testgen 模式下生成的测试用例，含 name/input/expected_output 字段"
  summary:
    type: string
    description: "整体分析摘要，一段话说明主要发现和建议"

requires: []
conflicts_with: []
compatible_with:
  - security-scan-v1

# === 内容层（给 LLM 看）===
core_capability: >
  对源代码执行 lint 检查（ruff/ESLint）、AST 级别结构分析（tree-sitter）、
  Bug 模式识别和测试用例生成；免费工具覆盖核心场景，付费工具（SonarCloud/Snyk/Codacy）
  提供更深度的安全和质量扫描。

constraints:
  - "AI 生成的代码建议存在「让测试通过而非理解失败原因」的系统性偏差：
     AI 模型被训练成生成可运行的代码，当测试失败时，模型的最省力路径是修改测试断言而非修复业务逻辑；
     接受 AI 的 testgen 输出时，必须人工验证每条断言的业务含义，不可只看 CI 是否通过"
  - "AI 代码审查工具对系统级上下文的理解仍然不足：
     工具在上下文不完整时会过度自信，跨服务/跨 repo 的行为只有在端到端流程中才能发现；
     对于跨服务调用、全局状态修改、数据库 schema 变更，AI 审查结论必须标注'需人工端到端验证'"
  - "AI 幻觉依赖（Hallucinated Dependencies）是 2025-2026 新兴高危模式：
     AI 实现功能时可能发明不存在的 npm/PyPI 包名；攻击者可在发布后注册同名恶意包；
     所有 AI 建议的 pip install / npm install 必须先在 PyPI/npm 官网验证包名真实存在且下载量正常"
  - "Python 代码必须优先使用 ruff（pip install ruff）执行 lint，调用方式：
     subprocess.run(['ruff', 'check', '--output-format=json', '-'], input=code_bytes, capture_output=True)；
     ruff 比 pylint/flake8 快 10-100x，支持 E/F/I/W/B/UP/SIM/RUF 规则集"
  - "JavaScript/TypeScript 代码使用 ESLint（npm exec eslint --stdin --stdin-filename=file.ts --format=json）；
     必须传入 --stdin-filename 以正确识别 TS vs JS 语法，文件名后缀直接影响解析器选择"
  - "AST 分析使用 tree-sitter（pip install tree-sitter tree-sitter-python tree-sitter-javascript）；
     tree-sitter 是文本分析的 10x 升级，可精确定位函数边界、变量作用域、调用链，
     不可用正则表达式替代 AST 解析（误报率极高）"
  - "测试覆盖率计算：Python 用 coverage.py（coverage run + coverage report --json），
     JS/TS 用 istanbul/nyc；覆盖率必须针对行覆盖率（line coverage），
     分支覆盖率（branch coverage）作为附加指标"
  - "付费升级路径：SonarCloud（https://sonarcloud.io，免费开源项目）提供代码异味/复杂度/安全热点；
     Snyk（https://snyk.io，免费 200 tests/month）专注依赖漏洞；
     Codacy（https://codacy.com，免费开源）提供 PR 级别质量门禁；
     付费工具通过 REST API 集成，不依赖本地安装"
  - "语言特定规则不可跨语言混用：Python 的 type: ignore 注释对 ESLint 无效；
     TypeScript 的 @ts-ignore 对 mypy 无效；生成修复建议时必须先确认目标语言"
  - "重构建议必须验证语义等价性：建议改动前后的函数签名/返回类型/副作用不能变化；
     对于有 side effect 的函数（文件 I/O、网络调用、全局状态修改），
     重构建议必须明确标注'行为可能变化，需人工确认'"
  - "testgen 模式下生成的测试断言必须基于代码的实际返回类型，
     不可生成 assertEqual(result, None) 这类无意义断言；
     每个测试用例必须覆盖至少一个业务路径（正常路径/边界值/错误路径三选一）"

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. 24 Pull Requests (https://24pullrequests.com/api) — 项目 到 promote 开源 协作 during December，认证：No
         2. Screenshot (https://www.abstractapi.com/website-screenshot-api) — 以编程方式截取任意网站网页截图，认证：`apiKey`
         3. Agify.io (https://agify.io) — 根据名字估算年龄，认证：No
         4. API Grátis (https://apigratis.com.br/) — Multiples 服务 和 公共 API，认证：No
         5. ApicAgent (https://www.apicagent.com) — 提取 设备 详情 来自 user-agent 字符串，认证：No
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "PR 体量膨胀：AI 辅助开发使单次 PR 平均增量增加约 18%、每 PR 事故数增加约 24%，
              审查者难以跟上速度，2026 年预计出现约 40% 质量赤字（进入流水线的代码量超过审查能力）"
    mitigation: "对 AI 辅助 PR 设置硬性行数上限（建议单次 PR 不超过 400 行变更）；
                 超限时要求拆分；Code Review 工具配置自动标记超大 PR"
  - severity: HIGH
    pattern: "ruff 对包含语法错误的代码报 E999 SyntaxError，后续所有规则静默跳过，导致漏报"
    mitigation: "检查 ruff 输出中是否含 E999，若有则先报告语法错误，明确告知后续 lint 结果不可靠"
  - severity: HIGH
    pattern: "重构建议将有副作用的函数内联后破坏原有行为（如内联了含 print() 的表达式）"
    mitigation: "重构前用 AST 检查函数体是否含 I/O 调用节点（Call 节点的 func 为 print/open/requests 等），有则标注警告"
  - severity: HIGH
    pattern: "testgen 为异步函数生成同步测试代码，导致测试永远通过（async 函数返回 coroutine 对象而非实际值）"
    mitigation: "检测函数 async def 关键字，生成 pytest.mark.asyncio + await 形式的异步测试"
  - severity: MEDIUM
    pattern: "ESLint 在没有配置文件时使用默认规则，与项目实际规则集不一致，产生大量误报"
    mitigation: "调用 ESLint 前检查当前目录是否有 .eslintrc.*/.eslintrc.json/eslint.config.js，
                 若无则传入 --no-eslintrc --rule '{\"no-undef\": \"error\"}' 最小规则集"
  - severity: MEDIUM
    pattern: "覆盖率计算包含测试文件本身，导致覆盖率虚高（测试代码覆盖了测试代码）"
    mitigation: "coverage.py 配置 omit=tests/*,*_test.py；istanbul 配置 exclude=['**/*.test.ts']"
  - severity: LOW
    pattern: "tree-sitter 语言包版本与 tree-sitter 核心版本不兼容，导致 ABILIB 错误"
    mitigation: "固定版本：tree-sitter==0.21.x 配合 tree-sitter-python==0.21.x，不可跨大版本混用"
  - severity: MEDIUM
    pattern: "Linter 规则集与项目实际约定不匹配：SonarQube 等工具的默认规则在团队自定义约定下产生大量误报，
              开发者逐渐开始忽略所有告警（狼来了效应）"
    mitigation: "Linter 上线时先在只读模式（warn-only）运行 2 周，统计高频误报规则后针对性排除；
                 维护 .sonarcloud.properties / .eslintignore 记录已知误报原因，而非全量 disable"

