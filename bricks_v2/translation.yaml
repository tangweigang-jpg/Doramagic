# 知识积木 v2 — 翻译与多语言处理
# 用途：文档/文本翻译、保留格式标记、多语言内容生成

# === 信封层（给系统看）===
id: translation-v1
name: 翻译与多语言处理
version: 1.0.0
category:
  - 语言处理
  - 内容生成
tags:
  - 翻译
  - 多语言
  - DeepL
  - LibreTranslate
  - Google Translate
  - RTL
  - Markdown
  - 格式保留
capability_type: transform
data_source: null

inputs:
  text:
    type: text
    required: true
    description: "待翻译的文本内容，支持纯文本/Markdown/HTML；最大 50000 字符"
    validation: "0 < len(value) <= 50000"
  source_lang:
    type: string
    required: false
    default: "auto"
    description: "源语言代码（ISO 639-1），如 'en'/'zh'/'ja'/'ko'/'ar'；
      'auto' 表示自动检测；自动检测对短文本（<20 字）不可靠"
  target_lang:
    type: string
    required: true
    description: "目标语言代码（ISO 639-1），如 'zh'/'en'/'fr'/'de'/'ja'；
      DeepL 使用变体代码：简体中文='ZH-HANS'，英式英语='EN-GB'"
  provider:
    type: enum
    required: false
    default: "libretranslate"
    description: "翻译提供商：libretranslate=开源自托管（免费），
      mymemory=MyMemory（1000 words/day 免费，email 注册可提升至 10000 words/day），
      deepl=DeepL（$4.99/mo Pro，500K chars/mo；免费层 500K chars/mo 亦可用），
      google=Google Translate API（$20/1M chars）"
    enum_values:
      - libretranslate
      - mymemory
      - deepl
      - google
  content_type:
    type: enum
    required: false
    default: "plain"
    description: "内容格式：plain=纯文本，markdown=保留 Markdown 语法，html=保留 HTML 标签"
    enum_values:
      - plain
      - markdown
      - html
  glossary:
    type: string
    required: false
    default: ""
    description: "JSON 格式的术语表，确保专业术语一致翻译，如 '{\"AI\": \"人工智能\", \"API\": \"API\"}'；
      DeepL 原生支持术语表功能，其他 provider 通过后处理替换实现"
  preserve_formatting:
    type: boolean
    required: false
    default: true
    description: "是否保留原文格式（换行/缩进/空白行）；
      true 时翻译按段落分割，维持段落结构；false 时整段传入，效率更高"
  libretranslate_url:
    type: string
    required: false
    default: "https://libretranslate.com"
    description: "LibreTranslate API 地址；自托管实例填写内网地址，如 'http://localhost:5000'；
      官方公共实例需要 API key（免费注册可获）"

outputs:
  translated_text:
    type: string
    description: "翻译后的文本，保留原始格式标记（Markdown/HTML）"
  detected_lang:
    type: string
    description: "检测到的源语言代码（source_lang=auto 时返回），如 'en'"
  char_count:
    type: integer
    description: "本次翻译消耗的字符数（用于配额追踪）"
  warnings:
    type: string
    description: "翻译质量警告，如专业术语未覆盖、RTL 语言检测、文本被截断等，每行一条"

requires: []
conflicts_with: []
compatible_with:
  - knowledge-base-v1
  - telegram-notifier-v1

# === 内容层（给 LLM 看）===
core_capability: >
  将文本翻译为目标语言，支持保留 Markdown/HTML 格式标记，通过术语表保证专业词汇一致性，
  覆盖免费（LibreTranslate/MyMemory）和付费（DeepL/Google）提供商。

constraints:
  - "LibreTranslate API 调用：
     POST {libretranslate_url}/translate，
     body: {q: text, source: src_lang, target: tgt_lang, format: 'html'/'text', api_key: key}；
     免费官方实例限流约 10 req/min，自托管无限制；
     API key 从环境变量 LIBRETRANSLATE_API_KEY 读取，不可硬编码"
  - "MyMemory API（provider=mymemory）：
     GET https://api.mymemory.translated.net/get?q={text}&langpair={src}|{tgt}&de={email}；
     免费额度：匿名 1000 words/day，注册邮箱 10000 words/day；
     注意：q 参数最长 500 字符，超出必须分段，join 前添加段间分隔符"
  - "DeepL API（provider=deepl）：
     使用 deepl-python 库（pip install deepl），不直接调用 HTTP；
     translator = deepl.Translator(os.environ['DEEPL_API_KEY'])；
     result = translator.translate_text(text, source_lang=src, target_lang=tgt)；
     target_lang 必须大写（'ZH-HANS'/'EN-GB'/'FR'），否则 ValueError；
     DeepL 免费账号 API 地址为 api-free.deepl.com，付费账号为 api.deepl.com，
     deepl-python 库自动处理，无需手动区分"
  - "Google Translate API（provider=google）：
     使用 google-cloud-translate 库 v3（pip install google-cloud-translate）；
     client = translate.TranslationServiceClient()；
     target_lang 使用 BCP-47 格式（'zh-CN'/'en-US'）而非 ISO 639-1；
     API key 通过环境变量 GOOGLE_CLOUD_CREDENTIALS_JSON 以服务账号形式认证"
  - "Markdown 格式保留（content_type=markdown）：
     翻译前用正则提取所有 Markdown 标记（**加粗**/*斜体*/`代码`/[链接](url)/![图片](url)/# 标题）；
     将标记替换为占位符（如 %%MARK_0%%），翻译后按占位符还原；
     代码块（```...```）和行内代码（`...`）内容不翻译，整体用占位符保护"
  - "HTML 格式保留（content_type=html）：
     LibreTranslate 和 DeepL 原生支持 HTML 格式（format='html'），无需手动处理；
     Google Translate 用 mime_type='text/html' 参数；
     MyMemory 不支持 HTML，需手动提取文本节点、翻译后回填（用 html.parser）"
  - "RTL 语言处理（target_lang 为 ar/he/fa/ur）：
     纯文本输出前添加 Unicode RTL 标记（\\u202b）并在 warnings 中提示；
     HTML 输出在根元素添加 dir='rtl' 属性；
     Markdown 无法直接支持 RTL，在 warnings 中明确提示"
  - "术语表应用（glossary 非空）：
     翻译完成后对输出做精确字符串替换；
     替换顺序：按术语长度降序（避免短词替换污染长词）；
     大小写不敏感匹配（re.IGNORECASE），但输出保留 glossary 中定义的大小写"
  - "文本长度限制：各 provider 单次请求限制不同：
     LibreTranslate: 5000 chars；MyMemory: 500 chars（需强制分段）；
     DeepL: 128KB per request（字节）；Google: 30000 chars；
     超过限制时自动按段落（\\n\\n）分割，逐段翻译后合并"
  - "配额追踪：每次翻译后将 char_count 累计记录到 ~/.doramagic/translation_quota.json
     按 provider 和日期分类，帮助用户了解免费额度剩余"

common_failures:
  - severity: HIGH
    pattern: "Markdown 格式标记被翻译破坏：如 '**bold**' 翻译为 '**粗体字**' 但 ** 丢失或位置错乱"
    mitigation: "必须用占位符保护所有 Markdown 语法；
      翻译后用正则验证占位符数量是否匹配，不匹配时触发重试（最多 2 次），
      仍失败时返回无格式翻译并在 warnings 中注明"
  - severity: HIGH
    pattern: "DeepL target_lang 使用小写（'zh-hans'）导致 ValueError: Invalid target language"
    mitigation: "写入 deepl.translate_text 前统一 target_lang.upper()；
      维护语言代码映射表：{'zh': 'ZH-HANS', 'zh-tw': 'ZH-HANT', 'en': 'EN-GB', 'pt': 'PT-PT'}"
  - severity: HIGH
    pattern: "上下文丢失：长文档分段翻译后，跨段的代词指向（如 '它' 指代上段主语）翻译失准"
    mitigation: "分段时保留前一段末尾作为上下文（带 context 参数传给 DeepL）；
      其他 provider 在每段 prompt 前附上前段最后 2 句作为上下文前缀（翻译后删除）"
  - severity: MEDIUM
    pattern: "MyMemory 500 字符限制被触发但未分段，返回截断翻译而非报错"
    mitigation: "强制检查 len(text_segment) <= 500，超出必须分段；
      分段断点优先选句号/换行，不可在词中间断开（用 re.split(r'(?<=[.!?。！？])', text)）"
  - severity: MEDIUM
    pattern: "专业术语误译：API → 应用程序接口（过度翻译），Webhook → 网络钩子（失准）"
    mitigation: "建议用户维护项目级 glossary，将不应翻译的术语映射到自身（{'API': 'API'}）；
      DeepL glossary feature 对常见技术词效果最佳"
  - severity: LOW
    pattern: "LibreTranslate 官方公共实例因滥用被封禁，请求返回 403 或连接超时"
    mitigation: "官方实例失败时自动降级到 MyMemory；
      提示用户通过 Docker 自托管（docker run -p 5000:5000 libretranslate/libretranslate）"

