# 知识积木 v2 — UI/UX 设计辅助
# 用途：Figma 设计稿转代码、设计规范审查、UI 组件生成、响应式断点适配

# === 信封层（给系统看）===
id: ui-design-v1
name: UI/UX 设计辅助
version: 1.0.0
category:
  - 设计工具
  - 前端开发
tags:
  - Figma
  - 设计转代码
  - 组件生成
  - 响应式设计
  - 设计token
  - Auto Layout
  - CSS
  - React
capability_type: transform
data_source: webhook

inputs:
  figma_file_key:
    type: string
    required: true
    description: "Figma 文件 key，从 URL 中提取，如 https://figma.com/file/<KEY>/..."
    validation: "len(value) >= 10 and value.replace('-', '').isalnum()"
  figma_access_token:
    type: string
    required: true
    description: "Figma Personal Access Token，从 Figma Settings > Account > Personal access tokens 生成"
  node_ids:
    type: text
    required: false
    default: ""
    description: "指定要导出的节点 ID 列表，逗号分隔；空字符串表示导出整个文件的顶层 Frame"
  target_framework:
    type: enum
    required: false
    default: "react"
    description: "目标代码框架，影响组件语法和 CSS 方案"
    enum_values:
      - react
      - vue
      - html
      - swiftui
      - flutter
  design_mode:
    type: enum
    required: false
    default: "inspect"
    description: "操作模式：inspect=提取设计规范，codegen=生成组件代码，review=设计审查"
    enum_values:
      - inspect
      - codegen
      - review
  breakpoints:
    type: text
    required: false
    default: "320,768,1024,1440"
    description: "响应式断点像素值，逗号分隔，用于生成媒体查询"

outputs:
  design_tokens:
    type: "dict"
    description: "提取的设计 token，含 colors/typography/spacing/border_radius/shadows 字段"
  components:
    type: "list[dict]"
    description: "生成的组件代码列表，每项含 name/code/css/props 字段"
  review_issues:
    type: "list[dict]"
    description: "设计审查发现的问题，含 type/node_id/description/suggestion 字段"
  responsive_css:
    type: string
    description: "生成的响应式 CSS 媒体查询代码"

requires: []
conflicts_with: []
compatible_with: []

# === 内容层（给 LLM 看）===
core_capability: >
  通过 Figma REST API（免费，个人访问 token 即可）读取设计文件，
  提取设计 token（颜色、字体、间距）、Auto Layout 结构，
  生成对应的前端组件代码和响应式 CSS；付费 Figma Plugin API 提供实时双向同步能力。

constraints:
  - "Figma REST API 基础 URL 为 https://api.figma.com/v1/；
     必须在请求头中设置 X-Figma-Token: <access_token>，不可用 Bearer Token 格式；
     免费用户 API 限速：每 15 分钟 1500 次请求；文件级读取用 GET /files/{file_key}"
  - "节点树解析：根节点类型为 DOCUMENT，Frame/Component/Instance 是组件候选；
     必须递归遍历 children 数组，不可只看顶层节点；
     Auto Layout 属性在 layoutMode（HORIZONTAL/VERTICAL/NONE）和 itemSpacing 字段"
  - "设计 token 提取规则：颜色必须转换为 HEX/RGB/HSL 三种格式并输出；
     字体大小以 px 为单位（Figma 内部单位与 CSS px 1:1 映射）；
     spacing 取 paddingLeft/paddingRight/paddingTop/paddingBottom 和 itemSpacing；
     圆角取 cornerRadius（均匀）或 rectangleCornerRadii（四角独立）"
  - "CSS 变量命名规范：颜色用 --color-<name>，字体用 --font-size-<scale>，
     间距用 --spacing-<n>，必须遵循 CSS 自定义属性命名（小写 + 连字符）；
     颜色名从 Figma 图层名派生，空格替换为连字符，特殊字符移除"
  - "响应式适配：Figma 中的 Frame 宽度决定设计断点；
     移动端 Frame（宽度 <=768px）映射为 max-width 媒体查询；
     桌面端 Frame（宽度 >=1280px）作为基准样式；
     必须生成 mobile-first CSS（基础样式针对最小屏幕，用 min-width 向上扩展）"
  - "组件嵌套深度限制：超过 5 层嵌套的组件必须拆分为子组件；
     Instance 节点（Figma 组件实例）对应代码中的组件复用，不可展开为内联 HTML"
  - "字体可用性检查：提取到的 fontFamily 若不是系统字体（Arial/Helvetica/Georgia 等），
     必须检查是否为 Google Fonts 托管（GET https://fonts.googleapis.com/css2?family=<name>），
     不可用的字体必须在输出中标注警告，并提供系统字体 fallback"
  - "付费升级：Figma Plugin API 需要在 Figma 桌面客户端内运行，
     无法通过 REST API 替代；Adobe XD API（https://adobexdplatform.com/plugin-docs/）
     只支持 XD 原生插件，不提供公开 REST 接口"

common_failures:
  - severity: HIGH
    pattern: "设计稿使用了自定义字体（如付费商业字体），代码中直接引用但生产环境不可用，
              导致字体回退为 Times New Roman，整体排版崩溃"
    mitigation: "在 design_tokens.typography 中标注每个字体的 is_web_safe 和 google_fonts_url 字段；
                 生成代码时自动加入 Google Fonts import 或标注需手动引入字体文件"
  - severity: HIGH
    pattern: "Figma Auto Layout 的 space-between 对齐方式映射到 CSS 时，
              开发者误用 margin: auto 代替 justify-content: space-between，
              导致 flex 容器内子元素间距在不同屏幕宽度下不一致"
    mitigation: "Auto Layout primaryAxisAlignItems=SPACE_BETWEEN 必须映射为 justify-content: space-between，
                 不可用 margin/gap 替代"
  - severity: HIGH
    pattern: "响应式断点遗漏中间尺寸（如 768px-1024px 的平板视图），
              导致平板设备上布局在桌面和移动样式之间跳变"
    mitigation: "检查输入 breakpoints 是否覆盖 768px（平板分界），
                 不足 3 个断点时自动补全 320/768/1440 三档"
  - severity: MEDIUM
    pattern: "Figma 文件含有多个同名 Frame（设计师直接复制图层），
              节点 ID 唯一但名称重复，生成的组件名冲突"
    mitigation: "组件命名时追加节点 ID 后 6 位作为后缀，如 Button_a3f2c9，并在注释中说明来源"
  - severity: MEDIUM
    pattern: "设计稿间距使用奇数像素值（如 7px、13px），不符合 4px 基准网格，
              导致代码实现与设计稿在 Retina 屏幕下有 0.5px 偏差"
    mitigation: "inspect 模式下检查所有 spacing 值是否为 4 的倍数，
                 不符合时在 review_issues 中记录 type=spacing_off_grid 的警告"
  - severity: LOW
    pattern: "Figma API 返回的颜色 opacity 在 0-1 之间（浮点），
              直接转 CSS rgba() 时精度丢失（如 0.8999999 出现在代码里）"
    mitigation: "所有 opacity 值用 round(value, 2) 保留两位小数后再写入 CSS"

