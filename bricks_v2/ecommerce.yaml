# 知识积木 v2 — 电商与购物
# 用途：跨平台比价监控、库存追踪、订单状态查询

# === 信封层（给系统看）===
id: ecommerce-v1
name: 电商与购物
version: 1.0.0
category:
  - 电商
  - 价格监控
  - 购物助手
tags:
  - 比价
  - 库存追踪
  - 订单查询
  - Amazon
  - Keepa
  - 价格历史
  - ASIN
  - EAN
  - UPC
  - 反爬
capability_type: poll
data_source: rss

inputs:
  product_id:
    type: string
    required: true
    description: "商品唯一标识，支持 ASIN（亚马逊，10位字母数字）、EAN（13位数字）、UPC（12位数字）"
    validation: "len(value) in (10, 12, 13) and value.replace('-', '').isalnum()"
  id_type:
    type: enum
    required: true
    description: "商品 ID 类型，决定调用哪个 API"
    enum_values:
      - ASIN
      - EAN
      - UPC
      - URL
  target_price:
    type: float
    required: false
    default: 0.0
    description: "目标价格阈值（本地货币），降到此价格以下时触发通知；0 表示始终返回价格"
    validation: "value >= 0"
  currency:
    type: enum
    required: false
    default: "USD"
    description: "价格货币标准化目标币种，所有来源价格统一转换为此币种"
    enum_values:
      - USD
      - EUR
      - GBP
      - JPY
      - CNY
      - CAD
      - AUD
  include_third_party:
    type: boolean
    required: false
    default: false
    description: "是否包含第三方卖家价格（通常低于官方价但需确认卖家可信度）"
  poll_interval_min:
    type: integer
    required: false
    default: 60
    description: "价格轮询间隔（分钟），频率过高易触发平台反爬机制"
    validation: "15 <= value <= 1440"

outputs:
  current_price:
    type: float
    description: "当前最低价格，已按 currency 标准化"
  price_drop:
    type: boolean
    description: "是否触发目标价格阈值"
  in_stock:
    type: boolean
    description: "商品是否有库存"
  price_history:
    type: "list[dict]"
    description: "历史价格记录列表，每项含 date/price/source 字段（Keepa 付费可获取完整历史）"
  message:
    type: string
    description: "格式化的价格通知消息，可直接传给 notify 积木"

requires: []
conflicts_with: []
compatible_with:
  - telegram-notifier-v1

# === 内容层（给 LLM 看）===
core_capability: >
  通过 Amazon Product Advertising API 5.0（条件免费）或价格追踪 RSS feed 监控商品价格和库存；
  使用 Keepa API（$19/月）获取完整价格历史和即时价格变化通知；
  所有价格统一货币标准化，内置反爬退避策略。

constraints:
  - "Amazon Product Advertising API 5.0（PA-API）使用条件：
     必须是 Amazon Associates（联盟营销）成员，且账号在过去 180 天有合格销售记录；
     无销售记录时 API 密钥被暂停；调用端点：https://webservices.amazon.com/paapi5/getitems；
     每秒最多 1 次请求，每天 8640 次；请求必须用 AWS Signature V4 签名"
  - "免费替代方案：价格追踪网站 RSS feed（camelcamelcamel.com/product/<ASIN>.rss）
     无需认证，每小时更新一次价格；用 feedparser 解析，价格在 description 字段中，
     需用正则 r'Current price: [$]([0-9.]+)' 提取"
  - "Keepa API（付费，$19/月）端点：https://api.keepa.com/product?key=<API_KEY>&asin=<ASIN>&domain=1；
     返回完整价格历史数组，时间戳为 Keepa 时间（Unix 时间戳 / 60 - 21564000），
     转换公式：datetime.fromtimestamp((keepa_time + 21564000) * 60)"
  - "价格货币标准化：使用 frankfurter.app API（免费，无需认证）获取实时汇率；
     GET https://api.frankfurter.app/latest?from={source_currency}&to={target_currency}；
     汇率缓存 1 小时有效，避免频繁调用；非工作日汇率使用最近一个工作日数据"
  - "商品 ID 标准化：ASIN 为 10 位字母数字（大写），如 B08N5WRWNW；
     EAN 为 13 位纯数字，UPC 为 12 位纯数字；
     URL 类型需从亚马逊 URL 中提取 ASIN（正则 r'/dp/([A-Z0-9]{10})'）；
     EAN/UPC 转 ASIN 需通过 PA-API 的 SearchItems 接口，不可假设映射关系固定"
  - "PA-API 5.0 已官方宣布将于 2026 年 4 月 30 日废弃，必须迁移到 Amazon Creators API；
     2025 年 11 月起 Creators API 新增要求：过去 30 天内必须有 10 次合格销售，
     否则返回 AssociateNotEligible (403) 错误；
     迁移时 AWS Access Key/Secret Key 不可复用，需在 Associates Central 重新生成 Creators API 凭证；
     请求体字段名大小写发生变化（如 ItemIds → itemIds），不更新将导致 400 解析错误"
  - "反爬军备竞赛（2025 持续升级）：Cloudflare 于 2025 年 7 月起默认屏蔽 AI 爬虫，
     并推出按爬取次数计费的付费爬取模式（pay-per-crawl）；
     机器学习反爬系统一次规则调整可能静默禁用所有现有爬虫，且没有任何错误提示；
     禁止直接爬取 amazon.com 产品页面；所有价格数据必须通过官方 API 或第三方服务获取；
     第三方价格追踪网站（camelcamelcamel/Keepa/PriceCharting）本身承担爬取风险，通过其 API/RSS 获取是合规的"
  - "轮询频率与告警疲劳的双重陷阱：频率过高触发反爬屏蔽；频率过低错过价格变化；
     同时告警阈值设置不当导致告警疲劳（每次 0.01 元波动均通知）；
     建议对关键 SKU 采用分级频率策略（核心商品每 30 分钟，长尾每 4 小时）；
     价格变化通知设置最低变动幅度阈值（建议 ≥ 5% 或 ≥ 目标价格的 3%）"
  - "库存状态来源：PA-API 返回的 Offers.Listings[0].Availability.Type 字段；
     'NOW' 表示有货，'TOMORROW'/'DAYS_1_2' 表示备货中，'WEEKS_1_2' 及以上视为缺货；
     第三方卖家的 include_third_party=true 时合并 Offers 列表取最低价"

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. Best Buy (https://bestbuyapis.github.io/api-documentation/#overview) — 产品, Buying 选项, Categories, Recommendations, Stores 和 Commerce，认证：`apiKey`
         2. Digi-Key (https://www.digikey.com/en/resources/api-solutions) — 获取 价格 和 inventory 的 electronic components 作为 well 作为 地点 orders，认证：`OAuth`
         3. Dummy Products (https://dummyproducts-api.herokuapp.com/) — API 到 fetch dummy e-commerce 产品 JSON 数据 带有 占位图 图片，认证：`apiKey`
         4. eBay (https://developer.ebay.com/) — Sell 和 Buy 关于 eBay，认证：`OAuth`
         5. Etsy (https://www.etsy.com/developers/documentation/getting_started/api_basics) — 管理 shop 和 交互 带有 listings，认证：`OAuth`
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "PA-API 返回价格为 0 或缺失，原因是商品在当前市场（domain）不可购买，
              调用方未检查直接覆盖历史价格，导致价格记录污染"
    mitigation: "price = 0 或 None 时不更新历史记录，记录日志 'price unavailable for {ASIN}'；
                 连续 3 次价格为 0 时标记商品状态为 unavailable"
  - severity: HIGH
    pattern: "价格过期：RSS feed 每小时才更新，实际促销开始/结束时刻与通知延迟最长 60 分钟，
              用户收到通知时促销已结束"
    mitigation: "在通知消息中明确标注数据来源和最后更新时间；
                 高频监控场景（< 60 分钟）必须升级到 Keepa 或 PA-API 实时数据"
  - severity: HIGH
    pattern: "PA-API Associates 账号因 180 天无销售记录被暂停，API 密钥返回 InvalidPartnerTag 错误，
              所有价格查询静默失败"
    mitigation: "捕获 InvalidPartnerTag/InvalidSignature 错误，立即切换到 RSS feed 降级模式，
                 并在输出 message 中标注'使用降级数据源'"
  - severity: MEDIUM
    pattern: "汇率 API 在非工作日返回上一个工作日汇率，货币转换结果与实时汇率有偏差，
              尤其是 USD/JPY 等高波动货币对"
    mitigation: "在价格展示中附加汇率更新时间，标注 'as of YYYY-MM-DD'；
                 价格敏感应用（金额误差 >5% 告警）需使用付费实时汇率 API"
  - severity: MEDIUM
    pattern: "库存信息延迟：PA-API 的 Availability 字段反映的是仓库系统状态，
              实际下单时可能因并发抢购导致缺货（inventory race condition）"
    mitigation: "通知文本必须写明'库存状态仅供参考，以下单时实际状态为准'，
                 不可保证库存准确性"
  - severity: LOW
    pattern: "camelcamelcamel RSS 的价格字段格式在不同地区亚马逊站点不一致（美元用$，欧元用€），
              正则表达式只匹配了 $ 符号，导致欧洲站点价格解析失败"
    mitigation: "价格提取正则扩展为 r'([\\$€£¥]|[A-Z]{3}\\s?)([0-9,]+\\.?[0-9]*)' 并映射符号到货币代码"
  - severity: HIGH
    pattern: "PA-API Creators API 迁移截止日期（2026-04-30）前未完成迁移，
              所有价格查询突然返回 403/404，服务完全中断"
    mitigation: "立即评估迁移优先级：若 Amazon 数据是核心依赖，在 2026-03 前完成迁移；
                 迁移后并行运行旧 PA-API 和新 Creators API 至少 2 周，确认数据一致性；
                 降级方案：迁移期间使用 camelcamelcamel RSS feed 兜底"
  - severity: HIGH
    pattern: "价格异常值污染历史记录：抢购活动中商品价格可能短时出现 $1 或 $0.01 的占位价，
              被直接写入历史数据库后拉低所有统计均值，触发错误的降价通知"
    mitigation: "写入历史记录前做异常价格过滤：若新价格 < 历史均价 × 0.3 或 > 历史均价 × 3，
                 则标记为 suspect=true 并单独存储，不影响主价格记录"

