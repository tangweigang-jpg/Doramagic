# 知识积木 v2 — 个人知识库
# 用途：自动归档信息片段，标签分类，支持语义检索和相关推荐

# === 信封层（给系统看）===
id: knowledge-base-v1
name: 个人知识库
version: 1.0.0
category:
  - 知识管理
  - 生产力
tags:
  - 知识库
  - Obsidian
  - 语义检索
  - 向量数据库
  - ChromaDB
  - Pinecone
  - 嵌入
  - 归档
capability_type: transform
data_source: filesystem

inputs:
  content:
    type: text
    required: true
    description: "待归档的文本内容，支持纯文本/Markdown/HTML"
  title:
    type: string
    required: true
    description: "条目标题，用于文件名生成和检索；建议不超过 80 字符"
  source_url:
    type: string
    required: false
    description: "内容来源 URL，用于回溯；空字符串表示无来源"
  tags:
    type: string
    required: false
    default: ""
    description: "逗号分隔的标签字符串，如 'AI,工具,效率'；留空则自动提取"
  vault_path:
    type: string
    required: true
    description: "Obsidian vault 根目录绝对路径，如 '/Users/user/Documents/MyVault'"
  vector_backend:
    type: enum
    required: false
    default: "chromadb"
    description: "向量数据库后端：chromadb=本地免费，pinecone=Pinecone Cloud，weaviate=Weaviate Cloud"
    enum_values:
      - chromadb
      - pinecone
      - weaviate
  embedding_model:
    type: enum
    required: false
    default: "all-MiniLM-L6-v2"
    description: "嵌入模型：all-MiniLM-L6-v2=本地384维，text-embedding-3-small=OpenAI 1536维（需API key）"
    enum_values:
      - all-MiniLM-L6-v2
      - text-embedding-3-small
      - text-embedding-ada-002
  dedup_threshold:
    type: float
    required: false
    default: 0.92
    description: "去重相似度阈值（0-1），超过此值视为重复内容拒绝归档；0.92 为推荐值"
    validation: "0.5 <= value <= 1.0"

outputs:
  note_path:
    type: string
    description: "已创建的 Obsidian 笔记文件绝对路径"
  is_duplicate:
    type: boolean
    description: "是否检测到重复内容（相似度 >= dedup_threshold）"
  auto_tags:
    type: string
    description: "自动提取的标签列表，逗号分隔"
  related_notes:
    type: string
    description: "语义相关的已有笔记列表，格式：'标题 (相似度: 0.XX)'，每行一条，最多 5 条"

requires: []
conflicts_with: []
compatible_with:
  - telegram-notifier-v1
  - rss-monitor-v1

# === 内容层（给 LLM 看）===
core_capability: >
  将文本内容归档为 Obsidian Markdown 笔记，自动提取标签，计算向量嵌入后存入本地 ChromaDB
  或云端 Pinecone/Weaviate，支持语义检索和重复检测。

constraints:
  - "Obsidian 笔记文件必须使用 UTF-8 编码创建（open(path, 'w', encoding='utf-8')），
     文件名从 title 生成：替换 /\\:*?<>| 等非法字符为 -，最长 100 字符"
  - "YAML frontmatter 格式（Obsidian 标准）：
     文件首行为 ---，包含 title/date/tags/source 字段，以 --- 结尾；
     tags 必须是 YAML 列表格式（- tag1），不可用逗号字符串"
  - "Wikilink 解析：扫描内容中 [[链接]] 格式时，只取 | 前的部分作为链接目标
     （[[显示名|实际文件名]] → 实际文件名）；
     创建笔记时不自动创建被引用的空笔记（避免 vault 污染）"
  - "ChromaDB 本地使用（vector_backend=chromadb）：
     client = chromadb.PersistentClient(path=vault_path+'/.chroma')；
     集合名固定为 'knowledge_base'；
     每次归档后立即 add()，不批量缓冲"
  - "Pinecone 使用（vector_backend=pinecone）：需环境变量 PINECONE_API_KEY；
     索引名 'doramagic-kb'，维度与 embedding_model 一致（384 或 1536）；
     upsert 用 note_path 的 md5 hash 作为向量 ID"
  - "all-MiniLM-L6-v2 本地嵌入：from sentence_transformers import SentenceTransformer；
     model = SentenceTransformer('all-MiniLM-L6-v2')；
     首次运行自动下载模型（约 90MB），后续从 ~/.cache/huggingface 加载"
  - "去重检测必须在写入文件前执行：先查询向量数据库 top-1 相似结果，
     若相似度 >= dedup_threshold 则返回 is_duplicate=True，不写入文件"
  - "大 vault 索引性能：vault 文件数 > 10000 时，全量重建索引耗时可能超过 10 分钟；
     必须实现增量索引（记录已索引文件的 mtime，只处理变更文件）"
  - "embedding 维度不匹配会导致 ChromaDB/Pinecone 抛出异常：
     切换 embedding_model 时必须删除旧集合/索引重建，不可混用不同维度向量"
  - "标签自动提取：调用 LLMAdapter 时使用结构化输出，要求返回 JSON 数组；
     限制标签数量 ≤ 8 个，每个标签 ≤ 20 字符；空内容不调用 LLM"
  - "【社区经验】ChromaDB library 模式在多进程环境（Gunicorn/多 worker）中数据不同步：
     每个 worker 加载各自的内存副本，一个 worker add() 后其他 worker 看不到新数据；
     生产环境必须以 server 模式运行（chromadb.HttpClient()），不可用 PersistentClient（来源：Medium）"
  - "【社区经验】ChromaDB 首次查询极慢（~1 分钟）：重启后索引从磁盘全量加载到 RAM 的冷启动问题；
     缓解方案：服务启动时触发一次 warmup query，或在 Docker healthcheck 中等待冷启动完成（来源：llama_index #15201）"
  - "【社区经验】RAG 检索精度陷阱：向量相似性搜索找到话题相关文档，但不一定包含问题答案；
     缓解：结合 BM25 关键词检索（混合检索），对召回结果用 cross-encoder 重排序；
     只用向量检索对短查询/歧义查询效果差（来源：arxiv 2401.05856）"
  - "【社区经验】多租户 RAG 必须使用 metadata filter 隔离：
     不同用户/租户的向量混存于同一 collection 时，
     语义相似的跨租户内容会被错误召回；
     每条向量必须存入 tenant_id metadata，查询时强制过滤（来源：redwerk.com/blog/rag-best-practices）"

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. A Bíblia Digital (https://www.abibliadigital.com.br/en) — Do not worry 关于 managing 多个 versions 的 Bible，认证：`apiKey`
         2. Bhagavad Gita (https://docs.bhagavadgitaapi.in) — 开源 Shrimad Bhagavad Gita API 包括 21+ authors 翻译 在 Sanskrit / English / Hindi，认证：`apiKey`
         3. Bhagavad Gita telugu (https://gita-api.vercel.app) — Bhagavad Gita API 在 telugu 和 odia 语言，认证：No
         4. Bible-api (https://bible-api.com/) — 免费 Bible API 带有 多个 语言，认证：No
         5. British National Bibliography (http://bnb.data.bl.uk/) — 图书，认证：No
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "Obsidian vault 路径含空格或中文时，pathlib.Path 在 Windows 上处理异常"
    mitigation: "始终用 pathlib.Path(vault_path) 而非字符串拼接；
      Windows 路径分隔符用 Path.as_posix() 统一处理"
  - severity: HIGH
    pattern: "embedding 维度不匹配：ChromaDB 集合已有 384 维向量，切换到 text-embedding-3-small（1536维）时抛出异常"
    mitigation: "启动时检查 collection.metadata 中记录的维度，
      与当前模型不匹配时自动创建新集合（加 _v2 后缀）并提示用户重建索引"
  - severity: HIGH
    pattern: "重复归档：同一 URL 被多次抓取导致 vault 出现内容相同的多个笔记"
    mitigation: "归档前先用 source_url 查询 ChromaDB metadata filter；
      source_url 相同则跳过，不依赖向量相似度（URL 完全匹配优先）"
  - severity: MEDIUM
    pattern: "大 vault（>5000 文件）首次全量建索引时内存峰值超过 4GB"
    mitigation: "分批处理：每批 500 个文件，批间用 gc.collect() 释放内存；
      进度写入 .chroma/index_progress.json 支持中断续建"
  - severity: MEDIUM
    pattern: "Pinecone 免费套餐索引大小限制（100 万向量），超限后 upsert 失败"
    mitigation: "每次 upsert 前检查 index.describe_index_stats() 的 total_vector_count，
      接近上限时触发告警日志"
  - severity: LOW
    pattern: "YAML frontmatter 中标签含特殊字符（冒号/引号）导致 Obsidian 解析失败"
    mitigation: "标签写入 frontmatter 前用 re.sub(r'[:\\\"\\']', '', tag) 清理；
      或用 yaml.dump() 而非手动拼接字符串"
  - severity: HIGH
    pattern: "【社区经验】ChromaDB library 模式多 worker 数据陈旧：Gunicorn 多进程时各 worker 内存副本独立，
      新归档内容对其他 worker 不可见，导致重复归档检测失效"
    mitigation: "改用 chromadb.HttpClient(host=..., port=...) 连接独立 ChromaDB 服务进程；
      Docker Compose 中将 ChromaDB 作为独立服务运行（来源：Medium/@okekechimaobi）"
  - severity: MEDIUM
    pattern: "【社区经验】向量检索相关性陷阱：all-MiniLM-L6-v2 对短查询（<10词）召回精度不稳定，
      话题相近但内容不匹配的笔记排名高于真正相关的笔记"
    mitigation: "短查询使用 query expansion（调用 LLM 扩展查询词再检索）；
      返回结果加 cross-encoder 重排序（sentence-transformers/cross-encoder/ms-marco-MiniLM-L-6-v2）"

# === 元数据 ===
source: manual
freshness_date: "2026-03-29"
quality_score: 80.0
usage_count: 0
evidence_refs:
  - "https://help.obsidian.md/Editing+and+formatting/Properties"
  - "https://docs.trychroma.com/getting-started"
  - "https://docs.pinecone.io/reference/api/data-plane/upsert"
  - "https://www.sbert.net/docs/sentence_transformer/pretrained_models.html"
