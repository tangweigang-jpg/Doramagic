# 知识积木 v2 — Academic Research
# 用途：搜索学术论文、生成摘要、管理引用、辅助文献综述，支持免费 API 及付费升级

# === 信封层（给系统看）===
id: academic-research-v1
name: Academic Research
version: 1.0.0
category:
  - Research
  - Knowledge Management
tags:
  - academic
  - paper search
  - citation
  - arxiv
  - semantic scholar
  - crossref
  - doi
  - literature review
  - apa
  - mla
  - abstract
capability_type: poll
data_source: null

inputs:
  query:
    type: string
    required: true
    description: "Search query; supports boolean operators AND/OR/NOT for Semantic Scholar and CrossRef"
    validation: "0 < len(value) <= 500"
  sources:
    type: text
    required: false
    default: "[\"arxiv\", \"semantic_scholar\", \"crossref\"]"
    description: "JSON array of sources to query; options: arxiv, semantic_scholar, crossref, scopus, wos"
    validation: "len(value) <= 200"
  max_results:
    type: integer
    required: false
    default: 10
    description: "Maximum number of papers to return per source"
    validation: "1 <= value <= 100"
  date_from:
    type: string
    required: false
    default: ""
    description: "Filter papers published on or after this date, format YYYY-MM-DD"
    validation: "value == '' or (len(value) == 10 and value[4] == '-' and value[7] == '-')"
  date_to:
    type: string
    required: false
    default: ""
    description: "Filter papers published on or before this date, format YYYY-MM-DD"
    validation: "value == '' or (len(value) == 10 and value[4] == '-' and value[7] == '-')"
  citation_format:
    type: enum
    required: false
    default: "apa"
    description: "Citation format for formatted references"
    enum_values:
      - apa
      - mla
      - chicago
      - bibtex
      - plain
  generate_summary:
    type: boolean
    required: false
    default: true
    description: "Whether to generate an LLM-powered structured abstract for each result"
  full_text_access:
    type: boolean
    required: false
    default: false
    description: "Whether to attempt to fetch full-text PDF via open-access links (arXiv only)"

outputs:
  papers:
    type: string
    description: "JSON array of paper objects: {title, authors, year, abstract, doi, arxiv_id, url, citations_count, is_preprint, formatted_citation, summary}"
  total_found:
    type: integer
    description: "Total number of papers returned across all sources (after deduplication by DOI)"
  literature_review:
    type: string
    description: "LLM-generated literature review narrative based on the returned papers; empty if generate_summary=false"
  rate_limit_warnings:
    type: string
    description: "JSON array of sources that hit rate limits and returned partial results"

requires: []
conflicts_with: []
compatible_with:
  - pdf-parsing-v1
  - data-reporting-v1

# === 内容层（给 LLM 看）===
core_capability: >
  Query multiple academic databases (arXiv, Semantic Scholar, CrossRef) in parallel,
  deduplicate results by DOI, format citations in the requested style, optionally generate
  per-paper summaries and a synthesised literature review, and flag preprints vs.
  peer-reviewed publications.

constraints:
  - "arXiv API: use http://export.arxiv.org/api/query?search_query={q}&max_results={n}.
     No API key required. Parse the Atom XML response with xml.etree.ElementTree.
     Rate limit: ~3 req/sec; add time.sleep(0.34) between sequential calls.
     arXiv IDs have format YYMM.NNNNN or YYMM.NNNNNN — preserve the full ID for links."
  - "Semantic Scholar API: GET https://api.semanticscholar.org/graph/v1/paper/search
     ?query={q}&limit={n}&fields=title,authors,year,abstract,citationCount,externalIds,openAccessPdf.
     Rate limit: 100 req/5min for unauthenticated; pass S2_API_KEY header from env var
     SEMANTIC_SCHOLAR_API_KEY if available for 1 req/sec. Handle HTTP 429 with exponential
     backoff: wait ceil(60 / (100/5)) = 3 seconds initially, double on retry."
  - "CrossRef API: GET https://api.crossref.org/works?query={q}&rows={n}.
     Free with no key. Set User-Agent header to 'YourApp/1.0 (mailto:your@email.com)'
     as required by CrossRef polite pool policy. Without polite pool header, requests
     may be throttled without a 429 response."
  - "DOI deduplication: after collecting results from all sources, normalise DOIs to
     lowercase and deduplicate using a set. When the same paper appears from multiple
     sources, merge by preferring: Semantic Scholar > CrossRef > arXiv for citation count."
  - "Preprint vs. published detection: a paper is a preprint if it is sourced exclusively
     from arXiv AND has no DOI matching a journal publisher prefix, OR if Semantic Scholar
     returns publicationTypes containing 'JournalArticle'=False. Always set is_preprint
     in the output object — never omit this field."
  - "Citation formatting: implement APA 7th edition as the default. APA format:
     Authors (Year). Title. Journal, Volume(Issue), Pages. DOI: https://doi.org/...
     For BibTeX, use the DOI or arXiv ID as the cite key prefix. Use an LLM only for
     Chicago author-date variant; all others should be rule-based to avoid hallucinated
     page numbers or volume info."
  - "Full-text PDF access: only attempt for arXiv papers (construct URL as
     https://arxiv.org/pdf/{arxiv_id}.pdf). Do NOT attempt to bypass paywalls or access
     Elsevier/Springer PDFs without valid credentials. If full_text_access=True but no
     open-access URL is available, set pdf_url=null and log 'full_text_unavailable'."
  - "Paid API upgrade — Scopus: requires SCOPUS_API_KEY env var.
     Endpoint: https://api.elsevier.com/content/search/scopus?query={q}&count={n}.
     Rate limit: 6 req/sec for institutional keys. Returns DOI, cited-by count, and
     subject classifications not available in free APIs."
  - "Literature review generation: pass paper titles and abstracts (not full text) to the
     LLM. Wrap all paper content in <external_content> tags. Instruct the model to
     synthesise themes, identify research gaps, and note conflicting findings. Limit input
     to 20 papers maximum to stay within context budget."
  - "Parallel querying: use concurrent.futures.ThreadPoolExecutor(max_workers=3) to query
     all sources simultaneously. Cap each source timeout at 15 seconds with a requests
     timeout param. Partial results from timed-out sources should be included in
     rate_limit_warnings, not raise exceptions."
  # --- Community-sourced constraints (2025-2026) ---
  - "Semantic Scholar rate limit correction (2025): the actual public rate limit is 1 req/sec
     shared across all unauthenticated users (not 100 req/5min as previously documented).
     With an API key the limit rises to 100 req/sec. Always obtain and pass S2_API_KEY for
     production use; unauthenticated access is only suitable for testing."
  - "DOI validity: Crossref's own database contains over 1.2 million invalid DOI citations
     (reported January 2021). Before displaying or storing a DOI, validate it by attempting
     a HEAD request to https://doi.org/{doi} and checking for a non-4xx response. Do NOT
     assume a syntactically well-formed DOI resolves to the correct paper."
  - "Preprint citation format (APA 7th edition, 2025 enforcement): when is_preprint=True,
     the formatted citation MUST include '[Preprint]' immediately after the title and the
     repository name (e.g. 'arXiv'). Omitting '[Preprint]' is a citation error that misleads
     readers into treating unreviewed work as peer-reviewed. Always enforce this regardless
     of the citation_format parameter."
  - "Literature review scope cap: passing more than 20 papers to the LLM for synthesis causes
     hallucinated synthesis where the model invents connections between papers it did not
     actually process. Hard-cap the input to 20 papers sorted by citation count descending;
     log the number of papers excluded from the review in output metadata."
  - "Non-English and niche-domain coverage gaps: Semantic Scholar and CrossRef have uneven
     coverage outside English-language journals and STEM fields. Always include coverage
     caveats in the literature_review output when the query domain is non-English or
     humanities/social sciences; recommend manual verification against Google Scholar."

  - |
      【API 资源库】可用的公开 API：
         免费：
         1. arcsecond.io (https://api.arcsecond.io/) — 多个 astronomy 数据 来源，认证：No
         2. arXiv (https://arxiv.org/help/api/user-manual) — 精选 research-sharing 平台: physics, mathematics, quantitative finance, 和 economics，认证：No
         3. CORE (https://core.ac.uk/services#api) — 访问 world's 开放 访问 research papers，认证：`apiKey`
         4. GBIF (https://www.gbif.org/developer/summary) — 全球 Biodiversity 信息 Facility，认证：No
         5. iDigBio (https://github.com/idigbio/idigbio-search-api/wiki) — 访问 millions 的 博物馆 specimens 来自 organizations 全球 全球，认证：No
         注意：以上 API 信息来自 public-apis 开源目录，使用前请确认最新状态
common_failures:
  - severity: HIGH
    pattern: "Preprint paper cited as peer-reviewed publication, misleading the researcher"
    mitigation: "Always set is_preprint flag; in formatted citations prepend '[Preprint]'
      for arXiv-only results per APA 7th edition preprint citation format"
  - severity: HIGH
    pattern: "Semantic Scholar 429 rate limit causes entire pipeline to crash"
    mitigation: "Catch HTTPError 429, wait using Retry-After header value if present,
      otherwise use exponential backoff starting at 3s; max 3 retries before recording
      'semantic_scholar' in rate_limit_warnings and continuing with other sources"
  - severity: HIGH
    pattern: "LLM hallucinates page numbers, volume, or issue in APA citations"
    mitigation: "Use rule-based citation formatting for APA/MLA/BibTeX; only use LLM for
      narrative summary, never for structured bibliographic data"
  - severity: MEDIUM
    pattern: "CrossRef polite pool throttling — slow responses that appear as timeouts"
    mitigation: "Always include mailto: in User-Agent header; cache CrossRef responses
      by DOI to avoid re-querying the same paper across runs"
  - severity: MEDIUM
    pattern: "Duplicate papers from multiple sources inflating result count"
    mitigation: "Deduplicate by normalised DOI before returning; log dedup count in metadata"
  - severity: LOW
    pattern: "arXiv XML namespace breaks ElementTree parsing when API changes prefix"
    mitigation: "Use namespace-agnostic XPath: './/{http://www.w3.org/2005/Atom}entry'
      or strip namespaces with re.sub before parsing"
  # --- Community-sourced failures (2025-2026) ---
  - severity: HIGH
    pattern: "Preprint paper cited as peer-reviewed without '[Preprint]' label; a later
      study cites it as established fact leading to compounding error propagation"
    mitigation: "Enforce '[Preprint]' tag in formatted_citation whenever is_preprint=True,
      regardless of citation_format; add a post-render assertion that checks for the tag
      before returning results"
  - severity: HIGH
    pattern: "DOI resolves to a different paper than expected due to DOI reassignment or
      publisher migration; wrong paper content returned to the user"
    mitigation: "After deduplication, validate DOIs by fetching the resolved URL title
      metadata and comparing against the stored paper title (fuzzy match threshold > 0.85);
      flag mismatches in warnings rather than silently serving wrong content"
  - severity: MEDIUM
    pattern: "Semantic Scholar returns 403 Forbidden for certain paper IDs without explanation,
      causing partial result sets that look complete to the caller"
    mitigation: "Log all non-200 responses per paper ID; include a 403_count field in output
      metadata; surface 403 count in rate_limit_warnings so caller knows results are partial"
  - severity: MEDIUM
    pattern: "Citation error rate in returned metadata can be as high as 25-54% for bibliographic
      fields (volume, pages, issue) sourced from CrossRef; LLM citations amplify these errors"
    mitigation: "Never use LLM to generate or modify structured bibliographic fields; use
      rule-based formatting from raw API data only; for fields marked as null in the API
      response, omit the field from citation rather than hallucinating a value"
  - severity: LOW
    pattern: "Duplicate papers not fully removed because one source uses uppercase DOI
      and another uses lowercase"
    mitigation: "Normalise all DOIs to lowercase and strip any 'doi:' prefix before adding
      to the dedup set; also strip leading/trailing whitespace"

