# Finance V7 Batch 2 Retry — 3 network-failed projects
#
# bp-079: akshare (previously v6, stages=0 — needs v7 L3 Strategy A2)
# bp-080: FinDKG (no output)
# bp-081: vnpy (no output)
#
# 用法：
#   source .env
#   uv run python scripts/run_extraction_agent.py batch \
#       --job-file jobs/finance-v7-batch2-retry.yaml 2>&1 | tee _runs/_batch/finance-v7-batch2-retry.log

batch_id: "finance-v7-batch2-retry"
domain: "finance"
concurrency: 1

llm_model: "MiniMax-M2.7-highspeed"
llm_base_url: "https://api.minimaxi.com/anthropic"
llm_api_key_env: "LLM_API_KEY"

blueprint_version: "v5"
constraint_version: "v2"

repos:
  - blueprint_id: "finance-bp-079"
    repo_url: "https://github.com/akfamily/akshare"
    priority: 1
    skip_constraint: true

  - blueprint_id: "finance-bp-080"
    repo_url: "https://github.com/xiaohui-victor-li/FinDKG"
    priority: 2
    skip_constraint: true

  - blueprint_id: "finance-bp-081"
    repo_url: "https://github.com/vnpy/vnpy"
    priority: 3
    skip_constraint: true
