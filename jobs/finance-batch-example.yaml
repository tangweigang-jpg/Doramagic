# Doramagic Extraction Agent — 批量任务清单示例
#
# 用法：
#   source .env
#   nohup .venv/bin/python scripts/run_extraction_agent.py batch \
#       --job-file jobs/finance-batch-example.yaml > extraction.log 2>&1 &
#
# 特性：
#   - 按 priority 排序执行（1 = 最高）
#   - concurrency 控制并行度（建议 1-3，取决于 API 速率限制）
#   - 断点续跑：中断后重新执行同一命令，自动跳过已完成的 phase
#   - skip_blueprint: true 跳过蓝图提取（已有蓝图时）
#   - skip_constraint: true 跳过约束提取

extraction_batch:
  batch_id: "finance-round-1"
  domain: "finance"
  concurrency: 1  # MiniMax API 限速，建议串行

  # LLM 配置（也可通过环境变量 LLM_MODEL/LLM_BASE_URL/LLM_API_KEY 设置）
  llm_model: "MiniMax-M2.7-highspeed"
  llm_base_url: "https://api.minimaxi.com/anthropic"
  llm_api_key_env: "LLM_API_KEY"

  repos:
    # 已验证通过的项目
    - blueprint_id: "finance-bp-050"
      repo_url: "https://github.com/ing-bank/skorecard"
      priority: 1

    # 待提取的项目（示例）
