# Finance V7 Batch 2 — P1 高优先级项目（10 个新提取）
#
# ROADMAP P1 去除 FinancePy FX（与 bp-019 重复）后选 10 个
# 串行执行，skip_constraint
#
# 用法：
#   source .env
#   uv run python scripts/run_extraction_agent.py batch \
#       --job-file jobs/finance-v7-batch2-p1.yaml 2>&1 | tee _runs/_batch/finance-v7-batch2-p1.log

batch_id: "finance-v7-batch2-p1"
domain: "finance"
concurrency: 1

llm_model: "MiniMax-M2.7-highspeed"
llm_base_url: "https://api.minimaxi.com/anthropic"
llm_api_key_env: "LLM_API_KEY"

blueprint_version: "v5"
constraint_version: "v2"

repos:
  - blueprint_id: "finance-bp-072"
    repo_url: "https://github.com/frappe/lending"
    priority: 1
    skip_constraint: true

  - blueprint_id: "finance-bp-073"
    repo_url: "https://github.com/formancehq/ledger"
    priority: 2
    skip_constraint: true

  - blueprint_id: "finance-bp-074"
    repo_url: "https://github.com/AI4Finance-Foundation/FinRobot"
    priority: 3
    skip_constraint: true

  - blueprint_id: "finance-bp-075"
    repo_url: "https://github.com/OpenSourceRisk/Engine"
    priority: 4
    skip_constraint: true

  - blueprint_id: "finance-bp-076"
    repo_url: "https://github.com/yellowbean/AbsBox"
    priority: 5
    skip_constraint: true

  - blueprint_id: "finance-bp-077"
    repo_url: "https://github.com/open-source-modelling/Open_Source_Economic_Model"
    priority: 6
    skip_constraint: true

  - blueprint_id: "finance-bp-078"
    repo_url: "https://github.com/redstreet/fava_investor"
    priority: 7
    skip_constraint: true

  - blueprint_id: "finance-bp-079"
    repo_url: "https://github.com/akfamily/akshare"
    priority: 8
    skip_constraint: true

  - blueprint_id: "finance-bp-080"
    repo_url: "https://github.com/xiaohui-victor-li/FinDKG"
    priority: 9
