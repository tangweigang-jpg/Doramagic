# Finance V7 第一批批量提取 — 3 个重提取 + 9 个新提取
#
# 12 个项目，串行执行（concurrency=1），避免 MiniMax Token Plan 429
# v7 agent: 统一蓝图 + 文档知识源支持 + 18 enrichment patches
#
# 用法：
#   source .env
#   uv run python scripts/run_extraction_agent.py batch \
#       --job-file jobs/finance-v7-batch1.yaml 2>&1 | tee _runs/_batch/finance-v7-batch1.log

batch_id: "finance-v7-batch1"
domain: "finance"
concurrency: 1

llm_model: "MiniMax-M2.7-highspeed"
llm_base_url: "https://api.minimaxi.com/anthropic"
llm_api_key_env: "LLM_API_KEY"

blueprint_version: "v5"
constraint_version: "v2"

repos:
  # === 重提取（旧 pipeline → v7 全量重跑）===

  - blueprint_id: "finance-bp-009"
    repo_url: "https://github.com/zvtvz/zvt"
    priority: 1
    skip_constraint: true

  - blueprint_id: "finance-bp-050"
    repo_url: "https://github.com/ing-bank/skorecard"
    priority: 2
    skip_constraint: true

  - blueprint_id: "finance-bp-060"
    repo_url: "https://github.com/IBM/AMLSim"
    priority: 3
    skip_constraint: true

  # === 新提取（ROADMAP P0）===

  - blueprint_id: "finance-bp-062"
    repo_url: "https://github.com/naenumtou/ifrs9"
    priority: 4
    skip_constraint: true

  - blueprint_id: "finance-bp-063"
    repo_url: "https://github.com/casact/chainladder-python"
    priority: 5
    skip_constraint: true

  - blueprint_id: "finance-bp-064"
    repo_url: "https://github.com/open-source-modelling/insurance_python"
    priority: 6
    skip_constraint: true

  - blueprint_id: "finance-bp-065"
    repo_url: "https://github.com/franciscogarate/pyliferisk"
    priority: 7
    skip_constraint: true

  - blueprint_id: "finance-bp-066"
    repo_url: "https://github.com/wealthbot-io/wealthbot"
    priority: 8
    skip_constraint: true

  - blueprint_id: "finance-bp-067"
    repo_url: "https://github.com/ox-inet-resilience/firesale_stresstest"
    priority: 9
    skip_constraint: true

  - blueprint_id: "finance-bp-069"
    repo_url: "https://github.com/shinnytech/tqsdk-python"
    priority: 10
    skip_constraint: true

  - blueprint_id: "finance-bp-070"
    repo_url: "https://github.com/dgunning/edgartools"
    priority: 11
    skip_constraint: true

  - blueprint_id: "finance-bp-071"
