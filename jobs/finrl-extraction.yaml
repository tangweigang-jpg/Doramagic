# FinRL 蓝图提取任务 — AI 金融项目端到端验证
#
# 目的：验证升级后的蓝图提取 agent（v7: 文档知识源支持）
# FinRL 是 AI + 金融的混合项目（Python 代码 + 大量文档/notebooks）
#
# 用法：
#   source .env
#   uv run python scripts/run_extraction_agent.py batch \
#       --job-file jobs/finrl-extraction.yaml 2>&1 | tee finrl-extraction.log

batch_id: "finrl-e2e-test"
domain: "finance"
concurrency: 1

llm_model: "MiniMax-M2.7-highspeed"
llm_base_url: "https://api.minimaxi.com/anthropic"
llm_api_key_env: "LLM_API_KEY"

blueprint_version: "v5"
constraint_version: "v2"

repos:
  - blueprint_id: "finance-bp-061"
    repo_url: "https://github.com/AI4Finance-Foundation/FinRL"
    domain: "finance"
    priority: 1
    skip_blueprint: false
    skip_constraint: true  # 先只跑蓝图提取，约束后面单独做
