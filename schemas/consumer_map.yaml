  preconditions[].applies_to_uc:                     [EX]

  # ---- intent_router.uc_entries[] ----
  intent_router.uc_entries[].uc_id:                  [SR, NR, SE]
  intent_router.uc_entries[].name:                   [SR, NR, TR]
  intent_router.uc_entries[].positive_terms:         [SR]
  intent_router.uc_entries[].negative_terms:         [SR]
  intent_router.uc_entries[].data_domain:            [SR, MA]
