# Crystal Field-Consumer Map v0.1
# ================================
# Single source of truth for which host-side consumer reads each crystal field.
# Used by compile_crystal_skeleton.py, crystal_quality_gate.py, and SOP.
#
# Purpose: prevent field-scope misplacement (Session 27 Fix A root cause).
# When compile script writes a field, it must match the consumer declared here.
# When quality gate checks a field, it groups checks by consumer.
# When SOP documents a field, it references its consumer.
#
# Consumers (7):
#   NR  notice_render       — renders post-install Notice for user
#   SR  skill_router        — matches user intent to UC
#   TR  translator          — translates user_facing_fields to user locale
#   EX  executor            — runs scripts, packages, entry points
#   VF  verifier            — runs preconditions, OV assertions, gates
#   SE  skill_emitter       — writes .skill file after gates pass
#   MA  meta_archival       — provenance, audit; not runtime-consumed
#
# Format: each entry is a JSONPath-like dotted field path.
# [] denotes array iteration (all items share same consumer).
# Multiple consumers listed = dual-consumption (rare, explicitly justified).

version: "0.1"
schema_version: "crystal-contract-v5.3"
last_updated: "2026-04-19"

consumers:
  NR:
    name: notice_render
    trigger: skill_installation_complete
    description: "Renders post_install_notice to user as first user-facing message after install."
  SR:
    name: skill_router
    trigger: every_user_message
    description: "Matches user intent to UC via intent_router + .skill file intent_keywords."
  TR:
    name: translator
    trigger: first_user_message_when_non_en_locale_detected
    description: "Translates all fields listed in locale_contract.user_facing_fields to user's locale."
  EX:
    name: executor
    trigger: execute_trigger_matched
    description: "Runs preconditions, on_execute checklist, strategy_scaffold, and constraint enforcement during actual UC execution."
  VF:
    name: verifier
    trigger: during_execute_or_post_execute
    description: "Runs OV assertions, EQ rules, hard gates, preservation counts."
  SE:
    name: skill_emitter
    trigger: all_hard_gates_passed
    description: "Writes .skill YAML file to skills_path; downstream consumer of .skill is SR."
  MA:
    name: meta_archival
    trigger: compile_time_and_audit
    description: "Provenance. Not consumed by runtime behavior. Used by humans + audit tools."

# ======================================================================
# Field map
# ======================================================================
