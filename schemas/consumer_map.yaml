  meta.version:                                      [MA, SE]
  meta.blueprint_id:                                 [MA]
  meta.sop_version:                                  [MA]
  meta.source_language:                              [TR, MA]
  meta.compiled_at:                                  [MA]
  meta.target_host:                                  [MA]  # deprecated in v5.3; no runtime consumer
  meta.authoritative_artifact.primary:               [EX]
  meta.authoritative_artifact.non_authoritative_derivatives: [MA]
  meta.authoritative_artifact.rule:                  [EX]
  meta.execution_protocol.install_trigger:           [NR]
  meta.execution_protocol.execute_trigger:           [SR]
  meta.execution_protocol.on_execute:                [EX]
  meta.execution_protocol.workspace_resolution.scripts_path: [EX]
  meta.execution_protocol.workspace_resolution.skills_path:  [SE]
  meta.execution_protocol.workspace_resolution.trace_path:   [EX]

  # ---- locale_contract.* ----
  locale_contract.source_language:                   [TR]
  locale_contract.user_facing_fields:                [TR]
  locale_contract.locale_detection_order:            [TR]
  locale_contract.translation_enforcement:           [TR, VF]

  # ---- evidence_quality.* ----
  evidence_quality.declared:                         [VF, MA]
  evidence_quality.enforcement_rules:                [VF]
  evidence_quality.user_disclosure_template:         [NR, TR]

  # ---- traceback.* ----
  traceback.source_files:                            [EX]
