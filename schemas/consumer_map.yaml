  post_install_notice.message_template.capability_catalog.group_strategy:               [NR]
  post_install_notice.message_template.capability_catalog.groups[].group_id:            [NR, MA]
  post_install_notice.message_template.capability_catalog.groups[].name:                [NR, TR]
