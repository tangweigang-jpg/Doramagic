  # ---- context_state_machine.* ----
  context_state_machine.states:                      [EX]
  context_state_machine.enforcement:                 [EX]

  # ---- spec_lock_registry.* ----
  spec_lock_registry.semantic_locks[].id:            [VF, SE]
