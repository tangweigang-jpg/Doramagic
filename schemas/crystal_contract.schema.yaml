# Crystal Contract Schema v5.3
# ============================
# This file IS the source of truth for what a crystal must contain.
# SOP, compile script, quality gate, and skill emitter all derive from here.
#
# Underlying principle: A crystal is a proof obligation, not a prompt.
# It declares what MUST hold, not what the agent SHOULD do.
#
# 8 invariants encoded as schema sections:
#   I1 Language uniformity         → meta.source_language + locale_contract
#   I2 Structured contracts        → every rule is trigger-action-violation triple
#   I3 Preconditions enforced      → preconditions[]
#   I4 Business-semantic post      → output_validator.assertions with business predicates
#   I5 Knowledge compounds         → skill_crystallization
#   I6 Locale transparency         → locale_contract + human_summary.locale_rendering
#   I7 Evidence self-declared      → evidence_quality.declared + enforcement_rules
#   I8 Execution observability     → trace_schema
#
# v5.1 additions (consumer-value-first onboarding + authoritative reference):
#   - meta.authoritative_artifact   → seed.yaml is truth; SKILL.md/HEARTBEAT are derivatives
#   - meta.execution_protocol       → install vs execute trigger boundary, workspace paths
#   - post_install_notice           → auto-fire capability guide on skill install (PIN-01)
#   - blueprint.featured_use_cases  → blueprint author curates 3 entry points (optional, fallback = heuristic)
#
# v5.3 additions (consumer-indexed field map — fixes Fix-A scope-misplacement class):
#   - Companion file: schemas/consumer_map.yaml — maps every field path to its host consumer
#     (NR notice_render / SR skill_router / TR translator / EX executor /
#      VF verifier / SE skill_emitter / MA meta_archival)
#   - locale_contract.user_facing_fields default expanded 12 → 26 (all NR+TR fields from consumer_map)
#   - SA-19 translation_completeness gate validates user_facing_fields against consumer_map
#   - meta.target_host and acceptance.soft_gates[].rubric marked deprecated (removal v5.4)
#   - Per-field x-consumer annotations on historically ambiguous fields
#
# Format: JSON Schema draft 2020-12 expressed in YAML.

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://doramagic.ai/schemas/crystal_contract/v5.3"
title: "Doramagic Crystal Contract v5.3"
type: object
additionalProperties: false

required:
  - meta
  - locale_contract
  - evidence_quality
  - traceback
  - preconditions
  - intent_router
  - context_state_machine
  - spec_lock_registry
  - preservation_manifest
  - architecture
  - resources
  - constraints
  - output_validator
  - acceptance
  - skill_crystallization
  - post_install_notice
  - human_summary

properties:

  # --------------------------------------------------------------------
  # meta — identity and provenance
  # --------------------------------------------------------------------
  meta:
    type: object
    additionalProperties: false
    required: [id, version, blueprint_id, sop_version, source_language, compiled_at, authoritative_artifact, execution_protocol]
    properties:
      id:
        type: string
        pattern: "^[a-z0-9-]+-v[0-9]+\\.[0-9]+$"
        description: "e.g. finance-bp-009-v5.1"
      version:
        type: string
        pattern: "^v[0-9]+\\.[0-9]+$"
      blueprint_id:
        type: string
      sop_version:
        const: "crystal-compilation-v5.3"
      source_language:
        const: "en"
        description: "Machine-facing content language. Always English in v5.1 for LLM attention uniformity."
      compiled_at:
        type: string
        format: date-time
      target_host:
        type: string
        enum: [openclaw, claude_code, codex, harness_agent, generic]
        deprecated: true
        description: "DEPRECATED in v5.3. No runtime consumer. Scheduled for removal in v5.4."
        x-consumer: [MA]
      authoritative_artifact:
        type: object
        description: "Declares which file is the source of truth. Prevents host-generated derivatives (SKILL.md, HEARTBEAT) from diverging."
        required: [primary, non_authoritative_derivatives, rule]
        properties:
          primary:
            const: "seed.yaml"
          non_authoritative_derivatives:
            type: array
            items: { type: string }
            default:
              - "SKILL.md (host-generated summary, may lag)"
              - "HEARTBEAT.md (host telemetry)"
              - "memory/*.md (host conversational memory)"
          rule:
            const: "On any behavioral decision (preconditions check, OV assertion, EQ rule firing, spec_lock verification), agents MUST re-read seed.yaml. Derivatives are for UI display only and may be out-of-date."
      execution_protocol:
        type: object
        description: "Defines install vs execute boundary so host agents know when to just store the skill vs actually run the UC."
        required: [install_trigger, execute_trigger, on_execute, workspace_resolution]
        properties:
          install_trigger:
            type: string
            default: "When seed.yaml is submitted without explicit execution intent (e.g. file upload, skill registration command)"
          execute_trigger:
            type: string
            default: "When user intent matches intent_router.uc_entries[].positive_terms AND user uses action verb (run/execute/跑/执行/backtest/fetch/collect)"
          on_execute:
            type: array
            items: { type: string }
            default:
              - "Reload seed.yaml (do not rely on SKILL.md or cached summaries)"
              - "Run preconditions[] in declared order; halt on first fatal failure with on_fail message to user"
              - "Enter context_state_machine.CA1_MEMORY_CHECKED state"
              - "Evaluate evidence_quality.enforcement_rules[]; fire triggers that match declared state"
              - "Translate user_facing_fields to user locale per locale_contract"
          workspace_resolution:
            type: object
            required: [scripts_path, skills_path, trace_path]
            properties:
              scripts_path:
                type: string
                default: "{host_workspace}/scripts/"
              skills_path:
                type: string
                default: "{host_workspace}/skills/"
              trace_path:
                type: string
                default: "{host_workspace}/.trace/"

  # --------------------------------------------------------------------
  # locale_contract — I1 + I6
  # --------------------------------------------------------------------
  locale_contract:
    type: object
    additionalProperties: false
    required: [source_language, user_facing_fields, translation_enforcement]
    properties:
      source_language:
        const: "en"
      user_facing_fields:
        type: array
        description: "Paths to fields that must be rendered in user's detected locale. v5.3 expanded 12→26 per consumer_map.yaml derived user_facing_fields_expected (all NR+TR fields)."
        items:
          type: string
        default:
          # human_summary (6)
          - "human_summary.what_i_can_do.tagline"
          - "human_summary.what_i_can_do.use_cases[]"
          - "human_summary.what_i_auto_fetch[]"
          - "human_summary.what_i_ask_you[]"
          # evidence_quality
          - "evidence_quality.user_disclosure_template"
          # post_install_notice (8)
          - "post_install_notice.message_template.positioning"
          - "post_install_notice.message_template.capability_catalog.groups[].name"
          - "post_install_notice.message_template.capability_catalog.groups[].description"
          - "post_install_notice.message_template.capability_catalog.groups[].ucs[].name"
          - "post_install_notice.message_template.capability_catalog.groups[].ucs[].short_description"
          - "post_install_notice.message_template.call_to_action"
          - "post_install_notice.message_template.featured_entries[].beginner_prompt"
          - "post_install_notice.message_template.more_info_hint"
          # preconditions error messages (2) — NEW in v5.3
          - "preconditions[].description"
          - "preconditions[].on_fail"
          # intent_router (2) — NEW in v5.3
          - "intent_router.uc_entries[].name"
          - "intent_router.uc_entries[].ambiguity_question"
          # architecture narrative (4) — NEW in v5.3
          - "architecture.pipeline"
          - "architecture.stages[].narrative.does_what"
          - "architecture.stages[].narrative.key_decisions"
          - "architecture.stages[].narrative.common_pitfalls"
          # constraints violation messages (2) — NEW in v5.3
          - "constraints.fatal[].consequence"
          - "constraints.regular[].consequence"
          # validator/gate failure messages (2) — NEW in v5.3
          - "output_validator.assertions[].failure_message"
          - "acceptance.hard_gates[].on_fail"
          # skill emission notification (1) — NEW in v5.3
          - "skill_crystallization.action"
      locale_detection_order:
        type: array
        items:
          enum: [system_locale, first_message_language, explicit_user_declaration]
        default: [explicit_user_declaration, first_message_language, system_locale]
      translation_enforcement:
        type: object
        required: [trigger, action, violation_code]
        properties:
          trigger:
            const: "on_first_user_message"
          action:
            type: string
            default: "Render user_facing_fields in detected locale, preserving all IDs (BD-/SL-/UC-/finance-C-) and code identifiers verbatim"
          violation_code:
            const: "LOCALE-01"
          violation_signal:
            type: string
            default: "User receives untranslated English Human Summary when detected locale != en"

  # --------------------------------------------------------------------
  # evidence_quality — I7
  # --------------------------------------------------------------------
  evidence_quality:
    type: object
    additionalProperties: false
    required: [declared, enforcement_rules, user_disclosure_template]
    properties:
      declared:
        type: object
        description: "Values extracted verbatim from blueprint _enrich_meta + audit_checklist_summary"
        required: [evidence_coverage_ratio, evidence_verify_ratio, evidence_invalid, audit_fail_total]
        properties:
          evidence_coverage_ratio:
            type: [number, "null"]
          evidence_verify_ratio:
            type: [number, "null"]
          evidence_invalid:
            type: integer
          evidence_verified:
            type: [integer, "null"]
          evidence_auto_fixed:
            type: [integer, "null"]
          audit_coverage:
            type: [string, "null"]
            description: "Completeness signal: examined/total (pass+warn+fail)/total"
          audit_pass_rate:
            type: [string, "null"]
            description: "Quality signal: pass/total — preserved alongside audit_coverage for dual-signal host reads"
          audit_fail_total:
            type: integer
            description: "Sum of finance_universal.fail + subdomain_totals.fail"
          audit_finance_universal:
            type: object
          audit_subdomain_totals:
            type: object
      enforcement_rules:
        type: array
        minItems: 2
        items:
          type: object
          required: [id, trigger, action, violation_code, violation_signal]
          properties:
            id:
              type: string
              pattern: "^EQ-[0-9]{2}$"
            trigger:
              type: string
              description: "Predicate over evidence_quality.declared, e.g. 'declared.evidence_verify_ratio < 0.5'"
            action:
              type: string
              description: "MUST-verb imperative, machine-checkable by observable side-effect"
            violation_code:
              type: string
              pattern: "^EQ-[0-9]{2}-V$"
            violation_signal:
              type: string
              description: "Observable condition indicating the rule was skipped"
      user_disclosure_template:
        type: string
        description: "English template to prepend to first agent response when triggered; agent translates to user locale per locale_contract"

  # --------------------------------------------------------------------
  # traceback — I7
  # --------------------------------------------------------------------
  traceback:
    type: object
    additionalProperties: false
    required: [source_files, mandatory_lookup_scenarios, degraded_lookup]
    properties:
      source_files:
        type: object
        required: [blueprint, constraints]
        properties:
          blueprint:
            type: string
            default: "LATEST.yaml"
          constraints:
            type: string
            default: "LATEST.jsonl"
      mandatory_lookup_scenarios:
        type: array
        minItems: 4
        items:
          type: object
          required: [id, condition, lookup_target]
          properties:
            id:
              type: string
              pattern: "^TB-[0-9]{2}$"
            condition:
              type: string
            lookup_target:
              type: string
      degraded_lookup:
        type: object
        description: "Fallback when agent environment lacks file read capability"
        required: [no_fs_access]
        properties:
          no_fs_access:
            type: string

  # --------------------------------------------------------------------
  # preconditions — I3 (NEW in v5.0)
  # --------------------------------------------------------------------
  preconditions:
    type: array
    minItems: 1
    description: "Checks that MUST pass before any business logic runs. First failure halts execution with actionable error."
    items:
      type: object
      required: [id, description, check_command, on_fail, severity]
      properties:
        id:
          type: string
          pattern: "^PC-[0-9]{2}$"
        description:
          type: string
        check_command:
          type: string
          description: "Shell or Python expression returning non-zero/False on failure. Examples: 'pip show zvt', 'len(get_kdata(entity_ids=ENTITY_IDS, start_timestamp=START)) > 0'"
        on_fail:
          type: string
          description: "Actionable message to user. e.g. 'Run: python -m zvt.recorders.em.em_stock_kdata_recorder --entity_ids stock_sz_300750'"
        severity:
          enum: [fatal, warn]
        applies_to_uc:
          type: array
          items:
            type: string
          description: "If omitted, applies to all UCs"

  # --------------------------------------------------------------------
  # intent_router — 1 of 5 control blocks (retained from v3.x)
  # --------------------------------------------------------------------
  intent_router:
    type: object
    required: [uc_entries]
    properties:
      uc_entries:
        type: array
        minItems: 1
        items:
          type: object
          required: [uc_id, name, positive_terms, data_domain]
          properties:
            uc_id:
              type: string
              pattern: "^UC-[0-9]+$"
            name: { type: string }
            positive_terms: { type: array, items: { type: string } }
            negative_terms: { type: array, items: { type: string } }
            data_domain: { type: string }
            ambiguity_question: { type: string }

  # --------------------------------------------------------------------
  # context_state_machine — 1 of 5 control blocks
  # --------------------------------------------------------------------
  context_state_machine:
    type: object
    required: [states, enforcement]
    properties:
      states:
        type: array
        minItems: 4
        items:
          type: object
          required: [id, entry, exit, timeout]
          properties:
            id:
              enum: [CA1_MEMORY_CHECKED, CA2_GAPS_FILLED, CA3_PATH_SELECTED, CA4_EXECUTING]
            entry: { type: string }
            exit: { type: string }
            timeout: { type: string }
      enforcement:
        type: string

  # --------------------------------------------------------------------
  # spec_lock_registry — 1 of 5 control blocks
  # --------------------------------------------------------------------
  spec_lock_registry:
    type: object
    required: [semantic_locks, implementation_hints]
    properties:
      semantic_locks:
        type: array
        items:
          type: object
          required: [id, locked_value, violation_is]
          properties:
            id:
              type: string
              pattern: "^SL-[0-9]{2}$"
            description: { type: string }
            locked_value: { type: string }
            violation_is:
              enum: [fatal, warning]
            source_bd_ids:
              type: array
              items: { type: string }
      implementation_hints:
        type: array
        items:
          type: object
          required: [id, hint]
          properties:
            id:
              type: string
              pattern: "^IH-[0-9]{2}$"
            hint: { type: string }

  # --------------------------------------------------------------------
  # preservation_manifest — 1 of 5 control blocks
  # --------------------------------------------------------------------
  preservation_manifest:
    type: object
    required: [required_objects]
    properties:
      required_objects:
        type: object
        description: "Count declaration for host-side compression verification"
        properties:
          business_decisions_count: { type: integer }
          fatal_constraints_count: { type: integer }
          non_fatal_constraints_count: { type: integer }
          use_cases_count: { type: integer }
          semantic_locks_count: { type: integer }
          preconditions_count: { type: integer }
          evidence_quality_rules_count: { type: integer }
          traceback_scenarios_count: { type: integer }

  # --------------------------------------------------------------------
  # architecture — BDs per stage, structured
  # --------------------------------------------------------------------
  architecture:
    type: object
    required: [stages]
    properties:
      pipeline:
        type: string
        description: "e.g. data_collection → data_storage → factor_computation → ..."
      stages:
        type: array
        items:
          type: object
          required: [id, narrative, business_decisions]
          properties:
            id: { type: string }
            narrative:
              type: object
              required: [does_what, key_decisions, common_pitfalls]
              properties:
                does_what:
                  type: string
                  description: "1 sentence with concrete class/function names"
                key_decisions:
                  type: string
                  description: "1 sentence citing 1-2 BD-IDs with 'chose X not Y because...' reasoning"
                common_pitfalls:
                  type: string
                  description: "1 sentence citing 1-2 finance-C-ID or SL-ID with 'don't do X else...'"
            business_decisions:
              type: array
              items:
                type: object
                required: [id, type, summary]
                properties:
                  id:
                    type: string
                    pattern: "^BD-(GAP-)?[0-9]+$"
                  type: { type: string }
                  summary: { type: string }

  # --------------------------------------------------------------------
  # resources — packages, data, scaffold
  # --------------------------------------------------------------------
  resources:
    type: object
    required: [packages, strategy_scaffold, host_adapter]
    properties:
      packages:
        type: array
        items:
          type: object
          required: [name, version_pin]
          properties:
            name: { type: string }
            version_pin: { type: string }
      data_sources:
        type: array
        items:
          type: object
      strategy_scaffold:
        type: object
        required: [entry_point_name, tail_template]
        properties:
          entry_point_name:
            type: string
            description: "e.g. run_backtest / run_pipeline / run_training"
          tail_template:
            type: string
            description: "DO NOT MODIFY block ending the main script"
      host_adapter:
        type: object
        description: "Target-host specifics; L3 per Step 6g"

  # --------------------------------------------------------------------
  # constraints — fatal + regular as structured arrays
  # --------------------------------------------------------------------
  constraints:
    type: object
    required: [fatal, regular]
    properties:
      fatal:
        type: array
        items:
          $ref: "#/$defs/constraint"
      regular:
        type: array
        items:
          $ref: "#/$defs/constraint"

  # --------------------------------------------------------------------
  # output_validator — I4 (business-semantic, not "non-empty dict")
  # --------------------------------------------------------------------
  output_validator:
    type: object
    required: [assertions, scaffold, enforcement_protocol]
    properties:
      assertions:
        type: array
        minItems: 1
        items:
          type: object
          required: [id, check_predicate, failure_message, business_meaning]
          properties:
            id:
              type: string
              pattern: "^OV-[0-9]{2}$"
            check_predicate:
              type: string
              description: "Python expression over `result`. MUST have business meaning, not just structural non-emptiness."
            failure_message: { type: string }
            business_meaning:
              type: string
              description: "Why this predicate matters. Rejects OV-02-style structural-only checks."
            source_ids:
              type: array
              items: { type: string }
              description: "Referenced SL/BD/finance-C IDs justifying this assertion"
      scaffold:
        type: object
        required: [validate_py_path, tail_block]
        properties:
          validate_py_path:
            const: "{workspace}/validate.py"
          tail_block:
            type: string
            description: "Literal Python block that MUST appear at end of main script"
      enforcement_protocol:
        type: string

  # --------------------------------------------------------------------
  # acceptance — Hard + Soft gates unified
  # --------------------------------------------------------------------
  acceptance:
    type: object
    required: [hard_gates]
    properties:
      hard_gates:
        type: array
        minItems: 4
        items:
          type: object
          required: [id, check, on_fail]
          properties:
            id:
              type: string
              pattern: "^G[0-9]+$"
            check: { type: string }
            on_fail: { type: string }
      soft_gates:
        type: array
        deprecated: true
        description: "DEPRECATED in v5.3. Audit-only, not runtime-enforced. Scheduled for removal in v5.4."
        x-consumer: [MA]
        items:
          type: object
          required: [id, rubric]
          properties:
            id:
              type: string
              pattern: "^SG-[0-9]{2}$"
            rubric: { type: string }

  # --------------------------------------------------------------------
  # skill_crystallization — I5 (NEW in v5.0)
  # --------------------------------------------------------------------
  skill_crystallization:
    type: object
    additionalProperties: false
    required: [trigger, output_path_template, captured_fields, action, violation_signal]
    properties:
      trigger:
        const: "all_hard_gates_passed AND user_opt_out_skill_saving != true"
      output_path_template:
        type: string
        default: "{workspace}/../skills/{slug}.skill"
      slug_template:
        type: string
        default: "{blueprint_id_short}-{uc_id_lower}"
      captured_fields:
        type: array
        items:
          enum:
            - name
            - intent_keywords
            - entry_point_script
            - validate_script
            - fatal_constraints
            - spec_locks
            - preconditions
            - human_summary_translated
      action:
        type: string
        default: "After G1-Gn PASS, write .skill YAML file then notify user in user's locale: 'Skill saved as {slug}.skill — say {first_intent_keyword} next time to invoke directly.'"
      violation_signal:
        type: string
        default: "All hard gates passed but no .skill file exists at expected path"
      skill_file_schema:
        type: object
        description: "Required shape of emitted .skill YAML. IMPORTANT: consumed by skill_router (SR) via the written .skill file — NOT rendered in post_install_notice. Changing fields here affects skill routing, not Notice content. See consumer_map.yaml."
        x-consumer: [SR]
        properties:
          name: { type: string }
          version: { type: string }
          intent_keywords: { type: array, items: { type: string } }
          entry_point: { type: string }
          fatal_guards: { type: array }
          spec_locks: { type: array }
          preconditions: { type: array }

  # --------------------------------------------------------------------
  # post_install_notice — consumer-value-first onboarding after skill install
  # --------------------------------------------------------------------
  post_install_notice:
    type: object
    additionalProperties: false
    required: [trigger, message_template, locale_rendering, enforcement]
    description: "Triggered once when a host installs this crystal as a skill. Purpose: answer the user's 3 questions in < 200 chars: (1) what is this? (2) what can I literally say right now? (3) how do I see more? Deliberately excludes full UC enumeration — that is on-demand via intent_router."
    properties:
      trigger:
        const: "skill_installation_complete"
      message_template:
        type: object
        required: [positioning, capability_catalog, featured_entries, call_to_action, more_info_hint]
        properties:
          positioning:
            type: string
            description: "1-sentence value prop. Auto-extracted from human_summary.what_i_can_do.tagline first sentence during compile."
          capability_catalog:
            type: object
            required: [group_strategy, groups]
            description: "Pre-computed grouped enumeration of ALL use cases. Host renders as markdown tables per group on install. Enforces business goal #3: user sees full skill capability without extra query."
            properties:
              group_strategy:
                type: object
                required: [source]
                properties:
                  source:
                    enum: [blueprint_declared, auto_grouped]
                  strategy_reason:
                    type: string
                    description: "Human-readable explanation. e.g. 'by blueprint.capability_groups[]' or 'auto-grouped by UC.type (5 distinct values, balanced distribution)'"
              groups:
                type: array
                minItems: 1
                items:
                  type: object
                  required: [group_id, name, emoji, uc_count, ucs]
                  properties:
                    group_id:
                      type: string
                      description: "Stable ID, snake_case, domain-agnostic."
                    name:
                      type: string
                      description: "English display name. Host translates to user locale per locale_contract."
                    description:
                      type: string
                      description: "1-line description of what this group covers. Optional."
                    emoji:
                      type: string
                      description: "Single emoji for visual grouping. From blueprint declaration or universal lookup (📊/🧮/📈/📋/🔧/📦)."
                    uc_count:
                      type: integer
                      minimum: 1
                    ucs:
                      type: array
                      minItems: 1
                      items:
                        type: object
                        required: [uc_id, name, short_description, sample_triggers]
                        properties:
                          uc_id:
                            type: string
                            pattern: "^UC-[0-9]+$"
                          name:
                            type: string
                          short_description:
                            type: string
                            description: "Concise phrase describing the data/output. e.g. 'Institutional / top holders weekly snapshot'."
                          sample_triggers:
                            type: array
                            minItems: 1
                            maxItems: 4
                            items: { type: string }
                            description: "2-4 representative trigger keywords from intent_router.positive_terms."
          call_to_action:
            type: string
            default: "Tell me which one you want to try."
            description: "Invitation phrase after catalog + featured entries. Host translates to user locale."
          featured_entries:
            type: array
            minItems: 3
            maxItems: 3
            description: "Exactly 3 curated entry points. Sourced from blueprint.featured_use_cases if present; else compile-time heuristic picks (lowest precondition severity + shortest positive_terms[0]) with auto_selected: true."
            items:
              type: object
              required: [uc_id, beginner_prompt]
              properties:
                uc_id:
                  type: string
                  pattern: "^UC-[0-9]+$"
                beginner_prompt:
                  type: string
                  description: "A natural-language imperative the user can literally say. e.g. 'Find stocks in MACD bullish state' or 'Pick fundamentally strong companies'."
                auto_selected:
                  type: boolean
                  default: false
                  description: "True if picked by heuristic because blueprint did not declare featured_use_cases."
          more_info_hint:
            type: string
            default: "Ask me 'what else can you do?' to see all {uc_count} capabilities."
      locale_rendering:
        type: object
        required: [instruction, preserve_verbatim]
        properties:
          instruction:
            const: "On skill_installation_complete, translate ALL user-facing strings (positioning + capability_catalog.groups[].name + capability_catalog.groups[].description + capability_catalog.groups[].ucs[].short_description + call_to_action + featured_entries[].beginner_prompt + more_info_hint) into detected user locale per locale_contract. Preserve UC-IDs, group_id, emoji, and sample_triggers verbatim."
          preserve_verbatim:
            type: array
            default: [UC-IDs, group_id, emoji, sample_triggers, technical_class_names]
      enforcement:
        type: object
        required: [action, violation_code, violation_signal]
        properties:
          action:
            const: "Host agent MUST send composed message to user as the FIRST user-facing response after skill_installation_complete event. Message MUST contain: positioning, capability_catalog (rendered as markdown tables per group), 3 featured_entries, call_to_action, and more_info_hint."
          violation_code:
            const: "PIN-01"
          violation_signal:
            type: string
            default: "First user-facing message post-install does not contain the full capability_catalog (all UCs grouped) OR skips featured_entries OR skips call_to_action."

  # --------------------------------------------------------------------
  # human_summary — THE ONLY prose section, English, translated at runtime
  # --------------------------------------------------------------------
  human_summary:
    type: object
    additionalProperties: false
    required: [persona, what_i_can_do, what_i_auto_fetch, what_i_ask_you, locale_rendering]
    properties:
      persona:
        const: "Doraemon"
        description: "Replaces-user-choice, blunt-caring, knows-its-limits. §1.7 of PRODUCT_CONSTITUTION.md"
      what_i_can_do:
        type: object
        required: [tagline, use_cases]
        properties:
          tagline:
            type: string
            description: "2-3 English sentences. May include frank limitations (e.g. 'US stocks in ZVT are half-baked—don't bother')."
          use_cases:
            type: array
            minItems: 3
            maxItems: 7
            items: { type: string }
      what_i_auto_fetch:
        type: array
        minItems: 3
        items: { type: string }
      what_i_ask_you:
        type: array
        minItems: 3
        items: { type: string }
      locale_rendering:
        type: object
        required: [instruction, preserve_verbatim]
        properties:
          instruction:
            const: "On first user contact, translate all fields above into detected user locale while preserving Doraemon persona (direct, frank, mildly snarky, knows limits)."
          preserve_verbatim:
            type: array
            default: [BD-IDs, SL-IDs, UC-IDs, finance-C-IDs, class_names, function_names, file_paths, numeric_thresholds]

  # --------------------------------------------------------------------
  # trace_schema — I8
  # --------------------------------------------------------------------
  trace_schema:
    type: object
    description: "Events the host MUST emit for execution observability"
    properties:
      event_types:
        type: array
        items:
          enum:
            - precondition_check
            - spec_lock_check
            - evidence_rule_fired
            - evidence_rule_skipped
            - locale_translation_emitted
            - hard_gate_passed
            - hard_gate_failed
            - skill_emitted
            - false_completion_claim

# ======================================================================
# $defs — shared sub-schemas
# ======================================================================
$defs:

  constraint:
    type: object
    required: [id, when, action, severity, kind]
    properties:
      id:
        type: string
        pattern: "^[a-z]+-C-[0-9]+$"
      when: { type: string }
      action: { type: string }
      severity:
        enum: [fatal, high, medium, low]
      kind:
        enum: [domain_rule, architecture_guardrail, claim_boundary, resource_boundary, operational_lesson, rationalization_guard]
      consequence: { type: [string, "null"] }
      stage_ids: { type: array, items: { type: string } }
      modality:
        enum: [must, must_not, should, should_not, may]
      derived_from_bd_id: { type: [string, "null"] }
      conflict: { type: boolean, default: false }
      overclaim_risk: { type: boolean, default: false }
