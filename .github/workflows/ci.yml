# README badge:
# [![CI](https://github.com/<OWNER>/<REPO>/actions/workflows/ci.yml/badge.svg)](https://github.com/<OWNER>/<REPO>/actions/workflows/ci.yml)

name: CI

"on":
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: "packages/contracts:packages/extraction:packages/shared_utils:packages/community:packages/cross_project:packages/skill_compiler:packages/orchestration:packages/platform_openclaw:packages/domain_graph:packages/controller:packages/executors:packages/racekit:packages/evals"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: pip install pydantic pytest

      - name: Run Pytest
        run: |
          pytest \
            --ignore=packages/preextract_api \
            --ignore=packages/doramagic_product \
            --ignore=packages/extraction/tests/test_confidence_system.py \
            --ignore=packages/extraction/tests/test_dsd.py \
            --ignore=packages/extraction/tests/test_knowledge_compiler.py \
            --ignore=tests/smoke/test_e2e_pipeline.py \
            --ignore=tests/test_doramagic_pipeline.py
