[project]
name = "doramagic-constraint-agent"
version = "0.1.0"
description = "Autonomous constraint extraction agent — fully independent from blueprint pipeline"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    # anthropic is used indirectly via doramagic-shared-utils LLMAdapter — not declared directly
    "doramagic-agent-core",
    "doramagic-shared-utils",
    "doramagic-constraint-pipeline",
    "doramagic-constraint-schema",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
