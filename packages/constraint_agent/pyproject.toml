[project]
name = "doramagic-constraint-agent"
version = "0.1.0"
description = "Autonomous constraint extraction agent — fully independent from blueprint pipeline"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "anthropic>=0.40",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
