[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "doramagic-web-publisher"
version = "0.1.0"
description = "Crystal web publishing agent — Phase 1 of crystal-web-publishing-sop v2.2"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "httpx>=0.27",
    "typer>=0.12",
    # doramagic-contracts and doramagic-shared-utils are part of the monorepo
    # and are installed via the main doramagic editable install.
    # They are listed here as conceptual dependencies but not pip packages.
    # "doramagic-contracts",   # available as doramagic_contracts
    # "doramagic-shared-utils", # available as doramagic_shared_utils
]

[project.scripts]
web-publisher = "doramagic_web_publisher.cli:app"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.10",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["doramagic_web_publisher"]

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
