# 种子晶体基础模板
# 定义晶体的结构和渲染规则

crystal:
  version: "1.0"
  sections:
    - name: hard_constraints
      title: "硬约束（违反将导致严重后果）"
      filter:
        severity: ["fatal", "high"]
        modality: ["must", "must_not"]
    - name: soft_constraints
      title: "软约束（强烈建议遵守）"
      filter:
        severity: ["medium", "low"]
    - name: resource_profile
      title: "资源边界"
      filter:
        crystal_section: ["resource_profile"]
    - name: coverage_gaps
      title: "已知缺口"
      source: "gap_detection"
