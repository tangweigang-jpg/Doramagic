- id: BD-INT-001
  type: B/BA
  content: 'INTERACTION: [BD-035] × [BD-043] → ML features MA250 requires pre_load_days
    >= 250 for correct calculation, but no enforcement exists. MaStatsAccumulator
    defaults to acc_window=250 but ML machine uses different feature windows [5, 10,
