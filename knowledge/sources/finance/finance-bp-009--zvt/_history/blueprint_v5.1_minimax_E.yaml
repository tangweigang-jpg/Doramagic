- id: BD-INT-002
  type: RC/B
  content: 'INTERACTION: [BD-066] × [BD-023] → T+1 constraint AMPLIFIES stop-loss
    losses in limit-down scenarios. Stop-loss order placed at -30% can only execute
    next day (T+1), and in limit-down market, next-day open may be far below trigger
    price.'
  rationale: 'The missing T+1 constraint (BD-066) directly contradicts the stop-loss
    logic (BD-023). When stop-loss triggers at -30%, the order cannot execute same
    day. If the stock hits limit-down (cannot be sold at any price), the order queues
    for T+1. At T+1 open, if another limit-down occurs, the actual loss far exceeds
    the intended 30%. This is the #1 source of overestimated returns in A-share backtesting
    - stop-loss appears to work but fails exactly when most needed (fast-moving bear
    markets). The amplification occurs because BD-067 (limit up/down) is also missing,
    compounding the execution failure.'
  evidence: src/zvt/trader/trader.py:44(Trader.__init__)
  stage: cross_stage
- id: BD-INT-003
  type: RC/B
  content: 'INTERACTION: [BD-022] × [BD-068] × [BD-076] → RISK CASCADE: Symmetric
    0.1% cost model + missing stamp tax + flat rate ignoring regime = systematic backtest
    overstatement. Combined effect underestimates sell costs by 0.15% (stamp tax)
    × turnover + regime-adjusted spread.'
  rationale: 'Three cost-related decisions combine to systematically overestimate
    returns. BD-022 models symmetric 0.1% buy/sell costs. BD-068 reveals stamp tax
    (0.05% on sell only) is missing, so actual sell cost is 0.15% not 0.1%. BD-076
    adds that fixed costs ignore market regime - in volatile markets, actual execution
    costs spike. The cumulative effect: backtest net returns are overstated by potentially
    0.15-0.5% per round-trip for high-turnover strategies. This affects profitability
    calculations, signal decay rates, and minimum holding period decisions. The cascade
    amplifies for momentum strategies with frequent rebalancing.'
  evidence: src/zvt/trader/sim_account.py:34(SimAccountService.__init__)
  stage: cross_stage
- id: BD-INT-004
  type: B/BA
  content: 'INTERACTION: [BD-004] × [BD-005] × [BD-044] → BullFactor requires diff>0
    AND dea>0 (BD-004) for 10 consecutive periods (BD-005), but MACD live tracking
    only checks diff>dea (BD-044). Internal state tracking and BullFactor logic use
    inconsistent bull definitions.'
  rationale: 'BullFactor (BD-004) uses dual positive condition (diff>0 AND dea>0)
    as stronger confirmation. KeepBullFactor (BD-005) requires 10 consecutive bull
    periods. But MACD algorithm (BD-044) tracks live_count based on simple diff>dea
    crossover. This creates a contradiction: BullFactor might signal bull even when
    MACD live_count hasn''t incremented (because diff<0 but still above dea). Conversely,
    MACD live status could show bullish while BullFactor hasn''t triggered. The AND
    logic in BullFactor is more conservative but inconsistent with how live_count
    is incremented. This breaks in early-stage rallies where diff turns positive before
    dea - BullFactor misses these while MACD live_count captures them.'
  evidence: src/zvt/factors/macd/macd_factor.py:25(src)
  stage: cross_stage
- id: BD-INT-005
  type: B/BA
  content: 'INTERACTION: [BD-070] × [BD-074] × [BD-037] → RISK CASCADE: No index constituent
    validation (BD-074) + no survivorship bias handling (BD-070) + ML temporal split
    uses potentially corrupted historical data (BD-037). Strategy may train/validate
    on non-existent historical constituents.'
  rationale: 'Index constituent changes over time (BD-070 is missing). Multi-provider
    data has no reconciliation (BD-074 is missing). ML training uses temporal split
    at 2021-06-01 (BD-037) but the training data may include stocks that weren''t
    actually index constituents when the historical data was generated. The cascade:
    (1) data provider may use current constituents for historical backfill, (2) no
    cross-validation detects this discrepancy, (3) ML model trains on inflated historical
    performance of stocks that would have been removed from index, (4) model deploys
    expecting similar performance but faces real-world delisting/suspension risk.
    This is a systemic survivorship bias that affects both factor computation and
    ML training.'
  evidence: src/zvt/ml/ml.py:54(src)
  stage: cross_stage
- id: BD-INT-006
  type: M/DK
  content: 'INTERACTION: [BD-006] × [BD-035] → Hidden dependency: Default MA windows
    [5,10,34,55,89,144,120,250] in MaFactor differs from ML feature windows [5,10,120,250].
    Fibonacci MAs 34,55,89,144 used in factors but not in ML, creating feature-factor
    misalignment.'
  rationale: 'MaFactor (BD-006) defaults to Fibonacci MA windows [5,10,34,55,89,144,120,250]
    based on practitioner convention. ML features (BD-035) use only [5,10,120,250]
    - a sparse subset that omits 34,55,89,144. The strategy uses factors with one
    MA set but ML predicts with another. This creates hidden dependency: factor signals
    use Fibonacci levels that ML model never sees. Signals generated at MA34/55/89/144
    support/resistance cannot be predicted by a model trained only on MA5/10/120/250
    features. This breaks when Fibonacci levels are actual support/resistance (which
    is assumed in factor design), causing systematic blind spots in ML predictions.'
  evidence: src/zvt/factors/ma/ma_factor.py:57(src)
  stage: cross_stage
- id: BD-INT-007
  type: B/BA
  content: 'INTERACTION: [BD-027] × [BD-056] × [BD-028] → Multi-level trading with
    weekly+daily (BD-027) requires factor levels processed in ascending order (BD-056)
    and sufficient backshift for warmup (BD-028). 50-day backshift may be insufficient
    for weekly-level MACD convergence.'
  rationale: MultipleLevelTrader (BD-027) combines LEVEL_1WEEK and LEVEL_1DAY factors.
    Factor processing requires ascending order (BD-056) with final decision at minimum
    level. Backshift is 50 days (BD-028) stated as 'sufficient for MACD convergence'.
    However, weekly data requires at least 4-5 weeks of daily data to compute one
    weekly bar meaningfully. If backshift is 50 days and MACD needs 26+ periods for
    slow EMA, the weekly-level MACD may not have converged properly. This breaks when
    backtesting starts close to historical boundary - weekly factors show incomplete
    patterns while daily factors show full history. Signal generation becomes inconsistent
    across timeframes.
  evidence: examples/trader/macd_week_and_day_trader.py:16(src)
  stage: cross_stage
