id: finance-bp-009
name: ZVT Chinese Stock Trading System
version: 1.0.0
source:
  repository: https://github.com/zvtvz/zvt
  commit_hash: f971f00c2181bc7d7fb7987a7875d4ec5960881a
  path: repos/zvt
  projects:
  - https://github.com/zvtvz/zvt
sop_version: '3.4'
applicability:
  domain: Chinese A-share Stock Market Quantitative Trading
  task_type:
  - Technical Factor Analysis
  - Fundamental Factor Analysis
  - Multi-timeframe Trading Strategy
  - Machine Learning Prediction
  - Backtesting and Simulation
  - Real-time Trading
  description: 'ZVT is a modular quantitative trading system designed for Chinese
    A-share stocks.

    It provides data recording, factor computation, strategy development, backtesting,

    and trading execution capabilities with support for multiple data providers and

    technical/fundamental analysis.

    '
  prerequisites:
  - Python 3.8+
  - Market data provider credentials (joinquant, eastmoney, sina, etc.)
  - Understanding of Chinese stock market T+1 trading rules
  - Familiarity with technical indicators (MACD, MA, Bollinger Bands)
  not_suitable_for:
  - High-frequency trading (HFT) strategies
  - Intraday tick-level trading without proper slippage modeling
  - Strategies ignoring regulatory constraints (T+1, limit up/down, stamp tax)
stages:
- id: data_collection
  name: Data Collection
  order: 1
  responsibility: DataRecorder
  interface: 'Recorders collect market data from providers (joinquant, em, sina, etc.)

    and persist to storage. Data includes OHLCV, fundamental data, money flow,

    dragon/tiger list, and actor holdings.

    '
  replaceable_points:
  - Custom data recorders for new providers
  - Custom domain schemas for new asset types
  design_decisions:
  - BD-021: Default adjustment type hfq (post-adjusted) for accurate backtesting
  - BD-045: Data recording schedule at 15:30 (stock), 16:30 (news), 18:00 (dragon/tiger)
  - BD-047: 2-second sleep between API calls for rate limiting
  - BD-048: ignore_delist=True, ignore_st=False (keep ST stocks)
  required_methods:
  - name: record()
    description: Main recording loop that fetches and persists data
    evidence: src/zvt/contract/recorder.py:476-510
  - name: run()
    description: Starts the recording process
    evidence: src/zvt/contract/recorder.py:476
  - name: evaluate()
    description: Evaluates if recording is needed
    evidence: src/zvt/contract/recorder.py:477
  key_behaviors:
  - behavior: Chronological order preservation
    description: Each entity's data must be saved in chronological order
    evidence: src/zvt/contract/recorder.py:476-510
  - behavior: MultiIndex structure [entity_id, timestamp]
    description: All internal DataFrames use 2-level MultiIndex
    evidence: src/zvt/utils/pd_utils.py:84-91
  acceptance_hints: '- Data is persisted with correct OHLCV format

    - Adjustment types (hfq/qfq) are properly applied

    - Provider-specific quirks are handled

    '
- id: factor_computation
  name: Factor Computation
  order: 2
  responsibility: Factor
  interface: 'Factors transform raw price data into trading signals. Technical factors
    include

    MACD, Moving Averages, Bollinger Bands. Fundamental factors include ROE, revenue

    growth, cash flow ratios. Factors output filter_result (boolean) or score_result
    (0-1).

    '
  replaceable_points:
  - Custom Transformers for factor transformation
  - Custom Accumulators for stateful factor computation
  - Custom Factor implementations
  design_decisions:
  - BD-001: MACD slow=26, fast=12, signal=9
  - BD-002: Bollinger Band window=20, window_dev=2
  - BD-003: Golden/Dead cross pattern with live_count transitions [-5, 1]
  - BD-004: Bull market condition diff>0 AND dea>0 (dual positive)
  - BD-005: KeepBullFactor requires 10 consecutive bull periods
  - BD-006: Default MA windows Fibonacci [5, 10, 34, 55, 89, 144, 120, 250]
  - BD-007: CrossMaFactor ma5>ma10 AND ma10>ma20 for long trend
  - BD-011: Volume MA window=30 periods
  - BD-012: TopBottomTransformer 20-day rolling window
  - BD-013: FallBelowTransformer window=10, interval=3
  - BD-014: QuantileScorer 7 discrete score levels
  - BD-015: RankScorer uses percentile ranking across entities
  - BD-016: GoodCompanyFactor thresholds ROE>=2%, growth>=5%
  - BD-017: GoodCompanyFactor period multipliers year=x4, season3=x3, half_year=x2
  - BD-018: GoodCompanyFactor window='1095d', count=8 quarters
  - BD-019: Risky company filters revenue growth<-10%, profit growth<-10%
  - BD-040: EMA with adjust=False for MACD calculation
  - BD-041: MA distance (MA5-MA10)/close for trend strength
  - BD-042: Area calculation segmented cumulative for trend magnitude
  - BD-043: MaStatsAccumulator acc_window=250, windows=[5,10], vol_windows=[30]
  - BD-044: Live/dead tracking live=diff>dea, bull=diff>0 AND dea>0
  - BD-055: Factor compute pipeline order enforced
  - BD-058: Accumulator window=1 by default (stateless)
  - BD-059: Result DataFrame must contain filter_result or score_result
  - BD-061: ZenAccumulator requires exactly 11 k-lines for first fenxing
  - BD-062: Zen zhongshu detection requires exactly 4 bi points
  required_methods:
  - name: compute()
    description: Main factor computation pipeline
    evidence: src/zvt/contract/factor.py:434-449
  - name: compute_factor()
    description: Computes factor values from transformed data
    evidence: src/zvt/contract/factor.py:434
  - name: compute_result()
    description: Generates result_df with filter_result or score_result
    evidence: src/zvt/contract/factor.py:438
  key_behaviors:
  - behavior: Pipeline order enforcement
    description: pre_compute -> do_compute -> compute_factor -> compute_result ->
      after_compute
    evidence: src/zvt/contract/factor.py:434-449
  - behavior: Result column contract
    description: ALL factors MUST produce filter_result or score_result
    evidence: src/zvt/utils/pd_utils.py:16-21
  acceptance_hints: '- Factors produce valid filter_result or score_result columns

    - MA/MACD calculations match expected values

    - Factor results are consistent across different time periods

    '
- id: strategy_development
  name: Strategy Development
  order: 3
  responsibility: StockTrader
  interface: 'Traders combine factors, apply position control, and generate trading
    signals.

    Strategies can use single or multiple factor levels (daily, weekly). Traders

    support both backtesting and live trading modes.

    '
  replaceable_points:
  - Custom trading logic via on_time, on_trading_signals overrides
  - Custom position control (long_position_control, short_position_control)
  - Custom factor filtering via on_factor_targets_filtered
  design_decisions:
  - BD-022: Trading costs 0.1% buy, 0.1% sell, 0.1% slippage
  - BD-023: Default profit threshold 3% take-profit, -30% stop-loss
  - BD-024: Fund holding change thresholds +5% buy, -50% sell
  - BD-025: DragonTigerFactor filter dep1 == '机构专用'
  - BD-026: Entity pool intersection of top 30% volume AND top 30% fund holdings
  - BD-027: Multi-level trading weekly+daily MACD combination
  - BD-028: 40-day rolling windows with -50 day backshift
  - BD-029: BullAndUpFactor turnover 400M RMB, turnover_rate 2%
  - BD-056: Factor levels processed in ascending order with final decision at minimum
      level
  - BD-057: Default trading level LEVEL_1DAY (daily)
  required_methods:
  - name: init_factors()
    description: Initializes factors for the trading strategy
    evidence: examples/trader/macd_day_trader.py:19-35
  - name: on_time()
    description: Time-based trading logic callback
    evidence: examples/trader/follow_ii_trader.py:15-43
  - name: handle_factor_targets()
    description: Processes factor outputs and generates trading decisions
    evidence: src/zvt/trader/trader.py:404-432
  key_behaviors:
  - behavior: Multi-timeframe factor processing
    description: Factors at different levels are cached and combined at minimum level
    evidence: src/zvt/trader/trader.py:404-432
  - behavior: Signal generation
    description: Trading signals generated from factor results with position control
    evidence: src/zvt/trader/trader.py:1-50
  acceptance_hints: '- Strategies generate actionable trading signals

    - Position limits are respected

    - Multiple factor levels are properly combined

    '
- id: backtesting
  name: Backtesting
  order: 4
  responsibility: SimAccountService
  interface: 'SimAccountService simulates trading with realistic cost modeling and

    position management. It tracks portfolio value, calculates returns,

    and generates performance reports.

    '
  replaceable_points:
  - Custom cost models
  - Custom risk management rules
  - Custom performance metrics
  design_decisions:
  - BD-022: Trading costs 0.1% buy, 0.1% sell, 0.1% slippage
  - BD-023: Default profit threshold 3% take-profit, -30% stop-loss
  - BD-039: Profit rate (all_value - input_money) / input_money
  - BD-067: Limit up/down handling [MISSING]
  - BD-068: Stamp tax 0.05% on sell [MISSING]
  - BD-076: Transaction cost model calibration [MISSING]
  required_methods:
  - name: handle_trading_signal()
    description: Processes trading signals and executes simulated trades
    evidence: src/zvt/trader/sim_account.py:180-195
  - name: get_current_account()
    description: Calculates current account value and profit rate
    evidence: src/zvt/trader/sim_account.py:294-295
  - name: long_position_control()
    description: Manages long position sizing and risk
    evidence: src/zvt/trader/trader.py:310-330
  key_behaviors:
  - behavior: Cost calculation
    description: Commissions and slippage applied to each trade
    evidence: src/zvt/trader/sim_account.py:34-36
  - behavior: Position management
    description: Tracks open positions and calculates unrealized P&L
    evidence: src/zvt/trader/sim_account.py:180-195
  acceptance_hints: '- Backtest results are reproducible

    - Costs are accurately calculated

    - Performance metrics are correctly computed

    '
- id: ml_prediction
  name: Machine Learning Prediction
  order: 5
  responsibility: MLMachine
  interface: 'MLMachine provides supervised learning for stock prediction. It builds

    features from market data, generates labels, trains models, and produces

    predictions. Supports classification and regression tasks.

    '
  replaceable_points:
  - Custom feature engineering
  - Custom label generation
  - Custom model architectures
  design_decisions:
  - BD-033: Relative performance quantiles best>=0.9, ordinary>=0.5, poor>=0
  - BD-034: ML prediction horizon 20 trading days
  - BD-035: ML features MA windows [5, 10, 120, 250] with StandardScaler
  - BD-036: ML label methods 'raw', 'change', 'behavior_cls'
  - BD-037: ML train/test split at predict_start_timestamp (default 2021-06-01)
  - BD-038: SGDClassifier/SGDRegressor max_iter=1000, tol=1e-3
  - BD-063: ML pipeline fixed sequence build_kdata->build_feature->build_label->split_data->train->predict
  required_methods:
  - name: build_feature()
    description: Constructs features from market data
    evidence: src/zvt/ml/ml.py:223
  - name: build_label()
    description: Generates labels for supervised learning
    evidence: src/zvt/ml/ml.py:137-156
  - name: split_data()
    description: Temporal split for train/test separation
    evidence: src/zvt/ml/ml.py:54,78,113-119
  - name: train()
    description: Trains the ML model
    evidence: src/zvt/ml/ml.py:89
  - name: predict()
    description: Generates predictions
    evidence: src/zvt/ml/ml.py:89
  key_behaviors:
  - behavior: Temporal split prevention
    description: Strict temporal split prevents look-ahead bias
    evidence: src/zvt/ml/ml.py:54,78,113-119
  - behavior: Feature scaling
    description: StandardScaler normalizes features to zero mean and unit variance
    evidence: src/zvt/ml/ml.py:223
  acceptance_hints: '- ML pipeline produces valid predictions

    - No look-ahead bias in training/test split

    - Feature engineering matches factor definitions

    '
- id: reporting
  name: Reporting and Notifications
  order: 6
  responsibility: Informer
  interface: 'Reporting generates periodic summaries of market conditions, strategy

    performance, and trading opportunities. Notifications can be sent via

    email, WeChat, or other channels.

    '
  replaceable_points:
  - Custom report templates
  - Custom notification channels
  - Custom report scheduling
  design_decisions:
  - BD-020: Report date lookback 130 days for financial data freshness
  - BD-046: Error retry up to 10 retries with 3-minute sleep
  - BD-052: Top tags monthly top 30 stocks filtered to cap<10B
  - BD-053: Main line tags get priority in reporting
  required_methods:
  - name: inform()
    description: Sends notification with report content
    evidence: examples/report_utils.py:61-100
  key_behaviors:
  - behavior: Report generation
    description: Generates formatted reports from market data and strategy results
    evidence: examples/report_utils.py:61-100
  - behavior: Risk identification
    description: Identifies risky companies based on financial metrics
    evidence: examples/reports/__init__.py:22-68
  acceptance_hints: '- Reports are generated on schedule

    - Notifications are delivered successfully

    - Risky companies are correctly identified

    '
data_flow:
  edges:
  - from: data_collection
    to: factor_computation
    description: Raw market data feeds into factor computation
  - from: factor_computation
    to: strategy_development
    description: Factor signals feed into trading strategy
  - from: strategy_development
    to: backtesting
    description: Trading signals are simulated in backtesting
  - from: data_collection
    to: ml_prediction
    description: Historical data used for ML training
  - from: ml_prediction
    to: strategy_development
    description: ML predictions can inform trading decisions
  - from: backtesting
    to: reporting
    description: Performance reports generated from backtest results
  - from: strategy_development
    to: reporting
    description: Trading signals reported to users
global_contracts:
  data_structure:
  - All internal DataFrames MUST use 2-level MultiIndex [entity_id, timestamp]
  - K-Line data MUST contain OHLCV columns
  - Factor results MUST contain filter_result or score_result columns
  factor_computation:
  - Factor pipeline order MUST be: pre_compute -> do_compute -> compute_factor ->
      compute_result -> after_compute
  - All factors MUST return result_df with required columns
  trading_execution:
  - Trading signals MUST pass through position control before execution
  - Multi-level factors MUST be processed in ascending order
  ml_pipeline:
  - Train/test split MUST be temporal (no look-ahead bias)
  - Features MUST be scaled using StandardScaler for SGD models
  data_collection:
  - Data MUST be recorded in chronological order per entity
  - Multiple providers can serve same schema for redundancy
business_decisions:
- id: BD-001
  type: M/DK
  content: 'MACD parameters: slow=26, fast=12, signal=9 (standard parameters for momentum/trend
    detection)'
  rationale: Standard MACD parameters are widely used in Chinese stock markets based
    on historical backtesting. Fast=12 represents half-month, Slow=26 represents month,
    Signal=9 approximates one trading week. These specific values assume market cycles
    align with calendar months. This breaks when trading calendar diverges significantly
    from lunar months or when high-frequency trading dominates intraday price discovery.
  evidence: src/zvt/factors/algorithm.py:30(macd)
  stage: factor/technical/macd
  alternative_considered: Considered adaptive MACD parameters that adjust to volatility
    regimes, but chose fixed parameters because they provide consistent cross-sectional
    comparison and avoid overfitting to historical periods.
- id: BD-002
  type: M/DK
  content: 'Bollinger Band parameters: window=20, window_dev=2 for volatility-adjusted
    price channels'
  rationale: Standard 20-period lookback with 2 standard deviations captures approximately
    95% of price movement assuming normal distribution. Industry standard uses 20/2
    as de facto default across Bloomberg, TradingView, and most quant platforms. This
    approach breaks when price returns exhibit fat tails (kurtosis > 3) or when volatility
    is regime-switching, as the fixed bandwidth misidentifies boundaries.
  evidence: examples/factors/boll_factor.py:13(BollTransformer.transform_one)
  stage: factor/technical/bollinger
  alternative_considered: Considered ATR-based bands for dynamic bandwidth, but chose
    standard deviation because it enables cross-stock comparison and matches practitioner
    expectations.
- id: BD-003
  type: B/BA
  content: 'Golden/Dead cross pattern: live_count transitions from <=-5 to >=1 for
    MACD signal detection'
  rationale: 'Pattern [-5, 1] requires 5+ consecutive periods in dead cross territory
    before switching to live. This assumes that sustained bearish periods followed
    by reversal indicate stronger signals than simple crossovers. Industry practice
    varies: some use 2-3 periods, others use 9-13. This approach breaks in choppy
    markets where MACD oscillates frequently, causing extended dead count periods
    and missed opportunities.'
  evidence: src/zvt/factors/macd/macd_factor.py:47(LiveOrDeadFactor)
  stage: factor/technical/macd
  alternative_considered: Considered simple diff>dea crossover without count filter,
    but chose [-5,1] to reduce whipsaws from short-lived crosses common in high-volatility
    A-share market.
- id: BD-004
  type: M/BA
  content: 'Bull market condition: diff>0 AND dea>0 (dual positive) for trend confirmation'
  rationale: BullFactor uses dual positive condition (both diff and dea above zero)
    which is a stronger trend confirmation than diff>dea alone. This assumes both
    the short and long EMAs being positive indicates more sustained bullish momentum.
    This approach is more conservative than diff>dea crossover, filtering out weaker
    signals. It breaks in early-stage rallies where diff turns positive before dea.
  evidence: src/zvt/factors/macd/macd_factor.py:25(BullFactor)
  stage: factor/technical/macd
  alternative_considered: Considered diff>dea crossover alone, but dual positive requirement
    reduces false signals at cost of missing early trend entries.
- id: BD-005
  type: B/BA
  content: 'KeepBullFactor: 10 consecutive bull periods required (keep_window=10,
    logical AND)'
  rationale: Requires 10 consecutive periods of bull market (diff>0 AND dea>0) before
    signal confirmation. This assumes sustained bullishness must be consistent, filtering
    out short-term fluctuations as noise. Industry practice for trend confirmation
    varies from 3-20 periods depending on timeframe. This approach breaks in sideways
    markets where brief bull periods don't sustain, causing extended waiting periods.
  evidence: src/zvt/factors/macd/macd_factor.py:31(KeepBullFactor)
  stage: factor/technical/macd
  alternative_considered: Considered shorter window (5 periods) for faster signals,
    but chose 10 for weekly-level analysis where short-term noise is higher.
- id: BD-006
  type: M/DK
  content: 'Default MA windows: Fibonacci [5, 10, 34, 55, 89, 144, 120, 250]'
  rationale: 'Fibonacci sequence combined with commonly used 120 and 250-day MAs (half-year
    and full-year trading days). This assumes Fibonacci numbers have predictive value
    for price movements. Industry practice varies: some use Fibonacci exclusively,
    others use round numbers (20, 50, 200). This breaks when Fibonacci levels coincide
    with support/resistance from non-Fibonacci-based institutional trading.'
  evidence: src/zvt/factors/ma/ma_factor.py:57(MaFactor.__init__)
  stage: factor/technical/ma
  alternative_considered: Considered simple powers of 2 (8, 16, 32, 64, 128, 256),
    but chose Fibonacci for practitioner alignment and Chinese market convention.
- id: BD-007
  type: M/BA
  content: 'CrossMaFactor: ma5>ma10 AND ma10>ma20 AND ascending chain for long trend'
  rationale: Longest window must be lowest and shortest must be highest - classic
    'ma多头排列' pattern. This assumes that when all MAs are in ascending order, it confirms
    a strong uptrend. AND logic reduces false positives compared to OR combinations.
    This breaks when MAs compress together during low-volatility consolidation, creating
    no signal.
  evidence: src/zvt/factors/ma/ma_factor.py:94(CrossMaFactor.compute_result)
  stage: factor/technical/ma
  alternative_considered: Considered partial alignment (ma5>ma10 only), but chose
    full chain for stronger trend confirmation in momentum strategies.
- id: BD-008
  type: B/DK
  content: 'Volume breakout threshold: volume > 2x volume MA for momentum confirmation'
  rationale: 2x threshold ensures genuine volume surge, not just normal daily variation.
    Industry practice ranges from 1.5x to 3x depending on market volatility. This
    assumes volume expansion confirms price movement. This approach breaks when market-wide
    volume increases (bull market sessions) cause false signals on lagging stocks.
  evidence: src/zvt/factors/ma/ma_factor.py:207(VolumeUpMaFactor.compute_result)
  stage: factor/technical/volume
  alternative_considered: Considered adaptive threshold based on historical volume
    volatility, but chose fixed 2x for simplicity and consistent cross-stock comparison.
- id: BD-009
  type: B/BA
  content: 'Price breakout range: within 15% above MA250, within 10% above other MAs'
  rationale: Allows for stocks that have recently broken out without requiring exact
    MA touch. 15% for MA250 is wider to accommodate longer-term trends. Industry practice
    uses various percentages (5-20%) based on volatility. This assumes breakout must
    be close to MA but not necessarily on it. This breaks when stocks gap significantly
    above MA after news events.
  evidence: src/zvt/factors/ma/ma_factor.py:192(VolumeUpMaFactor.compute_result)
  stage: factor/technical/breakout
  alternative_considered: Considered tighter 5% threshold, but chose wider range to
    capture stocks in early breakout phase without missing opportunities.
- id: BD-010
  type: B/BA
  content: 'Post-break holding period: up_intervals=40 with ffill fill method'
  rationale: 40-interval forward fill means stock remains selected for up to 40 trading
    days after initial breakout signal. This reduces excessive turnover and captures
    trending moves. Industry practice varies from 10-60 days for momentum strategies.
    Assumes momentum persists after initial breakout. This breaks in mean-reversion
    markets where breakout signals fail.
  evidence: src/zvt/factors/ma/ma_factor.py:221(VolumeUpMaFactor.compute_result)
  stage: factor/technical/hold
  alternative_considered: Considered trailing stop for dynamic exit, but chose fixed
    40-interval for simpler backtesting and predictable turnover.
- id: BD-011
  type: M/DK
  content: 'Volume MA window: 30 periods for stable baseline'
  rationale: 30-day volume average provides stable baseline for volume comparisons.
    Common in Chinese A-share market for identifying abnormal trading activity. This
    assumes monthly average smooths daily noise. This breaks when trading patterns
    change structurally (e.g., market maker changes, HFT increase).
  evidence: src/zvt/factors/ma/ma_factor.py:146(VolumeUpMaFactor.__init__)
  stage: factor/technical/volume
  alternative_considered: Considered shorter 10-day or longer 60-day window, but chose
    30 for balance between noise reduction and responsiveness.
- id: BD-012
  type: M/DK
  content: 'TopBottomTransformer: 20-day rolling window for support-resistance level
    detection'
  rationale: 20-day rolling window captures recent trading range. Used for identifying
    support and resistance levels. Industry standard for short-term S/R uses 5-30
    days depending on trading style. This assumes historical highs/lows within this
    window define future boundaries. This breaks in trending markets where S/R levels
    shift rapidly.
  evidence: src/zvt/factors/ma/top_bottom_factor.py:18(TopBottomTransformer.__init__)
  stage: factor/technical/support_resistance
  alternative_considered: Considered adaptive window based on volatility, but chose
    fixed 20 for consistency and practitioner alignment.
- id: BD-013
  type: B/BA
  content: 'FallBelowTransformer: window=10 (MA period), interval=3 (consecutive days
    below MA)'
  rationale: 3 consecutive days closing below 10-day MA generates sell signal. This
    avoids false signals from single-day dips while remaining responsive. Classic
    '断头铡刀' pattern detection, assuming sustained below-MA closes indicate trend change.
    This breaks in volatile stocks with frequent gap opens/closes below MA.
  evidence: src/zvt/factors/transformers.py:56(FallBelowTransformer.transform)
  stage: factor/technical/sell_signal
  alternative_considered: Considered single-day close below MA for faster response,
    but chose 3-day requirement to reduce whipsaws in noisy markets.
- id: BD-014
  type: M/BA
  content: 'QuantileScorer: 7 discrete score levels [0, 0.1, 0.3, 0.5, 0.7, 0.9, 1.0]'
  rationale: 7 discrete score levels based on distribution of factor values at each
    timestamp. Sorted in descending order so higher percentiles get higher scores.
    This assumes quantile boundaries capture meaningful thresholds. This breaks when
    factor distribution is highly skewed or bimodal, causing inappropriate bucketing.
  evidence: src/zvt/factors/algorithm.py:312(QuantileScorer)
  stage: factor/scoring
  alternative_considered: Considered continuous 0-1 scoring, but chose discrete levels
    for clearer signal separation and simpler threshold-based decisions.
- id: BD-015
  type: M/BA
  content: RankScorer uses percentile ranking across entities at each timestamp
  rationale: Percentile rank for relative comparison assumes cross-sectional comparison
    is meaningful. No extreme outliers skewing results and sufficient sample size.
    Industry standard for cross-sectional factor models. This enables relative factor
    comparison across stocks. This breaks when universe is very small (<30 stocks)
    or when all stocks move together.
  evidence: src/zvt/factors/algorithm.py:141(RankScorer.score)
  stage: factor/scoring
  alternative_considered: Considered absolute scoring with z-score normalization,
    but chose percentile ranking for robustness to outliers and market regime changes.
- id: BD-016
  type: B/DK
  content: 'GoodCompanyFactor fundamental thresholds: ROE>=2%, revenue growth>=5%,
    profit growth>=5%, cash flow ratios, current ratio>=1, debt-to-asset<=50%'
  rationale: Fundamental quality filter combining profitability, growth, cash flow
    quality, and financial health. Conservative standards for A-share blue chips.
    Thresholds assume these specific values represent acceptable quality companies.
    Industry practice for quality screens varies by market cap and sector. This breaks
    when sector-specific norms differ significantly.
  evidence: src/zvt/factors/fundamental/finance_factor.py:99(GoodCompanyFactor.__init__)
  stage: factor/fundamental/valuation
  alternative_considered: Considered sector-relative thresholds, but chose absolute
    values for simplicity and consistent cross-sector comparison.
- id: BD-017
  type: M/BA
  content: 'GoodCompanyFactor period multipliers: year=x4, season3=x3, half_year=x2
    for annualization'
  rationale: Quarterly financial data annualized by multiplier for YoY comparisons.
    Year-end gets 4x (full year), Q3 gets 3x (three quarters), half-year gets 2x.
    This assumes linear scaling is valid for fundamental metrics. This breaks for
    seasonal businesses where Q4 is disproportionately large or small.
  evidence: src/zvt/factors/fundamental/finance_factor.py:174(GoodCompanyFactor.compute_factor)
  stage: factor/fundamental/period_adjustment
  alternative_considered: Considered rolling 4-quarter sum, but chose multiplier approach
    for immediate comparability to annual figures.
- id: BD-018
  type: B/BA
  content: GoodCompanyFactor window='1095d' (3 years), count=8 quarters for consistency
    check
  rationale: Company must pass quality filter in 8 out of most recent 12 quarters
    (3 years). This ensures consistent fundamental quality, not just one-time beats.
    Assumes sustained performance matters more than temporary improvement. Industry
    practice for quality screens uses 2-5 year windows. This breaks for turnarounds
    and cyclicals.
