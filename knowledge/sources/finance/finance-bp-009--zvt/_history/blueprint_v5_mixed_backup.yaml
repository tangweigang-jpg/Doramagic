audit_checklist_summary:
  sop_version: '3.3'
  executed_at: '2026-04-12'
  subdomain_labels:
  - TRD
  - A_STOCK
  - PRC
  - RSK
  - CRD
  - DAT
  finance_universal:
    pass: 6
    warn: 10
    fail: 4
  subdomain_checklists:
  - name: TRD
    result:
      pass: 2
      warn: 4
      fail: 2
  - name: A_STOCK
    result:
      pass: 1
      warn: 5
      fail: 5
  critical_findings:
  - item: T+1 trading constraint not enforced
    severity: critical
    disposition: converted_to_bd
  - item: Price limit (涨跌停板) not modeled
    severity: critical
    disposition: converted_to_bd
  - item: Stamp duty asymmetry ignored (0.05% sell only)
    severity: high
    disposition: converted_to_bd
  - item: ST/*ST 5% price limit not handled
    severity: high
    disposition: converted_to_bd
relations:
- target: finance-bp-001
  type: alternative_to
  description: vnpy event-driven trading framework vs zvt factor-driven approach. vnpy focuses on live
    trading execution; zvt focuses on factor research and simulated backtesting.
- target: finance-bp-002
  type: complementary_to
  description: backtrader general-purpose backtesting vs zvt A-share specialized backtesting. zvt provides
    built-in A-share data providers and market conventions.
execution_paradigm:
  live: sequential_bar_iteration
  backtest: sequential_bar_iteration
  note: Trader.run() uses the same main loop for both live and backtest modes, controlled by real_time
    flag
