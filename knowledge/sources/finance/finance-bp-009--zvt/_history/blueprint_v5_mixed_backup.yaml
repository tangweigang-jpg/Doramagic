known_use_cases:
- id: UC-01
  name: MACD Gold Cross Day Trader
  type: trading_strategy
  business_problem: Detect bullish momentum via MACD golden cross on daily bars for single stock or universe,
    generate buy signals and manage positions with 30% profit target and 30% stop loss.
  data_domain: Chinese A-Share Stocks (A股)
  negative_keywords:
  - 'shorthand: do not use for high-frequency intraday strategies'
  - 'shorthand: do not use for US stocks or non-A-share markets without provider changes'
  disambiguation: Single-factor MACD strategy; does NOT combine with fundamental filters. Use BullAndUpFactor
    (UC-03) if fundamental + technical combination needed.
  stage: stage_5
  source: examples/trader/macd_day_trader.py
  intent_keywords:
  - MACD
  - Gold
  - Cross
  - Day
  - Trader
- id: UC-02
  name: MACD Multi-Timeframe Trader (Week + Day)
  type: trading_strategy
  business_problem: Confirm bullish signals using both weekly and daily MACD gold crosses simultaneously
    — requires alignment across timeframes for higher conviction entries.
  data_domain: Chinese A-Share Stocks (A股)
  negative_keywords:
  - 'shorthand: do not use if weekly data has insufficient history (<50 days warmup)'
  - 'shorthand: do not use for single-stock micro-caps with low weekly volume'
  disambiguation: Multi-level version of UC-01 — both week and day GoldCrossFactors must agree. More conservative
    than single-timeframe.
  stage: stage_5
  source: examples/trader/macd_week_and_day_trader.py
  intent_keywords:
  - MACD
  - Multi
  - Timeframe
  - Trader
  - Week
- id: UC-03
  name: Keep-Run Multi-Factor Momentum Trader
  type: trading_strategy
