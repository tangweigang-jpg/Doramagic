# Extraction pipeline: SOP v3.3 (v5 Batch A, 2026-04-12)
id: finance-bp-009
name: 'zvt: Chinese A-Share Quantitative Factor Investing & Simulated Trading'
version: 0.13.5
sop_version: '3.3'
source:
  repository: zvt
  url: https://github.com/top Quant/zvt
  commit_hash: f971f00c2181bc7d7fb7987a7875d4ec5960881a
  language: Python 3
  framework: pandas + sklearn + ta-lib wrappers
  projects:
  - zvt
applicability:
  domain:
  - Quantitative Finance
  - Systematic Trading
  - Factor Investing
  - Chinese A-Share Market (A股)
  task_type:
  - Factor computation (technical, fundamental, ML)
  - Stock screening & target selection
  - Simulated trading with position management
  - Automated reporting (email/dashboard)
  description: >
    zvt is a modular Python framework for Chinese A-share quantitative analysis.

    It supports data ingestion from joinquant and eastmoney, factor engineering

    (MACD, MA, Bollinger, fundamental ratios, ML regression/classification),

    simulated trading with dynamic position sizing, and scheduled email reporting.

    The system operates on multi-interval OHLCV data (tick to monthly) and

    handles entity types including stocks, blocks (industry/concept), HK stocks,

    US stocks, funds, and crypto.
  prerequisites:
  - Python 3.x with pandas, numpy, sklearn, ta
  - SQLite/PostgreSQL database for persisted data
  - 'Data providers: joinquant or eastmoney (em) credentials'
  - A-share market domain knowledge (T+1, price limits, stamp duty)
  not_suitable_for:
  - Live trading without paper-trading validation
  - High-frequency strategies requiring sub-second execution
  - Non-Chinese markets without provider adapters
  - Strategies ignoring survivorship bias and market microstructure
stages:
- id: stage_1
  name: Data Ingestion & Recording
  order: 1
  responsibility: Domain-specific Recorders (joinquant/em)
  interface: >
    RecordData(entity_ids, provider, start_timestamp, end_timestamp) →

    Stock1dHfqKdata | StockActorSummary | DragonAndTiger | BalanceSheet | …
  replaceable_points:
  - Data provider (joinquant ↔ em ↔ custom)
  - Adjust type (hfq post-adjustment ↔ qfq ↔ bfq unadjusted)
  - Entity schema (Stock ↔ Block ↔ StockHK ↔ Fund)
  - Interval level (tick/1m/5m/15m/30m/1h/4h/1d/1wk/1mon)
  design_decisions:
  - ref: BD-22
  - ref: BD-26
  - ref: BD-27
  - ref: BD-28
  acceptance_hints: >
    ✓ Kdata records match source provider's adjusted close prices

    ✓ Actor summaries reflect institutional investor tracking

    ✓ Dragon/tiger data filtered by '机构专用' when configured

    ✓ Fresh data within expected timestamp windows
- id: stage_2
  name: Factor Engineering
  order: 2
  responsibility: Factor / Transformer / Accumulator classes
  interface: >
    Factor.transform(input_df) → factor_df

    Transformer.transform_one(entity_id, df) → df

    Factor.compute_result() → result_df (filter_result)
  replaceable_points:
  - MACD parameters (slow=26, fast=12, n=9 ↔ custom)
  - MA windows (Fibonacci [5,10,34,55,89,144,120,250] ↔ [5,10,20,60])
  - ROE/turnover/fundamental thresholds
  - CrossMaTransformer windows ([5,120,250] ↔ [5,10,20])
  - QuantileScorer binning (7 bins ↔ K-means)
  - Rolling window size for top/bottom (20 ↔ 10 ↔ 50)
  design_decisions:
  - ref: BD-1
  - ref: BD-2
  - ref: BD-3
  - ref: BD-4
  - ref: BD-5
  - ref: BD-6
  - ref: BD-7
  - ref: BD-10
  - ref: BD-11
  - ref: BD-12
  - ref: BD-13
  - ref: BD-14
  - ref: BD-15
  - ref: BD-25
  - ref: BD-38
  - ref: BD-39
  - ref: BD-42
  - ref: BD-43
  - ref: BD-52
  - ref: BD-53
  acceptance_hints: >
    ✓ MACD diff/dea/macd values match manual calculation for known dates

    ✓ GoldCrossFactor signals appear at diff>dea crossover only

    ✓ BullFactor requires both diff>0 and dea>0

    ✓ GoodCompanyFactor filters pass all 8 criteria simultaneously

    ✓ VolumeUpMaFactor requires price within 15% of MA + 2x volume

    ✓ Fibonacci MA windows [5,10,34,55,89,144,120,250] computed
- id: stage_3
  name: Stock Screening & Entity Pool Filtering
  order: 3
  responsibility: TargetSelector / factor combination + pre-filters
  interface: >
    get_top_stocks(target_date, return_type) → entity_ids

    get_top_volume_entities(pct=0.3) → entity_ids

    get_top_fund_holding_stocks(pct=0.3) → entity_ids

    factor.get_targets(timestamp) → [entity_ids]
  replaceable_points:
  - Top N stocks count (50 ↔ 30 ↔ 100)
  - Performance period windows [1..20] ↔ [5,10,20,60]
  - Volume filter percentile (30% ↔ 20% ↔ 40%)
  - Turnover threshold (400M ↔ 100M ↔ 300M)
  - Turnover rate threshold (2% ↔ 1% ↔ 3%)
  - Entity pool intersection logic (volume AND fund holding)
  - Fund holding period lookback (30 days ↔ 20 ↔ 60)
  design_decisions:
  - ref: BD-8
  - ref: BD-9
  - ref: BD-23
  - ref: BD-24
  - ref: BD-29
  - ref: BD-31
  - ref: BD-48
  - ref: BD-49
  acceptance_hints: >
    ✓ Entity pool limited to liquid stocks (turnover >= threshold)

    ✓ Performance ranking reflects correct return calculation method

    ✓ Sector/industry tagging maps to 20 categories

    ✓ Pre-filters applied before factor scoring
- id: stage_4
  name: ML Feature Engineering & Model Training
  order: 4
  responsibility: MLMachine / MaStockMLMachine
  interface: >
    MLMachine.build_feature(entity_ids, start, end) → feature_df

    MLMachine.build_label() → label_ser

    MLMachine.train(model=pipeline) → trained model

    MLMachine.predict() → pred_y
  replaceable_points:
  - Feature windows ([5,10,120,250] ↔ [5,10,20,60])
  - Prediction horizon (20 periods ↔ 5/10/30/60)
  - Label method ('raw' ↔ 'change' ↔ 'behavior_cls')
  - Scaler (StandardScaler ↔ MinMaxScaler ↔ RobustScaler)
  - Model (SGDClassifier ↔ LinearRegression ↔ SGDRegressor)
  - Relative performance thresholds (best>=0.5, ordinary>=0)
  design_decisions:
  - ref: BD-33
  - ref: BD-34
  - ref: BD-35
  - ref: BD-36
  - ref: BD-37
  - ref: BD-44
  - ref: BD-45
  - ref: BD-46
  - ref: BD-54
  acceptance_hints: >
    ✓ Features computed as MA(close, window) for specified windows

    ✓ Labels computed with forward-looking pct_change (negative periods)

    ✓ Train/test split respects temporal ordering (no look-ahead bias)

    ✓ StandardScaler fitted on training set only
- id: stage_5
  name: Portfolio Construction & Position Management
  order: 5
  responsibility: StockTrader / Trader base class
  interface: >
    Trader.run() → executes backtest loop

    long_position_control() → position percentage

    handle_factor_targets(timestamp) → execute orders

    cal_amount_by_money(money, price) → share count (floor division)
  replaceable_points:
  - Position sizing (20% initial, 50% building ↔ fixed %)
  - Max positions (10 ↔ 5 ↔ 15 ↔ unlimited)
  - Profit target/stop-loss (30%/-30% ↔ 50%/-20% ↔ ATR-based)
  - Average cost method (weighted avg ↔ FIFO ↔ LIFO)
  - Rebalancing interval (40 days ↔ 20/60/90 days)
  design_decisions:
  - ref: BD-16
  - ref: BD-17
  - ref: BD-18
  - ref: BD-19
  - ref: BD-20
  - ref: BD-21
  - ref: BD-40
  - ref: BD-41
  acceptance_hints: >
    ✓ Orders sized via floor division (whole shares only)

    ✓ Position sizing respects max-10-stock limit

    ✓ Slippage applied to both buy and sell fills

    ✓ Symmetric 0.1% cost applied (ignoring A-share stamp duty asymmetry)

    ✓ Profit/stop-loss checked per position at each timestamp
- id: stage_6
  name: Trade Execution Simulation
  order: 6
  responsibility: SimAccountService
  interface: >
    SimAccountService.apply_trading_signal(signal) → fills

    update_position(entity_id, order) → position update

    get_account_stats() → AccountStats
  replaceable_points:
  - Trading cost model (symmetric 0.1% ↔ asymmetric with stamp duty)
  - Slippage model (constant 0.1% ↔ volume-weighted ↔ 0)
  - T+1 constraint (currently NOT modeled → missing gap)
  - Price limit handling (涨跌停板 → currently NOT modeled)
  design_decisions:
  - ref: BD-17
  - ref: BD-18
  acceptance_hints: >
    ✓ Cash deducted correctly after buy with cost+slippage

    ✓ Position updated with weighted average cost

    ✓ Sell proceeds credited with cost+slippage deducted

    ⚠ T+1 constraint NOT enforced — same-day re-entry possible in backtest

    ⚠ Price limit (涨跌停) NOT modeled — limit-up buys may appear executable

    ⚠ Asymmetric stamp duty (0.05% sell only) NOT modeled
- id: stage_7
  name: Reporting & Alerting
  order: 7
  responsibility: report_utils / Drawer / EmailInformer
  interface: >
    report_top_stocks() → email to subscribers

    report_targets(factor_cls, ...) → email with ranked stocks

    Drawer.draw() → PNG/HTML visualization

    inform(informer, entity_ids, title, ...) → email sent
  replaceable_points:
  - Report scheduling (cron 17:00 mon-fri ↔ intraday)
  - Top count per report (10 ↔ 25 ↔ 50)
  - Report periods (short [1..15] ↔ medium [30,50] ↔ long [365,750])
  - Email group names for categorization
  design_decisions:
  - ref: BD-47
  - ref: BD-51
  acceptance_hints: >
    ✓ Reports scheduled at correct cron times (17:00 weekdays)

    ✓ Email contains entity_ids ranked by factor score

    ✓ Visualization reflects factor values and signals

    ✓ Retry logic handles transient provider errors
data_flow:
  edges:
  - from: stage_1
    to: stage_2
    description: Kdata → Factor/Transformer (OHLCV + volume + turnover)
  - from: stage_1
    to: stage_3
    description: Kdata → get_top_stocks / get_top_volume_entities
  - from: stage_1
    to: stage_4
    description: Kdata → build_feature (MA features) + build_label
  - from: stage_2
    to: stage_3
    description: Factor.result_df → TargetSelector → entity_ids
  - from: stage_3
    to: stage_5
    description: Filtered entity_ids → Trader.entity_ids → handle_factor_targets
  - from: stage_4
    to: stage_5
    description: MLMachine.pred_y → trading signal for position sizing
  - from: stage_5
    to: stage_6
    description: TradingSignal (buy/sell/hold) → SimAccountService fills
  - from: stage_6
    to: stage_7
    description: AccountStats + factor results → Drawer + EmailInformer
  - from: stage_7
    to: stage_1
    description: Report review → potential data refresh / parameter adjustment loop
global_contracts:
  gc_01:
    id: gc_01
    name: Adjusted Price Consistency
    description: >
      All technical factor calculations MUST use the same adjust_type within

      a single backtest run. Mixing hfq and qfq causes MACD and MA values to

      diverge, producing inconsistent signals across stages.
    enforced_by:
    - Factor.__init__() accepts adjust_type parameter
    - SimAccountService stores adjust_type
    - MLMachine.build_kdata() uses configured adjust_type
    test: >
      Run MacdDayTrader with adjust_type=hfq vs qfq on same period →

      GoldCrossFactor signal timestamps MUST differ (historical prices differ).
  gc_02:
    id: gc_02
    name: Temporal Integrity in ML Pipeline
    description: >
      Training/test split MUST be strictly temporal. feature_df and label_ser

      indices must align without look-ahead. Predicting with negative periods

      in pct_change creates forward returns — train/test split at predict_start

      prevents using future information.
    enforced_by:
    - MLMachine.split_data() uses timestamp comparison
    - assert start < predict_start < end
    - feature_df.dropna() applied before label alignment
    test: >
      Add a mock feature that equals future price — model should NOT be able

      to use it if temporal split is correct.
  gc_03:
    id: gc_03
    name: Position Count Limit
    description: >
      At any point, the portfolio MUST NOT exceed max_positions (default 10).

      This is enforced in Trader.handle_factor_targets() by truncating long_targets.
    enforced_by:
    - Trader.handle_factor_targets() truncates to trader.position_manager.max_stocks
    - long_position_control() returns at most 50% per position
    test: >
      Feed 20 targets to MacdDayTrader → verify at most 10 positions opened.
  gc_04:
    id: gc_04
    name: Factor Result Schema Consistency
    description: >
      All Factor.compute_result() MUST populate result_df with column

      'filter_result' (bool/None). Selector relies on this column to determine

      target entities. None entries are treated as False by selectors.
    enforced_by:
    - Factor.compute_result() abstract contract
    - TargetSelector.get_targets() reads result_df['filter_result']
    test: >
      Custom factor returning no 'filter_result' column → Selector raises KeyError.
  gc_05:
    id: gc_05
    name: A-Share Market Microstructure Constraints (Not Enforced)
    description: >
      The following A-share market rules are NOT enforced in the current codebase

      and constitute known gaps. Strategies relying on them will overestimate

      returns. Integrators MUST implement these separately:

      (1) T+1: shares bought cannot be sold same day

      (2) 涨跌停板: price limit halts prevent buys when limit-up, sells when limit-down

      (3) 印花税: 0.05% stamp duty on sell only (not symmetric)

      (4) ST/*ST: 5% daily price limit instead of 10%

      (5) 停牌: suspended stocks cannot execute
    enforced_by: []
    test: >
      Backtest of MACD crossover on newly bought stock same day → trade fills

      even though T+1 rule would prevent it in live trading.
  gc_06:
    id: gc_06
    name: Survivorship Bias Awareness
    description: >
      The system does NOT handle index constituent changes retroactively.

      Backtests using historical stock universe exclude delisted/failed companies,

      inflating returns by estimated 2–5% annually. Integrators should use

      point-in-time universe data for production backtests.
    enforced_by: []
    test: >
      Compare backtest return with/without including known bankrupt stocks →

      returns differ significantly for long holding periods.
business_decisions:
- id: BD-1
  type: M/DK/BA
  content: MACD indicator with standard parameters (slow=26, fast=12, n=9) computing diff, dea, and macd
    histogram
  rationale: Gerald Appel's standard 12/26/9 parameterization captures optimal momentum cycles — 12-day
    EMA for short-term weekly, 26-day (~1 trading month) for longer-term trend. Breaks for crypto/high-frequency
    assets with different natural cycles.
  evidence: src/zvt/factors/algorithm.py:30(MacdTransformer.transform)
  stage: stage_2
- id: BD-2
  type: B/BA
  content: 'Golden cross condition: diff > dea (live == 1) for bullish signal generation'
  rationale: Earliest possible bullish signal when short-term EMA crosses above signal line. Breaks in
    choppy markets with frequent whipsaws.
  evidence: src/zvt/factors/macd/macd_factor.py:56(GoldCrossFactor.compute_result)
  stage: stage_2
- id: BD-3
  type: B/BA
  content: 'Bull market condition: diff > 0 AND dea > 0 for confirmed bullish state'
  rationale: Both MACD lines positive filters weak rallies. Absolute price levels matter — positive MACD
    values indicate price above momentum midpoint. Dead zone near zero causes signal gaps.
  evidence: src/zvt/factors/macd/macd_factor.py:24(BullFactor.compute_result)
  stage: stage_2
- id: BD-4
  type: B/BA
  content: KeepBull factor requires 10 consecutive bullish periods
  rationale: 10-period window (~2 trading weeks) filters transient crossovers. Requires sustained momentum
    for reliability. Too restrictive in fast markets; 5 periods would increase signals at lower quality.
  evidence: src/zvt/factors/macd/macd_factor.py:30(KeepBullFactor.compute_result)
  stage: stage_2
- id: BD-5
  type: B/BA
  content: 'LiveOrDead pattern: pre_live_count <= -5 AND current_live_count >= 1'
  rationale: '[-5, 1] pattern detects bear→bull state transitions via dead zone followed by gold cross.
    Filters noise. Breaks when market oscillates near threshold.'
  evidence: src/zvt/factors/macd/macd_factor.py:46(LiveOrDeadFactor.compute_result)
  stage: stage_2
- id: BD-6
  type: M/BA
  content: 'Fibonacci-based MA windows: [5, 10, 34, 55, 89, 144, 120, 250] for trend detection'
  rationale: Fibonacci sequence appears in market cycles; captures natural price rhythms better than round
    numbers. Not all assets follow Fibonacci cycles (crypto, commodities).
  evidence: src/zvt/factors/ma/ma_factor.py:58(CrossMaFactor.__init__)
  stage: stage_2
- id: BD-7
  type: B/BA
  content: 'VolumeUpMaFactor: price within 15% of MA and volume 2x MA threshold'
  rationale: 15% MA proximity ensures mean-reversion discipline; 2x volume confirms institutional participation.
    In high volatility, price may deviate >15% during valid breakouts.
  evidence: src/zvt/factors/ma/ma_factor.py:193(VolumeUpMaFactor.compute_result)
  stage: stage_2
- id: BD-42
  type: M/BA
  content: Rolling window maximum (window=20) for identifying price tops
  rationale: Local maxima indicate resistance levels. In noisy markets, rolling max produces false resistance.
    20-bar window is empirical.
  evidence: src/zvt/factors/ma/top_bottom_factor.py:23(TopBottomTransformer.transform)
  stage: stage_2
- id: BD-43
  type: M/BA
  content: Rolling window minimum (window=20) for identifying price bottoms
  rationale: Local minima indicate support levels. Same noise sensitivity as rolling max. 20-bar empirical
    window.
  evidence: src/zvt/factors/ma/top_bottom_factor.py:27(TopBottomTransformer.transform)
  stage: stage_2
- id: BD-38
  type: M/BA
  content: Quantile binning with 7 levels [0, 0.1, 0.3, 0.5, 0.7, 0.9, 1.0] for factor scoring
  rationale: Quantile scoring captures cross-sectional relative ranking. Fixed buckets don't adapt to
    distribution changes over time.
  evidence: src/zvt/factors/algorithm.py:311(QuantileScorer.score)
  stage: stage_2
- id: BD-39
  type: M/BA
  content: Percentile ranking scorer with ascending order for cross-sectional comparison
  rationale: Relative ranking (0-100%) captures factor signal better than absolute values. Loses magnitude
    information between ranks.
  evidence: src/zvt/factors/algorithm.py:141(RankScorer.score)
  stage: stage_2
- id: BD-52
  type: M
  content: 'CrossMaTransformer windows: [5, 120, 250] for trend confirmation'
  rationale: 'Multi-timeframe confirmation: short-term (weekly), medium-term (6-month), long-term (yearly)
    trends align to confirm strength.'
  evidence: examples/factors/tech_factor.py:82(CrossMaTransformer)
  stage: stage_2
- id: BD-53
  type: M
  content: Bollinger Bands with window=20 and window_dev=2 using ta.volatility library
  rationale: 2 std captures ~95% of normal price movements. Financial returns have fat tails, so 2-std
    may miss extreme moves.
  evidence: examples/factors/boll_factor.py:13(BollFactor)
  stage: stage_2
- id: BD-10
  type: B/BA
  content: 'GoodCompanyFactor ROE filter: >= 0.02 (2%)'
  rationale: Lenient threshold for capital efficiency screening. ROE can be inflated via financial engineering
    (buybacks, debt changes). 5-10% would be more stringent.
  evidence: src/zvt/factors/fundamental/finance_factor.py:100(GoodCompanyFactor.compute_factor)
  stage: stage_2
- id: BD-11
  type: B/BA
  content: 'GoodCompanyFactor revenue growth filter: >= 0.05 (5%) YoY'
  rationale: Matches or exceeds nominal GDP growth expectation. Revenue growth can be inflated via acquisitions,
    channel stuffing. >=0 would include stable mature companies.
  evidence: src/zvt/factors/fundamental/finance_factor.py:101(GoodCompanyFactor.compute_factor)
  stage: stage_2
- id: BD-12
  type: B/BA
  content: 'GoodCompanyFactor net profit growth filter: >= 0.05 (5%) YoY'
  rationale: Bottom-line growth alongside revenue growth. Profit growth more susceptible to accounting
    manipulation than revenue.
  evidence: src/zvt/factors/fundamental/finance_factor.py:102(GoodCompanyFactor.compute_factor)
  stage: stage_2
- id: BD-13
  type: B/BA
  content: 'GoodCompanyFactor cash flow filter: operating >= 0.1, sales >= 0.3'
  rationale: Cash conversion quality check (10% operating, 30% sales). Industry variation significant
    — uniform thresholds may incorrectly filter capital-intensive sectors.
  evidence: src/zvt/factors/fundamental/finance_factor.py:103(GoodCompanyFactor.compute_factor)
  stage: stage_2
- id: BD-14
  type: B/BA
  content: 'GoodCompanyFactor current ratio filter: >= 1.0'
  rationale: Basic liquidity check. Can be inflated by delaying payables or accelerating receivables.
    Conservative filtering would use >=1.5 or >=2.0.
  evidence: src/zvt/factors/fundamental/finance_factor.py:105(GoodCompanyFactor.compute_factor)
  stage: stage_2
- id: BD-15
  type: B/BA
  content: 'GoodCompanyFactor debt-to-asset ratio filter: <= 0.5'
  rationale: 50% leverage threshold for financial stability margin. Capital-intensive industries (utilities,
    RE) naturally have higher leverage; uniform threshold may exclude valid opportunities.
  evidence: src/zvt/factors/fundamental/finance_factor.py:106(GoodCompanyFactor.compute_factor)
  stage: stage_2
- id: BD-25
  type: B/BA
  content: 'GoodCompanyFactor lookback window: 1095 days (3 years) with 8 qualifying quarters'
  rationale: Sustained fundamental quality over temporary metrics. In rapidly changing industries (tech,
    biotech), 3-year history misses current competitive dynamics.
  evidence: src/zvt/factors/fundamental/finance_factor.py:124(GoodCompanyFactor.compute_factor)
  stage: stage_2
- id: BD-8
  type: B/DK
  content: 'Default turnover threshold: 400,000,000 (4亿) for stock selection'
  rationale: Filters illiquid A-share stocks for execution feasibility. During downturns, quality stocks
    may fall below threshold temporarily. Alternative thresholds (100M/300M/500M) balance liquidity vs
    opportunity.
  evidence: examples/factors/tech_factor.py:44(compute_top_stocks)
  stage: stage_3
- id: BD-9
  type: B/DK
  content: 'Default turnover_rate threshold: 0.02 (2%)'
  rationale: Market-cap-normalized liquidity threshold for A-share retail-dominated markets. Large-cap
    index stocks naturally have lower turnover rates, risking exclusion.
  evidence: examples/factors/tech_factor.py:45(compute_top_stocks)
  stage: stage_3
- id: BD-23
  type: B
  content: 'Periods for top performance: [1, 2, 3, ..., 20] days for rolling analysis'
  rationale: Short-term momentum consistency across 1-20 day windows. Concentrates on short-term alpha
    that decays faster. Doesn't capture value opportunities.
  evidence: src/zvt/api/stats.py:77(get_top_performance_entities_by_periods)
  stage: stage_3
- id: BD-24
  type: B
  content: 'Top entities count: 50 stocks per period'
  rationale: Optimal breadth/concentration balance for A-share retail portfolio sizes. Small-cap strategies
    may struggle to find 50 quality opportunities; large funds may need more.
  evidence: src/zvt/api/stats.py:72(get_top_performance_entities_by_periods)
  stage: stage_3
- id: BD-29
  type: B/DK
  content: 'DragonTigerFactor filter: dep1 == ''机构专用'' for institutional tracking'
  rationale: Domain knowledge for A-share market where '机构专用' labels institutional vs retail flow. Assumes
    institutional activity provides better signals. Some institutional flow not labeled as such.
  evidence: examples/trader/dragon_and_tiger_trader.py:23(DragonTigerFactor)
  stage: stage_3
- id: BD-30
  type: B/BA
  content: 'FollowIITrader: buy when change_ratio > 0.05 (5%), sell when < -0.5 (-50%)'
  rationale: Institutional accumulation (>5%) predicts price movement; -50% sell indicates complete abandonment.
    Slow accumulation may not trigger 5% threshold; -50% sell is aggressive.
  evidence: examples/trader/follow_ii_trader.py:33(FollowIITrader)
  stage: stage_3
- id: BD-31
  type: B/DK
  content: 'Top volume filter: top 30% (pct=0.3) of stocks by volume'
  rationale: A-share volume distribution differs from developed markets due to retail dominance. During
    extremes, even less-liquid stocks may have acceptable absolute volume.
  evidence: examples/trader/keep_run_trader.py:54(KeepRunTrader)
  stage: stage_3
- id: BD-48
  type: B
  content: 'Volume filter lookback: 30 days before target date'
  rationale: ~One trading month captures recent trading patterns without stale data. Fast-changing markets
    may need shorter; anomalous spikes may need longer smoothing.
  evidence: examples/report_utils.py:157(get_top_performance_entities)
  stage: stage_3
- id: BD-49
  type: B
  content: 'Keep run trader interval: 40 days per cycle for rebalancing'
  rationale: ~2 months balances transaction costs vs momentum capture. Optimal interval depends on market
    regime (trending favors longer, mean-reverting favors shorter).
  evidence: examples/trader/keep_run_trader.py:50(KeepRunTrader)
  stage: stage_3
- id: BD-50
  type: B
  content: 'Historical lookback: -50 days for factor start'
  rationale: 50-day lookback ensures sufficient data for MACD (26-day EMA + buffer). Insufficient for
    longer-term factors or weekly/monthly timeframes.
  evidence: examples/trader/macd_day_trader.py:23(MacdDayTrader)
  stage: stage_3
- id: BD-51
  type: B
