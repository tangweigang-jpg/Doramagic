- id: BD-M001
  type: RC/B
  content: T+1 trading constraint missing -当日买入股票无法当日卖出
  rationale: 'A-share market regulation mandates T+1 settlement - stocks bought on day T can only be sold
    on day T+1. This is a hard regulatory constraint that directly affects execution feasibility. The
    current simulation allows same-day round-trip which would be impossible in live trading. The assumption
    that positions can be immediately sold after buying is incorrect for A-shares. Breaking condition:
    Any strategy that relies on same-day exits (day trading, intraday reversal) will show unrealistic
    performance in backtests.'
  evidence: src/zvt/trader/sim_account.py:0(SimAccountService) (missing T+1 tracking)
  stage: trading_execution
  status: missing
  severity: critical
  impact: Backtests will show better liquidity and PnL than reality. Day trades that appear profitable
    would fail execution.
  known_gap: true
- id: BD-M002
  type: B/RC/DK
  content: 涨跌停板 (Price Limit) handling missing - 涨停买不进、跌停卖不出
  rationale: 'A-shares have 10% daily price limits (5% for ST stocks). When a stock hits limit up, buy
    orders cannot execute; when hitting limit down, sell orders cannot execute. This is both a market
    rule and a behavioral pattern that affects strategy execution. The current model assumes all signals
    can execute at market prices without liquidity constraints. The assumption that limit-hit stocks remain
    tradeable is incorrect. Breaking condition: Momentum and breakout strategies frequently encounter
    limit moves - failing to model this leads to significant execution gap between backtest and live results.'
  evidence: src/zvt/trader/sim_account.py:0(order_execution) (missing price limit check)
  stage: trading_execution
  status: missing
  severity: critical
  impact: Backtests will overestimate execution success for breakout and momentum strategies that frequently
    encounter limit moves.
  known_gap: true
- id: BD-M003
  type: B/RC
  content: 印花税 (Stamp Duty) asymmetric treatment missing
  rationale: 'A-share stamp duty is 0.05% on sell only, not on buy. This is a regulatory requirement that
    creates asymmetric transaction costs. The current symmetric 0.1% cost model misrepresents the actual
    cost structure, biasing toward more sells than would occur in reality. The assumption of symmetric
    costs affects strategy profitability and optimal holding periods. Breaking condition: Strategies with
    high turnover will be more affected - the model underestimates sell costs by 0.05%, making high-frequency
    strategies appear more profitable than they would be.'
  evidence: src/zvt/trader/sim_account.py:34(SimAccountService.__init__) (missing asymmetric cost)
  stage: trading_cost
  status: missing
  severity: high
  impact: Backtests will underestimate sell transaction costs and overestimate holding period returns.
  known_gap: true
- id: BD-M004
  type: RC/DK/B
  content: ST/*ST stock handling missing - 涨跌幅5%、退市风险、机构禁入
  rationale: 'ST/*ST stocks in A-shares have 5% daily price limits, face delisting risk, and are excluded
    from many institutional portfolios. This is a market-specific rule (domain knowledge) combined with
    regulatory requirements for institutional investors. The current system treats all stocks uniformly
    with 10% limits. The assumption that ST stocks behave like normal stocks is incorrect for risk management.
    Breaking condition: Backtests including ST stocks will show incorrect price limit calculations, stop-loss
    levels, and strategy eligibility.'
  evidence: src/zvt/domain/meta/stock_meta.py:0(Stock) (missing is_st field)
  stage: risk_management
  status: missing
  severity: high
  impact: Backtests on ST stocks will show incorrect price limit calculations, stop-loss levels, and strategy
    eligibility.
  known_gap: true
- id: BD-M005
  type: B/BA
  content: 除权除息 (Ex-dividend/Right issue) handling incomplete
  rationale: 'Ex-dividend and ex-right dates create price gaps that affect factor calculations. The assumption
    that hfq adjustment is sufficient may break for long-term backtests where dividend dates don''t align
    cleanly with price adjustments. This affects technical indicator continuity around corporate action
    dates. Breaking condition: Long-term backtests may show discontinuous factor values around ex-dates,
    leading to incorrect signal generation and performance attribution.'
  evidence: src/zvt/factors/technical_factor.py:57(TechnicalFactor.__init__) (missing ex_date handling)
  stage: data_adjustment
  status: missing
  severity: medium
  impact: Long-term backtests may show discontinuous factor values around ex-dates, leading to incorrect
    signal generation.
  known_gap: true
- id: BD-M006
  type: B/DK
  content: 停牌 (Trading Halt/Suspension) handling missing
  rationale: 'Stocks can be suspended from trading for various reasons (announcements, investigations,
    regulatory actions). During suspension, no buy or sell orders can execute. This is A-share market
    knowledge that significantly affects execution feasibility. The assumption that all stocks are continuously
    tradeable is incorrect. Breaking condition: Event-driven strategies will generate signals for suspended
    stocks that cannot execute, wasting capital allocation and missing opportunities in other stocks.'
  evidence: src/zvt/domain/meta/stock_meta.py:0(Stock) (missing suspension dates)
  stage: trading_execution
  status: missing
  severity: medium
  impact: Event-driven strategies will generate signals for suspended stocks that cannot execute, wasting
    capital and missing opportunities.
  known_gap: true
- id: BD-M007
  type: B/BA
  content: Survivorship bias from index constituent changes not handled
  rationale: 'Using current index constituents for historical backtests excludes stocks that have been
    removed (due to poor performance or delisting). This creates survivorship bias where historical performance
    appears better than actual because failed stocks are not included. The assumption that the current
    universe was always the same is incorrect. Breaking condition: Backtests will overestimate returns
    by 2-5% annually due to excluding failed stocks from historical analysis - a well-documented bias
    in academic and industry research.'
  evidence: src/zvt/domain/meta/index_meta.py:0(Index) (missing historical constituents)
  stage: backtest_engineering
  status: missing
  severity: high
  impact: Backtests will overestimate returns by 2-5% annually due to excluding failed stocks from historical
    analysis.
  known_gap: true
- id: BD-M008
  type: B/BA
  content: Market impact and liquidity constraint modeling missing
  rationale: 'The system assumes immediate execution at specified prices with fixed slippage. This ignores
    order book dynamics and market depth. For large orders in illiquid stocks, real execution would be
    significantly worse. The assumption that slippage is constant regardless of order size is incorrect.
    Breaking condition: Strategies with concentrated positions in small-cap stocks will show inflated
    returns that cannot be achieved in live trading due to market impact.'
  evidence: src/zvt/trader/sim_account.py:441(cal_amount_by_money) (missing volume-based slippage)
  stage: trading_cost
  status: missing
  severity: medium
  impact: Strategies with concentrated positions in small-cap stocks will show inflated returns that cannot
    be achieved in live trading.
  known_gap: true
