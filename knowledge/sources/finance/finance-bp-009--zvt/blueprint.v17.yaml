  evidence: src/zvt/trader/sim_account.py:26(SimAccountService.__init__)
  stage: simulation_config
  alternative_considered: Dynamic capital based on strategy was rejected for comparability
- id: BD-045
  type: B/DK
  content: 'Report jobs scheduled: stocks at 17:00, blocks at 17:30, HK stocks at
