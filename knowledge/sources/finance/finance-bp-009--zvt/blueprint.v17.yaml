    override, profit targets would wait for normal cycle timing, allowing losses to
    extend beyond thresholds. The amplification means risk management consistently
    dominates signal generation.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Equal priority rejected for risk management philosophy requiring
    immediate loss prevention
- id: BD-124
  type: B/BA
  content: 'INTERACTION: BD-022 × BD-054 → 3-mode adjust type enables continuous backward-adjusted
    prices for accurate analysis'
  rationale: AdjustType defines 3 modes (none, forward, backward) while StockTrader
    defaults to hfq (backward). This ensures continuous price series without dividend
    gaps, enabling accurate return calculation. If adjust_type were bfq or missing,
    technical indicators would show false gaps at dividend dates, corrupting each
    factor computations.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unadjusted prices rejected as insufficient for historical
    comparison in China stock market
- id: BD-125
  type: BA
  content: 'INTERACTION: BD-028 × BD-027 → Asymmetric position control: full short
    liquidation vs graduated long sizing creates long-bias'
  rationale: short_position_control returns 1.0 (100% liquidation on any bearish signal)
    while long_position_control uses tiered scaling (20%/50%/100%). This asymmetry
    reflects a long-bias design philosophy but creates unequal risk treatment. Short
    positions exit immediately while long positions build gradually, potentially leaving
    long exposure during confirmed downtrends.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Symmetric treatment rejected to maintain long-bias risk
    philosophy
- id: BD-126
  type: BA
  content: 'INTERACTION: BD-034 × BD-075 × BD-062 → Conflicting liquidity thresholds
    across factors cause inconsistent universe filtering'
  rationale: VolumeUpMaFactor uses turnover_threshold=300M while BullAndUpFactor uses
    turnover_threshold=400M. Both BD-034 and BD-075 claim to be the authoritative
    liquidity filter, yet BD-062 applies a stricter 400M threshold. Stocks passing
    VolumeUpMa signals may fail BullAndUp signals due to this inconsistency, creating
    unpredictable strategy behavior depending on factor combination.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unified liquidity threshold deferred for factor-specific
    calibration
- id: BD-127
  type: B/RC
  content: 'INTERACTION: BD-069 × BD-083 × BD-037 × BD-081 → MACD parameter cascade:
    standard params feed dual-confirmation bull filter, golden cross, and 10-period
    sustain requirement'
  rationale: Standard MACD (26/12/9) feeds BullFactor (diff>0 AND dea>0), which feeds
    GoldCrossFactor (triple confirmation), which feeds KeepBullFactor (10 consecutive).
    This cascade means MACD parameter changes ripple through 4 signal generation layers,
    amplifying effect. A MACD signal requires 10+ consecutive bullish readings to
    trigger KeepBull entry.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Single-layer MACD signal rejected for excessive false positives
- id: BD-128
  type: B/BA
  content: 'INTERACTION: BD-073 × BD-074 × BD-033 → Combined VolumeUpMaFactor: 10-15%
    MA proximity AND 2x volume AND 2% turnover creates triple-filter breakout quality'
  rationale: 'Price within 10-15% of MA (BD-073), volume > 2x average (BD-074), and
    turnover > 300M + 2% rate (BD-033/034) must ALL pass. These conditions amplify
    each other: price proximity prevents overextended entries, volume confirmation
    validates institutional interest, and liquidity thresholds ensure execution feasibility.
    Weakening any condition increases false signals exponentially.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Single-condition breakout rejected for high false positive
    rate
- id: BD-129
  type: BA
  content: 'INTERACTION: BD-107 × BD-116 → Transformer-before-Accumulator ordering
    enables stateful rolling computations across batches'
  rationale: 'Transformer must complete before Accumulator processes (BD-107), and
    Accumulator maintains per-entity state across batches (BD-116). This hidden dependency
    means: (1) raw data flows through transformation first, (2) transformed pipe_df
    feeds accumulator, (3) accumulator state persists between batches. Reversing the
    order or failing to persist state would corrupt rolling window calculations.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Stateless design rejected; stateful approach required for
    rolling computations
- id: BD-130
  type: B
  content: 'INTERACTION: BD-100 × BD-098 × BD-099 → Transaction costs reduce effective
    profit rates for both portfolio and position levels'
  rationale: '0.3% round-trip cost (BD-100: 0.1% buy + 0.1% sell + 0.1% slippage)
    directly reduces profit calculations at both account level (BD-098: all_value
    - input_money) and position level (BD-099: close - avg_cost). Every profitable
    trade must recover 0.3% in costs before generating real gains. In backtesting
    without realistic costs, strategies appear significantly more profitable.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Variable costs deferred for lack of market impact data
- id: BD-GAP-001
  type: B/BA
  content: Default sleeping_time=2 seconds for external data sources (HK stocks, dragon_tiger)
    vs sleeping_time=0 for domestic A-share kline data
  rationale: Hong Kong market data sources require longer delays to avoid rate limiting;
    domestic A-share providers (em) can tolerate higher throughput. Breaks when running
    mixed workloads or when external source APIs change rate limits.
  evidence: examples/data_runner/trading_runner.py:25(record_dragon_tiger)
  stage: trading_execution
  alternative_considered: Adaptive rate limiting based on 429 responses
- id: BD-GAP-002
  type: B
  content: QMT broker integration uses session-based authentication with explicit
    session_id management
  rationale: QMT API requires persistent session for order execution; session_id allows
    connection pooling and reconnection. Breaks when QMT server restarts or network
    interruptions occur without session refresh.
  evidence: src/zvt/broker/qmt/qmt_account.py:108(__init__)
  stage: trading_execution
  alternative_considered: Full reconnect with state reinitialization
- id: BD-GAP-003
  type: T
  content: Entity ID conversion layer (_to_qmt_code, _to_zvt_entity_id) normalizes
    codes between QMT format and ZVT internal format
  rationale: QMT uses exchange-prefixed codes (SH600000) while ZVT uses normalized
    entity_ids; bidirectional conversion enables interoperability. Breaks when QMT
    code format changes or new exchanges are added.
  evidence: src/zvt/broker/qmt/qmt_quote.py:32(_to_qmt_code)
  stage: integration
  alternative_considered: Direct code mapping tables
- id: BD-GAP-004
  type: B/BA
  content: Default include_bj=True for stock enumeration includes Beijing Stock Exchange
    listings
  rationale: Beijing Exchange (北交所) became active in 2021; including it by default
    ensures complete market coverage. Breaks for historical data before 2021 where
    BJ stocks didn't exist.
  evidence: src/zvt/broker/qmt/qmt_quote.py:89(get_qmt_stocks)
  stage: data_collection
  alternative_considered: Parameter-driven date filtering
- id: BD-GAP-005
  type: B/BA
  content: AdjustType.qfq (前复权) set as default for kdata retrieval, normalizing prices
    for dividend adjustments
  rationale: Forward adjustment (qfq) is preferred for technical analysis as it maintains
    continuous price series. Breaks when users need unadjusted prices or backward
    adjustment (hfq) for specific calculations.
  evidence: src/zvt/broker/qmt/qmt_quote.py:163(get_kdata)
  stage: data_storage
  alternative_considered: Pass-through raw prices with separate adjustment layer
- id: BD-GAP-006
  type: B/BA
  content: PositionOverflowError exception with Chinese message '超出仓位限制' hardcoded
    as default
  rationale: Error messages in Chinese align with domestic user base but create internationalization
    issues. Breaks when integrating with English-only monitoring systems.
  evidence: src/zvt/broker/qmt/errors.py:14(__init__)
  stage: error_handling
  alternative_considered: Error code enumeration with translation layer
- id: BD-GAP-007
  type: B/BA
  content: China A-shares use T+1 trading settlement (one day settlement delay) vs
    Hong Kong T+0
  rationale: Regulatory requirement in mainland China prevents same-day selling of
    purchased stocks; HK market allows real-time settlement. Breaks in unified trading
    logic that assumes consistent settlement across markets.
  evidence: src/zvt/domain/meta/stockhk_meta.py:25(get_trading_t)
  stage: business_logic
  alternative_considered: Market-specific trading rules engine
- id: BD-GAP-008
  type: T
  content: Mixin-based inheritance pattern for domain models separates schema definition
    from mixin behavior
  rationale: Allows reusable behaviors (KdataBase, StockKdataCommon) to be composed
    with entity schemas; enables consistent interfaces across asset classes. Breaks
    when mixin ordering matters or diamond inheritance occurs.
  evidence: src/zvt/domain/quotes/stock/stock_1d_kdata.py:11(module)
  stage: architecture
  alternative_considered: Composition over inheritance
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/zvt/domain/quotes/stock/stock_1d_kdata.py'
- id: BD-GAP-009
  type: B/BA
  content: Email informer batches messages with sub_size=20 to avoid provider limits
  rationale: SMTP providers often limit single message recipients or size; batching
    ensures reliable delivery. Breaks when sub_size threshold causes incomplete message
    delivery.
  evidence: src/zvt/informer/informer.py:166(send_message)
  stage: trading_execution
  alternative_considered: Message queue with guaranteed delivery
- id: BD-GAP-010
  type: B
  content: WeChat informer uses OAuth token refresh mechanism with persistent token
    management
  rationale: WeChat access tokens expire periodically; refresh_token maintains continuous
    operation. Breaks when refresh token expires or account permissions change.
  evidence: src/zvt/informer/informer.py:108(refresh_token)
  stage: trading_execution
  alternative_considered: Webhook-based alternatives
- id: BD-GAP-011
  type: B/BA
  content: Lunar calendar support (ZhDate) limited to 1900-2100 range for Chinese
    zodiac calculations
  rationale: Markets don't require dates outside this range; constraining simplifies
    calculation tables. Breaks for historical analysis of pre-1900 financial data
    or future projections beyond 2100.
  evidence: src/zvt/misc/zhdate.py:248(month_days)
  stage: business_logic
  alternative_considered: Dynamic lunar calendar calculation algorithms
- id: BD-GAP-012
  type: B/DK
  content: Finance data recorders use 5-second sleeping_time between requests with
    timestamps-based pagination
  rationale: Eastmoney finance API is slower than market data endpoints; 5s delay
    prevents IP blocking. Breaks when network latency varies significantly or API
    rate limits change.
  evidence: src/zvt/recorders/eastmoney/finance/base_china_stock_finance_recorder.py:44(__init__)
  stage: trading_execution
  alternative_considered: Adaptive delays based on response status
- id: BD-GAP-013
  type: B/BA
  content: JoinQuant recorders use force_update=True by default for metadata synchronization
  rationale: Ensures latest listings and delistings are captured; metadata changes
    affect entire data pipeline. Breaks when frequent force updates cause API quota
    exhaustion.
  evidence: src/zvt/recorders/joinquant/meta/jq_stock_meta_recorder.py:18(__init__)
  stage: data_collection
  alternative_considered: Change-point detection for metadata updates
- id: BD-GAP-014
  type: B/BA
  content: ZenFactor accumulator uses acc_window=1 default for state tracking in Zhongshu
    (Chan) pattern analysis
  rationale: Single-window lookback matches classic Chan trading theory; minimal state
    reduces memory footprint. Breaks for multi-timeframe analysis or longer-term pattern
    recognition.
  evidence: src/zvt/factors/zen/base_factor.py:622(__init__)
  stage: algorithm
  alternative_considered: Volatility-adjusted window sizes
- id: BD-GAP-015
  type: B/DK
  content: Exchange ETF recorder uses sleeping_time=10.0 seconds, highest among each
    recorders
  rationale: Exchange API has stricter rate limits; 10s delay ensures compliance.
    Breaks when running ETF-specific strategies requiring frequent updates.
  evidence: src/zvt/recorders/exchange/exchange_etf_meta_recorder.py:21(__init__)
  stage: trading_execution
  alternative_considered: Burst download with cooldown periods
- id: BD-GAP-016
  type: T
  content: Block money flow uses entity_id as primary category field, enabling sector-based
    aggregation
  rationale: Industry blocks represent correlated assets; category_field='entity_id'
    enables intra-block analysis. Breaks when block membership changes over time.
  evidence: src/zvt/domain/misc/money_flow.py:14(BlockMoneyFlow)
  stage: data_storage
  alternative_considered: Time-series block membership table
- id: BD-GAP-017
  type: B/BA
  content: OrderByType enum defines fixed sort directions without null handling preferences
  rationale: Simple ascending/descending covers most use cases; nulls_first/nulls_last
    omitted for simplicity. Breaks when data contains nulls in timestamp or numeric
    fields.
  evidence: src/zvt/common/query_models.py:9(OrderByType)
  stage: data_storage
  alternative_considered: Three-state enum with null options
- id: BD-GAP-018
  type: T
  content: Domain ID generation includes original data for deduplication across entity
    types
  rationale: Ensures unique identifiers when same event (e.g., dividend) appears in
    multiple entity contexts. Breaks when original data format changes.
  evidence: src/zvt/recorders/eastmoney/trading/eastmoney_manager_trading_recorder.py:28(generate_domain_id)
  stage: data_storage
  alternative_considered: Synthetic ID with lookup table
- id: BD-GAP-019
  type: B/BA
  content: fix_duplicate_way='add' default behavior adds duplicates instead of skipping
    or replacing
  rationale: Conservative approach preserves each data points; alternative would silently
    overwrite. Breaks when duplicates accumulate, causing inflated counts or incorrect
    aggregates.
  evidence: src/zvt/recorders/eastmoney/finance/base_china_stock_finance_recorder.py:44(__init__)
  stage: data_collection
  alternative_considered: Hash-based deduplication with logging
- id: BD-GAP-020
  type: T
  content: DragonTigerFactor inherits from TechnicalFactor and uses drawer_annotation_df
    for visualization
  rationale: Reuses factor infrastructure for dragon-tiger list analysis; drawer pattern
    enables chart generation. Breaks when factor interface changes affect visualization
    pipeline.
  evidence: src/zvt/research/top_dragon_tiger.py:38(__init__)
  stage: analysis
  alternative_considered: Separate visualization module
