  rationale: 'StandardScaler normalization ensures features contribute equally, preventing
    scale dominance. SGD with max_iter=1000 and tol=1e-3 balances convergence speed
    with training time. This regularization boundary affects model generalization:
    too few iterations underfits, too many overfits.'
  evidence: src/zvt/ml/ml.py:230(module)
  stage: ml_config
  alternative_considered: Cross-validation for early stopping was deferred for complexity
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/zvt/ml/ml.py'
- id: BD-043
  type: B/BA
  content: 'predict_steps=20: prediction horizon is 20 bars ahead'
  rationale: 20-bar prediction horizon (~20 trading days = 1 month) balances short-term
