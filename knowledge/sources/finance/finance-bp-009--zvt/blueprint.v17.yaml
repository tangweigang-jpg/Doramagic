id: finance-bp-009
name: ZVT
sop_version: '3.6'
source:
  projects:
  - zvt
  commit_hash: f971f00c2181bc7d7fb7987a7875d4ec5960881a
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: algorithmic trading system with backtesting and factor-based signal generation
  description: ZVT is a Python framework for Chinese stock market data collection,
    factor computation, and trading strategy backtesting with interactive visualization.
  prerequisites: Users need Python 3.x, understanding of stock market concepts, pandas
    DataFrames, and SQLAlchemy basics. Familiarity with technical indicators (MA,
    MACD) helpful.
  not_suitable_for: Real-time trading execution with broker integration, non-Chinese
    markets (currently focused on China stocks via eastmoney/jqka/em/sina/joinquant),
    high-frequency trading requiring sub-second execution
stages:
- id: data_collection
  name: Data Collection (Recording)
  order: 1
  responsibility: Fetch market data from external providers (eastmoney, jqka, em,
    sina, joinquant) and persist to storage. Handles incremental updates via timestamp
    evaluation and entity filtering.
  interface:
    inputs: External API endpoints (urls, params), Entity definitions (Stock, Index,
      etc.)
    outputs: Domain objects (Stock1dKdata, BalanceSheet, etc.) persisted to SQLite
  required_methods:
  - name: TimeSeriesDataRecorder.record
    description: Fetches time-series data with incremental update logic by comparing
      against latest saved record to avoid re-fetching
    evidence: src/zvt/contract/recorder.py:245(TimeSeriesDataRecorder)
  - name: FixedCycleDataRecorder.record
    description: Records fixed-cycle data (klines) with trading minute calculation
      for OHLCV data
    evidence: src/zvt/contract/recorder.py:612(FixedCycleDataRecorder)
  - name: Recorder.evaluate_start_end_size_timestamps
    description: Determines incremental fetch range by comparing to get_latest_saved_record
      to avoid duplicate downloads
    evidence: src/zvt/contract/recorder.py:303(evaluate_start_end_size_timestamps)
  - name: Recorder.get_data_map
    description: Transforms provider-specific field names to uniform domain schema
      for provider-agnostic recording
    evidence: src/zvt/contract/recorder.py:329(get_data_map)
  key_behaviors:
  - behavior: State persistence across restarts
    description: Recorder inherits OneStateService for simple run/stop state that
      survives process restarts, enabling interrupted recording sessions to resume
    evidence: src/zvt/contract/recorder.py:91(Recorder)
  - behavior: Incremental data fetching
    description: Only fetches new data since last saved record by evaluating timestamp
      ranges, avoiding redundant API calls and reducing bandwidth
    evidence: src/zvt/contract/recorder.py:303(evaluate_start_end_size_timestamps)
  - behavior: Provider field transformation
    description: Different APIs return different field names; get_data_map transforms
      responses to uniform domain schema
    evidence: src/zvt/contract/recorder.py:329(get_data_map)
  replaceable_points:
  - name: record()
    description: Implement fetching logic for specific API
    options:
    - name: request-based
      traits:
      - synchronous HTTP calls
      - blocking I/O
      - simple implementation
      fit_for:
      - batch data collection
      - historical backfills
      - low-frequency updates
      not_fit_for:
      - real-time streaming
      - high-frequency data
      - large-scale parallel fetching
    - name: websocket-based
      traits:
      - asynchronous
      - persistent connection
      - real-time capable
      fit_for:
      - real-time market data
      - streaming quotes
      - live trading signals
      not_fit_for:
      - historical data retrieval
      - behind firewall restrictions
      - simple batch operations
    - name: file-based
      traits:
      - local file import
      - batch processing
      - offline capable
      fit_for:
      - importing third-party datasets
      - CSV/Excel feeds
      - preprocessed data
      not_fit_for:
      - live data
      - real-time requirements
      - dynamic data sources
    default: request-based
  - name: generate_domain()
    description: Transform API response to domain object
    options:
    - name: custom per provider
      traits:
      - provider-specific mapping
      - field name translation
      - schema alignment
      fit_for:
      - handling provider quirks
      - legacy API compatibility
      - non-standard formats
      not_fit_for:
      - standardized APIs
      - shared schemas across providers
      - unified data models
    default: custom per provider
  design_decisions:
  - 'Recorder inherits OneStateService for single-state persistence: src/zvt/contract/recorder.py:91(Recorder)
    — Recorders need simple run/stop state that survives restarts'
  - 'evaluate_start_end_size_timestamps determines incremental fetch range: src/zvt/contract/recorder.py:303(evaluate_start_end_size_timestamps)
    — Avoids re-fetching already-saved data by comparing to get_latest_saved_record'
  - 'Provider-agnostic recording via get_data_map for field transformation: src/zvt/contract/recorder.py:329(get_data_map)
    — Different APIs return different field names; mapping allows uniform domain schema'
  acceptance_hints:
  - Recorded data appears in SQLite database at expected provider path
  - Incremental runs only fetch new records, not full history
  - Entity IDs follow {entity_type}_{exchange}_{code} format after recording
- id: data_storage
  name: Data Storage
  order: 2
  responsibility: Persist domain schemas to provider-specific SQLite databases with
    path templating and session management.
  interface:
    inputs: Domain DataFrames with schema columns, Provider identifier
    outputs: SQLite files at {data_path}/{provider}/{provider}_{db_name}.db
  required_methods:
  - name: Mixin.query_data
    description: Uniform query interface using provider_index to select storage backend
      for multi-provider schemas
    evidence: src/zvt/contract/schema.py:127(query_data)
  - name: Mixin.record_data
    description: Persist DataFrame to storage via df_to_db using the schema's defined
      database path
    evidence: src/zvt/contract/schema.py:34(Mixin)
  - name: StorageBackend.get_engine
    description: Create SQLAlchemy engine for storage with configurable connection
      pooling and dialect
    evidence: src/zvt/contract/storage.py:38(StorageBackend)
  key_behaviors:
  - behavior: Storage abstraction layer
    description: StorageBackend interface cleanly decouples domain logic from physical
      storage; SQLite is default but interface enables future cloud storage
    evidence: src/zvt/contract/storage.py:38(StorageBackend)
  - behavior: Path templating with backward compatibility
    description: _get_path_template allows migration from old provider/ dir structure
      via old_db_to_provider_dir in init_env
    evidence: src/zvt/contract/storage.py:83(_get_path_template)
  - behavior: One database per domain type
    description: db_name derived from data_schema __tablename__ to avoid schema conflicts
      between different entity types
    evidence: src/zvt/contract/api.py:37(_get_db_name)
  replaceable_points:
  - name: get_engine()
    description: Create SQLAlchemy engine for storage
    options:
    - name: SQLite
      traits:
      - file-based
      - zero-configuration
      - single-user
      fit_for:
      - local development
      - backtesting
      - single-machine deployment
      not_fit_for:
      - multi-user access
      - high concurrency
      - cloud deployment
    - name: PostgreSQL
      traits:
      - ACID compliant
      - full-text search
      - JSON support
      fit_for:
      - production deployment
      - multi-user scenarios
      - cloud-native
      not_fit_for:
      - simple local testing
      - single-user backtesting
      - minimal setup
    - name: MySQL
      traits:
      - widely supported
      - high performance
      - replication
      fit_for:
      - production systems
      - high read throughput
      - managed cloud databases
      not_fit_for:
      - complex transactions
      - local experimentation
      - simple prototyping
    default: SQLite
  - name: data_schema
    description: Domain schema (Stock, Index, etc.)
    options:
    - name: any Mixin subclass
      traits:
      - schema-on-read
      - declarative models
      - provider-agnostic
      fit_for:
      - standard entities
      - custom domains
      - extensible schemas
      not_fit_for:
      - non-tabular data
      - binary formats
      - non-relational storage
    default: domain schemas
  design_decisions:
  - 'StorageBackend abstraction enables future cloud storage: src/zvt/contract/storage.py:38(StorageBackend)
    — Interface cleanly separates concerns; SQLite is default but not mandated'
  - 'Path template allows migration from old provider/ dir structure: src/zvt/contract/storage.py:83(_get_path_template)
    — Backward compatibility with old_db_to_provider_dir in init_env'
  - 'db_name derived from data_schema __tablename__: src/zvt/contract/api.py:37(_get_db_name)
    — One database per domain type; avoids schema conflicts'
  acceptance_hints:
  - DataFrames with MultiIndex (entity_id, timestamp) are correctly stored and retrievable
  - Query results match stored records byte-for-byte
  - Multiple providers can store same entity type in separate databases
- id: factor_computation
  name: Factor Computation
  order: 3
  responsibility: Transform price/volume data into trading signals using technical
    indicators, scoring, and target selection.
  interface:
    inputs: Kdata (OHLCV DataFrames indexed by timestamp), Factor parameters (windows,
      thresholds)
    outputs: Trading signals (positive/negative scores), target lists
  required_methods:
  - name: Factor.compute
    description: Main computation method using Transformer (stateless) or Accumulator
      (stateful) to transform kdata into factor signals
    evidence: src/zvt/contract/factor.py:188(Factor)
  - name: Factor.compute_result
    description: Business logic for scoring and targeting; returns buy/sell signals
      based on factor values
    evidence: src/zvt/contract/factor.py:475(order_type_flag)
  - name: Factor.load_data
    description: Loads kdata via DataReader interface for uniform data access across
      factors and other readers
    evidence: src/zvt/contract/factor.py:188(Factor)
  key_behaviors:
  - behavior: EntityStateService per-factor state
    description: Accumulators maintain entity-specific state dict across batches for
      rolling calculations; must be persisted/restored between compute cycles
    evidence: src/zvt/contract/base_service.py:87(EntityStateService)
  - behavior: Transformer transforms BEFORE Accumulator
    description: 'Fixed execution order: data_df → pipe_df (Transformer) → factor_df
      (Accumulator). Swapping would break each factors using both'
    evidence: src/zvt/contract/factor.py:403(transform), :409(accumulator)
  - behavior: fill_gap ensures continuity
    description: Missing timestamps filled with ffill before computing to ensure rolling
      windows work correctly on sparse data
    evidence: src/zvt/contract/factor.py:499(fill_gap)
  - behavior: DataFrame MultiIndex convention
    description: Every time-series DataFrames use level[0]=entity_id, level[1]=timestamp;
      breaking this structure breaks transformer/accumulator batch processing
    evidence: src/zvt/contract/factor.py:502(MultiIndex from_product)
  replaceable_points:
  - name: transformer
    description: Stateless data transformation
    options:
    - name: MaTransformer
      traits:
      - Fibonacci windows [5,10,34,55,89,144,120,250]
      - change_pct option
      - stateless
      fit_for:
      - moving average crossover strategies
      - trend following
      - multi-timeframe analysis
      not_fit_for:
      - momentum indicators
      - volume-based signals
      - mean reversion
    - name: MacdTransformer
      traits:
      - MACD/Signal/MACD Histogram
      - normal/count_live_dead modes
      - stateless
      fit_for:
      - momentum strategies
      - trend reversal detection
      - divergence analysis
      not_fit_for:
      - range-bound markets
      - volume analysis
      - multi-window MA
    - name: Custom Transformer
      traits:
      - user-defined transformation
      - stateless
      - plug-and-play
      fit_for:
      - proprietary indicators
      - custom algorithms
      - experimental strategies
      not_fit_for:
      - standard indicators
      - production systems without testing
      - shared libraries
    default: MaTransformer
  - name: accumulator
    description: Stateful rolling computation
    options:
    - name: MaStatsAccumulator
      traits:
      - rolling statistics
      - stateful across batches
      - per-entity state
      fit_for:
      - rolling mean/std calculations
      - cumulative metrics
      - multi-batch indicators
      not_fit_for:
      - stateless calculations
      - single-batch indicators
      - simple transformations
    - name: Custom Accumulator
      traits:
      - user-defined state management
      - stateful
      - persistence required
      fit_for:
      - proprietary stateful algorithms
      - rolling windows with complex logic
      - custom indicators
      not_fit_for:
      - simple stateless calculations
      - pure transformations
      - indicators without memory
    default: None
  - name: compute_result()
    description: Business logic for scoring/targeting
    options:
    - name: CrossMaFactor
      traits:
      - MA crossover signals
      - Golden/Death cross detection
      - standard technical
      fit_for:
      - trend-following strategies
      - swing trading
      - multi-timeframe MA systems
      not_fit_for:
      - mean reversion
      - momentum
      - volume-based selection
    - name: BullFactor
      traits:
      - bull market detection
      - strength scoring
      - momentum-based
      fit_for:
      - market regime filtering
      - long-only strategies
      - bull market timing
      not_fit_for:
      - bear market strategies
      - short selling
      - market-neutral
    - name: Custom Factor
      traits:
      - user-defined logic
      - TechnicalFactor inheritance
      - extensible
      fit_for:
      - proprietary strategies
      - custom signals
      - experimental approaches
      not_fit_for:
      - standard strategies
      - production without validation
      - shared frameworks
    default: Inherit from TechnicalFactor
  design_decisions:
  - 'Factor inherits DataReader for uniform data access pattern: src/zvt/contract/factor.py:188(Factor)
    — Same data loading interface for factors and other readers; enables composition'
  - 'EntityStateService per-factor state for rolling computations: src/zvt/contract/base_service.py:87(EntityStateService)
    — Accumulators need entity-specific state that persists across compute cycles'
  - 'factor_schema optional for Factor; enables dynamic schema creation: src/zvt/contract/factor.py:192(factor_schema)
    — get_ma_factor_schema generates schemas like Stock1dMaFactor dynamically'
  - 'fill_gap fills missing timestamps with ffill before computing: src/zvt/contract/factor.py:499(fill_gap)
    — Ensures continuity for rolling windows on sparse data'
  - 'profit_threshold tuple (positive, negative) encodes business rule: src/zvt/trader/trader.py:247(on_profit_control)
    — Default (3, -0.3) means 300% take-profit or 30% stop-loss'
  acceptance_hints:
  - Factor outputs match expected schema with entity_id+timestamp MultiIndex
  - 'filter_result column semantics: True=BUY, False=SELL, None=NO ACTION'
  - Stateful accumulators produce consistent results across multiple compute() calls
- id: target_selection
  name: Target Selection
  order: 4
  responsibility: Combine multiple factors to select trading candidates with threshold-based
    filtering.
  interface:
    inputs: List of Factor instances, Threshold parameters (long_threshold, short_threshold)
    outputs: Filtered entity_ids for long/short positions
  required_methods:
  - name: TargetSelector.add_factor
    description: Register factor instances to be combined; TargetSelector owns factor
      list for decoupled composition
    evidence: src/zvt/factors/target_selector.py:84(add_factor)
  - name: TargetSelector.get_targets
    description: Returns entity_ids filtered by threshold at specific timestamp, enabling
      historical backtesting
    evidence: src/zvt/factors/target_selector.py:131(get_targets)
  key_behaviors:
  - behavior: AND/OR combination modes
    description: TargetSelector uses accumulate() with AND/OR operators for multi-factor
      filtering; adding new SelectMode requires modifying accumulate pattern
    evidence: src/zvt/factors/target_selector.py:121-124(SelectMode.condition_and/or)
  - behavior: Timestamp-specific filtering
    description: get_targets filters by threshold at specific timestamp for historical
      backtesting accuracy
    evidence: src/zvt/factors/target_selector.py:131(get_targets)
  replaceable_points:
  - name: select_mode
    description: How to combine factor results
    options:
    - name: condition_and
      traits:
      - each factors must signal
      - stricter filtering
      - reduced false positives
      fit_for:
      - conservative strategies
      - high-confidence signals
      - multi-factor confirmation
      not_fit_for:
      - single-factor strategies
      - high recall requirements
      - fast-moving markets
    - name: condition_or
      traits:
      - any factor signals
      - looser filtering
      - higher recall
      fit_for:
      - opportunistic strategies
      - high recall
      - diversified signals
      not_fit_for:
      - conservative strategies
      - avoiding false positives
      - tight capital control
    default: condition_and
  design_decisions:
  - 'TargetSelector owns factor list; factors registered via add_factor(): src/zvt/factors/target_selector.py:84(add_factor)
    — Decoupled composition; traders can customize factor combinations'
  - 'get_targets returns entity_ids filtered by threshold at specific timestamp: src/zvt/factors/target_selector.py:131(get_targets)
    — Timestamp-specific filtering enables historical backtesting'
  acceptance_hints:
  - Multiple factors combined correctly produce filtered entity lists
  - AND mode returns intersection, OR mode returns union of factor results
  - Threshold filtering at specific timestamps produces expected target counts
- id: trading_execution
  name: Trading Execution
  order: 5
  responsibility: Execute buy/sell orders based on factor signals with position sizing,
    profit control, and account simulation.
  interface:
    inputs: Target entity_ids from factors, Trading signals (TradingSignalType)
    outputs: Order records, position updates, account stats
  required_methods:
  - name: Trader.run
    description: Main trading loop that calls sell() before buy() (required ordering),
      processes factor targets, and generates TradingSignals
    evidence: src/zvt/trader/trader.py:26(Trader)
  - name: Trader.sell
    description: Closes positions for holdings that match short targets; must be called
      before buy() to update available_long correctly
    evidence: src/zvt/trader/trader.py:266(sell)
  - name: Trader.buy
    description: Opens positions for targets not currently held; ignores entities
      already in position to prevent duplicate orders
    evidence: src/zvt/trader/trader.py:295(buy)
  - name: Trader.on_profit_control
    description: Triggers sell before regular target selection based on profit_threshold
      (default +3% take profit, -0.3% stop loss)
    evidence: src/zvt/trader/trader.py:247(on_profit_control)
  key_behaviors:
  - behavior: sell() BEFORE buy() ordering contract
    description: sell() filters by available_long, buy() ignores positions already
      held. Running buy() before sell() causes duplicate positions or missing closes
    evidence: src/zvt/trader/trader.py:266(sell), :295(buy); src/zvt/trader/sim_account.py:400(available_long
      check)
  - behavior: Delayed signal execution via loop iteration
    description: due_timestamp = happen_timestamp + level.to_second() for delayed
      execution; signal executes at next kdata interval
    evidence: src/zvt/trader/trader.py:283(due_timestamp)
  - behavior: Tiered position sizing
    description: 'long_position_control() 3-tier default: no positions→20%, 1-10 positions→50%,
      >10 positions→100% allocation'
    evidence: src/zvt/trader/trader.py:229(long_position_control), :281(position_pct
      = 1.0/len * position_pct)
  - behavior: TradingSignal XOR enforcement
    description: TradingSignal requires EXACTLY ONE of position_pct/order_money/order_amount;
      passing multiple or zero causes assertion failure
    evidence: src/zvt/trader/__init__.py:68(len([x for x in...]) != 1 then assert
      False)
  replaceable_points:
  - name: init_factors()
    description: Override to customize factor initialization
    options:
    - name: Custom factors
      traits:
      - user-defined factors
      - custom logic
      - full control
      fit_for:
      - proprietary strategies
      - research-based factors
      - experimental approaches
      not_fit_for:
      - standard strategies
      - quick prototyping
      - beginners
    - name: TargetSelector-based
      traits:
      - multi-factor combination
      - AND/OR modes
      - threshold filtering
      fit_for:
      - composite strategies
      - factor diversification
      - balanced approaches
      not_fit_for:
      - single-factor strategies
      - simple buy-and-hold
      - minimal customization
    default: Subclass returns factor list
  - name: on_factor_targets_filtered()
    description: Override to add custom target filtering
    options:
    - name: Custom filter logic
      traits:
      - user-defined rules
      - post-factor filtering
      - additional criteria
      fit_for:
      - risk management rules
      - liquidity filters
      - custom constraints
      not_fit_for:
      - default behavior
      - simple strategies
      - backtesting only
    default: None
  - name: long_position_control()
    description: Position sizing strategy
    options:
    - name: Fixed tiered pct
      traits:
      - 20%/50%/100% tiers
      - conservative sizing
      - Chinese market rules
      fit_for:
      - risk-averse traders
      - compliance with position limits
      - standard strategies
      not_fit_for:
      - aggressive allocation
      - Kelly criterion
      - dynamic sizing
    - name: Kelly criterion
      traits:
      - mathematical optimal
      - win-rate based
      - aggressive sizing
      fit_for:
      - optimal growth
      - mathematically inclined
      - high win-rate strategies
      not_fit_for:
      - high volatility
      - low win-rates
      - conservative risk management
    - name: Custom
      traits:
      - user-defined sizing
      - any algorithm
      - full flexibility
      fit_for:
      - proprietary sizing
      - research-based
      - experimental allocation
      not_fit_for:
      - standard strategies
      - beginners
      - quick deployment
    default: Fixed tiered pct
  design_decisions:
  - 'due_timestamp = happen_timestamp + level.to_second() for delayed execution: src/zvt/trader/trader.py:283(due_timestamp)
    — Signals execute at next kdata interval; enables real-time simulation'
  - 'long_position_control defaults to 20% if no positions, 50% if <=10 positions:
    src/zvt/trader/trader.py:229(long_position_control) — Conservative position sizing;
    Chinese market 20% rule encoded as default'
  - 'profit_threshold triggers sell before regular target selection: src/zvt/trader/trader.py:247(on_profit_control)
    — Profit-taking has priority over new signals; risk management'
  - 'rich_mode=True enables tracking positions with current prices: src/zvt/trader/sim_account.py:37(rich_mode)
    — Rich mode for backtesting; disabled for minimal mode'
  - 'buy/sell methods only affect holdings not in current position: src/zvt/trader/trader.py:266(buy)
    — ignore_in_position prevents duplicate orders for same entity'
  acceptance_hints:
  - Sell orders execute before buy orders in each trading cycle
  - Position sizing respects 20%/50%/100% tiered defaults
  - Profit control (+3%/-0.3%) triggers sells before normal target selection
  - TradingSignal exactly one of position_pct/order_money/order_amount
- id: visualization
  name: Visualization
  order: 6
  responsibility: Render kdata, factors, and trading results as interactive charts
    using Plotly.
  interface:
    inputs: Kdata DataFrames, Factor result DataFrames, Annotation DataFrames
    outputs: Plotly figures (kline, bar, scatter, annotations)
  required_methods:
  - name: Drawer.draw
    description: Main drawing method combining main chart, factor charts, and sub
      plots into Plotly figures
    evidence: src/zvt/contract/drawer.py:407(Drawer)
  - name: Drawer.drawer_rects
    description: Override to customize Rect annotations for entry/exit markers; traders
      use for trading signals
    evidence: src/zvt/contract/drawer.py:289(drawer_rects)
  - name: Drawer.drawer_sub_col_chart
    description: Enable volume bars below kline for standard candlestick+volume layout
    evidence: src/zvt/contract/drawer.py:292(drawer_sub_col_chart)
  key_behaviors:
  - behavior: Drawable interface for data sources
    description: Factors and readers implement Drawable interface for consistent chart
      rendering across data types
    evidence: src/zvt/contract/drawer.py:231(Drawable)
  - behavior: Flexible annotation system
    description: drawer_rects override in subclass for custom Rect annotations; enables
      entry/exit markers for trading signals
    evidence: src/zvt/contract/drawer.py:289(drawer_rects)
  replaceable_points:
  - name: main_chart
    description: Primary chart type
    options:
    - name: ChartType.kline
      traits:
      - OHLC candlesticks
      - most common
      - full price information
      fit_for:
      - stock charts
      - technical analysis
      - price patterns
      not_fit_for:
      - non-OHLC data
      - simple line charts
      - volume-only display
    - name: ChartType.bar
      traits:
      - OHLC bars
      - compact display
      - traditional charting
      fit_for:
      - compact charts
      - historical comparisons
      - range-bound markets
      not_fit_for:
      - trend visualization
      - beginners
      - complex patterns
    - name: ChartType.scatter
      traits:
      - point-based
      - signal markers
      - minimalist
      fit_for:
      - signal overlays
      - point-in-time events
      - minimal charts
      not_fit_for:
      - continuous data
      - price patterns
      - volume display
    default: ChartType.kline
  - name: drawer_factor_df_list()
    description: Override to customize factor visualization
    options:
    - name: Custom df list
      traits:
      - user-defined DataFrames
      - multiple overlays
      - custom styling
      fit_for:
      - multi-factor display
      - custom indicators
      - research visualization
      not_fit_for:
      - simple single-factor
      - default behavior
      - quick charts
    default: TechnicalFactor returns [factor_df]
  design_decisions:
  - 'drawer_rects override in subclass for custom Rect annotations: src/zvt/contract/drawer.py:289(drawer_rects)
    — Flexible annotation system; traders use for entry/exit markers'
  - 'drawer_sub_col_chart enables volume bars below kline: src/zvt/contract/drawer.py:292(drawer_sub_col_chart)
    — Standard candlestick+volume layout for technical analysis'
  acceptance_hints:
  - Kline charts render with correct OHLC data from DataFrames
  - Factor overlays display on main chart with proper alignment
  - Rect annotations appear at expected timestamps for trading signals
data_flow:
- from_stage: data_collection
  to_stage: data_storage
  data: Domain objects (Stock1dKdata, BalanceSheet, etc.) via df_to_db()
- from_stage: data_storage
  to_stage: factor_computation
