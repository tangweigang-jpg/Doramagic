business_decisions:
- id: BD-001
  type: B
  content: Recorder inherits OneStateService for single-state persistence
  rationale: Recorders need simple run/stop state that survives restarts. Using OneStateService
    provides single-state persistence ensuring the recording process can resume from
    where it left off after interruption rather than re-processing already captured
    data.
  evidence: src/zvt/contract/recorder.py:91(Recorder)
  stage: data_collection
  alternative_considered: Full state machine vs single-state; single-state chosen
    for simplicity
- id: BD-002
  type: BA
  content: evaluate_start_end_size_timestamps determines incremental fetch range
  rationale: Avoids re-fetching already-saved data by comparing to get_latest_saved_record.
    This boundary prevents redundant API calls and reduces data provider load, making
    incremental updates efficient rather than full refreshes.
  evidence: src/zvt/contract/recorder.py:751(evaluate_start_end_size_timestamps)
  stage: data_collection
  alternative_considered: Full refresh on each run vs incremental fetch; incremental
    chosen for efficiency
- id: BD-003
  type: B
  content: Provider-agnostic recording via get_data_map for field transformation
  rationale: Different APIs return different field names; mapping allows uniform domain
    schema. This boundary decouples provider-specific field names from the internal
    domain model, enabling seamless switching between data sources.
  evidence: src/zvt/contract/recorder.py:329(get_data_map)
  stage: data_collection
  alternative_considered: Provider-specific schemas vs unified mapping; mapping chosen
    for consistency
- id: BD-004
  type: B/BA
  content: StorageBackend abstraction enables future cloud storage
  rationale: Interface cleanly separates concerns; SQLite is default but not mandated.
    This abstraction boundary allows swapping storage implementations (local, cloud,
    distributed) without changing business logic code.
  evidence: src/zvt/contract/storage.py:38(StorageBackend)
  stage: data_storage
  alternative_considered: Hardcoded SQLite vs abstraction layer; abstraction chosen
    for extensibility
- id: BD-005
  type: BA
  content: Path template allows migration from old provider/ dir structure
  rationale: Backward compatibility with old_db_to_provider_dir in init_env. This
    migration boundary ensures existing data remains accessible when transitioning
    to new directory structures without data loss.
  evidence: src/zvt/contract/storage.py:83(_get_path_template)
  stage: data_storage
  alternative_considered: Breaking change vs migration path; backward compatibility
    chosen
- id: BD-006
  type: B/BA
  content: db_name derived from data_schema __tablename__
  rationale: One database per domain type; avoids schema conflicts. This naming boundary
    ensures clean separation of domain entities, preventing naming collisions and
    simplifying query logic.
  evidence: src/zvt/contract/api.py:37(_get_db_name)
  stage: data_storage
  alternative_considered: Shared database vs per-domain database; per-domain chosen
    for isolation
- id: BD-007
  type: B
  content: Factor inherits DataReader for uniform data access pattern
  rationale: Same data loading interface for factors and other readers; enables composition.
    This inheritance boundary allows factors to seamlessly consume data alongside
    other reader types, enabling composable factor pipelines.
  evidence: src/zvt/contract/factor.py:188(Factor)
  stage: factor_computation
  alternative_considered: Standalone factor vs reader-based factor; reader-based chosen
    for composability
- id: BD-008
  type: B/DK
  content: EntityStateService per-factor state for rolling computations
  rationale: Accumulators need entity-specific state that persists across compute
    cycles. This service boundary maintains rolling window state per entity, enabling
    continuous factor updates without full recomputation.
  evidence: src/zvt/contract/base_service.py:87(EntityStateService)
  stage: factor_computation
  alternative_considered: Stateless recomputation vs stateful accumulation; stateful
    chosen for efficiency
- id: BD-009
  type: BA
  content: factor_schema optional for Factor; enables dynamic schema creation
  rationale: get_ma_factor_schema generates schemas like Stock1dMaFactor dynamically.
    This optionality boundary allows factors to define custom output schemas at runtime
    rather than requiring static schema definitions.
  evidence: src/zvt/contract/factor.py:192(factor_schema)
  stage: factor_computation
  alternative_considered: Mandatory schema vs optional schema; optional chosen for
    flexibility
  _evidence_issues:
  - 'FN_NOT_FOUND: factor_schema in src/zvt/contract/factor.py'
- id: BD-010
  type: BA
  content: fill_gap fills missing timestamps with ffill before computing
  rationale: Ensures continuity for rolling windows on sparse data. This preprocessing
    boundary fills temporal gaps using forward-fill, preventing computation errors
    from missing periods while maintaining signal continuity.
  evidence: src/zvt/contract/factor.py:499(fill_gap)
  stage: factor_computation
  alternative_considered: Error on gap vs fill gap; fill chosen for robustness
- id: BD-011
  type: BA
  content: profit_threshold tuple (positive, negative) encodes business rule
  rationale: Default (3, -0.3) means 300% take-profit or 30% stop-loss. This tuple
    boundary encodes the primary risk management rule, separating profit-taking from
    stop-loss thresholds as a configurable business parameter.
  evidence: src/zvt/trader/trader.py:247(on_profit_control)
  stage: factor_computation
  alternative_considered: Fixed threshold vs tuple configuration; tuple chosen for
    flexibility
- id: BD-012
  type: B
  content: TargetSelector owns factor list; factors registered via add_factor()
  rationale: Decoupled composition; traders can customize factor combinations. This
    ownership boundary allows runtime factor registration, enabling strategy customization
    without code modification.
  evidence: src/zvt/factors/target_selector.py:84(add_factor)
  stage: target_selection
  alternative_considered: Hardcoded factors vs registrable factors; registrable chosen
    for flexibility
- id: BD-013
  type: BA/DK
  content: get_targets returns entity_ids filtered by threshold at specific timestamp
  rationale: Timestamp-specific filtering enables historical backtesting. This temporal
    boundary allows point-in-time selection queries, ensuring backtests don't look
    ahead and produce unrealistic results.
  evidence: src/zvt/factors/target_selector.py:131(get_targets)
  stage: target_selection
  alternative_considered: Current-only vs timestamped selection; timestamped chosen
    for backtesting
- id: BD-014
  type: B/DK
  content: due_timestamp = happen_timestamp + level.to_second() for delayed execution
  rationale: Signals execute at next kdata interval; enables real-time simulation.
    This timing boundary aligns signal execution with market bar boundaries, creating
    realistic simulation conditions matching live trading constraints.
  evidence: src/zvt/trader/trader.py:283(due_timestamp)
  stage: trading_execution
  alternative_considered: Immediate execution vs delayed by interval; delayed chosen
    for realism
  _evidence_issues:
  - 'FN_NOT_FOUND: due_timestamp in src/zvt/trader/trader.py'
- id: BD-015
  type: BA/DK
  content: long_position_control defaults to 20% if no positions, 50% if <=10 positions
  rationale: Conservative position sizing; Chinese market 20% rule encoded as default.
    This sizing boundary encodes regulatory constraints and risk management as configurable
    defaults that scale with portfolio diversification.
  evidence: src/zvt/trader/trader.py:229(long_position_control)
  stage: trading_execution
  alternative_considered: Fixed sizing vs tiered sizing; tiered chosen for diversification
- id: BD-016
  type: BA
  content: profit_threshold triggers sell before regular target selection
  rationale: Profit-taking has priority over new signals; risk management. This execution
    priority boundary ensures profit targets and stop-losses execute immediately without
    waiting for regular signal processing cycles.
  evidence: src/zvt/trader/trader.py:247(on_profit_control)
  stage: trading_execution
  alternative_considered: Same priority vs priority override; priority override chosen
    for safety
- id: BD-017
  type: BA
  content: rich_mode=True enables tracking positions with current prices
  rationale: Rich mode for backtesting; disabled for minimal mode. This feature boundary
    toggles between detailed P&L tracking with live prices versus lightweight simulation,
    providing trade-offs between accuracy and performance.
  evidence: src/zvt/trader/sim_account.py:37(rich_mode)
  stage: trading_execution
  alternative_considered: Always rich vs optional; optional chosen for flexibility
  _evidence_issues:
  - 'FN_NOT_FOUND: rich_mode in src/zvt/trader/sim_account.py'
- id: BD-018
  type: B
  content: buy/sell methods only affect holdings not in current position
  rationale: ignore_in_position prevents duplicate orders for same entity. This filtering
    boundary prevents double-buying entities already in the portfolio, eliminating
    redundant order generation and potential execution conflicts.
  evidence: src/zvt/trader/trader.py:266(buy)
  stage: trading_execution
  alternative_considered: Allow duplicates vs filter duplicates; filtering chosen
    for safety
- id: BD-019
  type: B
  content: drawer_rects override in subclass for custom Rect annotations
  rationale: Flexible annotation system; traders use for entry/exit markers. This
    extensibility boundary allows subclasses to define custom visual annotations on
    charts, enabling trading signal visualization without modifying base drawing logic.
  evidence: src/zvt/contract/drawer.py:289(drawer_rects)
  stage: visualization
  alternative_considered: Fixed annotations vs extensible; extensible chosen for customization
- id: BD-020
  type: B/BA
  content: drawer_sub_col_chart enables volume bars below kline
  rationale: Standard candlestick+volume layout for technical analysis. This composition
    boundary defines the standard chart layout with main price panel and sub-panel
    for volume, matching professional charting conventions.
  evidence: src/zvt/contract/drawer.py:292(drawer_sub_col_chart)
  stage: visualization
  alternative_considered: Single panel vs multi-panel; multi-panel chosen for information
    richness
- id: BD-021
  type: B
  content: 'ChartType enum defines 8 chart types: kline, line, area, scatter, histogram,
    pie, bar'
  rationale: The system supports exactly 8 chart types as its visualization vocabulary.
    This boundary constrains what analytics can be rendered and reported, directly
    affecting user-facing BI capabilities. Adding new chart types requires enum extension
    and drawer implementation, making this a stable, deliberate scope decision.
  evidence: src/zvt/contract/drawer.py:20(ChartType)
  stage: visualization
  alternative_considered: Dynamic chart registration was considered but rejected to
    maintain type safety and simplicity
- id: BD-022
  type: B/DK
  content: 'AdjustType supports 3 modes: bfq (不复权), qfq (前复权), hfq (后复权)'
  rationale: Chinese stock markets require price adjustment modes for accurate historical
    analysis. The 3-mode boundary (none, forward, backward adjustment) is essential
    for comparing pre-dividend and post-dividend prices. This directly impacts backtesting
    accuracy and fundamental analysis correctness across each trading strategies.
  evidence: src/zvt/contract/__init__.py:121(AdjustType)
  stage: data_storage
  alternative_considered: Real-time unadjusted prices were considered but deemed insufficient
    for historical comparison
- id: BD-023
  type: B/BA
  content: 'ActorType defines 11 investor types: individual, raised_fund, social_security,
    insurance, qfii, trust, broker, private_equity, corporation, and more'
  rationale: Investor classification into 11 types enables institutional flow analysis
    and fund holding tracking. This boundary determines which market participants
    can be analyzed, directly impacting research and screening capabilities. New actor
    types require schema changes and data source updates.
  evidence: src/zvt/contract/__init__.py:138(ActorType)
  stage: entity_classification
  alternative_considered: Hierarchical classification was considered but flat enumeration
    chosen for simplicity
- id: BD-024
  type: B/DK
  content: 'TradableType covers 15+ markets: stock, cbond, index, block, stockus,
    indexus, stockhk, future, coin, option, fund, currency'
  rationale: The system supports 12+ distinct market segments spanning Chinese stocks,
    US markets, Hong Kong, futures, and crypto. This boundary directly determines
    cross-asset strategy capabilities and data acquisition complexity. Each new market
    requires dedicated data recorders and domain-specific logic.
  evidence: src/zvt/contract/__init__.py:159(TradableType)
  stage: entity_classification
  alternative_considered: Plugin architecture for market types was deferred for v2
- id: BD-025
  type: B/DK
  content: TradingSignal due_timestamp = timestamp + level.to_second()
  rationale: Trading signals are time-bound to the current bar interval, ensuring
    orders execute within the correct time context. This boundary prevents stale signals
    from executing in wrong market sessions and ensures GTC (good-till-cancelled)
    behavior respects bar boundaries. Critical for multi-timeframe strategy correctness.
  evidence: src/zvt/trader/trader.py:266(Trader.buy)
  stage: trading_execution
  alternative_considered: Infinite expiry was rejected to prevent stale signal accumulation
- id: BD-026
  type: B/BA
  content: Default profit_threshold=(3, -0.3) meaning 3% take-profit and -0.3% stop-loss
  rationale: The 3% profit target and -0.3% stop-loss define the default risk-reward
    profile. The asymmetric boundary (larger gains, small losses) reflects contrarian
    mean-reversion philosophy. This directly controls portfolio risk and determines
    expected trading behavior for each Trader instances without custom configuration.
  evidence: src/zvt/trader/trader.py:247(on_profit_control)
  stage: risk_management
  alternative_considered: Dynamic thresholds based on volatility were considered but
    rejected for simplicity
- id: BD-027
  type: B/BA
  content: 'long_position_control: no positions=20%, <=10 positions=50%, else=100%'
  rationale: Position sizing scales from 20% to 100% based on current portfolio concentration.
    This tiered boundary (0, 1-10, 11+) controls risk exposure as portfolio diversifies.
    The logic ensures conservative sizing when building positions and full allocation
    when diversified, directly implementing a core risk management strategy.
  evidence: src/zvt/trader/trader.py:229(long_position_control)
  stage: position_management
  alternative_considered: Kelly criterion was rejected as too aggressive for retail
    trading
- id: BD-028
  type: B/BA
  content: short_position_control returns 1.0 (sell each positions)
  rationale: Short signals trigger full position liquidation, implementing aggressive
    short-side risk management. This boundary means any bearish signal causes complete
    exit of long positions. The asymmetric response (partial on longs, full on shorts)
    reflects conservative long-bias design and prevents holding long positions during
    confirmed downtrends.
  evidence: src/zvt/trader/trader.py:243(short_position_control)
  stage: position_management
  alternative_considered: Partial short liquidation was rejected to maintain signal
    clarity
- id: BD-029
  type: B/BA
  content: buy_cost=0.001, sell_cost=0.001, slippage=0.001 (each 0.1%)
  rationale: Transaction costs of 0.1% per side (0.2% round-trip) plus 0.1% slippage
    model realistic execution costs. This 0.3% total cost boundary ensures backtesting
    includes realistic friction, preventing over-optimistic results. The symmetry
    between buy/sell reflects market-impact neutrality assumption.
  evidence: src/zvt/trader/sim_account.py:25(SimAccountService)
  stage: trading_execution
  alternative_considered: Variable slippage based on volume was deferred for lack
    of market impact data
- id: BD-030
  type: B/BA
  content: rich_mode=True by default allows injecting money when cash insufficient
  rationale: Rich mode enables unlimited capital simulation, prioritizing strategy
    logic testing over capital constraints. This boundary makes backtests focus on
    signal quality rather than cash management. When disabled, positions may fail
    due to insufficient capital, revealing real trading constraints that rich mode
    hides.
  evidence: src/zvt/trader/sim_account.py:26(SimAccountService.__init__)
  stage: simulation_mode
  alternative_considered: Default False was rejected as it complicates initial strategy
    testing
- id: BD-031
  type: B/BA
  content: Bollinger Bands use window=20, window_dev=2 for standard volatility bands
  rationale: Standard Bollinger parameters (20-period, 2 standard deviations) follow
    established technical analysis convention. This boundary makes the factor compatible
    with mainstream charting expectations and enables easier strategy explanation.
    The 95% price inclusion boundary (within 2σ) directly determines breakout sensitivity.
  evidence: examples/factors/boll_factor.py:11(BollTransformer)
  stage: factor_computation
  alternative_considered: Adaptive parameters based on ATR were considered for v2
- id: BD-032
  type: B/BA
  content: MaFactor default windows=[5, 10, 34, 55, 89, 144, 120, 250] (Fibonacci-inspired)
  rationale: Eight Fibonacci-based windows (5, 10, 34, 55, 89, 144, 120, 250) provide
    multi-timeframe trend analysis. This boundary creates alignment with Elliott Wave
    theory and Gann analysis conventions. The mix of Fibonacci (34, 55, 89, 144) with
    round numbers (5, 10, 120, 250) balances theory with practical market cycles.
  evidence: src/zvt/factors/ma/ma_factor.py:25(MaFactor.__init__)
  stage: factor_computation
  alternative_considered: Pure Fibonacci-only set was rejected for lack of medium-term
    (120-day) coverage
- id: BD-033
  type: B
  content: 'VolumeUpMaFactor: price within 1.15x of ma and volume > 2x vol_ma'
  rationale: 'Combined price-volume breakout conditions: price must stay within 15%
    of moving average while volume surges to 2x average. This dual-boundary ensures
    breakout quality by requiring both price stability (not overextended) and volume
    confirmation. Prevents false breakouts during low-volume whipsaws.'
  evidence: src/zvt/factors/ma/ma_factor.py:192(VolumeUpMaFactor.compute_result)
  stage: factor_computation
  alternative_considered: Volume-only signals were rejected as prone to false positives
- id: BD-034
  type: B/BA
  content: VolumeUpMaFactor turnover_threshold=300000000, turnover_rate_threshold=0.02
  rationale: Absolute turnover floor of 300M CNY and 2% turnover rate minimum ensure
    signal applies only to liquid stocks. This liquidity boundary prevents positioning
    in illiquid markets where orders would cause significant slippage. Critical for
    realistic execution simulation in backtesting.
  evidence: src/zvt/factors/ma/ma_factor.py:108(VolumeUpMaFactor.__init__)
  stage: factor_computation
  alternative_considered: Dynamic thresholds based on float were deferred for complexity
- id: BD-035
  type: B/BA
  content: 'up_intervals=40: signal remains valid for 40 bars after initial trigger'
  rationale: Signal persistence across 40 bars (e.g., 40 days for daily data = ~8
    weeks) allows delayed entry during ranging markets. This temporal boundary balances
    responsiveness with patience, preventing premature exit from valid setups. Extends
    the actionable window significantly beyond the trigger point.
  evidence: src/zvt/factors/ma/ma_factor.py:221(module)
  stage: factor_computation
  alternative_considered: Single-bar expiry was rejected for causing missed opportunities
    during consolidations
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/zvt/factors/ma/ma_factor.py'
- id: BD-036
  type: B/BA
  content: 'MACD default: slow=26, fast=12, n=9 (standard parameters)'
  rationale: Standard MACD parameters (12/26/9) follow Gerald Appel's original specification.
    This boundary ensures factor output aligns with mainstream technical analysis
    and is explainable to practitioners. The 26-period EMA represents ~1 month, 12-period
    ~2 weeks, creating balanced short/long momentum comparison.
  evidence: src/zvt/factors/algorithm.py:30(macd)
  stage: factor_computation
  alternative_considered: Adaptive MACD parameters were considered but rejected for
    interpretability
- id: BD-037
  type: B/BA
  content: 'GoldCrossFactor: live=1 AND both diff>0 AND dea>0 for bullish signal'
  rationale: 'Triple confirmation for golden cross signals: MACD histogram positive,
    diff above zero, and dea above zero. This conservative boundary requires each
    three conditions, reducing false signals at the cost of missing early entries.
    Implements a trend-following confirmation philosophy.'
  evidence: src/zvt/factors/macd/macd_factor.py:56(goldcrossfactor)
  stage: factor_computation
  alternative_considered: Single-condition entry was rejected as too aggressive for
    risk management
  _evidence_issues:
  - 'FN_NOT_FOUND: goldcrossfactor in src/zvt/factors/macd/macd_factor.py'
- id: BD-038
  type: B/DK
  content: 'BullFactor: bull = diff>0 AND dea>0 for overall bullish state'
  rationale: Bullish state requires MACD diff and dea both positive, indicating sustained
    upward momentum. This dual-boundary distinguishes genuine trends from histogram
    noise. Used as a pre-filter for more specific signals, creating a hierarchical
    market state assessment framework.
  evidence: src/zvt/factors/macd/macd_factor.py:24(bullfactor)
  stage: factor_computation
  alternative_considered: Single EMA crossover was rejected for lack of momentum confirmation
  _evidence_issues:
  - 'FN_NOT_FOUND: bullfactor in src/zvt/factors/macd/macd_factor.py'
- id: BD-039
  type: B/BA
  content: 'Multi-level trading: long in ALL levels (intersection), short in ANY level
    (union)'
  rationale: 'Asymmetric multi-timeframe logic: longs require ALL levels aligned (conservative),
    shorts trigger on ANY level bearish (aggressive). This long-bias design reflects
    risk management philosophy: require strong consensus for entry, exit quickly on
    disagreement. Directly implements a cautious portfolio construction approach.'
  evidence: src/zvt/trader/trader.py:186(on_targets_selected_from_levels)
  stage: trading_execution
  alternative_considered: Symmetric AND/OR logic was rejected as it doesn't reflect
    risk asymmetry
- id: BD-040
  type: B/BA
  content: on_factor_targets_filtered limits long_targets to max 10 stocks per level
  rationale: Maximum 10 positions per level caps concentration risk and ensures adequate
    capital per trade. This hard limit of 10 directly controls portfolio granularity,
    preventing over-diversification (diluted returns) or under-diversification (excessive
    risk). Combined with multi-level logic, max total positions can reach 10 x number_of_levels.
  evidence: src/zvt/trader/trader.py:332(on_factor_targets_filtered)
  stage: trading_execution
  alternative_considered: Dynamic limit based on capital was deferred for complexity
- id: BD-041
  type: B
  content: ML label_method supports 'raw', 'change', and 'behavior_cls' for prediction
    targets
  rationale: 'Three labeling approaches enable different prediction objectives: raw
    (price direction), change (return prediction), behavior_cls (behavior classification).
    This boundary determines what the ML model learns and constrains the feature engineering
    pipeline. Changing label_method requires full retraining, making it a structural
