    and holding period expectations. Wrong horizon creates misalignment between prediction
    and actual trading cycle, reducing effective signal quality.
  evidence: src/zvt/ml/ml.py:46(MLMachine)
  stage: ml_config
  alternative_considered: Adaptive horizon based on volatility was deferred for complexity
- id: BD-044
  type: B/BA
  content: Base capital = 1,000,000 for simulation account
  rationale: 1M CNY starting capital represents a significant but realistic retail/accounting
