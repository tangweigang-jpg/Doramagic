  evidence: src/zvt/ml/ml.py:59(label_method)
  stage: ml_config
  alternative_considered: Custom labeling functions were deferred for v2
  _evidence_issues:
  - 'FN_NOT_FOUND: label_method in src/zvt/ml/ml.py'
- id: BD-042
  type: B/BA
  content: SGDClassifier/Regressor uses StandardScaler pipeline with max_iter=1000,
