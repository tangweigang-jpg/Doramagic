  _evidence_issues:
  - 'FN_NOT_FOUND: module in examples/reports/report_tops.py'
- id: BD-046
  type: B/DK
  content: Real-time mode closes when current_timestamp.hour >= close_hour + 5 minutes
  rationale: 5-minute buffer after market close allows for data finalization and API
    latency. This boundary prevents premature recorder shutdown while avoiding indefinite
    waiting. The 5-minute window balances data completeness with resource efficiency,
    critical for overnight batch processing pipelines.
  evidence: src/zvt/contract/recorder.py:476(TimeSeriesDataRecorder.run)
  stage: trading_execution
  alternative_considered: Wait for explicit exchange confirmation was rejected for
    API dependency
- id: BD-047
  type: B
