data_flow:
- from_stage: data_schema_def
  to_stage: data_recording
  data: Schema definitions with columns and metaclass registration; Recorder metaclass
    auto-registers to schema.provider_map_recorder
- from_stage: data_recording
  to_stage: market_data_access
  data: Persisted kdata/finance records in SQLite database
- from_stage: market_data_access
  to_stage: factor_computation
  data: data_df - MultiIndex DataFrame (entity_id, timestamp) of kdata from DataReader.load_data()
- from_stage: market_data_access
  to_stage: technical_indicators
  data: Close prices and OHLCV data for indicator computation
- from_stage: factor_computation
  to_stage: technical_indicators
  data: pipe_df - intermediate transformed DataFrame passed to Transformer.transform()
- from_stage: technical_indicators
  to_stage: target_selection
  data: factor_df with indicator columns (ma5, ma10, diff, dea, macd)
- from_stage: target_selection
  to_stage: trading_execution
  data: List of entity_ids (long_targets, short_targets) from Factor.get_targets()
- from_stage: trading_execution
  to_stage: trading_account
  data: TradingSignal list with entity_id, due_timestamp, position_pct
- from_stage: trading_account
  to_stage: visualization
  data: AccountStats snapshots, positions for chart overlay and performance display
global_contracts:
- contract: All domain objects use entity_id+timestamp as primary identifiers with
    id field following pattern {entity_id}_{timestamp}
  evidence: schema.py:40-46(id,entity_id,timestamp)
- contract: DataFrames use MultiIndex (entity_id, timestamp) from DataReader.load_data();
    ML module expects this format per build_feature contract
  evidence: reader.py:145-162, src/zvt/ml/ml.py:191-200
- contract: Kdata schemas named {EntityType}{Level}Kdata[AdjustType] enforced in get_kdata_schema
    (e.g., Stock1dKdata, Stock1dKdataHfq)
  evidence: kdata.py:96-102
- contract: 'Factor computes pipeline: data_df->pipe_df->factor_df->result_df in order:
    pre_compute -> do_compute (transformer->accumulator) -> after_compute'
  evidence: factor.py:292-302, 434-449
- contract: TradingSignal due_timestamp MUST be timestamp + level.to_second() for
    proper execution timing; Broker expiration checks would fail with different logic
  evidence: trader.py:283,309
- contract: Trader level must equal minimum of all factor levels for multi-timeframe
    strategies
  evidence: trader.py:124-125
- contract: Trader.run() executes sell BEFORE buy in each cycle to avoid position
    conflicts when closing and opening same stock
  evidence: trader.py:511-514
- contract: TradingSignal requires exactly ONE of position_pct, order_money, or order_amount
  evidence: src/zvt/trader/__init__.py:68
business_decisions:
- id: BD-001
  type: T
  content: Mixin pattern for schema inheritance with query_data class method
  rationale: Enables flexible composition of schema traits across domain entities.
    Changing to deep inheritance would not alter trading outputs. Mixin provides code
    reuse without business logic coupling.
  evidence: src/zvt/contract/schema.py:34(Mixin)
  stage: data_schema_def
  _evidence_issues:
  - 'FN_NOT_FOUND: Mixin in src/zvt/contract/schema.py'
- id: BD-002
  type: T
  content: MultiIndex (entity_id, timestamp) as standard DataFrame arrangement
  rationale: Enables groupby-level operations and time-series analysis per entity.
    Swapping to single-index would require code changes but not alter trading signals.
    Pure data organization choice.
  evidence: src/zvt/contract/reader.py:145(module)
  stage: market_data_access
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/zvt/contract/reader.py'
- id: BD-003
  type: T
  content: 'Dynamic schema naming: {EntityType}{Level}Kdata[AdjustType]'
  rationale: Auto-generated per-adjust-type schemas avoid null checks. Alternative
    hardcoded schemas would work but require more manual wiring. Infrastructure pattern
    choice.
  evidence: src/zvt/api/kdata.py:83(get_kdata_schema)
  stage: market_data_access
- id: BD-004
  type: T
  content: SQLite as persistent storage backend
  rationale: File-based SQLite requires no server setup, enabling portable backtests.
    Swapping to PostgreSQL would not change trading outputs, only deployment complexity.
    Infrastructure choice.
  evidence: src/zvt/contract/recorder.py:287(327)
  stage: data_recording
