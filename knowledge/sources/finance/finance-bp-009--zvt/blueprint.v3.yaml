- id: BD-INT-001
  type: B/BA
  content: 'INTERACTION: BD-019 (stop-loss -30%) × BD-027 (T+1 settlement delay) ×
    BD-071 (missing price limit check) → Amplified catastrophic loss risk: stop-loss
    triggers next trading cycle with no protection against overnight gap-downs or
    limit-down scenarios'
  rationale: 'The combination creates a loss amplification chain. A -30% stop-loss
    assumes same-bar execution at -30%, but T+1 forces next-cycle execution. Without
    price limit checks, if a stock limit-downs at -10% with heavy sell pressure, the
    sell order queued for next bar may face: (1) continued selling pressure opening
    at limit-down, (2) inability to execute at -30% because price is already at limit-down
    floor, (3) position remains open risking further decline. The stop-loss percentage
    becomes meaningless in limit-down scenarios because execution cannot occur at
    specified price. This is particularly dangerous in Chinese A-shares where limit-down
    stocks may remain at floor for entire trading session with no liquidity.'
  evidence: N/A:0(see_rationale)
  stage: global
- id: BD-INT-002
  type: B/BA
  content: 'INTERACTION: BD-020 (position sizing 0 holdings=20%, 1-10 holdings=50%)
    × BD-023 (max 10 positions) → Contradiction: first trade gets 20% allocation but
    system cannot exceed 10 positions, yet position_pct starts at 20% with 0 holdings
    creating inconsistent sizing behavior'
  rationale: 'There''s an internal inconsistency in the position sizing logic. The
    long_position_control returns position_pct=0.2 when holdings=0, meaning the first
    trade should allocate 20% of capital. However, if the strategy picks exactly 10
    targets (max allowed), each gets 20% allocation = 200% total, exceeding available
    capital. The code assumes position_pct applies to remaining capital (unexplained),
    but the values were calculated as percentages of total capital. At 1-10 holdings,
    position_pct=50% implies each of 10 positions gets 50% of remaining = impossible
    math. This creates contradictory sizing: either first position gets 20% (correct)
    or each of 10 gets 50% (impossible). The system needs clarification on whether
    position_pct is of total capital or remaining capital.'
  evidence: N/A:0(see_rationale)
  stage: trading_execution
- id: BD-INT-003
  type: BA
  content: 'INTERACTION: BD-018 (MA windows include 250) × BD-026 (pre_load_days=365)
    → Hidden dependency: MA250 requires at least 250 warmup periods, but pre_load_days=365
    is adequate only for daily data; shorter intervals (1m, 5m) with 365 minutes warmup
    are insufficient for 250-bar MA calculation'
  rationale: The pre_load_days=365 is hardcoded for warmup, but this is interpreted
    as calendar days, not data periods. For daily kdata this provides ~365 trading
    days, sufficient for MA250. But for intraday intervals (1m, 5m), 365 minutes provides
    only 365 bars, barely enough for MA250. The MA250 calculation at BD-057 uses rolling
    window of 250, but the warmup period BD-026 assumes daily-scale data. There's
    no automatic scaling of pre_load_days based on interval level. A 1-minute strategy
    using MA250 will have incorrect MA values for the first ~115 trading days because
    insufficient warmup data was loaded. This dependency is hidden because neither
    BD explicitly references the other as a constraint.
  evidence: N/A:0(see_rationale)
  stage: global
- id: BD-INT-004
  type: RC
  content: 'INTERACTION: BD-072 (missing T+1 constraint) × BD-021 (symmetric 0.3%
    cost model) × BD-073 (missing stamp duty) × BD-071 (missing price limit check)
    → Risk cascade: four separate cost/constraint gaps that collectively create systematic
    backtest overestimation by ignoring realistic trading friction'
  rationale: 'This is a risk cascade where multiple missing constraints compound.
    BD-072 missing means intraday round-trips are allowed when A-share rules prohibit
    same-day selling. BD-073 missing means sell-side stamp duty (0.05%) is not deducted.
    BD-071 missing means limit-up/limit-down stocks can still receive buy/sell orders.
    BD-021 applies symmetric costs when reality is asymmetric (stamp duty on sell
    only). Together: (1) intraday strategies can execute impossible trades, (2) costs
    are underestimated by ~0.04% per round-trip on sells, (3) orders may be generated
    for stocks that cannot trade. For a strategy with 100% annual turnover, the cumulative
    effect is ~4-8% return overestimation from cost gaps alone, plus additional overestimation
    from impossible intraday trades.'
  evidence: N/A:0(see_rationale)
  stage: global
- id: BD-INT-005
  type: B/BA
  content: 'INTERACTION: BD-027 (T+1 execution next cycle) × BD-016 (sell before buy
    ordering) × BD-072 (missing T+1 holding constraint) → Amplification: T+1 delay
    combined with sell-before-buy creates position state confusion when same stock
    appears in both long and short target lists across consecutive cycles'
  rationale: 'The sell-before-buy ordering (BD-016) is intended to prevent position
    conflicts. However, due to T+1 constraint (BD-027), a stock bought yesterday becomes
    available to sell today. If the factor generates both long and short signals for
    the same stock in consecutive cycles: (1) yesterday: signal to buy, (2) today:
    signal to sell (T+1 satisfied), (3) today: signal to short (new signal). The sell-before-buy
    order should close long first, then open short. However, BD-072 (missing T+1 tracking)
    means the system doesn''t properly record when shares were acquired, potentially
    allowing same-day sell-and-short that violates settlement rules. The T+1 delay
    + sell-before-buy combination requires accurate position age tracking which is
    absent.'
  evidence: N/A:0(see_rationale)
  stage: trading_execution
- id: BD-INT-006
  type: BA
  content: 'INTERACTION: BD-025 (SimAccountService rich_mode=True vs Trader rich_mode=False)
    × BD-077 (missing short selling margin requirements) → Contradiction: simulation
    allows unlimited capital/shorting while live trading has collateral constraints,
    creating over-optimistic backtests for long-short strategies'
  rationale: 'SimAccountService defaults to rich_mode=True (infinite capital), while
    Trader defaults to rich_mode=False (budget enforced). This inconsistency means
    backtests can show unlimited buying power while live trading requires actual capital.
    More critically, BD-077 (missing short selling margin requirements) compounds
    this: a long-short strategy backtested with rich_mode=True can show unlimited
    short selling capacity, but live A-share shorting requires 50%+ collateral margin.
    A strategy that appears market-neutral in backtest (50% long, 50% short) actually
    requires 100% capital (50% collateral for shorts) plus borrowing fees. The simulation
    shows 50% cash usage; reality requires 100% cash. This contradicts the backtest''s
    implied margin efficiency.'
  evidence: N/A:0(see_rationale)
  stage: trading_account
- id: BD-INT-007
  type: BA
  content: 'INTERACTION: BD-076 (missing Kelly criterion) × BD-020 (fixed position
    sizing 20%/50%/100%) × BD-023 (max 10 positions) → Risk cascade: fixed position
    sizing ignores strategy win rate and payoff ratio, potentially over-allocating
    to high-volatility stocks while under-allocating to high-edge opportunities'
  rationale: This cascade affects risk-adjusted returns across all strategies. BD-076
    (missing Kelly criterion) means no dynamic position sizing based on historical
    edge. BD-020 applies fixed percentages regardless of whether the stock is a high-volatility
    penny stock or a stable blue chip. BD-023 caps at 10 positions, creating forced
    diversification even when one position has 3x the edge of others. A strategy with
    60% win rate and 2:1 payoff should use Kelly f*=0.4 (40% per bet), but the system
    caps at 20%/50%/100%. Meanwhile, a strategy picking 10 high-volatility stocks
    each at 20% creates a portfolio with 50%+ annualized volatility, increasing drawdown
    risk beyond what fixed sizing implies. The lack of volatility-adjusted or Kelly-based
    sizing means portfolio risk is effectively uncontrolled.
  evidence: N/A:0(see_rationale)
  stage: trading_account
- id: BD-INT-008
  type: DK
  content: 'INTERACTION: BD-017 (adjust_type hfq for stocks) × BD-078 (missing survivorship
    bias) → Hidden dependency: hfq-adjusted prices assume all historical stocks are
    currently tradeable, but delisted stocks are excluded from the database creating
    look-ahead bias in backtests'
  rationale: 'The hfq (后复权) adjustment method back-adjusts historical prices for splits
    and dividends to maintain continuity. However, BD-078 (missing survivorship bias
    handling) means only currently-existing stocks appear in the database. When computing
    factors like MA(250) or MACD on historical data, stocks that were later delisted
    or removed from the index are absent. This creates a survivorship-biased universe:
    backtests only include stocks that survived to the present. For index-tracking
    strategies, this means: (1) stocks that fell 80% before delisting are excluded,
    (2) the index appears to have performed better than it actually did, (3) hfq-adjusted
    returns are inflated because poor performers are missing. The factor calculation
    on hfq-adjusted prices assumes complete historical universe, but the database
    only has survivors.'
  evidence: N/A:0(see_rationale)
  stage: global
