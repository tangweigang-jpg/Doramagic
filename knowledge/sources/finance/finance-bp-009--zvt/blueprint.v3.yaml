  content: 'Position sizing: Kelly criterion or volatility-based sizing缺失'
  rationale: 'Current fixed percentage sizing (20%/50%/100%) ignores win rate and
    payoff ratio information. Industry standard for professional quant strategies
    uses Kelly criterion: f* = (p*b - q) / b where b=win/loss ratio, optimizing expected
    log growth. This project assumes fixed allocation regardless of strategy edge.
    BOUNDARY: This approach breaks when applied to strategies with varying win rates
    across market regimes, causing either excessive risk (high-edge strategy underallocated)
    or blowup risk (low-edge strategy over-allocated). ALTERNATIVE: Implement KellyCalculator
    with empirical win_rate, avg_win, avg_loss; apply fractional Kelly (0.5x) to reduce
    volatility while maintaining edge.'
