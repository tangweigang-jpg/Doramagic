id: finance-bp-009
name: zvt
sop_version: '3.4'
source:
  projects:
  - zvt
  extraction_method: semi_auto
  commit_hash: f971f00c2181bc7d7fb7987a7875d4ec5960881a
applicability:
  description: A quantitative trading system for Chinese A-shares providing data recording,
    factor computation, and automated trading execution with visual analysis.
  domain: finance
  not_suitable_for: Real-time trading requiring sub-second execution; non-Chinese
    markets without significant customization; high-frequency trading strategies;
    users unfamiliar with pandas DataFrames and SQLAlchemy
  prerequisites: Python 3.8+, understanding of financial market data (OHLCV, klines),
    basic pandas/SQLAlchemy knowledge, familiarity with trading concepts (position
    sizing, slippage, stop-loss)
  task_type: algorithmic trading with quantitative factors
stages:
- id: data_schema_def
  name: Data Schema Definition
  order: 1
  responsibility: Define SQLAlchemy ORM schemas for all domain entities (Stock, Kdata,
    Finance) using Mixin pattern for code reuse across tradable entity types. Provides
    the foundational data model that all other stages depend upon.
  interface:
    inputs:
    - description: Domain entity types (stock, index, etf, future, etc.)
      name: entity_types
    outputs:
    - description: Mixin subclasses with id, entity_id, timestamp columns and query_data()
        class method
      name: Mixin subclasses
    - description: Mixin.query_data() classmethod for polymorphic data access
      name: query_data method
  required_methods:
  - name: Mixin.query_data
    description: Class method for querying data from schema with filters; polymorphic
      access across entity types
    evidence: src/zvt/contract/schema.py:34(Mixin)
  - name: Mixin.get_data
    description: Returns list of entity_ids meeting filter criteria
    evidence: src/zvt/contract/schema.py:120-140
  key_behaviors:
  - behavior: Mixin pattern for schema reuse
    description: Enables flexible composition of schema traits; Mixin.query_data()
      is classmethod for polymorphic access across all domain models
    evidence: schema.py:34(Mixin), 326(NormalMixin)
  - behavior: Entity-level isolation
    description: entity_id as primary lookup key across all schemas enables consistent
      cross-schema queries and multi-entity operations
    evidence: schema.py:42(entity_id)
  - behavior: Provider registration via metaclass
    description: Recorder metaclass auto-registers provider/schema mappings at class
      definition time
    evidence: recorder.py:71-88(Meta.__new__)
  replaceable_points:
  - name: provider_map_recorder
    description: Maps provider name to recorder class for data sourcing
    options:
    - name: em (eastmoney)
      traits:
      - Free
      - Comprehensive China coverage
      fit_for:
      - General Chinese stock data, free data source
      not_fit_for:
      - US stocks, requires VPN for Chinese access
    - name: jq (joinquant)
      traits:
      - Academic focus
      - Good for backtesting
      fit_for:
      - Quantitative research, academic use
      not_fit_for:
      - Real-time trading, high-frequency needs
    - name: tushare
      traits:
      - Popular in China
      - Rate-limited API
      fit_for:
      - Users with existing tushare accounts
      not_fit_for:
      - Free users with rate limits
    default: em
  design_decisions:
  - Use Mixin pattern instead of deep inheritance to enable flexible composition of
    schema traits; Mixin.query_data() is classmethod for polymorphic access (schema.py:34)
  - entity_id as primary lookup key across all schemas enables consistent cross-schema
    queries and multi-entity operations (schema.py:42)
  - KdataCommon includes provider,code,name,level as schema columns for denormalized
    query simplicity; avoids joins with entity tables (quotes/__init__.py:8-13)
  - TradableEntity trading intervals (9:30-11:30, 13:00-15:00) hardcoded for China
    A-shares; Hong Kong/US stocks need separate entity types (schema.py:381-384)
  acceptance_hints:
  - Mixin.query_data() returns DataFrame with entity_id+timestamp MultiIndex
  - New entity types can be added by inheriting from TradableEntity
  - 'Schema naming follows convention: {EntityType}{Level}Kdata (e.g., Stock1dKdata)'
- id: data_recording
  name: Data Recording
  order: 2
  responsibility: Fetch external data from providers (eastmoney, joinquant, tushare)
    and persist to local SQLite storage with state tracking for incremental updates.
    Enables resume capability for long-running recording operations.
  interface:
    inputs:
    - description: Provider API endpoints, entity lists, time ranges
      name: provider_config
    - description: List of entity_ids or exchange+code pairs to record
      name: entity_filters
    outputs:
    - description: Domain objects persisted to SQLite via session.add_all()
      name: persisted_records
  required_methods:
  - name: Recorder.run
    description: Main recording method; fetches data from provider and persists to
      database with incremental update support
    evidence: src/zvt/contract/recorder.py:91
  - name: EntityEventRecorder.get_entity_list
    description: Returns entity list for the recorder's domain
    evidence: src/zvt/contract/recorder.py:147
  key_behaviors:
  - behavior: Incremental recording via latest_saved_record
    description: Resume capability for long-running recording; checks latest_saved_record
      to continue from last timestamp; default_size=2000 balances memory vs API round-trips
    evidence: recorder.py:287-327
  - behavior: Metaclass auto-registers recorders to schema
    description: Declarative registration via Meta.__new__; avoids manual wiring when
      defining new recorders
    evidence: recorder.py:71-88(Meta.__new__)
  - behavior: Entity filters for targeted recording
    description: day_data mode uses existing entity_ids as exclusion filter for selective
      recording
    evidence: recorder.py:228-230
  replaceable_points:
  - name: get_data_map
    description: Maps external API field names to schema field names
    options:
    - name: field name mapping dict
      traits:
      - Static mapping
      - Fast
      fit_for:
      - Simple field name mappings
      not_fit_for:
      - Complex transformations
    - name: lambda transforms
      traits:
      - Dynamic
      - Flexible
      fit_for:
      - Per-row transformations
      not_fit_for:
      - Batch operations
    default: '{}'
  - name: fix_duplicate_way
    description: How to handle duplicate timestamps in data
    options:
    - name: add
      traits:
      - Preserves all data
      fit_for:
      - Candlestick data, price data
      not_fit_for:
      - Volume data where duplicates indicate errors
    - name: skip
      traits:
      - Deduplicates
      fit_for:
      - Indicator data where precision matters
      not_fit_for:
      - High-frequency data
    - name: error
      traits:
      - Strict
      fit_for:
      - Data validation pipelines
      not_fit_for:
      - Production recording
    default: add
  design_decisions:
  - Metaclass auto-registers recorders to schema at class definition time; declarative
    registration avoids manual wiring when defining new recorders (recorder.py:71-88)
  - Incremental recording via latest_saved_record check enables resume capability
    for long-running recording; default_size=2000 balances memory vs round-trips (recorder.py:287-327)
  - Entity filters for targeted recording; day_data mode uses existing entity_ids
    as exclusion filter (recorder.py:228-230)
  acceptance_hints:
  - Recorder.run() successfully persists data to SQLite without errors
  - Incremental recording resumes from last saved timestamp on subsequent runs
  - Provider API errors are handled gracefully with retry logic
- id: market_data_access
  name: Market Data Access
  order: 3
  responsibility: Provide unified API for querying kdata across levels (1m to 1mon),
    adjust types (qfq/hfq/bfq), and providers with proper MultiIndex handling. Serves
    as the primary data access layer for all downstream computations.
  interface:
    inputs:
    - description: List of entity_ids to query
      name: entity_ids
    - description: Time granularity (1m, 5m, 15m, 1h, 1d, 1w, 1mon)
      name: level
    - description: Start and end timestamps for range query
      name: start_end
    - description: Price adjustment type (qfq, hfq, bfq)
      name: adjust_type
    outputs:
    - description: DataFrame with entity_id+timestamp MultiIndex
      name: kdata_df
    - description: Domain objects instead of DataFrame
      name: domain_objects
  required_methods:
  - name: DataReader.load_data
    description: Load data with filtering, pagination, and DataListener notifications
      for reactive updates
    evidence: src/zvt/contract/reader.py:40
  - name: get_kdata_schema
    description: Resolves entity_type+level+adjust_type to concrete schema class dynamically
    evidence: src/zvt/api/kdata.py:83
  - name: default_adjust_type
    description: Returns hfq for stocks, qfq for others; provides sensible defaults
      for Chinese market
    evidence: src/zvt/api/kdata.py:149
  key_behaviors:
  - behavior: MultiIndex (entity_id, timestamp) as standard
    description: Enables groupby-level operations and time-series analysis per entity;
      enforced by DataReader.load_data()
    evidence: reader.py:145
  - behavior: Dynamic schema naming
    description: 'Schema names follow pattern: {EntityType}{Level}Kdata[AdjustType]
      (e.g., Stock1dKdataHfq); auto-generated per-adjust-type schemas avoid null checks'
    evidence: kdata.py:96-102
  - behavior: Lazy entity resolution
    description: DataReader queries entity list when entity_ids not provided; useful
      for market-wide factor computation
    evidence: reader.py:78-83
  replaceable_points:
  - name: index parameter
    description: Query result index structure
    options:
    - name: timestamp
      traits:
      - Simple
      - Time-ordered
      fit_for:
      - Time-series analysis across all entities
      not_fit_for:
      - Multi-entity portfolio operations
    - name: entity_id+timestamp
      traits:
      - Hierarchical
      - Entity-grouped
      fit_for:
      - Portfolio operations, entity-specific analysis
      not_fit_for:
      - Cross-entity time analysis
    default: timestamp
  - name: return_type
    description: Result format for data access
    options:
    - name: df
      traits:
      - Pandas native
      - Vectorized
      fit_for:
      - Quantitative analysis, factor computation
      not_fit_for:
      - Simple display
    - name: domain
      traits:
      - Object-oriented
      fit_for:
      - ORM operations, schema persistence
      not_fit_for:
      - High-frequency access
    - name: dict
      traits:
      - Memory efficient
      fit_for:
      - Key-value lookups
      not_fit_for:
      - Analysis
    default: df
  design_decisions:
  - MultiIndex (entity_id, timestamp) as standard data arrangement enables groupby-level
    operations and time-series analysis per entity (reader.py:145)
  - 'Dynamic schema naming: {EntityType}{Level}Kdata[AdjustType] auto-generated per-adjust-type
    schemas avoid null checks (kdata.py:96-102)'
  - DataReader queries entity list when entity_ids not provided for lazy entity resolution;
    useful for market-wide factor computation (reader.py:78-83)
  - default_adjust_type returns hfq for stock*, qfq for others; Chinese stocks default
    to hfq (back-adjusted) (kdata.py:149-155)
  acceptance_hints:
  - DataReader.load_data() returns DataFrame with MultiIndex (entity_id, timestamp)
  - get_kdata_schema correctly resolves entity_type+level+adjust_type to schema class
  - Query results respect start/end timestamp filters
- id: factor_computation
  name: Factor Computation
  order: 4
  responsibility: Transform raw kdata into trading signals using Transformer (stateless)
    and Accumulator (stateful) patterns with optional persistence. Computes data_df
    through pipe_df to factor_df to result_df pipeline.
  interface:
    inputs:
    - description: MultiIndex DataFrame of kdata (entity_id, timestamp)
      name: data_df
    - description: Stateless column transformations (e.g., MaTransformer)
      name: transformer
    - description: Stateful rolling computations with acc_window
      name: accumulator
    outputs:
    - description: Intermediate transformed DataFrame
      name: pipe_df
    - description: Factor indicator values with filter_result/score_result
      name: result_df
  required_methods:
  - name: Factor.compute
    description: 'Main factor computation: data_df->pipe_df->factor_df->result_df
      pipeline'
    evidence: src/zvt/contract/factor.py:188
  - name: Factor.do_compute
    description: Apply transformer to compute pipe_df
    evidence: src/zvt/contract/factor.py:434-449
  - name: Factor.pre_compute
    description: Pre-compute hook executed before transformer/accumulator
    evidence: src/zvt/contract/factor.py:434
  key_behaviors:
  - behavior: Transformer.accumulator pattern
    description: Separates stateless/statful logic; Transformer handles MA/MACD, Accumulator
      handles state for rolling calculations
    evidence: factor.py:403-412
  - behavior: Memory optimization via persistence
    description: factor_df can be persisted; data_df kept only for computing_window;
      reading from DB resumes from latest_saved_record
    evidence: factor.py:306-330
  - behavior: Fill gap behavior control
    description: fill_gap() only when keep_all_timestamp=True; gap-filling is slow
      and disabled by default for performance
    evidence: factor.py:428-429
  replaceable_points:
  - name: transformer
    description: Stateless transform function applied to data
    options:
    - name: MaTransformer
      traits:
      - Fast
      - Stateless
      fit_for:
      - Simple moving averages, price transformations
      not_fit_for:
      - Stateful calculations, rolling metrics
    - name: MacdTransformer
      traits:
      - Trend-following
      fit_for:
      - Trend analysis, momentum indicators
      not_fit_for:
      - Mean reversion strategies
    default: None
  - name: accumulator
    description: Stateful accumulation function with rolling window
    options:
    - name: MaStatsAccumulator
      traits:
      - Stateful
      - Window-based
      fit_for:
      - Rolling statistics, consecutive period counting
      not_fit_for:
      - Point-in-time calculations
    default: None
  - name: fill_method
    description: Method to fill missing data points
    options:
    - name: ffill
      traits:
      - No lookahead bias
      fit_for:
      - Forward-looking strategies
      not_fit_for:
      - Back-looking indicators
    - name: bfill
      traits:
      - Uses future data
      fit_for:
      - Backward-looking calculations
      not_fit_for:
      - Forward-looking strategies
    - name: None
      traits:
      - Raw data only
      fit_for:
      - When no fill is desired
      not_fit_for:
      - Strategies requiring complete data
    default: ffill
  design_decisions:
  - Transformer.accumulator pattern separates stateless/statful logic; Transformer
    handles MA/MACD, Accumulator handles state for rolling calculations (factor.py:403-412)
  - factor_df can be persisted; data_df kept only for computing_window; memory optimization
    by reading from DB resumes from latest_saved_record (factor.py:306-330)
  - fill_gap() only when keep_all_timestamp=True; gap-filling is slow and disabled
    by default for performance (factor.py:428-429)
  - 'Factor compute pipeline order: pre_compute -> do_compute (transformer->accumulator)
    -> after_compute (fill_gap->persist); skipping pre_compute leaves pipe_df None
    breaking transformer (factor.py:434-449)'
  acceptance_hints:
  - Factor.compute() produces result_df with filter_result or score_result columns
  - Transformer.transform() is applied before Accumulator.accumulate() (order matters)
  - Factor correctly handles entity-level grouping via groupby level 0 (entity_id)
- id: technical_indicators
  name: Technical Indicators
  order: 5
  responsibility: Implement specific technical analysis algorithms (MA, MACD, Bollinger
    Bands) as Transformer/Accumulator subclasses for factor use. Provides building
    blocks for quantitative trading strategies.
  interface:
    inputs:
    - description: pd.Series of close prices or DataFrame with OHLCV
      name: price_data
    - description: MA window sizes (e.g., [5, 10, 20])
      name: windows
    - description: MACD parameters (slow, fast, signal)
      name: macd_params
    outputs:
    - description: DataFrame with indicator columns (ma5, ma10, diff, dea, macd)
      name: indicator_df
  required_methods:
  - name: ma
    description: Simple moving average computation
    evidence: src/zvt/factors/algorithm.py:9
  - name: ema
    description: Exponential moving average computation
    evidence: src/zvt/factors/algorithm.py:9
  - name: macd
    description: MACD indicator with diff/dea/macd columns
    evidence: src/zvt/factors/algorithm.py:30
  - name: MaTransformer.transform
    description: Batch MA computation with multiple windows per entity
    evidence: src/zvt/factors/algorithm.py:150
  - name: MacdTransformer.transform
    description: MACD computation per entity group
    evidence: src/zvt/factors/algorithm.py:269
  key_behaviors:
  - behavior: Per-entity rolling operations
    description: groupby level 0 (entity_id) ensures correct per-entity calculation
      without cross-contamination
    evidence: algorithm.py:240-241
  - behavior: Normalize MACD option
    description: normal parameter normalizes MACD by dividing by price; enables cross-entity
      comparison
    evidence: algorithm.py:53-56
  replaceable_points:
  - name: windows
    description: MA window sizes for moving average calculation
    options:
    - name: '[5, 10]'
      traits:
      - Fast response
      - Noisy
      fit_for:
      - Short-term trading, high-frequency signals
      not_fit_for:
      - Long-term strategies
    - name: '[20, 60]'
      traits:
      - Smoother
      - Lagging
      fit_for:
      - Medium-term strategies, trend following
      not_fit_for:
      - Day trading
    default: '[5, 10]'
  - name: slow/fast/n
    description: MACD parameters (slow, fast, signal periods)
    options:
    - name: 26, 12, 9
      traits:
      - Traditional
      - Well-tested
      fit_for:
      - Standard technical analysis
      not_fit_for:
      - Custom market cycles
    default: 26, 12, 9
  design_decisions:
  - groupby level 0 (entity_id) for per-entity rolling operations ensures correct
    per-entity calculation without cross-contamination (algorithm.py:240-241)
  - normal parameter normalizes MACD by dividing by price; enables cross-entity comparison
    but defaults to False for raw signal interpretation (algorithm.py:53-56)
  - MaFactor default windows=[5,10,34,55,89,144,120,250] encode Fibonacci business
    logic; changing defaults breaks historical comparisons (ma_factor.py:58)
  acceptance_hints:
  - ma() and macd() return correct values matching known technical analysis libraries
  - MaTransformer groups by entity_id before computing rolling windows
  - Indicator values are correctly aligned with input price timestamps
- id: target_selection
  name: Target Selection
  order: 6
  responsibility: Convert factor outputs into actionable trading targets (positive/negative/keep)
    using scoring and thresholding. Filters entity_ids based on factor results for
    trading execution.
  interface:
    inputs:
    - description: Factor DataFrame with filter_result or score_result columns
      name: factor_df
    - description: Selection type (positive, negative, keep)
      name: target_type
    outputs:
    - description: List of entity_ids meeting selection criteria
      name: target_list
  required_methods:
  - name: Factor.get_targets
    description: Returns entity_ids filtered by TargetType (positive/negative/keep)
    evidence: src/zvt/contract/factor.py:550
  - name: RankScorer
    description: Ranks entities per timestamp based on score
    evidence: src/zvt/factors/algorithm.py:141
  key_behaviors:
  - behavior: Boolean filter on result_df
    description: get_targets filters on result_df['filter_result'] boolean; simple
      filtering with boolean mask allows flexible criteria
    evidence: factor.py:550-570
  - behavior: Multi-level target combination
    description: Long targets use intersection (must pass all levels = conservative),
      short targets use union (any level triggers = aggressive)
    evidence: trader.py:200-221
  replaceable_points:
  - name: filter_result evaluation
    description: Method to determine positive/negative targets
    options:
    - name: threshold
      traits:
      - Simple
      - Fast
      fit_for:
      - Simple binary signals
      not_fit_for:
      - Relative ranking
    - name: rank percentile
      traits:
      - Relative
      - Adaptive
      fit_for:
      - Relative strength comparison
      not_fit_for:
      - Absolute signal strategies
    default: threshold
  - name: on_factor_targets_filtered
    description: Maximum number of long targets
    options:
    - name: limit 10
      traits:
      - Diversified
      - Conservative
      fit_for:
      - Diversified portfolio, risk management
      not_fit_for:
      - Concentrated positions
    default: limit 10
  design_decisions:
  - get_targets filters on result_df['filter_result'] boolean; simple filtering with
    boolean mask allows flexible criteria (factor.py:550-570)
  - Long targets intersection, short targets union across levels; conservative for
    long (must pass all levels), aggressive for short (any level triggers) (trader.py:200-221)
  - StockTrader max 10 long targets limit enforced in on_factor_targets_filtered;
    increasing without adjusting position sizing causes under-diversification (trader.py:347-349)
  acceptance_hints:
  - Factor.get_targets() returns correct entity_ids based on filter_result
  - get_targets() respects timestamp ordering for time-series target selection
  - Long targets correctly require all factor levels to pass
- id: trading_account
  name: Trading Account
  order: 7
  responsibility: Manage cash, positions, orders with profit/loss tracking. Supports
    both simulated and live broker execution. Provides position management, P&L calculation,
    and order lifecycle management.
  interface:
    inputs:
    - description: TradingSignal list with entity_id, due_timestamp, position_pct
      name: signals
    - description: Initial capital for simulation
      name: base_capital
    outputs:
    - description: Position updates and Order records
      name: orders
    - description: 'Account snapshot: cash, value, positions, profit_rate'
      name: account_stats
  required_methods:
  - name: SimAccountService
    description: Simulation account with position tracking and P&L calculation
    evidence: src/zvt/trader/sim_account.py:25
  - name: SimAccountService.sub_order
    description: Open or close position based on signal
    evidence: src/zvt/trader/sim_account.py:180
  - name: SimAccountService.get_current_value
    description: Calculate current account value including positions
    evidence: src/zvt/trader/sim_account.py:270
  key_behaviors:
  - behavior: Auto-fund in rich_mode
    description: rich_mode=True auto-inputs money when insufficient; simulation convenience
      (production should use NotEnoughMoneyError)
    evidence: sim_account.py:356-357
  - behavior: Profit/loss thresholds
    description: profit_threshold (3, -0.3) default for stop-loss/take-profit; 3%
      take-profit, -30% stop-loss
    evidence: trader.py:44
  - behavior: Slippage modeling
    description: Slippage 0.001 (0.1%) applied to both buy and sell; conservative
      for simulation realism
    evidence: sim_account.py:49, 354, 397
  replaceable_points:
  - name: rich_mode
    description: Auto-fund account when cash insufficient
    options:
    - name: 'True'
      traits:
      - No capital constraints
      - Convenient
      fit_for:
      - Backtesting with full capital assumption
      not_fit_for:
      - Realistic capital constraint testing
    - name: 'False'
      traits:
      - Realistic
      - Constrained
      fit_for:
      - Realistic trading simulation
      not_fit_for:
      - Maximum capital efficiency tests
    default: 'True'
  - name: base_capital
    description: Initial simulation capital
    options:
    - name: '1000000'
      traits:
      - Common retail size
      fit_for:
      - Standard retail trading simulation
      not_fit_for:
      - High-capital strategies
    default: '1000000'
  - name: profit_threshold
    description: Take-profit and stop-loss percentages as (profit_threshold, loss_threshold)
    options:
    - name: (3, -0.3)
      traits:
      - 3% profit, 30% max loss
      fit_for:
      - Conservative profit taking
      not_fit_for:
      - Long-term holding strategies
    default: (3, -0.3)
  design_decisions:
  - rich_mode=True auto-inputs money when insufficient; simulation convenience; production
    should use NotEnoughMoneyError (sim_account.py:356-357)
  - profit_threshold (3, -0.3) default for stop-loss/take-profit; 3% take-profit,
    -30% stop-loss; business rule baked into Trader defaults (trader.py:44)
  - Slippage 0.001 (0.1%) applied to both buy and sell; conservative slippage for
    simulation realism; actual costs vary by broker (sim_account.py:49, 354, 397)
  - Slippage 0.001 and buy_cost/sell_cost 0.001 encode 0.3% round-trip friction for
    simulation realism (sim_account.py:34-36)
  acceptance_hints:
  - Account correctly tracks positions and cash after each trade
  - Stop-loss and take-profit triggers correctly close positions
  - P&L calculation matches manual verification
- id: trading_execution
  name: Trading Execution
  order: 8
  responsibility: Convert factor signals to trading actions; manage due_timestamp
    timing, position sizing, and order lifecycle. Orchestrates the trading loop by
    iterating timestamps, calling factors, and emitting signals.
  interface:
    inputs:
    - description: TradingSignal list from factors, current account state
      name: signals_and_state
    - description: Minimum time level for multi-timeframe trading
      name: level
    outputs:
    - description: Orders executed via account_service
      name: executed_orders
  required_methods:
  - name: Trader.run
    description: Main trader orchestrator; iterates timestamps, calls factors, emits
      signals
    evidence: src/zvt/trader/trader.py:26
  - name: order_by_position_pct
    description: Convert TradingSignal to order using position_pct
    evidence: src/zvt/trader/sim_account.py:474
  key_behaviors:
  - behavior: due_timestamp execution timing
    description: due_timestamp = timestamp + level.to_second() for execution at next
      candle; allows signal processing before execution
    evidence: trader.py:283-284
  - behavior: Equal-weight diversification
    description: position_pct split equally among targets, then multiplied by position_control;
      long_position_control limits total exposure
    evidence: trader.py:280-281
  - behavior: Multi-level target caching
    description: Targets cached then combined at min level; enables cross-timeframe
      strategies (daily filter + minute execution)
    evidence: trader.py:164-178
  - behavior: Sell before buy ordering
    description: Trader.run() executes sell BEFORE buy in each cycle; reversing would
      cause position conflicts when closing and opening same stock
    evidence: trader.py:511-514
  replaceable_points:
  - name: long_position_control
    description: Capital allocation percentage based on current positions
    options:
    - name: 0.2 if no positions, 0.5 if <10 positions
      traits:
      - Diversified
      - Conservative
      fit_for:
      - Conservative position sizing
      not_fit_for:
      - Aggressive allocation
    default: 0.2/0.5
  - name: on_factor_targets_filtered
    description: Post-factor target filtering limit
    options:
    - name: limit 10
      traits:
      - Max 10 holdings
      fit_for:
      - Diversified portfolios
      not_fit_for:
      - Concentrated bets
    default: limit 10
  design_decisions:
  - due_timestamp = timestamp + level.to_second() for execution at next candle; allows
    signal processing before execution (trader.py:283-284)
  - position_pct split equally among targets, then multiplied by position_control;
    equal-weight diversification; long_position_control limits total exposure (trader.py:280-281)
  - Multi-level targets cached then combined at min level; enables cross-timeframe
    strategies (daily filter + minute execution) (trader.py:164-178)
  - Trader.run() executes sell BEFORE buy in each cycle; reversing would cause position
    conflicts when closing and opening same stock (trader.py:511-514)
  - TradingSignal requires exactly ONE of position_pct, order_money, or order_money;
    assertion fails if zero or multiple order parameters (trader/__init__.py:68)
  - position_pct default 0.2 (20%) per trade when no positions, 0.5 when <10 positions;
    conservative position sizing; caps at 10 holdings (trader.py:232-241)
  - Trader profit_threshold=(3, -0.3) encodes 3% stop profit / -30% stop loss business
    rules (trader.py:44)
  acceptance_hints:
  - Trader correctly executes sells before buys in each cycle
  - due_timestamp equals timestamp + level.to_second() for all TradingSignals
  - Position sizing respects long_position_control limits
