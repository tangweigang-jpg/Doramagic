- name: china_stock_kdata_provider
  description: Use East Money for free daily batch ingestion; switch to JoinQuant
    for minute-level licensed data; use QMT only when live trading on Windows is required
  options:
  - name: East Money (eastmoney)
    traits:
    - free
    - no-signup
    - web-scraping
    - daily+intraday
    fit_for:
    - General daily kdata, fundamental data without API subscription
    not_fit_for:
    - High-frequency or tick data; ToS compliance risk
  - name: JoinQuant (joinquant)
    traits:
    - official-API
    - 1m-to-1M
    - adjusted
    - fundamental
    fit_for:
    - Reliable minute-level kdata with official license
    not_fit_for:
    - Tick/L2 data; requires paid subscription above free tier
  - name: QMT (qmt)
    traits:
    - real-time
    - tick
    - L2
    - Windows-only
    - broker-bundled
    fit_for:
    - Live trading with real-time quotes and order execution
    not_fit_for:
    - Linux/macOS deployment; historical research without QMT account
  - name: Sina Finance (sina)
    traits:
    - free
    - ETF-only
    - daily
    fit_for:
    - ETF kdata supplement only
    not_fit_for:
    - Stocks, indices, or intraday data
  default: East Money (eastmoney)
  _source: worker_resource
- name: storage_backend
  description: Implement StorageBackend ABC (src/zvt/contract/storage.py:38) and call
    set_storage_backend(); SQLite sufficient for single-machine use
  options:
  - name: SQLite (SqliteStorageBackend)
    traits:
    - embedded
    - file-based
    - zero-config
    - single-writer
    fit_for:
    - Single-node research and backtesting on local disk
    not_fit_for:
    - Multi-process concurrent writes; distributed deployment
  - name: PostgreSQL (custom StorageBackend)
    traits:
    - concurrent-writes
    - network-accessible
    - scalable
    fit_for:
    - Multi-process recorders, production deployment
    not_fit_for:
    - Lightweight local setups; requires server management
  default: SQLite (SqliteStorageBackend)
  _source: worker_resource
- name: notification_channel
  description: All three implement the Informer.send_message() interface; choose based
    on recipient channel and setup availability
  options:
  - name: EmailInformer (SMTP)
    traits:
    - universal
    - async-optional
    - batch-friendly
    fit_for:
    - Scheduled report delivery to multiple recipients
    not_fit_for:
    - Real-time instant alerts
  - name: WechatInformer (WeChat Official Account)
    traits:
    - push
    - template-message
    - mobile
    fit_for:
    - Mobile push notifications to individual WeChat users
    not_fit_for:
    - Bulk broadcast; requires WeChat Official Account approval
  - name: QiyeWechatBot (WeChat Work Robot)
    traits:
    - webhook
    - group-channel
    - instant
    fit_for:
    - Team/group instant alerts via WeChat Work webhook
    not_fit_for:
    - Individual user push
  default: EmailInformer (SMTP)
  _source: worker_resource
- name: ai_llm_provider
  description: Change base_url and api_key + model name in ai_suggestion.py; all three
    are OpenAI-API-compatible. Qwen preferred for Chinese text.
  options:
  - name: Alibaba Qwen (qwen-max via DashScope)
    traits:
    - Chinese-optimized
    - OpenAI-compatible-API
    - cloud
    fit_for:
    - Chinese financial news analysis (native language model)
    not_fit_for:
    - English-only or offline scenarios
  - name: Moonshot Kimi
    traits:
    - Chinese-optimized
    - long-context
    - cloud
    fit_for:
    - Long financial document analysis
    not_fit_for:
    - Real-time latency-sensitive tasks
  - name: OpenAI GPT-4o
    traits:
    - multilingual
    - high-accuracy
    - cloud
    fit_for:
    - High-quality multilingual analysis
    not_fit_for:
    - Cost-sensitive workloads on large news volume
  default: Alibaba Qwen (qwen-max via DashScope)
  _source: worker_resource
- name: macro_data_provider
  description: World Bank covers global multi-country data; FRED is better for US-centric
    strategies needing monthly resolution
  options:
  - name: World Bank Open Data API
    traits:
    - free
    - annual/quarterly
    - global
    - no-auth
    fit_for:
    - Long-term country-level macroeconomic research
    not_fit_for:
    - High-frequency macro (monthly CPI releases)
  - name: FRED API (Federal Reserve)
    traits:
    - free
    - US-focused
    - high-frequency
    - api-key
    fit_for:
    - US macro indicators at higher frequency
    not_fit_for:
    - Non-US country data
  default: World Bank Open Data API
  _source: worker_resource
