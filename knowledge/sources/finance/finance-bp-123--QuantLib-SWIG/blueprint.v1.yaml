  rationale: Implied volatility calculation performs numerical root-finding to determine
    the volatility that produces the observed market price. The pricing engine must
    be configured and NPV calculated first; the impliedVolatility() method then uses
    that NPV as the target for the solver. Skipping the NPV step or passing wrong
