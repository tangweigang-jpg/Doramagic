id: finance-bp-123
name: QuantLib-SWIG
sop_version: '3.6'
source:
  projects:
  - QuantLib-SWIG
  commit_hash: 1f2a771803f80fd6d06fbf9bfd028fe93ca728e5
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Quantitative finance pricing and risk management library with multi-language
    bindings
  description: SWIG-based language bindings for QuantLib enabling financial instrument
    pricing, curve bootstrapping, and risk calculation from Python, C#, Java, and
    other languages.
  prerequisites: Understanding of quantitative finance concepts (options, swaps, yield
    curves), C++ compilation, SWIG interface definition, Python or other target language
    familiarity
  not_suitable_for: Simple spreadsheet-based calculations, non-financial applications,
    projects lacking C++ build infrastructure, real-time trading systems requiring
    sub-millisecond latency
stages:
- id: swig_interface_definition
  name: SWIG Interface Definition
  order: 1
  responsibility: Define C++ to Python bindings via SWIG interface files (.i files)
    that control what is exposed to the target language, enabling cross-language interoperability
    for QuantLib's C++ core
  interface:
    inputs:
    - C++ QuantLib headers
    - SWIG .i interface files
    outputs:
    - Python extension module (_QuantLib.pyd/.so)
  required_methods:
  - name: ql.i module inclusion
    description: Main entry point that includes each module .i files, orchestrating
      which parts of QuantLib are exposed
    evidence: SWIG/ql.i:115-196(include)
  - name: PyObserver callback registration
    description: Python-only wrapper for Observer pattern enabling Python callbacks
      to receive market data updates without C++ template overhead
    evidence: SWIG/observer.i:74-80(class PyObserver)
  - name: Handle template instantiation
    description: Exposes Handle<T> and RelinkableHandle<T> templates for lazy evaluation
      and observer notifications
    evidence: SWIG/termstructures.i:94-95(%template)
  key_behaviors:
  - behavior: One .i file per module organization
    description: Each financial domain (options, swaps, bonds, etc.) has its own interface
      definition file, enabling separation of concerns and incremental builds
    evidence: SWIG/ql.i:115-196(include)
  - behavior: Thread-safe observer pattern for JVM/.NET
    description: Async garbage collectors in JVM/.NET can cause crashes without thread-safe
      observer pattern; C++ default is not thread-safe
    evidence: SWIG/ql.i:37-56(#if defined)
  - behavior: Minimum version enforcement
    description: Version 1.42 required for SWIG bindings to function correctly
    evidence: SWIG/ql.i:33-35(#if QL_HEX_VERSION)
  replaceable_points:
  - name: Monte Carlo random sequence
    description: Random number generation method for Monte Carlo pricing engines
    options:
    - name: pseudorandom
      traits:
      - standard RNG
      - deterministic with seed
      fit_for:
      - General pricing
      - reproducibility required
      not_fit_for:
      - Quasi-Monte Carlo analysis
      - low-discrepancy sequences
    - name: lowdiscrepancy
      traits:
      - Sobol sequences
      - faster convergence
      fit_for:
      - High-dimensional problems
      - path-dependent options
      not_fit_for:
      - Debugging
      - result verification
    default: pseudorandom
  design_decisions:
  - One .i file per module (options, swap, bonds, etc.) - Separation of concerns and
    incremental builds; each financial domain has its own interface definition (SWIG/ql.i:115-196)
  - Python-only PyObserver wrapper for Observer pattern - Enables Python callbacks
    to receive market data updates without C++ template overhead (SWIG/observer.i:74-80)
  - Handle<T> and RelinkableHandle<T> templates exposed - Lazy evaluation and observer
    pattern require indirection; Handle allows curves to be relinked after construction
    (SWIG/termstructures.i:94-95)
  - Thread-safe observer pattern warning for JVM/.NET - Async garbage collectors in
    JVM/.NET can cause crashes without thread-safe observer; C++ default is not thread-safe
    (SWIG/ql.i:37-56)
  acceptance_hints:
  - Extension module compiles without errors for target language
  - PyObserver callbacks successfully receive market data notifications
  - Handle types correctly trigger recalculation when underlying values change
- id: market_data_construction
  name: Market Data Construction
  order: 2
  responsibility: Build observable market data objects (Quotes, curves, volatility
    surfaces) from raw values, wrapping them in Handle types to enable the observer
    pattern for automatic recalculation
  interface:
    inputs:
    - Market quotes (rates, prices, volatilities)
    - Day count conventions
    - Calendar definitions
    outputs:
    - QuoteHandle, YieldTermStructureHandle, BlackVolTermStructureHandle
  required_methods:
  - name: SimpleQuote construction
    description: Create single observable price/rate value that can be updated
    evidence: Python/examples/european-option.py:61
  - name: FlatForward curve creation
    description: Build constant rate term structure from a single rate
    evidence: Python/examples/european-option.py:62
  - name: BlackConstantVol setup
    description: Create constant volatility surface for option pricing
    evidence: Python/examples/european-option.py:63
  - name: PiecewiseFlatForward bootstrapping
    description: Bootstrap yield curve from market instruments (deposits, futures,
      swaps)
    evidence: Python/examples/swap.py:177
  key_behaviors:
  - behavior: QuoteHandle wrapping requirement
    description: Quotes must be wrapped in QuoteHandle; raw values bypass the observable
      mechanism and won't trigger recalculation
    evidence: Python/examples/swap.py:99(QuoteHandle)
  - behavior: Double-wrapping pattern
    description: Quotes require SimpleQuote(value) wrapping before QuoteHandle conversion
      for dynamic updates
    evidence: Python/examples/swap.py:82-89(SimpleQuote, QuoteHandle)
  - behavior: RelinkableHandle for reassignment
    description: RelinkableYieldTermStructureHandle allows curve reassignment; regular
      Handle is immutable
    evidence: Python/examples/swap.py:173(RelinkableYieldTermStructureHandle)
  - behavior: Ordered helper bootstrapping
    description: PiecewiseFlatForward requires helpers ordered by maturity (shortest
      first) for correct bootstrap results
    evidence: Python/examples/swap.py:176-177(depositHelpers + futuresHelpers + swapHelpers)
  replaceable_points:
  - name: Curve bootstrap method
    description: How to construct curve from market instruments
    options:
    - name: PiecewiseFlatForward
      traits:
      - constant forward rates
      - simple interpolation
      fit_for:
      - Standard swaps
      - general purpose curves
      not_fit_for:
      - Smooth forward curves required
      - ' spline-based fitting'
    - name: PiecewiseCubicForward
      traits:
      - smooth forward rates
      - cubic spline
      fit_for:
      - Interpolation-heavy use cases
      - 、曲面拟合
      not_fit_for:
      - Simple bootstrapping
      - computational efficiency priority
    - name: FittedBondCurve
      traits:
      - bond-specific fitting
      - parametric model
      fit_for:
      - Government bonds
      - curve from bond prices
      not_fit_for:
      - Swap curves
      - instruments with optionality
    default: PiecewiseFlatForward
  - name: Volatility surface type
    description: Constant vs local/stochastic vol surface representation
    options:
    - name: BlackConstantVol
      traits:
      - single volatility value
      - flat surface
      fit_for:
      - European options
      - simple pricing
      not_fit_for:
      - Volatility smile
      - local/stochastic vol models
    - name: LocalVolSurface
      traits:
      - strike-dependent vol
      - volatility smile
      fit_for:
      - Vol surface calibration
      - barrier options
      not_fit_for:
      - Simple pricing
      - constant vol assumption acceptable
    - name: SwaptionVolatilityCube
      traits:
      - term structure of swaption vols
      - 3D vol cube
      fit_for:
      - Swaption pricing
      - vol surface arbitrage-free
      not_fit_for:
      - Single asset options
      - equity derivatives
    default: BlackConstantVol
  design_decisions:
  - Quotes must be wrapped in QuoteHandle - Handle pattern enables observer notifications;
    raw values bypass the observable mechanism (Python/examples/swap.py:99)
  - PiecewiseFlatForward bootstraps from rate helpers - Market-implied curve shape
    from traded instruments; can't just interpolate arbitrary points (Python/examples/swap.py:176-177)
  - RelinkableHandle for forecast curves - Allows swapping forecast curve (e.g., from
    different bootstraps) without recreating instruments (Python/examples/swap.py:173)
  acceptance_hints:
  - YieldTermStructureHandle successfully passes to pricing engines
  - Updating SimpleQuote value triggers recalculation of dependent instruments
  - Bootstrap completes without errors and produces sensible curve values
- id: instrument_definition
  name: Instrument Definition
  order: 3
  responsibility: Define financial instruments (options, swaps, bonds) with payoff
    and exercise features, creating configured instrument objects ready for pricing
    engine attachment
  interface:
    inputs:
    - Payoff, Exercise, Schedule
    - Term structure handles
    outputs:
    - Configured instrument object (VanillaOption, VanillaSwap, FixedRateBond)
  required_methods:
  - name: VanillaOption construction
    description: Create European option with payoff and exercise specifications
    evidence: Python/examples/european-option.py:55
  - name: PlainVanillaPayoff definition
    description: Define call/put payoff function with strike price
    evidence: Python/examples/european-option.py:52
  - name: EuropeanExercise specification
    description: Define single expiry exercise type
    evidence: Python/examples/european-option.py:51
  - name: VanillaSwap construction
    description: Create fixed vs floating interest rate swap with schedule
    evidence: Python/examples/swap.py:235
  - name: Schedule generation
    description: Generate payment date schedule from start/end/tenor with calendar
      conventions
    evidence: Python/examples/swap.py:210-229
  key_behaviors:
  - behavior: Instrument-engine separation
    description: Instrument does not hold pricing engine directly; same instrument
      can use different engines via setPricingEngine()
    evidence: SWIG/instruments.i:54(setPricingEngine)
  - behavior: Schedule with conventions embedded
    description: Calendars and conventions embedded in schedule; avoids manual date
      calculation errors
    evidence: Python/examples/swap.py:210-229(Schedule)
  - behavior: DateGeneration direction matters
    description: DateGeneration.Forward vs Backward changes schedule direction and
      affects maturity dates
    evidence: Python/examples/swap.py:217(DateGeneration.Forward)
  - behavior: Swap leg access variation
    description: Different swap types require different accessor methods; leg indexing
      varies (leg(n) vs fixedLeg()/floatingLeg())
    evidence: Python/examples/gaussian1d-models.py:380-381(leg(0), leg(1))
  replaceable_points:
  - name: Payoff type
    description: How payoff is calculated at exercise
    options:
    - name: PlainVanillaPayoff
      traits:
      - call/put with strike
      - standard payoff
      fit_for:
      - Vanilla options
      - general European options
      not_fit_for:
      - Exotic payoffs
      - digital options
    - name: CashOrNothingPayoff
      traits:
      - fixed payout if in-the-money
      - binary
      fit_for:
      - Binary options
      - cash-settled digitals
      not_fit_for:
      - Vanilla options
      - equity-style payoffs
    - name: AssetOrNothingPayoff
      traits:
      - asset delivery if in-the-money
      - binary
      fit_for:
      - Asset-or-nothing digitals
      - barrier touch options
      not_fit_for:
      - Standard options
      - cash-settled products
    default: PlainVanillaPayoff
  - name: Exercise type
    description: When holder can exercise
    options:
    - name: EuropeanExercise
      traits:
      - single expiry date
      - closed-form available
      fit_for:
      - Standard options
      - Black-Scholes models
      not_fit_for:
      - Early exercise options
      - American Bermudan
    - name: AmericanExercise
      traits:
      - any business day before expiry
      - early exercise
      fit_for:
      - American equity options
      - bonds with put
      not_fit_for:
      - European options
      - closed-form pricing
    - name: BermudanExercise
      traits:
      - exercise on specific dates
      - multi-period
      fit_for:
      - Bermudan swaptions
      - multi-barrier options
      not_fit_for:
      - Simple European
      - continuous exercise
    default: EuropeanExercise
  design_decisions:
  - Instrument does not hold pricing engine directly - Separation of instrument definition
    from pricing method; same instrument can use different engines (SWIG/instruments.i:54)
  - Schedule generated from start/end/tenor - Calendars and conventions embedded in
    schedule; avoids manual date calculation errors (Python/examples/swap.py:210-229)
  - Swap uses Payer/Receiver enum not +/- - Explicit intent; Payer pays fixed/receives
    float, clearer than sign convention (Python/examples/swap.py:236)
  acceptance_hints:
  - VanillaOption correctly combines Payoff and Exercise objects
  - Schedule generates correct business day-adjusted payment dates
  - Cash flows can be inspected before pricing
- id: pricing_engine_attachment
  name: Pricing Engine Attachment
  order: 4
  responsibility: Attach pluggable pricing algorithm to instrument via setPricingEngine(),
    creating a configured stochastic process and selecting appropriate pricing methodology
  interface:
    inputs:
    - Configured instrument
    - Process (BlackScholesMertonProcess, HestonProcess)
    outputs:
    - Instrument with NPV() method functional
  required_methods:
  - name: setPricingEngine attachment
    description: Attach pricing engine to instrument, enabling NPV calculation
    evidence: Python/examples/european-option.py:102
  - name: BlackScholesMertonProcess creation
    description: Create 1D diffusion process with volatility, rates, dividends
    evidence: Python/examples/european-option.py:70
  - name: AnalyticEuropeanEngine initialization
    description: Instantiate closed-form Black-Scholes pricing engine
    evidence: Python/examples/european-option.py:102
  - name: HestonModel calibration
    description: Calibrate stochastic volatility model before pricing
    evidence: Python/examples/gaussian1d-models.py:203
  key_behaviors:
  - behavior: Process-model separation
    description: Process (simulation) vs Model (pricing) are separate; instruments
      take different object types - passing Process to engine expecting Model causes
      type errors
    evidence: Python/examples/european-option.py:70(BlackScholesMertonProcess)
  - behavior: Calibration before pricing
    description: Models require calibrate(helpers, method, endCriteria) before pricing;
      uncalibrated model produces incorrect NPV
    evidence: Python/examples/gaussian1d-models.py:203(calibrateVolatilitiesIterative)
  - behavior: Swaps require DiscountingSwapEngine
    description: Swaps return zero or error NPV without DiscountingSwapEngine with
      correct term structure
    evidence: Python/examples/swap.py:187(DiscountingSwapEngine)
  - behavior: Monte Carlo seed for reproducibility
    description: Different seeds give different random paths; seed=42 ensures reproducible
      results
    evidence: Python/examples/european-option.py:165(seed=42)
  replaceable_points:
  - name: Pricing method
    description: Algorithm to compute NPV
    options:
    - name: AnalyticEuropeanEngine
      traits:
      - closed-form Black-Scholes
      - instantaneous
      fit_for:
      - European options
      - vanilla payoffs
      not_fit_for:
      - American options
      - path-dependent products
    - name: FdBlackScholesVanillaEngine
      traits:
      - finite difference PDE
      - American capable
      fit_for:
      - American options
      - barrier options
      not_fit_for:
      - High-dimensional problems
      - quick vanilla pricing
    - name: MCEuropeanEngine
      traits:
      - Monte Carlo simulation
      - path-dependent
      fit_for:
      - Exotic options
      - complex payoffs
      not_fit_for:
      - Simple European
      - real-time pricing
    - name: BinomialVanillaEngine
      traits:
      - lattice tree method
      - American capable
      fit_for:
      - American options
      - early exercise
      not_fit_for:
      - Path-dependent exotics
      - high-dimensional
    - name: COSHestonEngine
      traits:
      - COS method for Heston
      - fast semi-analytic
      fit_for:
      - Heston model pricing
      - characteristic function methods
      not_fit_for:
      - Black-Scholes only
      - local vol models
    default: AnalyticEuropeanEngine
  - name: Model
    description: Underlying stochastic process for pricing
    options:
    - name: BlackScholesMertonProcess
      traits:
      - constant vol
      - lognormal diffusion
      fit_for:
      - Standard options
      - Black-Scholes pricing
      not_fit_for:
      - Vol smile modeling
      - stochastic vol products
    - name: HestonProcess
      traits:
      - stochastic vol
      - volatility smile
      fit_for:
      - Vol surface fitting
      - vanna/volga products
      not_fit_for:
      - Constant vol assumption acceptable
      - simple pricing
    - name: LocalVolProcess
      traits:
      - deterministic vol surface
      - vol smile
      fit_for:
      - Local vol calibration
      - Dupire pricing
      not_fit_for:
      - Stochastic vol products
      - Heston calibration
    - name: HestonSLVProcess
      traits:
      - stochastic local vol
      - combined model
      fit_for:
      - Vol surface with dynamics
      - barrier options
      not_fit_for:
      - Simple models
      - calibration simplicity
    default: BlackScholesMertonProcess
  design_decisions:
  - Process created separately from engine - Same process can price many instruments;
    changing vol model requires new process, not new engine (Python/examples/european-option.py:70-88)
  - Engine string parameter for tree types - JR, CRR, EQP, Tian, etc. are different
    tree constructions; avoids proliferating engine classes (Python/examples/european-option.py:155-156)
  - Monte Carlo requires seed parameter - Reproducibility; different seeds give different
    random paths (Python/examples/european-option.py:165)
  acceptance_hints:
  - setPricingEngine called before NPV() invocation
  - Process receives Handle objects at construction
  - Calibration converges within specified end criteria for model-based pricing
- id: npv_calculation
  name: NPV Calculation and Results
  order: 5
  responsibility: Trigger lazy evaluation, retrieve NPV and Greeks, inspect fair values
    and error estimates, providing the final pricing output
  interface:
    inputs:
    - Configured instrument with engine
    outputs:
    - NPV value, error estimate, Greeks (delta, gamma, etc.)
  required_methods:
  - name: Instrument.NPV
    description: Retrieve net present value calculation, triggering lazy evaluation
    evidence: SWIG/instruments.i:51
  - name: VanillaOption.errorEstimate
    description: Get Monte Carlo error estimate for confidence intervals
    evidence: Python/examples/european-option.py:169
  - name: VanillaSwap.fairRate
    description: Compute fair fixed rate that makes NPV zero
    evidence: Python/test/test_swap.py:124
  - name: impliedVolatility calculation
    description: Solve for implied vol given market price, requires NPV first
    evidence: Python/test/test_capfloor.py:79-84
  key_behaviors:
  - behavior: Lazy evaluation
    description: Instrument inherits from LazyObject; calculation deferred until NPV()
      called
    evidence: 'SWIG/instruments.i:49(class Instrument : LazyObject)'
  - behavior: Fair value adjustments
    description: Fair value methods (fairSpread, fairRate, fairMargin) find NPV=0
      parameter via root-finding
    evidence: Python/test/test_swap.py:96(fairRate)
  - behavior: Fair rate from NPV derivative
    description: Root-finding on NPV(w.r.t. rate) = 0; requires numerical differentiation
    evidence: Python/test/test_swap.py:96(fairRate)
  - behavior: Implied vol requires pricing first
    description: Cannot calculate implied vol without first pricing the instrument
    evidence: Python/test/test_capfloor.py:79-84
  replaceable_points: []
  design_decisions:
  - NPV is lazily evaluated - Instrument inherits from LazyObject; calculation deferred
    until NPV() called (SWIG/instruments.i:49)
  - Fair value calculations adjust instrument to NPV=0 - Fair value is the market-consistent
    rate; NPV should be zero at fair value (Python/test/test_swap.py:96)
  - Fair rate/spread computed from NPV derivative - Root-finding on NPV(w.r.t. rate)
    = 0; requires numerical differentiation (Python/test/test_swap.py:96)
  acceptance_hints:
  - NPV returns sensible value for given market data
  - Fair rate/spread produces NPV close to zero when applied
  - Monte Carlo error estimate is within acceptable tolerance
data_flow:
- from_stage: market_data_construction
  to_stage: instrument_definition
  data: YieldTermStructureHandle, BlackVolTermStructureHandle passed to pricing process/engine
- from_stage: market_data_construction
  to_stage: pricing_engine_attachment
  data: StochasticProcess receives Handle objects at construction for simulation
- from_stage: instrument_definition
  to_stage: pricing_engine_attachment
  data: Configured instrument receives PricingEngine via setPricingEngine() method
- from_stage: pricing_engine_attachment
  to_stage: npv_calculation
  data: Instrument.calculate() triggers NPV() which calls engine.calculate() for final
    results
global_contracts:
- contract: evaluationDate via Settings.instance().evaluationDate controls each time-based
    calculations - Yield curves, option expiry, fixing dates each relative to evaluation
    date (Python/examples/european-option.py:42)
  evidence: ''
- contract: Every market data wrapped in Handle types for observer pattern - QuoteHandle
    enables automatic recalculation when quote changes (Python/examples/swap.py:99)
  evidence: ''
- contract: DayCounter determines time fraction calculations - 1Y in Act/365 != 1Y
    in Act/360; wrong day counter means wrong rates (Python/examples/swap.py:95)
  evidence: ''
- contract: Calendar determines business days and holidays - Payment dates roll forward/back
    to business days per calendar (Python/examples/swap.py:41)
  evidence: ''
- contract: setPricingEngine() MUST be called before NPV() on each instruments - NPV()
    returns error or incorrect result without pricing engine set (Python/examples/european-option.py:102)
  evidence: ''
- contract: ql.Settings.instance().evaluationDate MUST be set before any pricing -
    Pricing uses system date by default, causing incorrect valuation dates (Python/examples/european-option.py:42)
  evidence: ''
- contract: 'Settlement days default varies: bonds often 3 days, swaps typically 2
    days - Settlement date mismatch causes pricing discrepancies across asset classes
    (Python/test/test_bonds.py:26, Python/test/test_swap.py:54)'
  evidence: ''
- contract: AddFixing requires date ordering - Adding past fixings after future ones
    fails; fixing sequence must be maintained (Python/test/test_inflation.py:95)
  evidence: ''
business_decisions:
- id: BD-001
  type: B
  content: One .i file per module (options, swap, bonds, etc.)
  rationale: 'SWIG interface files are organized by financial domain (options, swap,
    bonds) to achieve separation of concerns and enable incremental builds. Each module
    exposes only its relevant instrument types, preventing circular dependencies.
    Boundary: Adding new instruments requires creating or modifying the corresponding
    .i file and rebuilding SWIG bindings.'
  evidence: SWIG/ql.i:115-196(include)
  stage: swig_interface_definition
  alternative_considered: Single monolithic .i file was rejected due to circular dependency
    risk and slower incremental builds
- id: BD-002
  type: BA/DK
  content: Python-only PyObserver wrapper for Observer pattern
  rationale: 'Python callbacks for market data updates use PyObserver wrapper instead
    of direct C++ template instantiation to avoid template instantiation complexity
    in Python. This provides a clean bridge between Python callables and C++ observer
    pattern without requiring Python users to understand C++ templates. Boundary:
    PyObserver only works for Python; other languages must implement their own observer
    mechanisms.'
  evidence: SWIG/observer.i:74-80(class PyObserver)
  stage: swig_interface_definition
  alternative_considered: Direct template instantiation in Python was rejected due
    to template complexity and compilation overhead
- id: BD-003
  type: M
  content: Handle<T> and RelinkableHandle<T> templates exposed via SWIG
  rationale: 'Handle<T> provides lazy evaluation and indirection required by the observer
    pattern. Curves and processes must be wrapped in handles to support the notification
    mechanism and allow relinking after construction. Boundary: Handle types must
    be used consistently; raw pointers bypass the observable mechanism and break lazy
    evaluation.'
  evidence: SWIG/termstructures.i:94-95(%template)
  stage: swig_interface_definition
  alternative_considered: Direct object references were rejected because they prevent
    curve relinking and lazy evaluation
- id: BD-004
  type: BA/DK
  content: Thread-safe observer pattern warning for JVM/.NET platforms
  rationale: 'JVM and .NET async garbage collectors can move objects during mark phase,
    causing crashes when observer callbacks fire during GC. The C++ default observer
    pattern is not thread-safe and requires platform-specific guards. Boundary: This
    warning applies only to JVM/.NET bindings; C++ usage is unaffected. Python GIL
    provides implicit safety.'
  evidence: SWIG/ql.i:37-56(#if defined)
  stage: swig_interface_definition
  alternative_considered: Always-enabled thread safety was rejected due to performance
    overhead for C++ single-threaded use cases
- id: BD-005
  type: BA/DK
  content: Quotes must be wrapped in QuoteHandle
  rationale: 'QuoteHandle enables the observer notification system for market data
    updates. Raw values bypass the observable mechanism, meaning instruments would
    not receive price updates automatically. Boundary: Every quotes passed to term
    structures must use QuoteHandle; passing raw doubles will not trigger recalculation.'
  evidence: Python/examples/swap.py:99(module)
  stage: market_data_construction
  alternative_considered: Automatic wrapping was rejected to maintain explicit control
    over which values trigger observable notifications
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Python/examples/swap.py'
- id: BD-006
  type: B/DK
  content: PiecewiseFlatForward bootstraps from rate helpers
  rationale: 'Yield curves must be bootstrapped from observable market instruments
    (rate helpers) to produce market-consistent curve shapes. Direct point interpolation
    ignores the arbitrage-free relationship between instrument prices and tenors.
    Boundary: PiecewiseFlatForward requires at least one rate helper per pillar; empty
    curve construction will fail.'
  evidence: Python/examples/swap.py:176-177(module)
  stage: market_data_construction
  alternative_considered: Direct interpolation was rejected because it ignores implied
    forward rates from market instruments
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Python/examples/swap.py'
- id: BD-007
  type: M
  content: RelinkableHandle for forecast curves
  rationale: 'Forecast curves may need to be replaced during model runs (e.g., switching
    from one scenario to another) without recreating each dependent instruments. RelinkableHandle
    allows dynamic rebinding of forecast curves at runtime. Boundary: RelinkableHandle
    has slightly higher overhead than fixed Handle; use only when dynamic rebinding
    is required.'
  evidence: Python/examples/swap.py:173(module)
  stage: market_data_construction
  alternative_considered: Fixed Handle was insufficient because forecast curves must
    change during multi-scenario analysis
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Python/examples/swap.py'
- id: BD-008
  type: B
  content: Instrument does not hold pricing engine directly
  rationale: 'Separation of instrument definition from pricing method allows the same
    instrument to use different engines (analytics, trees, Monte Carlo). This enables
    A/B pricing, model risk validation, and engine-specific optimizations. Boundary:
    Engine must be attached before NPV calculation; detached engine throws exception.'
