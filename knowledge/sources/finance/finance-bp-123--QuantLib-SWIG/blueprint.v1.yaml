    in Python/examples/cashflows.py'
- id: BD-109
  type: T
  content: Swap leg access via leg(n) vs fixedLeg()/floatingLeg() - inconsistent naming
    across instruments
  rationale: Generic swap interfaces use leg(index) for array access, while specific
    instrument types expose named accessors like fixedLeg() and floatingLeg(). This
    inconsistency requires different code patterns depending on the instrument type.
    Code written for one instrument type will not compile against another without
