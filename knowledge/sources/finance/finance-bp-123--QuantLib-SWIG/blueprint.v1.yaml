  rationale: In FX forward contracts, the paySourceCurrency flag determines whether
    the forward delivers source or target currency when the position is profitable.
    Setting paySourceCurrency=True means the long position receives source currency;
    False means receiving target currency. This convention affects cash flow semantics
    and must match the counterparty agreement.
