  type: replaceable_component
  name: build_system
  path: null
  description: Use autotools for local development; use cibuildwheel for automated
    wheel building on multiple platforms
  used_in_stages: []
  options:
  - name: autotools (configure.ac)
    traits:
    - traditional
    - unix-native
    - well-documented
    fit_for:
    - Unix/Linux development builds from source
    not_fit_for:
    - Windows native development, modern Python packaging
  - name: cibuildwheel
    traits:
    - wheel-focused
    - cross-platform
    - modern
    fit_for:
    - Creating cross-platform Python wheels for PyPI distribution
    not_fit_for:
    - Development builds, non-Python language bindings
