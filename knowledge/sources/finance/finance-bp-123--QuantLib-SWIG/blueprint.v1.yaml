  content: ql.Settings.instance().evaluationDate MUST be set before any pricing
  rationale: The evaluation date establishes the 'now' context for discount factor
    calculations and option expiry processing. Pricing without explicit evaluation
    date may use system time unexpectedly, causing incorrect discount factors and
    cash flow date determinations.
  evidence: Python/examples/european-option.py:42(module)
  stage: invariant
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Python/examples/european-option.py'
- id: BD-101
  type: B/DK
  content: Market data MUST be wrapped in Handle classes for reference semantics
  rationale: Raw market data values are copied by value; Handle wrappers maintain
    a shared reference that multiple instruments can observe. This allows term structures
    and quotes to propagate updates automatically to each dependent calculations.
  evidence: Python/examples/european-option.py:70-74(QuoteHandle, YieldTermStructureHandle)
  stage: pattern_choice
  _evidence_issues:
  - 'INVALID_IDENTIFIER: QuoteHandle, YieldTermStructureHandle in Python/examples/european-option.py'
- id: BD-102
  type: BA/DK
  content: Handle wrappers (QuoteHandle, YieldTermStructureHandle) enable automatic
    market data updates
  rationale: When a Handle wraps a SimpleQuote or term structure, any modification
    to the underlying value triggers recalculation in each instruments using that
    Handle. This supports live market scenarios where curves or quotes change throughout
    a session.
  evidence: Python/examples/european-option.py:70-74(QuoteHandle, YieldTermStructureHandle),
    Python/examples/swap.py:310(linkTo)
  stage: pattern_choice
  _evidence_issues:
  - 'INVALID_IDENTIFIER: QuoteHandle, YieldTermStructureHandle), Python/examples/swap.py:310(linkTo
    in Python/examples/european-option.py'
- id: BD-103
  type: BA
  content: RelinkableYieldTermStructureHandle allows curve reassignment; regular Handle
    is immutable
  rationale: Standard YieldTermStructureHandle becomes immutable after construction;
    RelinkableYieldTermStructureHandle enables curve replacement without instrument
    recreation. Use RelinkableHandle when the curve needs to change during the instrument
    lifetime, such as scenario analysis or calibration loops.
  evidence: Python/examples/swap.py:173(RelinkableYieldTermStructureHandle), Python/examples/swap.py:310(linkTo)
  stage: pattern_choice
  _evidence_issues:
  - 'INVALID_IDENTIFIER: RelinkableYieldTermStructureHandle), Python/examples/swap.py:310(linkTo
    in Python/examples/swap.py'
- id: BD-104
  type: B
  content: Quotes require SimpleQuote(value) wrapping before QuoteHandle conversion
  rationale: QuoteHandle cannot wrap raw numbers directly; it requires a Quote instance
    like SimpleQuote. This indirection layer enables the observer pattern where QuoteHandle
    notifies dependents of value changes. Factory methods like makeQuoteHandle() handle
    this wrapping automatically.
  evidence: Python/examples/swap.py:82-89(SimpleQuote, QuoteHandle)
  stage: pattern_choice
  alternative_considered: makeQuoteHandle() factory provides automatic wrapping
  _evidence_issues:
  - 'INVALID_IDENTIFIER: SimpleQuote, QuoteHandle in Python/examples/swap.py'
- id: BD-105
  type: B/BA
  content: DateGeneration.Forward vs Backward changes schedule direction - affects
    maturity dates
  rationale: DateGeneration.Forward creates schedules moving forward from effective
    date to termination, while Backward generates dates backward from termination.
    This affects rolling conventions and end-of-month rules, potentially shifting
    cash flow dates by days or months depending on the convention chosen.
  evidence: Python/examples/swap.py:217(DateGeneration.Forward), Python/test/test_bonds.py:40(DateGeneration.Backward)
  stage: invariant
  _evidence_issues:
  - 'INVALID_IDENTIFIER: DateGeneration.Forward), Python/test/test_bonds.py:40(DateGeneration.Backward
    in Python/examples/swap.py'
- id: BD-106
  type: DK
  content: Process (simulation) vs Model (pricing) separation - instruments take different
    object types
  rationale: 'BlackScholesMertonProcess, HullWhiteProcess, and HestonModel serve different
    purposes: Process objects drive Monte Carlo simulation with discrete time steps,
    while Model objects provide analytical pricing formulas. Using a Model where a
    Process is expected (or vice versa) causes type incompatibility errors.'
  evidence: Python/examples/european-option.py:70(BlackScholesMertonProcess), Python/examples/european-option.py:88(HestonModel)
  stage: ordering_contract
  _evidence_issues:
  - 'INVALID_IDENTIFIER: BlackScholesMertonProcess), Python/examples/european-option.py:88(HestonModel
    in Python/examples/european-option.py'
- id: BD-107
  type: T
  content: Fair value methods (fairSpread, fairRate, fairMargin) find NPV=0 parameter
  rationale: fairSpread, fairRate, and fairMargin methods implement numerical root-finding
    to determine the spread, rate, or margin that produces zero NPV. These methods
    require a pricing engine to be attached and use the current term structure as
    the starting point for the numerical search.
  evidence: Python/examples/swap.py:300(show)
  stage: default_value
- id: BD-108
  type: T
  content: Cash flows return base Cashflow class - requires downcasting for type-specific
    operations
  rationale: Fixed and floating cash flows share the base Cashflow interface but have
    different properties (rate vs index/spread). Accessing type-specific attributes
    like fixedRate() or spread() requires downcasting via as_fixed_rate_coupon() or
    as_floating_rate_coupon(). Using the wrong downcast method on a cash flow of the
    opposite type causes attribute errors.
  evidence: Python/examples/cashflows.py:120(as_fixed_rate_coupon), Python/test/test_swap.py:140(as_fixed_rate_coupon)
  stage: inheritance
  _evidence_issues:
