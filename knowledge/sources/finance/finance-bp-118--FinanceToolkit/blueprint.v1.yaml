- contract: Historical data uses DatetimeIndex with multi-level columns (ticker, price_type)
  evidence: financetoolkit/historical_model.py:37-100(get_historical_data)
- contract: PeriodIndex columns use freq='Q' for quarterly, freq='Y' for yearly data
  evidence: financetoolkit/fundamentals_model.py:269-282
- contract: Rounding parameter defaults to 4 decimals across each modules (150+ metrics
