      traits:
      - First-in-first-out
      - US tax standard
      - Conservative
      fit_for:
      - US tax reporting
      - Long-term gains
      - Bearish positions
      not_fit_for:
      - Short-term high turnover
      - International jurisdictions
    - name: LIFO
      traits:
      - Last-in-first-out
