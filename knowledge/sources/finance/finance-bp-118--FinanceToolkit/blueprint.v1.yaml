business_decisions:
- id: BD-001
  type: BA/DK
  content: FMP primary with Yahoo Finance fallback
  rationale: Provides resilience against API limits; Free FMP plan has bandwidth constraints
    that could interrupt data pipelines, so Yahoo Finance acts as fallback to fill
    gaps without requiring additional API credentials. This dual-source approach ensures
    continuous market data availability while maintaining cost efficiency.
  evidence: financetoolkit/fundamentals_model.py:84-105(worker)
  stage: data_acquisition
  alternative_considered: Single-source FMP only would require paid plan for reliability
- id: BD-002
  type: M
  content: Threaded concurrent ticker fetching
  rationale: Achieves 10x speedup for portfolios with 100+ tickers by fetching each
    ticker independently in parallel threads rather than sequentially. Critical for
    performance when querying multiple companies, reducing wall-clock time from minutes
    to seconds for large universes.
  evidence: financetoolkit/fundamentals_model.py:162-170(module)
  stage: data_acquisition
  alternative_considered: Sequential fetching would be too slow for portfolios exceeding
    50 tickers
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/fundamentals_model.py'
- id: BD-003
  type: B
  content: PeriodIndex with freq='Q' or 'Y'
  rationale: Enables direct financial period arithmetic and sorting by using pandas
    PeriodIndex with quarterly or yearly frequency. This allows native financial period
    operations like period comparison, grouping by fiscal quarter, and chronological
    sorting without manual date conversion.
  evidence: financetoolkit/fundamentals_model.py:270-282(module)
  stage: data_acquisition
  alternative_considered: DatetimeIndex would require manual period conversion logic
    throughout codebase
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/fundamentals_model.py'
- id: BD-004
  type: B/RC
  content: Multi-index DataFrames (ticker, period)
  rationale: Allows vectorized operations across multiple companies simultaneously
    using pandas MultiIndex with (ticker, period) hierarchy. Enables efficient bulk
    calculations without Python-level loops, reducing computation time and memory
    overhead for large cross-sectional analyses.
  evidence: financetoolkit/ratios/ratios_controller.py:98-128(module)
  stage: data_acquisition
  alternative_considered: Separate DataFrames per ticker would prevent vectorized
    operations
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/ratios/ratios_controller.py'
- id: BD-005
  type: BA
  content: Lazy evaluation with caching
  rationale: Ratios are computed on-demand and stored in instance variables to avoid
    recomputation when the same metric is accessed multiple times. This balances computation
    cost with memory usage, only materializing values when actually needed by the
    user.
  evidence: financetoolkit/ratios/ratios_controller.py:116-128(module)
  stage: ratio_calculation
  alternative_considered: Eager evaluation would waste resources on metrics never
    accessed
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/ratios/ratios_controller.py'
- id: BD-006
  type: M/BA
  content: eval()-based custom ratios
  rationale: Allows user-defined formulas using any financial metric name as variable,
    enabling completely custom ratio definitions without modifying core code. This
    extensibility allows analysts to implement proprietary metrics or adapt to specialized
    industry ratios beyond built-in library offerings.
  evidence: financetoolkit/ratios/ratios_controller.py:229-350(module)
  stage: ratio_calculation
  alternative_considered: Fixed ratio set would limit analysis to predefined metrics
    only
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/ratios/ratios_controller.py'
- id: BD-007
  type: B/DK
  content: Rolling window for trailing periods
  rationale: TTM calculations use trailing=N with pandas .rolling().sum() to compute
    rolling window aggregations over historical periods. This enables trailing-twelve-month
    metrics that smooth seasonality and provide current-period approximations when
    full quarterly data is unavailable.
  evidence: financetoolkit/models/models_controller.py:166-180(module)
  stage: ratio_calculation
  alternative_considered: Point-in-time only metrics would be highly seasonal
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/models/models_controller.py'
- id: BD-008
  type: B/BA
  content: Distribution parameter for VaR
  rationale: '''historic'', ''parametric'' (normal), and ''log-normal'' distribution
    options allow different tail assumptions for Value at Risk calculations. This
    flexibility accommodates regulatory requirements that mandate specific distribution
    assumptions and allows practitioners to stress-test assumptions against their
    risk views.'
  evidence: financetoolkit/risk/risk_controller.py:198(module)
  stage: risk_analysis
  alternative_considered: Single distribution would limit model flexibility and regulatory
    alignment
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/risk/risk_controller.py'
- id: BD-009
  type: M/BA
  content: GARCH(1,1) with scipy optimize
  rationale: Maximum likelihood estimation using scipy.optimize for GARCH(1,1) volatility
    clustering parameters captures time-varying volatility that standard deviation
    methods miss. Critical for options pricing and risk models where recent volatility
    regimes carry more predictive power than historical averages.
  evidence: financetoolkit/risk/garch_model.py:1-100(module)
  stage: risk_analysis
  alternative_considered: Simple rolling standard deviation ignores volatility persistence
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/risk/garch_model.py'
- id: BD-010
  type: M/DK
  content: scipy.optimize.minimize for IV solver
  rationale: Newton-style root finding using scipy.optimize.minimize on Black-Scholes
    to extract implied volatility from market prices. Since IV cannot be solved analytically,
    numerical optimization finds the volatility input that makes theoretical price
    equal observed market price.
  evidence: financetoolkit/options/options_controller.py:9(module)
  stage: options_pricing
  alternative_considered: No analytical solution exists; numerical methods are required
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/options/options_controller.py'
- id: BD-011
  type: B/BA
  content: Strike grid generation
  rationale: strike_price_range (default 0.25 = 25% around spot) and strike_step_size
    (default 5) define the strike price grid for option chain generation. This controls
    the granularity of option pricing output, balancing computational cost against
    resolution for moneyness analysis.
  evidence: financetoolkit/options/options_controller.py:214(module)
  stage: options_pricing
  alternative_considered: Fixed strike set would not adapt to different stock price
    levels
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/options/options_controller.py'
- id: BD-012
  type: M
  content: Fama-French 5-factor dataset from F-F website
  rationale: Downloads Fama-French factor data from Kenneth French data library and
    uses sklearn.linear_model.LinearRegression for factor fitting in performance attribution.
    The 5-factor model (Mkt-Rf, SMB, HML, RMW, CMA) decomposes returns into systematic
    factors for risk-adjusted performance measurement.
  evidence: financetoolkit/performance/performance_model.py:180(module)
  stage: performance_measurement
  alternative_considered: Custom factors would lack academic validation and comparability
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/performance/performance_model.py'
- id: BD-013
  type: B/DK
  content: Rolling window support for beta
  rationale: Window parameter enables time-varying systematic risk estimates rather
    than a single historical beta. This captures beta drift over business cycles and
    structural market changes, providing more current risk measures than lifetime
    beta calculations.
  evidence: financetoolkit/performance/performance_controller.py:221(module)
  stage: performance_measurement
  alternative_considered: Static lifetime beta would not capture structural market
    changes
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/performance/performance_controller.py'
- id: BD-014
  type: M
  content: Numerical YTM solver
  rationale: Iterative root-finding when closed-form YTM solution is unavailable,
    using initial guess of 0.05 (5%) with tolerance of 0.0001 (10bp). Most bonds lack
    analytical solutions due to irregular coupon schedules, requiring numerical methods
    to solve the NPV=0 equation for yield.
  evidence: financetoolkit/fixedincome/fixedincome_controller.py:479(module)
  stage: fixed_income
  alternative_considered: No closed-form exists for bonds with irregular cash flows
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/fixedincome/fixedincome_controller.py'
- id: BD-015
  type: B/BA
  content: Frequency parameter for coupon payments
  rationale: frequency parameter (default=1 for annual, configurable for semi-annual,
    quarterly) converts coupon payments to the appropriate time basis for pricing.
    Bond yields are typically quoted semi-annually in US markets but may be quoted
    annually in other jurisdictions, requiring conversion logic.
  evidence: financetoolkit/fixedincome/fixedincome_controller.py:105(module)
  stage: fixed_income
  alternative_considered: Fixed frequency would not support international bond conventions
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/fixedincome/fixedincome_controller.py'
  vague_rationale: true
- id: BD-016
  type: BA
  content: FMP API required for discovery
  rationale: Discovery functionality relies exclusively on FMP's universe data for
    company screening, search, and listing services. Unlike data acquisition, no free
    fallback exists because FMP's comprehensive company metadata and screening criteria
    are not publicly available elsewhere.
  evidence: financetoolkit/discovery/discovery_controller.py:69(module)
  stage: discovery_search
  alternative_considered: Free alternatives lack comprehensive company universe data
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/discovery/discovery_controller.py'
- id: BD-017
  type: BA
  content: Dual data sources (OECD and GMDB)
  rationale: OECD provides standardized international economic indicators while GMDB
    (Global Macro Database) offers extended historical coverage beyond OECD's available
    range. Combining sources ensures both data quality and maximum historical depth
    for long-term trend analysis.
  evidence: financetoolkit/economics/economics_controller.py:11(module)
  stage: economics_macro
  alternative_considered: Single source would limit either coverage or historical
    depth
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/economics/economics_controller.py'
- id: BD-018
  type: B/BA
  content: Default 100-year lookback
  rationale: datetime.now() - timedelta(days=365*100) provides maximum historical
    depth for macroeconomic time series analysis. This enables analysis of pre-WWII
    data, Great Depression patterns, and long-cycle economic trends that require century-scale
    datasets.
  evidence: financetoolkit/economics/economics_controller.py:98(module)
  stage: economics_macro
  alternative_considered: Shorter lookback would exclude pre-war economic data
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/economics/economics_controller.py'
- id: BD-019
  type: B/BA
  content: FIFO cost basis default
  rationale: pnl_method='FIFO' (First In, First Out) is the standard for US tax reporting
    of capital gains. LIFO and average cost options are available for different accounting
    treatments, but FIFO is the regulatory default ensuring compliance with IRS wash
    sale rules and gain/loss calculations.
  evidence: financetoolkit/portfolio/portfolio_controller.py:1314(module)
  stage: portfolio_management
  alternative_considered: Average cost would not satisfy IRS requirements for specific
    identification
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/portfolio/portfolio_controller.py'
- id: BD-020
  type: M
  content: YAML configuration for column mapping
  rationale: Flexible YAML-based column mapping accommodates varying CSV and Excel
    portfolio file formats without code changes. Users define field mappings in configuration,
    enabling the toolkit to ingest transaction data from different broker exports,
    accounting systems, or legacy formats.
  evidence: financetoolkit/portfolio/portfolio_controller.py:334(module)
  stage: portfolio_management
  alternative_considered: Fixed column names would require manual file preprocessing
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/portfolio/portfolio_controller.py'
- id: BD-021
  type: B
  content: Indicator categorization with collect_*_indicators methods
  rationale: Batch methods for breadth, momentum, overlap, and volatility indicator
    categories reduce API calls by collecting multiple related indicators in single
    requests. This design minimizes network overhead and provides consistent categorization
    matching industry-standard technical analysis frameworks.
  evidence: financetoolkit/technicals/technicals_controller.py:100(module)
  stage: technical_indicators
  alternative_considered: Individual indicator calls would cause excessive API overhead
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/technicals/technicals_controller.py'
- id: BD-022
  type: B/BA
  content: window=14 default
  rationale: Industry standard RSI and ATR lookback period of 14 periods (originally
    14 days from Wilder's 1978 specifications). This default aligns with practitioner
    conventions and trading system defaults, ensuring analysis results are comparable
    to mainstream technical indicators.
  evidence: financetoolkit/technicals/technicals_controller.py:103(module)
  stage: technical_indicators
  alternative_considered: Non-standard defaults would produce non-comparable results
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financetoolkit/technicals/technicals_controller.py'
- id: BD-023
  type: B/BA
  content: Historical data normalization preserves NaN at series start by using .iloc[1:]
    when computing cumulative sums for ratios
  rationale: The .iloc[1:] slicing preserves the first NaN value in normalized series
    to maintain index alignment with source data. This boundary ensures ratio calculations
    (cumulative_sum / cumulative_sum) handle edge cases where the initial observation
    would otherwise cause division errors or misaligned outputs when computing metrics
    like Sharpe ratios or moving averages.
  evidence: financetoolkit/historical_model.py:320(normalize_data)
  stage: economics_macro
  alternative_considered: Forward-fill NaN values instead of preserving; rejected
    due to introducing artificial data points
  _evidence_issues:
  - 'FN_NOT_FOUND: normalize_data in financetoolkit/historical_model.py'
- id: BD-024
  type: B/BA
  content: VaR calculations use population standard deviation (ddof=0) instead of
    sample standard deviation
  rationale: Population std dev (ddof=0) assumes the full return distribution is known
    rather than treating it as a sample estimate. This boundary choice makes VaR estimates
    more conservative (lower divisor produces higher variance) and aligns with regulatory
    frameworks like Basel III that use historical simulation without sample correction,
    ensuring consistency with risk reporting standards.
  evidence: financetoolkit/risk/var_model.py:58(get_var_gaussian)
  stage: risk_analysis
  alternative_considered: Sample std dev (ddof=1) for unbiased estimation; rejected
    to match regulatory VaR conventions
- id: BD-025
  type: B
  content: VaR with multi-period index (e.g., quarterly+daily) iterates sub-periods
    and concatenates results
  rationale: Multi-period VaR requires decomposition into uniform sub-periods before
    aggregation to handle mixed frequency inputs correctly. The iteration boundary
    prevents incorrectly treating quarterly and daily returns as equivalent magnitudes;
    concatenation preserves temporal ordering while scaling returns to consistent
    periodicity before computing the final quantile.
  evidence: financetoolkit/risk/var_model.py:17(get_var_historic)
  stage: risk_analysis
  alternative_considered: Resampling each data to highest frequency; rejected due
    to information loss from excessive interpolation
- id: BD-026
  type: B/BA
  content: Gaussian VaR includes optional Cornish-Fisher expansion to adjust quantiles
    for skew/kurtosis
  rationale: The Cornish-Fisher adjustment modifies the z-score quantile using measured
    skewness and excess kurtosis, providing a boundary between parametric normality
    assumptions and empirically observed return distributions. This accommodation
    is critical for assets with non-zero skew (e.g., options, currencies) where standard
    Gaussian VaR systematically underestimates tail risk on the downside.
  evidence: financetoolkit/risk/var_model.py:58(get_var_gaussian)
  stage: risk_analysis
  alternative_considered: Mandate Cornish-Fisher for each assets; rejected as it may
    degrade accuracy for near-normal distributions
- id: BD-027
  type: B
  content: Black-Scholes model disables numpy divide/invalid warnings during calculation
  rationale: Warning suppression prevents console noise during legitimate edge cases
    (e.g., spot equals strike causing d1=0). The boundary is necessary because Black-Scholes
    analytically handles these cases (N(0)=0.5, log(1)=0) but numpy's divide-by-zero
    checker flags them as invalid operations, potentially confusing users or triggering
    strict warning policies in Jupyter environments.
  evidence: financetoolkit/options/black_scholes_model.py:10(get_d1)
  stage: options_pricing
  alternative_considered: Conditional suppression based on user warning preference;
    considered but adds interface complexity
- id: BD-028
