- id: BD-125
  type: BA/DK
  content: 'INTERACTION: BD-007 × BD-013 × BD-040 → Time-varying risk amplification
    chain where rolling TTM windows and rolling beta mutually reinforce momentum signals'
  rationale: The combination of trailing-twelve-month rolling windows (BD-007), rolling
    beta with configurable window (BD-013), and Series-to-DataFrame coercion for rolling
    beta (BD-040) creates an amplified effect where time-varying systematic risk estimates
    are computed on time-smoothed fundamental metrics. This amplifies momentum signals
    because rolling beta computed on TTM-smoothed returns will be more stable than
    on raw returns, potentially lagging market regime changes. The interaction causes
    problems when markets shift regimes (e.g., 2008, 2020) because the rolling window
    smoothness delays adaptation to new risk environments by N periods.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Instantaneous beta on raw returns would be noisier but more
    responsive
- id: BD-126
  type: BA
  content: 'INTERACTION: BD-105 × BD-110 → Silent failure amplification where warning
    suppression combined with error absorption creates opaque failures'
  rationale: RuntimeWarning suppression (BD-105) hides numerical edge cases while
    handle_errors decorator (BD-110) silently returns empty Series on any exception.
    Together they create a silent failure amplification where edge cases (zero volatility,
    division by zero, NaN propagation) are suppressed at the warning level AND then
    errors are absorbed into empty Series, making debugging nearly impossible. This
    interaction causes problems when analyzing securities with unusual data (SPAC
    warrants, illiquid bonds, near-zero prices) where calculations legitimately fail
    but return empty results with no indication of the underlying issue.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Optionally raising exceptions or returning error metadata
    would improve debuggability
- id: BD-127
  type: B/BA
  content: 'INTERACTION: BD-089 × BD-091 × BD-092 × BD-093 × BD-035 → Risk cascade
    where DCF terminal value sensitivity amplifies through WACC chain with book-value
    debt assumption'
  rationale: 'DCF valuation (BD-089) sensitivity to terminal value is amplified through
    the WACC calculation chain: WACC (BD-091) requires cost of equity via CAPM (BD-092),
    cost of debt (BD-093), and uses book value for debt (BD-035). Since terminal value
    represents 60-80% of total DCF value, any error in WACC components cascades multiplicatively.
    The book-value debt assumption (BD-035) introduces systematic bias that compounds
    with leverage—the more debt-heavy the company, the more the WACC underestimates
    true cost. This cascade causes significant valuation errors for companies with
    debt market premiums/discounts, where book value significantly deviates from market
    value, leading to overvaluation of high-debt companies and undervaluation of those
    with discounted debt.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Market value of debt via YTM pricing would improve accuracy
    but requires additional data
- id: BD-128
  type: BA/DK
  content: 'INTERACTION: BD-048 × BD-050 × BD-096 × BD-010 → Numerical method dependency
    chain where Black-Scholes, CRR tree, and IV solver form interdependent pricing
    pipeline'
  rationale: European options use Black-Scholes (BD-048) which requires d1 computed
    before d2 (BD-102), while CRR binomial tree (BD-050) requires up/down movements
    to be reciprocals (BD-103). Implied volatility extraction (BD-096) uses scipy.optimize.minimize
    (BD-010) as root-finder. These form a hidden dependency chain where IV solver
    calls Black-Scholes repeatedly, each call requires correct d1/d2 ordering, and
    convergence depends on both the pricing model and optimization method. This cascade
    causes problems for deep ITM options or near-expiration where the IV surface is
    flat, potentially causing IV solver convergence failures or local minima that
    produce incorrect volatility estimates feeding into wrong hedge ratios.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Bisection method with bounds would guarantee convergence
    at cost of speed
- id: BD-129
  type: BA/M
  content: 'INTERACTION: BD-024 × BD-053 × BD-054 × BD-055 × BD-056 → Tail risk amplification
    chain combining VaR, CVaR, and distribution fitting creates compounding conservatism
    bias'
  rationale: Population std dev for VaR (BD-024) produces ~N/(N-1) higher variance
    estimates, which compounds with the historical simulation VaR (BD-053) sensitivity
    to lookback period. Cornish-Fisher adjustment (BD-054) and Student-t fitting (BD-055)
    introduce additional moment-based corrections that can amplify or dampen tail
    estimates. CVaR (BD-056) as mean of losses below VaR threshold then amplifies
    any initial VaR bias. The combination creates a compounding conservatism bias
    where each layer adds protective buffers that may collectively overstate risk
    for assets with near-normal distributions while potentially understating risk
    for fat-tailed ones. This causes problems in capital allocation when using multiple
    risk metrics—VaR-based limits and CVaR-based stress testing may disagree significantly.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Single coherent risk measure would eliminate buffer stacking
- id: BD-130
  type: BA
  content: 'INTERACTION: BD-001 × BD-016 × BD-017 → Risk cascade where FMP primary
    dependency with no discovery fallback and multi-source macro data creates data
    continuity risk'
  rationale: 'FMP primary with Yahoo fallback (BD-001) covers price data but discovery
    requires FMP exclusively with no fallback (BD-016). Meanwhile macroeconomic data
    uses dual OECD+GMDB sources (BD-017). This creates a risk cascade where: (1) discovery
    fails completely if FMP is unavailable, blocking portfolio construction; (2) price
    data has fallback but screening/filtering does not, making fallback incomplete;
    (3) macro data sources may have different release schedules causing alignment
    gaps. The cascade causes problems during FMP API outages or rate-limiting events
    when users cannot screen companies even if they have price data, and macro data
    gaps can invalidate economic scenario analysis that depends on synchronized indicators.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Alternative discovery sources (EDGAR, Bloomberg) would provide
    full redundancy
- id: BD-131
  type: B/BA
  content: 'INTERACTION: BD-022 × BD-036 × BD-077 × BD-108 → Standardized window defaults
    create hidden coupling where shift(1) and window=14 assumptions propagate across
    each technical indicators'
  rationale: Window=14 default (BD-022) combined with True Range calculation (BD-036/BD-077)
    and shift(1) temporal reference (BD-108) creates a hidden coupling network across
    each technical indicators. Since RSI, ATR, and most momentum indicators each derive
    from True Range with 14-period windows and require previous-period shift for calculations,
    changing one parameter affects multiple indicators simultaneously. This hidden
    dependency causes problems when users attempt to use adaptive windows or different
    lookback periods—they must simultaneously adjust each interconnected parameters
    or face inconsistency between indicators (e.g., RSI-14 on ATR-14 vs RSI-20 on
    ATR-20).
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Adaptive indicator parameters would break cross-indicator
    consistency
- id: BD-132
  type: B/BA
  content: 'INTERACTION: BD-099 × BD-006 → Contradiction between fixed 4-decimal precision
    standard and dynamic eval()-based ratio evaluation creates precision inconsistency'
  rationale: 4-decimal rounding default (BD-099) is enforced consistently across each
    modules as a numeric stability boundary, but eval()-based custom ratios (BD-006)
    allow user-defined formulas evaluated at runtime without respecting this precision
    boundary. Custom ratios can introduce floating-point artifacts or excessive precision
    that gets rounded only at final output, while built-in ratios maintain precision
    throughout calculation. This contradiction causes problems when comparing built-in
    ratios (precise intermediate) to custom ratios (potentially imprecise intermediate)
    in the same analysis, leading to subtle discrepancies in cross-sectional comparisons
    that are difficult to trace to their source.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unified precision policy for custom formulas would add complexity
- id: BD-133
  type: B/BA
  content: 'INTERACTION: BD-051 × BD-052 × BD-095 → Unit conversion cascade where
    Vega (per 1% vol), Theta (per day/365), and volatility annualization (sqrt(252))
    must stay synchronized'
  rationale: Vega scaled by 1/100 assumes IV stored as percentage (BD-051), Theta
    divided by 365 for daily decay (BD-052), and volatility annualized with sqrt(252)
    scaling (BD-095) form a tightly synchronized unit conversion chain. Mismatches
    cause 100x errors in Vega hedge ratios or 31% overstatement of daily theta (since
    trading year has 252 not 365 days). This cascade causes problems when mixing data
    from sources that store volatility differently (e.g., decimal vs percentage) or
    when comparing theta estimates across implementations, leading to systematic hedge
    ratio errors and P&L attribution discrepancies.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Enforced unit tagging on each volatility inputs would prevent
    mismatches
- id: BD-134
  type: BA/DK
  content: 'INTERACTION: BD-014 × BD-029 × BD-030 × BD-015 → Numerical YTM solver
    with frequency-dependent coupon conversion creates convergence sensitivity to
    interest rate environment'
  rationale: Numerical YTM solver (BD-014) using secant method with 0.05 initial guess
    (BD-029) combined with explicit loop for present value calculation (BD-030) and
    frequency-dependent coupon conversion (BD-015) creates sensitivity to initial
    guess proximity. The frequency parameter (annual/semi-annual/quarterly) affects
    the effective rate and cash flow timing, making the solver converge differently
    across rate environments. When yields deviate significantly from 5% (e.g., near-zero
    or high-rate environments), the fixed initial guess may cause slow convergence
    or local minima, affecting bond pricing accuracy and portfolio valuation.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Adaptive initial guess based on coupon/yield estimates would
    improve robustness
