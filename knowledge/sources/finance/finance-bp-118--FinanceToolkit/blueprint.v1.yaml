id: finance-bp-118
name: FinanceToolkit
sop_version: '3.6'
source:
  projects:
  - FinanceToolkit
  commit_hash: 2158ff3ad8c6525ba1d14796d1b00c8ea7dc6ef9
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Comprehensive financial analysis toolkit with 150+ ratios, risk metrics,
    options pricing, and performance measurement
  description: Open-source Python toolkit providing transparent calculation methodology
    for financial ratios, risk analysis, options pricing, fixed income analytics,
    and portfolio management. Designed to eliminate discrepancies between data providers
    by exposing complete calculation logic.
  prerequisites: 'Python 3.9+, pandas>=2.2, scikit-learn>=1.6, requests>=2.32, openpyxl>=3.1,
    tqdm>=4.67. Optional: FinancialModelingPrep API key for enhanced data access and
    discovery features.'
  not_suitable_for: Real-time trading systems requiring sub-second data, high-frequency
    trading applications, proprietary data sources that cannot use external APIs,
    or users requiring pre-built visualizations without customization
stages:
- id: data_acquisition
  name: Data Acquisition
  order: 1
  responsibility: Retrieves financial data from external APIs (FinancialModelingPrep,
    Yahoo Finance) with automatic fallback support, caching, and normalization into
    consistent DataFrame formats with multi-index structure. Provides resilience against
    API rate limits.
  interface:
    inputs:
    - tickers list
    - date range
    - api_key
    - enforce_source preference
    outputs:
    - balance sheet DataFrame
    - income statement DataFrame
    - cash flow DataFrame
    - historical price DataFrame
  required_methods:
  - name: Toolkit.__init__
    description: Main entry point that orchestrates data collection from FMP/Yahoo
      Finance, normalizes financial statements, and exposes each analysis modules.
      Initializes threading for concurrent ticker fetching.
    evidence: financetoolkit/toolkit_controller.py:70
  - name: Toolkit.get_historical_data
    description: Retrieves historical price/volume data with support for dividends,
      splits, and multiple intervals
    evidence: financetoolkit/historical_model.py:37-100
  - name: Toolkit.get_financials
    description: Fetches balance sheet, income statement, and cash flow statements
      with normalization
    evidence: financetoolkit/fundamentals_model.py:84-105
  key_behaviors:
  - behavior: Threaded concurrent ticker fetching
    description: Each ticker is fetched independently using threading, providing approximately
      10x speedup for large ticker lists. Every threads must be joined before returning
      results.
    evidence: financetoolkit/fundamentals_model.py:162-170(thread.start)
  - behavior: Automatic FMP-to-Yahoo Finance fallback
    description: When FMP API fails or no API key is provided, automatically falls
      back to Yahoo Finance. This provides graceful degradation and free data access.
    evidence: financetoolkit/fundamentals_model.py:105(enforce_source != FinancialModelingPrep)
  - behavior: Multi-index DataFrames with PeriodIndex
    description: Financial statements use MultiIndex with levels (ticker, period)
      and PeriodIndex columns. Historical data uses DatetimeIndex with multi-level
      columns (ticker, price_type).
    evidence: financetoolkit/ratios/ratios_controller.py:98-128(__init__)
  - behavior: Pickle-based caching of normalized statements
    description: Normalized financial statements are cached using pickle format for
      cross-session persistence. Allows skipping redundant API calls on subsequent
      runs.
    evidence: financetoolkit/normalization_model.py:141-152(_process_or_load_statement)
  - behavior: PeriodIndex with freq='Q' or 'Y'
    description: Quarterly data uses freq='Q' and yearly data uses freq='Y', enabling
      direct financial period arithmetic and sorting.
    evidence: financetoolkit/fundamentals_model.py:269-282(PeriodIndex)
  replaceable_points:
  - name: data_source
    description: enforce_source parameter switches between primary data providers
    options:
    - name: FinancialModelingPrep
      traits:
      - API key required
      - Premium data quality
      - Rate limited
      fit_for:
      - Production use
      - Comprehensive coverage
      - Screener features
      not_fit_for:
      - Budget-constrained projects
      - Quick prototyping without API key
    - name: YahooFinance
      traits:
      - No API key required
      - Free access
      - Good historical coverage
      fit_for:
      - Free data access
      - Testing and prototyping
      - Fallback when FMP fails
      not_fit_for:
      - Screener/discovery features
      - Premium financial data
    - name: None (auto)
      traits:
      - Automatic fallback
      - Best effort
      - Resilient
      fit_for:
      - Default usage
      - Resilience over control
      not_fit_for:
      - Reproducible results requiring deterministic source
    default: None
  design_decisions:
  - FMP primary with Yahoo Finance fallback - Provides resilience against API limits;
    Free FMP plan has bandwidth limits, Yahoo Finance fills gaps without requiring
    API key (financetoolkit/fundamentals_model.py:84-105)
  acceptance_hints:
  - Historical DataFrame has DatetimeIndex with multi-level columns (ticker, price_type)
  - Financial statement DataFrames use MultiIndex (ticker, period) with PeriodIndex
    columns
  - Concurrent fetching completes within expected time based on ticker count
  - Fallback to Yahoo Finance occurs when FMP request fails or returns error
- id: ratio_calculation
  name: Ratio Calculation
  order: 2
  responsibility: Computes 150+ financial ratios across 5 categories (efficiency,
    liquidity, profitability, solvency, valuation) using normalized financial statement
    data with lazy evaluation and caching.
  interface:
    inputs:
    - balance sheet DataFrame
    - income statement DataFrame
    - cash flow DataFrame
    - historical DataFrame
    outputs:
    - DataFrame of computed ratios by ticker and period
  required_methods:
  - name: Ratios.__init__
    description: Main controller exposing ratio computation methods with lazy evaluation.
      Caches computed ratios in instance variables to avoid recomputation.
    evidence: financetoolkit/ratios/ratios_controller.py:33
  - name: Ratios.collect_custom_ratios
    description: Allows user-defined formulas using eval() with restricted operators
      and any financial metric name as variable
    evidence: financetoolkit/ratios/ratios_controller.py:229-350
  key_behaviors:
  - behavior: Lazy evaluation with caching
    description: Ratios are computed on-demand when accessed and stored in instance
      variables. Subsequent accesses return cached values without recomputation.
    evidence: financetoolkit/ratios/ratios_controller.py:116-128(__init__)
  - behavior: eval()-based custom ratio definitions
    description: Users can define custom ratios using any financial metric name as
      a variable. The eval() function parses and evaluates these formulas at runtime.
    evidence: financetoolkit/ratios/ratios_controller.py:229-350(collect_custom_ratios)
  - behavior: handle_portfolio decorator injection
    description: A decorator automatically injects a weighted Portfolio row to each
      ratio methods that return DataFrames with tickers. This aggregates portfolio-level
      ratios from individual holdings.
    evidence: ratios/ratios_controller.py:11(@handle_portfolio), helpers.py:278(handle_portfolio
      decorator)
  - behavior: RuntimeWarning suppression for division operations
    description: Warnings.filterwarnings('ignore') hides division-by-zero and invalid
      operations. Financial ratios that divide by zero return inf/nan silently instead
      of raising errors.
    evidence: financetoolkit/ratios/ratios_controller.py:28(warnings.filterwarnings)
  - behavior: bfill().ffill() for data gap-filling
    description: Standard forward-fill and backward-fill pattern used to handle missing
      data periods before ratio calculations.
    evidence: ratios/helpers.py:33(daily_period.bfill().ffill())
  replaceable_points:
  - name: custom_ratio_engine
    description: eval() with restricted operators allows extensible custom ratio definitions
    options:
    - name: pandas eval
      traits:
      - Built-in
      - Fast
      - Restricted operators only
      fit_for:
      - Standard formula evaluation
      - Performance-critical scenarios
      not_fit_for:
      - Complex expressions requiring Python builtins
    - name: external formula parser
      traits:
      - More expressive
      - Additional dependencies
      fit_for:
      - Advanced formula syntax
      - Symbolic computation
      not_fit_for:
      - Simple ratio definitions
      - Minimal dependencies
    default: pandas eval
  design_decisions:
  - Lazy evaluation with caching - Ratios computed on-demand and stored in instance
    variables; avoids recomputation (financetoolkit/ratios/ratios_controller.py:116-128)
  - eval()-based custom ratios - Allows user-defined formulas using any financial
    metric name as variable (financetoolkit/ratios/ratios_controller.py:229-350)
  - Rolling window for trailing periods - TTM calculations via trailing=N with .rolling().sum()
    (financetoolkit/models/models_controller.py:166-180)
  acceptance_hints:
  - Ratio DataFrames maintain MultiIndex (ticker, period) structure
  - Custom ratios evaluate correctly using metric names as variables
  - Portfolio-weighted row appears in ratio outputs when weights are injected
  - Division by zero returns inf/nan without raising exceptions
  - Caching prevents recomputation on subsequent method calls
- id: risk_analysis
  name: Risk Analysis
  order: 3
  responsibility: Computes risk metrics (VaR, CVaR, EVaR, GARCH, drawdown) on historical
    return series using multiple distribution assumptions and handles volatility forecasting.
  interface:
    inputs:
    - historical price DataFrame
    - period specification
    - confidence level alpha
    outputs:
    - VaR/CVaR/EVaR series
    - GARCH forecasts
    - drawdown series
  required_methods:
  - name: Risk.__init__
    description: Main controller for risk metrics including VaR, CVaR, GARCH, and
      drawdown calculations. Uses ALPHA_CONSTRAINT=0.5 as cross-module invariant.
    evidence: financetoolkit/risk/risk_controller.py:29
  - name: Risk.get_value_at_risk
    description: Computes Value at Risk using historical, parametric, or log-normal
      distribution assumptions
    evidence: financetoolkit/risk/risk_controller.py:198
  key_behaviors:
  - behavior: ALPHA_CONSTRAINT invariant
    description: ALPHA_CONSTRAINT=0.5 is enforced across each risk models (VaR, CVaR,
      EVaR, GARCH). Every risk calculations would change if this constraint changes.
    evidence: risk/var_model.py:9, risk/cvar_model.py:9, risk/evar_model.py:8, risk/garch_model.py:7
  - behavior: MULTI_PERIOD_INDEX_LEVELS assumption
    description: MULTI_PERIOD_INDEX_LEVELS=2 defines how VaR handles period grouping.
      Within-period VaR calculations would break if this assumption changes.
    evidence: risk/var_model.py:14(MULTI_PERIOD_INDEX_LEVELS = 2)
  - behavior: GARCH(1,1) with scipy optimize
    description: Maximum likelihood estimation of volatility clustering parameters
      using scipy.optimize.minimize for GARCH model fitting.
    evidence: financetoolkit/risk/garch_model.py:1-100
  - behavior: Distribution parameter for VaR
    description: '''historic'', ''parametric'' (normal), ''log-normal'' options allow
      different tail assumptions to match various risk profiles.'
    evidence: financetoolkit/risk/risk_controller.py:198(get_value_at_risk)
  replaceable_points:
  - name: var_distribution
    description: VaR calculation method selectable per use case
    options:
    - name: historic
      traits:
      - Empirical
      - No distribution assumption
      - Simple
      fit_for:
      - Non-normal return distributions
      - Quick risk estimates
      not_fit_for:
      - Extreme tail events without history
      - Stable distributions
    - name: parametric
      traits:
      - Normal distribution
      - Analytical
      - Smooth
      fit_for:
      - Normal distributions
      - Theoretical analysis
      not_fit_for:
      - Fat-tailed distributions
      - Skewed returns
    - name: log-normal
      traits:
      - Positive returns only
      - Jensen's inequality adjusted
      fit_for:
      - Stock prices
      - Multiplicative processes
      not_fit_for:
      - Negative returns
      - Additive processes
    default: historic
  design_decisions:
  - Distribution parameter for VaR - 'historic', 'parametric' (normal), 'log-normal'
    options allow different tail assumptions (financetoolkit/risk/risk_controller.py:198)
  - GARCH(1,1) with scipy optimize - Maximum likelihood estimation of volatility clustering
    parameters (financetoolkit/risk/garch_model.py:1-100)
  acceptance_hints:
  - ALPHA_CONSTRAINT=0.5 is consistently applied across each VaR/CVaR/EVaR/GARCH calculations
  - VaR calculations produce expected values for known confidence levels
  - GARCH forecasts converge to long-run variance within expected range
  - MULTI_PERIOD_INDEX_LEVELS=2 is maintained in period grouping logic
- id: options_pricing
  name: Options Pricing
  order: 4
  responsibility: Calculates option prices and Greeks using Black-Scholes closed-form
    solutions, binomial trees for American options, and implied volatility solver
    using scipy optimization.
  interface:
    inputs:
    - stock price series
    - strike price range
    - expiration time
    - risk-free rate
    outputs:
    - option prices
    - delta/gamma/vega/theta/rho/epsilon
    - implied volatility surface
  required_methods:
  - name: Options.__init__
    description: Main controller for options analytics including Black-Scholes, binomial
      trees, and Greeks calculation with optional tqdm progress bar.
    evidence: financetoolkit/options/options_controller.py:32
  - name: Options.get_black_scholes_model
    description: Closed-form option pricing using strike_price_range and strike_step_size
      parameters to generate option chains
    evidence: financetoolkit/options/options_controller.py:214
  - name: Options.get_implied_volatility
    description: Newton-style root finding using scipy.optimize.minimize on Black-Scholes
      to extract implied volatility from market prices
    evidence: financetoolkit/options/options_controller.py:9(minimize)
  key_behaviors:
  - behavior: Black-Scholes d1 computed before d2
    description: 'Mathematical ordering contract: d1 must be computed before d2 as
      Greek calculations depend on d1 first. Every option Greeks (delta, vega, theta)
      would fail if this order is reversed.'
    evidence: options/black_scholes_model.py:32(get_d1), options/black_scholes_model.py:40(get_d2)
  - behavior: scipy.optimize.minimize for IV solver
    description: Implied volatility extraction uses scipy.optimize.minimize for numerical
      root finding on Black-Scholes formula. Requires market option prices as input.
    evidence: financetoolkit/options/options_controller.py:9(minimize)
  - behavior: Binomial tree up/down movement relationship
    description: Up movement must equal 1/down_movement (mathematical invariant).
      up_movement = exp(vol*sqrt(dt)), down_movement = 1/up_movement. Tree calculations
      would produce invalid probabilities if this breaks.
    evidence: options/binomial_trees_model.py:22-23
  - behavior: Optional tqdm progress bar
    description: Progress bars gracefully degrade when tqdm is not installed via try/except
      import pattern. Users without tqdm see no progress indication for long operations.
    evidence: options/options_controller.py:24-29(ENABLE_TQDM)
  replaceable_points:
  - name: pricing_model
    description: Model type for derivative pricing
    options:
    - name: black_scholes
      traits:
      - Closed-form
      - European options
      - Fast
      fit_for:
      - European options
      - Quick pricing
      - Theoretical Greeks
      not_fit_for:
      - American options
      - Exotic derivatives
      - Dividend handling
    - name: binomial
      traits:
      - Numerical
      - American options
      - Flexible
      fit_for:
      - American options
      - Early exercise
      - Dividend-protected
      not_fit_for:
      - Fast computation needs
      - Simple European pricing
    default: black_scholes
  design_decisions:
  - scipy.optimize.minimize for IV solver - Newton-style root finding on Black-Scholes
    to extract implied volatility from market prices (financetoolkit/options/options_controller.py:9)
  - Strike grid generation - strike_price_range (0.25 = 25%) and strike_step_size
    (5) define grid for option chains (financetoolkit/options/options_controller.py:214)
  acceptance_hints:
  - d1 is computed before d2 in each Black-Scholes calculations
  - Greeks (delta, gamma, vega, theta, rho, epsilon) match finite difference approximations
  - Binomial tree probabilities sum to 1.0 with proper up/down relationship
  - Implied volatility solver converges within expected tolerance
  - Progress bar gracefully absent when tqdm not installed
- id: performance_measurement
  name: Performance Measurement
  order: 5
  responsibility: Calculates risk-adjusted return metrics (Sharpe, Sortino, Treynor,
    alpha) and runs Fama-French factor regressions for performance attribution.
  interface:
    inputs:
    - return series
    - benchmark returns
    - risk-free rate
    outputs:
    - Sharpe/Sortino ratios
    - alpha/beta
    - Fama-French factor loadings
  required_methods:
  - name: Performance.__init__
    description: Main controller for performance metrics including Sharpe/Sortino/Treynor
      ratios and Fama-French factor analysis. Downloads F-F data from Kenneth French
      data library.
    evidence: financetoolkit/performance/performance_controller.py:36
  - name: Performance.get_beta
    description: Computes beta (systematic risk) with support for rolling window estimation
    evidence: financetoolkit/performance/performance_controller.py:221
  key_behaviors:
  - behavior: Fama-French 5-factor dataset from F-F website
    description: Downloads zip from Kenneth French data library and uses sklearn.linear_model.LinearRegression
      for factor fitting. Provides standardized factor loadings for performance attribution.
    evidence: financetoolkit/performance/performance_model.py:180(obtain_fama_and_french_dataset)
  - behavior: Rolling window support for beta
    description: window parameter enables time-varying systematic risk estimates using
      rolling covariance calculations.
    evidence: financetoolkit/performance/performance_controller.py:221(get_beta)
  - behavior: PERIOD_TRANSLATION dictionary for interval mapping
    description: Duplicated in risk and performance helpers - code duplication means
      changes must be made in two places to stay consistent.
    evidence: risk/helpers.py:9, performance/helpers.py:15
  - behavior: handle_portfolio decorator for portfolio-level metrics
    description: Automatic injection of weighted Portfolio row to each performance
      methods that return DataFrames with tickers.
    evidence: performance/performance_controller.py:9(@handle_portfolio)
  replaceable_points:
  - name: beta_calculation
    description: Static or rolling beta computation
    options:
    - name: static
      traits:
      - Full history
      - Single estimate
      - Simple
      fit_for:
      - Long-term analysis
      - Stable beta assumptions
      not_fit_for:
      - Time-varying risk
      - Regime changes
    - name: rolling
      traits:
      - Window-based
      - Dynamic
      - Responsive
      fit_for:
      - Adaptive analysis
      - Recent risk estimation
      not_fit_for:
      - Long-term averages
      - Stable risk profiles
    default: static
  design_decisions:
  - Fama-French 5-factor dataset from F-F website - Downloads zip from Kenneth French
    data library; sklearn.linear_model.LinearRegression for factor fitting (financetoolkit/performance/performance_model.py:180)
  - Rolling window support for beta - window parameter enables time-varying systematic
    risk estimates (financetoolkit/performance/performance_controller.py:221)
  acceptance_hints:
  - 'Sharpe ratio matches manual calculation: (return - risk_free) / std(return)'
  - Fama-French factor loadings sum to total return when combined with factors
  - Rolling beta tracks market beta changes over time
  - PERIOD_TRANSLATION produces consistent interval mappings across risk and performance
    modules
- id: fixed_income
  name: Fixed Income Analytics
  order: 6
  responsibility: Bond pricing, duration/convexity calculations, yield-to-maturity
    solver, and OAS/spread data from ICE BofA indices for fixed income analysis.
  interface:
    inputs:
    - bond parameters (coupon, maturity, yield)
    - par value
    - frequency
    outputs:
    - present values
    - duration series
    - YTM
    - ICE BofA spreads
  required_methods:
  - name: FixedIncome.__init__
    description: Main controller for fixed income analytics including bond valuation,
      duration, convexity, and YTM calculations with numerical solver.
    evidence: financetoolkit/fixedincome/fixedincome_controller.py:32
  - name: FixedIncome.get_yield_to_maturity
    description: Iterative root-finding for YTM when closed-form unavailable. Uses
      guess=0.05, tolerance=0.0001 for convergence.
    evidence: financetoolkit/fixedincome/fixedincome_controller.py:479
  key_behaviors:
  - behavior: Numerical YTM solver with scipy.optimize.fsolve
    description: Iterative root-finding when closed-form YTM unavailable. Default
      guess=0.05, tolerance=0.0001 ensures convergence for typical bonds.
    evidence: financetoolkit/fixedincome/fixedincome_controller.py:479
  - behavior: Frequency parameter for coupon payments
    description: frequency=1 (annual) default; converts to semi-annual, quarterly
      as needed for proper bond pricing.
    evidence: financetoolkit/fixedincome/fixedincome_controller.py:105
  - behavior: quarterly=True default for FixedIncome
    description: Inconsistent with other modules (Ratios, Options, Performance default
      to quarterly=False). This causes confusion when switching between modules.
    evidence: 'fixedincome/fixedincome_controller.py:42(quarterly: bool = True)'
  replaceable_points:
  - name: ytm_solver
    description: Root-finding method for YTM
    options:
    - name: scipy.optimize.fsolve
      traits:
      - SciPy-based
      - Multi-dimensional
      - Robust
      fit_for:
      - General use
      - Complex cash flows
      not_fit_for:
      - Minimal dependencies
    - name: numpy.roots
      traits:
      - NumPy-only
      - Polynomial-based
      fit_for:
      - Polynomial cash flows
      - Simpler setup
      not_fit_for:
      - Non-polynomial bonds
    default: scipy.optimize.fsolve
  design_decisions:
  - Numerical YTM solver - Iterative root-finding when closed-form unavailable; guess=0.05,
    tolerance=0.0001 (financetoolkit/fixedincome/fixedincome_controller.py:479)
  - Frequency parameter for coupon payments - frequency=1 (annual) default; converts
    to semi-annual, quarterly as needed (financetoolkit/fixedincome/fixedincome_controller.py:105)
  acceptance_hints:
  - YTM calculation converges to expected yield within tolerance
  - Bond pricing recovers par value when YTM equals coupon rate
  - Duration decreases as yield increases (inverse relationship holds)
  - Convexity adjustment improves price estimate for large yield changes
- id: discovery_search
  name: Discovery & Search
  order: 7
  responsibility: Searches for financial instruments by name/symbol, screens stocks
    by criteria, and retrieves instrument lists using FinancialModelingPrep API.
  interface:
    inputs:
    - search query or filter criteria
    - api_key
    outputs:
    - instrument list DataFrame
    - screener results
  required_methods:
  - name: Discovery.__init__
    description: Main controller for discovery features. Requires FMP API key and
      performs subscription tier detection via test API call.
    evidence: financetoolkit/discovery/discovery_controller.py:23
  key_behaviors:
  - behavior: FMP API required at __init__
    description: Discovery raises ValueError without api_key. Creates tight coupling
      to FMP service - discovery features completely unavailable without valid API
      key.
    evidence: discovery/discovery_controller.py:69(raises ValueError without api_key)
  - behavior: API tier detection via error message parsing
    description: FMP plan detected by parsing error message strings in response. Fragile
      detection - API response format changes break plan detection.
    evidence: discovery/discovery_controller.py:88-100(option in determine_plan)
  - behavior: Rate limit handling based on tier
    description: Free tier triggers rate limit handling with sleep_timer; Premium
      enables immediate retries based on determined plan.
    evidence: discovery/discovery_controller.py:80-100(determine_plan)
  replaceable_points: []
  design_decisions:
  - FMP API required for discovery - Discovery relies on FMP's universe data; no free
    fallback available (financetoolkit/discovery/discovery_controller.py:69)
  acceptance_hints:
  - Discovery raises ValueError when initialized without API key
  - Plan detection correctly identifies free vs premium tier
  - Search results return matching instruments by name/symbol
  - Screener applies filter criteria correctly to universe
- id: economics_macro
  name: Macroeconomic Data
  order: 8
  responsibility: Retrieves OECD and GMDB macroeconomic indicators (GDP, CPI, unemployment)
    for cross-country analysis with 100-year default lookback.
  interface:
    inputs:
    - start/end dates
    - country codes
    - gmdb_source flag
    outputs:
    - DataFrame of macro indicators by country and time
  required_methods:
  - name: Economics.__init__
    description: Main controller for economic data retrieval from OECD and GMDB sources.
      Supports 150+ country code mappings.
    evidence: financetoolkit/economics/economics_controller.py:23
  key_behaviors:
  - behavior: Dual data sources (OECD and GMDB)
    description: OECD for standard indicators; GMDB for extended historical coverage.
      Provides flexibility in data source selection.
    evidence: financetoolkit/economics/economics_controller.py:11
  - behavior: Default 100-year lookback
    description: datetime.now() - timedelta(days=365*100) provides maximum historical
      depth for macroeconomic analysis.
    evidence: financetoolkit/economics/economics_controller.py:98
  - behavior: CODE_TO_COUNTRY mapping
    description: 150+ country codes defined in economics/oecd_model.py. OECD data
      retrieval fails silently for unmapped country codes.
    evidence: economics/oecd_model.py:16-200(CODE_TO_COUNTRY dict)
  - behavior: quarterly=None default for Economics
    description: Inconsistent with other modules. Accepts None which may defer to
      API defaults.
    evidence: 'economics/economics_controller.py:35(quarterly: bool | None = None)'
  replaceable_points:
  - name: macro_source
    description: Select between OECD and GMDB for macro data
    options:
    - name: OECD
      traits:
      - Standard indicators
      - Current data
      - Official source
      fit_for:
      - Standard economic analysis
      - Cross-country comparisons
      not_fit_for:
      - Extended historical data
      - Alternative indicators
    - name: GMDB
      traits:
      - Extended history
      - Alternative coverage
      fit_for:
      - Historical depth
      - Alternative indicators
      not_fit_for:
      - Current data needs
      - Standard reporting
    default: OECD
  design_decisions:
  - Dual data sources (OECD and GMDB) - OECD for standard indicators; GMDB for extended
    historical coverage (financetoolkit/economics/economics_controller.py:11)
  - Default 100-year lookback - datetime.now() - timedelta(days=365*100) provides
    maximum historical depth (financetoolkit/economics/economics_controller.py:98)
  acceptance_hints:
  - OECD data returns indicators for valid country codes
  - GMDB fallback provides data when OECD returns empty
  - 100-year lookback includes pre-1950 data when available
  - Unmapped country codes return empty DataFrame silently
- id: portfolio_management
  name: Portfolio Management
  order: 9
  responsibility: Reads transaction datasets, calculates holdings overview, transaction-level
    P&L, and aggregates portfolio performance metrics using FIFO cost basis.
  interface:
    inputs:
    - portfolio dataset (Excel/CSV)
    - transaction history
    outputs:
    - positions overview
