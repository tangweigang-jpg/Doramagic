data_flow:
- from_stage: data_acquisition
  to_stage: ratio_calculation
  data: balance/income/cash DataFrames with MultiIndex (ticker, period) and PeriodIndex
    columns
- from_stage: data_acquisition
  to_stage: risk_analysis
  data: historical price DataFrame with DatetimeIndex and multi-level columns (ticker,
    price_type)
- from_stage: data_acquisition
  to_stage: performance_measurement
  data: historical price DataFrame + treasury yields for risk-free rate computation
- from_stage: data_acquisition
  to_stage: technical_indicators
  data: OHLCV historical DataFrame with open/high/low/close/volume data
- from_stage: data_acquisition
  to_stage: options_pricing
  data: daily historical returns + risk-free rate DataFrame for volatility estimation
- from_stage: data_acquisition
  to_stage: discovery_search
  data: No direct flow; Discovery used to find tickers before Toolkit initialization
- from_stage: ratio_calculation
  to_stage: portfolio_management
  data: individual stock ratios for portfolio weighting and aggregation
- from_stage: portfolio_management
  to_stage: performance_measurement
  data: portfolio holdings, weights, and transaction history for performance attribution
