  design_decisions:
  - FIFO cost basis default - pnl_method='FIFO' standard for US tax reporting; LIFO
    and average cost options available (financetoolkit/portfolio/portfolio_controller.py:1314)
  - YAML configuration for column mapping - Flexible column mapping accommodates varying
    CSV/Excel formats (financetoolkit/portfolio/portfolio_controller.py:334)
  acceptance_hints:
  - Portfolio loads successfully from Excel/CSV with configured columns
  - FIFO P&L calculation matches expected cost basis methodology
