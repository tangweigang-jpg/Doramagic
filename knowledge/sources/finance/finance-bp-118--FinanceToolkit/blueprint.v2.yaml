id: finance-bp-118
name: FinanceToolkit
sop_version: '3.6'
source:
  projects:
  - FinanceToolkit
  commit_hash: 2158ff3ad8c6525ba1d14796d1b00c8ea7dc6ef9
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Financial analysis, portfolio management, risk analysis, and options
    pricing
  description: Open-source comprehensive financial toolkit providing 150+ transparent
    ratios, indicators, and performance measurements for equities, options, currencies,
    cryptocurrencies, ETFs, and economic indicators.
  prerequisites: Python 2.2+, basic understanding of financial metrics, optional FMP
    API key for premium features
  not_suitable_for: Real-time trading systems, high-frequency trading, production
    automated trading, non-financial time series analysis
stages:
- id: data_acquisition
  name: Data Acquisition
  order: 1
  responsibility: Fetches financial data from FMP API or Yahoo Finance with intelligent
    caching and automatic fallback mechanisms to ensure data availability
  interface:
    inputs:
    - tickers list
    - API key
    - date range
    - quarterly flag
    outputs:
    - historical data
    - balance sheets
    - income statements
    - cash flow statements
  required_methods:
  - name: Toolkit.get_historical_data
    description: Retrieves historical OHLCV price data for specified tickers with
      automatic caching
    evidence: financetoolkit/toolkit_controller.py:70(Toolkit)
  - name: Toolkit.get_financial_statements
    description: Collects balance sheet, income statement, and cash flow data from
      configured sources
    evidence: financetoolkit/fundamentals_model.py:1(collect_financial_statements)
  key_behaviors:
  - behavior: Dual source fallback
    description: Automatically falls back to Yahoo Finance when FMP API fails or is
      unavailable, ensuring data retrieval continues
    evidence: financetoolkit/fmp_model.py:37(get_financial_data)
  - behavior: API plan auto-detection
    description: Determines subscription tier at initialization to configure appropriate
      rate limits and sleep timers
    evidence: financetoolkit/toolkit_controller.py:378(determine_plan)
  - behavior: Parallel ticker fetching
    description: Uses threading worker pattern with 0.1s sleep between requests to
      collect data for multiple tickers concurrently while respecting rate limits
    evidence: financetoolkit/historical_model.py:119-226(worker function)
  replaceable_points:
  - name: data_source
    description: Primary financial data provider for each data retrieval operations
    options:
    - name: FinancialModelingPrep
      traits:
      - Premium API
      - Comprehensive financial statements
      - Real-time data
      fit_for:
      - Professional analysis
      - Full financial metrics
      - Quarterly granularity
      not_fit_for:
      - Free tier users
      - Rate-limited scenarios
      - Basic usage
    - name: YahooFinance
      traits:
      - Free access
      - Wide asset coverage
      - No API key required
      fit_for:
      - Budget-constrained users
      - Initial exploration
      - Fallback source
      not_fit_for:
      - Premium features
      - Complete financial statements
      - Professional reporting
    default: YahooFinance
  design_decisions:
  - API key detection determines subscription plan at init enabling automatic rate
    limit handling without repeated API calls (toolkit_controller.py:378)
  - Caching layer separates pandas pickle for data vs python pickle for config providing
    flexibility while maintaining compatibility (cache_model.py:36)
  - Default 5-year lookback for historical data balances sufficient history for ratio
    calculations with API limits (toolkit_controller.py:244)
  acceptance_hints:
  - Historical prices retrieved for each requested tickers within specified date range
  - Financial statements available for both quarterly and yearly periods when requested
  - Caching reduces repeated API calls on subsequent requests for same data
  - Fallback to Yahoo Finance succeeds when FMP API is unavailable
- id: normalization
  name: Financial Statement Normalization
  order: 2
  responsibility: Converts heterogeneous raw financial data from multiple sources
    into a unified standardized format with consistent field names and date ordering
  interface:
    inputs:
    - raw balance sheet
    - raw income statement
    - raw cash flow
    outputs:
    - normalized balance sheet
    - normalized income statement
    - normalized cash flow
    - statistics
  required_methods:
  - name: normalize_statements
    description: Orchestrates normalization of each three financial statements using
      source-specific CSV mappings
    evidence: financetoolkit/normalization_model.py:19
  - name: convert_financial_statements
    description: Applies field mappings from CSV files to standardize data field names
      across sources
    evidence: financetoolkit/normalization_model.py:1
  key_behaviors:
  - behavior: CSV-based field mapping
    description: Uses CSV files to define source-specific field name mappings, allowing
      users to customize normalization without code changes
    evidence: financetoolkit/normalization_model.py:190(read_normalization_file)
  - behavior: Chronological ordering
    description: Reverses date ordering by default so oldest data appears first, matching
      standard chronological processing patterns
    evidence: financetoolkit/toolkit_controller.py:98(reverse_dates)
  replaceable_points:
  - name: normalization_format
    description: CSV normalization file that defines field mappings between raw and
      standardized field names
    options:
    - name: FMP format
      traits:
      - Pre-configured
      - Complete mapping
      - Most common
      fit_for:
      - FMP data source
      - Standard analysis
      - Default use cases
      not_fit_for:
      - Non-standard sources
      - Custom fields
      - Alternative data providers
    - name: Yahoo Finance format
      traits:
      - Yahoo-specific fields
      - Different naming conventions
      fit_for:
      - Yahoo Finance data source
      - Alternative field naming
      not_fit_for:
      - FMP data
      - Mixed sources
    - name: Custom format
      traits:
      - User-defined
      - Flexible mapping
      - Full control
      fit_for:
      - Proprietary data
      - Non-standard statements
      - Custom field names
      not_fit_for:
      - Standard analysis
      - Sharing workflows
      - Quick setup
    default: FMP format
  design_decisions:
  - CSV-based normalization instead of hardcoded mappings allows users to customize
    field mappings without modifying Python code (normalization_model.py:190)
  - Reverse dates by default (oldest first) ensures chronological processing patterns
    work correctly for financial analysis (toolkit_controller.py:98)
  acceptance_hints:
  - Every three financial statements share consistent field naming across statements
  - Period data indexed by pd.Period in YYYY-Q or YYYY-MM format
  - Missing fields handled gracefully without raising exceptions
  - Statistics derived from statements rather than separate API calls
- id: ratio_calculation
  name: Financial Ratio Calculation
  order: 3
  responsibility: Computes 50+ financial ratios across five categories (efficiency,
    liquidity, profitability, solvency, valuation) from normalized financial statements
  interface:
    inputs:
    - normalized financial statements
    - historical prices
    outputs:
    - efficiency ratios
    - liquidity ratios
    - profitability ratios
    - solvency ratios
    - valuation ratios
  required_methods:
  - name: Ratios.collect_profitability_ratios
    description: Computes profit margin, ROE, ROA and other profitability metrics
      from income statement and balance sheet
    evidence: financetoolkit/ratios/profitability_model.py:8
  - name: Ratios.collect_liquidity_ratios
    description: Calculates current ratio, quick ratio, and cash ratio from balance
      sheet data
    evidence: financetoolkit/ratios/liquidity_model.py:1
  - name: Ratios.collect_valuation_ratios
    description: Computes P/E, P/B, EPS and other valuation metrics combining statement
      data with prices
    evidence: financetoolkit/ratios/valuation_model.py:8
  - name: Ratios.collect_efficiency_ratios
    description: Calculates asset turnover and cash conversion cycle from normalized
      statements
    evidence: financetoolkit/ratios/efficiency_model.py:1
  - name: Ratios.collect_all_ratios
    description: Lazy-loading orchestrator that computes each ratio categories on
      demand with caching
    evidence: financetoolkit/ratios/ratios_controller.py:176
  key_behaviors:
  - behavior: Lazy computation
    description: Ratios are only calculated when accessed, avoiding expensive computations
      for unused ratio categories
    evidence: financetoolkit/ratios/ratios_controller.py:176(collect_efficiency_ratios)
  - behavior: Period-to-daily mapping
    description: Maps quarterly/yearly period data to daily frequency using backward/forward
      fill, enabling combination of sparse statements with daily prices
    evidence: financetoolkit/ratios/helpers.py:33(map_period_data_to_daily_data)
  - behavior: Silent warning suppression
    description: RuntimeWarnings for division by zero are suppressed globally since
      financial ratios legitimately produce inf/nan for zero denominators
    evidence: financetoolkit/ratios/ratios_controller.py:28(warnings.filterwarnings)
  replaceable_points:
  - name: custom_ratios
    description: User-defined ratio formulas beyond the built-in 50+ ratios
    options:
    - name: via Toolkit init
      traits:
      - Declarative
      - Pre-configured
      - Reusable
      fit_for:
      - Standard ratios
      - Repeated analysis
      - Shared configurations
      not_fit_for:
      - One-off calculations
      - Exploratory analysis
    - name: via collect_custom_ratios
      traits:
      - Dynamic
      - On-demand
      - Flexible
      fit_for:
      - Ad-hoc calculations
      - Testing new metrics
      - Custom research
      not_fit_for:
      - Production pipelines
      - Reproducible workflows
    default: None
  design_decisions:
  - Lazy computation - ratios only calculated when accessed avoids expensive calculations
    for unused ratio categories (ratios_controller.py:176)
  - Period data mapped to daily via bfill/ffill enables combining quarterly statements
    with daily prices (ratios/helpers.py:33)
  - RuntimeWarnings silently ignored for division by zero because financial ratios
    legitimately produce inf/nan for zero denominators (ratios_controller.py:28)
  - Days default = 365/4 (91.25) for quarterly calculations ensuring correct annualization
    for interest coverage and turnover ratios (ratios_controller.py:174)
  acceptance_hints:
  - Every ratio functions accept pd.Series inputs and return pd.Series outputs for
    vectorized computation
  - Ticker inputs normalized to uppercase list with duplicates removed
  - Benchmark ticker excluded from main ticker list to prevent data duplication
  - Ratios calculated using 4 decimal places by default, overrideable per-method
- id: performance_analysis
  name: Performance Analysis
  order: 4
  responsibility: Calculates portfolio performance metrics including risk-adjusted
    returns using CAPM, Fama-French factors, and various ratio-based measures
  interface:
    inputs:
    - historical prices
    - risk-free rate data
    - benchmark returns
    outputs:
    - Sharpe ratio
    - Sortino ratio
    - Treynor ratio
    - CAPM metrics
    - Fama-French factors
  required_methods:
  - name: Performance.get_sharpe_ratio
    description: Calculates risk-adjusted return using standard deviation of excess
      returns over risk-free rate
    evidence: financetoolkit/performance/performance_model.py:1
  - name: Performance.get_capital_asset_pricing_model
    description: Computes expected return based on CAPM using beta, risk-free rate,
      and market risk premium
    evidence: financetoolkit/performance/performance_model.py:132
  - name: Performance.get_fama_french
    description: Downloads and applies Fama-French five-factor model from Kenneth
      French's data library
    evidence: financetoolkit/performance/performance_model.py:1(import zipfile)
  key_behaviors:
  - behavior: Fama-French factor sourcing
    description: Downloads factors from Kenneth French's official academic repository
      ensuring data consistency and academic acceptance
    evidence: financetoolkit/performance/performance_model.py:1(import zipfile)
  - behavior: Multi-period index handling
    description: Detects multi-level period indices to enable within-period calculations
      for quarterly or other sub-annual periods
    evidence: financetoolkit/risk/risk_model.py:11(MULTI_PERIOD_INDEX_LEVELS)
  replaceable_points:
  - name: risk_free_rate
    description: Treasury yield used as risk-free rate benchmark for excess return
      calculations
    options:
    - name: 13w
      traits:
      - Short-term
      - Low duration
      - Money market equivalent
      fit_for:
      - Short holding periods
      - Conservative estimates
      - Liquidity analysis
      not_fit_for:
      - Long-term analysis
      - Bond portfolio comparisons
    - name: 5y
      traits:
      - Medium-term
      - Moderate duration
      fit_for:
      - Balanced portfolios
      - Medium-term performance
      - Typical holding periods
      not_fit_for:
      - Very short or long horizons
    - name: 10y
      traits:
      - Long-term benchmark
      - Standard reference
      - Duration match to stocks
      fit_for:
      - Long-term analysis
      - Standard reporting
      - Equity comparisons
      not_fit_for:
      - Short-term performance
      - Intraday analysis
    - name: 30y
      traits:
      - Longest duration
      - Inflation expectations
      - Very long horizon
      fit_for:
      - Long-duration assets
      - Pension analysis
      - Long-horizon planning
      not_fit_for:
      - Most equity analysis
      - Short to medium terms
    default: 10y
  design_decisions:
  - Fama-French factors downloaded from Kenneth French's repository ensures standard
    academic source for factor data consistency (performance_model.py:1)
  - Multi-period index handling enables period-specific calculations like quarterly
    VaR (risk_model.py:11)
  acceptance_hints:
  - Sharpe and Sortino ratios calculated using 10-year Treasury as default risk-free
    rate
  - Volatility annualized via std * sqrt(252) for daily data
  - CAPM beta correctly computed against benchmark (default SPY) excluding benchmark
    from ticker list
  - MultiIndex with MULTI_PERIOD_INDEX_LEVELS=2 enables within-period risk calculations
- id: risk_analysis
  name: Risk Analysis
  order: 5
  responsibility: Quantifies downside risk and volatility using historical returns,
    computing VaR, CVaR, drawdowns, and higher moments
  interface:
    inputs:
    - returns series
    - confidence level
    - holding period
    outputs:
    - VaR
    - CVaR
    - Max Drawdown
    - GARCH volatility
    - Skewness/Kurtosis
  required_methods:
  - name: Risk.get_var_historic
    description: Calculates historical Value at Risk using empirical return distribution
      at specified confidence level
    evidence: financetoolkit/risk/var_model.py:17
  - name: Risk.get_var_gaussian
    description: Computes parametric VaR with Cornish-Fisher adjustment for non-normal
      distributions
    evidence: financetoolkit/risk/var_model.py:58
  - name: Risk.get_max_drawdown
    description: Calculates peak-to-trough decline and duration for cumulative return
      series
    evidence: financetoolkit/risk/risk_model.py:14
  key_behaviors:
  - behavior: Cornish-Fisher adjustment
    description: Adjusts VaR calculations for skewness and kurtosis present in real
      financial return distributions, providing more accurate tail risk estimates
    evidence: financetoolkit/risk/var_model.py:104(get_var_gaussian)
  - behavior: CVaR optimization constraint
    description: Alpha constraint of 0.5 for CVaR optimization prevents extreme tail
      estimates from dominating calculations
    evidence: financetoolkit/risk/risk_model.py:6(ALPHA_CONSTRAINT)
  replaceable_points:
  - name: var_method
    description: VaR calculation methodology determining how tail risk is measured
    options:
    - name: Historic
      traits:
      - Non-parametric
      - No distribution assumption
      - Data-driven
      fit_for:
      - Non-normal returns
      - Fat tails
      - Limited historical data
      not_fit_for:
      - Small samples
      - Hypothetical scenarios
    - name: Gaussian
      traits:
      - Parametric
      - Normal assumption
      - Cornish-Fisher adjusted
      fit_for:
      - Normal distributions
      - Large samples
      - Regulatory reporting
      not_fit_for:
      - Non-normal returns
      - Extreme events
    - name: Student-T
      traits:
      - Parametric
      - Fat tails
      - Degrees of freedom
      fit_for:
      - Heavy-tailed returns
      - Academic research
      - Derivatives
      not_fit_for:
      - Near-normal data
      - Simple reporting
    default: Historic
  design_decisions:
  - Cornish-Fisher expansion for non-normal return distributions adjusts VaR for skewness
    and kurtosis common in financial returns (var_model.py:104)
  - Alpha constraint 0.5 for CVaR optimization prevents extreme tail estimates from
    dominating CVaR (risk_model.py:6)
  acceptance_hints:
  - VaR and CVaR calculated at specified confidence levels (typically 95% or 99%)
  - Max drawdown identifies both magnitude and duration of largest peak-to-trough
    decline
  - RuntimeWarnings suppressed for division by zero in ratio calculations
  - Period-to-daily mapping creates forward-filled daily risk metrics between reporting
    periods
- id: technical_analysis
  name: Technical Analysis
  order: 6
  responsibility: Generates 30+ technical indicators from price and volume data including
    momentum, overlap, volatility, and breadth measures
  interface:
    inputs:
    - OHLCV data
    - window sizes
    - indicator parameters
    outputs:
    - momentum indicators
    - overlap indicators
    - volatility indicators
    - breadth indicators
  required_methods:
  - name: Technicals.get_moving_average
    description: Calculates simple and exponential moving averages with configurable
      windows
    evidence: financetoolkit/technicals/overlap_model.py:10
  - name: Technicals.get_money_flow_index
    description: Computes volume-weighted momentum indicator combining price and volume
      signals
    evidence: financetoolkit/technicals/momentum_model.py:13
  - name: Technicals.get_bollinger_bands
    description: Generates volatility envelopes using standard deviation bands around
      moving average
    evidence: financetoolkit/technicals/overlap_model.py:1
  key_behaviors:
  - behavior: scipy.signal integration
    description: Uses scipy.signal.argrelextrema for efficient local extrema detection
      in support/resistance calculations
    evidence: financetoolkit/technicals/overlap_model.py:7(argrelextrema)
  - behavior: Industry-standard windows
    description: Default window of 14 periods (2 weeks of trading days) matches standard
      technical analysis conventions
    evidence: financetoolkit/technicals/technicals_controller.py:103(window=14)
  replaceable_points:
  - name: period
    description: Timeframe for indicator calculation determining granularity of signals
    options:
    - name: intraday
      traits:
      - Minutes/hours
      - High frequency
      - Short-term signals
      fit_for:
      - Day trading
      - Scalping
      - Intraday patterns
      not_fit_for:
      - Long-term analysis
      - Position trading
    - name: daily
      traits:
      - End-of-day
      - Standard
      - Most common
      fit_for:
      - Most analysis
      - Swing trading
      - General use
      not_fit_for:
      - Intraday decisions
      - High frequency
    - name: weekly
      traits:
      - Weekly bars
      - Smoothed
      - Medium-term
      fit_for:
      - Position trading
      - Weekly charts
      - Trend analysis
      not_fit_for:
      - Short-term
      - Day trading
    - name: monthly
      traits:
      - Monthly bars
      - Very smooth
      - Long-term
      fit_for:
      - Long-term analysis
      - Investment decisions
      - Macro trends
      not_fit_for:
      - Short to medium term
      - Trading
    - name: quarterly
      traits:
      - Quarterly bars
      - Fundamental alignment
      fit_for:
      - Quarterly reporting
      - Fundamental analysis alignment
      not_fit_for:
      - Trading
      - Technical analysis
    - name: yearly
      traits:
      - Annual bars
      - Minimal noise
      - Very long-term
      fit_for:
      - Decade analysis
      - Multi-year trends
      not_fit_for:
      - Most use cases
      - Short to medium term
    default: daily
  design_decisions:
  - scipy.signal for local extrema in support/resistance provides efficient native
    implementation vs pure Python loops (overlap_model.py:7)
  - Window default of 14 for most indicators follows industry standard of 2 weeks
    of trading days (technicals_controller.py:103)
  acceptance_hints:
  - At least 30 different technical indicators available across momentum, overlap,
    volatility, and breadth categories
  - fill_nan=True interpolation applied to missing OHLCV data before calculations
  - Volatility annualized via std * sqrt(252) for consistent annualization
- id: options_pricing
  name: Options Pricing & Greeks
  order: 7
  responsibility: Calculates option prices and sensitivity measures using Black-Scholes
    and binomial models with implied volatility inversion
  interface:
    inputs:
    - stock price
    - strike
    - volatility
    - risk-free rate
    - time to expiry
    outputs:
    - option prices
    - first/second/third order Greeks
    - implied volatility
    - option chains
  required_methods:
  - name: Options.get_delta
    description: Calculates first-order price sensitivity (rate of change of option
      price vs underlying price)
    evidence: financetoolkit/options/greeks_model.py:11
  - name: Options.get_gamma
    description: Computes second-order price sensitivity (rate of change of delta
      vs underlying price)
    evidence: financetoolkit/options/greeks_model.py:200
  - name: Options.get_implied_volatility
    description: Inverts Black-Scholes to find implied volatility matching observed
      market prices using scipy.optimize
    evidence: financetoolkit/options/options_controller.py:1
  key_behaviors:
  - behavior: scipy.optimize for IV inversion
    description: Uses numerical optimization to solve for implied volatility, handling
      the non-analytic inverse of Black-Scholes
    evidence: financetoolkit/options/options_controller.py:9(minimize)
  - behavior: Continuous dividend yield
    description: Derives continuous dividend yield from historical data for more accurate
      Black-Scholes pricing than discrete adjustments
    evidence: financetoolkit/options/options_controller.py:106(get_dividend_yield)
  replaceable_points:
  - name: pricing_model
    description: Option valuation methodology determining theoretical price calculation
    options:
    - name: Black-Scholes
      traits:
      - Closed-form
      - Analytical
      - Fast computation
      fit_for:
      - European options
      - No early exercise
      - Quick analysis
      not_fit_for:
      - American options
      - Dividend protection
      - Complex payoffs
    - name: Binomial Trees
      traits:
      - Numerical
      - Flexible
      - Early exercise
      fit_for:
      - American options
      - Dividend-paying stocks
      - Path-dependent
      not_fit_for:
      - European-only analysis
      - Speed-critical applications
    default: Black-Scholes
  design_decisions:
  - scipy.optimize.minimize for implied volatility inversion provides robust numerical
    solver for non-analytic inverse (options_controller.py:9)
  - Dividend yield from historical data for Black-Scholes ensures continuous dividend
    yield is more accurate than discrete adjustments (options_controller.py:106)
  - Strike price range of 0.25 (25%) and step size of 5 balances coverage with computational
    efficiency (options_controller.py:218)
  acceptance_hints:
  - Every Greeks (delta, gamma, theta, vega, rho) computed correctly with d1 calculated
    before other Greeks
  - Implied volatility inversion converges to reasonable values for liquid options
  - Option chains generated with strikes around current price
  - Volatility annualized using sqrt(252) for daily data
- id: modeling
  name: Financial Modeling
  order: 8
  responsibility: Executes comprehensive financial models including Dupont analysis,
    WACC calculation, DCF valuation, and scoring models (Altman, Piotroski)
  interface:
    inputs:
    - financial statements
    - market data
    - assumptions
    outputs:
    - Dupont breakdown
    - WACC
    - intrinsic value
    - Altman Z-score
    - Piotroski F-score
  required_methods:
  - name: Models.get_dupont_analysis
    description: Decomposes ROE into net margin, asset turnover, and financial leverage
      components
    evidence: financetoolkit/models/dupont_model.py:10
  - name: Models.get_weighted_average_cost_of_capital
    description: Calculates WACC using CAPM cost of equity and market value of debt
      as capital structure proxy
    evidence: financetoolkit/models/wacc_model.py:72
  - name": Models.get_intrinsic_value
    description: Computes DCF-based intrinsic valuation using projected cash flows
      and WACC as discount rate
    evidence: financetoolkit/models/intrinsic_model.py:10
  - name: Models.get_altman_z_score
    description: Calculates bankruptcy prediction score from working capital, retained
      earnings, EBIT, and market value metrics
    evidence: financetoolkit/models/altman_model.py
  - name: Models.get_piotroski_f_score
    description: Computes financial health score using binary criteria for ROA, accruals,
      leverage, and liquidity
    evidence: financetoolkit/models/piotroski_model.py:50
  key_behaviors:
  - behavior: Binary scoring thresholds
    description: Piotroski F-score uses binary thresholds (0/1 per criterion) following
      classic financial scoring methodology
    evidence: financetoolkit/models/piotroski_model.py:50(return_on_assets_criteria)
  - behavior: Market value debt proxy
    description: WACC calculation uses book value approximation for debt, simplifying
      calculation since true market value requires bond pricing
    evidence: financetoolkit/models/wacc_model.py:126(market_value_debt)
  replaceable_points:
  - name: discount_rate
    description: Discount rate for DCF intrinsic value calculation
    options:
    - name: WACC
      traits:
      - Company-specific
      - Market-based
      - Comprehensive
      fit_for:
      - Standard DCF
      - Capital structure considered
      - Professional analysis
      not_fit_for:
      - Simpler analysis
      - Peer comparison
    - name: custom rate
      traits:
      - Flexible
      - User-defined
      - Scenario-based
      fit_for:
      - Sensitivity analysis
      - Custom assumptions
      - Peer comparison
      not_fit_for:
      - Standard reporting
      - Automated workflows
    default: WACC
  design_decisions:
  - Piotroski F-score uses binary thresholds (0/1 per criterion) following classic
    financial scoring approach for bankruptcy prediction (piotroski_model.py:50)
  - WACC uses market value of debt as proxy with book value approximation simplifying
    calculation without requiring bond pricing (wacc_model.py:126)
  acceptance_hints:
  - CAPM betas correctly computed for WACC cost of equity using benchmark returns
  - Piotroski F-score uses shift(1) for year-over-year comparison with first year
    having no score
  - Dupont breakdown sums to ROE with margin, turnover, and leverage components
  - Risk-free rate (10y Treasury) used for WACC discount rate
- id: discovery
  name: Security Discovery
  order: 9
  responsibility: Searches for tickers and financial instruments across exchanges
    using various identifier types and screening criteria
  interface:
    inputs:
    - search query
    - search method
    outputs:
    - ticker list
    - stock screener results
    - sector performance
  required_methods:
  - name: Discovery.search_instruments
    description: Wrapper for FMP instrument search API enabling search by various
      identifier types
    evidence: financetoolkit/discovery/discovery_model.py:1
  - name: Discovery.screen_stocks
    description: Filters stocks based on financial criteria like P/E ratio, market
      cap, and sector
