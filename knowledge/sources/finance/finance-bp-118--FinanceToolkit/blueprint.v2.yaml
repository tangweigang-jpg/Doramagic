- id: BD-145
  type: B/BA
  content: 'INTERACTION: [BD-052 Duff & Phelps growth] × [BD-100 DCF Gordon Growth]
    × [BD-063 forward dividend] → growth assumption compounding amplifies terminal
    value sensitivity'
  rationale: 'DCF intrinsic value chains three growth-related assumptions: Duff &
    Phelps default terminal growth rate (BD-052), Gordon Growth perpetuity formula
    (BD-100), and forward-looking dividend input (BD-063). Each assumption adds model
    uncertainty, and the Gordon Growth formula amplifies these through the terminal
    value calculation which typically represents 60-80% of total DCF value. Small
    changes in growth rate produce large valuation swings, and users may not realize
    the combined sensitivity from three independent growth assumptions.'
  evidence: N/A:0(see_rationale)
  stage: global
- id: BD-146
  type: B/BA
  content: 'INTERACTION: [BD-097 Black''s log-normal] × [BD-098 Bachelier normal]
    → negative rate environments force model switching with discontinuous results'
  rationale: Black's model for swaptions assumes log-normal forward rates (BD-097),
    which breaks down when rates go negative (eurozone, japan), while Bachelier model
    assumes normal distribution (BD-098) handling negatives naturally. The transition
    between models creates discontinuous pricing at the zero boundary, and users may
    not receive warnings about model regime changes. A swaption valued with Black's
    model at near-zero rates will price differently than the same swaption valued
    with Bachelier as rates cross zero, creating arbitrage opportunities or hedging
    gaps.
  evidence: N/A:0(see_rationale)
  stage: global
