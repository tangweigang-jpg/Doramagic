  type: replaceable_component
  name: fundamental_data_source
  path: null
  description: Use FMP for professional/comprehensive analysis; Yahoo Finance for
    free/simple use cases; custom data for institutional workflows
  used_in_stages: []
  options:
  - name: Financial Modeling Prep (default)
    traits:
    - comprehensive_financials
    - global_coverage_premium
    - requires_api_key
    - rate_limited_free
    fit_for:
    - Professional analysis requiring audited financial statements, international
      coverage, analyst estimates
    not_fit_for:
    - Quick demos, users without API keys, high-volume batch processing on free tier
  - name: Yahoo Finance
    traits:
    - free
    - no_auth_required
    - limited_financials
    - delayed_data
    fit_for:
    - Quick analysis without registration, free tier users, historical price data
    not_fit_for:
    - Production systems requiring audited financials, real-time data needs
  - name: Custom Data (CSV/XLSX)
    traits:
    - user_owned
    - no_external_dependency
    - requires_manual_input
    fit_for:
    - Users with proprietary data, institutional data feeds
    not_fit_for:
    - Automated screening of large company sets
  default: Financial Modeling Prep (with Yahoo Finance fallback)
