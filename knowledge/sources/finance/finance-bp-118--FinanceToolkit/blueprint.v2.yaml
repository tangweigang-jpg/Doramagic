data_flow:
- from_stage: data_acquisition
  to_stage: normalization
  data: raw financial statements including balance sheets, income statements, and
    cash flow statements
- from_stage: normalization
  to_stage: ratio_calculation
  data: standardized financial statements with normalized field names indexed by pd.Period
- from_stage: data_acquisition
  to_stage: ratio_calculation
  data: historical price data for computing valuation ratios like P/E, P/B, and EPS
- from_stage: data_acquisition
  to_stage: performance_analysis
  data: daily prices, risk-free Treasury rates, and benchmark returns for performance
    metrics
- from_stage: data_acquisition
  to_stage: risk_analysis
  data: daily returns series calculated from historical prices for VaR and drawdown
    analysis
- from_stage: data_acquisition
  to_stage: technical_analysis
  data: OHLCV bars at various timeframes (intraday through yearly) for indicator calculation
- from_stage: ratio_calculation
  to_stage: modeling
  data: profitability and solvency ratios required for Altman Z-score and Piotroski
    F-score calculations
- from_stage: performance_analysis
  to_stage: modeling
  data: CAPM betas computed against benchmark for use in WACC cost of equity calculation
- from_stage: data_acquisition
  to_stage: options_pricing
  data: historical volatility, dividend yields, and option chain data for pricing
    models
- from_stage: discovery
  to_stage: data_acquisition
  data: ticker symbols and security identifiers discovered through search for data
    retrieval
- from_stage: portfolio_management
  to_stage: data_acquisition
  data: tickers extracted from user portfolio positions for historical data collection
- from_stage: data_acquisition
  to_stage: fixed_income
  data: Treasury yields from FRED for use as risk-free rate in bond pricing and OAS
    calculation
- from_stage: data_acquisition
  to_stage: economics
  data: GDP and CPI data for macroeconomic context in investment analysis
global_contracts:
- contract: Every ratio functions accept pd.Series inputs and return pd.Series outputs
    for vectorized computation enabling batch processing
  evidence: financetoolkit/ratios/profitability_model.py:20(get_gross_margin)
- contract: Period data indexed by pd.Period (YYYY-Q or YYYY-MM format) for quarterly
    and yearly financial statement granularity
  evidence: financetoolkit/normalization_model.py:96(convert_date_label)
- contract: Error handling returns pd.Series(dtype='object') instead of raising exceptions
    for missing data ensuring graceful degradation
  evidence: financetoolkit/utilities/error_model.py:34(KeyError wrapper)
- contract: Ticker inputs normalized to uppercase list with duplicates removed before
    any data operations
  evidence: financetoolkit/toolkit_controller.py:321(tickers normalization)
- contract: Benchmark ticker excluded from main ticker list to prevent data duplication
    and incorrect calculations
  evidence: financetoolkit/toolkit_controller.py:352(benchmark in tickers check)
- contract: MultiIndex with MULTI_PERIOD_INDEX_LEVELS=2 enables within-period risk
    calculations like quarterly VaR
  evidence: financetoolkit/risk/risk_model.py:11(MULTI_PERIOD_INDEX_LEVELS)
- contract: RuntimeWarnings suppressed globally using warnings.filterwarnings since
    financial calculations legitimately produce inf/nan values
  evidence: financetoolkit/toolkit_controller.py:54(warnings.filterwarnings)
- contract: ISIN codes detected via regex pattern and converted to tickers via Yahoo
    Finance enabling international securities support
  evidence: financetoolkit/helpers.py:159(ISIN regex match)
- contract: API plan detection at initialization enables sleep_timer configuration
    and data access decisions without repeated API calls
  evidence: financetoolkit/toolkit_controller.py:378(determine_plan)
- contract: Forward-fill (ffill) applied after pct_change for growth calculations
    on sparse quarterly data ensuring continuous series
  evidence: financetoolkit/helpers.py:101(pct_change with ffill)
- contract: Volatility annualized via std * sqrt(252) across options, technicals,
    and portfolio modules for consistent annualization
  evidence: financetoolkit/options/options_controller.py:100(volatility)
- contract: '@handle_portfolio decorator adds weighted Portfolio row/column to each
    metrics results including ratios, technicals, and risk'
  evidence: financetoolkit/helpers.py:278(handle_portfolio)
- contract: Days default = 365/4 (91.25) for quarterly calculations and 365 for yearly
    ensuring correct annualization
  evidence: financetoolkit/ratios/ratios_controller.py:174(days default)
- contract: Rounding parameter defaults to 4 decimal places throughout each modules
    ensuring consistent numeric precision
  evidence: financetoolkit/toolkit_controller.py:100(rounding=4)
- contract: Threading worker pattern with 0.1s sleep between requests for parallel
    ticker collection respecting rate limits
  evidence: financetoolkit/historical_model.py:216(sleep)
business_decisions:
- id: BD-001
  type: B
  content: API key detection determines subscription plan at init
  rationale: Enables automatic plan detection for sleep timers and rate limits without
    repeated API calls, reducing authentication overhead and enforcing tier-based
    service limits.
  evidence: financetoolkit/toolkit_controller.py:378(determine_plan)
  stage: data_acquisition
  _evidence_issues:
  - 'FN_NOT_FOUND: determine_plan in financetoolkit/toolkit_controller.py'
- id: BD-002
  type: BA
  content: Caching layer separates pandas pickle vs python pickle
  rationale: Config pickle uses python pickle for flexibility while data uses pandas
    pickle for compatibility, ensuring serialized objects can be deserialized across
    different pandas versions without version conflicts.
  evidence: financetoolkit/utilities/cache_model.py:17(load_cached_data)
  stage: data_acquisition
- id: BD-003
  type: M/BA
  content: Default 5 year lookback for historical data
  rationale: Provides sufficient history for ratio calculations while balancing API
    rate limits and data transfer costs, preventing excessive API calls while maintaining
    statistical relevance for most financial analyses.
  evidence: financetoolkit/toolkit_controller.py:244(_start_date)
  stage: data_acquisition
  _evidence_issues:
  - 'FN_NOT_FOUND: _start_date in financetoolkit/toolkit_controller.py'
- id: BD-004
  type: BA/M
  content: CSV-based normalization instead of hardcoded mappings
  rationale: Allows users to customize field mappings without code changes, enabling
    support for different financial statement formats from various data providers
    without requiring library modifications.
  evidence: financetoolkit/normalization_model.py:190(read_normalization_file)
  stage: normalization
- id: BD-005
  type: B/BA
  content: Reverse dates by default (oldest first)
  rationale: Matches chronological processing patterns for financial analysis, ensuring
    time series operations like rolling calculations and trend detection work correctly
    with standard pandas datetime indexing.
  evidence: financetoolkit/toolkit_controller.py:98(reverse_dates)
  stage: normalization
  _evidence_issues:
  - 'FN_NOT_FOUND: reverse_dates in financetoolkit/toolkit_controller.py'
- id: BD-006
  type: BA/DK
  content: Lazy computation - ratios only calculated when accessed
  rationale: Avoids expensive calculations for unused ratio categories, reducing initialization
    time and memory footprint when users only need specific financial metrics rather
    than the complete ratio suite.
  evidence: financetoolkit/ratios/ratios_controller.py:454(collect_efficiency_ratios)
  stage: ratio_calculation
- id: BD-007
  type: BA
  content: Period data mapped to daily via bfill/ffill
  rationale: Enables combining quarterly statements with daily prices by forward/backward
    filling, allowing ratio calculations that span different temporal granularities
    without requiring explicit date alignment logic.
  evidence: financetoolkit/ratios/helpers.py:6(map_period_data_to_daily_data)
  stage: ratio_calculation
- id: BD-008
  type: BA
  content: RuntimeWarnings silently ignored for division by zero
  rationale: Financial ratios legitimately produce inf/nan for zero denominators (e.g.,
    P/E when earnings are negative), so suppressing these warnings prevents noise
    while maintaining computational correctness.
  evidence: financetoolkit/ratios/ratios_controller.py:28(warnings.filterwarnings)
  stage: ratio_calculation
  _evidence_issues:
  - 'FN_NOT_FOUND: warnings.filterwarnings in financetoolkit/ratios/ratios_controller.py'
- id: BD-009
  type: M
  content: Fama-French factors downloaded from Kenneth French's repository
  rationale: Standard academic source ensures factor data consistency with published
    research, allowing direct comparison between calculated returns and academic benchmarks
    using the same factor set.
  evidence: financetoolkit/performance/performance_model.py:1(import zipfile)
  stage: performance_analysis
  _evidence_issues:
  - 'INVALID_IDENTIFIER: import zipfile in financetoolkit/performance/performance_model.py'
- id: BD-010
  type: BA/DK
  content: Multi-period index handling for within-period calculations
  rationale: Enables period-specific risk metrics such as quarterly VaR by providing
    configurable time horizons, allowing users to calculate risk measures aligned
    with their reporting periods.
  evidence: financetoolkit/risk/risk_model.py:11(MULTI_PERIOD_INDEX_LEVELS)
  stage: performance_analysis
  _evidence_issues:
  - 'FN_NOT_FOUND: MULTI_PERIOD_INDEX_LEVELS in financetoolkit/risk/risk_model.py'
- id: BD-011
  type: M/BA
  content: Cornish-Fisher expansion for non-normal return distributions
  rationale: Adjusts VaR for skewness and kurtosis common in financial returns, providing
    more accurate risk estimates than normal distribution assumptions for assets with
    non-symmetric return profiles.
  evidence: financetoolkit/risk/var_model.py:58(get_var_gaussian)
  stage: risk_analysis
- id: BD-012
  type: M
  content: Alpha constraint 0.5 for CVaR optimization
  rationale: Prevents extreme tail estimates from dominating CVaR calculations by
    constraining the optimization to the worst (1-alpha) cases, balancing risk sensitivity
    with numerical stability.
  evidence: financetoolkit/risk/risk_model.py:6(ALPHA_CONSTRAINT)
  stage: risk_analysis
  _evidence_issues:
  - 'FN_NOT_FOUND: ALPHA_CONSTRAINT in financetoolkit/risk/risk_model.py'
- id: BD-013
  type: BA/DK
  content: scipy.signal for local extrema in support/resistance
  rationale: Efficient native implementation versus pure Python loops, leveraging
    optimized C code for peak detection that significantly improves performance on
    large historical price datasets.
  evidence: financetoolkit/technicals/overlap_model.py:7(argrelextrema)
  stage: technical_analysis
  _evidence_issues:
  - 'FN_NOT_FOUND: argrelextrema in financetoolkit/technicals/overlap_model.py'
- id: BD-014
  type: M/DK
  content: Window default of 14 for most indicators
  rationale: Industry standard based on 2 weeks of trading days (14 periods), ensuring
    default parameters align with practitioner expectations and established technical
    analysis conventions.
  evidence: financetoolkit/technicals/technicals_controller.py:103(window=14)
  stage: technical_analysis
  _evidence_issues:
