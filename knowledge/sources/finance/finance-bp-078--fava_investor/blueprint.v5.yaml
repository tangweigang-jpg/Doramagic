known_use_cases:
- id: UC-101
  name: Portfolio Management CLI Entry Point
  source: fava_investor/cli/investor.py
  type: live_trading
  business_problem: Provides a unified command-line interface for portfolio management operations including
    tax loss harvesting, asset allocation analysis, cash drag detection, and tax gain minimization.
  intent_keywords:
  - portfolio management
  - CLI
  - command line
  - tax optimization
  - investment analysis
  stage: data_collection
  negative_keywords:
  - screening
  - trading strategy
  - ML prediction
  - factor computation
  disambiguation: Are you looking to use the command-line interface directly, or do you need to integrate
    one of these modules into your own code?
  data_domain: holding_data
- id: UC-102
  name: Related Ticker Grouping Utility
  source: fava_investor/util/test_relatetickers.py
  type: data_pipeline
  business_problem: Identifies and groups equivalent or substitutable securities (e.g., VTI, VTSAX, VTSMX)
    based on metadata annotations to support tax lot management and wash sale detection.
  intent_keywords:
  - equivalent tickers
  - related securities
  - commodity grouping
  - ticker equivalence
  - substitutable assets
  stage: data_collection
  negative_keywords:
  - price prediction
  - trading signals
  - factor analysis
  disambiguation: Do you need to group equivalent securities for tax purposes, or are you looking for
    price/volume analysis of individual tickers?
  data_domain: holding_data
- id: UC-103
  name: Tax-Optimized Selling Strategy
  source: fava_investor/modules/minimizegains/test_minimizegains.py
  type: live_trading
  business_problem: Determines optimal sell order for securities to minimize realized capital gains by
    analyzing cost basis and holding periods across multiple lots.
  intent_keywords:
  - minimize gains
  - tax-efficient selling
  - capital gains optimization
  - lot selection
  - cost basis optimization
  stage: factor_computation
  negative_keywords:
  - buy signals
  - screening
  - portfolio rebalancing
  - ML prediction
  disambiguation: Are you deciding which lots to sell to minimize taxes, or are you looking for new investment
    opportunities to buy?
  data_domain: holding_data
- id: UC-104
  name: Asset Allocation Analysis
  source: fava_investor/modules/assetalloc_class/test_asset_allocation.py
  type: reporting
  business_problem: Calculates and reports portfolio allocation breakdown by asset type (stocks, bonds,
    cash, etc.) with percentage distributions from investment account holdings.
  intent_keywords:
  - asset allocation
  - portfolio breakdown
  - asset class distribution
  - allocation report
  - portfolio composition
  stage: factor_computation
  negative_keywords:
  - tax loss harvesting
  - screening
  - trading signals
  - ML prediction
  disambiguation: Do you need a report showing how your portfolio is allocated across asset types, or
    are you looking for specific tax optimization strategies?
  data_domain: holding_data
- id: UC-105
  name: Tax Loss Harvesting Opportunity Detection
  source: fava_investor/modules/tlh/test_libtlh.py
  type: live_trading
  business_problem: Identifies securities with unrealized losses that can be sold to harvest tax losses,
    typically looking back 30 days to find positions eligible for wash sale rule exceptions.
  intent_keywords:
  - tax loss harvesting
  - loss identification
  - wash sale
  - TLH opportunities
  - tax loss selling
  stage: factor_computation
  negative_keywords:
  - buy signals
  - portfolio allocation
  - screening
  - ML prediction
  disambiguation: Are you looking for securities to sell at a loss for tax benefits, or do you need to
    identify securities to buy or allocate differently?
  data_domain: holding_data
