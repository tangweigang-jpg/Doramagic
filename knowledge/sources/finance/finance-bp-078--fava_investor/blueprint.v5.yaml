    means: (1) users expecting Beancount-only usage still require Fava installed, (2) Fava upgrades could
    break AccAPI even when not using Fava, and (3) the ''pure'' Beancount API tightens coupling rather
    than decoupling as designed.'
  evidence: BD-093, BD-101, beancountinvestorapi.py:41(from fava.core import Tree)
  stage: global
  alternative_considered: Abstracting Tree into AccAPI would decouple but require reimplementing tree
    logic
  _evidence_issues:
  - 'NOT_FOUND: BD-093, BD-101, beancountinvestorapi.py'
- id: BD-114
  type: T
  content: 'INTERACTION: BD-057 × BD-092 → Decimal precision guarantee depends on single-base-currency
    assumption holding'
  rationale: BD-057 ensures Python Decimal type is used for each financial calculations, preventing floating-point
    rounding errors. However, BD-092's single-base-currency invariant means each currency conversions
    route through operating_currencies[0]. If this assumption fails (empty list, wrong currency), the
    Decimal precision in BD-057 becomes moot—the calculations may be in the wrong currency entirely. The
    precision guarantee is conditional on the currency routing being correct. A silent currency mismatch
    would produce precisely-rounded wrong answers, which could be worse than imprecise correct answers.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Adding explicit currency validation before financial calculations
- id: BD-115
  type: BA/DK
  content: 'INTERACTION: BD-020 × BD-055 → Fava version compatibility logic duplicated across FavaInvestorAPI
    with different version thresholds'
  rationale: BD-020 documents Fava version compatibility via version.parse with conditional logic for
    API differences. BD-055 documents version-specific query_func implementations for Fava 1.22+ vs 1.30+
    compatibility. These are the same decision duplicated across workers with potentially different version
    detection logic. If Fava releases version 1.40 with API changes, both BD-020 and BD-055 locations
    would need synchronized updates. Different developers might update one location but not the other,
    creating version detection inconsistencies where query results differ based on which module's version
    logic is used.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unified version detection utility with single source of truth
- id: BD-116
  type: RC
  content: 'RISK CASCADE: BD-092 → BD-002 → BD-103 → BD-037 → BD-058 → BD-069 → BD-090 → BD-091 → BD-076
    → BD-077'
  rationale: 'This chain shows how the single-base-currency invariant (BD-092) propagates through the
    entire financial calculation pipeline: BD-002 stores it at root node, BD-103 hardcodes it in asset
    allocation trees with no fallback, BD-037 uses it for currency conversion fallback logic, BD-058 relies
    on it for inventory sum currency conversion, BD-069 scales positions based on tax-adjusted values,
    BD-090/091 calculate losses/gains in the base currency, and BD-076/077 compute average/marginal tax
    rates on those values. If BD-092 fails (empty operating_currencies), the entire cascade produces wrong
    results—multi-currency portfolios would have each values calculated in an invalid currency, corrupting
    tax optimization and allocation analysis without raising errors.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Adding multi-currency support with explicit conversion rates
- id: BD-117
  type: RC
  content: 'RISK CASCADE: BD-095 → BD-102 → BD-023 → BD-008 → BD-096 → BD-024'
  rationale: 'This cascade shows how shared dependencies create coupling across modules: BD-095 makes
    libtlh.get_account_field() the sole account field source affecting both TLH and minimizegains. BD-102
    makes minimizegains depend on libtlh.gain_term() for tax term classification. BD-023/008 ensure gain_term()
    handles leap years correctly via relativedelta. BD-096 enforces strict pipeline ordering with data
    dependencies. BD-024 sets loss_threshold default of $1 which affects both pipeline stages. A bug or
    change in any upstream decision (especially gain_term leap-year logic or account field parsing) would
    cascade through each downstream tax calculations, potentially corrupting both harvestable lot identification
    AND gain minimization recommendations simultaneously.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Extracting shared components to versioned utility library
