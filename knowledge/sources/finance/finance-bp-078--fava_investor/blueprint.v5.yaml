# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-078
name: Fava Investor
sop_version: '3.6'
source:
  projects:
  - fava_investor
  commit_hash: f83db450ae3bd47d228c0fcc8b0db7b954f51d26
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Investment portfolio analysis and tax optimization for Beancount/Fava double-entry bookkeeping
  description: A comprehensive set of reports, analyses, and tools for investments that work with Beancount
    ledger data and Fava web interface, providing asset allocation visualization, tax loss harvesting
    analysis, gains minimization, and cash drag detection.
  prerequisites: Users need knowledge of Beancount double-entry bookkeeping, investment account structures,
    and basic understanding of US tax concepts (wash sales, SpecID, short/long-term gains). Configuration
    requires adding Custom directives to the Beancount file.
  not_suitable_for: Non-Beancount users, real-time trading systems, users without investment accounts
    requiring tax optimization, international users with different tax rules (wash sale window is hardcoded
    to 30 days)
stages:
- id: api_abstraction
  name: API Abstraction Layer
  order: 1
  responsibility: 'Provides unified interface for accessing Beancount ledger data from both Fava web UI
    and standalone CLI. WHY: Enables code reuse while accommodating different runtime contexts - web plugin
    vs command-line tool share the same data access logic.'
  interface:
    inputs:
    - Fava context (web) or beancount file path (CLI)
    outputs:
    - AccAPI instance with query_func, realize, price_map methods
  required_methods:
  - name: FavaInvestorAPI.query_func
    description: Executes SQL-like queries against Beancount ledger, returning namedtuple rows. Handles
      Fava version compatibility for query API changes.
    evidence: fava_investor/common/favainvestorapi.py:42-54(query_func)
  - name: AccAPI.build_price_map
    description: Constructs price map from Beancount entries for currency conversion in calculations.
    evidence: fava_investor/common/beancountinvestorapi.py:15(AccAPI)
  - name: AccAPI.realize
    description: Converts Beancount entries to realized position tree for balance calculations.
    evidence: fava_investor/common/favainvestorapi.py:13(FavaInvestorAPI)
  - name: AccAPI.get_operating_currencies
    description: Returns list of operating currencies from Beancount options.
    evidence: fava_investor/common/favainvestorapi.py:57-58(query_func)
  key_behaviors:
  - behavior: Dual-API pattern for runtime contexts
    description: FavaInvestorAPI handles web plugin context using Fava globals; AccAPI handles CLI context
      loading beancount file directly. Both implement identical interfaces via duck typing.
    evidence: fava_investor/common/favainvestorapi.py:13(FavaInvestorAPI), fava_investor/common/beancountinvestorapi.py:15(AccAPI)
  - behavior: Fava version compatibility via conditional logic
    description: query_func detects Fava version and adapts API calls accordingly, supporting Fava 1.22
      and 1.30+ with different query formats.
    evidence: fava_investor/common/favainvestorapi.py:42-54(query_func)
  - behavior: Config extracted from Custom directives
    description: get_custom_config reads 'fava-extension' Custom directives from beancount entries to
      extract module configurations, ensuring CLI and Fava extension share the same config.
    evidence: fava_investor/common/beancountinvestorapi.py:79-93(get_custom_config)
  replaceable_points:
  - name: api_implementation
    description: Which AccAPI subclass to instantiate based on runtime context
    options:
    - name: FavaInvestorAPI
      traits:
      - Web plugin context
      - Uses Fava globals
      - Version-aware
      fit_for:
      - Fava web UI extension
      - Browser-based access
      not_fit_for:
      - Standalone CLI execution
      - Headless environments
    - name: AccAPI
      traits:
      - CLI context
      - Direct beancount file loading
      - Requires fava.core.Tree
      fit_for:
      - Command-line usage
      - Batch processing
      - CI/CD pipelines
      not_fit_for:
      - Fava web plugin
      - Environments without fava installed
    default: FavaInvestorAPI
  design_decisions:
  - Duck-typed API classes without abstract base - simpler than ABC; both classes implement same method
    signatures enabling any new implementation to work
  - Fava version compatibility via version.parse - Fava 1.22 and 1.30 changed query API; conditional logic
    maintains backwards compatibility
  - Config provided via 'fava-extension' Custom directive in beancount - each module config lives in beancount
    file; CLI reads same config as Fava extension
  acceptance_hints:
  - FavaInvestorAPI.query_func returns namedtuple rows with column access via row.column_name
  - AccAPI.build_price_map successfully loads prices for each commodity pairs used in portfolio
  - get_custom_config correctly parses module configurations from Custom directives
- id: ticker_relationships
  name: Ticker Relationship Analyzer
  order: 2
  responsibility: 'Infers relationships between investment tickers from incomplete metadata declarations.
    WHY: Tax loss harvesting requires knowing which funds are ''substantially identical'' (trigger wash
    sales) vs ''substantially different'' (safe for TLH swaps), and this information should be declarable
    once and inferred transitively.'
  interface:
    inputs:
    - Beancount commodities file path
    outputs:
    - equivalents groups, substantially identical groups, TLH partner groups
  required_methods:
  - name: RelateTickers.substidenticals
    description: Returns each tickers substantially identical to given ticker by querying graph edges
      from commodity metadata.
    evidence: fava_investor/util/relatetickers.py:48(substidenticals)
  - name: RelateTickers.representative
    description: Returns canonical ticker for a substantially identical group, useful for grouping analysis.
    evidence: fava_investor/util/relatetickers.py:71(representative)
  - name: RelateTickers.compute_tlh_groups
    description: Infers complete TLH partner matrix from incomplete specification using graph traversal
      and transitive closure.
    evidence: fava_investor/util/relatetickers.py:141(compute_tlh_groups)
  key_behaviors:
  - behavior: Graph-based transitive inference
    description: User specifies A→B relationship; system infers B→A and transitively closes the graph.
      Reduces manual maintenance of ticker relationships.
    evidence: fava_investor/util/relatetickers.py:141-217(compute_tlh_groups)
  - behavior: Equivalents vs Substidenticals tax distinction
    description: Equivalents don't trigger wash sale rule; substidenticals do. This semantic difference
      affects TLH strategy recommendations.
    evidence: fava_investor/util/relatetickers.py:21-24(RelateTickers.__init__)
  - behavior: Archived tickers filtered
    description: Archived tickers are excluded from TLH groups since they are no longer held and shouldn't
      appear in active recommendations.
    evidence: fava_investor/util/relatetickers.py:18(RelateTickers.__init__)
  replaceable_points:
  - name: relationship_source
    description: Where ticker relationships are declared and read from
    options:
    - name: commodity_metadata
      traits:
      - Stored in beancount
      - Self-documenting
      - Version-controlled
      fit_for:
      - Users who manage their own beancount file
      - Version control workflows
      not_fit_for:
      - External relationship databases
      - Dynamically changing relationships
    - name: external_file
      traits:
      - Separate from beancount
      - Can be shared
      fit_for:
      - Multiple portfolio managers
      - Centralized relationship management
      not_fit_for:
      - Single-user workflows
      - Simple setups
    default: commodity_metadata
  design_decisions:
  - Graph-based inference of TLH partners - user specifies A→B; system infers B→A and transitively closes;
    reduces manual maintenance
  - Equivalents vs Substidenticals distinction - equivalents don't trigger wash sale; substidenticals
    do; different tax implications
  - Archived tickers filtered from TLH groups - archived tickers no longer held; shouldn't appear in active
    TLH recommendations
  - Metadata prefix 'a__' convention for ticker attributes - each commodity attributes prefixed; naming
    collision unlikely but possible
  acceptance_hints:
  - compute_tlh_groups correctly infers bidirectional relationships from unidirectional declarations
  - substidenticals returns empty list for tickers with no substantially identical partners
  - ScaledNAV extending RelateTickers shares the same metadata schema for equivalents/substidenticals
- id: asset_allocation_by_class
  name: Asset Allocation by Class
  order: 3
  responsibility: 'Computes portfolio allocation percentages based on commodity metadata classifications
    (asset_allocation_*). WHY: Enables investors to see if their portfolio matches target allocations
    without manual spreadsheet work, visualizing how their actual holdings compare to target allocations.'
  interface:
    inputs:
    - FavaInvestorAPI or AccAPI
    - config dict with accounts_patterns, skip_tax_adjustment
    outputs:
    - AssetClassNode tree
    - realacc balance tree
  required_methods:
  - name: treeify
    description: Builds hierarchical tree structure from flat asset_buckets by parsing underscore-separated
      names into parent-child relationships.
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:59(treeify)
  - name: bucketize
    description: Maps commodity positions to asset buckets via metadata by checking asset_allocation_*
      prefix attributes on commodity directives.
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:87(bucketize)
  - name: AssetClassNode.serialise
    description: Converts tree to fava chart-compatible format for rendering in the web UI.
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:21(AssetClassNode.serialise)
  key_behaviors:
  - behavior: Metadata-driven bucketing via asset_allocation_* prefix
    description: Users tag commodities in beancount declarations with asset_allocation_* metadata; classification
      happens without code changes. Allows dynamic reconfiguration of asset classes.
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:123(bucketize)
  - behavior: Single base currency stored in root node
    description: Every asset class values must be comparable; multi-currency requires conversion first.
      operating_currencies[0] is used as base currency.
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:69(treeify)
  - behavior: Unallocated amounts fall through to 'unknown' bucket
    description: Graceful degradation when metadata percentages don't sum to 100%; prevents silent failures
      by catching each unclassified amounts.
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:127-130(bucketize)
  replaceable_points:
  - name: bucketize_strategy
    description: How positions map to asset buckets
    options:
    - name: metadata_prefix
      traits:
      - Declarative
      - No code changes needed
      - Self-documenting in beancount
      fit_for:
      - Standard classification
      - User-managed buckets
      not_fit_for:
      - Programmatic bucket assignment
      - Dynamic classification
    - name: direct_account_mapping
      traits:
      - Explicit mapping
      - Account-based
      fit_for:
      - Simple setups
      - Fixed account structures
      not_fit_for:
      - Complex multi-level hierarchies
    default: metadata_prefix
  design_decisions:
  - Metadata-driven bucketing via asset_allocation_* prefix - allows classification without code changes;
    users tag commodities in beancount declarations
  - Single base currency stored in root node - each asset class values must be comparable; multi-currency
    requires conversion first
  - Unallocated amounts fall through to 'unknown' bucket - graceful degradation when metadata percentages
    don't sum to 100%; prevents silent failures
  - Node tree pattern with underscore-separated naming (e.g., 'equity_domestic') - ancestors() splits
    on '_' to build tree; asset bucket names MUST use underscores consistently
  acceptance_hints:
  - Commodities with asset_allocation_* metadata appear in correct bucket in tree output
  - Tree structure renders correctly in Fava chart with percentages summing to 100% (or showing 'unknown'
    for unallocated)
  - Tax-adjusted positions correctly convert cost currencies via transitive conversion
- id: asset_allocation_by_account
  name: Asset Allocation by Account
  order: 4
  responsibility: 'Groups account balances into portfolios based on regex patterns or metadata. WHY: Lets
    investors define custom portfolio groupings without changing their account naming conventions, enabling
    flexible portfolio organization independent of chart of accounts structure.'
  interface:
    inputs:
    - FavaInvestorAPI or AccAPI
    - list of pattern configs
    outputs:
    - list of (title, table_data) tuples
  required_methods:
  - name: portfolio_accounts
    description: Main dispatcher that selects strategy based on pattern_type string lookup and delegates
      to appropriate by_* function.
    evidence: fava_investor/modules/assetalloc_account/libaaacc.py:7(portfolio_accounts)
  - name: by_account_name
    description: Selects accounts via regex pattern matching on account full path.
    evidence: fava_investor/modules/assetalloc_account/libaaacc.py:20(by_account_name)
  - name: by_account_open_metadata
    description: Selects accounts via metadata attributes on Open directive.
    evidence: fava_investor/modules/assetalloc_account/libaaacc.py:39(by_account_open_metadata)
  - name: asset_allocation
    description: Computes percentage breakdown for selected account nodes.
    evidence: fava_investor/modules/assetalloc_account/libaaacc.py:58(asset_allocation)
  key_behaviors:
  - behavior: Strategy pattern via pattern_type string lookup
    description: 'Extensible: new selection strategies added by creating by_* functions; no class hierarchy
      needed. Simple function dispatch pattern.'
    evidence: fava_investor/modules/assetalloc_account/libaaacc.py:13(portfolio_accounts)
  - behavior: CLI not yet implemented
    description: cost_or_value not yet available in BeancountInvestorAPI; only Fava web UI accessible.
      CLI mode exits early.
    evidence: fava_investor/modules/assetalloc_account/assetalloc_account.py:59(assetalloc_account)
  replaceable_points:
  - name: selection_strategy
    description: How to select accounts for portfolio grouping
    options:
    - name: account_name regex
      traits:
      - Flexible
      - Pattern-based
      - No metadata required
      fit_for:
      - Standard account naming
      - Regex-friendly names
      not_fit_for:
      - Inconsistent naming
      - Dynamic selection needs
    - name: Open metadata
      traits:
      - Explicit tagging
      - Declarative
      fit_for:
      - Complex criteria
      - Non-standard naming
      not_fit_for:
      - Simple setups
      - Users avoiding metadata
    - name: account_sortkey
      traits:
      - Number-based
      - Beancount convention
      fit_for:
      - Standard beancount numbering
      not_fit_for:
      - Custom sortkey usage
    default: account_name regex
  design_decisions:
  - 'Strategy pattern via pattern_type string lookup - extensible: new selection strategies added by creating
    by_* functions; no class hierarchy needed'
  - CLI not yet implemented - cost_or_value not yet available in BeancountInvestorAPI; Fava web UI only
  acceptance_hints:
  - Accounts matching regex patterns appear in correct portfolio group
  - Percentages sum to 100% within each portfolio
  - Table output is correctly formatted for Fava rendering
- id: cash_drag
  name: Cash Drag Detector
  order: 5
  responsibility: 'Identifies uninvested cash sitting in brokerage accounts that could be deployed for
    investment. WHY: Idle cash loses purchasing power to inflation over time; detecting it enables investors
    to take action and rebalance their portfolios efficiently.'
  interface:
    inputs:
    - FavaInvestorAPI or AccAPI
    - config with accounts_pattern, metadata_label_cash
    outputs:
    - list of (title, table_data) tuples
  required_methods:
  - name: find_loose_cash
    description: Main analysis function that queries cash positions across accounts, filters empty rows,
      and formats results for display.
    evidence: fava_investor/modules/cashdrag/libcashdrag.py:23(find_loose_cash)
  - name: find_cash_commodities
    description: Builds regex pattern for cash-like commodities by combining operating currencies with
      metadata-tagged commodities.
    evidence: fava_investor/modules/cashdrag/libcashdrag.py:7(find_cash_commodities)
  key_behaviors:
  - behavior: Cash commodities include operating currencies plus metadata-tagged ones
    description: Ensures base currencies always counted as cash; extensible via asset_allocation_Bond_Cash
      metadata. Combines system currencies with user-declared cash instruments.
    evidence: fava_investor/modules/cashdrag/libcashdrag.py:16-17(find_cash_commodities)
  - behavior: Empty inventory rows filtered after query
    description: SQL GROUP BY may return zero-value rows; these are removed before table display to avoid
      confusing empty rows in output.
    evidence: fava_investor/modules/cashdrag/libcashdrag.py:44(find_loose_cash)
  replaceable_points:
  - name: cash_definition
    description: What constitutes 'cash' for drag detection
    options:
    - name: both
      traits:
      - Includes operating currencies
      - Includes metadata-tagged
      - Comprehensive
      fit_for:
      - Standard brokerage accounts
      - Most use cases
      not_fit_for:
      - Simple currency-only detection
    - name: operating_currencies
      traits:
      - Only system currencies
      - Minimal
      fit_for:
      - Simple detection
      - Single-currency portfolios
      not_fit_for:
      - Accounts with money market funds
      - Bond positions tagged as cash
    - name: metadata_tagged
      traits:
      - Only explicit declarations
      - Declarative
      fit_for:
      - Explicit cash categorization
      - Complex cash instruments
      not_fit_for:
      - Default operating currency handling
    default: both
  design_decisions:
  - Cash commodities include operating currencies + metadata-tagged ones - ensures base currencies always
    counted as cash; extensible via asset_allocation_Bond_Cash metadata
  - Empty inventory rows filtered after query - SQL GROUP BY may return zero-value rows; need to remove
    before table display
  acceptance_hints:
  - Cash positions in brokerage accounts appear in output with correct balances
  - Operating currency (e.g., USD) always appears as potential cash drag
  - Zero-value rows do not appear in final table output
- id: tax_loss_harvesting
  name: Tax Loss Harvester
  order: 6
  responsibility: 'Finds investment lots with unrealized losses suitable for tax loss harvesting (TLH).
    WHY: TLH turns paper losses into actual tax deductions, reducing current tax burden in the US SpecID
    method. Allows investors to systematically identify harvest opportunities.'
  interface:
    inputs:
    - FavaInvestorAPI or AccAPI
    - config with accounts_pattern, wash_pattern, loss_threshold
    outputs:
    - harvestable_table, summary, recents, by_commodity
  required_methods:
  - name: find_harvestable_lots
    description: Core TLH logic that finds lots with unrealized losses exceeding threshold, considering
      wash sale restrictions.
    evidence: fava_investor/modules/tlh/libtlh.py:67(find_harvestable_lots)
  - name: gain_term
    description: Determines if gain/loss is short or long term using relativedelta to handle leap years
      correctly per IRS rules (>1 year = strictly more than 365 days).
    evidence: fava_investor/modules/tlh/libtlh.py:37(gain_term)
  - name: query_recently_bought
    description: Finds purchases in last 30 days for wash sale detection by checking substantially identical
      securities.
    evidence: fava_investor/modules/tlh/libtlh.py:193(query_recently_bought)
  - name: recently_sold_at_loss
    description: Finds recent sales with losses to avoid wash sale violations when considering buying
      substantially identical securities.
    evidence: fava_investor/modules/tlh/libtlh.py:219(recently_sold_at_loss)
  - name: harvestable_by_commodity
    description: Aggregates losses by ticker for summary view showing total harvestable amounts per security.
    evidence: fava_investor/modules/tlh/libtlh.py:145(harvestable_by_commodity)
  key_behaviors:
  - behavior: 30-day wash sale window hardcoded
    description: IRS wash sale rule specifies 30 days before/after sale; hardcoded ensures consistency
      across each analysis. Cannot be configured for international tax rules.
    evidence: fava_investor/modules/tlh/libtlh.py:209(query_recently_bought)
  - behavior: relativedelta for gain term to handle leap years
    description: IRS defines >1 year as strictly more than 365 days; dateutil handles Feb29 correctly.
      Prevents misclassification of gains near year boundaries.
    evidence: fava_investor/modules/tlh/libtlh.py:38-40(gain_term)
  - behavior: Substantially identical tickers from commodity metadata
    description: Avoids selling VTI to buy VOO (substantially identical, triggers wash sale); user defines
      groups via a__substidenticals in beancount.
    evidence: fava_investor/modules/tlh/libtlh.py:129(find_harvestable_lots)
  - behavior: Decimal precision in financial calculations
    description: Summary aggregates currency values via Decimal sum to preserve precision for financial
      calculations.
    evidence: fava_investor/modules/tlh/libtlh.py:270-271(summarize_tlh)
  replaceable_points:
  - name: wash_window
    description: Days after sale to avoid buying substantially identical securities
    options:
    - name: 30 (US default)
      traits:
      - IRS standard
      - Hardcoded
      - No configuration
      fit_for:
      - US investors
      - Standard wash sale compliance
      not_fit_for:
      - International tax jurisdictions
      - Custom wash sale rules
    - name: custom
      traits:
      - Configurable
      - Requires code change
      fit_for:
      - International users
      - Non-US tax rules
      not_fit_for:
      - Users wanting simple defaults
      - US compliance
    default: 30 (US default)
  - name: loss_threshold
    description: Minimum loss in base currency to flag for TLH
    options:
    - name: '0'
      traits:
      - Show each losses
      - Comprehensive
      fit_for:
      - Tax optimization focused
      - Every loss opportunities
      not_fit_for:
      - High-volume trading
      - Small loss tolerance
    - name: '1'
      traits:
      - Filter noise
      - Reasonable default
      fit_for:
      - Standard use
      - Most investors
      not_fit_for:
      - Micro-cap investors
      - High-frequency small losses
    default: '1'
  design_decisions:
  - '30-day wash sale window hardcoded in query - IRS wash sale rule: 30 days before/after sale; hardcoded
    ensures consistency across each analysis'
  - relativedelta for gain term to handle leap years - IRS defines >1 year as strictly more than 365 days;
    dateutil handles Feb29 correctly
  - Substantially identical tickers read from commodity metadata - avoids selling VTI to buy VOO (substantially
    identical); user defines groups in beancount
  - Summary aggregates currency values via Decimal sum - Decimal preserves precision for financial calculations
  - Account filter 'account_sortkey(account) ~ "^[01]"' hardcoded - Beancount convention for account numbering;
    non-standard ledgers fail silently
  acceptance_hints:
  - Lots with unrealized losses exceeding threshold appear in harvestable table
  - Wash sale violations correctly identified within 30-day window
  - Short-term vs long-term classification matches IRS rules (>365 days)
  - Substantially identical securities correctly excluded from harvest recommendations
- id: minimize_gains
  name: Gains Minimizer
  order: 7
  responsibility: 'Determines optimal lot selection to minimize capital gains when selling. WHY: In US
    SpecID method, choosing which lots to sell directly impacts tax liability. This module helps investors
    minimize their tax burden by prioritizing highest-loss lots.'
  interface:
    inputs:
    - FavaInvestorAPI or AccAPI
    - config with accounts_pattern, st_tax_rate, lt_tax_rate
    outputs:
    - list of tables including sorted by est_tax_percent
  required_methods:
  - name: find_minimized_gains
    description: Main function that finds lots sorted by tax efficiency (lowest gain first) with cumulative
      columns for progressive selling analysis.
    evidence: fava_investor/modules/minimizegains/libminimizegains.py:43(find_minimized_gains)
  - name: find_tax_burden
    description: Interpolates tax burden for arbitrary sale amount, showing tax impact at different sale
      sizes.
    evidence: fava_investor/modules/minimizegains/libminimizegains.py:16(find_tax_burden)
  key_behaviors:
  - behavior: Lots sorted by estimated tax percentage (ascending)
    description: Sells highest-loss lots first to minimize immediate tax burden. Tax percentage = estimated
      tax / proceeds.
    evidence: fava_investor/modules/minimizegains/libminimizegains.py:98(find_minimized_gains)
  - behavior: Cumulative columns added after sorting
    description: 'Enables progressive selling analysis: if you sell X shares, here''s your tax situation
      at each step.'
    evidence: fava_investor/modules/minimizegains/libminimizegains.py:100-123(find_minimized_gains)
  - behavior: Short-term and long-term tax rates from config
    description: 'Allows jurisdiction-specific rates; US 2024: ST=37% max, LT=20% max. Configurable for
      different tax situations.'
    evidence: fava_investor/modules/minimizegains/libminimizegains.py:46-47(find_minimized_gains)
  replaceable_points:
  - name: lot_selection_algorithm
    description: How to order lots for selling
    options:
    - name: lowest_gain_first
      traits:
      - Tax-optimized
      - Prioritizes losses
      - Default
      fit_for:
      - Tax minimization
      - US SpecID investors
      not_fit_for:
      - Cash flow needs
      - Specific lot requirements
    - name: highest_gain_first
      traits:
      - Cash generative
      - Risk reducing
      fit_for:
      - Reducing positions
      - Capital gains acceptance
      not_fit_for:
      - Tax optimization
    - name: FIFO
      traits:
      - Simple
      - First-in-first-out
      - Conventional
      fit_for:
      - Long-term holders
      - Simple tracking
      not_fit_for:
      - Tax optimization
      - Short-term traders
    - name: LIFO
      traits:
      - Last-in-first-out
      - Matches recent prices
      fit_for:
      - Rising markets
      - Simple tracking
      not_fit_for:
      - Tax optimization
      - Falling markets
    default: lowest_gain_first
  design_decisions:
  - Lots sorted by estimated tax percentage (ascending) - sells highest-loss lots first to minimize immediate
    tax burden
  - 'Cumulative columns added after sorting - enables progressive selling: if you sell X, here''s your
    tax situation'
  - 'Short-term and long-term tax rates from config - allows jurisdiction-specific rates; US 2024: ST=37%
    max, LT=20% max'
  - minimizegains relies on libtlh.gain_term() for short/long term classification - tax calculations would
    use wrong term classification if changed
  acceptance_hints:
  - Lots appear sorted with lowest gain/loss first in output
  - Cumulative tax columns show correct incremental tax burden
  - Short-term and long-term lots are correctly separated with appropriate tax rates applied
- id: metadata_summarizer
  name: Metadata Summarizer
  order: 8
  responsibility: 'Extracts and displays metadata from account/commodity Open directives as formatted
    tables. WHY: Allows investors to store and view reference info (phone numbers, account numbers, contact
    details) alongside their ledger, making metadata accessible without manual inspection.'
  interface:
    inputs:
    - FavaInvestorAPI or AccAPI
    - list of config dicts with directive_type, columns
    outputs:
    - list of (title, table_data) tuples
  required_methods:
  - name: build_tables
    description: Iterates through config list building one table per config dict, handling both accounts
      and commodities directive types.
    evidence: fava_investor/modules/summarizer/libsummarizer.py:59(build_tables)
  - name: active_accounts_metadata
    description: Extracts metadata from Open directives matching account pattern, excluding commodity
      leaf accounts with existing parents.
    evidence: fava_investor/modules/summarizer/libsummarizer.py:131(active_accounts_metadata)
  - name: commodities_metadata
    description: Extracts metadata from Commodity directives for display.
    evidence: fava_investor/modules/summarizer/libsummarizer.py:101(commodities_metadata)
  key_behaviors:
  - behavior: Metadata prefix filtering for flexible column selection
    description: Allows grouping related metadata under prefix; e.g., 'contact_' matches 'contact_phone',
      'contact_email'. Enables organization of related fields.
    evidence: fava_investor/modules/summarizer/libsummarizer.py:121-128(get_metadata)
  - behavior: Commodity leaf accounts excluded if parent is open
    description: Commodity accounts (uppercase) shouldn't appear in account summaries if parent account
      exists. Prevents duplicate/confusing entries.
    evidence: fava_investor/modules/summarizer/libsummarizer.py:47-56(is_commodity_leaf_with_parent)
  replaceable_points:
  - name: directive_type
    description: Source of metadata for summarization
    options:
    - name: accounts
      traits:
      - Open directives
      - Account-level metadata
      fit_for:
      - Account reference info
      - Contact details
      not_fit_for:
      - Commodity-level metadata
    - name: commodities
      traits:
      - Commodity directives
      - Security-level metadata
      fit_for:
      - Ticker info
      - Fund details
      not_fit_for:
      - Account-level reference info
    default: accounts
  design_decisions:
  - Metadata prefix filtering for flexible column selection - allows grouping related metadata under prefix;
    e.g., 'contact_' matches 'contact_phone', 'contact_email'
  - Commodity leaf accounts excluded if parent is open - commodity accounts (uppercase) shouldn't appear
    in account summaries if parent exists
  - Account filter 'account_sortkey(account) ~ "^[01]"' assumed - Beancount convention for account numbering
  acceptance_hints:
  - Metadata from Open directives appears in correctly formatted table
  - Prefix filtering correctly selects matching columns
  - Commodity accounts with existing parent accounts don't appear in output
data_flow:
- from_stage: beancount_ledger
  to_stage: api_abstraction
  data: entries, options_map, realization tree, price map - raw Beancount data loaded and parsed
- from_stage: api_abstraction
  to_stage: asset_allocation_by_class
  data: realacc (realized positions), commodity_directives, operating_currencies - for asset bucket mapping
    and currency conversion
- from_stage: api_abstraction
  to_stage: asset_allocation_by_account
  data: root_tree (account hierarchy), account_open_close (account metadata) - for portfolio grouping
    by account
- from_stage: api_abstraction
  to_stage: cash_drag
  data: commodity_directives (for cash-like identification), query results (for position balances)
- from_stage: api_abstraction
  to_stage: tax_loss_harvesting
  data: query results for lots with cost basis, commodity_directives (for substantially identical relationships)
- from_stage: api_abstraction
  to_stage: minimize_gains
  data: query results for lots with basis and acquisition dates for tax classification
- from_stage: api_abstraction
  to_stage: metadata_summarizer
  data: account_open_close (Open directives), commodity_directives (Commodity directives)
- from_stage: ticker_relationships
  to_stage: tax_loss_harvesting
  data: a__equivalents, a__substidenticals, a__tlh_partners - ticker relationship metadata for wash sale
    detection
- from_stage: module_libs (each analysis modules)
  to_stage: HTML_template (Fava UI)
  data: processed tables (rtypes, rrows, extra, footer) tuples for rendering
- from_stage: module_libs (each analysis modules)
  to_stage: CLI_presenter
  data: (rtypes, rrows, extra, footer) tuples for terminal output formatting
global_contracts:
- Every modules return (rtypes, rrows, extra, footer) table format - standardized output tuple consumed
  by both Fava template and CLI presenter
- 'AccAPI must implement: query_func, realize, root_tree, build_price_map, get_commodity_directives, get_operating_currencies
  - interface contract for data access abstraction'
- Every financial calculations use Decimal for precision - monetary calculations preserve exact decimal
  representation without floating-point errors
- Row data uses namedtuple for column access by name - column access via row.column_name throughout each
  modules
- Config provided via 'fava-extension' Custom directive in beancount - each module configurations live
  in beancount file for both CLI and Fava extension
- Every modules use operating_currencies[0] as single base currency for ALL financial calculations - multi-currency
  portfolios collapse to single base currency
- Metadata prefix 'a__' convention for auto-generated ticker attributes vs 'asset_allocation_' for user
  configuration - distinct namespaces prevent collision
- Namedtuple-based tables throughout; column access via row.column_name - changing column order breaks
  consumers; must rebuild namedtuple
business_decisions:
- id: BD-001
  type: B
  content: Metadata-driven bucketing via asset_allocation_* prefix
  rationale: 'Allows classification without code changes; users tag commodities in beancount declarations
    with asset_allocation_* metadata. Boundary: only prefixes matching asset_allocation_* are recognized;
    this decouples classification logic from commodity definitions, enabling users to add new asset classes
    by simply tagging commodities in the beancount file.'
  evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:87(bucketize)
  stage: asset_allocation_by_class
  alternative_considered: Hardcoding classification rules would require code changes for each new commodity
    type.
- id: BD-002
  type: B
  content: Single base currency stored in root node
  rationale: 'Every asset class values must be comparable for aggregation and reporting. Multi-currency
    requires explicit conversion first, ensuring values are normalized to a common currency. Boundary:
    if root node lacks base currency, aggregation fails gracefully with an error; this prevents silent
    mixed-currency aggregation which would produce nonsensical percentages.'
  evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:59(treeify)
  stage: asset_allocation_by_class
  alternative_considered: Allowing multi-currency without conversion would produce nonsensical aggregate
    percentages and misleading portfolio reports.
- id: BD-003
  type: BA
  content: Unallocated amounts fall through to 'unknown' bucket
  rationale: 'Graceful degradation when metadata percentages don''t sum to 100%. Boundary: any amounts
    not matched by asset_allocation_* metadata fall into the ''unknown'' bucket, ensuring 100% allocation
    always shown in reports. This prevents silent failures and makes under-allocated or unclassified positions
    immediately visible to users.'
  evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:87(bucketize)
  stage: asset_allocation_by_class
  alternative_considered: Failing or warning when percentages don't sum to 100% would be more disruptive
    and prevent report generation.
- id: BD-004
  type: B
  content: Strategy pattern via pattern_type string lookup
  rationale: 'Extensible: new selection strategies added by creating by_* functions; no class hierarchy
    needed. Boundary: any new strategy must have a corresponding by_* function that matches the pattern_type
    string from config. This keeps the code simple while allowing easy expansion of account selection
    logic.'
  evidence: fava_investor/modules/assetalloc_account/libaaacc.py:7(portfolio_accounts)
  stage: asset_allocation_by_account
  alternative_considered: Full strategy pattern with classes would add complexity for limited benefit
    given the small number of strategies.
- id: BD-005
  type: B/DK
  content: Cash commodities include operating currencies + metadata-tagged ones
  rationale: 'Ensures base currencies always counted as cash; extensible via asset_allocation_Bond_Cash
    metadata. Boundary: operating currencies defined in CURRENCIES directive are always treated as cash;
    additionally, commodities tagged with asset_allocation_Bond_Cash metadata (e.g., money market funds)
    are treated as cash equivalents for drag analysis.'
  evidence: fava_investor/modules/cashdrag/libcashdrag.py:7(find_cash_commodities)
  stage: cash_drag
  alternative_considered: Only using operating currencies would miss cash-equivalent instruments like
    money market funds that sit in brokerage accounts.
- id: BD-006
  type: BA
  content: Empty inventory rows filtered after query
  rationale: 'SQL GROUP BY may return zero-value rows; need to remove before table display. Boundary:
    filtering happens post-query in Python, ensuring only positions with non-zero inventory appear in
    the cash drag report. This approach is simpler than complex SQL HAVING clauses.'
  evidence: fava_investor/modules/cashdrag/libcashdrag.py:23(find_loose_cash)
  stage: cash_drag
  alternative_considered: Modifying SQL queries to exclude zeros with HAVING would be more complex and
    database-specific.
- id: BD-007
  type: B/DK
  content: 30-day wash sale window hardcoded in query
  rationale: 'IRS wash sale rule: 30 days before/after sale; hardcoded ensures consistency across each
    analysis. Boundary: the 30-day constant (61 total days when counting both sides) is hardcoded to ensure
    the same wash sale window is applied uniformly, avoiding configuration drift or user errors that could
    cause non-compliance.'
  evidence: fava_investor/modules/tlh/libtlh.py:193(query_recently_bought)
  stage: tax_loss_harvesting
  alternative_considered: Making configurable would allow non-US jurisdictions but would require validation
    and could lead to incorrect configurations.
- id: BD-008
  type: B/BA
  content: relativedelta for gain term to handle leap years
  rationale: 'IRS defines >1 year as strictly more than 365 days; dateutil handles Feb29 correctly. Boundary:
    relativedelta correctly calculates 1 year from Feb 29, 2024 as Feb 28, 2025, matching IRS interpretation
    of ''greater than 1 year'' for long-term capital gains qualification.'
  evidence: fava_investor/modules/tlh/libtlh.py:38-40(gain_term)
  stage: tax_loss_harvesting
  alternative_considered: Using simple 365-day calculation would misclassify gains near leap years, potentially
    causing incorrect tax rate application.
- id: BD-009
  type: B/BA
  content: Substantially identical tickers read from commodity metadata
  rationale: 'Avoids selling VTI to buy VOO (substantially identical); user defines groups in beancount.
    Boundary: wash sale applies only within groups marked as substantially identical; cross-group transactions
    are assumed distinct. This allows users to define their own equivalence sets without hardcoding specific
    ticker pairs.'
  evidence: fava_investor/modules/tlh/libtlh.py:67(find_harvestable_lots)
  stage: tax_loss_harvesting
  alternative_considered: Hardcoding ticker relationships (e.g., VTI/VOO) would be inflexible, miss user-specific
    instruments, and require code changes for updates.
- id: BD-010
  type: B/RC
  content: Summary aggregates currency values via Decimal sum
  rationale: 'Decimal preserves precision for financial calculations; avoids floating-point rounding errors.
    Boundary: each monetary sums use Decimal type to ensure exact representation of cents and avoid 0.1
    + 0.2 = 0.30000000000000004 issues that could cause off-by-cent discrepancies in tax calculations.'
  evidence: fava_investor/modules/tlh/libtlh.py:263(summarize_tlh)
  stage: tax_loss_harvesting
  alternative_considered: Using float would introduce subtle rounding errors in financial reports, potentially
    causing discrepancies in tax filings.
- id: BD-011
  type: B/RC
  content: Lots sorted by estimated tax percentage (ascending)
  rationale: 'Sells highest-loss lots first to minimize immediate tax burden. Boundary: lots with negative
    gain (loss) are sorted with most negative first for harvesting; positive gains sorted by lowest tax
    rate first. This provides the most tax-efficient liquidation order for a given sell amount.'
  evidence: fava_investor/modules/minimizegains/libminimizegains.py:43(find_minimized_gains)
  stage: minimize_gains
  alternative_considered: LIFO or FIFO would not necessarily minimize taxes and could produce sub-optimal
    tax outcomes.
- id: BD-012
  type: BA
  content: Cumulative columns added after sorting
  rationale: 'Enables progressive selling: if you sell X, here''s your tax situation. Boundary: cumulative
    columns reflect the running total of selling amounts and associated taxes as you proceed through the
    sorted lot list, allowing users to simulate different sell quantities and see tax impact at each level.'
  evidence: fava_investor/modules/minimizegains/libminimizegains.py:43(find_minimized_gains)
  stage: minimize_gains
  alternative_considered: Static totals would not allow progressive analysis and would require multiple
    separate queries to simulate different sell amounts.
- id: BD-013
  type: B/BA
  content: Short-term and long-term tax rates from config
  rationale: 'Allows jurisdiction-specific rates; US 2024: ST=37% max, LT=20% max. Boundary: rates are
    configurable via beancount Custom directives to support different tax jurisdictions; defaults are
    US 2024 rates. This decouples tax logic from jurisdiction-specific constants for international use.'
  evidence: fava_investor/modules/minimizegains/libminimizegains.py:46-47(find_minimized_gains)
  stage: minimize_gains
  alternative_considered: Hardcoding US rates would prevent use in other jurisdictions and require code
    changes for international users.
- id: BD-014
  type: B
  content: Metadata prefix filtering for flexible column selection
  rationale: 'Allows grouping related metadata under prefix; e.g., ''contact_'' matches ''contact_phone'',
    ''contact_email''. Boundary: prefix matching enables flexible schema without requiring a fixed list
    of metadata keys; users can add arbitrary metadata attributes without code changes.'
  evidence: fava_investor/modules/summarizer/libsummarizer.py:121-128(get_metadata)
  stage: metadata_summarizer
  alternative_considered: Fixed metadata keys would require code changes for new attributes and limit
    the flexibility of beancount metadata.
- id: BD-015
  type: BA
  content: Commodity leaf accounts excluded if parent is open
  rationale: 'Commodity accounts (uppercase) shouldn''t appear in account summaries if parent exists.
    Boundary: when an account has an open parent account, the child commodity account is filtered from
    summaries to avoid duplication. This prevents showing both the parent aggregate and individual commodity
    balances.'
  evidence: fava_investor/modules/summarizer/libsummarizer.py:47-56(is_commodity_leaf_with_parent)
  stage: metadata_summarizer
  alternative_considered: Showing each accounts would clutter summaries with redundant commodity balances
    and confuse users about actual holdings.
- id: BD-016
  type: B
  content: Graph-based inference of TLH partners
  rationale: 'User specifies A→B; system infers B→A and transitively closes; reduces manual maintenance.
    Boundary: if A is substantially identical to B and B to C, then A, B, and C form a single TLH group.
    This automatic transitive closure reduces configuration burden and ensures symmetry.'
  evidence: fava_investor/util/relatetickers.py:141-217(compute_tlh_groups)
  stage: ticker_relationships
  alternative_considered: Requiring explicit bidirectional relationships would increase maintenance burden
    and risk inconsistencies when users forget to add reverse entries.
- id: BD-017
  type: B/DK
  content: Equivalents vs Substidenticals distinction
  rationale: 'Equivalents don''t trigger wash sale; substidenticals do; different tax implications. Boundary:
    equivalents are freely interchangeable without triggering wash sale; substantially identical tickers
    trigger wash sale if bought/sold within 61-day window. This distinction is critical for correct tax
    compliance.'
  evidence: fava_investor/util/relatetickers.py:48(substidenticals)
  stage: ticker_relationships
  alternative_considered: Treating each relationships as substantially identical would over-flag wash
    sales and incorrectly prevent equivalent fund switches.
- id: BD-018
  type: BA
  content: Archived tickers filtered from TLH groups
  rationale: 'Archived tickers no longer held; shouldn''t appear in active TLH recommendations. Boundary:
    archived tickers are excluded from TLH group analysis to prevent recommending sales of positions that
    no longer exist. This keeps recommendations actionable and relevant.'
  evidence: fava_investor/util/relatetickers.py:35(non_archived_set)
  stage: ticker_relationships
  alternative_considered: Including archived would produce recommendations for non-existent positions
    that users cannot act upon.
- id: BD-019
  type: M
  content: Duck-typed API classes, no abstract base
  rationale: 'Simpler than ABC; both classes implement same method signatures; any new implementation
    works. Boundary: duck typing relies on implicit interface contracts; new implementations must match
    the expected method signatures (get_commodity_value, get_cost_basis, get_open_amounts). This avoids
    formal interface ceremony.'
  evidence: fava_investor/common/favainvestorapi.py:13(FavaInvestorAPI)
  stage: api_abstraction
  alternative_considered: Abstract Base Classes would add complexity, require explicit registration, and
    provide limited benefit given the small number of implementations.
- id: BD-020
  type: B
  content: Fava version compatibility via version.parse
  rationale: 'Fava 1.22 and 1.30 changed query API; conditional logic maintains backwards compatibility.
    Boundary: version detection allows the same code to work with multiple Fava versions by selecting
    appropriate query methods. This prevents breaking changes when users upgrade Fava.'
  evidence: fava_investor/common/favainvestorapi.py:42-54(query_func)
  stage: api_abstraction
  alternative_considered: Requiring specific Fava version would limit user flexibility and force upgrades
    that might break other Fava extensions.
  vague_rationale: true
- id: BD-021
  type: B
  content: Config extracted from Custom directives
  rationale: 'Every module config lives in beancount file; CLI reads same config as Fava extension. Boundary:
    configuration is centralized in beancount Custom directives, ensuring both CLI and Fava extension
    use identical settings. This eliminates configuration drift between interfaces.'
  evidence: fava_investor/common/beancountinvestorapi.py:79-93(get_custom_config)
  stage: api_abstraction
  alternative_considered: Separate config files would risk divergence between CLI and Fava, leading to
    inconsistent behavior depending on which interface is used.
- id: BD-022
  type: B/DK
  content: 30-day wash sale window for both recent purchases and recent sales
  rationale: The 30-day wash sale window is enforced on both sides of any transaction (purchases and sales)
    to comply with IRS wash sale regulations. This boundary ensures that selling a security at a loss
    and repurchasing within 30 days triggers wash sale treatment, disallowing the loss deduction. The
    window applies symmetrically to catch each overlapping wash sale scenarios.
  evidence: fava_investor/modules/tlh/libtlh.py:209(module)
  stage: tax_loss_harvesting
  _evidence_issues:
  - 'FN_NOT_FOUND: module in fava_investor/modules/tlh/libtlh.py'
- id: BD-023
  type: B/BA
  content: 'Long-term gain threshold: >1 year using relativedelta accounting for leap years'
  rationale: The >1 year threshold uses relativedelta for accurate date arithmetic that properly handles
    leap years and varying month lengths. This boundary distinguishes long-term from short-term capital
    gains, as defined by US tax law requiring assets be held more than one year for long-term treatment.
    Accurate calculation ensures correct tax rate application.
  evidence: fava_investor/modules/tlh/libtlh.py:40(gain_term)
  stage: tax_loss_harvesting
- id: BD-024
  type: B/BA
  content: Default loss_threshold of 1 dollar
  rationale: The default loss_threshold of $1 establishes a minimum loss amount required before triggering
    tax loss harvesting. This conservative boundary prevents harvesting of trivial losses that would generate
    insignificant tax benefits while potentially incurring transaction costs. Users can adjust this threshold
    based on their transaction cost structure.
  evidence: fava_investor/modules/tlh/libtlh.py:96(module)
  stage: tax_loss_harvesting
  alternative_considered: Setting threshold higher (e.g., $100) would reduce trades but might miss small
    harvesting opportunities
  _evidence_issues:
  - 'FN_NOT_FOUND: module in fava_investor/modules/tlh/libtlh.py'
- id: BD-025
  type: B/RC
  content: Uses a__substidenticals metadata to identify substantially identical securities
  rationale: The a__substidenticals metadata field identifies securities considered substantially identical
    by the user for wash sale tracking. This boundary allows customization of what constitutes 'substantially
    identical' beyond generic fund matching, enabling compliance with IRS rules that consider the economic
    substance of replacement securities.
  evidence: fava_investor/modules/tlh/libtlh.py:45(get_metavalue)
  stage: tax_loss_harvesting
  vague_rationale: true
- id: BD-026
  type: B/BA
  content: Filter accounts via account_sortkey matching ^[01] pattern
  rationale: Accounts are filtered using account_sortkey that matches the ^[01] regex pattern, establishing
    a boundary for which accounts participate in tax loss harvesting. Accounts starting with 0 or 1 in
    their sortkey are included, allowing users to control which accounts are processed through naming
    convention.
  evidence: fava_investor/modules/tlh/libtlh.py:82(module)
  stage: tax_loss_harvesting
  alternative_considered: Using explicit account lists instead of patterns would be more precise but less
    flexible
  _evidence_issues:
  - 'FN_NOT_FOUND: module in fava_investor/modules/tlh/libtlh.py'
- id: BD-027
  type: B/DK
  content: Earliest safe sale date = acquisition_date + 31 days
  rationale: The earliest safe sale date is calculated as acquisition_date plus 31 days, establishing
    a boundary one day beyond the 30-day wash sale window. This ensures sales occur outside the wash sale
    period, allowing the loss to be claimed while avoiding disallowed loss adjustments from repurchasing
    too soon.
  evidence: fava_investor/modules/tlh/libtlh.py:204(module)
  stage: tax_loss_harvesting
  _evidence_issues:
  - 'FN_NOT_FOUND: module in fava_investor/modules/tlh/libtlh.py'
- id: BD-028
  type: B/RC
  content: Sort harvestable table by highest to lowest losses
  rationale: The harvestable table is sorted in descending order by loss amount, prioritizing the largest
    tax-loss harvesting opportunities. This boundary establishes a clear decision hierarchy for users
    to focus on highest-impact harvesting candidates first, especially when constrained by wash sale rules
    limiting available opportunities.
  evidence: fava_investor/modules/tlh/libtlh.py:26-34(sort_harvestable_table)
  stage: tax_loss_harvesting
  alternative_considered: Sorting by date or ticker could be useful alternatives but would change prioritization
    logic
- id: BD-029
  type: B/RC
  content: Separate wash_pattern to distinguish taxable accounts from wash-sale accounts
  rationale: Separate wash_pattern configurations distinguish taxable accounts from wash-sale accounts,
    establishing a boundary between accounts where harvesting is beneficial versus accounts that could
    trigger wash sales. This prevents inadvertent wash sales when harvesting in one account could affect
    positions in another related account.
  evidence: fava_investor/modules/tlh/libtlh.py:76,196-198(module)
  stage: tax_loss_harvesting
  _evidence_issues:
  - 'FN_NOT_FOUND: module in fava_investor/modules/tlh/libtlh.py'
- id: BD-030
  type: B/DK
  content: Deduplicate recent purchases by ticker across substantially identical funds
  rationale: Recent purchases are deduplicated by ticker across substantially identical funds to prevent
    multiple wash sale windows from being triggered by purchases of different funds that represent the
    same underlying position. This boundary ensures each ticker only appears once in the wash sale check,
    avoiding false positives from fund family substitutions.
  evidence: fava_investor/modules/tlh/libtlh.py:178-179(module)
  stage: tax_loss_harvesting
  _evidence_issues:
  - 'FN_NOT_FOUND: module in fava_investor/modules/tlh/libtlh.py'
- id: BD-031
  type: B/BA
  content: Tax adjustment enabled by default in asset allocation
  rationale: Tax adjustment is enabled by default in asset allocation calculations, applying a conservative
    boundary that automatically includes tax impact unless explicitly disabled by the user. This ensures
    allocations reflect after-tax实际情况 for taxable accounts, preventing misleading asset allocation displays
    that ignore tax drag.
  evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:202(skip_tax_adjustment)
  stage: asset_allocation_by_class
  alternative_considered: Disabling by default would be simpler but could mislead users about actual after-tax
    allocation
  _evidence_issues:
  - 'FN_NOT_FOUND: skip_tax_adjustment in fava_investor/modules/assetalloc_class/libassetalloc.py'
- id: BD-032
  type: B
  content: Use first operating currency as base currency for each conversions
  rationale: The first operating currency defined in the portfolio is used as the base currency for each
    conversions, establishing a consistent boundary point for cross-currency calculations. This eliminates
    ambiguity in multi-currency portfolios by always converting through a single reference currency.
  evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:69,92(module)
  stage: asset_allocation_by_class
  alternative_considered: Using a user-specified base currency or USD would provide flexibility but add
    configuration burden
  _evidence_issues:
  - 'FN_NOT_FOUND: module in fava_investor/modules/assetalloc_class/libassetalloc.py'
- id: BD-033
  type: B
  content: Bucket unallocated percentages into 'unknown' bucket when metadata < 100%
  rationale: Percentages that do not sum to 100% in asset allocation metadata are bucketed into an 'unknown'
    category, establishing a clear boundary for handling incomplete allocation definitions. This prevents
    silent misallocation and highlights configuration errors by making undefined allocation visible.
  evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:127-130(module)
  stage: asset_allocation_by_class
  alternative_considered: Silently scaling to 100% would hide configuration errors; rejecting incomplete
    configs would break valid use cases
  _evidence_issues:
  - 'FN_NOT_FOUND: module in fava_investor/modules/assetalloc_class/libassetalloc.py'
- id: BD-034
  type: B/BA
  content: Skip negative balances (liabilities) in asset allocation
  rationale: Negative account balances representing liabilities are excluded from asset allocation calculations,
    establishing a boundary that only includes positive asset values. This ensures asset allocation reflects
    actual holdings rather than net worth including debts, which is typically desired for investment policy
    compliance.
  evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:100-102(module)
  stage: asset_allocation_by_class
  alternative_considered: Including liabilities would show net worth allocation but could confuse investment
    policy monitoring
  _evidence_issues:
  - 'FN_NOT_FOUND: module in fava_investor/modules/assetalloc_class/libassetalloc.py'
- id: BD-035
  type: B
  content: Remove empty accounts and zero-balance ancestor accounts
  rationale: Empty accounts and ancestor accounts with zero balances are removed from asset allocation
    calculations, establishing a boundary that only includes meaningful account balances. This prevents
    cluttered displays and ensures only accounts with actual holdings or informational value are included.
  evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:154-156,171-173(module)
  stage: asset_allocation_by_class
  alternative_considered: Keeping each accounts would preserve hierarchy but add clutter from inactive
    accounts
  _evidence_issues:
  - 'FN_NOT_FOUND: module in fava_investor/modules/assetalloc_class/libassetalloc.py'
- id: BD-036
  type: B/BA
  content: Use 'asset_allocation_' metadata prefix for bucket definitions
  rationale: Asset allocation bucket definitions use the 'asset_allocation_' metadata prefix, establishing
    a clear naming boundary that distinguishes allocation metadata from other custom metadata. This convention
    prevents conflicts and makes allocation configuration easily identifiable in the beancount file.
  evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:93-94(module)
  stage: asset_allocation_by_class
  alternative_considered: Using different prefixes would require users to learn new conventions; no prefix
    would cause conflicts
  _evidence_issues:
  - 'FN_NOT_FOUND: module in fava_investor/modules/assetalloc_class/libassetalloc.py'
- id: BD-037
  type: B
