replaceable_slots:
- id: slot-001
  name: ticker_metadata_provider
  description: 'Choose yfinance for broadest free coverage of mutual funds and ETFs with metadata (ISIN,
    expense ratios). Choose Alpha Vantage or IEX if you need an official API with SLA guarantees. Note:
    fava_investor currently hard-codes yfinance in CachedTickerInfo; switching requires code changes to
    fava_investor/util/cachedtickerinfo.py'
  used_in_stages: []
  options:
  - name: Yahoo Finance (yfinance)
    traits:
    - free
    - no_auth
    - unofficial_api
    - wide_coverage
    - global
    fit_for:
    - Individual users who need basic ticker metadata (names, ISIN, expense ratios) for publicly traded
      funds and stocks
    not_fit_for:
    - Professional trading systems requiring official data feeds, real-time data, or guaranteed uptime
  - name: Alpha Vantage
    traits:
    - free_tier
    - official_api
    - rate_limited
    - global
    fit_for:
    - Users who need an official API for fundamental data and want structured rate-limited access
    not_fit_for:
    - Bulk metadata lookups (free tier limited to 5 calls/min); no ISIN or expense ratio data
  - name: IEX Cloud
    traits:
    - official_api
    - rate_limited
    - free_tier
    - global
    fit_for:
    - Users wanting official market data with structured SLAs and company fundamentals
    not_fit_for:
    - Free tier too limited for bulk operations; no mutual fund coverage in free tier
  - name: pandas-datareader
    traits:
    - free
    - multi_source
    - no_auth
    fit_for:
    - Users who want to pull price data (not metadata) from multiple sources (Yahoo, FRED, etc.)
    not_fit_for:
    - Metadata lookups (ISIN, expense ratios); primarily price data
  default: Yahoo Finance (yfinance)
  _source: worker_resource
- id: slot-002
  name: price_data_feed
  description: Most users maintain a separate beancount prices file that is populated by an external price
    fetcher (e.g., bean-price, a custom script, or imported from a data provider). fava_investor reads
    this file directly and does not fetch prices itself (except for the experimental scaled_navs module)
  used_in_stages: []
  options:
  - name: beancount price file (user-managed)
    traits:
    - local_file
    - text_format
    - user_curated
    - manual_update
    fit_for:
    - Any user; prices are declared in the beancount ledger itself; no external dependency
    not_fit_for:
    - Automated workflows requiring real-time or intraday prices
  - name: bean-price (Beancount official fetcher)
    traits:
    - official
    - CLI
    - scheduled
    - beancount_integrated
    fit_for:
    - Beancount users who want an official, maintained price fetcher with built-in support for various
      providers
    not_fit_for:
    - Environments where CLI cron jobs are not feasible
  default: beancount price file (user-managed)
  _source: worker_resource
- id: slot-003
  name: web_ui_framework
  description: Use Fava for interactive use with dashboards and charts. Use CLI-only for scripted/automated
    workflows (each modules expose CLI commands via the `investor` CLI entry point)
  used_in_stages: []
  options:
  - name: Fava (default)
    traits:
    - web_ui
    - beancount_native
    - extension_api
    fit_for:
    - Users who already use Beancount and Fava for double-entry bookkeeping; seamless integration
    not_fit_for:
    - Environments where Fava is not available (e.g., pure CLI-only deployments)
  - name: CLI-only (no web UI)
    traits:
    - headless
    - command_line
    - no_server
    fit_for:
    - Headless servers, automation pipelines, scripting environments
    not_fit_for:
    - Interactive analysis and visualization
  default: Fava web UI
  _source: worker_resource
- id: slot-004
  name: hosting_platform
  description: Local desktop is the simplest for single users. PythonAnywhere provides a free hosted option.
    Any WSGI host works for custom deployments.
  used_in_stages: []
  options:
  - name: Local desktop (self-hosted)
    traits:
    - local
    - private
    - no_internet
    fit_for:
    - Privacy-conscious users; full feature set; no internet required for core operation
    not_fit_for:
    - Accessing from multiple devices or sharing with family/advisors
  - name: PythonAnywhere
    traits:
    - cloud
    - shared_hosting
    - wsgi
    - no_root
    fit_for:
    - Users wanting a persistent web-hosted instance without managing a server; demo at favainvestor.pythonanywhere.com
    not_fit_for:
    - High-traffic sites; users needing full root access; privacy concerns with cloud hosting
  - name: Generic WSGI host
    traits:
    - cloud
    - vps
    - full_root
    fit_for:
    - Users with a VPS or cloud VM who want full control over the deployment environment
    not_fit_for:
    - Users without server administration experience
  default: Local desktop (self-hosted)
  _source: worker_resource
