business_decisions:
- id: BD-001
  type: BA
  content: TLH loss_threshold defaults to 1 — almost any loss qualifies
  rationale: A threshold of 1 (currency unit) means virtually every trade shows a
    loss, flooding results with noise. The assumption is that users want to see each
    potential tax-loss harvesting opportunities regardless of magnitude. This breaks
    when users expect a meaningful minimum loss threshold (e.g., $50+) to filter actionable
    trades from rounding-error losses.
  evidence: fava_investor/modules/tlh/libtlh.py:96(loss_threshold)
  stage: configuration
  alternative_considered: Default threshold of $50 suggested in documentation but
    not enforced in code
  _evidence_issues:
  - 'FN_NOT_FOUND: loss_threshold in fava_investor/modules/tlh/libtlh.py'
- id: BD-002
  type: DK
  content: Every modules filter accounts via account_sortkey ~ '^[01]' — Assets+Liabilities
    only
  rationale: Beancount's account numbering convention maps [01] to Assets and Liabilities,
    [234] to Expenses/Income/Equity. This is a domain-specific convention in the Fava/Beancount
    ecosystem, not universal accounting. The assumption breaks when users adopt non-standard
    account numbering or different chart of accounts structures.
  evidence: fava_investor/modules/tlh/libtlh.py:82(account_sortkey)
  stage: account_filtering
  alternative_considered: Configurable prefix list (e.g., ['Assets', 'Liabilities'])
    but not implemented
  _evidence_issues:
  - 'FN_NOT_FOUND: account_sortkey in fava_investor/modules/tlh/libtlh.py'
- id: BD-003
  type: BA
  content: Wash sale lookback is hardcoded to 30 days — IRS wash sale window
  rationale: 'The IRS wash sale rule spans 61 days total: 30 days before, the sale
    day, and 30 days after. The code only checks 30 days before, which is a conservative
    approximation that under-detects wash sales. This creates an assumption that users
    may have fewer wash sales than actually reported.'
  evidence: fava_investor/modules/tlh/libtlh.py:209(module)
  stage: tax_loss_harvesting
  alternative_considered: Forward lookback added in v0.14 but incomplete implementation
  _evidence_issues:
  - 'FN_NOT_FOUND: module in fava_investor/modules/tlh/libtlh.py'
- id: BD-004
  type: B/BA
  content: ScaledNAV inherits from RelateTickers, adding MF→ETF price estimation
  rationale: ScaledNAV relies on RelateTickers to access substidenticals and representative
    tickers for mutual fund to ETF price estimation. Changing the inheritance structure
    would break the MF→ETF mapping chain, directly affecting NAV calculations for
    mutual fund positions.
  evidence: fava_investor/util/experimental/scaled_navs.py:51(module)
  stage: nav_estimation
  alternative_considered: Composition over inheritance (not implemented)
  _evidence_issues:
  - 'FN_NOT_FOUND: module in fava_investor/util/experimental/scaled_navs.py'
- id: BD-005
  type: DK
  content: 'Dual API pattern: FavaInvestorAPI vs AccAPI — same interface, different
    contexts'
  rationale: FavaInvestorAPI provides Fava-specific integration while AccAPI provides
    CLI/Beancount-based access. This is Fava-ecosystem domain knowledge about when
    each API context applies. end_date() returns None in CLI mode, which is a behavior
    difference that affects downstream consumers.
  evidence: fava_investor/common/favainvestorapi.py:13(fava_investor)
  stage: api_design
  alternative_considered: Unified abstract base class with context-specific implementations
  _evidence_issues:
