- id: BD-069
  type: RC
  content: 'INTERACTION: BD-037 × BD-038 × BD-003 × BD-024 → Systemic tax miscalculation
    cascade'
  rationale: 'Three compounding gaps create systemic risk: (1) ST/LT tax rates default
    to 1% when actual rates are 22-37%/0-20%, massively underestimating tax liability;
    (2) wash sale lookback only checks 30 days before when IRS requires 61 days total;
    (3) 61-day extended rule is not implemented. Users relying on defaults will make
    selling decisions based on wildly incorrect tax projections AND may inadvertently
    trigger wash sales. The cascade amplifies as each gap masks the others.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Validate realistic rate ranges at startup; implement full
    61-day wash sale rule
- id: BD-070
  type: BA
  content: 'INTERACTION: BD-006 × BD-032 × BD-015 × BD-033 → Multi-currency tax allocation
    paradox'
  rationale: 'A paradox emerges: BD-033 defaults tax_adjustment to 100 (full value,
    assuming fully taxable), while BD-006 and BD-032 assume only the first operating
    currency matters. BD-015 compounds this by using operating_currencies order as
    conversion priority. For multi-currency taxable portfolios, positions in non-primary
    currencies receive full tax adjustment (inflating their apparent tax impact) but
    are treated as negligible in currency conversion. Users see distorted tax-adjusted
    allocation across currencies.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Currency-weighted allocation or explicit base currency parameter
- id: BD-071
  type: BA
  content: 'INTERACTION: BD-009 × BD-055 × BD-028 → Lot-level grouping vs ticker-level
    dedup contradiction'
  rationale: BD-028 groups by cost_date/currency/cost_currency/cost_number for per-lot
    analysis (requiring granular data), BD-009 enforces single-position via get_only_position(),
    but BD-055 deduplicates recent purchases by ticker (not per-lot). When multiple
    lots of the same ticker exist within 30 days, BD-055 reduces them to a single
    entry while BD-028's grouping expects to see each lot separately. This contradiction
    either triggers IndexError from BD-009 or silently loses lot-level granularity,
    breaking both SPECID identification and tax lot analysis.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Dedup by (ticker, date) or maintain each lots before grouping
- id: BD-072
  type: B
  content: 'INTERACTION: BD-041 × BD-065 × BD-016 × BD-044 → TLH partner inference
    chain with silent metadata dependency'
  rationale: 'The TLH partner grouping chain has hidden dependencies: BD-041/065 build
    groups via symmetric closure inference, BD-016 (QuoteType metadata) determines
    whether ETF/MF types can be TLH partners, and BD-044 (same_type_funds_only) uses
    this classification to filter. If QuoteType metadata is missing or incorrect (common
    for custom funds), the entire inference chain produces wrong partners, same-type
    filtering silently changes behavior, and wash sale detection becomes unreliable.
    No validation exists to alert users when metadata is missing.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Manual security type override; validation warnings for missing
    metadata
- id: BD-073
  type: BA/DK
  content: 'INTERACTION: BD-019 × BD-031 × BD-002 × BD-052 → Liability exclusion vs
    account convention cascade'
  rationale: BD-019/031 skip negative balances (liabilities) from asset allocation
    with a warning, assuming liabilities should not appear. However, BD-002/052 filter
    accounts via Beancount convention '^[01]' where [01] maps to Assets+Liabilities.
    Margin accounts with short positions create negative balances that BD-002/052
    might include (as they match [01]) but BD-019/031 silently skip. The warning from
    BD-019 may not reach users who only see allocation percentages. Additionally,
    BD-035 uses '^Assets' pattern for cash drag, creating inconsistency with the [01]
    pattern used elsewhere.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unified account filtering pattern; explicit metadata for
    margin accounts
- id: BD-074
  type: BA
  content: 'INTERACTION: BD-008 × BD-029 → Silent ''unknown'' bucket masking configuration
    errors'
  rationale: 'BD-008 silently moves unallocated percentages to ''unknown'' bucket
    and BD-029 confirms percentages must sum to 100% with ''unknown'' padding. These
    duplicate the same behavior, but more importantly, when combined with BD-059 (recursive
    allocation) and BD-060 (tax-adjusted scaling), errors propagate: incomplete allocation
    → ''unknown'' bucket → tax-adjusted at 100% rate → displayed as legitimate allocation.
    Users see a phantom ''unknown'' allocation that may be substantial, especially
    in multi-currency portfolios where BD-070 already causes distortions. The silent
    padding amplifies hidden configuration errors into visible but unexplained percentages.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Error on incomplete allocation; require explicit 'other'
    category configuration
- id: BD-075
  type: B/BA
  content: 'INTERACTION: BD-004 × BD-058 × BD-067 → NAV estimation cascade with brittle
    assumptions'
  rationale: 'BD-004 inherits ScaledNAV from RelateTickers for MF→ETF price estimation,
    BD-058 uses median of last 10 ratios (assuming sufficient history), and BD-067
    rounds to 2 decimals. New mutual funds with <10 days of data produce unreliable
    medians, inheritance dependency (BD-004) means breaking inheritance breaks each
    NAV estimation, and rounding (BD-067) compounds with small sample sizes. The chain
    is fragile to: new fund launches, Beancount file version changes that break inheritance,
    and Python version changes affecting float rounding. No fallback exists when the
    median is unreliable.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Composition over inheritance; minimum history validation;
    configurable window
