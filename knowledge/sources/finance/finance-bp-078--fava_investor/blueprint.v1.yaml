- id: BD-006
  type: BA
  content: get_operating_currencies()[0] assumed as single base currency everywhere
  rationale: Multi-currency portfolios often have multiple operating currencies, but
    the code assumes the first currency is the single base currency. This is a hidden
    assumption that simplifies multi-currency handling at the cost of ignoring additional
    currencies. Breaks for true multi-currency portfolios where each currencies matter.
  evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:69(fava_investor)
