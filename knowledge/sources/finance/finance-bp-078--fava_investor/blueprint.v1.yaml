id: finance-bp-078
name: Fava Investor
sop_version: '3.6'
source:
  projects:
  - fava_investor
  commit_hash: f83db450ae3bd47d228c0fcc8b0db7b954f51d26
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Investment portfolio analysis, tax optimization, and reporting for Beancount/Fava
    users
  description: A comprehensive suite of modules for analyzing investments, tax loss
    harvesting opportunities, asset allocation visualization, and portfolio reporting
    integrated with the Beancount double-entry bookkeeping system.
  prerequisites: Users need knowledge of Beancount for double-entry bookkeeping, Fava
    for visualization, and plain text accounting principles. Familiarity with Python
    for CLI usage is helpful.
  not_suitable_for: Users not using Beancount/Fava for bookkeeping, real-time automated
    trading systems, non-investment financial analysis, or users who prefer GUI-only
    interfaces without CLI access.
stages:
- id: data_ingestion
  name: Data Ingestion
  order: 1
  responsibility: Reads and parses Beancount ledger files to extract account structures,
    positions, transactions, and commodity metadata. Acts as the bridge between Beancount's
    data model and Fava Investor's analysis modules. This stage exists because each
    subsequent analysis depends on accurate extraction of the user's financial data.
  interface:
    inputs:
    - name: beancount_file
      description: Beancount ledger file with accounts, commodities, and transactions
    - name: configuration
      description: Extension configuration from Beancount directive
    outputs:
    - name: accounts
      description: Chart of accounts with balances
    - name: commodities
      description: Commodity/ticker metadata including quoteType and custom metadata
    - name: prices
      description: Price map for currency and commodity conversions
    - name: inventories
      description: Position inventories by account
  required_methods:
  - name: AccAPI.get_account_field
    description: Extracts account field using account_sortkey pattern, defaults to
      leaf account names
    evidence: fava_investor/modules/tlh/libtlh.py:55(get_account_field)
  - name: AccAPI.get_only_position
    description: Validates that inventory contains exactly one position, required
      for GROUP BY queries
    evidence: fava_investor/modules/tlh/libtlh.py:91-94, fava_investor/common/libinvestor.py
  - name: AccAPI.get_operating_currencies
    description: Returns list of operating currencies, with [0] assumed as base currency
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:69, fava_investor/modules/cashdrag/libcashdrag.py:16
  key_behaviors:
  - behavior: Dual API pattern
    description: FavaInvestorAPI for Fava plugin context and AccAPI for CLI context
      provide identical interfaces but handle version-specific differences (Fava 1.22
      vs 1.30+). New query columns must be implemented in both APIs.
    evidence: fava_investor/common/favainvestorapi.py:13, fava_investor/common/beancountinvestorapi.py:15
  - behavior: Account filtering via account_sortkey
    description: Every modules filter accounts via regex '^[01]' pattern to include
      only Assets and Liabilities. Expenses and Income accounts are excluded. This
      breaks if account numbering changes.
    evidence: fava_investor/modules/tlh/libtlh.py:82(account_sortkey), fava_investor/modules/summarizer/libsummarizer.py:20
  - behavior: Single-position validation
    description: Beancount queries using GROUP BY expect single-position inventories
      validated by get_only_position(). Multi-lot rows cause IndexError. SQL must
      ensure single position per group.
    evidence: fava_investor/modules/tlh/libtlh.py:91-94, fava_investor/modules/minimizegains/libminimizegains.py:67-69
  replaceable_points:
  - name: price_source
    description: Source for commodity price data
    options:
    - name: fava_pricemap
      traits:
      - integrated
      - real-time in Fava
      - Fava-specific
      fit_for:
      - Running within Fava web interface
      not_fit_for:
      - CLI usage
      - Offline environments
    - name: beancount_pricemap
      traits:
      - standalone
      - buildable for CLI
      - Beancount-native
      fit_for:
      - CLI execution
      - Offline processing
      - Scripted automation
      not_fit_for:
      - Fava plugin context
    default: fava_pricemap
  design_decisions:
  - 'Dual API pattern (FavaInvestorAPI vs AccAPI) chosen to support both Fava plugin
    and CLI execution contexts while maintaining identical interfaces. Evidence: fava_investor/common/favainvestorapi.py:13,
    fava_investor/common/beancountinvestorapi.py:15'
  - 'Account filtering via ''^[01]'' regex chosen to focus analysis on Assets and
    Liabilities only, excluding Expenses/Income for cleaner investment reporting.
    Evidence: fava_investor/modules/tlh/libtlh.py:82'
  acceptance_hints:
  - Accounts starting with 1 (Assets) and 0 (Liabilities) are included; Expenses (2xx)
    and Income (4xx) are excluded
  - Each GROUP BY result contains exactly one position per row
  - get_operating_currencies() returns at least one currency
  - end_date() returns appropriate date or None for CLI context
- id: ticker_relationship_analysis
  name: Ticker Relationship Analysis
  order: 2
  responsibility: Discovers and computes relationships between tickers in the portfolio,
    including equivalent tickers, substantially identical securities, and tax loss
    harvesting partner groups. This stage exists to enable the tax loss harvesting
    module to identify valid TLH swap candidates.
  interface:
    inputs:
    - name: commodity_metadata
      description: Commodity declarations with custom metadata (quoteType, fund_name,
        etc.)
    - name: ticker_specification
      description: Minimal specification of ticker relationships from user
    outputs:
    - name: tlh_groups
      description: Computed TLH groups of substantially identical tickers
    - name: equivalent_tickers
      description: Mapping of equivalent ticker pairs
    - name: representative_tickers
      description: Representative ticker for each ticker group
  required_methods:
  - name: RelateTickers.compute_tlh_groups
    description: 6-step algorithm to compute TLH groups from metadata, including equivalent/substantially
      identical relationships
    evidence: fava_investor/util/relatetickers.py:141-217(compute_tlh_groups)
  - name: RelateTickers.get_tlh_group
    description: Returns the TLH group for a given ticker
    evidence: fava_investor/util/relatetickers.py:141-217
  key_behaviors:
  - behavior: 6-step algorithm for TLH group computation
    description: 'Steps are order-dependent: parsing equivalent tickers, computing
      substidenticals, grouping by representative, filtering by quoteType, applying
      same-type filtering, and computing TLH groups. Skipping or inverting steps causes
      wrong TLH partners.'
    evidence: fava_investor/util/relatetickers.py:141-217(compute_tlh_groups)
  - behavior: QuoteType-driven filtering
    description: QuoteType metadata (ETF/MUTUALFUND) drives MF→ETF mapping and same-type
      TLH filtering. Missing or invalid quoteType breaks NAV estimation and same-type
      TLH.
    evidence: fava_investor/util/relatetickers.py:147-150
  - behavior: Pretty_sort non-deterministic tie-breaking
    description: Sort uses length descending then representative for ordering. Same-length
      tickers may sort differently across runs, creating partial ordering only.
    evidence: fava_investor/util/relatetickers.py:133-134(sort by len, then representative)
  replaceable_points:
  - name: ticker_relationship_source
    description: Method for specifying ticker relationships
    options:
    - name: beancount_metadata
      traits:
      - inline
      - self-contained
      - imperative
      fit_for:
      - Small portfolios
      - Explicit relationships
      not_fit_for:
      - Large portfolios
      - Dynamic relationships
    - name: config_table
      traits:
      - external
      - declarative
      - configurable
      fit_for:
      - Large portfolios
      - Separate concerns
      not_fit_for:
      - Simple setups
    default: beancount_metadata
  design_decisions:
  - '6-step algorithm chosen for TLH group computation to systematically derive relationships
    from minimal specification. Order is critical because each step builds on previous
    results. Evidence: fava_investor/util/relatetickers.py:141-217'
  - 'QuoteType filtering ensures TLH only pairs securities of the same type (ETF with
    ETF, MUTUALFUND with MUTUALFUND) to comply with wash sale rules. Evidence: fava_investor/util/relatetickers.py:147-150'
  acceptance_hints:
  - compute_tlh_groups returns non-empty groups for tickers with defined relationships
  - Equivalents are symmetric (A↔B if A≈B)
  - Substidenticals form valid TLH swap pairs
  - Missing quoteType logs warning but doesn't crash
- id: tax_loss_harvesting
  name: Tax Loss Harvesting
  order: 3
  responsibility: Identifies tax loss harvesting opportunities by finding positions
    with unrealized losses above the threshold, matching them with TLH partners, and
    tracking wash sale windows. This stage exists to help users optimize their tax
    liability by harvesting losses strategically.
  interface:
    inputs:
    - name: positions
      description: Current holdings with cost basis and unrealized gains/losses
    - name: tlh_groups
      description: Valid TLH partner tickers from ticker relationship analysis
    - name: wash_sale_lookback
      description: Days to look back for wash sale detection (default 30)
    - name: loss_threshold
      description: Minimum loss amount to qualify (default $1)
    outputs:
    - name: harvestable_losses
      description: Positions with unrealized losses meeting threshold
    - name: wash_sale_tracking
      description: Wash sale identifiers and affected transactions
    - name: tlh_recommendations
      description: Suggested TLH swaps with partner tickers
  required_methods:
  - name: TLH.find_harvestable
    description: Finds each positions with unrealized losses above threshold
    evidence: fava_investor/modules/tlh/libtlh.py:16-22(pipeline calls)
  - name: TLH.harvestable_by_commodity
    description: Groups harvestable positions by commodity/ticker
    evidence: fava_investor/modules/tlh/libtlh.py:16-22
  - name: TLH.summarize_tlh
    description: Creates TLH summary with partner suggestions and wash sale tracking
    evidence: fava_investor/modules/tlh/libtlh.py:16-22
  key_behaviors:
  - behavior: Fixed pipeline ordering
    description: 'get_tables() pipeline: find_harvestable → harvestable_by_commodity
      → summarize_tlh. Each step depends on previous output; reordering breaks summary
      calculations.'
    evidence: fava_investor/modules/tlh/libtlh.py:16-22(pipeline calls)
  - behavior: 30-day wash sale detection
    description: Hardcoded 30-day lookback window for wash sale detection. IRS rule
      is actually 61 days (30 before + 30 after + sale day). Current implementation
      is conservative.
    evidence: fava_investor/modules/tlh/libtlh.py:209(DATE_ADD(..., -30))
  - behavior: Shared wash_id across substidentical tickers
    description: wash_buy_counter uses itertools.count() shared across substidentical
      tickers, linking purchases across funds with the same wash_id.
    evidence: fava_investor/modules/tlh/libtlh.py:116,134(wash_buy_counter)
  - behavior: Low default loss_threshold
    description: loss_threshold defaults to $1, meaning almost any loss qualifies.
      Users may expect larger minimum thresholds.
    evidence: fava_investor/modules/tlh/libtlh.py:96(loss_threshold)
  replaceable_points:
  - name: loss_threshold
    description: Minimum unrealized loss to consider for TLH
    options:
    - name: minimum_1
      traits:
      - inclusive
      - verbose
      - low-barrier
      fit_for:
      - Comprehensive analysis
      - Micro-losses
      not_fit_for:
      - Clean reports
      - Large-portfolio noise reduction
    - name: minimum_100
      traits:
      - exclusive
      - cleaner
      - thresholded
      fit_for:
      - Larger losses only
      - Portfolio noise reduction
      not_fit_for:
      - Small portfolios
      - Micro-loss harvesting
    default: minimum_1
  - name: wash_sale_window
    description: Number of days to check for wash sale transactions
    options:
    - name: conservative_30
      traits:
      - simple
      - IRS-partial
      - conservative
      fit_for:
      - Pre-IRS-rule compliance
      - Simple implementation
      not_fit_for:
      - Full IRS compliance
      - Accurate wash sale calculation
    - name: irs_61
      traits:
      - compliant
      - accurate
      - complex
      fit_for:
      - Full IRS compliance
      - Audit preparation
      not_fit_for:
      - Simple analysis
      - Backward compatibility
    default: conservative_30
  design_decisions:
  - '30-day wash sale lookback chosen as conservative implementation (IRS allows 30-day
    before OR after). Full IRS rule is 61 days but current approach is simpler. Evidence:
    fava_investor/modules/tlh/libtlh.py:209'
  - 'loss_threshold defaults to $1 to be maximally inclusive, letting users filter
    later rather than missing opportunities. Evidence: fava_investor/modules/tlh/libtlh.py:96'
  acceptance_hints:
  - 'get_tables() pipeline executes in correct order: find_harvestable → harvestable_by_commodity
    → summarize_tlh'
  - Wash sale transactions within 30-day window are flagged with wash_id
  - Losses below threshold are excluded from harvestable results
  - Substantially identical tickers appear as TLH partners
- id: asset_allocation
  name: Asset Allocation Analysis
  order: 4
  responsibility: Builds hierarchical tree structures for asset allocation visualization,
    categorizing holdings by user-defined asset classes. Handles currency conversions,
    tax adjustments, and bucketization. This stage exists to provide investors with
    clear visual understanding of their portfolio composition.
  interface:
    inputs:
    - name: inventories
      description: Position inventories by account with cost basis
    - name: asset_class_tree
      description: User-defined asset class hierarchy from commodity metadata
    - name: prices
      description: Current prices for valuation
    - name: base_currency
      description: Single base currency for conversion (assumed from operating_currencies[0])
    outputs:
    - name: allocation_tree
      description: Hierarchical tree with aggregated values by asset class
    - name: allocation_table
      description: Flat table with percentages and values
    - name: unknown_allocation
      description: Unallocated assets padded to 'unknown' bucket
  required_methods:
  - name: AssetAlloc.tax_adjust
    description: Applies tax adjustments to positions before bucketing
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:202-203
  - name: AssetAlloc.bucketize
    description: Aggregates positions into asset class buckets
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:202-203
  - name: AssetAlloc.allocate
    description: Main method that computes asset allocation with proper ordering
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:202-203(tax_adjust
      then bucketize)
  key_behaviors:
  - behavior: 'Fixed ordering: tax_adjust before bucketize'
    description: Asset allocation requires tax_adjust before bucketize. Swapping order
      gives wrong balance values due to tax adjustments. This is a critical ordering
      contract.
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:202-203(tax_adjust
      then bucketize)
  - behavior: Single base currency assumption
    description: get_operating_currencies()[0] is assumed as the single base currency
      everywhere. Multi-currency portfolios use first currency; others ignored or
      fail.
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:69, fava_investor/modules/summarizer/libsummarizer.py
  - behavior: Silent unknown bucket for unallocated assets
    description: Unallocated asset percentages are padded to 'unknown' bucket. Silent
      'unknown' bucket appears; users may not notice metadata errors.
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:127-130
  - behavior: Negative balances skipped with warning
    description: Liabilities and margin positions are skipped with a warning. Users
      may not notice; margin positions invisible.
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:100-101(warning
      + continue)
  - behavior: Tree sorted by Node.__lt__
    description: AssetClassNode inherits from Node which implements __lt__ for sorted().
      Tree traversal order depends on name sorting; renaming breaks ordering.
    evidence: fava_investor/common/libinvestor.py:28-29, fava_investor/modules/assetalloc_class/libassetalloc.py:20
  replaceable_points:
  - name: currency_hop
    description: Method for currency conversion in multi-currency portfolios
    options:
    - name: via_operating_currencies
      traits:
      - simple
      - assumes first currency
      - transitive
      fit_for:
      - Single base currency
      - Simple conversions
      not_fit_for:
      - Multi-currency precision
      - Explicit conversion paths
    - name: via_cost_currency
      traits:
      - precise
      - cost-preserving
      - complex
      fit_for:
      - Multi-currency portfolios
      - Accurate conversions
      not_fit_for:
      - Simple setups
      - Pre-cost positions
    default: via_operating_currencies
  design_decisions:
  - 'tax_adjust before bucketize ordering required because tax adjustments modify
    the position values before aggregation. Changing this order would give incorrect
    totals. Evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:202-203'
  - 'Single base currency assumption ([0]) simplifies implementation at the cost of
    multi-currency flexibility. Evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:69'
  acceptance_hints:
  - tax_adjust is called before bucketize in allocate() method
  - Every commodities have corresponding asset_class metadata or appear in 'unknown'
    bucket
  - Negative balances log warning but don't crash the allocation
  - Sum of child values equals parent value
  - Tree is sorted alphabetically by name
- id: nav_estimation
  name: NAV Estimation for Mutual Funds
  order: 5
  responsibility: Estimates Net Asset Value for mutual funds using ETF price data
    when direct MF prices are unavailable. Extends ticker relationship analysis to
    map MFs to representative ETFs. This stage exists because mutual funds often lack
    real-time pricing while ETFs have readily available market prices.
  interface:
    inputs:
    - name: mf_positions
      description: Mutual fund positions needing NAV estimation
    - name: relatetickers
      description: Ticker relationship data including MF→ETF mappings
    - name: etf_prices
      description: Current ETF prices from price feed
    - name: historical_ratios
      description: Historical MF/ETF price ratios for estimation
    outputs:
    - name: estimated_navs
      description: Estimated NAV values for mutual funds
    - name: scaled_ratios
      description: Recent MF/ETF ratios scaled to current prices
  required_methods:
  - name: ScaledNAV.estimate_nav
    description: Estimates NAV using ETF price and historical ratio
    evidence: fava_investor/util/experimental/scaled_navs.py
  - name: ScaledNAV.get_recent_ratios
    description: Gets most recent MF/ETF ratios (limited to last 10)
    evidence: 'fava_investor/util/experimental/scaled_navs.py (1.0.0: last 10 ratios)'
  key_behaviors:
  - behavior: ScaledNAV inherits from RelateTickers
    description: ScaledNAV inherits from RelateTickers to access substidenticals/representative
      for MF→ETF mapping. Changing base class breaks the inheritance chain required
      for NAV estimation.
    evidence: fava_investor/util/experimental/scaled_navs.py:51(ScaledNAV(RelateTickers))
  - behavior: Limited ratio history
    description: Only considers last 10 most recent ratios for NAV estimation (as
      of v1.0.0 improvement)
    evidence: 'CHANGELOG 1.0.0: scaled_navs now only considers last 10 most recent
      ratios'
  - behavior: QuoteType required for MF→ETF mapping
    description: QuoteType metadata (ETF/MUTUALFUND) drives MF→ETF mapping. Missing/invalid
      quoteType breaks NAV estimation.
    evidence: fava_investor/util/experimental/scaled_navs.py:75-85
  replaceable_points:
  - name: ratio_window
    description: Number of historical ratios to consider for estimation
    options:
    - name: last_10
      traits:
      - recent
      - stable
      - default
      fit_for:
      - Stable funds
      - Recent market conditions
      not_fit_for:
      - Volatile funds
      - Long-term trends
    - name: all_history
      traits:
      - comprehensive
      - volatile
      - historical
      fit_for:
      - Historical accuracy
      - Trend analysis
      not_fit_for:
      - Recent conditions
      - Stable estimation
    default: last_10
  design_decisions:
  - 'ScaledNAV inherits from RelateTickers to reuse MF→ETF relationship data. This
    avoids duplicating relationship logic. Evidence: fava_investor/util/experimental/scaled_navs.py:51'
  - 'Last 10 ratios chosen as balance between stability and responsiveness. Evidence:
    CHANGELOG 1.0.0 improvement'
  acceptance_hints:
  - ScaledNAV instance has access to RelateTickers methods via inheritance
  - QuoteType metadata is present for each funds being estimated
  - ETF representative exists for each MF being mapped
  - Date parameter is respected in ratio retrieval
- id: reporting_output
  name: Reporting and Output
  order: 6
  responsibility: Renders analysis results as Fava web interface views or CLI formatted
    tables. Handles both interactive browsing and batch command-line processing. This
    stage exists to deliver actionable insights to users through their preferred interface.
  interface:
    inputs:
    - name: analysis_results
      description: Processed data from previous stages
    - name: format_preferences
      description: Table formatting preferences
    outputs:
    - name: fava_html
      description: HTML views for Fava web interface
    - name: cli_tables
      description: Formatted text tables for CLI
  required_methods:
  - name: AssetAlloc.render
    description: Renders asset allocation as Fava HTML
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py
  - name: investor.assetalloc-class
    description: CLI command for asset allocation output
    evidence: fava_investor/modules/assetalloc_class
  - name: investor.tlh
    description: CLI command for tax loss harvesting output
    evidence: fava_investor/modules/tlh
  key_behaviors:
  - behavior: NamedTuple row building duplicated across APIs
    description: Row building for table output is duplicated in AccAPI and FavaInvestorAPI.
      New query columns must update both; inconsistent row types cause errors.
    evidence: fava_investor/common/beancountinvestorapi.py:51-55, fava_investor/common/favainvestorapi.py:45-49
  - behavior: Fava version-specific query handling
    description: FavaInvestorAPI handles version-specific query API changes (1.22
      vs 1.30+). Version parsing is fragile; new Fava versions may break compatibility.
    evidence: fava_investor/common/favainvestorapi.py:42-54(version.parse checks)
  replaceable_points:
  - name: output_format
    description: Format for presenting results
    options:
    - name: fava_html
      traits:
      - interactive
      - visual
      - web-based
      fit_for:
      - Browsing analysis
      - Visual portfolios
      not_fit_for:
      - Batch processing
      - Scripting
    - name: cli_table
      traits:
      - scriptable
      - text-based
      - portable
      fit_for:
      - Automation
      - Integration
      - Offline use
      not_fit_for:
      - Visual exploration
      - Charts
    default: fava_html
  design_decisions:
  - 'Dual output channels (Fava + CLI) chosen to support both interactive browsing
    and scripted automation use cases. Evidence: fava_investor/common/favainvestorapi.py,
    fava_investor/common/beancountinvestorapi.py'
  acceptance_hints:
  - Fava extension loads and displays 'Investor' link in sidebar
  - CLI commands execute without errors for valid input
  - Tables are properly formatted with tabulate
  - Version compatibility check passes for known Fava versions
data_flow:
- from_stage: external
  to_stage: data_ingestion
  data: Beancount ledger file with accounts, commodities, transactions, and custom
    metadata
- from_stage: data_ingestion
  to_stage: ticker_relationship_analysis
  data: Commodity metadata including quoteType, fund_name, equivalents, and substidenticals
- from_stage: ticker_relationship_analysis
  to_stage: tax_loss_harvesting
  data: TLH groups, equivalent tickers, substantially identical tickers, representative
    tickers
- from_stage: data_ingestion
  to_stage: tax_loss_harvesting
  data: Position inventories with cost basis, unrealized gains/losses, account balances
- from_stage: ticker_relationship_analysis
  to_stage: nav_estimation
  data: MF→ETF mappings, representative tickers, quoteType metadata
- from_stage: data_ingestion
  to_stage: asset_allocation
  data: Position inventories, account balances, prices, operating currencies
- from_stage: data_ingestion
  to_stage: nav_estimation
  data: Mutual fund positions requiring NAV estimation
- from_stage: tax_loss_harvesting
  to_stage: reporting_output
  data: Harvestable losses, wash sale tracking, TLH recommendations
- from_stage: asset_allocation
  to_stage: reporting_output
  data: Allocation tree, percentages, hierarchical aggregation
- from_stage: nav_estimation
  to_stage: reporting_output
  data: Estimated NAVs for mutual funds, scaled ratios
- from_stage: data_ingestion
  to_stage: reporting_output
  data: Summarized portfolio data via AccAPI for CLI output
global_contracts:
- contract: 'Every modules filter accounts via account_sortkey regex ''^[01]'' — only
    Assets and Liabilities are analyzed; Expenses/Income accounts are excluded. Evidence:
    fava_investor/modules/tlh/libtlh.py:82, fava_investor/modules/summarizer/libsummarizer.py:20'
  evidence: ''
- contract: 'Beancount queries using GROUP BY expect single-position inventories validated
    by get_only_position(). Multi-lot rows cause IndexError. Evidence: fava_investor/modules/tlh/libtlh.py:91-94,
    fava_investor/modules/minimizegains/libminimizegains.py:67-69'
  evidence: ''
- contract: 'Asset allocation requires tax_adjust before bucketize — swapping order
    gives incorrect balance values. Evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:202-203'
  evidence: ''
- contract: 'TLH pipeline has fixed order: find_harvestable → harvestable_by_commodity
    → summarize_tlh. Each step depends on previous output. Evidence: fava_investor/modules/tlh/libtlh.py:16-22'
  evidence: ''
- contract: 'get_operating_currencies()[0] is assumed as single base currency throughout
    the codebase. Multi-currency portfolios use first currency; others may be ignored.
    Evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:69, fava_investor/modules/cashdrag/libcashdrag.py:16'
  evidence: ''
- contract: 'ScaledNAV inherits from RelateTickers; changing the base class breaks
    MF→ETF mapping functionality. Evidence: fava_investor/util/experimental/scaled_navs.py:51'
  evidence: ''
- contract: 'QuoteType metadata (ETF/MUTUALFUND) is required for both MF→ETF NAV estimation
    and same-type TLH filtering. Missing/invalid quoteType breaks these features.
