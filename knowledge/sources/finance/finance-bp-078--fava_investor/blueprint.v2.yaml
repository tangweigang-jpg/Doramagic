id: finance-bp-078
name: Fava Investor
sop_version: '3.6'
source:
  projects:
  - fava_investor
  commit_hash: f83db450ae3bd47d228c0fcc8b0db7b954f51d26
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Investment portfolio analysis and tax optimization
  description: A plugin ecosystem for Beancount/Fava providing investment reports,
    tax loss harvesting, asset allocation analysis, cash drag detection, and gains
    minimization for US investors using double-entry bookkeeping.
  prerequisites: Users need Beancount double-entry bookkeeping knowledge, Fava interface
    familiarity, and understanding of US tax concepts (wash sales, SpecID lot identification,
    capital gains rates)
  not_suitable_for: Non-US investors, non-Beancount users, real-time trading systems,
    countries with different wash sale rules, multi-currency portfolios requiring
    complex conversions
stages:
- id: tax_loss_harvesting
  name: Tax Loss Harvester
  order: 1
  responsibility: Identifies taxable lots with losses and detects potential wash sales
    within 30-day windows. US-centric assuming SpecID method.
  interface:
    inputs:
    - accapi (FavaInvestorAPI or AccAPI)
    - options dict with accounts_pattern, wash_pattern, loss_threshold, account_field
    outputs:
    - harvestable_table (lots with losses)
    - summary (totals)
    - recents (recent purchases)
    - by_commodity (aggregated losses)
  required_methods:
  - name: Investor.build_tlh_tables
    description: Fava extension entrypoint exposing build_tlh_tables() to display
      TLH reports in Fava sidebar
    evidence: fava_investor/__init__.py:43(Investor.__init__)
  - name: get_tables
    description: Main orchestrator coordinating lot finding and aggregation into harvestable/recent/summary
      tables
    evidence: fava_investor/modules/tlh/libtlh.py:15(get_tables)
  - name: find_harvestable_lots
    description: Core lot detection with loss calculation and wash sale detection
      using SQL queries
    evidence: fava_investor/modules/tlh/libtlh.py:67(find_harvestable_lots)
  - name: gain_term
    description: Determines long vs short term classification using relativedelta
      for leap-year correctness
    evidence: fava_investor/modules/tlh/libtlh.py:37(gain_term)
  key_behaviors:
  - behavior: Hardcoded 30-day wash sale detection
    description: Identifies purchases within 30 days before or after a sale as potential
      wash sales, preventing loss harvesting
    evidence: fava_investor/modules/tlh/libtlh.py:209(sql WHERE clause)
  - behavior: SpecID lot tracking
    description: Tracks individual cost lots by date, currency, and lot number to
      identify specific positions for harvesting
    evidence: fava_investor/modules/tlh/libtlh.py:84(GROUP BY cost_date,currency,cost_currency,cost_number)
  - behavior: a__substidenticals wash detection
    description: Commodity declarations drive wash detection across substantially
      identical tickers without code changes
    evidence: fava_investor/modules/tlh/libtlh.py:129(get_metavalue)
  replaceable_points:
  - name: wash_sale_window
    description: Days to look back for wash sales (fixed IRS rule)
    options:
    - name: '30'
      traits:
      - IRS standard
      - non-configurable
      fit_for:
      - US investors following IRS wash sale rules
      not_fit_for:
      - Non-US jurisdictions with different rules
    default: '30'
  - name: account_field_extraction
    description: How to extract account grouping field for lot identification
    options:
    - name: LEAF(account)
      traits:
      - Extracts innermost account name
      fit_for:
      - Nested account hierarchies
      not_fit_for:
      - Flat account structures
    - name: account
      traits:
      - Full account name
      fit_for:
      - Simple flat structures
      not_fit_for:
      - Nested accounts needing isolation
    - name: one-but-leaf regex
      traits:
      - Parent account extraction
      fit_for:
      - Multi-tier hierarchies where parent grouping needed
      not_fit_for:
      - Two-level account structures
    default: LEAF(account)
  design_decisions:
  - 30-day wash sale window hardcoded (IRS rule is fixed; avoids configuration complexity
    for US users) - fava_investor/modules/tlh/libtlh.py:209(sql)
  - relativedelta for gain_term (Accounts for leap years since IRS defines long/short
    as '> 1 year') - fava_investor/modules/tlh/libtlh.py:38(gain_term)
  - GROUP BY cost_date,currency,cost_currency,cost_number (Ensures single-position
    inventories enabling get_only_position() optimization) - fava_investor/modules/tlh/libtlh.py:84(sql)
  - a__substidenticals metadata for wash detection (Commodity declarations drive wash
    detection without code changes) - fava_investor/modules/tlh/libtlh.py:129(get_metavalue)
  acceptance_hints:
  - Lots with unrealized losses appear in harvestable_table when threshold met
  - Wash sales correctly flagged when same/similar security purchased within 30 days
  - Long-term vs short-term classification accurate across leap years
  - 'Output tables return 4-tuple: (rtypes list, rrows list, reserved_None, footer_or_None)'
- id: asset_allocation_class
  name: Asset Allocation by Class
  order: 2
  responsibility: Maps portfolio positions to hierarchical asset classes using commodity
    metadata prefixes, with optional tax adjustment scaling.
  interface:
    inputs:
    - accapi
    - config with accounts_patterns, skip_tax_adjustment flag
    outputs:
    - AssetClassNode tree with balance, percentage, percentage_children
    - realacc account tree
  required_methods:
  - name: AssetClassNode
    description: Tree node extending Node with serialization for Fava charts, storing
      balance, percentage, percentage_children
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:20(AssetClassNode)
  - name: treeify
    description: Builds hierarchical asset class tree from bucket map using underscore-separated
      path encoding
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:59(treeify)
  - name: bucketize
    description: Distributes position values into asset_buckets based on asset_allocation_*
      metadata prefixes
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:87(bucketize)
  - name: tax_adjust
    description: Scales inventory balances by account-level tax adjustment metadata,
      preserving cost specs
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:177(tax_adjust)
  key_behaviors:
  - behavior: Metadata-driven bucket assignment
    description: Commodities are classified into asset classes based on asset_allocation_*
      prefix metadata, enabling configuration without code changes
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:93(meta_prefix)
  - behavior: 100% sum validation
    description: Asset bucket percentages must sum to 100 or 'unknown' bucket auto-created
      with unallocated remainder
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:127(unallocated)
  - behavior: Bisect-based price conversion
    description: Uses binary search to find nearest available price on either side
      of end_date for position conversion
    evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:106(convert_position)
  replaceable_points:
  - name: bucket_prefix
    description: Metadata prefix for asset class labels
    options:
    - name: asset_allocation_
      traits:
      - Standard naming convention
      fit_for:
      - Users following naming convention
      not_fit_for:
      - Custom prefix requirements
    default: asset_allocation_
  - name: tax_adjustment
    description: Account-level tax basis adjustment scaling factor
    options:
    - name: '100'
      traits:
      - Full value (no tax adjustment)
      fit_for:
      - Taxable accounts without gain tracking
      not_fit_for:
      - Accounts needing tax-adjusted values
    - name: 0-100 range
      traits:
      - Partial adjustment percentage
      fit_for:
      - Accounts with mixed tax treatment
      not_fit_for:
      - Simple single-account portfolios
    default: '100'
  design_decisions:
  - asset_allocation_* metadata prefix for bucket assignment (Allows flexible classification
    without code changes; percentages must sum to 100) - fava_investor/modules/assetalloc_class/libassetalloc.py:93(meta_prefix)
  - balance_children for rolled-up totals (Parent nodes need cumulative values for
    correct percentage display in tree) - fava_investor/modules/assetalloc_class/libassetalloc.py:44(compute_child_balances)
  - Base currency from operating_currencies[0] (Single-currency assumption simplifies
    comparison; multi-currency needs via parameter) - fava_investor/modules/assetalloc_class/libassetalloc.py:69(root.currency)
  - convert_position with bisect for closest-date conversion (Bisect finds nearest
    available price on either side of end_date) - fava_investor/modules/assetalloc_class/libassetalloc.py:106(convert_position)
  acceptance_hints:
  - Tree structure renders correctly with percentages summing to 100%
  - Tax adjustment applies correctly when configured per account
  - Multi-currency positions convert using nearest available price
  - Unknown bucket created only when metadata sum != 100%
- id: gains_minimizer
  name: Gains Minimizer
  order: 3
  responsibility: Determines optimal lot selection to minimize capital gains tax by
    sorting by estimated tax percentage ascending.
  interface:
    inputs:
    - accapi
    - options with accounts_pattern, st_tax_rate, lt_tax_rate, account_field
    outputs:
    - tables with cumulative proceeds, taxes, avg/marginal rates per lot
  required_methods:
  - name: find_minimized_gains
    description: Main function computing tax-burden-optimized sale order by sorting
      lots by estimated tax percentage ascending
    evidence: fava_investor/modules/minimizegains/libminimizegains.py:43(find_minimized_gains)
  - name: find_tax_burden
    description: Interpolation function for calculating specific sale amount tax given
      progressive tax brackets
    evidence: fava_investor/modules/minimizegains/libminimizegains.py:16(find_tax_burden)
  key_behaviors:
  - behavior: Ascending tax-burden sorting
    description: Sells highest-tax-burden-per-dollar lots first to minimize total
      tax across sale
    evidence: fava_investor/modules/minimizegains/libminimizegains.py:98(sort)
  - behavior: Progressive tax interpolation
    description: Tax brackets are progressive; interpolation between data points calculates
      exact tax burden
    evidence: fava_investor/modules/minimizegains/libminimizegains.py:16(find_tax_burden)
  - behavior: Separate ST/LT rate handling
    description: US short-term (ordinary income rate) vs long-term (15-20%) rates
      handled distinctly
    evidence: fava_investor/modules/minimizegains/libminimizegains.py:46(tax_rate)
  replaceable_points:
  - name: st_tax_rate
    description: Short-term capital gains tax rate (ordinary income)
    options:
    - name: 0.0-1.0
      traits:
      - User-configurable
      - Must match actual tax bracket
      fit_for:
      - Users knowing their marginal rate
      not_fit_for:
      - Users unsure of their tax bracket
    default: 0.01 (placeholder - must be configured)
  - name: lt_tax_rate
    description: Long-term capital gains tax rate
    options:
    - name: 0.0-1.0
      traits:
      - User-configurable
      - Typically 0/15/20% in US
      fit_for:
      - Users knowing their LTCG bracket
      not_fit_for:
      - Users unsure of long-term rates
    default: 0.01 (placeholder - must be configured)
  design_decisions:
  - Sort by est_tax_percent ascending (Sells highest-tax-burden-per-dollar lots first
    to minimize total tax) - fava_investor/modules/minimizegains/libminimizegains.py:98(sort)
  - Separate st_tax_rate and lt_tax_rate (US short-term (ordinary income) vs long-term
    (15-20%) rates differ fundamentally) - fava_investor/modules/minimizegains/libminimizegains.py:46(tax_rate)
  - Cumulative tax interpolation (Tax brackets are progressive; interpolation needed
    between data points) - fava_investor/modules/minimizegains/libminimizegains.py:16(find_tax_burden)
  acceptance_hints:
  - Output table shows lots in tax-optimized selling order
  - Cumulative tax burden increases monotonically as more lots sold
  - Marginal rate correctly reflects bracket transitions
  - Short-term and long-term lots handled with appropriate rates
- id: cash_drag
  name: Cash Drag Analyzer
  order: 4
  responsibility: Identifies uninvested cash positions across accounts that may be
    experiencing opportunity cost.
  interface:
    inputs:
    - accapi
    - options with accounts_pattern, accounts_exclude_pattern, min_threshold, metadata_label_cash
    outputs:
    - Table of accounts with cash balances exceeding threshold
  required_methods:
  - name: find_loose_cash
    description: Main function executing cash query across accounts, returning balances
      above threshold
    evidence: fava_investor/modules/cashdrag/libcashdrag.py:23(find_loose_cash)
  - name: find_cash_commodities
    description: Builds regex pattern for cash-like commodities based on Bond_Cash
      metadata and operating currencies
    evidence: fava_investor/modules/cashdrag/libcashdrag.py:7(find_cash_commodities)
  key_behaviors:
  - behavior: Bond_Cash metadata detection
    description: Reuses asset_allocation_Bond_Cash to mark cash-like instruments (money
      market funds) as cash
    evidence: fava_investor/modules/cashdrag/libcashdrag.py:10(metadata_label_cash)
  - behavior: Automatic operating currency inclusion
    description: Base currencies (USD, EUR) automatically included as cash since they're
      inherently liquid
    evidence: fava_investor/modules/cashdrag/libcashdrag.py:16(cash_commodities)
  replaceable_points:
  - name: min_threshold
    description: Minimum cash balance to report (ignores dust amounts)
    options:
    - name: 0+
      traits:
      - Any non-negative value
      fit_for:
      - Filtering micro-amounts
      not_fit_for:
      - Reporting each balances including dust
    default: '0'
  design_decisions:
  - Bond_Cash metadata as cash indicator (Reuses asset_allocation_Bond_Cash to mark
    cash-like instruments (money market funds)) - fava_investor/modules/cashdrag/libcashdrag.py:10(metadata_label_cash)
  - Operating currencies automatically included (Base currencies (USD, EUR) are inherently
    cash by definition) - fava_investor/modules/cashdrag/libcashdrag.py:16(cash_commodities)
  acceptance_hints:
  - Cash balances above threshold appear correctly in output table
  - Operating currencies detected as cash automatically
  - Money market funds marked with Bond_Cash metadata included
  - Threshold filtering works correctly
- id: summarizer
  name: Metadata Summarizer
  order: 5
  responsibility: Extracts and displays arbitrary metadata from account or commodity
    directives as configurable tables.
  interface:
    inputs:
    - accapi
    - configs array with directive_type, columns, acc_pattern/col_labels
    outputs:
    - Ordered, labeled, sorted tables with optional footers
  required_methods:
  - name: build_table
    description: Main table builder with column ordering, labeling, and optional footer
      calculation
    evidence: fava_investor/modules/summarizer/libsummarizer.py:67(build_table)
  - name: active_accounts_metadata
    description: Extracts metadata from open accounts matching pattern
    evidence: fava_investor/modules/summarizer/libsummarizer.py:131(active_accounts_metadata)
  - name: commodities_metadata
    description: Extracts metadata from commodity directives
    evidence: fava_investor/modules/summarizer/libsummarizer.py:101(commodities_metadata)
  key_behaviors:
  - behavior: Ordered dict column preservation
    description: Python 3.7+ guarantees dict insertion order; enables explicit column
      sequencing and ordering
    evidence: fava_investor/modules/summarizer/libsummarizer.py:39(order_and_rename)
  - behavior: Commodity leaf parent check
    description: Prevents double-counting when parent account is explicitly opened
      alongside leaf accounts
    evidence: fava_investor/modules/summarizer/libsummarizer.py:47(is_commodity_leaf_with_parent)
  replaceable_points:
  - name: directive_type
    description: Source of metadata extraction
    options:
    - name: accounts
      traits:
      - Account directive metadata
      fit_for:
      - Account-level annotations
      not_fit_for:
      - Commodity-level data
    - name: commodities
      traits:
      - Commodity directive metadata
      fit_for:
      - Ticker-level annotations
      not_fit_for:
      - Account-level data
    default: accounts
  - name: meta_prefix
    description: Filter metadata keys by prefix for selective display
    options:
    - name: any string
      traits:
      - User-defined prefix filter
      fit_for:
      - Grouping related metadata
      not_fit_for:
      - Showing each metadata
    default: '"" (no filter)'
  design_decisions:
  - Ordered dict for column preservation (Python 3.7+ guarantees dict insertion order;
    enables explicit column sequencing) - fava_investor/modules/summarizer/libsummarizer.py:39(order_and_rename)
  - Commodity leaf account parent check (Prevents double-counting when parent account
    is explicitly opened) - fava_investor/modules/summarizer/libsummarizer.py:47(is_commodity_leaf_with_parent)
  acceptance_hints:
  - Account metadata tables display correct column ordering
  - Commodity metadata extraction works for both types
  - Prefix filtering correctly narrows displayed metadata
  - Tables return standard 4-tuple format
- id: ticker_relationships
  name: Ticker Relationship Manager
  order: 6
  responsibility: Tracks substantially identical funds, equivalents, and TLH partners
    from commodity declarations for wash sale detection.
  interface:
    inputs:
    - beancount commodity declarations file
    outputs:
    - Equivalence groups, identical sets, TLH partner recommendations
  required_methods:
  - name: RelateTickers
    description: Core class managing ticker equivalence relationships, precomputes
      equivalents/identicals at init
    evidence: fava_investor/util/relatetickers.py:12(RelateTickers)
  - name: compute_tlh_groups
    description: Infers complete TLH partner set from partial declarations using symmetric
      closure
    evidence: fava_investor/util/relatetickers.py:141(compute_tlh_groups)
  - name: representative
    description: Returns consistent canonical ticker for equivalent group
    evidence: fava_investor/util/relatetickers.py:71(representative)
  key_behaviors:
  - behavior: Incomplete specification inference
    description: Users specify minimal relationships; algorithm derives symmetric
      closure for complete TLH pairs
    evidence: fava_investor/util/relatetickers.py:141(compute_tlh_groups)
  - behavior: Same-type filtering
    description: Mutual funds should only TLH with other MFs, ETFs with ETFs based
      on a__quoteType metadata
    evidence: fava_investor/util/relatetickers.py:147(mf_to_etf_map)
  - behavior: Static precomputation
    description: Equivalents/identicals precomputed at __init__, cannot be updated
      at runtime
    evidence: fava_investor/util/relatetickers.py:21-24
  replaceable_points:
  - name: same_type_funds_only
    description: Restrict TLH partners to same fund type (MF with MF, ETF with ETF)
    options:
    - name: 'true'
      traits:
      - Type-restricted pairs
      fit_for:
      - Conservative wash sale detection avoiding cross-type issues
      not_fit_for:
      - Users wanting each possible TLH partners regardless of type
    - name: 'false'
      traits:
      - Every pairs allowed
      fit_for:
      - Maximum TLH opportunity discovery
      not_fit_for:
      - Strict type-matching requirements
    default: 'false'
  design_decisions:
  - Infer complete TLH partners from incomplete specification (Users specify minimal
    relationships; algorithm derives symmetric closure) - fava_investor/util/relatetickers.py:141(compute_tlh_groups)
  - Symmetric TLH inference rule (If A→B is TLH pair, B→A is also TLH; mathematical
    property of the relationship) - fava_investor/util/relatetickers.py:170-186
  - a__quoteType for same-type filtering (Mutual funds should only TLH with other
    MFs, ETFs with ETFs) - fava_investor/util/relatetickers.py:147(mf_to_etf_map)
  acceptance_hints:
  - Equivalence groups compute correctly with transitive closure
  - TLH partner recommendations include each symmetric pairs
  - Same-type filtering excludes cross-type partnerships when enabled
  - RelateTickers loads file successfully on initialization
data_flow:
- from_stage: external
  to_stage: Investor
  data: Beancount ledger data via Fava context (g.ledger) or file loading
- from_stage: Investor
  to_stage: FavaInvestorAPI
  data: Creates API instance per request; Fava context g.ledger provides each data
- from_stage: FavaInvestorAPI
  to_stage: Every modules
  data: 'accapi provides: query_func, realize, root_tree, get_commodity_directives,
    get_operating_currencies, cost_or_value'
- from_stage: libtlh.find_harvestable_lots
  to_stage: libtlh.harvestable_by_commodity
  data: rtypes, rrows with lot-level loss data
- from_stage: libassetalloc.build_interesting_realacc
  to_stage: libassetalloc.bucketize
  data: realacc tree filtered to included accounts
- from_stage: bucketize
  to_stage: treeify
  data: asset_buckets dict mapping class names to Decimal values
- from_stage: RelateTickers
  to_stage: CachedTickerInfo
  data: ticker list; Yahoo info cached locally as pickle
- from_stage: ScaledNAV
  to_stage: Price entries
  data: Estimated MF NAVs appended to prices file
- from_stage: ticker_relationships
  to_stage: tax_loss_harvesting
  data: Substantially identical tickers and TLH partner groups for wash sale detection
global_contracts:
- 'Every tables return 4-tuple: (rtypes list, rrows list, reserved_None, footer_or_None)
  - fava_investor/common/libinvestor.py:81(build_table_footer)'
- 'Namedtuple format: Row(*values) where types come from rtypes parallel list - fava_investor/modules/tlh/libtlh.py:110(RetRow)'
- Metadata prefix 'asset_allocation_*' for allocation classification - fava_investor/modules/assetalloc_class/libassetalloc.py:93(meta_prefix_len)
- Metadata prefix 'a__' for auto-generated ticker metadata - fava_investor/util/ticker_util.py:156(prefix)
- Operating currency from ledger.options['operating_currency'][0] as base - fava_investor/common/favainvestorapi.py:58(get_operating_currencies)
- Configuration via 'fava-extension' custom directives in beancount - fava_investor/common/beancountinvestorapi.py:79(get_custom_config)
- Dual-API abstraction (FavaInvestorAPI/AccAPI) enables CLI-Fava code reuse - fava_investor/common/favainvestorapi.py:13(FavaInvestorAPI)
- Account sortkey pattern '^[01]' enforces Assets/Liabilities as first digit - fava_investor/modules/tlh/libtlh.py:82
business_decisions:
- id: BD-001
  type: B/DK
  content: 30-day wash sale window hardcoded
  rationale: IRS wash sale rule mandates a 30-day lookback/lookforward window; hardcoding
    eliminates configuration complexity for US users while ensuring regulatory compliance.
    This prevents users from accidentally misconfiguring the window and facing IRS
    penalties.
  evidence: fava_investor/modules/tlh/libtlh.py:209(sql)
  stage: tax_loss_harvesting
  alternative_considered: Configurable window was rejected to avoid user misconfiguration
    risk
  _evidence_issues:
  - 'FN_NOT_FOUND: sql in fava_investor/modules/tlh/libtlh.py'
- id: BD-002
  type: BA
  content: relativedelta for gain_term
  rationale: IRS defines long-term vs short-term as 'greater than 1 year' which requires
    precise date arithmetic accounting for leap years. Using relativedelta ensures
    accurate boundary determination (366+ days for leap years vs 365+ for non-leap
    years) preventing misclassification.
  evidence: fava_investor/modules/tlh/libtlh.py:38(gain_term)
  stage: tax_loss_harvesting
  alternative_considered: Simple day-count division was rejected due to leap year
    inaccuracy
- id: BD-003
  type: M
  content: GROUP BY cost_date,currency,cost_currency,cost_number
  rationale: Aggregating lots by cost_date, currency, cost_currency, and cost_number
    ensures single-position inventories per unique cost basis. This enables the get_only_position()
    optimization which reduces query complexity from O(n) to O(1) per position lookup.
  evidence: fava_investor/modules/tlh/libtlh.py:84(sql)
  stage: tax_loss_harvesting
  alternative_considered: No grouping with post-processing was rejected due to performance
    overhead
  _evidence_issues:
  - 'FN_NOT_FOUND: sql in fava_investor/modules/tlh/libtlh.py'
- id: BD-004
  type: M
  content: a__substidenticals metadata for wash detection
  rationale: Using a__substidenticals metadata commodity declarations drives wash
    sale detection logic without requiring code changes. This declarative approach
    allows users to define substitution relationships in their Beancount data while
    the algorithm dynamically applies wash sale rules.
  evidence: fava_investor/modules/tlh/libtlh.py:45(get_metavalue)
  stage: tax_loss_harvesting
  alternative_considered: Hardcoded substitution maps were rejected due to inflexibility
- id: BD-005
  type: M/BA
  content: asset_allocation_* metadata prefix for bucket assignment
  rationale: The asset_allocation_* prefix convention allows flexible security classification
    without code changes. Users declare bucket assignments via metadata, and percentages
    must sum to 100% ensuring valid portfolio allocation. This separation of data
    and logic enables self-documenting configuration.
  evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:93(meta_prefix)
  stage: asset_allocation_class
  alternative_considered: Database-driven classification was rejected due to complexity
  _evidence_issues:
  - 'FN_NOT_FOUND: meta_prefix in fava_investor/modules/assetalloc_class/libassetalloc.py'
- id: BD-006
  type: BA
  content: balance_children for rolled-up totals
  rationale: Parent account nodes in the asset allocation tree require cumulative
    child balances to calculate correct percentage allocations. Without balance_children,
    percentage display would be incorrect because parent totals must include each
    nested children at every level of the hierarchy.
  evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:44(compute_child_balances)
  stage: asset_allocation_class
  alternative_considered: Flat calculation was rejected due to inability to show hierarchical
    breakdown
- id: BD-007
  type: B/BA
  content: Base currency from operating_currencies[0]
  rationale: The system assumes single-base-currency portfolios by default, selecting
    operating_currencies[0] as the base. This simplifies comparison and reporting;
    multi-currency support is available via explicit parameter for users who need
    it. This boundary prevents scope creep while meeting typical investor needs.
  evidence: fava_investor/modules/assetalloc_class/libassetalloc.py:69(root.currency)
  stage: asset_allocation_class
  alternative_considered: Automatic multi-currency conversion was rejected as too
    complex for v1
