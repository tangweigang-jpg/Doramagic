resources:
- id: res-slot-001
  type: replaceable_component
  name: ticker_metadata_source
  path: null
  description: Yahoo Finance is the default due to free access, comprehensive fund
    metadata (expense ratios, ISIN), and good coverage of ETFs/mutual funds. Users
    with API access needs or non-Yahoo securities should consider Alpha Vantage.
  used_in_stages: []
  options:
  - name: yfinance (Yahoo Finance)
    traits:
    - free
    - no_auth
    - real_time_metadata
    - fund_data
    fit_for:
    - Individual investors tracking personal portfolios with US/international securities
    not_fit_for:
    - Institutional use, non-Yahoo securities, guaranteed uptime requirements
  - name: Alpha Vantage
    traits:
    - api_key_required
    - fundamental_data
    - historical_prices
    fit_for:
    - Professional use requiring comprehensive fundamental data
    not_fit_for:
    - Quick prototyping, users without API keys
  - name: Manual CSV/SQLite database
    traits:
    - offline
    - user_curated
    - reliable
    fit_for:
    - Offline use, highly reliable data requirements, advanced users
    not_fit_for:
    - Dynamic fund data, initial population of data
  default: yfinance (Yahoo Finance)
  _source: worker_resource
