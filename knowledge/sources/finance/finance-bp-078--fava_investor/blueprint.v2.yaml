- id: BD-085
  type: BA
  content: 'INTERACTION: [BD-076] × [BD-075] × [BD-078] → NAV estimation staleness
    cascade on ticker relationship changes'
  rationale: BD-076 uses inheritance to grant ScaledNAV direct access to RelateTickers
    cached data, BD-075 enforces load_file() during construction, and BD-078 precomputes
    equivalents/identicals once as immutable caches. When a user updates a__substidenticals
    metadata in their beancount file (e.g., after discovering a new substantially
    identical fund), the ScaledNAV instance retains stale ticker relationships until
    explicitly reconstructed. This causes NAV estimation to use outdated wash sale
    grouping, leading to incorrect scaled NAV calculations that silently propagate
    until the user rebuilds the object. The inheritance pattern (BD-076) means ScaledNAV
    has no interface boundary to detect staleness.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Composition pattern with cache invalidation callback; explicit
    reload() method
- id: BD-086
  type: B/BA
  content: 'INTERACTION: [BD-065] × [BD-071] × [BD-021] → Contradiction: 1% threshold
    vs $1 default vs micro-loss exclusion'
  rationale: 'BD-065 (1% loss threshold) and BD-071 ($1 minimum loss) create a contradiction
    with BD-021 (default loss_threshold=1). BD-065''s percentage-based threshold could
    harvest positions with sub-dollar losses in small portfolios (e.g., 1% of $50
    = $0.50), violating BD-071''s intent to exclude micro-losses. Meanwhile, BD-021''s
    dollar default of $1 means only losses ≥$1 qualify regardless of percentage. A
    position with a $0.75 loss on a $75 holding would be: (a) harvested by BD-065
    (1% threshold met), (b) excluded by BD-071 ($0.75 < $1), and (c) depends on BD-021
    configuration. This inconsistency could cause wash sale generation for losses
    below the intended minimum, or inconsistent behavior across portfolios of different
    sizes. The conflict emerges most severely when portfolio values change—positions
    that qualified for harvesting at one price level may not at another.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: 'Unified threshold: max(1%, $1 absolute); separate percentage
    and absolute thresholds with AND logic'
- id: BD-087
  type: B/RC
  content: 'INTERACTION: [BD-009] × [BD-039] × [BD-010] → Amplification: Tax rate
    differentiation multiplies lot selection optimization'
  rationale: 'BD-009 sorts by est_tax_percent ascending for tax-efficient lot selection,
    BD-039 implements the same sort, and BD-010 maintains separate short-term and
    long-term tax rates. These decisions amplify each other''s effect: BD-010''s differential
    tax rates (10-37% ST vs 0-20% LT) create spread in est_tax_percent values, which
    BD-009/039 then prioritize for selection. Without BD-010''s separate rates, each
    lots would have similar effective rates and sorting would have minimal impact.
    The amplification creates materially different outcomes—short-term losses in high
    tax brackets get selected first, generating 37% tax savings per dollar versus
    15% for long-term gains. A $10,000 short-term loss at 37% saves $3,700; at undifferentiated
    10% rate, only $1,000. This multiplicative effect means BD-010 directly determines
    the magnitude of BD-009''s optimization benefit.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Single blended rate approximation; bracket-aware marginal
    rate selection
- id: BD-088
  type: BA
  content: 'INTERACTION: [BD-006] × [BD-031] → Risk cascade: balance_children vs negative
    balance exclusion creates understated allocations'
  rationale: 'BD-006 requires balance_children for rolled-up totals in hierarchical
    allocation, while BD-031 skips negative balances to focus on assets only. When
    a parent account has both positive child balances (rolled up by BD-006) and negative
    balances (margin loans, shorts), BD-031''s exclusion means the negative portion
    isn''t subtracted from the aggregate, overstating total portfolio value. For example,
    a margin loan of $10,000 under a stock position would not reduce the asset allocation
    calculation if it''s in a separate child account. The risk cascade: (1) BD-006
    aggregates children into parent, (2) BD-031 filters negatives, (3) asset allocation
    percentages sum to >100% because liabilities aren''t netted, (4) rebalancing recommendations
    suggest over-investing in asset classes. This is particularly dangerous when BD-030''s
    unknown bucket absorbs the discrepancy rather than surfacing the error.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Net negative balances against positive within same asset
    class; explicit liability allocation mode
- id: BD-089
  type: B/DK
  content: 'INTERACTION: [BD-069] × [BD-083] → Hidden dependency: TLH workflow call
    order required for wash sale accuracy'
  rationale: 'BD-069 mandates specific call order (find_harvestable_lots → harvestable_by_commodity
    → summarize_tlh, with recently_sold_at_loss separately), and BD-083 requires querying
    substantially identical tickers before wash sale checks in the same loop iteration.
    These create a hidden dependency: skipping steps or reordering calls causes incomplete
    wash sale detection. Specifically, recently_sold_at_loss must be queried independently
    to avoid circular dependency, but if called after harvesting logic rather than
    before, the wash sale window calculation misses replacement share purchases that
    occurred between workflow steps. The risk: automated scripts or alternative entry
    points that bypass the documented workflow order will generate incorrect TLH recommendations,
    potentially triggering IRS wash sale disallowance without user awareness. No runtime
    validation exists to detect workflow violations.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Single atomic workflow function with internal state management;
    workflow validation at entry points
- id: BD-090
  type: B
  content: 'Missing gap: No as-of/reference date mechanism for time-sensitive calculations'
  rationale: 'No ''as_of'', ''evaluation_date'', ''reference_date'', or ''snapshot_time''
    mechanism exists in the codebase. This gap affects wash sale window calculations
    (BD-066, BD-070), asset allocation dates, and gains minimization estimates. Without
    an explicit as-of date, the system uses the current date at runtime, which means:
    (1) historical analysis requires running with fake ''today'' dates, (2) report
    reproducibility is compromised when data changes between runs, (3) audit trails
    cannot reproduce exact calculations from a specific date. For tax calculations
    with 30-day lookback windows, this means the same beancount file evaluated on
    different dates produces different wash sale results without any version control
    of the input state.'
  evidence: N/A:0(see_rationale)
  stage: universal
  status: missing
  known_gap: true
  severity: high
  impact: Non-reproducible tax calculations; cannot generate point-in-time reports
  alternative_considered: evaluation_date parameter on each report functions; snapshot
    mode with immutable database
- id: BD-091
  type: B
  content: 'Missing gap: Settlement and delivery time convention absent'
  rationale: 'No T+N settlement date concepts exist in the codebase. US equities settle
    T+1 (or T+2 for some), meaning cash from a sale isn''t available for reinvestment
    until the settlement date. This affects: (1) BD-024 (earliest safe sale date)
    which calculates from acquisition_date but doesn''t account for settlement-driven
    reinvestment timing, (2) cash availability calculations in cash drag (BD-035,
    BD-036, BD-037), (3) wash sale window calculations where replacement share purchase
    timing matters. Without settlement awareness, the system may recommend selling
    and repurchasing within a wash sale window because it doesn''t track when cash
    actually becomes available for reinvestment.'
  evidence: N/A:0(see_rationale)
  stage: tax_loss_harvesting
  status: missing
  known_gap: true
  severity: high
  impact: Wash sale recommendations that don't account for settlement timing
  alternative_considered: T+1 settlement offset in each date calculations; configurable
    settlement delay per security type
