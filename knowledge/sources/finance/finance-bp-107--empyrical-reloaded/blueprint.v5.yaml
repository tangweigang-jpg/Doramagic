# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-107
name: empyrical-reloaded
sop_version: '3.6'
source:
  projects:
  - empyrical-reloaded
  commit_hash: efe60664f0abd957074b0751ef82228594a659a5
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Financial return and risk metrics computation
  description: Library providing standardized financial metrics (Sharpe ratio, Sortino ratio, alpha/beta,
    drawdowns, tail risk) with support for rolling windows and factor attribution analysis.
  prerequisites: Python 3.10+, basic understanding of financial returns and risk metrics, familiarity
    with pandas/numpy
  not_suitable_for: Non-financial time series analysis, real-time trading systems, portfolio optimization,
    non-US market analysis without adjustment
stages:
- id: data_ingestion
  name: Data Ingestion & Utilities
  order: 1
  responsibility: Provides data fetching, caching, and low-level computational primitives. Acts as foundation
    layer for each upstream stages.
  interface:
    inputs:
    - symbol/ticker strings
    - date ranges
    - cached file paths
    outputs:
    - pd.DataFrame/Series of returns/prices
    - aligned arrays
  required_methods:
  - name: roll
    description: Generic rolling window calculator dispatching to ndarray/Pandas implementations
    evidence: src/empyrical/utils.py:74(roll)
  - name: _create_unary_vectorized_roll_function
    description: Factory for creating rolling versions of unary statistics
    evidence: src/empyrical/utils.py:585(_create_unary_vectorized_roll_function)
  - name: _create_binary_vectorized_roll_function
    description: Factory for creating rolling versions of binary statistics
    evidence: src/empyrical/utils.py:632(_create_binary_vectorized_roll_function)
  - name: _aligned_series
    description: Aligns multiple Series by index, filling NaNs for missing values
    evidence: src/empyrical/utils.py:691(_aligned_series)
  - name: get_fama_french
    description: Fetches Fama-French factor data via pandas-datareader
    evidence: src/empyrical/utils.py:28(pandas_datareader)
  - name: up
    description: Filters returns based on positive factor_returns
    evidence: src/empyrical/utils.py:117(up)
  - name: down
    description: Filters returns based on negative factor_returns
    evidence: src/empyrical/utils.py:143(down)
  key_behaviors:
  - behavior: Bottleneck vs numpy dispatch
    description: Library uses bottleneck for NaN-handling math with numpy fallback providing ~10x speedup
      for NaN-heavy financial data
    evidence: src/empyrical/utils.py:38(_wrap_function)
  - behavior: Factory pattern eliminates code duplication
    description: Factory functions generate rolling statistics avoiding explicit implementation per metric;
      14+ rolling functions from 2 factory lines
    evidence: src/empyrical/utils.py:585(_create_unary_vectorized_roll_function)
  - behavior: Lazy optional imports
    description: Web data sources (yfinance, pandas-datareader) are lazy-loaded allowing library function
      without network dependencies
    evidence: src/empyrical/utils.py:28(pandas_datareader),:33(yfinance)
  replaceable_points:
  - name: nan_aggregation
    description: Backend for NaN-aware aggregation functions
    options:
    - name: bottleneck
      traits:
      - 60-70% faster
      - C-accelerated
      - Same API
      fit_for:
      - Large datasets with NaNs
      - Production performance
      - US equity data
      not_fit_for:
      - Systems without compiled deps
      - Debugging NaN behavior
    - name: numpy
      traits:
      - Pure Python fallback
      - Portable
      - No compiled deps
      fit_for:
      - Debugging
      - Minimal dependencies
      - Small datasets
      not_fit_for:
      - Large datasets
      - Performance-critical code
    default: bottleneck
  design_decisions:
  - Bottleneck library for NaN-handling math with numpy fallback provides ~10x speedup for NaN-heavy financial
    data without changing API (src/empyrical/utils.py:38)
  - Factory functions for rolling statistics generation avoids code duplication across 15+ rolling metrics
    (src/empyrical/utils.py:585)
  - Lazy optional imports for web data sources allows library to function without network dependencies
    (src/empyrical/utils.py:28)
  acceptance_hints:
  - Rolling metrics match manual window calculations
  - NaN values handled correctly in edge cases
  - Optional data sources load only when requested
- id: return_computation
  name: Return Computation
  order: 2
  responsibility: Transforms price data into return series and cumulative returns. Entry point for quantitative
    analysis.
  interface:
    inputs:
    - price series (pd.Series/pd.DataFrame/np.ndarray)
    outputs:
    - return series with tz-aware datetime index
  required_methods:
  - name: simple_returns
    description: Computes period-over-period percentage returns from prices using pct_change semantics
    evidence: src/empyrical/stats.py:88(simple_returns)
  - name: cum_returns
    description: Computes cumulative returns from simple returns with optional starting value
    evidence: src/empyrical/stats.py:117(cum_returns)
  - name: cum_returns_final
    description: Single-value total return calculation
    evidence: src/empyrical/stats.py:180(cum_returns_final)
  - name: aggregate_returns
    description: Converts daily returns to weekly/monthly/quarterly/yearly
    evidence: src/empyrical/stats.py:216(aggregate_returns)
  key_behaviors:
  - behavior: DataFrame support with per-column accumulation
    description: Enables batch processing of multi-asset portfolios; each column treated independently
    evidence: src/empyrical/stats.py:134(returns.iloc[1:])
  - behavior: Preserve tz-aware DatetimeIndex
    description: Financial data requires timezone awareness for correct alignment across markets
    evidence: src/empyrical/stats.py:102(index coerced to be tz-aware)
  - behavior: simple_returns MUST precede cum_returns
    description: Prices → returns → cumulative transformation pipeline; passing prices directly to cum_returns
      produces incorrect results
    evidence: src/empyrical/stats.py:88(simple_returns),:117(cum_returns)
  replaceable_points:
  - name: annualization_factor
    description: Trading days per year constant for period conversion
    options:
    - name: 252 (US)
      traits:
      - Industry standard
      - US-centric
      - 252 trading days
      fit_for:
      - US equity markets
      - Default use cases
      - Standard benchmarks
      not_fit_for:
      - Non-US markets
      - High-frequency trading
      - Crypto/commodities
    - name: 250 (approx)
      traits:
      - Round number approximation
      - Slightly conservative
      fit_for:
      - General estimates
      - Non-US developed markets
      not_fit_for:
      - Precise calculations
      - Regulatory reporting
    - name: 365 (calendar)
      traits:
      - Simple
      - Calendar-based
      - Overstates trading days
      fit_for:
      - Crypto markets
      - 24/7 markets
      not_fit_for:
      - Stock markets
      - Any market with holidays/weekends
    default: 252 (US)
  design_decisions:
  - DataFrame support with per-column accumulation enables batch processing of multi-asset portfolios
    (src/empyrical/stats.py:134)
  - Preserve tz-aware DatetimeIndex throughout for correct alignment across markets (src/empyrical/stats.py:102)
  - 252 trading days as daily annualization factor is industry standard approximation (src/empyrical/periods.py:2)
  acceptance_hints:
  - simple_returns(pct_change) matches manual (price[t] - price[t-1]) / price[t-1]
  - cum_returns on simple returns produces geometrically correct cumulative values
  - Output index is tz-aware UTC for consistency
- id: risk_metrics
  name: Risk Metrics
  order: 3
  responsibility: Computes downside risk, drawdown, and tail risk measures. Quantifies volatility and
    loss potential.
  interface:
    inputs:
    - returns series (pd.Series or np.ndarray)
    outputs:
    - scalar risk metrics or drawdown series
  required_methods:
  - name: max_drawdown
    description: Finds maximum peak-to-trough decline from running maximum
    evidence: src/empyrical/stats.py:309(max_drawdown)
  - name: drawdown_series
    description: Time series of drawdown magnitudes enabling visualization and pattern analysis
    evidence: src/empyrical/stats.py:252(drawdown_series)
  - name: annual_volatility
    description: Annualized return standard deviation
    evidence: src/empyrical/stats.py:433(annual_volatility)
  - name: downside_risk
    description: Semi-deviation below required return threshold
    evidence: src/empyrical/stats.py:759(downside_risk)
  - name: tail_ratio
    description: 95th/5th percentile return ratio measuring tail behavior
    evidence: src/empyrical/stats.py:1398(tail_ratio)
  key_behaviors:
  - behavior: Separate drawdown_series from max_drawdown
    description: Enables visualization and further analysis of drawdown patterns beyond just the maximum
    evidence: src/empyrical/stats.py:252(drawdown_series)
  - behavior: Configurable required_return threshold
    description: Allows risk assessment against different benchmarks (T-bills, zero, custom) rather than
      assuming zero
    evidence: src/empyrical/stats.py:759(required_return=0)
  - behavior: NaN handling in drawdown
    description: max_drawdown returns 0 for flat/positive series and NaN for all-NaN input
    evidence: src/empyrical/stats.py:526-531(calmar_ratio)
  replaceable_points:
  - name: tail_distribution_model
    description: Model for extreme value analysis in VaR/ES calculations
    options:
    - name: GPD (Generalized Pareto)
      traits:
      - Parametric tail estimation
      - Better for extreme events
      - scipy-based
      fit_for:
      - Risk management
      - Tail risk analysis
      - Stress testing
      not_fit_for:
      - Small samples
      - Non-tail analysis
      - Symmetric distributions
    - name: Historical Simulation
      traits:
      - Non-parametric
      - Simple
      - No distribution assumption
      fit_for:
      - Backtesting
      - Transparent reporting
      - Regulatory compliance
      not_fit_for:
      - Extreme tail estimation
      - Small datasets
      - Non-stationary data
    default: GPD (Generalized Pareto)
  design_decisions:
  - Separate drawdown_series from max_drawdown enables visualization and further analysis (src/empyrical/stats.py:252)
  - Configurable required_return threshold for downside risk allows assessment against different benchmarks
    (src/empyrical/stats.py:759)
  - GPD-based VaR/ES estimation using scipy optimize better captures tail risk than historical simulation
    (src/empyrical/stats.py:1722)
  acceptance_hints:
  - max_drawdown matches manual peak-to-trough calculation
  - drawdown_series values are always <= 0 (negative)
  - annual_volatility annualizes correctly from daily/weekly/monthly inputs
  - Strategies with no drawdown produce NaN calmar_ratio
- id: performance_metrics
  name: Performance Metrics
  order: 4
  responsibility: Calculates risk-adjusted return ratios (Sharpe, Sortino, Calmar, Omega). Core evaluation
    metrics for strategy comparison.
  interface:
    inputs:
    - returns series, optional required_return/annualization
    outputs:
    - scalar ratio values (float)
  required_methods:
  - name: sharpe_ratio
    description: Mean return / volatility (annualized) - primary risk-adjusted performance measure
    evidence: src/empyrical/stats.py:595(sharpe_ratio)
  - name: sortino_ratio
    description: Mean return / downside deviation
    evidence: src/empyrical/stats.py:669(sortino_ratio)
  - name: omega_ratio
    description: Probability-weighted ratio of gains to losses above threshold
    evidence: src/empyrical/stats.py:539(omega_ratio)
  - name: calmar_ratio
    description: Annual return / max drawdown
    evidence: src/empyrical/stats.py:490(calmar_ratio)
  - name: annual_return
    description: CAGR-equivalent for non-daily periods using APPROX_BDAYS_PER_YEAR
    evidence: src/empyrical/stats.py:354(annual_return)
  key_behaviors:
  - behavior: 'Dual implementation: aligned vs non-aligned'
    description: Aligned versions skip costly reindexing when caller guarantees alignment; ~2x faster
      for batch processing
    evidence: src/empyrical/stats.py:1054(alpha),:1120(alpha_aligned)
  - behavior: Output buffer pattern (out parameter)
    description: Enables NumPy array allocation reuse; critical for rolling window calculations with 100k+
      elements
    evidence: src/empyrical/stats.py:595(sharpe_ratio out=None)
  - behavior: risk_free=0 default assumption
    description: Sharpe ratios computed without risk-free rate subtraction; skews comparison across rate
      environments
    evidence: src/empyrical/stats.py:595(risk_free=0)
  replaceable_points:
  - name: risk_free_rate
    description: Default risk-free rate assumption for Sharpe and Sortino ratios
    options:
    - name: 0.0 (no adjustment)
      traits:
      - Conservative
      - Simple
      - No external data needed
      fit_for:
      - Historical comparison
      - Baseline analysis
      - Backtesting
      not_fit_for:
      - High interest rate environments
      - Regulatory reporting
      - Modern monetary conditions
    - name: T-bill rate
      traits:
      - Economically accurate
      - Time-varying
      - Requires external data
      fit_for:
      - Modern analysis
      - Cross-asset comparison
      - Performance attribution
      not_fit_for:
      - Historical backtesting (inconsistent data)
      - Simple use cases
    default: 0.0 (no adjustment)
  design_decisions:
  - Dual implementation (alpha/beta with and without alignment) skips costly reindexing when alignment
    guaranteed (src/empyrical/stats.py:1054)
  - Output buffer pattern (out parameter) enables NumPy array allocation reuse for rolling calculations
    (src/empyrical/stats.py:595)
  - Separate roll_ versions generated by factory avoids explicit rolling implementation per metric (src/empyrical/stats.py:1049)
  acceptance_hints:
  - sharpe_ratio matches manual (mean returns - risk_free) / std(returns) * sqrt(annualization)
  - Rolling metrics match consecutive window calculations
  - NaN returned when insufficient data for calculation
- id: factor_analysis
  name: Factor Analysis
  order: 5
  responsibility: Computes alpha, beta, and capture ratios against benchmark/factor returns. Measures
    systematic risk and active returns.
  interface:
    inputs:
    - strategy returns, factor/benchmark returns
    outputs:
    - alpha, beta scalars or capture ratio
  required_methods:
  - name: alpha_beta
    description: Joint alpha/beta calculation with annualization using aligned series
    evidence: src/empyrical/stats.py:905(alpha_beta)
  - name: alpha_aligned
    description: Pre-aligned alpha calculation requiring pre-computed beta
    evidence: src/empyrical/stats.py:1120(alpha_aligned)
  - name: beta_aligned
    description: Covariance-based beta calculation
    evidence: src/empyrical/stats.py:1250(beta_aligned)
  - name: capture
    description: Generic capture ratio computation for up/down market periods
    evidence: src/empyrical/stats.py:1427(capture)
  - name: up_capture
    description: Capture ratio during positive benchmark periods
    evidence: src/empyrical/stats.py:1788(up_capture)
  - name: down_capture
    description: Capture ratio during negative benchmark periods
    evidence: src/empyrical/stats.py:1822(down_capture)
  key_behaviors:
  - behavior: Up/down filtering via wrapper functions
    description: Decomposes any binary stat into bull/bear variants via up()/down() filter composition
    evidence: src/empyrical/utils.py:117(up),:143(down)
  - behavior: 2D array support with column-wise processing
    description: Enables simultaneous factor analysis across multiple portfolios/assets in single call
    evidence: src/empyrical/stats.py:1284(returns[:, np.newaxis])
  - behavior: Optional pre-computed beta
    description: When alpha_beta called jointly, beta computed once and passed to alpha; eliminates redundant
      O(n) pass
    evidence: src/empyrical/stats.py:1091(_beta=None)
  - behavior: alpha_beta_aligned requires beta as parameter
    description: Computing alpha without beta first gives different result; alpha-beta covariance calculation
      is coupled
    evidence: src/empyrical/stats.py:1035(beta_aligned called first)
  replaceable_points:
  - name: beta_fragility_heuristic
    description: Method for estimating beta fragility in extreme conditions
    options:
    - name: GPD tail-based
      traits:
      - Parametric tail estimation
      - Extreme conditions focus
      - scipy-based
      fit_for:
      - Tail risk management
      - Stress testing
      - Crisis analysis
      not_fit_for:
      - Stable market conditions
      - Non-tail analysis
    - name: Historical drawdown
      traits:
      - Non-parametric
      - Historical basis
      - Simple
      fit_for:
      - Backtesting
      - Historical comparison
      - Transparent analysis
      not_fit_for:
      - Forward-looking estimates
      - Extreme events
    default: GPD tail-based
  design_decisions:
  - up/down filtering via wrapper functions decomposes any binary stat into bull/bear variants (src/empyrical/utils.py:117)
  - 2D array support with column-wise processing enables simultaneous factor analysis (src/empyrical/stats.py:1284)
  - Optional pre-computed beta to avoid duplicate calculation when alpha_beta called jointly (src/empyrical/stats.py:1091)
  acceptance_hints:
  - alpha/beta match OLS regression coefficients against benchmark
  - up_capture and down_capture properly segment by benchmark sign
  - Multi-portfolio DataFrame computes per-column independently
- id: performance_attribution
  name: Performance Attribution
  order: 6
  responsibility: Decomposes portfolio returns into factor-attributable and specific (alpha) components.
    Links positions to risk factors.
  interface:
    inputs:
    - returns, positions (MultiIndex), factor_returns, factor_loadings
    outputs:
    - risk_exposures DataFrame, perf_attribution DataFrame
  required_methods:
  - name: perf_attrib
    description: Main attribution function computing common/specific returns using Brinson-Hood-Beebower
      model
    evidence: src/empyrical/perf_attrib.py:5(perf_attrib)
  - name: compute_exposures
    description: Aggregates position-weighted factor loadings into risk_exposures
    evidence: src/empyrical/perf_attrib.py:127(compute_exposures)
  key_behaviors:
  - behavior: MultiIndex (dt, ticker) for positions and loadings
    description: Standard format from Zipline/QF; enables groupby aggregation per date across holdings
    evidence: src/empyrical/perf_attrib.py:92(set_names([dt, ticker]))
  - behavior: Tilt vs timing return decomposition
    description: Separates average exposure effect from daily timing decisions; reveals skill vs exposure
      management
    evidence: src/empyrical/perf_attrib.py:104(tilt_returns),:106(timing_returns)
  - behavior: Position indexing normalization
    description: Defensive copy prevents caller mutating inputs during groupby; protects against subtle
      bugs
    evidence: src/empyrical/perf_attrib.py:94(positions.copy())
  replaceable_points:
  - name: attribution_model
    description: Factor attribution methodology for decomposing returns
    options:
    - name: Brinson-Hood-Beebower (BHB)
      traits:
      - Industry standard
      - Tilt/timing split
      - Position-based
      fit_for:
      - Equity portfolios
      - Factor-based strategies
      - Institutional reporting
      not_fit_for:
      - Derivatives portfolios
      - Macro strategies
      - Fixed income
    default: Brinson-Hood-Beebower (BHB)
  design_decisions:
  - MultiIndex (dt, ticker) for positions and loadings is standard Zipline/QF format (src/empyrical/perf_attrib.py:92)
  - Tilt vs timing return decomposition separates average exposure effect from daily timing decisions
    (src/empyrical/perf_attrib.py:104)
  - Position indexing normalization (ticker ordering) protects against caller mutation during groupby
    (src/empyrical/perf_attrib.py:94)
  acceptance_hints:
  - Factor exposures sum correctly per time period
  - Attribution sums to total return within floating-point tolerance
  - Specific returns = total return - factor-attributed returns
  - MultiIndex structure preserved in output
data_flow:
- from_stage: data_ingestion
  to_stage: return_computation
  data: price series → simple_returns() → return series
- from_stage: return_computation
  to_stage: risk_metrics
  data: returns → max_drawdown, annual_volatility, downside_risk, tail_ratio
- from_stage: return_computation
  to_stage: performance_metrics
  data: returns → sharpe_ratio, sortino_ratio, omega_ratio, annual_return, calmar_ratio
- from_stage: return_computation
  to_stage: factor_analysis
  data: returns + factor_returns → alpha_beta, capture, up/down variants
- from_stage: factor_analysis
  to_stage: performance_metrics
  data: alpha, beta → annualized alpha (for alpha_beta joint computation)
- from_stage: data_ingestion
  to_stage: performance_attribution
  data: positions (MultiIndex) + factor_loadings → compute_exposures()
- from_stage: data_ingestion
  to_stage: factor_analysis
  data: Fama-French factors via get_fama_french() for multi-factor analysis
global_contracts:
- contract: Every return series use decimal percentages (0.01 = 1% return) (src/empyrical/stats.py:125)
  evidence: ''
- contract: Pandas datetime indexes are tz-aware UTC for correct alignment across markets (src/empyrical/utils.py:239)
  evidence: ''
- contract: 'Period constants: DAILY=252, WEEKLY=52, MONTHLY=12, QUARTERLY=4, YEARLY=1 (src/empyrical/periods.py:14)'
  evidence: ''
- contract: Factor analysis functions accept both pd.Series and np.ndarray (src/empyrical/stats.py:1000)
  evidence: ''
- contract: Positions/loadings use MultiIndex with (dt, ticker) names (src/empyrical/perf_attrib.py:92)
  evidence: ''
- contract: Non-aligned functions MUST call _aligned_series() before delegating to aligned versions (stats.py:949)
  evidence: ''
- contract: simple_returns() MUST precede cum_returns() in transformation pipeline (stats.py:88, :117)
  evidence: ''
- contract: alpha_beta_aligned() REQUIRES beta result as _beta parameter for correct alpha computation
    (stats.py:1035)
  evidence: ''
business_decisions:
- id: BD-001
  type: B
  content: Bottleneck library for NaN-handling math with numpy fallback
  rationale: Provides ~10x speedup for NaN-heavy financial data without changing API; fallback ensures
    compatibility when bottleneck unavailable. This enables performance-critical rolling calculations
    while maintaining graceful degradation for deployment environments without bottleneck.
  evidence: src/empyrical/utils.py:38(_wrap_function)
  stage: data_ingestion
  alternative_considered: Pure numpy implementation without bottleneck was rejected due to 10x slower
    performance on NaN-heavy data
- id: BD-002
  type: B/DK
  content: Factory functions for rolling statistics generation
  rationale: Avoids code duplication across 15+ rolling metrics; each new rolling stat requires only defining
    the base function. This architectural pattern reduces maintenance burden and ensures consistent behavior
    across each rolling window calculations.
  evidence: src/empyrical/utils.py:585(_create_unary_vectorized_roll_function)
  stage: data_ingestion
  alternative_considered: Per-metric explicit rolling implementations were rejected due to code duplication
    across 15+ functions
- id: BD-003
  type: B
  content: Lazy optional imports for web data sources
  rationale: Allows library to function without network dependencies; data fetching is opt-in feature.
    This design ensures core metrics work standalone while enabling optional web data retrieval for users
    who need it.
  evidence: src/empyrical/utils.py:205(data_path)
  stage: data_ingestion
  alternative_considered: Mandatory imports were rejected as they would break installations where network
    access is unavailable
- id: BD-004
  type: B/BA
  content: DataFrame support with per-column accumulation
  rationale: Enables batch processing of multi-asset portfolios; each column treated independently. This
    design supports institutional use cases with 100+ assets processed simultaneously rather than requiring
    loop-based single-asset calculations.
  evidence: src/empyrical/stats.py:134(module)
  stage: return_computation
  alternative_considered: Single-series-only API was rejected as insufficient for institutional multi-asset
    workflows
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/empyrical/stats.py'
- id: BD-005
  type: B/DK
  content: Preserve tz-aware DatetimeIndex throughout
  rationale: Financial data requires timezone awareness for correct alignment across markets. This ensures
    accurate return calculations when combining assets trading in different timezones (e.g., US equity
    with international ADR).
  evidence: src/empyrical/stats.py:102(module)
  stage: return_computation
  alternative_considered: Stripping timezone info was rejected as it would cause incorrect results for
    multi-timezone portfolios
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/empyrical/stats.py'
- id: BD-006
  type: BA/DK
  content: 252 trading days as daily annualization factor
  rationale: Industry standard approximation for US equity markets; balances accuracy with simplicity.
    Using 252 (vs 250 or 365) reflects actual trading calendar including partial holidays and early closes.
  evidence: src/empyrical/periods.py:2(APPROX_BDAYS_PER_YEAR)
  stage: return_computation
  alternative_considered: 250 days or 365/256 days were rejected as less aligned with US equity trading
    reality
  _evidence_issues:
  - 'FN_NOT_FOUND: APPROX_BDAYS_PER_YEAR in src/empyrical/periods.py'
- id: BD-007
  type: B/DK
  content: Separate drawdown_series from max_drawdown
  rationale: Enables visualization and further analysis of drawdown patterns beyond just the maximum.
    This separation allows risk managers to identify recovery patterns, duration of drawdowns, and historical
    drawdown sequences.
  evidence: src/empyrical/stats.py:252(drawdown_series)
  stage: risk_metrics
  alternative_considered: Returning only max_drawdown scalar was rejected as insufficient for risk attribution
    analysis
- id: BD-008
  type: B/BA
  content: Configurable required_return threshold for downside risk
  rationale: Allows risk assessment against different benchmarks (T-bills, zero, custom) rather than assuming
    zero. This flexibility enables comparison against risk-free rate or custom hurdle rates appropriate
    for different investment mandates.
  evidence: src/empyrical/stats.py:759(module)
  stage: risk_metrics
  alternative_considered: Hardcoded zero threshold was rejected as inappropriate for non-zero hurdle rate
    mandates
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/empyrical/stats.py'
  vague_rationale: true
- id: BD-009
  type: BA/M
  content: GPD-based VaR/ES estimation using scipy optimize
  rationale: Generalized Pareto Distribution better captures tail risk than historical simulation for
    extreme events. This peaks-over-threshold approach uses statistical tail modeling to estimate VaR
    and Expected Shortfall beyond the empirical distribution.
  evidence: src/empyrical/stats.py:1722(gpd_loglikelihood_minimizer_aligned)
  stage: risk_metrics
  alternative_considered: Historical simulation was rejected as underestimating tail risk during regime
    shifts and crisis periods
- id: BD-010
  type: B
  content: 'Dual implementation: alpha/beta with and without alignment'
  rationale: Aligned versions skip costly reindexing when caller guarantees alignment; ~2x faster for
