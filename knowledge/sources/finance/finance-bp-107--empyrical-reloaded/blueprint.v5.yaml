replaceable_slots:
- id: slot-001
  name: stock_price_data
  description: Yahoo Finance is the default as it requires no API key, provides good historical coverage,
    and is widely used in the quant finance community
  used_in_stages: []
  options:
  - name: Yahoo Finance (yfinance)
    traits:
    - free
    - no_auth_required
    - historical_prices
    - real_time
    fit_for:
    - General use, historical backtesting, getting S&P and major indices data
    not_fit_for:
    - High-frequency trading, intraday minute-level data without premium subscription
  - name: Alpha Vantage
    traits:
    - free_tier_available
    - api_key_required
    - historical_prices
    fit_for:
    - Users wanting alternative free data source
    not_fit_for:
    - High volume usage (rate limits on free tier)
  - name: IEX Cloud
    traits:
    - api_key_required
    - historical_prices
    - premium_data
    fit_for:
    - Professional-grade data with better reliability
    not_fit_for:
    - Budget-constrained projects (paid service)
  default: Yahoo Finance (yfinance)
  _source: worker_resource
- id: slot-002
  name: risk_factor_data
  description: The academic standard for factor research; pandas-datareader provides reliable access with
    no authentication required
  used_in_stages: []
  options:
  - name: Kenneth French Data Library (pandas-datareader)
    traits:
    - free
    - no_auth_required
    - academic_source
    - standard_factors
    fit_for:
    - Academic research, factor investing, risk attribution analysis
    not_fit_for:
    - Custom proprietary factors (not available)
  - name: QuantConnect Factor Data
    traits:
    - api_key_required
    - proprietary_factors
    fit_for:
    - QuantConnect algorithm users seeking integrated solution
    not_fit_for:
    - Standalone use outside QuantConnect platform
  default: Kenneth French Data Library (via pandas-datareader)
  _source: worker_resource
- id: slot-003
  name: treasury_yield_data
  description: FRED provides official, comprehensive US Treasury data with no authentication, making it
    the ideal source for risk-free rate calculations
  used_in_stages: []
  options:
  - name: FRED (Federal Reserve Economic Data)
    traits:
    - free
    - no_auth_required
    - official_source
    - comprehensive
    fit_for:
    - Risk-free rate calculations, fixed income analysis
    not_fit_for:
    - Real-time yield curve data (FRED has daily lags)
  - name: US Treasury Direct
    traits:
    - official_source
    - no_api
    fit_for:
    - When pandas-datareader FRED access is unavailable
    not_fit_for:
    - Production use (fragile, rate-limited scraping)
  default: FRED (via pandas-datareader)
  _source: worker_resource
- id: slot-004
  name: numerical_acceleration
  description: Bottleneck provides 5-10x speedup for NaN-friendly operations; gracefully falls back to
    NumPy if unavailable
  used_in_stages: []
  options:
  - name: Bottleneck
    traits:
    - fast_nan_handling
    - c_extensions
    - optional
    fit_for:
    - Production use where performance matters; NaN-heavy data
    not_fit_for:
    - Environments where C extensions are not allowed
  - name: NumPy fallback
    traits:
    - pure_python_fallback
    - slower
    - always_available
    fit_for:
    - Environments where bottleneck cannot be installed
    not_fit_for:
