    uses threshold excess) → Multiple tail risk measures interdependent'
  rationale: 'VaR at 5% establishes a threshold used by CVaR to compute mean of losses below VaR. The
    GPD risk estimates at BD-085 use threshold excess (Peaks Over Threshold) with DEFAULT_THRESHOLD=0.2
    (20th percentile), creating a multi-level cascade: empirical VaR defines the 5% tail, CVaR averages
    that tail, and GPD fits a parametric distribution to exceedances above 20%. If the VaR cutoff changes,
    CVaR changes directly, but GPD estimates remain independent. This creates inconsistency: GPD VaR/ES
    estimates'
  evidence: BD-027 (stats.py:2042-2059), BD-066 (stats.py:2062-2088), BD-085 (stats.py:1700-1719 GPD VaR),
    BD-030 (stats.py:1647 DEFAULT_THRESHOLD=0.2)
  stage: global
  alternative_considered: Single tail risk methodology; rejected as different methods serve different
    use cases (regulatory vs internal risk)
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-093
  type: BA/M
  content: 'RISK CASCADE: BD-019 (252 annualization) → BD-074 (CAGR uses 252) → BD-076 (Calmar ratio uses
    annual return) → BD-007 (drawdown from max_drawdown) → Portfolio risk metrics chain'
  rationale: 'The 252-day annualization at BD-019 propagates through multiple calculations: annual_return
    at BD-074 uses CAGR with 252, which feeds into Calmar ratio at BD-076 (annual_return / abs(max_drawdown)).
    Meanwhile, max_drawdown at BD-007 uses fmax.accumulate to track running maximum, but drawdown itself
    is not annualized—it represents the full period. The cascade creates an inconsistency: Calmar ratio
    annualizes the numerator but uses raw drawdown as denominator. For a 3-year backtest with 30% max
    dr'
  evidence: BD-019 (periods.py:2), BD-074 (stats.py:354-393 CAGR), BD-076 (stats.py:490-536 Calmar), BD-007
    (stats.py:252-306 drawdown_series), BD-022 (drawdown starts at 100)
  stage: global
  alternative_considered: Annualize drawdown using annualized max drawdown; rejected as no standard convention
    exists and would change historical Calmar values
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-094
  type: B/DK
  content: 'RISK CASCADE: BD-046 (bottleneck optional) → BD-059 (ddof=1 sample std) → BD-001 (NaN-handling
    fallback) → Performance variance without accuracy change'
  rationale: 'When bottleneck is unavailable, nanmean/nanstd fall back to numpy (BD-046). The sample standard
    deviation with ddof=1 at BD-059 is critical for unbiased finite-sample estimation, but this calculation
    relies on the NaN-aware nanstd. Without bottleneck, the fallback is slower (60-70% performance degradation)
    but produces identical results because both paths use ddof=1. The cascade risk is operational: users
    without bottleneck experience 3-5x slower rolling window calculations in backtests, but thi'
  evidence: BD-046 (utils.py:38-71 bottleneck fallback), BD-059 (stats.py:478,653 ddof=1), BD-001 (bottleneck
    NaN handling), BD-055 (rolling window memory efficiency)
  stage: global
  alternative_considered: Always numpy; rejected as bottleneck provides significant speedup when available
    and fallback maintains correctness
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-095
  type: BA/M
  content: 'CONTRADICTION: BD-092 (risk_free=0 default) vs BD-038 (Fama-French data expects positive risk-free
    rates) → Asset pricing model assumption mismatch'
  rationale: 'The risk-free rate defaults to zero at BD-092, appropriate for crypto or near-zero environments.
    However, Fama-French factor data at BD-038 uses Research Data Factors that historically include a
    positive risk-free rate (typically 3-month T-bill). When computing CAPM alpha using FF data, the benchmark
    includes risk-free income, but the portfolio calculation subtracts zero. This creates a contradiction:
    alpha = portfolio_return - beta * benchmark_return (which includes rf), but excess return = por'
  evidence: BD-092 (stats.py:595 risk_free default), BD-038 (utils.py:255 get_fama_french), BD-041/062
    (beta calculation), BD-015 (optional pre-computed beta)
  stage: global
  alternative_considered: Default to FF risk-free series; rejected as it would break existing portfolios
    with explicit rf=0 assumption
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
  vague_rationale: true
- id: BD-096
  type: BA/DK
  content: 'INTERACTION: BD-099 (CAGR hardcoded 252) × BD-056 (alpha geometric annualization) × BD-074
    (annual return as CAGR) → Three annualization paths with same hardcoded assumption'
  rationale: 'Three separate code paths implement annualization using the hardcoded APPROX_BDAYS_PER_YEAR=252
    constant: CAGR at BD-099, geometric alpha at BD-056, and annual return at BD-074. Every three assume
    US equity markets. While this creates consistency within empyrical, it means any change to the 252
    constant would require updating each three locations (periods.py, stats.py:389, stats.py:1191-1198).
    The hidden interaction is that these are implemented as separate constants or direct references, not
    as a '
  evidence: BD-099 (periods.py:2 APPROX_BDAYS_PER_YEAR=252), BD-074 (stats.py:389 annual_return), BD-056
    (stats.py:1191-1198 alpha_aligned), BD-019 (ANNUALIZATION_FACTORS)
  stage: global
  alternative_considered: Central annualization function; rejected to maintain backward compatibility
    with existing function signatures
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-097
  type: B/RC
  content: 'RISK CASCADE: BD-052 (date alignment intersection) → BD-097 (attribution exposures × returns)
    → BD-033/034 (common + specific returns) → Total ≠ sum of parts at boundaries'
  rationale: 'Date alignment at BD-052 takes the intersection of returns, positions, and factors: [returns.index[0],
    returns.index[-1]]. At inception or termination, this intersection may be empty or partial for some
    assets. The attribution at BD-097 computes exposures × factor_returns, but if alignment truncated
    positions at the boundary, some holdings contribute zero to exposure. The decomposition at BD-033/034
    splits returns into common (factor-based) and specific (idiosyncratic). At boundary periods with '
  evidence: BD-052 (perf_attrib.py:87-90), BD-097 (perf_attrib.py:97-106), BD-033 (common returns), BD-034
    (specific returns), BD-035 (tilt/timing decomposition)
  stage: global
  alternative_considered: Union of dates with NaN for missing data; rejected as it introduces artificial
    data points that may distort attribution
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-098
  type: BA/DK
  content: 'RISK CASCADE: BD-090 (252 US default) → BD-019 (annualization factors) → BD-024 (Omega annualization)
    → Required return threshold annualization mismatch'
  rationale: 'Omega ratio at BD-024 converts required_return to period-specific rate via (1+r)^(1/n)-1.
    The formula assumes n=252 for daily data, but if a user passes weekly or monthly data, the function
    still uses 252 as the annualization factor (from BD-019/090). This creates a cascade: for weekly data,
    n=52 would be correct, but the code uses 252, under-annualizing the required return threshold by a
    factor of ~5. The threshold comparison in Omega (gains above threshold vs losses below) becomes miscalibrate'
  evidence: BD-090 (periods.py:14-19 DAILY=252), BD-019 (ANNUALIZATION_FACTORS), BD-024 (stats.py:543,582
    omega_ratio), BD-077 (omega_ratio threshold)
  stage: global
  alternative_considered: Auto-detect frequency from index and apply correct n; rejected due to ambiguity
    with business-day data that may have gaps
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
