- id: BD-109
  type: B/BA
  content: 'RISK CASCADE: [BD-073] FCF approximation × [BD-088] Hardcoded FCF conversion × [BD-052/068]
    DCF engine × [BD-072] Valuation synthesis → Error propagation to recommendations'
  rationale: 'FCF approximated as EBITDA*60% (BD-073, BD-088) feeds into DCF projection years AND terminal
    value (BD-068). The DCF result combines with EV/EBITDA and peer comparison in confidence-weighted
    synthesis (BD-072). Each layer potentially compounds the initial FCF approximation error: capital-intensive
    companies (actual FCF 30% of EBITDA) will be systematically undervalued by 50% in FCF estimates, which
    propagates through terminal value and synthesis to produce incorrect recommendations.'
  evidence: BD-073,BD-088,BD-052,BD-068,BD-072
  stage: global
  alternative_considered: Use industry-specific FCF conversion rates; flag companies where EBITDA*60%
    differs from reported FCF
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-110
  type: BA
  content: 'INTERACTION: [BD-066] EV/EBITDA bands (±1 SD) × [BD-018/096] Fixed 15% volatility × [BD-053]
    Sensitivity tornado charts → Volatility assumption double-counting'
  rationale: 'EV/EBITDA bands calculate mean ± 1 standard deviation (BD-066) while sensitivity analysis
    uses fixed 15% volatility (BD-018, BD-096) for confidence intervals. When volatility is unusually
    high or low, the bands may not align with the sensitivity ranges, creating conflicting signals: a
    stock may appear ''undervalued'' by band standards but ''high risk'' by sensitivity standards. No
    explicit documentation connects these decisions, potentially confusing users about actual valuation
    uncertainty.'
  evidence: BD-066,BD-018,BD-096,BD-053
  stage: global
  alternative_considered: Unify volatility assumption across valuation bands and sensitivity analysis;
    use actual historical volatility
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-111
  type: B/BA
  content: 'INTERACTION: [BD-040] 15% profit threshold × [BD-077] 3-day reversal strategy × [BD-076] ROC
    calculation → Profitability metric inconsistency'
  rationale: 'BD-040 sets 15% profit threshold for exits with position-based sizing, while BD-077 implements
    3-day reversal strategy with stop-loss at entry-2%. BD-076 calculates Return on Deployed Capital as
    net profit / total deployed capital. These are internally inconsistent: the 15% threshold is absolute
    percentage, but ROC uses absolute dollar profit. A $1 profit on $10 deployed (10% ROC) triggers the
    15% threshold only if the position value reached $11.50. This creates potential mismatch between stated
    profit targets and measured returns.'
  evidence: BD-040,BD-077,BD-076
  stage: global
  alternative_considered: Align exit threshold with ROC calculation; use consistent profit measurement
    across each metrics
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-GAP-001
  type: B/BA
  content: HTTP request timeout is hardcoded to 1 second, using signal-based interruption within a context
    manager for synchronous request handling
  rationale: Short timeout enforces fail-fast behavior for downstream SEC API calls, preventing resource
    exhaustion; breaks under high-latency network conditions or large document processing where 1s is
    insufficient for initial parsing
  evidence: section.py:72(__init__)
  stage: reliability
  alternative_considered: Adaptive timeout with exponential backoff for retries
  _evidence_issues:
  - 'NOT_FOUND: section.py'
- id: BD-GAP-002
  type: BA
  content: MultipartMixedResponse custom class wraps streaming responses with multipart/mixed MIME type
    to bundle multiple document parts in a single HTTP response
  rationale: SEC filings contain multiple sections (risk factors, MD&A, financial statements) that need
    to be returned together without multiple round-trips; breaks when clients cannot parse multipart/mixed
    responses (e.g., simple GET callers)
  evidence: section.py:231(MultipartMixedResponse)
  stage: api_design
  alternative_considered: Separate endpoints per section with separate HTTP calls
  _evidence_issues:
  - 'NOT_FOUND: section.py'
- id: BD-GAP-003
  type: B
  content: Mimetype validation rejects 'generic' types (e.g., application/octet-stream) and returns HTTP
    400 if not in UNSTRUCTURED_ALLOWED_MIMETYPES allowlist
  rationale: Prevents ingestion of ambiguous file types that could contain malicious content or be unprocessable
    by the document parser; breaks when legitimate files are mislabeled by clients with generic mimetypes
  evidence: section.py:195(get_validated_mimetype)
  stage: security
  alternative_considered: Content-sniffing fallback or stricter allowlist per filing type
  _evidence_issues:
  - 'NOT_FOUND: section.py'
- id: BD-GAP-004
  type: T
  content: HealthCheckFilter excludes requests to /healthcheck path from application logging, treating
    health checks as infrastructure noise rather than business events
  rationale: Prevents log pollution from Kubernetes liveness/readiness probes and load balancer health
    checks; breaks observability if healthcheck path is abused for actual debugging
  evidence: app.py:38(HealthCheckFilter.filter)
  stage: observability
  alternative_considered: Structured log tagging instead of complete exclusion
  _evidence_issues:
  - 'NOT_FOUND: app.py'
- id: BD-GAP-005
  type: BA
  content: API uses FastAPI Form defaults for each file upload parameters (output_format, output_schema,
    section) rather than JSON body, enabling HTML form compatibility
  rationale: Supports simple curl/browser-based uploads without JSON payload construction; breaks for
    clients expecting RESTful JSON API with request body
  evidence: section.py:308(pipeline_1)
  stage: api_design
  alternative_considered: 'Dual support: Form for compatibility, JSON body for programmatic clients'
  _evidence_issues:
  - 'NOT_FOUND: section.py'
