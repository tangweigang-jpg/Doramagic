- id: BD-101
  type: B/BA
  content: 'INTERACTION: [BD-073] FCF approximation (EBITDA*60%) × [BD-068] DCF model → Compounding estimation
    error cascade'
  rationale: The 60% FCF-to-EBITDA approximation error compounds through both the 5-year projection period
    and the terminal value calculation. If actual FCF margin differs by 10% from assumption (e.g., 50%
    vs 60%), each year's cash flow is underestimated by 17%, and this error grows through the discount
    factor. Combined with BD-068's terminal value sensitivity, this creates a double-amplification effect
    where estimation errors in FCF dominate valuation inaccuracy.
  evidence: BD-073,BD-068
  stage: global
  alternative_considered: Flag companies where EBITDA*60% differs significantly from reported FCF
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-102
  type: B/BA
  content: 'INTERACTION: [BD-074] Net debt 10% of EV × [BD-068] DCF equity value calculation → Hidden
    leverage assumption amplification'
  rationale: Equity Value = Enterprise Value - Net Debt. When actual net debt deviates from the 10% EV
    assumption, the equity value error equals the debt multiple of that deviation. For a company with
    EV of $10B and actual net debt of 30% ($3B), the assumption underestimates debt by $2B, overstating
    equity value by $2B. This amplifies the valuation error at the final price target stage where the
    discrepancy is most visible to users.
  evidence: BD-074,BD-068
  stage: global
  alternative_considered: Require actual balance sheet data for companies above certain leverage thresholds
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
