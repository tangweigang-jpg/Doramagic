  name: financial_data_provider
  description: FMP is default for comprehensive US equity research. Use Yahoo Finance for free/budget
    projects. Use Finnhub for news/sentiment focus. Combine multiple providers for redundancy.
  used_in_stages: []
  options:
  - name: Financial Modeling Prep (FMP)
    traits:
