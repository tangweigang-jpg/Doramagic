# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-074
name: FinRobot
sop_version: '3.6'
source:
  projects:
  - FinRobot
  commit_hash: 612a9819dadf3a3804e3da0ebf8d977176e4ac1b
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: AI-powered equity research automation with multi-agent LLM orchestration, quantitative backtesting,
    and financial analysis
  description: An open-source AI Agent platform for financial applications that unifies LLMs, reinforcement
    learning, and quantitative analytics to power investment research automation, algorithmic trading
    strategies, and risk assessment.
  prerequisites: Users need Python 3.8+, API keys for data sources (FMP, Yahoo Finance, SEC), and LLM
    API access (OpenAI or compatible). Understanding of equity valuation methodologies and basic financial
    analysis concepts.
  not_suitable_for: Real-time trading systems requiring sub-second latency, high-frequency trading strategies,
    cryptocurrency markets without adaptation, and non-English financial markets with limited data API
    support.
stages:
- id: data_collection
  name: Financial Data Collection
  order: 1
  responsibility: Aggregates market data, financial statements, SEC filings, and news from multiple external
    APIs into unified data structures for downstream analysis. Provides fallback chains and rate limiting
    for reliability.
  interface:
    inputs:
    - ticker symbols
    - date ranges
    - API keys
    outputs:
    - DataFrames with stock prices, financial statements, SEC filing sections, news articles
  required_methods:
  - name: YFinanceUtils.get_stock_price
    description: Fetches historical stock prices and company information using yfinance library
    evidence: finrobot/data_source/yfinance_utils.py:21(class YFinanceUtils)
  - name: FMPUtils.get_financial_metrics
    description: Retrieves financial metrics and SEC reports via FMP API with decorator-based API key
      initialization
    evidence: finrobot/data_source/fmp_utils.py:29(class FMPUtils)
  - name: SECUtils.extract_filing_section
    description: Extracts 10-K sections using sec-api with rate limiting compliance
    evidence: finrobot/data_source/sec_utils.py:32(class SECUtils)
  - name: SECExtractor.parse_document
    description: Parses SEC document sections from 10-K, 10-Q filings for financial analysis
    evidence: finrobot/data_source/filings_src/sec_filings.py:88(class SECExtractor)
  key_behaviors:
  - behavior: Decorator pattern for API key initialization
    description: Lazy initialization allows graceful fallback when API keys are missing; avoids crashes
      at import time and provides controlled degradation
    evidence: finrobot/data_source/fmp_utils.py:13(init_fmp_api)
  - behavior: Multi-source abstraction layer for market data
    description: Enables swapping data providers without changing downstream code; fallback chain for
      reliability when primary source fails
    evidence: finrobot/data_source/__init__.py:1(imports each utils)
  - behavior: Rate limiting on SEC API calls
    description: SEC enforces 10 requests/second limit; decorator-based rate limiting prevents IP bans
      and ensures compliance
    evidence: finrobot/data_source/filings_src/sec_filings.py:210(@sleep_and_retry @limits)
  replaceable_points:
  - name: data_source
    description: Primary data source implementation for market data and financial metrics
    options:
    - name: YFinanceUtils
      traits:
      - Free
      - Real-time prices
      - Limited financial statement depth
      fit_for:
      - Quick stock price lookups
      - Market data exploration
      - Budget-constrained projects
      not_fit_for:
      - Comprehensive SEC filing analysis
      - Production-grade financial reports
    - name: FMP API
      traits:
      - Paid tier
      - Comprehensive financials
      - Professional data quality
      fit_for:
      - Equity research automation
      - Institutional-grade analysis
      not_fit_for:
      - Free projects with limited budgets
    - name: FinnHubUtils
      traits:
      - News-focused
      - Real-time market data
      - Alternative data sources
      fit_for:
      - Market sentiment analysis
      - News-driven trading
      not_fit_for:
      - Deep financial statement analysis
    default: YFinanceUtils
  - name: filing_parser
    description: SEC filing section parser for extracting document sections
    options:
    - name: SECExtractor
      traits:
      - Direct SEC-API integration
      - Real-time filings
      fit_for:
      - Live filing monitoring
      - Regulatory deadline tracking
      not_fit_for:
      - Historical document analysis
    - name: SECDocument
      traits:
      - Local parsing
      - Pre-downloaded documents
      - Flexible extraction
      fit_for:
      - Batch processing
      - Offline analysis
      not_fit_for:
      - Real-time filing updates
    default: SECDocument
  design_decisions:
  - Decorator pattern for API key initialization enables lazy loading and graceful degradation when keys
    are absent; avoids import-time failures
  - Multi-source abstraction layer decouples data retrieval from analysis; enables fallback chain for
    reliability in production
  - Rate limiting on SEC API calls (10 req/sec) ensures regulatory compliance and prevents IP blocking
  acceptance_hints:
  - 'DataFrames contain expected columns: date, open, high, low, close, volume for prices'
  - Financial statements have consistent year column naming with 'A'/'E' suffixes
  - API calls return within timeout; None returned gracefully when key missing
  - Rate limiter prevents >10 requests/second to SEC API
- id: quantitative_analysis
  name: Quantitative Analysis & Backtesting
  order: 2
  responsibility: Runs backtesting simulations and calculates portfolio performance metrics using Backtrader
    framework. Supports dynamic strategy loading and custom analyzers for deployed capital tracking.
  interface:
    inputs:
    - ticker symbol
    - date range
    - strategy class name
    - initial cash
    outputs:
    - backtest results dict with Sharpe ratio, drawdown, returns, trade analysis
  required_methods:
  - name: BackTraderUtils.run
    description: Orchestrates Backtrader backtesting engine with pluggable strategies, sizers, and indicators
      loaded via string paths
    evidence: finrobot/functional/quantitative.py:38(class BackTraderUtils)
  - name: DeployedCapitalAnalyzer.analyze
    description: Custom Backtrader analyzer tracking return on deployed capital for position sizing evaluation
    evidence: finrobot/functional/quantitative.py:13(class DeployedCapitalAnalyzer)
  key_behaviors:
  - behavior: Strategy class loaded via string module:ClassName
    description: Allows custom strategies without code changes; dynamic class loading enables user-defined
      strategies loaded at runtime
    evidence: finrobot/functional/quantitative.py:88(module_path, class_name = strategy.split(':'))
  - behavior: Sizer and indicator loaded dynamically via string path
    description: Extensibility for position sizing and custom technical indicators; avoids hardcoded defaults
      requiring code modification
    evidence: finrobot/functional/quantitative.py:112(assert ':' in sizer)
  - behavior: Default cash = $10,000 encodes industry standard
    description: Industry standard starting capital for retail backtesting; reasonable baseline for strategy
      validation and comparison
    evidence: finrobot/functional/quantitative.py:75(cash=10000.0)
  replaceable_points:
  - name: strategy
    description: Trading strategy class for signal generation and execution logic
    options:
    - name: SMA_CrossOver
      traits:
      - Simple
      - Trend-following
      - Two SMA crossover
      fit_for:
      - Beginners
      - Educational backtesting
      - Baseline comparison
      not_fit_for:
      - Market conditions requiring complex signals
      - High-frequency strategies
    - name: custom:module:ClassName
      traits:
      - User-defined
      - Flexible
      - Dynamic loading
      fit_for:
      - Custom signal logic
      - Proprietary strategies
      - Advanced users
      not_fit_for:
      - Quick prototyping without Python knowledge
    default: SMA_CrossOver
  - name: sizer
    description: Position sizing method controlling capital allocation per trade
    options:
    - name: FixedSize
      traits:
      - Constant shares
      - Simple
      - Predictable risk
      fit_for:
      - Equal-weight portfolios
      - Risk parity comparisons
      not_fit_for:
      - Dollar-weighted strategies
      - Volatility-responsive sizing
    - name: custom:module:ClassName
      traits:
      - User-defined
      - Dynamic sizing
      - Advanced risk management
      fit_for:
      - Kelly criterion sizing
      - Volatility-based position sizing
      not_fit_for:
      - Simple backtesting needs
    default: FixedSize
  design_decisions:
  - Strategy class loaded via string module:ClassName enables user-defined strategies without core code
    changes
  - Sizer and indicator dynamically loaded via string path provides extensibility for position sizing
    and custom indicators
  - Default cash = $10,000 aligns with industry standard for retail backtesting and strategy validation
  acceptance_hints:
  - 'Backtest returns dictionary with keys: Sharpe ratio, max drawdown, total return, trade count'
  - Strategy string format 'module:ClassName' is validated before loading
  - DeployedCapitalAnalyzer correctly tracks capital deployed per trade
- id: agent_workflow
  name: Multi-Agent Workflow Orchestration
  order: 3
  responsibility: Coordinates multiple AI agents using AutoGen for complex financial analysis tasks with
    role-based responsibility distribution, nested chat patterns, and shadow validation agents.
  interface:
    inputs:
    - group config
    - LLM config
    - toolkits list
    outputs:
    - Agent conversation logs
    - synthesized analysis results
  required_methods:
  - name: FinRobot.chat
    description: Base agent wrapping AutoGen AssistantAgent with toolkit registration for financial tasks
    evidence: finrobot/agents/workflow.py:22(class FinRobot)
  - name: SingleAssistant.chat
    description: Single agent conversation with user proxy for 1:1 interactive analysis sessions
    evidence: finrobot/agents/workflow.py:125(class SingleAssistant)
  - name: MultiAssistantWithLeader.chat
    description: Hierarchical agent group with leader coordinating employees via nested chats and selective
      delegation
    evidence: finrobot/agents/workflow.py:397(class MultiAssistantWithLeader)
  - name: MultiAssistant.chat
    description: Group chat with custom speaker selection logic for collaborative analysis
    evidence: finrobot/agents/workflow.py:356(class MultiAssistant)
  key_behaviors:
  - behavior: TERMINATE message contract
    description: Every agent responses MUST end with 'TERMINATE' string; conversations hang indefinitely
      if omitted
    evidence: finrobot/agents/workflow.py:132(.endswith('TERMINATE'))
  - behavior: Abstract base classes for workflow variants
    description: Extensibility for new workflow patterns; enforces contract for chat/reset methods across
      each assistants
    evidence: finrobot/agents/workflow.py:116(@abstractmethod chat)
  - behavior: Toolkit registration via decorator pattern
    description: Decouples tool definitions from agent initialization; enables runtime tool composition
      and dynamic capability extension
    evidence: finrobot/toolkits.py:22(register_toolkits)
  - behavior: Nested chat trigger pattern for leader-employee coordination
    description: Allows selective delegation based on message content; leader only delegates to relevant
      employees using order_trigger
    evidence: finrobot/agents/workflow.py:454(register_nested_chats trigger=partial(order_trigger))
  - behavior: Cache disk enabled by default for LLM responses
    description: Reduces API costs and latency on repeated queries; configurable via use_cache flag
    evidence: finrobot/agents/workflow.py:153(Cache.disk())
  - behavior: Shadow agent pattern for validation
    description: Parallel validation agent catches errors without toolkit access; isolation improves reliability
      and error detection
    evidence: finrobot/agents/workflow.py:243(self.assistant_shadow = FinRobot)
  replaceable_points:
  - name: workflow_pattern
    description: Agent coordination pattern defining how multiple agents interact
    options:
    - name: SingleAssistant
      traits:
      - Simple
      - Single agent
      - Direct interaction
      fit_for:
      - Simple queries
      - Single-task automation
      - Learning purposes
      not_fit_for:
      - Complex multi-faceted analysis
      - Collaborative research
    - name: MultiAssistant
      traits:
      - Group chat
      - Custom speakers
      - Collaborative
      fit_for:
      - Multiple perspectives
      - Debate-style analysis
      - Diverse expertise
      not_fit_for:
      - Simple tasks
      - Linear workflows
    - name: MultiAssistantWithLeader
      traits:
      - Hierarchical
      - Delegation
      - Role-based
      fit_for:
      - Complex research pipelines
      - Specialized task decomposition
      - Enterprise analysis
      not_fit_for:
      - Simple single-agent tasks
      - Real-time requirements
    default: SingleAssistant
  - name: speaker_selection
    description: Group chat speaker selection mechanism for MultiAssistant
    options:
    - name: custom_speaker_selection_func
      traits:
      - Programmable
      - Flexible
      - Domain-specific logic
      fit_for:
      - Custom conversation flows
      - Priority-based delegation
      not_fit_for:
      - Simple round-robin needs
    - name: auto
      traits:
      - AutoGen default
      - Built-in selection
      fit_for:
      - Quick setup
      - Standard behavior
      not_fit_for:
      - Custom business logic requirements
    - name: round_robin
      traits:
      - Equal participation
      - Predictable
      fit_for:
      - Fair agent utilization
      - Testing scenarios
      not_fit_for:
      - Priority-based workflows
    default: custom_speaker_selection_func
  design_decisions:
  - TERMINATE message contract ensures clean agent conversation termination; each chats hang without it
  - Abstract base classes enforce contract for chat/reset methods; enables extensible workflow patterns
  - Toolkit registration via decorator decouples tool definitions from agent initialization
  - Nested chat trigger pattern enables selective delegation based on message content for efficiency
  - Cache disk enabled by default reduces API costs on repeated queries
  - Shadow agent pattern provides parallel validation without toolkit access for reliability
  acceptance_hints:
  - Every agent responses end with 'TERMINATE' string
  - Toolkits are registered and available to agents at runtime
  - Leader-employee nested chats trigger correctly based on message content
  - Cache disk reduces repeated LLM API calls for identical queries
- id: financial_analysis
  name: Financial Statement Analysis
  order: 4
  responsibility: Processes raw financial data into analytical metrics, calculates derived ratios, and
    generates comparative assessments with fallback chains for field name compatibility.
  interface:
    inputs:
    - 'DataFrames: income statement, balance sheet, cash flow, ratios'
    outputs:
    - 'Processed DataFrame with metrics: Revenue, EBITDA, margins, growth rates, peer comparisons'
  required_methods:
  - name: ReportAnalysisUtils.generate_analysis
    description: Generates analysis prompts combining financial data with SEC filing sections for LLM
      consumption
    evidence: finrobot/functional/analyzer.py:22(class ReportAnalysisUtils)
  - name: FinancialDataProcessor.extract_metrics
    description: Extracts and combines historical metrics from multiple API sources with unified schema
    evidence: finrobot_equity/core/src/modules/financial_data_processor.py:20(class FinancialDataProcessor)
  key_behaviors:
  - behavior: Mixed object dtype for metrics DataFrame
    description: Allows storing both numbers and formatted percentage strings in same column; simplifies
      display formatting for reports
    evidence: finrobot_equity/core/src/modules/financial_data_processor.py:145(df_combined = pd.DataFrame(final_data_dict).astype('object'))
  - behavior: 'Year suffix convention: ''A'' for actuals, ''E'' for estimates'
    description: Clear visual distinction between historical and forecast data; enables filtering by column
      patterns across pipeline
    evidence: finrobot_equity/core/src/modules/financial_data_processor.py:48(year_label = f"{year}A")
  - behavior: Fallback chain for field names in API responses
    description: Different API providers use different naming conventions; increases data source compatibility
      and reduces missing data
    evidence: finrobot_equity/core/src/modules/financial_data_processor.py:75(revenue = row.get('revenue')
      or row.get('totalRevenue'))
  replaceable_points:
  - name: metric_extractor
    description: Financial metric extraction logic source
    options:
    - name: API-based
      traits:
      - Real-time data
      - Automated extraction
      - Standardized format
      fit_for:
      - Live analysis
      - Production systems
      - Standardized companies
      not_fit_for:
      - Private companies
      - Historical PDFs without API access
    - name: PDF-based
      traits:
      - Manual filing processing
      - Historical data
      - Flexible extraction
      fit_for:
      - Historical analysis
      - Private company research
      - Non-standard formats
      not_fit_for:
      - Real-time requirements
      - Large-scale automation
    default: API-based
  design_decisions:
  - Mixed object dtype enables both numeric and formatted string storage in same DataFrame column
  - Year suffix convention 'A'/'E' provides clear distinction and enables pattern-based filtering
  - Fallback chain for field names increases API compatibility across different data providers
  acceptance_hints:
  - 'DataFrame columns follow year suffix convention: ''2023A'', ''2024E'''
  - Financial metrics (revenue, EBITDA, margins) are present with numeric values
  - Fallback field resolution produces values when primary field missing
  - Mixed dtype columns contain both numbers and formatted strings without errors
- id: valuation_engine
  name: Valuation Analysis
  order: 5
  responsibility: Computes fair value estimates using multiple methodologies and synthesizes a weighted
    target price with confidence-based method weighting.
  interface:
    inputs:
    - financial_data dict
    - peer_data dict
    outputs:
    - ValuationResult objects with target price, range, confidence scores
  required_methods:
  - name: ValuationEngine.calculate
    description: 'Multi-method valuation calculator: EV/EBITDA, peer comparison, DCF with confidence-weighted
      synthesis'
    evidence: finrobot_equity/core/src/modules/valuation_engine.py:30(class ValuationEngine)
  key_behaviors:
  - behavior: Confidence-weighted synthesis of multiple methods
    description: More reliable estimate by weighting higher-confidence methods; compensates for single
      method biases
    evidence: finrobot_equity/core/src/modules/valuation_engine.py:327(total_weight = sum(r.confidence))
  - behavior: Default net_debt assumption = EV * 10%
    description: Simplified capital structure assumption; reasonable for companies without detailed balance
      sheet data
    evidence: finrobot_equity/core/src/modules/valuation_engine.py:104(net_debt = ev * 0.1)
  - behavior: DCF terminal growth rate = 2.5% as long-term anchor
    description: Aligns with long-term GDP growth expectations; prevents unrealistic extrapolation beyond
      sustainable growth
    evidence: 'finrobot_equity/core/src/modules/valuation_engine.py:219(terminal_growth'': 0.025)'
  - behavior: FCF approximation = EBITDA * 60% when free_cash_flow unavailable
    description: Hardcoded FCF conversion when direct data missing; affects DCF reliability for non-standard
      companies
    evidence: finrobot_equity/core/src/modules/valuation_engine.py:231
  replaceable_points:
  - name: valuation_method
    description: Primary valuation approach or combination
    options:
    - name: EV/EBITDA
      traits:
      - Comparable analysis
      - Industry standard
      - Confidence 0.7
      fit_for:
      - Peer comparisons
      - Quick valuation
      - Sector analysis
      not_fit_for:
      - Companies with negative EBITDA
      - High-growth startups
    - name: DCF
      traits:
      - Intrinsic value
      - Cash flow focused
      - Confidence 0.5
      fit_for:
      - Long-term investment horizon
      - Asset-heavy businesses
      not_fit_for:
      - Early-stage companies
      - High uncertainty projections
    - name: Peer Comparison
      traits:
      - Relative valuation
      - Market-based
      - Confidence 0.6
      fit_for:
      - Comparable company analysis
      - IPO valuations
      not_fit_for:
      - Unique businesses
      - Limited peers
    - name: All (synthesized)
      traits:
      - Multi-method
      - Balanced
      - Confidence-weighted
      fit_for:
      - Comprehensive analysis
      - Research reports
      not_fit_for:
      - Quick estimates
      - Single-method preference
    default: All
  design_decisions:
  - Confidence-weighted synthesis provides more reliable estimates by weighting higher-confidence methods
    (DCF=0.5, EV/EBITDA=0.7, Peer=0.6)
  - Default net_debt = EV * 10% is simplified assumption for companies without detailed balance sheet
  - DCF terminal growth rate = 2.5% aligns with long-term GDP growth expectations
  - FCF approximation = EBITDA * 60% used when free_cash_flow unavailable
  acceptance_hints:
  - ValuationResult contains target_price, range, and confidence scores
  - Multiple methods produce different estimates that are synthesized
  - DCF uses terminal growth rate of 2.5% by default
  - Net debt assumption applied when balance sheet data unavailable
- id: sensitivity_analysis
  name: Sensitivity Analysis
  order: 6
  responsibility: Evaluates forecast outcomes under varying assumptions for revenue growth and margin
    scenarios with fixed confidence intervals based on volatility heuristics.
  interface:
    inputs:
    - base_forecast DataFrame
    - growth/margin ranges
    - step count
    outputs:
    - Sensitivity matrix DataFrame
    - confidence intervals
    - assumption summaries
  required_methods:
  - name: SensitivityAnalyzer.analyze
    description: Calculates revenue and margin sensitivity matrices with confidence intervals
    evidence: finrobot_equity/core/src/modules/sensitivity_analyzer.py:29(class SensitivityAnalyzer)
  key_behaviors:
  - behavior: Fixed std_ratio = 15% for confidence intervals
    description: Conservative assumption based on typical revenue volatility; simple heuristic avoids
      complex variance modeling
    evidence: finrobot_equity/core/src/modules/sensitivity_analyzer.py:240(std_ratio = 0.15)
  - behavior: Default revenue growth range ±5%, margin range ±2%
    description: Reasonable bounds for sensitivity testing; covers most plausible scenarios without extreme
      outliers
    evidence: 'finrobot_equity/core/src/modules/sensitivity_analyzer.py:311(growth_rate: ±5%)'
  replaceable_points:
  - name: sensitivity_dimension
    description: Variable being sensitized in the analysis
    options:
    - name: revenue_growth
      traits:
      - Single variable
      - Growth-focused
      - Clear impact
      fit_for:
      - Revenue-driven businesses
      - Growth stock analysis
      not_fit_for:
      - Margin-sensitive industries
      - Cost-focused analysis
    - name: margin
      traits:
      - Single variable
      - Profitability-focused
      fit_for:
      - Margin compression scenarios
      - Cost structure analysis
      not_fit_for:
      - High-growth companies
      - Revenue-uncertain situations
    - name: combined
      traits:
      - Multi-variable
      - Comprehensive
      - 2D matrix
      fit_for:
      - Full scenario analysis
      - Research reports
      not_fit_for:
      - Quick estimates
      - Single-variable focus
    default: combined
  design_decisions:
  - Fixed std_ratio = 15% for confidence intervals based on typical revenue volatility heuristic
  - Default ±5% revenue growth and ±2% margin ranges cover plausible scenarios without extremes
  acceptance_hints:
  - Sensitivity matrix DataFrame contains forecast values across parameter ranges
  - Confidence intervals reflect 15% std_ratio assumption
  - Output includes assumption summary with base case and scenarios
- id: catalyst_analysis
  name: Market Catalyst Analysis
  order: 7
  responsibility: Identifies and classifies events that may impact stock price, including earnings, product
    launches, and regulatory decisions using keyword-based classification.
  interface:
    inputs:
    - news articles list
    - financial calendar data
    outputs:
    - List of CatalystData with event_type, impact_level, probability, sentiment
  required_methods:
  - name: CatalystAnalyzer.analyze
    description: Keyword-based event classification and impact scoring for market catalysts
    evidence: finrobot_equity/core/src/modules/catalyst_analyzer.py:33(class CatalystAnalyzer)
  key_behaviors:
  - behavior: Keyword-based event classification with priority ordering
    description: Simple, interpretable rule-based approach; deterministic results without ML complexity
      or training data
    evidence: finrobot_equity/core/src/modules/catalyst_analyzer.py:37(CATALYST_KEYWORDS)
  - behavior: Analyst action phrase matching takes precedence
    description: Analyst upgrades/downgrades are high-signal events; priority ensures correct classification
      over generic keywords
    evidence: finrobot_equity/core/src/modules/catalyst_analyzer.py:125(for p in ANALYST_POSITIVE_PATTERNS)
  - behavior: Default probability by event_type
    description: Earnings at 95% probability (scheduled), acquisitions at 40% (uncertain); encodes domain
      knowledge about event likelihood
    evidence: finrobot_equity/core/src/modules/catalyst_analyzer.py:158(base_probability)
  replaceable_points:
  - name: classifier
    description: Event classification method for catalyst identification
    options:
    - name: keyword-based
      traits:
      - Rule-based
      - Deterministic
      - Interpretable
      - Fast
      fit_for:
      - Standard events
      - High-volume screening
      - Production systems
      not_fit_for:
      - Subtle events
      - Context-dependent news
      - Novel situations
    - name: LLM-based
      traits:
      - Context-aware
      - Nuanced
      - Adaptive
      fit_for:
      - Complex events
      - Context-dependent analysis
      - Unstructured news
      not_fit_for:
      - Real-time requirements
      - High-volume processing
      - Cost-sensitive applications
    default: keyword-based
  design_decisions:
  - Keyword-based event classification provides simple, interpretable, deterministic results without ML
    complexity
  - Analyst action phrase matching takes precedence for high-signal events like upgrades/downgrades
  - Default probability by event_type encodes domain knowledge about event certainty
  acceptance_hints:
  - CatalystData list contains event_type, impact_level, probability, sentiment for each identified catalyst
  - Earnings events classified with ~95% probability
  - Analyst upgrades/downgrades correctly identified with priority over generic keywords
- id: report_generation
  name: Equity Research Report Generation
  order: 8
  responsibility: Assembles complete equity research reports with text sections, charts, tables, and PDF/HTML
    output using 8 specialized text generation agents.
  interface:
    inputs:
    - ticker, company_name, financial_data dict
    - options flags
    outputs:
    - HTML/PDF equity research report file
  required_methods:
  - name: EnhancedTextGenerator.generate
    description: LLM-based text section generation with fallback templates when API unavailable
    evidence: finrobot_equity/core/src/modules/enhanced_text_generator.py:1(class EnhancedTextGenerator)
  - name: EnhancedChartGenerator.generate_revenue_chart
    description: Financial chart generation returning base64-encoded images for HTML embedding
    evidence: finrobot_equity/core/src/modules/enhanced_chart_generator.py:1(class EnhancedChartGenerator)
  - name: EquityResearchAgentManager.generate_all_sections
    description: Orchestrates 8 specialized text generation agents for different report sections
    evidence: finrobot_equity/core/src/modules/equity_agents/agent_manager.py:17(class EquityResearchAgentManager)
  - name: HTMLRenderer.render
    description: Renders report data into HTML template for web delivery
    evidence: finrobot_equity/core/src/modules/html_renderer.py:1(class HTMLRenderer)
  key_behaviors:
  - behavior: Fallback text templates when LLM unavailable
    description: Graceful degradation when API fails; ensures reports can still be generated with template-based
      content
    evidence: finrobot_equity/core/src/modules/text_generator_agents.py:13(_get_fallback_text)
  - behavior: 8 specialized agent types for different report sections
    description: Separation of concerns per section; specialized prompts improve output quality and maintainability
    evidence: finrobot_equity/core/src/modules/equity_agents/agent_manager.py:21(self.agents)
  - behavior: Chart generation returns base64-encoded images
    description: Embeddable in HTML reports; avoids file I/O complexity in web delivery and enables streaming
