    not_fit_for:
    - International markets (limited), high-volume real-time
  - name: Yahoo Finance (yfinance)
    traits:
    - free
    - global-coverage
    - delayed-quotes
    - no-api-key
    fit_for:
    - Budget-constrained projects, quick prototyping, global stocks
    not_fit_for:
    - Real-time trading, professional research requiring accuracy guarantees
  - name: Finnhub
    traits:
    - company-data
    - news
    - sentiment
    - real-time
    fit_for:
