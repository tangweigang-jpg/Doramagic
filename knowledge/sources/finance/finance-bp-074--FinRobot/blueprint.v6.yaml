business_decisions:
- id: BD-001
  type: BA
  content: Lazy API key initialization via decorator pattern with graceful fallback
  rationale: Lazy initialization allows graceful fallback when API keys missing; avoids crashes at import
    time. This prevents hard failures during deployment when keys may not be configured, enabling staged
    configuration of data sources.
  evidence: finrobot/data_source/fmp_utils.py:13(init_fmp_api)
  stage: data_collection
  alternative_considered: Fail-fast at import would require each keys present at startup; rejected to
    support partial deployment
- id: BD-002
  type: BA
  content: Multi-source abstraction layer with provider-swappable architecture
  rationale: Enables swapping data providers without changing downstream code; fallback chain ensures
    reliability. Supports provider failover when primary source rate-limits or becomes unavailable, critical
    for production trading systems.
  evidence: finrobot/data_source/__init__.py:1(module)
  stage: data_collection
  alternative_considered: Direct provider coupling would require code changes when providers change pricing
    or terms
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrobot/data_source/__init__.py'
- id: BD-003
  type: M
  content: Rate limiting on SEC EDGAR API calls (10 req/sec compliance)
  rationale: SEC enforces 10 requests/second limit; prevents IP bans and ensures regulatory compliance.
    Violations could result in temporary or permanent API access revocation, blocking critical filings
    retrieval.
  evidence: finrobot/data_source/filings_src/sec_filings.py:210(@sleep_and_retry @limits)
  stage: data_collection
  alternative_considered: Bulk download options exist but require additional infrastructure
  _evidence_issues:
  - 'INVALID_IDENTIFIER: @sleep_and_retry @limits in finrobot/data_source/filings_src/sec_filings.py'
- id: BD-004
  type: BA
  content: Dynamic strategy class loading via 'module:ClassName' string format
  rationale: 'Allows custom strategies without code changes; dynamic class loading enables user-defined
    strategies. Boundary: User must provide valid Python path accessible in runtime environment.'
  evidence: finrobot/functional/quantitative.py:88(module)
  stage: quantitative_analysis
  alternative_considered: Plugin registry approach would require explicit registration step
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrobot/functional/quantitative.py'
- id: BD-005
  type: BA
  content: Dynamic position sizer and indicator loading via string path
  rationale: Extensibility for position sizing and custom technical indicators; avoids hardcoded defaults.
    Supports community-contributed indicators without core codebase modification.
  evidence: finrobot/functional/quantitative.py:112(module)
  stage: quantitative_analysis
  alternative_considered: Static mapping would require release updates for new indicators
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrobot/functional/quantitative.py'
- id: BD-006
  type: M/BA
  content: Default starting capital of $10,000 for retail backtesting
  rationale: Industry standard starting capital for retail backtesting; reasonable for strategy validation.
    Aligns with typical retail investor constraints; enables meaningful percentage return calculations.
  evidence: finrobot/functional/quantitative.py:75(module)
  stage: quantitative_analysis
  alternative_considered: Unlimited paper trading mode would misrepresent real-world constraints
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrobot/functional/quantitative.py'
- id: BD-007
  type: BA
  content: Abstract base classes enforce workflow contract across agent variants
  rationale: 'Extensibility for new workflow patterns; enforces contract for chat/reset methods across
    each assistants. Boundary: New workflow implementations must implement each abstract methods.'
  evidence: finrobot/agents/workflow.py:116(module)
  stage: agent_workflow
  alternative_considered: Duck typing would defer errors to runtime
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrobot/agents/workflow.py'
- id: BD-008
  type: BA
  content: Toolkit registration via decorator enables runtime tool composition
  rationale: Decouples tool definitions from agent initialization; enables runtime tool composition. Agents
    can be configured with different tool sets without class inheritance.
  evidence: finrobot/toolkits.py:22(module)
  stage: agent_workflow
  alternative_considered: Static registration in __init__ would require restart for changes
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrobot/toolkits.py'
- id: BD-009
  type: M
  content: Nested chat trigger pattern for selective delegation in multi-agent hierarchy
  rationale: Allows selective delegation based on message content; leader only delegates to relevant employees.
    Reduces unnecessary agent invocations; improves response latency for targeted queries.
  evidence: finrobot/agents/workflow.py:454(module)
  stage: agent_workflow
  alternative_considered: Broadcast to each agents would increase latency and cost
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrobot/agents/workflow.py'
- id: BD-010
  type: M/BA
  content: Disk cache enabled by default for LLM responses to reduce costs
  rationale: 'Reduces API costs and latency on repeated queries; configurable via use_cache flag. Boundary:
    Cache invalidation strategy needed for stale data scenarios.'
  evidence: finrobot/agents/workflow.py:153(module)
  stage: agent_workflow
  alternative_considered: No caching would increase costs prohibitively for research workflows
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrobot/agents/workflow.py'
- id: BD-011
  type: BA
  content: Shadow agent pattern provides isolated parallel validation
  rationale: Parallel validation agent catches errors without toolkit access; isolation improves reliability.
    Shadow agent operates independently to verify primary agent outputs.
  evidence: finrobot/agents/workflow.py:243(module)
  stage: agent_workflow
  alternative_considered: Single-agent validation would conflate validation and generation concerns
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrobot/agents/workflow.py'
- id: BD-012
  type: BA
  content: Mixed object dtype allows heterogeneous data in metrics DataFrame
  rationale: 'Allows storing both numbers and formatted percentage strings in same column; simplifies
    display formatting. Boundary: Downstream numeric operations require dtype conversion.'
