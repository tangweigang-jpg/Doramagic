- id: BD-015
  type: BA
  content: Confidence-weighted valuation synthesis across multiple methods
  rationale: 'More reliable estimate by weighting higher-confidence methods; compensates for single method
    biases. Boundary: Weights sum to 1.0; methods with zero confidence are excluded.'
