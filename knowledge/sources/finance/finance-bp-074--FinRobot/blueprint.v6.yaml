  - 'FN_NOT_FOUND: module in finrobot_equity/core/src/modules/financial_data_processor.py'
- id: BD-014
  type: BA/DK
  content: Fallback chain for API field names ensures cross-provider compatibility
  rationale: Different API providers use different naming conventions; increases data source compatibility.
    Prevents missing-field errors when switching providers.
  evidence: finrobot_equity/core/src/modules/financial_data_processor.py:75(module)
