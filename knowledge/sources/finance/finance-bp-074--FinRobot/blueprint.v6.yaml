  type: BA/M
  content: 'INTERACTION: [BD-017] DCF terminal growth rate (2.5%) × [BD-068] Gordon Growth terminal value
    model → Amplified valuation sensitivity'
  rationale: The 2.5% terminal growth rate is used directly in Gordon Growth formula (TV = FCF_n * (1+g)
    / (WACC-g)). With WACC ~10%, a 0.5% change in growth rate changes terminal value by ~12.5%, materially
    affecting final price targets. This interaction amplifies the impact of the growth rate assumption
    beyond what either decision implies alone.
  evidence: BD-017,BD-068
  stage: global
  alternative_considered: Documentation should explicitly warn about terminal value dominance in DCF sensitivity
