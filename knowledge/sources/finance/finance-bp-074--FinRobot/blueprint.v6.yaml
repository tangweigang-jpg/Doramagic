  - name: Ollama (Local)
    traits:
    - local
    - privacy
    - offline
    - open-source-models
    fit_for:
    - Privacy-sensitive applications, development/testing, cost savings
    not_fit_for:
    - Production requiring state-of-the-art quality, limited hardware
  - name: SiliconFlow/Proxy Services
    traits:
    - proxy
    - cost-effective
    - multi-provider
    fit_for:
    - Cost optimization, accessing multiple LLM providers
    not_fit_for:
    - High-security requirements, critical production
  default: OpenAI GPT-4
  _source: worker_resource
