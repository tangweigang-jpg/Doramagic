  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrobot_equity/core/src/modules/financial_data_processor.py'
- id: BD-013
  type: M/BA
  content: Year suffix convention distinguishes actuals ('A') from estimates ('E')
  rationale: Clear visual distinction between historical and forecast data; enables filtering by column
    patterns. Industry-standard convention adopted for analyst familiarity.
