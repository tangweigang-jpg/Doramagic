replaceable_slots:
- id: slot-001
  name: data_source
  description: 'Choose based on: 1) Whether real trading is needed, 2) Broker support, 3) OS platform,
    4) Technical expertise'
  used_in_stages: []
  options:
  - name: XueQiu Web Trader
    traits:
    - cookie_auth
    - portfolio_management
    - no_broker_required
    fit_for:
    - Users without broker accounts who want to track virtual portfolios
    not_fit_for:
    - Real-money trading, users who need live broker execution
  - name: MiniQMT Direct Trading
    traits:
    - direct_broker_api
    - real_money
    - low_latency
    - requires_broker
    fit_for:
    - Users with MiniQMT-supported brokers who need real trading
    not_fit_for:
    - Non-MiniQMT brokers, simulated trading only
  - name: Broker GUI Automation
    traits:
    - gui_simulation
    - real_money
    - windows_only
    - broker_specific
    fit_for:
    - Users with specific supported brokers who want real trading
    not_fit_for:
    - Linux/Mac users, unsupported brokers, headless servers
  - name: Remote Client Server
    traits:
    - remote_control
    - api_access
    - requires_server_running
    fit_for:
    - Deploying trading bot on Windows server with remote access
    not_fit_for:
    - Direct local access, embedded scenarios
  default: XueQiu Web Trader
  _source: worker_resource
- id: slot-002
  name: simulated_trading_platform
  description: Choose based on which platform hosts your simulated trading strategies
  used_in_stages: []
  options:
  - name: JoinQuant Follower
    traits:
    - simulated_trading
    - web_api
    - free_account
    fit_for:
    - JoinQuant users who want to mirror strategies to real broker
    not_fit_for:
    - Non-JoinQuant users, users wanting direct API trading
  - name: RiceQuant Follower
    traits:
    - simulated_trading
    - web_api
    - requires_rqopen
    fit_for:
    - RiceQuant users who want to mirror strategies to real broker
    not_fit_for:
    - Non-RiceQuant users, users wanting direct API trading
  - name: XueQiu Follower
    traits:
    - simulated_trading
    - cookie_auth
    - portfolio_weight_based
    fit_for:
    - XueQiu users who want to mirror portfolio weights to real broker
    not_fit_for:
    - Non-XueQiu users, time-based strategy users
  default: JoinQuant Follower
  _source: worker_resource
- id: slot-003
  name: captcha_recognition
  description: Choose based on automation requirements, network availability, and accuracy needs
  used_in_stages: []
  options:
  - name: External API Service
    traits:
    - cloud_based
    - api_required
    - network_dependency
    fit_for:
    - Quick setup, development environments
    not_fit_for:
    - Production with reliability requirements, air-gapped environments
  - name: Tesseract OCR Local
    traits:
    - local_processing
    - no_network
    - accuracy_issues
    fit_for:
    - Offline environments, users who want full control
    not_fit_for:
    - Users needing high accuracy, non-English captchas
  - name: Manual Input
    traits:
    - human_input
    - high_accuracy
    - not_automatable
    fit_for:
    - Any environment, highest reliability
    not_fit_for:
    - Fully automated trading systems
  default: External API Service
  _source: worker_resource
- id: slot-004
  name: broker_client
  description: Choose based on your actual broker. Check if your broker offers MiniQMT for API access,
    otherwise use GUI automation.
  used_in_stages: []
  options:
  - name: YinHe (银河证券)
    traits:
    - windows_gui
    - binarystar
    - xls_grid
    fit_for:
    - China Galaxy Securities customers
    not_fit_for:
    - Other brokers, non-Windows platforms
  - name: HuaTai (华泰证券)
    traits:
    - windows_gui
    - xiadan
    - xls_grid
    - comm_password_required
    fit_for:
    - HuaTai Securities customers
    not_fit_for:
    - Other brokers, non-Windows platforms
  - name: GuangFa (广发证券)
    traits:
    - windows_gui
    - xiadan
    - captcha_required
    fit_for:
    - GuangFa Securities customers
    not_fit_for:
    - Other brokers, non-Windows platforms
  - name: GuoJin (国金证券)
    traits:
    - windows_gui
    - xiadan
    - captcha_required
    fit_for:
    - GuoJin Securities customers
    not_fit_for:
    - Other brokers, non-Windows platforms
  - name: HaiTong (海通证券)
    traits:
    - windows_gui
    - xiadan
    - modified_field_names
    fit_for:
    - HaiTong Securities customers
    not_fit_for:
    - Other brokers, non-Windows platforms
  - name: WuKuang (五矿证券)
    traits:
    - windows_gui
    - xiadan
    - inherits_hutai
    fit_for:
    - WuKuang Securities customers
    not_fit_for:
    - Other brokers, non-Windows platforms
  - name: Universal THS (通用同花顺)
    traits:
    - windows_gui
    - xiadan
    - universal_config
    fit_for:
    - Any broker using TongHuaShun trading software
    not_fit_for:
    - Brokers not using THS, non-Windows platforms
  - name: MiniQMT
    traits:
    - direct_api
    - no_gui
    - cross_compatible
    fit_for:
    - Users whose broker supports MiniQMT/XTPython
    not_fit_for:
    - Brokers without MiniQMT support
  default: None (user must select based on their broker)
  _source: worker_resource
