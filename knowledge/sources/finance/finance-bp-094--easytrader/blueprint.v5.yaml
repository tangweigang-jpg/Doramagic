# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-094
name: easytrader
sop_version: '3.6'
source:
  projects:
  - easytrader
  commit_hash: def5a8edc5ebd7d49bf92a9f39e9e30c9bf47101
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: automated stock trading with multi-broker support and trade mirroring
  description: Python library for automated stock trading via Chinese brokers (同花顺 clients, MiniQMT, XueQiu),
    supporting both direct order execution and mirroring simulated trades from JoinQuant/RiceQuant platforms
  prerequisites: Understanding of Chinese A-share market rules (100-share lot sizes, T+1 settlement),
    basic Python programming, Windows environment for GUI-based brokers (pywinauto), optional tesseract
    for captcha recognition
  not_suitable_for: Non-Chinese markets, high-frequency trading requiring sub-second execution, production
    environments without proper error handling for broker disconnections
stages:
- id: authentication
  name: Authentication & Connection
  order: 1
  responsibility: 'Establish authenticated sessions with trading systems using broker-specific mechanisms.
    WHY: Different brokers require different auth implementations (Windows GUI automation, web cookies,
    API tokens) which necessitates abstraction to provide a unified interface'
  interface:
    inputs:
    - credentials (user/password/config_path)
    - broker identifier
    - client executable path (for auto-login)
    outputs:
    - authenticated trader session object with UI handles or API connections
  required_methods:
  - name: BaseLoginClientTrader.prepare
    description: Authenticates user via config file or direct parameters, initializing the trader session
    evidence: easytrader/clienttrader.py:586(prepare)
  - name: BaseLoginClientTrader.connect
    description: Connects to an already-running broker client without auto-login
    evidence: easytrader/clienttrader.py:580(BaseLoginClientTrader)
  - name: WebTrader.check_login
    description: Verifies session validity for web-based traders
    evidence: easytrader/webtrader.py:86-109(send_heartbeat, check_login)
  - name: MiniqmtTrader.connect
    description: Connects to MiniQMT terminal via XtQuant SDK callbacks
    evidence: easytrader/miniqmt/miniqmt_trader.py:199(MiniqmtTrader)
  key_behaviors:
  - behavior: Heartbeat thread for web sessions
    description: Background thread sends heartbeat every 30 seconds to maintain token validity for web-based
      traders like XueQiu
    evidence: easytrader/webtrader.py:85(send_heartbeat)
  - behavior: Config file credential storage
    description: Credentials stored in JSON config files rather than command line arguments for security,
      with optional programmatic parameter passing
    evidence: easytrader/clienttrader.py:586(prepare)
  - behavior: Callback-based async handling for MiniQMT
    description: MiniQMT uses XtQuantTraderCallback pattern for receiving order/trade events asynchronously
    evidence: easytrader/miniqmt/miniqmt_trader.py:119-196(DefaultXtQuantTraderCallback)
  replaceable_points:
  - name: login_implementation
    description: Each broker implements its own login automation method
    options:
    - name: YHClientTrader
      traits:
      - Xls grid strategy
      - specific balance grid control
      fit_for:
      - 银河证券 clients with clipboard restrictions
      not_fit_for:
      - Other broker clients
    - name: HTClientTrader
      traits:
      - Inherits Xls grid
      - 核新交易 system
      fit_for:
      - 海通/华泰 clients
      not_fit_for:
      - 银河 or 国金 clients
    - name: MinIqmtTrader
      traits:
      - Official API
      - callback-based async
      fit_for:
      - Brokers with QMT support
      - Low-latency requirements
      not_fit_for:
      - Brokers without QMT
    default: ClientTrader
  design_decisions:
  - 'Separate BaseLoginClientTrader for auto-login vs connect-only (evidence: easytrader/clienttrader.py:580(BaseLoginClientTrader))
    — Allows reuse of connect() for already-logged-in clients while supporting automated login'
  - 'Heartbeat thread for web sessions to maintain token validity (evidence: easytrader/webtrader.py:85(send_heartbeat))
    — Web sessions expire without keepalive; background thread every 30s prevents logout'
  - 'Config file or direct params for login (evidence: easytrader/clienttrader.py:586(prepare)) — Config
    file keeps credentials off command line; params enable programmatic use'
  - 'Callback pattern for MiniQMT async events (evidence: easytrader/miniqmt/miniqmt_trader.py:119-196(DefaultXtQuantTraderCallback))
    — Official QMT SDK uses callbacks; wrapper must register DefaultXtQuantTraderCallback to receive order
    fills/cancels'
  acceptance_hints:
  - Login succeeds without ElementNotFoundError
  - Web session maintains valid token (check_login returns True)
  - MiniQMT callback receives order confirmations
- id: account_query
  name: Account Query
  order: 2
  responsibility: 'Retrieve account state including balance, positions, and entrusts. WHY: Unified interface
    over heterogeneous trading system responses requires strategy pattern for data extraction'
  interface:
    inputs:
    - trader session
    outputs:
    - balance dict
    - position list (DataFrame)
    - entrusts list (DataFrame)
  required_methods:
  - name: ClientTrader.balance
    description: Returns current account balance including available and frozen funds
    evidence: easytrader/clienttrader.py:134(_get_balance_from_statics)
  - name: ClientTrader.position
    description: Returns current holdings with security codes, quantities, costs
    evidence: easytrader/clienttrader.py:62(position property)
  - name: ClientTrader.entrust
    description: Returns pending orders (entrusts) in the trading system
    evidence: easytrader/clienttrader.py:62(entrust property)
  - name: XueQiuTrader.balance
    description: Web-based balance query via XueQiu API
    evidence: easytrader/xqtrader.py:16(XueQiuTrader)
  key_behaviors:
  - behavior: Grid Strategy Pattern for data extraction
    description: Different brokers require different grid extraction methods (Copy/clipboard, WMCopy/WM_COMMAND,
      Xls/save-as-file); strategy allows per-broker selection
    evidence: easytrader/clienttrader.py:65(grid_strategy)
  - behavior: Balance from Static controls, not grid
    description: Static controls show pre-formatted balance data separately from the grid; only positions
      and entrusts come from grid data
    evidence: easytrader/clienttrader.py:134(_get_balance_from_statics)
  - behavior: Broker-specific GRID_DTYPE mappings
    description: Chinese column names and numeric formats vary by broker; dtype mapping ensures correct
      CSV parsing for grid data
    evidence: easytrader/config/client.py:61(GRID_DTYPE)
  - behavior: Refresh Strategy Pattern
    description: UI data must be refreshed before reading; default uses F5 shortcut (Switch), but configurable
      to toolbar button click
    evidence: easytrader/clienttrader.py:67(refresh_strategy=Switch)
  replaceable_points:
  - name: refresh_strategy
    description: How to refresh UI data in client traders before querying
    options:
    - name: Switch (F5)
      traits:
      - Keyboard shortcut
      - Default
      - Fast
      fit_for:
      - Most broker clients
      not_fit_for:
      - Clients with disabled F5
    - name: Toolbar (button click)
      traits:
      - Mouse click
      - More reliable
      fit_for:
      - Clients with custom keyboard bindings
      not_fit_for:
      - Clients without visible toolbar
    default: Switch
  - name: grid_strategy
    description: How to extract grid data from broker UI
    options:
    - name: Copy (clipboard)
      traits:
      - Default
      - Fast
      - Requires clipboard
      fit_for:
      - Standard clients
      not_fit_for:
      - YHClientTrader (clipboard disabled)
    - name: WMCopy (WM_COMMAND)
      traits:
      - Low-level message
      - No clipboard
      fit_for:
      - Clients with clipboard restrictions
      not_fit_for:
      - Standard clients
    - name: Xls (save-as file)
      traits:
      - File-based
      - Slow but reliable
      fit_for:
      - 银河 clients
      - Clipboard-disabled environments
      not_fit_for:
      - Standard clients (overhead)
    default: Copy
  design_decisions:
  - 'Grid data via strategy pattern (Copy/WMCopy/Xls) (evidence: easytrader/clienttrader.py:65(grid_strategy))
    — Different brokers require different grid extraction methods; strategy allows per-broker selection'
  - 'Balance from Static controls, not grid (evidence: easytrader/clienttrader.py:134(_get_balance_from_statics))
    — Static controls show pre-formatted balance; grid only for positions/entrusts'
  - 'GRID_DTYPE per broker for proper CSV parsing (evidence: easytrader/config/client.py:61(GRID_DTYPE))
    — Chinese column names and numeric formats vary by broker; dtype mapping ensures correct parsing'
  - 'Security code uses last 6 digits internally (evidence: easytrader/clienttrader.py:450(_set_trade_params))
    — Accepts sh/sz prefixes but strips to 6 digits for internal processing consistency'
  acceptance_hints:
  - balance() returns dict with available, frozen, asset keys
  - position() returns DataFrame with security, amount columns
  - entrust() returns DataFrame with status column
  - No ElementNotFoundError during grid reads
- id: order_execution
  name: Order Execution
  order: 3
  responsibility: 'Submit buy/sell/market orders and handle confirmations with popup dialogs. WHY: Trading
    requires precise UI interaction or API calls with confirmation dialog handling to ensure order integrity'
  interface:
    inputs:
    - security code (6 digits)
    - price (float)
    - amount (multiple of 100)
    - order type (limit/market)
    outputs:
    - entrust_no (string) or error dict with TradeError
  required_methods:
  - name: ClientTrader.buy
    description: Submit a buy order for specified security at given price and amount
    evidence: easytrader/clienttrader.py:414(buy)
  - name: ClientTrader.sell
    description: Submit a sell order for specified security at given price and amount
    evidence: easytrader/clienttrader.py:414(sell)
  - name: TradePopDialogHandler.handle
    description: Process order confirmation/error dialogs, extracting entrust_no or raising TradeError
    evidence: easytrader/pop_dialog_handler.py:60(TradePopDialogHandler)
  - name: XueQiuTrader.rebalance
    description: Weight-based portfolio rebalancing for XueQiu portfolios
    evidence: easytrader/xqtrader.py:404(rebalance)
  key_behaviors:
  - behavior: Popup dialog handler pattern
    description: Each order may trigger confirmation/error dialogs; TradePopDialogHandler extracts entrust_no
      from success dialog or raises TradeError on rejection
    evidence: easytrader/clienttrader.py:565(_handle_pop_dialogs)
  - behavior: Market order type selection via ComboBox iteration
    description: Different brokers have different market order type names in dropdown; regex matching
      allows flexible selection
    evidence: easytrader/clienttrader.py:288(_set_market_trade_type)
  - behavior: Amount rounded to nearest 100 (lot size)
    description: A-share trading requires 100-share lots; rounding enforces this requirement to prevent
      order rejection
    evidence: easytrader/xq_follower.py:186(project_transactions)
  replaceable_points:
  - name: entrust_prop
    description: Order type parameter for execution
    options:
    - name: limit
      traits:
      - Specified price
      - Default
      - Most common
      fit_for:
      - Normal trading
      - Controlled entry/exit
      not_fit_for:
      - Fast-moving markets requiring immediate fill
    - name: market
      traits:
      - Best available price
      - May have slippage
      fit_for:
      - Urgent fills
      - Illiquid securities
      not_fit_for:
      - Volatile markets
      - Large orders
    default: limit
  - name: adjust_sell
    description: Whether to adjust sell amount to available position
    options:
    - name: 'true'
      traits:
      - Auto-adjust
      - Safe
      fit_for:
      - Following strategies with position changes
      not_fit_for:
      - Manual precise control
    - name: 'false'
      traits:
      - Exact amount
      - Default
      fit_for:
      - Explicit control
      not_fit_for:
      - Automated following
    default: 'false'
  design_decisions:
  - 'Popup dialog handler pattern (evidence: easytrader/clienttrader.py:565(_handle_pop_dialogs)) — Each
    order may trigger confirmation/error dialogs; handler extracts entrust_no or raises TradeError'
  - 'Slippage adjustment: buy × (1+slip), sell × (1-slip) (evidence: easytrader/follower.py:115(_calculate_price_by_slippage))
    — Asymmetric slippage: buys get higher price (safer), sells get lower price (safer)'
  - 'Amount rounded to nearest 100 (lot size) (evidence: easytrader/xq_follower.py:186(project_transactions))
    — A-share trading requires 100-share lots; round(-2) enforces this'
  - 'Market order type selection via ComboBox iteration (evidence: easytrader/clienttrader.py:288(_set_market_trade_type))
    — Different brokers have different market order types; regex matching allows flexible selection'
  acceptance_hints:
  - buy/sell returns valid entrust_no string
  - TradeError raised with meaningful message on rejection
  - Amount is always multiple of 100
  - Popup dialogs properly handled (no hanging dialogs)
- id: trade_following
  name: Trade Following
  order: 4
  responsibility: 'Mirror simulated trades from external platforms (JoinQuant, RiceQuant, XueQiu) to real
    accounts. WHY: Enables portfolio replication with slippage control, command deduplication, and T+0
    fund safety through sell-first ordering'
  interface:
    inputs:
    - users (list of trader sessions)
    - strategies (platform-specific URLs/IDs)
    - slippage (float)
    - track_interval (seconds)
    outputs:
    - trade queue with buy/sell commands executed against real accounts
  required_methods:
  - name: BaseFollower.follow
    description: Start following a simulated strategy, polling for new signals and executing trades
    evidence: easytrader/follower.py:18(BaseFollower)
  - name: JoinQuantFollower.login
    description: Authenticate to JoinQuant platform
    evidence: easytrader/joinquant_follower.py:10(JoinQuantFollower)
  - name: RiceQuantFollower.login
    description: Authenticate to RiceQuant platform
    evidence: easytrader/ricequant_follower.py:10(RiceQuantFollower)
  - name: XueQiuFollower.follow
    description: Start following XueQiu portfolio with periodic position sync
    evidence: easytrader/xq_follower.py:15(XueQiuFollower)
  key_behaviors:
  - behavior: Command cache via pickle for idempotent restarts
    description: Prevents re-executing trades after program restart; cmd key = strategy+stock+action+amount+price+datetime,
      stored in cmd_cache.pk
    evidence: easytrader/follower.py:128(load_expired_cmd_cache)
  - behavior: Trade command expiration (default 120s)
    description: Stale signals should not execute; timestamp comparison enforces this to prevent stale
      order execution
    evidence: easytrader/follower.py:250(_execute_trade_cmd)
  - behavior: Thread-based worker for trade execution
    description: 'Queue-based decoupling: polling threads produce signals, worker thread consumes and
      executes trades sequentially'
    evidence: easytrader/follower.py:345(trade_worker)
  - behavior: Sell-first transaction ordering
    description: 'Prevents insufficient funds: selling first frees up capital before buying, critical
      for T+0 operations'
    evidence: easytrader/follower.py:400(order_transactions_sell_first)
  - behavior: send_interval for sell-then-buy sequencing
    description: Delay between sell completion and buy start ensures sell orders settle before buy credit
      arrives
    evidence: easytrader/follower.py:345(trade_worker)
  replaceable_points:
  - name: cmd_cache
    description: Persist executed commands to disk for idempotent restarts
    options:
    - name: 'true'
      traits:
      - Idempotent
      - Default
      - Persisted
      fit_for:
      - Production deployments
      - Long-running processes
      not_fit_for:
      - Testing
      - One-off executions
    - name: 'false'
      traits:
      - No persistence
      - Fresh start
      fit_for:
      - Testing
      - Manual execution
      not_fit_for:
      - Production (may duplicate trades on restart)
    default: 'true'
  - name: platform
    description: Simulation platform to follow for trade signals
    options:
    - name: joinquant
      traits:
      - XSHG/XSHE format
      - URL-based following
      fit_for:
      - Most common Chinese quant platform
      not_fit_for:
      - RiceQuant/XueQiu users
    - name: ricequant
      traits:
      - rq/ricequant prefix
      - API-based
      fit_for:
      - RiceQuant users
      not_fit_for:
      - JoinQuant/XueQiu users
    - name: xueqiu
      traits:
      - sh/sz prefix
      - Portfolio-based
      fit_for:
      - XueQiu portfolio followers
      not_fit_for:
      - Other platforms
    default: joinquant
  design_decisions:
  - 'Command cache via pickle for idempotent restarts (evidence: easytrader/follower.py:128(load_expired_cmd_cache))
    — Prevents re-executing trades after program restart; cmd key = strategy+stock+action+amount+price+datetime'
  - 'Trade command expiration (default 120s) (evidence: easytrader/follower.py:250(_execute_trade_cmd))
    — Stale signals should not execute; timestamp comparison enforces this'
  - 'Thread-based worker for trade execution (evidence: easytrader/follower.py:345(trade_worker)) — Queue-based
    decoupling: polling threads produce, worker thread consumes'
  - 'send_interval for sell-then-buy sequencing (evidence: easytrader/follower.py:345(trade_worker)) —
    Delay between sells and buys ensures sell orders complete before buy credit arrives'
  - 'Slippage asymmetry: buy × (1+slip), sell × (1-slip) (evidence: easytrader/follower.py:122(_calculate_price_by_slippage))
    — Asymmetric slippage: buys get higher price (safer), sells get lower price (safer)'
  - 'Dynamic asset calculation from net_value × initial_assets (evidence: easytrader/xq_follower.py:123(calculate_assets))
    — XueQiu portfolios scale; net value changes affect position sizing'
  acceptance_hints:
  - Signals within 120s window are executed
  - Signals older than 120s are silently discarded
  - Sell orders execute before buy orders
  - Duplicate signals on restart are not re-executed (cmd_cache=true)
  - send_interval delay properly sequences sell-to-buy
- id: remote_service
  name: Remote Service Layer
  order: 5
  responsibility: 'Expose trader API over HTTP for remote/headless access. WHY: Allows trading from non-Windows
    machines or as a microservice, decoupling strategy execution from broker connectivity'
  interface:
    inputs:
    - HTTP requests (POST /buy, /sell, etc.)
    - broker identifier
    - JSON payload with trade parameters
    outputs:
    - JSON responses with results or errors
  required_methods:
  - name: server.run
    description: Start Flask server exposing trader API endpoints
    evidence: easytrader/server.py:8(server)
  - name: RemoteClient.buy
    description: HTTP wrapper for buy operation, forwarding to remote server
    evidence: easytrader/remoteclient.py:92(buy)
  - name: RemoteClient.sell
    description: HTTP wrapper for sell operation, forwarding to remote server
    evidence: easytrader/remoteclient.py:92(sell)
  - name: RemoteClient.balance
    description: HTTP wrapper for balance query
    evidence: easytrader/remoteclient.py:92(balance)
  key_behaviors:
  - behavior: Flask server wraps ClientTrader for remote access
    description: Windows-only pywinauto requires server on Windows box; clients on any platform connect
      via HTTP
    evidence: easytrader/server.py:27(post_prepare)
  - behavior: RemoteClient mirrors trader interface identically
    description: Drop-in replacement for local traders via transparent HTTP forwarding; same method signatures
    evidence: easytrader/remoteclient.py:92(buy)
  - behavior: Optional auth (BasicAuth or custom)
    description: Security for internet-facing deployment; defaults to none for localhost-only usage
    evidence: easytrader/remoteclient.py:15(auth)
  replaceable_points:
  - name: ssl
    description: Use HTTPS for remote connection encryption
    options:
    - name: 'true'
      traits:
      - Encrypted
      - Production recommended
      fit_for:
      - Internet-facing deployments
      not_fit_for:
      - Localhost only
      - Development
    - name: 'false'
      traits:
      - Unencrypted
      - Default
      - Fast
      fit_for:
      - Localhost
      - Isolated networks
      not_fit_for:
      - Internet-facing production
    default: 'false'
  design_decisions:
  - 'Flask server wraps ClientTrader for remote access (evidence: easytrader/server.py:27(post_prepare))
    — Windows-only pywinauto requires server on Windows box; clients connect via HTTP'
  - 'RemoteClient mirrors trader interface identically (evidence: easytrader/remoteclient.py:92(buy))
    — Drop-in replacement for local traders via transparent HTTP forwarding'
  - 'Optional auth (BasicAuth or custom) (evidence: easytrader/remoteclient.py:15(auth)) — Security for
    internet-facing deployment; defaults to none for localhost'
  acceptance_hints:
  - Server starts on specified port (default 1430)
  - RemoteClient methods return same format as local trader
  - HTTP errors properly converted to TradeError exceptions
  - Authentication enforced when configured
data_flow:
- from_stage: authentication
  to_stage: account_query
  data: Authenticated session with broker config containing window handles, control IDs, and field mappings
- from_stage: authentication
  to_stage: order_execution
  data: Authenticated session with UI/API handles for submitting trades
- from_stage: account_query
  to_stage: trade_following
  data: Position data (current holdings) for adjust_sell calculation and available balance checks
- from_stage: trade_following
  to_stage: order_execution
  data: Trade commands (security code, price, amount, action) generated from external platform signals
- from_stage: remote_service
  to_stage: authentication
  data: Login credentials via JSON payload forwarded to local trader
- from_stage: remote_service
  to_stage: order_execution
  data: Trade parameters (buy/sell/balance) via HTTP POST routed to appropriate trader method
global_contracts:
- contract: Security codes normalized to 6-digit strings internally
  evidence: easytrader/clienttrader.py:450(_set_trade_params)
- contract: Stock amount must be multiple of 100 (lot size) for A-share market
  evidence: easytrader/xq_follower.py:186(project_transactions), easytrader/clienttrader.py:470(_type_edit_control_keys)
- contract: Market order types differ by exchange (sh/sz) and must be mapped per broker
  evidence: easytrader/miniqmt/miniqmt_trader.py:10(MARKET_ORDER_TYPE_NAME_MAP)
- contract: 'Slippage is asymmetric: buy price multiplied by (1+slippage), sell price by (1-slippage)'
  evidence: easytrader/follower.py:122(_calculate_price_by_slippage)
- contract: Trade commands keyed by strategy_name+stock+action+amount+price+datetime for deduplication
  evidence: easytrader/follower.py:221(generate_expired_cmd_key)
- contract: Every follower transactions ordered SELL before BUY to ensure cash availability
  evidence: easytrader/follower.py:400-408(order_transactions_sell_first)
- contract: Login must precede config loading in prepare() method flow
  evidence: easytrader/clienttrader.py:586-616(prepare)
- contract: Broker-specific control IDs and TITLE strings required for UI automation
  evidence: easytrader/config/client.py:24(TITLE), easytrader/config/client.py:87(BALANCE_GRID_CONTROL_ID)
- contract: 'Stock code format varies by platform: XSHG/XSHE suffixes (JoinQuant) vs sh/sz prefixes (XueQiu)'
  evidence: easytrader/joinquant_follower.py:109-119(stock_shuffle_to_prefix)
- contract: Command cache stored as cmd_cache.pk in current working directory
  evidence: easytrader/follower.py:26(CMD_CACHE_FILE)
business_decisions:
- id: BD-001
  type: B
  content: Separate BaseLoginClientTrader for auto-login vs connect-only
  rationale: 'Distinguishing between automated login flow and pre-authenticated connection allows flexible
    reuse of connect() for already-authenticated sessions. This separation prevents re-authentication
    overhead and enables connect-only mode for clients managing their own credentials externally. Boundary:
    specifically applies to BaseLoginClientTrader subclass hierarchy where login state varies.'
  evidence: easytrader/clienttrader.py:580(BaseLoginClientTrader)
  stage: authentication
  alternative_considered: Single unified login method with boolean flag; rejected due to interface pollution
- id: BD-002
  type: B/RC
  content: Heartbeat thread for web sessions to maintain token validity
  rationale: 'Web trading sessions require periodic keepalive signals to prevent server-side token expiration
    and forced logout. A dedicated background thread sending heartbeats every 30 seconds maintains session
    continuity for long-running automated trading operations. Boundary: applies only to web-based traders;
    desktop traders use different keepalive mechanisms.'
  evidence: easytrader/webtrader.py:85(send_heartbeat)
  stage: authentication
  alternative_considered: Session refresh on demand; rejected due to unpredictable timing gaps
- id: BD-003
  type: BA
  content: Config file or direct params for login
  rationale: 'Dual authentication modes serve distinct use cases: config file keeps credentials out of
    command-line history and process listings (security boundary), while direct parameters enable programmatic
    instantiation without file I/O dependency. Supports both human operators and automated systems. Boundary:
    config file uses prepare() method with optional parameter override.'
  evidence: easytrader/clienttrader.py:586(prepare)
  stage: authentication
  alternative_considered: Environment variables only; rejected due to cross-platform complexity
- id: BD-004
  type: B/DK
  content: Grid data via strategy pattern (Copy/WMCopy/Xls)
  rationale: 'Different broker terminals use distinct clipboard and data export mechanisms (plain Copy,
    Windows Metafile Copy, or Excel export). Strategy pattern encapsulates extraction logic per broker,
    allowing runtime selection without conditional branching. Boundary: strategy factory instantiates
    appropriate handler based on broker configuration.'
  evidence: easytrader/clienttrader.py:65(grid_strategy)
  stage: account_query
  alternative_considered: Per-broker subclasses with overridden methods; rejected due to code duplication
  _evidence_issues:
  - 'FN_NOT_FOUND: grid_strategy in easytrader/clienttrader.py'
  vague_rationale: true
- id: BD-005
  type: B
  content: Balance from Static controls, not grid
  rationale: 'Terminal UI separates balance display (static controls show pre-formatted current balance)
    from transactional data (grid shows positions and entrusts). Extracting balance from statics ensures
    accuracy without grid parsing complexity. Boundary: applies to account balance only; positions and
    entrusts still use grid extraction.'
  evidence: easytrader/clienttrader.py:134(_get_balance_from_statics)
  stage: account_query
  alternative_considered: Balance from grid; rejected due to inconsistent grid formatting
- id: BD-006
  type: BA/DK
  content: GRID_DTYPE per broker for proper CSV parsing
  rationale: 'Chinese column headers and numeric formats (decimal separators, thousands notation) vary
    significantly between broker data exports. Broker-specific dtype mapping ensures pandas correctly
    interprets CSV data without parsing errors. Boundary: applies to grid-to-DataFrame conversion only;
    API responses use separate parsing.'
