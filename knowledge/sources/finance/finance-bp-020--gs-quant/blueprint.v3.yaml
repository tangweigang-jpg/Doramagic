business_decisions:
- id: BD-001
  type: B/BA
  content: DimensionsOverride converts enum keys to string values
  rationale: DimensionsOverride automatically converts enum-typed dimension keys to their string representations
    during initialization. This conversion boundary ensures consistent serialization and comparison while
    allowing enum-typed internal representation for type safety.
  evidence: gs_quant/analytics/datagrid/data_row.py:171(__init__)
  stage: data_ingestion
- id: BD-002
  type: B/BA
  content: Annualized rolling volatility uses simple std with ddof=1 and 252-day annualization
  rationale: The choice of ddof=1 (Bessel correction) provides unbiased sample variance estimator which
    is standard in financial applications for consistency with statistical theory. The 252-day annualization
    factor assumes 252 trading days per year, standard for US equity markets. Alternative ddof=0 would
    produce biased population variance estimates.
  evidence: gs_quant/timeseries/statistics.py:95(annualization_factor_252)
  stage: gs_quant.timeseries.statistics
  alternative_considered: Using 250 or 365 days as annualization factor depending on market convention;
    ddof=0 for population variance
  _evidence_issues:
  - 'FN_NOT_FOUND: annualization_factor_252 in gs_quant/timeseries/statistics.py'
- id: BD-003
  type: B/BA
  content: Exponential moving average uses span=14 default (beta=0.94, alpha=0.06), no adjustment
  rationale: Span=14 is the industry standard for short-term momentum indicators in equities, providing
    responsiveness while filtering noise. The no-adjustment flag prevents biased estimation at series
    boundaries. Changing span fundamentally alters the smoothing-speed versus lag tradeoff.
  evidence: gs_quant/timeseries/statistics.py:120-122(default_span_14)
  stage: gs_quant.timeseries.statistics
  alternative_considered: Span=20 or 26 as alternative standard values; adjust=True for boundary handling
  _evidence_issues:
  - 'FN_NOT_FOUND: default_span_14 in gs_quant/timeseries/statistics.py'
- id: BD-004
  type: B/BA
  content: Exponentially weighted std uses beta=0.75 (alpha=0.25), with debiasing factor
  rationale: Beta=0.75 gives alpha=0.25 weighting more recent observations significantly more than older
    ones, suitable for volatile financial series. The debiasing factor corrects for the initial window
    bias in exponential weighting. This balances responsiveness to recent regime changes with statistical
    stability.
  evidence: gs_quant/timeseries/statistics.py:584-625(exponential_std)
  stage: gs_quant.timeseries.statistics
  alternative_considered: Beta=0.94 matching EMA span=14; beta=0.90 for longer memory
- id: BD-005
  type: B/BA
  content: Rolling z-scores computed with sample std (ddof=1) over rolling window
  rationale: Using sample standard deviation with ddof=1 ensures unbiased estimation of population volatility
    when computing z-scores. The rolling window approach allows for time-varying standardization. This
    choice affects outlier detection thresholds and signal generation.
  evidence: gs_quant/timeseries/statistics.py:734(zscores)
  stage: gs_quant.timeseries.statistics
  alternative_considered: Population std (ddof=0) for larger samples; median absolute deviation for robust
    z-scores
- id: BD-006
  type: B/DK
  content: Rolling variance uses Bessel correction (ddof=1) for unbiased sample variance
  rationale: Bessel correction provides unbiased variance estimation in rolling windows where the true
    population mean is unknown. This is essential for statistical inference on rolling variance. Using
    population variance would systematically underestimate uncertainty.
  evidence: gs_quant/timeseries/statistics.py:55(rolling_std)
  stage: gs_quant.timeseries.statistics
  alternative_considered: MLE variance (ddof=0) for very large windows; Welford's algorithm for numerical
    stability
- id: BD-007
  type: B/DK
  content: Rolling covariance uses Bessel correction (ddof=1) for unbiased sample covariance
  rationale: Unbiased covariance estimation with ddof=1 is required when the true means are estimated
    from data, which is standard practice for rolling windows. This ensures proper correlation estimates
    and portfolio optimization inputs.
  evidence: gs_quant/timeseries/statistics.py:695-723(rolling_cov)
  stage: gs_quant.timeseries.statistics
  alternative_considered: Shrinkage estimators for ill-conditioned covariance matrices in high dimensions
  _evidence_issues:
  - 'FN_NOT_FOUND: rolling_cov in gs_quant/timeseries/statistics.py'
- id: BD-008
  type: B/BA
  content: Winsorization caps values at ±2.5 sigma from sample mean
  rationale: The 2.5-sigma threshold captures approximately 99% of normally distributed data while limiting
    the influence of extreme outliers. This is more aggressive than 3-sigma rules but less than 2-sigma,
    balancing robustness with information retention. Symmetric capping avoids directional bias.
  evidence: gs_quant/timeseries/statistics.py:794-851(winsorize)
  stage: gs_quant.timeseries.statistics
  alternative_considered: 3-sigma for conservative outlier handling; adaptive threshold based on kurtosis;
    asymmetric winsorization
- id: BD-009
  type: B/BA
  content: Rolling percentile rank uses 'mean' interpolation between tied values
  rationale: Mean interpolation for ties provides smooth percentile estimates avoiding discrete jumps
    when multiple values share the same rank. This is consistent with scipy's default behavior and produces
    more stable time series of percentile ranks compared to 'min' or 'max' interpolation.
  evidence: gs_quant/timeseries/statistics.py:1036(percentile)
  stage: gs_quant.timeseries.statistics
  alternative_considered: Min/max interpolation for conservative/aggressive ranking; no interpolation
    for exact percentile matching
- id: BD-010
  type: B
  content: OLS linear regression via statsmodels OLS with optional intercept, filters NaN/inf
  rationale: Using statsmodels OLS provides full statistical inference (t-stats, R-squared) beyond simple
    least squares. Optional intercept allows forced-through-origin models. NaN/inf filtering prevents
    contamination of regression estimates by missing or invalid data points.
  evidence: gs_quant/timeseries/statistics.py:1083-1121(ols_regression)
  stage: gs_quant.timeseries.statistics
  alternative_considered: Numpy lstsq for speed; sklearn LinearRegression for different regularization
    options; weighted least squares for heteroskedasticity
  _evidence_issues:
  - 'FN_NOT_FOUND: ols_regression in gs_quant/timeseries/statistics.py'
- id: BD-011
  type: B/DK
  content: Rolling OLS via statsmodels RollingOLS with fixed window, optional intercept
  rationale: Fixed-window RollingOLS enables time-varying coefficient estimation capturing regime changes
    in relationships. Statsmodels implementation provides consistent methodology with static OLS. Optional
    intercept allows behavioral constraints on factor exposures.
  evidence: gs_quant/timeseries/statistics.py:1173-1256(RollingOLS)
  stage: gs_quant.timeseries.statistics
  alternative_considered: Expanding window for full-sample history; Kalman filter for time-varying coefficients;
    recursive least squares
  _evidence_issues:
  - 'FN_NOT_FOUND: RollingOLS in gs_quant/timeseries/statistics.py'
- id: BD-012
  type: B/DK
  content: Rolling product computes product of (1+r) values over window for cumulative return
  rationale: Computing (1+r) product over returns correctly compounds returns accounting for geometric
    growth, unlike simple averaging which ignores compounding. Using nanprod handles missing values appropriately.
    This is the standard approach for computing cumulative returns from periodic returns.
  evidence: gs_quant/timeseries/statistics.py:492(product)
  stage: gs_quant.timeseries.statistics
  alternative_considered: Log returns with exp(sum(log(1+r))) for numerical stability; arithmetic sum
    for simple aggregation
  vague_rationale: true
- id: BD-013
  type: B
  content: Autocorrelation uses unbiased Var(X) estimator (ddof=1) per Bartlett's formula
  rationale: Bartlett's formula for autocorrelation confidence intervals requires unbiased variance estimation
    with ddof=1. This ensures proper statistical inference about serial dependence. The unbiased estimator
    is essential for significance testing of autocorrelation in financial time series.
  evidence: gs_quant/timeseries/statistics.py:55(rolling_std)
  stage: gs_quant.timeseries.statistics
  alternative_considered: Spectral methods for long-memory processes; Ljung-Box test for joint significance
- id: BD-014
  type: B
  content: SIR compartmental model uses Levenberg-Marquardt (leastsq) via lmfit.minimize for fitting
  rationale: Levenberg-Marquardt is optimal for nonlinear least squares fitting with good convergence
    properties. lmfit provides robust parameter bounds and uncertainty estimation. This method balances
    Gauss-Newton and gradient descent approaches, handling ill-conditioned Jacobians well.
  evidence: gs_quant/models/epidemiology.py:29(compartmentalModel)
  stage: gs_quant.models.epidemiology
  alternative_considered: Differential evolution for global optimization; MCMC for full posterior estimation;
    Nelder-Mead simplex
  _evidence_issues:
