  rationale: 'WHY: Pricing locations are currency-specific due to market conventions, holiday calendars,
    and data source availability; unsupported currencies cannot determine a default location. BOUNDARY:
    When currency is not in the supported mapping, MqValueError is raised. Callers must explicitly provide
    location for unsupported currencies. This enforces explicit configuration for edge cases.'
