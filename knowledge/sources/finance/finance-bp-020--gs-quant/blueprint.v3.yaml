- id: BD-059
  type: BA/DK
  content: 'INTERACTION: BD-002 × BD-023 → Annualization factor inconsistency between 252 trading days
    (volatility) and 365 calendar days (frequency mapping)'
  rationale: Annualized rolling volatility (BD-002) uses 252-day annualization factor assuming US equity
    trading calendar, while frequency-to-period mapping (BD-023) uses 365 for daily conversion. When computing
    annual volatility for a timeseries measured in calendar days, these inconsistent factors produce systematically
    different annualization results. A daily volatility computed as std * sqrt(252) will differ from one
    computed via the frequency mapping path, causing Sharpe ratios and risk metrics to be inconsistent
    depending on which code path is used.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unified annualization factor with explicit trading/calendar day selection parameter
- id: BD-060
  type: BA/M
  content: 'INTERACTION: BD-030 × BD-005 → Information Ratio uses population std (ddof=0) while z-score
    normalization uses sample std (ddof=1)'
  rationale: Information Ratio (BD-030) explicitly uses population standard deviation (np.std with ddof=0)
    treating realized returns as the full population, while rolling z-scores (BD-005) use sample standard
    deviation (ddof=1) treating returns as a sample from a larger population. When z-score normalization
    is applied to returns before computing Information Ratio, the denominator uses ddof=0 while the z-score
    computation used ddof=1, creating an internal inconsistency. This causes z-score-based return distributions
    to have apparent population variance slightly different from 1.0 when plugged into IR calculation,
    biasing risk-adjusted performance metrics.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Consistent ddof usage across each statistical moment computations
- id: BD-061
  type: B/DK
  content: 'INTERACTION: BD-008 × BD-021 → Winsorization at 2.5σ caps data before Bollinger Bands at ±2σ
    evaluate for mean-reversion signals'
  rationale: Winsorization caps extreme values at ±2.5 standard deviations from the mean (BD-008), effectively
    clipping the tails of the return distribution before downstream analysis. Bollinger Bands (BD-021)
    use ±2 standard deviations from a 20-period SMA to identify mean-reversion opportunities. When data
    passes through winsorization before Bollinger Band calculation, the winsorized values may no longer
    reach the ±2σ band boundaries, suppressing signals for truly extreme deviations that were clipped.
    This creates a tension where robust outlier handling (winsorization) conflicts with volatility-based
    signal generation (Bollinger Bands), potentially causing under-detection of genuine regime shifts.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Post-signal winsorization; adaptive band width based on winsorized volatility;
    asymmetric treatment of winsorization targets
- id: BD-062
  type: B
  content: 'INTERACTION: BD-040 × BD-045 × BD-050 → Execution ordering risk cascade: CalcType hierarchy
    + path_dependent requirements + aggregate max dominate execution'
  rationale: Three decisions form a risk cascade that can silently produce incorrect backtest results.
    BD-040 enforces CalcType ordering (simple→semi_path_dependent→path_dependent). BD-045 requires __ensure_risk_results
    before any path_dependent action executes. BD-050 takes max of child calc_types for aggregates, making
    any child path_dependent trigger the entire aggregate to be path_dependent. If a developer creates
    an aggregate with mixed calc_types that includes path_dependent components, the aggregate inherits
    full path_dependent requirements. Violations cause silent failures where path_dependent strategies
    compute without complete risk results, producing incorrect hedge ratios and trigger conditions. This
    cascade is particularly dangerous because each decision alone seems reasonable, but their interaction
    creates a complex contract that is difficult to maintain.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Runtime dependency validation; explicit calc_type declaration with inheritance
    blocking
- id: BD-063
  type: BA/DK
  content: 'INTERACTION: BD-048 × BD-037 → Zero default transaction cost contradicts TWAP arithmetic mean
    execution assumption'
  rationale: 'default_transaction_cost() returns ConstantTransactionModel(0) providing frictionless execution
    by default (BD-048), while TWAP execution uses arithmetic mean of fixings as the executed price (BD-037).
    The arithmetic mean assumes uniform execution across time slices, which implicitly assumes zero market
    impact and zero spread cost. In real markets, TWAP execution incurs spread costs (typically 0.5-2
    bps for liquid instruments) and potential market impact for large orders. Backtests using default
    zero friction will systematically overstate TWAP strategy performance by the spread cost. This is
    a hidden dependency: TWAP backtests work correctly only when consumers explicitly configure transaction
    costs, but the default encourages frictionless assumptions.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Non-zero default transaction cost based on instrument liquidity; spread estimation
    in TWAP computation
- id: BD-064
  type: B/BA
  content: 'INTERACTION: BD-029 × BD-008 → GARCH normal distribution assumption conflicts with winsorization''s
    implicit heavy-tailed distribution treatment'
  rationale: 'GARCH(1,1) with normal distribution (BD-029) assumes normally distributed innovations, which
    underestimates tail risk in financial returns that typically exhibit fat tails (excess kurtosis 3-7).
    Winsorization at ±2.5σ (BD-008) explicitly caps extreme values, effectively treating the distribution
    as having lighter tails than the raw data. Using winsorized returns to fit a normal GARCH model creates
    a double-softening: winsorization reduces observed kurtosis while normal GARCH ignores any remaining
    fat tails. This interaction can severely underestimate VaR and CVaR, producing dangerously optimistic
    risk estimates. The alternative of GARCH-t (t-distribution) would capture remaining tail risk, but
    winsorization pre-empts this by removing the very observations GARCH-t is designed to model.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: GARCH-t with winsorized data; skipping winsorization for GARCH estimation; robust
    GARCH variants
- id: BD-065
  type: BA/DK
  content: 'INTERACTION: BD-017 × BD-014 → Epidemiological model fitting chains ODE solver (LSODA) with
    optimizer (Levenberg-Marquardt) creating coupled accuracy dependency'
  rationale: 'SIR model fitting uses Levenberg-Marquardt minimization (BD-014) to minimize residuals between
    model solution and observed data. The model solution comes from scipy.integrate.odeint with LSODA
    algorithm (BD-017). This creates a hidden dependency: the optimizer assumes the model function returns
    accurate solutions, but LSODA uses adaptive step sizing that may produce different trajectories depending
    on local curvature. When LM minimizes residuals, it explores parameter space where ODE stiffness changes.
    If LSODA''s step sizing fails to accurately integrate stiff regions, the residuals are wrong, and
    LM converges to incorrect parameters. This coupling means calibration quality depends on both decisions
    jointly: a more robust ODE solver (RK45 with tight tolerances) might find different optimal parameters
    than LSODA with default tolerances.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Fixed solver tolerances with documented accuracy requirements; coupled optimization
    including solver settings
- id: BD-066
  type: BA
  content: 'INTERACTION: BD-046 × BD-012 → Missing data strategy defaults to fail but rolling product
    uses nanprod silently propagating NaN'
  rationale: 'GenericDataSource defaults to fail-fast on missing data (BD-046) with RuntimeError, while
    rolling product for cumulative returns uses nanprod (BD-012) which propagates NaN values without raising
    errors. When these two components interact in a backtest, the fail-fast default may catch data gaps
    early in the pipeline, but rolling product calculations that depend on those same gaps will silently
    produce NaN results rather than failing. This creates inconsistent behavior: some data gaps cause
    immediate failure while others produce NaN outputs that may cause downstream errors much later. Users
    may configure missing_data_strategy=''interpolate'' to handle gaps gracefully, but this changes rolling
    product behavior in ways that may not be obvious, as interpolated values compound through the product
    operation.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Consistent missing data strategy enforcement across each calculation types;
    explicit NaN propagation warnings
- id: BD-067
  type: BA/DK
  content: 'INTERACTION: BD-002 × BD-006 × BD-007 × BD-005 × BD-013 → Universal ddof=1 (Bessel correction)
    creates hidden consistency contract across each variance-based calculations'
  rationale: 'Five separate business decisions each specify ddof=1 (Bessel correction) for variance, standard
    deviation, covariance, z-scores, and autocorrelation estimation. While individually justified (unbiased
    population variance estimation), collectively they create an implicit consistency contract: each variance-based
    metrics in the system must use sample std with ddof=1. If any new calculation or external integration
    uses ddof=0 (population std), the resulting statistics will be systematically larger by factor sqrt(n/(n-1)),
    creating subtle inconsistencies. BD-030 explicitly breaks this contract by using ddof=0 for Information
    Ratio, creating the contradiction identified in BD-060. This hidden dependency means future developers
    adding statistical calculations must be aware of the ddof convention or risk introducing inconsistencies
    that are difficult to detect.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Explicit variance convention constant; compile-time validation of ddof consistency
