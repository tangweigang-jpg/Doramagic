  rationale: 'WHY: AddWeightedTradeAction depends on position weights that change across dates (semi-path
    dependent) but does not require full path simulation. BOUNDARY: _calc_type is set to semi_path_dependent
    in __post_init__, not as a class-level default. This ensures correct execution ordering: semi_path_dependent
