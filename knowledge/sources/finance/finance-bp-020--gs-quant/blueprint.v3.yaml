replaceable_slots:
- id: slot-001
  name: data_source_gs_market_data
  description: Must use GS Marquee for all GS-specific financial data, risk analytics, and securities
    metadata
  used_in_stages: []
  options:
  - name: Goldman Sachs Marquee (default)
    traits:
    - proprietary
    - comprehensive_coverage
    - real_time
    - gs_specific
    fit_for:
    - Goldman Sachs institutional clients with Marquee access
    not_fit_for:
    - External users without GS credentials, non-GS data
  default: Goldman Sachs Marquee (default)
  _source: worker_resource
- id: slot-002
  name: data_source_macro_economic
  description: Choose FRED for US macroeconomic data; use external providers for non-GS financial data
  used_in_stages: []
  options:
  - name: FRED (Federal Reserve Economic Data)
    traits:
    - free
    - us_economic_indicators
    - reliable
    - official_source
    fit_for:
    - US macroeconomic data (GDP, unemployment, interest rates), academic research
    not_fit_for:
    - Non-US economic data, real-time forex, proprietary indicators
  - name: 'Alternative: Yahoo Finance'
    traits:
    - free
    - global_coverage
    - price_data
    fit_for:
    - Public equity price data, ETFs, indices
    not_fit_for:
    - Derivatives pricing, risk analytics, institutional data
  - name: 'Alternative: Alpha Vantage'
    traits:
    - free_tier
    - equities
    - forex
    - crypto
    fit_for:
    - Stock quotes, FX rates with free API tier
    not_fit_for:
    - Institutional derivatives, risk analytics
  default: FRED (Federal Reserve Economic Data)
  _source: worker_resource
- id: slot-003
  name: data_source_equity_fundamentals
  description: Use GS-integrated FactSet for equity fundamentals with GS credentials
  used_in_stages: []
  options:
  - name: FactSet via GS Marquee
    traits:
    - institutional_quality
    - estimates
    - ratings
    - gs_integrated
    fit_for:
    - Institutional clients with FactSet subscriptions via GS
    not_fit_for:
    - External users without FactSet access
  - name: 'Alternative: Refinitiv/LSEG'
    traits:
    - institutional
    - comprehensive
    - pricing
    fit_for:
    - Institutional clients with Refinitiv subscriptions
    not_fit_for:
    - Individual investors
  default: FactSet via GS Marquee
  _source: worker_resource
- id: slot-004
  name: http_client_sync
  description: Built-in sync client; use httpx async client for async code
  used_in_stages: []
  options:
  - name: requests (default)
    traits:
    - synchronous
    - mature
    - widely_used
    fit_for:
    - Synchronous code, simpler use cases
    not_fit_for:
    - High concurrency, async code
  default: requests (default)
  _source: worker_resource
- id: slot-005
  name: http_client_async
  description: Built-in async client for all async operations
  used_in_stages: []
  options:
  - name: httpx (default)
    traits:
    - async
    - sync_compatible
    - modern
    fit_for:
    - Async code, modern Python applications
    not_fit_for:
    - Legacy synchronous-only code
  default: httpx (default)
  _source: worker_resource
- id: slot-006
  name: websocket_library
  description: Built-in WebSocket client for real-time GS data
  used_in_stages: []
  options:
  - name: websockets (default)
    traits:
    - async
    - ws/wss
    - modern
    fit_for:
    - Real-time pricing subscriptions, async applications
    not_fit_for:
    - Synchronous-only applications
  default: websockets (default)
  _source: worker_resource
- id: slot-007
  name: tracing_provider
  description: Built-in OpenTelemetry for GS environment tracing; swap for external tracing systems if
    needed
  used_in_stages: []
  options:
  - name: OpenTelemetry (built-in)
    traits:
    - distributed_tracing
    - vendor_neutral
    - gs_integrated
    fit_for:
    - Request tracing, performance monitoring in GS environment
    not_fit_for:
    - Simple scripts without tracing requirements
  - name: 'Alternative: Jaeger'
    traits:
    - distributed_tracing
    - visualization
    fit_for:
    - Microservices tracing with Jaeger backend
    not_fit_for:
    - Simple single-service applications
  - name: 'Alternative: Zipkin'
    traits:
    - distributed_tracing
    - lightweight
    fit_for:
    - Lightweight tracing with Zipkin backend
    not_fit_for:
    - Complex multi-service architectures
  default: OpenTelemetry (built-in)
  _source: worker_resource
- id: slot-008
  name: numerical_computing
  description: Standard NumPy for all numerical computing
  used_in_stages: []
  options:
  - name: NumPy (default)
    traits:
    - blas_accelerated
    - standard
    - mature
    fit_for:
    - Standard numerical computing, array operations
    not_fit_for:
    - GPU-accelerated computing
  default: NumPy (default)
  _source: worker_resource
- id: slot-009
  name: certificate_authority
  description: Use certifi for standard SSL verification; configure custom CA for internal networks
  used_in_stages: []
  options:
  - name: certifi Mozilla CA Bundle (default)
    traits:
    - Mozilla_curated
    - widely_trusted
    - auto_updated
    fit_for:
    - Standard HTTPS verification with trusted CAs
    not_fit_for:
    - Custom/internal CA certificates
  - name: 'Alternative: Custom CA Bundle'
    traits:
    - internal_cas
    - corporate_networks
    fit_for:
    - Corporate networks with internal certificate authorities
    not_fit_for:
    - Standard internet-facing applications
  default: certifi Mozilla CA Bundle (default)
  _source: worker_resource
