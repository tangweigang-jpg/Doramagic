  content: ResultInfo.composition_info enforces market.location equality - cannot compose across locations
  rationale: 'WHY: Risk results from different market locations may use different data sources, conventions,
    or time zones; composing them would produce semantically invalid aggregated results. BOUNDARY: ResultInfo.composition_info
    checks market.location equality; mismatched locations raise ValueError. Cross-location aggregation
