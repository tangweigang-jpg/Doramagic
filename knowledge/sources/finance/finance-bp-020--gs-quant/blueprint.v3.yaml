# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-020
name: GS Quant
sop_version: '3.6'
source:
  projects:
  - gs-quant
  commit_hash: f1f7d6238f03c8e1d9ad722fba4ed022f2539c89
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Quantitative trading strategies and risk management
  description: Python toolkit by Goldman Sachs for building quantitative trading strategies, derivative
    structuring, trading, risk management, and statistical data analytics. Provides instrument modeling,
    pricing, risk analysis, backtesting, and portfolio performance analytics.
  prerequisites: Python 3.9+, Goldman Sachs Marquee API access (client id and secret available to institutional
    clients)
  not_suitable_for: Non-financial analytics, users without Marquee API credentials, real-time trading
    execution systems, retail investor use cases
  activation:
    triggers:
    - Starting any gs_quant workflow that requires pricing or data
    - Building any analysis involving GS analytics API
    - Running backtests against historical market data
    - Fetching market data from Marquee datasets
    emphasis:
    - Use gs_quant when building trade analytics workflows that require GS pricing
    - Use gs_quant backtesting when simulating trading strategies against historical data
    - Use Dataset for any market data access from Marquee catalog
    anti_skip:
    - Don't skip session creation — each API calls require authentication
    - Don't skip premium=0 for FX options — DollarPrice will always be ~0 without it
    - Don't skip naming instruments — names appear in trade ledger for debugging
stages:
- id: data_ingestion
  name: Data Ingestion Layer
  order: 1
  responsibility: Retrieves market data from Marquee/Goldman Sachs APIs. Provides time-series, coordinate-based,
    and batch data retrieval with caching and async support. This layer exists because quantitative analysis
    requires reliable, performant access to market data with proper handling of data quality issues.
  interface:
    inputs:
    - Dataset ID
    - Date ranges
    - Field specifications
    - Asset identifiers
    outputs:
    - pandas DataFrame
    - MarketDataResponseFrame
    - Async futures
  required_methods:
  - name: Dataset.get_data
    description: Primary data retrieval API for fetching market data by coordinates and date ranges
    evidence: gs_quant/data/dataset.py:51(Dataset)
  - name: Dataset.get_data_series
    description: Retrieves time series data for single coordinate with flexible date ranges
    evidence: gs_quant/data/dataset.py:51(Dataset)
  - name: GsDataApi.query
    description: Core query execution with caching support and coordinate handling
    evidence: gs_quant/api/gs/data.py:193(GsDataApi)
  - name: MarqueeDataIngestionLibrary.create_dataset
    description: Creates Snowflake datasets and uploads user data for custom data integration
    evidence: gs_quant/data/dataset.py:694(MarqueeDataIngestionLibrary)
  key_behaviors:
  - behavior: Thread-local cache isolation
    description: API request caching uses thread-local storage to prevent cache pollution across concurrent
      threads in async code
    evidence: gs_quant/api/gs/data.py:202(set_api_request_cache)
  - behavior: Coordinate-based data retrieval
    description: MarketDataResponseFrame extends pandas DataFrame with market data coordinate awareness
      for financial data semantics
    evidence: gs_quant/api/gs/data.py:1508(MarketDataResponseFrame)
  - behavior: Missing data handling strategies
    description: DataSource implementations handle gaps in time series via configurable MissingDataStrategy
      enum
    evidence: gs_quant/backtests/data_sources.py:40(DataSource)
  replaceable_points:
  - name: DataProvider
    description: Vendor data source implementation for Dataset class
    options:
    - name: GsDataApi
      traits:
      - Official Goldman Sachs API
      - Full market data coverage
      - Authentication required
      fit_for:
      - Production Marquee integration
      - Complete market data needs
      not_fit_for:
      - Offline development
      - Mock testing without API access
    - name: Custom DataApi
      traits:
      - User-defined implementation
      - Requires DataApi interface
      fit_for:
      - Testing with mock data
      - Alternative data sources
      not_fit_for:
      - Production without Marquee
    default: GsDataApi
  - name: MissingDataStrategy
    description: How the backtest engine handles gaps in time series data
    options:
    - name: FAIL
      traits:
      - Strict validation
      - Stops on missing data
      fit_for:
      - Production with clean data
      - Data quality verification
      not_fit_for:
      - Real-world data with gaps
      - Historical data with holidays
    - name: SKIP
      traits:
      - Default behavior
      - Skips missing dates
      fit_for:
      - Standard backtesting
      - Discontinuous data
      not_fit_for:
      - Continuous calculations requiring each dates
    - name: FORWARD_FILL
      traits:
      - Last known value propagation
      - Smooths discontinuities
      fit_for:
      - Holiday handling
      - Low-frequency data
      not_fit_for:
      - High-frequency data
      - Gap-sensitive strategies
    - name: ZERO_FILL
      traits:
      - Treats missing as zero
      - Conservative approach
      fit_for:
      - Volume data
      - Clear indication of no activity
      not_fit_for:
      - Price data
      - Any calculation requiring continuity
    default: SKIP
  design_decisions:
  - 'Thread-local context for GsDataApi caching (evidence: gs_quant/api/gs/data.py:202(set_api_request_cache))
    — Enables per-thread cache isolation while maintaining shared API - avoids cache pollution in async
    code'
  - 'MarketDataResponseFrame extends pd.DataFrame (evidence: gs_quant/api/gs/data.py:1508(MarketDataResponseFrame))
    — Leverages pandas ecosystem while adding market data semantics - familiar API for users'
  - 'Dataset uses provider pattern for vendor abstraction (evidence: gs_quant/data/dataset.py:98(__init__))
    — Allows swapping data providers without changing consuming code - enables testing with mock providers'
  acceptance_hints:
  - Data retrieval completes without network errors for valid queries
  - Thread-local caching reduces repeated API calls for identical requests
  - Invalid dataset IDs raise descriptive DatasetNotFoundError
  - Date range queries return correctly bounded results
- id: instrument_modeling
  name: Instrument Modeling
  order: 2
  responsibility: Represents financial instruments (swaps, options, equities) with resolution, pricing,
    and risk calculation capabilities. This layer exists to provide a unified abstraction for diverse
    financial products that can be priced and risk-analyzed consistently.
  interface:
    inputs:
    - Instrument parameters (tenor, strike, notional)
    - Market data for resolution
    outputs:
    - Resolved instrument values
    - Risk measures (delta, gamma, PV)
    - Dollar prices
  required_methods:
  - name: Priceable.resolve
    description: Resolves instrument against market data, optionally in-place to populate pricing parameters
    evidence: gs_quant/base.py:430(Priceable)
  - name: Priceable.calc
    description: Calculates risk measures for the instrument, returning Future in async context for non-blocking
      execution
    evidence: gs_quant/base.py:497(calc)
  - name: Portfolio.price
    description: Prices each instruments in the portfolio with aggregation support
    evidence: gs_quant/markets/portfolio.py:46(Portfolio)
  - name: Grid.parameterize
    description: Creates parameterized grid of similar instruments for scenario analysis
    evidence: gs_quant/markets/portfolio.py:626(Grid)
  key_behaviors:
  - behavior: In-place resolution default
    description: Priceable.resolve() has in_place=True by default, allowing mutation of existing instrument
      for efficiency
    evidence: gs_quant/base.py:431(resolve)
  - behavior: Recursive portfolio nesting
    description: Portfolios support nested structures enabling hierarchical aggregation for fund-of-funds
      use cases
    evidence: gs_quant/markets/portfolio.py:205(portfolios)
  - behavior: Async risk calculations
    description: calc() returns Future in async context for non-blocking risk calculations with multiple
      instruments
    evidence: gs_quant/base.py:497(calc)
  replaceable_points:
  - name: Instrument resolution
    description: How instruments obtain market data required for pricing
    options:
    - name: Marquee API
      traits:
      - Remote pricing
      - Full market data
      - API dependency
      fit_for:
      - Production pricing
      - Real-time market data
      not_fit_for:
      - Offline use
      - Air-gapped environments
    - name: Local pricing model
      traits:
      - Offline capable
      - Model-defined pricing
      - Custom calibration
      fit_for:
      - Testing
      - Closed system environments
      not_fit_for:
      - Real-time pricing
      - Complex derivatives
    default: Marquee API
  design_decisions:
  - 'Priceable.resolve() has in_place default True (evidence: gs_quant/base.py:431(resolve)) — Allows
    mutation of existing instrument - more efficient for single-use, but risks unintended side effects'
  - 'Portfolio supports recursive nesting (evidence: gs_quant/markets/portfolio.py:205(portfolios)) —
    Enables hierarchical portfolio structures - fund of funds use cases'
  - 'calc() returns Future in async context (evidence: gs_quant/base.py:497(calc)) — Non-blocking risk
    calculations - critical for performance with multiple instruments'
  acceptance_hints:
  - Instruments resolve to populated values when market data is available
  - Portfolio pricing aggregates individual instrument values correctly
  - Unit quantity instruments have default quantity of 1
  - Nested portfolios aggregate through hierarchy correctly
- id: pricing_context
  name: Pricing Context Management
  order: 3
  responsibility: Thread-local and async-aware context for market data and pricing parameters. Enables
    nested contexts with shadowing for scenario analysis. This layer exists to provide thread-safe, composable
    pricing environments that can be entered and exited safely.
  interface:
    inputs:
    - Market data coordinates
    - Pricing date
    - Currency/currency pair
    outputs:
    - Context-scoped market values
    - Historical/predicted values
  required_methods:
  - name: PricingContext.__enter__
    description: Enters pricing context, establishing market and date parameters for subsequent operations
    evidence: gs_quant/markets/__init__.py(PricingContext)
  - name: PricingContext.__exit__
    description: Exits pricing context, restoring previous context state
    evidence: gs_quant/markets/__init__.py(PricingContext)
  - name: ContextBase.push
    description: Pushes new context on stack with optional parameter shadowing
    evidence: gs_quant/context_base.py:96(push)
  - name: ContextBaseWithDefault.default_value
    description: Auto-instantiates default context when accessed without explicit instance
    evidence: gs_quant/context_base.py:173(default_value)
  key_behaviors:
  - behavior: Thread-local storage isolation
    description: Context uses thread_local storage ensuring thread-safety without global locks - each
      thread has independent context path
    evidence: gs_quant/context_base.py:21(thread_local)
  - behavior: Nested context push/pop
    description: Contexts support nested push/pop allowing shadowing of parameters in nested scopes for
      scenario analysis within backtests
    evidence: gs_quant/context_base.py:96(push)
  - behavior: Singleton default creation
    description: ContextBaseWithDefault creates singleton default instance for convenient usage reducing
      boilerplate in simple cases
    evidence: gs_quant/context_base.py:173(default_value)
  - behavior: Nullcontext fallback for older Python
    description: Backward compatibility fallback using Nullcontext for Python <3.7 without contextlib
      dependency
    evidence: gs_quant/context_base.py:182(nullcontext)
  replaceable_points:
  - name: Context default behavior
    description: How the system handles access when context is uninitialized
    options:
    - name: Raise exception
      traits:
      - Strict mode
      - Explicit initialization required
      fit_for:
      - Production code
      - Ensuring proper setup
      not_fit_for:
      - Quick scripts
      - Interactive exploration
    - name: Create default
      traits:
      - Convenient mode
      - Auto-initialization
      fit_for:
      - Testing
      - Exploratory analysis
      not_fit_for:
      - Production requiring explicit configuration
    - name: Use global
      traits:
      - Global state
      - Shared context
      fit_for:
      - Simple scripts
      - Single-user environments
      not_fit_for:
      - Multi-threaded applications
      - Complex scenarios
    default: Raise exception (MqUninitialisedError)
  design_decisions:
  - 'Context uses thread_local storage (evidence: gs_quant/context_base.py:21(thread_local)) — Thread-safety
    without global locks - each thread has independent context path'
  - 'Contexts support nested push/pop (evidence: gs_quant/context_base.py:96(push)) — Allows shadowing
    parameters in nested scopes - enables scenario analysis within backtests'
  - 'ContextBaseWithDefault creates singleton (evidence: gs_quant/context_base.py:173(default_value))
    — Convenient default - reduces boilerplate for simple use cases'
  - 'Nullcontext fallback for Python <3.7 (evidence: gs_quant/context_base.py:182(nullcontext)) — Backward
    compatibility - supports older Python versions without contextlib'
  acceptance_hints:
  - PricingContext must be entered before instrument resolution and pricing
  - Nested contexts correctly shadow outer context parameters
  - Thread-local storage prevents context leakage between threads
  - Accessing default context without initialization raises MqUninitialisedError
- id: risk_analysis
  name: Risk Analysis & Measures
  order: 4
  responsibility: Calculates risk measures (greeks, VaR, scenario P&L) for instruments and portfolios
    with result aggregation. This layer exists to provide standardized, comparable risk quantification
    across each instrument types with full audit trails.
  interface:
    inputs:
    - Instruments/portfolios
    - Risk measures (IRDelta, PnlExplain, etc.)
    outputs:
    - FloatWithInfo/ScalarWithInfo
    - DataFrameWithInfo
    - SeriesWithInfo
  required_methods:
  - name: RiskMeasure.calculate
    description: Computes the risk measure for given target instruments or portfolios
    evidence: gs_quant/target/measures.py:0(RiskMeasure)
  - name: FloatWithInfo.value
    description: Accesses risk result value with units and error tracking
    evidence: gs_quant/risk/core.py:189(FloatWithInfo)
  - name: DataFrameWithInfo.filter
    description: Filters bucketed risk results by coordinate with location validation
    evidence: gs_quant/risk/core.py:382(DataFrameWithInfo)
  - name: aggregate_risk
    description: Aggregates heterogeneous risk results across instruments with mixed result types
    evidence: gs_quant/risk/core.py:516(aggregate_risk)
  key_behaviors:
  - behavior: Risk result metadata via RiskKey
    description: ResultInfo contains RiskKey for full audit trail of what generated each result - critical
      for regulatory compliance
    evidence: gs_quant/risk/core.py:37(ResultInfo)
  - behavior: Pandas-compatible result types
    description: Risk results extend pandas types (ScalarWithInfo, DataFrameWithInfo, SeriesWithInfo)
      enabling dataframe operations on risk results
    evidence: gs_quant/risk/core.py:155(ScalarWithInfo)
  - behavior: Heterogeneous aggregation support
    description: aggregate_risk handles mixed scalar/series results - instruments may return different
      result types that must be combined
    evidence: gs_quant/risk/core.py:516(aggregate_risk)
  replaceable_points:
  - name: Risk measure
    description: What risk quantity to compute for instruments
    options:
    - name: IRDelta
      traits:
      - Interest rate sensitivity
      - Per curve tenor bucket
      fit_for:
      - Rates products
      - Fixed income portfolios
      not_fit_for:
      - Equity-only portfolios
      - Currency trades
    - name: EqDelta
      traits:
      - Equity sensitivity
      - Per-underlying
      fit_for:
      - Equity portfolios
      - Single-stock exposure
      not_fit_for:
      - Rates portfolios
      - Pure derivatives books
    - name: Gamma
      traits:
      - Second-order sensitivity
      - Volatility exposure
      fit_for:
      - Option-heavy portfolios
      - Volatility trading
      not_fit_for:
      - Linear instruments
      - Forward positions
    - name: PnlExplain
      traits:
      - P&L attribution
      - Factor decomposition
      fit_for:
      - Performance attribution
      - Risk decomposition
      not_fit_for:
      - Forward projections
      - Scenario analysis
    - name: VaR
      traits:
      - Value at Risk
      - Confidence intervals
      fit_for:
      - Risk limits
      - Regulatory reporting
      not_fit_for:
      - Tail risk analysis
      - Expected shortfall
    default: Instrument-specific default
  design_decisions:
  - 'Risk results extend pandas types with RiskKey (evidence: gs_quant/risk/core.py:155(ScalarWithInfo))
    — Combines rich metadata with pandas API - enables dataframe operations on risk results'
  - 'ResultInfo contains RiskKey for provenance (evidence: gs_quant/risk/core.py:37(ResultInfo)) — Full
    audit trail of what generated the result - critical for regulatory compliance'
  - 'aggregate_risk supports heterogeneous types (evidence: gs_quant/risk/core.py:516(aggregate_risk))
    — Handles mixed scalar/series results - instruments may return different result types'
  acceptance_hints:
  - Risk results carry RiskKey through each computations for audit trail
  - Every DataFrames with risk data use RiskKey for provenance tracking
  - Composing results from different market locations raises ValueError
  - Risk aggregation preserves result types correctly
- id: backtesting
  name: Backtesting Engine
  order: 5
  responsibility: Historical simulation of trading strategies with triggers, actions, transaction costs,
    and risk hedging. Supports systematic and predefined asset strategies. This layer exists to enable
    quantitative strategy validation against historical data with realistic cost modeling and risk management.
  interface:
    inputs:
    - Strategy with triggers/actions
    - Date range
    - Initial capital
    outputs:
    - BackTest results
    - Trade ledger
    - Risk summaries
    - P&L explain
  required_methods:
  - name: Strategy.run
    description: Executes the backtest with defined strategy, triggers, and actions over specified date
      range
    evidence: gs_quant/backtests/strategy.py:39(Strategy)
  - name: GenericEngine.run_backtest
    description: Main backtest engine execution for priced instruments with risk-based actions
    evidence: gs_quant/backtests/generic_engine.py:89(GenericEngine)
  - name: PredefinedAssetEngine.run
    description: Engine execution for order-based strategies with fill simulation
    evidence: gs_quant/backtests/predefined_asset_engine.py:103(PredefinedAssetEngine)
  - name: BackTest.get_results
    description: Retrieves accumulated backtest results including trades, P&L, and risk summaries
    evidence: gs_quant/backtests/backtest_objects.py:85(BackTest)
  key_behaviors:
  - behavior: ActionHandler factory pattern
    description: Maps Action types to implementations via factory - new engines add handlers without modifying
      existing code following open/closed principle
    evidence: gs_quant/backtests/action_handler.py:46(ActionHandlerBaseFactory)
  - behavior: Mutable state accumulation
    description: BackTest is mutable state container that accumulates results across dates enabling incremental
      result inspection during backtest
    evidence: gs_quant/backtests/backtest_objects.py:85(__post_init__)
  - behavior: Deferred risk calculations
    description: calc_calls attribute enables deferring risk calculations that may need future context
      - trade exits may require future pricing date
    evidence: gs_quant/backtests/backtest_objects.py:179(calc_calls)
  - behavior: Calculation type ordering
    description: 'CalcType enum enforces execution order: simple then semi_path_dependent then path_dependent
      - path-dependent actions need prior risk results'
    evidence: gs_quant/backtests/backtest_utils.py:32-35(CalcType)
  replaceable_points:
  - name: TransactionCostModel
    description: How trading costs are calculated for each trade execution
    options:
    - name: ConstantTransactionModel
      traits:
      - Fixed cost per trade
      - Simple modeling
      fit_for:
      - Basic backtesting
      - Benchmark comparisons
      not_fit_for:
      - Market-impact sensitive strategies
      - Large trade sizing
    - name: ScaledTransactionModel
      traits:
      - Size-proportional costs
      - Market impact modeling
      fit_for:
      - Institutional strategies
      - Large position changes
      not_fit_for:
      - Small retail-like trades
      - Fixed-cost environments
    - name: AggregateTransactionModel
      traits:
      - Multi-component costs
      - Combined fee structures
      fit_for:
      - Complex fee structures
      - Multi-asset strategies
      not_fit_for:
      - Simple flat-fee brokers
    default: ConstantTransactionModel
  - name: CashAccrualModel
    description: How cash accrues during backtest holding periods
    options:
    - name: ConstantCashAccrualModel
      traits:
      - Fixed accrual rate
      - Simple coupon modeling
      fit_for:
      - Fixed income basics
      - Bond-like instruments
      not_fit_for:
      - Floating rate products
      - Variable coupons
    - name: DataCashAccrualModel
      traits:
      - Data-driven accrual
      - External rate source
      fit_for:
      - OIS-linked products
      - LIBOR transitions
      not_fit_for:
      - Fixed-coupon instruments
    - name: OisFixingCashAccrualModel
      traits:
      - OIS-based accrual
      - Risk-free rate linkage
      fit_for:
      - Swap valuation
      - Overnight-indexed products
      not_fit_for:
      - Equity positions
      - Non-rate products
    default: ConstantCashAccrualModel
  - name: BacktestEngine
    description: Engine implementation for strategy execution
    options:
    - name: GenericEngine
      traits:
      - Full feature set
      - Risk-based triggers
      - Every instrument types
      fit_for:
      - Derivatives strategies
      - Risk-managed approaches
      not_fit_for:
      - Simple order-based strategies
      - Equity-only trading
    - name: PredefinedAssetEngine
      traits:
      - Order-based execution
      - Fill simulation
      fit_for:
      - Asset allocation
      - Predefined trading rules
      not_fit_for:
      - Derivatives pricing
      - Complex risk triggers
    - name: EquityVolEngine
      traits:
      - Volatility-specific
      - Equity vol strategies
      fit_for:
      - Volatility arbitrage
      - Options-based equity strategies
      not_fit_for:
      - Rates products
      - Multi-asset portfolios
    default: GenericEngine
  design_decisions:
  - 'ActionHandler factory pattern for engine extensibility (evidence: gs_quant/backtests/action_handler.py:46(ActionHandlerBaseFactory))
    — Maps Action types to implementations - new engines add handlers without modifying existing code'
  - 'BackTest is mutable state container (evidence: gs_quant/backtests/backtest_objects.py:85(__post_init__))
    — Accumulates results across dates - enables incremental result inspection during backtest'
  - 'TransactionCostEntry is stateful wrapper (evidence: gs_quant/backtests/backtest_objects.py:586(TransactionCostEntry))
    — Links costs to CashPayments with scaling - supports hedged strategies with dynamic scaling'
  - 'BackTest.calc_calls for deferred risk calculations (evidence: gs_quant/backtests/backtest_objects.py:179(calc_calls))
    — Trade exits may need future risk calc - deferring allows proper pricing context'
  - 'RiskTriggerRequirements references backtest for state access (evidence: gs_quant/backtests/triggers.py:191(has_triggered))
    — Strategy risk triggers need backtest state - tight coupling enables complex exit logic'
  - 'default_transaction_cost returns zero cost by default (evidence: gs_quant/backtests/actions.py:50-51(default_transaction_cost))
    — Transaction costs silently ignored unless explicitly set - backtest profitability may be overstated'
  acceptance_hints:
  - BackTest requires GenericEngine or engine subclass for execution
  - Exit costs default to entry costs if not explicitly overridden
  - Partial hedges require explicit risk_percentage setting (default 100%)
  - AggregateTriggerRequirements takes max of child calc types - path_dependent dominates
- id: analytics_processing
  name: Analytics Processing
  order: 6
  responsibility: Applies analytical processors (volatility, correlation, returns) to market data with
    dependency resolution and async execution. This layer exists to provide composable, reusable analytical
    computations with automatic parallelization and shared sub-expression optimization.
  interface:
    inputs:
    - Data coordinates/entities
    - Processor parameters (windows, returns type)
    outputs:
    - ProcessorResult with computed values
    - Plot expressions
  required_methods:
  - name: BaseProcessor.process
    description: Computes the analytical function with automatic dependency graph ordering
    evidence: gs_quant/analytics/core/processor.py:83(BaseProcessor)
  - name: BaseProcessor.update
    description: Updates processor results using ProcessPoolExecutor for CPU-bound calculations
    evidence: gs_quant/analytics/core/processor.py:147(update)
  - name: DataGrid.poll
    description: Polls for live data updates without recreating grid - suitable for dashboards
    evidence: gs_quant/analytics/datagrid/datagrid.py:236(poll)
  - name: VolatilityProcessor.compute
    description: Computes rolling volatility with configurable window and returns type
    evidence: gs_quant/analytics/processors/econometrics_processors.py:42(VolatilityProcessor)
  key_behaviors:
  - behavior: Dependency graph topological ordering
    description: Processors build dependency graph before execution enabling topological ordering - shared
      sub-expressions computed once minimizing API calls
    evidence: gs_quant/analytics/core/processor.py:204(build_graph)
  - behavior: Parallel execution via ProcessPoolExecutor
    description: Update method uses ProcessPoolExecutor for CPU-bound calculations offloaded from main
      thread improving performance for large grids
    evidence: gs_quant/analytics/core/processor.py:147(update)
  - behavior: Recursive parent traversal calculation
    description: calculate() propagates up processor tree through parent references - chain breaks if
      parent reference is wrong resulting in incomplete grid calculations
    evidence: gs_quant/analytics/core/processor.py:256-286(calculate)
  - behavior: Date range masking
    description: Processor applies user-specified date filters to results ensuring consistency with query
      parameters
    evidence: gs_quant/analytics/core/processor.py:110(__handle_date_range)
  replaceable_points:
  - name: Processor type
    description: Analytical function to apply to market data
    options:
    - name: VolatilityProcessor
      traits:
      - Rolling window vol
      - Configurable returns
      fit_for:
      - Risk estimation
      - Volatility trading
      not_fit_for:
      - Trend analysis
      - Mean-reversion strategies
    - name: SharpeRatioProcessor
      traits:
      - Risk-adjusted returns
      - Rolling calculation
      fit_for:
      - Performance measurement
      - Strategy selection
      not_fit_for:
      - Single-asset analysis
      - Absolute return measurement
    - name: CorrelationProcessor
      traits:
      - Pairwise correlation
      - Rolling window
      fit_for:
      - Diversification analysis
      - Pair trading
      not_fit_for:
      - Single-asset portfolios
      - Causal relationships
    - name: ReturnsProcessor
      traits:
      - Return series computation
      - Multiple types
      fit_for:
      - P&L calculation
      - Performance attribution
      not_fit_for:
      - Risk measurement
      - Cross-sectional analysis
    - name: BetaProcessor
      traits:
      - Market sensitivity
      - Rolling regression
      fit_for:
      - CAPM analysis
      - Factor exposure
      not_fit_for:
      - Market-neutral strategies
      - Multi-factor models
    default: Processor-specific
  - name: Returns type
    description: Method for computing returns from price series
    options:
    - name: LOGARITHMIC
      traits:
      - Log returns
      - Additive over time
      - Normally distributed
      fit_for:
      - Statistical analysis
      - Multi-period returns
      not_fit_for:
      - Simple percentage comparison
      - Short-term intraday
    - name: SIMPLE
      traits:
      - Simple returns
      - Multiplicative
      - Portfolio math
      fit_for:
