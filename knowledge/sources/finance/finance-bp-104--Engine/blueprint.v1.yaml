resources:
- id: res-slot-001
  type: replaceable_component
  name: linear_algebra_backend
  path: null
  description: Currently only Eigen is supported for matrix operations
  used_in_stages: []
  options:
  - name: Eigen
    traits:
    - header-only
    - template-based
    - no GPU
    fit_for:
    - Standard CPU-based computations, cross-platform
    not_fit_for:
    - Large GPU-accelerated linear algebra
  default: Eigen
  _source: worker_resource
- id: res-slot-002
  type: replaceable_component
  name: market_data_loader
  path: null
  description: CSVLoader for file-based input, InMemoryLoader for testing
  used_in_stages: []
  options:
  - name: CSVLoader
    traits:
    - flat-file
    - text-based
    - snapshot
    fit_for:
    - Batch processing from CSV/text files
    not_fit_for:
    - Real-time streaming, database sources
  - name: InMemoryLoader
    traits:
    - in-memory
    - programmatic
    fit_for:
    - Unit testing, small datasets
    not_fit_for:
    - Large historical datasets
  default: CSVLoader
  _source: worker_resource
- id: res-slot-003
  type: replaceable_component
  name: ml_regression_model
  path: null
  description: MARS for flexibility, HNSWlib for performance at scale
  used_in_stages: []
  options:
  - name: scikit-learn models
    traits:
    - linear
    - tree
    - knn
    fit_for:
    - Standard conditional expectation regression
    not_fit_for:
    - Large-scale approximate nearest neighbor
  - name: HNSWlib
    traits:
    - approximate-nn
    - fast-search
    - memory-intensive
    fit_for:
    - Large dataset approximate nearest neighbor search
    not_fit_for:
    - Small datasets, exact results required
  - name: MARS (py-earth)
    traits:
    - multivariate-adaptive
    - spline-based
    fit_for:
    - Nonlinear regression with automatic term selection
    not_fit_for:
    - Very high-dimensional inputs
  default: pyearth (Earth model)
  _source: worker_resource
- id: res-slot-004
  type: replaceable_component
  name: compression_library
  path: null
  description: Enable zlib for compressed output files (gzipped CSVs)
  used_in_stages: []
  options:
  - name: zlib
    traits:
    - standard
    - fast
    - widely-supported
    fit_for:
    - General compression needs
    not_fit_for:
    - Very high compression ratios
  - name: none (disabled)
    traits:
    - no-compression
    fit_for:
    - Memory-constrained environments
    not_fit_for:
    - Large output files, network transfer
  default: zlib (when ORE_USE_ZLIB=ON)
  _source: worker_resource
