  stage: global
  alternative_considered: Higher-order rate conversion in BD-028 would improve PCA
    input but add computational overhead
- id: BD-060
  type: B/BA
  content: 'INTERACTION: [BD-015] × [BD-019] → Reduced sample count amplifies tolerance
    calibration requirements for MC comparisons'
  rationale: 'BD-015 uses datacompy with configurable tolerance for DataFrame equality
    while BD-019 reduces samples to 50 for regression testing. This creates an amplification
    effect where: (1) smaller sample counts increase relative MC noise, requiring
    wider tolerances, (2) BD-020''s per-example comparison_config.json becomes critical
    for managing tolerance across volatile vs stable outputs, but (3) the interaction
    between reduced samples and tolerance settings is not explicitly documented, and
    (4) changes to sample counts in BD-019 may necessitate corresponding tolerance
    adjustments in BD-020. Users may inadvertently set tolerances too tight for 50
    samples, causing false failures, or too loose for 1000+ production samples, missing
    real regressions.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Automatic tolerance scaling based on sample count would
    remove human judgment but requires statistical framework
- id: BD-061
  type: B/BA
  content: 'INTERACTION: [BD-046] × [BD-052] → Default shift=0.0 interacts with model-specific
    shift application creating inconsistent initialization'
  rationale: 'BD-046 establishes shiftHorizon defaults to 0.0 consistently across
    ALL model builders for backward compatibility, while BD-052 documents that shift
    application methodology varies across model families. This creates a contradiction
    where: (1) users expect consistent behavior from the shared default, but (2) applying
    the same default value (0.0) to LGM (via H(shiftHorizon)) versus CR-LGM (direct
    value) versus Inflation models produces mathematically different results, and
    (3) the consistency promise in BD-046 is violated at the application layer documented
    in BD-052. Users relying on default values across model families will get mathematically
    inconsistent risk metrics despite the documented consistency intention.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Model-specific defaults with explicit documentation would
    clarify behavior but break backward compatibility
- id: BD-062
  type: BA/DK
  content: 'INTERACTION: [BD-051] × [BD-010] → Mirrored FX trades required for systemic
    risk analysis but creates tension with netting set independence'
  rationale: 'BD-051 requires mirrored trade pairs for FxForward/Swap validated by
    consistent_input(), while BD-010 builds counterparty graph via networkx for systemic
    risk analysis using aggregated data. This creates a hidden tension where: (1)
    the mirroring requirement enforces explicit hedging intent but may not reflect
    actual market positions where directional exposures exist, (2) systemic risk analysis
    in BD-010 uses aggregated EEPE contributions that assume properly netted positions,
    but (3) the mirroring requirement may mask directional risk that exists in production
    portfolios, and (4) contagion modeling in BD-010 assumes mirrored positions offset
    correctly, which depends on BD-051''s validation. Without mirroring, counterparty
    exposure graphs would show different structures that affect systemic risk metrics.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Allowing non-mirrored positions would enable realistic portfolio
    modeling but requires additional contagion logic
- id: BD-063
  type: BA/DK
  content: 'INTERACTION: [BD-023] × [BD-024] × [BD-025] → MARS, HNSW, and Fourier
    features create complex interdependent ML pipeline with implicit assumptions'
  rationale: 'BD-023 uses MARS for conditional expectation estimation, BD-024 uses
    HNSW for approximate nearest neighbor search, and BD-025 uses Fourier basis features
    (order=40). This creates an amplification chain where: (1) Fourier features are
    computed as input to MARS for capturing periodic patterns, (2) HNSW provides fast
    calibration basket matching that affects which data enters the MARS training window,
    (3) BD-026''s KNN smoothing is applied to denoise market data before each other
    steps, and (4) the training window boundary documented in BD-023 must span at
    least one full market cycle for stable MARS knot selection, but HNSW recall rate
    must exceed 95% per BD-024. Errors in any stage propagate: KNN smoothing affects
    MARS quality, MARS affects basket matching downstream. The entire pipeline''s
    accuracy depends on each three components meeting their documented requirements
    simultaneously.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Decoupled pipeline with explicit validation at each stage
    would improve reliability but add latency
- id: BD-GAP-001
  type: B
  content: TradeGenerator organizes instruments into currency-segmented portfolios
    (oisPortfolio keyed by currency), enabling parallel curve bootstrapping per currency
  rationale: Currency-segmented portfolios allow independent OIS curve construction
    per currency, preventing cross-currency contamination in discount rates; breaks
    when trades have multi-currency legs or synthetic currencies are introduced
  evidence: Examples/CurveBuilding/TradeGenerator.py:423(addTradeToPortfolio)
  stage: architecture
  alternative_considered: Single unified portfolio with currency as attribute would
    require cross-currency netting assumptions
- id: BD-GAP-002
  type: B
  content: Floating legs support configurable basis spread (bool parameter) while
    fixed legs do not, reflecting the structural difference between floating coupons
    (can have basis) and fixed coupons (basis is zero)
  rationale: Basis spread on floating legs captures tenor basis and cross-currency
    basis that affects discounting; fixed legs are simpler and basis is meaningless
    by definition; breaks for exotic structures like range accruals where fixed coupons
    depend on floating indices
  evidence: Examples/CurveBuilding/TradeGenerator.py:153(CreateFloatingLeg)
  stage: design
  alternative_considered: Unified leg creation with basis=0 for fixed legs was rejected
    for API clarity
- id: BD-GAP-003
  type: B/BA
  content: Day count conventions are mapped per currency (and optionally per tenor),
    encoding the regulatory and market practice for each currency jurisdiction
  rationale: Different jurisdictions mandate different day count conventions (e.g.,
    ACT/360 for USD money markets, 30E/360 for EUR bonds); mapping at currency level
    ensures compliance with local market conventions; breaks when trading exotic currencies
    or basket-notional structures
  evidence: Examples/CurveBuilding/TradeGenerator.py:72(currencyDaycountConvention)
  stage: architecture
  alternative_considered: Global default convention would violate jurisdiction-specific
    requirements
- id: BD-GAP-004
  type: BA
  content: ORE API accepts CSV uploads for results post-processing (postCSV) rather
    than mandating structured JSON output, prioritizing analyst flexibility with spreadsheet
    tools
  rationale: Financial analysts traditionally work in Excel; CSV provides universal
    interchange format for further analysis in any tool; breaks when automated downstream
    systems require structured JSON or when CSV precision loss matters for decimal-heavy
    instruments
  evidence: Examples/ORE-API/oreApi.py:48(postCSV)
  stage: design
  alternative_considered: JSON-only output would require custom parsers in analyst
    workflows
- id: BD-GAP-005
  type: B/BA
  content: ORE API implements explicit directory traversal protection (is_directory_traversal
    check) before serving files, preventing path injection attacks on the analytics
    engine
  rationale: File serving endpoints are common attack vectors; explicit traversal
    prevention guards against malicious input that could access system files or credentials;
    breaks when legitimate paths contain encoded traversal sequences or when file
    system permissions are compromised
  evidence: Examples/ORE-API/simplefileserver.py:25(is_directory_traversal)
  stage: security
  alternative_considered: Reliance on web framework traversal protection was deemed
    insufficient for financial data sensitivity
- id: BD-GAP-006
  type: B
  content: ORE API routes analytics requests to specialized setup handlers (setupNPV,
    setupSensitivity, setupStress, setupXVA, setupExposure) rather than a generic
    handler, encoding domain-specific parameter structures per analytics type
  rationale: Domain-specific handlers enable type-safe parameter validation and appropriate
    output formatting per analytic; generic handlers would require complex conditional
    logic and lose type safety; breaks when new analytics require cross-cutting concerns
    that span multiple handlers
  evidence: Examples/ORE-API/oreApi.py:132(setupNPV)
  stage: architecture
  alternative_considered: Generic handler with analytics-type parameter would require
    extensive conditional branching
  vague_rationale: true
- id: BD-GAP-007
  type: B/RC
  content: State scenarios are stored in gzip-compressed files with separate extraction
    methods by key and date index, trading compression efficiency for random access
    by scenario dimension
  rationale: Gzip provides ~10x compression for numeric scenario data, reducing storage
    costs significantly; separate methods for fixing dates vs scenario extraction
    reflects the temporal structure of simulation outputs; breaks when scenario dimensionality
    increases beyond memory limits or when real-time access to arbitrary scenario
    subsets is required
  evidence: Examples/Performance/utilities.py:257(getStateScenarios)
  stage: design
  alternative_considered: Uncompressed HDF5 would provide faster random access but
    higher storage costs
- id: BD-GAP-008
  type: T
  content: 'Performance utilities provide dual plotting modes: individual NPV path
    visualization (plotNpvPaths) and aggregated date-level scenario extraction (getNpvScenarios),
    supporting both path-specific analysis and distribution-level reporting'
  rationale: Path-level plots reveal simulation variance and convergence behavior;
    date-level aggregation enables distribution statistics and risk metrics; separating
    these concerns allows analysts to choose appropriate visualization granularity;
    breaks when real-time Monte Carlo requires merged path+distribution views
  evidence: Examples/Performance/utilities.py:119(plotNpvPaths)
  stage: design
  alternative_considered: Single unified method would require return type branching
    based on caller intent
  vague_rationale: true
- id: BD-GAP-009
  type: T
  content: Chart generation in Excel export supports configurable row and column headers,
    allowing dynamic reorientation of data tables to match analyst spreadsheet layouts
  rationale: Financial analysts format spreadsheets differently; header flags allow
    data reorientation without ETL; breaks when charts require multi-level headers
    or merged cells
  evidence: Examples/Legacy/Example_1/Calc/calc_view.py:25(generateChart)
  stage: design
  alternative_considered: Fixed header format would require analyst post-processing
- id: BD-GAP-010
  type: T
  content: Legacy Excel integration supports multiple data import formats (CSV, XML,
    space-delimited) reflecting the heterogeneous data sources in institutional trading
    environments
  rationale: Different counterparties and systems provide data in varying formats;
    format flexibility avoids data conversion bottlenecks in trading workflows; breaks
    when binary formats (XLSB, Parquet) are required for large datasets
  evidence: Examples/Legacy/Example_1/Calc/calc_load_market.py:26(copySpaceDelimitedToSheet)
  stage: integration
  alternative_considered: Single canonical format would require upstream system changes
