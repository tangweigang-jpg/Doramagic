id: finance-bp-104
name: ORE - Open Source Risk Engine
sop_version: '3.6'
source:
  projects:
  - Engine
  commit_hash: 0b2fc17a0baa908f883808edb7b250f8c262d783
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Risk analytics engine for pricing, XVA calculation, and Monte Carlo exposure
    simulation of derivatives portfolios
  description: Enterprise-grade open source risk engine for pricing and risk analysis
    of derivatives portfolios. Supports CVA/DVA/FVA calculations, regulatory margin
    (SIMM/SA-CCR), and Monte Carlo exposure simulation.
  prerequisites: Understanding of financial derivatives (options, swaps, FRAs), XVA
    concepts (CVA, DVA, FVA), Monte Carlo simulation fundamentals, and basic XML configuration.
    QuantLib knowledge helpful.
  not_suitable_for: Simple single-instrument pricing without risk simulation needs;
    high-frequency trading scenarios requiring sub-millisecond latency; real-time
    streaming market data integration (batch-oriented architecture); non-derivatives
    portfolios (bonds, equities) without trade wrapper conversion
stages:
- id: xml_configuration
  name: XML Configuration Stage
  order: 1
  responsibility: 'Parses XML input files (ore.xml, simulation.xml, portfolio.xml)
    to define the ORE execution pipeline. WHY: Decoupled configuration enables flexible
    workflow definition without code changes, allowing non-programmers to modify execution
    behavior.'
  interface:
    inputs:
    - name: ore.xml
      description: Main ORE configuration specifying portfolio, market data sources,
        simulation, and reporting settings
    - name: portfolio.xml
      description: Trade definitions with notionals, tenors, counterparties, and netting
        set assignments
    - name: simulation.xml
      description: 'Monte Carlo parameters: dates, samples, models, random number
        generators'
    - name: conventions.xml
      description: Day count, calendar, and convention definitions for instruments
    - name: curvesconfig.xml
      description: Yield curve and volatility surface construction parameters
    outputs:
    - name: Parameters object
      description: Parsed configuration container mapping XML sections to typed parameters
    - name: OREApp instance
      description: Main execution engine initialized with Parameters for subsequent
        run() invocation
  required_methods:
  - name: Parameters.fromFile
    description: Loads XML configuration file into Parameters object with type-safe
      key-value access
    evidence: Examples/ORE-Python/ore.py:24(Parameters.fromFile)
  - name: OreExample.__init__
    description: Initializes example runner with ore.xml path, auto-locates ORE executable,
      configures dry-run and parallel settings
    evidence: Examples/ore_examples_helper.py:62(__init__)
  - name: OreExample.run
    description: Executes ORE with configured parameters, optionally skipping actual
      run if dry=True
    evidence: Examples/ore_examples_helper.py:336(run)
  key_behaviors:
  - behavior: XML-based workflow decoupled from code
    description: ORE reads XML files at runtime to configure execution pipeline without
      recompilation, enabling non-programmers to modify portfolio, simulation, or
      reporting settings
    evidence: Examples/ORE-Python/ore.py:24(Parameters.fromFile)
  - behavior: Auto-detection of ORE executable across build directories
    description: The _locate_ore_exe() method searches 15+ path patterns (Windows
      and Unix variants) to find the ore.exe binary relative to example directory
    evidence: Examples/ore_examples_helper.py:76-141(_locate_ore_exe)
  - behavior: Environment variable configuration for execution modes
    description: ORE_EXAMPLES_USE_PYTHON switches between native C++ executable and
      Python wrapper; EXAMPLES_PARALLEL controls ThreadPoolExecutor worker count
    evidence: Examples/ore_examples_helper.py:69(__init__)
  replaceable_points:
  - name: ore_exe_location
    description: Auto-detects ORE executable across build directories with platform-specific
      path patterns
    options:
    - name: ../../App/build/ore (Unix default)
      traits:
      - relative path
      - platform-native
      fit_for:
      - Standard development builds
      - CI environments with predictable directory structure
      not_fit_for:
      - Non-standard build locations
      - Containerized deployments with symlinked paths
    - name: ../../../build/App/ore (Unix alternate)
      traits:
      - relative path
      - deeper nesting
      fit_for:
      - Out-of-source builds
      - Multi-config build systems
      not_fit_for:
      - Flat build trees
      - Windows environments
    - name: /ore/App/ore (absolute)
      traits:
      - absolute path
      - container-friendly
      fit_for:
      - Docker containers
      - Installation-based deployments
      not_fit_for:
      - Development workflows with per-branch builds
    default: ../../build/App/ore
  - name: xml_configuration_file
    description: Primary ORE input file determining portfolio, simulation, and output
      configuration
    options:
    - name: Input/ore.xml
      traits:
      - standard
      - single configuration
      fit_for:
      - Standard XVA runs
      - Most production scenarios
      not_fit_for:
      - American Monte Carlo
      - Classic simulation comparison
    - name: Input/ore_amc.xml
      traits:
      - American Monte Carlo
      - early exercise support
      fit_for:
      - Bermudan swaptions
      - Callable structures with early exercise
      not_fit_for:
      - European-only portfolios
      - XVA without early exercise
    - name: Input/ore_classic.xml
      traits:
      - legacy LGM
      - backward compatibility
      fit_for:
      - Regression testing
      - Comparison with older ORE versions
      not_fit_for:
      - New projects
      - Production risk runs
    default: Input/ore.xml
  design_decisions:
  - 'XML-based configuration decouples engine from workflow definition (evidence:
    Examples/ORE-Python/ore.py:24(Parameters.fromFile)) — Enables non-programmers
    to modify workflows without recompilation; separates business logic from configuration
    concerns; supports version-controlled configuration management'
  - 'OreExample class provides unified interface for running ORE across each 50+ example
    scripts (evidence: Examples/ore_examples_helper.py:62(__init__)) — Reduces code
    duplication across example suite; provides consistent plotting and output handling;
    centralizes dry-run and parallel execution controls'
  - 'ORE_EXAMPLES_USE_PYTHON env var switches between native C++ exe and Python wrapper
    (evidence: Examples/ore_examples_helper.py:69(__init__)) — Enables testing without
    C++ build requirement; supports CI/CD scenarios; allows Python-based ORE modifications'
  acceptance_hints:
  - Parameters object contains each expected sections from XML (marketdata, simulation,
    portfolio)
  - OREApp initializes without throwing MissingResourceException for required XML
    files
  - OreExample.dry_run() returns immediately without executing ore.exe
  - Auto-detection finds ore.exe within 3 path pattern iterations on standard build
- id: market_data_loading
  name: Market Data Loading
  order: 2
  responsibility: 'Loads market data (yield curves, volatility surfaces, FX spots,
    credit curves) into ORE''s market object. WHY: Separates data ingestion from pricing
    to enable consistent revaluation and supports both file-based and programmatic
    data injection.'
  interface:
    inputs:
    - name: marketdata.txt
      description: Raw market quotes in ORE format (TYPE/NAME/EXPIRY/STRIKE/VALUE
        columns)
    - name: curves.csv
      description: Bootstrap data for yield and discount curves in CSV format
    - name: fixings.txt
      description: Historical index fixings for inflation and rate indices
    - name: todaysmarket.xml
      description: Configuration specifying which curves to build and which data source
        for each
    outputs:
    - name: Market object
      description: 'Container holding each market observables: yield curves, volatility
        surfaces, FX spots, credit curves, and swap index definitions'
  required_methods:
  - name: CSVLoader
    description: Loads market data from CSV/TSV files into ORE's loader format for
      subsequent market construction
    evidence: ORE-SWIG/test/test_loader.py:97(__init__)
  - name: InMemoryLoader
    description: Programmatically injects market data vectors (dates, values) without
      file I/O
    evidence: ORE-SWIG/test/test_loader.py:116(__init__)
  - name: Market construction
    description: Builds Market object from todaysmarket.xml configuration and loaded
      data
    evidence: ORE-SWIG/OREData-SWIG/SWIG/ored_market.i:0(Market)
  key_behaviors:
  - behavior: Loader strategy pattern abstracts data source
    description: CSVLoader reads from files for production; InMemoryLoader enables
      synthetic/test data injection without filesystem dependency
    evidence: ORE-SWIG/test/test_loader.py:11(LoaderTest)
  - behavior: CSV format enables non-programmer market data updates
    description: Curves and volatility data in CSV allows data teams to update market
      inputs without code changes or recompilation
    evidence: ORE-SWIG/test/test_loader.py:99(__init__)
  - behavior: Silent file-not-found handling in FileList parsing
    description: FileList._parse() catches FileNotFoundError and continues; missing
      files produce empty results rather than errors
    evidence: Tools/PythonOreRunner/py_ore_tools/file_lists.py:29-34(_parse)
  replaceable_points:
  - name: loader_implementation
    description: Strategy for loading market data into ORE's internal format
    options:
    - name: CSVLoader
      traits:
      - file-based
      - production-ready
      - non-programmer friendly
      fit_for:
      - Production environments
      - Batch processing
      - Data team workflows
      not_fit_for:
      - Testing with synthetic data
      - Real-time data feeds
    - name: InMemoryLoader
      traits:
      - programmatic
      - test-friendly
      - no filesystem dependency
      fit_for:
      - Unit testing
      - Synthetic scenario generation
      - Cloud deployments without file mounts
      not_fit_for:
      - Production data ingestion
      - Large historical datasets
    - name: DatabaseLoader (conceptual)
      traits:
      - API-based
      - real-time capable
      fit_for:
      - Enterprise deployments with data warehouse
      not_fit_for:
      - Standard ORE distribution
      - Simple installations
    default: CSVLoader
  design_decisions:
  - 'Loaders abstract data source (CSV vs in-memory) to allow flexible market data
    injection (evidence: ORE-SWIG/test/test_loader.py:11(LoaderTest)) — Enables testing
    with synthetic data; supports both file-based and API-based data feeds; decouples
    market data source from valuation engine'
  - 'CSV format allows non-programmers to update market data without recompilation
    (evidence: ORE-SWIG/test/test_loader.py:99(__init__)) — Reduces friction for data
    updates in production; separates data governance from code deployment'
  acceptance_hints:
  - Market object contains each expected yield curves (EUR, USD, GBP curves from curvesconfig.xml)
  - Volatility surfaces load without missing expiry/strike warnings
  - FX spots match marketdata.txt input values within floating-point tolerance
  - Loaders accept both CSV and TSV formats with header row detection
- id: pricing_npv
  name: Pricing & NPV Calculation
  order: 3
  responsibility: 'Prices trades using configured pricing engines and calculates Net
    Present Values for the entire portfolio. WHY: Core valuation step that feeds each
    downstream risk calculations, XVA, and reporting.'
  interface:
    inputs:
    - name: Portfolio of trades
      description: Collection of trade objects (swaps, options, FRAs) parsed from
        portfolio.xml
    - name: Market object
      description: Market curves, volatility surfaces, and quotes for pricing
    - name: Pricing engines
      description: Engine instances (AnalyticEuropeanEngine, HestonModel) attached
        to trades
    outputs:
    - name: NPV reports (CSV)
      description: 'Trade-level NPV values in CSV format with #Id and Date columns'
    - name: NPV cube
      description: Multi-dimensional array (trade x date x sample) of NPVs for simulation
        input
  required_methods:
  - name: VanillaOption.setPricingEngine
    description: Attaches pricing engine to option for NPV calculation
    evidence: Examples/ORE-Python/ExampleScripts/european-option.py:55(setPricingEngine)
  - name: AnalyticEuropeanEngine
    description: Black-Scholes closed-form pricing for European options
    evidence: Examples/ORE-Python/ExampleScripts/european-option.py:102(__init__)
  - name: HestonModel
    description: Stochastic volatility model for more realistic option pricing with
      vol smile
    evidence: Examples/ORE-Python/ExampleScripts/european-option.py:88(__init__)
  - name: PlainInMemoryReport.getReport
    description: Retrieves generated report by name after ORE run completes
    evidence: Examples/ORE-Python/ore.py:67(getReport)
  key_behaviors:
  - behavior: Engine pattern enables model swapping without trade modification
    description: Same trade can be priced with Black-Scholes, Heston, or Monte Carlo
      engines by swapping attached engine
    evidence: Examples/ORE-Python/ExampleScripts/european-option.py:102(setPricingEngine)
  - behavior: Reports stored in memory and retrieved by name post-execution
    description: Output generation decoupled from consumption; enables post-processing
      scripts without re-running ORE
    evidence: Examples/ORE-Python/ore.py:67(getReport)
  - behavior: EngineFactory lazy-resets builders on buildersDirty_ flag
    description: Parameter overrides set after construction require manual buildersDirty_=true
      or cache staleness may occur
    evidence: enginefactory.cpp:189-198(resetBuilders)
  replaceable_points:
  - name: pricing_engine
    description: Algorithm for instrument valuation affecting speed and accuracy
    options:
    - name: AnalyticEuropeanEngine
      traits:
      - closed-form
      - fast
      - Black-Scholes
      fit_for:
      - European options
      - Quick sensitivity analysis
      - Vanilla instruments
      not_fit_for:
      - Exotic options
      - Early exercise
      - Stochastic volatility
    - name: COSHestonEngine
      traits:
      - Fourier-based
      - Heston model
      - medium speed
      fit_for:
      - Heston model pricing
      - Vol smile calibration
      not_fit_for:
      - Local volatility
      - Jump diffusion
    - name: FdBlackScholesVanillaEngine
      traits:
      - finite difference
      - flexible boundaries
      fit_for:
      - Barrier options
      - Local volatility
      - American exercise
      not_fit_for:
      - Fast production runs
      - Large portfolio batches
    - name: MCEuropeanEngine
      traits:
      - Monte Carlo
      - high variance
      - flexible
      fit_for:
      - Complex payoffs
      - Path-dependent European
      - Model validation
      not_fit_for:
      - Real-time pricing
      - Large portfolios
    default: AnalyticEuropeanEngine
  - name: model_type
    description: Underlying stochastic process for the trade valuation
    options:
    - name: BlackScholesMertonProcess
      traits:
      - constant volatility
      - geometric Brownian motion
      fit_for:
      - Standard pricing
      - Benchmark calculations
      - Regulatory reporting
      not_fit_for:
      - Vol smile scenarios
      - Skew-sensitive products
    - name: HestonProcess
      traits:
      - stochastic volatility
      - mean-reverting
      fit_for:
      - Vol smile products
      - Long-dated options
      - Volga/vomma hedging
      not_fit_for:
      - Fast production
      - Simple European pricing
    - name: GSR (Gaussian Short Rate)
      traits:
      - multi-factor
      - yield curve
      fit_for:
      - Interest rate products
      - Swap valuation
      - XVA simulation
      not_fit_for:
      - Inflation products
      - Cross-currency swaps
    - name: MarkovFunctional
      traits:
      - market model
      - calibration-friendly
      fit_for:
      - Bermudan swaptions
      - Callable products
      not_fit_for:
      - Simple products
      - Rapid re-pricing
    default: BlackScholesMertonProcess
  design_decisions:
  - 'Engine pattern allows swapping pricing models without changing trade representation
    (evidence: Examples/ORE-Python/ExampleScripts/european-option.py:102(setPricingEngine))
    — Enables model comparison (Black-Scholes vs Heston vs Monte Carlo) on same instrument;
    supports model risk validation'
  - 'Reports stored in memory and retrieved by name after ORE run (evidence: Examples/ORE-Python/ore.py:67(getReport))
    — Decouples generation from consumption; enables post-processing scripts; supports
    multiple consumers of same output'
  - 'Every TradeBuilder subclasses must be stateless per architecture (evidence: tradefactory.hpp:39-46(AbstractTradeBuilder))
    — Stateful builders cause shared_ptr reuse bugs across concurrent portfolio builds;
    enforces thread-safety in parallel execution'
  acceptance_hints:
  - 'NPV reports contain #Id and Date columns matching portfolio trades'
  - VanillaOption.NPV() returns finite value within expected range for test inputs
  - Engine swapping (AnalyticEuropeanEngine vs MCEuropeanEngine) produces results
    within 1bp for European options
  - PlainInMemoryReport.getReport('npv') returns DataFrame with row per trade
- id: simulation_exposure
  name: Monte Carlo Simulation & Exposure
  order: 4
  responsibility: 'Runs Monte Carlo simulations to generate future exposure profiles
    for trades and netting sets. WHY: Enables XVA calculations that require full distribution
    of future portfolio values, not just point estimates.'
  interface:
    inputs:
    - name: Portfolio
      description: Trades with attached pricing engines and netting set assignments
    - name: Simulation parameters
      description: Dates, samples, random number seed, model configuration from simulation.xml
    - name: Random number generator config
      description: RNG type (Mersenne Twister), seed, anti-thetic settings
    outputs:
    - name: Exposure CSVs
      description: EPE (Expected Positive Exposure) and ENE (Expected Negative Exposure)
        files per netting set
    - name: NPV cube
      description: Multi-dimensional cube (trade x date x sample) of simulated NPVs
    - name: Netting cube
      description: Netting-set level NPVs aggregated from trade cube per simulation
        path
  required_methods:
  - name: Simulation configuration
    description: Parses simulation.xml to configure MC paths, dates, and model parameters
    evidence: Examples/Legacy/Example_1/Input/simulation.xml:0(Simulation)
  - name: Cube storage and retrieval
    description: Stores multi-dimensional NPV arrays with trade/date/sample indices
    evidence: Examples/ORE-Python/ore.py:99(Cube)
  - name: FinancialSystem.consistent_input
    description: Validates counterparty exposure network with mirrored trade pairs
    evidence: Tools/PythonOreRunner/example_systemic.py:55-90(consistent_input)
  key_behaviors:
  - behavior: Scenario file caching for efficient re-simulation
    description: Exposure simulation writes scenario files to cache market paths;
      avoids re-running expensive MC when only post-processing changes
    evidence: Examples/InitialMargin/utilities.py:47(scenarioToMarket)
  - behavior: Parallel execution via ThreadPoolExecutor
    description: Examples run in parallel using ThreadPoolExecutor with worker count
      controlled by EXAMPLES_PARALLEL env var (default 1, CI uses 16)
    evidence: Examples/Exposure/run.py:40(ThreadPoolExecutor)
  - behavior: FinancialSystem builds counterparty graph via NetworkX
    description: Analyzes counterparty exposure network for systemic risk; computes
      netting set relationships and balancedness metrics
    evidence: Tools/PythonOreRunner/example_systemic.py:22(_set_graph)
  - behavior: ShiftHorizon default varies by model type
    description: Default shiftHorizon=0.0 across each model builders (LG, CR-LGM,
      InfDK, InfJY) as architectural default
    evidence: lgmdata.cpp:129(shiftHorizon_=0.0)
  replaceable_points:
  - name: simulation_engine
    description: Monte Carlo engine variant affecting simulation methodology
    options:
    - name: Classic (LGM)
      traits:
      - single currency
      - LIBOR market model
      fit_for:
      - Standard XVA runs
      - Interest rate products
      - Backwards compatibility
      not_fit_for:
      - American exercise products
      - Cross-currency swaps
    - name: AMC (American Monte Carlo)
      traits:
      - early exercise
      - least-squares regression
      fit_for:
      - Bermudan swaptions
      - Callable bonds
      - Cancelable swaps
      not_fit_for:
      - European-only portfolios
      - Simple risk reports
    - name: AMC-CG (Covariance Gamma)
      traits:
      - gamma PnL attribution
      - pathwise method
      fit_for:
      - Greeks calculation
      - Model validation
      - P&L explain
      not_fit_for:
      - Simple exposure profiles
      - Regulatory capital
    default: Classic (LGM)
  - name: scenario_output
    description: Whether to write scenario files to disk for post-processing
    options:
    - name: scenariodump.csv (enabled)
      traits:
      - disk I/O
      - post-processing enabled
      fit_for:
      - SIMM calculation
      - What-if analysis
      - Debugging
      not_fit_for:
      - Production runs
      - Large portfolios
      - Disk space constrained
    - name: None (disabled)
      traits:
      - memory-only
      - faster execution
      fit_for:
      - Production risk runs
      - Large-scale simulation
      not_fit_for:
      - SIMM/DIM comparison
      - Post-run analysis
    default: None
  design_decisions:
  - 'Exposure simulation uses scenario files to cache market paths for efficiency
    (evidence: Examples/InitialMargin/utilities.py:47(scenarioToMarket)) — Avoids
    re-running expensive MC when only post-processing changes; enables SIMM/DIM comparison
    on same scenarios'
  - 'Parallel execution via ThreadPoolExecutor with EXAMPLES_PARALLEL env var control
    (evidence: Examples/Exposure/run.py:40(ThreadPoolExecutor)) — Reduces example
    suite runtime from hours to minutes; configurable for resource-constrained environments
    and CI limits'
  - 'FinancialSystem builds counterparty graph via NetworkX for systemic risk analysis
    (evidence: Tools/PythonOreRunner/example_systemic.py:22(_set_graph)) — Enables
    visualization of netting set relationships; identifies concentrated counterparty
    exposure; informs systemic risk limits'
  acceptance_hints:
  - EPE/ENE CSVs contain Date, NettingSetId, EPE, ENE, EEPE, ENEE columns
  - NPV cube dimensions match (num_trades x num_dates x num_samples)
  - Simulation completes within expected time (SCENARIOGENERATOR_SAMPLES=50 for regression,
    1000+ for production)
  - ScenarioToMarket successfully reconstructs Market from scenario file for post-simulation
    analysis
- id: xva_calculation
  name: XVA & Margin Calculation
  order: 5
  responsibility: 'Computes Credit Valuation Adjustment (CVA), Debt Valuation Adjustment
    (DVA), Funding Valuation Adjustment (FVA), and regulatory margins (SA-CCR, SIMM,
    DIM). WHY: Critical for trading desk P&L attribution, risk management, and regulatory
    capital compliance.'
  interface:
    inputs:
    - name: NPV cube
      description: Simulated NPVs (trade x date x sample) from exposure simulation
    - name: Netting cube
      description: Netting-set level NPVs aggregated per simulation path
    - name: Credit curves
      description: Counterparty and own default probability term structures
    - name: SIMM parameters
      description: SIMM bucket/subcurve weights from regulatory grids
    outputs:
    - name: XVA reports
      description: CVA, DVA, FVA, KVA values per trade and netting set in CSV format
    - name: SA-CCR capital figures
      description: Regulatory capital for counterparty credit risk
    - name: IM evolution CSVs
      description: Initial margin evolution over simulation dates for IM forecasting
  required_methods:
  - name: expectedSimmEvolution
    description: Computes SIMM margin requirement over each simulation samples and
      dates
    evidence: Examples/InitialMargin/utilities.py:342(expectedSimmEvolution)
  - name: netCubeFilter
    description: Extracts netting-set level NPVs from full trade-level NPV cube
    evidence: Examples/InitialMargin/utilities.py:292(netCubeFilter)
  - name: CreditPortfolioModel
    description: Generates loss distribution for capital calculation using credit
      migration
    evidence: Examples/CreditRisk/run_cpm.py:0(CreditPortfolioModel)
  key_behaviors:
  - behavior: SIMM calculation done post-simulation using scenarioToMarket pipeline
    description: Separates expensive Monte Carlo simulation from margin computation;
      enables what-if analysis without re-running MC
    evidence: Examples/InitialMargin/utilities.py:47(scenarioToMarket)
  - behavior: Multiple ORE runs with different configurations for sensitivity analysis
    description: Runs ore.xml, ore1.xml, ore2.xml variants to generate trade-level
      sensitivities and stress test results
    evidence: Examples/CreditRisk/run_cpm.py:14(run)
  - behavior: SA-CCR and CPM run as separate examples for modular capital calculation
    description: Separation allows independent execution and comparison of regulatory
      approaches (SA-CCR vs internal model)
    evidence: Examples/CreditRisk/run.py:5(cases)
  - behavior: ShiftedLognormal volatility requires explicit shift() lookup
    description: Other volatility types ignore shift parameter; using ShiftedLognormal
      without shift data causes zero shift
    evidence: irmodelbuilder.cpp:443,451,460,468
  replaceable_points:
  - name: margin_methodology
    description: Regulatory margin calculation approach for initial margin
    options:
    - name: SIMM
      traits:
      - portfolio-level
      - sensitivity-based
      - regulatory
      fit_for:
      - ISDA SIMM compliance
      - Initial margin calculation
      - Trade reporting
      not_fit_for:
      - Non-OTC derivatives
      - Bilateral margin
      - Portfolio-level optimization
    - name: DIM (Delta Initial Margin)
      traits:
      - simulation-based
      - trade-level
      fit_for:
      - Internal models
      - P&L attribution
      - What-if analysis
      not_fit_for:
      - Regulatory reporting
      - Simple portfolios
    - name: SA-CCR
      traits:
      - exposure-based
      - regulatory floor
      fit_for:
      - CCR capital calculation
      - Basel III compliance
      not_fit_for:
      - CVA capital
      - XVA optimization
    - name: CPM (Credit Portfolio Model)
      traits:
      - credit migration
      - Monte Carlo
      fit_for:
      - Internal model approval
      - Credit risk capital
      - Stress testing
      not_fit_for:
      - Standard reporting
      - Real-time calculation
    default: SIMM
  - name: evaluation_date
    description: When to evaluate portfolio for XVA calculation
    options:
    - name: Current
      traits:
      - today
      - real-time
      fit_for:
      - Current risk reporting
      - Real-time P&L
      not_fit_for:
      - Historical backtesting
      - Terminal simulation
    - name: TerminalSimulation
      traits:
      - end of simulation
      - maturity date
      fit_for:
      - Terminal XVA
      - Merton model
      - Credit risk models
      not_fit_for:
      - Current exposure
      - Real-time monitoring
    default: Current
  design_decisions:
  - 'SIMM calculation done post-simulation using scenarioToMarket pipeline (evidence:
    Examples/InitialMargin/utilities.py:47(scenarioToMarket)) — Separates expensive
    simulation from margin computation; enables what-if analysis without re-running
    MC; supports SIMM/DIM comparison on same scenarios'
  - 'Multiple ORE runs with different configurations for sensitivity analysis (evidence:
    Examples/CreditRisk/run_cpm.py:14(run)) — Enables trade-level sensitivity and
    stress testing without instrument-level reconfiguration; supports parallel execution
    for speed'
  - 'SA-CCR and CPM run as separate examples enabling modular capital calculation
    (evidence: Examples/CreditRisk/run.py:5(cases)) — Separation allows independent
    execution and comparison; supports incremental regulatory compliance; enables
    A/B testing of methodologies'
  acceptance_hints:
  - 'XVA report contains #Id, CVA, DVA, FVA, KVA columns with values matching expected
    ranges'
  - expectedSimmEvolution returns DataFrame with Date, NettingSetId, SIMM columns
