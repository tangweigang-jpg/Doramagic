- id: regression_testing
  name: Regression Testing Framework
  order: 7
  responsibility: 'Validates ORE outputs against expected results and manages test
    suite execution. WHY: Ensures numerical stability across versions, platforms,
    and configuration changes to prevent silent regressions.'
  interface:
    inputs:
    - name: ExpectedOutput/ folder
      description: Baseline output files for comparison
    - name: Output/ folder
      description: Actual output files from current run
    - name: comparison_config.json
      description: Per-file tolerances and column exclusions for comparison
    outputs:
    - name: Test pass/fail reports
      description: Pytest-compatible test results with pass/fail status per example
    - name: Diff files for failures
      description: Detailed column-by-column differences for failed comparisons
  required_methods:
  - name: TestExamples dynamic test generation
    description: Generates test methods dynamically for each example discovered in
      folder structure
    evidence: Examples/run_examples_testsuite.py:44(TestExamples)
  - name: compare_files_df
    description: DataFrame-aware comparison with per-column type handling and tolerance
      support
    evidence: Tools/PythonTools/compare_files.py:137(compare_files_df)
  key_behaviors:
  - behavior: Dynamic test generation scales with example count
    description: add_utest() creates test methods at runtime; new examples auto-included
      in regression without test code changes
    evidence: Examples/run_examples_testsuite.py:103(add_utest)
  - behavior: OVERWRITE_SCENARIOGENERATOR_SAMPLES=50 for fast regression
    description: Regression tests use 50 samples instead of production 1000+ for speed;
      trade-off between test speed and statistical significance
    evidence: Examples/run_examples_testsuite.py:65(OVERWRITE_SCENARIOGENERATOR_SAMPLES)
  - behavior: Per-example comparison_config.json allows file-specific tolerances
    description: Balances strictness with practical acceptance of known numerical
      variations; enables CI pass for floating-point noise
    evidence: Examples/run_examples_testsuite.py:82(comp_config_path)
  - behavior: Pytest -n 16 enables 16-way parallelism for example suite
    description: Massively parallel test execution reduces suite runtime; requires
      sufficient RAM for concurrent ORE processes
    evidence: Examples/run_examples_testsuite.py:140(pytest.main)
  replaceable_points:
  - name: test_parallelism
    description: Pytest -n parameter for parallel execution of example tests
    options:
    - name: 1 (sequential)
      traits:
      - single process
      - low memory
      - deterministic
      fit_for:
      - Debugging
      - Memory-constrained environments
      - Isolated failures
      not_fit_for:
      - CI pipelines
      - Full regression suite
    - name: 16 (CI standard)
      traits:
      - parallel
      - 16 workers
      fit_for:
      - CI/CD pipelines
      - Fast feedback
      - Full regression
      not_fit_for:
      - Laptop execution
      - Shared hosting
    - name: auto (CPU count)
      traits:
      - adaptive
      - system-aware
      fit_for:
      - Local development
      - Variable hardware
      not_fit_for:
      - CI with resource limits
      - Consistent timing
    default: '16'
  - name: sample_count_override
    description: SCENARIOGENERATOR_SAMPLES setting for regression testing
    options:
    - name: 50 (fast regression)
      traits:
      - fast
      - statistical noise
      fit_for:
      - CI/CD
      - Quick validation
      - Platform comparison
      not_fit_for:
      - Statistical significance
      - Production validation
    - name: 100 (balanced)
      traits:
      - moderate speed
      - better precision
      fit_for:
      - Release validation
      - Accuracy-sensitive regression
      not_fit_for:
      - Quick iteration
      - CI timeout constraints
    - name: 1000 (production)
      traits:
      - statistically significant
      - slow
      fit_for:
      - Production releases
      - Final validation
      - Regulatory
      not_fit_for:
      - CI pipelines
      - Rapid iteration
    default: '50'
  design_decisions:
  - 'Dynamic test generation allows adding examples without modifying test code (evidence:
    Examples/run_examples_testsuite.py:103(add_utest)) — Scalable test suite; new
    examples auto-included in regression; reduces maintenance burden as example count
    grows'
  - 'OVERWRITE_SCENARIOGENERATOR_SAMPLES=50 for regression testing (evidence: Examples/run_examples_testsuite.py:65(OVERWRITE_SCENARIOGENERATOR_SAMPLES))
    — Trade-off between test speed and statistical significance; exempts long-running
    examples from full simulation; enables fast CI feedback'
  - 'Per-example comparison_config.json allows file-specific tolerances and exclusions
    (evidence: Examples/run_examples_testsuite.py:82(comp_config_path)) — Balances
    strictness with practical acceptance of known numerical variations; enables cross-platform
    CI pass despite floating-point differences'
  acceptance_hints:
  - Every 50+ examples generate tests without manual registration
  - Test pass rate >= 95% on baseline platform (allow known failures in comparison_config)
  - Failed tests produce diff files with column-level granularity
  - Sequential and parallel runs produce same pass/fail results (deterministic)
data_flow:
- from_stage: xml_configuration
  to_stage: market_data_loading
  data: Parameters object specifying market data sources (marketdata.txt, curves.csv),
    conventions, and todaysmarket.xml configuration for market construction
- from_stage: market_data_loading
  to_stage: pricing_npv
  data: Market object containing yield curves, volatility surfaces, FX spots, credit
    curves, and swap index definitions for trade pricing
- from_stage: pricing_npv
  to_stage: simulation_exposure
  data: Portfolio of priced trades with attached pricing engines, initial NPV cube
    (trade x date x sample), and netting set assignments for exposure aggregation
- from_stage: simulation_exposure
  to_stage: xva_calculation
  data: NPV cube (trade x date x sample), netting cube (netting set x date x sample),
    scenario files for post-simulation SIMM calculation
- from_stage: xva_calculation
  to_stage: post_processing
  data: XVA reports (CVA, DVA, FVA per trade/netting set), margin evolution CSVs,
    credit migration files for visualization and analysis
- from_stage: simulation_exposure
  to_stage: post_processing
  data: Exposure trade CSVs (Exposure_trade_*.csv), netting set exposure CSVs (exposure_nettingset_*.csv),
    scenario dump files for analysis
- from_stage: post_processing
  to_stage: regression_testing
  data: Output CSV/JSON files with NPV, exposure, and XVA results for comparison against
    ExpectedOutput/ baseline
global_contracts:
- contract: 'Every CSV output files use #Id column for trade identifiers and Date
    column for timestamps in standard format'
  evidence: Examples/InitialMargin/utilities.py:279(row[#Id])
- contract: ORE executable location follows pattern ../../build/App/ore on Linux,
    relative to example directory, with Windows variants
  evidence: Examples/ore_examples_helper.py:115(_locate_ore_exe)
- contract: OreExample.dry flag skips actual ORE execution for dry-run testing without
    throwing errors
  evidence: Examples/ore_examples_helper.py:336(run)
- contract: Pytest with -n 16 enables 16-way parallelism for example suite execution
    via pytest-xdist
  evidence: Examples/run_examples_testsuite.py:140(pytest.main)
- contract: SCENARIOGENERATOR_SAMPLES=50 for fast regression testing, production uses
    1000+ samples for statistical significance
  evidence: Examples/run_examples_testsuite.py:65(OVERWRITE_SCENARIOGENERATOR_SAMPLES)
- contract: Market datum parsing uses TYPE/NAME/EXPIRY/STRIKE format (e.g., 'CORRELATION/RATE/INDEX1/INDEX2/1Y/ATM')
    for each market quotes
  evidence: ORE-SWIG/test/test_marketdatum.py:16(parseMarketDatum)
- contract: OreBasic.__init__ calls parse_input() but NOT parse_output(); parse_output
    must be called explicitly after run()
  evidence: ore.py:46(self.parse_input()) vs ore.py:52-60
- contract: Every TradeBuilder subclasses MUST be stateless; constructor returns shared_ptr
    without state to avoid shared_ptr reuse bugs
  evidence: tradefactory.hpp:39-46(AbstractTradeBuilder doc)
- contract: EngineFactory lazy-resets builders only when buildersDirty_ flag is set;
    initial state has dirty=true requiring manual reset for post-construction parameter
    overrides
  evidence: enginefactory.cpp:189-198(resetBuilders), enginefactory.cpp:203-204
- contract: ShiftHorizon must be non-negative (>=0) validated in ALL model builders
    but InfJyBuilder uses different logic (warning vs exception)
  evidence: lgmbuilder.cpp:135, crlgmbuilder.cpp:63 vs infjybuilder.cpp:687-693
business_decisions:
- id: BD-001
  type: BA
  content: XML-based configuration decouples engine from workflow definition
  rationale: Enables non-programmers to modify trade workflows and parameters without
    C++ recompilation; boundary is that configuration changes take effect on next
    ORE run without rebuild, reducing deployment friction in production environments
    where frequent yield curve or volatility surface updates occur.
  evidence: Examples/ORE-Python/ore.py:24(Parameters.fromFile)
  stage: xml_configuration
  alternative_considered: Hard-coded configuration with rebuild cycle was rejected
    due to slower iteration
  _evidence_issues:
  - 'FN_NOT_FOUND: Parameters.fromFile in Examples/ORE-Python/ore.py'
- id: BD-002
  type: B
  content: OreExample class provides unified interface for running ORE across each
    examples
  rationale: Reduces code duplication across 50+ example scripts by centralizing common
    run logic; boundary is that each examples must follow the OreExample interface,
    ensuring consistent output format and plotting behavior across the entire example
    suite for user predictability.
  evidence: Examples/ore_examples_helper.py:62(__init__)
  stage: xml_configuration
  alternative_considered: Individual example scripts with duplicated boilerplate were
    rejected due to maintenance burden
- id: BD-003
  type: B
  content: ORE_EXAMPLES_USE_PYTHON env var switches between native exe and Python
    wrapper
  rationale: Enables testing and development workflows without requiring C++ build
    environment; boundary is that certain native-only features (e.g., specific pricing
    engines) may not be available in Python mode, allowing CI/CD systems to run validation
    without full compilation overhead.
  evidence: Examples/ore_examples_helper.py:63(__init__)
  stage: xml_configuration
  alternative_considered: Mandatory C++ build was rejected due to CI/CD complexity
- id: BD-004
  type: BA/DK
  content: Loaders abstract data source (CSV vs in-memory) to allow flexible market
    data injection
  rationale: Enables testing with synthetic data and supports both file-based and
    API-based market data feeds; boundary is that loader implementations must produce
    consistent QuantLib-compatible data structures regardless of source, allowing
    seamless switching between test and production data sources.
  evidence: ORE-SWIG/test/test_loader.py:11(LoaderTest)
  stage: market_data_loading
  alternative_considered: Tight coupling to CSV parser was rejected due to inflexibility
    for API-based feeds
- id: BD-005
  type: B/DK
  content: CSV format allows non-programmers to update market data without recompilation
  rationale: Reduces friction for data updates in production environments by enabling
    direct CSV editing; boundary is that CSV files must conform to documented schema,
    and changes take effect on next ORE run, allowing business teams to update curves
    without developer intervention.
  evidence: ORE-SWIG/test/test_loader.py:118(setUp)
  stage: market_data_loading
  alternative_considered: Database-backed market data was rejected due to operational
    complexity
- id: BD-006
  type: B/BA
  content: Engine pattern allows swapping pricing models without changing trade representation
  rationale: Enables model comparison (Black-Scholes vs Heston vs Monte Carlo) on
    same instrument representation; boundary is that trade XML structure remains stable
    while pricing engine is configurable, allowing risk teams to compare model assumptions
    without instrument re-definition.
  evidence: Examples/ORE-Python/ExampleScripts/european-option.py:102(setPricingEngine)
  stage: pricing_npv
  alternative_considered: Model-specific trade classes were rejected due to combinatorial
    explosion
  _evidence_issues:
  - 'FN_NOT_FOUND: setPricingEngine in Examples/ORE-Python/ExampleScripts/european-option.py'
- id: BD-007
  type: BA
  content: Reports stored in memory and retrieved by name after ORE run
  rationale: Decouples report generation from consumption, enabling post-processing
    scripts to retrieve reports by name; boundary is that reports must be explicitly
    named at generation time, and retrieval occurs after full ORE execution completes,
    allowing flexible downstream analysis without modifying ORE core.
  evidence: Examples/ORE-Python/ore.py:67(getReport)
  stage: pricing_npv
  alternative_considered: Direct file system coupling was rejected due to tight coupling
    and testability issues
  _evidence_issues:
  - 'FN_NOT_FOUND: getReport in Examples/ORE-Python/ore.py'
- id: BD-008
  type: B/DK
  content: Exposure simulation uses scenario files to cache market paths for efficiency
  rationale: Avoids re-running expensive Monte Carlo simulation when only post-processing
    changes; boundary is that scenario files capture market paths at fixed time intervals,
    and caching enables side-by-side SIMM/DIM comparison without regeneration, reducing
    computational cost for iterative margin analysis.
  evidence: Examples/InitialMargin/utilities.py:47(scenarioToMarket)
  stage: simulation_exposure
  alternative_considered: On-the-fly recomputation was rejected due to prohibitive
    computational cost
- id: BD-009
  type: BA
  content: Parallel execution via ThreadPoolExecutor with EXAMPLES_PARALLEL env var
    control
  rationale: Reduces example suite runtime through parallel execution with configurable
    worker count; boundary is that parallel execution is optional and controlled via
    environment variable, allowing resource-constrained environments to disable parallelism
    while CI systems benefit from faster test runs.
  evidence: Examples/Exposure/run.py:40(ThreadPoolExecutor)
  stage: simulation_exposure
  alternative_considered: Mandatory parallelism was rejected due to CI environment
    constraints
  _evidence_issues:
  - 'FN_NOT_FOUND: ThreadPoolExecutor in Examples/Exposure/run.py'
- id: BD-010
  type: BA
  content: FinancialSystem builds counterparty graph via networkx for systemic risk
    analysis
  rationale: Enables visualization and analysis of netting set relationships and portfolio
    balancedness metrics; boundary is that systemic risk analysis operates on aggregated
    counterparty exposure data rather than individual trade details, supporting risk
    committee reporting and regulatory inquiries.
  evidence: Tools/PythonOreRunner/example_systemic.py:22(_set_graph)
  stage: simulation_exposure
  alternative_considered: Trade-level systemic analysis was rejected due to complexity
    and confidentiality concerns
- id: BD-011
  type: BA/DK
  content: SIMM calculation done post-simulation using scenarioToMarket pipeline
  rationale: Separates expensive Monte Carlo simulation from margin computation, enabling
    what-if analysis without re-running MC; boundary is that SIMM inputs must match
    scenario file timestamps, and recalculation uses cached scenarios, allowing risk
    teams to explore margin implications under different netting configurations.
  evidence: Examples/InitialMargin/utilities.py:47(scenarioToMarket)
  stage: xva_calculation
  alternative_considered: Integrated SIMM/MC was rejected due to computational coupling
- id: BD-012
  type: B
  content: Multiple ORE runs with different configurations for sensitivity analysis
    (ore.xml, ore1.xml, ore2.xml)
  rationale: Enables trade-level sensitivity and stress testing without instrument-level
    reconfiguration; boundary is that each configuration run is independent, and parameter
    variations are defined in separate XML files, allowing systematic exploration
    of risk factors (e.g., yield curve shifts, volatility perturbations) across portfolios.
  evidence: Examples/CreditRisk/run_cpm.py:14(run)
  stage: xva_calculation
  alternative_considered: Single-run multi-scenario was rejected due to XML schema
    complexity
  _evidence_issues:
  - 'FN_NOT_FOUND: run in Examples/CreditRisk/run_cpm.py'
- id: BD-013
  type: BA
  content: SA-CCR and CPM run as separate examples enabling modular capital calculation
  rationale: Separation allows independent execution and comparison of regulatory
    capital approaches; boundary is that SA-CCR and CPM are computed on identical
    underlying exposures, enabling side-by-side regulatory comparison while maintaining
    clean code boundaries for maintainability and audit trails.
  evidence: Examples/CreditRisk/run.py:5(cases)
  stage: xva_calculation
  alternative_considered: Unified capital engine was rejected due to regulatory independence
    requirements
  _evidence_issues:
  - 'FN_NOT_FOUND: cases in Examples/CreditRisk/run.py'
- id: BD-014
  type: BA/DK
  content: OutputFiles uses factory pattern from_folder() to auto-discover output
    files
  rationale: Handles variable output file sets without manual enumeration, supporting
    extensibility across examples; boundary is that file discovery relies on naming
    conventions, and new output types must follow established patterns to be auto-detected,
    allowing example developers to add outputs without modifying discovery code.
  evidence: Tools/PythonOreRunner/py_ore_tools/file_lists.py:74(from_folder)
  stage: post_processing
  alternative_considered: Hard-coded file lists were rejected due to brittle maintenance
- id: BD-015
  type: BA
  content: Comparison uses datacompy for DataFrame equality with tolerance support
  rationale: Enables regression testing with floating-point tolerance, critical for
    Monte Carlo output validation; boundary is that tolerance values are configurable
    per comparison, and the datacompy library handles numeric precision issues that
    arise from stochastic simulations, preventing false regression failures.
  evidence: Tools/PythonTools/compare_files.py:90(compare_files)
  stage: post_processing
  alternative_considered: Exact equality was rejected due to stochastic simulation
    variability
- id: BD-016
  type: B
  content: OutputPlotter extends dict for lazy loading of plot data
  rationale: Memory-efficient plotting of large exposure files without loading each
    data upfront; boundary is that plot generation triggers data loading on demand,
    and the dict-based interface provides familiar access patterns, allowing visualization
    of large MC output files that would otherwise exceed memory constraints.
  evidence: Tools/PythonOreRunner/py_ore_tools/plotter.py:8(__init__)
  stage: post_processing
  alternative_considered: Eager loading was rejected due to memory constraints for
    large exposure files
- id: BD-017
  type: B
  content: EXAMPLES_PARALLEL env var controls ThreadPoolExecutor workers for output
    processing
  rationale: Resource-aware parallelism allowing CI systems to limit CPU usage during
    test execution; boundary is that worker count is capped by available CPU cores
    and configured via environment variable, enabling consistent behavior across development
    machines and resource-constrained CI runners.
  evidence: Examples/Exposure/run.py:32(max_parallel)
  stage: post_processing
  alternative_considered: Fixed parallelism was rejected due to varied CI environment
    capabilities
  _evidence_issues:
  - 'FN_NOT_FOUND: max_parallel in Examples/Exposure/run.py'
- id: BD-018
  type: BA
  content: Dynamic test generation allows adding examples without modifying test code
  rationale: Scalable test suite where new examples are auto-included in regression
    without test code changes; boundary is that examples must follow the established
    OreExample interface to be discovered, and the dynamic discovery mechanism ensures
    comprehensive coverage as the example library grows without manual test maintenance.
  evidence: Examples/run_examples_testsuite.py:103(add_utest)
  stage: regression_testing
  alternative_considered: Static test registration was rejected due to maintenance
    burden
- id: BD-019
  type: B
  content: OVERWRITE_SCENARIOGENERATOR_SAMPLES=50 for regression testing (not 1000+
    production)
  rationale: Trade-off between test speed and statistical significance, with reduced
    sample count for faster regression runs; boundary is that regression tests use
    50 samples versus production 1000+, and the reduced count is sufficient to detect
    algorithmic regressions while exempting long-running examples from comprehensive
    MC validation.
  evidence: Examples/run_examples_testsuite.py:65(runAndRegressExample)
  stage: regression_testing
  alternative_considered: Full production samples were rejected due to prohibitive
    CI execution time
- id: BD-020
  type: BA/DK
  content: Per-example comparison_config.json allows file-specific tolerances and
    exclusions
  rationale: Balances strict regression testing with practical acceptance of known
    numerical variations across examples; boundary is that tolerance configuration
    is per-file and per-metric, allowing different sensitivity levels for volatile
    Monte Carlo outputs versus deterministic pricing results, preventing both false
    failures and missed regressions.
  evidence: Examples/run_examples_testsuite.py:82(comp_config_path)
  stage: regression_testing
  alternative_considered: Uniform tolerances were rejected due to varying numerical
    stability across outputs
  _evidence_issues:
  - 'FN_NOT_FOUND: comp_config_path in Examples/run_examples_testsuite.py'
- id: BD-021
  type: B/BA
  content: Directional graph for counterparty network
  rationale: 'Use directional graph (nx.DiGraph) to model asymmetric counterparty
    relationships where default propagation flows are directional (e.g., derivative
    claims only flow one way). Boundary: Nodes represent legal entities; edges represent
    directional credit exposures. This enables contagion modeling that respects the
    asymmetry of counterparty risk unlike undirected graphs.'
  evidence: Tools/PythonOreRunner/example_systemic.py:23(module)
  stage: Tools/PythonOreRunner
  alternative_considered: Undirected graph was rejected because it cannot capture
    the directionality of counterparty exposure claims
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Tools/PythonOreRunner/example_systemic.py'
- id: BD-022
  type: B/BA
  content: EEPE-based systemic risk contribution
  rationale: 'Normalize systemic risk contribution by Effective Expected Positive
    Exposure (EEPE) to enable comparison across counterparties of different sizes.
    Boundary: EEPE calculation assumes wrong-way risk correlations are stable. This
    supports capital allocation and SIFI surcharges by providing size-independent
    risk contribution metrics.'
  evidence: Tools/PythonOreRunner/example_systemic.py:28(compute_systemic_balancedness)
  stage: Tools/PythonOreRunner
  alternative_considered: Raw EEPE ranking was rejected because it favors large-volume
    counterparties regardless of relative systemic importance
- id: BD-023
  type: B/BA
  content: MARS for conditional expectation estimation
  rationale: 'Use Multivariate Adaptive Regression Splines (MARS) for estimating conditional
    expectations in risk factors because it automatically handles non-linearities
    and interaction effects without requiring explicit feature engineering. Boundary:
    Training window must span at least one full market cycle for stable knot selection.'
  evidence: PythonIntegration/ore_python_integration.py:139(module)
  stage: PythonIntegration
  alternative_considered: Linear regression was rejected due to inability to capture
    documented non-linear exposure curves; kernel regression was rejected for dimensionality
    scaling issues
  _evidence_issues:
  - 'FN_NOT_FOUND: module in PythonIntegration/ore_python_integration.py'
- id: BD-024
  type: B/BA
  content: HNSW approximate nearest neighbors
