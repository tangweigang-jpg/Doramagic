    on domain knowledge about event-time distribution.
  evidence: examples/royston_parmar_splines.py:29(PHSplineFitter), examples/royston_parmar_splines.py:84(WeibullFitter),
    examples/crowther_royston_clements_splines.py:15(CRCSplineFitter)
  stage: modeling
  alternative_considered: Single default model would reduce cognitive load but restrict applicable domains
  _evidence_issues:
  - 'INVALID_IDENTIFIER: PHSplineFitter), examples/royston_parmar_splines.py:84(WeibullFitter), examples/crowther_royston_clements_splines.py:15(CRCSplineFitter
    in examples/royston_parmar_splines.py'
- id: BD-GAP-004
  type: B/BA
  content: Mixture cure model explicitly models two separate cure states (labeled 'default' and 'repay')
    rather than a single cured/unrecoverable binary
  rationale: Financial context requires distinguishing between multiple terminal states with different
    economic interpretations. Separate cure components allow distinct covariate effects per outcome path.
  evidence: examples/mixture_cure_model.py:20(_cumulative_hazard)
  stage: business_logic
  alternative_considered: Single cure model conflates different recovery mechanisms
- id: BD-GAP-005
  type: DK/B
  content: Copula frailty model assumes conditional independence given shared latent frailty, with IID
    Weibull margins for each competing risk
  rationale: Frailty term captures unobserved heterogeneity (genetics, behavior) that affects both risks
    simultaneously. IID assumption within risk type is a simplifying choice; breaks when there are additional
    unobserved covariates.
  evidence: examples/copula_frailty_weibull_model.py:30(_cumulative_hazard)
  stage: modeling
  alternative_considered: Independent competing risks (no frailty) would be misspecified if shared unobservables
    exist
- id: BD-GAP-006
  type: T
  content: cure_model.py uses Weibull baseline specifically, not a general distribution, because Weibull's
    memoryless property is appropriate for cure modeling
  rationale: Weibull's shape/scale parameterization with monotonic hazard is well-suited for time-to-event
    with a surviving fraction; alternative distributions (log-normal) lack closed-form cumulative hazard.
  evidence: examples/cure_model.py:17(_cumulative_hazard)
  stage: modeling
  alternative_considered: Spline baseline would add flexibility but increase optimization complexity
- id: BD-GAP-007
  type: T
  content: Initial point creation (_create_initial_point) is delegated to subclasses rather than using
    a universal heuristic
  rationale: Different model parameterizations require different starting values; subclass control prevents
    bad initialization while enabling domain-specific warm starts. However, this creates API inconsistency
    across fitters.
  evidence: examples/crowther_royston_clements_splines.py:24(_create_initial_point), examples/royston_parmar_splines.py:43(_create_initial_point)
  stage: optimization
  alternative_considered: Central initialization (e.g., Kaplan-Meier-based) would standardize behavior
    but reduce flexibility
  _evidence_issues:
  - 'INVALID_IDENTIFIER: _create_initial_point), examples/royston_parmar_splines.py:43(_create_initial_point
    in examples/crowther_royston_clements_splines.py'
- id: BD-GAP-008
  type: DK/B
  content: haft_model.py implements a distinct model from Weibull (HAFT = Hazard Accumulation Fractional
    Time), suggesting multiplicative hazard accumulation rather than standard proportional hazards
  rationale: HAFT parameterization is used when hazard is believed to accumulate non-linearly (e.g., disease
    progression with accumulating damage). Different from Weibull which assumes monotonic cumulative effect.
  evidence: examples/haft_model.py:19(_cumulative_hazard)
  stage: modeling
  alternative_considered: Generalized gamma could capture both Weibull and log-normal shapes
