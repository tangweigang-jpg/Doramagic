# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-126
name: lifelines
sop_version: '3.6'
source:
  projects:
  - lifelines
  commit_hash: 7a8fc34a013ecd79fa405017b89e1697c1cc6e17
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Survival Analysis - Time-to-Event Modeling
  description: A Python library for estimating survival functions, hazard rates, and regression models
    (Cox PH, AFT) for censored time-to-event data, commonly used in actuarial science, clinical research,
    and customer lifetime analysis.
  prerequisites: Users need familiarity with survival analysis concepts (censoring, hazard, survival function),
    Python, pandas DataFrames, and basic statistics. Understanding of duration/event columns (T, E notation)
    is required.
  not_suitable_for: Real-time streaming data processing, deep learning integration, causal inference beyond
    Cox models, models requiring automatic feature engineering or pipelines, and users seeking sklearn-style
    transformers or preprocessing pipelines.
stages:
- id: data_input
  name: Data Input & Validation
  order: 1
  responsibility: Validates and preprocesses survival data with T (duration), E (event), and optional
    covariates. Enforces column naming contracts and censoring type detection. This stage acts as the
    gateway for each user data, preventing downstream errors from invalid inputs.
  interface:
    inputs:
    - DataFrame with duration/event columns
    - column name strings (duration_col, event_col)
    - optional weights/strata arrays
    - entry times for left-truncation
    outputs:
    - 'Validated Series: T (durations)'
    - 'Validated Series: E (events)'
    - CensoringType enum for dispatch
    - weights as float64 array
    - entry times array
  required_methods:
  - name: BaseFitter.fit
    description: Abstract fit method enforcing signature for each fitters. Validates duration/event columns,
      detects censoring type, and dispatches to specific implementation.
    evidence: lifelines/fitters/__init__.py:450(fit)
  - name: CensoringType.detect
    description: Enum-like class detecting left/right/interval censoring from data characteristics and
      method name.
    evidence: lifelines/utils/__init__.py:900(CensoringType)
  - name: _check_complete_separation
    description: Validates that no perfect separation exists between event and censor groups to prevent
      degenerate models.
    evidence: lifelines/utils/__init__.py:1100(_check_complete_separation)
  key_behaviors:
  - behavior: Duration column validation
    description: Duration column (T) must be non-negative numeric array. Raises error on negative values
      since negative durations are mathematically invalid in survival analysis.
    evidence: lifelines/fitters/__init__.py:415(_check_duration_col)
  - behavior: Event column encoding enforcement
    description: Event column (E) must be boolean or 0/1 encoded. This ensures consistent handling of
      censoring across each downstream computations.
    evidence: lifelines/fitters/__init__.py:420(_check_event_col)
  - behavior: Defensive DataFrame copying
    description: Original DataFrame is copied at fit entry to prevent mutation. This invariant appears
      in 24+ locations across each fitters.
    evidence: lifelines/fitters/__init__.py:1746(df=df.copy())
  - behavior: Strata normalization to list
    description: Strata column names stored as list even if single string provided. Normalizes user input
      into consistent internal representation.
    evidence: lifelines/fitters/coxph_fitter.py:135(__init__)
  replaceable_points:
  - name: column_validation
    description: Column validation logic can be overridden to support custom column names or validation
      rules
    options:
    - name: default_names
      traits:
      - Validates T/E columns
      - Checks non-negative durations
      - Enforces 0/1 encoding for events
      fit_for:
      - Standard datasets with 'duration' and 'event' columns
      not_fit_for:
      - Custom column naming conventions
      - Non-standard event encoding
    - name: custom_names
      traits:
      - User-defined validation
      - Override validate_duration_col_and_event_col
      fit_for:
      - Legacy datasets
      - Non-standard column naming
      not_fit_for:
      - Users wanting strict validation
      - Automated pipelines
    default: default_names
  design_decisions:
  - Duration column validated to be non-negative (lifelines/fitters/__init__.py:415) - Prevents silent
    downstream errors; negative durations are mathematically invalid in survival analysis.
  - CensoringType auto-detected from fit method name (lifelines/fitters/__init__.py:450) - Calling fit_right_censoring()
    vs fit_left_censoring() auto-sets censoring type. Reduces API surface at cost of runtime dispatch
    overhead.
  - Strata column names stored as list even if single string provided (lifelines/fitters/coxph_fitter.py:135)
    - Normalizes user input (str vs list) into consistent internal representation. Simplifies downstream
    iteration.
  - Weights cast to float64 to enable weighted MLE (lifelines/utils/__init__.py:860) - Ensures numerical
    precision for weighted maximum likelihood estimation.
  acceptance_hints:
  - fit() completes without raising validation errors on valid data
  - Negative durations raise ValueError
  - Non-boolean/non-0/1 event values raise ValueError
  - Original DataFrame is not mutated after fit()
- id: survival_curve_estimation
  name: Non-Parametric Survival Curve Estimation
  order: 2
  responsibility: Estimates survival functions S(t) without distributional assumptions using Kaplan-Meier
    estimator, or cumulative hazard via Nelson-Aalen. Handles left/right/interval censoring with appropriate
    statistical methods.
  interface:
    inputs:
    - Durations T, Events E, Entry times, Weights
    - Optional timeline array
    outputs:
    - survival_table DataFrame with at_risk/removed/observed columns
    - S(t) timeline Series indexed by time
    - H(t) cumulative hazard Series
  required_methods:
  - name: KaplanMeierFitter.fit
    description: Implements KM product-limit estimator for S(t) estimation with optional weights and strata.
    evidence: lifelines/fitters/kaplan_meier_fitter.py:1(KaplanMeierFitter)
  - name: NelsonAalenFitter.fit
    description: Implements Nelson-Aalen estimator for cumulative hazard H(t) estimation.
    evidence: lifelines/fitters/__init__.py:2500(NelsonAalenFitter)
  - name: GeneralizedGammaFitter.fit
    description: Fully parametric 3-parameter distribution for flexible survival modeling.
    evidence: lifelines/fitters/__init__.py:1800(GeneralizedGammaFitter)
  key_behaviors:
  - behavior: Survival table caching
    description: survival_table computed once per fit and cached. Repeated calls (plotting, CI computation)
      reuse computed table avoiding O(n) recomputation at cost of memory.
    evidence: lifelines/fitters/kaplan_meier_fitter.py:200(_survival_table)
  - behavior: Automatic timeline setting
    description: Timeline automatically set to unique event times if not specified. Sensible default reduces
      API boilerplate while allowing custom timelines for interpolation.
    evidence: lifelines/fitters/kaplan_meier_fitter.py:180(compute_survival_function_)
  - behavior: Interval censoring via NPMLE
    description: Interval censoring uses Non-Parametric Maximum Likelihood Estimation via expectation-maximization.
      O(n^2) complexity in intervals but handles realistic data.
    evidence: lifelines/fitters/__init__.py:2700(_npmle)
  - behavior: Default entry times
    description: Entry times default to zeros if not provided. Most survival analysis assumes immediate
      entry; left-truncation is rare in common use cases.
    evidence: lifelines/utils/__init__.py:850(_to_entries)
  replaceable_points:
  - name: confidence_interval_method
    description: Method for computing confidence intervals around survival estimates
    options:
    - name: exp_greenwood
      traits:
      - Greenwood variance formula
      - Exponential transformation
      - Asymmetric bounds
      fit_for:
      - Standard survival analysis
      - Right-censored data
      - General use
      not_fit_for:
      - Small samples
      - Near-boundary estimates
    - name: linear_approx
      traits:
      - Normal approximation
      - Symmetric bounds
      - Faster computation
      fit_for:
      - Large samples
      - Quick approximations
      not_fit_for:
      - Boundary estimates
      - Small samples
      - Heavy censoring
    default: exp_greenwood
  design_decisions:
  - survival_table computed once per fit and cached (lifelines/fitters/kaplan_meier_fitter.py:200) - Avoids
    O(n) recomputation at cost of memory for repeated access.
  - Interval censoring uses NPMLE via expectation-maximization (lifelines/fitters/__init__.py:2700) -
    NPMLE has no closed form; EM is standard approach.
  - Timeline automatically set to unique event times if not specified (lifelines/fitters/kaplan_meier_fitter.py:180)
    - Sensible default reduces API boilerplate.
  - Entry times default to zeros if not provided (lifelines/utils/__init__.py:850) - Most survival analysis
    assumes immediate entry; simplifies common case.
  acceptance_hints:
  - S(t) monotonically non-increasing
  - S(0) = 1 for each fitted models
  - survival_table contains at_risk, removed, observed columns
  - CI bands stay within [0, 1] bounds
- id: regression_fitting
  name: Regression Model Fitting
  order: 3
  responsibility: Fits semi-parametric (Cox PH) or parametric (AFT, Aalen-Additive) regression models
    relating covariates to survival time/hazard. Core optimization loop using Newton-Raphson for Cox models
    and scipy.optimize for parametric models with autograd gradients.
  interface:
    inputs:
    - DataFrame X (covariates)
    - Duration T
    - Event E
    - regressors dict
    - penalties (L1/L2)
    - strata list
    outputs:
    - Fitted coefficients (params_)
    - Variance matrix (variance_matrix_)
    - Baseline hazard/survival
    - Log-likelihood (log_likelihood_)
  required_methods:
  - name: CoxPHFitter.fit
    description: Cox proportional hazards model with Efron's tie handling, Newton-Raphson optimization,
      and Breslow baseline estimation.
    evidence: lifelines/fitters/coxph_fitter.py:32(CoxPHFitter)
  - name: WeibullAFTFitter.fit
    description: Weibull accelerated failure time model for interpretation in terms of time acceleration.
    evidence: lifelines/fitters/weibull_aft_fitter.py:1(WeibullAFTFitter)
  - name: ParametricRegressionFitter._scipy_fit
    description: Generic scipy.optimize wrapper with autograd gradients for parametric model fitting.
    evidence: lifelines/fitters/__init__.py:820(_scipy_fit)
  key_behaviors:
  - behavior: Newton-Raphson with ridged Hessian
    description: Cox PH uses Newton-Raphson with ridged Hessian for convergence. Ridge handles near-singular
      Hessian from ties/small samples. Hybrid/bisection provides global convergence guarantee.
    evidence: lifelines/fitters/__init__.py:750(_newton_raphson_update)
  - behavior: Autograd for gradient computation
    description: Parametric models use autograd for automatic differentiation of log-likelihood. Avoids
      manual derivation errors and supports custom models.
    evidence: lifelines/fitters/__init__.py:820(_scipy_fit)
  - behavior: Efron's method for tied events
    description: Efron's method approximates likelihood for ties more accurately than Breslow, without
      O(n^2) complexity of exact methods.
    evidence: lifelines/fitters/coxph_fitter.py:300(_EFRON_METHOD)
  - behavior: Batch mode for tied data optimization
    description: Separate batch_mode vs single iteration for tied data. Batch mode vectorizes tied durations
      (O(n log n) vs O(n^2)) but uses matrix exponential.
    evidence: lifelines/fitters/coxph_fitter.py:400(_batch_exponential)
  - behavior: Stratification via separate models
    description: Stratification handled by fitting separate models per stratum. No shared baseline across
      strata for interpretability.
    evidence: lifelines/fitters/coxph_fitter.py:500(_strata_hazard)
  - behavior: X normalization in parametric regression
    description: ParametricRegressionFitter._fit normalizes X by std before optimization, then un-normalizes
      params. Penalization happens on normalized values.
    evidence: lifelines/fitters/__init__.py:1844(utils.normalize)
  replaceable_points:
  - name: optimizer
    description: Scipy optimizer for parametric model fitting
    options:
    - name: SLSQP
      traits:
      - Sequential Least Squares Programming
      - Supports bounds and constraints
      fit_for:
      - Constrained optimization
      - General parametric models
      not_fit_for:
      - Unconstrained problems needing speed
      - High-dimensional spaces
    - name: L-BFGS-B
      traits:
      - Limited-memory BFGS
      - Handles bounds
      - Memory efficient
      fit_for:
      - Large problems
      - Memory-constrained environments
      not_fit_for:
      - Problems requiring constraints
      - Non-smooth objectives
    - name: Nelder-Mead
      traits:
      - Derivative-free simplex
      - Robust convergence
      fit_for:
      - Non-smooth objectives
      - Robustness-critical applications
      not_fit_for:
      - Large problems
      - Fast convergence needs
    default: SLSQP
  - name: baseline_hazard
    description: Baseline hazard estimation method for Cox PH models
    options:
    - name: breslow
      traits:
      - Non-parametric step function
      - Standard Breslow estimator
      fit_for:
      - General use
      - Right-censored data
      not_fit_for:
      - Smooth hazard estimates needed
      - Visualization clarity
    - name: spline
      traits:
      - Smooth interpolated baseline
      - Spline-based estimation
      fit_for:
      - Smooth hazard curves
      - Visualization
      not_fit_for:
      - Small samples
      - Heavy censoring
    - name: piecewise
      traits:
      - Segmented baseline hazard
      - Breakpoint-based
      fit_for:
      - Changing hazard patterns
      - Regime detection
      not_fit_for:
      - Continuous hazard assumptions
    default: breslow
  - name: tie_handling
    description: Method for handling tied event times in Cox PH
    options:
    - name: efron
      traits:
      - More accurate with ties
      - ~2x slower than Breslow
      fit_for:
      - Data with many ties
      - Accurate estimation
      not_fit_for:
      - Performance-critical applications
      - Very large datasets
    - name: breslow
      traits:
      - Faster approximation
      - Less accurate with ties
      fit_for:
      - Large datasets with few ties
      - Performance-critical
      not_fit_for:
      - Data with significant tie fractions
    default: efron
  design_decisions:
  - Newton-Raphson with ridged Hessian for Cox PH convergence (lifelines/fitters/__init__.py:750) - NR
    is standard for Cox PH; ridge handles near-singular Hessian from ties/small samples.
  - Autograd for gradient computation in parametric models (lifelines/fitters/__init__.py:820) - Auto-differentiates
    log-likelihood without closed-form derivatives. Avoids manual derivation errors.
  - Efron's method for tied event times (lifelines/fitters/coxph_fitter.py:300) - Efron approximates likelihood
    more accurately than Breslow without O(n^2) complexity.
  - Batch mode for tied data (lifelines/fitters/coxph_fitter.py:400) - O(n log n) vs O(n^2) but uses matrix
    exponential. Performance tests confirm batch wins with <30% ties.
  - Stratification by fitting separate models per stratum (lifelines/fitters/coxph_fitter.py:500) - No
    shared baseline across strata. Equivalent to interacting strata with covariates.
  - Ridge regression penalty c1=elastic net L2, c2=L2 toward zero (lifelines/utils/__init__.py:200) -
    Penalizer shrinks coefficients for stability with collinear/high-dimensional X.
  - CoxTimeVaryingFitter fits via maximum likelihood not partial likelihood (lifelines/fitters/coxph_fitter.py:2000)
    - Time-varying covariates violate proportional hazards assumption in partial likelihood.
  - safe_exp instead of np.exp for gradient computation (lifelines/utils/safe_exp.py:1) - safe_exp clips
    overflow to max_float preventing NaN in gradients for extreme covariate values.
  acceptance_hints:
  - Model converges to stable log-likelihood
  - params_ indexed by original covariate column names, not alphabetical
  - variance_matrix_ is positive semi-definite
  - log_likelihood_ increases during iterations
  - Every parametric parameters >= 1e-9
- id: statistical_inference
  name: Statistical Inference & Model Evaluation
  order: 4
  responsibility: Computes p-values, confidence intervals, concordance index, AIC, and formal hypothesis
    tests for fitted models. Enables model comparison and variable significance assessment.
  interface:
    inputs:
    - Fitted model with variance_matrix_, log_likelihood_, params_
    outputs:
    - summary DataFrame with coef/se/p-value/CI
    - StatisticalResult objects with test statistics
    - Concordance index score
  required_methods:
  - name: StatisticalResult.summary
    description: Holds test statistic, p-value, and degrees of freedom. Provides formatted output for
      hypothesis tests.
    evidence: lifelines/statistics.py:50(StatisticalResult)
  - name: concordance_index
    description: Evaluates predictive ranking quality for censored data. Measures probability that model
      ranks higher risk with shorter survival.
    evidence: lifelines/utils/concordance.py:50(concordance_index)
  - name: k_fold_cross_validation
    description: K-fold cross-validation for model comparison with configurable scoring function.
    evidence: lifelines/utils/__init__.py:1200(k_fold_cross_validation)
  - name: logrank_test
    description: Formal hypothesis test comparing survival curves between groups using Greenwood variance.
    evidence: lifelines/statistics.py:300(logrank_test)
  key_behaviors:
  - behavior: Wald CI from variance matrix
    description: Confidence intervals derived from variance_matrix via asymptotic normal theory. Standard
      Wald intervals valid asymptotically but can be poor for small samples.
    evidence: lifelines/fitters/__init__.py:650(_compute_confidence_bounds)
  - behavior: Concordance on risk scores
    description: C-index computed on predicted risk scores, not times. Works with any monotonic transformation
      of linear predictor.
    evidence: lifelines/utils/concordance.py:80(_concordance_ratio)
  - behavior: Greenwood variance in log-rank
    description: Log-rank test uses Greenwood variance accounting for censoring, not pooled variance which
      assumes no censoring.
    evidence: lifelines/statistics.py:300(logrank_test)
  replaceable_points:
  - name: scoring_method
    description: Scoring function for k-fold cross-validation
    options:
    - name: concordance_index
      traits:
      - Rank-based metric
      - Handles censoring
      - Default
      fit_for:
      - Model ranking tasks
      - Cox PH models
      not_fit_for:
      - Parametric model comparison
      - Time-varying covariates
    - name: negative_partial_log_likelihood
      traits:
      - Likelihood-based
      - Cox PH specific
      fit_for:
      - Cox model tuning
      - Penalty selection
      not_fit_for:
      - AFT models
      - Non-Cox models
    - name: mean_absolute_error
      traits:
      - Point prediction metric
      - Parametric models
      fit_for:
      - AFT model evaluation
      - Prediction accuracy focus
      not_fit_for:
      - Cox PH models
      - Ranking tasks
    default: concordance_index
  design_decisions:
  - CI derived from variance_matrix via asymptotic normal theory (lifelines/fitters/__init__.py:650) -
    Standard Wald intervals; valid asymptotically but can be poor for small samples.
  - Concordance index computed on predicted risk scores (lifelines/utils/concordance.py:80) - C-index
    measures probability correct ranking; works with any monotonic transformation.
  - Log-rank test uses Greenwood variance (lifelines/statistics.py:300) - Greenwood variance accounts
    for censoring; pooled variance assumes no censoring and is anti-conservative.
  acceptance_hints:
  - summary DataFrame contains coef, se, coefs lower/upper CI columns
  - C-index ranges from 0 to 1 with 0.5 as random baseline
  - p-values < 0.05 indicate statistical significance at 95% level
  - AIC comparison favors lower values for model selection
- id: prediction
  name: Prediction from Fitted Models
  order: 5
  responsibility: Generates survival curves, hazards, cumulative hazards, and quantiles for new individuals
    given fitted model parameters. Enables individualized predictions for risk assessment and decision
    support.
  interface:
    inputs:
    - New DataFrame X_new (covariates)
    - Timeline array
    - Fitted model params_ and baseline
    outputs:
    - DataFrame of predictions indexed by timeline
    - Median survival times
    - Percentile survival times
  required_methods:
  - name: predict_survival_function
    description: Predict S(t|x) for new individuals. Returns DataFrame with rows as individuals and columns
      as timeline values.
    evidence: lifelines/fitters/__init__.py:1000(predict_survival_function)
  - name: predict_hazard
    description: Predict h(t|x) instantaneous hazard for new individuals.
    evidence: lifelines/fitters/__init__.py:1050(predict_hazard)
  - name: predict_cumulative_hazard
    description: Predict H(t|x) cumulative hazard for new individuals.
    evidence: lifelines/fitters/__init__.py:1060(predict_cumulative_hazard)
  - name: median_survival_times
    description: Compute median survival time from survival function using S(t)=0.5 interpolation.
    evidence: lifelines/utils/__init__.py:500(median_survival_times)
  key_behaviors:
  - behavior: Column subset validation
    description: Predictions require column subset of training regressors. Regressors dict maps parameter
      names to formulas; predictions must provide values for beta covariates.
    evidence: lifelines/fitters/__init__.py:1020(predict)
  - behavior: Censoring-adjusted median interpolation
    description: Median uses linear interpolation between nearest time points. Returns inf if curve never
      crosses 0.5 (common with heavy censoring).
    evidence: lifelines/utils/__init__.py:520(median_survival_times)
  - behavior: Central values from median/mode
    description: _compute_central_values uses Median(numeric)/Mode(categorical) as baseline for partial
      effects plots.
    evidence: lifelines/fitters/__init__.py:1272(_compute_central_values)
  replaceable_points:
  - name: prediction_method
    description: Type of prediction to generate from regression models
    options:
    - name: survival_function
      traits:
      - S(t|x) estimates
      - Full curve
      - Most common
      fit_for:
      - Individual risk assessment
      - Time-to-event prediction
      not_fit_for:
      - Single number summaries
      - Ranking tasks
    - name: hazard
      traits:
      - Instantaneous h(t|x)
      - Rate interpretation
      fit_for:
      - Rate-based analysis
      - Proportional hazards interpretation
      not_fit_for:
      - Cumulative metrics
      - AFT models
    - name: cumulative_hazard
      traits:
      - H(t|x) integrated hazard
      - Risk accumulation
      fit_for:
      - Total risk over time
      - AFT model interpretation
      not_fit_for:
      - Instantaneous rates
    - name: median
      traits:
      - Single value summary
      - 50th percentile survival time
      fit_for:
      - Quick comparison
      - Summary statistics
      not_fit_for:
      - Heterogeneous populations
      - Heavy censoring
    - name: linear_predictor
      traits:
      - Beta^T X
      - Log hazard ratio
      fit_for:
      - Risk ranking
      - Cox PH interpretation
      not_fit_for:
      - Absolute time prediction
    default: survival_function
  design_decisions:
  - Predictions require column subset of training regressors (lifelines/fitters/__init__.py:1020) - Regressors
    dict maps parameter names to formulas; predictions must provide values for beta covariates.
  - Censoring-adjusted median uses S(t)=0.5 interpolation (lifelines/utils/__init__.py:520) - Linear interpolation
    between nearest time points. Returns inf if curve never crosses 0.5.
  acceptance_hints:
  - Predicted survival functions are monotonically non-increasing
  - S(0) = 1 for each predictions
  - Predictions respect linear predictor sign (higher X -> lower S for positive beta)
  - Median predictions return inf when S(t) > 0.5 for each t
- id: visualization
  name: Visualization
  order: 6
  responsibility: Plots survival curves, cumulative hazards, residuals, and QQ plots using matplotlib.
    Integrates with fitted models via plot() method and provides annotation utilities for clinical/administrative
    reporting.
  interface:
    inputs:
    - Fitted model or raw T/E arrays
    - matplotlib ax object
    - timeline array
    - confidence interval settings
    outputs:
    - Modified matplotlib Axes object with plotted curves
    - At-risk count annotations
  required_methods:
  - name: plot_survival_function
    description: Plot KM or parametric survival curves with optional confidence interval bands.
    evidence: lifelines/plotting.py:200(plot_survival_function)
  - name: add_at_risk_counts
    description: Annotate survival plot with at-risk numbers below x-axis for clinical trial reporting.
    evidence: lifelines/plotting.py:400(add_at_risk_counts)
  - name: qq_plot
    description: QQ plot comparing fitted parametric distribution to empirical distribution for goodness-of-fit
      assessment.
    evidence: lifelines/plotting.py:600(qq_plot)
  key_behaviors:
  - behavior: Class name to scipy distribution mapping
    description: Model class name used to map to scipy distribution in qq_plot. Transforms 'WeibullAFTFitter'
      -> 'weibull' -> scipy 'weibull_min'. Avoids explicit dispatch table.
    evidence: lifelines/plotting.py:35(get_distribution_name_of_lifelines_model)
  - behavior: Log-transformed CI bands
    description: CI bands computed as S(t)^exp(±1.96*se/log(S(t))) for KM. Log-transform preserves boundary
      at 1.0 and handles asymmetry.
    evidence: lifelines/plotting.py:250(_add_ci_band)
  - behavior: CensoringType affects plot behavior
    description: Plotting, calibration, and qq_plot check censoring type at runtime via CensoringType
      Enum. Wrong type causes silent wrong results.
    evidence: lifelines/utils/__init__.py:45(CensoringType class)
  replaceable_points:
  - name: plot_style
    description: How to display confidence interval bands
    options:
    - name: fill
      traits:
      - Shaded region between bounds
      - Default
      fit_for:
      - Standard plots
      - Publication quality
      not_fit_for:
      - Black/white printing
      - Overlapping multiple curves
    - name: line
      traits:
      - Dashed boundary lines
      fit_for:
      - Multiple overlapping curves
      - Color printing
      not_fit_for:
      - Single curve clarity
    - name: none
      traits:
      - No confidence intervals shown
      fit_for:
      - Clean plots
      - Emphasis on point estimates
      not_fit_for:
      - Uncertainty communication
    default: fill
  design_decisions:
  - Model class name used to map to scipy distribution in qq_plot (lifelines/plotting.py:35) - Transforms
    'WeibullAFTFitter' -> 'weibull' -> scipy 'weibull_min'. Avoids explicit dispatch table at cost of
    string parsing.
  - CI bands computed as S(t)^exp(±1.96*se/log(S(t))) for KM (lifelines/plotting.py:250) - Log-transform
    preserves boundary at 1.0 and handles asymmetry.
  acceptance_hints:
  - Plots render without errors on fitted models
  - CI bands stay within [0, 1] for survival curves
  - qq_plot produces valid quantiles for parametric models with _KNOWN_MODEL=True
  - At-risk counts match survival table at-risk column
data_flow:
- from_stage: data_input
  to_stage: survival_curve_estimation
