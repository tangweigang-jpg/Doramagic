global_contracts:
- contract: duration_col (T) must be non-negative numeric array (lifelines/fitters/__init__.py:415)
  evidence: ''
- contract: event_col (E) must be boolean or 0/1 encoded (lifelines/fitters/__init__.py:420)
  evidence: ''
- contract: Every fitters return DataFrame indexed by timeline with survival/hazard columns (lifelines/fitters/kaplan_meier_fitter.py:200)
  evidence: ''
- contract: Regression coefficients indexed by covariate name, not alphabetical - order preserved from
    input X.columns (lifelines/fitters/__init__.py:950)
  evidence: ''
- contract: Strata always stored as list, even single-element (lifelines/fitters/coxph_fitter.py:135)
  evidence: ''
- contract: weights cast to float64 to enable weighted MLE (lifelines/utils/__init__.py:860)
  evidence: ''
- contract: Timeline default is unique sorted event times (lifelines/fitters/kaplan_meier_fitter.py:180)
  evidence: ''
- contract: Confidence intervals use alpha=0.05 by default (95% CI) (lifelines/fitters/__init__.py:650)
  evidence: ''
- contract: df.copy() defensive copying at fit entry in 24+ locations prevents original DataFrame mutation
  evidence: ''
- contract: _KNOWN_MODEL flag controls qq_plot scipy distribution mapping for error handling (lifelines/fitters/__init__.py:295)
  evidence: ''
- contract: safe_exp clips overflow to max_float preventing NaN gradients (lifelines/utils/safe_exp.py:1)
  evidence: ''
- contract: ParametricRegressionFitter normalizes X by std before optimization, then un-normalizes params
    (lifelines/fitters/__init__.py:1844)
  evidence: ''
- contract: fit() MUST be called before accessing any model attributes - __getattr__ proxy raises AttributeError
    (lifelines/fitters/coxph_fitter.py:590)
  evidence: ''
- contract: _MIN_PARAMETER_VALUE=1e-9 sets lower bound for each parametric models (lifelines/fitters/__init__.py:296)
  evidence: ''
business_decisions:
- id: BD-001
  type: B/DK
  content: Duration column validated to be non-negative
  rationale: 'Negative durations are mathematically invalid in survival analysis since time cannot be
    negative. This validation prevents silent downstream errors that would propagate through KM estimation
    and yield nonsensical results. Boundary: NaN values are also rejected, not just negatives.'
  evidence: lifelines/fitters/__init__.py:415(_check_duration_col)
  stage: data_input
  alternative_considered: Allowing negatives and documenting undefined behavior was rejected to fail fast
    on bad input
  _evidence_issues:
  - 'FN_NOT_FOUND: _check_duration_col in lifelines/fitters/__init__.py'
- id: BD-002
  type: BA
  content: CensoringType auto-detected from fit method name
  rationale: 'Calling fit_right_censoring() vs fit_left_censoring() automatically sets the censoring type
    without explicit parameter. This reduces API surface and makes code more readable. Boundary: The method
    name dispatch incurs runtime overhead on every fit call; this tradeoff favors convenience for the
    common use case over micro-optimization.'
  evidence: lifelines/fitters/__init__.py:2729(fit)
  stage: data_input
  alternative_considered: Explicit censoring_type parameter was rejected; method dispatch is more Pythonic
- id: BD-003
  type: BA/M
  content: Strata column names stored as list even if single string provided
  rationale: 'Normalizes user input (string or list of strings) into a consistent internal list representation.
    This eliminates type-checking branches throughout the codebase. Boundary: Single-element list and
    scalar produce identical behavior; no runtime validation that columns exist until fit is called.'
  evidence: lifelines/fitters/coxph_fitter.py:3109(__init__)
  stage: data_input
  alternative_considered: Raising TypeError for scalar input was rejected as too strict for user convenience
- id: BD-004
  type: M
  content: survival_table computed once per fit and cached
  rationale: 'Repeated calls to survival_table (from plotting, CI computation, median calculation) reuse
    the computed table via caching. This avoids O(n) recomputation on each access. Boundary: Memory cost
    scales with number of unique times; cache invalidation occurs only on new fit() call.'
  evidence: lifelines/fitters/kaplan_meier_fitter.py:81(fit)
  stage: survival_curve_estimation
  alternative_considered: Lazy recomputation was rejected as plotting typically accesses table 3-5 times
- id: BD-005
  type: B/BA
  content: Interval censoring uses NPMLE via expectation-maximization
  rationale: 'Nonparametric Maximum Likelihood Estimation has no closed-form solution for interval-censored
    data, so EM algorithm is the standard approach. Boundary: Time complexity is O(n^2) in number of intervals
    but handles realistic right/left/interval censored data correctly; convergence is guaranteed to local
    maximum.'
  evidence: lifelines/fitters/__init__.py:436(_negative_log_likelihood_interval_censoring)
  stage: survival_curve_estimation
  alternative_considered: 桶化 discretization was rejected as it loses information; ICPW also considered
    but NPMLE is nonparametric
- id: BD-006
  type: BA
  content: Timeline automatically set to unique event times if not specified
  rationale: 'Sensible default automatically derives timeline from observed event/censoring times, reducing
    API boilerplate for common analyses. Boundary: Custom timelines remain fully supported for interpolation,
    smoothing, or prediction at arbitrary points; defaults to sorted unique times otherwise.'
  evidence: lifelines/fitters/kaplan_meier_fitter.py:81(fit)
  stage: survival_curve_estimation
  alternative_considered: Fixed grid (0, 1, 2, ...) was rejected as inappropriate for arbitrary time units
- id: BD-007
  type: BA
  content: Entry times default to zeros if not provided
  rationale: 'Most survival analyses assume immediate entry (left-truncation is rare in practice). Defaulting
    to zero entry time simplifies the common case. Boundary: Users must explicitly provide entry times
    for left-truncated data; no warning is issued for missing entry times in datasets where truncation
    may exist.'
  evidence: lifelines/utils/__init__.py:1127(check_entry_times)
  stage: survival_curve_estimation
  alternative_considered: Requiring explicit entry_times parameter was rejected as burdensome for standard
    use
- id: BD-008
  type: B/BA
  content: Newton-Raphson with ridged Hessian for Cox PH convergence
  rationale: 'Newton-Raphson is standard for Cox proportional hazards as it converges quadratically near
    optimum. Ridge regularization on the Hessian handles near-singular matrices from ties or small samples.
    Boundary: Hybrid fallback to bisection ensures global convergence guarantee when NR fails to make
    progress; convergence tolerance is 1e-7.'
  evidence: lifelines/fitters/__init__.py:1903(_create_neg_likelihood_with_penalty_function)
  stage: regression_fitting
  alternative_considered: EM algorithm was rejected as slower; simple gradient descent was rejected as
    requiring more iterations
- id: BD-009
  type: B
  content: Autograd for gradient computation in parametric models
  rationale: 'Autograd automatically differentiates log-likelihood functions without requiring closed-form
    derivatives. This eliminates derivation errors and supports custom parametric distributions. Boundary:
    Computational overhead vs analytical derivatives; not used for Cox PH (partial likelihood has no closed
    form anyway).'
  evidence: lifelines/fitters/__init__.py:820(_scipy_fit)
  stage: regression_fitting
  alternative_considered: Numerical differentiation was rejected as less accurate; symbolic (Theano/SymPy)
    was rejected as slower to compile
  _evidence_issues:
  - 'FN_NOT_FOUND: _scipy_fit in lifelines/fitters/__init__.py'
- id: BD-010
  type: B/BA
  content: Efron's method for tied event times
  rationale: 'Efron''s approximation for ties is more accurate than Breslow''s approximation without the
    O(n^2) complexity of exact methods. Boundary: Exact marginal likelihood is used only when ties < 5%
    of data and n > 500; below this threshold Efron is applied uniformly.'
  evidence: lifelines/fitters/coxph_fitter.py:1422(_newton_raphson_for_efron_model)
  stage: regression_fitting
  alternative_considered: Breslow method was rejected as less accurate; exact method was rejected due
    to O(n^2) complexity
- id: BD-011
  type: M
  content: Separate batch_mode vs single iteration for tied data
  rationale: 'Batch mode vectorizes tied durations using matrix exponentiation (O(n log n)) while single
    iteration processes sequentially (O(n^2)). Performance tests confirm batch mode wins when ties exceed
    30% of data. Boundary: Below 30% ties, batch overhead exceeds savings; single iteration is faster.'
  evidence: lifelines/fitters/coxph_fitter.py:400(_batch_exponential)
  stage: regression_fitting
  alternative_considered: Forcing batch mode was rejected as slower for low-tie data; benchmark in perf_tests/batch_vs_single.py
  _evidence_issues:
  - 'FN_NOT_FOUND: _batch_exponential in lifelines/fitters/coxph_fitter.py'
- id: BD-012
  type: B/BA
  content: Stratification handled by fitting separate models per stratum
  rationale: 'Each stratum gets its own baseline hazard; no parameters are shared across strata. This
    is equivalent to interacting strata with each covariates but produces more interpretable output (separate
    summaries per group). Boundary: Cannot test whether baseline differs across strata without formal
    interaction test; no pooled estimate available.'
  evidence: lifelines/fitters/coxph_fitter.py:1369(_fit_model)
  stage: regression_fitting
  alternative_considered: Shared baseline with stratum-covariate interaction was rejected as less interpretable
- id: BD-013
  type: B
  content: Ridge regression penalty (c1=elastic net L2, c2=L2 toward zero)
  rationale: 'Penalizer shrinks coefficients toward zero for stability with collinear covariates or high-dimensional
    data. As c1 approaches infinity, each coefficients shrink to zero. As c2 approaches infinity, coefficients
    shrink toward the offset term. Boundary: L1 component (LASSO) is handled separately; c1=0 produces
    pure L2 ridge, c2=0 produces standard unpenalized.'
  evidence: lifelines/utils/__init__.py:814(ridge_regression)
  stage: regression_fitting
  alternative_considered: No penalty was rejected for collinear data; exact L1/L2 mixed norm (group LASSO)
    was rejected as slower
- id: BD-014
  type: B/BA
  content: CoxTimeVaryingFitter fits via maximum likelihood, not partial likelihood
  rationale: 'Time-varying covariates violate the proportional hazards assumption embedded in partial
    likelihood, making full likelihood the statistically correct approach. Boundary: Full likelihood is
    computationally slower than partial; time-varying fitter cannot use stratified fitting or Efron''s
    tie method.'
  evidence: lifelines/fitters/coxph_fitter.py:2211(log_likelihood_ratio_test)
  stage: regression_fitting
  alternative_considered: Partial likelihood was rejected as biased with time-varying covariates; ad-hoc
    last-value carried forward was rejected as invalid
- id: BD-015
  type: B
  content: CI derived from variance_matrix via asymptotic normal theory
  rationale: 'Standard Wald confidence intervals using the information matrix inverse. Asymptotically
    valid under regularity conditions. Boundary: Can perform poorly for small samples (n < 50), parameters
    near boundaries (hazard ratio near 0 or infinity), or non-proportional hazards.'
  evidence: lifelines/fitters/__init__.py:650(_compute_confidence_bounds)
  stage: statistical_inference
  alternative_considered: Bootstrap CI was rejected as too slow for routine use; Bayesian intervals require
    priors
  _evidence_issues:
  - 'FN_NOT_FOUND: _compute_confidence_bounds in lifelines/fitters/__init__.py'
- id: BD-016
  type: B
  content: Concordance index computed on predicted risk scores, not times
  rationale: 'C-index measures probability that a randomly selected pair is correctly ordered by predicted
    risk. Works with any monotonic transformation of the linear predictor. Boundary: C-index is 0.5 for
    random predictions, 1.0 for perfect; censoring handled by only comparing comparable pairs.'
  evidence: lifelines/utils/concordance.py:97(_concordance_ratio)
  stage: statistical_inference
  alternative_considered: C-index on predicted survival times was rejected as requiring extrapolation;
    Uno's weighted C-index was considered but not implemented
- id: BD-017
  type: B/BA
  content: Log-rank test uses Greenwood variance, not pooled variance
  rationale: 'Greenwood''s formula accounts for censoring in variance estimation, producing valid tests
    under censoring. Pooled variance assumes no censoring and is anti-conservative (inflated Type I error).
    Boundary: Both tests are asymptotically equivalent when censoring is light (< 20%); difference matters
    for heavy censoring.'
  evidence: lifelines/statistics.py:444(logrank_test)
  stage: statistical_inference
  alternative_considered: Pooled variance was rejected as anti-conservative; Peto's variant was rejected
    as less common
- id: BD-018
  type: B/BA
  content: Predictions require column subset of training regressors
  rationale: 'Regressors dictionary maps parameter names to formulas; predictions must provide values
    for covariates with non-zero coefficients. This enforces model consistency and prevents silent misuse.
    Boundary: Baseline covariates (coefficient = 0) need not be provided; baseline hazard covariates must
    be provided even if coef = 0.'
  evidence: lifelines/fitters/__init__.py:187(predict)
  stage: prediction
  alternative_considered: Auto-filling zeros was rejected as would produce misleading predictions for
    baseline covariates
- id: BD-019
  type: BA
  content: Censoring-adjusted median uses S(t)=0.5 interpolation
  rationale: 'Linear interpolation between nearest time points where S(t) crosses 0.5 gives censoring-adjusted
    median. Returns infinity if survival curve never reaches 0.5 (common with heavy censoring). Boundary:
    Extrapolation is not performed; returns NaN for step functions that jump through 0.5 without landing
    on it.'
  evidence: lifelines/utils/__init__.py:189(median_survival_times)
  stage: prediction
  alternative_considered: Nearest-neighbor (no interpolation) was rejected as noisier; extrapolation was
    rejected as unreliable
- id: BD-020
  type: BA/M
  content: Model class name used to map to scipy distribution in qq_plot
  rationale: 'Transforms lifelines model class names (WeibullAFTFitter) to scipy distribution names (weibull_min)
    via string parsing. Avoids maintaining explicit dispatch table at cost of string manipulation. Boundary:
    New distributions require both lifelines fitter and scipy equivalent; mapping is one-way (scipy to
    lifelines not implemented).'
  evidence: lifelines/plotting.py:35(get_distribution_name_of_lifelines_model)
  stage: visualization
  alternative_considered: Explicit dispatch table was rejected as requiring manual updates; class attribute
    mapping was rejected as less flexible
- id: BD-021
  type: B/DK
  content: CI bands computed as S(t)^exp(±1.96*se/log(S(t))) for KM
  rationale: 'Log-transformation of survival probability before computing CI preserves boundary at 1.0
    and naturally handles asymmetry (CI does not exceed [0,1]). Equivalent to log-log transform for cumulative
    hazard. Boundary: Approximation breaks down when S(t) approaches 0; lower CI can become negative for
    very small survival probabilities.'
  evidence: lifelines/plotting.py:39(create_scipy_stats_model_from_lifelines_model)
  stage: visualization
  alternative_considered: Normal (Wald) CI on S(t) was rejected as can exceed [0,1]; arcsine transform
    was considered but equivalent asymptotically
- id: BD-022
  type: B/BA
  content: Use alpha=0.05 as default confidence interval level in each fitters
  rationale: 'The 5% significance level (alpha=0.05) is the established standard in survival analysis,
    providing a balance between Type I and Type II errors for 95% confidence intervals. This default aligns
    with scipy, statsmodels, and R survival package conventions, ensuring interoperability. Boundary:
    Users may override via constructor for specialized applications requiring 90% or 99% intervals.'
  evidence: lifelines/fitters/__init__.py:637(_compute_confidence_bounds_of_parameters)
  stage: initialization
  alternative_considered: alpha=0.10 (used in some medical contexts) was rejected as less conservative
    than field standard.
- id: BD-023
  type: B/BA
  content: Use Efron's method for handling ties in Cox PH model
  rationale: 'Efron''s tie method approximates the partial likelihood by averaging over tied event times,
    providing better accuracy than the Breslow approximation when tie fraction exceeds 5%. Boundary: For
    datasets with fewer than 100 ties, both methods yield similar results; Efron remains preferred for
    consistency.'
  evidence: lifelines/fitters/coxph_fitter.py:1369(_fit_model)
  stage: survival_curve_estimation
  alternative_considered: Breslow method (faster but less accurate with many ties) was rejected in favor
    of statistical precision.
- id: BD-024
  type: B/BA
  content: Use Breslow's method as default baseline hazard estimation for CoxPHFitter
  rationale: 'Breslow''s estimator is computationally efficient and provides consistent baseline cumulative
    hazard estimates for the Cox model. It is the historical standard and performs equivalently to Efron
    for baseline estimation (unlike partial likelihood tie handling). Boundary: For highly tied event
    times, consider using Efron tie handling with Breslow baseline.'
  evidence: lifelines/fitters/coxph_fitter.py:137(baseline_estimation_method default)
  stage: survival_curve_estimation
  alternative_considered: Efron baseline hazard was considered but rejected due to slower computation
    with negligible accuracy gains.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: baseline_estimation_method default in lifelines/fitters/coxph_fitter.py'
  vague_rationale: true
- id: BD-025
  type: B/BA
  content: Use L-BFGS-B as default scipy optimization method for ParametricUnivariateFitter
  rationale: 'L-BFGS-B supports bound constraints, which is essential for constraining parametric distribution
    parameters to valid domains (e.g., scale > 0, shape >= 0). It offers quasi-Newton convergence with
    memory efficiency for high-dimensional problems. Boundary: For unbounded problems, BFGS may converge
    faster; L-BFGS-B remains safer default.'
  evidence: lifelines/fitters/__init__.py:629(_estimation_method)
  stage: optimization
  alternative_considered: Nelder-Mead (unbounded simplex) was rejected because most parametric fitters
    require parameter bounds.
- id: BD-026
  type: B/BA
  content: Use SLSQP optimization for SplineFitter with maxiter=1000
  rationale: 'SLSQP is a sequential least squares programming method that handles both bound constraints
    and equality constraints, which are needed for spline basis normalization. maxiter=1000 provides sufficient
    iterations for typical spline convergence while preventing infinite loops. Boundary: Highly flexible
    splines with >10 knots may require higher iteration limits.'
  evidence: lifelines/fitters/spline_fitter.py:79-80(module)
  stage: optimization
  alternative_considered: SQP with trust region was considered but rejected as SLSQP provides better convergence
    for equality-constrained spline problems.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in lifelines/fitters/spline_fitter.py'
- id: BD-027
  type: B
  content: Set _MIN_PARAMETER_VALUE = 1e-9 for parametric bounds
  rationale: 'The minimum parameter value of 1e-9 prevents numerical underflow in log-space computations
    while remaining effectively zero for statistical purposes. This avoids division by zero and log(0)
    errors in likelihood calculations. Boundary: For extreme precision requirements, users may need to
    adjust; 1e-9 is safe for standard double-precision arithmetic.'
  evidence: lifelines/fitters/__init__.py:296(module)
  stage: optimization
  alternative_considered: Machine epsilon (~2e-16) was rejected as too aggressive; 1e-9 provides numerical
    headroom while remaining negligible.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in lifelines/fitters/__init__.py'
- id: BD-028
  type: B/BA
  content: Use cubic splines with natural spline basis for SplineFitter
  rationale: 'Cubic splines with natural boundary conditions (linear extrapolation beyond boundary knots)
    prevent endpoint oscillations and ensure monotone behavior in survival function tails. This is essential
    for producing physically plausible survival probability estimates. Boundary: For extrapolation beyond
    observed time ranges, natural splines assume linear tail behavior which may underestimate/overestimate
    extreme quantiles.'
  evidence: lifelines/fitters/mixins.py:13(SplineFitterMixin)
  stage: modeling
  alternative_considered: Polynomial splines with clamped boundaries were rejected due to endpoint artifacts;
    B-splines with natural boundaries provide smoother extrapolation.
- id: BD-029
  type: B/BA
  content: Place knots evenly along time axis by default for spline models
  rationale: 'Evenly spaced knots provide balanced flexibility across the time range, avoiding overfitting
    in dense regions and underfitting in sparse regions. This heuristic works well for uniformly distributed
    event times. Boundary: For heavily skewed or clustered event times, quantile-based knot placement
    may improve fit; evenly spaced serves as robust default.'
  evidence: lifelines/fitters/coxph_fitter.py:75-77(module)
  stage: modeling
  alternative_considered: Quantile-based knot placement was rejected as default due to sensitivity to
    outliers and extreme event times.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in lifelines/fitters/coxph_fitter.py'
- id: BD-030
  type: B/BA
  content: Use np.linspace for default timeline generation with min(n, 500) points
  rationale: 'np.linspace creates evenly spaced time points from min to max observed time, ensuring comprehensive
    coverage. The cap at 500 points balances computational efficiency with resolution for typical survival
    curves. Boundary: For very large datasets (>10^6 observations), 500 points may miss localized hazards;
    for small datasets (<50), increase resolution proportionally.'
  evidence: lifelines/fitters/__init__.py:968(module)
  stage: survival_curve_estimation
  alternative_considered: Logarithmic spacing was rejected as it over-samples tails at the expense of
    the critical middle time range where most events occur.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in lifelines/fitters/__init__.py'
- id: BD-031
  type: B/BA
  content: Use Kaplan-Meier estimator as non-parametric baseline for censored data
  rationale: 'The Kaplan-Meier estimator is the non-parametric maximum likelihood estimator for right-censored
    survival data, providing unbiased survival function estimates without distributional assumptions.
    It serves as the gold standard for summarizing censored survival outcomes. Boundary: KM is not appropriate
    for left-truncated or interval-censored data; use Turnbull estimator for those cases.'
  evidence: lifelines/fitters/kaplan_meier_fitter.py:27-30(module)
  stage: survival_curve_estimation
  alternative_considered: Actuarial (life-table) methods were rejected as they assume uniform censoring
    within intervals, unlike KM's exact handling.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in lifelines/fitters/kaplan_meier_fitter.py'
  vague_rationale: true
- id: BD-032
  type: B
  content: Use Greenwood's exponential formula for Kaplan-Meier confidence intervals
  rationale: 'Greenwood''s formula provides the standard variance estimator for the Kaplan-Meier survival
    function, which is essential for valid confidence intervals and hypothesis tests. The exponential
    transformation ensures variance estimates remain positive. Boundary: For small samples (<30), confidence
    intervals may be unreliable; consider bootstrap intervals.'
  evidence: lifelines/fitters/kaplan_meier_fitter.py:60-61(module)
  stage: survival_curve_estimation
  alternative_considered: Bootstrap intervals were considered but rejected as default due to computational
    overhead; Greenwood's analytic formula is exact for KM.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in lifelines/fitters/kaplan_meier_fitter.py'
  vague_rationale: true
- id: BD-033
  type: B
  content: Use NPMLE (Turnbull estimator) for interval-censored data
  rationale: 'The non-parametric maximum likelihood estimator (Turnbull algorithm) is the correct approach
    for interval-censored data where only time intervals are observed rather than exact event times. It
    produces the unique MLE under the nonparametric model. Boundary: NPMLE may have non-unique solutions
    for highly informative intervals; investigate local likelihood maxima.'
  evidence: lifelines/fitters/kaplan_meier_fitter.py:147-148(module)
  stage: survival_curve_estimation
  alternative_considered: Midpoint imputation was rejected as it introduces bias; NPMLE correctly handles
    interval structure without artificial point estimates.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in lifelines/fitters/kaplan_meier_fitter.py'
- id: BD-034
  type: B/BA
  content: Set p_value_threshold = 0.01 for proportional hazard assumption checks
  rationale: 'The 1% significance level for proportional hazards tests provides stricter control than
    the standard 5% level, reducing false positives when testing the critical PH assumption. This prevents
    premature model rejection due to minor violations. Boundary: For exploratory analyses, 5% may be acceptable;
    for confirmatory studies, 1% is recommended.'
  evidence: lifelines/fitters/mixins.py:29(module)
  stage: data_input
  alternative_considered: 0.05 was rejected as too liberal for a foundational model assumption check;
    violations at 5% but not 1% often have minimal practical impact.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in lifelines/fitters/mixins.py'
- id: BD-035
  type: B
  content: Use plot_n_bootstraps=15 for LOWESS smoothing in PH check plots
  rationale: 'Fifteen bootstrap samples provide stable LOWESS smoothing for checking Schoenfeld residuals
    while maintaining reasonable plotting performance. This sample size captures distributional variability
    without excessive computation. Boundary: For publication-quality plots, consider 50+ bootstraps; for
    quick diagnostics, 10 is acceptable minimum.'
  evidence: lifelines/fitters/mixins.py:30(module)
  stage: visualization
  alternative_considered: 50 bootstraps was rejected as too slow for interactive use; 15 provides sufficient
    stability with minimal overhead.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in lifelines/fitters/mixins.py'
  vague_rationale: true
- id: BD-036
  type: B/BA
  content: Recommend stratification when variable has <=6 unique values with min count 5
  rationale: 'Stratification is recommended for categorical variables with few levels (<=6) where each
    stratum has sufficient sample size (>=5 events) to estimate stratum-specific baselines reliably. This
    heuristic prevents over-stratification that leads to unstable estimates. Boundary: For continuous
    variables, binning into <=6 categories first; for sparse strata, consider merging categories.'
  evidence: lifelines/fitters/mixins.py:196(module)
  stage: remediation
  alternative_considered: Lower thresholds (3-4 categories) were rejected as too restrictive; 6 provides
    flexibility for moderate cardinality variables.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in lifelines/fitters/mixins.py'
  vague_rationale: true
- id: BD-037
  type: B
  content: Use Newton-Raphson with Efron tie handling for Cox model convergence
  rationale: 'Newton-Raphson provides fast quadratic convergence to the maximum partial likelihood estimate,
    and Efron tie handling improves accuracy when multiple subjects fail at the same time. This combination
    is the standard approach for Cox model optimization. Boundary: For ill-conditioned data (high multicollinearity),
    consider L-BFGS-B fallback; Newton-Raphson may diverge.'
  evidence: lifelines/fitters/coxph_fitter.py:244-245(module)
  stage: optimization
  alternative_considered: EM algorithm was rejected as slower than Newton-Raphson for typical Cox models;
    Newton-Raphson dominates in practice.
