resources:
- id: res-slot-001
  type: replaceable_component
  name: formula_parsing
  path: null
  description: formulaic is the modern actively-developed choice with better pandas
    integration
  used_in_stages: []
  options:
  - name: formulaic
    traits:
    - R-compatible
    - actively maintained
    - pandas-native
    fit_for:
    - Standard R-style survival regression formulas
    not_fit_for:
    - Complex symbolic manipulation beyond formula parsing
  - name: patsy
    traits:
    - R-compatible
    - statsmodels integration
    fit_for:
    - Legacy projects using patsy, statsmodels compatibility
    not_fit_for:
    - New projects; patsy is in maintenance mode
  default: formulaic
  _source: worker_resource
- id: res-slot-002
  type: replaceable_component
  name: automatic_differentiation
  path: null
  description: autograd provides the right balance of functionality with minimal overhead
    for this use case
  used_in_stages: []
  options:
  - name: autograd
    traits:
    - lightweight
    - numpy-compatible API
    - pure Python
    fit_for:
    - Standard gradient-based optimization for survival models
    not_fit_for:
    - GPU acceleration, complex neural survival models
  - name: JAX autograd
    traits:
    - GPU support
    - XLA compilation
    - JIT-ready
    fit_for:
    - Large-scale survival analysis with GPU acceleration
    not_fit_for:
    - Simple use cases, minimal dependencies
  - name: PyTorch autograd
    traits:
    - GPU support
    - deep learning integration
    fit_for:
    - Neural network-based survival models
    not_fit_for:
    - Traditional parametric survival analysis
  default: autograd
  _source: worker_resource
- id: res-slot-003
  type: replaceable_component
  name: plotting_backend
  path: null
  description: matplotlib is the universal standard with best compatibility
  used_in_stages: []
  options:
  - name: matplotlib
    traits:
    - universal
    - static plots
    - publication-quality
    fit_for:
    - Standard survival analysis plots
    not_fit_for:
    - Interactive dashboards, web-based visualization
  - name: plotly
    traits:
    - interactive
    - web-ready
    - dash integration
    fit_for:
    - Interactive survival curves in dashboards
    not_fit_for:
    - Static publications, minimal dependencies
  - name: seaborn
    traits:
    - statistical plots
    - matplotlib-based
    fit_for:
    - Enhanced statistical visualizations on top of matplotlib
    not_fit_for:
    - Core survival plots (lifelines-specific); seaborn lacks survival functions
  default: matplotlib
  _source: worker_resource
- id: res-slot-004
  type: replaceable_component
  name: serialization
  path: null
  description: pickle is built-in; joblib/dill are drop-in replacements for specific
    needs
  used_in_stages: []
  options:
  - name: pickle (stdlib)
    traits:
    - built-in
    - universal Python serialization
    fit_for:
    - Saving/loading fitted models in pure Python
    not_fit_for:
    - Security-sensitive contexts (pickle can execute arbitrary code)
  - name: joblib
    traits:
    - numpy-optimized
    - efficient for large arrays
    fit_for:
    - Large survival models with many parameters
    not_fit_for:
    - Small models, cross-language compatibility
  - name: dill
    traits:
    - closure/lambda support
    - broader object types
    fit_for:
    - Serializing fitted models with custom callables
    not_fit_for:
    - Simple use cases, security-sensitive contexts
  default: pickle
  _source: worker_resource
