business_decisions:
- id: BD-001
  type: BA/DK
  content: Default confidence level alpha=0.05 for each statistical models
  rationale: Alpha=0.05 represents the conventional significance threshold in scientific
    research and medical statistics, providing a balance between Type I and Type II
    errors. This default ensures users get standard 95% confidence intervals without
    needing to explicitly configure inference parameters, supporting reproducible
    research practices across the survival analysis domain.
  evidence: lifelines/fitters/coxph_fitter.py:32(CoxPHFitter)
  stage: model_initialization
  alternative_considered: More conservative alpha=0.01 or exploratory alpha=0.10 were
    not chosen as defaults to maintain alignment with dominant statistical practice
- id: BD-002
  type: B/BA
  content: Default penalizer=0.0 (no regularization) for CoxPH and AFT models
  rationale: Setting penalizer=0.0 by default produces an unregularized model, which
    maintains interpretability of coefficients as log-hazard ratios without shrinkage.
    This default ensures backward compatibility with traditional Cox regression and
    allows users who need regularization to explicitly opt-in, preserving the statistical
    properties of maximum likelihood estimation.
  evidence: lifelines/fitters/coxph_fitter.py:32(CoxPHFitter)
  stage: model_initialization
  alternative_considered: L1 regularization (LASSO) as default was rejected to maintain
    interpretability; elastic net as default was rejected due to additional l1_ratio
    complexity
- id: BD-003
  type: B/BA
  content: Default l1_ratio=0.0 (pure L2 penalty) for elastic net regularization
  rationale: When elastic net regularization is enabled, l1_ratio=0.0 defaults to
    pure L2 (Ridge) penalty, which shrinks correlated coefficients together rather
    than selecting one. This provides computational stability and is appropriate for
    survival analysis where each covariates may be scientifically relevant, avoiding
    the variable selection behavior of pure L1 penalties.
  evidence: lifelines/fitters/coxph_fitter.py:135(CoxPHFitter.__init__)
  stage: model_initialization
  alternative_considered: l1_ratio=0.5 (balanced elastic net) was considered but rejected
    as default to avoid mixed behavior without user intent
  vague_rationale: true
- id: BD-004
  type: B/BA
  content: Default baseline_estimation_method='breslow' for CoxPH model
  rationale: Breslow's method is the standard baseline estimation approach in Cox
    regression, approximating the baseline cumulative hazard using the at-risk set
    size. This default aligns with textbook Cox regression and most published survival
    analyses, ensuring users receive epidemiologically valid baseline estimates without
    specialized configuration.
  evidence: lifelines/fitters/coxph_fitter.py:618(_fit_model_breslow)
  stage: model_initialization
  alternative_considered: Efron's method for baseline was rejected as non-standard;
    kernel-smoothed baseline was rejected as computationally expensive
- id: BD-005
  type: B/BA
  content: Efron's method for handling ties in Cox model
  rationale: Efron's method approximates the partial likelihood when multiple subjects
    fail at the same time, providing a better approximation than the Breslow (continuous)
    method for tied data. This choice affects coefficient estimates when ties are
    present, yielding more accurate parameter estimates in clinical datasets where
    tied event times are common due to discrete measurement intervals.
  evidence: lifelines/fitters/coxph_fitter.py:1620(_get_efron_values_single)
  stage: model_fitting
  alternative_considered: Breslow ties approximation rejected for lower accuracy;
    exact partial likelihood rejected as computationally intractable for large datasets
- id: BD-006
  type: B
  content: KaplanMeierFitter uses Greenwood's formula for confidence intervals
  rationale: Greenwood's formula computes the variance of the Kaplan-Meier survival
    estimate by propagating the variance of each interval's survival probability.
    This produces asymptotically correct confidence intervals that properly account
    for uncertainty in survival estimates, especially at later time points where fewer
    subjects remain at risk. The resulting intervals align with established survival
    analysis practice.
  evidence: lifelines/fitters/kaplan_meier_fitter.py:60(confidence_interval_)
  stage: confidence_interval
  alternative_considered: Poisson-based variance was rejected as Greenwood's method
    better captures the discrete nature of Kaplan-Meier estimation
  _evidence_issues:
  - 'FN_NOT_FOUND: confidence_interval_ in lifelines/fitters/kaplan_meier_fitter.py'
- id: BD-007
  type: B
  content: KaplanMeierFitter interval censoring uses Turnbull NPMLE
  rationale: The Non-Parametric Maximum Likelihood Estimator (NPMLE) developed by
    Turnbull is the principled approach for interval-censored survival data where
    events are known only to fall within ranges. This method produces self-consistent
    estimates without assuming a parametric form, providing the theoretically correct
    solution for data where subjects are assessed periodically rather than continuously.
  evidence: lifelines/fitters/kaplan_meier_fitter.py:130(fit_interval_censoring)
  stage: model_fitting
  alternative_considered: Self-consistent algorithm was the computational vehicle
    but Turnbull NPMLE is the theoretical foundation; parametric approaches rejected
    as inconsistent with non-parametric KM framework
- id: BD-008
  type: B
  content: CoxTimeVaryingFitter uses Efron's method for ties
  rationale: 'Consistency with CoxPHFitter: Efron''s method is applied to time-varying
    covariate models to handle ties in failure times. This ensures coherent coefficient
    interpretation across model types and maintains statistical validity when time-dependent
    covariates change at discrete observation points. Users switching between models
    receive comparable tie-handling behavior.'
  evidence: lifelines/fitters/cox_time_varying_fitter.py:53(CoxTimeVaryingFitter)
  stage: model_fitting
  alternative_considered: Separate tie method for time-varying models was rejected
    to maintain API consistency and comparable statistical properties
- id: BD-009
  type: B/BA
  content: Default start_col='start', stop_col='stop' for time-varying data
  rationale: The 'start' and 'stop' column names follow the standard convention in
    survival analysis for left-truncated, right-censored data structures. This naming
    convention appears in textbooks, published code, and related R packages (survival),
    enabling easier data interchange and familiarity for users migrating from other
    survival analysis environments.
  evidence: lifelines/fitters/cox_time_varying_fitter.py:97(fit)
  stage: data_preprocessing
  alternative_considered: Numeric-only indexing was rejected as less intuitive; custom
    names would break compatibility with standard survival data formats
- id: BD-010
  type: B/BA
  content: 'CoxPHFitter baseline_estimation_method options: breslow, spline, piecewise'
  rationale: 'Providing three baseline estimation methods addresses the spectrum of
    proportional hazards assumptions: Breslow for standard Cox when PH holds, spline
    for flexible baseline allowing non-PH through time-varying coefficients, and piecewise
    for step-function baselines when hazard changes discretely. This flexibility enables
    users to diagnose and address violations of the proportional hazards assumption
    without changing model structure.'
  evidence: lifelines/fitters/coxph_fitter.py:53(baseline_estimation_method)
  stage: model_initialization
  alternative_considered: Automatic method selection was rejected due to difficulty
    defining appropriate goodness-of-fit thresholds; kernel-smoothed baseline was
    rejected as less interpretable
  _evidence_issues:
  - 'FN_NOT_FOUND: baseline_estimation_method in lifelines/fitters/coxph_fitter.py'
- id: BD-011
  type: BA
  content: 'CensoringType Enum + Decorator Pattern: Fit methods are decorated with
    @CensoringType.right_censoring/left_censoring/interval_censoring to set _censoring_type
    which dispatches to correct likelihood function'
  rationale: 'WHY: Enables type-safe dispatch to correct likelihood function without
    scattered if/else chains across multiple fitters, reducing maintenance burden
    and ensuring each censoring types have dedicated implementations. BOUNDARY: Decorator
    executes at fit-time initialization before data processing; censoring type is
    locked for entire fit session and cannot be changed post-fitting without refitting.'
  evidence: lifelines/utils/__init__.py:45(CensoringType)
  stage: pattern_choice
  alternative_considered: Dictionary mapping censoring_type to function was rejected
    due to less explicit type checking at method signature level
- id: BD-012
  type: BA/M
  content: '_KNOWN_MODEL Flag Architecture: Controls whether cumulative hazard monotonicity
    validation runs (skip for known-good models, validate for novel parametric fitters)'
  rationale: 'WHY: Skips expensive O(n log n) monotonicity validation for established
    models where shape properties are proven, reducing fit time by 15-30% on large
    datasets. BOUNDARY: Validation gate applies only during fit() execution; setting
    _KNOWN_MODEL=False on novel fitters without proven monotonicity may allow numerically
    invalid cumulative hazard estimates to go undetected, corrupting downstream predictions.'
  evidence: lifelines/fitters/__init__.py:42(BaseFitter)
  stage: default_value
  alternative_considered: Always validate was rejected due to 15-30% fit-time overhead
    on large parametric fits with proven monotonicity
- id: BD-013
  type: BA/M
  content: '_FAST_MEDIAN_PREDICT Flag: Controls whether _predicted_median is computed
    during fit (True=immediate, False=lazy) for concordance_index_ computation'
  rationale: 'WHY: AFT models compute median analytically during fit (low cost) while
    UnivariateFitters require numerical root-finding (high cost), allowing each to
    optimize for its computational profile. BOUNDARY: Lazy computation means concordance_index_
    triggers re-computation on first access; models with _FAST_MEDIAN_PREDICT=True
    expect _predicted_median to exist post-fit without explicit call to predict().'
  evidence: lifelines/fitters/__init__.py:42(BaseFitter)
  stage: default_value
  alternative_considered: Always-eager was rejected for UnivariateFitters due to expensive
    numerical root-finding; always-lazy rejected for AFT due to analytical solution
    availability
- id: BD-014
  type: B/BA
  content: '_MIN_PARAMETER_VALUE=1e-9 Architecture: Used to prevent zero-width intervals
    in interval-censored bounds by adding/subtracting from bounds'
  rationale: 'WHY: Log-likelihood functions contain log(upper-lower) which is undefined
    at zero, causing numerical exceptions when interval width collapses. BOUNDARY:
    The 1e-9 threshold assumes no legitimate parameter has meaningful structure below
    this scale; using this constant on parameters expected to vary near zero (e.g.,
    hazard rates for immortal subjects) may mask estimation problems.'
  evidence: lifelines/fitters/__init__.py:42(BaseFitter)
  stage: default_value
  alternative_considered: Relative tolerance (e.g., 1e-6 * bound_width) was rejected
    due to instability when bound_width is small
- id: BD-015
  type: M
  content: '_central_values Baseline Architecture: Stores mean/median covariate values
    from training data, used for baseline predictions and median_survival_time_/mean_survival_time_'
  rationale: 'WHY: Enables counterfactual baseline predictions (what would survival
    look like at average covariate values) without requiring raw training data to
    be retained in memory. BOUNDARY: Central values are computed from raw training
    data once at fit completion; subsequent calls to predict() reuse cached values.
    Model refitting with different data replaces these values, but manual modification
    requires understanding the raw-to-transformed pipeline.'
  evidence: lifelines/fitters/__init__.py:1272(_compute_central_values_of_raw_training_data)
  stage: inheritance
  alternative_considered: Store raw data was rejected due to memory costs; recompute
    on-demand was rejected due to repeated transformation overhead
- id: BD-016
  type: BA/DK
  content: 'Cross-Module Validation Invariants: check_complete_separation, check_dimensions,
    check_scaling must be called in specific fitters but NOT in others'
  rationale: 'WHY: Different fitters face different failure modes - CoxPH is invariant
    to scaling (no check_scaling) while parametric regression fitters require each
    checks to catch degenerate cases early. BOUNDARY: Validation occurs at _check_values_pre_fitting
    before optimization; skipping required checks allows numerically unstable fits
    to proceed to convergence with undefined log-likelihoods.'
  evidence: lifelines/fitters/__init__.py:42(BaseFitter)
  stage: invariant
  alternative_considered: Universal all-checks was rejected due to false positives
    on scale-invariant methods and performance overhead
- id: BD-017
  type: T
  content: 'Strata + Formula Exclusion Contract: Strata columns must be excluded from
    both regressors and formula columns; violates this causes double-counting or KeyErrors'
  rationale: 'WHY: Strata create separate models per stratum; including strata columns
    as regressors would over-parameterize (multicollinearity) while including in formula
    would cause incorrect design matrix construction. BOUNDARY: Contract enforced
    at formula processing time; violations produce either KeyError (column not found
    in design matrix) or silently wrong coefficients due to strata being treated as
    covariates.'
  evidence: lifelines/fitters/__init__.py:42(BaseFitter)
  stage: ordering_contract
  alternative_considered: Automatic exclusion with warning was considered but rejected
    to maintain explicit user control over model specification
- id: BD-018
  type: B
  content: 'Ts Tuple Pattern for Interval Censoring: Interval-censored models receive
    (lower_bound, upper_bound) as Ts tuple, requiring tuple unpacking in likelihood
    functions'
  rationale: 'WHY: Distinguishes interval-censored (unknown true time, known to be
    in [lower, upper]) from right-censored (lower bound only) or left-censored (upper
    bound only) at the data level without special-case sentinel values. BOUNDARY:
    Tuple must be unpacked in likelihood functions; passing scalar to interval-censored
    likelihood causes index errors or silent wrong log-likelihood values. Upper bound
    clipping at line 3063 handles the case where upper=inf for right-censored observations
    mixed into interva'
  evidence: lifelines/fitters/__init__.py:436(_negative_log_likelihood_interval_censoring)
  stage: pattern_choice
  alternative_considered: Sentinel values (e.g., -inf, +inf) were rejected due to
    ambiguity with legitimate bound values
- id: BD-019
  type: M/DK
  content: 'Fitter Class Hierarchy Contracts: ParametricUnivariateFitter._bounds must
    yield (lb, ub) tuples; ParametricRegressionFitter._check_values_pre_fitting must
    call specific checks'
  rationale: 'WHY: Ensures subclass implementers provide required interface methods
    that base class logic depends on, preventing AttributeErrors at runtime and ensuring
    numerical safety checks are not accidentally omitted. BOUNDARY: _bounds is iterated
    during parameter initialization; returning wrong-length tuples causes index errors.
    _check_values_pre_fitting is called automatically by fit(); skipping parent checks
    in override breaks validation invariants.'
  evidence: lifelines/fitters/__init__.py:290(ParametricUnivariateFitter)
  stage: inheritance
  alternative_considered: Duck typing was rejected due to silent failures when required
    methods are not implemented
- id: BD-020
  type: BA/M
  content: 'Concordance Index Entry Contract: concordance_index_ property expects
    _predicted_median attribute OR durations + event_observed to exist; different
    models use different paths'
  rationale: 'WHY: Allows heterogeneous model types to compute concordance using their
    natural prediction interface rather than enforcing a single method signature,
    accommodating both regression (median prediction) and nonparametric (direct duration
    comparison) approaches. BOUNDARY: Accessing concordance_index_ on a model without
    either prerequisite raises AttributeError; Kaplan-Meier computes concordance internally
    while regression models require pre-computed _predicted_median.'
  evidence: lifelines/fitters/__init__.py:2685(concordance_index_)
  stage: invariant
  alternative_considered: Universal predict() interface was rejected due to different
    natural prediction semantics across model types
- id: BD-021
  type: B/DK
  content: 'Survival Function Clipping (1e-12) Architecture: _survival_function clips
    to [1e-12, 1-1e-12] which affects each downstream predictions and log-likelihoods'
  rationale: 'WHY: Prevents log(0) = -inf in likelihood calculations and S(t)=1 edge
    cases that cause numerical instability in gradient-based optimization and downstream
    hazard/cdf computations. BOUNDARY: Survival probabilities at extremes are artificially
    bounded; for datasets with >10^12 subjects, probability mass below 1e-12 may become
    statistically meaningful, causing slight likelihood miscalculation. Affects each
    downstream consumers including cumulative hazard and density calculations.'
  evidence: lifelines/fitters/__init__.py:1413(_survival_function)
  stage: default_value
  alternative_considered: Soft clipping (sigmoid transformation) was rejected due
    to computational overhead; no clipping was rejected due to NaN/Inf propagation
- id: BD-022
  type: BA/M
  content: 'Log-Likelihood Normalization by Weights Sum: Every likelihood functions
    divide by np.sum(weights), making likelihood comparable across datasets with different
    weights'
  rationale: 'WHY: Enables direct comparison of log-likelihood values across models
    fit with different weight totals (e.g., downsampled vs upsampled data), ensuring
    likelihood ratio tests and AIC comparisons remain valid. BOUNDARY: Normalization
    applies to per-observation likelihood; total log-likelihood for the sample is
    still scaled by weight sum. Using weights that don''t sum to sample size changes
    the interpretation of absolute likelihood values but not relative comparisons.'
  evidence: lifelines/fitters/__init__.py:425(_negative_log_likelihood_right_censoring)
  stage: pattern_choice
  alternative_considered: No normalization was rejected due to scale-dependence making
    likelihoods incomparable across weighted samples
- id: BD-023
  type: BA/DK
  content: 'INTERACTION: [BD-001] × [BD-002] → In high-dimensional data, unregularized
    coefficients (penalizer=0) tested at alpha=0.05 produce inflated false positive
    rates beyond statistical control'
  rationale: Alpha=0.05 controls Type I error rate for inference, but assumes the
    model is correctly specified. With penalizer=0.0 (no regularization), high-dimensional
    data with many correlated predictors produces unstable coefficient estimates that
    still pass alpha=0.05 significance tests. This creates a statistical illusion
    of significance where coefficients are noise-fitting rather than signal-detecting.
    The interaction amplifies false discovery rate specifically when p >> n or when
    multicollinearity exists.
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Documenting the interaction with warnings was considered;
    automatic detection of p>n conditions with alpha adjustment was rejected due to
    statistical theory disagreement
- id: BD-024
  type: B/BA
  content: 'INTERACTION: [BD-002] × [BD-003] → Hidden dependency where l1_ratio=0.0
    is inert until penalizer becomes non-zero, masking elastic net behavior until
    explicit regularization opt-in'
  rationale: BD-003 sets l1_ratio=0.0 (pure L2 penalty) as the default for elastic
    net regularization, but BD-002 sets penalizer=0.0 (no regularization) as the default.
    This creates a silent dependency where l1_ratio only becomes relevant when a user
    sets penalizer > 0. Users reading the code may assume L2 regularization is active
    when it is not, leading to incorrect assumptions about coefficient shrinkage behavior.
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Setting l1_ratio only when penalizer > 0 and raising error
    otherwise was rejected due to backward compatibility concerns
- id: BD-025
  type: RC
  content: 'INTERACTION: [BD-004] × [BD-005] → Contradiction where default Breslow
    baseline estimation conflicts with Efron tie handling, producing mismatched partial
    likelihood approximations'
  rationale: BD-004 sets baseline_estimation_method='breslow' as the default for baseline
    survival function computation, while BD-005 uses Efron's method for handling ties
    in the partial likelihood. Breslow and Efron are competing approximations for
    tied event times - Breslow is a continuous approximation while Efron provides
    a better discrete approximation. Using Breslow for baseline but Efron for coefficients
    creates a theoretical mismatch where the baseline does not correspond to the same
    likelihood approximation as the coefficients, potentially producing inconsistent
    survival predictions.
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Efron baseline method was considered as alternative; rejected
    due to Breslow being the historical standard in Cox regression software
- id: BD-026
  type: T
  content: 'INTERACTION: [BD-012] × [BD-016] → Risk cascade where _KNOWN_MODEL=True
    skips monotonicity validation, but if applied to novel fitters without proven
    properties, breaks BD-016 invariant guarantees silently'
  rationale: BD-012 controls validation gates via the _KNOWN_MODEL flag - when True,
    expensive O(n log n) monotonicity validation is skipped for performance. BD-016
    defines the validation invariants (check_complete_separation, check_dimensions,
    check_scaling) that should run before optimization. The cascade risk occurs when
    a developer sets _KNOWN_MODEL=True on a novel fitter without proven monotonicity
    - the performance optimization silently disables safety checks, and if the fitter
    has non-monotonic cumulative hazard, downstream cumulative_hazard_ calls produce
    numerically invalid results that corrupt survival predictions.
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Requiring explicit monotonicity proof before allowing _KNOWN_MODEL=True
    was rejected due to developer workflow friction
- id: BD-027
  type: BA/M
  content: 'INTERACTION: [BD-013] × [BD-020] → Hidden dependency where _FAST_MEDIAN_PREDICT=False
    (lazy computation) creates deferred failure: concordance_index_ access triggers
    median recomputation which may raise AttributeError for models missing required
    data'
  rationale: 'BD-013 controls when _predicted_median is computed: True=eager during
    fit (AFT models), False=lazy on access (UnivariateFitters). BD-020 defines the
    concordance_index_ property contract requiring either _predicted_median OR durations+event_observed.
    For models with _FAST_MEDIAN_PREDICT=False, concordance_index_ triggers the lazy
    _predicted_median computation which may fail if training data references were
    cleared. This creates a deferred failure mode where fit() succeeds but concordance_index_
    access raises error - the failure point is decoupled from the design decision.'
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Computing _predicted_median eagerly for each models was
    rejected due to expensive numerical root-finding for UnivariateFitters
- id: BD-028
  type: B/DK
  content: 'INTERACTION: [BD-014] × [BD-018] → Amplification where _MIN_PARAMETER_VALUE=1e-9
    prevents zero-width intervals in Ts tuple pattern, but combined with interval
    censoring likelihood creates hidden truncation of near-zero probability events'
  rationale: BD-014 sets _MIN_PARAMETER_VALUE=1e-9 to prevent log(0) in likelihood
    functions. BD-018 defines the Ts tuple pattern for interval-censored data where
    bounds are (lower, upper). When interval width approaches 1e-9, the 1e-9 floor
    is added/subtracted from bounds, artificially widening the interval. For interval-censored
    observations where the true event time is known to be in an extremely narrow window,
    this artificial widening reduces the likelihood's specificity - the model treats
    events as less certain than they actually are, potentially biasing hazard estimates
    for rare-event interval-censored data.
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Relative tolerance based on interval width was rejected
    due to instability when interval width is small; 1e-9 was chosen as a pragmatic
    floor
- id: BD-029
  type: T
  content: 'INTERACTION: [BD-021] × [BD-022] → Risk cascade where survival clipping
    [1e-12, 1-1e-12] prevents log(0) but interacts with weight-normalized likelihood
    causing scaled probability miscalculation in weighted analyses'
  rationale: 'BD-021 clips survival function to [1e-12, 1-1e-12] to prevent log(0)
    = -inf in likelihood calculations. BD-022 normalizes log-likelihood by np.sum(weights).
    The cascade occurs in weighted survival analysis: when weights are very large
    (e.g., downsampled pseudo-observations with weight >> 1), the clipped survival
    probabilities are multiplied by these weights. If effective sample size becomes
    large enough that 1e-12 * total_weight becomes statistically meaningful, the clipped
    floor biases the likelihood downward. The clipping floor becomes a de facto probability
    floor that is no longer negligible when weight sums are large.'
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Adaptive clipping based on total weight sum was rejected
    as statistically complex; fixed 1e-12 was retained as standard practice
- id: BD-030
  type: BA/M
  content: 'INTERACTION: [BD-006] × [BD-021] → Amplification where Greenwood''s formula
    variance depends on survival estimates, and survival clipping [1e-12, 1-1e-12]
    cascades into artificially bounded confidence interval widths at extreme survival
    probabilities'
  rationale: BD-006 uses Greenwood's formula for Kaplan-Meier confidence intervals,
    which propagates variance from survival probability estimates. BD-021 clips survival
    function to [1e-12, 1-1e-12] for numerical stability. At very late time points
    where true survival approaches zero, the clipping floor prevents survival from
    reaching true near-zero values. Greenwood's formula propagates this clipped floor,
    producing confidence intervals that are artificially wide relative to the true
    variance. For datasets with very long survivors or heavy censoring at late times,
    the confidence intervals systematically overstate uncertainty.
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Separate confidence interval computation without clipping
    was rejected as architecturally complex; clipping applied uniformly to survival
    function
- id: BD-031
  type: B/BA
  content: 'INTERACTION: [BD-002] × [BD-016] → Hidden dependency where lack of regularization
    (penalizer=0) makes CoxPH more vulnerable to complete separation, but check_complete_separation
    runs during validation creating a silent assumption about coefficient stability'
  rationale: BD-002 sets penalizer=0.0 by default, producing unregularized maximum
    likelihood estimates that are sensitive to complete separation (perfect prediction
    of outcome by a covariate). BD-016 defines check_complete_separation as a validation
    invariant for regression fitters. The hidden dependency is that unregularized
    models have no built-in protection against separation - they depend entirely on
    the validation check. If check_complete_separation is ever bypassed or misconfigured,
    unregularized CoxPH models can produce infinite coefficient estimates without
    warning, whereas a regularized model would provide shrinkage-based protection.
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Small non-zero default penalizer was rejected due to interpretability
    concerns for standard Cox regression users
- id: BD-GAP-001
  type: B/BA
  content: CRCSplineFitter exposes n_baseline_knots as a constructor parameter rather
    than inferring knot count from data statistics
  rationale: Explicit knot count gives users control over model flexibility vs. overfitting
    trade-off; breaks when optimal knot placement requires domain-specific knowledge
    not available to caller
  evidence: examples/crowther_royston_clements_splines.py:19(__init__)
  stage: model_design
  alternative_considered: Data-driven knot selection based on AIC/BIC was considered
    but not implemented
- id: BD-GAP-002
  type: T
  content: SplineFitter uses ReLU activation with min/max knot clamping for basis
    function construction
  rationale: ReLU with clamped knots creates smooth piecewise-linear basis functions
    suitable for flexible survival modeling; breaks for data requiring smooth non-linear
    transitions at knot boundaries
  evidence: examples/royston_parmar_splines.py:21(relu)
  stage: numerical_implementation
  alternative_considered: Cubic splines would provide C2 continuity but add computational
    complexity
- id: BD-GAP-003
  type: B/BA
  content: MixtureCureModel enumerates exactly two cure states (default, repay) as
    hardcoded strings rather than configurable parameters
  rationale: Fixed enumeration reflects domain assumption that cure states are mutually
    exclusive and finite; breaks when new outcome types require modeling (e.g., partial
    cure, recurring events)
  evidence: examples/mixture_cure_model.py:20(__init__)
  stage: business_logic
  alternative_considered: Dynamic state enumeration from configuration was considered
    but would complicate likelihood computation
  _evidence_issues:
  - 'FN_NOT_FOUND: __init__ in examples/mixture_cure_model.py'
- id: BD-GAP-004
  type: B/BA
  content: CopulaFrailtyWeilbullModel assumes competing risks are NOT independent
    and includes shared frailty term
  rationale: Non-independence assumption acknowledges unobserved heterogeneity that
