# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-100
name: LEAN
sop_version: '3.6'
source:
  projects:
  - LEAN
  commit_hash: f00d02be834b461557c61fd73146f46a8d4a6b86
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: algorithmic trading engine with quantitative portfolio management framework
  description: Event-driven algorithmic trading platform providing modular framework for universe selection,
    alpha generation, portfolio construction, execution, and risk management with support for equities,
    options, futures, ETFs, and forex.
  prerequisites: Understanding of quantitative finance concepts (Modern Portfolio Theory, factor models,
    technical indicators), Python or C# programming, familiarity with financial market data structures
  not_suitable_for: Manual discretionary trading, pure fundamental analysis without systematic rules,
    high-frequency trading requiring ultra-low latency, non-financial time series prediction, real-time
    market making without backtesting validation
stages:
- id: universe_selection
  name: Universe Selection
  order: 1
  responsibility: Selects tradable securities from available market data based on user-defined criteria.
    Acts as the entry point for the algorithm framework pipeline by filtering the investable universe
    to securities meeting fundamental or technical criteria.
  interface:
    inputs:
    - Market data feed (Coarse/Fine Fundamental, ETF, Future, Option data)
    outputs:
    - IEnumerable<Universe> - set of securities to subscribe to for downstream stages
  required_methods:
  - name: FundamentalUniverseSelectionModel.Select
    description: Unified single-pass selection method accepting coarse and fine fundamental data, replacing
      deprecated two-pass SelectCoarse/SelectFine approach
    evidence: Algorithm.Framework/Selection/FundamentalUniverseSelectionModel.cs:205(Select)
  - name: UniverseSelectionModel.GetNextRefreshTimeUtc
    description: Determines when universe should be re-evaluated, defaults to DateTime.MaxValue for lazy
      refresh
    evidence: Algorithm/Selection/UniverseSelectionModel.cs:40(GetNextRefreshTimeUtc)
  key_behaviors:
  - behavior: Unified Select() method over deprecated two-pass filtering
    description: Single-pass selection consolidates coarse and fine filtering into one method call, improving
      efficiency. Old SelectCoarse/SelectFine marked [Obsolete] at lines 226,244.
    evidence: Algorithm.Framework/Selection/FundamentalUniverseSelectionModel.cs:205(Select)
  - behavior: Universe.UNCHANGED semantics
    description: Universe selection returns UNCHANGED to skip rebalancing when no changes needed. This
      semantic is depended upon by 14+ algorithms and must be handled by universe manager.
    evidence: Algorithm.Framework/Selection/QC500UniverseSelectionModel.py:37,47,70
  - behavior: Python selector function conversion via TrySafeAs/TryConvert
    description: PythonNet cannot convert python methods to Func delegates natively, requiring explicit
      conversion helpers in the selection model.
    evidence: Algorithm.Framework/Selection/FundamentalUniverseSelectionModel.cs:101(TrySafeAs)
  - behavior: QC500 dollar volume ranking within sectors
    description: Selects 500 symbols using dollar volume ranking filtered by USA/NYSE/NASDAQ exchanges
      with >$500M market cap threshold.
    evidence: Algorithm.Framework/Selection/QC500UniverseSelectionModel.py:59-85
  replaceable_points:
  - name: Security selection logic
    description: Override Select() method or pass Func<IEnumerable<Fundamental>, IEnumerable<Symbol>>
      selector to implement custom filtering criteria
    options:
    - name: Fundamental filter
      traits:
      - Fundamental data
      - Sector weighting
      - Market cap filtering
      fit_for:
      - Long-only equity strategies
      - Factor-based selection
      - Value/growth screening
      not_fit_for:
      - Technical-only strategies
      - Options-only universes
      - Future spreads
    - name: ETF holdings
      traits:
      - ETF constituent data
      - Passive tracking
      - Automatic rebalancing
      fit_for:
      - Index replication
      - ETF rotation strategies
      - Sector ETF plays
      not_fit_for:
      - Custom factor selection
      - Micro-cap stocks
      - Illiquid securities
    - name: Manual universe
      traits:
      - User-defined symbols
      - Fixed list
      - No dynamic filtering
      fit_for:
      - Focused portfolios
      - Special situations
      - Event-driven with known names
      not_fit_for:
      - Large universes
      - Dynamic rebalancing
      - High turnover strategies
    - name: Future/Option chain filter
      traits:
      - Derivatives data
      - Chain expiration
      - Strike filtering
      fit_for:
      - Options strategies
      - Futures spread trading
      - Derivatives arbitrage
      not_fit_for:
      - Equity-only strategies
      - Long-term investments
      - Spot FX trading
    default: FundamentalUniverseSelectionModel with default USA market filter
  design_decisions:
  - 'FundamentalUniverseSelectionModel uses unified Select() over deprecated SelectCoarse/SelectFine —
    Single-pass selection is more efficient than two-pass coarse/fine filtering. Evidence: Algorithm.Framework/Selection/FundamentalUniverseSelectionModel.cs:205(Select)'
  - 'UniverseSelectionModel.GetNextRefreshTimeUtc() defaults to DateTime.MaxValue — Lazy refresh: only
    refresh when explicitly scheduled or on security changes. Evidence: Algorithm/Selection/UniverseSelectionModel.cs:40(GetNextRefreshTimeUtc)'
  - 'Python selector functions converted via TrySafeAs/TryConvert — PythonNet cannot convert python methods
    to Func delegates natively, requiring explicit conversion helpers. Evidence: Algorithm.Framework/Selection/FundamentalUniverseSelectionModel.cs:101(TrySafeAs)'
  - 'QC500 selects 500 symbols using dollar volume ranking within sectors, filtering USA/NYSE/NASDAQ with
    >$500M cap — Universe filtering criteria encoded in selection logic. Evidence: Algorithm.Framework/Selection/QC500UniverseSelectionModel.py:59-85'
  acceptance_hints:
  - Universe contains expected number of securities (e.g., 500 for QC500)
  - Universe excludes securities not meeting filter criteria
  - OnSecuritiesChanged fires correctly when universe changes
  - GetNextRefreshTimeUtc returns correct next refresh timestamp
- id: alpha_generation
  name: Alpha Generation
  order: 2
  responsibility: Produces directional predictions (Insights) about security price movements, magnitude,
    confidence, and time horizon for the portfolio construction stage. Generates trading signals from
    technical, fundamental, or statistical models.
  interface:
    inputs:
    - Slice data (market data including prices, volumes, fundamental data)
    - SecurityChanges notifications
    outputs:
    - IEnumerable<Insight> - predictions about symbols with direction, magnitude, confidence, and period
  required_methods:
  - name: AlphaModel.Update
    description: Core method generating insights from market data. Throws NotImplementedException by default,
      forcing explicit override for signal generation.
    evidence: Algorithm/Alphas/AlphaModel.cs:51(throw NotImplementedException)
  - name: AlphaModel.OnSecuritiesChanged
    description: Handles universe changes by resetting per-symbol state when securities are added or removed.
    evidence: Algorithm/Alphas/AlphaModel.cs:59(OnSecuritiesChanged)
  key_behaviors:
  - behavior: Mandatory Update() override
    description: AlphaModel.Update() throws NotImplementedException by default, forcing implementers to
      explicitly override with signal generation logic. Insights are not auto-generated.
    evidence: Algorithm/Alphas/AlphaModel.cs:51(throw NotImplementedException)
  - behavior: Canonical futures/options symbol filtering
    description: Insight.ContainsSymbol() filters canonical contracts which are non-tradable placeholders.
      Emitting insights for canonical symbols would cause order failures.
    evidence: Algorithm.Framework/Alphas/ConstantAlphaModel.cs:119(ShouldEmitInsight)
  - behavior: SymbolData per-symbol state isolation
    description: SymbolData helper classes track per-security state (e.g., _rsiBySymbol) preventing cross-contamination
      of indicator state between symbols in multi-symbol models.
    evidence: Algorithm.Framework/Alphas/RsiAlphaModel.cs:46(_rsiBySymbol)
  - behavior: Pairs trading state machine enforcement
    description: Pairs trading uses SHORT_RATIO/FLAT_RATIO/LONG_RATIO state machine with enforced transitions
      preventing re-emitting same direction insights. Removing state check would allow duplicate insights
      per cycle.
    evidence: Algorithm.Framework/Alphas/BasePairsTradingAlphaModel.py:108-194(Pair.State)
  - behavior: Price gap mean reversion threshold
    description: Uses 3x volatility threshold to define outliers (abs(100*price_jump) > 3*volatility).
      Changing threshold alters which gaps trigger insights.
    evidence: Algorithm.Python/Alphas/PriceGapMeanReversionAlpha.py:139
  - behavior: Pairs trading EMA mean period
    description: Uses hardcoded period of 500 for ratio EMA mean calculation. Shortening period reduces
      stability of mean and changes signal frequency.
    evidence: Algorithm.Framework/Alphas/BasePairsTradingAlphaModel.py:147
  replaceable_points:
  - name: Alpha generation strategy
    description: Override Update() to implement custom signal logic using any combination of data sources
      and prediction models
    options:
    - name: Technical indicators (MACD, RSI, EMA)
      traits:
      - Price-based
      - Fast response
      - No fundamental data
      fit_for:
      - Trend following
      - Mean reversion
      - Short-term trading
      - High turnover
      not_fit_for:
      - Long-term investments
      - Event-driven
      - Low frequency
    - name: Statistical arbitrage
      traits:
      - Pair correlation
      - Mean reversion
      - Market neutral
      fit_for:
      - Market neutral strategies
      - Pairs trading
      - Short-term alpha
      not_fit_for:
      - Directional bets
      - Long-only portfolios
      - Low-frequency
    - name: Machine learning predictions
      traits:
      - Data-driven
      - Multi-factor
      - Non-linear patterns
      fit_for:
      - Alpha combination
      - Alternative data
      - Complex patterns
      not_fit_for:
      - Interpretability required
      - Small datasets
      - High-frequency
    - name: External signal providers
      traits:
      - Third-party data
      - Proprietary models
      - Research-backed
      fit_for:
      - Research-driven alpha
      - Alternative data
      - Specialized expertise
      not_fit_for:
      - Latency-sensitive
      - Full control required
      - Regulatory compliance
    default: NullAlphaModel (no insights emitted)
  design_decisions:
  - 'AlphaModel.Update() throws NotImplementedException by default — Forces implementers to explicitly
    override Update() - insights are not auto-generated. Evidence: Algorithm/Alphas/AlphaModel.cs:51(throw
    NotImplementedException)'
  - 'Insight.ContainsSymbol() filters canonical futures/options — Canonical contracts are non-tradable
    placeholders; emitting insights for them would fail. Evidence: Algorithm.Framework/Alphas/ConstantAlphaModel.cs:119(ShouldEmitInsight)'
  - 'Guid-based default Name for AlphaModel — Ensures unique identification for Python-wrapped models
    without explicit naming. Evidence: Algorithm/Alphas/AlphaModel.cs:39(Guid.NewGuid)'
  - 'SymbolData helper classes track per-security state — Prevents cross-contamination of indicator state
    between symbols in multi-symbol models. Evidence: Algorithm.Framework/Alphas/RsiAlphaModel.cs:46(_rsiBySymbol)'
  - 'Pairs trading state machine (SHORT_RATIO/FLAT_RATIO/LONG_RATIO) with enforced state transitions —
    Prevents re-emitting same direction. Evidence: Algorithm.Framework/Alphas/BasePairsTradingAlphaModel.py:108-194(Pair.State)'
  acceptance_hints:
  - Insights are generated with valid direction (Up/Down/Flat), magnitude, and period
  - Insight.ContainsSymbol() correctly filters canonical contracts
  - OnSecuritiesChanged properly resets per-symbol state
  - SymbolData instances are created per unique Symbol
  - Pairs trading respects state machine transitions
- id: portfolio_construction
  name: Portfolio Construction
  order: 3
  responsibility: Converts insights into portfolio weight targets using configured weighting strategy
    and rebalancing rules. Manages position sizing, portfolio bias (long/short), and insight expiration
    handling.
  interface:
    inputs:
    - Insight[] - active alpha predictions from alpha generation stage
    outputs:
    - IEnumerable<IPortfolioTarget> - desired holdings as Symbol + percentage pairs
  required_methods:
  - name: PortfolioConstructionModel.CreateTargets
    description: Main method converting active insights into portfolio targets. Handles rebalancing logic,
      insight expiration, and portfolio bias filtering.
    evidence: Algorithm/Portfolio/PortfolioConstructionModel.cs:30(CreateTargets)
  - name: PortfolioConstructionModel.DetermineTargetPercent
    description: Virtual method computing weight for individual insight. Override for custom weighting
      logic.
    evidence: Algorithm/Portfolio/PortfolioConstructionModel.cs:140(DetermineTargetPercent)
  key_behaviors:
  - behavior: Rebalance triggers on security and insight changes
    description: Both RebalanceOnSecurityChanges and RebalanceOnInsightChanges default to true, triggering
      target recalculation on any change. Disabling breaks expected portfolio behavior.
    evidence: Algorithm/Portfolio/PortfolioConstructionModel.cs:39-44
  - behavior: PortfolioBias controls long/short direction
    description: PortfolioBias enum (Long, Short, LongShort) enforced at portfolio construction. Alpha
      can generate shorts but bias filter may exclude them. Defaults to LONG_SHORT enabling short positions.
    evidence: Algorithm.Framework/Portfolio/EqualWeightingPortfolioConstructionModel.py:22(__init__)
  - behavior: Equal weighting excludes Flat direction insights
    description: Equal weighting computes 1/N excluding FLAT direction insights. Sum may not equal 100%
      if bias excludes some insights, resulting in underallocation.
    evidence: Algorithm.Framework/Portfolio/EqualWeightingPortfolioConstructionModel.py:51-52
  - behavior: Insight weight normalization
    description: InsightWeightingPortfolioConstructionModel normalizes weights to sum=1 if weight_sums
      > 1. Overweighted insights get scaled down; removing normalization could exceed 100% allocation.
    evidence: Algorithm.Framework/Portfolio/InsightWeightingPortfolioConstructionModel.py:53-56
  - behavior: Minimum order margin filtering
    description: FilterInvalidInsightMagnitude validates against algorithm settings. Prevents extreme
      position sizes from corrupting portfolio. Default minimum often set to 0 in algorithms.
    evidence: Algorithm/Portfolio/PortfolioConstructionModel.cs:311(FilterInvalidInsightMagnitude)
  - behavior: Func<DateTime, DateTime?> rebalancing scheduling
    description: Rebalancing function with null return means immediate rebalance. Allows time-based scheduling
      (daily, resolution-based) with null meaning 'rebalance now'.
    evidence: Algorithm/Portfolio/PortfolioConstructionModel.cs:64(rebalancingFunc)
  replaceable_points:
  - name: Weighting methodology
    description: Override DetermineTargetPercent() for custom weighting logic, or use built-in models
      with configurable parameters
    options:
    - name: Equal weighting
      traits:
      - Simple 1/N
      - Market neutral capable
      - No optimization needed
      fit_for:
      - Uncorrelated alpha
      - Diversified signals
      - Risk-balanced portfolios
      not_fit_for:
      - Concentrated bets
      - High-conviction alpha
      - Risk-adjusted optimization
    - name: Insight-weighted
      traits:
      - Confidence-based
      - Magnitude-aware
      - Simple optimization
      fit_for:
      - Varied signal strength
      - Confidence-adjusted sizing
      - Quick implementation
      not_fit_for:
      - Uniform alpha quality
      - Risk parity requirements
      - Constraints optimization
    - name: Mean-variance optimized
      traits:
      - Modern Portfolio Theory
      - Sharpe optimization
      - scipy-based
      fit_for:
      - Return-risk tradeoff
      - Diversification optimization
      - Academic approaches
      not_fit_for:
      - Robustness concerns
      - Non-normal returns
      - Multi-objective
    - name: Risk parity
      traits:
      - Equal risk contribution
      - Volatility-based
      - Leverage often needed
      fit_for:
      - Multi-asset portfolios
      - Balanced risk allocation
      - Diversified sources
      not_fit_for:
      - Return maximization
      - Leverage-constrained
      - Concentrated alpha
    - name: Black-Litterman
      traits:
      - Bayesian views
      - CAPM prior
      - View uncertainty (tau=0.05)
      fit_for:
      - Informed views
      - Prior distribution
      - Balanced active/passive
      not_fit_for:
      - No market prior
      - Pure alpha
      - Small-cap focus
    default: EqualWeightingPortfolioConstructionModel with Daily rebalance and LongShort bias
  design_decisions:
  - 'RebalanceOnSecurityChanges defaults to true — Universe changes require portfolio adjustment to maintain
    intended exposure. Evidence: Algorithm/Portfolio/PortfolioConstructionModel.cs:39(RebalanceOnSecurityChanges)'
  - 'RebalanceOnInsightChanges defaults to true — New or expired insights should trigger target recalculation.
    Evidence: Algorithm/Portfolio/PortfolioConstructionModel.cs:44(RebalanceOnInsightChanges)'
  - 'Func<DateTime, DateTime?> rebalancing func with null = immediate — Allows time-based scheduling with
    null meaning ''rebalance now''. Evidence: Algorithm/Portfolio/PortfolioConstructionModel.cs:64(rebalancingFunc)'
  - 'PortfolioBias.LongShort is default for EqualWeighting — Default allows both long and short positions.
    Evidence: Algorithm.Framework/Portfolio/EqualWeightingPortfolioConstructionModel.cs:55(PortfolioBias.LongShort)'
  - 'FilterInvalidInsightMagnitude validates against algorithm settings — Prevents extreme position sizes
    from corrupting portfolio. Evidence: Algorithm/Portfolio/PortfolioConstructionModel.cs:311(FilterInvalidInsightMagnitude)'
  - 'Black-Litterman tau parameter defaults to 0.05 — Uncertainty of CAPM prior trusts views appropriately.
    Evidence: Algorithm.Framework/Portfolio/BlackLittermanOptimizationPortfolioConstructionModel.py:38'
  - 'AccumulativeInsight inherits from EqualWeighting with percent-based incremental sizing — Subclass
    overrides determine_target_percent with 0.03 default. Evidence: Algorithm.Framework/Portfolio/AccumulativeInsightPortfolioConstructionModel.py:29,44-72'
  acceptance_hints:
  - Portfolio targets sum to appropriate allocation (may not be 100% if bias filters insights)
  - Rebalancing fires on security changes when RebalanceOnSecurityChanges is true
  - Rebalancing fires on new/expired insights when RebalanceOnInsightChanges is true
  - PortfolioBias correctly filters long/short directions
  - Minimum order margin filtering removes tiny positions
  - Insight weights normalize correctly when sum exceeds 1
- id: risk_management
  name: Risk Management
  order: 4
  responsibility: Monitors portfolio risk and modifies or liquidates positions when risk thresholds are
    breached. Final safety layer before order submission that can override portfolio targets to reduce
    exposure.
  interface:
    inputs:
    - IPortfolioTarget[] - current targets from portfolio construction
    - QCAlgorithm portfolio state (prices, holdings)
    outputs:
    - IEnumerable<IPortfolioTarget> - risk-adjusted targets (often 0% for liquidation)
  required_methods:
  - name: RiskManagementModel.ManageRisk
    description: Core method evaluating current positions against risk thresholds and returning adjusted
      targets. Called after portfolio construction before execution.
    evidence: Algorithm/Risk/RiskManagementModel.cs:25(ManageRisk)
  key_behaviors:
  - behavior: Trailing stop tracks absolute holdings value per position
    description: Must track high/low separately for long vs short positions to determine correct drawdown
      reference. Position side tracked separately from order direction for covered calls.
    evidence: Algorithm.Framework/Risk/TrailingStopRiskManagementModel.cs:68(HoldingsState)
  - behavior: Math.Abs for drawdown calculation
    description: _maximumDrawdownPercent uses Math.Abs for sign insensitivity. Both long and short positions
      use same percentage threshold regardless of direction.
    evidence: Algorithm.Framework/Risk/TrailingStopRiskManagementModel.cs:38(Math.Abs)
  - behavior: Insight cancellation on risk trigger
    description: Cancelled insights via algorithm.Insights.Cancel() on risk trigger. Stops new position
      entries for symbol being liquidated to prevent re-entry.
    evidence: Algorithm.Framework/Risk/TrailingStopRiskManagementModel.cs:86(Cancel)
  - behavior: Trailing vs fixed drawdown modes
    description: MaximumDrawdownPercentPortfolio is_trailing flag changes drawdown calculation from initial
      value vs trailing high. Different modes require different portfolio high tracking.
    evidence: Algorithm.Framework/Risk/MaximumDrawdownPercentPortfolio.py:19-44
  replaceable_points:
  - name: Risk control mechanism
    description: Override ManageRisk() for custom risk logic or use built-in risk models
    options:
    - name: Trailing stop
      traits:
      - High water mark
      - Dynamic stop
      - Profit locking
      fit_for:
      - Trend following
      - Volatile markets
      - Profit protection
      not_fit_for:
      - Mean reversion
      - Range-bound
      - Whipsaw-prone
    - name: Hard stop loss
      traits:
      - Fixed threshold
      - Immediate exit
      - Simple
      fit_for:
      - Defined risk
      - Short-term trades
      - Simple strategies
      not_fit_for:
      - Trend following
      - Volatile underlyings
      - Gaps
    - name: Sector limits
      traits:
      - Concentration control
      - Sector exposure
      - Diversification
      fit_for:
      - Diversified alpha
      - Sector-neutral
      - Institutional
      not_fit_for:
      - Concentrated bets
      - Sector rotation
      - Thematic
    - name: Delta hedging
      traits:
      - Options Greeks
      - Market neutral
      - Continuous adjustment
      fit_for:
      - Options strategies
      - Volatility trading
      - Gamma scalping
      not_fit_for:
      - Equity-only
      - Long-term positions
      - Simple strategies
    - name: Position sizing limits
      traits:
      - Max position size
      - Order sizing
      - Exposure control
      fit_for:
      - Every strategies
      - Risk budgeting
      - Multi-strategy
      not_fit_for:
      - Fixed weight mandates
      - Concentrated alpha
      - All-in signals
    default: NullRiskManagementModel (no intervention, pass-through targets)
  design_decisions:
  - 'TrailingStopRiskManagementModel tracks absolute holdings value per position — Must track high/low
    separately for long vs short positions. Evidence: Algorithm.Framework/Risk/TrailingStopRiskManagementModel.cs:68(HoldingsState)'
  - '_maximumDrawdownPercent uses Math.Abs for sign insensitivity — Both long and short positions use
    same percentage threshold. Evidence: Algorithm.Framework/Risk/TrailingStopRiskManagementModel.cs:38(Math.Abs)'
  - 'Cancelled insights via algorithm.Insights.Cancel() on risk trigger — Stops new position entries for
    symbol being liquidated. Evidence: Algorithm.Framework/Risk/TrailingStopRiskManagementModel.cs:86(Cancel)'
  - 'Default maximumDrawdownPercent of 5% for TrailingStopRiskManagementModel — Conservative default suitable
    for most strategies. Evidence: Algorithm.Framework/Risk/TrailingStopRiskManagementModel.cs:36(0.05m)'
  acceptance_hints:
  - Risk model correctly identifies when positions breach thresholds
  - Risk-adjusted targets returned before execution
  - Trailing stop correctly tracks high water marks for long and short
  - Insights cancelled when risk triggers liquidation
  - Math.Abs correctly applied for drawdown on both long and short
- id: execution
  name: Execution
  order: 5
  responsibility: Translates portfolio targets into actual orders with smart order routing, spread management,
    and price optimization strategies. Implements execution algorithms for optimal fill quality.
  interface:
    inputs:
    - IPortfolioTarget[] - desired positions from portfolio/risk stages
    outputs:
    - Order submissions to brokerage via algorithm.MarketOrder/LimitOrder/etc.
  required_methods:
  - name: ExecutionModel.Execute
    description: Core method receiving portfolio targets and generating order requests. Implements order
      sizing, timing, and routing logic.
    evidence: Algorithm/Execution/ExecutionModel.cs:26(Execute)
  - name: ExecutionModel.OnOrderEvent
    description: Handles order fill events for tracking execution quality and adjusting future orders.
    evidence: Algorithm/Execution/ExecutionModel.cs:26(OnOrderEvent)
  key_behaviors:
  - behavior: Asynchronous order submission by default
    description: Asynchronous order submission defaults to true for non-blocking execution improving backtest
      throughput. Synchronous mode available for precise fill simulation.
    evidence: Algorithm/Execution/ExecutionModel.cs:37(asynchronous=true)
  - behavior: VWAP-based price favorability
    description: PriceIsFavorable uses BidPrice/VWAP for buys (buy when price below average) and AskPrice/VWAP
      for sells (sell when price above average). Swapping would buy at unfavorable prices.
    evidence: Algorithm.Framework/Execution/VolumeWeightedAveragePriceExecutionModel.cs:155(BidPrice<VWAP)
  - behavior: Volume-based order sizing
    description: MaximumOrderQuantityPercentVolume defaults to 1% of bar volume. Large orders split across
      multiple bars to prevent market impact.
    evidence: Algorithm.Framework/Execution/VolumeWeightedAveragePriceExecutionModel.py:28
  - behavior: Standard deviation execution limits
    description: MaximumOrderValue defaults to $20,000 capping single order size. Large cap stocks may
      require multiple orders.
    evidence: Algorithm.Framework/Execution/StandardDeviationExecutionModel.py:41
  - behavior: VWAP resets on daily boundaries
    description: VWAP resets at midnight, not algorithm time boundaries. Partial day VWAP calculations
      may be incorrect if algorithm spans multiple days.
    evidence: Algorithm.Framework/Execution/VolumeWeightedAveragePriceExecutionModel.py:128-132
  replaceable_points:
  - name: Order execution strategy
    description: Override Execute() for custom order management or use built-in execution models
    options:
    - name: Immediate execution
      traits:
      - Market orders
      - Instant fills
      - No optimization
      fit_for:
      - Liquid securities
      - High-frequency
      - Simple strategies
      not_fit_for:
      - Illiquid securities
      - Large orders
      - Cost-sensitive
    - name: VWAP-based
      traits:
      - Volume-weighted
      - Day-range
      - Price improvement
      fit_for:
      - Liquid stocks
      - Day trades
      - VWAP benchmark
      not_fit_for:
      - Illiquid securities
      - Intraday-only
      - Low volume
    - name: Time-weighted average (TWAP)
      traits:
      - Equal time slices
      - Scheduled fills
      - Simple
      fit_for:
      - Illiquid securities
      - Dark pools
      - Simple execution
      not_fit_for:
      - Volume-sensitive
      - Fast markets
      - Cost optimization
    - name: Implementation shortfall
      traits:
      - Arrival price
      - Urgency-based
      - Cost-delay tradeoff
      fit_for:
      - Urgency-driven
      - Large orders
      - Benchmark-sensitive
      not_fit_for:
      - Passive strategies
      - Small orders
      - Low urgency
    - name: Pairs spread
      traits:
      - Spread monitoring
      - Pairs trading
      - Ratio-based
      fit_for:
      - Pairs trading
      - Mean reversion
      - Market neutral
      not_fit_for:
      - Directional strategies
      - Single-leg
      - Uncorrelated pairs
    default: ImmediateExecutionModel
  design_decisions:
  - 'Asynchronous order submission defaults to true — Non-blocking execution improves backtest throughput.
    Evidence: Algorithm/Execution/ExecutionModel.cs:37(asynchronous=true)'
  - 'MaximumOrderQuantityPercentVolume defaults to 1% of bar volume — Prevents large orders from moving
    market excessively. Evidence: Algorithm.Framework/Execution/VolumeWeightedAveragePriceExecutionModel.cs:42(0.01m)'
  - 'PriceIsFavorable uses BidPrice/VWAP for buys, AskPrice/VWAP for sells — Buy when price is below average
    cost basis reduces impact. Evidence: Algorithm.Framework/Execution/VolumeWeightedAveragePriceExecutionModel.cs:155(BidPrice<VWAP)'
  - 'SymbolData helper tracks VWAP per symbol with consolidator — Each security needs its own VWAP calculation
    and data consolidator. Evidence: Algorithm.Framework/Execution/VolumeWeightedAveragePriceExecutionModel.cs:176(SymbolData)'
  - 'StandardDeviationExecutionModel maximum_order_value defaults to $20,000 — Large cap stocks may require
    multiple orders. Evidence: Algorithm.Framework/Execution/StandardDeviationExecutionModel.py:41'
  acceptance_hints:
  - Orders submitted with correct symbol and quantity
  - Execution respects volume limits (1% of bar volume default)
  - PriceIsFavorable correctly evaluates bid/ask vs VWAP
  - Asynchronous mode enables parallel order processing
  - OnOrderEvent correctly handles fill events
- id: order_lifecycle
  name: Order Lifecycle Management
  order: 6
  responsibility: Manages order submission, fills, updates, and cancellations. Integrates slippage/fee
    models and margin calculations. Handles the complete order lifecycle from request to settlement.
  interface:
    inputs:
    - Order requests from execution stage
    - Fill events from brokerage
    - Price data from market
    outputs:
    - OrderStatus updates
    - Portfolio updates
    - Margin call events
  required_methods:
  - name: SecurityTransactionManager.UpdateOrder
    description: Central order management method handling order modifications and cancellations with proper
      state transitions.
    evidence: Common/Securities/SecurityTransactionManager.cs:17(UpdateOrder)
  - name: VolumeShareSlippageModel.get_slippage_approximation
    description: Calculates slippage based on order size relative to bar volume using quadratic volume_share
      formula.
    evidence: Common/Orders/Slippage/VolumeShareSlippageModel.py:59(get_slippage_approximation)
  key_behaviors:
  - behavior: Quadratic volume_share slippage model
    description: VolumeShareSlippageModel uses volume_share^2 * price_impact for non-linear slippage.
      Larger orders have disproportionately higher impact than linear models would estimate.
    evidence: Common/Orders/Slippage/VolumeShareSlippageModel.py:59(volume_share*volume_share)
  - behavior: Volume limit caps slippage calculation
    description: volume_limit caps slippage calculation at 2.5% (0.025) volume share. Prevents infinite
      slippage estimates for very large orders facing liquidity constraints.
    evidence: Common/Orders/Slippage/VolumeShareSlippageModel.py:19(volume_limit=0.025)
  - behavior: Option strategies batch multiple legs
    description: OptionStrategies helper batches multiple legs for proper margin and correlation in margin
      calculations. Strategy buying power < sum of individual legs.
    evidence: Algorithm.Python/OptionStrategyFactoryMethodsBaseAlgorithm.py:68(trade_strategy)
  - behavior: Forex/CFD zero slippage with warning
    description: Forex/CFD volume not reported, resulting in zero slippage with warning. Continuous markets
      lack volume bars making slippage estimation unreliable.
    evidence: Common/Orders/Slippage/VolumeShareSlippageModel.py:50(security_type check)
  replaceable_points:
  - name: Slippage model
    description: Implement get_slippage_approximation() for custom slippage calculation
    options:
    - name: Volume-based
      traits:
      - Quadratic volume_share
      - Market impact
      - Volume limits
      fit_for:
      - Equities with volume
      - Liquid securities
      - Backtesting accuracy
      not_fit_for:
      - Forex/CFD
      - Illiquid securities
      - Options
    - name: Constant spread
      traits:
      - Fixed spread
      - Simple
      - Conservative
      fit_for:
      - Fixed spread brokers
      - Forex
      - Simple estimation
      not_fit_for:
      - Variable spreads
      - Volume-sensitive
      - High-frequency
    - name: Market impact models
      traits:
      - Advanced impact
      - Liquidity modeling
      - Price dynamics
      fit_for:
      - Institutional
      - Large orders
      - Multi-asset
      not_fit_for:
      - Retail strategies
      - Small orders
      - Simple backtests
    default: VolumeShareSlippageModel with defaults (volume_share² × price_impact)
  - name: Fee model
    description: Implement get_order_fee() for brokerage-specific fee calculations
    options:
    - name: Fixed per share
      traits:
      - Per-contract/share
      - Volume-independent
      fit_for:
      - Standard equities
      - Options
      - Fixed-cost brokers
      not_fit_for:
      - Percentage fees
      - Tiered pricing
      - Variable costs
    - name: Percentage-based
      traits:
      - Fraction of value
      - AUM-sensitive
      fit_for:
      - Percentage fee brokers
      - Large positions
      - Advisory accounts
      not_fit_for:
      - Fixed-cost brokers
      - High-frequency
      - Small positions
    - name: Brokerage-specific
      traits:
      - Live data integration
      - Tiered pricing
      - Promotions
      fit_for:
      - Live trading
      - Specific brokers
      - Accurate costs
      not_fit_for:
      - General backtesting
      - Broker-agnostic
      - Unknown fees
    default: Brokerage fee model
  design_decisions:
  - 'VolumeShareSlippageModel uses volume_share^2 * price_impact — Quadratic relationship models increasing
    market impact for larger orders. Evidence: Common/Orders/Slippage/VolumeShareSlippageModel.py:59(volume_share*volume_share)'
  - 'volume_limit caps slippage calculation at 2.5% volume share — Prevents infinite slippage estimates.
    Evidence: Common/Orders/Slippage/VolumeShareSlippageModel.py:19(volume_limit=0.025)'
  - 'Option strategies batch multiple legs via OptionStrategies helper — Strategy-level orders ensure
    proper margin and correlation. Evidence: Algorithm.Python/OptionStrategyFactoryMethodsBaseAlgorithm.py:68(trade_strategy)'
  - 'Forex/CFD volume not reported → zero slippage with warning — Continuous markets lack volume bars.
    Evidence: Common/Orders/Slippage/VolumeShareSlippageModel.py:50(security_type check)'
  acceptance_hints:
  - Orders complete full lifecycle (Pending -> PartiallyFilled -> Filled/Cancelled)
  - Slippage correctly calculated based on order volume relative to bar
  - Fees correctly applied per brokerage model
  - Margin calculations prevent overtrading
  - Option strategies correctly batched for margin efficiency
- id: algorithm_manager
  name: Algorithm Manager (Orchestration)
  order: 7
  responsibility: Central coordinator that streams time slices, invokes framework pipeline in sequence,
    and manages algorithm lifecycle (warmup, margin calls, events). Orchestrates each stages and manages
    the main execution loop.
  interface:
    inputs:
    - AlgorithmNodePacket
    - IAlgorithm
    - ISynchronizer
    - ITransactionHandler
    - IResultHandler
    outputs:
    - Algorithm execution
    - Results streaming
    - Final statistics
  required_methods:
  - name: AlgorithmManager.Run
    description: Main execution loop coordinating each framework components, streaming time slices, and
      managing algorithm lifecycle.
    evidence: Engine/AlgorithmManager.cs:47(Run)
  - name: AlgorithmManager.OnFrameworkData
    description: 'Invokes the framework pipeline in sequence: Universe -> Alpha -> Portfolio -> Risk ->
      Execute. Called for each time slice with framework data.'
    evidence: Engine/AlgorithmManager.cs:562(OnFrameworkData)
  - name: AlgorithmManager.ProcessSynchronousEvents
    description: Processes synchronous events after OnData, simulating immediate fill for market orders
      in historical mode.
    evidence: Engine/AlgorithmManager.cs:574(ProcessSynchronousEvents)
  key_behaviors:
  - behavior: Framework pipeline order enforcement
    description: 'Pipeline invokes in strict order: Universe -> Alpha -> Portfolio -> Risk -> Execute.
      Canonical MPT pipeline ensures signals flow correctly through sizing to execution.'
    evidence: Engine/AlgorithmManager.cs:562(OnFrameworkData)
  - behavior: Margin call frequency management
    description: Margin call frequency of 5 minutes in backtest. Frequent enough to prevent cascade failures
      but not so frequent as to slow backtests.
    evidence: Engine/AlgorithmManager.cs:132(marginCallFrequency)
  - behavior: SecurityChanges filtering
    description: SecurityChanges filtered by default (custom/internal securities excluded). User algorithms
      don't need internal securities in change notifications.
    evidence: Engine/AlgorithmManager.cs:405(FilterCustomSecurities)
  - behavior: Consolidator scanning after data injection
    description: Consolidator scan happens after each data pumped through each time slice. Ensures each
      data points contribute to indicator values before scanning for events.
    evidence: Engine/AlgorithmManager.cs:446(scan after)
  - behavior: Warmup mode differences
    description: Live mode warmup uses DateTime.UtcNow; backtest uses algorithm.StartDate. Historical
      backtests start from algorithm start date; live needs real-time warmup window.
    evidence: Engine/AlgorithmManager.cs:696(UtcNow vs algorithm.StartDate)
  - behavior: Performance tracking per stage
    description: PerformanceTrackingTool monitors each pipeline stage independently, enabling profiling
      to identify bottlenecks in alpha, portfolio, execution, or risk stages.
    evidence: Engine/AlgorithmManager.cs:420(Start/Stop PerformanceTarget)
  replaceable_points:
  - name: Transaction handler
    description: Handle order processing and execution simulation
    options:
    - name: Backtesting (immediate fills)
      traits:
      - Instant fills
      - No latency
      - Simplified simulation
      fit_for:
      - Strategy development
      - Historical testing
      - Rapid iteration
      not_fit_for:
      - Live trading
      - Broker integration
      - Latency modeling
    - name: Brokerage integration
      traits:
      - Real fills
      - Live data
      - Actual execution
      fit_for:
      - Live trading
      - Paper trading
      - Production
      not_fit_for:
      - Backtesting
      - Historical simulation
      - Offline development
    default: BacktestingTransactionHandler
  design_decisions:
  - 'Framework pipeline order: Universe -> Alpha -> Portfolio -> Risk -> Execute — Canonical MPT pipeline.
    Evidence: Engine/AlgorithmManager.cs:562(OnFrameworkData)'
  - 'Margin call frequency of 5 minutes in backtest — Frequent enough to prevent cascade failures. Evidence:
    Engine/AlgorithmManager.cs:132(marginCallFrequency)'
  - 'SecurityChanges filtered by default (custom/internal securities) — User algorithms don''t need internal
    securities. Evidence: Engine/AlgorithmManager.cs:405(FilterCustomSecurities)'
  - 'Consolidator scan happens after each data pumped through — Ensures each data points contribute to
    indicators. Evidence: Engine/AlgorithmManager.cs:446(scan after)'
  - 'ProcessSynchronousEvents called after OnData for backtest — Simulates immediate fill for market orders.
    Evidence: Engine/AlgorithmManager.cs:574(ProcessSynchronousEvents)'
  - 'Live mode warmup uses DateTime.UtcNow; backtest uses algorithm.StartDate — Historical backtests start
    from algorithm start date. Evidence: Engine/AlgorithmManager.cs:696(UtcNow vs algorithm.StartDate)'
  - 'Python/C# interop via BasePythonWrapper with TryInvokePythonOverride pattern — Python models can
    override virtual methods. Evidence: Algorithm.Framework/Execution/VolumeWeightedAveragePriceExecutionModel.cs:135(TryInvokePythonOverride)'
  - 'Multiple constructor overloads for Python compatibility — Python cannot pass Func delegates. Evidence:
    Algorithm/Portfolio/PortfolioConstructionModel.cs:74(Func<DateTime,DateTime> overload)'
  acceptance_hints:
  - Algorithm executes end-to-end with correct results
  - Framework pipeline executes in correct order
  - Margin calls processed every 5 minutes
  - Consolidators produce correct aggregated bars
  - Warmup period correctly populated with historical data
  - Performance metrics available per pipeline stage
data_flow:
- from_stage: universe_selection
  to_stage: alpha_generation
  data: Securities added/removed via OnSecuritiesChanged; Slice data contains prices for selected securities
- from_stage: alpha_generation
  to_stage: portfolio_construction
  data: Insight[] - directional predictions with magnitude, confidence, period, and weight
- from_stage: portfolio_construction
  to_stage: risk_management
  data: IPortfolioTarget[] - desired targets before risk intervention
- from_stage: portfolio_construction
  to_stage: execution
  data: IPortfolioTarget[] - initial targets in case risk management passes through
- from_stage: risk_management
  to_stage: execution
  data: IPortfolioTarget[] - risk-adjusted targets (may include 0% for liquidation)
- from_stage: execution
  to_stage: order_lifecycle
  data: Order requests (MarketOrder, LimitOrder, etc.)
- from_stage: order_lifecycle
  to_stage: algorithm_manager
  data: OrderStatus updates, Portfolio updates, Margin calls
- from_stage: algorithm_manager
  to_stage: universe_selection
  data: Time slice events and market data via Slice
- from_stage: algorithm_manager
  to_stage: alpha_generation
  data: SecurityChanges events via OnSecuritiesChanged/OnFrameworkSecuritiesChanged
