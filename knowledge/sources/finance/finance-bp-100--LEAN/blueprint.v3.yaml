business_decisions:
- id: BD-001
  type: BA/M
  content: FundamentalUniverseSelectionModel uses unified Select() over deprecated SelectCoarse/SelectFine
  rationale: Single-pass selection is more efficient than two-pass coarse/fine filtering. The old SelectCoarse/SelectFine
    methods are marked [Obsolete] at lines 226 and 244, forcing migration. This reduces algorithm complexity
    and eliminates redundant universe evaluation cycles.
  evidence: Algorithm.Framework/Selection/FundamentalUniverseSelectionModel.cs:205(Select)
  stage: universe_selection
  alternative_considered: Keeping dual-pass SelectCoarse/SelectFine for backward compatibility was rejected
    due to maintenance burden and performance cost
- id: BD-002
  type: B/BA
  content: UniverseSelectionModel.GetNextRefreshTimeUtc() defaults to DateTime.MaxValue
  rationale: 'Lazy refresh pattern: universes only refresh when explicitly scheduled or when security
    changes occur. Defaulting to DateTime.MaxValue prevents unnecessary evaluation cycles, reducing CPU
    overhead and improving backtest performance without sacrificing correctness.'
  evidence: Algorithm/Selection/UniverseSelectionModel.cs:40(GetNextRefreshTimeUtc)
  stage: universe_selection
  alternative_considered: Defaulting to immediate refresh was rejected due to excessive re-evaluation
    in large universes
- id: BD-003
  type: M
  content: Python selector functions converted via TrySafeAs/TryConvert
  rationale: PythonNet cannot natively convert Python methods to Func delegates required by the framework.
    TrySafeAs and TryConvert helpers bridge this gap by providing explicit type conversion, enabling Python
    users to define universe selection logic using native Python syntax.
  evidence: Algorithm.Framework/Selection/FundamentalUniverseSelectionModel.cs:101(TrySafeAs)
  stage: universe_selection
  alternative_considered: Requiring C# delegates was rejected; would break Python workflow and reduce
    accessibility
- id: BD-004
  type: B/BA
  content: AlphaModel.Update() throws NotImplementedException by default
  rationale: Forces framework implementers to explicitly override Update() method, ensuring alpha generation
    logic is intentional. This prevents accidental no-op alpha models and guarantees insights are generated
    through deliberate strategy implementation rather than default behavior.
  evidence: Algorithm/Alphas/AlphaModel.cs:51(Update)
  stage: alpha_generation
  alternative_considered: Defaulting to empty implementation was rejected; would mask configuration errors
- id: BD-005
  type: B
  content: Insight.ContainsSymbol() filters canonical futures/options
  rationale: Canonical contracts are non-tradable placeholders in the futures/options chain hierarchy.
    Emitting insights for canonical symbols would fail at execution since these contracts cannot be ordered.
    Filtering prevents runtime errors and ensures insights target tradeable symbols.
  evidence: Algorithm.Framework/Alphas/ConstantAlphaModel.cs:119(ShouldEmitInsight)
  stage: alpha_generation
  alternative_considered: Allowing canonical insights was rejected; would cause unresolved order errors
- id: BD-006
  type: B/BA
  content: Guid-based default Name for AlphaModel
  rationale: Ensures unique identification for Python-wrapped models when users don't provide explicit
    naming. GUID generation guarantees no naming collisions when multiple model instances are created,
    enabling proper insight attribution and debugging in multi-model algorithms.
  evidence: Algorithm/Alphas/AlphaModel.cs:39(AlphaModel)
  stage: alpha_generation
  alternative_considered: Defaulting to null/empty name was rejected; would cause tracking issues in multi-model
    algorithms
- id: BD-007
  type: M
  content: SymbolData helper classes track per-security state
  rationale: Prevents cross-contamination of indicator state between symbols in multi-symbol models. Each
    security requires isolated state management for its rolling window, consolidator, and historical data.
    Without per-symbol tracking, indicators would bleed data across different assets.
  evidence: Algorithm.Framework/Alphas/RsiAlphaModel.cs:46(_rsiBySymbol)
  stage: alpha_generation
  alternative_considered: Static/global indicators were rejected; would produce wrong results in multi-symbol
    strategies
- id: BD-008
  type: BA
  content: RebalanceOnSecurityChanges defaults to true
  rationale: Universe changes require portfolio adjustment to maintain intended target exposure. When
    securities are added/removed, rebalancing ensures portfolio weights remain consistent with strategy
    design. Defaulting to true prevents unintended exposure drift after universe modifications.
  evidence: Algorithm/Portfolio/PortfolioConstructionModel.cs:39(RebalanceOnSecurityChanges)
  stage: portfolio_construction
  alternative_considered: Defaulting to false required manual rebalancing and risked exposure drift
- id: BD-009
  type: BA
  content: RebalanceOnInsightChanges defaults to true
  rationale: New, updated, or expired insights should trigger target portfolio recalculation. This ensures
    portfolio responds dynamically to alpha signals without manual intervention. Defaulting to true keeps
    portfolio aligned with latest signal generation.
  evidence: Algorithm/Portfolio/PortfolioConstructionModel.cs:44(RebalanceOnInsightChanges)
  stage: portfolio_construction
  alternative_considered: Defaulting to false required explicit rebalancing calls and reduced strategy
    reactivity
- id: BD-010
  type: M
  content: Func<DateTime, DateTime?> rebalancing func with null = immediate
  rationale: Allows flexible time-based rebalancing scheduling (daily, resolution-based) while null return
    value signals immediate rebalancing. This dual-mode design supports both scheduled and event-driven
    portfolio updates without separate interfaces.
  evidence: Algorithm/Portfolio/PortfolioConstructionModel.cs:64(rebalancingFunc)
  stage: portfolio_construction
  alternative_considered: Separate scheduled vs immediate interfaces were rejected; would increase API
    complexity
- id: BD-011
  type: BA
  content: PortfolioBias.LongShort is default for EqualWeighting
  rationale: LongShort bias allows both long and short positions by default, maximizing strategy flexibility.
    Users can restrict to long-only or short-only when needed, but the permissive default enables directional
    strategies without configuration overhead.
  evidence: Algorithm.Framework/Portfolio/EqualWeightingPortfolioConstructionModel.cs:55(PortfolioBias.LongShort)
  stage: portfolio_construction
  alternative_considered: Defaulting to long-only was rejected; would prevent short strategies without
    configuration
- id: BD-012
  type: BA
  content: FilterInvalidInsightMagnitude validates against algorithm settings
  rationale: Prevents extreme position sizes from corrupting portfolio allocation. Insights with magnitudes
    outside configured bounds (min/max) are filtered, preventing runaway leverage or negligible positions
    that could destabilize backtesting or live execution.
  evidence: Algorithm/Portfolio/PortfolioConstructionModel.cs:311(FilterInvalidInsightMagnitude)
  stage: portfolio_construction
  alternative_considered: Allowing unbounded magnitudes was rejected; would risk leverage explosions
- id: BD-013
  type: B/BA
  content: Asynchronous order submission defaults to true
  rationale: Non-blocking execution improves backtest throughput by allowing multiple orders to queue
    without waiting for individual fills. Synchronous mode remains available for precise fill simulation
    scenarios where order-level timing matters.
  evidence: Algorithm/Execution/ExecutionModel.cs:37(asynchronous)
  stage: execution
  alternative_considered: Synchronous-only was rejected; would bottleneck backtests unnecessarily
- id: BD-014
  type: BA/DK
  content: MaximumOrderQuantityPercentVolume defaults to 1% of bar volume
  rationale: Prevents large orders from excessively moving markets in backtesting. Limiting orders to
    1% of bar volume ensures realistic slippage estimates and prevents artificial price distortion that
    would not occur in real execution.
  evidence: Algorithm.Framework/Execution/VolumeWeightedAveragePriceExecutionModel.cs:42(MaximumOrderQuantityPercentVolume)
  stage: execution
  alternative_considered: Unlimited order sizing was rejected; would produce unrealistic backtest results
- id: BD-015
  type: B/DK
  content: PriceIsFavorable uses BidPrice/VWAP for buys, AskPrice/VWAP for sells
  rationale: Buy orders execute when price is below average cost basis (Bid < VWAP); sell orders execute
    when above (Ask > VWAP). This reduces market impact by only trading when price favors the order direction
    relative to recent average.
  evidence: Algorithm.Framework/Execution/VolumeWeightedAveragePriceExecutionModel.cs:155(PriceIsFavorable)
  stage: execution
  alternative_considered: Market orders without price checks were rejected; would increase execution costs
- id: BD-016
  type: M/DK
  content: SymbolData helper tracks VWAP per symbol with consolidator
  rationale: Each security requires its own VWAP calculation and data consolidator to maintain accurate
    volume-weighted pricing. Per-symbol tracking prevents cross-contamination and ensures VWAP reflects
    symbol-specific trading activity.
  evidence: Algorithm.Framework/Execution/VolumeWeightedAveragePriceExecutionModel.cs:176(SymbolData)
  stage: execution
  alternative_considered: Global VWAP was rejected; would produce wrong pricing for multi-symbol execution
- id: BD-017
  type: B/DK
  content: TrailingStopRiskManagementModel tracks absolute holdings value per position
  rationale: Long and short positions require separate high/low tracking to determine correct drawdown
    reference. For longs, tracking the high watermark determines loss from peak; for shorts, tracking
    the low watermark determines loss from trough. Unified tracking would miscalculate for one direction.
  evidence: Algorithm.Framework/Risk/TrailingStopRiskManagementModel.cs:68(HoldingsState)
  stage: risk_management
  alternative_considered: Shared tracking was rejected; would cause incorrect stop triggers for shorts
- id: BD-018
  type: B/BA
  content: _maximumDrawdownPercent uses Math.Abs for sign insensitivity
  rationale: Both long and short positions use the same percentage threshold regardless of direction.
    Using absolute value simplifies configuration (single threshold covers both directions) and ensures
    consistent risk management across long/short strategies.
  evidence: Algorithm.Framework/Risk/TrailingStopRiskManagementModel.cs:38(_maximumDrawdownPercent)
  stage: risk_management
  alternative_considered: Separate long/short thresholds were rejected; would complicate user configuration
- id: BD-019
  type: BA/M
  content: Cancelled insights via algorithm.Insights.Cancel() on risk trigger
  rationale: When risk management liquidates a position, active insights for that symbol must be cancelled
    to prevent new entries. This stops the portfolio construction model from generating conflicting signals
    while position is being unwound.
  evidence: Algorithm.Framework/Risk/TrailingStopRiskManagementModel.cs:86(Cancel)
  stage: risk_management
  alternative_considered: Leaving insights active was rejected; would cause conflicting position building
- id: BD-020
  type: BA/M
  content: Default maximumDrawdownPercent of 5% for TrailingStopRiskManagementModel
  rationale: Conservative 5% default is suitable for most strategies without user configuration. This
    balance protects capital while allowing normal volatility. Users can configure for higher volatility
    strategies or tighter risk controls.
  evidence: Algorithm.Framework/Risk/TrailingStopRiskManagementModel.cs:36(_maximumDrawdownPercent)
  stage: risk_management
  alternative_considered: Tighter 2% default was rejected; would trigger stops too frequently in volatile
    assets
- id: BD-021
  type: M/DK
  content: VolumeShareSlippageModel uses volume_share^2 * price_impact
  rationale: Quadratic relationship models increasing market impact for larger orders. At small volume
    shares, impact is minimal; as share grows, impact accelerates super-linearly, reflecting realistic
    liquidity constraints in order execution.
  evidence: Common/Orders/Slippage/VolumeShareSlippageModel.py:59(volume_share)
  stage: order_lifecycle
  alternative_considered: Linear impact model was rejected; would underestimate impact for large orders
  _evidence_issues:
  - 'FN_NOT_FOUND: volume_share in Common/Orders/Slippage/VolumeShareSlippageModel.py'
- id: BD-022
  type: BA
  content: volume_limit caps slippage calculation at 2.5% volume share
  rationale: Prevents infinite slippage estimates for extremely large orders by capping at 2.5% volume
    share. This assumes very large orders still face some liquidity rather than becoming unbounded, producing
    conservative but realistic slippage bounds.
  evidence: Common/Orders/Slippage/VolumeShareSlippageModel.py:19(volume_limit)
  stage: order_lifecycle
  alternative_considered: Unbounded calculation was rejected; would produce unrealistic slippage for large
    orders
  _evidence_issues:
  - 'FN_NOT_FOUND: volume_limit in Common/Orders/Slippage/VolumeShareSlippageModel.py'
- id: BD-023
  type: M
  content: Option strategies batch multiple legs via OptionStrategies helper
  rationale: Strategy-level orders ensure proper margin calculation and correlation handling across multiple
    option legs. Batching prevents individual leg orders from causing margin fragmentation and ensures
    positions are managed as cohesive units.
  evidence: Algorithm.Python/OptionStrategyFactoryMethodsBaseAlgorithm.py:68(trade_strategy)
  stage: order_lifecycle
  alternative_considered: Individual leg orders were rejected; would cause incorrect margin requirements
- id: BD-024
  type: BA/DK
  content: Forex/CFD volume not reported → zero slippage with warning
  rationale: Continuous markets (Forex/CFD) lack volume bar data, making slippage estimation unreliable.
    Zero slippage with warning acknowledges the limitation while preventing NaN/∞ values. Users should
    rely on spread assumptions rather than volume-based impact.
  evidence: Common/Orders/Slippage/VolumeShareSlippageModel.py:50(security_type check)
  stage: order_lifecycle
  alternative_considered: Raising error was rejected; would prevent backtesting of Forex/CFD strategies
  _evidence_issues:
  - 'INVALID_IDENTIFIER: security_type check in Common/Orders/Slippage/VolumeShareSlippageModel.py'
- id: BD-025
  type: BA
  content: 'Framework pipeline order: Universe → Alpha → Portfolio → Risk → Execute'
  rationale: 'Canonical Modern Portfolio Theory pipeline enforces correct sequence: select tradable universe,
    generate alpha signals, size positions, manage risk, then execute. This order ensures each stage receives
    appropriate inputs and risk management can override each prior decisions.'
  evidence: Engine/AlgorithmManager.cs:562(OnFrameworkData)
  stage: algorithm_manager
  alternative_considered: Parallel processing was rejected; would violate risk management precedence
  vague_rationale: true
- id: BD-026
  type: B
  content: Margin call frequency of 5 minutes in backtest
  rationale: 5-minute frequency balances prevention of cascade failures against backtest performance.
    Margin calls are frequent enough to respond quickly to adverse moves but not so frequent as to significantly
    slow historical simulation runs.
  evidence: Engine/AlgorithmManager.cs:132(marginCallFrequency)
  stage: algorithm_manager
  alternative_considered: Shorter intervals (1 min) were rejected; would slow backtests unnecessarily
- id: BD-027
  type: BA
  content: SecurityChanges filtered by default (custom/internal securities)
  rationale: User algorithms do not need internal/custom securities in change notifications. Filtering
    reduces noise in user callbacks and prevents confusion about which securities the algorithm should
    track. Internal securities are managed separately by the engine.
