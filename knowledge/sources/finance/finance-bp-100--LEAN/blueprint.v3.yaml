replaceable_slots:
- id: slot-001
  name: data_provider
  description: Choose based on data source availability and cost; local files are free and sufficient
    for most backtesting; brokerage downloader for broker-specific data
  used_in_stages: []
  options:
  - name: SubscriptionDataReaderHistoryProvider (default)
    traits:
    - local_files_only
    - no_api_cost
    - offline_capable
    fit_for:
    - Backtesting with pre-downloaded Lean data files
    not_fit_for:
    - Live trading, real-time data, proprietary data feeds
  - name: BrokerageDataDownloader
    traits:
    - live_data
    - brokerage_required
    - streaming_capable
    fit_for:
    - Downloading historical data from a brokerage for backtesting
    not_fit_for:
    - Backtesting without brokerage account
  - name: Custom IDataProvider
    traits:
    - custom_data_source
    - extensible
    - any_format
    fit_for:
    - Proprietary data formats, third-party data providers
    not_fit_for:
    - Standard market data needs
  default: SubscriptionDataReaderHistoryProvider
  _source: worker_resource
- id: slot-002
  name: history_provider
  description: Live trading uses BrokerageHistoryProvider; backtesting uses SubscriptionDataReaderHistoryProvider;
    both can be chained
  used_in_stages: []
  options:
  - name: SubscriptionDataReaderHistoryProvider (default)
    traits:
    - local_files
    - warmup
    - backtesting_only
    fit_for:
    - Backtesting and warmup with local data
    not_fit_for:
    - Live trading history requests
  - name: BrokerageHistoryProvider
    traits:
    - live_data
    - streaming
    - real_time_requests
    fit_for:
    - Live trading with brokerage-provided historical data
    not_fit_for:
    - Offline/backtesting mode
  default: SubscriptionDataReaderHistoryProvider, BrokerageHistoryProvider
  _source: worker_resource
- id: slot-003
  name: brokerage
  description: Select based on asset classes needed, geographic coverage, fee structure, and API capabilities
  used_in_stages: []
  options:
  - name: Alpaca
    traits:
    - us_equities
    - crypto
    - websocket
    - easy_setup
    fit_for:
    - Retail traders, US equities and crypto, API-first brokerage
    not_fit_for:
    - Options, futures, forex, international markets
  - name: Interactive Brokers
    traits:
    - global_markets
    - stocks
    - options
    - futures
    - forex
    - commodities
    - ib_gateway
    fit_for:
    - Professional traders needing multi-asset coverage, global markets
    not_fit_for:
    - Crypto-only strategies, simplest setup needs
  - name: Binance
    traits:
    - crypto
    - spot
    - websocket
    - low_fees
    fit_for:
    - Crypto spot trading, high-volume strategies
    not_fit_for:
    - Stock/options strategies
  - name: Binance Futures
    traits:
    - crypto
    - futures
    - leverage
    - websocket
    fit_for:
    - Crypto derivatives trading, leveraged strategies
    not_fit_for:
    - Spot-only traders
  - name: Bybit
    traits:
    - crypto
    - derivatives
    - websocket
    fit_for:
    - Crypto perpetual futures, derivatives
    not_fit_for:
    - Traditional securities
  - name: TD Ameritrade (Tradier)
    traits:
    - us_equities
    - options
    - websocket
    fit_for:
    - US options traders, Tradier users
    not_fit_for:
    - Forex, futures, crypto
  - name: OANDA
    traits:
    - forex
    - cfd
    - websocket
    fit_for:
    - Forex and CFD trading
    not_fit_for:
    - Stock trading
  - name: Kraken
    traits:
    - crypto
    - forex
    - websocket
    fit_for:
    - Kraken users, crypto with margin
    not_fit_for:
    - US stocks
  default: None (must be explicitly configured)
  _source: worker_resource
- id: slot-004
  name: messaging_handler
  description: Use built-in for standard operation; custom handler only for specialized result delivery
  used_in_stages: []
  options:
  - name: QuantConnect.Messaging.Messaging (default)
    traits:
    - zero_mq
    - tcp
    - local_network
    fit_for:
    - Standard backtesting/live result delivery to Lean engine
    not_fit_for:
    - Cloud deployment, cross-datacenter communication
  - name: Custom IMessagingHandler
    traits:
    - extensible
    - any_transport
    fit_for:
    - Custom result delivery (Slack, email, database logging)
    not_fit_for:
    - Standard result handling
  default: QuantConnect.Messaging.Messaging
  _source: worker_resource
- id: slot-005
  name: result_handler
  description: Automatically selected based on backtesting vs live mode
  used_in_stages: []
  options:
  - name: BacktestingResultHandler (default for backtesting)
    traits:
    - file_output
    - charts
    - statistics
    fit_for:
    - Standard backtesting results
    not_fit_for:
    - Live trading
  - name: LiveTradingResultHandler (default for live)
    traits:
    - real_time
    - streaming
    - live_charts
    fit_for:
    - Live trading monitoring
    not_fit_for:
    - Backtesting
  - name: Custom IResultHandler
    traits:
    - extensible
    fit_for:
    - Custom result storage (database, cloud storage)
    not_fit_for:
    - Standard result handling
  default: BacktestingResultHandler / LiveTradingResultHandler
  _source: worker_resource
- id: slot-006
  name: job_queue_handler
  description: Single instance deployments use default; distributed requires custom queue
  used_in_stages: []
  options:
  - name: QuantConnect.Queues.JobQueue (default)
    traits:
    - local_queue
    - file_based
    fit_for:
    - Standard local job processing
    not_fit_for:
    - Distributed backtesting
  default: QuantConnect.Queues.JobQueue
  _source: worker_resource
- id: slot-007
  name: object_store
  description: Use default for local development; custom for cloud/multi-node deployments
  used_in_stages: []
  options:
  - name: LocalObjectStore (default)
    traits:
    - local_disk
    - file_based
    - 10gb_limit
    fit_for:
    - Single-node deployments, algorithm data persistence
    not_fit_for:
    - Multi-node, cloud deployments, large files
  - name: IObjectStore (custom implementation)
    traits:
    - extensible
    - cloud_compatible
    fit_for:
    - Cloud deployment, S3-compatible storage, database-backed stores
    not_fit_for:
    - Simple single-node setups
  default: LocalObjectStore
  _source: worker_resource
- id: slot-008
  name: data_feed
  description: Automatically selected based on backtesting vs live mode
  used_in_stages: []
  options:
  - name: FileSystemDataFeed (default for backtesting)
    traits:
    - file_based
    - historical_only
    fit_for:
    - Backtesting with local Lean data files
    not_fit_for:
    - Live trading
  - name: LiveTradingDataFeed (default for live)
    traits:
    - streaming
    - real_time
    - brokerage_integrated
    fit_for:
    - Live trading data subscriptions
    not_fit_for:
    - Backtesting
  - name: Custom IDataFeed
    traits:
    - extensible
    fit_for:
    - Custom data sources, alternative data feeds
    not_fit_for:
    - Standard market data needs
  default: FileSystemDataFeed (backtesting) / LiveTradingDataFeed (live)
  _source: worker_resource
- id: slot-009
  name: python_runtime
  description: Use Foundation for research/ML work; custom environment only for specialized deployment
    constraints
  used_in_stages: []
  options:
  - name: Miniconda3 with Python 3.11 + quantconnect-stubs
    traits:
    - ide_support
    - type_hints
    - research_ready
    fit_for:
    - Standard Python algorithm development
    not_fit_for:
    - Minimal runtime environments
  - name: Lean Foundation Docker image
    traits:
    - 300_plus_packages
    - gpu_ready
    - ml_complete
    - research_ready
    fit_for:
    - Research notebooks with ML/statistical packages
    not_fit_for:
    - Production minimal deployments
  - name: Custom Python environment
    traits:
    - minimal
    - custom_packages
    fit_for:
    - Specific package requirements, air-gapped deployments
    not_fit_for:
    - ML research, standard development
  default: quantconnect/lean:foundation
  _source: worker_resource
- id: slot-010
  name: alpha_handler
  description: Only needed for QuantConnect Alpha Marketplace or custom signal integration
  used_in_stages: []
  options:
  - name: QuantConnectAlphaRuntimeSynchronizationManager
    traits:
    - alpha_messaging
    - websocket
    fit_for:
    - QuantConnect Alpha Marketplace integration
    not_fit_for:
    - Standalone trading
  - name: Custom IAlphaHandler
    traits:
    - extensible
    fit_for:
    - Proprietary alpha signals, third-party signal providers
    not_fit_for:
    - Standard backtesting
  default: None (optional component)
  _source: worker_resource
- id: slot-011
  name: map_file_provider
  description: Default sufficient for US equities; custom provider for non-standard mappings
  used_in_stages: []
  options:
  - name: LocalZipMapFileProvider (default)
    traits:
    - local_files
    - us_equities
    fit_for:
    - Standard US equity trading
    not_fit_for:
    - International markets, frequently changing listings
  default: LocalZipMapFileProvider
  _source: worker_resource
