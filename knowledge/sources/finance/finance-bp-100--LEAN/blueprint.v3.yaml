  - 'FN_NOT_FOUND: module in Algorithm.Python/PortfolioRebalanceOnDateRulesRegressionAlgorithm.py'
- id: BD-114
  type: B/RC
  content: Pairs trading state machine (SHORT_RATIO/FLAT_RATIO/LONG_RATIO) with enforced state transitions
    prevents re-emitting same direction
  rationale: The three-state pairs trading machine (SHORT→FLAT→LONG→FLAT→SHORT) enforces directional transitions
    through FLAT as a mandatory intermediate state. This pattern prevents signal chattering by requiring
    the ratio to neutralize before switching directions, establishing FLAT as a necessary boundary state
    for each direction changes.
  evidence: Algorithm.Framework/Alphas/BasePairsTradingAlphaModel.py:108-194(Pair.State)
  stage: Algorithm.Framework.Alphas
  alternative_considered: Direct transitions would be faster but risk signal oscillation
- id: BD-115
  type: B/BA
  content: Equal weighting computes 1/N excluding FLAT direction insights - sum may not equal 100% if
    bias excludes some
  rationale: Equal weighting allocates 1/N to each non-FLAT insight, excluding FLAT directions from position
    sizing. This creates a portfolio weight boundary where total may fall below 100% if PortfolioBias
    filters some signals, potentially leaving capital unallocated unless explicitly handled by residual
    allocation logic.
  evidence: Algorithm.Framework/Portfolio/EqualWeightingPortfolioConstructionModel.py:51-52(module)
  stage: Algorithm.Framework.Portfolio
  alternative_considered: Redistributing excluded weight to remaining assets would maintain 100% allocation
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Algorithm.Framework/Portfolio/EqualWeightingPortfolioConstructionModel.py'
- id: BD-116
  type: BA/M
  content: InsightWeightingPortfolioConstructionModel normalizes weights to sum=1 if weight_sums > 1
  rationale: Weight normalization to sum=1 establishes a portfolio constraint boundary ensuring full capital
    deployment when individual weights exceed 1. This automatic scaling prevents over-allocation but may
    dilute conviction signals, making normalization a key assumption for portfolio sizing consistency
    across varying insight magnitudes.
  evidence: Algorithm.Framework/Portfolio/InsightWeightingPortfolioConstructionModel.py:53-56(module)
  stage: Algorithm.Framework.Portfolio
  alternative_considered: Allowing weights >1 would amplify conviction but risk over-leverage
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Algorithm.Framework/Portfolio/InsightWeightingPortfolioConstructionModel.py'
- id: BD-117
  type: DK
  content: Black-Litterman tau parameter (uncertainty of CAPM prior) defaults to 0.05 in optimizer
  rationale: The tau=0.05 parameter in Black-Litterman represents uncertainty of the CAPM equilibrium
    prior, controlling how much weight views receive versus historical data. This 5% uncertainty baseline
    balances prior confidence with view influence, establishing a calibrated starting point for view-sensitive
    portfolio construction.
  evidence: Algorithm.Framework/Portfolio/BlackLittermanOptimizationPortfolioConstructionModel.py:38(module)
  stage: Algorithm.Framework.Portfolio
  alternative_considered: Lower tau increases view sensitivity; higher tau maintains stronger prior weighting
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Algorithm.Framework/Portfolio/BlackLittermanOptimizationPortfolioConstructionModel.py'
- id: BD-118
  type: B/BA
  content: AccumulativeInsight inherits from EqualWeighting but uses percent-based (0.03 default) incremental
    position sizing
  rationale: AccumulativeInsightModel extends EqualWeighting but adds incremental position sizing using
    3% default accumulation, diverging from equal weighting by building positions gradually. This inheritance
    relationship establishes a design boundary where incremental sizing overrides base allocation logic,
    enabling position building rather than immediate full allocation.
  evidence: Algorithm.Framework/Portfolio/AccumulativeInsightPortfolioConstructionModel.py:29,44-72(module)
  stage: Algorithm.Framework.Portfolio
  alternative_considered: Full position sizing from insight would be faster but less adaptive
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Algorithm.Framework/Portfolio/AccumulativeInsightPortfolioConstructionModel.py'
- id: BD-119
  type: DK
  content: Price gap mean reversion uses 3x volatility threshold to define outliers (abs(100*price_jump)
    > 3*volatility)
  rationale: The 3-sigma volatility threshold for price gap mean reversion establishes a statistical boundary
    for outlier detection. Gaps exceeding 3 standard deviations are classified as mean-reversion candidates,
    using standard deviation as the measure of normal price movement and defining the boundary beyond
    which reversion is likely.
  evidence: Algorithm.Python/Alphas/PriceGapMeanReversionAlpha.py:139(module)
  stage: Algorithm.Python.Alphas
  alternative_considered: 2-sigma threshold would capture more signals but increase false positives
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Algorithm.Python/Alphas/PriceGapMeanReversionAlpha.py'
- id: BD-120
  type: DK
  content: Pairs trading EMA mean uses hardcoded period of 500 for ratio calculation
  rationale: The hardcoded EMA period of 500 establishes a long-term lookback boundary for pairs ratio
    smoothing. This 500-bar window creates a slow-moving average sensitive to extended trends rather than
    short-term noise, defining the temporal horizon for identifying mean-reverting pairs relationships.
  evidence: Algorithm.Framework/Alphas/BasePairsTradingAlphaModel.py:147(module)
  stage: Algorithm.Framework.Alphas
  alternative_considered: Shorter periods (50-200) would react faster but increase noise sensitivity
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Algorithm.Framework/Alphas/BasePairsTradingAlphaModel.py'
- id: BD-121
  type: B
  content: VWAP IntradayVwap resets on daily boundaries (midnight), not on algorithm time boundaries
  rationale: VWAP resets at calendar midnight regardless of algorithm timezone or trading hours, establishing
    a rigid temporal boundary for volume averaging. This creates a boundary condition where round-the-clock
    algorithms may experience VWAP discontinuities at midnight, affecting execution quality across timezone
    boundaries.
  evidence: Algorithm.Framework/Execution/VolumeWeightedAveragePriceExecutionModel.py:128-132(module)
  stage: Algorithm.Framework.Execution
  alternative_considered: Resetting on session boundaries would align with trading hours but vary by asset
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Algorithm.Framework/Execution/VolumeWeightedAveragePriceExecutionModel.py'
- id: BD-122
  type: BA/DK
  content: OptionIndicatorsMirrorContractsRegressionAlgorithm demonstrates put-call parity via mirror
    contracts with smoothing
  rationale: The regression algorithm demonstrates put-call parity using mirror strike contracts with
    smoothing, establishing smoothing as a boundary technique for handling discrete strike pricing. This
    demonstrates that parity relationships require smoothing to bridge gaps between available strikes,
    acknowledging market microstructure discontinuities.
  evidence: Algorithm.Python/OptionIndicatorsMirrorContractsRegressionAlgorithm.py:66-84(module)
  stage: Algorithm.Python
  alternative_considered: Using only exact-mirror strikes would avoid smoothing but limit available data
    points
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Algorithm.Python/OptionIndicatorsMirrorContractsRegressionAlgorithm.py'
- id: BD-123
  type: B/DK
  content: QC500 selects 500 symbols using dollar volume ranking within sectors, filtering USA/NYSE/NASDAQ
    with >$500M cap
  rationale: QC500 universe selection establishes a 500-symbol hard boundary using dollar volume ranking
    and sector-balanced distribution. The $500M market cap floor filters liquidity, while USA exchange
    filtering and sector ranking create a defined universe boundary affecting each downstream portfolio
    construction decisions based on this selection.
  evidence: Algorithm.Framework/Selection/QC500UniverseSelectionModel.py:59-85(module)
  stage: Algorithm.Framework.Selection
  alternative_considered: Using pure volume ranking without sector balancing would be simpler but may
    concentrate in few sectors
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Algorithm.Framework/Selection/QC500UniverseSelectionModel.py'
- id: BD-124
  type: BA/DK
  content: 'VolumeShareSlippageModel uses squared volume_share formula: slippage = volume_share² × price_impact'
  rationale: The squared volume_share formula establishes non-linear slippage scaling where larger orders
    face disproportionately higher costs. This mathematical boundary creates convex cost growth, making
    volume_share a critical execution parameter where exceeding certain thresholds dramatically increases
    market impact beyond linear expectations.
  evidence: Common/Orders/Slippage/VolumeShareSlippageModel.py:59(module)
  stage: Common.Orders.Slippage
  alternative_considered: Linear volume_share would be simpler but underestimate impact of large orders
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Common/Orders/Slippage/VolumeShareSlippageModel.py'
- id: BD-125
  type: BA
  content: MaximumDrawdownPercentPortfolio is_trailing flag changes drawdown calculation from initial
    value vs trailing high
  rationale: The is_trailing flag creates a fundamental boundary in drawdown calculation methodology.
    When false, drawdown measures from initial peak requiring recovery to original value; when true, it
    uses rolling high enabling earlier recovery recognition. This flag establishes whether drawdown is
    measured against fixed or adaptive benchmarks.
  evidence: Algorithm.Framework/Risk/MaximumDrawdownPercentPortfolio.py:19-44(module)
  stage: Algorithm.Framework.Risk
  alternative_considered: Forcing one methodology would simplify but remove useful flexibility
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Algorithm.Framework/Risk/MaximumDrawdownPercentPortfolio.py'
- id: BD-126
  type: BA/DK
  content: VolumeWeightedAveragePriceExecutionModel maximum_order_quantity_percent_volume defaults to
    1% of bar volume
  rationale: The 1% volume participation default establishes a conservative market impact boundary limiting
    orders to 1/100th of bar volume. This low participation rate balances execution efficiency against
    price impact, creating a default boundary that favors price preservation over execution speed for
    most trading scenarios.
  evidence: Algorithm.Framework/Execution/VolumeWeightedAveragePriceExecutionModel.py:28(module)
  stage: Algorithm.Framework.Execution
  alternative_considered: Higher participation (5-10%) would execute faster but increase market impact
  _evidence_issues:
  - 'FN_NOT_FOUND: module in Algorithm.Framework/Execution/VolumeWeightedAveragePriceExecutionModel.py'
- id: BD-127
  type: BA/M
  content: 'INTERACTION: BD-014 × BD-126 × BD-043 → Triple 1% volume limit amplification creates redundant
    but inconsistent guardrails'
  rationale: Three separate decisions (VWAP ExecutionModel default, VolumeWeightedAveragePriceExecutionModel
    default, and explicit regression algorithm setting) each establish 1% volume limits. While providing
    defense-in-depth, this redundancy suggests the boundary was not explicitly documented as a system-level
    policy, creating maintenance risk if one location is changed without updating others.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Centralizing volume limit policy in single configuration location was rejected
    due to backward compatibility concerns
- id: BD-128
  type: BA/DK
  content: 'INTERACTION: BD-019 × BD-017 × BD-111 → Risk cascade: trailing stop trigger → insight cancellation
    → portfolio reconstruction loop'
  rationale: 'When TrailingStopRiskManagementModel triggers (BD-017, BD-111), it liquidates positions
    AND cancels active insights (BD-019). This creates a cascade where: risk model fires → insights cancelled
    → PortfolioConstructionModel receives cancelled insights → new portfolio weights generated → RebalanceOnInsightChanges
    (default true) triggers rebalancing → new insights generated → potentially re-entering near the stop
    price. This loop can amplify losses in volatile markets.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Cooldown period after stop trigger was rejected for complexity
- id: BD-129
  type: B/BA
  content: 'INTERACTION: BD-011 × BD-107 × BD-115 → Contradiction: LONG_SHORT bias with 1/N excluding
    FLAT produces under-allocated portfolios'
  rationale: EqualWeighting defaults to PortfolioBias.LONG_SHORT (BD-011, BD-107), but computes 1/N excluding
    FLAT insights (BD-115). When some symbols have no direction (FLAT), the portfolio is under-allocated
    below 100%. This contradicts the intent of LONG_SHORT bias which should maximize directional exposure.
    Users expecting 100% allocation with LONG_SHORT may have hidden cash drag they don't anticipate.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Redistributing FLAT-excluded weight to remaining symbols was rejected to preserve
    insight signal integrity
- id: BD-130
  type: B/BA
  content: 'INTERACTION: BD-024 × BD-099 → Hidden dependency: Forex/CFD zero slippage bypasses volume_share²
    model entirely'
  rationale: Forex/CFD securities report no volume data (BD-024), causing zero slippage with warning.
    However, the VolumeShareSlippageModel (BD-099) explicitly uses volume_share² formula for price impact.
    When volume is zero or missing, the model silently returns zero rather than applying alternative cost
    estimation (e.g., spread-based). Users may incorrectly assume slippage is properly modeled for Forex
    strategies when it's effectively disabled.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Using spread-based fallback was rejected to maintain simple zero-slippage behavior
- id: BD-131
  type: BA/M
  content: 'INTERACTION: BD-051 × BD-040 → Amplification: sector-balanced QC500 universe + equal weighting
    concentrates illiquid sectors'
  rationale: QC500 selects 500 stocks by taking top dollar-volume within each sector (BD-051), ensuring
    sector representation even if some sectors have few liquid stocks. EqualWeightingPortfolioConstructionModel
    (BD-040) allocates 1/N to each symbol equally. Combined, sectors with few liquid stocks get equal
    allocation as sectors with many, amplifying concentration in illiquid names. A sector with 5 stocks
    gets same total weight as a sector with 50 stocks, concentrating risk in sparse sectors.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Liquidity-weighted allocation within sectors was rejected for complexity
- id: BD-132
  type: B
  content: 'INTERACTION: BD-121 × BD-030 → Hidden timezone dependency: VWAP midnight reset incompatible
    with non-US hourly testing'
  rationale: VWAP resets at calendar midnight regardless of timezone (BD-121), but framework regression
    testing uses hourly resolution with RAW normalization (BD-030). Hourly bars naturally align with calendar
    hours, masking the midnight reset issue during testing. Algorithms using different timezones or intraday
    resolutions would experience VWAP discontinuities at midnight that regression tests never validate.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Session-based VWAP reset was rejected as session boundaries vary by asset class
