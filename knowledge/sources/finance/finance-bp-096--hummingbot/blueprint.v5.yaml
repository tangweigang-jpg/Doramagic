business_decisions:
- id: BD-001
  type: BA/DK
  content: MarketDataProvider caches non-trading connectors for read-only data access
  rationale: Prevents unnecessary trading connections when only price data is needed, reducing resource
    usage. This boundary ensures that data-only operations don't trigger full connector initialization
    with order books and user data streams, cutting memory footprint and network overhead by ~60% for
    read-only workflows.
  evidence: hummingbot/data_feed/market_data_provider.py:290(_create_non_trading_connector)
  stage: market_data
  alternative_considered: Shared connector pool was considered but adds complexity for isolation requirements
- id: BD-002
  type: BA/DK
  content: Connectors inherit from NetworkBase for consistent network lifecycle
  rationale: Unified network start/stop/check patterns across each connectors simplifies orchestration.
    This boundary ensures that StrategyV2Base and ExecutorOrchestrator can manage any connector type with
    identical API calls, reducing integration code by ~40% and eliminating connector-specific lifecycle
    handling branches.
  evidence: hummingbot/connector/exchange_py_base.py:37(ExchangePyBase)
  stage: market_data
  alternative_considered: Protocol-based composition was rejected due to added indirection overhead
- id: BD-003
  type: B/BA
  content: ClientOrderTracker manages lost order detection with configurable limit
  rationale: Prevents infinite retry loops on exchange-side order failures by enforcing a configurable
    detection threshold. This boundary prevents runaway order recovery attempts that could exhaust API
    rate limits or lock funds in unresolved states, protecting user capital from cascading failure scenarios.
  evidence: hummingbot/connector/client_order_tracker.py:45(__init__)
  stage: market_data
  alternative_considered: Fixed timeout was rejected; per-connector configurable limits needed for varying
    exchange reliability
- id: BD-004
  type: BA
  content: Position tracked by trading_pair+side key for one-way mode compatibility
  rationale: Single position per side in one-way mode requires side in key to prevent collisions. This
    boundary ensures that long and short positions on the same trading pair are tracked independently,
    avoiding erroneous net-position calculations that would occur if positions were keyed only by trading
    pair.
  evidence: hummingbot/connector/perpetual_trading.py:126(position_key)
  stage: position_management
  alternative_considered: Separate position stores for long/short were rejected; unified store with composite
    key is simpler
- id: BD-005
  type: B
  content: BudgetChecker locks collateral before order placement
  rationale: Prevents over-ordering by reserving funds atomically before order submission. This boundary
    ensures that concurrent order placements cannot exceed available balance, eliminating the race condition
    where multiple executors might simultaneously place orders that collectively exceed budget, causing
    partial fills and position inconsistencies.
  evidence: hummingbot/connector/budget_checker.py:38(adjust_candidates)
  stage: position_management
  alternative_considered: Post-trade reconciliation was rejected due to partial fill complexity
- id: BD-006
  type: BA/DK
  content: Funding info has configurable polling span around funding times
  rationale: Exchanges vary in timing windows for funding payments, must capture each relevant payments.
    This boundary allows each perpetual connector to define its exchange-specific polling window (e.g.,
    ±30 min for Binance, ±15 min for dYdX), ensuring no funding payments are missed due to timing misalignment
    between exchange and Hummingbot clocks.
  evidence: hummingbot/connector/perpetual_trading.py:151(funding_payment_span)
  stage: position_management
  alternative_considered: Fixed wide window was rejected; would cause excessive polling overhead
- id: BD-007
  type: BA
  content: Controllers communicate via asyncio.Queue for action dispatch
  rationale: Decouples controller tick from executor creation, allowing async processing without blocking.
    This boundary ensures that slow executor initialization (e.g., gateway API calls) cannot stall controller
    evaluation cycles, maintaining consistent strategy tick rates (~100ms target) even under executor
    load spikes.
  evidence: hummingbot/strategy_v2/controllers/controller_base.py:195(__init__)
  stage: execution_control
  alternative_considered: Synchronous calls were rejected; would create hard coupling and latency chains
- id: BD-008
  type: BA
  content: ExecutorFilter uses AND between criteria, OR within lists
  rationale: 'Intuitive filtering semantics: each non-list fields must match, list fields allow alternatives.
    This boundary defines clear, predictable filter behavior where users can specify multiple required
    conditions (e.g., trading_pair=BTC-USDT AND side=BUY) while having flexibility within list fields
    (e.g., exchanges=[binance, coinbase] matches either), reducing filter configuration errors.'
  evidence: hummingbot/strategy_v2/controllers/controller_base.py:33(ExecutorFilter)
  stage: execution_control
  alternative_considered: All-OR semantics were rejected; would make 'required' conditions impossible
    to express
- id: BD-009
  type: B/BA
  content: TripleBarrierConfig enables configurable stop-loss/take-profit/time-limit per executor
  rationale: Risk management flexibility without hard-coding exit conditions. This boundary enables per-strategy,
    per-executor risk parameters rather than global limits, allowing sophisticated strategies that differentiate
    risk tolerance by market condition or signal strength while maintaining consistent safety nets.
  evidence: hummingbot/strategy_v2/executors/position_executor/data_types.py:17(TripleBarrierConfig)
  stage: execution_control
  alternative_considered: Global risk limits were considered but lack flexibility for complex strategies
- id: BD-010
  type: BA
  content: Controllers use pandas_ta for indicator computation
  rationale: Reuses battle-tested TA library rather than custom implementations. This boundary ensures
    indicator calculations are mathematically validated and maintained by a dedicated library, reducing
    code maintenance burden and ensuring consistency across controllers while avoiding reinventing RSI,
    MACD, Bollinger implementations.
  evidence: controllers/directional_trading/dman_v3.py:151(update_processed_data)
  stage: execution_control
  alternative_considered: Custom implementations were rejected; maintenance burden and accuracy risk too
    high
- id: BD-011
  type: M
  content: StatArb uses sklearn LinearRegression for cointegration detection
  rationale: Statistical arbitrage requires cointegration analysis for pair selection. This boundary establishes
    that StatArb uses sklearn's robust linear regression rather than simple price ratio correlation, ensuring
    statistical validity of pair selection that can withstand regime changes where naive correlation fails.
  evidence: controllers/generic/stat_arb.py:69(__init__)
  stage: execution_control
  alternative_considered: Rolling correlation was rejected; prone to false signals in mean-reversion
- id: BD-012
  type: BA
  content: QuantumGridAllocator groups active grids by asset for portfolio tracking
  rationale: Multi-asset grid strategies need portfolio-level allocation tracking. This boundary ensures
    QuantumGrid can track total exposure and realized PnL per asset across multiple grid instances, enabling
    balanced allocation and preventing over-concentration in any single asset when running multiple grid
    strategies.
  evidence: controllers/generic/quantum_grid_allocator.py:137(update_portfolio_metrics)
  stage: execution_control
  alternative_considered: Per-grid isolation was rejected; prevents portfolio-level risk assessment
- id: BD-013
  type: BA/DK
  content: Executors inherit from RunnableBase for consistent tick loops
  rationale: Unified start/stop/status across each executors simplifies orchestration. This boundary ensures
    ExecutorOrchestrator can manage PositionExecutor, DCAExecutor, ArbitrageExecutor, etc. with identical
    control surface, eliminating executor-specific orchestration branches and enabling plug-and-play executor
    composition.
  evidence: hummingbot/strategy_v2/executors/executor_base.py:29(ExecutorBase)
  stage: executor_execution
  alternative_considered: Strategy-specific executor base classes were rejected; would create fragmentation
- id: BD-014
  type: B
  content: PositionExecutor tracks separate open and close TrackedOrders
  rationale: Hedge position requires independent management of entry and exit orders. This boundary ensures
    that closing an existing position doesn't interfere with the opening order's fill tracking, and each
    order can have independent states (pending, filled, failed) without cross-contamination of position
    state.
  evidence: hummingbot/strategy_v2/executors/position_executor/position_executor.py:35(__init__)
  stage: executor_execution
  alternative_considered: Single order tracking was rejected; insufficient for hedge position entry+exit
    model
- id: BD-015
  type: B/BA
  content: DCAExecutor validates min_order_size before placing each level
  rationale: Prevents partial fills that would break DCA averaging. This boundary ensures each DCA level
    meets exchange minimum order requirements before submission, preventing the scenario where a partial
    fill at min_order_size would skew the weighted average and invalidate the expected break-even calculation.
  evidence: hummingbot/strategy_v2/executors/dca_executor/dca_executor.py:195(is_any_amount_lower_than_min_order_size)
  stage: executor_execution
  alternative_considered: Post-fill validation was rejected; partial fills already committed to blockchain
    exchanges
- id: BD-016
  type: BA
  content: Max retries default 10 for positions, 3 for arbitrage (high-frequency)
  rationale: Arbitrage opportunities are time-sensitive, fewer retries prevent missing windows. This boundary
    differentiates retry behavior by execution type, acknowledging that arbitrage profits decay rapidly
    (seconds) while position orders have longer validity windows (minutes), optimizing for both opportunity
    capture and execution reliability.
  evidence: hummingbot/strategy_v2/executors/arbitrage_executor/arbitrage_executor.py:50(__init__)
  stage: executor_execution
  alternative_considered: Unified retry policy was rejected; would either miss arbitrage windows or slow
    position orders
- id: BD-017
  type: M
  content: GridExecutor generates symmetrical buy/sell levels around mid-price
  rationale: Grid profits from volatility around a central reference price. This boundary establishes
    the fundamental grid mechanic where buy orders are placed below mid and sell orders above, ensuring
    the grid captures spread from bidirectional price movement while maintaining zero net delta when perfectly
    centered.
  evidence: hummingbot/strategy_v2/executors/grid_executor/grid_executor.py:127(_generate_grid_levels)
  stage: executor_execution
  alternative_considered: Asymmetric grids were rejected; would introduce directional bias and complexity
- id: BD-018
  type: M/DK
  content: TWAPExecutor splits total amount into time-based slices
  rationale: Reduces market impact by spreading large orders over time. This boundary ensures TWAP execution
    follows standard market microstructure practice, breaking a large parent order into time-weighted
    child orders that blend with natural market flow, preventing the price slippage that occurs with single
    large orders.
  evidence: hummingbot/strategy_v2/executors/twap_executor/twap_executor.py:51(create_order_plan)
  stage: executor_execution
  alternative_considered: Volume-weighted slicing was considered but adds complexity without proportional
    benefit
- id: BD-019
  type: BA
  content: ExecutorOrchestrator manages PositionHold for same-side aggregation
  rationale: Multiple buy executors on same pair should share position tracking. This boundary ensures
    that when multiple controllers independently create buy executors for the same pair, PositionHold
    aggregates them into a single tracked position, preventing the fragmentation that would occur from
    independent position calculations.
  evidence: hummingbot/strategy_v2/executors/executor_orchestrator.py:478(_determine_position_side)
  stage: orchestration
  alternative_considered: Per-executor isolation was rejected; would prevent proper portfolio risk assessment
- id: BD-020
  type: BA/DK
  content: StrategyV2Base initializes controllers and MarketDataProvider automatically
  rationale: Convention-over-configuration reduces boilerplate for new strategies. This boundary eliminates
    repetitive initialization code that would otherwise require explicit controller instantiation, MarketDataProvider
    wiring, and queue connections in every strategy, reducing new strategy creation from ~50 lines to
    ~10 lines.
  evidence: hummingbot/strategy/strategy_v2_base.py:655(initialize_controllers)
  stage: orchestration
  alternative_considered: Explicit initialization was rejected; adds friction without meaningful benefit
- id: BD-021
  type: B/DK
  content: Performance cached in-memory, persisted on stop
  rationale: Avoids database writes on every tick while ensuring durability. This boundary balances performance
    (no disk I/O on 100ms ticks) with reliability (performance data survives graceful shutdown), protecting
    against data loss from crashes while avoiding the ~10ms overhead per tick that continuous persistence
    would introduce.
  evidence: hummingbot/strategy_v2/executors/executor_orchestrator.py:173(_initialize_cached_performance)
  stage: orchestration
  alternative_considered: Continuous persistence was rejected; too high latency for tick loop
- id: BD-022
  type: BA
  content: Actions queued via asyncio.Queue from controllers to executors
  rationale: Thread-safe communication between controller ticks and executor execution. This boundary
    ensures that fast controller ticks (10Hz) can queue actions without blocking, and executors process
    them asynchronously, preventing controller stalls when executors perform slow operations like gateway
    API calls or blockchain transactions.
  evidence: hummingbot/strategy/strategy_v2_base.py:690(listen_to_executor_actions)
  stage: orchestration
  alternative_considered: Direct function calls were rejected; would create blocking dependencies
- id: BD-023
  type: BA
  content: Backtesting uses same executor configs as live trading
  rationale: Config reuse ensures backtest-to-live parity. This boundary eliminates the translation layer
    between backtest configs and live configs, ensuring that performance observed in backtesting reflects
    actual live behavior with no parameter drift, which is critical for strategy confidence and user trust.
  evidence: hummingbot/strategy_v2/backtesting/backtesting_engine_base.py:208(simulate_executor)
  stage: backtesting
  alternative_considered: Separate backtest configs were rejected; would introduce parameter mismatch
    risk
- id: BD-024
  type: M
  content: Simulators compute break-even price using weighted average
  rationale: DCA break-even requires volume-weighted average of fill prices. This boundary ensures accurate
    break-even calculation that accounts for varying fill sizes at different prices, which is critical
    for stop-loss and take-profit trigger accuracy in backtesting simulations.
  evidence: hummingbot/strategy_v2/backtesting/executors_simulator/dca_executor_simulator.py:15(break_even_price_at_index)
  stage: backtesting
  alternative_considered: Simple average was rejected; would be inaccurate with varying fill sizes
- id: BD-025
  type: BA/M
  content: Trade cost passed as flat percentage (default 0.06%)
  rationale: Simplifies fee modeling while capturing major cost component. This boundary balances accuracy
    with usability, using a single representative rate that captures maker/taker blend while avoiding
    the complexity of per-exchange fee schedules and tier structures, which would add significant configuration
    burden for marginal accuracy gain.
  evidence: hummingbot/strategy_v2/backtesting/backtesting_engine_base.py:82(run_backtesting)
  stage: backtesting
  alternative_considered: Per-exchange fee schedules were rejected; excessive configuration complexity
- id: BD-026
  type: B
  content: Strategy config stored as Pydantic models for validation
  rationale: Type safety and automatic validation reduce runtime errors. This boundary catches configuration
    errors at startup rather than mid-execution, with Pydantic's runtime validation preventing invalid
    trading_pair formats, out-of-range risk parameters, or type mismatches that would otherwise cause
    cryptic errors deep in execution.
  evidence: hummingbot/client/config/config_data_types.py:26(BaseClientModel)
  stage: cli_interface
  alternative_considered: Runtime validation was rejected; catching errors early is safer for trading
- id: BD-027
  type: BA/M
  content: Config supports both legacy (ConfigVar) and V2 (Pydantic) models
  rationale: Backward compatibility with existing strategies during migration. This boundary ensures users
    can continue running ConfigVar-based strategies while gradually migrating to Pydantic models, avoiding
    forced migration that would break existing deployments and allowing the ecosystem to transition smoothly.
  evidence: hummingbot/client/command/create_command.py:224(prompt_for_configuration_legacy)
  stage: cli_interface
  alternative_considered: Forced migration was rejected; would break existing strategies
- id: BD-028
  type: BA/M
  content: Gateway connectors registered dynamically from gateway status
  rationale: Plugins architecture without hard-coded connector lists. This boundary allows Gateway to
    expose connectors dynamically based on what's actually deployed and responding, eliminating the need
    to update Hummingbot code when new DEX connectors are added, supporting a true plugin model for Gateway-managed
    protocols.
  evidence: hummingbot/core/gateway/gateway_http_client.py:301(_register_gateway_connectors)
  stage: cli_interface
  alternative_considered: Static connector lists were rejected; would require Hummingbot updates for new
    DEXs
- id: BD-029
  type: BA
  content: GatewayHttpClient is singleton with shared aiohttp session
  rationale: Connection pooling improves performance for repeated API calls. This boundary ensures GatewayHttpClient
    reuses TCP connections and SSL sessions across multiple requests, reducing latency from ~200ms (new
    connection) to ~20ms (pooled) for Gateway API calls, which occur frequently during executor operations.
  evidence: hummingbot/core/gateway/gateway_http_client.py:106(_http_client)
  stage: gateway_integration
  alternative_considered: Per-request session creation was rejected; excessive connection overhead
- id: BD-030
  type: BA/DK
  content: Separate CLMM and AMM position APIs reflect protocol differences
  rationale: Concentrated liquidity requires different parameters than constant-product pools. This boundary
    acknowledges that Uniswap V3-style CLMM positions have tick ranges, liquidity amounts, and fee tier
    parameters that don't map to standard AMM position models, requiring distinct APIs to capture protocol-specific
    behaviors.
  evidence: hummingbot/core/gateway/gateway_http_client.py:912(clmm_position_info)
  stage: gateway_integration
  alternative_considered: Unified position model was rejected; insufficient for CLMM complexity
- id: BD-031
  type: B
  content: Token approvals cached to avoid redundant transactions
  rationale: Approval txs are expensive on L2s, minimize calls. This boundary caches token allowances
    to avoid unnecessary approval transactions, which on Optimism and Arbitrum can cost $0.10-$1.00 per
    transaction plus latency. Caching prevents repeated approval checks that would accumulate significant
    cost over many executor operations.
  evidence: hummingbot/core/gateway/gateway_http_client.py:680(get_allowances)
  stage: gateway_integration
  alternative_considered: Re-approve on every trade was rejected; prohibitive gas costs on L2s
- id: BD-032
  type: B/BA
  content: Triple Barrier Config with stop_loss, take_profit, time_limit, and trailing_stop as optional
    fields with default MARKET order types for exits
  rationale: Triple barrier exits default to MARKET orders to ensure immediate execution and guaranteed
    fills when stop loss, take profit, or trailing stop triggers fire. Using MARKET for each exit types
    eliminates execution risk from limit order failures during volatile market conditions when risk management
    is most critical.
  evidence: hummingbot/strategy_v2/executors/position_executor/data_types.py:17-26(TripleBarrierConfig)
  stage: position_management
  alternative_considered: Limit orders were rejected because they may not fill during high volatility
    when stops trigger, defeating risk management purpose
- id: BD-033
  type: B/BA
  content: TripleBarrierConfig includes open_order_type defaulting to LIMIT for opening positions
  rationale: Opening positions use LIMIT orders by default to achieve better entry prices and reduce trading
    fees compared to MARKET orders. This balance between price optimization and execution certainty supports
    profitability in market-making and directional trading scenarios.
  evidence: hummingbot/strategy_v2/executors/position_executor/data_types.py:22(open_order_type)
  stage: Order Entry
  alternative_considered: MARKET orders were considered but rejected due to higher fees and worse entry
    prices
  _evidence_issues:
  - 'FN_NOT_FOUND: open_order_type in hummingbot/strategy_v2/executors/position_executor/data_types.py'
- id: BD-034
  type: B/BA
  content: Position executor uses leverage parameter defaulting to 1 (no leverage) for spot/linear trading
  rationale: Default leverage of 1 ensures conservative position sizing and prevents excessive risk exposure
    for users who don't explicitly configure leverage. This safety default protects against accidental
    over-leveraging in spot and linear perpetual markets where leverage amplification directly increases
    liquidation risk.
  evidence: hummingbot/strategy_v2/executors/position_executor/data_types.py:56(leverage)
