# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-096
name: Hummingbot
sop_version: '3.6'
source:
  projects:
  - hummingbot
  commit_hash: 574e316b16b74c590fc62644c97cf0f7bbca0c2a
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Algorithmic trading framework for automated strategy execution
  description: Open-source framework for designing and deploying automated trading strategies (bots) across
    centralized and decentralized exchanges, supporting real-time and historical market data processing,
    position management, and strategy backtesting.
  prerequisites: Users should understand trading concepts (positions, orders, PnL), Python programming,
    and exchange APIs. Docker installation recommended for deployment.
  not_suitable_for: High-frequency trading requiring sub-millisecond latency, non-trading financial applications,
    users without basic trading knowledge, or strategies requiring real-time market making with exchange-wide
    priority
stages:
- id: market_data
  name: Market Data Layer
  order: 1
  responsibility: Provides real-time and historical market data (prices, order books, candles) to each
    other components. Abstracts exchange differences via connectors to ensure unified data access across
    each trading venues.
  interface:
    inputs:
    - Connector configurations
    - Trading pair specifications
    - Candle interval requests
    outputs:
    - Price dictionaries
    - Order book snapshots
    - Candle DataFrames
    - Historical price data
  required_methods:
  - name: MarketDataProvider.get_price_by_indicator
    description: Retrieves current price or computed indicator value for a trading pair
    evidence: hummingbot/data_feed/market_data_provider.py:81(get_price_by_indicator)
  - name: MarketDataProvider.get_order_book
    description: Returns current order book snapshot for a trading pair
    evidence: hummingbot/data_feed/market_data_provider.py:145(get_order_book)
  - name: MarketDataProvider.get_candles
    description: Fetches historical candle data for analysis and backtesting
    evidence: hummingbot/data_feed/market_data_provider.py:195(get_candles)
  - name: RateOracle.get_rate
    description: Provides cross-exchange conversion rates for multi-venue strategies
    evidence: hummingbot/core/rate_oracle/rate_oracle.py:112(get_rate)
  key_behaviors:
  - behavior: Entity-level isolation
    description: MarketDataProvider caches non-trading connectors for read-only data access, preventing
      unnecessary trading connections when only price data is needed
    evidence: hummingbot/data_feed/market_data_provider.py:281(_create_non_trading_connector)
  - behavior: Unified network lifecycle
    description: Every connectors inherit from NetworkBase ensuring consistent start/stop/check patterns
      across exchange implementations
    evidence: hummingbot/connector/exchange_py_base.py:37(ExchangePyBase)
  - behavior: Lost order detection
    description: ClientOrderTracker manages lost order detection with configurable limits to prevent infinite
      retry loops on exchange-side failures
    evidence: hummingbot/connector/client_order_tracker.py:45(__init__)
  replaceable_points:
  - name: price_data_sources
    description: RateOracle supports multiple rate sources for cross-exchange rate conversions
    options:
    - name: binance_rate_source
      traits:
      - High liquidity
      - Low latency
      - Wide trading pair coverage
      fit_for:
      - General use
      - BTC/ETH pairs
      - High-volume pairs
      not_fit_for:
      - Privacy-focused users
      - Regulatory-restricted regions
    - name: coin_gecko_rate_source
      traits:
      - Aggregate pricing
      - DeFi token coverage
      - Decentralized data source
      fit_for:
      - DeFi tokens
      - Cross-exchange comparisons
      not_fit_for:
      - Time-sensitive trading
      - Low-liquidity pairs
    - name: coin_cap_rate_source
      traits:
      - Blockchain-native pricing
      - Real-time updates
      fit_for:
      - Crypto-native assets
      - Blockchain verification
      not_fit_for:
      - Altcoin-heavy strategies
      - Fractional reserve concerns
    default: binance_rate_source
  design_decisions:
  - MarketDataProvider caches non-trading connectors for read-only data access, reducing resource usage
    when only price data is needed (hummingbot/data_feed/market_data_provider.py:281)
  acceptance_hints:
  - MarketDataProvider successfully returns prices for configured trading pairs
  - Order book snapshots contain bid/ask levels with non-zero quantities
  - RateOracle returns valid conversion rates between supported quote currencies
  - Connector status shows ONLINE after network check completes
- id: position_management
  name: Position Management Layer
  order: 2
  responsibility: Manages perpetual and spot positions, including leverage settings, funding payments,
    and collateral tracking. Ensures position state consistency between exchange connectors and local
    tracking.
  interface:
    inputs:
    - Position actions (open/close)
    - Leverage settings
    - Funding info streams
    outputs:
    - Position summaries
    - Unrealized PnL
    - Funding payment events
  required_methods:
  - name: PerpetualTrading.get_position
    description: Retrieves current position state for a trading pair with side awareness
    evidence: hummingbot/connector/perpetual_trading.py:115(get_position)
  - name: BudgetChecker.adjust_candidate
    description: Validates order candidates against available balance and locks collateral
    evidence: hummingbot/connector/budget_checker.py:38(adjust_candidate)
  - name: PerpetualTrading.get_funding_info
    description: Returns funding rate and next payment time for perpetual pairs
    evidence: hummingbot/connector/perpetual_trading.py:200(get_funding_info)
  key_behaviors:
  - behavior: Side-aware position tracking
    description: Position tracked by trading_pair+side key for one-way mode compatibility, preventing
      collisions in single position per side mode
    evidence: hummingbot/connector/perpetual_trading.py:126(position_key)
  - behavior: Atomic collateral reservation
    description: BudgetChecker locks collateral before order placement to prevent over-ordering by reserving
      funds atomically
    evidence: hummingbot/connector/budget_checker.py:38(adjust_candidate)
  - behavior: Configurable funding window
    description: Funding info has configurable polling span around funding times to capture each relevant
      payments across exchanges with varying timing
    evidence: hummingbot/connector/perpetual_trading.py:151(funding_payment_span)
  replaceable_points:
  - name: position_mode
    description: Trading mode determines how positions are tracked and hedged
    options:
    - name: ONEWAY
      traits:
      - Single position per pair
      - Simpler management
      - Lower margin requirements
      fit_for:
      - Spot trading
      - Beginners
      - Single-direction strategies
      not_fit_for:
      - Market making with hedging
      - Pairs only supporting HEDGE
    - name: HEDGE
      traits:
      - Independent long/short
      - Bidirectional positions
      - Requires more margin
      fit_for:
      - Market making
      - Directional hedging
      - Advanced traders
      not_fit_for:
      - ONEWAY-only exchanges
      - Margin-constrained accounts
    default: ONEWAY
  design_decisions:
  - Position tracked by trading_pair+side key for one-way mode compatibility (hummingbot/connector/perpetual_trading.py:126)
  acceptance_hints:
  - Position summaries reflect exchange state after order fills
  - Unrealized PnL updates with market price changes
  - Funding payment events fire at configured intervals
  - BudgetChecker prevents orders exceeding available balance
- id: execution_control
  name: Execution Control (Controllers)
  order: 3
  responsibility: Implements trading logic and generates executor actions. Controllers are strategy-agnostic
    business logic units that produce signals and manage executor lifecycle, separated from execution
    details.
  interface:
    inputs:
    - Market data
    - Executor state reports
    - Config parameters
    outputs:
    - CreateExecutorAction
    - StopExecutorAction
    - StoreExecutorAction
  required_methods:
  - name: ControllerBase.determine_executor_actions
    description: Evaluates market conditions and executor states to generate action proposals
    evidence: hummingbot/strategy_v2/controllers/controller_base.py:200(determine_executor_actions)
  - name: DirectionalTradingControllerBase.evaluate_signals
    description: Computes trend-following signals based on configured indicators
    evidence: hummingbot/strategy_v2/controllers/directional_trading_controller_base.py:141(evaluate_signals)
  - name: MarketMakingControllerBase.get_level_configs
    description: Generates multi-level order configuration for market making
    evidence: hummingbot/strategy_v2/controllers/market_making_controller_base.py:212(get_level_configs)
  - name: ControllerBase.update_processed_data
    description: Updates indicators and processed data on each controller tick
    evidence: hummingbot/strategy_v2/controllers/controller_base.py:448(update_processed_data)
  key_behaviors:
  - behavior: Async action dispatch via Queue
    description: Controllers communicate via asyncio.Queue for action dispatch, decoupling controller
      tick from executor creation
    evidence: hummingbot/strategy_v2/controllers/controller_base.py:195(__init__)
  - behavior: AND/OR filter semantics
    description: ExecutorFilter uses AND between criteria fields, OR within list fields for intuitive
      executor selection
    evidence: hummingbot/strategy_v2/controllers/controller_base.py:33(ExecutorFilter)
  - behavior: Create-before-stop ordering
    description: create_actions_proposal MUST run before stop_actions_proposal each tick to prevent race
      conditions
    evidence: hummingbot/strategy_v2/controllers/directional_trading_controller_base.py:152(determine_executor_actions)
  - behavior: Position rebalance before order creation
    description: MarketMakingController.create_actions_proposal checks position_rebalance BEFORE creating
      levels to maintain position balance
    evidence: hummingbot/strategy_v2/controllers/market_making_controller_base.py:232(create_actions_proposal)
  replaceable_points:
  - name: trading_strategy
    description: Controller implementation determines signal generation and trading logic
    options:
    - name: dman_v3
      traits:
      - Bollinger Band mean-reversion
      - Dynamic spread
      - Volatility-adjusted
      fit_for:
      - Range-bound markets
      - Mean reversion enthusiasts
      not_fit_for:
      - Strong trends
      - Low volatility
    - name: bollinger_v1
      traits:
      - Classic Bollinger Bands
      - Simple signals
      fit_for:
      - Beginners
      - Educational purposes
      not_fit_for:
      - Complex strategies
      - Multi-timeframe
    - name: supertrend_v1
      traits:
      - Trend-following
      - ATR-based stops
      fit_for:
      - Trending markets
      - Clear direction
      not_fit_for:
      - Ranging markets
      - Whipsaw environments
    - name: macd_bb_v1
      traits:
      - MACD + Bollinger combination
      - Dual confirmation
      fit_for:
      - Confirmation-based entries
      - Filtered trends
      not_fit_for:
      - Fast markets
      - Conflicting signals
    - name: pmm_mister
      traits:
      - Advanced PMM
      - Hanging orders
      - Cooldown tracking
      fit_for:
      - Market making
      - Liquidity provision
      not_fit_for:
      - Directional strategies
      - Low liquidity pairs
    - name: stat_arb
      traits:
      - Cointegration detection
      - Z-score signals
      - sklearn LinearRegression
      fit_for:
      - Pairs trading
      - Statistical arbitrage
      not_fit_for:
      - Single asset
      - Non-cointegrated pairs
    - name: quantum_grid_allocator
      traits:
      - Grid-based
      - Portfolio tracking
      - Multi-asset
      fit_for:
      - Grid trading
      - Multi-asset portfolios
      not_fit_for:
      - Single position
      - Low volatility
    default: bollinger_v1
  - name: execution_strategy
    description: Order placement method determines how orders interact with the market
    options:
    - name: MARKET
      traits:
      - Immediate execution
      - Market price
      - Slippage risk
      fit_for:
      - Urgency
      - Guaranteed fills
      not_fit_for:
      - Low liquidity
      - Volatile markets
    - name: LIMIT
      traits:
      - Price control
      - No immediate fill
      - Queue priority
      fit_for:
      - Patient execution
      - Known price levels
      not_fit_for:
      - Fast-moving trends
      - Time-sensitive exits
    - name: CHASER
      traits:
      - Adaptive pricing
      - Follows market
      fit_for:
      - Dynamic markets
      - Execution quality
      not_fit_for:
      - Stable prices
      - Fixed levels needed
    default: LIMIT
  design_decisions:
  - TripleBarrierConfig enables configurable stop-loss/take-profit/time-limit per executor (hummingbot/strategy_v2/executors/position_executor/data_types.py:17)
  acceptance_hints:
  - Controllers emit actions only when market conditions meet configured thresholds
  - ExecutorFilter correctly selects executors matching each non-list criteria and at least one list criterion
  - Position rebalance check runs before new order creation in market making
  - Actions queue receives properly formatted CreateExecutorAction/StopExecutorAction messages
- id: executor_execution
  name: Executor Execution Layer
  order: 4
  responsibility: Converts controller actions into actual exchange orders. Executors manage order lifecycle,
    retries, and barrier enforcement for stop-loss, take-profit, and time limits.
  interface:
    inputs:
    - ExecutorConfig
    - StrategyV2Base reference
    - ExecutorAction messages
    outputs:
    - Order events
    - ExecutorInfo reports
    - PnL calculations
  required_methods:
  - name: ExecutorBase.execute_actions
    description: Processes incoming executor actions and updates executor state
    evidence: hummingbot/strategy_v2/executors/executor_base.py:85(execute_actions)
  - name: PositionExecutor.control_barriers
    description: Evaluates stop-loss, take-profit, and trailing stop conditions on each tick
    evidence: hummingbot/strategy_v2/executors/position_executor/position_executor.py:457(control_barriers)
  - name: DCAExecutor.execute_trade
    description: Places DCA orders according to configured level spacing
    evidence: hummingbot/strategy_v2/executors/dca_executor/dca_executor.py:180(execute_trade)
  - name: ArbitrageExecutor.check_arbitrage_opportunity
    description: Monitors cross-exchange price differences for profitable opportunities
    evidence: hummingbot/strategy_v2/executors/arbitrage_executor/arbitrage_executor.py:95(check_arbitrage_opportunity)
  key_behaviors:
  - behavior: Unified executor lifecycle
    description: Executors inherit from RunnableBase for consistent tick loops across each executor types
    evidence: hummingbot/strategy_v2/executors/executor_base.py:29(ExecutorBase)
  - behavior: Separate open/close order tracking
    description: PositionExecutor tracks separate open and close TrackedOrders for independent management
      of entry and exit orders
    evidence: hummingbot/strategy_v2/executors/position_executor/position_executor.py:26(__init__)
  - behavior: OPEN must fill before CLOSE
    description: PositionExecutor lifecycle enforces that open order fills before close order placement
      via amount_to_close validation
    evidence: hummingbot/strategy_v2/executors/position_executor/position_executor.py:106(open_filled_amount)
  - behavior: Min order size validation
    description: DCAExecutor validates min_order_size before placing each level to prevent partial fills
      that would break averaging
    evidence: hummingbot/strategy_v2/executors/dca_executor/dca_executor.py:195(is_any_amount_lower_than_min_order_size)
  - behavior: Reduce-only for close orders
    description: Perpetual connectors set reduce_only=true when position_action=CLOSE to ensure safe position
      reduction
    evidence: hummingbot/connector/derivative/binance_perpetual_derivative.py:258(reduce_only)
  replaceable_points:
  - name: executor_type
    description: How positions are structured and managed determines execution behavior
    options:
    - name: PositionExecutor
      traits:
      - Hedged positions
      - Triple barriers
      - Entry/exit tracking
      fit_for:
      - Directional trading
      - Swing trading
      - Risk-managed positions
      not_fit_for:
      - Market making
      - Arbitrage
    - name: OrderExecutor
      traits:
      - Single orders
      - Simple execution
      fit_for:
      - One-off orders
      - Simple strategies
      not_fit_for:
      - Complex position management
    - name: DCAExecutor
      traits:
      - Multi-level averaging
      - Break-even tracking
      fit_for:
      - Dollar-cost averaging
      - Accumulation strategies
      not_fit_for:
      - Single-entry positions
      - Immediate full position
    - name: ArbitrageExecutor
      traits:
      - Cross-exchange
      - Gas cost awareness
      - Fewer retries
      fit_for:
      - Arbitrage opportunities
      - Time-sensitive execution
      not_fit_for:
      - Long-term positions
      - High gas networks
    - name: GridExecutor
      traits:
      - Multi-level grids
      - Symmetrical levels
      fit_for:
      - Range-bound markets
      - Grid trading
      not_fit_for:
      - Trending markets
      - Single orders
    - name: TWAPExecutor
      traits:
      - Time-sliced execution
      - Market impact reduction
      fit_for:
      - Large orders
      - VWAP strategies
      not_fit_for:
      - Small orders
      - Urgency required
    default: PositionExecutor
  - name: close_type
    description: Reason for position closure determines which barrier triggered the exit
    options:
    - name: STOP_LOSS
      traits:
      - Risk management
      - Maximum loss protection
      fit_for:
      - Risk-averse strategies
      - Volatile markets
      not_fit_for:
      - Trend following
      - Large stop distances
    - name: TAKE_PROFIT
      traits:
      - Profit capture
      - Target achievement
      fit_for:
      - Profit-targeting strategies
      - Clear levels
      not_fit_for:
      - Open-ended trends
    - name: TRAILING_STOP
      traits:
      - Dynamic protection
      - Trend following
      fit_for:
      - Strong trends
      - Volatile pairs
      not_fit_for:
      - Range-bound
      - Whipsaw
    - name: EXPIRED
      traits:
      - Time-based exit
      - Configurable duration
      fit_for:
      - Time-limited positions
      - Scheduled trading
      not_fit_for:
      - Open-ended holds
    - name: USER
      traits:
      - Manual intervention
      - Trader override
      fit_for:
      - Human oversight
      - Emergency exits
      not_fit_for:
      - Fully automated
    - name: EARLY_STOP
      traits:
      - Conditional exit
      - Signal-based
      fit_for:
      - Reversal signals
      - Strategy overrides
      not_fit_for:
      - Strict barrier-only exits
    default: EXPIRED
  design_decisions:
  - Max retries default 10 for positions, 3 for arbitrage reflecting time-sensitivity differences (hummingbot/strategy_v2/executors/arbitrage_executor/arbitrage_executor.py:50)
  acceptance_hints:
  - PositionExecutor places close order only after open order fully fills
  - DCAExecutor respects minimum order sizes across each levels
  - ArbitrageExecutor validates token interchangeability before execution
  - Every executor types respond to stop/take-profit/time-limit barriers correctly
- id: orchestration
  name: Orchestration Layer
  order: 5
  responsibility: Coordinates controllers and executors. Routes actions, aggregates reports, manages position
    holds for same-side aggregation, and persists state to database.
  interface:
    inputs:
    - Controller action queues
    - ExecutorInfo streams
    outputs:
    - Unified reports
    - Performance metrics
    - Stored positions
  required_methods:
  - name: ExecutorOrchestrator.execute_actions
    description: Central coordinator processing each executor lifecycle and position holds
    evidence: hummingbot/strategy_v2/executors/executor_orchestrator.py:136(execute_actions)
  - name: StrategyV2Base.on_tick
    description: Main tick handler delegating to ExecutorOrchestrator for action processing
    evidence: hummingbot/strategy/strategy_v2_base.py:311(on_tick)
  - name: MarketsRecorder.save_filled_order
    description: Persists order and trade data to SQLAlchemy database
    evidence: hummingbot/connector/markets_recorder.py:1(save_filled_order)
  - name: PositionHold.get_unified_position
    description: Aggregates same-side orders into unified position view
    evidence: hummingbot/strategy_v2/executors/executor_orchestrator.py:35(get_unified_position)
  key_behaviors:
  - behavior: Same-side position aggregation
    description: ExecutorOrchestrator manages PositionHold for same-side aggregation, combining multiple
      buy/sell executors on same pair
    evidence: hummingbot/strategy_v2/executors/executor_orchestrator.py:478(_determine_position_side)
  - behavior: Auto-initialization convention
    description: StrategyV2Base initializes controllers and MarketDataProvider automatically via convention-over-configuration
    evidence: hummingbot/strategy/strategy_v2_base.py:655(initialize_controllers)
  - behavior: Cached performance persistence
    description: Performance metrics cached in-memory and persisted on stop to avoid database writes on
      every tick
    evidence: hummingbot/strategy_v2/executors/executor_orchestrator.py:173(_initialize_cached_performance)
  - behavior: Thread-safe Queue communication
    description: Actions queued via asyncio.Queue from controllers to executors ensuring thread-safe communication
      between ticks
    evidence: hummingbot/strategy/strategy_v2_base.py:690(listen_to_executor_actions)
  replaceable_points:
  - name: backtesting_engine
    description: Simulation engine for historical testing and strategy validation
    options:
    - name: BacktestingEngineBase
      traits:
      - Historical simulation
      - Controller config support
      fit_for:
      - Strategy validation
      - Parameter optimization
      not_fit_for:
      - Live trading
      - Real-time execution
    default: BacktestingEngineBase
  design_decisions:
  - Actions queued via asyncio.Queue from controllers to executors for thread-safe communication (hummingbot/strategy/strategy_v2_base.py:690)
  acceptance_hints:
  - ExecutorOrchestrator correctly routes CreateExecutorAction to appropriate executor
  - PositionHold aggregates multiple same-side executors into single position view
  - Performance metrics update on each tick and persist on strategy stop
  - Every executor state transitions reflect in unified reports
- id: backtesting
  name: Backtesting Layer
  order: 6
  responsibility: Simulates strategy execution on historical data to evaluate performance before live
    trading. Uses same executor configs as live trading to ensure backtest-to-live parity.
  interface:
    inputs:
    - Historical candle data
    - Controller configs
    - Start/end timestamps
    outputs:
    - Executor simulations
    - Performance summaries
    - PnL analysis
  required_methods:
  - name: BacktestingEngineBase.run_backtesting
    description: Orchestrates historical simulation with controller configuration and candle data
    evidence: hummingbot/strategy_v2/backtesting/backtesting_engine_base.py:32(run_backtesting)
  - name: ExecutorSimulatorBase.simulate_fill
    description: Simulates order fills based on historical price data
    evidence: hummingbot/strategy_v2/backtesting/executor_simulator_base.py:83(simulate_fill)
  - name: PositionExecutorSimulator.evaluate_barriers
    description: Simulates position executor with barrier checks on historical data
    evidence: hummingbot/strategy_v2/backtesting/executors_simulator/position_executor_simulator.py:9(evaluate_barriers)
  - name: DCAExecutorSimulator.get_break_even_price
    description: Computes volume-weighted break-even price from simulated fills
    evidence: hummingbot/strategy_v2/backtesting/executors_simulator/dca_executor_simulator.py:12(get_break_even_price)
  key_behaviors:
  - behavior: Config reuse between backtest and live
    description: Backtesting uses same executor configs as live trading ensuring backtest-to-live parity
    evidence: hummingbot/strategy_v2/backtesting/backtesting_engine_base.py:208(simulate_executor)
  - behavior: Volume-weighted break-even calculation
    description: Simulators compute break-even price using weighted average capturing DCA fill dynamics
    evidence: hummingbot/strategy_v2/backtesting/executors_simulator/dca_executor_simulator.py:15(break_even_price_at_index)
  - behavior: Flat percentage trade cost modeling
    description: Trade cost passed as flat percentage (default 0.06%) simplifying fee modeling while capturing
      major cost component
    evidence: hummingbot/strategy_v2/backtesting/backtesting_engine_base.py:82(run_backtesting)
  replaceable_points:
  - name: backtesting_resolution
    description: Candle interval for simulation determines granularity of backtest
    options:
    - name: 1m
      traits:
      - High granularity
      - Detailed simulation
      fit_for:
      - Scalping
      - Short-term strategies
      not_fit_for:
      - Long-term strategies
      - Computational constraints
    - name: 5m
      traits:
      - Balanced granularity
      - Moderate computation
      fit_for:
      - Swing trading
      - Medium-term strategies
      not_fit_for:
      - Intraday scalping
    - name: 15m
      traits:
      - Reduced noise
      - Trend analysis
      fit_for:
      - Trend-following
      - Position trading
      not_fit_for:
      - Fast scalping
      - High-frequency
    - name: 1h
      traits:
      - Low granularity
      - Trend focus
      fit_for:
      - Position trading
      - Daily strategies
      not_fit_for:
      - Short-term
      - Precise entry timing
    default: 1m
  design_decisions:
  - Simulators compute break-even price using weighted average for DCA accuracy (hummingbot/strategy_v2/backtesting/executors_simulator/dca_executor_simulator.py:15)
  acceptance_hints:
  - BacktestingEngineBase runs without errors on valid historical data
  - Executor simulations match expected behavior from live executor configs
  - Performance summaries include total PnL, trade count, and win rate
  - DCA break-even price correctly reflects volume-weighted fills
- id: cli_interface
  name: CLI Interface Layer
  order: 7
  responsibility: User-facing command interface for configuration, strategy management, and real-time
    monitoring. Provides wizard-based creation and runtime configuration updates.
  interface:
    inputs:
    - User commands
    - Config files
    - Strategy definitions
    outputs:
    - Status displays
    - Trade history
    - Configuration files
  required_methods:
  - name: HummingbotApplication.start
    description: Main application entry point initializing strategy and clock management
    evidence: hummingbot/client/hummingbot_application.py:39(start)
  - name: CreateCommand.create
    description: Wizard-based strategy and controller creation guided by user inputs
    evidence: hummingbot/client/command/create_command.py:50(create)
  - name: StartCommand.start
    description: Strategy initialization and clock management for live execution
    evidence: hummingbot/client/command/start_command.py:20(start)
  - name: ConfigCommand.config
    description: Runtime configuration queries and updates for active strategies
    evidence: hummingbot/client/command/config_command.py:1(config)
  key_behaviors:
  - behavior: Pydantic model validation
    description: Strategy config stored as Pydantic models for type safety and automatic validation reducing
      runtime errors
