replaceable_slots:
- id: slot-001
  name: exchange_connector
  description: 'Select based on: required trading pairs, geographic availability, rate limits, and regulatory
    requirements'
  used_in_stages: []
  options:
  - name: binance
    traits:
    - high_liquidity
    - spot_futures
    - web_socket
    - api_key_auth
    fit_for:
    - High-volume trading, arbitrage, market-making strategies
    not_fit_for:
    - Regulatory-restricted jurisdictions
  - name: coinbase_advanced_trade
    traits:
    - regulated
    - cb_prices_oracle
    - api_key_auth
    fit_for:
    - US-regulated trading, Coinbase ecosystem
    not_fit_for:
    - High-frequency trading due to rate limits
  - name: kraken
    traits:
    - regulated_eu
    - tiered_rate_limits
    - api_key_auth
    fit_for:
    - European users, Kraken Futures
    not_fit_for:
    - High-frequency trading (strict rate limits)
  - name: kucoin
    traits:
    - high_rate_limits
    - maker_rebate
    - api_key_auth
    fit_for:
    - Market-making with high order frequency
    not_fit_for:
    - Users requiring tight spread products not on KuCoin
  - name: gate_io
    traits:
    - wide_coin_coverage
    - web_socket
    - api_key_auth
    fit_for:
    - Altcoin trading, perpetual futures
    not_fit_for:
    - Users preferring regulated exchanges
  - name: okx
    traits:
    - global_exchange
    - perpetuals
    - api_key_auth
    fit_for:
    - Multi-asset trading, global users
    not_fit_for:
    - US users (limited availability)
  - name: bybit
    traits:
    - derivatives_focus
    - copy_trading
    - api_key_auth
    fit_for:
    - Derivatives-focused strategies
    not_fit_for:
    - Pure spot traders
  - name: hyperliquid
    traits:
    - perpetuals_only
    - low_fees
    - api_key_auth
    fit_for:
    - Perpetual futures with low fees
    not_fit_for:
    - Spot trading requirements
  - name: xrpl
    traits:
    - xrp_ledger
    - decentralized
    - issued_currencies
    fit_for:
    - XRP ecosystem trading, issued currency trading
    not_fit_for:
    - Users unfamiliar with XRP Ledger mechanics
  - name: paper_trade
    traits:
    - simulated
    - no_real_funds
    fit_for:
    - Strategy testing, learning, backtesting validation
    not_fit_for:
    - Production trading
  default: binance
  _source: worker_resource
- id: slot-002
  name: price_oracle
  description: 'Choose based on: need for historical data (CoinGecko), real-time requirements (CoinCap),
    or exchange-native rates'
  used_in_stages: []
  options:
  - name: coin_cap
    traits:
    - real_time
    - websocket
    - free_tier
    fit_for:
    - Real-time price feeds with generous free tier
    not_fit_for:
    - High-frequency pricing updates
  - name: coin_gecko
    traits:
    - comprehensive
    - market_data
    - tiered_pricing
    fit_for:
    - Comprehensive market data, historical analysis
    not_fit_for:
    - Real-time streaming requirements
  - name: exchange_rate_source
    traits:
    - direct_exchange
    - real_time
    fit_for:
    - Exchange-specific rate conversion
    not_fit_for:
    - Cross-exchange comparisons
  default: exchange_rate_source
  _source: worker_resource
