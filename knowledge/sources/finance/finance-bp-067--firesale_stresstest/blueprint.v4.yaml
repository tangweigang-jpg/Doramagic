    with 5% cash creates liquidity-solvency timing mismatch'
  rationale: 'Balance sheets are derived from CET1E/leverage ratio (BD-002), creating internally consistent
    starting positions. Leverage ratio is sole solvency metric (BD-071). Cash is fixed at 5% of assets
