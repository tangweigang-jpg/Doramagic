replaceable_slots:
- id: slot-001
  name: simulation_framework
  description: 'py-economicsl is required because the model uses its specific abstractions: Agent base
    class with ledger(), Simulation class for time advancement, and Contract/Action pattern for financial
    instruments. Replacing it would require significant refactoring.'
  used_in_stages: []
  options:
  - name: py-economicsl
    traits:
    - agent-based
    - double-entry ledger
    - contract-based actions
    - academic
    fit_for:
    - Academic research on financial contagion, systemic risk modeling with modular contract/action architecture
    not_fit_for:
    - Production trading systems, real-time market simulation, high-frequency scenarios
  - name: mesa
    traits:
    - agent-based
    - simple
    - django-inspired
    - visualization
    fit_for:
    - General-purpose agent-based modeling with built-in visualization server
    not_fit_for:
    - Financial modeling with double-entry accounting, contract-based frameworks
  - name: cadCAD
    traits:
    - agent-based
    - policy-engineering
    - Monte Carlo
    - state-channels
    fit_for:
    - Complex adaptive dynamics, policy simulation, parameter sweeps
    not_fit_for:
    - Simple simulations, quick prototyping
  - name: Repast
    traits:
    - agent-based
    - discrete-event
    - high-performance
    - Java/C++ core
    fit_for:
    - Large-scale agent simulations, high-performance computing clusters
    not_fit_for:
    - Quick prototyping, single-machine simulations
  default: py-economicsl
  _source: worker_resource
- id: slot-002
  name: bank_balance_sheet_data
  description: 'Any CSV with columns: bank_id, CET1E (capital), leverage, debt_sec, gov_bonds. The model
    parses whitespace-separated values and calculates: asset = CET1E / (leverage/100), with cash=5% of
    asset, liability=asset-CET1E.'
  used_in_stages: []
  options:
  - name: EBA 2018 Stress Test Data
    traits:
    - real-world
    - EU banks
    - '2018'
    - 48 institutions
    fit_for:
    - Historical analysis, academic research matching published results
    not_fit_for:
    - Current market conditions, non-EU banks, real-time analysis
  - name: EBA 2021 Stress Test Data
    traits:
    - real-world
    - EU banks
    - '2021'
    - updated composition
    fit_for:
    - More recent analysis, updated bank portfolio compositions
    not_fit_for:
    - Historical comparison with 2018 baseline
  - name: Synthetic Bank Data Generator
    traits:
    - synthetic
    - configurable
    - arbitrary scale
    fit_for:
    - Stress testing model behavior with various bank sizes, correlation structures, or system sizes
    not_fit_for:
    - Real-world risk calibration, regulatory submissions
  - name: Fed DFAST Data
    traits:
    - real-world
    - US banks
    - annual
    - 30+ institutions
    fit_for:
    - US banking system analysis, comparison with EU results
    not_fit_for:
    - Cross-region combined analysis without data harmonization
  default: EBA_2018.csv
  _source: worker_resource
- id: slot-003
  name: visualization
  description: matplotlib is used directly via plt.plot() and plt.figure(). Simple replacement with plotly
    or bokeh would require refactoring model.py:109-119 and simulation.py:87-99.
  used_in_stages: []
  options:
  - name: matplotlib
    traits:
    - static plots
    - publication-quality
    - wide format support
    fit_for:
    - Standard 2D plotting, publication figures, batch processing
    not_fit_for:
    - Interactive exploration, web dashboards, real-time updates
  - name: plotly
    traits:
    - interactive
    - web-based
    - zoom/pan
    fit_for:
    - Interactive analysis, web deployment, user exploration
    not_fit_for:
    - Batch processing, PDF export, minimal dependencies
  - name: bokeh
    traits:
    - interactive
    - web-based
    - streaming
    fit_for:
    - Live dashboards, real-time streaming data visualization
    not_fit_for:
    - Simple static plots, minimal dependencies
  - name: altair
    traits:
    - declarative
    - Vega-Lite
    - interactive
    fit_for:
    - Statistical visualization, quick exploration scripts
    not_fit_for:
    - Complex custom graphics, large datasets
  default: matplotlib
  _source: worker_resource
