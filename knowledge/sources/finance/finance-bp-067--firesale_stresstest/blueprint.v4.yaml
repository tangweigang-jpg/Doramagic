# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-067
name: Foundations of System-Wide Stress Testing
sop_version: '3.6'
source:
  projects:
  - firesale_stresstest
  commit_hash: dd861c6dbba3bb9dc77565fac585a2b2e8a960ab
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: financial contagion modeling / systemic risk analysis
  description: A bank fire-sale contagion model that simulates how initial asset price shocks propagate
    through the European banking system via deleveraging cascades, based on real EBA 2018 data.
  prerequisites: Understanding of leverage ratios, banking balance sheets, financial contagion mechanisms,
    and Python 3
  not_suitable_for: Real-time trading systems, credit risk analysis without fire-sale externalities, regulatory
    capital requirement calculations, high-frequency trading strategies
stages:
- id: initialization
  name: Model Initialization
  order: 1
  responsibility: 'Load bank balance sheets from EBA data and initialize market infrastructure. WHY: Provides
    reproducible starting state from real European banking data.'
  interface:
    inputs:
    - EBA_2018.csv (bank leverage/asset data)
    outputs:
    - 48 Bank agents with balance sheets, AssetMarket with initial prices
  required_methods:
  - name: Model.initialize
    description: Orchestrates initialization by loading EBA CSV data and creating 48 Bank agents with
      balance sheets and AssetMarket
    evidence: model.py:58-76(function)
  - name: Bank.__init__
    description: Creates a bank agent with balance sheet components (cash, tradable assets, loans, other
      liabilities)
    evidence: institutions.py:17(function)
  - name: AssetMarket.__init__
    description: Initializes centralized market with price tracking and orderbook for tradable assets
    evidence: markets.py:26(function)
  key_behaviors:
  - behavior: Entity-level isolation
    description: Each bank is an independent agent with its own balance sheet, ensuring no shared state
      between institutions
    evidence: institutions.py:17-76(Bank class)
  - behavior: Reproducible starting state
    description: Banks derived from real EBA 2018 CSV data ensuring empirical grounding and reproducibility
    evidence: model.py:58-76(Model.initialize)
  - behavior: Balance sheet consistency
    description: Asset = CET1E/leverage, Liability = asset - CET1E, Cash = 5% of assets maintains accounting
      identity
    evidence: model.py:68-72(Model.initialize)
  replaceable_points:
  - name: data_source
    description: Source of bank balance sheet data for initialization
    options:
    - name: EBA_2018.csv
      traits:
      - real data
      - 2018 vintage
      - 48 banks
      fit_for:
      - baseline simulations
      - reproducible research
      not_fit_for:
      - current market conditions
      - other geographic regions
    - name: EBA_2023.csv
      traits:
      - real data
      - 2023 vintage
      - updated bank list
      fit_for:
      - current analysis
      - regulatory comparison
      not_fit_for:
      - historical comparisons
      - reproducing published results
    - name: synthetic_data
      traits:
      - generated
      - customizable
      - no external dependencies
      fit_for:
      - testing
      - hypothetical scenarios
      - pedagogical use
      not_fit_for:
      - policy analysis
      - regulatory submissions
    default: EBA_2018.csv
  design_decisions:
  - Banks derived from real EBA 2018 CSV data (model.py:58-76) - Reproducible empirical grounding vs synthetic
    data validates model against actual European bank balance sheets
  - 'Balance sheet formula: asset=CET1E/leverage, liability=asset-CET1E (model.py:68-72) - Simple tier-1
    leverage ratio constraint defines entire balance sheet structure'
  - Cash fixed at 5% of total assets (model.py:69) - Hardcoded liquidity assumption may not reflect actual
    bank behavior across time periods
  - Other liability split 50/50 with loan (model.py:72) - Equal split between instrument types when granular
    data unavailable
  acceptance_hints:
  - Exactly 48 banks created matching EBA dataset
  - Total assets in model approximately match EBA 2018 reported values
  - Every banks have positive leverage ratios
  - AssetMarket initialized with default prices of 1.0 for each asset type
- id: shock_application
  name: Shock Application
  order: 2
  responsibility: 'Apply exogenous initial shock to asset prices, triggering potential deleveraging cascade.
    WHY: Models contagion from external market shock (e.g., sovereign debt crisis).'
  interface:
    inputs:
    - AssetType to shock, fraction (0.0-1.0)
    outputs:
    - Updated market prices, propagated to each bank asset valuations
  required_methods:
  - name: Model.apply_initial_shock
    description: Applies price shock to specified asset type and propagates to each bank asset valuations
    evidence: model.py:46(function)
  - name: AssetMarket.update_price
    description: Stores and updates market price state for asset types
    evidence: markets.py:90(function)
  - name: Tradable.update_price
    description: Updates individual asset price from market for consistent accounting
    evidence: contracts.py:123(function)
  key_behaviors:
  - behavior: Exogenous shock injection
    description: Applies deterministic price drop to specified asset type representing external market
      event
    evidence: model.py:27-28(ASSET_TO_SHOCK, INITIAL_SHOCK)
  - behavior: Price propagation
    description: Every bank holdings of shocked asset type update simultaneously to maintain accounting
      consistency
    evidence: model.py:52(update_asset_price)
  replaceable_points:
  - name: shock_asset
    description: Which asset type receives the initial price shock
    options:
    - name: GOV_BONDS
      traits:
      - sovereign debt
      - common collateral
      - 20% default shock
      fit_for:
      - sovereign debt crisis scenarios
      - baseline simulations
      not_fit_for:
      - corporate-specific shocks
      - multi-asset crises
    - name: CORPORATE_BONDS
      traits:
      - private sector
      - higher volatility
      fit_for:
      - corporate credit events
      - sector-specific crises
      not_fit_for:
      - government-related shocks
      - cross-sector contagion
    - name: ALL
      traits:
      - system-wide
      - maximal shock
      fit_for:
      - tail risk scenarios
      - maximum stress testing
      not_fit_for:
      - realistic partial shocks
      - differentiated response analysis
    default: GOV_BONDS
  - name: shock_fraction
    description: Magnitude of initial price drop (0.0 = no shock, 1.0 = total loss)
    options:
    - name: 0.0-1.0 continuous
      traits:
      - parameterizable
      - sweepable
      fit_for:
      - sensitivity analysis
      - scenario calibration
      not_fit_for: []
    default: '0.20'
  design_decisions:
  - Initial shock defaults to 20% on government bonds (model.py:27-28) - 20% represents severe sovereign
    debt crisis scenario; gov_bonds selected as common interbank collateral
  - Price shock propagates by updating each bank asset prices (model.py:52) - Each bank individually updates
    to ensure consistent accounting after market price changes
  - Default price is 1.0 for unknown asset types (markets.py:30) - Safe default ensures computation continues
    even for unmapped asset types
  acceptance_hints:
  - AssetMarket prices reflect shock magnitude for shocked asset type
  - Every Bank holdings of shocked asset show updated valuation
  - Unshocked asset types retain original prices
- id: agent_decision
  name: Agent Decision Phase
  order: 3
  responsibility: 'Each bank evaluates solvency and chooses deleveraging actions. WHY: Separating decision
    from execution ensures order independence.'
  interface:
    inputs:
    - Bank leverage ratio, available cash
    outputs:
    - Actions queued (SellAsset/PayLoan) via putForSale_ buffer
  required_methods:
  - name: Bank.act
    description: Evaluates solvency and queues deleveraging actions based on leverage constraints
    evidence: institutions.py:93(function)
  - name: BankLeverageConstraint.check
    description: Computes leverage ratio and determines if deleveraging is required
    evidence: constraints.py:1(function)
  - name: do_delever.execute
    description: Implements deleveraging strategy prioritizing loan repayment then asset sales
    evidence: behaviours.py:9(function)
  key_behaviors:
  - behavior: Order-independent decision making
    description: Two-phase step (act + step) ensures actions are decided in act() but executed in step()
      preventing first-mover advantage in simultaneous firesale scenarios
    evidence: model.py:96-100(loop structure)
  - behavior: Threshold-based deleveraging
    description: Banks only react when leverage drops below buffer (4%), avoiding excessive trading at
      minor losses
    evidence: constraints.py:16(BANK_LEVERAGE_BUFFER check)
  - behavior: Proportional action allocation
    description: Deleveraging distributed proportionally across each contracts of same type to prevent
      one large position from monopolizing sales
    evidence: behaviours.py:24-38(perform_proportionally)
  - behavior: Priority-based deleveraging
    description: Loan repayment preferred over asset sales as it reduces liabilities without triggering
      asset price impact
    evidence: behaviours.py:14(pay_off_liabilities)
  replaceable_points:
  - name: delever_strategy
    description: How to allocate deleveraging across contracts when multiple actions available
    options:
    - name: proportional
      traits:
      - fair distribution
      - ' Greenwood 2015 reference'
      - Cont-Schaanning 2017
      fit_for:
      - realistic behavior
      - regulatory analysis
      - academic research
      not_fit_for:
      - extreme scenarios
      - single-position focus
    - name: pay_loans_only
      traits:
      - liability-focused
      - no fire sales
      fit_for:
      - low liquidity impact
      - conservative deleveraging
      not_fit_for:
      - high loan concentration
      - insufficient loan capacity
    - name: sell_only
      traits:
      - asset-focused
      - maximum price impact
      fit_for:
      - liquidity-dominant scenarios
      - worst-case fire sale
      not_fit_for:
      - regulatory scenarios
      - realistic modeling
    default: proportional
  - name: leverage_threshold
    description: When banks start deleveraging based on leverage buffer
    options:
    - name: BANK_LEVERAGE_BUFFER=0.04
      traits:
      - threshold model
      - reactive
      - 4% trigger
      fit_for:
      - baseline simulations
      - Cont-Schaanning 2017 reproduction
      not_fit_for:
      - always-on deleveraging
      - targeting scenarios
    - name: BANK_LEVERAGE_BUFFER=1.0
      traits:
      - targeting model
      - proactive
      - full deleveraging
      fit_for:
      - aggressive deleveraging
      - leverage targeting scenarios
      not_fit_for:
      - threshold-based policy
      - buffer maintenance analysis
    default: BANK_LEVERAGE_BUFFER=0.04
  design_decisions:
  - Two-phase step (step + act) for order independence (model.py:96-100) - Actions decided in act() but
    executed in step() prevents first-mover advantage in simultaneous firesale scenarios
  - Insolvent banks trigger default via exception (institutions.py:95-96) - Hard insolvency threshold
    (3% leverage) - banks that breach cannot continue operating
  - Order-independent buffer putForSale_ (contracts.py:36) - Assets marked for sale but not yet sold prevents
    double-selling when multiple banks hold same asset
  - 'Deleveraging priority: pay loans first, then sell (behaviours.py:14) - Loan repayment preferred as
    it reduces liabilities without triggering asset price impact (Greenwood 2015)'
  - 'Threshold model: act when leverage < buffer (4%) (constraints.py:16) - Banks don''t react until buffer
    breached, avoiding excessive trading at minor losses'
  - Perform proportionally across each actions of same type (behaviours.py:24-38) - Proportional allocation
    prevents one large position from monopolizing deleveraging (Cont-Schaanning 2017)
  acceptance_hints:
  - Actions correctly queued in putForSale_ buffer
  - No first-mover advantage observable in batch simulations
  - Leverage-constrained banks only act when below 4% buffer
  - Proportional distribution across eligible contracts
- id: market_clearing
  name: Market Clearing
  order: 4
  responsibility: 'Execute each queued sell orders and compute price impact. WHY: Batch execution isolates
    market mechanics from agent decision-making.'
  interface:
    inputs:
    - Orderbook with asset quantities to sell
    outputs:
    - Updated market prices, cash transferred to selling banks
  required_methods:
  - name: AssetMarket.clear_the_market
    description: Executes each queued sales in batch and computes price impact using Cifuentes 2005 formula
    evidence: markets.py:51(function)
  - name: Order.settle
    description: Individual sale order with settlement logic and midpoint pricing
    evidence: markets.py:8(function)
  - name: compute_price_impact
    description: 'Applies exponential price impact function: new_price = price * exp(-beta * sold / market_cap)'
    evidence: markets.py:69(function)
  key_behaviors:
  - behavior: Simultaneous batch execution
    description: SIMULTANEOUS_FIRESALE=True batches each sales before price impact calculation, preventing
      cascading price signals within same round
    evidence: model.py:97-98(conditional clear)
  - behavior: Nonlinear price impact
    description: Exponential price impact captures illiquid market dynamics where small sales have limited
      impact but large sales trigger steep drops
    evidence: markets.py:83-84(beta and exp formula)
  - behavior: Midpoint price execution
    description: Sellers receive average of pre/post prices preventing front-running in batch execution
    evidence: markets.py:20((old_price+price)/2)
  - behavior: Asset-type price impact
    description: Price impact calculated per asset type not per individual asset since same-type assets
      are perfect substitutes
    evidence: markets.py:69(assetType param)
  replaceable_points:
  - name: clearing_mode
    description: When to clear the market relative to agent actions
    options:
    - name: SIMULTANEOUS_FIRESALE=True (batch)
      traits:
      - illiquid market
      - order-independent
      - simultaneous
      fit_for:
      - contagion analysis
      - systemic risk
      - baseline simulations
      not_fit_for:
      - sequential market dynamics
      - continuous trading
    - name: SIMULTANEOUS_FIRESALE=False (continuous)
      traits:
      - sequential execution
      - price-contingent
      - path-dependent
      fit_for:
      - market microstructure
      - order flow analysis
      not_fit_for:
      - systemic risk baseline
      - regulatory stress tests
    default: 'True'
  - name: price_impact_function
    description: Mathematical model for price impact from asset sales
    options:
    - name: Cifuentes exponential
      traits:
      - nonlinear
      - Cifuentes 2005
      - calibrated
      fit_for:
      - academic research
      - regulatory scenarios
      - baseline
      not_fit_for:
      - linear approximations
      - simple models
    - name: linear
      traits:
      - linear
      - simple
      fit_for:
      - quick estimates
      - educational purposes
      not_fit_for:
      - high-impact scenarios
      - academic validation
    - name: sqrt
      traits:
      - square root
      - market depth based
      fit_for:
      - alternative liquidity models
      - high-frequency markets
      not_fit_for:
      - Cifuentes validation
      - regulatory compliance
    default: exponential
  - name: execution_price
    description: Price at which sales execute for settlement
    options:
    - name: midpoint
      traits:
      - fair
      - no front-running
      - batch-safe
      fit_for:
      - regulatory analysis
      - academic research
      not_fit_for:
      - real-time trading
      - bid-ask simulation
    - name: old_price
      traits:
      - seller-favorable
      - pre-shock pricing
      fit_for:
      - conservative estimates
      - upper bound analysis
      not_fit_for:
      - buyer-favorable scenarios
      - realistic clearing
    - name: new_price
      traits:
      - buyer-favorable
      - post-shock pricing
      fit_for:
      - worst-case analysis
      - conservative estimates
      not_fit_for:
      - seller-favorable scenarios
      - realistic clearing
    default: midpoint
  design_decisions:
  - SIMULTANEOUS_FIRESALE=True batches each sales (model.py:97-98) - Batch mode prevents price signals
    from affecting subsequent sales in same round - models illiquid market
  - Exponential price impact per Cifuentes 2005 (markets.py:83-84) - Exponential captures nonlinear liquidity
    drain - small sales have limited impact, large sales trigger steep drops
  - 5% market cap sold = 5% price drop by default (markets.py:83) - beta=-1/0.05*log(1-price_impact) calibrates
    to 5% impact at 5% sold - adjustable via PRICE_IMPACTS
  - Midpoint price execution (markets.py:20) - Sellers receive average of pre/post prices - prevents front-running
    in batch execution
  - Price impact per asset type, not per asset (markets.py:69) - Same-type assets are perfect substitutes
    - selling one affects each in same category
  - Floating point tolerance eps=1e-9 (contracts.py:18) - Avoids division-by-zero and handles IEEE 754
    precision edge cases in financial calculations
  acceptance_hints:
  - Every orders in orderbook executed at correct prices
  - Price impact correctly calculated using Cifuentes exponential formula
  - Cash transferred to selling banks equals sale proceeds
  - Market prices updated after each sales completed
- id: default_handling
  name: Default Handling
  order: 5
  responsibility: 'Process bank defaults and redistribute assets. WHY: Defaults are terminal events that
    affect systemic risk calculations.'
  interface:
    inputs:
    - DefaultException raised by insolvent bank
    outputs:
    - Bank marked dead, assets sold proportionally, defaults_this_round counter incremented
  required_methods:
  - name: Bank.do_trigger_default
    description: Executes default by selling each bank assets proportionally and marking bank as dead
    evidence: institutions.py:69(function)
  - name: sell_assets_proportionally
    description: Liquidates entire asset portfolio following same proportional logic as normal deleveraging
    evidence: behaviours.py:44(function)
  key_behaviors:
  - behavior: Deferred default execution
    description: Default triggered in act() but executed in next step() phase to prevent order-dependent
      effects from bilateral funding pulls
    evidence: institutions.py:106,121(do_trigger_default)
  - behavior: Terminal bank state
    description: Dead banks cannot take further actions or be counted in deleveraging decisions via alive
      flag check
    evidence: institutions.py:111-112(alive check in act)
  - behavior: Proportional fire sale liquidation
    description: Default sells each assets proportionally following same allocation logic as normal deleveraging
    evidence: institutions.py:73(sell_assets_proportionally)
  replaceable_points:
  - name: default_treatment
    description: How to handle defaulting banks' assets and liabilities
    options:
    - name: sell_all_assets
      traits:
      - fire sale
      - market clearing
      - contagion-inducing
      fit_for:
      - baseline simulations
      - regulatory stress tests
      - contagion analysis
      not_fit_for:
      - bailout scenarios
      - policy alternatives
    - name: bailout
      traits:
      - government intervention
      - no contagion
      - moral hazard
      fit_for:
      - policy analysis
      - intervention scenarios
      - rescue package analysis
      not_fit_for:
      - baseline contagion
      - pure market scenarios
    - name: bailin
      traits:
      - creditor bailin
      - debt restructuring
      - no public funds
      fit_for:
      - modern resolution scenarios
      - CDS analysis
      - creditor loss analysis
      not_fit_for:
      - government intervention analysis
      - bailout policy
    default: sell_all_assets
  design_decisions:
  - Default deferred to next step() phase (institutions.py:106,121) - Immediate execution could cause
    order-dependent effects if default triggers bilateral funding pulls
  - Bank alive flag prevents further actions (institutions.py:111-112) - Dead banks cannot take further
    actions or be counted in deleveraging decisions
  - Default sells each assets proportionally (institutions.py:73) - Fire sale liquidation follows same
    proportional logic as normal deleveraging
  acceptance_hints:
  - Defaulting bank not included in next round agent list
  - Every defaulting bank assets added to market orderbook
  - defaults_this_round counter correctly incremented
  - Surviving banks receive updated prices from default fire sales
data_flow:
- from_stage: initialization
  to_stage: shock_application
  data: 48 Bank agents with balance sheets (cash, corp_bonds, gov_bonds, loans) and AssetMarket with initial
    prices
- from_stage: shock_application
  to_stage: agent_decision
  data: Updated asset prices via AssetMarket.prices dict reflecting initial shock
- from_stage: agent_decision
  to_stage: market_clearing
  data: Orderbook with (asset_type, quantity) pairs via put_for_sale() method
- from_stage: market_clearing
  to_stage: agent_decision
  data: New market prices after price impact and cash proceeds from asset sales
- from_stage: market_clearing
  to_stage: default_handling
  data: DefaultException raised when bank leverage falls below 3% minimum threshold
- from_stage: default_handling
  to_stage: agent_decision
  data: Dead bank removed from agent list for next simulation round
global_contracts:
- contract: Leverage ratio lambda = equity_valuation / asset_valuation must stay above BANK_LEVERAGE_MIN
    (3%)
  evidence: constraints.py:10-11(is_insolvent)
- contract: Every financial comparisons use eps=1e-9 tolerance to avoid floating point edge cases in IEEE
    754 arithmetic
  evidence: contracts.py:18,28,31,21
- contract: Actions (SellAsset, PayLoan) must implement perform() and get_max() interface for execution
  evidence: contracts.py:20(comment)
- contract: Contracts must implement is_eligible(me) method to be considered for agent deleveraging actions
  evidence: contracts.py:81,117,161
- contract: Asset quantities are floats (not integers) to support fractional sales and proportional allocation
  evidence: contracts.py:108(quantity=float)
- contract: step() MUST be called before act() per simulation tick to ensure order-independent execution
  evidence: model.py:95-100(do_delever)
- contract: put_for_sale() MUST be called before clear_the_market() in same tick to preserve orderbook
  evidence: model.py:97-98(do_delever)
- contract: oldPrices stored before price update for midpoint settlement pricing
  evidence: markets.py:52(clear_the_market)
- contract: putForSale_ buffer must be decremented on settlement to prevent double-selling
  evidence: contracts.py:36-40, markets.py:15-18
business_decisions:
- id: BD-001
  type: B/BA
  content: Banks derived from real EBA 2018 CSV data
  rationale: Reproducible empirical grounding vs synthetic data - validates model against actual European
    bank balance sheets, ensuring regulatory realism for policy analysis scenarios
  evidence: model.py:35(__init__)
  stage: initialization
  alternative_considered: Using synthetic bank distributions was rejected due to lack of empirical validation
    for stress testing
- id: BD-002
  type: B/BA
  content: 'Balance sheet formula: asset=CET1E/leverage, liability=asset-CET1E'
  rationale: Simple tier-1 leverage ratio constraint defines entire balance sheet structure - capital
    defines assets, assets minus capital defines liabilities per accounting identity
  evidence: model.py:54(Model.initialize)
  stage: initialization
  alternative_considered: Tiered capital structure with multiple instrument types was rejected for simplicity
- id: BD-003
  type: BA
  content: Cash fixed at 5% of total assets
  rationale: Hardcoded liquidity assumption of 5% cash buffer - may not reflect actual bank behavior across
    different time periods and regulatory environments
  evidence: model.py:35(__init__)
  stage: initialization
  alternative_considered: Bank-specific cash ratios from EBA data were considered but too noisy for baseline
    model
- id: BD-004
  type: BA/M
  content: Other liability split 50/50 with loan
  rationale: Equal split between instrument types when granular data unavailable - arbitrary but symmetric
    assumption avoids introducing modeler bias
  evidence: model.py:35(__init__)
  stage: initialization
  alternative_considered: Uniform random distribution was rejected; equal split is more neutral baseline
- id: BD-005
  type: BA
  content: Initial shock defaults to 20% on government bonds
  rationale: 20% represents severe sovereign debt crisis scenario; gov_bonds selected as common interbank
    collateral with high contagion potential in European banking system
  evidence: model.py:27-28(ASSET_TO_SHOCK, INITIAL_SHOCK)
  stage: shock_application
  alternative_considered: Random shock magnitude was rejected to maintain reproducible baseline experiments
  _evidence_issues:
  - 'INVALID_IDENTIFIER: ASSET_TO_SHOCK, INITIAL_SHOCK in model.py'
- id: BD-006
  type: B/DK
  content: Price shock propagates by updating each bank asset prices
  rationale: Each bank individually updates to ensure consistent accounting after market price changes
    - maintains double-entry bookkeeping integrity across each institutions
  evidence: model.py:42(update_asset_price)
  stage: shock_application
  alternative_considered: Centralized price update was rejected to preserve modular architecture
- id: BD-007
  type: BA
  content: Default price is 1.0 for unknown asset types
  rationale: Safe default of 1.0 ensures computation continues even for unmapped asset types - avoids
    crashes while signaling uncalibrated assets
  evidence: markets.py:27(AssetMarket.__init__)
  stage: shock_application
  alternative_considered: Raising exception for unknown types was rejected to improve model robustness
- id: BD-008
  type: B
  content: Two-phase step (step + act) for order independence
  rationale: Actions decided in act() but executed in step() prevents first-mover advantage in simultaneous
    firesale scenarios - critical for fairness in parallel execution
  evidence: model.py:96-100(loop structure)
  stage: agent_decision
  alternative_considered: Sequential execution was rejected; order-dependent results would undermine reproducibility
  _evidence_issues:
  - 'INVALID_IDENTIFIER: loop structure in model.py'
- id: BD-009
  type: B/BA
  content: Insolvent banks trigger default (raise exception)
  rationale: Hard insolvency threshold (3% leverage) - banks that breach cannot continue operating; this
    models regulatory breach and automatic intervention triggers
  evidence: institutions.py:95-96(is_insolvent check)
  stage: agent_decision
  alternative_considered: Gradual capital erosion was considered but adds complexity without clear empirical
    basis
  _evidence_issues:
  - 'INVALID_IDENTIFIER: is_insolvent check in institutions.py'
- id: BD-010
  type: B
  content: Order-independent buffer putForSale_
  rationale: Assets marked for sale but not yet sold prevents double-selling when multiple banks hold
    same asset - ensures unique execution across each sellers
  evidence: contracts.py:36(putForSale_+=quantity)
  stage: agent_decision
  alternative_considered: Immediate sale execution was rejected due to race condition risk in batch mode
  _evidence_issues:
  - 'INVALID_IDENTIFIER: putForSale_+=quantity in contracts.py'
- id: BD-011
  type: B/BA
  content: 'Deleveraging priority: pay loans first, then sell'
  rationale: Loan repayment preferred as it reduces liabilities without triggering asset price impact
    - aligns with Greenwood 2015 empirical finding on bank behavior during deleveraging
  evidence: behaviours.py:40(pay_off_liabilities)
  stage: agent_decision
  alternative_considered: Random priority was rejected; empirical literature supports loan-first behavior
- id: BD-012
  type: B/BA
  content: 'Threshold model: act when leverage < buffer (4%)'
  rationale: Banks don't react until buffer breached (4% threshold), avoiding excessive trading at minor
    losses - models gradual monitoring and threshold-based intervention
  evidence: constraints.py:1(BankLeverageConstraint) or constraints.py:5(get_leverage)
  stage: agent_decision
  alternative_considered: Continuous reaction function was rejected for simplicity and interpretability
  _evidence_issues:
  - 'INVALID_IDENTIFIER: BankLeverageConstraint) or constraints.py:5(get_leverage in constraints.py'
- id: BD-013
  type: B
  content: Perform proportionally across each actions of same type
