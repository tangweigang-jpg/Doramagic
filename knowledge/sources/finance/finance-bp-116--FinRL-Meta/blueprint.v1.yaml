business_decisions:
- id: BD-001
  type: B
  content: Weighted metrics by trade value (money_sell/money_buy) for aggregated stats
  rationale: 'Value-weighted aggregation prevents large trades from being dwarfed
    by many small ones. Better reflects actual execution impact. Boundary: Weight
    computed from trade value; not from P&L.'
  evidence: meta/env_execution_optimizing/order_execution_qlib/trade/logger/single_logger.py:56(module)
  stage: evaluation
  alternative_considered: Equal weighting was rejected for misleading aggregation
  _evidence_issues:
  - 'FN_NOT_FOUND: module in meta/env_execution_optimizing/order_execution_qlib/trade/logger/single_logger.py'
- id: BD-002
  type: B/DK
  content: Linear market impact model with permanent/temporary components
  rationale: 'Separate permanent impact (information leakage, price reversion) from
    temporary impact (liquidity constraints) prevents overestimating execution costs
    for large orders. The permanent/temporary split is critical for orders exceeding
    5-10% of ADV where naive linear models would underestimate market footprint. Boundary:
    model holds for liquid instruments with bid-ask spread < 50bp; degrades for illiquid
    securities with wide spreads.'
  evidence: meta/env_execution_optimizing/liquidation/env_execution_optimizing.py:366(permanentimpact),
    :370(temporaryimpact)
  stage: order_execution_optimization
  alternative_considered: Single linear model without decomposition was rejected due
    to poor fit for large trade sizes.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: permanentimpact), :370(temporaryimpact in meta/env_execution_optimizing/liquidation/env_execution_optimizing.py'
- id: BD-003
  type: B/BA
  content: Conditional Value at Risk (Expected Shortfall) for risk measurement
  rationale: 'CVaR (tail risk beyond 95th percentile) captures downside exposure that
    VaR misses, enabling proper risk assessment for large liquidation scenarios. Standard
    VaR ignores tail magnitude, which can underestimate risk by 40-60% for fat-tailed
    distributions. Boundary: computed at 95% confidence; accuracy degrades for higher
    confidence levels requiring more simulation data.'
  evidence: meta/env_execution_optimizing/liquidation/env_execution_optimizing.py:376(get_expected_shortfall),
    :383(get_ac_expected_shortfall)
  stage: order_execution_optimization
  alternative_considered: VaR alone was rejected for ignoring tail severity; CVaR
    provides more conservative risk estimates.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: get_expected_shortfall), :383(get_ac_expected_shortfall in
    meta/env_execution_optimizing/liquidation/env_execution_optimizing.py'
- id: BD-004
  type: B/BA
  content: Mean-variance utility combining expected cost and variance
  rationale: 'Mean-variance utility penalizes high-variance execution strategies that
    may appear optimal on average but introduce execution uncertainty. This is essential
    for minimizing execution costs in large liquidations where variance risk premium
    matters. Boundary: assumes Gaussian reward distribution; may underweight extreme
    events captured by CVaR.'
  evidence: meta/env_execution_optimizing/liquidation/env_execution_optimizing.py:406-412(compute_AC_utility)
  stage: order_execution_optimization
  alternative_considered: Pure expected cost maximization was rejected for ignoring
    execution variance risk.
- id: BD-005
  type: B/BA
  content: Percentage-based transaction cost model
  rationale: 'Percentage-of-notional cost model aligns with real market conditions
    where fees scale proportionally with trade size, rather than flat fees that distort
    optimal execution strategy. This directly influences agent behavior in optimizing
    execution trajectories. Boundary: constant percentage assumed; real costs vary
    with order size and market conditions.'
  evidence: meta/env_crypto_trading/env_multiple_crypto.py:7(__init__), :59(step)
  stage: trading_execution
  alternative_considered: Flat fee model rejected as unrealistic; tiered fee structures
    deferred for future enhancement.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: __init__), :59(step in meta/env_crypto_trading/env_multiple_crypto.py'
- id: BD-006
  type: B/BA
  content: Ensemble strategy with turbulence-based market regime detection
  rationale: 'Turbulence-based regime detection enables the ensemble to dynamically
    weight component strategies based on current market conditions, preventing style
    clashes during high-volatility periods. Without regime detection, the ensemble
    applies uniform weights across incompatible market states. Boundary: turbulence
    threshold calibrated on historical data; may lag during regime transitions.'
  evidence: agents/stablebaselines3_models.py:320(run_ensemble_strategy)
  stage: agents
  alternative_considered: Static ensemble weights rejected for poor performance during
    market regime changes.
- id: BD-007
  type: B/RC
  content: Dual-clip PPO for handling terminal states
  rationale: 'Dual clipping bounds advantage estimates at both ends, preventing large
    policy updates when episodic returns are extreme (e.g., final liquidation state).
    This stabilizes training for finite-horizon tasks with terminal states. Boundary:
    second clip at -2 standard deviations; tuning required for different episode lengths.'
  evidence: meta/env_execution_optimizing/order_execution_qlib/trade/policy/ppo.py:45(__init__)
  stage: order_execution_optimization
  alternative_considered: Single-clip PPO rejected for causing large policy swings
    at episode boundaries in finite-horizon tasks.
- id: BD-008
  type: B
  content: Teacher-student distillation with KL divergence loss
  rationale: 'Knowledge distillation from a larger teacher network to a compact student
    model enables production deployment where inference latency constraints preclude
    using the full teacher architecture. The KL divergence loss preserves teacher
    guidance on critical decision boundaries. Boundary: 4x compression ratio achieved;
    beyond 10x the student performance degrades significantly.'
  evidence: meta/env_execution_optimizing/order_execution_qlib/trade/policy/ppo_supervision.py:27(__init__)
  stage: order_execution_optimization
  alternative_considered: Direct training of small student model rejected due to 30%
    accuracy loss without teacher guidance.
- id: BD-009
  type: T
  content: Turbulence threshold SELL_ALL invariant - when turbulence exceeds threshold,
    ALL positions must liquidate
  rationale: 'Market turbulence signals regime change where mean-reversion assumptions
    break; forcing full liquidation prevents accumulating losses in trending crash.
    Boundary: Triggers across each equity positions when VIX-equivalent turbulence
    exceeds 1e8 threshold; no partial liquidation allowed.'
  evidence: 'env_stock_trading.py:126-129(else: sell each when turbulence), env_stock_papertrading.py:271-286(sell
    each when turbulence)'
  stage: invariant
  alternative_considered: Gradual liquidation was rejected due to execution uncertainty
    during high-volatility periods
  _evidence_issues:
  - 'NOT_FOUND: env_stock_trading.py'
- id: BD-010
  type: T
  content: DRLEnsembleAgent requires train→validation→trade state continuity via last_state
    passing
  rationale: 'State continuity ensures ensemble models receive consistent observation
    context when transitioning between data splits. Boundary: last_state from training
    must be passed to validation and trading phases; breaking continuity causes policy
    to operate without proper state initialization.'
  evidence: agents/stablebaselines3_models.py:164(drlensembleagent), :201(train_model),
    :264(drl_validation)
  stage: invariant
  alternative_considered: Resetting state each phase was rejected due to losing temporal
    context that affects ensemble coordination
  _evidence_issues:
  - 'INVALID_IDENTIFIER: drlensembleagent), :201(train_model), :264(drl_validation
    in agents/stablebaselines3_models.py'
