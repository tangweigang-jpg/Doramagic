id: finance-bp-116
name: FinRL-Meta
sop_version: '3.6'
source:
  projects:
  - FinRL-Meta
  commit_hash: 15405db81ef46790d430341166700a61ba51b70d
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: financial reinforcement learning market environments and benchmarks
  description: Market environment and benchmark layer of the FinRL ecosystem that
    builds a universe of market environments for data-driven financial reinforcement
    learning, enabling users to easily develop, evaluate, and compare trading agents
    across diverse financial tasks.
  prerequisites: Python 3.6+, reinforcement learning concepts, financial trading basics,
    familiarity with OpenAI Gym interface
  not_suitable_for: High-frequency trading requiring ultra-low latency (<1ms), production-grade
    deployment (see FinRL-X/FinRL-Trading), non-RL based quantitative strategies
stages:
- id: data_collection
  name: Market Data Collection
  order: 1
  responsibility: Fetches raw OHLCV data from 15+ financial data sources including
    Alpaca, Binance, WRDS, CCXT and normalizes disparate column schemas into unified
    'time'/'tic'/'close'/'open'/'high'/'low'/'volume' format. This stage exists to
    abstract away the complexity of connecting to heterogeneous data providers.
  interface:
    inputs: ticker_list (List[str]), start_date, end_date, time_interval
    outputs: self.dataframe (pd.DataFrame) with standardized columns, self.dictnumpy
      (dict of np arrays)
  required_methods:
  - name: DataProcessor.select_dataset
    description: Factory method that selects and instantiates appropriate data source
      processor based on source identifier
    evidence: meta/data_processor.py:28-110
  - name: _Base.download_data
    description: Downloads raw data from specific provider (implemented by each subclass)
    evidence: meta/data_processors/_base.py:63
  - name: _Base.clean_data
    description: Normalizes provider-specific column names to standard 'time'/'tic'/'open'/'high'/'low'/'close'/'volume'
      schema
    evidence: meta/data_processors/_base.py:88-91
  - name: _Base.fillna
    description: Handles missing values after data normalization
    evidence: meta/data_processors/_base.py:63
  key_behaviors:
  - behavior: Lazy import of provider modules
    description: Only loads the requested data provider module at runtime, avoiding
      import-time dependency loading for each 15+ providers
    evidence: meta/data_processor.py:28-110
  - behavior: Column name standardization
    description: Maps provider-specific names (date, datetime, index) to unified 'time'
      column; handles RiceQuant multi-index (tic,time) by resetting to flat DataFrame
    evidence: meta/data_processors/_base.py:88-100
  replaceable_points:
  - name: data_source_processor
    description: Add new financial data provider by subclassing _Base
    options:
    - name: _Base subclass
      traits:
      - Implements download_data, clean_data, fillna
      - Inherits common DataFrame operations
      fit_for:
      - Adding support for new exchange or data vendor
      not_fit_for:
      - Providers requiring fundamentally different DataFrame schema
    - name: DataSource enum extension
      traits:
      - Enum with 15+ source identifiers
      fit_for:
      - Registering new data source with factory
      not_fit_for:
      - Multiple variants of same provider needing separate classes
    default: _Base subclass with DataSource enum extension
  design_decisions:
  - Lazy import pattern avoids loading each provider dependencies at import time;
    only loads requested provider module (meta/data_processor.py:28-110)
  - Standardized column names enforced in clean_data ensures date->time, datetime->time,
    index->time mapping so downstream code never encounters raw provider column names
    (meta/data_processors/_base.py:88-91)
  - Multi-index reset for RiceQuant data normalizes (tic,time) multi-index to flat
    DataFrame for consistent processing (meta/data_processors/_base.py:95-100)
  acceptance_hints:
  - 'DataFrame columns match: time, tic, open, high, low, close, volume'
  - No 'date', 'datetime', or 'index' column names remain
  - Every tickers present in output dataframe
  - Date range matches requested start_date to end_date
- id: technical_indicator_computation
  name: Technical Indicator Computation
  order: 2
  responsibility: Calculates 8+ technical indicators (MACD, Bollinger Bands, RSI,
    CCI, DX) using either stockstats (default) or TA-Lib library. Drops timesteps
    with NaN by default to ensure complete state vectors for RL training.
  interface:
    inputs: self.dataframe with OHLCV columns, tech_indicator_list, select_stockstats_talib
      (IndicatorLib enum)
    outputs: self.dataframe with additional indicator columns appended
  required_methods:
  - name: _Base.add_technical_indicator
    description: Main entry point that selects stockstats or talib implementation
      based on IndicatorLib parameter
    evidence: meta/data_processors/_base.py:187
  - name: _Base._add_technical_indicator_stockstats
    description: Iterates over tickers and applies stockstats indicators per-ticker
    evidence: meta/data_processors/_base.py:224
  - name: _Base._add_technical_indicator_talib
    description: GroupBy ticker, applies talib indicators with forward-fill before
      calculation
    evidence: meta/data_processors/_base.py:253
  key_behaviors:
  - behavior: NaN row dropping for RL compatibility
    description: Drops entire timesteps where any ticker has NaN, ensuring complete
      state vectors for neural network training
    evidence: meta/data_processors/_base.py:217-221
  - behavior: Talib forward-fill requirement
    description: TA-Lib crashes on NaN values, so forward-fill preserves last known
      price context before indicator calculation
    evidence: meta/data_processors/_base.py:264
  replaceable_points:
  - name: indicator_calculation_library
    description: Switch between stockstats (pure Python) and TA-Lib (C extension)
      for indicator calculation
    options:
    - name: stockstats
      traits:
      - Pure Python
      - No external C dependency
      - Default option
      fit_for:
      - Development
      - Environments without paid TA-Lib license
      - Cross-platform compatibility
      not_fit_for:
      - Production requiring maximum performance
      - Indicators only available in TA-Lib
    - name: TA-Lib
      traits:
      - C extension
      - Paid license required
      - More indicator coverage
      fit_for:
      - Production with TA-Lib license
      - Maximum performance
      - Extended indicator library
      not_fit_for:
      - Open-source projects
      - Environments without C compiler
      - Budget-constrained deployments
    default: stockstats (IndicatorLib.STOCKSTATS)
  design_decisions:
  - Talib requires ffill before indicator calculation because TA-Lib crashes on NaN
    values; forward-fill preserves last known price context (meta/data_processors/_base.py:264)
  - Drop timesteps with any NaN across each tickers because RL training requires complete
    state vectors; dropping entire timesteps avoids padding complexity (meta/data_processors/_base.py:217-221)
  - stockstats default due to no external C dependency - TA-Lib requires paid license
    while stockstats is pure Python fallback (meta/data_processors/_base.py:187)
  acceptance_hints:
  - Technical indicator columns present in DataFrame
  - No NaN values in any row (each timesteps with missing data removed)
  - DataFrame sorted by ['time', 'tic']
  - Indicators calculated correctly match expected values for known tickers
- id: factor_computation
  name: Alpha Factor Computation
  order: 3
  responsibility: Computes Chinese-market alpha factors including momentum, emotion/sentiment,
    RSRS (阻力相对强度), and generic technical factors using scipy and statsmodels. Separate
    factor families enable targeted factor research.
  interface:
    inputs: price series (pd.Series), volume series (pd.Series), OHLCV DataFrames
    outputs: factor values (pd.Series/pd.DataFrame) for each factor type
  required_methods:
  - name: MomentumFactors.compute
    description: 'Calculates momentum factors: BIAS, ROC, CCI, bull_power for price
      momentum signals'
    evidence: meta/factors/factors.py:133
  - name: EmotionFactors.compute
    description: 'Calculates volume-based sentiment factors: VSTD, VEMA, VROC, AR
      sentiment indicators'
    evidence: meta/factors/factors.py:243
  - name: generalFactors.compute
    description: 'Calculates generic technical indicators: MACD, KDJ, RSI, WR, BOLL,
      ATR, DMI'
    evidence: meta/factors/factors.py:397
  key_behaviors:
  - behavior: Factor class specialization
    description: Separate factor classes by signal category (Momentum vs Emotion vs
      RSRS vs Generic) enable targeted factor research and modular composition
    evidence: meta/factors/factors.py:133,243,362,397
  - behavior: Statistical factor computation
    description: RSRS (阻力相对强度) requires linear regression from statsmodels for resistance/support
      relative strength calculation
    evidence: meta/factors/factors.py:1-3
  replaceable_points:
  - name: factor_calculation_engine
    description: Statistical library for advanced factor computation
    options:
    - name: scipy/statsmodels
      traits:
      - Linear regression for RSRS
      - Statistical tests
      fit_for:
      - Chinese market factors requiring statistical modeling
      not_fit_for:
      - Simple moving average factors
    default: scipy/statsmodels
  design_decisions:
  - Separate factor classes by signal category (Momentum vs Emotion vs RSRS vs Generic)
    enables targeted factor research (meta/factors/factors.py:133,243,362,397)
  - scipy/statsmodels for statistical factors because RSRS (阻力相对强度) requires linear
    regression from statsmodels (meta/factors/factors.py:1-3)
  acceptance_hints:
  - Factor values computed without errors
  - Factor DataFrame index matches price DataFrame index
  - No infinite or NaN values in factor output (except where mathematically defined)
- id: env_preparation
  name: Gym Environment Preparation
  order: 4
  responsibility: Converts processed DataFrames into OpenAI Gym-compatible environments
    with standardized config dicts. Supports stock trading, portfolio optimization,
    crypto, futures, and market impact modeling with standardized observation and
    action spaces.
  interface:
    inputs: price_array (np.ndarray), tech_array, turbulence_array, initial_amount,
      turbulence_threshold
    outputs: gym.Env with Box observation_space and action_space, config dict for
      agent
  required_methods:
  - name: StockTradingEnv.reset
    description: Resets environment to initial state, optionally with random stock/capital
      variation for training mode
    evidence: meta/env_stock_trading/env_stock_trading.py:78
  - name: StockTradingEnv.step
    description: Executes trading action (sell first, then buy), computes reward with
      gamma accumulation and turbulence sell-each safety
    evidence: meta/env_stock_trading/env_stock_trading.py:109-139
  - name: PortfolioOptimizationEnv._allocate
    description: Softmax-weighted portfolio allocation with multi-feature time windows
    evidence: meta/env_portfolio_optimization/env_portfolio_optimization.py:29
  - name: MarketEnvironment.compute_reward
    description: Almgren-Chriss liquidation reward with permanent/temporary impact
      modeling
    evidence: meta/env_execution_optimizing/liquidation/env_execution_optimizing.py:366-374
  key_behaviors:
  - behavior: SELL before BUY execution order
    description: 'Critical ordering invariant: SELL operations execute before BUY
      within each timestep to prevent cash limit violations and incorrect position
      calculations'
    evidence: meta/env_stock_trading/env_stock_trading.py:109-124
  - behavior: Turbulence-based risk management
    description: When turbulence exceeds threshold (default 99), ALL positions must
      liquidate for risk management safety
    evidence: meta/env_stock_trading/env_stock_trading.py:126-129
  - behavior: Feature normalization with power-of-2 scaling
    description: reward_scaling=2^-11 and tech_array*=2^-7 for bit-shift efficiency
      and neural network gradient stability
    evidence: meta/env_stock_trading/env_stock_trading.py:18,29
  - behavior: Plug-in market impact model
    description: ImpactModel ABC with SqrtImpactModel/ACImpactModel/OWImpactModel/BaselineImpactModel
      implementations
    evidence: meta/env_market_impact/envs/impact_models.py:28-91
  replaceable_points:
  - name: market_impact_model
    description: Market impact model for portfolio optimization with transaction costs
    options:
    - name: SqrtImpactModel
      traits:
      - Square root market impact
      - Standard finance assumption
      fit_for:
      - Equity portfolios
      - Medium-frequency trading
      not_fit_for:
      - Illiquid assets
      - High-frequency scenarios
    - name: ACImpactModel
      traits:
      - Almgren-Chriss model
      - Permanent + temporary impact
      fit_for:
      - Execution optimization
      - Liquidation scenarios
      not_fit_for:
      - Portfolio rebalancing without liquidation
    - name: OWImpactModel
      traits:
      - Obizhaeva-Wang model
      fit_for:
      - Order flow modeling
      not_fit_for:
      - Simple backtesting
    - name: BaselineImpactModel
      traits:
      - No market impact
      - Baseline comparison
      fit_for:
      - Testing without impact
      - Benchmark comparison
      not_fit_for:
      - Realistic trading simulation
    default: SqrtImpactModel
  - name: environment_type
    description: Gym environment for different financial instruments
    options:
    - name: StockTradingEnv
      traits:
      - Discrete stock trading
      - Turbulence-aware
      fit_for:
      - Stock portfolio trading
      not_fit_for:
      - Crypto
      - Futures
    - name: CryptoEnv
      traits:
      - Multi-crypto support
      - Normalized actions
      fit_for:
      - Cryptocurrency trading
      not_fit_for:
      - Stock trading
    - name: PortfolioOptimizationEnv
      traits:
      - Continuous allocation
      - Softmax weights
      fit_for:
      - Portfolio rebalancing
      not_fit_for:
      - Single-asset trading
    - name: MarketEnvironment
      traits:
      - Almgren-Chriss
      - Liquidation focus
      fit_for:
      - Execution optimization
      - VWAP/TWAP comparison
      not_fit_for:
      - Long-term portfolio management
    default: StockTradingEnv
  design_decisions:
  - sigmoid_sign normalization for turbulence thresholding smoothly maps turbulence
    values to bounded range avoiding hard threshold artifacts in state (meta/env_stock_trading/env_stock_trading.py:159-164)
  - 'turbulence sell-each behavior: market dislocation detected by turbulence > threshold
    triggers full liquidation to avoid losses (meta/env_stock_trading/env_stock_trading.py:126-129)'
  - 'gamma_reward accumulation for terminal reward: discounted cumulative reward reduces
    variance vs single terminal value (meta/env_stock_trading/env_stock_trading.py:136-139)'
  - reward_scaling = 2**-11 default prevents large absolute rewards from destabilizing
    neural network training gradients (meta/env_stock_trading/env_stock_trading.py:18)
  - tech_array * 2**-7 normalization brings technical indicators to ~[-2,2] range
    comparable to price/stock features (meta/env_stock_trading/env_stock_trading.py:29)
  - Plug-in ImpactModel abstraction enables SqrtImpactModel, ACImpactModel, OWImpactModel,
    BaselineImpactModel substitution (meta/env_market_impact/envs/env_portfolio_optimization_impact.py:89-91)
  acceptance_hints:
  - Environment inherits from gym.Env
  - reset() returns (observation, info) tuple
  - step() returns (observation, reward, terminated, truncated, info)
  - observation_space is Box with correct dimensions
  - Turbulence threshold sell-each triggers when turbulence > threshold
  - SELL executes before BUY in step()
- id: dr_model_training
  name: Deep Reinforcement Learning Model Training
  order: 5
  responsibility: Wraps Stable-Baselines3, ElegantRL, and RLlib for DRL agent training.
    Provides unified get_model/train_model/DRL_prediction interface across libraries,
    with ensemble support and train/validation/test rolling windows to prevent look-ahead
    bias.
  interface:
    inputs: gym.Env, model_name (A2C/PPO/DDPG/SAC/TD3), model_kwargs, train_kwargs
    outputs: trained model saved to TRAINED_MODEL_DIR, DRL_prediction returns portfolio
      values
  required_methods:
  - name: DRLAgent.get_model
    description: Instantiates DRL model with specified algorithm, environment dimensions,
      and hyperparameters
    evidence: agents/stablebaselines3_models.py:48
  - name: DRLAgent.train_model
    description: Trains model with TensorboardCallback for per-episode reward tracking
    evidence: agents/stablebaselines3_models.py:48
  - name: DRLAgent.DRL_prediction
    description: Runs trained model on environment to generate portfolio values
    evidence: agents/stablebaselines3_models.py:48
  - name: DRLEnsembleAgent.train_ensemble
    description: Trains ensemble of A2C/PPO/DDPG with train/validation/test rolling
      windows, preventing look-ahead bias
    evidence: agents/stablebaselines3_models.py:320-360
  key_behaviors:
  - behavior: TensorboardCallback reward tracking
    description: Hardcoded to self.logger.record(reward) after each episode for TensorBoard
      monitoring without custom callback boilerplate
    evidence: agents/stablebaselines3_models.py:40-45
  - behavior: Train/validation/test rolling windows
    description: Ensemble agent trains on historical data, validates on recent data,
      tests on held-out period to prevent look-ahead bias
    evidence: agents/stablebaselines3_models.py:320-360
  - behavior: State continuity via last_state passing
    description: DRLEnsembleAgent requires train→validation→trade state continuity
      via last_state passing between windows
    evidence: agents/stablebaselines3_models.py:329-331
  - behavior: Action noise for exploration
    description: action_noise sigma=0.1 for continuous control provides sufficient
      exploration without destabilizing
    evidence: agents/stablebaselines3_models.py:88
  replaceable_points:
  - name: drl_library
    description: Deep reinforcement learning library for agent training
    options:
    - name: stablebaselines3
      traits:
      - PyTorch-based
      - A2C/PPO/DDPG/SAC/TD3
      - TensorBoard support
      - Default option
      fit_for:
      - General stock trading
      - Most use cases
      - Easy debugging
      not_fit_for:
      - Very large-scale training
      - Multi-GPU training
    - name: elegantrl
      traits:
      - Lightweight
      - ElegantRL agents
      - Multi-GPU support
      fit_for:
      - Custom agents
      - GPU-intensive training
      - Futures trading
      not_fit_for:
      - Quick prototyping
      - Production deployment
    - name: rllib
      traits:
      - Ray-based
      - Distributed training
      - Scalable
      fit_for:
      - Large-scale training
      - Production systems
      - Multi-agent
      not_fit_for:
      - Simple experiments
      - Local development
    default: stablebaselines3
  design_decisions:
  - TensorboardCallback hardcoded to self.logger.record(reward) allows per-episode
    reward tracking in TensorBoard without custom callback boilerplate (agents/stablebaselines3_models.py:40-45)
  - DRLEnsembleAgent with train/val/test rolling windows prevents look-ahead bias
    by training on historical, validating on recent, testing on held-out period (agents/stablebaselines3_models.py:320-360)
  - 'action_noise sigma=0.1 for continuous control: 10% of action range as std dev
    provides sufficient exploration without destabilizing (agents/stablebaselines3_models.py:88)'
  - Validation Sharpe ratio with 4**0.5 annualization simplifies daily return annualization
    (agents/stablebaselines3_models.py:218-222)
  acceptance_hints:
  - Model checkpoint saved to TRAINED_MODEL_DIR
  - DRL_prediction returns portfolio values array
  - Training logs show episode rewards
  - Ensemble produces multiple model checkpoints
  - Validation Sharpe ratio computed during training
- id: order_execution_optimization
  name: High-Frequency Order Execution
  order: 6
  responsibility: Qlib-based high-frequency execution system with RL agents (PPO,
    OPD) and rule-based baselines (TWAP, VWAP, AC). Teacher-student distillation for
    PPO supervision enables knowledge transfer from expert policies.
  interface:
    inputs: order files, high-frequency market data from Qlib, policy_conf, network_conf
    outputs: trained policy checkpoint, backtest performance metrics
  required_methods:
  - name: Executor.train
    description: Orchestrates train loop with Collector, Buffer, policy, optimizer
      for high-frequency execution training
    evidence: meta/env_execution_optimizing/order_execution_qlib/trade/executor.py:197
  - name: Collector.collect
    description: Collects episodes from vectorized environments with optional noise
      for exploration
    evidence: meta/env_execution_optimizing/order_execution_qlib/trade/collector.py:26
  - name: PPO.update
    description: PPO policy with GAE computation and teacher supervision for knowledge
      distillation
    evidence: meta/env_execution_optimizing/order_execution_qlib/trade/policy/ppo.py:42
  - name: PPO_sup.update
    description: PPO with log-likelihood supervision loss from teacher policy for
      distillation
    evidence: meta/env_execution_optimizing/order_execution_qlib/trade/policy/ppo_supervision.py:24
  key_behaviors:
  - behavior: Teacher-student distillation
    description: Teacher policy provides expert demonstrations to accelerate student
      policy convergence via supervision loss
    evidence: meta/env_execution_optimizing/order_execution_qlib/trade/policy/ppo.py:45
  - behavior: Multi-layer architecture
    description: Executor orchestrates policy/network/sampler/logger/reward/action
      hierarchy with BasePolicy and Batch interfaces
    evidence: meta/env_execution_optimizing/order_execution_qlib/trade/executor.py:197
  - behavior: Vectorized environment training
    description: SubprocVectorEnv and ShmemVectorEnv for parallel episode collection
      with shared memory reducing IPC overhead
    evidence: meta/env_execution_optimizing/order_execution_qlib/trade/vecenv.py:677,716
  replaceable_points:
  - name: execution_policy
    description: Policy for high-frequency order execution
    options:
    - name: PPO
      traits:
      - On-policy
      - GAE
      - Teacher supervision available
      fit_for:
      - General execution optimization
      not_fit_for:
      - Very high-frequency requiring off-policy
    - name: OPD
      traits:
      - On-Policy Distributional
      - Specialized for execution
      fit_for:
      - Distribution-sensitive execution
      not_fit_for:
      - Simple baseline comparison
    default: PPO
  design_decisions:
  - Tianshou-based policy implementation provides high-performance Python RL with
    replay buffer, GAE, on-policy updates (meta/env_execution_optimizing/order_execution_qlib/trade/policy/ppo.py:1)
  - 'Teacher-student distillation for PPO supervision: Teacher policy provides expert
    demonstrations to accelerate student policy convergence (meta/env_execution_optimizing/order_execution_qlib/trade/policy/ppo.py:45)'
  - HighfreqWorkflow for qlib data pipeline handles calendar caching, feature normalization,
    dataset serialization (meta/env_execution_optimizing/order_execution_qlib/highfreq/workflow.py:34)
  acceptance_hints:
  - Policy checkpoint saved after training
  - Backtest metrics (VWAP slippage, implementation shortfall) improve vs baseline
  - Teacher supervision loss decreases over training
  - Vectorized environments achieve high throughput
- id: trading_execution
  name: Live/Paper Trading Execution
  order: 7
  responsibility: Connects trained models to live broker APIs (Alpaca) for paper trading
    and live execution. Multi-threaded trading loop with latency testing and state
    tracking enables real-world deployment of trained RL agents.
  interface:
    inputs: trained model, API credentials, ticker_list, net_dim, state_dim, action_dim
    outputs: live order execution via Alpaca API, state tracking, profit/loss reporting
  required_methods:
  - name: AlpacaPaperTrading.run
    description: Multi-threaded trading loop with awaitMarketOpen for non-blocking
      market wait and latency testing
    evidence: meta/env_stock_trading/env_stock_papertrading.py:146-197
  - name: AlpacaPaperTrading.test_latency
    description: Measures API round-trip latency to detect network issues before live
      trading
    evidence: meta/env_stock_trading/env_stock_papertrading.py:134-144
  - name: AlpacaPaperTrading.get_action
    description: Converts model output to trading action using sigmoid_sign preprocessing
      matching training distribution
    evidence: meta/env_stock_trading/env_stock_papertrading.py:369-379
  key_behaviors:
  - behavior: Threading-based trading loop
    description: Non-blocking market wait with awaitMarketOpen allows CPU utilization
      during overnight gaps and market closures
    evidence: meta/env_stock_trading/env_stock_papertrading.py:146-197
  - behavior: Pre-trading latency testing
    description: Measures API round-trip latency before live trading to detect network
      issues and prevent bad order submissions
    evidence: meta/env_stock_trading/env_stock_papertrading.py:134-144
  - behavior: sigmoid_sign action processing
    description: Maps continuous [-1,1] actions from model to bounded trading decisions
      matching training distribution
    evidence: meta/env_stock_trading/env_stock_papertrading.py:369-379
  replaceable_points:
  - name: broker_api
    description: Broker API for paper/live trading execution
    options:
    - name: Alpaca
      traits:
      - US equities
      - Crypto support
      - Free paper trading
      fit_for:
      - US stock trading
      - Multi-crypto
      not_fit_for:
      - Non-US markets
      - Futures
    default: Alpaca
  design_decisions:
  - Threading-based trading loop with awaitMarketOpen provides non-blocking market
    wait allowing CPU utilization during overnight gaps (meta/env_stock_trading/env_stock_papertrading.py:146-197)
  - latency testing before live trading measures API round-trip latency to detect
    network issues before trading (meta/env_stock_trading/env_stock_papertrading.py:134-144)
  - sigmoid_sign action processing in paper trading maps continuous [-1,1] actions
    to bounded trading decisions matching training distribution (meta/env_stock_trading/env_stock_papertrading.py:369-379)
  acceptance_hints:
  - Orders submitted successfully to Alpaca API
  - P/L tracking updates after each trade
  - Latency test passes before trading starts
  - State maintained correctly across trading days
- id: futures_trading
  name: Futures Trading with Wt4ElegantRL
  order: 8
  responsibility: Integrates WtQuant framework (C++ backtest engine) with ElegantRL
    for futures trading. Multi-process training with PipeLearner/PipeEvaluator architecture
    enables GPU parallelization for high-performance futures agent training.
  interface:
    inputs: WtEnv with WtBtEngine, AgentPPO/AgentSAC, config dict with time_range,
      features
    outputs: trained agent checkpoint, backtest analyst results with Sharpe/max drawdown
  required_methods:
  - name: WtEnv.step
    description: Gym-compatible wrapper around WtBtEngine C++ backtester for futures
      trading
    evidence: meta/env_future_trading/wt4elegantrl/envs.py:19
  - name: AgentPPO.update
    description: PPO agent with GAE, clip objective, entropy bonus for futures trading
    evidence: meta/env_future_trading/wt4elegantrl/elegantrl/agent.py:1016
  - name: PipeLearner.run
    description: Multi-GPU training with gradient averaging across learners in separate
      processes
    evidence: meta/env_future_trading/wt4elegantrl/elegantrl/run.py:447
  - name: ContractMgr.get_contract
    description: Loads contract info from JSON for futures instrument metadata
