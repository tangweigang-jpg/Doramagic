id: finance-bp-116
name: FinRL-Meta
sop_version: '3.6'
source:
  projects:
  - FinRL-Meta
  commit_hash: 15405db81ef46790d430341166700a61ba51b70d
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Market environment and benchmark layer for data-driven financial reinforcement
    learning
  description: Market environment and benchmark layer for data-driven financial reinforcement
    learning. Builds a universe of market environments for trading agents across diverse
    financial tasks including stock trading, crypto trading, portfolio optimization,
    order execution, and FX trading.
  prerequisites: Python programming, basic understanding of reinforcement learning
    concepts (agents, environments, policies), financial trading fundamentals (OHLCV
    data, orders, positions)
  not_suitable_for: Real-time production trading without modification, low-latency
    high-frequency trading, non-reinforcement learning trading strategies
stages:
- id: data_collection
  name: Data Collection
  order: 1
  responsibility: Fetches market data from multiple external providers (exchanges,
    APIs). Provides uniform interface for diverse data sources with timezone handling
    and standardization.
  interface:
    inputs:
    - ticker_list
    - start_date
    - end_date
    - time_interval
    outputs:
    - pd.DataFrame with standardized columns (time, tic, open, high, low, close, volume)
  required_methods:
  - name: DataProcessor.fetch_data
    description: Main entry point for fetching data from any configured data source,
      orchestrating download/clean/transform pipeline
    evidence: meta/data_processor.py:13(DataProcessor)
  - name: _Base.download_data
    description: Provider-specific data download logic overridden by each data source
      implementation (Alpaca, Binance, etc.)
    evidence: meta/data_processors/_base.py:63(_Base.__init__)
  - name: _Base.clean_data
    description: Standardizes column names (date→time, datetime→time) and enforces
      required schema across each data sources
    evidence: meta/data_processors/_base.py:88(clean_data)
  - name: _Base.calc_time_zone
    description: Auto-detects timezone for ticker sets by mapping to exchanges (HSI→Shanghai,
      DOW→USEastern)
    evidence: meta/data_processors/_base.py:661(calc_time_zone)
  key_behaviors:
  - behavior: Provider extensibility via inheritance
    description: Each provider (Alpaca, Binance, akshare, etc.) extends _Base to reuse
      common clean/transform logic while overriding download_data with provider-specific
      logic
    evidence: meta/data_processors/_base.py:63(_Base.__init__)
  - behavior: Column standardization enforcement
    description: 'Every data sources must produce columns: time, tic, open, high,
      low, close, adjusted_close, volume. Renames inconsistent column names to match
      expected schema.'
    evidence: meta/data_processors/_base.py:111-122(column enforcement)
  - behavior: Timezone auto-detection
    description: Maps ticker sets to exchanges for correct market hours. Defaults
      to US/Eastern for unknown ticker sets, which may cause data misalignment.
    evidence: meta/data_processors/_base.py:683(TIME_ZONE_USEASTERN)
  replaceable_points:
  - name: data_source
    description: Data provider plug-in for fetching market data
    options:
    - name: yahoofinance
      traits:
      - Free
      - no API keys required
      - delayed data
      fit_for:
      - Quick prototyping
      - historical backtesting
      - educational use
      not_fit_for:
      - Real-time trading
      - high-frequency data
      - non-US markets with limited coverage
    - name: alpaca
      traits:
      - Real-time capable
      - paper trading support
      - US equities focus
      fit_for:
      - Live paper trading
      - US stock trading
      not_fit_for:
      - Crypto trading
      - international markets
    - name: binance
      traits:
      - Crypto focus
      - high-frequency capable
      - wide coin coverage
      fit_for:
      - Cryptocurrency trading
      - 24/7 markets
      not_fit_for:
      - Stock trading
      - regulated markets
    - name: akshare
      traits:
      - China market focus
      - free data source
      fit_for:
      - Chinese A-shares
      - HSI components
      not_fit_for:
      - US markets
      - non-Chinese assets
    - name: tushare
      traits:
      - China market comprehensive
      - requires token
      fit_for:
      - Chinese markets research
      - detailed fundamentals
      not_fit_for:
      - Non-Chinese markets
      - quick setup
    default: yahoofinance
  design_decisions:
  - Strategy pattern for data sources via _Base inheritance - Each provider (Alpaca,
    Binance, etc.) extends _Base to reuse common clean/transform logic while overriding
    download_data provider-specific logic (meta/data_processors/_base.py:63(_Base.__init__))
  - Standardized column names enforced in clean_data - Renames date→time, datetime→time
    across each sources to fix inconsistent schemas upstream (meta/data_processors/_base.py:88(clean_data))
  - IndicatorLib IntEnum preserves backwards compatibility - Allows integer 0/1 in
    addition to STOCKSTATS/TALIB enum values for legacy code (meta/data_processors/_base.py:51(IndicatorLib))
  - Timezone auto-detection via calc_time_zone - Maps ticker sets to exchanges (HSI→Shanghai,
    DOW→USEastern) for correct market hours (meta/data_processors/_base.py:661(calc_time_zone))
  acceptance_hints:
  - 'Fetched DataFrame contains each required columns: time, tic, open, high, low,
    close, volume'
  - Time column is properly formatted as datetime with correct timezone
  - No missing values in critical columns after cleaning
  - Multiple data sources produce compatible DataFrames with identical column structure
- id: feature_engineering
  name: Feature Engineering
  order: 2
  responsibility: Computes technical indicators (MACD, RSI, Bollinger, CCI, DX) using
    stockstats or talib libraries. Adds turbulence/vix for risk-aware state representation.
  interface:
    inputs:
    - raw price DataFrame
    - tech_indicator_list
    - select_stockstats_talib
    outputs:
    - 'numpy arrays: price_array, tech_array, turbulence_array'
  required_methods:
  - name: _Base.add_technical_indicator
    description: Adds technical indicators to dataframe using stockstats or talib
      based on configuration
    evidence: meta/data_processors/_base.py:184(add_technical_indicator)
  - name: _Base.add_turbulence
    description: Adds turbulence index from precalculated dataframe for risk-aware
      trading conditions
    evidence: meta/data_processors/_base.py:311(add_turbulence)
  - name: _Base.df_to_array
    description: Converts DataFrame to numpy arrays for environment consumption
    evidence: meta/data_processors/_base.py:468(df_to_array)
  key_behaviors:
  - behavior: Dual-indicator-library support
    description: Both stockstats and talib compute same indicators using identical
      configuration. Talib is faster but stockstats is default for broader compatibility.
    evidence: meta/data_processors/_base.py:184(add_technical_indicator)
  - behavior: Binary turbulence encoding
    description: Converts continuous turbulence to binary flag using 99th percentile
      threshold. Forces sell-each when market unstable.
    evidence: meta/env_stock_trading/env_stock_trading.py:30(turbulence_bool)
  - behavior: Reward scaling for gradient stability
    description: Reward scaling 2^-11 normalizes rewards to approximately [-1,1] range
      to prevent gradient explosion in policy networks. This is empirically chosen.
    evidence: meta/env_stock_trading/env_stock_trading.py:18(reward_scaling)
  replaceable_points:
  - name: indicator_library
    description: Technical indicator computation backend
    options:
    - name: STOCKSTATS
      traits:
      - Pure Python
      - default
      - broader compatibility
      fit_for:
      - Standard use
      - cross-platform deployment
      - educational settings
      not_fit_for:
      - High-performance batch processing
      - production pipelines
    - name: TALIB
      traits:
      - C library backend
      - faster
      - industry standard
      fit_for:
      - Performance-critical applications
      - production systems
      not_fit_for:
      - Systems without TA-Lib installation
      - quick prototyping
    default: STOCKSTATS
  design_decisions:
  - Dual-indicator-library support (stockstats default) - Talib is faster but stockstats
    is default for broader compatibility. Both use same config (meta/data_processors/_base.py:184(add_technical_indicator))
  - Turbulence boolean encoding for trading condition - Converts continuous turbulence
    to binary flag (threshold=99) to force sell-each when market unstable (meta/env_stock_trading/env_stock_trading.py:30(turbulence_bool))
  - Reward scaling 2^-11 to prevent gradient explosion - Normalizes rewards to ~[-1,1]
    range, chosen empirically in FinRL original (meta/env_stock_trading/env_stock_trading.py:18(reward_scaling))
  acceptance_hints:
  - Technical indicators exist as columns in DataFrame after add_technical_indicator
    completes
  - Turbulence array is computed as 90th percentile of insample data
  - Output arrays (price_array, tech_array, turbulence_array) are properly shaped
    for environment consumption
  - Indicator values are within expected ranges and contain no NaN values
- id: environment_simulation
  name: Environment Simulation
  order: 3
  responsibility: Implements OpenAI Gym interface for financial trading. Defines state
    space, action space, step dynamics, and reward computation across multiple trading
    paradigms.
  interface:
    inputs:
    - numpy arrays (price, tech, turbulence)
    - actions from agent
    outputs:
    - state, reward, done, info tuple
  required_methods:
  - name: StockTradingEnv.reset
    description: Initializes environment state with initial portfolio values and returns
      initial observation
    evidence: meta/env_stock_trading/env_stock_trading.py:6(StockTradingEnv)
  - name: StockTradingEnv.step
    description: 'Executes one trading step: processes SELL before BUY actions, computes
      rewards, returns next state'
    evidence: meta/env_stock_trading/env_stock_trading.py:109-124(step)
  - name: StockTradingEnv.get_state
    description: Returns normalized state with power-of-2 scaling to keep values in
      [-1,1] range for neural network stability
    evidence: meta/env_stock_trading/env_stock_trading.py:145(get_state)
  key_behaviors:
  - behavior: Box action space normalization [-1,1]
    description: Normalized action space across each stock environments enables same
      policy architecture across different stock counts. Action is scaled by max_stock
      internally.
    evidence: meta/env_stock_trading/env_stock_trading.py:75(action_space)
  - behavior: Sell-before-buy ordering contract
    description: Step processes SELL before BUY - sells executed first in action loop.
      This ordering affects available cash for buying and is critical for each trading
      strategies.
    evidence: meta/env_stock_trading/env_stock_trading.py:109-124(sell_index loop
      then buy_index loop)
  - behavior: Gamma reward accumulation
    description: Decays future rewards (γ=0.99) to balance immediate vs delayed returns
      in episode terminal reward calculation.
    evidence: meta/env_stock_trading/env_stock_trading.py:136(gamma_reward)
  - behavior: Cool-down period after trades
    description: 'Tracks steps since last trade per stock. Must wait cooldown before
      re-trading same asset. Note: buy side has no cooldown restriction.'
    evidence: meta/env_stock_trading/env_stock_trading.py:105(stocks_cool_down)
  - behavior: Turbulence sell-each trigger
    description: High volatility (>99th percentile) forces full liquidation to avoid
      extended drawdown.
    evidence: meta/env_stock_trading/env_stock_trading.py:126(sell_all_turbulence)
  - behavior: State space normalization via power-of-2 scaling
    description: Cash * 2^-12, price * 2^-6 to keep state values in [-1,1] range for
      neural network stability.
    evidence: meta/env_stock_trading/env_stock_trading.py:145(get_state)
  replaceable_points:
  - name: reward_function
    description: Reward computation strategy
    options:
    - name: portfolio_return
      traits:
      - Standard
      - default
      - portfolio value change
      fit_for:
      - General trading
      - balanced portfolios
      not_fit_for:
      - Risk-adjusted optimization
      - volatility-sensitive strategies
    - name: log_return
      traits:
      - Normalized returns
      - multiplicative
      fit_for:
      - Long-term optimization
      - percentage-based goals
      not_fit_for:
      - Short-horizon decisions
      - large position changes
    - name: sharpe_ratio
      traits:
      - Risk-adjusted
      - volatility-aware
      fit_for:
      - Risk-sensitive strategies
      - balanced portfolios
      not_fit_for:
      - High-frequency trading
      - short episodes
    default: portfolio_return
  - name: cost_model
    description: Commission fee model for portfolio optimization
    options:
    - name: trf
      traits:
      - Default
      - assumes 0% fee
      fit_for:
      - Backtesting without fees
      - theoretical analysis
      not_fit_for:
      - Real broker fees
      - realistic P&L
    - name: wvm
      traits:
      - Realistic fees
      - percentage-based
      fit_for:
      - Realistic simulation
      - broker cost estimation
      not_fit_for:
      - Fee-free backtesting
    - name: none
      traits:
      - No fees
      - simplified
      fit_for:
      - Ideal scenario analysis
      - comparative studies
      not_fit_for:
      - Practical trading simulation
    default: trf
  design_decisions:
  - Box action space [-1,1] normalized across each stock envs - Enables same policy
    architecture across different stock counts. Action scaled by max_stock internally
    (meta/env_stock_trading/env_stock_trading.py:75(action_space))
  - Gamma reward accumulation for episode terminal reward - Decays future rewards
    (γ=0.99) to balance immediate vs delayed returns (meta/env_stock_trading/env_stock_trading.py:136(gamma_reward))
  - Cool-down period after trades prevents wash trading - Tracks steps since last
    trade per stock. Must wait cooldown before re-trading same asset (meta/env_stock_trading/env_stock_trading.py:105(stocks_cool_down))
  - Turbulence sell-each triggers full liquidation - High volatility (>99th percentile)
    forces exit to avoid extended drawdown (meta/env_stock_trading/env_stock_trading.py:126(sell_all_turbulence))
  - State space normalization via power-of-2 scaling - Cash * 2^-12, price * 2^-6
    to keep state values in [-1,1] range for neural network stability (meta/env_stock_trading/env_stock_trading.py:145(get_state))
  acceptance_hints:
  - Environment inherits from gym.Env and implements reset/step/get_state interface
  - State values are normalized to approximately [-1, 1] via power-of-2 scaling
  - Turbulence column exists in input data; DRLEnsembleAgent calculates threshold
    as 90th percentile of insample data
  - Every trading environments expect turbulence column in data
  - Step processes SELL before BUY actions in correct order
- id: agent_training
  name: Agent Training
  order: 4
  responsibility: Wraps DRL libraries (Stable Baselines3, ElegantRL) with standardized
    train/predict interface. Supports ensemble strategies combining multiple algorithms.
  interface:
    inputs:
    - gym environment
    - model_kwargs
    - total_timesteps
    outputs:
    - trained model
    - prediction arrays
  required_methods:
  - name: DRLAgent.get_model
    description: Instantiates DRL model with configuration from config module, keyed
      by uppercase model name (A2C_PARAMS, PPO_PARAMS)
    evidence: agents/stablebaselines3_models.py:24(MODEL_KWARGS)
  - name: DRLAgent.train_model
    description: Trains model on environment with optional TensorBoard callbacks for
      monitoring
    evidence: agents/stablebaselines3_models.py:48(DRLAgent)
  - name: DRLAgent.DRL_prediction
    description: Runs trained model to generate prediction arrays on test data
    evidence: agents/stablebaselines3_models.py:48(DRLAgent)
  - name: DRLEnsembleAgent.run_ensemble_strategy
    description: Runs ensemble of PPO, A2C, DDPG with rolling validation windows,
      selecting best model by Sharpe ratio
    evidence: agents/stablebaselines3_models.py:320(run_ensemble_strategy)
  key_behaviors:
  - behavior: Default hyperparameters from config module
    description: Single source of truth in config.py. MODEL_KWARGS built dynamically
      from uppercase config attributes. Fragile coupling - renaming parameters breaks
      model initialization silently.
    evidence: 'agents/stablebaselines3_models.py:24(MODEL_KWARGS = {x: config.__dict__[f"{x.upper()}_PARAMS"]})'
  - behavior: Ensemble uses rolling train/val/test windows
    description: Rebalance window defines validation period length. Sharpe ratio on
      validation selects best model.
    evidence: agents/stablebaselines3_models.py:320(run_ensemble_strategy)
  - behavior: DDPG/TD3 use Ornstein-Uhlenbeck action noise
    description: 'OU process has temporal correlation matching continuous trading
      actions. Parameters hardcoded: theta=0.15, sigma=0.3.'
    evidence: agents/stablebaselines3_models.py:26(NOISE)
  - behavior: Turbulence threshold override anomaly
    description: Lines 398-408 compute dynamic threshold but lines 411-413 unconditionally
      override it to 99th percentile - this logic is dead code.
    evidence: agents/stablebaselines3_models.py:411-413(turbulence_threshold override)
  replaceable_points:
  - name: algorithm
    description: DRL algorithm selection
    options:
    - name: ppo
      traits:
      - On-policy
      - default
      - stable
      - versatile
      fit_for:
      - General use
      - stock trading
      - balanced performance
      not_fit_for:
      - Very high-frequency
      - sample-efficient critical
    - name: a2c
      traits:
      - On-policy
      - synchronous
      - memory efficient
      fit_for:
      - Memory-constrained environments
      - simple strategies
      not_fit_for:
      - Complex multi-agent
      - very long episodes
    - name: ddpg
      traits:
      - Off-policy
      - continuous actions
      - actor-critic
      fit_for:
      - Continuous control
      - stock trading with fine-grained actions
      not_fit_for:
      - Discrete action spaces
      - exploration-critical tasks
    - name: sac
      traits:
      - Off-policy
      - max entropy
      - automatic exploration
      fit_for:
      - Continuous actions
      - exploration balance
      not_fit_for:
      - Discrete actions
      - low sample budget
    - name: td3
      traits:
      - Off-policy
      - twin delayed
      - reduces overestimation
      fit_for:
      - Continuous control
      - stable training
      not_fit_for:
      - Discrete actions
      - simple tasks
    default: ppo
  - name: framework
    description: DRL library backend
    options:
    - name: stable_baselines3
      traits:
      - Default
      - well-maintained
      - PyTorch-based
      fit_for:
      - General use
      - production
      - standard algorithms
      not_fit_for:
      - Custom algorithms
      - research extensions
    - name: elegantrl
      traits:
      - Lightweight
      - customizable
      - ElegantRL-based
      fit_for:
      - Research
      - custom environments
      - fine-grained control
      not_fit_for:
      - Quick prototyping
      - non-ElegantRL users
    default: stable_baselines3
  design_decisions:
  - Default hyperparameters extracted from config module - Single source of truth
    in config.py. Model params keyed by uppercase model name (A2C_PARAMS, PPO_PARAMS)
    (agents/stablebaselines3_models.py:24(MODEL_KWARGS))
  - Ensemble uses rolling train/val/test windows - Rebalance window defines validation
    period length. Sharpe ratio on validation selects best model (agents/stablebaselines3_models.py:320(run_ensemble_strategy))
  - DDPG/TD3 use Ornstein-Uhlenbeck action noise - OU process has temporal correlation
    matching continuous trading actions (agents/stablebaselines3_models.py:26(NOISE))
  - ElegantRL hardcodes state_dim=39, action_dim=3 for futures - Future trading environment
    has fixed 39 features and 3 actions (long/short/hold) (agents/elegantrl_models_wt.py:60-61)
  acceptance_hints:
  - Every DRLAgent implementations provide get_model/train_model/DRL_prediction interface
  - MODEL_KWARGS successfully builds from config module uppercase attributes
  - Ensemble strategy selects best model by Sharpe ratio on validation window
  - TensorBoard callback logs per-episode reward during training
- id: order_execution
  name: Order Execution & Execution Optimization
  order: 5
  responsibility: Implements high-frequency order execution with market impact modeling.
    Supports TWAP, VWAP, AC (Almgren-Chriss), and RL-based execution strategies.
  interface:
    inputs:
    - order lists
    - price/volume features
    - execution horizon
    outputs:
    - executed orders with fill prices
    - implementation shortfall
  required_methods:
  - name: TWAP.execute
    description: Time-Weighted Average Price execution - splits orders evenly over
      time horizon
    evidence: meta/env_execution_optimizing/order_execution_qlib/trade/agent/basic.py:8(TWAP)
  - name: VWAP.execute
    description: Volume-Weighted Average Price execution - matches volume profile
      over time
    evidence: meta/env_execution_optimizing/order_execution_qlib/trade/agent/basic.py:28(VWAP)
  - name: AC.compute_AC_utility
    description: Almgren-Chriss optimal execution - balances expected shortfall vs
      variance based on risk aversion parameter
    evidence: meta/env_execution_optimizing/liquidation/env_execution_optimizing.py:406(compute_AC_utility)
  - name: MarketEnvironment.start_transactions
    description: Required state machine initialization before step() - uninitialized
      state variables would cause errors
    evidence: meta/env_execution_optimizing/liquidation/env_execution_optimizing.py:133-160(start_transactions)
  key_behaviors:
  - behavior: Market impact modeled as permanent + temporary components
    description: 'Almgren-Chriss model: permanent impact (γ * shares) persists, temporary
      impact (ε + η/τ * shares) affects only execution price.'
    evidence: meta/env_execution_optimizing/liquidation/env_execution_optimizing.py:366(permanentImpact)
  - behavior: AC utility balances expected shortfall vs variance
    description: E + λ*V tradeoff where λ (risk aversion) determines urgency. λ=1e-6
      conservative, λ=1e-4 aggressive.
    evidence: meta/env_execution_optimizing/liquidation/env_execution_optimizing.py:406(compute_AC_utility)
  - behavior: Instant vs EndEpisode reward strategy pattern
    description: Enables per-timestep (FFR/VVR) vs terminal-only reward signals for
      different training regimes.
    evidence: meta/env_execution_optimizing/order_execution_qlib/trade/reward/base.py:18(isinstant)
  - behavior: BaseExecutor uses factory pattern via getattr()
    description: 'Dynamically instantiates policies, networks, and agents from string
      names. New policies must follow naming convention: PolicyName, PolicyName_Actor,
      PolicyName_Critic. Typos cause silent failures.'
    evidence: meta/env_execution_optimizing/order_execution_qlib/trade/executor.py:98-142(dynamic
      instantiation)
  - behavior: PPO policy supports Teacher supervision
    description: Knowledge distillation baked into architecture via sup_coef parameter.
      Teacher model must have exact architecture match; device placement requires
      manual synchronization.
    evidence: meta/env_execution_optimizing/order_execution_qlib/trade/policy/ppo.py:60,270(sup_coef)
  - behavior: Impact models require end_day() call
    description: After each trading day, end_day() must be called to apply permanent
      impact decay. Skipping causes unrealistic accumulation.
    evidence: meta/env_market_impact/envs/impact_models.py:88-115(end_day method)
  replaceable_points:
  - name: execution_policy
    description: Order execution algorithm
    options:
    - name: AC
      traits:
      - Default
      - optimal control
      - Almgren-Chriss model
      fit_for:
      - Large orders
      - risk-sensitive execution
      - baseline comparison
      not_fit_for:
      - Very small orders
      - highly volatile markets
    - name: TWAP
      traits:
      - Simple
      - time-based
      - deterministic
      fit_for:
      - Benchmarking
      - simple execution
      - liquid markets
      not_fit_for:
      - Volatile markets
      - large order impact
    - name: VWAP
      traits:
      - Volume-based
      - market-aware
      - adaptive
      fit_for:
      - Volume-sensitive execution
      - benchmark comparisons
      not_fit_for:
      - Thin volume markets
      - unusual trading patterns
    - name: PPO
      traits:
      - RL-based
      - adaptive
      - learns from data
      fit_for:
      - Complex markets
      - adaptive execution
      - alpha generation
      not_fit_for:
      - Simple execution
      - theoretical baselines
      - small datasets
    - name: OPD
      traits:
      - RL-based
      - order book aware
      fit_for:
      - High-frequency
      - detailed market modeling
      not_fit_for:
      - Low-frequency execution
      - simple benchmarks
    default: AC
  - name: reward_type
    description: Reward signal timing
    options:
    - name: instant
      traits:
      - Per-timestep reward
      - FFR/VVR metrics
      fit_for:
      - Dense feedback
      - faster learning
      not_fit_for:
      - Long-horizon optimization
      - complex strategies
    - name: end_episode
      traits:
      - Terminal-only reward
      - IS metric
      fit_for:
      - Long-horizon tasks
      - sparse feedback
      not_fit_for:
      - Fast learning
      - real-time adaptation
    default: instant
  design_decisions:
  - 'Market impact modeled as permanent + temporary components - Almgren-Chriss model:
    permanent impact (γ * shares) persists, temporary impact (ε + η/τ * shares) affects
    only execution price (meta/env_execution_optimizing/liquidation/env_execution_optimizing.py:366(permanentImpact))'
  - AC utility balances expected shortfall vs variance - E + λ*V tradeoff. λ (risk
    aversion) determines urgency. λ=1e-6 conservative, λ=1e-4 aggressive (meta/env_execution_optimizing/liquidation/env_execution_optimizing.py:406(compute_AC_utility))
  - Instant_Reward vs EndEpisode_Reward strategy pattern - Enables per-timestep (FFR/VVR)
    vs terminal-only reward signals for different training regimes (meta/env_execution_optimizing/order_execution_qlib/trade/reward/base.py:18(isinstant))
  - RuleObs and RL Obs share BaseObs interface - Unified get_obs interface allows
    swapping observation strategies without changing executor code (meta/env_execution_optimizing/order_execution_qlib/trade/observation/obs_rule.py:12(BaseObs))
  acceptance_hints:
  - Execution policies (TWAP, VWAP, AC) produce valid order schedules with correct
    amounts
  - Market impact models correctly separate permanent and temporary impact
  - end_day() is called after each trading day for proper impact decay
  - MarketEnvironment requires start_transactions() before step()
- id: paper_trading
  name: Paper Trading
  order: 6
  responsibility: Connects trained models to live paper trading via broker APIs (Alpaca).
    Simulates real execution with latency testing and order management.
  interface:
    inputs:
    - trained model
    - Alpaca API credentials
    outputs:
    - live orders
    - filled positions
    - account state
  required_methods:
  - name: AlpacaPaperTrading.run
    description: Main paper trading loop connecting trained model to Alpaca API for
      live order execution
    evidence: meta/env_stock_trading/env_stock_papertrading.py(AlpacaPaperTrading)
  - name: AlpacaPaperTradingMultiCrypto.test_latency
    description: Latency testing before live submission ensures API connectivity before
      trading
    evidence: meta/env_crypto_trading/alpaca_paper_trade_multicrypto.py:test_latency
  key_behaviors:
  - behavior: Latency testing before live submission
    description: Ensures API connectivity before trading. Prevents silent order failures
      during live execution.
    evidence: meta/env_crypto_trading/alpaca_paper_trade_multicrypto.py:test_latency
  - behavior: Broker API integration
    description: Connects trained models to Alpaca for real paper trading execution
      with position management.
    evidence: meta/env_stock_trading/env_stock_papertrading.py(AlpacaPaperTrading)
  replaceable_points:
  - name: broker
    description: Paper trading broker
    options:
    - name: alpaca
      traits:
      - Default
      - US equities
      - crypto support
      - free trading
      fit_for:
      - US stock paper trading
      - crypto paper trading
      not_fit_for:
      - International markets
      - futures trading
      - forex
    default: alpaca
  design_decisions:
  - Latency testing before live submission - Ensures API connectivity before trading.
    Prevents silent order failures (meta/env_crypto_trading/alpaca_paper_trade_multicrypto.py:test_latency)
  acceptance_hints:
  - Latency test passes before trading begins
  - Orders are properly submitted to Alpaca API
  - Filled positions are tracked correctly
  - Account state reflects executed trades
data_flow:
- from_stage: external
  to_stage: data_collection
  data: ticker_list, start_date, end_date, time_interval
- from_stage: data_collection
  to_stage: feature_engineering
  data: raw OHLCV DataFrame with time/tic columns
- from_stage: feature_engineering
  to_stage: environment_simulation
  data: numpy arrays (price_array, tech_array, turbulence_array)
- from_stage: environment_simulation
  to_stage: agent_training
  data: Gym interface states/actions/rewards
- from_stage: agent_training
  to_stage: order_execution
  data: trained policy network
- from_stage: agent_training
  to_stage: paper_trading
  data: trained model weights and prediction function
- from_stage: order_execution
  to_stage: paper_trading
  data: executed orders and fill prices
global_contracts:
- contract: Every DataFrames use standardized time column named 'time' (renamed from
    'date'/'datetime') - meta/data_processors/_base.py:88(clean_data)
  evidence: ''
- contract: Every DataFrames use 'tic' column for ticker/symbol identification - meta/data_processors/_base.py:98(tic_rename)
  evidence: ''
- contract: 'Data processors require specific column names: tic, time, open, high,
    low, close, adjusted_close, volume - enforced in clean_data() - meta/data_processors/_base.py:111-122(column
    enforcement)'
  evidence: ''
- contract: Every trading environments inherit from gym.Env and implement reset/step/get_state
    - meta/env_stock_trading/env_stock_trading.py:6(StockTradingEnv)
  evidence: ''
- contract: Technical indicators must exist as columns in DataFrame after add_technical_indicator
    - meta/data_processors/_base.py:224(_add_technical_indicator_stockstats)
  evidence: ''
- contract: Every DRLAgent implementations provide get_model/train_model/DRL_prediction
    interface - agents/stablebaselines3_models.py:48(DRLAgent)
  evidence: ''
- contract: State values normalized to approximately [-1, 1] via power-of-2 scaling
    - meta/env_stock_trading/env_stock_trading.py:145(get_state)
  evidence: ''
- contract: Reward scaling factor prevents gradient explosion in policy networks -
    meta/env_stock_trading/env_stock_trading.py:18(reward_scaling=2**-11)
  evidence: ''
- contract: Every trading environments expect turbulence column in data - DRLEnsembleAgent
    calculates threshold as 90th percentile of insample data - meta/data_processors/_base.py:346-348(quantile(0.90))
  evidence: ''
- contract: StockTradingEnv.step() processes SELL before BUY - sells are executed
    first in the action loop - meta/env_stock_trading/env_stock_trading.py:109-124(sell_index
    loop then buy_index loop)
  evidence: ''
- contract: Impact models require end_day() to be called after each trading day to
    apply permanent impact decay - meta/env_market_impact/envs/impact_models.py:88-115(end_day
    method)
  evidence: ''
business_decisions:
- id: BD-001
  type: B/DK
  content: Strategy pattern for data sources via _Base inheritance
  rationale: 'Each provider (Alpaca, Binance, etc.) extends _Base to reuse common
    clean/transform logic while overriding download_data for provider-specific implementation.
    This architectural pattern enables adding new data sources without modifying existing
    code. BOUNDARY: The _Base class defines the interface contract; each subclass
    must implement download_data while inheriting each shared transformation methods.'
  evidence: meta/data_processors/_base.py:63(_Base.__init__)
  stage: data_collection
  alternative_considered: Could have used function-level composition instead of inheritance,
    but inheritance provides stronger type safety and shared initialization
- id: BD-002
  type: BA
  content: Standardized column names enforced in clean_data
  rationale: 'Renames date→time, datetime→time across each sources to fix inconsistent
    upstream schemas. This ensures downstream feature engineering and environment
    simulation receive predictable column names regardless of source API format. BOUNDARY:
    Column renaming occurs immediately after raw download before any technical indicator
    calculation, ensuring consistent data contracts throughout the pipeline.'
  evidence: meta/data_processors/_base.py:88(clean_data)
  stage: data_collection
  alternative_considered: Could require each source to standardize before returning
    data, but centralized enforcement in _Base is more reliable
- id: BD-003
  type: BA/DK
  content: IndicatorLib IntEnum preserves backwards compatibility
  rationale: 'Allows integer 0/1 in addition to STOCKSTATS/TALIB enum values for legacy
    code that passes raw integers instead of enum instances. This prevents breaking
    changes when migrating older scripts to the new enum-based indicator specification.
    BOUNDARY: The IntEnum comparison works in both directions (enum==int and int==enum),
    enabling gradual migration without requiring each callers to update simultaneously.'
  evidence: meta/data_processors/_base.py:51(IndicatorLib)
  stage: data_collection
  alternative_considered: Could have required strict enum usage and deprecated integer
    inputs, but backwards compatibility reduces adoption barriers
- id: BD-004
  type: BA/DK
  content: Timezone auto-detection via calc_time_zone
  rationale: 'Maps ticker sets to exchanges (HSI→Shanghai, DOW→USEastern) for correct
    market hours alignment. This ensures timestamp normalization accounts for market
    open/close times when calculating features like overnight returns. BOUNDARY: Timezone
    detection applies to the entire dataset at initialization; time-sensitive features
    (intraday returns, volume patterns) depend on correct market hour boundaries.'
  evidence: meta/data_processors/_base.py:661(calc_time_zone)
  stage: data_collection
  alternative_considered: Could have required explicit timezone parameter per dataset,
    but auto-detection reduces configuration burden and errors
- id: BD-005
  type: B/BA
  content: Dual-indicator-library support (stockstats default)
  rationale: 'Talib is faster but stockstats is default for broader compatibility;
    both use same config interface enabling transparent switching. This allows users
    to choose performance (TA-Lib) or accessibility (stockstats, no external C dependencies).
    BOUNDARY: Feature calculation results must be numerically equivalent regardless
    of library choice; unit tests verify parity across both implementations.'
  evidence: meta/data_processors/_base.py:184(add_technical_indicator)
  stage: feature_engineering
  alternative_considered: Could have used only TA-Lib for simplicity, but stockstats
    default improves accessibility for users without compiled dependencies
- id: BD-006
  type: BA/DK
  content: Turbulence boolean encoding for trading condition
  rationale: 'Converts continuous turbulence to binary flag using 99th percentile
    threshold to force sell-each when market becomes unstable. This simplifies risk
    management logic by providing a clear market-regime signal rather than requiring
    threshold handling throughout the policy. BOUNDARY: The binary flag triggers sell_all
    behavior; continuous turbulence values still influence reward calculation for
    training signal richness.'
  evidence: meta/env_stock_trading/env_stock_trading.py:30(turbulence_bool)
  stage: feature_engineering
  alternative_considered: Could have used continuous turbulence in action scaling
    directly, but binary threshold provides clearer risk management policy
  _evidence_issues:
  - 'FN_NOT_FOUND: turbulence_bool in meta/env_stock_trading/env_stock_trading.py'
- id: BD-007
  type: BA/M
  content: Reward scaling 2^-11 to prevent gradient explosion
  rationale: 'Normalizes rewards to approximately [-1,1] range using 2^-11 scaling
    factor, chosen empirically in FinRL original implementation. This prevents gradient
    explosion in policy gradient methods by keeping reward magnitudes comparable to
    action magnitudes. BOUNDARY: Scaling applies to each timesteps equally; episode
    returns accumulate scaled values for training gradients.'
  evidence: meta/env_stock_trading/env_stock_trading.py:18(reward_scaling)
  stage: feature_engineering
  alternative_considered: Could have used adaptive scaling per episode, but fixed
    2^-11 is simpler and empirically validated
  _evidence_issues:
  - 'FN_NOT_FOUND: reward_scaling in meta/env_stock_trading/env_stock_trading.py'
- id: BD-008
  type: BA/M
  content: Box action space [-1,1] normalized across each stock envs
  rationale: 'Enables same policy architecture across different stock counts by normalizing
    actions to [-1,1] range. Actions are scaled internally by max_stock to convert
    normalized values to actual share quantities. BOUNDARY: The policy outputs normalized
    actions regardless of portfolio size; max_stock scaling happens at environment
    step execution.'
  evidence: meta/env_stock_trading/env_stock_trading.py:75(action_space)
  stage: environment_simulation
  alternative_considered: Could have used variable action space per environment, but
    unified architecture simplifies multi-stock model development
  _evidence_issues:
  - 'FN_NOT_FOUND: action_space in meta/env_stock_trading/env_stock_trading.py'
- id: BD-009
  type: BA
  content: Gamma reward accumulation for episode terminal reward
  rationale: 'Decays future rewards using γ=0.99 to balance immediate versus delayed
    returns, encouraging long-term portfolio value rather than short-term profit taking.
    This aligns agent behavior with investor preferences for sustained growth. BOUNDARY:
    Terminal reward includes discounted cumulative return; short-term rewards are
    included directly without discounting within the episode.'
  evidence: meta/env_stock_trading/env_stock_trading.py:136(gamma_reward)
  stage: environment_simulation
  alternative_considered: Could have used undiscounted episode return, but gamma decay
    provides more stable credit assignment in long episodes
  _evidence_issues:
  - 'FN_NOT_FOUND: gamma_reward in meta/env_stock_trading/env_stock_trading.py'
- id: BD-010
  type: BA
  content: Cool-down period after trades prevents wash trading
  rationale: 'Tracks steps since last trade per stock and enforces minimum interval
    before re-trading same asset to prevent excessive transaction costs and wash trading
    patterns. BOUNDARY: Cooldown applies per-stock independently; trading other assets
    is unaffected. The cooldown length balances exploitability against transaction
    cost avoidance.'
  evidence: meta/env_stock_trading/env_stock_trading.py:105(stocks_cool_down)
  stage: environment_simulation
  alternative_considered: Could have used transaction cost penalty instead, but explicit
    cooldown provides stronger enforcement of trading frequency constraints
  _evidence_issues:
  - 'FN_NOT_FOUND: stocks_cool_down in meta/env_stock_trading/env_stock_trading.py'
- id: BD-011
  type: BA/DK
  content: Turbulence sell-each triggers full liquidation
  rationale: 'High volatility above 99th percentile forces complete exit from each
    positions to avoid extended drawdown during market instability. This implements
    a risk management rule protecting capital during regime changes. BOUNDARY: Sell-each
    executes immediately upon turbulence threshold breach; position rebuilding requires
    turbulence to subside below threshold.'
  evidence: meta/env_stock_trading/env_stock_trading.py:126(sell_all_turbulence)
  stage: environment_simulation
  alternative_considered: Could have used partial liquidation proportional to turbulence
    level, but binary all-or-nothing is simpler and more decisive
  _evidence_issues:
  - 'FN_NOT_FOUND: sell_all_turbulence in meta/env_stock_trading/env_stock_trading.py'
- id: BD-012
  type: BA/M
  content: State space normalization via power-of-2 scaling
  rationale: 'Cash scaled by 2^-12, prices scaled by 2^-6 to maintain state values
    within [-1,1] range required for stable neural network forward passes. Power-of-2
    allows efficient bit-shift implementation instead of floating-point division.
    BOUNDARY: Every continuous state features use fixed power-of-2 scaling; binary
    features (position held, turbulence) pass through unchanged.'
  evidence: meta/env_stock_trading/env_stock_trading.py:145(get_state)
  stage: environment_simulation
  alternative_considered: Could have used learned normalization layers, but fixed
    scaling is simpler and provides consistent state representation across training
- id: BD-013
  type: B/BA
  content: Default hyperparameters extracted from config module
  rationale: 'Single source of truth in config.py centralizes model hyperparameters
    keyed by uppercase model name (A2C_PARAMS, PPO_PARAMS). This enables configuration
    changes without modifying model code and ensures consistency across training scripts.
    BOUNDARY: Config values are loaded at model instantiation; hot-reloading is not
    supported; restart required for changes.'
  evidence: agents/stablebaselines3_models.py:24(MODEL_KWARGS)
  stage: agent_training
  alternative_considered: Could have used command-line arguments, but config module
    provides better organization for many hyperparameters
  _evidence_issues:
  - 'FN_NOT_FOUND: MODEL_KWARGS in agents/stablebaselines3_models.py'
- id: BD-014
  type: BA/DK
  content: Ensemble uses rolling train/val/test windows
  rationale: 'Rebalance window defines validation period length; Sharpe ratio computed
    on validation set selects best-performing model for deployment. This rolling window
    approach prevents overfitting to historical patterns and provides ongoing model
    freshness. BOUNDARY: Validation period determines rebalancing frequency; longer
    windows reduce overfitting but increase latency in adapting to market regime changes.'
  evidence: agents/stablebaselines3_models.py:320(run_ensemble_strategy)
  stage: agent_training
  alternative_considered: Could have used fixed test period, but rolling validation
    better simulates live deployment conditions
- id: BD-015
  type: BA/M
  content: DDPG/TD3 use Ornstein-Uhlenbeck action noise
  rationale: 'Ornstein-Uhlenbeck process provides temporal correlation in noise matching
    continuous trading action persistence. Unlike independent Gaussian noise, OU noise
    prevents erratic action sequences that violate physical constraints of portfolio
    adjustment. BOUNDARY: OU noise applies only to DDPG/TD3 continuous control algorithms;
    discrete algorithms (PPO, A2C) use independent noise or entropy regularization.'
  evidence: agents/stablebaselines3_models.py:26(NOISE)
  stage: agent_training
  alternative_considered: Could have used simple Gaussian noise, but OU temporal correlation
    better models realistic trading friction
  _evidence_issues:
  - 'FN_NOT_FOUND: NOISE in agents/stablebaselines3_models.py'
- id: BD-016
  type: BA
  content: ElegantRL hardcodes state_dim=39, action_dim=3 for futures
  rationale: 'Future trading environment has fixed 39 features (representing multi-asset
    state) and 3 actions (long/short/hold). Hardcoding enables compile-time validation
    preventing dimension mismatch errors. BOUNDARY: Changing state_dim or action_dim
    requires modifying both environment and agent simultaneously; the fixed values
    enforce a strict interface contract.'
  evidence: agents/elegantrl_models_wt.py:60-61(module)
  stage: agent_training
  alternative_considered: Could have used configurable dimensions, but fixed values
    document the expected environment interface explicitly
  _evidence_issues:
  - 'FN_NOT_FOUND: module in agents/elegantrl_models_wt.py'
- id: BD-017
  type: BA/DK
  content: Market impact modeled as permanent + temporary components
  rationale: 'Implements Almgren-Chriss execution model: permanent impact (γ * shares)
    persists in market price after trade completion, while temporary impact (ε + η/τ
    * shares) only affects execution price. This dual-component model accurately captures
    execution costs for large orders. BOUNDARY: Temporary impact affects only immediate
    fills; permanent impact reflects lasting price adjustment from information leakage.'
  evidence: meta/env_execution_optimizing/liquidation/env_execution_optimizing.py:366(permanentImpact)
  stage: order_execution
  alternative_considered: Could have used simpler linear market impact, but Almgren-Chriss
    provides empirically validated separation of permanent/temporary effects
- id: BD-018
  type: BA/DK
  content: AC utility balances expected shortfall vs variance
  rationale: 'E + λ*V tradeoff where λ (risk aversion) determines execution urgency.
    λ=1e-6 is conservative (prioritizes market impact minimization), λ=1e-4 is aggressive
    (accepts higher impact to reduce execution risk). BOUNDARY: λ parameter controls
    the risk-return tradeoff; optimal λ depends on asset volatility and liquidation
    urgency requirements.'
  evidence: meta/env_execution_optimizing/liquidation/env_execution_optimizing.py:406(compute_AC_utility)
  stage: order_execution
  alternative_considered: Could have used fixed λ, but configurable risk aversion
    allows adaptation to different liquidation scenarios
- id: BD-019
  type: B/BA
  content: Instant_Reward vs EndEpisode_Reward strategy pattern
  rationale: 'Enables per-timestep reward signals (FFR/VVR) versus terminal-only reward
    for different training regimes. Instant rewards provide frequent gradient updates
    for faster convergence; terminal rewards emphasize final execution quality. BOUNDARY:
    Reward type is selected at environment initialization and fixed for training run;
    switching requires environment recreation.'
  evidence: meta/env_execution_optimizing/order_execution_qlib/trade/reward/base.py:37(isinstant)
  stage: order_execution
  alternative_considered: Could have hardcoded single reward type, but strategy pattern
    allows experimentation with different training signals
- id: BD-020
  type: B/BA
  content: RuleObs and RL Obs share BaseObs interface
  rationale: 'Unified get_obs interface allows swapping observation strategies (rule-based
    vs RL-derived) without changing executor code. This enables comparing baseline
    rule-based execution against learned policies using identical environment setup.
    BOUNDARY: Both observation types produce compatible state vectors; dimension mismatch
    would indicate implementation error.'
  evidence: meta/env_execution_optimizing/order_execution_qlib/trade/observation/obs_rule.py:12(BaseObs)
  stage: order_execution
  alternative_considered: Could have used separate observation classes with adapters,
    but shared interface is cleaner and eliminates adapter overhead
- id: BD-021
  type: BA
  content: Latency testing before live submission
  rationale: 'Ensures API connectivity and measures round-trip latency before initiating
    live trading to prevent silent order failures from network issues. Latency threshold
    prevents submitting orders when execution would be unacceptably slow. BOUNDARY:
    Latency test runs once at startup; ongoing latency monitoring during trading is
    not implemented.'
  evidence: N/A:0(see_rationale)
  stage: paper_trading
  alternative_considered: Could have used continuous latency monitoring, but startup
    check is simpler and catches most connectivity issues
- id: BD-022
  type: B/BA
  content: Initial capital default set to 1,000,000 (1e6) for crypto trading environments
  rationale: 'Setting initial capital to 1,000,000 provides sufficient starting capital
    for meaningful trading operations while remaining manageable for simulation purposes.
    This value balances risk exposure with capital efficiency and aligns with typical
    institutional trading capital allocation. Boundary: Values significantly higher
    would inflate absolute returns making performance metrics misleading; lower values
    risk insufficient capital for multi-asset trading.'
  evidence: meta/env_crypto_trading/create_crypto_env.py:47(module)
  stage: environment_simulation
  alternative_considered: Lower capital (100,000) was considered but rejected as insufficient
    for diversified crypto portfolios; higher capital (10,000,000) was rejected to
    avoid inflated absolute returns masking poor risk-adjusted performance.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in meta/env_crypto_trading/create_crypto_env.py'
- id: BD-023
  type: B/BA
  content: Buy transaction cost default set to 0.1% (1e-3) for crypto trading
  rationale: 'The 0.1% buy cost approximates realistic crypto exchange fees including
    maker/taker spreads and network transaction fees. This cost structure ensures
    trading strategies account for market friction in profit calculations. Boundary:
    Setting to 0% would create unrealistic optimism; exceeding 0.5% would render short-term
    trading strategies unprofitable.'
  evidence: meta/env_crypto_trading/create_crypto_env.py:48(module)
  stage: transaction_cost
  alternative_considered: Zero cost scenario considered but rejected as unrealistic;
    higher costs (0.5%) would make scalping strategies unviable.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in meta/env_crypto_trading/create_crypto_env.py'
- id: BD-024
  type: B/BA
  content: Sell transaction cost default set to 0.1% (1e-3) for crypto trading
  rationale: 'Matching sell costs to buy costs maintains symmetry in transaction cost
    modeling, accurately reflecting bidirectional exchange fee structures in crypto
    markets. This ensures strategies cannot exploit cost asymmetries. Boundary: Asymmetric
    costs would create exploitable arbitrage opportunities in backtests.'
  evidence: meta/env_crypto_trading/create_crypto_env.py:49(module)
  stage: transaction_cost
  alternative_considered: Variable costs based on market conditions considered but
    complexity outweighed benefits for default scenario.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in meta/env_crypto_trading/create_crypto_env.py'
- id: BD-025
  type: B/BA
  content: Discount factor (gamma) default set to 0.99 for RL training
  rationale: 'The 0.99 discount factor balances long-term reward consideration with
    practical convergence speed in reinforcement learning. This standard RL hyperparameter
    ensures agents value future returns while still learning from immediate feedback.
    Boundary: Values below 0.95 cause myopic behavior; values above 0.995 slow training
    convergence significantly.'
  evidence: meta/env_crypto_trading/create_crypto_env.py:50(module)
  stage: rl_hyperparameter
  alternative_considered: Lower gamma (0.9) rejected for promoting short-term exploitation;
    higher gamma (0.999) rejected for excessive training time.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in meta/env_crypto_trading/create_crypto_env.py'
  vague_rationale: true
- id: BD-026
  type: B/BA
  content: Lookback window default set to 1 for observation history
  rationale: 'Setting lookback to 1 means the agent observes only current state without
    historical context, suitable for Markov decision process assumptions. This simplifies
    the observation space and reduces memory requirements. Boundary: Increasing lookback
    increases state dimensionality quadratically; values above 10 become computationally
    expensive.'
  evidence: meta/env_crypto_trading/create_crypto_env.py:46(module)
  stage: observation_construction
  alternative_considered: Multi-step lookback (5-10) considered but rejected for increased
    state space complexity without clear benefit for this environment.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in meta/env_crypto_trading/create_crypto_env.py'
- id: BD-027
  type: B/BA
  content: Turbulence threshold of 70 used to control trading during high volatility
  rationale: 'Turbulence threshold of 70 identifies periods of extreme market volatility
    when traditional mean-variance optimization fails. This boundary activates risk-averse
    trading modes to protect capital during market stress. Boundary: Lower thresholds
    (50) trigger too frequently; higher thresholds (100) may miss early volatility
    spikes.'
  evidence: meta/env_stock_trading/env_stock_trading.py:52(module)
  stage: risk_management
  alternative_considered: Dynamic threshold based on historical volatility percentiles
    considered but static threshold provides more predictable behavior.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in meta/env_stock_trading/env_stock_trading.py'
- id: BD-028
  type: B/DK
  content: Maximum stock purchase quantity capped at 100 shares per transaction
  rationale: 'The hmax=100 limit prevents excessive concentration in single trades
    while allowing meaningful position sizing. This constraint controls market impact
    and ensures realistic order sizes. Boundary: Lower limits (10) restrict profitable
    strategies; higher limits (1000) risk market impact and unrealistic leverage.'
  evidence: meta/env_stock_trading/env_stock_trading.py:53(module)
  stage: position_sizing
  alternative_considered: Percentage-based limits considered but absolute shares provide
    clearer risk bounds.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in meta/env_stock_trading/env_stock_trading.py'
- id: BD-029
  type: B/BA
  content: Initial amount for portfolio optimization set to 1,000,000
  rationale: 'Consistent with crypto trading capital, the 1,000,000 baseline enables
    meaningful portfolio allocation studies with sufficient granularity for fractional
    positions. Boundary: Smaller amounts lack diversification options; larger amounts
    exceed typical retail capacity.'
  evidence: meta/env_portfolio_optimization/env_portfolio_optimization.py:129(module)
  stage: environment_simulation
  alternative_considered: Scaling initial amount to position count considered but
    fixed amount provides consistent comparison across scenarios.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in meta/env_portfolio_optimization/env_portfolio_optimization.py'
- id: BD-030
  type: B/BA
  content: Transaction cost rate of 0.1% applied to portfolio trades
  rationale: 'The 0.1% cost rate reflects realistic institutional trading costs including
    commissions and spreads. This ensures optimized portfolios remain viable after
    transaction costs. Boundary: Zero cost creates overtrading; costs above 0.5% eliminate
    rebalancing benefits.'
  evidence: meta/env_portfolio_optimization/env_portfolio_optimization.py:108(module)
  stage: transaction_cost
  alternative_considered: Variable costs based on turnover considered but fixed rate
    provides stable baseline comparison.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in meta/env_portfolio_optimization/env_portfolio_optimization.py'
- id: BD-031
  type: B/BA
  content: Market impact model uses square root function (Almgren-Chriss style)
  rationale: 'The Almgren-Chriss square-root market impact model captures the empirically
    observed relationship between trade size and price impact. This provides realistic
    execution cost estimates for large orders. Boundary: Linear models underestimate
    large order costs; cubic models overpenalize and discourage legitimate trades.'
  evidence: meta/env_market_impact/envs/impact_models.py:45(module)
  stage: market_impact_modeling
  alternative_considered: Linear impact model rejected as empirically inaccurate;
    nonlinear models (cubic) rejected as too aggressive.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in meta/env_market_impact/envs/impact_models.py'
- id: BD-032
  type: B/BA
  content: Permanent impact coefficient (eta) default set to 0.1
  rationale: 'The eta=0.1 permanent impact coefficient represents the lasting price
    effect from trades, calibrated to typical equity market microstructure. This separates
    temporary from permanent market impact. Boundary: Higher values (0.5) indicate
