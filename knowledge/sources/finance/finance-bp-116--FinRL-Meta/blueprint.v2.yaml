    (BD-077). This creates inconsistent gradient magnitudes between environments—when
    transferring policies or ensembling, agents may experience gradient explosion
    because reward scale differs from state scale. The mismatch violates consistent
    scaling assumptions required for stable neural network training.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Could standardize reward and state scaling across each environments
- id: BD-151
  type: B
  content: 'INTERACTION: BD-108 → BD-075 → BD-006 → Hidden dependency on covariance
    stability'
  rationale: Mean-variance optimization (BD-108) depends on covariance matrix (BD-075)
    for risk estimation, which is used to calculate turbulence (BD-006). Unstable
    covariance estimates (singular or near-singular matrices) produce extreme portfolio
    weights, which inflate position values, which corrupt turbulence calculations.
    This creates a hidden dependency where mathematical instability in portfolio optimization
    silently propagates to risk management decisions.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Could add matrix conditioning checks and regularization
    before optimization
- id: BD-152
  type: B/DK
  content: 'INTERACTION: BD-017 × BD-106 × BD-107 → Amplified model parameter coupling'
  rationale: Almgren-Chriss execution model (BD-017) uses volatility=0.12 (BD-106)
    for timing risk calculation, which interacts with the square-root market impact
    coefficient Y=0.6 (BD-107). These parameters are independently calibrated but
    jointly determine optimal execution trajectories. Changing one without adjusting
    others creates misaligned risk-cost tradeoffs, leading to either excessive market
    impact or uncompensated timing risk. The coupling is hidden because parameters
    appear independently tunable.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Could implement automatic parameter recalibration when any
    single parameter changes
- id: BD-153
  type: BA/M
  content: 'INTERACTION: BD-014 × BD-062 → Hidden dependency on validation Sharpe
    stability'
  rationale: Rolling train/val/test windows (BD-014) select models based on validation
    Sharpe ratio (BD-062). High validation Sharpe doesn't guarantee test stability—if
    validation period has unusual volatility, selected models may underperform on
    representative test data. The dependency is hidden because both decisions appear
    sound independently but together can select overfitted models that exploit validation
    period anomalies.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Could use multiple validation periods or cross-validation
    for model selection
- id: BD-154
  type: BA/DK
  content: 'INTERACTION: BD-095 × BD-017 → Contradiction in annualization assumptions'
  rationale: Annualization uses 240 trading days (BD-095) while Almgren-Chriss liquidation
    uses sqrt(250) for volatility scaling (BD-123). These inconsistent annualization
    assumptions create contradictory risk metrics—one part of the system assumes 240
    days while another assumes 250. This leads to misaligned Sharpe ratios, inconsistent
    performance comparisons, and incorrect risk-adjusted decision-making across the
    platform.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Could standardize annualization to single trading day convention
    across each components
- id: BD-155
  type: BA
  content: 'INTERACTION: BD-127 × BD-128 → Amplified regulatory compliance complexity'
  rationale: Stock trading environment executes SELL before BUY (BD-127) while margin
    trader environment requires cover-short before buy-long (BD-128). These different
    ordering sequences create inconsistent regulatory behavior—strategies that work
    in one environment may violate compliance rules when moved to the other. The amplification
    occurs because position-flipping order affects execution price, potentially creating
    regulatory violations that appear as profitable strategies in backtests but would
    fail in live trading.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Could standardize regulatory ordering across each trading
    environments
- id: BD-GAP-001
  type: B
  content: Split action rules into Static vs Dynamic variants rather than using a
    single class with mode parameter
  rationale: Separating static and dynamic interval rules into distinct classes avoids
    conditional branching in hot execution paths; breaks when new interval types need
    to be added, requiring class explosion.
  evidence: meta/env_execution_optimizing/order_execution_qlib/trade/action/interval_rule.py:10(Rule_Static_Interval)
  stage: architecture
  alternative_considered: Single class with interval_type parameter and conditional
    logic
- id: BD-GAP-002
  type: B/BA
  content: Default SQLite database (mondata.db) for each monitor state persistence
    instead of external DB
  rationale: Embedded SQLite eliminates deployment dependency on external database
    services; breaks under high concurrent write loads where SQLite's single-writer
    limitation becomes a bottleneck.
  evidence: meta/env_future_trading/wt4elegantrl/wtpy/monitor/DataMgr.py:27(__init__)
  stage: architecture
  alternative_considered: PostgreSQL/MySQL for multi-user deployments
- id: BD-GAP-003
  type: B/BA
  content: Query result pagination with default limit=200 for trades, signals, orders,
    and rounds
  rationale: Hardcoded 200-row limit prevents memory exhaustion on large datasets;
    breaks when users need historical analysis requiring larger result sets.
  evidence: meta/env_future_trading/wt4elegantrl/wtpy/monitor/DataMgr.py:447(get_trades)
  stage: implementation
  alternative_considered: Streaming results or configurable limits
- id: BD-GAP-004
  type: B/BA
  content: Three separate trading engine types (CTA/HFT/SEL) with independent initialization
    paths
  rationale: Separate engine types support different execution paradigms (trend-following
    vs high-frequency vs selection); breaks when hybrid strategies requiring multiple
    engine features are needed.
  evidence: meta/env_future_trading/wt4elegantrl/wtpy/wrapper/WtWrapper.py:698(initialize_cta)
  stage: architecture
  alternative_considered: Unified engine with strategy-type parameter
- id: BD-GAP-005
  type: B/RC
  content: Binary .dsb format for historical data storage instead of CSV/JSON
  rationale: Binary format reduces storage size and read/write latency for large tick
    datasets; breaks when data inspection or external system integration is required
    without conversion utilities.
  evidence: meta/env_future_trading/wt4elegantrl/wtpy/wrapper/WtDtHelper.py:73(dump_bars)
  stage: architecture
  alternative_considered: Parquet for columnar storage with compression
- id: BD-GAP-006
  type: B/BA
  content: GBK encoding default for log file reading instead of UTF-8
  rationale: GBK encoding matches Windows Chinese system default for log files; breaks
    on Linux/macOS systems or when logs contain UTF-8 characters from modern editors.
  evidence: meta/env_future_trading/wt4elegantrl/wtpy/monitor/WtMonSvr.py:52(get_tail)
  stage: implementation
  alternative_considered: UTF-8 with BOM or chardet-based detection
- id: BD-GAP-007
  type: B/BA
  content: Slippage parameter defaulting to 0 in backtest mocker initialization
  rationale: Zero slippage provides clean theoretical backtest baseline; breaks when
    comparing to real execution where market impact exists.
  evidence: meta/env_future_trading/wt4elegantrl/wtpy/wrapper/WtBtWrapper.py:1523(init_cta_mocker)
  stage: implementation
  alternative_considered: Non-zero default based on instrument tick size
- id: BD-GAP-008
  type: BA
  content: Event-driven architecture using MQ topic-based pub/sub for real-time trading
    updates
  rationale: Decoupled event system allows multiple consumers (monitor, logger, notifier)
    without sender knowledge; breaks when message ordering or exactly-once delivery
    is required.
  evidence: meta/env_future_trading/wt4elegantrl/wtpy/monitor/EventReceiver.py:47(EventReceiver)
  stage: architecture
  alternative_considered: Direct callback or RPC for tighter coupling
- id: BD-GAP-009
  type: B/BA
  content: Group-based access model where get_group_* methods operate on group ID,
    not per-user permissions
  rationale: Group-level permissions simplify multi-strategy monitoring; breaks when
    individual strategy-level access control is needed.
  evidence: meta/env_future_trading/wt4elegantrl/wtpy/monitor/DataMgr.py:205(get_groups)
  stage: architecture
  alternative_considered: RBAC with user/role/permission hierarchy
- id: BD-GAP-010
  type: B/BA
  content: Flask-based HTTP monitoring server on default port 8080 with static file
    serving
  rationale: Built-in web UI eliminates separate frontend deployment; breaks when
    enterprise authentication or load balancing across multiple instances is needed.
  evidence: meta/env_future_trading/wt4elegantrl/wtpy/monitor/WtMonSvr.py:1900(run)
  stage: deployment
  alternative_considered: Separate React/Vue frontend with REST API backend
