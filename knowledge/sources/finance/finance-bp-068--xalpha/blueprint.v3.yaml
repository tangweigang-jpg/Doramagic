  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/indicator.py'
  vague_rationale: true
- id: BD-026
  type: M/BA
  content: scipy.optimize for XIRR
  rationale: No closed-form XIRR exists for irregular cash flows; Newton-Raphson from scipy is the standard
    numerical approach. The internal rate of return for irregular intervals requires iterative numerical
    solution, and scipy.optimize provides a well-tested, efficient implementation suitable for financial
    calculations.
  evidence: xalpha/cons.py:26(module)
  stage: technical_indicators
  alternative_considered: Manual Newton-Raphson would duplicate scipy code; approximation methods would
    be less accurate
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/cons.py'
- id: BD-027
  type: B/DK
  content: Non-trading day trade requests are forward-adjusted to the next valid trading day
  rationale: 'Deterministic trade execution ensures orders are always placed on valid market days. This
    prevents failed submissions on weekends/holidays and maintains consistent portfolio state. Boundary:
