global_contracts:
- contract: Every price DataFrames use date column as primary key, formatted as pd.Timestamp or string
    YYYY-MM-DD (xalpha/info.py:386)
  evidence: ''
- contract: 'status table: first row is header (date, codes), subsequent rows are date+amounts; positive=buy,
    negative=sell, 0.005 marks dividend reinvestment (xalpha/record.py:11)'
  evidence: ''
- contract: cftable has columns [date, cash, share]; remtable has columns [date, rem] where rem is nested
    list [[date, share], ...] (xalpha/trade.py:333)
  evidence: ''
- contract: F prefix on codes in backtest context means fund (resolved to fundinfo); M prefix means mfundinfo;
    no prefix means vinfo-compatible (xalpha/backtest.py:144)
  evidence: ''
- contract: Only Chinese trading days (opendate_set) are processed in backtest; holidays loaded from holiday.json
    (xalpha/backtest.py:72)
  evidence: ''
- contract: Trade operations enforce buy-before-sell ordering; sell-first triggers TradeBehaviorError
    (xalpha/trade.py:404)
  evidence: ''
- contract: xirrcal expects cashflow ordered by date with final redemption appended last (xalpha/trade.py:49)
  evidence: ''
- contract: Policy status_gen is template method; subclasses MUST implement run logic (xalpha/policy.py:50-57)
  evidence: ''
- contract: indicator mixin requires price attribute on host object with date-based index (xalpha/indicator.py:32)
  evidence: ''
business_decisions:
- id: BD-001
  type: B/BA
  content: Handler pattern for data source injection
  rationale: Allows users to inject custom fetch logic before default sources are tried, enabling offline
    data or mock sources. The handler injection pattern provides a clear extension point where custom
    data fetching logic can be inserted into the data acquisition pipeline before falling back to default
    providers.
  evidence: xalpha/universal.py:1001(set_handler)
  stage: data_acquisition
  alternative_considered: Could have used decorator pattern but handler injection is more flexible for
    runtime configuration
- id: BD-002
  type: B
  content: Multiple provider fallback chain
  rationale: Single asset code can be fetched from different sources based on format detection; provides
    resilience when APIs change. The fallback chain ensures data availability even when primary providers
    fail or change their APIs, with automatic format-based routing to the appropriate provider.
  evidence: xalpha/universal.py:1012(_get_daily)
  stage: data_acquisition
  alternative_considered: Single provider approach would create single point of failure; hardcoded provider
    per asset type would be less flexible
  vague_rationale: true
- id: BD-003
  type: M
  content: Base64-encoded jq credentials storage
  rationale: Simple encoding warns users of security trade-off without requiring full encryption infrastructure.
    Base64 provides minimal obfuscation suitable for non-production use while clearly signaling that credentials
    are not truly encrypted, avoiding user misconception while keeping implementation simple.
  evidence: xalpha/provider.py:25(module)
  stage: data_acquisition
  alternative_considered: Full encryption would add dependencies; plaintext would mislead users about
    security level
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/provider.py'
- id: BD-004
  type: BA
  content: Increment IO pattern in basicinfo
  rationale: Fetch-then-update pattern avoids re-downloading full history; saves bandwidth and API rate
    limits. The incremental update approach downloads only new data since last known date, reducing network
    overhead and respecting API constraints while maintaining data freshness.
  evidence: xalpha/info.py:323(module)
  stage: info_and_pricing
  alternative_considered: Full refresh would be simpler but wasteful; manual intervention would be error-prone
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/info.py'
- id: BD-005
  type: M
  content: Fee info parsed from Chinese text strings
  rationale: Redemption tiers encoded as natural language parsed at runtime; avoids hardcoded data maintenance.
    The runtime parsing approach allows fee structures to be extracted from official fund documents without
    maintaining separate configuration files, reducing synchronization overhead between documentation
    and code.
  evidence: xalpha/info.py:658(_feepreprocess)
  stage: info_and_pricing
  alternative_considered: Hardcoded fee tables require manual updates; separate config file adds synchronization
    complexity
- id: BD-006
  type: M/BA
  content: Dividend handling via comment column magic value 0.05
  rationale: Magic value 0.05 in status table signals dividend reinvestment; avoids schema changes. This
    convention leverages the existing status column to encode dividend reinvestment behavior without requiring
    database schema modifications or additional columns.
  evidence: xalpha/policy.py:71(module)
  stage: info_and_pricing
  alternative_considered: New status type column would require schema migration; separate dividend table
    adds join complexity
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/policy.py'
- id: BD-007
  type: M
  content: Value-based redemption only for monetary funds
  rationale: value_label=1 (sell by amount not shares) only accurate for mfundinfo; others reject to avoid
    precision loss. Monetary funds are priced at constant NAV per unit, making amount-based redemption
    mathematically equivalent to share-based, while other funds require share-based accounting for proper
    cost basis tracking.
  evidence: xalpha/info.py:309(module)
  stage: info_and_pricing
  alternative_considered: Always use share-based would complicate monetary fund redemption; always use
    amount-based would cause precision errors
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/info.py'
- id: BD-008
  type: M
  content: Nested list for position tracking over DataFrame
  rationale: Nested [[date, share], ...] chosen for FIFO operations; works for sequential processing.
    The nested list structure provides direct access to FIFO queue elements without DataFrame overhead,
    enabling efficient front-of-queue operations essential for position tracking during trade execution.
  evidence: xalpha/remain.py:17(copy)
  stage: position_tracking
  alternative_considered: DataFrame would provide better validation but slower FIFO operations; dedicated
    queue class adds dependencies
- id: BD-009
  type: BA
  content: Silent sell-each when selling more than owned
  rationale: Clips to available shares instead of raising error; enables virtual 'sell everything' without
    validation failures. This behavior supports natural user intent where selling more than owned simply
    means selling each available shares, avoiding unnecessary error handling in batch processing scenarios.
  evidence: xalpha/remain.py:63(module)
  stage: position_tracking
  alternative_considered: Raise error would force explicit handling everywhere; partial sell with warning
    requires complex notification system
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/remain.py'
- id: BD-010
  type: M
  content: Share coefficient (trans) for fund mergers/splits
  rationale: Funds can undergo consolidation/division affecting share counts; trans() adjusts each historical
    positions proportionally. The share coefficient allows accurate position history reconstruction after
    corporate actions, maintaining cost basis integrity across fund restructuring events.
  evidence: xalpha/remain.py:82(module)
  stage: position_tracking
  alternative_considered: Creating new position records would break history continuity; ignoring mergers
    would corrupt cost basis
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/remain.py'
- id: BD-011
  type: B
  content: TradeBehaviorError on sell-before-buy
  rationale: Strict validation prevents impossible scenarios; consistent with real fund account constraints.
    In Chinese mutual fund accounting, selling shares before purchasing them is physically impossible,
    so enforcing this constraint at the business logic level prevents data integrity violations that would
    propagate to incorrect NAV calculations.
  evidence: xalpha/trade.py:404(module)
  stage: trade_accounting
  alternative_considered: Allowing short positions would violate fund accounting principles; silent clipping
    would hide data issues
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/trade.py'
- id: BD-012
  type: M
  content: 'Binary encoding for fractional fee (issue #59)'
  rationale: Encoding 0.5 in fee position distinguishes 10000.50 vs 10000.005 due to float precision issues.
    The binary encoding scheme uses the 0.5 position as a marker to disambiguate fee values that would
    otherwise be indistinguishable due to floating-point representation limitations in Python.
  evidence: xalpha/trade.py:390(module)
  stage: trade_accounting
  alternative_considered: Decimal arithmetic would be slower; string representation adds parsing overhead
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/trade.py'
- id: BD-013
  type: BA/DK
  content: Date shifting for non-trading days
  rationale: User records may use calendar dates; system shifts to next valid trading day and warns on
    collision. This accommodation handles the common case where users record trades on non-trading days
    by automatically adjusting to the next valid trading date while alerting users to potential timing
    mismatches.
  evidence: xalpha/trade.py:427(module)
  stage: trade_accounting
  alternative_considered: Reject non-trading dates would frustrate users; no warning would hide timing
    issues
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/trade.py'
- id: BD-014
  type: B
  content: cftable and remtable must both be provided or both None
  rationale: Incremental accounting requires consistent state; raising ValueError enforces the invariant
    that cash flow and remaining position tables must be updated together. This constraint ensures that
    partial updates cannot corrupt the accounting state during incremental processing.
  evidence: xalpha/trade.py:325(module)
  stage: trade_accounting
  alternative_considered: Partial initialization would require complex recovery logic; optional tables
    would create ambiguity
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/trade.py'
- id: BD-015
  type: BA/M
  content: mulfix uses virtual cash (mf) for closed system
  rationale: Uninvested cash treated as monetary fund to enable unitvalue calculation; essential for mulfix.indicator
    mixin. By modeling cash as a monetary fund position, the portfolio can calculate unit values and performance
    metrics even when not fully invested, providing continuous NAV visibility.
  evidence: xalpha/multiple.py:611(_vcash)
  stage: portfolio_management
  alternative_considered: Separate cash tracking would complicate unit value formula; ignoring cash would
    understate portfolio value
- id: BD-016
  type: M
  content: Property bitmask for fund characteristics
  rationale: round_label=1, dividend_label=2, value_label=4 combined additively; compact encoding similar
    to Unix file permissions. The bitmask approach stores multiple boolean properties in a single integer
    field, reducing storage and enabling efficient bitwise operations for property checks while maintaining
    readability through named constants.
  evidence: xalpha/multiple.py:89(module)
  stage: portfolio_management
  alternative_considered: Separate boolean columns would be clearer but less compact; tuple/set would
    be slower
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/multiple.py'
- id: BD-017
  type: BA
  content: Holdings穿透 via quarterly reports
  rationale: 穿透 holdings only available via quarterly disclosure; positions are estimates until next report.
    Chinese fund regulations require quarterly holdings disclosure, so穿透 calculations use the most recent
    available data, with explicit acknowledgment that interim positions are estimates based on reported
    trades.
  evidence: xalpha/multiple.py:259(module)
  stage: portfolio_management
  alternative_considered: Daily穿透 would require real-time position data not available; ignoring穿透 would
    miss portfolio structure
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/multiple.py'
- id: BD-018
  type: BA
  content: Policy inherits from record
  rationale: policy.status IS a record.status; polymorphism enables both manual records and generated
    policies to feed trade module. The inheritance relationship means generated trading policies produce
    status entries compatible with the trade accounting system, allowing seamless integration of automated
    and manual trading decisions.
  evidence: xalpha/policy.py:12(module)
  stage: policy_generation
  alternative_considered: Separate policy/record types would require adapter layer; protocol-based approach
    would be more complex
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/policy.py'
- id: BD-019
  type: M/BA
  content: Negative values in status table mean sell
  rationale: 'Convention: negative = sell. The sign of the status value encodes the action direction,
    with positive values indicating buy and negative values indicating sell. The 0.005 multiplier marks
    dividend reinvestment versus actual sell, providing a compact encoding within the existing numeric
    field.'
  evidence: xalpha/policy.py:46(module)
  stage: policy_generation
  alternative_considered: Separate action column would be clearer; enum field would require schema changes
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/policy.py'
- id: BD-020
  type: M
  content: Grid strategy uses internal position counter (pos)
  rationale: Stateful tracking of current grid level; survives across status_gen calls. The internal position
    counter maintains the grid trading state between policy generation calls, enabling the grid strategy
    to make sequential decisions based on accumulated position rather than requiring state to be passed
    externally.
  evidence: xalpha/policy.py:211(module)
  stage: policy_generation
  alternative_considered: External state passing would complicate API; stateless grid would require complex
    history reconstruction
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/policy.py'
- id: BD-021
  type: B
  content: BTE.run is abstract method pattern
  rationale: Template method with subclass hooks prepare()->run()->backtest(); enables user-defined strategies.
    The abstract base class defines the backtesting lifecycle while delegating strategy-specific logic
    to subclasses, providing a clear extension pattern for implementing custom trading strategies.
  evidence: xalpha/backtest.py:61(module)
  stage: backtesting
  alternative_considered: Configuration-based strategy would be less flexible; monolithic strategy class
    would be harder to maintain
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/backtest.py'
- id: BD-022
  type: B
