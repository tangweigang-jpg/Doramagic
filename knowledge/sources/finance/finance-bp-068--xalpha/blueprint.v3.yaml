replaceable_slots:
- id: slot-001
  name: market_data_primary
  description: 根据数据类型选择：基金数据用天天基金，股票K线用雪球，外汇/大宗商品用英为财情
  used_in_stages: []
  options:
  - name: 天天基金网
    traits:
    - fund-focused
    - China-only
    - real-time-estimate
    fit_for:
    - 中国公募基金净值、费率、持仓数据获取
    not_fit_for:
    - 国际市场数据、股票实时行情
  - name: 雪球
    traits:
    - multi-market
    - real-time
    - no-auth
    fit_for:
    - A股、港股、美股、ETF的K线和实时行情
    not_fit_for:
    - 基金详细持仓、宏观数据
  - name: 新浪财经
    traits:
    - real-time
    - China-focused
    - backup-source
    fit_for:
    - A股、港股、美股实时行情（作为雪球备选）
    not_fit_for:
    - 历史数据、基金数据
  - name: 英为财情
    traits:
    - global
    - historical
    - web-scraping
    fit_for:
    - 全球金融产品历史价格、外汇、大宗商品
    not_fit_for:
    - 需要认证的实时数据、中国基金数据
  default: 天天基金网（基金）、雪球（股票）
  _source: worker_resource
- id: slot-002
  name: premium_data_source
  description: 需要指数PEB、成分股权重时使用聚宽；需要财务报表详细数据可考虑Tushare
  used_in_stages: []
  options:
  - name: 聚宽
    traits:
    - professional
    - PEB
    - index-constituents
    - macro
    fit_for:
    - 指数PEB计算、成分股权重、宏观数据、基金份额
    not_fit_for:
    - 免费用户数据量有限、实时性要求高
  - name: Tushare
    traits:
    - professional
    - China-stocks
    - financial-statements
    fit_for:
    - A股财务数据、公告数据
    not_fit_for:
    - 基金数据、国际市场
  - name: AKShare
    traits:
    - open-source
    - multi-source
    - China-focused
    fit_for:
    - 综合中国金融市场数据，开源替代
    not_fit_for:
    - 国际市场、PEB计算
  default: 无（使用免费数据源）
  _source: worker_resource
- id: slot-003
  name: local_storage
  description: 个人使用选择CSV；需要结构化查询选择SQLite；生产环境选择PostgreSQL或MySQL
  used_in_stages: []
  options:
  - name: CSV文件
    traits:
    - simple
    - portable
    - human-readable
    fit_for:
    - 个人使用、简单备份、小数据量
    not_fit_for:
    - 多用户、高并发、大数据量
  - name: SQLite
    traits:
    - embedded
    - serverless
    - relational
    fit_for:
    - 本地应用、单一用户、中等数据量
    not_fit_for:
    - 分布式、多进程写入
  - name: PostgreSQL
    traits:
    - production
    - concurrent
    - robust
    fit_for:
    - 生产环境、多用户、高可用需求
    not_fit_for:
    - 简单个人使用
  - name: MySQL
    traits:
    - production
    - popular
    - cloud-native
    fit_for:
    - 生产环境、已有MySQL基础设施
    not_fit_for:
    - 简单个人使用
  default: CSV文件
  _source: worker_resource
- id: slot-004
  name: visualization
  description: 需要交互式K线用pyecharts；简单静态图用matplotlib
  used_in_stages: []
  options:
  - name: pyecharts
    traits:
    - interactive
    - web-based
    - China-friendly
    fit_for:
    - 交互式K线图、复杂图表、Jupyter Notebook
    not_fit_for:
    - 简单静态图、纯后端使用
  - name: matplotlib
    traits:
    - static
    - mature
    - universal
    fit_for:
    - 简单折线图、散点图、基础分析图
    not_fit_for:
    - 交互式图表、复杂K线
  - name: plotly
    traits:
    - interactive
    - web-ready
    - modern
    fit_for:
    - 现代Web应用、仪表盘
    not_fit_for:
    - 需要离线使用、简单图表
  default: pyecharts
  _source: worker_resource
- id: slot-005
  name: http_client
  description: 当前实现已足够，大多数场景不需要替换
  used_in_stages: []
  options:
  - name: requests
    traits:
    - synchronous
    - simple
    - standard
    fit_for:
    - 标准HTTP请求、大部分场景
    not_fit_for:
    - 高并发、异步需求
  - name: httpx
    traits:
    - async
    - modern
    - HTTP/2
    fit_for:
    - 异步数据获取、高并发场景
    not_fit_for:
    - 同步代码、简单场景
  default: requests（内置重试机制）
  _source: worker_resource
