# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-068
name: xalpha
sop_version: '3.6'
source:
  projects:
  - xalpha
  commit_hash: 48fa330828012a7eab4e01eef68aafa5745c327d
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Investment fund portfolio management, backtesting, and analysis
  description: xalpha provides comprehensive fund investment management for Chinese financial markets,
    covering data acquisition, pricing, position tracking, trade accounting, portfolio aggregation, trading
    policy generation, backtesting, and technical analysis.
  prerequisites: Python 3, pandas, scipy, basic understanding of fund investment concepts and Chinese
    A-share market
  not_suitable_for: Real-time trading execution, non-Chinese market primary focus, high-frequency trading
    strategies, professional-grade risk management requiring regulatory compliance
  activation:
    triggers:
    - When a user asks for financial analysis or data mining via natural language
    - When extending xalpha data classes with new attributes
    - When debugging data fetching issues
    - When generating analytical reports or dashboards
    emphasis:
    - Be PROACTIVE when data sources fail — autonomously debug and propose fixes rather than asking for
      every decision
    - WRITE CODE, not just explanations — the platform identity demands executable results, not documentation
    - SYNTHESIZE and present clearly — final output should be backed by actual mined data
    anti_skip:
    - Don't skip compatibility testing because versions 'should be similar' — pandas 2.x and 3.x have
      breaking changes that silently corrupt data
    - Don't skip schema preservation because 'close enough' data works in testing — downstream consumers
      depend on exact column structure
    - Don't add defensive try-except because 'it might fail' — this hides the root cause and makes debugging
      harder
stages:
- id: data_acquisition
  name: Data Acquisition & Caching
  order: 1
  responsibility: 'Fetch historical and real-time market data from multiple providers with transparent
    caching layer. WHY: To unify heterogeneous data sources (Eastmoney, Xueqiu, Yahoo, etc.) into a consistent
    interface.'
  interface:
    inputs:
    - code (str), date ranges, provider hints
    outputs:
    - pd.DataFrame with date/OHLCV columns
  required_methods:
  - name: vinfo.vinfo
    description: Generic wrapper making any get_daily asset behave like fundinfo
    evidence: xalpha/universal.py:2798
  - name: get_daily
    description: Universal fetcher for daily historical data from multiple providers
    evidence: xalpha/universal.py:1012
  - name: get_rt
    description: Universal fetcher for real-time price quotes
    evidence: xalpha/universal.py:1782
  - name: cachedio
    description: TTL-aware caching decorator for I/O operations to reduce redundant fetches
    evidence: xalpha/universal.py:1964
  key_behaviors:
  - behavior: Handler pattern for data source injection
    description: Allows users to inject custom fetch logic before default sources are tried, enabling
      offline data or mock sources
    evidence: xalpha/universal.py:1001(set_handler)
  - behavior: Multiple provider fallback chain
    description: Single asset code can be fetched from different sources based on format detection; provides
      resilience when APIs change
    evidence: xalpha/universal.py:1012(_get_daily)
  - behavior: Transparent TTL caching
    description: Memory caching avoids duplicate fetches; base64-encoded credentials provide simple security
      without full encryption infrastructure
    evidence: xalpha/provider.py:25
  replaceable_points:
  - name: data_source_handler
    description: Custom hook for get_daily/get_rt to inject alternative data providers
    options:
    - name: auto-detection
      traits:
      - automatic provider selection
      - fallback chain
      - format-based routing
      fit_for:
      - general use
      - most asset types
      not_fit_for:
      - specific provider requirements
      - mock data testing
    - name: xueqiu
      traits:
      - Xueqiu (Snowball) integration
      - Chinese market focus
      fit_for:
      - Chinese stocks and funds
      not_fit_for:
      - International markets
      - non-Chinese assets
    - name: eastmoney
      traits:
      - Eastmoney integration
      - Fund-specific data
      fit_for:
      - Chinese mutual funds
      - ETF data
      not_fit_for:
      - US markets
      - forex
    - name: yahoo
      traits:
      - Yahoo Finance API
      - International market coverage
      fit_for:
      - US stocks
      - global indices
      - commodities
      not_fit_for:
      - Chinese A-shares
      - fund-specific data
    - name: custom
      traits:
      - User-defined provider
      - Full control
      - Offline data support
      fit_for:
      - Testing
      - proprietary data sources
      - mock data
      not_fit_for:
      - Production without proper implementation
    default: auto-detection
  design_decisions:
  - Handler pattern for data source injection - Allows users to inject custom fetch logic before default
    sources are tried (xalpha/universal.py:1001)
  - Multiple provider fallback chain - Single asset code can be fetched from different sources based on
    format detection (xalpha/universal.py:1012)
  - Base64-encoded jq credentials storage - Simple encoding warns users of security trade-off without
    requiring full encryption infrastructure (xalpha/provider.py:25)
  acceptance_hints:
  - get_daily returns DataFrame with date, OHLCV columns for valid asset codes
  - get_rt returns current price within 5 seconds
  - Cached data is returned without network requests for repeated calls
  - set_handler successfully overrides default provider behavior
- id: info_and_pricing
  name: Fund/Index Information & Pricing
  order: 2
  responsibility: 'Core data model for investment products. Encapsulates daily price tables, fee structures,
    and redemption rules. WHY: Different product types (fund, index, cash) share common interface but
    have different pricing behaviors.'
  interface:
    inputs:
    - code (str), fetch/save flags, IO path
    outputs:
    - price DataFrame, fee info, holdings data
  required_methods:
  - name: basicinfo.__init__
    description: Abstract base for each info types with fetch/save logic and increment IO pattern
    evidence: xalpha/info.py:296
  - name: fundinfo
    description: Out-of-exchange fund with fee/discount parsing and stock holdings retrieval
    evidence: xalpha/info.py:508
  - name: mfundinfo
    description: Monetary fund with daily interest accrual calculation
    evidence: xalpha/info.py:1436
  - name: indexinfo
    description: Market index with normalized and total value tracking
    evidence: xalpha/info.py:1236
  - name: cashinfo
    description: Virtual cash for portfolio baseline and buffer management
    evidence: xalpha/info.py:1400
  key_behaviors:
  - behavior: Increment IO pattern in basicinfo
    description: Fetch-then-update pattern avoids re-downloading full history; saves bandwidth and API
      rate limits
    evidence: xalpha/info.py:323
  - behavior: Fee info parsed from Chinese text strings
    description: Redemption tiers encoded as natural language parsed at runtime; fragile but avoids hardcoded
      data maintenance
    evidence: xalpha/info.py:658(_feepreprocess)
  - behavior: Dividend handling via comment column magic value
    description: 0.05 in status table signals dividend reinvestment; unconventional but avoids schema
      changes
    evidence: xalpha/policy.py:71
  - behavior: Value-based redemption only for monetary funds
    description: value_label=1 (sell by amount not shares) only accurate for mfundinfo; others reject
      to avoid precision loss
    evidence: xalpha/info.py:309
  replaceable_points:
  - name: fee_parser
    description: Redemption rate extraction mechanism
    options:
    - name: _piecewise text parser
      traits:
      - Natural language parsing
      - Chinese text handling
      - No external data needed
      fit_for:
      - Standard Chinese fund prospectuses
      - Most mainland funds
      not_fit_for:
      - Non-Chinese funds
      - Non-standard fee formats
      - PDF-only prospectuses
    - name: structured dict input
      traits:
      - Explicit fee schedule
      - Precise control
      - No parsing required
      fit_for:
      - Custom fee structures
      - Testing scenarios
      - API-driven fee data
      not_fit_for:
      - Quick setup from web data
      - Natural language input
    default: _piecewise text parser
  - name: info_source
    description: Data backend for info storage and retrieval
    options:
    - name: csv
      traits:
      - Flat file storage
      - Human readable
      - Easy backup
      fit_for:
      - Individual use
      - Version control
      - Simple deployment
      not_fit_for:
      - Multi-user systems
      - High-frequency updates
      - Large portfolios
    - name: sql
      traits:
      - Database storage
      - Queryable
      - Concurrent access
      fit_for:
      - Production systems
      - Multiple funds
      - Complex queries
      not_fit_for:
      - Simple local setups
      - Quick prototyping
    - name: memory
      traits:
      - No persistence
      - Fast access
      - Session-only
      fit_for:
      - One-time analysis
      - Temporary data
      - Testing
      not_fit_for:
      - Persistent storage
      - Long-running applications
    default: csv
  design_decisions:
  - Increment IO pattern in basicinfo - Fetch-then-update pattern avoids re-downloading full history (xalpha/info.py:323)
  - Fee info parsed from Chinese text strings - Redemption tiers encoded as natural language parsed at
    runtime (xalpha/info.py:658)
  - Dividend handling via comment column magic value 0.05 - Signals dividend reinvestment avoiding schema
    changes (xalpha/policy.py:71)
  - Value-based redemption only for monetary funds - value_label=1 only accurate for mfundinfo (xalpha/info.py:309)
  acceptance_hints:
  - fundinfo.price DataFrame contains date, netvalue, totvalue, comment columns
  - Fee structure correctly parsed from Chinese text tiers
  - fetch=True loads from local cache; fetch=False forces remote fetch
  - save=True persists updated data to specified path
- id: position_tracking
  name: Position Tracking & FIFO
  order: 3
  responsibility: 'Track remaining shares across time with FIFO sell logic. WHY: Chinese funds have different
    redemption fees by holding period, requiring position-level tracking.'
  interface:
    inputs:
    - rem (nested list), share amount, date
    outputs:
    - (sold_rem, new_rem) tuple
  required_methods:
  - name: remain.buy
    description: Add position to rem table maintaining FIFO order
    evidence: xalpha/remain.py:25
  - name: remain.sell
    description: FIFO sell reducing oldest positions first, returns tuple of sold and remaining positions
    evidence: xalpha/remain.py:49
  - name: remain.trans
    description: Fund share coefficient adjustment for mergers/splits affecting each historical positions
    evidence: xalpha/remain.py:82
  key_behaviors:
  - behavior: Nested list for position tracking
    description: Nested [[date, share], ...] format chosen for FIFO operations; acknowledged as fragile
      but works for sequential processing
    evidence: xalpha/remain.py:17(copy)
  - behavior: Silent sell-each when selling more than owned
    description: Clips to available shares instead of raising error; enables virtual 'sell everything'
      without validation failures
    evidence: xalpha/remain.py:63
  - behavior: Share coefficient (trans) for fund mergers/splits
    description: Funds can undergo consolidation/division affecting share counts; trans() adjusts each
      historical positions proportionally
    evidence: xalpha/remain.py:82
  replaceable_points:
  - name: position_accounting
    description: Share reduction strategy when selling
    options:
    - name: FIFO
      traits:
      - First-in-first-out
      - Oldest shares sold first
      - Holding period tracking
      fit_for:
      - Chinese funds with time-based redemption fees
      - Tax optimization
      not_fit_for:
      - Equal-weight allocation desired
      - LIFO preference
    - name: LIFO
      traits:
      - Last-in-first-out
      - Newest shares sold first
      fit_for:
      - Short-term positions
      - Different accounting requirements
      not_fit_for:
      - Chinese fund fee structures
      - Tax optimization
    - name: average cost
      traits:
      - Average cost basis
      - No position age tracking
      - Simplified accounting
      fit_for:
      - Simple portfolio views
      - Equal treatment
      not_fit_for:
      - Time-based fee calculation
      - Holding period requirements
    default: FIFO
  design_decisions:
  - Nested list for position tracking over DataFrame - [[date, share], ...] chosen for FIFO operations
    (xalpha/remain.py:17)
  - Silent sell-each when selling more than owned - Clips to available shares instead of raising error
    (xalpha/remain.py:63)
  - Share coefficient (trans) for fund mergers/splits - trans() adjusts each historical positions proportionally
    (xalpha/remain.py:82)
  acceptance_hints:
  - Position dates are strictly increasing; out-of-order inserts raise Exception
  - FIFO correctly orders sell transactions by purchase date
  - Trans coefficient correctly scales each historical share counts
  - Remtable nested list format preserved across operations
- id: trade_accounting
  name: Trade Accounting & Cash Flow
  order: 4
  responsibility: 'Convert user transaction records into precise cash flow tables and position snapshots.
    WHY: User records are simplified (just amounts) but need conversion to shares, fees, and FIFO positions
    for accurate XIRR calculation.'
  interface:
    inputs:
    - infoobj, status table (dates + amounts)
    outputs:
    - cftable (cash flows), remtable (position history), daily reports
  required_methods:
  - name: trade.__init__
    description: Out-of-exchange fund trade accounting with fee calculation and position tracking
    evidence: xalpha/trade.py:305
  - name: itrade.__init__
    description: In-exchange trade accounting for stocks, ETF-LOF with exact share calculations
    evidence: xalpha/trade.py:726
  - name: xirrcal.xirrcal
    description: Irregular cash flow XIRR calculation via scipy.optimize Newton-Raphson
    evidence: xalpha/trade.py:31
  key_behaviors:
  - behavior: TradeBehaviorError on sell-before-buy
    description: Strict validation prevents impossible scenarios; consistent with real fund account constraints
    evidence: xalpha/trade.py:404
  - behavior: Binary encoding for fractional fee
    description: 0.5 in fee position distinguishes 10000.50 vs 10000.005 due to float precision issues
    evidence: xalpha/trade.py:390
  - behavior: Date shifting for non-trading days
    description: User records may use calendar dates; system shifts to next valid trading day with collision
      warning
    evidence: xalpha/trade.py:427
  - behavior: cftable and remtable invariant enforcement
    description: Incremental accounting requires consistent state; raising ValueError enforces both must
      be provided or both None
    evidence: xalpha/trade.py:325
  replaceable_points:
  - name: xirr_algorithm
    description: IRR calculation method for cash flow analysis
    options:
    - name: scipy.optimize
      traits:
      - Newton-Raphson method
      - Well-tested
      - Standard in scientific Python
      fit_for:
      - Most use cases
      - Single portfolio XIRR
      not_fit_for:
      - High-precision requirements
      - Edge case convergence
    - name: numpy f2py
      traits:
      - Fortran-based
      - High precision
      - Compiled code
      fit_for:
      - Performance-critical applications
      - Batch calculations
      not_fit_for:
      - Users without Fortran compiler
      - Debugging needs
    default: scipy.optimize
  design_decisions:
  - TradeBehaviorError on sell-before-buy - Strict validation prevents impossible scenarios (xalpha/trade.py:404)
  - Binary encoding for fractional fee - 0.5 in fee position distinguishes precision (xalpha/trade.py:390)
  - Date shifting for non-trading days - Shifts to next valid trading day with warning (xalpha/trade.py:427)
  - cftable and remtable must both be provided or both None - Incremental accounting invariant (xalpha/trade.py:325)
  acceptance_hints:
  - Status table converts correctly to cftable with proper cash flow signs
  - XIRR calculation converges for valid cash flow sequences
  - No same-day buy+sell operations allowed
  - Date conflicts resolved with appropriate warnings
- id: portfolio_management
  name: Portfolio Aggregation & Analysis
  order: 5
  responsibility: 'Combine multiple trades into unified view with XIRR, holdings, and sector exposure.
    WHY: Users have multi-fund portfolios needing aggregate metrics and position-level analysis.'
  interface:
    inputs:
    - multiple trade/record objects
    outputs:
    - aggregate reports, combined XIRR, sector allocations
  required_methods:
  - name: mul.__init__
    description: Multi-fund open portfolio with cash flow aggregation and combined XIRR calculation
    evidence: xalpha/multiple.py:32
  - name: mulfix.__init__
    description: Closed portfolio with virtual cash buffer for uninvested capital
    evidence: xalpha/multiple.py:552
  - name: imul.__init__
    description: In-exchange portfolio analysis for stocks and ETF-LOF
    evidence: xalpha/multiple.py:651
  key_behaviors:
  - behavior: mulfix virtual cash handling
    description: Uninvested cash treated as monetary fund to enable unitvalue calculation; essential for
      mulfix.indicator mixin
    evidence: xalpha/multiple.py:611(_vcash)
  - behavior: Property bitmask for fund characteristics
    description: round_label=1, dividend_label=2, value_label=4 combined additively; compact encoding
      similar to Unix file permissions
    evidence: xalpha/multiple.py:89
  - behavior: Holdings穿透 via quarterly reports
    description: Only quarterly disclosure available; positions are estimates until next report
    evidence: xalpha/multiple.py:259
  replaceable_points:
  - name: portfolio_type
    description: Portfolio model for capital availability
    options:
    - name: mul (open)
      traits:
      - External cash flows
      - Capital enters/exits
      - Realistic for most investors
      fit_for:
      - Ongoing investment
      - Periodic contributions
      - Retirement accounts
      not_fit_for:
      - Fixed capital experiments
      - Closed-end analysis
    - name: mulfix (closed)
      traits:
      - Fixed initial capital
      - Virtual cash buffer
      - Clean unit value
      fit_for:
      - Strategy comparison
      - Fixed pool experiments
      - Performance benchmarking
      not_fit_for:
      - Variable investment amounts
      - Multiple contribution schedules
    default: mul (open)
  design_decisions:
  - mulfix uses virtual cash (mf) for closed system - Uninvested cash treated as monetary fund (xalpha/multiple.py:611)
  - Property bitmask for fund characteristics - round_label=1, dividend_label=2, value_label=4 combined
    (xalpha/multiple.py:89)
  - Holdings穿透 via quarterly reports - Only quarterly disclosure available (xalpha/multiple.py:259)
  acceptance_hints:
  - Combined XIRR calculated correctly across each trades
  - get_stock_holdings() returns underlying equity positions
  - get_industry() provides sector allocation breakdown
  - Virtual cash (mf) appears as monetary fund holding in mulfix
- id: policy_generation
  name: Trading Policy Generation
  order: 6
  responsibility: 'Generate transaction status tables from rules (scheduled, grid, indicator-based). WHY:
    Strategy backtesting needs systematic rule evaluation producing status tables consumable by trade
    module.'
  interface:
    inputs:
    - infoobj, parameters (dates, thresholds, indicators)
    outputs:
    - status DataFrame with positive (buy) / negative (sell) amounts
  required_methods:
  - name: policy.status_gen
    description: Template method for strategy generation; subclass must implement run logic
    evidence: xalpha/policy.py:23
  - name: buyandhold.run
    description: Initial purchase plus dividend reinvestment strategy
    evidence: xalpha/policy.py:60
  - name: scheduled.run
    description: Fixed-amount periodic investment strategy
    evidence: xalpha/policy.py:78
  - name: scheduled_window.run
    description: Variable amount based on recent price window analysis
    evidence: xalpha/policy.py:126
  - name: grid.run
    description: Grid trading with buy/sell bands at fixed price intervals
    evidence: xalpha/policy.py:185
  - name: indicator_cross.run
    description: MA or technical indicator crossover trading signals
    evidence: xalpha/policy.py:253
  - name: indicator_points.run
    description: Threshold-based indicator trading at specified levels
    evidence: xalpha/policy.py:304
  key_behaviors:
  - behavior: Policy inherits from record
    description: policy.status IS a record.status; polymorphism enables both manual records and generated
      policies to feed trade module
    evidence: xalpha/policy.py:12
  - behavior: Negative values convention for sell
    description: 'Convention: negative = sell. 0.005 multiplier marks dividend reinvestment vs actual
      sell'
    evidence: xalpha/policy.py:46
  - behavior: Stateful grid position tracking
    description: Grid strategy uses internal position counter (pos) that survives across status_gen calls
    evidence: xalpha/policy.py:211
  - behavior: Every dates generated then filtered
    description: pandas.date_range generates each dates, then filtered by status_gen; creates empty entries
    evidence: xalpha/policy.py:38-46
  replaceable_points:
  - name: policy_type
    description: Trading strategy generation method
    options:
    - name: buyandhold
      traits:
      - Single initial purchase
      - Dividend reinvestment
      - Minimal management
      fit_for:
      - Long-term investors
      - Passive strategies
      - Retirement accounts
      not_fit_for:
      - Active trading
      - Market timing
      - Tax optimization
    - name: scheduled
      traits:
      - Periodic fixed amount
      - Dollar-cost averaging
      - Regular intervals
      fit_for:
      - Regular savers
      - Stable income investors
      - Disciplined approach
      not_fit_for:
      - Lump sum investing
      - Opportunistic buying
      - Variable income
    - name: scheduled_window
      traits:
      - Variable amount based on price
      - Buy more when cheap
      - Value averaging
      fit_for:
      - Value investors
      - Contrarian strategies
      - Volatile markets
      not_fit_for:
      - Fixed budget requirements
      - Simple execution
    - name: grid
      traits:
      - Buy/sell bands
      - Automated high-low
      - Market-making style
      fit_for:
      - Range-bound markets
      - Volatile sideways
      - Grid traders
      not_fit_for:
      - Trending markets
      - Strong directional moves
    - name: indicator_cross
      traits:
      - MA crossover signals
      - Technical analysis
      - Trend following
      fit_for:
      - Trend markets
      - Technical traders
      - Algorithmic systems
      not_fit_for:
      - Range-bound markets
      - Fundamental analysis
    - name: indicator_points
      traits:
      - Threshold-based signals
      - Level triggers
      - Configurable points
      fit_for:
      - Specific entry/exit levels
      - Custom indicators
      - Event-based
      not_fit_for:
      - Smooth transitions
      - Continuous signals
    default: buyandhold
  design_decisions:
  - Policy inherits from record - policy.status IS a record.status for polymorphism (xalpha/policy.py:12)
  - 'Negative values in status table mean sell - Convention: negative = sell (xalpha/policy.py:46)'
  - Grid strategy uses internal position counter (pos) - State survives across status_gen calls (xalpha/policy.py:211)
  acceptance_hints:
  - Status DataFrame contains date, code, amount columns
  - Positive amounts represent buys, negative represent sells
  - 0.005 multiplier correctly marks dividend reinvestment
  - Grid positions maintain state across multiple status_gen calls
- id: backtesting
  name: Backtesting Engine
  order: 7
  responsibility: 'Execute policy-driven trading simulation with cash tracking and P&L. WHY: Users need
    to test strategies against historical data before committing capital.'
  interface:
    inputs:
    - start/end dates, initial capital, strategy class
    outputs:
    - trade objects, mul/mulfix results
  required_methods:
  - name: BTE.backtest
    description: Base backtest environment with prepare()->run()->backtest() template method pattern
    evidence: xalpha/backtest.py:22
  - name: Scheduled.run
    description: Dumb periodic investment simulation at fixed intervals
    evidence: xalpha/backtest.py:249
  - name: AverageScheduled.run
    description: Value-averaging strategy with variable investment amounts
    evidence: xalpha/backtest.py:264
  - name: ScheduledSellonXIRR.run
    description: Periodic buy with XIRR threshold exit condition
    evidence: xalpha/backtest.py:293
  - name: Tendency28.run
    description: 20/80 trend rotation between two funds based on moving averages
    evidence: xalpha/backtest.py:329
  - name: Balance.run
    description: Periodic rebalancing to target weight allocations
    evidence: xalpha/backtest.py:401
  - name: Grid.run
    description: Grid trading simulation with buy/sell bands
    evidence: xalpha/backtest.py:446
  key_behaviors:
  - behavior: BTE.run is abstract method pattern
    description: 'Template method with subclass hooks: prepare()->run()->backtest(); enables user-defined
      strategies'
    evidence: xalpha/backtest.py:61
  - behavior: Business-day-only iteration
    description: Only Chinese trading days evaluated; opendate_set from holidays.csv filters calendar
      dates
    evidence: xalpha/backtest.py:72
  - behavior: F-prefixed codes resolved to fundinfo
    description: F prefix distinguishes backtest codes from vinfo stock codes; M prefix for mfundinfo
    evidence: xalpha/backtest.py:144
  replaceable_points:
  - name: backtest_strategy
    description: Trading logic executed per date in backtest simulation
    options:
    - name: Scheduled
      traits:
      - Fixed periodic investment
      - Simple
      - Dumb averaging
      fit_for:
      - Dollar-cost averaging backtest
      - Baseline comparison
      not_fit_for:
      - Complex exit conditions
      - Adaptive strategies
    - name: AverageScheduled
      traits:
      - Value averaging
      - Buy more when cheap
      - Variable amounts
      fit_for:
      - Contrarian backtest
      - Value investing strategies
      not_fit_for:
      - Fixed budget requirements
      - Simple DCA comparison
    - name: ScheduledSellonXIRR
      traits:
      - XIRR threshold exit
      - Profit-taking
      - Time-based holding
      fit_for:
      - Exit strategy testing
      - Profit optimization
      not_fit_for:
      - Long-only holding
      - Custom exit logic
    - name: Tendency28
      traits:
      - 20/80 rotation
      - Trend following
      - Dual fund
      fit_for:
      - Trend rotation backtest
      - Risk-on/risk-off testing
      not_fit_for:
      - Single fund analysis
      - Multi-asset rotation
    - name: Balance
      traits:
      - Target weight rebalancing
      - Periodic adjustment
      - Drift correction
      fit_for:
      - Portfolio allocation backtest
      - Risk parity testing
      not_fit_for:
      - Unconstrained strategies
      - Single asset
    - name: Grid
      traits:
      - Grid bands
      - Buy low sell high
      - Range trading
      fit_for:
      - Grid strategy backtest
      - Market-making simulation
      not_fit_for:
      - Trend-following
      - Directional strategies
    - name: custom BTE subclass
      traits:
      - User-defined logic
      - Full flexibility
      - Custom hooks
      fit_for:
      - Novel strategies
      - Proprietary algorithms
      not_fit_for:
      - Standard backtest needs
      - Quick testing
    default: BTE subclass with custom run() implementation
  design_decisions:
  - BTE.run is abstract method pattern - Template method with prepare()->run()->backtest() hooks (xalpha/backtest.py:61)
  - Business-day-only iteration - Only Chinese trading days evaluated (xalpha/backtest.py:72)
  - Backtest F-prefixed codes resolved to fundinfo - F prefix distinguishes backtest codes (xalpha/backtest.py:144)
  acceptance_hints:
  - Backtest runs only on Chinese trading days from holiday calendar
