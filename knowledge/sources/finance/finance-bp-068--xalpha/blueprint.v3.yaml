- from_stage: data_acquisition
  to_stage: trade_accounting
  data: daily price table for cash flow calculations
- from_stage: policy_generation
  to_stage: trade_accounting
  data: status DataFrame (date, code, amount) with positive buys and negative sells
- from_stage: trade_accounting
  to_stage: portfolio_management
  data: trade objects with cftable (date, cash, share) and remtable (date, rem nested list)
- from_stage: portfolio_management
  to_stage: backtesting
  data: mul/mulfix objects for position aggregation and XIRR calculation
- from_stage: backtesting
  to_stage: portfolio_management
  data: trade objects created during simulation
- from_stage: info_and_pricing
  to_stage: technical_indicators
  data: price table via bcmkset() benchmark setup
- from_stage: portfolio_management
  to_stage: technical_indicators
