- id: BD-028
  type: B
  content: Round half-up with Decimal for each monetary calculations to avoid floating point errors
  rationale: 'Decimal rounding with ROUND_HALF_UP ensures consistent, predictable monetary calculations
    across each financial computations. This eliminates cumulative floating-point errors that could cause
    portfolio value discrepancies. Boundary: each monetary values including fees, dividends, and share
