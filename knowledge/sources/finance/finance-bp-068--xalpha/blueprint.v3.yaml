  rationale: Only Chinese trading days evaluated; opendate_set from holidays.csv filters calendar dates.
    The backtesting engine iterates only over valid Chinese trading days, ensuring that performance metrics
    reflect actual tradable dates and avoiding artifacts from non-trading day price movements.
  evidence: xalpha/backtest.py:72(module)
  stage: backtesting
  alternative_considered: Calendar day iteration would include non-tradable dates; generic holiday handling
    would require more parameters
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/backtest.py'
- id: BD-023
  type: M
  content: Backtest F-prefixed codes resolved to fundinfo
  rationale: F prefix distinguishes backtest codes from vinfo stock codes. The namespace separation allows
    the backtesting system to unambiguously resolve fund codes versus stock codes, routing each to the
    appropriate information source while maintaining a unified code input format.
  evidence: xalpha/backtest.py:144(module)
  stage: backtesting
  alternative_considered: Separate code tables would require disambiguation logic; automatic detection
    would be error-prone
  _evidence_issues:
  - 'FN_NOT_FOUND: module in xalpha/backtest.py'
  vague_rationale: true
- id: BD-024
  type: B
  content: indicator as mixin not base class
  rationale: Multiple inheritance allows basicinfo+indicator and mulfix+indicator combinations; avoids
    diamond inheritance issues with explicit MRO. The mixin pattern enables indicator functionality to
