  stage: architecture
  alternative_considered: Direct unbuffered API calls for each request (higher cost, lower latency tolerance)
- id: BD-GAP-002
  type: B/BA
  content: Separate caching functions for real-time (rt) vs bar data, implying different refresh requirements
  rationale: Real-time data requires near-immediate freshness while bar data (OHLCV) can tolerate staleness
    for longer periods; splitting into distinct cache keys allows independent TTL policies and prevents
    cache pollution between data types
  evidence: doc/samples/qdiipred.py:21(cached_get_rt), doc/samples/qdiipred.py:26(cached_get_bar)
  stage: architecture
  alternative_considered: Unified cache with data-type parameter (harder to set per-type TTL)
  _evidence_issues:
  - 'INVALID_IDENTIFIER: cached_get_rt), doc/samples/qdiipred.py:26(cached_get_bar in doc/samples/qdiipred.py'
- id: BD-GAP-003
  type: T
  content: Generic function signatures using **kws and *args to decouple cache layer from data source
    API
  rationale: Financial data sources vary in parameter naming conventions (e.g., symbol vs code, interval
    vs period); passing through each kwargs allows the cache wrapper to work with any backend without
    modification, avoiding tight coupling to specific data provider APIs
  evidence: doc/samples/qdiipred.py:21(cached_get_rt), doc/samples/qdiipred.py:26(cached_get_bar)
  stage: design
  alternative_considered: Typed wrapper per data source (more maintenance, less flexible)
  _evidence_issues:
  - 'INVALID_IDENTIFIER: cached_get_rt), doc/samples/qdiipred.py:26(cached_get_bar in doc/samples/qdiipred.py'
- id: BD-GAP-004
  type: M
  content: Samples placed in doc/ directory for documentation and testing purposes
  rationale: Organizing sample scripts alongside documentation aids developer onboarding and serves as
    executable documentation; sample files with 'qdiipred' naming suggest demonstrating quantitative/technical
    analysis workflows
  evidence: doc/samples/qdiipred.py:1(module)
  stage: organization
  alternative_considered: Separate tests/samples directory (less discoverable for docs)
  _evidence_issues:
  - 'FN_NOT_FOUND: module in doc/samples/qdiipred.py'
