- id: BD-025
  type: BA
  content: bcmkset required before indicator use
  rationale: Explicit benchmark setup forces user awareness of comparison basis; no implicit default.
    Requiring explicit benchmark selection ensures users consciously choose their performance comparison
    baseline rather than accidentally using an inappropriate or unintended benchmark, improving result
