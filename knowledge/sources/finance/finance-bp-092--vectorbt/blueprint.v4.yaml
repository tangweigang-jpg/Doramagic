    - no-auth-required
    - good-coverage
    - unreliable
    fit_for:
    - Quick prototyping, educational use, free market data
    not_fit_for:
    - Production trading, latency-critical applications, high-frequency strategies
  - name: Binance Direct
    traits:
    - free-tier
    - low-latency
    - crypto-only
    fit_for:
    - Crypto trading strategies, real-time data
    not_fit_for:
    - Stock/fiat trading, multi-asset portfolios
  - name: CCXT (Multi-Exchange)
    traits:
    - 100+-exchanges
    - unified-api
    - crypto-centric
    fit_for:
    - Multi-exchange strategies, cross-exchange arbitrage
    not_fit_for:
    - Stock trading, if exchange not supported
  - name: Alpaca
    traits:
    - stocks-crypto
    - low-latency
    - auth-required
    fit_for:
    - US equity trading, broker API integration
    not_fit_for:
    - International markets, free-tier with 15min delay
  - name: Polygon.io
    traits:
    - stocks-crypto-forex
    - real-time
    - auth-required
    fit_for:
    - Professional trading, comprehensive market coverage
    not_fit_for:
    - Budget-constrained projects
  - name: Custom Data Class
    traits:
    - user-defined
    - any-source
    - database-compatible
    fit_for:
    - Proprietary data, SQL databases, CSV files, proprietary APIs
    not_fit_for:
    - Standard market data needs
  default: Yahoo Finance (yfinance)
  _source: worker_resource
- id: slot-002
  name: technical_indicators
  description: Use built-in for common indicators; choose pandas-ta for breadth without C dependencies;
    choose TA-Lib for professional performance
  used_in_stages: []
  options:
  - name: TA-Lib (C Library)
    traits:
    - fast
    - comprehensive
    - commercial-friendly
    fit_for:
    - Production systems, maximum performance, 200+ indicators
    not_fit_for:
    - Easy installation on Windows, macOS M1/M2
  - name: pandas-ta
    traits:
    - pure-python
    - 150+-indicators
    - easy-install
    fit_for:
    - Cross-platform compatibility, easy setup
    not_fit_for:
    - Maximum performance for large datasets
  - name: ta library
    traits:
    - pure-python
    - lightweight
    fit_for:
    - Simple TA needs, dependency minimization
    not_fit_for:
    - Comprehensive TA coverage
  - name: Built-in Indicators
    traits:
    - vectorized
    - 2d-array-native
    - no-dependency
    fit_for:
    - Most common indicators (MA, RSI, MACD, Bollinger Bands, ATR, OBV)
    not_fit_for:
    - Exotic/obscure indicators
  default: Built-in vectorbt indicators
  _source: worker_resource
- id: slot-003
  name: parallelization_backend
  description: Default for most use cases; Ray for cluster-scale optimization; sequential for debugging
  used_in_stages: []
  options:
  - name: Numba JIT (default)
    traits:
    - jit-compiled
    - single-machine
    - low-overhead
    fit_for:
    - Single-node parallel backtesting, most use cases
    not_fit_for:
    - Distributed computing, GPU workloads
  - name: Ray Distributed
    traits:
    - distributed
    - cluster-ready
    - fault-tolerant
    fit_for:
    - Large-scale hyperparameter sweeps, cluster computing
    not_fit_for:
    - Single-machine, small-scale backtesting
  - name: Sequential Python
    traits:
    - no-parallelism
    - debug-friendly
    fit_for:
    - Testing, small datasets, debugging
    not_fit_for:
    - Production, large parameter grids
  default: Numba JIT
  _source: worker_resource
- id: slot-004
  name: notification_channel
  description: Add Telegram for active monitoring; skip for batch/automated workflows
  used_in_stages: []
  options:
  - name: Telegram Bot
    traits:
    - push-notifications
    - interactive
    - chat-commands
    fit_for:
    - Real-time alerts, bot commands, portfolio monitoring
    not_fit_for:
    - Email-only users, corporate environments with Telegram blocks
  - name: None (no notifications)
    traits:
    - silent
    - no-dependency
    fit_for:
    - Batch analysis, non-interactive backtesting
    not_fit_for:
    - Live monitoring, automated trading
  default: None
  _source: worker_resource
- id: slot-005
  name: scheduling_system
  description: Built-in for simple needs; Celery for production/distributed systems
  used_in_stages: []
  options:
  - name: schedule (built-in)
    traits:
    - simple
    - in-process
    - pure-python
    fit_for:
    - Simple periodic data updates, single-process applications
    not_fit_for:
    - Distributed scheduling, complex cron patterns
  - name: APScheduler
    traits:
    - advanced
    - persistent
    - async-support
    fit_for:
    - Complex scheduling, persistent jobs, async applications
    not_fit_for:
    - Simple periodic tasks
  - name: Celery + Redis
    traits:
    - distributed
    - queue-based
    - monitoring
    fit_for:
    - Production deployments, distributed task queues
    not_fit_for:
    - Simple scripts, single-machine deployments
  default: schedule (built-in)
  _source: worker_resource
- id: slot-006
  name: visualization
  description: Plotly for interactive exploration; Matplotlib for publications; Dash for web deployment
  used_in_stages: []
  options:
  - name: Plotly (default)
    traits:
    - interactive
    - web-export
    - jupyter-native
    fit_for:
    - Interactive notebooks, web dashboards, HTML exports
    not_fit_for:
    - Publication-quality static figures
  - name: Matplotlib
    traits:
    - static
    - publication-quality
    - publication-ready
    fit_for:
    - Academic papers, static reports
    not_fit_for:
    - Interactive exploration
  - name: Dash
    traits:
    - web-dashboard
    - live-updates
    fit_for:
    - Production web dashboards, live trading views
    not_fit_for:
    - Notebook-only workflows
  default: Plotly
  _source: worker_resource
- id: slot-007
  name: data_caching
  description: In-memory for notebooks; joblib for persistence; Redis for distributed systems
  used_in_stages: []
  options:
  - name: In-Memory (default)
    traits:
    - fast
    - volatile
    - single-process
    fit_for:
    - Session-based analysis, single-user notebooks
    not_fit_for:
    - Multi-process, persistent cache
  - name: Disk Cache (joblib)
    traits:
    - persistent
    - disk-based
    fit_for:
    - Long-running analyses, cache reuse across sessions
    not_fit_for:
    - Distributed systems
  - name: Redis Cache
    traits:
    - distributed
    - persistent
    - network-accessible
    fit_for:
    - Multi-user environments, distributed computing
    not_fit_for:
    - Single-user notebooks
  default: In-Memory
  _source: worker_resource
