  content: Wait period defaults to 1 across future_mean/std/min/max functions, meaning labels are generated
    for the immediately next period by default rather than a longer lookahead
  rationale: Enables fast label generation for immediate next-bar prediction; breaks when studying longer-term
    patterns requiring wait > 1
  evidence: vectorbt/labels/nb.py:26(future_mean_apply_nb)
  stage: implementation
  alternative_considered: Could default to window size / 2
- id: BD-LBL-005
  type: B/BA
  content: EWM calculations use adjust=False by default, applying traditional exponential weighting without
    divide-by-zero correction for early window periods
  rationale: Traditional EWM behavior matches common trading platform defaults; breaks when NaN handling
    in early periods affects downstream calculations
  evidence: vectorbt/labels/nb.py:26(future_mean_apply_nb)
  stage: implementation
  alternative_considered: adjust=True for mathematically precise weights
