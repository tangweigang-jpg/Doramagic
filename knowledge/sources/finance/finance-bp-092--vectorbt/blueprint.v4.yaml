  _evidence_issues:
  - 'FN_NOT_FOUND: max_size in vectorbt/_settings.py'
- id: BD-030
  type: B/BA
  content: Default init_cash = 100.0 (finite starting capital)
  rationale: 'Fixed 100.0 unit starting capital enables reproducible simulations with clear reference
