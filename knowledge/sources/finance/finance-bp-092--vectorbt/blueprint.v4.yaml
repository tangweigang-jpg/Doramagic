# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-092
name: VectorBT
sop_version: '3.6'
source:
  projects:
  - vectorbt
  commit_hash: 993ceca7116fc8e55f4cd3a36fe43d83dab62b27
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Algorithmic trading backtesting and portfolio simulation
  description: Python library for rapid backtesting of thousands of trading strategies using vectorized
    operations on pandas/NumPy accelerated by Numba.
  prerequisites: Users should understand pandas DataFrames, trading concepts (entries/exits, long/short
    positions, fees/slippage), and basic statistical metrics (Sharpe ratio, drawdowns). Familiarity with
    Numba JIT compilation is helpful for custom indicators.
  not_suitable_for: Production trading systems requiring real-time order execution, market microstructure
    modeling, or regulatory reporting; strategies requiring sub-bar granularity or complex order types
    (conditional, iceberg, TWAP/VWAP); high-frequency trading where latency matters more than research
    speed.
stages:
- id: data_ingestion
  name: Data Ingestion
  order: 1
  responsibility: Downloads, updates, and manages market data from multiple sources (Yahoo Finance, Binance,
    CCXT, Alpaca, synthetic GBM). Ensures data alignment (same index/columns) across symbols to enable
    matrix operations in simulation.
  interface:
    inputs:
    - symbol names
    - date ranges
    - source-specific kwargs
    outputs:
    - Data object with dict of pd.Series/pd.DataFrame keyed by symbol
  required_methods:
  - name: Data.download
    description: Download data for one or multiple symbols from the configured data source
    evidence: vectorbt/data/base.py:291(class Data)
  - name: YFData.download_symbol
    description: Fetch data for a single symbol from Yahoo Finance
    evidence: vectorbt/data/custom.py:177(class YFData)
  - name: BinanceData.download_symbol
    description: Fetch data for a single symbol from Binance exchange
    evidence: vectorbt/data/custom.py:293(class BinanceData)
  - name: Data.concat
    description: Concatenate DataFrames into a dict keyed by column name for multi-symbol processing
    evidence: vectorbt/data/base.py:667(concat)
  key_behaviors:
  - behavior: Data alignment via align_index/align_columns
    description: Every symbols are aligned to a shared temporal index, which is required for matrix operations
      in simulation. This ensures consistent shape and index across each price series.
    evidence: vectorbt/data/base.py:372(align_index)
  - behavior: Plugin architecture for data sources
    description: Abstract download_symbol method forces subclass implementation, enabling the plugin architecture
      for adding new data sources beyond the built-in ones.
    evidence: vectorbt/data/base.py:544(download_symbol)
  - behavior: concat returns dict keyed by column name
    description: The concat method returns a dictionary keyed by column name rather than a single DataFrame,
      enabling easy column-wise access for multi-symbol processing.
    evidence: vectorbt/data/base.py:667(concat)
  replaceable_points:
  - name: download_symbol
    description: Method to fetch data for one symbol from a specific source
    options:
    - name: YFData.download_symbol
      traits:
      - Yahoo Finance API
      - free data source
      - daily/hourly granularity
      - no API key required
      fit_for:
      - Quick prototyping
      - US stocks
      - crypto with limited history
      not_fit_for:
      - High-frequency data
      - institutional data needs
      - real-time streaming
    - name: BinanceData.download_symbol
      traits:
      - Binance exchange API
      - crypto-native
      - 1m+ granularity
      - requires rate limiting handling
      fit_for:
      - Crypto strategies
      - high-frequency crypto data
      - futures data
      not_fit_for:
      - Stock strategies
      - data beyond exchange scope
    - name: CCXTData.download_symbol
      traits:
      - Universal exchange adapter
      - 100+ exchanges
      - standardized API
      fit_for:
      - Multi-exchange strategies
      - exchange-agnostic testing
      not_fit_for:
      - Single-source optimization
      - non-CCXT exchanges
    - name: GBMData.download_symbol
      traits:
      - Synthetic data generator
      - Geometric Brownian Motion
      - parameterized volatility/drift
      fit_for:
      - Strategy stress testing
      - Monte Carlo simulations
      - benchmark comparisons
      not_fit_for:
      - Real market data backtesting
      - regulatory approval
    default: User-defined Data subclass
  design_decisions:
  - Data aligned via align_index/align_columns to shared index ensures each symbols share same temporal
    index - required for matrix operations in simulation (vectorbt/data/base.py:372)
  - Abstract download_symbol forces subclass implementation because each data source has unique API; enables
    plugin architecture for new sources (vectorbt/data/base.py:544)
  - concat method returns dict keyed by column name for easy column-wise access for multi-symbol processing
    (vectorbt/data/base.py:667)
  acceptance_hints:
  - Every symbols share the same index after download (same start/end dates, same frequency)
  - Missing values handled consistently (forward fill or drop based on missing_index setting)
  - OHLCV columns present for price data, allowing indicator computation
- id: indicators
  name: Technical Indicators
  order: 2
  responsibility: Creates technical indicators (MA, RSI, MACD, Bollinger Bands, etc.) via IndicatorFactory.
    Supports parameter scanning, input/output naming, and multi-column output with parameter levels for
    vectorized backtesting across parameter spaces.
  interface:
    inputs:
    - price arrays (OHLCV)
    - parameter lists
    - input/output names
    outputs:
    - IndicatorBase with multi-index columns (symbol x param1 x param2...)
  required_methods:
  - name: IndicatorFactory.from_custom_func
    description: Create an indicator class from a custom NumPy/Numba function with parameter broadcasting
    evidence: vectorbt/indicators/factory.py:2616(from_custom_func)
  - name: IndicatorBase.run
    description: Execute the indicator with specified parameters across each combinations
    evidence: vectorbt/indicators/factory.py:2046(class IndicatorBase)
  - name: IndicatorFactory.from_talib
    description: Create indicator from TA-Lib function for battle-tested calculations
    evidence: vectorbt/indicators/factory.py:3387(from_talib)
  key_behaviors:
  - behavior: Factory pattern eliminates boilerplate
    description: User defines a compute function and the factory handles broadcasting, caching, indexing,
      and multi-index column generation. This eliminates repetitive code for every new indicator.
    evidence: vectorbt/indicators/factory.py:2616(from_custom_func)
  - behavior: Multi-index columns for parameter scanning
    description: Each parameter combination gets its own column level in a MultiIndex, enabling vectorized
      backtesting across the entire parameter space without loops.
    evidence: vectorbt/indicators/factory.py:1272(build_columns)
  - behavior: TA-Lib/pandas-ta/ta integration
    description: Built-in support for integrating battle-tested C/Python libraries (TA-Lib, pandas-ta)
      for indicator calculations, leveraging their optimized implementations.
    evidence: vectorbt/indicators/factory.py:3387(from_talib)
  replaceable_points:
  - name: custom_func
    description: Core calculation function for the indicator
    options:
    - name: talib functions
      traits:
      - C-optimized
      - 100+ indicators
      - widely tested
      fit_for:
      - Production indicators
      - standard technical analysis
      not_fit_for:
      - Custom proprietary indicators
      - non-standard calculations
    - name: pandas-ta functions
      traits:
      - Python-native
      - open source
      - pandas-based
      fit_for:
      - Pure Python stack
      - easy debugging
      not_fit_for:
      - Performance-critical scenarios
      - C library unavailable
    - name: user-defined njit functions
      traits:
      - Numba JIT-compiled
      - fully customizable
      - high performance
      fit_for:
      - Custom indicators
      - proprietary calculations
      - extreme performance
      not_fit_for:
      - Simple indicators where overhead isn't justified
    default: user-defined numpy/numba function
  - name: param_product
    description: How to combine multiple parameter lists
    options:
    - name: True (full grid)
      traits:
      - Cartesian product
      - each combinations
      - exhaustive search
      fit_for:
      - Parameter optimization
      - grid search
      - finding optimal params
      not_fit_for:
      - Memory-constrained scenarios
      - quick prototyping
    - name: False (zip)
      traits:
      - Pairwise combination
      - reduced parameter space
      fit_for:
      - Correlated parameters
      - paired analysis
      not_fit_for:
      - Independent parameter optimization
    default: 'True'
  design_decisions:
  - Factory pattern with from_custom_func/from_apply_func eliminates boilerplate; user defines compute
    function, factory handles broadcasting, caching, indexing (vectorbt/indicators/factory.py:2616)
  - 'Multi-index columns for parameter scanning: each parameter combo gets own column level enabling vectorized
    backtesting across param space (vectorbt/indicators/factory.py:1272)'
  - TA-Lib/pandas-ta/ta integration leverages battle-tested C/Python libraries for computations (vectorbt/indicators/factory.py:3387)
  acceptance_hints:
  - Indicator outputs have correct shape matching input prices with parameter dimensions
  - Multi-index columns correctly represent parameter combinations (e.g., MA.run(price, [10, 20, 50])
    creates 3 columns)
  - 'Caching works: re-running with same parameters returns cached result'
- id: signal_generation
  name: Signal Generation
  order: 3
  responsibility: Generates entry/exit signal arrays from indicator outputs. Handles signal conflicts,
    wait periods, and stop-loss/take-profit generation using Numba for performance-critical signal processing.
  interface:
    inputs:
    - indicator arrays
    - rules (pick_first, wait, until_next)
    outputs:
    - boolean signal arrays (entries, exits)
  required_methods:
  - name: generate_enex_nb
    description: Generate entry/exit signals with configurable waiting periods between signals
    evidence: vectorbt/signals/nb.py:158(generate_enex_nb)
  - name: generate_stop_enex_nb
    description: Generate stop-loss/take-profit signals from entry signals
    evidence: vectorbt/signals/nb.py:695(generate_stop_enex_nb)
  - name: bshift
    description: Backward shift for signal alignment (bshift(-n) equals pd.shift(n))
    evidence: vectorbt/signals/accessors.py:240(bshift)
  key_behaviors:
  - behavior: Numba-only signals module for speed
    description: The entire signals module is implemented in Numba to eliminate Python overhead. Signal
      generation is a hot path executed for every row in the dataset.
    evidence: vectorbt/signals/nb.py:1(module docstring)
  - behavior: pick_first semantics for conflict resolution
    description: When multiple signals fire at the same timestamp, the first one wins (pick_first). This
      avoids multiple signals at the same timestamp which would break backtesting integrity.
    evidence: vectorbt/signals/nb.py:42(generate)
  - behavior: bshift/fshift accessors for signal alignment
    description: bshift(-n) equals pd.shift(n) and fshift(n) equals pd.shift(-n). This matches the trading
      convention where 'buy tomorrow' = bshift(-1) = pd.shift(1).
    evidence: vectorbt/signals/accessors.py:240(bshift)
  replaceable_points:
  - name: choice_func_nb
    description: Function to pick which signal executes when multiple candidates exist
    options:
    - name: first_choice_nb
      traits:
      - Deterministic
      - first signal wins
      - no randomness
      fit_for:
      - Reproducible backtests
      - standard strategies
      not_fit_for:
      - Random signal selection
      - stochastic strategies
    - name: rand_choice_nb
      traits:
      - Random selection
      - uniform distribution
      fit_for:
      - Monte Carlo analysis
      - random entry strategies
      not_fit_for:
      - Deterministic requirements
      - reproducible backtests
    - name: stop_choice_nb
      traits:
      - Stop-loss priority
      - risk management focus
      fit_for:
      - High-volatility assets
      - risk-averse strategies
      not_fit_for:
      - Standard entry/exit strategies
    default: first_choice_nb
  design_decisions:
  - Numba-only signals module for speed because signal generation is hot path; Numba eliminates Python
    overhead (vectorbt/signals/nb.py:1)
  - pick_first semantics for conflict resolution avoids multiple signals at same timestamp - critical
    for backtesting integrity (vectorbt/signals/nb.py:42)
  - bshift(-n) = pd.shift(n) convention matches trading convention where 'buy tomorrow' = bshift(-1) (vectorbt/signals/accessors.py:240)
  acceptance_hints:
  - Signal arrays are boolean with same shape as input price arrays
  - No conflicting signals at same timestamp (unless explicitly configured)
  - Wait periods prevent rapid re-entry after exit
- id: portfolio_simulation
  name: Portfolio Simulation
  order: 4
  responsibility: Simulates trading by processing orders/signals against price data. Tracks cash, positions,
    orders, and generates order/trade records. Uses Numba for row-by-row simulation enabling 100x+ speed
    versus pure Python.
  interface:
    inputs:
    - close prices
    - signals/orders
    - fees/slippage config
    - init_cash
    outputs:
    - Portfolio with order_records, trade_records, position_records
  required_methods:
  - name: Portfolio.from_orders
    description: Create portfolio from explicit order specification (size, price, side)
    evidence: vectorbt/portfolio/base.py:1496(class Portfolio)
  - name: Portfolio.from_signals
    description: Create portfolio from entry/exit signal arrays with automated order generation
    evidence: vectorbt/portfolio/base.py:1496(class Portfolio)
  - name: simulate_nb
    description: Core Numba simulation loop with segment context for lifecycle hooks
    evidence: vectorbt/portfolio/nb.py:2420(simulate_nb)
  key_behaviors:
  - behavior: Numba simulation enables 100x+ speed
    description: Row-by-row simulation is O(n*m) where n=rows and m=cols. Numba compilation achieves 100x+
      speedup over pure Python, essential for large datasets and parameter grids.
    evidence: vectorbt/portfolio/base.py:1(module docstring)
  - behavior: Direction=Both enables auto-long/short
    description: Single API for long and short positions. Positive size=buy/long, negative size=sell/short,
      zero=skip. Simplifies signal processing and order generation.
    evidence: vectorbt/portfolio/enums.py:413(Direction)
  - behavior: call_seq controls order execution within segment
    description: The call sequence array controls which orders execute first within a segment. 'auto'
      mode sells before buying (rebalancing-friendly), but pre-calculates for optimal ordering.
    evidence: vectorbt/portfolio/enums.py:674(call_seq docstring)
  - behavior: Segment context for pre/post segment hooks
    description: Custom logic (e.g., rebalancing) can hook into simulation lifecycle via segment pre/post
      callbacks. Enables complex strategies that modify state between segments.
    evidence: vectorbt/portfolio/enums.py:1083(SegmentContext)
  replaceable_points:
  - name: order_func_nb
    description: Custom order generation function for dynamic order sizing
    options:
    - name: nb.no_order_func_nb
      traits:
      - No custom orders
      - signal-based only
      fit_for:
      - Standard entry/exit strategies
      not_fit_for:
      - Dynamic sizing
      - conditional orders
    - name: user-defined order function
      traits:
      - Custom logic
      - full flexibility
      fit_for:
      - Advanced order management
      - conditional sizing
      not_fit_for:
      - Simple strategies
      - performance-critical dynamic sizing
    default: nb.no_order_func_nb
  - name: signal_func_nb
    description: Custom signal resolution function for complex entry/exit logic
    options:
    - name: nb.dir_enex_signal_func_nb
      traits:
      - Direction-based
      - entry/exit signals
      fit_for:
      - Standard directional strategies
      not_fit_for:
      - Multi-position strategies
      - complex exit logic
    - name: nb.ls_enex_signal_func_nb
      traits:
      - Long/short independent
      - separate signals
      fit_for:
      - Long/short hedging
      - market-neutral strategies
      not_fit_for:
      - Simple directional strategies
    default: nb.dir_enex_signal_func_nb
  - name: cash_sharing
    description: Whether capital is shared across assets in a group
    options:
    - name: True (grouped)
      traits:
      - Shared capital
      - cross-asset dependencies
      fit_for:
      - Portfolio allocation
      - rebalancing strategies
      not_fit_for:
      - Independent strategy testing
      - isolated backtests
    - name: False (independent)
      traits:
      - Separate capital
      - no cross-dependencies
      fit_for:
      - Parallel strategy testing
      - isolated analysis
      not_fit_for:
      - Portfolio-level backtesting
      - capital allocation
    default: 'False'
  design_decisions:
  - 'Numba simulation enables 100x+ speed vs pure Python: row-by-row simulation is O(n*m) where n=rows,
    m=cols; must be fast for large datasets (vectorbt/portfolio/base.py:1)'
  - 'Direction=Both enables auto-long/short based on size sign: single API for long/short; positive size=long,
    negative=short, 0=skip (vectorbt/portfolio/enums.py:413)'
  - 'SizeType enum: Amount/Value/Percent/Target* expresses intent clearly; TargetPercent is % of portfolio
    value (vectorbt/portfolio/enums.py:363)'
  - call_seq controls order execution within segment enabling sell-before-buy for pairs trading or capital
    constraints (vectorbt/portfolio/enums.py:674)
  - Segment context for pre/post segment hooks enables custom logic (e.g., rebalancing) to hook into simulation
    lifecycle (vectorbt/portfolio/enums.py:1083)
  acceptance_hints:
  - Portfolio.cash matches expected cash flow after accounting for each trades
  - order_records contain each order details with correct fees/slippage applied
  - trade_records correctly pair entry/exit orders with PnL calculation
  - Short positions show negative position size and correct borrowing costs
- id: records_analysis
  name: Records and Event Analysis
  order: 5
  responsibility: Wraps structured NumPy record arrays (orders, trades, positions, logs, drawdowns) with
    field mapping, reduction, and visualization capabilities. Provides sparse-to-dense transformation
    for memory efficiency.
  interface:
    inputs:
    - Record arrays (order_records, trade_records, etc.)
    - close prices
    outputs:
    - Records objects with map/reduce/stats methods
  required_methods:
  - name: Records.map
    description: Map record fields to arrays for further processing
    evidence: vectorbt/records/base.py:444(class Records)
  - name: Records.reduce
    description: Reduce records to scalar or array statistics
    evidence: vectorbt/records/base.py:444(class Records)
  - name: Trades.stats
    description: Calculate trade statistics including PnL, win rate, profit factor
    evidence: vectorbt/portfolio/trades.py:607(class Trades)
  - name: Drawdowns.stats
    description: Calculate drawdown statistics including max drawdown, recovery time
    evidence: vectorbt/generic/drawdowns.py:251(class Drawdowns)
  key_behaviors:
  - behavior: Records inherit from Wrapping for ArrayWrapper integration
    description: Every Records classes inherit from Wrapping, providing unified indexing, grouping, and
      metadata across each record types. Enables consistent .iloc/.loc operations.
    evidence: vectorbt/records/base.py:444(Records.__bases__)
  - behavior: field_config defines field metadata
    description: Declarative field definitions (name, title, mapping) enable auto-generated documentation
      and UI. Each record type declares its fields programmatically.
    evidence: vectorbt/records/base.py:467(_field_config)
  - behavior: Records require 'id' and 'col' fields
    description: Every record must have 'id' (record index) and 'col' (column index). This enables positional
      lookup and column mapping in each record operations.
    evidence: vectorbt/records/base.py:454(record requirement)
  - behavior: Trades/Drawdowns inherit from Ranges
    description: Trade duration and drawdown duration use the same base class (Ranges) for reuse of coverage
      and duration statistics. Peak-to-recovery is conceptually a range.
    evidence: vectorbt/portfolio/trades.py:607(class Trades(Ranges))
  replaceable_points:
  - name: field_config
    description: Field definitions and mappings for custom record types
    options:
    - name: default order_dt
      traits:
      - Standard fields
      - id, col, idx, col, side, size, price, fees
      fit_for:
      - Standard order tracking
      - basic trade analysis
      not_fit_for:
      - Custom field requirements
      - non-standard record types
    - name: custom record dtype
      traits:
      - User-defined fields
      - full flexibility
      fit_for:
      - Proprietary metrics
      - custom tracking fields
      not_fit_for:
      - Standard analysis
      - integration with built-in record methods
    default: order_dt
  design_decisions:
  - 'Records inherit from Wrapping for ArrayWrapper integration: unified indexing, grouping, and metadata
    across each record types (vectorbt/records/base.py:444)'
  - 'field_config defines field metadata (name, title, mapping): declarative field definitions enable
    auto-generated docs and UI (vectorbt/records/base.py:467)'
  - 'Records must have ''id'' (record index) and ''col'' (column index): enables positional lookup and
    column mapping in each record operations (vectorbt/records/base.py:454)'
  - 'Trades derive from Ranges for duration analysis: trade duration is a key metric; reuse range processing
    logic (vectorbt/portfolio/trades.py:607)'
  - 'Drawdowns inherit from Ranges: peak-to-recovery is a range; reuse coverage/duration stats (vectorbt/generic/drawdowns.py:251)'
  acceptance_hints:
  - Records correctly map to their source columns and timestamps
  - Trade PnL sums match actual profit/loss from simulation
  - Drawdown calculations correctly identify peaks, valleys, and recoveries
  - incl_open=False by default excludes active positions from metrics
- id: performance_metrics
  name: Performance Metrics and Returns
  order: 6
  responsibility: Calculates risk-adjusted return metrics (Sharpe, Sortino, Calmar, VaR, CVaR, etc.) from
    portfolio returns. Integrates with QuantStats for extended analytics and supports rolling variants
    for time-varying risk analysis.
  interface:
    inputs:
    - return series
    - benchmark returns
    - year frequency
    outputs:
    - ReturnsAccessor with metric methods, stats DataFrame
  required_methods:
  - name: ReturnsAccessor.sharpe_ratio
    description: Calculate Sharpe ratio with configurable annualization
    evidence: vectorbt/returns/nb.py:347(sharpe_ratio_nb)
  - name: ReturnsAccessor.sortino_ratio
    description: Calculate Sortino ratio focusing on downside deviation
    evidence: vectorbt/returns/accessors.py:164(class ReturnsAccessor)
  - name: ReturnsAccessor.rolling_sharpe_ratio
    description: Calculate rolling Sharpe ratio for time-varying risk profiles
    evidence: vectorbt/returns/accessors.py:458(rolling_sharpe_ratio)
  - name: QSAdapter
    description: QuantStats integration for extended analytics
    evidence: vectorbt/returns/qs_adapter.py:1(class QSAdapter)
  key_behaviors:
  - behavior: Numba for each metrics in returns/nb.py
    description: Metrics are computed per-column for large parameter grids. Numba compilation is essential
      for performance when analyzing thousands of parameter combinations.
    evidence: vectorbt/returns/nb.py:1(module docstring)
  - behavior: year_freq for annualization factor
    description: 'Flexible annualization: 252 for stocks (trading days), 365 for crypto (continuous),
      or custom frequency. Affects Sharpe, Sortino, Calmar calculations.'
    evidence: vectorbt/returns/accessors.py:259(year_freq)
  - behavior: Rolling variants for each metrics
    description: Time-varying risk profiles require rolling metrics. Rolling Sharpe, Sortino, max drawdown
      enable analysis of evolving strategy performance.
    evidence: vectorbt/returns/accessors.py:458(rolling_sharpe_ratio)
  replaceable_points:
  - name: benchmark_rets
    description: Benchmark returns for alpha/beta/information ratio calculations
    options:
    - name: None (absolute)
      traits:
      - No benchmark
      - absolute returns
      fit_for:
      - Single-strategy analysis
      - no benchmark available
      not_fit_for:
      - Relative performance analysis
      - benchmark comparison
    - name: user-provided returns
      traits:
      - Custom benchmark
      - relative analysis
      fit_for:
      - Index comparison
      - alpha generation analysis
      not_fit_for:
      - No benchmark desired
      - absolute return focus
    default: None
  design_decisions:
  - 'Numba for each metrics in returns/nb.py: metrics computed per-column for large param grids; Numba
    essential for speed (vectorbt/returns/nb.py:1)'
  - 'year_freq for annualization factor: flexible annualization (252 for stocks, 365 for crypto) (vectorbt/returns/accessors.py:259)'
  - 'Rolling variants for each metrics: time-varying risk profiles require rolling metrics (vectorbt/returns/accessors.py:458)'
  acceptance_hints:
  - Sharpe ratio annualization correctly applied (252 for stocks, 365 for crypto)
  - Risk-free rate properly deducted in Sharpe/Sortino calculations
  - Benchmark beta calculation matches statistical definition
  - Rolling metrics align with window size and avoid look-ahead bias
- id: statistics_plotting
  name: Statistics and Plotting
  order: 7
  responsibility: Provides unified stats and plotting interface across each classes using mixin pattern
    (StatsBuilderMixin, PlotsBuilderMixin). Enables consistent .stats() and .plot() API regardless of
    object type.
  interface:
    inputs:
    - Any vectorbt object (Portfolio, Records, etc.)
    outputs:
    - stats DataFrame
    - plotly Figure
  required_methods:
  - name: StatsBuilderMixin.stats
    description: Generate statistics DataFrame for the object with configurable metrics
    evidence: vectorbt/generic/stats_builder.py:32(class StatsBuilderMixin)
  - name: PlotsBuilderMixin.plot
    description: Generate a single plotly Figure for the object
    evidence: vectorbt/generic/plots_builder.py:77(class PlotsBuilderMixin)
  - name: PlotsBuilderMixin.subplots
    description: Class method defining available plots for declarative plot registration
    evidence: vectorbt/generic/plots_builder.py:77(subplots)
  key_behaviors:
  - behavior: Mixin pattern for stats/plots across each classes
    description: Single .stats() and .plot() API regardless of object type (Portfolio, Records, Indicators).
      Combines StatsBuilderMixin and PlotsBuilderMixin through multiple inheritance.
    evidence: vectorbt/portfolio/base.py:1496(class Portfolio(...StatsBuilderMixin...PlotsBuilderMixin))
  - behavior: Config-driven metric/plot definitions
    description: Settings in vectorbt._settings control default metrics and plots. Enables global theming
      and customization without subclassing.
    evidence: vectorbt/generic/stats_builder.py:49(stats_defaults)
  - behavior: subplots() class method declares available plots
    description: Each class declares its plots declaratively via subplots() class method. Enables introspection
      of available visualizations.
    evidence: vectorbt/generic/plots_builder.py:77(subplots)
  replaceable_points:
  - name: stats_defaults
    description: Default metrics configuration for .stats() method
    options:
    - name: class default
      traits:
      - Built-in metrics
      - standard statistics
      fit_for:
      - Quick analysis
      - standard reporting
      not_fit_for:
      - Custom metrics
      - proprietary KPIs
    - name: global settings
      traits:
      - Settings-based
      - theming support
      fit_for:
      - Organization-wide standards
      - theme consistency
      not_fit_for:
      - Object-specific customization
    - name: per-instance override
      traits:
      - Instance-specific
      - full control
      fit_for:
      - Custom reporting
      - specialized analysis
      not_fit_for:
      - Standard workflows
      - quick prototyping
    default: class default from settings
  design_decisions:
  - 'Mixin pattern for stats/plots across each classes: single .stats() and .plot() API regardless of
    object type (vectorbt/portfolio/base.py:1496)'
  - 'Config-driven metric/plot definitions: settings in vectorbt._settings; enables theming and customization
    (vectorbt/generic/stats_builder.py:49)'
  - 'subplots() class method defines available plots: each class declares its plots declaratively (vectorbt/generic/plots_builder.py:77)'
  acceptance_hints:
  - .stats() returns DataFrame with consistent index across each object types
  - .plot() returns plotly Figure that renders in Jupyter notebooks
  - Stats and plots respect group_by parameter for grouped analysis
data_flow:
- from_stage: data_ingestion
  to_stage: indicators
  data: price arrays (pd.Series/pd.DataFrame with OHLCV columns)
- from_stage: indicators
  to_stage: signal_generation
  data: indicator output arrays (multi-index columns with parameter dimensions)
- from_stage: signal_generation
  to_stage: portfolio_simulation
  data: boolean entry/exit signal arrays
- from_stage: portfolio_simulation
  to_stage: records_analysis
  data: order_records, trade_records, position_records (structured NumPy arrays)
- from_stage: data_ingestion
  to_stage: portfolio_simulation
  data: close prices for position valuation and order execution
- from_stage: records_analysis
  to_stage: performance_metrics
  data: order_records and position data for returns calculation
- from_stage: performance_metrics
  to_stage: statistics_plotting
  data: metric DataFrames, return series for reporting
- from_stage: records_analysis
  to_stage: statistics_plotting
  data: trade/position/drawdown records for visualization
global_contracts:
- contract: Every pandas objects use ArrayWrapper for index/columns/shape metadata (vectorbt/base/array_wrapper.py:109)
  evidence: ''
- contract: Records must have 'id' (record index) and 'col' (column index) fields (vectorbt/records/base.py:454)
  evidence: ''
- contract: Time-indexed data supports freq for timedelta calculations (vectorbt/base/array_wrapper.py:420)
  evidence: ''
- contract: Column grouping via group_by parameter, default None (each column is independent group) (vectorbt/base/column_grouper.py:1)
  evidence: ''
- contract: Every simulation uses 2D NumPy arrays internally (rows=time, cols=assets) (vectorbt/base/reshape_fns.py:89)
  evidence: ''
- contract: Wrapping objects support .iloc/.loc indexing that returns new instance (vectorbt/base/indexing.py:76)
  evidence: ''
- contract: NamedTuple-based context objects (SimulationContext, OrderContext) for Numba compatibility
    (vectorbt/portfolio/enums.py:614)
  evidence: ''
- contract: 'Float tolerance defaults: rel_tol=1e-9, abs_tol=1e-12 in is_close_nb affecting position/cash/debt
    zero checks (vectorbt/utils/math_.py:9-10)'
  evidence: ''
- contract: Stop signals processed BEFORE user signals at same bar (temporal priority) (vectorbt/portfolio/enums.py:301-308)
  evidence: ''
- contract: Group columns must be coherent and sorted (ascending group IDs) for get_group_lens_nb (vectorbt/base/column_grouper.py:80-81)
  evidence: ''
- contract: bshift looks ahead (future information) - documented warning about look-ahead bias (vectorbt/generic/nb.py:259-260)
  evidence: ''
business_decisions:
- id: BD-001
  type: B/RC
  content: Data aligned via align_index/align_columns to shared index
  rationale: Ensures each symbols share same temporal index - required for matrix operations in simulation.
    Without alignment, element-wise operations across symbols would fail due to misaligned timestamps.
    This is a foundational requirement for vectorized backtesting.
  evidence: vectorbt/data/base.py:372(align_index)
  stage: data_ingestion
  alternative_considered: Per-symbol iteration was rejected due to O(n) overhead vs O(1) matrix operations
- id: BD-002
  type: BA
  content: Abstract download_symbol forces subclass implementation
  rationale: Each data source has unique API; enables plugin architecture for new sources. This enforces
    a contract that each data sources must implement download logic while allowing complete flexibility
    in API interaction patterns.
  evidence: vectorbt/data/base.py:544(download_symbol)
  stage: data_ingestion
  alternative_considered: Single monolithic downloader was rejected due to API heterogeneity across providers
- id: BD-003
  type: M
  content: concat method returns dict keyed by column name
  rationale: Enables easy column-wise access for multi-symbol processing. Dict return type provides O(1)
    lookup by symbol name vs O(n) DataFrame column search.
  evidence: vectorbt/data/base.py:667(concat)
  stage: data_ingestion
  alternative_considered: Returning DataFrame was rejected - dict provides cleaner symbol-based access
- id: BD-004
  type: BA
  content: Factory pattern with from_custom_func/from_apply_func
  rationale: Eliminates boilerplate; user defines compute function, factory handles broadcasting, caching,
    indexing. This separation of concerns allows non-expert users to create custom indicators while the
    framework manages complexity.
  evidence: vectorbt/indicators/factory.py:2616(from_custom_func)
  stage: indicators
  alternative_considered: Explicit class definition was rejected due to high boilerplate for simple indicators
- id: BD-005
  type: M/BA
  content: Multi-index columns for parameter scanning
  rationale: Each parameter combo gets own column level - enables vectorized backtesting across param
    space. Multi-index allows broadcasting across parameter dimensions without data duplication.
  evidence: vectorbt/indicators/factory.py:1272(build_columns)
  stage: indicators
  alternative_considered: Separate DataFrames per param combo was rejected - loses vectorization benefits
- id: BD-006
  type: M
  content: TA-Lib/pandas-ta/ta integration
  rationale: Leverages battle-tested C/Python libraries for computations. TA-Lib provides optimized C
    implementations while pandas-ta offers pure-Python alternatives for environments without C compilation.
  evidence: vectorbt/indicators/factory.py:3387(from_talib)
  stage: indicators
  alternative_considered: Pure Python reimplementation was rejected due to 10-100x slower execution
- id: BD-007
  type: B
  content: Numba-only signals module for speed
  rationale: Signal generation is hot path; Numba eliminates Python overhead. Row-by-row iteration with
    Python functions would be prohibitively slow for large datasets with millions of rows.
  evidence: vectorbt/signals/nb.py:42(generate_nb)
  stage: signal_generation
  alternative_considered: Pure Python was rejected - unacceptable performance for production workloads
- id: BD-008
  type: M
  content: pick_first semantics for conflict resolution
  rationale: Avoids multiple signals at same timestamp - critical for backtesting integrity. pick_first
    ensures deterministic behavior when multiple conditions trigger simultaneously.
  evidence: vectorbt/signals/nb.py:42(generate)
  stage: signal_generation
  alternative_considered: pick_last or raising error were rejected - pick_first matches most trading conventions
  _evidence_issues:
  - 'FN_NOT_FOUND: generate in vectorbt/signals/nb.py'
- id: BD-009
  type: M/BA
  content: Forward/backward shift accessors for signal alignment
  rationale: 'bshift(-n) equals pd.shift(n); fshift(n) equals pd.shift(-n) - matches trading convention.
    Naming convention aligns with directional thinking: bshift moves signals backward in time, fshift
    moves forward.'
  evidence: vectorbt/signals/accessors.py:240(bshift)
  stage: signal_generation
  alternative_considered: Using pd.shift directly was rejected - requires negation confusion
- id: BD-010
  type: B
  content: Numba simulation enables 100x+ speed vs pure Python
  rationale: Row-by-row simulation is O(n*m) where n=rows, m=cols; must be fast for large datasets. Portfolio
    simulation processes every row with complex state management - Numba compilation eliminates interpreter
    overhead.
  evidence: vectorbt/portfolio/base.py:1(module docstring)
  stage: portfolio_simulation
  alternative_considered: Pure Python was rejected - unacceptable for production-grade backtesting
  _evidence_issues:
  - 'INVALID_IDENTIFIER: module docstring in vectorbt/portfolio/base.py'
- id: BD-011
  type: M
  content: Direction=Both enables auto-long/short based on size sign
  rationale: Single API for long/short; positive size=long, negative=short, 0=skip. Direction=Both allows
    single order call to handle both long and short based on size sign, reducing code branches.
  evidence: vectorbt/portfolio/enums.py:413(Direction)
  stage: portfolio_simulation
  alternative_considered: Separate long_short mode was rejected - less flexible than sign-based detection
  _evidence_issues:
  - 'FN_NOT_FOUND: Direction in vectorbt/portfolio/enums.py'
- id: BD-012
  type: M
  content: 'SizeType enum: Amount/Value/Percent/Target*'
  rationale: Expresses intent clearly; TargetPercent is % of portfolio value. Enum prevents string typos
    and enables IDE autocomplete. Each type maps to different calculation logic for position sizing.
  evidence: vectorbt/portfolio/enums.py:363(SizeTypeT)
  stage: portfolio_simulation
  alternative_considered: String-based types were rejected - no IDE support, typo-prone
- id: BD-013
  type: M/DK
  content: call_seq controls order execution within segment
  rationale: Enables sell-before-buy for pairs trading or capital constraints. call_seq defines execution
    order within a time segment, critical for strategies requiring specific order precedence.
  evidence: vectorbt/portfolio/enums.py:674(call_seq docstring)
  stage: portfolio_simulation
  alternative_considered: Fixed sequential execution was rejected - insufficient for pairs trading
  _evidence_issues:
  - 'INVALID_IDENTIFIER: call_seq docstring in vectorbt/portfolio/enums.py'
- id: BD-014
  type: BA
  content: Segment context for pre/post segment hooks
  rationale: Custom logic (e.g., rebalancing) can hook into simulation lifecycle. SegmentContext provides
    state and callbacks at segment boundaries, enabling custom behavior without modifying core simulation
    loop.
  evidence: vectorbt/portfolio/enums.py:1083(SegmentContext)
  stage: portfolio_simulation
  alternative_considered: Modifying core loop was rejected - couples user code to internal implementation
- id: BD-015
  type: B/DK
  content: Records inherit from Wrapping for ArrayWrapper integration
  rationale: Unified indexing, grouping, and metadata across each record types. ArrayWrapper provides
    consistent datetime/index handling regardless of record type (trades, drawdowns, orders).
  evidence: vectorbt/records/base.py:588(records)
  stage: records_analysis
  alternative_considered: Duplicate indexing logic per record type was rejected - DRY violation
- id: BD-016
  type: M
  content: field_config defines field metadata (name, title, mapping)
  rationale: Declarative field definitions enable auto-generated docs and UI. Field config describes schema
    for each record type, enabling documentation generation and interactive visualization.
  evidence: vectorbt/records/base.py:467(_field_config)
  stage: records_analysis
  alternative_considered: Hardcoded field names were rejected - no meta-programming capabilities
  _evidence_issues:
  - 'FN_NOT_FOUND: _field_config in vectorbt/records/base.py'
- id: BD-017
  type: B
  content: Records must have 'id' (record index) and 'col' (column index)
  rationale: Enables positional lookup and column mapping in each record operations. id allows O(1) record
    lookup within its type; col enables cross-column filtering and grouping.
  evidence: vectorbt/records/base.py:454(record requirement)
  stage: records_analysis
  alternative_considered: Using timestamp only was rejected - insufficient for multi-column records
  _evidence_issues:
  - 'INVALID_IDENTIFIER: record requirement in vectorbt/records/base.py'
- id: BD-018
  type: M
  content: Trades derive from Ranges for duration analysis
  rationale: Trade duration is a key metric; reuse range processing logic. Inheriting from Ranges provides
    coverage, duration, and overlap statistics without duplicating range-finding algorithms.
  evidence: vectorbt/portfolio/trades.py:607(module)
  stage: records_analysis
  alternative_considered: Duplicating range logic was rejected - maintenance burden and inconsistency
  _evidence_issues:
  - 'FN_NOT_FOUND: module in vectorbt/portfolio/trades.py'
- id: BD-019
  type: M
  content: Drawdowns inherit from Ranges
  rationale: Peak-to-recovery is a range; reuse coverage/duration stats. Drawdowns represent time periods
    between peaks and troughs, making Range inheritance natural and powerful.
  evidence: vectorbt/generic/drawdowns.py:251(module)
  stage: records_analysis
  alternative_considered: Standalone implementation was rejected - loses shared functionality
  _evidence_issues:
  - 'FN_NOT_FOUND: module in vectorbt/generic/drawdowns.py'
- id: BD-020
  type: B/DK
  content: Numba for each metrics in returns/nb.py
  rationale: Metrics computed per-column for large param grids; Numba essential for speed. Sharpe, Sortino,
    max drawdown require scanning entire series - must be JIT-compiled for performance.
  evidence: vectorbt/returns/nb.py:1(module docstring)
  stage: performance_metrics
  alternative_considered: Pure Python pandas was rejected - 50x slower for large grids
  _evidence_issues:
  - 'INVALID_IDENTIFIER: module docstring in vectorbt/returns/nb.py'
- id: BD-021
  type: M/DK
  content: year_freq for annualization factor
  rationale: Flexible annualization (252 for stocks, 365 for crypto). year_freq parameter allows correct
    annualization regardless of asset class trading calendar.
  evidence: vectorbt/returns/accessors.py:259(year_freq)
  stage: performance_metrics
  alternative_considered: Hardcoded 252 was rejected - incorrect for crypto and other 24/7 markets
- id: BD-022
  type: M
  content: Rolling variants for each metrics
  rationale: Time-varying risk profiles require rolling metrics. Rolling windows reveal how performance
    evolves, essential for regime detection and dynamic strategies.
  evidence: vectorbt/returns/accessors.py:458(rolling_sharpe_ratio)
  stage: performance_metrics
  alternative_considered: Point-in-time only was rejected - insufficient for time-series analysis
- id: BD-023
  type: B
  content: Mixin pattern for stats/plots across each classes
  rationale: Single .stats() and .plot() API regardless of object type. Mixin pattern adds functionality
    without inheritance hierarchy explosion - any class can gain stats/plots by mixing in.
  evidence: vectorbt/portfolio/base.py:1496(module)
  stage: statistics_plotting
  alternative_considered: Inheritance hierarchy was rejected - diamond problem and tight coupling
  _evidence_issues:
  - 'FN_NOT_FOUND: module in vectorbt/portfolio/base.py'
- id: BD-024
  type: M
  content: Config-driven metric/plot definitions
  rationale: Settings in vectorbt._settings; enables theming and customization. Config-driven approach
    allows runtime customization of which metrics/plots are computed without subclassing.
  evidence: vectorbt/generic/stats_builder.py:49(stats_defaults)
  stage: statistics_plotting
  alternative_considered: Hardcoded definitions were rejected - inflexible for customization
- id: BD-025
  type: M
  content: subplots() class method defines available plots
  rationale: Each class declares its plots declaratively. Declarative subplots() enables automatic plot
    discovery and documentation without reflection magic.
  evidence: vectorbt/generic/plots_builder.py:65(subplots)
  stage: statistics_plotting
  alternative_considered: Decorator registration was rejected - declarative method is more Pythonic
- id: BD-026
  type: B/BA
  content: Default slippage = 0.0 (no market impact assumed)
  rationale: 'Zero slippage simplifies backtesting by assuming orders execute at reported prices. This
    default avoids overestimating transaction costs when slippage data is unavailable. Boundary: slippage
    only affects execution price; does not change order fill logic.'
  evidence: vectorbt/_settings.py:485(slippage)
  stage: order_execution
  alternative_considered: Realistic slippage values (e.g., 0.001) were rejected as default due to variability
    across assets and market conditions.
  _evidence_issues:
  - 'FN_NOT_FOUND: slippage in vectorbt/_settings.py'
- id: BD-027
  type: B/BA
  content: Default fees = 0.0 (no transaction costs)
  rationale: 'Zero fees default allows pure strategy logic testing without cost friction. Users must explicitly
    enable fees for realistic P&L. Boundary: fees apply per order; does not affect position tracking.'
  evidence: vectorbt/_settings.py:483(fees)
  stage: order_execution
  alternative_considered: Non-zero defaults were rejected as fee structures vary widely across exchanges
    and asset classes.
  _evidence_issues:
  - 'FN_NOT_FOUND: fees in vectorbt/_settings.py'
- id: BD-028
  type: B/BA
  content: Default size = np.inf (use each available cash/position)
  rationale: 'Infinite size default enables maximum capital deployment per signal. This maximizes exposure
    when users want full portfolio investment. Boundary: size capped by max_size; does not override cash
    constraints.'
  evidence: vectorbt/_settings.py:481(size)
  stage: order_sizing
  alternative_considered: Fractional sizing (e.g., 1.0) was considered but rejected to avoid confusion
    with normalized size types.
  _evidence_issues:
  - 'FN_NOT_FOUND: size in vectorbt/_settings.py'
- id: BD-029
  type: B/BA
  content: Default max_size = np.inf (no upper size limit)
  rationale: 'Unbounded max_size allows any order size subject to cash availability. Supports continuous
    rebalancing without arbitrary constraints. Boundary: max_size constrains size but not cash utilization.'
  evidence: vectorbt/_settings.py:488(max_size)
  stage: order_sizing
  alternative_considered: Finite defaults (e.g., 1.0) were rejected as position sizing requirements vary
