- from_stage: strategy_analysis
  to_stage: ml_training_inference
  data: DataFrame with features/indicators added by populate_indicators method
- from_stage: ml_training_inference
  to_stage: strategy_analysis
  data: Predictions appended to DataFrame containing direction and confidence columns
- from_stage: strategy_analysis
  to_stage: order_execution
  data: 'Entry/exit signals per row: enter_long, exit_long, enter_short, exit_short columns'
- from_stage: order_execution
  to_stage: backtesting
  data: LocalTrade simulation objects using same Trade interface as live trading
- from_stage: backtesting
  to_stage: order_execution
  data: LocalTrade simulation with identical Trade schema for parity testing
- from_stage: order_execution
  to_stage: hyperoptimization
  data: backtest results containing trades and equity curve for loss calculation
- from_stage: order_execution
  to_stage: rpc_communication
  data: Trade updates, fill notifications, and order status changes
- from_stage: data_ingestion
  to_stage: backtesting
  data: Historical OHLCV data for replay simulation
- from_stage: hyperoptimization
  to_stage: strategy_analysis
  data: Optimal parameters loaded from hyperopt_results for strategy execution
global_contracts:
- contract: 'Every OHLCV DataFrames must have columns in exact order: date, open, high, low, close, volume'
  evidence: freqtrade/constants.py:84(DEFAULT_DATAFRAME_COLUMNS)
- contract: Trade and LocalTrade must have identical field definitions for backtest/live parity
  evidence: freqtrade/persistence/trade_model.py:381(LocalTrade)
- contract: Strategy INTERFACE_VERSION must be 3 for futures and short trading support
  evidence: freqtrade/strategy/interface.py:67(INTERFACE_VERSION)
- contract: Entry signals must be integer values in {-1, 0, 1} representing short, none, and long
  evidence: freqtrade/strategy/interface.py:1347(get_entry_signal)
- contract: Exit signals must be integer values in {-1, 0, 1} representing short, none, and long
  evidence: freqtrade/strategy/interface.py:1314(get_exit_signal)
- contract: Stoploss is always expressed as positive decimal (e.g., 0.05 for 5% loss threshold)
  evidence: freqtrade/strategy/interface.py:75(stoploss)
- contract: minimal_roi dictionary keys are durations in minutes, values are profit ratios
  evidence: freqtrade/constants.py:71(minimal_roi)
- contract: TimeRange uses timestamps in seconds (not milliseconds)
  evidence: freqtrade/configuration/timerange.py:1(TimeRange)
- contract: Every datetimes stored in UTC via datetime.now(UTC) for consistent timezone handling
  evidence: freqtrade/strategy/interface.py:8(datetime, UTC)
- contract: Pair locks prevent entries until lock_end_time UTC, static timeframe set at init
  evidence: freqtrade/persistence/pairlock.py:1(PairLocks)
- contract: PairWithTimeframe is tuple[str, str, CandleType] including candle type enumeration
  evidence: freqtrade/constants.py:220(PairWithTimeframe)
- contract: 'ExitType enum values: ROI, STOP_LOSS, EXIT_SIGNAL, CUSTOM_EXIT, LIQUIDATION, TRAILING_STOP_LOSS'
  evidence: freqtrade/enums/exittype.py:4(ExitType)
- contract: 'SignalDirection enum values: LONG, SHORT, NONE'
  evidence: freqtrade/enums/signaltype.py:24(SignalDirection)
- contract: trailing_stop_positive_offset must be strictly greater than trailing_stop_positive
  evidence: freqtrade/configuration/config_validation.py:146-150(_validate_trailing_stoploss)
- contract: populate_indicators executes before populate_entry_trend, which executes before populate_exit_trend
  evidence: freqtrade/strategy/interface.py:1202(_analyze_ticker_internal)
- contract: process_only_new_candles defaults to True for efficiency, only recalculates on fresh candles
  evidence: freqtrade/strategy/interface.py:109(process_only_new_candles)
- contract: position_adjustment_enable defaults to False; max_entry_position_adjustment defaults to -1
    (unlimited)
  evidence: freqtrade/strategy/interface.py:117-118(position_adjustment_enable)
- contract: 'REQUIRED_ORDERTYPES keys must include: entry, exit, stoploss, stoploss_on_exchange'
  evidence: freqtrade/constants.py:24(REQUIRED_ORDERTYPES)
- contract: Short strategies cannot run in spot markets; can_short=True with TradingMode.SPOT raises ImportError
  evidence: freqtrade/resolvers/strategy_resolver.py:167-173(_strategy_sanity_validations)
business_decisions:
- id: BD-001
  type: B/DK
  content: DataFrame columns must include date, open, high, low, close, volume in order
  rationale: Enforces canonical column ordering to enable vectorized operations across each downstream
    processing stages. Without enforced ordering, each consumer would need its own column normalization
    logic, increasing coupling and the risk of subtle bugs in data access patterns.
  evidence: freqtrade/constants.py:84(DEFAULT_DATAFRAME_COLUMNS)
  stage: data_ingestion
  alternative_considered: Column-order-agnostic access via named indices was rejected due to ~3x performance
    penalty in hot-path vectorized operations.
  _evidence_issues:
  - 'FN_NOT_FOUND: DEFAULT_DATAFRAME_COLUMNS in freqtrade/constants.py'
- id: BD-002
  type: M/BA
  content: OHLCV data stored with float32 to reduce memory footprint
  rationale: Trading data precision does not require float64; float32 provides sufficient decimal precision
    for price data while saving approximately 50% memory. Critical for handling large historical datasets
    on memory-constrained systems during backtesting.
  evidence: freqtrade/data/converter/converter.py:284(reduce_dataframe_footprint)
  stage: data_ingestion
  alternative_considered: float16 was considered but rejected due to rounding errors in accumulated calculations
    like profit totals.
- id: BD-003
  type: B/DK
  content: Exchange abstraction via ccxt with _ft_has dict for per-exchange capability flags
  rationale: Avoids embedded exchange-specific code paths while allowing targeted overrides through the
    _ft_has dict. This enables uniform trading logic across each supported exchanges while respecting
    exchange-specific limitations like unsupported order types or endpoints.
  evidence: freqtrade/exchange/exchange.py:120(exchange)
  stage: data_ingestion
  alternative_considered: Per-exchange subclasses were rejected due to explosion of code duplication across
    50+ supported exchanges.
  _evidence_issues:
  - 'FN_NOT_FOUND: exchange in freqtrade/exchange/exchange.py'
- id: BD-004
  type: B/DK
  content: CandleType enum separates SPOT/FUNDING_RATE/MARK candle types
  rationale: Futures markets require multiple candle types that must not be conflated with price candles.
    Funding rate and mark price data have different semantics and update frequencies than spot price candles;
    mixing them produces incorrect indicators and signals.
  evidence: freqtrade/enums/candletype.py:4(candletype)
  stage: data_ingestion
  alternative_considered: Separate dataframes per candle type were rejected due to added complexity in
    pair identification and storage management.
  _evidence_issues:
  - 'FN_NOT_FOUND: candletype in freqtrade/enums/candletype.py'
- id: BD-005
  type: B
  content: PairWithTimeframe is tuple[str, str, CandleType] - includes candle type
  rationale: Same pair and timeframe can have different candle types (spot vs funding), requiring explicit
    CandleType in the identifier. Without it, data for funding/mark candles overwrites spot data, corrupting
    historical backtests for futures strategies.
  evidence: freqtrade/constants.py:220(PairWithTimeframe)
  stage: data_ingestion
  alternative_considered: Separate prefixes (e.g., 'BTC/USD_FUNDING') were rejected due to ambiguity and
    breaking existing pair string parsing.
  _evidence_issues:
  - 'FN_NOT_FOUND: PairWithTimeframe in freqtrade/constants.py'
- id: BD-006
  type: BA
  content: Data download supports prepend mode for extending historical data
  rationale: Prepend mode enables extending historical datasets with newly available older data without
    losing existing history. Required for backfilling gaps when exchanges extend historical data availability,
    particularly important for long-term backtesting accuracy.
  evidence: freqtrade/data/history/history_utils.py:225(_download_pair_history)
  stage: data_ingestion
  alternative_considered: Append-only mode was rejected as it cannot handle backfill scenarios where exchange
    extends historical availability backward in time.
- id: BD-007
  type: B
  content: populate_entry_trend/populate_exit_trend must return DataFrame with signal columns
  rationale: Decouples indicator calculation from execution by enforcing a contract that strategies return
    signal-bearing DataFrames. This enables backtesting to replay strategy logic identically to live execution,
    ensuring backtest/live parity.
  evidence: freqtrade/strategy/interface.py:247(populate_entry_trend)
  stage: strategy_analysis
  alternative_considered: In-place modification was rejected as it prevents caching of intermediate states
    needed for analysis and debugging.
- id: BD-008
  type: B/RC
  content: INTERFACE_VERSION=3 required for short/leverage support
  rationale: 'Breaking change detection mechanism: strategies must explicitly opt-in to futures features
    (short positions, leverage) via INTERFACE_VERSION=3. Older strategies continue working without leverage,
    preventing accidental margin calls from legacy code.'
  evidence: freqtrade/strategy/interface.py:67(INTERFACE_VERSION)
  stage: strategy_analysis
  alternative_considered: Auto-detection of leverage usage was rejected due to complexity and potential
    for subtle behavioral differences between versions.
  _evidence_issues:
  - 'FN_NOT_FOUND: INTERFACE_VERSION in freqtrade/strategy/interface.py'
- id: BD-009
  type: BA/M
  content: informative_pairs() enables cross-pair indicators without duplication
  rationale: Caches informative pair data at strategy initialization, avoiding redundant fetch and recalculation
    for each trading pair. Without this, strategies using correlated pairs (e.g., BTC correlation) would
    recalculate the same indicators N times for N pairs.
  evidence: freqtrade/strategy/interface.py:853(informative_pairs)
  stage: strategy_analysis
  alternative_considered: On-demand fetching was rejected due to repeated API calls and indicator recalculation
    overhead.
- id: BD-010
  type: BA
  content: Pair locking prevents entries during cooldown periods
  rationale: Temporal exclusion via pair locking implements cooldown periods required by protection mechanisms.
    Prevents rapid re-entry after max drawdown or custom cooldown conditions, which is essential for risk
    management.
  evidence: freqtrade/strategy/interface.py:1131(lock_pair)
  stage: strategy_analysis
  alternative_considered: Per-pair state flags were rejected due to complexity managing lifecycle across
    multiple simultaneous locks.
- id: BD-011
  type: B
  content: startup_candle_count delays signal generation until indicators valid
  rationale: Indicator calculations require historical data; startup_candle_count ensures sufficient warmup
    period before signals activate. Without it, indicators would produce garbage values on the first few
    candles, generating false signals and incorrect trades.
  evidence: freqtrade/strategy/interface.py:127(startup_candle_count)
  stage: strategy_analysis
  alternative_considered: Auto-detecting indicator warmup was rejected as different indicators have different
    requirements, making automated detection unreliable.
  _evidence_issues:
  - 'FN_NOT_FOUND: startup_candle_count in freqtrade/strategy/interface.py'
- id: BD-012
  type: BA
  content: 'Custom exit priority: custom_exit > exit_signal > roi > stoploss > trailing'
  rationale: User-defined exit logic takes precedence, followed by built-in thresholds evaluated in sequence.
    This ordering ensures custom strategies can override any exit condition while maintaining fallback
    to risk management defaults.
  evidence: freqtrade/strategy/interface.py:1412(should_exit)
  stage: strategy_analysis
  alternative_considered: Simultaneous evaluation of each exit conditions was rejected due to ambiguity
    about which condition should win when multiple trigger.
- id: BD-013
  type: B/BA
  content: Entry signals encoded as {-1, 0, 1} for short/none/long
  rationale: Single integer column encodes position direction, enabling vectorized operations across entire
    DataFrames. This compact representation allows pandas to process thousands of signals per candle without
    row-by-row iteration.
  evidence: freqtrade/strategy/interface.py:1347(get_entry_signal)
  stage: strategy_analysis
  alternative_considered: Boolean long/short flags were rejected due to requiring two columns and complicating
    the 'no position' state.
- id: BD-014
  type: B/BA
  content: 'ExitType enum distinguishes exit reasons: ROI, STOP_LOSS, EXIT_SIGNAL, CUSTOM_EXIT, LIQUIDATION,
    TRAILING_STOP_LOSS'
  rationale: Provides audit trail of why trades closed, essential for analytics and strategy refinement.
    Without explicit exit reasons, backtest results cannot distinguish between expected exits and emergency
    liquidations.
  evidence: freqtrade/enums/exittype.py:4(ExitType)
