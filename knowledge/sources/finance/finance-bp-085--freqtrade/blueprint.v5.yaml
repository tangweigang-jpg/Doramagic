    default: None (configurable)
  design_decisions:
  - backtest_loop called per-candle; must be optimized for hyperopt (freqtrade/optimize/backtesting.py:1456(backtest_loop))
    - Hyperopt calls this millions of times; hot path optimization critical
  - dry_run=True forced in backtesting config (freqtrade/optimize/backtesting.py:127(self.config['dry_run']))
    - No exchange interaction; simulates each fills
  - detail_timeframe enables sub-strategy timeframe backtesting (freqtrade/optimize/backtesting.py:261(init_backtest_detail))
    - Support for e.g. 1m entry timing within 5m strategy
  - Funding fees calculated from historical funding_rate data (freqtrade/optimize/backtesting.py:957(_run_funding_fees))
    - Futures trading cost simulation accuracy
  - 'PairLists validated: VolumePairList forbidden, PrecisionFilter single-strat only (freqtrade/optimize/backtesting.py:221(_validate_pairlists_for_backtesting))
    - VolumePairList needs live data; PrecisionFilter stateful'
