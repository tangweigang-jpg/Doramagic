    fit_for:
    - Multi-purpose trading, good API coverage
    not_fit_for:
    - Users preferring simpler interfaces
  - name: Kraken
    traits:
    - spot
    - futures
    fit_for:
    - Regulated exchange, strong on EUR pairs
    not_fit_for:
    - Users needing high leverage or exotic pairs
  - name: Gate.io
    traits:
    - spot
    - futures
    - margin
    fit_for:
    - Large altcoin selection
    not_fit_for:
    - Users preferring more regulated exchanges
  - name: Hyperliquid
    traits:
    - futures
    - perpetuals
    fit_for:
    - Perpetual futures with low fees, fast execution
    not_fit_for:
    - Spot trading, beginners
  default: binance
  _source: worker_resource
- id: slot-002
  name: database
  description: Choose SQLite for simplicity; PostgreSQL for production multi-bot setups; MySQL if already
    integrated
  used_in_stages: []
  options:
  - name: SQLite
    traits:
    - local
    - single-user
    - embedded
    fit_for:
    - Single bot instances, testing, small trade histories
    not_fit_for:
    - Multi-bot deployments, large trade histories, high concurrency
  - name: PostgreSQL
    traits:
    - server
    - multi-user
    - concurrent
    - scalable
    fit_for:
    - Production deployments, multiple bots, large datasets
    not_fit_for:
    - Simple setups, limited DB admin experience
  - name: MySQL/MariaDB
    traits:
    - server
    - multi-user
    - widely-supported
    fit_for:
    - Existing MySQL infrastructure, shared hosting
    not_fit_for:
    - Complex trading strategies requiring PostgreSQL features
  default: SQLite
  _source: worker_resource
- id: slot-003
  name: notification_service
  description: Telegram for full functionality; Discord for passive notifications; Webhooks for system
    integration
  used_in_stages: []
  options:
  - name: Telegram
    traits:
    - bidirectional
    - interactive
    - commands
    fit_for:
    - Full bot control, real-time updates, interactive buttons
    not_fit_for:
    - Users without Telegram accounts, minimal notifications only
  - name: Discord
    traits:
    - one-way
    - channels
    - embeds
    fit_for:
    - Discord users, channel-based notifications
    not_fit_for:
    - Bidirectional control, interactive commands
  - name: Custom Webhooks
    traits:
    - generic
    - flexible
    - extensible
    fit_for:
    - Integration with other systems, custom notification pipelines
    not_fit_for:
    - Users wanting native integrations
  default: Telegram
  _source: worker_resource
- id: slot-004
  name: fiat_conversion_provider
  description: Start with demo; upgrade to pro for production reliability
  used_in_stages: []
  options:
  - name: CoinGecko (Demo)
    traits:
    - free
    - limited-rate
    - demo-mode
    fit_for:
    - Initial setup, testing, low-volume usage
    not_fit_for:
    - High-frequency price lookups, production trading bots
  - name: CoinGecko (Pro)
    traits:
    - paid
    - higher-rate-limits
    - priority
    fit_for:
    - Production bots, reliable fiat conversion
    not_fit_for:
    - Budget-constrained users
  default: CoinGecko Demo
  _source: worker_resource
- id: slot-005
  name: freqai_ml_backend
  description: LightGBM for speed and CPU efficiency; PyTorch for RL; XGBoost for accuracy
  used_in_stages: []
  options:
  - name: LightGBM
    traits:
    - fast
    - cpu-efficient
    - tree-based
    fit_for:
    - Quick training, CPU-only systems, tabular data
    not_fit_for:
    - Deep learning use cases, GPU acceleration needs
  - name: XGBoost
    traits:
    - accurate
    - cpu-efficient
    - tree-based
    fit_for:
    - High accuracy requirements, CPU-only systems
    not_fit_for:
    - Very large datasets requiring GPU acceleration
  - name: PyTorch (RL)
    traits:
    - gpu-accelerated
    - flexible
    - deep-learning
    fit_for:
    - Reinforcement learning, GPU training, custom architectures
    not_fit_for:
    - CPU-only systems, simple prediction tasks
  - name: Stable-Baselines3 (RL)
    traits:
    - rl-algorithms
    - gpu-accelerated
    - production-ready
    fit_for:
    - Reinforcement learning strategies, PPO/A2C/TRPO algorithms
    not_fit_for:
    - Simple prediction, CPU-only RL, non-x86 MacOS
  default: LightGBM
  _source: worker_resource
- id: slot-006
  name: data_format_handler
  description: Feather for general use; Parquet for large datasets; JSON for debugging
  used_in_stages: []
  options:
  - name: JSON
    traits:
    - human-readable
    - portable
    - slow
    fit_for:
    - Debugging, small datasets, maximum portability
    not_fit_for:
    - Large datasets, performance-critical operations
  - name: JSONGZ
    traits:
    - compressed
    - moderate-size
    fit_for:
    - Medium datasets, storage-constrained environments
    not_fit_for:
    - Maximum performance requirements
  - name: Feather
    traits:
    - fast
    - columnar
    - apache-arrow
    fit_for:
    - Most use cases, good balance of speed and compatibility
    not_fit_for:
    - ARMv7l systems (not supported)
  - name: Parquet
    traits:
    - fast
    - columnar
    - compressed
    - apache-arrow
    fit_for:
    - Large datasets, analytics, cloud storage
    not_fit_for:
    - ARMv7l systems (not supported)
  default: feather
  _source: worker_resource
