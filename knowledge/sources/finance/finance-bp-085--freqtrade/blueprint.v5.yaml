    default: Close at next candle
  - name: protections
    description: Trade cooldown and drawdown protections
    options:
    - name: MaxDrawdown
      traits:
      - global drawdown limit
      - pause trading
      fit_for:
      - Risk management
      not_fit_for:
      - Uncapped strategies
    - name: CooldownPeriod
