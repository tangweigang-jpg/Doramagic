  - LocalTrade fields match Trade fields exactly
- id: hyperoptimization
  name: Hyperoptimization
  order: 6
  responsibility: Uses Optuna framework to search strategy parameter space efficiently, parallelizes evaluation
    across multiple CPU cores, minimizes configurable loss functions to find optimal strategy parameters.
  interface:
    inputs:
    - Strategy parameter space defined via HyperStrategyMixin
    - timerange
    - loss function
    - epochs/n_trials
    outputs:
    - Optimal parameters saved to hyperopt_results file
    - loss value per trial
  required_methods:
  - name: Hyperopt.run
    description: Main hyperopt orchestration, runs optimization trials with Optuna
    evidence: freqtrade/optimize/hyperopt/hyperopt.py:35(class Hyperopt)
  - name: HyperOptimizer.hyperopt_pickle_magic
    description: Enables strategy pickling across processes for multiprocessing. Required for strategy
      inheritance across files.
    evidence: freqtrade/optimize/hyperopt/hyperopt_optimizer.py:147(hyperopt_pickle_magic)
  - name: IHyperOptLoss.__call__
    description: Abstract loss function evaluation, must return scalar loss value to minimize
    evidence: freqtrade/optimize/hyperopt_loss/hyperopt_loss_interface.py:24(IHyperOptLoss)
  key_behaviors:
  - behavior: Picklable optimizer
    description: HyperOptimizer must be picklable for multiprocessing. Strategy inheritance across files
      requires special pickle handling.
    evidence: freqtrade/optimize/hyperopt/hyperopt_optimizer.py:147(hyperopt_pickle_magic)
  - behavior: Parallelization via loky
    description: Parallelization uses joblib.externals.loky (not fork) for logging compatibility. Avoids
      deadlock from thread-unsafe logging in child processes.
    evidence: freqtrade/optimize/hyperopt/hyperopt.py:1
  - behavior: Auto-detected parameter spaces
    description: 'HyperStrategyMixin auto-detects parameter spaces by name prefix: buy_*, sell_*, enter_*,
      exit_*, protection_*. Non-conforming names raise DependencyException.'
    evidence: freqtrade/strategy/hyper.py:167-182(detect_all_parameters)
  - behavior: Swappable loss functions
    description: Loss functions implemented as separate IHyperOptLoss classes. Swappable objectives allow
      different optimization goals.
    evidence: freqtrade/optimize/hyperopt_loss/hyperopt_loss_interface.py:24(IHyperOptLoss)
  replaceable_points:
  - name: optimizer
    description: Search algorithm for parameter space exploration
    options:
    - name: optuna.TPE
      traits:
      - tree-structured Parzen estimator
      - adaptive
      fit_for:
      - Most strategies
      - efficient search
      not_fit_for:
      - Very small spaces
    - name: optuna.NSGAIIISampler
      traits:
      - multi-objective
      - Pareto optimal
      fit_for:
      - Multiple loss functions
      not_fit_for:
      - Single-objective optimization
    default: optuna.TPE
  - name: loss_function
    description: Optimization objective to minimize
    options:
    - name: OnlyProfitHyperOptLoss
      traits:
      - profit maximization
      - simple
      fit_for:
      - Simple strategies
      - max profit goal
      not_fit_for:
      - Risk-aware strategies
    - name: SharpeHyperOptLoss
      traits:
      - risk-adjusted returns
      - penalizes volatility
      fit_for:
      - Conservative strategies
      - stable returns
      not_fit_for:
      - High-variance strategies
    - name: SortinoHyperOptLoss
      traits:
      - downside risk
      - ignores upside volatility
      fit_for:
      - Asymmetric risk profiles
      not_fit_for:
      - Symmetric strategies
    - name: CalmarHyperOptLoss
      traits:
      - max drawdown focused
      fit_for:
      - Aggressive growth
      - drawdown tolerance
      not_fit_for:
      - Conservative strategies
    - name: MaxDrawDownHyperOptLoss
      traits:
      - drawdown minimization
      fit_for:
      - Capital preservation
      not_fit_for:
      - Profit maximization
    default: OnlyProfitHyperOptLoss
  design_decisions:
  - HyperOptimizer must be picklable for multiprocessing (freqtrade/optimize/hyperopt/hyperopt_optimizer.py:147(hyperopt_pickle_magic))
    - Strategy inheritance across files requires special pickle handling
  - Loss functions as separate IHyperOptLoss implementations (freqtrade/optimize/hyperopt_loss/hyperopt_loss_interface.py:24(IHyperOptLoss))
    - Swappable objectives (Sharpe, Sortino, drawdown)
  - Built-in loss functions include Calmar, Sharpe, Sortino, MaxDrawdown (freqtrade/constants.py:30(HYPEROPT_LOSS_BUILTIN))
    - Standard finance metrics for strategy evaluation
  - Parallelization via joblib.externals.loky (not fork) for logging compatibility (freqtrade/optimize/hyperopt/hyperopt.py:1)
    - Avoids deadlock from thread-unsafe logging in child processes
  acceptance_hints:
  - Hyperopt completes trials without pickle errors
  - Loss function values decrease over successful trials
  - Optimal parameters saved and loadable
  - Multiprocessing utilizes multiple CPU cores
