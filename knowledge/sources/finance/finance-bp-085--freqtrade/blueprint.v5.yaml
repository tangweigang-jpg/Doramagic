    → predict → remove_features_from_df'
  rationale: 'FreqAI follows a strict lifecycle order during operation: pair dictionary information is
    set first, then either live or backtesting mode is started, followed by data extraction and model
    training, then prediction generation, and finally feature cleanup. This sequence ensures models are
    trained before use, data is prepared before training, and resources are cleaned after prediction.
    Skipping or reordering steps would cause failures or resource leaks.'
  evidence: freqtrade/freqai/freqai_interface.py:130(start)
  stage: ordering_contract
  alternative_considered: Parallel data preparation was rejected for state management complexity
- id: BD-145
  type: BA
  content: REQUIRED_ORDERTYPES = ['entry', 'exit', 'stoploss', 'stoploss_on_exchange'] must each be present
  rationale: Every four order types (entry, exit, stoploss, stoploss_on_exchange) must be defined in the
    strategy or config. Missing any required order type causes strategy validation failure. This invariant
    ensures complete order type coverage before the bot attempts trading, preventing runtime errors when
    trying to place orders. The sanity validation explicitly checks each required type exists before allowing
    strategy loading.
  evidence: freqtrade/constants.py:24(REQUIRED_ORDERTYPES), freqtrade/resolvers/strategy_resolver.py:153-159(sanity
    validation)
  stage: invariant
  alternative_considered: Optional order types with fallback behavior was rejected for consistency
  _evidence_issues:
  - 'INVALID_IDENTIFIER: REQUIRED_ORDERTYPES), freqtrade/resolvers/strategy_resolver.py:153-159(sanity
    validation in freqtrade/constants.py'
- id: BD-146
  type: B/BA
  content: INTERFACE_VERSION defaults to 3 (latest); Version 2 requires metadata dict in populate_* methods
  rationale: The INTERFACE_VERSION defaults to 3 in IStrategy, indicating the current supported interface
    version. Version 2 strategies require metadata dictionaries as third arguments to populate methods,
    enforced by the StrategyResolver detecting argc==2 for v1 or checking version comments for v2. Using
    non-current versions triggers warnings or errors, encouraging migration to the latest interface.
  evidence: 'freqtrade/strategy/interface.py:67(INTERFACE_VERSION: int = 3), freqtrade/strategy/interface.py:63-66(version
    comments)'
  stage: default_value
  alternative_considered: Auto-upgrade was rejected due to potential behavior changes
  _evidence_issues:
  - 'INVALID_IDENTIFIER: INTERFACE_VERSION: int = 3), freqtrade/strategy/interface.py:63-66(version comments
    in freqtrade/strategy/interface.py'
- id: BD-147
  type: B/DK
  content: 'INTERACTION: DataFrame column ordering (BD-001) multiplied by hardcoded tuple indices (BD-133)
    creates fragile data pipeline where any column deviation silently corrupts each downstream calculations'
  rationale: Column ordering enforcement via BD-001 is amplified by hardcoded indices in BD-133, creating
    a fragile contract. If column order is violated, indices 0-8 reference completely wrong data with
    no runtime errors, silently corrupting OHLCV prices, signals, and profit calculations simultaneously.
    This amplifies from a simple ordering requirement into a system-wide data integrity risk.
  evidence: BD-001,BD-133
  stage: global
  alternative_considered: Named column access was rejected in BD-001 due to 3x performance penalty, but
    this creates the hidden index dependency risk
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-148
  type: BA/M
  content: 'INTERACTION: test_size defaults to 0 for backtesting performance (BD-017) contradicts worst-case
    fee validation assumption (BD-121) where backtested strategies cannot detect model degradation because
    validation is skipped when test_size=0'
  rationale: 'This contradiction creates false confidence: BD-017 prioritizes speed by disabling validation,
    while BD-121 assumes accurate profitability modeling. When test_size=0, users receive no feedback
    about model degradation despite fee-inclusive profitability being computed. The strategy appears profitable
    in backtest but may fail in live trading without any warning from the backtest itself.'
  evidence: BD-017,BD-121
  stage: global
  alternative_considered: Forcing validation would slow hyperopt 2x+, making it impractical for optimization
    workflows
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-149
  type: B/BA
  content: 'INTERACTION: FreqAI 1.5x safety multiplier (BD-070) silently depends on strategy startup_candle_count
    (BD-011) without explicit coordination, potentially causing feature NaN values when indicator periods
    exceed the strategy''s warmup period'
  rationale: BD-070 calculates startup candles as max_period * 1.5, assuming indicator periods determine
    warmup needs. However, BD-011 allows strategies to define custom startup_candle_count that may be
    smaller than what FreqAI expects. This hidden dependency means strategies using FreqAI with small
    startup_candle_count values may have insufficient historical data for model features, producing NaN
    values in training data without explicit error.
  evidence: BD-070,BD-011
  stage: global
  alternative_considered: Auto-detecting max_period from FreqAI features was rejected for complexity
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-150
  type: B/RC
  content: 'INTERACTION: CandleType enum (BD-004) enables PairWithTimeframe (BD-005) to distinguish spot
    vs funding candles, which propagates to funding fee calculation (BD-032). A CandleType misclassification
    would corrupt both funding fee estimation and pair identification, causing incorrect backtest results
    for futures strategies'
  rationale: 'These three decisions form a risk cascade: BD-004 creates the CandleType taxonomy, BD-005
    incorporates it into pair identity, and BD-032 uses it for fee calculations. If a funding rate candle
    is misclassified as a spot candle, the system would use wrong price data for backtesting and ignore
    critical funding fees that significantly impact futures profitability. The cascade means a single
    classification error propagates silently through multiple systems.'
  evidence: BD-004,BD-005,BD-032
  stage: global
  alternative_considered: Separate dataframe storage per candle type was rejected in BD-004 for complexity,
    but this increases misclassification risk
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-151
  type: B/BA
  content: 'INTERACTION: Async entry returns after order placement (BD-022) amplifies capital efficiency
    while sequential trade processing (BD-023) constrains state modification, together enabling concurrent
    multi-pair entries with safe single-threaded state management'
  rationale: 'BD-022 enables non-blocking order placement so multiple orders can be in-flight simultaneously,
    improving capital efficiency across pairs. BD-023 ensures only one trade is processed per iteration,
    preventing race conditions in shared state modification. Together they achieve the best of both worlds:
    concurrent order submission without the complexity of parallel state management. This amplification
    enables high-frequency multi-pair strategies that would be impossible with either blocking entries '
  evidence: BD-022,BD-023
  stage: global
  alternative_considered: Parallel processing was rejected in BD-023 due to deadlock risk in order status
    updates
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-152
  type: B
  content: 'INTERACTION: populate_* method sequence contract (BD-122) has hidden dependency on hardcoded
    column indices (BD-133), enforcing that indicators must populate columns at specific positions before
    entry/exit methods read them. Violation causes undefined signal generation'
  rationale: BD-122 enforces that populate_indicators executes before populate_entry_trend before populate_exit_trend,
    but this sequencing only works correctly because BD-133 hardcodes column positions. Custom strategies
    that add columns in wrong positions will silently produce incorrect signals because the hardcoded
    index access will retrieve wrong data. The sequence contract is meaningless without the index discipline,
    creating a hidden architectural dependency that is not explicitly documented.
  evidence: BD-122,BD-133
  stage: global
  alternative_considered: Named column access was rejected in BD-001 for performance, but this creates
    hidden index coupling
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-153
  type: B/DK
  content: 'INTERACTION: train_period_days (BD-069) and sliding window paradigm (BD-095) amplify data
    preparation requirements that depend on sklearn train_test_split (BD-093) for temporal integrity,
    creating amplification where temporal boundary violations cause look-ahead bias'
  rationale: BD-069 defines training window size, BD-095 moves this window through historical data, and
    BD-093 performs the actual temporal split. These three amplify each other's data integrity requirements.
    If any temporal boundary is violated (e.g., shuffling enabled in train_test_split), the entire sliding
    window paradigm breaks down because features would include future information. The amplification means
    temporal integrity must be maintained across each three decisions simultaneously.
  evidence: BD-069,BD-095,BD-093
  stage: global
  alternative_considered: Alternative temporal splitting was considered but sklearn's shuffle=False provides
    the required integrity
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-154
  type: B/DK
  content: 'INTERACTION: Column ordering (BD-001) feeds into profit calculation (BD-028) which propagates
    to performance metrics (BD-086-BD-092). Wrong column mapping would corrupt profit calculations, leading
    to invalid CAGR, Sharpe, Sortino, and other ratios that appear legitimate'
  rationale: This risk cascade connects BD-001 through BD-028 (which includes fees in profit) to the entire
    metrics subsystem (BD-086-BD-092). If column ordering is violated, wrong price values feed into profit
    calculations. The corrupted profit figures then flow into CAGR, Sharpe, Sortino, MaxDrawdown, and
    other metrics. The cascade is particularly dangerous because each output metrics appear numerically
    valid with no error indicators, making the corruption invisible to users reviewing backtest results.
  evidence: BD-001,BD-028,BD-086,BD-087,BD-088,BD-089,BD-090,BD-091,BD-092
  stage: global
  alternative_considered: Validation of column positions at runtime was considered but adds overhead to
    hot-path operations
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-GAP-001
  type: T
  content: 'Trade parallelism detection uses boolean expansion: each trade is expanded once per period
    it was open, then overlaps are counted by summing per-period flags'
  rationale: Boolean expansion simplifies overlap detection to a counting problem rather than interval
    intersection; breaks when trades span thousands of periods causing memory explosion
  evidence: freqtrade/data/btanalysis/trade_parallelism.py:12(analyze_trade_parallelism)
  stage: strategy_analysis
  alternative_considered: Interval tree or sweep-line algorithm for O(n log n) overlap counting
- id: BD-GAP-002
  type: B/DK
  content: Tick size precision uses monthly maximum of significant digits per month rather than per-candle
    precision
  rationale: Monthly aggregation smooths temporary precision spikes from exchange corrections; breaks
    when precision degrades permanently within a month
  evidence: freqtrade/data/btanalysis/historic_precision.py:5(get_tick_size_over_time)
  stage: data_ingestion
  alternative_considered: Per-candle precision tracking or moving window maximum
- id: BD-GAP-003
  type: BA
  content: Backtest results use metadata stored separately from data, enabling partial file loading without
    full deserialization
  rationale: Separation allows listing/filtering backtest runs by metadata (date, strategy) without reading
    large result sets; breaks when metadata is missing or corrupted
  evidence: freqtrade/data/btanalysis/bt_fileutils.py:141(load_backtest_metadata)
  stage: storage
  alternative_considered: Single-file format with fixed header offsets or index block
- id: BD-GAP-004
  type: BA/DK
  content: Multiple data handlers (JSON, JSON.GZ, Parquet, Feather) implement a common IDataHandler interface
    with identical method signatures
  rationale: Pluggable storage allows users to trade off readability vs. performance; breaks when handler-specific
    features are needed (e.g., Arrow time filtering only in Feather)
  evidence: freqtrade/data/history/datahandlers/idatahandler.py:74(ohlcv_store)
  stage: storage
  alternative_considered: Single format optimized for each use cases
- id: BD-GAP-005
  type: T
  content: Feather handler builds Arrow predicate filters for timerange loading while other handlers load-then-filter
    in Pandas
  rationale: Arrow push-down predicates avoid loading irrelevant rows from disk; breaks when timerange
    covers most of the dataset (predicate overhead exceeds savings)
  evidence: freqtrade/data/history/datahandlers/featherdatahandler.py:115(_build_arrow_time_filter)
  stage: storage
  alternative_considered: Unified time-based file naming convention for O(1) range lookups
- id: BD-GAP-006
  type: T
  content: TypedDict is used for API schemas and result types instead of Pydantic models or dataclasses
  rationale: TypedDict provides structural typing with runtime access; breaks when validation or default
    values are needed (some types have factory functions like get_BacktestResultType_default)
  evidence: freqtrade/ft_types/backtest_result_type.py:15(BacktestResultType)
  stage: api
  alternative_considered: Pydantic BaseModel for auto-validation or msgspec for performance
- id: BD-GAP-007
  type: B/DK
  content: 'Protection plugins return lock decisions via tuple [bool, until, reason] with dual scope:
    global_stop and stop_per_pair'
  rationale: Two-level locking allows granular per-pair protection without global pauses; breaks when
    protection configs conflict (e.g., global cooldown shorter than per-pair drawdown lock)
  evidence: freqtrade/plugins/protections/iprotection.py:105(global_stop)
  stage: order_execution
  alternative_considered: Unified lock manager with priority ordering across protection types
- id: BD-GAP-008
  type: B/DK
  content: Cooldown duration uses max(unlock_time, stop_duration) to determine lock end, allowing either
    time-based or candle-based unlocking
  rationale: Flexible unlock modes accommodate different trading styles (time-based for 24/7 markets,
    candle-based for timeframe-aligned protection); breaks when neither is set
  evidence: freqtrade/plugins/protections/iprotection.py:124(calculate_lock_end)
  stage: order_execution
  alternative_considered: Require explicit unlock mode; fail-fast on missing config
- id: BD-GAP-009
  type: BA
  content: VarHolder pattern consolidates each indicator variables into one object per time step, shared
    across analysis instances to avoid per-variable DataFrame copying
  rationale: Sharing reduces memory churn during iterative analysis; breaks when concurrent access causes
    race conditions or when variables have different temporal scopes
  evidence: freqtrade/optimize/analysis/base_analysis.py:14(VarHolder)
  stage: strategy_analysis
  alternative_considered: Per-indicator DataFrames with explicit merge or lazy evaluation
- id: BD-GAP-010
  type: BA
  content: Backtest results stored in ZIP archives with metadata in separate .json and .json.meta files
    for selective loading
  rationale: Separate metadata enables fast directory scanning; breaks when ZIP entries are large and
    random access is needed
  evidence: freqtrade/optimize/optimize_reports/bt_storage.py:49(store_backtest_results)
  stage: storage
  alternative_considered: Append-only format with periodic checkpoints
- id: BD-GAP-011
  type: B/BA
  content: 'WebSocket channel implements adaptive throttling: calculated high limit per channel based
    on avg_send_time, default 0.01s throttle'
  rationale: Adaptive rate prevents slow clients from blocking fast ones; breaks when avg_send_time is
    zeroed by disconnects
  evidence: freqtrade/rpc/api_server/ws/channel.py:72(_calc_send_limit)
  stage: api
  alternative_considered: Token bucket rate limiting per connection
- id: BD-GAP-012
  type: B/BA
  content: Strategy names are verified to not be base64-encoded as a security measure against encoded
    attack payloads
  rationale: Prevents uploading strategies with obfuscated malicious code; breaks when legitimate strategies
    use base64-like naming
  evidence: freqtrade/rpc/api_server/deps.py:80(verify_strategy)
  stage: security
  alternative_considered: Allowlist of allowed characters or mandatory strategy file existence check
- id: BD-GAP-013
  type: B/BA
  content: REST client uses connection pooling with pool_connections=10 and pool_maxsize=10, with 10-second
    default timeout
  rationale: Pool reuse amortizes TCP handshake overhead for frequent API calls; breaks under high concurrency
    where 10 connections become saturated
  evidence: ft_client/freqtrade_client/ft_rest_client.py:25(__init__)
  stage: client
  alternative_considered: Dynamic pool sizing or async HTTP client
- id: BD-GAP-014
  type: B/BA
  content: JSON logging uses rapidjson with JS-compatible NaN/Inf handling to prevent serialization errors
    in API responses
  rationale: JS-compatible edge case handling avoids malformed responses; breaks when downstream parsers
    expect strict JSON
  evidence: freqtrade/rpc/api_server/webserver.py:96(render)
  stage: api
  alternative_considered: Reject NaN/Inf at input or encode as special strings
- id: BD-GAP-015
  type: B
  content: BufferingHandler keeps half of configured capacity on flush to prevent momentary log gaps during
    rotation
  rationale: Overlap during rotation ensures no messages are lost; breaks when messages arrive faster
    than flush can complete
  evidence: freqtrade/loggers/buffering_handler.py:5(flush)
  stage: infrastructure
  alternative_considered: Full flush with acknowledgment or blocking write
- id: BD-GAP-016
  type: B
  content: Leverage interest calculation uses FtPrecise for arbitrary-precision financial arithmetic instead
    of Python float
  rationale: Avoids floating-point rounding errors in interest accrual; breaks when FtPrecise operations
    become performance bottleneck
  evidence: freqtrade/leverage/interest.py:12(interest)
  stage: order_execution
  alternative_considered: Decimal with explicit precision limits or fixed-point integer cents
- id: BD-GAP-017
  type: BA
  content: TensorboardCallback logs episodic summaries with scalar values using tag-based namespacing
    for multi-strategy comparison
  rationale: Tag namespacing allows filtering and comparing across strategies in TensorBoard UI; breaks
    when strategy names contain invalid tag characters
  evidence: freqtrade/freqai/tensorboard/TensorboardCallback.py:43(_on_step)
  stage: ml_training_inference
  alternative_considered: Hash strategy names or sanitize before logging
- id: BD-GAP-018
  type: BA/M
  content: Lookahead analysis fills entry and exit varholders separately, enabling per-row correlation
    of entry signals with future exit conditions
  rationale: Separation allows studying signal quality vs. hindsight exit; breaks when entry and exit
    signals span different time horizons
  evidence: freqtrade/optimize/analysis/lookahead.py:139(fill_entry_and_exit_varHolders)
  stage: strategy_analysis
  alternative_considered: Lazy evaluation or streaming correlation
- id: BD-GAP-019
  type: RC
  content: 'Missing: float vs Decimal for currency'
  rationale: 'Audit finding: missing: float vs decimal for currency. Identified by audit checklist. This
    gap affects production reliability and should be addressed.'
  evidence: N/A:0(see_rationale)
  stage: data_ingestion
  status: missing
