# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-085
name: freqtrade
sop_version: '3.6'
source:
  projects:
  - freqtrade
  commit_hash: 3a76235c489a26b08fff6ba1d727492d31841bb2
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: cryptocurrency trading bot with backtesting, hyperoptimization, and ML-based signal generation
  description: Automated cryptocurrency trading bot supporting spot and futures markets with strategy
    development, historical backtesting, hyperparameter optimization via Optuna, and FreqAI ML-based prediction
    for entry/exit signals.
  prerequisites: Python programming knowledge, exchange API credentials, understanding of OHLCV candlestick
    data, basic trading concepts
  not_suitable_for: Stock/forex trading, high-frequency scalping, users without dry-run testing experience,
    non-cryptocurrency markets
stages:
- id: data_ingestion
  name: Data Ingestion & History Management
  order: 1
  responsibility: Fetches OHLCV candle data from exchanges via ccxt library, stores and retrieves historical
    data in multiple formats, provides unified data access layer for backtesting and live trading operations.
  interface:
    inputs:
    - exchange credentials
    - pair list
    - timeframe
    - timerange
    outputs:
    - 'DataFrame with OHLCV columns: date, open, high, low, close, volume'
  required_methods:
  - name: Exchange._init_subclasses
    description: Discovers and initializes exchange-specific subclasses for non-ccxt features
    evidence: freqtrade/exchange/exchange.py:120(class Exchange)
  - name: IDataHandler.get_file_extension
    description: Returns file extension for the data format (json, parquet, feather, gz)
    evidence: freqtrade/data/history/datahandlers/idatahandler.py:33(class IDataHandler)
  - name: DataProvider.get_df
    description: Retrieves OHLCV DataFrame for a given pair and timeframe during strategy execution
    evidence: freqtrade/data/dataprovider.py:39(class DataProvider)
  - name: load_data
    description: Loads historical OHLCV data for multiple pairs with timerange filtering, supports prepend
      mode
    evidence: freqtrade/data/history/history_utils.py:79(function load_data)
  key_behaviors:
  - behavior: DataFrame column order enforcement
    description: 'OHLCV DataFrames must have columns in specific order: date, open, high, low, close,
      volume. This enables vectorized operations throughout the system.'
    evidence: freqtrade/constants.py:84(DEFAULT_DATAFRAME_COLUMNS)
  - behavior: Memory optimization via float32
    description: OHLCV data stored as float32 to reduce memory footprint by approximately 50% without
      sacrificing trading precision.
    evidence: freqtrade/data/converter/converter.py:284(reduce_dataframe_footprint)
  - behavior: CandleType separation for futures
    description: SPOT, FUNDING_RATE, and MARK candle types are separated via CandleType enum to avoid
      conflating different data types in futures markets.
    evidence: freqtrade/enums/candletype.py:1(CandleType)
  - behavior: Historical data prepend mode
    description: Newer older data can be prepended to existing history without losing existing data, enabling
      incremental data extension.
    evidence: freqtrade/data/history/history_utils.py:225(_download_pair_history)
  replaceable_points:
  - name: data_handler_implementation
    description: Pluggable storage backends for OHLCV historical data persistence
    options:
    - name: ParquetDataHandler
      traits:
      - columnar format
      - compressed
      - fast random access
      fit_for:
      - Large datasets
      - backtesting with many pairs
      not_fit_for:
      - Small datasets
      - incremental updates
    - name: FeatherDataHandler
      traits:
      - in-memory format
      - fastest read/write
      - Apache Arrow
      fit_for:
      - Interactive analysis
      - frequent reads
      not_fit_for:
      - Long-term archival
      - cross-platform
    - name: JsonDataHandler
      traits:
      - human readable
      - no dependencies
      fit_for:
      - Debugging
      - small datasets
      not_fit_for:
      - Large datasets
      - production backtesting
    - name: JsonGzDataHandler
      traits:
      - compressed JSON
      - disk efficient
      fit_for:
      - Disk-constrained environments
      not_fit_for:
      - Read-heavy workloads
    default: ParquetDataHandler
  - name: exchange_adapter
    description: Exchange-specific adapters for non-ccxt features
    options:
    - name: Exchange (generic ccxt)
      traits:
      - universal support
      - limited customization
      fit_for:
      - Standard exchanges
      - development
      not_fit_for:
      - Exchanges with unique APIs
    - name: Binance
      traits:
      - full Binance ecosystem
      - futures support
      fit_for:
      - Binance spot/futures
      not_fit_for:
      - Other exchanges
    - name: Bybit
      traits:
      - Bybit-specific order types
      - unified trading
      fit_for:
      - Bybit traders
      not_fit_for:
      - Other exchanges
    - name: Hyperliquid
      traits:
      - DEX support
      - perpetual futures
      fit_for:
      - Decentralized trading
      not_fit_for:
      - Centralized exchanges
    default: Exchange (generic ccxt)
  design_decisions:
  - DataFrame columns must include date, open, high, low, close, volume in order (freqtrade/constants.py:84(DEFAULT_DATAFRAME_COLUMNS))
    - Enables vectorized operations and ensures consistent downstream processing
  - OHLCV data stored with float32 to reduce memory footprint (freqtrade/data/converter/converter.py:284(reduce_dataframe_footprint))
    - Trading data precision doesn't require float64, saves ~50% memory
  - Exchange abstraction via ccxt with _ft_has dict for per-exchange capability flags (freqtrade/exchange/exchange.py:130(_ft_has_default))
    - Avoids exchange-specific code paths while allowing targeted overrides
  - CandleType enum separates SPOT/FUNDING_RATE/MARK candle types (freqtrade/enums/candletype.py:1(CandleType))
    - Futures require multiple candle types; avoids conflating mark/funding with price candles
  - PairWithTimeframe is tuple[str, str, CandleType] - includes candle type (freqtrade/constants.py:220(PairWithTimeframe))
    - Same pair/timeframe can have different candle types (spot vs funding)
  - Data download supports prepend mode for extending historical data (freqtrade/data/history/history_utils.py:225(_download_pair_history))
    - Prepend new older data without losing existing history
  acceptance_hints:
  - load_data returns DataFrames with exactly 6 columns in DEFAULT_DATAFRAME_COLUMNS order
  - download completes without error for supported exchange/timeframe combinations
  - DataProvider.get_df returns same format DataFrames during live and backtest modes
  - Feather/Parquet files readable by both load_data and FreqAI data kitchen
- id: strategy_analysis
  name: Strategy Analysis & Signal Generation
  order: 2
  responsibility: Processes OHLCV data through strategy-defined indicators, generates entry/exit signals
    for long/short positions, manages pair locking and informative pairs for cross-pair analysis. This
    is the core execution point where trading decisions originate.
  interface:
    inputs:
    - OHLCV DataFrame
    - metadata dict (pair, timeframe)
    - strategy configuration
    outputs:
    - 'DataFrame with signal columns: enter_long, exit_long, enter_short, exit_short, enter_tag, exit_tag'
  required_methods:
  - name: IStrategy.populate_indicators
    description: Calculates technical indicators and appends them to the OHLCV DataFrame. Must execute
      before entry/exit signal generation.
    evidence: freqtrade/strategy/interface.py:247(populate_indicators)
  - name: IStrategy.populate_entry_trend
    description: Generates entry signals (enter_long, enter_short) based on populated indicators
    evidence: freqtrade/strategy/interface.py:247(populate_entry_trend)
  - name: IStrategy.populate_exit_trend
    description: Generates exit signals (exit_long, exit_short) based on populated indicators and ROI/stoploss
      evaluation
    evidence: freqtrade/strategy/interface.py:247(populate_exit_trend)
  - name: IStrategy.get_entry_signal
    description: Returns entry signal value (-1 for short, 0 for none, 1 for long) for current candle
    evidence: freqtrade/strategy/interface.py:1347(get_entry_signal)
  - name: IStrategy.should_exit
    description: Determines if trade should exit and returns exit reason (ROI, STOP_LOSS, EXIT_SIGNAL,
      CUSTOM_EXIT, TRAILING_STOP_LOSS)
    evidence: freqtrade/strategy/interface.py:1496(should_exit)
  key_behaviors:
  - behavior: Strict populate order enforcement
    description: populate_indicators must execute before populate_entry_trend, which must execute before
      populate_exit_trend. Backtesting and live trading rely on this sequence.
    evidence: freqtrade/strategy/interface.py:1202(_analyze_ticker_internal)
  - behavior: Signal encoding as {-1, 0, 1}
    description: Entry signals encoded as -1 (short), 0 (none), 1 (long). Single column encodes direction
      allowing vectorized operations.
    evidence: freqtrade/strategy/interface.py:1347(get_entry_signal)
  - behavior: Exit priority sequence
    description: 'Exit evaluation follows hardcoded priority: exit_signal > stoploss > ROI > trailing_stoploss.
      Earlier types take precedence.'
    evidence: freqtrade/strategy/interface.py:1496(should_exit)
  - behavior: Pair locking for cooldown
    description: Pairs can be locked to prevent new entries during cooldown periods. Locks respect UTC
      timestamps.
    evidence: freqtrade/strategy/interface.py:1131(lock_pair)
  - behavior: Startup candle delay
    description: startup_candle_count delays signal generation until sufficient historical data exists
      for valid indicator calculation.
    evidence: freqtrade/strategy/interface.py:127(startup_candle_count)
  replaceable_points:
  - name: strategy_implementation
    description: User-defined trading logic implementing IStrategy interface
    options:
    - name: any IStrategy subclass
      traits:
      - user-defined
      - custom indicators
      - custom entry/exit logic
      fit_for:
      - Custom trading strategies
      - proprietary indicators
      not_fit_for:
      - Non-programmers
      - simple rule-based trading
    default: SampleStrategy
  - name: pairlist_filter
    description: Dynamic pair selection and filtering
    options:
    - name: StaticPairList
      traits:
      - fixed pair list
      - no computation
      fit_for:
      - Known pairs
      - backtesting consistency
      not_fit_for:
      - Dynamic market conditions
    - name: VolumePairList
      traits:
      - volume-based filtering
      - dynamic
      fit_for:
      - Liquid pairs
      - momentum strategies
      not_fit_for:
      - Illiquid markets
      - backtesting
    - name: PriceFilter
      traits:
      - price range filtering
      fit_for:
      - Avoiding penny stocks
      - precision control
      not_fit_for:
      - Low-priced high-volume assets
    default: StaticPairList
  - name: custom_callbacks
    description: Override-able strategy callbacks for custom behavior
    options:
    - name: custom_stoploss
      traits:
      - dynamic stoploss
      - per-trade override
      fit_for:
      - Adaptive risk management
      not_fit_for:
      - Fixed stoploss strategies
    - name: custom_exit
      traits:
      - custom exit signals
      - complex exit logic
      fit_for:
      - Multi-condition exits
      not_fit_for:
      - Simple threshold exits
    - name: custom_entry_price
      traits:
      - dynamic entry pricing
      fit_for:
      - limit order optimization
      not_fit_for:
      - market orders only
    default: None (use built-in defaults)
  design_decisions:
  - populate_entry_trend/populate_exit_trend must return DataFrame with signal columns (freqtrade/strategy/interface.py:247(populate_entry_trend))
    - Decouples indicator calculation from execution, enables backtesting replay
  - INTERFACE_VERSION=3 required for short/leverage support (freqtrade/strategy/interface.py:67(INTERFACE_VERSION))
    - Breaking change detection; older strategies must opt-in to futures features
  - informative_pairs() enables cross-pair indicators without duplication (freqtrade/strategy/interface.py:853(informative_pairs))
    - Caches informative data, avoids redundant fetch/calculation per pair
  - Pair locking prevents entries during cooldown periods (freqtrade/strategy/interface.py:1131(lock_pair))
    - Protections (cooldown, max_drawdown) need temporal exclusion
  - startup_candle_count delays signal generation until indicators valid (freqtrade/strategy/interface.py:127(startup_candle_count))
    - Indicator calculations require historical data; prevents false signals
  - 'Custom exit priority: custom_exit > exit_signal > roi > stoploss > trailing (freqtrade/strategy/interface.py:1496(should_exit))
    - User-defined logic takes precedence, then built-in thresholds in sequence'
  - Entry signals encoded as {-1, 0, 1} for short/none/long (freqtrade/strategy/interface.py:1347(get_entry_signal))
    - Single column encodes direction; allows vectorized operations
  - 'ExitType enum distinguishes exit reasons: ROI, STOP_LOSS, EXIT_SIGNAL, CUSTOM_EXIT, LIQUIDATION,
    TRAILING_STOP_LOSS (freqtrade/enums/exittype.py:4(ExitType)) - Audit trail of why trades closed; analytics
    friendly'
  acceptance_hints:
  - populate_indicators completes before populate_entry_trend for same pair
  - Entry signals are integers in {-1, 0, 1} range
  - Strategy with INTERFACE_VERSION=3 can trade futures; INTERFACE_VERSION=2 cannot
  - Pair locks prevent entries until lock_end_time UTC
  - Empty minimal_roi dict results in no ROI-based exits
- id: ml_training_inference
  name: FreqAI ML Training & Inference
  order: 3
  responsibility: Trains machine learning models (XGBoost, LightGBM, PyTorch, Reinforcement Learning)
    for price direction prediction, manages model lifecycle across sliding windows, handles temporal train/test
    splits for realistic backtesting and live inference.
  interface:
    inputs:
    - Filtered OHLCV DataFrame with engineered features/labels
    - timerange
    - FreqAI configuration
    outputs:
    - Predictions DataFrame appended to strategy DataFrame with direction and confidence columns
  required_methods:
  - name: IFreqaiModel.train
    description: Trains ML model on historical data with configurable train/test split. Abstract method
      each FreqAI models must implement.
    evidence: freqtrade/freqai/freqai_interface.py:957(@abstractmethod train)
  - name: IFreqaiModel.predict
    description: Generates predictions on new data using trained model
    evidence: freqtrade/freqai/freqai_interface.py:980(@abstractmethod predict)
  - name: FreqaiDataKitchen.check_if_new_training_required
    description: Determines if model retraining is needed based on timerange and existing models
    evidence: freqtrade/freqai/data_kitchen.py:542(check_if_new_training_required)
  - name: FreqaiDataDrawer.load_historic_predictions_from_disk
    description: Loads cached predictions for sliding window backtesting without retraining
    evidence: freqtrade/freqai/data_drawer.py:172(load_historic_predictions_from_disk)
  key_behaviors:
  - behavior: Sliding window training
    description: 'Training follows sequence: extract_data → train → predict per sliding window (train_period_days
      + backtest_period_days). Training data must precede prediction period.'
    evidence: freqtrade/freqai/freqai_interface.py:301-398(for tr_train, tr_backtest in zip(...))
  - behavior: Pair-scoped data kitchen
    description: FreqaiDataKitchen is per-pair, managing train/test splits and feature filtering. FreqaiDataDrawer
      persists across runs for model metadata.
    evidence: freqtrade/freqai/data_kitchen.py:61(__init__)
  - behavior: Historic prediction caching
    description: Predictions stored to enable sliding window backtesting without retraining on each iteration.
    evidence: freqtrade/freqai/data_drawer.py:172(load_historic_predictions_from_disk)
  - behavior: Device selection priority
    description: 'Device selection order: mps (Apple Silicon) > cuda > cpu. Apple Silicon gets priority
      over CUDA for Mac users.'
    evidence: freqtrade/freqai/base_models/BasePyTorchModel.py:23(device)
  - behavior: Forward-looking label creation
    description: SHIFT(1) used to create labels aligned with training period. Data leakage risk if not
      properly aligned with train/test split.
    evidence: freqtrade/freqai/utils.py:1
  replaceable_points:
  - name: prediction_model
    description: ML model architecture for price/direction forecasting
    options:
    - name: XGBoostClassifier
      traits:
      - tree-based
      - fast training
      - robust
      fit_for:
      - General purpose
      - classification tasks
      not_fit_for:
      - Complex patterns
      - large datasets
    - name: PyTorchMLPClassifier
      traits:
      - neural network
      - flexible architecture
      fit_for:
      - Complex patterns
      - custom architectures
      not_fit_for:
      - Small datasets
      - quick iteration
    - name: ReinforcementLearner
      traits:
      - agent-based
      - sequential decisions
      fit_for:
      - Portfolio optimization
      - long-horizon decisions
      not_fit_for:
      - Point predictions
      - quick backtesting
    - name: PyTorchTransformerRegressor
      traits:
      - attention mechanism
      - sequence modeling
      fit_for:
      - Time series
      - long dependencies
      not_fit_for:
      - Simple patterns
      - low latency
    default: XGBoostClassifier
  - name: compute_device
    description: Hardware acceleration for model training and inference
    options:
    - name: cuda
      traits:
      - NVIDIA GPU
      - widely supported
      fit_for:
      - Deep learning
      - large models
      not_fit_for:
      - Apple Silicon
      - no NVIDIA GPU
    - name: mps
      traits:
      - Apple Silicon GPU
      - power efficient
      fit_for:
      - Mac users
      - PyTorch models
      not_fit_for:
      - XGBoost
      - older Macs
    - name: cpu
      traits:
      - universal
      - slowest
      fit_for:
      - Development
      - small models
      not_fit_for:
      - Production training
      - large datasets
    default: cuda if available, else cpu
  design_decisions:
  - DataKitchen is pair-scoped, DataDrawer is persistent across runs (freqtrade/freqai/data_kitchen.py:61(__init__))
    - Separates ephemeral preprocessing from persistent model state
  - Model retraining triggered by check_if_new_training_required() (freqtrade/freqai/data_kitchen.py:542(check_if_new_training_required))
    - Avoids retraining every candle; uses config to control frequency
  - train/test split via test_size parameter, defaults to train-only if 0 (freqtrade/freqai/base_models/BasePyTorchModel.py:28(splits))
    - Backtesting needs train-only for speed; live benefits from validation
  - Feature pipeline uses datasieve for preprocessing transforms (freqtrade/freqai/freqai_interface.py:532(define_data_pipeline))
    - Composable sklearn-style pipeline for normalization/encoding
  - Historic predictions stored to enable sliding window backtesting (freqtrade/freqai/data_drawer.py:172(load_historic_predictions_from_disk))
    - Avoids retraining during backtest; simulates live inference
  - 'Device selection order: mps > cuda > cpu (freqtrade/freqai/base_models/BasePyTorchModel.py:23(device))
    - Apple Silicon gets priority over CUDA for Mac users'
  acceptance_hints:
  - FreqAI predictions appear as new columns in strategy DataFrame
  - Training completes within reasonable time for configured train_period_days
  - Historic predictions loaded correctly for backtesting without re-training
  - Device selection matches available hardware (mps/cuda/cpu)
- id: order_execution
  name: Order Execution & Trade Management
  order: 4
  responsibility: Translates trading signals into exchange orders (entry/exit/stoploss), manages complete
    order lifecycle (open/filled/cancelled), handles position adjustments and partial fills, enforces
    trade sizing and risk management rules.
  interface:
    inputs:
    - Trade object
    - signal
    - price/stake parameters
    outputs:
    - Order objects persisted to database
    - RPC notifications for trade updates
  required_methods:
  - name: FreqtradeBot.execute_entry
    description: Places entry order on exchange, returns after order placement (not after fill) for async
      handling
    evidence: freqtrade/freqtradebot.py:870(execute_entry)
  - name: FreqtradeBot.handle_trade
    description: Processes one open trade per iteration, evaluating exits via should_exit method
    evidence: freqtrade/freqtradebot.py:1341(handle_trade)
  - name: Trade.calc_profit
    description: Calculates realized profit including fees for accurate performance reporting
    evidence: freqtrade/persistence/trade_model.py:1116(calc_profit)
  - name: Trade.adjust_trade_position
    description: Implements dollar-cost averaging (DCA) via position adjustments within existing position
    evidence: freqtrade/strategy/interface.py:117(position_adjustment_enable)
  key_behaviors:
  - behavior: Async order handling
    description: execute_entry returns immediately after placing order, not waiting for fill. Allows multiple
      orders in flight simultaneously.
    evidence: freqtrade/freqtradebot.py:870(execute_entry)
  - behavior: Sequential trade processing
    description: handle_trade processes one trade per iteration. Centralized exit logic prevents race
      conditions.
    evidence: freqtrade/freqtradebot.py:1341(handle_trade)
  - behavior: Trade/LocalTrade field alignment
    description: Trade and LocalTrade have identical field definitions enabling backtested trades to be
      imported to live database.
    evidence: freqtrade/persistence/trade_model.py:1674(Trade)
  - behavior: Stoploss on exchange
    description: stoploss_on_exchange uses OCO orders where supported, reducing polling overhead as exchange
      manages stop execution.
    evidence: freqtrade/exchange/exchange.py:130(_ft_has_default)
  - behavior: Trade execution order
    description: 'Execution follows sequence: check_open_trades → analyze_pairs → enter_positions → handle_open_trades
      → exit_positions. Trades must be entered before they can be exited.'
    evidence: freqtrade/freqtradebot.py:610-658(enter_positions)
  replaceable_points:
  - name: order_type
    description: Order type for entries and exits
    options:
    - name: limit
      traits:
      - price control
      - potential slippage
      - exchange priority
      fit_for:
      - Volatile markets
      - price-sensitive trading
      not_fit_for:
      - Fast-moving markets
      - guaranteed fills
    - name: market
      traits:
      - guaranteed fill
      - price uncertainty
      fit_for:
      - Fast entry
      - liquid markets
      not_fit_for:
      - Illiquid pairs
      - volatile conditions
    default: limit
  - name: stoploss_placement
    description: Where stoploss orders are managed
    options:
    - name: stoploss
      traits:
      - local management
      - exchange polling
      fit_for:
      - Every exchanges
      - simple setups
      not_fit_for:
      - High-frequency trading
      - exchange-supported stops
    - name: stoploss_on_exchange
      traits:
      - exchange-managed
      - reduced latency
      fit_for:
      - Binance, Kraken
      - faster execution
      not_fit_for:
      - Exchanges without OCO support
    default: stoploss
  - name: position_sizing
    description: Stake amount calculation method
    options:
    - name: Fixed stake from config
      traits:
      - simple
      - predictable
      fit_for:
      - Conservative trading
      - known capital
      not_fit_for:
      - Dynamic sizing
      - portfolio management
    - name: custom_stake_amount override
      traits:
      - dynamic
      - user-defined
      fit_for:
      - Kelly criterion
      - volatility-based sizing
      not_fit_for:
      - Simple strategies
    default: Fixed stake from config
  design_decisions:
  - Trade/LocalTrade field alignment enables backtest/reality parity (freqtrade/persistence/trade_model.py:1674(Trade))
    - Backtested trades can be imported to live DB; identical schema required
  - execute_entry returns after placing order, not after fill (freqtrade/freqtradebot.py:870(execute_entry))
    - Async order handling; allows multiple orders in flight
  - handle_trade processes one trade per iteration, exits evaluated in should_exit (freqtrade/freqtradebot.py:1341(handle_trade))
    - Sequential trade processing avoids race conditions; centralized exit logic
  - stoploss_on_exchange uses OCO orders where supported (freqtrade/exchange/exchange.py:130(_ft_has_default))
    - Reduces polling; exchange manages stop execution
  - position_adjustment_enable allows DCA via adjust_trade_position hook (freqtrade/strategy/interface.py:117(position_adjustment_enable))
    - Additional entries/exits within existing position
  - EntryExecuteMode distinguishes initial/pos_adjust/replace orders (freqtrade/constants.py:242(EntryExecuteMode))
    - Different validation for new vs adjusted vs replaced orders
  - 'Order relationships: Trade has many Orders, Order belongs to one Trade (freqtrade/persistence/trade_model.py:65(Order))
    - Multiple entries/exits per trade; full order audit trail'
  - calc_profit includes fees in final calculation (freqtrade/persistence/trade_model.py:1116(calc_profit))
    - Net profit matters for realistic performance reporting
  acceptance_hints:
  - Orders placed match signal direction (long/short) and pair/timeframe
  - Trade state persists correctly across bot restarts (database consistency)
  - Partial fills are handled without deadlocks
  - Position adjustments respect max_entry_position_adjustment limit
  - stoploss_on_exchange properly placed for supported exchanges
- id: backtesting
  name: Backtesting Engine
  order: 5
  responsibility: Simulates trading on historical OHLCV data, replays strategy signals with realistic
    fill assumptions, calculates comprehensive performance metrics including profit, drawdown, and trade
    statistics.
  interface:
    inputs:
    - Historical OHLCV data
    - strategy
    - timerange
    - initial capital
    outputs:
    - BacktestResultType containing trades list, equity curve, performance metrics
  required_methods:
  - name: Backtesting.backtest_loop
    description: Hot path iteration called per-candle. Must be optimized for hyperopt which calls this
      millions of times.
    evidence: freqtrade/optimize/backtesting.py:1456(backtest_loop)
  - name: Backtesting._run_funding_fees
    description: Calculates funding fees from historical funding_rate data for futures trading simulation
    evidence: freqtrade/optimize/backtesting.py:957(_run_funding_fees)
  - name: trade_list_to_dataframe
    description: Converts trade objects to pandas DataFrame for performance analysis and visualization
    evidence: freqtrade/data/btanalysis/bt_fileutils.py:506(trade_list_to_dataframe)
  key_behaviors:
  - behavior: Hardcoded tuple index mapping
    description: 'backtesting uses hardcoded indices: DATE=0, OPEN=1, HIGH=2, LOW=3, CLOSE=4, LONG=5,
      ELONG=6, SHORT=7, ESHORT=8. Changing HEADERS order requires updating each index constants.'
    evidence: freqtrade/optimize/backtesting.py:82-93(DATE_IDX through EXIT_TAG_IDX)
  - behavior: Dry-run forced mode
    description: dry_run=True is forced in backtesting config. No exchange interaction; simulates each
      fills.
    evidence: freqtrade/optimize/backtesting.py:127(self.config['dry_run'])
  - behavior: Detail timeframe support
    description: detail_timeframe enables sub-strategy timeframe backtesting (e.g., 1m entry timing within
      5m strategy).
    evidence: freqtrade/optimize/backtesting.py:261(init_backtest_detail)
  - behavior: PairList restrictions
    description: VolumePairList forbidden (needs live data). PrecisionFilter restricted to single-strategy
      mode.
    evidence: freqtrade/optimize/backtesting.py:221(_validate_pairlists_for_backtesting)
  - behavior: LocalTrade simulation
    description: LocalTrade used for backtest-only simulation without database persistence. Has identical
      fields to live Trade.
    evidence: freqtrade/persistence/trade_model.py:381(LocalTrade)
  replaceable_points:
  - name: fill_model
    description: Order fill simulation logic
    options:
    - name: _get_close_rate (default)
