    of each day because round trips must be evaluated against the capital available
    before the trade executes. Using end-of-day values would create look-ahead bias
    where trades appear to have more or less capital than actually available. BOUNDARY:
    Users must ensure their portfolio_value series represents start-of-day values
    or apply shift() or divide by (1+returns) to convert from end-of-day values.'
  evidence: src/pyfolio/round_trips.py:191-192(module)
  stage: invariant
  alternative_considered: Auto-detecting portfolio value timing would add complexity
    and potential for errors
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/pyfolio/round_trips.py'
- id: BD-114
  type: B/RC
  content: Short positions show as negative values and contribute to 'cash' column
    in perf_attrib
  rationale: 'Short positions display as negative values in position tables and the
    sum of these negative values contributes to the ''cash'' column in performance
    attribution calculations. This correctly accounts for cash received from shorting
    by increasing the net cash position, as borrowing securities to short results
    in cash inflow at the time of the short sale. BOUNDARY: Negative position values
    increase the cash column; this behavior differs from gross leverage calculations
    that use absolute values.'
  evidence: src/pyfolio/perf_attrib.py:63-64(module)
  stage: invariant
  alternative_considered: Not including negative values would misrepresent cash available
    from short positions
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/pyfolio/perf_attrib.py'
- id: BD-115
  type: BA
  content: INTRADAY_DETECTION_THRESHOLD=0.25 in detect_intraday - ratio of held positions
    to transacted
  rationale: 'The INTRADAY_DETECTION_THRESHOLD=0.25 defines the ratio of held positions
    to transacted positions that triggers intraday strategy detection. When held positions
    significantly exceed transacted volume (ratio > 0.25), the strategy is identified
    as potentially intraday because substantial daily position changes suggest day-trading
    patterns. BOUNDARY: This threshold distinguishes intraday from position-trading
    strategies; strategies with turnover near 100% daily may be misclassified as non-intraday.'
  evidence: src/pyfolio/utils.py:257(module)
  stage: default_value
  alternative_considered: Lower threshold would flag more strategies as intraday;
    higher would miss subtle day-trading patterns
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/pyfolio/utils.py'
- id: BD-116
  type: DK
  content: INTERESTING_PERIODS OrderedDict hardcodes specific historical market events
    with fixed dates
  rationale: 'The INTERESTING_PERIODS OrderedDict contains hardcoded definitions of
    historical market events (such as financial crises, bull markets, and significant
    downturns) with fixed date ranges for backtesting analysis. These predefined periods
    allow users to easily analyze strategy performance during historically significant
    market conditions without manually specifying date ranges. BOUNDARY: Fixed date
    ranges may not perfectly align with each event definitions; events are US-centric
    (e.g., 2008 Financi'
  evidence: src/pyfolio/interesting_periods.py:24-135(module)
  stage: pattern_choice
  alternative_considered: Dynamic event detection would require additional data sources
    and methodology choices
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/pyfolio/interesting_periods.py'
- id: BD-117
  type: B
  content: 'check_intraday cascading logic: ''infer'' requires positions AND transactions,
    else raises ValueError'
  rationale: 'The check_intraday function enforces a cascading validation where estimate_intraday=''infer''
    requires both positions AND transactions data to be present; if either is missing,
    a ValueError is raised with a descriptive message. This strict requirement prevents
    silent misinterpretation of strategy timing when data is incomplete, forcing users
    to either provide complete data or explicitly specify their strategy type. BOUNDARY:
    The ValueError prevents inference from partial data rather than making as'
  evidence: src/pyfolio/utils.py:325-329(module)
  stage: ordering_contract
  alternative_considered: Allowing partial inference could produce misleading results
    without user awareness
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/pyfolio/utils.py'
- id: BD-118
  type: BA/DK
  content: Rolling windows use 6 months (APPROX_BDAYS_PER_MONTH*6=126 days) for beta/sharpe/volatility
  rationale: 'Rolling window calculations for beta, Sharpe ratio, and volatility use
    a 6-month window derived from APPROX_BDAYS_PER_MONTH*6=126 business days, providing
    approximately 6 months of trading data for statistical significance while remaining
    short enough to capture regime changes. This value balances statistical robustness
    with responsiveness to market conditions. BOUNDARY: The 6-month window assumes
    US market conventions via APPROX_BDAYS_PER_MONTH; non-US markets with different
    trading day counts '
  evidence: src/pyfolio/timeseries.py:929(module)
  stage: default_value
  alternative_considered: Shorter windows are noisier; longer windows are slower to
    react to market regime changes
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/pyfolio/timeseries.py'
- id: BD-119
  type: BA/DK
  content: 'INTERACTION: [BD-002 linear slippage] × [BD-026 quadratic slippage] →
    Cost model inconsistency amplifies for large orders'
  rationale: 'BD-002 uses linear BPS*value for transaction cost adjustment while BD-026
    uses quadratic volume-share for capacity analysis. These inconsistent models create
    compounding error for large orders: BD-002 underestimates true market impact while
    BD-026 overestimates it in capacity projections. The conflict manifests when strategies
    are analyzed for both performance (BD-002) and capacity (BD-026) - reported net
    returns will appear better than capacity-constrained execution would achieve.
    This is problematic during scale-up analysis where large order costs dominate.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unified slippage model across both modules would eliminate
    inconsistency
- id: BD-120
  type: BA
  content: 'INTERACTION: [BD-001 intraday threshold] × [BD-017 turnover warning] →
    Double-boundary effect on EOD attribution accuracy'
  rationale: BD-001 uses 0.25 position/transactions ratio to detect intraday strategies
    while BD-017 uses 25% daily turnover to warn about attribution accuracy. Both
    thresholds serve different purposes but compound when strategies approach either
    boundary. A strategy with high intraday activity (near BD-001 threshold) that
    also generates high turnover (near BD-017 threshold) faces dual warnings about
    EOD position reliability. The 8-hour transaction merging (BD-011) further complicates
    this by potentially reducing apparent transaction count, making some intraday
    strategies appear positional. This triple interaction can cause silent misclassification
    of strategy type leading to inappropriate benchmark selection.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unified threshold combining both signals would provide clearer
    classification
  vague_rationale: true
- id: BD-121
  type: B/BA
  content: 'INTERACTION: [BD-007 AGB denominator] × [BD-039 rolling AGB] × [BD-040
    first-day AGB/2] → Turnover denominator cascade risk'
  rationale: 'Three sequential decisions control turnover denominator: BD-007 selects
    AGB, BD-039 applies rolling average smoothing, and BD-040 applies special first-day
    handling. This cascade creates edge cases during capital transitions. When capital
    is injected on day 1, BD-040 halves the first AGB creating artificially high initial
    turnover. When large capital events occur mid-period, BD-039''s rolling average
    temporarily dampens the spike. Strategies with frequent capital flows (LP drawdowns,
    margin calls) will show systematically different turnover depending on when flows
    occur relative to the rolling window. The interaction is problematic for fund-of-funds
    or multi-strategy portfolios where capital rebalancing is frequent.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Single consistent denominator without rolling smoothing
    would be more interpretable
- id: BD-122
  type: BA/DK
  content: 'INTERACTION: [BD-024 shift(1) volume] × [BD-042 5-day volume window] ×
    [BD-073 rolling volume] → Capacity estimation fragility'
  rationale: 'Three decisions control volume-based capacity estimation: BD-024 prevents
    look-ahead via shift(1), BD-042 and BD-073 apply rolling window smoothing. The
    cascade creates a 6-day lag minimum (1-day shift plus 5-day window) before capacity
    estimates reflect current market conditions. During sudden liquidity events (flash
    crashes, COVID-style vol spikes), capacity estimates will lag reality by nearly
    a week. The shift(1) decision is critical for backtest validity but creates a
    structural delay in capacity adaptation. For capacity-sensitive strategies during
    market stress, this lag can cause position sizing to remain inappropriately large
    until the rolling window catches up.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Exponential weighting or shorter windows would improve responsiveness
    at cost of noise
  vague_rationale: true
- id: BD-123
  type: B/RC
  content: 'INTERACTION: [BD-010 FIFO matching] × [BD-033 FIFO deque] × [BD-034 closing
    tx+1sec] → Round-trip extraction timing dependency'
  rationale: 'Three decisions control round-trip extraction: BD-010 and BD-033 both
    implement FIFO matching via deque, while BD-034 adds 1-second offset to closing
    transactions. The 1-second offset (BD-034) ensures synthetic closing transactions
    don''t conflict with real EOD fills but creates a timing artifact. If this offset
    causes a closing transaction to cross into the next calendar day (possible with
    after-hours trading or timezone issues), FIFO matching could pair it with wrong
    lots. The cascade risk emerges when combined with the 8-hour transaction merging
    (BD-011): trades near midnight might merge incorrectly with next day''s activity,
    corrupting round-trip identification. This is particularly problematic for 24-hour
    asset strategies.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Using UTC-normalized timestamps would eliminate boundary
    ambiguity
- id: BD-124
  type: B/BA
  content: 'INTERACTION: [BD-004 cash in allocation] vs [BD-104 cash excluded from
    leverage] → Cash treatment inconsistency'
  rationale: 'BD-004 includes cash in the allocation sum (row-wise normalization)
    while BD-104 explicitly excludes cash from gross leverage calculation. This creates
    contradictory treatment: allocation reports will show cash as an investment position
    (correct for short sellers where borrowed proceeds matter), but leverage calculations
    ignore cash entirely (correct for exposure-only view). The contradiction amplifies
    for portfolios with large cash buffers from dividends, capital calls, or strategic
    reserve. Users comparing allocation percentages to leverage metrics will see inconsistent
    cash representation. Long-only portfolios with 30% cash will show 70/30 long/cash
    allocation but report 100% gross leverage, confusing investors expecting leverage
    to reflect cash buffer.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Consistent cash treatment across each modules would require
    breaking existing semantic contracts
- id: BD-125
  type: BA/M
  content: 'INTERACTION: [BD-016 positions→% conversion] → [BD-093 stacking before
    attrribution] → Hidden position unit dependency'
  rationale: 'BD-016 requires positions in dollars before extracting turnover, then
    converts to percentages before empyrical call. BD-093 performs position stacking
    with percentage normalization. The hidden dependency is the required sequential
    ordering: turnover must be extracted from dollar-denominated positions BEFORE
    the dollar-to-percent conversion that BD-093''s stacking expects. If callers reverse
    this order (passing percentages to turnover or dollars to stacking), calculations
    silently fail or produce incorrect results. This ordering contract is not enforced
    and undocumented, creating fragility when users call these functions programmatically
    rather than through the standard tear sheet flow. The dependency matters because
    it couples two modules that appear independent.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Explicit unit validation at function entry would prevent
    silent failures
- id: BD-126
  type: BA/DK
  content: 'INTERACTION: [BD-020 6-month window] × [BD-051 rolling beta] × [BD-077
    multivariate beta] × [BD-079 rolling vol] → Rolling window proliferation risk'
  rationale: 'Four decisions reference the 6-month rolling window (BD-020 defines
    it, BD-051/077/079 use it for different calculations). If a future change modifies
    this window (e.g., for non-US markets requiring different day counts per BD-099),
    it would cascade silently across beta, Sharpe, and volatility calculations simultaneously.
    The amplification risk: different metrics have different optimal window lengths
    for statistical significance vs responsiveness. Using a single window for each
    may be suboptimal for some metrics while creating interdependencies that prevent
    independent tuning. Strategies optimized for one metric (e.g., Sharpe) may inadvertently
    degrade another (volatility estimation) due to shared window assumption.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Per-metric window parameters would allow independent tuning
    but increase complexity
- id: BD-127
  type: BA
  content: 'INTERACTION: [BD-019 deprecate timeseries] → [BD-111 deprecated wrappers]
    → Dependency coupling amplification'
  rationale: 'BD-019 and BD-111 both mark timeseries functions as deprecated, creating
    strong coupling to the empyrical package (BD-015). The amplification risk: if
    empyrical changes APIs, deprecates functions, or has breaking version changes,
    pyfolio''s deprecated wrappers will break without version pin. The coupling is
    invisible to users who see backward-compatible function signatures but depend
    on empyrical internals. This creates a silent dependency vulnerability where empyrical
    bugs or version drift directly impact pyfolio reliability. The risk is particularly
    acute for institutional users who may run frozen pyfolio versions with evolving
    empyrical, or vice versa.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Independent implementations would decouple but increase
    maintenance burden
- id: BD-128
  type: B/DK
  content: 'INTERACTION: [BD-107 cash column invariant] × [BD-114 short→cash contribution]
    × [BD-004 cash in allocation] → Cascading cash column dependency'
  rationale: 'Three decisions create cascading cash dependencies: BD-107 establishes
    cash as required schema, BD-114 allows short positions to contribute to cash (correct
    accounting for short proceeds), and BD-004 includes cash in allocation sums. The
    cascade risk: if a user provides positions without the cash column (despite BD-107''s
    requirement), downstream calculations will either fail silently or produce NaN
    values that propagate. More subtly, if short positions are provided without proper
    cash contribution (missing BD-114''s effect), allocation percentages will be incorrect.
    The dependencies create a fragile invariant where cash must be properly populated
    for both positional analysis and short-selling accounting. New users or those
    migrating from other systems frequently encounter this invariant without clear
    documentation.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Computed cash as residual (portfolio_value - sum(positions))
    would be more robust but less explicit
