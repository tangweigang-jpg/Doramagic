execution_paradigm:
  live: unknown
  backtest: unknown
  note: Auto-detected from source code structure
resources:
- id: res-slot-001
  type: replaceable_component
  name: returns_func
  path: null
  description: 'Choose based on: (1) data source coverage (US equities, intl, futures,
    forex); (2) frequency (daily, minute, tick); (3) authentication/cost requirements;
    (4) legal/regulatory constraints for production use'
  used_in_stages: []
  options:
  - name: empyrical default_returns_func
    traits:
    - built-in
    - no-registration-required
    - historical
    fit_for:
    - Default out-of-the-box usage where user provides returns directly
    not_fit_for:
    - Live data retrieval; requires registration of a custom function for symbol lookups
  - name: yfinance
    traits:
    - free
    - no-auth-required
    - real-time-cached
    - daily-bars
    fit_for:
    - Fetching historical stock prices from Yahoo Finance for quick demos and single-stock
      analysis
    not_fit_for:
    - Institutional use, futures/forex data, minute-level data, bulk data requirements
  - name: pandas-datareader
    traits:
    - free
    - multiple-providers
    - FRED
    - IEX
    - Yahoo
    fit_for:
    - Federal Reserve economic data (FRED), IEX Cloud, Yahoo Finance with a unified
      pandas interface
    not_fit_for:
    - Minute-level data, non-US markets, bulk institutional data
  - name: Alpha Vantage
    traits:
    - API-key-required
    - free-tier
    - daily/minute/weekly
    - forex
    - technical-indicators
    fit_for:
    - Broader market data including intraday bars and technical indicators
    not_fit_for:
    - 'High-volume usage without paid subscription (rate limits: 5 req/min free, 75
      req/min paid)'
  - name: Quandl/Nasdaq Data Link
    traits:
    - API-key-required
    - premium
    - alternative data
    fit_for:
    - Institutional-grade alternative data, risk factor models (e.g., Sharpe/Edgar)
    not_fit_for:
    - Simple retail strategy analysis
  default: empyrical default_returns_func (passthrough — user must register a real
    fetcher)
  _source: worker_resource
- id: res-slot-002
  type: replaceable_component
  name: backtesting_engine
  path: null
  description: pyfolio does not mandate a specific backtesting engine — any system
    that can produce returns/positions/transactions DataFrames in the expected format
    is compatible. Zipline-reloaded is the reference implementation.
  used_in_stages: []
  options:
  - name: Zipline-reloaded
    traits:
    - event-driven
    - pipeline
    - USD
    - ' equities'
    - futures
    - daily/minute bars
    fit_for:
    - Reference backtesting engine for pyfolio. Provides each required data shapes
      (returns, positions, transactions) natively.
    not_fit_for:
    - Non-US equities, options, crypto, pairs trading without extension
  - name: Backtrader
    traits:
    - event-driven
    - multiple-assets
    - no-pipeline
    fit_for:
    - Strategy backtesting with multiple asset classes. User must write adapter to
      convert results to pyfolio format.
    not_fit_for:
    - Pipeline-based analysis workflows
  - name: vectorbt
    traits:
    - vectorized
    - GPU-accelerated
    - Jupyter-native
    fit_for:
    - High-performance backtesting on large universes, pandas/numba-based. Requires
      custom adapter for pyfolio input format.
    not_fit_for:
    - Complex event-driven strategies
  - name: Custom/user-supplied DataFrames
    traits:
    - no-engine-required
    - any-format
    fit_for:
    - Users who already have backtest results from any source. pyfolio works directly
      on pandas Series/DataFrames.
    not_fit_for:
    - Users who need to run backtests from scratch
  default: User-supplied pandas DataFrames (no engine required)
  _source: worker_resource
- id: res-slot-003
  type: replaceable_component
  name: risk_factor_model
  path: null
  description: 'Required only when calling create_perf_attrib_tear_sheet. Choose based
    on: asset class coverage, factor model sophistication needed, budget, and whether
    factors are already computed by an existing risk system.'
  used_in_stages: []
  options:
  - name: User-supplied factor returns and loadings
    traits:
    - any-factor-model
    fit_for:
    - Any custom factor model; allows full control over risk attribution methodology
    not_fit_for:
    - Users without an existing factor model who want ready-made risk factors
  - name: Fama-French factor data (manual download)
    traits:
    - daily/monthly
    - 5-factor
    - SMB
    - HML
    - MKT
    - no-auth
    fit_for:
    - Academic factor models (Fama-French 3/5 factors) for long/short equity strategies
    not_fit_for:
    - Real-time or intraday factor attribution
  - name: MSCI Barra / Axioma risk models
    traits:
    - institutional
    - real-time
    - equity
    - futures
    fit_for:
    - Professional risk management and attribution in institutional settings
    not_fit_for:
    - Individual researchers, retail quants
  default: User-supplied factor_returns and factor_loadings DataFrames
  _source: worker_resource
- id: res-slot-004
  type: replaceable_component
  name: colormap_provider
  path: null
  description: Only relevant for custom plotting. The sample_colormap() function in
    utils.py wraps matplotlib's cm.cmap_d registry.
  used_in_stages: []
  options:
  - name: matplotlib built-in colormaps
    traits:
    - built-in
    - no-install
    - diverse
    fit_for:
    - Every standard visualization use cases in pyfolio plots
    not_fit_for:
    - Custom branded color schemes
  - name: seaborn colormaps
    traits:
    - perceptually-uniform
    - built-in
    fit_for:
    - Improved perceptual uniformity for financial heatmaps and return distributions
    not_fit_for:
    - Same limitations as matplotlib
  - name: custom colormap
    traits:
    - custom-branded
    fit_for:
    - Corporate or publication-specific color schemes
    not_fit_for:
    - Standard use
  default: matplotlib built-in colormaps (via sample_colormap helper)
  _source: worker_resource
- id: res-slot-005
  type: replaceable_component
  name: test_data_format
  path: null
  description: CSV for human readability and test fixtures; pickle for complex nested
    objects like Zipline backtest results. Parquet is an upgrade path for large datasets.
  used_in_stages: []
  options:
  - name: CSV/gzip CSV
    traits:
    - human-readable
    - standard
    fit_for:
    - Every test fixtures and simple data sharing
    not_fit_for:
    - Large datasets (slow I/O)
  - name: pickle
    traits:
    - exact-python-objects
    - fast
    fit_for:
    - Zipline backtest results (structured objects), large test fixtures
    not_fit_for:
    - Cross-language data sharing, long-term archival
  - name: parquet
    traits:
    - columnar
    - compressed
    - cross-language
    fit_for:
    - Large-scale test data fixtures requiring efficient I/O
    not_fit_for:
    - Simple one-off fixtures
  default: CSV/gzip CSV for fixtures, pickle for complex objects
  _source: worker_resource
