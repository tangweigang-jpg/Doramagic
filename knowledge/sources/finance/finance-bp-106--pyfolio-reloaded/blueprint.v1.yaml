business_decisions:
- id: BD-001
  type: BA
  content: Intraday detection uses threshold 0.25 (positions held / unique stocks
    traded)
  rationale: 'Hardcoded threshold assumes strategies holding <25% of traded stocks
    overnight are intraday; balances false positives vs missed intraday detection.
    Threshold of 0.25 provides a clear boundary: any strategy where held positions
    represent less than a quarter of unique stocks traded is classified as intraday.
    This conservative boundary minimizes false positives for position-based strategies
    while catching day-trading activity.'
  evidence: src/pyfolio/utils.py:257(detect_intraday)
  stage: data_preprocessing
  alternative_considered: Dynamic threshold based on market volatility or asset class
- id: BD-002
  type: M/DK
  content: Slippage modeled as linear BPS * traded_value, applied to daily PnL
  rationale: 'Linear slippage model is computationally simple but ignores market impact
    nonlinearity. The linear form (BPS × traded_value) assumes slippage scales proportionally
    with order size, which is a reasonable first-order approximation for small orders.
    The boundary: this approximation breaks down for large orders where market impact
    becomes superlinear. For daily PnL application, the linear model provides tractable
    computation while acknowledging it underestimates costs for substantial trades.'
  evidence: src/pyfolio/txn.py:137(slippage_dollars)
  stage: data_preprocessing
  alternative_considered: Nonlinear market impact model (e.g., square root of volume
    ratio)
  _evidence_issues:
  - 'FN_NOT_FOUND: slippage_dollars in src/pyfolio/txn.py'
- id: BD-003
  type: BA/DK
  content: EOD positions shifted by 1 day for starting capital calculation
  rationale: 'Shift compensates for EOD reporting vs start-of-day capital; preserves
    first-day returns by back-calculating starting_capital. The boundary: position
    timestamps represent end-of-day snapshots, but capital is needed at start of trading
    day. Without shift, first-day returns would be calculated against zero starting
    capital or require look-ahead. The 1-day shift aligns the reported position value
    with the capital that was actually available to hold that position.'
  evidence: src/pyfolio/utils.py:385(positions_shifted)
  stage: data_preprocessing
  alternative_considered: Report positions at start-of-day timestamps in data pipeline
  _evidence_issues:
  - 'FN_NOT_FOUND: positions_shifted in src/pyfolio/utils.py'
- id: BD-004
  type: BA
  content: Positions include 'cash' column representing net short/long imbalance,
    included in allocation sum
  rationale: 'Cash column is NOT excluded from allocation sum; represents residual
    capital which IS part of portfolio exposure. The boundary: including cash in the
    sum means allocations always sum to 100% even when there are unsettled cash flows.
    This treats net cash (short borrow costs minus long proceeds) as an active position,
    which is economically meaningful for short sellers. The implication is that long-only
    portfolios with large cash reserves will show cash as a meaningful allocation
    fraction.'
  evidence: src/pyfolio/pos.py:46(divide by sum)
  stage: position_analysis
  alternative_considered: Exclude cash from allocation sum to match traditional long-only
    benchmarks
  _evidence_issues:
  - 'INVALID_IDENTIFIER: divide by sum in src/pyfolio/pos.py'
- id: BD-005
  type: BA/DK
  content: Short positions show as negative values, not separate columns
  rationale: 'Signed position convention simplifies net exposure calculation but requires
    care when summing for gross exposure. The boundary: net exposure is computed as
    sum(positions) which correctly nets long and short. Gross exposure must use sum(abs(positions))
    to avoid cancellation. This signed convention aligns with standard financial practice
    and enables natural arithmetic but requires analysts to explicitly choose netting
    or grossing when aggregating across the portfolio.'
  evidence: src/pyfolio/tears.py:117(negative values example)
  stage: position_analysis
  alternative_considered: Separate long/short columns with non-negative values in
    each
  _evidence_issues:
  - 'INVALID_IDENTIFIER: negative values example in src/pyfolio/tears.py'
- id: BD-006
  type: BA
  content: Optional zipline asset support with graceful fallback when zipline is not
    installed
  rationale: 'Soft dependency allows pyfolio to run without zipline; only affects
    future multiplier application. The boundary: when zipline is available, future-style
    contracts receive a 0.5 multiplier. Without zipline, this feature is unavailable.
    The graceful fallback means pyfolio works standalone while optionally enhancing
    zipline users'' experience. This avoids forcing zipline installation on users
    who only need core pyfolio functionality.'
  evidence: src/pyfolio/pos.py:112(extract_pos)
  stage: position_analysis
  alternative_considered: Hard dependency on zipline for full functionality
- id: BD-007
  type: BA
  content: Turnover denominator defaults to AGB (Actual Gross Book) not portfolio_value
  rationale: 'AGB provides stable denominator vs volatile portfolio_value; AGB = positions.abs().sum()
    is beginning-of-period gross exposure. The boundary: using AGB means turnover
    is relative to the capital deployed in positions, not the current portfolio value
    which includes cash, PnL, and unsettled amounts. This stabilizes turnover during
    large cash flows or volatile periods. Turnover of 100% means trading equal to
    gross exposure, not exceeding the entire portfolio value.'
  evidence: src/pyfolio/txn.py:148(get_turnover)
  stage: transaction_analysis
  alternative_considered: Use ending portfolio value, beginning portfolio value, or
    average of both
- id: BD-008
  type: BA/M
  content: Transaction timestamps normalized to midnight for daily aggregation
  rationale: 'Ignores intraday timing within day; appropriate for daily-level analysis
    but loses time-of-day signal. The boundary: each transactions occurring on a given
    calendar day are aggregated together regardless of when they occurred. This means
    9:30 AM and 4:00 PM trades on the same day are treated identically. The normalization
    is appropriate for daily-level analytics where intraday timing is noise, but loses
    valuable information for understanding execution quality, momentum effects, or
    end-of-day posi'
  evidence: src/pyfolio/txn.py:102(txn_norm.index.normalize)
  stage: transaction_analysis
  alternative_considered: Aggregate by trading hours (9:30-16:00) preserving within-day
    timing
  _evidence_issues:
  - 'FN_NOT_FOUND: txn_norm.index.normalize in src/pyfolio/txn.py'
  vague_rationale: true
- id: BD-009
  type: M
  content: VWAP computed when merging consecutive same-direction transactions
  rationale: 'Volume-weighted average preserves economic reality of multiple fills
    at different prices within time window. The boundary: VWAP = sum(price × shares)
    / sum(shares) weights each fill by its economic size. This correctly represents
    the blended cost basis when an order is executed in multiple tranches at different
    prices. Simple averaging would be misleading when fills differ substantially in
    size.'
  evidence: src/pyfolio/round_trips.py:124(vwap)
  stage: transaction_analysis
  alternative_considered: Simple average price, first-fill price only, or last-fill
    price
- id: BD-010
  type: M
  content: FIFO matching uses deque stack; prices pushed/popped based on sign of amount
  rationale: 'Stack-based FIFO ensures oldest shares matched first; copysign determines
    buy vs sell direction. The boundary: First-In-First-Out means the longest-held
    shares are matched against new sales first, which is standard accounting practice
    and often required for tax reporting. The deque stack provides O(1) push/pop operations
    for efficient matching. Sign-based direction detection means positive amounts
    add to the buy stack, negative amounts trigger sell matching against the buy stack.'
  evidence: src/pyfolio/round_trips.py:208(price_stack)
  stage: round_trip_analysis
  alternative_considered: LIFO (Last-In-First-Out) or specific lot identification
  _evidence_issues:
  - 'FN_NOT_FOUND: price_stack in src/pyfolio/round_trips.py'
- id: BD-011
  type: BA/DK
  content: 8-hour window merges same-direction transactions before round-trip extraction
  rationale: 'Captures multiple intraday fills at different prices as single transaction;
    8h covers US trading day. The boundary: transactions in the same direction separated
    by less than 8 hours are merged into a single logical transaction with VWAP pricing.
    This assumes that sequential trades in one direction within a trading session
    represent a single trading decision being executed in tranches. The 8-hour window
    is calibrated for US markets (9:30 AM to 4:00 PM ≈ 6.5 hours plus buffer).'
  evidence: src/pyfolio/round_trips.py:103(_groupby_consecutive)
  stage: round_trip_analysis
  alternative_considered: User-specified window, or merge only within continuous trading
    session
- id: BD-012
  type: BA
  content: Round trips don't require full position close-out; partial round trips
    are valid
  rationale: 'Partial round trips handle scaling in/out of positions; remaining shares
    matched with future transactions. The boundary: a round trip is any closed position,
    not necessarily returning to zero. Scaling out 30% of a position at profit creates
    a partial round trip for that 30%. The remaining 70% continues and will eventually
    close in a subsequent transaction. This reflects real trading where positions
    are adjusted incrementally.'
  evidence: src/pyfolio/round_trips.py:154(extract_round_trips)
  stage: round_trip_analysis
  alternative_considered: Only count complete close-outs to zero position
- id: BD-013
  type: BA
  content: Returns computed as pnl/invested capital (not pnl/portfolio_value) by default
  rationale: 'Capital-weighted returns isolate trade profitability vs portfolio allocation
    effects. The boundary: dividing by invested capital measures return per dollar
    committed to the trade, independent of how the trade relates to the overall portfolio
    size. A $100 profit on a $1000 position is 10% return regardless of whether that
    position represents 10% or 50% of the portfolio. This isolates trading skill from
    position sizing decisions.'
  evidence: src/pyfolio/round_trips.py:253(rt_returns)
  stage: round_trip_analysis
  alternative_considered: Return relative to portfolio value at entry
  _evidence_issues:
  - 'FN_NOT_FOUND: rt_returns in src/pyfolio/round_trips.py'
- id: BD-014
  type: BA
  content: Stats aggregated separately for long, short, and each trades
  rationale: 'Separate long/short analysis reveals directional performance asymmetry.
    The boundary: aggregating each trades masks differences between long and short
    performance. Separating them allows identification of where alpha is generated:
    long-side stock selection, short-side security selection, or both. This is essential
    for strategies that claim directional expertise in one direction.'
  evidence: src/pyfolio/round_trips.py:87(agg_all_long_short)
  stage: round_trip_analysis
  alternative_considered: Only aggregate total trades, or require explicit specification
- id: BD-015
  type: BA/M
  content: Performance attribution delegates core computation to empyrical package
  rationale: 'Avoids duplication; empyrical is canonical source for factor model calculations.
    The boundary: pyfolio wraps empyrical rather than reimplementing factor regression,
    covariance estimation, and return attribution. This ensures consistency with other
    empyrical users and reduces maintenance burden. The delegation is complete for
    core computations, meaning pyfolio does not maintain independent attribution algorithms.'
  evidence: src/pyfolio/perf_attrib.py:29(ep.perf_attrib)
  stage: performance_attribution
  alternative_considered: Maintain independent attribution implementation for isolation
    from dependencies
- id: BD-016
  type: BA/M
  content: Positions converted to percentages after turnover check (expects dollars),
    before empyrical call
  rationale: 'get_turnover needs absolute position values for proper denominator;
    empyrical expects percentages. The boundary: turnover calculation requires dollar-denominated
    positions to compute the sum of position changes relative to gross exposure. After
    turnover is extracted, positions are normalized to percentages for empyrical''s
    factor regression, which expects position weights summing to 1.0. The conversion
    happens in sequence, not simultaneously.'
  evidence: src/pyfolio/perf_attrib.py:144(get_turnover expects dollars)
  stage: performance_attribution
  alternative_considered: Accept both units with internal normalization
  _evidence_issues:
  - 'INVALID_IDENTIFIER: get_turnover expects dollars in src/pyfolio/perf_attrib.py'
- id: BD-017
  type: BA
  content: High turnover (>25%) triggers warning about intraday activity affecting
    EOD-based attribution
  rationale: 'EOD-based attribution misses intraday round trips; 25% threshold is
    heuristic for acceptable error. The boundary: when turnover exceeds 25%, the assumption
    that positions are held from one day to the next breaks down. Strategies with
    significant intraday turnover will have positions that change multiple times within
    a single day, and EOD snapshots miss these round trips. The 25% threshold is empirically
    determined as the point where intraday activity materially affects attribution
    accuracy.'
  evidence: src/pyfolio/perf_attrib.py:611(PERF_ATTRIB_TURNOVER_THRESHOLD)
  stage: performance_attribution
  alternative_considered: Adaptive threshold based on position change frequency within
    days
  _evidence_issues:
  - 'FN_NOT_FOUND: PERF_ATTRIB_TURNOVER_THRESHOLD in src/pyfolio/perf_attrib.py'
- id: BD-018
  type: BA/DK
  content: Factor partitions (style vs sector) control plot grouping in performance
    attribution reports
  rationale: 'Separating style (momentum, size) from sector factors aids interpretation.
    The boundary: factor attributions are grouped by type, with style factors (market,
    size, value, momentum, etc.) separated from sector factors (technology, healthcare,
    etc.). This aids interpretation because style factors apply across the portfolio
    while sector factors represent industry-specific exposure. Mixing them would obscure
    the sources of returns.'
  evidence: src/pyfolio/tears.py:34(FACTOR_PARTITIONS)
  stage: performance_attribution
  alternative_considered: Infer factor type from naming conventions or require explicit
    labeling
  _evidence_issues:
  - 'FN_NOT_FOUND: FACTOR_PARTITIONS in src/pyfolio/tears.py'
- id: BD-019
  type: BA/M
  content: Every timeseries functions deprecated in favor of empyrical equivalents
  rationale: 'Single source of truth in empyrical reduces maintenance burden; pyfolio
    re-exports for backward compatibility. The boundary: pyfolio no longer maintains
    independent implementations of Sharpe ratio, information ratio, and other risk
    metrics. Users should import from empyrical directly. Pyfolio re-exports these
    functions to maintain backward compatibility for existing code, but the underlying
    implementation lives in empyrical.'
  evidence: src/pyfolio/timeseries.py:31(DEPRECATION_WARNING)
  stage: returns_analysis
  alternative_considered: Maintain parallel implementations indefinitely
  _evidence_issues:
  - 'FN_NOT_FOUND: DEPRECATION_WARNING in src/pyfolio/timeseries.py'
- id: BD-020
  type: BA/M
  content: Rolling window defaults to 6 months (APPROX_BDAYS_PER_MONTH * 6 = 126 days)
  rationale: '126 days balances responsiveness vs stability; aligns with standard
    momentum lookback periods. The boundary: 6 months provides enough data for statistical
    significance while remaining short enough to adapt to regime changes. This window
    matches common momentum strategy lookback periods (3, 6, 12 months) and theoretical
    literature on mean reversion horizons. Shorter windows increase noise; longer
    windows respond slowly to changes.'
  evidence: src/pyfolio/timeseries.py:503(rolling_window)
  stage: returns_analysis
  alternative_considered: Auto-select window based on data characteristics or allow
    user specification
  _evidence_issues:
  - 'FN_NOT_FOUND: rolling_window in src/pyfolio/timeseries.py'
- id: BD-021
  type: M/BA
  content: Bootstrap cone uses 1000 samples by default
  rationale: '1000 samples provides convergence while keeping runtime manageable for
    interactive use. The boundary: bootstrap convergence typically requires hundreds
    to thousands of samples depending on the statistic. 1000 samples balances statistical
    reliability (95% confidence intervals stabilize) against execution time for interactive
    applications. More samples improve precision but increase runtime linearly.'
  evidence: src/pyfolio/timeseries.py:1150(num_samples=1000)
  stage: returns_analysis
  alternative_considered: Adaptive sample count based on convergence detection
  _evidence_issues:
  - 'INVALID_IDENTIFIER: num_samples=1000 in src/pyfolio/timeseries.py'
- id: BD-022
  type: BA/DK
  content: Drawdown table limits to top 10 by default
  rationale: 'Display constraint; larger tables overwhelm users; top 10 captures major
    events. The boundary: limiting to 10 rows prevents information overload while
    capturing the most significant drawdowns. These top 10 typically include the largest
    sustained declines, market crises, and strategy-specific drawdowns. More drawdowns
    could be included but would represent smaller, less significant events.'
  evidence: src/pyfolio/timeseries.py:932(top=10)
  stage: returns_analysis
  alternative_considered: Show each drawdowns, or use percentile-based threshold
  _evidence_issues:
  - 'INVALID_IDENTIFIER: top=10 in src/pyfolio/timeseries.py'
- id: BD-023
  type: BA
  content: Liquidation time based on fixed capital_base, not actual position values
  rationale: 'Removes compounding effect to isolate pure position size vs volume relationship.
    The boundary: by holding capital_base constant rather than using current portfolio
    value, the calculation isolates how position size alone affects liquidation time.
    This answers: how long to liquidate a $X position in a $Y volume environment,
    regardless of current capital. Including compounding would make the relationship
    between position size and liquidation time more complex.'
  evidence: src/pyfolio/capacity.py:47(days_to_liquidate_positions)
  stage: capacity_analysis
  alternative_considered: Use dynamic capital_base reflecting current portfolio value
- id: BD-024
  type: BA
  content: Volume rolling mean uses shift(1) to avoid look-ahead bias
  rationale: 'Yesterday''s volume is last known quantity at decision time; critical
    for backtest integrity. The boundary: the shift ensures that when estimating capacity
    for day T, only volume information available up to the end of day T-1 is used.
    Without shift, today''s partial volume would be included, creating look-ahead
    bias. This preserves backtest validity by ensuring capacity estimates could have
    been made in real-time.'
  evidence: src/pyfolio/capacity.py:92(module)
  stage: capacity_analysis
  alternative_considered: None identified; this is correct practice
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/pyfolio/capacity.py'
- id: BD-025
  type: BA/DK
  content: Max bar consumption defaults to 20% of daily volume
  rationale: '20% is conservative threshold for market impact; higher values unrealistic
    for liquid execution. The boundary: consuming more than 20% of a bar''s volume
    in a single execution would move the market significantly, invalidating the assumption
    that execution price equals quoted price. The 20% threshold is based on practical
    market microstructure: institutional orders exceeding this fraction typically
    experience substantial price impact in liquid markets.'
  evidence: src/pyfolio/capacity.py:50(max_bar_consumption=0.2)
  stage: capacity_analysis
  alternative_considered: Asset-class-specific thresholds, or model-based impact estimation
  _evidence_issues:
  - 'INVALID_IDENTIFIER: max_bar_consumption=0.2 in src/pyfolio/capacity.py'
- id: BD-026
  type: M/DK
  content: Slippage model is quadratic in volume share (market impact literature implementation)
  rationale: 'Quadratic form approximates market impact literature (Almgren-Chriss);
    impact param controls aggressiveness. The boundary: market impact scales quadratically
    with participation rate because larger orders deplete liquidity at multiple price
    levels. This is established in market microstructure research. The quadratic form
    produces realistic impact estimates: small orders have minimal impact, but impact
    grows faster than linearly for large orders. The impact parameter controls overall
    aggressivenes'
  evidence: src/pyfolio/capacity.py:208(quadratic impact)
  stage: capacity_analysis
  alternative_considered: Linear impact model, or square-root impact model from Kyle
    (1985)
  _evidence_issues:
  - 'INVALID_IDENTIFIER: quadratic impact in src/pyfolio/capacity.py'
- id: BD-027
  type: B
