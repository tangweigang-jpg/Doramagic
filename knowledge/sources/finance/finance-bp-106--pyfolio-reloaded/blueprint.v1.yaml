id: finance-bp-106
name: pyfolio
sop_version: '3.6'
source:
  projects:
  - pyfolio-reloaded
  commit_hash: 6b55da7fce365e325046bb080cb13ced1822de95
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Portfolio performance and risk analysis for trading strategies
  description: Python library for performance and risk analysis of financial portfolios,
    designed to work with Zipline backtesting engine. Provides comprehensive tear
    sheets combining tables, plots, and statistics for trading algorithm evaluation.
  prerequisites: Users should understand financial portfolio concepts, pandas DataFrames
    with datetime indexes, and basic trading metrics. Familiarity with Zipline backtesting
    is helpful but not required.
  not_suitable_for: Real-time trading execution, non-financial time series analysis,
    low-level trade management, cross-asset correlation analysis, or portfolios requiring
    real-time data feeds
stages:
- id: data_preprocessing
  name: Data Preprocessing
  order: 1
  responsibility: Normalize and adjust raw inputs (returns, positions, transactions)
    for downstream analysis including intraday estimation, slippage adjustment, and
    benchmark alignment
  interface:
    inputs:
    - raw returns pd.Series
    - raw positions pd.DataFrame
    - transactions pd.DataFrame
    outputs:
    - adjusted positions pd.DataFrame
    - slippage-adjusted returns pd.Series
  required_methods:
  - name: check_intraday
    description: Detects intraday strategies using position-to-transaction ratio threshold
    evidence: src/pyfolio/utils.py:286(function)
  - name: estimate_intraday
    description: Resamples EOD positions to intraday peak exposure point
    evidence: src/pyfolio/utils.py:334(function)
  - name: adjust_returns_for_slippage
    description: Applies basis-points slippage penalty proportional to traded value
    evidence: src/pyfolio/txn.py:113(function)
  key_behaviors:
  - behavior: Intraday detection threshold
    description: Uses threshold 0.25 (positions held / unique stocks traded) to classify
      strategies as intraday vs end-of-day
    evidence: src/pyfolio/utils.py:257(detect_intraday)
  - behavior: Linear slippage model
    description: Slippage modeled as BPS * traded_value applied to daily PnL; computationally
      simple but ignores market impact nonlinearity
    evidence: src/pyfolio/txn.py:137(slippage_dollars)
  - behavior: EOD position shifting
    description: EOD positions shifted by 1 day for starting capital calculation to
      compensate for EOD reporting vs start-of-day capital
    evidence: src/pyfolio/utils.py:385(positions_shifted)
  replaceable_points:
  - name: intraday_estimation_strategy
    description: Method for converting EOD positions to intraday snapshots
    options:
    - name: peak_exposure
      traits:
      - Uses maximum exposure time window
      - Conservative estimation
      fit_for:
      - Strategies with known peak drawdown periods
      - Risk-averse analysis
      not_fit_for:
      - Strategies with irregular trading hours
      - High-frequency trading
    - name: first_transaction
      traits:
      - Uses morning transaction data
      - Forward-looking
      fit_for:
      - Morning-heavy trading strategies
      - Momentum strategies
      not_fit_for:
      - Afternoon-heavy trading
      - Reversal strategies
    - name: last_transaction
      traits:
      - Uses closing transaction data
      - Backward-looking
      fit_for:
      - Closing auction strategies
      - End-of-day rebalancing
      not_fit_for:
      - Intraday scalping
      - Opening range breakout strategies
    default: peak_exposure
  - name: slippage_model
    description: Model for estimating market impact costs
    options:
    - name: fixed_bps
      traits:
      - Constant basis points per trade
      - Simple linear model
      fit_for:
      - Large-cap liquid securities
      - Low-frequency trading
      not_fit_for:
      - Illiquid securities
      - High-frequency trading with significant market impact
    - name: volume_share
      traits:
      - Slippage proportional to volume consumed
      - Linear volume model
      fit_for:
      - Medium-liquidity securities
      - Moderate trade sizes
      not_fit_for:
      - Very illiquid securities
      - Large block trades
    - name: sqrt_volume_share
      traits:
      - Square root volume relationship
      - Market impact literature model
      fit_for:
      - Academic research
      - ' Almgren-Chriss framework compliance'
      not_fit_for:
      - Simple reporting requirements
      - Quick estimates
    default: fixed_bps
  design_decisions:
  - Intraday detection uses threshold 0.25 (positions held / unique stocks traded)
    - balances false positives vs missed intraday detection (src/pyfolio/utils.py:257)
  acceptance_hints:
  - Adjusted positions correctly resampled for intraday strategies
  - Slippage deductions appear as negative returns on high-volume trading days
  - Intraday classification matches expected strategy type
  - Starting capital back-calculation preserves first-day returns
- id: position_analysis
  name: Position Analysis
  order: 2
  responsibility: Compute portfolio allocations, sector exposures, long/short concentrations,
    and top position holdings from position data
  interface:
    inputs:
    - positions pd.DataFrame
    - sector_mappings dict
    outputs:
    - allocation percentages pd.DataFrame
    - sector exposures pd.DataFrame
    - long/short concentrations
  required_methods:
  - name: get_percent_alloc
    description: Normalizes positions to percentages of total portfolio
    evidence: src/pyfolio/pos.py:31(function)
  - name: get_top_long_short_abs
    description: Finds top N long, short, and absolute positions
    evidence: src/pyfolio/pos.py:49(function)
  - name: get_sector_exposures
    description: Aggregates positions by sector mapping
    evidence: src/pyfolio/pos.py:156(function)
  - name: get_max_median_position_concentration
    description: Computes max/median position sizes for concentration risk
    evidence: src/pyfolio/pos.py:80(function)
  key_behaviors:
  - behavior: Cash column inclusion
    description: Positions include 'cash' column representing net short/long imbalance;
      cash is NOT excluded from allocation sum since it represents residual capital
      which IS part of portfolio exposure
    evidence: src/pyfolio/pos.py:46(divide by sum)
  - behavior: Signed position convention
    description: Short positions show as negative values, not separate columns; simplifies
      net exposure calculation but requires care when summing for gross exposure
    evidence: src/pyfolio/tears.py:117(negative values example)
  - behavior: Optional zipline dependency
    description: Soft dependency on zipline.assets for multiplier application; silent
      warning on import failure allows pyfolio to run without zipline
    evidence: src/pyfolio/pos.py:19(ZIPLINE check)
  replaceable_points:
  - name: sector_mapping_source
    description: How to map symbols to sectors
    options:
    - name: user_dict
      traits:
      - Custom dictionary input
      - Full flexibility
      fit_for:
      - User-defined sector taxonomies
      - Non-standard sector classifications
      not_fit_for:
      - Standard sector comparisons
      - Benchmarks requiring consistent mappings
    - name: zipline_asset
      traits:
      - Uses zipline asset metadata
      - Integrated with backtest data
      fit_for:
      - Zipline backtesting workflows
      - Consistent with zipline data feeds
      not_fit_for:
      - Non-zipline data sources
      - Standalone usage without zipline
    - name: external_csv
      traits:
      - Loads from external CSV file
      - Portable sector mappings
      fit_for:
      - Large portfolios
      - Standardized sector data from vendors
      not_fit_for:
      - Dynamic sector assignments
      - Real-time sector updates
    default: user_dict
  design_decisions:
  - Cash column is NOT excluded from allocation sum; represents residual capital which
    IS part of portfolio exposure (src/pyfolio/pos.py:46)
  acceptance_hints:
  - Allocation percentages sum to 100% including cash
  - Sector exposures match provided sector mappings
  - Top positions correctly identified as long (positive) or short (negative)
  - Concentration metrics within expected ranges for portfolio size
- id: transaction_analysis
  name: Transaction Analysis
  order: 3
  responsibility: Extract transaction volumes, turnover rates, and visualize trading
    patterns from transaction records
  interface:
    inputs:
    - transactions pd.DataFrame
    - positions pd.DataFrame
    outputs:
    - daily volume pd.DataFrame
    - turnover rate pd.Series
    - transaction time histogram
  required_methods:
  - name: get_txn_vol
    description: Normalizes timestamps to daily and sums volumes by date
    evidence: src/pyfolio/txn.py:83(function)
  - name: get_turnover
    description: Computes turnover as purchases+sales divided by denominator (AGB
      or portfolio_value)
    evidence: src/pyfolio/txn.py:148(function)
  - name: plot_txn_time_hist
    description: Bins transaction times to analyze intraday trading patterns
    evidence: src/pyfolio/plotting.py:1705(function)
  key_behaviors:
  - behavior: AGB denominator default
    description: Turnover denominator defaults to AGB (Actual Gross Book) not portfolio_value;
      AGB provides stable denominator vs volatile portfolio_value; AGB = positions.abs().sum()
      is beginning-of-period gross exposure
    evidence: src/pyfolio/txn.py:148(denominator='AGB')
  - behavior: Timestamp normalization
    description: Transaction timestamps normalized to midnight for daily aggregation;
      ignores intraday timing within day which is appropriate for daily-level analysis
      but loses time-of-day signal
    evidence: src/pyfolio/txn.py:102(txn_norm.index.normalize)
  - behavior: VWAP computation
    description: Volume-weighted average price computed when merging consecutive same-direction
      transactions to preserve economic reality of multiple fills at different prices
    evidence: src/pyfolio/round_trips.py:124(vwap)
  replaceable_points:
  - name: turnover_denominator
    description: What to divide traded value by for turnover calculation
    options:
    - name: AGB
      traits:
      - Gross market value
      - Beginning-of-period exposure
      - Stable denominator
      fit_for:
      - Long-short strategies
      - High-leverage portfolios
      - Comparing across time periods
      not_fit_for:
      - Growing/shrinking portfolios where absolute turnover matters
      - Cash-heavy strategies
    - name: portfolio_value
      traits:
      - Current portfolio value
      - Dynamic denominator
      fit_for:
      - Growth-oriented strategies
      - Absolute turnover measurement
      not_fit_for:
      - Leveraged strategies
      - Strategies with significant cash drag
    - name: net_liquidation
      traits:
      - Net liquidation value
      - Account-level denominator
      fit_for:
      - Brokerage statements
      - Margin accounts
      not_fit_for:
      - Gross exposure analysis
      - Multi-strategy accounts
    default: AGB
  design_decisions:
  - Turnover denominator defaults to AGB (Actual Gross Book) not portfolio_value to
    provide stable denominator (src/pyfolio/txn.py:148)
  acceptance_hints:
  - Daily volumes sum to total traded value across period
  - Turnover rates are reasonable for strategy type (<100% daily for typical strategies)
  - Transaction time histogram shows expected distribution for trading style
- id: round_trip_analysis
  name: Round Trip Analysis
  order: 4
  responsibility: Group individual transactions into complete buy-sell cycles, compute
    PnL, returns, and duration for each round trip using FIFO matching
  interface:
    inputs:
    - transactions pd.DataFrame
    - portfolio_value pd.Series (optional)
    outputs:
    - round_trips pd.DataFrame with pnl, returns, duration, open_dt, close_dt
  required_methods:
  - name: extract_round_trips
    description: Main entry point; uses FIFO stack to match buys with sells
    evidence: src/pyfolio/round_trips.py:154(function)
  - name: _groupby_consecutive
    description: Merges transactions within 8h window using VWAP
    evidence: src/pyfolio/round_trips.py:103(function)
  - name: add_closing_transactions
    description: Appends synthetic closing transactions for open positions at end
      of period
    evidence: src/pyfolio/round_trips.py:284(function)
  - name: gen_round_trip_stats
    description: Computes PnL, summary, duration, and return statistics
    evidence: src/pyfolio/round_trips.py:362(function)
  key_behaviors:
  - behavior: FIFO deque stack matching
    description: Stack-based FIFO ensures oldest shares matched first; copysign determines
      buy vs sell direction; prices pushed/popped based on sign of amount
    evidence: src/pyfolio/round_trips.py:208(price_stack)
  - behavior: 8-hour grouping window
    description: Captures multiple intraday fills at different prices as single transaction;
      8h covers US trading day
    evidence: src/pyfolio/round_trips.py:103(max_delta=pd.Timedelta('8h'))
  - behavior: Partial round trips
    description: Round trips don't require full position close-out; handles scaling
      in/out of positions; remaining shares matched with future transactions
    evidence: src/pyfolio/round_trips.py:177(partial round trips)
  - behavior: Capital-weighted returns
    description: Returns computed as pnl/invested capital (not pnl/portfolio_value)
      by default; isolates trade profitability vs portfolio allocation effects
    evidence: src/pyfolio/round_trips.py:253(rt_returns)
  - behavior: Separate long/short aggregation
    description: Stats aggregated separately for long, short, and each trades to reveal
      directional performance asymmetry
    evidence: src/pyfolio/round_trips.py:87(agg_all_long_short)
  replaceable_points:
  - name: round_trip_grouping_window
    description: Time window for merging consecutive same-direction transactions
    options:
    - name: 8h
      traits:
      - Full US trading day coverage
      - Captures each same-day trades
      fit_for:
      - US equity strategies
      - Standard intraday to swing trading
      not_fit_for:
      - 24-hour markets
      - Multi-day position scaling
    - name: 24h
      traits:
      - Calendar day boundary
      - Captures next-day opens
      fit_for:
      - Position traders
      - Overnight gap strategies
      not_fit_for:
      - Intraday scalpers
      - High-frequency execution
    - name: custom
      traits:
      - User-defined timedelta
      - Maximum flexibility
      fit_for:
      - Non-standard trading hours
      - Cryptocurrency strategies
      not_fit_for:
      - Standard reporting
      - Compliance requirements
    default: 8h
  - name: matching_algorithm
    description: Order matching method for pairing buys and sells
    options:
    - name: FIFO
      traits:
      - First-in-first-out
      - Oldest shares matched first
      fit_for:
      - Tax reporting
      - Standard broker accounting
      - Long-term holdings
      not_fit_for:
      - Tax-loss harvesting
      - Specific tax lot selection
    - name: LIFO
      traits:
      - Last-in-first-out
      - Newest shares matched first
      fit_for:
      - Rising markets
      - Recent position adjustments
      not_fit_for:
      - Tax compliance in some jurisdictions
      - Legacy broker systems
    - name: average_cost
      traits:
      - Blended average price
      - Single cost basis per security
      fit_for:
      - Simple reporting
      - Mutual fund accounting
      not_fit_for:
      - Tax optimization
      - Precise lot-level attribution
    default: FIFO
  design_decisions:
  - FIFO matching uses deque stack; copysign determines buy vs sell direction (src/pyfolio/round_trips.py:208)
  - 8-hour window merges same-direction transactions (src/pyfolio/round_trips.py:103)
  acceptance_hints:
  - Round trips have valid open_dt < close_dt
  - PnL sums match total realized gains/losses
  - Returns are calculated as pnl/invested_capital
  - Long and short trades are correctly segregated in aggregated statistics
- id: performance_attribution
  name: Performance Attribution
  order: 5
  responsibility: Attribute portfolio returns to risk factors using factor loadings
    and factor returns; separate common returns (factor-driven) from specific returns
    (alpha)
  interface:
    inputs:
    - returns pd.Series
    - positions pd.DataFrame
    - factor_returns pd.DataFrame
    - factor_loadings pd.DataFrame
    outputs:
    - risk_exposures pd.DataFrame
    - perf_attribution pd.DataFrame with common/specific returns
  required_methods:
  - name: perf_attrib
    description: Main entry point; delegates to empyrical.perf_attrib after input
      alignment
    evidence: src/pyfolio/perf_attrib.py:29(function)
  - name: compute_exposures
    description: Computes daily factor exposures from positions and loadings
    evidence: src/pyfolio/perf_attrib.py:151(function)
  - name: _align_and_warn
    description: Aligns dates/tickers across each inputs and warns about high turnover
    evidence: src/pyfolio/perf_attrib.py:511(function)
  key_behaviors:
  - behavior: empyrical delegation
    description: Delegates core computation to empyrical package; avoids duplication
      since empyrical is canonical source for factor model calculations
    evidence: src/pyfolio/perf_attrib.py:148(ep.perf_attrib)
  - behavior: Position conversion timing
    description: Positions converted to percentages after turnover check since get_turnover
      expects dollars but empyrical expects percentages
    evidence: src/pyfolio/perf_attrib.py:144(get_turnover expects dollars)
  - behavior: High turnover warning
    description: EOD-based attribution misses intraday round trips; 25% threshold
      is heuristic for acceptable error
    evidence: src/pyfolio/perf_attrib.py:611(PERF_ATTRIB_TURNOVER_THRESHOLD)
  - behavior: Factor partition grouping
    description: Separating style (momentum, size) from sector factors aids interpretation
      in attribution plots
    evidence: src/pyfolio/tears.py:34(FACTOR_PARTITIONS)
  replaceable_points:
  - name: factor_model
    description: Risk factor model specification for attribution
    options:
    - name: Fama-French
      traits:
      - 3-5 factor model
      - Academic standard
      - Widely available
      fit_for:
      - Academic research
      - US equity strategies
      - Peer comparison
      not_fit_for:
      - International portfolios
      - Alternative assets
      - Fixed income
    - name: Barra
      traits:
      - Institutional grade
      - Fundamental data
      - Risk model
      fit_for:
      - Institutional portfolio management
      - Enterprise risk reporting
      not_fit_for:
      - Small accounts
      - Non-institutional assets
    - name: Axioma
      traits:
      - Alternative institutional model
      - Multi-asset support
      fit_for:
      - Multi-asset portfolios
      - Alternative factor sets
      not_fit_for:
      - Single-factor analysis
      - Simple equity portfolios
    - name: custom
      traits:
      - User-defined factors
      - Full flexibility
      fit_for:
      - Proprietary factor research
      - Alternative data factors
      not_fit_for:
      - Standard benchmarking
      - Regulatory reporting
    default: Fama-French
  design_decisions:
  - Delegates core computation to empyrical package (src/pyfolio/perf_attrib.py:148)
  - High turnover (>25%) triggers warning about intraday activity (src/pyfolio/perf_attrib.py:611)
  acceptance_hints:
  - Common returns + specific returns = total returns
  - Factor exposures match position weights and factor loadings
  - High turnover warning appears for strategies with >25% daily turnover
  - Factor partitions correctly separate style vs sector factors
- id: returns_analysis
  name: Returns Analysis
  order: 6
  responsibility: 'Compute risk metrics: drawdowns, volatility, Sharpe ratio, rolling
    statistics, and forecast cones from return series'
  interface:
    inputs:
    - returns pd.Series
    - factor_returns pd.Series (optional)
    outputs:
    - risk metrics dict
    - drawdown table pd.DataFrame
    - rolling stats pd.DataFrame
  required_methods:
  - name: get_max_drawdown
    description: Finds peak, valley, recovery dates for maximum drawdown
    evidence: src/pyfolio/timeseries.py:905(function)
  - name: gen_drawdown_table
    description: Formats top N drawdowns into display table
    evidence: src/pyfolio/timeseries.py:972(function)
  - name: rolling_beta
    description: Computes rolling 6-month beta using OLS regression
    evidence: src/pyfolio/timeseries.py:503(function)
  - name: forecast_cone_bootstrap
    description: Monte Carlo cone forecast using bootstrap resampling
    evidence: src/pyfolio/timeseries.py:1150(function)
  key_behaviors:
  - behavior: empyrical deprecation wrappers
    description: Every timeseries functions deprecated in favor of empyrical equivalents;
      single source of truth in empyrical reduces maintenance burden; pyfolio re-exports
      for backward compatibility
    evidence: src/pyfolio/timeseries.py:31(DEPRECATION_WARNING)
  - behavior: 6-month rolling window
    description: 126 days (APPROX_BDAYS_PER_MONTH * 6) balances responsiveness vs
      stability; aligns with standard momentum lookback periods
    evidence: src/pyfolio/timeseries.py:503(rolling_window)
  - behavior: Bootstrap convergence
    description: 1000 samples by default provides convergence while keeping runtime
      manageable for interactive use
    evidence: src/pyfolio/timeseries.py:1150(num_samples=1000)
  - behavior: Drawdown table limit
    description: Top 10 drawdowns by default to avoid overwhelming users while capturing
      major events
    evidence: src/pyfolio/timeseries.py:932(top=10)
  replaceable_points:
  - name: rolling_window_size
    description: Lookback period for rolling metrics
    options:
    - name: 3_month
      traits:
      - 63 trading days
      - Short-term focus
      fit_for:
      - High-frequency strategies
      - Quick regime detection
      not_fit_for:
      - Low-frequency strategies
      - Long-term analysis
    - name: 6_month
      traits:
      - 126 trading days
      - Medium-term focus
      fit_for:
      - Standard momentum strategies
      - Quarterly reporting
      not_fit_for:
      - Very short-term or long-term strategies
    - name: 12_month
      traits:
      - 252 trading days
      - Long-term focus
      fit_for:
      - Positional strategies
      - Annual performance review
      not_fit_for:
      - Intraday or swing traders
      - Quick momentum capture
    - name: custom
      traits:
      - User-defined window
      - Maximum flexibility
      fit_for:
      - Non-standard analysis windows
      - Academic research
      not_fit_for:
      - Standard reporting
      - Regulatory compliance
    default: 6_month
  - name: cone_method
    description: Method for forecast cone estimation
    options:
    - name: bootstrap
      traits:
      - Resampled returns
      - Non-parametric
      - 1000 iterations default
      fit_for:
      - Non-normal return distributions
      - Tail risk analysis
      not_fit_for:
      - Small sample sizes
      - Very long forecast horizons
    - name: parametric
      traits:
      - Normal distribution assumption
      - Analytical confidence intervals
      fit_for:
      - Large samples
      - Normally distributed returns
      not_fit_for:
      - Fat-tailed distributions
      - Crisis periods
    - name: historical
      traits:
      - Historical scenarios
      - No distribution assumption
      fit_for:
      - Scenario analysis
      - Historical stress testing
      not_fit_for:
      - New market regimes
      - Innovative strategies
    default: bootstrap
  design_decisions:
  - Every timeseries functions deprecated in favor of empyrical equivalents (src/pyfolio/timeseries.py:31)
  - Rolling window defaults to 6 months (126 days) (src/pyfolio/timeseries.py:503)
  acceptance_hints:
  - Drawdown calculations correctly identify peak, valley, and recovery dates
  - Rolling beta converges to appropriate values over time
  - Forecast cone respects historical volatility regime
  - Deprecated warning messages appear when using pyfolio timeseries directly
- id: capacity_analysis
  name: Capacity Analysis
  order: 7
  responsibility: Model market liquidity constraints; compute days-to-liquidate positions
    based on volume constraints and estimate slippage from volume consumption
  interface:
    inputs:
    - positions pd.DataFrame
    - transactions pd.DataFrame
    - market_data pd.DataFrame
    outputs:
    - days_to_liquidate pd.DataFrame
    - slippage-adjusted returns pd.Series
  required_methods:
  - name: days_to_liquidate_positions
    description: Computes liquidation time using trailing mean volume and max_bar_consumption
      limit
    evidence: src/pyfolio/capacity.py:47(function)
  - name: get_low_liquidity_transactions
    description: Identifies transactions consuming largest fraction of daily volume
    evidence: src/pyfolio/capacity.py:174(function)
  - name: apply_slippage_penalty
    description: Applies quadratic volume-share slippage model
    evidence: src/pyfolio/capacity.py:208(function)
  key_behaviors:
  - behavior: Fixed capital base
    description: Liquidation time based on fixed capital_base, not actual position
      values; removes compounding effect to isolate pure position size vs volume relationship
    evidence: src/pyfolio/capacity.py:61(assumes constant capital_base)
  - behavior: Look-ahead bias prevention
    description: Volume rolling mean uses shift(1) to avoid look-ahead bias; yesterday's
      volume is last known quantity at decision time
    evidence: src/pyfolio/capacity.py:92(shift())
  - behavior: Conservative consumption limit
    description: Max bar consumption defaults to 20% of daily volume; conservative
      threshold for market impact; higher values unrealistic for liquid execution
    evidence: src/pyfolio/capacity.py:50(max_bar_consumption=0.2)
  - behavior: Quadratic slippage model
    description: Slippage model is quadratic in volume share; approximates market
      impact literature (Almgren-Chriss); impact param controls aggressiveness
    evidence: src/pyfolio/capacity.py:208(quadratic impact)
  replaceable_points:
  - name: volume_consumption_limit
    description: Maximum fraction of daily volume to consume per day
    options:
    - name: '0.1'
      traits:
      - Very conservative
      - Minimal market impact
      fit_for:
      - Very illiquid securities
      - Large institutional positions
      not_fit_for:
      - Liquid securities
      - Time-sensitive liquidation
    - name: '0.2'
      traits:
      - Conservative
      - Standard institutional practice
      fit_for:
      - Most institutional strategies
      - Typical portfolio rebalancing
      not_fit_for:
      - Aggressive liquidation
      - High-frequency rebalancing
    - name: '0.3'
      traits:
      - Moderate
      - Higher market impact tolerance
      fit_for:
      - Liquid large-cap securities
      - Time-constrained liquidation
      not_fit_for:
      - Small-cap securities
      - Illiquid markets
    - name: custom
      traits:
      - User-defined fraction
      - Full flexibility
      fit_for:
      - Strategy-specific constraints
      - Risk tolerance customization
      not_fit_for:
      - Standard reporting
      - Regulatory compliance
    default: '0.2'
  - name: slippage_impact_coefficient
    description: Market impact scaling parameter for quadratic slippage model
    options:
    - name: '0.05'
      traits:
      - Low impact
      - Conservative estimate
      fit_for:
      - Highly liquid securities
      - Small trade sizes
      not_fit_for:
      - Illiquid securities
      - Large block trades
    - name: '0.1'
      traits:
      - Medium impact
      - Balanced estimate
      fit_for:
      - Typical institutional trades
      - Mid-cap securities
      not_fit_for:
      - Very large or very small trades
    - name: '0.15'
      traits:
      - High impact
      - Conservative cost estimate
      fit_for:
