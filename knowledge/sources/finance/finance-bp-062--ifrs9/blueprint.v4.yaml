# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-062
name: IFRS 9 Impairment Model
stages:
- id: transaction_staging
  name: Transaction Staging
  order: 1
  responsibility: Processes raw transaction data into time-series format for credit analysis. Creates
    forward-looking 12-month performance windows and backward-looking aging buckets to establish the foundation
    for each downstream PD calculations.
  interface:
    inputs: Raw parquet transaction files with AccountID, Status, Monthkey, Aging, writeOff flags
    outputs: Processed transaction DataFrame with 12-month forward windows and status transitions
  required_methods:
  - name: backwardTransaction.ipynb
    description: Main notebook processing backward transaction data for staging criteria and historical
      aging shifts
    evidence: Staging/backwardTransaction.ipynb:1
  key_behaviors:
  - behavior: Entity-level isolation via groupby before shift
    description: Every shift operations group by AccountID first to ensure temporal shifts stay within
      each account's timeline and do not cross account boundaries
    evidence: PD/transitionMatrix.ipynb:133(groupby)
  - behavior: Forward window creation via negative shift
    description: Uses pandas shift(-i) with negative periods to create forward-looking columns for 12-month
      performance tracking
    evidence: PD/transitionMatrix.ipynb:133(shift)
  - behavior: Account exclusion based on minimum observation window
    description: Excludes accounts with less than 12-month observation window (maxMonthkey-12) to ensure
      reliable 12M PD calculation
    evidence: PD/transitionMatrix.ipynb:196(query)
  replaceable_points:
  - name: lag_period
    description: Forward performance window length determines how many periods ahead to track status
    options:
    - name: '12'
      traits:
      - 12-month standard
      - IFRS 9 aligned
      - common Basel horizon
      fit_for:
      - Standard retail portfolios
      - Annual reporting cycles
      not_fit_for:
      - Short-term facilities
      - Trade finance
    - name: '24'
      traits:
      - 24-month extended
      - Broader coverage
      - Higher data requirements
      fit_for:
      - Commercial real estate
      - Long-term project finance
      not_fit_for:
      - Revolving credit
      - High turnover portfolios
    - name: '36'
      traits:
      - 36-month long-term
      - Maximum coverage
      - Significant data history required
      fit_for:
      - Mortgage portfolios
      - Infrastructure lending
      not_fit_for:
      - Consumer lending
      - Limited history portfolios
    default: '12'
  - name: exclusion_rules
    description: Account filtering criteria for minimum observation requirements
    options:
    - name: standard
      traits:
      - 12-month minimum
      - Default IFRS 9 criteria
      fit_for:
      - Most retail portfolios
      - Standard credit products
      not_fit_for:
      - New originations
      - Thin file accounts
    - name: strict
      traits:
      - 24-month minimum
      - More conservative filtering
      fit_for:
      - High-risk portfolios
      - Regulatory scrutiny
      not_fit_for:
      - New portfolios
      - Rapidly growing books
    - name: relaxed
      traits:
      - 6-month minimum
      - Inclusive filtering
      fit_for:
      - New portfolios
      - Short-track accounts
      not_fit_for:
      - Historical calibration
      - Conservative estimation
    default: standard
  design_decisions:
  - decision: Use .shift(-i) for forward window creation
    evidence: PD/transitionMatrix.ipynb:133(shift)
    rationale: pandas shift with negative periods creates forward-looking columns for 12M performance
      tracking
  - decision: Group by AccountID before shifting
    evidence: PD/transitionMatrix.ipynb:133(groupby)
    rationale: Ensures shifts stay within each account's timeline, not crossing account boundaries
  - decision: Exclusion rules filter maxMonthkey-12
    evidence: PD/transitionMatrix.ipynb:196(query)
    rationale: Requires minimum 12-month observation window to calculate reliable 12M PD
  acceptance_hints:
  - Every accounts have complete 12-month forward windows with no cross-account contamination
  - Shift operations preserve temporal ordering within each AccountID group
  - Excluded accounts are properly documented and don't bias the calibration sample
- id: transition_matrix
  name: Transition Matrix Estimation
  order: 2
  responsibility: Builds migration/transition matrices showing probability of accounts moving between
    aging states (0=current, 1-3=delinquency, 4=default) over performance periods, serving as the foundation
    for conditional PD calculations.
  interface:
    inputs: Processed transaction data with 12MStatus flags and Segment groupings
    outputs: Transition probability matrix by Segment x Aging bucket
  required_methods:
  - name: transitionMatrix.ipynb
    description: Pivot table construction for count matrices and transition probability calculations
    evidence: PD/transitionMatrix.ipynb:370
  - name: NRTMatrix.ipynb
    description: Non-retail transition matrix construction with reference row handling
    evidence: PD/NRTMatrix.ipynb:1
  key_behaviors:
  - behavior: Worst-status capture via max aggregation
    description: 12MStatus uses max(aging) across the 12-month window to capture any default event during
      the performance period
    evidence: PD/transitionMatrix.ipynb:165(max)
  - behavior: Censored loan handling with last known status
    description: Accounts still performing at observation end have last known status propagated forward
      using mapping
    evidence: PD/transitionMatrix.ipynb:181(map)
  - behavior: Pivot table aggregation for count matrices
    description: Uses pivot_table with aggfunc=sum to aggregate counts across accounts per Segment/Aging
      combination
    evidence: PD/transitionMatrix.ipynb:371(pivot)
  replaceable_points:
  - name: status_mapping
    description: How aging states map to final status determines PD definition
    options:
    - name: ever_default
      traits:
      - Conservative
      - Captures any default event
      fit_for:
      - Regulatory reporting
      - Conservative provisioning
      not_fit_for:
      - Optimistic scenarios
      - Low-default portfolios
    - name: max_status
      traits:
      - Moderate
      - Uses worst observed status
      fit_for:
      - Standard IFRS 9
      - General purpose
      not_fit_for:
      - Non-performing loan analysis
    - name: first_default
      traits:
      - Moderate
      - Captures first default event
      fit_for:
      - Default timing analysis
      - Recovery analysis
      not_fit_for:
      - Aggregate default rates
    default: ever_default
  - name: matrix_normalization
    description: Row vs column normalization affects probability interpretation
    options:
    - name: row
      traits:
      - From-state normalization
      - Most common in credit risk
      fit_for:
      - Migration probability interpretation
      - Standard credit risk models
      not_fit_for:
      - Flow analysis
      - Inventory models
    - name: column
      traits:
      - To-state normalization
      - Useful for flows
      fit_for:
      - Flow analysis
      - Entry/exit analysis
      not_fit_for:
      - Migration probability interpretation
    - name: double
      traits:
      - Both normalizations
      - Comprehensive view
      fit_for:
      - Validation purposes
      - Model comparison
      not_fit_for:
      - Production systems
      - Simple interpretation
    default: row
  design_decisions:
  - decision: Status mapping uses max(axis=1) for 12M status
    evidence: PD/transitionMatrix.ipynb:165(max)
    rationale: Takes worst status observed in 12-month window; 12MStatus=max(aging) captures any default
      during window
  - decision: Fill with lastStatus for censored performing loans
    evidence: PD/transitionMatrix.ipynb:181(map)
    rationale: Accounts still performing at observation end need last known status propagated
  - decision: Use pivot_table with aggfunc=sum for matrix
    evidence: PD/transitionMatrix.ipynb:371(pivot)
    rationale: Aggregates counts across accounts per Segment/Aging/Aging12Adj combination
  acceptance_hints:
  - Transition matrices are row-stochastic (rows sum to 1.0)
  - Default state (4) is absorbing (100% self-transition or exit to closure)
  - Matrix multiplication produces valid lifetime PD estimates
- id: survival_analysis
  name: Survival Analysis for PD
  order: 3
  responsibility: Non-parametric survival analysis to estimate marginal and conditional PD term structures
    from historical cohort data, providing unbiased 12-month PD estimates that form the TTC baseline.
  interface:
    inputs: Cohort transaction data with dfFlag for default events and time-to-event information
    outputs: Lifetime marginal PD curves by segment
  required_methods:
  - name: survivalAnalysis.ipynb
    description: Forward survival computation using shift operations for survival probability estimation
    evidence: PD/survivalAnalysis.ipynb:141
  - name: lifetimeCalibration.ipynb
    description: Marginal PD calculation from conditional PD using survival function approach
    evidence: PD/lifetimeCalibration.ipynb:274
  key_behaviors:
  - behavior: Marginal PD via conditional PD times survival to period t-1
    description: Marginal PD at period t = conditional PD at t * survival probability to t-1, calculated
      via cumPD.shift(1)
    evidence: PD/lifetimeCalibration.ipynb:274(shift)
  - behavior: Lifetime PD via survival function product
    description: Lifetime PD = 1 - product of (1 - conditional PDs); standard survival function approach
      using cumprod
    evidence: PD/lifetimeCalibration.ipynb:286(cumprod)
  - behavior: Numerical calibration using fsolve
    description: Root-finding to calibrate lifetime curves to observed central tendency when analytical
      solutions unavailable
    evidence: PD/lifetimeCalibration.ipynb:58(fsolve)
  replaceable_points:
  - name: survival_function
    description: Method for survival probability estimation affects PD precision
    options:
    - name: manual
      traits:
      - Custom implementation
      - Full control
      - Requires validation
      fit_for:
      - Research
      - Custom distributions
      - Audited methodology
      not_fit_for:
      - Quick implementation
      - Standard reporting
    - name: lifelines_km
      traits:
      - Kaplan-Meier estimator
      - Industry standard
      - Well-tested
      fit_for:
      - Production systems
      - Regulatory acceptance
      not_fit_for:
      - Censored data with covariates
      - Complex survival patterns
    - name: numpy
      traits:
      - Vectorized numpy
      - High performance
      - Basic survival
      fit_for:
      - Large datasets
      - Simple survival patterns
      not_fit_for:
      - Censored data
      - Complex survival
    default: manual
  - name: calibration_method
    description: Lifetime calibration approach for fitting curves to observed data
    options:
    - name: fsolve
      traits:
      - Root-finding
      - Fast convergence
      - Single solution
      fit_for:
      - Standard calibration
      - Production use
      not_fit_for:
      - Multiple solutions
      - Non-convex problems
    - name: scipy_minimize
      traits:
      - Optimization-based
      - Flexible
      - Multiple local minima
      fit_for:
      - Complex calibrations
      - Multiple optima
      not_fit_for:
      - Simple calibrations
      - Speed requirements
    - name: grid_search
      traits:
      - Exhaustive search
      - Robust
      - Computationally expensive
      fit_for:
      - Small parameter spaces
      - Robustness testing
      not_fit_for:
      - Large parameter spaces
      - Production calibration
    default: fsolve
  design_decisions:
  - decision: cumPD.shift(1) for marginal PD calculation
    evidence: PD/lifetimeCalibration.ipynb:274(shift)
    rationale: Marginal PD at period t = conditional PD at t * survival probability to t-1
  - decision: conPD * np.cumprod(1 - conPD) pattern
    evidence: PD/lifetimeCalibration.ipynb:286(cumprod)
    rationale: Lifetime PD = 1 - product of (1 - conditional PDs); standard survival function approach
  - decision: Use fsolve for lifetime calibration
    evidence: PD/lifetimeCalibration.ipynb:58(fsolve)
    rationale: Numerical root-finding to calibrate lifetime curves to observed central tendency
  acceptance_hints:
  - Marginal PDs are non-negative and decrease over time (survival effect)
  - Cumulative PD approaches 1.0 as time horizon extends
  - Calibration residuals are within acceptable tolerance
- id: forward_looking_adjustment
  name: Forward-Looking PD Adjustment
  order: 4
  responsibility: Incorporates macroeconomic variables (CCI, macro factors) to create Point-in-Time (PIT)
    PD from Through-the-Cycle (TTC) estimates, ensuring IFRS 9 forward-looking requirement.
  interface:
    inputs: TTC PD curves, macroeconomic indicator time series (CCI, NPL ratio)
    outputs: PIT PD term structure adjusted for forward-looking macro expectations
  required_methods:
  - name: cci.ipynb
    description: Credit Cycle Index calculation with survival adjustment for macro-PD linkage
    evidence: PD/cci.ipynb:190
  - name: vasicekTransitionMatrix.ipynb
    description: Vasicek single-factor model for conditional transition matrices under macro stress
    evidence: PD/vasicekTransitionMatrix.ipynb:1
  - name: simplifiedCCI.ipynb
    description: Simplified CCI with single rho parameter for systematic risk loading
    evidence: PD/simplifiedCCI.ipynb:792
  key_behaviors:
  - behavior: CCI incorporates lagged survival rates
    description: Credit cycle index uses survive shift(1) with fillna(0) to create prior period reference
      for macro linkage
    evidence: PD/simplifiedCCI.ipynb:792(shift)
  - behavior: Vasicek single-factor model for systematic correlation
    description: Basel asset correlation (rho) provides systematic factor loading for macro stress scenarios
    evidence: PD/vasicekBaselRho.ipynb:1
  - behavior: Efficient groupby without sorting
    description: Group by Aging with sort=False to avoid expensive sort operations, assuming data already
      ordered by time
    evidence: PD/cci.ipynb:190(groupby)
  replaceable_points:
  - name: macro_model
    description: Macro variable integration method affects PIT adjustment granularity
    options:
    - name: CCI
      traits:
      - Credit Cycle Index
      - Composite indicator
      - Sector-specific
      fit_for:
      - Standard IFRS 9
      - Multi-sector portfolios
      not_fit_for:
      - Single-factor models
      - Regulatory stress testing
    - name: vasicek
      traits:
      - Single-factor Gaussian
      - Regulatory aligned
      - Conditional PD
      fit_for:
      - Regulatory capital alignment
      - Stress testing
      not_fit_for:
      - Multi-factor dependencies
      - Tail dependence
    - name: regression
      traits:
      - Statistical regression
      - Data-driven
      - Explainable
      fit_for:
      - Economic research
      - Variable selection
      not_fit_for:
      - Real-time updates
      - Non-linear relationships
    default: CCI
  - name: correlation_parameter
    description: Systematic risk factor loading determines portfolio correlation
    options:
    - name: basel_rho
      traits:
      - Basel regulatory values
      - Product-based
      - Validated
      fit_for:
      - Regulatory alignment
      - Capital calculation
      not_fit_for:
      - Internal model validation
      - Portfolio-specific correlation
    - name: calibrated_rho
      traits:
      - Internal calibration
      - Portfolio-specific
      - Data-driven
      fit_for:
      - Internal models
      - Peer comparison
      not_fit_for:
      - Regulatory submission
      - Quick implementation
    - name: historical
      traits:
      - Historical estimation
      - Observable correlation
      - Retrospective
      fit_for:
      - Backtesting
      - Model validation
      not_fit_for:
      - Forward-looking scenarios
      - New portfolios
    default: basel_rho
  design_decisions:
  - decision: CCI uses survive shift(1) with fillna(0)
    evidence: PD/simplifiedCCI.ipynb:792(shift)
    rationale: Credit cycle index incorporates lagged survival rates; shift(1) creates prior period reference
  - decision: Vasicek single-factor model for rho
    evidence: PD/vasicekBaselRho.ipynb:1
    rationale: Basel asset correlation provides systematic factor loading for macro stress
  - decision: Group by Aging with sort=False for efficiency
    evidence: PD/cci.ipynb:190(groupby)
    rationale: Avoids expensive sort operation; assumes data already ordered by time
  acceptance_hints:
  - PIT PDs are higher than TTC in downturn scenarios and lower in upturns
  - CCI values move counter-cyclically with credit conditions
  - Forward-looking adjustment is applied AFTER TTC PD calibration (DEEP-009 invariant)
- id: lgd_estimation
  name: LGD Model Estimation
  order: 5
  responsibility: Estimates Loss Given Default using recovery data with EIR discounting. Models include
    direct cost but exclude indirect costs per IFRS 9 unbias requirement.
  interface:
    inputs: Recovery amounts, direct costs, EIR, aging flags, ACCOUNT_ID time series
    outputs: Unbiased LGD estimates by segment and time-to-recovery
  required_methods:
  - name: LGDFunctionModel.ipynb
    description: Multi-period recovery projection with EIR discounting for present value calculation
    evidence: LGD/LGDFunctionModel.ipynb:2019
  key_behaviors:
  - behavior: EIR discounting for IFRS 9 compliance
    description: IFRS 9 requires discounting recovery cash flows at original EIR to get present value
      of expected recoveries
    evidence: LGD/LGDFunctionModel.ipynb:2019(EIR)
  - behavior: Indirect costs excluded per IFRS 9 unbias requirement
    description: IFRS 9 requires unbiased LGD estimates; indirect costs excluded from regulatory LGD but
      not Basel LGD
    evidence: LGD/README.md:22
  - behavior: Account-level recovery tracking via groupby shift
    description: Each account's recovery timeline tracked separately via groupby shift operations on ACCOUNT_ID
    evidence: LGD/LGDFunctionModel.ipynb:463(shift)
  replaceable_points:
  - name: lgd_definition
    description: LGD calculation basis determines recovery measurement approach
    options:
    - name: workout
      traits:
      - Workout-based
      - Internal data
      - Bank-specific
      fit_for:
      - Banks with workout operations
      - Collateral-heavy portfolios
      not_fit_for:
      - Trading book
      - Market-based recoveries
    - name: market
      traits:
      - Market price based
      - Observable prices
      - Mark-to-market
      fit_for:
      - Trading portfolios
      - Traded debt instruments
      not_fit_for:
      - Illiquid positions
      - Workout-intensive portfolios
    - name: hybrid
      traits:
      - Combination approach
      - Blend of methods
      - Flexible
      fit_for:
      - Mixed portfolios
      - Best practice
      not_fit_for:
      - Simple requirements
      - Regulatory simplicity
    default: workout
  - name: discount_method
    description: Discount rate selection affects LGD present value calculation
    options:
    - name: EIR
      traits:
      - IFRS 9 compliant
      - Contractual rate
      - Original EIR
      fit_for:
      - IFRS 9 reporting
      - General purpose
      not_fit_for:
      - Market-based valuation
      - Fair value disclosure
    - name: risk_free
      traits:
      - Government yield
      - No credit spread
      - Conservative
      fit_for:
      - Conservative estimates
      - Regulatory comparisons
      not_fit_for:
      - IFRS 9 compliance
      - Economic value
    - name: original_rate
      traits:
      - Contractual rate
      - Similar to EIR
      - Simple
      fit_for:
      - Simple implementation
      - Validation purposes
      not_fit_for:
      - Complex fee structures
      - Variable rate loans
    default: EIR
  design_decisions:
  - decision: EIR discounting required per IFRS 9
    evidence: LGD/LGDFunctionModel.ipynb:2019(EIR)
    rationale: IFRS 9 requires discounting recovery cash flows at original EIR to get present value
  - decision: Exclude indirect costs from LGD
    evidence: LGD/README.md:22
    rationale: IFRS 9 unbias requirement; indirect costs excluded from regulatory LGD but not IFRS 9 LGD
  - decision: Shift by ACCOUNT_ID for recovery tracking
    evidence: LGD/LGDFunctionModel.ipynb:463(shift)
    rationale: Each account's recovery timeline tracked separately via groupby shift operations
  acceptance_hints:
  - LGD values are between 0% and 100%
  - EIR discounting produces lower LGD than undiscounted for long recovery periods
  - Unbiased LGD (excluding indirect costs) is lower than regulatory LGD
- id: ead_estimation
  name: Exposure at Default (EAD) Estimation
  order: 6
  responsibility: Calculates outstanding balance at default, accounting for limit utilization and drawdown
    patterns for revolving facilities and hybrid loan structures.
  interface:
    inputs: Account limits, outstanding balances, utilization history by ACCOUNT_ID
    outputs: EAD estimates by account and time bucket
  required_methods:
  - name: ECLLimitLevel_Truncate.ipynb
    description: Limit utilization with cumsum shift for available balance calculation and EAD projection
    evidence: ECL/ECLLimitLevel_Truncate.ipynb:6119
  key_behaviors:
  - behavior: Running limit calculation via cumsum.shift().fillna(0)
    description: Available limit accumulates installments paid; shift aligns with period boundaries for
      EAD tracking
    evidence: ECL/ECLLimitLevel_Truncate.ipynb:6119(shift)
  - behavior: Hybrid loan handling for TL/RP conversion
    description: Accounts can convert between term loan and revolving; limit/truncate logic varies by
      product type
    evidence: ECL/ECLLimitLevel_Truncate.ipynb:6119
  - behavior: Hierarchical LimitID vs AccountID structure
    description: One limit can cover multiple accounts; hierarchical structure needed for consolidated
      EAD calculation
    evidence: ECL/ECLLimitLevel_Truncate.ipynb:76
  replaceable_points:
  - name: ead_model
    description: EAD calculation method determines how undrawn amounts are treated
    options:
    - name: ccf
      traits:
      - Credit Conversion Factor
      - Regulatory aligned
      - Drawdown estimate
      fit_for:
      - Revolving facilities
      - Regulatory reporting
      not_fit_for:
      - Term loans
      - Fixed exposure instruments
    - name: fixed_ratio
      traits:
      - Fixed percentage
      - Simple
      - Conservative
      fit_for:
      - Limited data
      - Quick implementation
      not_fit_for:
      - Revolving facilities
      - Variable utilization
    - name: historical
      traits:
      - Historical averages
      - Data-driven
      - Product-specific
      fit_for:
      - Mature portfolios
      - Validation purposes
      not_fit_for:
      - New products
      - Rapidly changing portfolios
    default: ccf
  - name: limit_treatment
    description: How unused limits are treated for revolving exposure
    options:
    - name: truncate
      traits:
      - Cap at limit
      - Standard Basel
      - Conservative
      fit_for:
      - Standard revolving
      - Regulatory alignment
      not_fit_for:
      - Over-limit facilities
      - Soft limits
    - name: hybrid
      traits:
      - Adaptive treatment
      - Product-specific
      - Flexible
      fit_for:
      - Mixed portfolios
      - Custom implementations
      not_fit_for:
      - Simple requirements
      - Regulatory simplicity
    - name: term_only
      traits:
      - No revolving component
      - Simple
      - No CCF
      fit_for:
      - Term loans only
      - Simple portfolios
      not_fit_for:
      - Revolving facilities
      - Credit cards
    default: truncate
  design_decisions:
  - decision: cumsum.shift().fillna(0) for running limit
    evidence: ECL/ECLLimitLevel_Truncate.ipynb:6119(shift)
    rationale: Available limit accumulates installments paid; shift aligns with period boundaries
  - decision: Hybrid loan handling (TL/RP conversion)
    evidence: ECL/ECLLimitLevel_Truncate.ipynb:6119
    rationale: Accounts can convert between term loan and revolving; limit/truncate logic varies
  - decision: Separate LimitID vs AccountID tracking
    evidence: ECL/ECLLimitLevel_Truncate.ipynb:76
    rationale: One limit can cover multiple accounts; need hierarchical structure for EAD
  acceptance_hints:
  - EAD does not exceed committed limit for revolving facilities
  - Hybrid loan conversions are properly tracked across product types
  - EAD for term loans equals outstanding balance (no undrawn component)
- id: staging_classification
  name: IFRS 9 Staging Classification
  order: 7
  responsibility: Classifies accounts into Stage 1 (12-month ECL), Stage 2 (lifetime ECL), or Stage 3
    (credit-impaired) based on SICR (Significant Increase in Credit Risk) criteria.
  interface:
    inputs: Account IDs, aging status, historical PDs, macro conditions
    outputs: Stage assignment (1, 2, or 3) per account per reporting date
  required_methods:
  - name: backwardTransaction.ipynb
    description: Backward-looking aging shift for staging historical assessment and bucket-based staging
      criteria
    evidence: Staging/backwardTransaction.ipynb:150,205
  key_behaviors:
  - behavior: Backward shift for historical staging assessment
    description: Staging at time t requires knowing status at t-1, t-2 for SICR assessment using backward
      shift operations
    evidence: Staging/backwardTransaction.ipynb:150(shift)
  - behavior: Bucket-based staging thresholds via aging migration
    description: SICR determined by bucket migration (0->1 triggers stage 2, 4 triggers stage 3) for objective
      classification
    evidence: Staging/backwardTransaction.ipynb:205
  - behavior: 30-day past due as rebuttable presumption backstop
    description: IFRS 9 allows 30dpd as rebuttable presumption for SICR determination if not rebutted
      with supporting analysis
    evidence: README.md:19
  replaceable_points:
  - name: sicr_method
    description: SICR assessment method determines how credit risk increase is measured
    options:
    - name: relative
      traits:
      - PD ratio comparison
      - Threshold-based
      - Relative to origination
      fit_for:
      - Standard IFRS 9
      - Low-default portfolios
      not_fit_for:
      - High-default portfolios
      - Rapid migration
    - name: absolute
      traits:
      - Absolute PD thresholds
      - Quantitative
      - Fixed cutoffs
      fit_for:
      - Simple implementation
      - Clear risk appetite
      not_fit_for:
      - Varying origination PDs
      - Segment-specific
    - name: backstop
      traits:
      - 30dpd rule
      - Regulatory safe harbor
      - Conservative
      fit_for:
      - Regulatory compliance
      - Simple rules
      not_fit_for:
      - Early detection
      - Sophisticated risk management
    default: relative
  - name: stage_thresholds
    description: PD migration thresholds determine stage boundaries
    options:
    - name: ifrs9_default
      traits:
      - Standard IFRS 9
      - 2x threshold
      - Regulatory accepted
      fit_for:
      - General purpose
      - Regulatory reporting
      not_fit_for:
      - Custom risk appetite
      - Internal models
    - name: basel_based
      traits:
      - Basel-inspired
      - Regulatory aligned
      - Conservative
      fit_for:
      - Capital optimization
      - Regulatory alignment
      not_fit_for:
      - Pure IFRS 9
      - Economic provisioning
    - name: internal
      traits:
      - Internal calibration
      - Custom thresholds
      - Data-driven
      fit_for:
      - Advanced models
      - Custom risk appetite
      not_fit_for:
      - Regulatory submission
      - Simple requirements
    default: ifrs9_default
  design_decisions:
  - decision: Backward shift for historical staging
    evidence: Staging/backwardTransaction.ipynb:150(shift)
    rationale: Staging at time t requires knowing status at t-1, t-2 for SICR assessment
  - decision: Bucket-based staging thresholds
    evidence: Staging/backwardTransaction.ipynb:205
    rationale: SICR determined by bucket migration (0->1 triggers stage 2, 4 triggers stage 3)
  - decision: 30-day past due as backstop
    evidence: README.md:19
    rationale: IFRS 9 allows 30dpd as rebuttable presumption for SICR
  acceptance_hints:
  - Stage 3 (credit-impaired) accounts use lifetime ECL with 100% PD
  - Stage 2 accounts that cure for 12 consecutive months return to Stage 1
  - Stage determination precedes PD/LGD/EAD computation (DEEP-001 invariant)
- id: amortization_scheduling
  name: Amortization Schedule Generation
  order: 8
  responsibility: Computes contractual cash flows (principal, interest, fees) over loan lifetime for ECL
    discounting. Handles normal and abnormal amortization patterns.
  interface:
    inputs: Interest rate, terms, principal balance, EIR
    outputs: Period-by-period payment schedule with Beginning_Balance, Payment, Principal, Interest, Ending_Balance
  required_methods:
  - name: amortization.ipynb
    description: Standard amortization using numpy-financial pmt/ppmt/ipmt for regular loan schedules
    evidence: ECL/amortization.ipynb:93
  - name: abAmortization.ipynb
    description: Abnormal amortization for inconsistent term/rate/installment hybrid loan structures
    evidence: ECL/abAmortization.ipynb:1
  key_behaviors:
  - behavior: Standard amortization via numpy-financial
    description: Standard PMT/IPMT/PPMT functions handle annuity calculations correctly for regular payment
      schedules
    evidence: ECL/amortization.ipynb:99(pmt)
  - behavior: Monthly rate convention for banking
    description: Monthly rate = annual_rate/12 following banking convention for installment loans with
      monthly compounding
    evidence: ECL/amortization.ipynb:99
  - behavior: Ending balance via cumulative principal
    description: Ending_Balance = balance + cumsum(Principal); principal values are negative in numpy-financial
      convention
    evidence: ECL/amortization.ipynb:102
  - behavior: Separate abnormal amortization for edge cases
    description: Hybrid loans with inconsistent terms need different calculation logic than standard annuities
    evidence: ECL/abAmortization.ipynb:1
  replaceable_points:
  - name: compounding
    description: Interest compounding frequency affects payment calculations
    options:
    - name: monthly
      traits:
      - 12 periods/year
      - Banking standard
      - Common
      fit_for:
      - Standard loans
      - IFRS 9 reporting
      not_fit_for:
      - Daily accrual
      - Continuous compounding
    - name: daily
      traits:
      - 365 periods/year
      - Accrual-based
      - Precise
      fit_for:
      - Accrual accounting
      - Variable rate loans
      not_fit_for:
      - Simple loans
      - Computational efficiency
    - name: continuous
      traits:
      - Infinite periods
      - Mathematical
      - Theoretical
      fit_for:
      - Mathematical modeling
      - Derivative pricing
      not_fit_for:
      - Banking practice
      - IFRS 9 compliance
    default: monthly
  - name: schedule_type
    description: Amortization schedule variant for different loan structures
    options:
    - name: standard
      traits:
      - Equal payments
      - Annuity-based
      - Simple
      fit_for:
      - Consumer loans
      - Standard mortgages
      not_fit_for:
      - Balloon payments
      - Step-rate loans
    - name: abnormal
      traits:
      - Irregular payments
      - Flexible
      - Complex
      fit_for:
      - Hybrid loans
      - Custom structures
      not_fit_for:
      - Standard loans
      - Regulatory simplicity
    - name: bullet
      traits:
      - Interest-only
      - Balloon principal
      - Zero amortization
      fit_for:
      - Bridge loans
      - Project finance
      not_fit_for:
      - Standard amortization
      - Principal paydown
    default: standard
  design_decisions:
  - decision: Use numpy-financial for standard amortization
    evidence: ECL/amortization.ipynb:99(pmt)
    rationale: Standard PMT/IPMT/PPMT functions handle annuity calculations correctly
  - decision: Monthly rate = annual_rate/12
    evidence: ECL/amortization.ipynb:99
    rationale: Banking convention for installment loans; monthly compounding period
  - decision: Ending_Balance = balance + cumsum(Principal)
    evidence: ECL/amortization.ipynb:102
    rationale: Principal values are negative; cumulative sum tracks net reduction from original balance
  - decision: Separate abnormal amortization for edge cases
    evidence: ECL/abAmortization.ipynb:1
    rationale: Hybrid loans with inconsistent terms need different calculation logic
  acceptance_hints:
  - Final ending balance equals zero for fully amortizing loans
  - Sum of principal payments equals original loan amount
  - EIR must be expressed as annual rate for pmt but divided by 12 for monthly periods
- id: ecl_calculation
  name: ECL Computation
  order: 9
  responsibility: Calculates Expected Credit Loss as ECL = PD × LGD × EAD, discounted at EIR. Applies
    stage-appropriate PD (12-month for Stage 1, lifetime for Stage 2/3) per IFRS 9 requirements.
  interface:
    inputs: PD term structure, LGD estimates, EAD schedules, staging, discount rates
    outputs: 12-month ECL and Lifetime ECL by account and time bucket
  required_methods:
  - name: ECLLimitLevel_Truncate.ipynb
    description: Main ECL calculation with stage-specific PD application, limit-level aggregation, and
      truncation logic
    evidence: ECL/ECLLimitLevel_Truncate.ipynb:1
  key_behaviors:
  - behavior: Stage-specific PD application
    description: Stage 1 accounts use 12-month PD; Stage 2 and 3 accounts use lifetime PD per IFRS 9.5.5.3
      requirement
    evidence: README.md:19-20
  - behavior: ECL discounted at original EIR
    description: IFRS 9 definition of credit loss uses EIR discounting for present value calculation
    evidence: README.md:24
  - behavior: Unbiased estimates required
    description: Regulatory floors and downturn adjustments must be removed from Basel models for IFRS
      9 compliance
    evidence: README.md:21
  replaceable_points:
  - name: discount_rate
    description: ECL discounting rate affects present value of expected losses
    options:
    - name: EIR
      traits:
      - IFRS 9 compliant
      - Original rate
      - Standard
      fit_for:
      - IFRS 9 reporting
      - General purpose
      not_fit_for:
      - Market-based valuation
      - Fair value disclosure
    - name: risk_free_plus
      traits:
      - Risk-free plus spread
      - Market-based
      - Conservative
      fit_for:
      - Conservative estimates
      - Stress scenarios
      not_fit_for:
      - IFRS 9 compliance
      - Standard reporting
    - name: original_effective
      traits:
      - Effective rate
      - Contractual
      - Simple
      fit_for:
      - Simple implementation
      - Validation
      not_fit_for:
      - Variable rate
      - Complex fee structures
    default: EIR
  - name: probability_weighting
    description: Multi-scenario ECL weighting for macroeconomic scenarios
    options:
    - name: base
      traits:
      - Base case weighting
      - Single scenario
      - Central estimate
      fit_for:
      - Simple reporting
      - Model validation
      not_fit_for:
      - Regulatory submission
      - Comprehensive scenarios
    - name: optimistic
      traits:
      - Optimistic scenarios weighted
      - Best case
      - Lower provisions
      fit_for:
      - Management overlays
      - Upside scenarios
      not_fit_for:
      - Regulatory compliance
      - Conservatism
    - name: downturn
      traits:
      - Downturn scenarios weighted
      - Conservative
      - Higher provisions
      fit_for:
      - Regulatory compliance
      - Conservative provisioning
      not_fit_for:
      - Economic upturn
      - Capital optimization
    default: base
  design_decisions:
  - decision: Stage 1 uses 12M PD, Stage 2/3 uses lifetime PD
    evidence: README.md:19-20
    rationale: IFRS 9.5.5.3 requirement; Stage 1 accounts with low risk use 12-month horizon
  - decision: ECL discounted at original EIR
    evidence: README.md:24
    rationale: IFRS 9 definition of credit loss uses EIR discounting for present value
  - decision: Unbiased estimates required
    evidence: README.md:21
    rationale: Remove floors, downturn adjustments from regulatory models
  acceptance_hints:
  - Stage 1 ECL = PD_12M × LGD × EAD × discount factor
  - Stage 2/3 ECL = Σ(PD_lifetime_t × LGD × EAD_t × discount_factor_t)
  - Final ECL provisions flow to accounting systems for financial reporting
source:
  commit_hash: 0614c825d53ae1293a7f7ed76206b9bcf025ea7d
  extraction_methods:
  - semi_auto
  projects:
  - ifrs9
sop_version: '3.6'
business_decisions:
- id: BD-001
  type: B/RC
  content: Three PD dimensions (unbias/FWL/lifetime) separated for modular validation
  rationale: IFRS9 mandates three-dimensional PD (unbiased through-the-cycle, forward-looking conditional,
    lifetime) for ECL buckets; separation enables independent model validation and regulatory audit trail.
    The separation would not exist without IFRS9 requirement.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-002
  type: M
  content: Survival analysis (Kaplan-Meier) as baseline unbiased PD estimation method
  rationale: Kaplan-Meier survival analysis is a named statistical method that handles right-censored
    data correctly; changing to parametric alternatives (logistic regression, KMV) would alter PD precision
    estimates. This is a mathematical choice backed by survival theory.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
  alternative_considered: transitionMatrix, KMVModel, PDAssumedLGD
- id: BD-003
  type: M/BA
  content: Vasicek single-factor model for forward-looking macro adjustment with Basel rho correlation
  rationale: Vasicek model is a named mathematical model (asymptotic single risk factor); asset correlation
    (rho) encodes market-specific credit cycle assumption. Changing to alternative FWL methods (CCI only,
    time-series clustering) would produce different conditional PD precision. The rho parameter reflects
    Thai market credit cycle volatility assumptions.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
  alternative_considered: CCI-based, timeSeriesKMeans
- id: BD-004
  type: M
  content: Chain Ladder + Gamma distribution fitting for lifetime PD extrapolation beyond observed data
    horizon
  rationale: Chain Ladder (run-off triangles) and Gamma distribution fitting are named actuarial methods;
    they affect marginal PD term structure precision in outer buckets. Nelson-Siegel is an alternative
    curve-fitting method with different tail behavior.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
  alternative_considered: Nelson-Siegel curve fitting
- id: BD-005
  type: M
  content: CHAID decision tree segmentation for portfolio stratification
  rationale: CHAID (Chi-squared Automatic Interaction Detection) is a named statistical method for categorical
    segmentation; affects PD accuracy per segment. Changing segmentation approach would alter PD curves
    for subgroups.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-006
  type: M
  content: LGD expressed as function of EIR for time-value-aligned recovery discounting
  rationale: LGD formula uses EIR for discounting recovery cash flows; this is a mathematical relationship
    that affects present value precision. Changing discount rate would alter LGD and ECL amounts.
  evidence: N/A:0(see_rationale)
  stage: lgd_estimation
- id: BD-007
  type: RC/BA
  content: Indirect costs excluded from LGD calculation per IFRS9 unbias requirement
  rationale: IFRS9 B5.4.1 defines LGD as recovery on exposure excluding indirect costs; this is a regulatory
    mandate. The unbias assumption (removing conservatism buffers) is a separate BA decision that aligns
    with regulatory intent.
  evidence: N/A:0(see_rationale)
  stage: lgd_estimation
- id: BD-008
  type: BA/DK
  content: Downturn LGD regulatory floors removed for unbias ECL calculation
  rationale: Basel IRB uses downturn LGD floors (minimum 20-25%) for capital adequacy; IFRS9 unbias requirement
    mandates removal of these conservatism buffers. This is a market-specific assumption about what constitutes
    unbiased loss estimates.
  evidence: N/A:0(see_rationale)
  stage: lgd_estimation
- id: BD-009
  type: B
  content: EAD module is placeholder - core EAD logic not yet implemented
  rationale: Without EAD, complete ECL calculation is impossible regardless of PD/LGD accuracy. This is
    a missing business-critical module that breaks the end-to-end ECL pipeline.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-010
  type: M
  content: Separate normal vs abnormal amortization logic for ECL time-value calculations
  rationale: Normal amortization uses standard PMT/IPMT/PPMT formulas; abnormal handles variable-rate
    and balloon structures. These are mathematical formulas that affect discount factor precision.
  evidence: N/A:0(see_rationale)
  stage: ecl_calculation
- id: BD-011
  type: B/DK
  content: Hybrid loan with truncate option for revolving-to-term conversion modeling
  rationale: Truncation at conversion point reflects real banking products; this is a market-specific
    feature for Thai banking products. Without it, revolving products would be mis-modeled.
  evidence: N/A:0(see_rationale)
  stage: ecl_calculation
- id: BD-012
  type: T
  content: Dual implementation strategy using Python/pandas for development and SAS for production
  rationale: This is a pure technical infrastructure choice - both implementations compute the same amortization
    schedules. Changing Python to R or SAS to VBA would not affect business output if calculations are
    equivalent.
  evidence: N/A:0(see_rationale)
  stage: ecl_calculation
  alternative_considered: Python-only or SAS-only implementation
- id: BD-013
  type: RC
  content: Three-bucket stage model (Stage 1/2/3) with 12-month ECL vs lifetime ECL allocation
  rationale: 'IFRS9 mandates three stages: Stage 1 (12-month ECL, no SICR), Stage 2 (lifetime ECL, SICR),
    Stage 3 (lifetime ECL, credit-impaired). This is regulatory-mandated and immutable.'
  evidence: N/A:0(see_rationale)
  stage: staging_classification
- id: BD-014
  type: M/BA
  content: Backward transaction analysis for SICR threshold and DPD trigger determination
  rationale: Backward transaction analysis uses historical default rates to determine PD change thresholds;
    this is a statistical/quantitative method affecting SICR trigger precision.
  evidence: N/A:0(see_rationale)
  stage: staging_classification
  alternative_considered: Relative PD change, absolute PD threshold, DPD-based
- id: BD-015
  type: DK/B
  content: BOT (Bank of Thailand) API as authoritative macro data source for forward-looking models
  rationale: Using BOT data is a market-specific knowledge decision (Thailand banking); alternative external
    NPL sources would break CCI calibration. This reflects regulatory-grade data sourcing for Thai market.
  evidence: N/A:0(see_rationale)
  stage: forward_looking_adjustment
- id: BD-016
  type: M/BA
  content: Credit Cycle Index (CCI) as forward-looking proxy mapped to Vasicek rho
  rationale: CCI is a derived market index that proxies systematic credit risk; mapping to Vasicek rho
    is a mathematical transformation. The choice of CCI vs raw macro variables reflects market-specific
    assumption about which index best captures credit cycle.
  evidence: N/A:0(see_rationale)
  stage: forward_looking_adjustment
  alternative_considered: K-means clustered macro, Lasso-selected variables
- id: BD-017
  type: M
  content: Time series K-means clustering for macro scenario grouping with optimal cluster selection
  rationale: K-means clustering is a named unsupervised learning method; affects how macro scenarios are
    grouped. Silhouette analysis determines optimal cluster count - these are mathematical choices affecting
    scenario precision.
  evidence: N/A:0(see_rationale)
  stage: forward_looking_adjustment
- id: BD-018
  type: M/BA
  content: Full regression diagnostic suite (normality, heteroskedasticity, autocorrelation, multicollinearity)
    for FWL model validation
  rationale: Named statistical tests (Jarque-Bera, Breusch-Pagan, Durbin-Watson, VIF) are mathematical
    methods for assumption checking; affects confidence in FWL model precision.
  evidence: N/A:0(see_rationale)
  stage: validation_monitoring
  alternative_considered: Targeted subset of tests
- id: BD-019
  type: M
  content: Cook's Distance for outlier detection in PD model
  rationale: Cook's Distance is a named statistical method for detecting influential outliers; affects
    data quality and PD precision.
  evidence: N/A:0(see_rationale)
  stage: validation_monitoring
- id: BD-020
  type: M
  content: HAC (Newey-West) standard errors for robust inference correcting heteroskedasticity and autocorrelation
  rationale: HAC standard errors are a named statistical method for robust inference; affects coefficient
    standard error precision in FWL regressions.
  evidence: N/A:0(see_rationale)
  stage: validation_monitoring
- id: BD-021
  type: RC
  content: 12-month minimum performance window as cross-module invariant for PD, LGD, and staging
  rationale: 12-month performance window is mandated by IFRS9 for conservative unbias assessment; appears
    identically in survival analysis exclusion, LGD calculation, and staging thresholds.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-022
  type: RC
  content: AGING >= 4 (90+ DPD) as default threshold across PD, LGD, and staging modules
  rationale: 90+ DPD is the regulatory default threshold per CRR Article 178 and Basel guidelines; this
    is a cross-module invariant that defines default status.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-023
  type: RC
  content: EIR (Effective Interest Rate) required for both LGD recovery discounting and ECL discount factors
  rationale: EIR is mandated by IFRS9 for financial instruments; missing or incorrect EIR would invalidate
    both LGD present values and ECL discount factors.
  evidence: N/A:0(see_rationale)
  stage: lgd_estimation
- id: BD-024
  type: T
  content: Open vs Closed recovery path determines LGD calculation horizon
  rationale: Open vs Closed recovery categorization affects monitoring horizon and LGD calculation; Closed
    uses full recovery horizon while Open has truncated monitoring.
  evidence: N/A:0(see_rationale)
  stage: lgd_estimation
- id: BD-025
  type: RC
  content: Stage classification (1/2/3) determines ECL calculation method - Stage 1 uses 12-month amortization
  rationale: Stage 1 requires 12-month amortization window while Stages 2-3 require remaining life; this
    is mandated by IFRS9 impairment framework.
  evidence: N/A:0(see_rationale)
  stage: staging_classification
- id: BD-026
  type: T
  content: Monthly snapshot temporal grain (AS_OF_DATE) as atomic time unit across each modules
  rationale: Monthly snapshots are a data structure choice; sub-monthly reporting would require redesign
    but would not change business ECL output if calculations are equivalent.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-027
  type: T
  content: Forward-looking models (CCI/Vasicek) must execute BEFORE lifetime calibration
  rationale: Pipeline ordering is a computational constraint; reversing order would use uncalibrated PDs
    but would not change business output if correctly reordered.
  evidence: N/A:0(see_rationale)
  stage: forward_looking_adjustment
- id: BD-028
  type: T
  content: Chain Ladder must execute before Gamma Fitting in lifetime extrapolation pipeline
  rationale: Pipeline ordering is a computational constraint; chain ladder stabilizes raw ODR before extrapolation.
    Reversing would extrapolate unstable raw data.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-029
  type: T
  content: shift(-i) look-ahead pattern requires sorted ACCOUNT_ID/AccID + time key before shifting
  rationale: Sort order convention is a pure technical choice; swapping ASC/DESC would produce different
    results but same logical output if consistently applied.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-030
  type: T
  content: dfFlag=0 for non-default, NaN for inactive/writeoff accounts as cross-module convention
  rationale: Default value convention is pure data structure choice; using 1 for writeoff instead of NaN
    would corrupt results but equivalent alternative exists.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-031
  type: T
  content: fillna(1) on cumprod survival calculation shift(1) initializes first-period assumption
  rationale: Fill value convention is a pure technical choice; fillna(0) would corrupt calculations but
    equivalent alternative exists if consistently applied.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-032
  type: M
  content: Transition matrix as universal data structure for PD propagation across PD, LGD, and lifetime
  rationale: Transition matrix multiplication is a named mathematical structure (Markov chain); replacing
    with scalar PD would break lifetime calculations. This affects precision of conditional PD propagation.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-033
  type: B
  content: Segment filter (e.g., 'CU' = Consumer) applied before each PD calculations
  rationale: Segment filtering reflects business requirement for segment-level PD curves; computing without
    filtering would produce incorrect portfolio-level estimates.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-034
  type: B
  content: Account-level granularity (ACCOUNT_ID/AccID) as atomic unit across each modules
  rationale: Account-level granularity reflects business requirement for credit risk tracking; using loan-level
    would lose sub-account correlations.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-035
  type: M/BA
  content: Non-Retail portfolios inherit Reference Row methodology from Retail TTC PD calibration
  rationale: Reference Row methodology is a statistical technique for low-default portfolios; using raw
    NRT counts would produce unstable transition matrices. This affects PD precision for NRT segments.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-036
  type: M
  content: cumprod(1-conPD) with shift(1) as canonical lifetime cumulative survival formula
  rationale: Cumulative survival formula is a mathematical relationship; different cumprod ordering would
    produce incorrect lifetime PD term structure. This affects ECL precision for Stage 2/3.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-037
  type: M/BA
  content: Multiple FWL approaches (simplifiedCCI, full CCI, vasicekBaselRho) converge on conditional
    transition matrix
  rationale: Multiple FWL methods are mathematical approaches that should produce consistent outputs;
    inconsistency would indicate model uncertainty. The convergence assumption reflects market knowledge
    about credit cycle dynamics.
  evidence: N/A:0(see_rationale)
  stage: forward_looking_adjustment
- id: BD-038
  type: M
  content: Nelson-Siegel curve fitting as alternative to Gamma fitting for lifetime marginal PD extrapolation
  rationale: Nelson-Siegel is a named mathematical method for yield curve/PD extrapolation; produces different
    tail behavior than Gamma. This affects lifetime PD precision in outer buckets.
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-039
  type: T
  content: Entire codebase is Jupyter notebooks without Python source files
  rationale: Notebook-only architecture is a pure technical choice; production systems typically require
    packaged Python modules. This affects maintainability but not calculation accuracy.
  evidence: N/A:0(see_rationale)
  stage: global
- id: BD-040
  type: RC
  content: ECL = PD × LGD × EAD formula as core impairment calculation
  rationale: IFRS 9 regulatory standard mandates this specific formula structure for expected credit loss
    calculation. The three-component multiplicative model reflects the conditional independence of default,
    loss severity, and exposure at time of default. This formula is non-negotiable under IFRS 9 compliance
    and any deviation would result in regulatory non-compliance.
  evidence: N/A:0(see_rationale)
  stage: ecl_calculation
  alternative_considered: Simplified provision method
- id: BD-041
  type: RC
  content: Discount cash flows at Effective Interest Rate (EIR) for ECL measurement
  rationale: IFRS 9 time value of money requirement mandates EIR discounting to present value. Using contractual
    rate instead would overstate ECL for performing loans. EIR is calculated at origination based on contractual
    cash flows and represents the rate that exactly discounts estimated future cash receipts to the carrying
    amount.
  evidence: N/A:0(see_rationale)
  stage: ecl_calculation
  alternative_considered: Contractual interest rate
- id: BD-042
  type: RC
  content: 12-month ECL applied initially, switch to Lifetime ECL upon significant credit increase
  rationale: IFRS 9 para 5.5.3 establishes the three-stage classification framework. Initial recognition
    starts with Stage 1 (12-month ECL) with mandatory transition to Stage 2 (lifetime ECL) when credit
    risk increases significantly. Always using lifetime ECL would over-provision performing loans and
    violate the proportionality principle.
  evidence: N/A:0(see_rationale)
  stage: ecl_calculation
  alternative_considered: Always Lifetime ECL
- id: BD-043
  type: B/BA
  content: Hybrid loan with truncate option - convert between revolving and term loan
  rationale: Hybrid loan product design allows conversion between revolving credit facility and term loan
    based on remaining tenor thresholds. This business rule affects amortization schedule calculation
    and staging triggers. The product flexibility is a commercial decision but impacts risk measurement
    parameters and ECL computation methodology.
  evidence: N/A:0(see_rationale)
  stage: ecl_calculation
  alternative_considered: Fixed loan type
- id: BD-044
  type: B/BA
  content: Stage 1 for term loans not closing before 12 months
  rationale: Implementation choice for staging threshold based on loan maturity profile. Term loans with
    less than 12 months to maturity receive different staging treatment than revolving facilities. This
    reflects the shorter remaining lifetime horizon for maturing exposures and aligns with IFRS 9 requirement
    to measure lifetime ECL based on remaining contractual period.
  evidence: N/A:0(see_rationale)
  stage: staging_classification
  alternative_considered: Stage 2 from origination
- id: BD-045
  type: M/BA
  content: LGD = Flow Rate(Closed) × Expected(Loss Rate|Closed) + Flow Rate(Open) × Expected(Loss Rate|Open)
  rationale: Mathematical formula for calculating conditional expected loss given default across recovery
    pathway segmentation. The weighted average approach reflects that accounts can follow either closed
    (receivership completed) or open (ongoing recovery) pathways. Flow rates serve as pathway probabilities
    conditioning the loss rate expectations.
  evidence: N/A:0(see_rationale)
  stage: lgd_estimation
  alternative_considered: Single pathway LGD
- id: BD-046
  type: RC
  content: Multiple defaults considered - each 12-month period treated as independent default
  rationale: Regulatory requirement under IFRS 9 and CRR Art. 178 mandates tracking of multiple default
    events over the account lifecycle. Treating each 12-month period as independent reflects the accounting
    period basis for ECL measurement and ensures each loss events are captured for provisioning purposes.
  evidence: N/A:0(see_rationale)
  stage: lgd_estimation
  alternative_considered: Single default event
- id: BD-047
  type: B/BA
  content: 'Segmentation by recovery pathway: Closed vs Open, Existing-Default vs Non-Default'
  rationale: Business decision to segment LGD calculation by recovery pathway reflects operational reality
    that closed accounts (completed receivership) and open accounts (ongoing recovery) have materially
    different loss characteristics. This segmentation is supported by empirical evidence showing different
    recovery timing and amount distributions.
  evidence: N/A:0(see_rationale)
  stage: lgd_estimation
  alternative_considered: Single pool approach
- id: BD-048
