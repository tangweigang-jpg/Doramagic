    calculation cannot complete. BD-039 (notebook-only architecture) means no production-ready Python
    modules exist for deployment. Even if EAD were implemented in notebooks, extracting and packaging
    it for production SAS/Python dual-implementation (BD-012) would require significant refactoring. The
    cascade: (1) EAD missing → ECL incomplete, (2) Notebook-only → cannot deploy to production, (3) Even
    if EAD added to notebooks → still cannot deploy. Both gaps must be fixed together for any production
    capability.'
  evidence: N/A:0(see_rationale)
