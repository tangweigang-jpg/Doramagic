- id: BD-103
  type: RC
  content: 'INTERACTION: [BD-057] × [BD-062] × [BD-022] × [BD-013] → Risk cascade: Default definition
    at 90+ DPD gates each downstream staging and ECL calculation'
  rationale: 'RISK CASCADE: This creates a mandatory ordering dependency for every account. (1) Accounts
    at 90+ DPD enter Stage 3 via BD-057/BD-022. (2) Accounts at 30-89 DPD enter Stage 2 via BD-062. (3)
    Every other accounts remain Stage 1 via BD-013. The cascade means: if default threshold (BD-057) changes
    from 90+ to 60+ or 180+ DPD, it invalidates BD-022 cross-module invariant AND BD-062 Stage 2 trigger
    AND BD-013 staging classification simultaneously. Every module (PD, LGD, ECL) that uses the default
    flag must be recalibrated. This is a single-point-of-change that propagates system-wide.'
  evidence: N/A:0(see_rationale)
  stage: staging_classification
- id: BD-104
  type: T
  content: 'INTERACTION: [BD-029] × [BD-036] → Hidden dependency: shift(-i) look-ahead requires sorted
    ACCOUNT_ID/AccID + time key, which cumprod survival formula depends on'
  rationale: 'HIDDEN DEPENDENCY: BD-036 (cumprod(1-conPD) with shift(1)) is the canonical lifetime survival
    formula used in BD-040 ECL calculation. However, BD-036 silently depends on BD-029 (correct sort order
    of ACCOUNT_ID + AS_OF_DATE) for temporal alignment. If accounts are not sorted before shifting, the
    shift(-i) look-ahead pattern produces misaligned default flags and aging columns. This corrupts cumulative
    survival calculations and ultimately ECL amounts. The dependency is hidden because the survival formula
    does not explicitly validate sort order - incorrect results would be silently produced.'
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-105
  type: M/BA
  content: 'INTERACTION: [BD-088] × [BD-083] → Contradiction: ODR calibration weights by sample size (n),
    but PD aggregation weights by exposure counts'
  rationale: 'CONTRADICTION: These two aggregation decisions use inconsistent weighting schemes. BD-088
    (externalMatrix.ipynb:2292-2293) uses numpy.average with weights=n (sample size) for ODR calibration,
    assuming larger cohorts are more representative. BD-083 (chainLadder.ipynb:518-530) uses numpy.average
    with weights=exposure_count for PD aggregation, assuming larger exposure accounts are more important.
    The inconsistency means an account with small exposure but large sample count gets higher weight in
    ODR calibration but lower weight in PD aggregation. For large portfolios, this could cause ECL misstatement
    if small-exposure accounts with high default counts drive ODR calibration but are underweighted in
    final ECL.'
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
- id: BD-106
  type: M/BA
  content: 'INTERACTION: [BD-069] × [BD-027] × [BD-085] → Risk cascade: CCI macro transformation must
    execute before lifetime calibration which feeds into macro-overlay formula'
  rationale: 'RISK CASCADE: Three decisions create an unbroken macro-adjustment pipeline. (1) BD-069 aggregates
    raw macro variables into Credit Cycle Index. (2) BD-027 mandates CCI/Vasicek execution before lifetime
    calibration. (3) BD-085 applies macro-overlay formula: logit(condPD) + beta*x - logit(TTC_PD) in logit
    space. If BD-069 produces CCI values outside expected range, BD-085 macro-overlay produces unreasonable
    PIT PD adjustments. If BD-027 ordering is violated, uncalibrated PDs enter the macro-overlay. If BD-085
    beta coefficients are miscalibrated, entire forward-looking ECL is overstated or understated. Each
    step gates the next - any failure cascades to incorrect Stage 2/3 ECL.'
  evidence: N/A:0(see_rationale)
  stage: forward_looking_adjustment
- id: BD-107
  type: B/BA/M
  content: 'INTERACTION: [BD-051] × [BD-007] × [BD-008] × [BD-003] → Amplification: Forward-looking unbias
    requirement combines with LGD unbias adjustments and Vasicek PIT model to compound conservatism removal'
  rationale: 'AMPLIFICATION: Multiple unbias decisions across PD and LGD modules compound to materially
    lower ECL vs Basel regulatory floors. (1) BD-051 PIT PD requirement removes TTC averaging conservatism.
    (2) BD-003 Vasicek model provides mathematical framework for forward-looking adjustment. (3) BD-007
    excludes indirect costs from LGD (Basel includes them). (4) BD-008 removes downturn LGD floors (Basel
    mandates 20-25% minimum). Combined: PD is conditionally adjusted upward in stress but unbias floors
    removed; LGD excludes operational costs and downturn buffers. The net effect is ECL that may be materially
    lower than Basel IRB provisions, creating regulatory capital implications. Amplification occurs because
    each unbias decision independently reduces ECL, and their multiplicative combination (PD×LGD×EAD)
    compounds the understatement risk.'
