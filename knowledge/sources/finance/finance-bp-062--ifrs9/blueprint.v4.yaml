applicability:
  domain: finance
  task_type: Expected Credit Loss (ECL) calculation for loan portfolios
  description: IFRS 9 impairment model that calculates 12-month and lifetime expected credit losses using
    probability of default (PD), loss given default (LGD), and exposure at default (EAD) components with
    forward-looking macroeconomic adjustments
  prerequisites: Understanding of IFRS 9 accounting standard, credit risk concepts (PD/LGD/EAD), pandas/Python
    for data processing, time-series analysis
  not_suitable_for: Non-credit financial instruments, regulatory capital calculations (uses unbiased IFRS
    9 estimates vs Basel regulatory values), non-financial asset impairment
global_contracts:
- contract: Every DataFrames use ACCOUNT_ID or AccountID as primary key for longitudinal tracking
  evidence: PD/transitionMatrix.ipynb:127(groupby AccID)
- contract: Monthkey or AS_OF_DATE used as temporal index for time-series operations
  evidence: PD/transitionMatrix.ipynb:127(sort_values Monthkey)
- contract: 'Aging codes: 0=current, 1/2/3=delinquency buckets, 4=default, -1=closed'
  evidence: PD/transitionMatrix.ipynb:111(Aging eq -1)
- contract: GroupBy operations precede shift operations to prevent cross-account leakage
  evidence: PD/transitionMatrix.ipynb:133(groupby shift)
- contract: Every monetary values use float64 for precision in EIR calculations
  evidence: ECL/amortization.ipynb:97(float64)
- contract: Stage determination MUST precede PD/LGD/EAD computation
  evidence: README.md:19-20 (DEEP-001)
- contract: Cumulative PD must be computed BEFORE marginal PD via diff() operation
  evidence: PD/lifetimeCalibration.ipynb:269-274 (DEEP-003)
- contract: Forward-looking adjustment (CCI) must be applied AFTER TTC PD calibration
  evidence: PD/cci.ipynb, PD/simplifiedCCI.ipynb (DEEP-009)
- contract: Amortization schedules use EIR as discount rate, not market rate
  evidence: ECL/amortization.ipynb:93-103 (DEEP-005)
- contract: Univariate analysis filtering must precede multivariate analysis
  evidence: PD/univariateAnalysis1.ipynb (DEEP-015)
