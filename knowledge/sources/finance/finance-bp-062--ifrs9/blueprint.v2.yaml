id: finance-bp-062
name: IFRS 9 Impairment Model
stages:
- id: transaction_staging
  name: Transaction Staging
  order: 1
  responsibility: Processes raw transaction data into time-series format for credit analysis. Creates forward-looking 12-month performance windows and backward-looking aging buckets to establish the foundation
    for all downstream PD calculations.
  interface:
    inputs: Raw parquet transaction files with AccountID, Status, Monthkey, Aging, writeOff flags
    outputs: Processed transaction DataFrame with 12-month forward windows and status transitions
  required_methods:
  - name: backwardTransaction.ipynb
    description: Main notebook processing backward transaction data for staging criteria and historical aging shifts
    evidence: Staging/backwardTransaction.ipynb:1
  key_behaviors:
  - behavior: Entity-level isolation via groupby before shift
    description: All shift operations group by AccountID first to ensure temporal shifts stay within each account's timeline and do not cross account boundaries
    evidence: PD/transitionMatrix.ipynb:133(groupby)
  - behavior: Forward window creation via negative shift
    description: Uses pandas shift(-i) with negative periods to create forward-looking columns for 12-month performance tracking
    evidence: PD/transitionMatrix.ipynb:133(shift)
  - behavior: Account exclusion based on minimum observation window
    description: Excludes accounts with less than 12-month observation window (maxMonthkey-12) to ensure reliable 12M PD calculation
    evidence: PD/transitionMatrix.ipynb:196(query)
  replaceable_points:
  - name: lag_period
    description: Forward performance window length determines how many periods ahead to track status
    options:
    - name: '12'
      traits:
      - 12-month standard
      - IFRS 9 aligned
      - common Basel horizon
      fit_for:
      - Standard retail portfolios
      - Annual reporting cycles
      not_fit_for:
      - Short-term facilities
      - Trade finance
    - name: '24'
      traits:
      - 24-month extended
      - Broader coverage
      - Higher data requirements
      fit_for:
      - Commercial real estate
      - Long-term project finance
      not_fit_for:
      - Revolving credit
      - High turnover portfolios
    - name: '36'
      traits:
      - 36-month long-term
      - Maximum coverage
      - Significant data history required
      fit_for:
      - Mortgage portfolios
      - Infrastructure lending
      not_fit_for:
      - Consumer lending
      - Limited history portfolios
    default: '12'
  - name: exclusion_rules
    description: Account filtering criteria for minimum observation requirements
    options:
    - name: standard
      traits:
      - 12-month minimum
      - Default IFRS 9 criteria
      fit_for:
      - Most retail portfolios
      - Standard credit products
      not_fit_for:
      - New originations
      - Thin file accounts
    - name: strict
      traits:
      - 24-month minimum
      - More conservative filtering
      fit_for:
      - High-risk portfolios
      - Regulatory scrutiny
      not_fit_for:
      - New portfolios
      - Rapidly growing books
    - name: relaxed
      traits:
      - 6-month minimum
      - Inclusive filtering
      fit_for:
      - New portfolios
      - Short-track accounts
      not_fit_for:
      - Historical calibration
      - Conservative estimation
    default: standard
  design_decisions:
  - decision: Use .shift(-i) for forward window creation
    evidence: PD/transitionMatrix.ipynb:133(shift)
    rationale: pandas shift with negative periods creates forward-looking columns for 12M performance tracking
  - decision: Group by AccountID before shifting
    evidence: PD/transitionMatrix.ipynb:133(groupby)
    rationale: Ensures shifts stay within each account's timeline, not crossing account boundaries
  - decision: Exclusion rules filter maxMonthkey-12
    evidence: PD/transitionMatrix.ipynb:196(query)
    rationale: Requires minimum 12-month observation window to calculate reliable 12M PD
  acceptance_hints:
  - All accounts have complete 12-month forward windows with no cross-account contamination
  - Shift operations preserve temporal ordering within each AccountID group
  - Excluded accounts are properly documented and don't bias the calibration sample
- id: transition_matrix
  name: Transition Matrix Estimation
  order: 2
  responsibility: Builds migration/transition matrices showing probability of accounts moving between aging states (0=current, 1-3=delinquency, 4=default) over performance periods, serving as the foundation
    for conditional PD calculations.
  interface:
    inputs: Processed transaction data with 12MStatus flags and Segment groupings
    outputs: Transition probability matrix by Segment x Aging bucket
  required_methods:
  - name: transitionMatrix.ipynb
    description: Pivot table construction for count matrices and transition probability calculations
    evidence: PD/transitionMatrix.ipynb:370
  - name: NRTMatrix.ipynb
    description: Non-retail transition matrix construction with reference row handling
    evidence: PD/NRTMatrix.ipynb:1
  key_behaviors:
  - behavior: Worst-status capture via max aggregation
    description: 12MStatus uses max(aging) across the 12-month window to capture any default event during the performance period
    evidence: PD/transitionMatrix.ipynb:165(max)
  - behavior: Censored loan handling with last known status
    description: Accounts still performing at observation end have last known status propagated forward using mapping
    evidence: PD/transitionMatrix.ipynb:181(map)
  - behavior: Pivot table aggregation for count matrices
    description: Uses pivot_table with aggfunc=sum to aggregate counts across accounts per Segment/Aging combination
    evidence: PD/transitionMatrix.ipynb:371(pivot)
  replaceable_points:
  - name: status_mapping
    description: How aging states map to final status determines PD definition
    options:
    - name: ever_default
      traits:
      - Conservative
      - Captures any default event
      fit_for:
      - Regulatory reporting
      - Conservative provisioning
      not_fit_for:
      - Optimistic scenarios
      - Low-default portfolios
    - name: max_status
      traits:
      - Moderate
      - Uses worst observed status
      fit_for:
      - Standard IFRS 9
      - General purpose
      not_fit_for:
      - Non-performing loan analysis
    - name: first_default
      traits:
      - Moderate
      - Captures first default event
      fit_for:
      - Default timing analysis
      - Recovery analysis
      not_fit_for:
      - Aggregate default rates
    default: ever_default
  - name: matrix_normalization
    description: Row vs column normalization affects probability interpretation
    options:
    - name: row
      traits:
      - From-state normalization
      - Most common in credit risk
      fit_for:
      - Migration probability interpretation
      - Standard credit risk models
      not_fit_for:
      - Flow analysis
      - Inventory models
    - name: column
      traits:
      - To-state normalization
      - Useful for flows
      fit_for:
      - Flow analysis
      - Entry/exit analysis
      not_fit_for:
      - Migration probability interpretation
    - name: double
      traits:
      - Both normalizations
      - Comprehensive view
      fit_for:
      - Validation purposes
      - Model comparison
      not_fit_for:
      - Production systems
      - Simple interpretation
    default: row
  design_decisions:
  - decision: Status mapping uses max(axis=1) for 12M status
    evidence: PD/transitionMatrix.ipynb:165(max)
    rationale: Takes worst status observed in 12-month window; 12MStatus=max(aging) captures any default during window
  - decision: Fill with lastStatus for censored performing loans
    evidence: PD/transitionMatrix.ipynb:181(map)
    rationale: Accounts still performing at observation end need last known status propagated
  - decision: Use pivot_table with aggfunc=sum for matrix
    evidence: PD/transitionMatrix.ipynb:371(pivot)
    rationale: Aggregates counts across accounts per Segment/Aging/Aging12Adj combination
  acceptance_hints:
  - Transition matrices are row-stochastic (rows sum to 1.0)
  - Default state (4) is absorbing (100% self-transition or exit to closure)
  - Matrix multiplication produces valid lifetime PD estimates
- id: survival_analysis
  name: Survival Analysis for PD
  order: 3
  responsibility: Non-parametric survival analysis to estimate marginal and conditional PD term structures from historical cohort data, providing unbiased 12-month PD estimates that form the TTC baseline.
  interface:
    inputs: Cohort transaction data with dfFlag for default events and time-to-event information
    outputs: Lifetime marginal PD curves by segment
  required_methods:
  - name: survivalAnalysis.ipynb
    description: Forward survival computation using shift operations for survival probability estimation
    evidence: PD/survivalAnalysis.ipynb:141
  - name: lifetimeCalibration.ipynb
    description: Marginal PD calculation from conditional PD using survival function approach
    evidence: PD/lifetimeCalibration.ipynb:274
  key_behaviors:
  - behavior: Marginal PD via conditional PD times survival to period t-1
    description: Marginal PD at period t = conditional PD at t * survival probability to t-1, calculated via cumPD.shift(1)
    evidence: PD/lifetimeCalibration.ipynb:274(shift)
  - behavior: Lifetime PD via survival function product
    description: Lifetime PD = 1 - product of (1 - conditional PDs); standard survival function approach using cumprod
    evidence: PD/lifetimeCalibration.ipynb:286(cumprod)
  - behavior: Numerical calibration using fsolve
    description: Root-finding to calibrate lifetime curves to observed central tendency when analytical solutions unavailable
    evidence: PD/lifetimeCalibration.ipynb:58(fsolve)
  replaceable_points:
  - name: survival_function
    description: Method for survival probability estimation affects PD precision
    options:
    - name: manual
      traits:
      - Custom implementation
      - Full control
      - Requires validation
      fit_for:
      - Research
      - Custom distributions
      - Audited methodology
      not_fit_for:
      - Quick implementation
      - Standard reporting
    - name: lifelines_km
      traits:
      - Kaplan-Meier estimator
      - Industry standard
      - Well-tested
      fit_for:
      - Production systems
      - Regulatory acceptance
      not_fit_for:
      - Censored data with covariates
      - Complex survival patterns
    - name: numpy
      traits:
      - Vectorized numpy
      - High performance
      - Basic survival
      fit_for:
      - Large datasets
      - Simple survival patterns
      not_fit_for:
      - Censored data
      - Complex survival
    default: manual
  - name: calibration_method
    description: Lifetime calibration approach for fitting curves to observed data
    options:
    - name: fsolve
      traits:
      - Root-finding
      - Fast convergence
      - Single solution
      fit_for:
      - Standard calibration
      - Production use
      not_fit_for:
      - Multiple solutions
      - Non-convex problems
    - name: scipy_minimize
      traits:
      - Optimization-based
      - Flexible
      - Multiple local minima
      fit_for:
      - Complex calibrations
      - Multiple optima
      not_fit_for:
      - Simple calibrations
      - Speed requirements
    - name: grid_search
      traits:
      - Exhaustive search
      - Robust
      - Computationally expensive
      fit_for:
      - Small parameter spaces
      - Robustness testing
      not_fit_for:
      - Large parameter spaces
      - Production calibration
    default: fsolve
  design_decisions:
  - decision: cumPD.shift(1) for marginal PD calculation
    evidence: PD/lifetimeCalibration.ipynb:274(shift)
    rationale: Marginal PD at period t = conditional PD at t * survival probability to t-1
  - decision: conPD * np.cumprod(1 - conPD) pattern
    evidence: PD/lifetimeCalibration.ipynb:286(cumprod)
    rationale: Lifetime PD = 1 - product of (1 - conditional PDs); standard survival function approach
  - decision: Use fsolve for lifetime calibration
    evidence: PD/lifetimeCalibration.ipynb:58(fsolve)
    rationale: Numerical root-finding to calibrate lifetime curves to observed central tendency
  acceptance_hints:
  - Marginal PDs are non-negative and decrease over time (survival effect)
  - Cumulative PD approaches 1.0 as time horizon extends
  - Calibration residuals are within acceptable tolerance
- id: forward_looking_adjustment
  name: Forward-Looking PD Adjustment
  order: 4
  responsibility: Incorporates macroeconomic variables (CCI, macro factors) to create Point-in-Time (PIT) PD from Through-the-Cycle (TTC) estimates, ensuring IFRS 9 forward-looking requirement.
  interface:
    inputs: TTC PD curves, macroeconomic indicator time series (CCI, NPL ratio)
    outputs: PIT PD term structure adjusted for forward-looking macro expectations
  required_methods:
  - name: cci.ipynb
    description: Credit Cycle Index calculation with survival adjustment for macro-PD linkage
    evidence: PD/cci.ipynb:190
  - name: vasicekTransitionMatrix.ipynb
    description: Vasicek single-factor model for conditional transition matrices under macro stress
    evidence: PD/vasicekTransitionMatrix.ipynb:1
  - name: simplifiedCCI.ipynb
    description: Simplified CCI with single rho parameter for systematic risk loading
    evidence: PD/simplifiedCCI.ipynb:792
  key_behaviors:
  - behavior: CCI incorporates lagged survival rates
    description: Credit cycle index uses survive shift(1) with fillna(0) to create prior period reference for macro linkage
    evidence: PD/simplifiedCCI.ipynb:792(shift)
  - behavior: Vasicek single-factor model for systematic correlation
    description: Basel asset correlation (rho) provides systematic factor loading for macro stress scenarios
    evidence: PD/vasicekBaselRho.ipynb:1
  - behavior: Efficient groupby without sorting
    description: Group by Aging with sort=False to avoid expensive sort operations, assuming data already ordered by time
    evidence: PD/cci.ipynb:190(groupby)
  replaceable_points:
  - name: macro_model
    description: Macro variable integration method affects PIT adjustment granularity
    options:
    - name: CCI
      traits:
      - Credit Cycle Index
      - Composite indicator
      - Sector-specific
      fit_for:
      - Standard IFRS 9
      - Multi-sector portfolios
      not_fit_for:
      - Single-factor models
      - Regulatory stress testing
    - name: vasicek
      traits:
      - Single-factor Gaussian
      - Regulatory aligned
      - Conditional PD
      fit_for:
      - Regulatory capital alignment
      - Stress testing
      not_fit_for:
      - Multi-factor dependencies
      - Tail dependence
    - name: regression
      traits:
      - Statistical regression
      - Data-driven
      - Explainable
      fit_for:
      - Economic research
      - Variable selection
      not_fit_for:
      - Real-time updates
      - Non-linear relationships
    default: CCI
  - name: correlation_parameter
    description: Systematic risk factor loading determines portfolio correlation
    options:
    - name: basel_rho
      traits:
      - Basel regulatory values
      - Product-based
      - Validated
      fit_for:
      - Regulatory alignment
      - Capital calculation
      not_fit_for:
      - Internal model validation
      - Portfolio-specific correlation
    - name: calibrated_rho
      traits:
      - Internal calibration
      - Portfolio-specific
      - Data-driven
      fit_for:
      - Internal models
      - Peer comparison
      not_fit_for:
      - Regulatory submission
      - Quick implementation
    - name: historical
      traits:
      - Historical estimation
      - Observable correlation
      - Retrospective
      fit_for:
      - Backtesting
      - Model validation
      not_fit_for:
      - Forward-looking scenarios
      - New portfolios
    default: basel_rho
  design_decisions:
  - decision: CCI uses survive shift(1) with fillna(0)
    evidence: PD/simplifiedCCI.ipynb:792(shift)
    rationale: Credit cycle index incorporates lagged survival rates; shift(1) creates prior period reference
  - decision: Vasicek single-factor model for rho
    evidence: PD/vasicekBaselRho.ipynb:1
    rationale: Basel asset correlation provides systematic factor loading for macro stress
  - decision: Group by Aging with sort=False for efficiency
    evidence: PD/cci.ipynb:190(groupby)
    rationale: Avoids expensive sort operation; assumes data already ordered by time
  acceptance_hints:
  - PIT PDs are higher than TTC in downturn scenarios and lower in upturns
  - CCI values move counter-cyclically with credit conditions
  - Forward-looking adjustment is applied AFTER TTC PD calibration (DEEP-009 invariant)
- id: lgd_estimation
  name: LGD Model Estimation
  order: 5
  responsibility: Estimates Loss Given Default using recovery data with EIR discounting. Models include direct cost but exclude indirect costs per IFRS 9 unbias requirement.
  interface:
    inputs: Recovery amounts, direct costs, EIR, aging flags, ACCOUNT_ID time series
    outputs: Unbiased LGD estimates by segment and time-to-recovery
  required_methods:
  - name: LGDFunctionModel.ipynb
    description: Multi-period recovery projection with EIR discounting for present value calculation
    evidence: LGD/LGDFunctionModel.ipynb:2019
  key_behaviors:
  - behavior: EIR discounting for IFRS 9 compliance
    description: IFRS 9 requires discounting recovery cash flows at original EIR to get present value of expected recoveries
    evidence: LGD/LGDFunctionModel.ipynb:2019(EIR)
  - behavior: Indirect costs excluded per IFRS 9 unbias requirement
    description: IFRS 9 requires unbiased LGD estimates; indirect costs excluded from regulatory LGD but not Basel LGD
    evidence: LGD/README.md:22
  - behavior: Account-level recovery tracking via groupby shift
    description: Each account's recovery timeline tracked separately via groupby shift operations on ACCOUNT_ID
    evidence: LGD/LGDFunctionModel.ipynb:463(shift)
  replaceable_points:
  - name: lgd_definition
    description: LGD calculation basis determines recovery measurement approach
    options:
    - name: workout
      traits:
      - Workout-based
      - Internal data
      - Bank-specific
      fit_for:
      - Banks with workout operations
      - Collateral-heavy portfolios
      not_fit_for:
      - Trading book
      - Market-based recoveries
    - name: market
      traits:
      - Market price based
      - Observable prices
      - Mark-to-market
      fit_for:
      - Trading portfolios
      - Traded debt instruments
      not_fit_for:
      - Illiquid positions
      - Workout-intensive portfolios
    - name: hybrid
      traits:
      - Combination approach
      - Blend of methods
      - Flexible
      fit_for:
      - Mixed portfolios
      - Best practice
      not_fit_for:
      - Simple requirements
      - Regulatory simplicity
    default: workout
  - name: discount_method
    description: Discount rate selection affects LGD present value calculation
    options:
    - name: EIR
      traits:
      - IFRS 9 compliant
      - Contractual rate
      - Original EIR
      fit_for:
      - IFRS 9 reporting
      - General purpose
      not_fit_for:
      - Market-based valuation
      - Fair value disclosure
    - name: risk_free
      traits:
      - Government yield
      - No credit spread
      - Conservative
      fit_for:
      - Conservative estimates
      - Regulatory comparisons
      not_fit_for:
      - IFRS 9 compliance
      - Economic value
    - name: original_rate
      traits:
      - Contractual rate
      - Similar to EIR
      - Simple
      fit_for:
      - Simple implementation
      - Validation purposes
      not_fit_for:
      - Complex fee structures
      - Variable rate loans
    default: EIR
  design_decisions:
  - decision: EIR discounting required per IFRS 9
    evidence: LGD/LGDFunctionModel.ipynb:2019(EIR)
    rationale: IFRS 9 requires discounting recovery cash flows at original EIR to get present value
  - decision: Exclude indirect costs from LGD
    evidence: LGD/README.md:22
    rationale: IFRS 9 unbias requirement; indirect costs excluded from regulatory LGD but not IFRS 9 LGD
  - decision: Shift by ACCOUNT_ID for recovery tracking
    evidence: LGD/LGDFunctionModel.ipynb:463(shift)
    rationale: Each account's recovery timeline tracked separately via groupby shift operations
  acceptance_hints:
  - LGD values are between 0% and 100%
  - EIR discounting produces lower LGD than undiscounted for long recovery periods
  - Unbiased LGD (excluding indirect costs) is lower than regulatory LGD
- id: ead_estimation
  name: Exposure at Default (EAD) Estimation
  order: 6
  responsibility: Calculates outstanding balance at default, accounting for limit utilization and drawdown patterns for revolving facilities and hybrid loan structures.
  interface:
    inputs: Account limits, outstanding balances, utilization history by ACCOUNT_ID
    outputs: EAD estimates by account and time bucket
  required_methods:
  - name: ECLLimitLevel_Truncate.ipynb
    description: Limit utilization with cumsum shift for available balance calculation and EAD projection
    evidence: ECL/ECLLimitLevel_Truncate.ipynb:6119
  key_behaviors:
  - behavior: Running limit calculation via cumsum.shift().fillna(0)
    description: Available limit accumulates installments paid; shift aligns with period boundaries for EAD tracking
    evidence: ECL/ECLLimitLevel_Truncate.ipynb:6119(shift)
  - behavior: Hybrid loan handling for TL/RP conversion
    description: Accounts can convert between term loan and revolving; limit/truncate logic varies by product type
    evidence: ECL/ECLLimitLevel_Truncate.ipynb:6119
  - behavior: Hierarchical LimitID vs AccountID structure
    description: One limit can cover multiple accounts; hierarchical structure needed for consolidated EAD calculation
    evidence: ECL/ECLLimitLevel_Truncate.ipynb:76
  replaceable_points:
  - name: ead_model
    description: EAD calculation method determines how undrawn amounts are treated
    options:
    - name: ccf
      traits:
      - Credit Conversion Factor
      - Regulatory aligned
      - Drawdown estimate
      fit_for:
      - Revolving facilities
      - Regulatory reporting
      not_fit_for:
      - Term loans
      - Fixed exposure instruments
    - name: fixed_ratio
      traits:
      - Fixed percentage
      - Simple
      - Conservative
      fit_for:
      - Limited data
      - Quick implementation
      not_fit_for:
      - Revolving facilities
      - Variable utilization
    - name: historical
      traits:
      - Historical averages
      - Data-driven
      - Product-specific
      fit_for:
      - Mature portfolios
      - Validation purposes
      not_fit_for:
      - New products
      - Rapidly changing portfolios
    default: ccf
  - name: limit_treatment
    description: How unused limits are treated for revolving exposure
    options:
    - name: truncate
      traits:
      - Cap at limit
      - Standard Basel
      - Conservative
      fit_for:
      - Standard revolving
      - Regulatory alignment
      not_fit_for:
      - Over-limit facilities
      - Soft limits
    - name: hybrid
      traits:
      - Adaptive treatment
      - Product-specific
      - Flexible
      fit_for:
      - Mixed portfolios
      - Custom implementations
      not_fit_for:
      - Simple requirements
      - Regulatory simplicity
    - name: term_only
      traits:
      - No revolving component
      - Simple
      - No CCF
      fit_for:
      - Term loans only
      - Simple portfolios
      not_fit_for:
      - Revolving facilities
      - Credit cards
    default: truncate
  design_decisions:
  - decision: cumsum.shift().fillna(0) for running limit
    evidence: ECL/ECLLimitLevel_Truncate.ipynb:6119(shift)
    rationale: Available limit accumulates installments paid; shift aligns with period boundaries
  - decision: Hybrid loan handling (TL/RP conversion)
    evidence: ECL/ECLLimitLevel_Truncate.ipynb:6119
    rationale: Accounts can convert between term loan and revolving; limit/truncate logic varies
  - decision: Separate LimitID vs AccountID tracking
    evidence: ECL/ECLLimitLevel_Truncate.ipynb:76
    rationale: One limit can cover multiple accounts; need hierarchical structure for EAD
  acceptance_hints:
  - EAD does not exceed committed limit for revolving facilities
  - Hybrid loan conversions are properly tracked across product types
  - EAD for term loans equals outstanding balance (no undrawn component)
- id: staging_classification
  name: IFRS 9 Staging Classification
  order: 7
  responsibility: Classifies accounts into Stage 1 (12-month ECL), Stage 2 (lifetime ECL), or Stage 3 (credit-impaired) based on SICR (Significant Increase in Credit Risk) criteria.
  interface:
    inputs: Account IDs, aging status, historical PDs, macro conditions
    outputs: Stage assignment (1, 2, or 3) per account per reporting date
  required_methods:
  - name: backwardTransaction.ipynb
    description: Backward-looking aging shift for staging historical assessment and bucket-based staging criteria
    evidence: Staging/backwardTransaction.ipynb:150,205
  key_behaviors:
  - behavior: Backward shift for historical staging assessment
    description: Staging at time t requires knowing status at t-1, t-2 for SICR assessment using backward shift operations
    evidence: Staging/backwardTransaction.ipynb:150(shift)
  - behavior: Bucket-based staging thresholds via aging migration
    description: SICR determined by bucket migration (0->1 triggers stage 2, 4 triggers stage 3) for objective classification
    evidence: Staging/backwardTransaction.ipynb:205
  - behavior: 30-day past due as rebuttable presumption backstop
    description: IFRS 9 allows 30dpd as rebuttable presumption for SICR determination if not rebutted with supporting analysis
    evidence: README.md:19
  replaceable_points:
  - name: sicr_method
    description: SICR assessment method determines how credit risk increase is measured
    options:
    - name: relative
      traits:
      - PD ratio comparison
      - Threshold-based
      - Relative to origination
      fit_for:
      - Standard IFRS 9
      - Low-default portfolios
      not_fit_for:
      - High-default portfolios
      - Rapid migration
    - name: absolute
      traits:
      - Absolute PD thresholds
      - Quantitative
      - Fixed cutoffs
      fit_for:
      - Simple implementation
      - Clear risk appetite
      not_fit_for:
      - Varying origination PDs
      - Segment-specific
    - name: backstop
      traits:
      - 30dpd rule
      - Regulatory safe harbor
      - Conservative
      fit_for:
      - Regulatory compliance
      - Simple rules
      not_fit_for:
      - Early detection
      - Sophisticated risk management
    default: relative
  - name: stage_thresholds
    description: PD migration thresholds determine stage boundaries
    options:
    - name: ifrs9_default
      traits:
      - Standard IFRS 9
      - 2x threshold
      - Regulatory accepted
      fit_for:
      - General purpose
      - Regulatory reporting
      not_fit_for:
      - Custom risk appetite
      - Internal models
    - name: basel_based
      traits:
      - Basel-inspired
      - Regulatory aligned
      - Conservative
      fit_for:
      - Capital optimization
      - Regulatory alignment
      not_fit_for:
      - Pure IFRS 9
      - Economic provisioning
    - name: internal
      traits:
      - Internal calibration
      - Custom thresholds
      - Data-driven
      fit_for:
      - Advanced models
      - Custom risk appetite
      not_fit_for:
      - Regulatory submission
      - Simple requirements
    default: ifrs9_default
  design_decisions:
  - decision: Backward shift for historical staging
    evidence: Staging/backwardTransaction.ipynb:150(shift)
    rationale: Staging at time t requires knowing status at t-1, t-2 for SICR assessment
  - decision: Bucket-based staging thresholds
    evidence: Staging/backwardTransaction.ipynb:205
    rationale: SICR determined by bucket migration (0->1 triggers stage 2, 4 triggers stage 3)
  - decision: 30-day past due as backstop
    evidence: README.md:19
    rationale: IFRS 9 allows 30dpd as rebuttable presumption for SICR
  acceptance_hints:
  - Stage 3 (credit-impaired) accounts use lifetime ECL with 100% PD
  - Stage 2 accounts that cure for 12 consecutive months return to Stage 1
  - Stage determination precedes PD/LGD/EAD computation (DEEP-001 invariant)
- id: amortization_scheduling
  name: Amortization Schedule Generation
  order: 8
  responsibility: Computes contractual cash flows (principal, interest, fees) over loan lifetime for ECL discounting. Handles normal and abnormal amortization patterns.
  interface:
    inputs: Interest rate, terms, principal balance, EIR
    outputs: Period-by-period payment schedule with Beginning_Balance, Payment, Principal, Interest, Ending_Balance
  required_methods:
  - name: amortization.ipynb
    description: Standard amortization using numpy-financial pmt/ppmt/ipmt for regular loan schedules
    evidence: ECL/amortization.ipynb:93
  - name: abAmortization.ipynb
    description: Abnormal amortization for inconsistent term/rate/installment hybrid loan structures
    evidence: ECL/abAmortization.ipynb:1
  key_behaviors:
  - behavior: Standard amortization via numpy-financial
    description: Standard PMT/IPMT/PPMT functions handle annuity calculations correctly for regular payment schedules
    evidence: ECL/amortization.ipynb:99(pmt)
  - behavior: Monthly rate convention for banking
    description: Monthly rate = annual_rate/12 following banking convention for installment loans with monthly compounding
    evidence: ECL/amortization.ipynb:99
  - behavior: Ending balance via cumulative principal
    description: Ending_Balance = balance + cumsum(Principal); principal values are negative in numpy-financial convention
    evidence: ECL/amortization.ipynb:102
  - behavior: Separate abnormal amortization for edge cases
    description: Hybrid loans with inconsistent terms need different calculation logic than standard annuities
    evidence: ECL/abAmortization.ipynb:1
  replaceable_points:
  - name: compounding
    description: Interest compounding frequency affects payment calculations
    options:
    - name: monthly
      traits:
      - 12 periods/year
      - Banking standard
      - Common
      fit_for:
      - Standard loans
      - IFRS 9 reporting
      not_fit_for:
      - Daily accrual
      - Continuous compounding
    - name: daily
      traits:
      - 365 periods/year
      - Accrual-based
      - Precise
      fit_for:
      - Accrual accounting
      - Variable rate loans
      not_fit_for:
      - Simple loans
      - Computational efficiency
    - name: continuous
      traits:
      - Infinite periods
      - Mathematical
      - Theoretical
      fit_for:
      - Mathematical modeling
      - Derivative pricing
      not_fit_for:
      - Banking practice
      - IFRS 9 compliance
    default: monthly
  - name: schedule_type
    description: Amortization schedule variant for different loan structures
    options:
    - name: standard
      traits:
      - Equal payments
      - Annuity-based
      - Simple
      fit_for:
      - Consumer loans
      - Standard mortgages
      not_fit_for:
      - Balloon payments
      - Step-rate loans
    - name: abnormal
      traits:
      - Irregular payments
      - Flexible
      - Complex
      fit_for:
      - Hybrid loans
      - Custom structures
      not_fit_for:
      - Standard loans
      - Regulatory simplicity
    - name: bullet
      traits:
      - Interest-only
      - Balloon principal
      - Zero amortization
      fit_for:
      - Bridge loans
      - Project finance
      not_fit_for:
      - Standard amortization
      - Principal paydown
    default: standard
  design_decisions:
  - decision: Use numpy-financial for standard amortization
    evidence: ECL/amortization.ipynb:99(pmt)
    rationale: Standard PMT/IPMT/PPMT functions handle annuity calculations correctly
  - decision: Monthly rate = annual_rate/12
    evidence: ECL/amortization.ipynb:99
    rationale: Banking convention for installment loans; monthly compounding period
  - decision: Ending_Balance = balance + cumsum(Principal)
    evidence: ECL/amortization.ipynb:102
    rationale: Principal values are negative; cumulative sum tracks net reduction from original balance
  - decision: Separate abnormal amortization for edge cases
    evidence: ECL/abAmortization.ipynb:1
    rationale: Hybrid loans with inconsistent terms need different calculation logic
  acceptance_hints:
  - Final ending balance equals zero for fully amortizing loans
  - Sum of principal payments equals original loan amount
  - EIR must be expressed as annual rate for pmt but divided by 12 for monthly periods
- id: ecl_calculation
  name: ECL Computation
  order: 9
  responsibility: Calculates Expected Credit Loss as ECL = PD × LGD × EAD, discounted at EIR. Applies stage-appropriate PD (12-month for Stage 1, lifetime for Stage 2/3) per IFRS 9 requirements.
  interface:
    inputs: PD term structure, LGD estimates, EAD schedules, staging, discount rates
    outputs: 12-month ECL and Lifetime ECL by account and time bucket
  required_methods:
  - name: ECLLimitLevel_Truncate.ipynb
    description: Main ECL calculation with stage-specific PD application, limit-level aggregation, and truncation logic
    evidence: ECL/ECLLimitLevel_Truncate.ipynb:1
  key_behaviors:
  - behavior: Stage-specific PD application
    description: Stage 1 accounts use 12-month PD; Stage 2 and 3 accounts use lifetime PD per IFRS 9.5.5.3 requirement
    evidence: README.md:19-20
  - behavior: ECL discounted at original EIR
    description: IFRS 9 definition of credit loss uses EIR discounting for present value calculation
    evidence: README.md:24
  - behavior: Unbiased estimates required
    description: Regulatory floors and downturn adjustments must be removed from Basel models for IFRS 9 compliance
    evidence: README.md:21
  replaceable_points:
  - name: discount_rate
    description: ECL discounting rate affects present value of expected losses
    options:
    - name: EIR
      traits:
      - IFRS 9 compliant
      - Original rate
      - Standard
      fit_for:
      - IFRS 9 reporting
      - General purpose
      not_fit_for:
      - Market-based valuation
      - Fair value disclosure
    - name: risk_free_plus
      traits:
      - Risk-free plus spread
      - Market-based
      - Conservative
      fit_for:
      - Conservative estimates
      - Stress scenarios
      not_fit_for:
      - IFRS 9 compliance
      - Standard reporting
    - name: original_effective
      traits:
      - Effective rate
      - Contractual
      - Simple
      fit_for:
      - Simple implementation
      - Validation
      not_fit_for:
      - Variable rate
      - Complex fee structures
    default: EIR
  - name: probability_weighting
    description: Multi-scenario ECL weighting for macroeconomic scenarios
    options:
    - name: base
      traits:
      - Base case weighting
      - Single scenario
      - Central estimate
      fit_for:
      - Simple reporting
      - Model validation
      not_fit_for:
      - Regulatory submission
      - Comprehensive scenarios
    - name: optimistic
      traits:
      - Optimistic scenarios weighted
      - Best case
      - Lower provisions
      fit_for:
      - Management overlays
      - Upside scenarios
      not_fit_for:
      - Regulatory compliance
      - Conservatism
    - name: downturn
      traits:
      - Downturn scenarios weighted
      - Conservative
      - Higher provisions
      fit_for:
      - Regulatory compliance
      - Conservative provisioning
      not_fit_for:
      - Economic upturn
      - Capital optimization
    default: base
  design_decisions:
  - decision: Stage 1 uses 12M PD, Stage 2/3 uses lifetime PD
    evidence: README.md:19-20
    rationale: IFRS 9.5.5.3 requirement; Stage 1 accounts with low risk use 12-month horizon
  - decision: ECL discounted at original EIR
    evidence: README.md:24
    rationale: IFRS 9 definition of credit loss uses EIR discounting for present value
  - decision: Unbiased estimates required
    evidence: README.md:21
    rationale: Remove floors, downturn adjustments from regulatory models
  acceptance_hints:
  - Stage 1 ECL = PD_12M × LGD × EAD × discount factor
  - Stage 2/3 ECL = Σ(PD_lifetime_t × LGD × EAD_t × discount_factor_t)
  - Final ECL provisions flow to accounting systems for financial reporting
source:
  commit_hash: 0614c825d53ae1293a7f7ed76206b9bcf025ea7d
  extraction_methods:
  - semi_auto
  projects:
  - ifrs9
sop_version: '3.6'
business_decisions:
- id: BD-001
  type: B/BA
  content: Use pandas .shift(-i) for forward window creation to generate 12-month performance status flags
  rationale: 'Negative shift creates forward-looking columns that capture account status over the next 12 months. This enables cohort-based PD calculation from historical data. BREAKS IF: The shift operation
    assumes chronological ordering of monthkey values; unsorted data produces incorrect temporal associations.'
  evidence: PD/transitionMatrix.ipynb:133(shift)
  stage: transaction_staging
  alternative_considered: Rolling window functions were not considered but could provide equivalent forward-looking aggregation
- id: BD-002
  type: BA
  content: Group by AccountID before applying shift operations to prevent cross-account data contamination
  rationale: 'Without groupby, pandas shift would move rows across account boundaries, mixing timeline data from different borrowers. This is a hidden assumption about data structure that could silently
    corrupt results. BREAKS IF: Account identifiers are missing or duplicated in the dataset.'
  evidence: PD/transitionMatrix.ipynb:133(groupby)
  stage: transaction_staging
  alternative_considered: Row-by-row iteration with account boundary checks was rejected for performance reasons
- id: BD-003
  type: B/DK
  content: Exclude accounts with fewer than 12 months of observation using maxMonthkey-12 filter
  rationale: 'Requires minimum 12-month window to calculate reliable 12M PD. Accounts with shorter histories cannot contribute to cohort analysis. BREAKS IF: Business requirement changes to shorter performance
    windows or if data quality issues cause premature account termination.'
  evidence: PD/transitionMatrix.ipynb:196(query)
  stage: transaction_staging
  alternative_considered: Dynamic window based on data availability was not implemented
- id: BD-004
  type: B/BA
  content: Use max(axis=1) aggregation for 12M status determination, capturing worst status observed in the performance window
  rationale: 'Taking the maximum aging code across the 12-month window identifies if account ever defaulted during observation period. This implements ''ever-default'' logic. BREAKS IF: Business switches
    to ''first-default'' or ''last-default'' semantics for staging.'
  evidence: PD/transitionMatrix.ipynb:165(max)
  stage: transition_matrix
  alternative_considered: First default (minimum period) or last default tracking were not evaluated
- id: BD-005
  type: BA
  content: Propagate last known status to censored performing accounts using .map() with status dictionary
  rationale: 'Accounts still performing at observation cutoff have no 12M status yet; propagating lastStatus assumes no deterioration occurs after observation end. BREAKS IF: Economic conditions deteriorate
    sharply after the observation date.'
  evidence: PD/transitionMatrix.ipynb:181(map)
  stage: transition_matrix
  alternative_considered: Conservative assumption of deterioration for censored accounts was not implemented
- id: BD-006
  type: B
  content: Use pivot_table with aggfunc=sum to aggregate count matrices by Segment/Aging/Aging12Adj
  rationale: 'Summation aggregation counts accounts moving between aging states for transition probability calculation. BREAKS IF: Segmentation variables change or if counts need weighted rather than simple
    aggregation.'
  evidence: PD/transitionMatrix.ipynb:371(pivot)
  stage: transition_matrix
  alternative_considered: Weighted average by exposure was not considered
- id: BD-007
  type: M/B
  content: Calculate marginal PD as conditional PD at period t multiplied by survival probability to t-1
  rationale: 'This implements the actuarial survival function: marginal_PD(t) = S(t-1) * q(t) where S is survival and q is hazard. Changes to this formula directly affect lifetime PD precision. BREAKS IF:
    Alternative survival function formulations are used.'
  evidence: PD/lifetimeCalibration.ipynb:274(shift)
  stage: survival_analysis
  alternative_considered: Kaplan-Meier estimator was referenced but not implemented for 12M PD
- id: BD-008
  type: M/BA
  content: 'Apply survival function formula: Lifetime PD = 1 - product of (1 - conditional PDs) using np.cumprod'
  rationale: 'Standard survival function: P(default by T) = 1 - ∏(1 - q_t). This is a named mathematical theory. BREAKS IF: Conditional PDs are not independently distributed or if time dependency exists.'
  evidence: PD/lifetimeCalibration.ipynb:286(cumprod)
  stage: survival_analysis
  alternative_considered: Alternative survival function formulations (exponential, Weibull) were not evaluated
- id: BD-009
  type: B/BA
  content: Use scipy.optimize.fsolve for numerical root-finding to calibrate lifetime curves to observed central tendency
  rationale: 'Calibration ensures model outputs match historical portfolio behavior. fsolve finds parameter values that minimize deviation from targets. BREAKS IF: Initial parameter guesses are poor or
    function is non-convex.'
  evidence: PD/lifetimeCalibration.ipynb:58(fsolve)
  stage: survival_analysis
  alternative_considered: scipy.minimize or grid search were listed as alternatives but not implemented
- id: BD-010
  type: B/BA
  content: Credit Cycle Index (CCI) incorporates lagged survival rates using survive.shift(1) with fillna(0)
  rationale: 'Lagged survival creates prior-period reference for CCI calculation, enabling cycle identification. fillna(0) handles first period. BREAKS IF: Fill strategy changes or lag period differs, altering
    cycle phase identification.'
  evidence: PD/simplifiedCCI.ipynb:792(shift)
  stage: forward_looking_adjustment
  alternative_considered: Multiple lag periods or adaptive lag were not evaluated
- id: BD-011
  type: M/DK
  content: Vasicek single-factor model with Basel rho values for systematic asset correlation
  rationale: 'Vasicek model is a named mathematical theory for credit portfolio risk. Basel rho provides standardized correlation parameters. Changes affect PIT PD precision significantly. BREAKS IF: Asset
    correlations are regime-dependent or Basel parameters are outdated.'
  evidence: N/A:0(see_rationale)
  stage: forward_looking_adjustment
  alternative_considered: Regime-switching or time-varying correlation models were not implemented
- id: BD-012
  type: T/BA
  content: Group by Aging with sort=False assumption for computational efficiency
  rationale: 'Skipping sort assumes input data is already chronologically ordered, saving expensive sorting operation. This is a hidden assumption. BREAKS IF: Input data arrives out of order, causing incorrect
    temporal associations.'
  evidence: PD/cci.ipynb:190(groupby)
  stage: forward_looking_adjustment
  alternative_considered: Explicit sort with validation overhead was rejected for performance
- id: BD-013
  type: B/RC
  content: Discount recovery cash flows at original Effective Interest Rate (EIR) per IFRS 9 requirement
  rationale: 'IFRS 9 paragraph 5.5.17 mandates EIR discounting for credit loss calculation. This is a regulatory requirement. BREAKS IF: Regulatory definition changes or if EIR is miscalculated.'
  evidence: N/A:0(see_rationale)
  stage: lgd_estimation
  alternative_considered: Risk-free rate discounting was rejected as non-compliant with IFRS 9
- id: BD-014
  type: B/RC/BA
  content: Exclude indirect costs from LGD calculation per IFRS 9 unbias requirement
  rationale: 'IFRS 9 requires unbiased estimates; indirect costs (overhead, collection effort) would bias LGD upward. BREAKS IF: Audit interpretation differs or if indirect costs become directly attributable.'
  evidence: N/A:0(see_rationale)
  stage: lgd_estimation
  alternative_considered: Hybrid approach with partial indirect cost allocation was not implemented
- id: BD-015
  type: B/BA
  content: Use cumsum.shift().fillna(0) pattern for running available limit calculation per account
  rationale: 'Cumulative sum tracks installment payments; shift aligns with period boundaries; fillna handles first period. BREAKS IF: Payments are not recorded sequentially or if account transfers occur
    mid-period.'
  evidence: ECL/ECLLimitLevel_Truncate.ipynb:6119(shift)
  stage: ead_estimation
  alternative_considered: Event-driven limit tracking was not implemented
- id: BD-016
  type: DK
  content: Handle hybrid loan products (term loan to revolving conversion) with separate truncation logic
  rationale: 'Product conversion requires different EAD treatment for each phase. This is market-specific product knowledge. BREAKS IF: New conversion pathways are introduced or regulatory treatment of
    hybrids changes.'
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
  alternative_considered: Unified EAD model for each product types was not implemented
- id: BD-017
  type: B
  content: Maintain separate LimitID and AccountID hierarchies for EAD calculation
  rationale: 'One limit facility can cover multiple accounts; hierarchical structure needed for proper exposure attribution. BREAKS IF: Data model changes to flat account structure or if facility relationships
    are mischaracterized.'
  evidence: N/A:0(see_rationale)
  stage: ead_estimation
  alternative_considered: Account-level limit allocation without facility structure was rejected
- id: BD-018
  type: B
  content: Use backward shift for historical staging criteria, requiring status at t-1 and t-2 for SICR assessment
  rationale: 'SICR determination requires trajectory over time; backward shift creates lagged status columns for comparison. BREAKS IF: SICR definition changes to single-period assessment or requires different
    lookback.'
  evidence: Staging/backwardTransaction.ipynb:150(shift)
  stage: staging_classification
  alternative_considered: Point-in-time assessment without history was not compliant with IFRS 9
- id: BD-019
  type: BA
  content: Implement bucket-based staging thresholds where aging migration triggers stage transitions
  rationale: 'SICR determined by observable bucket movement (0->1 triggers Stage 2, 4 triggers Stage 3). This assumes observable delinquencies are leading indicators. BREAKS IF: Early warning indicators
    exist before bucket migration.'
  evidence: N/A:0(see_rationale)
  stage: staging_classification
  alternative_considered: ML-based early warning system was not implemented
- id: BD-020
  type: B/RC
  content: Use 30-day past due as rebuttable presumption for SICR per IFRS 9 paragraph B5.5.1
  rationale: 'IFRS 9 allows 30dpd as backstop; this is explicitly mentioned in standard. BREAKS IF: Regulatory interpretation changes or if jurisdiction-specific rules differ.'
  evidence: N/A:0(see_rationale)
  stage: staging_classification
  alternative_considered: Shorter (60dpd) or longer (90dpd) backstop was not evaluated
- id: BD-021
  type: T
  content: Use numpy-financial library PMT/IPMT/PPMT functions for standard amortization calculation
  rationale: 'Standard library implementation of annuity formulas; equivalent to manual calculation. Using this library vs implementing formulas manually produces identical business output. BREAKS IF: Library
    is unavailable or has bugs.'
  evidence: ECL/amortization.ipynb:99(pmt)
  stage: amortization_scheduling
  alternative_considered: Manual PMT/IPMT/PPMT implementation using standard formulas
- id: BD-022
  type: B/BA
  content: Divide annual interest rate by 12 for monthly payment calculation (banking convention)
  rationale: 'Standard banking convention for installment loans uses monthly compounding period. BREAKS IF: Product uses daily or continuous compounding.'
  evidence: N/A:0(see_rationale)
  stage: amortization_scheduling
  alternative_considered: Daily compounding (rate/365) was not implemented
- id: BD-023
  type: B/BA
  content: Use cumulative sum of negative principal values to track ending balance reduction
  rationale: 'Principal payments are negative (cash outflow); cumsum tracks net reduction. BREAKS IF: Convention changes to positive principal values or if fees are included in principal calculation.'
  evidence: ECL/amortization.ipynb:102(cumsum)
  stage: amortization_scheduling
  alternative_considered: Separate fee tracking was not considered in core amortization
- id: BD-024
  type: DK/B
  content: Implement separate abnormal amortization logic for inconsistent term/rate/installment products
  rationale: 'Hybrid loans with variable parameters cannot use standard annuity formula. This handles market-specific product complexity. BREAKS IF: New irregular payment patterns emerge without corresponding
    logic.'
  evidence: N/A:0(see_rationale)
  stage: amortization_scheduling
  alternative_considered: General numerical amortization method for each product types was not implemented
- id: BD-025
  type: B/RC
  content: 'Apply Stage 1/2/3 PD rules: 12-month PD for Stage 1, lifetime PD for Stage 2/3'
  rationale: 'IFRS 9 paragraph 5.5.3 mandates lifetime ECL for significant credit risk increase. This is a regulatory requirement. BREAKS IF: Stage boundaries change or if lifetime calculation is unavailable.'
  evidence: N/A:0(see_rationale)
  stage: ecl_calculation
  alternative_considered: Probability-weighted scenarios across stages were not implemented
- id: BD-026
  type: B/RC
  content: Calculate ECL as PD × LGD × EAD, discounted at original EIR
  rationale: 'ECL definition in IFRS 9 paragraph 5.5.17 specifies three-factor multiplication with EIR discounting. BREAKS IF: Any factor uses book value instead of present value.'
  evidence: N/A:0(see_rationale)
  stage: ecl_calculation
  alternative_considered: Simplified approach without discounting was rejected as non-compliant
- id: BD-027
  type: B/RC
  content: Require unbiased ECL estimates by removing regulatory floors and downturn LGD adjustments
  rationale: 'IFRS 9 unbias principle conflicts with Basel conservative floors. Regulatory LGD must be adjusted for accounting purposes. BREAKS IF: Unbias adjustment is incorrectly implemented or omitted.'
  evidence: N/A:0(see_rationale)
  stage: ecl_calculation
  alternative_considered: Partial unbias approach was not evaluated
- id: BD-028
  type: B
  content: Stage determination MUST precede PD/LGD/EAD computation in processing pipeline
  rationale: 'PD selection depends on stage assignment; computing in wrong order produces incorrect stage-specific ECL. BREAKS IF: Parallel processing or different ordering is attempted.'
  evidence: N/A:0(see_rationale)
  stage: ecl_calculation
  alternative_considered: Iterative refinement was not considered
- id: BD-029
  type: DK
  content: Default LGD assumption of 50% when portfolio recovery data is insufficient
  rationale: 'Conservative but reasonable fallback based on typical recovery experience. This is domain knowledge from credit markets. BREAKS IF: Actual portfolio recovery differs significantly from 50%.'
  evidence: N/A:0(see_rationale)
  stage: lgd_estimation
  alternative_considered: Sector-specific LGD assumptions were not implemented
- id: BD-030
  type: M/B
  content: Cumulative PD must be computed BEFORE marginal PD via diff() operation
  rationale: 'Mathematical dependency: marginal_PD(t) = cumPD(t) - cumPD(t-1). Reversing breaks denominator for conditional PD. BREAKS IF: Parallel computation is attempted.'
  evidence: N/A:0(see_rationale)
  stage: survival_analysis
  alternative_considered: Alternative hazard function formulations were not evaluated
- id: BD-031
  type: B
  content: CCI forward-looking adjustment MUST be applied AFTER TTC PD calibration
  rationale: 'CCI modifies TTC estimates; applying before calibration would amplify errors. BREAKS IF: Order is reversed or parallelized.'
  evidence: N/A:0(see_rationale)
  stage: forward_looking_adjustment
  alternative_considered: Joint calibration of TTC and CCI parameters was not implemented
- id: BD-032
  type: DK
  content: Use 15-year lifetime horizon as default for non-retail PD term structure
  rationale: 'Non-retail products typically have longer maturities; 15 years is conservative industry practice. BREAKS IF: Product mix shifts to longer or shorter duration.'
  evidence: N/A:0(see_rationale)
  stage: survival_analysis
  alternative_considered: Dynamic horizon based on remaining term was not implemented
- id: BD-033
  type: M/B
  content: Transition matrix multiplication used for lifetime PD aggregation across periods
  rationale: 'Matrix multiplication chains transition probabilities: P(lifetime) = P(1) × P(2) × ... × P(n). Named mathematical operation. BREAKS IF: Alternative aggregation method is used.'
  evidence: N/A:0(see_rationale)
  stage: transition_matrix
  alternative_considered: Monte Carlo simulation for lifetime aggregation was not evaluated
- id: BD-034
  type: B
  content: Univariate analysis filtering MUST precede multivariate analysis to avoid multicollinearity
  rationale: 'Screening variables individually before combining prevents estimation instability. BREAKS IF: Multivariate analysis is attempted without screening.'
  evidence: N/A:0(see_rationale)
  stage: transition_matrix
  alternative_considered: Simultaneous variable selection was not implemented
- id: BD-035
  type: M/DK
  content: Use Gamma distribution fitting to extend lifetime PD curves beyond observed data
  rationale: 'Gamma distribution is named mathematical theory for extrapolation. Assumes tail behavior matches Gamma. BREAKS IF: Actual tail differs or distribution is misspecified.'
  evidence: N/A:0(see_rationale)
  stage: survival_analysis
  alternative_considered: Weibull, lognormal distributions were not compared
- id: BD-036
  type: M/DK
  content: Use Nelson-Siegel curve fitting for lifetime marginal PD extrapolation
  rationale: 'Nelson-Siegel is named mathematical framework for yield curve (and PD curve) extrapolation. BREAKS IF: Term structure has non-monotonic behavior that Nelson-Siegel cannot capture.'
  evidence: N/A:0(see_rationale)
  stage: survival_analysis
  alternative_considered: Spline-based extrapolation was not evaluated
- id: BD-037
  type: DK/B
  content: CHAID algorithm for borrower segmentation creating mutually exclusive groups
  rationale: 'CHAID is market-standard decision tree for credit segmentation. Market knowledge encoded in tree structure. BREAKS IF: Segments become non-homogeneous or if new segmentation variables emerge.'
  evidence: N/A:0(see_rationale)
  stage: transition_matrix
  alternative_considered: Alternative algorithms (CART, random forest) were not compared
- id: BD-038
  type: M/DK
  content: Non-parametric survival analysis used for 12-month unbias PD estimation
  rationale: 'Non-parametric approach avoids distributional assumptions. Market knowledge about unbias requirement encoded. BREAKS IF: Parametric method is used or if censoring assumptions are violated.'
  evidence: N/A:0(see_rationale)
  stage: survival_analysis
  alternative_considered: Kaplan-Meier estimator was referenced but not implemented
- id: BD-039
  type: B
  content: Clustering of macro variables MUST be completed before regression model fitting
  rationale: 'Regression models require properly grouped predictors; clustering provides structure. BREAKS IF: Clustering is skipped or uses wrong number of clusters.'
  evidence: N/A:0(see_rationale)
  stage: forward_looking_adjustment
  alternative_considered: Unstructured regression with each macro variables was not evaluated
- id: BD-040
  type: T
  content: Use np.where via dictionary mapping instead of .mask().ffill() for pandas efficiency
  rationale: 'Pure performance optimization: dictionary mapping is ~10x faster on large datasets. Swapping to mask would produce identical results with worse performance. BREAKS IF: Performance is not a
    concern.'
  evidence: PD/transitionMatrix.ipynb:177(mask comment)
  stage: transition_matrix
  alternative_considered: Pandas mask approach was rejected for performance
- id: BD-041
  type: DK
  content: Backward transaction flow processed BEFORE forward flow in staging pipeline
  rationale: 'Historical staging requires backward-looking data before forward performance can be assessed. Market-specific processing order. BREAKS IF: Business rules change to require simultaneous processing.'
  evidence: N/A:0(see_rationale)
  stage: transaction_staging
  alternative_considered: Parallel bidirectional processing was not implemented
- id: BD-042
  type: BA
  content: Shift results require fillna(0) for first-period values; NaN propagates through cumsum/cumprod breaking survival functions
  rationale: 'First period has no prior observation; NaN would break cumulative calculations. Hidden assumption about data completeness. BREAKS IF: Fillna strategy changes or if data has structural gaps.'
  evidence: PD/lifetimeCalibration.ipynb:274(shift fillna)
  stage: survival_analysis
  alternative_considered: Forward-fill or interpolation were not evaluated
- id: BD-043
  type: B/BA
  content: EIR must be expressed as annual rate for PMT calculation but divided by 12 for monthly compounding
  rationale: 'Finance convention: EIR annual → monthly rate conversion for installment calculations. BREAKS IF: Daily or continuous compounding is used instead.'
  evidence: ECL/amortization.ipynb:99(rate/12)
  stage: amortization_scheduling
  alternative_considered: Daily compounding was not implemented
- id: BD-044
  type: B/BA
