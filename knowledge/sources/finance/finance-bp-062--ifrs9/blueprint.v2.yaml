  content: 'INTERACTION: BD-028 (Stage determination MUST precede PD/LGD/EAD) × BD-025 (Stage 1 = 12-month PD, Stage 2/3 = lifetime) × BD-047 (Stage 1 EAD 12-month cap) → Contradiction risk when staging
    order is violated'
  rationale: 'BD-028 is an invariant requiring stage determination before PD/LGD/EAD computation. BD-025 selects 12-month vs lifetime PD based on stage. BD-047 applies different EAD amortization caps by
    stage. If BD-028 ordering is violated and PD is computed before staging, the wrong PD type (12-month vs lifetime) will be used, combined with wrong EAD caps. This creates a contradiction: the ECL formula
    (BD-026) uses stage-dependent components, but if order is reversed, stage assignment uses wrong ECL values, creating a circular dependency that can lead to non-convergence or wrong provisions.'
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Iterative refinement was not considered but could handle circular dependency
- id: BD-INT-004
  type: M/DK
  content: 'INTERACTION: BD-035 (Gamma distribution for lifetime extrapolation) × BD-036 (Nelson-Siegel for marginal PD extrapolation) × BD-060 (Gamma distribution fitting) → Amplification of extrapolation
    uncertainty'
  rationale: Both Gamma distribution (BD-035, BD-060) and Nelson-Siegel curve fitting (BD-036) are used for lifetime curve extrapolation. Gamma assumes specific tail behavior (bounded PD curves with exponential
    decay), while Nelson-Siegel assumes smooth factor loading decay. BD-036 notes it may produce implausible long-term PD if term structure has non-monotonic behavior. When both methods are used for different
    purposes (Gamma for lifetime, Nelson-Siegel for marginal), the combined uncertainty in the tail extrapolations amplifies, potentially creating inconsistent long-term PD term structures that affect lifetime
    ECL non-linearly.
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Weibull, lognormal, or spline-based extrapolation were not compared to assess consistency
- id: BD-INT-005
  type: B/BA
  content: 'INTERACTION: BD-010 (CCI uses survive.shift(1) with fillna(0)) × BD-031 (CCI applied AFTER TTC calibration) × BD-011 (Vasicek single-factor model) → Risk cascade through forward-looking adjustment
    pipeline'
  rationale: 'BD-010 creates the CCI using lagged survival rates (shift(1) with fillna(0)). BD-031 requires CCI to be applied after TTC calibration. BD-011 uses Vasicek single-factor model with Basel rho
    for systematic correlation. The cascade: (1) shift(1) requires proper temporal ordering per BD-012 (sort=False assumption), (2) CCI calculation amplifies or dampens PD based on cycle phase, (3) if CCI
    is applied before TTC calibration (violating BD-031), the cycle adjustment is applied to uncalibrated values, (4) Vasicek then applies systematic correlation to the CCI-adjusted PD, potentially amplifying
    cyclical effects. A stress scenario (downturn) combined with incorrect ordering could produce severely overstated or understated conditional transition matrices.'
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Regime-switching correlation model was not implemented to handle cycle phases natively
- id: BD-INT-006
  type: B/RC
  content: 'INTERACTION: BD-013 (discount recovery at EIR) × BD-026 (ECL = PD × LGD × EAD discounted at EIR) × BD-053 (recovery discounting uses EIR) → Amplification of discounting consistency requirement'
  rationale: 'EIR discounting appears in three places: BD-013 for LGD recovery cash flows, BD-026 for ECL calculation, and BD-053 for recovery discounting. These must use identical EIR values and day count
    conventions. BD-043 specifies EIR as annual rate divided by 12 for monthly compounding, but the audit found no explicit day count convention (audit item 17: Day count convention - FAIL). If EIR calculation
    uses different day count than discount factor calculation, the present value of cash flows will be inconsistent, causing systematic bias in both LGD and ECL. The amplification occurs because errors
    compound: wrong LGD multiplied by wrong EAD, with wrong discount factor, each derived from inconsistent EIR treatment.'
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Standardized day count library was not implemented
- id: BD-INT-007
  type: BA
  content: 'INTERACTION: BD-002 (groupby AccountID before shift) × BD-012 (groupby sort=False assumption) × BD-001 (shift -i for forward window) → Hidden dependency creating cross-account contamination
    risk'
  rationale: 'BD-002 requires groupby AccountID before shift operations to prevent cross-account data contamination. BD-012 uses sort=False assumption for computational efficiency, assuming input data is
    chronologically ordered. BD-001 uses shift(-i) for forward window creation. The hidden dependency: if data arrives out of order, the groupby (even with sort=False) will not correctly associate rows
    with their temporal neighbors, causing shift operations to create incorrect forward-looking flags. This silently corrupts the 12-month performance status flags (BD-001) and subsequently the cohort-based
    PD calculation. The contamination is hidden because the code runs without errors but produces wrong temporal associations.'
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Explicit sort with validation overhead was rejected for performance, creating silent failure risk
- id: BD-INT-008
  type: M/B
  content: 'INTERACTION: BD-030 (Cumulative PD computed BEFORE marginal PD via diff) × BD-007 (marginal PD = survival × conditional) × BD-008 (Lifetime PD = 1 - cumprod(1 - conditional)) → Risk cascade
    through survival analysis ordering'
  rationale: 'BD-030 establishes that cumulative PD must be computed before marginal PD via diff(). BD-007 defines marginal PD as survival function times conditional PD. BD-008 defines lifetime PD using
    cumulative product of (1 - conditional PDs). The cascade: if cumulative PD is not computed first, conditional PDs cannot be derived correctly. If conditional PDs are wrong, the cumprod in BD-008 produces
    incorrect lifetime PD. This is not just ordering - it''s mathematical dependency where BD-007''s survival function depends on BD-030''s cumulative probabilities. Errors compound through the survival
    analysis stage into each downstream lifetime PD applications (staging, ECL, provisions).'
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Alternative hazard function formulations were not evaluated
- id: BD-INT-009
  type: BA/RC
  content: 'INTERACTION: BD-018 (backward shift for SICR with t-1 and t-2 status) × BD-019 (bucket-based staging thresholds) × BD-020 (30-day past due rebuttable presumption) → Amplification of staging
    sensitivity to early deterioration'
  rationale: 'BD-018 requires status at t-1 and t-2 for SICR assessment using backward shift. BD-019 uses bucket migration (aging movement) as observable indicators. BD-020 applies 30-day past due as IFRS
    9 rebuttable presumption. These interact: (1) BD-018 requires sufficient historical depth - if lookback window is shorter than 2 periods, SICR cannot be assessed properly; (2) BD-019 assumes bucket
    migration is a leading indicator, but early deterioration may occur before bucket movement; (3) BD-020 provides a backstop but only for 30+ days past due. The amplification: accounts with early-stage
    deterioration (before bucket migration and before 30dpd) are not captured by any trigger, potentially delaying Stage 2 classification and understating lifetime ECL recognition.'
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: ML-based early warning system could capture deterioration earlier than bucket migration thresholds
- id: BD-INT-010
  type: M/BA
  content: 'INTERACTION: BD-006 (pivot_table aggfunc=sum for count matrices) × BD-084 (row-normalization of transition matrices) × BD-096 (empirical transition frequency estimation) → Risk cascade through
    transition probability calculation'
  rationale: 'BD-006 uses pivot_table with aggfunc=sum to aggregate count matrices by Segment/Aging/Aging12Adj. BD-084 applies row-normalization ensuring row sums equal 1.0. BD-096 estimates transition
    probabilities as empirical frequencies (counts / initial state counts). The cascade: if BD-006 aggregation is incorrect (wrong grouping variables, missing accounts, duplicate counting), the count matrices
    fed into BD-096 are wrong. If counts are wrong, empirical frequencies are wrong. If frequencies are wrong, row-normalization (BD-084) adjusts already-wrong probabilities to sum to 1, preserving the
    wrong relative relationships. This creates systematic bias in transition matrices affecting each subsequent lifetime PD calculations.'
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Weighted average by exposure was not considered for aggregation
- id: BD-INT-011
  type: B/BA
  content: 'INTERACTION: BD-004 (max(axis=1) for ''ever-default'' logic) × BD-019 (bucket-based staging thresholds) × BD-025 (Stage 1/2/3 PD rules) → Amplification of Stage 2 retention effect'
  rationale: 'BD-004 uses max(axis=1) to identify if account ''ever'' defaulted during the 12-month observation window (ever-default logic). BD-019 triggers Stage 2 based on bucket migration. BD-025 applies
    lifetime PD to Stages 2-3. The amplification effect: once an account triggers Stage 2 via bucket migration, the ''ever-default'' logic ensures the account remains in a deteriorated state classification.
    Even if the account recovers (bucket improves), the max() has already recorded the worst status. Combined with staging thresholds (BD-019), this means accounts entering Stage 2 require significant sustained
    improvement to exit. This amplifies the lifetime ECL recognition because Stage 2 classification persists even after recovery indicators appear.'
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: First default tracking could allow faster stage recovery than ever-default approach
- id: BD-INT-012
  type: B/BA
  content: 'INTERACTION: BD-017 (separate LimitID/AccountID hierarchies) × BD-044 (CCF approach for EAD) × BD-048 (EAD = Outstanding + Available × CCF) → Hidden dependency where hierarchy collapse breaks
    EAD calculation'
  rationale: 'BD-017 maintains separate LimitID and AccountID hierarchies because one limit facility can cover multiple accounts. BD-044 uses CCF approach for EAD calculation. BD-048 defines EAD for revolving
    facilities as Outstanding + (Available Limit × CCF). The hidden dependency: if the hierarchy collapses (data model changes to flat account structure, or if BD-017 is not properly joined), the Available
    Limit calculation (using BD-015 cumsum.shift().fillna pattern) will attribute wrong limits to accounts. This affects the CCF calculation: if available limit is overstated or understated due to hierarchy
    issues, EAD is systematically miscalculated. The failure is silent because the EAD formula produces numbers, but the numbers are wrong due to wrong limit attribution.'
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Event-driven limit tracking was not implemented to validate hierarchy consistency
