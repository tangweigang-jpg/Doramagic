    in chainladder/methods/base.py'
- id: BD-079
  type: B
  content: MethodBase._align_cdf vertically aligns CDF to origin period latest diagonal before ultimate
    calculation
  rationale: The _align_cdf method ensures CDFs are properly aligned with the triangle's origin periods
    by selecting the latest available diagonal as the starting point for ultimate projection. This handles
    triangles with irregular development patterns. The boundary is that triangles with no valid diagonal
    (each NaN) will produce all-NaN ultimates.
  evidence: chainladder/methods/base.py:26-40(_align_cdf)
  stage: ordering_contract
  alternative_considered: Simple cumulative multiplication was rejected as it doesn't handle irregular
    triangles correctly
- id: BD-080
  type: BA
  content: TailBase projection_period=12 default determines how many years tail extends beyond data
  rationale: The projection_period=12 default (12 years) represents a reasonable actuarial assumption
    for how far development extends beyond the latest diagonal in typical long-tail lines. This balance
    ensures adequate tail coverage without excessive extrapolation. The boundary is that 12 years may
    be excessive for short-tail lines or insufficient for very long-tail business.
  evidence: chainladder/tails/base.py:9(tailbase)
  stage: default_value
  alternative_considered: Dynamic estimation of projection period was considered but adds complexity and
    potential instability
  _evidence_issues:
