# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-063
name: chainladder
sop_version: '3.6'
source:
  projects:
  - chainladder-python
  commit_hash: bef74e5d69955aaeafe462e9680f4d5667321605
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Property and Casualty Insurance Loss Reserving
  description: A Python library for property and casualty loss reserving using chain ladder methods, supporting
    both deterministic and stochastic models for insurance loss triangles with sklearn-compatible API.
  prerequisites: Familiarity with pandas DataFrames, scikit-learn estimators, insurance loss reserving
    concepts (LDFs, CDFs, IBNR, ultimate losses)
  not_suitable_for: Life insurance actuarial work, health insurance, non-insurance financial forecasting,
    real-time streaming data processing, non-triangular time series analysis
stages:
- id: triangle_data_structure
  name: Triangle Data Structure
  order: 1
  responsibility: 'Core 4D data structure for insurance loss triangles with origin/development dimensions,
    supporting sparse arrays and multiple backends (numpy/cupy/dask). WHY: Insurance loss data is inherently
    4D (index x columns x origin x development) requiring a specialized structure over pandas DataFrames.'
  interface:
    inputs:
    - pandas DataFrame with origin, development, columns, index fields
    outputs:
    - Triangle with values (kdims, vdims, odims, ddims), valuation dates, grain metadata
  required_methods:
  - name: Triangle.__init__
    description: Initializes 4D triangle container from pandas DataFrame or array-like data with origin/development
      dimensions
    evidence: chainladder/core/triangle.py:32(Triangle.__init__)
  - name: Triangle.to_frame
    description: Converts triangle back to pandas DataFrame for interoperability with data science stack
    evidence: chainladder/core/triangle.py:1(to_frame)
  - name: TriangleSlicer.loc
    description: Pandas-style location indexing for 4D triangle by origin/development labels
    evidence: chainladder/core/slice.py:193(TriangleSlicer.loc)
  - name: TriangleSlicer.iloc
    description: Integer-location based indexing for 4D triangle
    evidence: chainladder/core/slice.py:193(TriangleSlicer.iloc)
  key_behaviors:
  - behavior: Sparse COO array default storage
    description: Triangle uses sparse COO format by default since insurance triangles are approximately
      60% sparse, avoiding memory overhead of storing NaN values
    evidence: chainladder/core/triangle.py:305(sp(...))
  - behavior: Automatic grain detection
    description: System infers date granularity (Y/S/Q/M) from data automatically, eliminating need for
      manual specification
    evidence: chainladder/core/base.py:394(_get_grain)
  - behavior: 4D shape enforcement
    description: Every triangles maintain 4D shape (index, columns, origin, development) with datetime
      indices for origin and development dimensions
    evidence: chainladder/core/triangle.py:312(shape=...)
  - behavior: Origin <= Development invariant
    description: Every triangle cells enforce that origin date must be <= development date, maintaining
      actuarial validity
    evidence: chainladder/core/base.py:157(origin<=development)
  replaceable_points:
  - name: array_backend
    description: Swap sparse array implementation with alternative backends for different performance
      characteristics
    options:
    - name: sparse
      traits:
      - Memory efficient
      - Default for large triangles
      - COO format
      fit_for:
      - Large triangles with many NaN cells
      - Memory-constrained environments
      - Standard development patterns
      not_fit_for:
      - Dense triangles
      - GPU computation
      - Distributed computing
    - name: numpy
      traits:
      - Dense array
      - CPU-only
      - No sparse overhead
      fit_for:
      - Small triangles
      - Dense data patterns
      - Maximum compatibility
      not_fit_for:
      - Large sparse triangles
      - Memory efficiency requirements
    - name: cupy
      traits:
      - GPU-accelerated
      - CUDA-based
      - Parallel computation
      fit_for:
      - Very large triangles
      - GPU cluster environments
      - High-performance computation
      not_fit_for:
      - CPU-only environments
      - Small datasets
      - No NVIDIA GPU
    - name: dask
      traits:
      - Out-of-core computation
      - Chunked arrays
      - Distributed ready
      fit_for:
      - Larger-than-memory triangles
      - Distributed computing clusters
      - Lazy evaluation
      not_fit_for:
      - Single-machine workflows
      - Small datasets
      - Real-time processing
    default: sparse
  - name: array_backend_priority
    description: Backend selection order when AUTO_SPARSE configuration is enabled
    options:
    - name: dask,sparse,cupy,numpy
      traits:
      - Dask-first
      - Distributed computing priority
      fit_for:
      - HPC environments
      - Distributed workflows
      not_fit_for:
      - Single-machine workflows
    - name: sparse,cupy,numpy,dask
      traits:
      - Sparse-first
      - Balanced performance
      fit_for:
      - General use
      - Mixed workloads
      not_fit_for:
      - Dense triangles
      - GPU-only workflows
    default: sparse
  design_decisions:
  - 'Sparse COO array as default storage - Insurance triangles are ~60% sparse; sparse avoids storing
    NaNs. Evidence: chainladder/core/triangle.py:305(sp(...))'
  - 'ULT_VAL defaults to 2261-12-31 - Far-future date ensures LDF/CDF calculations don''t overflow. Evidence:
    chainladder/__init__.py:7(ULT_VAL)'
  - 'Grain auto-detection (Y/S/Q/M) - Infer date granularity from data to avoid manual specification.
    Evidence: chainladder/core/base.py:394(_get_grain)'
  - 'Development lag = (valuation-origin)/(365.25/12) - Monthly development periods regardless of origin
    grain. Evidence: chainladder/core/base.py:391(_development_lag)'
  - 'TriangleBase inherits from TriangleIO, TriangleDisplay, TriangleSlicer, TriangleDunders, TrianglePandas,
    Common - Massive mixin composition for interface segregation. Evidence: chainladder/core/base.py:class
    TriangleBase'
  acceptance_hints:
  - Triangle created from DataFrame maintains 4D shape with datetime origin/development indices
  - Sparse memory footprint is < 50% of dense equivalent for typical insurance triangles
  - Backend switching via set_backend completes without data loss
  - loc/iloc indexing returns valid triangles respecting origin <= development constraint
- id: development_pattern_estimation
  name: Development Pattern Estimation
  order: 2
  responsibility: 'Computes loss development factors (LDFs) and cumulative development factors (CDFs)
    from historical triangle data. WHY: LDFs are the foundation of each chain ladder reserving methods.'
  interface:
    inputs:
    - Cumulative Triangle with is_cumulative=True
    outputs:
    - ldf_, cdf_, sigma_, std_err_ triangles representing development patterns
  required_methods:
  - name: Development.fit_transform
    description: Fits LDF estimator to triangle and transforms to attach ldf_, cdf_, sigma_, std_err_
      attributes
    evidence: chainladder/development/development.py:11(Development.fit_transform)
  - name: WeightedRegression.fit
    description: Closed-form regression solver producing LDFs with Mack stochastic properties
    evidence: chainladder/utils/weighted_regression.py:10(WeightedRegression.fit)
  - name: TweedieGLM.fit
    description: GLM-based LDF estimation using Patsy formulas for overdispersed Poisson model
    evidence: chainladder/development/glm.py:13(TweedieGLM.fit)
  key_behaviors:
  - behavior: Thru-origin regression (intercept=0)
    description: LDF regression forces zero-intercept because LDF at age 0 is 1.0 by actuarial theory
    evidence: chainladder/utils/weighted_regression.py:75(_fit_OLS_thru_orig)
  - behavior: Volume-weighted averaging default
    description: Default average='volume' uses volume-weighted LDFs (exponent=1) following Mack (1993)
      methodology
    evidence: chainladder/development/base.py:18-22(fit - exponent mapping)
  - behavior: Drop mechanisms with order-dependent execution
    description: 'Drop adjustments apply in order: n_periods → drop_high/low → drop_above/below → drop_valuation
      → drop. Order matters for which observations remain'
    evidence: chainladder/development/base.py:87(_drop_adjustment)
  - behavior: preserve=1 minimum guarantee
    description: Default preserve=1 ensures at least 1 link ratio kept when dropping outliers, preventing
      empty LDF calculations
    evidence: chainladder/development/base.py:194-202(_drop_n)
  replaceable_points:
  - name: average
    description: LDF averaging method controlling weighting scheme for link ratio aggregation
    options:
    - name: volume
      traits:
      - Volume-weighted
      - Mack standard
      - exponent=1
      fit_for:
      - Standard reserving
      - Mack chain ladder
      - Industry practice
      not_fit_for:
      - Unstable low-volume cells
      - Expert smoothing
    - name: simple
      traits:
      - Simple average
      - Equal weighting
      - exponent=2
      fit_for:
      - Homogeneous data
      - Equal importance across cells
      not_fit_for:
      - Heterogeneous volume data
      - Large-cell dominance scenarios
    - name: regression
      traits:
      - Regression-weighted
      - Statistical fit
      - exponent=0
      fit_for:
      - Advanced smoothing
      - Statistical analysis
      not_fit_for:
      - Non-regression scenarios
      - Simple audits
    - name: 0.0-2.0
      traits:
      - Continuous exponent
      - Custom blending
      fit_for:
      - Custom weighting schemes
      - Research applications
      not_fit_for:
      - Standard reserving
      - Regulatory filings
    default: volume
  - name: sigma_interpolation
    description: Missing sigma estimation method for Mack stochastic variance calculations
    options:
    - name: log-linear
      traits:
      - Log-linear extrapolation
      - Regression-based
      - Smooth decay
      fit_for:
      - Standard Mack calculations
      - Tail extrapolation
      - Regular development patterns
      not_fit_for:
      - Irregular sigma patterns
      - Non-monotonic development
    - name: mack
      traits:
      - Mack ratio approximation
      - Mack (1993) original
      fit_for:
      - Exact Mack replication
      - Historical consistency
      not_fit_for:
      - Irregular patterns
      - Modern smoothing preferences
    default: log-linear
  - name: groupby
    description: Group triangles for pooled LDF estimation across multiple dimensions
    options:
    - name: 'null'
      traits:
      - No grouping
      - Individual estimation
      fit_for:
      - Single triangle
      - Distinct business segments
      not_fit_for:
      - Pooled estimation
      - Credibility weighting
    - name: callable
      traits:
      - Custom grouping function
      fit_for:
      - Complex grouping logic
      - Custom hierarchies
      not_fit_for:
      - Simple categorical grouping
    - name: list
      traits:
      - Column-based grouping
      fit_for:
      - Multi-column grouping
      - LOB-based pooling
      not_fit_for:
      - Single dimension
      - Complex hierarchies
    - name: str
      traits:
      - Single column grouping
      fit_for:
      - Simple LOB grouping
      - Line-of-business pooling
      not_fit_for:
      - Multi-dimensional grouping
    default: 'null'
  design_decisions:
  - 'Thru-origin regression (intercept=0) - LDF regression forces zero-intercept because LDF at age 0
    is 1.0. Evidence: chainladder/utils/weighted_regression.py:75(_fit_OLS_thru_orig)'
  - 'Average options: volume/regression/simple - Exponent controls weighting: volume(1), simple(2), regression(0).
    Evidence: chainladder/development/development.py:19(average)'
  - 'Sigma interpolation: log-linear vs Mack - Log-linear extrapolates missing sigma; Mack uses ratio
    approximation. Evidence: chainladder/utils/weighted_regression.py:98(sigma_fill)'
  - 'Drop mechanisms: drop_high/low/valuation/x - Multiple exclusion strategies for outliers. Evidence:
    chainladder/development/base.py:87(_drop_adjustment)'
  - 'n_periods=-1 means ''use each periods'' - Counter-intuitive default; -1 is sentinel for ''all'' vs
    positive values for ''last N periods''. Evidence: chainladder/development/development.py:76(n_periods=-1)'
  acceptance_hints:
  - LDFs attached to triangle via ldf_ attribute match expected 1.x range for typical development ages
  - cdf_ = ldf_.cumprod() produces monotonically increasing factors approaching infinity
  - sigma_ values decrease with development age following log-linear decay
  - Drop adjustments reduce link ratio count without producing empty LDFs
  - sample_weight passed through pipeline to each fitting steps
- id: reserving_methods
  name: Reserving Methods
  order: 3
  responsibility: 'Computes ultimate losses and IBNR from development patterns and (optionally) exposure.
    WHY: Different actuarial methods suit different data maturity levels.'
  interface:
    inputs:
    - Triangle (optionally with sample_weight/exposure), fitted ldf_/cdf_
    outputs:
    - ultimate_, ibnr_, full_triangle_, full_expectation_ triangles
  required_methods:
  - name: Chainladder.fit_predict
    description: Deterministic chain ladder computing ultimates as latest_diagonal × CDF
    evidence: chainladder/methods/chainladder.py:7(Chainladder.fit_predict)
  - name: MackChainladder.fit_predict
    description: Stochastic chain ladder with parameter and process risk estimation per Mack (1993)
    evidence: chainladder/methods/mack.py:9(MackChainladder.fit_predict)
  - name: BornhuetterFerguson.fit_predict
    description: Exposure-based reserving with single Bornhuetter-Ferguson iteration
    evidence: chainladder/methods/bornferg.py:7(BornhuetterFerguson.fit_predict)
  - name: CapeCod.fit_predict
    description: Self-funding BF using trended exposures derived from triangle data
    evidence: chainladder/methods/capecod.py:10(CapeCod.fit_predict)
  - name: Benktander.fit_predict
    description: Iterated Bornhuetter-Ferguson with configurable iterations for credibility blending
    evidence: chainladder/methods/benktander.py:8(Benktander.fit_predict)
  key_behaviors:
  - behavior: CDF alignment to latest diagonal
    description: Scales CDF so current reserves match reported losses, preventing discontinuity between
      actual and projected losses
    evidence: chainladder/methods/base.py:26(_align_cdf)
  - behavior: Auto-validation with Development.fit_transform
    description: MethodBase.validate_X auto-applies Development().fit_transform() if ldf_ missing, silently
      modifying input triangles
    evidence: chainladder/methods/base.py:18-24(validate_X)
  - behavior: Mack requires sigma_ attribute
    description: MackChainladder.fit raises ValueError if sigma_ attribute missing, requiring volume-weighted
      Development
    evidence: chainladder/methods/mack.py:60-61(fit)
  - behavior: Benktander inheritance pattern
    description: BornhuetterFerguson, CapeCod, and ExpectedLoss each inherit from Benktander sharing _get_ultimate
      logic
    evidence: chainladder/methods/bornferg.py:7(class BornhuetterFerguson(Benktander))
  replaceable_points:
  - name: n_iters
    description: BF iterations determining method type (1=BF, >1=Benktander)
    options:
    - name: '1'
      traits:
      - Single iteration
      - Deterministic BF
      fit_for:
      - Standard BF
      - Mature triangles
      - Simple reserving
      not_fit_for:
      - Immature triangles
      - Credibility blending
    - name: 2-5
      traits:
      - Multiple iterations
      - Benktander credibility
      fit_for:
      - Immature triangles
      - Credibility weighting
      - Industry practice
      not_fit_for:
      - Mature triangles
      - Simple deterministic reserving
    default: '1'
  - name: apriori
    description: Exposure multiplier for BF/Benktander controlling a priori weight
    options:
    - name: '1.0'
      traits:
      - Equal weight
      - Standard BF
      fit_for:
      - Balanced reserving
      - Standard practice
      not_fit_for:
      - Heavy-tailed business
      - Expert judgment weighting
    - name: 0.0-1.0
      traits:
      - Reduced a priori
      - Data-driven
      fit_for:
      - Mature data
      - Low uncertainty
      not_fit_for:
      - Immature triangles
      - High a priori confidence
    - name: '>1.0'
      traits:
      - Elevated a priori
      - Conservative
      fit_for:
      - Immature triangles
      - Expert judgment
      - Regulatory conservatism
      not_fit_for:
      - Mature triangles
      - Low uncertainty data
    default: '1.0'
  - name: trend
    description: Annual trend rate for CapeCod exposure trending
    options:
    - name: '0.0'
      traits:
      - No trend
      - Level premiums
      fit_for:
      - Stable environment
      - Current dollars
      not_fit_for:
      - Inflation-adjusted reserving
      - Trend-aware analysis
    - name: positive
      traits:
      - Positive inflation
      fit_for:
      - Medical inflation
      - Social inflation
      - Rising costs
      not_fit_for:
      - Deflationary environments
      - Stable costs
    - name: negative
      traits:
      - Negative trend
      fit_for:
      - Deflationary periods
      - Cost reductions
      not_fit_for:
      - Normal inflation environments
    default: '0.0'
  design_decisions:
  - 'CDF alignment to latest diagonal - Scales CDF so current reserves match reported losses. Evidence:
    chainladder/methods/base.py:26(_align_cdf)'
  - 'sample_weight as exposure for BF/CapeCod - Apriori exposure required for exposure-based methods.
    Evidence: chainladder/methods/benktander.py:62(if sample_weight is None)'
  - 'Mack recursion for parameter/process risk - Recursive formula propagates variance through development.
    Evidence: chainladder/methods/mack.py:121(_mack_recursion)'
  - 'CapeCod self-funding: derive apriori from data - No external exposure needed; uses weighted average
    of ultimates. Evidence: chainladder/methods/capecod.py:98(_get_capecod_aprioris)'
  - 'ultimate_ attribute required for ibnr_, full_expectation_, full_triangle_ - Methods must set ultimate_
    or Common properties raise AttributeError. Evidence: chainladder/core/common.py:94-130(ibnr_, full_expectation_,
    full_triangle_)'
  acceptance_hints:
  - ultimate_ = latest_diagonal × cdf produces monotonically increasing ultimates
  - ibnr_ = ultimate_ - latest_diagonal gives positive reserves for future development
  - full_triangle_ contains each projected values including zeros for future origin periods
  - Mack prediction error satisfies sqrt(variance) contract
  - Methods auto-fit Development if ldf_ missing from input triangle
- id: tail_estimation
  name: Tail Factor Estimation
  order: 4
  responsibility: 'Extrapolates development patterns beyond observed maturity to ultimate. WHY: Claims
    can take decades to fully develop; tail bridges to 100% CDF.'
  interface:
    inputs:
    - Triangle with ldf_ (may lack final period)
    outputs:
    - ldf_ with tail, tail_ (point estimate), sigma_/std_err_ extended
  required_methods:
  - name: TailCurve.fit_transform
    description: Extrapolates LDFs using exponential/inverse-power/weibull curve fitting
    evidence: chainladder/tails/curve.py:11(TailCurve.fit_transform)
  - name: TailBondy.fit_transform
    description: Generalized Bondy exponent curve fitting via least_squares optimization
    evidence: chainladder/tails/bondy.py:11(TailBondy.fit_transform)
  - name: TailConstant.fit_transform
    description: No tail extension (ldf=1.0 for future periods)
    evidence: chainladder/tails/constant.py:9(TailConstant.fit_transform)
  key_behaviors:
  - behavior: TailBase extends DevelopmentBase
    description: Every tail estimators inherit DevelopmentBase fit/transform logic, including drop/n_periods
      handling
    evidence: chainladder/tails/base.py:9(class TailBase)
  - behavior: Auto-apply Development if ldf_ missing
    description: TailBase.fit auto-applies Development().fit_transform() if ldf_ missing before calculating
      tail
    evidence: chainladder/tails/base.py:15-16(fit)
  - behavior: Decay-based initial LDF seed
    description: Quadratic series expansion solves for initial tail LDF providing smooth decay into tail
    evidence: chainladder/tails/base.py:77(_get_initial_ldf)
  - behavior: Tail sigma via log-linear extrapolation
    description: Extrapolate sigma to tail period using regression on log(sigma) maintaining Mack stochastic
      properties
    evidence: chainladder/tails/base.py:108(_get_tail_stats)
  replaceable_points:
  - name: curve
    description: Tail shape function determining extrapolation functional form
    options:
    - name: exponential
      traits:
      - Exponential decay
      - Most common
      - Stable tail
      fit_for:
      - Standard reserving
      - Regular development
      - Industry practice
      not_fit_for:
      - Heavy-tailed business
      - Long-tail liability
    - name: inverse_power
      traits:
      - Power law decay
      - Heavy-tailed
      - Slow decay
      fit_for:
      - Long-tail lines
      - Workers compensation
      - Malpractice
      not_fit_for:
      - Short-tail lines
      - Fast convergence
    - name: weibull
      traits:
      - Weibull decay
      - Flexible shape
      - Generalized
      fit_for:
      - Variable tail behavior
      - Research applications
      not_fit_for:
      - Standard reserving
      - Regulatory filings
    - name: bondy
      traits:
      - Bondy exponent
      - Data-driven
      - Optimized
      fit_for:
      - Tail-sensitive analysis
      - Expert calibration
      not_fit_for:
      - Standard practice
      - Quick estimates
    default: exponential
  - name: attachment_age
    description: Where tail attaches to observed LDFs (latest age or specified age)
    options:
    - name: latest age
      traits:
      - Auto-detect
      - Data-driven
      fit_for:
      - Standard use
      - Most triangles
      not_fit_for:
      - Early termination
      - Known maturity
    - name: int
      traits:
      - Fixed age
      - Explicit control
      fit_for:
      - Known maturity points
      - Expert judgment
      not_fit_for:
      - Variable maturity
      - Automated pipelines
    default: latest age
  - name: decay
    description: Decay rate parameter for exponential tail function
    options:
    - name: '1.0'
      traits:
      - Standard decay
      fit_for:
      - Most triangles
      - Balanced tail
      not_fit_for:
      - Fast convergence
      - Slow convergence
    - name: 0.5-2.0
      traits:
      - Adjusted decay
      fit_for:
      - Calibrated tails
      - Expert judgment
      not_fit_for:
      - Standard reserving
    default: '1.0'
  design_decisions:
  - 'Decay-based initial LDF seed - Quadratic series expansion solves for initial tail LDF. Evidence:
    chainladder/tails/base.py:77(_get_initial_ldf)'
  - 'Tail sigma via log-linear extrapolation - Extrapolate sigma to tail period using regression on log(sigma).
    Evidence: chainladder/tails/base.py:108(_get_tail_stats)'
  - 'Bondy exponent fitting via least_squares - Optimize power-law exponent to match observed LDFs. Evidence:
    chainladder/tails/bondy.py:97(least_squares)'
  - 'projection_period default=12 months - Extend 12 months beyond last observed development. Evidence:
    chainladder/tails/base.py:18(projection_period)'
  - 'projection_period=12 default determines tail length - Changing projection_period changes tail length
    for each tail estimators. Evidence: chainladder/tails/base.py:18-21(fit - self.projection_period)'
  acceptance_hints:
  - Tail factors multiply to produce CDF approaching 1.0 at ULT_VAL
  - Tail sigma values continue log-linear decay pattern from observed development
  - Tail attachment point connects smoothly without discontinuity
  - ldf_ attribute extended with additional development periods beyond observed data
- id: adjustments
  name: Triangle Adjustments
  order: 5
  responsibility: 'Pre-processing transformers for trend, bootstrap sampling, and parallelogram adjustments.
    WHY: Raw triangles may need normalization before analysis.'
  interface:
    inputs:
    - Triangle
    outputs:
    - Transformed Triangle with trend_, resampled_triangles_, or OLF applied
  required_methods:
  - name: Trend.fit_transform
    description: Apply compound trend factors to triangles along origin or valuation axis
    evidence: chainladder/adjustments/trend.py:10(Trend.fit_transform)
  - name: BootstrapODPSample.fit_transform
    description: ODP bootstrap resampling for stochastic analysis generating simulated triangles
    evidence: chainladder/adjustments/bootstrap.py:13(BootstrapODPSample.fit_transform)
  - name: ParallelogramOLF.fit_transform
    description: Convert parallelogram format to triangle format applying on-level factors
    evidence: chainladder/adjustments/parallelogram.py:11(ParallelogramOLF.fit_transform)
  - name: BerquistSherman.fit_transform
    description: Adjust for case reserve changes normalizing historical development
    evidence: chainladder/adjustments/berqsherm.py:11(BerquistSherman.fit_transform)
  key_behaviors:
  - behavior: ODP bootstrap uses Pearson residuals
    description: Residuals scaled by sqrt(expected)^k for overdispersed Poisson following Mack (1993)
      ODP bootstrap
    evidence: chainladder/adjustments/bootstrap.py:130(unscaled_residuals)
  - behavior: BootstrapODPSample extends DevelopmentBase
    description: Bootstrap inherits each DevelopmentBase fit/transform logic, being a development transformer
      producing simulated triangles
    evidence: chainladder/adjustments/bootstrap.py:class BootstrapODPSample(DevelopmentBase)
  - behavior: Hat matrix adjustment option
    description: DF adjustment vs hat matrix for residual standardization; hat is more conservative
    evidence: chainladder/adjustments/bootstrap.py:108(hat_adj)
  - behavior: Trend axis flexibility
    description: Origin trend adjusts a priori exposure; valuation trend adjusts displayed results
    evidence: chainladder/adjustments/trend.py:25(axis)
  replaceable_points:
  - name: hat_adj
    description: Residual standardization method for ODP bootstrap
    options:
    - name: 'true'
      traits:
      - Hat matrix adjustment
      - Conservative
      - Lower variance
      fit_for:
      - Regulatory reserving
      - Conservative estimates
      - Lower capital
      not_fit_for:
      - Research applications
      - Optimistic scenarios
    - name: 'false'
      traits:
      - DF adjustment
      - Standard bootstrap
      fit_for:
      - Standard practice
      - Academic research
      not_fit_for:
      - Regulatory conservatism
      - Low variance requirements
    default: 'true'
  - name: axis
    description: Trend application axis for Trend adjustment
    options:
    - name: origin
      traits:
      - A priori adjustment
      - Exposure trending
      fit_for:
      - Exposure-based methods
      - BF/CapeCod
      - Premium trending
      not_fit_for:
      - Display adjustments
      - Historical analysis
    - name: valuation
      traits:
      - Display adjustment
      - Historical trending
      fit_for:
      - Historical analysis
      - Inflation adjustment
      - Reporting
      not_fit_for:
      - Exposure-based methods
      - Forward projections
    default: origin
  design_decisions:
  - 'ODP bootstrap uses Pearson residuals - Residuals scaled by sqrt(expected)^k for overdispersed Poisson.
    Evidence: chainladder/adjustments/bootstrap.py:130(unscaled_residuals)'
  - 'Hat matrix adjustment option - DF adjustment vs hat matrix for residual standardization. Evidence:
    chainladder/adjustments/bootstrap.py:108(hat_adj)'
  - 'Trend axis: origin vs valuation - Origin trend adjusts a priori; valuation adjusts displayed results.
    Evidence: chainladder/adjustments/trend.py:25(axis)'
  acceptance_hints:
  - Bootstrap generates n_simulation resampled triangles preserving development patterns
  - Trend factors multiply consistently across each development periods
  - Parallelogram conversion produces valid triangle respecting origin <= development constraint
  - Berquist-Sherman adjustment produces normalized triangle with consistent case reserve changes
- id: workflow_ensemble
  name: Workflow and Ensemble
  order: 6
  responsibility: 'Pipeline orchestration, hyperparameter tuning, and model voting. WHY: Production reserving
    requires combining multiple transformers and methods.'
  interface:
    inputs:
    - Raw Triangle, estimator configurations
    outputs:
    - Fitted pipeline, grid search results, or ensemble ultimate
  required_methods:
  - name: Pipeline.fit_transform
    description: sklearn-style sequential transformer/estimator chain executing steps in order
    evidence: chainladder/workflow/gridsearch.py:106(Pipeline.fit_transform)
  - name: GridSearch.fit
    description: Exhaustive parameter search with scoring across parameter combinations
    evidence: chainladder/workflow/gridsearch.py:14(GridSearch.fit)
  - name: VotingChainladder.fit_predict
    description: Weighted average of multiple reserving methods producing ensemble ultimate
    evidence: chainladder/workflow/voting.py:157(VotingChainladder.fit_predict)
  key_behaviors:
  - behavior: Pipeline passes sample_weight to each steps
    description: Exposure needed by BF/CapeCod flows through transformer chain to estimator
    evidence: chainladder/workflow/gridsearch.py:144(fit)
  - behavior: VotingChainladder inherits from both _BaseChainladderVoting and MethodBase
    description: Ensemble methods are full estimators with fit/predict from MethodBase plus ensemble logic
    evidence: chainladder/workflow/voting.py:173(class VotingChainladder(_BaseChainladderVoting, MethodBase))
  - behavior: fit_predict contract for Pipeline chaining
    description: fit_predict must return predicted triangle; breaking it breaks Pipeline and GridSearch
    evidence: chainladder/workflow/gridsearch.py:139(fit_predict)
  - behavior: Parallel joblib execution
    description: n_jobs for CPU parallelization in GridSearch and Voting; grid search is embarrassingly
      parallel
    evidence: chainladder/workflow/gridsearch.py:97(Parallel)
  replaceable_points:
  - name: scoring
    description: GridSearch evaluation metric for parameter selection
    options:
    - name: 'null'
      traits:
      - No scoring
      - Best_params only
      fit_for:
      - Manual evaluation
      - Custom criteria
      not_fit_for:
      - Automated selection
      - Best model identification
    - name: callable
      traits:
      - Custom scoring function
      fit_for:
      - Domain-specific metrics
      - Expert criteria
      not_fit_for:
      - Standard metrics
      - Quick evaluation
    - name: dict
      traits:
      - Multiple scoring metrics
      fit_for:
      - Comprehensive evaluation
      - Multi-objective optimization
      not_fit_for:
      - Simple single-metric selection
    default: 'null'
  - name: weights
    description: VotingChainladder combination weights controlling method contribution
    options:
    - name: 'null'
      traits:
      - Equal weights
      fit_for:
      - Neutral blending
      - Equal confidence
      not_fit_for:
      - Method differentiation
      - Expert weighting
    - name: array
      traits:
      - Global weights
      - Equal across origins
      fit_for:
      - Simple blending
      - Equal importance
      not_fit_for:
      - Origin-specific weighting
    - name: list
      traits:
      - Ordered weights
      fit_for:
      - Simple specification
      - List of floats
      not_fit_for:
      - Named methods
      - Complex hierarchies
    - name: dict
      traits:
      - Named method weights
      fit_for:
      - Explicit mapping
      - Method identification
      not_fit_for:
      - Ordered-only
      - Simple arrays
    - name: callable
      traits:
      - Dynamic weighting
      - Origin-dependent
      fit_for:
      - Maturity-based weights
      - Expert judgment
      - Complex logic
      not_fit_for:
      - Static weights
      - Simple equal blending
    default: 'null'
  design_decisions:
  - 'Pipeline passes sample_weight to each steps - Exposure needed by BF/CapeCod in pipeline. Evidence:
    chainladder/workflow/gridsearch.py:144(fit)'
  - 'Weights support array/list/dict/callable - Flexible weighting by origin period or globally. Evidence:
    chainladder/workflow/voting.py:78(_coerce_assum_vector_to_array)'
  - 'Parallel joblib execution in GridSearch/Voting - n_jobs for CPU parallelization. Evidence: chainladder/workflow/gridsearch.py:97(Parallel)'
  - 'sklearn inheritance pattern: BaseEstimator + TransformerMixin for transformers, BaseEstimator for
    estimators - Enables Pipeline/GridSearch integration. Evidence: chainladder/development/base.py:14(DevelopmentBase)'
  acceptance_hints:
  - Pipeline.fit_transform produces same result as manual sequential calls to each step
  - GridSearch identifies optimal parameter combination from parameter grid
  - VotingChainladder weights sum to 1.0 or are normalized automatically
  - Parallel execution with n_jobs=-1 uses each available CPU cores
data_flow:
- from_stage: triangle_data_structure
  to_stage: development_pattern_estimation
  data: Cumulative Triangle (4D sparse array with origin/development dims, is_cumulative=True)
- from_stage: development_pattern_estimation
  to_stage: reserving_methods
  data: ldf_, cdf_, sigma_, std_err_ triangles attached to input triangle via ldf_ attribute
- from_stage: reserving_methods
  to_stage: reserving_methods
  data: sample_weight (exposure triangle matching X's shape) for BF/Benktander/CapeCod methods
- from_stage: development_pattern_estimation
  to_stage: tail_estimation
  data: Triangle with ldf_ lacking final development period (incomplete CDF)
- from_stage: tail_estimation
  to_stage: reserving_methods
  data: Extended ldf_/cdf_ with tail periods, sigma_/std_err_ extrapolated to ULT_VAL
- from_stage: adjustments
  to_stage: development_pattern_estimation
  data: Trend-adjusted or resampled triangles ready for LDF calculation
- from_stage: triangle_data_structure
  to_stage: workflow_ensemble
  data: Raw Triangle input to Pipeline or VotingChainladder
- from_stage: workflow_ensemble
  to_stage: reserving_methods
  data: Fitted Pipeline or VotingChainladder ultimate triangles via fit_predict
global_contracts:
- contract: Every Triangles use 4D shape (index, columns, origin, development) with datetime indices
  evidence: chainladder/core/triangle.py:312(shape=...)
- contract: Origin must be <= Development for each cells
  evidence: chainladder/core/base.py:157(origin<=development)
- contract: is_cumulative flag distinguishes cumulative from incremental triangles
  evidence: chainladder/core/triangle.py:252(is_cumulative)
- contract: valuation_date = max development date as Timestamp
  evidence: chainladder/core/triangle.py:239(val_date)
- contract: 'LDFs multiplied give CDFs: cdf = ldf.cumprod()'
  evidence: chainladder/core/common.py:80(cdf_)
- contract: ultimate = latest_diagonal × cdf (for chain ladder)
  evidence: chainladder/methods/chainladder.py:75(ultimate=ld*cdf)
- contract: ibnr = ultimate - latest_diagonal
  evidence: chainladder/core/common.py:94(ibnr_)
- contract: ULL_VAL='2261-12-31' marks ultimate development period
  evidence: chainladder/__init__.py:7(ULT_VAL)
- contract: ldf_ attribute is cross-module contract required by Development, Tail, and Methods
  evidence: chainladder/methods/base.py:20(if 'ldf_' not in obj), chainladder/tails/base.py:15(if 'ldf_'
    not in obj)
- contract: Common mixin provides has_ldf, cdf_, ibnr_, full_expectation_, full_triangle_ to both DevelopmentBase
    and MethodBase
  evidence: chainladder/core/common.py:62-130(class Common)
- contract: options.ULT_VAL constant used across modules for ultimate valuation date
  evidence: chainladder/methods/base.py:49(options.ULT_VAL), chainladder/core/common.py:42(options.ULT_VAL)
- contract: Common.set_backend provides numpy/sparse/cupy/dask abstraction used by each Triangle and estimator
    objects
  evidence: chainladder/core/common.py:135-202(set_backend)
business_decisions:
- id: BD-001
  type: B/BA
  content: Default LDF averaging method is 'volume' weighted, using exponents {volume:1, simple:2, regression:0}
    to control regression weighting
  rationale: 'Volume-weighted averaging gives more influence to larger, more credible accident years where
    losses are more stable. The exponent mapping allows fine control over how regression-based LDFs are
    blended with volume-weighted averages, providing flexibility while defaulting to a statistically sound
    approach. Boundary: Only affects LDF calculations when multiple link ratios are averaged; simple/exponential
    weighting used for non-regression cases.'
  evidence: chainladder/development/development.py:19(average),:139(exponent mapping)
  stage: development_pattern_estimation
  alternative_considered: Simple average (equal weights) would overweight small, volatile accident periods
  _evidence_issues:
  - 'INVALID_IDENTIFIER: average),:139(exponent mapping in chainladder/development/development.py'
- id: BD-002
  type: B
  content: n_periods=-1 uses each available origin periods for LDF calculation
  rationale: 'Using each available origin periods maximizes data utilization and statistical credibility
    of LDF estimates. This ensures no usable historical data is discarded. Boundary: Only applies when
    n_periods=-1; positive values limit to most recent n periods only.'
  evidence: chainladder/development/development.py:16(n_periods)
  stage: development_pattern_estimation
  alternative_considered: Limiting to recent periods could exclude relevant historical patterns
  _evidence_issues:
  - 'FN_NOT_FOUND: n_periods in chainladder/development/development.py'
- id: BD-003
  type: B
  content: preserve=1 ensures minimum 1 link ratio is retained even after exclusions, preventing degenerate
    calculations
  rationale: 'Setting preserve=1 prevents each link ratios from being excluded by drop_high/drop_low/drop_valuation,
    which would cause division-by-zero or undefined LDFs. This guards against accidentally removing 100%
    of data. Boundary: Applied after each exclusion methods; actual link ratio count = total - exclusions,
    floored at preserve value.'
  evidence: chainladder/development/development.py:42(preserve)
  stage: development_pattern_estimation
  alternative_considered: No preserve floor could result in NaN LDFs for each periods
  _evidence_issues:
  - 'FN_NOT_FOUND: preserve in chainladder/development/development.py'
- id: BD-004
  type: B/BA
  content: drop_above=inf and drop_below=0.0 means no automatic threshold exclusion of link ratios
  rationale: 'By default, no link ratios are excluded based on magnitude thresholds, allowing the full
    data range to contribute to LDF estimates. Users must explicitly set finite drop_above/drop_below
    values to trigger threshold-based exclusions. Boundary: Only affects threshold exclusion; rank-based
    exclusions (drop_high/low) operate independently.'
  evidence: chainladder/development/development.py:74(__init__)
  stage: development_pattern_estimation
  alternative_considered: Finite default thresholds could exclude valid data for unusual triangles
- id: BD-005
  type: B/BA
  content: drop_high/drop_low exclude outliers by rank position (highest/lowest n values) before averaging
  rationale: 'Rank-based outlier removal is simpler and more robust than threshold-based methods that
    depend on data distribution assumptions. It systematically removes extreme values regardless of how
    extreme they are. Boundary: Applied before averaging; count-based (n values) not percentage-based;
    separate from drop_above/drop_below threshold exclusions.'
  evidence: chainladder/development/base.py:122(_drop_n)
  stage: development_pattern_estimation
  alternative_considered: Threshold-based exclusion could miss outliers or exclude too many in skewed
    distributions
- id: BD-006
  type: B/BA
  content: Default tail=1.0 (no tail factor) with decay=0.5 (50% decay per period) for TailConstant
  rationale: 'Tail=1.0 represents the conservative no-tail assumption, while decay=0.5 provides a standard
    parametric decay rate if tail extension is enabled. The 50% decay per period is a common actuarial
    default that produces reasonable tail factors for typical development patterns. Boundary: Only active
    when tail extension is requested; decay controls how rapidly LDFs approach 1.0.'
  evidence: chainladder/tails/constant.py:8(TailConstant)
  stage: tail_estimation
  alternative_considered: More aggressive decay (lower value) would produce higher tail factors
- id: BD-007
  type: B/BA
  content: TailCurve default curve is 'exponential' with extrap_periods=100 and errors='ignore'
  rationale: 'Exponential curve is the standard parametric form for tail extrapolation in actuarial practice,
    based on the empirical observation that LDFs often follow exponential decay. extrap_periods=100 extends
    far beyond typical development periods (12-24 months) to reach maturity. Boundary: Curve fitting excludes
    LDFs below reg_threshold; errors=''ignore'' suppresses fitting warnings for sparse data.'
  evidence: chainladder/tails/curve.py:11(TailCurve)
  stage: tail_estimation
  alternative_considered: Alternative curves (inverse power, loglogistic) may better fit specific development
    patterns
- id: BD-008
  type: B/BA
  content: TailBondy uses scipy least_squares optimization with initial b=0.5 for generalized Bondy tail
  rationale: 'The Bondy method fits a parametric curve to each LDFs simultaneously using nonlinear least
    squares. Initial b=0.5 provides a reasonable starting point for the iterative optimizer, which then
    refines to minimize fitting error. Boundary: b0=0.5 is for generalized Bondy; standard Bondy uses
    fixed b; poor initial values may cause convergence issues.'
  evidence: chainladder/tails/bondy.py:93(least_squares)
  stage: tail_estimation
  alternative_considered: Fixed b parameter (standard Bondy) eliminates optimization but reduces flexibility
  _evidence_issues:
  - 'FN_NOT_FOUND: least_squares in chainladder/tails/bondy.py'
- id: BD-009
  type: B/BA
  content: sigma_interpolation defaults to 'log-linear' for filling missing sigma values
  rationale: 'Log-linear interpolation is appropriate for sigma (standard deviation of LDFs) because variances
    are multiplicative and often exhibit log-linear trends over development periods. This preserves the
    positive-only constraint of sigma values. Boundary: Only applies to missing sigma entries; requires
    at least two non-missing values for interpolation; Macack covariance requires complete sigma triangle.'
  evidence: chainladder/development/development.py:24(sigma_interpolation)
  stage: development_pattern_estimation
  alternative_considered: Linear interpolation could produce negative sigma values at boundaries
  _evidence_issues:
  - 'FN_NOT_FOUND: sigma_interpolation in chainladder/development/development.py'
  vague_rationale: true
- id: BD-010
  type: B/BA
  content: projection_period=12 months default for extending LDFs beyond last development age
  rationale: 'The 12-month projection period aligns with annual financial reporting cycles, ensuring tail
    factors extend to year-end valuations. This creates consistency between development period LDFs and
    annual tail extensions. Boundary: Only affects tail extrapolation beyond last observed development
    age; applies to both TailCurve and TailBondy methods.'
  evidence: chainladder/tails/base.py:9(TailBase)
  stage: tail_estimation
  alternative_considered: Shorter periods (6 months) would require more extrapolation iterations
- id: BD-011
  type: B/BA
  content: Benktander n_iters=1 for Bornhuetter-Ferguson, allowing iteration for Benktander method
  rationale: 'n_iters=1 makes Bornhuetter-Ferguson a single-pass method, consistent with its standard
    actuarial definition. Benktander iterates multiple times to converge on consistent ultimates. The
    single-iteration default maintains the distinction between these methods. Boundary: n_iters=0 gives
    ExpectedLoss (pure apriori); n_iters>1 enables Benktander convergence.'
  evidence: chainladder/methods/bornferg.py:7(BornhuetterFerguson)
  stage: reserving_methods
  alternative_considered: Default iteration >1 would blur distinction between BF and Benktander methods
- id: BD-012
  type: B/BA
  content: apriori=1.0 default multiplier for sample_weight in Bornhuetter-Ferguson/Benktander
  rationale: 'apriori=1.0 applies the sample_weight directly as expected losses without adjustment, providing
    a neutral starting point. Users scale apriori based on loss exposure modifications or actuarial judgment
    about expected loss ratios. Boundary: apriori multiplies sample_weight before division by CDF; different
    values shift the balance between reported and expected losses.'
  evidence: chainladder/methods/benktander.py:39(apriori)
  stage: reserving_methods
  alternative_considered: Different apriori assumptions reflect different prior beliefs about expected
    loss ratios
  _evidence_issues:
  - 'FN_NOT_FOUND: apriori in chainladder/methods/benktander.py'
- id: BD-013
  type: B/BA
  content: apriori_sigma=0.0 for deterministic mode; non-zero enables lognormal sampling in bootstrap
  rationale: 'apriori_sigma=0.0 produces deterministic outputs without uncertainty from apriori specification,
    suitable for point estimates. Non-zero values enable simulation of apriori uncertainty using lognormal
    distribution, providing confidence intervals that account for prior assumption variability. Boundary:
    sigma affects only stochastic simulation mode; has no effect on deterministic calculations.'
  evidence: chainladder/methods/benktander.py:8(Benktander)
  stage: reserving_methods
  alternative_considered: Zero sigma provides cleaner point estimates but understates total uncertainty
- id: BD-014
  type: B
  content: n_sims=1000 bootstrap simulations with hat_adj=True (hat matrix adjustment for residuals)
  rationale: 'n_sims=1000 provides adequate convergence for bootstrap distributions while maintaining
    reasonable computation time. hat_adj=True applies the hat matrix correction to residuals, which improves
    statistical properties of the bootstrap by accounting for parameter estimation uncertainty. Boundary:
    hat_adj affects residual scaling; n_sims affects distribution smoothness; both impact confidence interval
    precision.'
  evidence: chainladder/adjustments/bootstrap.py:20(BootstrapChainladder)
  stage: bootstrap
  alternative_considered: Fewer simulations (100-500) would be faster but potentially less stable
  _evidence_issues:
  - 'FN_NOT_FOUND: BootstrapChainladder in chainladder/adjustments/bootstrap.py'
- id: BD-015
  type: B/BA
  content: CapeCod decay=1 means no decay weighting; decay<1 weights recent origins more heavily
  rationale: 'decay=1 gives equal weight to each origin periods, which is the standard Cape Cod assumption
    that each years contribute equally to the development pattern. decay<1 downweights older origins,
    useful when development patterns have shifted over time. Boundary: decay parameter applies to the
    development pattern weights, not the exposure weights; decay<0 is invalid.'
  evidence: chainladder/methods/capecod.py:10(CapeCod)
  stage: reserving_methods
  alternative_considered: decay<1 with high recency may overreact to recent volatile periods
- id: BD-016
  type: B
  content: Ultimate = latest_diagonal * CDF where CDF aligns to valuation_date using nan_triangle
  rationale: 'The chainladder method computes ultimates by projecting current reserves (latest diagonal)
    through remaining development factors (CDF). The nan_triangle ensures proper alignment of development
    periods to valuation dates, handling missing values appropriately. Boundary: Only applicable to reported
    claims on the latest diagonal; future claims require separate Bornhuetter-Ferguson treatment.'
  evidence: chainladder/methods/chainladder.py:70(_get_ultimate)
  stage: reserving_methods
  alternative_considered: Different alignment methods could produce materially different results for sparse
    triangles
  vague_rationale: true
- id: BD-017
  type: B/BA
  content: Developed LDFs forced through origin (thru_orig=True) in WeightedRegression for link ratios
  rationale: 'Forcing regression through the origin (0,1) reflects the actuarial assumption that at age
    zero, LDF must equal 1 (no development has occurred yet). This constraint improves extrapolation reliability
    and aligns with theoretical expectations. Boundary: thru_orig=True forces intercept=0; affects only
    regression-based LDFs; simple averages are unaffected.'
  evidence: chainladder/utils/weighted_regression.py:10(WeightedRegression)
  stage: development_pattern_estimation
  alternative_considered: Free regression (thru_orig=False) could produce implausible extrapolations near
    origin
- id: BD-018
  type: B/BA
  content: Development lags calculated as (valuation-origin) / (365.25/12) = months difference
  rationale: 'Using 365.25/12 (average days per month) provides accurate month-based development lag calculations
    that account for leap years. This ensures consistency across different calendar periods and aligns
    with actuarial convention. Boundary: Results in fractional months for non-monthly grain; used for
    LDF indexing and interpolation.'
  evidence: chainladder/core/base.py:391(Triangle.development_lag)
  stage: core
  alternative_considered: Simple 365/12 would introduce small systematic errors accumulating over many
    periods
  _evidence_issues:
  - 'FN_NOT_FOUND: Triangle.development_lag in chainladder/core/base.py'
- id: BD-019
  type: B/BA
  content: origin_date represents period START; development_date represents period END
  rationale: 'This convention aligns with insurance accounting where origin periods define when losses
    occurred (accident year) and development dates represent when they are observed (valuation year).
    The start-to-end semantics ensure consistent triangle construction and LDF calculation. Boundary:
    Every triangle operations assume origin=start and development=end; violating this produces incorrect
    LDFs.'
  evidence: chainladder/core/triangle.py:32(Triangle)
  stage: core
  alternative_considered: Alternative conventions exist in some actuarial systems but would be inconsistent
    with insurance industry standards
- id: BD-020
  type: B
  content: ULT_VAL='2261-12-31' sentinel date represents infinite/ultimate maturity
  rationale: 'The far-future date 2261-12-31 serves as a practical sentinel for ''ultimate maturity''
    (no further development). Using a distant future date avoids conflicts with real calendar dates while
    clearly signaling the theoretical endpoint. Boundary: Applies only as valuation date for ultimate
    periods; tail factors for this date should equal 1.0.'
  evidence: chainladder/__init__.py:7(ULT_VAL)
  stage: core
  alternative_considered: None/NaN would be ambiguous; explicit infinite date would require special handling
  _evidence_issues:
  - 'FN_NOT_FOUND: ULT_VAL in chainladder/__init__.py'
- id: BD-021
  type: B
  content: drop_valuation removes specific calendar periods from LDF calculation (not rank-based)
  rationale: 'drop_valuation operates on calendar periods rather than rank positions, allowing exclusion
    of specific quarters or years that may be affected by unusual events (catastrophes, law changes).
    This provides more targeted exclusion than drop_high/drop_low. Boundary: Applies to calendar date
    ranges, not development periods; operates independently from rank-based exclusions.'
  evidence: chainladder/development/base.py:313(_drop_valuation)
  stage: development_pattern_estimation
  alternative_considered: Rank-based exclusions cannot target specific calendar periods
- id: BD-022
  type: B
  content: fillna=None - zero/NAN values in triangle are excluded from LDF calculation
  rationale: 'Excluding NaN and zero values ensures LDFs are calculated only from valid, non-trivial link
    ratios. This prevents division artifacts and focuses on meaningful development observations. fillna=0
    would incorrectly weight missing data as zero development. Boundary: fillna=None excludes; fillna=''mean''
    would substitute average values; fillna=0 would create false zero ratios.'
  evidence: chainladder/development/development.py:74(__init__)
  stage: development_pattern_estimation
  alternative_considered: fillna='mean' could mask data gaps with artificial values
- id: BD-023
  type: B/BA
  content: ARRAY_BACKEND defaults to 'numpy'; AUTO_SPARSE=True enables automatic sparse conversion
  rationale: 'Numpy provides the standard dense array operations expected in Python scientific computing.
    AUTO_SPARSE=True automatically converts to sparse matrices when triangles are sparse (many NaN), optimizing
    memory and computation. Boundary: Different backends (jax, torch) may have different numerical properties;
    sparse conversion threshold is backend-dependent.'
  evidence: chainladder/__init__.py:4(ARRAY_BACKEND)
  stage: core
  alternative_considered: Dense-only mode would be slower for sparse triangles but potentially more consistent
  _evidence_issues:
  - 'FN_NOT_FOUND: ARRAY_BACKEND in chainladder/__init__.py'
- id: BD-024
  type: B/BA
  content: ExpectedLoss n_iters=0 bypasses CDF weighting - apriori alone determines ultimate
  rationale: 'n_iters=0 makes ExpectedLoss purely a priori based, ignoring any reported loss development.
    This represents the most conservative approach where only expected loss ratios determine ultimates.
    This is the logical boundary case between BF (n_iters=1) and pure a priori methods. Boundary: n_iters=0
    ignores reported losses entirely; n_iters>0 would iteratively incorporate actual development.'
  evidence: chainladder/methods/expectedloss.py:7(ExpectedLoss)
  stage: reserving_methods
  alternative_considered: Any iteration would blend in actual reported development, moving toward BF/Benktander
- id: BD-025
  type: B/BA
  content: 'TailBase decay formula: ldf = 1 + initial * (decay^period) where initial from quadratic expansion'
  rationale: 'The exponential decay formula ensures LDFs smoothly approach 1.0 as periods increase, consistent
    with theoretical development patterns. The initial LDF from quadratic expansion provides appropriate
    starting values for the decay curve. Boundary: decay^period → 0 as period → ∞, so ldf → 1+initial;
    decay<1 required for convergence.'
  evidence: chainladder/tails/base.py:78(_get_initial_ldf)
  stage: tail_estimation
  alternative_considered: Alternative decay functions (linear, hyperbolic) would produce different tail
    factor shapes
  vague_rationale: true
- id: BD-026
  type: B/BA
  content: Mack std err = sqrt(parameter_risk^2 + process_risk^2) in quadrature
  rationale: 'The Mack model separates parameter uncertainty (estimation error in LDFs) from process variance
    (random fluctuation in claims). Adding in quadrature (square root of sum of squares) is the standard
    approach for combining independent uncertainty sources. Boundary: Assumes independence between parameter
    and process risk; covariance terms are neglected; results are approximate for skewed distributions.'
  evidence: chainladder/methods/mack.py:9(MackChainladder)
  stage: reserving_methods
  alternative_considered: Simpler additive approach would overstate uncertainty by ignoring independence
- id: BD-027
  type: B/RC
  content: 'Development grain auto-inferred: Y (12mo), S (6mo), Q (3mo), M (1mo) from data spacing'
  rationale: 'Auto-inference of development grain from data periodicity ensures correct LDF indexing without
    manual specification. The hierarchy Y>S>Q>M captures the most natural granularity consistent with
    the data. Boundary: Infers from spacing alone; manual override required for mixed-grain triangles;
    semiannual mapped to 2 quarters, not ''S''.'
  evidence: chainladder/core/base.py:394(_get_grain)
  stage: core
  alternative_considered: Default to monthly grain would cause incorrect indexing for annual data
- id: BD-028
  type: B/BA
  content: reg_threshold=(1.00001, None) lower bound for tail curve fitting excludes LDFs near 1.0
  rationale: 'Excluding LDFs very close to 1.0 prevents fitting to periods where development has essentially
    ceased, which would distort tail extrapolation. The 1.00001 threshold is slightly above 1.0 to capture
    the transition point while excluding fully mature periods. Boundary: Only affects TailCurve regression;
    other methods unaffected; threshold must be <2 for valid fitting.'
  evidence: chainladder/tails/curve.py:11(TailCurve)
  stage: tail_estimation
  alternative_considered: Including each LDFs would weight mature periods equally with developing periods
