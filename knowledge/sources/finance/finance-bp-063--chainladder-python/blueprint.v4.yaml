- id: BD-081
  type: BA
  content: 'INTERACTION: [BD-061] × [BD-070] → Auto-compute cascade where MethodBase and TailBase both
    auto-apply Development().fit_transform() when ldf_ missing, potentially computing LDFs twice with
    different parameters'
  rationale: Both MethodBase.validate_X and TailBase.fit independently trigger Development().fit_transform()
    when ldf_ is absent. If a pipeline uses both tail and method estimators, the LDF computation may run
    twice with potentially different default parameters (n_periods, drop settings, averaging). This creates
    silent inconsistency where tail extension may use different LDFs than method ultimates. Occurs in
    workflows where users chain TailCurve.fit_transform() then MethodBase.fit() without explicit ldf_
    pre-computation.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Single auto-compute entry point would prevent duplicate computation
- id: BD-082
  type: B/BA
  content: 'INTERACTION: [BD-006] × [BD-025] → Conservative tail=1.0 with exponential decay creates non-intuitive
    tail behavior: default decay=0.5 produces substantial tail factors only if tail extension explicitly
    enabled'
  rationale: BD-006 sets tail=1.0 (no tail by default) while BD-025 defines decay=0.5 as the decay rate
    for TailConstant when tail IS enabled. The default conservative setting means decay is never applied
    unless users explicitly request tail extension. This creates a gap where the 50% decay per period
    parameter (designed for tail modeling) has no effect in default workflows. Users expecting TailConstant
    to apply conservative tail factors by default will get none.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Non-unity tail default would make decay parameter immediately relevant
- id: BD-083
  type: BA
  content: 'INTERACTION: [BD-004] × [BD-005] → No threshold exclusion + rank-based outlier removal: drop_high/low
    operate on absolute ranks regardless of whether values are truly extreme, potentially excluding valid
    data'
  rationale: 'BD-004 disables threshold-based exclusion (drop_above=inf, drop_below=0) by default, while
    BD-005 enables rank-based exclusion. This combination means outliers are removed by count (e.g., highest
    1 value) without any check on whether that value is actually extreme. A 2.0 LDF gets dropped as aggressively
    as a 10.0 LDF simply because it''s the highest. This creates tension: threshold exclusion would be
    more targeted but is disabled by default, forcing users to understand both exclusion mechanisms.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Finite default drop_above/drop_below thresholds would complement rank exclusion
- id: BD-084
  type: T
  content: 'INTERACTION: [BD-065] × [BD-009] → Mack requires sigma_ but sigma_interpolation is log-linear:
    users with sparse data may get Mack errors based on interpolated sigma values they never explicitly
    chose'
  rationale: 'BD-065 mandates sigma_ attribute for MackChainladder fitting, while BD-009 defaults to log-linear
    sigma_interpolation for missing values. This creates a hidden dependency: Mack confidence intervals
    depend on sigma values that may be synthetic (interpolated) rather than observed. Users who don''t
    realize sigma_interpolation is active may believe their Mack standard errors reflect actual data volatility
    when they''re partially model-based. The interaction is particularly problematic for sparse triangles
    where interpolation drives most sigma values.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Explicit sigma_interpolation flag in MackChainladder would make interpolation
    dependency visible
- id: BD-085
  type: BA/M
  content: 'INTERACTION: [BD-017] × [BD-043] → thru_orig=True forces regression through (0,1) but OLS
    formula may produce negative slopes for downward-trending LDFs, creating contradiction in theoretical
    constraint application'
  rationale: BD-017 enforces that LDF regressions pass through origin (intercept=0, LDF=1 at age 0), reflecting
    the actuarial assumption that development hasn't started at time zero. However, BD-043's OLS formula
    may produce slopes that, when forced through origin, result in fitted LDFs that decrease below 1.0
    for early development periods - which is theoretically impossible (LDFs cannot go below 1.0). The
    constraint applied at origin conflicts with the downward LDF pattern typical in mature development
    ages.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Constrained optimization with LDF>=1 boundary would prevent invalid fits
- id: BD-086
  type: B
  content: 'INTERACTION: [BD-032] × [BD-046] → ODP bootstrap with hat_adj=True: Pearson residuals combined
    with hat matrix adjustment may understate uncertainty for highly-leveraged observations'
  rationale: 'BD-032 defines the ODP bootstrap using Pearson residuals and resampling with replacement,
    while BD-046 specifies hat matrix adjustment (k_value=1) for residual standardization. The hat adjustment
    corrects for parameter estimation uncertainty but can increase variance estimates for high-leverage
    points (sparse triangles with influential observations). This creates a cascade: triangles with sparse
    data (few observations) get larger hat adjustments, which can paradoxically widen uncertainty intervals
    more than warranted for genuinely credible large cells.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Fixed k_value scaling regardless of leverage was rejected to maintain statistical
    properties
- id: BD-087
  type: T
  content: 'RISK CASCADE: [BD-009] → [BD-029] → [BD-026] → [BD-065]: sigma_interpolation default log-linear
    fills missing sigma values, which propagate to tail sigma extrapolation (BD-029), affecting Mack standard
    error calculation (BD-026), which MackChainladder requires (BD-065)'
  rationale: This is a four-stage risk cascade where each decision depends on the previous. BD-009 defaults
    to log-linear sigma_interpolation, filling gaps in sigma triangle. BD-029 then extrapolates these
    (potentially interpolated) sigma values into the tail using the same log-linear approach. BD-026 computes
    Mack standard errors using these extrapolated tail sigma values. BD-065 mandates sigma_ existence
    before Mack fitting. The cascade means that any error or assumption violation in sigma_interpolation
    (e.g., sigma values not following log-linear pattern) propagates through to final reserve confidence
    intervals without user awareness.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Explicit sigma extrapolation independence from interpolation would break the
    cascade
- id: BD-088
  type: BA
  content: 'RISK CASCADE: [BD-016] × [BD-079] × [BD-067]: Ultimate calculation uses CDF alignment (BD-079)
    with ldf_ contract (BD-067), where tail extension modifies ldf_ to include projections beyond observed
    data, creating potential for tail-dominated ultimate estimates'
  rationale: This cascade occurs when tail estimators (TailCurve, TailBondy) extend ldf_ by adding projected
    development periods beyond observed data. BD-079's _align_cdf then applies these extended CDFs to
    the latest diagonal. For triangles with short observed development periods, the tail factor can dominate
    the CDF (e.g., tail factor of 1.5 applied to 12-month data). The ldf_ contract (BD-067) allows seamless
    chaining but hides whether ultimates are driven by observed or extrapolated data. Users cannot distinguish
    between observed-based and tail-dominated estimates without inspecting ldf_ content.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Separate observed vs tail ultimate components would enable transparency
- id: BD-089
  type: B/BA
  content: 'INTERACTION: [BD-012] × [BD-024] → apriori=1.0 default with ExpectedLoss n_iters=0 creates
    pure a priori method: sample_weight used directly as expected losses, ignoring ALL reported development'
  rationale: BD-012 sets apriori=1.0 as the default multiplier for sample_weight in Bornhuetter-Ferguson
    methods. BD-024 sets n_iters=0 for ExpectedLoss, bypassing CDF weighting entirely. Together, these
    create a workflow where sample_weight becomes the sole determinant of ultimate (no development adjustment).
    While individually reasonable (apriori neutral, n_iters=0 for pure expected method), the combination
    means users getting ExpectedLoss estimates have no development-based adjustment whatsoever - purely
    exposure-based reserving.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Non-unity apriori default would introduce implicit development weighting
- id: BD-090
  type: BA/DK
  content: 'INTERACTION: [BD-001] × [BD-037] × [BD-050] → Volume-weighted averaging exponents specified
    three times at different code locations: development.py:139 (exponent mapping), mack.py:105-108 (std_err
    weighting), development.py:138-160 (LDF averaging). Potential inconsistency if different exponent
    values used across modules.'
  rationale: 'The exponent mapping {volume:1, simple:2, regression:0} appears in multiple locations for
    different purposes: BD-001 for LDF averaging default, BD-050 for Development LDF computation, and
    BD-037 for Mack standard error weighting. While each currently reference the same exponent scheme,
    the three-location specification creates maintenance risk where a change to one location might not
    propagate to others. This hidden redundancy means developers must remember to update each three locations
    when modifying the weighting scheme.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Centralized constant definition would eliminate redundancy
- id: BD-091
  type: B/BA
  content: 'INTERACTION: [BD-022] × [BD-031] → fillna=None excludes NaN/zero values but groupby pooling
    may combine triangles with different NaN patterns, creating inconsistent LDF sample sizes across pooled
    groups'
  rationale: 'BD-022 specifies that NaN and zero values are excluded from LDF calculation (fillna=None).
    BD-031 enables pooling multiple triangles via groupby for joint LDF estimation. When pooling triangles
    with different data availability patterns, the exclusion behavior creates asymmetric sample sizes:
    one triangle might contribute 20 link ratios while another contributes only 5 due to different NaN
    distributions. This can bias pooled LDFs toward the triangle with more complete data, contradicting
    the equal-treatment assumption of pooling.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Per-triangle fillna handling before pooling would maintain consistency
