- id: BD-078
  type: B/RC
  content: options.ULT_VAL constant used across modules for ultimate valuation date (2262-04-11)
  rationale: The ULT_VAL constant (2262-04-11, the max timestamp) serves as a sentinel value representing
    the 'ultimate' future in actuarial calculations. Centralizing this magic number prevents inconsistencies.
    The boundary is that this date is far enough in the future that it effectively means 'ultimate' across
    each practical planning horizons.
  evidence: chainladder/methods/base.py:49(options.ULT_VAL), chainladder/core/common.py:42(options.ULT_VAL),
