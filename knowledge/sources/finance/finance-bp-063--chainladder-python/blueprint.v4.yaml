replaceable_slots:
- id: slot-001
  name: serialization_format
  description: Use dill for full Python object persistence; JSON for interoperability; CSV for tabular
    data export
  used_in_stages: []
  options:
  - name: dill_pickle
    traits:
    - complete object
    - lambda support
    - custom classes
    fit_for:
    - Full object persistence including closures and custom estimators
    not_fit_for:
    - Sharing across different Python versions, security-untrusted environments
  - name: json
    traits:
    - human-readable
    - interoperable
    - schema-defined
    fit_for:
    - Web APIs, sharing across languages, debugging
    not_fit_for:
    - Large objects, binary data, lambda functions
  - name: csv
    traits:
    - universal
    - spreadsheet-compatible
    - tabular
    fit_for:
    - Data export, Excel users, simple interchange
    not_fit_for:
    - Preserving object structure, complex nested data
  default: dill_pickle
  _source: worker_resource
- id: slot-002
  name: parallelization
  description: Use joblib for simple parallelization; dask.distributed for cluster computing
  used_in_stages: []
  options:
  - name: joblib_threads
    traits:
    - threading
    - in-process
    - low-overhead
    fit_for:
    - I/O-bound tasks, shared memory, simple setup
    not_fit_for:
    - CPU-bound GIL-bound operations (use n_jobs=1)
  - name: joblib_processes
    traits:
    - multiprocessing
    - bypass-GIL
    fit_for:
    - CPU-bound tasks on multi-core machines
    not_fit_for:
    - I/O-bound tasks, memory-constrained environments
  - name: dask_distributed
    traits:
    - cluster
    - out-of-core
    - lazy-evaluation
    fit_for:
    - HPC clusters, cloud distributed computing, large datasets
    not_fit_for:
    - Single machine, small datasets, quick prototyping
  default: joblib_threads
  _source: worker_resource
