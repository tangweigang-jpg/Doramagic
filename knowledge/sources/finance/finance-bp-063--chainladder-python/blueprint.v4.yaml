- id: BD-071
  type: B/RC
  content: VotingChainladder inherits from both _BaseChainladderVoting and MethodBase - ensemble methods
    are full estimators
  rationale: VotingChainladder uses multiple inheritance to combine sklearn-style voting ensemble logic
    with MethodBase estimator behavior. This enables ensemble chaining where the output of multiple chainladder
    estimators feeds into a voting mechanism. The boundary is that each base estimators must be compatible
    MethodBase subclasses - mixing with other estimator types raises errors.
  evidence: chainladder/workflow/voting.py:173(module)
  stage: development_pattern_estimation
