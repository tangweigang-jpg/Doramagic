- id: BD-072
  type: B
  content: Pipeline.fit_predict exists for chaining transformers+estimators in single call
  rationale: Pipeline.fit_predict enables one-call fitting of transformer-estimator chains, avoiding the
    need for separate fit and predict calls when transformers don't need transform-time customization.
    The boundary is that fit_predict only works for pipelines ending in an estimator - transformer-only
    pipelines raise NotFittedError.
  evidence: chainladder/workflow/gridsearch.py:157(fit_predict)
  stage: ordering_contract
  alternative_considered: Separate fit/transform/predict calls were maintained as the primary API for
    complex workflows
- id: BD-073
  type: RC
  content: ultimate_ attribute required for ibnr_, full_expectation_, full_triangle_ properties in Common
  rationale: The ultimate_ attribute is a hard requirement for IBNR calculation properties because these
    properties compute the reserve as (ultimate - current). Without ultimate values, IBNR cannot be calculated.
    The boundary is that estimators must produce ultimate_ before ibnr_ properties can be accessed - missing
    ultimate_ raises AttributeError.
  evidence: chainladder/core/common.py:94-130(ibnr_, full_expectation_, full_triangle_)
  stage: invariant
  alternative_considered: Returning NaN for missing ultimate was rejected to fail fast on incomplete workflows
  _evidence_issues:
  - 'INVALID_IDENTIFIER: ibnr_, full_expectation_, full_triangle_ in chainladder/core/common.py'
- id: BD-074
  type: BA
  content: DevelopmentBase average='volume' default uses volume-weighted LDFs (exponent=1), not simple
    average
  rationale: The volume-weighted average is the actuarial standard for link ratio calculation, giving
    more influence to larger (more credible) accident years. This default aligns with industry practice.
    The boundary is that volume weighting assumes monotonic exposure patterns - non-monotonic exposures
    may produce counterintuitive results.
  evidence: chainladder/development/base.py:18-22(fit - exponent mapping)
  stage: default_value
  alternative_considered: Simple average as default was rejected as less aligned with actuarial standards
  _evidence_issues:
  - 'INVALID_IDENTIFIER: fit - exponent mapping in chainladder/development/base.py'
- id: BD-075
  type: B
  content: TriangleBase inherits from multiple mixins - massive mixin composition pattern for core triangle
    functionality
  rationale: TriangleBase uses multiple inheritance to compose I/O, display, slicing, dunder operators,
    pandas integration, and common utilities into a single coherent class. This mixin pattern separates
    concerns while providing a unified API. The boundary is that each mixins must be compatible with the
    same Triangle data structure - incompatible mixins would cause MRO conflicts.
  evidence: chainladder/core/base.py:41(trianglebase)
  stage: invariant
  alternative_considered: Single monolithic class was rejected due to maintainability and testability
    concerns
  _evidence_issues:
  - 'FN_NOT_FOUND: trianglebase in chainladder/core/base.py'
- id: BD-076
  type: T
  content: MethodBase.predict requires X ages not exceed model ldf_.ddims.max() - raises ValueError otherwise
  rationale: MethodBase enforces that prediction ages cannot extend beyond the development periods used
    to fit the model. This is a fundamental statistical constraint - extrapolation beyond fitted development
    is not supported. The boundary is that users must either extend ldf_ via tails or truncate predictions
    to fit development periods.
  evidence: chainladder/methods/base.py:93(predict)
  stage: ordering_contract
  alternative_considered: Silent truncation was rejected as it could hide prediction scope issues from
    users
- id: BD-077
  type: B
  content: BootstrapODPSample extends DevelopmentBase - bootstrap is a development transformer producing
    simulated triangles
  rationale: BootstrapODPSample extends DevelopmentBase to use its fit/transform infrastructure while
    implementing the Overdispersed Poisson resampling methodology. This inheritance reuses LDF computation
    and averaging logic specific to the bootstrap method. The boundary is that BootstrapODPSample produces
    multiple simulated triangles in ldf_ rather than single point estimates.
  evidence: chainladder/adjustments/bootstrap.py:13(bootstrapodpsample)
  stage: development_pattern_estimation
  alternative_considered: Standalone bootstrap implementation was rejected to maintain API consistency
