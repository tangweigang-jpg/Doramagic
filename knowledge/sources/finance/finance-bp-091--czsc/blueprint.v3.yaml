replaceable_slots:
- id: slot-001
  name: stock_data_source
  description: Choose Tushare for flexibility, JoinQuant for more features, Local data for reproducibility
  used_in_stages: []
  options:
  - name: Tushare
    traits:
    - comprehensive_china_coverage
    - requires_token
    - has_rate_limits
    fit_for:
    - A-share stocks, indices, futures, funds with Chinese market focus
    not_fit_for:
    - International markets, high-frequency real-time needs
  - name: JoinQuant
    traits:
    - comprehensive_china_coverage
    - requires_token
    - more_features
    fit_for:
    - Advanced quantitative research with more data types
    not_fit_for:
    - Simple use cases, international markets
  - name: Local Research Data
    traits:
    - offline
    - preprocessed
    - no_api_limits
    fit_for:
    - Reproducible research with pre-downloaded datasets
    not_fit_for:
    - Real-time data, new symbols not in dataset
  default: Tushare
  _source: worker_resource
- id: slot-002
  name: futures_data_source
  description: Choose Tianqin for trading + live data, Tushare for historical research only
  used_in_stages: []
  options:
  - name: Tianqin (天勤)
    traits:
    - real_time
    - trading_capable
    - chinese_futures
    fit_for:
    - Real-time futures trading and live data analysis
    not_fit_for:
    - International futures, pure historical research
  - name: Tushare
    traits:
    - historical_focus
    - no_trading
    - chinese_futures
    fit_for:
    - Historical futures research without trading
    not_fit_for:
    - Real-time trading, high-frequency data
  default: Tianqin
  _source: worker_resource
- id: slot-003
  name: crypto_data_source
  description: Only option for crypto in this project
  used_in_stages: []
  options:
  - name: Binance (via CCXT)
    traits:
    - crypto
    - large_volume
    - real_time_capable
    fit_for:
    - Cryptocurrency analysis and trading with high liquidity
    not_fit_for:
    - Non-crypto markets
  default: Binance via CCXT
  _source: worker_resource
- id: slot-004
  name: weight_persistence
  description: Redis for real-time trading, ClickHouse for historical analysis
  used_in_stages: []
  options:
  - name: Redis
    traits:
    - in_memory
    - pub_sub
    - low_latency
    - atomic_ops
    fit_for:
    - Real-time weight updates, low-latency subscriptions, hot data
    not_fit_for:
    - Long-term storage, analytical queries, large datasets
  - name: ClickHouse
    traits:
    - columnar
    - olap
    - scalable
    - sql_query
    fit_for:
    - Historical weight analysis, large-scale backtests, SQL queries
    not_fit_for:
    - Real-time subscriptions, latency-critical operations
  default: Redis
  _source: worker_resource
- id: slot-005
  name: cloud_storage
  description: Aliyun for China users with team needs, S3 for international, local for solo development
  used_in_stages: []
  options:
  - name: Aliyun OSS
    traits:
    - china_focused
    - cost_effective
    - integrated
    fit_for:
    - Users in China, tight integration with Chinese cloud ecosystem
    not_fit_for:
    - Users outside China, multi-cloud strategies
  - name: AWS S3
    traits:
    - global
    - mature
    - 丰富的功能
    fit_for:
    - International users, multi-cloud strategies
    not_fit_for:
    - Users primarily in China with cost concerns
  - name: Local File System
    traits:
    - no_setup
    - no_cost
    - simple
    fit_for:
    - Single-machine development, small-scale deployments
    not_fit_for:
    - Distributed systems, team collaboration
  default: Local File System
  _source: worker_resource
- id: slot-006
  name: technical_analysis_backend
  description: Use Rust by default, Python for development/debugging via CZSC_USE_PYTHON
  used_in_stages: []
  options:
  - name: Rust (rs-czsc)
    traits:
    - fast
    - native
    - preferred
    fit_for:
    - Production use, large-scale processing, performance critical
    not_fit_for:
    - Debugging, customization of algorithms
  - name: Python (native)
    traits:
    - flexible
    - debuggable
    - fallback
    fit_for:
    - Development, algorithm research, debugging
    not_fit_for:
    - Production with large data volumes
  default: Rust (rs-czsc)
  _source: worker_resource
