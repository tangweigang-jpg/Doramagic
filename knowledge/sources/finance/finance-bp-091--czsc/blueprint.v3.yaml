# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-091
name: czsc - 缠中说禅技术分析工具
sop_version: '3.6'
source:
  projects:
  - czsc
  commit_hash: 79bdf5ee348205ffcb757fe9ca954a72880fae95
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Quantitative trading with technical analysis based on Chan Trading Theory (缠论)
  description: A Python library implementing automated recognition of Chan Theory concepts (分型/Fractures,
    笔/Bi strokes, 中枢/Zhongshu pivots) with multi-timeframe analysis, signal-event-position trading framework,
    and backtesting capabilities for Chinese stock and futures markets.
  prerequisites: Users should understand basic technical analysis concepts, K-line/candlestick patterns,
    and have familiarity with Python. Knowledge of Chan Trading Theory (缠论) is helpful but not required
    as the library abstracts these concepts programmatically.
  not_suitable_for: 'This library is not suitable for: (1) Real-time high-frequency trading requiring
    sub-second execution, (2) Markets other than Chinese stocks/futures without modifying hardcoded assumptions
    like 252 trading days/year, (3) Pure fundamental analysis or algorithmic trading without technical
    indicators, (4) Production trading systems requiring full broker API integration beyond Tianqin connector'
  activation:
    triggers:
    - Developing new quantitative trading strategies using Chan theory
    - Implementing automatic recognition of fractals,笔, and line segments
    - Creating signal functions for technical indicators
    - Running backtests with multi-timeframe analysis
    - Optimizing entry/exit parameters for existing strategies
    emphasis:
    - Use ESPECIALLY when implementing Chan theory-based strategies requiring multi-level analysis
    - Use ESPECIALLY when needing consistent signal-event-trading architecture
    - Use ESPECIALLY when requiring both Rust performance and Python flexibility
    anti_skip:
    - Don't skip Rust/Python hybrid setup even if Python-only seems sufficient - performance difference
      is significant for production
    - Don't skip signal versioning (V241013 suffix) - it enables strategy evolution tracking
    - Don't skip module-level constants - future maintenance cost far exceeds initial setup time
stages:
- id: data_collection
  name: Data Collection Layer
  order: 1
  responsibility: Fetch raw OHLCV market data from external sources (Tushare, Tianqin, CCXT) and normalize
    into RawBar objects for downstream analysis. This stage exists because it provides a unified, cached
    interface to heterogeneous data providers, avoiding vendor lock-in and enabling reproducible backtests.
  interface:
    inputs: External API calls via REST/WebSocket to Tushare, Tianqin, or CCXT exchanges
    outputs: List[RawBar] - standardized bar objects with symbol, dt, open, high, low, close, vol, amount
  required_methods:
  - name: DataClient.get_bars
    description: Retrieves historical K-line data with TTL-based file caching and thread-safe concurrent
      access
    evidence: czsc/utils/data/client.py:99(_get_cache)
  - name: BarGenerator.update
    description: Updates bar generator with new raw bar, synthesizing multi-frequency bars from base frequency
    evidence: czsc/py/bar_generator.py:275(BarGenerator)
  - name: FeishuApiBase.upload_file
    description: Uploads files to Feishu for strategy push notifications
    evidence: czsc/fsa/base.py:54(FeishuApiBase)
  key_behaviors:
  - behavior: TTL-based file caching with thread-safe locks
    description: DataClient implements time-to-live caching that avoids redundant API calls and supports
      concurrent multi-process backtests. Cache is stored on disk with configurable suffixes.
    evidence: czsc/utils/data/client.py:99(_get_cache)
  - behavior: Feishu token proactive refresh at 80% expiry
    description: Access tokens are refreshed before expiration to prevent authentication failures during
      long-running operations. The 0.8 threshold is a hardcoded magic number.
    evidence: czsc/fsa/base.py:68(time.time() - data[update_time] > data[expire] * 0.8)
  - behavior: BarGenerator dict-of-lists with frequency keys
    description: Bars are stored in a dictionary where keys are frequency strings, enabling O(1) lookup
      per frequency and lazy initialization per timeframe.
    evidence: 'czsc/py/bar_generator.py:285(self.bars = {v: [] for v in self.freqs})'
  replaceable_points:
  - name: data_source
    description: Plug in different market data connectors
    options:
    - name: Tushare
      traits:
      - REST API
      - Chinese stocks focus
      - Requires token
      fit_for:
      - A-share stock data
      - Historical backtesting
      not_fit_for:
      - Crypto
      - Real-time streaming
    - name: Tianqin
      traits:
      - WebSocket support
      - Futures focus
      - Real-time capable
      fit_for:
      - Futures trading
      - Live execution
      not_fit_for:
      - Stock-only strategies
    - name: CCXT
      traits:
      - Multi-exchange crypto
      - Standardized API
      fit_for:
      - Cryptocurrency strategies
      - Cross-exchange arbitrage
      not_fit_for:
      - Chinese stock market
    default: Tushare
  - name: cache_backend
    description: Disk cache file format for cached API responses
    options:
    - name: pickle
      traits:
      - Python native
      - Fast serialization
      fit_for:
      - General use
      - Fastest performance
      not_fit_for:
      - Cross-language sharing
    - name: json
      traits:
      - Human readable
      - Cross-language
      fit_for:
      - Debugging
      - External tool integration
      not_fit_for:
      - Large datasets
    - name: csv
      traits:
      - Universal format
      - Spreadsheet compatible
      fit_for:
      - Data export
      - Excel analysis
      not_fit_for:
      - Frequent read/write cycles
    - name: feather
      traits:
      - Columnar format
      - Fast Pandas read
      fit_for:
      - Large historical datasets
      not_fit_for:
      - Small cache entries
    default: pickle
  design_decisions:
  - BarGenerator uses dict-of-lists with freq strings as keys - Allows O(1) lookup per frequency; enables
    lazy initialization per freq (czsc/py/bar_generator.py:285)
  - DataClient implements TTL-based file caching with thread-safe locks - Avoids redundant API calls;
    supports concurrent multi-process backtests (czsc/utils/data/client.py:99)
  - FeishuApiBase caches access tokens with 80% expiry threshold - Proactively refreshes tokens before
    expiry to prevent auth failures mid-session (czsc/fsa/base.py:68)
  - max_count=5000 default limits in-memory bar storage - Memory vs. accuracy tradeoff; users needing
    more historical context can increase (czsc/py/bar_generator.py:278)
  acceptance_hints:
  - BarGenerator.update() succeeds for valid RawBar with matching base_freq
  - BarGenerator.update() raises ValueError when bar.freq.value != base_freq (frequency mismatch is detected
    immediately)
  - DataClient returns bars in chronological order with no gaps beyond declared holidays
  - Cache files are created and read correctly; cache misses trigger fresh API calls
- id: chan_analysis
  name: Chan Theory Analysis
  order: 2
  responsibility: Apply Chan Trading Theory (缠论) to identify Fractures (FX/分型), Bi strokes (笔), and Zhongshu
    pivots (中枢/ZS) patterns from raw bars. This stage exists because it transforms raw price data into
    structured chart patterns that form the foundation for each subsequent signal generation and trading
    decisions.
  interface:
    inputs: List[RawBar] - raw price bars with OHLCV data
    outputs: CZSC object containing bars_raw, bars_ubi, fxs (fractures), bis (strokes), zss (pivots),
      and analysis state
  required_methods:
  - name: CZSC.update
    description: Updates Chan analysis state with new bar, performing tri-bar inclusion resolution and
      stroke/pattern detection
    evidence: czsc/py/analyze.py:212(CZSC.__init__)
  - name: check_bi
    description: Validates whether three bars form a valid Bi (stroke) according to min_bi_len rules
    evidence: czsc/py/analyze.py:175(check_bi)
  - name: remove_include
    description: Applies remove-include (去包含) processing in tri-bar sliding window for correct direction
      detection
    evidence: czsc/py/analyze.py:19(remove_include)
  key_behaviors:
  - behavior: Remove-include (去包含) in tri-bar sliding window
    description: Chan theory requires comparing 3 consecutive bars to resolve inclusion relationships,
      ensuring correct trend direction detection. This is fundamental to each pattern recognition.
    evidence: czsc/py/analyze.py:19(remove_include)
  - behavior: BI uses get_cache_with_default for expensive linear regression
    description: RSQ (R-squared), slope, and SNR (signal-to-noise ratio) calculations are cached per bar
      to avoid redundant O(n) computation during BI updates.
    evidence: czsc/py/objects.py:239(get_cache_with_default)
  - behavior: CZSC stores bars_raw for post-hoc analysis, bars_ubi for active trading
    description: Separates raw data from processed bars, enabling both live trading (bars_ubi) and backtest
      replay (bars_raw for reference).
    evidence: czsc/py/analyze.py:212(__init__)
  - behavior: Dual Python/Rust implementation via CZSC_USE_PYTHON flag
    description: Core Chan analysis is the hot path; Rust reimplementation via rs_czsc provides 10-50x
      speedup. Automatic fallback to Python if Rust not installed.
    evidence: czsc/core.py:26(if os.getenv('CZSC_USE_PYTHON') or not installed)
  - behavior: BI auto-truncation to max_bi_num
    description: Historical BIs are permanently lost when truncated - no rollback capability. Keeps last
      max_bi_num items, removes oldest from the left.
    evidence: czsc/py/analyze.py:336(CZSC.update bi_list truncation)
  replaceable_points:
  - name: bi_recognition_algorithm
    description: The check_bi function determines stroke validation rules
    options:
    - name: standard Chan
      traits:
      - min_bi_len=6
      - Traditional rules
      fit_for:
      - Standard analysis
      - Consistency with other users
      not_fit_for:
      - Custom pattern definitions
    - name: custom via kwargs
      traits:
      - Override min_bi_len
      - Custom constraints
      fit_for:
      - Research experiments
      - Alternative theories
      not_fit_for:
      - Production without validation
    default: standard
  - name: kline_processing
    description: remove_include logic for tri-bar resolution
    options:
    - name: standard
      traits:
      - Traditional Chan theory
      fit_for:
      - Standard analysis
      not_fit_for:
      - Modified theories
    - name: custom
      traits:
      - Modified resolution
      fit_for:
      - Research variants
      not_fit_for:
      - Production
    default: standard
  design_decisions:
  - Remove-include (去包含) applied in tri-bar sliding window - Chan theory requires comparing 3 bars to
    resolve inclusion; ensures correct direction detection (czsc/py/analyze.py:19)
  - BI uses get_cache_with_default for expensive linear regression - Avoids redundant O(n) computation;
    caches RSQ, slope, SNR per bar (czsc/py/objects.py:239)
  - CZSC stores bars_raw for post-hoc analysis; bars_ubi for active trading - Separates raw data from
    processed bars; enables both live trading and backtest replay (czsc/py/analyze.py:212)
  - min_bi_len=6 by default (new笔 standard, not old笔=7) - 6-bar minimum allows more signals; 7-bar is
    traditional but overly restrictive (czsc/envs.py:39)
  - Rust implementation available via CZSC_USE_PYTHON=false - Core Chan analysis is hot path; Rust reimplementation
    provides 10-50x speedup (czsc/core.py:26)
  acceptance_hints:
  - CZSC.update() processes bars in chronological order and raises if dt regresses
  - Fractures (FX) are correctly identified from tri-bar patterns
  - Bi strokes (笔) satisfy min_bi_len constraint and direction rules
  - max_bi_num=50 limits historical context; signals requiring more context must handle edge cases
- id: signal_computation
  name: Signal Computation
  order: 3
  responsibility: Compute technical analysis signals from CZSC analysis results using configurable signal
    functions. Signals are named tuples with format {freq}_{feature}_{value} that enable pattern matching
    for Event triggers. This stage exists to decouple pattern recognition from trading logic, allowing
    strategy customization without modifying core analysis.
  interface:
    inputs: CZSC object (multi-frequency) containing bars_raw, bis, fxs; signal configuration dicts specifying
      which signals to compute
    outputs: OrderedDict of signals (key → value pairs) following 7-part underscore naming convention
  required_methods:
  - name: CzscSignals.update_signals
    description: Computes each configured signals from CZSC analysis results, storing them in OrderedDict
      preserving insertion order
    evidence: czsc/traders/base.py:23(CzscSignals)
  - name: SignalsParser.parse
    description: Parses signal strings to extract function names and parameters for dynamic signal loading
    evidence: czsc/traders/sig_parse.py:16(SignalsParser)
  - name: get_signals_by_conf
    description: Dynamically imports and executes signal functions based on configuration, enabling runtime
      signal loading without circular imports
    evidence: czsc/traders/base.py:93(import_by_name)
  key_behaviors:
  - behavior: 7-part underscore-delimited signal naming convention
    description: Pattern {freq}_{di}_{feature}_V{version}_{v1}_{v2}_{count} enables programmatic parsing;
      version suffix allows A/B testing of signal logic changes without code branching.
    evidence: czsc/signals/bar.py:23(bar_single_V230506)
  - behavior: Dynamic import_by_name for runtime signal loading
    description: Signals are loaded at runtime without circular imports, supporting a plugin architecture
      where new signals can be added without modifying core code.
    evidence: czsc/traders/base.py:93(import_by_name)
  - behavior: Signals stored in OrderedDict preserving insertion order
    description: Maintains signal precedence order which is critical for event matching sequence in Position.update().
    evidence: czsc/traders/base.py:48(self.s = OrderedDict())
  - behavior: ta-lib signals cached on RawBar.cache dict
    description: MA/MACD and other technical indicators computed once per bar and cached; incremental
      updates only recompute affected signals.
    evidence: czsc/signals/tas.py:62(c.bars_raw[-1].cache)
  - behavior: No shift(-n) future-looking data in signal functions
    description: 'Invariant: signals/ contains ZERO shift(-n) calls. Future-looking data is strictly isolated
      in features/ret.py and backtest paths only.'
    evidence: czsc/features/ret.py:26,46,68,94; grep confirms signals/ has 0 shift(-n)
  replaceable_points:
  - name: signal_library
    description: Select signal functions from different modules for inclusion in strategy
    options:
    - name: czsc.signals.bar
      traits:
      - K-line patterns
      - Chan-based signals
      fit_for:
      - Single-bar patterns
      - Multi-bar configurations
      not_fit_for:
      - Technical indicators
    - name: czsc.signals.tas
      traits:
      - TA-Lib based
      - Technical indicators
      fit_for:
      - Moving averages
      - MACD
      - RSI signals
      not_fit_for:
      - Pure price pattern signals
    - name: czsc.signals.cxt
      traits:
      - Continuous patterns
      - Fibonacci
      fit_for:
      - Wave patterns
      - Extension levels
      not_fit_for:
      - Single-bar analysis
    - name: czsc.signals.zdy
      traits:
      - User-defined
      - Custom signals
      fit_for:
      - Research signals
      - Novel patterns
      not_fit_for:
      - Production without testing
    default: bar + tas
  - name: frequency_selection
    description: Which time frequencies to compute signals on
    options:
    - name: 5min
      traits:
      - High frequency
      - Intraday
      fit_for:
      - Day trading
      - Scalping
      not_fit_for:
      - Swing trading
    - name: 15min
      traits:
      - Medium frequency
      fit_for:
      - Intraday to short-term
      not_fit_for:
      - Long-term analysis
    - name: 60min
      traits:
      - Hourly bars
      fit_for:
      - Short-term trends
      not_fit_for:
      - Intraday only
    - name: 日线
      traits:
      - Daily bars
      - Standard
      fit_for:
      - Swing trading
      - Position trading
      not_fit_for:
      - High-frequency
    - name: 周线
      traits:
      - Weekly bars
      - Long-term
      fit_for:
      - Position trading
      - Trend following
      not_fit_for:
      - Intraday
    default: base_freq only
  design_decisions:
  - Signals use 7-part underscore-delimited naming convention - Pattern enables programmatic parsing;
    version suffix allows A/B testing (czsc/signals/bar.py:23)
  - get_signals_by_conf uses dynamic import_by_name - Enables runtime signal loading without circular
    imports; supports plugin architecture (czsc/traders/base.py:93)
  - Signals stored in OrderedDict preserving insertion order - Maintains signal precedence order; critical
    for event matching sequence (czsc/traders/base.py:48)
  - ta-lib signals cached on RawBar.cache dict - Avoids recomputing MA/MACD for same bars; incremental
    updates only (czsc/signals/tas.py:62)
  - SignalsConfig is a list of dicts with name/freq/params - Declarative config enables JSON-based strategy
    definition; no code changes needed to add signals (czsc/traders/base.py:73)
  acceptance_hints:
  - Every computed signals follow 7-part naming convention with underscore delimiter
  - Signals are sorted by frequency (base_freq first) before passing to BarGenerator
  - Signal functions return (key, value) tuples with non-empty strings
  - No future-looking data (shift(-n)) is used in signal computation paths
- id: event_position
  name: Event & Position Management
  order: 4
  responsibility: Match signals against Event definitions using logical combinators (signals_not, signals_meet,
    signals_all) and manage Position state machine with entry/exit rules including stop-loss, timeout,
    and T+1 constraints. This stage exists to translate abstract signal patterns into concrete trading
    decisions with risk management.
  interface:
    inputs: OrderedDict signals s (key→value pairs); List[Event] for opens and exits
    outputs: pos ∈ {-1, 0, 1} (short/empty/long), operates list of trade records, holds list of open positions
  required_methods:
  - name: Event.is_match
    description: 'Checks if event conditions are satisfied by signals: processes signals_not → signals_all
      → signals_any in strict order'
    evidence: czsc/py/objects.py:589(return m, f)
  - name: Position.update
    description: Updates position state machine with new signals, validates time sequence, applies stop-loss/timeout/T0
      rules, outputs operate list
    evidence: czsc/py/objects.py:997(if s[dt] <= self.end_dt)
  - name: Position._can_close_today
    description: Enforces T0 trading constraint for Chinese stock market compliance
    evidence: czsc/py/objects.py:926-933(Position._can_close_today)
  key_behaviors:
  - behavior: 'Event.is_match processes signals in strict order: signals_not → signals_all → signals_any'
    description: signals_not should block even if signals_all would match. Changing this order breaks
      event matching semantics.
    evidence: czsc/py/objects.py:603-610(Event.is_match)
  - behavior: BP (basis points) used uniformly for stop_loss, returns, and pairs profit
    description: Consistency with stop_loss BP unit prevents unit conversion bugs; BP is industry standard
      for small percentages in quant trading.
    evidence: czsc/py/objects.py:848(ykr * 10000)
  - behavior: T0=False by default enforces Chinese stock market compliance
    description: Prevents illegal same-day selling for stock strategies; futures strategies must explicitly
      enable T0=True.
    evidence: 'czsc/py/objects.py:694(T0: bool = False)'
  - behavior: Position timeout measured in bars (bid), not calendar time
    description: Timeout adapts to trading frequency; 1-hour trader with 1000 bars = ~17 days max hold.
      More resilient than calendar-based timeouts.
    evidence: czsc/py/objects.py:954(bid - self.last_event[bid] > self.timeout)
  - behavior: Position.update validates time sequence and raises if dt regresses
    description: Time ordering violation indicates data bug or logic error; fail-fast prevents silent
      position state corruption.
    evidence: czsc/py/objects.py:997(if s[dt] <= self.end_dt)
  replaceable_points:
  - name: risk_controls
    description: Stop-loss, timeout, and T0 configuration for position management
    options:
    - name: strict
      traits:
      - tight stop_loss
      - short timeout
      fit_for:
      - High volatility
      - Risk-averse strategies
      not_fit_for:
      - Long-term trends
      - Low volatility
    - name: relaxed
      traits:
      - wide stop_loss
      - no timeout
      fit_for:
      - Trend following
      - Swing trading
      not_fit_for:
      - High volatility
      - Capital preservation
    default: relaxed
  - name: reentry_policy
    description: interval between same-direction entries
    options:
    - name: immediate (0)
      traits:
      - Zero bars between entries
      fit_for:
      - High-frequency signals
      - Signal-rich strategies
      not_fit_for:
      - Signal noise
      - Overtrading
    - name: delayed (e.g., 300s)
      traits:
      - Minimum bars between entries
      fit_for:
      - Signal filtering
      - Commission reduction
      not_fit_for:
      - Fast-moving markets
    default: immediate
  design_decisions:
  - Position uses BP (basis points) for stop_loss instead of percent - BP is standard in quant trading;
    avoids floating-point precision issues (czsc/py/objects.py:943)
  - stop_loss default=1000BP (10%) is intentionally aggressive - 10% stop is conservative default; futures
    traders may need tighter (czsc/py/objects.py:693)
  - timeout default=1000 bars is essentially 'no timeout' - Allows long-term trends; timeout is optional
    risk control (czsc/py/objects.py:692)
  - T0=False by default prohibits same-day closing - Compliance with Chinese stock T+1 rule; futures should
    set T0=True (czsc/py/objects.py:694)
  - interval=0 allows immediate re-entry after close - Zero interval maximizes signal responsiveness;
    add delay if overtrading (czsc/py/objects.py:691)
  - Position.update validates time sequence and raises if dt regresses - Fail-fast prevents silent corruption
    (czsc/py/objects.py:997)
  acceptance_hints:
  - Event.is_match returns (bool match, str matched_signal_value) correctly
  - Position.pos ∈ {-1, 0, 1} at each times after update
  - Operate enum values are LO, LE, SO, SE, HO (long open/close, short open/close, hold)
  - T0 constraint prevents same-bar close for T0=False positions
  - stop_loss triggers correctly at specified BP threshold
- id: trading_execution
  name: Trading Execution
  order: 5
  responsibility: Orchestrate multi-position strategies, implement ensemble voting methods (mean/vote/max),
    manage real-time execution with Tianqin, and provide backtesting replay. This stage exists because
    individual Position objects need to be combined into coherent trading strategies with configurable
    execution modes.
  interface:
    inputs: CzscTrader with BarGenerator and List[Position]; strategy configuration with positions list
    outputs: Ensemble position float (continuous value from position combination), trade records, snapshot
      HTML
  required_methods:
  - name: CzscTrader.update
    description: Orchestrates bar update through CZSC analysis, signal computation, and position updates
      in correct order
    evidence: czsc/traders/base.py:398-413(CzscTrader.update)
  - name: CzscStrategyBase.positions
    description: The ONLY @abstractmethod - returns list of Position objects for strategy. Minimal interface
      enables each customization via config injection.
    evidence: czsc/strategies.py:82(@abstractmethod)
  - name: CzscTrader.get_ensemble_pos
    description: Combines multiple position outputs using mean/vote/max/callable methods
    evidence: czsc/traders/base.py:457-500(get_ensemble_pos)
  - name: DummyBacktest.on_sig
    description: Signal-cached backtest that bypasses bar processing for 10-100x faster batch backtests
    evidence: czsc/traders/base.py:415(on_sig)
  key_behaviors:
  - behavior: CzscStrategyBase.positions is the ONLY @abstractmethod
    description: Minimal interface - everything else (signals, frequencies, risk) configured declaratively.
      Users only implement positions property; no deep inheritance required.
    evidence: czsc/strategies.py:82(@abstractmethod)
  - behavior: Ensemble method supports mean/vote/max/callable
    description: Flexibility to combine positions; callable enables custom voting logic. Adding new ensemble
      methods requires modifying core trader class.
    evidence: czsc/traders/base.py:488(method == 'mean')
  - behavior: on_sig bypasses bar processing for signal-cached backtests
    description: Skips CZSC update when using pre-computed signals; 10-100x faster for batch backtests
      compared to full replay.
    evidence: czsc/traders/base.py:415(on_sig)
  - behavior: create_symbol_trader uses TargetPosTask for Tianqin execution
    description: Native Tianqin order management handles position adjustments automatically in real-time
      trading.
    evidence: czsc/connectors/tq_connector.py:100(TargetPosTask)
  - behavior: CTAResearch uses concurrent.futures for parallel backtesting
    description: Multi-process execution enables CPU-bound backtests to scale across available cores.
    evidence: czsc/sensors/cta.py:27(concurrent.futures)
  replaceable_points:
  - name: ensemble_method
    description: How to combine multiple position signals into single output
    options:
    - name: mean
      traits:
      - Continuous output
      - Averages positions
      fit_for:
      - Balanced strategies
      - Smooth transitions
      not_fit_for:
      - Binary decisions
    - name: vote
      traits:
      - Binary output
      - Majority rules
      fit_for:
      - Simple strategies
      - Clear signals
      not_fit_for:
      - Nuance required
    - name: max
      traits:
      - Most aggressive
      - Takes strongest signal
      fit_for:
      - Momentum strategies
      - High conviction
      not_fit_for:
      - Risk management priority
    - name: custom callable
      traits:
      - User-defined logic
      fit_for:
      - Complex combination rules
      - Research
      not_fit_for:
      - Simple use cases
    default: mean
  - name: execution_mode
    description: Whether to execute live or in backtest mode
    options:
    - name: Tianqin (live)
      traits:
      - Real-time execution
      - WebSocket connection
      fit_for:
      - Production trading
      not_fit_for:
      - Backtesting
      - Historical analysis
    - name: DummyBacktest (cached)
      traits:
      - Signal-cached
      - Fast iteration
      fit_for:
      - Strategy development
      - Parameter optimization
      not_fit_for:
      - Full replay accuracy
    - name: replay (bar-by-bar)
      traits: []
      fit_for:
      - Accurate backtesting
      - Event simulation
      not_fit_for:
      - Fast iteration
    default: DummyBacktest
  - name: strategy_base
    description: How to define trading strategy logic
    options:
    - name: Python subclass
      traits:
      - Code-based
      - Flexible
      fit_for:
      - Complex strategies
      - Custom logic
      not_fit_for:
