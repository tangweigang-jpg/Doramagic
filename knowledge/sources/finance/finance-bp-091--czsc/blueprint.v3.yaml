data_flow:
- from_stage: data_collection
  to_stage: chan_analysis
  data: List[RawBar] with symbol, dt, open, high, low, close, vol - raw price bars fed into CZSC.update()
    for pattern recognition
- from_stage: data_collection
  to_stage: signal_computation
  data: List[RawBar] flows into BarGenerator.update() for multi-frequency synthesis that signals depend
    on
- from_stage: chan_analysis
  to_stage: signal_computation
  data: CZSC object with bars_raw, bis, fxs, zss exposed as attributes - pattern analysis results used
    for signal generation
- from_stage: signal_computation
  to_stage: event_position
  data: OrderedDict signals s (key→value pairs) passed to Position.update(s) - computed signals trigger
    Event matching and position changes
- from_stage: event_position
  to_stage: trading_execution
  data: pos ∈ {-1,0,1}, operates list, holds list - position state and trade records aggregated by CzscTrader
    for ensemble decisions
- from_stage: trading_execution
  to_stage: backtest_analysis
  data: WeightBacktest DataFrames, pairs list, holds list - trade operations and position history analyzed
    for performance metrics
- from_stage: backtest_analysis
  to_stage: data_collection
  data: Strategy push notifications via FeishuApiBase.upload_file - alerts and reports sent to users
global_contracts:
- contract: Every RawBar.dt must be timezone-naive datetime - tz-naive datetimes ensure consistency across
    each data processing (czsc/py/objects.py:51)
  evidence: ''
- contract: 'Signals follow 7-part underscore naming: {freq}_{di}_{feature}_V{ver}_{v1}_{v2}_{count} -
    enables programmatic parsing and version tracking (czsc/signals/bar.py:49)'
  evidence: ''
- contract: Position.pos ∈ {-1, 0, 1} representing short, empty, long - ternary position encoding is consistent
    throughout system (czsc/py/objects.py:697)
  evidence: ''
- contract: 'Operate enum values: LO, LE, SO, SE, HO (long open/close, short open/close, hold) - standardized
    operation types (czsc/py/enum.py:1)'
  evidence: ''
- contract: BarGenerator.max_count limits memory; old bars truncated from left - prevents unbounded memory
    growth (czsc/py/bar_generator.py:422)
  evidence: ''
- contract: CZSC_USE_PYTHON env var forces Python impl; defaults to Rust if rs_czsc installed - dual implementation
    contract (czsc/core.py:26)
  evidence: ''
- contract: 'SignalsConfig is list of dicts with required keys: name, freq - declarative signal configuration
    format (czsc/traders/base.py:90)'
  evidence: ''
- contract: Event.is_match returns (bool match, str matched_signal_value) - event matching contract (czsc/py/objects.py:589)
  evidence: ''
- contract: Every times in signals/operates use dt (datetime) not bid (bar index) for display - human-readable
    timestamps; bid used for timeout calculation (czsc/py/objects.py:1028)
  evidence: ''
- contract: CZSC.update() calls signals update before positions update - signal computation must complete
    before position decisions (czsc/traders/base.py:398-413)
  evidence: ''
- contract: BarGenerator freqs must be in sorted_freqs order - validated at init; wrong order breaks multi-timeframe
    synchronization (czsc/py/bar_generator.py:290-300)
  evidence: ''
- contract: Event.is_match processes signals_not → signals_all → signals_any in strict order - signals_not
    should block even if signals_all would match (czsc/py/objects.py:603-610)
  evidence: ''
- contract: 'Position.update checks dt monotonicity: new signal dt must be > previous - out-of-order injection
    causes state corruption (czsc/py/objects.py:997-1001)'
  evidence: ''
business_decisions:
- id: BD-001
  type: B/BA
  content: BarGenerator uses dict-of-lists with freq strings as keys
  rationale: Dict-of-lists architecture enables O(1) lookup per frequency for bar retrieval; allows lazy
    initialization of empty lists per frequency, avoiding pre-allocation overhead when only subset of
    frequencies are used in analysis
  evidence: czsc/py/bar_generator.py:278(BarGenerator.__init__)
  stage: data_collection
  alternative_considered: 'Single list with filter: rejected due to O(n) scan overhead per frequency lookup'
- id: BD-002
  type: B/BA
  content: DataClient implements TTL-based file caching with thread-safe locks
  rationale: TTL-based caching with 80% expiry threshold prevents redundant API calls to data providers;
    thread-safe locks enable safe concurrent access from multi-process backtest workers without race conditions
    or corrupted cache files
  evidence: czsc/utils/data/client.py:99(_get_cache)
  stage: data_collection
  alternative_considered: 'No caching: rejected due to API rate limits; in-memory only: rejected due to
    multi-process isolation'
- id: BD-003
  type: BA
  content: FeishuApiBase caches access tokens with 80% expiry threshold
  rationale: Proactively refreshes Feishu API tokens at 80% of TTL before actual expiry to prevent authentication
    failures during critical mid-session operations; avoids token refresh latency spikes during active
    API usage
  evidence: czsc/fsa/base.py:68(FeishuApiBase._get_token)
  stage: data_collection
  alternative_considered: 'Refresh on expiry (100%): rejected due to race condition risk during refresh
    window'
  _evidence_issues:
  - 'FN_NOT_FOUND: FeishuApiBase._get_token in czsc/fsa/base.py'
- id: BD-004
  type: BA
  content: max_count=5000 default limits in-memory bar storage
  rationale: 5000 bar default establishes memory vs historical accuracy tradeoff boundary; limits RAM
    consumption for typical strategies while preserving sufficient lookback for Chan theory analysis which
    requires 6+ bar patterns; users requiring extended history can override via parameter
  evidence: czsc/py/bar_generator.py:278(BarGenerator.__init__)
  stage: data_collection
  alternative_considered: 'Unlimited storage: rejected; 1000 bars: insufficient for multi-frequency analysis'
- id: BD-005
  type: B/DK
  content: Remove-include (去包含) applied in tri-bar sliding window
  rationale: Chan theory requires comparing 3 consecutive bars to resolve inclusion relationships; tri-bar
    sliding window ensures correct direction detection for笔/线段 construction by normalizing non-monotonic
    price sequences before pattern analysis
  evidence: czsc/py/analyze.py:19(remove_include)
  stage: chan_analysis
  alternative_considered: 'Pair-wise comparison: rejected; insufficient for nested inclusion resolution'
- id: BD-006
  type: B/BA
  content: BI uses get_cache_with_default for expensive linear regression
  rationale: Linear regression for笔BI calculation is O(n) per bar; caching RSQ, slope, and SNR results
    via get_cache_with_default avoids redundant recomputation when same bars are reprocessed during CZSC
    updates or strategy replay
  evidence: czsc/py/objects.py:239(Bi.get_cache_with_default)
  stage: chan_analysis
  alternative_considered: 'No caching: rejected due to O(n) repeated computation on bar updates'
- id: BD-007
  type: BA
  content: CZSC stores bars_raw for post-hoc analysis; bars_ubi for active trading
  rationale: 'Separates raw bar data (bars_raw) from processed unidirectional bars (bars_ubi) to support
    dual use cases: live trading requires processed bars for signal computation while backtesting benefits
    from raw data for performance analysis and replay'
  evidence: czsc/py/analyze.py:212(czsc)
  stage: chan_analysis
  alternative_considered: 'Single bar list: rejected; insufficient separation for replay vs live modes'
  _evidence_issues:
  - 'FN_NOT_FOUND: czsc in czsc/py/analyze.py'
- id: BD-008
  type: BA/DK
  content: min_bi_len=6 by default (new笔 standard, not old笔=7)
  rationale: 6-bar minimum for笔BI formation enables more trading signals compared to traditional 7-bar
    standard; configurable via czsc_min_bi_len environment variable allowing traders to switch between
    new笔/old笔 conventions without code changes
  evidence: czsc/envs.py:37(get_min_bi_len)
  stage: chan_analysis
  alternative_considered: '7-bar only: rejected; overly restrictive for high-frequency strategies; 5-bar:
    insufficient market noise filtering'
- id: BD-009
  type: B
  content: Rust implementation available via CZSC_USE_PYTHON=false
  rationale: Core Chan analysis (笔/线段 construction) is identified as hot path execution; CZSC_USE_PYTHON=false
    env var gates fallback to Rust implementation when installed, providing 10-50x speedup for batch processing
    workloads
  evidence: czsc/core.py:26(import_czsc)
  stage: chan_analysis
  alternative_considered: 'Always Rust: rejected; Python fallback needed for development/debugging'
  _evidence_issues:
  - 'FN_NOT_FOUND: import_czsc in czsc/core.py'
- id: BD-010
  type: M
  content: Rust implementation auto-detected when installed, with Python fallback
  rationale: Automatic detection of Rust extension availability without explicit version checks; environment
    variable provides explicit override for testing and development scenarios requiring Python implementation
  evidence: czsc/core.py:4(check_rs_czsc)
  stage: chan_analysis
  alternative_considered: 'Explicit version negotiation: rejected; adds complexity without benefit'
- id: BD-011
  type: BA/DK
  content: Signals use 7-part underscore-delimited naming convention
  rationale: Pattern {freq}_{di}_{feature}_V{version}_{v1}_{v2}_{v3}_{count} enables programmatic parsing
    by downstream systems; version suffix (V{date}) allows A/B testing of signal variants without breaking
    existing signal references
  evidence: czsc/signals/bar.py:23(bar_single_V230506)
  stage: signal_computation
  alternative_considered: 'Hash-based naming: rejected; non-human-readable; debugging difficulty'
- id: BD-012
  type: B/DK
  content: Signal naming includes version suffix for A/B testing
  rationale: Version suffix (V{YYYYMMDD}) in signal names allows parallel deployment of signal variants;
    downstream systems can subscribe to specific versions or latest without code changes
  evidence: czsc/signals/bar.py:23(bar_single_V230506)
  stage: signal_computation
  alternative_considered: 'No versioning: rejected; prevents signal improvement rollout'
- id: BD-013
  type: B/BA
  content: get_signals_by_conf uses dynamic import_by_name
  rationale: Dynamic import via import_by_name enables runtime signal loading without circular import
    dependencies; supports plugin architecture where new signals can be added to codebase without modifying
    trader initialization logic
  evidence: czsc/traders/base.py:354(CzscTrader.__init__)
  stage: signal_computation
  alternative_considered: 'Static imports: rejected; requires pre-registration; limits plugin flexibility'
- id: BD-014
  type: B
  content: Signals stored in OrderedDict preserving insertion order
  rationale: OrderedDict maintains signal precedence order for event matching sequence; ensures predictable
    evaluation order when multiple signals trigger on same bar, critical for determining trade entry priority
  evidence: czsc/traders/base.py:354(CzscTrader.__init__)
  stage: signal_computation
  alternative_considered: 'Set: rejected; no ordering guarantee; dict: insertion order only in Python
    3.7+'
- id: BD-015
  type: B
  content: ta-lib signals cached on RawBar.cache dict
  rationale: Caching technical indicator results (MA/MACD/RSI) on RawBar.cache dict avoids recomputation
    when same bars are accessed during signal updates or multi-signal evaluation; enables incremental
    updates without full recalculation
  evidence: czsc/signals/tas.py:88(update_macd_cache)
  stage: signal_computation
  alternative_considered: 'No caching: rejected; O(n) recomputation on each signal access'
- id: BD-016
  type: BA
  content: SignalsConfig is a list of dicts with name/freq/params
  rationale: Declarative configuration format (list of dicts) enables JSON/YAML-based strategy definition
    without code changes; traders can add/remove signals by modifying config files, enabling non-developer
    strategy iteration and version control of signal combinations
  evidence: czsc/traders/base.py:354(CzscTrader.__init__)
  stage: signal_computation
  alternative_considered: 'Code-based signal registration: rejected; requires developer for changes'
- id: BD-017
  type: BA
  content: Position uses BP (basis points) for stop_loss instead of percent
  rationale: Basis points (1BP = 0.0001) is standard in quantitative trading for stop loss precision;
    avoids floating-point precision issues when representing small percentage thresholds (e.g., 0.1% =
    10BP) and aligns with broker fee calculations
  evidence: czsc/py/objects.py:935(Position._check_stop_loss)
  stage: event_position
  alternative_considered: 'Percent floats: rejected; precision loss for small values; display ambiguity'
- id: BD-018
  type: BA
  content: stop_loss default=1000BP (10%) is intentionally aggressive
  rationale: 1000BP (10%) default provides conservative risk boundary suitable for most strategies; allows
    sufficient volatility room for Chan theory-based trades while preventing catastrophic losses; futures
    traders requiring tighter stops can override per strategy
  evidence: czsc/py/objects.py:686(Position.__init__)
  stage: event_position
  alternative_considered: '500BP: too tight for low-liquidity instruments; 2000BP: excessive risk for
    beginners'
- id: BD-019
  type: BA
  content: timeout default=1000 bars is essentially 'no timeout'
  rationale: 1000-bar timeout provides optional risk control for long-duration trades; set high enough
    (1000 bars ≈ weeks/months depending on frequency) to allow long-term trends while providing fail-safe
    exit for edge cases where position tracking logic fails
  evidence: czsc/py/objects.py:364(raw_bars)
  stage: event_position
  alternative_considered: 'No timeout: rejected; no fail-safe for logic bugs; 100 bars: too aggressive
    for swing trades'
- id: BD-020
  type: M/DK
  content: T0=False by default prohibits same-day closing
  rationale: T0=False enforces Chinese stock market T+1 trading compliance by default; prevents same-day
    position closing which violates regulatory requirements; futures strategy developers must explicitly
    set T0=True when targeting futures instruments
  evidence: czsc/py/objects.py:686(Position.__init__)
  stage: event_position
  alternative_considered: 'T0=True default: rejected; would enable regulatory violations by default'
- id: BD-021
  type: BA
  content: interval=0 allows immediate re-entry after close
  rationale: Zero-bar interval maximizes signal responsiveness by allowing immediate position re-entry
    after close signal; traders experiencing overtrading from whipsaws can increase interval to add delay
    between close and next open
  evidence: czsc/py/objects.py:691(Position.__init__)
  stage: event_position
  alternative_considered: '1-bar minimum: rejected; too restrictive for high-frequency signals'
- id: BD-022
  type: B
  content: Position.update validates time sequence and raises if dt regresses
  rationale: Time ordering validation via dt comparison ensures chronological bar sequence; raises error
    on regression to prevent silent data corruption where stale bars overwrite fresher data, which would
    produce incorrect P&L calculations
  evidence: czsc/py/objects.py:966(update)
  stage: event_position
  alternative_considered: 'Silent ignore: rejected; allows data bugs to propagate silently'
- id: BD-023
  type: B
  content: CzscStrategyBase.positions is the ONLY @abstractmethod
  rationale: Minimal interface contract requiring only positions property implementation; each other components
    (signals, frequencies, risk parameters) configured declaratively, reducing boilerplate for strategy
    developers while maintaining flexibility
  evidence: czsc/strategies.py:27(CzscStrategyBase)
  stage: trading_execution
  alternative_considered: 'Multiple abstract methods: rejected; increased coupling'
- id: BD-024
  type: B
  content: ensemble_method supports mean/vote/max/callable
  rationale: Multiple ensemble aggregation methods (mean, vote, max) provide flexibility for position
    combination across frequencies or signals; callable support enables custom voting logic for specialized
    trading strategies
  evidence: czsc/traders/base.py:488(CzscTrader.get_raw_signals)
  stage: trading_execution
  alternative_considered: 'Single method only: rejected; insufficient for diverse strategy requirements'
  _evidence_issues:
  - 'FN_NOT_FOUND: CzscTrader.get_raw_signals in czsc/traders/base.py'
- id: BD-025
  type: B
  content: on_sig bypasses bar processing for signal-cached backtests
  rationale: on_sig method skips CZSC bar update when using pre-computed signal cache, achieving 10-100x
    speedup for batch backtests by avoiding redundant Chan theory recalculation; essential for parameter
    optimization requiring thousands of iterations
  evidence: czsc/traders/base.py:415(on_sig)
  stage: trading_execution
  alternative_considered: 'Always process bars: rejected; 10-100x slower backtests'
- id: BD-026
  type: B
  content: create_symbol_trader uses TargetPosTask for Tianqin execution
  rationale: TargetPosTask integration provides native Tianqin order management for position synchronization;
    automatically handles position adjustments based on target vs actual, abstracting away order complexity
    from strategy logic
  evidence: czsc/connectors/tq_connector.py:55(create_symbol_trader)
  stage: trading_execution
  alternative_considered: 'Manual order management: rejected; complex; error-prone'
- id: BD-027
  type: M/BA
  content: CTAResearch uses concurrent.futures for parallel backtesting
  rationale: Multi-process execution via concurrent.futures enables CPU-bound backtests to scale across
    available cores; essential for parameter optimization and strategy research where single-threaded
    execution creates unacceptable latency
  evidence: czsc/sensors/cta.py:27(CTAResearch.run)
  stage: trading_execution
  alternative_considered: 'Sequential execution: rejected; too slow for parameter optimization'
  _evidence_issues:
  - 'FN_NOT_FOUND: CTAResearch.run in czsc/sensors/cta.py'
- id: BD-028
  type: BA/DK
  content: Pairs use BP returns (1BP = 0.0001) not percent
  rationale: Basis point returns for pairs trading maintains consistency with Position.stop_loss BP unit
    convention; standard quantitative notation allows direct comparison between pair spread and risk parameters
    without unit conversion
  evidence: czsc/py/objects.py:914(Pairs.evaluate)
  stage: backtest_analysis
  alternative_considered: 'Percent returns: rejected; inconsistent with stop_loss BP notation'
- id: BD-029
  type: BA
  content: evaluate_holds computes edge = n1b * pos (margin return)
  rationale: Edge calculation multiplies next-bar return (n1b) by position to quantify P&L contribution
    per bar; enables bar-level performance attribution and identification of periods contributing positively
    vs negatively to strategy returns
  evidence: czsc/py/objects.py:854(evaluate_holds)
  stage: backtest_analysis
  alternative_considered: 'Cumulative P&L only: rejected; insufficient for period-level analysis'
- id: BD-030
  type: BA/DK
  content: Calmar ratio uses 252 annualization factor
  rationale: 252 trading days per year is standard for Chinese stock market annualization; correctly scales
    daily Sharpe/max drawdown metrics to annual equivalents for strategy comparison using market-appropriate
    trading calendar
  evidence: czsc/utils/analysis/stats.py:26(daily_performance)
  stage: backtest_analysis
  alternative_considered: '250 (Western standard): incorrect for Chinese market; 365: overestimates due
    to non-trading days'
  vague_rationale: true
- id: BD-031
  type: BA/M
  content: Streamlit components for interactive analysis in svc/
  rationale: svc/ module provides Streamlit UI components enabling interactive ad-hoc analysis without
    coding; allows traders to explore backtest results, visualize weight distributions, and adjust parameters
    through web interface for rapid strategy iteration
  evidence: czsc/svc/backtest.py:15(show_weight_distribution)
  stage: backtest_analysis
  alternative_considered: 'CLI-only: rejected; insufficient UX for strategy iteration'
- id: BD-032
  type: B
  content: Position使用1/0/-1表达多头/空仓/空头
  rationale: 持仓方向必须用离散数值编码以便系统统一处理，1代表多头、0代表空仓、-1代表空头。该编码规则贯穿整个风控和交易执行流程，确保仓位状态判断的一致性和计算可确定性。边界：仅支持三种状态，超出范围的数值将导致逻辑错误。
  evidence: czsc/py/objects.py:686(__init__)
  stage: event_position
- id: BD-033
  type: B
  content: stop_loss单位为BP(基点),1BP=0.01%
  rationale: 止损参数统一采用基点单位，避免不同标的价格量纲差异导致的阈值设置困难。使用BP作为标准单位确保跨市场、跨资产的止损逻辑一致性。边界：数值需转换为百分比(除以10000)后与价格变动比较。
  evidence: czsc/py/objects.py:705(stop_loss)
  stage: event_position
  _evidence_issues:
  - 'FN_NOT_FOUND: stop_loss in czsc/py/objects.py'
