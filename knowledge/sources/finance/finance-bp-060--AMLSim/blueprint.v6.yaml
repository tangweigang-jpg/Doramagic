# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-060
name: AMLSim
sop_version: '3.6'
source:
  projects:
  - AMLSim
  commit_hash: 7338a4bcb1af9bcfea2201ad7daccfe2a4d569ca
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Synthetic Anti-Money Laundering Data Generation and Alert Pattern Validation
  description: Multi-agent simulator that generates synthetic transaction graphs with embedded AML typology
    patterns for training and validating machine learning-based AML detection systems.
  prerequisites: Users should understand graph theory fundamentals (directed graphs, degree sequences),
    AML typologies (fan-in, fan-out, cycles, scatter-gather), and have Python 3.7+ with numpy and networkx==1.11
    installed.
  not_suitable_for: Real-time transaction monitoring, production AML compliance systems, or users requiring
    actual financial transaction data (this generates synthetic data only)
stages:
- id: graph_construction
  name: Graph Construction
  order: 1
  responsibility: Builds a directed transaction graph from account lists and degree sequences using configuration-model
    random graphs. This is the foundation layer that creates the network topology for each downstream
    processing.
  interface:
    inputs:
    - name: account CSV files
      description: Raw or aggregated account data defining node entities
    - name: degree distribution CSV
      description: In/out degree sequences for graph topology
    - name: configuration JSON
      description: Simulation parameters including base_date, degree_threshold, and margin_ratio
    outputs:
    - name: Directed MultiDiGraph
      description: NetworkX Directed MultiDiGraph with account vertices and transaction edges
  required_methods:
  - name: TransactionGenerator.generate_normal_transactions
    description: Creates base transaction edges using directed configuration model, avoiding self-loops
      via ID swapping
    evidence: scripts/transaction_graph_generator.py:173(TransactionGenerator)
  - name: TransactionGenerator.build_normal_models
    description: Constructs normal transaction patterns (fan-in/out, forward, single, etc.) using Nominator
      candidate selection
    evidence: scripts/transaction_graph_generator.py:173(TransactionGenerator)
  - name: Nominator.place_normal_models
    description: Assigns normal model types to graph nodes based on degree-sorted candidate pools
    evidence: scripts/amlsim/nominator.py:3(Nominator)
  key_behaviors:
  - behavior: Directed configuration model self-loop prevention
    description: Avoids self-loops by swapping source/target IDs during edge creation, preserving the
      original degree sequence
    evidence: scripts/transaction_graph_generator.py:115(selfloop_swap_logic)
  - behavior: Hub node identification via OR semantics
    description: Nodes qualify as hubs when either in-degree OR out-degree exceeds degree_threshold, enabling
      both senders and receivers as main accounts
    evidence: scripts/transaction_graph_generator.py:300(or self.degree_threshold <= self.g.out_degree(n))
  - behavior: Fan breakdown node reuse
    description: Fan breakdown algorithm can steal nodes from existing clumps when candidate pool is exhausted,
      allowing flexible node reuse across multiple normal models
    evidence: scripts/amlsim/nominator.py:412(clump.pop())
  - behavior: Mutual candidate exclusivity
    description: Fan-in and fan-out candidates become mutually exclusive after first assignment, preventing
      a hub from serving both roles simultaneously
    evidence: scripts/amlsim/nominator.py:141,154(fan_in_candidates.remove / fan_out_candidates.remove)
  replaceable_points:
  - name: AmountGenerator
    description: Strategy for generating transaction amounts
    options:
    - name: RandomAmount
      traits:
      - uniform distribution
      - pure random values
      fit_for:
      - simple simulation scenarios
      - testing without amount patterns
      not_fit_for:
      - realistic transaction patterns
      - AML scenarios requiring round numbers
    - name: RoundedAmount
      traits:
      - adaptive step size (7-30 slots per range)
      - non-uniform distribution favoring round numbers
      fit_for:
      - realistic AML scenarios
      - psychologically-motivated transaction amounts
      not_fit_for:
      - uniform distribution requirements
      - simple unit testing
    default: RoundedAmount
  - name: NormalModelType
    description: Transaction pattern types for normal (non-suspicious) transactions
    options:
    - name: fan_in
      traits:
      - many-to-one aggregation
      - funds converge to main account
      fit_for:
      - collecting patterns
      not_fit_for:
      - distributing patterns
    - name: fan_out
      traits:
      - one-to-many distribution
      - funds diverge from main account
      fit_for:
      - distributing patterns
      not_fit_for:
      - collecting patterns
    - name: forward
      traits:
      - sequential transfers
      - chain of accounts
      fit_for:
      - layering detection scenarios
      not_fit_for:
      - single-account patterns
    - name: single
      traits:
      - isolated transactions
      - point-to-point
      fit_for:
      - baseline transactions
      not_fit_for:
      - complex typologies
    - name: mutual
      traits:
      - bidirectional flows
      - two accounts
      fit_for:
      - reciprocal patterns
      not_fit_for:
      - unidirectional analysis
    - name: periodical
      traits:
      - scheduled recurring
      - time-based patterns
      fit_for:
      - salary/payment patterns
      not_fit_for:
      - irregular timing
    default: each available
  design_decisions:
  - 'Directed configuration model avoids self-loops by swapping IDs (evidence: scripts/transaction_graph_generator.py:115(selfloop_swap_logic))
    — Standard configuration model produces self-loops; swapping IDs preserves degree sequence while preventing
    self-loops'
  - 'Degree sequences are repeated to fill total account count (evidence: scripts/transaction_graph_generator.py:166(repeats
    = num_v // in_len)) — Allows arbitrary scaling of graph size while maintaining degree distribution
    shape'
  - 'Hub nodes defined by degree_threshold crossing either in OR out degree (evidence: scripts/transaction_graph_generator.py:300(or
    self.degree_threshold <= self.g.out_degree(n))) — OR semantics allows both senders and receivers as
    main accounts for AML typologies'
  - 'Nominator uses degree-based candidate sorting (evidence: scripts/amlsim/nominator.py:42(key=lambda
    n: self.g.out_degree(n))) — Sorting fan-in candidates by out-degree ensures high-activity nodes become
    aggregation points'
  - 'Fan breakdown algorithm can steal nodes from existing clumps (evidence: scripts/amlsim/nominator.py:412(clump.pop()))
    — Allows flexible reuse of nodes across multiple normal models when candidate pool is exhausted'
  acceptance_hints:
  - Graph contains no self-loops after generation
  - Sum of in-degrees equals sum of out-degrees across each nodes
  - num_accounts is evenly divisible by degree sequence length
  - Hub accounts are correctly identified with both in/out degree exceeding threshold
  - Every account nodes have 'normal_models' list attribute initialized
  - degree_threshold is consistent between TransactionGenerator and Nominator instances
- id: alert_pattern_generation
  name: Alert Pattern Generation
  order: 2
  responsibility: Injects suspicious AML typology patterns (fan-in, fan-out, cycle, scatter-gather) into
    the base transaction graph. These represent the ground-truth alerts that validation will later detect.
  interface:
    inputs:
    - name: Base transaction graph
      description: Directed MultiDiGraph from graph_construction with normal transactions
    - name: AML typology parameter CSV
      description: Configuration for each alert pattern including amounts, periods, member counts
    outputs:
    - name: Alert subgroups
      description: alert_groups data structure tracking suspicious transactions and accounts per typology
    - name: SAR-marked vertices
      description: Account vertices marked with IS_SAR_KEY attribute
  required_methods:
  - name: TransactionGenerator.add_aml_typology
    description: Orchestrates injection of AML typology patterns into the base graph using hub accounts
    evidence: scripts/transaction_graph_generator.py:865(TransactionGenerator.add_aml_typology)
  - name: AMLTypology.add_transaction
    description: Records suspicious transactions and associated accounts for a single typology
    evidence: scripts/convert_logs.py:41(AMLTypology)
  key_behaviors:
  - behavior: Hub account selection for AML patterns
    description: AML typologies use hub accounts as main nodes because high connectivity makes suspicious
      patterns less anomalous
    evidence: scripts/transaction_graph_generator.py:893(_main_acct = random.sample(self.hubs, 1)[0])
  - behavior: Hub pool depletion
    description: Accounts are removed from hub pool after being selected, preventing overlapping alert
      patterns from sharing main accounts
    evidence: scripts/transaction_graph_generator.py:896(remove_typology_candidate)
  - behavior: Ordered pattern constraint enforcement
    description: Ordered typologies require chronological sequencing of transactions, with schedule_id
      parameter driving ordering logic
    evidence: scripts/transaction_graph_generator.py:1285 and schema.json
  - behavior: Margin ratio application
    description: Scatter-gather patterns use DEFAULT_MARGIN_RATIO=0.1 to determine intermediate account
      retention in cycle patterns
    evidence: scripts/transaction_graph_generator.py:34(DEFAULT_MARGIN_RATIO), lines 1108,1138
  replaceable_points:
  - name: AlertPattern
    description: AML typology pattern structure
    options:
    - name: fan_in
      traits:
      - many-to-one
      - funds aggregation
      - SAR-monitored
      fit_for:
      - layering detection
      - structuring detection
      not_fit_for:
      - distribution scenarios
    - name: fan_out
      traits:
      - one-to-many
      - funds distribution
      - SAR-monitored
      fit_for:
      - smurfing patterns
      - layering
      not_fit_for:
      - aggregation scenarios
    - name: cycle
      traits:
      - closed loop
      - funds return
      - ordered
      fit_for:
      - placement layering
      - integration detection
      not_fit_for:
      - linear chains
    - name: scatter_gather
      traits:
      - aggregate then distribute
      - decreasing amounts
      - ordered
      fit_for:
      - layering detection
      - margin extraction patterns
      not_fit_for:
      - single-stage patterns
    - name: gather_scatter
      traits:
      - distribute then aggregate
      - increasing amounts
      - ordered
      fit_for:
      - reverse layering patterns
      not_fit_for:
      - standard layering
    - name: random
      traits:
      - unstructured pattern
      - arbitrary connections
      fit_for:
      - complex evasion detection
      not_fit_for:
      - structured pattern analysis
    - name: stack
      traits:
      - sequential layering
      - ordered transfers
      fit_for:
      - classic layering detection
      not_fit_for:
      - burst transactions
    default: all
  design_decisions:
  - 'AML typologies use hub accounts as main nodes (evidence: scripts/transaction_graph_generator.py:893(_main_acct
    = random.sample(self.hubs, 1)[0])) — Hub accounts have high connectivity making suspicious patterns
    less anomalous'
  - 'Accounts removed from hub pool after being selected (evidence: scripts/transaction_graph_generator.py:896(remove_typology_candidate))
    — Prevents overlapping alert patterns from sharing main accounts'
  - 'Alert types encoded as integer model IDs (evidence: scripts/transaction_graph_generator.py:260(self.alert_types
    = {fan_out: 1, fan_in: 2, ...})) — Numeric IDs enable efficient filtering in downstream validation
    systems'
  - 'remove_typology_candidate called BEFORE add_node in pattern generators (evidence: scripts/transaction_graph_generator.py:896,944,967)
    — Order matters for hub accounting; reversing causes hub self-selection and duplicate account assignment'
  acceptance_hints:
  - Every AML typology patterns are successfully placed without hub conflicts
  - Alert IDs in transaction log match alert_members.csv for joinability
  - Ordered patterns have chronological transaction sequences
  - 'Scatter-gather patterns satisfy: scatter_date < gather_date AND scatter_amount > gather_amount'
  - Margin ratio of 0.1 applied correctly for intermediate account retention
- id: log_conversion
  name: Log Conversion
  order: 3
  responsibility: Transforms simulator output into standardized database schema format (Neo4j, JanusGraph).
    Applies Faker-generated names, computes party relationships, and formats timestamps.
  interface:
    inputs:
    - name: Raw transaction log
      description: Internal simulator transaction data with day offsets
    - name: Temporal account CSV
      description: Account data with temporal attributes
    - name: Alert parameter CSV
      description: Alert configuration per typology
    - name: Schema JSON
      description: Target database schema with column mappings
    outputs:
    - name: account.csv
      description: Account entities with Faker-generated names
    - name: transactions.csv
      description: Every transactions with timestamps and amounts
    - name: party_individuals.csv
      description: Individual party data
    - name: party_organizations.csv
      description: Organization party data
    - name: account_mapping.csv
      description: Account to party relationships
    - name: resolved_entities.csv
      description: Resolved entity data
    - name: sar_accounts.csv
      description: SAR-flagged accounts extracted via org_type
    - name: alert_transactions.csv
      description: Transactions associated with alerts
    - name: alert_members.csv
      description: Alert membership per account
  required_methods:
  - name: LogConverter.convert
    description: Main transformation engine reading schema.json to guide each conversions
    evidence: scripts/convert_logs.py:515(LogConverter)
  - name: Schema.get_tx_row
    description: Factory method for building transaction rows with extensible column handling
    evidence: scripts/convert_logs.py:388-407(get_tx_row)
  - name: Schema.get_account_row
    description: Builds account rows applying Faker-generated personal data
    evidence: scripts/convert_logs.py:388-407
  key_behaviors:
  - behavior: Schema-driven column mapping
    description: Schema uses dataType annotations to drive each column mappings, allowing schema evolution
      without code changes
    evidence: 'scripts/convert_logs.py:216(if d_type == transaction_id: self.tx_id_idx = idx)'
  - behavior: UTC ISO 8601 timestamp conversion
    description: Days converted to UTC ISO 8601 via base_date offset, transforming simulator day offsets
      to absolute timestamps
    evidence: scripts/convert_logs.py:384(dt = self._base_date + datetime.timedelta(num_days))
  - behavior: SAR account routing by org_type
    description: SAR accounts extracted via org_type lookup determining whether they are individuals or
      organizations
    evidence: scripts/convert_logs.py:939(org_type)
  - behavior: Silent default value insertion
    description: Missing schema columns receive silent default values rather than errors due to **attr
      row builders
    evidence: scripts/convert_logs.py:388-407
  replaceable_points:
  - name: FakerLocale
    description: Locale for generated personal data
    options:
    - name: en_US
      traits:
      - US-centric names
      - US address formats
      fit_for:
      - US banking scenarios
      - US regulatory compliance testing
      not_fit_for:
      - international scenarios
      - non-US name distributions
    - name: en_GB
      traits:
      - UK-centric names
      - UK address formats
      fit_for:
      - UK banking scenarios
      - EU compliance testing
      not_fit_for:
      - US scenarios
      - non-UK name distributions
    - name: de_DE
      traits:
      - German names
      - German address formats
      fit_for:
      - German banking scenarios
      - EU multi-country testing
      not_fit_for:
      - English-speaking scenarios
      - Anglo-centric analysis
    default: en_US
  - name: OutputFormat
    description: Target database schema
    options:
    - name: Neo4j
      traits:
      - property graph
      - Cypher-compatible
      fit_for:
      - Graph ML algorithms
      - NetworkX interoperability
      not_fit_for:
      - SQL-only analysis
      - Relational reporting
    - name: JanusGraph
      traits:
      - distributed graph
      - Gremlin-compatible
      fit_for:
      - Large-scale graphs
      - Distributed processing
      not_fit_for:
      - Single-machine analysis
      - Simple queries
    default: Neo4j
  design_decisions:
  - 'Schema drives each column mappings via dataType annotations (evidence: scripts/convert_logs.py:216(if
    d_type == transaction_id: self.tx_id_idx = idx)) — Schema-as-configuration allows schema evolution
    without code changes'
  - 'Days converted to UTC ISO 8601 via base_date offset (evidence: scripts/convert_logs.py:384(dt = self._base_date
    + datetime.timedelta(num_days))) — Simulator uses day offsets; database needs absolute timestamps'
  - 'SAR accounts extracted via org_type lookup (evidence: scripts/convert_logs.py:939(org_type)) — Determines
    whether SAR accounts are individuals or organizations for proper schema routing'
  acceptance_hints:
  - Every timestamps are valid ISO 8601 UTC format
  - SAR flag is string 'true'/'false' (lowercase) in each CSV outputs
  - Alert IDs in transaction log match alert_members.csv for joinability
  - base_date configuration matches hardcoded datetime(2017,1,1) in convert_logs.py
  - Every account nodes have 'normal_models' list attribute initialized before CSV export
- id: alert_validation
  name: Alert Validation
  order: 4
  responsibility: Validates that generated alert patterns match their expected typology parameters. Checks
    account counts, amounts, periods, and structural properties like cycle ordering and scatter-gather
    chronology.
  interface:
    inputs:
    - name: Alert parameter CSV
      description: Expected parameters for each alert typology
    - name: Alert transaction CSV
      description: Generated transactions associated with alerts
    - name: Schema JSON
      description: Column mappings for alert data files
    outputs:
    - name: alert_validations.log
      description: Validation results showing match/mismatch for each alert with detailed diagnostics
  required_methods:
  - name: AlertValidator.validate_all
    description: Main validation orchestrator checking each alert patterns against expected parameters
    evidence: scripts/validation/validate_alerts.py:291(AlertValidator)
  - name: satisfies_params
    description: Checks if alert subgraph satisfies each parameter constraints using graph-theoretic properties
    evidence: scripts/validation/validate_alerts.py:105(satisfies_params)
  - name: is_cycle
    description: Detects cyclic transaction patterns using NetworkX simple_cycles
    evidence: scripts/validation/validate_alerts.py:146(nx.simple_cycles)
  - name: is_scatter_gather
    description: Validates scatter-gather patterns requiring scatter_date < gather_date and scatter_amount
      > gather_amount
    evidence: scripts/validation/validate_alerts.py:237(scatter_amount <= gather_amount)
  key_behaviors:
  - behavior: Graph-theoretic structural validation
    description: Validation uses graph-theoretic properties (cycles, connectivity) rather than regex/text
      matching for robustness
    evidence: scripts/validation/validate_alerts.py:146(nx.simple_cycles)
  - behavior: Chronological ordering enforcement
    description: Ordered patterns check chronological sequencing of transactions by sorting edges on date
      attribute
    evidence: 'scripts/validation/validate_alerts.py:154(edges.sort(key=lambda e: e[2][date]))'
  - behavior: Scatter-gather amount constraint
    description: Scatter-gather requires intermediate amounts to decrease (scatter_amount > gather_amount)
      reflecting margin extraction
    evidence: scripts/validation/validate_alerts.py:237(scatter_amount <= gather_amount)
  - behavior: Independent pattern detection
    description: Validation module implements pattern detection (is_cycle, is_scatter_gather, is_gather_scatter)
      mirroring graph generator
    evidence: scripts/validation/validate_alerts.py:120-288
  replaceable_points:
  - name: PatternValidator
    description: Validation logic per pattern type
    options:
    - name: is_cycle
      traits:
      - closed loop detection
      - NX simple_cycles
      - minimum member count
      fit_for:
      - cycle pattern validation
      - closed-loop AML detection
      not_fit_for:
      - open-chain patterns
    - name: is_scatter_gather
      traits:
      - two-phase validation
      - amount + timing constraints
      fit_for:
      - layering pattern validation
      - margin extraction detection
      not_fit_for:
      - single-phase patterns
    - name: is_gather_scatter
      traits:
      - reverse two-phase
      - amount + timing constraints
      fit_for:
      - reverse layering validation
      not_fit_for:
      - forward layering patterns
    default: all
  design_decisions:
  - 'Validation uses graph-theoretic properties rather than regex/text matching (evidence: scripts/validation/validate_alerts.py:146(nx.simple_cycles))
    — Structural validation is more robust than string-based checks'
  - 'Ordered patterns check chronological sequencing of transactions (evidence: scripts/validation/validate_alerts.py:154(edges.sort(key=lambda
    e: e[2][date]))) — Enforces temporal ordering as a validity requirement for ordered typologies'
  - 'Scatter-gather requires intermediate amounts to decrease (evidence: scripts/validation/validate_alerts.py:237(scatter_amount
    <= gather_amount)) — Margin extraction by intermediate accounts is a key AML detection criterion'
  - 'Validation rules must stay synchronized with generation rules (evidence: scripts/validation/validate_alerts.py:120-288
    vs transaction_graph_generator.py) — Pattern generation rules in transaction_graph_generator must
    stay synchronized with validation rules'
  acceptance_hints:
  - Every generated alert patterns pass validation checks against their expected parameters
  - Cycle patterns contain closed loops detectable by NetworkX simple_cycles
  - 'Scatter-gather patterns satisfy: scatter_date < gather_date AND scatter_amount > gather_amount'
  - Alert subgraph structures match typology specifications in parameter CSV
  - Pattern generation rules in transaction_graph_generator stay synchronized with validation rules
- id: data_combination
  name: Data Combination
  order: 5
  responsibility: Merges multiple simulation outputs into a single dataset. Aggregates degrees and appends
    output CSVs for multi-simulation batch runs, enabling large-scale dataset creation.
  interface:
    inputs:
    - name: Multiple simulation config JSONs
      description: Configuration files for each simulation to be combined
    - name: Output directories
      description: Directory paths containing individual simulation outputs
    outputs:
    - name: Combined account.csv
      description: Aggregated account data from each simulations
    - name: Combined transactions.csv
      description: Concatenated transaction data from each simulations
    - name: Combined alert files
      description: Merged alert_members.csv, alert_transactions.csv from each simulations
  required_methods:
  - name: Combiner.combine
    description: Orchestrates merging of multiple simulation outputs including account and transaction
      CSVs
    evidence: scripts/combine_data.py:359(Combiner)
  - name: Combiner.merge_schemas
    description: Loads schema from first input and reuses for each combined outputs ensuring consistency
    evidence: scripts/combine_data.py:420(self.schema = load_schema(...))
  key_behaviors:
  - behavior: Schema inheritance from first input
    description: Schema loaded from first input and reused for all, establishing structure for combined
      outputs
    evidence: scripts/combine_data.py:420(self.schema = load_schema(...))
  - behavior: Row builder factory pattern
    description: Uses get_*_row() factory methods with **attr for extensible column handling across combined
      schemas
    evidence: scripts/combine_data.py:259-314
  replaceable_points: []
  design_decisions:
  - 'Schema loaded from first input and reused for all (evidence: scripts/combine_data.py:420(self.schema
    = load_schema(...))) — Every combined simulations must use compatible schemas; first one establishes
    structure'
  acceptance_hints:
  - Combined dataset maintains referential integrity across each CSV files
  - Alert IDs remain unique and joinable across combined outputs
  - Schema compatibility verified across each input simulations
data_flow:
- from_stage: graph_construction
  to_stage: alert_pattern_generation
  data: Base transaction graph (Directed MultiDiGraph with accounts + normal transaction edges)
- from_stage: alert_pattern_generation
  to_stage: log_conversion
  data: Temporally-encoded transactions.csv, accounts.csv, alert_members.csv, and alert_groups data structure
- from_stage: log_conversion
  to_stage: alert_validation
  data: alert_transactions.csv, alert_members.csv, and alert parameter file
- from_stage: graph_construction
  to_stage: alert_validation
  data: Original degree sequence and hub account definitions for structural comparison
- from_stage: data_combination
  to_stage: log_conversion
  data: Input config JSONs and output directories for multi-simulation batch processing
global_contracts:
- contract: Every timestamps in simulator output are days since base_date (2017-01-01 default)
  evidence: scripts/convert_logs.py:540(base_date_str = general_conf.get(base_date, 2017-01-01))
- contract: SAR flag is string 'true'/'false' (lowercase) in each CSV outputs
  evidence: scripts/convert_logs.py:71(is_sar = row[sar_idx].lower() == true)
- contract: Alert IDs in transaction log match alert_members.csv for joinability
  evidence: scripts/convert_logs.py:233(self.tx_alert_idx = idx)
- contract: NetworkX MultiDiGraph used for each in-memory graph representations
  evidence: scripts/transaction_graph_generator.py:180(self.g = nx.DiGraph())
- contract: 'TransactionGenerator init sequence: set_num_accounts -> generate_normal_transactions -> load_account_list
    -> load_normal_models -> build_normal_models -> set_main_acct_candidates -> load_alert_patterns ->
    mark_active_edges'
  evidence: transaction_graph_generator.py:1313-1352(__main__)
- contract: degree_threshold MUST be consistent between TransactionGenerator and Nominator instances
  evidence: transaction_graph_generator.py:250,613 and nominator.py:4
- contract: Each account node MUST have 'normal_models' list attribute initialized at add_account() time
  evidence: transaction_graph_generator.py:496 and nominator.py:369,376,382
- contract: 'Directed graph degree sequences MUST satisfy: sum(in_deg) == sum(out_deg) and num_accounts
    % len(sequence) == 0'
  evidence: transaction_graph_generator.py:87,156-164(get_in_and_out_degrees)
- contract: fan_in/fan_out candidates are mutually exclusive after first assignment - node removed from
    opposite list
  evidence: scripts/amlsim/nominator.py:141,154(fan_in_candidates.remove / fan_out_candidates.remove)
business_decisions:
- id: BD-001
  type: B
  content: Directed configuration model avoids self-loops by swapping IDs
  rationale: Standard configuration model produces self-loops which would distort AML pattern analysis;
    swapping IDs preserves the degree sequence while preventing self-referential edges. This ensures generated
    transaction graphs reflect realistic account-to-account relationships without introducing artificial
    loops that could bias detection algorithms.
  evidence: scripts/transaction_graph_generator.py:115(selfloop_swap_logic)
  stage: graph_construction
  alternative_considered: Rejection sampling was considered but rejected due to inefficiency at high densities;
    swapping approach maintains O(n) complexity while achieving self-loop-free graphs
  _evidence_issues:
  - 'FN_NOT_FOUND: selfloop_swap_logic in scripts/transaction_graph_generator.py'
- id: BD-002
  type: B
  content: Degree sequences are repeated to fill total account count
  rationale: Enables arbitrary scaling of graph size (from 100 to 100,000+ accounts) while preserving
    the statistical shape of the degree distribution. The repeat mechanism ensures that edge counts remain
    proportional to the original degree sequence, allowing generation of arbitrarily large realistic networks
    without recalculating distribution parameters.
  evidence: scripts/transaction_graph_generator.py:166(module)
  stage: graph_construction
  alternative_considered: Statistical resampling was considered but would distort the degree distribution
    shape; repetition preserves exact proportional relationships
  _evidence_issues:
  - 'FN_NOT_FOUND: module in scripts/transaction_graph_generator.py'
- id: BD-003
  type: B/BA
  content: Hub nodes defined by degree_threshold crossing either in OR out degree
  rationale: OR semantics ensures hub status captures both high-volume senders and high-volume receivers,
    which is critical for AML typologies that may involve either role. Using AND would exclude legitimate
    hub accounts that excel in only one direction, limiting pattern coverage and reducing detection effectiveness
    for one-sided transaction patterns.
  evidence: scripts/transaction_graph_generator.py:300(module)
  stage: graph_construction
  alternative_considered: AND semantics was considered but would miss legitimate hub accounts that operate
    primarily as senders or receivers; OR provides comprehensive hub identification
  _evidence_issues:
  - 'FN_NOT_FOUND: module in scripts/transaction_graph_generator.py'
