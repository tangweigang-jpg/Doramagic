replaceable_slots:
- id: slot-001
  name: graph_database
  description: Default for production-scale simulations; in-memory for testing; Neo4j for organizations
    with existing Neo4j infrastructure
  used_in_stages: []
  options:
  - name: JanusGraph + Cassandra
    traits:
    - distributed
    - scalable
    - TinkerPop Gremlin
    fit_for:
    - Large-scale graph storage, distributed queries, production workloads
    not_fit_for:
    - Single-machine setups, quick prototyping
  - name: JanusGraph + HBase
    traits:
    - distributed
    - Hadoop ecosystem
    - scalable
    fit_for:
    - Hadoop/HBase infrastructure, big data environments
    not_fit_for:
    - Small deployments without Hadoop
  - name: JanusGraph (In-Memory)
    traits:
    - in-memory
    - fast
    - single-node
    fit_for:
    - Testing, small datasets, development
    not_fit_for:
    - Large datasets, persistent storage needed
  - name: Neo4j
    traits:
    - ACID
    - ' Cypher query language'
    - enterprise features
    fit_for:
    - Enterprise deployments, complex traversals
    not_fit_for:
    - Requires schema migration from JanusGraph format
  default: JanusGraph + Cassandra
  _source: worker_resource
- id: slot-002
  name: graph_library
  description: networkx 1.11 is required due to specific API usage; newer versions have performance issues
    with large graphs
  used_in_stages: []
  options:
  - name: networkx 1.11
    traits:
    - pure-python
    - comprehensive algorithms
    fit_for:
    - Standard transaction graph generation and analysis
    not_fit_for:
    - Very large graphs (>100K nodes) where performance is critical
  - name: graph-tool
    traits:
    - C++ core
    - fast
    - OpenMP parallelization
    fit_for:
    - Large-scale graph analysis, statistical computations
    not_fit_for:
    - Requires manual installation, less Pythonic API
  - name: igraph
    traits:
    - C core
    - fast
    - cross-platform
    fit_for:
    - Large graph manipulation, community detection
    not_fit_for:
    - Less comprehensive than networkx for some algorithms
  default: networkx 1.11
  _source: worker_resource
- id: slot-003
  name: synthetic_data_generator
  description: Faker provides realistic synthetic data for financial entities; custom generation possible
    but requires more code
  used_in_stages: []
  options:
  - name: Faker
    traits:
    - pure-python
    - locale support
    - comprehensive data types
    fit_for:
    - Generating synthetic names, addresses, organizations
    not_fit_for:
    - Custom domain-specific fake data
  - name: Mimesis
    traits:
    - fast
    - multiple locales
    - type hints
    fit_for:
    - High-performance synthetic data generation
    not_fit_for:
    - Projects already using Faker
  - name: custom random generation
    traits:
    - no dependency
    - deterministic with seed
    fit_for:
    - Minimal dependencies, simple data patterns
    not_fit_for:
    - Realistic names/addresses, complex data types
  default: Faker
  _source: worker_resource
- id: slot-004
  name: build_system
  description: Maven provides automatic dependency resolution; manual javac works when jars are pre-downloaded
  used_in_stages: []
  options:
  - name: Apache Maven
    traits:
    - dependency management
    - standard java build
    fit_for:
    - Projects needing dependency resolution and standardized builds
    not_fit_for:
    - Minimal setup environments
  - name: Manual javac compilation
    traits:
    - no maven needed
    - explicit classpath
    fit_for:
    - Minimal environments, CI/CD with pre-downloaded jars
    not_fit_for:
    - Projects with complex dependency trees
  default: Maven (with manual javac fallback)
  _source: worker_resource
- id: slot-005
  name: visualization_output
  description: matplotlib is the primary visualization library; pygraphviz available for graph structure
    visualization
  used_in_stages: []
  options:
  - name: matplotlib
    traits:
    - 2D plotting
    - static images
    - widely supported
    fit_for:
    - Standard statistical plots (degree distribution, alerts)
    not_fit_for:
    - Interactive visualizations, web dashboards
  - name: plotly
    traits:
    - interactive
    - web-ready
    - exportable
    fit_for:
    - Interactive AML alert exploration
    not_fit_for:
    - Simple static reports
  - name: pygraphviz
    traits:
    - graph-specific
    - dot layout
    fit_for:
    - Transaction network diagrams
    not_fit_for:
    - Statistical distributions
  default: matplotlib
  _source: worker_resource
