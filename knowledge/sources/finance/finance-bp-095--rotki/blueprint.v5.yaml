# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-095
name: rotki
sop_version: '3.6'
source:
  projects:
  - rotki
  commit_hash: 2af250d51b1ee555744d9a23bc48b60e85144179
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Portfolio tracking, PnL accounting, and tax reporting for cryptocurrency assets
  description: Privacy-focused, self-hosted portfolio manager that tracks crypto assets across exchanges
    and blockchain networks, computes tax liabilities using configurable cost basis methods, and stores
    each data encrypted locally.
  prerequisites: Users should understand cryptocurrency basics (wallets, addresses, exchanges), have exchange
    API credentials ready, and be comfortable with self-hosting software for data privacy.
  not_suitable_for: Real-time trading execution, non-cryptocurrency asset tracking, users unwilling to
    self-host, organizations requiring multi-user access control with audit trails
  activation:
    triggers:
    - Starting new feature development in frontend or backend
    - Adding new exchange or blockchain integration
    - Adding new EVM protocol decoder
    - Creating new frontend settings
    - Reviewing pull requests
    - Running development environment with pnpm dev
    emphasis:
    - 'Use ESPECIALLY when implementing new exchanges: must implement ExchangeInterface with authentication,
      balance fetching, and trade/deposit retrieval (CLAUDE.md:§Exchange Addition)'
    - 'Use ESPECIALLY when adding EVM decoders: prefer addresses_to_decoders() over generic decoding_rules()
      for performance (AGENTS.md:§Decoder scope policy)'
    - 'Use ESPECIALLY when handling EVM addresses: ALWAYS checksum using to_checksum_address() (CLAUDE.md:§Memories)'
    - 'Use ESPECIALLY when reviewing code: follow systematic review process to avoid false positives (CLAUDE.md:§Code
      Review Guidelines)'
    anti_skip:
    - Don't skip type checking even for simple changes - explicit TypeScript typing is mandatory (CLAUDE.md:§Explicit
      TypeScript Typing Requirements)
    - Don't skip gevent wrapper for backend tests - always use pytestgeventwrapper.py (CLAUDE.md:§Common
      Issues)
    - Don't skip lint fixes when touching files - leave code cleaner than found (CLAUDE.md:§Lint & Warning
      Hygiene)
    - Don't use string_to_evm_address() for checksummed addresses - it won't checksum the literal (CLAUDE.md:§Memories)
stages:
- id: api_layer
  name: REST API Layer
  order: 1
  responsibility: Entry point for each frontend/client requests. Routes calls to appropriate services
    and handles async task management via gevent greenlets. Acts as facade to core rotkehlchen functionality.
  interface:
    inputs:
    - HTTP requests with JSON payloads
    - WebSocket subscriptions
    outputs:
    - JSON responses
    - WebSocket notifications
    - CSV exports
  required_methods:
  - name: Rotkehlchen.query_async
    description: Dispatches async queries to appropriate subsystem based on query type, returns task ID
      for tracking
    evidence: rotkehlchen/api/rest.py:399(_do_query_async)
  - name: APIServer.start
    description: Initializes Flask server with WebSocket support and begins listening for connections
    evidence: rotkehlchen/api/server.py:27(APIServer)
  - name: HistoryService.process_history
    description: Triggers history processing for specified time range across each exchanges and chains
    evidence: rotkehlchen/api/services/history.py:102(HistoryService)
  key_behaviors:
  - behavior: Greenlet-based async handling
    description: Non-blocking I/O for exchange queries and blockchain calls without threading complexity;
      gevent greenlets handle concurrent requests within single process
    evidence: rotkehlchen/api/rest.py:399(_do_query_async)
  - behavior: Decorator-based task tracking
    description: Async operations tracked via _new_task_id decorator; frontend can poll for task completion
      status
    evidence: rotkehlchen/api/rest.py:354(_new_task_id)
  - behavior: Service layer pattern
    description: Business logic isolated in domain services (HistoryService, StatisticsService, etc.)
      separate from HTTP handling
    evidence: rotkehlchen/api/services/history.py:102(HistoryService)
  replaceable_points:
  - name: Exchange connectors
    description: Plug in additional CEX adapters via ExchangeManager
    options:
    - name: kraken
      traits:
      - API key auth
      - margin support
      fit_for:
      - General crypto trading
      not_fit_for:
      - High-frequency trading
    - name: coinbase
      traits:
      - OAuth/API key
      - coinbase pro
      fit_for:
      - US-based users
      not_fit_for:
      - Non-Coinbase exchanges
    - name: binance
      traits:
      - API key auth
      - spot/margin/futures
      fit_for:
      - Global users
      - DeFi tracking
      not_fit_for:
      - US-regulated users
    - name: bybit
      traits:
      - API key auth
      - derivatives
      fit_for:
      - Derivatives traders
      not_fit_for:
      - Spot-only users
    default: kraken
  - name: Price oracles
    description: Swap oracle implementations for price feeds
    options:
    - name: coingecko
      traits:
      - Free tier
      - wide coverage
      fit_for:
      - Most users
      not_fit_for:
      - High-frequency queries
    - name: cryptocompare
      traits:
      - Historical data
      - API key
      fit_for:
      - Historical pricing
      not_fit_for:
      - Real-time accuracy
    - name: uniswapv2
      traits:
      - DEX prices
      - on-chain
      fit_for:
      - DeFi tokens
      not_fit_for:
      - CEX-only portfolios
    - name: uniswapv3
      traits:
      - DEX prices
      - concentrated liquidity
      fit_for:
      - Active DeFi users
      not_fit_for:
      - Token list filtering
    default: coingecko
  design_decisions:
  - Greenlet-based async via gevent for concurrent API handling (rotkehlchen/api/rest.py:399) - Non-blocking
    I/O for exchange queries and blockchain calls without threading complexity
  - Service layer pattern separating API from business logic (rotkehlchen/api/services/history.py:102)
    - Enables testability and single responsibility; each service handles one domain
  - Decorator-based async task tracking via _new_task_id (rotkehlchen/api/rest.py:354) - Transparent async
    operation tracking for long-running queries
  acceptance_hints:
  - API endpoints return JSON with 'result' and 'message' wrapper structure
  - Async tasks return task IDs that can be polled for completion
  - WebSocket connections receive progress updates during long-running operations
- id: blockchain_data_collection
  name: Blockchain Data Collection
  order: 2
  responsibility: Queries EVM chains and Solana for transactions, balances, and protocol-specific data.
    Manages RPC node selection, retry logic, and rate limiting across multiple chains.
  interface:
    inputs:
    - Tracked blockchain addresses
    - Time ranges for queries
    outputs:
    - Raw transaction data
    - Balance snapshots
    - Decoded events
  required_methods:
  - name: ChainsAggregator.get_history
    description: Fetches transaction history across each configured chains for given addresses and time
      range
    evidence: rotkehlchen/chain/aggregator.py:249(ChainsAggregator)
  - name: EvmNodeInquirer.query
    description: Low-level RPC query with automatic node failover and weighted selection
    evidence: rotkehlchen/chain/evm/node_inquirer.py:469(_query)
  - name: TaskManager._maybe_schedule
    description: Schedules periodic blockchain data refresh based on configured intervals
    evidence: rotkehlchen/tasks/manager.py:929(_schedule)
  key_behaviors:
  - behavior: Indexers-first strategy
    description: Etherscan/Blockscout queried before RPC for historical transactions; RPC used for recent
      data and contract calls. More reliable for historical data retrieval.
    evidence: rotkehlchen/chain/evm/node_inquirer.py:1676(_get_indexers_in_order)
  - behavior: Multicall batching
    description: Multiple balance lookups aggregated into single RPC call via multicall contract; essential
      for wallets with many tokens
    evidence: rotkehlchen/chain/evm/node_inquirer.py:1032(multicall)
  - behavior: Weighted RPC node selection
    description: User-configurable node priorities with automatic failover; reduces single-point-of-failure
    evidence: rotkehlchen/chain/evm/node_inquirer.py:469(_query)
  replaceable_points:
  - name: Chain-specific inquirers
    description: Subclasses of EvmNodeInquirer for each EVM chain
    options:
    - name: EthereumInquirer
      traits:
      - Mainnet
      - largest TVL
      fit_for:
      - ETH holders
      not_fit_for:
      - Layer 2 users
    - name: OptimismInquirer
      traits:
      - Layer 2
      - low fees
      fit_for:
      - L2 DeFi users
      not_fit_for:
      - Mainnet-only
    - name: ArbitrumInquirer
      traits:
      - Layer 2
      - Ethereum bridge
      fit_for:
      - Arbitrum DeFi
      not_fit_for:
      - Solana tokens
    - name: PolygonInquirer
      traits:
      - POS chain
      - EVM compatible
      fit_for:
      - Polygon ecosystem
      not_fit_for:
      - ZK rollup users
    default: EthereumInquirer
  - name: Indexer providers
    description: Replaceable indexer implementations for transaction lookup
    options:
    - name: etherscan
      traits:
      - Free API
      - widely used
      fit_for:
      - Basic users
      not_fit_for:
      - High volume
    - name: blockscout
      traits:
      - Open source
      - self-hostable
      fit_for:
      - Privacy users
      not_fit_for:
      - Every chains
    - name: routescan
      traits:
      - Optimism/Base
      fit_for:
      - L2 users
      not_fit_for:
      - Ethereum mainnet
    default: etherscan
  design_decisions:
  - Indexers-first strategy with RPC fallback for transaction queries (rotkehlchen/chain/evm/node_inquirer.py:1676)
    - Etherscan/Blockscout are more reliable than direct RPC for historical txs; RPC used for recent data
    and calls
  - Multicall batching for balance queries to reduce RPC overhead (rotkehlchen/chain/evm/node_inquirer.py:1032)
    - Single RPC call aggregates multiple balance lookups; essential for wallets with many tokens
  - Weighted RPC node selection with automatic failover (rotkehlchen/chain/evm/node_inquirer.py:469) -
    User-configurable node priorities ensure reliability and reduce single-point-of-failure
  acceptance_hints:
  - Transactions appear within configured chains after query completes
  - Balance snapshots include each tracked tokens for addresses
  - RPC errors trigger automatic failover to next configured node
- id: transaction_decoding
  name: Transaction Decoding
  order: 3
  responsibility: Transforms raw blockchain transactions into structured history events. Applies protocol-specific
    decoders to interpret contract calls, swaps, transfers, and DeFi interactions.
  interface:
    inputs:
    - Raw EVM transactions and logs
    - Contract ABIs
    outputs:
    - Decoded HistoryBaseEntry events
    - Event groupings (swaps, transfers, fees)
  required_methods:
  - name: EVMTransactionDecoder.decode_transactions
    description: Main decoder orchestrator that decodes raw transactions into structured events using
      protocol-specific decoders
    evidence: rotkehlchen/chain/evm/decoding/decoder.py:177(EVMTransactionDecoder)
  - name: EvmDecoderInterface.decode_event
    description: Protocol-specific decoder that interprets contract calls for a particular DeFi protocol
    evidence: rotkehlchen/chain/evm/decoding/interfaces.py:80(EvmDecoderInterface)
  key_behaviors:
  - behavior: Plug-and-play decoder architecture
    description: Each DeFi protocol gets isolated decoder subclass; new protocols added without modifying
      core decoder. EvmDecoderInterface provides abstract base.
    evidence: rotkehlchen/chain/evm/decoding/interfaces.py:80(EvmDecoderInterface)
  - behavior: Topic-based rule matching
    description: Decoder rules triggered by log topics, not transaction hashes. Handles internal contract
      calls and nested interactions.
    evidence: rotkehlchen/chain/evm/decoding/decoder.py:417(try_all_rules)
  - behavior: Reloadable decoder mixin
    description: Protocols with dynamic data (pools, gauges) auto-invalidate cache when underlying data
      changes. Applied to Curve, Balancer decoders.
    evidence: rotkehlchen/chain/evm/decoding/interfaces.py:504(ReloadablePoolsAndGaugesDecoderMixin)
  replaceable_points:
  - name: Protocol decoders
    description: Per-protocol event interpretation logic
    options:
    - name: uniswap
      traits:
      - DEX
      - V2/V3
      fit_for:
      - Uniswap traders
      not_fit_for:
      - Balancer users
    - name: curve
      traits:
      - StableSwap
      - pool tracking
      fit_for:
      - Curve LP users
      not_fit_for:
      - Uniswap traders
    - name: aave
      traits:
      - Lending
      - borrow/lend
      fit_for:
      - Aave users
      not_fit_for:
      - DEX traders
    - name: balancer
      traits:
      - Weighted pools
      fit_for:
      - Balancer LP
      not_fit_for:
      - Curve users
    - name: 1inch
      traits:
      - Aggregator
      fit_for:
      - 1inch users
      not_fit_for:
      - Direct DEX
    - name: yearn
      traits:
      - Vaults
      - strategy tracking
      fit_for:
      - Yearn vault users
      not_fit_for:
      - Uniswap only
    default: uniswap
  - name: Decoding rule priority
    description: Order in which decoders attempt matching
    options:
    - name: generic_transfer
      traits:
      - First
      - ERC20 handling
      fit_for:
      - Standard transfers
      not_fit_for:
      - Protocol-specific
    - name: erc20_transfer
      traits:
      - Token standard
      fit_for:
      - Token movement
      not_fit_for:
      - Native assets
    - name: protocol_specific
      traits:
      - Last
      - special handling
      fit_for:
      - Complex DeFi
      not_fit_for:
      - Simple transfers
    default: generic_transfer
  design_decisions:
  - Plug-and-play decoder architecture via protocol-specific subclasses (rotkehlchen/chain/evm/decoding/interfaces.py:80)
    - Each DeFi protocol gets isolated decoder; new protocols added without modifying core decoder
  - Event rules triggered by log topics, not transaction hashes (rotkehlchen/chain/evm/decoding/decoder.py:417)
    - Topic-based matching handles internal contract calls; hash-based would miss nested interactions
  - Reloadable decoder mixin for protocols with dynamic data (rotkehlchen/chain/evm/decoding/interfaces.py:504)
    - Curve, Balancer pools change over time; cache invalidation handled automatically
  acceptance_hints:
  - Raw transactions become grouped events with recognized protocol labels
  - Unknown contract calls marked as 'UNKNOWN' with raw hex data preserved
  - Swaps decoded as paired events (SPEND + RECEIVE) with fees identified
- id: exchange_integration
  name: Exchange Integration
  order: 4
  responsibility: Connects to centralized exchanges (CEX) to fetch trades, deposits, withdrawals, and
    balances. Normalizes heterogeneous exchange APIs into unified HistoryBaseEntry events.
  interface:
    inputs:
    - Exchange API credentials
    - Query time ranges
    outputs:
    - Normalized HistoryEvent records
    - AssetBalance snapshots
  required_methods:
  - name: ExchangeManager.get_exchange
    description: Factory method that creates and returns exchange instance based on Location enum
    evidence: rotkehlchen/exchanges/manager.py:58(get_exchange)
  - name: ExchangeInterface.query_trades
    description: Fetches trade history from exchange API and normalizes to HistoryBaseEntry format
    evidence: rotkehlchen/exchanges/exchange.py:509(ExchangeInterface)
  key_behaviors:
  - behavior: Location-based exchange identification
    description: Same exchange name can exist on different instances (Binance vs BinanceUS). Location
      enum ensures uniqueness.
    evidence: rotkehlchen/exchanges/manager.py:58(get_exchange)
  - behavior: Recovering session wrapper
    description: RecoveringExchangeSession handles keep-alive disconnects with automatic retry; reduces
      false failures from temporary network issues
    evidence: rotkehlchen/exchanges/exchange.py:53(RecoveringExchangeSession)
  - behavior: ExchangeWithExtras pattern
    description: Exchanges with optional settings (Kraken margin, Binance markets) use separate class
      to avoid optional parameter bloat
    evidence: rotkehlchen/exchanges/exchange.py:155(ExchangeWithExtras)
  replaceable_points:
  - name: Exchange implementations
    description: Per-exchange API adapters
    options:
    - name: kraken
      traits:
      - OAuth
      - margin accounts
      fit_for:
      - General traders
      not_fit_for:
      - High-frequency
    - name: coinbase
      traits:
      - REST + advanced
      fit_for:
      - US users
      not_fit_for:
      - Non-USD pairs
    - name: binance
      traits:
      - Spot/margin/futures
      fit_for:
      - Global DeFi
      not_fit_for:
      - US users
    - name: bitstamp
      traits:
      - EU regulated
      fit_for:
      - European users
      not_fit_for:
      - US users
    - name: bybit
      traits:
      - Derivatives focus
      fit_for:
      - Perpetual traders
      not_fit_for:
      - Spot-only
    - name: okx
      traits:
      - Global exchange
      fit_for:
      - Asian markets
      not_fit_for:
      - US regulated
    - name: kucoin
      traits:
      - Wide altcoin list
      fit_for:
      - Altcoin traders
      not_fit_for:
      - Binance users
    default: kraken
  design_decisions:
  - Location-based exchange identification (name + Location enum) (rotkehlchen/exchanges/manager.py:58)
    - Same exchange name can exist on different instances (e.g., Binance vs BinanceUS)
  - Recovering session wrapper for flaky exchange connections (rotkehlchen/exchanges/exchange.py:53) -
    Keep-alive disconnects are common; single retry before raising error reduces false failures
  - Separation of ExchangeWithExtras for exchanges with extra settings (rotkehlchen/exchanges/exchange.py:155)
    - Kraken's margin accounts, Binance's markets are optional; cleaner interface than optional params
  acceptance_hints:
  - Trade events match exchange order IDs when compared manually
  - Deposits and withdrawals have matching on-chain transactions
  - Balance snapshots reconcile with sum of trades plus deposits minus withdrawals
- id: history_event_management
  name: History Event Management
  order: 5
  responsibility: Stores, retrieves, and groups history events from each sources (on-chain, exchange,
    manual). Provides filtering, aggregation, and deduplication for event queries.
  interface:
    inputs:
    - HistoryBaseEntry events
    - Filter queries
    outputs:
    - Paginated event lists
    - Event groupings
    - CSV exports
  required_methods:
  - name: DBHistoryEvents.get_history_events
    description: Retrieves history events from database with filtering, pagination, and grouping support
    evidence: rotkehlchen/db/history_events.py:185(DBHistoryEvents)
  - name: HistoryBaseEntry.get_event_direction
    description: Classifies event as IN/OUT/NEUTRAL for accounting treatment determination
    evidence: rotkehlchen/history/events/structures/base.py:46(get_event_direction)
  key_behaviors:
  - behavior: Group identifier + sequence index pairing
    description: Swaps are 2 events (spend+receive), transfers have multiple legs; grouping enables correct
      pairing and event association
    evidence: rotkehlchen/history/events/structures/base.py:181(__init__)
  - behavior: Event direction classification
    description: IN events are acquisitions, OUT events are disposals, NEUTRAL for internal movements.
      Determines accounting treatment.
    evidence: rotkehlchen/history/events/structures/base.py:46(get_event_direction)
  - behavior: Event modification tracking
    description: User edits preserved with backup/restore capability; redecode can restore original decoded
      state
    evidence: rotkehlchen/db/history_events.py:406(save_history_event_backup)
  replaceable_points:
  - name: Event type mappings
    description: Maps raw exchange/blockchain events to HistoryEventType
    options:
    - name: exchange_trade
      traits:
      - CEX trades
      fit_for:
      - Centralized exchanges
      not_fit_for:
      - DEX swaps
    - name: evm_event
      traits:
      - On-chain events
      fit_for:
      - Blockchain transactions
      not_fit_for:
      - Manual entries
    - name: solana_event
      traits:
      - Solana chain
      fit_for:
      - Solana DeFi
      not_fit_for:
      - Ethereum
    default: exchange_trade
  design_decisions:
  - Group identifier + sequence index for event pairing (rotkehlchen/history/events/structures/base.py:181)
    - Swaps are 2 events (spend+receive), transfers have multiple legs; grouping enables correct pairing
  - 'Event direction classification (IN/OUT/NEUTRAL) (rotkehlchen/history/events/structures/base.py:46)
    - Determines accounting treatment: IN events are acquisitions, OUT events are disposals'
  - Event modification tracking with backup/restore (rotkehlchen/db/history_events.py:406) - User edits
    preserved; redecode operations can restore original decoded state
  acceptance_hints:
  - Events can be filtered by asset, time range, location, and event type
  - Event groupings reflect natural transaction relationships (swap = spend + receive)
  - User modifications do not get overwritten by automatic re-decode without explicit action
- id: accounting_pnl
  name: Accounting & PnL Calculation
  order: 6
  responsibility: Computes profit and loss for tax reporting by processing history events in chronological
    order. Applies cost basis methods, taxable/free区分, and generates CSV reports.
  interface:
    inputs:
    - Sequence of HistoryBaseEntry events
    - DBSettings (cost basis method, tax rules)
    outputs:
    - ProcessedAccountingEvent records
    - PNL totals by asset and category
    - CSV report files
  required_methods:
  - name: Accountant.process_history
    description: Main accounting orchestrator that drives event processing and PnL calculation across
      each events
    evidence: rotkehlchen/accounting/accountant.py:41(Accountant)
  - name: CostBasisCalculator.get_cost_basis
    description: Calculates cost basis for given spend using selected method (FIFO/LIFO/HIFO/ACB) with
      acquisition matching
    evidence: rotkehlchen/accounting/cost_basis/base.py:577(CostBasisCalculator)
  - name: AccountingPot.reset
    description: Resets internal state (pnls, cost_basis, events_accountant) in correct cascade order
      for fresh calculations
    evidence: rotkehlchen/accounting/pot.py:134(reset)
  key_behaviors:
  - behavior: Heap-based acquisition tracking
    description: Heapq maintains sorted order for FIFO/LIFO/HIFO without full re-sort. O(log n) insertion
      and O(1) min/max access.
    evidence: rotkehlchen/accounting/cost_basis/base.py:130(_acquisitions_heap)
  - behavior: SWAP OUT must precede IN ordering
    description: out_event always processed before in_event per _process_swap contract. Cost basis transfer
      happens between paired events.
    evidence: rotkehlchen/accounting/history_base_entries.py:199-204(_process_swap)
  - behavior: Taxable/free区分 via cost_basis_pnl flag
    description: Events can be fully taxable, partially free, or fully free based on holding period rules
      (DEFAULT_TAXFREE_AFTER_PERIOD=1 year)
    evidence: rotkehlchen/accounting/pot.py:219(add_out_event)
  - behavior: Average cost basis running totals
    description: ACB maintains current_amount and current_total_acb instead of per-lot heap; avoids repeated
      division but loses lot granularity
    evidence: rotkehlchen/accounting/cost_basis/base.py:356(__init__)
  replaceable_points:
  - name: Cost basis calculation method
    description: Strategy for matching acquisitions to disposals
    options:
    - name: FIFO
      traits:
      - First-in-first-out
      - default
      fit_for:
      - Most jurisdictions
      not_fit_for:
      - High-turnover portfolios
    - name: LIFO
      traits:
      - Last-in-first-out
      fit_for:
      - Bear markets
      not_fit_for:
      - US tax (disallowed)
    - name: HIFO
      traits:
      - Highest-in-first-out
      fit_for:
      - Tax minimization
      not_fit_for:
      - Some jurisdictions
    - name: ACB
      traits:
      - Adjusted cost basis
      - lot tracking
      fit_for:
      - Canadian/UK users
      not_fit_for:
      - Simple averaging
    default: FIFO
  - name: Accounting rules engine
    description: Customizable event processing rules
    options:
    - name: default_rules
      traits:
      - Built-in rules
      fit_for:
      - Standard users
      not_fit_for:
      - Custom scenarios
    - name: custom_rules
      traits:
      - User-defined
      fit_for:
      - Complex situations
      not_fit_for:
      - Simple accounting
    default: default_rules
  design_decisions:
  - Heap-based acquisition tracking for efficient FIFO/LIFO/HIFO matching (rotkehlchen/accounting/cost_basis/base.py:130)
    - Heapq maintains sorted order without full re-sort; O(log n) insertion and O(1) min/max access
  - Separate cost basis methods via class inheritance strategy pattern (rotkehlchen/accounting/cost_basis/base.py:299-356)
    - FIFO/LIFO/HIFO/Average have distinct algorithms; subclassing enables clean separation with shared
    base
  - Average cost basis maintains running totals instead of heap (rotkehlchen/accounting/cost_basis/base.py:356)
    - ACB requires global average, not per-lot tracking; running totals avoid repeated division
  - Taxable/free区分 via cost_basis_pnl flag on spend events (rotkehlchen/accounting/pot.py:219) - Events
    can be fully taxable, partially free, or fully free based on holding period rules
  - EventsAccountant handles SWAP and BASIS_TRANSFER pairing (rotkehlchen/accounting/history_base_entries.py:128)
    - Swaps need paired events; ACB must transfer between assets preserving original cost basis
  acceptance_hints:
  - PnL totals sum to expected values when verified manually for simple trade scenarios
  - Tax-free events are correctly identified based on holding period
  - Swap acquisitions have taxable=False invariant maintained
  - CSV export contains each expected columns with correct calculations
- id: database_layer
  name: Database Layer
  order: 7
  responsibility: Persistent storage for user data, settings, and cached information. SQLite with SQLCipher
    encryption. Handles migrations, upgrades, and query optimization.
  interface:
    inputs:
    - Write transactions
    - Query filter objects
    outputs:
    - Typed result sets
    - Cursor objects for iteration
  required_methods:
  - name: DBHandler.write
    description: Executes write transaction with encryption; each mutations go through this interface
    evidence: rotkehlchen/db/dbhandler.py:197(DBHandler)
  - name: DBHandler.transient_write
    description: Executes write in transient database that can be cleared independently of main user database
    evidence: rotkehlchen/db/dbhandler.py:646(transient_write)
  key_behaviors:
  - behavior: SQLCipher encryption
    description: Sensitive financial data requires at-rest encryption; key derived from user password.
      Every data encrypted before writing.
    evidence: rotkehlchen/db/dbhandler.py:198(__init__)
  - behavior: Modification timestamp tracking
    description: _mark_events_modified tracks when events change; enables selective cache invalidation
      for history event queries
    evidence: rotkehlchen/db/history_events.py:190(_mark_events_modified)
  - behavior: Explicit cursor management
    description: Database cursors must be closed or used in context manager; prevents resource leaks in
      long-running server process
    evidence: rotkehlchen/db/dbhandler.py:480(_connect)
  replaceable_points:
  - name: Database driver
    description: SQLCipher with password-based encryption
    options:
    - name: sqlcipher3
      traits:
      - AES-256 encryption
      - SQLite compatible
      fit_for:
      - Every users
      not_fit_for:
      - No encryption needed
    default: sqlcipher3
  design_decisions:
  - SQLCipher encryption for user database (rotkehlchen/db/dbhandler.py:198) - Sensitive financial data
    requires at-rest encryption; key derived from user password
  - Modification timestamp tracking for cache invalidation (rotkehlchen/db/history_events.py:190) - Events
    query cache can be selectively invalidated when underlying data changes
  - Separate transient DB for temporary calculations (rotkehlchen/db/dbhandler.py:646) - Report calculations
    don't pollute main user database; can be cleared independently
  acceptance_hints:
  - Database file is encrypted and unreadable without user password
  - Migrations apply correctly when upgrading between versions
  - Query results are consistent with written data
- id: asset_registry
  name: Asset Registry & Resolution
  order: 8
  responsibility: Central registry for each recognized assets (crypto, fiat, NFTs, custom). Handles resolution,
    identification, and oracle mappings for price lookups.
  interface:
    inputs:
    - Asset identifiers
    - Resolution queries
    outputs:
    - Resolved Asset instances
    - Oracle mappings
    - Token metadata
  required_methods:
  - name: Asset.resolve
    description: Resolves asset through potential chain of renames, merges, and wrapped token mappings
      to canonical form
    evidence: rotkehlchen/assets/asset.py:173(resolve)
  - name: Asset.__init__
    description: Creates immutable frozen Asset instance; hashable for use as dict keys
    evidence: rotkehlchen/assets/asset.py:100(Asset)
  key_behaviors:
  - behavior: Frozen dataclass pattern
    description: Asset instances are immutable and hashable after creation; enables use as dict keys and
      prevents accidental mutation
    evidence: rotkehlchen/assets/asset.py:100(Asset)
  - behavior: Chain-specific token classes
    description: EvmToken vs SolanaToken distinguish identical addresses on different chains. chain_id
      field ensures uniqueness.
    evidence: rotkehlchen/assets/asset.py:549(EvmToken)
  - behavior: Wrapped token resolution
    description: WETH resolves to ETH bucket for cost basis tracking. Asset resolution chains through
      swapped_for for wrapped tokens.
    evidence: rotkehlchen/assets/asset.py:233(resolve_swapped_for)
  replaceable_points:
  - name: Oracle mappings
    description: Asset to price feed symbol mappings
    options:
    - name: coingecko_id
      traits:
      - Primary oracle
      fit_for:
      - Most tokens
      not_fit_for:
      - Small caps
    - name: cryptocompare_symbol
      traits:
      - Alternative oracle
      fit_for:
      - Historical data
      not_fit_for:
      - New tokens
    default: coingecko_id
  design_decisions:
  - Frozen dataclass pattern for immutable Asset instances (rotkehlchen/assets/asset.py:100) - Hashable
    assets as dict keys; prevents accidental mutation after creation
  - Chain-specific token classes (EvmToken, SolanaToken) (rotkehlchen/assets/asset.py:549) - Different
    chains have different token standards; chain_id distinguishes identical addresses
  - Asset resolution chain (identifier -> resolved_asset) (rotkehlchen/assets/asset.py:173) - Handles
    renames, merges, wrapped tokens transparently; callers get canonical form
  acceptance_hints:
  - Same asset identifier resolves to identical Asset instance regardless of entry point
  - Wrapped tokens (WETH) correctly map to base token (ETH) for cost basis
  - Unknown tokens flagged as custom/spam with manual identification required
