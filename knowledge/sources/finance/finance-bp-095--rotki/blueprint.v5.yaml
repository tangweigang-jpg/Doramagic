  evidence: BD-100,BD-034,BD-033
  stage: global
  alternative_considered: Staking rewards explicitly marked as taxable events; jurisdiction-specific ETH2
    treatment; separate staking position tracking
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
  vague_rationale: true
- id: BD-117
  type: B/BA
  content: 'INTERACTION: BD-031 (include_crypto2crypto=True) × BD-035 (Fiat trades never taxable) → Taxable
    event boundary interaction'
  rationale: 'BD-031 defaults crypto-to-crypto trades as taxable, while BD-035 explicitly exempts fiat
    trades. The interaction creates clear boundaries: crypto-to-fiat is always taxable (BD-035''s exemption
    doesn''t apply since it''s crypto-to-fiat), fiat-to-crypto is taxable on the crypto acquisition but
    fiat is exempt, and crypto-to-crypto is taxable when BD-031 is enabled. Users who disable BD-031 to
    avoid crypto-to-crypto taxation might incorrectly assume each non-fiat trades are exempt, missing
    edge cases where ETH→USDC→BTC involves both taxable and non-taxable legs.'
  evidence: BD-031,BD-033,BD-035
  stage: global
  alternative_considered: More granular per-asset taxability settings; explicit multi-leg transaction
    decomposition; clear UI indicators for partial taxability
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-118
  type: BA
  content: 'RISK CASCADE: BD-008 (Topic-based event matching) → BD-004 (Indexers-first) → BD-006 (RPC
    failover) → BD-013 (Event grouping) → BD-020 (SWAP pairing) → BD-033 (Swap taxability) → Incorrect
    tax calculation'
  rationale: This cascade starts when BD-008's topic-based matching relies on complete event data from
    BD-004's indexers. When indexers fail and BD-006's RPC fallback returns incomplete data, internal
    transactions are missed. This propagates through BD-013's grouping, which can't pair events from missed
    internal transactions, breaking BD-020's SWAP pairing logic. The final impact reaches BD-033's taxability
    calculations, resulting in incorrect PnL reports where swap transactions appear as isolated events
    rather than properly paired exchanges. Users receive wrong tax data with no indication of the upstream
    data quality failure.
  evidence: BD-008,BD-004,BD-006,BD-013,BD-020,BD-033
  stage: global
  alternative_considered: Data quality indicators propagating through the cascade; explicit incomplete-swap
    handling; RPC fallback warning to users
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-119
  type: B/BA
  content: 'RISK CASCADE: BD-027 (FIFO default) → BD-017 (Strategy pattern) → BD-016 (Heap structure)
    → BD-057 (Priority encoding) → BD-058 (FIFO counter logic) → BD-027 (Loop closed) → Correctness depends
    on implementation coherence'
  rationale: 'The FIFO default (BD-027) selects FIFOCostBasisMethod via the strategy pattern (BD-017),
    which uses a heap structure (BD-016) with specific priority encoding (BD-057, BD-058). Each decision
    depends on the previous maintaining correctness: if the counter-based priority encoding has an off-by-one
    error, the FIFO ordering is wrong despite correct strategy and heap selection. This internal cascade
    means a bug in BD-058 silently corrupts BD-027''s intended behavior, making FIFO produce non-FIFO
    results without any obvious failure indication.'
  evidence: BD-027,BD-017,BD-016,BD-057,BD-058
  stage: global
  alternative_considered: Formal verification of priority encoding; separate heap implementations per
    method; timestamp-based FIFO without counter
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-120
  type: BA
  content: 'CONTRADICTION: BD-100 (ETH2 treated as ETH) vs Tax authority requirements for staking income
    recognition'
  rationale: BD-100 treats staked ETH as economically equivalent to regular ETH, simplifying accounting
    by treating staking as a non-disposal. However, multiple tax authorities (US IRS, UK HMRC) consider
    staking rewards as taxable income at receipt, treating them as new acquisitions. BD-100's equivalence
    mapping would incorrectly classify staking rewards as having no tax impact when they should be marked
    as taxable acquisitions. This creates a contradiction between the system's default behavior and regulatory
    requirements in major jurisdictions.
  evidence: BD-100,audit:missing_gap
  stage: global
  alternative_considered: Staking rewards explicitly marked taxable on receipt; jurisdiction-specific
    ETH2 treatment; user warning when ETH2 staking detected
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
  vague_rationale: true
- id: BD-121
  type: B/BA
  content: 'CONTRADICTION: BD-092 (Crypto2crypto taxable by default) vs International tax treatment variations'
  rationale: BD-092 defaults crypto-to-crypto trades as taxable, following conservative accounting. However,
    some jurisdictions (Germany, Singapore, Portugal before 2023) explicitly exempt crypto-to-crypto disposals
    from capital gains tax. Users in these jurisdictions who don't change the default will over-report
    tax liability. The default creates a contradiction between system behavior and jurisdictional requirements,
    placing the compliance burden on users who may not know to disable this setting.
  evidence: BD-092,BD-031,BD-033
  stage: global
  alternative_considered: Jurisdiction-aware defaults based on user location; warning when default conflicts
    with detected jurisdiction; explicit opt-in for crypto2crypto taxability
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-122
  type: BA/DK
  content: 'AMPLIFICATION: BD-037 (Asset collections default True) × BD-036 (WETH→ETH bucket) × BD-101
    (use_asset_collections=True) → Widespread cost basis pool merging'
  rationale: 'Three decisions combine to merge cost basis pools across multiple asset variants: BD-101
    enables asset collections by default, BD-036 specifically maps WETH to ETH bucket, and BD-037 enables
    use of these collections. Together they create extensive cost basis sharing that may not be obvious
    to users. A user holding ETH and WETH separately would expect separate cost basis tracking but gets
    merged pools by default. The amplification means changes in any one of these decisions affects the
    others'' behavior significantly.'
  evidence: BD-036,BD-037,BD-101,BD-094
  stage: global
  alternative_considered: Separate cost basis for ETH/WETH by default; explicit user opt-in for asset
    collection merging; clear UI indication of collection behavior
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-GAP-001
  type: B/RC
  content: ProcessedAccountingEvent serializes differently based on export_type enum (CSV/API/DB), omitting
    EVM explorer links from CSV to avoid exposing internal infrastructure
  rationale: Separating export formats allows DB storage to be self-contained while API responses include
    discovery links, and CSV stays portable without external dependencies. Breaks if explorer URLs become
    required in reports or if CSV export is used programmatically for data imports.
  evidence: rotkehlchen/accounting/structures/processed_event.py:109(to_exported_dict)
  stage: architecture
  alternative_considered: Unified export format with optional fields populated conditionally
- id: BD-GAP-002
  type: B/BA
  content: calculate_pnl has two boolean flags (count_entire_amount_spend, count_cost_basis_pnl) that
    independently gate spend vs cost-basis accounting, enabling tax scenarios where only one treatment
    applies
  rationale: Different tax jurisdictions require different PnL treatments; flagging entire amount vs cost
    basis separately handles simplified accounting. Breaks when both flags are False (zero PnL) or when
    cost basis must be calculated differently (e.g., FIFO vs specific identification).
  evidence: rotkehlchen/accounting/structures/processed_event.py:188(calculate_pnl)
  stage: accounting_pnl
  alternative_considered: Single enum parameter (FULL/SPEND_ONLY/COST_BASIS_ONLY/NONE)
- id: BD-GAP-003
  type: T
  content: Balance class implements full arithmetic operators (__add__, __sub__, __mul__, __neg__, __abs__)
    enabling mathematical operations directly on Balance objects
  rationale: Enabling inline arithmetic reduces boilerplate in balance calculations; __radd__ supports
    sum() builtin. Breaks if Balance represents non-commutative operations or if overflow semantics differ
    from FVal implementation.
  evidence: rotkehlchen/accounting/structures/balance.py:186(__add__)
  stage: implementation
  alternative_considered: 'Static methods: Balance.add(a, b)'
- id: BD-GAP-004
  type: B/RC
  content: AssetBalance separates amount() and value() methods, computing value on-demand from asset prices
    rather than storing pre-computed values
  rationale: Separation prevents stale valuations and allows price refreshes without data migration. Breaks
    when value needs to be frozen at a historical timestamp or when price lookup latency is unacceptable.
  evidence: rotkehlchen/accounting/structures/balance.py:101(amount)
  stage: architecture
  alternative_considered: Pre-computed value field updated on price changes
- id: BD-GAP-005
  type: T
  content: TimestampField accepts configurable ts_multiplier (default 1) to handle seconds vs milliseconds
    vs other unit conversions per API endpoint
  rationale: Different data sources use different time precision; multiplier allows uniform internal Timestamp
    representation. Breaks when non-integer multipliers or timezone conversions are needed.
  evidence: rotkehlchen/api/v1/fields.py:1180(__init__)
  stage: api_layer
  alternative_considered: Separate field classes per unit (TimestampSecondsField, TimestampMsField)
- id: BD-GAP-006
  type: B
  content: DelimitedOrNormalList accepts both comma-delimited strings and list-like objects, handling
    query params and JSON body inputs uniformly
  rationale: Web APIs commonly pass lists via ?ids=a,b,c or JSON body; dual acceptance improves ergonomics.
    Breaks if delimiters appear within values or if nested structures are needed.
  evidence: rotkehlchen/api/v1/fields.py:1187(_deserialize)
  stage: api_layer
  alternative_considered: Only accept JSON arrays, require client to encode properly
- id: BD-GAP-007
  type: BA
  content: EvmChainNameField serializes ChainID enum to human-readable chain name (e.g., 'ethereum') for
    frontend consumption, with reverse lookup on deserialization
  rationale: Frontend should not need mapping tables for chain ID to name; embedding discovery in serialization
    removes coupling. Breaks when chain names change or when internal ChainID differs from canonical chain
    names.
  evidence: rotkehlchen/api/v1/fields.py:967(_serialize)
  stage: api_layer
  alternative_considered: Frontend maintains ID-to-name mapping
- id: BD-GAP-008
  type: B/RC
  content: ApiSecretField only deserializes (accepts input) but does not serialize (never returns secret
    in responses), preventing secret leakage via API
  rationale: Secrets should flow only one direction (client to server); omission of _serialize ensures
    they never appear in GET responses. Breaks if debugging requires secret retrieval or if re-configuration
    workflows need current values shown.
  evidence: rotkehlchen/api/v1/fields.py:921(ApiSecretField)
  stage: security
  alternative_considered: Show masked secret (e.g., '****') on GET
- id: BD-GAP-009
  type: B/RC
  content: StakingQuerySchema has treat_eth2_as_eth boolean to collapse ETH2 staking into ETH balance,
    accommodating users who want unified ETH accounting
  rationale: ETH2 is technically different from ETH (different withdrawal mechanism) but users often want
    unified balances. Flag allows opt-in consolidation. Breaks when tax treatment differs and consolidation
    would be incorrect.
  evidence: rotkehlchen/api/v1/schemas.py:4943(__init__)
  stage: accounting_pnl
  alternative_considered: Always separate, require manual consolidation
- id: BD-GAP-010
  type: B
  content: RotkiNotifier uses Semaphore(1) lock in _ws_send_impl ensuring only one WebSocket message transmits
    at a time per connection
  rationale: Sequential sending prevents message interleaving and maintains ordering guarantees for progress
    updates. Breaks under high-throughput scenarios where parallel sends would improve responsiveness.
  evidence: rotkehlchen/api/websockets/notifier.py:23(_ws_send_impl)
  stage: infrastructure
  alternative_considered: Per-channel locks or async message queues
- id: BD-GAP-011
  type: B
  content: HistoricalBalancesManager detects negative balance events and returns (identifier, group_identifier)
    tuples to flag data integrity issues in event processing
  rationale: Negative balances indicate missed events or incorrect transaction decoding; surfacing them
    prevents silent data corruption. Breaks when legitimate negative balances exist (e.g., over-collateralized
    positions) or when events span multiple days.
  evidence: rotkehlchen/balances/historical.py:109(get_assets_amounts)
  stage: blockchain_data_collection
  alternative_considered: Null values for negative amounts
- id: BD-GAP-012
  type: T
  content: get_historical_netvalue uses SQL LAG() window function to compute balance deltas, then accumulates
    with polars for daily snapshot aggregation
  rationale: Window functions efficiently compute deltas without self-joins; polars handles accumulation
    aggregation. Breaks with very large datasets where SQL window results exceed memory, or when SQLite
    is used (LAG not available).
  evidence: rotkehlchen/balances/historical.py:234(get_historical_netvalue)
  stage: implementation
  alternative_considered: Pure Python iteration or pandas
- id: BD-GAP-013
  type: B/BA
  content: account_for_manually_tracked_asset_balances mutates balances dict in-place rather than returning
