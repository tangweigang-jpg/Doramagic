business_decisions:
- id: BD-001
  type: B/DK
  content: Greenlet-based async via gevent for concurrent API handling
  rationale: Greenlet-based concurrency enables non-blocking I/O for exchange queries and blockchain calls
    without threading complexity. This approach avoids GIL contention while maintaining simple async semantics
    within a single process, allowing thousands of concurrent requests with minimal memory overhead compared
    to thread-per-request models.
  evidence: rotkehlchen/api/rest.py:399(_do_query_async)
  stage: api_layer
  alternative_considered: Threading would add context-switch overhead; asyncio alone lacks true parallelism
    for CPU-bound tasks in sync libraries
- id: BD-002
  type: B
  content: Service layer pattern separating API from business logic
  rationale: Service layer architecture isolates API endpoints from business logic, enabling independent
    testability of each domain. Each service handles one bounded context (e.g., HistoryService), making
    the codebase modular and allowing parallel development of different features without tight coupling.
  evidence: rotkehlchen/api/services/history.py:102(HistoryService)
  stage: api_layer
  alternative_considered: Monolithic API handlers would create tight coupling between HTTP handling and
    business logic
- id: BD-003
  type: BA
  content: Decorator-based async task tracking via _new_task_id
  rationale: Async task tracking via decorator enables transparent monitoring of long-running queries
    without polluting business logic with instrumentation code. The _new_task_id mechanism provides a
    clean abstraction for tracking task lifecycle, enabling features like progress reporting and cancellation.
  evidence: rotkehlchen/api/rest.py:354(_new_task_id)
  stage: api_layer
  alternative_considered: Manual task tracking would require boilerplate in every async handler
- id: BD-004
  type: B
  content: Indexers-first strategy with RPC fallback for transaction queries
  rationale: Indexers-first approach prioritizes Etherscan/Blockscout APIs for historical transaction
    queries because they provide more reliable and complete data than direct RPC calls, which may miss
    internal transactions. RPC is used as fallback for recent data and contract calls where indexer latency
    would be problematic.
  evidence: rotkehlchen/chain/evm/node_inquirer.py:1676(_get_indexers_in_order)
  stage: blockchain_data_collection
  alternative_considered: RPC-only would miss internal transactions; pure indexer would lack real-time
    data
- id: BD-005
  type: B
  content: Multicall batching for balance queries to reduce RPC overhead
  rationale: Multicall batching aggregates multiple balance lookups into a single RPC call, dramatically
    reducing network overhead. For wallets with hundreds of tokens, this reduces RPC calls from hundreds
    to one, enabling acceptable performance even with rate-limited public RPC endpoints.
  evidence: rotkehlchen/chain/evm/node_inquirer.py:1032(multicall)
  stage: blockchain_data_collection
  alternative_considered: Individual calls would exhaust rate limits on wallets with many tokens
- id: BD-006
  type: B
  content: Weighted RPC node selection with automatic failover
  rationale: User-configurable node priorities ensure blockchain query reliability by distributing load
    across multiple providers and automatically failing over when nodes become unavailable. This reduces
    single-point-of-failure risk and improves query success rates for critical operations.
  evidence: rotkehlchen/chain/evm/node_inquirer.py:469(_query)
  stage: blockchain_data_collection
  alternative_considered: Single RPC endpoint would create outage risk; random selection lacks user preference
- id: BD-007
  type: B
  content: Plug-and-play decoder architecture via protocol-specific subclasses
  rationale: Decoder interface architecture enables adding support for new DeFi protocols without modifying
    core decoder logic. Each protocol gets an isolated decoder subclass, allowing independent versioning
    and reducing regression risk when adding new protocol support.
  evidence: rotkehlchen/chain/evm/decoding/interfaces.py:80(EvmDecoderInterface)
  stage: transaction_decoding
  alternative_considered: Monolithic decoder would require coordinated releases for protocol additions
- id: BD-008
  type: B
  content: Event rules triggered by log topics, not transaction hashes
  rationale: Topic-based event matching correctly captures internal contract calls that never appear in
    transaction-level data. Hash-based matching would miss nested interactions like DEX swaps executed
    via router contracts, leading to incomplete transaction history.
  evidence: rotkehlchen/chain/evm/decoding/decoder.py:417(try_all_rules)
  stage: transaction_decoding
  alternative_considered: Hash-based matching would miss internal transactions from router contracts
- id: BD-009
  type: BA
  content: Reloadable decoder mixin for protocols with dynamic data (pools, gauges)
  rationale: Reloadable decoder mixin handles dynamic protocol data where pool/gauge addresses change
    over time (e.g., Curve, Balancer). Automatic cache invalidation ensures decoders use current addresses,
    preventing misattribution of transactions involving deprecated pools.
  evidence: rotkehlchen/chain/evm/decoding/interfaces.py:504(ReloadablePoolsAndGaugesDecoderMixin)
  stage: transaction_decoding
  alternative_considered: Static decoding would fail on protocol upgrades and governance changes
- id: BD-010
  type: B/DK
  content: Location-based exchange identification (name + Location enum)
  rationale: Location enum disambiguates exchanges with identical names but different instances, such
    as Binance vs BinanceUS or Coinbase vs CoinbasePro. Without this distinction, users with accounts
    on multiple variants would have ambiguous balance queries and incorrect transaction matching.
  evidence: rotkehlchen/exchanges/manager.py:58(get_exchange)
  stage: exchange_integration
  alternative_considered: Name-only matching would cause collisions for users with accounts on exchange
    variants
- id: BD-011
  type: B/DK
  content: Recovering session wrapper for flaky exchange connections
  rationale: Recovering session wrapper handles keep-alive disconnections common in exchange APIs by performing
    a single automatic retry before raising errors. This reduces false failure reports from transient
    network issues while preventing infinite retry loops.
  evidence: rotkehlchen/exchanges/exchange.py:53(RecoveringExchangeSession)
  stage: exchange_integration
  alternative_considered: No retry would cause unnecessary failures; infinite retry would hang
- id: BD-012
  type: BA/DK
  content: Separation of ExchangeWithExtras for exchanges with extra settings
  rationale: ExchangeWithExtras pattern cleanly handles optional exchange-specific features like Kraken
    margin accounts or Binance markets without polluting the base interface with optional parameters.
    This provides a clear separation between common exchange functionality and per-exchange extensions.
  evidence: rotkehlchen/exchanges/exchange.py:155(ExchangeWithExtras)
  stage: exchange_integration
  alternative_considered: Optional parameters would require null checks throughout the codebase
- id: BD-013
  type: B
  content: Group identifier + sequence index for event pairing
  rationale: Group/sequence indexing enables correct pairing of multi-event transactions such as DEX swaps
    (spend + receive events) and complex transfers with multiple legs. The grouping ensures events are
    processed together and prevents misattribution between unrelated transactions.
  evidence: rotkehlchen/history/events/structures/base.py:526(__init__)
  stage: history_event_management
  alternative_considered: Flat event list would lose transaction context and cause incorrect pairing
- id: BD-014
  type: B/RC
  content: Event direction classification (IN/OUT/NEUTRAL)
  rationale: 'Event direction classification determines accounting treatment: IN events represent acquisitions
    (additions to holdings), OUT events represent disposals (potential taxable events), and NEUTRAL events
    (like approvals) have no accounting impact. This distinction is fundamental to correct PnL calculation.'
  evidence: rotkehlchen/history/events/structures/base.py:46(get_event_direction)
  stage: history_event_management
  alternative_considered: No direction classification would prevent distinguishing acquisitions from disposals
- id: BD-015
  type: BA
  content: Event modification tracking with backup/restore
  rationale: Event backup/restore mechanism preserves user modifications to decoded events while allowing
    redecode operations to restore original state when needed. This supports the workflow where users
    correct misdecoded events without losing the ability to regenerate from source data.
  evidence: rotkehlchen/db/history_events.py:406(save_history_event_backup)
  stage: history_event_management
  alternative_considered: No backup would lose user corrections on redecode; immutable storage would prevent
    corrections
- id: BD-016
  type: B
  content: Heap-based acquisition tracking for efficient FIFO/LIFO/HIFO matching
  rationale: Heapq-based acquisition tracking provides O(log n) insertion and O(1) min/max access for
    cost basis matching. For portfolios with thousands of transactions, this enables performant FIFO/LIFO/HIFO
    calculations without full re-sorting on each disposal event.
  evidence: rotkehlchen/accounting/cost_basis/base.py:130(_acquisitions_heap)
  stage: accounting_pnl
  alternative_considered: List-based tracking would require O(n) sorting on each disposal
  _evidence_issues:
  - 'FN_NOT_FOUND: _acquisitions_heap in rotkehlchen/accounting/cost_basis/base.py'
- id: BD-017
  type: B/BA
  content: Separate cost basis methods via class inheritance strategy pattern
  rationale: Strategy pattern via class inheritance cleanly separates FIFO, LIFO, HIFO, and Average cost
    basis algorithms while sharing common logic in the base class. This enables user-selected calculation
    methods without conditional branching and simplifies adding new methods.
  evidence: rotkehlchen/accounting/cost_basis/base.py:299(_acquisitions_heap)
  stage: accounting_pnl
  alternative_considered: Conditional branching would create tangled logic; interface-based would lose
    code reuse
  _evidence_issues:
  - 'FN_NOT_FOUND: _acquisitions_heap in rotkehlchen/accounting/cost_basis/base.py'
- id: BD-018
  type: B
  content: Average cost basis maintains running totals instead of heap
  rationale: Average Cost Basis (ACB) requires calculating global weighted average rather than per-lot
    tracking. Running totals (total cost, total quantity) avoid repeated division operations and floating-point
    accumulation errors inherent in maintaining a full lot history.
  evidence: rotkehlchen/accounting/cost_basis/base.py:579(__init__)
  stage: accounting_pnl
  alternative_considered: Lot-level ACB tracking would require continuous averaging; heap is unnecessary
- id: BD-019
  type: BA/DK
  content: Taxable/free区分 via cost_basis_pnl flag on spend events
  rationale: cost_basis_pnl flag on spend events enables granular taxable event classification based on
    holding period rules. Events can be fully taxable (short-term), partially tax-free (long-term portion),
    or fully tax-free, supporting jurisdiction-specific tax treatment requirements.
  evidence: rotkehlchen/accounting/pot.py:219(add_out_event)
  stage: accounting_pnl
  alternative_considered: Binary taxable flag would not support partial exemptions from holding periods
- id: BD-020
  type: B
  content: EventsAccountant handles SWAP and BASIS_TRANSFER pairing
  rationale: EventsAccountant pairing logic ensures SWAP events are correctly matched (spend to receive)
    and BASIS_TRANSFER events preserve cost basis between assets during conversions. Without proper pairing,
    swaps would show zero PnL incorrectly or double-count gains.
  evidence: rotkehlchen/accounting/history_base_entries.py:51(process)
  stage: accounting_pnl
  alternative_considered: Unpaired processing would cause incorrect cost basis and PnL reporting
- id: BD-021
  type: B
  content: SQLCipher encryption for user database
  rationale: SQLCipher provides at-rest encryption for sensitive financial data including transaction
    history, balances, and API keys. The encryption key is derived from the user's password, ensuring
    that database files stolen from disk are unreadable without the user's credentials.
  evidence: rotkehlchen/db/dbhandler.py:198(__init__)
  stage: database_layer
  alternative_considered: Unencrypted storage would expose each data if database file is accessed
- id: BD-022
  type: BA
  content: Modification timestamp tracking for cache invalidation
  rationale: Modification timestamps enable selective cache invalidation when events are edited, preventing
    stale data while avoiding full cache rebuilds. This is essential for maintaining consistency between
    cached query results and underlying event modifications.
  evidence: rotkehlchen/db/history_events.py:190(_mark_events_modified)
  stage: database_layer
  alternative_considered: TTL-based invalidation would cause staleness; full rebuild would be expensive
- id: BD-023
  type: BA
  content: Separate transient DB for temporary calculations
  rationale: Transient database isolation keeps temporary calculation data (report intermediates, tax
    calculations) separate from the main user database. This enables independent cleanup of calculation
    artifacts and prevents bloat in the primary data store.
  evidence: rotkehlchen/db/dbhandler.py:646(transient_write)
  stage: database_layer
  alternative_considered: Mixed storage would require complex cleanup; clearing would risk user data
- id: BD-024
  type: B
  content: Frozen dataclass pattern for immutable Asset instances
  rationale: Frozen dataclass pattern ensures Asset instances are immutable after creation, enabling safe
    use as dictionary keys and set members. This prevents accidental mutation bugs where asset properties
    could change after being added to collections.
  evidence: rotkehlchen/assets/asset.py:100(Asset)
  stage: asset_registry
  alternative_considered: Mutable assets would break hash-based collections; manual copying would be error-prone
- id: BD-025
  type: B
  content: Chain-specific token classes (EvmToken, SolanaToken)
  rationale: Chain-specific token classes with chain_id discrimination handle the reality that token addresses
    are not globally unique across blockchains. An ERC-20 token and a Solana SPL token may share the same
    numeric address, requiring chain context for correct identification.
  evidence: rotkehlchen/assets/asset.py:549(EvmToken)
  stage: asset_registry
  alternative_considered: Address-only identification would cause cross-chain token collisions
- id: BD-026
  type: BA
  content: Asset resolution chain (identifier -> resolved_asset)
  rationale: Multi-stage asset resolution handles token renames, mergers, and wrapped token migrations
    transparently. Callers can use any recognized identifier while receiving the canonical asset form,
    ensuring consistent treatment regardless of which identifier was originally used.
  evidence: rotkehlchen/assets/asset.py:173(resolve)
  stage: asset_registry
  alternative_considered: Strict identifier matching would fail on deprecated names; ad-hoc resolution
    would be inconsistent
- id: BD-027
  type: B/BA
  content: Default cost basis method is FIFO (First-In-First-Out)
  rationale: FIFO selected as standard cost basis calculation method per DEFAULT_COST_BASIS_METHOD constant.
    This establishes predictable and consistent ordering for determining which acquisition lots are consumed
    when assets are disposed, ensuring clear and auditable tax calculations. FIFO is the default assumption
    for capital gains in most jurisdictions, particularly the US, simplifying compliance.
  evidence: rotkehlchen/db/settings.py:69(DEFAULT_COST_BASIS_METHOD)
  stage: accounting_pnl
  alternative_considered: LIFO (Last-In-First-Out) which can inflate gains in rising markets; HIFO (Highest-In-First-Out)
    which minimizes tax liability
  _evidence_issues:
  - 'FN_NOT_FOUND: DEFAULT_COST_BASIS_METHOD in rotkehlchen/db/settings.py'
- id: BD-028
  type: B/RC
  content: HOUR_IN_SECONDS = 3600 for caching/query intervals
  rationale: Standardized hour constant at 3600 seconds used for caching intervals and query rate-limiting.
    This boundary ensures consistent timing behavior across the application for data freshness and API
    compliance.
  evidence: rotkehlchen/constants/timing.py:12(HOUR_IN_SECONDS)
  stage: accounting_pnl
  alternative_considered: Variable or hardcoded values scattered throughout codebase
  _evidence_issues:
  - 'FN_NOT_FOUND: HOUR_IN_SECONDS in rotkehlchen/constants/timing.py'
- id: BD-029
  type: B/BA
  content: YEAR_IN_SECONDS = 31536000 for tax-free holding period
  rationale: Standardized year constant used to calculate tax-free holding periods per settings.taxfree_after_period.
    This boundary determines when long-term capital gains rates apply versus short-term rates, impacting
    tax calculation accuracy.
  evidence: rotkehlchen/constants/timing.py:19(YEAR_IN_SECONDS)
  stage: accounting_pnl
  alternative_considered: Locale-specific year calculations or variable holding periods
  _evidence_issues:
  - 'FN_NOT_FOUND: YEAR_IN_SECONDS in rotkehlchen/constants/timing.py'
- id: BD-030
  type: B
  content: FREE_PNL_EVENTS_LIMIT = 1000 events for free tier
  rationale: Free tier capped at 1000 PnL events to create clear differentiation between free and premium
    users. This boundary protects premium revenue model while allowing meaningful usage for casual users.
  evidence: rotkehlchen/accounting/constants.py:12(FREE_PNL_EVENTS_LIMIT)
  stage: accounting_pnl
  alternative_considered: No limit (would eliminate premium differentiation); higher limit (would reduce
    premium value)
  _evidence_issues:
  - 'FN_NOT_FOUND: FREE_PNL_EVENTS_LIMIT in rotkehlchen/accounting/constants.py'
- id: BD-031
  type: B/BA
  content: include_crypto2crypto defaults to True
  rationale: Default setting treats crypto-to-crypto trades as taxable events. This conservative boundary
    ensures tax compliance by default, requiring users to explicitly opt-out if their jurisdiction exempts
    such trades.
  evidence: rotkehlchen/db/settings.py:51(DEFAULT_INCLUDE_CRYPTO2CRYPTO)
  stage: accounting_pnl
  alternative_considered: Default False (safer but would require users to knowingly include taxable events)
  _evidence_issues:
  - 'FN_NOT_FOUND: DEFAULT_INCLUDE_CRYPTO2CRYPTO in rotkehlchen/db/settings.py'
- id: BD-032
  type: B/BA
  content: calculate_past_cost_basis defaults to True
  rationale: Past cost basis recalculation enabled by default to ensure accurate historical tax calculations.
    This boundary handles retroactive acquisition tracking which is critical for tax accuracy when importing
    historical data.
  evidence: rotkehlchen/db/settings.py:61(DEFAULT_CALCULATE_PAST_COST_BASIS)
  stage: accounting_pnl
  alternative_considered: Default False (simpler but less accurate for users with historical trades)
  _evidence_issues:
  - 'FN_NOT_FOUND: DEFAULT_CALCULATE_PAST_COST_BASIS in rotkehlchen/db/settings.py'
- id: BD-033
  type: B/DK
  content: Swaps are only taxable when receiving asset is fiat OR include_crypto2crypto is True
  rationale: Taxability logic defines that swaps generate taxable events only when receiving fiat currency
    or when user explicitly includes crypto2crypto trades. This boundary respects jurisdictional differences
    in crypto swap taxation.
  evidence: rotkehlchen/accounting/history_base_entries.py:233(module)
  stage: accounting_pnl
  alternative_considered: Every swaps always taxable; each swaps never taxable
  _evidence_issues:
  - 'FN_NOT_FOUND: module in rotkehlchen/accounting/history_base_entries.py'
- id: BD-034
  type: B/BA
  content: Fee events can be optionally included in cost basis (include_fees_in_cost_basis default True)
  rationale: Transaction fees included in cost basis by default, treating fees as part of acquisition
    cost. This conservative boundary maximizes deductible amounts but may differ from some jurisdictional
    requirements.
  evidence: rotkehlchen/db/settings.py:72(DEFAULT_INCLUDE_FEES_IN_COST_BASIS)
  stage: accounting_pnl
  alternative_considered: Fees always separate deduction; fees never deductible
  _evidence_issues:
  - 'FN_NOT_FOUND: DEFAULT_INCLUDE_FEES_IN_COST_BASIS in rotkehlchen/db/settings.py'
- id: BD-035
  type: B/DK
  content: Fiat trades are never taxable (taxable=False for fiat)
  rationale: Fiat currency exchanges explicitly excluded from taxable events regardless of other settings.
    This boundary reflects that fiat trades are outside crypto tax jurisdiction and prevents double-taxation
    concerns.
  evidence: rotkehlchen/accounting/pot.py:259(module)
  stage: accounting_pnl
  alternative_considered: Treating fiat trades as taxable crypto events (incorrect)
  _evidence_issues:
  - 'FN_NOT_FOUND: module in rotkehlchen/accounting/pot.py'
- id: BD-036
  type: B/RC
  content: WETH mapped to ETH for cost basis tracking (same bucket)
  rationale: WETH and ETH treated as the same asset for cost basis calculations. This boundary acknowledges
    that Wrapped ETH is functionally identical to ETH and should share acquisition history for tax lot
    tracking.
  evidence: rotkehlchen/accounting/cost_basis/base.py:606-607(module)
  stage: accounting_pnl
  alternative_considered: Separate cost basis for WETH and ETH (would enable tax avoidance)
  _evidence_issues:
  - 'FN_NOT_FOUND: module in rotkehlchen/accounting/cost_basis/base.py'
- id: BD-037
  type: B/BA
  content: Asset collections can share cost basis (use_asset_collections_in_cost_basis default True)
  rationale: Asset collections enabled by default, allowing functionally equivalent assets to share cost
