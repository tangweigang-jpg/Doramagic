replaceable_slots:
- id: slot-001
  name: price_oracle_primary
  description: CoinGecko is the primary oracle. CryptoCompare is used as fallback and for OHLCV. DeFiLlama
    supplements TVL data.
  used_in_stages: []
  options:
  - name: CoinGecko
    traits:
    - crypto_prices
    - historical
    - market_data
    - free_tier
    fit_for:
    - General-purpose cryptocurrency pricing, good coverage of major tokens
    not_fit_for:
    - Privacy-sensitive use (requires API key for anonymity; free tier logs IPs); some DeFi tokens may
      be missing
  - name: CryptoCompare
    traits:
    - crypto_prices
    - real_time
    - ohlcv
    - orderbooks
    fit_for:
    - Real-time trading data, OHLCV candles, exchange orderbook data
    not_fit_for:
    - Some tokens may have lower coverage than CoinGecko
  - name: DeFiLlama
    traits:
    - defi_tvl
    - yield_data
    - no_auth
    fit_for:
    - DeFi protocol TVL and yield farming data; no API key required
    not_fit_for:
    - General price lookups; not a price oracle
  default: CoinGecko
  _source: worker_resource
- id: slot-002
  name: price_oracle_fallback
  description: CryptoCompare is the configured fallback; manual prices always take precedence.
  used_in_stages: []
  options:
  - name: CryptoCompare
    traits:
    - crypto_prices
    - fallback
    fit_for:
    - Fallback when CoinGecko fails or rate-limits
    not_fit_for:
    - When CoinGecko is unavailable and CryptoCompare is also unavailable
  - name: Manual prices
    traits:
    - manual
    - override
    fit_for:
    - User overrides for any asset; highest priority in price resolution
    not_fit_for:
    - Automated price discovery
  default: CryptoCompare
  _source: worker_resource
- id: slot-003
  name: rpc_node_provider
  description: Weighted round-robin across multiple nodes per chain; users can add owned nodes (Infura/QuickNode/Alchemy)
    with higher priority.
  used_in_stages: []
  options:
  - name: Cloudflare Ethereum Gateway
    traits:
    - public
    - free
    - no_auth
    - eth_only
    fit_for:
    - Ethereum mainnet; no setup required
    not_fit_for:
    - L2 chains, privacy-sensitive use (Cloudflare sees all queries)
  - name: Ankr
    traits:
    - public_free
    - multi_chain
    - no_auth
    fit_for:
    - Multi-chain access; good Ethereum free tier
    not_fit_for:
    - Production use without owned tier (rate limits on free)
  - name: Flashbots RPC
    traits:
    - eth_only
    - privacy
    - no_auth
    fit_for:
    - Ethereum with MEV protection; privacy-preserving transactions
    not_fit_for:
    - Non-Ethereum chains; high-throughput needs
  - name: Infura
    traits:
    - owned
    - multi_chain
    - reliable
    - api_key
    fit_for:
    - Production deployments requiring reliable, multi-chain RPC access
    not_fit_for:
    - Users without Infura accounts; free/cheap alternatives suffice for light use
  - name: QuickNode
    traits:
    - owned
    - multi_chain
    - reliable
    - api_key
    fit_for:
    - Production with premium features (traces, enhanced APIs)
    not_fit_for:
    - Free-tier users
  - name: Alchemy
    traits:
    - owned
    - enhanced_apis
    - nft_data
    - traces
    - api_key
    fit_for:
    - Enhanced APIs (NFTs, traces, decoded events); recommended by rotki
    not_fit_for:
    - Free users; simple RPC-only needs
  - name: Blockscout (RPC)
    traits:
    - public
    - free
    - multi_chain
    - no_auth
    fit_for:
    - Optimism, Polygon, Arbitrum, Base, Gnosis, Scroll, Hyperliquid; no key needed
    not_fit_for:
    - Ethereum mainnet (limited); privacy-sensitive queries
  default: Cloudflare + Ankr + Flashbots + MyEtherWallet (ETH); chain-specific public nodes
  _source: worker_resource
- id: slot-004
  name: evm_explorer_api
  description: Etherscan is primary; Blockscout used as fallback for chains it supports; Routescan used
    for L2 L1 fee extraction.
  used_in_stages: []
  options:
  - name: Etherscan
    traits:
    - primary
    - eth
    - bsc
    - polygon
    - arbitrum
    - optimism
    - api_key
    fit_for:
    - Ethereum and most EVM chains; full feature set
    not_fit_for:
    - Gnosis, Scroll, Base (dedicated explorers available); rate limits on free tier
  - name: Blockscout
    traits:
    - multi_chain
    - no_auth
    - rpc_also
    fit_for:
    - Multi-chain; Gnosis, Scroll, Base, Hyperliquid; no API key needed
    not_fit_for:
    - Ethereum mainnet (shared PRO API may be rate-limited)
  - name: Routescan
    traits:
    - eth
    - optimism
    - l1_fees
    - api_key
    fit_for:
    - Ethereum, Optimism (especially L1 fee extraction); free placeholder key accepted
    not_fit_for:
    - Other chains not supported by Routescan
  default: Etherscan (primary) + Blockscout (fallback per chain) + Routescan (for L1 fees on L2s)
  _source: worker_resource
- id: slot-005
  name: fiat_exchange_rate_provider
  description: Only fiat exchange rate provider in the codebase; beautifulsoup4 is also used for HTML
    parsing.
  used_in_stages: []
  options:
  - name: x-rates.com (web scraping)
    traits:
    - fiat
    - historical
    - current
    - no_auth
    fit_for:
    - Fiat currency exchange rates (EUR, USD, GBP, etc.); both current and historical
    not_fit_for:
    - Cryptocurrency rates; scraping may break if website changes
  default: x-rates.com (web scraping)
  _source: worker_resource
- id: slot-006
  name: solana_rpc_provider
  description: Helius recommended; user can configure owned RPC; The Graph / Helius used for tx decoding
    when Helius key provided.
  used_in_stages: []
  options:
  - name: Helius (recommended)
    traits:
    - solana
    - api_key
    - enhanced_txs
    - rpc_fallback
    fit_for:
    - Enhanced Solana transaction parsing; RPC fallback when API key provided
    not_fit_for:
    - Without API key (rate limits apply at 2 req/sec free)
  - name: Public Solana RPC
    traits:
    - public
    - free
    - no_auth
    fit_for:
    - Basic Solana RPC access
    not_fit_for:
    - Enhanced transaction parsing; rate limits
  default: Public Solana RPC nodes (from nodes.json if any configured)
  _source: worker_resource
- id: slot-007
  name: ethereum_beacon_chain_api
  description: Only ETH2 staking data provider in codebase; requires API key.
  used_in_stages: []
  options:
  - name: beaconcha.in
    traits:
    - eth2
    - validator_data
    - api_key
    fit_for:
    - ETH validator/staking balance queries, attestations, proposer duties
    not_fit_for:
    - Non-validator ETH2 data needs
  default: beaconcha.in
  _source: worker_resource
- id: slot-008
  name: nft_marketplace_api
  description: Only NFT marketplace integrated; has backup free API key.
  used_in_stages: []
  options:
  - name: OpenSea API
    traits:
    - nft
    - ownership
    - floor_prices
    - ethereum
    - api_key
    fit_for:
    - NFT ownership queries, collection floor prices, NFT metadata
    not_fit_for:
    - Non-OpenSea NFTs; other marketplaces (Blur, Rarible, Magic Eden) not directly supported
  default: OpenSea API
  _source: worker_resource
- id: slot-009
  name: database_encryption
  description: User database must be encrypted (contains sensitive keys/assets); global DB ships unencrypted
    in the package and is copied to user dir as read-write copy at first run.
  used_in_stages: []
  options:
  - name: SQLCipher (default)
    traits:
    - encrypted
    - sqlcipher
    - aes_256
    - open_source
    fit_for:
    - Production use; encrypts user DB at rest with AES-256
    not_fit_for:
    - Environments where SQLCipher native libraries are unavailable
  - name: rsqlite (read-only global DB)
    traits:
    - read_only
    - packaged
    - unencrypted
    fit_for:
    - Read-only access to the bundled global asset database (shipped with app)
    not_fit_for:
    - User database (needs writes); any modification
  default: sqlcipher3 for user DB (encrypted); rsqlite for bundled global DB (read-only)
  _source: worker_resource
- id: slot-010
  name: async_runtime
  description: gevent is the only async runtime used; required because SQLite is used in an async greenlet
    context and requires yielding to prevent blocking.
  used_in_stages: []
  options:
  - name: gevent (default & only)
    traits:
    - greenlets
    - non_blocking_io
    - sqlite_safe
    fit_for:
    - All production deployments; allows SQLite to be safely used in async context via cooperative yielding
    not_fit_for:
    - Python async/await native code; environments where greenlet patching is problematic
  default: gevent
  _source: worker_resource
