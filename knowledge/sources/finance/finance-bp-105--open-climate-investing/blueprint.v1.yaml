- id: BD-030
  type: B/BA
  content: BMG (Brown-Minus-Green) factor = Brown stock returns minus Green stock
    returns, calculated as return_x - return_y
  rationale: 'The BMG factor quantifies the risk differential between high-carbon
    (Brown) and low-carbon (Green) firms. Boundary: This long-short portfolio construction
    captures pure carbon risk premium without contamination from other factor exposures.
    Used as the primary dependent variable in carbon risk regression analysis to identify
    whether ESG differentiation affects expected returns.'
  evidence: scripts/bmg_series.py:11(add_bmg_series)
  stage: bmg_factor_computation
  alternative_considered: Alternative BMG formulations (e.g., market-cap weighted)
    were not implemented; equal-weighted subtraction was chosen for simplicity and
    interpretability
- id: BD-031
  type: T
  content: Default data frequency is MONTHLY across each operations
  rationale: 'Monthly frequency balances statistical power with data availability
    for long-horizon regression. Boundary: Monthly returns provide 12 observations
    per year versus daily (252), enabling reliable factor exposure estimation over
    5-year windows while reducing noise from intra-month volatility and microstructure
    effects.'
  evidence: scripts/bmg_series.py:152(frequency)
  stage: data_collection
  alternative_considered: Daily frequency was rejected due to higher noise and microstructure
    bias; weekly was rejected as it offers no advantage over monthly for long-horizon
    studies
  _evidence_issues:
  - 'FN_NOT_FOUND: frequency in scripts/bmg_series.py'
- id: BD-032
  type: T
  content: Default significance threshold = 0.05 for regression analysis
  rationale: 'The 5% significance level is the standard threshold in financial econometrics
    for hypothesis testing. Boundary: Factors with p-values below 0.05 are retained
    in the final regression model, ensuring statistical validity while avoiding overfitting
    from marginal predictors. Applied to t-statistics for factor coefficient significance
    tests.'
  evidence: scripts/bmg_analyze.py:207(significance)
  stage: Statistical Testing
  alternative_considered: 10% threshold was rejected as too liberal for academic publication
    standards; 1% was rejected as too conservative for exploratory analysis
  _evidence_issues:
  - 'FN_NOT_FOUND: significance in scripts/bmg_analyze.py'
- id: BD-033
  type: T
  content: Orthogonalization significance threshold = 0.10
  rationale: 'The 10% threshold for orthogonalization is more permissive than the
    5% regression threshold to ensure comprehensive factor cleaning. Boundary: BMG
    is orthogonalized against Fama-French factors when correlation significance exceeds
    0.10, preventing multicollinearity in downstream regressions while retaining factors
    with weak but non-trivial correlations.'
  evidence: scripts/correlate.py:177(significance)
  stage: factor_orthogonalization
  alternative_considered: 5% threshold was rejected as too strict for orthogonalization,
