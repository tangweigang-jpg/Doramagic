resources:
- id: res-slot-001
  type: replaceable_component
  name: stock_price_data_source
  path: null
  description: Yahoo Finance is default due to free access, good fundamentals data,
    and no API key required. Use alternatives if Yahoo Finance changes terms or for
    specific data needs.
  used_in_stages: []
  options:
  - name: Yahoo Finance (yfinance)
    traits:
    - free
    - real-time-ish
    - global_stocks
    - fundamentals
    fit_for:
    - Most common use cases; good coverage of US and global stocks with fundamentals
    not_fit_for:
    - High-frequency trading, custom data feeds, institutional data needs
  - name: Alpha Vantage
    traits:
    - free_tier
    - historical
    - API_key_required
    fit_for:
    - Historical daily/monthly data, alternative to Yahoo
    not_fit_for:
    - Real-time data on free tier, high volume requests
  - name: Pandas DataReader
    traits:
    - multi_source
    - wrapper
    fit_for:
    - Accessing FRED, World Bank, or multiple stock sources
    not_fit_for:
    - Comprehensive stock fundamentals
  default: Yahoo Finance (yfinance)
  _source: worker_resource
- id: res-slot-002
  type: replaceable_component
  name: fama_french_factors_source
  path: null
  description: Ken French library is the authoritative source for academic Fama-French
    factors. Alternative sources may offer different factor definitions or more frequent
    updates but require different implementations.
  used_in_stages: []
  options:
  - name: Dartmouth Ken French Data Library (official)
    traits:
    - academic
    - authoritative
    - free
    fit_for:
    - Standard academic research, Fama-French factor replication
    not_fit_for:
    - Real-time factor updates
  - name: AQR Capital Factors
    traits:
    - alternative
    - quality_factors
    fit_for:
    - Alternative factor research, quality-minus-junk factors
    not_fit_for:
    - Exact Fama-French replication
  - name: Portfolio Visualizer
    traits:
    - modern
    - online_access
    fit_for:
    - Quick factor analysis without local data management
    not_fit_for:
    - Bulk processing, offline operation
  default: Dartmouth Ken French Data Library
  _source: worker_resource
- id: res-slot-003
  type: replaceable_component
  name: carbon_risk_factor_source
  path: null
  description: CARIMA provides validated academic carbon risk factors. For daily frequency
    or custom definitions, the BMG construction using bmg_series.py allows combining
    any brown and green ETF pair.
  used_in_stages: []
  options:
  - name: CARIMA (University of Augsburg)
    traits:
    - academic
    - validated
    - monthly
    fit_for:
    - Academic research, validated carbon risk measurement
    not_fit_for:
    - Real-time carbon risk, daily updates
  - name: Self-constructed BMG (XOP-SMOG)
    traits:
    - custom
    - daily_available
    - transparent
    fit_for:
    - Daily frequency analysis, custom brown/green definitions
    not_fit_for:
    - Academic validation, comparison with other studies
  - name: MSCI Low Carbon Index (CRBN)
    traits:
    - institutional
    - broad_coverage
    fit_for:
    - Institutional investors, broader low-carbon definition
    not_fit_for:
    - Precise brown/green construction
  default: CARIMA (for monthly), Self-constructed XOP-SMOG (for daily)
  _source: worker_resource
- id: res-slot-004
  type: replaceable_component
  name: database_system
  path: null
  description: PostgreSQL is used for its materialized views (stock_and_stats views)
    which significantly improve query performance for repeated analysis. Switch to
    SQLite for simpler local use, or MySQL if hosted environment requires it.
  used_in_stages: []
  options:
  - name: PostgreSQL
    traits:
    - relational
    - ACID
    - materialized_views
    - SQL
    fit_for:
    - Production deployment, complex queries, materialized views for performance
    not_fit_for:
    - Simple single-user local analysis (use SQLite instead)
  - name: SQLite
    traits:
    - serverless
    - single_file
    - limited_concurrency
    fit_for:
    - Local development, small datasets, single-user analysis
    not_fit_for:
    - Multi-user access, high concurrency, large datasets
  - name: MySQL/MariaDB
    traits:
    - relational
    - wide_use
    - ACID
    fit_for:
    - Shared hosting, web applications
    not_fit_for:
    - Advanced analytics (lacks advanced PostgreSQL features)
  default: PostgreSQL
  _source: worker_resource
