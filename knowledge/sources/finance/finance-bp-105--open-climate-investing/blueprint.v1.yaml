  type: T
  content: 'Regression interval defaults: 60 months for MONTHLY, 730 days for DAILY'
  rationale: 'The 60-month (5-year) and 730-day (2-year) windows provide sufficient
    observations for stable beta estimation. Boundary: 60 months yields 60 observations
    for monthly regressions (5x the 12-factor degrees of freedom requirement), while
    730 days yields approximately 730 daily observations. Both exceed the N+10 minimum
    data point requirement for statistical validity.'
  evidence: scripts/get_regressions.py:231(interval)
  stage: results_analysis
  alternative_considered: 36-month window was rejected as too short for stable beta
