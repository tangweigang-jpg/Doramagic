  rationale: 'Computing composite returns from weighted component returns before regression
    ensures the composite appears as a single security with consistent factor exposures.
    Aggregating after regression would produce meaningless blended factor loadings
    that don''t correspond to any tradable asset. This timing boundary maintains the
    causal chain: returns first, then factor attribution. It also ensures composites
    inherit the same return distribution properties as individual stocks.'
  evidence: get_stocks.py:284-289(sum_p_returns/sum_percentages = composite_return)
