  _evidence_issues:
  - 'FN_NOT_FOUND: interval in scripts/get_regressions.py'
- id: BD-035
  type: T
  content: Minimum 20 data points required for valid regression
  rationale: 'The 20-point minimum prevents unreliable coefficient estimates from
    undersized samples. Boundary: With 4 Fama-French factors, 20 points provides 16
    degrees of freedom, exceeding the 14 minimum (N+10 where N=4) requirement. This
    threshold balances data availability against statistical reliability for individual
    stock regressions.'
  evidence: scripts/factor_regression.py:115(module)
  stage: data_collection
  alternative_considered: 30-point minimum was rejected as too restrictive for monthly
