- id: BD-087
  type: BA
  content: Outlier filter bounds returns to [-0.5, 0.5] before regression
  rationale: The [-0.5, 0.5] bounds correspond to ±50% single-period returns, capturing
    extreme events while excluding data entry errors and survivorship bias artifacts.
    This boundary prevents outliers from disproportionately influencing OLS coefficients,
    which are sensitive to leverage points. Tighter bounds would lose legitimate extreme
    observations; looser bounds would let errors dominate. The threshold assumes daily/monthly
    periodicity where 50% moves are plausible but rare.
