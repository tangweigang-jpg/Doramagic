id: finance-bp-105
name: open-climate-investing
sop_version: '3.6'
source:
  projects:
  - open-climate-investing
  commit_hash: 8ac01b650d9133f90a64ebed84bb24d376cb5616
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Multi-factor equity returns model with climate (BMG) factor
  description: A multi-factor equity returns model that adds a Brown Minus Green (BMG)
    climate risk factor to the Fama-French and Carhart models for portfolio optimization,
    relative value trading, and climate-aligned benchmark construction.
  prerequisites: Understanding of factor investing, Fama-French models, basic Python,
    PostgreSQL database administration, and familiarity with climate risk concepts.
  not_suitable_for: Real-time trading systems, non-equity assets (bonds, commodities),
    single-factor analysis workflows, users without database infrastructure, or those
    requiring pre-computed factor data (this project computes factors from scratch).
stages:
- id: data_collection
  name: Stock Data Collection
  order: 1
  responsibility: Fetches stock price data from Yahoo Finance API with monthly/daily
    frequency support. Provides retry logic and incomplete data filtering. Acts as
    the primary data ingestion point for each downstream analysis.
  interface:
    inputs:
    - ticker symbol string (e.g., 'AAPL')
    outputs:
    - DataFrame with Date index and Close column
  required_methods:
  - name: stock_grabber
    description: Core fetcher using yfinance library with 3 retry attempts on JSON
      decode errors. Handles both monthly and daily intervals.
    evidence: scripts/stock_price_function.py:14(function)
  key_behaviors:
  - behavior: Monthly interval uses 1mo yfinance interval
    description: Monthly frequency requires monthly candles (1mo) for proper MonthEnd
      alignment, not daily candles aggregated. This ensures financial convention compliance
      for monthly returns.
    evidence: scripts/stock_price_function.py:22
  - behavior: Last entry dropped assuming incomplete candle
    description: Prevents partial month data from corrupting returns by dropping the
      most recent entry which may represent an incomplete time period.
    evidence: scripts/stock_price_function.py:28
  - behavior: Monthly dates aligned to MonthEnd
    description: Dates are aligned to month-end using pandas MonthEnd offset to ensure
      consistency with financial convention for monthly return calculations.
    evidence: scripts/stock_price_function.py:30
  - behavior: 3 retry attempts on transient failures
    description: Network or API failures are handled gracefully with up to 3 retry
      attempts for JSON decode errors before failing.
    evidence: scripts/stock_price_function.py:16-17
  replaceable_points:
  - name: data_source
    description: Source of stock price data
    options:
    - name: yfinance
      traits:
      - Free
      - No API key required
      - Real-time data
      - Subject to rate limits
      fit_for:
      - Quick prototyping
      - Individual investors
      - Non-commercial use
      not_fit_for:
      - Production trading systems
      - High-frequency requirements
      - Commercial data licensing
    - name: Alpha Vantage
      traits:
      - Free tier available
      - API key required
      - Historical data
      fit_for:
      - Alternative to yfinance
      - Structured API access
      not_fit_for:
      - Real-time data needs
      - High volume requirements
    - name: Bloomberg
      traits:
      - Professional grade
      - Expensive license
      - Comprehensive data
      fit_for:
      - Institutional use
      - Research with budget
      - Professional workflows
      not_fit_for:
      - Individual investors
      - Budget-constrained projects
    default: yfinance
  design_decisions:
  - 'Monthly interval uses 1mo yfinance interval (NOT 1d) (evidence: scripts/stock_price_function.py:22)
    — Monthly frequency requires monthly candles for proper MonthEnd alignment L30'
  - 'Drops last entry assuming incomplete candle (evidence: scripts/stock_price_function.py:28)
    — Prevents partial month data from corrupting returns'
  - 'Monthly dates aligned to MonthEnd via pandas offset (evidence: scripts/stock_price_function.py:30)
    — Ensures consistency with financial convention for monthly returns'
  - '3 retry attempts on JSON decode errors (evidence: scripts/stock_price_function.py:16-17)
    — Handles transient network/API failures gracefully'
  acceptance_hints:
  - Returned DataFrame has 'Date' as index with name 'Date'
  - Monthly data ends on MonthEnd dates
  - Last entry is complete (not partial period)
  - Fetch succeeds within 3 retry attempts for valid tickers
  - Close column contains numeric price values
- id: data_import
  name: Database Setup & Data Import
  order: 2
  responsibility: Initializes PostgreSQL schema, imports Fama-French factors, carbon
    risk factors, stock constituents, and other reference data. Provides batch CSV
    ingestion with idempotent upsert behavior.
  interface:
    inputs:
    - CSV files in data/ directory (FF factors, MSCI constituents, stock stats)
    outputs:
    - 'PostgreSQL tables: stocks, stock_data, carbon_risk_factor, ff_factor, risk_free,
      stock_components, stock_stats'
  required_methods:
  - name: load_data_files
    description: Orchestrates each data imports from CSV files into PostgreSQL tables
      with proper schema initialization.
    evidence: scripts/setup_db.py:262
  - name: import_monthly_ff_data_factors_into_sql
    description: Parses raw Fama-French CSV files and inserts into ff_factor table
      using COPY FROM with grep filtering for headers.
    evidence: scripts/setup_db.py:159
  - name: import_msci_constituents_into_sql
    description: Imports index constituents with weights into stock_components table
      for composite stock calculations.
    evidence: scripts/setup_db.py:74
  key_behaviors:
  - behavior: ON CONFLICT DO NOTHING for data imports
    description: Prevents duplicate key errors on re-runs while allowing incremental
      updates. Makes the import process idempotent.
    evidence: scripts/setup_db.py:51
  - behavior: COPY FROM PROGRAM with grep for FF files
    description: Raw FF files have header rows that must be filtered; grep is used
      as preprocessing before COPY for performance.
    evidence: scripts/setup_db.py:113
  - behavior: Frequency column on each time series tables
    description: Enables storing both MONTHLY and DAILY versions of the same data
      in the same tables with different frequency designations.
    evidence: scripts/init_schema.sql:5,92,95
  - behavior: Stores both close price AND computed return
    description: Avoids recomputation; return is stored as pct_change of close in
      stock_data table.
    evidence: scripts/init_schema.sql:94-95
  replaceable_points:
  - name: database
    description: PostgreSQL database backend
    options:
    - name: PostgreSQL
      traits:
      - Full feature set
      - Connection pooling
      - UPSERT support
      - COPY FROM
      fit_for:
      - Production use
      - Concurrent workers
      - Large datasets
      not_fit_for:
      - Simple testing
      - Single-user scenarios
      - No database available
    - name: SQLite (limited)
      traits:
      - No setup required
      - File-based
      - Limited concurrency
      fit_for:
      - Local testing
      - Simple prototypes
      - Single-user analysis
      not_fit_for:
      - Multiprocessing
      - Large datasets
      - Concurrent writes
    default: PostgreSQL
  design_decisions:
  - 'ON CONFLICT DO NOTHING for data imports (evidence: scripts/setup_db.py:51) —
    Prevents duplicate key errors on re-runs while allowing incremental updates'
  - 'Uses COPY FROM PROGRAM with grep to filter raw FF files (evidence: scripts/setup_db.py:113)
    — Raw FF files have header rows that must be filtered - grep as preprocessing'
  - 'WML (weak momentum) stored in same ff_factor table (evidence: scripts/init_schema.sql:19)
    — Unified factor storage for each FF factors'
  - 'Stores both close price AND computed return in stock_data (evidence: scripts/init_schema.sql:94-95)
    — Avoids recomputation; return = pct_change of close'
  - 'Frequency column on each time series tables (evidence: scripts/init_schema.sql:5,92,95)
    — Enables storing MONTHLY and DAILY versions of same data'
  acceptance_hints:
  - Schema initialized with each required tables
  - Fama-French factors (Mkt-RF, SMB, HML, WML) loaded
  - MSCI constituents with weights present in stock_components
  - No duplicate primary key violations on re-run
  - Frequency column values are 'MONTHLY' or 'DAILY'
- id: bmg_factor_computation
  name: BMG Factor Computation
  order: 3
  responsibility: Computes Brown-Minus-Green (BMG) carbon risk factor from index constituent
    returns. BMG = Brown Returns - Green Returns. Positive BMG means brown stocks
    outperform green, indicating carbon risk premium.
  interface:
    inputs:
    - green_ticker (e.g., clean energy ETF like SMOG)
    - brown_ticker (e.g., fossil fuel ETF like XOP)
    outputs:
    - carbon_risk_factor table entries with BMG column values
  required_methods:
  - name: add_bmg_series
    description: Core BMG calculation that computes return_x - return_y (brown minus
      green) and stores in database.
    evidence: scripts/bmg_series.py:11
  - name: get_bmg_series
    description: Lists each BMG factors stored in database for selection in regression
      analysis.
    evidence: scripts/bmg_series.py:64
  - name: load_stocks_returns_from_db
    description: Loads returns from database with support for composite index constituent
      weighting (IVV, XWD.TO).
    evidence: scripts/get_stocks.py:224
  key_behaviors:
  - behavior: BMG = Brown Returns - Green Returns
    description: 'Subtraction order is critical: brown minus green. Positive BMG indicates
      brown stocks outperform green, suggesting carbon risk premium exists.'
    evidence: scripts/bmg_series.py:31
  - behavior: Composite returns = weighted average of components
    description: Index funds (IVV, XWD.TO) require constituent weighting for accurate
      return calculation before BMG computation.
    evidence: scripts/get_stocks.py:288
  - behavior: NaN values removed before storing BMG
    description: Inner join on returns ensures valid paired observations only; no
      incomplete data points stored.
    evidence: scripts/bmg_series.py:35-36
  replaceable_points:
  - name: factor_definition
    description: Formula for carbon risk factor
    options:
    - name: BMG (Brown-Green)
      traits:
      - Long brown, short green
      - Industry standard
      - Interpretable
      fit_for:
      - Carbon risk research
      - Climate investing
      - Portfolio analysis
      not_fit_for:
      - Sector-neutral analysis
      - Micro-cap focus
    - name: Short Long Spread
      traits:
      - Similar structure
      - Customizable
      - Flexible
      fit_for:
      - Custom factor research
      - Alternative definitions
      not_fit_for:
      - Standard BMG comparison
    - name: Sector-adjusted
      traits:
      - Sector-neutral
      - Removes sector bias
      fit_for:
      - Pure carbon exposure
      - Sector-agnostic analysis
      not_fit_for:
      - Simple factor models
      - Quick analysis
    default: BMG
  design_decisions:
  - 'BMG = Brown Returns - Green Returns (evidence: scripts/bmg_series.py:31) — Positive
    BMG means brown stocks outperform green - carbon risk premium'
  - 'Composite stock returns = weighted average of components (evidence: scripts/get_stocks.py:288)
    — Index funds (IVV, XWD.TO) need constituent weighting for accurate returns'
  - 'NaN values removed before storing BMG (evidence: scripts/bmg_series.py:35-36)
    — Inner join on returns ensures valid paired observations'
  acceptance_hints:
  - BMG values stored in carbon_risk_factor table
  - BMG = return_x - return_y (brown minus green)
  - No NaN values in stored BMG series
  - '''DEFAULT'' is reserved as system default factor name'
  - Factor available for regression selection by name
- id: factor_regression
  name: Factor Regression Analysis
  order: 4
  responsibility: Runs OLS regressions of stock returns on carbon risk factor and
    Fama-French factors. Computes coefficients, t-stats, p-values, and diagnostic
    statistics with proper data alignment and validation.
  interface:
    inputs:
    - stock_returns, carbon_factor (BMG), ff_factors (Mkt-RF, SMB, HML, WML), rf_rate
      (risk-free)
    outputs:
    - OLS model output, coefficient DataFrame with diagnostic stats (t-stats, p-values,
      R²)
  required_methods:
  - name: run_regression
    description: Single stock regression with date range filtering, data merging,
      and excess return calculation.
    evidence: scripts/factor_regression.py:49
  - name: regression_input_output
    description: Core OLS estimation using statsmodels and coefficient extraction
      with winsorization filter.
    evidence: scripts/regression_function.py:7
  - name: merge_data
    description: Joins multiple DataFrames on date index using inner join to ensure
      aligned observations.
    evidence: scripts/factor_regression.py:29
  key_behaviors:
  - behavior: Inner join on dates for each DataFrame merges
    description: Only periods with each data available are included in regression,
      ensuring valid statistical inference.
    evidence: scripts/factor_regression.py:32
  - behavior: Excess returns = Close - Rf (risk-free rate)
    description: Standard CAPM/FF methodology uses excess returns, not raw returns,
      for proper risk-adjusted analysis.
    evidence: scripts/factor_regression.py:57
  - behavior: 'Winsorization: keep only |value| < 0.5'
    description: Removes extreme returns (>50% monthly move) that would dominate regression;
      assumes such moves are data errors.
    evidence: scripts/regression_function.py:9-12
  - behavior: Minimum 20 data points required
    description: Statistical validity threshold for OLS estimation; insufficient data
      raises ValueError.
    evidence: scripts/factor_regression.py:115
  - behavior: FF factors and RF divided by 100 before use
    description: Data stored as percentage (e.g., 5.2) but OLS expects decimal form
      (0.052).
    evidence: scripts/factor_regression.py:50-51
  replaceable_points:
  - name: regression_model
    description: Statistical model for factor analysis
    options:
    - name: OLS
      traits:
      - Standard
      - Interpretable
      - Efficient
      fit_for:
      - Standard factor research
      - Academic use
      - Benchmark comparison
      not_fit_for:
      - Heteroskedastic data
      - Outlier-heavy data
    - name: GLS
      traits:
      - Handles heteroskedasticity
      - Efficient
      fit_for:
      - Unequal variance
      - Advanced econometrics
      not_fit_for:
      - Simple analysis
      - Quick results
    - name: Robust Regression
      traits:
      - Outlier-resistant
      - Heavy-tailed data
      fit_for:
      - Data with outliers
      - Non-normal errors
      not_fit_for:
      - Clean data
      - Standard reporting
    default: OLS
  design_decisions:
  - 'Inner join on dates for each DataFrame merges (evidence: scripts/factor_regression.py:32)
    — Only periods with each data available should be included in regression'
  - 'Excess returns = Close - Rf (risk-free rate) (evidence: scripts/factor_regression.py:57)
    — Standard CAPM/FF methodology uses excess returns, not raw returns'
  - 'Winsorization: keep only |value| < 0.5 (evidence: scripts/regression_function.py:9-12)
    — Removes extreme returns that would dominate regression; assumes 50x is unrealistic'
  - 'Minimum 20 data points required (evidence: scripts/factor_regression.py:115)
    — Statistical validity threshold for OLS estimation'
  - 'FF factors and RF stored as percentage, divided by 100 before use (evidence:
    scripts/factor_regression.py:50-51) — Data stored as percentage (e.g., 5.2) but
    OLS expects decimal (0.052)'
  - 'Custom DateInRangeError for date boundary validation (evidence: scripts/factor_regression.py:8)
    — Provides specific context when requested dates exceed available data'
  acceptance_hints:
  - Regression produces coefficients for Mkt-RF, SMB, HML, WML, and carbon factor
  - Every data points have matching dates across each factors (inner join)
  - No observations with |return| > 50% included
  - Minimum 20 observations in regression
  - Date index with name 'Date' in output DataFrames
- id: bulk_regression
  name: Bulk Regression Execution
  order: 5
  responsibility: Runs rolling-window regressions across multiple stocks with multiprocessing
    support. Stores results incrementally in PostgreSQL using UPSERT pattern. Enables
    analysis of large stock universes.
  interface:
    inputs:
    - stock list (CSV or DB), factor_name, interval (months), frequency (MONTHLY/DAILY)
    outputs:
    - stock_stats table entries with regression coefficients, t-stats, p-values, R²
  required_methods:
  - name: run_regression
    description: Entry point for single or multiple stock regression. Handles CLI
      arguments and orchestrates execution.
    evidence: scripts/get_regressions.py:103
  - name: run_regression_internal
    description: Rolling window loop that advances by interval months each iteration
      for non-overlapping windows.
    evidence: scripts/get_regressions.py:213
  - name: store_regression_into_db
    description: UPSERT pattern using DELETE then INSERT to update or create regression
      results in database.
    evidence: scripts/get_regressions.py:372
  key_behaviors:
  - behavior: Default interval = 60 months (5 years) for MONTHLY
    description: Standard rolling window for factor analysis with enough data for
      statistical significance.
    evidence: scripts/get_regressions.py:236
  - behavior: Default interval = 730 days (2 years) for DAILY
    description: Approximation to 60 monthly observations using trading days for shorter-term
      analysis.
    evidence: scripts/get_regressions.py:231
  - behavior: Rolling window advances by interval (NOT by 1 month)
    description: Non-overlapping windows ensure independent observations, avoiding
      autocorrelation in residuals.
    evidence: scripts/get_regressions.py:343
  - behavior: multiprocessing.set_start_method('spawn')
    description: Required for safe fork on some platforms; psycopg2 connections cannot
      be forked safely.
    evidence: scripts/get_regressions.py:400
  - behavior: Connection pool size = 20
    description: Supports up to 20 concurrent regression workers for parallel processing.
    evidence: scripts/db.py:33
  - behavior: Data loaded once, passed to workers via itertools.repeat
    description: Avoids redundant DB queries; workers share reference to pre-loaded
      DataFrames.
    evidence: scripts/get_regressions.py:428-430
  replaceable_points:
  - name: window_type
    description: Rolling window overlap strategy
    options:
    - name: Non-overlapping (current)
      traits:
      - Independent observations
      - No autocorrelation
      - Clean statistics
      fit_for:
      - Academic research
      - Statistical validity
      - Publication-ready results
      not_fit_for:
      - Short data histories
      - Rapidly changing markets
    - name: Overlapping
      traits:
      - More observations
      - Handles short histories
      - Recent data emphasis
      fit_for:
      - Short histories
      - Dynamic analysis
      - Real-time updates
      not_fit_for:
      - Statistical inference
      - Academic publication
    default: Non-overlapping
  - name: parallelization
    description: Concurrency approach
    options:
    - name: multiprocessing.Pool
      traits:
      - True parallelism
      - CPU-bound optimization
      fit_for:
      - Large stock universes
      - CPU-intensive regressions
      - Batch processing
      not_fit_for:
      - Small datasets
      - I/O-bound operations
    - name: threading
      traits:
      - Lightweight
      - Shared memory
      fit_for:
      - I/O-bound tasks
      - Database queries
      not_fit_for:
      - CPU-bound regressions
      - GIL constraints
    - name: sequential
      traits:
      - Simple
      - Debug-friendly
      - No concurrency
      fit_for:
      - Testing
      - Small datasets
      - Debugging
      not_fit_for:
      - Production batch processing
      - Large universes
    default: multiprocessing.Pool
  design_decisions:
  - 'Default interval = 60 months (5 years) for MONTHLY (evidence: scripts/get_regressions.py:236)
    — Standard rolling window for factor analysis; enough data for significance'
  - 'Default interval = 730 days (2 years) for DAILY (evidence: scripts/get_regressions.py:231)
    — Approximation to 60 monthly observations using trading days'
  - 'Rolling window advances by interval (NOT by 1 month) (evidence: scripts/get_regressions.py:343)
    — Non-overlapping windows for independent observations'
  - 'multiprocessing.set_start_method(''spawn'') (evidence: scripts/get_regressions.py:400)
    — Required for safe fork on some platforms; psycopg2 connections cannot be forked'
  - 'Connection pool size = 20 (evidence: scripts/db.py:33) — Supports up to 20 concurrent
    regression workers'
  - 'Data loaded once, passed to workers via itertools.repeat (evidence: scripts/get_regressions.py:428-430)
    — Avoids redundant DB queries; workers share reference to pre-loaded DataFrames'
  acceptance_hints:
  - Results stored in stock_stats table with UPSERT behavior
  - Non-overlapping windows produce independent observations
  - Materialized views refreshed after bulk completion
  - Multiprocessing uses spawn method (not fork)
  - Pool connections properly returned (no leaks)
- id: factor_orthogonalization
  name: Factor Correlation & Orthogonalization
  order: 6
  responsibility: Analyzes correlation between BMG factor and other factors (Fama-French),
    then orthogonalizes BMG by regressing on significantly correlated factors and
    storing residuals. Removes factor contamination.
  interface:
    inputs:
    - carbon_risk_factor, additional_factors (FF factors), significance threshold
    outputs:
    - Orthogonalized carbon_risk_factor entries with -ORTHO suffix
  required_methods:
  - name: process_factor
    description: Full orthogonalization pipeline that checks correlation, regresses
      on significant factors, and stores residuals.
    evidence: scripts/correlate.py:36
  - name: execute_batch
    description: Bulk insert helper using psycopg2.extras for efficient batch database
      operations.
    evidence: scripts/correlate.py:12
  key_behaviors:
  - behavior: Significance threshold filter (default 0.1)
    description: Only orthogonalizes against factors significantly correlated with
      BMG (p < 0.1). Avoids over-fitting.
    evidence: scripts/correlate.py:121
  - behavior: Orthogonalized factor stored with -ORTHO suffix
    description: Namespaced naming avoids confusion with raw factor. Users can select
      orthogonalized version.
    evidence: scripts/correlate.py:134
  - behavior: Residuals become the orthogonalized factor
    description: Standard Gram-Schmidt orthogonalization via OLS regression residuals
      against correlated factors.
    evidence: scripts/correlate.py:140
  replaceable_points:
  - name: orthogonalization_method
    description: How to remove factor correlation
    options:
    - name: OLS residuals
      traits:
      - Standard approach
      - Statistical properties
      - Interpretable
      fit_for:
      - Academic research
      - Factor purification
      - Standard models
      not_fit_for:
      - Collinear factors
      - Complex dependencies
    - name: PCA
      traits:
      - Removes each correlation
      - Dimension reduction
      fit_for:
      - Multiple correlated factors
      - Noise reduction
      not_fit_for:
      - Interpretability needs
      - Single factor focus
    - name: Simple subtraction
      traits:
      - Fast
      - Simple
      fit_for:
      - Quick analysis
      - Single correlated factor
      not_fit_for:
      - Multiple correlations
      - Precision needs
    default: OLS residuals
  design_decisions:
  - 'Significance threshold filter (default 0.1) (evidence: scripts/correlate.py:121)
    — Only orthogonalize against factors significantly correlated with BMG'
  - 'Orthogonalized factor stored with -ORTHO suffix (evidence: scripts/correlate.py:134)
    — Namespaced naming avoids confusion with raw factor'
  - 'Residuals become the orthogonalized factor (evidence: scripts/correlate.py:140)
    — Standard Gram-Schmidt orthogonalization via regression residuals'
  acceptance_hints:
  - Orthogonalized factor has -ORTHO suffix in name
  - Correlation with FF factors below significance threshold
  - Stored in carbon_risk_factor table with orthogonalized designation
  - Available for selection in subsequent regressions
- id: results_analysis
  name: Regression Results Analysis
  order: 7
  responsibility: Queries stored regression results to identify stocks and sectors
    with significant carbon risk exposure. Aggregates statistics by sector and significance
    level for actionable insights.
  interface:
    inputs:
    - significance threshold (p-value), factor_name
    outputs:
    - Lists of significant stocks/sectors with majority significant regression periods
  required_methods:
  - name: get_stocks_with_significant_regressions
    description: SQL query for stocks with majority (>50%) of periods showing significant
      carbon factor exposure.
    evidence: scripts/bmg_analyze.py:58
  - name: get_sectors_with_significant_final_regression
    description: Aggregates analysis by sector for the final (most recent) regression
      period.
    evidence: scripts/bmg_analyze.py:134
  key_behaviors:
  - behavior: Significance defined as bmg_p_gt_abs_t < threshold
    description: Two-tailed p-value for BMG coefficient; lower values indicate more
      significant exposure.
    evidence: scripts/bmg_analyze.py:38
  - behavior: 'Majority rule: >50% of periods significant'
    description: Requires consistent significance across time, not just one lucky
      period, for robust findings.
    evidence: scripts/bmg_analyze.py:69
  replaceable_points:
  - name: significance_criteria
    description: How to count significant results
    options:
    - name: Majority (>50%)
      traits:
      - Robust
      - Time-consistent
      - Balanced
      fit_for:
      - Long-term analysis
      - Investment decisions
      - Publication
      not_fit_for:
      - Short history
      - Volatile periods
    - name: Every periods
      traits:
      - Very strict
      - High confidence
      fit_for:
      - Conservative analysis
      - Regulatory use
      not_fit_for:
      - Most practical applications
      - Short histories
    - name: Final period only
      traits:
      - Recent focus
      - Adaptive
      fit_for:
      - Real-time decisions
      - Market timing
      not_fit_for:
      - Historical validation
      - Academic research
    default: Majority
  design_decisions:
  - 'Significance defined as bmg_p_gt_abs_t < threshold (evidence: scripts/bmg_analyze.py:38)
    — Two-tailed p-value for BMG coefficient; lower = more significant'
  - 'Majority rule: >50% of periods significant (evidence: scripts/bmg_analyze.py:69)
    — Requires consistent significance, not just one lucky period'
  acceptance_hints:
  - Returns stocks with >50% periods having significant BMG coefficient
  - Sector aggregation shows distribution of significant exposures
  - Results filterable by p-value threshold
  - Final period results available for most recent analysis
data_flow:
- from_stage: data_collection
  to_stage: data_import
  data: Stock prices (Close, Date index) fetched via yfinance API and passed for storage
- from_stage: data_import
  to_stage: bmg_factor_computation
  data: Stock returns stored in stock_data table, used for BMG factor computation
- from_stage: bmg_factor_computation
  to_stage: factor_regression
  data: BMG factor values from carbon_risk_factor table for carbon risk exposure estimation
- from_stage: data_import
  to_stage: factor_regression
  data: Fama-French factors (Mkt-RF, SMB, HML, WML) from ff_factor table
- from_stage: data_import
  to_stage: factor_regression
  data: Risk-free rate from risk_free table for excess return calculation
- from_stage: factor_regression
