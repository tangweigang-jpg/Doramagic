- id: BD-084
  type: B/DK
  content: 'Date range validation: start_date < max_data AND end_date > min_data required'
  rationale: The bidirectional range check ensures the requested date window falls
    entirely within available data boundaries. This prevents regressions from running
    with truncated input, which would produce biased coefficients and misleading performance
    attribution. The strict inequality ensures at least one data point exists on each
    side of the window. Violation raises DateInRangeError to force explicit user correction
    rather than silent truncation.
  evidence: factor_regression.py:84-87(raises DateInRangeError if violated)
  stage: ordering_contract
