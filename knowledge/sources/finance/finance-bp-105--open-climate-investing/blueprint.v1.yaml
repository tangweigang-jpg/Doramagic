- id: BD-083
  type: BA/M
  content: Minimum 20 data points required for valid OLS regression
  rationale: The 20-point minimum establishes statistical reliability for regression
    inference. With fewer observations, standard errors become unreliable, t-statistics
    lose validity, and confidence intervals widen unpredictably. This boundary prevents
    meaningless regression outputs from inadequate samples while acknowledging that
    even 20 points yields limited statistical power. Raising the threshold would exclude
    valid monthly strategies with short backtest periods.
  evidence: scripts/factor_regression.py:115(module)
  stage: invariant
  alternative_considered: Dynamic threshold based on factor count was considered but
    rejected for implementation complexity
