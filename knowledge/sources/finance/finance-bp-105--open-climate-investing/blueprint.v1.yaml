- id: BD-086
  type: BA
  content: Multiprocessing uses spawn method with explicit data duplication per worker
  rationale: The spawn method with explicit data duplication via itertools.repeat
    ensures each worker receives independent data copies, preventing shared-state
    corruption in parallel OLS computations. This boundary eliminates race conditions
    in pandas operations and ensures reproducible results across runs. The trade-off
    is higher memory usage (N workers × data size), but this is necessary for correctness.
    Fork-with-shared-memory was rejected due to pandas thread-safety concerns.
  evidence: get_regressions.py:400,421-431(itertools.repeat passes carbon_data/ff_data/rf_data)
