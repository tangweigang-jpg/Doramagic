- id: BD-082
  type: BA
  content: Sliding window regression requires data_end_date <= end_date to terminate
    loop
  rationale: The termination condition data_end_date <= end_date defines when the
    sliding window loop exits. If data_end_date exceeds end_date, the loop cannot
    produce valid output for the requested range, so returning (None, False) prevents
    silent failures. This boundary ensures complete date coverage while avoiding infinite
    loops when data extends beyond requested range. Without this check, callers would
    receive incomplete or misleading regression results.
  evidence: scripts/get_regressions.py:306(module)
  stage: invariant
