business_decisions:
- id: BD-001
  type: B/BA
  content: Monthly interval uses 1mo yfinance interval (NOT 1d)
  rationale: Monthly frequency requires monthly candles for proper MonthEnd alignment;
    using daily data would require complex resampling and could introduce alignment
    errors with the financial convention of monthly returns ending on the last business
    day of the month
  evidence: scripts/stock_price_function.py:22(module)
  stage: data_collection
  alternative_considered: Using 1d interval with pandas resampling was rejected due
    to complexity and potential MonthEnd alignment issues
  _evidence_issues:
  - 'FN_NOT_FOUND: module in scripts/stock_price_function.py'
- id: BD-002
  type: BA
  content: Drops last entry assuming incomplete candle
  rationale: Prevents partial month data from corrupting returns; the last observation
    may represent an incomplete trading period and would skew return calculations
    if included in the time series
  evidence: scripts/stock_price_function.py:28(module)
  stage: data_collection
  alternative_considered: Including each data was rejected as it could introduce noise
    from incomplete periods at the end of the dataset
  _evidence_issues:
  - 'FN_NOT_FOUND: module in scripts/stock_price_function.py'
- id: BD-003
  type: BA/DK
  content: Monthly dates aligned to MonthEnd via pandas offset
  rationale: Ensures consistency with financial convention for monthly returns; MonthEnd
    alignment standardizes the date convention across each stocks and factors in the
    analysis framework
  evidence: scripts/stock_price_function.py:30(module)
  stage: data_collection
  alternative_considered: Using MonthBegin was rejected as it conflicts with standard
    financial data publishing conventions
  _evidence_issues:
  - 'FN_NOT_FOUND: module in scripts/stock_price_function.py'
- id: BD-004
  type: B
  content: 3 retry attempts on JSON decode errors
  rationale: Handles transient network/API failures gracefully; yfinance API may return
    malformed JSON intermittently due to server issues or rate limiting
  evidence: scripts/stock_price_function.py:16-17(module)
  stage: data_collection
  alternative_considered: Single attempt was rejected as it would cause unnecessary
    failures; more than 3 retries was rejected due to delay without proportional success
    rate improvement
  _evidence_issues:
  - 'FN_NOT_FOUND: module in scripts/stock_price_function.py'
- id: BD-005
  type: B
  content: ON CONFLICT DO NOTHING for data imports
  rationale: Prevents duplicate key errors on re-runs while allowing incremental updates;
    enables idempotent data imports essential for reproducible pipeline execution
  evidence: scripts/setup_db.py:51(module)
  stage: data_import
  alternative_considered: ON CONFLICT UPDATE was rejected as it would overwrite potentially
