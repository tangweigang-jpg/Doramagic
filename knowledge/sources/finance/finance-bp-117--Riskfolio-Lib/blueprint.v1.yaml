data_flow:
- from_stage: data_input
  to_stage: parameter_estimation
  data: returns DataFrame (n_samples x n_assets) with asset names as columns
- from_stage: data_input
  to_stage: optimization
  data: returns DataFrame, constraints (via Portfolio properties), risk parameters
    (alpha, kappa)
- from_stage: parameter_estimation
  to_stage: optimization
  data: mu vector, cov matrix, optionally kurtosis/cokurtosis tensors (stored in Portfolio
    object)
- from_stage: parameter_estimation
  to_stage: hierarchical_clustering
  data: mu vector, cov matrix (via HCPortfolio.returns property)
- from_stage: risk_computation
  to_stage: optimization
  data: Sharpe_Risk dispatcher results, Risk_Contribution values (inline calls during
    optimization)
- from_stage: constraint_construction
  to_stage: optimization
  data: A matrix (n_constraints x n_assets), b vector for Aw <= b CVXPY constraint
    form
- from_stage: optimization
  to_stage: reporting
  data: weights DataFrame (n_assets x 1) with asset names as index
- from_stage: hierarchical_clustering
  to_stage: reporting
  data: weights DataFrame (n_assets x 1) with asset names as index
global_contracts:
- contract: Returns must be DataFrame with assets as columns (index=timestamps) —
    validated in Portfolio.returns.setter at riskfolio/src/Portfolio.py:478
  evidence: ''
- contract: Every matrices square for n_assets dimensions — enforced in ParamsEstimation
    at riskfolio/src/ParamsEstimation.py:271(cov DataFrame shape)
  evidence: ''
- contract: Weights sum to budget (default 1) in optimization — budget constraint
    appended at riskfolio/src/Portfolio.py:2044
  evidence: ''
- contract: Risk measures require alpha in (0,1) — validated at runtime in riskfolio/src/RiskFunctions.py:257
  evidence: ''
- contract: kappa deformation parameter in (0,1) — auto-clamped to [0.01, 0.99] in
    riskfolio/src/HCPortfolio.py:126
  evidence: ''
- contract: Every CVXPY variables require n_assets dimension — enforced at riskfolio/src/Portfolio.py:2039(w=cp.Variable((N,1)))
  evidence: ''
- contract: 'MANDATORY: assets_stats() MUST be called before optimization() — sets
    self.mu and self.cov; DEEP-001 at riskfolio/src/Portfolio.py:1116'
  evidence: ''
- contract: Covariance must be positive semi-definite — auto-fix with 5 retries at
    riskfolio/src/Portfolio.py:1189-1201
  evidence: ''
- contract: EVaR/RLVaR require exponential/power cone solvers (CLARABEL/MOSEK/SCS
    only) — hardcoded solver list at riskfolio/src/RiskFunctions.py:464
  evidence: ''
- contract: CVXPY is the sole optimization engine across each modules — imported at
    riskfolio/src/Portfolio.py:12
  evidence: ''
- contract: 30+ risk measures unified by string dispatch in Sharpe_Risk — rm parameter
    routing at riskfolio/src/RiskFunctions.py:1933
  evidence: ''
business_decisions:
- id: BD-001
  type: BA
  content: Mutable defaults in __init__ for 70+ risk/constraint parameters enabling
    fluent API pattern
  rationale: 'Fluent API pattern allows users to set port.upperCVaR=0.1 after object
    construction. Mutable defaults (e.g., risk_measure=''MV'', upperCVaR=0.05) become
    instance state that optimization methods read during solve(). This design enables
    progressive configuration without requiring constructor argument combinations.
    BOUNDARY: Changing a parameter after __init__ immediately affects subsequent optimization
    calls; each 70+ parameters share this instance state pattern.'
  evidence: riskfolio/src/Portfolio.py:258(__init__)
  stage: data_input
  alternative_considered: Builder pattern would require separate object, adding complexity
    for incremental configuration
- id: BD-002
  type: B/DK
  content: Properties validate DataFrame type on setter with fail-fast validation
  rationale: 'Type validation on DataFrame properties (returns, prices, weights) prevents
    downstream CVXPY failures by catching invalid input early. The setter raises TypeError
    immediately if input is not pd.DataFrame. BOUNDARY: Validation occurs at assignment
    time; optimization methods rely on this invariant and do not re-validate.'
  evidence: riskfolio/src/Portfolio.py:476(returns.setter)
  stage: data_input
  alternative_considered: Lazy validation in optimization would produce less clear
    error messages
  _evidence_issues:
  - 'FN_NOT_FOUND: returns.setter in riskfolio/src/Portfolio.py'
- id: BD-003
  type: B
  content: Kappa parameter clamped to [0.01, 0.99] in HCPortfolio kappa setter
  rationale: 'RLVaR and RLDaR risk measures require 0 < kappa < 1 for the deformation
    parameter. Auto-correction via clamping prevents solver failures from out-of-range
    values. BOUNDARY: Clamping happens silently; users may not realize their intended
    kappa was modified.'
  evidence: riskfolio/src/HCPortfolio.py:126(kappa.setter)
  stage: data_input
  alternative_considered: Raising ValueError would break batch processing with boundary
    inputs
  _evidence_issues:
  - 'FN_NOT_FOUND: kappa.setter in riskfolio/src/HCPortfolio.py'
- id: BD-004
  type: BA/M
  content: String dispatch pattern for 6 return and 14 covariance estimation methods
  rationale: 'Extensible method dispatch via string parameter (''hist'', ''ewma1'',
    ''ledoit'', ''gerber1'', ''shrink Ledoit'', etc.) allows adding new estimation
    methods with only new elif branches without changing API signature. BOUNDARY:
    Each method returns same DataFrame structure; dispatch is centralized in ParamsEstimation._get_statistical_models()
    and _get_covariance_models().'
  evidence: riskfolio/src/ParamsEstimation.py:93(_get_statistical_models)
  stage: parameter_estimation
  alternative_considered: Strategy pattern would require subclassing; string dispatch
    is simpler for end users
  _evidence_issues:
  - 'FN_NOT_FOUND: _get_statistical_models in riskfolio/src/ParamsEstimation.py'
- id: BD-005
  type: B/BA
  content: Returns DataFrame indexed by timestamps with asset names as column labels
  rationale: 'Column-based DataFrame storage (assets as columns, dates as index) enables
    asset-aware operations via column selection. Returns statistics and covariances
    preserve this structure for downstream optimization. BOUNDARY: Every estimation
    functions assume this orientation; transposing breaks internal operations.'
  evidence: riskfolio/src/ParamsEstimation.py:91(_get_statistical_models)
  stage: parameter_estimation
  alternative_considered: Row-oriented storage would require transposing; column orientation
    aligns with financial convention
  _evidence_issues:
  - 'FN_NOT_FOUND: _get_statistical_models in riskfolio/src/ParamsEstimation.py'
- id: BD-006
  type: BA/M
  content: Gerber statistic variants for robust covariance estimation under heavy
    tails
  rationale: 'Gerber statistics (gerber1, gerber2) provide robust alternative to Ledoit-Wolf
    shrinkage for heavy-tailed return distributions. Threshold parameter controls
    robustness-inefficiency tradeoff. BOUNDARY: Gerber methods produce different covariance
    estimates than standard shrinkage; mixing with non-Gerber measures may be inconsistent.'
  evidence: riskfolio/src/ParamsEstimation.py:267(gerber1)
  stage: parameter_estimation
  alternative_considered: Huber estimator is alternative but Gerber captures higher-moment
    robustness
  _evidence_issues:
  - 'FN_NOT_FOUND: gerber1 in riskfolio/src/ParamsEstimation.py'
- id: BD-007
  type: M
  content: Stepwise regression with pvalue/AIC/SIC/R2 criteria for factor selection
  rationale: 'Forward stepwise regression prevents overfitting in high-dimensional
    factor models by selecting statistically significant factors. Multiple criteria
    (pvalue, AIC, SIC, R2) provide flexibility in model selection rigor. BOUNDARY:
    Selection is sensitive to criterion threshold; backward elimination not implemented.'
  evidence: riskfolio/src/ParamsEstimation.py:352(forward_regression)
  stage: parameter_estimation
  alternative_considered: LASSO regularization is alternative but stepwise provides
    explicit factor selection
- id: BD-008
  type: BA/DK
  content: 30+ risk measures unified via single string parameter rm dispatch table
  rationale: 'Sharpe_Risk dispatch table handles each 30+ risk measures (MV, CVaR,
    VaR, EVaR, DaR, etc.) without if/elif chains in calling code. Single rm parameter
    standardizes interface. BOUNDARY: Each measure requires specific OWA weights and
    gradient computation; new measures must be registered in dispatch table.'
  evidence: riskfolio/src/RiskFunctions.py:69(MAD)
  stage: risk_computation
  alternative_considered: Subclassing would proliferate classes; dispatch table is
    simpler
- id: BD-009
  type: M
  content: Finite difference numerical gradient (delta=1e-7, d_i=1e-4 for cone-based)
    for Risk_Contribution
  rationale: 'Numerical gradient computation via finite differences avoids closed-form
    derivatives for complex risk measures. delta=1e-7 for standard measures; d_i=1e-4
    for cone-based measures. BOUNDARY: Gradient quality depends on function smoothness;
    non-differentiable points may cause instability.'
  evidence: riskfolio/src/RiskFunctions.py:2313(Risk_Contribution)
  stage: risk_computation
  alternative_considered: Analytic gradients would be faster but require per-measure
    derivation
- id: BD-010
  type: BA/M
  content: OWA weights enabling convex CVXPY formulation for CVaR, TG, and GMD measures
  rationale: 'Ordered Weighted Average (OWA) decomposition decomposes CVaR, TG, and
    GMD into convex form suitable for CVXPY optimization. owa_cvar and related functions
    compute the weight vectors. BOUNDARY: OWA weights must match risk measure exactly;
    p-norms in RiskFunctions use these weights.'
  evidence: riskfolio/src/OwaWeights.py:86(owa_cvar)
  stage: risk_computation
  alternative_considered: Sample average approximation would lose convexity; OWA preserves
    it
- id: BD-011
  type: B/DK
  content: Drawdown measures use uncompounded cumulative returns for accurate underwater
    periods
  rationale: 'Uncompounded cumulative returns correctly measure underwater periods
    for drawdown risk. Relative variants use compounded returns for comparison. BOUNDARY:
    Mixing compounded/uncompounded in same analysis produces inconsistent drawdown
    values.'
  evidence: riskfolio/src/RiskFunctions.py:797(DaR_Abs)
  stage: risk_computation
  alternative_considered: Compounded would overestimate drawdown in volatile periods
- id: BD-012
  type: B
  content: 10-column constraint DataFrame schema supporting Disabled/Type/Set/Position/Sign/Weight/RelativeType/RelativeSet/Relative/Factor
  rationale: 'Rich 10-column schema enables complex constraint specifications including
    relative constraints and factor loadings. Enables Excel-based constraint editing
    with headers matching the schema. BOUNDARY: Schema validation enforces exact column
    count; missing columns raise errors.'
  evidence: riskfolio/src/ConstraintsFunctions.py:134(_constraints_preprocessing)
  stage: constraint_construction
  alternative_considered: Dictionary format would be less intuitive for Excel users
  _evidence_issues:
  - 'FN_NOT_FOUND: _constraints_preprocessing in riskfolio/src/ConstraintsFunctions.py'
- id: BD-013
  type: BA/M
  content: Network centrality measures as graph-theoretic constraint inputs for diversification
  rationale: 'Graph-theoretic centrality measures (degree, betweenness, eigenvector)
    enable diversification constraints based on network structure rather than traditional
    correlation. BOUNDARY: Requires asset correlation matrix as graph adjacency input;
    centrality computation is O(n^2) for n assets.'
  evidence: riskfolio/src/ConstraintsFunctions.py:1546(centrality_vector)
  stage: constraint_construction
  alternative_considered: Correlation-based constraints miss network effects; centrality
    captures systemic connections
- id: BD-014
  type: BA/M
  content: DBHT clustering for deterministic hierarchical constraint generation
  rationale: 'Double-Hierarchical Binomial Tree (DBHT) clustering provides deterministic,
    reproducible cluster assignments for constraints. Unlike scipy linkage which depends
    on algorithm, DBHT preserves correlation structure. BOUNDARY: DBHT requires correlation
    matrix as input; returns linkage matrix for scipy-compatible hierarchical functions.'
  evidence: riskfolio/src/DBHT.py:39(DBHTs)
  stage: constraint_construction
  alternative_considered: Scipy hierarchical clustering is non-deterministic with
    some linkages; DBHT provides reproducibility
- id: BD-015
  type: M
  content: SDP formulation with matrix variable W=diag(w) for kurtosis/cokurtosis
    constraints (KT, SKT measures)
  rationale: 'Kurtosis and cokurtosis constraints require semidefinite programming
    (SDP) with matrix variable W=diag(w) where w is weight vector. L_2 and S_2 moments
    precomputed in assets_stats. BOUNDARY: SDP significantly increases problem complexity;
    should be used only when higher-moment constraints are essential.'
  evidence: riskfolio/src/Portfolio.py:2063(_sdp_constraints)
  stage: optimization
  alternative_considered: Approximation with variance alone would ignore tail risk;
    SDP preserves kurtosis information
  _evidence_issues:
  - 'FN_NOT_FOUND: _sdp_constraints in riskfolio/src/Portfolio.py'
- id: BD-016
  type: M
  content: SOC (Second-Order Cone) reformulation of variance via sqrtm decomposition
    for efficient solvers
  rationale: 'Mean-variance risk constraint reformulated as second-order cone using
    Cholesky/sqrtm decomposition. Enables efficient ECOS and CLARABEL solvers instead
    of slow SDP. BOUNDARY: sqrtm is expensive for large portfolios; numerical stability
    issues with near-singular covariances.'
  evidence: riskfolio/src/Portfolio.py:2081(_mv_constraints)
  stage: optimization
  alternative_considered: SDP for variance would be slower but more robust numerically
  _evidence_issues:
  - 'FN_NOT_FOUND: _mv_constraints in riskfolio/src/Portfolio.py'
- id: BD-017
  type: M
  content: Exponential cone formulation for entropic risk measures (EVaR, EDaR) with
    CLARABEL/MOSEK/SCS/ECOS support
  rationale: 'Entropic VaR and DaR require exponential cone constraints. cp.ExpCone
    native support enables CLARABEL, MOSEK, SCS, and ECOS solvers. BOUNDARY: Not each
    solvers support exponential cone; fallback to SCS for unsupported solvers.'
  evidence: riskfolio/src/Portfolio.py:2207(_entropic_constraints)
  stage: optimization
  alternative_considered: CVaR approximation is alternative but loses entropic properties
  _evidence_issues:
  - 'FN_NOT_FOUND: _entropic_constraints in riskfolio/src/Portfolio.py'
- id: BD-018
  type: M/BA
  content: Power cone formulation for relativistic deformation measures (RLVaR, RLDaR)
    with kappa parameter
  rationale: 'Relativistic VaR/DaR deformation requires power cone constraint with
    kappa parameter controlling deformation shape. Limited solver support (CLARABEL,
    ECOS). BOUNDARY: kappa must be in (0,1) as enforced by setter; power cone is numerically
    sensitive.'
  evidence: riskfolio/src/Portfolio.py:2596(_power_constraints)
  stage: optimization
  alternative_considered: Standard VaR/CVaR cannot capture deformation; power cone
    is required for relativistic form
  _evidence_issues:
  - 'FN_NOT_FOUND: _power_constraints in riskfolio/src/Portfolio.py'
- id: BD-019
  type: BA
  content: Solver fallback chain [CLARABEL, ECOS, SCS, OSQP, CVXOPT] for robustness
    across cone types
  rationale: 'Different cone types (SOC, exponential, power) require different solvers.
    Fallback chain ensures at least one solver succeeds for each problem type. BOUNDARY:
    CLARABEL is primary for most problems; OSQP handles only SOC; CVXOPT is last resort
    for compatibility.'
  evidence: riskfolio/src/Portfolio.py:461(solver_options)
  stage: optimization
  alternative_considered: Single-solver approach would fail for unsupported cone types
  _evidence_issues:
  - 'FN_NOT_FOUND: solver_options in riskfolio/src/Portfolio.py'
- id: BD-020
  type: M/BA
  content: Sharpe ratio reformulation as constraint (ret - rf*k == 1) with risk minimization
  rationale: 'Sharpe ratio optimization avoids ratio form which causes scaling ambiguity.
    Constraint normalization fixes denominator to 1, minimizing risk subject to target
    return. BOUNDARY: Requires rf (risk-free rate) as input; k is auxiliary variable.'
  evidence: riskfolio/src/Portfolio.py:3277(_sharpe_constraints)
  stage: optimization
  alternative_considered: Ratio optimization would cause spurious optima due to scaling
    invariance
  _evidence_issues:
  - 'FN_NOT_FOUND: _sharpe_constraints in riskfolio/src/Portfolio.py'
- id: BD-021
  type: B/BA
  content: Budget constraint default of 1 for fully-invested long-only portfolios
  rationale: 'Long-only fully-invested assumption (sum of weights = 1) matches standard
    portfolio convention. sht=False and budgetsht=0.2 enable short exposure when needed.
    BOUNDARY: Default assumes long-only; short portfolios require explicit parameter
    changes.'
  evidence: riskfolio/src/Portfolio.py:258(__init__)
  stage: optimization
  alternative_considered: No budget constraint would allow uninvested capital
- id: BD-022
  type: BA/DK
  content: '11 codependence measures for hierarchical clustering: Pearson, Spearman,
    Kendall, Gerber1, Gerber2, abs variants, distance correlation, mutual information,
    tail dependence'
  rationale: 'Multiple codependence measures capture different dependency structures
    for clustering. Tail dependence specifically captures crash co-movement missed
    by linear correlations. BOUNDARY: Different codependence measures may produce
    different cluster hierarchies; measure choice affects diversification quality.'
  evidence: riskfolio/src/HCPortfolio.py:754(_get_codependence)
  stage: hierarchical_clustering
  alternative_considered: Pearson alone misses non-linear and tail dependencies
  _evidence_issues:
  - 'FN_NOT_FOUND: _get_codependence in riskfolio/src/HCPortfolio.py'
- id: BD-023
  type: M
  content: Naive risk parity as intra-cluster weighting for HRP/HERC/HERC2; full CVXPY
    optimization in NCO via _opt_w
  rationale: 'HRP, HERC, and HERC2 use naive risk parity within clusters to avoid
    optimization. NCO (Nested Clustered Optimization) uses _opt_w for full CVXPY optimization
    within clusters. BOUNDARY: Naive methods are deterministic and fast; NCO provides
    optimization but requires solver.'
  evidence: riskfolio/src/HCPortfolio.py:160(_naive_risk)
  stage: hierarchical_clustering
  alternative_considered: Full optimization at each level would be computationally
    prohibitive
- id: BD-024
  type: M
  content: Alpha-based weight split in recursive bisection proportional to cluster
    risk contribution
  rationale: 'Recursive bisection weight allocation proportional to cluster risk contribution
    ensures hierarchical risk parity property holds. alpha_1 computed as inverse proportion
    of left cluster risk. BOUNDARY: Alpha drives weight split at each node; alpha=0.5
    gives equal split.'
  evidence: riskfolio/src/HCPortfolio.py:367(_recursive_bisection)
  stage: hierarchical_clustering
  alternative_considered: Equal weighting would violate risk parity; alpha-based is
    theoretically grounded
- id: BD-025
  type: BA/M
  content: DBHT linkage matrix for HERC ensuring deterministic hierarchical structure
    preservation
  rationale: 'HERC uses DBHT instead of scipy linkage for deterministic clustering
    that preserves correlation structure. D=distance matrix, S=correlation matrix
    inputs. BOUNDARY: DBHT produces linkage compatible with scipy.cluster.hierarchy;
    non-deterministic inputs (e.g., random distance) still affect result.'
  evidence: riskfolio/src/HCPortfolio.py:91(HERC)
  stage: hierarchical_clustering
  alternative_considered: Scipy linkage is faster but may produce different hierarchies
    across runs
  _evidence_issues:
  - 'FN_NOT_FOUND: HERC in riskfolio/src/HCPortfolio.py'
- id: BD-026
  type: B/DK
  content: Risk measure names mapping (MV->Standard Deviation, etc.) for human-readable
    labels in plots
  rationale: 'rm_names dictionary provides human-readable labels for 26 risk measures
    in plots and reports. Maps internal codes (MV, CVaR, DaR) to display names (Standard
    Deviation, Conditional VaR, Drawdown at Risk). BOUNDARY: Mapping must be kept
    in sync when new measures are added.'
  evidence: riskfolio/src/PlotFunctions.py:48(rm_names)
  stage: reporting
  alternative_considered: Internal codes would confuse end users reading plots
  _evidence_issues:
  - 'FN_NOT_FOUND: rm_names in riskfolio/src/PlotFunctions.py'
- id: BD-027
  type: BA/M
  content: xlsxwriter engine for Excel reports with live formula recalculation
  rationale: 'xlsxwriter enables writing Excel formulas that recalculate when weights
    change, avoiding static values. Formulas reference cells for dynamic reporting.
    BOUNDARY: xlsxwriter cannot modify existing files; new file created each time.'
