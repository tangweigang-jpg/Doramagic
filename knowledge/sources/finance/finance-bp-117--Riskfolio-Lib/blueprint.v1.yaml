  - 'Alpha-based split proportional to cluster risk contribution maintains hierarchical
    risk parity. Evidence: riskfolio/src/HCPortfolio.py:606(alpha_1=1-left_risk/(left_risk+right_risk))'
  - 'DBHT linkage matrix provides deterministic alternative to scipy; preserves correlation
