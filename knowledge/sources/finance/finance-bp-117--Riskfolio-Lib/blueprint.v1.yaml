resources:
- id: res-slot-001
  type: replaceable_component
  name: optimization_solver
  path: null
  description: CLARABEL for general use; MOSEK for RLVaR/RVRG/RLDaR risk measures
    or large-scale problems; free solvers (SCS, ECOS, OSQP) for basic portfolio optimization
  used_in_stages: []
  options:
  - name: CLARABEL
    traits:
    - SOCP
    - SDP
    - EXP
    - POW
    - free
    - open_source
    fit_for:
    - Default solver for most risk measures, excellent for LP, QP, SOCP, EXP, POW
      problems
    not_fit_for:
    - Very large-scale problems where commercial solvers may be faster
  - name: SCS
    traits:
    - SOCP
    - SDP
    - free
    - open_source
    fit_for:
    - Alternative solver, good for SOCP and SDP problems
    not_fit_for:
    - EXP and POW cone problems - can be slow according to README
  - name: ECOS
    traits:
    - SOCP
    - free
    - open_source
    fit_for:
    - Small to medium SOCP problems
    not_fit_for:
    - SDP problems, large-scale problems
  - name: OSQP
    traits:
    - QP
    - free
    - open_source
    fit_for:
    - Quadratic programming problems
    not_fit_for:
    - SOCP, SDP, EXP, POW problems
  - name: MOSEK
    traits:
    - SOCP
    - SDP
    - EXP
    - POW
    - LP
    - QP
    - commercial
    fit_for:
    - Large-scale problems, RLVaR, RVRG, RLDaR risk measures - highly recommended
      for these according to documentation
    not_fit_for:
    - Users without commercial license budget
  - name: GUROBI
    traits:
    - SOCP
    - LP
    - QP
    - commercial
    fit_for:
    - Large-scale linear and quadratic programming
    not_fit_for:
    - SDP, EXP, POW problems, users without commercial license
  default: CLARABEL
  _source: worker_resource
- id: res-slot-002
  type: replaceable_component
  name: data_acquisition
  path: null
  description: Data acquisition is user responsibility; yfinance for Yahoo Finance
    data; pandas-datareader for FRED/factor data; custom CSVs for proprietary data
  used_in_stages: []
  options:
  - name: yfinance
    traits:
    - yahoo_finance
    - free
    - api_based
    fit_for:
    - Most common choice for fetching Yahoo Finance historical data in examples
    not_fit_for:
    - Non-Yahoo data sources, production systems requiring guaranteed uptime
  - name: pandas-datareader
    traits:
    - multiple_sources
    - free
    - api_based
    fit_for:
    - Accessing multiple financial data sources (FRED, Kenneth French data library,
      etc.)
    not_fit_for:
    - Real-time data, high-frequency trading
  - name: ffn
    traits:
    - financial_analysis
    - free
    fit_for:
    - Users wanting integrated performance/risk analysis alongside portfolio optimization
    not_fit_for:
    - Basic data fetching only
  - name: custom_csv
    traits:
    - file_based
    - user_managed
    fit_for:
    - Users with proprietary data, backtesting with custom datasets
    not_fit_for:
    - Real-time data, large numbers of securities
  default: user_managed_csv_or_custom
  _source: worker_resource
- id: res-slot-003
  type: replaceable_component
  name: covariance_estimation
  path: null
  description: Sample covariance for large samples; Ledoit-Wolf or OAS for small/moderate
    samples with noise; Detoned for market-neutral strategies
  used_in_stages: []
  options:
  - name: Historical (sample)
    traits:
    - simple
    - fast
    fit_for:
    - Baseline estimation, large samples, stationary returns
    not_fit_for:
    - Small samples, noisy data, when shrinkage would help
  - name: Ledoit-Wolf Shrinkage
    traits:
    - shrinkage
    - regularized
    fit_for:
    - Small to medium-sized portfolios with noisy covariance estimates
    not_fit_for:
    - Very large portfolios where Ledoit-Wolf becomes slow
  - name: Oracle Approximating Shrinkage (OAS)
    traits:
    - shrinkage
    - regularized
    fit_for:
    - Alternative shrinkage method, often outperforms Ledoit-Wolf in simulations
    not_fit_for:
    - Same limitations as Ledoit-Wolf
  - name: Detoned Correlation
    traits:
    - detoning
    - market_neutral
    fit_for:
    - Removing market influence from correlation matrix
    not_fit_for:
    - Standard portfolio optimization
  default: Historical (hist)
  _source: worker_resource
- id: res-slot-004
  type: replaceable_component
  name: documentation_format
  path: null
  description: ReadTheDocs provides free hosting for open source projects
  used_in_stages: []
  options:
  - name: Sphinx HTML
    traits:
    - html
    - web_based
    fit_for:
    - Standard documentation hosting on ReadTheDocs
    not_fit_for:
    - PDF generation (requires additional tooling)
  default: Sphinx HTML on ReadTheDocs
  _source: worker_resource
