id: finance-bp-117
name: Riskfolio-Lib
sop_version: '3.6'
source:
  projects:
  - Riskfolio-Lib
  commit_hash: 7bda1cd8b14b0d1bcca763f47e89d654ba78520a
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Portfolio optimization and risk management
  description: A Python library for building investment portfolios based on mathematically
    complex models using mean-risk optimization, hierarchical clustering, and 30+
    risk measures, built on CVXPY and Pandas.
  prerequisites: Users should understand portfolio theory basics (expected returns,
    covariance, risk measures), Pandas DataFrames with assets as columns, and convex
    optimization concepts. Familiarity with CVXPY solver constraints is helpful.
  not_suitable_for: Real-time trading systems (batch optimization only), non-convex
    portfolio problems, direct market data ingestion (requires preprocessing), or
    users seeking black-box solutions without parameter understanding.
stages:
- id: data_input
  name: Data Input
  order: 1
  responsibility: Accept returns DataFrames and initialize portfolio objects with
    constraints and parameters. This stage is the entry point for each portfolio construction
    workflows, providing the core Portfolio and HCPortfolio objects that hold state
    throughout the pipeline.
  interface:
    inputs:
    - returns DataFrame (n_samples x n_assets)
    - constraint specifications
    - risk parameters (alpha, kappa)
    outputs:
    - Portfolio/HCPortfolio object with initialized state
  required_methods:
  - name: Portfolio.__init__
    description: Initializes main portfolio object with 70+ risk/constraint parameters
      using mutable defaults for fluent API pattern
    evidence: riskfolio/src/Portfolio.py:56(__init__)
  - name: Portfolio.returns.setter
    description: Validates DataFrame type on assignment with fail-fast validation
      to prevent downstream CVXPY failures
    evidence: riskfolio/src/Portfolio.py:476(returns.setter)
  - name: HCPortfolio.__init__
    description: Initializes hierarchical clustering portfolio object with kappa parameter
      auto-clamping to [0.01, 0.99]
    evidence: riskfolio/src/HCPortfolio.py:26(__init__)
  - name: HCPortfolio.kappa.setter
    description: Clamps kappa deformation parameter to valid range preventing solver
      failures
    evidence: riskfolio/src/HCPortfolio.py:126(kappa.setter)
  key_behaviors:
  - behavior: Mutable defaults for fluent API
    description: Every 70+ risk/constraint parameters use mutable defaults enabling
      users to set port.upperCVaR=0.1 after construction; parameters become instance
      state read by optimization methods
    evidence: riskfolio/src/Portfolio.py:258(__init__)
  - behavior: Type validation on DataFrame setters
    description: Portfolio returns property validates isinstance check on DataFrame;
      fail-fast prevents downstream CVXPY failures with invalid inputs
    evidence: riskfolio/src/Portfolio.py:476(returns.setter)
  - behavior: Parameter auto-correction
    description: HCPortfolio kappa setter auto-clamps values to [0.01, 0.99] ensuring
      0<kappa<1 for RLVaR/RLDaR deformation without raising errors
    evidence: riskfolio/src/HCPortfolio.py:126(kappa.setter)
  replaceable_points:
  - name: returns_input
    description: Format of returns data for portfolio initialization
    options:
    - name: historical DataFrame
      traits:
      - Pandas DataFrame
      - n_samples rows x n_assets columns
      - index=timestamps
      - columns=asset names
      fit_for:
      - Standard backtesting
      - Historical performance analysis
      - Academic research
      not_fit_for:
      - Real-time trading
      - Scenario-based analysis without historical data
    - name: synthetic returns
      traits:
      - User-constructed DataFrame
      - Requires explicit np.array conversion
      - scenario-based
      fit_for:
      - Monte Carlo simulations
      - Stress testing
      - Factor model scenarios
      not_fit_for:
      - Standard optimization workflows
      - Long-only portfolios
    default: historical DataFrame
  design_decisions:
  - 'Mutable defaults in __init__ for 70+ parameters enable fluent API pattern — allows
    post-construction configuration like port.upperCVaR=0.1. Evidence: riskfolio/src/Portfolio.py:258(__init__)'
  - 'Properties validate DataFrame type on setter for fail-fast error detection —
    prevents CVXPY failures from invalid inputs. Evidence: riskfolio/src/Portfolio.py:476(returns.setter)'
  - 'kappa parameter auto-clamped to [0.01, 0.99] ensures RLVaR/RLDaR deformation
    parameter validity without raising errors. Evidence: riskfolio/src/HCPortfolio.py:126(kappa.setter)'
  - 'Long-only fully-invested assumption encoded in defaults (budget=1, upperlng=1,
    lowerlng=0); shorting requires explicit sht=True. Evidence: riskfolio/src/Portfolio.py:77(budget=1)'
  acceptance_hints:
  - Portfolio object created without AttributeError on returns access
  - DataFrame column names become asset identifiers throughout pipeline
  - Setting risk parameters after construction updates optimization behavior
- id: parameter_estimation
  name: Parameter Estimation
  order: 2
  responsibility: Compute expected returns vector, covariance matrix, cokurtosis tensor
    from returns data. This stage transforms raw returns into the parameter inputs
    required by optimization, supporting 6 return methods and 14 covariance methods.
  interface:
    inputs:
    - returns DataFrame
    outputs:
    - mu vector
    - cov matrix
    - optionally kurtosis/cokurtosis tensors
  required_methods:
  - name: mean_vector
    description: 'Estimates expected returns with 6 methods: hist, ewma1, ewma2, JS,
      BS, BOP'
    evidence: riskfolio/src/ParamsEstimation.py:44(mean_vector)
  - name: covar_matrix
    description: Estimates covariance matrix with 14 methods including shrinkage,
      Gerber, factor models
    evidence: riskfolio/src/ParamsEstimation.py:145(covar_matrix)
  - name: black_litterman
    description: Integrates investor views with equilibrium prior using benchweights
      (default 1/N)
    evidence: riskfolio/src/ParamsEstimation.py:1111(black_litterman)
  - name: risk_factors
    description: Factor model estimation with stepwise regression for feature selection
      preventing overfitting
    evidence: riskfolio/src/ParamsEstimation.py:874(risk_factors)
  - name: Portfolio.assets_stats
    description: MANDATORY method that MUST be called before optimization() to set
      self.mu and self.cov
    evidence: riskfolio/src/Portfolio.py:1116(assets_stats)
  key_behaviors:
  - behavior: String-based method dispatch
    description: Extensible pattern using if-elif branches for method selection ('hist',
      'ewma1', 'ledoit'); adding new methods requires only new elif branch without
      API changes
    evidence: riskfolio/src/ParamsEstimation.py:93(if method == hist)
  - behavior: Column-based asset access
    description: Returns DataFrame indexed by asset names via X.columns.tolist();
      column-based access enables asset-aware operations with timestamp index
    evidence: riskfolio/src/ParamsEstimation.py:91(assets = X.columns.tolist())
  - behavior: Gerber robust covariance
    description: Alternative to shrinkage for heavy-tailed returns; threshold parameter
      controls robustness degree
    evidence: riskfolio/src/ParamsEstimation.py:267(gerber1)
  - behavior: Positive semi-definite enforcement
    description: Covariance auto-fixed with 5 retries using eigenvalue clipping if
      non-PSD; prints warning after 5 failures but continues
    evidence: riskfolio/src/Portfolio.py:1189-1201(is_pos_def check + cov_fix loop)
  replaceable_points:
  - name: mu_method
    description: Expected returns estimation method
    options:
    - name: hist
      traits:
      - Historical mean
      - Simple average
      - No smoothing
      fit_for:
      - Stable markets
      - Long-term portfolios
      - Benchmark comparison
      not_fit_for:
      - Trending markets
      - High volatility periods
      - Short-term tactical allocation
    - name: ewma1
      traits:
      - Exponentially weighted
      - d=0.94 default decay
      - Recent emphasis
      fit_for:
      - Adaptive portfolios
      - Recent market regimes
      - Tactical positioning
      not_fit_for:
      - Stable long-term estimates
      - Low liquidity assets
    - name: ewma2
      traits:
      - Double exponential smoothing
      - Trend component
      - More responsive
      fit_for:
      - Trending returns
      - Momentum strategies
      not_fit_for:
      - Mean-reverting markets
      - High noise assets
    - name: JS
      traits:
      - James-Stein shrinkage
      - Mean reversion to grand mean
      fit_for:
      - Large asset universes
      - Overparameterized models
      not_fit_for:
      - Small universes (<10 assets)
      - Very short histories
    - name: BS
      traits:
      - Bayes-Stein shrinkage
      - Bayesian posterior mean
      fit_for:
      - Small samples
      - Informative priors
      not_fit_for:
      - Large universes
      - Strong views on returns
    - name: BOP
      traits:
      - Black-Litterman equilibrium
      - Market-implied prior
      fit_for:
      - Integration with views
      - Market-cap weighted priors
      not_fit_for:
      - No benchmark available
      - Pure alpha strategies
    default: hist
  - name: cov_method
    description: Covariance matrix estimation method
    options:
    - name: hist
      traits:
      - Sample covariance
      - Maximum likelihood
      - Unbiased
      fit_for:
      - Large samples
      - Stable correlations
      - Long histories
      not_fit_for:
      - Small samples (<n_assets)
      - Ill-conditioned matrices
      - Heavy tails
    - name: ledoit
      traits:
      - Ledoit-Wolf shrinkage
      - Analytical target
      fit_for:
      - High-dimensional
      - Singular matrices
      not_fit_for:
      - Very short histories
      - Non-stationary correlations
    - name: gerber1
      traits:
      - Gerber statistic
      - Threshold-based
      - Outlier robust
      fit_for:
      - Heavy-tailed returns
      - Crash periods
      - Non-normal distributions
      not_fit_for:
      - Thin trading
      - Low correlation assets
    - name: spectral
      traits:
      - Spectral decomposition
      - Eigenvalue clipping
      fit_for:
      - Portfolio constraints
      - Conditioning issues
      not_fit_for:
      - Stable long-term covariance
    - name: shrink
      traits:
      - Oracle approximating shrinkage
      - Analytical formula
      fit_for:
      - Moderate dimensions
      - General robustness
      not_fit_for:
      - Very high dimensions
      - Factor structure
    default: hist
  design_decisions:
  - 'String dispatch pattern for 6 return methods and 14 covariance methods enables
    extensible architecture without API changes. Evidence: riskfolio/src/ParamsEstimation.py:93(if
    method == hist)'
  - 'Returns DataFrame uses asset names as columns enabling column-based access throughout
    pipeline. Evidence: riskfolio/src/ParamsEstimation.py:91(assets = X.columns.tolist())'
  - 'Gerber statistics provide alternative to shrinkage for heavy-tailed returns with
    threshold-controlled robustness. Evidence: riskfolio/src/ParamsEstimation.py:267(gerber1)'
  - 'Stepwise regression with pvalue/AIC/SIC/R2 criteria prevents overfitting in high-dimensional
    factor models. Evidence: riskfolio/src/ParamsEstimation.py:352(forward_regression)'
  - 'Default estimation uses method_mu=''hist'', method_cov=''hist'' with EWMA smoothing
    d=0.94. Evidence: riskfolio/src/Portfolio.py:1118-1119'
  acceptance_hints:
  - assets_stats() returns without AttributeError indicating self.mu and self.cov
    are set
  - Covariance matrix is positive semi-definite (eigenvalues >= 0)
  - mu vector length matches n_assets from returns DataFrame
  - Non-PSD covariance triggers cov_fix with eigenvalue clipping
- id: risk_computation
  name: Risk Computation
  order: 3
  responsibility: Calculate 30+ risk measures for portfolio weights and contributions.
    This stage provides the risk quantification layer that feeds both optimization
    objectives and reporting, supporting scenario-based and analytical risk measures.
  interface:
    inputs:
    - returns
    - weights
    - optional covariance/risk parameters
    outputs:
    - Risk scalar value or per-asset contribution vector
  required_methods:
  - name: Sharpe_Risk
    description: Universal dispatcher computing any of 25+ supported risk measures
      via single string parameter rm
    evidence: riskfolio/src/RiskFunctions.py:1933(SHARPE_RISK)
  - name: Risk_Contribution
    description: Calculates per-asset marginal risk contribution using finite difference
      (delta=1e-7, d_i=1e-4 for cone-based)
    evidence: riskfolio/src/RiskFunctions.py:2313(Risk_Contribution)
  - name: VaR_Hist
    description: Historical Value at Risk at 5th percentile using sorted returns
    evidence: riskfolio/src/RiskFunctions.py:225(VaR_Hist)
  - name: CVaR_Hist
    description: Conditional Value at Risk as expected loss beyond VaR threshold
    evidence: riskfolio/src/RiskFunctions.py:300(CVaR_Hist)
  key_behaviors:
  - behavior: Unified risk measure dispatcher
    description: Sharpe_Risk dispatch table handles each 30+ measures without if/elif
      chains in calling code; single rm parameter selects measure
    evidence: riskfolio/src/RiskFunctions.py:69(MAD)
  - behavior: Numerical gradient for risk contributions
    description: Finite difference (delta=1e-7) avoids closed-form derivatives for
      complex measures like EVaR; larger d_i=1e-4 for cone-based measures
    evidence: riskfolio/src/RiskFunctions.py:2437(delta[i,0]=d_i)
  - behavior: OWA weight decomposition
    description: Coherent risk measures (CVaR, TG, GMD) use OWA weights for convex
      CVXPY formulation; p-norms approximate in RiskFunctions
    evidence: riskfolio/src/OwaWeights.py:86(owa_cvar)
  - behavior: Uncompounded drawdown calculation
    description: Drawdown uses uncompounded cumulative returns for correct underwater
      period measurement; rel variants use compounded returns
    evidence: riskfolio/src/RiskFunctions.py:797(DaR_Abs)
  replaceable_points:
  - name: risk_measure
    description: Risk metric selection for optimization or reporting
    options:
    - name: MV
      traits:
      - Mean-Variance
      - Quadratic
      - Analytical gradient
      - SOC constraint
      fit_for:
      - Classic portfolio theory
      - Efficient frontier
      - Analytic solutions
      not_fit_for:
      - Non-normal returns
      - Heavy tails
      - Non-convex preferences
    - name: CVaR
      traits:
      - Conditional VaR
      - Expected Shortfall
      - Coherent
      - OWA decomposition
      fit_for:
      - Tail risk management
      - Regulatory reporting
      - Downside protection
      not_fit_for:
      - Symmetric preferences
      - Small samples
      - High kurtosis
    - name: EVaR
      traits:
      - Entropic VaR
      - Worst-case from DNE
      - Exponential cone required
      fit_for:
      - Ambiguity aversion
      - Robust optimization
      - Worst-case scenarios
      not_fit_for:
      - Standard solvers (ECOS/OSQP)
      - Speed-critical applications
    - name: RLVaR
      traits:
      - Relativistic VaR
      - Deformation parameter kappa
      - Power cone required
      fit_for:
      - Flexible tail behavior
      - Smooth VaR family
      not_fit_for:
      - Most solvers (requires MOSEK/CLARABEL/SCS)
      - Production systems
    - name: GMD
      traits:
      - Gini Mean Difference
      - Dispersion measure
      - OWA-based
      fit_for:
      - Rank-based optimization
      - Non-normal returns
      - Robust to outliers
      not_fit_for:
      - Analytic gradients
      - Small sample stability
    - name: KT
      traits:
      - Kurtosis
      - 4th moment
      - SDP formulation with W=diag(w)
      fit_for:
      - Higher moment optimization
      - Heavy-tailed assets
      not_fit_for:
      - Large universes
      - Numerical stability issues
    default: MV
  design_decisions:
  - '30+ risk measures via single string parameter rm with unified dispatcher eliminates
    if/elif chains in calling code. Evidence: riskfolio/src/RiskFunctions.py:69(MAD)'
  - 'Finite difference for Risk_Contribution (delta=1e-7) avoids closed-form complexity
    for complex measures like EVaR. Evidence: riskfolio/src/RiskFunctions.py:2437(delta[i,0]=d_i)'
  - 'OWA weights precompute convex decompositions enabling CVXPY formulation for each
    coherent risk measures. Evidence: riskfolio/src/OwaWeights.py:86(owa_cvar)'
  - 'Drawdown uses uncompounded cumulative returns correctly measuring underwater
    periods. Evidence: riskfolio/src/RiskFunctions.py:797(DaR_Abs)'
  - 'alpha parameter must be in (0,1) for percentile-based measures; validated at
    runtime. Evidence: riskfolio/src/RiskFunctions.py:257(index=int(np.ceil(alpha*len)))'
  acceptance_hints:
  - Sharpe_Risk returns scalar value for any supported rm parameter
  - Risk_Contribution sums to total portfolio risk (verified by Euler decomposition)
  - VaR_Hist returns 5th percentile matching sorted returns approach
  - EVaR/RLVaR measures require CLARABEL/MOSEK/SCS solvers
- id: constraint_construction
  name: Constraints Construction
  order: 4
  responsibility: Convert user constraints to CVXPY-compatible linear algebra (A,
    b matrices in Aw <= b form). This stage bridges human-readable constraint specifications
    with the mathematical formulation required by optimization solvers.
  interface:
    inputs:
    - constraints DataFrame
    - asset_classes
    - optional loadings
    outputs:
    - A matrix
    - b vector for Aw <= b form
  required_methods:
  - name: assets_constraints
    description: Builds linear constraints from 10-column constraint DataFrame schema
      supporting Disabled/Type/Set/Position/Sign/Weight/RelativeType/RelativeSet/Relative/Factor
    evidence: riskfolio/src/ConstraintsFunctions.py:36(assets_constraints)
  - name: risk_constraint
    description: Generates risk contribution bounds for risk parity models using marginal
      risk calculations
    evidence: riskfolio/src/ConstraintsFunctions.py:1312(risk_constraint)
  - name: hrp_constraints
    description: Builds HRP weight bounds from cluster membership using DBHT or scipy
      linkage
    evidence: riskfolio/src/ConstraintsFunctions.py:1164(hrp_constraints)
  key_behaviors:
  - behavior: Rich 10-column constraint schema
    description: Comprehensive schema supports Disabled/Type/Set/Position/Sign/Weight/RelativeType/RelativeSet/Relative/Factor
      enabling Excel-based constraint editing
    evidence: riskfolio/src/ConstraintsFunctions.py:134(shape[1]!=10)
  - behavior: Network centrality constraints
    description: Graph-theoretic constraints via centrality_vector enable diversification
      across network structure
    evidence: riskfolio/src/ConstraintsFunctions.py:1546(centrality_vector)
  - behavior: DBHT clustering for constraints
    description: Deterministic hierarchical clustering provides reproducible cluster
      assignments for HRP constraints
    evidence: riskfolio/src/DBHT.py:39(DBHTs)
  replaceable_points:
  - name: constraint_type
    description: Constraint specification format
    options:
    - name: inline parameters
      traits:
      - Direct property assignment
      - Fluent API
      - Individual bounds
      fit_for:
      - Simple constraints
      - Quick prototyping
      - Single bounds
      not_fit_for:
      - Complex dependencies
      - Relative constraints
      - Factor loadings
    - name: DataFrame schema
      traits:
      - 10-column format
      - Excel-editable
      - Rich constraints
      fit_for:
      - Production systems
      - Complex strategies
      - Relative constraints
      not_fit_for:
      - Simple portfolios
      - Interactive exploration
    default: inline parameters
  design_decisions:
  - '10-column constraint DataFrame schema enables rich constraint specification with
    Excel-based editing. Evidence: riskfolio/src/ConstraintsFunctions.py:134(shape[1]!=10)'
  - 'Network centrality as constraint input enables graph-theoretic diversification
    across network structure. Evidence: riskfolio/src/ConstraintsFunctions.py:1546(centrality_vector)'
  - 'DBHT clustering provides deterministic alternative to scipy for reproducible
    HRP constraints. Evidence: riskfolio/src/DBHT.py:39(DBHTs)'
  acceptance_hints:
  - 'A matrix dimensions: (n_constraints) x n_assets'
  - b vector length matches number of constraints
  - Budget constraint (sum w = 1) automatically appended if not present
  - Linear constraints compatible with each CVXPY solvers
- id: optimization
  name: Portfolio Optimization
  order: 5
  responsibility: Solve CVXPY optimization problems for optimal weights using mean-risk,
    risk parity, or Black-Litterman models. This is the core computational stage that
    transforms parameters into actionable portfolio weights.
  interface:
    inputs:
    - mu
    - cov
    - returns
    - constraints
    - objective
    - risk measure
    outputs:
    - weights DataFrame
  required_methods:
  - name: Portfolio.optimization
    description: Main mean-risk optimizer (600+ lines) solving for optimal weights
      using CVXPY with SDP/SOC/exp/power cone formulations
    evidence: riskfolio/src/Portfolio.py:1876(optimization)
  - name: Portfolio.rp_optimization
    description: Risk parity optimizer via risk budgeting approach for equal risk
      contribution portfolios
    evidence: riskfolio/src/Portfolio.py:3348(rp_optimization)
  - name: Portfolio.efficient_frontier
    description: Generates multiple portfolios along efficient frontier for visualization
      and selection
    evidence: riskfolio/src/Portfolio.py:5720(efficient_frontier)
  key_behaviors:
  - behavior: SDP formulation for kurtosis measures
    description: KT and SKT risk require matrix variable W=diag(w) for semidefinite
      constraints; L_2, S_2 precomputed in assets_stats
    evidence: riskfolio/src/Portfolio.py:2063(W=cp.Variable((N,N),symmetric=True))
  - behavior: SOC constraints for mean-variance
    description: Second-order cone reformulation of variance using sqrtm decomposition
      enables efficient solvers (ECOS, CLARABEL)
    evidence: riskfolio/src/Portfolio.py:2081(G=sqrtm(sigma))
  - behavior: Exponential cone for entropic risk
    description: EVaR/EDaR measures require exp cone; supports CLARABEL, MOSEK, SCS,
      ECOS solvers
    evidence: riskfolio/src/Portfolio.py:2207(cp.ExpCone)
  - behavior: Power cone for relativistic measures
    description: RLVaR/RLDaR deformation requires power cone; limited solver support
      (MOSEK recommended)
    evidence: riskfolio/src/Portfolio.py:2596(cp.constraints.power.PowCone3D)
  - behavior: Solver fallback chain
    description: Different cone types require different solvers; fallback chain ['CLARABEL','ECOS','SCS','OSQP','CVXOPT']
      ensures robustness
    evidence: riskfolio/src/Portfolio.py:461(solvers)
  replaceable_points:
  - name: objective
    description: Optimization objective function
    options:
    - name: Sharpe
      traits:
      - Return-risk ratio maximization
      - Constraint normalization
      - RF-free variant
      fit_for:
      - Balanced portfolios
      - Risk-adjusted returns
      - Benchmark comparison
      not_fit_for:
      - Minimum variance only
      - Maximum return only
      - Short selling scenarios
    - name: MinRisk
      traits:
      - Minimum portfolio risk
      - No return objective
      fit_for:
      - Defensive portfolios
      - Capital preservation
      - Low volatility strategies
      not_fit_for:
      - Return maximization
      - Market exposure requirements
    - name: MaxRet
      traits:
      - Maximum expected return
      - No risk objective
      fit_for:
      - Aggressive growth
      - Strong return views
      - Short-term tactical
      not_fit_for:
      - Risk control
      - Long-term stability
    - name: Utility
      traits:
      - Risk aversion parameter (gamma)
      - Mean-variance utility
      fit_for:
      - Custom risk preferences
      - Investor utility functions
      not_fit_for:
      - Fixed risk targets
      - Regulatory constraints
    default: Sharpe
  - name: model
    description: Return/covariance estimation model source
    options:
    - name: Classic
      traits:
      - Historical estimation
      - Sample mu/cov
      fit_for:
      - Standard optimization
      - Backtesting
      - Research
      not_fit_for:
      - View integration
      - Factor models
    - name: BL
      traits:
      - Black-Litterman
      - Equilibrium prior
      - Investor views
      fit_for:
      - Active management
      - View-based portfolios
      not_fit_for:
      - No views available
      - Passive strategies
    - name: FM
      traits: []
      fit_for: []
      not_fit_for: []
    - name: BL_FM
      traits:
      - Black-Litterman + Factor model
      - Combined approach
      fit_for:
      - Active factor exposure
      - View integration with factors
      not_fit_for:
      - Simple portfolios
      - No factor structure
    default: Classic
  design_decisions:
  - 'SDP formulation for kurtosis/cokurtosis constraints requires matrix variable
    W=diag(w) for semidefinite programming. Evidence: riskfolio/src/Portfolio.py:2063(W=cp.Variable((N,N),symmetric=True))'
  - 'SOC constraints for MV risk via sqrtm decomposition enable efficient solver selection.
    Evidence: riskfolio/src/Portfolio.py:2081(G=sqrtm(sigma))'
  - 'Exponential cone for EVaR/EDaR requires specialized solvers (CLARABEL, MOSEK,
    SCS). Evidence: riskfolio/src/Portfolio.py:2207(cp.ExpCone)'
  - 'Power cone for RLVaR/RLDaR limits solver compatibility; MOSEK recommended for
    production. Evidence: riskfolio/src/Portfolio.py:2596(cp.constraints.power.PowCone3D)'
  - 'Solver fallback chain ensures robustness across cone types but may cause slow
    fallback. Evidence: riskfolio/src/Portfolio.py:461(solvers)'
  - 'Sharpe ratio reformulation uses ret - rf*k == 1 constraint to avoid ratio optimization.
    Evidence: riskfolio/src/Portfolio.py:3277(ret - rf0*k == 1)'
  - 'Budget constraint default=1 (full investment) with sht=False for long-only portfolios.
    Evidence: riskfolio/src/Portfolio.py:77(budget=1)'
  acceptance_hints:
  - optimization() MUST be called AFTER assets_stats() to avoid AttributeError
  - Weights sum equals budget parameter (default 1.0 for fully invested)
  - Solver status is OPTIMAL or OPTIMAL_INACCURATE for valid solutions
  - Non-PSD covariance triggers cov_fix with up to 5 retries
- id: hierarchical_clustering
  name: Hierarchical Portfolio Optimization
  order: 6
  responsibility: Non-optimization portfolio construction via hierarchical clustering
    and recursive bisection. This provides an alternative to traditional optimization
    that avoids covariance matrix conditioning issues and produces more stable portfolios.
  interface:
    inputs:
    - returns
    - codependence method
    - linkage
    - model type
    outputs:
    - weights via seriation/bisection
  required_methods:
  - name: HCPortfolio._hierarchical_clustering
    description: Builds dendrogram using scipy.hierarchy or DBHT based on codependence
      matrix
    evidence: riskfolio/src/HCPortfolio.py:294(_hierarchical_clustering)
  - name: HCPortfolio._recursive_bisection
    description: Allocates weights via tree traversal with alpha-based proportional
      splitting
    evidence: riskfolio/src/HCPortfolio.py:367(_recursive_bisection)
  - name: HCPortfolio._intra_weights
