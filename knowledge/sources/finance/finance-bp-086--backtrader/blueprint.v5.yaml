  content: 'AO: SMA(median_price, 5) - SMA(median_price, 34) using (high + low)/2'
  rationale: Calculate AO as SMA(median_price, 5) - SMA(median_price, 34) where median_price = (high +
    low) / 2. This measures market momentum by comparing short-term and long-term baseline cycles. The
    boundary is that AO crossing zero indicates baseline crossover; saucer pattern (two peaks above zero)
