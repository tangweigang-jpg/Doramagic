- id: BD-103
  type: B/RC
  content: 'Cerebro run loop MUST follow strict order: store_notify → data_notify → timers(cheat) → _next_open
    → broker_notify → timers(regular) → strat._next'
  rationale: The strict execution order ensures price discovery (data_notify) completes before order processing
    (broker_notify), preventing stale price execution. Timers fire twice—first with cheat=True before
    broker notification (enabling cheat-on-open orders), then with regular=False after broker settlement.
    Breaking this order causes price look-ahead bias or order timing violations where orders execute before
    data advances to the current bar boundary.
  evidence: backtrader/cerebro.py:1498(_runnext)
  stage: ordering_contract
- id: BD-104
  type: B
  content: 'Order execution order in broker: _processbars → _execute → check_order_margin → submit_trade.
    Margin rejection happens BEFORE trade execution.'
  rationale: Margin validation is a gatekeeper that runs before any trade execution occurs. This ensures
    insufficient margin cannot lead to partial fills or overdraft positions. If margin checks ran after
    execution, the system could create positions exceeding risk limits and require complex rollback logic.
  evidence: backtrader/brokers/bbroker.py:687(_execute)
  stage: ordering_contract
- id: BD-105
  type: B/DK
  content: 'Short selling requires prior long position: broker.check_order_short() enforces pos_size >=
    size'
  rationale: Short orders require an existing long position to cover the short—preventing naked shorting
    where no underlying position exists. This is a regulatory and risk management requirement. The broker
    enforces position_size >= order_size before allowing short order submission, ensuring every short
    has a corresponding long to deliver.
  evidence: backtrader/broker.py:49(BrokerBase)
  stage: ordering_contract
- id: BD-106
  type: B/BA
  content: 'Indicator lines are data-lineage dependent: self.data.close(-1) creates lookback dependency
    chain'
  rationale: When an indicator references self.data.close(-1), it creates an implicit dependency on the
    prior bar's close value. This creates a lookback chain where indicator values cannot compute without
    historical data. Users must ensure sufficient data is loaded ( cerebro.adddata with enough bars) or
    indicators will return NaN. The boundary is the earliest bar minus the maximum lookback period across
    each indicators.
  evidence: backtrader/indicators/atr.py:44(module)
  stage: ordering_contract
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backtrader/indicators/atr.py'
- id: BD-107
  type: B/RC
  content: 'Data advance order: min datetime data determines master, other datas rewind if ahead of time'
  rationale: Multi-data strategies require synchronization—only the data with the earliest datetime advances
    to the next bar, while others with future timestamps rewind to match. This prevents cross-data timing
    misalignment where a later data (e.g., futures) would otherwise advance ahead of an earlier data (e.g.,
    stock). The master data dictates the global timeline for each datas.
  evidence: backtrader/cerebro.py:1498(_runnext)
  stage: ordering_contract
- id: BD-108
  type: B/RC
  content: 'Data next() must follow: peek → advance → check cycle for non-master datas'
  rationale: Non-master datas follow a peek-advance-check cycle to synchronize with the master timeline.
    Peek checks if the next bar timestamp exceeds the master; if so, advance adds the current bar and
    checks again until aligned. This ensures each datas present synchronized bars to strategies, preventing
    timestamp gaps that would corrupt backtesting accuracy.
  evidence: backtrader/lineiterator.py:293(_once)
  stage: ordering_contract
- id: BD-109
  type: B
  content: 'Filter chain order: _stage1_process → user_filter.__call__ → _stage2_process → backwards'
  rationale: Data filters process in two stages with user filters sandwiched between. Stage1 prepares
