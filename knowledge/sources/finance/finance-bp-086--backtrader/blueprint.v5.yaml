# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-086
name: backtrader
sop_version: '3.6'
source:
  projects:
  - backtrader
  commit_hash: b853d7c90b6721476eb5a5ea3135224e33db1f14
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: algorithmic trading backtesting and live execution
  description: Python framework for backtesting and live trading with support for multiple data feeds,
    brokers, and technical indicators
  prerequisites: Python programming, basic understanding of trading strategies and technical indicators
  not_suitable_for: real-time high-frequency trading, production deployment without proper risk management,
    non-financial time-series analysis
stages:
- id: data_ingestion
  name: Data Ingestion
  order: 1
  responsibility: Load and normalize market data from various sources (CSV, broker APIs, etc.) into a
    unified line-based format with datetime indexing
  interface:
    inputs:
    - CSV files, broker streams, API feeds
    outputs:
    - LineSeries data feeds with OHLCV lines
  required_methods:
  - name: Cerebro.adddata
    description: Register a data feed with cerebro for use by strategies
    evidence: backtrader/cerebro.py:412(adddata)
  - name: CSVDataBase._loadline
    description: Parse one line of CSV data into feed lines
    evidence: backtrader/feed.py:649(CSVDataBase)
  key_behaviors:
  - behavior: Line-based data model
    description: Every data feeds expose OHLCV as separate lines, with datetime as line[0], enabling vectorized
      operations across feeds
    evidence: backtrader/dataseries.py:60(DataSeries)
  - behavior: Metaclass-based line binding
    description: MetaAbstractDataBase registers subclasses and manages automatic line binding during instantiation
    evidence: backtrader/feed.py:41(MetaAbstractDataBase)
  - behavior: Iterator pattern for bar advancement
    description: Data feeds implement __iter__ returning self, with .next() advancing state for step-by-step
      execution
    evidence: backtrader/feed.py:270-280(__iter__)
  replaceable_points:
  - name: Data Source
    description: Plug in different feed implementations for various data sources
    options:
    - name: CSVDataBase
      traits:
      - File-based
      - Static data
      - No network
      fit_for:
      - Historical backtesting
      - Fixed datasets
      not_fit_for:
      - Live trading
      - Streaming data
    - name: PandasData
      traits:
      - In-memory DataFrame
      - Flexible columns
      fit_for:
      - pandas workflow
      - Custom data formats
      not_fit_for:
      - Large datasets
      - Streaming
    - name: YahooFinanceData
      traits:
      - Web API
      - Free historical data
      fit_for:
      - Quick backtests
      - Public equities
      not_fit_for:
      - Real-time data
      - Forex/ futures
    - name: IBData
      traits:
      - Interactive Brokers API
      - Live data
      fit_for:
      - Live trading
      - Real-time data
      not_fit_for:
      - Without IB account
      - Historical-only
    - name: OandaData
      traits:
      - Oanda REST API
      - Forex/CFD
      fit_for:
      - Forex backtesting
      - CFD trading
      not_fit_for:
      - Equities
      - Without Oanda account
    default: CSVDataBase
  design_decisions:
  - 'LineSeries as unified data model (evidence: backtrader/dataseries.py:60(DataSeries)) — OHLCV as lines
    enables vectorized operations across data feeds; datetime is line 0'
  - 'MetaAbstractDataBase from OHLCDateTime (evidence: backtrader/feed.py:41(MetaAbstractDataBase)) —
    Inherits metaclass chain for params, lines, and period management'
  - 'Data feeds as LineIterator (evidence: backtrader/feed.py:599(DataBase)) — Enables consistent next/once
    execution model with indicators'
  acceptance_hints:
  - Data loads without errors from the specified source
  - Datetime indexing correctly parsed and aligned across feeds
  - OHLCV values accessible via self.data0.high, self.data0.close, etc.
- id: data_filtering
  name: Data Filtering & Resampling
  order: 2
  responsibility: Transform data feeds via resampling (1min→5min), replaying, session filtering, and bar
    filling
  interface:
    inputs:
    - Raw data feed lines
    outputs:
    - Resampled/replayed data feed
  required_methods:
  - name: Resampler._process
    description: Assemble bars at timeframe boundaries using bar2edge or bar2point mode
    evidence: backtrader/resamplerfilter.py:96(_BaseResampler)
  key_behaviors:
  - behavior: Filter chain processing
    description: Filters wrap feeds, return False to pass bars through unchanged, with stage1_process
      → user_filter → stage2_process → backwards ordering
    evidence: backtrader/filters/__init__.py:63-92(GenericFilters)
  - behavior: bar2edge alignment
    description: Resampling aligns bars to time boundaries (0, 5, 10...) not rolling windows, creating
      deterministic output
    evidence: backtrader/resamplerfilter.py:435(__init__)
  - behavior: SessionFiller with MAXDATE sentinel
    description: MAXDATE marks no active session, recalculates session bounds per bar for non-trading
      periods
    evidence: backtrader/filters/session.py:64(SessionFiller)
  replaceable_points:
  - name: Resampling mode
    description: How bars are aligned to time boundaries
    options:
    - name: bar2edge
      traits:
      - Deterministic
      - Aligned to clock
      fit_for:
      - Standard OHLCV
      - Regular intervals
      not_fit_for:
      - Renko
      - Heikin-Ashi
    - name: bar2point
      traits:
      - Single bar per period
      fit_for:
      - Point bars
      - Custom aggregation
      not_fit_for:
      - Multi-bar aggregation
    default: bar2edge
  design_decisions:
  - 'Resampler/Replayer as filters not feeds (evidence: backtrader/resamplerfilter.py:96(_BaseResampler))
    — Filters wrap feeds, return False to pass bars through unchanged'
  - 'bar2edge default for resampling (evidence: backtrader/resamplerfilter.py:435(__init__)) — Aligns
    bars to time boundaries (0, 5, 10...) not rolling windows'
  - 'SessionFiller with MAXDATE sentinel (evidence: backtrader/filters/session.py:64(SessionFiller)) —
    MAXDATE marks no active session, recalculates session bounds per bar'
  acceptance_hints:
  - Resampled bars align to correct time boundaries
  - Session gaps filled or filtered as expected
  - Replay mode simulates intrabar price buildup correctly
- id: indicator_computation
  name: Indicator Computation
  order: 3
  responsibility: Calculate technical indicators from data lines with automatic minperiod tracking and
    vector/bar modes
  interface:
    inputs:
    - Data lines, parameters (period, etc.)
    outputs:
    - Indicator lines (sma, ema, macd, etc.)
  required_methods:
  - name: Indicator.next
    description: Bar-by-bar indicator calculation for non-vectorized mode
    evidence: backtrader/indicator.py:90(Indicator)
  - name: Indicator.once
    description: Vectorized indicator calculation for runonce mode
    evidence: backtrader/indicator.py:79(next_over)
  key_behaviors:
  - behavior: Lines declared as class attribute
    description: Metaclass extracts 'lines' tuple pre-instance to create Lines subclass, enabling declarative
      line declaration
    evidence: backtrader/indicators/sma.py:38(lines = ('sma',))
  - behavior: Auto-conversion next→once for vector mode
    description: If only next() overridden, creates once_via_next; runonce uses vectorized once()
    evidence: backtrader/indicator.py:79(next_over)
  - behavior: Automatic minperiod tracking
    description: Minperiod is max of each input datas/indicators minperiods, enabling proper warmup calculation
    evidence: backtrader/lineiterator.py:120(_minperiod)
  - behavior: Built-in _once() auto-advances member datas/indicators
    description: Indicator.next() only contains computation; data advance handled by _once
    evidence: backtrader/indicators/mabase.py:90-108(MetaIndicator.__new__)
  replaceable_points:
  - name: Indicator calculation
    description: Override next()/once() for custom indicators
    options:
    - name: indicator composition
      traits:
      - Declarative
      - No explicit loop
      fit_for:
      - Built-in indicators
      - Simple calculations
      not_fit_for:
      - Complex algorithms
      - External data
    - name: custom next()
      traits:
      - Bar-by-bar
      - Flexible
      fit_for:
      - Complex logic
      - Conditionals
      not_fit_for:
      - Vectorizable operations
    - name: custom once()
      traits:
      - Vectorized
      - Fast
      fit_for:
      - Large datasets
      - NumPy operations
      not_fit_for:
      - Complex stateful logic
    default: indicator composition
  design_decisions:
  - 'Indicator lines declared as class attribute (evidence: backtrader/indicators/sma.py:38(lines = (''sma'',)))
    — Metaclass extracts ''lines'' tuple pre-instance to create Lines subclass'
  - 'Auto-conversion next→once for vector mode (evidence: backtrader/indicator.py:79(next_over)) — If
    only next() overridden, creates once_via_next; runonce uses vectorized once()'
  - 'MetaMovAvBase auto-registers MAs (evidence: backtrader/indicators/mabase.py:83(MovingAverage.register))
    — Enables MovAv.SMA shorthand; supports envelope/oscillator auto-creation'
  acceptance_hints:
  - Indicators produce correct numerical values matching reference implementations
  - Minperiod tracking delays indicator output until sufficient warmup data available
  - runonce/vectorized mode produces identical results to bar-by-bar mode
- id: strategy_logic
  name: Strategy Logic
  order: 4
  responsibility: Implement trading decisions by combining indicators, managing orders, and tracking positions
  interface:
    inputs:
    - Data feeds, indicators, broker state
    outputs:
    - Orders submitted to broker
  required_methods:
  - name: Strategy.__init__
    description: Initialize strategy with indicators and data feeds
    evidence: backtrader/strategy.py:107(Strategy)
  - name: Strategy.next
    description: Execute strategy logic on each bar with access to data, indicators, and positions
    evidence: backtrader/strategy.py:310(next)
  - name: Strategy.buy
    description: Submit a buy order to the broker
    evidence: backtrader/strategy.py:935(buy)
  - name: Strategy.sell
    description: Submit a sell order to the broker
    evidence: backtrader/strategy.py:935(sell)
  key_behaviors:
  - behavior: Sizer pattern for position sizing
    description: Sizer abstraction decouples strategy logic from stake calculation, enabling dynamic position
      sizing
    evidence: backtrader/strategy.py:81(_sizer = bt.sizers.FixedSize())
  - behavior: Bracket orders as parent-child group
    description: High/low side orders activate only after parent fills, enabling take-profit/stop-loss
    evidence: backtrader/strategy.py:1001(buy_bracket)
  - behavior: close() infers opposite direction
    description: Simple close(position) beats explicit buy/sell based on position sign
    evidence: backtrader/strategy.py:994(possize > 0)
  - behavior: Target orders for rebalancing
    description: order_target_* auto-calculates size delta vs current position for portfolio rebalancing
    evidence: backtrader/strategy.py:1247(order_target_size)
  replaceable_points:
  - name: Sizing logic
    description: How many units per order
    options:
    - name: FixedSize
      traits:
      - Static
      - Simple
      fit_for:
      - Fixed capital allocation
      - Equal-weight strategies
      not_fit_for:
      - Portfolio rebalancing
      - Volatility-based sizing
    - name: PercentSizer
      traits:
      - Percentage-based
      - Dynamic
      fit_for:
      - Portfolio allocation
      - Risk management
      not_fit_for:
      - Fixed contract sizes
      - Futures
    - name: custom Sizer
      traits:
      - User-defined
      - Flexible
      fit_for:
      - Complex sizing rules
      - Custom risk models
      not_fit_for:
      - Simple use cases
    default: FixedSize
  - name: Trade tracking
    description: Group fills into trades
    options:
    - name: auto-trade grouping
      traits:
      - Automatic
      - Simple
      fit_for:
      - Standard strategies
      - Single-position strategies
      not_fit_for:
      - Multi-position management
      - Hedging
    - name: manual tradeid
      traits:
      - Explicit
      - Flexible
      fit_for:
      - Multi-position
      - Hedged strategies
      not_fit_for:
      - Simple single-position
    default: auto-trade grouping
  design_decisions:
  - 'Sizer pattern for position sizing (evidence: backtrader/strategy.py:81(_sizer = bt.sizers.FixedSize()))
    — Sizer abstraction decouples strategy logic from stake calculation'
  - 'Bracket orders as parent-child group (evidence: backtrader/strategy.py:1001(buy_bracket)) — High/low
    side orders activate only after parent fills'
  - 'close() infers opposite direction (evidence: backtrader/strategy.py:994(possize > 0)) — Simple close(position)
    beats explicit buy/sell based on position sign'
  - 'Target orders for rebalancing (evidence: backtrader/strategy.py:1247(order_target_size)) — order_target_*
    auto-calculates size delta vs current position'
  acceptance_hints:
  - Strategy receives data and indicators correctly via self.data0, self.indicators
  - Orders submitted and acknowledged by broker without errors
  - Position size correctly reflects sizer decisions
  - Bracket orders correctly link take-profit/stop-loss to parent order
- id: order_execution
  name: Order Execution & Broker
  order: 5
  responsibility: Simulate or connect to live brokers, manage order lifecycle, cash/position tracking,
    commission calculation
  interface:
    inputs:
    - Orders from strategies
    outputs:
    - Fill notifications, cash/position updates
  required_methods:
  - name: BrokerBase.submit
    description: Submit an order for execution
    evidence: backtrader/brokers/bbroker.py:850(_try_exec_market)
  - name: BrokerBase.getvalue
    description: Return current portfolio value
    evidence: backtrader/broker.py:49(BrokerBase)
  - name: BrokerBase.getposition
    description: Return current position for a data feed
    evidence: backtrader/strategy.py:340(getposition)
  key_behaviors:
  - behavior: commission=0.0 default
    description: No commission by default; users must explicitly configure commission schemes
    evidence: backtrader/broker.py:51(commission)
  - behavior: Order execution types via _try_exec_*
    description: Separate methods for Market/Limit/Stop/StopLimit/Trail execution with different fill
      logic
    evidence: backtrader/brokers/bbroker.py:850(_try_exec_market)
  - behavior: Cheat-on-Close for backtesting accuracy
    description: Execute market orders at bar close, not next bar open, for more accurate backtesting
    evidence: backtrader/brokers/bbroker.py:314(set_coc)
  - behavior: Margin rejection before execution
    description: Orders failing margin check never reach execution — no partial fills possible
    evidence: backtrader/brokers/bbroker.py:497-540(_execute)
  - behavior: Short selling requires prior long position
    description: broker.check_order_short() enforces pos_size >= size
    evidence: backtrader/broker.py:188(check_order_short)
  replaceable_points:
  - name: Broker backend
    description: Where orders execute
    options:
    - name: BackBroker
      traits:
      - Simulated
      - Built-in
      - Full control
      fit_for:
      - Backtesting
      - Strategy development
      not_fit_for:
      - Live trading
    - name: IBBroker
      traits:
      - Interactive Brokers
      - Live
      fit_for:
      - Live equities/forex trading
      not_fit_for:
      - Without IB account
    - name: OandaBroker
      traits:
      - Oanda API
      - Forex/CFD
      fit_for:
      - Forex trading
      - CFDs
      not_fit_for:
      - Equities
      - Without Oanda account
    - name: VCBroker
      traits:
      - Visual Chart
      - DDE/com
      fit_for:
      - Visual Chart users
      not_fit_for:
      - Without Visual Chart
    default: BackBroker
  design_decisions:
  - 'commission=0.0 default (evidence: backtrader/broker.py:51(commission)) — No commission by default;
    users must explicitly configure'
  - 'stocklike vs futures margin behavior (evidence: backtrader/comminfo.py:43(stocklike)) — stocklike:
    margin=price×size; futures: margin=price×size×mult'
  - 'Cheat-on-Close for backtesting accuracy (evidence: backtrader/brokers/bbroker.py:314(set_coc)) —
    Execute market orders at bar close, not next bar open'
  - 'Order execution types via _try_exec_* (evidence: backtrader/brokers/bbroker.py:850(_try_exec_market))
    — Separate methods for Market/Limit/Stop/StopLimit/Trail execution'
  acceptance_hints:
  - Orders fill at expected prices with correct size
  - Cash and position values update after each fill
  - Commission correctly deducted from account value
  - Margin violations correctly rejected before execution
- id: analysis_reporting
  name: Analysis & Reporting
  order: 6
  responsibility: Calculate performance metrics and generate output (text, plots, pyfolio)
  interface:
    inputs:
    - Strategy state, trade history, broker values
    outputs:
    - Analysis results, visualizations
  required_methods:
  - name: Analyzer.get_analysis
    description: Return computed analysis results as dictionary
    evidence: backtrader/analyzer.py:89(Analyzer)
  key_behaviors:
  - behavior: Sharpe ratio 0.01 default risk-free
    description: 1% annual risk-free rate; converted to timeframe via RATEFACTORS for proper scaling
    evidence: backtrader/analyzers/sharpe.py:115(riskfreerate)
  - behavior: Observers as LineIterator subclass
    description: Observers track state via lines, not returned; same minperiod system as indicators
    evidence: backtrader/observer.py:46(Observer)
  - behavior: Trade analyzer round-turn metrics
    description: Computes pnl gross/net, commission, bars in trade, profit/loss for complete trades
    evidence: backtrader/analyzers/tradeanalyzer.py:98-120(_process_trade)
  replaceable_points:
  - name: Output format
    description: How analysis results are presented
    options:
    - name: Matplotlib plots
      traits:
      - Visual
      - Interactive
      fit_for:
      - Visual analysis
      - Quick inspection
      not_fit_for:
      - Automated reports
      - Large batch
    - name: Text writer
      traits:
      - Plain text
      - Serializable
      fit_for:
      - Logging
      - Automated processing
      not_fit_for:
      - Visual analysis
    - name: pyfolio integration
      traits:
      - Institutional
      - Risk metrics
      fit_for:
      - Portfolio analysis
      - Risk management
      not_fit_for:
      - Simple backtests
    default: Matplotlib plots
  design_decisions:
  - 'Sharpe ratio 0.01 default risk-free (evidence: backtrader/analyzers/sharpe.py:115(riskfreerate))
    — 1% annual risk-free rate; converted to timeframe via RATEFACTORS'
  - 'Observers as LineIterator subclass (evidence: backtrader/observer.py:46(Observer)) — Observers track
    state via lines, not returned; same minperiod system'
  acceptance_hints:
  - Analyzers produce correct metrics matching reference calculations
  - Observers track equity curve and trade markers correctly
  - Plots render with correct data series and annotations
- id: cerebro_orchestration
  name: Cerebro Orchestration
  order: 7
  responsibility: Coordinate data feeds, strategies, brokers, and execution loop (runnext vs runonce modes)
  interface:
    inputs:
    - Configured feeds, strategies, broker
    outputs:
    - Strategy instances with analysis results
  required_methods:
  - name: Cerebro.adddata
    description: Register a data feed with cerebro for use by strategies
    evidence: backtrader/cerebro.py:412(adddata)
  - name: Cerebro.addstrategy
    description: Register a strategy class with cerebro for execution
    evidence: backtrader/cerebro.py:600(addstrategy)
  - name: Cerebro.run
    description: Execute the backtest with each configured feeds, strategies, and broker
    evidence: backtrader/cerebro.py:1498(_runnext)
  key_behaviors:
  - behavior: preload=True by default
    description: Load each data upfront; required for runonce vectorized mode
    evidence: backtrader/cerebro.py:63(preload)
  - behavior: runonce=True default for speed
    description: Vectorized indicators faster; disables if exactbars or replay
    evidence: backtrader/cerebro.py:68(runonce)
  - behavior: Two execution paths _runnext vs _runonce
    description: '_runnext: bar-by-bar for filters/signals; _runonce: vector for preload'
    evidence: backtrader/cerebro.py:1498(_runnext)
  - behavior: Strict bar-by-bar execution order
    description: store_notify → data_notify → timers(cheat) → _next_open → broker_notify → timers(regular)
      → strat._next
    evidence: backtrader/cerebro.py:1620-1637(_runnext)
  - behavior: Multiprocessing pool for optimization
    description: Pool spawns processes for parallel parameter optimization
    evidence: backtrader/cerebro.py:1147(pool.imap)
  - behavior: 'Data advance order: min datetime data determines master'
    description: Other datas rewind if ahead of time; faster timeframes advance first
    evidence: backtrader/cerebro.py:1558-1594(_runnext)
  replaceable_points:
  - name: Execution mode
    description: How the backtest loop processes bars
    options:
    - name: runonce (vectorized)
      traits:
      - Fast
      - Every data in memory
      fit_for:
      - Large datasets
      - Standard backtesting
      not_fit_for:
      - Filters
      - Signals
      - Replay
    - name: runnext (bar-by-bar)
      traits:
      - Accurate
      - Streaming
      fit_for:
      - Filters
      - Signals
      - Replaying
      not_fit_for:
      - Large datasets
      - Slow
    default: runonce (vectorized)
  design_decisions:
  - 'preload=True by default (evidence: backtrader/cerebro.py:63(preload)) — Load each data upfront; required
    for runonce vectorized mode'
  - 'runonce=True default for speed (evidence: backtrader/cerebro.py:68(runonce)) — Vectorized indicators
    faster; disables if exactbars or replay'
  - 'Two execution paths _runnext vs _runonce (evidence: backtrader/cerebro.py:1498(_runnext)) — _runnext:
    bar-by-bar for filters/signals; _runonce: vector for preload'
  - 'Multiprocessing pool for optimization (evidence: backtrader/cerebro.py:1147(pool.imap)) — Pool spawns
    processes for parallel parameter optimization'
  - 'MetaParams pops params before class creation (evidence: backtrader/metabase.py:207(newparams)) —
    Prevents params inheritance (no accidental reuse from base); explicit override needed'
  acceptance_hints:
  - Cerebro.run() completes without errors for configured strategy
  - Every strategies receive correct data and broker reference
  - Analysis results accessible via strat.analyzers after run()
  - runnext vs runonce produce identical results for non-filter strategies
data_flow:
- from_stage: data_ingestion
  to_stage: data_filtering
  data: Raw OHLCV lines
- from_stage: data_filtering
  to_stage: indicator_computation
  data: Filtered/resampled data lines
- from_stage: data_ingestion
  to_stage: strategy_logic
  data: Data feeds (self.data0, self.data1)
- from_stage: indicator_computation
  to_stage: strategy_logic
  data: Indicator line values
- from_stage: strategy_logic
  to_stage: order_execution
  data: Order objects (buy/sell/close)
- from_stage: order_execution
  to_stage: strategy_logic
  data: Order status notifications, position updates
- from_stage: strategy_logic
  to_stage: analysis_reporting
  data: Trade events, broker value snapshots
- from_stage: cerebro_orchestration
  to_stage: data_ingestion
  data: Feed start/stop commands
- from_stage: cerebro_orchestration
  to_stage: order_execution
  data: Broker cash, commission schemes
- from_stage: cerebro_orchestration
  to_stage: strategy_logic
  data: Strategy instantiation, broker reference
global_contracts:
- contract: Every LineIterator subclasses use datetime[0] as current timestamp
  evidence: backtrader/lineiterator.py:120(_minperiod)
- contract: 'Lines are 0-indexed forward: [0] is current, [-1] is previous'
  evidence: backtrader/linebuffer.py:162(__getitem__)
- contract: Minperiod is max of each input datas/indicators minperiods
  evidence: backtrader/lineiterator.py:120(_minperiod)
- contract: Order size positive for buy, positive for sell (strategies only)
  evidence: backtrader/strategy.py:935(abs(size))
- contract: 'OHLCV standard line order: DateTime, Open, High, Low, Close, Volume, OpenInterest'
  evidence: backtrader/dataseries.py:69(LineOrder)
- contract: params are extracted pre-instance by MetaParams metaclass
  evidence: backtrader/metabase.py:207(newparams)
business_decisions:
- id: BD-001
  type: B
  content: LineSeries as unified data model
  rationale: OHLCV as lines enables vectorized operations across data feeds; datetime is line 0. This
    design unifies price data with indicator outputs under a single abstraction, allowing consistent indexing
    and slicing across each time series data in the system.
  evidence: backtrader/dataseries.py:60(DataSeries)
  stage: data_ingestion
  alternative_considered: Separate OHLC arrays vs unified LineSeries; unified approach enables simpler
    indicator composition
- id: BD-002
  type: BA
  content: MetaAbstractDataBase from OHLCDateTime
  rationale: Inherits metaclass chain for params, lines, and period management. The meta-inheritance pattern
    ensures consistent parameter handling, line declaration, and timing coordination across each data
    feed subclasses.
  evidence: backtrader/feed.py:41(MetaAbstractDataBase)
  stage: data_ingestion
  alternative_considered: Explicit parameter passing vs metaclass-driven; metaclass enables declarative
    params declaration
- id: BD-003
  type: B
  content: Data feeds as LineIterator
  rationale: Enables consistent next/once execution model with indicators. By implementing the same iteration
    protocol as indicators, data feeds can participate in both bar-by-bar (_runnext) and vectorized (_runonce)
    execution paths without special handling.
  evidence: backtrader/feed.py:599(DataBase)
  stage: data_ingestion
  alternative_considered: Separate data feed interface vs LineIterator; unified enables vectorized batching
- id: BD-004
  type: B
  content: Resampler/Replayer as filters not feeds
  rationale: Filters wrap feeds, return False to pass bars through unchanged. This composition pattern
    allows chaining multiple transformations (resampling, session filling, data cleaning) without modifying
    the underlying feed, preserving separation of concerns.
  evidence: backtrader/resamplerfilter.py:96(_BaseResampler)
