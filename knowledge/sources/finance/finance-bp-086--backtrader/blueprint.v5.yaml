- id: BD-093
  type: B
  content: 'AC Oscillator: Awesome Oscillator minus SMA of Awesome Oscillator'
  rationale: Calculate Acceleration/Deceleration Oscillator as AO minus SMA(AO, period). This measures
    the force driving price changes by comparing current AO to its smoothed average. The boundary is that
    AC changing color (green to red) before zero-line crossover indicates weakening momentum; crossover
