- id: BD-102
  type: B
  content: 'Dickson Moving Average: average of ZeroLagIndicator and Hull MA'
  rationale: Calculate Dickson Moving Average as average of ZeroLag Indicator and Hull Moving Average.
    This combines two lag-reduction techniques to create an ultra-smooth indicator with minimal delay.
    The boundary is that DMA provides smoother output than either component alone with reduced overshoot
