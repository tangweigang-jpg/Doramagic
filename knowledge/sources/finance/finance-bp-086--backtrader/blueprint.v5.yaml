- id: BD-090
  type: B
  content: 'ADXR: average of current ADX and ADX from ''period'' bars ago'
  rationale: Calculate ADXR as (ADX_t + ADX_(t-period)) / 2, averaging current ADX with its value from
    'period' bars ago. This smoothing reduces ADX volatility and provides more stable trend strength readings.
    The boundary is that ADXR lags by period/2 bars but produces fewer false trend strength signals. ADXR
    above 25 still indicates trending conditions.
  evidence: backtrader/indicators/directionalmove.py:312(module)
  stage: backtrader.indicators
