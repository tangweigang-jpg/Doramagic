- id: BD-118
  type: T
  content: Metaclass MetaParams for cross-module param inheritance — params from each base classes merged
  rationale: MetaParams enables composition of parameters across class hierarchies. When a strategy subclasses
    multiple parameter-mixin classes, MetaParams.__new__ collects and merges each params into a single
    params tuple. This allows modular parameter definitions (e.g., separate mixins for risk params, entry
    params) that combine without manual aggregation. The boundary is that conflicting param names must
    be resolved or they override in undefined order.
  evidence: backtrader/metabase.py:204(MetaParams.__new__)
  stage: pattern_choice
- id: BD-119
  type: T
  content: Metaclass MetaLine for lazy line creation — lines declared as class attrs resolved at instance
    init
  rationale: MetaLine defers line buffer allocation until instance creation rather than class definition.
    Users declare lines as class attributes (Close = Line) and MetaLine.__new__ intercepts class creation
    to register line metadata. Actual numpy array buffers allocate at __init__ time, enabling efficient
    memory use where only used lines allocate. This lazy pattern allows indicators to define lines conditionally
    based on params.
  evidence: backtrader/metabase.py:204(MetaLine.__new__)
  stage: pattern_choice
- id: BD-120
  type: T
  content: 'Observer pattern: Analyzers register with cerebro as callbacks for next/notify calls'
  rationale: Observers implement the Observer pattern, registering with cerebro to receive next() and
    notify() callbacks without modifying strategy code. Analyzers (a specialized observer) collect statistics
    passively while the strategy executes. This decouples monitoring logic from strategy logic, enabling
    orthogonal concerns like trade logging, sharpe calculation, or drawdown tracking to be added via composition
    rather than inheritance.
  evidence: backtrader/cerebro.py:1475(Cerebro._next_writers)
  stage: pattern_choice
- id: BD-121
  type: T
  content: 'Strategy as composite: Strategy holds datas, indicators, observers, analyzers in separate
    lists'
  rationale: Strategy implements the Composite pattern with segregated containers for datas (feeds), indicators
    (derived series), observers (output callbacks), and analyzers (statistics). This separation enables
    independent iteration and lifecycle management—indicators update before strategy logic, observers
    fire after, and analyzers collect at each step. The composite structure allows nested hierarchies
    where child strategies could contain sub-strategies.
  evidence: backtrader/strategy.py:57(__init__)
  stage: pattern_choice
- id: BD-122
  type: T
  content: 'Strategy as Template Method: next/nextopen/nextstart/nextrename define skeleton with user
    overrides'
  rationale: The Strategy class defines a Template Method skeleton with next() (bar-by-bar execution),
    nextstart() (first bar), nextopen() (open bar with cheat-on-open), and nexit() (strategy exit). Users
    override these methods to implement trading logic. The skeleton handles lifecycle states (warm-up,
    running, exit) while user code provides the algorithmic content, ensuring consistent execution flow
    across each strategies.
  evidence: backtrader/strategy.py:107(strategy)
  stage: pattern_choice
  _evidence_issues:
