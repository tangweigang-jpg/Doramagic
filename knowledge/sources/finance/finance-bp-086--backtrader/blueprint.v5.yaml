  type: RC
  content: 'Data Feed as Iterator: feeds implement __iter__ returning self with .next() advancing state'
  rationale: 'Data feeds implement the Iterator pattern where __iter__ returns self and next() advances
    the internal state to the next bar. This enables Python''s for bar in data: loop syntax over historical
    data. The feed maintains internal cursor position, allowing multiple iterators over the same feed
