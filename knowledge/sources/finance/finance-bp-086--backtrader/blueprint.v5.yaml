replaceable_slots:
- id: slot-001
  name: market_data_source
  description: 'Choose based on: (1) data availability for your assets, (2) live vs historical needs,
    (3) trading vs backtesting, (4) budget'
  used_in_stages: []
  options:
  - name: Yahoo Finance CSV
    traits:
    - historical
    - csv
    - free
    - no-auth
    fit_for:
    - Free historical data, backtesting with Yahoo-format data
    not_fit_for:
    - Real-time trading, institutional data needs
  - name: Interactive Brokers
    traits:
    - real-time
    - historical
    - trading
    - requires-broker
    fit_for:
    - Live trading with broker, professional-grade data
    not_fit_for:
    - Users without IB account, non-Windows for full features
  - name: OANDA
    traits:
    - real-time
    - forex
    - cfd
    - trading
    fit_for:
    - Forex/CFD trading, competitive spreads
    not_fit_for:
    - Stock trading, users without OANDA account
  - name: Pandas DataFrame
    traits:
    - in-memory
    - flexible
    - no-network
    fit_for:
    - Custom data sources, processed data, research
    not_fit_for:
    - Large datasets, streaming data
  - name: InfluxDB
    traits:
    - time-series
    - historical
    - database
    fit_for:
    - High-frequency data storage, custom time-series applications
    not_fit_for:
    - Users without InfluxDB setup
  - name: Quandl
    traits:
    - alternative-data
    - premium
    fit_for:
    - Alternative/enhanced financial data
    not_fit_for:
    - Free users, real-time needs
  - name: VisualChart
    traits:
    - real-time
    - technical-analysis
    - windows-only
    fit_for:
    - Professional Windows users with VisualChart subscription
    not_fit_for:
    - Non-Windows users, free-tier users
  default: Yahoo Finance CSV
  _source: worker_resource
- id: slot-002
  name: plotting_backend
  description: backtrader currently supports matplotlib as the only plotting backend
  used_in_stages: []
  options:
  - name: matplotlib
    traits:
    - 2d
    - built-in
    - standard
    fit_for:
    - Standard strategy plotting, publication-quality charts
    not_fit_for:
    - 3D visualizations, interactive web dashboards
  default: matplotlib
  _source: worker_resource
- id: slot-003
  name: technical_analysis
  description: Choose TA-Lib for professional trading systems; use built-in for portability and free usage
  used_in_stages: []
  options:
  - name: Built-in Indicators
    traits:
    - standard-indicators
    - no-external-dep
    fit_for:
    - Basic technical analysis, portability
    not_fit_for:
    - Advanced TA-Lib indicators
  - name: TA-Lib
    traits:
    - 200+ indicators
    - professional
    fit_for:
    - Comprehensive technical analysis, professional trading
    not_fit_for:
    - Users without TA-Lib installation
  default: Built-in Indicators
  _source: worker_resource
- id: slot-004
  name: portfolio_analytics
