  content: 'ADX calculation: 100 * |+DI - -DI| / (+DI + -DI) averaged'
  rationale: Calculate ADX as 100 * |+DI - -DI| / (+DI + -DI), measuring trend strength regardless of
    direction. The boundary is ADX above 25 indicates trending market, below 15 indicates ranging market.
    Requires directional indicators (+DI, -DI) calculated from True Range and directional movement. ADX
    is smoothed (typically 14-period Wilder average) to reduce volatility in readings.
  evidence: backtrader/indicators/directionalmove.py:266(module)
