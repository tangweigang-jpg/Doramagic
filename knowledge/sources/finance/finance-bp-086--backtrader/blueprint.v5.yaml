- id: BD-137
  type: B/BA
  content: 'INTERACTION: preload=True (BD-020) × runonce=True (BD-021) × runonce vectorization disabled
    for exactbars/replay → Critical dependency gap'
  rationale: The vectorized execution path (runonce=True) is silently disabled when exactbars!=False or
    replay mode is enabled. Users expecting vectorization performance gains for complex multi-timeframe
    strategies encounter the slower bar-by-bar path without explicit warning. This hidden dependency causes
    unpredictable performance degradation and longer backtest times for common use cases like intraday
    resampling.
  evidence: BD-020, BD-021, BD-022
  stage: global
  alternative_considered: Explicit warning when vectorization disabled; hybrid execution mode for partial
    vectorization
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-138
  type: BA/M
  content: 'INTERACTION: commission=0.0 default (BD-014) × slippage disabled (BD-051) × FixedSize stake=1
    (BD-035) → Systematic backtest overstatement'
  rationale: Three conservative defaults combine to create persistently optimistic backtests. Zero commission
    (BD-014) + zero slippage (BD-051) + unit stake (BD-035) means strategies appear ~2-5% more profitable
    than realistic execution. This amplification effect is worst for high-frequency strategies where per-trade
    costs compound. Users frequently deploy strategies that look profitable in backtest but lose money
    live due to unmodeled friction.
  evidence: BD-014, BD-051, BD-035
  stage: global
  alternative_considered: Realistic default slippage and commission; warning when running with zero costs
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-139
  type: B/BA
  content: 'INTERACTION: 365-day year for interest (BD-033) × 252-day year for Sharpe (BD-042) → Calendar
    convention inconsistency'
  rationale: Interest on short positions uses 365-day divisor (calendar days) while Sharpe ratio annualization
    uses 252 (trading days). This inconsistency means carry costs and risk-adjusted returns are calculated
    on different time bases, creating systematic misalignment in multi-asset strategies. A strategy with
    significant short holding periods will show artificially better risk-adjusted returns because the
    cost accrual (365 days) appears smaller relative to annualized returns (252 days).
  evidence: BD-033, BD-042
  stage: global
  alternative_considered: Unified day count convention across each calculations; explicit calendar specification
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-140
  type: B/BA
  content: 'INTERACTION: cerebro.p.coo=True (BD-111) × broker.p.coo=False (BD-112) → Contradiction blocks
    cheat-on-open'
  rationale: Cerebro defaults cheat_on_open=True but the broker defaults coo=False, creating a silent
    contradiction. Even when users explicitly enable cheat_on_open at the cerebro level expecting open-bar
    execution, the broker ignores it unless broker.p.coo is also explicitly set. This contradiction wastes
    user configuration effort and creates confusion where identical code produces different results based
    on implicit broker state rather than explicit cerebro settings.
  evidence: BD-111, BD-112
  stage: global
  alternative_considered: Unified default across cerebro and broker; broker auto-reads cerebro.p.cheat_on_open
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-141
  type: B/BA
  content: 'INTERACTION: runonce=True (BD-021) × auto-conversion next→once (BD-008) × preload=True (BD-020)
    → Vectorization silent fallback chain'
  rationale: 'A three-way dependency creates the primary vectorization path: runonce enables vectorized
    execution, auto-conversion provides once() implementations for next()-only indicators, and preload=True
    loads each data for batch processing. Breaking any link silently falls back to bar-by-bar: disabling
    runonce, using indicators with only once() implementations, or streaming data each trigger slower
    execution without user notification. Users cannot easily diagnose why their backtests are unexpectedly
    slow.'
  evidence: BD-021, BD-008, BD-020
  stage: global
  alternative_considered: Explicit logging when vectorization is unavailable; performance profiler for
    backtest runs
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-142
  type: B/BA
  content: 'INTERACTION: ExactBars=False memory model (BD-064) × LineIterator data-lineage (BD-106) ×
    minimum bar calculation → Warmup ambiguity'
  rationale: ExactBars=False keeps each historical data in memory while indicator lookback dependencies
    (BD-106) create implicit minimum warmup requirements. However, the framework does not explicitly calculate
    or communicate the maximum lookback across each active indicators. Users with limited data may encounter
    incomplete indicator values without understanding which indicator requires the most warmup bars. This
    hidden dependency can cause NaN cascade where multiple indicators each fail simultaneously.
  evidence: BD-064, BD-106
  stage: global
  alternative_considered: Automatic warmup bar calculation; explicit warning when data may be insufficient
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-143
  type: BA
  content: 'RISK CASCADE: commission map mismatch (BD-128) → silent zero commission fallback → commission=0.0
    default (BD-014) → slippage disabled (BD-051) → Complete cost omission'
  rationale: This cascade starts when CommissionInfo subclass keys don't match broker's _comminfo_map,
    falling back to default commission=None. Combined with the 0.0 default and disabled slippage, each
    trading costs silently disappear. The cascade is particularly dangerous because each step individually
    appears intentional (default CommissionInfo is None, slippage is a separate feature), but together
    they eliminate every cost category. Live trading will differ from backtest by the sum of each omitted
    costs.
  evidence: BD-128, BD-014, BD-051
  stage: global
  alternative_considered: Commission validation on broker initialization; warning when commission map
    has no matching entry
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-144
  type: BA/DK
  content: 'RISK CASCADE: US equity session defaults (BD-116) × resampler bar2edge alignment (BD-005)
    × data timezone UTC (BD-129) → Multi-timezone corruption'
  rationale: Session defaults of 9:31-16:00 US Eastern combined with bar2edge resampling (aligned to multiples
    of timeframe) creates incorrect boundaries when processing non-US data. If a user loads forex (24h)
    or Asian equity data without resetting session times, the resampler will create artificial gaps aligned
    to US market hours. The UTC normalization in data feeds adds complexity because session times are
    specified in local time but stored as UTC internally, potentially shifting boundary alignment by timezone
    offsets.
  evidence: BD-116, BD-005, BD-129
  stage: global
  alternative_considered: Default to 24-hour session; explicit timezone parameter required for session
    boundaries
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
