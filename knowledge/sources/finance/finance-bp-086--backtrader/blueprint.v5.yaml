  content: 'Data feed timezone consistency: data.datetime returns UTC but feed stores _tz parameter'
  rationale: 'The data feed stores timezone in _tz but data.datetime returns datetime objects converted
    to UTC for consistency across multi-timezone feeds. Users accessing data.datetime[0] get UTC-aware
    datetimes even if the feed is configured for US/Eastern. This invariant ensures timestamp comparison
    works across datas but requires explicit timezone conversion (data._tz.localize) if users need local-time
    display. Boundary: mixing UTC datetimes with naive datetime comparisons causes silent incorrect results.'
  evidence: backtrader/feed.py:739(__init__)
