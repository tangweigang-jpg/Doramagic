  content: 'PPO: 100 * (ema_short - ema_long) / ema_long (percentage price oscillator)'
  rationale: Calculate PPO as 100 * (EMA_short - EMA_long) / EMA_long, expressing moving average differential
    as a percentage. The boundary is that PPO above zero indicates short EMA above long EMA (bullish);
