- id: BD-006
  type: B/BA
  content: pct_embargo=0.0 (no embargo) as default
  rationale: The pct_embargo=0.0 default specifies zero embargo fraction between training and test sets
    in purged K-fold cross-validation. This choice maximizes data utilization by not excluding any observations
    from training based on temporal proximity to test folds. Users must explicitly set non-zero embargo
    if label leakage from temporally adjacent observations is a concern, reflecting a design philosophy
    that makes the conservative choice opt-in rather than default.
