- id: BD-003
  type: B/BA
  content: exp_num_ticks_init=20000 as initial expected ticks per bar
  rationale: The exp_num_ticks_init parameter sets the initial expected tick count per bar at 20000 for
    the imbalance bar creation algorithm. This seed value influences the initial threshold for bar closure
    until sufficient tick data accumulates for empirical estimation. The value of 20000 provides enough
    initial ticks to ensure bars are not prematurely closed during the warm-up period while remaining
    computationally tractable for high-frequency datasets.
  evidence: mlfinlab/data_structures/imbalance_data_structures.py:89(_get_exp_num_ticks)
  stage: data_ingestion
