- id: BD-009
  type: B/BA
  content: scoring=log_loss default for ml_cross_val_score
  rationale: The scoring=log_loss default uses logarithmic loss as the evaluation metric for cross-validated
    machine learning models. Log loss penalizes confident incorrect predictions more heavily than simple
    accuracy, making it appropriate for probabilistic trading signals where calibrated probability estimates
    matter. This metric encourages well-calibrated probability outputs rather than hard classifications,
    aligning with downstream risk management requirements.
  evidence: mlfinlab/cross_validation/cross_validation.py:82-124(ml_cross_val_score)
  stage: global
  alternative_considered: Accuracy was rejected as inappropriate for imbalanced trading label distributions;
