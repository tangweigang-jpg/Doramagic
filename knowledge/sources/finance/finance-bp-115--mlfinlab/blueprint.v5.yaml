- id: BD-004
  type: B/BA
  content: num_prev_bars=3 for E[T] window estimation
  rationale: The num_prev_bars=3 parameter defines the rolling window for estimating the expected time
    between runs (E[T]) in run bars. Using exactly 3 preceding bars balances statistical robustness with
    responsiveness to regime changes in the run generation process. This window size provides enough observations
    for stable E[T] estimates while remaining sensitive enough to detect shifts in market microstructure
    that affect run frequency.
  evidence: mlfinlab/data_structures/run_data_structures.py:95-167(get_ema_*_run_bars)
