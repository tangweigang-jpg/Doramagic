  type: B/BA
  content: n_splits=3 default for K-fold cross-validation
  rationale: The n_splits=3 default determines the number of cross-validation folds for PurgedKFold, balancing
    bias-variance tradeoff in strategy evaluation. With only 3 splits, each test set receives approximately
    33% of available data, providing moderate variance reduction in performance estimates. This conservative
    default acknowledges that financial time series often have limited samples, making aggressive K-fold
    splits computationally expensive and potentially misleading for strategy assessment.
  evidence: mlfinlab/cross_validation/cross_validation.py:40(purgedkfold)
