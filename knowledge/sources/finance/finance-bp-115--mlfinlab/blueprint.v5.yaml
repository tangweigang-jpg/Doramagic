business_decisions:
- id: BD-001
  type: B/DK
  content: 'CSV format requires exactly 3 columns: date_time, price, volume'
  rationale: The _assert_csv function enforces a strict 3-column schema for each ingested tick data, requiring
    date_time, price, and volume in that order. This structural constraint prevents malformed data from
    entering the bar creation pipeline and ensures downstream functions receive consistent input format.
    Any deviation beyond these 3 columns triggers immediate validation failure, protecting data integrity.
  evidence: mlfinlab/data_structures/base_bars.py:110-125(_assert_csv)
  stage: data_ingestion
  alternative_considered: Flexible column count with named columns was rejected due to increased complexity
    in downstream bar creation logic
- id: BD-002
  type: B/BA
  content: expected_imbalance_window=10000 for EMA calculations
  rationale: The expected_imbalance_window parameter of 10000 ticks determines the lookback period for
    computing the exponential moving average of imbalance values in tick-imbalance bars. This window size
    represents a balance between capturing meaningful order flow patterns and filtering high-frequency
    noise. Windows smaller than 10000 risk generating bars from transient imbalances while larger windows
    smooth away genuine structural shifts in the underlying order flow dynamics.
  evidence: mlfinlab/data_structures/imbalance_data_structures.py:94-166(get_ema_*_bars)
  stage: data_ingestion
  alternative_considered: Adaptive window based on volatility was considered but adds complexity without
    clear performance improvement
