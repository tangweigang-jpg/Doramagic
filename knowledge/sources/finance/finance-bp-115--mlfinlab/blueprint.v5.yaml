replaceable_slots:
- id: slot-001
  name: graph_library
  description: NetworkX is most portable and well-documented; igraph offers better performance for very
    large networks; graph-tool offers best single-node performance but difficult installation
  used_in_stages: []
  options:
  - name: NetworkX
    traits:
    - graph-creation
    - mst
    - centrality
    - traversal
    fit_for:
    - Financial networks (MST, PMFG), correlation-based graphs, network analysis
    not_fit_for:
    - Large-scale graph processing, GPU-accelerated graphs
  - name: igraph
    traits:
    - graph-creation
    - mst
    - community-detection
    - faster-algorithms
    fit_for:
    - Large-scale network analysis, community detection
    not_fit_for:
    - Simple visualization, quick prototyping
  - name: graph-tool
    traits:
    - high-performance
    - statistics
    - mst
    - gpu-optional
    fit_for:
    - Very large networks, statistical analysis, performance-critical applications
    not_fit_for:
    - Simple use cases, Windows environments
  default: NetworkX
  _source: worker_resource
- id: slot-002
  name: jit_compiler
  description: Numba provides easiest JIT integration with existing NumPy code; Cython offers more control
    but requires code changes; PyPy is a runtime alternative
  used_in_stages: []
  options:
  - name: Numba
    traits:
    - jit
    - parallel
    - numpy-compatible
    - cuda-optional
    fit_for:
    - Numerical computations, EWMA, bootstrapping loops, entropy calculations
    not_fit_for:
    - Non-numerical code, complex class hierarchies
  - name: Cython
    traits:
    - ahead-of-time
    - c-extensions
    - type-hints
    fit_for:
    - Performance-critical numerical kernels, integration with C/C++ libraries
    not_fit_for:
    - Rapid prototyping, complex Python idioms
  - name: PyPy
    traits:
    - interpreter
    - jit
    - python-compatible
    fit_for:
    - Entire application acceleration, long-running processes
    not_fit_for:
    - NumPy-heavy code (partial support), scientific ecosystem compatibility
  default: Numba
  _source: worker_resource
- id: slot-003
  name: optimal_transport
  description: POT is specialized for optimal transport with entropic regularization; SciPy has basic
    OT but less flexibility; OR-Tools for linear programming approaches
  used_in_stages: []
  options:
  - name: POT
    traits:
    - sinkhorn
    - emd
    - unbalanced
    - scipy-compatible
    fit_for:
    - Copula transport, dependence measures, optimal transport problems
    not_fit_for:
    - Large-scale OT with custom solvers
  - name: SciPy OT
    traits:
    - emd
    - wasserstein
    - basic
    fit_for:
    - Simple 1D/2D optimal transport, basic earth mover's distance
    not_fit_for:
    - Complex OT problems, unbalanced transport, sinkhorn regularization
  - name: Google OR-Tools
    traits:
    - lp-milp
    - transport-problem
    - high-performance
    fit_for:
    - Transportation problems, large-scale linear programming
    not_fit_for:
    - Regularized OT (sinkhorn), entropic methods
  default: POT
  _source: worker_resource
- id: slot-004
  name: visualization_backend
  description: Matplotlib is most mature for static plots; Plotly integrates with Dash for web apps; Bokeh
    for streaming/realtime
  used_in_stages: []
  options:
  - name: Matplotlib
    traits:
    - static-plots
    - publication-quality
    - pandas-integration
    fit_for:
    - Feature importance plots, statistical visualizations, publication figures
    not_fit_for:
    - Interactive dashboards, web deployment
  - name: Plotly
    traits:
    - interactive
    - web
    - dash-integration
    fit_for:
    - Interactive charts, web-based dashboards
    not_fit_for:
    - Publication-quality static figures
  - name: Bokeh
    traits:
    - interactive
    - web
    - streaming
    fit_for:
    - Interactive visualizations, data streaming applications
    not_fit_for:
    - Simple static plots
  default: Matplotlib
  _source: worker_resource
- id: slot-005
  name: dashboard_framework
  description: Dash is the current implementation; Streamlit is simpler for rapid development; Panel for
    more complex hvPlot integration
  used_in_stages: []
  options:
  - name: Dash
    traits:
    - flask-based
    - plotly
    - react-components
    fit_for:
    - Network visualizations, interactive graph exploration
    not_fit_for:
    - Simple applications, non-Python frontends
  - name: Streamlit
    traits:
    - simple
    - react-components
    - data-apps
    fit_for:
    - Quick data apps, ML model deployment
    not_fit_for:
    - Complex custom layouts, large-scale production apps
  - name: Panel
    traits:
    - holoviz
    - bokeh
    - plotly
    fit_for:
    - Complex dashboards, cross-library visualization
    not_fit_for:
    - Simple use cases
  default: Dash
  _source: worker_resource
- id: slot-006
  name: parallel_backend
  description: stdlib multiprocessing is most portable; Joblib integrates well with sklearn; Dask/Ray
    for distributed/large-scale processing
  used_in_stages: []
  options:
  - name: Python multiprocessing
    traits:
    - process-based
    - cross-platform
    - memory-isolated
    fit_for:
    - CPU-bound tasks, process isolation, large datasets
    not_fit_for:
    - I/O-bound tasks, lightweight parallelism
  - name: Joblib
    traits:
    - easy-parallel
    - caching
    - sklearn-integration
    fit_for:
    - Scikit-learn workflows, easy parallelization, caching
    not_fit_for:
    - Very large scale, custom multiprocessing needs
  - name: Dask
    traits:
    - distributed
    - out-of-core
    - dataframes
    fit_for:
    - Large datasets, distributed computing, out-of-core processing
    not_fit_for:
    - Simple parallel tasks, small datasets
  - name: Ray
    traits:
    - distributed
    - actors
    - reinforcement-learning
    fit_for:
    - Distributed computing, RL training, hyperparameter tuning
    not_fit_for:
    - Simple parallel tasks
  default: Python multiprocessing
  _source: worker_resource
- id: slot-007
  name: data_output_format
  description: CSV is most compatible; Parquet for analytical workloads; HDF5 for large time series; Feather
    for Python/R exchange
  used_in_stages: []
  options:
  - name: CSV
    traits:
    - human-readable
    - interoperable
    - slow
    fit_for:
    - Universal compatibility, debugging, small-medium datasets
    not_fit_for:
    - Large datasets, performance-critical applications
  - name: Parquet
    traits:
    - columnar
    - compressed
    - fast-read
    fit_for:
    - Large datasets, analytical workloads, cloud storage
    not_fit_for:
    - Small datasets, human readability
  - name: HDF5
    traits:
    - hierarchical
    - large-files
    - chunked
    fit_for:
    - Large datasets, time series, random access
    not_fit_for:
    - Cloud storage, simple workflows
  - name: Feather
    traits:
    - fast
    - apache-arrow
    - interchange
    fit_for:
    - Fast R/Python interchange, moderate datasets
    not_fit_for:
    - Very large datasets, long-term storage
  default: CSV
  _source: worker_resource
