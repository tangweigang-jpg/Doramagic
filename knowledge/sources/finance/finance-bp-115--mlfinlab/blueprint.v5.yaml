# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-115
name: MlFinLab
sop_version: '3.6'
source:
  projects:
  - mlfinlab
  commit_hash: 79dcc7120ec84110578f75b025a75850eb72fc73
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Machine learning-based trading strategy development and backtesting
  description: MlFinLab is a comprehensive Python library for financial machine learning that implements
    the methodologies from Advances in Financial Machine Learning (AFML). It covers the entire ML strategy
    pipeline from raw tick data ingestion through bar construction, event labeling, feature engineering,
    model training with sequential bootstrap, bet sizing, and statistical backtesting with multiplicity
    correction.
  prerequisites: Users should have familiarity with financial concepts (triple barriers, microstructure,
    drawdowns), Python scientific computing (pandas, numpy), and basic machine learning. Understanding
    of the AFML textbook is helpful but not required.
  not_suitable_for: Real-time production trading systems (library is research-focused), low-latency execution
    environments, non-financial time series analysis, or users seeking pre-trained models (library provides
    algorithms, not predictions).
stages:
- id: data_ingestion
  name: Data Ingestion & Bar Construction
  order: 1
  responsibility: Transform raw tick data from CSV files or DataFrames into structured financial bars
    with superior statistical properties compared to fixed-time sampling, using information-driven approaches
    like tick imbalance and run bars
  interface:
    inputs:
    - CSV file path or DataFrame with columns [date_time, price, volume]
    - batch_size parameter (default 2e7)
    outputs:
    - DataFrame with columns [date_time, open, high, low, close, volume, cum_buy_volume, cum_ticks, cum_dollar_value]
  required_methods:
  - name: MicrostructuralFeaturesGenerator.generate_features
    description: Generates inter-bar microstructural features including Kyle's lambda, Amihud illiquidity
      measure, entropy metrics, and volume-weighted average prices from constructed bars
    evidence: mlfinlab/microstructural_features/feature_generator.py:19(__init__)
  key_behaviors:
  - behavior: Batch processing for memory efficiency
    description: Processes data in 20M row batches by default, enabling multi-GB tick files to be processed
      on commodity hardware without memory exhaustion
    evidence: mlfinlab/data_structures/base_bars.py:48(batch_run)
  - behavior: Information-driven bar formation
    description: Bars form based on accumulated information (dollar value, volume, tick count, or imbalance)
      rather than fixed time intervals, capturing more uniform information arrival
    evidence: mlfinlab/data_structures/base_bars.py:93(_extract_bars)
  - behavior: Tick rule inference
    description: Infers trade direction from price changes when not explicitly given, enabling proper
      buy/sell volume accumulation for tick bars
    evidence: mlfinlab/data_structures/base_bars.py:152(_apply_tick_rule)
  replaceable_points:
  - name: Bar threshold calculation
    description: Method for computing expected number of ticks per bar, which determines when a bar is
      closed
    options:
    - name: EMA window average
      traits:
      - adaptive
      - non-stationarity aware
      - smooth transitions
      fit_for:
      - High-frequency data with varying volatility
      - Regime-changing markets
      - Long historical datasets
      not_fit_for:
      - Short datasets
      - Stationary data
      - Fixed capacity constraints
    - name: Constant value
      traits:
      - static
      - predictable memory usage
      - simple to configure
      fit_for:
      - Predictable bar counts
      - Resource-constrained environments
      - Simple backtests
      not_fit_for:
      - Variable microstructure
      - High-frequency trading research
    default: EMA window average
  - name: Imbalance metric
    description: What fundamental quantity to measure imbalance on when forming information-driven bars
    options:
    - name: dollar value
      traits:
      - volatility-invariant
      - standard in literature
      - currency-neutral
      fit_for:
      - Cross-asset studies
      - Volatile instruments
      - Multi-currency datasets
      not_fit_for:
      - Fixed-position sizing strategies
      - Volume-weighted strategies
    - name: volume
      traits:
      - intuitive
      - directly actionable
      - share-count based
      fit_for:
      - Position sizing in shares
      - Liquidity analysis
      - Retail trading contexts
      not_fit_for:
      - Cross-asset normalization
      - Highly liquid thin markets
    - name: tick count
      traits:
      - simplest
      - least preprocessing
      - equal-weight trades
      fit_for:
      - Quick prototyping
      - Uneven tick sizes
      - Data quality concerns
      not_fit_for:
      - Uneven trade sizes distort information
      - Large vs small trades treated equally
    default: dollar value
  - name: Bar type
    description: Algorithm for determining when bars complete
    options:
    - name: Time bars
      traits:
      - fixed intervals
      - simplest
      - synchronous across assets
      fit_for:
      - Synchronous multi-asset analysis
      - Simple baseline comparison
      - Non-high-frequency data
      not_fit_for:
      - Irregular market hours
      - Microstructure research
      - Information-driven features
    - name: Imbalance bars (EMA/Const)
      traits:
      - information-driven
      - microstructure-aware
      - stationary returns
      fit_for:
      - ML feature generation
      - High-frequency research
      - Liquidity-adjusted analysis
      not_fit_for:
      - Low-frequency data
      - Simple implementations
    - name: Run bars
      traits:
      - directional momentum
      - order flow clustering
      - trend detection
      fit_for:
      - Trend-following strategies
      - Order flow imbalance
      - Regime detection
      not_fit_for:
      - Mean-reversion strategies
      - Low-tick assets
    default: Time bars
  design_decisions:
  - 'batch_size=2e7 default in BaseBars.__init__ - balances memory usage vs I/O overhead for large tick
    datasets; evidence: mlfinlab/data_structures/base_bars.py:37(__init__)'
  - 'EWMA for expected imbalance calculation - adapts to non-stationarity in order flow; span parameter
    controls adaptation speed; evidence: mlfinlab/data_structures/base_bars.py:216(_get_expected_imbalance)'
  - 'Tick rule using previous price direction - infers trade direction when not explicitly given; standard
    in TAQ data preprocessing; evidence: mlfinlab/data_structures/base_bars.py:152(_apply_tick_rule)'
  - 'Abstract _extract_bars method per bar type - template method pattern allows TimeBars, ImbalanceBars,
    RunBars to share infrastructure; evidence: mlfinlab/data_structures/base_bars.py:93(_extract_bars)'
  - 'Factory functions wrap class constructors - hides class complexity from users; enables easy parameter
    defaults; evidence: mlfinlab/data_structures/imbalance_data_structures.py:94(get_ema_dollar_imbalance_bars)'
  acceptance_hints:
  - 'Output bars contain exactly 9 columns: date_time, open, high, low, close, volume, cum_buy_volume,
    cum_ticks, cum_dollar_value'
  - Bar count is approximately uniform across information measures (not time) for imbalance/run bars
  - No NaN values in OHLC columns
  - Close >= Low and Close <= High always true
  - Batch processing completes without memory errors on datasets > 100M rows
- id: event_filtering
  name: Event Filtering & Sampling
  order: 2
  responsibility: Filter raw time series to identify significant events that seed triple barriers, reducing
    noise from market microstructure and focusing on mean-shifting or outlier observations
  interface:
    inputs:
    - Raw price series (pd.Series)
    - threshold (fixed value or pd.Series for dynamic)
    outputs:
    - Event timestamps (DateTimeIndex or list of timestamps)
  required_methods:
  - name: cusum_filter
    description: Detects mean-shifting events using cumulative sum approach, returning timestamps where
      cumulative deviation exceeds symmetric thresholds in either direction
    evidence: mlfinlab/filters/filters.py:12(cusum_filter)
  - name: z_score_filter
    description: Detects outlier events using rolling z-score methodology, returning timestamps when absolute
      score exceeds threshold
    evidence: mlfinlab/filters/filters.py:42(z_score_filter)
  key_behaviors:
  - behavior: Symmetric threshold detection
    description: CUSUM filter uses symmetric positive and negative thresholds, detecting both upside and
      downside divergences equally
    evidence: mlfinlab/filters/filters.py:12(cusum_filter)
  - behavior: Dynamic threshold support
    description: Threshold can be a pd.Series enabling volatility-adjusted or regime-aware filtering based
      on rolling volatility estimates
    evidence: mlfinlab/filters/filters.py:34(threshold)
  replaceable_points:
  - name: Filter type
    description: Method to identify event timestamps from price series
    options:
    - name: CUSUM
      traits:
      - mean-reversion aware
      - symmetric
      - cumulative memory
      fit_for:
      - Mean-reversion strategies
      - Quiet markets with sudden moves
      - Long-term trend detection
      not_fit_for:
      - High-frequency noise
      - Strong trending markets
      - Outlier detection only
    - name: z-score
      traits:
      - volatility-normalized
      - rolling window
      - outlier-focused
      fit_for:
      - Volatility-adaptive filtering
      - Outlier-based events
      - Short-term strategies
      not_fit_for:
      - Regime-agnostic filtering
      - Cumulative drift detection
    default: CUSUM
  design_decisions:
  - 'CUSUM filter uses symmetric thresholds - detects both upside and downside divergences equally; suitable
    for mean-reversion strategies; evidence: mlfinlab/filters/filters.py:12(cusum_filter)'
  - 'Supports both fixed and dynamic thresholds - allows adaptive filtering based on volatility; pd.Series
    threshold enables regime-aware filtering; evidence: mlfinlab/filters/filters.py:34(threshold)'
  acceptance_hints:
  - Output is sorted DateTimeIndex with no duplicate timestamps
  - At least one event detected in trending/volatile periods
  - No events detected in flat/unchanged price periods
  - Events align with meaningful price moves, not microstructure noise
- id: labeling
  name: Triple Barrier Labeling & Meta-Labeling
  order: 3
  responsibility: Label financial data using the triple-barrier methodology (profit taking, stop loss,
    vertical time barriers) to create machine learning-compatible training labels with optional meta-labeling
    for separating directional prediction from execution decisions
  interface:
    inputs:
    - close prices Series
    - t_events (DateTimeIndex)
    - pt_sl levels [profit_take, stop_loss]
    - vertical_barrier_times (optional)
    - side_prediction (optional)
    outputs:
    - 'events DataFrame with columns: t1 (barrier touch time), bin (label), side, pt, sl'
  required_methods:
  - name: apply_pt_sl_on_t1
    description: Applies triple barriers to compute the first barrier touched and its timestamp for each
      event, enabling labeling of when and what type of barrier resolution occurs
    evidence: mlfinlab/labeling/labeling.py:13(apply_pt_sl_on_t1)
  - name: get_events
    description: Orchestrates the meta-labeling process by coordinating triple barriers with primary model
      side predictions to produce execution decisions
    evidence: mlfinlab/labeling/labeling.py:60(get_events)
  - name: get_bins
    description: 'Computes final labels from barrier outcomes: returns {-1, 0, 1} without side prediction
      or {0, 1} with meta-labeling for binary execution decisions'
    evidence: mlfinlab/labeling/labeling.py:116(get_bins)
  - name: add_vertical_barrier
    description: Creates time-based barriers for time-constrained bets, adding a maximum holding period
      to the triple barrier system
    evidence: mlfinlab/labeling/labeling.py:36(add_vertical_barrier)
  - name: drop_labels
    description: Removes rare labels below minimum percentage threshold using recursive elimination to
      prevent ML models from overfitting to rare patterns
    evidence: mlfinlab/labeling/labeling.py:145(drop_labels)
  key_behaviors:
  - behavior: Meta-labeling binary conversion
    description: When side_prediction is provided, bin values change from {-1, 0, 1} to {0, 1}, fundamentally
      altering pipeline behavior for binary classification
    evidence: mlfinlab/labeling/labeling.py:116-141(get_bins)
  - behavior: Vertical barrier disableability
    description: Vertical barriers can be disabled via pt_sl=[0, 0], enabling pure horizontal barrier
      strategies consistent with AFML convention
    evidence: mlfinlab/labeling/labeling.py:74(pt_sl)
  - behavior: Rare label elimination
    description: Labels occurring in less than 5% of samples are recursively eliminated, ensuring label
      distribution meets minimum occurrence thresholds
    evidence: mlfinlab/labeling/labeling.py:145(drop_labels), mlfinlab/labeling/labeling.py:152(min_pct=.05)
  replaceable_points:
  - name: Vertical barrier
    description: Time limit for bet resolution controlling maximum holding period
    options:
    - name: disabled (False)
      traits:
      - no time constraint
      - pure directional
      - AFML convention
      fit_for:
      - Long-term strategies
      - Pure directional prediction
      - Swing trading
      not_fit_for:
      - Time-sensitive strategies
      - Rebalancing constraints
      - Overnight position limits
    - name: num_days/hours/minutes/seconds
      traits:
      - time-bounded
      - rebalance-friendly
      - regime-aware
      fit_for:
      - Portfolio constraints
      - Risk management
      - High-frequency strategies
      not_fit_for:
      - Long-term holds
      - Position-independent labels
    default: disabled (False)
  - name: Labeling approach
    description: How to convert barrier outcomes to machine learning labels
    options:
    - name: price action (-1,0,1)
      traits:
      - three-class
      - directional
      - includes no-touch
      fit_for:
      - Standard ML classification
      - Directional strategies
      - Pure price prediction
      not_fit_for:
      - Execution-only models
      - Binary constraints
    - name: meta-labeling (0,1)
      traits:
      - binary
      - two-stage
      - execution-focused
      fit_for:
      - Primary model refinement
      - False positive reduction
      - Risk management layers
      not_fit_for:
      - Single-stage prediction
      - Direct directional signals
    default: price action
  design_decisions:
  - 'Vertical barriers can be disabled via pt_sl=[0, 0] - enables pure horizontal barrier strategies;
    consistent with AFML book convention; evidence: mlfinlab/labeling/labeling.py:74(pt_sl)'
  - 'Meta-labeling uses side_prediction from primary model - separates directional prediction (primary)
    from execution decision (secondary); reduces false positives; evidence: mlfinlab/labeling/labeling.py:82(side_prediction)'
  - 'drop_labels removes rare labels below min_pct threshold - recursive elimination prevents ML models
    from overfitting to rare patterns; evidence: mlfinlab/labeling/labeling.py:145(drop_labels)'
  acceptance_hints:
  - events DataFrame index equals t_events input
  - t1 (barrier touch time) is always >= event timestamp
  - bin values are {-1, 0, 1} without side_prediction, {0, 1} with side_prediction
  - No NaN values in output columns
  - Label distribution meets minimum percentage threshold after drop_labels
- id: sample_weighting
  name: Sample Weighting & Uniqueness
  order: 4
  responsibility: Compute sample weights based on return attribution and time decay, accounting for label
    concurrency and event overlap to prevent overfitting while emphasizing informative samples
  interface:
    inputs:
    - triple_barrier_events DataFrame (with t1)
    - close_series (pd.Series)
    - decay parameter (optional)
    outputs:
    - pd.Series of sample weights aligned to event indices
  required_methods:
  - name: get_weights_by_return
    description: Derives sample weights from absolute return divided by number of concurrent events, emphasizing
      high-impact events while down-weighting crowded positions
    evidence: mlfinlab/sample_weights/attribution.py:31(get_weights_by_return)
  - name: get_weights_by_time_decay
    description: Applies time decay to sample weights with configurable decay factor, deemphasizing older
      observations
    evidence: mlfinlab/sample_weights/attribution.py:49(get_weights_by_time_decay)
  - name: seq_bootstrap
    description: Samples observations with probability proportional to label uniqueness using indicator
      matrix, avoiding over-representation of overlapping events through accumulated concurrency tracking
    evidence: mlfinlab/sampling/bootstrapping.py:70(seq_bootstrap)
  - name: get_ind_matrix
    description: Builds binary indicator matrix showing which price bars influence each label, capturing
      information lookahead inherent in triple barrier events
    evidence: mlfinlab/sampling/bootstrapping.py:10(get_ind_matrix)
  key_behaviors:
  - behavior: samples_info_sets contract enforcement
    description: Index must contain event start times and values must contain event end times (t1), critical
      for purged CV and sequential bootstrap; wrong orientation causes information leakage
    evidence: mlfinlab/cross_validation/cross_validation.py:31(samples_info_sets.index)
  - behavior: Sequential bootstrap accumulation
    description: Uses accumulated concurrency tracking to avoid over-representation of overlapping events;
      JIT-compiled for performance
    evidence: mlfinlab/sampling/bootstrapping.py:57(_bootstrap_loop_run)
  - behavior: Multi-asset weight decay difference
    description: decay=0.5 default for stacked multi-asset weights vs decay=1 (no decay) in single-asset
      version, creating inconsistent default behavior
    evidence: mlfinlab/sample_weights/attribution.py:49(get_weights_by_time_decay), mlfinlab/sample_weights/attribution.py:86(get_stacked_weights_time_decay)
  replaceable_points:
  - name: Weighting scheme
    description: Method for computing sample importance weights in training
    options:
    - name: return-based
      traits:
      - impact-adjusted
      - concurrency-aware
      - standard in AFML
      fit_for:
      - Standard ML training
      - Return-attribution strategies
      - Balanced datasets
      not_fit_for:
      - Equal-weight importance
      - Time-sensitive decay
    - name: time-decay
      traits:
      - recency-weighted
      - adaptive
      - regime-aware
      fit_for:
      - Non-stationary markets
      - Recent data emphasis
      - Adaptive strategies
      not_fit_for:
      - Stationary markets
      - Historical pattern importance
    - name: sequential bootstrap
      traits:
      - uniqueness-weighted
      - overlap-aware
      - JIT-optimized
      fit_for:
      - Overlapping labels
      - Triple barrier events
      - Bagging with information leakage concerns
      not_fit_for:
      - Independent samples
      - Simple cross-validation
    default: return-based
  design_decisions:
  - 'decay=0.5 default for time decay - linear decay ensures recent observations dominate while maintaining
    positive weights for all; evidence: mlfinlab/sample_weights/attribution.py:86(decay)'
  - 'Sequential bootstrap uses accumulated concurrency - avoids over-representation of overlapping events;
    numba JIT for performance; evidence: mlfinlab/sampling/bootstrapping.py:57(_bootstrap_loop_run)'
  - 'Indicator matrix links price bars to labels via timestamps - captures information lookahead inherent
    in triple barrier events; essential for proper bootstrapping; evidence: mlfinlab/sampling/bootstrapping.py:21(samples_info_sets)'
  acceptance_hints:
  - Sample weights sum to approximately n_samples (normalized)
  - Higher weights for high-return events, lower for crowded concurrent positions
  - Sequential bootstrap produces different sample distributions on each run
  - No negative weights in output
  - Weights aligned to event indices match input events DataFrame
- id: feature_engineering
  name: Feature Engineering & Importance
  order: 5
  responsibility: Transform time series into machine learning features via fractional differentiation
    for stationarity while preserving memory, and compute feature importance with purged cross-validation
    to prevent information leakage
  interface:
    inputs:
    - Time series (pd.Series)
    - feature DataFrame (X)
    - d (fractional differencing order)
    - window parameters
    outputs:
    - Fractionally differentiated series
    - importance DataFrames (MDI/MDA)
  required_methods:
  - name: FractionalDifferentiation.frac_diff_ffd
    description: Computes fractional difference using fixed window approach to achieve stationarity while
      retaining memory, avoiding NaN values at series start
    evidence: mlfinlab/features/fracdiff.py:101(frac_diff_ffd)
  - name: mean_decrease_impurity
    description: Tree-based feature importance (MDI) that measures impurity decrease from splits, biased
      toward high-cardinality features
    evidence: mlfinlab/feature_importance/importance.py:27(mean_decrease_impurity)
  - name: mean_decrease_accuracy
    description: Permutation-based importance using purged cross-validation (MDA), respecting temporal
      information boundaries
    evidence: mlfinlab/feature_importance/importance.py:126(mean_decrease_accuracy)
  - name: get_orthogonal_features
    description: PCA compression to reduce multicollinearity among correlated features while preserving
      variance
    evidence: mlfinlab/feature_importance/orthogonal.py:38(get_orthogonal_features)
  key_behaviors:
  - behavior: FFD for bounded series
    description: Fixed Fractional Differentiation uses fixed window weights avoiding NaN at series start;
      thresh=1e-5 default removes negligible weights
    evidence: mlfinlab/features/fracdiff.py:101(frac_diff_ffd)
  - behavior: Purged CV in MDA
    description: Standard permutation importance ignores temporal structure; purged CV respects information
      boundaries preventing leakage
    evidence: mlfinlab/feature_importance/importance.py:74(_mean_decrease_accuracy_round)
  - behavior: Clustered subsamples
    description: Feature groups are clustered to prevent over-counting importance of correlated feature
      sets
    evidence: mlfinlab/feature_importance/importance.py:27(clustered_subsets)
  replaceable_points:
  - name: Fractional differentiation method
    description: Algorithm for computing fractional difference to achieve stationarity
    options:
    - name: standard (frac_diff)
      traits:
      - theoretically exact
      - expanding window
      - cumulative
      fit_for:
      - Theoretical precision
      - Short series
      - Academic validation
      not_fit_for:
      - Long series (memory growth)
      - Real-time computation
    - name: fixed-window (frac_diff_ffd)
      traits:
      - memory-bounded
      - NaN-free
      - practical
      fit_for:
      - Long series
      - Production systems
      - Memory-constrained environments
      not_fit_for:
      - Short series
      - Exact theoretical values
    default: frac_diff_ffd
  - name: Importance metric
    description: Method for measuring feature importance in predictive models
    options:
    - name: MDI
      traits:
      - tree-based
      - fast
      - in-sample
      - biased
      fit_for:
      - Quick feature selection
      - Tree-based models
      - Baseline screening
      not_fit_for:
      - Linear models
      - Correlation-robust importance
      - Leakage-sensitive contexts
    - name: MDA
      traits:
      - permutation-based
      - purged CV
      - model-agnostic
      fit_for:
      - Robust feature selection
      - Non-tree models
      - Temporal data
      not_fit_for:
      - Large feature sets (expensive)
      - In-sample validation
    - name: orthogonal PCA
      traits:
      - decorrelated
      - dimensionality reduction
      - variance-preserving
      fit_for:
      - Multicollinear features
      - Dimensionality reduction
      - Linear model compatibility
      not_fit_for:
      - Interpretability requirements
      - Sparse feature spaces
    default: MDA
  design_decisions:
  - 'FFD (Fixed Fractional Differentiation) for bounded series - FFD uses fixed window weights avoiding
    NaN at series start; thresh=1e-5 default removes negligible weights; evidence: mlfinlab/features/fracdiff.py:101(frac_diff_ffd)'
  - 'Purged CV in MDA prevents leakage - standard permutation importance ignores temporal structure; purged
    CV respects information boundaries; evidence: mlfinlab/feature_importance/importance.py:74(_mean_decrease_accuracy_round)'
  - 'Clustered subsamples for correlated features - prevents over-counting importance of correlated feature
    groups; evidence: mlfinlab/feature_importance/importance.py:27(clustered_subsets)'
  acceptance_hints:
  - Fractionally differentiated series achieves stationarity (ADF test p-value < 0.05)
  - No NaN values in output features
  - Feature importance values are non-negative
  - Purged CV respects t1 boundaries (no leakage between train/test)
- id: model_training
  name: Model Training with Sequential Bootstrap
  order: 6
  responsibility: Train ensemble models using sequential bootstrapping to handle overlapping labels from
    triple barriers, with purged cross-validation for unbiased evaluation and sklearn compatibility
  interface:
    inputs:
    - X (features DataFrame)
    - y (labels Series)
    - sample_weight (optional)
    - samples_info_sets (dict with start/end times)
    - price_bars (pd.DataFrame)
    outputs:
    - Trained classifier/regressor with OOB score
    - cross-validation scores
  required_methods:
  - name: SequentiallyBootstrappedBaggingClassifier.fit
    description: Fits bagging classifier using sequential bootstrap for overlapping labels, inheriting
      sklearn BaseBagging interface for parallel estimation and warm start
    evidence: mlfinlab/ensemble/sb_bagging.py:145(SequentiallyBootstrappedBaggingClassifier)
  - name: ml_cross_val_score
    description: Evaluates classifiers with sample weights using purged cross-validation, returning scores
      with proper temporal handling
    evidence: mlfinlab/cross_validation/cross_validation.py:82(ml_cross_val_score)
  - name: PurgedKFold.split
    description: Generates train/test splits while purging embargoed observations to prevent information
      leakage between folds
    evidence: mlfinlab/cross_validation/cross_validation.py:64(PurgedKFold.split)
  - name: CombinatorialPurgedKFold.split
    description: Generates combinatorial test paths for more efficient backtest path utilization than
      standard walk-forward testing
    evidence: mlfinlab/cross_validation/combinatorial.py:80(CombinatorialPurgedKFold.split)
  key_behaviors:
  - behavior: sklearn inheritance pattern
    description: Inherits sklearn BaseBagging for compatibility with pipelines, grid search, and model
      selection utilities
    evidence: mlfinlab/ensemble/sb_bagging.py:60(SequentiallyBootstrappedBaseBagging)
  - behavior: Bootstrap=True hardcoded
    description: Sequential bootstrapping hardcodes bootstrap=True despite sklearn default=False, changing
      sklearn contract and preventing bootstrap disablement
    evidence: mlfinlab/ensemble/sb_bagging.py:82(bootstrap=True)
  - behavior: Triple inheritance complexity
    description: SequentiallyBootstrappedBaseBagaging inherits from BaseBagging which interacts with BaggingClassifier
      through MI, requiring careful override handling
    evidence: mlfinlab/ensemble/sb_bagging.py:145-146(class definition)
  replaceable_points:
  - name: Cross-validation generator
    description: Method for splitting data respecting temporal structure and purging embargoed observations
    options:
    - name: PurgedKFold
      traits:
      - embargo support
      - temporal splits
      - sklearn-compatible
      fit_for:
      - Standard temporal validation
      - Simple walk-forward
      - Most use cases
      not_fit_for:
      - Multiple backtest paths
      - Efficient path utilization
    - name: CombinatorialPurgedKFold
      traits:
      - combinatorial test paths
      - efficient
      - multiple windows
      fit_for:
      - Efficient backtesting
      - Multiple lookback periods
      - Walk-forward optimization
      not_fit_for:
      - Simple single-path validation
      - Memory-constrained environments
    - name: StackedPurgedKFold
      traits:
      - multi-asset
      - dict interface
      - stacked operations
      fit_for:
      - Multi-asset strategies
      - Portfolio optimization
      - Cross-sectional features
      not_fit_for:
      - Single-asset workflows
      - Simple validation
    default: PurgedKFold
  design_decisions:
  - 'Inherits sklearn BaseBagging for compatibility - leverages sklearn''s parallel estimator building,
    OOB scoring, and warm start; minimal override; evidence: mlfinlab/ensemble/sb_bagging.py:60(SequentiallyBootstrappedBaseBagging)'
  - 'pct_embargo=0.0 default in PurgedKFold - conservative default; user must explicitly add embargo buffer
    for safety; evidence: mlfinlab/cross_validation/cross_validation.py:51(pct_embargo)'
  - 'CPCV generates combinatorial test paths - more efficient than walk-forward testing; leverages overlapping
    test information; evidence: mlfinlab/cross_validation/combinatorial.py:32(CombinatorialPurgedKFold)'
  - 'n_splits=3 default in PurgedKFold vs standard sklearn n_splits=5 - fewer CV folds affects validation
    granularity; evidence: mlfinlab/cross_validation/cross_validation.py:48-49(__init__)'
  acceptance_hints:
  - Model trains without errors on properly formatted inputs
  - OOB score is computed (bootstrap=True enables this)
  - PurgedKFold respects samples_info_sets boundaries
  - Cross-validation scores show temporal stability
  - Sequential bootstrap produces different OOB sets on each run
- id: bet_sizing
  name: Bet Sizing
  order: 7
  responsibility: Convert machine learning predictions into position sizes based on predicted probability,
    budget constraints, or market microstructure using mixture of normals fitting for reserve-based sizing
  interface:
    inputs:
    - events DataFrame (with t1)
    - prob predictions (array)
    - sides (array)
    - max_pos (int)
    outputs:
    - bet_size series
    - target position
    - limit prices (optional)
  required_methods:
  - name: M2N.fit
    description: Fits Mixture of 2 Normals via EF3M algorithm for bet sizing reserve calculation, JIT-compiled
      for real-time performance
    evidence: mlfinlab/bet_sizing/ef3m.py:16(M2N)
  - name: bet_size_probability
    description: Sizes bet from predicted probability with support for averaging active bets, converting
      probabilities into position sizes
    evidence: mlfinlab/bet_sizing/bet_sizing.py:15(bet_size_probability)
  - name: bet_size_dynamic
    description: Dynamic sizing based on price divergence using sigmoid or power function to determine
      position adjustments
    evidence: mlfinlab/bet_sizing/bet_sizing.py:36(bet_size_dynamic)
  - name: bet_size_reserve
    description: Fits M2N to concurrent bet distribution for reserve-based sizing, ensuring budget constraints
      are respected
    evidence: mlfinlab/bet_sizing/bet_sizing.py:76(bet_size_reserve)
  key_behaviors:
  - behavior: Strategy pattern for sizing functions
    description: Both sigmoid and power algorithms exist as selectable options; changing default affects
      sizing behavior significantly
    evidence: mlfinlab/bet_sizing/bet_sizing.py:50(func)
  - behavior: Side prediction convention
    description: Negative=short, positive=long, None=no meta-labeling; must align with get_bins output
      for consistent behavior
    evidence: mlfinlab/bet_sizing/bet_sizing.py:68(sides)
  - behavior: avg_active_signals dependency
    description: Bet sizing requires triple barrier t1 expiry column for concurrent bet averaging, creating
      dependency on labeling stage
    evidence: mlfinlab/bet_sizing/bet_sizing.py:15-33(bet_size_probability)
  replaceable_points:
  - name: Sizing function
    description: Mathematical form for bet size curve mapping probability to position
    options:
    - name: sigmoid
      traits:
      - smooth
      - bounded
      - conservative
      fit_for:
      - Stable markets
      - Risk-averse strategies
      - Gradual position building
      not_fit_for:
      - Aggressive sizing
      - High conviction signals
      - Momentum strategies
    - name: power
      traits:
      - accelerating
      - concentrated
      - aggressive
      fit_for:
      - High conviction
      - Momentum strategies
      - Concentrated bets
      not_fit_for:
      - Risk management
      - Diversified sizing
      - Stable returns
    default: sigmoid
  design_decisions:
  - 'EF3M uses numba JIT for performance - fitting M2N is computationally intensive; JIT compilation critical
    for real-time use; evidence: mlfinlab/bet_sizing/ef3m.py:162(iter_4_jit)'
  - 'step_size=0.0 means no discretization - continuous sizing by default; user can discretize to prevent
    overtrading; evidence: mlfinlab/bet_sizing/bet_sizing.py:27(step_size)'
  - 'Sigmoid default in bet_size_dynamic - sigmoid provides smooth, bounded position changes; power function
    for aggressive sizing; evidence: mlfinlab/bet_sizing/bet_sizing.py:50(func)'
  acceptance_hints:
  - Bet sizes respect max_pos constraint
  - Output bet_size values are bounded between 0 and 1 (or max_pos)
  - Concurrent bets are properly averaged when avg_active_signals is used
  - Side prediction values match labeling output convention
- id: backtesting
  name: Backtesting & Statistics
  order: 8
  responsibility: Evaluate trading strategies with multiplicity-corrected Sharpe ratios, drawdown analysis,
    and minimum track record length estimation to prevent backtest overfitting
  interface:
    inputs:
    - returns series (pd.Series)
    - target_positions (pd.DataFrame)
    - strategy parameters
    outputs:
    - Sharpe ratios (adjusted)
    - drawdown statistics
    - minimum track record length
    - p-values
  required_methods:
  - name: CampbellBacktesting.haircut_sharpe_ratios
    description: Implements haircut Sharpe ratios with multiple testing correction (Bonferroni, Holm,
      BHY) for strategy evaluation
    evidence: mlfinlab/backtest_statistics/backtests.py:174(haircut_sharpe_ratios)
  - name: sharpe_ratio
    description: Computes annualized Sharpe ratio with configurable sampling frequency, assuming 252 trading
      days by default
    evidence: mlfinlab/backtest_statistics/statistics.py:122(sharpe_ratio)
  - name: probabilistic_sharpe_ratio
    description: Calculates probability that strategy Sharpe ratio exceeds benchmark SR, accounting for
      sampling uncertainty
    evidence: mlfinlab/backtest_statistics/statistics.py:160(probabilistic_sharpe_ratio)
  - name: deflated_sharpe_ratio
    description: Computes DSR with deflated threshold from bootstrap, accounting for maximum observed
      SR across trials
    evidence: mlfinlab/backtest_statistics/statistics.py:183(deflated_sharpe_ratio)
  - name: drawdown_and_time_under_water
    description: Computes drawdown series and time spent below peak for risk analysis
    evidence: mlfinlab/backtest_statistics/statistics.py:93(drawdown_and_time_under_water)
  key_behaviors:
  - behavior: Multiple testing correction
    description: Haircut methods (Bonferroni, Holm, BHY) provide different family-wise error rate controls;
      averaging provides robustness
    evidence: mlfinlab/backtest_statistics/backtests.py:174(haircut_sharpe_ratios)
  - behavior: Bootstrap-based deflations
    description: Deflated Sharpe ratio uses bootstrap simulations to establish deflated threshold accounting
      for selection bias
    evidence: mlfinlab/backtest_statistics/statistics.py:183(deflated_sharpe_ratio)
  replaceable_points:
  - name: Sharpe adjustment method
    description: Method for correcting Sharpe ratio for multiple testing and selection bias
    options:
    - name: Bonferroni
      traits:
      - conservative
      - FWER control
      - simple
      fit_for:
      - Many strategy variations
      - Conservative risk assessment
      not_fit_for:
      - Few variations
      - Power concerns
    - name: Holm
      traits:
      - step-down
      - uniformly more powerful
      fit_for:
      - Moderate strategy counts
      - Balanced testing
      not_fit_for:
      - Very many variations
    - name: BHY
      traits:
      - FDR control
      - Benjamini-Yekutieli adaptation
      fit_for:
      - Unknown dependency
      - Adaptive selection
      not_fit_for:
      - Independent tests only
    - name: Average
      traits:
      - robust
      - ensemble
      - balanced
      fit_for:
      - Unknown true state
      - General robustness
      not_fit_for:
      - Specific method required
    default: Average
  design_decisions:
  - 'Simulations=2000 default in CampbellBacktesting - balances convergence of p-value distribution vs
    computation time; HLZ recommendation; evidence: mlfinlab/backtest_statistics/backtests.py:21(simulations)'
  - 'entries_per_year=252 default - assumes daily trading frequency; standard convention for US equities;
    evidence: mlfinlab/backtest_statistics/statistics.py:122(entries_per_year)'
  - 'Haircut methods: Bonferroni, Holm, BHY - different family-wise error rate controls; average provides
    robustness; evidence: mlfinlab/backtest_statistics/backtests.py:174(haircut_sharpe_ratios)'
  acceptance_hints:
  - Sharpe ratios are properly annualized for sampling frequency
  - Probabilistic Sharpe ratio returns value between 0 and 1
  - Drawdown series shows non-positive values relative to running maximum
  - Minimum track record length is positive integer
  - Multiple testing corrections reduce Sharpe ratios (haircut applied)
- id: correlation_analysis
  name: Correlation & Codependence Analysis
  order: 9
  responsibility: Compute non-linear dependence matrices using information theoretic and optimal transport
    methods for clustering, network analysis, and multi-asset portfolio construction
  interface:
    inputs:
    - Time series DataFrame
    - dependence_method parameter
    - theta parameter (optional)
    outputs:
    - Dependence matrix DataFrame
    - distance matrix DataFrame
  required_methods:
  - name: get_dependence_matrix
    description: Unified interface for each dependence methods, computing pairwise codependence across
      multiple series
    evidence: mlfinlab/codependence/codependence_matrix.py:18(get_dependence_matrix)
  - name: get_mutual_info
    description: Mutual information with optimal binning that captures non-linear dependencies missed
      by linear correlation
    evidence: mlfinlab/codependence/information.py:29(get_mutual_info)
  - name: optimal_transport_dependence
    description: Wasserstein-based dependence that respects probability geometry through optimal transport
      theory
    evidence: mlfinlab/codependence/optimal_transport.py:0(optimal_transport_dependence)
  key_behaviors:
  - behavior: Angular distance conversion
    description: Distance matrix computed as angular distance from dependence, which is a true metric
      enabling MST/PMFG construction
    evidence: mlfinlab/codependence/codependence_matrix.py:53(get_distance_matrix)
  - behavior: theta balancing parameter
    description: theta=0.5 default balances positive (0) and negative (1) dependence with symmetric prior
    evidence: mlfinlab/codependence/codependence_matrix.py:31(theta)
  replaceable_points:
  - name: Dependence metric
    description: Method for measuring statistical codependence between time series
    options:
    - name: linear correlation
      traits:
      - standard
      - bounded [-1,1]
      - linear only
      fit_for:
      - Gaussian returns
      - Linear relationships
      - Benchmark comparison
      not_fit_for:
      - Non-linear dependencies
      - Heavy-tailed distributions
    - name: MI
      traits:
      - information theoretic
      - non-linear
      - entropy-based
      fit_for:
      - Non-linear relationships
      - Regime detection
      - Arbitrage detection
      not_fit_for:
      - Large feature spaces
      - Continuous high-dimensional
    - name: distance correlation
      traits:
      - metric
      - non-linear
      - zero if independent
      fit_for:
      - General dependencies
      - Multivariate analysis
      - Network construction
      not_fit_for:
      - Interpretability
      - Fast computation
    - name: optimal transport
      traits:
      - geometry-respecting
      - Wasserstein
      - probability-aware
      fit_for:
      - Distribution comparison
      - Robust dependence
      - Finance applications
      not_fit_for:
      - High dimensions
      - Speed-critical applications
    default: linear correlation
  design_decisions:
  - 'angular distance from dependence - angular distance is a true metric; enables MST/PMFG construction;
    evidence: mlfinlab/codependence/codependence_matrix.py:53(get_distance_matrix)'
  - 'theta=0.5 default for GPR/GNPR - balances positive (0) and negative (1) dependence; symmetric prior;
    evidence: mlfinlab/codependence/codependence_matrix.py:31(theta)'
  acceptance_hints:
  - Dependence matrix is symmetric with diagonal = 1
  - Distance matrix satisfies metric properties (d(i,i)=0, d(i,j)>0 for i≠j, triangle inequality)
  - Non-linear methods detect dependencies missed by linear correlation
  - Output DataFrames have proper index/column alignment
- id: clustering_networks
  name: Clustering & Network Generation
  order: 10
  responsibility: Hierarchically cluster features and assets, and construct filtered correlation networks
    (MST, PMFG, ALMST) for portfolio construction and risk management
  interface:
    inputs:
    - Feature/correlation matrix
    - linkage method
    - distance matrix
    outputs:
    - Cluster assignments
    - NetworkX Graph objects
    - Dendrogram data
  required_methods:
  - name: MST.create_mst
    description: Constructs Minimum Spanning Tree filtering correlation matrix to exactly N-1 edges, preserving
      hierarchical ultrametric structure
    evidence: mlfinlab/networks/mst.py:27(create_mst)
  - name: PMFG.create_pmfg
    description: Creates Planar Maximally Filtered Graph retaining 3N-6 edges for richer structural information
      than MST
    evidence: mlfinlab/networks/pmfg.py:40(_calculate_disparity)
  - name: ALMST.create_almst
    description: Builds Average Linkage MST using average linkage during Prim's algorithm for different
      clustering behavior
    evidence: mlfinlab/networks/almst.py:15(create_almst)
  - name: get_feature_clusters
    description: ONC-based feature clustering with optional transformation that handles redundant features
      via regression residuals
    evidence: mlfinlab/clustering/feature_clusters.py:20(get_feature_clusters)
  - name: optimal_hierarchical_cluster
    description: Determines optimal number of clusters via dendrogram analysis for automated cluster selection
    evidence: mlfinlab/clustering/hierarchical_clustering.py:9(optimal_hierarchical_cluster)
  key_behaviors:
  - behavior: Ultrametric preservation
    description: MST preserves ultrametric structure enabling top-down tree reconstruction and hierarchical
      analysis
    evidence: mlfinlab/networks/mst.py:27(create_mst)
  - behavior: Disparity edge weighting
    description: PMFG uses disparity measure to quantify edge significance for determining clique formation
    evidence: mlfinlab/networks/pmfg.py:40(_calculate_disparity)
  - behavior: ONC redundant feature handling
    description: ONC replaces redundant features with regression residuals to prevent multicollinearity
      in downstream ML models
    evidence: mlfinlab/clustering/feature_clusters.py:49(_cluster_transformation)
  replaceable_points:
  - name: Network type
    description: Algorithm for filtering correlation matrix into network structure
    options:
    - name: MST
      traits:
      - N-1 edges
      - ultrametric
      - hierarchical
      fit_for:
      - Large asset universes
      - Hierarchical clustering
      - Visualization
      not_fit_for:
      - Rich structural information
      - Clique detection
    - name: PMFG
      traits:
      - 3N-6 edges
      - planar
      - clique-rich
      fit_for:
      - Structural analysis
      - Risk clustering
      - Community detection
      not_fit_for:
      - Very large universes
      - Simple hierarchy
    - name: ALMST
      traits:
      - average linkage
      - balanced
      - smooth clustering
      fit_for:
      - Diverse asset classes
      - Balanced hierarchies
      - Robust clustering
      not_fit_for:
      - Single-linkage preference
      - Extreme clustering
    default: MST
  design_decisions:
  - 'MST preserves ultrametric structure - hierarchical clustering induced by MST; top-down tree reconstruction;
    evidence: mlfinlab/networks/mst.py:27(create_mst)'
  - 'Disparity measure for PMFG edge weighting - quantifies edge significance; used to determine which
    edges form cliques; evidence: mlfinlab/networks/pmfg.py:40(_calculate_disparity)'
  - 'ONC handles redundant features via regression residual - replaces redundant feature with residual;
    prevents multicollinearity in ML models; evidence: mlfinlab/clustering/feature_clusters.py:49(_cluster_transformation)'
  acceptance_hints:
  - MST has exactly N-1 edges for N nodes
  - PMFG has approximately 3N-6 edges
  - Every graphs are connected (no isolated components except ALMST with disconnect threshold)
  - Cluster assignments are non-overlapping
  - Network nodes match input asset/feature names
- id: data_generation
  name: Synthetic Data Generation
  order: 11
  responsibility: Generate realistic synthetic correlation matrices and time series using vine copulas
    and hierarchical models for backtesting, simulation, and stress testing without reliance on limited
    historical data
  interface:
    inputs:
    - Dimension (n)
    - number of samples
    - distribution parameters
    - generation method
    outputs:
    - Synthetic correlation matrices (np.ndarray)
    - or time series DataFrames
  required_methods:
  - name: sample_from_dvine
    description: D-vine method for generating uniform random correlation matrices using sequential partial
      correlation sampling
    evidence: mlfinlab/data_generation/vines.py:69(sample_from_dvine)
  - name: sample_from_cvine
    description: C-vine method for different dependence structure than D-vine, using centered tree structure
    evidence: mlfinlab/data_generation/vines.py:94(sample_from_cvine)
  - name: generate_hcmb_mat
    description: Hierarchical Correlation Block Model generating matrices that simulate industry/factor
      structure with arbitrary block depth
    evidence: mlfinlab/data_generation/hcbm.py:40(generate_hcmb_mat)
  - name: sample_from_corrgan
    description: GAN-based sampling from pre-trained model for data-driven correlation matrix generation
    evidence: mlfinlab/data_generation/corrgan.py:16(sample_from_corrgan)
  key_behaviors:
  - behavior: Beta distribution for partial correlations
    description: Vine methods use Beta(1,1) uniform prior on partial correlations ensuring generated matrices
      are always valid correlations
    evidence: mlfinlab/data_generation/vines.py:15(_correlation_from_partial_dvine)
  - behavior: Recursive block assignment
    description: HCBM supports arbitrary block depth for multi-level industry sector simulation
    evidence: mlfinlab/data_generation/hcbm.py:40(generate_hcmb_mat)
  replaceable_points:
  - name: Generation method
    description: Algorithm for synthetic correlation matrix or time series generation
    options:
    - name: D-vine
      traits:
      - sequential
      - flexible
      - uniform prior
      fit_for:
      - General correlation structures
      - Unstructured dependencies
      - Large dimensions
      not_fit_for:
      - Specific factor structures
      - Industry hierarchies
    - name: C-vine
      traits:
      - centered
      - star dependency
      - balanced
      fit_for:
      - Hub-like dependencies
      - Central assets
      - Balanced structures
      not_fit_for:
      - Chain-like dependencies
      - D-vine scenarios
    - name: HCBM
      traits:
      - hierarchical
      - industry-aware
      - block-structured
      fit_for:
      - Sector investing
      - Factor models
      - Portfolio construction
      not_fit_for:
      - Unstructured data
      - General dependencies
    - name: CorrGAN
      traits:
      - data-driven
      - GAN-generated
      - realistic
      fit_for:
      - Pattern matching
      - Realistic simulations
      - Complex structures
      not_fit_for:
      - Interpretability
      - Guaranteed validity
      - Small datasets
    default: D-vine
  design_decisions:
  - 'Vine methods use Beta distribution for partial correlations - Beta(1,1) uniform prior on partial
    correlations ensures valid correlation matrices; evidence: mlfinlab/data_generation/vines.py:15(_correlation_from_partial_dvine)'
  - 'HCBM supports arbitrary block depth - recursive block assignment captures multi-level industry sectors;
    evidence: mlfinlab/data_generation/hcbm.py:40(generate_hcmb_mat)'
  acceptance_hints:
  - Output matrices are valid correlations (symmetric, positive semi-definite, diagonal=1)
  - HCBM shows block structure matching depth parameter
  - Vine methods produce diverse correlation structures
  - Generated samples are reproducible with fixed random seed
- id: structural_breaks
  name: Structural Break Detection
  order: 12
  responsibility: Detect regime changes and explosiveness in time series using SADF (Supremum Augmented
    Dickey-Fuller) and related tests for identifying bubbles, regime shifts, and non-stationarity
  interface:
    inputs:
    - Price series (pd.Series)
    - model type (C/CT/CTT)
    - lags parameter
    - minimum window size
    outputs:
    - SADF series with timestamps and statistics
    - break point indicators
  required_methods:
  - name: get_sadf
    description: Multithreaded SADF implementation detecting multiple structural breaks by rolling ADF
      tests with backward sequentially augmenting samples
    evidence: mlfinlab/structural_breaks/sadf.py:91(get_sadf)
  key_behaviors:
  - behavior: Rolling window minimum length
    description: SADF uses rolling window with minimum length requirement preventing overfitting on short
      sequences where ADF is unreliable
    evidence: mlfinlab/structural_breaks/sadf.py:13(_get_sadf_at_t)
  - behavior: Multithreaded computation
    description: SADF implementation supports parallel computation for large datasets
    evidence: mlfinlab/structural_breaks/sadf.py:91(get_sadf)
  replaceable_points:
  - name: Break detection model
    description: ADF regression specification controlling for deterministic components
    options:
    - name: C
      traits:
      - constant only
      - basic
      - drift term
      fit_for:
      - Zero-mean bubbles
      - Simple stationarity
      - Trend-free series
      not_fit_for:
      - Trends
      - Quadratic behavior
    - name: CT
      traits:
      - constant + trend
      - linear trend
      fit_for:
      - Linear trends
      - Growing bubbles
      - Trend-present data
      not_fit_for:
      - Quadratic trends
      - Level shifts
    - name: CTT
      traits:
      - quadratic trend
      - accelerating
      fit_for:
      - Accelerating trends
      - Exponential bubbles
      - Non-linear growth
      not_fit_for:
      - Linear trends
      - Simple stationarity
    default: C
  design_decisions:
  - 'SADF uses rolling window minimum length - prevents overfitting on short sequences; ADF is unreliable
    for small samples; evidence: mlfinlab/structural_breaks/sadf.py:13(_get_sadf_at_t)'
  acceptance_hints:
  - SADF statistics are non-negative ( supremum of negative values)
  - Break timestamps are within valid window range
  - Higher SADF values indicate more explosive behavior
  - Output aligned to input series index
data_flow:
- from_stage: data_ingestion
  to_stage: event_filtering
  data: Close prices extracted from constructed bars serve as input to CUSUM/z-score filters for event
    detection
- from_stage: data_ingestion
  to_stage: labeling
  data: Close prices for volatility estimation via get_daily_vol (lookback=100 EWM) and barrier distance
    calculations
- from_stage: event_filtering
  to_stage: labeling
  data: Event timestamps (t_events) from CUSUM filter serve as seeds for triple barrier application
- from_stage: labeling
  to_stage: sample_weighting
  data: triple_barrier_events DataFrame (with t1) and close_series for sample weight computation via return
    attribution and uniqueness
- from_stage: labeling
  to_stage: model_training
  data: Labeled events with bin labels and side predictions for ML classification training
- from_stage: sample_weighting
  to_stage: model_training
  data: Sample weights for weighted fitting and scoring in ensemble training
- from_stage: data_ingestion
  to_stage: sample_weighting
  data: Price bars for indicator matrix (get_ind_matrix) linking price bars to label timestamps for uniqueness
    calculation
- from_stage: data_ingestion
  to_stage: feature_engineering
  data: Close series for fractional differentiation achieving stationarity
- from_stage: feature_engineering
  to_stage: model_training
  data: Feature DataFrame X with engineered features for model training
- from_stage: feature_engineering
  to_stage: clustering_networks
  data: Feature clusters for grouped importance analysis and feature selection
- from_stage: model_training
  to_stage: bet_sizing
  data: Trained classifier predictions (probability arrays) for position sizing
- from_stage: labeling
  to_stage: bet_sizing
  data: events DataFrame with t1 expiry times for concurrent bet analysis and averaging
- from_stage: model_training
  to_stage: backtesting
  data: Predictions converted to positions and returns for statistical evaluation
- from_stage: data_ingestion
  to_stage: correlation_analysis
  data: Multiple asset price series for dependence matrix computation across assets
- from_stage: correlation_analysis
  to_stage: clustering_networks
  data: Distance matrix derived from dependence matrix for MST/PMFG/ALMST network construction
- from_stage: clustering_networks
  to_stage: feature_engineering
  data: Feature cluster assignments for grouped importance analysis using clustered_subsets
global_contracts:
- contract: 'Input CSV for data ingestion must have exactly 3 columns: date_time, price, volume - enforced
    by _assert_csv; evidence: mlfinlab/data_structures/base_bars.py:117(_assert_csv)'
  evidence: ''
- contract: 'Every bar DataFrames use [date_time, open, high, low, close, volume, cum_buy_volume, cum_ticks,
    cum_dollar_value] columns - 9-column contract enforced in _create_bars; evidence: mlfinlab/data_structures/base_bars.py:137(_create_bars)'
  evidence: ''
- contract: 'samples_info_sets convention: index=event_start (datetime), value=event_end (t1) - critical
    for purged CV and sequential bootstrap; wrong orientation causes information leakage; evidence: mlfinlab/cross_validation/cross_validation.py:31(samples_info_sets.index),
    mlfinlab/labeling/labeling.py:60-91(get_events)'
  evidence: ''
- contract: 'Triple barrier events use t1 (barrier touch time) as index for samples_info_sets linking
    labeling to training; evidence: mlfinlab/labeling/labeling.py:85(events.index)'
  evidence: ''
- contract: 'Global batch_size=2e7 default across each bar constructors - memory usage invariant; evidence:
    mlfinlab/data_structures/base_bars.py:37(__init__), mlfinlab/data_structures/imbalance_data_structures.py:96(batch_size)'
  evidence: ''
- contract: 'Volatility estimators use lookback=100 for EWM standard deviation in get_daily_vol; evidence:
    mlfinlab/util/volatility.py:10(get_daily_vol)'
  evidence: ''
- contract: 'PurgedKFold requires samples_info_sets with index=start_time, value=end_time for proper embargo
    purging; evidence: mlfinlab/cross_validation/cross_validation.py:56(samples_info_sets)'
  evidence: ''
- contract: 'Expected imbalance window=10000 and exp_num_ticks_init=20000 shared across each bar types
    affecting convergence; evidence: mlfinlab/data_structures/imbalance_data_structures.py:95-96'
  evidence: ''
- contract: 'Side prediction convention: negative=short, positive=long, None=no meta-labeling - must align
    across bet sizing functions; evidence: mlfinlab/bet_sizing/bet_sizing.py:68(sides)'
  evidence: ''
- contract: 'min_pct=0.05 default in drop_labels eliminates rare observations with <5% occurrence; evidence:
    mlfinlab/labeling/labeling.py:152(min_pct=.05)'
