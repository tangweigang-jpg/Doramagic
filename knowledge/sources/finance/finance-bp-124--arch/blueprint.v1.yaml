id: finance-bp-124
name: arch
sop_version: '3.6'
source:
  projects:
  - arch
  commit_hash: 2524b62e1b2ecd8dfcb132f35e1b7f49830ea5b6
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Volatility modeling and financial econometrics
  description: A comprehensive Python package for estimating Autoregressive Conditional
    Heteroskedasticity (ARCH) models, performing unit root and cointegration tests,
    time-series bootstrapping, and multiple comparison procedures for financial time
    series analysis.
  prerequisites: Users should have familiarity with financial time series analysis,
    ARCH/GARCH volatility models, and basic econometric concepts including maximum
    likelihood estimation, stationarity, and cointegration. Python programming proficiency
    with numpy/pandas is required.
  not_suitable_for: Real-time streaming data analysis, high-frequency trading systems
    requiring sub-second latency, multivariate volatility models (use rpy2.portable
    or r package 'rmgarch'), structural break detection beyond unit root tests, or
    users seeking drag-and-drop GUI interfaces.
stages:
- id: data_input
  name: Data Input & Validation
  order: 1
  responsibility: Accept time series data (numpy/pandas), validate finiteness, convert
    to contiguous float64 arrays for core computation. Provides type flexibility while
    ensuring memory layout efficiency for downstream numeric operations.
  interface:
    inputs:
    - Raw array/Series with potential NaN/inf
    - Column names/indices
    - Optional hold_back parameter
    outputs:
    - Contiguous float64 arrays (_y)
    - Pandas Series with original type preserved (_y_original)
  required_methods:
  - name: ARCHModel.__init__
    description: 'Accepts y: ArrayLike|None, stores _y_original and _y as float64;
      validates finite values'
    evidence: arch/univariate/base.py:177(__init__)
  - name: ensure1d
    description: Validates and converts to 1D array with optional Series conversion
    evidence: arch/utility/array.py:74(ensure1d)
  - name: to_array_1d
    description: Ensures contiguous float64 1D array for core computation
    evidence: arch/utility/array.py:43(to_array_1d)
  key_behaviors:
  - behavior: Finite value enforcement
    description: Requires each data to be finite (no NaN/inf); fails fast with clear
      error message since optimizers and recursions cannot handle non-finite values
    evidence: arch/univariate/base.py:206(np.all(np.isfinite))
  - behavior: Dual storage of original and converted data
    description: Preserves user API format (_y_original) while enabling optimized
      numeric computation (_y as float64)
    evidence: arch/univariate/base.py:196(_is_pandas),:210(_y_original)
  - behavior: Automatic rescaling for extreme magnitudes
    description: Silently rescales data when variance is outside [0.1, 10000) range;
      scale property returns factor for re-scaling forecasts
    evidence: arch/univariate/base.py:311-326(_check_scale)
  replaceable_points:
  - name: Input type coercion
    description: Custom coercion logic in ensure1d for handling various input types
    options:
    - name: default ensure1d
      traits:
      - Handles numpy arrays, pandas Series/DataFrame, lists
      - Preserves index for Series
      fit_for:
      - Most common use cases with standard pandas data
      not_fit_for:
      - Custom data structures requiring specialized conversion
    - name: custom coercion
      traits:
      - User-defined conversion logic
      - Full control over type handling
      fit_for:
      - Specialized input formats
      - Custom data validation requirements
      not_fit_for:
      - Standard workflows
      - Users preferring defaults
    default: default ensure1d
  design_decisions:
  - 'Require finite values only (evidence: arch/univariate/base.py:206(np.all(np.isfinite)))
    — Optimizers and recursions cannot handle NaN/inf; fail fast with clear message'
  - 'Store both original type and float64 conversion (evidence: arch/univariate/base.py:196(_is_pandas),:210(_y_original))
    — Preserves user API format while enabling optimized numeric computation'
  acceptance_hints:
  - Every output arrays contain only finite values (no NaN/inf)
  - Original data type preserved in _y_original for results reporting
  - Scale factor applied consistently if rescaling occurred
- id: model_specification
  name: Model Specification
  order: 2
  responsibility: Allow users to compose mean model + volatility process + distribution
    as pluggable components. Each component implements a common interface for unified
    likelihood computation and forecasting.
  interface:
    inputs:
    - Data, optional volatility process, optional distribution, hold_back, rescale
      flags
    outputs:
    - Composed ARCHModel with components accessible via properties
  required_methods:
  - name: ARCHModel.fit
    description: Fits the composed model using constrained maximum likelihood; returns
      ARCHModelResult
    evidence: arch/univariate/base.py:177(ARCHModel base class)
  - name: ARCHModel.forecast
    description: Generates multi-step forecasts using fitted parameters
    evidence: arch/univariate/base.py:1444(ARCHModelResult.forecast)
  - name: GARCH.__init__
    description: Initialize GARCH volatility model with parameters (omega, alpha,
      beta)
    evidence: arch/univariate/volatility.py:1027
  - name: HARX.__init__
    description: Heterogeneous AR with optional exogenous regressors; parent of ConstantMean,
      ZeroMean, ARX, LS, ARCHInMean
    evidence: arch/univariate/mean.py:155
  key_behaviors:
  - behavior: Three-component composition pattern
    description: Separation of mean model, volatility process, and distribution enables
      orthogonal experimentation; each component has clear mathematical role
    evidence: arch/univariate/base.py:224-236
  - behavior: VolatilityProcess strategy pattern
    description: Runtime model changes possible only before fit(); post-fit changes
      require new model instantiation
    evidence: arch/univariate/base.py:284-303(volatility.setter)
  - behavior: Closed-form estimation detection
    description: When Normal distribution AND ConstantVariance volatility are used,
      OLS solution is used instead of numerical optimization
    evidence: arch/univariate/base.py:687-689(has_closed_form check)
  replaceable_points:
  - name: Mean model
    description: Conditional mean specification
    options:
    - name: ConstantMean
      traits:
      - Single intercept parameter
      - Most common default
      - No autoregressive terms
      fit_for:
      - Simple return models
      - Quick initial analysis
      not_fit_for:
      - Mean-reverting series with clear patterns
      - High-frequency data
    - name: ZeroMean
      traits:
      - No mean parameters
      - Assumes zero expected return
      fit_for:
      - Short-term returns
      - Interest rate models
      not_fit_for:
      - Assets with significant drift
      - Long-horizon forecasts
    - name: ARX
      traits:
      - Autoregressive with exogenous regressors
      - Lag order specification
      fit_for:
      - Serially correlated returns
      - Models with external predictors
      not_fit_for:
      - Non-stationary series
      - Large number of lags
    - name: HARX
      traits:
      - Heterogeneous AR (daily/weekly/monthly)
      - Realized volatility models
      fit_for:
      - Realized volatility forecasting
      - Long-memory processes
      not_fit_for:
      - Simple daily models
      - Short samples
    - name: LS
      traits:
      - Linear regression with ARCH errors
      - Multiple predictors
      fit_for:
      - Regression with heteroskedastic errors
      - CAPM-type models
      not_fit_for:
      - Non-linear relationships
      - Dynamic models
    - name: ARCHInMean
      traits:
      - Risk-return tradeoff specification
      - Variance in mean equation
      fit_for:
      - Asset pricing models
      - Testing risk premium
      not_fit_for:
      - Standard return forecasting
      - Simple volatility models
    default: ConstantMean
  - name: Volatility model
    description: Conditional variance specification
    options:
    - name: ConstantVariance
      traits:
      - Single variance parameter
      - Closed-form estimation
      - No persistence
      fit_for:
      - Baseline models
      - Testing volatility importance
      not_fit_for:
      - Volatility clustering
      - Realistic volatility modeling
    - name: GARCH
      traits:
      - Most widely used
      - Closed-form forecast
      - omega+alpha+beta<1 constraint
      fit_for:
      - Standard volatility modeling
      - Forecasting
      - Risk management
      not_fit_for:
      - Asymmetric shocks
      - Long memory
    - name: EGARCH
      traits:
      - Asymmetric (leverage effect)
      - Log-variance specification
      - No closed-form multi-step
      fit_for:
      - Stock market data
      - Leverage effect detection
      not_fit_for:
      - Multi-step analytic forecasting
      - Simple models
    - name: APARCH
      traits:
      - Asymmetric power ARCH
      - Flexible power parameter
      - Generalizes GARCH/IGARCH/TGARCH
      fit_for:
      - Heavy-tailed returns
      - Asymmetric volatility
      not_fit_for:
      - Short samples
      - Simple interpretation needs
    - name: FIGARCH
      traits:
      - Fractionally integrated
      - Long memory
      - Slow decay of shocks
      fit_for:
      - High-frequency data
      - Long-memory volatility
      not_fit_for:
      - Short samples
      - Computational complexity
    - name: HARCH
      traits:
      - Heterogeneous ARCH
      - Multiple variance lags
      - Realized volatility
      fit_for:
      - Realized volatility models
      - Multi-scale analysis
      not_fit_for:
      - Simple models
      - Low-frequency data
    - name: EWMAVariance
      traits:
      - RiskMetrics specification
      - lambda=0.94
      - No long-run variance
      fit_for:
      - RiskMetrics framework
      - Industry standard
      not_fit_for:
      - Models requiring long-run mean
    default: ConstantVariance
  - name: Distribution
    description: Error distribution for standardized residuals
    options:
    - name: Normal
      traits:
      - No shape parameters
      - Fast estimation
      - Closed-form when combined with ConstantVariance
      fit_for:
      - Standard ARCH models
      - Quick prototyping
      - Large samples
      not_fit_for:
      - Fat-tailed returns
      - Skewed distributions
    - name: StudentsT
      traits:
      - Single shape parameter (nu)
      - Fat tails
      - Symmetric
      fit_for:
      - Daily returns
      - Fat-tailed data
      not_fit_for:
      - Skewed returns
      - Very short samples (nu hard to estimate)
    - name: SkewStudent
      traits:
      - Two shape parameters (nu, lambda)
      - Fat tails AND skewness
      fit_for:
      - Equity returns
      - Asymmetric crashes
      not_fit_for:
      - Symmetric distributions
      - Very short samples
    - name: GeneralizedError
      traits:
      - Generalized Error Distribution
      - Flexible kurtosis
      fit_for:
      - Heavy or light tails
      - Financial returns
      not_fit_for:
      - Simple models
      - When Normal is adequate
    default: Normal
  design_decisions:
  - 'Three-component composition (mean+vol+dist) (evidence: arch/univariate/base.py:224-236)
    — Separation enables orthogonal experimentation; each component has clear mathematical
    role'
  - 'Default to Normal distribution (evidence: arch/univariate/base.py:234(self._distribution
    = Normal())) — Normal is standard in ARCH literature; users explicitly choose
    heavy tails'
  - 'Default to ConstantVariance volatility (evidence: arch/univariate/base.py:227(self._volatility
    = ConstantVariance())) — GARCH(1,1) is most common; explicit vol specification
    is clearer than auto-detection'
  - 'SLSQP optimizer with bounds and linear constraints (evidence: arch/univariate/base.py:811(method=''SLSQP''))
    — SLSQP supports both bound and linear inequality constraints; ARCH constraints
    are inequality-only'
  - 'hold_back parameter for pre-sample exclusion (evidence: arch/univariate/base.py:216(_hold_back))
    — HAR models need look-ahead-free estimation; default None means no exclusion'
  acceptance_hints:
  - Model instantiated with specified mean/volatility/distribution components
  - Starting values available from each components via starting_values()
  - Constraints properly formed from each components
- id: parameter_estimation
  name: Parameter Estimation
  order: 3
  responsibility: Jointly estimate mean+volatility+distribution parameters via constrained
    maximum likelihood. Uses SLSQP with bounds and inequality constraints derived
    from stationarity/coerciveness requirements.
  interface:
    inputs:
    - Composed model with starting values from components
    outputs:
    - ARCHModelResult with params, param_cov, residuals, volatility, loglikelihood,
      fit indices
  required_methods:
  - name: ARCHModel.fit
    description: Main estimation method using constrained maximum likelihood with
      SLSQP optimizer
    evidence: arch/univariate/base.py:177(ARCHModel base class)
  - name: ARCHModelResult.summary
    description: Formatted summary of estimation results with parameter table, fit
      statistics
    evidence: arch/univariate/base.py:1119(_SummaryRepr)
  - name: ARCHModelResult.conf_int
    description: Confidence intervals for parameters at specified alpha level
    evidence: arch/univariate/base.py:1826
  key_behaviors:
  - behavior: Unified parameter vector ordering
    description: Parameters ordered as [mean_params, vol_params, dist_params] with
      computed offsets; violation breaks _parse_parameters, loglikelihood, and summary
    evidence: arch/univariate/base.py:682-683(offsets array)
  - behavior: Loglikelihood computation sequence
    description: 'Computation order must be: resid -> sigma2 -> distribution.loglikelihood;
      swapping breaks likelihood evaluation'
    evidence: arch/univariate/base.py:486-495(_loglikelihood)
  - behavior: var_bounds prevent likelihood explosion
    description: Loose bounds (/1e6 to *1e6) around EWMA; bounds_check() clamps to
      prevent inf/nan in sigma2
    evidence: arch/univariate/volatility.py:560(var_bounds)
  - behavior: Robust covariance default for ARCH models
    description: Bollerslev-Wooldridge robust covariance used by default; accounts
      for ARCH model violations of information matrix equality
    evidence: arch/univariate/base.py:622(cov_type='robust')
  replaceable_points:
  - name: Starting values
    description: Initial parameter values for optimization
    options:
    - name: Component starting_values()
      traits:
      - Automatic from each component
      - Grid search for GARCH
      - Fixed for simple models
      fit_for:
      - Standard models
      - Quick estimation
      not_fit_for:
      - Poor convergence
      - Known parameter ranges
    - name: User-provided sv array
      traits:
      - User-specified initial parameters
      - Full control
      fit_for:
      - Restarting failed fits
      - Known parameter regions
      not_fit_for:
      - Initial exploration
      - Unknown optimal region
    default: Component starting_values()
  - name: Covariance type
    description: Parameter covariance estimator
    options:
    - name: robust (Bollerslev-Wooldridge)
      traits:
      - QML estimator
      - Consistent under misspecification
      - Default
      fit_for:
      - Standard ARCH models
      - Most use cases
      not_fit_for:
      - Small samples
      - When classical is theoretically preferred
    - name: classic (Information matrix)
      traits:
      - Classical ML covariance
      - Requires correct model
      fit_for:
      - Simulation studies
      - When model is believed correct
      not_fit_for:
      - ARCH models (violates IM equality)
      - Misspecified models
    default: robust
  design_decisions:
  - 'Unified parameter vector (mean|vol|dist) (evidence: arch/univariate/base.py:682-683(offsets
    array)) — Joint estimation ensures proper covariance; offsets track component
    boundaries'
  - 'EWMA(0.94) for backcasting and var_bounds (evidence: arch/univariate/volatility.py:552-558(0.94
    ** np.arange(tau))) — RiskMetrics standard; tau=75 balances bias vs variance in
    backcast'
  - 'Numba JIT compilation fallback to pure Python (evidence: arch/compat/numba.py:27-50(jit
    wrapper)) — JIT with nopython=True for speed; graceful fallback preserves correctness'
  - 'ConvergenceWarning only shown by default (evidence: arch/univariate/base.py:819-822(show_warning))
    — Non-zero status common in ARCH estimation; silent by default, opt-in warnings'
  acceptance_hints:
  - Optimization converges with status 0 (or warning shown for non-zero status)
  - Every parameters satisfy inequality constraints a.dot(params) - b >= 0
  - Residuals are mean-zero by construction
  - Conditional variance sigma2 >= 0 for each observations
  - Parameter covariance matrix is positive definite
- id: forecasting
  name: Forecasting & Simulation
  order: 4
  responsibility: Generate multi-step volatility/mean forecasts using analytic formulas,
    simulation, or bootstrap. Handles alignment (origin vs target), reindexing, and
    exogenous regressors.
  interface:
    inputs:
    - Fitted params, horizon, start index, method (analytic/simulation/bootstrap),
      exogenous x
    outputs:
    - ARCHModelForecast with mean, variance, residual_variance, optional simulations
  required_methods:
  - name: ARCHModelResult.forecast
    description: Generate multi-step forecasts using fitted parameters; supports analytic,
      simulation, and bootstrap methods
    evidence: arch/univariate/base.py:1444
  - name: VarianceForecast._analytic_forecast
    description: Abstract method for closed-form multi-step variance (not each models
      support)
    evidence: arch/univariate/volatility.py:386
  - name: VarianceForecast._simulation_forecast
    description: Simulated paths for models without analytic forecasts (EGARCH)
    evidence: arch/univariate/volatility.py:423
  key_behaviors:
  - behavior: Three forecasting methods
    description: EGARCH has no closed-form multi-step; bootstrap respects residual
      distribution; simulation always available but only useful for horizons > 1
    evidence: arch/_typing.py:68(ForecastingMethod)
  - behavior: Origin vs target alignment
    description: Origin aligns forecasts to origin time; target aligns to realization
      time for error calculation
    evidence: arch/univariate/base.py:996(align parameter)
  - behavior: Non-2.0 GARCH power blocks analytic forecasts
    description: power!=2.0 models require simulation/boot methods for multi-step
      forecasts
    evidence: arch/univariate/volatility.py:1268(_check_forecasting_method)
  replaceable_points:
  - name: Forecasting method
    description: How to generate multi-step forecasts
    options:
    - name: analytic (closed-form)
      traits:
      - Fast computation
      - Available for GARCH/power=2.0
      - Deterministic given params
      fit_for:
      - Standard GARCH forecasting
      - Risk management
      - Large simulation studies
      not_fit_for:
      - EGARCH models
      - Power != 2.0
      - Non-linear models
    - name: simulation (Monte Carlo)
      traits:
      - 1000 paths default
      - Random draws from distribution
      - Handles any model
      fit_for:
      - Complex models
      - EGARCH
      - Non-standard distributions
      not_fit_for:
      - Real-time applications (slow)
      - Exact computation needed
    - name: bootstrap (residual resampling)
      traits:
      - Respects residual distribution
      - Non-parametric
      - Uncertainty quantification
      fit_for:
      - Model uncertainty
      - Small samples
      - Distribution-free inference
      not_fit_for:
      - Large samples
      - Fast computation needed
    default: analytic
  - name: Alignment
    description: Forecast-realization alignment
    options:
    - name: origin
      traits:
      - Aligns to forecast origin time
      - Default
      - Standard in ARCH literature
      fit_for:
      - Standard forecasting
      - Comparison with other methods
      not_fit_for:
      - Error calculation against realizations
    - name: target
      traits:
      - Aligns to realization time
      - h-step ahead corresponds to t+h
      fit_for:
      - Error calculation
      - Out-of-sample evaluation
      not_fit_for:
      - Standard reporting
      - Portfolio construction
    default: origin
  design_decisions:
  - 'Simulation count default 1000 (evidence: arch/univariate/base.py:998(simulations=1000))
    — 1000 paths balances Monte Carlo error vs computation time'
  - 'Minimum 10 bootstrap observations required (evidence: arch/univariate/volatility.py:782(start
    < 10)) — Bootstrap needs burn-in; horizon/start ratio < 0.2 prevents extrapolation
    artifacts'
  - 'BootstrapRng wrapper for bootstrap forecasts (evidence: arch/univariate/volatility.py:66(BootstrapRng))
    — Transforms bootstrap residual sampling into standard RNG for simulation-based
    forecast path generation'
  acceptance_hints:
  - Every forecast variances are finite and non-negative
  - Multi-step variance equals 1-step for first horizon (fixed by ARCH structure)
  - Simulations have correct shape (horizons x simulations x reindex)
  - Bootstrap method respects minimum observation requirements
- id: unitroot_testing
  name: Unit Root & Cointegration Testing
  order: 5
  responsibility: Test time series for stationarity (unit roots) and cross-series
    cointegration relationships. Supports ADF, DFGLS, PhillipsPerron, KPSS, ZivotAndrews,
    VarianceRatio, Engle-Granger, Phillips-Ouliaris, DOLS, FMOLS.
  interface:
    inputs:
    - Time series data (y, optional x for cointegration), lag specification, trend
      specification
    outputs:
    - Test results with stat, pvalue, critical_values, regression results, residual
      series
  required_methods:
  - name: ADF.__init__
    description: Augmented Dickey-Fuller with automatic lag selection via AIC/BIC/t-stat
    evidence: arch/unitroot/unitroot.py:672
  - name: UnitRootTest.stat
    description: Returns the test statistic value
    evidence: arch/unitroot/unitroot.py:490(UnitRootTest)
  - name: CointegrationTestResult.stat
    description: Test statistic for cointegration relationships
    evidence: arch/unitroot/_shared.py:85
  - name: DynamicOLS.__init__
    description: Dynamic OLS cointegrating vector estimation with lead/lag selection
    evidence: arch/unitroot/cointegration.py:453
  key_behaviors:
  - behavior: Pre-computed critical value tables
    description: Simulation-based CVs for ADF/Z, DFGLS, KPSS, Zivot-Andrews, Engle-Granger,
      Phillips-Ouliaris stored as constants for speed
    evidence: arch/unitroot/critical_values/*.py
  - behavior: Lag selection via AIC/BIC/t-stat
    description: Information criteria standard in econometrics; t-stat allows testing
      individual lags
    evidence: arch/unitroot/unitroot.py:147(_select_best_ic)
  - behavior: Covariance kernel for long-run variance
    description: Bartlett/Parzen/QuadraticSpectral kernels; NeweyWest is alias for
      Bartlett
    evidence: arch/covariance/kernel.py:154(CovarianceEstimator)
  replaceable_points:
  - name: Test statistic
    description: Which unit root test to run
    options:
    - name: ADF
      traits:
      - Most common
      - Augmented with lags
      - Three trend specifications
      fit_for:
      - Standard unit root testing
      - General use
      not_fit_for:
      - Structural breaks
      - Very short series
    - name: DFGLS
      traits:
      - GLS-detrended
      - More powerful than ADF
      - Local GLS detrending
      fit_for:
      - When ADF has low power
      - Comparison studies
      not_fit_for:
      - Models with drift/trend
      - Simple testing
    - name: PhillipsPerron
      traits:
      - Non-parametric
      - No lag augmentation
      - Uses Newey-West kernel
      fit_for:
      - Robustness checks
      - When lag selection is problematic
      not_fit_for:
      - Short samples
      - Deterministic components
    - name: KPSS
      traits:
      - 'Null: stationarity'
      - Reversed hypothesis
      - One-sided LM stat
      fit_for:
      - Confirming stationarity
      - Complement to ADF
      not_fit_for:
      - Standard testing workflow
      - Very short series
    - name: ZivotAndrews
      traits:
      - Structural break in trend
      - Endogenous break detection
      - More demanding
      fit_for:
      - Crisis periods
      - Regime changes
      not_fit_for:
      - Simple unit root testing
      - Short samples
    - name: VarianceRatio
      traits:
      - Tests random walk
      - Non-parametric
      - Multiple horizons
      fit_for:
      - Finance applications
      - Random walk hypothesis
      not_fit_for:
      - Non-stationary series
      - Short samples
    default: ADF
  - name: Lag selection method
    description: Automatic lag selection criterion
    options:
    - name: aic
      traits:
      - Consistent asymptotically
      - Lenient penalty
      - Tends to overfit
      fit_for:
      - Large samples
      - Model comparison
      not_fit_for:
      - Small samples
      - When parsimony is preferred
    - name: bic
      traits:
      - Consistent in sample
      - Stronger penalty
      - More parsimonious
      fit_for:
      - Small samples
      - Forecasting applications
      not_fit_for:
      - Large samples
      - When sensitivity is preferred
    - name: t-stat
      traits:
      - Specific lag testing
      - Last lag significance
      - User threshold
      fit_for:
      - Specific models
      - When theory guides lags
      not_fit_for:
      - Automatic selection
      - Quick analysis
    default: aic
  - name: Covariance kernel
    description: Kernel for long-run covariance
    options:
    - name: bartlett
      traits:
      - Default
      - Newey-West equivalent
      - Parzen alias
      fit_for:
      - Standard applications
      - Phillips-Perron tests
      not_fit_for:
      - When Quadratic Spectral is preferred
    - name: parzen
      traits:
      - Alternative kernel
      - Different weighting
      fit_for:
      - Robustness checks
      - Large samples
      not_fit_for:
      - Standard applications
    - name: quadratic_spectral
      traits:
      - Optimal for many statistics
      - More computationally intensive
      fit_for:
      - Phillips-Perron
      - Precise estimation
      not_fit_for:
      - Quick applications
      - Real-time use
    default: bartlett
  design_decisions:
  - 'Trend specification as ''n'',''c'',''ct'',''ctt'' (evidence: arch/_typing.py:67(UnitRootTrend))
    — Standard in econometric literature; ''t'' only for ZivotAndrews'
  acceptance_hints:
  - Test statistic is finite and within reasonable bounds
  - Critical values retrieved match sample size trend specification
  - Lag selection produces non-negative integer lags
- id: bootstrap_inference
  name: Bootstrap & Multiple Comparison
  order: 6
  responsibility: Time-series bootstrap for standard errors/confidence intervals;
    multiple comparison procedures (MCS, StepM, SPA) for model selection. Supports
    block bootstrap (circular, stationary, moving) and independent resampling.
  interface:
    inputs:
    - Data arrays, bootstrap type, block_size/random seed
    outputs:
    - Bootstrap replicates, confidence intervals, p-values, included/excluded model
      sets
  required_methods:
  - name: IIDBootstrap.conf_int
    description: Compute confidence intervals using bootstrap replicates
    evidence: arch/bootstrap/base.py:575
  - name: StationaryBootstrap.__init__
    description: Politis-Romano stationary bootstrap with exponential block lengths
    evidence: arch/bootstrap/base.py:1511
  - name: MCS.__init__
    description: Model Confidence Set (Hansen/Lunde/Nason) for model selection
    evidence: arch/bootstrap/multiple_comparison.py:71
  - name: SPA.__init__
    description: Test of Superior Predictive Ability (White/Hansen); aka Reality Check
    evidence: arch/bootstrap/multiple_comparison.py:500
  key_behaviors:
  - behavior: Block bootstrap for time series
    description: IID bootstrap destroys temporal dependence; block bootstrap preserves
      it
    evidence: arch/bootstrap/base.py:1511(StationaryBootstrap)
  - behavior: Bootstrap clone requires fresh fit data
    description: Cloned bootstrap retains old fit indices; wrong data ranges used
      if old indices persist
    evidence: arch/bootstrap/base.py:844(clone)
  - behavior: BCa requires equal-length datasets
    description: BCa method silently raises error if data lengths differ across args/kwargs
    evidence: arch/bootstrap/base.py:766-773(conf_int)
  - behavior: Optimal block length estimation
    description: PMS bandwidth selection for block size; balances bias/variance in
      bootstrap
    evidence: arch/bootstrap/base.py:126(optimal_block_length)
  replaceable_points:
  - name: Bootstrap type
    description: How to resample data
    options:
    - name: IIDBootstrap
      traits:
      - Simple random resampling
      - Base class
      - Assumes independence
      fit_for:
      - Independent observations
      - Cross-sectional data
      not_fit_for:
      - Time series
      - Autocorrelated data
    - name: IndependentSamplesBootstrap
      traits:
      - Clusters of independent blocks
      - Panel data
      fit_for:
      - Panel data
      - Grouped observations
      not_fit_for:
      - Single time series
      - Serial dependence
    - name: CircularBlockBootstrap
      traits:
      - Block bootstrap with wrap-around
      - Reduces edge effects
      fit_for:
      - Continuous time series
      - Small samples
      not_fit_for:
      - Very short series
      - Discrete data
    - name: StationaryBootstrap
      traits:
      - Politis-Romano
      - Exponential block lengths
      - Stationarity-preserving
      fit_for:
      - Most time series
      - Stationary processes
      not_fit_for:
      - Non-stationary data
      - Structural breaks
    - name: MovingBlockBootstrap
      traits:
      - Fixed block length
      - Overlapping blocks
      fit_for:
      - Known block structure
      - Climate data
      not_fit_for:
      - Unknown block size
      - Very short series
    - name: MOONBootstrap
      traits:
      - Maximum overlapping block
      - Fixed block length
      fit_for:
      - Known block size
      - Large samples
      not_fit_for:
      - Small samples
      - Unknown block structure
    default: IIDBootstrap
  - name: Confidence interval method
    description: CI calculation method
    options:
    - name: basic
      traits:
      - Simple percentile swap
      - Default
      - Most robust
      fit_for:
      - Most applications
      - When robustness is priority
      not_fit_for:
      - When bias correction needed
    - name: percentile
      traits:
      - Direct percentile of replicates
      - Simplest
      fit_for:
      - Large samples
      - Simple applications
      not_fit_for:
      - Bias-prone statistics
      - Small samples
    - name: studentized
      traits:
      - Uses standard error estimate
      - Most accurate
      - Slow
      fit_for:
      - Precise inference
      - Research applications
      not_fit_for:
      - Real-time applications
      - Very slow bootstrap
    - name: norm
      traits:
      - Asymptotic normal
      - Uses param var
      - Fast
      fit_for:
      - Large samples
      - When param var available
      not_fit_for:
      - Small samples
      - Non-normal distributions
    - name: bc
      traits:
      - Bias-corrected
      - Adjusts for median bias
      fit_for:
      - Known bias direction
      - Medium samples
      not_fit_for:
      - When acceleration unknown
      - Very small samples
    - name: bca
      traits:
      - Bias-corrected and accelerated
      - Most sophisticated
      - Requires jackknife
      fit_for:
      - When precision is critical
      - Academic research
      not_fit_for:
      - Very small samples
      - Fast computation needed
    default: basic
  - name: Multiple comparison procedure
    description: Model selection method
    options:
    - name: MCS (Model Confidence Set)
      traits:
      - Hansen/Lunde/Nason
      - Eliminates inferior models
      - P-value based
      fit_for:
      - Forecast comparison
      - Volatility model selection
      not_fit_for:
      - Single model
      - Structural break detection
    - name: StepM (Stepwise)
      traits:
      - Sequential testing
      - Bonferroni-corrected
      fit_for:
      - Nested models
      - Simple comparison
      not_fit_for:
      - Non-nested models
      - Large model sets
    - name: SPA (Superior Predictive Ability)
      traits:
      - White/Hansen Reality Check
      - Tests against benchmark
      - Bootstrap p-value
      fit_for:
      - Against benchmark
      - Finance applications
      not_fit_for:
      - Without benchmark
      - Simple pairwise comparison
    default: None (single model)
  design_decisions:
  - 'BCa confidence intervals by default (evidence: arch/bootstrap/base.py:575(method=''basic''))
    — Basic is simpler; BCa adjusts for bias and acceleration; percentile is most
    robust'
  - 'Common size required by default (evidence: arch/bootstrap/base.py:386(_common_size_required
    = True)) — Every inputs must have same axis-0 length; prevents silent misalignment'
  - 'NumPy Generator default for PRNG (evidence: arch/bootstrap/base.py:404(np.random.default_rng()))
    — Generator is modern NumPy default; better statistical properties than RandomState'
  - 'Bootstrap requires at least 100 observations (evidence: arch/univariate/volatility.py:216(_min_bootstrap_obs
    = 100)) — Too few obs makes bootstrap unreliable; hardcoded threshold'
  acceptance_hints:
  - Bootstrap replicates have correct shape
  - Confidence intervals have correct coverage (asymptotically)
  - MCS produces non-empty superior set
  - Random seed produces reproducible results
- id: results_reporting
  name: Results Reporting & Visualization
  order: 7
  responsibility: Format and display estimation results (summary tables, R², AIC/BIC,
    parameter table with std_err/tvalues/pvalues), residual diagnostics (ARCH-LM test),
    and visualization (hedgehog plots, residual plots).
  interface:
    inputs:
    - ARCHModelResult with fitted params and residuals
    outputs:
    - Summary tables (text/HTML), matplotlib figures, residual diagnostics
  required_methods:
  - name: ARCHModelResult.summary
    description: Formatted summary of estimation results using statsmodels Summary/Table
    evidence: arch/univariate/base.py:1119(_SummaryRepr)
  - name: ARCHModelResult.conf_int
    description: Confidence intervals for parameters at specified alpha level (default
      0.05 for 95% CI)
    evidence: arch/univariate/base.py:1826
  - name: ARCHModelResult.arch_lm_test
    description: ARCH-LM test on standardized residuals to detect remaining ARCH effects
    evidence: arch/univariate/base.py:1701
  - name: WaldTestStatistic
    description: Wald test for linear constraints on parameters
    evidence: arch/utility/testing.py:0
  key_behaviors:
  - behavior: statsmodels Summary/Table for output
    description: Consistent with econometrics ecosystem; HTML tables for Jupyter display
    evidence: arch/univariate/base.py:42-44(statsmodels imports)
  - behavior: ARCH-LM test on std_resid
    description: Tests remaining ARCH effects after fitting; if significant, model
      may be misspecified
    evidence: arch/univariate/base.py:1701(arch_lm_test)
  - behavior: conf_int default alpha=0.05
    description: 95% CI is standard; alpha explicitly configurable for other coverage
      levels
    evidence: arch/univariate/base.py:1826(alpha=0.05)
  replaceable_points:
  - name: Output format
    description: How to display results
    options:
    - name: text summary
      traits:
      - Plain text
      - Console/CLI output
      - Logging compatibility
      fit_for:
      - Terminal output
      - Log files
      - Documentation
      not_fit_for:
      - Jupyter notebooks
      - Web applications
    - name: HTML/IPython
      traits:
      - Rich formatting
      - Jupyter integration
      - statsmodels Table
      fit_for:
      - Jupyter notebooks
      - Reports
      - Web dashboards
      not_fit_for:
      - CLI applications
      - Plain text requirements
    - name: matplotlib plots
      traits:
      - Visualization
      - Hedgehog plots
      - Residual diagnostics
      fit_for:
      - Exploratory analysis
      - Publications
      - Reports
      not_fit_for:
      - Non-interactive environments
      - Simple tabular output
    default: text/IPython
  design_decisions:
  - 'statsmodels Summary/Table for output (evidence: arch/univariate/base.py:42-44(statsmodels
    imports)) — Consistent with econometrics ecosystem; HTML tables for Jupyter'
  acceptance_hints:
  - Summary displays each parameters with std_err, tvalues, pvalues
  - Fit statistics (loglikelihood, AIC, BIC, R²) are correctly computed
  - ARCH-LM test p-value indicates remaining ARCH effects
  - Confidence intervals contain true parameter values at stated coverage
data_flow:
- from_stage: data_input
  to_stage: model_specification
  data: float64 array _y and original y; hold_back, rescale flags
- from_stage: model_specification
  to_stage: parameter_estimation
  data: Starting values from components; bounds from volatility; constraints from
    mean+vol+dist
- from_stage: parameter_estimation
  to_stage: forecasting
  data: Fitted params, residual variance, backcast value, var_bounds
- from_stage: parameter_estimation
  to_stage: results_reporting
  data: ARCHModelResult with params, residuals, volatility, loglikelihood, convergence
    info
- from_stage: bootstrap_inference
  to_stage: results_reporting
  data: Bootstrap p-values, CIs, model selection sets (MCS/SPA/StepM)
- from_stage: unitroot_testing
  to_stage: results_reporting
  data: UnitRootTestResult with stat, pvalue, critical_values, cointegrating vector
- from_stage: forecasting
  to_stage: results_reporting
  data: ARCHModelForecast with mean/variance paths; hedgehog_plot data
global_contracts:
- contract: Every data arrays must be finite (no NaN/inf)
  evidence: arch/univariate/base.py:206-208(np.isfinite check)
- contract: Residuals are mean-zero by construction
  evidence: arch/univariate/mean.py:375(resids method)
- contract: Conditional variance sigma2 >= 0 always
  evidence: arch/univariate/recursions_python.py:43-51(bounds_check)
- contract: 'var_bounds format: (nobs, 2) lower/upper columns'
  evidence: arch/univariate/volatility.py:560(vstack((lower, upper)).T)
- contract: backcast is always positive (sigma2_0 approximation)
  evidence: arch/univariate/volatility.py:626-627(backcast < 0 check)
- contract: Parameters satisfy a.dot(params) - b >= 0 for each constraints
  evidence: arch/univariate/base.py:257(constraints docstring)
- contract: ForecastingMethod is Literal['analytic','simulation','bootstrap']
  evidence: arch/_typing.py:68
- contract: UnitRootTrend is Literal['n','c','ct','ctt']
  evidence: arch/_typing.py:67
- contract: cov_type is Literal['robust','classic']
  evidence: arch/univariate/base.py:622
- contract: align is Literal['origin','target'] for forecast alignment
  evidence: arch/univariate/base.py:996
- contract: 'Parameter ordering: [mean_params, vol_params, dist_params] with computed
    offsets'
  evidence: arch/univariate/base.py:682-683(offsets array)
- contract: 'Loglikelihood computation order: resid -> sigma2 -> distribution.loglikelihood'
  evidence: arch/univariate/base.py:486-495(_loglikelihood)
- contract: fit() MUST be called before forecast() on ARCHModelResult
  evidence: arch/univariate/base.py:1444(ARCHModelResult.forecast) requires params
    from fit()
- contract: Distribution num_params=0 for Normal
  evidence: arch/univariate/distribution.py:366-367(constraints returns empty)
- contract: VolatilityProcess.closed_form=False by default (except ConstantVariance)
  evidence: 'arch/univariate/volatility.py:214(closed_form: bool = False)'
- contract: GARCH power=2.0 defaults to standard GARCH; power!=2.0 blocks analytic
    forecasts
  evidence: arch/univariate/volatility.py:1027(GARCH.__init__),:1268(_check_forecasting_method)
- contract: Bootstrap index is either array, tuple of arrays, or (list, dict) tuple
  evidence: arch/_typing.py:51-55(BootstrapIndexT)
- contract: 'rescale threshold: variance must be in [0.1, 10000) to avoid rescaling'
  evidence: arch/univariate/base.py:311-326(_check_scale)
business_decisions:
- id: BD-001
  type: B/BA
  content: GARCH(1,1) as default volatility model
  rationale: 'GARCH(1,1) provides parsimonious yet effective modeling of volatility
    clustering by capturing the autoregressive nature of squared returns. The default
    configuration (p=1, q=1) balances model flexibility with computational efficiency
    and numerical stability. Boundary: More complex specifications (p=2, q=2) may
    capture longer memory but require larger samples to estimate reliably; EGARCH
    and TARCH provide alternatives for asymmetric and power-transformed volatility
    respectively.'
  evidence: examples/univariate_volatility_modeling.ipynb:124(arch_model)
  stage: model_specification
  alternative_considered: GJR-GARCH(1,1,1) for asymmetric leverage effects; EGARCH
    for log-volatility; FIGARCH for long memory
- id: BD-002
  type: B/BA
  content: Normal (Gaussian) distribution as default error distribution
  rationale: 'Gaussian errors provide tractable likelihood computation and closed-form
    inference while being appropriate for aggregated returns. The default assumes
    symmetry and light tails, which simplifies estimation and forecasting. Boundary:
    Financial returns often exhibit excess kurtosis and skewness; the library supports
    t-distribution, skewed-t, and other distributions as alternatives when empirical
    fat-tails are significant.'
  evidence: examples/univariate_volatility_modeling.ipynb:124(arch_model)
  stage: model_specification
  alternative_considered: Student's t-distribution for heavy tails; skewed-t for asymmetric
    returns; Normal Inverse Gaussian for additional flexibility
  vague_rationale: true
- id: BD-003
  type: B/BA
  content: 100 * pct_change() for returns calculation
  rationale: 'Expressing returns as percentages (multiplying by 100) aligns with financial
    convention where returns are reported as percent rather than decimal, improving
    interpretability and numerical stability in optimization. Boundary: Requires input
    prices to be positive; alternative could use log returns (ln(P_t/P_{t-1})) for
    continuously compounded rates.'
  evidence: examples/univariate_volatility_modeling.ipynb:69(market.pct_change)
  stage: data_input
  alternative_considered: Log returns (100*ln(P_t/P_{t-1})) for multiplicative returns;
    decimal returns for mathematical convenience
- id: BD-004
  type: B/BA
  content: Analytic forecast method as default
  rationale: 'Analytic forecasting provides closed-form multi-step variance forecasts
    without simulation overhead, enabling fast computation of variance matrices. Boundary:
    Analytic method assumes normally distributed innovations and breaks down for non-quadratic
    power specifications (power != 2); simulation-based forecasting is used as fallback
    for such cases.'
  evidence: arch/univariate/volatility.py:700(method='analytic')
  stage: forecasting
  alternative_considered: Simulation-based forecasting for non-quadratic powers; filter-based
    forecasting for complex mean models
  _evidence_issues:
  - 'INVALID_IDENTIFIER: method=''analytic'' in arch/univariate/volatility.py'
- id: BD-005
  type: B/BA
  content: 1000 simulations for simulation/bootstrap forecasting
  rationale: '1000 simulations balance statistical precision against computational
    cost for general-purpose use, providing Monte Carlo standard errors of approximately
    1/sqrt(1000) = 3.2%. Boundary: Extreme quantile estimation (VaR at 99%) may require
    10,000+ simulations for stable tail estimates; this is a minimum viable threshold
    for production workflows.'
  evidence: arch/univariate/volatility.py:701(simulations=1000)
  stage: forecasting
  alternative_considered: 500 simulations for rapid prototyping; 10000+ for production
    risk systems requiring precise tail estimation
  _evidence_issues:
  - 'INVALID_IDENTIFIER: simulations=1000 in arch/univariate/volatility.py'
- id: BD-006
  type: B/BA
  content: EWMA backcast with lambda=0.94 and tau=75
  rationale: 'EWMA backcasting provides a weighted average of initial variance using
    exponential decay (lambda=0.94) over 75 observations, capturing recent volatility
    while providing sufficient history. Boundary: tau=75 represents approximately
    3 months of daily data; smaller tau risks insufficient initialization while larger
    values dilute the exponential weighting scheme.'
  evidence: arch/univariate/volatility.py:3077(variance_bounds)
  stage: initialization
  alternative_considered: Sample variance backcast for equal weighting; ARCH-style
    backcast using early observations
- id: BD-007
  type: B/BA
  content: sqrt(T) as default bootstrap block size
  rationale: 'Square-root of sample size provides a data-adaptive block size that
    scales appropriately across different sample sizes, balancing bias-variance tradeoff
    inherent in block bootstrap methods. Boundary: For highly persistent series (rho
    > 0.95), larger block sizes (T^0.6 or higher) may be needed; for i.i.d. series,
    smaller blocks reduce unnecessary variance inflation.'
  evidence: arch/bootstrap/multiple_comparison.py:43(MultipleComparison.__init__)
  stage: bootstrap_inference
  alternative_considered: Fixed block sizes (e.g., 10, 20) for known persistence levels;
    automatic block length selection via polynomial spectral density estimation
  vague_rationale: true
- id: BD-008
  type: B/BA
  content: Stationary Bootstrap as default for MCS
  rationale: 'Stationary bootstrap with random block lengths preserves the original
    time-series properties while guaranteeing stationarity of resampled sequences,
    making it robust to unknown persistence levels. Boundary: Assumes the underlying
    process is stationary; explosive or non-stationary series will produce misleading
    inference. The random block length selection avoids systematic bias from fixed-block
    methods.'
  evidence: arch/bootstrap/multiple_comparison.py:145(bootstrap='stationary')
  stage: bootstrap_inference
  alternative_considered: Circular bootstrap for smaller samples; fixed-block bootstrap
    when autocorrelation structure is known; moving block bootstrap for block-length
    insensitivity
  _evidence_issues:
  - 'INVALID_IDENTIFIER: bootstrap=''stationary'' in arch/bootstrap/multiple_comparison.py'
- id: BD-009
  type: B/BA
  content: 1000 bootstrap replications for MCS
  rationale: '1000 replications provide adequate precision for eliminating models
    from the MCS at the 10% significance level while remaining computationally tractable
    for routine use. Boundary: Higher confidence levels (99%) or finer model elimination
    thresholds require more replications to achieve stable p-values; 10,000+ replications
    are recommended for production model selection.'
  evidence: arch/bootstrap/multiple_comparison.py:43(MultipleComparison.__init__)
  stage: bootstrap_inference
  alternative_considered: 500 replications for rapid screening; 5000-10000 for high-stakes
    model selection decisions
- id: BD-010
  type: B/BA
  content: AIC as default lag selection criterion for ADF
  rationale: 'Akaike Information Criterion balances model fit against complexity using
    penalty 2k, providing a reasonable default for lag selection that favors parsimony
    over pure likelihood maximization while being less conservative than BIC. Boundary:
    For unit root testing, over-specifying lags reduces power to detect stationarity;
    under-specification leaves residual serial correlation that invalidates inference.'
  evidence: arch/unitroot/unitroot.py:177-178(method='aic')
  stage: model_specification
  alternative_considered: BIC for more parsimonious models; HQIC as intermediate option;
    t-significance approach for sequential testing
  _evidence_issues:
  - 'INVALID_IDENTIFIER: method=''aic'' in arch/unitroot/unitroot.py'
- id: BD-011
  type: B/BA
  content: Constant as default ADF deterministic trend
  rationale: 'Constant-only deterministic specification (no drift, no trend) is appropriate
    for series that are stationary around a fixed mean or difference-stationary processes,
    capturing level shifts without imposing linear time trends. Boundary: Economic
    series with structural trends require ''c'' (constant with drift) or ''ct'' (constant
    with drift and linear trend) to avoid misspecified null distributions.'
  evidence: arch/unitroot/unitroot.py:996(trend)
  stage: model_specification
  alternative_considered: Constant with drift ('c') for trending data; linear time
    trend ('ct') for deterministic growth; no constant ('nc') for de-meaned series
  vague_rationale: true
- id: BD-012
  type: B/BA
  content: Sharpe Ratio annualized with 12 multiplier
  rationale: 'Annualization multiplier of 12 converts monthly excess returns to annual
    equivalents, assuming 12 trading months per year and that returns scale linearly
    with time horizon (valid under i.i.d. assumptions). Boundary: Risk-adjusted performance
    metrics based on squared returns (Sortino, Omega) require different annualization
    factors; sqrt(12) applies when measuring annualized volatility rather than return.'
  evidence: N/A:0(see_rationale)
  stage: risk_metrics
  alternative_considered: sqrt(12) for volatility-only annualization; 252 for daily
    data; 52 for weekly data
- id: BD-013
  type: B/BA
  content: 2500 bootstrap replications for Sharpe ratio
  rationale: '2500 replications provide improved precision for Sharpe ratio inference
    (standard error ~2%) compared to the 1000-replication default, recognizing that
    Sharpe ratio estimation benefits from more simulations due to its ratio statistic
    nature. Boundary: The sampling distribution of ratios has heavier tails than sums,
    requiring more replications for stable percentile estimation, especially at extreme
    quantiles.'
  evidence: N/A:0(see_rationale)
  stage: bootstrap_inference
  alternative_considered: 5000 replications for published research; 10000 for regulatory
    reporting requiring narrow confidence bounds
- id: BD-014
  type: B/DK
  content: Rolling window forecasts with 20 replications
  rationale: '20 rolling window replications provide a sample of forecast paths to
    assess model stability and parameter variation over time without excessive computation.
    Boundary: 20 windows may be insufficient to characterize full out-of-sample distribution
    for model comparison; longer histories allow more windows for robust accuracy
    assessment.'
  evidence: N/A:0(see_rationale)
  stage: forecasting
  alternative_considered: 50-100 windows for model competition; expanding window for
    maximum data efficiency in stable environments
- id: BD-015
  type: B/BA
  content: GJR-GARCH with o=1 captures leverage effect
  rationale: 'GJR-GARCH(1,1) with o=1 models asymmetric volatility by adding a term
    for negative shocks, capturing the empirical observation that market declines
    increase volatility more than equivalent gains. Boundary: The asymmetric parameter
    o is typically bounded [0,1]; o=1 indicates maximum asymmetry while o=0 reduces
    to standard GARCH. Requires sufficient negative observations for reliable estimation.'
  evidence: N/A:0(see_rationale)
  stage: model_specification
  alternative_considered: EGARCH for log-volatility asymmetry; APARCH for power-transformed
    asymmetry; standard GARCH when symmetry is empirically supported
- id: BD-016
  type: B/BA
  content: TARCH (power=1.0) models absolute volatility
  rationale: 'TARCH with power=1.0 models volatility as linear in absolute returns
    rather than squared returns (power=2), capturing volatility clustering differently
    by treating positive and negative shocks symmetrically. Boundary: Power specification
    affects tail behavior and should match empirical return distribution; power=1.0
    aligns with Laplace-based rather than Gaussian likelihoods.'
  evidence: N/A:0(see_rationale)
  stage: model_specification
  alternative_considered: Power=2 for standard GARCH; power=1.5 for intermediate tail
    behavior; estimated power for data-driven specification
- id: BD-017
  type: B/BA
  content: Student's T distribution for heavy-tailed returns
  rationale: 'Student''s t-distribution with estimated degrees of freedom (typically
    4-12 for financial returns) captures excess kurtosis common in return distributions,
    producing fatter tails and more realistic risk measures. Boundary: Lower degrees
    of freedom (nu < 5) indicate extreme tails requiring careful optimization; nu
    > 30 approaches normality. t-distribution assumes symmetric tails.'
  evidence: N/A:0(see_rationale)
  stage: model_specification
  alternative_considered: Skewed-t for asymmetric heavy tails; Normal Inverse Gaussian
    for flexible tail behavior; Generalized Error Distribution for intermediate cases
- id: BD-018
  type: B
  content: R-squared adjusted for degrees of freedom
  rationale: 'Adjusted R-squared penalizes model complexity by adjusting for the number
    of regressors, preventing spurious improvement from adding irrelevant variables
    and enabling fair model comparison. Boundary: Adjusted R-squared can become negative
    when the null model (intercept only) fits better than the specified model, indicating
    misspecification.'
  evidence: arch/univariate/base.py:2012-2019(rsquared_adj)
  stage: model_specification
  alternative_considered: Raw R-squared for nested model comparison; AIC/BIC for out-of-sample
    prediction; cross-validated R-squared for forecasting accuracy
- id: BD-019
  type: B
  content: Two-sided p-values using normal SF
  rationale: 'Two-sided p-values using survival function (2*SF) test parameter significance
    by measuring probability of observing more extreme values under the null, appropriate
    for testing whether coefficients differ from zero. Boundary: One-sided tests are
    more powerful when direction is specified a priori; robust standard errors may
    require bootstrap p-values for valid inference in misspecified models.'
  evidence: arch/univariate/base.py:2026(module)
  stage: bootstrap_inference
  alternative_considered: One-sided p-values for directional hypotheses; bootstrap
    p-values for robust inference; heteroskedasticity-consistent standard errors
  _evidence_issues:
  - 'FN_NOT_FOUND: module in arch/univariate/base.py'
  vague_rationale: true
- id: BD-020
  type: B
  content: 3-d array for multiple exogenous variable forecasts
  rationale: '3-dimensional arrays (replications x horizons x variables) provide a
    complete representation of multivariate forecast distributions, enabling full
    covariance estimation and portfolio-level risk aggregation. Boundary: Memory requirements
    grow cubically with replication count and horizon; sparse representations may
    be needed for high-dimensional systems.'
  evidence: N/A:0(see_rationale)
  stage: forecasting
  alternative_considered: 2D arrays for single-horizon forecasts; dictionary structures
    for variable-labeled storage; xarray for labeled multi-dimensional data
- id: BD-021
  type: B
  content: Bollerslev-Wooldridge robust covariance estimator
  rationale: 'Bollerslev-Wooldridge robust standard errors correct for ARCH effects
    in the squared residuals, providing valid inference even when conditional heteroskedasticity
    is present but misspecified in the mean equation. Boundary: Robust standard errors
    require larger samples to converge; when volatility is correctly specified, standard
    errors are more efficient.'
  evidence: arch/univariate/mean.py:84(module)
  stage: parameter_estimation
  alternative_considered: Sandwich estimators for general misspecification; bootstrap
    standard errors for small samples; maximum likelihood standard errors when model
    is correctly specified
  _evidence_issues:
  - 'FN_NOT_FOUND: module in arch/univariate/mean.py'
- id: BD-022
  type: B/BA
  content: EWMA decay parameter 0.94 for variance bounds
  rationale: 'EWMA decay parameter lambda=0.94 follows RiskMetrics convention, implying
    a half-life of approximately 11 days for the weighting scheme, balancing responsiveness
    to recent volatility with stability. Boundary: Higher lambda (0.96-0.99) gives
