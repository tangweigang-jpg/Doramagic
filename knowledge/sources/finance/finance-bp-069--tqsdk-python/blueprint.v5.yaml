  design_decisions:
  - 'SimTradeBase uses 8 abstract methods for extensibility - Separates generic matching logic from asset-type-specific
    calculations (margin, fees, settlement). Evidence: tqsdk/tradeable/sim/trade_base.py:58-106'
  - 'Market orders match at counterparty price; limit orders at limit price - Standard exchange matching
    semantics; prevents adverse selection on market orders. Evidence: tqsdk/tradeable/sim/trade_base.py:256(match_order)'
  - 'All-or-nothing fills in simulation (no partial fills) - Simplifies backtest logic; real exchanges
    have partial fills but simulation prioritizes simplicity. Evidence: tqsdk/tradeable/sim/tqsim.py:26(__init__)'
  - 'Stock sell includes stamp tax (0.1%), buy only has commission - China A-share tax rules: stamp tax
