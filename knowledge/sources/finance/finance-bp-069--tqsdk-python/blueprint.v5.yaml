      pattern
    evidence: tqsdk/tradeable/tradeable.py:12(__init__)
  - behavior: Memory-address-based identity key
    description: _account_key = str(id(self)) ensures unique identity per object; changes across process
      restarts affecting cross-process lookups
    evidence: tqsdk/tradeable/tradeable.py:18(_get_account_key)
  - behavior: Multi-account order routing via _is_self_trade_pack
    description: _is_self_trade_pack filters orders by account_key; each Tradeable only processes its
