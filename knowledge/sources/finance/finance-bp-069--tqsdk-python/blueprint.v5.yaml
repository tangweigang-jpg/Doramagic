replaceable_slots:
- id: slot-001
  name: market_data_source
  description: This is the only data source built into TqSdk. The _md_url can be overridden via TQ_MD_URL
    env var or constructor params.
  used_in_stages: []
  options:
  - name: ShinnyTech Market Data Gateway (default)
    traits:
    - real-time
    - tick-level
    - historical-klines
    - multi-asset
    - china-futures-focused
    fit_for:
    - Standard futures/options/stock trading with ShinnyTech account
    not_fit_for:
    - Non-Chinese markets, users who want to use their own data feed
  default: ShinnyTech Market Data Gateway
  _source: worker_resource
- id: slot-002
  name: trading_account_type
  description: 'Choose based on: (1) whether real trading or simulation, (2) broker support, (3) compliance
    requirements, (4) latency needs, (5) professional tier access'
  used_in_stages: []
  options:
  - name: TqAccount (standard broker via ShinnyTech relay)
    traits:
    - standard
    - relay-based
    - ctp
    - supports-90%-brokers
    fit_for:
    - Users with standard futures accounts at CTP-enabled brokers
    not_fit_for:
    - Direct CTP, proprietary desks, capital management accounts
  - name: TqSim / TqSimStock (local simulation)
    traits:
    - simulated
    - no-real-broker
    - match-engine
    - all-assets
    fit_for:
    - Backtesting, strategy development, paper trading
    not_fit_for:
    - Production trading
  - name: TqKq / TqKqStock (KuaiQi simulation)
    traits:
    - simulated
    - broker-simulated
    - shinnytech-backend
    fit_for:
    - Simulated trading with realistic fills via ShinnyTech
    not_fit_for:
    - Direct exchange access
  - name: TqCtp (direct CTP connection)
    traits:
    - direct-ctp
    - no-relay
    - high-frequency
    - compliance
    fit_for:
    - HFT traders, users needing direct exchange access, compliance reporting
    not_fit_for:
    - Non-CTP brokers, users without CTP authorization
  - name: TqRohon (融航资管)
    traits:
    - capital-management
    - rohon-backend
    fit_for:
    - Traders using Ronghang capital management system
    not_fit_for:
    - Non-Ronghang users
  - name: TqJees (杰宜斯资管)
    traits:
    - capital-management
    - jees-backend
    fit_for:
    - Traders using Jees capital management system
    not_fit_for:
    - Non-Jees users
  - name: TqYida (易达高速柜台)
    traits:
    - high-speed-counter
    - yida-backend
    fit_for:
    - High-frequency traders needing low-latency fills
    not_fit_for:
    - Standard users
  - name: TqTradingUnit (众期交易单元)
    traits:
    - sub-account
    - zhongsure-backend
    - multi-strategy
    fit_for:
    - Multi-strategy operations, sub-account isolation
    not_fit_for:
    - Standard single-account trading
  default: TqSim (local simulation)
  _source: worker_resource
- id: slot-003
  name: authentication_provider
  description: TqAuth is mandatory for real-time market data. Auth URL can be overridden via TQ_AUTH_URL
    env var.
  used_in_stages: []
  options:
  - name: ShinnyTech TqAuth (default)
    traits:
    - oauth2
    - password-grant
    - jwt-tokens
    - feature-grants
    fit_for:
    - Every users with ShinnyTech (快期) accounts
    not_fit_for:
    - Users wanting to avoid ShinnyTech account dependency
  default: ShinnyTech TqAuth
  _source: worker_resource
- id: slot-004
  name: http_client
  description: Both are core dependencies and are used for different purposes. requests for blocking auth/HTTP
    calls, aiohttp for async data queries and web server.
  used_in_stages: []
  options:
  - name: requests (synchronous HTTP)
    traits:
    - sync
    - blocking
    - connection-pooling
    fit_for:
    - Synchronous API calls (auth, broker config, calendar downloads)
    not_fit_for:
    - Async code paths that need non-blocking HTTP
  - name: aiohttp (asynchronous HTTP)
    traits:
    - async
    - non-blocking
    - websocket-server
    fit_for:
    - Async data queries (settlement, rankings, EDB), web GUI server
    not_fit_for:
    - Sync-only environments
  default: Both used in parallel (requests for sync, aiohttp for async)
  _source: worker_resource
- id: slot-005
  name: websocket_library
  description: websockets is the only WebSocket client used. Version compatibility handling is in connect.py.
  used_in_stages: []
  options:
  - name: websockets (Python websockets library)
    traits:
    - async
    - wss
    - wss-compression
    - backpressure
    fit_for:
    - Every real-time market and trading connections
    not_fit_for:
    - Python <3.8
  default: websockets
  _source: worker_resource
- id: slot-006
  name: web_gui_renderer
  description: Web GUI is optional (enabled via web_gui=True). Static assets are embedded in tqsdk/web/.
    aiohttp serves them locally.
  used_in_stages: []
  options:
  - name: Embedded Vue.js SPA (default)
    traits:
    - vue.js
    - d3.js
    - offline-capable
    - static-files
    fit_for:
    - Local visualization without external dependencies
    not_fit_for:
    - Users wanting custom UI or cloud-hosted dashboards
  default: Embedded Vue.js SPA
  _source: worker_resource
- id: slot-007
  name: trading_day_calendar
  description: Determines trading days for backtesting and session management. Can be overridden via TQ_CHINESE_HOLIDAY_URL.
  used_in_stages: []
  options:
  - name: ShinnyTech Chinese Holiday Calendar (default)
    traits:
    - china-holidays
    - cached
    - annual-updates
    fit_for:
    - Every Chinese futures/stock trading strategies
    not_fit_for:
    - Non-Chinese markets
  default: ShinnyTech Chinese Holiday Calendar
  _source: worker_resource
