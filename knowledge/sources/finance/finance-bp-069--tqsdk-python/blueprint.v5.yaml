  content: Simulation accounts support numbered sub-accounts 1-99, where each number represents a completely
    independent data environment
  rationale: Fixed range (1-99) balances usability with resource management; enables parallel strategy
    testing; breaks when more than 99 independent environments needed or when sub-account state needs
    to be shared across numbers
  evidence: tqsdk/tradeable/otg/tqkq.py:14(__init__), tqsdk/tradeable/otg/tqkq.py:102(__init__)
  stage: business
  alternative_considered: Dynamic allocation was rejected for predictability
  _evidence_issues:
  - 'INVALID_IDENTIFIER: __init__), tqsdk/tradeable/otg/tqkq.py:102(__init__ in tqsdk/tradeable/otg/tqkq.py'
- id: BD-GAP-005
  type: B/BA
  content: Direct CTP broker connections (TqCtp, TqYida, TqJees, TqRohon) require explicit app_id and
    auth_code parameters beyond standard credentials
  rationale: AppID/auth_code enforces vendor-level authentication for institutional-grade trading; breaks
    when broker updates auth requirements without SDK update or when auth codes expire and cannot be refreshed
    programmatically
  evidence: tqsdk/tradeable/otg/tqctp.py:14(__init__), tqsdk/tradeable/otg/tqyida.py:14(__init__)
  stage: business
  alternative_considered: Broker-hosted auth was rejected for data sovereignty
  _evidence_issues:
  - 'INVALID_IDENTIFIER: __init__), tqsdk/tradeable/otg/tqyida.py:14(__init__ in tqsdk/tradeable/otg/tqctp.py'
- id: BD-GAP-006
  type: B
  content: Stock simulation (TqKqStock) is gated behind professional tier requiring trial application
    or purchase, unlike futures simulation which is freely available
  rationale: Revenue protection for stock trading features which have higher commercial value; breaks
    when competitive pressure forces stock sim to be free or when professional tier pricing becomes uncompetitive
  evidence: tqsdk/tradeable/otg/tqkq.py:102(__init__)
  stage: business
  alternative_considered: Freemium model with limited contracts was rejected
- id: BD-GAP-007
  type: T
  content: WebSocket protocol (ws://) chosen for 众期 broker connection instead of raw TCP like other CTP-based
    brokers
  rationale: WebSocket provides NAT traversal, firewall friendliness, and browser compatibility advantages;
    breaks when WebSocket overhead impacts low-latency trading or when broker infrastructure fails to
    handle WebSocket connections at scale
  evidence: tqsdk/tradeable/otg/tqzq.py:14(__init__)
  stage: architecture
  alternative_considered: Raw TCP rejected for firewall compatibility
- id: BD-GAP-008
  type: B/BA
  content: Sub-account tags default to calling filename plus account_id, enabling automatic strategy attribution
    in multi-account trading
  rationale: Zero-configuration tagging reduces operational overhead for strategy management; breaks when
    multiple strategies run from same file or when filename changes invalidate historical attribution
  evidence: tqsdk/tradeable/otg/tqtradingunit.py:16(__init__)
  stage: business
  alternative_considered: UUID-based tags were rejected for human readability
- id: BD-GAP-009
  type: T
  content: 'Login process split into three-stage flow: _account_info → _account_auth → _send_login_pack,
    allowing per-broker customization at each stage'
  rationale: Staged authentication allows broker-specific quirks to be handled without protocol pollution;
    breaks when brokers require stateful multi-step auth or when auth stages have circular dependencies
  evidence: tqsdk/tradeable/otg/base_otg.py:66(_account_info), tqsdk/tradeable/otg/base_otg.py:74(_send_login_pack)
  stage: architecture
  alternative_considered: Single unified login was rejected for flexibility
  _evidence_issues:
  - 'INVALID_IDENTIFIER: _account_info), tqsdk/tradeable/otg/base_otg.py:74(_send_login_pack in tqsdk/tradeable/otg/base_otg.py'
- id: BD-GAP-010
  type: T
  content: TCP:// protocol format enforced for CTP broker front_url, ensuring compatibility with CTP middleware
    infrastructure
  rationale: CTP protocol specification requires TCP transport; breaks when brokers migrate to TLS or
    WebSocket without SDK update
  evidence: tqsdk/tradeable/otg/tqctp.py:14(__init__)
  stage: architecture
  alternative_considered: HTTP/S tunnel rejected for latency
