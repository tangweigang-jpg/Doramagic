# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-069
name: TqSdk
sop_version: '3.6'
source:
  projects:
  - tqsdk-python
  commit_hash: a3dc0392e466d2551a68989af411d8a10831b386
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: quantitative_trading_strategy_development
  description: Python library for building quantitative trading strategies with full-stack support from
    historical data and real-time quotes to backtesting, simulation, and live trading across futures,
    options, and stocks.
  prerequisites: Python 3.8+ programming, basic understanding of financial market instruments (futures,
    options, stocks), concept of trading orders (market/limit, buy/sell, open/close)
  not_suitable_for: Non-quantitative trading, HFT requiring microsecond latency, direct exchange connectivity
    without TqSdk gateways, trading outside China A-share and futures markets
  activation:
    triggers:
    - User mentions TqSdk, TqApi, TqAuth
    - User mentions TqAccount, TqKq, TqKqStock, TqSim, TqSimStock, TqMultiAccount
    - User mentions TqBacktest, TargetPosTask, TargetPosScheduler
    - User mentions DataDownloader
    - User mentions market data, K-line, tick, historical data
    - User mentions positions, trades, orders, account data
    - User mentions order placement, cancellation, position adjustment
    - User mentions field meanings, wait_update, debugging
    - 'Chinese terms: 行情, K线, 历史数据, 持仓, 成交, 委托, 账户, 下单, 撤单, 调仓, 字段含义, 报错'
    emphasis:
    - Use ESPECIALLY when the user is confused by missing data, stale fields, or orders not leaving the
      client
    - Use ESPECIALLY when the user asks about wait_update or is_changing
    - Use ESPECIALLY when the user mixes futures and stock workflows
    - Use ESPECIALLY when the user hits common TqSdk errors like '需要指定账户实例 account'
    anti_skip:
    - Don't skip the account-type matrix even if the user didn't ask explicitly - wrong account type causes
      most issues
    - Don't skip explaining wait_update() even if the user didn't ask - it's the root cause of many problems
    - Don't skip futures vs stock distinction even for simple examples - mixing them causes offset and
      object-type errors
stages:
- id: connection
  name: WebSocket Connection Management
  order: 1
  responsibility: Manages WebSocket connections to market data and trade gateways with automatic reconnection
    and data synchronization. Provides reliable network transport layer ensuring continuous data flow
    between TqSdk and external gateways.
  interface:
    inputs: WebSocket URLs for MD/TD gateways, connection credentials
    outputs: Market data packets (quotes, K-lines, ticks), Trade confirmation packets (fills, order status)
  required_methods:
  - name: TqConnect.send
    description: Sends data packets through WebSocket channel to connected gateway
    evidence: tqsdk/connect.py:75(TqConnect)
  - name: TqConnect.receive
    description: Receives data packets from WebSocket channel for local processing
    evidence: tqsdk/connect.py:75(TqConnect)
  - name: TqReconnect.reconnect
    description: Executes reconnection logic with state recovery to resume after network failure
    evidence: tqsdk/connect.py:252(TqReconnect)
  - name: MdReconnectHandler._is_all_received
    description: Verifies each expected market data was received before resuming to prevent gaps
    evidence: tqsdk/connect.py:325(_is_all_received)
  - name: TdReconnectHandler._is_all_received
    description: Checks trade_more_data flag to ensure trade completeness before resuming
    evidence: tqsdk/connect.py:404(_is_all_received)
  key_behaviors:
  - behavior: Entity-level isolation
    description: Separate MdReconnectHandler and TdReconnectHandler maintain independent state for market
      data and trading connections, allowing independent reconnection cycles
    evidence: tqsdk/connect.py:338-431(MdReconnectHandler,TdReconnectHandler)
  - behavior: Completeness verification before resume
    description: Reconnect handlers track received data sequence numbers and verify full state recovery
      before resuming operation, preventing data gaps after reconnection
    evidence: tqsdk/connect.py:325(_is_all_received)
  - behavior: Trade transactional integrity
    description: TdReconnectHandler uses trade_more_data flag from server for explicit completeness acknowledgment
      since trade data is transactional
    evidence: tqsdk/connect.py:404(_is_all_received)
  replaceable_points:
  - name: ReconnectStrategy
    description: Custom reconnection behavior when network failure occurs
    options:
    - name: default
      traits:
      - Automatic retry with exponential backoff
      - State recovery from last checkpoint
      fit_for:
      - Production environments with intermittent connectivity
      - Standard usage scenarios
      not_fit_for:
      - Low-latency critical applications
      - Environments requiring custom retry policies
    - name: custom_handler
      traits:
      - User-defined reconnection logic
      - Custom backoff or circuit breaker patterns
      fit_for:
      - Advanced users needing custom reconnection behavior
      - Integration with external monitoring
      not_fit_for:
      - Standard production use
      - Users unfamiliar with TqSdk internals
    default: default
  design_decisions:
  - 'Reconnect handlers track received data to ensure completeness before resuming - Prevents data loss
    during reconnection by verifying full data state was received. Evidence: tqsdk/connect.py:325(_is_all_received)'
  - 'TdReconnectHandler checks trade_more_data flag for completeness - Trade data requires explicit completeness
    signal due to transactional nature. Evidence: tqsdk/connect.py:404(_is_all_received)'
  - 'Separate MdReconnectHandler and TdReconnectHandler with different completeness criteria - MD and
    TD have different consistency requirements; MD can infer completeness from data, TD requires server
    acknowledgment. Evidence: tqsdk/connect.py:338-431'
  acceptance_hints:
  - WebSocket connections established successfully to both MD and TD gateways
  - Reconnection occurs transparently after network interruption without data loss
  - Market data packets arrive in correct order without gaps
  - Trade confirmations are not duplicated after reconnection
- id: data_management
  name: In-Memory Data Store & Diff Protocol
  order: 2
  responsibility: Maintains unified in-memory data store with incremental diff updates and update notifications.
    Acts as central data hub where each business entities (quotes, positions, orders) are stored and updated
    via path-based diff protocol.
  interface:
    inputs: Diff packets from upstream modules (connection stage for live data, market_data_simulation
      for backtest data)
    outputs: Updated Entity objects accessible via path-based access, update notifications via TqChan
      channels
  required_methods:
  - name: Entity.__getitem__
    description: Access entity data with path-based syntax like data['trade']['accounts']['CNY']
    evidence: tqsdk/entity.py:10(Entity)
  - name: Quote.last_price
    description: Returns last traded price for market data, defaults to float('nan') when no trade occurred
    evidence: tqsdk/objs.py:61(last_price)
  - name: Position.orders
    description: Returns only ALIVE status orders affecting current position state
    evidence: tqsdk/objs.py:446(orders)
  - name: Order.trade_records
    description: Returns each trade records associated with this order
    evidence: tqsdk/objs.py:458(Order)
  key_behaviors:
  - behavior: Path-based hierarchical access
    description: Entity inherits MutableMapping providing both dict-like iteration and nested path access,
      enabling data['trade']['accounts']['CNY'] syntax
    evidence: tqsdk/entity.py:10(__init__)
  - behavior: Lazy nested instantiation
    description: _instance_entity creates nested Entity on first access, preventing circular references
      while maintaining tree structure
    evidence: tqsdk/objs.py:161(_instance_entity)
  - behavior: All-tick capture for backtest fidelity
    description: Quote uses last_only=False to capture each updates, not just latest, ensuring proper
      backtest accuracy
    evidence: tqsdk/objs.py:16(__init__)
  - behavior: NaN-aware price handling
    description: Quote.last_price defaults to float('nan') requiring nan-check before price comparisons;
      any code comparing without check produces unexpected results
    evidence: tqsdk/objs.py:61(last_price)
  replaceable_points:
  - name: DataStorage
    description: Alternative storage backend for business data persistence
    options:
    - name: in-memory
      traits:
      - Zero latency access
      - Automatic cleanup
      - No serialization overhead
      fit_for:
      - Real-time trading
      - Backtesting
      - Development and testing
      not_fit_for:
      - Long-running processes needing persistence
      - Crash recovery requirements
    - name: persisted
      traits:
      - Durable storage
      - Crash recovery
      - State inspection
      fit_for:
      - Long-running production systems
      - Audit requirements
      not_fit_for:
      - Low-latency requirements
      - Simple deployment scenarios
    default: in-memory
  design_decisions:
  - 'Entity inherits MutableMapping for dict-like access with path tracking - Enables both dict syntax
    and hierarchical path access like data[''trade''][''accounts''][''CNY'']. Evidence: tqsdk/entity.py:10(__init__)'
  - '_instance_entity creates nested Entity on first access - Lazy instantiation of nested structures;
    prevents circular references while maintaining tree structure. Evidence: tqsdk/objs.py:161(_instance_entity)'
  - 'Quote uses last_only=False for channel to capture each updates - Market data requires each ticks,
    not just latest, for proper backtest fidelity. Evidence: tqsdk/objs.py:16(__init__)'
  - 'Position.orders() returns only ALIVE status orders - Only active orders affect current position state;
    finished orders are historical. Evidence: tqsdk/objs.py:446(orders)'
  - 'Quote.last_price defaults to float(''nan'') - Any code comparing last_price without nan check will
    produce unexpected results. Evidence: tqsdk/objs.py:61(last_price)'
  acceptance_hints:
  - Data structures accessible via both index and path syntax
  - Diff updates modify only changed paths without full object replacement
  - NaN checks required for price comparisons work correctly
  - Position.orders() excludes FINISHED orders
- id: api_layer
  name: API Entry Point & Task Scheduling
  order: 3
  responsibility: Main user-facing API with event loop management and task coordination. Central coordinator
    that manages connections, data flow, and scheduling between each components, providing single-threaded
    deterministic execution.
  interface:
    inputs: User strategy code, account configuration, optional backtest/replay parameters
    outputs: Data updates triggered by market changes, chart data for visualization, performance reports
  required_methods:
  - name: TqApi.wait_update
    description: Blocks until data changes or deadline reached, core event loop driving strategy execution
    evidence: tqsdk/api.py:1960(wait_update)
  - name: TqApi.get_quote
    description: Subscribes to market data for specified symbol, returns Quote object
    evidence: tqsdk/api.py:92(TqApi)
  - name: TqApi.get_position
    description: Returns current position for account and optional symbol
    evidence: tqsdk/api.py:92(TqApi)
  - name: TqApi.insert_order
    description: Submits trading order with risk rule validation
    evidence: tqsdk/api.py:1277(account._check_valid)
  - name: TqApi.copy
    description: Creates thread-safe API clone with shared _data for multi-threaded strategies
    evidence: tqsdk/api.py:333(copy)
  key_behaviors:
  - behavior: Single-threaded deterministic execution
    description: Single TqApi instance per thread with _run_until_idle bridges sync/async code; synchronous
      code runs to idle before async tasks proceed
    evidence: tqsdk/baseApi.py:85(_run_until_idle)
  - behavior: Event-driven reaction model
    description: wait_update() blocks until data changes or deadline; strategy code reacts to market changes,
      not polls
    evidence: tqsdk/api.py:1960(wait_update)
  - behavior: Risk rule enforcement via hook pattern
    description: TqApi.insert_order triggers risk rule _could_insert_order/_on_insert_order hooks before
      order submission
    evidence: tqsdk/api.py:1277(account._check_valid)
  - behavior: Multi-account explicit parameter requirement
    description: Multi-account mode requires explicit account parameter on each trading operations; omitting
      raises Exception
    evidence: tqsdk/api.py:1277(self._account._check_valid)
  replaceable_points:
  - name: AccountType
    description: Trading account type for connection and order routing
    options:
    - name: TqSim
      traits:
      - Local simulation
      - No real connectivity
      - Instant order matching
      fit_for:
      - Strategy development
      - Backtesting
      - Learning
      not_fit_for:
      - Production trading
      - Real money
    - name: TqAccount
      traits:
      - Real exchange connection
      - CTP protocol
      - Full trading functionality
      fit_for:
      - Production futures trading
      - Real account management
      not_fit_for:
      - Backtesting
      - Learning without risk
    - name: TqKq
      traits:
      - 快期模拟账户
      - Simulated broker with real-like interface
      fit_for:
      - Testing before real trading
      - API compatibility testing
      not_fit_for:
      - Actual profit/loss
    - name: TqMultiAccount
      traits:
      - Multiple account coordination
      - Unified interface across accounts
      fit_for:
      - Multi-account strategies
      - Portfolio management
      not_fit_for:
      - Single account scenarios
    default: TqSim
  - name: DataMode
    description: Historical data access mode for backtesting or live
    options:
    - name: streaming
      traits:
      - Real-time updates
      - Continuous data flow
      fit_for:
      - Live trading
      - Real-time monitoring
      not_fit_for:
      - Historical analysis only
    - name: historical
      traits:
      - Historical data access
      - Backtest mode
      fit_for:
      - Backtesting
      - Historical analysis
      not_fit_for:
      - Real-time trading
    default: streaming
  design_decisions:
  - 'Single TqApi instance per thread with _run_until_idle for sync/async bridge - Ensures deterministic
    execution; synchronous code runs to idle before async tasks proceed. Evidence: tqsdk/baseApi.py:85(_run_until_idle)'
  - 'wait_update() blocks until data changes or deadline - Core event loop; strategy code reacts to market
    changes, not polls. Evidence: tqsdk/api.py:1960(wait_update)'
  - '_stock=True default enables stock support - Stock trading is increasingly common; enables by default
    but can be disabled for speed. Evidence: tqsdk/api.py:103(__init__)'
  - 'TqChan._level controls logging verbosity - Internal channel traffic can flood logs; level-based filtering.
    Evidence: tqsdk/channel.py:17(__init__)'
  - 'TargetPosTask singleton per account+symbol prevents conflicting orders - Multiple TargetPosTask for
    same symbol would issue conflicting orders; singleton enforces mutual exclusion. Evidence: tqsdk/lib/target_pos_task.py:22(TargetPosTaskSingleton)'
  - 'set_target_volume must precede cancel/insert order calls in same wait_update cycle - Calling cancel/insert
    before set_target_volume breaks target position logic. Evidence: tqsdk/lib/target_pos_task.py:180-240(_fill_and_check)'
  acceptance_hints:
  - TqApi instance created successfully with specified account type
  - wait_update() returns after data changes, not on timer alone
  - Orders submitted via insert_order() pass through risk rules
  - Multi-account operations require explicit account parameter
- id: market_data_simulation
  name: Market Data Simulation & Backtest
  order: 4
  responsibility: Generates historical market data for backtesting with time advancement and K-line synthesis.
    Provides tick-level and K-line-level backtesting engine with dividend adjustment and continuous contract
    mapping.
  interface:
    inputs: Historical data requests, trading calendar, quote subscription requests from order_execution
    outputs: Synthesized quotes and K-lines aligned to backtest time, BtQuote diffs for data_management
  required_methods:
  - name: TqBacktest.run
    description: Executes time-driven backtest with event-driven time advancement
    evidence: tqsdk/backtest/backtest.py:31(TqBacktest)
  - name: TqReplay.run
    description: Live replay server with adjustable speed for live-like experience
    evidence: tqsdk/backtest/replay.py:18(TqReplay)
  - name: BtQuote.datetime
    description: Time-aware quote access returning backtest current time
    evidence: tqsdk/backtest/backtest.py:24(BtQuote)
  - name: TqBacktest._generator_diffs
    description: Generates diff packets with keep_current parameter for time-paused state queries
    evidence: tqsdk/backtest/backtest.py:331(_generator_diffs)
  key_behaviors:
  - behavior: Event-driven time advancement
    description: Backtest jumps to next event for efficiency; Replay uses continuous time advancement
      for live-like experience
    evidence: tqsdk/backtest/replay.py:21(__init__)
  - behavior: K-line synthesis from ticks
    description: K-lines generated from tick data with min_period determination ensuring high/low/close
      come from same tick when subscribed to multiple timeframes
    evidence: tqsdk/backtest/backtest.py:735(_get_quote_diffs_from_kline)
  - behavior: Continuous contract mapping
    description: TqBacktestContinuous provides continuous mapping for main-continuous contracts (KQ.m@*)
      needing symbol substitution over time
    evidence: tqsdk/backtest/utils.py:14(TqBacktestContinuous)
  - behavior: Graceful dividend service fallback
    description: TqBacktestDividend falls back to quote data on service failure, ensuring backtest runs
      even if dividend service unavailable
    evidence: tqsdk/backtest/utils.py:64(_get_dividend)
  replaceable_points:
  - name: TimeGenerator
    description: Time advancement strategy during backtest
    options:
    - name: event-driven
      traits:
      - Jump to next event
      - Maximum efficiency
      - No wasted iterations
      fit_for:
      - Fast backtesting
      - Historical optimization
      not_fit_for:
      - Real-time simulation
      - Debugging time progression
    - name: fixed-interval
      traits:
      - Fixed time step
      - Predictable progression
      fit_for:
      - Fixed-frequency strategies
      - Educational purposes
      not_fit_for:
      - Efficient backtesting
      - Large historical datasets
    default: event-driven
  - name: DataSource
    description: Historical data provider for backtest
    options:
    - name: server
      traits:
      - Live server connection
      - Latest data always available
      fit_for:
      - Online backtesting
      - Recent historical periods
      not_fit_for:
      - Offline backtesting
      - Air-gapped environments
    - name: cached
      traits:
      - Local data cache
      - Offline capable
      fit_for:
      - Offline backtesting
      - Repeated backtests
      not_fit_for:
      - Latest data requirements
      - First-time backtests
    default: server
  design_decisions:
  - 'Backtest is time-driven (event-driven), Replay is time-driven with speed control - Replay needs continuous
    time advancement for live-like experience; Backtest optimizes by jumping to next event. Evidence:
    tqsdk/backtest/replay.py:21(__init__)'
  - '_generator_diffs with keep_current parameter controls time advancement - User tasks can request time-paused
    updates for efficient state queries. Evidence: tqsdk/backtest/backtest.py:331(_generator_diffs)'
  - 'K-lines generated from tick data with min_period determination - Ensures K-line high/low/close come
    from same tick when subscribed to multiple timeframes. Evidence: tqsdk/backtest/backtest.py:735(_get_quote_diffs_from_kline)'
  - 'TqBacktestContinuous provides continuous mapping for historical backtests - Main-continuous contracts
    (KQ.m@*) need symbol substitution over time. Evidence: tqsdk/backtest/utils.py:14(TqBacktestContinuous)'
  - 'Sim backtest requires insert_order → wait_update → settlement cycle ordering - Skipping settlement
    breaks next trading day''s position and margin calculations. Evidence: tqsdk/tradeable/sim/basesim.py:1-489(_handle_insert_order,_on_settle)'
  acceptance_hints:
  - Backtest produces deterministic results on repeated runs
  - K-lines aligned with tick data without cross-bar contamination
  - Continuous contracts map correctly to front-month
  - Dividend adjustments applied for stock backtests
- id: trading_algorithms
  name: Trading Algorithms & Position Management
  order: 5
  responsibility: Implements algorithmic trading execution (TWAP, VWAP, TargetPos) with automatic order
    management. Maintains target positions and generates/chases orders to achieve desired positions over
    time.
  interface:
    inputs: Target position settings from strategy, time schedule (for scheduled algorithms), market data
      from data_management
    outputs: Executed orders, fill records, algorithm status updates to order_execution
  required_methods:
  - name: TargetPosTask.set_target_volume
    description: Sets target position volume; subsequent wait_update() triggers execution
    evidence: tqsdk/lib/target_pos_task.py:76(__init__)
  - name: TargetPosScheduler.run
    description: Executes time-table based position targets from DataFrame schedule
    evidence: tqsdk/lib/target_pos_scheduler.py:19(TargetPosScheduler)
  - name: Twap.create_order
    description: Creates time-weighted average price order following time schedule
    evidence: tqsdk/algorithm/twap.py:18(Twap)
  - name: InsertOrderTask.insert
    description: Single order submission task with optional price chasing
    evidence: tqsdk/lib/target_pos_task.py:625(InsertOrderTask)
  - name: InsertOrderUntilAllTradedTask.chase
    description: Chases counterparty price until order fully filled
    evidence: tqsdk/lib/target_pos_task.py:503(InsertOrderUntilAllTradedTask)
  key_behaviors:
  - behavior: Singleton enforcement per account+symbol
    description: TargetPosTaskSingleton uses id(account)+'#'+symbol as unique key preventing multiple
      TargetPosTask instances for same symbol from issuing conflicting orders
    evidence: tqsdk/lib/target_pos_task.py:42(__call__)
  - behavior: Offset priority for futures position closing
    description: offset_priority='今昨,开' closes yesterday position before today per Chinese futures convention
      with different margin rates
    evidence: tqsdk/lib/target_pos_task.py:68(__init__)
  - behavior: Decoupled signal and execution
    description: set_target_volume requires subsequent wait_update() call, decoupling signal generation
      from execution and allowing batching multiple targets
    evidence: tqsdk/lib/target_pos_task.py:76(__init__)
  - behavior: Active vs passive order placement
    description: Price ACTIVE uses counterparty price (prioritizes fill probability); PASSIVE uses queue
      price (minimizes market impact)
    evidence: tqsdk/lib/target_pos_task.py:340(_get_order)
  replaceable_points:
  - name: ExecutionStrategy
    description: Order placement strategy for algorithm execution
    options:
    - name: TWAP
      traits:
      - Equal time slices
      - Simple implementation
      - Volume-agnostic
      fit_for:
      - Liquidity stable markets
      - Simple execution requirements
      not_fit_for:
      - Highly volatile markets
      - Volume-sensitive strategies
    - name: VWAP
      traits:
      - Volume-weighted
      - Market participation ratio
      fit_for:
      - Execution benchmarks
      - Volume-following strategies
      not_fit_for:
      - Low volume instruments
      - Illiquid markets
    - name: POV
      traits:
      - Percentage of volume
      - Adaptive to market activity
      fit_for:
      - Large orders in liquid markets
      - Minimal market impact
      not_fit_for:
      - Thin markets
      - Volume-sparse periods
    - name: IS
      traits:
      - Implementation shortfall
      - Cost-optimized
      fit_for:
      - Urgent execution
      - Cost-sensitive strategies
      not_fit_for:
      - Patient execution
      - Large time horizons
    default: TWAP
  - name: OffsetPriority
    description: Position closing order for futures offset commands
    options:
    - name: 今昨,开
      traits:
      - Close yesterday first
      - Standard Chinese convention
      fit_for:
      - Most futures strategies
      - Standard margin optimization
      not_fit_for:
      - Specific today-close requirements
    - name: 今昨,平
      traits:
      - Close yesterday first
      - Prefer closing positions
      fit_for:
      - End-of-day position management
      not_fit_for:
      - Day trading with today-close only
    - name: 开,平
      traits:
      - Open new first
      - Preserve existing positions
      fit_for:
      - Position accumulation strategies
      not_fit_for:
      - Position reduction scenarios
    default: 今昨,开
  design_decisions:
  - 'TargetPosTask singleton per account+symbol prevents conflicting orders - Multiple TargetPosTask for
    same symbol would issue conflicting orders; singleton enforces mutual exclusion. Evidence: tqsdk/lib/target_pos_task.py:22(TargetPosTaskSingleton)'
  - 'offset_priority=''今昨,开'' closes yesterday position before today - Standard Chinese futures convention;
    yesterday positions have different margin rates. Evidence: tqsdk/lib/target_pos_task.py:68(__init__)'
  - 'TargetPosTask requires subsequent wait_update() call after set_target_volume - Decouples signal generation
    from execution; allows batching multiple targets before execution. Evidence: tqsdk/lib/target_pos_task.py:76(__init__)'
  - 'Price ACTIVE uses counterparty price, PASSIVE uses queue price - ACTIVE prioritizes fill probability;
    PASSIVE minimizes market impact. Evidence: tqsdk/lib/target_pos_task.py:340(_get_order)'
  - 'TqTimeTable extends DataFrame for pandas compatibility - Allows users to manipulate schedules with
    pandas operations. Evidence: tqsdk/lib/time_table.py:9(TqTimeTable)'
  acceptance_hints:
  - TargetPosTask singleton prevents duplicate orders for same account+symbol
  - Orders generated achieve target position over scheduled time
  - Offset commands follow configured priority (今昨,开 by default)
  - Active orders use counterparty price, passive orders use queue price
- id: order_execution
  name: Order Execution & Matching
  order: 6
  responsibility: Handles order submission, cancellation, and local order matching for simulated accounts.
    Provides exchange-matching semantics in simulation including margin calculation, fee computation,
    and position settlement.
  interface:
    inputs: Order packs from trading_algorithms (symbol, direction, volume, price), quote updates for
      price validation
    outputs: Trade records, position updates, order status changes (ALIVE/FINISHED) to data_management
  required_methods:
  - name: SimTradeBase.insert_order
    description: Submits order for local matching with price validation
    evidence: tqsdk/tradeable/sim/trade_base.py:15(SimTradeBase)
  - name: SimTradeBase.cancel_order
    description: Cancels pending order by order_id
    evidence: tqsdk/tradeable/sim/trade_base.py:15(SimTradeBase)
  - name: SimTrade.match_order
    description: Executes order matching with market/limit price semantics
    evidence: tqsdk/tradeable/sim/trade_base.py:256(match_order)
  - name: SimTradeBase.settle
    description: Daily settlement updating positions and calculating realized P&L
    evidence: tqsdk/tradeable/sim/trade_base.py:15(SimTradeBase)
  - name: BaseSim._ensure_quote
    description: Waits for both quote info and quote data before matching, preventing NaN calculations
    evidence: tqsdk/tradeable/sim/basesim.py:181(_ensure_quote)
  key_behaviors:
  - behavior: Standard exchange matching semantics
    description: Market orders match at counterparty price; limit orders match at limit price. Prevents
      adverse selection on market orders.
    evidence: tqsdk/tradeable/sim/trade_base.py:256(match_order)
  - behavior: All-or-nothing fills in simulation
    description: No partial fills in simulation, simplifying backtest logic. Real exchanges have partial
      fills but simulation prioritizes simplicity.
    evidence: tqsdk/tradeable/sim/tqsim.py:26(__init__)
  - behavior: China A-share stamp tax on sell only
    description: Stock sell includes stamp tax (0.1%), buy only has commission. Matches China A-share
      tax rules.
    evidence: tqsdk/tradeable/sim/utils.py:85(_get_stock_fee)
  - behavior: Quote data completeness check before matching
