  design_decisions:
  - 'Tradeable inherits TqModule for channel-based communication - Unified data flow: each accounts use
    same api_send_chan/api_recv_chan pattern. Evidence: tqsdk/tradeable/tradeable.py:12(__init__)'
  - '_account_key = str(id(self)) ensures unique identity - Object identity is unique; avoids key collision
    in multi-account scenarios. Evidence: tqsdk/tradeable/tradeable.py:18(_get_account_key)'
  - '_is_self_trade_pack filters orders by account_key - Multi-account routing: each Tradeable only processes
    its own orders. Evidence: tqsdk/tradeable/tradeable.py:43(_is_self_trade_pack)'
  - 'FutureMixin vs StockMixin provide asset-type-specific data models - Futures use Position/Order/Trade;
    Stocks use SecurityPosition/SecurityOrder/SecurityTrade. Evidence: tqsdk/tradeable/mixin.py:20,219'
  - 'TqMultiAccount chain pattern requires accounts in REVERSE order - Reversing account order breaks
    multi-account message routing and order routing. Evidence: tqsdk/multiaccount.py:132-143(_setup_connection)'
  acceptance_hints:
  - Orders routed to correct account in multi-account mode
  - Account snapshots include each required fields (accounts, positions, orders, trades)
  - Position data differs correctly between futures (margin) and stocks (securities)
  - TqKq variants inherit TqAccount behavior correctly with hardcoded broker_id='快期模拟'
data_flow:
- from_stage: connection
  to_stage: data_management
  data: Diff packets with market quotes, trade confirmations in path-based nested dict structure
- from_stage: market_data_simulation
  to_stage: data_management
  data: Synthesized BtQuote diffs aligned to backtest time with keep_current parameter control
- from_stage: data_management
  to_stage: trading_algorithms
  data: Quote updates via TqChan async channels, Position state via get_position() method
- from_stage: trading_algorithms
  to_stage: order_execution
  data: insert_order packs with symbol, direction, volume, price, offset parameters
- from_stage: order_execution
  to_stage: data_management
  data: Trade diffs, position updates, order status changes (ALIVE/FINISHED) to update Entity state
- from_stage: api_layer
  to_stage: tradeable_interface
  data: Order requests, quote subscriptions via api_send_chan channel
- from_stage: tradeable_interface
  to_stage: api_layer
  data: Account snapshots, fills, state changes via api_recv_chan channel
- from_stage: order_execution
  to_stage: market_data_simulation
  data: Quote subscription requests for matching price validation during backtest
global_contracts:
- contract: Every business data inherits from Entity (MutableMapping) providing path-based dict access
  evidence: tqsdk/entity.py:10(Entity)
- contract: TqChan is asyncio.Queue wrapper for each inter-component communication
  evidence: tqsdk/channel.py:16(TqChan)
- contract: 'SimTradeBase.init_snapshot returns {''trade'': {account_key: {accounts, positions, orders,
    trades}}}'
  evidence: tqsdk/tradeable/sim/trade_base.py:108(init_snapshot)
- contract: Every timestamps are nanosecond integers (int64) for precise time tracking
  evidence: tqsdk/datetime_state.py:8(__init__)
- contract: Diff packets use path-based nested dict structure for incremental updates
  evidence: tqsdk/diff.py:11(_merge_diff)
- contract: Quote.datetime is string format 'YYYY-MM-DD HH:MM:SS.nnnnnnnnn'
  evidence: tqsdk/objs.py:13(Quote)
- contract: 'Order status values: ALIVE (active) or FINISHED (completed/cancelled)'
  evidence: tqsdk/objs.py:458(Order)
- contract: 'Direction values: BUY (long) or SELL (short)'
  evidence: tqsdk/lib/utils.py:32(_check_direction)
- contract: 'Offset values: OPEN, CLOSE, CLOSETODAY for futures position management'
  evidence: tqsdk/lib/utils.py:38(_check_offset)
- contract: Quote.last_price defaults to float('nan') requiring explicit nan-check before comparisons
  evidence: tqsdk/objs.py:61(last_price)
- contract: TqModule pattern enables n-to-1 upstream routing with 1-to-1 downstream
  evidence: tqsdk/baseModule.py:12(_run)
- contract: TargetPosTask singleton per account+symbol enforced via id(account)+'#'+symbol key
  evidence: tqsdk/lib/target_pos_task.py:42(__call__)
- contract: TqMultiAccount accounts must be in REVERSE order for proper message routing
  evidence: tqsdk/multiaccount.py:132-143(_setup_connection)
- contract: Stock trading requires offset=None; futures require offset in (OPEN, CLOSE, CLOSETODAY)
  evidence: tqsdk/api.py:1296-1300(_insert_order validation)
business_decisions:
- id: BD-001
  type: B
  content: Grid trading uses 0.5% price step (0.005) for both long and short directions
  rationale: 'Grid trading allocates positions across price levels using a 0.5% (0.005) step interval.
    This granularity balances order count against price sensitivity: finer steps generate more orders
    but better fill accuracy; coarser steps reduce costs but create wider gaps. The same 0.005 step applies
    symmetrically to both long and short grids, ensuring consistent risk distribution regardless of direction.
    Boundary: step is hardcoded; changing requires code modification.'
  evidence: tqsdk/demo/example/gridtrading.py:35(wait_price)
  stage: signal_generation
  alternative_considered: Variable step size based on volatility was considered but rejected for simplicity
- id: BD-002
  type: B/RC
  content: TargetPosTask singleton enforces one instance per account+symbol, parameter changes rejected
  rationale: 'TargetPosTask enforces singleton pattern per (account, symbol) pair to prevent conflicting
    position targets from multiple instances. When a second instance is created for the same account+symbol,
    the new parameters are rejected and the singleton returns the existing instance. This prevents race
    conditions where two tasks could simultaneously issue offset orders. Boundary: singleton scope is
    account+symbol; cross-symbol targeting is allowed via separate instances.'
  evidence: tqsdk/lib/target_pos_task.py:37(TargetPosTaskSingleton.__call__)
  stage: data_management
  alternative_considered: Parameter merging or priority-based resolution was rejected to maintain deterministic
    behavior
- id: BD-003
  type: B/BA
  content: TargetPosTask default price mode is ACTIVE (opponent price), offset_priority is 今昨,开
  rationale: 'TargetPosTask defaults to ACTIVE price mode (using opponent/best bid-ask) to ensure fill
    certainty rather than waiting for passive limit prices. The default offset_priority (今昨开, meaning
    today-then-yesterday-then-open) optimizes for closing near-day positions first, which typically have
    lower margin requirements in Chinese futures. This combination prioritizes fill reliability with cost
    efficiency. Boundary: defaults can be overridden at instantiation; priority sequence affects fill
    order.'
  evidence: tqsdk/lib/target_pos_task.py:65(targetpostask)
  stage: data_management
  alternative_considered: PASSIVE defaults were rejected as they risk non-execution in fast markets
  _evidence_issues:
  - 'FN_NOT_FOUND: targetpostask in tqsdk/lib/target_pos_task.py'
- id: BD-004
  type: B/BA
  content: 'TargetPosTask large order split mode: random volume between min_volume and max_volume per
    order'
  rationale: 'When targeting large positions, TargetPosTask splits execution into multiple child orders
    with volumes randomly selected between min_volume and max_volume bounds. Randomization prevents predictable
    patterns that market makers could exploit, while bounds ensure each slice remains within reasonable
    market impact thresholds. This is a behavioral execution algorithm decision affecting market footprint.
    Boundary: random seed is not configurable; predictability exists within a single session.'
  evidence: tqsdk/lib/target_pos_task.py:625(insertordertask)
  stage: order_execution
  alternative_considered: Fixed-size splits were rejected due to pattern detection risk; pure randomization
    without bounds was rejected due to market impact concerns
  _evidence_issues:
  - 'FN_NOT_FOUND: insertordertask in tqsdk/lib/target_pos_task.py'
- id: BD-005
  type: B/DK
  content: TWAP minimum interval between orders is 3 seconds, duration must not cross trading day
  rationale: 'TWAP execution enforces a 3-second minimum interval between orders to comply with exchange
    anti-spoofing rules and prevent excessive message rates. The constraint that duration must not cross
    trading day boundaries ensures each TWAP schedules complete within a single session, avoiding overnight
    gap risk and settlement complications. These are regulatory compliance boundaries. Boundary: interval
    < 3s will be rejected; duration crossing midnight will be rejected.'
  evidence: tqsdk/algorithm/twap.py:244(_get_volume_list)
  stage: algorithm_design
  alternative_considered: Configurable intervals were rejected; 3s is the safe minimum across major exchanges
- id: BD-006
  type: B/BA
  content: TWAP switches from passive to active price after 2/3 of interval or when 2 seconds remaining
  rationale: 'TWAP execution transitions from passive (limit) to active (market/IOC) pricing when either
    2/3 of the scheduled interval has elapsed without execution, OR fewer than 2 seconds remain in the
    interval. This dual trigger balances passive-seeking behavior early in the interval with execution
    certainty as deadlines approach. The 2-second buffer ensures network/processing time for last-chance
    fills. Boundary: this is an internal algorithm threshold, not user-configurable.'
  evidence: tqsdk/algorithm/twap.py:178(_get_deadline_timestamp)
  stage: order_execution
  alternative_considered: Single-trigger (time-only or elapsed-only) approaches were rejected for less
    adaptive behavior
- id: BD-007
  type: B/BA
  content: SimTradeBase default initial balance is 10,000,000 CNY, market orders use opponent price
  rationale: 'SimTradeBase initializes backtest accounts with 10,000,000 CNY default balance, representing
    a mid-size institutional trader in Chinese futures markets. Market orders in simulation execute at
    opponent (best bid/ask) price, simulating realistic immediate fill costs without the spread uncertainty
    of limit orders. This models institutional-grade execution assumptions. Boundary: balance is configurable;
    opponent price assumption may understate actual slippage for large orders.'
  evidence: tqsdk/sim/trade_base.py:16(simtradebase)
  stage: market_data_simulation
  alternative_considered: Smaller default balance was rejected as it misrepresents institutional strategies;
    larger was rejected as it inflates position capacity unrealistically
  _evidence_issues:
  - 'FN_NOT_FOUND: simtradebase in tqsdk/sim/trade_base.py'
- id: BD-008
  type: B
  content: Turtle strategy unit = (balance * 0.01) / (volume_multiple * ATR), stop loss at 2N, add at
    0.5N
  rationale: 'The Turtle trading system calculates position size as 1% of account balance divided by the
    volatility-adjusted notional (volume_multiple * ATR). This produces position sizes that expand in
    low-volatility environments and contract in high-volatility periods, maintaining consistent risk per
    trade. Stop loss at 2N (2 ATR units) and pyramid addition at 0.5N intervals implement the classic
    Turtle risk management rules. Boundary: these are demo parameters; production use requires validation.'
  evidence: tqsdk/demo/example/turtle.py:114(strategy)
  stage: trading_algorithms
  alternative_considered: Fixed lot sizing was rejected for lack of volatility adjustment; dynamic ATR
    multipliers were considered but rejected for complexity
- id: BD-009
  type: B
  content: Turtle uses Donchian channel for entry (20-day) and exit (10-day)
  rationale: 'The Turtle strategy identifies entries when price breaks above the 20-day Donchian high
    (long) or below the 20-day low (short), and exits when price retraces to the 10-day extreme. This
    channel-based approach catches sustained trends while providing relatively tight breakout confirmation.
    The asymmetric 20/10 lookback periods implement the classic Turtle trend-following logic. Boundary:
    lookback periods are fixed; adaptive channels could behave differently.'
  evidence: tqsdk/demo/example/turtle.py:51-54(donchian_channel)
  stage: signal_generation
  alternative_considered: Shorter lookbacks (e.g., 10/5) were rejected for excessive false signals; longer
    (40/20) were rejected for reduced trend capture
  _evidence_issues:
  - 'FN_NOT_FOUND: donchian_channel in tqsdk/demo/example/turtle.py'
- id: BD-010
  type: B/BA
  content: Dual Thrust range = max(HH-LC, HC-LL) with K=0.2 for both buy and sell lines
  rationale: 'Dual Thrust calculates the trading range as the maximum of (Highest High minus Last Close)
    and (Highest Close minus Lowest Low), then adds this range times K=0.2 to the previous close for buy
    lines, and subtracts from previous close for sell lines. The symmetric K=0.2 applies equal buffer
    to both directions, creating balanced breakout thresholds. This parameter controls sensitivity: higher
    K widens the channel, reducing false signals but missing early moves. Boundary: K is symmetrical;
    asymmetri'
  evidence: tqsdk/demo/example/dualthrust.py:28-36(dual_thrust)
  stage: signal_generation
  alternative_considered: Asymmetric K values were considered but rejected to maintain simplicity; K=0.5
    was rejected as too wide
- id: BD-011
  type: B/BA
  content: R-Breaker closes positions at 14:50, stop loss at 10 price points
  rationale: 'The R-Breaker strategy enforces end-of-day position closure at 14:50 (10 minutes before
    standard Chinese futures close at 15:00) to avoid overnight exposure and settlement risk. The 10-price-point
    stop loss implements a fixed-point risk management rule rather than ATR-based sizing, simplifying
    position management for this specific strategy. Boundary: these are hardcoded constants; closing time
    may not suit each contract sessions.'
  evidence: tqsdk/demo/example/rbreaker2.py:22(get_index_line)
  stage: data_management
  alternative_considered: Dynamic stop based on volatility was rejected for strategy simplicity; later
    close time (14:55) was rejected for settlement risk
- id: BD-012
  type: B
  content: Escalator opens when K-line close in top/bottom 25% with MA alignment
  rationale: 'The Escalator strategy initiates positions when price closes in the extreme quartiles (top
    25% for longs, bottom 25% for shorts) combined with moving average alignment confirmation. This dual-filter
    approach reduces false signals by requiring both momentum extremes and trend confirmation. The 25%
    boundary controls signal frequency and requires strong momentum to trigger. Boundary: boundary is
    symmetric; tightening to 10% would reduce signals further.'
  evidence: tqsdk/demo/example/escalator.py:29(kline_range)
  stage: signal_generation
  alternative_considered: Tighter 10% boundary was rejected for reduced signal count; wider 40% was rejected
    for signal quality degradation
- id: BD-013
  type: B/BA
  content: 'Momentum AR strategy: long when 110<AR<150, short when 50<AR<90, exit at AR thresholds'
  rationale: 'The AR (Activity Ratio) momentum strategy enters longs when AR is between 110-150 (moderate
    overheating) and shorts when AR is between 50-90 (moderate weakness). These asymmetric ranges acknowledge
    that markets can sustain overheating longer than they can sustain weakness. Exit thresholds are symmetric
    around neutral, implementing mean-reversion take-profits. Boundary: AR bands are fixed; different
    thresholds could produce different timing.'
  evidence: tqsdk/demo/example/momentum.py:24(ar)
  stage: signal_generation
  alternative_considered: Symmetric entry ranges (e.g., 90-110 vs 90-110) were rejected due to empirical
    observation of asymmetric market behavior
  _evidence_issues:
  - 'FN_NOT_FOUND: ar in tqsdk/demo/example/momentum.py'
- id: BD-014
  type: B/BA
  content: VWAP uses 10-day history to predict volume distribution, splits 58s passive then 2s active
  rationale: 'VWAP execution builds volume distribution forecasts from 10 trading days of historical data,
    providing sufficient sample size for stable patterns while remaining responsive to recent market structure
    changes. The 58-second passive followed by 2-second active split allocates most interval time to limit
    orders while reserving a short aggressive window for completion assurance. Boundary: history window
    and time split are not adaptive; volatile days may distort predictions.'
  evidence: tqsdk/demo/example/vwap.py:17,76-78,91-92(module)
  stage: algorithm_design
  alternative_considered: Shorter history (5 days) was rejected for noise; longer (20 days) was rejected
    for staleness; pure passive was rejected for completion risk
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tqsdk/demo/example/vwap.py'
- id: BD-015
  type: B/DK
  content: TWAP time table generator requires minimum 3-second interval per segment
  rationale: 'The time table generator enforces a 3-second minimum interval between execution segments
    to comply with exchange message rate limits and prevent potential signal generation penalties. This
    constraint affects the granularity of TWAP schedules: a 60-second execution could have at most 20
    segments. Boundary: intervals < 3 seconds will cause schedule generation failure; this is a hard constraint.'
  evidence: tqsdk/algorithm/time_table_generater.py:121-124(module)
  stage: algorithm_design
  alternative_considered: Zero minimum was rejected for exchange compliance; 5-second minimum was rejected
    as unnecessarily restrictive
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tqsdk/algorithm/time_table_generater.py'
- id: BD-016
  type: B/BA
  content: VWAP time table requires duration as multiple of 60 seconds
  rationale: 'VWAP schedules require total duration to be a multiple of 60 seconds to align with the minute-based
    volume distribution model used for forecast generation. This constraint ensures clean division into
    minute buckets for volume prediction. Boundary: non-multiple-60 durations will be rejected; this is
    a hard constraint aligned with VWAP algorithm assumptions.'
  evidence: tqsdk/algorithm/time_table_generater.py:206-207(module)
  stage: algorithm_design
  alternative_considered: Arbitrary duration support was rejected as it would break volume distribution
    alignment
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tqsdk/algorithm/time_table_generater.py'
- id: BD-017
  type: B/BA
  content: Fractal trend uses 2-period window, confirms with 6/12 MA, 1.2x ATR stop, 1.8x TP ratio
  rationale: 'Fractal trend detection uses a 2-period price window for fractal identification, confirmed
    by 6/12 moving average crossover for trend direction. Risk management employs 1.2x ATR for stop loss
    placement and 1.8x ATR for take-profit targets, creating a favorable risk-reward ratio of approximately
    1.5:1. These parameters define the strategy''s risk profile. Boundary: parameters are fixed; fractal
    detection is sensitive to price noise.'
  evidence: tqsdk/demo/example/fractal-trend.py:20,23-24,29-30(module)
  stage: signal_generation
  alternative_considered: Tighter stop (1.0x ATR) was rejected for higher whipsaw; looser TP (2.0x) was
    rejected for reduced win rate
- id: BD-018
  type: B/DK
  content: 'Kalman filter pairs trading: obs_var=0.01, state_var=0.0001, OPEN at Z±2.0, CLOSE at Z±0.5'
  rationale: 'Kalman filter pairs trading uses observation variance of 0.01 and state variance of 0.0001,
    representing a filter that responds slowly to price changes (low state variance) while allowing moderate
    measurement noise (higher obs variance). Entry triggers at Z-score ±2.0 (2 standard deviations) and
    exit at ±0.5 (near-zero deviation), implementing mean reversion with statistical confidence. Boundary:
    variance ratios determine filter responsiveness; different markets may require tuning.'
  evidence: tqsdk/demo/example/kalman_filter_pairs_trading.py:9-10,14-17(module)
  stage: signal_generation
  alternative_considered: Faster filter (higher state_var) was rejected for noise sensitivity; tighter
    entry (1.5 Z-score) was rejected for false signal risk
- id: BD-019
  type: B
  content: 'Z-Score mean reversion: entry at ±1.8, exit at ±0.4, stop loss at ±2.5, time stop 8 days'
  rationale: 'Z-Score mean reversion strategy enters when the price spread Z-score exceeds ±1.8 standard
    deviations, exits near mean at ±0.4, and stops out at ±2.5. The 0.7-unit buffer between entry and
    stop (2.5-1.8) provides 1.75x risk reward on stop-based exits. The 8-day time stop forces closure
    of positions that fail to mean-revert, preventing indefinite holding. Boundary: time stop is calendar-based;
    could expire mid-session.'
  evidence: tqsdk/demo/example/z_score.py:18-21,23(module)
  stage: data_management
  alternative_considered: Tighter entry (2.5 Z-score) was rejected for insufficient signals; looser time
    stop (15 days) was rejected for risk accumulation
- id: BD-020
  type: B/BA
  content: Report annualization uses 250 trading days/year, 21 trading days/month
  rationale: 'Performance reporting annualizes returns using 250 trading days (standard for Chinese equity/futures
    markets) and 21 trading days per month (derived from ~21 trading days per month average). These constants
