- id: cli_interface
  name: CLI Interface Layer
  order: 7
  responsibility: Translates platform commands into interactive CLI with argparse-based argument parsing,
    tab completion, and OBBject registry for data processing pipeline chaining. Acts as the user-facing
    interface for terminal-based workflows.
  interface:
    inputs:
    - User keyboard input, platform reference OpenAPI spec
    outputs:
    - Printed tables, exported files, charted figures, registered OBBjects
  required_methods:
  - name: PlatformController.call
    description: Dynamically generates CLI commands from platform reference; handles sub-controller creation
      and routing
    evidence: openbb_platform/core/openbb_core/app/router.py:53(ArgparseClassProcessor)
  - name: ArgparseTranslator.translate
    description: Converts Python function signatures to argparse programs; handles custom types and choices
    evidence: cli/openbb_cli/argparse_translator/argparse_translator.py:38(ArgparseTranslator)
  - name: ReferenceToArgumentsProcessor._build_custom_groups
    description: Processes OpenAPI reference to build provider-specific argument groups for CLI help organization
    evidence: cli/openbb_cli/argparse_translator/reference_processor.py:85(_build_custom_groups)
  - name: Registry._get_by_index
    description: CLI-side OBBject cache with stack-based indexing where OBB0 is most recent, plus key-based
      lookup
    evidence: cli/openbb_cli/argparse_translator/obbject_registry.py:47-57(_get_by_index)
  key_behaviors:
  - behavior: Dynamic command generation from platform reference
    description: CLI mirrors the platform API automatically by generating commands from the reference
      spec. Adding new commands requires no CLI changes; ensures consistency between CLI and API interfaces.
    evidence: cli/openbb_cli/controllers/base_platform_controller.py:53(ArgparseClassProcessor)
  - behavior: Provider-specific argument groups
    description: Providers have different parameters; custom argument groups organize CLI help by provider,
      improving usability when switching between providers.
    evidence: cli/openbb_cli/argparse_translator/reference_processor.py:85(_build_custom_groups)
  - behavior: OBBject registry as stack with key-based lookup
    description: Stack semantics (OBB0 = latest result) match natural CLI usage patterns. Keys enable
      named references to specific results. FIFO eviction when N_TO_KEEP_OBBJECT_REGISTRY limit is exceeded.
    evidence: cli/openbb_cli/argparse_translator/obbject_registry.py:47-57(_get_by_index)
  - behavior: Snake_case CLI args with camelCase API compatibility
    description: Argparse argument names use underscore (snake_case) but OpenAPI/OpenBB use camelCase.
      alias_generator enables bidirectional conversion between CLI and API parameter formats.
    evidence: openbb_platform/core/openbb_core/provider/abstract/data.py:81-83(alias_generator)
  replaceable_points:
  - name: Data processing command
