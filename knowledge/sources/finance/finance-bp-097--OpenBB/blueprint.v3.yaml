data_flow:
- from_stage: extension_loading
  to_stage: command_registration
  data: Router objects from core extensions (command tree structure); Provider instances (registry map
    with provider name → Provider instance)
- from_stage: command_registration
  to_stage: command_execution
  data: 'CommandMap: route string (dot notation) → callable function mapping'
- from_stage: command_execution
  to_stage: query_interface
  data: Function kwargs (validated parameters), CommandContext with system/user settings
- from_stage: query_interface
  to_stage: data_acquisition
  data: Provider name, model name, params dict, credentials (filtered and validated)
- from_stage: data_acquisition
  to_stage: results_container
  data: List[StandardData] or AnnotatedResult[List[StandardData]] (normalized provider-agnostic data)
- from_stage: results_container
  to_stage: cli_interface
  data: OBBject with results, provider, warnings, chart, metadata, extra
- from_stage: cli_interface
  to_stage: results_container
  data: OBBject from registry (for data processing pipeline chaining via registered extensions)
