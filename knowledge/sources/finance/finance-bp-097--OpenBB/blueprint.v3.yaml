      - Chart analysis
      - Signal generation
      not_fit_for:
      - Fundamental analysis
      - Long-term investing
    - name: export
      traits:
      - Multiple formats
      - Custom delimiters
      - Compression options
      fit_for:
      - Data portability
      - External analysis
      - Backup workflows
      not_fit_for:
      - In-memory analysis
      - Real-time streaming
    - name: chart
      traits:
      - Interactive plots
      - Multiple chart types
      - Styling options
      fit_for:
      - Visual exploration
      - Presentation materials
      - Quick insights
      not_fit_for:
      - Headless environments
      - Batch processing
    default: technical indicators
  design_decisions:
  - Dynamic command generation from platform reference — CLI mirrors the platform API automatically; adding
