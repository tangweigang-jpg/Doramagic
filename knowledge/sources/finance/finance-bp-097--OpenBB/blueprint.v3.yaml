business_decisions:
- id: BD-001
  type: B/RC
  content: Use entry_points() for lazy loading
  rationale: Extensions are loaded on-demand rather than at import time, reducing application startup
    cost and enabling optional dependencies to remain unloaded until explicitly required by user commands.
  evidence: extension_loader.py:142(_sorted_entry_points)
  stage: extension_loading
  alternative_considered: Eager loading at import time would increase startup latency and couple each
    dependencies
  _evidence_issues:
  - 'NOT_FOUND: extension_loader.py'
- id: BD-002
  type: B
  content: Singleton metaclass for ExtensionLoader
  rationale: Ensures only one ExtensionLoader instance exists across CLI, API, and Python sessions; prevents
    duplicate registry population that would cause inconsistent command availability and potential memory
    leaks from multiple extension collections.
  evidence: extension_loader.py:34(ExtensionLoader.__init__)
  stage: extension_loading
  alternative_considered: Module-level singleton via global variable is prone to import-order bugs
  _evidence_issues:
  - 'NOT_FOUND: extension_loader.py'
- id: BD-003
  type: BA
  content: Three separate extension groups
  rationale: 'Separation of extension groups enables independent lifecycles: providers vs core vs OBBject
    extensions can be versioned, deployed, and updated separately without cross-dependencies affecting
    system stability.'
  evidence: extension_loader.py:17-31(OpenBBGroups)
  stage: extension_loading
  alternative_considered: Monolithic extension loading would create tight coupling between provider and
    core releases
  _evidence_issues:
  - 'NOT_FOUND: extension_loader.py'
- id: BD-004
  type: B
  content: Generic type variables Q (QueryParams) and R (Return) on Fetcher
  rationale: Enables static type checking of query-to-data contracts at compile time; query_params_type
    and return_type classproperties extract types at runtime for ProviderInterface to validate provider
    compatibility.
  evidence: fetcher.py:36(Fetcher[Q,R])
  stage: data_acquisition
  alternative_considered: Runtime-only type checking would miss errors until execution time
  _evidence_issues:
  - 'NOT_FOUND: fetcher.py'
- id: BD-005
  type: B
  content: Must implement extract_data OR aextract_data
  rationale: Enforces either sync or async implementation for every fetcher; if both present, aextract_data
    takes precedence enabling non-blocking I/O for high-throughput scenarios in API mode.
  evidence: fetcher.py:60-71(__init_subclass__)
  stage: data_acquisition
  alternative_considered: Mandatory async-only would complicate simple synchronous fetchers
  _evidence_issues:
  - 'NOT_FOUND: fetcher.py'
- id: BD-006
  type: BA/DK
  content: Data model extra='allow' and alias_generator camel→snake
  rationale: Providers return heterogeneous field sets with varying schemas; extra='allow' prevents validation
    errors when providers include non-standard fields; alias_generator normalizes provider-specific camelCase
    names to standard snake_case for consistency.
  evidence: data.py:77-84(model_config)
  stage: data_acquisition
  alternative_considered: Strict validation would break when providers add new fields
  _evidence_issues:
  - 'NOT_FOUND: data.py'
- id: BD-007
  type: BA
  content: Require credentials check at QueryExecutor level
  rationale: Centralized credential validation at QueryExecutor level ensures no fetcher can leak data
    without proper authentication; error message guides users to API key setup, improving security posture
    and user experience.
  evidence: query_executor.py:36-63(filter_credentials)
  stage: data_acquisition
  alternative_considered: Per-fetcher credential checks create inconsistent security gaps
  _evidence_issues:
  - 'NOT_FOUND: query_executor.py'
- id: BD-008
  type: BA
  content: '@router.command decorator pattern'
  rationale: Declarative registration allows command functions to be defined anywhere in the codebase
    and wired up automatically at startup; enables a true plugin architecture where third parties can
    add commands without modifying core router logic.
  evidence: router.py:87(command)
  stage: command_registration
  alternative_considered: Manual registration in a central file would create bottlenecks and coupling
  _evidence_issues:
  - 'NOT_FOUND: router.py'
- id: BD-009
  type: B
  content: SignatureInspector.complete injects provider params
  rationale: Automatically adds provider_choices, standard_params, and extra_params to function signatures
