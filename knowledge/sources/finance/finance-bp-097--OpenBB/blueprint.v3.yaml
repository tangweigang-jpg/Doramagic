- id: BD-095
  type: B
  content: 'INTERACTION: BD-084 (OBBject registry FIFO eviction) × BD-014 (metadata duration tracking)
    → Memory pressure from FIFO eviction discards timing metadata for evicted OBBjects'
  rationale: The N_TO_KEEP_OBBJECT_REGISTRY limit evicts oldest OBBjects using FIFO semantics, but performance
