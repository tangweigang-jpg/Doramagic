- id: BD-090
  type: B/BA
  content: 'INTERACTION: BD-037 (Pearson correlation) × BD-052 (ADF/KPSS stationarity) → Hidden assumption
    that inputs to correlation are stationary without explicit validation'
  rationale: Pearson correlation assumes linear relationships but requires stationarity for valid inference;
    applying correlation to non-stationary series violates statistical assumptions and produces spurious
    results. BD-052 provides stationarity tests but BD-037 does not invoke them before computing correlation
    matrices used in portfolio optimization.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Automatic stationarity enforcement before correlation calculation would add
    latency but prevent invalid statistical inference
- id: BD-091
  type: B/BA
  content: 'INTERACTION: BD-041 (Engle-Granger cointegration) × BD-052 (ADF stationarity test) → Cointegration
    test embeds ADF but result interpretation assumes user understands test chaining'
  rationale: Engle-Granger two-step method internally runs ADF on residuals, yet this dependency is hidden
    from users who may interpret cointegration results without understanding that ADF assumptions cascade
    through. Silent test chaining creates expert-only behavior where novices may misinterpret p-values.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Explicit multi-test reporting with Bonferroni correction would clarify but complicate
    the API
- id: BD-092
  type: BA/DK
  content: 'INTERACTION: BD-001 (lazy loading entry_points) × BD-007 (credential check at QueryExecutor)
    → Credentials for unloaded extensions bypass validation until first use'
  rationale: Lazy loading means extension-specific credentials are only validated when the extension command
    runs, not at system initialization. This creates a silent delay where missing credentials are not
    detected until users attempt to execute the specific command, leading to confusing runtime failures
    rather than upfront configuration guidance.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Early credential validation scan at bootstrap would increase startup time but
    provide immediate feedback
- id: BD-093
  type: BA
  content: 'INTERACTION: BD-031 (retry with max_attempts) × BD-085 (request timeout 60s) → Retry logic
    multiplied by timeout creates exponential failure window up to 10+ minutes'
  rationale: With default 60-second timeout and max_attempts retries, a single failing request can consume
    up to 5 minutes in worst case. For bulk operations executing multiple requests, this compounds into
    hours of hanging connections. Users experience apparent hangs without understanding retry behavior
    is extending wait times beyond timeout expectations.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Exponential backoff with shorter timeouts would reduce worst-case wait but increase
    implementation complexity
- id: BD-094
  type: BA
  content: 'INTERACTION: BD-075 (output_type default=''OBBject'') × BD-019 (to_df flexible conversion)
    → Default OBBject output requires explicit to_df call, creating friction for DataFrame-first workflows'
  rationale: The OBBject default preserves metadata but breaks pandas-native workflows where users expect
    DataFrame returns. The flexible to_df handles multiple input formats (BD-019) but requires explicit
    invocation. This creates tension between rich metadata preservation and immediate usability for pandas-dependent
