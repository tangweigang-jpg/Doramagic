  stage: command_registration
  alternative_considered: Manual signature definition would be error-prone and require updates when providers
    change
  _evidence_issues:
  - 'NOT_FOUND: router.py'
- id: BD-010
  type: BA
  content: no_validate flag bypasses return type validation
  rationale: Enables router functions that return non-OBBject types (e.g., raw DataFrames, text, images)
    without breaking OpenAPI schema generation; allows flexible return types while maintaining documentation
