  - Provider-specific argument groups — Providers have different parameters; custom groups organize args
    by provider in CLI help [cli/openbb_cli/argparse_translator/reference_processor.py:85(_build_custom_groups)]
  - OBBject registry as stack with key-based lookup — Stack semantics (OBB0 = latest) match natural CLI
    usage patterns; keys enable named references [cli/openbb_cli/argparse_translator/obbject_registry.py:47-57(_get_by_index)]
