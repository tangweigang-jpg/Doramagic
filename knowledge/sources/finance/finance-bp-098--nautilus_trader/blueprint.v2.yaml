replaceable_slots:
- id: slot-001
  name: market_data_provider
  description: Choose Databento for institutional multi-venue data, Tardis for cost-effective historical
    data, or direct APIs for single-exchange production trading
  used_in_stages: []
  options:
  - name: Databento
    traits:
    - historical
    - live
    - real-time
    - multiple_venues
    - dbn_format
    fit_for:
    - Production-grade market data for backtesting and live trading; best for institutional users needing
      multiple venues
    not_fit_for:
    - Free data needs; niche exchanges not covered by Databento
  - name: Tardis
    traits:
    - historical
    - replay
    - csv
    - many_exchanges
    fit_for:
    - Cost-effective historical data; testing with niche exchanges; local replay server
    not_fit_for:
    - Real-time live trading without additional infrastructure
  - name: Direct Exchange APIs
    traits:
    - live
    - execution
    - historical
    fit_for:
    - Direct exchange access with full control; when you only need one exchange
    not_fit_for:
    - Multi-venue backtesting; exchange data aggregation
  default: Direct Exchange APIs (Binance, Bybit, etc.)
  _source: worker_resource
- id: slot-002
  name: cache_database
  description: Use Redis for production performance, PostgreSQL for compliance/audit needs, in-memory
    for ephemeral testing/backtesting
  used_in_stages: []
  options:
  - name: Redis
    traits:
    - in-memory
    - key-value
    - streams
    - pub-sub
    fit_for:
    - Default production use; high-performance caching; message bus
    not_fit_for:
    - Complex queries; ACID compliance; large datasets requiring persistence
  - name: PostgreSQL
    traits:
    - relational
    - ACID
    - SQL
    - persistence
    fit_for:
    - Audit requirements; complex querying; compliance needs; durable persistence
    not_fit_for:
    - Simple caching; high-frequency operations
  - name: In-Memory (No persistence)
    traits:
    - ephemeral
    - fast
    - single_node
    fit_for:
    - Short-running backtests; temporary processing; testing
    not_fit_for:
    - Production live trading; state recovery after crashes
  default: Redis
  _source: worker_resource
- id: slot-003
  name: message_bus_database
  description: Redis is currently the only supported option for message bus database backing
  used_in_stages: []
  options:
  - name: Redis
    traits:
    - streams
    - durable
    - real-time
    - pub-sub
    fit_for:
    - Production message bus; event sourcing; inter-process communication
    not_fit_for:
    - When message durability is not needed
  default: Redis
  _source: worker_resource
- id: slot-004
  name: execution_venue
  description: Select based on asset class (crypto vs traditional), preferred features (options, perp),
    geographic considerations, and API requirements
  used_in_stages: []
  options:
  - name: Binance
    traits:
    - spot
    - futures
    - options
    - hmac_signing
    fit_for:
    - Crypto spot and derivatives trading; high liquidity
    not_fit_for:
    - Non-crypto assets
  - name: Bybit
    traits:
    - spot
    - perp
    - options
    - delta_hedging
    fit_for:
    - Derivatives trading; options strategies
    not_fit_for:
    - Non-crypto assets
  - name: OKX
    traits:
    - spot
    - margin
    - futures
    - options
    fit_for:
    - Multi-instrument trading; Asian market access
    not_fit_for:
    - Non-crypto assets
  - name: dYdX
    traits:
    - perp
    - cosmos
    - validator
    fit_for:
    - Decentralized perpetual trading; self-custody
    not_fit_for:
    - Centralized execution needs
  - name: Hyperliquid
    traits:
    - perp
    - evm
    - vaults
    fit_for:
    - EVM-native perpetuals; L2 trading
    not_fit_for:
    - Non-crypto assets
  - name: Interactive Brokers
    traits:
    - stocks
    - options
    - futures
    - forex
    - multi_asset
    fit_for:
    - Traditional finance; multi-asset strategies
    not_fit_for:
    - Crypto-only strategies
  - name: Deribit
    traits:
    - options
    - perp
    - btc_eth
    fit_for:
    - Crypto options trading; BTC/ETH focus
    not_fit_for:
    - Other crypto pairs
  - name: Kraken
    traits:
    - spot
    - futures
    fit_for:
    - Kraken-specific trading; European market
    not_fit_for:
    - High-frequency trading (rate limits)
  default: Binance
  _source: worker_resource
- id: slot-005
  name: serialization_format
  description: Use Arrow/Parquet for data persistence and analytics; MsgPack for internal messaging; JSON
    for external interfaces
  used_in_stages: []
  options:
  - name: Arrow IPC (Feather)
    traits:
    - columnar
    - compressed
    - apache_standard
    fit_for:
    - Default for persistence and data catalog; analytical workloads
    not_fit_for:
    - Real-time streaming of small messages
  - name: Parquet
    traits:
    - columnar
    - compressed
    - analytics
    fit_for:
    - Large-scale historical data; data lakes
    not_fit_for:
    - Real-time data; row-based access patterns
  - name: MsgPack
    traits:
    - binary
    - compact
    - fast
    fit_for:
    - Message bus encoding; cache operations
    not_fit_for:
    - Human readability; analytics
  - name: JSON
    traits:
    - human_readable
    - interoperable
    fit_for:
    - Debugging; external integrations; configuration
    not_fit_for:
    - Performance-critical paths; large datasets
  default: Arrow IPC for persistence, MsgPack for messaging
  _source: worker_resource
