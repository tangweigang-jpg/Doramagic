# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-098
name: NautilusTrader
sop_version: '3.6'
source:
  projects:
  - nautilus_trader
  commit_hash: 386956665002b569c7a2c34715b29f8e6e07f179
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Algorithmic trading with unified backtest/live execution
  description: High-performance algorithmic trading platform with Rust-core + Python architecture, providing
    unified backtest and live trading through shared component wiring (NautilusKernel). Features event-driven
    data ingestion, strategy execution, risk management, order execution, and portfolio tracking.
  prerequisites: Python/Cython development knowledge, understanding of trading system architecture, financial
    instrument concepts
  not_suitable_for: Simple manual trading, non-technical users without programming background, single-instrument
    discretionary strategies, environments without Python 3.10+
stages:
- id: data_collection
  name: Data Collection & Ingestion
  order: 1
  responsibility: Manages external data subscriptions, normalizes heterogeneous market data feeds into
    a unified internal format, and maintains buffered rolling windows. Provides time-range generation
    for replay. This stage is critical because it provides the foundation for each downstream processing
    - without normalized, correctly-ordered data, strategies would produce incorrect signals.
  interface:
    inputs:
    - External market data feeds (trade ticks, quote ticks, order book deltas, bars, status updates)
    - Data commands (subscribe/unsubscribe via MessageBus)
    outputs:
    - Normalized data objects (QuoteTick, TradeTick, OrderBookDelta, Bar) to subscribers via MessageBus
      topics
  required_methods:
  - name: DataEngine.subscribe_data
    description: Subscribes to a data type for an instrument, registering the handler to receive data
      via MessageBus
    evidence: nautilus_trader/data/engine.pyx:88(DataEngine class)
  - name: DataEngine.subscribe_order_book_deltas
    description: Subscribes to order book delta updates for an instrument with configurable depth and
      handler
    evidence: nautilus_trader/data/engine.pyx:88(DataEngine class)
  - name: DataEngine.request_data
    description: Requests historical data for a time range, triggering data catalog queries and streaming
      results
    evidence: nautilus_trader/data/engine.pyx:88(DataEngine class)
  - name: DataCatalog.query
    description: Queries historical data from Parquet storage with instrument and time range filters
    evidence: nautilus_trader/persistence/catalog/base.py:46(DataCatalog class)
  - name: BarAggregator.on_tick
    description: Processes raw ticks and aggregates into OHLCV bars per bar specification
    evidence: nautilus_trader/data/aggregation.pyx:28(BarAggregator class)
  key_behaviors:
  - behavior: Cache-then-publish ordering
    description: Data is stored in Cache before being published to MessageBus, ensuring strategy handlers
      always see consistent state when reading from cache
    evidence: docs/concepts/architecture.md:277(cache-then-publish order)
  - behavior: Three-tier data type classification
    description: Data types classified into PYO3 managed (zero-copy C-level handling), Book data (L2/L3),
      and Python managed types with different internal representations
    evidence: nautilus_trader/data/engine.pyx:1385(_process_pyo3_data)
  - behavior: Quote tick buffering with bounded memory
    description: Quote ticks buffered at 10,000 per instrument by default (configurable tick_capacity),
      providing strategy access to recent history while bounding memory
    evidence: nautilus_trader/cache/cache.pyx:126(_quote_ticks)
  - behavior: Gap-filling with adjacent interval requests
    description: Time range generator requests adjacent intervals to fill gaps rather than individual
      timestamps, reducing number of data requests
    evidence: nautilus_trader/data/engine.pyx:2974(_get_gap_filling_ranges)
  - behavior: Replay mode with identical data interface
    description: Replay mode suspends external data and injects historical data through the same data
      engine pipeline using fill_gap=False
    evidence: nautilus_trader/data/engine.pyx:1978(_replay_data)
  replaceable_points:
  - name: DataBackend
    description: Backend providing data to DataEngine - determines source and transport protocol
    options:
    - name: BacktestDataClient
      traits:
      - Historical data only
      - Parquet-based
      - High throughput
      fit_for:
      - Backtesting scenarios
      - Historical data replay
      not_fit_for:
      - Live trading
      - Real-time data needs
    - name: LiveDataClient (WebSocket)
      traits:
      - Real-time streaming
      - WebSocket transport
      - Low latency
      fit_for:
      - Live trading
      - Real-time market data
      not_fit_for:
      - Backtesting
      - Historical analysis
    - name: custom IDataClient
      traits:
      - User-defined
      - Venue-specific
      fit_for:
      - Custom data sources
      - Proprietary feeds
      not_fit_for:
      - Standard use cases
    default: BacktestDataClient
  - name: DataCatalog
    description: Persistence backend for historical data queries
    options:
    - name: ParquetDataCatalog
      traits:
      - Parquet format
      - Arrow-based
      - Columnar storage
      fit_for:
      - Standard backtesting
      - Large historical datasets
      not_fit_for:
      - Real-time data
      - Non-Parquet sources
    - name: custom catalog
      traits:
      - User-defined persistence
      fit_for:
      - Custom storage backends
      - Database integrations
      not_fit_for:
      - Standard workflows
    default: ParquetDataCatalog
  design_decisions:
  - Data types classified into three tiers (PYO3 managed, Book data, Python managed) each with different
    internal representation - allows optimal memory layout and zero-copy C-level handling for pyo3 types
    while preserving Python flexibility for user-defined data (nautilus_trader/data/engine.pyx:1385)
  - Bar aggregation done per-bar-type with internal queue of raw ticks, only finalized bars published
    on bar close - ensures complete OHLCV bars with accurate volume; prevents partial-bar signals in strategies
    (nautilus_trader/data/engine.pyx:1612)
  - Quote tick buffering at 10,000 per instrument by default (configurable tick_capacity) - provides strategy
    access to recent quote history while bounding memory per instrument (nautilus_trader/cache/cache.pyx:126)
  - Time range generator uses a gap-filling strategy that requests adjacent intervals to fill gaps, not
    individual timestamps - reduces number of data requests and handles contiguous missing data efficiently
    (nautilus_trader/data/engine.pyx:2974)
  - Replay mode suspends external data and injects historical data through the same data engine pipeline
    - strategies see identical data interface in live and backtest; replay uses fill_gap=False because
    source is known complete (nautilus_trader/data/engine.pyx:1978)
  - Data catalog uses a Singleton+ABCMeta metaclass to enforce single catalog instance per process - prevents
    accidental creation of multiple catalog instances pointing to different data sources (nautilus_trader/persistence/catalog/base.py:42)
  acceptance_hints:
  - Strategies receive complete, correctly-ordered OHLCV bars
  - Historical data replay produces identical results across runs
  - Gap-filling requests complete missing intervals without duplicates
  - Buffer capacity limits prevent unbounded memory growth
  - Data catalog queries return correct time range slices
- id: factor_computation
  name: Factor Computation / Strategy Processing
  order: 2
  responsibility: Executes user strategy logic on received data, computes indicators and signals, manages
    order lifecycle, and dispatches trading commands. Acts as the primary extension point for trading
    algorithms. This stage is where users implement their trading logic and is the main value-creation
    area of the system.
  interface:
    inputs:
    - Normalized data (QuoteTick, TradeTick, Bar) from DataEngine via MessageBus
    - Cached instrument data, position state, account state
    outputs:
    - Trading commands (SubmitOrder, CancelOrder, ModifyOrder) to ExecutionEngine via MessageBus
    - Order events to Portfolio/Risk via MessageBus
  required_methods:
  - name: Strategy.on_bar
    description: Called when a bar is received for subscribed instrument - primary hook for bar-based
      strategies
    evidence: nautilus_trader/trading/strategy.pyx:53(Strategy class)
  - name: Strategy.on_quote_tick
    description: Called when a quote tick is received - primary hook for tick-based strategies
    evidence: nautilus_trader/trading/strategy.pyx:53(Strategy class)
  - name: Strategy.on_trade_tick
    description: Called when a trade tick is received for subscribed instrument
    evidence: nautilus_trader/trading/strategy.pyx:53(Strategy class)
  - name: Strategy.submit_order
    description: Submits an order through the order factory, passing through risk engine and execution
      engine
    evidence: nautilus_trader/trading/strategy.pyx:805(submit_order)
  - name: Strategy.cancel_order
    description: Requests cancellation of an active order
    evidence: nautilus_trader/trading/strategy.pyx:805(submit_order)
  - name: OrderFactory.with_pnl_protection
    description: Creates a bracket order with stop-loss and take-profit attached
    evidence: nautilus_trader/trading/strategy.pyx:1805(OrderFactory class)
  - name: Actor.on_start
    description: Lifecycle hook called when strategy starts - used for initialization
    evidence: nautilus_trader/common/actor.pyx:58(Actor class)
  - name: Actor.on_stop
    description: Lifecycle hook called when strategy stops - used for cleanup
    evidence: nautilus_trader/common/actor.pyx:58(Actor class)
  key_behaviors:
  - behavior: Event sourcing via MessageBus
    description: Order events are routed through MessageBus with strategy_id and position_id attached,
      enabling stateless strategy reconstruction from event stream
    evidence: nautilus_trader/trading/strategy.pyx:1200(_handle_order_filled)
  - behavior: Bracket orders as OrderList with OTO contingency
    description: Child orders inherit position_id at submission time, not fill time - ensures atomic position
      assignment with order submission
    evidence: nautilus_trader/model/orders/base.pyx:385(_apply_position_id)
  - behavior: Frozen dataclass config pattern
    description: Strategy config is frozen dataclass validated at construction - config field names become
      strategy attributes
    evidence: nautilus_trader/common/actor.pyx:120(_init_config)
  - behavior: Full Actor lifecycle support
    description: Actors/Strategies have full lifecycle (on_start, on_stop, on_fault, on_degrade, on_save,
      on_load) supporting crash-only design
    evidence: docs/concepts/architecture.md:77(crash-only philosophy)
  - behavior: Strategy requires Trader registration before trading
    description: submit_order, cancel_order each check trader_id is not None from registration - cannot
      operate without registration
    evidence: nautilus_trader/trading/strategy.pyx:941(Condition.is_true trader_id check)
  replaceable_points:
  - name: Strategy logic
    description: User-defined subclass of Strategy implementing on_bar / on_quote_tick hooks
    options:
    - name: any Strategy subclass
      traits:
      - User-defined
      - Python-based
      - Event-driven
      fit_for:
      - Custom trading algorithms
      - Alpha generation
      not_fit_for:
      - No custom logic needed
    default: none (user provides)
  - name: Clock
    description: Time source used by strategy for scheduling
    options:
    - name: TestClock
      traits:
      - Static time
      - Deterministic
      - Backtest use
      fit_for:
      - Backtesting
      - Reproducible results
      not_fit_for:
      - Live trading
    - name: RealtimeClock
      traits:
      - System time
      - Live use
      fit_for:
      - Live trading
      not_fit_for:
      - Backtesting
    default: TestClock
  - name: OrderFactory
    description: Order creation factory with instrument awareness
    options:
    - name: StrategyOrderFactory
      traits:
      - Default factory
      - Bracket support
      fit_for:
      - Standard order creation
      not_fit_for:
      - Custom order logic
    default: StrategyOrderFactory
  design_decisions:
  - Strategy inherits from Actor which owns a Clock, msgbus, cache, portfolio, and log - ensuring strategies
    have full system context without coupling to engine internals (nautilus_trader/trading/strategy.pyx:53)
  - Order events are routed through MessageBus with strategy_id and position_id attached, enabling stateless
    strategy reconstruction from event stream - enables event sourcing, backtest replay, and audit trails
    without strategies holding mutable state (nautilus_trader/trading/strategy.pyx:1200)
  - Bracket orders encoded as OrderList with OTO contingency; child orders inherit position_id at submission
    time, not fill time - ensures position assignment is atomic with order submission, preventing race
    conditions in concurrent backtest scenarios (nautilus_trader/model/orders/base.pyx:385)
  - Strategy config is frozen dataclass validated at construction - config field names become strategy
    attributes, with on_config override for validation; provides type-safe, self-documenting strategy
    configuration with immediate feedback on invalid params (nautilus_trader/common/actor.pyx:120)
  - 'Actors/Strategies have a full lifecycle (on_start, on_stop, on_fault, on_degrade, on_save, on_load)
    supporting crash-only design - on_fault is called on unrecoverable errors, on_degrade on degraded
    state; supports crash-only recovery pattern: restart/reload state from persisted cache on startup
    (docs/concepts/architecture.md:77)'
  - Strategy event handlers (on_bar, on_quote_tick) called by message bus subscription - strategy event
    handlers are callbacks that must not block or raise exceptions (nautilus_trader/trading/strategy.pyx:322-323)
  acceptance_hints:
  - Strategies receive each subscribed data types correctly
  - Order submission goes through full pipeline to execution
  - Order events trigger correct strategy callbacks
  - Bracket orders create linked child orders atomically
  - Strategies can query positions and account state correctly
- id: risk_management
  name: Risk Management
  order: 3
  responsibility: Validates each trading commands before they reach the ExecutionEngine. Enforces per-order
    and portfolio-level risk limits including position limits, notional limits, and gross exposure limits.
    This stage exists as a hard gate to ensure no trading command can bypass risk checks regardless of
    component failure.
  interface:
    inputs:
    - TradingCommand messages (SubmitOrder, CancelOrder, ModifyOrder) from Strategy or ExecutionEngine
    outputs:
    - Approved/modified/rejected trading commands to ExecutionEngine, or OrderReject events
  required_methods:
  - name: RiskEngine.check_order
    description: Validates a SubmitOrder command against each risk rules - returns approved, modified,
      or rejected
    evidence: nautilus_trader/system/kernel.py:58(RiskEngine._check_order)
  - name: RiskEngine.check_cancel
    description: Validates a CancelOrder request against risk rules
    evidence: nautilus_trader/risk/engine.pyx:27(RiskEngine class)
  - name: RiskEngine.check_modify
    description: Validates a ModifyOrder request against risk rules
    evidence: nautilus_trader/risk/engine.pyx:27(RiskEngine class)
  key_behaviors:
  - behavior: Hard gate enforcement
    description: RiskEngine is NOT a pluggable strategy - it is a hard gate that must approve every command
      before the ExecutionEngine sees it
    evidence: nautilus_trader/system/kernel.py:58(RiskEngine._check_order)
  - behavior: Conservative position percentage default
    description: position_pct default=None means no position size limit by default - explicit opt-in required
      for safety
    evidence: nautilus_trader/risk/engine.pyx:27(def __init__)
  - behavior: Portfolio-level circuit breakers
    description: profit_threshold and loss_limit are unrealized PnL thresholds checked against Portfolio's
      snapshot of open positions
    evidence: nautilus_trader/risk/engine.pyx:27(RiskEngine class)
  - behavior: Two-level margin enforcement
    description: Margin requirements checked at order submission AND at every fill - prevents order-time
      limits from being circumvented by subsequent price moves
    evidence: nautilus_trader/accounting/accounts/base.pyx:30(cdef class Account)
  replaceable_points:
  - name: Risk rule set
    description: Which risk rules to apply - the set of validations enforced before orders reach execution
    options:
    - name: default rule set
      traits:
      - Position limits
      - Notional limits
      - Exposure limits
      - Latency checks
      fit_for:
      - Standard risk management
      - Production use
      not_fit_for:
      - Custom risk requirements
    - name: custom subclass
      traits:
      - User-defined rules
      fit_for:
      - Venue-specific risk rules
      not_fit_for:
      - Standard compliance
    default: default rules
  design_decisions:
  - RiskEngine is NOT a pluggable strategy - it is a hard gate that must approve every command before
    the ExecutionEngine sees it - ensures no trading command can bypass risk checks regardless of component
    failure; prevents orders reaching the venue unconstrained (nautilus_trader/system/kernel.py:58)
  - position_pct default=None means no position size limit by default - explicit opt-in required; conservative
    default prevents accidental oversized positions; users must consciously enable sizing (nautilus_trader/risk/engine.pyx:27)
  - profit_threshold and loss_limit are unrealized PnL thresholds checked against the Portfolio's snapshot
    of open positions - provides circuit-breaker at portfolio level to close each positions if PnL crosses
    thresholds (nautilus_trader/risk/engine.pyx:27)
  - Margin requirements checked at order submission AND at every fill - two-level enforcement prevents
    order-time limits from being circumvented by subsequent price moves; a fill could push an account
    from margin-compliant to non-compliant (nautilus_trader/accounting/accounts/base.pyx:30)
  acceptance_hints:
  - Every orders pass through RiskEngine before reaching ExecutionEngine
  - Position limits are enforced on order submission
  - Portfolio PnL limits trigger circuit breakers correctly
  - Rejections are published to MessageBus for strategies to handle
  - No order can reach execution without risk approval
- id: execution
  name: Order Execution & Venue Routing
  order: 4
  responsibility: Manages the complete order lifecycle from submission through fill, including venue routing,
    exec algorithm application, order modification/cancellation, and emulation for paper trading. Maintains
    the canonical order state machine. This stage is the single source of truth for order states across
    the system.
  interface:
    inputs:
    - Approved TradingCommands from RiskEngine
    - Fill events from venue/client
    - Data events (for emulation)
    outputs:
    - SubmitOrder/CancelOrder messages to venue clients
    - Order events (Accepted, Filled, Canceled, Rejected) to Strategy/Portfolio/Risk via MessageBus
  required_methods:
  - name: ExecutionEngine.submit_order
    description: Processes an approved order submission - routes to venue, applies exec algorithms, manages
      state transitions
    evidence: nautilus_trader/execution/engine.pyx:100(ExecutionEngine class)
  - name: ExecutionEngine.modify_order
    description: Modifies an existing order's price or quantity with configurable due_timestamp for latency
      simulation
    evidence: nautilus_trader/execution/engine.pyx:100(ExecutionEngine class)
  - name: ExecutionEngine.cancel_order
    description: Requests cancellation of an active order
    evidence: nautilus_trader/execution/engine.pyx:100(ExecutionEngine class)
  - name: OrderEmulator.transform_order
    description: Transforms conditional orders (STOP/LIMIT_IF_TOUCHED) into market/limit orders when triggered
    evidence: nautilus_trader/execution/emulator.pyx:26(OrderEmulator class)
  - name: ExecAlgorithm.apply
    description: Applies exec algorithm logic to modify order parameters over time (TWAP, VWAP, etc.)
    evidence: nautilus_trader/execution/algorithm.pyx:29(ExecAlgorithm class)
  key_behaviors:
  - behavior: Single source of truth for order state
    description: ExecutionEngine maintains the single source of truth for order states - other components
      query via MessageBus events rather than holding copies
    evidence: nautilus_trader/execution/engine.pyx:150(_order_states)
  - behavior: Unified venue interface for emulated fills
    description: OrderEmulator subscribes to DataEngine topics and generates simulated fills internally,
      passing them to ExecutionEngine as if from a venue
    evidence: nautilus_trader/execution/emulator.pyx:26(cdef class OrderEmulator)
  - behavior: Optional exec algorithm per-order
    description: ExecAlgorithm is optional plug-in applied per-order via exec_algorithm_id field - modifies
      order params over time without changing the execution interface
    evidence: nautilus_trader/execution/engine.pyx:100(cdef class ExecutionEngine)
  - behavior: due_timestamp for latency simulation
    description: due_timestamp field in ModifyOrder and CancelOrder encodes intended execution time, enabling
      backtesting of HFT latency effects
    evidence: nautilus_trader/execution/engine.pyx:100(cdef class ExecutionEngine)
  - behavior: Distinct LOCAL and VENUE order states
    description: Order state machine has distinct LOCAL (Initialized, Emulated, Released) and VENUE states
      - this separation enables emulation layer for conditional orders
    evidence: docs/concepts/orders.md:62(state machine diagram)
  replaceable_points:
  - name: ExecAlgorithm
    description: Algorithm for smart order routing and execution - modifies order parameters over time
    options:
    - name: any ExecAlgorithm subclass
      traits:
      - TWAP
      - VWAP
      - Icebergs
      - Custom
      fit_for:
      - Large orders
      - Market impact reduction
      not_fit_for:
      - Small orders
      - Instant execution
    - name: none (standard direct routing)
      traits:
      - Direct venue routing
      fit_for:
      - Standard orders
      - Simple execution
      not_fit_for:
      - Large orders
      - Algorithmic execution
    default: none
  - name: OrderEmulator
    description: Fill simulation for conditional orders - bridges data and execution
    options:
    - name: OrderEmulator (default)
      traits:
      - STOP simulation
      - LIMIT_IF_TOUCHED
      - Order book based
      fit_for:
      - Conditional orders
      - Backtesting
      not_fit_for:
      - Pure live trading without emulation
    - name: disabled
      traits:
      - No emulation
      fit_for:
      - Pure live trading
      not_fit_for:
      - Backtesting
      - Conditional orders
    default: OrderEmulator
  - name: ExecutionClient
    description: Venue connectivity adapter - handles protocol translation and communication
    options:
    - name: BacktestExecClient
      traits:
      - Simulated fills
      - Backtest use
      fit_for:
      - Backtesting
      - Historical simulation
      not_fit_for:
      - Live trading
    - name: LiveExecutionClient (REST/WebSocket)
      traits:
      - Real venue connectivity
      - Live use
      fit_for:
      - Live trading
      not_fit_for:
      - Backtesting
    - name: custom client
      traits:
      - Venue-specific
      fit_for:
      - Custom venues
      not_fit_for:
      - Standard venues
    default: BacktestExecClient
  design_decisions:
  - ExecutionEngine maintains the single source of truth for order states - other components (Portfolio,
    Cache, Strategy) query it via MessageBus events rather than holding copies; eliminates state divergence
    across components; every component derives state from the same event stream (nautilus_trader/execution/engine.pyx:150)
  - OrderEmulator subscribes to DataEngine topics for order book data and generates simulated fills internally
    for conditional order types, then passes them to ExecutionEngine as if from a venue; keeps venue interface
    uniform - strategies and risk engine see no difference between live venue fills and emulated fills
    (nautilus_trader/execution/emulator.pyx:26)
  - ExecAlgorithm is optional plug-in applied per-order via exec_algorithm_id field - modifies order params
    over time without changing the execution interface; separates execution logic from venue routing;
    algorithms are stateless and reusable across venues (nautilus_trader/execution/engine.pyx:100)
  - due_timestamp field in ModifyOrder and CancelOrder encodes the intended execution time, enabling backtesting
    of HFT latency effects; allows realistic simulation of latency degradation in backtests without affecting
    live code paths (nautilus_trader/execution/engine.pyx:100)
  - Order state machine has distinct LOCAL (Initialized, Emulated, Released) and VENUE states (Submitted,
    Accepted, etc.) - this separation enables emulation layer for conditional orders; emulated orders
    stay LOCAL until triggered, then get Released and Submitted to venue - providing unified order interface
    regardless of execution path (docs/concepts/orders.md:62)
  acceptance_hints:
  - Order state transitions follow the defined state machine
  - ExecutionEngine is queried for authoritative order state by each components
  - Emulated orders behave identically to live venue fills from strategy perspective
  - Exec algorithms correctly modify order parameters over time
  - due_timestamp latency simulation produces realistic backtest results
- id: trading
  name: Trading Coordination & Portfolio
  order: 5
  responsibility: Tracks open positions and aggregate PnL across each venues and instruments. Receives
    order fill events, updates position state, calculates margin requirements, and publishes position
    snapshots. Serves as the authoritative source for position queries. This stage decouples position
    management from strategy logic.
  interface:
    inputs:
    - OrderFilled events from ExecutionEngine
    - Instrument definitions from Cache
    - Account state from Accounting
    outputs:
    - Position snapshots to Cache
    - PnL reports to strategies
    - Margin calculations to Accounting
  required_methods:
  - name: Portfolio.apply_fill
    description: Processes an OrderFilled event - updates positions, calculates PnL, publishes position
      snapshots
    evidence: nautilus_trader/portfolio/portfolio.pyx:42(Portfolio class)
  - name: Portfolio.position
    description: Returns the current position for an instrument and position_id
    evidence: nautilus_trader/portfolio/portfolio.pyx:42(Portfolio class)
  - name: Position.apply_fill
    description: Updates position state based on a fill - aggregates trades, calculates realized/unrealized
      PnL
    evidence: nautilus_trader/model/position.pyx:28(Position class)
  - name: Position.unrealized_pnl
    description: Calculates current unrealized PnL using market prices from cache
    evidence: nautilus_trader/model/position.pyx:28(Position class)
  - name: Trader.register
    description: Registers an Actor (Strategy) with the Trader, establishing dependencies and wiring
    evidence: nautilus_trader/trading/trader.py:30(Trader class)
  - name: Trader.start
    description: Starts each registered actors in sequence, ensuring proper initialization order
    evidence: nautilus_trader/trading/trader.py:30(Trader class)
  key_behaviors:
  - behavior: Event-driven position updates
    description: Portfolio and Position are decoupled via MessageBus events - Position objects are internal
      to Portfolio and not shared directly with strategies
    evidence: nautilus_trader/portfolio/portfolio.pyx:42(cdef class Portfolio)
  - behavior: Fill-based cost bar aggregation
    description: Position uses a fill-based aggregation model where each fill updates an internal cost-bar
      - not a streaming mark-to-market
    evidence: nautilus_trader/model/position.pyx:200(_apply_fill)
  - behavior: Deterministic Trader lifecycle management
    description: Trader owns each Actor instances and manages their lifecycle (start/stop) in sequence,
      ensuring dependencies are initialized before use
    evidence: nautilus_trader/trading/trader.py:30(cdef class Trader)
  - behavior: BUY creates LONG, SELL creates SHORT
    description: BUY OrderSide ALWAYS creates LONG PositionSide; SELL creates SHORT - this mapping is
      assumed by each downstream calculations
    evidence: nautilus_trader/model/position.pyx:453-462(side_from_order_side_c)
  - behavior: signed_qty as canonical position state
    description: Position uses signed_qty as canonical state; _buy_qty/_sell_qty are tracking only - P&L
      and state calculations derive from signed_qty
    evidence: nautilus_trader/model/position.pyx:71-72
  replaceable_points:
  - name: MarginModel
    description: Margin calculation logic for leveraged positions
    options:
    - name: LeveragedMarginModel
      traits:
      - Standard margin
      - Leveraged instruments
      fit_for:
      - Futures
      - Options
      - Leveraged accounts
      not_fit_for:
      - Cash accounts
    - name: custom MarginModel
      traits:
      - User-defined logic
      fit_for:
      - Venue-specific margin rules
      not_fit_for:
      - Standard compliance
    default: LeveragedMarginModel
  - name: FeeModel
    description: Fee calculation per fill - affects PnL calculations
    options:
    - name: MakerTakerFeeModel
      traits:
      - Maker/taker spread
      - Perpetual futures
      fit_for:
      - Exchange fee structures
      not_fit_for:
      - Fixed fee structures
    - name: static fee model
      traits:
      - Fixed per-trade
      - Simple
      fit_for:
      - Simple fee structures
      not_fit_for:
      - Complex fee structures
    default: MakerTakerFeeModel
  design_decisions:
  - Portfolio and Position are decoupled via MessageBus events - Position objects are internal to Portfolio
    and not shared directly with strategies; prevents strategies from directly mutating position state;
    each changes flow through event-driven updates (nautilus_trader/portfolio/portfolio.pyx:42)
  - Position uses a fill-based aggregation model where each fill updates an internal cost-bar - not a
    streaming mark-to-market; enables exact replication of broker position calculations from fill records;
    critical for backtest-live parity (nautilus_trader/model/position.pyx:200)
  - Trader owns each Actor instances (Strategies, ExecutionEngine, RiskEngine, etc.) and manages their
    lifecycle (start/stop) in sequence, ensuring dependencies are initialized before use; provides deterministic
    startup order for complex multi-strategy systems; prevents race conditions during initialization (nautilus_trader/trading/trader.py:30)
  - BUY OrderSide ALWAYS creates LONG PositionSide; SELL creates SHORT - Position state calculations in
    strategy, execution engine, and cache each assume this mapping (nautilus_trader/model/position.pyx:453-462)
  - Position uses signed_qty as canonical state; _buy_qty/_sell_qty are tracking only - P&L and state
    calculations derive from signed_qty; buy/sell qty only for averaging (nautilus_trader/model/position.pyx:71-72)
  acceptance_hints:
  - Positions update correctly on every fill event
  - Realized and unrealized PnL calculations are accurate
  - Strategies receive correct position snapshots via MessageBus
  - Margin calculations match venue requirements
  - Position state is consistent across backtest and live
- id: backtest_simulation
  name: Backtest Simulation
  order: 6
  responsibility: Drives historical data through the system at simulated speed. Manages simulated exchanges
    (venues), applies fill models, latency models, and fee models. Provides a drop-in replacement for
    live system components. This stage enables historical testing with identical behavior to live trading.
  interface:
    inputs:
    - Historical data stream (instruments, ticks, bars) from DataCatalog
    - Strategy definitions
    - Venue/instrument configuration
    outputs:
    - Backtest results (PnL, positions, orders, stats) to results store
    - Live-compatible system state accessible via Trader/Cache/Portfolio
  required_methods:
  - name: BacktestEngine.run
    description: Runs the backtest by iterating through historical data and processing events
    evidence: nautilus_trader/backtest/engine.pyx:217(BacktestEngine class)
  - name: BacktestEngine.add_data
    description: Adds historical data to the backtest - supports streaming and batch modes
    evidence: nautilus_trader/backtest/engine.pyx:217(BacktestEngine class)
  - name: BacktestEngine.add_instrument
    description: Adds an instrument definition for the backtest venue
    evidence: nautilus_trader/backtest/engine.pyx:217(BacktestEngine class)
  - name: SimulatedExchange.process_order
    description: Processes an order through simulated matching - applies fill model and generates fill
      events
    evidence: nautilus_trader/backtest/engine.pyx:4500(SimulatedExchange class)
  - name: BacktestEngine.results
    description: Returns the BacktestResult containing PnL, positions, orders, and statistics
    evidence: nautilus_trader/backtest/engine.pyx:217(BacktestEngine class)
  key_behaviors:
  - behavior: Shared NautilusKernel with live
    description: BacktestEngine reuses the same NautilusKernel (DataEngine, ExecutionEngine, RiskEngine,
      Portfolio, Cache, msgbus) as live - same code path, different data source and clock
    evidence: nautilus_trader/backtest/engine.pyx:266(self._kernel = NautilusKernel)
  - behavior: Venue-style fill events through ExecutionEngine
    description: SimulatedExchange implements venue-style fill events that flow through ExecutionEngine
      identically to live fills
    evidence: nautilus_trader/backtest/engine.pyx:4500(cdef class SimulatedExchange)
  - behavior: Static TestClock for deterministic execution
    description: Backtest uses a single static Clock advanced by the BacktestEngine - data timestamps
      must be monotonically non-decreasing
    evidence: nautilus_trader/common/component.pyx:1650(cdef class TestClock)
  - behavior: Deferred sorting for O(n) performance
    description: Data can be added in streaming mode (generator yielding chunks) or batch mode - sorting
      deferred to end provides O(n) vs O(n²) for incremental sorts
    evidence: docs/concepts/backtesting.md:61(defer sorting strategy)
  - behavior: Instrument expiration for derivatives
    description: ENGINE_EXPIRING_INSTRUMENT_CLASSES constant defines which instruments auto-expire - Backtest
      engine expiration logic only applies to FUTURE, FUTURES_SPREAD, OPTION, OPTION_SPREAD
    evidence: nautilus_trader/model/instruments/base.pyx:61-67
  replaceable_points:
  - name: FillModel
    description: Logic for determining if/how orders fill - simulates market microstructure
    options:
    - name: FillModel (default)
      traits:
      - Standard fill simulation
      fit_for:
      - Standard backtesting
      not_fit_for:
      - Custom fill logic
    - name: custom fill model
      traits:
      - User-defined
      fit_for:
      - Specific market models
      not_fit_for:
      - Standard use cases
    default: FillModel
  - name: LatencyModel
    description: Simulated network latency on orders/fills - enables realistic HFT testing
    options:
    - name: LatencyModel (default, zero latency)
      traits:
      - Zero latency
      - Default behavior
      fit_for:
      - Standard backtesting
      not_fit_for:
      - HFT simulation
    - name: GaussianLatencyModel
      traits:
      - Normal distribution
      - Configurable stddev
      fit_for:
      - HFT market-maker backtesting
      not_fit_for:
      - Standard strategies
    default: LatencyModel
  - name: FeeModel
    description: Fee calculation per simulated fill
    options:
    - name: MakerTakerFeeModel
      traits:
      - Maker/taker fees
      - Exchange-like
      fit_for:
      - Exchange-traded instruments
      not_fit_for:
      - Fixed fee venues
    - name: static model
      traits:
      - Fixed per-trade
      fit_for:
      - Simple fee structures
      not_fit_for:
      - Complex fee structures
    default: MakerTakerFeeModel
  design_decisions:
  - BacktestEngine reuses the same NautilusKernel (DataEngine, ExecutionEngine, RiskEngine, Portfolio,
    Cache, msgbus) as live - same code path, different data source and clock; eliminates the live/backtest
    gap - strategies behave identically in both environments because the entire engine stack is shared
    (nautilus_trader/backtest/engine.pyx:266)
  - SimulatedExchange implements venue-style fill events that flow through ExecutionEngine identically
    to live fills; OrderEmulator and exec algorithms see the same event interface; their behavior is fully
    testable in backtest (nautilus_trader/backtest/engine.pyx:4500)
  - LatencyModel applied per-fill in simulated exchange; due_timestamp in commands used for HFT simulation;
    enables realistic simulation of HFT market-maker strategies where fill timing affects profitability
    (nautilus_trader/backtest/engine.pyx:217)
  - Backtest uses a single static Clock advanced by the BacktestEngine - data timestamps must be monotonically
    non-decreasing; deterministic execution order; no race conditions; results are reproducible across
    runs (nautilus_trader/common/component.pyx:1650)
  - Data can be added in streaming mode (generator yielding chunks) or batch mode - sorting deferred to
    end provides O(n) vs O(n²) for incremental sorts; critical for large multi-instrument backtests where
    sorting cost dominates runtime (docs/concepts/backtesting.md:61)
  acceptance_hints:
  - Backtest produces reproducible results across runs
  - Results match live execution for identical data
  - Simulated fills follow configured fill model
  - Latency simulation affects order timing correctly
  - Large multi-instrument backtests complete in reasonable time
- id: state_persistence
  name: State Persistence & Cache
  order: 7
  responsibility: Maintains the authoritative in-memory cache of each system state (instruments, orders,
    positions, account snapshots). Provides optional database backing for warm restarts and cross-session
    continuity. This stage enables fast state queries and recovery from crashes.
  interface:
    inputs:
    - Events from ExecutionEngine (fills, order state changes), Accounting (balance updates)
    outputs:
    - State queries from any component (Strategy, Portfolio, RiskEngine)
    - Persisted snapshots to database
  required_methods:
  - name: Cache.instrument
    description: Returns instrument definition by InstrumentId from cache
    evidence: nautilus_trader/cache/cache.pyx:81(Cache class)
  - name: Cache.orders
    description: Returns each orders matching optional venue/strategy filter
    evidence: nautilus_trader/cache/cache.pyx:81(Cache class)
  - name: Cache.position
    description: Returns position by position_id
    evidence: nautilus_trader/cache/cache.pyx:81(Cache class)
  - name: Cache.account
    description: Returns account state by venue
    evidence: nautilus_trader/cache/cache.pyx:81(Cache class)
  - name: Cache.quote_ticks
    description: Returns buffered quote ticks for an instrument
    evidence: nautilus_trader/cache/cache.pyx:126(_quote_ticks)
  - name: CacheDatabaseFacade.flush
    description: Persists current cache state to database
    evidence: nautilus_trader/cache/facade.pyx:1(CacheDatabaseFacade class)
  - name: CacheDatabaseFacade.load
    description: Loads persisted state from database into cache
    evidence: nautilus_trader/cache/facade.pyx:1(CacheDatabaseFacade class)
  key_behaviors:
  - behavior: Cache is eventually consistent, not source of truth
    description: Cache is NOT the source of truth for orders - ExecutionEngine is. Cache stores a snapshot
      for fast queries and persistence, but ExecutionEngine is consulted for authoritative state
    evidence: nautilus_trader/cache/cache.pyx:81(cdef class Cache)
  - behavior: Optional database backing
    description: Cache has optional database backing (CacheDatabaseFacade) - when None, no persistence
      occurs. This enables memory-only backtests and live trading without Redis
    evidence: nautilus_trader/cache/cache.pyx:108(self._database = database)
  - behavior: Bidirectional indexes for O(1) lookups
    description: Bidirectional indexes (_index_venue_orders, _index_order_strategy, etc.) maintained in
      sync with primary caches - O(1) lookup for any entity relationship query
    evidence: nautilus_trader/cache/cache.pyx:144(_index_venue_orders)
  - behavior: Position purge rebuilds state
    description: Position.purge_events_for_order rebuilds state by reapplying fills in order - commission
      events handled specially
    evidence: nautilus_trader/model/position.pyx:123-183(purge_events_for_order)
  replaceable_points:
  - name: CacheDatabaseFacade
    description: Persistence backend for cache state - enables crash recovery and cross-session continuity
    options:
    - name: RedisMessageBusDatabase
      traits:
      - Redis-backed
      - Durable
      - Live trading
      fit_for:
      - Production live trading
      - Crash recovery
      not_fit_for:
      - Memory-only backtests
      - No Redis environment
    - name: None (no persistence)
      traits:
      - Memory-only
      - Zero dependencies
      fit_for:
      - Pure backtesting
      - Development
      not_fit_for:
      - Live trading
      - Production
    default: None
  design_decisions:
  - Cache is NOT the source of truth for orders - ExecutionEngine is. Cache stores a snapshot for fast
    queries and persistence, but ExecutionEngine is consulted for authoritative state; avoids write conflicts;
    cache is eventually consistent with ExecutionEngine state (nautilus_trader/cache/cache.pyx:81)
  - Cache has optional database backing (CacheDatabaseFacade) - when None, no persistence occurs. This
    enables memory-only backtests and live trading without Redis; zero-dependency operation for simple
    use cases; Redis adds durability for production live trading (nautilus_trader/cache/cache.pyx:108)
  - Bidirectional indexes (_index_venue_orders, _index_order_strategy, etc.) maintained in sync with primary
    caches - O(1) lookup for any entity relationship query; supports fast queries like 'each orders for
    this strategy' or 'each positions for this venue' without full scans (nautilus_trader/cache/cache.pyx:144)
  - Position purge rebuilds state by reapplying fills in order; commission events handled specially; event
    ordering matters for position reconstruction (nautilus_trader/model/position.pyx:123-183)
  - MockCacheDatabase uses in-memory dicts for each state - no persistence; tests relying on MockCacheDatabase
    cannot test persistence/recovery scenarios (nautilus_trader/test_kit/mocks/cache_database.py:45-56)
  acceptance_hints:
  - Every components can query state from cache without blocking
  - Bidirectional indexes stay in sync with primary data
  - Cache correctly reflects ExecutionEngine order state
  - Persistence works correctly when database backing is enabled
  - Crash recovery restores correct state
- id: accounting
  name: Accounting & Settlement
  order: 8
  responsibility: Tracks account balances, calculates margin requirements, processes settlement, and records
    each financial events (fees, rollovers, collateral adjustments). This stage maintains the financial
    integrity of the trading system.
  interface:
    inputs:
    - OrderFilled events with fill prices and quantities
    - Funding rate updates for perpetual futures
    outputs:
    - Account state updates (balances, margin used) to Cache
    - Margin/leverage settings to RiskEngine
  required_methods:
  - name: Account.apply_fill
    description: Processes a fill event - calculates fees, updates balance, applies margin changes
    evidence: nautilus_trader/accounting/accounts/base.pyx:30(Account class)
  - name: Account.calculate_margin
    description: Calculates current margin requirement for each positions
    evidence: nautilus_trader/accounting/accounts/base.pyx:30(Account class)
  - name: Account.apply_settlement
    description: Processes settlement events including funding rate payments for perpetuals
    evidence: nautilus_trader/accounting/accounts/base.pyx:30(Account class)
  - name: LeveragedMarginModel.calculate
    description: Calculates margin requirement for leveraged instruments based on position and price
    evidence: nautilus_trader/accounting/margin_models.pyx:1(LeveragedMarginModel class)
  key_behaviors:
  - behavior: Account type abstraction
    description: Account classes (Cash, Margin, Security) each implement the same Account interface but
      with different balance/margin semantics
    evidence: nautilus_trader/accounting/accounts/base.pyx:30(cdef class Account)
  - behavior: Two-level margin enforcement
    description: Margin requirements checked at order submission AND at every fill - provides defense-in-depth
      for leverage limits
    evidence: nautilus_trader/accounting/accounts/base.pyx:30(cdef class Account)
  - behavior: TWAPed funding rate application
    description: Funding rate is TWAPed over the funding interval (typically 8 hours for perpetuals) rather
      than applied at a single instant
    evidence: nautilus_trader/accounting/accounts/base.pyx:30(cdef class Account)
  - behavior: '*2 commission for round-turn assumption'
    description: Commission calculation uses *2 for round-turn assumption - each FixedRiskSizer position
      calculations assume entry+exit commission is symmetric
    evidence: nautilus_trader/risk/sizing.pyx:89(_calculate_riskable_money)
  replaceable_points:
  - name: Account type
    description: Account semantics determining balance tracking and margin behavior
    options:
    - name: CashAccount
      traits:
      - No leverage
      - Simple balance
      fit_for:
      - Spot trading
      - Cash accounts
      not_fit_for:
      - Leveraged trading
      - Futures
    - name: MarginAccount
      traits:
      - Leverage
      - Margin requirements
      fit_for:
      - Futures
      - Leveraged trading
      not_fit_for:
      - Cash accounts
    - name: SecurityAccount
      traits:
      - Securities-specific
      - T+2 settlement
      fit_for:
      - Stocks
      - Options
      not_fit_for:
      - Crypto
      - Perpetuals
    default: CashAccount
  - name: MarginModel
    description: Margin calculation per instrument - determines how much collateral is required
    options:
    - name: LeveragedMarginModel
      traits:
      - Standard margin
      - Position-based
      fit_for:
      - Futures
      - Perpetual swaps
      not_fit_for:
      - Cash accounts
    - name: custom
      traits:
      - User-defined logic
      fit_for:
      - Venue-specific margin rules
      not_fit_for:
      - Standard compliance
    default: LeveragedMarginModel
  design_decisions:
  - Account classes (Cash, Margin, Security) each implement the same Account interface but with different
    balance/margin semantics; allows transparent swapping of account types without changing ExecutionEngine
    or RiskEngine code (nautilus_trader/accounting/accounts/base.pyx:30)
  - Margin requirements checked at order submission AND at every fill - two-level enforcement prevents
    order-time limits from being circumvented by subsequent price moves; a fill could push an account
    from margin-compliant to non-compliant (nautilus_trader/accounting/accounts/base.pyx:30)
  - Funding rate is TWAPed over the funding interval (typically 8 hours for perpetuals) rather than applied
    at a single instant; matches exchange conventions and prevents artificial PnL discontinuities at funding
    timestamps (nautilus_trader/accounting/accounts/base.pyx:30)
  - Commission calculation uses *2 for round-turn assumption - each FixedRiskSizer position calculations
    assume entry+exit commission is symmetric (nautilus_trader/risk/sizing.pyx:89)
  acceptance_hints:
  - Account balances update correctly on every fill
  - Margin calculations match venue requirements
  - Funding rate payments are distributed over interval, not applied at single instant
  - Fee calculations are accurate for maker/taker or static models
  - Account state is consistent with position state
data_flow:
- from_stage: data_collection
  to_stage: factor_computation
  data: QuoteTick/TradeTick/Bar events published on data topics (e.g., 'data.quotes.BINANCE.BTCUSDT-PERP')
    → Strategy.on_quote_tick() / on_bar()
- from_stage: data_collection
  to_stage: execution
  data: OrderBookDelta events → OrderEmulator.subscribes() for conditional order fill simulation
- from_stage: data_collection
  to_stage: backtest_simulation
  data: Historical data injected via DataEngine._replay_data() using same data types as live feed
- from_stage: factor_computation
  to_stage: risk_management
  data: TradingCommand (SubmitOrder, CancelOrder, ModifyOrder) messages on 'trading.command' endpoint
- from_stage: risk_management
  to_stage: execution
  data: Approved TradingCommand messages forwarded after risk validation
- from_stage: risk_management
  to_stage: factor_computation
  data: OrderReject events published on 'strategy.order_rejected' topic
- from_stage: execution
  to_stage: trading
  data: OrderFilled events → Portfolio.apply_fill() for position update
- from_stage: execution
  to_stage: factor_computation
  data: Order events (Accepted, Filled, PartiallyFilled, Canceled) on 'strategy.order_*' topics → Strategy._handle_order_*()
    callbacks
- from_stage: execution
  to_stage: state_persistence
  data: Order and Position snapshots written to Cache
- from_stage: execution
  to_stage: backtest_simulation
  data: SubmitOrder commands → SimulatedExchange matching → fill events back to ExecutionEngine
- from_stage: trading
  to_stage: accounting
  data: Position state passed to Account.calculate_margin() and apply_settlement()
- from_stage: trading
  to_stage: state_persistence
  data: Position snapshots written to Cache
- from_stage: accounting
  to_stage: state_persistence
  data: Account balance/margin snapshots written to Cache
- from_stage: backtest_simulation
  to_stage: state_persistence
  data: Backtest results (BacktestResult) with PnL, stats, and state snapshots persisted to catalog
global_contracts:
- contract: Every data objects have a ts_init (nanoseconds since UNIX epoch) as their primary ordering
    key - timestamps use nanosecond precision internally; human-readable conversion only at I/O boundaries
  evidence: nautilus_trader/core/data.pyx:25(cdef class Data(BaseData))
- contract: Every identifiers (InstrumentId, ClientOrderId, Venue, etc.) are immutable value objects with
    equality by value - enables safe dictionary keys and hash-based lookups
  evidence: nautilus_trader/model/identifiers.pyx:1(identifier classes)
- contract: Cache maintains bidirectional indexes that must stay in sync with primary caches on every
    write operation - O(1) lookup for any entity relationship query
  evidence: nautilus_trader/cache/cache.pyx:144(_index_venue_orders etc.)
- contract: Orders are the only authorized source of position_id assignment; positions are never created
    or modified outside of order fill processing
  evidence: nautilus_trader/portfolio/portfolio.pyx:180(_apply_fill)
- contract: The ExecutionEngine is the single source of truth for order state; each other components derive
    state from its event stream - Cache stores a snapshot for fast queries but ExecutionEngine is consulted
    for authoritative state
  evidence: nautilus_trader/execution/engine.pyx:150(_order_states)
- contract: 'Cache-then-publish ordering for quote/trade/bar data: data is stored in Cache before being
    published to MessageBus, so strategy handlers always see consistent state when reading from cache'
  evidence: docs/concepts/architecture.md:277(cache-then-publish order)
- contract: BUY OrderSide ALWAYS creates LONG PositionSide; SELL creates SHORT - position state calculations
    in strategy, execution engine, and cache each assume this mapping
  evidence: nautilus_trader/model/position.pyx:453-462(side_from_order_side_c)
- contract: NautilusKernel wires each core components (DataEngine, ExecEngine, RiskEngine, Portfolio,
    Cache, msgbus) together - both BacktestEngine and TradingNode build a NautilusKernel, ensuring shared
    component wiring
  evidence: nautilus_trader/system/kernel.py:58(cdef class NautilusKernel)
- contract: Strategy requires registration with Trader before any trading operations - submit_order, cancel_order
    each check trader_id is not None
  evidence: nautilus_trader/trading/strategy.pyx:941(Condition.is_true trader_id check)
business_decisions:
- id: BD-001
  type: B
  content: Data types classified into three tiers (PYO3 managed, Book data, Python managed) each with
    different internal representation
  rationale: Allows optimal memory layout and zero-copy C-level handling for pyo3 types while preserving
    Python flexibility for user-defined data. This three-tier classification boundary ensures pyo3 native
    types bypass Python GIL overhead while user types remain extensible within Python constraints.
  evidence: nautilus_trader/data/engine.pyx:1385(_process_pyo3_data)
  stage: data_collection
  alternative_considered: Single unified data type with runtime polymorphism was rejected due to GIL contention
    overhead
- id: BD-002
  type: B
  content: Bar aggregation done per-bar-type with internal queue of raw ticks, only finalized bars published
    on bar close
  rationale: Ensures complete OHLCV bars with accurate volume; prevents partial-bar signals in strategies.
    The boundary is that strategies never receive incomplete bars regardless of data arrival timing, eliminating
    look-ahead bias in backtesting.
  evidence: nautilus_trader/data/engine.pyx:1612(_finalize_bar)
  stage: data_collection
  alternative_considered: Streaming bar updates were rejected to maintain backtest-live parity
- id: BD-003
  type: M/BA
  content: Quote tick buffering at 10,000 per instrument by default (configurable tick_capacity)
  rationale: Provides strategy access to recent quote history while bounding memory per instrument. The
    configurable boundary (tick_capacity) allows memory-constrained environments to reduce footprint while
    preserving historical access for strategies needing recent quotes.
  evidence: nautilus_trader/cache/cache.pyx:126(_quote_ticks)
  stage: data_collection
  alternative_considered: Unbounded buffering was rejected; LRU eviction was rejected in favor of explicit
    capacity
- id: BD-004
  type: BA
  content: Time range generator uses a gap-filling strategy that requests adjacent intervals to fill gaps,
    not individual timestamps
  rationale: Reduces number of data requests and handles contiguous missing data efficiently. The boundary
    is that gap detection operates at interval level rather than timestamp level, trading request granularity
    for reduced API calls.
  evidence: nautilus_trader/data/engine.pyx:2974(_get_gap_filling_ranges)
  stage: data_collection
  alternative_considered: Per-timestamp gap filling was rejected due to excessive request overhead
- id: BD-005
  type: B/DK
  content: Replay mode suspends external data and injects historical data through the same data engine
    pipeline
  rationale: Strategies see identical data interface in live and backtest; replay uses fill_gap=False
    because source is known complete. The boundary is that replay mode completely shadows live data flow,
    ensuring strategies cannot distinguish replay from live execution.
  evidence: nautilus_trader/data/engine.pyx:1978(_replay_data)
  stage: data_collection
  alternative_considered: Separate replay interface was rejected to maintain complete code path parity
- id: BD-006
  type: B/RC
  content: Data catalog uses a Singleton+ABCMeta metaclass to enforce single catalog instance per process
  rationale: Prevents accidental creation of multiple catalog instances pointing to different data sources.
    The metaclass boundary ensures at construction time that any second instantiation raises an error,
    preventing silent data inconsistencies.
  evidence: nautilus_trader/persistence/catalog/base.py:42(_CombinedMeta)
  stage: data_collection
  alternative_considered: Module-level singleton pattern was rejected; ABCMeta provides interface enforcement
- id: BD-007
  type: B
  content: Strategy inherits from Actor which owns a Clock, msgbus, cache, portfolio, and log — ensuring
    strategies have full system context without coupling to engine internals
  rationale: Encapsulates each system dependencies in base class; strategy only needs to override event
    hooks. The inheritance boundary cleanly separates strategy business logic from infrastructure concerns,
    enabling testability and reuse.
  evidence: nautilus_trader/trading/strategy.pyx:53(Strategy)
  stage: factor_computation
  alternative_considered: Composition pattern was rejected in favor of inheritance for simpler event hook
    override model
- id: BD-008
  type: BA
  content: Order events are routed through MessageBus with strategy_id and position_id attached, enabling
    stateless strategy reconstruction from event stream
  rationale: Enables event sourcing, backtest replay, and audit trails without strategies holding mutable
    state. The event-attached context boundary means strategies can be recreated from event logs alone
    without database queries.
  evidence: nautilus_trader/trading/strategy.pyx:1200(_handle_order_filled)
  stage: factor_computation
  alternative_considered: Stateful strategies with periodic snapshots were rejected due to reconstruction
    complexity
- id: BD-009
  type: BA
  content: Bracket orders encoded as OrderList with OTO contingency; child orders inherit position_id
    at submission time, not fill time
  rationale: Ensures position assignment is atomic with order submission, preventing race conditions in
    concurrent backtest scenarios. The submission-time inheritance boundary eliminates the window where
    child orders could have inconsistent position_id.
  evidence: nautilus_trader/model/orders/base.pyx:385(_apply_position_id)
  stage: factor_computation
  alternative_considered: Fill-time position_id assignment was rejected due to race condition window
- id: BD-010
