  rationale: 'These defaults disable automatic management of stop orders and GTD expiration, requiring
    explicit configuration. This conservative default prevents unintended automated actions during backtesting
    or live trading when users haven''t considered these behaviors. Boundary: Defaults apply to each StrategyConfig
    instances; enabling either requires intentional configuration and understanding of execution semantics.'
  evidence: nautilus_trader/trading/config.py:33(StrategyConfig)
  stage: default_value
  alternative_considered: Enabling by default was rejected to prevent unexpected behavior for users migrating
    from other systems or running legacy strategies.
  vague_rationale: true
- id: BD-104
  type: B
  content: ENGINE_EXPIRING_INSTRUMENT_CLASSES constant defines which instruments auto-expire
  rationale: 'Only instruments in this whitelist receive automatic expiration handling. This is a business
    rule ensuring that only instruments with defined expiry (futures, options) are subject to expiration
    processing, while perpetual instruments (spot, equities) are excluded. Boundary: Adding new instrument
    types requires decision to either include in this whitelist or handle expiration manually.'
  evidence: nautilus_trader/model/instruments/base.pyx:61-67(ENGINE_EXPIRING_INSTRUMENT_CLASSES)
  stage: invariant
  alternative_considered: Runtime registration of expiring instruments was considered but adds complexity;
    compile-time whitelist is simpler and safer for the core engine.
- id: BD-105
  type: DK/B
  content: Strategy inherits Actor which uses placeholder Clock until registered
  rationale: 'The placeholder clock prevents time-dependent logic from running before proper registration.
    This design ensures no premature event generation or timer-based actions occur before the strategy
    is fully initialized within a trading context. Boundary: Any time-sensitive operations (delays, scheduled
    tasks) called before Clock replacement will use the placeholder and likely fail or behave unexpectedly.'
  evidence: nautilus_trader/common/actor.pyx:150-165(__init__)
  stage: inheritance
  alternative_considered: Blocking initialization until Clock is provided was rejected as it would complicate
    standalone testing scenarios.
- id: BD-106
  type: DK
  content: Position.purge_events_for_order rebuilds state by reapplying fills in order
  rationale: 'Rebuilding from scratch rather than incremental update ensures internal consistency after
    order cancellation or amendment. The rebuild applies each non-purged events sequentially, guaranteeing
    computed quantities match the event log. Boundary: This is an all-or-nothing operation; partial rebuilds
    are not supported, and each events for the specified order are removed simultaneously.'
  evidence: nautilus_trader/model/position.pyx:123-183(purge_events_for_order)
  stage: ordering_contract
  alternative_considered: Incremental adjustment was rejected due to complexity of maintaining consistency
    across each computed fields after partial modifications.
- id: BD-107
  type: DK/B
  content: Position uses signed_qty as canonical state; _buy_qty/_sell_qty are tracking only
  rationale: 'Signed quantity is the authoritative source for position size, enabling direct mathematical
    operations (additions, subtractions) without sign logic. The directional trackers (_buy_qty, _sell_qty)
    exist only for convenience reporting and metrics, never as authoritative. Boundary: External code
    must never use _buy_qty/_sell_qty for position sizing decisions; only signed_qty represents the true
    position state.'
  evidence: nautilus_trader/model/position.pyx:71-72,87(_buy_qty/_sell_qty);nautilus_trader/model/position.pyx:925(signed_qty
    increment)
  stage: pattern_choice
  alternative_considered: Using separate long/short position objects was rejected in favor of signed quantity
    for simpler PnL calculation and standard financial convention.
- id: BD-108
  type: B/BA
  content: IBContract normalizes strike=0.0 to UNSET_DOUBLE in __post_init__
  rationale: 'Interactive Brokers protocol treats strike=0.0 as invalid for options and other strike-bearing
    instruments. The normalization prevents API errors by converting this placeholder value to the protocol''s
    unset marker. Boundary: This normalization applies only to IB-specific contracts; other adapters may
    handle 0.0 differently. This is adapter-specific, not a universal option convention.'
  evidence: nautilus_trader/adapters/interactive_brokers/common.py:154-163(__post_init__)
  stage: default_value
  alternative_considered: Validation error was considered but rejected in favor of silent normalization
    to match IB's expected behavior for non-strike instruments.
- id: BD-109
  type: DK
  content: OrderFactory requires OrderManager with submit_order_handler=None
  rationale: 'The null handler requirement ensures OrderFactory cannot submit orders without an active
    OrderManager context. This prevents order leakage in scenarios where factories are used for validation
    or price calculation without actual execution intent. Boundary: Using OrderFactory outside a registered
    OrderManager context requires explicit handler provision; otherwise, order submission will silently
    do nothing.'
  evidence: nautilus_trader/trading/strategy.pyx:307-319(OrderManager init)
  stage: default_value
  alternative_considered: Raising an exception was considered but rejected to allow OrderFactory use for
    price calculation and validation without execution.
- id: BD-110
  type: DK
  content: Strategy requires registration with Trader before any trading operations
  rationale: 'The trader_id precondition check enforces that each trading operations occur within a properly
    registered context. Unregistered strategies lack venue connectivity, position tracking, and risk management.
    This invariant prevents orphaned operations that could bypass risk controls. Boundary: Any method
    on Strategy that interacts with orders, positions, or market data will fail if called before registration;
    there are no partial states.'
  evidence: nautilus_trader/trading/strategy.pyx:941(Condition.is_true trader_id check)
  stage: invariant
  alternative_considered: Lazy registration was rejected as it would create unpredictable behavior and
    make debugging registration issues difficult.
- id: BD-111
  type: DK/B
  content: 'Closing order side is deterministic from position side: LONG->SELL, SHORT->BUY'
  rationale: 'The closing order side follows a fixed convention derived from position direction, eliminating
    ambiguity in close operations. This deterministic behavior prevents user errors where the wrong closing
    side might be selected. Boundary: This applies to each Position.close() calls; strategies requiring
    same-side increase (pyramiding) must use submit_order with explicit side, not close().'
  evidence: nautilus_trader/model/position.pyx:482-498(closing_order_side)
  stage: ordering_contract
  alternative_considered: Flexible close direction based on remaining quantity was rejected; explicit
    close-only semantics were preferred for safety.
- id: BD-112
  type: B
  content: MockCacheDatabase uses in-memory dicts for each state - no persistence
  rationale: 'The mock intentionally excludes persistence to ensure tests are isolated, fast, and repeatable
    without filesystem or database dependencies. State is ephemeral and resets between test runs. Boundary:
    Tests relying on MockCacheDatabase cannot verify persistence behavior; persistence must be tested
    with real database adapters. This is test infrastructure only.'
  evidence: nautilus_trader/test_kit/mocks/cache_database.py:45-56(__init__)
  stage: default_value
  alternative_considered: In-memory persistence layer was considered but adds complexity without significant
    testing value for unit tests.
- id: BD-113
  type: DK
  content: Strategy event handlers (on_bar, on_quote_tick) called by message bus subscription
  rationale: 'Event handlers are invoked through the message bus subscription mechanism, which manages
    threading, buffering, and ordering of incoming data. Direct invocation would bypass these guarantees
    and risk race conditions. Boundary: Handlers execute in the message bus''s thread context, not the
    strategy''s main thread; blocking operations in handlers affect bus throughput.'
  evidence: nautilus_trader/trading/strategy.pyx:322-323(_msgbus.subscribe)
  stage: pattern_choice
  alternative_considered: Direct threading per handler was rejected in favor of centralized bus management
    for consistent ordering and backpressure control.
- id: BD-114
  type: DK/B
  content: Position.reopen after close clears each state then applies new fill
  rationale: 'The reopen operation implements a clean-slate pattern: each position state is discarded
    before applying the new fill, preventing any carryover from the closed position (unrealized PnL, quantity
    history, fill count). This ensures fresh position semantics after reopening. Boundary: The cleared
    state is permanent; any debugging or audit requirements for closed position state must be handled
    by external logging before reopen is called.'
  evidence: nautilus_trader/model/position.pyx:553-572(reopen logic)
  stage: invariant
  alternative_considered: Preserving partial state (like net PnL) was rejected to maintain clean position
    lifecycle semantics and avoid complex state merging.
- id: BD-115
  type: BA
  content: 'INTERACTION: [BD-023] × [BD-036] → Backtest parity promise undermined by hard gate bypass,
    creating phantom safety during simulation'
  rationale: 'BD-023 guarantees identical kernel stack between live and backtest, but BD-036 explicitly
    bypasses RiskEngine in backtest. This creates a fundamental contradiction: users cannot trust backtest
    to reveal risk management failures since the non-negotiable safety boundary (BD-012) is removed. Strategies
    that would fail live risk checks pass backtest silently, creating false confidence.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Shadow-mode risk validation in backtest was rejected for performance complexity
- id: BD-116
  type: B/DK
  content: 'INTERACTION: [BD-036] × [BD-061] → Risk bypass disables order rate limiting in backtest, masking
    potential HFT runaway scenarios'
  rationale: BD-061 defines max_order_submit_rate as a critical protection against runaway algorithmic
    execution. However, BD-036 bypasses the entire RiskEngine during backtest, rendering this protection
    ineffective in simulation. Users testing high-frequency strategies cannot verify whether their algorithms
    would trigger rate limit safeguards in production, potentially deploying strategies that would be
    throttled or rejected at the exchange.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Rate limit enforcement independent of RiskEngine bypass was considered but adds
    complexity
- id: BD-117
  type: BA
  content: 'INTERACTION: [BD-002] × [BD-052] → Bar close aggregation conflicts with EMA crossover strategy
    timing assumptions'
  rationale: 'BD-002 ensures bars are only published on close, preventing partial-bar signals. However,
    BD-052 defines EMA crossover signals without explicit documentation of whether execution occurs at
    bar close or bar open. This creates ambiguity: if strategies expect bar-open execution while data
    is only available at bar-close, signal timing is misaligned. The shared kernel (BD-023) doesn''t resolve
    this since timing behavior isn''t configurable.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Explicit bar-open vs bar-close execution mode was considered but adds complexity
- id: BD-118
  type: B/BA
  content: 'INTERACTION: [BD-100] × [BD-021] × [BD-107] → Three-way invariant dependency creates hidden
    coupling across position model layers'
  rationale: 'BD-100 defines BUY=LONG, SELL=SHORT mapping. BD-021 ensures positions aggregate from fills
    deterministically. BD-107 mandates signed_qty as canonical state. These three decisions form an inseparable
    invariant chain: if any developer uses _buy_qty/_sell_qty (BD-107 warning) for position sizing instead
    of signed_qty, or assumes reversed BUY/SELL mapping (BD-100), position calculations become incorrect.
    No explicit validation enforces this trilogy.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Runtime invariant validation was considered but adds performance overhead
- id: BD-119
  type: BA
  content: 'INTERACTION: [BD-006] × [BD-029] → Singleton catalog with optional database creates non-durable
    state in production deployments'
  rationale: BD-006 enforces single catalog instance per process for data consistency. BD-029 allows database
    backing to be None for memory-only operation. When deployed with database=None in production, the
    Singleton catalog holds each state in-process memory. Process crash, restart, or OOM kill loses the
    entire catalog including strategies, orders, and positions. The singleton guarantee is meaningless
    without durability.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Mandatory persistence was rejected for development convenience but creates production
    risk
- id: BD-120
  type: B
  content: 'INTERACTION: [BD-112] × [BD-062] → Mock persistence creates false assurance that position
    snapshots work correctly'
  rationale: BD-062 enables position state persistence via snapshot_positions=True. BD-112 intentionally
    provides no persistence in MockCacheDatabase. Tests using the mock cannot verify that persistence
    actually works—writes may appear successful while data is lost on restart. Database corruption, incomplete
    writes, or recovery failures remain undetected until production.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: In-memory persistence layer was considered but adds test complexity
- id: BD-121
  type: BA/M
  content: 'INTERACTION: [BD-026] × [BD-025] × [BD-018] → Deterministic clock combined with stochastic
    latency creates unreproducible HFT edge cases'
  rationale: 'BD-026 guarantees deterministic execution via monotonic clock. BD-025 applies per-fill LatencyModel
    with random distributions. BD-018 uses due_timestamp for HFT simulation. These three interact: the
    LatencyModel adds stochastic timing that should make results reproducible with fixed seed (BD-044),
    but if any component outside the seed scope uses random numbers, HFT backtests become non-deterministic.
    Latency-sensitive strategies may pass or fail depending on random draws, making edge cases unreproducible.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Deterministic-only latency model was rejected for unrealistic simulation
- id: BD-122
  type: BA
  content: 'INTERACTION: [BD-103] × [BD-074] → Conflicting defaults between StrategyConfig and Strategy
    lifecycle create stop management ambiguity'
  rationale: BD-103 sets manage_stop=False as conservative default, requiring explicit opt-in. BD-074
    enables manage_stop=True in StrategyConfig for automatic position cleanup on strategy stop. Users
    reading documentation for automatic exit (BD-074) may not discover the default is False (BD-103),
    leading to strategies that fail to exit positions on shutdown. The two BDs have different scopes but
    similar names, creating confusion.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unified stop management option was considered but serves different use cases
- id: BD-123
  type: BA
  content: 'INTERACTION: [BD-004] × [BD-087] → Interval-level gap filling assumes timestamp ordering that
    validation is designed to enforce'
  rationale: BD-004 fills gaps using adjacent interval requests, operating at interval granularity rather
    than timestamp level. BD-087 validates timestamp ordering via validate_data_sequence=True. The gap-filling
    strategy (BD-004) silently depends on validation (BD-087) to ensure timestamps are monotonic. If validation
    is disabled, interval-based gap filling may produce incorrect results by combining misordered data
    into wrong intervals.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Gap filling with implicit reordering was rejected for data integrity concerns
- id: BD-124
  type: B/BA
  content: 'INTERACTION: [BD-013] × [BD-040] × [BD-039] → Triple-layer conservative risk defaults amplify
    position constraints beyond individual settings'
  rationale: BD-013 position_pct=None means no position size limit by default. BD-040 default_leverage=1
    provides 1:1 no leverage. BD-039 AccountType.CASH enforces spot-only semantics. Together, these three
    conservative defaults create a position environment where margin-based strategies cannot be tested
    without explicit configuration. Users expecting margin trading must consciously configure each three,
    preventing accidental over-leveraged positions.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Single combined margin configuration was considered but reduces flexibility
