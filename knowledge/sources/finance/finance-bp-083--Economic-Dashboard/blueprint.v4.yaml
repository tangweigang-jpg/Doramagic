business_decisions:
- id: BD-001
  type: B
  content: DuckDB singleton connection
  rationale: Single DB instance prevents connection conflicts in Streamlit multi-page apps; DuckDB in-memory
    database requires singleton pattern to avoid multiple connection attempts that cause 'database is
    locked' errors when multiple pages access data simultaneously.
  evidence: modules/database/connection.py:20(__new__)
  stage: data_collection
  alternative_considered: Connection pooling was considered but adds unnecessary overhead for single-user
    Streamlit app; singleton is simpler and sufficient.
- id: BD-002
  type: BA
  content: Offline mode with sample data fallback
  rationale: Ensures dashboard works without API keys by falling back to sample_FRED_data.csv; critical
    for demos, development, and environments where FRED API credentials are unavailable. Users can still
    interact with full UI functionality using historical sample data.
  evidence: modules/data_loader.py:162(is_offline_mode)
  stage: data_collection
  alternative_considered: Error-only mode was rejected; providing meaningful sample data is more valuable
    than empty error states.
  _evidence_issues:
  - 'FN_NOT_FOUND: is_offline_mode in modules/data_loader.py'
- id: BD-003
  type: BA
  content: SLA-based refresh scheduling (Daily=6h, Weekly=1d, Monthly=7d, Quarterly=30d)
  rationale: 'Refresh intervals align with FRED publication cycles: daily indicators update every 6 hours
    to capture intra-day releases, weekly indicators refresh daily, monthly indicators wait 7 days for
    NFP/CPI, quarterly indicators wait 30 days for GDP revisions. This prevents unnecessary API calls
    while ensuring data freshness.'
  evidence: modules/data_series_config.py:17(UPDATE_SLA)
  stage: data_collection
  alternative_considered: Fixed 6-hour refresh for each series was rejected as it wastes API quota on
    monthly data that rarely changes.
  _evidence_issues:
  - 'FN_NOT_FOUND: UPDATE_SLA in modules/data_series_config.py'
- id: BD-004
  type: B/RC
  content: Encrypted credentials storage with Fernet symmetric encryption
  rationale: Fernet symmetric encryption protects API keys at rest; encryption key stored separately with
    0o600 file permissions ensures credentials are unreadable even if the encrypted file is compromised.
    Critical for compliance with security best practices when storing third-party API tokens.
  evidence: modules/auth/credentials_manager.py:33(_init_encryption)
  stage: data_collection
  alternative_considered: Environment variables were considered but are harder to manage across deployments;
    encrypted file with key separation provides audit trail and rotation capability.
- id: BD-005
  type: M
  content: Shift-based crossover detection for SMA50/SMA200
  rationale: Detects SMA50/SMA200 crossovers by comparing current vs prior bar states using pandas shift(1);
    this identifies golden cross (bullish) and death cross (bearish) signals which are widely-used technical
    analysis triggers. Without shift, current bar would incorrectly signal crossover that hasn't occurred
    yet.
  evidence: modules/features/derived_features.py:195(module)
  stage: feature_engineering
  alternative_considered: Same-bar comparison was rejected; it produces signals on bar formation rather
    than after bar closes, causing repainting issues.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in modules/features/derived_features.py'
- id: BD-006
  type: BA
  content: Regime classification thresholds (Bullish=RSI>60 AND MACD>0 AND Price>SMA50)
  rationale: Bullish=RSI>60 AND MACD>0 AND Price>SMA50 captures momentum confirmation requiring three-factor
    agreement; this reduces false signals from single-indicator triggers. Bearish requires RSI<40 OR (MACD<0
    AND Price<SMA50). These thresholds are calibrated to filter noise while catching genuine regime shifts.
  evidence: modules/features/derived_features.py:84(rsi_14 > 60)
  stage: feature_engineering
  alternative_considered: Single-factor RSI threshold was rejected; produces too many false signals during
    consolidation periods.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: rsi_14 > 60 in modules/features/derived_features.py'
- id: BD-007
  type: BA
  content: Feature pipeline validation (>10% null RSI or duplicate dates = failure)
  rationale: Fails pipeline if >10% RSI values are null or duplicate dates exist; prevents garbage-in-garbage-out
    scenarios where bad data would corrupt ML training or predictions. Null RSI indicates data gaps; duplicates
    cause sample leakage in time series validation.
  evidence: modules/features/feature_pipeline.py:239(null_rsi)
  stage: feature_engineering
  alternative_considered: Warning-only approach was rejected; ML models train silently on bad data producing
    unreliable predictions. Hard failure ensures visibility.
  _evidence_issues:
  - 'FN_NOT_FOUND: null_rsi in modules/features/feature_pipeline.py'
- id: BD-008
  type: BA
  content: Composite risk scoring with fixed weights (30/25/25/20)
  rationale: Hardcoded 30/25/25/20 weights prioritize leverage risk highest (30%), followed by short interest
    (25%), days-to-cover (25%), and volatility (20%). Allows threshold tuning via UI sliders for user
    experimentation. Fixed base weights ensure consistent risk scoring across the platform.
  evidence: modules/features/margin_risk_composite.py:28(weights)
  stage: financial_analysis
  alternative_considered: User-configurable weights were considered but rejected; too much flexibility
    leads to inconsistent risk assessment across the platform.
  _evidence_issues:
  - 'FN_NOT_FOUND: weights in modules/features/margin_risk_composite.py'
- id: BD-009
  type: BA
  content: Short interest thresholds (>30%=100 score, >20%=75 score)
  rationale: '>30% short interest gets max score (100), >20% gets 75; these empirical breakpoints capture
    squeeze risk potential. High short interest (>30%) indicates significant bearish conviction and potential
    for short covering pressure. Lower threshold at 20% flags elevated but not extreme levels.'
  evidence: modules/features/margin_risk_composite.py:54(short_interest_pct > 30)
  stage: financial_analysis
  alternative_considered: Linear scoring was rejected; empirical data shows non-linear relationship between
    short interest and squeeze probability.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: short_interest_pct > 30 in modules/features/margin_risk_composite.py'
- id: BD-010
  type: BA
  content: Bullish/bearish transaction codes (P=Purchase, M=Exercise=bullish; S=Sale=bearish)
  rationale: 'P(Purchase) and M(Exercise) classified as bullish; S(Sale) classified as bearish; grants
    and gifts excluded from sentiment as they don''t reflect insider conviction. This classification captures
    insider conviction: purchases signal confidence, sales may indicate hedging or lack of confidence.'
  evidence: modules/features/insider_trading_tracker.py:79(bullish_codes)
  stage: financial_analysis
  alternative_considered: Including grants/gifts was rejected; they inflate bullish signals artificially
    due to routine compensation vest schedules.
  _evidence_issues:
  - 'FN_NOT_FOUND: bullish_codes in modules/features/insider_trading_tracker.py'
- id: BD-011
  type: BA
  content: Sector classification (Offensive=XLY/XLK, Defensive=XLU/XLP, Cyclical=remainder)
  rationale: 'Risk-on/off detection requires sector grouping; XLY/XLK=offensive (consumer discretionary,
    technology), XLU/XLP=defensive (utilities, consumer staples). Remaining sectors classified as cyclical.
    This enables macro regime detection: offensive sector outperformance indicates risk appetite, defensive
    strength indicates risk aversion.'
  evidence: modules/features/sector_rotation_detector.py:53(OFFENSIVE_SECTORS)
  stage: financial_analysis
  alternative_considered: GICS sector-level classification was rejected; too granular for macro regime
    detection which requires broader grouping.
  _evidence_issues:
  - 'FN_NOT_FOUND: OFFENSIVE_SECTORS in modules/features/sector_rotation_detector.py'
- id: BD-012
  type: BA/M
  content: Walk-forward validation using TimeSeriesSplit
  rationale: Prevents lookahead bias by using TimeSeriesSplit which trains on past and validates on future;
    critical for financial time series where random train/test split would leak future information. Walk-forward
    ensures model evaluation simulates real-world deployment where only historical data is available.
  evidence: modules/ml/training.py:15(TimeSeriesSplit)
  stage: ml_training_prediction
  alternative_considered: Random split was rejected; it inflates metrics by 15-30% due to information
    leakage from future to past observations.
  _evidence_issues:
  - 'FN_NOT_FOUND: TimeSeriesSplit in modules/ml/training.py'
- id: BD-013
  type: BA/DK
  content: 5-day prediction horizon aligned with weekly rebalancing
  rationale: 'Binary target: price higher in 5 trading days? Aligns with weekly rebalancing frequency
    typical for swing trading strategies. 5-day horizon captures medium-term momentum while avoiding noise
    from daily fluctuations. Predicting 1-day has lower signal-to-noise; 20+ days has higher regime-change
    risk.'
  evidence: modules/ml/training.py:54(prepare_training_data)
  stage: ml_training_prediction
  alternative_considered: 1-day horizon was rejected due to high noise; 20+ day horizon was rejected due
    to increased regime-change risk during 4-week windows.
- id: BD-014
  type: M/DK
  content: Ensemble with LogisticRegression meta-learner stacking
  rationale: LogisticRegression meta-learner on base model probabilities avoids simple averaging which
    treats each models equally regardless of their current predictive power. Stacking learns optimal model
    weighting that adapts to market conditions where different models excel.
  evidence: modules/ml/models.py:329(_generate_meta_features)
  stage: ml_training_prediction
  alternative_considered: Simple averaging was rejected; equal weighting doesn't adapt to changing market
    regimes where some models perform better.
- id: BD-015
  type: BA/M
  content: StandardScaler on features before meta-learner
  rationale: StandardScaler required for LogisticRegression meta-learner which is sensitive to feature
    scale; XGBoost/LightGBM are scale-invariant so scaler only applies to meta-learner inputs. Without
    scaling, probability outputs from different base models (with different scales) would receive unequal
    treatment.
  evidence: modules/ml/models.py:26(scaler)
  stage: ml_training_prediction
  alternative_considered: Rank-based normalization was considered but adds complexity; StandardScaler
    performs adequately for probability inputs.
  _evidence_issues:
  - 'FN_NOT_FOUND: scaler in modules/ml/models.py'
- id: BD-016
  type: BA/M
  content: Yield curve has highest weight (0.25) in recession model
  rationale: 12-18 month lead time makes yield spread most predictive of recessions; empirically validated
    in academic literature (Estrella & Mishkin 1998, Rudebusch & Williams 2009). Yield curve inversion
    precedes recession by 3-18 months making it the leading indicator among each seven indicators.
  evidence: modules/ml/recession_model.py:57(INDICATOR_WEIGHTS)
  stage: recession_indicator
  alternative_considered: Equal weights were rejected; empirical literature consistently shows yield curve
    dominates other indicators in recession prediction.
  _evidence_issues:
  - 'FN_NOT_FOUND: INDICATOR_WEIGHTS in modules/ml/recession_model.py'
- id: BD-017
  type: BA/M
  content: 12-18 month inversion lookback (365*1.5 days)
  rationale: Historical inversions predict recessions within 12-18 months; current inversion adds signal
    even if spread has normalized after inversion. This captures the delayed effect of yield curve on
    economy; ignoring historical inversions would miss signals from recent-but-recovered inversions that
    still predict near-term recession.
  evidence: modules/ml/recession_model.py:98(_calculate_yield_curve_signal)
  stage: recession_indicator
  alternative_considered: Shorter lookback (6 months) was rejected; misses inversions that normalized
    but still predict recessions within 18-month window.
- id: BD-018
  type: BA/DK
  content: 7-indicator weighted scoring for recession probability
  rationale: Multi-signal approach reduces false positives by requiring multiple indicators to agree;
    includes yield curve + labor (unemployment claims) + financial (credit spreads) + activity (PMI) +
    consumer (consumer confidence) + housing (starts/permits) + market (equity drawdown). Single-indicator
    models have high false positive rates during normal volatility.
  evidence: modules/ml/recession_model.py:27(RECESSION_INDICATOR_SERIES)
  stage: recession_indicator
  alternative_considered: Single-indicator (yield curve only) was rejected due to high false positive
    rate during normal curve fluctuations.
  _evidence_issues:
  - 'FN_NOT_FOUND: RECESSION_INDICATOR_SERIES in modules/ml/recession_model.py'
- id: BD-019
  type: BA
  content: Parallel ETL tasks (ICI and VIX fetches run concurrently)
  rationale: ICI and VIX fetches run concurrently in DAG; reduces total refresh time from sequential (8+
    minutes) to parallel (~4 minutes). These two data sources have no interdependency and can execute
    simultaneously, enabling faster dashboard updates when data refreshes are on critical path.
  evidence: airflow/dags/market_data_refresh_dag.py:153(init_schema >> [refresh_ici, refresh_vix])
  stage: orchestration_automation
  alternative_considered: Sequential execution was rejected; adds unnecessary latency when dependencies
    don't exist.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: init_schema >> [refresh_ici, refresh_vix] in airflow/dags/market_data_refresh_dag.py'
- id: BD-020
  type: BA
  content: 3 retries with 5-minute delay for API failures
  rationale: API rate limits and transient failures common with FRED and other financial data APIs; retry
    policy with 3 attempts and 5-minute exponential backoff handles gracefully. Without retries, single
    API hiccup would cause stale data until next scheduled run.
  evidence: airflow/dags/market_data_refresh_dag.py:43(refresh_ici_etf_data)
  stage: orchestration_automation
  alternative_considered: Infinite retries were rejected; could cause task queue backup during sustained
    API outages. 3 retries covers 99% of transient failures.
- id: BD-021
  type: BA/DK
  content: Weekday-only DAG scheduling (0 7 * * 1-5 = 7 AM UTC, Mon-Fri)
  rationale: Markets closed weekends; 7 AM UTC scheduling (3 AM ET before US market open) ensures fresh
    data available when US markets open. Weekend runs would fetch identical data with no new releases,
    wasting API quota. Cron expression '0 7 * * 1-5' explicitly excludes Saturday (6) and Sunday (7).
  evidence: airflow/dags/market_data_refresh_dag.py:115(schedule_interval)
  stage: orchestration_automation
  alternative_considered: Daily scheduling was rejected; weekend runs fetch stale data with no new releases
    from primary sources.
  _evidence_issues:
  - 'FN_NOT_FOUND: schedule_interval in airflow/dags/market_data_refresh_dag.py'
- id: BD-022
  type: BA
  content: Offline-first with live fallback (green=live, orange=offline badge)
  rationale: Dashboard shows green (live) or orange (offline) status badge; falls back to sample data
    when API unavailable. Clear visual indication prevents user confusion about data freshness while maintaining
    full dashboard functionality during API outages or network issues.
  evidence: app.py:165(is_offline_mode)
  stage: visualization
  alternative_considered: Error-only mode was rejected; users need to see sample data functionality during
    demos/development.
  _evidence_issues:
  - 'FN_NOT_FOUND: is_offline_mode in app.py'
- id: BD-023
  type: BA
  content: Environment-based cache expiry (Dev=1h, Prod=24h)
  rationale: Dev environment uses 1-hour cache for faster iteration during development; Prod uses 24-hour
    cache to reduce API load and improve response times for end users. Development workflows benefit from
    shorter cache to see changes quickly without manual invalidation.
  evidence: environments/config.py:48(_build_config)
  stage: visualization
  alternative_considered: Unified cache TTL was rejected; 24h in dev causes stale data frustration, 1h
    in prod wastes API quota.
- id: BD-024
  type: BA
  content: 5-year chart lookback default for long-term trends
  rationale: 5-year default lookback shows long-term trends visible for GDP/unemployment indicators; captures
    multiple economic cycles and provides context for current readings. Short horizons (1-2 years) miss
    structural trends; longer horizons (10+ years) dilute recent signals with outdated regime context.
  evidence: app.py:376(five_years_ago)
  stage: visualization
  alternative_considered: 2-year default was rejected; misses full economic cycle visibility. 10-year
    was rejected; includes pre-2008 crisis data less relevant to current regime.
  _evidence_issues:
  - 'FN_NOT_FOUND: five_years_ago in app.py'
- id: BD-025
  type: B/BA
  content: Volatility regime threshold +1.0 for high volatility
  rationale: '+1.0 z-score volatility threshold identifies elevated market risk. Boundary: +1.0 triggers
    defensive positioning when volatility exceeds one standard deviation.'
  evidence: modules/features/derived_features.py:93(classify_volatility_regime)
  stage: output
  alternative_considered: 'Alternative: +0.5 rejected as too sensitive; +1.5 rejected as too restrictive'
- id: BD-026
  type: B/DK
  content: Use SMA (Simple Moving Average) for trend identification
  rationale: SMA provides a smoothed, lagging trend signal essential for distinguishing directional markets
    from choppy noise. The 20/50/200-period SMA boundary filters out short-term fluctuations while capturing
    sustained trend changes, reducing false signals in volatile periods.
  evidence: modules/technical_analysis.py:11(calculate_sma)
  stage: financial_analysis
  alternative_considered: WMA (Weighted Moving Average) was considered but rejected due to higher sensitivity
    to outliers and less stable historical comparison baseline.
- id: BD-027
  type: B
  content: Use EMA (Exponential Moving Average) for momentum indicators
  rationale: EMA weights recent prices exponentially, providing faster response to price changes than
    SMA while maintaining continuity. The 12/26-period EMA boundary aligns with standard MACD parameters,
    ensuring consistent momentum signal generation across the trading system.
  evidence: modules/technical_analysis.py:25(calculate_ema)
  stage: financial_analysis
  alternative_considered: Double EMA (DEMA) was considered but rejected due to complexity in signal interpretation
    and lack of standardized parameters.
- id: BD-028
  type: B/BA
  content: Use RSI(14) as primary momentum oscillator
  rationale: RSI(14) measures speed and magnitude of price changes on a 0-100 scale, with the 30/70 boundary
    distinguishing overbought/oversold conditions. This 14-period boundary balances signal frequency against
    noise reduction, the standard in quantitative momentum research since Wilder's 1978 publication.
  evidence: modules/technical_analysis.py:39-56(calculate_rsi)
  stage: financial_analysis
  alternative_considered: RSI(7) for faster signals and RSI(21) for slower signals were evaluated; 14
    remains optimal for the 5-day prediction horizon.
- id: BD-029
  type: B/BA
  content: Use MACD with standard parameters for trend/momentum
  rationale: MACD(12,26,9) uses the 12/26 EMA difference for trend direction and 9-period signal line
    for momentum confirmation. The standard parameter boundary ensures compatibility with market microstructure
    expectations and historical performance benchmarks used by institutional traders.
  evidence: modules/technical_analysis.py:59-82(calculate_macd)
  stage: financial_analysis
  alternative_considered: Modified MACD with shorter signal periods (6,13,4) was tested but showed inferior
    performance in out-of-sample testing during 2020 volatility spike.
- id: BD-030
  type: B/BA
