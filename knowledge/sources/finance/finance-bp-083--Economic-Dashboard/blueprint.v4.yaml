replaceable_slots:
- id: slot-001
  name: economic_data_source
  description: FRED is the official source for US economic data with comprehensive coverage. EconData
    provides alternatives but may not have each FRED series.
  used_in_stages: []
  options:
  - name: FRED via pandas-datareader
    traits:
    - free
    - comprehensive
    - official_source
    - rate_limited
    fit_for:
    - Production economic indicator fetching with official data source
    not_fit_for:
    - Real-time data needs (FRED is delayed), countries outside US
  - name: EconData
    traits:
    - free
    - comprehensive
    - alternative_source
    fit_for:
    - Alternative economic time series when FRED has issues
    not_fit_for:
    - Specific FRED series not available in EconData
  default: FRED via pandas-datareader
  _source: worker_resource
- id: slot-002
  name: market_data_source
  description: Yahoo Finance is the default as it requires no API key and provides excellent coverage.
    Upgrade to Alpha Vantage for intraday needs, or Polygon for professional-grade data.
  used_in_stages: []
  options:
  - name: Yahoo Finance (yfinance)
    traits:
    - free
    - real_time
    - global_coverage
    - rate_limited
    fit_for:
    - Real-time market data, stock prices, commodities, currencies
    not_fit_for:
    - Professional trading systems requiring guaranteed uptime
  - name: Alpha Vantage
    traits:
    - free_tier
    - api_key_required
    - intraday_data
    fit_for:
    - Intraday data when Yahoo Finance is rate-limited
    not_fit_for:
    - High-volume applications (25/day free limit is restrictive)
  - name: Polygon.io
    traits:
    - real_time
    - professional
    - subscription
    fit_for:
    - Professional trading applications requiring reliable real-time data
    not_fit_for:
    - Budget-constrained projects, hobbyist use
  default: Yahoo Finance (yfinance)
  _source: worker_resource
- id: slot-003
  name: database
  description: DuckDB is optimal for analytical workloads with fast columnar storage. Switch to PostgreSQL
    for production with concurrent users, or SQLite for minimal setup.
  used_in_stages: []
  options:
  - name: DuckDB
    traits:
    - embedded
    - analytical
    - no_server
    - fast
    fit_for:
    - Embedded analytics, data caching, local processing
    not_fit_for:
    - Multi-user concurrent access, distributed queries, high write throughput
  - name: PostgreSQL
    traits:
    - relational
    - server_based
    - concurrent
    - mature
    fit_for:
    - Multi-user access, production deployments, complex queries with joins
    not_fit_for:
    - Simple local caching, embedded scenarios
  - name: SQLite
    traits:
    - embedded
    - lightweight
    - simple
    fit_for:
    - Simple local storage, prototyping, single-user applications
    not_fit_for:
    - Analytical workloads, concurrent writes, large datasets
  default: DuckDB
  _source: worker_resource
- id: slot-004
  name: orchestration
  description: GitHub Actions is the default for its simplicity and free tier. Airflow provides enterprise-grade
    orchestration for complex pipelines.
  used_in_stages: []
  options:
  - name: GitHub Actions
    traits:
    - scheduled
    - ci_cd
    - free_tier
    fit_for:
    - Scheduled data refresh, CI/CD pipelines, deployment automation
    not_fit_for:
    - Complex multi-step workflows with dependencies
  - name: Apache Airflow
    traits:
    - workflow_orchestration
    - dag_based
    - monitoring
    fit_for:
    - Complex data pipelines, task dependencies, monitoring, alerting
    not_fit_for:
    - Simple scheduled scripts, small projects
  - name: Prefect
    traits:
    - modern
    - pythonic
    - cloud_option
    fit_for:
    - Modern Python workflows, cloud-native deployments
    not_fit_for:
    - Legacy systems, teams preferring DAG-based workflows
  default: GitHub Actions
  _source: worker_resource
- id: slot-005
  name: visualization
  description: Plotly is native to Streamlit with excellent interactive charts. Use Matplotlib for static
    publication-quality figures.
  used_in_stages: []
  options:
  - name: Plotly
    traits:
    - interactive
    - web_ready
    - streamlit_native
    fit_for:
    - Interactive web dashboards, Streamlit integration
    not_fit_for:
    - Static reports, publication-quality plots
  - name: Matplotlib
    traits:
    - static
    - publication_quality
    - flexible
    fit_for:
    - Static charts, research papers, detailed customization
    not_fit_for:
    - Web dashboards, interactive exploration
  - name: Altair
    traits:
    - declarative
    - vegalite
    - interactive
    fit_for:
    - Declarative visualization, Vega-Lite users
    not_fit_for:
    - Complex custom charts, non-Vega-Lite plots
  default: Plotly
  _source: worker_resource
- id: slot-006
  name: ml_framework
  description: XGBoost and LightGBM are industry standards for tabular data with excellent performance.
    scikit-learn provides the foundation for preprocessing and model evaluation.
  used_in_stages: []
  options:
  - name: XGBoost + LightGBM
    traits:
    - gradient_boosting
    - fast
    - accurate
    fit_for:
    - Tabular data, classification, prediction tasks
    not_fit_for:
    - Deep learning, image/nlp tasks
  - name: scikit-learn
    traits:
    - comprehensive
    - classical_ml
    - proven
    fit_for:
    - General ML tasks, model selection, preprocessing
    not_fit_for:
    - Large-scale deep learning
  - name: PyTorch
    traits:
    - deep_learning
    - flexible
    - research
    fit_for:
    - Deep learning, neural networks, complex models
    not_fit_for:
    - Simple tabular prediction, resource-constrained environments
  default: XGBoost + LightGBM
  _source: worker_resource
- id: slot-007
  name: sentiment_analysis
  description: TextBlob is simple and requires no training. VADER excels at social media/financial text.
    Transformers provide state-of-the-art accuracy for production.
  used_in_stages: []
  options:
  - name: TextBlob
    traits:
    - simple
    - rule_based
    - no_training
    fit_for:
    - Quick sentiment analysis, prototyping, lightweight needs
    not_fit_for:
    - Production accuracy, domain-specific sentiment
  - name: VADER
    traits:
    - social_media
    - no_training
    - fast
    fit_for:
    - Social media sentiment, short text, financial news
    not_fit_for:
    - Long documents, technical content
  - name: Hugging Face Transformers
    traits:
    - state_of_art
    - fine_tunable
    - domain_specific
    fit_for:
    - Production sentiment, domain adaptation, high accuracy
    not_fit_for:
    - Quick prototyping, resource-constrained environments
  default: TextBlob
  _source: worker_resource
