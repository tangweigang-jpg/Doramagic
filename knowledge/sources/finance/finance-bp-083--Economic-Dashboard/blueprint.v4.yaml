# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-083
name: Economic Dashboard
sop_version: '3.6'
source:
  projects:
  - Economic-Dashboard
  commit_hash: fbc91cddd708664bd9c93a0d73681c4d156e22c3
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Real-time economic intelligence and market analysis
  description: Enterprise-grade analytical platform providing real-time access to 60+ economic indicators
    sourced from FRED and Yahoo Finance, with ML-powered recession prediction and margin risk monitoring.
  prerequisites: Python 3.10+, FRED API key, basic understanding of macroeconomic indicators and financial
    markets
  not_suitable_for: Non-US markets, real-time trading execution, high-frequency trading, or users without
    Python environment setup capability
stages:
- id: data_collection
  name: Data Collection
  order: 1
  responsibility: Fetch economic data from FRED, Yahoo Finance, SEC, and CBOE APIs with offline fallback.
    Manages caching and rate limiting to ensure reliable data access. This stage exists because financial
    analysis requires consistent, fresh data from multiple authoritative sources, and the system must
    remain functional even when APIs are unavailable.
  interface:
    inputs:
    - API credentials (FRED key)
    - Ticker/series identifiers
    - Date ranges
    outputs:
    - Cached pickle files
    - DuckDB records
    - Sample CSV files
  required_methods:
  - name: CredentialsManager.set_api_key
    description: Store encrypted API key for a given service using Fernet symmetric encryption
    evidence: modules/auth/credentials_manager.py:33(_init_encryption)
  - name: CredentialsManager.get_api_key
    description: Retrieve and decrypt API key for authenticated API requests
    evidence: modules/auth/credentials_manager.py:44(get_api_key)
  - name: load_fred_data
    description: Fetch economic series from FRED API with DuckDB caching and cache fallback
    evidence: modules/data_loader.py:151(load_fred_data)
  - name: load_yfinance_data
    description: Fetch OHLCV and market data from Yahoo Finance with batch processing and rate limiting
    evidence: modules/data_loader.py:162(load_yfinance_data)
  key_behaviors:
  - behavior: Offline mode fallback
    description: When API credentials are unavailable or requests fail, system automatically falls back
      to sample CSV data to ensure dashboard remains functional
    evidence: modules/data_loader.py:162(is_offline_mode)
  - behavior: SLA-based cache expiry
    description: 'Cached data expires based on publication frequency: 6h for daily, 1d for weekly, 7d
      for monthly, 30d for quarterly series'
    evidence: modules/data_series_config.py:17(UPDATE_SLA)
  - behavior: Encrypted credential storage
    description: API keys are encrypted with Fernet symmetric encryption; key file has 0o600 permissions
      to prevent unauthorized access
    evidence: modules/auth/credentials_manager.py:44(os.chmod(self.key_file, 0o600))
  replaceable_points:
  - name: data_source_adapter
    description: Strategy pattern for fetching data from different sources
    options:
    - name: FRED API
      traits:
      - Live data
      - Auth required
      - Rate limited
      fit_for:
      - Production use
      - Real-time indicators
      not_fit_for:
      - Offline demos
      - Demo without API keys
    - name: Offline CSV
      traits:
      - Static data
      - No auth
      - Instant access
      fit_for:
      - Demos
      - Testing
      - Offline environments
      not_fit_for:
      - Production
      - Real-time updates
    - name: DuckDB cache
      traits:
      - Preprocessed
      - Fast queries
      - Persistent
      fit_for:
      - Repeated analysis
      - Large datasets
      not_fit_for:
      - Initial data fetch
      - Missing source data
    default: FRED API
  - name: cache_backend
    description: Storage mechanism for cached API responses
    options:
    - name: Pickle files
      traits:
      - Simple
      - Python-native
      - Fast serialization
      fit_for:
      - Small datasets
      - Single-process apps
      not_fit_for:
      - Concurrent access
      - Large datasets
    - name: DuckDB tables
      traits:
      - Queryable
      - ACID compliant
      - Columnar
      fit_for:
      - Analytical queries
      - Large datasets
      not_fit_for:
      - Simple caching
      - Small records
    - name: Redis
      traits:
      - Distributed
      - TTL support
      - Fast key-value
      fit_for:
      - Multi-instance deployments
      - Distributed caching
      not_fit_for:
      - Single instance
      - Simple deployments
    default: Pickle files
  design_decisions:
  - DuckDB singleton connection - Single DB instance prevents connection conflicts in Streamlit multi-page
    apps (modules/database/connection.py:20(__new__))
  - Offline mode with sample data fallback - Ensures dashboard works without API keys; uses sample_FRED_data.csv
    for demos (modules/data_loader.py:162(is_offline_mode))
  - SLA-based refresh scheduling - Daily=6h, Weekly=1d, Monthly=7d, Quarterly=30d SLAs match FRED publication
    cycles (modules/data_series_config.py:17(UPDATE_SLA))
  - Encrypted credentials storage - Fernet symmetric encryption protects API keys; key stored separately
    with 0o600 perms (modules/auth/credentials_manager.py:33(_init_encryption))
  acceptance_hints:
  - Dashboard loads successfully with sample data when no API keys configured
  - Cache files created in data/cache/ with correct expiry based on series frequency
  - Encrypted credentials file readable only by owner (0o600 permissions)
  - Rate limiting prevents 429 errors during batch Yahoo Finance fetches
- id: feature_engineering
  name: Feature Engineering
  order: 2
  responsibility: Calculate technical indicators, options metrics, and derived features from raw price/volume
    data. Transforms market data into ML-ready feature vectors. This stage exists because raw market data
    must be transformed into meaningful signals before any predictive modeling or analysis can occur.
  interface:
    inputs:
    - OHLCV data from yfinance
    - Options chain data
    - Market indicators (VIX)
    outputs:
    - technical_features table
    - derived_features table
    - options_data table
  required_methods:
  - name: TechnicalIndicatorCalculator.calculate_all
    description: Calculate RSI, MACD, Bollinger Bands, ATR, MFI, VWAP from OHLCV data using ta library
    evidence: modules/features/technical_indicators.py:16(__init__)
  - name: OptionsMetricsCalculator.calculate
    description: Calculate IV rank, put/call ratio, and skew from options chain data
    evidence: modules/features/options_metrics.py:12(calculate)
  - name: DerivedFeaturesCalculator.compute
    description: Compute Z-scores, regime classifications, and feature interactions from technical indicators
    evidence: modules/features/derived_features.py:18(compute)
  - name: FeaturePipeline.run_full_pipeline
    description: Orchestrate complete feature calculation with validation at each stage
    evidence: modules/features/feature_pipeline.py:22(run_full_pipeline)
  key_behaviors:
  - behavior: Shift-based crossover detection
    description: Detects SMA50/SMA200 golden/death crosses by comparing current bar state vs prior bar
      using shift(1)
    evidence: modules/features/derived_features.py:195(sma50_above_sma200.shift(1))
  - behavior: Regime classification
    description: Classifies market regime as Bullish (RSI>60 AND MACD>0 AND Price>SMA50) or Bearish based
      on composite conditions
    evidence: modules/features/derived_features.py:84(rsi_14 > 60)
  - behavior: Pipeline validation
    description: Fails pipeline execution if >10% RSI values are null or duplicate dates exist in input
      data
    evidence: modules/features/feature_pipeline.py:239(null_rsi)
  replaceable_points:
  - name: indicator_library
    description: Technical indicator calculation engine
    options:
    - name: ta library
      traits:
      - Standardized
      - Well-maintained
      - Comprehensive
      fit_for:
      - General use
      - Production systems
      not_fit_for:
      - Custom indicators
      - Edge cases
    - name: pandas-ta
      traits:
      - Pandas-native
      - Fast
      - Lightweight
      fit_for:
      - Performance-critical
      - Large datasets
      not_fit_for:
      - Non-pandas inputs
    - name: custom formulas
      traits:
      - Fully customizable
      - No dependencies
      fit_for:
      - Proprietary indicators
      - Research
      not_fit_for:
      - Standard analysis
      - Quick prototyping
    default: ta library
  - name: feature_interactions
    description: Cross-feature computation logic for derived signals
    options:
    - name: RSI×Volume
      traits:
      - Momentum confirmation
      - Volume-weighted signals
      fit_for:
      - Breakout detection
      - Trend confirmation
      not_fit_for:
      - Range-bound markets
    - name: MACD divergence
      traits:
      - Reversal signals
      - Leading indicators
      fit_for:
      - Mean reversion
      - Contrarian plays
      not_fit_for:
      - Strong trends
    - name: momentum×volatility
      traits:
      - Risk-adjusted signals
      - Adaptive thresholds
      fit_for:
      - Volatility regimes
      - Dynamic strategies
      not_fit_for:
      - Static strategies
    default: each of above
  design_decisions:
  - ta library for technical indicators - Standardized calculations avoid reinventing RSI/MACD implementations
    (modules/features/technical_indicators.py:12(import ta))
  - Shift-based crossover detection - Detects SMA50/SMA200 crossovers by comparing current vs prior bar
    states (modules/features/derived_features.py:195(shift(1)))
  - Regime classification thresholds - Bullish=RSI>60 AND MACD>0 AND Price>SMA50 captures momentum confirmation
    (modules/features/derived_features.py:84(rsi_14 > 60))
  - Feature pipeline validation - Fails pipeline if >10% RSI values are null or duplicate dates exist
    (modules/features/feature_pipeline.py:239(null_rsi))
  acceptance_hints:
  - Technical indicators calculated match expected values from reference implementation
  - Golden/death cross detection correctly identifies transitions between bullish/bearish regimes
  - Pipeline validation fails gracefully with clear error messages for invalid input data
  - Derived features added to DuckDB tables with correct (ticker, date) primary keys
- id: financial_analysis
  name: Financial Analysis
  order: 3
  responsibility: Calculate margin risk, leverage exposure, insider trading signals, and financial health
    scores. Provides risk metrics and market stress indicators for portfolio risk management. This stage
    exists because raw market data needs risk-contextualization to support trading and investment decisions.
  interface:
    inputs:
    - Short interest data
    - VIX term structure
    - Options positioning
    - SEC Form 4 filings
    outputs:
    - margin_call_risk table
    - sector_rotation_analysis table
    - financial_health_scores table
  required_methods:
  - name: MarginCallRiskCalculator.calculate
    description: Calculate composite margin risk score from leverage, volatility, options, and liquidity
      components with weighted scoring
    evidence: modules/features/margin_risk_composite.py:20(calculate)
  - name: LeverageMetricsCalculator.compute
    description: Compute short interest, FINRA margin debt, VIX stress, and leveraged ETF tracking metrics
    evidence: modules/features/leverage_metrics.py:20(compute)
  - name: InsiderTradingTracker.analyze
    description: Parse SEC Form 4 XML filings, calculate sentiment scores, detect unusual insider activity
    evidence: modules/features/insider_trading_tracker.py:47(analyze)
  - name: FinancialHealthScorer.score
    description: Calculate Piotroski F-Score, Altman Z-Score, and composite financial health rating
    evidence: modules/features/financial_health_scorer.py:28(score)
  key_behaviors:
  - behavior: Composite risk weighting
    description: 'Margin risk calculated as weighted composite: leverage 30%, volatility 25%, options
      25%, liquidity 20% with UI-adjustable thresholds'
    evidence: modules/features/margin_risk_composite.py:28(weights)
  - behavior: Short interest thresholds
    description: '>30% short interest gets maximum risk score (100), >20% gets 75; these breakpoints empirically
      capture squeeze risk'
    evidence: modules/features/margin_risk_composite.py:54(short_interest_pct > 30)
  - behavior: Insider transaction classification
    description: P(Purchase) and M(Exercise) classified as bullish; S(Sale) as bearish; grants/gifts excluded
      from sentiment calculation
    evidence: modules/features/insider_trading_tracker.py:79(bullish_codes)
  - behavior: Sector rotation classification
    description: Sectors grouped as Offensive (XLY/XLK), Defensive (XLU/XLP), or Cyclical for risk-on/risk-off
      detection
    evidence: modules/features/sector_rotation_detector.py:53(OFFENSIVE_SECTORS)
  replaceable_points:
  - name: risk_weights
    description: Component importance weighting in composite margin risk score
    options:
    - name: Leverage-weighted (30/25/25/20)
      traits:
      - Current default
      - Leverage-focused
      - Conservative liquidity
      fit_for:
      - General risk monitoring
      - Margin-focused accounts
      not_fit_for:
      - Volatility-sensitive strategies
      - Options-heavy portfolios
    - name: Equal weights
      traits:
      - Balanced
      - No bias
      - Simple
      fit_for:
      - Balanced risk monitoring
      - Conservative allocation
      not_fit_for:
      - Specialized strategies
      - Leverage-focused accounts
    - name: Volatility-weighted
      traits:
      - Volatility-focused
      - Adaptive
      - Regime-aware
      fit_for:
      - High-vol environments
      - Crisis monitoring
      not_fit_for:
      - Low-vol periods
      - Stable markets
    default: Leverage-weighted (30/25/25/20)
  - name: insider_sentiment_formula
    description: Method for aggregating buy/sell insider transactions into sentiment scores
    options:
    - name: Value-weighted with recency decay
      traits:
      - Considers trade size
      - Recent activity emphasized
      fit_for:
      - General sentiment
      - Most analysis scenarios
      not_fit_for:
      - Small-cap stocks
      - Equal-weight analysis
    - name: Weighted by value
      traits:
      - Trade size importance
      - Ignores timing
      fit_for:
      - Long-term trends
      - Position-building detection
      not_fit_for:
      - Rapid sentiment shifts
      - Recent activity focus
    - name: Unanimous detection
      traits:
      - All-or-nothing
      - High conviction signals only
      fit_for:
      - Contrarian plays
      - High-confidence signals
      not_fit_for:
      - Gradual sentiment shifts
      - Mixed signals
    default: Value-weighted with recency decay
  design_decisions:
  - Composite risk scoring with fixed weights - Hardcoded 30/25/25/20 weights prioritize leverage risk;
    allows threshold tuning via UI sliders (modules/features/margin_risk_composite.py:28(weights))
  - Short interest thresholds - >30% SI gets max score (100), >20% gets 75; empirical breakpoints for
    squeeze risk (modules/features/margin_risk_composite.py:54(short_interest_pct > 30))
  - Bullish/bearish transaction codes - P(Purchase) and M(Exercise) = bullish; S(Sale) = bearish; excludes
    grants/gifts from sentiment (modules/features/insider_trading_tracker.py:79(bullish_codes))
  - Sector classification (Offensive/Defensive/Cyclical) - Risk-on/off detection requires sector grouping;
    XLY/XLK=offensive, XLU/XLP=defensive (modules/features/sector_rotation_detector.py:53(OFFENSIVE_SECTORS))
  acceptance_hints:
  - Margin risk scores aggregate correctly with 30/25/25/20 component weights totaling 100%
  - Insider trading tracker correctly parses SEC Form 4 XML and extracts transaction amounts
  - 'VIX regime classification maps correctly: <15 Low, <20 Normal, <30 Elevated, ≥30 Crisis'
  - Sector rotation analysis shows risk-on/off signals during market regime changes
- id: ml_training_prediction
  name: ML Training & Prediction
  order: 4
  responsibility: Train XGBoost/LightGBM ensemble models for stock direction prediction. Uses walk-forward
    validation to prevent lookahead bias in time series. This stage exists because statistical and ML
    models can identify patterns in feature data that support forward-looking market predictions.
  interface:
    inputs:
    - Feature DataFrames from DuckDB
    - Binary target (price up/down)
    outputs:
    - Pickled model files
    - ml_predictions table
    - model_performance table
  required_methods:
  - name: ModelTrainer.train
    description: Execute walk-forward validation training with TimeSeriesSplit cross-validation
    evidence: modules/ml/training.py:24(train)
  - name: EnsembleModel.fit
    description: Train XGBoost+LightGBM base models with LogisticRegression meta-learner stacking
    evidence: modules/ml/models.py:256(EnsembleModel.fit)
  - name: PredictionEngine.predict
    description: Load trained models and generate predictions with confidence scores for new data
    evidence: modules/ml/prediction.py:22(predict)
  - name: BaseModel.save
    description: Serialize trained model with StandardScaler to pickle file for persistence
    evidence: modules/ml/models.py:46(save)
  key_behaviors:
  - behavior: Walk-forward validation
    description: Uses TimeSeriesSplit to train on past data and validate on future data, preventing lookahead
      bias critical for financial time series
    evidence: modules/ml/training.py:15(TimeSeriesSplit)
  - behavior: 5-day prediction horizon
    description: 'Binary target: price higher in 5 trading days? Aligns with weekly rebalancing cycles'
    evidence: modules/ml/training.py:59(prediction_horizon=5)
  - behavior: Ensemble with meta-learner stacking
    description: LogisticRegression meta-learner combines base model probabilities, avoiding simple averaging
      for better calibration
    evidence: modules/ml/models.py:317(_generate_meta_features)
  - behavior: StandardScaler preprocessing
    description: Features standardized during fit, required for LogisticRegression meta-learner; XGBoost/LightGBM
      remain scale-invariant
    evidence: modules/ml/models.py:26(scaler)
  replaceable_points:
  - name: base_models
    description: Ensemble member algorithms for directional prediction
    options:
    - name: XGBoost+LightGBM
      traits:
      - Gradient boosting
      - Complementary
      - Current default
      fit_for:
      - General prediction
      - Balanced performance
      not_fit_for:
      - Deep patterns
      - Sequential dependencies
    - name: XGBoost+RandomForest
      traits:
      - Boosting + bagging
      - Diverse
      - More robust
      fit_for:
      - Noisy data
      - Overfitting prevention
      not_fit_for:
      - Fine-grained patterns
      - Speed-critical
    - name: Add LSTM
      traits:
      - Sequential learning
      - Time-aware
      - Deep learning
      fit_for:
      - Long-term dependencies
      - Pattern sequences
      not_fit_for:
      - Small datasets
      - Quick iterations
    default: XGBoost+LightGBM
  - name: prediction_horizon
    description: Days ahead for directional price prediction target
    options:
    - name: 1-day
      traits:
      - High frequency
      - More data points
      - Noisy
      fit_for:
      - Intraday trading
      - High-frequency strategies
      not_fit_for:
      - Weekly rebalancing
      - Long-term investors
    - name: 5-day (1 trading week)
      traits:
      - Weekly rebalancing
      - Balanced signal
      - Current default
      fit_for:
      - Swing trading
      - Weekly strategies
      not_fit_for:
      - Intraday
      - Monthly rebalancing
    - name: 20-day (1 trading month)
      traits:
      - Monthly rebalancing
      - Smoother signals
      - Less data
      fit_for:
      - Position trading
      - Monthly strategies
      not_fit_for:
      - Swing trading
      - High-frequency
    default: 5-day (1 trading week)
  design_decisions:
  - Walk-forward validation - Prevents lookahead bias; trains on past, validates on future - critical
    for financial time series (modules/ml/training.py:15(TimeSeriesSplit))
  - '5-day prediction horizon - Binary target: price higher in 5 trading days? Aligns with weekly rebalancing
    (modules/ml/training.py:59(prediction_horizon=5))'
  - Ensemble with meta-learner stacking - LogisticRegression on base model probabilities; avoids simple
    averaging (modules/ml/models.py:317(_generate_meta_features))
  - StandardScaler on features - Required for LogisticRegression meta-learner; XGBoost/LightGBM are scale-invariant
    (modules/ml/models.py:26(scaler))
  acceptance_hints:
  - Walk-forward validation ensures no future data leakage into training sets
  - 'Binary target correctly calculated: 1 if future_close > close, else 0'
  - Model predictions stored in DuckDB with (ticker, date) primary key and confidence scores
  - Model performance metrics (accuracy, precision, recall) tracked in model_performance table
- id: recession_indicator
  name: Recession Probability
  order: 5
  responsibility: Calculate recession probability using 7 weighted economic indicators (yield curve, labor,
    financial stress, etc.). Provides forward-looking economic risk assessment for macro risk management.
    This stage exists because single indicators are unreliable predictors; combining multiple signals
    reduces false positives.
  interface:
    inputs:
    - FRED economic series (unemployment, GDP, spreads)
    outputs:
    - Recession probability score
    - Indicator explanations
    - Historical probability time series
  required_methods:
  - name: RecessionProbabilityModel.calculate
    description: Calculate weighted recession probability across 7 indicator categories using empirical
      weights
    evidence: modules/ml/recession_model.py:68(calculate)
  - name: RecessionProbabilityModel.get_probability
    description: Return current recession probability score with explanations for each contributing indicator
    evidence: modules/ml/recession_model.py:45(get_probability)
  key_behaviors:
  - behavior: Yield curve highest weight
    description: Yield spread assigned 0.25 weight due to 12-18 month lead time making it most predictive;
      empirically validated in recession literature
    evidence: modules/ml/recession_model.py:57(INDICATOR_WEIGHTS)
  - behavior: 12-18 month inversion lookback
    description: Historical inversions predict recessions within 12-18 months; current inversion adds
      signal even if spread has normalized
    evidence: modules/ml/recession_model.py:131(lookback_days=365*1.5)
  - behavior: 7-indicator weighted scoring
    description: 'Multi-signal approach reduces false positives: yield curve + labor + financial + activity
      + consumer + housing + market'
    evidence: modules/ml/recession_model.py:27(RECESSION_INDICATOR_SERIES)
  replaceable_points:
  - name: indicator_weights
    description: Importance weighting of each recession signal in composite probability
    options:
    - name: Empirical weights (current)
      traits:
      - Research-based
      - Yield-focused
      - Validated
      fit_for:
      - General use
      - Balanced approach
      not_fit_for:
      - Regime-specific
      - Non-US markets
    - name: Equal weights
      traits:
      - No assumptions
      - Democratic
      - Simple
      fit_for:
      - Uncertainty
      - No prior knowledge
      not_fit_for:
      - Yield-curve focus
      - Professional use
    - name: Regime-dependent weights
      traits:
      - Adaptive
      - Context-aware
      - Complex
      fit_for:
      - Dynamic markets
      - Professional risk management
      not_fit_for:
      - Simple setup
      - Consistent analysis
    default: Empirical weights (yield=0.25, labor=0.20, ...)
  design_decisions:
  - Yield curve has highest weight (0.25) - 12-18 month lead time makes yield spread most predictive;
    empirically validated in recession literature (modules/ml/recession_model.py:57(INDICATOR_WEIGHTS))
  - 12-18 month inversion lookback - Historical inversions predict recessions within 12-18 months; current
    inversion adds signal even if spread normalized (modules/ml/recession_model.py:131(lookback_days=365*1.5))
  - 7-indicator weighted scoring - Multi-signal approach reduces false positives; yield curve + labor
    + financial + activity + consumer + housing + market (modules/ml/recession_model.py:27(RECESSION_INDICATOR_SERIES))
  acceptance_hints:
  - Recession probability correctly combines each 7 indicators with weights totaling 1.0
  - Historical probability time series shows elevated readings during 2008 and 2020 downturns
  - Yield curve inversion correctly detected and weighted in probability calculation
  - Indicator explanations explain contribution of each of the 7 components
- id: orchestration_automation
  name: Orchestration & Automation
  order: 6
  responsibility: Schedule data refresh via Airflow DAGs. Coordinates ETL tasks, validates data quality,
    and sends alerts on failures. This stage exists because financial analysis requires fresh data on
    predictable schedules without manual intervention.
  interface:
    inputs:
    - Schedule trigger (cron)
    - API credentials
    outputs:
    - DuckDB updated tables
    - Refresh log entries
    - Email/Slack alerts
  required_methods:
  - name: market_data_refresh_dag
    description: Weekly ICI ETF and daily VIX refresh with validation; runs init→[refreshs]→validate→notify
      chain
    evidence: airflow/dags/market_data_refresh_dag.py:111(market_data_refresh_dag)
  - name: economic_data_refresh_dag
    description: Daily FRED and quarterly GDP refresh with SLA-aware caching
    evidence: airflow/dags/economic_data_refresh_dag.py:1(economic_data_refresh_dag)
  key_behaviors:
  - behavior: Parallel ETL tasks
    description: ICI and VIX fetches run concurrently after schema initialization completes; reduces total
      refresh time
    evidence: airflow/dags/market_data_refresh_dag.py:153(init_schema >> [refresh_ici, refresh_vix])
  - behavior: Retry with backoff
    description: 3 retries with 5-minute delay handles API rate limits and transient failures gracefully
    evidence: airflow/dags/market_data_refresh_dag.py:37(retries=3)
  - behavior: Weekday-only scheduling
    description: Schedule 0 7 * * 1-5 runs at 7 AM UTC (3 AM ET) before US market open on weekdays only
    evidence: airflow/dags/market_data_refresh_dag.py:115(schedule_interval)
  - behavior: Stale data detection
    description: VIX>7d, ICI weekly>14d triggers warnings; requires manual intervention if DAG fails
    evidence: airflow/dags/market_data_refresh_dag.py:82(latest < datetime.now() - timedelta(days=14))
  replaceable_points:
  - name: alert_channel
    description: Failure notification destination for DAG failures
    options:
    - name: Email (AIRFLOW_ALERT_EMAIL env var)
      traits:
      - Universal
      - No external deps
      - Current default
      fit_for:
      - Most deployments
      - Simple setup
      not_fit_for:
      - Team notifications
      - Real-time alerts
    - name: Slack
      traits:
      - Team-friendly
      - Real-time
      - Rich formatting
      fit_for:
      - Team workflows
      - DevOps culture
      not_fit_for:
      - Individual use
      - No Slack access
    - name: PagerDuty
      traits:
      - On-call integration
      - Escalation
      - Critical alerts
      fit_for:
      - Production systems
      - 24/7 ops
      not_fit_for:
      - Development
      - Low-priority monitoring
    default: Email (AIRFLOW_ALERT_EMAIL env var)
  design_decisions:
