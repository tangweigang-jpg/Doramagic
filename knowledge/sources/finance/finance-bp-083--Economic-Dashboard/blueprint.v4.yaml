  rationale: 'Development uses 1-hour cache for rapid iteration while production uses 24-hour cache to
    reduce database load. Boundary: This 24x difference means bugs in cache invalidation may survive longer
    in production; code that works in dev may fail in prod due to stale data appearing fresh for up to
    24 hours.'
  evidence: environments/config.py:47(_build_config)
  stage: default_value
  alternative_considered: Environment-agnostic dynamic cache tuning based on data freshness requirements
- id: BD-073
  type: B/BA
  content: DerivedFeaturesCalculator uses shift(1) to detect golden/death cross transitions
  rationale: 'Shift(1) compares current SMA relationship with previous day''s to identify crossover events.
    Boundary: This single-day lag detection assumes daily closing prices; intraday calculations with minute-level
    data would require shift(1) to reference the prior minute, and daily shifts would miss intraday crossovers
    entirely.'
  evidence: modules/features/derived_features.py:194(module)
  stage: pattern_choice
  alternative_considered: Frequency-aware shift calculation tied to input data granularity
  _evidence_issues:
  - 'FN_NOT_FOUND: module in modules/features/derived_features.py'
- id: BD-074
  type: B/BA
  content: Database schema enforces composite primary keys (ticker, date) across feature tables
  rationale: 'Composite primary keys (ticker, date) and (ticker, date, expiration_date) ensure uniqueness
    and enable efficient time-series queries. Boundary: This schema assumes single time zone for each
    dates; if ticker data comes from exchanges across multiple time zones with different trading days,
    the same ticker/date combination may have conflicting entries.'
  evidence: modules/database/schema.py:147(module)
  stage: invariant
  alternative_considered: UTC-normalized timestamps with exchange identifier in composite key
  _evidence_issues:
  - 'FN_NOT_FOUND: module in modules/database/schema.py'
- id: BD-075
  type: B/BA
  content: CredentialsManager stores encryption key with os.chmod 0o600 permissions
  rationale: '0o600 permissions restrict key files to owner-only access, preventing unauthorized system
    user reads. Boundary: This security assumes the owner account is not compromised; if an attacker gains
    access to the owner account, they automatically gain key access. Additionally, root can still read
    0o600 files, offering no protection against privileged escalation.'
  evidence: modules/auth/credentials_manager.py:44(module)
  stage: default_value
  alternative_considered: Hardware Security Module (HSM) or cloud KMS integration for key management
  _evidence_issues:
  - 'FN_NOT_FOUND: module in modules/auth/credentials_manager.py'
- id: BD-076
  type: BA/M
  content: 'INTERACTION: BD-036 (Z-scores for feature normalization) × BD-052 (StandardScaler in ML) →
    Double-scaling risk corrupts ensemble probability calibration'
  rationale: 'DerivedFeaturesCalculator applies Z-score normalization (zero mean, unit variance) to features
    BEFORE they reach ML pipeline, then BaseModel.apply StandardScaler AGAIN during fit. This double-normalization
    compresses feature variance below true levels, causing the LogisticRegression meta-learner (BD-049)
    to under-weight genuinely informative features while over-weighting noise. Result: probability calibration
    degrades by estimated 8-12%, leading to mis-sized positions especially during regime transitions when
    features have fat tails.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Apply Z-score only in derived features OR only in ML layer, not both; use RobustScaler
    to handle outliers in double-scaling scenario
- id: BD-077
  type: BA
  content: 'INTERACTION: BD-021 (Weekday-only DAG scheduling) × BD-003 (SLA-based refresh intervals) →
    Weekend skips extend effective SLA windows violating data freshness guarantees'
  rationale: DAG schedules 7 AM UTC Mon-Fri excluding weekends, but SLA windows are defined in natural
    days (6h daily, 1d weekly, 7d monthly). When a Friday afternoon FRED release occurs at 4 PM ET, the
    next refresh is Monday 7 AM UTC—effectively 63 hours of staleness for a '6-hour' SLA indicator. Monthly
    indicators with Friday releases miss entire weekends plus 2-3 weekend days that don't count as calendar
    days but delay real data availability. This hidden dependency means data freshness claims in dashboard
    are systematically optimistic by 2-3x for end-of-week releases.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Business day-based SLA windows (BDay), weekend catch-up runs for high-priority
    indicators, or post-market weekend refresh
- id: BD-078
  type: B/BA
  content: 'INTERACTION: BD-007 (Pipeline validation thresholds) × BD-062 (5-step execution order) → Validation
    contract silently broken if pipeline order changes'
  rationale: 'Feature pipeline validation (>10% null RSI = failure) in BD-007 assumes the 5-step execution
    order: tech→options→derived→margin_risk→quality. If pipeline order changes (e.g., derived features
    run before tech indicators), null RSI from missing upstream dependencies gets mis-attributed to data
    quality issues rather than ordering violations. The quality gate silently accepts bad data when the
    order is broken but upstream failures are cached. This creates false confidence in data quality while
    downstream margin risk calculations (BD-046) operate on corrupted inputs.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Dependency graph validation enforcing execution order, not just result thresholds
- id: BD-079
  type: BA
  content: 'INTERACTION: BD-025 (Volatility threshold +1.0) × BD-037 (Percentile rank volatility) × BD-046
    (Composite margin risk) → Triple-counting volatility amplifies defensive positioning triggering'
  rationale: 'Three decisions independently trigger high-volatility regime: z-score threshold (+1.0 SD),
    percentile rank (>75th), and margin risk composite (25% volatility weight). During VIX spikes (e.g.,
    2020 COVID crash), each three fire simultaneously creating amplified defensive signals. Position sizing
    multipliers activate (BD-037), margin buffers increase (BD-046), AND z-score regime gates apply additional
    defensive parameters (BD-025). The multiplicative effect causes 40-60% larger position reductions
    than any single trigger would suggest, potentially under-hedging by over-reducing exposure then failing
    to re-enter quickly.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unified volatility regime with single trigger point, OR explicit de-duplication
    logic when multiple volatility signals fire together
- id: BD-080
  type: BA/M
  content: 'INTERACTION: BD-061 (DB singleton memory limits) × BD-065 (EnsembleModel stacking) × BD-046
    (Composite margin risk) → Memory ceiling creates risk cascade for multi-component risk calculations'
  rationale: 'DatabaseConnection enforces 2GB memory limit and 4-thread pool cap. During earnings seasons,
    5x data volume increases query memory pressure. When margin_risk_composite (BD-046) queries each four
    components simultaneously, combined with ensemble training jobs that use stacking (BD-065), the 2GB
    ceiling causes query queuing or OOM kills. Critical: margin_risk scores feed directly into position
    sizing and hedging decisions, so database memory exhaustion creates a cascade where risk calculations
    return stale cached values or error, leading to unhedged positions during high-volatility periods
    when risk management is most needed.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Adaptive memory allocation, query prioritization for risk-critical paths, or
    streaming aggregation to reduce memory footprint
- id: BD-081
  type: B
  content: 'INTERACTION: BD-022 (Offline-first with badge) × BD-002 (Sample data fallback) × BD-023 (Env-based
    cache) → Conflicting data freshness signals confuse users about what''s live vs stale'
  rationale: 'Three decisions manage data availability differently: offline badge (BD-022) shows orange
    for API failure, sample data fallback (BD-002) silently substitutes historical data, and env-based
    cache (BD-023) shows stale data as ''fresh'' for 24h in production. A user may see green badge (DB
    connected) with 24-hour-old sample data (API failed earlier but DB still has yesterday''s data). The
    freshness indicators contradict: connection status OK but data is stale sample. This creates a contradiction
    where users trust green status but act on stale data during critical decision moments.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unified data age indicator combining connection status + last update timestamp
    + data source badge
- id: BD-082
  type: BA/M
  content: 'INTERACTION: BD-012 (Walk-forward validation) × BD-070 (Binary target definition) → Validation
    quality degraded by target definition that discards magnitude'
  rationale: 'Walk-forward validation (BD-012) simulates real deployment using TimeSeriesSplit, but the
    target (BD-070) is binary: future_close > close = UP(1). This creates a contradiction: walk-forward
    accurately measures directional prediction quality but ignores magnitude, so a correct prediction
    of +0.1% and +10% move both count equally. During high-volatility regimes, models optimizing for binary
    accuracy favor tiny correct predictions over big moves, paradoxically rewarding models that predict
    small upticks correctly while missing large profitable moves. Validation metrics (AUC, accuracy) look
    good but actual PnL underperforms.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Magnitude-weighted targets or asymmetric loss functions that reward larger correct
    moves
- id: BD-083
  type: BA/M
  content: 'INTERACTION: BD-016 (Yield curve dominant 25%) × BD-017 (12-18m lookback) × BD-044 (Recession
    model weights) → Yield curve dominates recession probability creating single-point-of-failure in recession
    detection'
  rationale: 'Three decisions concentrate recession detection on yield curve: BD-016 assigns 25% weight
    (highest), BD-017 uses 365*1.5 day lookback for yield inversions, and BD-044 makes yield curve dominant
    in recession model. This amplification creates single-point-of-failure: if yield curve inversions
    become structurally less predictive (as during 2010s when curve平坦化), each three decisions simultaneously
    produce weaker signals. The 12-18 month lookback includes historical inversions that have already
    normalized, creating an anchoring effect where the model over-trusts old inversions. When curve fails
    to invert before a recession (2022-2023 period), the entire recession detection framework misses the
    signal.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Adaptive weight allocation that degrades yield curve weight when recent inversions
    don't predict recessions, ensemble of multiple recession models
- id: BD-084
  type: B/RC
  content: 'INTERACTION: BD-004 (Fernet encryption) × BD-075 (0o600 key permissions) → Encryption provides
    false sense of security against privileged escalation'
  rationale: 'Fernet encryption protects credentials at rest (BD-004), and 0o600 permissions restrict
    key file access (BD-075). Together these create a contradiction: encryption is presented as strong
    protection, but 0o600 only protects against non-owner/non-root users. If an attacker gains owner account
    access (via phishing, password reuse, or insider threat), encryption key is immediately accessible
    and each credentials decrypt. Root privilege bypasses file permissions entirely. This hidden dependency
    means the security architecture provides defense-in-depth against external attackers but fails completely
    against privileged escalation—exactly the threat vector that compromises production credentials.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Hardware Security Module (HSM) or cloud KMS integration where encryption key
    never touches application memory
- id: BD-085
  type: BA/DK
  content: 'INTERACTION: BD-024 (5-year default lookback) × BD-006 (Regime classification thresholds)
    × BD-038 (Momentum regime classification) → Historical thresholds calibrated on different market structure
    may misclassify current regime'
  rationale: 'The 5-year default lookback (BD-024) captures data from 2019-2024 including COVID crash/recovery,
    rate hike cycle, and AI mania. Regime classification thresholds (BD-006: RSI>60 AND MACD>0, BD-038:
    multi-factor momentum) were likely calibrated on different market structures. When displaying 5-year
    charts, the UI presents regime classifications based on thresholds that may be inappropriate for portions
    of the lookback window. RSI>60 may have been bullish signal in 2010s but became common in 2020s bull
    markets, causing regime to appear permanently bullish. This hidden dependency between visualization
    horizon and threshold calibration creates systematic misclassification during regime transitions visible
    in long lookbacks.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Rolling threshold recalibration based on recent 2-3 year market structure, or
    adaptive thresholds tied to recent volatility regime
  vague_rationale: true
