# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-070
name: EdgarTools
sop_version: '3.6'
source:
  projects:
  - edgartools
  commit_hash: cc2e39956a5e66d173981707d288875eed35eb23
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: SEC EDGAR data extraction and financial statement parsing
  description: Python library for accessing SEC EDGAR filings as structured data. Parse financial statements,
    insider trades, fund holdings, XBRL data, and 20+ filing types with a consistent Python API.
  prerequisites: Basic understanding of SEC filings, Python programming. XBRL concepts recommended for
    advanced features.
  not_suitable_for: Real-time market data, non-US securities filings, complex derivatives pricing, high-frequency
    trading systems
  activation:
    triggers:
    - Use /research when asked to investigate GitHub issues (#NNN), SEC filings (10-K, XBRL), or codebase
      exploration
    - Use /plan when research is complete and implementation approach is needed
    - Use /implement when a detailed plan exists and code changes are needed
    - Use /checkpoint before clearing context to preserve work state
    - Use /triage when new GitHub issues arrive that need classification
    - Use /roadmap weekly (Monday) for roadmap review and after releases
    - Use /task when creating, listing, or updating development tasks
    emphasis:
    - ESPECIALLY use /research for GitHub issues - documentarians must NOT suggest fixes, only describe
      what exists
    - ESPECIALLY use /checkpoint before any context clearing - lost context means lost decisions
    - ESPECIALLY coordinate with product-manager through /triage BEFORE implementing bug fixes
    - ESPECIALLY use Beads for tracking rather than growing markdown files - faster and more scalable
    anti_skip:
    - Don't skip /checkpoint because 'work is simple' - decisions and context are always lost after /clear
    - Don't skip product-manager coordination for bugs - critical vs normal classification determines
      release strategy
    - Don't skip verification steps in implement phases - tests must pass incrementally
    - Don't skip phase markers (⬜→🔄→✅) in plans - needed forFIC context reset support
stages:
- id: data_retrieval
  name: SEC EDGAR Data Retrieval
  order: 1
  responsibility: Fetch filing indexes and documents from SEC EDGAR APIs with rate limiting and caching
    to enable bulk access to millions of historical filings
  interface:
    inputs:
    - year/quarter filters
    - form type filters
    - CIK/ticker identifiers
    outputs:
    - Filing index tables (PyArrow)
    - Raw HTML/XML/SGML documents
    - XBRL instance files
  required_methods:
  - name: Filings.get_filings
    description: Retrieve filtered filing index as PyArrow table with pagination support
    evidence: edgar/_filings.py:527(Filings.__init__)
  - name: Filing.document
    description: Access raw filing document content (HTML/XML/SGML)
    evidence: edgar/_filings.py:1411(Filing)
  - name: Filing.xbrl
    description: Get XBRL instance from filing attachments
    evidence: edgar/_filings.py:1411(Filing)
  key_behaviors:
  - behavior: PyArrow table storage for memory efficiency
    description: Uses PyArrow parquet format for filing indexes instead of pandas to handle millions of
      rows across 10+ years of filings with faster filtering
    evidence: edgar/_filings.py:532(Filings.__init__)
  - behavior: Separated index download from document retrieval
    description: Bulk operations on metadata before fetching expensive document content, enabling efficient
      filtering pipelines
    evidence: edgar/_filings.py:558(Filings.download)
  - behavior: Singleton MappingStore for concept mappings
    description: Large JSON concept mapping files loaded once per process to eliminate redundant file
      I/O
    evidence: edgar/xbrl/standardization/__init__.py:24(get_default_store)
  - behavior: Graceful SSL error handling
    description: Corporate networks often have SSL interception; detailed diagnostics help users resolve
      issues
    evidence: edgar/httprequests.py:537(SSLVerificationError)
  replaceable_points:
  - name: HTTP Client Backend
    description: Underlying HTTP library can be swapped for different sync/async requirements
    options:
    - name: httpx (sync/async)
      traits:
      - async support
      - HTTP/2 capable
      - modern API
      fit_for:
      - Production use
      - async applications
      - high concurrency
      not_fit_for:
      - Legacy codebases with requests dependency
    - name: requests
      traits:
      - synchronous only
      - mature ecosystem
      - wide compatibility
      fit_for:
      - Legacy integration
      - simple scripts
      not_fit_for:
      - Async applications
      - high concurrency needs
    default: httpx (sync/async)
  - name: Filing Index Format
    description: How filing metadata is stored and filtered
    options:
    - name: PyArrow parquet
      traits:
      - columnar
      - compressed
      - fast filtering
      fit_for:
      - Large datasets
      - analytical queries
      not_fit_for:
      - Simple single-file exports
    - name: pandas CSV
      traits:
      - human readable
      - widely supported
      fit_for:
      - Small datasets
      - debugging
      not_fit_for:
      - Millions of rows
      - performance critical
    default: PyArrow parquet
  design_decisions:
  - PyArrow for filing indexes over pandas due to memory efficiency and faster filtering for millions
    of rows (edgar/_filings.py:532)
  - Separated filing index download from document retrieval to enable bulk metadata operations (edgar/_filings.py:558)
  - Singleton pattern for MappingStore eliminates redundant JSON file I/O (edgar/xbrl/standardization/__init__.py:24)
  - Graceful SSL fallback with diagnostic info for corporate network compatibility (edgar/httprequests.py:537)
  acceptance_hints:
  - Can retrieve filings for any company/ticker within rate limits
  - PyArrow table filtering returns results in <1s for 10+ years of data
  - XBRL instances parse correctly when available
  - SSL errors provide actionable diagnostic messages
- id: html_parsing
  name: HTML Document Parsing
  order: 2
  responsibility: Parse SEC filing HTML into structured document tree with section detection to extract
    business content from messy SEC HTML
  interface:
    inputs:
    - Raw HTML string from filing
    outputs:
    - Document tree (nodes with hierarchy)
    - Detected sections (Item 1, 1A, etc.)
    - Tables as DataFrames
  required_methods:
  - name: Document.parse
    description: Parse HTML into structured document tree with sections and tables
    evidence: edgar/documents/document.py:600(Document)
  - name: Document.get_section
    description: Extract specific section (Item 1, 1A, etc.) from document
    evidence: edgar/documents/document.py:69(Section)
  - name: HTMLParser.parse
    description: Orchestrate parsing pipeline with configured strategies
    evidence: edgar/documents/parser.py:24(HTMLParser)
  key_behaviors:
  - behavior: Strategy pattern for header detection
    description: 5 detector types (TOC, Pattern, Heading, Style, Structural) vote on section boundaries;
      SEC filings vary wildly so no single heuristic works
    evidence: edgar/documents/strategies/header_detection.py:15(HeaderDetector)
  - behavior: Multi-strategy fallback cascade
    description: TOC-based detection most reliable but not always present; heading detection catches most
      filings; fallback chain ensures coverage
    evidence: edgar/documents/extractors/hybrid_section_detector.py:69(detect_sections)
  - behavior: Lazy text caching via CacheableMixin
    description: Text extraction is expensive; caching prevents re-parsing for repeated access across
      document operations
    evidence: edgar/documents/cache_mixin.py:11(CacheableMixin)
  - behavior: ParserConfig for optimization goals
    description: AI processing needs different config than batch processing; accuracy vs performance tradeoffs
      configurable
    evidence: edgar/documents/config.py:31(ParserConfig)
  - behavior: Agent-aware TOC parsing
    description: Filing agents (Donnelley, EDGAR Online, Workiva, Toppan Merrill) have different HTML
      structures requiring agent-specific parsing
    evidence: edgar/_filings.py:527
  replaceable_points:
  - name: Section Detection Strategy
    description: How sections are identified in document
    options:
    - name: TOC-based
      traits:
      - most reliable
      - requires TOC presence
      fit_for:
      - Annual reports
      - 10-K filings
      not_fit_for:
      - 8-K filings
      - incomplete documents
    - name: Pattern-based
      traits:
      - regex matching
      - high weight (0.4)
      fit_for:
      - Standard SEC filings
      not_fit_for:
      - Non-standard formats
    - name: Heading-based
      traits:
      - structural analysis
      fit_for:
      - Well-structured HTML
      not_fit_for:
      - Messy SEC HTML
    - name: Hybrid (default)
      traits:
      - cascading fallback
      - ensemble voting
      fit_for:
      - Most use cases
      - production
      not_fit_for:
      - Edge cases requiring single strategy
    default: Hybrid
  - name: Table Processing
    description: Table extraction strategy
    options:
    - name: Basic
      traits:
      - simple extraction
      fit_for:
      - Well-formed tables
      not_fit_for:
      - Nested tables
      - multi-span cells
    - name: Advanced (with strategies)
      traits:
      - handles complexity
      - multi-strategy
      fit_for:
      - SEC filing tables
      - complex layouts
      not_fit_for:
      - Simple HTML tables
    default: Advanced
  design_decisions:
  - Strategy pattern for header detection with 5 detector types voting on section boundaries (edgar/documents/strategies/header_detection.py:15)
  - 'Multi-strategy fallback cascade: TOC > Pattern > Heading ensures coverage across filing types (edgar/documents/extractors/hybrid_section_detector.py:69)'
  - Lazy text caching via CacheableMixin prevents expensive re-parsing (edgar/documents/cache_mixin.py:11)
  - ParserConfig enables accuracy vs performance tradeoffs for AI vs batch use cases (edgar/documents/config.py:31)
  acceptance_hints:
  - Document tree accurately reflects HTML structure with parent/child relationships
  - Section detection identifies Item 1 (Business), 1A (Risk Factors), 7, 8 with >90% accuracy
  - Tables extracted as DataFrames with correct cell values and spanning
  - Parsed lxml tree cached to eliminate redundant HTML parsing
- id: xbrl_processing
  name: XBRL Financial Data Processing
  order: 3
  responsibility: Parse XBRL instance documents and linkbases to extract structured financial facts and
    standardize company-specific tags for cross-company comparison
  interface:
    inputs:
    - XBRL instance XML
    - Presentation/Calculation/Definition linkbases
    - Label linkbase
    outputs:
    - FactsView (queryable facts)
    - Statement objects (income, balance, cashflow)
    - Standardized concepts
  required_methods:
  - name: XBRL.parse
    description: Top-level XBRL parser integrating each components (facts, statements, concepts)
    evidence: edgar/xbrl/xbrl.py:102(XBRL)
  - name: FactsView.get_facts
    description: Query interface over each XBRL facts with filtering
    evidence: edgar/xbrl/facts.py:948(FactsView)
  - name: FactQuery.by_concept
    description: Fluent query builder for filtering facts by concept, period, and unit
    evidence: edgar/xbrl/facts.py:46(FactQuery)
  - name: ConceptMapper.standardize
    description: Map company-specific concepts to canonical standard names
    evidence: edgar/xbrl/standardization/core.py:511(ConceptMapper)
  key_behaviors:
  - behavior: Standardization maps company concepts to canonical names
    description: Apple uses 'RevenueFromContractWithCustomer' while Microsoft uses 'Revenues'; standardization
      enables comparison across companies using 95 standard concepts
    evidence: edgar/xbrl/standardization/core.py:145(MappingStore)
  - behavior: Period selection with fiscal intelligence
    description: Fiscal year ends vary by company; selecting aligned quarters produces meaningful period-over-period
      comparisons
    evidence: edgar/xbrl/period_selector.py:31(select_periods)
  - behavior: Fluent FactQuery API for chainable filtering
    description: XBRL facts have many attributes (concept, value, period, unit); chainable filters simplify
      complex queries
    evidence: edgar/xbrl/facts.py:46(FactQuery)
  - behavior: Abstract concept detection hides taxonomy structure
    description: XBRL taxonomy has abstract concepts (us-gaap:BalanceSheetAbstract) that shouldn't display
      as line items
    evidence: edgar/xbrl/abstract_detection.py:77(is_abstract_concept)
  replaceable_points:
  - name: Concept Standardization
    description: How non-standard concepts are mapped to standard names
    options:
    - name: JSON mappings
      traits:
      - predefined
      - fast lookup
      fit_for:
      - Standard GAAP concepts
      not_fit_for:
      - New or custom taxonomies
    - name: Learned mappings
      traits:
      - adaptive
      - semantic matching
      fit_for:
      - Non-standard filings
      - emerging concepts
      not_fit_for:
      - Production batch processing
    - name: Fallback to original
      traits:
      - preserves raw data
      fit_for:
      - Debugging
      - audit trails
      not_fit_for:
      - Cross-company analysis
    default: JSON + learned
  - name: Period Selection
    description: How reporting periods are selected for analysis
    options:
    - name: Smart (fiscal-aware)
      traits:
      - aligns fiscal periods
      - considers YTD
      fit_for:
      - Cross-company comparison
      - multi-period analysis
      not_fit_for:
      - Simple single-period queries
    - name: Simple (most recent)
      traits:
      - fastest
      - most recent data
      fit_for:
      - Latest quarter only
      - simple screens
      not_fit_for:
      - Multi-year trends
      - fiscal alignment
    default: Smart
  design_decisions:
  - Standardization maps company-specific XBRL tags to 95 canonical concepts enabling cross-company comparison
    (edgar/xbrl/standardization/core.py:145)
  - Period selection with fiscal intelligence handles varying fiscal year ends (edgar/xbrl/period_selector.py:31)
  - Fluent FactQuery API enables chainable filters for complex XBRL queries (edgar/xbrl/facts.py:46)
  - Abstract concept detection hides taxonomy structure from users (edgar/xbrl/abstract_detection.py:77)
  acceptance_hints:
  - XBRL facts always have concept, value, period, and unit attributes
  - Period types are either 'instant' (point-in-time) or 'duration' (range)
  - Standardized concept names match across different company filings
  - TTM period type correctly returns error for Balance Sheet (point-in-time data)
- id: statement_stitching
  name: Multi-Period Statement Stitching
  order: 4
  responsibility: Combine financial statements across multiple filings into unified multi-period views
    enabling trend analysis and cross-period comparison
  interface:
    inputs:
    - List of XBRL objects from different periods
    outputs:
    - StitchedStatement with multiple periods
    - StitchedStatements accessor class
    - XBRLS (multiple XBRL stitched)
  required_methods:
  - name: StatementStitcher.stitch
    description: Combine statement data across periods with deduplication
    evidence: edgar/xbrl/stitching/core.py:58(StatementStitcher)
  - name: StitchedStatement.to_dataframe
    description: Export multi-period statement as DataFrame with standardized concepts
    evidence: edgar/xbrl/statements.py:3066(StitchedStatement)
  - name: XBRLS.get_income_statement
    description: Get stitched income statement across each periods
    evidence: edgar/xbrl/stitching/xbrls.py:20(XBRLS)
  key_behaviors:
  - behavior: Concept deduplication before stitching
    description: Same standard concept can appear multiple times per period; merging prevents duplicate
      rows in multi-period view
    evidence: edgar/xbrl/stitching/core.py:583(_merge_duplicate_standard_concepts)
  - behavior: Period selection by type strategy
    description: Different use cases need different period views; RECENT_PERIODS for investor analysis,
      FISCAL_YEARS for historical trends
    evidence: edgar/xbrl/stitching/core.py:259(_select_periods)
  - behavior: Standardization applied before stitching
    description: Must normalize concepts to standard names before comparing across companies or periods
    evidence: edgar/xbrl/stitching/core.py:366(_standardize_statement_data)
  replaceable_points:
  - name: Period Selection Strategy
    description: How periods are selected from available filing data
    options:
    - name: RECENT_PERIODS
      traits:
      - most recent
      - quarterly focus
      fit_for:
      - Current analysis
      - earnings review
      not_fit_for:
      - Long-term historical trends
    - name: FISCAL_YEARS
      traits:
      - annual only
      - comparable periods
      fit_for:
      - Year-over-year analysis
      - annual reports
      not_fit_for:
      - Quarterly drill-down
    - name: QUARTERS
      traits:
      - each quarters
      - granular
      fit_for:
      - Detailed analysis
      - seasonality detection
      not_fit_for:
      - High-level summaries
    - name: Custom
      traits:
      - user-defined
      - flexible
      fit_for:
      - Specific date ranges
      - ad-hoc analysis
      not_fit_for:
      - Standard workflows
    default: RECENT_PERIODS
  design_decisions:
  - Concept deduplication before stitching prevents duplicate rows (edgar/xbrl/stitching/core.py:583)
  - Period selection by type distinguishes investor analysis from historical trends (edgar/xbrl/stitching/core.py:259)
  - Standardization applied before stitching enables cross-company comparison (edgar/xbrl/stitching/core.py:366)
  acceptance_hints:
  - Stitched statements show aligned periods with correct chronological ordering
  - .shift(1) for period-over-period calculations works correctly with chronological data
  - No duplicate rows for same concept/period combination
  - Standard concept names consistent across each periods
- id: entity_resolution
  name: Entity Resolution and Company Data
  order: 5
  responsibility: Resolve identifiers (ticker, CIK, name) to Company/Fund entities with facts and filings,
    providing unified access to SEC filer data
  interface:
    inputs:
    - Ticker symbol, CIK number, or company name
    outputs:
    - Company object with facts/filings
    - Entity facts as DataFrames
    - Financial statements
  required_methods:
  - name: Company.get_financials
    description: Retrieve each financial statements for a company
    evidence: edgar/entity/core.py:570(Company)
  - name: get_entity
    description: Resolve identifier to Entity using fallback chain (ticker -> CIK -> name)
    evidence: edgar/entity/core.py:1725(get_entity)
  - name: Company.filings
    description: Access company's SEC filings with filtering
    evidence: edgar/entity/core.py:570(Company)
  key_behaviors:
  - behavior: Duck typing via HasContext Protocol
    description: Any object with to_context() works with compose_context(); no inheritance required for
      AI integration
    evidence: edgar/context.py:14(HasContext)
  - behavior: Fallback chain for identifier resolution
    description: Ticker -> CIK -> name lookup; different inputs need different resolution paths; robust
      handling of varied inputs
    evidence: edgar/entity/core.py:1725(get_entity)
  - behavior: Filer category detection
    description: Accelerated vs non-accelerated filer detection affects which forms are required; category
      determined from company size metrics
    evidence: edgar/entity/core.py:344(filer_category)
  replaceable_points:
  - name: Identifier Type
    description: What identifier to use for entity resolution
    options:
    - name: CIK
      traits:
      - unique
      - official
      fit_for:
      - Batch processing
      - database integration
      not_fit_for:
      - Human-friendly access
    - name: Ticker
      traits:
      - familiar
      - widely used
      fit_for:
      - User queries
      - interactive analysis
      not_fit_for:
      - Funds without tickers
    - name: Company name
      traits:
      - human readable
      fit_for:
      - Natural language queries
      not_fit_for:
      - Ambiguous names
      - name changes
    default: Ticker
  design_decisions:
  - Duck typing via HasContext Protocol allows any existing class to be AI-ready without modification
    (edgar/context.py:14)
  - Fallback chain for identifier resolution handles varied input types robustly (edgar/entity/core.py:1725)
  - Filer category detection based on company size affects filing requirements (edgar/entity/core.py:344)
  acceptance_hints:
  - Any identifier (ticker, CIK, name) resolves to correct Company object
  - Company object provides access to each facts and filings
  - Entity facts include SIC categorization from XBRL data
  - Every CompanyReport subclasses support __getitem__(item_name) for section access
- id: ownership_reporting
  name: Ownership and Insider Transaction Reporting
  order: 6
  responsibility: Parse Forms 3, 4, 5 (and 13D/13G) for insider holdings and transactions to track insider
    activity and ownership changes
  interface:
    inputs:
    - Ownership XML from filings
    outputs:
    - Ownership object with holdings/transactions
    - Transaction summary DataFrames
    - Position summaries
  required_methods:
  - name: Form4.transactions
    description: Get each transactions from Form 4 filing
    evidence: edgar/ownership/ownershipforms.py:2260(Form4)
  - name: Ownership.get_summary
    description: Get aggregated transaction activity summary
    evidence: edgar/ownership/ownershipforms.py:1732(Ownership)
  - name: TransactionSummary.to_dataframe
    description: Export transaction data as DataFrame for analysis
    evidence: edgar/ownership/ownershipforms.py:1401(TransactionSummary)
  key_behaviors:
  - behavior: Buy/sell code translation to human-readable
    description: 'SEC codes (P=Purchase, S=Sale) need conversion for display; canonical mapping {''A'':
      ''Buy'', ''D'': ''Sell''} used across module'
    evidence: edgar/ownership/ownershipforms.py:85(translate_buy_sell)
  - behavior: Footnote resolution for transaction values
    description: Footnotes contain important context; values like 'Approximately 50,000' need parsing
      to extract numeric values
    evidence: edgar/ownership/ownershipforms.py:1801(_resolve_footnotes)
  replaceable_points:
  - name: Form Type
    description: Which ownership form to parse
    options:
    - name: Form 3 (initial)
      traits:
      - initial holdings
      - one-time
      fit_for:
      - Baseline ownership
      - starting point
      not_fit_for:
      - Change tracking
    - name: Form 4 (changes)
      traits:
      - transactional
      - most common
      fit_for:
      - Insider activity monitoring
      - real-time tracking
      not_fit_for:
      - Annual summaries
    - name: Form 5 (annual)
      traits:
      - annual report
      - deferred disclosures
      fit_for:
      - Year-end summaries
      - tax reporting
      not_fit_for:
      - Timely disclosure
    default: Form 4
  design_decisions:
  - Buy/sell code translation to human-readable values using canonical mapping (edgar/ownership/ownershipforms.py:85)
  - Footnote resolution extracts numeric values from textual descriptions (edgar/ownership/ownershipforms.py:1801)
  acceptance_hints:
  - Ownership transactions have buy_sell code (P=Purchase, S=Sale, A=Buy, D=Sell)
  - Transaction values correctly parsed including footnote references
  - Form type validated before parsing (DEEP-001)
  - Aggregated summaries match individual transactions
- id: ai_integration
  name: AI Integration Layer
  order: 7
  responsibility: Provide AI-optimized context generation and MCP tool interfaces for LLM agents to consume
    SEC data with token budget management
  interface:
    inputs:
    - Any HasContext object (Filing, Company, Statement)
    outputs:
    - LLM-optimized context strings
    - MCP tool responses
    - Token-optimized summaries
  required_methods:
  - name: HasContext.to_context
    description: Convert any context-producing object to LLM-optimized string with detail level
    evidence: edgar/context.py:14(HasContext)
  - name: compose_context
    description: Combine multiple objects with token budgeting (60% first, 40% split)
    evidence: edgar/context.py:25(compose_context)
  - name: TokenOptimizer.optimize
    description: Optimize content for LLM token limits while preserving key information
    evidence: edgar/ai/core.py:15(TokenOptimizer)
  - name: get_tool_definitions
    description: Get MCP tool definitions for agent registration using @tool decorator
    evidence: edgar/ai/mcp/tools/base.py:19(TOOLS)
  key_behaviors:
  - behavior: Protocol-based AI interface (no inheritance required)
    description: Duck typing allows any existing class to be AI-ready by adding to_context() method without
      modification; classes implementing SecFiler also need AIEnabled abstract methods
    evidence: edgar/context.py:14(HasContext); edgar/entity/core.py:211-231
  - behavior: Token budget allocation (60% first object, 40% split)
    description: First object typically most important; remaining split equally among others; ensures
      primary context gets most tokens
    evidence: edgar/context.py:78(first_budget = int(available_chars * 0.6))
  - behavior: Skills + MCP dual pathways
    description: Skills (documentation) for interactive use; MCP for batch automation; Skills primary
      but MCP needed for automation
    evidence: edgar/ai/ARCHITECTURE.md:7
  - behavior: ToolResponse standard format for MCP tools
    description: Consistent JSON output across each tools for reliable LLM parsing; error suggestions
      architecture maps exceptions to guidance
    evidence: edgar/ai/mcp/tools/base.py:27(ToolResponse)
  replaceable_points:
  - name: AI Context Detail
    description: How much detail in AI context output
    options:
    - name: minimal (~100 tokens)
      traits:
      - concise
      - high-level
      fit_for:
      - Brief summaries
      - quick context
      not_fit_for:
      - Detailed analysis
    - name: standard
      traits:
      - balanced
      - default
      fit_for:
      - Most AI use cases
      - general analysis
      not_fit_for:
      - Token-constrained environments
    - name: full
      traits:
      - comprehensive
      - each details
      fit_for:
      - Audit
      - complete data access
      not_fit_for:
      - LLM token limits
      - cost optimization
    default: standard
  - name: Integration Path
    description: How AI agents access edgartools
    options:
    - name: Skills (code execution)
      traits:
      - interactive
      - documentation-first
      fit_for:
      - Conversational AI
      - research agents
      not_fit_for:
      - Batch automation
      - scheduled tasks
    - name: MCP (tool calling)
      traits:
      - declarative
      - tool-based
      fit_for:
      - Automation
      - batch processing
      - scheduled queries
      not_fit_for:
      - Interactive exploration
    default: Skills
  design_decisions:
  - Protocol-based AI interface allows any class to be AI-ready without inheritance (edgar/context.py:14)
  - Token budget allocation favors first object (60%) for primary context prioritization (edgar/context.py:78)
  - Skills + MCP dual pathways support both interactive and automated use cases (edgar/ai/ARCHITECTURE.md:7)
  - ToolResponse standard format ensures consistent JSON across MCP tools (edgar/ai/mcp/tools/base.py:27)
  acceptance_hints:
  - Every context-producing objects implement to_context(detail='standard') -> str
  - compose_context() respects token budget limits
  - MCP tools registered via @tool decorator are discoverable
  - TTM period type correctly returns error for balance sheet in AI context
- id: abs_filing_processing
  name: Asset-Backed Securities Data
  order: 8
