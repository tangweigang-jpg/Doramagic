  - Regex fallback for exact pattern matching in structured data (edgar/_filings.py:2044)
  - Hybrid engine weight validation ensures normalized scoring (edgar/documents/ranking/ranking.py:263-265)
  acceptance_hints:
  - BM25 search returns relevant results ranked by relevance
  - Regex search finds exact patterns (dates, numbers) correctly
