    patterns, then conciseness; weights sum to 1.8 suggesting unnormalized scoring. Breaks when pattern
    expectations change without weight recalibration.'
  evidence: edgar/ai/evaluation/evaluators.py:374(evaluate_code)
  stage: ai_evaluation
  alternative_considered: Equal weights or user-configurable weights were not implemented
- id: BD-GAP-005
  type: B
  content: 'Non-accrual extraction uses three-tier priority: XBRL footnotes → dimensional XBRL → aggregate
    concepts'
  rationale: Prioritizes richest structured data (footnotes with investment linkage) over aggregate totals;
    each tier provides fallback when prior fails. Breaks when footnotes exist but lack proper XBRL linkage
    to investments.
  evidence: edgar/bdc/nonaccrual.py:248(extract_nonaccrual)
  stage: data_retrieval
  alternative_considered: Aggregate-first approach was rejected as less informative for portfolio analysis
- id: BD-GAP-006
  type: B/BA
  content: BDC active status threshold of 18 months without SEC filing
  rationale: 18-month window captures most BDC lifecycle events (annual reports, mergers, liquidations)
    while filtering truly inactive entities; aligns with SEC filing frequency expectations. Breaks for
    BDCs in wind-down phase still filing periodically.
  evidence: edgar/bdc/reference.py:59(is_active)
  stage: data_retrieval
  alternative_considered: 12-month threshold was considered but rejected as too aggressive
- id: BD-GAP-007
  type: B
  content: 'Two-tier investment classification: label-based detection first, XBRL data signals as fallback'
  rationale: Label-based detection handles common cases efficiently without XBRL parsing; XBRL fallback
    catches edge cases where labels are ambiguous or missing. Breaks when labels exist but don't match
    keyword patterns and XBRL signals are also absent.
  evidence: edgar/bdc/investments.py:450(is_equity), edgar/bdc/investments.py:468(is_debt)
  stage: data_retrieval
  alternative_considered: XBRL-only approach was rejected as too slow for common cases
  _evidence_issues:
  - 'INVALID_IDENTIFIER: is_equity), edgar/bdc/investments.py:468(is_debt in edgar/bdc/investments.py'
- id: BD-GAP-008
  type: B/RC
  content: 'Ticker resolution priority: CUSIP → direct ticker → ISIN → company name'
  rationale: CUSIP is most authoritative identifier issued by securities authorities; direct ticker is
    fastest for common cases; ISIN and company name provide fallbacks. Breaks when CUSIP lookup returns
    multiple tickers or ticker data is stale.
  evidence: edgar/funds/ticker_resolution.py:58(resolve_ticker)
  stage: entity_resolution
  alternative_considered: Real-time SEC lookup for each resolutions was rejected due to rate limits
- id: BD-GAP-009
  type: BA
  content: 'YTD-to-quarterly derivation: Q2=YTD_6M-Q1, Q3=YTD_9M-YTD_6M, Q4=FY-YTD_9M'
  rationale: Standard SEC filing pattern where quarterly cumulative values can be differenced to get discrete
    quarters; validates derivation via sum-check. Breaks when companies file amended reports with different
    cumulative values or report Q1/Q2/Q3 as discrete instead of YTD.
  evidence: edgar/ttm/calculator.py:506(_quarterize_facts)
  stage: reporting
  alternative_considered: Ignoring derivation and only using discrete quarters was rejected as too limiting
- id: BD-GAP-010
  type: B/DK
  content: TTM calculation selects 4 most recent consecutive quarters ending on or before reference date
  rationale: Consecutive quarter requirement ensures TTM represents actual trailing 12-month window; allows
    reference date flexibility for historical comparisons. Breaks when fiscal year ends mid-quarter causing
    non-standard quarter boundaries.
  evidence: edgar/ttm/calculator.py:127(calculate_ttm), edgar/ttm/calculator.py:1089(_select_ttm_window)
  stage: reporting
  alternative_considered: Fixed calendar quarters (Jan-Mar, Apr-Jun, etc.) was rejected as misaligned
    with fiscal reporting
  _evidence_issues:
  - 'INVALID_IDENTIFIER: calculate_ttm), edgar/ttm/calculator.py:1089(_select_ttm_window in edgar/ttm/calculator.py'
- id: BD-GAP-011
  type: B/BA
  content: EPS derivation uses coefficient of variation threshold (0.03) to choose between linear subtraction
    vs shares-weighted division
  rationale: CV threshold distinguishes stable vs volatile share counts; stable shares allow simple subtraction,
    volatile shares require weighted division for accuracy. Breaks for moderate volatility near the 0.03
    threshold or seasonal buyback patterns.
  evidence: edgar/ttm/calculator.py:788(_compute_shares_cv), edgar/ttm/calculator.py:826(_calculate_single_q4_eps)
  stage: reporting
  alternative_considered: Always using weighted division was rejected due to complexity in deriving quarterly
    shares
  _evidence_issues:
  - 'INVALID_IDENTIFIER: _compute_shares_cv), edgar/ttm/calculator.py:826(_calculate_single_q4_eps in
    edgar/ttm/calculator.py'
- id: BD-GAP-012
  type: B
  content: '13F infotable parsing: primary strategy uses <S>/<C> column position markers, regex fallback
    uses CUSIP as anchor'
  rationale: Column markers are authoritative when present, providing precise parsing; CUSIP anchor fallback
    handles filings without markers reliably. Breaks for malformed filings where CUSIP is missing or invalid.
  evidence: edgar/thirteenf/parsers/infotable_txt/format_multiline.py:454(parse_multiline_format), edgar/thirteenf/parsers/infotable_txt/format_multiline.py:325(_parse_text_regex_fallback)
  stage: data_retrieval
  alternative_considered: ML-based parsing was considered but rejected as too opaque for financial audit
    requirements
  _evidence_issues:
  - 'INVALID_IDENTIFIER: parse_multiline_format), edgar/thirteenf/parsers/infotable_txt/format_multiline.py:325(_parse_text_regex_fallback
    in edgar/thirteenf/parsers/infotable_txt/format_multiline.py'
- id: BD-GAP-013
  type: T
  content: XBRL parsing uses coordinator pattern delegating to specialized parsers for labels, presentation,
    calculation, and definition linkbases
  rationale: Separation of concerns enables independent testing and modification of each parser; shared
    data structures maintain consistency. Breaks when XBRL files have non-standard extensions requiring
    coordination logic changes.
  evidence: edgar/xbrl/parsers/coordinator.py:41(__init__), edgar/xbrl/parsers/coordinator.py:80(_init_parsers)
  stage: html_parsing
  alternative_considered: Monolithic single-pass parser was rejected for maintainability
  _evidence_issues:
  - 'INVALID_IDENTIFIER: __init__), edgar/xbrl/parsers/coordinator.py:80(_init_parsers in edgar/xbrl/parsers/coordinator.py'
- id: BD-GAP-014
  type: B/BA
  content: Large XML files use lxml.etree.iterparse for memory-efficient streaming parsing
  rationale: iterparse avoids loading entire file into memory; critical for large N-PX proxy voting files.
    Breaks for files with deeply nested structures causing stack overflow in recursive element handling.
  evidence: edgar/npx/parsing.py:580(ProxyVoteTableExtractor), edgar/xbrl/parsers/instance.py:113(count_facts)
  stage: html_parsing
  alternative_considered: DOM parsing was rejected due to memory constraints; SAX parsing was rejected
    for complexity
  _evidence_issues:
  - 'INVALID_IDENTIFIER: ProxyVoteTableExtractor), edgar/xbrl/parsers/instance.py:113(count_facts in edgar/npx/parsing.py'
- id: BD-GAP-015
  type: B/RC
  content: FastTableRenderer is 30x faster than Rich table rendering by avoiding style computation
  rationale: Performance gain achieved by removing Rich's style processing overhead; necessary for processing
    large SEC filings. Breaks when users need Rich's advanced formatting features like colors and borders.
  evidence: edgar/documents/renderers/fast_table.py:103(__init__)
  stage: reporting
  alternative_considered: Rich was rejected for performance-critical batch processing scenarios
- id: BD-GAP-016
  type: BA
  content: Beneficial ownership reports overlapping beneficial ownership within single filing vs independent
    across filings
  rationale: 13D/13G filers may report overlapping ownership (groups, control chains); proper aggregation
    prevents double-counting. Breaks when group formations span multiple filings or when amendments don't
    reference original correctly.
  evidence: edgar/beneficial_ownership/schedule13.py:370(total_shares), edgar/beneficial_ownership/schedule13.py:392(total_percent)
  stage: data_retrieval
  alternative_considered: Raw per-reporter percentages were rejected as misleading for control analysis
  _evidence_issues:
  - 'INVALID_IDENTIFIER: total_shares), edgar/beneficial_ownership/schedule13.py:392(total_percent in
    edgar/beneficial_ownership/schedule13.py'
- id: BD-GAP-017
  type: B
  content: 'Fund hierarchy resolution: 0 HTTP calls (cached tickers) → 2 HTTP calls (browse-edgar) for
    unknown tickers'
  rationale: Cached tickers provide instant resolution for common funds; HTTP fallback handles edge cases
    and updates. Breaks when cached data is stale and browse-edgar also fails or returns inconsistent
    data.
  evidence: edgar/funds/data.py:633(get_fund_object), edgar/funds/data.py:724(_fund_ticker_set)
  stage: entity_resolution
  alternative_considered: Always using SEC API was rejected due to rate limits; always using cache was
    rejected due to staleness
  _evidence_issues:
  - 'INVALID_IDENTIFIER: get_fund_object), edgar/funds/data.py:724(_fund_ticker_set in edgar/funds/data.py'
- id: BD-GAP-018
  type: B/BA
  content: Page break detection relies on div elements with page-like dimensions rather than explicit
    page break tags
  rationale: SEC HTML filings use CSS-based page formatting; explicit page break tags are unreliable across
    filing types. Breaks for filings using different page dimension conventions or when divs serve multiple
    purposes.
  evidence: edgar/files/page_breaks.py:53(_is_page_like_div)
  stage: html_parsing
  alternative_considered: PDF-based page detection was rejected due to complexity and file availability
- id: BD-GAP-019
  type: B/BA
  content: Name reversal assumes SEC 'LAST FIRST [MIDDLE] [SUFFIX]' ordering with lazy evaluation on name
    access
  rationale: Reversal only occurs when name is accessed and entity is confirmed individual (not company);
    avoids unnecessary processing for company names. Breaks for names with prefixes (Van, De, Mac) or
    multiple surname components.
  evidence: edgar/sgml/sgml_header.py:212(__init__), edgar/sgml/sgml_header.py:219(name)
  stage: data_retrieval
  alternative_considered: Always reversing was rejected as incorrect for company names
  _evidence_issues:
  - 'INVALID_IDENTIFIER: __init__), edgar/sgml/sgml_header.py:219(name in edgar/sgml/sgml_header.py'
- id: BD-GAP-020
  type: T
  content: Corporate proxy certificate detection uses tiered confidence levels (strong indicators → context-dependent
    → weak)
  rationale: SSL inspection products leave detectable fingerprints; tiered approach prevents false positives
    while catching most corporate proxies. Breaks when proxies use certificates indistinguishable from
    legitimate SEC certificates.
  evidence: edgar/diagnose_ssl/checks.py:251(_is_corporate_proxy_cert)
  stage: infrastructure
  alternative_considered: Allowing user override was implemented as secondary fallback
- id: BD-GAP-021
  type: B
  content: SGML parsing uses str.find() offset scanning for document extraction rather than regex or XML
    parsing
  rationale: str.find() is faster than regex for fixed patterns and more robust than XML parsing for malformed
    SGML; zero-copy document references minimize memory. Breaks for SGML with unusual whitespace or embedded
    null characters.
  evidence: edgar/sgml/sgml_parser.py:498(_extract_all_documents)
  stage: html_parsing
  alternative_considered: Regex was rejected for performance; XML parsing was rejected for malformed SGML
    handling
- id: BD-GAP-022
  type: T
  content: DataQuality tracks coverage percentages per field to indicate reliability of BDC portfolio
    data
  rationale: Coverage metrics help users understand data completeness before relying on it for decisions;
    SEC filings vary in XBRL detail. Breaks when coverage is 100% but data contains systematic XBRL tagging
    errors.
  evidence: edgar/bdc/investments.py:378(DataQuality), edgar/bdc/investments.py:561(data_quality)
  stage: data_retrieval
  alternative_considered: Provenance tracking per data point was considered too complex
  _evidence_issues:
  - 'INVALID_IDENTIFIER: DataQuality), edgar/bdc/investments.py:561(data_quality in edgar/bdc/investments.py'
- id: BD-GAP-023
  type: B/BA
  content: Concept learning excludes concepts below 0.3 occurrence threshold to filter noise
  rationale: 30% threshold removes company-specific concepts unlikely to generalize; ensures learned mappings
    are broadly applicable. Breaks when analyzing niche industries with legitimately rare concepts.
  evidence: edgar/entity/training/run_learning.py:273(__init__)
  stage: ml_training
  alternative_considered: Per-concept adaptive thresholds were rejected as over-engineering
- id: BD-GAP-024
  type: B/BA
  content: Filing harness storage uses SQLite with WAL mode for concurrent access and indexes on key columns
  rationale: WAL mode enables concurrent reads during writes without corruption; indexes ensure query
    performance as data grows. Breaks when storage outgrows SQLite (typically >100GB) or concurrent write
    contention increases.
  evidence: scripts/harness/storage.py:41(_create_connection), scripts/harness/storage.py:49(_create_schema)
  stage: infrastructure
  alternative_considered: DuckDB was considered but rejected for simpler operational requirements
  _evidence_issues:
  - 'INVALID_IDENTIFIER: _create_connection), scripts/harness/storage.py:49(_create_schema in scripts/harness/storage.py'
- id: BD-GAP-025
  type: BA
  content: Stock split detection uses 'StockSplitConversionRatio' XBRL facts with priority scoring (8-K
