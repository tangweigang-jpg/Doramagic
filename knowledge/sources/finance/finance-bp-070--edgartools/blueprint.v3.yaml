business_decisions:
- id: BD-001
  type: B/RC
  content: Use PyArrow tables for filing indexes instead of pandas
  rationale: PyArrow provides superior memory efficiency and significantly faster filtering operations
    when processing 10+ years of SEC filings containing millions of rows. The boundary condition is that
    this applies to index operations only; document content retrieval remains unchanged to maintain compatibility
    with existing parsers.
  evidence: edgar/_filings.py:532(Filings.__init__)
  stage: data_retrieval
  alternative_considered: Dask DataFrames for distributed processing; rejected due to added complexity
    for single-machine use cases
- id: BD-002
  type: B/DK
  content: Separate filing index download from document retrieval
  rationale: Allows bulk operations on metadata before fetching expensive document content. This separation
    enables users to filter, sort, and select filings based on metadata (date, form type, company) without
    incurring network costs for document downloads. The boundary is that index operations are stateless
    while document operations maintain session context.
  evidence: edgar/_filings.py:558(Filings.download)
  stage: data_retrieval
  alternative_considered: Lazy loading with promises; rejected in favor of explicit two-phase approach
    for clarity
- id: BD-003
  type: BA
  content: Singleton pattern for MappingStore to eliminate redundant file I/O
  rationale: Concept mapping files are large JSON structures; loading once per process saves significant
    time. The boundary is process-level singleton; multi-process scenarios require explicit factory pattern.
    This prevents repeated disk I/O for taxonomy mapping files that can be 10+ MB each.
  evidence: edgar/xbrl/standardization/__init__.py:24(get_default_store)
  stage: data_retrieval
  alternative_considered: LRU cache with size limits; rejected as mapping files are singletons by nature
- id: BD-004
  type: BA
  content: Graceful fallback for SSL errors with diagnostic info
  rationale: Corporate networks often have SSL interception for security inspection; detailed diagnostics
    help users resolve issues without vendor support. The boundary is that this applies only to verification
    failures, not connection timeouts or network errors. Provides actionable remediation steps rather
    than opaque error codes.
  evidence: edgar/httprequests.py:537(SSLVerificationError)
  stage: data_retrieval
  alternative_considered: Automatic SSL verification bypass; rejected due to security implications
- id: BD-005
  type: B/BA
  content: Strategy pattern for header detection (5 detector types)
  rationale: SEC filings vary wildly in HTML structure; no single heuristic works across each form types
    and companies. A voting ensemble of 5 detector types improves accuracy by combining pattern matching,
    tag analysis, font heuristics, and spatial layout detection. The boundary is that detectors are composable
    but not interchangeable at runtime without reconfiguration.
  evidence: edgar/documents/strategies/header_detection.py:15(HeaderDetector)
  stage: html_parsing
  alternative_considered: ML-based classification; rejected due to training data requirements and inference
    overhead
- id: BD-006
  type: BA
  content: 'Multi-strategy fallback: TOC > Pattern > Heading detection'
  rationale: TOC-based detection is most reliable but not always present in filings; heading detection
    catches most remaining cases as fallback. The fallback chain ensures robust section detection across
    each filing types. Boundary is that each strategy has distinct performance characteristics; TOC parsing
    is O(n) while heading detection is O(n log n).
  evidence: edgar/documents/extractors/hybrid_section_detector.py:69(detect_sections)
  stage: html_parsing
  alternative_considered: Parallel execution of each strategies with consensus voting; rejected for performance
    reasons
- id: BD-007
  type: BA
  content: Lazy text caching via CacheableMixin
  rationale: Text extraction from HTML is computationally expensive; caching prevents re-parsing for repeated
    access within the same session. The boundary is instance-level caching; cross-instance sharing requires
    external cache layer. Optimizes for read-heavy workloads where the same document sections are accessed
    multiple times.
  evidence: edgar/documents/cache_mixin.py:11(CacheableMixin)
  stage: html_parsing
  alternative_considered: Eager caching at load time; rejected to avoid memory bloat for large document
    sets
- id: BD-008
  type: B
  content: ParserConfig for different optimization goals
  rationale: Accuracy vs performance tradeoffs require different configurations; AI processing needs verbose
    extraction while batch operations prioritize speed. The boundary is that config changes are static
    per parse operation; runtime reconfiguration requires new parser instance. Enables users to tune behavior
    without code changes.
  evidence: edgar/documents/config.py:31(ParserConfig)
  stage: html_parsing
  alternative_considered: Separate parser classes for each mode; rejected to avoid code duplication
- id: BD-009
  type: B/BA
  content: Standardization maps company concepts to canonical names
  rationale: Different companies use varying taxonomy concepts for the same business metric (e.g., Apple
    uses 'RevenueFromContractWithCustomer' while Microsoft uses 'Revenues'). Standardization enables meaningful
    cross-company and cross-period comparisons. The boundary is that mapping accuracy depends on taxonomy
    coverage; unmapped concepts default to original labels.
  evidence: edgar/xbrl/standardization/core.py:145(MappingStore)
  stage: xbrl_processing
  alternative_considered: Require users to specify mappings per analysis; rejected due to UX burden
- id: BD-010
  type: BA
  content: Period selection with fiscal intelligence
  rationale: Fiscal year ends vary by company (calendar year vs March vs September); selecting aligned
    quarters produces meaningful period-over-period comparisons. The boundary is that fiscal intelligence
    requires entity metadata; anonymous comparisons default to calendar quarters. Prevents misleading
    comparisons like Q1 Apple vs Q4 Microsoft.
  evidence: edgar/xbrl/period_selector.py:31(select_periods)
  stage: xbrl_processing
  alternative_considered: Always use calendar quarters; rejected as it produces misleading cross-company
    comparisons
- id: BD-011
  type: BA
  content: Fluent FactQuery API for filtering
  rationale: XBRL facts have many attributes (concept, period, unit, entity, context); chainable filters
    simplify complex queries without nested loops or complex predicates. The boundary is that query execution
    is deferred until terminal operation; enables query composition before materialization.
  evidence: edgar/xbrl/facts.py:46(FactQuery)
  stage: xbrl_processing
  alternative_considered: SQL-like query language; rejected as it introduces new syntax users must learn
- id: BD-012
  type: BA/M
  content: Abstract concept detection to hide structural elements
  rationale: XBRL taxonomy includes abstract concepts (e.g., us-gaap:BalanceSheetAbstract) that serve
    as structural grouping elements but should not display as line items in financial statements. The
    boundary is that filtering happens at rendering time; underlying data model retains each concepts
    for flexibility.
  evidence: edgar/xbrl/abstract_detection.py:77(is_abstract_concept)
  stage: xbrl_processing
  alternative_considered: Remove abstract concepts from data model entirely; rejected as it limits taxonomy
    navigation
- id: BD-013
  type: BA
  content: Concept deduplication before stitching
  rationale: The same standard concept can appear multiple times within a single period due to XBRL taxonomy
    inheritance or filing amendments. Merging prevents duplicate rows that would distort financial analysis.
    The boundary is that deduplication preserves the most recent/authoritative value for each concept.
  evidence: edgar/xbrl/stitching/core.py:583(_merge_duplicate_standard_concepts)
  stage: statement_stitching
  alternative_considered: Preserve each duplicates with provenance tracking; rejected as it complicates
    downstream analysis
- id: BD-014
  type: BA
  content: Period selection by type (RECENT_PERIODS vs FISCAL_YEARS)
  rationale: Different use cases require different period views; investor analysis typically needs recent
    quarters while historical trend analysis requires full fiscal years. The boundary is that selection
    criteria are mutually exclusive within a single request; combining requires multiple queries.
  evidence: edgar/xbrl/stitching/core.py:259(_select_periods)
  stage: statement_stitching
  alternative_considered: Return each periods with metadata; rejected as it wastes bandwidth for targeted
    queries
- id: BD-015
  type: B/RC
  content: Standardization applied before stitching
  rationale: Concepts must be normalized to standard taxonomy before comparing across companies or periods.
    Applying standardization at stitch time ensures consistent labeling throughout the stitched statement.
    The boundary is that standardization is a prerequisite; non-standardized data cannot produce valid
    stitched statements.
  evidence: edgar/xbrl/stitching/core.py:366(_standardize_statement_data)
  stage: statement_stitching
  alternative_considered: Post-stitch standardization; rejected as it would require re-stitching for each
    comparison context
- id: BD-016
  type: BA
  content: Duck typing via HasContext Protocol
  rationale: Any object implementing to_context() works with compose_context() without requiring inheritance
    from a base class. This enables retroactive adaptation of existing classes to the context system.
    The boundary is structural typing via Protocol; runtime type checking ensures compliance.
  evidence: edgar/context.py:14(HasContext)
  stage: entity_resolution
  alternative_considered: Abstract base class with required implementation; rejected as it requires inheritance
- id: BD-017
  type: B
  content: Fallback chain for identifier resolution
  rationale: Users may have ticker symbols, CIK numbers, or company names as inputs; different identifiers
    require different resolution paths. The fallback chain (Ticker -> CIK -> name) handles each common
    input formats. The boundary is that each resolution step has distinct performance characteristics;
    cached lookups are preferred over network queries.
  evidence: edgar/entity/core.py:1725(get_entity)
  stage: entity_resolution
  alternative_considered: Require explicit identifier type specification; rejected as it burdens user
    experience
- id: BD-018
  type: BA
  content: Filer category detection (accelerated vs non-accelerated)
  rationale: Filing requirements differ substantially by company size; accelerated filers have different
    deadlines and form requirements than non-accelerated filers. Category detection routes to appropriate
    parsing logic and validation rules. The boundary is that filer status is determined by public float
    thresholds defined by SEC regulations.
  evidence: edgar/entity/core.py:344(filer_category)
  stage: entity_resolution
  alternative_considered: Require users to specify filer category manually; rejected as it requires regulatory
    expertise
  vague_rationale: true
- id: BD-019
  type: BA
  content: Buy/sell code translation to human-readable
  rationale: SEC filing codes (P=Purchase, S=Sale, G=Gift, etc.) need conversion to human-readable descriptions
    for display to end users. The boundary is that code definitions are regulatory; changes require SEC
    rule updates. Provides consistent terminology across the application.
  evidence: edgar/ownership/ownershipforms.py:85(translate_buy_sell)
  stage: ownership_reporting
  alternative_considered: Display raw codes with tooltip explanations; rejected for user experience
- id: BD-020
  type: BA
  content: Footnote resolution for transaction values
  rationale: Footnotes contain important context for transaction values (e.g., 'Approximately 50,000 shares
    based on $25.00 average price'). Natural language resolution extracts precise values from textual
    descriptions. The boundary is that resolution quality depends on footnote text structure; unusual
    phrasing may fail parsing.
  evidence: edgar/ownership/ownershipforms.py:1801(_resolve_footnotes)
  stage: ownership_reporting
  alternative_considered: Display footnotes as-is without resolution; rejected as it limits analytical
    use cases
- id: BD-021
  type: BA
  content: Protocol-based AI interface (no inheritance required)
  rationale: Duck typing allows any existing class to be AI-ready without modification through structural
    typing. The HasContext Protocol defines the interface contracts without imposing inheritance hierarchies.
    The boundary is that Protocol compliance is verified at call time; errors surface during execution
    rather than at import.
  evidence: edgar/context.py:14(HasContext)
  stage: ai_integration
  alternative_considered: Adapter wrapper classes; rejected as it adds indirection and maintenance burden
- id: BD-022
  type: BA
  content: Token budget allocation (60% first object, 40% split)
  rationale: First object in multi-object contexts typically contains the primary financial statement
    (balance sheet or income statement) which is most important for analysis. The 60/40 split ensures
    adequate coverage for both primary and supporting data. The boundary is that budget allocation is
    static; very small contexts may not benefit from splitting.
  evidence: edgar/context.py:78(module)
  stage: ai_integration
  alternative_considered: Equal distribution; rejected as it underweights primary financial statements
  _evidence_issues:
  - 'FN_NOT_FOUND: module in edgar/context.py'
- id: BD-023
  type: B
  content: Skills + MCP dual pathways
  rationale: Skills (documentation-based) are optimized for interactive use where users explore data conversationally;
    MCP (Model Context Protocol) is designed for batch automation where scripts query data programmatically.
    The boundary is that dual pathways serve distinct deployment scenarios; they are not interchangeable.
  evidence: N/A:0(see_rationale)
  stage: ai_integration
  alternative_considered: Single unified interface; rejected as it would compromise either interactivity
    or automation use cases
- id: BD-024
  type: BA
  content: ToolResponse standard format for MCP tools
  rationale: Consistent JSON output across each tools ensures reliable LLM parsing and tool result consumption.
    Standard format includes status, data, and error fields with predictable schemas. The boundary is
    that each MCP tools must use the standard format; deviation breaks client expectations.
  evidence: edgar/ai/mcp/tools/base.py:27(ToolResponse)
  stage: ai_integration
  alternative_considered: Per-tool response formats; rejected as it introduces inconsistency and maintenance
    burden
- id: BD-025
  type: BA
  content: ABS type detection from filing characteristics
  rationale: CMBS (commercial mortgage-backed securities), auto loan ABS, and credit card ABS have fundamentally
    different data schemas and reporting formats. Detection routes filings to the correct parser implementation.
    The boundary is that hybrid securities containing multiple asset types require multi-parser approaches.
  evidence: edgar/abs/ten_d.py:375(abs_type)
  stage: abs_filing_processing
  alternative_considered: Require user specification of ABS type; rejected as it requires deep domain
    expertise
- id: BD-026
  type: BA/M
  content: Multi-table extraction with label detection
  rationale: ABS distribution reports vary significantly by issuer and deal structure; detecting table
    purpose (e.g., 'Asset Summary', 'Delinquency') routes to appropriate extraction logic. The boundary
    is that label detection is heuristic-based; unusual naming may cause misclassification.
  evidence: edgar/abs/distribution.py:241(_detect_table_label)
  stage: abs_filing_processing
  alternative_considered: Fixed table positions based on filing templates; rejected as it doesn't handle
    structural variations
  vague_rationale: true
- id: BD-027
  type: B/DK
  content: Intermediate representation (RenderedStatement) decouples data from display
  rationale: The same financial data can render to rich console output, markdown documentation, or HTML
    reports. Intermediate representation enables multiple output formats from a single parsed dataset.
    The boundary is that IR captures styling decisions; changing output format requires re-rendering from
    IR rather than re-parsing.
  evidence: edgar/xbrl/rendering.py:254(RenderedStatement)
  stage: reporting
  alternative_considered: Separate rendering pipelines per output format; rejected as it duplicates parsing
    logic
- id: BD-028
  type: BA
  content: Picklable CellFormatter replaces closures
  rationale: Closures cannot be pickled for serialization; RenderedStatement needs pickling for caching
    to disk or cross-process sharing. CellFormatter as a class enables proper serialization. The boundary
