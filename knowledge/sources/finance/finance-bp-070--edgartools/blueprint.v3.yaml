replaceable_slots:
- id: slot-001
  name: sec_data_source
  description: Use official SEC unless you have authorized mirror access
  used_in_stages: []
  options:
  - name: SEC EDGAR Official
    traits:
    - free
    - official
    - rate-limited
    fit_for:
    - Standard usage, production applications
    not_fit_for:
    - High-volume batch processing without authorization
  - name: SEC EDGAR Custom Mirror
    traits:
    - configurable-url
    - custom-rate-limits
    fit_for:
    - Enterprise with private SEC mirrors, academic institutions
    not_fit_for:
    - Standard users without mirror access
  default: SEC EDGAR Official
  _source: worker_resource
- id: slot-002
  name: http_client
  description: Built-in httpx with httpxthrottlecache for rate limiting and caching
  used_in_stages: []
  options:
  - name: httpx (default)
    traits:
    - async
    - sync
    - retry
    - caching
    fit_for:
    - Every use cases
    not_fit_for:
    - None
  default: httpx
  _source: worker_resource
- id: slot-003
  name: cache_backend
  description: Use Hishel-File for local, Redis for distributed
  used_in_stages: []
  options:
  - name: Hishel-File (default)
    traits:
    - file-based
    - persistent
    - eviction
    fit_for:
    - Standard local caching
    not_fit_for:
    - Distributed deployments
  - name: Redis Cache
    traits:
    - distributed
    - persistent
    fit_for:
    - Multi-process deployments
    not_fit_for:
    - Single-process local usage
  default: Hishel-File
  _source: worker_resource
- id: slot-004
  name: rate_limiter
  description: Use InMemoryBucket for single-process, RedisBucket for distributed
  used_in_stages: []
  options:
  - name: pyrate-limiter InMemoryBucket (default)
    traits:
    - in-memory
    - per-process
    fit_for:
    - Single-process applications
    not_fit_for:
    - Distributed/multi-process deployments
  - name: pyrate-limiter RedisBucket
    traits:
    - distributed
    - redis-backed
    fit_for:
    - Multi-process, distributed deployments
    not_fit_for:
    - Single-process applications
  default: InMemoryBucket
  _source: worker_resource
- id: slot-005
  name: cloud_storage
  description: Choose based on existing cloud infrastructure and cost requirements
  used_in_stages: []
  options:
  - name: None (local filesystem, default)
    traits:
    - local
    - default
    fit_for:
    - Single-user, development
    not_fit_for:
    - Multi-user, distributed systems
  - name: AWS S3
    traits:
    - cloud
    - scalable
    - s3-compatible
    fit_for:
    - Cloud-native deployments, AWS users
    not_fit_for:
    - Users without AWS access
  - name: Google Cloud Storage
    traits:
    - cloud
    - scalable
    fit_for:
    - GCP users, Google Cloud environment
    not_fit_for:
    - Non-GCP users
  - name: Azure Blob Storage
    traits:
    - cloud
    - scalable
    fit_for:
    - Azure users, enterprise Microsoft environments
    not_fit_for:
    - Non-Azure users
  - name: Cloudflare R2 / MinIO
    traits:
    - s3-compatible
    - lower-cost
    fit_for:
    - Cost-sensitive users, S3-compatible storage
    not_fit_for:
    - Users needing native AWS/GCP/Azure features
  default: None (local filesystem)
  _source: worker_resource
- id: slot-006
  name: xbrl_parser
  description: Built-in lxml for fast XML/XBRL parsing
  used_in_stages: []
  options:
  - name: lxml (default)
    traits:
    - fast
    - xml
    - c-extensions
    fit_for:
    - Every XBRL parsing needs
    not_fit_for:
    - Pure Python environments without C extensions
  default: lxml
  _source: worker_resource
- id: slot-007
  name: filing_storage
  description: Use online for real-time, local storage for bulk/offline
  used_in_stages: []
  options:
  - name: SEC EDGAR (online, default)
    traits:
    - online
    - current
    - rate-limited
    fit_for:
    - Standard usage with internet access
    not_fit_for:
    - Offline use, high-volume without rate limit authorization
  - name: Local Storage
    traits:
    - offline
    - pre-fetched
    fit_for:
    - Offline use, bulk processing with local data
    not_fit_for:
    - Real-time data needs
  - name: Datamule
    traits:
    - tar-based
    - compressed
    - datamule-format
    fit_for:
    - Alternative bulk filing source
    not_fit_for:
    - Users without Datamule access
  default: SEC EDGAR (online)
  _source: worker_resource
- id: slot-008
  name: ai_integration
  description: Use MCP for AI agents, Direct API for Python applications
  used_in_stages: []
  options:
  - name: MCP Server
    traits:
    - stdio
    - http
    - streaming
    fit_for:
    - AI agents (Claude, Cline), HTTP-based integration
    not_fit_for:
    - Non-MCP AI frameworks
  - name: Direct Python API
    traits:
    - python
    - direct
    fit_for:
    - Python applications integrating EDGAR data
    not_fit_for:
    - Non-Python environments
  default: Direct Python API
  _source: worker_resource
