- id: BD-066
  type: B
  content: Rate limiting with random jitter sleep
  rationale: Rate limiting adds randomized jitter (0.5-1.5x base delay) to prevent thundering-herd API
    calls. This probabilistic approach distributes request load while avoiding strict timing that could
    cause synchronized spikes, with jitter range providing boundary between effectiveness and user-perceptible
    delays.
