- id: storage_persistence
  name: Storage & Persistence
  order: 9
  responsibility: SQLite database management via SQLAlchemy ORM. Stores daily bars, analysis history,
    news intel, backtest results, portfolio events, conversation history, and LLM usage logs. Implements
    breakpoint continuation (has_today_data). Exists to provide durable storage and avoid redundant API
    calls.
  interface:
    inputs: DataFrames, AnalysisResult, NewsIntel, BacktestResult, Portfolio events
    outputs: Queried results with upsert semantics; break-test for data freshness
  required_methods:
  - name: DatabaseManager.save_daily_data
    description: Upsert daily OHLCV data with INSERT OR REPLACE on (code, date) for idempotent saves.
    evidence: src/storage.py:1419(save_daily_data)
  - name: DatabaseManager.has_today_data
    description: 'Checkpoint continuation: checks if today''s data exists before network fetch. Avoids
      redundant API calls.'
    evidence: src/storage.py:858(has_today_data)
  - name: DatabaseManager.record_llm_usage
    description: Fire-and-forget token usage tracking that never raises exceptions.
    evidence: src/storage.py:2028(record_llm_usage)
  key_behaviors:
  - behavior: SQLite WAL mode concurrency
    description: WAL (Write-Ahead Logging) allows concurrent reads during writes. busy_timeout prevents
      'database is locked' errors in multi-threaded bot environment.
    evidence: src/storage.py:734(_install_sqlite_pragma_handler)
  - behavior: Breakpoint continuation
    description: has_today_data checks if today's data already exists in DB before fetching from network.
      Reduces redundant API calls and rate-limit pressure.
    evidence: src/storage.py:858(has_today_data)
  - behavior: Idempotent upsert
    description: Duplicate date in same batch uses last record. Re-running analysis doesn't create duplicates.
      Enables safe re-analysis.
    evidence: src/storage.py:1419(save_daily_data)
  - behavior: Fire-and-forget logging
    description: record_llm_usage never raises. Token usage tracking wrapped in try/except with logging
      only on failure. Never blocks main analysis path.
    evidence: src/storage.py:2028(record_llm_usage)
  replaceable_points:
  - name: Database backend
    description: SQLAlchemy connection URL
    options:
    - name: SQLite (default)
      traits:
      - File-based
      - No server required
      - WAL mode
      fit_for:
      - Single-instance deployments
      - Development
      not_fit_for:
      - Multi-instance production
      - High concurrency
    - name: PostgreSQL
      traits:
      - ACID compliant
      - High concurrency
      - Server-based
      fit_for:
      - Production multi-instance deployments
      not_fit_for:
      - Simple single-user setups
    - name: MySQL
      traits:
      - Widely used
      - High availability options
      fit_for:
      - Existing MySQL infrastructure
      not_fit_for:
      - New projects without existing MySQL
    default: SQLite
  design_decisions:
  - SQLite WAL mode + busy_timeout enables concurrent reader/writer safety (src/storage.py:734)
  acceptance_hints:
  - 'WAL mode active: PRAGMA journal_mode returns ''wal'''
  - has_today_data returns True when today's bars exist
  - Upsert creates exactly one record per (code, date) pair
  - record_llm_usage never raises even on database errors
  - Concurrent reads succeed during active writes
data_flow:
- from_stage: data_collection
  to_stage: technical_analysis
  data: pd.DataFrame with OHLCV columns plus ma5/ma10/ma20/volume_ratio computed indicators
- from_stage: data_collection
  to_stage: multi_agent_pipeline
  data: realtime_quote, daily_history, chip_distribution via data_tools; cached in ctx.data
- from_stage: technical_analysis
  to_stage: multi_agent_pipeline
  data: TrendAnalysisResult stored in ctx.data['trend_result']; read by TechnicalAgent post_process
- from_stage: multi_agent_pipeline
  to_stage: skill_system
  data: AgentContext with regime hints; SkillRouter returns selected skill_ids
- from_stage: skill_system
  to_stage: multi_agent_pipeline
  data: SkillAgent opinions → SkillAggregator consensus → ctx.opinions for DecisionAgent
- from_stage: bot_messaging
  to_stage: multi_agent_pipeline
  data: BotMessage with stock_code/skill_id; CommandDispatcher invokes AgentOrchestrator.run
- from_stage: multi_agent_pipeline
  to_stage: notification_dispatch
  data: AgentResult.dashboard with signal/operation_advice; passed to report generator
- from_stage: storage_persistence
  to_stage: multi_agent_pipeline
  data: get_analysis_context returns DB-cached daily bars plus last analysis result
- from_stage: storage_persistence
  to_stage: portfolio_management
  data: PortfolioTrade/CashLedger/CorporateAction events for snapshot replay
- from_stage: portfolio_management
  to_stage: notification_dispatch
  data: PortfolioSnapshot plus PortfolioRiskReport for position-aware analysis
- from_stage: backtest_evaluation
  to_stage: skill_system
  data: BacktestSummary per skill → SkillAggregator weight computation (currently returns 1.0)
- from_stage: backtest_evaluation
  to_stage: storage_persistence
  data: BacktestResult rows persisted; BacktestSummary aggregates for queries
