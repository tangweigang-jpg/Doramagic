business_decisions:
- id: BD-001
  type: B/BA
  content: Bias threshold 5% for no-chase policy (严进策略 - 不追高，乖离率 > 5% 不买入)
  rationale: The 5% bias threshold enforces a strict no-chase discipline to prevent buying stocks at extreme
    overbought levels. This boundary prevents emotional FOMO-driven entries and reduces risk exposure
    to mean-reversion losses. The threshold must remain at 5% unless comprehensive backtesting demonstrates
    a superior alternative.
  evidence: src/stock_analyzer.py:622(module)
  stage: analysis/trend
  alternative_considered: Flexible threshold based on volatility was considered but rejected due to complexity
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/stock_analyzer.py'
- id: BD-002
  type: B/RC
  content: MA5 > MA10 > MA20 bull alignment required for uptrend trading (趋势交易 - MA5>MA10>MA20 多头排列)
  rationale: The ascending MA alignment (5>10>20) confirms a sustained uptrend where shorter-term momentum
    outpaces longer-term averages. This boundary ensures trades only execute when multiple timeframes
    confirm bullish structure, filtering false breakouts. Changing this to fewer MAs would reduce signal
    reliability.
  evidence: src/stock_analyzer.py:339(_analyze_trend)
  stage: analysis/trend
  alternative_considered: Using only 2 MAs was considered but rejected due to insufficient confirmation
- id: BD-003
  type: B
  content: Volume ratio uses shift(1) for data alignment (避免 look-ahead bias)
  rationale: Using shift(1) ensures volume ratio calculation uses only historical data available at decision
    time, preventing look-ahead bias that would inflate backtested performance. The boundary mandates
    shift(1) specifically - using shift(0) would introduce severe survivorship bias and make historical
    results unreliable for live trading.
  evidence: data_provider/base.py:447(module)
  stage: data/calculation
  alternative_considered: shift(2) was considered but would lose too much data freshness
  _evidence_issues:
  - 'FN_NOT_FOUND: module in data_provider/base.py'
- id: BD-004
  type: B/DK
  content: Decision type enum is buy/hold/sell (must remain these 3 values)
  rationale: The three-value decision taxonomy (buy/hold/sell) provides clear, unambiguous trading signals
    that downstream systems can interpret without additional context. This boundary prevents scope creep
    by requiring any new decision types to be explicitly designed and documented. Modifying this enum
    would require cascading changes across notification, portfolio, and reporting modules.
  evidence: src/analyzer.py:915(decision_type must remain buy|hold|sell)
  stage: analysis/decision
  alternative_considered: Adding 'reduce' or 'add' states was considered but rejected to maintain simplicity
  _evidence_issues:
  - 'INVALID_IDENTIFIER: decision_type must remain buy|hold|sell in src/analyzer.py'
- id: BD-005
  type: B/RC
  content: Random sleep 1-3 seconds for anti-ban (防封禁策略)
  rationale: Random delays between 1-3 seconds prevent triggering anti-scraping mechanisms from data providers
    like Tushare or Efinance. This boundary creates unpredictability that mimics human behavior while
    staying within acceptable latency. Increasing the range would degrade user experience; decreasing
    it risks IP bans that would halt data collection entirely.
  evidence: data_provider/base.py:457-467(random_sleep)
  stage: data/fetch
  alternative_considered: Exponential backoff was considered but adds too much latency for real-time queries
- id: BD-006
  type: B/DK
  content: 'Data fetcher priority: Tushare > Efinance > Akshare > Pytdx > Baostock > Yfinance > Longbridge'
  rationale: The prioritized fallback chain ensures data availability even when primary providers experience
    outages or rate limiting. Each provider has different coverage strengths (Tushare for A-shares, Yfinance
    for US stocks). This boundary mandates the exact order - changing priorities without testing would
    risk using inferior data sources as primary.
  evidence: data_provider/__init__.py:12-28(module)
  stage: data/source
  alternative_considered: Parallel fetching was considered but rejected due to API cost and complexity
  _evidence_issues:
  - 'FN_NOT_FOUND: module in data_provider/__init__.py'
- id: BD-007
  type: B/BA
  content: 'Orchestrator modes: quick (Technical→Decision), standard (Technical→Intel→Decision), full
    (+Risk), specialist (+Specialist)'
  rationale: Four distinct modes allow users to balance analysis depth against execution speed based on
    their needs. Quick mode provides fast technical signals; full mode adds risk assessment for conservative
    strategies. This boundary prevents feature creep by requiring any new analysis stages to be optional
    modes, not mandatory additions.
  evidence: src/agent/orchestrator.py:52-53(VALID_MODES)
  stage: agent/pipeline
  alternative_considered: Single mode with each features was rejected due to latency concerns
  _evidence_issues:
  - 'FN_NOT_FOUND: VALID_MODES in src/agent/orchestrator.py'
- id: BD-008
  type: B
  content: Skills loaded from YAML files with natural language instructions
  rationale: YAML-based skill definitions enable non-developers to modify agent behavior through natural
    language prompts without code changes. This boundary ensures skills are version-controlled and testable.
    Changing to runtime database storage would lose audit trail and make rollbacks difficult.
  evidence: src/agent/skills/base.py:140-202(load_skill_from_yaml)
  stage: agent/skill
  alternative_considered: Database storage was rejected due to lack of version control
- id: BD-009
  type: B
  content: 'Multi-channel notification: Wechat, Feishu, Telegram, Email, Pushover, PushPlus, ServerChan,
    Discord, Slack, Astrbot'
  rationale: Supporting 10 notification channels ensures users receive alerts through their preferred
    platforms regardless of geographic location or company policy restrictions. This boundary prevents
    vendor lock-in where users would be forced to use a single channel. New channels can be added by implementing
    the NotificationChannel interface.
  evidence: src/notification.py:54-67(NotificationChannel enum)
  stage: notification/channel
  alternative_considered: Single-channel approach was rejected due to user diversity across regions
  _evidence_issues:
  - 'INVALID_IDENTIFIER: NotificationChannel enum in src/notification.py'
- id: BD-010
  type: B/RC
  content: 'Rate limiter: 10 requests per 60 seconds per user'
  rationale: The 10 req/60s rate limit prevents individual users from overwhelming system resources while
    allowing legitimate concurrent usage. This boundary protects service stability - exceeding 10 requests
    risks denial of service for other users; stricter limits would unnecessarily block valid rapid queries.
  evidence: bot/dispatcher.py:24(ratelimiter)
  stage: bot/rate_limit
  alternative_considered: IP-based limiting was considered but rejected due to shared corporate IPs
  _evidence_issues:
  - 'FN_NOT_FOUND: ratelimiter in bot/dispatcher.py'
- id: BD-011
  type: B/RC
  content: 'CORS allowed origins: localhost:5173, localhost:3000, plus CORS_ORIGINS env var'
  rationale: Restricting CORS to localhost dev ports plus environment variable prevents unauthorized cross-site
    requests while enabling development flexibility. This boundary is critical for security - adding domains
    requires explicit env var configuration to prevent accidental exposure. Production deployments must
    set CORS_ORIGINS appropriately.
  evidence: api/app.py:82-98(allowed_origins配置)
  stage: api/cors
  alternative_considered: Wildcard CORS was rejected due to security implications
  _evidence_issues:
  - 'FN_NOT_FOUND: allowed_origins配置 in api/app.py'
  vague_rationale: true
- id: BD-012
  type: B/DK
  content: 'Market strategy blueprints: CN (趋势结构/资金情绪/主线板块), US (Trend Regime/Macro & Flows/Sector Themes)'
  rationale: Distinct blueprints for Chinese and US markets reflect fundamentally different market structures,
    regulatory environments, and investor behaviors. This boundary ensures analysis adapts to regional
    context - applying CN metrics to US stocks would produce meaningless signals and vice versa.
  evidence: src/core/market_strategy.py:54-130(CN_BLUEPRINT/US_BLUEPRINT)
  stage: market/strategy
  alternative_considered: Unified global strategy was rejected due to market structural differences
  _evidence_issues:
  - 'INVALID_IDENTIFIER: CN_BLUEPRINT/US_BLUEPRINT in src/core/market_strategy.py'
- id: BD-013
  type: B
  content: 'Portfolio side: buy/sell literal type'
  rationale: Strict literal typing for side prevents invalid trade directions from entering the system,
    providing compile-time safety. This boundary ensures only valid directions (buy/sell) exist - adding
    'short' or 'cover' without corresponding margin trading infrastructure would cause runtime errors.
  evidence: 'api/v1/schemas/portfolio.py:49(side: Literal[buy, sell])'
  stage: portfolio/trade
  alternative_considered: String type was rejected due to lack of type safety
  _evidence_issues:
  - 'INVALID_IDENTIFIER: side: Literal[buy, sell] in api/v1/schemas/portfolio.py'
- id: BD-014
  type: B
  content: 'MACD parameters: fast=12, slow=26, signal=9 (standard)'
  rationale: The 12/26/9 MACD parameters are the established standard (developed by Gerald Appel) that
    balances sensitivity with noise reduction. This boundary ensures consistent interpretation across
    the industry. Deviating requires backtested justification as non-standard parameters may produce signals
    that are difficult to interpret or explain to users.
  evidence: src/stock_analyzer.py:189-192(MACD_FAST/SLOW/SIGNAL)
  stage: analysis/indicator
  alternative_considered: Adaptive parameters based on volatility were considered but add complexity
  _evidence_issues:
  - 'INVALID_IDENTIFIER: MACD_FAST/SLOW/SIGNAL in src/stock_analyzer.py'
- id: BD-015
  type: B/BA
  content: 'RSI parameters: short=6, mid=12, long=24; overbought=70, oversold=30'
  rationale: Three RSI periods provide layered momentum analysis from short-term (6) to long-term (24),
    while 70/30 thresholds are the established overbought/oversold boundaries. This boundary balances
    sensitivity - shorter periods generate more signals but with lower reliability; the 30/70 thresholds
    are tested against random entry baselines.
  evidence: src/stock_analyzer.py:194-199(RSI_SHORT/MID/LONG/OVERBOUGHT/OVERSOLD)
  stage: analysis/indicator
  alternative_considered: 80/20 thresholds were considered but are too extreme for practical use
  _evidence_issues:
  - 'INVALID_IDENTIFIER: RSI_SHORT/MID/LONG/OVERBOUGHT/OVERSOLD in src/stock_analyzer.py'
- id: BD-016
  type: B
  content: 'Signal scoring: 100-point system (trend 30, bias 20, volume 15, support 10, MACD 15, RSI 10)'
  rationale: The 100-point system standardizes signal evaluation across diverse technical factors with
    weighted contributions reflecting predictive importance. Trend (30) and bias (20) dominate as primary
    drivers; indicators (MACD, RSI) contribute supporting evidence. This boundary ensures reproducible
    scores - modifying weights requires comprehensive backtesting to maintain edge.
  evidence: src/stock_analyzer.py:583-744(_generate_signal)
  stage: analysis/scoring
  alternative_considered: Equal weighting was rejected due to different predictive values of factors
- id: BD-017
  type: B/BA
  content: 'Volume thresholds: shrink <=0.7, heavy >=1.5 (vs 5-day average)'
  rationale: The 0.7/1.5 thresholds relative to 5-day average identify significant volume anomalies while
    filtering normal daily fluctuations. Shrinkage below 0.7 suggests distribution; heaviness above 1.5
    indicates accumulation or distribution. This boundary was calibrated against historical price movements
    - tighter thresholds would generate excessive noise.
  evidence: src/stock_analyzer.py:409(_analyze_volume)
  stage: analysis/volume
  alternative_considered: 2.0 heavy threshold was considered but would miss legitimate accumulation
- id: BD-018
  type: B/BA
  content: 'MA support tolerance: 2% (price within 2% of MA considered support)'
  rationale: The 2% tolerance accounts for price noise and bid-ask spreads when determining if price has
    touched a moving average support. This boundary prevents false negatives from minor price gaps while
    avoiding false positives from coincidental proximity. Wider tolerance would blur distinct support
    levels; narrower would miss valid touches.
  evidence: src/stock_analyzer.py:447(_analyze_support_resistance)
  stage: analysis/support
  alternative_considered: 1% tolerance was considered but produces excessive false breakouts
- id: BD-019
  type: B/BA
  content: 'LLM temperature default: 0.7'
  rationale: Temperature 0.7 balances creativity with coherence in LLM-generated analysis - lower values
    (0.1-0.3) produce too deterministic output; higher values (0.9+) generate irrelevant tangents. This
    boundary is calibrated for financial analysis where factual grounding matters more than novelty.
  evidence: 'src/config.py:451(llm_temperature: float = 0.7)'
  stage: llm/config
  alternative_considered: Temperature 0.3 was considered but produces too repetitive output
  _evidence_issues:
