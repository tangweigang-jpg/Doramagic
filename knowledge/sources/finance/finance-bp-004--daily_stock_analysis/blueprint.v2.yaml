# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-004
name: 股票智能分析系统 (AI Stock Analysis System)
sop_version: '3.6'
source:
  projects:
  - daily_stock_analysis
  commit_hash: 706879fd327285564b34c79a37a2ce15c2f5bf28
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Multi-agent stock analysis with automated reporting
  description: An AI-powered stock analysis system that collects market data from multiple providers with
    failover, performs technical analysis with MA/MACD/RSI indicators, coordinates LLM agents in a ReAct
    pipeline for investment decision-making, and delivers structured analysis reports via multiple notification
    channels.
  prerequisites: Python 3.10+, LLM API keys (OpenAI/Gemini/DeepSeek/Anthropic), data source credentials
    (Tushare/Akshare/Efinance), chat platform webhooks (Feishu/Discord/Telegram)
  not_suitable_for: Real-time trading execution, high-frequency trading strategies, markets without data
    provider coverage, users without LLM API access
  activation:
    triggers:
    - 用户要求分析特定股票时 → analyze_stock
    - 用户要求一次分析多只股票时 → analyze_stocks
    - 用户要求市场概览、摘要或复盘时 → perform_market_review
    - 任务明确是 issue 分析时 → analyze_issue
    - 任务明确是 PR 审查时 → analyze_pr
    - 任务明确是 issue 修复时 → fix_issue
    - 一般开发任务 → default_development_workflow
    emphasis:
    - 当任务涉及配置语义、API/Schema、数据源 fallback、报告结构、认证、调度、发布流程、桌面端启动链路时，务必先做风险评估
    - 当修复涉及用户可见行为变更时，必须同步更新 CHANGELOG.md 和相关文档
    - 当修改数据源 fallback 逻辑时，关注数据源优先级、失败降级、字段标准化、缓存与超时策略
    anti_skip:
    - 不要跳过代码阅读阶段直接修改 — 可能破坏现有逻辑或重复已有实现
    - 不要跳过验证矩阵检查 — 可能遗漏关键回归风险
    - 不要跳过 issue 分析直接修复 — 可能修复非真实问题或超出仓库边界的问题
    - 不要跳过 PR 模板完整性检查 — 合入阻断条件之一是 PR 描述与实际改动内容实质性矛盾
stages:
- id: data_collection
  name: Data Collection & Normalization
  order: 1
  responsibility: Fetches stock data from multiple providers with failover, normalizes to standard OHLCV
    format, and computes technical indicators. Encapsulates anti-blocking jitter and rate limiting. Exists
    because different markets require different data sources and free APIs have rate limits and blocking
    risks.
  interface:
    inputs: stock_code (str), date_range (start_date, end_date)
    outputs: 'pd.DataFrame with columns: date, open, high, low, close, volume, amount, pct_chg, ma5, ma10,
      ma20, volume_ratio'
  required_methods:
  - name: DataFetcherManager.fetch_data
    description: Orchestrates data fetching from multiple providers with priority-based failover. Returns
      normalized OHLCV DataFrame with computed indicators.
    evidence: data_provider/base.py:470(DataFetcherManager)
  - name: BaseFetcher.fetch
    description: Abstract interface for each fetchers; each subclass implements provider-specific fetching
      and normalization.
    evidence: data_provider/base.py:239(BaseFetcher)
  key_behaviors:
  - behavior: Provider priority-based failover
    description: When primary fetcher fails or returns empty data, system automatically falls back to
      next priority fetcher. EfinanceFetcher (priority-0) is preferred when available, falling back to
      AkshareFetcher (priority-1), then TushareFetcher (priority-2 when token configured).
    evidence: data_provider/base.py:843(_init_default_fetchers)
  - behavior: Thread-safe singleton manager
    description: Shared DataFetcherManager across async tasks uses per-fetcher RLock to prevent concurrent
      modification of fetcher list or stock name cache.
    evidence: data_provider/base.py:492(_fetchers_lock)
  - behavior: Technical indicator computation
    description: Computes ma5, ma10, ma20 moving averages and volume_ratio (current volume vs 5-day average
      using shift(1) to exclude current day from denominator).
    evidence: data_provider/base.py:447(volume_ratio)
  - behavior: Anti-blocking jitter
    description: Random 1.5-5s sleep before each request to evade anti-bot detection on Chinese finance
      sites. Uses uniform random delays to appear human.
    evidence: data_provider/base.py:458(random_sleep)
  replaceable_points:
  - name: Data fetcher
    description: BaseFetcher subclass implementing _fetch_raw_data and _normalize_data contract
    options:
    - name: EfinanceFetcher
      traits:
      - Priority-0 preferred
      - Clean API
      - ETF/realtime support
      fit_for:
      - A-share, HK, US stocks with reliable access
      not_fit_for:
      - When efinance service is down
    - name: AkshareFetcher
      traits:
      - Priority-1 fallback
      - Wide A-share coverage
      - 2-5s jitter
      fit_for:
      - A-share data when efinance fails
      not_fit_for:
      - High-frequency requests due to blocking risk
    - name: TushareFetcher
      traits:
      - Priority-2 paid option
      - SLA-backed reliability
      fit_for:
      - Production use requiring SLAs
      not_fit_for:
      - Free tier users without token
    - name: BaostockFetcher
      traits:
      - Free Chinese stock data
      fit_for:
      - Budget-constrained A-share analysis
      not_fit_for:
      - Non-Chinese markets
    - name: YfinanceFetcher
      traits:
      - US/international stocks
      fit_for:
      - Yahoo-accessible markets
      not_fit_for:
      - Chinese A-shares
    default: EfinanceFetcher + AkshareFetcher fallback chain
  design_decisions:
  - Strategy pattern for multi-source failover — Allows runtime substitution of data sources without client
    code changes; each fetcher implements a common interface (data_provider/base.py:470)
  acceptance_hints:
  - 'Fetched DataFrame has exactly the specified columns: date, open, high, low, close, volume, amount,
    pct_chg, ma5, ma10, ma20, volume_ratio'
  - Moving averages (ma5, ma10, ma20) are monotonically decreasing with period (ma5 > ma10 > ma20 for
    sufficient data)
  - volume_ratio calculation uses shift(1) — current day excluded from 5-day average denominator
  - 'Stock codes normalized: 6-digit for A-share, 5-digit with HK prefix for HK, uppercase for US'
  - Failsafe returns empty DataFrame on each provider failures (no exception propagation)
- id: technical_analysis
  name: Technical Trend Analysis
  order: 2
  responsibility: 'Computes MA, MACD, RSI, bias, volume patterns, and support/resistance to generate trend
    signals. Implements user trading philosophy: 严进策略 (no chasing elevated prices), MA5>MA10>MA20 alignment,
    pullback buying. Exists to provide objective technical foundation before LLM reasoning.'
  interface:
    inputs: pd.DataFrame (OHLCV), stock_code (str)
    outputs: TrendAnalysisResult dataclass with signal, confidence, trend_status, bias values, volume_status,
      support_levels
  required_methods:
  - name: StockTrendAnalyzer.analyze
    description: Core analysis method that orchestrates MA/MACD/RSI/bias/volume computation and returns
      TrendAnalysisResult with each computed indicators and signals.
    evidence: src/stock_analyzer.py:171(StockTrendAnalyzer)
  key_behaviors:
  - behavior: 严进策略 (no-chase) enforcement
    description: Hardcoded 5% bias threshold rejects entries where close is >5% above MA5. Implemented
      in _calculate_bias, this business rule prevents chasing elevated prices.
    evidence: src/stock_analyzer.py:392(_calculate_bias)
  - behavior: Support level detection
    description: MA5/MA10 support tolerance of ±2% defines 回踩买点 (pullback entry point). Flagged when price
      retests MA5 or MA10 within this band.
    evidence: src/stock_analyzer.py:447(_analyze_support_resistance)
  - behavior: Standard MACD parameters
    description: 'Uses industry-standard span=12/26/9: DIF=EMA(12)-EMA(26), DEA=EMA(DIF,9) for trend momentum
      analysis.'
    evidence: src/stock_analyzer.py:290(MACD_FAST=12,MACD_SLOW=26,MACD_SIGNAL=9)
  - behavior: RSI neutral fallback
    description: RSI fillna(50) returns neutral value when insufficient data for calculation, preventing
      NaN propagation to downstream consumers.
    evidence: src/stock_analyzer.py:331(rsi.fillna(50))
  replaceable_points:
  - name: Analysis algorithm
    description: StockTrendAnalyzer.analyze() method implementation
    options:
    - name: StockTrendAnalyzer (MA-based)
      traits:
      - MA/MACD/RSI/bias/volume
      - 5% bias threshold
      - 2% support tolerance
      fit_for:
      - Default technical analysis workflow
      not_fit_for:
      - Custom indicator requirements
    - name: Alternative technical library
      traits:
      - External library integration
      fit_for:
      - Users with different technical analysis needs
      not_fit_for:
      - Requires custom integration code
    default: StockTrendAnalyzer
  design_decisions:
  - Bias threshold hardcoded at 5% enforces 严进策略 — rejects entries where close is >5% above MA5 (src/stock_analyzer.py:392)
  acceptance_hints:
  - 'TrendAnalysisResult.signal is one of: strong_buy, buy, hold, sell, strong_sell'
  - 'TrendAnalysisResult.trend_status reflects MA alignment (bull: MA5>MA10>MA20)'
  - bias values correctly computed as percentage deviation from MA5
  - support_levels list contains valid price levels within ±2% of MA5/MA10
  - RSI neutral fallback (50) only used when insufficient data for calculation
- id: multi_agent_pipeline
  name: Multi-Agent Pipeline (ReAct + LLM)
  order: 3
  responsibility: Coordinates specialized LLM agents (Technical→Intel→Risk→Decision) in a sequential pipeline.
    Each agent uses ReAct tool-calling loop via shared runner. Produces structured dashboard or free-text
    response. Exists to combine multiple analytical perspectives before final decision.
  interface:
    inputs: task (str), context (dict with stock_code/skills/report_language)
    outputs: AgentResult with content, dashboard JSON, tool_calls_log, stats
  required_methods:
  - name: AgentOrchestrator.run
    description: Pipeline coordinator that builds agent chain by mode, manages stage timeout, applies
      risk override, and returns AgentResult with dashboard and reasoning.
    evidence: src/agent/orchestrator.py:72(AgentOrchestrator)
  - name: run_agent_loop
    description: Shared ReAct loop implementation used by each agents; handles tool-calling, timeout semantics,
      and response processing.
    evidence: src/agent/runner.py:331(run_agent_loop)
  key_behaviors:
  - behavior: Pipeline mode-controlled agent chain
    description: quick=2 stages (Technical+Decision), standard=3 (adds Intel), full=4 (adds Risk), specialist=dynamic
      skill-router-selected. Allows trading latency for depth.
    evidence: src/agent/orchestrator.py:485(_build_agent_chain)
  - behavior: Risk agent veto authority
    description: Risk agent's veto is the last word after each opinions collected. Downgrades signal level
      and sentiment score to reflect risk events. Veto is idempotent.
    evidence: src/agent/orchestrator.py:405(_apply_risk_override)
  - behavior: Tool caching with normalized keys
    description: Cache key normalizes HK variants (HK00700 vs 00700) to same key. Avoids duplicate API
      calls across LLM steps in multi-step reasoning loops.
    evidence: src/agent/runner.py:132(_build_tool_cache_key)
  - behavior: LiteLLM multi-provider abstraction
    description: LiteLLM Router handles model routing, key rotation, fallback chains. Single interface
      supports Gemini/Anthropic/OpenAI/DeepSeek without per-provider SDK code.
    evidence: src/agent/llm_adapter.py:172(_init_litellm)
  - behavior: Graceful degradation on failure
    description: Intel or Risk stage failure continues pipeline with partial data. Technical or Decision
      failure aborts complete pipeline.
    evidence: src/agent/orchestrator.py:409(StageStatus.FAILED check)
  replaceable_points:
  - name: LLM provider
    description: LiteLLM model routing configuration
    options:
    - name: Gemini
      traits:
      - Google's multimodal model
      - High context limit
      fit_for:
      - Complex analysis with long context
      not_fit_for:
      - Users without Google API key
    - name: Anthropic
      traits:
      - Claude models
      - Strong reasoning
      fit_for:
      - High-quality reasoning tasks
      not_fit_for:
      - Budget-constrained users
    - name: OpenAI
      traits:
      - GPT-4/3.5 models
      - Wide ecosystem
      fit_for:
      - General purpose analysis
      not_fit_for:
      - Some regions have access restrictions
    - name: DeepSeek
      traits:
      - Cost-effective Chinese model
      - Good Chinese text understanding
      fit_for:
      - Budget-conscious users analyzing Chinese stocks
      not_fit_for:
      - Non-Chinese market analysis
    default: Configured via LLM_CHANNELS/LITELLM_MODEL environment variables
  - name: Agent chain
    description: Ordered agent list for pipeline mode
    options:
    - name: quick (Technical→Decision)
      traits:
      - Low latency
      - 2 stages only
      fit_for:
      - Quick checks when speed matters
      not_fit_for:
      - Comprehensive analysis
    - name: standard (Technical→Intel→Decision)
      traits:
      - Includes news intelligence
      - Balanced depth
      fit_for:
      - Default daily analysis
      not_fit_for:
      - When risk assessment needed
    - name: full (Technical→Intel→Risk→Decision)
      traits:
      - Full pipeline with risk veto
      - Highest latency
      fit_for:
      - Production trading decisions
      not_fit_for:
      - Quick screening
    - name: specialist (dynamic skill agents)
      traits:
      - Market-regime-adaptive skills
      - Router-selected
      fit_for:
      - Adaptive strategy selection
      not_fit_for:
      - Fixed strategy requirements
    default: standard
  design_decisions:
  - Shared run_agent_loop — single ReAct implementation eliminates per-agent duplication (src/agent/runner.py:331)
  - LiteLLM Router for multi-provider LLM routing abstracts away provider differences (src/agent/llm_adapter.py:172)
  acceptance_hints:
  - AgentResult.dashboard contains signal, operation_advice (buy/hold/sell), and price targets
  - 'Pipeline respects agent execution order: Technical before Intel before Risk before Decision'
  - Risk override successfully downgrades signal when risk conditions met
  - Tool cache prevents duplicate data fetches within same analysis session
  - Timeout handling returns partial results rather than hanging indefinitely
- id: skill_system
  name: Trading Skill System
  order: 4
  responsibility: Pluggable natural-language trading patterns (YAML-defined) injected into agent prompts.
    Skills are loaded from built-in directory or user directory, selected by router based on market regime,
    and aggregated into consensus opinions. Exists to allow non-programmers to add custom trading strategies.
  interface:
    inputs: AgentContext with stock data and regime hints
    outputs: Skill list with instructions for agent prompts; consensus AgentOpinion from aggregator
  required_methods:
  - name: SkillManager.get_skill_instructions
    description: Loads and manages Skill registry; generates combined instruction text for agent prompts
      from selected skills.
    evidence: src/agent/skills/base.py:315(SkillManager)
  - name: SkillRouter.route
    description: Rule-based skill selection based on market regime and user request; returns list of skill_ids
      to activate.
    evidence: src/agent/skills/router.py:25(SkillRouter)
  - name: SkillAggregator.aggregate
    description: Weighted consensus of skill opinions using backtest accuracy weights; returns final AgentOpinion
      for DecisionAgent.
    evidence: src/agent/skills/aggregator.py:40(SkillAggregator)
  key_behaviors:
  - behavior: YAML-based skill definition
    description: Skills defined as YAML natural-language bundles with instructions injected into LLM system
      prompts. Business users can add strategies without Python code changes.
    evidence: src/agent/skills/base.py:27(Skill.instructions)
  - behavior: Backtest-driven skill weighting (dead code path)
    description: SkillAggregator._backtest_factor() returns 1.0 because BacktestService.get_skill_summary()
      always returns None. Skills currently get neutral weight.
    evidence: src/agent/skills/aggregator.py:131(_backtest_factor)
  - behavior: Lazy skill loading
    description: YAML loading deferred until SkillManager instantiation; avoids eager filesystem access
      at import time.
    evidence: src/agent/skills/base.py:344(load_builtin_skills)
  - behavior: Regime-based skill selection
    description: SkillRouter regime detection reads from 'technical' agent opinions only; Intel/Risk data
      cannot influence skill selection.
    evidence: src/agent/skills/router.py:76(_detect_regime)
  - behavior: Core policy conditional application
    description: MA5>MA10>MA20 and bias<5% baseline only applies when explicit_skill_selection=False.
      User-explicit selection silently strips bull_trend baseline controls.
    evidence: src/agent/skills/defaults.py:73(get_default_trading_skill_policy)
  replaceable_points:
  - name: Skill bundle
    description: YAML skill definition in strategies/ or custom directory
    options:
    - name: 龙头策略
      traits:
      - Leader stock strategy
      - Momentum-based
      fit_for:
      - Trending markets
      not_fit_for:
      - Sideways markets
    - name: 缩量回踩
      traits:
      - Volume pullback strategy
      - Support-based
      fit_for:
      - Pullback entry opportunities
      not_fit_for:
      - Breakout trading
    - name: 均线金叉
      traits:
      - MA golden cross
      - Trend confirmation
      fit_for:
      - Bull market entries
      not_fit_for:
      - Volatile choppy markets
    - name: 缠论
      traits:
      - Chan theory
      - Complex pattern-based
      fit_for:
      - Detailed technical analysis
      not_fit_for:
      - Quick decision-making
    - name: user-defined YAML
      traits:
      - Custom strategy
      - User-defined logic
      fit_for:
      - Unique trading approaches
      not_fit_for:
      - Production without testing
    default: Built-in strategies directory (strategies/)
  design_decisions:
  - Skills as YAML natural-language bundles — no code changes needed to add custom strategies (src/agent/skills/base.py:27)
  acceptance_hints:
  - Skill.instructions successfully loaded from YAML with frontmatter
  - SkillRouter.route() returns non-empty skill_ids for recognized regime
  - SkillAggregator.aggregate() returns AgentOpinion with consensus signal
  - user_invocable=True skills appear in NL selectors and bot commands
  - Skill defaults loaded lazily without triggering import-time filesystem errors
- id: bot_messaging
  name: Bot Messaging & Command Dispatch
  order: 5
  responsibility: Receives messages from multiple chat platforms (Feishu, DingTalk, Discord), routes commands
    via dispatcher, handles rate limiting, NL intent parsing, and async command execution. Exists to provide
    natural language interaction channel for end users.
  interface:
    inputs: BotMessage (platform-agnostic unified format)
    outputs: BotResponse (text/markdown/error) → platform-specific WebhookResponse
  required_methods:
  - name: CommandDispatcher.dispatch
    description: Command registry and routing; handles rate limiting, NL intent fallback, admin check.
      Main entry point for bot message processing.
    evidence: bot/dispatcher.py:82(CommandDispatcher)
  - name: BotCommand.execute
    description: Abstract base for each bot commands; each subclass implements stock analysis, batch processing,
      or other commands.
    evidence: bot/commands/base.py:17(BotCommand)
  key_behaviors:
  - behavior: Platform-agnostic message handling
    description: Unified BotMessage/BotResponse with platform-specific parsing/formatting isolated in
      BotPlatform adapters. Each platform (Feishu, DingTalk, Discord) has different webhook format.
    evidence: bot/platforms/base.py:71(parse_message)
  - behavior: Per-user rate limiting
    description: 'Sliding window rate limiter: 10 requests per 60s per user_id. Protects against abuse
      while allowing legitimate multi-stock queries.'
    evidence: bot/dispatcher.py:24(RateLimiter)
  - behavior: NL intent routing fallback
    description: When message is not a command, dispatcher sends to LLM for intent parsing. Enables natural
      language queries like '帮我看看茅台怎么样'.
    evidence: bot/dispatcher.py:457(_try_nl_routing)
  - behavior: Async command execution
    description: execute_async dispatches sync execute() to thread pool. Prevents blocking the bot event
      loop for long-running analysis tasks.
    evidence: bot/commands/base.py:113(execute_async)
  - behavior: Feishu per-conversation FIFO queue
    description: Messages ordered by conversation key. Ensures responses arrive in same order as user
      queries within chat thread.
    evidence: bot/platforms/feishu_stream.py:288(_conversation_key)
  replaceable_points:
  - name: Command
    description: BotCommand subclass with execute() method
    options:
    - name: AskCommand
      traits:
      - Skill-based stock analysis
      - Multi-stock support
      fit_for:
      - Natural language stock queries
      not_fit_for:
      - Batch operations
    - name: AnalyzeCommand
      traits:
      - Direct analysis trigger
      fit_for:
      - Explicit analysis requests
      not_fit_for:
      - Natural language input
    - name: BatchCommand
      traits:
      - Multiple stock analysis
      fit_for:
      - Portfolio-wide analysis
      not_fit_for:
      - Single stock queries
    - name: MarketCommand
      traits:
      - Market overview data
      fit_for:
      - Market summary requests
      not_fit_for:
      - Stock-specific analysis
    - name: StrategiesCommand
      traits:
      - Skill listing
      fit_for:
      - Viewing available strategies
      not_fit_for:
      - Analysis execution
    default: Every registered commands
  - name: Platform adapter
    description: BotPlatform subclass for chat platform integration
    options:
    - name: FeishuStreamPlatform
      traits:
      - WebSocket streaming
      - Enterprise chat
      fit_for:
      - Enterprise team collaboration
      not_fit_for:
      - Public community servers
    - name: DingtalkPlatform
      traits:
      - Alibaba ecosystem
      - Enterprise
      fit_for:
      - Chinese enterprise users
      not_fit_for:
      - International teams
    - name: DiscordPlatform
      traits:
      - Community servers
      - Public channels
      fit_for:
      - Investor communities
      not_fit_for:
      - Enterprise-only deployments
    default: Configured platform via environment variables
  design_decisions:
  - Unified BotMessage/BotResponse — platform-specific parsing/formatting isolated in BotPlatform (bot/platforms/base.py:71)
  acceptance_hints:
  - BotCommand.execute() returns BotResponse with text/markdown content
  - RateLimiter correctly enforces 10 req/60s per user
  - NL routing via LLM triggered only for non-command messages
  - Async execution prevents bot event loop blocking
  - Platform-specific formatting produces valid webhook payloads
- id: portfolio_management
  name: Portfolio Management & Risk
  order: 6
  responsibility: Manages account CRUD, trade event logging, FIFO cost-basis replay, FX rate refresh,
    and portfolio-level risk reporting (concentration, drawdown, stop-loss proximity). Exists to provide
    position-aware analysis and risk monitoring.
  interface:
    inputs: PortfolioTrade, PortfolioCashLedger, PortfolioCorporateAction events
    outputs: PortfolioSnapshot (positions, cost basis, returns), PortfolioRiskReport (concentration, drawdown,
      stop-loss)
  required_methods:
  - name: PortfolioService.snapshot
    description: Account/event/snapshot workflow; implements FIFO and average cost methods. Returns PortfolioSnapshot
      with positions, cost basis, and returns.
    evidence: src/services/portfolio_service.py:73(PortfolioService)
  - name: PortfolioRiskService.generate_report
    description: 'Risk report computation: concentration, sector exposure, drawdown, stop-loss proximity.
      Returns PortfolioRiskReport with alerts.'
    evidence: src/services/portfolio_risk_service.py:14(PortfolioRiskService)
  key_behaviors:
  - behavior: FIFO lot-level cost basis
    description: First-in-first-out matching of buy/sell lots gives accurate realized P&L. Lot-level tracking
      handles partial sells correctly.
    evidence: src/services/portfolio_service.py:1031(_consume_fifo_lots)
  - behavior: Corporate actions as explicit events
    description: Stock splits and cash dividends modeled as events that update position quantity or cash.
      Price-history adjustment avoided.
    evidence: src/storage.py:466(PortfolioCorporateAction)
  - behavior: Stop-loss proximity monitoring
    description: -5% stop-loss threshold from entry price. Current market price vs. threshold generates
      risk_alert before loss materializes.
    evidence: src/services/portfolio_risk_service.py:408(_build_stop_loss)
  - behavior: FX rate stale fallback
    description: Cross-currency positions use cached FX rates. Failed yfinance refresh keeps existing
      stale rates rather than crashing.
    evidence: src/services/portfolio_service.py:1177(_refresh_account_fx_rates)
  replaceable_points:
  - name: Cost method
    description: Position cost basis calculation
    options:
    - name: fifo (lot-level first-in-first-out)
      traits:
      - Accurate realized P&L
      - Partial sell handling
      fit_for:
      - Tax reporting
      - Precise performance tracking
      not_fit_for:
      - Average cost accounting
    - name: avg (average cost)
      traits:
      - Simpler calculation
      - Common for retail
      fit_for:
      - Simple portfolio tracking
      not_fit_for:
      - Tax reporting
      - Partial sell precision
    default: fifo
  - name: FX rate source
    description: Currency conversion rate provider
    options:
    - name: yfinance (default)
      traits:
      - Free
      - Wide currency coverage
      fit_for:
      - Budget-constrained deployments
      not_fit_for:
      - Production requiring SLA-backed rates
    - name: other FX API
      traits:
      - Commercial API
      fit_for:
      - Production with SLA requirements
      not_fit_for:
      - Additional cost
    default: yfinance
  design_decisions:
  - FIFO lot-level replay for cost basis enables precise P&L per trade (src/services/portfolio_service.py:1031)
  acceptance_hints:
  - PortfolioSnapshot shows correct positions with accurate cost basis
  - FIFO consumption correctly handles partial sell of earlier lots
  - CorporateAction events update position quantity or cash correctly
  - Stop-loss alerts generated when market price within -5% of entry
  - FX refresh failure uses cached rates without crashing
- id: backtest_evaluation
  name: Backtest Evaluation Engine
  order: 7
  responsibility: Evaluates historical analyst decisions against forward price bars to compute accuracy,
    average return, win rate. Pure logic layer (DB-agnostic) operating on in-memory daily bars. Exists
    to provide feedback loop for strategy improvement.
  interface:
    inputs: operation_advice (buy/hold/sell), forward_bars (Sequence[DailyBarLike]), stop_loss, take_profit
    outputs: BacktestResult with direction_expected, outcome classification, max_return, max_drawdown,
      hold_days
  required_methods:
  - name: BacktestEngine.evaluate
    description: Long-only daily-bar evaluation; classify_outcome from direction matching. Takes any object
      implementing DailyBarLike protocol.
    evidence: src/core/backtest_engine.py:50(BacktestEngine)
  - name: BacktestService.run_backtest
    description: Orchestrates backtest runs, caches results, provides summary queries for Agent memory.
    evidence: src/services/backtest_service.py:22(BacktestService)
  key_behaviors:
  - behavior: Protocol-based DailyBarLike interface
    description: Engine accepts any object with date/open/high/low/close/volume. SQLAlchemy rows, dicts,
      dataclasses each satisfy the protocol. Enables testing without database.
    evidence: src/core/backtest_engine.py:18(DailyBarLike)
  - behavior: Direction-matching outcome classification
    description: Buy advice → price up = success; sell advice → price down = success; neutral band ±2%
      = neutral. Isolates analyst skill from market conditions.
    evidence: src/core/backtest_engine.py:383(_classify_outcome)
  - behavior: Hold advice interpretation
    description: '''hold'' maps to ''not_down'' direction: win if price >= entry, loss if <= -2%. Flat/stagnant
      stock still counts as win.'
    evidence: src/core/backtest_engine.py:101(infer_direction_expected)
  - behavior: Skill performance feedback loop
    description: 'Closed-loop learning: backtest results feed SkillAggregator weight computation. Better
      historical accuracy → higher weight in future consensus (currently dead code).'
    evidence: src/agent/skills/aggregator.py:131(_backtest_factor)
  replaceable_points:
