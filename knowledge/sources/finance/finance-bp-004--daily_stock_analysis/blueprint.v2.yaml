  alternative_considered: PostgreSQL migration was considered but rejected for deployment complexity
- id: BD-GAP-010
  type: B
  content: Atomic refresh of position cache and daily snapshot in single transaction
  rationale: Prevents snapshot/position divergence on crash mid-refresh; breaks when transaction exceeds
    SQLite write lock timeout on large portfolios.
  evidence: src/repositories/portfolio_repo.py:972(replace_positions_lots_and_snapshot)
  stage: storage_persistence
  alternative_considered: Two-phase refresh was rejected for higher complexity
- id: BD-GAP-011
  type: B
  content: Analysis task queue uses singleton pattern with max 3 concurrent workers
  rationale: 3 workers balances throughput against LLM API rate limits and memory usage; breaks when 3+
    long-running analyses queue up and users experience >9s average wait.
  evidence: src/services/task_queue.py:148(__init__)
  stage: orchestration
  alternative_considered: Unlimited workers was rejected for API quota exhaustion risk
- id: BD-GAP-012
  type: B
  content: SSE task progress clamped to [0, 99] so terminal states remain controlled by completion/failure
    handlers
  rationale: Prevents clients from receiving progress=100 before server signals completion, avoiding race
    conditions; breaks when legitimate progress calculation produces 100 before actual completion.
  evidence: src/services/task_queue.py:490(update_task_progress)
  stage: transport
  alternative_considered: Separate completion event with 100 was considered but rejected
- id: BD-GAP-013
  type: B/DK
  content: 'Name-to-code resolution sequence: code-like check → local STOCK_NAME_MAP → AkShare fetch'
  rationale: Fast path for direct codes avoids unnecessary lookups; AkShare fetch is expensive so it runs
    last; breaks when AkShare is down and user provides a name not in local map.
  evidence: src/services/name_to_code_resolver.py:138(resolve_name_to_code)
  stage: lookup
  alternative_considered: Caching AkShare results indefinitely was rejected for stale data risk
- id: BD-GAP-014
  type: B/BA
  content: Ambiguous stock names mapping to multiple codes are excluded from reverse name→code index
  rationale: Prevents silent misrouting when multiple stocks share the same name; breaks when the disambiguation
    heuristic is too aggressive and removes valid unique names.
  evidence: src/services/name_to_code_resolver.py:42(_build_reverse_map_no_duplicates)
  stage: lookup
  alternative_considered: Returning each matches was rejected for misrouting risk
- id: BD-GAP-015
  type: B/BA
  content: Usage date range calculated in Beijing time (UTC+8) regardless of server timezone
  rationale: Chinese market users expect China-local date boundaries; breaks when users in other timezones
    query 'today' and see misaligned date ranges.
  evidence: api/v1/endpoints/usage.py:24(_date_range)
  stage: calculation
  alternative_considered: Server-local timezone was rejected for inconsistent China market reporting
- id: BD-GAP-016
  type: B/DK
  content: 'Stock code normalization rules differ by market: A-shares/HK 5-6 digits, US 1-5 letters'
  rationale: Different markets use fundamentally different code formats; enforcing strict patterns prevents
    cross-market collision; breaks when new markets use non-standard formats.
  evidence: src/services/image_stock_extractor.py:91(_normalize_code)
  stage: validation
  alternative_considered: Relaxed validation was rejected for cross-market collision risk
- id: BD-GAP-017
  type: B/DK
  content: Backtest evaluation window capped at 1-120 days, balancing signal relevance against data availability
  rationale: 120-day cap prevents overly stale backtests; 1-day minimum enables same-day evaluation; breaks
    when historical data is <120 days old for a given stock.
  evidence: api/v1/endpoints/backtest.py:85(get_backtest_results)
  stage: calculation
  alternative_considered: No cap was rejected for memory and staleness concerns
- id: BD-GAP-018
  type: B
  content: History record_id accepts both integer primary key and query_id string, with PK tried first
  rationale: Flexibility for frontend that may hold either identifier; PK-first is faster and more precise;
    breaks when legacy records have non-unique query_id causing wrong record returned.
  evidence: api/v1/endpoints/history.py:188(get_history_detail)
  stage: routing
  alternative_considered: Strict query_id-only was rejected for breaking existing frontend usage
- id: BD-GAP-019
  type: T
  content: System config persisted to .env file with runtime reload triggering singleton refresh
  rationale: .env is human-readable and version-controllable; runtime reload avoids restart; breaks when
    .env write fails or reload hook misses some singleton.
  evidence: src/services/system_config_service.py:497(update)
  stage: configuration
  alternative_considered: Database-backed config was rejected for added dependency
- id: BD-GAP-020
  type: B
  content: SSRF protection blocks link-local (169.254.x.x) and cloud metadata addresses while allowing
    localhost/private-LAN
  rationale: Prevents server-side request forgery to cloud metadata services; allows Ollama on 192.168.x.x
    for local AI; breaks when legitimate use cases involve 169.254.x.x endpoints.
  evidence: src/services/system_config_service.py:912(_is_safe_base_url)
  stage: security
  alternative_considered: Allow each addresses was rejected for SSRF risk
- id: BD-GAP-021
  type: B/BA
  content: LiteLLM YAML configuration takes precedence over channel-style env configuration
  rationale: LiteLLM YAML represents explicit router configuration; channel-style is legacy fallback;
    breaks when users expect channel config to override stale YAML file.
  evidence: src/services/system_config_service.py:1210(_uses_litellm_yaml)
  stage: configuration
  alternative_considered: Channel override was rejected for breaking LiteLLM users
- id: BD-GAP-022
  type: B/RC
  content: Portfolio service supports both FIFO and average cost methods for position valuation
  rationale: Different accounting preferences require different cost methods; FIFO is common for tax reporting;
    breaks when switching methods on existing positions without historical replay.
  evidence: src/services/portfolio_service.py:728(_replay_account)
  stage: calculation
  alternative_considered: FIFO-only was rejected for not supporting each accounting preferences
- id: BD-GAP-023
  type: B
  content: Import dedup hash built from symbol + trade_date + side + quantity + price to detect duplicate
    trades
  rationale: Composite key captures the essential trade identity without relying on broker trade_id; breaks
    when broker re-issues the same trade with a different trade_id after cancellation.
  evidence: src/services/portfolio_import_service.py:434(_build_dedup_hash)
  stage: import
  alternative_considered: Using broker trade_id was rejected for inconsistent broker formats
- id: BD-GAP-024
  type: B
  content: Slack sender prefers Bot API over Webhook to ensure text and images use the same transport
    channel
  rationale: Bot API supports both text and file uploads in same channel; Webhook cannot send images;
    breaks when Bot token is invalid and falls back to Webhook that cannot send images.
  evidence: src/notification_sender/slack_sender.py:39(_use_bot)
  stage: notification_dispatch
  alternative_considered: Webhook-only was rejected for lacking image support
- id: BD-GAP-025
  type: B/BA
  content: Telegram sends Markdown initially, falls back to plain text on parse error rather than pre-validating
  rationale: Telegram MarkdownV2 has subtle escape rules that are hard to predict; runtime fallback is
    simpler than pre-validation; breaks when valid content is retried as plain text and loses formatting.
  evidence: src/notification_sender/telegram_sender.py:159(_should_fallback_to_plain_text)
  stage: notification_dispatch
  alternative_considered: Pre-validation with escape rules was rejected for complexity
- id: BD-GAP-026
  type: B/RC
  content: Feishu webhook requires keyword prefix prepended to pass security validation
  rationale: Feishu custom robot webhook security requires a specific keyword in every message; enforcing
    this at sender level prevents silent failures; breaks when user changes the configured keyword without
    updating the sender.
  evidence: src/notification_sender/feishu_sender.py:44(_get_keyword_prefix)
  stage: notification_dispatch
  alternative_considered: Soft warning was rejected for silent failure risk
- id: BD-GAP-027
  type: B/BA
  content: Discord webhook signature verification using Ed25519 (X-Signature-Ed25519 header)
  rationale: Ed25519 provides authenticated request verification preventing webhook spoofing; breaks when
    clock skew exceeds Discord's signature timestamp tolerance.
  evidence: bot/platforms/discord.py:45(verify_request)
  stage: security
  alternative_considered: IP allowlist was rejected for being too rigid
- id: BD-GAP-028
  type: B/DK
  content: Portfolio risk service uses 180-day lookback for drawdown calculation snapshot window
  rationale: 180 days (~6 months) captures most meaningful drawdown periods while limiting data volume;
    breaks when historical positions extend beyond 180 days and earlier losses are excluded.
  evidence: src/services/portfolio_risk_service.py:766(list_daily_snapshots_for_risk)
  stage: calculation
  alternative_considered: Unlimited lookback was rejected for memory constraints
  _evidence_issues:
  - 'LINE_OOB: src/services/portfolio_risk_service.py:766 > 441'
- id: BD-GAP-029
  type: B/DK
  content: Task queue dedup key normalizes stock code shape (e.g., 600519 and 600519.SH treated as same)
  rationale: Users may reference stocks with or without exchange suffix; normalization prevents duplicate
    submissions; breaks when legitimate analysis of index vs individual stock with same code is needed.
  evidence: src/services/task_queue.py:35(_dedupe_stock_code_key)
  stage: deduplication
  alternative_considered: Broader dedup was rejected for user confusion
- id: BD-GAP-030
  type: B/RC
  content: System config server-side secret masking with '******' display regardless of actual value length
  rationale: Prevents accidental exposure of secrets in API responses and logs; fixed mask prevents length-based
    inference; breaks when legitimate debugging requires confirming secret presence.
  evidence: src/services/system_config_service.py:154(get_config)
  stage: security
  alternative_considered: No masking was rejected for security risk
