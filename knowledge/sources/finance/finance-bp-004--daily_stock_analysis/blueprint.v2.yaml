replaceable_slots:
- id: slot-001
  name: llm_provider
  description: 'First-time users: Gemini (free tier). Budget-sensitive: DeepSeek. China no-proxy: AIHubmix.
    Privacy/offline: Ollama. Premium quality: Claude.'
  used_in_stages: []
  options:
  - name: Gemini (Google AI Studio)
    traits:
    - free_tier
    - multilingual
    - fast
    - cloud
    fit_for:
    - Quick start with no cost; good multilingual support for Chinese stock analysis
    not_fit_for:
    - Long-context analysis beyond free quota; strict data privacy requirements
  - name: DeepSeek
    traits:
    - cost_effective
    - cloud
    - chinese_optimized
    fit_for:
    - High cost-efficiency for large analysis volumes; strong Chinese language performance
    not_fit_for:
    - Environments with export restrictions on Chinese cloud services
  - name: AIHubmix (OpenAI-compatible aggregator)
    traits:
    - aggregator
    - no_proxy_needed
    - cloud
    fit_for:
    - China-based users needing GPT/Claude without international proxy; one key for many models
    not_fit_for:
    - Users preferring direct provider APIs
  - name: Anthropic Claude
    traits:
    - premium
    - cloud
    - reasoning
    fit_for:
    - Highest quality analysis when budget allows; strong reasoning capabilities
    not_fit_for:
    - Budget-constrained deployments
  - name: OpenAI GPT
    traits:
    - cloud
    - wide_adoption
    fit_for:
    - General-purpose analysis; broad ecosystem support
    not_fit_for:
    - China users without proxy; budget-sensitive use cases
  - name: Ollama (local)
    traits:
    - local
    - offline
    - free
    - cpu_only
    fit_for:
    - Offline/air-gapped environments; privacy-sensitive data; experimentation
    not_fit_for:
    - Production requiring low latency; large model inference on CPU-only hardware
  default: Gemini (GEMINI_API_KEY)
  _source: worker_resource
- id: slot-002
  name: china_stock_data
  description: Default stack (efinance+akshare) handles most use cases. Tushare for professional backtesting.
    pytdx for intranet/low-latency. baostock for last-resort free data.
  used_in_stages: []
  options:
  - name: efinance (EastMoney)
    traits:
    - free
    - no_token
    - fast
    - a_share_focused
    fit_for:
    - Default for China A-share analysis; highest priority when available
    not_fit_for:
    - US/HK stocks; environments where EastMoney IPs are blocked
  - name: akshare (Sina/Tencent)
    traits:
    - free
    - no_token
    - realtime
    - scraping
    fit_for:
    - Fallback when efinance is down; Sina/Tencent realtime quotes
    not_fit_for:
    - High-volume automated use (rate-limiting risk); data quality-sensitive tasks
  - name: Tushare Pro
    traits:
    - structured
    - token_required
    - high_quality
    fit_for:
    - Professional-grade data; backtesting requiring clean historical data
    not_fit_for:
    - Users without sufficient Tushare credit points; real-time only use cases
  - name: pytdx (Tongdaxin servers)
    traits:
    - direct
    - no_token
    - tcp_protocol
    fit_for:
    - Low-latency realtime on local network; intranet deployments
    not_fit_for:
    - Cloud environments with firewall restrictions; public internet with NAT
  - name: baostock
    traits:
    - free
    - no_token
    - login_required
    fit_for:
    - Reliable free fallback; historical data needs
    not_fit_for:
    - Realtime requirements; environments with anti-bot measures
  default: efinance (Priority 0) with akshare fallback (Priority 1)
  _source: worker_resource
- id: slot-003
  name: us_hk_stock_data
  description: yfinance is the default US data source. longbridge adds missing HK/US fundamental fields
    (volume ratio, PE, PB) when credentials are available.
  used_in_stages: []
  options:
  - name: yfinance (Yahoo Finance)
    traits:
    - free
    - global
    - no_token
    fit_for:
    - Default for US stocks and indices; broad global coverage
    not_fit_for:
    - HK stock fundamentals (missing PE/PB/volume_ratio); China A-shares
  - name: longbridge (Longbridge OpenAPI)
    traits:
    - free
    - hk_us
    - realtime
    - pe_pb
    fit_for:
    - HK/US realtime with volume ratio, turnover rate, PE/PB fields; supplement to yfinance
    not_fit_for:
    - China A-shares; users unwilling to register for Longbridge credentials
  default: yfinance (Priority 4) with longbridge supplement (Priority 5)
  _source: worker_resource
- id: slot-004
  name: news_search
  description: Multi-engine fallback is implemented in SearchService. Set BOCHA_API_KEYS for Chinese news;
    TAVILY_API_KEYS for AI search; SERPAPI_API_KEYS for Google. Without any keys, SearXNG public instances
    are used automatically.
  used_in_stages: []
  options:
  - name: Tavily
    traits:
    - ai_optimized
    - structured
    - free_tier
    fit_for:
    - LLM-optimized search results; good balance of quality and cost
    not_fit_for:
    - High-volume usage beyond 1000 req/month free tier
  - name: SerpAPI (Google)
    traits:
    - real_google
    - knowledge_graph
    - free_tier
    fit_for:
    - Real Google search results including Knowledge Graph; financial info
    not_fit_for:
    - High-volume (100/month free tier very limited)
  - name: Bocha (Chinese AI search)
    traits:
    - chinese
    - ai_optimized
    - bing_compatible
    fit_for:
    - Chinese-language stock news; AI-optimized summaries
    not_fit_for:
    - English/international news
  - name: Brave Search
    traits:
    - privacy
    - independent_index
    fit_for:
    - Privacy-focused alternative; independent web index
    not_fit_for:
    - China-specific financial news
  - name: SearXNG
    traits:
    - metasearch
    - privacy
    - no_quota
    fit_for:
    - Private deployments; aggregating multiple engines; no API key needed
    not_fit_for:
    - Reliable production without self-hosting; public instances may be rate-limited
  - name: MiniMax Coding Plan
    traits:
    - chinese
    - coding_plan
    fit_for:
    - MiniMax subscription users; Chinese search
    not_fit_for:
    - Users without MiniMax Coding Plan subscription
  default: Tavily (if API key provided) else Bocha (if API key provided) else SearXNG public instances
  _source: worker_resource
- id: slot-005
  name: notification_channel
  description: 'China users: Feishu or WeChat Work (webhook) for familiarity. International users: Telegram
    or Discord. Formal reports: Email. All channels can be enabled in parallel — notifications are sent
    to all configured channels.'
  used_in_stages: []
  options:
  - name: WeChat Work Webhook
    traits:
    - china
    - wechat
    - webhook
    fit_for:
    - China-based teams already using WeChat Work
    not_fit_for:
    - Non-WeChat users; international teams
  - name: Feishu Webhook
    traits:
    - china
    - lark
    - bot
    fit_for:
    - China-based teams using Feishu/Lark
    not_fit_for:
    - Non-Feishu users
  - name: Feishu Stream Bot
    traits:
    - china
    - websocket
    - interactive
    fit_for:
    - Interactive Feishu bot with slash commands
    not_fit_for:
    - Simple notification-only use cases
  - name: Telegram Bot
    traits:
    - global
    - bot
    - secure
    fit_for:
    - International users; reliable global delivery
    not_fit_for:
    - Users without Telegram access
  - name: Email (SMTP)
    traits:
    - universal
    - smtp
    - async
    fit_for:
    - Formal reports; recipients without specific apps
    not_fit_for:
    - Real-time alerts (email latency); bulk push
  - name: Pushover
    traits:
    - mobile_push
    - ios_android
    fit_for:
    - Mobile push notifications; cross-platform
    not_fit_for:
    - Users not wanting another app
  - name: PushPlus
    traits:
    - china
    - wechat_public
    fit_for:
    - China users without WeChat Work; WeChat public account integration
    not_fit_for:
    - International users
  - name: Server酱3
    traits:
    - china
    - wechat
    - simple
    fit_for:
    - Simple WeChat push for China users
    not_fit_for:
    - Non-WeChat users
  - name: Discord (Webhook or Bot)
    traits:
    - global
    - community
    - bot
    fit_for:
    - Trading communities using Discord; interactive bot commands
    not_fit_for:
    - Non-Discord users
  - name: Slack
    traits:
    - global
    - enterprise
    - bot
    fit_for:
    - Enterprise teams using Slack
    not_fit_for:
    - Non-Slack users
  - name: Custom Webhook
    traits:
    - generic
    - extendable
    fit_for:
    - Any HTTP-receiving service (DingTalk, Bark, self-built, etc.)
    not_fit_for:
    - Services requiring proprietary SDKs not supported
  default: None (all channels optional; multiple can be enabled simultaneously)
  _source: worker_resource
