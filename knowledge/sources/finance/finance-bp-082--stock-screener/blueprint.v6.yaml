- id: BD-024
  type: B
  content: Pole duration 20-40 bars for High-Tight Flag
  rationale: Pole duration of 20-40 bars (roughly 4-8 weeks) captures the sweet spot where a stock has
    moved explosively enough to be notable but not so extended that the flag represents a topping process
