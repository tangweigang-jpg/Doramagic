- id: BD-023
  type: B/BA
  content: Pole return >= 100% for High-Tight Flag
  rationale: The 100% pole return threshold ensures sufficient momentum exists before flag consolidation
    to make the pattern worth trading. Stocks that gap up 100%+ in 20-40 days have demonstrated extraordinary
