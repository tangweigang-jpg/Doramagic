replaceable_slots:
- id: slot-001
  name: market_data_provider
  description: Use yfinance for global coverage; add Alpha Vantage for enhanced fundamentals when quota
    allows; use finviz for US-specific metrics like short interest
  used_in_stages: []
  options:
  - name: yfinance
    traits:
    - free
    - no-auth
    - global-coverage
    - rate-limited
    fit_for:
    - General stock data, historical prices, global markets (US/HK/JP/TW)
    not_fit_for:
    - Real-time tick data, high-frequency trading signals
  - name: Alpha Vantage
    traits:
    - api-key
    - rate-limited-free-tier
    - premium-available
    fit_for:
    - Fundamental data when yfinance is unreliable
    not_fit_for:
    - 'High-volume usage (free tier: 25 req/day)'
  - name: finviz
    traits:
    - free
    - us-only
    - screener-data
    fit_for:
    - US stock screening, insider data, short interest
    not_fit_for:
    - Non-US stocks, real-time prices
  - name: Polygon.io
    traits:
    - api-key
    - real-time
    - premium
    fit_for:
    - Real-time data, premium fundamental data
    not_fit_for:
    - Budget-constrained projects, free tier insufficient
  default: yfinance
  _source: worker_resource
- id: slot-002
  name: llm_provider
  description: Groq for free tier and speed; Z.AI/Minimax for theme extraction; OpenAI/Claude for highest
    quality when budget allows
  used_in_stages: []
  options:
  - name: Groq
    traits:
    - free-tier
    - fast-inference
    - openai-compatible
    fit_for:
    - Production use with free tier, fast chatbot responses
    not_fit_for:
    - High-volume paid tier requirements
  - name: Z.AI (GLM)
    traits:
    - api-key
    - chinese-models
    fit_for:
    - Multilingual support, GLM model preference
    not_fit_for:
    - English-only deployments
  - name: Minimax
    traits:
    - api-key
    - international
    fit_for:
    - Theme extraction with international models
    not_fit_for:
    - US-focused deployments
  - name: OpenAI
    traits:
    - api-key
    - premium
    - high-quality
    fit_for:
    - Highest quality responses, production with budget
    not_fit_for:
    - Cost-sensitive projects
  - name: Anthropic Claude (via OpenRouter)
    traits:
    - api-key
    - high-quality
    - reasoning
    fit_for:
    - Complex analysis, research tasks
    not_fit_for:
    - Simple extraction tasks, cost-sensitive
  default: Groq
  _source: worker_resource
- id: slot-003
  name: web_search
  description: Tavily as primary (research-optimized); Serper as fallback; consider DuckDuckGo for purely
    free deployments
  used_in_stages: []
  options:
  - name: Tavily
    traits:
    - api-key
    - research-optimized
    fit_for:
    - Primary search for assistant research mode
    not_fit_for:
    - Free tier exhausted
  - name: Serper
    traits:
    - api-key
    - google-search
    fit_for:
    - Fallback search, Google results
    not_fit_for:
    - Primary search (use as fallback)
  - name: DuckDuckGo (free)
    traits:
    - free
    - no-auth
    fit_for:
    - Development, cost-sensitive deployments
    not_fit_for:
    - Production requiring reliable results
  default: Tavily
  _source: worker_resource
- id: slot-004
  name: database
  description: PostgreSQL for each production deployments; SQLite only for development without Celery
  used_in_stages: []
  options:
  - name: PostgreSQL 16
    traits:
    - relational
    - acid
    - production-ready
    fit_for:
    - Production deployment, data integrity requirements
    not_fit_for:
    - Simple deployments without Docker
  - name: SQLite
    traits:
    - embedded
    - single-file
    - limited-concurrency
    fit_for:
    - Development, single-instance deployments
    not_fit_for:
    - Production with Celery workers (concurrency issues)
  default: PostgreSQL 16
  _source: worker_resource
- id: slot-005
  name: cache_message_broker
  description: Redis required for Celery broker and production caching; dev mode can disable Redis but
    loses task queue functionality
  used_in_stages: []
  options:
  - name: Redis
    traits:
    - in-memory
    - pub-sub
    - celery-compatible
    fit_for:
    - Production with Celery, price caching, rate limiting
    not_fit_for:
    - Single-instance dev without Celery
  - name: SQLite (dev only)
    traits:
    - embedded
    - limited
    fit_for:
    - Development without Redis dependency
    not_fit_for:
    - Production (no pub/sub, no Celery support)
