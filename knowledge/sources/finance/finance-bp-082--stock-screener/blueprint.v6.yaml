- id: BD-025
  type: B/BA
  content: 'Flag: 3-25 bars, max 25% depth, max 1.15 volume ratio'
  rationale: Flag specifications ensure the consolidation is brief (3-25 bars), shallow (max 25% depth),
    and accompanied by volume contraction (max 1.15 ratio, meaning volume should be less than pole volume).
    The 25-bar maximum prevents extended consolidations that suggest trend exhaustion rather than momentum
