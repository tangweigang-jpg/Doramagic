- id: BD-022
  type: B
  content: Handle must be in upper half of cup range
  rationale: Handle location in the upper half of cup range ensures the pullback remains above the cup
    midpoint, maintaining structural integrity of the advance. Handles that drop below the midpoint risk
    completing a double-top or failing to establish the proper uptrend angle. This boundary ensures handles
    represent shallow consolidations within an emerging uptrend rather than meaningful corrections that
    would invalidate the pattern.
  evidence: backend/app/analysis/patterns/cup_handle.py:293-296(module)
  stage: pattern_detection
