# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-082
name: Stock Scanner
sop_version: '3.6'
source:
  projects:
  - stock-screener
  commit_hash: ad7e1770548128e8e27286d1eb72d307a41a46b2
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Multi-methodology stock screening with composite scoring and pattern detection
  description: Professional stock screening platform supporting Minervini, CANSLIM, IPO, Volume Breakthrough,
    Setup Engine, and Custom scans with AI-assisted research, theme discovery, and real-time market breadth
    analysis.
  prerequisites: Users need Docker/PostgreSQL/Redis infrastructure knowledge, FastAPI API familiarity,
    and stock market screening methodology understanding. Designed for self-hosted single-tenant server
    deployments.
  not_suitable_for: Real-time intraday trading (design is batch-scan oriented), cryptocurrency screening,
    non-US markets with limited API coverage, or non-technical users requiring simple price lookups without
    screening logic.
  activation:
    triggers:
    - After-close market briefs
    - Latest feature-run diff analysis
    - Watchlist review or watchlist candidate proposals
    - Theme inspection and alert triage
    - Symbol explanation from the latest published run
    emphasis:
    - Use ESPECIALLY when user asks about StockScreenClaude market state rather than generic market commentary
    - Use when task involves comparing feature runs, inspecting watchlists, reviewing themes, or explaining
      symbols from published runs
    anti_skip:
    - Don't skip market_overview because you think you know the market - freshness matters
    - Don't skip task_status when request depends on pipeline freshness - data staleness invalidates conclusions
    - Don't skip tool results because you have strong market opinions - facts must come from tools
stages:
- id: data_collection
  name: Data Collection Layer
  order: 1
  responsibility: Fetches market data once and shares across each screeners, eliminating redundant API
    calls and improving bulk scan performance
  interface:
    inputs:
    - DataRequirements (merged from screeners)
    - symbol/symbols list
    - market context
    outputs:
    - StockData container with OHLCV, fundamentals, benchmark data
  required_methods:
  - name: DataPreparationLayer.fetch_stock_data
    description: Centralized coordinator that fetches each required data for a batch of symbols, merging
      DataRequirements from each screeners to minimize API calls
    evidence: backend/app/scanners/data_preparation.py:30(DataPreparationLayer)
  - name: StockDataProvider.get_stock_data
    description: Port interface for fetching stock data; DataPrepStockDataProvider is the concrete implementation
    evidence: backend/app/infra/providers/stock_data.py:10(DataPrepStockDataProvider)
  - name: DataRequirements.merge
    description: Unions each screener data needs into a single request, enabling batch optimization
    evidence: backend/app/scanners/base_screener.py:30(DataRequirements.merge)
  key_behaviors:
  - behavior: Single fetch per symbol per scan
    description: Data is fetched once at scan initiation and shared via pre_fetched_data across each screeners.
      No redundant API calls occur within the same scan batch.
    evidence: backend/app/scanners/scan_orchestrator.py:130(pre_fetched_data)
  - behavior: Benchmark caching with TTL
    description: SPY/benchmark data is cached with 24-hour TTL via BenchmarkCacheService. On cache miss,
      distributed lock prevents thundering herd - only one worker fetches while others poll.
    evidence: backend/app/services/benchmark_cache_service.py:431(_wait_for_cache)
  - behavior: Default 2y price period
    description: DataRequirements defaults to 2y history, providing enough data for 200-day MA and Minervini
      template checks without excessive API calls.
    evidence: backend/app/scanners/base_screener.py:24(DataRequirements.price_period)
  replaceable_points:
  - name: StockDataProvider port
    description: Abstract interface for data fetching - can be replaced for different data sources or
      mock implementations
    options:
    - name: DataPrepStockDataProvider
      traits:
      - Production implementation
      - Uses hybrid data sources
      fit_for:
      - Production deployments with real-time data needs
      not_fit_for:
      - Testing without live data access
    - name: mock implementations
      traits:
      - Test doubles
      - No external dependencies
      fit_for:
      - Unit testing
      - CI/CD pipelines
      not_fit_for:
      - Production data fetching
    default: DataPrepStockDataProvider
  - name: Cache backend
    description: Redis caching layer for price data, fundamentals, and benchmarks
    options:
    - name: Redis
      traits:
      - Distributed
      - TTL support
      - Distributed locking
      fit_for:
      - Multi-worker deployments
      - Production
      not_fit_for:
      - Single-node dev environments without Redis
    - name: in-memory
      traits:
      - No external dependency
      - Process-local only
      fit_for:
      - Development
      - Single-worker testing
      not_fit_for:
      - Multi-worker production deployments
    - name: disabled
      traits:
      - No caching
      - Always fresh data
      fit_for:
      - Debugging cache issues
      - Testing data freshness
      not_fit_for:
      - Production performance
      - API rate limit management
    default: Redis
  design_decisions:
  - 'Default price_period=''2y'' in DataRequirements: 2y provides enough history for 200-day MA + Minervini
    template checks; shorter than 5y to limit API calls (backend/app/scanners/base_screener.py:24)'
  acceptance_hints:
  - Every screeners in a bulk scan receive data without duplicate API calls for the same symbol
  - Benchmark data is available within 24h TTL without re-fetching
  - DataRequirements.merge() correctly unions each screener needs
- id: screening_execution
  name: Screening Execution Layer
  order: 2
  responsibility: Runs multiple screeners in parallel on shared data, combines results into composite
    scores
  interface:
    inputs:
    - StockData
    - list of screener names
    - composite_method
    - criteria
    outputs:
    - Dict with composite_score, rating, individual screener results, breakdown
  required_methods:
  - name: ScanOrchestrator.scan_stock_multi
    description: Coordinates multi-screener execution with ThreadPoolExecutor parallelism, pre-fetches
      data once, and applies quality policy
    evidence: backend/app/scanners/scan_orchestrator.py:39(ScanOrchestrator)
  - name: BaseStockScreener.scan_stock
    description: Abstract method that each screener implements to evaluate a stock against its criteria
    evidence: backend/app/scanners/base_screener.py:149(BaseStockScreener)
  - name: ScreenerRegistry.get
    description: Retrieves screener instance by name for dynamic execution
    evidence: backend/app/scanners/screener_registry.py:1(ScreenerRegistry)
  key_behaviors:
  - behavior: Parallel screener execution
    description: Screeners run concurrently via ThreadPoolExecutor with max_workers=5. This reduces latency
      when scanning with multiple methodologies.
    evidence: backend/app/scanners/scan_orchestrator.py:173(ThreadPoolExecutor)
  - behavior: Shared data across screeners
    description: Pre-fetched StockData is passed to each screeners, avoiding redundant fetches within
      the same scan batch.
    evidence: backend/app/scanners/scan_orchestrator.py:130(pre_fetched_data)
  - behavior: Quality T4 policy enforcement
    description: Rating is downgraded when field_completeness_score falls below threshold. Incomplete
      fundamental data triggers Pass rating to prevent false positives.
    evidence: backend/app/scanners/scan_orchestrator.py:201(apply_quality_policy)
  - behavior: Feature flag gating
    description: Setup Engine can be disabled via setup_engine_enabled flag without code deployment.
    evidence: backend/app/scanners/scan_orchestrator.py:67(settings.setup_engine_enabled)
  replaceable_points:
  - name: Screener implementation
    description: Individual screener logic that evaluates stock criteria
    options:
    - name: MinerviniScanner
      traits:
      - Trend template
      - 200-day MA check
      - Volume confirmation
      fit_for:
      - Growth stock discovery
      - Trend-following strategies
      not_fit_for:
      - Value investing
      - Sector rotation
    - name: SetupEngineScanner
      traits:
      - Pattern detection
      - Breakout readiness
      - VCP/C&H detection
      fit_for:
      - Technical analysis
      - Breakout trading
      not_fit_for:
      - Fundamental analysis focus
    - name: CANSLIMScanner
      traits:
      - IBD methodology
      - Earnings/pivot focus
      fit_for:
      - Growth investing
      - CANSLIM practitioners
      not_fit_for:
      - Long-term value investing
    - name: CustomScanner
      traits:
      - User-defined criteria
      - Extensible
      fit_for:
      - Custom screening logic
      - Experimental strategies
      not_fit_for:
      - Standard methodologies
    default: MinerviniScanner
  - name: Composite scoring method
    description: How to combine individual screener scores into a composite score
    options:
    - name: weighted_average
      traits:
      - Normalized 0-100
      - Equal default weights
      fit_for:
      - Balanced multi-strategy evaluation
      not_fit_for:
      - When certain strategies should dominate or be ignored
    - name: maximum
      traits:
      - Best screener score wins
      fit_for:
      - Any-hit screening
      - High-conviction picks
      not_fit_for:
      - Requiring multiple confirmations
    - name: minimum
      traits:
      - Worst screener score determines result
      fit_for:
      - All-factor must-pass screening
      not_fit_for:
      - When any single positive factor is sufficient
    default: weighted_average
  design_decisions:
  - 'Screeners run in parallel via ThreadPoolExecutor(max_workers=5): Parallel execution reduces latency
    for multi-screener scans; 5 workers matches typical screener count (backend/app/scanners/scan_orchestrator.py:173)'
  acceptance_hints:
  - Multiple screeners complete execution within reasonable time for bulk scans
  - Individual screener scores are returned alongside composite score
  - Quality policy correctly downgrades ratings for incomplete data
- id: pattern_detection
  name: Pattern Detection Layer (Setup Engine)
  order: 3
  responsibility: Detects chart patterns (Cup & Handle, VCP, 3-Week Tight, etc.) and computes breakout
    readiness metrics
  interface:
    inputs:
    - PatternDetectorInput (daily+weekly OHLCV, features)
    - SetupEngineParameters
    outputs:
    - PatternDetectorResult with candidates tuple and outcome enum
  required_methods:
  - name: PatternDetector.detect
    description: Abstract method subclasses implement to detect specific chart patterns (CupWithHandle,
      VCP, 3WT, etc.)
    evidence: backend/app/analysis/patterns/detectors/base.py:215(PatternDetector)
  - name: PatternDetector.detect_safe
    description: Template method wrapping user detect() with exception handling, name validation, and
      candidate coercion for graceful degradation
    evidence: backend/app/analysis/patterns/detectors/base.py:256(detect_safe)
  - name: SetupEngineAggregator.aggregate
    description: Runs each registered detectors, calibrates candidates, and selects the primary pattern
      for a stock
    evidence: backend/app/analysis/patterns/aggregator.py:82(SetupEngineAggregator)
  - name: BreakoutReadinessFeatures.compute
    description: 'Computes readiness primitives: distance_to_pivot_pct, bb_width_pctile, volume_ratio'
    evidence: backend/app/analysis/patterns/readiness.py:23(BreakoutReadinessFeatures)
  key_behaviors:
  - behavior: snake_case name enforcement
    description: PatternDetector subclasses are validated at class definition time via __init_subclass__
      hook. Non-snake_case names raise TypeError.
    evidence: backend/app/analysis/patterns/detectors/base.py:225(__init_subclass__)
  - behavior: DetectorOutcome derived from structure
    description: Outcome (DETECTED/NOT_DETECTED/INSUFFICIENT_DATA/ERROR) is always computed from candidates
      presence and failed_checks, never stored. Single source of truth.
    evidence: backend/app/analysis/patterns/detectors/base.py:103(outcome property)
  - behavior: Readiness gates with thresholds
    description: Breakout readiness requires readiness_score >= 70% and atr14_pct <= 8%. Stocks outside
      these bounds are marked not ready.
    evidence: backend/app/analysis/patterns/config.py:51(readiness_score_ready_min_pct)
  - behavior: Prerequisite check ordering
    description: 'Readiness checks must follow specific order: _check_prerequisites before technical/volume/price_volume
      checks. Reordering causes incorrect determination.'
    evidence: backend/app/analysis/patterns/readiness.py:36-37(_check_readiness)
  replaceable_points:
  - name: Detector implementation
    description: Pattern detection algorithm for specific chart patterns
    options:
    - name: CupWithHandleDetector
      traits:
      - Classic IBD pattern
      - Cup and Handle detection
      fit_for:
      - Long-term trend continuation
      - Pullback entry setups
      not_fit_for:
      - Short-term trades
      - Range-bound markets
    - name: VCPDetector
      traits:
      - Volatility Contraction Pattern
      - Tightening bars detection
      fit_for:
      - Accumulation phases
      - Breakout preparation
      not_fit_for:
      - Trending markets with no consolidation
    - name: ThreeWeeksTightDetector
      traits:
      - 3-Week Tight pattern
      - Short-term compression
      fit_for:
      - Quick breakouts
      - Momentum acceleration
      not_fit_for:
      - Long holding periods
      - Low volatility stocks
    - name: FirstPullbackDetector
      traits:
      - Post-breakout pullback
      - Retest detection
      fit_for:
      - Add-on entries
      - Pullback to breakout level
      not_fit_for:
      - Initial breakout entries
      - Failed breakouts
    default: VCPDetector
  - name: Parameter profile
    description: Strict vs relaxed thresholds for pattern detection sensitivity
    options:
    - name: strict
      traits:
      - Tighter thresholds
      - Fewer false positives
      fit_for:
      - Conservative screening
      - Quality over quantity
      not_fit_for:
      - Early-stage pattern detection
      - High-volume scanning
    - name: relaxed
      traits:
      - Looser thresholds
      - More candidates
      fit_for:
      - Comprehensive scanning
      - Early pattern detection
      not_fit_for:
      - Low-risk requirements
      - Premium stock focus
    - name: custom
      traits:
      - User-defined thresholds
      - Flexible
      fit_for:
      - Specific strategy tuning
      - Advanced users
      not_fit_for:
      - Out-of-box usage
      - Beginners
    default: strict
  design_decisions:
  - 'readiness_score_ready_min_pct=70.0 as breakout gate: Threshold reflects trader''s risk tolerance;
    calibrated via SetupEngineParameterSpec (backend/app/analysis/patterns/config.py:51)'
  acceptance_hints:
  - Valid patterns are detected without crashes on edge case inputs
  - DetectorOutcome correctly derives from candidates presence
  - Readiness score reflects actual technical conditions
- id: scoring_rating
  name: Scoring and Rating Layer
  order: 4
  responsibility: Converts raw detector outputs into composite scores (0-100) and human-readable ratings
    (Strong Buy/Buy/Watch/Pass)
  interface:
    inputs:
    - dict of ScreenerOutputDomain
    - CompositeMethod
    - field_completeness_score
    outputs:
    - composite_score (0-100)
    - overall_rating (Strong Buy/Buy/Watch/Pass)
  required_methods:
  - name: calculate_composite_score
    description: Pure function combining per-screener scores into a 0-100 composite using specified composite
      method
    evidence: backend/app/domain/scanning/scoring.py:60(calculate_composite_score)
  - name: calculate_overall_rating
    description: Maps composite score to RatingCategory enum (Strong Buy/Buy/Watch/Pass)
    evidence: backend/app/domain/scanning/scoring.py:105(calculate_overall_rating)
  - name: apply_quality_policy
    description: T4 fallback that downgrades rating when field_completeness_score < threshold; partial
      data still useful but transparent
    evidence: backend/app/domain/scanning/scoring.py:185(apply_quality_policy)
  key_behaviors:
  - behavior: Pure functions with no I/O
    description: Scoring functions are stateless and deterministic. They have no database, Redis, or external
      API dependencies, enabling deterministic testing.
    evidence: backend/app/domain/scanning/scoring.py:1(scoring module docstring)
  - behavior: Score validation 0-100 enforced
    description: Invalid scores are rejected in ScreenerResult.__post_init__, causing fail-fast on garbage
      data propagation.
    evidence: backend/app/scanners/base_screener.py:86(__post_init__)
  - behavior: Quality T4 downgrades rating only
    description: Quality policy modifies rating but never blocks scoring. Partial data remains useful
      with transparent downgrade indication.
    evidence: backend/app/domain/scanning/scoring.py:185(apply_quality_policy)
  replaceable_points:
  - name: Scoring weights
    description: Per-screener weight in composite calculation
    options:
    - name: equal
      traits:
      - Same weight for each screeners
      - Balanced
      fit_for:
      - Multi-strategy evaluation
      - No single strategy dominance
      not_fit_for:
      - Strategy prioritization
      - Custom factor emphasis
    - name: custom dict
      traits:
      - User-defined weights
      - Strategy prioritization
      fit_for:
      - Custom factor emphasis
      - Strategy prioritization
      not_fit_for:
      - Simple use cases
      - Equal importance scenarios
    default: equal
  - name: Quality threshold
    description: field_completeness_score cutoff for quality policy activation
    options:
    - name: None
      traits:
      - No quality policy
      - Always full rating
      fit_for:
      - Every data complete scenarios
      - Testing
      not_fit_for:
      - Production with incomplete data
    - name: integer 0-100
      traits:
      - Configurable threshold
      - Adaptive downgrades
      fit_for:
      - Production with variable data quality
      not_fit_for:
      - All-or-nothing requirements
    default: None
  design_decisions:
  - 'Pure scoring functions with no I/O dependencies: Enables deterministic testing without database/Redis
    mocks (backend/app/domain/scanning/scoring.py:1)'
  acceptance_hints:
  - Every composite scores fall within 0-100 range
  - Rating categories match their score thresholds (Strong Buy >= 75, Buy >= 50, Watch >= 25, Pass < 25)
  - Quality policy correctly identifies incomplete data scenarios
- id: persistence
  name: Persistence Layer
  order: 5
  responsibility: Stores scan results, feature runs, and provides query interfaces for the API with atomic
    publishing guarantees
  interface:
    inputs:
    - ScanResult, FeatureRowWrite, FilterSpec, SortSpec, PageSpec
    outputs:
    - ResultPage, FeaturePage, FilterOptions
  required_methods:
  - name: SqlScanResultRepository.query
    description: Implements ScanResultRepository port; handles ORM mapping and result enrichment for scan
      queries
    evidence: backend/app/infra/db/repositories/scan_result_repo.py:242(SqlScanResultRepository)
  - name: SqlFeatureStoreRepository.publish_atomically
    description: Implements FeatureStoreRepository with pointer-based atomic publishing for consistent
      reader views
    evidence: backend/app/infra/db/repositories/feature_store_repo.py:141(SqlFeatureStoreRepository)
  - name: FeatureRun.state_transition
    description: 'RunStatus state machine enforcing valid transitions: RUNNING→COMPLETED/FAILED→QUARANTINED→PUBLISHED'
    evidence: backend/app/domain/feature_store/models.py:53(_VALID_TRANSITIONS)
  key_behaviors:
  - behavior: Pointer-based atomic publishing
    description: Readers always see consistent state via FeatureRunPointer. New data becomes visible only
      after publish_atomically() completes.
    evidence: backend/app/infra/db/models/feature_store.py:114(FeatureRunPointer)
  - behavior: RunStatus state machine
    description: Explicit state transitions prevent invalid states (e.g., PUBLISHED→RUNNING). Invalid
      transitions raise ValueError.
    evidence: backend/app/domain/feature_store/models.py:53(_VALID_TRANSITIONS)
  - behavior: Frozen dataclasses for domain models
    description: Immutability via frozen=True ensures hashability and prevents accidental mutation in
      concurrent code.
    evidence: backend/app/domain/feature_store/models.py:8(frozen=True)
  - behavior: FilterSpec builder pattern
    description: 'Fluent API with silent empty-skip: None values don''t require guard clauses in caller
      code.'
    evidence: backend/app/domain/common/query.py:89(FilterSpec)
  replaceable_points:
  - name: Repository implementation
    description: Database adapter for persistence operations
    options:
    - name: SqlAlchemy
      traits:
      - ORM
      - Async support
      - Migration tooling
      fit_for:
      - Production PostgreSQL deployments
      not_fit_for:
      - Non-SQL databases
      - Simple key-value only
    - name: async adapters
      traits:
      - Async-only
      - Higher throughput
      fit_for:
      - High-concurrency scenarios
      not_fit_for:
      - Legacy sync code
      - Simple deployments
    default: SqlAlchemy
  - name: Query dialect
    description: SQL generation strategy for custom queries
    options:
    - name: SQLAlchemy core
      traits:
      - Type-safe
      - ORM compatible
      fit_for:
      - Most queries
      - Portability
      not_fit_for:
      - Very complex queries requiring raw SQL
    - name: raw SQL
      traits:
      - Full flexibility
      - Optimization
      fit_for:
      - Complex aggregations
      - Performance tuning
      not_fit_for:
      - Maintainability
      - SQL injection risk
    default: SQLAlchemy core
  design_decisions:
  - 'Pointer-based atomic publishing for feature runs: Readers always see consistent state; new data visible
    only after publish_atomically() (backend/app/infra/db/models/feature_store.py:114)'
  acceptance_hints:
  - Scan results persist and query correctly with filters and pagination
  - Feature store publishes atomically - readers never see partial data
  - State machine rejects invalid transitions
- id: api_layer
  name: API Layer
  order: 6
  responsibility: HTTP endpoints for scan creation, result querying, and feature store access with idempotency
    guarantees
  interface:
    inputs:
    - ScanCreateRequest, FilterParams, PaginationParams
    outputs:
    - JSON responses with scan results, filter options, progress events
  required_methods:
  - name: create_scan
    description: POST /scans endpoint that creates a scan record and dispatches Celery task for background
      processing with idempotency support
    evidence: backend/app/api/v1/scans.py:92(create_scan)
  - name: get_scan_results
    description: GET /scans/{id}/results endpoint returning paginated, filtered scan results
    evidence: backend/app/api/v1/scans.py:306(get_scan_results)
  - name: CreateScanUseCase.execute
    description: Orchestrates scan creation with idempotency check, returning existing scan for duplicate
      requests
    evidence: backend/app/use_cases/scanning/create_scan.py:77(CreateScanUseCase)
  - name: RunBulkScanUseCase.execute
    description: 'Executes bulk scan workflow: load universe → run screeners → persist → progress → done'
    evidence: backend/app/use_cases/scanning/run_bulk_scan.py:84(RunBulkScanUseCase)
  key_behaviors:
  - behavior: Idempotency via optional idempotency_key
    description: Duplicate POST requests with same idempotency_key return the existing scan without creating
      duplicates.
    evidence: backend/app/use_cases/scanning/create_scan.py:91(idempotency check)
  - behavior: Use cases depend on ports only
    description: Business logic has no SQLAlchemy, Redis, or Celery imports. Use cases can be unit tested
      without infrastructure.
    evidence: backend/app/use_cases/scanning/create_scan.py:9(use case docstring)
  - behavior: Unit of Work pattern
    description: Transactional boundaries with automatic rollback on exception. Scan creation commits
      only after successful dispatch.
    evidence: backend/app/use_cases/scanning/create_scan.py:89(with uow:)
  - behavior: Feature flag controls
    description: feature_themes=True enables theme discovery; can be disabled for lighter deployments.
    evidence: backend/app/config/settings.py:54(feature_themes)
  replaceable_points:
  - name: Task backend
    description: Background job execution for long-running scans
    options:
    - name: Celery
      traits:
      - Distributed
      - Result backend
      - Retry policies
      fit_for:
      - Production multi-worker deployments
      not_fit_for:
      - Single-process testing
      - Simple deployments
    - name: in-process
      traits:
      - No broker
      - Synchronous
      fit_for:
      - Testing
      - Simple deployments
      not_fit_for:
      - Production scalability
      - Long-running tasks
    default: Celery
  - name: API framework
    description: HTTP layer for API endpoints
    options:
    - name: FastAPI
      traits:
      - Async
      - OpenAPI
      - Type validation
      fit_for:
      - Modern Python APIs
      - Self-hosted
      not_fit_for:
      - Django compatibility
      - Legacy WSGI only
    default: FastAPI
  design_decisions:
  - 'Use cases depend only on domain ports, never infrastructure: Testability: use cases can be unit tested
    without SQLAlchemy/Celery (backend/app/use_cases/scanning/create_scan.py:9)'
  acceptance_hints:
  - POST /scans returns scan ID and dispatches background task
  - Duplicate requests with same idempotency_key return existing scan
  - GET /scans/{id}/results returns paginated, filtered results
- id: cache_infrastructure
  name: Cache Infrastructure
  order: 7
  responsibility: Redis-backed caching for price data, fundamentals, and benchmarks with TTL management
    and distributed locking
  interface:
    inputs:
    - symbol, period, market context
    outputs:
    - cached DataFrames or fresh fetches
  required_methods:
  - name: PriceCacheService.get
    description: Singleton cache for OHLCV data with distributed locking to prevent thundering herd on
      cache miss
    evidence: backend/app/services/price_cache_service.py:1(PriceCacheService)
  - name: FundamentalsCacheService.get
    description: 7-day TTL cache for fundamental metrics, reducing repeated API calls
    evidence: backend/app/services/fundamentals_cache_service.py:1(FundamentalsCacheService)
  - name: BenchmarkCacheService.get_benchmark
    description: 24-hour TTL cache for SPY/benchmark with market-aware routing (SPY for US, HSI for HK,
      NKY for JP)
    evidence: backend/app/services/benchmark_cache_service.py:45(BenchmarkCacheService)
  key_behaviors:
  - behavior: Distributed locking
    description: On cache miss, distributed lock ensures only one worker fetches while others poll until
      data is available. Prevents thundering herd problem.
    evidence: backend/app/services/benchmark_cache_service.py:431(_wait_for_cache)
  - behavior: Market-aware routing
    description: Different markets use different benchmarks (SPY for US, HSI for HK, NKY for JP). Routing
      matrix is versioned for audit.
    evidence: backend/app/services/benchmark_cache_service.py:89(get_benchmark_symbol)
  - behavior: Provider routing defaults
    description: Defaults to US market when market is None/unknown. This may cause issues for non-US symbols
      routed through finviz first.
    evidence: backend/app/services/provider_routing_policy.py:89(DEFAULT_MARKET)
  - behavior: Configurable TTL by data type
    description: cache_recent_days=60 default; screener-specific needs (5y for volume breakthrough, 2y
      for Minervini) override general default.
    evidence: backend/app/config/settings.py:144(cache_recent_days)
  replaceable_points:
  - name: Cache backend
    description: Distributed cache for price data and fundamentals
    options:
    - name: Redis
      traits:
      - Distributed
      - TTL support
      - Pub/sub ready
      fit_for:
      - Multi-worker deployments
      - Production
      not_fit_for:
      - Single-node without Redis
    - name: Memcached
      traits:
      - Simple
      - Memory-only
      fit_for:
      - Simple caching
      - Memory-constrained
      not_fit_for:
      - Distributed locking
      - Complex data
    - name: disabled
      traits:
      - No caching
      - Always fresh
      fit_for:
      - Debugging
      - Testing
      not_fit_for:
      - Production performance
    default: Redis
  - name: Lock implementation
    description: Distributed locking for cache miss handling
    options:
    - name: Redis lock
      traits:
      - Distributed
      - TTL-aware
      fit_for:
      - Multi-worker deployments
      not_fit_for:
      - Single-node testing
    - name: database lock
      traits:
      - No Redis dependency
      fit_for:
      - Simplified deployments
      not_fit_for:
      - Performance
      - Scalability
    default: Redis lock
  design_decisions:
  - 'Market-aware benchmark routing (SPY for US, others for Asia): Different markets need different benchmarks
    (HSI for HK, NKY for JP) (backend/app/services/benchmark_cache_service.py:89)'
  acceptance_hints:
  - Cache hits reduce API latency for repeated requests
  - No data races on cache miss - only one worker fetches
  - Market routing returns correct benchmark for each market
data_flow:
- from_stage: external
  to_stage: api_layer
  data: ScanCreateCommand (universe_def, screener_names, criteria), FilterSpec, SortSpec, PageSpec
- from_stage: api_layer
  to_stage: data_collection
  data: ScanCreateCommand with merged DataRequirements
- from_stage: cache_infrastructure
  to_stage: data_collection
  data: Cached OHLCV, fundamentals, benchmark DataFrames (cache hit) or fresh data (cache miss)
- from_stage: data_collection
  to_stage: screening_execution
  data: StockData (price_data, benchmark_data, fundamentals, rs_universe_performances)
- from_stage: screening_execution
  to_stage: pattern_detection
  data: PatternDetectorInput (daily_ohlcv, weekly_ohlcv, features mapping)
- from_stage: pattern_detection
  to_stage: scoring_rating
  data: AggregatedPatternOutput (candidates, passed_checks, failed_checks, readiness_features)
- from_stage: scoring_rating
  to_stage: persistence
  data: ScreenerResult.score, ScreenerResult.details (contains setup_engine payload)
- from_stage: api_layer
  to_stage: persistence
  data: FilterSpec, SortSpec, PageSpec query parameters
- from_stage: persistence
  to_stage: api_layer
  data: ResultPage, FeaturePage, FilterOptions
global_contracts:
- contract: 'Every screener scores must be 0-100 (validated in ScreenerResult.__post_init__): Fail-fast
    on invalid scores prevents garbage data propagation (backend/app/scanners/base_screener.py:86)'
  evidence: ''
business_decisions:
- id: BD-001
  type: B/DK
  content: Use 7 specialized pattern detectors in deterministic execution order instead of parallel execution
  rationale: Deterministic execution order ensures reproducible signal generation and consistent ranking
    across runs, which is critical for backtesting reliability and user-facing alert stability. The ordered
    approach prevents race conditions in score aggregation and allows downstream calibration logic to
    process results in a predictable sequence. Parallel execution would introduce non-determinism that
    could cause identical scans to produce different signal rankings.
  evidence: backend/app/analysis/patterns/detectors/__init__.py:18(default_pattern_detectors)
  stage: pattern_detection
  alternative_considered: Parallel execution with deterministic ordering post-aggregation was considered
    but rejected due to added complexity and memory overhead for marginal throughput gain
- id: BD-002
  type: B/BA
  content: 'Pattern detector execution order: CupWithHandle, ThreeWeeksTight, HighTightFlag, FirstPullback,
    VCP, NR7InsideDay, DoubleBottom'
  rationale: Execution order prioritizes higher-conviction, longer-duration patterns (cup-and-handle,
    3WT) before shorter-term catalysts (NR7, HTF). This ordering ensures that when multiple patterns fire
    simultaneously, the more established base patterns are evaluated first, preventing shorter-term noise
    from overshadowing structural setups. The W-base pattern (double-bottom) is intentionally last as
    a historical pattern typically less actionable for momentum strategies.
  evidence: backend/app/analysis/patterns/detectors/__init__.py:20-28(module)
  stage: pattern_detection
  alternative_considered: Alphabetical ordering was rejected; confidence-based dynamic ordering was deferred
    for future enhancement
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/detectors/__init__.py'
- id: BD-003
  type: B
  content: Cross-detector score calibration with detector-specific profiles before aggregation
  rationale: Detector-specific calibration profiles normalize raw pattern scores before aggregation, preventing
    detectors with inherently higher or lower base rates from dominating the composite ranking. This ensures
    that a high-quality cup-with-handle and a high-quality NR7 can be fairly compared despite their different
    signal frequencies and base rate characteristics. Without calibration, statistical bias would cause
    certain pattern types to be systematically over- or under-represented in top results.
  evidence: backend/app/analysis/patterns/calibration.py:16-114(module)
  stage: calibration
  alternative_considered: Equal-weight aggregation without calibration was rejected due to demonstrable
    base-rate differences across pattern types
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/calibration.py'
- id: BD-004
  type: B/BA
  content: 'Calibration profile for VCP: quality_min=45, confidence_bias=+0.01'
  rationale: VCP pattern receives a positive confidence bias (+0.01) because the metric inherently measures
    structural soundness (tightening bases) which correlates strongly with institutional accumulation.
    The quality_min threshold of 45 establishes a minimum structural threshold, filtering out loose VCP
    formations that lack the compression characteristics predictive of breakout strength. This bias reflects
    empirical observation that VCP quality scores underestimate true signal strength relative to other
    pa
  evidence: backend/app/analysis/patterns/calibration.py:41-49(module)
  stage: calibration
  alternative_considered: Neutral calibration was considered but rejected based on backtested correlation
    between VCP structural quality and subsequent volatility expansion
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/calibration.py'
- id: BD-005
  type: B/BA
  content: 'Calibration profile for ThreeWeeksTight: readiness_min=50 (highest among detectors)'
  rationale: ThreeWeeksTight has the highest readiness_min threshold (50) because the pattern's predictive
    power is highly sensitive to the exact timing of the consolidation resolution. A tight 3WT that breaks
    out before full readiness typically produces weaker moves or false signals. The elevated threshold
    ensures only mature consolidations with sufficient basing time are signaled, reducing whipsaws while
    preserving the pattern's characteristic quick, explosive moves once confirmed.
  evidence: backend/app/analysis/patterns/calibration.py:50-58(module)
  stage: calibration
  alternative_considered: Lower threshold matching other detectors was rejected due to higher false signal
    rate observed in historical testing
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/calibration.py'
- id: BD-006
  type: B
  content: 'Calibration profile for NR7InsideDay: quality_max=65, confidence_max=0.78 (lowest among detectors)'
  rationale: NR7InsideDay receives the lowest caps (quality_max=65, confidence_max=0.78) because the pattern
    has inherently high false-positive rates due to volatility clustering artifacts. The narrow range
    of a single day provides limited structural information, making high confidence claims statistically
    unjustified. These caps ensure NR7 signals are appropriately weighted below longer-duration patterns
    in composite scoring while still capturing the pattern's utility as a near-term volatility catalyst.
  evidence: backend/app/analysis/patterns/calibration.py:96-104(module)
  stage: calibration
  alternative_considered: Higher caps were rejected due to elevated false signal rates in validation testing
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/calibration.py'
  vague_rationale: true
- id: BD-007
  type: B
  content: 'Aggregation rank score formula: confidence*0.55 + quality*0.25 + readiness*0.20'
  rationale: The 55/25/20 weighting hierarchy prioritizes confidence (how certain the pattern is correct)
    over quality (structural soundness) and readiness (timing maturity). This reflects the trading principle
    that correct direction and timing matter more than perfect structure—a high-confidence breakout from
    a developing pattern often outperforms a low-confidence perfect formation. The formula balances conviction
    with structure, ensuring signals have both high pattern certainty and reasonable setup quality
  evidence: backend/app/analysis/patterns/calibration.py:257(module)
  stage: calibration
  alternative_considered: Equal weighting (33/33/33) was rejected; quality-weighted (40/30/30) was tested
    but showed inferior signal-to-noise in validation
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/calibration.py'
- id: BD-008
  type: B
  content: 'Candidate setup score weights: quality=0.45, readiness=0.30, confidence=0.25'
  rationale: Pre-aggregation candidate scoring weights quality highest (0.45) because raw candidates represent
    potential, not yet calibrated signals. At the candidate stage, structural perfection is the primary
    filter—the setup must be architecturally sound before confidence calibration is meaningful. This contrasts
    with post-calibration aggregation where confidence becomes dominant. The 45/30/25 distribution ensures
    only high-quality candidates receive full calibration processing while filtering noise early
  evidence: backend/app/analysis/patterns/config.py:17(module)
  stage: calibration
  alternative_considered: Flat weighting was rejected; dominance of low-confidence candidates in results
    observed in alternative testing
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/config.py'
- id: BD-009
  type: B/BA
  content: ATR period = 14 for Wilder smoothing
  rationale: ATR period of 14 follows Welles Wilder's original specification in 'New Concepts in Technical
    Trading Systems,' which remains the most widely validated period for capturing true range across diverse
    market conditions. The 14-period window balances responsiveness to recent volatility while smoothing
    day-to-day noise. This standard enables comparison with broad market ATR readings and aligns with
    the majority of technical analysis literature and institutional trading systems.
  evidence: backend/app/analysis/patterns/readiness.py:130(module)
  stage: technical
  alternative_considered: Shorter 7-period ATR was tested but showed excessive sensitivity; longer 20-period
    showed sluggish response to volatility regime changes
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/readiness.py'
- id: BD-010
  type: B/BA
  content: Bollinger Band window = 20, stddev = 2.0
  rationale: The 20-period window aligns with the trading month concept (approximately 20 trading days)
    and represents John Bollinger's original specification. Standard deviation of 2.0 captures approximately
    95% of price action within bands under normal distribution assumptions. This combination is the most
    extensively backtested Bollinger Band configuration, providing reliable statistical bounds for identifying
    overbought/oversold conditions and squeeze detection across diverse instruments and timeframes.
  evidence: backend/app/analysis/patterns/readiness.py:141(module)
  stage: technical
  alternative_considered: BB 10-period was rejected due to excessive noise; BB 50-period showed lag making
    squeeze detection impractical
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/readiness.py'
- id: BD-011
  type: B/BA
  content: BB squeeze threshold = 20th percentile over 252-day lookback
  rationale: The 20th percentile squeeze threshold identifies true band compression events that historically
    precede volatility expansions. The 252-day lookback (approximately 1 trading year) provides sufficient
    statistical sample for percentile calculation while remaining responsive to secular market regime
    changes. This threshold filters common narrow range days from true squeeze conditions, ensuring only
    significant compression events trigger readiness signals.
  evidence: backend/app/analysis/patterns/readiness.py:148-152(module)
  stage: technical
  alternative_considered: 30th percentile was tested but flagged too many false squeeze signals; 10th
    percentile was too restrictive
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/readiness.py'
- id: BD-012
  type: B
  content: 'RS calculation: stock return minus benchmark return over weighted periods (63d:40%, 126d:20%,
    189d:20%, 252d:20%)'
  rationale: Relative strength uses a weighted multi-period calculation with heaviest weight (40%) on
    the short-term (63-day) component to capture recent momentum leadership, while distributing remaining
    weight across medium-term periods to ensure the reading reflects sustained, not just fleeting, outperformance.
    The decay structure (40/20/20/20) balances recency bias with structural trend identification, capturing
    both momentum and investment-quality leadership.
  evidence: backend/app/analysis/patterns/readiness.py:208-211(module)
  stage: technical
  alternative_considered: Equal weighting across periods was rejected; showed less predictive power for
    near-term outperformance; single-period 252d was rejected due to excessive lag
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/readiness.py'
- id: BD-013
  type: B/BA
  content: Volume SMA window = 50 days for volume ratio calculation
  rationale: The 50-day volume SMA provides a stable baseline for volume ratio calculation, balancing
    responsiveness to recent volume changes with enough smoothing to avoid noise from single-day anomalies.
    This window aligns with the commonly used 50-day price moving average, creating consistency between
    price and volume trend measurements. Volume ratios relative to this baseline effectively identify
    accumulation/distribution shifts.
  evidence: backend/app/analysis/patterns/readiness.py:155(module)
  stage: technical
  alternative_considered: 20-day SMA was tested but showed excessive sensitivity; 100-day showed sluggish
    response to volume regime changes
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/readiness.py'
- id: BD-014
  type: B/BA
  content: Weekly resample rule = 'W-FRI' (Friday week end)
  rationale: Friday week-ending (W-FRI) aligns with US market convention and ensures consistent weekly
    bar construction across each securities regardless of listing exchange. This prevents mixed week definitions
    that could cause gaps around holiday-shortened weeks. Friday closure also corresponds to institutional
    portfolio rebalancing and options expiration cycles that influence weekly price patterns.
  evidence: backend/app/analysis/patterns/technicals.py:33(module)
  stage: technical
  alternative_considered: Monday week-start was rejected due to non-standard market convention; month-end
    alignment was considered but adds complexity without clear benefit
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/technicals.py'
- id: BD-015
  type: B
  content: Exclude incomplete last period in weekly resampling
  rationale: Excluding the incomplete current week prevents false pattern signals from partial data that
    may not represent true weekly structure. A partially completed week could artificially inflate or
    deflate OHLC values, causing pattern detection algorithms to misidentify formations. This boundary
    condition ensures only complete weekly bars contribute to pattern analysis, maintaining signal integrity.
  evidence: backend/app/analysis/patterns/technicals.py:34(module)
  stage: technical
  alternative_considered: Including incomplete weeks was rejected due to demonstrated pattern misidentification
    in testing; partial bar interpolation was deferred
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/technicals.py'
- id: BD-016
  type: B/DK
  content: 'Swing detection: left=2, right=2 bars for local extrema'
  rationale: The 2-bar/2-bar swing definition identifies local extrema while filtering market noise and
    avoiding overfitting to minor price fluctuations. This symmetric window balances sensitivity to meaningful
    reversals against false signals from minor pullbacks. The configuration is widely used in Wyckoff-based
    analysis and N-day high/low calculations for swing trading strategies.
  evidence: backend/app/analysis/patterns/technicals.py:331-332(module)
  stage: technical
  alternative_considered: 1-bar/1-bar was rejected due to excessive noise; 3-bar/3-bar was rejected as
    too insensitive to meaningful reversals
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/technicals.py'
- id: BD-017
  type: B/BA
  content: 'RS line new high: current >= max-1e-12 over 252-day lookback'
  rationale: The 1e-12 epsilon tolerance handles floating-point precision issues when comparing RS values
    against historical maximums. Without this tolerance, values mathematically equal to the maximum might
    fail equality checks due to IEEE 754 representation artifacts. The 252-day lookback encompasses one
    trading year, capturing secular relative strength leadership. This boundary condition ensures stocks
    genuinely at RS highs are correctly identified without precision-induced false negatives.
  evidence: backend/app/analysis/patterns/readiness.py:225(module)
  stage: technical
  alternative_considered: Relative tolerance was rejected; absolute 1e-12 is simpler and sufficient for
    this use case
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/readiness.py'
- id: BD-018
  type: B
  content: 'Quiet day definition: volume < 0.8*SMA50 AND true_range < ATR14%'
  rationale: Quiet day detection requires both volume compression (below 80% of 50-day average) AND price
    range compression (below 14% of ATR) to distinguish true basing from days that merely lack volume
    but show normal price movement. The dual-condition filter prevents single-dimension quiet days from
    passing through, ensuring only consensus periods of low volatility and low participation are flagged.
    These periods often precede volatility expansion events tracked in readiness scoring.
  evidence: backend/app/analysis/patterns/readiness.py:178-180(module)
  stage: technical
  alternative_considered: Volume-only quiet day was rejected; testing showed range compression is necessary
    to identify true low-volatility periods; ATR threshold of 10% was tested but too restrictive
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/readiness.py'
- id: BD-019
  type: B/BA
  content: 'Cup-with-handle: 6-65 week duration, 8-50% depth, 90%+ recovery'
  rationale: Cup duration of 6-65 weeks encompasses the full spectrum from fast 1.5-month cups to extended
    1+ year formations, capturing the characteristic U-shape recovery that distinguishes cups from V reversals.
    Depth range of 8-50% excludes both too-shallow cups lacking meaningful base formation and catastrophic
    drawdowns where recovery psychology differs fundamentally. The 90%+ recovery threshold ensures the
    right cup wall reaches approximately the same level as the left, a prerequisite for valid cup fo
  evidence: backend/app/analysis/patterns/cup_handle.py:24-28(module)
  stage: pattern_detection
  alternative_considered: Shallower 5% minimum was rejected; testing showed insufficient basing depth
    for reliable pattern; 95% recovery was considered but too strict for volatile names
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/cup_handle.py'
- id: BD-020
  type: B/BA
  content: Cup curvature balance >= 0.35 required (U vs V shape)
  rationale: Curvature balance of 0.35 distinguishes proper U-shaped cups from V reversals or irregular
    bases. Values below 0.35 indicate V-shaped or irregular formations that lack the sustained basing
    time characteristic of institutional accumulation patterns. This metric ensures cups have sufficient
    time at the bottom for base-building before the handle forms, preventing premature breakout signals
    from sharp reversals.
  evidence: backend/app/analysis/patterns/cup_handle.py:282(module)
  stage: pattern_detection
  alternative_considered: Lower threshold 0.25 was rejected; too many V-shaped patterns passed through;
    0.50 was rejected as too strict, eliminating valid but angular cups
  _evidence_issues:
  - 'FN_NOT_FOUND: module in backend/app/analysis/patterns/cup_handle.py'
- id: BD-021
  type: B
  content: 'Handle: 1-5 weeks, max 15% depth, max 1.10 volume ratio'
  rationale: Handle specifications ensure the consolidation forms a proper pullback after cup completion
    without undermining the uptrend. Duration of 1-5 weeks is short enough to maintain momentum yet deep
    enough to flush weak holders. Maximum 15% depth ensures the handle doesn't become a significant correction
    that would signal trend failure rather than rest. Volume ratio cap of 1.10 prevents heavy-volume panic
    selling that would indicate distribution rather than the light pullback characteristic of healthy
  evidence: backend/app/analysis/patterns/cup_handle.py:31-34(module)
  stage: pattern_detection
  alternative_considered: 8-week handle maximum was rejected; extended handles showed weak breakout performance;
