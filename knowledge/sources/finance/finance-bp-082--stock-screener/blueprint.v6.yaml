    - accurate
    - maintained
    - primary
    fit_for:
    - Production market hours detection
    not_fit_for:
    - Legacy environments
  - name: pandas-market-calendars
    traits:
    - fallback
    - legacy
    fit_for:
    - Environments without exchange_calendars
    not_fit_for:
    - New installations
  default: exchange_calendars with pandas_market_calendars fallback
  _source: worker_resource
- id: slot-007
  name: twitter_ingestion
  description: xui-reader for free/cost-effective ingestion; Twitter API v2 for enterprise volume
  used_in_stages: []
  options:
  - name: xui-reader (Playwright UI)
    traits:
    - no-api
    - ui-scrape
    - browser-automation
    fit_for:
    - Reading tweets without Twitter API access
    not_fit_for:
    - High-volume ingestion, authenticated-only content
  - name: Twitter/X API v2
    traits:
    - official-api
    - rate-limited
    - requires-access
    fit_for:
    - High-volume, reliable ingestion
    not_fit_for:
    - Free tier insufficient, API access denied
  default: xui-reader
  _source: worker_resource
