id: finance-bp-050
name: Skorecard Scorecard Development Framework
version: 1.0.0
source:
  repository: repos/skorecard
  package: skorecard
  language: Python
  min_version: '3.9'
  commit_hash: 21217426bc5c62a2eec525d0b45662dccc2a93a3
  evidence_refs:
  - artifact: step2a_architecture.md
    description: Architecture skeleton with package structure, entry points, and subsystem
      definitions
  - artifact: step2b_verification.md
    description: Verified claims with line numbers and status confirmation
  - artifact: step2c_business_decisions.md
    description: 30 annotated business decisions with types, rationales, and evidence
  - artifact: step2d_usecases.md
    description: 27 known use cases with disambiguation fields
  projects:
  - repos/skorecard
sop_version: '3.4'
applicability:
  domain:
  - CRD
  - DAT
  - Credit Scoring
  - Scorecard Modeling
  task_type: Feature Engineering / Binning / Supervised Learning
  description: 'Framework for building credit scorecard models in Python with a scikit-learn-compatible
    API.

    Supports optimal binning, Weight of Evidence (WoE) encoding, Information Value
    (IV) calculation,

    and end-to-end scorecard development with logistic regression.

    '
  prerequisites:
  - Python >= 3.9
  - pandas >= 1.5.3
  - scikit-learn >= 0.23.2
  - numpy >= 1.19.5, <2.0.0
  - scipy >= 1.5.2
  - category_encoders >= 2.2.2
  - optbinning >= 0.8.0
  - pyyaml
  - Binary classification target variable
  - Credit risk domain understanding (event=default, non-event=good)
  not_suitable_for:
  - Multi-class classification problems
  - Regression tasks
  - Unsupervised clustering without target variable
  - Time-series specific modeling
  - Regulatory Basel IRB compliance (no built-in PD/LGD/EAD)
  - Real-time streaming data processing
stages:
- id: stage_1_data_preparation
  name: Data Preparation
  order: 1
  responsibility: Data Engineer / Credit Analyst
  interface:
    inputs:
    - name: X
      type: pd.DataFrame
      description: Feature matrix with column names
    - name: y
      type: np.ndarray
      description: Binary target (1=event/default, 0=non-event/good)
    outputs:
    - name: X_clean
      type: pd.DataFrame
      description: Validated feature matrix
    - name: y_clean
      type: np.ndarray
      description: Validated binary target
    required_methods:
    - ensure_dataframe(X)
    - _check_y(y)
  replaceable_points:
  - component: BaseBucketer._check_y
    alternatives:
    - custom target validation
    - pandas validation
  design_decisions:
  - ref: BD-5
    description: Binary classification only - fundamental design constraint
  - ref: BD-16
    description: 'Event/Non-Event convention: Class 1=Event(bad), Class 0=Non-event(good)'
  acceptance_hints:
  - y contains only binary values {0, 1}
  - No NaN in target variable
  - Sufficient class balance for statistical significance
  - Column names are strings
  required_methods:
  - name: ensure_dataframe
    description: (X) → ', '_check_y(y)']}
    evidence: see stage interface
  key_behaviors:
  - behavior: '[''y contains only binary values {0, 1}'', ''No NaN in target variable'',
      ''Sufficien'
    description: '[''y contains only binary values {0, 1}'', ''No NaN in target variable'',
      ''Sufficient class balance for statistical significance'', ''Column names are
      strings'']'
    evidence: see acceptance_hints
- id: stage_2_feature_prebucketing
  name: Feature Pre-Bucketing (Optional)
  order: 2
  responsibility: Data Scientist
  interface:
    inputs:
    - name: X
      type: pd.DataFrame
      description: Raw feature matrix
    - name: y
      type: np.ndarray
      description: Binary target
    - name: bucketer
      type: BaseBucketer
      description: Initial bucketer (typically DecisionTreeBucketer)
    outputs:
    - name: X_prebucketed
      type: pd.DataFrame
      description: Pre-bucketed feature matrix
    - name: prebucket_mapping
      type: FeaturesBucketMapping
      description: Pre-bucket boundaries for each feature
    required_methods:
    - BaseBucketer.fit(X, y)
    - BaseBucketer.transform(X)
  replaceable_points:
  - component: prebucketing_strategy
    alternatives:
    - DecisionTreeBucketer(max_n_bins=50, min_bin_size=0.02)
    - EqualFrequencyBucketer(n_bins=50)
    - AgglomerativeClusteringBucketer(n_bins=50)
  design_decisions:
  - ref: BD-7
    description: 'Default prebucketing: DecisionTreeBucketer(max_n_bins=50, min_bin_size=0.02)'
  - ref: BD-29
    description: Two-step bucketing for computational optimization
  acceptance_hints:
  - High-cardinality features reduced to manageable buckets
  - Special values (outliers) identified and flagged
  - Missing values assigned to missing bucket
  required_methods:
  - name: BaseBucketer.fit
    description: (X, y) → ', 'BaseBucketer.transform(X)']}
    evidence: see stage interface
  key_behaviors:
  - behavior: '[''High-cardinality features reduced to manageable buckets'', ''Special
      values (out'
    description: '[''High-cardinality features reduced to manageable buckets'', ''Special
      values (outliers) identified and flagged'', ''Missing values assigned to missing
      bucket'']'
    evidence: see acceptance_hints
- id: stage_3_feature_bucketing
  name: Feature Bucketing / Binning
  order: 3
  responsibility: Data Scientist / Credit Modeler
  interface:
    inputs:
    - name: X
      type: pd.DataFrame
      description: Feature matrix (raw or pre-bucketed)
    - name: y
      type: np.ndarray
      description: Binary target
    - name: bucketer
      type: BaseBucketer
      description: Bucketing strategy
    outputs:
    - name: bucket_ids
      type: pd.DataFrame
      description: Integer bucket assignments per feature
    - name: bucket_mapping
      type: FeaturesBucketMapping
      description: Bucket boundaries and labels for each feature
    required_methods:
    - BaseBucketer.fit(X, y)
    - BaseBucketer.transform(X)
    - BaseBucketer.bucket_table(column)
  replaceable_points:
  - component: bucketing_strategy
    alternatives:
    - OptimalBucketer (supervised, monotonic)
    - DecisionTreeBucketer (supervised)
    - EqualWidthBucketer (unsupervised)
    - EqualFrequencyBucketer (unsupervised)
    - AgglomerativeClusteringBucketer (unsupervised)
    - UserInputBucketer (manual boundaries)
    - OrdinalCategoricalBucketer (categorical)
    - AsIsCategoricalBucketer (pre-bucketed categorical)
    - AsIsNumericalBucketer (pre-bucketed numerical)
  design_decisions:
  - ref: BD-8
    description: 'Default final bucketing: OptimalBucketer(max_n_bins=6, min_bin_size=0.05)'
  - ref: BD-9
    description: 'Default OptimalBucketer: max_n_bins=10, min_bin_size=0.05'
  - ref: BD-10
    description: 'Default missing value treatment: separate bucket with ID -1'
  - ref: BD-11
    description: 'Monotonic trend constraint: monotonic_trend=''auto_asc_desc'''
  - ref: BD-17
    description: 'WoE formula direction: WoE = ln(%Non-event / %Event)'
  acceptance_hints:
  - Bucket event rates are monotonically ordered (for supervised methods)
  - Each bucket meets minimum bin size threshold
  - Missing values handled separately
  - Special values assigned dedicated buckets
  - IV > 0.02 for at least some features (moderate predictive power)
  required_methods:
  - name: BaseBucketer.fit
    description: (X, y) → ', 'BaseBucketer.transform(X)', 'BaseBucketer.bucket_table(column)']}
    evidence: see stage interface
  key_behaviors:
  - behavior: '[''Bucket event rates are monotonically ordered (for supervised methods)'',
      ''Each '
    description: '[''Bucket event rates are monotonically ordered (for supervised
      methods)'', ''Each bucket meets minimum bin size threshold'', ''Missing values
      handled separately'', ''Special values assigned dedicated buckets'', ''IV >
      0.02 for at least some features (moderate predictive power)'']'
    evidence: see acceptance_hints
- id: stage_4_woe_encoding
  name: Weight of Evidence (WoE) Encoding
  order: 4
  responsibility: Data Scientist
  interface:
    inputs:
    - name: bucket_ids
      type: pd.DataFrame
      description: Bucket assignments from Stage 3
    - name: y
      type: np.ndarray
      description: Binary target
    outputs:
    - name: X_woe
      type: np.ndarray / pd.DataFrame
      description: WoE-encoded features for model input
    required_methods:
    - WoeEncoder.fit(X, y)
    - WoeEncoder.transform(X)
  replaceable_points:
  - component: encoder
    alternatives:
    - category_encoders.woe.WOEEncoder
    - custom WoE implementation
  design_decisions:
  - ref: BD-3
    description: 'Epsilon for WoE: 1e-5 to prevent division by zero'
  - ref: BD-17
    description: WoE = ln(%Non-event / %Event)
  - ref: BD-19
    description: IV = Σ(%Non-event - %Event) × WoE
  acceptance_hints:
  - WoE values are monotonically ordered with bucket event rates
  - No infinite or NaN WoE values
  - IV calculated for each feature
  required_methods:
  - name: WoeEncoder.fit
    description: (X, y) → ', 'WoeEncoder.transform(X)']}
    evidence: see stage interface
  key_behaviors:
  - behavior: '[''WoE values are monotonically ordered with bucket event rates'',
      ''No infinite or'
    description: '[''WoE values are monotonically ordered with bucket event rates'',
      ''No infinite or NaN WoE values'', ''IV calculated for each feature'']'
    evidence: see acceptance_hints
- id: stage_5_feature_selection
  name: Feature Selection
  order: 5
  responsibility: Data Scientist / Credit Analyst
  interface:
    inputs:
    - name: X_woe
      type: pd.DataFrame
      description: WoE-encoded features
    - name: y
      type: np.ndarray
      description: Binary target
    - name: bucket_mapping
      type: FeaturesBucketMapping
      description: Bucket mappings from Stage 3
    outputs:
    - name: selected_features
      type: List[str]
      description: Feature names selected for final model
    - name: iv_scores
      type: Dict[str, float]
      description: Information Value per feature
    - name: psi_scores
      type: Dict[str, float]
      description: Population Stability Index (optional)
    required_methods:
    - iv(X, y)
    - psi(X1, X2)
  replaceable_points:
  - component: selection_criterion
    alternatives:
    - IV threshold (e.g., IV > 0.02)
    - PSI threshold (e.g., PSI < 0.1)
    - Correlation analysis
    - Stepwise selection
  design_decisions:
  - ref: BD-4
    description: 'Epsilon for IV/PSI: 1e-4'
  - ref: BD-15
    description: 'IV Scoring rounding: digits=3'
  - ref: BD-19
    description: 'IV formula: Σ(%Non-event - %Event) × WoE'
  - ref: BD-20
    description: 'PSI formula: same as IV but comparing populations'
  acceptance_hints:
  - Selected features have IV > 0.02 (some predictive power)
  - Features with IV > 0.5 flagged as suspicious (potential data leakage)
  - PSI < 0.1 indicates stable population
  required_methods:
  - name: iv
    description: (X, y) → ', 'psi(X1, X2)']}
    evidence: see stage interface
  key_behaviors:
  - behavior: '[''Selected features have IV > 0.02 (some predictive power)'', ''Features
      with IV >'
    description: '[''Selected features have IV > 0.02 (some predictive power)'', ''Features
      with IV > 0.5 flagged as suspicious (potential data leakage)'', ''PSI < 0.1
      indicates stable population'']'
    evidence: see acceptance_hints
- id: stage_6_model_training
  name: Logistic Regression Model Training
  order: 6
  responsibility: Data Scientist
  interface:
    inputs:
    - name: X_woe
      type: pd.DataFrame
      description: WoE-encoded, selected features
    - name: y
      type: np.ndarray
      description: Binary target
    outputs:
    - name: model
      type: LogisticRegression
      description: Fitted logistic regression with statistics
    - name: coefficients
      type: pd.DataFrame
      description: Coefficients with p-values and standard errors
    required_methods:
    - LogisticRegression.fit(X, y, calculate_stats=True)
    - LogisticRegression.get_stats()
  replaceable_points:
  - component: model_type
    alternatives:
    - skorecard.LogisticRegression (with stats)
    - sklearn.linear_model.LogisticRegression
  design_decisions:
  - ref: BD-6
    description: Logistic Regression as base model (WoE + LR = standard scorecard)
  - ref: BD-13
    description: 'Standard error: inverse of Fisher information matrix'
  - ref: BD-14
    description: 'P-value: normal distribution approximation 2*norm.sf(|z|)'
  acceptance_hints:
  - Model converges without warnings
  - Coefficients have expected signs (higher WoE → lower probability of default)
  - P-values < 0.05 for most selected features
  - No multicollinearity warnings
  required_methods:
  - name: LogisticRegression.fit
    description: (X, y, calculate_stats=True) → ', 'LogisticRegression.get_stats()']}
    evidence: see stage interface
  key_behaviors:
  - behavior: '[''Model converges without warnings'', ''Coefficients have expected
      signs (higher W'
    description: '[''Model converges without warnings'', ''Coefficients have expected
      signs (higher WoE → lower probability of default)'', ''P-values < 0.05 for most
