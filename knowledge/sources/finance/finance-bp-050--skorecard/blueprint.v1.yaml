- id: BD-INT-001
  type: B/BA
  content: 'INTERACTION: BD039 (WoeEncoder epsilon=0.0001) × BD008 (metrics.py epsilon=0.00001)
    → Inconsistent WoE values across pipeline stages'
  rationale: 'The WoeEncoder uses 10x larger epsilon than metrics.py for WoE calculations.
    This creates subtle but systematic differences in WoE values computed during transform
    versus bucket_table reporting. WHEN PROBLEMATIC: For buckets with very few events/non-events
    (sparse bins), the 10x difference in smoothing produces materially different WoE
    values, leading to inconsistent model behavior and confusing diagnostic reports
    where bucket_table WoE differs from actual encoded WoE.'
  evidence: skorecard/preprocessing/_WoEEncoder.py:55(skorecard)
  stage: cross_stage
- id: BD-INT-002
  type: B/BA
  content: 'INTERACTION: BD002 (categorical threshold <10 unique values) × BD035 (exclude
    min/max in EqualWidth/EqualFrequency) → Edge bucket exclusion corrupts low-cardinality
    feature bucketing'
  rationale: 'BD002 automatically treats features with <10 unique values as categorical.
    However, BD035 excludes min/max values from bucket boundary calculation in EqualWidth
    and EqualFrequency bucketers. For discrete features like age groups 1-9, this
    can exclude the actual minimum (1) or maximum (9) from buckets, creating invalid
    bin assignments. WHEN PROBLEMATIC: When low-cardinality integer features (e.g.,
    1-9, 0-5) are bucketed using EqualWidth or EqualFrequency, the edge exclusion
    removes valid categorical levels, corrupting the bucket mapping and breaking the
    categorical treatment assumption.'
  evidence: skorecard/skorecard.py:176(skorecard)
  stage: cross_stage
- id: BD-INT-003
  type: B/BA
  content: 'INTERACTION: BD024 (max 100 unique values for OptimalBucketer) × BD036
    (cat_cutoff=None default) → High-cardinality categorical features silently fail
    OptimalBinning'
  rationale: 'OptimalBucketer silently requires max 100 unique values per feature
    (BD024), but the default cat_cutoff=None (BD036) means rare categories are never
    grouped. For high-cardinality features like ZIP codes (1000+ values), OptimalBinning
    will fail or produce degenerate results. WHEN PROBLEMATIC: When users run default
    bucketing on datasets with high-cardinality categoricals (e.g., merchant codes,
    product IDs, geographic codes with 500+ levels), the pipeline either errors out
    or requires manual intervention that is not clearly documented.'
  evidence: skorecard/bucketers/bucketers.py:154(skorecard)
  stage: cross_stage
- id: BD-INT-004
  type: B/BA
  content: 'INTERACTION: BD004 (missing bucket -1) × BD034 (gamma=0 no regularization)
    × BD007 (min_bin_size=0.05) → Rare missing patterns create unreliable WoE estimates'
  rationale: 'Missing values receive separate bucket -1 (BD004) which may have very
    few observations. Gamma=0 (BD034) allows optimal binning to create bins with vastly
    different event rates without constraint. When combined, missing buckets with
    extreme event rates (very few observations but high/low risk) are preserved without
    regularization. WHEN PROBLEMATIC: If missing data is non-random (NMAR), the extreme
    WoE for missing bucket may be spurious. With gamma=0, these unreliable estimates
    directly impact model coefficients. The 5% min_bin_size floor (BD007) doesn''t
    protect sparse missing buckets.'
  evidence: skorecard/bucket_mapping.py:103(skorecard)
  stage: cross_stage
