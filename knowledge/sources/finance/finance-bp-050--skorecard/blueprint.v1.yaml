  design_decisions:
  - ref: BD-1
    description: 'Rescaling formula: factor=pdo/ln(2), offset=ref_score-factor*ln(ref_odds)'
  - ref: BD-2
    description: 'Default rescaling: pdo=20, ref_score=100, ref_odds=1 (Basel standard)'
