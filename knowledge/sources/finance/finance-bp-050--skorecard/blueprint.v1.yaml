- id: BD-INT-008
  type: B/BA
  content: 'INTERACTION: BD021 (L2 regularization) × BD022 (multicollinearity via
    coefficient sign conflicts) → L2 regularization suppresses sign conflicts, weakening
    suppressor detection'
  rationale: 'L2 regularization (BD021) shrinks coefficient magnitudes for correlated
    features toward zero. BD022 detects multicollinearity by checking if coefficient
    signs conflict with WoE signs. However, when L2 suppresses coefficient magnitudes,
    sign conflicts become less pronounced and may go undetected. WHEN PROBLEMATIC:
    Highly correlated features with similar WoE patterns will have coefficients equally
