      type: LogisticRegression
      description: Fitted logistic regression model
    - name: bucket_mapping
      type: FeaturesBucketMapping
      description: Feature bucket mappings
    - name: pdo
      type: int
      description: 'Points to Double the Odds (default: 20)'
    - name: ref_score
      type: int
      description: 'Reference score at reference odds (default: 100)'
    - name: ref_odds
      type: float
      description: 'Reference odds (default: 1)'
