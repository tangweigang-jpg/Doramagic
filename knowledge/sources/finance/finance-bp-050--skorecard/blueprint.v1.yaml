audit_checklist_summary:
  version: '1.0'
  domain: Credit Risk Development (CRD)
  last_updated: '2024-01-15'
  sections:
  - category: Data Quality
    items:
    - id: DQ-1
      description: Target variable is binary {0, 1}
      mandatory: true
      verification: Confirm y contains only 0 and 1
    - id: DQ-2
      description: No missing values in target
      mandatory: true
      verification: pd.isna(y).sum() == 0
    - id: DQ-3
      description: Event/Non-event convention documented
      mandatory: true
      verification: 1=event(default), 0=non-event(good)
    - id: DQ-4
      description: Missing values handled consistently
      mandatory: true
      verification: Missing bucket assigned, not imputed
  - category: Feature Engineering
    items:
    - id: FE-1
      description: Pre-bucketing strategy documented
      mandatory: true
      verification: DecisionTreeBucketer or equivalent
    - id: FE-2
      description: Final bucketing strategy documented
      mandatory: true
      verification: OptimalBucketer or equivalent
    - id: FE-3
      description: Monotonicity constraint justified
      mandatory: false
      verification: Business case for monotonic features
    - id: FE-4
      description: Minimum bin size met
      mandatory: true
      verification: min_bin_size >= 0.05 for final buckets
    - id: FE-5
      description: Special values handled
      mandatory: true
      verification: Outliers assigned dedicated buckets
    - id: FE-6
      description: WoE formula verified
      mandatory: true
      verification: WoE = ln(%non-event / %event)
  - category: Feature Selection
    items:
    - id: FS-1
      description: IV calculated for all features
      mandatory: true
      verification: iv() function applied to each feature
    - id: FS-2
      description: Feature selection criteria documented
      mandatory: true
      verification: IV threshold (typically > 0.02)
    - id: FS-3
      description: Suspicious IV values investigated
      mandatory: true
      verification: IV > 0.5 flagged as potential leakage
    - id: FS-4
      description: PSI calculated if monitoring
      mandatory: false
      verification: psi() applied to train/test
  - category: Model Development
    items:
    - id: MD-1
      description: Logistic regression convergence confirmed
      mandatory: true
      verification: No convergence warnings
    - id: MD-2
      description: Coefficient signs verified
      mandatory: true
      verification: Expected direction (higher WoE = lower PD)
    - id: MD-3
      description: P-values documented
      mandatory: true
      verification: get_stats() output saved
    - id: MD-4
      description: Multicollinearity checked
      mandatory: true
      verification: No suppressor effect warnings
    - id: MD-5
      description: Model coefficients documented
      mandatory: true
      verification: Coefficient table exported
  - category: Scorecard Scaling
    items:
    - id: SC-1
      description: Scale parameters documented
      mandatory: true
      verification: pdo, ref_score, ref_odds recorded
    - id: SC-2
      description: PDO-Odds relationship verified
      mandatory: true
      verification: Score doubles odds every PDO points
    - id: SC-3
      description: Score range documented
      mandatory: true
      verification: Expected range (e.g., 300-700)
    - id: SC-4
      description: Points are integers
      mandatory: true
      verification: All points are int type
    - id: SC-5
      description: Scorecard table exported
      mandatory: true
      verification: Points per bucket per feature
  - category: Reporting
    items:
    - id: RP-1
      description: Bucket tables generated
      mandatory: true
      verification: bucket_table() output saved
    - id: RP-2
      description: Bucket plots generated
      mandatory: false
      verification: plot_bucket() output saved
    - id: RP-3
      description: IV summary table
      mandatory: true
      verification: All features ranked by IV
    - id: RP-4
      description: Model statistics documented
      mandatory: true
      verification: get_stats() output saved
  - category: Deployment
    items:
    - id: DP-1
      description: Bucket mappings saved to YAML
      mandatory: true
      verification: save_yml() called
    - id: DP-2
      description: Model artifact versioned
      mandatory: true
      verification: joblib/pickle with version
