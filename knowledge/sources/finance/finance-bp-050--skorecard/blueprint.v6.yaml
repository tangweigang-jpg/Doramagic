replaceable_slots:
- id: slot-001
  name: demo_dataset
  description: Use bundled zip for speed/offline; OpenML for completeness; Kaggle for version-tracked
    canonical source
  used_in_stages: []
  options:
  - name: bundled UCI_Credit_Card.zip
    traits:
    - fast
    - offline
    - read-only
    - small-subset
    fit_for:
    - Quick demos, CI tests, tutorials that need a stable minimal dataset
    not_fit_for:
    - Research requiring the full 30k-row dataset or each 24 features
  - name: OpenML full dataset
    traits:
    - full-coverage
    - network-required
    - cached
    - all-24-features
    fit_for:
    - Full-scale experimentation with each original features
    not_fit_for:
    - Offline environments, fast demos, CI pipelines without network
  - name: Kaggle UCI dataset
    traits:
    - full-coverage
    - auth-required
    - kaggle-account
    fit_for:
    - Users who want the canonical Kaggle-hosted version with version tracking
    not_fit_for:
    - Automated pipelines, environments without Kaggle credentials
  default: bundled UCI_Credit_Card.zip
  _source: worker_resource
- id: slot-002
  name: optimal_binning_algorithm
  description: Use optbinning for production credit scoring; sklearn DecisionTree for lightweight/fast
    pre-bins; UserInputBucketer when domain expertise must override data-driven bins
  used_in_stages: []
  options:
  - name: optbinning.OptimalBinning
    traits:
    - supervised
    - monotonic-constraints
    - MIQP-solver
    - pre-binning
    fit_for:
    - Production optimal binning with monotonic trend enforcement and cardinality constraints
    not_fit_for:
    - Lightweight installs (optbinning ~250 MB), environments where binary dependencies are problematic
  - name: DecisionTreeClassifier (sklearn)
    traits:
    - supervised
    - tree-based
    - pre-binning-only
    fit_for:
    - Quick approximate binning without installing optbinning; used internally for pre-binning
    not_fit_for:
    - Fine-grained monotonic constraints, large-cardinality categoricals
  - name: manual / UserInputBucketer
    traits:
    - no-training
    - expert-driven
    - YAML-serialisable
    fit_for:
    - Expert-defined bins enforced without optimisation; compliance/audit scenarios
    not_fit_for:
    - Data-driven binning
  default: optbinning.OptimalBinning
  _source: worker_resource
- id: slot-003
  name: plotting_backend
  description: Use plotly for each visualisation; Dash adds the interactive web app layer; matplotlib
    is a theoretical fallback not currently wired in
  used_in_stages: []
  options:
  - name: plotly
    traits:
    - interactive
    - web-ready
    - static-export
    fit_for:
    - Interactive Jupyter notebooks, HTML dashboards, mkdocs static image export
    not_fit_for:
    - Environments without plotly installed; purely script-based pipelines without reporting
  - name: Dash figures
    traits:
    - interactive
    - web-app
    - callback-driven
    fit_for:
    - The interactive bucket-editing web app (fit_interactive); embedded in dashboards
    not_fit_for:
    - Static reports or non-Dash pipelines
  - name: matplotlib (not currently used)
    traits:
    - static
    - no-JS
    - script-friendly
    fit_for:
    - Headless environments where JavaScript charting is unavailable
    not_fit_for:
    - Not currently implemented in skorecard
  default: plotly
  _source: worker_resource
- id: slot-004
  name: feature_encoding
  description: Use category_encoders WOEEncoder for standard scorecard WoE; sklearn preprocessing for
    general ML feature transforms
  used_in_stages: []
  options:
  - name: category_encoders WOEEncoder
    traits:
    - Weight-of-Evidence
    - supervised
    - sklearn-compatible
    fit_for:
    - Standard scorecard WoE encoding within sklearn pipeline
    not_fit_for:
    - Users who need target encoding with different smoothing priors
  - name: sklearn CategoryEncoder variants
    traits:
    - ordinal
    - one-hot
    - target-encoding
    fit_for:
    - General ML; not WoE-specific but available in sklearn pipelines
    not_fit_for:
    - Credit scorecard WoE interpretation requirements
  default: category_encoders WOEEncoder
  _source: worker_resource
