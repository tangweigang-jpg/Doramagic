- id: BD-088
  type: B/BA
  content: 'INTERACTION: [BD-044] × [BD-026] × [BD-055] → Random state propagation creates partial reproducibility
    with misleading documentation'
  rationale: 'BD-044 claims random_state propagates to each bucketers and logistic regression, but the
    implementation only covers sklearn''s random_state parameter. BD-026 and BD-055 both default to ''lbfgs''
    solver, which has internal randomness not controlled by random_state (subtle numerical differences
    in convergence path). The audit finding confirms no global np.random.seed() control exists. This creates
    a hidden risk cascade: two runs with identical random_state may produce slightly different coefficients,
    different WoE boundaries, and thus different scores for borderline applicants. In regulated credit
    scoring, this partial reproducibility is dangerous because it suggests reproducibility that does not
    truly exist, potentially causing audit failures when exact score reproduction is required.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Fork-safe random seeding with explicit RNG selection would provide true reproducibility
- id: BD-089
  type: B
  content: 'INTERACTION: [BD-033] × [BD-009] × [BD-068] → Auto categorical detection creates boundary
    condition at exactly 10 unique values'
  rationale: 'BD-033 auto-detects categorical features as those with <10 unique values, meaning features
    with exactly 10 unique values are treated as numerical. BD-009 states categoricals bypass prebucketing,
    while BD-068 applies OptimalBucketer (supervised) to numericals. This creates a silent contradiction:
    a legitimate categorical variable with exactly 10 categories (common in credit scoring: credit_score_bands,
    payment_history_ratings) will receive numerical binning treatment, potentially producing meaningless
    tree-based splits. The boundary at exactly 10 is arbitrary and undocumented in user-facing documentation,
    so users cannot predict when their categorical features will be mishandled. The alternative considered
    (10 unique values = categorical) was not implemented, leaving this as a hidden trap.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: ≤10 threshold would include borderline categoricals but require explicit user
    override
  vague_rationale: true
- id: BD-090
  type: B/BA
  content: 'INTERACTION: [BD-011] × [BD-066] × [BD-008] → Stacked minimum bin size thresholds may over-constrain
    sparse features'
  rationale: 'BD-011 sets OptimalBucketer min_bin_size=0.05 (5%), BD-066 sets DecisionTreeBucketer min_bin_size=0.05,
    but BD-008 shows DecisionTreeBucketer default at skorecard.py:187 as 0.03 (3%). These stacked constraints
    mean a feature with sparse distributions may have: (1) DecisionTreeBucketer merging bins due to 3%
    threshold, producing pre-bins, (2) then OptimalBucketer merging further due to 5% threshold. For a
    100K sample with a rare category at 2% frequency, the feature will have at most 2 meaningful bins
    regardless of true distribution complexity. The amplification occurs because both stages enforce minimum
    size independently, and the weaker first-stage constraint (3%) is documented in skorecard.py while
    the stronger second-stage (5%) is in bucketers.py, making the compounding effect invisible without
    tracing both files.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unified minimum bin size across stages would make threshold behavior predictable
- id: BD-091
  type: BA/M
  content: 'INTERACTION: [BD-067] × [BD-068] → Dual supervised stages create target leakage amplification
    across pipeline'
  rationale: BD-067 defaults to DecisionTreeBucketer (supervised prebucketing using target), and BD-068
    defaults to OptimalBucketer (supervised final bucketing using target). This means target information
    flows into BOTH pipeline stages, creating compounded target leakage risk. In credit scoring, if the
    same training data is used to fit both stages, the model effectively sees the target twice during
    feature construction, overfitting to training patterns. The alternative considered (unsupervised prebucketing)
    exists but is not the default. This amplification is particularly dangerous because each stage individually
    appears reasonable—both are standard scorecard practices—but their combination creates a gap where
    overfitting can occur silently. Model validation using standard metrics will not detect this because
    in-sample fit looks excellent.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unsupervised prebucketing (EqualWidth/Frequency) as default would reduce leakage
    risk
  vague_rationale: true
- id: BD-092
  type: BA/M
  content: 'RISK CASCADE: [BD-007] → [BD-037] → [BD-054] → [BD-068] → [BD-028] → [BD-029]: Feature cardinality
    failure cascades to score inconsistency'
  rationale: When a numerical feature has >100 unique values and highly skewed distribution, the prebucketing
    stage (BD-054) may fail to reduce to ≤50 unique values if min_bin_size constraints prevent sufficient
    splitting. This causes OptimalBucketer (BD-068) to receive fewer than expected pre-bins, producing
    fewer than max_n_bins=10 final buckets. The scorecard rescaling (BD-028) then allocates points across
    unequal bin ranges, and the per-feature score contribution (BD-029) shows inconsistent point spreads
    across features. For borderline applicants near bucket boundaries, this can mean the difference between
    approval and denial based on arbitrary prebucketing decisions. The cascade is particularly dangerous
    because each stage silently adjusts—the final scorecard shows 10 bins per feature but the underlying
    discretization is constrained by upstream cardinality limits, making the model less stable than it
    appears.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Adaptive cardinality limits would prevent silent degradation but add complexity
- id: BD-093
  type: B/BA
  content: 'RISK CASCADE: [BD-030] → [BD-076] → [BD-045] → [BD-029]: Binary-only enforcement cascade through
    model validation to score interpretability'
  rationale: 'BD-030 and BD-076 enforce binary classification only, but BD-045 raises warnings for suppressor
    effects (coefficient sign contradicts WoE). The cascade emerges when: (1) non-binary-like data (extremely
    imbalanced classes, or mislabeled data appearing as multi-class) enters the system, (2) WoE calculations
    produce edge cases where negative WoE pairs with positive coefficient, (3) the suppressor warning
    fires but the binary-only enforcement continues processing, (4) per-feature score contribution (BD-029)
    produces negative points for high-risk bins, (5) adverse action reason codes become logically inconsistent.
    The risk cascade is amplified because the binary-only enforcement is presented as a hard guarantee
    (BD-076 ''binary_only'' tag) but the suppressor detection (BD-045) implicitly acknowledges that non-binary-like
    patterns can occur within nominally binary data. Users trusting the binary-only guarantee may not
    investigate suppressor warnings, leading to production scorecards with internally contradictory reason
    codes.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Hard error on suppressor detection would block production but ensure consistency
- id: BD-094
  type: BA/M
  content: 'CONTRADICTION: [BD-056] (integer rounding) × [BD-028] (theoretical Basel formula) → Rounding
    creates systematic score deviation from Basel standard'
  rationale: 'BD-028 implements the Basel-compliant formula Score = factor × ln(odds) + offset, which
    produces continuous values aligned with Basel banking standards. BD-056 then applies standard rounding
    (round-half-up to integers) for scorecard usability. This creates a contradiction: Basel standards
    specify precise score values for regulatory comparison across institutions, but rounding introduces
    up to ±0.5 point deviation per feature. For a scorecard with 20 features, cumulative rounding error
    can exceed ±5 points, potentially shifting borderline applicants across approval thresholds. The contradiction
    is particularly problematic because BD-056 is presented as a minor implementation detail while BD-028
    is presented as a regulatory requirement—both cannot be fully satisfied simultaneously. Institutions
    relying on exact Basel-conformant scores will have non-conformant scores due to rounding, while those
    prioritizing integer scores have theoretically non-compliant scores.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Decimal score precision would satisfy Basel but violate scorecard usability
    conventions
