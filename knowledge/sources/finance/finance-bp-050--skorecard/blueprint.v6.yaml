data_flow:
  description: End-to-end scorecard development pipeline from raw data to deployed scorecard
  nodes:
  - id: raw_data
    label: Raw Data (X, y)
    type: input
    stage: stage_1_data_preparation
  - id: prebucket_mapping
    label: Pre-Bucket Mapping
    type: intermediate
    stage: stage_2_feature_prebucketing
  - id: X_prebucketed
    label: Pre-Bucketed Features
    type: intermediate
    stage: stage_2_feature_prebucketing
  - id: bucket_mapping
    label: FeaturesBucketMapping
    type: intermediate
    stage: stage_3_feature_bucketing
  - id: bucket_ids
    label: Bucket ID Assignments
    type: intermediate
    stage: stage_3_feature_bucketing
  - id: X_woe
    label: WoE-Encoded Features
    type: intermediate
    stage: stage_4_woe_encoding
  - id: iv_scores
    label: Information Value Scores
    type: intermediate
    stage: stage_5_feature_selection
  - id: X_selected
    label: Selected Features
    type: intermediate
    stage: stage_5_feature_selection
  - id: model
    label: Logistic Regression Model
    type: intermediate
    stage: stage_6_model_training
  - id: coefficient_stats
    label: Coefficient Statistics (p-values)
    type: intermediate
    stage: stage_6_model_training
  - id: scorecard
    label: ScoreCardPoints Scaler
    type: intermediate
    stage: stage_7_scorecard_rescaling
  - id: scorecard_table
    label: Scorecard Points Table
    type: output
    stage: stage_7_scorecard_rescaling
  - id: final_report
    label: Validation Report
    type: output
    stage: stage_8_validation_reporting
  - id: deployed_artifact
    label: Deployed Scorecard
    type: output
    stage: stage_9_deployment
  edges:
  - from: raw_data
    to: prebucket_mapping
    label: fit()
    stage_ref: stage_2_feature_prebucketing
  - from: raw_data
    to: X_prebucketed
    label: transform()
    stage_ref: stage_2_feature_prebucketing
  - from: X_prebucketed
    to: bucket_mapping
    label: fit()
    stage_ref: stage_3_feature_bucketing
  - from: X_prebucketed
    to: bucket_ids
    label: transform()
    stage_ref: stage_3_feature_bucketing
  - from: bucket_ids
    to: X_woe
    label: fit_transform()
    stage_ref: stage_4_woe_encoding
  - from: X_woe
    to: iv_scores
    label: calculate IV
    stage_ref: stage_5_feature_selection
  - from: X_woe
    to: X_selected
    label: filter by IV
    stage_ref: stage_5_feature_selection
  - from: X_selected
    to: model
    label: fit()
    stage_ref: stage_6_model_training
  - from: model
    to: coefficient_stats
    label: get_stats()
    stage_ref: stage_6_model_training
  - from: model
    to: scorecard
    label: ScoreCardPoints.fit()
    stage_ref: stage_7_scorecard_rescaling
  - from: bucket_mapping
    to: scorecard
    label: provide mappings
    stage_ref: stage_7_scorecard_rescaling
  - from: scorecard
    to: scorecard_table
    label: get_scorecard_points()
    stage_ref: stage_7_scorecard_rescaling
  - from: bucket_mapping
    to: final_report
    label: bucket_table()
    stage_ref: stage_8_validation_reporting
  - from: model
    to: final_report
    label: get_stats()
    stage_ref: stage_8_validation_reporting
  - from: bucket_mapping
    to: deployed_artifact
    label: save_yml()
    stage_ref: stage_9_deployment
  - from: model
    to: deployed_artifact
    label: joblib.dump()
    stage_ref: stage_9_deployment
  - from: scorecard
    to: deployed_artifact
    label: include in artifact
    stage_ref: stage_9_deployment
global_contracts:
  constraints:
  - id: GC-1
    name: Binary Classification Only
    description: Target variable y must contain only binary values {0, 1}
    severity: critical
    validation: assert set(np.unique(y)) == {0, 1}
  - id: GC-2
    name: Monotonic WoE Ordering
    description: WoE values must be monotonically ordered with event rates for supervised bucketers
    severity: warning
    validation: WoE(bucket_i) <= WoE(bucket_j) iff event_rate(bucket_i) <= event_rate(bucket_j)
  - id: GC-3
    name: Minimum Bin Size
    description: Each bucket must contain at least min_bin_size * N observations
    severity: warning
    validation: bucket_count >= min_bin_size * total_count
  - id: GC-4
    name: No Missing in Target
    description: Target variable must not contain NaN values
    severity: critical
    validation: assert not pd.isna(y).any()
  - id: GC-5
    name: Bucket ID Validity
    description: Every bucket IDs must be non-negative integers for regular buckets
    severity: error
    validation: bucket_ids >= -2 (where -1=missing, -2=other, -3+=special)
  - id: GC-6
    name: WoE Numerical Stability
    description: WoE calculations must not produce inf or NaN
    severity: error
    validation: np.isfinite(woe_values).all()
  - id: GC-7
    name: Integer Scorecard Points
    description: Final scorecard points must be integers
    severity: info
    validation: scorecard_points.dtype in [int, np.int32, np.int64]
  - id: GC-8
    name: PDO-Odds Relationship
    description: Score increase of PDO must double the odds
    severity: critical
    validation: verify_scaling(scorecard, pdo, ref_score, ref_odds)
  invariants:
  - id: INV-1
    name: Score Range
    description: Total score range = sum of each feature point ranges
    formula: Score_total = Σ Score_feature_i
  - id: INV-2
    name: IV Aggregation
    description: Total IV = sum of individual feature IVs
    formula: IV_total = Σ IV_i
  - id: INV-3
    name: WoE-Probability Relationship
    description: WoE_i = ln((1-p_i)/p_i) where p_i is probability of event in bucket i
    formula: p_i = 1 / (1 + exp(WoE_i))
business_decisions:
- id: BD-001
  type: B/DK
  content: y can be DataFrame, Series, or ndarray - each normalized to 1D array
  rationale: The API accepts multiple input types (DataFrame, Series, ndarray) and normalizes each to
    1D array internally to maximize user flexibility. This boundary ensures sklearn compatibility while
    hiding internal complexity from users. The normalization happens early in the pipeline, ensuring consistent
    downstream processing regardless of input format provided by the user.
  evidence: skorecard/bucketers/base_bucketer.py:42(_check_y)
  stage: stage_1_data_preparation
