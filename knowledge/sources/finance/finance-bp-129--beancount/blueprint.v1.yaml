resources:
- id: res-slot-001
  type: replaceable_component
  name: price_data_source
  path: null
  description: Choose based on frequency of price updates needed and whether you require
    automated data fetching
  used_in_stages: []
  options:
  - name: Manual Price Directives
    traits:
    - static
    - self-contained
    - version-controlled
    fit_for:
    - Small portfolios, rare transactions, non-tradeable assets
    not_fit_for:
    - Large portfolios with frequent trades requiring automated price updates
  - name: Beanprice (external price fetcher)
    traits:
    - automated
    - real-time
    - plugin-based
    fit_for:
    - Users who need automated price fetching from external sources
    not_fit_for:
    - Offline environments, custom price sources not supported by beanprice
  - name: beancount-prices (plugin)
    traits:
    - automated
    - historical
    - plugin-based
    fit_for:
    - Users migrating from v2 who need existing price fetching plugins
    not_fit_for:
    - New v3 users (v3 removed built-in price fetching)
  default: Manual Price Directives
  _source: worker_resource
- id: res-slot-002
  type: replaceable_component
  name: ledger_storage_format
  path: null
  description: Choose based on security requirements and analysis needs
  used_in_stages: []
  options:
  - name: Beancount Syntax (Plain Text)
    traits:
    - human-readable
    - version-controlled
    - diff-friendly
    fit_for:
    - Users who value transparency, version control, and manual editing
    not_fit_for:
    - Users who prefer GUI interfaces or encrypted storage
  - name: Encrypted Beancount Files
    traits:
    - encrypted
    - GPG-based
    - secure
    fit_for:
    - Users with sensitive financial data who need encryption at rest
    not_fit_for:
    - Users who need multi-user access or cloud sync with encryption
  - name: SQLite Database Export
    traits:
    - relational
    - queryable
    - analytical
    fit_for:
    - Users who need SQL-based analysis, complex queries, or integration with BI tools
    not_fit_for:
    - Daily transaction entry, version control scenarios
  default: Beancount Syntax (Plain Text)
  _source: worker_resource
- id: res-slot-003
  type: replaceable_component
  name: cli_framework
  path: null
  description: Choose based on interface preference (CLI vs web)
  used_in_stages: []
  options:
  - name: Built-in Click CLI
    traits:
    - included
    - simple
    - sufficient
    fit_for:
    - Most users; provides bean-check, bean-doctor, bean-example, bean-format
    not_fit_for:
    - Users who need extensive customization or additional commands
  - name: Third-party CLI Tools
    traits:
    - web-based
    - visualization
    - extended features
    fit_for:
    - Users who prefer web interfaces over command-line
    not_fit_for:
    - Terminal-only environments, minimal installation preferences
  default: Built-in Click CLI
  _source: worker_resource
- id: res-slot-004
  type: replaceable_component
  name: documentation_source
  path: null
  description: Choose based on need for authoritative source vs. accessibility
  used_in_stages: []
  options:
  - name: Google Docs (Official Source)
    traits:
    - official
    - authoritative
    - requires access
    fit_for:
    - Contributors and users who need the latest official documentation
    not_fit_for:
    - Offline use, reproducible builds
  - name: Repository-hosted Markdown
    traits:
    - offline-capable
    - version-controlled
    - reproducible
    fit_for:
    - Users who prefer local documentation, reproducible builds
    not_fit_for:
    - Users who want the absolute latest updates from authors
  - name: beancount.github.io (Published Site)
    traits:
    - published
    - stable
    - accessible
    fit_for:
    - End users seeking documentation
    not_fit_for:
    - Contributors or those needing source references
  default: beancount.github.io (Published Site)
  _source: worker_resource
