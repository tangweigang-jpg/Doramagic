id: finance-bp-129
name: beancount
sop_version: '3.6'
source:
  projects:
  - beancount
  commit_hash: daa3ee24a0e5a93a8cad9af71b5752c1f1b38369
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: double-entry bookkeeping from text files
  description: A double-entry bookkeeping computer language that lets you define financial
    transaction records in a text file, read them in memory, generate a variety of
    reports from them, and provides a web interface.
  prerequisites: Users need to understand double-entry accounting principles and the
    Beancount syntax for defining transactions, accounts, and directives
  not_suitable_for: Real-time financial transactions, multi-user ledger systems, complex
    derivatives pricing, or users who prefer GUI-based accounting interfaces
stages:
- id: parsing
  name: Parsing
  order: 1
  responsibility: Tokenize and parse Beancount DSL files into directive data structures.
    Provides the foundation for each downstream processing.
  interface:
    inputs:
    - Beancount source text files (*.beancount)
    - Include directives
    - Plugin directives
    outputs:
    - List of Directive NamedTuples (Transaction, Open, Close, etc.)
    - Parser errors
    - Options map
  required_methods:
  - name: Builder.build
    description: Accumulates parsed directives via grammar callbacks
    evidence: beancount/parser/grammar.py:145(Builder)
  - name: OptDesc.convert
    description: Option descriptor with converter and defaults for parsing option
      values
    evidence: beancount/parser/options.py:151(OptDesc)
  key_behaviors:
  - behavior: Lexer/Parser split using PLY
    description: Standard parser generator with grammar written in .y file; enables
      precise error reporting with source locations
    evidence: beancount/parser/lexer.l:1(LexBuilder)
  - behavior: Directives as immutable NamedTuples
    description: Immutability ensures entries can be safely shared/cached; NamedTuples
      provide structural typing without overhead
    evidence: beancount/core/data.py:93(Open)
  - behavior: Date-primary sorting with line number as secondary key
    description: Beancount is date-oriented; line number resolves ordering within
      same date
    evidence: beancount/core/data.py:82(comment)
  replaceable_points:
  - name: booking_method
    description: Strategy for matching inventory lots on reduction
    options:
    - name: STRICT
      traits:
      - exact match only
      - no size tolerance
      fit_for:
      - simple portfolios
      - precise lot tracking
      not_fit_for:
      - rounding errors
      - partial lot sales
    - name: STRICT_WITH_SIZE
      traits:
      - exact size match
      - size tolerance fallback
      fit_for:
      - size-exact matches
      - reduced ambiguity errors
      not_fit_for:
      - approximate lots
    - name: FIFO
      traits:
      - first-in-first-out
      - chronological matching
      fit_for:
      - tax reporting
      - simple cost basis
      not_fit_for:
      - specific lot identification
    - name: LIFO
      traits:
      - last-in-first-out
      - reverse chronological
      fit_for:
      - tax minimization scenarios
      not_fit_for:
      - IFO preference
      - simple reporting
    - name: HIFO
      traits:
      - highest-in-first-out
      - cost optimization
      fit_for:
      - tax minimization
      - high-cost lot first
      not_fit_for:
      - specific identification requirements
    - name: NONE
      traits:
      - no lot matching
      - no cost tracking
      fit_for:
      - simple currencies
      - no cost basis needed
      not_fit_for:
      - investments with cost basis
    - name: AVERAGE
      traits:
      - average cost calculation
      - currently disabled
      fit_for:
      - not implemented
      not_fit_for:
      - currently returns error
    default: STRICT
  - name: plugin
    description: Transform entries via custom module with __plugins__ tuple
    options:
    - name: any module with __plugins__
      traits:
      - custom transformation
      - function tuple signature
      fit_for:
      - custom entry synthesis
      - balance adjustments
      - validations
      not_fit_for:
      - core parsing
      - non-Python environments
    default: PLUGINS_PRE + user_plugins + PLUGINS_AUTO + PLUGINS_POST
  design_decisions:
  - Lexer/Parser split using PLY (Python Lex-Yacc) enables precise error reporting
    with source locations (beancount/parser/lexer.l:1)
  - Directives are immutable NamedTuples for safe sharing/caching without overhead
    (beancount/core/data.py:93)
  - Every directives require date; lineno is secondary sort key for date-oriented
    processing (beancount/core/data.py:82)
  - Options parsed per-file with aggregation for includes allows include files to
    extend operating_currency (beancount/loader.py:527)
  acceptance_hints:
  - All .beancount files parse without syntax errors
  - Directive NamedTuples are created with correct field types
  - Options map is populated with user-defined values
  - Include files are processed and merged correctly
- id: booking
  name: Booking (Lot Matching)
  order: 2
  responsibility: Match inventory reductions to existing lots using configurable methods;
    infer missing posting amounts via interpolation
  interface:
    inputs:
    - Sorted list of directives with incomplete postings
    - Options map with booking method
    outputs:
    - Directives with cost specs converted to costs
    - Balance errors from failed interpolations
  required_methods:
  - name: Inventory.reduce
    description: Aggregates positions using convert functions for units, cost, weight,
      or value
    evidence: beancount/core/inventory.py:336(reduce)
  - name: booking_method_STRICT
    description: Default lot matching algorithm requiring exact match
    evidence: beancount/parser/booking_method.py:376(_BOOKING_METHODS)
  key_behaviors:
  - behavior: Two-pass booking
    description: Reductions first, then augmentations; booking affects only reductions
      while augmentations remain incomplete for interpolation
    evidence: beancount/parser/booking_full.py:54(step1)
  - behavior: CostSpec separates incomplete from resolved costs
    description: User-provided cost spec may be incomplete; resolved to Cost with
      date/label after booking
    evidence: beancount/core/position.py:45(CostSpec)
  - behavior: MISSING sentinel for unfilled numbers
    description: MISSING propagates through computations and surfaces in errors; None
      would be ambiguous
    evidence: beancount/core/number.py:31(MISSING)
  - behavior: Strategy pattern for booking methods
    description: New methods can be added without modifying handle_ambiguous_matches
      via _BOOKING_METHODS dict dispatch
    evidence: beancount/parser/booking_method.py:376(_BOOKING_METHODS)
  replaceable_points:
  - name: booking_method_fn
    description: Lot matching algorithm
    options:
    - name: booking_method_STRICT
      traits:
      - exact match
      - no tolerance
      fit_for:
      - simple portfolios
      - precise tracking
      not_fit_for:
      - rounding issues
      - partial lots
    - name: booking_method_FIFO
      traits:
      - first-in-first-out
      - chronological
      fit_for:
      - tax reporting
      - simple basis
      not_fit_for:
      - specific lots
    - name: booking_method_LIFO
      traits:
      - last-in-first-out
      - reverse chronological
      fit_for:
      - tax scenarios
      not_fit_for:
      - FIFO preference
    - name: booking_method_HIFO
      traits:
      - highest-in-first-out
      fit_for:
      - cost optimization
      not_fit_for:
      - specific identification
    - name: booking_method_NONE
      traits:
      - no matching
      - no cost tracking
      fit_for:
      - simple currencies
      not_fit_for:
      - investments
    default: booking_method_STRICT
  design_decisions:
  - 'Two-pass booking: reductions first, then augmentations allows interpolation to
    fill missing amounts (beancount/parser/booking_full.py:54)'
  - CostSpec separates incomplete from resolved costs enabling user-friendly input
    (beancount/core/position.py:45)
  - Booking method dispatch via _BOOKING_METHODS dict for extensibility (beancount/parser/booking_method.py:376)
  - STRICT_WITH_SIZE fallback for size-exact matches reduces false ambiguity errors
    (beancount/parser/booking_method.py:144)
  - MISSING sentinel for unfilled numbers (not None) propagates and surfaces in errors
    (beancount/core/number.py:31)
  acceptance_hints:
  - Every postings have complete amounts after booking
  - Inventory balances to zero for matched lots
  - Balance errors are reported for failed interpolations
  - CostSpec objects are resolved to Cost objects
- id: transformation
  name: Transformation (Plugins)
  order: 3
  responsibility: Apply user plugins and built-in transformations to synthesized entries,
    pad balances, check assertions
  interface:
    inputs:
    - Fully booked directives
    - Plugin configuration
    outputs:
    - Transformed directives
    - Plugin errors
  required_methods:
  - name: DocumentError.check
    description: Validates document directives during processing
    evidence: beancount/ops/documents.py:21(DocumentError)
  - name: PadError.check
    description: Validates pad entry synthesis
    evidence: beancount/ops/pad.py:21(PadError)
  key_behaviors:
  - behavior: Plugin processing modes
    description: Raw mode skips built-in plugins for custom workflows; default runs
      full pipeline
    evidence: beancount/loader.py:662(plugin_processing_mode)
  - behavior: Documents plugin always prepended
    description: Document directives may be needed by other plugins
    evidence: beancount/loader.py:54(PLUGINS_PRE)
  - behavior: pad and balance always appended as post plugins
    description: These synthesize entries that should exist before validation
    evidence: beancount/loader.py:65(PLUGINS_POST)
  - behavior: Plugin architecture via __plugins__ tuple
    description: Each function is (entries, options_map) -> (entries, errors); errors
      accumulated in pipeline
    evidence: beancount/loader.py:689(hasattr(module, __plugins__))
  replaceable_points:
  - name: plugin_module
    description: Any Python module with __plugins__ tuple of function names
    options:
    - name: custom modules
      traits:
      - user-defined
      - __plugins__ tuple
      fit_for:
      - custom transformations
      - business logic
      not_fit_for:
      - non-Python workflows
    - name: beancount.ops.documents
      traits:
      - pre-plugin
      - document directive processing
      fit_for:
      - receipt management
      not_fit_for:
      - no document requirements
    - name: beancount.ops.pad
      traits:
      - post-plugin
      - balance padding synthesis
      fit_for:
      - ensuring minimum balances
      not_fit_for:
      - fixed balance accounts
    - name: beancount.ops.balance
      traits:
      - post-plugin
      - assertion checking
      fit_for:
      - balance validation
      not_fit_for:
      - disabled validation
    default: auto + pad + balance
  design_decisions:
  - 'Plugin processing mode: raw vs default for custom workflows (beancount/loader.py:662)'
  - Documents plugin is always prepended for dependency ordering (beancount/loader.py:54)
  - pad and balance are always appended as post plugins for proper synthesis timing
    (beancount/loader.py:65)
  - Plugin architecture via __plugins__ tuple allows users to add transformations
    without modifying loader (beancount/loader.py:689)
  acceptance_hints:
  - Every plugins execute without errors
  - Transformed directives maintain sorting invariant
  - Errors from plugins are accumulated and reported
  - Pre and post plugin ordering is preserved
- id: realization
  name: Realization
  order: 4
  responsibility: Convert chronological list of directives into account tree with
    running balances for reporting
  interface:
    inputs:
    - Date-filtered list of directives
    outputs:
    - RealAccount tree with txn_postings and balance Inventory per node
  required_methods:
  - name: RealAccount.txn_postings
    description: Contains postings for transactions affecting this account
    evidence: beancount/core/realization.py:45(RealAccount)
  - name: Amount.__slots__
    description: Prevents dynamic attributes to enforce immutability beyond NamedTuple
    evidence: beancount/core/amount.py:47(__slots__)
  key_behaviors:
  - behavior: RealAccount extends dict with account component keys
    description: Natural tree representation; Assets:Brokerage keyed by 'Brokerage'
      under 'Assets'
    evidence: beancount/core/realization.py:45(class RealAccount)
  - behavior: Balance stored as Inventory per RealAccount
    description: Computed incrementally; supports cost-basis and currency segregation
    evidence: beancount/core/realization.py:67(self.balance)
  - behavior: Balances computed via Inventory.reduce with convert functions
    description: 'Separation of concerns: Inventory holds positions, convert module
      defines aggregation semantics'
    evidence: beancount/core/inventory.py:336(reduce)
  - behavior: Amount uses __slots__ = () to prevent dynamic attributes
    description: Enforces immutability beyond NamedTuple; prevents accidental attribute
      assignment
    evidence: beancount/core/amount.py:47(__slots__)
  replaceable_points:
  - name: balance_reducer
    description: Function to aggregate positions (units, cost, weight, value)
    options:
    - name: convert.get_units
      traits:
      - total units
      - no cost basis
      fit_for:
      - simple balance reporting
      not_fit_for:
      - cost basis tracking
    - name: convert.get_cost
      traits:
      - cost basis
      - unrealized P&L
      fit_for:
      - investment reporting
      not_fit_for:
      - currency-only accounts
    - name: convert.get_weight
      traits:
      - weighted cost basis
      fit_for:
      - portfolio analysis
      not_fit_for:
      - simple ledger
    - name: convert.get_value
      traits:
      - market value
      - requires price database
      fit_for:
      - portfolio valuation
      not_fit_for:
      - accounts without prices
    default: convert.get_units
  design_decisions:
  - RealAccount extends dict with account component keys for natural tree representation
    (beancount/core/realization.py:45)
  - Balance stored as Inventory per RealAccount for incremental computation (beancount/core/realization.py:67)
  - Balances computed via Inventory.reduce with convert functions for separation of
    concerns (beancount/core/inventory.py:336)
  - Amount uses __slots__ = () to prevent dynamic attributes and enforce immutability
    (beancount/core/amount.py:47)
  acceptance_hints:
  - Account tree structure matches hierarchical account naming
  - Running balances are computed correctly per account
  - Postings are associated with correct account nodes
  - Balance type (units, cost, value) matches reducer function
- id: summarization
  name: Summarization
  order: 5
  responsibility: Fold historical entries into balance sheet opening transactions;
    support period reporting
  interface:
    inputs:
    - Every directives
    - Period boundaries (begin/end dates)
    outputs:
    - Summarized entries replacing historical with net transactions
  required_methods:
  - name: AccountTypes.equity
    description: NamedTuple of root account type names including equity for retained
      earnings
    evidence: beancount/core/account_types.py:26(AccountTypes)
  - name: summarize.open
    description: Rolls income/expenses to equity at period boundaries
    evidence: beancount/ops/summarize.py:44(open)
  key_behaviors:
  - behavior: Income/expenses rolled to equity at period boundaries
    description: 'Standard accounting: P&L closes to retained earnings; enables balance
      sheet for any period'
    evidence: beancount/ops/summarize.py:44(open)
  - behavior: Conversion entries at open date for zero-priced items
    description: Ensures accounts with no price history can be converted
    evidence: beancount/ops/summarize.py:99(conversions)
  - behavior: GetAccounts class uses getattr dispatch on entry class name
    description: 'Extensible: new directive types automatically handled by adding
      method with class name'
    evidence: beancount/core/getters.py:52(getattr)
  replaceable_points:
  - name: conversion_currency
    description: Target currency for balance conversions
    options:
    - name: any currency
      traits:
      - user-specified
      - any valid currency code
      fit_for:
      - multi-currency reporting
      not_fit_for:
      - no conversion needed
    - name: operating_currency
      traits:
      - from options map
      - primary ledger currency
      fit_for:
      - single currency reporting
      not_fit_for:
      - multi-currency requirements
    default: USD
  design_decisions:
  - Income/expenses rolled to equity at period boundaries for standard accounting
    compliance (beancount/ops/summarize.py:44)
  - Conversion entries at open date for zero-priced items ensures conversion capability
    (beancount/ops/summarize.py:99)
  - GetAccounts class uses getattr dispatch on entry class name for extensibility
    (beancount/core/getters.py:52)
  acceptance_hints:
  - Period boundaries create correct opening/closing transactions
  - Income/expense accounts are closed to equity
  - Conversion entries are generated for zero-priced items
  - Summarized entries maintain accounting identity
- id: validation
  name: Validation
  order: 6
  responsibility: Verify invariants hold after each transformations; ensure accounting
    rules are not violated
  interface:
    inputs:
    - Final directives
    - Options map
    outputs:
    - List of ValidationError if constraints violated
  required_methods:
  - name: ValidationError.check
    description: Error type for constraint violations during validation
    evidence: beancount/ops/validation.py:29(ValidationError)
  - name: validate_open_close
    description: Ensures accounts are opened before use and closed appropriately
    evidence: beancount/ops/validation.py:50(validate_open_close)
  key_behaviors:
  - behavior: Open/close account lifecycle validation
    description: Ensures accounts are opened before use and closed appropriately
    evidence: beancount/ops/validation.py:50(validate_open_close)
  - behavior: Currency constraints from Open declaration
    description: Accounts restrict which currencies they hold; prevents mixing
    evidence: beancount/ops/validation.py:250(validate_currency_constraints)
  - behavior: Extra validations injected at load time
    description: Allows custom validation rules without modifying core
    evidence: beancount/loader.py:357(extra_validations)
  replaceable_points:
  - name: extra_validations
    description: Additional validation functions to run
    options:
    - name: list of (fn, options_map) -> errors
      traits:
      - user-defined
      - pipeline-injected
      fit_for:
      - custom business rules
      - domain-specific checks
      not_fit_for:
      - core accounting rules
    default: None
  design_decisions:
  - Open/close account lifecycle validation ensures accounting integrity (beancount/ops/validation.py:50)
  - Currency constraints from Open declaration prevent mixing of currencies (beancount/ops/validation.py:250)
  - Extra validations injected at load time for custom validation rules (beancount/loader.py:357)
  acceptance_hints:
  - Every validation errors are collected and reported
  - Accounts are opened before first transaction
  - Accounts are closed after last transaction
  - Currency constraints are enforced per Open directive
data_flow:
- from_stage: parsing
  to_stage: booking
  data: Directives with CostSpec (incomplete costs), Booking enum in options
- from_stage: booking
  to_stage: transformation
  data: Directives with Cost (resolved costs), BalanceError list
- from_stage: transformation
  to_stage: transformation
  data: Directives flow through PLUGINS_PRE → user plugins → PLUGINS_AUTO → PLUGINS_POST
- from_stage: transformation
  to_stage: validation
  data: Fully transformed directives, accumulated errors
- from_stage: parsing
  to_stage: validation
  data: Options map (for account types, tolerance, etc.)
- from_stage: validation
  to_stage: realization
  data: Validated directives for report generation
global_contracts:
- contract: Every directives are sorted by (date, lineno) via data.entry_sortkey
  evidence: beancount/core/data.py:708(entry_sortkey)
- contract: Entries are immutable NamedTuples; metadata (meta) is dict[str, Any]
  evidence: beancount/core/data.py:93(Open)
- contract: 'Inventory positions keyed by (currency: str, cost: Cost|None)'
  evidence: beancount/core/inventory.py:81(Inventory)
- contract: EMPTY_SET used for tags/links instead of None
  evidence: beancount/core/data.py:49(EMPTY_SET)
- contract: Decimal used for each monetary numbers (no float)
  evidence: beancount/core/number.py:1(Decimal)
- contract: MISSING sentinel used for incomplete numbers to be interpolated
  evidence: beancount/core/number.py:31(MISSING)
- contract: D() function handles commas as thousands separators
  evidence: beancount/core/number.py:41(D)
- contract: CURRENCY_RE regex defines valid currency symbols (uppercase + special
    chars including slash for currency pairs)
  evidence: beancount/core/amount.py:32(CURRENCY_RE)
business_decisions:
- id: BD-001
  type: B/DK
  content: Lexer/Parser split using PLY (Python Lex-Yacc)
  rationale: 'PLY provides a battle-tested parser generator with source location tracking.
    Grammar written in .y file enables precise error reporting with line/column information
    for debugging malformed entries. This is foundational: without accurate source
    mapping, each downstream error messages would be unhelpful.'
  evidence: beancount/parser/lexer.l:1(LexBuilder)
  stage: parsing
  alternative_considered: Hand-written recursive descent parser was considered but
    rejected due to grammar complexity and error reporting effort
- id: BD-002
  type: B
  content: Directives are immutable NamedTuples
  rationale: Immutability ensures entries can be safely shared, cached, and reused
    across transformations without defensive copying. NamedTuples provide structural
    typing via _fields without memory overhead of full class instances. This design
    allows entries to flow through plugin pipeline without risk of accidental mutation
    corrupting upstream state.
  evidence: beancount/core/data.py:93(Open)
  stage: parsing
  alternative_considered: Mutable dicts were rejected due to shared-state risks; frozen
    dataclasses rejected due to memory overhead
- id: BD-003
  type: B/RC
  content: Every directives require date; lineno is secondary sort key
  rationale: Beancount is fundamentally date-oriented for financial reporting. The
    line number secondary key resolves ordering conflicts when multiple directives
    share the same date. This ordering guarantee ensures deterministic balance calculations
    regardless of file reorganization or include ordering.
  evidence: beancount/core/data.py:82(comment)
  stage: parsing
  alternative_considered: Fully date-based ordering was rejected because users legitimately
    need same-day ordering control
  _evidence_issues:
  - 'FN_NOT_FOUND: comment in beancount/core/data.py'
- id: BD-004
  type: BA
  content: Options parsed per-file with aggregation for includes
  rationale: Allows include files to extend operating_currency and display_context
    without global modification. Top-level options dominate after aggregation, providing
    predictable override behavior. This enables modular ledger organization where
    shared settings live in included files while main file maintains control.
  evidence: beancount/loader.py:527(aggregate_options_map)
  stage: parsing
  alternative_considered: Global-only options were rejected; would require duplication
    across included files
- id: BD-005
  type: BA
  content: 'Two-pass booking: reductions first, then augmentations'
  rationale: Booking affects only reductions (debits). Leaving augmentations (credits)
    incomplete allows interpolation to fill missing lot amounts from available inventory.
    This sequencing ensures each potential matching candidates are known before finalizing
    which lots are consumed, preventing premature lot closure.
  evidence: beancount/parser/booking_full.py:556(book_reductions)
  stage: booking
  alternative_considered: Single-pass with backtracking was rejected due to complexity;
    two-pass is simpler and correct
- id: BD-006
  type: B
  content: CostSpec separates incomplete from resolved costs
  rationale: User-provided cost spec may be incomplete (missing date, label, or number).
    The CostSpec/_cost tuple distinguishes pending resolution from fully-specified
    Cost objects. After booking, incomplete specs resolve to Cost with assigned date/label.
    This separation prevents conflating user intent with computed values.
  evidence: beancount/core/position.py:45(CostSpec)
  stage: booking
  alternative_considered: Nullable fields on Cost were rejected; mixing incomplete/complete
    states in same type creates ambiguity
- id: BD-007
  type: BA
  content: Booking method dispatch via _BOOKING_METHODS dict
  rationale: Strategy pattern implementation enables adding new booking methods (FIFO,
    LIFO, MOST_RECENT, STRICT, etc.) without modifying handle_ambiguous_matches. Dictionary
    dispatch is O(1) and new methods register themselves via decorator pattern. This
    separation of strategy selection from ambiguity resolution enables clean extensibility.
  evidence: beancount/parser/booking_method.py:376(_BOOKING_METHODS)
  stage: booking
  alternative_considered: Class hierarchy for booking methods was rejected due to
    verbosity; dict dispatch is simpler
  _evidence_issues:
  - 'FN_NOT_FOUND: _BOOKING_METHODS in beancount/parser/booking_method.py'
- id: BD-008
  type: M/DK
  content: STRICT_WITH_SIZE fallback for size-exact matches
  rationale: When lot size exactly matches the posting amount, STRICT_WITH_SIZE prevents
    false ambiguity errors. Without this, size-exact matches would incorrectly trigger
    ambiguity handling that requires additional user specification. This fallback
    reduces user friction while maintaining strict matching semantics.
  evidence: beancount/parser/booking_method.py:124(booking_method_strict_with_size)
  stage: booking
  alternative_considered: Always strict matching was rejected; would require explicit
    resolution for every size-exact match
  _evidence_issues:
  - 'FN_NOT_FOUND: booking_method_strict_with_size in beancount/parser/booking_method.py'
- id: BD-009
  type: B
  content: MISSING sentinel for unfilled numbers (not None)
  rationale: 'MISSING sentinel propagates through computations and surfaces in error
    messages with meaningful context. Using None would be ambiguous: None could be
    a legitimate missing value OR an error in null-checking logic. MISSING makes absence
    explicit, ensuring bugs surface immediately rather than silent incorrect results.'
  evidence: beancount/core/number.py:31(MISSING)
  stage: booking
  alternative_considered: Using None was rejected due to ambiguity; Optional[T] wrapper
    was rejected due to verbosity
- id: BD-010
  type: BA
  content: 'Plugin processing mode: raw vs default'
  rationale: Raw mode skips built-in plugins (documents, pad, balance, tags, links)
    for custom workflows requiring full control over entry transformation. Default
    mode runs the complete standard pipeline. This dual-mode design supports both
    standard workflows and advanced use cases without compromising either.
  evidence: beancount/loader.py:662(plugin_processing_mode)
  stage: transformation
  alternative_considered: Conditional plugin skipping via options was rejected; dual
    mode is cleaner and explicit
  _evidence_issues:
  - 'FN_NOT_FOUND: plugin_processing_mode in beancount/loader.py'
- id: BD-011
  type: B/DK
  content: Documents plugin is always prepended
  rationale: Document directives may be needed by other plugins for validation or
    reference purposes. Prepending ensures Document entries exist before subsequent
    plugins run, enabling downstream consumers to access document metadata during
    their processing phase.
  evidence: beancount/loader.py:54(PLUGINS_PRE)
  stage: transformation
  alternative_considered: User-specified ordering was rejected; fixed prepended position
    ensures predictable behavior
  _evidence_issues:
  - 'FN_NOT_FOUND: PLUGINS_PRE in beancount/loader.py'
- id: BD-012
