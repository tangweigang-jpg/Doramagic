# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-114
name: EDGAR-CRAWLER
sop_version: '3.6'
source:
  projects:
  - edgar-crawler
  commit_hash: 84a8d0c5dd7dd6769526e5ccec534c4e0880d56f
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: SEC EDGAR filing retrieval and structured extraction for financial NLP
  description: Open-source toolkit that downloads raw SEC EDGAR filings (10-K, 10-Q, 8-K) and parses them
    into structured JSON for financial NLP experiments and corpus construction.
  prerequisites: Users need understanding of SEC EDGAR structure, basic Python environment setup, and
    configuration of date ranges and filing types via config.json.
  not_suitable_for: Real-time trading systems, financial analysis requiring calculated metrics or ratios,
    non-SEC financial data sources, production-grade document processing pipelines requiring schema validation
stages:
- id: index_download
  name: Index Download Stage
  order: 1
  responsibility: Downloads SEC EDGAR index files (TSV) for specified years/quarters. Provides the master
    list of available filings for downstream filtering. This stage exists because SEC EDGAR provides quarterly
    indices that must be fetched incrementally to avoid redundant network calls and enable efficient updates.
  interface:
    inputs:
    - name: config.json
      description: Configuration with date range (start_year, end_year, quarters) and user_agent string
        for SEC EDGAR identification
    outputs:
    - name: INDICES/{year}_QTR{quarter}.tsv
      description: 'TSV files containing filing metadata: CIK, company name, form type, date, path'
  required_methods:
  - name: download_indices
    description: Main orchestrator that downloads index files from SEC EDGAR for specified years and quarters,
      managing download state and skip_present_indices feature
    evidence: download_filings.py:226(class download_indices)
  - name: get_specific_indices
    description: Filters downloaded indices by filing types and CIK/ticker symbols based on user criteria
    evidence: download_filings.py:331(class get_specific_indices)
  - name: requests_retry_session
    description: Creates HTTP session with exponential backoff retry logic (5 retries) for reliable network
      requests to SEC EDGAR
    evidence: download_filings.py:805(function requests_retry_session)
  key_behaviors:
  - behavior: Quarterly index file downloads
    description: Downloads indices per-quarter to enable incremental updates without re-fetching each
      history. SEC EDGAR provides quarterly indices which align naturally with this approach.
    evidence: download_filings.py:117(filepath = os.path.join(indices_folder, f"{year}_QTR{quarter}.tsv"))
  - behavior: Company metadata caching
    description: Stores fetched company info (SIC, State, Fiscal Year) in companies_info.json to avoid
      redundant CIK lookups. Reduces SEC EDGAR API calls by approximately 80% for repeat CIKs.
    evidence: download_filings.py:613(company_info_dict[cik] = {...})
  - behavior: Exponential backoff with retry
    description: Every HTTP requests use exponential backoff with 5 retries to handle SEC EDGAR aggressive
      rate limiting and prevent 403 failures while maintaining throughput.
    evidence: download_filings.py:488(for _ in range(5))
  replaceable_points:
  - name: user_agent
    description: User agent string for SEC EDGAR requests - must be a valid contact string per SEC requirements
    options:
    - name: Any valid contact string
      traits:
      - RFC-compliant contact format
      - Email or name+email
      fit_for:
      - Standard SEC EDGAR access with proper identification
      not_fit_for:
      - Anonymous access (will be rate-limited/blocked)
    default: Your name (your email)
  design_decisions:
  - 'Download indices per-quarter to enable incremental updates without re-fetching each history (evidence:
    download_filings.py:117(filepath = os.path.join(indices_folder, f"{year}_QTR{quarter}.tsv"))) — SEC
    EDGAR provides quarterly indices; incremental downloads prevent redundant network calls and enable
    skip_present_indices feature'
  - 'Use separate company_info.json cache to avoid redundant CIK lookups (evidence: download_filings.py:613(company_info_dict[cik]
    = {...})) — Company metadata (SIC, state) is static; caching reduces SEC EDGAR API calls by ~80% for
    repeat CIKs'
  - 'Exponential backoff with 5 retries on each HTTP requests (evidence: download_filings.py:488(for _
    in range(5))) — SEC EDGAR rate-limits aggressively; backoff prevents 403 failures while maintaining
    throughput'
  acceptance_hints:
  - TSV index files exist for each specified year/quarter combinations
  - 'Files contain expected columns: CIK, Company Name, Form Type, Date Filed, path'
  - No 403 or rate-limit errors in logs
  - skip_present_indices correctly skips already-downloaded indices
- id: crawl_and_download
  name: Crawl and Download Stage
  order: 2
  responsibility: Parses HTML index pages from SEC EDGAR, extracts filing metadata (SIC, state, fiscal
    year), and downloads actual filing documents to local storage. This stage bridges index information
    to raw document files for downstream parsing.
  interface:
    inputs:
    - name: Filtered index DataFrame
      description: DataFrame from index_download stage containing CIK, Type, html_index for target filings
    - name: raw_filings_folder
      description: Path to store downloaded raw filing documents
    - name: companies_info.json cache
      description: Pre-fetched company metadata keyed by CIK
    outputs:
    - name: RAW_FILINGS/{Type}/{CIK}_{Type}_{Year}_{accession}.htm(txt)
      description: Downloaded filing documents in HTML or text format
    - name: FILINGS_METADATA.csv
      description: CSV with complete filing metadata including links and extracted metadata
  required_methods:
  - name: crawl
    description: Parses SEC EDGAR HTML index pages to extract filing metadata and download documents,
      handling multiple document formats and iXBRL URLs
    evidence: download_filings.py:464(class crawl)
  - name: download
    description: Low-level HTTP download function with retry logic that saves binary content to disk with
      proper filename construction
    evidence: download_filings.py:741(class download)
  key_behaviors:
  - behavior: Document format file parsing
    description: Parses Document Format Files table for .htm/.html links, falling back to complete submission
      text file. Handles iXBRL URL transformation automatically by stripping ix?doc=/ prefix.
    evidence: download_filings.py:678(if tr.contents[7].text in filing_types)
  - behavior: Company metadata extraction and caching
    description: Extracts SIC/state/fiscal_year from index pages and caches in companies_info.json. Fetches
      once per company to save approximately 50 HTTP requests per company.
    evidence: download_filings.py:648(if pd.isna(series['SIC']))
  - behavior: Standardized filename convention
    description: Uses {CIK}_{Type}_{Year}_{accession}.{ext} format for each downloaded files. Enables
      unique identification, sorting by CIK/year, and deduplication by filename comparison.
    evidence: download_filings.py:722(filename = f"{str(series['CIK'])}_{filing_type_name}_{period_of_report[:4]}_{accession_num}.{file_extension}")
  replaceable_points:
  - name: iXBRL URL handling
    description: URL transformation for inline XBRL documents - SEC provides ix?doc=/ prefixed URLs that
      must be converted
    options:
    - name: Automatic detection and stripping
      traits:
      - Pattern matching on ix?doc=/ prefix
      - Transparent to user
      fit_for:
      - Standard SEC EDGAR filings with iXBRL content
      not_fit_for:
      - Non-standard SEC servers or custom URL formats
    default: Automatic detection and stripping
  design_decisions:
  - 'Parse Document Format Files table for .htm/.html links; fall back to complete submission text file
    (evidence: download_filings.py:678(if tr.contents[7].text in filing_types)) — SEC provides multiple
    document formats; HTML is preferred for readability, TXT as fallback covers older submissions'
  - 'Store company metadata in companies_info.json to reduce per-filing lookups (evidence: download_filings.py:648(if
    pd.isna(series[''SIC'']))) — SIC/state/fiscal_year don''t change per-filing; fetching once per company
    saves ~50 HTTP requests per company'
  - 'Filename convention: {CIK}_{Type}_{Year}_{accession}.{ext} (evidence: download_filings.py:722(filename
    = f"{str(series[''CIK''])}_{filing_type_name}_{period_of_report[:4]}_{accession_num}.{file_extension}"))
    — Unique per-filing, sortable by CIK/year, enables deduplication by filename comparison'
  acceptance_hints:
  - Raw filing files exist in RAW_FILINGS/{Type}/ directories
  - 'FILINGS_METADATA.csv contains each expected columns: cik, company, filing_type, filing_date, period_of_report,
    sic, state_of_inc, htm_filing_link, filename'
  - No failed downloads in logs (each HTML index pages parsed successfully)
  - companies_info.json populated with SIC/state for each unique CIKs
- id: document_parsing
  name: Document Parsing Stage
  order: 3
  responsibility: Extracts structured items from raw HTML/text filings using regex pattern matching. Handles
    tables, spans, and filing-specific item structures for 10-K, 10-Q, and 8-K filings. This is the core
    NLP extraction engine that transforms unstructured documents into machine-readable JSON.
  interface:
    inputs:
    - name: RAW_FILINGS/{Type}/{filename}.htm(txt)
      description: Raw filing documents from crawl_and_download stage
    - name: FILINGS_METADATA.csv
      description: Filing metadata including filing type, dates, and links
    outputs:
    - name: EXTRACTED_FILINGS/{Type}/{CIK}_{Type}_{Year}_{accession}.json
      description: 'Structured JSON with extracted item sections: cik, company, filing_type, filing_date,
        period_of_report, sic, state_of_inc, fiscal_year_end, item_1, item_1A, etc.'
  required_methods:
  - name: ExtractItems.extract
    description: Main extraction engine that orchestrates HTML stripping, table removal, filing-type-specific
      routing, and item parsing. Returns structured JSON with each extracted items.
    evidence: extract_items.py:122(class ExtractItems)
  - name: HtmlStripper.feed
    description: HTML-to-plaintext converter using stdlib HTMLParser that handles character references
      and nested tags
    evidence: extract_items.py:59(class HtmlStripper(HTMLParser))
  - name: determine_items_to_extract
    description: Routes filing type to appropriate item list (10-K, 8-K, 10-Q) and initializes extraction
      state. MUST be called before extract_items per ordering contract DEEP-001.
    evidence: extract_items.py:163(function determine_items_to_extract)
  - name: parse_item
    description: Core regex-based item section extraction with position tracking. Uses longest-match strategy
      to prefer actual section content over TOC entries.
    evidence: extract_items.py:585(function parse_item)
  - name: get_10q_parts
    description: Separates 10-Q text into Part I and Part II before item extraction. MUST be called before
      item loop per ordering contract DEEP-003. Uses '__' delimiter to encode part-item relationship.
    evidence: extract_items.py:901(function get_10q_parts)
  key_behaviors:
  - behavior: HTML vs plain text detection
    description: Detects format by checking for <td> and <tr> elements. Legacy .txt filings use <DOCUMENT>
      tags but no table structure; table presence reliably distinguishes formats.
    evidence: extract_items.py:1023(is_html = (True if doc_report.find('td') else False) and (True if
      doc_report.find('tr') else False))
  - behavior: Table removal with selectivity
    description: Removes numerical tables (detected via background-color) but preserves text-containing
      tables. Financial tables are noise for text extraction; unstyled tables may be item listings to
      preserve.
    evidence: 'extract_items.py:454(if bgcolor_found or background_found: tbl.decompose())'
  - behavior: 10-Q two-part structure handling
    description: Splits text into Part I and Part II before item extraction. 10-Q items have identical
      names (e.g., Item 1) in different parts with different content; part-level separation prevents cross-contamination.
    evidence: extract_items.py:908(we need to separate the report text according to the different parts
      before extracting the items)
  - behavior: Roman numeral pattern matching
    description: Adjusts regex patterns to match both Roman numerals (I, II) and Arabic numbers (1, 2)
      for item numbering. SEC filings use inconsistent numbering across companies/years; dual-matching
      reduces extraction failures.
    evidence: extract_items.py:581(item_index_pattern = rf"ITEMS?\s*{item_index}")
  - behavior: Longest-match section selection
    description: Selects longest matching section when multiple candidates exist. Table of Contents entries
      match item patterns but are shorter; longest match prefers actual section content over TOC entries.
    evidence: extract_items.py:752(max_match_length = 0)
  - behavior: Position-based deduplication
    description: Tracks end positions of previous sections to prevent overlapping. Combined with longest-match,
      handles TOC noise and repeated section headers.
    evidence: extract_items.py:746(if offset + match.start() >= positions[-1])
  - behavior: 8-K historical item format switching
    description: 'Handles 8-K items renamed after August 23, 2004 (old: 1-12, new: 1.01-9.01). Date-based
      switching ensures correct pattern matching for historical filings.'
    evidence: extract_items.py:173(obsolete_cutoff_date_8k = pd.to_datetime('2004-08-23'))
  - behavior: Deep recursion handling
    description: Sets recursion limit to 30000 at module load to handle deeply nested HTML. Some SEC filings
      have deeply nested tables/divs; default Python recursion (1000) causes StackOverflow.
    evidence: extract_items.py:22(sys.setrecursionlimit(30000))
  replaceable_points:
  - name: remove_tables
    description: Toggle for HTML table removal during extraction - controls whether financial/numerical
      tables are stripped before item extraction
    options:
    - name: 'true'
      traits:
      - Removes background-colored tables
      - Cleans numerical data tables
      fit_for:
      - Text-focused extraction where tables are noise
      not_fit_for:
      - Extraction where table structure or content matters
    - name: 'false'
      traits:
      - Preserves each table content
      - May include numerical data in output
      fit_for:
      - Extraction requiring complete document structure
      not_fit_for:
      - Clean text extraction tasks
    default: 'true'
  - name: items_to_extract
    description: Filter which items to extract from filings - allows selective extraction of specific
      items only
    options:
    - name: Empty list (each items)
      traits:
      - Extracts each items per filing type
      - Maximum coverage
      fit_for:
      - Corpus building, comprehensive analysis
      not_fit_for:
      - Targeted extraction of specific items only
    - name: Full list per filing type
      traits:
      - Explicit list of each valid items
      - Clear intent
      fit_for:
      - Production pipelines with known item requirements
      not_fit_for:
      - Quick exploratory extraction
    - name: Subset of items
      traits:
      - Selective extraction
      - Reduced processing time
      fit_for:
      - Focused analysis on specific sections (e.g., Risk Factors)
      not_fit_for:
      - Complete filing analysis
    default: '[] (each items)'
  - name: skip_extracted_filings
    description: Skip processing if JSON output already exists - enables incremental/ resumable extraction
    options:
    - name: 'true'
      traits:
      - Idempotent processing
      - Faster subsequent runs
      fit_for:
      - Incremental updates, resuming interrupted runs
      not_fit_for:
      - When source files may have been updated
    - name: 'false'
      traits:
      - Always re-extracts
      - Ensures latest extraction
      fit_for:
      - When source documents may have changed
      not_fit_for:
      - Large datasets where re-extraction is expensive
    default: 'true'
  design_decisions:
  - 'Detect HTML vs plain text by checking for <td> and <tr> elements (evidence: extract_items.py:1023(is_html
    = (True if doc_report.find(''td'') else False) and (True if doc_report.find(''tr'') else False)))
    — Legacy .txt filings use <DOCUMENT> tags but no table structure; table presence reliably distinguishes
    formats'
  - 'Remove numerical tables but preserve text-containing tables via background-color detection (evidence:
    extract_items.py:454(if bgcolor_found or background_found: tbl.decompose())) — Financial tables are
    noise for text extraction; tables with formatting colors = data tables to remove; unstyled tables
    may be item listings to preserve'
  - 'Handle 10-Q two-part structure by splitting text before item extraction (evidence: extract_items.py:908(we
    need to separate the report text according to the different parts before extracting the items)) —
    10-Q items (e.g., Item 1 in Part I vs Item 1 in Part II) have identical names but different content;
    part-level text separation prevents cross-contamination'
  - 'Adjust regex patterns for Roman numerals to capture both I,II and 1,2 formats (evidence: extract_items.py:581(item_index_pattern
    = rf"ITEMS?\s*{item_index}")) — SEC filings use inconsistent item numbering across companies/years;
    dual-matching reduces extraction failures'
  - 'Select longest matching section when multiple candidates exist (handles TOC interference) (evidence:
    extract_items.py:752(max_match_length = 0)) — Table of Contents entries match item patterns but are
    shorter; longest match prefers actual section content over TOC entries'
  - 'Process filings in parallel via ProcessPool (evidence: extract_items.py:1255(with ProcessPool(processes=1)
    as pool)) — CPU-bound text parsing benefits from multiprocessing; processes=1 is conservative default
    (configurable for higher throughput). Process-based (not thread-based) avoids GIL in CPU-bound parsing.'
  - '8-K items renamed after August 23, 2004 (old: 1-12, new: 1.01-9.01) (evidence: extract_items.py:173(obsolete_cutoff_date_8k
    = pd.to_datetime(''2004-08-23''))) — SEC mandated item number format change; date-based switching
    ensures correct pattern matching for historical filings'
  - 'Set recursion limit to 30000 to handle deeply nested HTML (evidence: extract_items.py:22(sys.setrecursionlimit(30000)))
    — Some SEC filings have deeply nested tables/divs; default Python recursion (1000) causes StackOverflow
    on malformed documents'
  acceptance_hints:
  - JSON files exist for each processed filings with correct structure
  - '10-K/8-K items named: item_1, item_1A, item_2, etc.'
  - '10-Q items named: part_1_item_1, part_2_item_1A, etc.'
  - HTML tables removed from extracted text (financial tables not in output)
  - 8-K filings before 2004-08-23 use old item numbering (1-12), after use new numbering (1.01-9.01)
  - No StackOverflow errors in logs (recursion limit sufficient)
  - Roman and Arabic numeral patterns both matched successfully
- id: logging
  name: Logging Infrastructure
  order: 4
  responsibility: Centralized logging infrastructure providing timestamped log files and console output
    filtering. Enables debugging of specific execution windows and post-run forensics.
  interface:
    inputs:
    - name: Logger name and base filename
      description: Identifies the logging context (e.g., 'download_filings', 'extract_items')
    outputs:
    - name: logs/{name}_{timestamp}_{filename}.log
      description: Timestamped log files capturing each log levels (DEBUG+)
    - name: Console output
      description: INFO+ level messages to stdout for real-time monitoring
  required_methods:
  - name: Logger.__init__
    description: Factory constructor that creates timestamped log files with dual handlers (file and console)
      and appropriate log levels
    evidence: logger.py:8(class Logger)
  key_behaviors:
  - behavior: Timestamp log filenames for run-level isolation
    description: Log filenames include timestamps (YYYY_MM_DD_HH_MM_SS) ensuring multiple runs don't overwrite
      logs. Enables debugging of specific execution windows.
    evidence: logger.py:21(self.timestamp = strftime("%Y_%m_%d_%H_%M_%S", gmtime()))
  - behavior: Dual-level logging (console vs file)
    description: Console shows INFO+ only (quiet, no DEBUG spam), file captures DEBUG+ for verbose post-run
      forensics. Balances usability with debugging capability.
    evidence: logger.py:40(console.setLevel(logging.INFO))
  replaceable_points: []
  design_decisions:
  - 'Timestamp log filenames for run-level isolation (evidence: logger.py:21(self.timestamp = strftime("%Y_%m_%d_%H_%M_%S",
    gmtime()))) — Multiple runs don''t overwrite logs; enables debugging of specific execution windows'
  - 'Console shows INFO+, file captures DEBUG+ (evidence: logger.py:40(console.setLevel(logging.INFO)))
    — Quiet console (no DEBUG spam), verbose file logs for post-run forensics'
  acceptance_hints:
  - Log files created in logs/ directory with timestamped names
  - Console output shows INFO-level messages only
  - Log files contain DEBUG-level messages including request details
  - Multiple runs produce separate log files (no overwrite)
data_flow:
- from_stage: config.json
  to_stage: index_download
  data: 'Configuration parameters: start_year, end_year, quarters, user_agent, indices_folder, and download_filings-specific
    settings'
- from_stage: index_download
  to_stage: crawl_and_download
  data: 'TSV index files parsed into filtered DataFrame containing: CIK, Form Type, filing date, html_index
    link, accession number'
- from_stage: companies_info.json cache
  to_stage: crawl_and_download
  data: 'Pre-fetched company metadata: SIC code, state of incorporation, fiscal year end - keyed by CIK
    to avoid redundant lookups'
- from_stage: crawl_and_download
  to_stage: document_parsing
  data: RAW_FILINGS/{Type}/{filename}.htm(txt) raw filing documents + FILINGS_METADATA.csv with complete
    filing metadata including htm_filing_link and complete_text_filing_link
- from_stage: document_parsing
  to_stage: filesystem
  data: 'EXTRACTED_FILINGS/{Type}/{filename}.json with structured item sections: cik, company, filing_type,
    filing_date, period_of_report, sic, state_of_inc, fiscal_year_end, and item sections (item_1, item_1A,
    etc.)'
global_contracts:
- contract: Every file paths use {DATASET_DIR} as root defined in __init__.py
  evidence: __init__.py:2(DATASET_DIR = os.path.join(os.path.dirname(os.path.realpath(__file__)), 'datasets'))
- contract: Filings metadata CSV uses dtype=str to prevent pandas type coercion on numeric fields like
    CIK
  evidence: extract_items.py:1205(filings_metadata_df = pd.read_csv(filings_metadata_filepath, dtype=str))
- contract: NaN values in DataFrames replaced with None before processing to avoid downstream errors
  evidence: 'extract_items.py:1206(filings_metadata_df = filings_metadata_df.replace({np.nan: None}))'
- contract: 'Output JSON keys follow standard schema: cik, company, filing_type, filing_date, period_of_report,
    sic, state_of_inc, state_location, fiscal_year_end, filing_html_index, htm_filing_link, complete_text_filing_link,
    filename, item_*'
  evidence: 'extract_items.py:1056(json_content = {''cik'': ..., ''filing_type'': ..., ''filing_date'':
    ...})'
- contract: '10-Q item naming convention uses ''__'' delimiter to encode part-item relationship: {part}_item_{number}'
  evidence: extract_items.py:927(item.split('__')) and item_lists.py:86-98(part_1__1)
- contract: '8-K/10-K item naming convention: item_{number} format (e.g., item_1, item_1A, item_2.01)'
  evidence: extract_items.py:305(current_item = f"item_{item}")
- contract: 8-K obsolete cutoff date 2004-08-23 must match between code and tests for correct historical
    item pattern matching
  evidence: extract_items.py:173(pd.to_datetime) and test_extract_items.py:283(pd.to_datetime)
- contract: 'FILINGS_METADATA.csv implicit contract: columns must match between download (download_filings.py:424-439)
    and extract (extract_items.py:1199) stages'
  evidence: download_filings.py:424-439(columns) and extract_items.py:1199(read_csv)
- contract: roman_numeral_map keys (1-20) must match part numbers in item_list_10q for correct dual-format
    matching
  evidence: extract_items.py:32-53(roman_numeral_map) and extract_items.py:540(PART pattern)
business_decisions:
- id: BD-001
  type: BA
  content: Download indices per-quarter to enable incremental updates without re-fetching each history
  rationale: SEC EDGAR publishes quarterly index files; downloading only missing quarters avoids redundant
    network requests and reduces API load by an estimated 70-90% for repeat runs. The incremental approach
    bounds download time to O(new_quarters) rather than O(all_quarters), enabling skip_present_indices
    feature to complete faster for users with partial downloads.
  evidence: download_filings.py:117(incremental_download_logic)
  stage: index_download
  alternative_considered: Full re-download of each history; rejected due to bandwidth and API rate-limit
    concerns
  _evidence_issues:
  - 'FN_NOT_FOUND: incremental_download_logic in download_filings.py'
- id: BD-002
  type: M/BA
  content: Use separate company_info.json cache to avoid redundant CIK lookups
  rationale: Company metadata (SIC codes, state of incorporation, fiscal year end) is static per CIK and
    does not change between filings. Maintaining a persistent cache reduces SEC EDGAR API calls by approximately
    80% for repeated CIK lookups during bulk downloads, significantly lowering the risk of rate-limiting
    while improving throughput.
  evidence: download_filings.py:464(crawl)
  stage: index_download
  alternative_considered: Per-filing lookup; rejected due to unnecessary API overhead and rate-limit risk
- id: BD-003
  type: BA
  content: Exponential backoff with 5 retries on each HTTP requests
  rationale: SEC EDGAR enforces strict rate limits and frequently returns 403 errors when exceeded. Implementing
    exponential backoff with up to 5 retries provides resilience against transient failures while maintaining
    sustainable request rates. This approach prevents premature termination of bulk downloads and reduces
    the need for manual restart intervention.
  evidence: download_filings.py:488(http_retry_loop)
  stage: index_download
  alternative_considered: No retry; rejected due to high 403 rate from SEC EDGAR rate limiting
  _evidence_issues:
  - 'FN_NOT_FOUND: http_retry_loop in download_filings.py'
- id: BD-004
  type: B/RC
  content: Parse Document Format Files table for .htm/.html links; fall back to complete submission text
    file
  rationale: SEC EDGAR filings are available in multiple document formats with HTML being preferred for
    machine readability due to structured tables and tags. The fallback to complete submission TXT files
    ensures coverage of older submissions and cases where individual document links are unavailable. This
    dual-format strategy handles the heterogeneous nature of SEC filings from 1994 to present.
  evidence: download_filings.py:464(crawl)
  stage: crawl_and_download
  alternative_considered: HTML-only; rejected due to incomplete coverage of older TXT-based submissions
- id: BD-005
  type: M/BA
  content: Store company metadata in companies_info.json to reduce per-filing lookups
  rationale: SIC codes, state of incorporation, and fiscal year fields remain constant per company across
    each filings. Fetching this metadata once per company and caching locally eliminates approximately
    50 redundant HTTP requests per company during bulk operations. This optimization directly reduces
    both API rate-limit pressure and total download duration.
  evidence: download_filings.py:648(company_metadata_caching)
  stage: crawl_and_download
  alternative_considered: Per-filing metadata fetch; rejected due to excessive redundant API calls
  _evidence_issues:
  - 'FN_NOT_FOUND: company_metadata_caching in download_filings.py'
- id: BD-006
  type: BA/DK
  content: 'Filename convention: {CIK}_{Type}_{Year}_{accession}.{ext}'
  rationale: The filename convention creates globally unique identifiers for each filing while enabling
    natural sorting by CIK (company) and Year. This enables idempotent deduplication via filename comparison,
