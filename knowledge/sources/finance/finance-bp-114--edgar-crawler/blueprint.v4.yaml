replaceable_slots:
- id: slot-001
  name: data_source
  description: Use official SEC EDGAR for each production use. Alternative data providers (Bloomberg,
    Refinitiv, FactSet) could be added for premium features like real-time data or alternative filing
    formats.
  used_in_stages: []
  options:
  - name: SEC EDGAR (Official)
    traits:
    - official
    - authoritative
    - free
    - rate-limited
    fit_for:
    - Production use, compliance-critical data, full historical coverage
    not_fit_for:
    - High-frequency trading (latency), real-time streaming
  - name: SEC EDGAR Full Text Feed
    traits:
    - official
    - full-text
    - bulk
    - historical
    fit_for:
    - Bulk historical analysis, academic research
    not_fit_for:
    - Real-time requirements
  - name: SEC XBRL API
    traits:
    - structured
    - machine-readable
    - official
    fit_for:
    - Financial analysis requiring tagged data
    not_fit_for:
    - Natural language processing, narrative extraction
  default: SEC EDGAR (Official)
  _source: worker_resource
- id: slot-002
  name: html_parser
  description: lxml offers best balance of speed and compatibility for SEC filing parsing. Switch to html5lib
    if encountering parsing edge cases with malformed HTML.
  used_in_stages: []
  options:
  - name: lxml (current)
    traits:
    - fast
    - forgiving
    - c-extension
    fit_for:
    - Production use with large-scale crawling
    not_fit_for:
    - Strict HTML5 compliance validation
  - name: html.parser (stdlib)
    traits:
    - stdlib
    - no-dependency
    - slower
    fit_for:
    - Minimal dependencies, simple use cases
    not_fit_for:
    - Large-scale crawling where speed matters
  - name: html5lib
    traits:
    - strict
    - browser-compatible
    - pure-python
    fit_for:
    - Maximum compatibility with browser rendering
    not_fit_for:
    - Performance-critical applications
  default: lxml (current)
  _source: worker_resource
- id: slot-003
  name: parallelization
  description: pathos provides the best multiprocessing experience for extraction. For I/O-bound downloads,
    ThreadPoolExecutor may be more efficient. Disable parallelization for debugging.
  used_in_stages: []
  options:
  - name: pathos ProcessPool (current)
    traits:
    - multiprocessing
    - cross-platform
    fit_for:
    - CPU-bound extraction tasks on multi-core systems
    not_fit_for:
    - I/O-bound operations, memory-constrained environments
  - name: multiprocessing.Pool (stdlib)
    traits:
    - stdlib
    - no-dependency
    fit_for:
    - Simple parallelization without extra dependencies
    not_fit_for:
    - Complex shared memory patterns
  - name: concurrent.futures.ThreadPoolExecutor
    traits:
    - threading
    - I/O-bound-optimized
    fit_for:
    - I/O-bound network operations
    not_fit_for:
    - CPU-bound extraction (GIL limitation)
  - name: no parallelization
    traits:
    - single-threaded
    - simple
    fit_for:
    - Testing, debugging, resource-constrained environments
    not_fit_for:
    - Production bulk crawling
  default: pathos ProcessPool (current)
  _source: worker_resource
- id: slot-004
  name: cli_framework
  description: click is well-suited for this project. argparse is sufficient for simpler use cases. typer
    offers modern type-hinted interface.
  used_in_stages: []
  options:
  - name: click (current)
    traits:
    - composable
    - colored-output
    - ANSI
    fit_for:
    - Production CLI tools with complex argument handling
    not_fit_for:
    - Minimal CLI needs
  - name: argparse (stdlib)
    traits:
    - stdlib
    - no-dependency
    fit_for:
    - Simple scripts, minimal dependencies
    not_fit_for:
    - Complex CLI with subcommands
  - name: typer
    traits:
    - modern
    - type-hints
    - click-based
    fit_for:
    - Modern Python projects with type hints
    not_fit_for:
    - Python 3.7 or earlier
  default: click (current)
  _source: worker_resource
