- id: BD-I006
  type: B/BA
  content: 'INTERACTION: BD-049 (0.1% symmetric transaction cost) × Missing: No slippage
    model × Missing: No market impact model → Systematic return overestimation'
  rationale: Backtests include explicit transaction costs (BD-049 at 0.1%) but ignore
    slippage (difference between expected and actual fill price) and market impact
    (large orders moving prices against the trader). For liquid DOW 30 stocks, slippage
    might add 0.01-0.05% per trade, and market impact for large orders could add 0.1-0.5%.
    Combined, the backtest overestimates returns by ignoring potentially 3-5% of trading
    costs for high-frequency strategies.
  evidence: N/A:0(see_rationale)
  stage: global
  status: missing
  known_gap: true
  severity: critical
  impact: Strategies optimized for backtest may be unprofitable after real transaction
    costs; optimal trading frequency may be too high
  alternative_considered: Add 0.01% slippage per trade, liquidity-adjusted impact
    model, minimum order size constraints
- id: BD-I007
  type: B/BA
  content: 'INTERACTION: BD-037 (Hardcoded turbulence=70) × BD-018/BD-074 (90th percentile
    dynamic) → Dual threshold contradiction'
  rationale: 'The codebase uses two different turbulence thresholds: BD-037 hardcodes
    70 as the liquidation threshold in trading environments, while BD-018/BD-074 use
    90th percentile of in-sample turbulence for ensemble selection. These thresholds
    may produce different risk signals for the same market conditions - a regime might
    be ''risky'' by one definition and ''normal'' by another. This contradiction means
    the same market state triggers different behaviors depending on which code path
    executes.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unified threshold mechanism with percentile-based fallback,
