id: finance-bp-061
name: FinRL
sop_version: '3.6'
source:
  projects:
  - FinRL
  commit_hash: 220f9e490996a6e5c84cfad914ff14f2e0c42d22
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: algorithmic stock trading, portfolio optimization, and cryptocurrency
    trading using deep reinforcement learning
  description: End-to-end DRL framework for automated trading that downloads market
    data, engineers technical indicators, simulates trading environments, trains reinforcement
    learning agents, executes trades via broker APIs, and evaluates performance against
    benchmarks.
  prerequisites: Python programming, basic reinforcement learning concepts, familiarity
    with financial markets and trading instruments
  not_suitable_for: High-frequency trading with sub-second latency requirements, options
    and futures trading, pure fundamental analysis without price data, real-time production
    deployment (see FinRL-X for production)
stages:
- id: data_download
  name: Data Download
  order: 1
  responsibility: Fetches raw market data from various data sources (Yahoo Finance,
    Alpaca, WRDS, CCXT) and provides a unified interface that hides source-specific
    implementation details. This stage exists to decouple data acquisition from downstream
    processing, enabling users to switch data sources without modifying application
    code.
  interface:
    inputs:
    - ticker_list (list of stock symbols)
    - start_date (YYYY-MM-DD)
    - end_date (YYYY-MM-DD)
    - time_interval (1min, 5min, 15min, 1hour, 1day)
    outputs:
    - 'pandas DataFrame with columns: date, tic, open, high, low, close, volume'
  required_methods:
  - name: YahooDownloader.fetch_data
    description: Downloads free historical stock data from Yahoo Finance API for specified
      tickers and date range
    evidence: finrl/meta/preprocessor/yahoodownloader.py:11(fetch_data)
  - name: AlpacaProcessor.download_data
    description: Retrieves real-time and historical market data from Alpaca broker
      API including pre/after market hours
    evidence: finrl/meta/data_processors/processor_alpaca.py:19(download_data)
  - name: WrdsProcessor.download_data
    description: Fetches institutional-grade historical data from Wharton Research
      Data Services for academic and research use
    evidence: finrl/meta/data_processors/processor_wrds.py:13(download_data)
  - name: CCXTEngineer.download_data
    description: Downloads cryptocurrency data from exchanges via unified CCXT interface
      supporting 100+ crypto exchanges
    evidence: finrl/meta/data_processors/processor_ccxt.py:12(download_data)
  - name: DataProcessor.__init__
    description: Factory method that maps data_source string to specific processor
      implementation, enabling runtime data source selection
    evidence: finrl/meta/data_processor.py:13(__init__)
  key_behaviors:
  - behavior: Adapter pattern for data sources
    description: Each data source has a dedicated processor class that implements
      a common interface. The DataProcessor factory maps string identifiers to concrete
      implementations, allowing new sources to be added without modifying client code.
    evidence: finrl/meta/data_processor.py:13(DataProcessor.__init__)
  - behavior: Standardized output schema
    description: Every data sources output DataFrames with identical column schema
      (date, tic, open, high, low, close, volume) enabling environment interchangeability
      regardless of data source
    evidence: finrl/meta/preprocessor/preprocessors.py:26(data_split)
  replaceable_points:
  - name: data_source
    description: Choose market data provider for historical or real-time data
    options:
    - name: yahoofinance
      traits:
      - free
      - no registration
      - limited to 5-year history
      - delayed data
      fit_for:
      - prototyping
      - research
      - educational use
      - quick experiments
      not_fit_for:
      - institutional research
      - live trading
      - high-frequency data
    - name: alpaca
      traits:
      - real-time
      - paper trading ready
      - free tier available
      - REST API
      fit_for:
      - live paper trading
      - real-time strategy testing
      - broker integration
      not_fit_for:
      - academic datasets
      - premium data features
    - name: wrds
      traits:
      - institutional grade
      - academic access
      - tick data
      - CRSP/Compustat
      fit_for:
      - academic research
      - high-quality backtesting
      - published papers
      not_fit_for:
      - commercial use without subscription
      - real-time trading
    - name: ccxt
      traits:
      - 100+ exchanges
      - crypto native
      - unified API
      - websocket support
      fit_for:
      - cryptocurrency trading
      - DeFi strategies
      - cross-exchange arbitrage
      not_fit_for:
      - stock trading
      - traditional asset classes
    default: yahoofinance
  design_decisions:
  - 'Adapter pattern for data sources: Factory pattern maps data_source string to
    specific processor; allows adding new sources without modifying client code (finrl/meta/data_processor.py:13)'
  acceptance_hints:
  - 'Downloaded DataFrame has exactly columns: date, tic, open, high, low, close,
    volume'
  - DataFrame length matches expected trading days for ticker list and date range
  - No null values in OHLCV columns (excluding non-trading days)
  - Date column is properly parsed as datetime type
  - Ticker symbols match input ticker_list exactly
- id: feature_engineering
  name: Feature Engineering
  order: 2
  responsibility: Transforms raw price data into machine learning features suitable
    for reinforcement learning by computing technical indicators (MACD, RSI, CCI,
    Bollinger Bands), market regime indicators (turbulence, VIX), and handling user-defined
    features. This stage exists because raw prices alone are insufficient for RL models
    to learn profitable strategies.
  interface:
    inputs:
    - 'raw DataFrame with columns: date, tic, open, high, low, close, volume'
    outputs:
    - 'enriched DataFrame with additional indicator columns: macd, boll_ub, boll_lb,
      rsi_30, cci_30, dx_30, close_30_sma, close_60_sma, turbulence, vix'
  required_methods:
  - name: FeatureEngineer.preprocess_data
    description: Main orchestrator that applies each feature transformations including
      tech indicators and turbulence calculation
    evidence: finrl/meta/preprocessor/preprocessors.py:106(preprocess_data)
  - name: FeatureEngineer.add_technical_indicators
    description: Computes configurable list of technical indicators using Stockstats
      library for each ticker in the dataset
    evidence: finrl/meta/preprocessor/preprocessors.py:120(add_technical_indicators)
  - name: DataProcessor.add_turbulence
    description: Calculates market turbulence index based on covariance matrix of
      returns over rolling window
    evidence: finrl/meta/data_processor.py:58(add_turbulence)
  key_behaviors:
  - behavior: Stockstats library for indicators
    description: Leverages battle-tested Stockstats library for technical indicator
      calculations rather than implementing custom indicators. This ensures accurate
      MACD, RSI, CCI, and Bollinger Band calculations that match industry standards.
    evidence: finrl/meta/preprocessor/preprocessors.py:10(from stockstats)
  - behavior: Configurable indicator list
    description: Default 8 indicators (macd, boll_ub, boll_lb, rsi_30, cci_30, dx_30,
      close_30_sma, close_60_sma) are defined in config.py and can be overridden.
      This balances complexity vs signal quality for RL training.
    evidence: finrl/config.py:21(INDICATORS)
  - behavior: NaN/Inf filled with 0 for tech array
    description: Missing indicators are filled with 0 to prevent gradient explosion
      in neural networks. Assumes missing indicators (at data start) represent no
      signal.
    evidence: finrl/meta/data_processor.py:83(tech_array)
  - behavior: Lowercase column requirement
    description: StockStats requires lowercase column names (close vs close vs CLOSE).
      Yahoo data case sensitivity is handled to prevent silently wrong indicators.
    evidence: finrl/meta/preprocessor/preprocessors.py:10(StockDataFrame)
  replaceable_points:
  - name: indicator_calculator
    description: Choose library for computing technical indicators
    options:
    - name: stockstats
      traits:
      - pure Python
      - pandas integration
      - no external dependencies
      - sufficient indicators
      fit_for:
      - standard TA indicators
      - development
      - cross-platform
      not_fit_for:
      - ultra-low latency
      - proprietary indicators
      - GPU acceleration
    - name: ta-lib
      traits:
      - C library
      - 200+ indicators
      - optimized
      - industry standard
      fit_for:
      - production systems
      - comprehensive TA
      - performance critical
      not_fit_for:
      - installation complexity
      - non-standard indicators
    - name: custom_func
      traits:
      - fully customizable
      - no external deps
      - transparent logic
      fit_for:
      - proprietary indicators
      - research novelties
      - custom preprocessing
      not_fit_for:
      - standardization
      - validation
      - community support
    default: stockstats
  design_decisions:
  - 'Stockstats library for indicators: Leverages battle-tested TA library; avoids
    reinventing indicator calculations (finrl/meta/preprocessor/preprocessors.py:10)'
  - 'Configurable indicator list: Default 8 indicators can be overridden; balances
    complexity vs signal (finrl/config.py:21)'
  - 'NaN/Inf filled with 0 for tech array: Prevents gradient explosion in NN; assumes
    missing indicators = no signal = 0 (finrl/meta/data_processor.py:83)'
  acceptance_hints:
  - Enriched DataFrame contains each technical indicator columns
  - Indicator values are within expected ranges (RSI 0-100, MACD can be negative,
    Bollinger within price range)
  - Turbulence column exists and has values for at least 252 trading days
  - No Inf values in tech indicator columns
  - Features are computed per-ticker group independently
- id: data_normalization
  name: Data Normalization & Pivot
  order: 3
  responsibility: Converts long-format data to wide format per ticker, handles missing
    values from non-trading days using configurable strategies, and prepares numpy
    arrays for environment consumption. This stage exists to bridge the DataFrame
    representation used in data processing with the array-based state representation
    required by RL environments.
  interface:
    inputs:
    - 'long-format DataFrame with columns: date, tic, features (OHLCV + indicators)'
    outputs:
    - 'price_array (numpy, shape: [days, stocks, price_features])'
    - 'tech_array (numpy, shape: [days, stocks, indicator_features])'
    - 'turbulence_array (numpy, shape: [days])'
  required_methods:
  - name: DataProcessor.df_to_array
    description: Converts DataFrame to numpy arrays for environment consumption using
      itertools.product to ensure complete date-ticker grid
    evidence: finrl/meta/data_processor.py:78(df_to_array)
  key_behaviors:
  - behavior: Itertools.product for complete grid
    description: Ensures every ticker has a row for every date by using itertools.product(date_list,
      ticker_list). This enables vectorized state computation without per-ticker iteration.
    evidence: finrl/applications/stock_trading/stock_trading.py:63(combination)
  - behavior: Fillna(0) for missing data
    description: Missing prices and indicators from non-trading days (weekends, holidays)
      are filled with 0. This requires downstream visualization to detect bad data
      patterns.
    evidence: finrl/applications/stock_trading/stock_trading.py:73
  - behavior: MaxAbsScaler fitted per ticker
    description: GroupByScaler uses MaxAbsScaler fitted independently per ticker group,
      making it robust to outliers common in financial data.
    evidence: finrl/meta/preprocessor/preprocessors.py:52(scaler=MaxAbsScaler)
  replaceable_points:
  - name: missing_data_strategy
    description: Choose how to handle non-trading days (weekends, holidays) in the
      data
    options:
    - name: fillna_0
      traits:
      - simple
      - no forward bias
      - treats as zero signal
      fit_for:
      - standard backtesting
      - RL training
      - most use cases
      not_fit_for:
      - regime detection
      - high-frequency analysis
      - volatility modeling
    - name: ffill
      traits:
      - forward fill
      - last known value
      - maintains continuity
      fit_for:
      - trend following
      - smooth state transitions
      - regime models
      not_fit_for:
      - mean-reversion
      - momentum after gaps
      - leverage effects
    - name: dropna
      traits:
      - removes incomplete rows
      - maintains data integrity
      fit_for:
      - clean datasets
      - high-frequency
      - event studies
      not_fit_for:
      - continuous trading
      - daily rebalancing
      - multi-ticker strategies
    default: fillna_0
  design_decisions:
  - 'Itertools.product for complete grid: Ensures every ticker has row for every date;
    enables vectorized state computation (finrl/applications/stock_trading/stock_trading.py:63)'
  - 'Fillna(0) for missing data: Missing price/indicators treated as 0; requires make_plots
    to detect bad data (finrl/applications/stock_trading/stock_trading.py:73)'
  acceptance_hints:
  - Arrays have consistent dimensions across price, tech, and turbulence data
  - Date count matches trading calendar (not calendar days)
  - Every arrays contain only finite values (no NaN, no Inf)
  - Price and tech arrays are aligned per timestep for cross-feature access
  - Turbulence array length equals number of unique dates
- id: environment_simulation
  name: Gym Environment Simulation
  order: 4
  responsibility: Implements OpenAI Gym interface for financial trading, handling
    state representation, action execution (buy/sell/hold), reward calculation, and
    memory tracking. This stage exists to provide the standard RL interface that connects
    market data with learning algorithms while accurately modeling trading frictions
    and portfolio dynamics.
  interface:
    inputs:
    - DataFrame with price/indicators, initial_amount, cost parameters (buy_cost_pct,
      sell_cost_pct), turbulence_threshold
    outputs:
    - (state, reward, done, info) tuples per step
    - action memory
    - asset_memory
    - state_memory
  required_methods:
  - name: StockTradingEnv.reset
    description: Initializes environment to starting state with initial capital and
      empty positions
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:19(reset)
  - name: StockTradingEnv.step
    description: 'Executes one trading step: processes sell before buy, updates portfolio
      value, calculates reward'
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:331(step)
  - name: PortfolioOptimizationEnv.step
    description: Executes portfolio weight allocation with softmax normalization for
      continuous action space
    evidence: finrl/meta/env_portfolio_optimization/env_portfolio_optimization.py:31(step)
  - name: CryptoEnv.step
    description: Multi-crypto trading with Binance CCXT integration and pair-specific
      processing
    evidence: finrl/meta/env_cryptocurrency_trading/env_multiple_crypto.py:12(step)
  key_behaviors:
  - behavior: Sell before buy ordering
    description: 'CRITICAL: Sell operations are processed before buy operations in
      step(). Reversing this order would cause cash balance miscalculation because
      buys consume cash before sells generate it.'
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:331-340
  - behavior: Action space [-1,1] continuous with position logic
    description: Single continuous action value encodes both direction and size. Positive
      values mean buy (fraction of portfolio), negative means sell. This reduces action
      dimensionality vs separate buy/sell/hold.
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:71(action_space)
  - behavior: Turbulence threshold liquidates each positions
    description: When turbulence exceeds threshold (90th percentile default), each
      positions are liquidated. This risk management rule protects capital during
      market stress periods.
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:29(turbulence_threshold)
  - behavior: Reward scaling 1e-4 default
    description: Rewards are scaled by 1e-4 to prevent gradient vanishing/explosion
      in PPO/A2C. Scales returns to manageable magnitude for stable neural network
      training.
    evidence: finrl/applications/stock_trading/stock_trading.py:99(reward_scaling)
  - behavior: Memory arrays track full history
    description: Environment maintains asset_memory, actions_memory, and states_memory
      arrays throughout episode. Enables post-hoc analysis, plotting, and CSV persistence
      of complete trading history.
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:96(asset_memory)
  - behavior: Train vs test mode bifurcation
    description: In StockTradingEnvNP, random initialization of state occurs only
      in training mode. Inference uses deterministic initial state. Removing this
      check causes random initialization during inference.
    evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:89-101
  replaceable_points:
  - name: reward_function
    description: Choose how to calculate trading reward signal
    options:
    - name: portfolio_return
      traits:
      - simple
      - continuous
      - signed returns
      fit_for:
      - standard trading
      - PPO/A2C
      - baseline comparisons
      not_fit_for:
      - risk-averse strategies
      - multi-objective optimization
    - name: sharpe_ratio
      traits:
      - risk-adjusted
      - longer windows needed
      - stable
      fit_for:
      - risk management
      - conservative strategies
      - institutional
      not_fit_for:
      - short episodes
      - single-asset
      - high variance
    - name: sortino_ratio
      traits:
      - downside risk
      - penalizes volatility
      - asymmetric
      fit_for:
      - asymmetric strategies
      - tail-risk management
      not_fit_for:
      - symmetric strategies
      - short evaluation windows
    - name: custom
      traits:
      - fully customizable
      - domain-specific
      - complex
      fit_for:
      - research
      - novel objectives
      - multi-factor
      not_fit_for:
      - standard use
      - quick prototyping
    default: portfolio_return
  - name: action_encoding
    description: Choose how continuous actions map to actual trades
    options:
    - name: continuous_position
      traits:
      - single value [-1,1]
      - direction+size encoded
      - smooth
      fit_for:
      - portfolio rebalancing
      - continuous allocation
      - PPO
      not_fit_for:
      - lot-based trading
      - discrete share counts
    - name: discrete_shares
      traits:
      - integer shares
      - exact quantities
      - realistic
      fit_for:
      - realistic fills
      - lot compliance
      - market impact
      not_fit_for:
      - fractional shares
      - continuous control
    - name: softmax_weights
      traits:
      - normalized weights
      - sum to 1
      - allocation focus
      fit_for:
      - portfolio optimization
      - weight-based allocation
      not_fit_for:
      - single-asset focus
      - short selling
    default: continuous_position
  design_decisions:
  - 'Action space [-1,1] continuous with position logic: Single continuous value encodes
    direction+size; reduces action dimensionality vs separate buy/sell (finrl/meta/env_stock_trading/env_stocktrading.py:71)'
  - 'Turbulence threshold liquidates each positions: Risk management rule; protects
    capital during market stress (finrl/meta/env_stock_trading/env_stocktrading.py:29)'
  - 'Reward scaling 1e-4 default: Prevents gradient vanishing/explosion in PPO/A2C;
    scales returns to manageable magnitude (finrl/applications/stock_trading/stock_trading.py:99)'
  - 'Memory arrays track full history: Enables post-hoc analysis, plotting, and persistence
    to CSV (finrl/meta/env_stock_trading/env_stocktrading.py:96)'
  acceptance_hints:
  - Environment passes gym.Env interface validation (reset returns state, step returns
    4-tuple)
  - State space size = 1 + 2*stock_dim + len(indicators)*stock_dim for stock trading
  - Action space size = stock_dim for single-asset per action dimension
  - Portfolio env action size = 1 + portfolio_size (cash bias + weights)
  - Reward is finite (no NaN, no Inf) across full episode length
  - Sell operations complete before buy operations in step() execution
- id: model_training
  name: DRL Model Training
  order: 5
  responsibility: Instantiates and trains reinforcement learning models from multiple
    libraries (Stable-Baselines3, ElegantRL, RLlib) using a standardized agent interface.
    This stage exists to abstract away library-specific training details while providing
    sensible defaults, monitoring hooks, and checkpoint management for production-quality
    model training.
  interface:
    inputs:
    - Gym environment instance, model_name (string), model_kwargs (hyperparameters),
      train_kwargs (timesteps, callback_list)
    outputs:
    - trained model object
    - saved checkpoint at models/trained_models/{model_name}_{timestamp}.pth or .zip
  required_methods:
  - name: DRLAgent.__init__
    description: Factory constructor that instantiates SB3 algorithms (A2C, PPO, DDPG,
      SAC, TD3) based on model_name string using dictionary-based registry
    evidence: finrl/agents/stablebaselines3/models.py:79(__init__)
  - name: DRLAgent.train
    description: Executes model training loop with configurable timesteps, tensorboard
      logging, and early stopping callbacks
    evidence: finrl/agents/stablebaselines3/models.py:120(train)
  - name: DRLAgent.save
    description: Persists trained model to disk for later inference without retraining
    evidence: finrl/agents/stablebaselines3/models.py:277(save)
  - name: DRLAgent.load
    description: Loads previously saved model checkpoint into memory for prediction
      or continued training
    evidence: finrl/agents/stablebaselines3/models.py:280(load)
  key_behaviors:
  - behavior: Dictionary-based model registry
    description: MODELS dictionary decouples model name strings from class implementations.
      Enables runtime model selection without code changes or conditional imports.
    evidence: finrl/agents/stablebaselines3/models.py:14(MODELS)
  - behavior: Default hyperparameters in config.py
    description: Sensible algorithm defaults (A2C_PARAMS, PPO_PARAMS, etc.) defined
      in config.py reduce boilerplate. Tunable via model_kwargs override without code
      changes.
    evidence: finrl/config.py:34(A2C_PARAMS)
  - behavior: TensorboardCallback for monitoring
    description: 'MLOps best practice: tracks reward curves, loss, entropy during
      training. Enables real-time monitoring and hyperparameter tuning decisions.'
    evidence: finrl/agents/stablebaselines3/models.py:34(TensorboardCallback)
  - behavior: Model checkpoint after training
    description: Trained models are automatically saved to disk after training completes.
      Enables later inference without retraining and experiment reproducibility.
    evidence: finrl/agents/stablebaselines3/models.py:277(save)
  replaceable_points:
  - name: algorithm
    description: Choose reinforcement learning algorithm
    options:
    - name: a2c
      traits:
      - synchronous
      - simple
      - memory efficient
      - on-policy
      fit_for:
      - continuous actions
      - resource constrained
      - quick experiments
      not_fit_for:
      - sample efficiency critical
      - very long episodes
    - name: ppo
      traits:
      - robust
      - clipping
      - popular
      - on-policy
      fit_for:
      - continuous actions
      - stable training
      - default choice
      not_fit_for:
      - very fast learning needed
      - discrete actions only
    - name: ddpg
      traits:
      - off-policy
      - actor-critic
      - continuous
      - target networks
      fit_for:
      - continuous control
      - sample efficiency
      - offline RL
      not_fit_for:
      - discrete actions
      - exploration critical
    - name: sac
      traits:
      - off-policy
      - stochastic
      - entropy bonus
      - maximum entropy
      fit_for:
      - continuous actions
      - exploration
      - robust policies
      not_fit_for:
      - discrete actions
      - on-policy requirements
    - name: td3
      traits:
      - off-policy
      - twin critics
      - delayed updates
      - DDPG improvement
      fit_for:
      - continuous actions
      - overestimation reduction
      - smooth policies
      not_fit_for:
      - discrete actions
      - on-policy benchmarks
    default: ppo
  - name: framework
    description: Choose DRL library implementation
    options:
    - name: stablebaselines3
      traits:
      - PyTorch
      - well maintained
      - extensive docs
      - SB3
      fit_for:
      - general use
      - research
      - production
      not_fit_for:
      - TensorFlow users
      - custom architectures
    - name: elegantrl
      traits:
      - PyTorch
      - lightweight
      - GPU accelerated
      - customizable
      fit_for:
      - GPU training
      - custom losses
      - intermediate users
      not_fit_for:
      - quick prototyping
      - TensorFlow users
    - name: rllib
      traits:
      - Ray distributed
      - scalable
      - many algorithms
      - production
      fit_for:
      - distributed training
      - large scale
      - multi-agent
      not_fit_for:
      - single-machine
      - quick experiments
      - lightweight
    default: stablebaselines3
  design_decisions:
  - 'Dictionary-based model registry: Decouples model name from class; enables runtime
    model selection without code changes (finrl/agents/stablebaselines3/models.py:14)'
  - 'Default hyperparameters in config.py: Sensible defaults reduce boilerplate; tunable
    via model_kwargs override (finrl/config.py:34)'
  - 'TensorboardCallback for monitoring: MLOps best practice; tracks reward curves,
    loss, entropy during training (finrl/agents/stablebaselines3/models.py:34)'
  - 'Model saves after training: Checkpoint enables later inference without retraining
    (finrl/agents/stablebaselines3/models.py:277)'
  acceptance_hints:
  - Model file exists at expected path after training completes
  - Training rewards show improvement over episodes (not required to monotonic, but
    general trend)
  - Tensorboard logs contain reward, loss, and entropy scalars
  - Model can be reloaded and produces valid actions on environment
  - No gradient explosion errors in training logs
- id: ensemble_strategy
  name: Ensemble Strategy with Validation
  order: 6
  responsibility: Implements rolling window ensemble that trains multiple DRL algorithms,
    validates on held-out period, and selects the best performer for each rebalancing
    window. This stage exists to reduce model selection risk by combining walk-forward
    validation with ensemble diversification, mimicking real deployment conditions.
  interface:
    inputs:
    - full DataFrame with each features, train_period (list), val_period (list), test_period
      (list), rebalance_window (int, days between retraining)
    outputs:
    - trained models dict per window
    - selected model per window
    - last_state for continuity
    - ensemble actions for test period
  required_methods:
  - name: DRLEnsembleAgent.run_ensemble_strategy
    description: Orchestrates rolling window training across multiple algorithms with
      validation-based model selection
    evidence: finrl/agents/stablebaselines3/models.py:220(run_ensemble_strategy)
  - name: DRLEnsembleAgent.run_single_strategy
    description: Trains single model on one rolling window with specified algorithm
    evidence: finrl/agents/stablebaselines3/models.py:320(run_single_strategy)
  - name: DRLEnsembleAgent.get_validation_sharpe
    description: Calculates Sharpe ratio on validation period to select best performing
      model per window
    evidence: finrl/agents/stablebaselines3/models.py:283(get_validation_sharpe)
  key_behaviors:
  - behavior: Rolling window with validation
    description: Walk-forward validation prevents look-ahead bias by using only past
      data for training. Mimics real deployment where future performance is unknown.
    evidence: finrl/agents/stablebaselines3/models.py:509(range)
  - behavior: Sharpe ratio for model selection
    description: Risk-adjusted return metric penalizes volatile strategies. Model
      with highest validation Sharpe is selected for each rebalancing period.
    evidence: finrl/agents/stablebaselines3/models.py:283(get_validation_sharpe)
  - behavior: 90th percentile turbulence threshold
    description: Adaptive risk control that raises turbulence threshold during calm
      markets and lowers during volatile periods. Ensures consistent risk management
      across market regimes.
    evidence: finrl/agents/stablebaselines3/models.py:500(quantile)
  - behavior: Last state passed between windows
    description: Portfolio state (positions, cash) is passed as initial state to next
      window. Maintains continuity of portfolio across rebalancing periods.
    evidence: finrl/agents/stablebaselines3/models.py:489(last_state_ensemble)
  - behavior: Turbulence lookback of 252 days
    description: One trading year of historical data is used for turbulence calculation
      to ensure statistical significance of regime detection.
    evidence: finrl/meta/preprocessor/preprocessors.py:292
  replaceable_points:
  - name: selection_metric
    description: Choose criterion for selecting best model per ensemble window
    options:
    - name: sharpe_ratio
      traits:
      - risk-adjusted
      - penalizes volatility
      - standard in finance
      fit_for:
      - risk-aware strategies
      - institutional use
      - long-term
      not_fit_for:
      - short-term trading
      - maximizing returns
    - name: total_return
      traits:
      - simple
      - maximizes profit
      - absolute measure
      fit_for:
      - aggressive growth
      - short-term focus
      - benchmark comparison
      not_fit_for:
      - risk management
      - conservative strategies
    - name: calmar_ratio
      traits:
      - drawdown-based
      - maximum drawdown focus
      fit_for:
      - tail-risk management
      - conservative strategies
      not_fit_for:
      - return maximization
      - short evaluation periods
    - name: min_return
      traits:
      - worst-case protection
      - floor-based
      fit_for:
      - downside protection
      - guaranteed minimum
      not_fit_for:
      - return maximization
      - optimistic scenarios
    default: sharpe_ratio
  design_decisions:
  - 'Rolling window with validation: Walk-forward validation prevents look-ahead bias;
    mimics real deployment (finrl/agents/stablebaselines3/models.py:509)'
  - 'Sharpe ratio for model selection: Risk-adjusted return metric; penalizes volatile
    strategies (finrl/agents/stablebaselines3/models.py:283)'
  - '90th percentile turbulence threshold: Adaptive risk control; raises threshold
    during calm markets (finrl/agents/stablebaselines3/models.py:500)'
  - 'Last state passed between windows: Maintains continuity of portfolio state across
    rebalancing periods (finrl/agents/stablebaselines3/models.py:489)'
  acceptance_hints:
  - Training uses only data from train_period, validation uses only val_period
  - Test period actions come only from models trained on earlier data
  - Turbulence threshold calculated from in-sample data only (no future information)
  - Selected model per window varies across windows (demonstrates model selection)
  - Last state correctly propagates positions/cash to subsequent window
- id: trading_execution
  name: Trading Execution
  order: 7
  responsibility: Converts model actions to real market orders via broker API (Alpaca
    paper trading) or generates action arrays for backtesting. This stage exists to
    bridge trained model inference with either simulated or live market execution
    while handling latency, order sizing, and broker-specific requirements.
  interface:
    inputs:
    - trained model, current state/observation, broker credentials (API_KEY, API_SECRET)
    - execution mode (paper_trading, backtesting, live)
    outputs:
    - executed orders (order_id, symbol, side, qty, status)
    - updated positions
    - account equity
  required_methods:
  - name: PaperTradingAlpaca.run
    description: Main execution loop that runs in separate thread, receiving state
      from DRL model and submitting orders to Alpaca API
    evidence: finrl/meta/paper_trading/alpaca.py:19(run)
  - name: DRLAgent.DRL_prediction
    description: Batch inference on historical data for generating action sequences
      used in backtesting
    evidence: finrl/agents/stablebaselines3/models.py:156(DRL_prediction)
  - name: PaperTradingAlpaca.test
    description: Runs inference loop with trained model, executing trades on Alpaca
      paper trading account
    evidence: finrl/meta/paper_trading/alpaca.py:300(test)
  key_behaviors:
  - behavior: Threaded order submission
    description: Order submission runs in separate thread to reduce latency and maintain
      real-time responsiveness. Critical for strategies requiring quick reaction to
      market conditions.
    evidence: finrl/meta/paper_trading/alpaca.py:179(threading.Thread)
  - behavior: Sigmoid transform for turbulence
    description: Raw turbulence values are transformed using sigmoid to [0,1] range.
      This smooths regime transitions and prevents abrupt trading decisions during
      turbulent periods.
    evidence: finrl/meta/paper_trading/alpaca.py:387(sigmoid_sign)
  - behavior: 2-minute buffer before market close
    description: timeToClose function ensures orders are submitted with 2-minute buffer
      before exchange closes. Guarantees order execution and prevents partial fills
      from EOD auction.
    evidence: finrl/meta/paper_trading/alpaca.py:165(timeToClose)
  replaceable_points:
  - name: execution_mode
    description: Choose between live trading, paper trading, and historical backtesting
    options:
    - name: paper_trading
      traits:
      - real API
      - no capital risk
      - market prices
      - ' Alpaca'
      fit_for:
      - strategy validation
      - production simulation
      - live-like testing
      not_fit_for:
      - real returns
      - latency testing
      - market impact
    - name: backtesting
      traits:
      - historical data
      - no latency
      - full history
      fit_for:
      - strategy evaluation
      - benchmarking
      - parameter tuning
      not_fit_for:
      - real-time deployment
      - live trading
    - name: live
      traits:
      - real capital
      - real execution
      - full risk
      fit_for:
      - production
      - actual returns
      - complete validation
      not_fit_for:
      - strategy development
      - risk-free testing
    default: backtesting
  design_decisions:
  - 'Threaded order submission: Concurrent order placement reduces latency; critical
    for HFT strategies (finrl/meta/paper_trading/alpaca.py:179)'
  - 'Sigmoid transform for turbulence: Smooths raw turbulence to [0,1] range; prevents
    abrupt regime switches (finrl/meta/paper_trading/alpaca.py:387)'
  - '2-minute buffer before market close: Guarantees order execution before exchange
    closes (finrl/meta/paper_trading/alpaca.py:165)'
  acceptance_hints:
  - Orders match model action size (accounting for available capital)
  - No rejected orders due to insufficient margin or position limits
  - Order history contains each submissions with timestamps
  - Account balance reflects executed trades (commissions applied)
  - Position sizes are within broker limits and portfolio constraints
- id: backtesting_evaluation
  name: Backtesting & Evaluation
  order: 8
  responsibility: Computes performance metrics (Sharpe ratio, max drawdown, annualized
    returns) and generates comparison plots against baselines (DJIA, buy-and-hold).
    This stage exists to provide quantitative validation of trading strategies and
    enable objective comparison with passive benchmarks.
  interface:
    inputs:
    - account_value DataFrame (daily portfolio values)
    - baseline ticker (e.g., ^DJI for Dow Jones)
    - initial_amount
    outputs:
    - stats dict with annualized return, std, Sharpe, max drawdown, calmar
    - comparison plots (cumulative returns, drawdowns, transactions)
  required_methods:
  - name: backtest_stats
    description: 'Calculates comprehensive performance metrics: annualized return,
      standard deviation, Sharpe ratio, maximum drawdown, Calmar ratio'
    evidence: finrl/plot.py:38(backtest_stats)
  - name: backtest_plot
    description: Generates PyFolio-style performance charts including cumulative returns,
      underwater drawdown plot, and transaction heatmap
    evidence: finrl/plot.py:50(backtest_plot)
  - name: get_baseline
    description: Fetches baseline benchmark data (default DJIA) from Yahoo Finance
      for comparison
    evidence: finrl/plot.py:76(get_baseline)
  key_behaviors:
  - behavior: PyFolio for risk metrics
    description: Uses Empyrical/Quantopian PyFolio library for industry-standard portfolio
      analysis. Enables benchmark comparison and generates publication-quality charts.
    evidence: finrl/plot.py:8(import pyfolio)
  - behavior: DJIA as default baseline
    description: Dow Jones Industrial Average represents traditional buy-and-hold
      investment. Natural comparison point for stock trading strategies.
    evidence: finrl/plot.py:76(get_baseline)
  - behavior: Normalized comparison
    description: Strategy and baseline are normalized to same starting capital (initial_amount).
      Enables fair comparison across different starting capitals.
    evidence: finrl/applications/stock_trading/stock_trading.py:279(result[col])
  replaceable_points:
  - name: baseline_ticker
    description: Choose benchmark for performance comparison
    options:
    - name: ^DJI
      traits:
      - 30 large-cap stocks
      - price-weighted
      - traditional benchmark
      fit_for:
      - US large-cap strategies
      - traditional comparison
      not_fit_for:
      - sector-specific
      - international markets
    - name: ^SPX
      traits:
      - 500 large-cap
      - market-cap weighted
      - broad coverage
      fit_for:
      - US market comparison
      - index-hugging strategies
      not_fit_for:
      - sector rotation
      - factor-based strategies
    - name: ^IXIC
      traits:
      - tech-heavy
      - NASDAQ composite
      - growth focus
      fit_for:
      - tech strategies
      - growth comparison
      not_fit_for:
      - value strategies
      - financial-heavy
    - name: custom
      traits:
      - fully customizable
      - any ticker list
      - composite
      fit_for:
      - specific benchmarks
      - peer comparison
      - composite indices
      not_fit_for:
      - standard reporting
      - quick analysis
    default: ^DJI
  design_decisions:
  - 'PyFolio for risk metrics: Industry-standard portfolio analysis; enables benchmark
    comparison (finrl/plot.py:8)'
  - 'DJIA as default baseline: Dow Jones represents traditional investment; natural
    comparison point (finrl/plot.py:76)'
  - 'Normalized comparison (initial_amount): Enables fair comparison across different
    starting capitals (finrl/applications/stock_trading/stock_trading.py:279)'
  acceptance_hints:
  - Strategy Sharpe ratio > 1.0 is generally considered acceptable for daily trading
  - Max drawdown < 20% indicates reasonable risk management
  - Strategy outperforms baseline (DJIA/buy-hold) on risk-adjusted basis
  - Plots show complete date range without gaps
  - Metrics are calculated using only in-sample data (no look-ahead)
data_flow:
- from_stage: data_download
  to_stage: feature_engineering
  data: 'raw DataFrame with columns: date, tic, open, high, low, close, volume (OHLCV
    format)'
- from_stage: feature_engineering
  to_stage: data_normalization
  data: 'enriched DataFrame with technical indicators: macd, boll_ub, boll_lb, rsi_30,
    cci_30, dx_30, close_30_sma, close_60_sma, turbulence, vix'
- from_stage: data_normalization
  to_stage: environment_simulation
  data: numpy arrays (price_array, tech_array, turbulence_array) or full DataFrame
    for environment consumption
- from_stage: environment_simulation
  to_stage: model_training
  data: Gym-compatible environment instance with step/reset interface for agent interaction
- from_stage: model_training
  to_stage: ensemble_strategy
  data: trained model checkpoints (saved .pth or .zip files) ready for inference
- from_stage: ensemble_strategy
  to_stage: trading_execution
  data: model weights for selected models, last_state for portfolio continuity across
    rebalancing windows
- from_stage: trading_execution
  to_stage: backtesting_evaluation
  data: account_value history DataFrame, action log with timestamps and executed trades
- from_stage: data_normalization
  to_stage: backtesting_evaluation
  data: baseline price data (DJIA or configured benchmark ticker) for comparison with
    strategy performance
global_contracts:
- contract: DataFrame must have 'date' and 'tic' columns as primary identifiers across
    each processors and environments (finrl/meta/preprocessor/preprocessors.py:26)
  evidence: ''
- contract: 'State space formula: 1 + 2*stock_dim + len(indicators)*stock_dim is hardcoded
    and expected across examples and envs (finrl/applications/stock_trading/stock_trading.py:83)'
  evidence: ''
- contract: Action space equals stock_dim for single-asset trading with position-based
    continuous actions (finrl/meta/env_stock_trading/env_stocktrading.py:71)
  evidence: ''
- contract: Portfolio env action is 1 + portfolio_size (cash bias + weight for each
    asset) for continuous weight allocation (finrl/meta/env_portfolio_optimization/env_portfolio_optimization.py:159)
  evidence: ''
- contract: Every processors return DataFrame with identical schema (date, tic, OHLCV
    + features) enabling environment interchangeability (finrl/meta/data_processor.py:32)
  evidence: ''
- contract: Sell operations MUST be processed before buy operations in environment
    step() to prevent cash balance miscalculation (finrl/meta/env_stock_trading/env_stocktrading.py:331-340)
  evidence: ''
- contract: Turbulence threshold 90th percentile triggers position liquidation across
    each trading environments (finrl/agents/stablebaselines3/models.py:501)
  evidence: ''
- contract: Reward scaling 1e-4 compensates for PPO default hyperparameters; changing
    scaling without retuning lr/ent_coef may destabilize training (finrl/applications/stock_trading/stock_trading.py:99)
  evidence: ''
- contract: Turbulence lookback of 252 days (1 trading year) is required for statistical
    significance (finrl/meta/preprocessor/preprocessors.py:292)
  evidence: ''
business_decisions:
- id: BD-001
  type: T
  content: Data source adapter pattern with factory mapping
  rationale: Factory pattern decouples data retrieval from business logic. If changed
    to direct instantiation, no trading signals or portfolio allocations would change
    - only initialization code differs.
  evidence: finrl/meta/data_processor.py:13(DataProcessor.__init__)
  stage: data_download
  alternative_considered: Direct class instantiation with if/elif chains
- id: BD-002
  type: T
  content: Standardized DataFrame schema (date,tic,open,high,low,close,volume) across
    each data sources
  rationale: Schema standardization enables environment interchangeability without
    affecting trading decisions. Swapping providers does not change signals.
  evidence: finrl/meta/preprocessor/preprocessors.py:26(data_split)
  stage: data_download
  alternative_considered: Dynamic column mapping with config
- id: BD-003
  type: T
  content: Stockstats library for technical indicator calculation
  rationale: Library choice is infrastructure. Different TA libraries produce same
    mathematical results within floating-point precision. Trading output unchanged.
  evidence: finrl/meta/preprocessor/preprocessors.py:10(from stockstats)
  stage: feature_engineering
  alternative_considered: ta-lib (faster but requires license)
  _evidence_issues:
  - 'INVALID_IDENTIFIER: from stockstats in finrl/meta/preprocessor/preprocessors.py'
- id: BD-004
  type: T
  content: TensorboardCallback for training monitoring
  rationale: Logging infrastructure choice. Changing from Tensorboard to MLflow or
    Weights & Biases does not alter model weights or trading decisions.
  evidence: finrl/agents/stablebaselines3/models.py:34(TensorboardCallback)
  stage: model_training
  alternative_considered: MLflow, W&B, Neptune
- id: BD-005
  type: T
  content: PyFolio library for risk metrics calculation
  rationale: Report generation library choice. Metrics calculation follows same formulas
    regardless of implementation. No impact on trading.
  evidence: finrl/plot.py:8(import pyfolio)
  stage: backtesting_evaluation
  alternative_considered: QuantStats, backtesting.py
  _evidence_issues:
  - 'INVALID_IDENTIFIER: import pyfolio in finrl/plot.py'
- id: BD-006
  type: M/BA
  content: Configurable indicator list with default 8 indicators (macd,boll_ub,boll_lb,rsi_30,cci_30,dx_30,close_30_sma,close_60_sma)
  rationale: Indicator selection affects state space dimensionality and signal composition.
    Default 8 captures momentum, volatility, and trend dimensions. Changing indicators
    alters what patterns the RL agent can detect.
  evidence: finrl/config.py:21(INDICATORS)
  stage: feature_engineering
  alternative_considered: Minimal 3-indicator set, comprehensive 20+ indicator set
  _evidence_issues:
  - 'FN_NOT_FOUND: INDICATORS in finrl/config.py'
- id: BD-007
  type: B/BA
  content: NaN/Inf filled with 0 for technical indicator array
  rationale: Filling NaN with 0 encodes assumption that unavailable indicators carry
    zero signal. This affects gradient-based learning and could cause agents to misinterpret
    sparse data regions.
  evidence: finrl/meta/data_processor.py:83(tech_array)
  stage: data_normalization
  alternative_considered: Forward-fill indicators, drop initial rows
  _evidence_issues:
  - 'FN_NOT_FOUND: tech_array in finrl/meta/data_processor.py'
- id: BD-008
  type: B
  content: Itertools.product for complete date×ticker grid with Fillna(0)
  rationale: Complete grid enables vectorized state computation without per-ticker
    branching. Missing data treatment affects whether non-trading days influence agent
    behavior.
  evidence: finrl/applications/stock_trading/stock_trading.py:63(combination)
  stage: data_normalization
  alternative_considered: FFill for prices, dropna for indicators
  _evidence_issues:
  - 'FN_NOT_FOUND: combination in finrl/applications/stock_trading/stock_trading.py'
- id: BD-009
  type: B/BA
  content: Continuous action space [-1,1] encoding direction and size in single value
  rationale: Single continuous action encodes position changes. Negative means sell,
    positive means buy, magnitude indicates size. Changing to discrete or separate
    direction/size actions fundamentally alters agent exploration and trading behavior.
  evidence: finrl/meta/env_stock_trading/env_stocktrading.py:71(action_space)
  stage: environment_simulation
  alternative_considered: Discrete share counts, softmax weight allocation
  _evidence_issues:
  - 'FN_NOT_FOUND: action_space in finrl/meta/env_stock_trading/env_stocktrading.py'
- id: BD-010
  type: B/BA
  content: 'Turbulence threshold liquidation: positions closed when turbulence exceeds
    threshold'
  rationale: Exceeding turbulence triggers complete liquidation. This is an explicit
    risk management policy that directly affects portfolio composition and realized
    returns during volatile periods.
  evidence: finrl/meta/env_stock_trading/env_stocktrading.py:29(turbulence_threshold)
  stage: environment_simulation
  alternative_considered: Partial liquidation, position reduction proportional to
    turbulence
  _evidence_issues:
  - 'FN_NOT_FOUND: turbulence_threshold in finrl/meta/env_stock_trading/env_stocktrading.py'
- id: BD-011
  type: M/BA
  content: Reward scaling 1e-4 for training stability
  rationale: Scaling return by 1e-4 maps typical portfolio returns to [-1,1] range
    compatible with neural network gradients. Without scaling, large absolute returns
    cause gradient explosion in policy updates.
  evidence: finrl/applications/stock_trading/stock_trading.py:99(reward_scaling)
  stage: environment_simulation
  alternative_considered: Per-step return normalization, percentile-based scaling
  _evidence_issues:
  - 'FN_NOT_FOUND: reward_scaling in finrl/applications/stock_trading/stock_trading.py'
- id: BD-012
  type: BA
  content: Memory arrays track full asset/position history for analysis
  rationale: Recording every state/action/reward assumes storage cost is acceptable
    and data retention is valuable. This is a business assumption about analytical
    requirements vs memory overhead.
  evidence: finrl/meta/env_stock_trading/env_stocktrading.py:96(asset_memory)
  stage: environment_simulation
  alternative_considered: Rolling memory window, summary statistics only
  _evidence_issues:
  - 'FN_NOT_FOUND: asset_memory in finrl/meta/env_stock_trading/env_stocktrading.py'
- id: BD-013
  type: T
  content: Dictionary-based model registry decoupling name from class
  rationale: Registry pattern maps string identifiers to model classes. This is a
    software engineering choice. Trading output depends on selected model, not the
    registry mechanism.
  evidence: finrl/agents/stablebaselines3/models.py:14(MODELS)
  stage: model_training
  alternative_considered: Plugin system, entry points
  _evidence_issues:
  - 'FN_NOT_FOUND: MODELS in finrl/agents/stablebaselines3/models.py'
- id: BD-014
  type: M/BA
  content: Default hyperparameters in config.py (A2C_PARAMS, PPO_PARAMS, etc.)
  rationale: Hyperparameters (learning_rate=0.0007, n_steps=5, gamma=0.99) are empirically
    tuned defaults. Changing them affects convergence and final performance but not
    the algorithmic logic.
  evidence: finrl/config.py:34(A2C_PARAMS)
  stage: model_training
  alternative_considered: Auto-tuning with Optuna (available but not default)
  _evidence_issues:
  - 'FN_NOT_FOUND: A2C_PARAMS in finrl/config.py'
- id: BD-015
  type: B/RC
  content: Model checkpoint persistence after training
  rationale: Saving trained models is required for deployment. Without persistence,
    every inference requires retraining, fundamentally changing the production workflow.
  evidence: finrl/agents/stablebaselines3/models.py:277(save)
  stage: model_training
  alternative_considered: ONNX export, model serving framework
  _evidence_issues:
  - 'FN_NOT_FOUND: save in finrl/agents/stablebaselines3/models.py'
- id: BD-016
  type: B/BA
  content: Rolling window ensemble with walk-forward validation
  rationale: Walk-forward validation assumes past performance predicts future performance
    within similar market regimes. This assumption underlies each backtesting-based
    strategy selection.
  evidence: finrl/agents/stablebaselines3/models.py:509(range)
  stage: ensemble_strategy
  alternative_considered: Adaptive window based on volatility regimes
  _evidence_issues:
  - 'FN_NOT_FOUND: range in finrl/agents/stablebaselines3/models.py'
- id: BD-017
  type: M/BA
  content: Sharpe ratio for model selection in ensemble
  rationale: Sharpe ratio = (mean_return - risk_free) / std_dev measures risk-adjusted
    performance. Selecting by Sharpe assumes volatility is the primary risk concern
    and higher Sharpe predicts future outperformance.
  evidence: finrl/agents/stablebaselines3/models.py:283(get_validation_sharpe)
  stage: ensemble_strategy
  alternative_considered: Sortino ratio (downside deviation), Calmar ratio (max drawdown)
- id: BD-018
  type: B/BA
  content: 90th percentile turbulence threshold for adaptive risk control
  rationale: Using historical percentile assumes past turbulence distribution is relevant
    to future risk. This adaptive threshold implicitly assumes mean-reversion in market
    volatility regimes.
  evidence: finrl/agents/stablebaselines3/models.py:500(quantile)
  stage: ensemble_strategy
  alternative_considered: Rolling mean + k*std threshold, VIX-based threshold
  _evidence_issues:
  - 'FN_NOT_FOUND: quantile in finrl/agents/stablebaselines3/models.py'
- id: BD-019
  type: BA
  content: Last state passed between rebalancing windows for portfolio continuity
  rationale: Passing terminal state from one window as initial state for next assumes
    no capital flows between windows. This is an assumption about investor behavior
    and rebalancing mechanics.
  evidence: finrl/agents/stablebaselines3/models.py:489(last_state_ensemble)
  stage: ensemble_strategy
  alternative_considered: Reset to initial capital, normalize positions to capital
    at window start
  _evidence_issues:
  - 'FN_NOT_FOUND: last_state_ensemble in finrl/agents/stablebaselines3/models.py'
- id: BD-020
  type: B
  content: Threaded order submission for concurrent execution
  rationale: Concurrent order placement affects execution timing and fills. Threading
    can cause race conditions in position tracking, fundamentally affecting order
    lifecycle.
  evidence: finrl/meta/paper_trading/alpaca.py:179(threading.Thread)
  stage: trading_execution
  alternative_considered: Async/await, message queue for orders
  _evidence_issues:
  - 'FN_NOT_FOUND: threading.Thread in finrl/meta/paper_trading/alpaca.py'
- id: BD-021
  type: B
  content: Sigmoid transformation for turbulence normalization to [0,1] range
  rationale: Sigmoid compresses extreme values smoothly. This affects how turbulence
    influences trading decisions - gradual vs sharp transitions between risk-on/risk-off
    states.
  evidence: finrl/meta/paper_trading/alpaca.py:387(sigmoid_sign)
  stage: trading_execution
  alternative_considered: Tanh, min-max scaling, percentile ranking
- id: BD-022
  type: B/DK
  content: 2-minute buffer before market close for order execution guarantee
  rationale: Buffer accounts for execution latency. Without it, orders may not reach
    exchange before close. This directly affects whether end-of-day rebalancing occurs.
  evidence: finrl/meta/paper_trading/alpaca.py:165(timeToClose)
  stage: trading_execution
  alternative_considered: Percentage of trading day remaining, dynamic buffer based
    on latency
  _evidence_issues:
  - 'FN_NOT_FOUND: timeToClose in finrl/meta/paper_trading/alpaca.py'
- id: BD-023
  type: M/DK
  content: DJI (Dow Jones Industrial Average) as default benchmark
  rationale: Benchmark defines what 'beat the market' means. DJI represents large-cap
    US equities. Different benchmarks yield different relative performance conclusions.
  evidence: finrl/plot.py:76(get_baseline)
  stage: backtesting_evaluation
  alternative_considered: S&P 500, custom portfolio, risk-free rate
- id: BD-024
  type: B/BA
  content: Normalized account value comparison to initial_amount
  rationale: Normalizing to initial capital allows comparing strategies with different
    budget constraints. This is a business requirement for portfolio performance reporting.
  evidence: finrl/applications/stock_trading/stock_trading.py:279(result[col])
  stage: backtesting_evaluation
  alternative_considered: Show both absolute and normalized returns
  _evidence_issues:
  - 'INVALID_IDENTIFIER: result[col] in finrl/applications/stock_trading/stock_trading.py'
- id: BD-025
  type: T
  content: Sell operations processed before buy operations in step()
  rationale: Transaction ordering is mandated by accounting logic - sells must generate
    cash before buys consume it. Violating this would cause negative cash balances
    which are economically impossible.
  evidence: finrl/meta/env_stock_trading/env_stocktrading.py:331(module)
  stage: environment_simulation
  alternative_considered: Atomic transaction processing
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrl/meta/env_stock_trading/env_stocktrading.py'
- id: BD-026
  type: BA
