  rationale: The 90th percentile calculation assumes sufficient historical turbulence
    data to be statistically meaningful. BD-030 requires 252 days for annualization,
    but no enforcement exists that the turbulence time series has sufficient history
    before percentile is calculated. During warmup periods or fresh deployments, percentile-based
    thresholds will be unstable and may trigger inappropriate risk management.
  evidence: N/A:0(see_rationale)
  stage: global
