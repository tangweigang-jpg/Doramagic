- id: BD-I002
  type: B/BA
  content: 'INTERACTION: BD-010 (Turbulence threshold liquidation) × BD-063 (Full
    liquidation on exceed) → Amplified forced selling during market stress'
  rationale: 'When turbulence exceeds threshold, the system performs FULL portfolio
    liquidation. This creates amplification: turbulent markets cause large sells →
    large sells move prices against remaining positions → remaining positions liquidate
    at worse prices. The binary response provides no graduated risk management - either
    full exposure or zero exposure with no intermediate states.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Partial liquidation proportional to turbulence level, gradual
    position reduction
- id: BD-I003
  type: BA
  content: 'INTERACTION: BD-040 (Gamma PPO=0.99) × BD-095 (ElegantRL gamma=0.985)
    → Training-deployment temporal horizon mismatch'
  rationale: PPO paper trading uses gamma=0.99 (config.py ERL_PARAMS uses 0.985).
    Gamma determines reward discounting - 0.99 means agent values rewards 100 steps
    ahead ~0.366 of immediate rewards, while 0.985 gives 0.220. Agents trained with
    different gammas have different effective time horizons. When deployed with wrong
    gamma, the agent optimizes for different objectives than it was trained for, causing
    suboptimal decision-making.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unified gamma configuration with validation, gamma schedule
    for deployment
