resources:
- id: res-slot-001
  type: replaceable_component
  name: market_data_provider
  path: null
  description: 'Choose based on: (1) asset class needed, (2) latency requirements,
    (3) budget, (4) authentication complexity'
  used_in_stages: []
  options:
  - name: Yahoo Finance
    traits:
    - free
    - no-auth
    - delayed-15min
    - wide-coverage
    fit_for:
    - Educational use, prototyping, non-time-critical backtesting
    not_fit_for:
    - Real-time trading, HFT, institutional research requiring tick data
  - name: Alpaca
    traits:
    - free-tier
    - api-auth
    - real-time
    - us-equities
    fit_for:
    - US stock trading with paper/live execution, real-time data
    not_fit_for:
    - International markets, high-frequency data, crypto
  - name: WRDS TAQ
    traits:
    - institutional
    - tick-data
    - high-frequency
    - academic
    fit_for:
    - Academic research requiring millisecond-level TAQ data
    not_fit_for:
    - Commercial use, retail traders, non-subscribers
  - name: EODHD
    traits:
    - paid
    - intraday
    - fundamentals
    - global
    fit_for:
    - Professional intraday backtesting with fundamentals
    not_fit_for:
    - Budget-conscious projects, HFT
  - name: CCXT/Binance
    traits:
    - crypto
    - free-tier
    - unified-api
    fit_for:
    - Cryptocurrency trading strategies
    not_fit_for:
    - Traditional equities, regulatory-compliant trading
  - name: JoinQuant
    traits:
    - china-markets
    - fundamental-data
    - academic
    fit_for:
    - China A-share research
    not_fit_for:
    - US/global markets
  - name: Tushare
    traits:
    - china-markets
    - free-tier
    - daily-data
    fit_for:
    - China market data with basic access
    not_fit_for:
    - Intraday China trading
