    fees (between Binance's 0.1% and Coinbase's higher fees). This ensures DRL agents
    learn cost-conscious trading strategies and avoid excessive turnover.
  evidence: finrl/meta/env_cryptocurrency_trading/env_btc_ccxt.py:7(__init__)
  stage: environment_simulation
  alternative_considered: Variable fee structure based on order size and market liquidity
- id: FINRL-004
  type: B/BA
  content: Reinforcement learning discount factor (gamma) set to 0.99 across each
    trading environments
  rationale: Gamma of 0.99 balances immediate rewards with future returns, appropriate
    for trading where long-term capital appreciation matters. This high value reflects
    investment-oriented rather than speculative trading strategies.
  evidence: finrl/meta/env_cryptocurrency_trading/env_btc_ccxt.py:7(__init__)
  stage: model_training
  alternative_considered: Adaptive gamma based on market volatility regime
  vague_rationale: true
- id: FINRL-005
  type: B/BA
  content: Initial capital of $1,000,000 (1M) used as starting balance for cryptocurrency
    trading environments
  rationale: Starting with 1M units allows for significant position sizing flexibility
    and avoids boundary issues with integer constraints. This institutional-scale
    capital reflects professional trading scenarios.
  evidence: finrl/meta/env_cryptocurrency_trading/env_btc_ccxt.py:7(__init__)
  stage: environment_simulation
  alternative_considered: Configurable initial capital as a parameter
- id: FINRL-006
  type: B/BA
  content: Default lookback period of 252 days for portfolio allocation environment
  rationale: 252-day lookback corresponds to one trading year, providing sufficient
    historical context for calculating technical indicators and state representations
    while keeping computational requirements manageable.
  evidence: finrl/meta/env_portfolio_allocation/env_portfolio.py:66(__init__)
  stage: environment_simulation
  alternative_considered: Variable lookback based on time interval and trading frequency
- id: FINRL-007
  type: T
  content: Softmax normalization applied to portfolio allocation actions
  rationale: Softmax action normalization ensures portfolio weights sum to 1 and remain
    non-negative, directly interpretable as allocation percentages. This provides
    natural boundary constraints without requiring clipping.
  evidence: finrl/meta/env_portfolio_allocation/env_portfolio.py:231(softmax_normalization)
  stage: action_processing
  alternative_considered: Sigmoid with scaling for bounded long/short positions
- id: FINRL-008
  type: T
  content: Multi-framework DRL support via pluggable agent architecture (ElegantRL
    and RLlib)
  rationale: Supporting both ElegantRL (custom PyTorch implementations) and RLlib
    (Ray-based distributed training) allows users to choose based on their scale,
    performance needs, and existing infrastructure.
  evidence: finrl/agents/elegantrl/models.py:29(DRLAgent)
  stage: architecture
  alternative_considered: Single framework with abstraction layer
- id: FINRL-009
  type: B
  content: Reward scaling parameter in portfolio environment allows adjustment of
    reward magnitude
  rationale: Reward scaling enables normalization of returns to appropriate magnitudes
    for neural network optimization, preventing vanishing or exploding gradients in
    actor-critic architectures.
  evidence: finrl/meta/env_portfolio_allocation/env_portfolio.py:66(__init__)
  stage: model_training
  alternative_considered: Automatic reward normalization based on running statistics
  vague_rationale: true
- id: FINRL-010
  type: T
  content: Yahoo Finance as primary free data source with stockstats package for technical
    indicators
  rationale: Yahoo Finance provides accessible market data without API costs, and
    stockstats offers reliable technical indicator calculations, reducing external
    dependencies while maintaining data quality.
  evidence: finrl/meta/data_processors/processor_yahoofinance.py:35(YahooFinanceProcessor)
  stage: data_download
  alternative_considered: Premium data sources (Bloomberg, Refinitiv) for production
    use
- id: FINRL-011
  type: T
  content: Separate data processors per broker/exchange following adapter pattern
  rationale: Implementing distinct processor classes (Alpaca, Eodhd, Sinopac, WRDS,
    etc.) isolates broker-specific logic, enabling clean integration of new data sources
    without modifying core trading logic.
  evidence: finrl/meta/data_processors/processor_alpaca.py:20(AlpacaProcessor)
  stage: architecture
  alternative_considered: Abstract base class with template method pattern
- id: FINRL-012
  type: B/BA
  content: Ray Tune integration with default 100 training iterations for hyperparameter
    optimization
  rationale: Default 100 iterations provides reasonable search coverage for DRL hyperparameters
    while keeping compute time manageable. This balances exploration depth with practical
    training duration.
  evidence: finrl/agents/rllib/drllibv2.py:125(__init__)
  stage: hyperparameter_tuning
  alternative_considered: Early stopping based on convergence metrics
- id: FINRL-013
  type: B/DK
  content: VIX optional inclusion in state space for portfolio allocation
  rationale: VIX (fear index) provides market-wide volatility sentiment. Making it
    optional allows agents to learn with or without this fear gauge based on whether
    it improves performance.
  evidence: finrl/meta/data_processors/processor_alpaca.py:293(add_vix)
  stage: feature_engineering
  alternative_considered: Alternative volatility measures (realized vol, implied vol
    from options)
- id: FINRL-014
  type: B/BA
  content: Maximum stock holding (hmax) as configurable parameter in portfolio environment
  rationale: Making hmax configurable allows controlling position sizes based on risk
    tolerance, account size, or regulatory constraints without environment code changes.
  evidence: finrl/meta/env_portfolio_allocation/env_portfolio.py:66(__init__)
  stage: risk_management
  alternative_considered: Dynamic hmax based on current portfolio value
- id: FINRL-015
  type: B/BA
  content: Default 5000 total timesteps for ElegantRL model training
  rationale: 5000 timesteps serves as a quick baseline for testing, allowing rapid
    iteration during development. Production training would typically use significantly
    more timesteps.
  evidence: finrl/agents/elegantrl/models.py:104(train_model)
  stage: model_training
  alternative_considered: Auto-scaling based on environment complexity estimation
