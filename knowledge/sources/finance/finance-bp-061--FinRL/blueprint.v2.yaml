- id: BD-I008
  type: B/DK
  content: 'INTERACTION: BD-020 (Threaded order submission) × BD-022 (2-minute market
    close buffer) × BD-021 (Sigmoid turbulence) → Race condition during critical execution
    window'
  rationale: Threaded order submission means multiple orders execute concurrently.
    The 2-minute buffer before market close is a critical timing constraint. Sigmoid
    turbulence normalization affects position sizing decisions. If turbulence state
    changes during the 2-minute window, threads may read inconsistent position states,
    submit orders based on stale turbulence readings, or experience buffer expiry
    during execution. This creates risk of orders arriving after market close, orders
    at wrong sizes, or position double-counting.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Async/await with proper locking, sequential order processing,
    message queue for order execution
- id: BD-I009
  type: B/BA
  content: 'INTERACTION: BD-006 (8 default indicators) × BD-028 (Hardcoded state space
    formula) → Dimension mismatch when indicators change'
  rationale: The state space formula 1 + 2*stock_dim + len(indicators)*stock_dim is
    hardcoded throughout examples. Changing the indicator list (BD-006) requires manual
    updates to the formula in multiple locations. If indicators change without formula
    update, neural network input dimensions will mismatch, causing training failures
    or incorrect learning with truncated/zero-padded states.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Auto-generate state space from indicator config, validate
    dimensions at initialization
- id: BD-I010
  type: B/BA
  content: 'INTERACTION: BD-049 (0.1% transaction cost) × BD-009 (Continuous action
    space) × BD-057 (63-day rebalancing) → Optimal frequency miscalculation'
  rationale: The 0.1% transaction cost per trade combined with continuous action space
    (allowing fractional position changes) and quarterly (63-day) rebalancing creates
    an implicit assumption about optimal trading frequency. Continuous actions encourage
    frequent small adjustments, but each adjustment incurs 0.1% cost. The backtest
    doesn't validate whether the chosen rebalancing frequency is optimal given transaction
    costs - strategies with lower rebalancing frequency and larger adjustments might
    outperform due to cost avoidance.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Transaction-cost-aware action thresholding, adaptive rebalancing
    frequency, cost-benefit analysis before trades
