id: finance-bp-061
name: FinRL
sop_version: '3.6'
source:
  projects:
  - FinRL
  commit_hash: 220f9e490996a6e5c84cfad914ff14f2e0c42d22
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: automated stock trading using deep reinforcement learning
  description: FinRL is a deep reinforcement learning library for automated stock
    trading. It provides a complete pipeline from data acquisition to model deployment,
    enabling researchers and practitioners to develop and test DRL-based trading strategies.
  prerequisites: Users need familiarity with Python, reinforcement learning concepts,
    and financial markets. Understanding of Gym environments and neural networks is
    helpful.
  not_suitable_for: High-frequency trading (HFT), direct production deployment without
    thorough backtesting, non-equity asset classes beyond the supported crypto/portfolio
    environments, real-money trading without paper trading validation
stages:
- id: data_download
  name: Market Data Acquisition
  order: 1
  responsibility: 'Fetch raw OHLCV data from external APIs and data providers. WHY:
    Abstract multiple data sources behind a unified interface to allow flexibility
    in data sourcing without changing downstream stages.'
  interface:
    inputs:
    - ticker_list
    - start_date
    - end_date
    - time_interval
    outputs:
    - raw DataFrame with date, tic, open, high, low, close, volume columns
  required_methods:
  - name: YahooDownloader.fetch_data
    description: Downloads historical OHLCV data from Yahoo Finance API for specified
      tickers and date range
    evidence: finrl/meta/preprocessor/yahoodownloader.py:12(YahooDownloader)
  - name: YahooFinanceProcessor.download_data
    description: Fetches data and performs initial processing including timezone handling
      and column renaming
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:35(YahooFinanceProcessor)
  - name: AlpacaProcessor.download_data
    description: Real-time data fetching for paper trading scenarios via Alpaca API
    evidence: finrl/meta/data_processors/processor_alpaca.py:14(AlpacaProcessor)
  - name: DataProcessor.__init__
    description: Factory method that selects and instantiates appropriate data source
      processor based on input type
    evidence: finrl/meta/data_processor.py:13(DataProcessor.__init__)
  key_behaviors:
  - behavior: Factory pattern for data sources
    description: Conditional instantiation selects from alpaca, wrds, yahoofinance
      based on input parameters, allowing runtime switching between providers
    evidence: finrl/meta/data_processor.py:15-29(DataProcessor.__init__)
  - behavior: Unified column naming
    description: Normalizes output to [timestamp, open, high, low, close, volume,
      tic] regardless of source API differences
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:262(rename columns)
  - behavior: Interval conversion
    description: Maps FinRL standard intervals (1D, 1Min) to provider-specific formats
      for multi-resolution data support
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:182(convert_interval)
  replaceable_points:
  - name: data_source
    description: Backend data provider
    options:
    - name: yahoofinance
      traits:
      - Free
      - no API key required
      - delayed data
      fit_for:
      - research
      - prototyping
      - backtesting with historical data
      not_fit_for:
      - real-time trading
      - high-frequency requirements
    - name: alpaca
      traits:
      - Real-time capable
      - paper trading support
      - API key required
      fit_for:
      - live paper trading
      - real-time strategy validation
      not_fit_for:
      - historical-only backtesting
    - name: wrds
      traits:
      - Institutional quality
      - tick-level data
      - requires academic access
      fit_for:
      - academic research
      - high-precision backtesting
      not_fit_for:
      - quick prototyping
      - commercial applications
    - name: ccxt
      traits:
      - Multi-exchange crypto
      - unified API
      fit_for:
      - cryptocurrency trading
      - multi-exchange strategies
      not_fit_for:
      - stock trading
      - traditional finance
    - name: joinquant
      traits:
      - China A-share focus
      - local market access
      fit_for:
      - Chinese market strategies
      - A-share trading
      not_fit_for:
      - US markets
      - international trading
    default: yahoofinance
  design_decisions:
  - 'Factory pattern for data sources: Allows swapping data providers without changing
    training pipeline. Evidence: finrl/meta/data_processor.py:13(DataProcessor.__init__)'
  - 'Unified column naming across sources: Normalizes output to [timestamp, open,
    high, low, close, volume, tic] regardless of source API differences. Evidence:
    finrl/meta/data_processors/processor_yahoofinance.py:262(rename columns)'
  - 'Support for multiple time intervals: Maps FinRL standard intervals (1D, 1Min)
    to provider-specific formats, enabling multi-resolution data. Evidence: finrl/meta/data_processors/processor_yahoofinance.py:182(convert_interval)'
  acceptance_hints:
  - 'DataFrame has correct columns: date, tic, open, high, low, close, volume'
  - Date range matches requested start_date to end_date
  - Every requested tickers have data (no complete missing tickers)
  - No duplicate date-tic combinations
- id: data_cleaning
  name: Data Cleaning & Alignment
  order: 2
  responsibility: 'Handle missing values, align to trading calendar, fill gaps for
    delisted/missing stocks. WHY: Financial data has gaps due to weekends, holidays,
    and delistings that must be handled for consistent tensor shapes.'
  interface:
    inputs:
    - raw DataFrame with possible NaN/0 values
    outputs:
    - cleaned DataFrame aligned to trading calendar
  required_methods:
  - name: YahooFinanceProcessor.clean_data
    description: Fills NaN with previous close values and handles timezone conversions
      for cleaned output
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:274(clean_data)
  - name: FeatureEngineer.clean_data
    description: Removes tickers with less than 90% data coverage to prevent contamination
      from delisted stocks
    evidence: finrl/meta/preprocessor/preprocessors.py:173(clean_data)
  key_behaviors:
  - behavior: Forward-fill missing data
    description: Maintains price continuity for technical indicators while marking
      volume as 0. Critical for indicator calculations that depend on continuous series
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:347(fill NaN)
  - behavior: Drop tickers with insufficient data
    description: Prevents NaN contamination from delisted stocks, simplifies portfolio
      allocation
    evidence: finrl/meta/preprocessor/preprocessors.py:185(dropna axis=1)
  - behavior: Ordered preprocessing dependency
    description: clean_data() must be called before add_technical_indicator() as stockstats
      fails on dirty tickers
    evidence: finrl/meta/preprocessor/preprocessors.py:146-152(ordered method calls)
  replaceable_points:
  - name: fill_method
    description: How to handle missing values
    options:
    - name: forward_fill
      traits:
      - Maintains price continuity
      - fast
      - no look-ahead bias
      fit_for:
      - standard OHLCV data
      - technical indicator calculations
      not_fit_for:
      - gapping stocks
      - earnings announcement periods
    - name: interpolate
      traits:
      - Smoother estimates
      - considers neighboring values
      fit_for:
      - sparse data
      - linear trend assumptions
      not_fit_for:
      - volatile periods
      - large gaps
    - name: drop
      traits:
      - No imputation
      - preserves data integrity
      fit_for:
      - high-frequency data
      - when data quality is critical
      not_fit_for:
      - gappy datasets
      - small sample sizes
    default: forward_fill
  design_decisions:
  - 'Forward-fill missing data with previous close: Maintains price continuity for
    technical indicators while marking volume as 0. Evidence: finrl/meta/data_processors/processor_yahoofinance.py:347(fill
    NaN)'
  - 'Drop tickers with insufficient data: Prevents NaN contamination from delisted
    stocks, simplifies portfolio allocation. Evidence: finrl/meta/preprocessor/preprocessors.py:185(dropna
    axis=1)'
  - 'Ordered preprocessing dependency: clean_data() must be called before add_technical_indicator().
    Evidence: finrl/meta/preprocessor/preprocessors.py:146-152(ordered method calls)'
  acceptance_hints:
  - No NaN values in price columns (open, high, low, close)
  - No tickers with less than 90% data coverage
  - DataFrame sorted by date and ticker
  - Trading calendar alignment verified (no missing expected trading days)
- id: feature_engineering
  name: Technical Indicator Computation
  order: 3
  responsibility: 'Calculate financial indicators (MACD, RSI, Bollinger Bands, etc.)
    and risk metrics (VIX, turbulence). WHY: These features provide the market context
    needed for RL state representation.'
  interface:
    inputs:
    - clean OHLCV DataFrame
    outputs:
    - DataFrame with added technical indicator columns
  required_methods:
  - name: FeatureEngineer.add_technical_indicator
    description: Orchestrates feature engineering pipeline adding configured technical
      indicators to price data
    evidence: finrl/meta/preprocessor/preprocessors.py:106(FeatureEngineer)
  - name: calculate_turbulence
    description: Computes Mahalanobis-distance-based market stress metric capturing
      correlated extreme moves
    evidence: finrl/meta/preprocessor/preprocessors.py:282(calculate_turbulence)
  - name: Sdf.calculate_indicator
    description: Library-based technical indicator calculation using stockstats package
    evidence: finrl/meta/preprocessor/preprocessors.py:209(Sdf stockstats)
  key_behaviors:
  - behavior: Turbulence as Mahalanobis distance
    description: Captures correlated extreme moves across portfolio stocks, better
      than single-stock volatility for risk detection
    evidence: finrl/meta/preprocessor/preprocessors.py:315(dot product pinv)
  - behavior: 252-day rolling window for turbulence
    description: Roughly one trading year provides statistically significant covariance
      estimate for risk regime detection
    evidence: finrl/meta/preprocessor/preprocessors.py:292(start=252)
  - behavior: VIX from external source
    description: Fear/greed proxy downloaded separately from Yahoo (VIXY ticker),
      not calculable from portfolio stocks alone
    evidence: finrl/meta/preprocessor/preprocessors.py:260(VIXY ticker)
  replaceable_points:
  - name: indicator_list
    description: Which technical indicators to compute
    options:
    - name: macd,rsi,boll
      traits:
      - Most common
      - proven in trading
      - low dimensionality
      fit_for:
      - baseline strategies
      - comparative research
      not_fit_for:
      - high-frequency
      - sector-specific strategies
    - name: custom list
      traits:
      - User-defined
      - flexible
      - domain-specific
      fit_for:
      - specialized strategies
      - research experiments
      not_fit_for:
      - quick prototyping
      - standard comparisons
    default: config.INDICATORS
  - name: turbulence_enabled
    description: Include turbulence risk metric
    options:
    - name: 'true'
      traits:
      - Risk-aware
      - regime detection
      - extra computation
      fit_for:
      - risk management focus
      - crisis periods
      not_fit_for:
      - bull market only
      - low-frequency rebalancing
    - name: 'false'
      traits:
      - Faster
      - simpler
      - no risk signal
      fit_for:
      - simple strategies
      - stable markets
      not_fit_for:
      - high volatility environments
    default: 'false'
  design_decisions:
  - 'Turbulence as Mahalanobis distance: Captures correlated extreme moves across
    portfolio stocks. Evidence: finrl/meta/preprocessor/preprocessors.py:315(dot product
    pinv)'
  - '252-day rolling window for turbulence: Roughly one trading year provides statistically
    significant covariance estimate. Evidence: finrl/meta/preprocessor/preprocessors.py:292(start=252)'
  - 'VIX downloaded separately from Yahoo: Fear/greed proxy from external source.
    Evidence: finrl/meta/preprocessor/preprocessors.py:260(VIXY ticker)'
  acceptance_hints:
  - Every configured technical indicators present in DataFrame
  - No NaN values in indicator columns after calculation
  - Turbulence values reasonable (positive, finite)
  - VIX column present when turbulence_enabled=true
- id: data_preprocessing
  name: Normalization & Array Conversion
  order: 4
  responsibility: 'Scale features, convert DataFrame to numpy arrays for efficient
    Gym environment. WHY: RL requires fixed-shape state vectors; scaling improves
    neural network convergence.'
  interface:
    inputs:
    - feature-enriched DataFrame
    outputs:
    - price_array, tech_array, turbulence_array as np.ndarray
  required_methods:
  - name: GroupByScaler.fit_transform
    description: Per-ticker normalization preserving cross-sectional relationships
      while scaling features to [-1, 1] range
    evidence: finrl/meta/preprocessor/preprocessors.py:44(GroupByScaler)
  - name: df_to_array
    description: Converts DataFrame to 3-array tuple (price_array, tech_array, turbulence_array)
      for environment consumption
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:497(df_to_array)
  key_behaviors:
  - behavior: Separate price/tech/turbulence arrays
    description: Allows independent scaling and selective use of features per environment
      type
    evidence: finrl/meta/data_processor.py:79(df_to_array)
  - behavior: Per-ticker feature scaling
    description: Prevents high-price stocks from dominating state space; each ticker
      normalized to its own range
    evidence: finrl/meta/preprocessor/preprocessors.py:81(per-value scaler)
  - behavior: Power-of-2 scaling factors in env
    description: Avoids floating-point precision issues with binary fractions; accelerates
      neural net convergence
    evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:31(tech_ary * 2**-7)
  replaceable_points:
  - name: scaler
    description: Normalization method
    options:
    - name: MaxAbsScaler
      traits:
      - Preserves sign
      - no shift
      - good for bounded data
      fit_for:
      - price data
      - bounded indicators
      not_fit_for:
      - data with outliers
      - zero-centered distributions
    - name: StandardScaler
      traits:
      - Zero mean
      - unit variance
      - linear transform
      fit_for:
      - normal distributions
      - gradient-based optimization
      not_fit_for:
      - non-normal data
      - bounded spaces
    - name: MinMaxScaler
      traits:
      - Bounded output
      - linear
      - sensitive to outliers
      fit_for:
      - bounded indicators
      - neural network inputs
      not_fit_for:
      - data with large ranges
      - sparse features
    default: MaxAbsScaler
  design_decisions:
  - 'Separate price/tech/turbulence arrays: Allows independent scaling and selective
    use of features per environment type. Evidence: finrl/meta/data_processor.py:79(df_to_array)'
  - 'Per-ticker feature scaling: Prevents high-price stocks from dominating state
    space. Evidence: finrl/meta/preprocessor/preprocessors.py:81(per-value scaler)'
  - 'Power-of-2 scaling factors in env: Avoids floating-point precision issues with
    binary fractions. Evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:31(tech_ary
    * 2**-7)'
  acceptance_hints:
  - Every arrays have consistent timesteps dimension
  - No NaN values in any array
  - 'Price array shape: (timesteps, stock_dim)'
  - Feature values within expected scaled range
- id: environment_simulation
  name: Gym Environment Creation
  order: 5
  responsibility: 'Wrap data and trading mechanics into OpenAI Gym-compatible interface
    for RL training. WHY: Standardizes interaction interface across each DRL libraries
    while encapsulating domain-specific trading logic.'
  interface:
    inputs:
    - config dict with arrays, initial_amount, cost rates
    outputs:
    - Gym environment with step/reset/render methods
  required_methods:
  - name: StockTradingEnv.reset
    description: Initializes environment state including cash, holdings, and data
      pointer to start of episode
    evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:8(StockTradingEnv)
  - name: StockTradingEnv.step
    description: Executes one trading step with SELL before BUY ordering, calculates
      rewards and returns new state
    evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:76(action_space)
  - name: PortfolioOptimizationEnv.step
    description: Executes portfolio weight optimization with softmax action mapping
    evidence: finrl/meta/env_portfolio_optimization/env_portfolio_optimization.py:31(PortfolioOptimizationEnv)
  key_behaviors:
  - behavior: Continuous action space [-1, 1] normalized
    description: Single continuous space works for each algorithms (A2C, PPO, DDPG);
      libraries handle mapping to discrete if needed
    evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:76(action_space
      Box)
  - behavior: Gamma-weighted cumulative reward
    description: Prioritizes long-term returns over short-term fluctuations, aligns
      with investment horizon
    evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:146(gamma_reward)
  - behavior: Turbulence-triggered forced liquidation
    description: 'Risk management rule: sell each when market stress exceeds threshold
      to prevent catastrophic losses'
    evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:136(sell all)
  - behavior: SELL before BUY ordering
    description: argsort orders sell_index first to prevent incorrect cash calculations
      for subsequent buys
    evidence: env_stocktrading.py:327-340(sell_index, buy_index processing)
  - behavior: Gym API dual-standard support
    description: Supports both deprecated gym and modern gymnasium via new_gym_api
      flag for backward compatibility
    evidence: finrl/meta/env_portfolio_optimization/env_portfolio_optimization.py:91(new_gym_api
      flag)
  replaceable_points:
  - name: reward_scaling
    description: Reward normalization factor
    options:
    - name: 2**-11
      traits:
      - Empirically tuned
      - binary-friendly
      - stable gradients
      fit_for:
      - PPO training
      - large capital bases
      not_fit_for:
      - small accounts
      - different capital bases
    - name: 1e-4
      traits:
      - Standard scaling
      - documented
      fit_for:
      - General use
      - standard env variants
      not_fit_for:
      - np environment
      - specific capital bases
    - name: custom
      traits:
      - User-defined
      - tunable
      - requires experimentation
      fit_for:
      - Specialized strategies
      - research
      not_fit_for:
      - Quick prototyping
      - standard comparisons
    default: 2**-11
  - name: action_space_type
    description: How actions map to trades
    options:
    - name: normalized_continuous
      traits:
      - '[-1, 1] range'
      - each DRL algorithms
      - single space
      fit_for:
      - Multi-stock trading
      - standard DRL agents
      not_fit_for:
      - Portfolio allocation
      - discrete actions
    - name: discrete
      traits:
      - Action indices
      - explicit quantity
      fit_for:
      - Simple strategies
      - DQN variants
      not_fit_for:
      - Continuous control
      - fine-grained trading
    - name: softmax
      traits:
      - Weight distribution
      - sums to 1
      - portfolio focus
      fit_for:
      - Portfolio allocation
      - weight-based strategies
      not_fit_for:
      - Direct stock trading
      - position sizing
    default: normalized_continuous
  design_decisions:
  - 'Continuous action space [-1, 1] normalized: Single continuous space works for
    each algorithms. Evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:76(action_space
    Box)'
  - 'Gamma-weighted cumulative reward: Prioritizes long-term returns over short-term
    fluctuations. Evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:146(gamma_reward)'
  - 'Turbulence-triggered forced liquidation: Risk management rule for catastrophic
    loss prevention. Evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:136(sell
    all)'
  - 'New Gym API support via flag: Backward compatibility with legacy gym while supporting
    gymnasium migration. Evidence: finrl/meta/env_portfolio_optimization/env_portfolio_optimization.py:91(new_gym_api)'
  - 'SELL before BUY ordering: argsort orders sell_index first to prevent incorrect
    cash calculations. Evidence: env_stocktrading.py:327-340(sell_index, buy_index
    processing)'
  acceptance_hints:
  - 'State dimension matches expected formula: 1 + 2*stock_dim + indicators*stock_dim'
  - Action space is Box(-1, 1, shape=(stock_dim,))
  - step() returns done=True at end of data window
  - Reward is finite and scaled appropriately
  - price>0 check enforced before executing trades
- id: model_training
  name: DRL Model Training
  order: 6
  responsibility: 'Train deep reinforcement learning agents on environment interactions.
    WHY: Different algorithms (PPO, DDPG, SAC) have different strengths; abstraction
    enables algorithm experimentation.'
  interface:
    inputs:
    - Gym environment, hyperparameter dict
    outputs:
    - Trained model checkpoint
  required_methods:
  - name: DRLAgent.get_model
    description: Instantiates requested DRL model with environment and hyperparameters
    evidence: finrl/agents/stablebaselines3/models.py:79(DRLAgent sb3)
  - name: DRLAgent.train_model
    description: Executes training loop with callbacks for tensorboard logging and
      checkpointing
    evidence: finrl/agents/stablebaselines3/models.py:34(TensorboardCallback)
  - name: DRLAgent.get_model
    description: ElegantRL wrapper with GPU support for accelerated training
    evidence: finrl/agents/elegantrl/models.py:29(DRLAgent erl)
  - name: DRLAgent.get_model
    description: Ray RLlib wrapper for distributed training across multiple nodes
    evidence: finrl/agents/rllib/models.py:12(DRLAgent rllib)
  key_behaviors:
  - behavior: Library-agnostic agent interface
    description: Every DRL agents implement get_model/train_model/DRL_prediction;
      users can swap libraries without changing application code
    evidence: finrl/train.py:48-99(conditional imports)
  - behavior: Tensorboard callback for monitoring
    description: Standardized training visualization across each models via Stable
      Baselines3 callback
    evidence: finrl/agents/stablebaselines3/models.py:34(TensorboardCallback)
  - behavior: CallbackList for extensibility
    description: Allows stacking multiple callbacks (tensorboard, early stopping,
      checkpointing) without modifying agent code
    evidence: finrl/agents/stablebaselines3/models.py:146(CallbackList)
  replaceable_points:
  - name: drl_lib
    description: DRL library backend
    options:
    - name: stable_baselines3
      traits:
      - Production-ready
      - well-documented
      - CPU/GPU
      - standard algorithms
      fit_for:
      - General use
      - research
      - production
      not_fit_for:
      - Custom algorithms
      - massive scale
    - name: elegantrl
      traits:
      - GPU-accelerated
      - customizable
      - modern algorithms
      fit_for:
      - GPU-heavy training
      - custom agents
      not_fit_for:
      - CPU-only environments
      - quick prototyping
    - name: rllib
      traits:
      - Distributed training
      - massive scale
      - ray integration
      fit_for:
      - Cluster training
      - enterprise scale
      not_fit_for:
      - Single-machine training
      - simple use cases
    default: stable_baselines3
  - name: algorithm
    description: RL algorithm
    options:
    - name: ppo
      traits:
      - Most popular
      - stable
      - continuous actions
      fit_for:
      - General stock trading
      - continuous control
      not_fit_for:
      - Discrete actions
      - very fast training
    - name: a2c
      traits:
      - Efficient
      - on-policy
      - parallel
      fit_for:
      - Fast training
      - simple strategies
      not_fit_for:
      - Highly stochastic environments
    - name: ddpg
      traits:
      - Off-policy
      - continuous actions
      - actor-critic
      fit_for:
      - Continuous control
      - deterministic policies
      not_fit_for:
      - Discrete actions
      - stochastic policies
    - name: sac
      traits:
      - Maximum entropy
      - off-policy
      - automatically tunes entropy
      fit_for:
      - Exploration-heavy tasks
      - stochastic environments
      not_fit_for:
      - Deterministic requirements
      - simple strategies
    - name: td3
      traits:
      - Twin delay
      - addressing DDPG overestimation
      fit_for:
      - Conservative strategies
      - continuous actions
      not_fit_for:
      - Discrete actions
      - exploration-heavy tasks
    default: ppo
  design_decisions:
  - 'Library-agnostic agent interface: Every DRL agents implement get_model/train_model/DRL_prediction.
    Evidence: finrl/train.py:48-99(conditional imports)'
  - 'Tensorboard callback for monitoring: Standardized training visualization. Evidence:
    finrl/agents/stablebaselines3/models.py:34(TensorboardCallback)'
  - 'CallbackList for extensibility: Allows stacking multiple callbacks without modifying
    agent code. Evidence: finrl/agents/stablebaselines3/models.py:146(CallbackList)'
  acceptance_hints:
  - Model checkpoint file created (act.pth, .zip)
  - Training losses decrease over time
  - Tensorboard logs accessible
  - Episode returns show improvement trend
- id: model_validation
  name: Ensemble Validation
  order: 7
  responsibility: 'Evaluate multiple models, select best based on Sharpe ratio, support
    rolling-window retraining. WHY: Ensemble of algorithms reduces variance; rolling
    window simulates real deployment rebalancing.'
  interface:
    inputs:
    - Trained models, validation data window
    outputs:
    - Sharpe ratios, best model selection, rebalance dates
  required_methods:
  - name: DRLEnsembleAgent.run_ensemble_strategy
    description: Multi-model ensemble with rolling validation executing train then
      prediction flow
    evidence: finrl/agents/stablebaselines3/models.py:220(DRLEnsembleAgent)
  - name: get_validation_sharpe
    description: Calculates annualized Sharpe ratio from validation returns using
      252-day year assumption
    evidence: finrl/agents/stablebaselines3/models.py:283(get_validation_sharpe)
  key_behaviors:
  - behavior: Annualized Sharpe ratio for selection
    description: 252-day year assumed; sqrt(4) converts daily to quarterly Sharpe
      for seasonal comparison
    evidence: finrl/agents/stablebaselines3/models.py:295(sqrt(4)*mean/std)
  - behavior: Rolling window rebalancing
    description: Simulates production rebalancing cadence; prevents overfitting to
      specific market regime
    evidence: finrl/agents/stablebaselines3/models.py:323(unique_trade_date)
  - behavior: Turbulence threshold for risk control
    description: Uses historical turbulence 90th percentile as risk-on/risk-off switch
      for trading
    evidence: finrl/agents/stablebaselines3/models.py:496(quantile)
  - behavior: Best Sharpe model selection
    description: argmax selects single best model per window - ensemble diversity
      is lost but simpler selection
    evidence: models.py:659-664(argmax(sharpes) selects single model)
  replaceable_points:
  - name: rebalance_window
    description: Days between model retraining
    options:
    - name: '63'
      traits:
      - Quarterly
      - frequent retraining
      - adapts faster
      fit_for:
      - Volatile markets
      - trending strategies
      not_fit_for:
      - Long-term investing
      - low transaction tolerance
    - name: '252'
      traits:
      - Annual
      - less frequent
      - lower transaction costs
      fit_for:
      - Stable markets
      - trend-following
      not_fit_for:
      - Fast-changing regimes
      - high volatility
    - name: custom
      traits:
      - User-defined
      - tunable
      - requires backtesting
      fit_for:
      - Specialized strategies
      - research
      not_fit_for:
      - Standard comparisons
      - quick prototyping
    default: '63'
  - name: validation_metric
    description: Model selection criterion
    options:
    - name: sharpe
      traits:
      - Risk-adjusted
      - industry standard
      - considers volatility
      fit_for:
      - General use
      - risk-aware strategies
      not_fit_for:
      - Pure return maximization
      - asymmetric goals
    - name: return
      traits:
      - Simple
      - maximizes total return
      fit_for:
      - Aggressive growth
      - high risk tolerance
      not_fit_for:
      - Risk management focus
      - conservative investors
    - name: calmar
      traits:
      - Drawdown-focused
      - risk-adjusted return
      fit_for:
      - Capital preservation
      - downside protection
      not_fit_for:
      - Bull markets
      - return maximization
    default: sharpe
  design_decisions:
  - 'Annualized Sharpe ratio for selection: 252-day year assumed. Evidence: finrl/agents/stablebaselines3/models.py:295(sqrt(4)*mean/std)'
  - 'Rolling window rebalancing: Simulates production rebalancing cadence. Evidence:
    finrl/agents/stablebaselines3/models.py:323(unique_trade_date)'
  - 'Turbulence threshold for risk control: Uses historical turbulence 90th percentile.
    Evidence: finrl/agents/stablebaselines3/models.py:496(quantile)'
  - 'Best Sharpe model selection: argmax selects single best model per window. Evidence:
    models.py:659-664(argmax(sharpes) selects single model)'
  acceptance_hints:
  - Sharpe ratios computed for each models in ensemble
  - Best model selected based on highest Sharpe
  - Rebalance dates align with window boundaries
  - Turbulence threshold applied correctly
- id: model_inference
  name: Backtesting & Paper Trading
  order: 8
  responsibility: 'Run trained models on held-out test data or live paper trading.
    WHY: Validates strategy viability before risking capital; paper trading tests
    execution infrastructure.'
  interface:
    inputs:
    - Trained model, test data or live API
    outputs:
    - Account value history, action history
  required_methods:
  - name: DRL_prediction
    description: Batch inference on test dataset returning account values and actions
    evidence: finrl/agents/stablebaselines3/models.py:156(DRL_prediction)
  - name: DRL_prediction_load_from_file
    description: Loads model from checkpoint file and runs inference on specified
      data
    evidence: finrl/agents/stablebaselines3/models.py:186(DRL_prediction_load_from_file)
  - name: AlpacaPaperTrading.run
    description: Real-time paper trading via Alpaca API with latency testing before
      live orders
    evidence: finrl/meta/env_stock_trading/env_stock_papertrading.py:13(AlpacaPaperTrading)
  key_behaviors:
  - behavior: Separate test vs trade modes
    description: Test mode runs batch backtest; trade mode connects to live execution
      API for production simulation
    evidence: finrl/trade.py:24(trade_mode switch)
  - behavior: Last-state persistence between windows
    description: Ensemble strategy passes final portfolio state to next window, maintaining
      continuous portfolio tracking
    evidence: finrl/agents/stablebaselines3/models.py:392(save last_state)
  - behavior: Latency testing before trading
    description: Validates API response time before live orders; prevents missed trades
      due to network delays
    evidence: finrl/meta/env_stock_trading/env_stock_papertrading.py:40(test_latency)
  replaceable_points:
  - name: trade_mode
