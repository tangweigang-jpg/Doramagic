  alternative_considered: Unified action space abstraction, domain randomization across
    action types, policy distillation
- id: BD-I010
  type: BA/RC
  content: 'INTERACTION: Per-ticker MaxAbsScaler (BD-023, BD-098) × Cross-sectional
    relationships lost × Turbulence Mahalanobis (BD-007) → Normalized prices destroy
    cross-asset correlation structure that turbulence metric depends on'
  rationale: 'RISK CASCADE: Per-ticker MaxAbsScaler normalizes each stock independently
    to [-1, 1] range (BD-023). This preserves relative magnitude within each stock
    but DESTROYS cross-sectional relationships between stocks. The turbulence index
    (BD-007) uses Mahalanobis distance, which explicitly depends on CORRELATIONS between
    asset returns. If stocks A and B both doubled, they remain at +1 after normalization,
    losing the information that they moved together. If A doubled while B halved,
    both appear as +1 and -1, but the correlation structure is lost. The turbulence
    metric computed on normalized data underestimates true multi-asset risk.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Cross-sectional ranking normalization, z-score to market
    mean, raw price returns for turbulence calculation
- id: FINRL-APP-001
  type: T
  content: 'Domain-specific application modules are separated into distinct directories:
    cryptocurrency_trading, high_frequency_trading, and portfolio_allocation'
  rationale: Separating applications by financial domain allows for specialized implementations
    with domain-specific data sources, risk parameters, and trading strategies. Each
    domain has unique operational characteristics (crypto's 24/7 markets vs HFT's
    microsecond requirements vs portfolio's long-horizon optimization)
  evidence: finrl/applications/cryptocurrency_trading/__init__.py:1(module_init)
  stage: architectural
  alternative_considered: Monolithic single-application approach was rejected due
    to differing requirements across financial domains
  _evidence_issues:
  - 'LINE_OOB: finrl/applications/cryptocurrency_trading/__init__.py:1 > 0'
- id: FINRL-APP-002
  type: BA/DK
  content: Cryptocurrency trading is treated as a distinct application domain separate
    from traditional securities trading
  rationale: Crypto markets operate 24/7 with different exchange APIs, higher volatility
    profiles, and distinct regulatory considerations compared to traditional markets.
    This separation allows crypto-specific features like multi-exchange aggregation,
    stablecoin handling, and blockchain-specific transaction costs
  evidence: finrl/applications/cryptocurrency_trading/__init__.py:1(module_init)
  stage: design
  alternative_considered: Integrated approach was rejected as crypto markets require
    fundamentally different data pipelines and risk models
  _evidence_issues:
  - 'LINE_OOB: finrl/applications/cryptocurrency_trading/__init__.py:1 > 0'
  vague_rationale: true
- id: FINRL-APP-003
  type: T
  content: High-frequency trading is isolated as a separate application concern with
    potentially different execution requirements
  rationale: HFT applications require low-latency execution, real-time market data
    streams, and potentially different state management. Isolating this domain allows
    for performance-critical optimizations without impacting other application modules
  evidence: finrl/applications/high_frequency_trading/__init__.py:1(module_init)
  stage: architectural
  alternative_considered: Shared execution layer was rejected due to HFT's strict
    latency requirements
  _evidence_issues:
  - 'LINE_OOB: finrl/applications/high_frequency_trading/__init__.py:1 > 0'
- id: FINRL-APP-004
  type: BA/M
  content: Portfolio allocation is maintained as a separate application module for
    multi-asset optimization strategies
  rationale: Portfolio allocation focuses on long-horizon asset weighting and diversification
    rather than single-asset trading decisions. This requires different optimization
    algorithms (mean-variance, risk-parity) and evaluation metrics (Sharpe ratio,
    max drawdown) compared to single-asset trading
  evidence: finrl/applications/portfolio_allocation/__init__.py:1(module_init)
  stage: design
  alternative_considered: Combined trading+allocation approach was rejected to maintain
    clear separation of concerns between execution and portfolio construction
  _evidence_issues:
  - 'LINE_OOB: finrl/applications/portfolio_allocation/__init__.py:1 > 0'
- id: FINRL-APP-005
  type: T
  content: The applications directory follows a flat structure with co-equal domain
    modules rather than hierarchical organization
  rationale: Flat directory structure treats cryptocurrency_trading, high_frequency_trading,
    and portfolio_allocation as peer domains at the same level. This suggests each
    three are equally important application use cases without parent-child relationships
    between them
  evidence: finrl/applications/cryptocurrency_trading/__init__.py:1(module_init)
  stage: architectural
  alternative_considered: Hierarchical structure with shared base classes was not
    implemented
  _evidence_issues:
  - 'LINE_OOB: finrl/applications/cryptocurrency_trading/__init__.py:1 > 0'
- id: FINRL-APP-006
  type: T
  content: Each application domain maintains its own isolated module namespace under
    applications/
  rationale: Isolating each domain in its own directory namespace prevents naming
    conflicts and allows independent versioning of domain-specific components. This
    also facilitates clear ownership boundaries in collaborative development
  evidence: finrl/applications/cryptocurrency_trading/__init__.py:1(module_init)
  stage: design
  alternative_considered: Single namespace with prefixed module names was rejected
    for cleaner organization
  _evidence_issues:
  - 'LINE_OOB: finrl/applications/cryptocurrency_trading/__init__.py:1 > 0'
