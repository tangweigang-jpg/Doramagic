      - Real market prices
      - no real capital
      - live execution
      fit_for:
      - Strategy testing
      - execution validation
      not_fit_for:
      - Real capital
      - production
    - name: live
      traits:
      - Real money
      - real execution
      - full risk
      fit_for:
      - Production deployment
      - validated strategies
      not_fit_for:
      - Untested strategies
      - development
    default: backtesting
  - name: deterministic
    description: Use deterministic policy
    options:
    - name: 'true'
      traits:
      - Reproducible
      - no randomness
      - consistent results
      fit_for:
      - Reproducible backtesting
      - production
      not_fit_for:
      - Exploration testing
      - diversity analysis
    - name: 'false'
      traits:
      - Stochastic
      - exploratory
      - varies each run
      fit_for:
      - Strategy robustness
      - variance analysis
      not_fit_for:
      - Reproducible results
      - production
    default: 'true'
  design_decisions:
  - 'Separate test vs trade modes: Test mode runs batch backtest; trade mode connects
    to live execution API. Evidence: finrl/trade.py:24(trade_mode switch)'
  - 'Last-state persistence between windows: Ensemble strategy passes final portfolio
    state to next window. Evidence: finrl/agents/stablebaselines3/models.py:392(save
    last_state)'
  - 'Latency testing before trading: Validates API response time before live orders.
    Evidence: finrl/meta/env_stock_trading/env_stock_papertrading.py:40(test_latency)'
  acceptance_hints:
  - Account values tracked for each timesteps in test window
  - Actions executed match model predictions
  - Transaction costs correctly applied
  - Final portfolio state matches expected holdings
