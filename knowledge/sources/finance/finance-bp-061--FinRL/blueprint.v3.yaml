- id: BD-I006
  type: BA/RC
  content: 'INTERACTION: 252-day rolling covariance window (BD-006) × Turbulence start
    after 252 days (BD-080) × Sort by date,tic (BD-003) × Per-ticker MaxAbsScaler
    (BD-023) → Hidden warmup dependency silently requires 252+ trading days before
    turbulence becomes meaningful; short backtests produce incorrect risk signals'
  rationale: 'HIDDEN DEPENDENCY: The turbulence index calculation (BD-007 using Mahalanobis
    distance) requires a valid covariance matrix computed from the 252-day rolling
    window (BD-006). BD-080 explicitly delays turbulence calculation until day 252.
    This creates a warmup period where turbulence=0 regardless of actual market conditions.
    If pre_load_days < 252 (a gap not explicitly enforced), the covariance matrix
    is singular or undefined, producing incorrect turbulence values. The interaction
    with per-ticker scaling (BD-023) means different stocks have different price scales
    that feed into this unreliable covariance.'
