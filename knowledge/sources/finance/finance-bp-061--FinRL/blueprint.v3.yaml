- id: BD-I001
  type: B/RC
  content: 'INTERACTION: Symmetric 0.1% cost (BD-009, BD-053) × Missing A-share stamp
    duty × Missing T+1 constraint × Missing price limit check → Backtest systematically
    overestimates returns by ignoring 4 regulatory/market structure cost sources simultaneously'
  rationale: 'RISK CASCADE: Multiple market structure elements are absent from backtesting.
    A-share stamp duty (0.05% sell-only) is a significant cost for Chinese equities.
    T+1 constraint prevents same-day selling of purchased shares. Price limit checks
    prevent trading at limit-up/limit-down prices. Combined, these create systematic
    overstatement of strategy returns by 0.5-2% per trade cycle. When turbulence triggers
    forced liquidation (BD-011), these unmodeled costs compound during stress periods.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: 'Add market-specific cost layers: 0.05% stamp duty on sells,
    T+1 position tracking, price limit circuit breakers'
- id: BD-I002
  type: BA/RC
  content: 'INTERACTION: Forward-fill missing data (BD-004) × 90% ticker drop threshold
    (BD-005) × Technical indicators (BD-048) → Stale prices from suspensions create
    misleading signals that pass filtering and enter model training'
  rationale: 'RISK CASCADE: Forward-fill propagates the last traded price during suspension
    periods. Tickers with >90% data coverage pass the filter even if the missing 10%
    represents critical suspension periods. Technical indicators (MACD, RSI, CCI)
    compute on these stale prices, producing signals that appear valid but reflect
    historical prices. The agent learns on corrupted state representations and may
    execute trades based on outdated information during real market stress.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Zero-fill for volume, NaN propagation with indicator masking,
    suspension-aware price modeling
