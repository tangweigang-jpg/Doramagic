  evidence: ''
- contract: 'Reward scaling via power-of-2 fractions for numerical stability. Evidence:
    finrl/meta/env_stock_trading/env_stocktrading_np.py:20(reward_scaling)'
  evidence: ''
- contract: 'SELL must complete before BUY in StockTradingEnv.step() to prevent incorrect
    cash calculations. Evidence: env_stocktrading.py:327-340(sell_index, buy_index
    processing)'
  evidence: ''
- contract: 'Turbulence threshold of 90th quantile during training vs different threshold
    during trading creates regime mismatch. Evidence: models.py:500-567(insample vs
    turbulence_threshold calculation)'
  evidence: ''
- contract: 'Every trading envs enforce price>0 check before executing trades - missing
    data handling contract. Evidence: env_stocktrading_np.py:118, env_multiple_crypto.py:74,
    env_stocktrading.py:121'
  evidence: ''
- contract: 'DRLEnsembleAgent.run_ensemble_strategy requires train_window before DRL_prediction.
    Evidence: models.py:619-683(train then prediction flow)'
  evidence: ''
- contract: 'FeatureEngineer.preprocess_data() requires clean_data() before add_technical_indicator().
    Evidence: preprocessors.py:146-152(ordered method calls)'
  evidence: ''
business_decisions:
- id: BD-001
  type: T
  content: Unified column naming maps each data sources to [timestamp, open, high,
    low, close, volume, tic]
  rationale: Normalization layer enables swapping data providers without downstream
    code changes. Column aliasing is pure infrastructure choice with no market impact.
  evidence: finrl/meta/data_processors/processor_yahoofinance.py:262(rename columns)
  stage: data_download
  alternative_considered: Provider-specific column names throughout pipeline
  _evidence_issues:
  - 'INVALID_IDENTIFIER: rename columns in finrl/meta/data_processors/processor_yahoofinance.py'
- id: BD-002
  type: T
  content: Factory pattern instantiates data processors based on provider name string
  rationale: Dependency injection via conditional instantiation allows runtime provider
    selection. No market behavior changes result from swapping implementations.
  evidence: finrl/meta/data_processor.py:13(DataProcessor.__init__)
  stage: data_download
  alternative_considered: Hard-coded provider instantiation
- id: BD-003
  type: T
  content: DataFrame sorted by [date, tic] is global contract enforced at pipeline
    entry
  rationale: Sort order is internal consistency requirement; does not affect trading
    outputs. Enables efficient groupby operations on sorted keys.
  evidence: finrl/meta/preprocessor/preprocessors.py:33(sort_values by date,tic)
  stage: data_cleaning
  alternative_considered: Unsorted DataFrames with explicit sort calls
  _evidence_issues:
  - 'INVALID_IDENTIFIER: sort_values by date,tic in finrl/meta/preprocessor/preprocessors.py'
- id: BD-004
  type: BA
  content: Forward-fill missing data with previous close maintains price continuity
  rationale: Assumes last traded price is valid proxy for unavailable prices. Breaks
    when stock is suspended or delisted with no trading activity for extended periods.
  evidence: finrl/meta/data_processors/processor_yahoofinance.py:347(fill NaN)
  stage: data_cleaning
  alternative_considered: Zero-fill for volume, NaN propagation with masking for indicators
  _evidence_issues:
  - 'INVALID_IDENTIFIER: fill NaN in finrl/meta/data_processors/processor_yahoofinance.py'
- id: BD-005
  type: M/BA
  content: Ticker dropped if less than 90% data coverage over training window
  rationale: 90% threshold balances data completeness against survivorship bias. Dropping
    incomplete tickers assumes missing data is random rather than systematic.
  evidence: finrl/meta/preprocessor/preprocessors.py:185(dropna axis=1)
  stage: data_cleaning
  alternative_considered: Interpolation or imputation for partial-coverage tickers
  _evidence_issues:
  - 'INVALID_IDENTIFIER: dropna axis=1 in finrl/meta/preprocessor/preprocessors.py'
- id: BD-006
  type: BA/DK
  content: 252-day rolling window computes turbulence covariance matrix
  rationale: Assumes one trading year provides statistically significant sample. Fails
    for high-frequency strategies requiring shorter lookback or for markets with trading
    halts.
  evidence: finrl/meta/preprocessor/preprocessors.py:292(start=252)
  stage: feature_engineering
  alternative_considered: Exponentially-weighted covariance, GARCH-based estimates
  _evidence_issues:
  - 'INVALID_IDENTIFIER: start=252 in finrl/meta/preprocessor/preprocessors.py'
- id: BD-007
  type: M/B
  content: Turbulence index uses Mahalanobis distance for correlated multi-stock risk
    detection
  rationale: Mahalanobis distance captures cross-asset correlations unlike simple
    volatility. Method choice affects risk signal magnitude and false positive rate.
  evidence: finrl/meta/preprocessor/preprocessors.py:315(dot product pinv)
  stage: feature_engineering
  alternative_considered: Simple max drawdown, cross-sectional z-score, Copula-based
    tail risk
  _evidence_issues:
  - 'INVALID_IDENTIFIER: dot product pinv in finrl/meta/preprocessor/preprocessors.py'
- id: BD-008
  type: M/BA
  content: Turbulence threshold uses historical 90th percentile as risk-on/risk-off
    switch
  rationale: 90th percentile balances sensitivity against noise. Trading environment
    uses 99th percentile creating regime mismatch between training and deployment.
  evidence: finrl/agents/stablebaselines3/models.py:496(quantile)
  stage: model_validation
  alternative_considered: Consistent threshold across pipeline, dynamic threshold
    based on recent realized volatility
  _evidence_issues:
  - 'FN_NOT_FOUND: quantile in finrl/agents/stablebaselines3/models.py'
- id: BD-009
  type: BA/DK
  content: 'Symmetric transaction costs: buy_cost_pct equals sell_cost_pct at 0.1%'
  rationale: 'Assumes market symmetry. Real markets have asymmetric costs: A-share
    stamp duty (0.05% sell-only), maker-taker fees, bid-ask spread differences.'
  evidence: finrl/meta/env_stock_trading/env_stocktrading_cashpenalty.py:55(module)
  stage: environment_simulation
  alternative_considered: Asymmetric cost model with market-specific fee schedules
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrl/meta/env_stock_trading/env_stocktrading_cashpenalty.py'
- id: BD-010
  type: BA
  content: Gamma-weighted cumulative reward prioritizes long-term over short-term
    returns
  rationale: Gamma=0.99 assumes investment horizon aligned with annual performance.
    Short-horizon traders may prefer gamma=0.9 for faster adaptation.
  evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:146(gamma_reward)
  stage: environment_simulation
  alternative_considered: Configurable gamma, multi-horizon reward signals
  _evidence_issues:
  - 'FN_NOT_FOUND: gamma_reward in finrl/meta/env_stock_trading/env_stocktrading_np.py'
- id: BD-011
  type: B/M
  content: Turbulence-triggered forced liquidation sells each positions when stress
    exceeds threshold
  rationale: Risk management rule based on Mahalanobis distance. Selling into stressed
    markets may accelerate losses and ignores liquidity constraints.
  evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:136(sell all)
  stage: environment_simulation
  alternative_considered: Gradual position reduction, sector rotation, hedging with
    derivatives
  _evidence_issues:
  - 'INVALID_IDENTIFIER: sell each in finrl/meta/env_stock_trading/env_stocktrading_np.py'
- id: BD-012
  type: M/BA
  content: Annualized Sharpe ratio computed as sqrt(252) * mean(daily_returns) / std(daily_returns)
  rationale: Assumes i.i.d. daily returns and 252 trading days. sqrt(4) converts quarterly
    Sharpe for ensemble selection; ignores return serial correlation.
  evidence: finrl/agents/stablebaselines3/models.py:295(module)
  stage: model_validation
  alternative_considered: Modified Sharpe with autocorrelation adjustment, Information
    ratio with benchmark tracking error
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrl/agents/stablebaselines3/models.py'
- id: BD-013
  type: M/BA
  content: Rolling window rebalancing with 63-day validation and 252-day training
  rationale: 63-day (~quarterly) rebalancing matches institutional investment cycle.
    Prevents overfitting but may miss medium-term trends.
  evidence: finrl/agents/stablebaselines3/models.py:323(unique_trade_date)
  stage: model_validation
  alternative_considered: Drift-threshold triggered rebalancing, longer windows for
    low-frequency strategies
  _evidence_issues:
  - 'FN_NOT_FOUND: unique_trade_date in finrl/agents/stablebaselines3/models.py'
- id: BD-014
  type: B/DK
  content: DRLEnsembleAgent selects single best model by Sharpe ratio per window
  rationale: Cherry-picking best validation performer may overfit to that period.
    Ensemble diversity is lost when only one model active.
  evidence: finrl/agents/stablebaselines3/models.py:659(module)
  stage: model_validation
  alternative_considered: Weighted ensemble of each models, ranked voting, confidence-weighted
    selection
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrl/agents/stablebaselines3/models.py'
- id: BD-015
  type: BA/M
  content: Initial portfolio capital set to $1,000,000 across each trading environments
  rationale: $1M represents institutional-scale capital. Reward normalization tuned
    for this scale; changing breaks expected PnL magnitude.
  evidence: finrl/meta/env_stock_trading/env_stocktrading_cashpenalty.py:63(module)
  stage: environment_simulation
  alternative_considered: Fractional initial amount, scale-invariant reward
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrl/meta/env_stock_trading/env_stocktrading_cashpenalty.py'
- id: BD-016
  type: B
  content: Continuous action space Box(-1, 1) normalizes buy/sell/hold into single
    unified space
  rationale: Single continuous space works across A2C, PPO, DDPG algorithms. Maps
    to discrete actions where needed internally.
  evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:76(action_space Box)
  stage: environment_simulation
  alternative_considered: Discrete action space with explicit buy/sell/hold/quantity
    bins
  _evidence_issues:
  - 'INVALID_IDENTIFIER: action_space Box in finrl/meta/env_stock_trading/env_stocktrading_np.py'
- id: BD-017
  type: B
  content: SELL processing must precede BUY processing in environment step() function
  rationale: Argsort order guarantees sell_index sorted before buy_index. Reversing
    causes incorrect cash calculations for subsequent buys.
  evidence: finrl/meta/env_stock_trading/env_stocktrading.py:327(module)
  stage: environment_simulation
  alternative_considered: Separate cash tracking per action type, atomic position
    updates
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrl/meta/env_stock_trading/env_stocktrading.py'
- id: BD-018
  type: B
  content: Separate test backtesting and live paper trading execution modes
  rationale: Test mode runs batch inference on historical data; trade mode connects
    to Alpaca API. Behavior change is explicit mode selection.
  evidence: finrl/trade.py:24(trade_mode switch)
  stage: model_inference
  alternative_considered: Unified mode with execution layer abstraction
  _evidence_issues:
  - 'INVALID_IDENTIFIER: trade_mode switch in finrl/trade.py'
- id: BD-019
  type: BA
  content: Last-state persistence passes final portfolio state between ensemble windows
  rationale: Maintains continuous portfolio tracking across rolling windows. Assumes
    smooth regime transitions without position reset.
  evidence: finrl/agents/stablebaselines3/models.py:392(save last_state)
  stage: model_inference
  alternative_considered: Full reset between windows, gradual position transition
  _evidence_issues:
  - 'INVALID_IDENTIFIER: save last_state in finrl/agents/stablebaselines3/models.py'
- id: BD-020
  type: M/BA
  content: Latency testing validates API response time before live order submission
  rationale: Pre-trade latency check prevents missed trades due to network delays.
    Empirical validation of connection quality.
  evidence: finrl/meta/env_stock_trading/env_stock_papertrading.py:143(test_latency)
  stage: model_inference
  alternative_considered: Accept latency risk, timeout-based cancellation
- id: BD-021
  type: B
  content: Price validation requires price > 0 before executing trades
  rationale: Guard against missing data and division-by-zero. Agents trained on clean
    data may fail on real data with price gaps.
  evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:118(module)
  stage: environment_simulation
  alternative_considered: Graceful degradation with warning, fill with NaN handling
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrl/meta/env_stock_trading/env_stocktrading_np.py'
- id: BD-022
  type: B
  content: Separate price_array, tech_array, turbulence_array outputs for independent
    scaling
  rationale: Allows selective feature use per environment type and independent normalization.
    Behavioral choice affecting state representation.
  evidence: finrl/meta/data_processor.py:79(df_to_array)
  stage: data_preprocessing
  alternative_considered: Single combined array with unified scaling
- id: BD-023
  type: BA/M
  content: Per-ticker feature scaling using MaxAbsScaler preserves relative magnitude
  rationale: Prevents high-price stocks from dominating state space. Each ticker normalized
    to [-1, 1] range. Assumes comparable volatility regimes.
  evidence: finrl/meta/preprocessor/preprocessors.py:81(per-value scaler)
  stage: data_preprocessing
  alternative_considered: Cross-sectional ranking normalization, z-score to market
    mean
  _evidence_issues:
  - 'INVALID_IDENTIFIER: per-value scaler in finrl/meta/preprocessor/preprocessors.py'
- id: BD-024
  type: M/BA
  content: Power-of-2 scaling factors (2^-7, 2^-11) avoid floating-point precision
    issues
  rationale: Binary fractions map cleanly to IEEE 754 representation. Accelerates
    neural network convergence by avoiding precision loss.
  evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:31(tech_ary * 2**-7)
  stage: data_preprocessing
  alternative_considered: Standard float scaling, log transformation
  _evidence_issues:
  - 'INVALID_IDENTIFIER: tech_ary * 2**-7 in finrl/meta/env_stock_trading/env_stocktrading_np.py'
- id: BD-025
  type: BA/M
  content: Pyfolio library provides standardized performance metrics (Sharpe, max
    drawdown, Sortino)
  rationale: Industry-standard library enables comparison across strategies. Assumes
    Pyfolio methodology is appropriate for strategy characteristics.
  evidence: finrl/plot.py:40(perf_stats)
  stage: performance_evaluation
