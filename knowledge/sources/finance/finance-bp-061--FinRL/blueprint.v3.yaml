  - 'Baseline normalization to initial amount: Enables fair comparison of strategies
    with different initial capital. Evidence: finrl/applications/stock_trading/stock_trading.py:279(divide
    by first)'
  acceptance_hints:
  - Sharpe ratio calculated correctly (positive = good risk-adjusted return)
  - Max drawdown is negative (representing peak-to-trough loss)
