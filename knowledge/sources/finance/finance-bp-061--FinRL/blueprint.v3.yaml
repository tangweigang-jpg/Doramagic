- id: BD-I005
  type: B/M
  content: 'INTERACTION: Turbulence-triggered forced liquidation (BD-011) × Mahalanobis
    distance covariance (BD-007) × Custom sigmoid compression (BD-034) × 90th percentile
    threshold (BD-008/060) → Risk signal amplification creates cliff-edge liquidation
