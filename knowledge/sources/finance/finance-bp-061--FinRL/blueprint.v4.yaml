  design_decisions:
  - 'Pyfolio for standardized metrics - Industry-standard library provides comparable
    Sharpe, max drawdown, Sortino from single function call. Evidence: finrl/plot.py:40(perf_stats)'
  - 'Daily return from account value - Simple first-difference captures daily performance;
    avoids compounding artifacts in metric calculation. Evidence: finrl/plot.py:22(pct_change)'
  - 'Baseline normalization to initial amount - Enables fair comparison of strategies
    with different initial capital; shows relative performance. Evidence: finrl/applications/stock_trading/stock_trading.py:279(divide
    by first)'
  acceptance_hints:
  - Performance metrics include Sharpe ratio, max drawdown, annual return
  - Equity curve plots show strategy vs benchmark comparison
