data_flow:
- from_stage: data_download
  to_stage: data_cleaning
  data: Raw OHLCV DataFrame with NaN/missing values
- from_stage: data_cleaning
  to_stage: feature_engineering
  data: Aligned DataFrame with complete trading calendar
- from_stage: feature_engineering
  to_stage: data_preprocessing
  data: DataFrame with technical indicator columns added
- from_stage: data_preprocessing
  to_stage: environment_simulation
  data: 'Three numpy arrays: price_array, tech_array, turbulence_array'
- from_stage: environment_simulation
  to_stage: model_training
  data: Gym environment instance for RL interactions
- from_stage: model_training
  to_stage: model_validation
  data: Model checkpoint files (act.pth, .zip)
- from_stage: model_validation
  to_stage: model_inference
  data: Selected model + validation Sharpe ratios
- from_stage: model_inference
  to_stage: performance_evaluation
  data: Account value history, action history
global_contracts:
- contract: 'DataFrame must have ''date'' and ''tic'' columns for each pipeline stages.
    Evidence: finrl/meta/preprocessor/preprocessors.py:33(sort_values by date,tic)'
  evidence: ''
- contract: 'Price array shape: (timesteps, stock_dim) for stock environments. Evidence:
    finrl/meta/env_stock_trading/env_stocktrading_np.py:37(price_ary.shape[1])'
  evidence: ''
- contract: 'State dimension formula: 1 + 2 + 3*stock_dim + tech_dim for StockTradingEnv_np.
    Evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:63(state_dim)'
  evidence: ''
- contract: 'Action space: Box(-1, 1, shape=(stock_dim,)) normalized continuous. Evidence:
    finrl/meta/env_stock_trading/env_stocktrading_np.py:76(action_space)'
  evidence: ''
- contract: 'Every dates formatted as ''YYYY-MM-DD'' strings in config. Evidence:
    finrl/config.py:9(date format comment)'
  evidence: ''
- contract: 'Reward scaling via power-of-2 fractions for numerical stability. Evidence:
    finrl/meta/env_stock_trading/env_stocktrading_np.py:20(reward_scaling)'
  evidence: ''
- contract: 'SELL must complete before BUY in StockTradingEnv.step() - argsort orders
    sell_index first. Evidence: env_stocktrading.py:327-340(sell_index, buy_index
    processing)'
  evidence: ''
- contract: 'FeatureEngineer.preprocess_data() requires clean_data() before add_technical_indicator().
    Evidence: finrl/meta/preprocessor/preprocessors.py:146-152(ordered method calls)'
  evidence: ''
- contract: 'DRLEnsembleAgent.run_ensemble_strategy requires train_window before DRL_prediction.
    Evidence: models.py:619-683(train then prediction flow)'
  evidence: ''
- contract: 'Every trading envs enforce price>0 check before executing trades. Evidence:
    finrl/meta/env_stock_trading/env_stocktrading_np.py:118, env_multiple_crypto.py:74,
    env_stocktrading.py:121'
  evidence: ''
- contract: 'initial_amount=1e6 encodes $1M starting capital as business assumption
    across each trading envs. Evidence: env_stocktrading_cashpenalty.py:63, env_stocktrading_stoploss.py:77'
  evidence: ''
- contract: 'buy_cost_pct=sell_cost_pct=0.001 (0.1%) encodes symmetric transaction
    cost assumption. Evidence: env_stocktrading_cashpenalty.py:55-56, env_stocktrading.py:42-43'
  evidence: ''
business_decisions:
- id: BD-001
  type: B/DK
  content: Factory pattern for data sources
  rationale: 'Enables runtime swapping of data providers (Alpaca, WRDS, YahooFinance)
    without modifying downstream training code. Boundary: each provider implements
    common interface; adding new source requires implementing DataProcessor subclass
    but training pipeline remains unchanged.'
  evidence: finrl/meta/data_processor.py:13(DataProcessor)
  stage: data_download
  alternative_considered: Hard-coded provider selection would require code changes
    per source
- id: BD-002
  type: BA/M
  content: Unified column naming across sources
  rationale: 'Normalizes each data sources to standard schema [timestamp, open, high,
    low, close, volume, tic] regardless of source API format differences. Boundary:
    downstream modules expect this exact schema; any source returning non-standard
    columns must be transformed before use.'
  evidence: finrl/meta/data_processors/processor_yahoofinance.py:262(rename_columns)
  stage: data_download
  alternative_considered: Per-source downstream adapters would increase code duplication
  _evidence_issues:
  - 'FN_NOT_FOUND: rename_columns in finrl/meta/data_processors/processor_yahoofinance.py'
- id: BD-003
  type: M/DK
  content: Support for multiple time intervals
  rationale: 'Maps FinRL standard interval names (1D, 1Min, 1H, etc.) to provider-specific
    API parameters. Boundary: not each intervals available from each providers; function
    raises exception for unsupported interval/provider combinations.'
  evidence: finrl/meta/data_processors/processor_yahoofinance.py:182(convert_interval)
  stage: data_download
  alternative_considered: Provider-specific interval parameters would couple training
    code to data source
- id: BD-004
  type: BA
  content: Forward-fill missing data with previous close
  rationale: 'Maintains price continuity for technical indicator calculations by propagating
    last known values. Boundary: volume NaN marked as 0 (no trade occurred); this
    affects volume-based indicators which must handle zero-volume bars.'
  evidence: finrl/meta/data_processors/processor_yahoofinance.py:347(fill_NaN)
  stage: data_cleaning
  alternative_considered: Dropping NaN rows would create discontinuous time series
    breaking indicator calculations
  _evidence_issues:
  - 'FN_NOT_FOUND: fill_NaN in finrl/meta/data_processors/processor_yahoofinance.py'
- id: BD-005
  type: M
  content: Drop tickers with insufficient data
  rationale: 'Removes tickers with >50% NaN values before portfolio construction.
    Boundary: prevents delisted/illiquid securities from contaminating training; affects
    portfolio diversity calculation.'
  evidence: finrl/meta/preprocessor/preprocessors.py:185(dropna_axis_1)
  stage: data_cleaning
  alternative_considered: Imputation would introduce artificial price history for
    non-existent trading periods
  _evidence_issues:
  - 'FN_NOT_FOUND: dropna_axis_1 in finrl/meta/preprocessor/preprocessors.py'
- id: BD-006
  type: B
  content: Turbulence as Mahalanobis distance
  rationale: 'Captures correlated extreme moves across portfolio stocks using covariance-weighted
    distance from historical mean. Boundary: requires invertible covariance matrix
    (pinv for singularity handling); effective for portfolios of 5-30 stocks.'
  evidence: finrl/meta/preprocessor/preprocessors.py:315(dot_product_pinv)
  stage: feature_engineering
  alternative_considered: Single-stock volatility would miss cross-asset contagion
    during crises
  _evidence_issues:
  - 'FN_NOT_FOUND: dot_product_pinv in finrl/meta/preprocessor/preprocessors.py'
- id: BD-007
  type: BA/DK
  content: 252-day rolling window for turbulence
  rationale: 'Uses one trading year window to estimate covariance matrix for turbulence
    calculation. Boundary: provides statistically significant sample (~252 trading
    days) while remaining responsive to regime changes; older data gracefully exits
    window.'
  evidence: finrl/meta/preprocessor/preprocessors.py:292(start=252)
  stage: feature_engineering
  alternative_considered: Shorter windows add noise; longer windows introduce stale
    covariance estimates
  _evidence_issues:
  - 'INVALID_IDENTIFIER: start=252 in finrl/meta/preprocessor/preprocessors.py'
- id: BD-008
  type: M/DK
  content: VIX downloaded separately from Yahoo
  rationale: 'Retrieves market-wide fear/greed indicator from dedicated ticker (VIXY).
    Boundary: external to portfolio stocks, provides systemic risk signal unavailable
    from portfolio price history alone.'
  evidence: finrl/meta/preprocessor/preprocessors.py:260(VIXY_ticker)
  stage: feature_engineering
  alternative_considered: Portfolio-only metrics miss broad market stress indicators
  _evidence_issues:
  - 'FN_NOT_FOUND: VIXY_ticker in finrl/meta/preprocessor/preprocessors.py'
- id: BD-009
  type: B
  content: Separate price/tech/turbulence arrays
  rationale: 'Splits state features into independent numpy arrays for price, technical
    indicators, and turbulence. Boundary: enables selective feature inclusion per
    environment type and independent scaling transformations for each array.'
  evidence: finrl/meta/data_processor.py:79(df_to_array)
  stage: data_preprocessing
  alternative_considered: Monolithic feature array would complicate per-feature normalization
    strategies
- id: BD-010
  type: BA/M
  content: Per-ticker feature scaling
  rationale: 'Normalizes each ticker''s features to its own statistical range rather
    than global scaling. Boundary: prevents high-price stocks (e.g., BRK.A) from dominating
    state space over low-price stocks; each ticker contributes equally to learning.'
  evidence: finrl/meta/preprocessor/preprocessors.py:81(per-value_scaler)
  stage: data_preprocessing
  alternative_considered: Global scaling would cause high-price stocks to dominate
    state representation
  _evidence_issues:
  - 'INVALID_IDENTIFIER: per-value_scaler in finrl/meta/preprocessor/preprocessors.py'
- id: BD-011
  type: M/BA
  content: Power-of-2 scaling factors in env
  rationale: 'Scales technical arrays by powers of 2 (e.g., *2**-7) to avoid floating-point
    precision issues with binary fractions. Boundary: accelerates neural network convergence
    by ensuring clean binary representations in float32/64.'
  evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:31(tech_ary_*_2**-7)
  stage: data_preprocessing
  alternative_considered: Arbitrary scaling factors introduce imprecise binary representations
  _evidence_issues:
  - 'INVALID_IDENTIFIER: tech_ary_*_2**-7 in finrl/meta/env_stock_trading/env_stocktrading_np.py'
- id: BD-012
  type: B
  content: Continuous action space [-1, 1] normalized
  rationale: 'Single continuous action space normalized to [-1, 1] range for each
    DRL algorithms. Boundary: A2C/PPO/DDPG each support continuous Box space; discrete
    action requires mapping layer which libraries handle internally.'
  evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:8(StockTradingEnv)
  stage: environment_simulation
  alternative_considered: Algorithm-specific action spaces would require separate
    environments
- id: BD-013
  type: BA
  content: Gamma-weighted cumulative reward
  rationale: 'Discounts short-term fluctuations in favor of long-term returns using
    gamma exponentiation. Boundary: aligns agent behavior with investment horizon;
    higher gamma prioritizes distant rewards more strongly.'
  evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:146(gamma_reward)
  stage: environment_simulation
  alternative_considered: Non-discounted cumulative return would incentivize short-term
    trading profits
  _evidence_issues:
  - 'FN_NOT_FOUND: gamma_reward in finrl/meta/env_stock_trading/env_stocktrading_np.py'
- id: BD-014
  type: M/DK
  content: Turbulence-triggered forced liquidation
  rationale: 'Risk management rule that sells each positions when market turbulence
    exceeds threshold. Boundary: executes at next observation when turbulence > threshold;
    prevents holding through correlated crash scenarios.'
  evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:136(sell_all_turbulence)
  stage: environment_simulation
  alternative_considered: Passive holding through turbulence risks portfolio destruction
    during crises
  _evidence_issues:
  - 'FN_NOT_FOUND: sell_all_turbulence in finrl/meta/env_stock_trading/env_stocktrading_np.py'
- id: BD-015
  type: M
  content: New Gym API support via flag
  rationale: 'Backward compatibility layer supporting both legacy gym and gymnasium
    APIs via boolean flag. Boundary: new_gym_api=True returns gymnasium tuples, False
    returns legacy gym namedtuples; both interfaces coexist in same codebase.'
  evidence: finrl/meta/env_portfolio_optimization/env_portfolio_optimization.py:91(new_gym_api)
  stage: environment_simulation
  alternative_considered: Immediate gymnasium-only migration would break existing
    integrations
  _evidence_issues:
  - 'FN_NOT_FOUND: new_gym_api in finrl/meta/env_portfolio_optimization/env_portfolio_optimization.py'
- id: BD-016
  type: B
  content: Library-agnostic agent interface
  rationale: 'Every DRL agents implement common interface methods (get_model, train_model,
    DRL_prediction) with conditional library imports. Boundary: adding new library
    requires implementing these three methods; existing training scripts remain unchanged.'
  evidence: finrl/train.py:48-99(conditional_imports)
  stage: model_training
  alternative_considered: Library-specific training code would require refactoring
    when switching algorithms
  _evidence_issues:
  - 'FN_NOT_FOUND: conditional_imports in finrl/train.py'
- id: BD-017
  type: M
  content: Tensorboard callback for monitoring
  rationale: 'Integrates TensorboardCallback from Stable Baselines3 for standardized
    training visualization. Boundary: works only with SB3-compatible agents; logs
    scalar metrics and episode stats to tensorboard event files.'
  evidence: finrl/agents/stablebaselines3/models.py:34(TensorboardCallback)
  stage: model_training
  alternative_considered: Custom logging would require separate implementation per
    agent type
- id: BD-018
  type: BA
  content: CallbackList for extensibility
  rationale: 'Composable callback system allowing multiple callbacks (tensorboard,
    early stopping, checkpointing) to execute in sequence. Boundary: callbacks execute
    in registration order; each receives training state and can halt training via
    return False.'
  evidence: finrl/agents/stablebaselines3/models.py:146(CallbackList)
  stage: model_training
  alternative_considered: Hard-coded callback logic would require agent modifications
    for each new monitoring feature
  _evidence_issues:
  - 'FN_NOT_FOUND: CallbackList in finrl/agents/stablebaselines3/models.py'
- id: BD-019
  type: BA/M
  content: Annualized Sharpe ratio for selection
  rationale: 'Calculates annualized Sharpe using sqrt(252) for daily and sqrt(4) for
    quarterly returns to enable seasonal comparison. Boundary: assumes Gaussian return
    distribution; comparison valid only across same-period calculations.'
  evidence: finrl/agents/stablebaselines3/models.py:295(module)
  stage: model_validation
  alternative_considered: Raw returns favor high-volatility strategies over consistent
    performers
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrl/agents/stablebaselines3/models.py'
- id: BD-020
  type: M
  content: Rolling window rebalancing
  rationale: 'Simulates production rebalancing cadence by selecting unique trade dates
    within training window. Boundary: rebalancing occurs only at window boundaries,
    preventing look-ahead bias; forces agent to maintain portfolio between rebalances.'
  evidence: finrl/agents/stablebaselines3/models.py:323(unique_trade_date)
  stage: model_validation
  alternative_considered: Continuous rebalancing would create unrealistic transaction-heavy
    backtest
  _evidence_issues:
  - 'FN_NOT_FOUND: unique_trade_date in finrl/agents/stablebaselines3/models.py'
- id: BD-021
  type: M
  content: Turbulence threshold for risk control
  rationale: 'Uses historical turbulence 90th percentile quantile as risk-on/risk-off
    switch for trading decisions. Boundary: threshold computed from training period
    turbulence distribution; regime determined at each rebalance point.'
