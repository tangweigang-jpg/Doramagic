id: finance-bp-061
name: FinRL
sop_version: '3.6'
source:
  projects:
  - FinRL
  commit_hash: 220f9e490996a6e5c84cfad914ff14f2e0c42d22
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Deep reinforcement learning for automated stock trading and portfolio
    allocation
  description: An end-to-end DRL library for quantitative finance that enables users
    to train, validate, and backtest trading agents on market data with support for
    multiple algorithms and data sources.
  prerequisites: Python 3.6+, basic understanding of reinforcement learning concepts
    and financial markets
  not_suitable_for: High-frequency trading, live trading execution (only paper trading
    supported), cryptocurrency trading, real-time production deployment
stages:
- id: data_download
  name: Market Data Acquisition
  order: 1
  responsibility: 'Fetch raw OHLCV data from external APIs and data providers. WHY:
    Abstract multiple data sources behind a unified interface to allow flexibility
    in data sourcing without changing downstream stages.'
  interface:
    inputs:
    - ticker_list
    - start_date
    - end_date
    - time_interval
    outputs:
    - raw DataFrame with date, tic, open, high, low, close, volume columns
  required_methods:
  - name: DataProcessor.download
    description: Downloads market data from the configured data source (Yahoo Finance,
      Alpaca, WRDS, CCXT, or JoinQuant)
    evidence: finrl/meta/data_processor.py:13(DataProcessor.__init__)
  - name: YahooFinanceProcessor.fetch_data
    description: Fetches OHLCV data from Yahoo Finance API with date range and ticker
      filtering
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:35(__init__)
  - name: AlpacaProcessor.fetch_data
    description: Fetches real-time and historical trading data from Alpaca for paper
      trading support
    evidence: finrl/meta/data_processors/processor_alpaca.py:14(__init__)
  key_behaviors:
  - behavior: Factory pattern for data source selection
    description: DataProcessor instantiates the appropriate processor (yahoofinance,
      alpaca, wrds) based on configuration string, enabling runtime provider swapping
    evidence: finrl/meta/data_processor.py:15-29(conditional instantiation)
  - behavior: Unified column naming across sources
    description: Every processors normalize output to [timestamp, open, high, low,
      close, volume, tic] regardless of source API differences
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:262(rename columns)
  - behavior: Multi-interval support with provider mapping
    description: Maps FinRL standard intervals (1D, 1Min) to provider-specific formats,
      enabling multi-resolution data collection
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:182(convert_interval)
  replaceable_points:
  - name: data_source
    description: Backend data provider for market data
    options:
    - name: yahoofinance
      traits:
      - Free
      - Historical data
      - No API key required
      - End-of-day granularity
      fit_for:
      - Research
      - Backtesting
      - Educational use
      not_fit_for:
      - Real-time data
      - Intraday trading
      - High-frequency
    - name: alpaca
      traits:
      - Real-time data
      - Paper trading support
      - API key required
      fit_for:
      - Live paper trading
      - Real-time inference
      not_fit_for:
      - Free historical backtesting
      - Historical research
    - name: wrds
      traits:
      - Institutional grade
      - CRSP/SEC data
      - Academic access
      fit_for:
      - Academic research
      - High-quality backtesting
      not_fit_for:
      - Quick prototyping
      - Individual traders
    - name: ccxt
      traits:
      - Crypto exchanges
      - Unified crypto API
      fit_for:
      - Cryptocurrency trading strategies
      not_fit_for:
      - Stock trading
      - Regulated markets
    - name: joinquant
      traits:
      - China A-shares
      - CNY markets
      - Local data source
      fit_for:
      - Chinese market trading
      - CNY-denominated portfolios
      not_fit_for:
      - US markets
      - International stocks
    default: yahoofinance
  design_decisions:
  - 'Factory pattern for data sources - Allows swapping data providers (alpaca, wrds,
    yahoofinance) without changing training pipeline. Evidence: finrl/meta/data_processor.py:13(DataProcessor.__init__)'
  - 'Unified column naming across sources - Normalizes output to [timestamp, open,
    high, low, close, volume, tic] regardless of source API differences. Evidence:
    finrl/meta/data_processors/processor_yahoofinance.py:262(rename columns)'
  - 'Support for multiple time intervals - Maps FinRL standard intervals (1D, 1Min)
    to provider-specific formats, enabling multi-resolution data. Evidence: finrl/meta/data_processors/processor_yahoofinance.py:182(convert_interval)'
  acceptance_hints:
  - Downloaded DataFrame contains each requested tickers and date range
  - Columns are normalized to [date, tic, open, high, low, close, volume]
  - No empty DataFrames returned for valid ticker/date combinations
- id: data_cleaning
  name: Data Cleaning & Alignment
  order: 2
  responsibility: 'Handle missing values, align to trading calendar, fill gaps for
    delisted/missing stocks. WHY: Financial data has gaps due to weekends, holidays,
    and delistings that must be handled for consistent tensor shapes.'
  interface:
    inputs:
    - raw DataFrame with possible NaN/0 values
    outputs:
    - cleaned DataFrame aligned to trading calendar
  required_methods:
  - name: YahooFinanceProcessor.clean_data
    description: Fills NaN with previous close, handles timezone conversions, removes
      invalid price entries
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:274(clean_data)
  - name: FeatureEngineer.clean_data
    description: Removes tickers with less than 90% data coverage, drops incomplete
      columns
    evidence: finrl/meta/preprocessor/preprocessors.py:173(clean_data)
  key_behaviors:
  - behavior: Forward-fill missing data with previous close
    description: Maintains price continuity for technical indicators while marking
      volume as 0. Critical for indicator calculations that depend on continuous series
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:347(fill NaN)
  - behavior: Drop tickers with insufficient data
    description: Prevents NaN contamination from delisted stocks, simplifies portfolio
      allocation by removing problematic tickers
    evidence: finrl/meta/preprocessor/preprocessors.py:185(dropna axis=1)
  - behavior: Trading calendar alignment
    description: Aligns each tickers to a common trading calendar, ensuring consistent
      timesteps across the portfolio
    evidence: finrl/meta/preprocessor/preprocessors.py:33(sort_values by date,tic)
  replaceable_points:
  - name: fill_method
    description: How to handle missing values in OHLCV data
    options:
    - name: forward_fill
      traits:
      - Preserves price continuity
      - Simple implementation
      - No look-ahead bias
      fit_for:
      - Technical indicator calculation
      - Price-based features
      not_fit_for:
      - Hedge fund strategies requiring exact market conditions
    - name: interpolate
      traits:
      - Smooth transitions
      - Considers surrounding values
      fit_for:
      - Volume smoothing
      - Volatility calculations
      not_fit_for:
      - Single-stock strategies
      - High-noise data
    - name: drop
      traits:
      - Cleanest data
      - Removes uncertainty
      fit_for:
      - Strict backtesting
      - Regulatory reporting
      not_fit_for:
      - Long-horizon training
      - Sparse tickers
    default: forward_fill
  design_decisions:
  - 'Forward-fill missing data with previous close - Maintains price continuity for
    technical indicators while marking volume as 0. Critical for indicator calculations
    that depend on continuous series. Evidence: finrl/meta/data_processors/processor_yahoofinance.py:347(fill
    NaN)'
  - 'Drop tickers with insufficient data - Prevents NaN contamination from delisted
    stocks, simplifies portfolio allocation. Evidence: finrl/meta/preprocessor/preprocessors.py:185(dropna
    axis=1)'
  acceptance_hints:
  - Output DataFrame has no NaN values in price columns
  - Every tickers have identical number of rows (aligned to trading calendar)
  - Ticker count matches input minus delisted/removal threshold
- id: feature_engineering
  name: Technical Indicator Computation
  order: 3
  responsibility: 'Calculate financial indicators (MACD, RSI, Bollinger Bands, etc.)
    and risk metrics (VIX, turbulence). WHY: These features provide the market context
    needed for RL state representation.'
  interface:
    inputs:
    - clean OHLCV DataFrame
    outputs:
    - DataFrame with added technical indicator columns
  required_methods:
  - name: FeatureEngineer.add_technical_indicator
    description: Computes technical indicators (MACD, RSI, Bollinger Bands, etc.)
      using the stockstats library
    evidence: finrl/meta/preprocessor/preprocessors.py:209(Sdf calculation)
  - name: calculate_turbulence
    description: Computes Mahalanobis-distance-based market stress metric using 252-day
      rolling window
    evidence: finrl/meta/preprocessor/preprocessors.py:282(calculate_turbulence)
  key_behaviors:
  - behavior: Turbulence as Mahalanobis distance
    description: Captures correlated extreme moves across portfolio stocks, better
      than single-stock volatility for risk detection. Uses dot product with pseudoinverse
      for covariance inversion
    evidence: finrl/meta/preprocessor/preprocessors.py:315(dot product pinv)
  - behavior: 252-day rolling window for turbulence
    description: Roughly one trading year provides statistically significant covariance
      estimate for risk regime detection
    evidence: finrl/meta/preprocessor/preprocessors.py:292(start=252)
  - behavior: VIX downloaded separately from Yahoo
    description: Fear/greed proxy from external source, not calculable from portfolio
      stocks alone
    evidence: finrl/meta/preprocessor/preprocessors.py:260(VIXY ticker)
  - behavior: Ordered preprocessing pipeline
    description: FeatureEngineer.preprocess_data() requires clean_data() before add_technical_indicator().
      Missing clean_data() causes stockstats to fail on dirty tickers
    evidence: finrl/meta/preprocessor/preprocessors.py:146-152(ordered method calls)
  replaceable_points:
  - name: indicator_list
    description: Which technical indicators to compute
    options:
    - name: macd,rsi,boll
      traits:
      - Trend, momentum, volatility coverage
      - Balanced feature set
      fit_for:
      - General stock trading
      - Multi-indicator strategies
      not_fit_for:
      - Specialized strategies requiring specific indicators
    - name: custom list
      traits:
      - User-defined indicators
      - Full flexibility
      fit_for:
      - Research
      - Custom strategy development
      not_fit_for:
      - Quick prototyping
      - Standard benchmarks
    default: config.INDICATORS
  - name: turbulence_enabled
    description: Include turbulence risk metric in features
    options:
    - name: 'true'
      traits:
      - Risk-aware state
      - Regime detection
      fit_for:
      - Risk-averse strategies
      - Market stress periods
      not_fit_for:
      - Bull market strategies
      - Low-complexity models
    - name: 'false'
      traits:
      - Simpler state
      - Faster training
      fit_for:
      - Simple strategies
      - Quick iteration
      not_fit_for:
      - Risk management focus
      - Stress testing
    default: 'false'
  design_decisions:
  - 'Turbulence as Mahalanobis distance - Captures correlated extreme moves across
    portfolio stocks, better than single-stock volatility for risk detection. Evidence:
    finrl/meta/preprocessor/preprocessors.py:315(dot product pinv)'
  - '252-day rolling window for turbulence - Roughly one trading year provides statistically
    significant covariance estimate for risk regime detection. Evidence: finrl/meta/preprocessor/preprocessors.py:292(start=252)'
  - 'VIX downloaded separately from Yahoo - Fear/greed proxy from external source,
    not calculable from portfolio stocks alone. Evidence: finrl/meta/preprocessor/preprocessors.py:260(VIXY
    ticker)'
  acceptance_hints:
  - Output DataFrame contains each requested technical indicator columns
  - Turbulence values are non-negative and increase during market stress periods
  - No NaN values in indicator columns for valid input data
- id: data_preprocessing
  name: Normalization & Array Conversion
  order: 4
  responsibility: 'Scale features, convert DataFrame to numpy arrays for efficient
    Gym environment. WHY: RL requires fixed-shape state vectors; scaling improves
    neural network convergence.'
  interface:
    inputs:
    - feature-enriched DataFrame
    outputs:
    - price_array, tech_array, turbulence_array as np.ndarray
  required_methods:
  - name: GroupByScaler.fit_transform
    description: Per-ticker normalization preserving cross-sectional relationships
      using MaxAbsScaler
    evidence: finrl/meta/preprocessor/preprocessors.py:44(GroupByScaler)
  - name: df_to_array
    description: 'Converts DataFrame to three-array tuple: price_array, tech_array,
      turbulence_array'
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:497(df_to_array)
  key_behaviors:
  - behavior: Separate price/tech/turbulence arrays
    description: Allows independent scaling and selective use of features per environment
      type
    evidence: finrl/meta/data_processor.py:79(df_to_array)
  - behavior: Per-ticker feature scaling
    description: Prevents high-price stocks from dominating state space; each ticker
      normalized to its own range
    evidence: finrl/meta/preprocessor/preprocessors.py:81(per-value scaler)
  - behavior: Power-of-2 scaling factors in env
    description: Avoids floating-point precision issues with binary fractions; accelerates
      neural net convergence
    evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:31(tech_ary * 2**-7)
  replaceable_points:
  - name: scaler
    description: Normalization method for features
    options:
    - name: MaxAbsScaler
      traits:
      - Preserves sign
      - No shift
      - Suitable for bounded data
      fit_for:
      - Stock prices with known bounds
      - Trading environments
      not_fit_for:
      - Outlier-heavy data
      - Deep neural networks
    - name: StandardScaler
      traits:
      - Zero mean, unit variance
      - Assumes normal distribution
      fit_for:
      - Deep learning
      - Linear models
      not_fit_for:
      - Sparse features
      - Non-normal distributions
    - name: MinMaxScaler
      traits:
      - Bounded output
      - Linear transformation
      fit_for:
      - Neural networks
      - ' bounded activations'
      not_fit_for:
      - Outliers
      - Unknown range data
    default: MaxAbsScaler
  design_decisions:
  - 'Separate price/tech/turbulence arrays - Allows independent scaling and selective
    use of features per environment type. Evidence: finrl/meta/data_processor.py:79(df_to_array)'
  - 'Per-ticker feature scaling - Prevents high-price stocks from dominating state
    space; each ticker normalized to its own range. Evidence: finrl/meta/preprocessor/preprocessors.py:81(per-value
    scaler)'
  - 'Power-of-2 scaling factors in env - Avoids floating-point precision issues with
    binary fractions; accelerates neural net convergence. Evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:31(tech_ary
    * 2**-7)'
  acceptance_hints:
  - 'Array shapes are consistent: (timesteps, stock_dim) for price_array'
  - Every values in [-1, 1] range after scaling
  - No NaN or Inf values in output arrays
- id: environment_simulation
  name: Gym Environment Creation
  order: 5
  responsibility: 'Wrap data and trading mechanics into OpenAI Gym-compatible interface
    for RL training. WHY: Standardizes interaction interface across each DRL libraries
    while encapsulating domain-specific trading logic.'
  interface:
    inputs:
    - config dict with arrays, initial_amount, cost rates
    outputs:
    - Gym environment with step/reset/render methods
  required_methods:
  - name: StockTradingEnv.__init__
    description: Initializes trading environment with price arrays, initial capital
      ($1M default), cost rates, and state/action space configuration
    evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:8(StockTradingEnv.__init__)
  - name: StockTradingEnv.step
    description: 'Executes one trading step with sell-first ordering: sells positions,
      then buys with remaining capital. Handles turbulence-triggered forced liquidation'
    evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:136(step function)
  - name: StockTradingEnv.reset
    description: Resets environment to initial state with random or fixed start date
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:17(StockTradingEnv.__init__)
  - name: PortfolioOptimizationEnv.step
    description: Executes portfolio rebalancing with softmax action normalization
    evidence: finrl/meta/env_portfolio_optimization/env_portfolio_optimization.py:290-293(softmax)
  key_behaviors:
  - behavior: Continuous action space [-1, 1] normalized
    description: Single continuous space works for each algorithms (A2C, PPO, DDPG);
      libraries handle mapping to discrete if needed
    evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:76(action_space
      Box)
  - behavior: Gamma-weighted cumulative reward
    description: Prioritizes long-term returns over short-term fluctuations, aligns
      with investment horizon. Default gamma=0.99
    evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:146(gamma_reward)
  - behavior: Turbulence-triggered forced liquidation
    description: 'Risk management rule: sell each when market stress exceeds threshold
      to prevent catastrophic losses'
    evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:136(sell all)
  - behavior: SELL before BUY ordering
    description: argsort orders sell_index first, ensuring correct cash calculations
      for subsequent buys. Reversing order causes incorrect cash calculations
    evidence: env_stocktrading.py:327-340(sell_index, buy_index processing)
  - behavior: Gym API dual-standard support
    description: new_gym_api flag enables gradual migration from deprecated gym to
      gymnasium; step() returns 4 or 5 values depending on flag
    evidence: finrl/meta/env_portfolio_optimization/env_portfolio_optimization.py:91(new_gym_api
      flag)
  - behavior: Price > 0 invariant
    description: Every trading envs enforce price>0 check before executing trades
      - missing data handling contract
    evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:118
  replaceable_points:
  - name: reward_scaling
    description: Reward normalization factor
    options:
    - name: 2**-11
      traits:
      - Power-of-2
      - Numerical stability
      - Empirically tuned for PPO
      fit_for:
      - NP environments
      - Stable Baselines3 training
      not_fit_for:
      - Standard envs (inconsistent)
      - ElegantRL models
    - name: 1e-4
      traits:
      - Small scaling
      - Standard magnitude
      fit_for:
      - Standard environments
      - ElegantRL models
      not_fit_for:
      - NP environments
      - Binary precision requirements
    - name: custom
      traits:
      - User-defined factor
      - Full control
      fit_for:
      - Research
      - Custom agent tuning
      not_fit_for:
      - Standard benchmarks
      - Quick prototyping
    default: 2**-11
  - name: action_space_type
    description: How actions map to trades
    options:
    - name: normalized_continuous
      traits:
      - Box(-1,1)
      - Every algorithms compatible
      fit_for:
      - Stock trading
      - Multi-stock portfolios
      not_fit_for:
      - Portfolio optimization
      - Weight allocation
    - name: discrete
      traits:
      - Finite actions
      - Interpretable
      fit_for:
      - Simple strategies
      - Rule-based agents
      not_fit_for:
      - Continuous position sizing
    - name: softmax
      traits:
      - Portfolio weights
      - Sum to 1
      fit_for:
      - Portfolio optimization
      - Allocation strategies
      not_fit_for:
      - Stock trading with cash
      - Leverage
    default: normalized_continuous
  design_decisions:
  - 'Continuous action space [-1, 1] normalized - Single continuous space works for
    each algorithms (A2C, PPO, DDPG); libraries handle mapping to discrete if needed.
    Evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:76(action_space
    Box)'
  - 'Gamma-weighted cumulative reward - Prioritizes long-term returns over short-term
    fluctuations, aligns with investment horizon. Evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:146(gamma_reward)'
  - 'Turbulence-triggered forced liquidation - Risk management rule: sell each when
    market stress exceeds threshold to prevent catastrophic losses. Evidence: finrl/meta/env_stock_trading/env_stocktrading_np.py:136(sell
    all)'
  - 'New Gym API support via flag - Backward compatibility with legacy gym while supporting
    gymnasium migration. Evidence: finrl/meta/env_portfolio_optimization/env_portfolio_optimization.py:91(new_gym_api)'
  acceptance_hints:
  - Environment passes OpenAI Gym compatibility check
  - 'State dimension matches calculated formula: 1 + 2 + 3*stock_dim + tech_dim'
  - Reward is finite and scaled appropriately for neural network training
- id: model_training
  name: DRL Model Training
  order: 6
  responsibility: 'Train deep reinforcement learning agents on environment interactions.
    WHY: Different algorithms (PPO, DDPG, SAC) have different strengths; abstraction
    enables algorithm experimentation.'
  interface:
    inputs:
    - Gym environment, hyperparameter dict
    outputs:
    - Trained model checkpoint
  required_methods:
  - name: DRLAgent.get_model
    description: Initializes and configures a DRL model with specified algorithm and
      hyperparameters
    evidence: finrl/agents/stablebaselines3/models.py:79(get_model)
  - name: DRLAgent.train_model
    description: Trains the configured model on the environment with TensorBoard callback
      support
    evidence: finrl/agents/stablebaselines3/models.py:98(train_model)
  - name: DRLAgent (ElegantRL).get_model
    description: Initializes ElegantRL agent with GPU support and different initialization
      signature
    evidence: finrl/agents/elegantrl/models.py:29(__init__)
  key_behaviors:
  - behavior: Library-agnostic agent interface
    description: Every DRL agents implement get_model/train_model/DRL_prediction;
      users can swap libraries without changing application code
    evidence: finrl/train.py:48-99(conditional imports)
  - behavior: Tensorboard callback for monitoring
    description: Standardized training visualization across each models via Stable
      Baselines3 callback
    evidence: finrl/agents/stablebaselines3/models.py:34(TensorboardCallback)
  - behavior: CallbackList for extensibility
    description: Allows stacking multiple callbacks (tensorboard, early stopping,
      checkpointing) without modifying agent code
    evidence: finrl/agents/stablebaselines3/models.py:146(CallbackList)
  - behavior: Inconsistent __init__ signatures across libraries
    description: ElegantRL agent needs price_array arrays upfront; sb3 agent only
      needs env; cannot swap without adapting train.py dispatch
    evidence: finrl/agents/elegantrl/models.py:46(__init__ vs sb3:98)
  replaceable_points:
  - name: drl_lib
    description: DRL library backend
    options:
    - name: stable_baselines3
      traits:
      - Production-ready
      - TensorBoard logging
      - CPU/GPU support
      fit_for:
      - Production trading
      - Standard benchmarks
      not_fit_for:
      - Distributed training
      - Custom architectures
    - name: elegantrl
      traits:
      - GPU acceleration
      - Customizable
      - Research-focused
      fit_for:
      - GPU-intensive training
      - Custom agent architectures
      not_fit_for:
      - Quick prototyping
      - Production deployment
    - name: rllib
      traits:
      - Distributed training
      - Scalable
      - Multi-agent
      fit_for:
      - Large-scale training
      - Portfolio of agents
      not_fit_for:
      - Single-machine training
      - Simple strategies
    default: stable_baselines3
  - name: algorithm
    description: RL algorithm
    options:
    - name: ppo
      traits:
      - Policy gradient
      - On-policy
      - Stable
      fit_for:
      - Continuous actions
      - Stable training
      not_fit_for:
      - Discrete actions
      - Sample efficiency priority
    - name: a2c
      traits:
      - Advantage actor-critic
      - On-policy
      - Efficient
      fit_for:
      - Balanced performance
      - Simple implementation
      not_fit_for:
      - Highly stochastic environments
    - name: ddpg
      traits:
      - Off-policy
      - Continuous control
      - Actor-critic
      fit_for:
      - Continuous actions
      - Deterministic policies
      not_fit_for:
      - Discrete actions
      - Exploration requirements
    - name: sac
      traits:
      - Off-policy
      - Entropy regularization
      - Maximum entropy
      fit_for:
      - Exploration
      - Robust policies
      not_fit_for:
      - Sample efficiency concerns
      - Simple tasks
    - name: td3
      traits:
      - Twin delayed DDPG
      - Address Q-overestimation
      fit_for:
      - Continuous control
      - Reduced overestimation
      not_fit_for:
      - Discrete actions
      - Simple tasks
    default: ppo
  design_decisions:
  - 'Library-agnostic agent interface - Every DRL agents implement get_model/train_model/DRL_prediction;
    users can swap libraries without changing application code. Evidence: finrl/train.py:48-99(conditional
    imports)'
  - 'Tensorboard callback for monitoring - Standardized training visualization across
    each models via Stable Baselines3 callback. Evidence: finrl/agents/stablebaselines3/models.py:34(TensorboardCallback)'
  - 'CallbackList for extensibility - Allows stacking multiple callbacks (tensorboard,
    early stopping, checkpointing) without modifying agent code. Evidence: finrl/agents/stablebaselines3/models.py:146(CallbackList)'
  acceptance_hints:
  - Model checkpoint saved successfully (act.pth for ElegantRL, .zip for SB3)
  - Training loss decreases over epochs
  - TensorBoard logs accessible and contain expected metrics
- id: model_validation
  name: Ensemble Validation
  order: 7
  responsibility: 'Evaluate multiple models, select best based on Sharpe ratio, support
    rolling-window retraining. WHY: Ensemble of algorithms reduces variance; rolling
    window simulates real deployment rebalancing.'
  interface:
    inputs:
    - Trained models, validation data window
    outputs:
    - Sharpe ratios, best model selection, rebalance dates
  required_methods:
  - name: DRLEnsembleAgent.run_ensemble_strategy
    description: Runs multi-model ensemble with rolling window validation and rebalancing
    evidence: finrl/agents/stablebaselines3/models.py:220(DRLEnsembleAgent.run_ensemble_strategy)
  - name: get_validation_sharpe
    description: Calculates annualized Sharpe ratio from validation returns using
      sqrt(4) for quarterly conversion
    evidence: finrl/agents/stablebaselines3/models.py:283(get_validation_sharpe)
  key_behaviors:
  - behavior: Annualized Sharpe ratio for selection
    description: 252-day year assumed; sqrt(4) converts daily to quarterly Sharpe
      for seasonal comparison
    evidence: finrl/agents/stablebaselines3/models.py:295(sqrt(4)*mean/std)
  - behavior: Rolling window rebalancing
    description: Simulates production rebalancing cadence; prevents overfitting to
      specific market regime
    evidence: finrl/agents/stablebaselines3/models.py:323(unique_trade_date)
  - behavior: Turbulence threshold for risk control
    description: Uses historical turbulence 90th percentile as risk-on/risk-off switch
      for trading
    evidence: finrl/agents/stablebaselines3/models.py:496(quantile)
  - behavior: Best Sharpe model selection pattern
    description: Only one model active per window (argmax of sharpes). Ensemble diversity
      is lost; model cherry-picking may overfit validation period
    evidence: models.py:659-664(argmax(sharpes) selects single model)
  - behavior: Turbulence threshold regime mismatch
    description: 90th quantile during training vs configurable during trading creates
      regime mismatch. Agent trained under different volatility regime than deployed
      environment
    evidence: models.py:500-567(insample vs turbulence_threshold calculation)
  - behavior: run_ensemble_strategy requires train_window before DRL_prediction
    description: Skipping training or calling prediction first returns uninitialized
      state
    evidence: models.py:619-683(train then prediction flow)
  replaceable_points:
  - name: rebalance_window
    description: Days between model retraining
    options:
    - name: '63'
      traits:
      - Quarterly
      - Frequent retraining
      fit_for:
      - High volatility markets
      - Rapid regime changes
      not_fit_for:
      - Low transaction tolerance
      - Long-horizon strategies
    - name: '252'
      traits:
      - Annual
      - Less frequent retraining
      fit_for:
      - Low volatility markets
      - Long-term strategies
      not_fit_for:
      - Fast-changing regimes
      - High alpha decay
    - name: custom
      traits:
      - User-defined
      - Full flexibility
      fit_for:
      - Research
      - Custom market conditions
      not_fit_for:
      - Standard benchmarks
      - Production defaults
    default: '63'
  - name: validation_metric
    description: Model selection criterion
    options:
    - name: sharpe
      traits:
      - Risk-adjusted returns
      - Industry standard
      fit_for:
      - Balanced strategies
      - Risk-aware trading
      not_fit_for:
      - Pure return maximization
      - Low-volatility markets
    - name: return
      traits:
      - Total return
      - Simple metric
      fit_for:
      - Growth strategies
      - Long-horizon focus
      not_fit_for:
      - Risk-averse investors
      - Volatile markets
    - name: calmar
      traits:
      - Return/max drawdown
      - Drawdown-aware
      fit_for:
      - Risk-averse strategies
      - Capital preservation
      not_fit_for:
      - Growth priority
      - Small drawdown tolerance
    default: sharpe
  design_decisions:
  - 'Annualized Sharpe ratio for selection - 252-day year assumed; sqrt(4) converts
    daily to quarterly Sharpe for seasonal comparison. Evidence: finrl/agents/stablebaselines3/models.py:295(sqrt(4)*mean/std)'
  - 'Rolling window rebalancing - Simulates production rebalancing cadence; prevents
    overfitting to specific market regime. Evidence: finrl/agents/stablebaselines3/models.py:323(unique_trade_date)'
  - 'Turbulence threshold for risk control - Uses historical turbulence 90th percentile
    as risk-on/risk-off switch for trading. Evidence: finrl/agents/stablebaselines3/models.py:496(quantile)'
  acceptance_hints:
  - Every models in ensemble are trained and evaluated
  - Sharpe ratios are calculated for each validation window
  - Rebalance dates align with trading calendar
- id: model_inference
  name: Backtesting & Paper Trading
  order: 8
  responsibility: 'Run trained models on held-out test data or live paper trading.
    WHY: Validates strategy viability before risking capital; paper trading tests
    execution infrastructure.'
  interface:
    inputs:
    - Trained model, test data or live API
    outputs:
    - Account value history, action history
  required_methods:
  - name: DRL_prediction
    description: Batch inference on test dataset, returns account values and actions
      for each timestep
    evidence: finrl/agents/stablebaselines3/models.py:156(DRL_prediction)
  - name: DRL_prediction_load_from_file
    description: Loads model from checkpoint file, runs inference on provided environment
    evidence: finrl/agents/stablebaselines3/models.py:186(DRL_prediction_load_from_file)
  - name: AlpacaPaperTrading.run
    description: Executes live paper trading via Alpaca API with latency testing before
      trading
    evidence: finrl/meta/env_stock_trading/env_stock_papertrading.py:13(AlpacaPaperTrading)
  key_behaviors:
  - behavior: Separate test vs trade modes
    description: Test mode runs batch backtest on historical data; trade mode connects
      to live execution API for production simulation
    evidence: finrl/trade.py:24(trade_mode switch)
  - behavior: Last-state persistence between windows
    description: Ensemble strategy passes final portfolio state to next window, maintaining
      continuous portfolio tracking
    evidence: finrl/agents/stablebaselines3/models.py:392(save last_state)
  - behavior: Latency testing before trading
    description: Validates API response time before live orders; prevents missed trades
      due to network delays
    evidence: finrl/meta/env_stock_trading/env_stock_papertrading.py:40(test_latency)
  replaceable_points:
  - name: trade_mode
    description: Execution mode
    options:
    - name: backtesting
      traits:
      - Historical data only
      - Fast execution
      - No risk
      fit_for:
      - Strategy validation
      - Research
      - Performance testing
      not_fit_for:
      - Live trading
      - Real-time adaptation
    - name: paper_trading
      traits:
      - Simulated execution
      - Real API
      - No capital risk
      fit_for:
      - Pre-production testing
      - Execution infrastructure validation
      not_fit_for:
      - Real capital
      - Production deployment
    - name: live
      traits:
      - Real execution
      - Real capital at risk
      fit_for:
      - Production deployment
      not_fit_for:
      - Research
      - Strategy development
      - Testing
    default: backtesting
  - name: deterministic
    description: Use deterministic policy for reproducibility
    options:
    - name: 'true'
      traits:
      - Reproducible
      - No exploration noise
      fit_for:
      - Backtesting
      - Reproducible results
      not_fit_for:
      - Exploration needed
      - Online learning
    - name: 'false'
      traits:
      - Exploratory
      - Stochastic actions
      fit_for:
      - Training continuation
      - Online adaptation
      not_fit_for:
      - Reproducibility requirements
    default: 'true'
  design_decisions:
  - 'Separate test vs trade modes - Test mode runs batch backtest; trade mode connects
    to live execution API for production simulation. Evidence: finrl/trade.py:24(trade_mode
    switch)'
  - 'Last-state persistence between windows - Ensemble strategy passes final portfolio
    state to next window, maintaining continuous portfolio tracking. Evidence: finrl/agents/stablebaselines3/models.py:392(save
    last_state)'
  - 'Latency testing before trading - Validates API response time before live orders;
    prevents missed trades due to network delays. Evidence: finrl/meta/env_stock_trading/env_stock_papertrading.py:40(test_latency)'
  acceptance_hints:
  - Inference completes for each test timesteps without errors
  - Account value history has same length as test data
  - Action history reflects valid trade quantities
- id: performance_evaluation
