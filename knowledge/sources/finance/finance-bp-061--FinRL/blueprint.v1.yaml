resources:
- name: stock_data_source
  description: 'Choose based on: budget, data frequency needs, market coverage, authentication
    requirements'
  options:
  - name: Yahoo Finance
    traits:
    - free
    - no_auth
    - 1min_resolution
    - us_stocks
    fit_for:
    - Prototyping, learning, free tier applications
    not_fit_for:
    - Production trading, real-time execution, Chinese markets
  - name: Alpaca
    traits:
    - paid_data
    - api_auth
    - 1min_resolution
    - paper_trading
    fit_for:
    - Real-time US stock trading, paper trading
    not_fit_for:
    - Historical deep backtesting, high-frequency data
  - name: WRDS
    traits:
    - academic
    - ms_resolution
    - taq_data
    - high_quality
    fit_for:
    - Academic research, high-frequency trading research
    not_fit_for:
    - Real-time trading, retail users
  - name: EOD Historical Data
    traits:
    - paid
    - 1min_resolution
    - international
    fit_for:
    - Professional backtesting, international markets
    not_fit_for:
    - Free tier projects, beginners
  default: Yahoo Finance
  _source: worker_resource
- name: crypto_data_source
  description: Use CCXT for multi-exchange; use Binance direct for single-exchange
    production
  options:
  - name: CCXT (Binance)
    traits:
    - multi_exchange
    - free_public
    - 1min_resolution
    fit_for:
    - Cryptocurrency trading research, multi-exchange strategies
    not_fit_for:
    - Non-crypto assets
  - name: Binance Direct
    traits:
    - official
    - real_time
    - advanced_order_types
    fit_for:
    - Production crypto trading on Binance
    not_fit_for:
    - Multi-exchange strategies
  default: CCXT (Binance)
  _source: worker_resource
- name: dr_library
  description: SB3 for ease of use; ElegantRL for customization; RLlib for scale
  options:
  - name: Stable Baselines 3
    traits:
    - production_ready
    - well_documented
    - sb3_compatible
    fit_for:
    - Most use cases, production, beginners
    not_fit_for:
    - Custom algorithm research
  - name: ElegantRL
    traits:
    - lightweight
    - customizable
    - pytorch
    fit_for:
    - Advanced users, algorithm customization
    not_fit_for:
    - Quick prototyping, beginners
  - name: Ray RLlib
    traits:
    - distributed
    - scalable
    - hyperparameter_tuning
    fit_for:
    - Large-scale training, distributed systems
    not_fit_for:
    - Simple single-agent tasks
  default: Stable Baselines 3
  _source: worker_resource
- name: trading_broker
  description: Alpaca for US stocks/beginners; IBKR for professional multi-asset
  options:
  - name: Alpaca
    traits:
    - us_stocks
    - paper_trading
    - free_api
    fit_for:
    - US stock trading, easy setup, paper trading
    not_fit_for:
    - Options, futures, international markets
  - name: Interactive Brokers
    traits:
    - multi_asset
    - global_markets
    - professional
    fit_for:
    - Professional trading, options, futures, forex
    not_fit_for:
    - Beginners, simple use cases
  default: Alpaca
  _source: worker_resource
- name: chinese_market_data
  description: JoinQuant for institutional access; Tushare for free tier
