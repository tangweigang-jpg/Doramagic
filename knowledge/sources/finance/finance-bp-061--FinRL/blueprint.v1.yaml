  type: B/BA
  content: Episode-Based Training Default (100 episodes) for RLlib
  rationale: Episode-based training aligns with episodic RL tasks like trading where
    episodes naturally terminate, providing clearer progress metrics than timestep-based
    counting.
  evidence: finrl/agents/rllib/models.py:80(train_model)
  stage: design
  alternative_considered: Timestep-based was rejected for unintuitive trading metrics
- id: RC-001
  type: RC
  content: Torch as Default Framework for RLlib Agent
  rationale: Defaults to PyTorch framework for its dynamic computation graph and widespread
    adoption in research, enabling easier debugging and model customization compared
    to TensorFlow.
  evidence: finrl/agents/rllib/drllibv2.py:125(__init__)
  stage: runtime_config
  alternative_considered: TensorFlow default was rejected for PyTorch research dominance
- id: RC-002
  type: RC
  content: Warn Log Level by Default for Ray Tune Sessions
  rationale: Reduces console verbosity while maintaining visibility into critical
    training events, balancing information needs with log file size management for
    long-running experiments.
  evidence: finrl/agents/rllib/drllibv2.py:125(__init__)
  stage: runtime_config
  alternative_considered: DEBUG level was rejected for verbosity
- id: RC-003
  type: RC
  content: Episode Reward Mean as Default Optimization Metric
  rationale: Uses mean episode reward for hyperparameter optimization, providing stable
    aggregated performance metric less sensitive to outlier episodes than total reward.
  evidence: finrl/agents/rllib/drllibv2.py:125(__init__)
  stage: runtime_config
  alternative_considered: Total reward was rejected for volatility sensitivity
- id: RC-004
  type: RC
  content: Default Lookback of 1 for Crypto Environment State
  rationale: Provides minimal historical context for state representation, enabling
    quick training cycles while still capturing sequential dependencies in price movements.
  evidence: finrl/meta/env_cryptocurrency_trading/env_multiple_crypto.py:7(__init__)
  stage: runtime_config
  alternative_considered: Larger lookback (5-10) was rejected for state space explosion
- id: M-001
  type: M
  content: Checkpoint-Based Model Persistence Strategy
  rationale: Enables model saving/loading through checkpoint files supporting experiment
    reproducibility, interrupted training resumption, and production deployment of
    trained models.
  evidence: finrl/agents/rllib/drllibv2.py:247(restore_agent)
  stage: operations
  alternative_considered: Model serialization was rejected for checkpoint compatibility
    with RLlib
- id: M-002
  type: M/BA
  content: CSV Export of Tuning Results for Analysis
  rationale: Exports hyperparameter tuning results to CSV enabling post-hoc analysis,
    comparison across experiments, and integration with external analytics tools.
  evidence: finrl/agents/rllib/drllibv2.py:227(infer_results)
  stage: operations
  alternative_considered: JSON-only export was rejected for spreadsheet compatibility
- id: DK-001
  type: DK
  content: Missing Docstrings in Agent Classes
  rationale: Many methods lack docstrings indicating potential documentation debt
    that could hinder adoption and maintenance, though code structure is self-explanatory
    through method signatures.
  evidence: finrl/agents/elegantrl/models.py:46(__init__)
  stage: maintenance
  alternative_considered: Documentation could be added via docstring conventions
- id: DK-002
  type: DK
  content: Environment State Space Not Formally Defined
  rationale: State space dimensions are derived from input arrays without formal specification,
    potentially causing issues when arrays have unexpected shapes or missing values.
  evidence: finrl/meta/env_cryptocurrency_trading/env_multiple_crypto.py:103(get_state)
  stage: design
  alternative_considered: Formal schema definition could prevent runtime errors
