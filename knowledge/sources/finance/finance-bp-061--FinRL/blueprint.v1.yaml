id: finance-bp-061
name: FinRL
sop_version: '3.6'
source:
  projects:
  - FinRL
  commit_hash: 220f9e490996a6e5c84cfad914ff14f2e0c42d22
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Algorithmic Trading and Portfolio Management using Deep Reinforcement
    Learning
  description: FinRL is an open-source library for financial reinforcement learning,
    providing end-to-end pipelines for stock trading, portfolio allocation, and cryptocurrency
    trading using DRL algorithms. It integrates with popular DRL libraries (Stable-Baselines3,
    ElegantRL, RLlib) and supports real-time paper trading via Alpaca brokerage.
  prerequisites: Users should have working knowledge of Python programming, financial
    markets basics, and fundamental concepts of reinforcement learning. Familiarity
    with gym environments and pandas DataFrames is recommended.
  not_suitable_for: 'This framework is NOT suitable for: (1) Live production trading
    requiring ultra-low latency execution, (2) Regulatory compliance or risk management
    systems requiring formal audit trails, (3) Non-reinforcement learning approaches
    like supervised price prediction, (4) High-frequency trading strategies requiring
    tick-level data processing, (5) Multi-asset portfolios beyond the supported environment
    types.'
stages:
- id: data_download
  name: Data Download
  order: 1
  responsibility: 'Fetches raw market data from external APIs and data sources. WHY:
    Abstracts multiple data providers behind unified interface to decouple data acquisition
    from processing.'
  interface:
    inputs:
    - ticker_list
    - start_date
    - end_date
    - time_interval
    outputs:
    - pandas DataFrame with date, tic, open, high, low, close, volume
  required_methods:
  - name: YahooDownloader.fetch_data
    description: Retrieves OHLCV data from Yahoo Finance API for specified tickers
      and date range
    evidence: finrl/meta/preprocessor/yahoodownloader.py:16(fetch_data)
  - name: DataProcessor.download
    description: Factory method that dispatches to appropriate data source processor
      based on configuration
    evidence: finrl/meta/data_processor.py:13(DataProcessor.__init__)
  - name: AlpacaProcessor.download_data
    description: Fetches stock data from Alpaca brokerage API
    evidence: finrl/meta/data_processors/processor_alpaca.py:20
  - name: CCXTEngineer.download_data
    description: Downloads cryptocurrency data via CCXT unified exchange interface
    evidence: finrl/meta/data_processors/processor_ccxt.py:17
  key_behaviors:
  - behavior: Factory pattern dispatching
    description: DataProcessor.__init__ routes to specific processor (Yahoo, Alpaca,
      WRDS, CCXT, etc.) based on source parameter, enabling pluggable data sources
      without modifying downstream code
    evidence: finrl/meta/data_processor.py:13(DataProcessor.__init__)
  - behavior: Unified DataFrame schema output
    description: Every downloaders return consistent DataFrame with date, tic, open,
      high, low, close, volume columns regardless of source, ensuring downstream stages
      work identically
    evidence: finrl/meta/preprocessor/yahoodownloader.py:16(fetch_data)
  - behavior: Date range filtering
    description: Data fetching respects start_date and end_date parameters to limit
      API calls and data scope
    evidence: finrl/meta/preprocessor/yahoodownloader.py:16(fetch_data)
  replaceable_points:
  - name: DataSource
    description: Add new data source processor
    options:
    - name: YahooFinance
      traits:
      - Free
      - No authentication
      - Limited history
      - Popular stocks
      fit_for:
      - Quick prototyping
      - Educational use
      - US stocks
      not_fit_for:
      - High-frequency data
      - International markets beyond US
      - Premium data needs
    - name: Alpaca
      traits:
      - Brokerage API
      - Real-time data
      - Paper trading capable
      fit_for:
      - Live/paper trading
      - US equities
      not_fit_for:
      - Crypto
      - International markets
    - name: WRDS
      traits:
      - Academic database
      - CRSP/Compustat
      - High quality
      fit_for:
      - Academic research
      - Institutional backtesting
      not_fit_for:
      - Live trading
      - Non-academic users
    - name: CCXT
      traits:
      - Cryptocurrency
      - Multiple exchanges
      fit_for:
      - Crypto trading
      - DeFi assets
      not_fit_for:
      - Traditional stocks
      - Bonds
      - Commodities
    - name: JoinQuant
      traits:
      - China markets
      - Local data provider
      fit_for:
      - Chinese A-shares
      - Hong Kong stocks
      not_fit_for:
      - US markets
      - Global portfolio
    - name: QuantConnect
      traits:
      - QuantConnect integration
      - Cloud-based
      fit_for:
      - QuantConnect users
      - Alternative data
      not_fit_for:
      - Standalone use
      - On-premise deployment
    default: YahooFinance
  design_decisions:
  - Factory pattern in DataProcessor dispatches to specific processors, decoupling
    data source from downstream processing; new sources can be added without modifying
    existing code (finrl/meta/data_processor.py:13)
  - Every downloaders return unified DataFrame schema, ensuring consistent interface
    for downstream stages regardless of source (finrl/meta/preprocessor/yahoodownloader.py:16)
  acceptance_hints:
  - Downloaded DataFrame contains each specified tickers for the date range
  - No missing tickers except those legitimately delisted before start_date
  - 'DataFrame columns match: date, tic, open, high, low, close, volume'
  - Date column is properly parsed as datetime type
- id: data_cleaning
  name: Data Cleaning
  order: 2
  responsibility: 'Handles missing values, adjusts prices, filters invalid data. WHY:
    Raw data contains gaps due to delistings, non-trading days, and API limitations
    that must be addressed before feature engineering.'
  interface:
    inputs:
    - Raw DataFrame with potential NaN/0 values
    outputs:
    - Cleaned DataFrame with date/tic alignment
  required_methods:
  - name: YahooFinanceProcessor.clean_data
    description: Fills missing values using forward-fill then backward-fill strategy,
      ensuring temporal continuity while handling edge cases
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:274(clean_data)
  - name: FeatureEngineer.preprocess_data
    description: Main cleaning orchestrator that expands data to full date-ticker
      grid then merges, ensuring every ticker has data for every trading day
    evidence: finrl/meta/preprocessor/preprocessors.py:146(preprocess_data)
  - name: AlpacaProcessor.clean_data
    description: Cleans individual ticker data by handling gaps and aligning to trading
      calendar
    evidence: finrl/meta/data_processors/processor_alpaca.py:180(clean_data)
  key_behaviors:
  - behavior: Fill-forward then backward for missing prices
    description: Missing price values are filled using forward-fill first (carry last
      known price forward), then backward-fill handles edge cases at series start,
      preserving temporal continuity
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:274(clean_data)
  - behavior: Full date-ticker grid expansion
    description: Data is expanded to include every trading date for every ticker,
      then merged with actual data, ensuring batch processing compatibility and no
      missing trading days
    evidence: finrl/applications/stock_trading/stock_trading.py:63
  - behavior: Ticker-date alignment verification
    description: Each ticker has entries for each dates in the range, preventing sparse
      data issues in batch processing
    evidence: finrl/meta/preprocessor/preprocessors.py:146
  replaceable_points:
  - name: MissingDataStrategy
    description: How to handle missing price data
    options:
    - name: fillna
      traits:
      - Forward-fill then backward-fill
      - Preserves continuity
      fit_for:
      - Price data
      - Normal market hours
      not_fit_for:
      - Sparse data
      - Large gaps from delistings
    - name: forward_fill
      traits:
      - Only forward propagation
      - Simpler
      fit_for:
      - Continuous data streams
      not_fit_for:
      - Series start gaps
    - name: drop_rows
      traits:
      - Removes incomplete rows
      - Data loss
      fit_for:
      - High-quality data
      - When completeness is critical
      not_fit_for:
      - Sparse tickers
      - Limited historical data
    default: fillna
  design_decisions:
  - Fill forward + backward for missing prices then forward fill only, preserving
    temporal continuity while handling edge cases at series boundaries (finrl/meta/data_processors/processor_yahoofinance.py:274)
  - Expand to full date-ticker grid then merge, ensuring every ticker has data for
    every trading day, enabling batch processing (finrl/applications/stock_trading/stock_trading.py:63)
  acceptance_hints:
  - No NaN values in price columns (open, high, low, close)
  - Every ticker has entries for every trading date in the specified range
  - Zero values in price columns are replaced with valid prices
  - Date column forms a continuous trading calendar without gaps
- id: feature_engineering
  name: Feature Engineering
  order: 3
  responsibility: 'Computes technical indicators (MACD, RSI, Bollinger Bands) from
    OHLCV data. WHY: Provides ML model with informative features capturing price momentum,
    volatility, and trend.'
  interface:
    inputs:
    - Clean OHLCV DataFrame
    outputs:
    - DataFrame with added technical_indicator columns
  required_methods:
  - name: FeatureEngineer.add_technical_indicator
    description: Computes and appends technical indicators (macd, boll_ub, boll_lb,
      rsi_30, cci_30, dx_30, close_30_sma, close_60_sma) to the DataFrame using stockstats
      package
    evidence: finrl/meta/preprocessor/preprocessors.py:200(add_technical_indicator)
  - name: YahooFinanceProcessor.add_technical_indicator
    description: Per-ticker technical indicator calculation, iterating through each
      stock to add momentum and trend features
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:376
  key_behaviors:
  - behavior: Per-ticker indicator computation
    description: Technical indicators are calculated independently for each ticker,
      ensuring no lookahead bias or cross-contamination between stocks
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:376
  - behavior: Standard indicator set via stockstats
    description: Uses the stockstats package for battle-tested financial calculations
      rather than implementing indicators from scratch, ensuring accuracy of MACD,
      RSI, Bollinger Bands, CCI, and DX
    evidence: finrl/meta/preprocessor/preprocessors.py:200
  - behavior: Configurable indicator list
    description: Technical indicators are defined in config.INDICATORS, allowing customization
      of the feature set without code changes
    evidence: finrl/config.py:21(INDICATORS)
  replaceable_points:
  - name: TechnicalIndicators
    description: Set of technical indicators to compute
    options:
    - name: config.INDICATORS
      traits:
      - macd, boll_ub, boll_lb, rsi_30, cci_30, dx_30, close_30_sma, close_60_sma
      - Balanced coverage
      fit_for:
      - General stock trading
      - Starting point
      not_fit_for:
      - Specialized strategies
      - Sector-specific indicators
    - name: custom_list
      traits:
      - User-defined indicators
      - Flexible
      fit_for:
      - Specific strategies
      - Research purposes
      not_fit_for:
      - Quick prototyping
      - Beginners
    default: config.INDICATORS
  design_decisions:
  - Use stockstats package for indicator calculation, leveraging battle-tested financial
    calculations rather than implementing from scratch (finrl/meta/preprocessor/preprocessors.py:200)
  - Indicators include macd, boll_ub, boll_lb, rsi_30, cci_30, dx_30, close_30_sma,
    close_60_sma, covering momentum (RSI, MACD), volatility (Bollinger), trend (SMA),
    and breadth (CCI, DX); default list is a reasonable starter set (finrl/config.py:21)
  acceptance_hints:
  - Technical indicator columns appear in DataFrame with expected naming (macd, boll_ub,
    boll_lb, rsi_30, etc.)
  - Indicator values are non-NaN for most rows after warmup period
  - 'Indicator values are within reasonable ranges (RSI: 0-100, Bollinger bands properly
    ordered)'
  - No future information leakage in indicators
- id: risk_feature_computation
  name: Risk Feature Computation
  order: 4
  responsibility: 'Calculates turbulence index and VIX for risk-aware trading. WHY:
    Market regime detection (high turbulence = sell everything) prevents catastrophic
    losses during volatility spikes.'
  interface:
    inputs:
    - DataFrame with close prices, lookback_window
    outputs:
    - DataFrame with turbulence and/or vix columns
  required_methods:
  - name: YahooFinanceProcessor.calculate_turbulence
    description: Computes market turbulence as Mahalanobis distance of return vector
      from historical distribution using 252-day lookback, capturing multi-asset correlation
      breakdown
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:433(calculate_turbulence)
  - name: YahooFinanceProcessor.calculate_vix
    description: Fetches VIX (fear index) data from Yahoo Finance to gauge market
      volatility expectations
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:413(calculate_vix)
  - name: FeatureEngineer.add_turbulence
    description: Adds turbulence index to the dataset for risk-aware trading decisions
    evidence: finrl/meta/preprocessor/preprocessors.py:270(add_turbulence)
  key_behaviors:
  - behavior: Turbulence as Mahalanobis distance
    description: Turbulence is calculated as the Mahalanobis distance of the current
      return vector from the historical distribution, capturing multi-asset correlation
      breakdown that single-factor measures miss
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:433(calculate_turbulence)
  - behavior: 252-day lookback window
    description: Uses one year of historical data (252 trading days) for calculating
      turbulence, which is the standard for annual analysis and ensures sufficient
      data for covariance estimation
    evidence: finrl/meta/data_processors/processor_yahoofinance.py:433(calculate_turbulence)
  - behavior: Automatic liquidation trigger
    description: When turbulence exceeds threshold, each positions are automatically
      liquidated to prevent losses during market stress events
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:150
  replaceable_points:
  - name: RiskMetric
    description: Risk indicator for trading decisions
    options:
    - name: turbulence
      traits:
      - Multi-asset Mahalanobis
      - Correlation-aware
      fit_for:
      - Multi-stock portfolios
      - Regime detection
      not_fit_for:
      - Single stock
      - Low-correlation assets
    - name: vix
      traits:
      - Market-wide fear index
      - Broad sentiment
      fit_for:
      - Market timing
      - Index trading
      not_fit_for:
      - Individual stocks
      - Sector-specific
    - name: both
      traits:
      - Turbulence + VIX combined
      fit_for:
      - Comprehensive risk management
      not_fit_for:
      - Simple strategies
      - Speed-critical applications
    - name: none
      traits:
      - No risk filtering
      fit_for:
      - Backtesting baseline
      - Aggressive strategies
      not_fit_for:
      - Risk-averse portfolios
      - Live trading
    default: turbulence
  design_decisions:
  - Turbulence = Mahalanobis distance of return vector from historical distribution,
    capturing multi-asset correlation breakdown which single-factor measures miss;
    252-day lookback is standard for annual analysis (finrl/meta/data_processors/processor_yahoofinance.py:433)
  - Turbulence threshold at 90th percentile of training turbulence, being data-driven
    and adapting to market characteristics rather than using fixed cutoff (finrl/agents/stablebaselines3/models.py:500)
  acceptance_hints:
  - Turbulence column exists in DataFrame with numeric values
  - Turbulence values spike during known market stress periods (2008, 2020 COVID crash)
  - VIX data is fetched from Yahoo when requested
  - Risk features are NaN for first 252 days due to lookback requirement
- id: environment_setup
  name: Environment Setup
  order: 5
  responsibility: 'Creates gym-compatible trading environments with proper state/reward/action
    spaces. WHY: Bridges market data format to RL framework; defines how agent observes
    market and receives feedback.'
  interface:
    inputs:
    - Processed DataFrame, config dict (hmax, costs, initial_amount)
    outputs:
    - gym.Env with step/reset methods returning (state, reward, done, info)
  required_methods:
  - name: StockTradingEnv.__init__
    description: Initializes stock trading environment with state space (cash + prices
      + holdings + indicators), action space (hmax normalized), and transaction cost
      parameters
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:19(StockTradingEnv)
  - name: StockTradingEnv.step
    description: 'Executes one trading step: sells are processed first, then buys.
      Returns (state, reward, done, info). Includes automatic liquidation when turbulence
      exceeds threshold.'
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:327(step)
  - name: StockTradingEnv.reset
    description: Resets environment to initial state with cash and zero holdings,
      optionally starting at random point in data for training diversity
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:390(reset)
  - name: StockTradingEnv.get_sb_env
    description: Returns Stable-Baselines3 compatible VecEnv and initial observation
      tuple for seamless DRL agent training
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:564(get_sb_env)
  key_behaviors:
  - behavior: Flat state representation
    description: State = [cash] + [close_prices] + [num_shares] + [tech_indicators],
      enabling simple MLP policies while including each info needed for single-step
      decisions
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:418(_initiate_state)
  - behavior: State index 0 = cash invariant
    description: Cash is ALWAYS at state index 0, with stock prices at indices 1 to
      stock_dim. Every custom environments and analysis tools must maintain this contract.
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:419-420
  - behavior: Sell-before-buy ordering
    description: Sell operations MUST complete before buy operations in step(). Reversing
      this order causes cash balance miscalculations during same-step sell+buy.
    evidence: env_stocktrading.py:327-340
  - behavior: Automatic risk liquidation
    description: When turbulence exceeds threshold (90th percentile), each positions
      are automatically sold and held in cash, providing hard risk protection without
      agent involvement
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:150
  - behavior: Transaction costs deducted from balance
    description: Buy and sell costs are deducted before available balance calculation,
      ensuring accurate portfolio value tracking
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:189
  replaceable_points:
  - name: EnvironmentType
    description: Trading environment variant
    options:
    - name: StockTradingEnv
      traits:
      - Basic stock trading
      - Single-step actions
      fit_for:
      - Standard stock trading
      - Starting point
      not_fit_for:
      - Portfolio rebalancing
      - Stop-loss needs
    - name: StockTradingEnvCashpenalty
      traits:
      - Cash reserve penalty
      - 10% penalty if not held
      fit_for:
      - Conservative strategies
      - Risk management
      not_fit_for:
      - All-in strategies
      - Leveraged approaches
    - name: StockTradingEnvStopLoss
      traits:
      - Automatic stop-loss
      - 90% price threshold
      fit_for:
      - Volatile stocks
      - Bear market protection
      not_fit_for:
      - Long-term holding
      - Momentum strategies
    - name: StockPortfolioEnv
      traits:
      - Portfolio weights
      - Softmax actions
      fit_for:
      - Portfolio allocation
      - Weight-based rebalancing
      not_fit_for:
      - Discrete trading
      - Single asset focus
    - name: PortfolioOptimizationEnv
      traits:
      - TCN-based
      - Portfolio optimization
      fit_for:
      - Complex portfolios
      - Deep learning approaches
      not_fit_for:
      - Simple strategies
      - Interpretability needs
    - name: CryptoEnv
      traits:
      - Cryptocurrency
      - Multi-crypto
      fit_for:
      - Crypto trading
      - 24/7 markets
      not_fit_for:
      - Traditional stocks
      - Limited hours
    default: StockTradingEnv
  - name: RewardType
    description: Reward calculation method
    options:
    - name: portfolio_value_diff
      traits:
      - Simple P&L
      - Absolute returns
      fit_for:
      - Standard trading
      - Baseline comparison
      not_fit_for:
      - Risk-adjusted optimization
    - name: log_return
      traits:
      - Log returns
      - Multiplicative
      fit_for:
      - Long-term returns
      - Statistical properties
      not_fit_for:
      - Short-term noise
    - name: sharpe_ratio
      traits:
      - Risk-adjusted
      - Normalized
      fit_for:
      - Risk management
      - Portfolio optimization
      not_fit_for:
      - Simple backtesting
    default: portfolio_value_diff
  design_decisions:
  - State = [cash] + [close_prices] + [num_shares] + [tech_indicators], flat state
    representation enables simple MLP policies; each info needed for single-step decisions
    is present (finrl/meta/env_stock_trading/env_stocktrading.py:418)
  - 'State space formula: 1 + 2*stock_dim + len(indicators)*stock_dim, explicit formula
    documents assumptions; enables validation before training (finrl/applications/stock_trading/stock_trading.py:83)'
  - Actions normalized to hmax shares per stock, hmax cap prevents extreme positions
    and bounds action space for stable learning (finrl/meta/env_stock_trading/env_stocktrading.py:35)
  - Sell when turbulence > threshold (clear each positions), hard risk rule simplifies
    learning; agent focuses on normal conditions while protection is automatic (finrl/meta/env_stock_trading/env_stocktrading.py:150)
  acceptance_hints:
  - Environment inherits from gym.Env and implements step/reset/render methods
  - get_sb_env() returns tuple of (VecEnv, initial_obs) for Stable-Baselines3 compatibility
  - 'State shape matches formula: 1 + 2*stock_dim + len(indicators)*stock_dim'
  - State index 0 is always cash (verified by checking first element)
  - Reward is scaled (reward_scaling=1e-4) to prevent gradient explosion
  - Transaction costs are correctly deducted from balance
- id: model_training
  name: Model Training
  order: 6
  responsibility: 'Trains DRL agents on gym environments using various algorithms.
    WHY: Core learning stage where agent discovers profitable trading policies from
    market data.'
  interface:
    inputs:
    - gym.Env, model_name, hyperparameter dict
    outputs:
    - Trained model object ready for inference
  required_methods:
  - name: DRLAgent.get_model
    description: Creates and returns a DRL model instance (A2C, PPO, DDPG, SAC, TD3)
      wrapped with the specified environment and hyperparameters
    evidence: finrl/agents/stablebaselines3/models.py:79(get_model)
  - name: DRLAgent.train
    description: Trains the model on the environment for specified timesteps with
      reward scaling and tensorboard logging
    evidence: finrl/agents/stablebaselines3/models.py:79(train)
  - name: DRLAgent.get_agent
    description: Returns instantiated agent with configured environment and hyperparameters
    evidence: finrl/agents/stablebaselines3/models.py:79
  key_behaviors:
  - behavior: Wrapper pattern for algorithm backends
    description: Same DRLAgent interface wraps different backends (Stable-Baselines3,
      ElegantRL, RLlib), enabling algorithm swapping without changing environment
      or calling code
    evidence: finrl/agents/stablebaselines3/models.py:79(DRLAgent)
  - behavior: Reward scaling for gradient stability
    description: reward_scaling=1e-4 prevents gradient explosion from large absolute
      portfolio values while preserving learning signal
    evidence: finrl/applications/stock_trading/stock_trading.py:99
  - behavior: Tensorboard logging integration
    description: Training progress is logged via TensorboardCallback for visualization
      and debugging using standard ML tooling
    evidence: finrl/agents/stablebaselines3/models.py:34(TensorboardCallback)
  replaceable_points:
  - name: Algorithm
    description: DRL algorithm to use
    options:
    - name: a2c
      traits:
      - Synchronous
      - Actor-Critic
      - Efficient
      fit_for:
      - Fast training
      - Simple implementations
      not_fit_for:
      - Fine-grained control
      - Complex environments
    - name: ppo
      traits:
      - Proximal Policy Optimization
      - Stable
      - Widely used
      fit_for:
      - General purpose
      - Stock trading
      not_fit_for:
      - Sample efficiency critical
    - name: ddpg
      traits:
      - Off-policy
      - Continuous actions
      - Actor-Critic
      fit_for:
      - Continuous control
      - Finance
      not_fit_for:
      - Discrete actions
      - Image inputs
    - name: sac
      traits:
      - Soft Actor-Critic
      - Entropy-based
      - Maximum entropy
      fit_for:
      - Exploration
      - Robustness
      not_fit_for:
      - Deterministic policies required
    - name: td3
      traits:
      - Twin Delayed DDPG
      - Reduced overestimation
      fit_for:
      - Continuous control
      - Lower variance
      not_fit_for:
      - Discrete actions
    default: ppo
  - name: Backend
    description: DRL library implementation
    options:
    - name: stablebaselines3
      traits:
      - Stable
      - Well-documented
      - SB3
      fit_for:
      - Production
      - Most users
      not_fit_for:
      - Custom architectures
    - name: elegantrl
      traits:
      - Lightweight
      - Customizable
      fit_for:
      - Research
      - Custom agents
      not_fit_for:
      - Quick prototyping
    - name: rllib
      traits:
      - Scalable
      - Multi-agent
      fit_for:
      - Large-scale training
      - Parallelism
      not_fit_for:
      - Simple use cases
    default: stablebaselines3
  design_decisions:
  - 'Wrapper pattern: same DRLAgent interface for different backends, enabling algorithm
    swapping without changing environment or calling code; each backend encapsulated
    in own module (finrl/agents/stablebaselines3/models.py:79)'
  - reward_scaling = 1e-4 for stock trading, large absolute portfolio values would
    cause gradient explosion without scaling; small scaling preserves signal (finrl/applications/stock_trading/stock_trading.py:99)
  - Tensorboard logging via BaseCallback, integrates with standard ML tooling for
    training visualization (finrl/agents/stablebaselines3/models.py:34)
  acceptance_hints:
  - Model trains without diverging (loss decreases or stabilizes)
  - Portfolio value doesn't go to zero during training
  - Tensorboard logs are generated in specified directory
  - Model can be saved to disk and reloaded
- id: ensemble_strategy
  name: Ensemble Strategy
  order: 7
  responsibility: 'Rolling window training with validation-based model selection.
    WHY: Markets evolve; periodic retraining + model selection adapts to changing
    regimes.'
  interface:
    inputs:
    - Full dataset, train/val/test periods, rebalance_window
    outputs:
    - Trained ensemble model, trading history DataFrame
  required_methods:
  - name: DRLEnsembleAgent.run_ensemble_strategy
    description: Main ensemble loop that trains multiple models on rolling windows,
      validates each, selects best performer by Sharpe ratio, and trades during test
      period
    evidence: finrl/agents/stablebaselines3/models.py:465(run_ensemble_strategy)
  - name: DRLEnsembleAgent._train_window
    description: Trains each algorithms (A2C, PPO, DDPG) on a single expanding window,
      returning trained models and validation metrics
    evidence: finrl/agents/stablebaselines3/models.py:396(_train_window)
  - name: DRLEnsembleAgent.train
    description: Orchestrates rolling window ensemble training with state transfer
      between windows
    evidence: finrl/agents/stablebaselines3/models.py:579(train)
  key_behaviors:
  - behavior: Expanding window training
    description: Training uses expanding window (accumulates data over time), validated,
      then selects best model, maximizing data usage while preventing overfitting
      to recent history
    evidence: finrl/agents/stablebaselines3/models.py:579(train)
  - behavior: Sharpe ratio model selection
    description: Best model is selected by Sharpe ratio on validation set, balancing
      return and risk for risk-adjusted performance optimization
    evidence: finrl/agents/stablebaselines3/models.py:660(sharpes)
  - behavior: Sequential state transfer
    description: last_state_ensemble is passed between models in run_ensemble_strategy,
      ensuring continuity across windows; parallel training would break this contract
    evidence: models.py:488-489
  - behavior: Adaptive turbulence threshold
    description: Turbulence threshold is 90th percentile of in-sample turbulence vs
      current historical mean, adapting risk threshold to current regime
    evidence: finrl/agents/stablebaselines3/models.py:552
  replaceable_points:
  - name: SelectionMetric
    description: Metric for model selection
    options:
    - name: sharpe_ratio
      traits:
      - Risk-adjusted returns
      - Normalized
      fit_for:
      - General use
      - Risk-aware selection
      not_fit_for:
      - Return maximization
      - Short horizons
    - name: total_return
      traits:
      - Cumulative return
      - Simple
      fit_for:
      - Aggressive growth
      - Long horizons
      not_fit_for:
      - Risk management
      - Volatile markets
    - name: calmar_ratio
      traits:
      - Return/max drawdown
      - Drawdown-aware
      fit_for:
      - Drawdown-sensitive
      - Risk management
      not_fit_for:
      - Simple comparison
    default: sharpe_ratio
  - name: RebalanceFrequency
    description: Days between rebalancing
    options:
    - name: '20'
      traits:
      - Monthly
      - Active trading
      fit_for:
      - Active management
      - High volatility
      not_fit_for:
      - Transaction cost sensitivity
    - name: '63'
      traits:
      - Quarterly
      - Standard
      fit_for:
      - Balanced approach
      - Most users
      not_fit_for:
      - Very active/passive strategies
    - name: '252'
      traits:
      - Annual
      - Low turnover
      fit_for:
      - Long-term investing
      - Cost minimization
      not_fit_for:
      - Adaptive trading
      - Market timing
    default: '63'
  design_decisions:
  - Train on expanding window, validate, select best, trade, maximizing data usage
    while preventing overfitting to recent history (finrl/agents/stablebaselines3/models.py:579)
  - Model selection by Sharpe ratio on validation set, balancing return and risk;
    selected model maximizes risk-adjusted performance (finrl/agents/stablebaselines3/models.py:660)
  - 'Turbulence threshold adaptive: 90th percentile of in-sample vs current historical
    mean, adapts risk threshold to current regime; high turbulence triggers defensive
    selling (finrl/agents/stablebaselines3/models.py:552)'
  acceptance_hints:
  - Ensemble returns summary DataFrame with performance metrics per window
  - Models are saved to disk (not returned directly), requiring reload for subsequent
    use
  - 'Rebalancing occurs at specified intervals (default: 63 days)'
  - Turbulence-based risk management activates during volatile periods
- id: trading_inference
  name: Trading Inference
  order: 8
  responsibility: 'Executes trained models on test/trade data, generating predictions
    and performance metrics. WHY: Converts learned policy to actionable trades and
    performance evaluation.'
  interface:
    inputs:
    - Trained model, trade environment
    outputs:
    - Account value history, action history, trades DataFrame
  required_methods:
  - name: DRLAgent.DRL_prediction
    description: Runs inference on environment using trained model, storing account
      value history, action history, and returning last_state for stateful continuation
      across episodes
    evidence: finrl/agents/stablebaselines3/models.py:156(DRL_prediction)
  - name: DRLAgent.DRL_prediction_load_from_file
    description: Loads trained model from disk file then executes prediction, useful
      for inference without retraining
    evidence: finrl/agents/stablebaselines3/models.py:186(DRL_prediction_load_from_file)
  key_behaviors:
  - behavior: Stateful continuation
    description: last_state is stored and returned for stateful continuation across
      episodes, enabling multi-period simulation with position carryover necessary
      for rolling window trading
    evidence: finrl/agents/stablebaselines3/models.py:347(DRL_prediction)
  - behavior: Complete action history storage
    description: Actions are stored with timestamps for audit/replay, enabling compliance,
      backtesting alternative strategies, and debugging
    evidence: finrl/meta/env_stock_trading/env_stocktrading.py:542(save_action_memory)
  - behavior: Deterministic action mode
    description: Default inference uses deterministic actions (no random sampling),
      providing reproducible results for backtesting
    evidence: finrl/agents/stablebaselines3/models.py:156
  replaceable_points:
  - name: InferenceMode
    description: Deterministic vs stochastic actions
    options:
    - name: deterministic
      traits:
      - Reproducible
      - No exploration
      fit_for:
      - Backtesting
      - Production inference
      not_fit_for:
      - Exploratory analysis
    - name: stochastic
      traits:
      - With exploration noise
      - Varied outputs
      fit_for:
      - Analysis
      - Ensemble diversity
      not_fit_for:
      - Reproducible backtesting
    default: deterministic
  design_decisions:
  - Store last_state for stateful continuation across episodes, enabling multi-period
    simulation with position carryover; necessary for rolling window trading (finrl/agents/stablebaselines3/models.py:347)
  - Actions stored with timestamps for audit/replay, complete action history enables
    compliance, backtesting alternative strategies, and debugging (finrl/meta/env_stock_trading/env_stocktrading.py:542)
  acceptance_hints:
  - Inference produces account value history with timestamps
  - Action history contains each trades with dates and quantities
  - Final portfolio value is reasonable (not zero or infinite)
  - Inference can continue from saved last_state
- id: portfolio_neural_architectures
  name: Portfolio Neural Architectures
  order: 9
  responsibility: 'Specialized neural network architectures for portfolio management.
    WHY: Standard MLPs don''t capture temporal structure and asset correlations in
    portfolio contexts.'
  interface:
    inputs:
    - Observation tensor (features, tickers, time_window), last_action
    outputs:
    - Action logits for portfolio weights
  required_methods:
  - name: EIIE.forward
    description: Forward pass for Ensemble of Identical Independent Evaluators, using
      1D convolution over time dimension per asset with shared weights across assets
    evidence: finrl/agents/portfolio_optimization/architectures.py:13(EIIE)
  - name: EI3.forward
    description: Forward pass for EI3 (Inception-style) with temporal convolutions
      capturing multi-scale temporal patterns in price data
    evidence: finrl/agents/portfolio_optimization/architectures.py:133(EI3)
  - name: GPM.forward
    description: Forward pass for Graph-based Portfolio Management, using GNN to capture
      asset relationships beyond independent evaluation
    evidence: finrl/agents/portfolio_optimization/architectures.py:277(GPM)
  key_behaviors:
  - behavior: 'EIIE: shared weights per asset'
    description: 1D convolution over time dimension per asset with shared weights
      enforces identical evaluation criteria across assets; temporal convolution captures
      price patterns
    evidence: finrl/agents/portfolio_optimization/architectures.py:14(__init__)
  - behavior: Softmax normalization for actions
    description: Every policy network outputs use softmax normalization, ensuring
      portfolio weights sum to 1 and are non-negative; cash weight is ALWAYS index
      0 of action vector
    evidence: finrl/agents/portfolio_optimization/architectures.py:61
  - behavior: Cash bias separate from stock weights
    description: Cash held is distinct from stock allocation; having explicit cash
      weight in softmax simplifies reward calculation and provides clear cash position
    evidence: finrl/agents/portfolio_optimization/architectures.py:117(_process_last_action)
  - behavior: 'GPM: graph neural network for correlations'
    description: Markets have dependency structure (sectors, correlations); GPM captures
      this beyond independent asset evaluation using graph neural networks
    evidence: finrl/agents/portfolio_optimization/architectures.py:277(GPM)
  replaceable_points:
  - name: Architecture
    description: Policy network architecture
    options:
    - name: EIIE
      traits:
      - Simple
      - Shared weights
      - 1D conv
      fit_for:
      - Standard portfolios
      - Baseline
      not_fit_for:
      - Complex correlations
    - name: EI3
      traits:
      - Multi-scale
      - Inception-style
      - Temporal
      fit_for:
      - Short-term patterns
      - High-frequency
      not_fit_for:
      - Long-term portfolios
    - name: GPM
      traits:
      - Graph-based
      - Correlation-aware
      fit_for:
      - Sector portfolios
      - Related assets
      not_fit_for:
      - Independent assets
      - Simple setups
    - name: MLP
      traits:
      - Simple
      - Fast
      fit_for:
      - Flat state
      - Quick prototyping
      not_fit_for:
      - Temporal patterns
      - Portfolio structure
    default: EIIE
  design_decisions:
  - EIIE uses 1D conv over time dimension per asset, shared weights across assets
    enforce identical evaluation criteria; temporal convolution captures price patterns
    (finrl/agents/portfolio_optimization/architectures.py:14)
  - GPM uses graph neural network for asset relationships, markets have dependency
    structure (sectors, correlations); GNN captures this beyond independent asset
    evaluation (finrl/agents/portfolio_optimization/architectures.py:277)
  - Cash bias separate from stock weights, cash held is distinct from stock allocation;
    having explicit cash weight simplifies reward calculation (finrl/agents/portfolio_optimization/architectures.py:117)
  acceptance_hints:
  - Architecture forward pass produces action logits with shape (num_assets + 1,)
    including cash
  - Softmax output sums to 1.0
  - Model can be trained with PolicyGradient algorithm
  - Shared weights enable consistent evaluation across assets
- id: paper_trading
  name: Paper Trading
  order: 10
  responsibility: 'Executes trades with real-time data via brokerage API in paper
    mode. WHY: Validates trained models in production-like environment without financial
    risk.'
  interface:
    inputs:
    - Trained model, real-time data feed, brokerage credentials
    outputs:
    - Trade executions, account state
  required_methods:
  - name: PaperTradingAlpaca.run
    description: Continuous polling loop that waits for market open, fetches real-time
      data, runs inference, and executes trades via Alpaca API
    evidence: finrl/meta/paper_trading/alpaca.py:147(run)
  - name: PaperTradingAlpaca.test_latency
    description: Tests network latency before live trading to establish baseline for
      reliability
    evidence: finrl/meta/paper_trading/alpaca.py:135(test_latency)
  - name: AgentPPO.run
    description: PPO agent execution for live/paper trading with trainable action
      standard deviation
    evidence: finrl/meta/paper_trading/common.py:234(AgentPPO.run)
  - name: Evaluator.get_summary
    description: Evaluates and persists agent performance metrics
    evidence: finrl/meta/paper_trading/common.py:474(Evaluator.get_summary)
  key_behaviors:
  - behavior: Market timing synchronization
    description: Continuous polling loop with awaitMarketOpen synchronization ensures
      actions happen at the right market times
    evidence: finrl/meta/paper_trading/alpaca.py:147(run)
  - behavior: Latency testing before live trading
    description: Network latency can cause missed trades; test_latency establishes
      baseline for reliability before paper trading begins
    evidence: finrl/meta/paper_trading/alpaca.py:135(test_latency)
  - behavior: PPO with learnable action std
    description: PPO agent uses Normal distribution with learnable std_log as nn.Parameter,
      making action variance trainable and affecting exploration vs exploitation balance
    evidence: finrl/meta/paper_trading/common.py:23-24
  - behavior: Soft update for target networks
    description: Soft update (tau parameter) for target networks prevents divergence;
      tau controls update speed (higher = faster adaptation)
    evidence: finrl/meta/paper_trading/common.py:227(soft_update)
  replaceable_points:
  - name: Brokerage
    description: Paper trading brokerage
    options:
    - name: Alpaca
      traits:
      - Commission-free
      - API-first
      - US equities
      fit_for:
      - US stock paper trading
      - API developers
      not_fit_for:
      - Crypto
      - International markets
      - Futures
    default: Alpaca
  design_decisions:
  - Continuous polling loop with awaitMarketOpen synchronization, markets have discrete
    open/close; polling ensures actions happen at right times (finrl/meta/paper_trading/alpaca.py:147)
  - Latency testing before live trading, network latency can cause missed trades;
    testing establishes baseline for reliability (finrl/meta/paper_trading/alpaca.py:135)
  acceptance_hints:
  - Paper trading connects to Alpaca API successfully
  - Trades are executed in paper mode (no real money)
  - Latency test completes within acceptable threshold
  - Account state updates after each trade
data_flow:
- from_stage: external
  to_stage: data_download
  data: ticker_list, start_date, end_date, time_interval (user-specified parameters)
- from_stage: data_download
  to_stage: data_cleaning
  data: Raw OHLCV DataFrame with date, tic, open, high, low, close, volume
- from_stage: data_cleaning
  to_stage: feature_engineering
  data: Clean OHLCV DataFrame aligned to full date-ticker grid with no NaN values
- from_stage: feature_engineering
  to_stage: risk_feature_computation
  data: DataFrame with OHLCV + technical indicators (macd, boll_ub, boll_lb, rsi_30,
    etc.)
- from_stage: risk_feature_computation
  to_stage: environment_setup
  data: Full-featured DataFrame with turbulence/vix risk metrics added
- from_stage: environment_setup
  to_stage: model_training
  data: Initialized gym.Env object with configured state/reward/action spaces
- from_stage: model_training
  to_stage: trading_inference
  data: Trained model weights + last_state for inference
- from_stage: model_training
  to_stage: ensemble_strategy
  data: Model checkpoints per validation window with train/val/test splits
- from_stage: ensemble_strategy
  to_stage: trading_inference
  data: Best model selection per window + rebalance schedule + trained ensemble
- from_stage: portfolio_neural_architectures
  to_stage: model_training
  data: Policy network forward pass during gradient updates for portfolio optimization
- from_stage: trading_inference
  to_stage: external
  data: Account value history, action history, trades DataFrame for analysis
global_contracts:
- contract: Every DataFrames MUST contain date and tic columns as primary keys for
    alignment and lookups (finrl/meta/preprocessor/yahoodownloader.py:16)
  evidence: ''
- contract: State vector index 0 ALWAYS represents cash; stock prices at indices 1
    to stock_dim (env_stocktrading.py:419-420)
  evidence: ''
- contract: 'State space formula: 1 + 2*stock_dim + len(indicators)*stock_dim must
    be maintained for compatibility (finrl/applications/stock_trading/stock_trading.py:83)'
  evidence: ''
- contract: 'Technical indicator columns use stockstats naming convention: macd, boll_ub,
    boll_lb, rsi_30, cci_30, dx_30, close_30_sma, close_60_sma (finrl/config.py:21)'
  evidence: ''
- contract: Every environments inherit from gym.Env and implement step/reset/render
    methods (finrl/meta/env_stock_trading/env_stocktrading.py:19)
  evidence: ''
- contract: get_sb_env() returns tuple of (VecEnv, initial_obs) for Stable-Baselines3
    compatibility (finrl/meta/env_stock_trading/env_stocktrading.py:564)
  evidence: ''
- contract: Every reward functions scale rewards by 1e-4 to prevent gradient explosion
    from large portfolio values (finrl/meta/env_portfolio_optimization/env_portfolio_optimization.py:365)
  evidence: ''
- contract: Transaction costs (buy_cost_pct, sell_cost_pct) are deducted before available
    balance calculation (finrl/meta/env_stock_trading/env_stocktrading.py:189)
  evidence: ''
- contract: Sell operations MUST complete before buy operations in step() to prevent
    cash balance miscalculations (env_stocktrading.py:327-340)
  evidence: ''
- contract: 'Data preprocessing pipeline order is FIXED: clean -> technical_indicators
    -> vix -> turbulence; changing order produces NaN values (preprocessors.py:146-171)'
  evidence: ''
- contract: 'Turbulence threshold triggers forced liquidation: each positions sold
    when turbulence exceeds 90th percentile (env_stocktrading.py:149-174)'
  evidence: ''
- contract: Cash weight is ALWAYS included as first element (index 0) of action vector
    in portfolio optimization (architectures.py:61)
  evidence: ''
- contract: Ensemble strategy requires sequential model training with state transfer
    between models; parallel training breaks continuity (models.py:488-489)
  evidence: ''
business_decisions:
- id: BD-001
  type: B/DK
  content: DataProcessor uses factory pattern to dispatch to specific data source
    processors
  rationale: Factory pattern decouples data source from downstream processing. This
    enables adding new providers without modifying existing code. If this pattern
    were removed, each data source logic would need to be integrated into calling
    code.
  evidence: finrl/meta/data_processor.py:13(DataProcessor.__init__)
  stage: data_download
  alternative_considered: Direct API calls in training script; would require modification
    per data source
- id: BD-002
  type: B/DK
  content: Every data downloaders return unified DataFrame schema with date, tic,
    open, high, low, close, volume columns
  rationale: Unified schema ensures downstream stages (cleaning, feature engineering,
    environment) work identically regardless of data source. Changing the schema would
    require updates across multiple stages.
  evidence: finrl/meta/preprocessor/yahoodownloader.py:36(YahooDownloader.fetch_data)
  stage: data_download
  alternative_considered: Source-specific schemas with adapters; would add complexity
- id: BD-003
  type: BA/DK
  content: Missing price data filled using forward fill then backward fill only at
    series boundaries
  rationale: Forward fill preserves temporal continuity; backward fill only at boundaries
    handles start/end edge cases without using future information. This assumes prices
    don't gap over non-trading days.
  evidence: finrl/meta/data_processors/processor_yahoofinance.py:274(clean_data)
  stage: data_cleaning
  alternative_considered: Drop rows with missing data; would reduce training samples
- id: BD-004
  type: BA/DK
  content: Data expanded to full date-ticker grid then merged, ensuring every ticker
    has data for every trading day
  rationale: 'Batch processing requires aligned tensors; complete grid enables vectorized
    operations. Assumption: delisted/suspended stocks should have last known price
    rather than NaN.'
  evidence: finrl/applications/stock_trading/stock_trading.py:63(module)
  stage: data_cleaning
  alternative_considered: Keep only actively traded dates per ticker; would break
    tensor operations
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrl/applications/stock_trading/stock_trading.py'
- id: BD-005
  type: BA/DK
  content: 'Technical indicators computed via stockstats package: macd, boll_ub, boll_lb,
    rsi_30, cci_30, dx_30, close_30_sma, close_60_sma'
  rationale: Covers momentum (RSI, MACD), volatility (Bollinger Bands), trend (SMA),
    and breadth (CCI, DX). Default list is a reasonable starter set balancing information
    content with dimensionality. Choice reflects assumption that these indicators
    capture most relevant market dynamics.
  evidence: finrl/meta/preprocessor/preprocessors.py:200(add_technical_indicator)
  stage: feature_engineering
  alternative_considered: Price-only features; would lose pattern recognition capabilities
- id: BD-006
  type: M/DK
  content: Turbulence index calculated as Mahalanobis distance of return vector from
    252-day historical distribution
  rationale: 'Mahalanobis distance captures multi-asset correlation breakdown that
    single-factor measures miss. Uses 252-day lookback (1 trading year) for statistical
    significance. Formula: sqrt((r - μ)'' Σ^-1 (r - μ)).'
  evidence: finrl/meta/data_processors/processor_yahoofinance.py:433(calculate_turbulence)
  stage: risk_feature_computation
  alternative_considered: Simple volatility (σ); would miss correlation effects
- id: BD-007
  type: BA/DK
  content: Turbulence threshold at 90th percentile of training turbulence triggers
    forced liquidation
  rationale: 'Data-driven threshold adapts to market characteristics rather than fixed
    cutoff. 90th percentile balances sensitivity (catching high-stress periods) against
    false positives. Assumption: high turbulence predicts continued market stress.'
  evidence: finrl/agents/stablebaselines3/models.py:500(env_stocktrading)
  stage: risk_feature_computation
  alternative_considered: Fixed threshold (e.g., 1.0); less adaptive to different
    market regimes
  _evidence_issues:
  - 'FN_NOT_FOUND: env_stocktrading in finrl/agents/stablebaselines3/models.py'
- id: BD-008
  type: BA
  content: 'State vector format: [cash] + [close_prices] + [num_shares] + [tech_indicators]
    per stock'
  rationale: 'Flat state representation enables simple MLP policies. Every information
    needed for single-step decisions is present. Assumption: agent doesn''t need sequence
    memory beyond current step (handled by recurrent architectures).'
  evidence: finrl/meta/env_stock_trading/env_stocktrading.py:418(_initiate_state)
  stage: environment_setup
  alternative_considered: Sequence-based state (LSTM); would increase complexity
- id: BD-009
  type: B/BA
  content: Actions normalized to hmax shares per stock; sells limited by owned shares,
    buys limited by cash
  rationale: hmax cap prevents extreme positions and bounds action space for stable
    learning. Limiting sells to owned shares prevents shorting by default. These are
    safety constraints that shape achievable strategies.
  evidence: finrl/meta/env_stock_trading/env_stocktrading.py:35(__init__)
  stage: environment_setup
  alternative_considered: Allow shorts with margin; would introduce unlimited loss
    potential
- id: BD-010
  type: RC
  content: Sell operations MUST complete before buy operations in StockTradingEnv.step()
  rationale: Cash balance calculation requires sell proceeds to be available before
    buy cost calculations. This ordering is essential for correct cash tracking when
    same-step sell+buy occurs.
  evidence: finrl/meta/env_stock_trading/env_stocktrading.py:327(module)
  stage: environment_setup
  alternative_considered: None; cash accounting requires this ordering
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrl/meta/env_stock_trading/env_stocktrading.py'
- id: BD-011
  type: RC
  content: State vector index 0 ALWAYS represents cash; stock prices at indices 1
    to stock_dim
  rationale: Index contract ensures each custom environments and analysis tools maintain
    consistent state interpretation. Code downstream expects cash in this exact position.
  evidence: finrl/meta/env_stock_trading/env_stocktrading.py:419(module)
  stage: environment_setup
  alternative_considered: None; would require comprehensive refactoring
  _evidence_issues:
  - 'FN_NOT_FOUND: module in finrl/meta/env_stock_trading/env_stocktrading.py'
- id: BD-012
  type: RC
  content: 'Turbulence threshold triggers forced liquidation: each positions sold
    when turbulence > threshold'
  rationale: Risk management logic depends on automatic sell behavior during market
    stress. This hard rule ensures risk controls are enforced regardless of learned
    policy.
  evidence: finrl/meta/env_stock_trading/env_stocktrading.py:149(174)
  stage: environment_setup
  alternative_considered: Soft risk controls (position limits); less deterministic
  _evidence_issues:
  - 'FN_NOT_FOUND: 174 in finrl/meta/env_stock_trading/env_stocktrading.py'
- id: BD-013
  type: BA/M
  content: reward_scaling = 1e-4 for stock trading to prevent gradient explosion from
    large absolute portfolio values
  rationale: 'Large absolute portfolio values (e.g., $1M) would cause gradient explosion.
    Small scaling preserves signal while normalizing. Assumption: default portfolio
    size of ~$1M is typical.'
  evidence: finrl/applications/stock_trading/stock_trading.py:99(env_stocktrading)
  stage: model_training
  alternative_considered: Dynamic scaling based on portfolio value; would add complexity
  _evidence_issues:
  - 'FN_NOT_FOUND: env_stocktrading in finrl/applications/stock_trading/stock_trading.py'
- id: BD-014
  type: T
  content: 'Wrapper pattern: same DRLAgent interface for Stable-Baselines3, ElegantRL,
    and RLlib backends'
  rationale: Enables algorithm swapping without changing environment or calling code.
    Each backend encapsulated in own module. Changing this to direct implementation
    would require modifications across each calling code.
  evidence: finrl/agents/stablebaselines3/models.py:79(DRLAgent)
  stage: model_training
  alternative_considered: Direct implementation per algorithm; would duplicate code
- id: BD-015
  type: T
  content: Tensorboard logging via BaseCallback for training visualization
  rationale: Integrates with standard ML tooling for training visualization and debugging.
    Standard practice in ML workflows. Does not affect business output.
  evidence: finrl/agents/stablebaselines3/models.py:34(TensorboardCallback)
  stage: model_training
  alternative_considered: Custom logging; would reduce compatibility with standard
    tools
- id: BD-016
  type: BA/M
  content: Training on expanding window with validation-based model selection by Sharpe
    ratio
  rationale: 'Expanding window maximizes data usage; validation prevents overfitting
    to recent history. Sharpe balances return and risk for selection. Assumption:
    future Sharpe resembles past Sharpe.'
  evidence: finrl/agents/stablebaselines3/models.py:579(train)
  stage: ensemble_strategy
  alternative_considered: Rolling window training; would use less data
  _evidence_issues:
  - 'FN_NOT_FOUND: train in finrl/agents/stablebaselines3/models.py'
- id: BD-017
  type: BA/M
  content: run_ensemble_strategy returns summary DataFrame but models saved to disk
