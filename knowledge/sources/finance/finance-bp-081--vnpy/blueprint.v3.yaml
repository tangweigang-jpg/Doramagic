# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-081
name: VeighNa
sop_version: '3.6'
source:
  projects:
  - vnpy
  commit_hash: 3d00af96832366c2343ff23c592a2f744ca6672a
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Multi-factor machine learning quantitative trading strategy development, research, and live
    trading
  description: VeighNa is a Python open-source quantitative trading development framework providing AI-powered
    multi-factor ML strategy development, backtesting, and live trading capabilities for Chinese financial
    markets including stocks, futures, and options.
  prerequisites: Users need Python 3.10+ proficiency, basic understanding of quantitative trading concepts
    (factors, backtesting, order management), Chinese futures/stock market knowledge (SHFE position modes,
    trading hours), and familiarity with machine learning workflows for financial prediction tasks.
  not_suitable_for: International markets outside China (hardcoded trading hours, Chinese character display,
    240-day calendar), high-frequency trading requiring sub-millisecond latency (single-threaded event
    loop), pure classification strategies (LgbModel defaults to MSE regression), and users seeking automated
    strategy generation without factor research.
stages:
- id: event_driven_core
  name: Event-Driven Core
  order: 1
  responsibility: Provides asynchronous event distribution for the entire platform, enabling loose coupling
    between gateways, engines, and UI components. This stage is the nervous system of the entire framework,
    routing typed events to registered handlers without direct component dependencies.
  interface:
    inputs:
    - Event objects with type string and data payload
    outputs:
    - Dispatched events to registered handlers based on event type
  required_methods:
  - name: EventEngine.register
    description: Registers event handler callback for specific event type, allowing components to subscribe
      to market data, order updates, and other system events
    evidence: vnpy/event/engine.py:80(register)
  - name: EventEngine.unregister
    description: Removes previously registered handler to prevent memory leaks and unwanted callbacks
      during component shutdown
    evidence: vnpy/event/engine.py:91(unregister)
  - name: EventEngine.put
    description: Enqueues an event into the processing queue, triggering async dispatch to each registered
      handlers for that event type
    evidence: vnpy/event/engine.py:66(put)
  - name: MainEngine.add_gateway
    description: Dynamically loads trading interface implementations (CTP, IB, etc.) into the platform
      at runtime
    evidence: vnpy/trader/engine.py:102(add_gateway)
  - name: MainEngine.add_app
    description: Dynamically loads application modules (CtaStrategy, PortfolioStrategy, etc.) into the
      platform
    evidence: vnpy/trader/engine.py:120(add_app)
  key_behaviors:
  - behavior: Single-threaded FIFO event processing
    description: Events are processed in strict first-in-first-out order within their type-specific queues.
      A dedicated worker thread dequeues events and dispatches to registered handlers synchronously, which
      prevents race conditions but means slow handlers block subsequent events of the same type.
    evidence: vnpy/event/engine.py:68-74(process),35-36(queues)
  - behavior: Timer-driven periodic task execution
    description: EventEngine starts an interval timer (default 1 second) that generates EVENT_TIMER events,
      allowing components to register time-based callbacks without OS-level timer dependencies. This enables
      polling-based strategies and periodic system checks.
    evidence: 'vnpy/event/engine.py:42(interval: int=1)'
  - behavior: General handlers for cross-cutting concerns
    description: _handlers list receives ALL events regardless of type, enabling logging, performance
      monitoring, and debugging without per-event-type registration. Essential for system-wide observability.
    evidence: 'vnpy/event/engine.py:53(_general_handlers: list)'
  - behavior: Plugin architecture via dynamic import
    description: Gateways and apps are loaded via add_gateway/add_app using import_module, supporting
      vnpy_<name> package convention. New exchanges or strategies can be added without modifying core
      framework code.
    evidence: vnpy/trader/engine.py:102(add_gateway),120(add_app)
  replaceable_points:
  - name: Event processing loop
    description: The _run/_process loop implementation determines threading model for event dispatch
    options:
    - name: single-threaded queue
      traits:
      - Thread-based
      - Synchronous dispatch
      - GIL-bound
      fit_for:
      - Standard trading strategies
      - UI integration
      - Low-to-medium event frequency
      not_fit_for:
      - High-frequency trading
      - CPU-intensive event processing
    - name: multiprocess queue
      traits:
      - Process-based
      - True parallelism
      - Higher overhead
      fit_for:
      - CPU-intensive backtesting
      - Isolated strategy execution
      not_fit_for:
      - UI applications
      - Memory-constrained environments
    - name: asyncio
      traits:
      - Coroutine-based
      - Single-threaded async
      - High concurrency
      fit_for:
      - Network-heavy operations
      - I/O-bound event processing
      not_fit_for:
      - CPU-bound tasks
      - Existing sync codebases
    default: single-threaded queue
  design_decisions:
  - 'Single-threaded event queue with worker thread (evidence: vnpy/event/engine.py:48(_queue: Queue))
    — Avoids race conditions in handler dispatch; simpler than multiprocessing for most trading use cases'
  - 'Timer events every 1 second for polling (evidence: vnpy/event/engine.py:42(interval: int=1)) — Supports
    periodic tasks without OS timer dependencies; default 1s is adequate for trading'
  - 'General handlers for all-event listeners (evidence: vnpy/event/engine.py:53(_general_handlers: list))
    — Allows cross-cutting concerns like logging without per-type registration'
  - 'Plugin architecture via add_gateway/add_app dynamic loading (evidence: vnpy/trader/engine.py:102(add_gateway),120(add_app))
    — New exchanges/strategies added without core changes; requires vnpy_<name> package convention'
  - 'App engine class linked via BaseApp.engine_class attribute (evidence: vnpy/trader/app.py:19(engine_class:
    type["BaseEngine"])) — Enables MainEngine to auto-create engine when app is added; tight coupling
    via naming convention'
  acceptance_hints:
  - Events dispatched within 1ms of put() call under normal load
  - Timer events fire exactly every interval second without drift
  - Every registered handlers receive events for their subscribed types
  - General handlers receive every event regardless of type
  - add_gateway successfully loads vnpy_ctp and connects without errors
  - add_app correctly instantiates engine via engine_class attribute
- id: market_data_gateway
  name: Market Data Gateway
  order: 2
  responsibility: ' Abstracts connectivity to different trading systems (CTP, IB, ESunny, etc.) providing
    unified TickData and BarData streams. This stage isolates the platform from exchange-specific protocols,
    enabling seamless switching between brokers and markets.'
  interface:
    inputs:
    - SubscribeRequest objects specifying symbols/exchanges
    outputs:
    - TickData, BarData, TradeData, OrderData events pushed via EventEngine
  required_methods:
  - name: BaseGateway.subscribe
    description: Subscribes to real-time market data for specified symbols and exchanges, initiating connection
      to exchange backend
    evidence: vnpy/trader/gateway.py:52(subscribe)
  - name: BaseGateway.query_account
    description: Queries current account balance and margin information from the trading backend
    evidence: vnpy/trader/gateway.py:58(query_account)
  - name: BaseGateway.query_position
    description: Queries current position holdings across each subscribed contracts
    evidence: vnpy/trader/gateway.py:61(query_position)
  key_behaviors:
  - behavior: vt_symbol composite key for contract identification
    description: Every contracts use symbol.exchange format (e.g., 'rb2401.SHF') as unique identifier
      across different exchanges. This prevents symbol collisions when trading similar symbols on multiple
      exchanges (e.g., same symbol listed on both DCE and SHFE).
    evidence: 'vnpy/trader/object.py:84(self.vt_symbol: str = f"{self.symbol}.{self.exchange.value}")'
  - behavior: Full orderbook depth with 5-level bid/ask
    description: TickData contains complete market depth snapshot with 5 price levels on each side, enabling
      level-based analysis without additional market depth subscriptions. Critical for market impact estimation
      and liquidity analysis.
    evidence: vnpy/trader/object.py:56-78
  - behavior: Gateway-agnostic data with origin tracing
    description: Every data objects inherit BaseData and carry gateway_name field, enabling debugging
      and audit trails in multi-gateway setups. Users can trace every tick to its source exchange/connection.
    evidence: vnpy/trader/object.py:18(BaseData)
  replaceable_points:
  - name: Gateway implementation
    description: Trading system connectivity layer for different brokers and protocols
    options:
    - name: vnpy_ctp
      traits:
      - CTP protocol
      - Chinese futures
      - Commercial license
      fit_for:
      - Chinese futures markets (SHFE, DCE, CZCE, CFFEX)
      - Production trading
      not_fit_for:
      - Stocks
      - International markets
    - name: vnpy_ib
      traits:
      - IB API
      - Global markets
      - Stocks/Forex/Options
      fit_for:
      - International markets
      - Multi-asset trading
      not_fit_for:
      - Chinese futures
      - High-frequency (IB throttling)
    - name: vnpy_esunny
      traits:
      - ESunny protocol
      - Chinese futures
      - Alternative to CTP
      fit_for:
      - Chinese futures markets
      - Broker-specific features
      not_fit_for:
      - Stocks
      - International markets
    - name: custom
      traits:
      - User-defined
      - Protocol-specific
      fit_for:
      - Proprietary exchanges
      - Custom protocols
      not_fit_for:
      - Standard markets
      - Production without testing
    default: vnpy_ctp
  design_decisions:
  - 'vt_symbol composite key (symbol.exchange) (evidence: vnpy/trader/object.py:84(self.vt_symbol)) —
    Uniquely identifies contracts across different exchanges; avoids symbol collisions'
  - 'Every data objects inherit BaseData with gateway_name (evidence: vnpy/trader/object.py:18(BaseData))
    — Traces data origin for debugging multi-gateway setups; each objects are gateway-agnostic'
  - 'TickData contains full orderbook (5 levels) (evidence: vnpy/trader/object.py:56-78) — Supports level-based
    analysis without additional market depth subscriptions'
  acceptance_hints:
  - Ticks arrive within 100ms of exchange dissemination
  - vt_symbol uniquely identifies each contract across exchanges
  - TickData contains each 5 bid/ask levels
  - gateway_name correctly traces data origin
  - SubscribeRequest successfully initiates data flow for specified symbols
- id: order_management
  name: Order Management System
  order: 3
  responsibility: Tracks orders, trades, positions, and accounts; handles position conversion for exchanges
    with open/close distinction (SHFE net position mode). This stage provides the authoritative source
    of truth for portfolio state, essential for risk management and execution.
  interface:
    inputs:
    - OrderData, TradeData, PositionData events from gateways
    outputs:
    - OrderRequest, CancelRequest to gateways; position summaries to strategies
  required_methods:
  - name: OmsEngine.send_order
    description: Sends order request through configured gateway, tracking order lifecycle from SUBMITTING
      through to terminal states (ALLTRADED, CANCELLED, REJECTED)
    evidence: vnpy/trader/engine.py:339(OmsEngine)
  - name: OmsEngine.cancel_order
    description: Cancels active (pending) orders identified by vt_orderid, updating order status and releasing
      frozen amounts
    evidence: vnpy/trader/engine.py:375(cancel_order)
  - name: OffsetConverter.convert_order_request
    description: Converts user intent (OPEN/CLOSE) into exchange-compliant offset for SHFE gross position
      mode
    evidence: vnpy/trader/converter.py:310(convert_order_request)
  key_behaviors:
  - behavior: Three offset modes for Chinese futures
    description: NONE (non-futures), OPEN, CLOSE (and CLOSETODAY, CLOSEYESTERDAY) modes handle Chinese
      futures requirements where same symbol can have separate today/yesterday position tracking. CLOSETODAY
      vs CLOSEYESTERDAY is critical for day-session rules on SHFE.
    evidence: vnpy/trader/constant.py:23-27
  - behavior: Frozen volume tracking prevents over-trading
    description: calculate_frozen() tracks pending order volume that hasn't filled yet, preventing strategies
      from exceeding available margin. Essential for futures margin calculations and position limit compliance.
    evidence: vnpy/trader/converter.py:112(calculate_frozen)
  - behavior: SHFE lock mode for hedgers
    description: convert_order_request_lock enables bidirectional positions without self-liquidating,
      allowing large hedgers to maintain both long and short positions simultaneously in gross mode.
    evidence: vnpy/trader/converter.py:202(convert_order_request_lock)
  - behavior: Active order status tracking
    description: ACTIVE_STATUSES set (SUBMITTING, NOTTRADED, PARTTRADED) defines orders eligible for cancellation.
      Cancellation logic relies on this set; adding new statuses must update ACTIVE_STATUSES.
    evidence: vnpy/trader/object.py:14(ACTIVE_STATUSES)
  replaceable_points:
  - name: Position mode
    description: How positions are aggregated and tracked across trading sessions
    options:
    - name: gross (long/short separate)
      traits:
      - Separate tracking
      - SHFE compliance
      - Lock mode available
      fit_for:
      - Chinese futures
      - Hedging strategies
      - Large trader position limits
      not_fit_for:
      - Simple single-direction strategies
      - Stock portfolios
    - name: net (offset)
      traits:
      - Offset long/short
      - Simpler tracking
      fit_for:
      - Stock long-only
      - Simple pair trading
      not_fit_for:
      - Futures requiring gross tracking
      - Hedging
    - name: lock (bidirectional)
      traits:
      - Independent long/short
      - No offset
      fit_for:
      - Market makers
      - Statistical arbitrage
      not_fit_for:
      - Position limit-constrained accounts
    default: gross
  design_decisions:
  - 'Three offset modes: NONE, OPEN, CLOSE (and CLOSETODAY/CLOSEYESTERDAY) (evidence: vnpy/trader/constant.py:23-27)
    — Chinese futures require open/close distinction; CLOSETODAY vs CLOSEYESTERDAY handles day-session
    rules'
  - 'Frozen volume tracking per position (evidence: vnpy/trader/converter.py:112(calculate_frozen)) —
    Prevents over-trading when orders are pending; essential for futures margin calculations'
  - 'SHFE lock mode for hedgers (evidence: vnpy/trader/converter.py:202(convert_order_request_lock)) —
    Large traders need bidirectional positions without self-liquidating'
  acceptance_hints:
  - 'Order status transitions follow legal path: SUBMITTING -> NOTTRADED/PARTTRADED -> ALLTRADED/CANCELLED/REJECTED'
  - Frozen amounts correctly release upon order fill or cancellation
  - Position calculations match exchange-provided position data within tolerance
  - SHFE CLOSETODAY vs CLOSEYESTERDAY correctly handles day-session boundaries
- id: alpha_research_data
  name: Alpha Research Data Pipeline
  order: 4
  responsibility: Prepares, filters, and processes financial time-series data for machine learning factor
    research. This stage transforms raw market data into feature-label pairs using expression-based factor
    definitions, enabling rapid factor iteration without code changes.
  interface:
    inputs:
    - Raw BarData loaded from database via AlphaLab
    outputs:
    - Processed DataFrames with features (alpha_101/alpha_158) and labels for model training
  required_methods:
  - name: AlphaDataset.add_feature
    description: Defines factor expression (e.g., 'ts_delay(close, 5)') that maps to polars operations,
      enabling rapid feature iteration
    evidence: vnpy/alpha/dataset/datasets/alpha_101.py:27(add_feature)
  - name: AlphaDataset.process_data
    description: Applies feature expressions and label calculations to produce training-ready DataFrame
    evidence: vnpy/alpha/dataset/template.py:23(AlphaDataset)
  - name: DataProxy operators
    description: Operator overloading (__gt__, __lt__, etc.) enables pandas-like expressions that compile
      to polars operations
    evidence: vnpy/alpha/dataset/utility.py:70(__gt__)
  key_behaviors:
  - behavior: Expression-based feature definitions
    description: Factor expressions (ts_*, cs_*) are defined as strings that map to polars operations,
      enabling rapid factor iteration without code changes. DataProxy wraps column references to enable
      operator overloading in factor expressions.
    evidence: vnpy/alpha/dataset/datasets/alpha_101.py:27(add_feature)
  - behavior: Ternary operators for conditional logic
    description: WorldQuant-style conditional factors require branching logic (quesval/quesval2) implemented
      via DataProxy comparison operators returning polars Int32 expressions instead of Boolean for if_else
      branching.
    evidence: vnpy/alpha/dataset/utility.py:70(__gt__)
  - behavior: Cross-sectional vs time-series operator separation
    description: ts_* operators use rolling window calculations with polars; cs_* operators use groupby
      for cross-sectional rankings and normalizations. Mixing cs_ and ts_ in wrong contexts produces incorrect
      factor values.
    evidence: vnpy/alpha/dataset/ts_function.py:12(ts_delay)
  - behavior: AlphaDataset column structure contract
    description: AlphaDataset requires datetime and vt_symbol as first two columns, features in columns[2:-1],
      and label as last column. Every AlphaModel implementations assume this column structure, so adding/removing/reordering
      columns breaks each models.
    evidence: 'vnpy/alpha/dataset/utility.py:13(self.name: str = df.columns[-1])'
  replaceable_points:
  - name: Factor library
    description: Pre-defined factor definitions for feature engineering
    options:
    - name: Alpha101
      traits:
      - 101 WorldQuant factors
      - Expression-based
      - OHLCV-based
      fit_for:
      - Alpha research prototyping
      - WorldQuant-style factors
      not_fit_for:
      - Non-price data (fundamentals, sentiment)
      - Custom factor formulas
    - name: Alpha158
      traits:
      - 158 Qlib factors
      - Broader feature set
      - Multi-dimensional
      fit_for:
      - Stock market factors
      - Broader feature coverage
      not_fit_for:
      - Futures-specific factors
      - Custom expressions
    - name: custom
      traits:
      - User-defined
      - Flexible
      fit_for:
      - Proprietary factors
      - Non-standard data
      not_fit_for:
      - Rapid prototyping
      - Standard factor libraries
    default: Alpha101
  design_decisions:
  - 'Expression-based feature definitions (evidence: vnpy/alpha/dataset/datasets/alpha_101.py:27(add_feature))
    — Enables rapid factor iteration without code changes; expressions map to polars operations'
  - 'Ternary operators (quesval/quesval2) for conditional logic (evidence: vnpy/alpha/dataset/utility.py:70(__gt__))
    — WorldQuant-style conditional factors require branching logic on DataProxy'
  - 'Cross-sectional vs time-series operators (evidence: vnpy/alpha/dataset/ts_function.py:12(ts_delay))
    — ts_* operators use scipy for rolling window calculations; cs_* operators use polars groupby'
  acceptance_hints:
  - Factor expressions compile without syntax errors
  - ts_* and cs_* operators produce correct results for their respective contexts
  - AlphaDataset DataFrame has correct column structure (datetime, vt_symbol, features..., label)
  - No NaN values in processed features (proper handling of missing data)
  - quesval/quesval2 ternary logic correctly branches on conditions
- id: alpha_modeling
  name: Alpha Modeling
  order: 5
  responsibility: Trains and evaluates machine learning models (LightGBM, MLP, Lasso) on prepared alpha
    factors. This stage provides standardized model interfaces for comparative analysis of different ML
    algorithms on the same feature set.
  interface:
    inputs:
    - AlphaDataset with features and labels
    outputs:
    - Trained model with predict() method; feature importance plots
  required_methods:
  - name: AlphaModel.fit
    description: Trains model on train/valid split with early stopping support, producing internal weights
      for prediction
    evidence: vnpy/alpha/model/template.py:9(AlphaModel)
  - name: AlphaModel.predict
    description: Generates prediction signals (returns) for test/holdout dataset using trained model weights
    evidence: vnpy/alpha/model/template.py:9(AlphaModel)
  - name: AlphaModel.detail
    description: Produces feature importance analysis and model-specific metrics for interpretability
    evidence: vnpy/alpha/model/template.py:9(AlphaModel)
  key_behaviors:
  - behavior: Separate train/valid DataFrames for early stopping
    description: LgbModel trains on TRAIN segment while using VALID segment for early_stopping_rounds,
      preventing overfitting. This is critical for preventing the model from memorizing training data
      patterns.
    evidence: vnpy/alpha/model/models/lgb_model.py:70(Segment.TRAIN, Segment.VALID)
  - behavior: MSE objective for regression
    description: LgbModel defaults to objective='mse', forcing regression mode for predicting returns
      as continuous values. Classification strategies must manually override self.params after __init__.
    evidence: 'vnpy/alpha/model/models/lgb_model.py:41(objective: mse)'
  - behavior: LassoModel merges TRAIN+VALID before training
    description: Unlike LgbModel, LassoModel concatenates TRAIN and VALID segments (deduplicating by datetime+vt_symbol)
      before training. This creates inconsistent fitting semantics across models, making performance comparisons
      misleading.
    evidence: vnpy/alpha/model/models/lasso_model.py:50-56(concat+unique)
  - behavior: Inconsistent feature importance methods
    description: LassoModel uses coef-based importance while MlpModel uses perturbation method (std of
      prediction diff under noise). Comparing importance across models is invalid since they use completely
      different metrics.
    evidence: vnpy/alpha/model/models/mlp_model.py:458-490(_calculate_feature_importance)
  replaceable_points:
  - name: ML algorithm
    description: Model architecture choice for alpha prediction
    options:
    - name: LightGBM
      traits:
      - Gradient boosting
      - Early stopping
      - Handles missing values
      fit_for:
      - Large feature sets
      - Non-linear relationships
      - Production
      not_fit_for:
      - Linear relationships only
      - Interpretability requirements
    - name: MLP (PyTorch)
      traits:
      - Neural network
      - Non-linear
      - Learning rate scheduler
      fit_for:
      - Complex patterns
      - Deep features
      not_fit_for:
      - Small datasets
      - Training time constraints
    - name: Lasso
      traits:
      - Linear
      - L1 regularization
      - Feature selection
      fit_for:
      - Interpretability
      - Sparse solutions
      - Feature selection
      not_fit_for:
      - Non-linear patterns
      - High-cardinality features
    default: LightGBM
  design_decisions:
  - 'Separate train/valid DataFrames for early stopping (evidence: vnpy/alpha/model/models/lgb_model.py:70(Segment.TRAIN,
    Segment.VALID)) — Prevents overfitting; valid set controls early_stopping_rounds'
  - 'MSE objective for regression (evidence: vnpy/alpha/model/models/lgb_model.py:41(objective: mse))
    — Predicting returns as continuous values; not classification'
  - 'Early stopping rounds as hyperparameter (evidence: vnpy/alpha/model/models/lgb_model.py:48(early_stopping_rounds:
    int=50)) — Balances training time vs generalization; 50 rounds is conservative'
  - 'MLP learning_rate=0.001 with ReduceLROnPlateau (evidence: vnpy/alpha/model/models/mlp_model.py:39,125-135(scheduler))
    — MLP may converge to suboptimal local minima; no warmup schedule unlike LgbModel early_stopping'
  acceptance_hints:
  - Model trains without errors on valid train/valid split
  - Early stopping triggers at reasonable epoch (not 0, not max rounds)
  - Predictions are generated for test dataset
  - Feature importance values are non-zero for meaningful features
  - Model detail() produces interpretable output for the specific algorithm
- id: alpha_backtesting
  name: Alpha Strategy Backtesting
  order: 6
  responsibility: Simulates strategy execution with realistic fill modeling, commission, and slippage
    for alpha research. This stage bridges the gap between model predictions and trading performance,
    providing statistical analysis of strategy viability.
  interface:
    inputs:
    - AlphaStrategy with signals, historical BarData, contract settings (size, pricetick, rates)
    outputs:
    - Daily P&L DataFrame, performance statistics, equity curve plots
  required_methods:
  - name: BacktestingEngine.set_parameters
    description: Configures backtest capital, annual_days, commission rates, slippage before strategy
      loading
    evidence: vnpy/alpha/strategy/backtesting.py:70-227(set_parameters)
  - name: BacktestingEngine.add_strategy
    description: Registers AlphaStrategy instance with its parameters for execution
    evidence: vnpy/alpha/strategy/backtesting.py:104-110(add_strategy)
  - name: BacktestingEngine.load_data
    description: Loads historical BarData from database for backtest period
    evidence: vnpy/alpha/strategy/backtesting.py:112-148(load_data)
  - name: BacktestingEngine.run_backtesting
    description: Executes strategy on loaded data with signal-driven bar processing
    evidence: vnpy/alpha/strategy/backtesting.py:150-168(run_backtesting)
  - name: BacktestingEngine.calculate_statistics
    description: Computes performance metrics (Sharpe, max drawdown, annual return) from daily results
    evidence: vnpy/alpha/strategy/backtesting.py:228-393(calculate_statistics)
  key_behaviors:
  - behavior: Mandatory 5-step pipeline execution order
    description: 'BacktestingEngine mandates strict ordering: set_parameters→add_strategy→load_data→run_backtesting→calculate_result→calculate_statistics.
      Calling run_backtesting before load_data crashes; calculate_statistics needs daily_df from calculate_result.'
    evidence: vnpy/alpha/strategy/backtesting.py:70-227(set_parameters),104-110(add_strategy),112-148(load_data),150-168(run_backtesting),170-226(calculate_result),228-393(calculate_statistics)
  - behavior: Signal-driven bar processing for ML strategies
    description: Strategy receives dict of bars keyed by vt_symbol, enabling ML signals that may not align
      with bar boundaries. This differs from traditional bar-driven strategies that process each bar sequentially.
    evidence: vnpy/alpha/strategy/backtesting.py:150(on_bars)
  - behavior: Limit order matching with cross_order
    description: Simulates exchange limit order book; fills when price crosses limit price, providing
      realistic fill modeling for limit-only strategies. Immediate fill for market orders.
    evidence: vnpy/alpha/strategy/backtesting.py:619(cross_order)
  - behavior: Stateful PortfolioDailyResult P&L calculation
    description: calculate_pnl() requires pre_closes and start_poses to flow from previous day to next
      in date-ascending order. Iterating daily_results in wrong order breaks each P&L calculations for
      subsequent days.
    evidence: vnpy/alpha/strategy/backtesting.py:189-199,186-198(pre_closes/start_poses chain)
  - behavior: Chinese market calendar assumption (240 days)
    description: annual_days=240 is hardcoded for Sharpe ratio and annualized return calculations. Using
      same engine for US equities (252) or crypto (365) produces wrong risk-adjusted returns.
    evidence: 'vnpy/alpha/strategy/backtesting.py:78(annual_days: int=240),328-329(Sharpe formula uses
      annual_days)'
  - behavior: Bankruptcy detection zeros each statistics
    description: positive_balance check in calculate_statistics() sets each metrics to zero if any daily
      balance ≤0. A single bad trading day zeros out each return/sharpe metrics instead of flagging bankruptcy.
    evidence: vnpy/alpha/strategy/backtesting.py:258-282(positive_balance check),396-400(nan_to_num)
  replaceable_points:
  - name: Order type
    description: Fill simulation method for backtesting
    options:
    - name: limit (cross_order)
      traits:
      - Realistic fill modeling
      - Price-contingent execution
      fit_for:
      - Low-frequency strategies
      - Order book simulation
      not_fit_for:
      - High-frequency
      - Market-on-close
    - name: market (immediate fill)
      traits:
      - Instant execution
      - No price contingency
      fit_for:
      - High-frequency
      - Equity strategies
      not_fit_for:
      - Limit-heavy strategies
      - Slippage analysis
    - name: VWAP
      traits:
      - Volume-weighted average
      - Realistic for large orders
      fit_for:
      - Institutional strategies
      - Execution analysis
      not_fit_for:
      - Small orders
      - Exact fill price needs
    default: limit
  design_decisions:
  - 'Signal-driven (not bars-driven) for ML strategies (evidence: vnpy/alpha/strategy/backtesting.py:150(on_bars))
    — ML signals may not align with bar boundaries; strategy receives dict of bars'
  - 'Limit order matching with cross_order() (evidence: vnpy/alpha/strategy/backtesting.py:619(cross_order))
    — Simulates exchange limit order book; fills when price crosses limit'
  - 'Commission and slippage per trade (evidence: vnpy/alpha/strategy/strategies/equity_demo_strategy.py:84(turnover
    * self.close_rate)) — Realistic cost modeling; min_commission prevents tiny-order abuse'
  - 'annual_days=240 for Chinese market (evidence: vnpy/alpha/strategy/backtesting.py:78(annual_days:
    int=240)) — Calculates annualized returns assuming 240 trading days; wrong for other markets'
  - 'Default capital 1,000,000 CNY (evidence: vnpy/alpha/strategy/backtesting.py:76(capital: int=1_000_000))
    — Business assumption encoded as default; may not suit each portfolio sizes'
  acceptance_hints:
  - Pipeline executes in correct order without crashes
  - Daily P&L matches manual calculation for sample day
  - Statistics (Sharpe, max drawdown) are mathematically correct
  - Equity curve is monotonically increasing only when profitable
  - Limit order fills only occur when price crosses limit
  - PositionConverter.pre_closes correctly flow across trading days
- id: persistence_layer
  name: Persistence Layer
  order: 7
  responsibility: Stores and retrieves historical market data (bars, ticks) using pluggable database backends.
    This stage ensures data reproducibility for backtesting and provides the foundation for alpha research
    data access.
  interface:
    inputs:
    - BarData/TickData lists, symbol/exchange/interval queries
    outputs:
    - BarData/TickData lists filtered by time range; BarOverview/TickOverview metadata
  required_methods:
  - name: BaseDatabase.save_bar_data
    description: Persists BarData list to storage with timezone conversion to DB_TZ
    evidence: vnpy/trader/database.py:52(BaseDatabase)
  - name: BaseDatabase.load_bar_data
    description: Retrieves BarData filtered by symbol, exchange, interval, and time range
    evidence: vnpy/trader/database.py:52(BaseDatabase)
  - name: AlphaLab.get_bar_data
    description: Alpha research data access with shelve metadata and polars DataFrame storage
    evidence: vnpy/alpha/lab.py:20(AlphaLab)
  key_behaviors:
  - behavior: Lazy database initialization via import_module
    description: Database driver selected by settings configuration; imports driver module at runtime.
      Default falls back to SQLite if specified driver not found, providing graceful degradation.
    evidence: 'vnpy/trader/database.py:152(module: import_module)'
  - behavior: Timezone conversion to DB_TZ on save
    description: Every timestamps converted to DB_TZ before storage, ensuring consistent timestamps across
      distributed systems with different local timezones.
    evidence: vnpy/trader/database.py:17(convert_tz)
  - behavior: AlphaLab hybrid storage (shelve + polars)
    description: Shelve handles key-value metadata (bar overviews, dataset info) while polars DataFrames
      store the actual numerical data. Shelve is simple for metadata; polars is efficient for large numerical
      operations.
    evidence: vnpy/alpha/lab.py:51(save_bar_data)
  - behavior: BarOverview metadata for data discovery
    description: BarOverview provides count, start, end timestamps for available data, enabling efficient
      data discovery without loading full datasets.
    evidence: vnpy/trader/database.py:26(BarOverview)
  replaceable_points:
  - name: Database backend
    description: Storage engine for market data persistence
    options:
    - name: SQLite (default)
      traits:
      - File-based
      - Zero configuration
      - Single-user
      fit_for:
      - Development
      - Small datasets
      - Single-machine backtesting
      not_fit_for:
      - Production
      - Multi-user
      - High-volume tick data
    - name: MongoDB
      traits:
      - Document store
      - Flexible schema
      - Horizontal scaling
      fit_for:
      - Tick data
      - Schema evolution
      - Distributed setups
      not_fit_for:
      - Complex joins
      - ACID requirements
    - name: PostgreSQL
      traits:
      - Relational
      - ACID
      - SQL queries
      fit_for:
      - Production
      - Complex queries
      - Time-series extensions
      not_fit_for:
      - Simple deployments
      - Document workloads
    default: SQLite
  design_decisions:
  - 'Lazy database initialization via import_module (evidence: vnpy/trader/database.py:152(module: import_module))
    — Database driver selected by settings; default to SQLite if not found'
  - 'Timezone conversion to DB_TZ on save (evidence: vnpy/trader/database.py:17(convert_tz)) — Ensures
    consistent timestamps across distributed systems'
  - 'AlphaLab uses shelve for metadata, polars for data (evidence: vnpy/alpha/lab.py:51(save_bar_data))
    — Shelve is simple for key-value metadata; polars is efficient for large numerical DataFrames'
  acceptance_hints:
  - BarData loads correctly for specified symbol/exchange/interval/time_range
  - Timestamps preserved correctly across save/load cycle
  - BarOverview metadata matches actual stored data counts
  - Different database backends produce identical query results
  - AlphaLab correctly manages both metadata and data storage
- id: rpc_communication
  name: RPC Communication
  order: 8
  responsibility: Enables distributed deployment where client and server run in separate processes with
    async pub/sub. This stage supports scaling trading systems across machines for remote execution and
    monitoring.
  interface:
    inputs:
    - Function calls on client; publish data on server
    outputs:
    - Remote function results on client; subscription callbacks with topic+data
  required_methods:
  - name: RpcServer.register
    description: Registers callable functions to be exposed to remote clients
    evidence: vnpy/rpc/server.py:123-127(register)
  - name: RpcServer.start
    description: Starts ZMQ REP/PUB server with heartbeat monitoring (BLOCKING)
    evidence: vnpy/rpc/server.py:42-62(start)
  - name: RpcClient.start
    description: Starts ZMQ REQ/SUB client and connects to server (must be called before proxy calls)
    evidence: vnpy/rpc/client.py:88-110(start)
  - name: RpcClient.callback
    description: Abstract handler for pushed data from server; must be subclassed
    evidence: vnpy/rpc/client.py:152-156(callback)
  key_behaviors:
  - behavior: Dual-socket architecture (REP/PUB)
    description: RpcServer uses REP socket for synchronous request-reply (RPC calls) paired with PUB socket
      for asynchronous data pushes. RpcClient uses REQ socket for calls and SUB socket for subscriptions.
      Mixing causes ZMQ errors.
    evidence: vnpy/rpc/server.py:24-28(sockets),client.py:37-41(sockets)
  - behavior: __getattr__ transparent RPC proxy
    description: Dynamic method proxying via __getattr__ with lru_cache caches proxy methods before connection.
      RpcClient.start() MUST be called before any proxy method calls, otherwise calls fail silently or
      timeout.
    evidence: vnpy/rpc/client.py:56(__getattr__ with lru_cache),88-110(start)
  - behavior: RpcServer.register must precede start
    description: register() must be called before start() which enters blocking run loop. Registering
      after start() adds to dict but run loop never dispatches to new functions.
    evidence: vnpy/rpc/server.py:42-62(start),123-127(register)
  - behavior: Heartbeat detection for cleanup
    description: Separate heartbeat checking detects client disconnections for resource cleanup, preventing
      zombie subscriptions in long-running servers.
    evidence: vnpy/rpc/server.py:129(check_heartbeat)
  - behavior: RpcClient.callback is abstract
    description: callback() raises NotImplementedError; must be subclassed to handle pushed data. Using
      RpcClient directly without subclassing causes on_disconnected to only print (not raise).
    evidence: vnpy/rpc/client.py:152-156(callback)
  replaceable_points:
  - name: Transport protocol
    description: Network communication mechanism for distributed deployment
    options:
    - name: ZMQ (default)
      traits:
      - Low-latency
      - Pub/sub
      - Multiple patterns
      fit_for:
      - Real-time market data
      - High-frequency
      - Local network
      not_fit_for:
      - Cross-datacenter
      - Firewall traversal
    - name: WebSocket
      traits:
      - HTTP-compatible
      - Firewall-friendly
      - Browser support
      fit_for:
      - Web clients
      - Cloud deployments
      - Firewall constraints
      not_fit_for:
      - Low-latency
      - High-frequency
    - name: gRPC
      traits:
      - Protocol buffers
      - HTTP/2
      - Strong typing
      fit_for:
      - Cross-language
      - Contract-first APIs
      not_fit_for:
      - Real-time streaming
      - Simple deployments
    default: ZMQ
  design_decisions:
  - 'ZMQ for transport (not HTTP/grpc) (evidence: vnpy/rpc/server.py:1(zmq)) — Low-latency pub/sub for
    real-time market data; REQ/REP for RPC calls'
  - '__getattr__ for transparent RPC (evidence: vnpy/rpc/client.py:56(__getattr__)) — Dynamic method proxying;
    client.call_server_method() feels like local call'
  - 'Separate heartbeat detection (evidence: vnpy/rpc/server.py:129(check_heartbeat)) — Detects client
    disconnections for cleanup; prevents zombie subscriptions'
  acceptance_hints:
  - RpcServer.register() called before start() without errors
  - RpcClient.start() called before any proxy method calls
  - Remote function calls return correct results
  - Pushed data received in callback override
  - Heartbeat detection correctly identifies disconnected clients
- id: charting_visualization
  name: Charting & Visualization
  order: 9
  responsibility: Renders interactive candlestick charts with volume and cursor overlays using PyQtGraph.
    This stage provides visual analysis tools for real-time market monitoring and strategy signal visualization.
  interface:
    inputs:
    - BarData lists; ChartWidget with plots and items
    outputs:
    - Rendered Qt widget with keyboard navigation and mouse tracking
  required_methods:
  - name: ChartWidget.add_plot
    description: Adds independent plot area with shared x-axis for candle, volume, or indicator display
    evidence: vnpy/chart/widget.py:62(add_plot)
  - name: ChartWidget.update_history
    description: Updates chart with historical BarData list, triggering QPicture cache invalidation
    evidence: vnpy/chart/widget.py:20(ChartWidget)
  - name: CandleItem.load_data
    description: Loads OHLC data for rendering with QPicture caching optimization
    evidence: vnpy/chart/item.py:120(CandleItem)
  key_behaviors:
  - behavior: QPicture caching for bar rendering
    description: _draw_bar_picture() pre-renders bars to QPicture, avoiding full repaint on every paintEvent.
      Redraw only occurs on data update, providing smooth 60fps scrolling.
    evidence: vnpy/chart/item.py:44(_draw_bar_picture)
  - behavior: Multiple independent plots with shared x-axis
    description: Candle and volume rendered as separate plots sharing x-axis for alignment. ChartCursor
      crosshair syncs across each plots, providing consistent cursor info.
    evidence: vnpy/chart/widget.py:62(add_plot)
  - behavior: Keyboard navigation (arrows, +/-)
    description: 'Desktop UX convention: left/right arrows scroll through history, up/down zoom in/out.
      Familiar patterns for traders used to Bloomberg/MT4.'
    evidence: vnpy/chart/widget.py:237(keyPressEvent)
  - behavior: ChartCursor crosshair with info labels
    description: Crosshair displays OHLCV values and strategy signals at cursor position, synced across
      each plots. Essential for precise entry/exit analysis.
    evidence: vnpy/chart/widget.py:324(ChartCursor)
  replaceable_points:
  - name: Chart item types
    description: Visual elements rendered on chart
    options:
    - name: CandleItem
      traits:
      - OHLC rendering
      - QPicture cached
      fit_for:
      - Price analysis
      - Candlestick patterns
      not_fit_for:
      - Line charts
      - Point plots
    - name: VolumeItem
      traits:
      - Volume bars
      - Color-coded
      fit_for:
      - Liquidity analysis
      - Volume-price confirmation
      not_fit_for:
      - Low-liquidity assets
    - name: LineItem
      traits:
      - Simple line
      - Indicator overlay
      fit_for:
      - Moving averages
      - Custom indicators
      not_fit_for:
      - Discrete data
      - Multi-series
    - name: custom
      traits:
      - User-defined
      - Flexible
      fit_for:
      - Special visualizations
      - Custom indicators
      not_fit_for:
      - Standard candlestick analysis
    default: CandleItem + VolumeItem
  design_decisions:
  - 'QPicture caching for bar rendering (evidence: vnpy/chart/item.py:44(_draw_bar_picture)) — Redraw
    only on data update; avoids full repaint on every paintEvent'
  - 'Multiple independent plots with shared x-axis (evidence: vnpy/chart/widget.py:62(add_plot)) — Candle
    and volume as separate plots; cursor syncs across each plots'
  - 'Keyboard navigation (arrows, +/-) (evidence: vnpy/chart/widget.py:237(keyPressEvent)) — Desktop UX
    convention; left/right scrolls, up/down zooms'
  acceptance_hints:
  - Candlestick chart renders without visual artifacts
  - Scrolling is smooth (60fps) during history navigation
  - Volume bars align correctly with candle timestamps
  - Crosshair syncs across each plots at same x position
  - Keyboard navigation (arrows, +/-) works as expected
- id: ui_application
  name: UI Application Layer
  order: 10
  responsibility: Provides Qt-based trading interface with monitors, dialogs, and order entry widgets.
    This stage delivers the primary user-facing interface for manual trading, strategy monitoring, and
    system configuration.
  interface:
    inputs:
    - User actions (clicks, keyboard); EventEngine updates
    outputs:
    - OrderRequest/CancelRequest to MainEngine; display updates via Qt signals
  required_methods:
  - name: MainWindow.createDockWidget
    description: Creates dockable panel for strategy controls, market data, or position monitoring
    evidence: vnpy/trader/ui/mainwindow.py:1(MainWindow)
  - name: BaseMonitor.process_event
    description: Event-driven handler for Tick/Trade/Order updates, inserting or updating table rows
    evidence: vnpy/trader/ui/widget.py:214(insert_new_row)
  - name: OrderMonitor.cancel_all
    description: Batch cancellation of each active orders by iterating active_status set
    evidence: vnpy/trader/ui/widget.py:375(OrderMonitor)
  key_behaviors:
  - behavior: Dock-based layout for modular panels
    description: Users can rearrange, minimize, and float panels for multi-monitor setups. Essential for
      traders with multiple screens requiring simultaneous visibility of different data streams.
    evidence: vnpy/trader/ui/mainwindow.py:1(MainWindow)
  - behavior: Event-driven row insertion/update
    description: Monitors subscribe to EventEngine updates and dynamically insert/update table rows. Monitors
      stay in sync with live data without polling, ensuring low-latency display updates.
    evidence: vnpy/trader/ui/widget.py:214(insert_new_row)
  - behavior: Color-coded direction (red=long, green=short)
    description: 'Trading convention: long positions/orders displayed in red, short in green. Immediate
      visual feedback on position direction without reading text labels.'
    evidence: vnpy/trader/ui/widget.py:41(COLOR_LONG = red)
  - behavior: Direction enum uses Chinese characters (多/空)
    description: Direction enum uses Chinese characters as display values for Chinese market convention.
      Requires locale override for international use.
    evidence: vnpy/trader/constant.py:14(LONG = _("多"))
  replaceable_points:
  - name: Display theme
    description: Color scheme and visual style
    options:
    - name: default (red/green)
      traits:
      - Red long
      - Green short
      - Chinese convention
      fit_for:
      - Chinese markets
      - Standard trading
      not_fit_for:
      - International markets
      - Color-blind users
    - name: custom
      traits:
      - User-defined
      - Accessible colors
      fit_for:
      - Branding
      - Accessibility
      - International markets
      not_fit_for:
      - Default Chinese convention
    default: default
  design_decisions:
  - 'Dock-based layout for modular panels (evidence: vnpy/trader/ui/mainwindow.py:1(MainWindow)) — Users
    rearrange panels; essential for multi-monitor setups'
  - 'Event-driven row insertion/update (evidence: vnpy/trader/ui/widget.py:214(insert_new_row)) — Monitors
    stay in sync with live data without polling'
  - 'Color-coded direction (red=long, green=short) (evidence: vnpy/trader/ui/widget.py:41(COLOR_LONG =
    red)) — Trading convention; immediate visual feedback on position direction'
  acceptance_hints:
  - Every dock widgets render correctly without overlap
  - Monitor tables update within 100ms of event
  - Order cancellation propagates to OMS and gateway
  - Direction colors match Chinese trading convention
  - Keyboard shortcuts functional across each widgets
data_flow:
- from_stage: market_data_gateway
  to_stage: order_management
  data: TickData, TradeData, OrderData events via EventEngine
- from_stage: market_data_gateway
  to_stage: charting_visualization
  data: BarData updates for chart refresh
- from_stage: order_management
  to_stage: market_data_gateway
  data: OrderRequest, CancelRequest
- from_stage: persistence_layer
  to_stage: alpha_research_data
  data: Historical BarData via AlphaLab
- from_stage: alpha_research_data
  to_stage: alpha_modeling
  data: Processed AlphaDataset with features (DataFrame with datetime, vt_symbol, features, label columns)
- from_stage: alpha_modeling
  to_stage: alpha_backtesting
  data: Prediction signals (pl.DataFrame with vt_symbol/datetime/signal)
- from_stage: alpha_backtesting
  to_stage: ui_application
  data: Performance statistics (Sharpe, max drawdown, annual return) for display
- from_stage: event_driven_core
  to_stage: ui_application
  data: EVENT_TICK, EVENT_TRADE, EVENT_ORDER for monitor updates
- from_stage: rpc_communication
  to_stage: order_management
  data: Remote order requests via RpcClient/RpcServer proxy
- from_stage: persistence_layer
  to_stage: charting_visualization
  data: Historical bars loaded from database for display
- from_stage: event_driven_core
  to_stage: order_management
  data: Timer events for position settlement and risk checks
- from_stage: event_driven_core
  to_stage: market_data_gateway
  data: Timer events for connection health checks
global_contracts:
- contract: Every market data objects use vt_symbol (symbol.exchange.value) as composite key
  evidence: 'vnpy/trader/object.py:84(self.vt_symbol: str = f"{self.symbol}.{self.exchange.value}")'
- contract: Every BaseData subclasses require gateway_name for source tracing
  evidence: 'vnpy/trader/object.py:24(gateway_name: str)'
- contract: BarData interval must be one of Interval enum values (1min, 5min, 15min, 30min, 1hour, daily,
    weekly)
  evidence: vnpy/trader/constant.py:142(Interval enum)
- contract: AlphaDataset requires datetime and vt_symbol as first two columns, features in columns[2:-1],
    and label as last column
  evidence: 'vnpy/alpha/dataset/utility.py:13(self.name: str = df.columns[-1])'
- contract: Offset.NONE used for non-futures products; OPEN/CLOSE for futures (CLOSETODAY/CLOSEYESTERDAY
    for SHFE)
  evidence: vnpy/trader/constant.py:23(NONE = ""),24(OPEN),25(CLOSE)
- contract: 'Order status transitions: SUBMITTING -> NOTTRADED/PARTTRADED -> ALLTRADED/CANCELLED/REJECTED'
  evidence: vnpy/trader/object.py:14(ACTIVE_STATUSES = set([Status.SUBMITTING, Status.NOTTRADED, Status.PARTTRADED]))
- contract: 'BacktestingEngine pipeline order: set_parameters → add_strategy → load_data → run_backtesting
    → calculate_result → calculate_statistics'
  evidence: vnpy/alpha/strategy/backtesting.py:70-227(set_parameters),104-110(add_strategy),112-148(load_data),150-168(run_backtesting),170-226(calculate_result),228-393(calculate_statistics)
- contract: RpcServer.register() must be called before start(); RpcClient.start() must be called before
    proxy method calls
  evidence: vnpy/rpc/server.py:42-62(start),123-127(register); vnpy/rpc/client.py:55-86(__getattr__ with
    lru_cache),88-110(start)
- contract: PortfolioDailyResult.calculate_pnl() requires date-ascending iteration for pre_closes/start_poses
    chain
  evidence: vnpy/alpha/strategy/backtesting.py:189-199,186-198(pre_closes/start_poses chain)
- contract: EventEngine processes events in strict FIFO per type queue with synchronous listener dispatch
  evidence: vnpy/event/engine.py:68-74(process),35-36(queues)
- contract: BacktestingEngine annual_days=240 for Chinese market calendar in Sharpe/annualized calculations
  evidence: 'vnpy/alpha/strategy/backtesting.py:78(annual_days: int=240),328-329(Sharpe formula)'
- contract: 'Direction enum values: LONG=多 (Chinese), SHORT=空 for trading convention display'
  evidence: vnpy/trader/constant.py:14(LONG = _("多"))
business_decisions:
- id: BD-001
  type: B/BA
  content: Use SQLite as default database when specified driver not found
  rationale: Provides graceful degradation when database drivers are unavailable, ensuring the trading
    system can still operate with local SQLite storage without crashing or requiring manual configuration.
    Fallback boundary is the entire application lifecycle when primary database connection fails.
  evidence: vnpy/trader/database.py:155(module)
  stage: market_data_gateway
  alternative_considered: Fail fast with explicit error message requiring manual driver installation
  _evidence_issues:
  - 'FN_NOT_FOUND: module in vnpy/trader/database.py'
- id: BD-002
  type: B
  content: Use multiprocessing.Process for server processes in no_ui trading
  rationale: Ensures complete process isolation between main trading engine and child server processes,
    preventing shared state corruption. Boundary is the no_ui trading mode execution scope where GUI components
    are unavailable.
  evidence: examples/no_ui/run.py:111(module)
  stage: execution_mode
  alternative_considered: Threading for lower memory overhead but risking GIL contention
  _evidence_issues:
  - 'FN_NOT_FOUND: module in examples/no_ui/run.py'
- id: BD-003
  type: B/DK
  content: 'Chinese futures trading period: day 8:45-15:00, night 20:45-02:45'
  rationale: Defines official trading windows for Chinese futures markets including pre-open and after-hours
    sessions. Boundary covers each Chinese exchange products traded through CtpGateway, ensuring orders
    only execute within valid market hours.
  evidence: examples/no_ui/run.py:34-38(module)
  stage: market_data_gateway
  alternative_considered: Per-exchange configurable hours for flexibility with other markets
  _evidence_issues:
  - 'FN_NOT_FOUND: module in examples/no_ui/run.py'
- id: BD-004
  type: B/DK
  content: Start child process only during trading periods
  rationale: Conserves system resources by only running trading processes when markets are active. Boundary
    is the trading period window defined by exchange hours, preventing unnecessary process overhead during
    off-hours.
  evidence: examples/no_ui/run.py:109-113(module)
  stage: execution_control
  alternative_considered: Always-on process with passive monitoring for pre-market setups
  _evidence_issues:
  - 'FN_NOT_FOUND: module in examples/no_ui/run.py'
- id: BD-005
  type: B/BA
  content: Use CtpGateway as primary gateway in veighna_trader example
  rationale: CtpGateway provides access to CTP protocol exchanges which dominate Chinese futures trading.
    Boundary is the example configuration scope, establishing a sensible default for new users entering
    Chinese markets.
  evidence: examples/veighna_trader/run.py:6(module)
  stage: market_data_gateway
  alternative_considered: IB gateway for global markets or empty gateway requiring manual selection
  _evidence_issues:
  - 'FN_NOT_FOUND: module in examples/veighna_trader/run.py'
- id: BD-006
  type: B/BA
  content: Use CtaStrategyApp and CtaBacktesterApp as default apps
  rationale: CTA strategy and backtesting are the primary use cases for the platform. Boundary covers
    the standard veighna_trader installation, ensuring users have essential tools for algorithmic trading
    immediately after setup.
  evidence: examples/veighna_trader/run.py:22-23(module)
  stage: app_selection
  alternative_considered: Modular installation allowing users to select specific apps
  _evidence_issues:
  - 'FN_NOT_FOUND: module in examples/veighna_trader/run.py'
- id: BD-007
  type: B/BA
  content: Use 1 million RMB default capital for backtesting
  rationale: Provides sufficient capital for meaningful backtest results while being realistic for retail
    traders in Chinese markets. Boundary is the initial capital setting before strategy optimization,
    ensuring consistent baseline across tests.
  evidence: vnpy/alpha/strategy/backtesting.py:76(module)
  stage: capital_setup
  alternative_considered: Zero or infinite capital for edge case testing
  _evidence_issues:
  - 'FN_NOT_FOUND: module in vnpy/alpha/strategy/backtesting.py'
- id: BD-008
  type: B/DK
  content: Use 240 trading days for annualization
  rationale: 240 days is the standard trading day count for Chinese stock and futures markets excluding
    weekends and holidays. Boundary is the annualization calculation in performance metrics, enabling
    accurate yearly return projections.
  evidence: vnpy/alpha/strategy/backtesting.py:78(module)
  stage: performance_calculation
  alternative_considered: 252 days (US market standard) or 365 days (calendar days)
  _evidence_issues:
  - 'FN_NOT_FOUND: module in vnpy/alpha/strategy/backtesting.py'
- id: BD-009
  type: B/BA
  content: Default risk-free rate is 0 for Sharpe ratio calculation
  rationale: Zero risk-free rate simplifies Sharpe ratio calculation and is reasonable for short-term
    futures trading where margin requirements make cash alternatives irrelevant. Boundary is the Sharpe
    ratio calculation during backtest analysis.
  evidence: vnpy/alpha/strategy/backtesting.py:77(module)
  stage: performance_calculation
  alternative_considered: Bank deposit rates or bond yields as risk-free benchmark
  _evidence_issues:
  - 'FN_NOT_FOUND: module in vnpy/alpha/strategy/backtesting.py'
