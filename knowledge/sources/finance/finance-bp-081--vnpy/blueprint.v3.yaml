- id: BD-054
  type: B/BA
  content: Cross-sectional rank normalization transforming to approximate N(0,1)
  rationale: 'Rank normalization converts factor values to their percentile rank within each cross-section,
    making the distribution uniform by design. The subsequent transformation to approximate N(0,1) preserves
    ordinal information while restoring familiar statistical properties for model training. This approach
    is robust to outliers and non-linear transformations, making it suitable for highly skewed factor
    distributions. Boundary: loses information about absolute factor magnitude.'
