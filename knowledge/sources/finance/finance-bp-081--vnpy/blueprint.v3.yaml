replaceable_slots:
- id: slot-001
  name: market_data_provider
  description: 'Choose based on: (1) Asset class needed, (2) Whether real-time or historical-only, (3)
    Budget constraints, (4) Geographic market focus'
  used_in_stages: []
  options:
  - name: RQData (RiceQuant)
    traits:
    - real-time
    - historical
    - china_a_shares
    - futures
    - options
    - commercial
    fit_for:
    - Professional quantitative research with comprehensive China market coverage
    not_fit_for:
    - Free usage, non-Chinese markets, high-frequency tick data
  - name: XtQuant
    traits:
    - real-time
    - historical
    - china_a_shares
    - convertible_bonds
    - commercial
    fit_for:
    - Users with existing XunTou terminal license
    not_fit_for:
    - Free usage, pure futures trading
  - name: TuShare
    traits:
    - free_tier
    - historical
    - china_a_shares
    - fundamentals
    fit_for:
    - Budget-conscious researchers, historical data analysis
    not_fit_for:
    - Real-time trading, professional trading
  - name: SimNow (CTP)
    traits:
    - real-time
    - futures
    - options
    - simulation
    fit_for:
    - Futures/options trading, strategy development and testing
    not_fit_for:
    - Stock trading, production without broker
  - name: Polygon
    traits:
    - global_markets
    - real-time
    - historical
    - us_stocks
    fit_for:
    - International markets, US stocks and options
    not_fit_for:
    - China markets
  - name: Interactive Brokers
    traits:
    - global_markets
    - real-time
    - futures
    - options
    - forex
    fit_for:
    - Global multi-asset trading with single account
    not_fit_for:
    - China markets, fixed income
  default: SimNow (CTP) for futures, RQData for stocks
  _source: worker_resource
- id: slot-002
  name: database_backend
  description: 'Choose based on: (1) Data volume (SQLite < 10M records), (2) Concurrent access needs,
    (3) Query complexity, (4) Operational complexity tolerance'
  used_in_stages: []
  options:
  - name: SQLite
    traits:
    - embedded
    - zero_config
    - single_file
    fit_for:
    - Beginners, small datasets, portable deployments
    not_fit_for:
    - High-volume data, concurrent access, production
  - name: MySQL
    traits:
    - relational
    - client_server
    - widely_supported
    fit_for:
    - Production systems, shared data access
    not_fit_for:
    - High-frequency tick data, simple setups
  - name: PostgreSQL
    traits:
    - relational
    - advanced_features
    - extensible
    fit_for:
    - Complex queries, time-series optimizations, production
    not_fit_for:
    - Simple setups, beginners
  - name: TDengine
    traits:
    - time_series
    - high_performance
    - sql_compatible
    fit_for:
    - High-frequency tick data, real-time analytics
    not_fit_for:
    - Simple deployments, small datasets
  - name: MongoDB
    traits:
    - document_store
    - flexible_schema
    - in_memory_cache
    fit_for:
    - Flexible data structures, rapid prototyping
    not_fit_for:
    - Relational queries, SQL-based analysis
  - name: DolphinDB
    traits:
    - time_series
    - high_performance
    - analytical
    fit_for:
    - Low-latency trading, real-time analytics, large datasets
    not_fit_for:
    - Simple setups, general-purpose use
  default: SQLite
  _source: worker_resource
- id: slot-003
  name: trading_gateway
  description: 'Choose based on: (1) Asset class (futures vs stocks), (2) Broker compatibility, (3) Geographic
    market, (4) API familiarity'
  used_in_stages: []
  options:
