- id: BD-052
  type: B/BA
  content: Cross-sectional Z-score normalization
  rationale: 'Z-score normalization enables direct comparison of heterogeneous factor values by standardizing
    to mean=0 and std=1 within each cross-sectional snapshot. This decision is fundamental for ML models
    that assume features are on similar scales. The cross-sectional approach ensures factors are ranked
    relative to peers on the same day, capturing relative value rather than absolute magnitude. Boundary:
    assumes factors follow approximately normal distributions within the cross-section.'
  evidence: vnpy/alpha/dataset/processor.py:77(process_robust_zscore_norm)
  stage: vnpy.alpha.dataset.processor
  alternative_considered: Quantile transformation to uniform/normal distribution
- id: BD-053
  type: B/DK
  content: Global robust z-score normalization with time-windowed fitting
  rationale: Global z-score differs from cross-sectional by computing statistics across time rather than
    across assets on each day. The time-windowed fitting (rolling window) prevents look-ahead bias while
    capturing evolving factor characteristics. This is essential for factors whose distributions drift
    over time due to market regime changes. The window size defines the memory of the normalization—too
    short loses stability, too long introduces stale statistics.
  evidence: vnpy/alpha/dataset/processor.py:77-109(global_robust_zscore)
  stage: vnpy.alpha.dataset.processor
  alternative_considered: Exponentially weighted windows, full historical fitting
  _evidence_issues:
