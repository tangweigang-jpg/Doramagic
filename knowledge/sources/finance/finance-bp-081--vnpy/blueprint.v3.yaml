- id: BD-GAP-002
  type: BA/DK
  content: Temporal train/valid/test split periods passed as string tuples instead of date objects or
    config files
  rationale: String format provides serialization simplicity and CLI-friendly period specification; breaks
    when period boundaries require complex business calendar logic or when periods span non-contiguous
    ranges
  evidence: vnpy/alpha/dataset/datasets/alpha_158.py:9(__init__)
  stage: Design
