- id: BD-GAP-003
  type: B
  content: Chart rendering uses QPicture caching for item redraw instead of immediate repaint
  rationale: QPicture serialization to QPainter enables efficient repaints by caching pre-rendered graphics;
    breaks under very large datasets where caching memory overhead exceeds redraw cost, or when sub-bar
    precision updates are needed
  evidence: vnpy/chart/item.py:137(_draw_item_picture)
  stage: Architecture
  alternative_considered: Immediate paint (lower memory), Vulkan/OpenGL acceleration (higher complexity)
- id: BD-GAP-004
  type: B/BA
  content: BarManager maintains dual index mapping (sequential integer ↔ datetime) for bar access
  rationale: Separates display index from temporal index to handle irregular bar spacing and enable O(1)
    datetime lookups; breaks when bars arrive out-of-order or duplicate timestamps exist without explicit
    disambiguation
  evidence: vnpy/chart/manager.py:63(get_index)
  stage: Design
  alternative_considered: Pure datetime index (simpler but slower lookups), (timestamp, sequence) tuples
    (handles duplicates)
