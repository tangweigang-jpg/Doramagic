  rationale: The RpcClient uses lru_cache on __getattr__ to cache proxy method references. If proxy methods
    are called before start() establishes the ZMQ connection, the cached proxy objects attempt to send
    over an uninitialized socket, causing ZMQ errors (ENOTSOCK). The start() method initializes the ZMQ
    context and connects sockets, enabling proper message routing. This is a critical initialization ordering
    constraint that prevents runtime socket errors.
