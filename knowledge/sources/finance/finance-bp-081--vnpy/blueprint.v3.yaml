  rationale: The RpcServer.start() method enters an infinite blocking loop that processes incoming RPC
    requests. If register() is called after start(), the registered handlers are never invoked because
    the server is already running and the registration code is unreachable. Every service handlers (functions
    exposed via RPC) must be registered before the blocking run loop begins. This is a fundamental initialization
    ordering constraint.
