  type: B/BA
  content: Drawdown calculation as current balance minus running maximum
  rationale: 'Drawdown measurement using running maximum establishes the peak-to-trough decline for the
    portfolio at any point in time. This is the primary risk measure for understanding worst-case historical
    losses and setting stop-loss thresholds. The business decision to use running maximum (not rolling
    window) ensures drawdowns persist until new highs are achieved. Boundary: drawdown calculation is
    path-dependent and cannot be decomposed additively.'
