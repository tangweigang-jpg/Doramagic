replaceable_slots:
- id: slot-001
  name: transition_data_input
  description: Choose based on data size, integration requirements, and existing infrastructure
  used_in_stages: []
  options:
  - name: CSV files
    traits:
    - local_file
    - tabular
    - human_readable
    fit_for:
    - Standard use cases, small to medium datasets (< 1M rows), prototyping
    not_fit_for:
    - Very large datasets, streaming data, real-time ingestion
  - name: JSON files
    traits:
    - local_file
    - nested_structure
    - web_compatible
    fit_for:
    - Complex hierarchical data, API responses, web integrations
    not_fit_for:
    - Very large datasets, computational efficiency
  - name: Python DataFrame
    traits:
    - in_memory
    - programmatic
    - flexible_schema
    fit_for:
    - Dynamic data sources, in-memory transformations, integration with ML pipelines
    not_fit_for:
    - Large datasets exceeding memory, persistent storage needs
  - name: NumPy array
    traits:
    - in_memory
    - efficient
    - low_level
    fit_for:
    - Performance-critical applications, custom computations, integration with C/Fortran
    not_fit_for:
    - Tabular data with mixed types, metadata-rich datasets
  - name: Database (via pandas read_sql)
    traits:
    - persistent
    - queryable
    - relational
    fit_for:
    - Large enterprise datasets, complex queries, multi-user access
    not_fit_for:
    - Simple workflows, local-only usage, quick prototyping
  - name: Apache Parquet
    traits:
    - columnar
    - compressed
    - distributed_compatible
    fit_for:
    - Large analytical datasets, Spark/Dask integration, cloud storage
    not_fit_for:
    - Small datasets, row-based access patterns
  default: CSV files
  _source: worker_resource
- id: slot-002
  name: visualization_backend
  description: Use matplotlib for static reports; plotly for interactive web-based dashboards
  used_in_stages: []
  options:
  - name: matplotlib
    traits:
    - static_images
    - publication_quality
    - widely_supported
    fit_for:
    - Standard 2D plots, publication-quality figures, cross-platform compatibility
    not_fit_for:
    - Interactive visualizations, web applications, 3D plots
  - name: plotly
    traits:
    - interactive
    - web_exportable
    - 3d_support
    fit_for:
    - Dashboards, web applications, interactive exploration
    not_fit_for:
    - Publication-quality static images, offline reports
  - name: seaborn
    traits:
    - statistical_plots
    - matplotlib_based
    - aesthetics
    fit_for:
    - Statistical visualizations, attractive default styles
    not_fit_for:
    - Custom visualizations, non-standard chart types
  default: matplotlib
  _source: worker_resource
- id: slot-003
  name: linear_algebra_backend
  description: Use SciPy sparse for state spaces > 1000 states with sparse transition matrices
  used_in_stages: []
  options:
  - name: NumPy (default)
    traits:
    - cpu_bound
    - blas_accelerated
    - standard
    fit_for:
    - Most use cases, standard transition matrix operations
    not_fit_for:
    - Very large matrices (>10K states), GPU acceleration needs
  - name: SciPy sparse matrices
    traits:
    - memory_efficient
    - large_systems
    fit_for:
    - Very large state spaces with sparse transitions
    not_fit_for:
    - Small dense matrices, operations without sparse support
  default: NumPy
