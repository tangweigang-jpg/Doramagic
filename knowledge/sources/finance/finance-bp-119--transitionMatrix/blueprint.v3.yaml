- id: BD-021
  type: B/BA
  content: CreditCurve inherits from np.matrix
  rationale: Credit curves represent time-series per rating; matrix format (rows=raters, cols=periods)
    enables vectorized operations across ratings and tenors. This structure supports efficient computation
