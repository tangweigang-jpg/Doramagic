- id: BD-023
  type: B/BA
  content: Default 2x2 identity matrix created when no values provided
  rationale: An identity matrix serves as a neutral starting point for transition probability calculations,
    ensuring no state changes occur by default. The 2x2 dimension establishes the minimal viable matrix
    for binary state systems, with the boundary that users must explicitly provide data for larger state
    spaces.
  evidence: transitionMatrix/model.py:58(__new__)
  stage: Initialization
  alternative_considered: Raising an exception when no data provided would break backward compatibility
- id: BD-024
  type: B/BA
  content: Validation accuracy threshold set to 1e-3 (0.001)
  rationale: The 1e-3 threshold balances numerical precision requirements with floating-point tolerance
    for probability constraints. This boundary ensures rowsum deviations exceeding 0.1% are flagged as
    invalid while accommodating standard double-precision rounding errors in matrix operations.
  evidence: transitionMatrix/model.py:521(validate)
  stage: Validation
  alternative_considered: Stricter 1e-6 threshold would reject valid matrices with accumulated rounding
- id: BD-025
  type: B/BA
  content: Goodman method with alpha=0.05 as default CI estimation
  rationale: The 95% confidence interval (alpha=0.05) is the industry standard for statistical estimation,
    providing a 1-in-20 probability threshold for rejecting the null hypothesis. This boundary means CI
    calculations will use standard normal quantiles unless explicitly overridden.
  evidence: transitionMatrix/estimators/cohort_estimator.py:32(__init__)
  stage: matrix_estimation
  alternative_considered: 90% CI (alpha=0.10) would be wider and less conservative
- id: BD-026
  type: B/BA
  content: Highest index state (dimension-1) treated as absorbing/Default
  rationale: The convention that the highest-indexed state is absorbing aligns with S&P/Moody's rating
    conventions where 'D' (Default) occupies the terminal position. This boundary means any state at index
    (n-1) is automatically treated as an absorbing state for credit curve generation.
  evidence: transitionMatrix/model.py:653(default_curves)
  stage: credit_curves
  alternative_considered: Explicit absorbing state flag would require API changes
- id: BD-027
  type: B/BA
  content: Equal interval cohort binning dividing temporal range
  rationale: Equal-interval binning provides uniform temporal granularity across the observation window,
    simplifying downstream statistical analysis. The boundary means cohort boundaries are placed at regular
    intervals regardless of data density, which may cause sparse cohorts at extremes.
  evidence: transitionMatrix/utils/preprocessing.py:131(generate_cohort_bounds)
  stage: data_preprocessing
  alternative_considered: Quantile-based binning would equalize counts but complicate temporal interpretation
- id: BD-028
  type: B/BA
  content: Last observation assigned to cohort interval (not first/average)
  rationale: Assigning last observations to their cohort interval follows the convention that cohort membership
    is determined by the observation endpoint. This boundary ensures each observation is assigned to the
    most recent completed interval, avoiding boundary ambiguities in right-censored survival data.
  evidence: transitionMatrix/utils/preprocessing.py:241(bin_timestamps)
  stage: data_preprocessing
  alternative_considered: First-observation assignment would shift cohort membership earlier
- id: BD-029
  type: B/BA
  content: NR state redistribution uses noninformative proportional method
  rationale: Noninformative proportional redistribution treats each observed states equally when removing
    non-rated states, avoiding subjective weight choices. The boundary means NR probabilities are distributed
    proportionally to existing state weights without introducing additional assumptions.
  evidence: transitionMatrix/model.py:559(remove)
  stage: Postprocessing
  alternative_considered: Uniform redistribution would ignore observed migration patterns
- id: BD-030
  type: B/BA
  content: Incremental temporal type as default for TransitionMatrixSet
  rationale: Incremental matrices represent single-period transitions, which is the fundamental building
    block for multi-period analysis. This default boundary means users working with cumulative matrices
    must explicitly specify temporal_type='cumulative'.
  evidence: transitionMatrix/model.py:710(__init__)
  stage: Initialization
  alternative_considered: Cumulative default would require explicit division for single-period analysis
- id: BD-031
  type: B/BA
  content: Matrix power method for cumulative multi-period generation
  rationale: Matrix exponentiation via power method enables generating multi-period transition matrices
    from single-period estimates under the Markov assumption. The boundary is that this method assumes
    time-homogeneity unless separate matrices are provided for each period.
  evidence: transitionMatrix/model.py:710(__init__)
  stage: Modeling
  alternative_considered: Eigenvalue decomposition would be faster but less numerically stable
- id: BD-032
  type: B
  content: Negative rates zeroed and added to diagonal max element
  rationale: Negative transition rates are mathematically invalid but commonly arise from estimation noise;
    adding them to the largest diagonal maintains row-sum constraint while preserving relative magnitudes.
    The boundary means this correction only applies to off-diagonal negative values.
  evidence: transitionMatrix/model.py:170(fix_negativerates)
  stage: Correction
  alternative_considered: Setting negatives to zero would violate row-sum constraint
- id: BD-033
  type: B/BA
  content: Initial entity state uniformly distributed across each states
  rationale: Uniform distribution for initial states provides maximum entropy starting conditions for
    synthetic data generation. This boundary means generated datasets will have equal representation across
    states at time zero unless explicitly configured otherwise.
  evidence: transitionMatrix/generators/dataset_generators.py:84(long_format)
  stage: data_generation
  alternative_considered: User-specified initial distribution would reduce generator flexibility
- id: BD-034
  type: B/BA
  content: Event time = k - uniform(0,1) within timestep
  rationale: Uniform event time placement within intervals enables unbiased sampling of observation times
    relative to state transitions. The boundary is that this assumes events are equally likely anywhere
    within the observation window, not clustered at boundaries.
  evidence: transitionMatrix/generators/dataset_generators.py:84(long_format)
  stage: data_generation
