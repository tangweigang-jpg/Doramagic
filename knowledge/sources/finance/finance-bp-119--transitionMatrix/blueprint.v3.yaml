- id: BD-035
  type: B/BA
  content: Diagonal dominance threshold = 0.5 (50%)
  rationale: The 50% diagonal dominance threshold identifies matrices where staying in the current state
    is the most likely outcome. This boundary distinguishes highly stable credit systems (e.g., investment-grade)
    from more fluid systems where transitions are equally probable.
  evidence: transitionMatrix/model.py:274(characterize)
  stage: Characterization
  alternative_considered: Higher 80% threshold would classify fewer matrices as dominant
- id: BD-036
  type: B/BA
  content: Credit curve values must be non-decreasing (monotonic)
  rationale: Monotonicity constraint ensures credit curves represent valid cumulative default probabilities
    that can only increase over time. The boundary means any declining segment triggers validation failure,
    enforcing the fundamental requirement that cumulative defaults cannot decrease.
  evidence: transitionMatrix/creditratings/creditcurve.py:103(validate)
  stage: Validation
  alternative_considered: Allowing non-monotonic curves would violate probability axioms
- id: BD-037
  type: B/BA
  content: Hazard rate = incremental PD / survival probability
  rationale: The hazard rate formula converts incremental default probabilities into instantaneous failure
