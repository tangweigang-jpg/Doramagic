- id: BD-022
  type: B/BA
  content: 'Hazard rate: h(k) = iPD(k) / (1 - cPD(k-1))'
  rationale: Conditional probability formula given survival provides instantaneous default rate interpretation.
    This definition ensures hazard rates are positive and finite while maintaining consistency with cumulative
    default probability calculations.
  evidence: transitionMatrix/model.py:677(module)
  stage: credit_curves
  alternative_considered: Discrete approximation h(k) = cPD(k) - cPD(k-1) was rejected as it lacks conditional
    interpretation
  _evidence_issues:
