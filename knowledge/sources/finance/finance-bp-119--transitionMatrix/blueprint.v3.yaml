# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-119
name: transitionMatrix
sop_version: '3.6'
source:
  projects:
  - transitionMatrix
  commit_hash: 54fff5d07d8b9188ffbdf0507372c9b0a67a4198
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Credit rating transition matrix estimation and state transition analysis
  description: Python library for statistical analysis and visualization of state transition phenomena,
    primarily used for credit rating migration analysis and discrete state space modeling.
  prerequisites: Users should understand basic probability theory, transition matrices, and pandas DataFrame
    operations. Familiarity with credit risk concepts helpful for credit-specific features.
  not_suitable_for: Continuous state spaces, real-time streaming data processing, high-frequency event
    processing, or non-Markov transition processes requiring memory
stages:
- id: state_space_definition
  name: State Space Definition
  order: 1
  responsibility: Defines the discrete state space structure (credit ratings, entities) used across each
    other stages. Provides validation, label mapping, and CQS harmonization for credit rating scales.
  interface:
    inputs: definition list of (index, label) tuples, optional cqs_mapping, optional transition_data for
      inference
    outputs: StateSpace object with cardinality, definition, labels
  required_methods:
  - name: StateSpace.get_states
    description: Returns the list of state tuples (index, label) defining the state space
    evidence: transitionMatrix/statespaces/statespace.py:28(get_states)
  key_behaviors:
  - behavior: Alphabetical state ordering inference
    description: States are inferred in alphabetical order by default when definition not provided. Custom
      state ordering must be explicitly defined; changing inference breaks downstream matrix semantics.
    evidence: transitionMatrix/statespaces/statespace.py:78(_infer)
  - behavior: Lazy inference from transition_data
    description: State space can be automatically extracted from raw transition data without manual specification
    evidence: transitionMatrix/statespaces/statespace.py:51(__init__)
  - behavior: CQS mapping storage
    description: Credit ratings are harmonized to coarse rating scales per regulatory requirements by
      storing CQS mapping as dictionary on StateSpace object
    evidence: transitionMatrix/statespaces/statespace.py:69(cqs_mapping)
  replaceable_points:
  - name: state_inference_strategy
    description: How states are inferred from data when definition not provided
    options:
    - name: sorted_unique
      traits:
      - deterministic
      - alphabetical ordering
      fit_for:
      - credit ratings with standard alphabetical ordering
      - consistent reproducible results
      not_fit_for:
      - non-alphabetical state labels
      - weighted state priorities
    - name: insertion_order
      traits:
      - preserves data order
      - potentially non-deterministic
      fit_for:
      - temporal ordering importance
      - streaming data scenarios
      not_fit_for:
      - reproducibility requirements
      - standard credit scales
    default: sorted_unique
  design_decisions:
  - State space defined as list of tuples (index, label) - Tuple format allows extensible metadata per
    state while maintaining simple iteration API (transitionMatrix/statespaces/statespace.py:28)
  - Lazy inference from transition_data if definition not provided - Enables automatic state space extraction
    from raw data without manual specification (transitionMatrix/statespaces/statespace.py:51)
  - CQS mapping stored as dictionary on StateSpace - Credit ratings need harmonization to coarse rating
    scales per regulatory requirements (transitionMatrix/statespaces/statespace.py:69)
  acceptance_hints:
  - StateSpace.dimension returns correct cardinality
  - StateSpace.get_states() returns expected (index, label) tuples
  - CQS mapping correctly maps fine ratings to coarse ratings
  - State indices are 0-based and contiguous
- id: data_preprocessing
  name: Data Preprocessing
  order: 2
  responsibility: Converts raw event data between Compact/Canonical formats, bins timestamps into cohorts,
    validates absorbing states, and computes summary statistics.
  interface:
    inputs: raw pandas DataFrame with ID/Time/State columns
    outputs: binned DataFrame with cohort assignments, event dictionaries, cohort boundaries
  required_methods:
  - name: to_canonical
    description: Converts Compact format (ID, Time, State) to Canonical format (ID, Time, From, To) for
      estimator consumption
    evidence: transitionMatrix/utils/converters.py:75(to_canonical)
  - name: to_compact
    description: Reverse conversion from canonical to compact format, reducing storage by 25%
    evidence: transitionMatrix/utils/converters.py:115(to_compact)
  - name: bin_timestamps
    description: Assigns timestamps to cohort intervals for cohort-based estimation
    evidence: transitionMatrix/utils/preprocessing.py:241(bin_timestamps)
  - name: generate_cohort_bounds
    description: Creates equal-width cohort intervals from min to max time
    evidence: transitionMatrix/utils/preprocessing.py:131(generate_cohort_bounds)
  key_behaviors:
  - behavior: Compact format implicit From state
    description: Compact format uses previous state as From implicitly, reducing storage by 25% compared
      to explicit From/To per row
    evidence: transitionMatrix/utils/converters.py:104(same entity transition)
  - behavior: Lossy timestamp discretization
    description: Intermediate transitions within same cohort interval are discarded. bin_timestamps cannot
      recover them. Any state transitions within same cohort interval are lost.
    evidence: transitionMatrix/utils/preprocessing.py:258(warning comment)
  - behavior: Canonical bootstrap assumption
    description: First event per entity is assumed to be From=To=self state (identity transition). If
      initial observation is actually a transition, From/To are incorrect.
    evidence: transitionMatrix/utils/converters.py:98-102(bootstrap first event)
  - behavior: Missing states encoded as sentinel
    description: Missing states are encoded as -99999 sentinel value to avoid None/nan complications in
      numpy array processing
    evidence: transitionMatrix/estimators/cohort_estimator.py:113(ValueError except)
  replaceable_points:
  - name: cohort_assignment
    description: How events are assigned to cohorts
    options:
    - name: equal_width
      traits:
      - equal time intervals
      - simple interpretation
      fit_for:
      - uniform observation periods
      - standard reporting intervals
      not_fit_for:
      - non-uniform data density
      - irregular reporting schedules
    - name: equal_frequency
      traits:
      - equal event counts
      - balanced cohorts
      fit_for:
      - sparse early periods
      - equal statistical power per cohort
      not_fit_for:
      - time-sensitive analysis
      - regulatory reporting
    - name: custom_bounds
      traits:
      - user-defined boundaries
      - maximum flexibility
      fit_for:
      - regulatory calendar periods
      - business-specific intervals
      not_fit_for:
      - automated workflows
      - unknown data characteristics
    default: equal_width
  design_decisions:
  - Compact format uses previous state as From implicitly - Reduces storage by 25% compared to explicit
    From/To per row (transitionMatrix/utils/converters.py:104)
  - Cohort bounds are equally spaced in time - Equal-width bins simplify interpretation and maintain equal
    observation windows (transitionMatrix/utils/preprocessing.py:148)
  - Missing states encoded as -99999 sentinel - Avoids None/nan complications in numpy array processing
    (transitionMatrix/estimators/cohort_estimator.py:113)
  - Equal-width bins via dt = (t_max - t_min) / cohorts - Simple formula enables straightforward cohort
    boundary calculation (transitionMatrix/utils/preprocessing.py:148)
  acceptance_hints:
  - to_canonical produces correct (ID, Time, From, To) tuples
  - to_compact produces correct (ID, Time, State) tuples
  - bin_timestamps assigns correct cohort indices
  - Cohort boundaries are monotonically increasing
  - No data loss from lossy discretization without warning
- id: data_generation
  name: Synthetic Data Generation
  order: 3
  responsibility: Generates synthetic transition event datasets for testing estimators and validating
    methodology against known ground truth.
  interface:
    inputs: StateSpace, TransitionMatrix, n entities, timesteps/rate
    outputs: pandas DataFrame in Compact or Canonical format
  required_methods:
  - name: exponential_transitions
    description: Generates continuous-time events from exponential distribution matching homogeneous Poisson
      process
    evidence: transitionMatrix/generators/dataset_generators.py:24(exponential_transitions)
  - name: markov_chain
    description: Generates discrete-time Markov chain events using transition matrix probabilities
    evidence: transitionMatrix/generators/dataset_generators.py:54(markov_chain)
  - name: long_format
    description: Canonical format generation with optional From/To encoding for estimator input
    evidence: transitionMatrix/generators/dataset_generators.py:84(long_format)
  key_behaviors:
  - behavior: Identity initial state
    description: First event per entity is identity transition (From=To=State) to anchor entity's starting
      position in canonical format
    evidence: transitionMatrix/generators/dataset_generators.py:74(initial_state)
  - behavior: Exponential time distribution
    description: Continuous-time events use exponential distribution due to memoryless property matching
      homogeneous Poisson process assumptions
    evidence: transitionMatrix/generators/dataset_generators.py:44(stats.expon.rvs)
  replaceable_points:
  - name: time_distribution
    description: Distribution for event times in continuous-time generation
    options:
    - name: exponential
      traits:
      - memoryless
      - continuous-time Markov
      fit_for:
      - homogeneous Poisson processes
      - standard continuous-time Markov chains
      not_fit_for:
      - non-homogeneous processes
      - Hawkes processes
    - name: uniform
      traits:
      - bounded intervals
      - simple sampling
      fit_for:
      - fixed observation windows
      - uniform sampling
      not_fit_for:
      - variable event rates
      - realistic arrival patterns
    - name: custom
      traits:
      - user-defined distribution
      - maximum flexibility
      fit_for:
      - empirical distributions
      - non-standard arrival processes
      not_fit_for:
      - standard Markov assumptions
      - quick prototyping
    default: exponential
  design_decisions:
  - First event per entity is identity transition (From=To=State) - Canonical format requires initial
    state record to anchor entity's starting position (transitionMatrix/generators/dataset_generators.py:74)
  - Exponential distribution for continuous-time events - Memoryless property matches homogeneous Poisson
    process assumptions (transitionMatrix/generators/dataset_generators.py:44)
  acceptance_hints:
  - Generated data matches expected Markov chain properties
  - Initial state correctly encoded as identity transition
  - Time intervals follow specified distribution
  - Output format compatible with to_canonical conversion
- id: matrix_estimation
  name: Matrix Estimation
  order: 4
  responsibility: Estimates transition probabilities from historical event data using cohort-based or
    duration-based methods. Computes confidence intervals and produces TransitionMatrixSet.
  interface:
    inputs: event DataFrame (canonical or compact), StateSpace object, cohort_bounds (optional)
    outputs: TransitionMatrixSet with matrix_set, count_set, confidence intervals
  required_methods:
  - name: BaseEstimator.fit
    description: Abstract fit method - subclass implementations estimate transition matrices from event
      data
    evidence: transitionMatrix/estimators/__init__.py:18(BaseEstimator)
  - name: CohortEstimator.fit
    description: Cohort-based estimation for discrete time periods using pre-binned data
    evidence: transitionMatrix/estimators/cohort_estimator.py:24(CohortEstimator)
  - name: AalenJohansenEstimator.fit
    description: Duration-based non-parametric estimator for time-inhomogeneous processes
    evidence: transitionMatrix/estimators/aalen_johansen_estimator.py:23(AalenJohansenEstimator)
  key_behaviors:
  - behavior: Aalen-Johansen requires pre-sorted data
    description: Algorithm processes events sequentially by ascending time; sorting is prerequisite for
      correctness. Unsorted data produces incorrect transition matrices with no validation warning.
    evidence: transitionMatrix/estimators/aalen_johansen_estimator.py:70-71(fit docstring)
  - behavior: CohortEstimator requires cohort_bounds
    description: cohort_bounds must be set before fit() is called. Missing cohort_bounds causes IndexError
      at line 94 when fit() accesses len(self.cohort_bounds).
    evidence: transitionMatrix/estimators/cohort_estimator.py:32(__init__), 48(fit)
  - behavior: CohortEstimator data sorting requirement
    description: Data iteration assumes sorted_by_ID_then_Time order. Unsorted data breaks adjacent-entity
      detection, causing migration counts to be mis-attributed.
    evidence: transitionMatrix/estimators/cohort_estimator.py:143(entity_id comparison)
  - behavior: CohortEstimator time index boundary shift
    description: Last event time index must be decremented at boundary; without this shift boundary counts
      are wrong. Documented as ATTN comment.
    evidence: transitionMatrix/estimators/cohort_estimator.py:152(comment)
  - behavior: Numpy array storage
    description: Data stored in numpy arrays inside estimators for 10-100x faster iterative numerical
      processing vs pandas iterrows
    evidence: transitionMatrix/estimators/cohort_estimator.py:97(event_exists = np.empty)
  - behavior: Graceful CI degradation
    description: Confidence interval computation delegated to statsmodels; if unavailable, estimation
      proceeds without CIs silently
    evidence: transitionMatrix/estimators/simple_estimator.py:86(if self.ci_method)
  - behavior: SimpleEstimator tuple format
    description: fit() expects (id, state_in, state_out) tuple format with hardcoded index access. DataFrame
      row order matters; using column names directly would be more robust.
    evidence: transitionMatrix/estimators/simple_estimator.py:75-81(fit)
  replaceable_points:
  - name: confidence_interval_method
    description: Method for computing confidence intervals
    options:
    - name: goodman
      traits:
      - multinomial proportions
      - large samples
      fit_for:
      - standard credit analysis
      - large portfolio estimates
      not_fit_for:
      - small samples
      - rare events
    - name: sison_glaz
      traits:
      - multinomial
      - smaller samples
      fit_for:
      - moderate sample sizes
      - balanced categories
      not_fit_for:
      - very small counts
      - highly skewed distributions
    - name: wilson
      traits:
      - robust
      - each sample sizes
      fit_for:
      - general purpose
      - edge cases
      not_fit_for:
      - computational efficiency critical
    - name: none
      traits:
      - no confidence intervals
      - fastest
      fit_for:
      - quick prototyping
      - point estimates only
      not_fit_for:
      - uncertainty quantification
      - regulatory reporting
    default: goodman
  - name: estimator_type
    description: Estimation methodology for transition probabilities
    options:
    - name: cohort
      traits:
      - discrete time periods
      - pre-binned data
      fit_for:
      - credit rating migrations
      - periodic reporting data
      not_fit_for:
      - continuous-time processes
      - irregular observations
    - name: aalen_johansen
      traits:
      - continuous time
      - duration-based
      - non-parametric
      fit_for:
      - survival analysis
      - time-inhomogeneous processes
      not_fit_for:
      - discrete observation intervals
      - large datasets
    - name: simple
      traits:
      - single cohort
      - testing
      fit_for:
      - unit testing
      - validation against known results
      not_fit_for:
      - production analysis
      - multi-period data
    default: cohort
  design_decisions:
  - 'Inheritance hierarchy: BaseEstimator -> DurationEstimator -> AalenJohansenEstimator - Separates single-period
    (cohort) from multi-period (duration) estimation concerns (transitionMatrix/estimators/__init__.py:106)'
  - Data stored in numpy arrays inside estimators - Numpy arrays 10-100x faster for iterative numerical
    processing vs pandas iterrows (transitionMatrix/estimators/cohort_estimator.py:97)
  - Confidence intervals via Goodman method (statsmodels) - Goodman approximation valid for multinomial
    proportions with large samples (transitionMatrix/estimators/simple_estimator.py:86)
  - Aalen-Johansen requires pre-sorted data by time ascending - Algorithm processes events sequentially;
    sorting is prerequisite for correctness (transitionMatrix/estimators/aalen_johansen_estimator.py:71)
  acceptance_hints:
  - TransitionMatrixSet.matrix_set contains correct number of period matrices
  - Row sums equal 1.0 within tolerance
  - Every values between 0 and 1
  - Count matrices reflect actual migration counts
  - Confidence intervals computed when statsmodels available
- id: matrix_representation
  name: Matrix Representation
  order: 5
  responsibility: Implements core TransitionMatrix (single period) and TransitionMatrixSet (multi-period)
    objects as numpy.matrix subclasses. Provides validation, algebra, generators, and I/O.
  interface:
    inputs: values list/array, json_file, csv_file, or dimension
    outputs: TransitionMatrix with validated=True flag, TransitionMatrixSet with entries list
  required_methods:
  - name: TransitionMatrix.validate
    description: Validates row sums equal 1.0, each values between 0 and 1, matrix is square
    evidence: transitionMatrix/model.py:190(validate method)
  - name: TransitionMatrix.fix_rowsums
    description: Adjusts diagonal element to ensure row sum equals 1.0 while preserving row ordering
    evidence: transitionMatrix/model.py:157(fix_rowsums)
  - name: TransitionMatrix.characterize
    description: Returns matrix characterization report; requires validated=True or returns warning
    evidence: transitionMatrix/model.py:283-295(characterize)
  - name: TransitionMatrixSet.to_json
    description: Serializes TransitionMatrixSet to JSON format
    evidence: transitionMatrix/model.py:transitionMatrix/model.py:520
  key_behaviors:
  - behavior: np.matrix inheritance
    description: TransitionMatrix inherits from np.matrix (deprecated in numpy 1.15+). Matrix multiplication
      operator * differs from element-wise *; np.matrix creates row vectors on slicing. Every operations
      expect square matrices.
    evidence: transitionMatrix/model.py:48(class TransitionMatrix(np.matrix))
  - behavior: Explicit validation
    description: Validation is explicit method call, not automatic at __new__. Allows construction of
      invalid matrices for testing/stress scenarios; validates on demand.
    evidence: transitionMatrix/model.py:190(validate method)
  - behavior: Validated flag gating
    description: validated flag is False at initialization, True after validate() called. characterize()
      returns warning message if called on unvalidated matrices.
    evidence: transitionMatrix/model.py:107(obj.validated = False), 283-295(characterize)
  - behavior: Default 2x2 identity
    description: TransitionMatrix defaults to 2x2 identity matrix when no values provided. Any code relying
      on default dimension without validation will get silent 2x2 identity.
    evidence: transitionMatrix/model.py:103-105(__new__)
  - behavior: Default absorbing state convention
    description: Default/absorbing state is hardcoded as highest index (dimension-1). Not configurable
      per matrix. Non-standard state orderings require matrix permutation before using default_curves().
    evidence: transitionMatrix/model.py:662(Default = self.dimension - 1)
  - behavior: Temporal type distinction
    description: 'TransitionMatrixSet temporal_type: ''Incremental'' (single period transitions) vs ''Cumulative''
      (from start to period k). MUST be set before calling cumulate()/incremental().'
    evidence: transitionMatrix/model.py:384(temporal_type doc), 542(cumulate), 575(incremental)
  replaceable_points:
  - name: validation_accuracy
    description: Tolerance for row sum validation
    options:
    - name: 1e-3
      traits:
      - loose tolerance
      - production use
      fit_for:
      - typical floating point errors
      - standard analysis
      not_fit_for:
      - high-precision requirements
      - research applications
    - name: 1e-6
      traits:
      - tight tolerance
      - research use
      fit_for:
      - high-precision calculations
      - academic validation
      not_fit_for:
      - real-world data with measurement noise
    - name: '0.0'
      traits:
      - exact validation
      - testing only
      fit_for:
      - unit testing
      - known ground truth
      not_fit_for:
      - real data
      - floating point arithmetic
    default: 1e-3
  - name: matrix_set_method
    description: How to generate multi-period matrices
    options:
    - name: Copy
      traits:
      - independent copies
      - memory intensive
      fit_for:
      - parallel processing
      - modification scenarios
      not_fit_for:
      - memory-constrained environments
    - name: Power
      traits:
      - matrix exponentiation
      - Markov assumption
      fit_for:
      - homogeneous processes
      - projection scenarios
      not_fit_for:
      - time-inhomogeneous data
      - regulatory matrices
    - name: As-Is
      traits:
      - no transformation
      - direct use
      fit_for:
      - pre-computed matrices
      - empirical data
      not_fit_for:
      - projection scenarios
    default: As-Is
  design_decisions:
  - Inherits from np.matrix (deprecated in numpy 1.15+) - Provides matrix algebra (*, I, T) for free;
    noted deprecation but maintained for backward compatibility (transitionMatrix/model.py:48)
  - Validation is explicit method call, not automatic at __new__ - Allows construction of invalid matrices
    for testing/stress scenarios; validates on demand (transitionMatrix/model.py:190)
  - Row sum correction adjusts diagonal element - Diagonal adjustment preserves row ordering while fixing
    probability mass conservation (transitionMatrix/model.py:157)
  - 'Default state is highest index (last row/col) - Convention: default is absorbing state with index
    = dimension - 1 (transitionMatrix/model.py:662)'
  - 'TransitionMatrixSet temporal_type: ''Incremental'' vs ''Cumulative'' - Incremental: single period
    transitions; Cumulative: from start to period k (transitionMatrix/model.py:384)'
  acceptance_hints:
  - Every matrices pass validate() without exceptions
  - Row sums equal 1.0 within tolerance
  - Every values between 0 and 1
  - Matrices are square (n×n)
  - validated flag is True after validate() call
- id: matrix_operations
  name: Matrix Operations
  order: 6
  responsibility: 'Provides mathematical operations on transition matrices: generators, powers, cumulatives,
    state removal, and credit curve extraction.'
  interface:
    inputs: TransitionMatrix or TransitionMatrixSet
    outputs: Generator matrix, powered matrix, incremental/cumulative set, CreditCurve
  required_methods:
  - name: TransitionMatrix.generator
    description: Computes Q = log(T) / t using matrix logarithm via scipy.linalg.logm
    evidence: transitionMatrix/model.py:231(generator)
  - name: TransitionMatrix.power
    description: Raises matrix to power n via repeated multiplication
    evidence: transitionMatrix/model.py:258(power)
  - name: TransitionMatrixSet.cumulate
    description: Converts incremental set to cumulative via matrix multiplication. Requires temporal_type
      set before calling.
    evidence: transitionMatrix/model.py:538(cumulate)
  - name: TransitionMatrixSet.incremental
    description: Converts cumulative set to incremental via matrix division (left multiplication by inverse).
      Requires temporal_type set before calling.
    evidence: transitionMatrix/model.py:571(incremental)
  - name: TransitionMatrix.remove
    description: Removes a state and redistributes probability mass to remaining states
    evidence: transitionMatrix/model.py:332(remove)
  - name: TransitionMatrixSet.default_curves
    description: Extracts PD, survival curves from absorbing state transitions using hardcoded default
      state (dimension-1)
    evidence: transitionMatrix/model.py:653(default_curves)
  key_behaviors:
  - behavior: Iterative power computation
    description: Matrix exponentiation uses repeated multiplication (O(n³×power)) not scipy.linalg.expm.
      For n>10, numerical errors accumulate; accuracy degrades with higher powers.
    evidence: transitionMatrix/model.py:268-272(power)
  - behavior: State removal redistribution
    description: remove() distributes probability to max-valued column, not proportionally. Removing a
      state redistributes mass to diagonal only if diagonal is already max.
    evidence: transitionMatrix/model.py:354(new_matrix[i, j] = self[i, j] * (1.0 + w))
  - behavior: Incremental from cumulative
    description: T(k) = T(k-1)^-1 * T(k) via left multiplication by inverse. Algorithm processes sequentially
      through matrix list.
    evidence: transitionMatrix/model.py:586(anm1i = anm1.I)
  - behavior: Generator via scipy.linalg.logm
    description: Matrix logarithm is inverse of expm; requires scipy for proper handling of complex eigenvalues
    evidence: transitionMatrix/model.py:241(logm(self) / t)
  replaceable_points:
  - name: generator_fix_negative
    description: Whether to flip negative off-diagonal generator elements
    options:
    - name: true
      traits:
      - non-negative generators
      - intensity interpretation
      fit_for:
      - forward intensity interpretation
      - regulatory reporting
      not_fit_for:
      - mathematically valid negative off-diagonals
      - research precision
    - name: false
      traits:
      - mathematically exact
      - no modification
      fit_for:
      - research applications
      - exact calculations
      not_fit_for:
      - non-negative intensity requirements
    default: false
  design_decisions:
  - Generator uses scipy.linalg.logm - Matrix logarithm is inverse of expm; requires scipy for proper
    handling (transitionMatrix/model.py:241)
  - 'Incremental from cumulative: T(k) = T(k-1)^-1 * T(k) - Matrix division via left multiplication by
    inverse (transitionMatrix/model.py:586)'
  - State removal redistributes probability proportionally - Proportional redistribution preserves relative
    transition rates among remaining states (transitionMatrix/model.py:354)
  acceptance_hints:
  - generator produces valid Q matrix with row sums = 0
  - power produces valid transition matrix (row sums = 1)
  - cumulate/incremental produce valid TransitionMatrixSet
  - default_curves correctly identifies absorbing state transitions
- id: credit_curves
  name: Credit Curve Analysis
  order: 7
  responsibility: Represents and analyzes credit default curves (cumulative PD, survival probability,
    hazard rates) derived from transition matrices with absorbing default state.
  interface:
    inputs: TransitionMatrixSet (cumulative), rating index
    outputs: CreditCurve object, arrays of iPD/cPD/hR/sR
  required_methods:
  - name: CreditCurve.default_curves
    description: Extracts PD, survival, hazard curves from absorbing state transitions for specified rating
    evidence: transitionMatrix/creditratings/creditcurve.py:25(CreditCurve)
  - name: CreditCurve.validate
    description: Validates credit curve properties similar to TransitionMatrix
    evidence: transitionMatrix/creditratings/creditcurve.py:70(obj.validated = False)
  key_behaviors:
  - behavior: CreditCurve np.matrix inheritance
    description: CreditCurve inherits from np.matrix - Credit curves are time-series per rating; matrix
      format (rows=raters, cols=periods) enables vectorized operations
    evidence: transitionMatrix/creditratings/creditcurve.py:25(class CreditCurve(np.matrix))
  - behavior: Lazy validation pattern
    description: CreditCurve defaults validated=False - same lazy validation pattern as TransitionMatrix.
      CreditCurve.validate() must be called before characterize() or other validation-dependent methods.
    evidence: transitionMatrix/creditratings/creditcurve.py:70(obj.validated = False)
  - behavior: Hazard rate calculation
    description: 'Hazard rate: h(k) = iPD(k) / (1 - cPD(k-1)) as conditional probability given survival;
      instantaneous rate interpretation'
    evidence: transitionMatrix/model.py:677(hR[k] = iPD[k] / (1.0 - cPD[k - 1]))
  - behavior: Hardcoded absorbing state
    description: Default state is hardcoded as dimension-1 in default_curves() and default_curve_set().
      Last state is assumed to be absorbing (default); any non-default absorbing state breaks curve calculation.
    evidence: transitionMatrix/model.py:662(Default = self.dimension - 1)
  replaceable_points:
  - name: absorbing_state_detection
    description: How absorbing state is identified for credit curve extraction
    options:
    - name: highest_index
      traits:
      - convention-based
      - no configuration
      fit_for:
      - standard credit scales
      - regulatory reporting
      not_fit_for:
      - non-standard state orderings
      - custom absorbing states
    - name: explicit_parameter
      traits:
      - configurable
      - maximum flexibility
      fit_for:
      - non-standard state orderings
      - custom absorbing states
      not_fit_for:
      - standard workflows
      - quick analysis
    default: highest_index
  design_decisions:
  - CreditCurve inherits from np.matrix - Credit curves are time-series per rating; matrix format (rows=raters,
    cols=periods) enables vectorized ops (transitionMatrix/creditratings/creditcurve.py:25)
  - 'Hazard rate: h(k) = iPD(k) / (1 - cPD(k-1)) - Conditional probability given survival; instantaneous
    rate interpretation (transitionMatrix/model.py:677)'
  acceptance_hints:
  - CreditCurve contains correct number of periods
  - Survival probabilities monotonically decreasing
  - Cumulative PD monotonically increasing
  - Hazard rates non-negative
  - Sum of survival and cumulative PD = 1 at each period
data_flow:
- from_stage: state_space_definition
  to_stage: data_preprocessing
  data: StateSpace object with cardinality, definition, labels
- from_stage: state_space_definition
  to_stage: matrix_estimation
  data: StateSpace passed to estimator constructor for dimension validation
- from_stage: state_space_definition
  to_stage: data_generation
  data: StateSpace.get_states() list for generating valid transitions
- from_stage: data_preprocessing
  to_stage: matrix_estimation
  data: binned DataFrame with cohort assignments in canonical format
- from_stage: data_generation
  to_stage: matrix_estimation
  data: synthetic pandas DataFrame in Compact or Canonical format
- from_stage: matrix_estimation
  to_stage: matrix_representation
  data: matrix_set (list of TransitionMatrix), count_set, average_matrix
- from_stage: matrix_representation
  to_stage: matrix_operations
  data: TransitionMatrix/TransitionMatrixSet objects
- from_stage: matrix_operations
  to_stage: credit_curves
  data: TransitionMatrixSet with cumulative temporal_type
global_contracts:
- Every transition matrices must have rows summing to 1.0 (± accuracy tolerance) - transitionMatrix/model.py:195
- Every transition matrix values must be between 0 and 1 - transitionMatrix/model.py:194
- Transition matrices must be square (n×n) - transitionMatrix/model.py:193
- 'Default/absorbing state convention: index = dimension - 1 - transitionMatrix/model.py:662'
- DataFrames use 'ID', 'Time', 'State' columns in Compact format - transitionMatrix/utils/converters.py:51
- Canonical format uses 'ID', 'Time', 'From', 'To' columns - transitionMatrix/utils/converters.py:112
- State space indices are 0-based and contiguous - transitionMatrix/statespaces/statespace.py:83
- validated flag is False at initialization, True after validate() called - transitionMatrix/model.py:107
- TransitionMatrixSet temporal_type MUST be set before calling cumulate()/incremental() - transitionMatrix/model.py:542,
  575
- Aalen-Johansen fit() REQUIRES data pre-sorted by ascending time order - transitionMatrix/estimators/aalen_johansen_estimator.py:70-71
- CohortEstimator REQUIRES cohort_bounds to be set before fit() is called - transitionMatrix/estimators/cohort_estimator.py:32,
  48
- CohortEstimator data iteration assumes sorted_by_ID_then_Time order - transitionMatrix/estimators/cohort_estimator.py:143
business_decisions:
- id: BD-001
  type: B/DK
  content: State space defined as list of tuples (index, label)
  rationale: Tuple format enables extensible metadata per state while maintaining simple iteration API.
    This design supports adding new attributes (e.g., descriptions, regulatory codes) without breaking
    existing code paths, providing forward compatibility for future state space extensions.
  evidence: transitionMatrix/statespaces/statespace.py:88(get_states)
  stage: state_space_definition
  alternative_considered: Named tuples or dataclasses were considered but tuples provide simpler iteration
    and backward compatibility with existing code
- id: BD-002
  type: B/BA
  content: Lazy inference from transition_data if definition not provided
  rationale: Enables automatic state space extraction from raw data without manual specification, reducing
    boilerplate for users. The lazy approach defers computation until states are actually accessed, improving
    initialization performance when only a subset of operations is performed.
  evidence: transitionMatrix/statespaces/statespace.py:37(__init__)
  stage: state_space_definition
  alternative_considered: Eager inference during initialization was rejected due to potential performance
    overhead for large datasets
- id: BD-003
  type: BA
  content: CQS mapping stored as dictionary on StateSpace
  rationale: Credit ratings require harmonization to coarse rating scales per regulatory requirements
    (Basel, EBA guidelines). Dictionary structure provides O(1) lookup for mapping fine-grained ratings
    to regulatory coarse rating scales, essential for compliance reporting under CRR/IRB frameworks.
  evidence: transitionMatrix/statespaces/statespace.py:69(cqs_mapping)
  stage: state_space_definition
  alternative_considered: External mapping files were considered but embedding in StateSpace provides
    tighter coupling and easier serialization
  _evidence_issues:
  - 'FN_NOT_FOUND: cqs_mapping in transitionMatrix/statespaces/statespace.py'
- id: BD-004
  type: B/BA
  content: Compact format uses previous state as From implicitly
  rationale: Reduces storage by 25% compared to explicit From/To per row, significantly improving memory
    efficiency for large transition datasets. The implicit From convention simplifies processing while
    maintaining full information since ordering implies source state.
  evidence: transitionMatrix/utils/converters.py:115(to_compact)
  stage: data_preprocessing
  alternative_considered: Explicit From column was rejected to avoid 33% row size increase without commensurate
    benefit
- id: BD-005
  type: B/BA
  content: Cohort bounds are equally spaced in time
  rationale: Equal-width bins simplify interpretation and maintain equal observation windows across each
    cohorts. This ensures statistical comparability between cohorts and prevents artifacts from unequal
    exposure periods that could distort transition rate estimates.
  evidence: transitionMatrix/utils/preprocessing.py:148(module)
  stage: data_preprocessing
  alternative_considered: Quantile-based binning was considered but rejected due to unequal observation
    windows
  _evidence_issues:
  - 'FN_NOT_FOUND: module in transitionMatrix/utils/preprocessing.py'
- id: BD-006
  type: BA
  content: Missing states encoded as -99999 sentinel
  rationale: Avoids None/nan complications in numpy array processing while providing a distinguishable
    missing value indicator. The sentinel value allows vectorized operations without special missing value
    handling logic, improving computational efficiency in numerical processing pipelines.
  evidence: transitionMatrix/estimators/cohort_estimator.py:113(ValueError except)
  stage: data_preprocessing
  alternative_considered: NaN was rejected due to complications with integer arrays and special comparison
    behaviors
  _evidence_issues:
  - 'INVALID_IDENTIFIER: ValueError except in transitionMatrix/estimators/cohort_estimator.py'
- id: BD-007
  type: B
  content: 'Inheritance hierarchy: BaseEstimator -> DurationEstimator -> AalenJohansenEstimator'
  rationale: Separates single-period (cohort) from multi-period (duration) estimation concerns, enabling
    independent evolution of estimation methods. This hierarchy allows adding new estimator types (e.g.,
    kernel-smoothed) without modifying existing implementations.
  evidence: transitionMatrix/estimators/__init__.py:106(DurationEstimator)
  stage: matrix_estimation
  alternative_considered: Composition over inheritance was considered but inheritance provides cleaner
    interface for statistical methods
- id: BD-008
  type: BA
  content: Data stored in numpy arrays inside estimators (not pandas)
  rationale: Numpy arrays provide 10-100x speedup for iterative numerical processing compared to pandas
    iterrows. This performance difference is critical for estimation algorithms that process millions
    of observations during matrix construction.
  evidence: transitionMatrix/estimators/cohort_estimator.py:97(module)
  stage: matrix_estimation
  alternative_considered: Pandas DataFrames were rejected due to iterrows overhead in tight numerical
    loops
  _evidence_issues:
  - 'FN_NOT_FOUND: module in transitionMatrix/estimators/cohort_estimator.py'
- id: BD-009
  type: B
  content: Confidence intervals via Goodman method (statsmodels)
  rationale: Goodman approximation is valid for multinomial proportions with large samples and provides
    computationally efficient interval estimation. This method avoids expensive simulation-based approaches
    while maintaining acceptable statistical properties for transition matrix estimation.
  evidence: transitionMatrix/estimators/simple_estimator.py:86(ci_method)
  stage: matrix_estimation
  alternative_considered: Bootstrap was considered but rejected due to computational cost for large matrices
  _evidence_issues:
  - 'FN_NOT_FOUND: ci_method in transitionMatrix/estimators/simple_estimator.py'
- id: BD-010
  type: BA
  content: Aalen-Johansen requires pre-sorted data by time ascending
  rationale: The Aalen-Johansen algorithm processes events sequentially to compute cumulative transition
    probabilities; sorting is a prerequisite for correctness. Enforcing this constraint prevents silent
    incorrect results that would be difficult to diagnose.
  evidence: transitionMatrix/estimators/aalen_johansen_estimator.py:71(note)
  stage: matrix_estimation
  alternative_considered: Internal sorting was considered but rejected to maintain algorithm transparency
    and avoid performance overhead
  _evidence_issues:
  - 'FN_NOT_FOUND: note in transitionMatrix/estimators/aalen_johansen_estimator.py'
- id: BD-011
  type: BA
  content: Inherits from np.matrix (deprecated in numpy 1.15+)
  rationale: np.matrix provides matrix algebra (*, I, T) operations for free, simplifying transition matrix
    arithmetic. Despite numpy deprecation warnings since version 1.15, backward compatibility with existing
    codebases takes precedence over migration effort.
  evidence: transitionMatrix/model.py:48(module)
  stage: matrix_representation
  alternative_considered: Direct np.ndarray inheritance was rejected due to loss of matrix operator semantics
  _evidence_issues:
  - 'FN_NOT_FOUND: module in transitionMatrix/model.py'
- id: BD-012
  type: B
  content: Validation is explicit method call, not automatic at __new__
  rationale: Allows construction of potentially invalid matrices for testing and stress scenarios while
    validating on demand. This separation supports performance-critical scenarios where validation overhead
    is unacceptable and testing scenarios requiring invalid states.
  evidence: transitionMatrix/model.py:190(validate method)
  stage: matrix_representation
  alternative_considered: Automatic validation was rejected to avoid performance penalty and support test
    scenarios
  _evidence_issues:
  - 'INVALID_IDENTIFIER: validate method in transitionMatrix/model.py'
- id: BD-013
  type: B
  content: Row sum correction adjusts diagonal element
  rationale: Diagonal adjustment preserves row ordering while fixing probability mass conservation, ensuring
    stochastic matrix validity. This approach minimizes perturbation to transition probabilities while
    guaranteeing mathematical consistency.
  evidence: transitionMatrix/model.py:157(fix_rowsums)
  stage: matrix_representation
  alternative_considered: Proportional adjustment across each elements was rejected as it would alter
    relative transition rates
- id: BD-014
  type: BA/DK
  content: Default state is highest index (last row/col)
  rationale: Convention establishes default absorbing state (typically default/failure) at highest index,
    matching common regulatory templates (Moody's, S&P). This implicit ordering reduces configuration
    burden and aligns with industry practice.
  evidence: transitionMatrix/model.py:662(Default = self.dimension - 1)
  stage: matrix_representation
  alternative_considered: Explicit default specification was considered but rejected in favor of convention-based
    defaults
  _evidence_issues:
  - 'INVALID_IDENTIFIER: Default = self.dimension - 1 in transitionMatrix/model.py'
- id: BD-015
  type: B/RC
  content: 'TransitionMatrixSet temporal_type: ''Incremental'' vs ''Cumulative'''
  rationale: Distinguishes between single-period incremental transitions and multi-period cumulative matrices
    from inception. This dual representation supports both period-by-period analysis and horizon-based
    projections required by different use cases.
  evidence: transitionMatrix/model.py:384(temporal_type doc)
  stage: matrix_representation
  alternative_considered: Separate classes were considered but rejected to maintain unified interface
  _evidence_issues:
  - 'INVALID_IDENTIFIER: temporal_type doc in transitionMatrix/model.py'
- id: BD-016
  type: B
  content: Generator uses scipy.linalg.logm for matrix logarithm
  rationale: Matrix logarithm is the mathematical inverse of matrix exponential; scipy provides numerically
    stable implementation for proper handling of non-diagonalizable matrices. This enables generator-based
    analysis and time-scaling of transition matrices.
  evidence: transitionMatrix/model.py:241(module)
  stage: matrix_operations
  alternative_considered: Custom implementation was rejected due to numerical stability concerns addressed
    by scipy
  _evidence_issues:
  - 'FN_NOT_FOUND: module in transitionMatrix/model.py'
- id: BD-017
  type: B
  content: 'Incremental from cumulative: T(k) = T(k-1)^-1 * T(k)'
  rationale: Matrix division via left multiplication by inverse computes period-specific transition intensities
    from cumulative matrices. This approach handles the mathematical relationship correctly for non-commuting
    matrices unlike element-wise division.
  evidence: transitionMatrix/model.py:586(anm1i = anm1.I)
  stage: matrix_operations
