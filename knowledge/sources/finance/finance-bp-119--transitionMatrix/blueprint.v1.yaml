data_flow:
- from_stage: data_generation
  to_stage: state_space_definition
  data: Synthetic DataFrame (Compact or Canonical format) flows to StateSpace._infer()
    for auto-discovery of states
- from_stage: state_space_definition
  to_stage: data_preprocessing
  data: StateSpace cardinality and labels guide cohort binning and format conversion
    decisions
- from_stage: data_preprocessing
  to_stage: matrix_estimation
  data: Cohorted DataFrame with bin boundaries flows to CohortEstimator.fit() (Compact
    format) or canonical DataFrame to AalenJohansenEstimator.fit() (Canonical format)
- from_stage: matrix_estimation
  to_stage: matrix_storage
  data: Estimated matrix_set (list of 2D arrays) or average_matrix wrapped in TransitionMatrix/TransitionMatrixSet
    objects
- from_stage: matrix_storage
  to_stage: credit_curve_extraction
  data: TransitionMatrixSet flows to default_curve_set() to produce CreditCurve with
    cumulative default probabilities
global_contracts:
- contract: Every DataFrames use 'ID', 'Time', 'State' columns for Compact format
    or 'ID', 'Time', 'From', 'To' for Canonical format (transitionMatrix/utils/converters.py:34)
  evidence: ''
- contract: TransitionMatrix rows must sum to 1.0 (within accuracy threshold defaulting
    to 1e-3) (transitionMatrix/model.py:220)
  evidence: ''
- contract: TransitionMatrix values must be between 0 and 1 (transitionMatrix/model.py:213)
  evidence: ''
- contract: StateSpace definition is list of (index, label) tuples (transitionMatrix/statespaces/statespace.py:60)
  evidence: ''
- contract: 'Cohort bounds define intervals: [start, start+dt, ..., end] (transitionMatrix/utils/preprocessing.py:152)'
  evidence: ''
- contract: TransitionMatrixSet temporal_type is either 'Incremental' or 'Cumulative'
    (transitionMatrix/model.py:422)
  evidence: ''
- contract: Data MUST be sorted by (ID, Time) before CohortEstimator.fit() - unsorted
    data produces incorrect transition counts (cohort_estimator.py:138-146)
  evidence: ''
- contract: AalenJohansenEstimator.fit() requires data sorted by (Time, ID) ascending
