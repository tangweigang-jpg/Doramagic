  evidence: ''
- contract: Every matrix objects start with validated=False - validation is never
    automatic, must be explicitly called (model.py:107)
  evidence: ''
- contract: CohortEstimator expects Compact format while AalenJohansen expects Canonical
    format - no format validation is performed (cohort_estimator.py:48-84, aalen_johansen_estimator.py:41-76)
  evidence: ''
business_decisions:
- id: BD-001
  type: B
  content: Exponential transitions use uniform sampling from state space
  rationale: 'Uniform sampling enables testing cohorting algorithms with random events
    without requiring a transition matrix as input. This design choice allows discovery
    of transition patterns in real data and provides flexibility for synthetic data
    generation workflows. BOUNDARY: Only applicable when exponential transitions are
    explicitly selected in dataset generation; non-exponential modes use alternative
    sampling strategies.'
  evidence: transitionMatrix/generators/dataset_generators.py:48(np.random.choice)
  stage: data_generation
  alternative_considered: Weighted sampling based on historical frequencies was considered
    but not implemented for exponential mode
  _evidence_issues:
  - 'FN_NOT_FOUND: np.random.choice in transitionMatrix/generators/dataset_generators.py'
- id: BD-002
  type: B/BA
  content: Event time within timestep calculated via uniform distribution
  rationale: 'Uniform distribution for event time calculation assumes continuous observation
    within discrete periods. This simplifies simulation while approximating real-world
    censored data where exact transition times are unknown. BOUNDARY: Works correctly
    only when timestep granularity matches analyst''s information arrival cadence;
    over-discretization loses temporal precision.'
  evidence: transitionMatrix/generators/dataset_generators.py:165(np.random.uniform)
  stage: data_generation
  alternative_considered: Exponential or Poisson point processes were considered for
    more realistic event timing
  _evidence_issues:
  - 'FN_NOT_FOUND: np.random.uniform in transitionMatrix/generators/dataset_generators.py'
- id: BD-003
  type: B/BA
  content: Data sorted by entity ID then by time
  rationale: 'Sorting by entity ID then by time matches real-world data patterns and
    estimator assumptions that require temporal ordering per entity. This ensures
    downstream estimators can process entities sequentially without repositioning.
    BOUNDARY: Sorting is assumed but not enforced; unsorted input may produce incorrect
    transition counts.'
  evidence: transitionMatrix/generators/dataset_generators.py:41(sort_values in docstring
    pattern)
  stage: data_generation
  alternative_considered: Lazy sorting on-demand was considered but rejected to avoid
    repeated sorting overhead
  _evidence_issues:
  - 'INVALID_IDENTIFIER: sort_values in docstring pattern in transitionMatrix/generators/dataset_generators.py'
- id: BD-004
  type: B
  content: State space defined as list of tuples (index, label)
  rationale: 'Tuple format allows extension with additional metadata while maintaining
    simple index lookup. This design aligns with pandas data structures for seamless
    DataFrame integration. BOUNDARY: Tuple ordering must be preserved; reordering
    after construction invalidates each derived transition matrices.'
  evidence: transitionMatrix/statespaces/statespace.py:59(self.definition = definition)
  stage: state_space_definition
  alternative_considered: Named tuple or dataclass structures were considered for
    stronger type guarantees
  _evidence_issues:
  - 'INVALID_IDENTIFIER: self.definition = definition in transitionMatrix/statespaces/statespace.py'
- id: BD-005
  type: BA
  content: State inference uses sorted unique states
  rationale: 'Sorted order ensures consistent state ordering across runs enabling
    reproducible results. However, ASCII character ordering may produce arbitrary
    order per Python docs warning that does not reflect domain semantics. BOUNDARY:
    This behavior is a known limitation when state labels contain mixed-case or special
    characters; explicit definition overrides this inference.'
  evidence: transitionMatrix/statespaces/statespace.py:78(module)
  stage: state_space_definition
  alternative_considered: Alphanumeric sorting with locale-awareness was considered
    but adds dependency complexity
  _evidence_issues:
  - 'FN_NOT_FOUND: module in transitionMatrix/statespaces/statespace.py'
- id: BD-006
  type: B/BA
  content: Explicit definition overrides inference from data
  rationale: 'User-specified state space takes precedence over data inference to support
    custom taxonomies and ensure proper state ordering for presentation. This enables
    regulatory-grade rating scales to be enforced regardless of data contents. BOUNDARY:
    Override only applies when definition parameter is explicitly provided; None triggers
    inference path.'
  evidence: transitionMatrix/statespaces/statespace.py:56(pass)
