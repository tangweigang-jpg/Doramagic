id: finance-bp-119
name: transitionMatrix
sop_version: '3.6'
source:
  projects:
  - transitionMatrix
  commit_hash: 54fff5d07d8b9188ffbdf0507372c9b0a67a4198
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: State transition probability matrix estimation and analysis
  description: Python library for statistical analysis and visualization of state
    transition phenomena. Estimates transition matrices from historical event data
    using cohort-based or duration-based methods, manipulates transition matrices,
    and derives credit curves from absorbing state probabilities.
  prerequisites: Basic understanding of pandas DataFrames, state transition processes,
    transition probability matrices, and numpy arrays. Familiarity with credit rating
    migration concepts helpful for credit-specific features.
  not_suitable_for: Continuous state spaces, real-time streaming data processing,
    machine learning model training, neural network-based transition modeling, or
    non-tabular data sources
stages:
- id: data_generation
  name: Synthetic Data Generation
  order: 1
  responsibility: Generate synthetic transition event datasets for testing estimators.
    Provides controlled data with known transition properties for validation and development.
  interface:
    inputs:
    - StateSpace definition
    - TransitionMatrix
    - n (entity count)
    - timesteps/events
    outputs:
    - pandas DataFrame in Compact (ID,Time,State) or Canonical (ID,Time,From,To) format
  required_methods:
  - name: exponential_transitions.generate
    description: Generates continuous-time events from exponential distribution, allowing
      testing cohorting algorithms with random events without requiring a transition
      matrix
    evidence: transitionMatrix/generators/dataset_generators.py:24(exponential_transitions)
  - name: markov_chain.generate
    description: Generates discrete events from Markov chain based on provided transition
      matrix
    evidence: transitionMatrix/generators/dataset_generators.py:54(markov_chain)
  - name: long_format.generate
    description: Generates continuous events in canonical form for duration-based
      estimator testing
    evidence: transitionMatrix/generators/dataset_generators.py:84(long_format)
  - name: deterministic.generate
    description: Generates deterministic transition sequences for controlled testing
      with known outcomes
    evidence: transitionMatrix/generators/dataset_generators.py:188(deterministic)
  key_behaviors:
  - behavior: Uniform sampling from state space
    description: Exponential transitions use np.random.choice for uniform sampling
      from state space, enabling discovery of transition patterns in real data without
      requiring a transition matrix
    evidence: transitionMatrix/generators/dataset_generators.py:48(np.random.choice)
  - behavior: Uniform event time distribution
    description: Event time within timestep calculated via uniform distribution, assuming
      continuous observation within discrete periods
    evidence: transitionMatrix/generators/dataset_generators.py:165(np.random.uniform)
  - behavior: Sorted output ordering
    description: Data sorted by entity ID then by time to match real-world data patterns
      and estimator assumptions
    evidence: transitionMatrix/generators/dataset_generators.py:41(sort_values in
      docstring pattern)
  replaceable_points:
  - name: Distribution Type
    description: Event time distribution for continuous generation
    options:
    - name: exponential
      traits:
      - continuous-time
      - memoryless
      - default
      fit_for:
      - Simulating real-world continuous transitions
      - Testing cohorting algorithms
      not_fit_for:
      - Discrete-time models
      - Known transition patterns
    - name: uniform
      traits:
      - equal probability
      - simple
      fit_for:
      - Basic testing
      - Uniform time spacing
      not_fit_for:
      - Realistic survival analysis
      - Hazard rate modeling
    - name: custom
      traits:
      - user-defined
      - flexible
      fit_for:
      - Specialized distributions
      - Research applications
      not_fit_for:
      - Quick prototyping
      - Standard use cases
    default: exponential
  - name: Initial State Distribution
    description: How entities are distributed across initial states
    options:
    - name: uniform
      traits:
      - equal probability
      - default
      fit_for:
      - Balanced testing
      - Equal representation
      not_fit_for:
      - Imbalanced real data
      - Weighted analysis
    - name: weighted
      traits:
      - probability-weighted
      - flexible
      fit_for:
      - Realistic distributions
      - Portfolio weighting
      not_fit_for:
      - Simple testing
      - Equal coverage
    - name: fixed
      traits:
      - deterministic
      - controlled
      fit_for:
      - Deterministic testing
      - Specific scenarios
      not_fit_for:
      - General testing
      - Realistic simulation
    default: uniform
  - name: Data Format
    description: Output format for generated data
    options:
    - name: Compact
      traits:
      - minimal columns
      - default
      fit_for:
      - CohortEstimator input
      - Memory efficiency
      not_fit_for:
      - Duration-based estimation
      - Transition path analysis
    - name: Canonical
      traits:
      - full transition info
      - verbose
      fit_for:
      - AalenJohansenEstimator input
      - From-To analysis
      not_fit_for:
      - Cohort estimation
      - Storage efficiency
    default: Compact
  design_decisions:
  - Exponential transitions use uniform sampling from state space - enables testing
    cohorting algorithms with random events without requiring a transition matrix.
    Allows discovery of transition patterns in real data. (transitionMatrix/generators/dataset_generators.py:48)
  - Event time within timestep calculated via uniform distribution - assumes continuous
    observation within discrete periods. Simplifies simulation while approximating
    real-world censored data. (transitionMatrix/generators/dataset_generators.py:165)
  - Data sorted by entity ID then by time - matches real-world data patterns and estimator
    assumptions that require temporal ordering per entity. (transitionMatrix/generators/dataset_generators.py:41)
  acceptance_hints:
  - 'Generated DataFrames have required columns: ID, Time, State (Compact) or ID,
    Time, From, To (Canonical)'
  - Entity count matches specified n parameter
  - Timestep range matches specified timesteps parameter
  - Data is sorted by ID then Time
- id: state_space_definition
  name: State Space Definition
  order: 2
  responsibility: Define and manage the discrete state space structure. Supports inference
    from data, rating agency scales, and CQS mappings for credit rating taxonomies.
  interface:
    inputs:
    - definition list of tuples
    - or raw transition data
    outputs:
    - StateSpace object with cardinality, labels, optional mappings
  required_methods:
  - name: StateSpace.__init__
    description: Core state space container with inference and validation capabilities
      for managing discrete state definitions
    evidence: transitionMatrix/statespaces/statespace.py:21(StateSpace)
  - name: StateSpace._infer
    description: Auto-discovers states from transition data by extracting sorted unique
      states
    evidence: transitionMatrix/statespaces/statespace.py:71(_infer)
  - name: StateSpace.validate_dataset
    description: Checks dataset consistency with state space definition and reports
      mismatches
    evidence: transitionMatrix/statespaces/statespace.py:116(validate_dataset)
  - name: StateSpace.cqs_map
    description: Maps ratings to simplified EU credit quality steps for regulatory
      compliance
    evidence: transitionMatrix/statespaces/statespace.py:180(cqs_map)
  key_behaviors:
  - behavior: Tuple-based definition structure
    description: State space defined as list of tuples (index, label) allowing extension
      with additional metadata while maintaining simple index lookup
    evidence: transitionMatrix/statespaces/statespace.py:59(self.definition = definition)
  - behavior: Sorted unique state inference
    description: State inference uses sorted unique states ensuring consistent state
      ordering across runs
    evidence: transitionMatrix/statespaces/statespace.py:78(sorted(transition_data['State'].unique()))
  - behavior: Explicit definition precedence
    description: User-specified state space takes precedence over inference to support
      custom taxonomies and ensure proper state ordering for presentation
    evidence: transitionMatrix/statespaces/statespace.py:56(pass)
  - behavior: Lazy predefined rating scales
    description: Predefined rating scales defined as tuples but commented out to avoid
      import overhead; users instantiate as needed
    evidence: transitionMatrix/__init__.py:40-274(CRR_SS, Moodys_SS, etc.)
  replaceable_points:
  - name: State Ordering
    description: How states are ordered in definition
    options:
    - name: ordinal by index
      traits:
      - default
      - index-based
      fit_for:
      - Standard analysis
      - Sequential states
      not_fit_for:
      - Alphabetical sorting needed
      - Custom hierarchies
    - name: alphabetical
      traits:
      - sorted
      - lexicographic
      fit_for:
      - Label-based ordering
      - Standard credit scales
      not_fit_for:
      - Ordinal significance
      - Custom hierarchies
    - name: custom
      traits:
      - user-defined
      - flexible
      fit_for:
      - Specialized taxonomies
      - Hierarchical states
      not_fit_for:
      - Quick setup
      - Standard use cases
    default: ordinal by index
  - name: Absorbing State Handling
    description: Treatment of absorbing states
    options:
    - name: explicit list
      traits:
      - user-defined
      - controlled
      fit_for:
      - Known absorbing states
      - Credit default analysis
      not_fit_for:
      - Unknown defaults
      - Auto-discovery needed
    - name: inferred
      traits:
      - automatic
      - data-driven
      fit_for:
      - Exploratory analysis
      - Unknown taxonomies
      not_fit_for:
      - Known absorbing states
      - Performance-critical
    - name: none
      traits:
      - no special handling
      - default (TODO)
      fit_for:
      - Simple models
      - Non-absorbing spaces
      not_fit_for:
      - Credit analysis
      - Default probability curves
    default: none (TODO per docstring)
  design_decisions:
  - State space defined as list of tuples (index, label) - tuple format allows extension
    with additional metadata while maintaining simple index lookup. Matches pandas
    data structures. (transitionMatrix/statespaces/statespace.py:59)
  - State inference uses sorted unique states - sorted order ensures consistent state
    ordering across runs but ASCII characters may produce arbitrary order per Python
    docs warning. (transitionMatrix/statespaces/statespace.py:78)
  - Explicit definition overrides inference from data - user-specified state space
    takes precedence to support custom taxonomies and ensure proper state ordering
    for presentation. (transitionMatrix/statespaces/statespace.py:56)
  - Predefined rating scales defined as tuples but commented out - avoided to reduce
    package load time; users instantiate as needed. (transitionMatrix/__init__.py:40-274)
  acceptance_hints:
  - StateSpace.cardinality returns correct number of states
  - StateSpace.labels returns list matching definition structure
  - validate_dataset returns empty list for valid datasets
  - cqs_map returns valid credit quality step values (1-6)
- id: data_preprocessing
  name: Data Preprocessing
  order: 3
  responsibility: Convert between data formats, bin timestamps into cohorts, remove
    stale events, generate statistics for downstream estimation.
  interface:
    inputs:
    - raw pandas DataFrame (Compact or Canonical)
    outputs:
    - Converted DataFrame or cohort-assigned data with bin boundaries
  required_methods:
  - name: to_canonical.convert
    description: Converts Compact format to Canonical format by inferring From states
      from previous observations
    evidence: transitionMatrix/utils/converters.py:75(to_canonical)
  - name: to_compact.convert
    description: Converts Canonical format to Compact by dropping From column for
      cohort estimation
    evidence: transitionMatrix/utils/converters.py:115(to_compact)
  - name: datetime_to_float.convert
    description: Converts date strings to normalized float [0,1] for numerical processing
    evidence: transitionMatrix/utils/converters.py:41(datetime_to_float)
  - name: bin_timestamps.apply
    description: Discretizes continuous time into cohort intervals for cohort-based
      estimation
    evidence: transitionMatrix/utils/preprocessing.py:241(bin_timestamps)
  - name: remove_stale_events.apply
    description: Filters out same-state successive observations to reduce noise in
      transition counts
    evidence: transitionMatrix/utils/preprocessing.py:209(remove_stale_events)
  - name: generate_cohort_bounds.create
    description: Creates equal-width time intervals from data range for cohort assignment
    evidence: transitionMatrix/utils/preprocessing.py:131(generate_cohort_bounds)
  key_behaviors:
  - behavior: Equal-width cohort intervals
    description: Cohorting uses equal-width intervals dividing time range to simplify
      interpretation and allow direct comparison across datasets
    evidence: transitionMatrix/utils/preprocessing.py:148(dt = (t_max - t_min) / cohorts)
  - behavior: Documented lossy transformation
    description: Cohorting is documented as 'lossy' operation as discretization discards
      intermediate transitions
    evidence: transitionMatrix/utils/preprocessing.py:258(warning docstring)
  - behavior: Bootstrap initial observation as From=To
    description: Compact to Canonical bootstrap uses first event as both From and
      To since initial observation has no prior state
    evidence: transitionMatrix/utils/converters.py:100(event_from_state[i] = state[i])
  - behavior: Keep-only-changed transitions
    description: Stale events removed by keeping only changed-state transitions to
      remove redundant observations
    evidence: transitionMatrix/utils/preprocessing.py:231(if event_list[i][1] != event_list[i
      + 1][1])
  - behavior: Pre-sorted data requirement
    description: bin_timestamps requires data to be pre-sorted - function asserts
      sorted order, produces wrong cohort assignments otherwise
    evidence: 'transitionMatrix/utils/preprocessing.py:260-261(WARNING: data must
      be sorted already)'
  replaceable_points:
  - name: Cohort Interval Type
    description: How cohort boundaries are determined
    options:
    - name: equal-width
      traits:
      - default
      - simple
      fit_for:
      - Standard analysis
      - Equal time periods
      not_fit_for:
      - Unequal observation periods
      - Custom binning
    - name: equal-frequency
      traits:
      - data-driven
      - adaptive
      fit_for:
      - Variable observation patterns
      - Unequal time coverage
      not_fit_for:
      - Standard reporting
      - Equal time analysis
    - name: custom
      traits:
      - user-defined
      - flexible
      fit_for:
      - Specialized intervals
      - Regulatory requirements
      not_fit_for:
      - Quick analysis
      - Standard workflows
    default: equal-width
  - name: Stale Event Handling
    description: Treatment of same-state successive observations
    options:
    - name: remove
      traits:
      - default
      - clean
      fit_for:
      - Standard analysis
      - Clean transitions
      not_fit_for:
      - Censoring analysis
      - Observation counts needed
    - name: keep
      traits:
      - preserving
      - verbose
      fit_for:
      - Full history
      - Censoring analysis
      not_fit_for:
      - Clean transition counts
      - Standard matrices
    - name: count-special
      traits:
      - 标记
      - tracked
      fit_for:
      - Censoring analysis
      - Special handling
      not_fit_for:
      - Simple estimation
      - Standard workflows
    default: remove
  design_decisions:
  - Cohorting uses equal-width intervals dividing time range - equal intervals simplify
    interpretation and allow direct comparison across datasets. Unequal intervals
    possible via custom bounds. (transitionMatrix/utils/preprocessing.py:148)
  - Cohorting is documented as 'lossy' operation - discretization discards intermediate
    transitions. Users must understand this when choosing cohort sizes vs time granularity.
    (transitionMatrix/utils/preprocessing.py:258)
  - Compact to Canonical bootstrap uses first event as both From and To - initial
    observation has no prior state, so From=To represents entity entering initial
    observed state. (transitionMatrix/utils/converters.py:100)
  - Stale events removed by keeping only changed-state transitions - removes redundant
    observations that add no information but affect transition counts. (transitionMatrix/utils/preprocessing.py:231)
  acceptance_hints:
  - 'Converted data has required columns: ID, Time, From, To (Canonical) or ID, Time,
    State (Compact)'
  - 'Cohort bounds define intervals: [start, start+dt, ..., end]'
  - bin_timestamps produces integer cohort assignments for each entities
  - Data remains sorted by ID then Time after preprocessing
- id: matrix_estimation
  name: Transition Matrix Estimation
  order: 4
  responsibility: Estimate transition probability matrices from historical event data
    using cohort-based or duration-based methods with confidence intervals.
  interface:
    inputs:
    - transition data DataFrame
    - StateSpace
    - optional cohort_bounds or ci parameters
    outputs:
    - TransitionMatrixSet or empirical matrix
    - confidence intervals
  required_methods:
  - name: SimpleEstimator.fit
    description: Single-period frequency-based estimation for basic transition counting
    evidence: transitionMatrix/estimators/simple_estimator.py:22(SimpleEstimator)
  - name: CohortEstimator.fit
    description: Multi-period cohort-based estimation with confidence intervals for
      discrete-time analysis
    evidence: transitionMatrix/estimators/cohort_estimator.py:24(CohortEstimator)
  - name: AalenJohansenEstimator.fit
    description: Non-parametric duration-based estimator for continuous time using
      Nelson-Aalen theory
    evidence: transitionMatrix/estimators/aalen_johansen_estimator.py:23(AalenJohansenEstimator)
  - name: BaseEstimator.get_matrix
    description: Abstract base providing matrix_set, count_set, summary printing for
      each estimators
    evidence: transitionMatrix/estimators/__init__.py:18(BaseEstimator)
  key_behaviors:
  - behavior: Goodman multinomial confidence intervals
    description: Estimators use Goodman multinomial confidence intervals which are
      conservative and appropriate for small samples
    evidence: transitionMatrix/estimators/cohort_estimator.py:190(st.multinomial_proportions_confint)
  - behavior: CohortEstimator timestep shifting
    description: CohortEstimator shifts time index for boundary handling, using previous
      timestep for cohort boundary calculation
    evidence: transitionMatrix/estimators/cohort_estimator.py:153(tm_count[(entity_state[i],
      event_time[i] - 1)])
  - behavior: Aalen-Johansen identity initialization
    description: Aalen-Johansen initializes with identity matrix at t=0 since probability
      of staying in initial state is 1
    evidence: transitionMatrix/estimators/aalen_johansen_estimator.py:154(etm[:, :,
      0] = np.eye(state_dim))
  - behavior: Format-specific data requirements
    description: CohortEstimator expects Compact format (ID, Time, State) while AalenJohansen
      expects Canonical format (ID, Time, From, To)
    evidence: transitionMatrix/estimators/cohort_estimator.py:48-84(CohortEstimator.fit),
      aalen_johansen_estimator.py:41-76(AalenJohansenEstimator.fit)
  - behavior: Sort order requirements
    description: CohortEstimator requires data sorted by (ID, Time) while AalenJohansen
      requires (Time, ID) ascending - opposite order
    evidence: cohort_estimator.py:138-146, aalen_johansen_estimator.py:112-132
  replaceable_points:
  - name: CI Method
    description: Confidence interval calculation method
    options:
    - name: goodman
      traits:
      - conservative
      - default
      fit_for:
      - Small samples
      - Standard analysis
      not_fit_for:
      - Large datasets
      - Precise intervals
    - name: sison-glaz
      traits:
      - smoothed
      - balanced
      fit_for:
      - Moderate samples
      - Balanced categories
      not_fit_for:
      - Extreme proportions
      - Very small samples
    - name: binomial
      traits:
      - standard
      - parametric
      fit_for:
      - Large samples
      - Proportion estimation
      not_fit_for:
      - Small samples
      - Multinomial setting
    - name: none
      traits:
      - no uncertainty
      - fast
      fit_for:
      - Point estimates
      - Performance-critical
      not_fit_for:
      - Risk analysis
      - Reporting requirements
    default: goodman
  - name: Temporal Assumption
    description: Homogeneity assumption for averaging
    options:
    - name: homogeneous
      traits:
      - constant rates
      - default
      fit_for:
      - Standard analysis
      - Stationary processes
      not_fit_for:
      - Time-varying transitions
      - Market stress
    - name: inhomogeneous
      traits:
      - time-varying
      - complex
      fit_for:
      - Non-stationary data
      - Regime changes
      not_fit_for:
      - Simple models
      - Short time series
    default: homogeneous
  - name: Estimator Type
    description: Underlying estimation methodology
    options:
    - name: frequency-based
      traits:
      - cohort-based
      - default
      fit_for:
      - Discrete time
      - Standard credit analysis
      not_fit_for:
      - Continuous time
      - Censored data
    - name: duration-based
      traits:
      - survival analysis
      - continuous
      fit_for:
      - Continuous time
      - Censored observations
      not_fit_for:
      - Discrete periods
      - Simple counting
    default: frequency-based
  design_decisions:
  - Estimators use Goodman multinomial confidence intervals - Goodman method is conservative
    and appropriate for small samples. statsmodels library provides this directly.
    (transitionMatrix/estimators/cohort_estimator.py:190)
  - CohortEstimator shifts time index for boundary handling - last observation uses
    previous timestep for cohort boundary calculation, ensuring proper cohort assignment.
    (transitionMatrix/estimators/cohort_estimator.py:153)
  - Aalen-Johansen initializes with identity matrix at t=0 - at time zero, probability
    of staying in initial state is 1. Recursive formula then builds cumulative probabilities.
    (transitionMatrix/estimators/aalen_johansen_estimator.py:154)
  - Aalen-Johansen requires data pre-sorted by time - recursive algorithm assumes
    chronological processing. Sorting is user's responsibility per docstring. (transitionMatrix/estimators/aalen_johansen_estimator.py:71)
  - No @abstractmethod decorators used - concrete base classes provide reusable structure
    but leave fit() to subclasses. Simpler than ABC pattern. (grep_codebase result
    - no matches)
  - Confidence interval method validated against allowed list - only specific methods
    from statsmodels are supported. Prevents runtime errors from unsupported CI methods.
    (transitionMatrix/estimators/cohort_estimator.py:40)
  acceptance_hints:
  - Estimated matrix rows sum to 1.0 (within accuracy threshold 1e-3)
  - Every matrix values are between 0 and 1
  - TransitionMatrixSet temporal_type is either 'Incremental' or 'Cumulative'
  - Confidence intervals present when ci parameter provided
  - Matrix cardinality matches StateSpace cardinality
- id: matrix_storage
  name: Transition Matrix Storage and Operations
  order: 5
  responsibility: Store single and multi-period transition matrices, enforce stochastic
    constraints, perform mathematical operations and validation.
  interface:
    inputs:
    - matrix values, json/csv files, or list of matrices
    outputs:
    - TransitionMatrix/TransitionMatrixSet with validation status, matrices in various
      formats
  required_methods:
  - name: TransitionMatrix.__init__
    description: Single-period stochastic matrix inheriting from np.matrix with validation
      and operations
    evidence: transitionMatrix/model.py:48(TransitionMatrix)
  - name: TransitionMatrixSet.__init__
    description: Time-ordered collection with incremental/cumulative types for multi-period
      analysis
    evidence: transitionMatrix/model.py:361(TransitionMatrixSet)
  - name: TransitionMatrix.validate
    description: Validates stochastic properties (rowsum=1, values in [0,1]) with
      configurable accuracy
    evidence: transitionMatrix/model.py:213-220
  - name: matrix_exponent.compute
    description: Computes matrix exponential for generator conversion between continuous
      and discrete time
    evidence: transitionMatrix/model.py:34(matrix_exponent)
  key_behaviors:
  - behavior: np.matrix inheritance (deprecated)
    description: TransitionMatrix inherits from np.matrix which will be deprecated
      per numpy docs but provides convenient matrix operations like .I inverse, .T
      transpose
    evidence: transitionMatrix/model.py:48(class TransitionMatrix(np.matrix))
  - behavior: Lazy validation
    description: Validation is lazy (not done at construction) - construction skips
      validation for performance, user must call validate() explicitly
    evidence: transitionMatrix/model.py:107(obj.validated = False)
  - behavior: Diagonal-only rowsum correction
    description: Row sums enforced by adjusting diagonal, not redistributing, preserving
      off-diagonal transition probabilities
    evidence: transitionMatrix/model.py:162(fix_rowsums modifies diagonal)
  - behavior: Negative rate flipping
    description: Negative rates fixed by flipping and adjusting diagonal to maintain
      row sum constraint
    evidence: transitionMatrix/model.py:248(generator[i, j] = -generator[i, j])
  - behavior: Copy/Power/None method semantics
    description: 'TransitionMatrixSet uses Copy/Power/As-Is methods for multi-period:
      Copy duplicates single matrix; Power raises to powers (cumulative); None uses
      raw input'
    evidence: transitionMatrix/model.py:416(method == 'Copy')
  - behavior: Matrix logarithm for generators
    description: Generator computation uses matrix logarithm (logm) to convert discrete
      matrices to continuous-time generators
    evidence: transitionMatrix/model.py:241(generator = logm(self) / t)
  replaceable_points:
  - name: Initialization Source
    description: How to initialize matrix values
    options:
    - name: values
      traits:
      - direct
      - explicit
      fit_for:
      - Known matrices
      - Testing
      not_fit_for:
      - File-based data
      - Identity initialization
    - name: json_file
      traits:
      - file-based
      - serialized
      fit_for:
      - Standard formats
      - Exchange formats
      not_fit_for:
      - CSV data
      - Direct values
    - name: csv_file
      traits:
      - tabular
      - common
      fit_for:
      - Spreadsheet data
      - Simple formats
      not_fit_for:
      - JSON data
      - Complex structures
    - name: identity
      traits:
      - default
      - unit matrix
      fit_for:
      - Initial states
      - No transitions
      not_fit_for:
      - Real matrices
      - Historical data
    default: identity
  - name: Fix Method
    description: How to correct invalid rowsums
    options:
    - name: diagonal-adjust
      traits:
      - preserves off-diagonal
      - default
      fit_for:
      - Migration analysis
      - Credit matrices
      not_fit_for:
      - Uniform correction needed
    - name: redistribute
      traits:
      - proportional
      - balanced
      fit_for:
      - Uniform correction
      - Balanced approach
      not_fit_for:
      - Migration analysis
      - Credit matrices
    default: diagonal-adjust
  design_decisions:
  - TransitionMatrix inherits from np.matrix (deprecated) - np.matrix will be deprecated
    per numpy docs but provides convenient matrix operations. Inheritance enables
    .I inverse, .T transpose, * multiplication. (transitionMatrix/model.py:48)
  - Validation is lazy (not done at construction) - construction skips validation
    for performance. User must call validate() explicitly. Allows loading invalid
    matrices for manual fixing. (transitionMatrix/model.py:107)
  - Row sums enforced by adjusting diagonal, not redistributing - diagonal adjustment
    preserves off-diagonal transition probabilities. Alternative redistribution would
    change migration behavior. (transitionMatrix/model.py:162)
  - Negative rates fixed by flipping and adjusting diagonal - negative off-diagonal
    in generator becomes positive rate. Diagonal adjustment maintains row sum constraint.
    (transitionMatrix/model.py:248)
  - TransitionMatrixSet uses Copy/Power/As-Is methods for multi-period - Copy duplicates
    single matrix; Power raises to powers (cumulative); None uses raw input. Clear
    semantics for common use cases. (transitionMatrix/model.py:416)
  - Generator computation uses matrix logarithm - continuous-time generator is log
