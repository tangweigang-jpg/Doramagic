  rationale: 'The method parameter establishes the construction pattern governing
    how matrices are created throughout the system. This architectural decision affects
    memory management (copy vs. reference), performance characteristics, and data
    flow assumptions. The boundary: understanding the construction pattern is essential
    for reasoning about matrix lifecycle and avoiding aliasing bugs.'
  evidence: model.py:416-448(__init__)
