  type: BA
  content: Cohorting is documented as 'lossy' operation
  rationale: 'Cohorting documentation explicitly warns users that discretization discards
    intermediate transitions. Users must understand this when choosing cohort sizes
    versus time granularity trade-offs. BOUNDARY: Lossiness is inherent to any discretization;
    no option exists to preserve each intermediate states within a cohort.'
