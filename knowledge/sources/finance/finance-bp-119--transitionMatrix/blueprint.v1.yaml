      - Conventional rating hierarchies
      not_fit_for:
      - Non-standard matrices
      - Custom taxonomies
    - name: explicit
      traits:
      - user-defined
      - flexible
      fit_for:
      - Non-standard matrices
      - Custom absorbing states
      not_fit_for:
      - Standard credit scales
      - Quick analysis
    default: last
  design_decisions:
  - CreditCurve validates monotonicity (non-decreasing) - default probabilities must
    increase over time. Non-monotonic curves indicate model error. (transitionMatrix/creditratings/creditcurve.py:128)
  - Default curves use absorbing state probability from matrix diagonal - in absorbing
