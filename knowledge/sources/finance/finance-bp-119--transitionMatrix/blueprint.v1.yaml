  - name: default_curve_set.calculate
    description: Calculates cumulative default probabilities for each ratings from
      TransitionMatrixSet
    evidence: transitionMatrix/model.py:682(default_curve_set)
  - name: default_curves.calculate
    description: Calculates incremental default probability per period for each rating
    evidence: transitionMatrix/model.py:653(default_curves)
  - name: hazard_curve.compute
