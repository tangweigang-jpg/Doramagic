    evidence: transitionMatrix/creditratings/creditcurve.py:128(curve_set[i, j] <
      curve_set[i, j - 1])
  - behavior: Absorbing state diagonal extraction
    description: Default curves use absorbing state probability from matrix diagonal
      where 1-diagonal represents cumulative default probability
    evidence: transitionMatrix/model.py:659(self.entries[k][rating, absorbing])
  - behavior: Last state as default assumption
    description: Default state is hardcoded as dimension-1 (last index) assuming highest-indexed
      state is absorbing/default
    evidence: transitionMatrix/model.py:662(default_curves), model.py:686(default_curve_set)
  replaceable_points:
  - name: Absorbing State
    description: Which state is considered absorbing (default)
    options:
    - name: last
      traits:
