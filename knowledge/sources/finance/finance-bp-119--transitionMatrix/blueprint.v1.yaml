- id: BD-011
  type: B/BA
  content: Stale events removed by keeping only changed-state transitions
  rationale: 'Redundant observations that add no information are removed to prevent
    double-counting of transitions. This improves estimator accuracy by eliminating
    within-state dwell time inflation. BOUNDARY: Removal assumes no meaningful transition
    information exists between identical consecutive states; this is valid only when
    observation frequency is not itself analytically significant.'
