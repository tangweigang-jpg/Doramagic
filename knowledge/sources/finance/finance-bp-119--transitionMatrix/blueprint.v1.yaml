- id: BD-010
  type: B/BA
  content: Compact to Canonical bootstrap uses first event as both From and To
  rationale: 'The initial observation has no prior state, so setting From=To represents
    the entity entering its initial observed state. This bootstrap approach allows
    the converter to handle entity histories starting mid-observation period. BOUNDARY:
    This creates a self-loop at the initial state; downstream estimators must handle
    or ignore these zero-duration transitions.'
