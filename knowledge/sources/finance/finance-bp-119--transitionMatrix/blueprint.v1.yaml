- id: BD-116
  type: B/BA
  content: TransitionMatrixSet method parameter (Copy/Power/None) changes initialization
    behavior and resulting matrix values
  rationale: 'The method parameter controls how TransitionMatrixSet constructs matrices:
    ''Copy'' duplicates input matrices, ''Power'' applies matrix exponentiation, None
    uses direct reference. Each produces fundamentally different matrix values. The
    boundary: wrong method choice produces incorrect matrix sets.'
  evidence: model.py:416-448(__init__)
  stage: pattern_choice
