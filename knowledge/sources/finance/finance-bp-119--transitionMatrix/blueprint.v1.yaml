- id: BD-120
  type: B/RC
  content: 'INTERACTION: [BD-106] × [BD-107] × [BD-119] → Sorting contracts conflict:
    CohortEstimator requires (ID,Time) while AalenJohansen requires (Time,ID), and
    bin_timestamps issues warning without enforcement'
  rationale: CohortEstimator.fit() (BD-106) mandates (ID, Time) sorting while AalenJohansenEstimator.fit()
    (BD-107) requires (Time, ID) sorting in opposite order. Meanwhile, bin_timestamps
    (BD-119) issues warnings about sorting but doesn't enforce it. This creates a
    CONTRADICTION where users switching between estimators must re-sort data or face
    silent data corruption. The boundary conditions for each estimator's sort contract
    are incompatible, requiring callers to manage dual data preparation pipelines.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unified sort wrapper was considered but rejected due to
    performance overhead for single-estimator workflows
- id: BD-121
  type: BA
  content: 'INTERACTION: [BD-113] × [BD-010] × [BD-059] × [BD-060] → Data format contract
    violation: Compact/Canonical schemas incompatible between estimators and converters'
  rationale: 'CohortEstimator expects Compact format (ID, Time, State) per BD-113
    while AalenJohansenEstimator expects Canonical format (ID, Time, From, To). The
    to_canonical converter (BD-059) transforms Compact to Canonical by bootstrapping
    initial states (BD-010), but the reverse conversion (BD-060) loses transition
    direction information. This HIDDEN DEPENDENCY means callers must understand format
    semantics before estimator selection, and schema mismatches produce silent garbage
    or AttributeError. The boundary: schema conversion must occur before calling fit().'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Unified schema with auto-detection was considered but rejected
    due to detection ambiguity
- id: BD-122
  type: BA
  content: 'INTERACTION: [BD-019] × [BD-034] × [BD-073] × [BD-020] × [BD-021] × [BD-035]
    × [BD-036] → Lazy validation amplifies matrix correction ambiguity: invalid matrices
    pass through until explicit validation call'
  rationale: 'Every matrix objects start unvalidated (BD-019) and require explicit
    validation (BD-034 with 1e-3 threshold per BD-073). Meanwhile, fix_rowsums() (BD-020,
    BD-035) and fix_negativerates() (BD-021, BD-036) modify matrices without triggering
    validation. This creates AMPLIFICATION where corrections occur on potentially
    invalid input, producing matrices that may still fail validation, requiring multiple
    correction cycles. The boundary: validation is a deliberate act, not an implicit
    safety net, so correction results may be unpredictable.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Auto-validation after corrections was considered but rejected
    for performance in batch processing
- id: BD-123
  type: BA/DK
  content: 'INTERACTION: [BD-112] × [BD-025] × [BD-027] × [BD-041] × [BD-051] → Hidden
    absorbing state dependency: hardcoded last-index assumption couples default_curve
    extraction to state space construction'
  rationale: 'Default state is hardcoded as dimension-1 (highest index) per BD-112,
    which BD-025 assumes when extracting default curves from matrix diagonal. BD-027
    enforces Default as last state, while BD-041 and BD-051 set absorbing states explicitly.
    This HIDDEN DEPENDENCY means any change to state ordering (via BD-006 override
    of BD-005 inference) could misidentify the absorbing state, producing garbage
    default probabilities. The boundary: state space must maintain last-index convention
    for Default state.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Explicit absorbing_state parameter was considered but would
    require changes to each StateSpace construction calls
- id: BD-124
  type: BA
  content: 'INTERACTION: [BD-110] × [BD-022] × [BD-037] × [BD-038] × [BD-039] × [BD-066]
    × [BD-089] × [BD-090] → Systemic risk cascade: temporal_type default governs matrix
    accumulation semantics affecting each multi-period operations'
  rationale: 'TransitionMatrixSet defaults to temporal_type=''Incremental'' (BD-110),
    controlling cumulate/incremental operations (BD-037). This affects method parameter
    behavior (BD-022, BD-066), Power method (BD-038), generator exponentiation (BD-039),
    cumulative computation (BD-089), and incremental derivation (BD-090). A RISK CASCADE
    occurs when users assume ''Incremental'' but provide cumulative matrices (or vice
    versa), producing incorrect multi-period projections. The boundary: temporal_type
    must match data semantics for each temporal operations.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Auto-detect from data was considered but rejected for clarity;
    explicit flag avoids heuristics
- id: BD-125
  type: BA
  content: 'INTERACTION: [BD-018] × [BD-023] × [BD-039] × [BD-083] × [BD-084] × [BD-104]
    × [BD-114] → Numpy deprecation risk cascade: np.matrix inheritance threatens matrix
    logarithm, exponential, and interpolation operations'
  rationale: 'TransitionMatrix inherits from deprecated np.matrix (BD-018, BD-114),
    which couples generator computation via logm (BD-023, BD-083), matrix exponential
    (BD-039, BD-084), and gap-period interpolation (BD-104). When numpy removes np.matrix,
    these operations will fail or require refactoring. This RISK CASCADE creates technical
    debt that blocks numpy upgrades and threatens each downstream computations. The
    boundary: migration to np.ndarray required before numpy removes np.matrix.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Immediate migration was deferred due to scope; tracked as
    known debt
- id: BD-126
  type: B/BA
  content: 'INTERACTION: [BD-002] × [BD-047] × [BD-015] × [BD-009] × [BD-050] → Multi-stage
    timing bias cascade: uniform event time placement combined with lossy cohorting
    and forward-fill produces systematic underestimation'
  rationale: 'Event time within timestep uses uniform distribution (BD-002, BD-047),
    which assumes continuous observation within discrete periods. This interacts with
    lossy cohorting (BD-009) where sub-interval transitions are discarded, and forward-fill
    for missing states (BD-050) assumes state persistence. Combined with Aalen-Johansen''s
    requirement for pre-sorted data (BD-015), these approximations create AMPLIFICATION
    of timing uncertainty that systematically underestimates early-period transition
    rates. The boundary: these simplifications are valid only when observation frequency
    matches analytical cadence.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Poisson point processes were considered for more realistic
    event timing but add complexity
- id: BD-127
  type: B/BA
  content: 'INTERACTION: [BD-008] × [BD-005] × [BD-006] × [BD-026] → Equal-width interval
    inconsistency: cohort discretization vs state inference use different binning
    semantics'
  rationale: 'Cohorting uses equal-width intervals dividing time range (BD-008) for
    temporal discretization. State inference sorts unique states (BD-005) using ASCII
    ordering which may be non-intuitive. User explicit definition (BD-006) can override
    inference. The 8-state S&P scale (BD-026) is standard but may conflict with inferred
    ordering. This creates AMPLIFICATION where users who don''t explicitly define
    state space get counterintuitive ordering that diverges from regulatory conventions.
    The boundary: explicit definition required for regulatory-grade rating taxonomies.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Alphanumeric sorting with locale-awareness was considered
    but adds dependency complexity
