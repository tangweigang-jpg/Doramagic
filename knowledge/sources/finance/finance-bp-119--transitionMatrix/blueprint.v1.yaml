    not_fit_for:
    - Interactive visualizations, web applications, 3D plots
  - name: plotly
    traits:
    - interactive
    - web_exportable
    - 3d_support
    fit_for:
    - Dashboards, web applications, interactive exploration
    not_fit_for:
    - Publication-quality static images, offline reports
  - name: seaborn
    traits:
    - statistical_plots
    - matplotlib_based
    - aesthetics
    fit_for:
    - Statistical visualizations, attractive default styles
    not_fit_for:
    - Custom visualizations, non-standard chart types
  default: matplotlib
  _source: worker_resource
- id: res-slot-003
  type: replaceable_component
  name: linear_algebra_backend
  path: null
  description: Use SciPy sparse for state spaces > 1000 states with sparse transition
    matrices
  used_in_stages: []
  options:
  - name: NumPy (default)
    traits:
    - cpu_bound
    - blas_accelerated
    - standard
    fit_for:
    - Most use cases, standard transition matrix operations
    not_fit_for:
    - Very large matrices (>10K states), GPU acceleration needs
  - name: SciPy sparse matrices
    traits:
    - memory_efficient
    - large_systems
    fit_for:
    - Very large state spaces with sparse transitions
    not_fit_for:
    - Small dense matrices, operations without sparse support
  default: NumPy
  _source: worker_resource
- id: res-slot-004
  type: replaceable_component
  name: confidence_interval_method
  path: null
  description: Choose based on sample size and coverage requirements
  used_in_stages: []
  options:
