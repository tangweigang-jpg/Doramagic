  rationale: 'StateSpace encodes states as (index, label) tuples throughout the codebase.
    Every label access uses tuple[1]. This structural requirement is deeply embedded
    — any change to the tuple format would break label retrieval across multiple modules.
    The boundary: maintain (index, label) tuple structure for each StateSpace operations.'
  evidence: statespace.py:80-85(_infer), statespace.py:146-147(get_state_labels)
