- id: credit_curve_extraction
  name: Credit Curve Extraction
  order: 6
  responsibility: Derive cumulative default probabilities and hazard rates from transition
    matrices with absorbing states for credit risk analysis.
  interface:
    inputs:
    - TransitionMatrixSet with absorbing state
    outputs:
    - CreditCurve matrix (rows=ratings, cols=periods)
  required_methods:
  - name: CreditCurve.__init__
