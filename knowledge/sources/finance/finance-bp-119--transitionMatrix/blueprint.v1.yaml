    silently or crashes if states is None or missing cardinality
  rationale: 'Estimators access states.cardinality to determine the number of states
    for matrix initialization and loop bounds. If states is None or lacks cardinality,
    the estimator either silently uses wrong dimensions or crashes with AttributeError.
    The boundary: callers must provide a valid StateSpace object with cardinality
    before calling fit().'
  evidence: cohort_estimator.py:91(states.cardinality), aalen_johansen_estimator.py:90(states.cardinality)
  stage: invariant
  alternative_considered: Validation with clear error message was considered — should
