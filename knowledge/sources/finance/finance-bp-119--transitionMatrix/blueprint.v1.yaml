- id: BD-119
  type: RC
  content: bin_timestamps requires data to be pre-sorted — function issues warning
    but produces wrong cohort assignments otherwise
  rationale: 'bin_timestamps relies on ascending time order to correctly assign observations
    to temporal bins. The function issues a WARNING about pre-sorting but doesn''t
    enforce it, allowing incorrect cohort assignments when violated. The boundary:
    data must be sorted by time before calling bin_timestamps — the function assumes
    but doesn''t verify sorted input.'
  evidence: transitionMatrix/utils/preprocessing.py:260-261(preprocessing)
  stage: ordering_contract
