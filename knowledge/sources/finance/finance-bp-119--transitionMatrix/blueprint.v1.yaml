    traits:
    - multinomial
    - asymptotic
    - conservative
    fit_for:
    - Large samples, standard confidence intervals
    not_fit_for:
    - Small samples, exact intervals required
  - name: Sison-Glaz
    traits:
    - multinomial
    - exact_approximation
    fit_for:
