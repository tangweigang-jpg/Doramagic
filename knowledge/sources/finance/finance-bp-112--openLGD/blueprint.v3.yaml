# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-112
name: openLGD
sop_version: '3.6'
source:
  projects:
  - openLGD
  commit_hash: 742a770b1aa9b3ed8b724a8e9fdb596893e1f209
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Credit Risk LGD Model Estimation
  description: Federated learning framework for credit risk LGD (Loss Given Default) models using stochastic
    gradient descent regression. Supports both standalone and distributed federated modes with parameter
    averaging across multiple servers.
  prerequisites: Understanding of LGD credit risk models, federated learning concepts (FedAvg), Flask/HTTP
    REST APIs, and sklearn SGDRegressor. Basic knowledge of YAML configuration.
  not_suitable_for: Production deployment (early alpha status), centralized data scenarios, complex non-linear
    LGD models, high-security production environments (Flask debug=True enabled), large-scale federated
    deployments with many servers (sequential communication bottleneck).
stages:
- id: data_acquisition
  name: Data Acquisition
  order: 1
  responsibility: Retrieves LGD regression data from either local CSV files or REST API endpoints. Supports
    two transport modes enabling development and production deployments without code changes.
  interface:
    inputs: 'server_id (int), choice (int: 1=local CSV, 2=REST API)'
    outputs: pandas.DataFrame with columns X (target/LGD) and Y (explanatory variable)
  required_methods:
  - name: dataSource
    description: Module-level function that retrieves LGD data based on choice parameter - local CSV (choice=1)
      reads from server_dirs/{server_id}/regression_data.csv while REST API (choice=2) fetches from server
      URLs
    evidence: dataSource.py:24(dataSource)
  key_behaviors:
  - behavior: Transport layer abstraction via choice parameter
    description: Single dataSource function handles both local file retrieval and REST API calls based
      on choice parameter, avoiding conditional imports or factory patterns
    evidence: dataSource.py:24(dataSource)
  - behavior: Port-derived server ID convention
    description: Server ID derived from port via n = int(port) - 5000 convention. Ports 5001-500N map
      to server_dirs/1-N respectively
    evidence: model_server.py:35(n = int(port) - 5000)
  - behavior: Hardcoded column schema (X, Y)
    description: DataFrame columns are hardcoded as 'X' (target) and 'Y' (explanatory). These business
      assumptions require coordinated updates across CSV files and API consumers
    evidence: dataSource.py:48(df = pd.DataFrame(..., columns=['X', 'Y']))
  replaceable_points:
  - name: Data Transport Layer
    description: Choice parameter selects between local file and REST API data retrieval
    options:
    - name: local CSV
      traits:
      - Direct file system access
      - Zero network latency
      - No HTTP overhead
      - Simple deployment
      fit_for:
      - Development
      - Single-machine testing
      - Low-latency requirements
      - Demo environments
      not_fit_for:
      - Distributed data across machines
      - Cross-organization data access
      - Data behind firewalls
    - name: REST API
      traits:
      - Network-based transport
      - HTTP protocol
      - Platform-independent
      - Remote data access
      fit_for:
      - Distributed data sources
      - Cross-organization federated learning
      - Microservices architecture
      not_fit_for:
      - Local development without server
      - High-frequency access patterns
      - Low-latency requirements
    default: local CSV
  design_decisions:
  - 'Choice parameter controls data transport rather than separate functions - Single entry point enables
    runtime transport switching without code duplication - evidence: dataSource.py:24(dataSource)'
  - 'Port-derived server ID convention (port - 5000 = server number) - Tight coupling between server port
    and data directory but eliminates explicit ID passing - evidence: model_server.py:35(n = int(port)
    - 5000)'
  - 'Hardcoded data schema (X, Y column names) - Column names are business assumptions baked into data
    layer requiring coordinated updates - evidence: dataSource.py:73(lgdModel), dataSource.py:48(df =
    pd.DataFrame(..., columns=[''X'', ''Y'']))'
  acceptance_hints:
  - Returned DataFrame contains exactly 'X' and 'Y' columns
  - Local file mode (choice=1) successfully reads from server_dirs/{server_id}/regression_data.csv
  - API mode (choice=2) constructs correct URL and receives valid response
  - Missing directories or wrong server ID raises FileNotFoundError appropriately
- id: model_estimation
  name: Model Estimation
  order: 2
  responsibility: Executes iterative linear regression using stochastic gradient descent. Supports warm-start
    mode for federated learning where prior averaged parameters initialize local estimation.
  interface:
    inputs: server_id, choice, optional intercept/coef (warm-start parameters)
    outputs: dict with 'intercept' and 'coefficient' keys containing SGDRegressor fitted parameters
  required_methods:
  - name: lgdModel
    description: Main estimation function wrapping sklearn SGDRegressor with support for cold-start (random
      initialization) and warm-start (prior parameters) modes. Returns parameter dictionary for federated
      aggregation
    evidence: lgdModel.py:24(lgdModel)
  key_behaviors:
  - behavior: Single-epoch iterative control
    description: SGDRegressor configured with max_iter=1 and tol=None for per-epoch parameter updates
      required by federated averaging. tol=None prevents early stopping that would break epoch-by-epoch
      control
    evidence: lgdModel.py:60(clf = linear_model.SGDRegressor(tol=None, max_iter=1, ...))
  - behavior: Warm-start via sklearn initialization parameters
    description: Uses intercept_init and coef_init parameters to initialize SGDRegressor with prior averaged
      parameters from federated coordination. sklearn's warm_start mechanism reuses prior solution as
      initialization
    evidence: lgdModel.py:81(clf.fit(X, y, intercept_init=intercept, coef_init=coef))
  - behavior: Implicit cold/warm start toggle
    description: None-checking of intercept/coef determines cold-start vs warm-start without explicit
      mode flag. First call always cold-start, subsequent calls with parameters warm-start
    evidence: lgdModel.py:78(if intercept is None or coef is None)
  replaceable_points:
  - name: Regression Algorithm
    description: Currently fixed to sklearn SGDRegressor. Would need abstract base class with factory
      pattern for alternatives
    options:
    - name: SGDRegressor (current)
      traits:
      - Iterative online learning
      - Supports warm_start via intercept_init/coef_init
      - Stochastic gradient descent
      fit_for:
      - Federated learning
      - Large-scale data
      - Streaming data
      - Per-epoch updates
      not_fit_for:
      - Small datasets
      - Exact closed-form solutions required
      - Batch-only scenarios
    - name: Ridge Regression
      traits:
      - L2 regularization
      - Closed-form solution available
      - Batch learning
      fit_for:
      - Multicollinearity problems
      - Small-medium datasets
      - Stable solutions
      not_fit_for:
      - Federated learning (no native warm_start)
      - Large datasets
      - Online learning
    - name: Lasso Regression
      traits:
      - L1 regularization
      - Feature selection capability
      - Sparse solutions
      fit_for:
      - High-dimensional data
      - Feature selection tasks
      - Interpretability focus
      not_fit_for:
      - Federated learning
      - Correlated features
      - Multi-output problems
    - name: ElasticNet
      traits:
      - L1+L2 regularization balance
      - Combines feature selection and stability
      fit_for:
      - Correlated high-dimensional data
      - Feature selection with stability
      not_fit_for:
      - Federated learning
      - Simple use cases
      - IID data with no multicollinearity
    default: SGDRegressor (current)
  design_decisions:
  - 'SGDRegressor with max_iter=1 for iterative control - Single-epoch fits enable per-epoch parameter
    updates required by federated averaging - evidence: lgdModel.py:60(clf = linear_model.SGDRegressor(tol=None,
    max_iter=1, ...))'
  - 'Warm-start via intercept_init/coef_init parameters - sklearn''s warm_start mechanism reuses prior
    solution as initialization enabling federated averaging - evidence: lgdModel.py:81(clf.fit(X, y, intercept_init=intercept,
    coef_init=coef))'
  - 'None-checking as cold/warm start toggle - Implicit parameter presence indicates initialization state,
    no explicit mode flag needed - evidence: lgdModel.py:78(if intercept is None or coef is None)'
  - 'SGDRegressor hardcoded (not abstracted or configurable) - Early alpha tradeoff: single algorithm
    avoids abstraction complexity - evidence: lgdModel.py:60(linear_model.SGDRegressor)'
  acceptance_hints:
  - Function returns dict with 'intercept' and 'coefficient' keys
  - First call with None parameters produces cold-start (random initialization)
  - Subsequent calls with non-None parameters produce warm-start (prior initialization)
  - max_iter=1 setting produces exactly one gradient step per call
- id: model_serving
  name: Model Serving
  order: 3
  responsibility: Flask-based HTTP server that exposes LGD estimation via REST endpoints. Each server
    instance maintains local data access and provides cold-start and warm-start estimation paths.
  interface:
    inputs: HTTP GET /start (cold-start), HTTP POST /update with JSON body containing intercept and coefficient
      (warm-start)
    outputs: 'JSON {''intercept'': float, ''coefficient'': float} containing fitted model parameters'
  required_methods:
  - name: start_calculation
    description: HTTP GET endpoint that extracts server ID from Host header, triggers cold-start LGD estimation
      using local data without warm parameters, returns JSON with fitted intercept and coefficient
    evidence: model_server.py:32(start_calculation)
  - name: update_calculation
    description: HTTP POST endpoint that extracts server ID from Host header and receives averaged parameters
      in JSON body, triggers warm-start LGD estimation, returns updated parameters
    evidence: model_server.py:40(update_calculation)
  key_behaviors:
  - behavior: Port-based server identification
    description: 'Server ID extracted from request Host header via port parsing: n = int(port) - 5000.
      Server on port 5001 maps to server ID 1. Assumes servers run on ports 5001-500N consecutively'
    evidence: model_server.py:33(url = urlparse(request.host)), model_server.py:35(n = int(port) - 5000)
  - behavior: Three-endpoint minimal API design
    description: Minimal API with health check (/), cold-start (/start), and warm-start (/update) endpoints.
      Stateless design enables horizontal scaling of model servers
    evidence: model_server.py:50(@app.route('/start')), model_server.py:56(@app.route('/update'))
  - behavior: Signal-based graceful shutdown
    description: Uses SIGKILL/SIGTERM signal handling with werkzeug fallback for graceful server shutdown
    evidence: model_server.py:66(sig = getattr(signal, 'SIGKILL', signal.SIGTERM))
  replaceable_points:
  - name: Server Framework
    description: Currently Flask, could be replaced with FastAPI or Django for different capabilities
    options:
    - name: Flask (current)
      traits:
      - Lightweight WSGI framework
      - Mature ecosystem
      - Flexible routing
      fit_for:
      - Microservices
      - Simple REST APIs
      - Prototyping
      - Python web applications
      not_fit_for:
      - Async operations
      - High concurrency requirements
      - Type safety requirements
    - name: FastAPI
      traits:
      - Async native
      - Automatic OpenAPI documentation
      - Type hints
      fit_for:
      - High concurrency
      - Modern async patterns
      - Self-documenting APIs
      not_fit_for:
      - Legacy WSGI integration
      - Simple prototypes
      - Blocking-only code
    - name: Django
      traits:
      - Full-stack framework
      - Built-in ORM
      - Admin interface
      fit_for:
      - Complex web applications
      - Database-driven apps
      - Enterprise applications
      not_fit_for:
      - Microservices
      - Lightweight APIs
      - Simple model serving
    default: Flask (current)
  design_decisions:
  - 'Port-to-server-ID derivation at runtime - Avoids explicit server ID configuration - evidence: model_server.py:35(n
    = int(port) - 5000)'
  - 'Server ID derived from request.host header parsing - Relies on Flask''s request object and correct
    Host header from clients - evidence: model_server.py:33(url = urlparse(request.host))'
  - 'Signal-based shutdown via SIGKILL/SIGTERM selection - Graceful fallback pattern from SIGKILL to SIGTERM
    - evidence: model_server.py:66(sig = getattr(signal, ''SIGKILL'', signal.SIGTERM))'
  - 'Three-endpoint API design (/, /start, /update) - Minimal API covers health check, cold start, and
    warm start with stateless design - evidence: model_server.py:50(@app.route(''/start'')), model_server.py:56(@app.route(''/update''))'
  acceptance_hints:
  - GET /start returns JSON with intercept and coefficient from cold-start estimation
  - POST /update with parameters returns JSON with intercept and coefficient from warm-start estimation
  - Server port determines which data directory (server_dirs/{port-5000}/) is accessed
  - Root endpoint (/) returns 200 OK for health checks
- id: federated_coordination
  name: Federated Coordination
  order: 4
  responsibility: 'Orchestrates federated learning across multiple model servers using parameter averaging.
    Implements the FedAvg algorithm: local estimation, parameter collection, weighted averaging, and broadcast
    to each servers.'
  interface:
    inputs: config.yml containing hosts (base URLs), epochs (int), servers (count); server_dirs/X/ data
      on each server
    outputs: Console output of per-epoch parameter estimates showing convergence
  required_methods:
  - name: federated_run
    description: 'Main orchestration script implementing federated averaging loop: loads config, collects
      parameters from each servers per epoch, computes weighted average, broadcasts averaged parameters
      for warm-start next epoch'
    evidence: federated_run.py:1(federated_run)
  key_behaviors:
  - behavior: Federated Averaging (FedAvg) execution
    description: 'Per-epoch loop structure: call /start on each servers, collect parameters, compute weighted
      average, call /update on each servers with averaged parameters for next epoch'
    evidence: federated_run.py:62(averaging loop), federated_run.py:80(send averaged params to each servers)
  - behavior: Cold-start before warm-start ordering contract
    description: Each epoch requires /start call before /update calls for correct initialization. Calling
      update before start returns incorrect parameters and breaks federated convergence
    evidence: federated_run.py:55(start)|federated_run.py:80(update)
  - behavior: Equal server weighting
    description: Hardcoded 0.25 weight per server assuming equal data volume across each 4 servers. Equal
      averaging assumes homogeneous data distribution
    evidence: 'federated_run.py:34(weights = {''1'': 0.25, ''2'': 0.25, ''3'': 0.25, ''4'': 0.25})'
  - behavior: Sequential blocking server communication
    description: Server requests executed sequentially in for loop. Communication time scales linearly
      with server count. Parallel requests would improve speed but add complexity
    evidence: 'federated_run.py:78(for k in range(n): res = requests.post(...))'
  replaceable_points:
  - name: Aggregation Algorithm
    description: Currently FedAvg with equal weights. Could implement weighted FedAvg or other federated
      optimization methods for different convergence properties
    options:
    - name: FedAvg (equal weights)
      traits:
      - Simple uniform averaging
      - Equal server contribution
      - Theoretical convergence guarantees
      fit_for:
      - Equal data volumes
      - Homogeneous servers
      - Proven standard baseline
      not_fit_for:
      - Unequal data volumes
      - Straggling servers
      - Non-IID data distributions
    - name: FedAvg (weighted by data size)
      traits:
      - Weighted by data volume
      - Fair contribution weighting
      - Better convergence on imbalanced data
      fit_for:
      - Unequal data volumes
      - Different server data capacities
      - Imbalanced federations
      not_fit_for:
      - Unknown data sizes
      - Simple deployments
      - Equal data assumption valid
    - name: FedProx
      traits:
      - Handles system/data heterogeneity
      - Proximal term regularization
      - Native non-IID data support
      fit_for:
      - Non-IID data distributions
      - Straggling servers
      - System heterogeneity scenarios
      not_fit_for:
      - IID data distributions
      - Simple use cases
      - Strict latency requirements
    - name: SCAFFOLD
      traits:
      - Variance reduction technique
      - Control variates
      - Fast convergence on non-IID data
      fit_for:
      - Non-IID data
      - High accuracy requirements
      - Complex heterogeneous federations
      not_fit_for:
      - Simple deployments
      - Limited compute resources
      - IID data with equal volumes
    default: FedAvg (equal weights)
  - name: Communication Pattern
    description: Sequential vs parallel server communication affecting latency and throughput
    options:
    - name: Sequential (current)
      traits:
      - Blocking requests
      - Simple implementation
      - No concurrency complexity
      fit_for:
      - Few servers
      - Low latency networks
      - Debugging and testing
      not_fit_for:
      - Many servers
      - High latency networks
      - Production scaling
    - name: Parallel (asyncio)
      traits:
      - Concurrent requests
      - Reduced total latency
      - Async/await pattern
      fit_for:
      - Many servers
      - High latency networks
      - Production deployments
      not_fit_for:
      - Simple scripts
      - Debugging
      - Single-server scenarios
    default: Sequential (current)
  design_decisions:
  - 'Federated Averaging (FedAvg) algorithm - Standard federated learning: each server does local SGD
    step, coordinator averages parameters enabling learning from distributed data without raw data centralization
    - evidence: federated_run.py:62(averaging loop), federated_run.py:80(send averaged params to each
    servers)'
  - 'Equal weighting across servers (0.25 each) - Simple uniform averaging assumes equal data volumes.
    TODO comment indicates awareness of limitation - evidence: federated_run.py:34(weights = {''1'': 0.25,
    ...})'
  - 'Per-epoch parameter collection and averaging - Epochs control convergence with config-driven epoch
    count enabling tuning without code changes - evidence: federated_run.py:73(for e in range(Epochs))'
  - 'Hardcoded weight dictionary - Static weights assume equal data volume. Changing server count requires
    manual weight dictionary update - evidence: federated_run.py:34(weights = {''1'': 0.25, ...})'
  - 'Blocking sequential server communication - Sequential requests slow as n increases. Parallel requests
    would speed up but add complexity - evidence: federated_run.py:78(for k in range(n): res = requests.post(...))'
  acceptance_hints:
  - Federated run completes each configured epochs without HTTP errors
  - Averaged parameters show convergence trend across epochs
  - Every servers receive identical averaged parameters each epoch
  - Console output shows per-epoch parameter estimates for monitoring
- id: standalone_execution
  name: Standalone Execution
  order: 5
  responsibility: Single-process LGD estimation loop for development and testing. Validates environment
    setup and core estimation logic without federation overhead.
  interface:
    inputs: server_dirs/1/ data (local CSV), Epochs count (hardcoded to 10)
    outputs: Console output of per-epoch parameter estimates showing convergence
  required_methods:
  - name: standalone_run
    description: Script demonstrating direct lgdModel usage without federated infrastructure. Imports
      lgdModel directly and runs iterative estimation loop for environment validation
    evidence: standalone_run.py:1(standalone_run)
  key_behaviors:
  - behavior: Direct lgdModel imports bypassing server layer
    description: Bypasses model_server layer entirely, imports lgdModel directly from lgdModel module.
      Demonstrates that core estimation works independently of federation infrastructure
    evidence: standalone_run.py:20(from lgdModel import lgdModel)
  - behavior: Identical epoch loop structure to federated_run
    description: Same iterative pattern (for e in range(Epochs)) as federated_run enables easy comparison
      between standalone and federated results
    evidence: standalone_run.py:29(for e in range(Epochs))
  replaceable_points:
  - name: Execution Mode
    description: Standalone vs federated execution path for different deployment scenarios
    options:
    - name: standalone_run.py (current)
      traits:
      - Direct imports
      - No network required
      - Single process
      - Fast execution
      fit_for:
      - Development
      - Testing
      - Environment validation
      - Single-node scenarios
      - CI/CD pipelines
      not_fit_for:
      - Distributed data scenarios
      - Federated learning
      - Production multi-server deployments
    - name: federated_run.py
      traits:
      - Distributed architecture
      - Network-based communication
      - Multi-process
      - Federated learning
      fit_for:
      - Federated learning
      - Distributed data
      - Privacy-sensitive scenarios
      - Multi-organization collaboration
      not_fit_for:
      - Single-node testing
      - Development without servers
      - Quick prototyping
    default: standalone_run.py (current)
  design_decisions:
  - 'Identical epoch loop structure to federated_run - Same iterative pattern enables easy comparison
    between standalone and federated results for validation - evidence: standalone_run.py:29(for e in
    range(Epochs))'
  - 'Direct lgdModel imports without server abstraction - Bypasses model_server layer demonstrating that
    core estimation works independently of federation infrastructure - evidence: standalone_run.py:20(from
    lgdModel import lgdModel)'
  acceptance_hints:
  - standalone_run.py completes successfully with converging parameters
  - Console output shows per-epoch parameter estimates
  - Output matches expected behavior when comparing against federated_run single-server scenario
  - Direct lgdModel usage produces identical results to model_server endpoint
data_flow:
- from_stage: data_acquisition
  to_stage: model_estimation
  data: pandas.DataFrame with columns X (target variable/LGD) and Y (explanatory variable)
- from_stage: model_estimation
  to_stage: model_serving
  data: dict with 'intercept' and 'coefficient' keys containing sklearn SGDRegressor fitted parameters
- from_stage: model_serving
  to_stage: federated_coordination
  data: 'JSON {''intercept'': float, ''coefficient'': float} returned via HTTP GET /start or POST /update
    endpoints'
- from_stage: federated_coordination
  to_stage: model_serving
  data: 'JSON {''intercept'': float, ''coefficient'': float} containing weighted averaged parameters for
    warm-start initialization'
- from_stage: external
  to_stage: federated_coordination
  data: 'YAML dict from config.yml containing keys: hosts (base URL list), epochs (int), servers (count)'
global_contracts:
- contract: 'DataFrame schema contract: must contain ''X'' and ''Y'' columns where X is target (LGD) and
    Y is explanatory variable. Extraction order matters for regression correctness - evidence: lgdModel.py:73(X
    = df[[''X'']]), lgdModel.py:75(y = df[''Y''])'
  evidence: ''
- contract: 'Parameter dict schema contract: ''intercept'' and ''coefficient'' keys are required for warm-start
    initialization. Reversed or missing keys will cause errors - evidence: lgdModel.py:84(fitted_params
    = {''intercept'': ..., ''coefficient'': ...})'
  evidence: ''
- contract: 'Server port convention contract: port 5000+N maps to server_dirs/N/ data directory. Using
    ports outside 5001-5004 range breaks server identification and data loading - evidence: model_server.py:35(n
    = int(port) - 5000)'
  evidence: ''
- contract: 'Federated workflow ordering contract: /start cold-start MUST be called BEFORE /update warm-start
    calls per epoch. Calling update before start returns incorrect parameters and breaks federated convergence
    - evidence: federated_run.py:55(start)|federated_run.py:80(update)'
  evidence: ''
- contract: 'SGDRegressor iterative contract: max_iter=1 and tol=None enforce single-epoch iteration design.
    Each call to fit() does exactly one gradient step - evidence: lgdModel.py:60(max_iter=1), lgdModel.py:60(tol=None)'
  evidence: ''
- contract: 'Federated averaging completion contract: averaging MUST complete before sending averaged
    params to next epoch. Early sending of partial averages breaks model convergence correctness - evidence:
    federated_run.py:86-92(averaging)'
  evidence: ''
- contract: 'Equal weight assumption contract: 0.25 weight per server assumes equal data volume across
    4 nodes. Adding/removing servers without weight adjustment causes incorrect model averaging - evidence:
    federated_run.py:34(weights = {''1'': 0.25, ...})'
  evidence: ''
business_decisions:
- id: BD-001
  type: B
  content: Choice parameter controls data transport rather than separate functions
  rationale: 'Single entry point design enables runtime transport switching without code duplication or
    conditional imports. BOUNDARY: This design covers transport protocol selection but does not specify
    individual transport implementations (HTTP, gRPC, file-based). Adding new transports requires extending
    the choice parameter logic rather than adding new functions.'
  evidence: dataSource.py:24(dataSource)
  stage: data_acquisition
  alternative_considered: Conditional imports or factory pattern would require more code paths; choice
    parameter avoids code duplication
- id: BD-002
  type: BA/DK
  content: Port-derived server ID convention (port - 5000 = server number)
  rationale: 'Tight coupling between server port and data directory eliminates explicit ID configuration.
    BOUNDARY: Servers must run on ports 5001-500N consecutively with 5001 mapping to server_dirs/1. This
    convention assumes port availability and does not validate directory existence.'
  evidence: model_server.py:35(module)
  stage: data_acquisition
  alternative_considered: Explicit server ID passing via environment variable or command-line argument
  _evidence_issues:
  - 'FN_NOT_FOUND: module in model_server.py'
- id: BD-003
  type: B/BA
  content: Hardcoded data schema (X, Y column names)
  rationale: 'Column names X and Y represent business assumptions baked into the data layer. These are
    not generic field names but domain-specific conventions for input features and target variable. BOUNDARY:
    Changing column names requires coordinated updates across CSV data files, data ingestion code, and
    each API consumers. This is an explicit business contract.'
  evidence: dataSource.py:48(module)
  stage: data_acquisition
  alternative_considered: Configuration-driven column mapping; JSON schema validation at load time
  _evidence_issues:
  - 'FN_NOT_FOUND: module in dataSource.py'
- id: BD-004
  type: M/BA
  content: SGDRegressor with max_iter=1 for iterative control
  rationale: 'Single-epoch fits are required to enable per-epoch parameter updates needed by federated
    averaging. BOUNDARY: tol=None prevents sklearn''s early stopping mechanism from terminating training
    before the epoch completes. This ensures exactly one gradient update per fit() call, which is essential
    for the federated learning synchronization protocol.'
  evidence: lgdModel.py:24(lgdModel)
  stage: model_estimation
  alternative_considered: Higher max_iter values would break epoch-by-epoch control; alternative convergence
    criteria not compatible with federated averaging
- id: BD-005
  type: M/DK
  content: Warm-start via intercept_init/coef_init parameters
  rationale: 'sklearn''s warm_start mechanism reuses prior solution as initialization for subsequent training.
    BOUNDARY: This enables federated averaging where distributed model estimates are aggregated and used
    to initialize the next round. The mechanism depends on sklearn''s specific implementation and requires
    intercept and coef arrays to be numpy-compatible.'
  evidence: lgdModel.py:81(module)
  stage: model_estimation
  alternative_considered: Custom initialization array management; sklearn's built-in warm_start parameter
    as alternative
  _evidence_issues:
  - 'FN_NOT_FOUND: module in lgdModel.py'
- id: BD-006
  type: B/BA
  content: None-checking as cold/warm start toggle
  rationale: 'Implicit parameter presence is used to indicate initialization state rather than an explicit
    mode flag. BOUNDARY: First call without parameters performs cold start (random initialization); subsequent
    calls with parameters perform warm start (continue from prior state). This pattern avoids adding a
    boolean parameter but requires parameters to be explicitly None vs not-present.'
