replaceable_slots:
- id: slot-001
  name: data_source
  description: Choose based on data availability and privacy requirements. Local files for development/testing,
    openNPL for NPL-specific federated analysis, custom REST APIs for other data sources.
  used_in_stages: []
  options:
  - name: Local CSV Files
    traits:
    - static
    - batch
    - no-api
    - simple
    fit_for:
    - Development, testing, standalone mode with pre-exported data
    not_fit_for:
    - Production with live data, real-time updates, data privacy scenarios
  - name: openNPL REST API
    traits:
    - dynamic
    - database-backed
    - api-based
    fit_for:
    - Federated mode with database-stored NPL counterparty data
    not_fit_for:
    - Standalone mode, non-NPL credit risk data
  - name: Generic REST API
    traits:
    - dynamic
    - api-based
    - configurable
    fit_for:
    - Custom data providers that return JSON with current_assets and cash_and_cash_equivalent_items fields
    not_fit_for:
    - SQL databases, file-based data, non-standard data formats
  - name: PostgreSQL/SQL Database
    traits:
    - relational
    - sql
    - transactional
    fit_for:
    - Production with structured credit risk data in relational databases
    not_fit_for:
    - Non-relational data, quick prototyping
  default: Local CSV Files
  _source: worker_resource
- id: slot-002
  name: model_server_web_framework
  description: Flask is sufficient for the current lightweight API requirements. Consider FastAPI if async
    operations or auto-generated OpenAPI documentation becomes important.
  used_in_stages: []
  options:
  - name: Flask
    traits:
    - lightweight
    - wsgi
    - extensible
    fit_for:
    - Simple REST APIs, development, microservices
    not_fit_for:
    - High-throughput production APIs, async workloads
  - name: FastAPI
    traits:
    - async
    - openapi
    - modern
    fit_for:
    - High-performance async APIs, auto-generated docs, type validation
    not_fit_for:
    - Simple prototypes where Flask is sufficient
  - name: Django
    traits:
    - full-stack
    - orm
    - batteries-included
    fit_for:
    - Complex applications needing ORM, admin interface, authentication
    not_fit_for:
    - Lightweight microservices, simple REST APIs
  default: Flask
  _source: worker_resource
- id: slot-003
  name: ml_framework
  description: scikit-learn is ideal for the current simple linear SGD regression use case. Switch to
    PyTorch/TensorFlow for deep learning LGD models or statsmodels for richer statistical inference.
  used_in_stages: []
  options:
  - name: scikit-learn SGDRegressor
    traits:
    - online-learning
    - iterative
    - simple-linear
    fit_for:
    - Simple linear regression with stochastic gradient descent, online learning
    not_fit_for:
    - Deep learning, non-linear models, GPU acceleration
  - name: PyTorch
    traits:
    - deep-learning
    - gpu
    - flexible
    fit_for:
    - Complex neural network LGD models, research scenarios
    not_fit_for:
    - Simple linear models, resource-constrained environments
  - name: TensorFlow
    traits:
    - deep-learning
    - production
    - gpu
    fit_for:
    - Production deep learning models, model serving
    not_fit_for:
    - Simple linear models, rapid prototyping
  - name: statsmodels
    traits:
    - statistical
    - inference
    - rich-output
    fit_for:
    - Statistical inference, hypothesis testing, rich model diagnostics
    not_fit_for:
    - Online/incremental learning, large-scale data
  default: scikit-learn SGDRegressor
  _source: worker_resource
- id: slot-004
  name: deployment_orchestration
  description: Fabric is used for simple SSH-based server deployment. Docker Compose recommended for containerized
    federated deployments. Kubernetes for production-scale federated systems.
  used_in_stages: []
  options:
  - name: Fabric
    traits:
    - ssh
    - simple
    - paramiko-based
    fit_for:
    - Simple SSH-based remote command execution
    not_fit_for:
    - Complex multi-container orchestration
  - name: Docker Compose
    traits:
    - containerized
    - multi-service
    - declarative
    fit_for:
    - Multi-container deployments, reproducible environments
    not_fit_for:
    - Remote server management, bare-metal deployments
  - name: Kubernetes
    traits:
    - orchestration
    - scalable
    - production
    fit_for:
    - Production federated systems requiring auto-scaling, high availability
    not_fit_for:
    - Development, simple single-server deployments
  - name: Ansible
    traits:
    - idempotent
    - agentless
    - configuration
    fit_for:
    - Configuration management, infrastructure as code
    not_fit_for:
    - Container orchestration, simple task execution
  default: Fabric
  _source: worker_resource
- id: slot-005
  name: documentation_generator
  description: Sphinx is already configured and is the standard for Python projects. Use MkDocs for simpler
    Markdown-based documentation.
  used_in_stages: []
  options:
  - name: Sphinx
    traits:
    - rst
    - technical
    - extensible
    fit_for:
    - Python project documentation, API docs, technical manuals
    not_fit_for:
    - Simple READMEs, non-technical documentation
  - name: MkDocs
    traits:
    - markdown
    - simple
    - yaml-config
    fit_for:
    - Simple documentation sites, GitHub Pages hosting
    not_fit_for:
    - Complex API documentation, multi-format output
  - name: Docusaurus
    traits:
    - react
    - modern
    - versioned-docs
    fit_for:
    - Modern documentation sites, versioned docs, community projects
    not_fit_for:
    - Pure Python projects preferring RST/Markdown
  default: Sphinx
  _source: worker_resource
