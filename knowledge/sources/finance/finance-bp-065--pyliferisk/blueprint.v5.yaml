replaceable_slots:
- id: slot-001
  name: mortality_table
  description: Use bundled tables for academic/demo; supply custom lx or qx for production actuarial work
    requiring specific table sources.
  used_in_stages: []
  options:
  - name: bundled_academic_tables
    traits:
    - static_data
    - readonly
    - precomputed
    fit_for:
    - Quick prototyping, academic exercises, known regional markets (Germany, Spain, UK, Hong Kong, US)
    not_fit_for:
    - Real-time industry pricing, regulatory reporting requiring official sanctioned tables
  - name: custom_lx_vector
    traits:
    - dynamic
    - user_supplied
    fit_for:
    - Custom mortality assumptions, experience-rated tables, proprietary models
    not_fit_for:
    - Users without their own table data
  - name: custom_qx_vector
    traits:
    - dynamic
    - user_supplied
    fit_for:
    - Custom mortality assumptions from raw qx rates rather than survival counts
    not_fit_for:
    - Users without their own table data
  default: bundled_academic_tables
  _source: worker_resource
- id: slot-002
  name: numeric_computation
  description: For reserve calculations with long vectors (>50 terms), numpy significantly improves performance;
    otherwise stdlib suffices.
  used_in_stages: []
  options:
  - name: python_stdlib_only
    traits:
    - no_dep
    - portable
    - slow_on_large_vectors
    fit_for:
    - Basic calculations, deployment in restricted environments
    not_fit_for:
    - Large portfolio calculations with many vectors
  - name: numpy_dot_product
    traits:
    - vectorized
    - fast
    - requires_dep
    fit_for:
    - Reserve calculations with large qx/px/discount vectors (Examples 4_5a, 4_5b)
    not_fit_for:
    - Minimal-dependency environments
  default: python_stdlib_only
  _source: worker_resource
- id: slot-003
  name: interest_rate_source
  description: Use EIOPA RFR Excel for Solvency II regulatory work in Europe; use fixed i for simplicity
    elsewhere.
  used_in_stages: []
  options:
  - name: fixed_interest_rate
    traits:
    - static
    - simple
    fit_for:
    - Teaching, sensitivity analysis, constant-force discount scenarios
    not_fit_for:
    - Variable yield curve environments
  - name: eiopa_rfr_term_structure
    traits:
    - official
    - regulatory
    - requires_external_file
    fit_for:
    - European regulatory reserving (EIOPA RFR prescribed for Solvency II)
    not_fit_for:
    - Non-European products, or environments without Excel file access
  default: fixed_interest_rate
  _source: worker_resource
- id: slot-004
  name: visualization
  description: matplotlib is purely optional for visualization; omit if no graphical output is needed.
  used_in_stages: []
  options:
  - name: matplotlib_plotting
    traits:
    - interactive
    - publication_quality
    fit_for:
    - Surviving curve plots, lx/qx charts (Examples 4_2, 4_6b)
    not_fit_for:
    - Headless/server environments, minimal-dependency deployments
  - name: none
    traits:
    - no_dep
    - text_only
    fit_for:
    - Batch processing, CLI output, headless servers
    not_fit_for:
    - Visual analysis of mortality patterns
  default: none
  _source: worker_resource
