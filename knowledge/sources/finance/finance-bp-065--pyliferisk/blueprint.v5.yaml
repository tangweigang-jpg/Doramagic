- id: BD-082
  type: BA
  content: 'INTERACTION: [BD-002] × [BD-013] × [BD-052] → Triplicate radix decision creating maintenance
    ambiguity'
  rationale: Three separate BDs (BD-002, BD-013, BD-052) each address lx[0]=100000 radix, creating redundancy
    and potential for conflicting updates. If one BD is changed without updating the others, the system
    would contain contradictory documentation. This triplication violates single-source-of-truth principles
    and increases maintenance burden for future parameter changes
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Consolidating into a single authoritative BD would eliminate ambiguity but requires
    restructuring existing documentation
- id: BD-083
  type: B
  content: 'INTERACTION: [BD-007] → [BD-020,BD-023] → Hidden dependency chain in insurance premium formula'
  rationale: 'The fundamental formula Ax=Mx[x]/Dx[x] (BD-007) has a silent dependency on two critical
    decisions: Dx computation (BD-020) which depends on discount factor v^age and lx[x], and Mx computation
    (BD-023) which depends on Cx (BD-021/BD-062). If either commutation function calculation changes,
    Ax becomes incorrect without explicit warning. This hidden dependency means errors in commutation
    functions propagate silently to each insurance premiums'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Explicit parameter validation or formula unit tests would catch dependency violations
    but add computational overhead
- id: BD-084
  type: B/BA
  content: 'INTERACTION: [BD-001] → [BD-041] → [BD-028,BD-029] → [BD-030,BD-031] → Risk cascade from per-mille
    format to regulatory reserves'
  rationale: The per-mille storage convention (BD-001) cascades through survival probabilities (BD-041,28,29)
    to affect net premium (BD-030) and reserve (BD-031) calculations. A single misinterpretation of the
    per-mille format—whether in data entry, file import (BD-039), or EIOPA rate loading (BD-046)—propagates
    through the entire calculation chain, potentially causing reserve inadequacy. This systemic risk is
    particularly dangerous because early stages (mortality table) appear correct while final outputs (reserves)
    are wrong
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Explicit format validation at input boundary would catch errors early but require
    additional validation code
- id: BD-085
  type: BA
  content: 'INTERACTION: [BD-006] → [BD-020,BD-021,BD-022,BD-023,BD-048,BD-049] → Interest rate single
    point of failure for each commutation functions'
  rationale: 'Storing interest rate i on the Actuarial object (BD-006) creates a single point of failure:
    each six commutation functions (Dx, Cx, Nx, Mx, Sx, Rx) depend on this single stored value. If the
    interest rate is modified after commutation functions are computed, or if the wrong Actuarial object
    is used for cross-age calculations, each derived calculations become inconsistent. This design couples
    interest rate assumption with computation state, creating hidden coupling that can cause silent mispricing'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Immutable commutation functions with interest rate as explicit parameter would
    prevent state corruption but require API redesign
- id: BD-086
  type: B/BA
  content: 'INTERACTION: [BD-010] × [BD-068] → Woolhouse fractional payment adjustment amplifies m-parameter
    accuracy'
  rationale: 'The m parameter (BD-010) for fractional payments and the Woolhouse correction (BD-068) create
    an amplification effect: as payment frequency increases, the (m-1)/(2m) correction becomes more significant
    (approaching 0.5 for large m). This correction is applied consistently across annuity-due (BD-071),
    annuity-immediate (BD-072), and deferred annuity (BD-073) formulas, amplifying the accuracy improvement
    for monthly and quarterly payment products that are common in retail insurance'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Ignoring fractional adjustments would underprice monthly products and create
    anti-selection against annual-paying policies
- id: BD-087
  type: BA
  content: 'INTERACTION: [BD-024] × [BD-071,BD-072] → Payment timing parameter creates divergence in annuity
    pricing'
  rationale: The p parameter distinguishing annuity-due (p=0) from annuity-immediate (p=1) creates divergent
    calculation paths that differ by factor (1+i). For whole-life products, this timing difference compounds
    across the entire payment stream, creating materially different premiums for otherwise identical contracts.
    The contradiction emerges when users expect symmetric behavior but receive asymmetric pricing—annuity-due
    always costs more because payments are received earlier
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Separate function names (annuity_due vs annuity_immediate) would make timing
    difference explicit but change API surface
- id: BD-088
  type: BA
  content: 'INTERACTION: [BD-005] × [BD-006] → Eager commutation computation locks interest rate state
    creating immutability violation'
  rationale: 'Eager computation of commutation functions in __init__ (BD-005) combined with stored interest
    rate (BD-006) creates an immutability violation: commutation functions are computed once but the interest
    rate remains mutable on the object. If i is modified after construction, the stored commutation functions
    become stale but are still used, returning incorrect results. This design couples computation state
    to mutable state, violating expected behavior that calculated values remain valid'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Lazy recomputation on access would maintain consistency but add performance
    overhead; frozen object would prevent the issue entirely
