- id: BD-081
  type: B/DK
  content: 'INTERACTION: [BD-001] × [BD-041] → Amplified precision preservation in survival probability
    calculations'
  rationale: 'Per-mille storage (BD-001) and px calculation as complement (BD-041) form a precision amplification
    loop: qx stored as integers avoids floating-point loss, then px=(1000-qx) preserves integer arithmetic
    through the entire probability chain, affecting tpx and tqx downstream calculations with compounding
