# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-065
name: pyliferisk
sop_version: '3.6'
source:
  projects:
  - pyliferisk
  commit_hash: 5c28ca34a30f4e350f604f4b35bf738c816e59bc
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Life contingencies and actuarial calculations
  description: Python library for life and actuarial calculations using International Actuarial Notation,
    supporting mortality tables, insurance premium calculations, annuity valuations, and policy reserves.
  prerequisites: Basic understanding of actuarial science, mortality tables, interest theory, and International
    Actuarial Notation. Familiarity with Python programming.
  not_suitable_for: Non-life insurance, property/casualty calculations, complex financial derivatives,
    real-time trading systems, or scenarios requiring external dependencies (library has no external dependencies).
stages:
- id: table_construction
  name: Mortality Table Construction
  order: 1
  responsibility: Builds mortality tables from raw data (tuple of per-mille qx values or lx array). Derives
    derived quantities (dx, ex, w) and optionally adjusts with loading percentage to support experience
    rating.
  interface:
    inputs:
    - nt tuple (qx*1000 with starting age), or lx/qx arrays, perc (loading %)
    outputs:
    - MortalityTable with lx, qx, dx, ex, w, nt attributes populated
  required_methods:
  - name: MortalityTable.__init__
    description: Initializes mortality table from nt tuple or lx array, derives dx, ex, w quantities
    evidence: pyliferisk/__init__.py:23(__init__)
  - name: MortalityTable.view
    description: Displays table data as formatted string output
    evidence: pyliferisk/__init__.py:86(print(table_str + 'Total number of rows...'))
  key_behaviors:
  - behavior: Per-mille qx storage
    description: qx values stored as qx*1000 (per mille convention) to align with traditional actuarial
      notation and simplify table data entry at source
    evidence: pyliferisk/__init__.py:52(self.lx.append(self.lx[-1] * (1 - val / 1000)))
  - behavior: Fixed radix convention
    description: lx[0] = 100000 radix is fixed as industry standard convention representing 100,000 initial
      lives at age 0
    evidence: pyliferisk/__init__.py:50(self.lx = [100000.0])
  - behavior: Loading adjustment via perc
    description: Optional percentage parameter allows experience rating by scaling qx to create experience
      tables from standard tables
    evidence: pyliferisk/__init__.py:45(end_val = val * perc / 100)
  replaceable_points:
  - name: Mortality table source
    description: Tables loaded from mortalitytables.py tuples representing different populations and time
      periods
    options:
    - name: SPAIN_PASEM2010M
      traits:
      - Spanish male mortality
      - Recent data
      fit_for:
      - Spanish male portfolio pricing
      not_fit_for:
      - Non-Spanish populations
      - Historical analysis
    - name: GKM95
      traits:
      - German male mortality
      - 1995 base
      fit_for:
      - German male portfolio pricing
      not_fit_for:
      - Non-German populations
    - name: USLIFE2002F
      traits:
      - US female mortality
      - 2002 base
      fit_for:
      - US female portfolio pricing
      not_fit_for:
      - Non-US populations
    - name: custom tuple
      traits:
      - User-defined
      - Flexible format
      fit_for:
      - Custom population studies
      - Research
      not_fit_for:
      - Production pricing without validation
    default: mortalitytables tuple
  design_decisions:
  - 'qx stored as qx*1000 (per mille convention) (evidence: pyliferisk/__init__.py:52(ln 52)) — Traditional
    actuarial notation uses per-mille; simplifies table data entry at source (mortalitytables.py tuples)'
  - 'lx[0] = 100000 radix fixed (evidence: pyliferisk/__init__.py:50(self.lx = [100000.0])) — Industry
    standard convention - represents 100,000 initial lives at age 0'
  - 'Two classes instead of one (evidence: pyliferisk/__init__.py:22,90) — Actuarial adds interest-based
    commutations (Dx,Nx,Cx,Mx) requiring i; MortalityTable for pure mortality data'
  - 'perc parameter for loading adjustment (evidence: pyliferisk/__init__.py:45(end_val = val * perc /
    100)) — Allows experience rating by scaling qx - used to create experience tables from standard tables'
  acceptance_hints:
  - MortalityTable.qx values are qx*1000 format requiring division by 1000 for true probabilities
  - lx[0] equals 100000 and lx[-1] equals 0 (each lives extinct)
  - 'ex (expectation of life) computed using UDD assumption: 0.5 + sum(lx[g+1:-1])/lx_g'
  - perc parameter only applied when nt parameter is provided - silently ignored otherwise with lx input
- id: commutation_computation
  name: Commutation Functions Computation
  order: 2
  responsibility: Computes actuarial commutation numbers (Dx, Nx, Cx, Mx, Rx) from mortality data and
    interest rate - enabling efficient premium calculations by avoiding repeated summations.
  interface:
    inputs:
    - lx array, dx array, i (interest rate)
    outputs:
    - Dx (discounted survivors), Nx (cumulative Dx), Cx (discounted deaths), Mx (cumulative Cx)
  required_methods:
  - name: Actuarial.Dx
    description: Calculates discounted survivors at age x using Dx = v^x * lx
    evidence: pyliferisk/__init__.py:246(Dx)
  - name: Actuarial.Nx
    description: Calculates cumulative Dx from age x to end of table (sum of discounted survivors)
    evidence: pyliferisk/__init__.py:250(Nx)
  - name: Actuarial.Cx
    description: Calculates discounted deaths at age x using Cx = v^x+1 * dx
    evidence: pyliferisk/__init__.py:268(Cx)
  - name: Actuarial.Mx
    description: Calculates cumulative Cx from age x to end of table (sum of discounted deaths)
    evidence: pyliferisk/__init__.py:272(Mx)
  key_behaviors:
  - behavior: Eager computation
    description: Commutations computed eagerly in __init__ to avoid repeated calculation - standard actuarial
      approach where Dx,Cx computed once for fast later access
    evidence: pyliferisk/__init__.py:142-162
  - behavior: Interest rate stored on object
    description: Interest rate i stored as decimal (0.05 = 5%), not percentage - each commutation functions
      depend on same i enabling uniform Axx/axx style formulas
    evidence: pyliferisk/__init__.py:97(self.i = i)
  replaceable_points:
  - name: Interest rate assumption
    description: Annual effective interest rate used for discounting in commutation calculations
    options:
    - name: '0.03'
      traits:
      - 3% rate
      - Conservative
      fit_for:
      - Low-yield environment
      - Conservative pricing
      not_fit_for:
      - High-yield scenarios
      - Inflation-linked products
    - name: '0.04'
      traits:
      - 4% rate
      - Moderate
      fit_for:
      - Standard pricing
      - Balanced approach
      not_fit_for:
      - Extreme market conditions
    - name: '0.05'
      traits:
      - 5% rate
      - Higher return assumption
      fit_for:
      - Higher return expectations
      - Optimistic scenarios
      not_fit_for:
      - Low-yield environment
    - name: any decimal
      traits:
      - User-defined
      - Flexible
      fit_for:
      - Custom scenarios
      - Sensitivity analysis
      not_fit_for:
      - Standard production without validation
    default: varies by tariff
  design_decisions:
  - 'Commutations computed eagerly in __init__ (evidence: pyliferisk/__init__.py:142-162) — Avoids repeated
    calculation; standard actuarial approach where Dx,Cx computed once for fast later access'
  - 'Interest rate i stored on object (evidence: pyliferisk/__init__.py:97(self.i = i)) — Every commutation
    functions depend on same i; enables uniform Axx/axx style formulas'
  acceptance_hints:
  - Commutation arrays (Dx, Nx, Cx, Mx) available immediately after Actuarial object creation
  - Interest rate i must be provided - bare except clause masks TypeError when i=None is passed
  - Functions return 0 silently when age x >= len(array) without bounds checking
- id: insurance_premium_calculation
  name: Insurance Premium Calculation
  order: 3
  responsibility: Computes Expected Present Values (EPV) of insurance products using commutation functions
    - supporting whole life, term, endowment, deferred, and increasing insurance products.
  interface:
    inputs:
    - Actuarial object (mt), age x, optional term n/defer t
    outputs:
    - Net single premium (scalar values)
  required_methods:
  - name: Ax
    description: Calculates whole life insurance EPV - pays benefit at death regardless of when death
      occurs
    evidence: pyliferisk/__init__.py:299(Ax)
  - name: Axn
    description: Calculates term insurance EPV - pays benefit only if death occurs within n years
    evidence: pyliferisk/__init__.py:305(Axn)
  - name: AExn
    description: Calculates endowment insurance EPV - pays benefit at death or survival to end of term
    evidence: pyliferisk/__init__.py:310(AExn)
  - name: nEx
    description: Calculates pure endowment (survival benefit) EPV - pays only if alive at end of term
    evidence: pyliferisk/__init__.py:291(nEx)
  - name: qAx
    description: Calculates geometrically increasing insurance EPV with inflation-linked benefits
    evidence: pyliferisk/__init__.py:333(qAx)
  key_behaviors:
  - behavior: Commutation formula ratio
    description: Standard commutation formula Ax = Mx[x] / Dx[x] - ratio of cumulative to current commutation
      numbers
    evidence: pyliferisk/__init__.py:302(return mt.Mx[x] / mt.Dx[x])
  - behavior: Interest transformation for increasing
    description: Geometrically increasing formulas create new Actuarial object with transformed interest
      j=(i-q)/(1+q) for inflation-linked payments
    evidence: pyliferisk/__init__.py:337(mtj = Actuarial(nt=mt.nt, i=j))
  replaceable_points:
  - name: Insurance type
    description: Product structure determining benefit payment conditions
    options:
    - name: whole life (Ax)
      traits:
      - Lifetime coverage
      - Death benefit only
      fit_for:
      - Permanent coverage needs
      - Estate planning
      not_fit_for:
      - Limited budget
      - Short-term needs
    - name: term (Axn)
      traits:
      - Fixed term
      - Temporary coverage
      fit_for:
      - Short-term needs
      - Budget-conscious
      not_fit_for:
      - Permanent needs
      - Long-term planning
    - name: endowment (AExn)
      traits:
      - Savings + protection
      - Maturity benefit
      fit_for:
      - Dual objectives
      - Education planning
      not_fit_for:
      - Pure protection needs
      - Maximum coverage
    - name: pure endowment (nEx)
      traits:
      - Savings only
      - No death benefit
      fit_for:
      - Pure savings
      - Capital accumulation
      not_fit_for:
      - Protection needs
    - name: deferred (tAx)
      traits:
      - Delayed coverage
      - Waiting period
      fit_for:
      - Young lives
      - Future protection
      not_fit_for:
      - Immediate needs
    - name: increasing (IAx, qAx)
      traits:
      - Inflation-linked
      - Growing benefits
      fit_for:
      - Long-term contracts
      - Inflation protection
      not_fit_for:
      - Fixed budget products
    default: whole life
  design_decisions:
  - 'Formula: Ax = Mx[x] / Dx[x] (evidence: pyliferisk/__init__.py:302(return mt.Mx[x] / mt.Dx[x])) —
    Standard commutation formula - ratio of cumulative to current commutation numbers'
  - 'Creates new Actuarial object for qAx transformations (evidence: pyliferisk/__init__.py:337(mtj =
    Actuarial(nt=mt.nt, i=j))) — Geometrically increasing formulas require transformed interest j=(i-q)/(1+q);
    encapsulates transformation'
  acceptance_hints:
  - Insurance functions require Actuarial object (with commutations), not MortalityTable
  - Some functions (tAxn, IAx, IAxn, qtAxn) are stub implementations returning None
  - 'Parameter name inconsistency: qAxn/qtAx/qtAxn use nt param but reference mt.i internally'
- id: annuity_premium_calculation
  name: Annuity Premium Calculation
  order: 4
  responsibility: Computes EPV of annuity products (immediate, due, term certain, deferred, increasing,
    fractional payments) via commutation formulas or annuity() dispatcher handling 15+ parameter combinations.
  interface:
    inputs:
    - Actuarial object, age x, term n, payment timing p=0/1, optional m (fractional), args (increasing/deferred)
    outputs:
    - Annuity present value (scalar)
  required_methods:
  - name: aax
    description: Calculates whole life annuity-due EPV with payments at period beginning
    evidence: pyliferisk/__init__.py:375(aax)
  - name: ax
    description: Calculates whole life annuity-immediate EPV with payments at period end
    evidence: pyliferisk/__init__.py:381(ax)
  - name: aaxn
    description: Calculates temporary annuity-due EPV for fixed term with payments at beginning
    evidence: pyliferisk/__init__.py:357(aaxn)
  - name: annuity
    description: Universal dispatcher handling each annuity variants including fractional, increasing,
      deferred combinations
    evidence: pyliferisk/__init__.py:489(annuity)
  key_behaviors:
  - behavior: Complex parameter dispatcher
    description: annuity() dispatcher handles 15+ parameter combinations - complex parameter space (payment
      timing, fractional m, increasing a/g, deferred -d) - single dispatcher avoids proliferation of functions
    evidence: pyliferisk/__init__.py:489-609
  - behavior: Fractional payment approximation
    description: m parameter for fractional payments uses standard actuarial approximation (m-1)/(2m)
      adjustment for m-thly payments
    evidence: pyliferisk/__init__.py:364((m-1)/(m*2) adjustment)
  - behavior: Whole-life convenience syntax
    description: '''w'' string or magic number 99 interpreted as whole-life - convenience syntax for whole-life
      products'
    evidence: pyliferisk/__init__.py:511(isinstance(n,str) or n == 99)
  replaceable_points:
  - name: Annuity type
    description: Payment structure determining timing and conditions of payments
    options:
    - name: immediate/ordinary (ax)
      traits:
      - End of period payments
      - Lower initial cost
      fit_for:
      - Retirement income
      - Post-retirement planning
      not_fit_for:
      - Prepaid arrangements
    - name: annuity-due (aax)
      traits:
      - Beginning of period payments
      - Higher total payments
      fit_for:
      - Pre-retirement planning
      - Advance payment preference
      not_fit_for:
      - Budget constraints
    - name: temporary (axn/aaxn)
      traits:
      - Fixed term
      - Limited duration
      fit_for:
      - Bridge retirement
      - Short-term needs
      not_fit_for:
      - Lifetime income needs
    - name: whole life
      traits:
      - Lifetime payments
      - Maximum security
      fit_for:
      - Retirement planning
      - Longevity protection
      not_fit_for:
      - Short-term needs
      - Limited budget
    - name: deferred (-d)
      traits:
      - Delayed start
      - Lower cost
      fit_for:
      - Young lives
      - Future planning
      not_fit_for:
      - Immediate income needs
    - name: increasing (a or g)
      traits:
      - Growing payments
      - Inflation protection
      fit_for:
      - Long-term contracts
      - Rising income needs
      not_fit_for:
      - Fixed budget products
    default: whole life annuity-due
  design_decisions:
  - 'annuity() dispatcher handles 15+ parameter combinations (evidence: pyliferisk/__init__.py:489-609)
    — Complex parameter space (payment timing, fractional m, increasing a/g, deferred -d) - single dispatcher
    avoids proliferation of functions'
  - 'm parameter for fractional payments (evidence: pyliferisk/__init__.py:364((m-1)/(m*2) adjustment))
    — Standard actuarial approximation for m-thly payments using 0.5 adjustment'
  - '''w'' string interpreted as whole life (evidence: pyliferisk/__init__.py:511(isinstance(n,str) or
    n == 99)) — Convenience syntax for whole-life products'
  acceptance_hints:
  - Fractional payment adjustment formula (m-1)/(2m) is hardcoded in multiple functions
  - Some functions (taaxn, taxn) are stub implementations returning None
  - Duplicate function definitions exist for Iaaxn and Iaxn - Python uses last definition
- id: reserve_calculation
  name: Reserve Calculation
  order: 5
  responsibility: Computes policy reserves (net premium reserve) by comparing APV of future claims vs
    premiums using prospective reserve formula - demonstrated via manual calculation in examples.
  interface:
    inputs:
    - MortalityTable/Actuarial, age, capital, premium vector, qx/px vectors
    outputs:
    - Reserve value (scalar)
  required_methods:
  - name: N/A
    description: No user-facing methods identified by assembly
    evidence: N/A
  key_behaviors:
  - behavior: Manual reserve calculation
    description: No built-in reserve function - examples show manual reserve calculation using numpy.dot
      - reserve = APV(claims) - APV(premiums)
    evidence: Examples/Example_4_5a.py:20-28
  - behavior: Prospective reserve formula
    description: 'Reserve formula: discount * (APV_Claims - APV_Premiums) - standard prospective reserve
      calculation'
    evidence: Examples/Example_4_5a.py:28
  - behavior: Class differentiation for tariff/reserve
    description: Premium calculation needs commutation functions (Actuarial); reserve needs lx only (MortalityTable)
      - different table types required
    evidence: Examples/Example_4_5b.py:10-11,Examples/Example_4_5a.py:6-7
  replaceable_points:
  - name: Reserve method
    description: Calculation approach for determining policy reserves
    options:
    - name: prospective (APV future - APV premiums)
      traits:
      - Forward-looking
      - Future-focused
      fit_for:
      - Standard pricing
      - Premium adequacy
      not_fit_for:
      - Historical analysis
      - Retroactive adjustments
    - name: retrospective
      traits:
      - Past-looking
      - Accumulated value
      fit_for:
      - Policy history analysis
      - Contribution verification
      not_fit_for:
      - Prospective pricing
    - name: recursive
      traits:
      - Step-by-step
      - Recursive approach
      fit_for:
      - Thiele's differential equation
      - Numerical methods
      not_fit_for:
      - Simple calculations
    default: prospective
  design_decisions:
  - 'No built-in reserve function (evidence: Examples/Example_4_5a.py:20-28) — Examples show manual reserve
    calculation using numpy.dot - reserve = APV(claims) - APV(premiums)'
  - 'Reserve formula: discount * (APV_Claims - APV_Premiums) (evidence: Examples/Example_4_5a.py:28) —
    Standard prospective reserve formula'
  acceptance_hints:
  - Reserve calculation relies on w (omega) for loop bounds - computed from lx.index(0)-1
  - Incorrect table data produces wrong iteration count in reserve loops
  - User must manually implement reserve calculations following examples
data_flow:
- from_stage: external
  to_stage: table_construction
  data: Tuple of per-mille qx values (first element = starting age, last = 1000 sentinel) from mortalitytables.py
- from_stage: table_construction
  to_stage: commutation_computation
  data: lx, dx, i - MortalityTable/Actuarial object with populated arrays
- from_stage: commutation_computation
  to_stage: insurance_premium_calculation
  data: Actuarial object with Dx, Nx, Cx, Mx commutation arrays populated
- from_stage: commutation_computation
  to_stage: annuity_premium_calculation
  data: Actuarial object with Dx, Nx commutation arrays populated
- from_stage: insurance_premium_calculation
  to_stage: reserve_calculation
  data: Single premiums (Ax, Axn) for capital/benefit calculation
- from_stage: annuity_premium_calculation
  to_stage: reserve_calculation
  data: Annuity values for premium income calculation
global_contracts:
- contract: 'qx values stored as qx*1000 (per mille), must divide by 1000 before use in probabilities
    - evidence: pyliferisk/__init__.py:52'
  evidence: ''
- contract: 'lx[0] = 100000 (radix of table), lx[-1] = 0 (each lives extinct) - evidence: pyliferisk/__init__.py:50,54'
  evidence: ''
- contract: 'Every ages are integer indices into array, starting age determined by nt[0] - evidence: pyliferisk/mortalitytables.py:8'
  evidence: ''
- contract: 'Interest rate i stored as decimal (0.05 = 5%), not percentage - evidence: pyliferisk/__init__.py:247'
  evidence: ''
- contract: 'Actuarial notation: tpx = mt.lx[x+t]/mt.lx[x] (survival ratio) - evidence: pyliferisk/__init__.py:218'
  evidence: ''
- contract: 'ex calculation uses UDD assumption: 0.5 + sum(lx[g+1:-1])/lx_g - evidence: pyliferisk/__init__.py:73,141'
  evidence: ''
- contract: 'Fractional payment adjustment hardcoded as (m-1)/(2m) - evidence: pyliferisk/__init__.py:379,385,397,403'
  evidence: ''
- contract: 'Geometrically increasing formulas use j=(i-q)/(1+q) transformation - evidence: pyliferisk/__init__.py:336,342,446,453'
  evidence: ''
business_decisions:
- id: BD-001
  type: B/BA
  content: qx stored as qx*1000 (per mille convention)
  rationale: Traditional actuarial notation uses per-mille convention for mortality rates, simplifying
    table data entry at source (mortalitytables.py tuples) and aligning with industry-standard actuarial
    practice for mortality table representation across each product calculations
  evidence: pyliferisk/__init__.py:52(module)
  stage: table_construction
  alternative_considered: Decimal representation (0.001 instead of 1) would require changes to each formula
    implementations and deviate from actuarial standard notation
  _evidence_issues:
  - 'FN_NOT_FOUND: module in pyliferisk/__init__.py'
- id: BD-002
  type: B/BA
  content: lx[0] = 100000 radix fixed
  rationale: Industry standard convention using 100,000 initial lives at age 0 as the radix, providing
    a consistent basis for calculating survival probabilities and insurance reserves across different
    mortality tables and enabling interoperability with standard actuarial references
  evidence: pyliferisk/__init__.py:50(module)
  stage: table_construction
  alternative_considered: Alternative radix values (e.g., 1,000,000) would require recalibration of each
    insurance premium formulas and break compatibility with standard references
  _evidence_issues:
  - 'FN_NOT_FOUND: module in pyliferisk/__init__.py'
- id: BD-003
  type: B
  content: Two classes instead of one (MortalityTable + Actuarial)
  rationale: Separation into MortalityTable for pure mortality data and Actuarial for interest-based commutations
    (Dx,Nx,Cx,Mx) provides cleaner separation of concerns, enabling reuse of mortality data with different
    interest rates without duplicating table storage
  evidence: pyliferisk/__init__.py:22,90(module)
  stage: table_construction
  alternative_considered: Single monolithic class would couple mortality and interest calculations, reducing
    flexibility for sensitivity testing across interest rate scenarios
  _evidence_issues:
  - 'FN_NOT_FOUND: module in pyliferisk/__init__.py'
- id: BD-004
  type: BA/DK
  content: perc parameter for loading adjustment
  rationale: Allows experience rating by scaling qx through the perc parameter (percentage loading), enabling
    creation of experience tables from standard tables and supporting insurer-specific mortality adjustments
    for actual vs expected analysis
  evidence: pyliferisk/__init__.py:45(module)
  stage: table_construction
  alternative_considered: Fixed loading without adjustment would limit ability to model actual portfolio
    experience and impair pricing accuracy
  _evidence_issues:
  - 'FN_NOT_FOUND: module in pyliferisk/__init__.py'
- id: BD-005
  type: B
  content: Commutations computed eagerly in __init__
  rationale: Eager computation of commutation functions (Dx,Cx,Mx,Nx) in constructor avoids repeated calculation
    overhead and follows standard actuarial approach where these auxiliary values are computed once upfront
    for fast later access across each premium and reserve calculations
  evidence: pyliferisk/__init__.py:142(module)
  stage: commutation_computation
  alternative_considered: Lazy computation would add computational overhead to each formula call and slow
    down batch calculations
  _evidence_issues:
  - 'FN_NOT_FOUND: module in pyliferisk/__init__.py'
- id: BD-006
  type: B
  content: Interest rate i stored on object
  rationale: Storing interest rate as object attribute ensures each commutation functions depend on the
    same i, enabling uniform Axx/axx style formula implementation and consistent actuarial calculations
    across the entire policy valuation
  evidence: pyliferisk/__init__.py:97(module)
  stage: commutation_computation
  alternative_considered: Global or parameter-passed rates would reduce consistency, increase function
    signatures, and risk mismatched rates in complex calculations
  _evidence_issues:
  - 'FN_NOT_FOUND: module in pyliferisk/__init__.py'
- id: BD-007
  type: B
  content: 'Formula: Ax = Mx[x] / Dx[x]'
  rationale: Standard commutation formula computing net single premium for unit benefit as ratio of cumulative
    to current commutation numbers, implementing the fundamental relationship between mortality and interest
    in life insurance pricing
  evidence: pyliferisk/__init__.py:302(module)
  stage: insurance_premium_calculation
  alternative_considered: Alternative formulations (e.g., using recursive relations) would deviate from
    standard actuarial practice and reduce readability for actuaries
  _evidence_issues:
  - 'FN_NOT_FOUND: module in pyliferisk/__init__.py'
- id: BD-008
  type: BA/M
  content: Creates new Actuarial object for qAx transformations
  rationale: Geometrically increasing formulas require transformed interest j=(i-q)/(1+q), and creating
    a new Actuarial object encapsulates this transformation cleanly without modifying existing calculations,
    enabling deferred and increasing benefit products
  evidence: pyliferisk/__init__.py:337(module)
  stage: insurance_premium_calculation
  alternative_considered: In-place modification would couple transformation logic with base calculations
    and complicate re-use of original tables
  _evidence_issues:
  - 'FN_NOT_FOUND: module in pyliferisk/__init__.py'
- id: BD-009
  type: BA
  content: annuity() dispatcher handles 15+ parameter combinations
  rationale: Complex parameter space (payment timing, fractional m, increasing a/g, deferred -d) requires
    a single dispatcher to avoid proliferation of specialized functions while maintaining each annuity
    product variations through unified API surface
  evidence: pyliferisk/__init__.py:489(module)
  stage: annuity_premium_calculation
  alternative_considered: Separate functions for each variation would create API bloat, maintenance burden,
    and inconsistent behavior across product types
  _evidence_issues:
  - 'FN_NOT_FOUND: module in pyliferisk/__init__.py'
- id: BD-010
  type: B
  content: m parameter for fractional payments
  rationale: Standard actuarial approximation for m-thly payments using (m-1)/(m*2) adjustment (Uddell
    approximation), enabling accurate calculation of premiums for semi-annual, quarterly, and monthly
