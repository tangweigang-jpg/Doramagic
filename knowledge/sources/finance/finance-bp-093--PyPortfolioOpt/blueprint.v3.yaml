# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-093
name: PyPortfolioOpt
sop_version: '3.6'
source:
  projects:
  - PyPortfolioOpt
  commit_hash: c524c6e5f07150f2075cbf5b255e8a4827d8caf9
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: portfolio optimization
  description: Library implementing portfolio optimization methods including classical mean-variance optimization,
    Black-Litterman allocation, shrinkage estimators, and Hierarchical Risk Parity for combining alpha
    sources in a risk-efficient manner.
  prerequisites: Understanding of modern portfolio theory, pandas DataFrames, numpy arrays, basic financial
    concepts including expected returns and covariance matrices
  not_suitable_for: Real-time trading execution systems, investors without quantitative data inputs (expected
    returns/covariance), non-convex optimization problems outside portfolio allocation
stages:
- id: data_input
  name: Data Input & Preprocessing
  order: 1
  responsibility: Converts raw price data into returns and estimates expected returns/covariance matrices
    for optimization. Normalizes to annual frequency using 252 trading days assumption.
  interface:
    inputs:
    - pd.DataFrame of daily asset prices
    outputs:
    - pd.Series of annual expected returns
    - np.ndarray covariance matrix
  required_methods:
  - name: mean_historical_return
    description: Computes mean historical returns using either compounding (CAGR) or arithmetic mean approach
    evidence: pypfopt/expected_returns.py:169(mean_historical_return)
  - name: CovarianceShrinkage.__init__
    description: Provides multiple shrinkage estimators for covariance matrices including Ledoit-Wolf
    evidence: pypfopt/risk_models.py:427(CovarianceShrinkage.__init__)
  - name: return_model
    description: Factory function for return estimation supporting multiple methods
    evidence: pypfopt/expected_returns.py:91(return_model)
  key_behaviors:
  - behavior: Frequency annualization
    description: frequency=252 hardcodes US trading days/year assumption for annualization across each
      return/risk calculations
    evidence: pypfopt/risk_models.py:427(CovarianceShrinkage.__init__)
  - behavior: Compounding default
    description: Compounding=True default for mean_historical_return computes CAGR which is more realistic
      for investors
    evidence: pypfopt/expected_returns.py:169(mean_historical_return)
  - behavior: Positive semidefinite validation
    description: Cholesky decomposition with 1e-16 tolerance ensures covariance matrix is valid for optimization
    evidence: pypfopt/risk_models.py:51(_is_positive_semidefinite)
  replaceable_points:
  - name: return_model method
    description: Factory pattern allows pluggable return estimation strategies
    options:
    - name: mean_historical_return
      traits:
      - historical
      - compound
      - simple
      fit_for:
      - general use
      - backtesting
      not_fit_for:
      - fast-changing markets
    - name: ema_historical_return
      traits:
      - exponential weighting
      - recent data emphasized
      fit_for:
      - trending markets
      - recent data importance
      not_fit_for:
      - stable markets
      - long horizons
    - name: capm_return
      traits:
      - equilibrium-based
      - market model
      fit_for:
      - market-sensitive portfolios
      - factor models
      not_fit_for:
      - non-market-correlated assets
    default: mean_historical_return
  - name: risk_matrix method
    description: Factory pattern for covariance estimation with multiple shrinkage options
    options:
    - name: sample_cov
      traits:
      - unbiased estimator
      - maximum likelihood
      fit_for:
      - large universes
      - stable covariance
      not_fit_for:
      - small samples
      - ill-conditioned matrices
    - name: shrunk_covariance
      traits:
      - Ledoit-Wolf shrinkage
      - regularized
      fit_for:
      - large dimensions
      - noisy estimates
      not_fit_for:
      - small universes
    - name: exp_cov
      traits:
      - exponential weighting
      - recency bias
      fit_for:
      - non-stationary data
      not_fit_for:
      - stationary data
    - name: min_cov_determinant
      traits:
      - robust
      - outlier-resistant
      fit_for:
      - data with outliers
      not_fit_for:
      - clean data
      - large samples
    default: sample_cov
  - name: ledoit_wolf shrinkage target
    description: Shrinkage estimator choice for Ledoit-Wolf method
    options:
    - name: constant_variance
      traits:
      - diagonal target
      - simple
      fit_for:
      - general use
      not_fit_for:
      - factor-driven markets
    - name: single_factor
      traits:
      - CAPM-based
      - market factor
      fit_for:
      - market-correlated assets
      not_fit_for:
      - multi-factor portfolios
    - name: constant_correlation
      traits:
      - equal correlations
      - stabilized
      fit_for:
      - homogeneous assets
      not_fit_for:
      - heterogeneous universes
    default: constant_variance
  design_decisions:
  - 'frequency=252 hardcoded as default: US markets have ~252 trading days/year; makes assumption explicit
    but may not fit each markets (pypfopt/risk_models.py:427)'
  - 'Compounding=True default for mean_historical_return: CAGR more realistic for investors than arithmetic
    mean, but changes expected returns significantly (pypfopt/expected_returns.py:169)'
  - 'Positive semidefinite matrix check with Cholesky decomposition: Cholesky is O(n³) but faster in practice
    than eigenvalue check; +1e-16 ensures numerical stability (pypfopt/risk_models.py:51)'
  acceptance_hints:
  - Covariance matrix passes is_positive_semidefinite check
  - Expected returns series has same index as covariance matrix columns
  - No NaN values in output matrices
  - Every prices are positive and within reasonable range
- id: portfolio_optimization
  name: Portfolio Optimization
  order: 2
  responsibility: Finds optimal asset weights based on mean-variance or alternative risk objectives using
    convex optimization via cvxpy. Core optimization engine of the library.
  interface:
    inputs:
    - expected_returns (pd.Series)
    - cov_matrix (np.ndarray)
    - constraints
    outputs:
    - 'OrderedDict of {ticker: weight}'
  required_methods:
  - name: EfficientFrontier.min_volatility
    description: Finds portfolio weights that minimize portfolio volatility
    evidence: pypfopt/efficient_frontier/efficient_frontier.py:221(min_volatility)
  - name: EfficientFrontier.max_sharpe
    description: Finds portfolio weights that maximize Sharpe ratio (risk-adjusted return)
    evidence: pypfopt/efficient_frontier/efficient_frontier.py:238(max_sharpe)
  - name: EfficientFrontier.efficient_risk
    description: Finds portfolio on efficient frontier for target volatility
    evidence: pypfopt/efficient_frontier/efficient_frontier.py:398(efficient_risk)
  - name: EfficientFrontier.efficient_return
    description: Finds portfolio on efficient frontier for target return
    evidence: pypfopt/efficient_frontier/efficient_frontier.py:451(efficient_return)
  - name: BaseConvexOptimizer.add_objective
    description: Adds custom convex objective function to optimization problem
    evidence: pypfopt/base/_base_optimizer.py:347(add_objective)
  - name: BaseConvexOptimizer.add_constraint
    description: Adds linear constraint to optimization problem
    evidence: pypfopt/base/_base_optimizer.py:391(add_constraint)
  - name: BaseOptimizer.clean_weights
    description: Removes near-zero weights (below cutoff) and formats output
    evidence: pypfopt/base/_base_optimizer.py:88(clean_weights)
  - name: portfolio_performance
    description: Calculates portfolio return, volatility, and Sharpe ratio
    evidence: pypfopt/base/_base_optimizer.py:561(portfolio_performance)
  key_behaviors:
  - behavior: Long-only default bounds
    description: weight_bounds=(0,1) enforces long-only portfolios by default across each optimizer classes;
      shorting requires explicit (-1,1)
    evidence: pypfopt/base/_base_optimizer.py:173(BaseConvexOptimizer.__init__)
  - behavior: Zero risk-free rate
    description: risk_free_rate=0.0 assumed globally affecting Sharpe ratios, CAPM, and utility calculations
    evidence: pypfopt/efficient_frontier/efficient_frontier.py:238(max_sharpe)
  - behavior: Weight cleanup threshold
    description: clean_weights cutoff=1e-4 removes floating-point noise; may affect portfolios with genuinely
      small weights
    evidence: pypfopt/base/_base_optimizer.py:88(clean_weights)
  - behavior: Strategy pattern extensibility
    description: add_objective and add_constraint enable users to add custom convex objectives without
      modifying core
    evidence: pypfopt/base/_base_optimizer.py:347(add_objective)
  - behavior: cvxpy optimization backend
    description: Industry-standard cvxpy handles disciplined convex optimization with automatic DCP verification
    evidence: pypfopt/base/_base_optimizer.py:195(BaseConvexOptimizer.__init__)
  - behavior: Immutable problem state
    description: No re-solving after objectives added; forces new instance for modified constraints to
      prevent stale state
    evidence: pypfopt/base/_base_optimizer.py:364(add_objective)
  - behavior: Custom deepcopy required
    description: cvxpy expressions don't support stdlib deepcopy; custom implementation enables creating
      fresh optimizer copies
    evidence: pypfopt/base/_base_optimizer.py:207-219
  replaceable_points:
  - name: optimization method
    description: Multiple optimization objectives available on EfficientFrontier
    options:
    - name: min_volatility
      traits:
      - variance minimization
      - no return required
      fit_for:
      - conservative investors
      - risk-averse portfolios
      not_fit_for:
      - return-seeking investors
    - name: max_sharpe
      traits:
      - Sharpe maximization
      - risk-adjusted return
      fit_for:
      - balanced portfolios
      - general use
      not_fit_for:
      - when risk-free rate is non-zero
    - name: efficient_risk
      traits:
      - target volatility
      - frontier point
      fit_for:
      - known risk tolerance
      not_fit_for:
      - unknown risk targets
    - name: efficient_return
      traits:
      - target return
      - minimum variance
      fit_for:
      - return requirements
      - liability-driven
      not_fit_for:
      - max return optimization
    - name: max_quadratic_utility
      traits:
      - mean-variance utility
      - configurable risk aversion
      fit_for:
      - advanced users
      - utility-based optimization
      not_fit_for:
      - simple use cases
    default: min_volatility
  - name: solver backend
    description: cvxpy solver selection for convex optimization
    options:
    - name: ECOS
      traits:
      - interior point
      - good for most problems
      fit_for:
      - general convex problems
      not_fit_for:
      - large-scale problems
    - name: SCS
      traits:
      - first-order
      - large-scale
      fit_for:
      - Large problems
      not_fit_for:
      - high-precision requirements
    - name: OSQP
      traits:
      - QP-specialized
      - fast
      fit_for:
      - Quadratic programming
      not_fit_for:
      - SOCP/SDP problems
    - name: CLARABEL
      traits:
      - new solver
      - Rust-based
      fit_for:
      - Modern applications
      not_fit_for:
      - Legacy compatibility
    - name: None (auto)
      traits:
      - automatic selection
      - default
      fit_for:
      - general use
      not_fit_for:
      - specific solver requirements
    default: None (auto)
  - name: custom objective function
    description: User-defined convex objectives via add_objective
    options:
    - name: any DCP-compliant cvxpy expression
      traits:
      - convex
      - cvxpy-compatible
      fit_for:
      - custom risk measures
      - special constraints
      not_fit_for:
      - non-convex problems
    default: N/A
  design_decisions:
  - 'weight_bounds=(0,1) long-only default: Conservative default suitable for most investors; must explicitly
    set (-1,1) for shorts (pypfopt/base/_base_optimizer.py:173)'
  - 'risk_free_rate=0.0 default: Simplifies use case for most users; real rates vary by currency/time
    period (pypfopt/efficient_frontier/efficient_frontier.py:238)'
  - 'cutoff=1e-4 for clean_weights: Removes floating-point noise; may affect portfolio when weights are
    genuinely small (pypfopt/base/_base_optimizer.py:88)'
  - 'Strategy pattern via add_objective/add_constraint: Extensibility allows users to add custom convex
    objectives/constraints without modifying core (pypfopt/base/_base_optimizer.py:347)'
  - 'cvxpy for convex optimization: Industry-standard for disciplined convex optimization; handles DCP
    automatically (pypfopt/base/_base_optimizer.py:195)'
  - 'No re-solving after objectives added: Prevents stale state; forces new instance for new constraints
    (pypfopt/base/_base_optimizer.py:364)'
  acceptance_hints:
  - Optimization completes with status OPTIMAL or OPTIMAL_INACCURATE
  - Portfolio weights sum to 1.0 (or 0.0 for market-neutral)
  - Every weights within specified bounds
  - Sharpe ratio is finite and reasonable (typically -2 to 5 for normal markets)
  - No constraint violations in solved portfolio
- id: hierarchical_optimization
  name: Hierarchical Portfolio Optimization
  order: 3
  responsibility: Non-convex optimization using hierarchical clustering to avoid estimation error in traditional
    mean-variance. Uses scipy for clustering with inverse-variance weighting within clusters.
  interface:
    inputs:
    - returns (pd.DataFrame)
    - cov_matrix (np.ndarray)
    outputs:
    - 'OrderedDict of {ticker: weight}'
  required_methods:
  - name: HRPOpt.optimize
    description: Performs hierarchical risk parity optimization using scipy clustering
    evidence: pypfopt/hierarchical_portfolio.py:85(optimize)
  key_behaviors:
  - behavior: Inverse-variance clustering
    description: Inverse-variance weighting within clusters provides equal-risk contribution within cluster
      pairs
    evidence: pypfopt/hierarchical_portfolio.py:103(_get_cluster_var)
  - behavior: Bi-section recursion
    description: Bi-section recursion for allocation is O(n log n) vs O(n²) for full optimization; deterministic
      and fast
    evidence: pypfopt/hierarchical_portfolio.py:146(_raw_hrp_allocation)
  - behavior: No mean-variance optimization
    description: HRPOpt uses clustering-based allocation and cannot use EfficientFrontier's objective
      functions
    evidence: pypfopt/hierarchical_portfolio.py:101-105
  replaceable_points:
  - name: linkage_method
    description: Hierarchical clustering algorithm for dendrogram construction
    options:
    - name: single
      traits:
      - minimum distance
      - chaining risk
      fit_for:
      - simple hierarchies
      not_fit_for:
      - diverse assets
    - name: complete
      traits:
      - maximum distance
      - compact clusters
      fit_for:
      - balanced portfolios
      not_fit_for:
      - outlier-prone data
    - name: average
      traits:
      - average distance
      - balanced
      fit_for:
      - general use
      - most datasets
      not_fit_for:
      - highly skewed clusters
    - name: weighted
      traits:
      - weighted average
      fit_for:
      - known cluster sizes
      not_fit_for:
      - unknown structure
    - name: centroid
      traits:
      - centroid distance
      fit_for:
      - Euclidean spaces
      not_fit_for:
      - non-Euclidean metrics
    default: single
  design_decisions:
  - 'Inverse-variance weighting within clusters: Standard approach for equal-risk contribution within
    cluster pairs (pypfopt/hierarchical_portfolio.py:103)'
  - 'Bi-section recursion for allocation: O(n log n) vs O(n²) for full optimization; deterministic and
    fast (pypfopt/hierarchical_portfolio.py:146)'
  acceptance_hints:
  - Dendrogram visualization shows reasonable cluster structure
  - Every assets receive non-zero weights
  - Weights sum to 1.0
  - Cluster diversification reduces concentration in single sectors
- id: cla_optimization
  name: Critical Line Algorithm Optimization
  order: 4
  responsibility: Alternative mean-variance optimizer using de Prado's CLA algorithm. Generates full efficient
    frontier efficiently without cvxpy dependency using pure numpy.
  interface:
    inputs:
    - expected_returns (pd.Series)
    - cov_matrix (np.ndarray)
    - weight_bounds
    outputs:
    - OrderedDict or list of frontier weights
  required_methods:
  - name: CLA.max_sharpe
    description: Returns portfolio weights with maximum Sharpe ratio using CLA
    evidence: pypfopt/cla.py:400(max_sharpe)
  - name: CLA.min_volatility
    description: Returns minimum variance portfolio weights using CLA
    evidence: pypfopt/cla.py:462(min_volatility)
  - name: CLA.efficient_frontier
    description: Generates full efficient frontier as list of weight dictionaries
    evidence: pypfopt/cla.py:485(efficient_frontier)
  key_behaviors:
  - behavior: Pure numpy implementation
    description: No cvxpy dependency; faster for generating full frontier as pure numpy implementation
    evidence: pypfopt/cla.py:1(cla.py imports)
  - behavior: Golden section search
    description: Finds optimal Sharpe ratio without gradient using golden section; robust for non-differentiable
      cases
    evidence: pypfopt/cla.py:289(_golden_section)
  - behavior: Lazy solving
    description: CLA._solve() must be called before max_sharpe/min_volatility/efficient_frontier; lazily
      computes turning points on first call
    evidence: pypfopt/cla.py:409-410
  replaceable_points:
  - name: frontier generation points
    description: Number of points on efficient frontier to generate
    options:
    - name: integer >= 2
      traits:
      - configurable density
      fit_for:
      - detailed frontier analysis
      not_fit_for:
      - quick estimates
    default: '100'
  design_decisions:
  - 'No cvxpy dependency: Pure numpy implementation; faster for generating full frontier (pypfopt/cla.py:1)'
  - 'Golden section search for lambda: Finds optimal Sharpe ratio without gradient; robust for non-differentiable
    cases (pypfopt/cla.py:289)'
  acceptance_hints:
  - Efficient frontier shows continuous Pareto-optimal curve
  - CLA._solve completes without error before accessing weights
  - Frontier points are sorted by increasing risk
- id: black_litterman
  name: Black-Litterman Optimization
  order: 5
  responsibility: Bayesian approach combining market equilibrium prior with investor views. Reduces extreme
    weights from traditional MVO by blending views with implied equilibrium returns.
  interface:
    inputs:
    - cov_matrix (np.ndarray)
    - pi (prior returns)
    - Q (view matrix)
    - P (pick matrix)
    outputs:
    - posterior returns/covariance (pd.Series)
    - OrderedDict weights
  required_methods:
  - name: BlackLittermanModel.bl_weights
    description: Computes Black-Litterman posterior weights from views
    evidence: pypfopt/black_litterman.py:420(bl_weights)
  - name: BlackLittermanModel.optimize
    description: Optimizes portfolio using Black-Litterman posterior returns
    evidence: pypfopt/black_litterman.py:512(optimize)
  - name: BlackLittermanModel.idzorek_method
    description: Converts percentage confidences to BL omega matrix using Idzorek method
    evidence: pypfopt/black_litterman.py:380(idzorek_method)
  key_behaviors:
  - behavior: tau=0.05 default
    description: Weight-on-views scalar tau=0.05 is industry standard; 5% weight on views vs 95% on prior
    evidence: pypfopt/black_litterman.py:150(BlackLittermanModel.__init__)
  - behavior: risk_aversion=1 default
    description: Moderate risk aversion of 1.0; user should calibrate to their utility function
    evidence: pypfopt/black_litterman.py:151(BlackLittermanModel.__init__)
  - behavior: Idzorek view uncertainty
    description: Idzorek method converts percentage confidences to BL omega; intuitive for practitioners
    evidence: pypfopt/black_litterman.py:380(idzorek_method)
  - behavior: Inherits BaseOptimizer not BaseConvexOptimizer
    description: BlackLitterman cannot use add_objective/add_constraint from BaseConvexOptimizer; separate
      extensibility model
    evidence: pypfopt/black_litterman.py:512(optimize)
  replaceable_points:
  - name: prior specification
    description: How to construct the equilibrium prior returns
    options:
    - name: market (market_caps required)
      traits:
      - market-implied
      - equilibrium
      fit_for:
      - market-cap weighted views
      not_fit_for:
      - unknown market caps
    - name: equal
      traits:
      - equal-weight prior
      fit_for:
      - no market cap data
      not_fit_for:
      - market-aware views
    - name: custom array
      traits:
      - user-defined prior
      fit_for:
      - specialized prior estimates
      not_fit_for:
      - simple use cases
    default: None (requires explicit pi)
  - name: omega computation
    description: View uncertainty matrix method
    options:
    - name: default (proportional)
      traits:
      - automatic
      - proportional to P
      fit_for:
      - simple view specification
      not_fit_for:
      - intuitive confidence levels
    - name: idzorek (percentage confidences)
      traits:
      - user-friendly
      - percentage-based
      fit_for:
      - intuitive confidence specification
      not_fit_for:
      - matrix-level omega input
    default: default
  design_decisions:
  - 'tau=0.05 default weight-on-views: Industry standard; 5% weight on views vs 95% on prior (pypfopt/black_litterman.py:150)'
  - 'risk_aversion=1 default: Moderate risk aversion; user should calibrate to their utility (pypfopt/black_litterman.py:151)'
  - 'Idzorek method for view uncertainty: Converts percentage confidences to BL omega; intuitive for practitioners
    (pypfopt/black_litterman.py:380)'
  acceptance_hints:
  - Posterior returns are more moderate than raw historical returns
  - Views propagate meaningfully to non-specified assets
  - BL weights are less extreme than pure MVO weights
  - omega matrix is positive definite
- id: discrete_allocation
  name: Discrete Allocation
  order: 6
  responsibility: Converts continuous weights from optimizer into actual share counts for trading. Bridges
    optimization theory to execution by handling rounding and lot sizes.
  interface:
    inputs:
    - weights (dict)
    - latest_prices (pd.Series)
    - total_portfolio_value (float)
    outputs:
    - 'dict of {ticker: shares}'
    - RMSE error
  required_methods:
  - name: DiscreteAllocation.greedy_portfolio
    description: Greedy algorithm for discrete allocation; fast O(n²) but suboptimal
    evidence: pypfopt/discrete_allocation.py:158(greedy_portfolio)
  - name: DiscreteAllocation.lp_portfolio
    description: Linear programming for optimal discrete allocation; slower but allows constraints
    evidence: pypfopt/discrete_allocation.py:200(lp_portfolio)
  key_behaviors:
  - behavior: Default portfolio value
    description: total_portfolio_value=10000 default is sensible for demonstration; should be actual portfolio
      value for production
    evidence: pypfopt/discrete_allocation.py:64(DiscreteAllocation.__init__)
  - behavior: Two allocation algorithms
    description: Greedy is fast O(n²); LP is optimal but slower; LP allows short_ratio constraint
    evidence: pypfopt/discrete_allocation.py:158(greedy_portfolio)
  - behavior: RMSE tracking
    description: RMSE error measures tracking error from rounding; helps user understand approximation
      quality
    evidence: pypfopt/discrete_allocation.py:119(_allocation_rmse_error)
  replaceable_points:
  - name: allocation algorithm
    description: Method to discretize continuous weights to share counts
    options:
    - name: greedy_portfolio
      traits:
      - fast O(n²)
      - heuristic
      - no constraints
      fit_for:
      - large universes
      - speed priority
      not_fit_for:
      - constrained allocation
      - optimal results
    - name: lp_portfolio
      traits:
      - optimal LP
      - constraint support
      fit_for:
      - optimal allocation
      - short_ratio constraint
      not_fit_for:
      - very large universes
      - real-time needs
    default: greedy_portfolio
  - name: reinvest flag
    description: Whether to reinvest proceeds from shorting
    options:
    - name: 'True'
      traits:
      - reinvest shorts
      fit_for:
      - long-short portfolios
      not_fit_for:
      - long-only
    - name: 'False'
      traits:
      - no reinvestment
      fit_for:
      - long-only
      - simple allocation
      not_fit_for:
      - short positions
    default: 'False'
  design_decisions:
  - 'total_portfolio_value=10000 default: Sensible default for demonstration; should be actual portfolio
    value (pypfopt/discrete_allocation.py:64)'
  - 'Two allocation methods: greedy vs LP: Greedy is fast O(n²); LP is optimal but slower. LP allows short_ratio
    constraint (pypfopt/discrete_allocation.py:158)'
  - 'RMSE error calculation: Measures tracking error from rounding; helps user understand approximation
    quality (pypfopt/discrete_allocation.py:119)'
  acceptance_hints:
  - Every share counts are non-negative integers
  - Sum of (shares × price) approximates total_portfolio_value within RMSE
  - Every allocated tickers have valid prices
  - No fractional shares
- id: visualization
  name: Visualization
  order: 7
  responsibility: Plots efficient frontiers, dendrograms, and weight allocations. Supports both matplotlib
    and plotly backends with lazy imports to avoid hard dependencies.
  interface:
    inputs:
    - optimizer object or weights dict
    - plotting parameters
    outputs:
    - matplotlib.axes.Axes or plotly figure
  required_methods:
  - name: plot_efficient_frontier
    description: Plots the efficient frontier with optimal portfolios marked
    evidence: pypfopt/plotting.py:324(plot_efficient_frontier)
  - name: plot_weights
    description: Plots portfolio weights as horizontal bar chart
    evidence: pypfopt/plotting.py:69(plot_weights)
  - name: plot_dendrogram
    description: Plots hierarchical clustering dendrogram for HRP
    evidence: pypfopt/plotting.py:140(plot_dendrogram)
  - name: plot_covariance
    description: Plots covariance matrix as heatmap
    evidence: pypfopt/plotting.py:195(plot_covariance)
  key_behaviors:
  - behavior: Lazy import of optional dependencies
    description: matplotlib and plotly are optional dependencies; lazy import avoids import error if not
      installed
    evidence: pypfopt/plotting.py:20(_import_matplotlib)
  - behavior: Efficient frontier range calculation
    description: linspace from GMV to max-0.0001 avoids numerical issues at boundary; assumes valid frontier
      exists
    evidence: pypfopt/plotting.py:247(_ef_default_returns_range)
  - behavior: Requires unoptimized optimizer
    description: plot_efficient_frontier requires unoptimized optimizer; deepcopy creates fresh copies
      to prevent state mutation
    evidence: pypfopt/plotting.py:236-247
  replaceable_points:
  - name: visualization library
    description: Backend for plots
    options:
