- id: BD-041
  type: B/BA
  content: L2 regularization gamma defaults to 1
  rationale: Gamma=1 provides moderate regularization to stabilize optimization and prevent extreme weights.
    The boundary balances between raw optimization (gamma=0) and heavy shrinkage. This default is conservative
    but ensures more stable portfolios, especially with correlated assets.
  evidence: pypfopt/objective_functions.py:138(gamma=1)
  stage: portfolio_optimization
