replaceable_slots:
- id: slot-001
  name: optimizer_solver
  description: 'Choose based on: problem type (QP vs SOCP vs MILP), scale, commercial vs free license,
    and installation complexity'
  used_in_stages: []
  options:
  - name: ECOS
    traits:
    - SOCP
    - free
    - pure Python
    fit_for:
    - Standard portfolio optimization, default recommended solver
    not_fit_for:
    - Mixed-integer programs (use ECOS_BB instead)
  - name: ECOS_BB
    traits:
    - mixed-integer SOCP
    - branch-and-bound
    fit_for:
    - Discrete allocation with integer programming (lp_portfolio)
    not_fit_for:
    - Continuous optimization without integers
  - name: OSQP
    traits:
    - QP
    - very fast
    - open source
    fit_for:
    - Quadratic programming, large-scale problems
    not_fit_for:
    - Second-order cone problems, mixed-integer
  - name: SCS
    traits:
    - SOCP
    - free
    fit_for:
    - Standard portfolio optimization when ECOS unavailable
    not_fit_for:
    - Very high precision requirements
  - name: CLARABEL
    traits:
    - SOCP
    - newer
    - interior point
    fit_for:
    - Modern alternative to ECOS, improved numerical stability
    not_fit_for:
    - Mixed-integer programs
  - name: GLPK
    traits:
    - LP
    - MILP
    fit_for:
    - Integer programming on CVXPY (via cvxopt interface)
    not_fit_for:
    - SOCP, continuous QP
  - name: MOSEK
    traits:
    - SOCP
    - commercial
    - high precision
    fit_for:
    - Production use, very large portfolios, high accuracy needs
    not_fit_for:
    - Casual use (commercial license required)
  - name: Gurobi
    traits:
    - MILP
    - commercial
    fit_for:
    - Large-scale discrete allocation, production systems
    not_fit_for:
    - Small problems (overkill), SOCP (limited support)
  default: ECOS (for SOCP), OSQP (for QP)
  _source: worker_resource
- id: slot-002
  name: plotting_engine
  description: Choose matplotlib for static reports; plotly for interactive exploration. Both supported
    natively by PyPortfolioOpt.
  used_in_stages: []
  options:
  - name: matplotlib
    traits:
    - static
    - png/pdf/svg
    - pure Python
    fit_for:
    - Publication-quality static plots, reports, documentation
    not_fit_for:
    - Interactive exploration, web dashboards
  - name: plotly
    traits:
    - interactive
    - html
    - hover tooltips
    fit_for:
    - Interactive efficient frontier exploration, web applications
    not_fit_for:
    - Static reports, print publications
  - name: bokeh
    traits:
    - interactive
    - web-ready
    fit_for:
    - Web-based portfolio dashboards
    not_fit_for:
    - Quick static plots (overkill)
  default: matplotlib
  _source: worker_resource
- id: slot-003
  name: data_source
  description: Use yfinance for quick prototyping. For production, consider data quality, latency needs,
    and cost. PyPortfolioOpt itself requires no specific data source.
  used_in_stages: []
  options:
  - name: yfinance
    traits:
    - free
    - no API key
    - US stocks
    fit_for:
    - Quick prototyping, US equities, personal use
    not_fit_for:
    - Production trading, non-US markets, high-frequency data
  - name: pandas-datareader
    traits:
    - free tier
    - varied coverage
    fit_for:
    - Economic data (FRED), multiple source access
    not_fit_for:
    - Dedicated trading systems
  - name: Alpha Vantage
    traits:
    - API key required
    - stocks, FX, crypto
    fit_for:
    - FX data, intraday data, premium accuracy
    not_fit_for:
    - Budget-constrained projects (rate limits)
  - name: IEX Cloud
    traits:
    - API key required
    - stocks, crypto
    fit_for:
    - Professional data, real-time quotes
    not_fit_for:
    - Free hobby projects
  - name: CSV/Local Files
    traits:
    - full control
    - backtesting
    fit_for:
    - Historical backtesting, proprietary data sources
    not_fit_for:
    - Real-time trading, live data feeds
  default: CSV/Local Files (user must provide)
  _source: worker_resource
- id: slot-004
  name: covariance_estimator
  description: Start with Ledoit-Wolf for balanced bias-variance. Use semicovariance if downside risk
    is the primary concern.
  used_in_stages: []
  options:
  - name: Sample Covariance
    traits:
    - unbiased
    - high variance
    fit_for:
    - Large datasets (>500 observations per asset)
    not_fit_for:
    - Small datasets, noisy markets (prone to overfitting)
  - name: Ledoit-Wolf Shrinkage
    traits:
    - biased
    - reduced variance
    - automatic shrinkage
    fit_for:
    - Moderate datasets, general purpose (recommended default)
    not_fit_for:
    - Very large datasets (computationally expensive)
  - name: Oracle Approximating Shrinkage
    traits:
    - biased
    - advanced shrinkage
    fit_for:
    - When Ledoit-Wolf performs poorly
    not_fit_for:
    - Small portfolios
  - name: Exponential Weighted Covariance
    traits:
    - recency-weighted
    - adaptive
    fit_for:
    - Time-varying market conditions, regime changes
    not_fit_for:
    - Stationary markets (overly complex)
  - name: Semicovariance
    traits:
    - downside risk
    - asymmetric
    fit_for:
    - Investors concerned with downside risk only
    not_fit_for:
    - Symmetric risk management
  default: Ledoit-Wolf (via CovarianceShrinkage class)
  _source: worker_resource
