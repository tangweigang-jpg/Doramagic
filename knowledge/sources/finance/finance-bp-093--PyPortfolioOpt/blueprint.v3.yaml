  _evidence_issues:
  - 'INVALID_IDENTIFIER: tol=1.0e-9 in pypfopt/cla.py'
- id: BD-039
  type: B/BA
  content: Market neutral defaults to False (long-only portfolios)
  rationale: Defaulting to long-only (market_neutral=False) aligns with most regulatory constraints and
    investor mandates. The boundary prevents unintended short exposure that would require margin and increase
    complexity. Explicit enabling of market neutrality ensures users consciously choose leveraged strategies.
  evidence: pypfopt/efficient_frontier/efficient_frontier.py:317(market_neutral=False); pypfopt/efficient_frontier/efficient_frontier.py:359(market_neutral=False)
  stage: portfolio_optimization
  alternative_considered: Market neutral default would be inappropriate for most users and could violate
