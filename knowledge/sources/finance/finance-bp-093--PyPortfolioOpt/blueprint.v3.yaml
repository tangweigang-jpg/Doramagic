  type: code_example
  name: Hierarchical Risk Parity Portfolio
  path: cookbook/5-Hierarchical-Risk-Parity.ipynb
  description: Constructs a diversified portfolio using Hierarchical Risk Parity (HRP), which uses clustering/dendrogram
    analysis to group correlated assets and allocate weights without requiring covariance matrix inversion.
