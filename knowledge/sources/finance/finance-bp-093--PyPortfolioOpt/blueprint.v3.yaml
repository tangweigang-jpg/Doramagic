- id: BD-040
  type: B/BA
  content: ECOS_BB solver used as default for integer programming (LP)
  rationale: ECOS_BB is a specialized mixed-integer convex solver that handles portfolio allocation with
    binary share constraints. The boundary ensures availability without requiring commercial licenses.
    This open-source solver provides reliable performance for the specific integer programming structure
