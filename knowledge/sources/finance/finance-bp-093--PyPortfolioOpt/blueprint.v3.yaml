  type: code_example
  name: Risk Model Comparison Analysis
  path: cookbook/1-RiskReturnModels.ipynb
  description: Compares multiple covariance estimation methods (sample, semicovariance, exponential, Ledoit-Wolf
    variants, oracle approximating) to evaluate which provides the most accurate risk estimates for portfolio
    construction.
  used_in_stages:
  - factor_computation
  _source: uc_list
- id: res-012
  type: code_example
  name: Basic Mean-Variance Optimization
  path: cookbook/2-Mean-Variance-Optimisation.ipynb
  description: Constructs a minimum volatility portfolio using mean-variance optimization with CAPM-based
    expected returns and compares sample covariance vs Ledoit-Wolf shrinkage estimators.
  used_in_stages:
  - portfolio_optimization
  _source: uc_list
- id: res-013
  type: code_example
  name: Mean-Variance Optimization with Transaction Costs
  path: cookbook/3-Advanced-Mean-Variance-Optimisation.ipynb
  description: Implements advanced mean-variance optimization that accounts for broker transaction costs
    when rebalancing from an initial portfolio allocation, using semicovariance as the risk model.
  used_in_stages:
  - portfolio_optimization
  _source: uc_list
- id: res-014
  type: code_example
  name: Black-Litterman Bayesian Portfolio Allocation
  path: cookbook/4-Black-Litterman-Allocation.ipynb
  description: Combines market equilibrium prior returns with investor views using the Black-Litterman
    model to generate more realistic expected returns and construct portfolios that reflect both market
    consensus and proprietary opinions.
  used_in_stages:
  - portfolio_optimization
  _source: uc_list
