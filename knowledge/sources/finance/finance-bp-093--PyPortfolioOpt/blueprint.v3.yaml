  - 'Lazy import of matplotlib/plotly: Optional dependencies avoid import error if not installed (pypfopt/plotting.py:20)'
  - 'Efficient frontier range: linspace from GMV to max-0.0001 avoids numerical issues at boundary; assumes
    valid frontier exists (pypfopt/plotting.py:247)'
  acceptance_hints:
  - Plots render without errors
  - Frontier shows expected concave shape
  - Optimal portfolios marked correctly on frontier
  - Dendrogram shows meaningful hierarchical structure
data_flow:
- from_stage: external
  to_stage: data_input
  data: raw price data (pd.DataFrame of daily asset prices)
- from_stage: data_input
  to_stage: portfolio_optimization
  data: expected_returns (pd.Series), cov_matrix (np.ndarray)
- from_stage: data_input
  to_stage: hierarchical_optimization
  data: returns (pd.DataFrame), cov_matrix
- from_stage: data_input
  to_stage: black_litterman
  data: cov_matrix, pi (prior returns)
- from_stage: portfolio_optimization
  to_stage: discrete_allocation
  data: weights dict, portfolio_performance tuple
- from_stage: hierarchical_optimization
  to_stage: discrete_allocation
  data: weights dict
- from_stage: portfolio_optimization
  to_stage: visualization
  data: EfficientFrontier object with weights
- from_stage: hierarchical_optimization
  to_stage: visualization
  data: HRPOpt object
- from_stage: black_litterman
  to_stage: portfolio_optimization
  data: bl_returns() output fed as expected_returns
global_contracts:
- contract: Every prices assumed daily; frequency=252 for annualization
  evidence: pypfopt/expected_returns.py:5(module docstring)
- contract: 'Weight sum constraint enforced: market_neutral=False → sum=1, market_neutral=True → sum=0'
  evidence: pypfopt/efficient_frontier/efficient_frontier.py:172(_make_weight_sum_constraint)
- contract: Weights output as OrderedDict with ticker keys
  evidence: pypfopt/base/_base_optimizer.py:75(_make_output_weights)
- contract: Covariance matrix must be positive semidefinite for cvxpy optimization
  evidence: pypfopt/risk_models.py:57(fix_nonpositive_semidefinite)
- contract: clean_weights sets values < 1e-4 to exactly 0
  evidence: pypfopt/base/_base_optimizer.py:109(clean_weights)
- contract: risk_free_rate defaults to 0.0 across each optimizers and performance methods
  evidence: pypfopt/efficient_frontier/efficient_frontier.py:238(max_sharpe)
- contract: Expected returns can be None only for min_volatility optimization; each other methods require
    returns
  evidence: pypfopt/efficient_frontier/efficient_frontier.py:99(expected_returns None check)
- contract: Portfolio performance calculation assumes returns are annualized; no runtime frequency validation
  evidence: pypfopt/base/_base_optimizer.py:561(portfolio_performance)
business_decisions:
- id: BD-001
  type: BA/DK
  content: frequency=252 hardcoded as default
  rationale: 252 trading days per year is the standard assumption for US equity markets, making the default
    explicit and consistent; the boundary is that this may not fit each markets (e.g., UK also uses 252
    but other markets vary), requiring users to override for non-US data.
  evidence: pypfopt/risk_models.py:172(sample_cov)
  stage: data_input
  alternative_considered: Using 250 or 365 was rejected as 252 is industry standard for US markets
- id: BD-002
  type: BA
  content: Compounding=True default for mean_historical_return
  rationale: CAGR provides a more realistic measure for long-term investors compared to simple arithmetic
    mean, accounting for geometric growth; the boundary is that it significantly changes expected return
    calculations, potentially affecting optimization outcomes.
  evidence: pypfopt/expected_returns.py:129(mean_historical_return)
  stage: data_input
  alternative_considered: Setting compounding=False as default for simpler arithmetic mean was considered
    but rejected
- id: BD-003
  type: B
  content: Positive semidefinite matrix check with Cholesky decomposition
  rationale: Cholesky decomposition is used for positive semidefiniteness validation due to O(n^3) complexity
    matching eigenvalue decomposition while being faster in practice; the +1e-16 offset ensures numerical
    stability near the PSD cone boundary.
  evidence: pypfopt/risk_models.py:33(_is_positive_semidefinite)
  stage: data_input
  alternative_considered: Eigenvalue decomposition was considered but rejected due to slower practical
    performance
- id: BD-004
  type: BA
  content: weight_bounds=(0,1) long-only default
  rationale: Long-only constraint is the conservative default suitable for most retail investors and regulated
    funds; the boundary is that users must explicitly set (-1,1) for short selling, making the library
    safe by default.
  evidence: pypfopt/base/_base_optimizer.py:173(BaseConvexOptimizer.__init__)
  stage: portfolio_optimization
  alternative_considered: Unconstrained bounds were rejected as too risky for default behavior
- id: BD-005
  type: BA/DK
  content: risk_free_rate=0.0 default
  rationale: Zero risk-free rate simplifies the Sharpe ratio calculation for most users who don't have
    a specific rate in mind; the boundary is that real rates vary by currency and time period, affecting
    precision.
  evidence: pypfopt/efficient_frontier/efficient_frontier.py:238(max_sharpe)
  stage: portfolio_optimization
  alternative_considered: Using current treasury rates was rejected due to complexity and currency issues
- id: BD-006
  type: BA
  content: cutoff=1e-4 for clean_weights
  rationale: The 1e-4 threshold removes floating-point noise from optimization results, cleaning up near-zero
    weights; the boundary is that this may affect portfolios with genuinely small but non-zero weights
    below the cutoff.
  evidence: pypfopt/base/_base_optimizer.py:88(clean_weights)
  stage: portfolio_optimization
  alternative_considered: Higher cutoff values were considered but rejected as too aggressive
- id: BD-007
  type: B/RC
  content: Strategy pattern via add_objective/add_constraint
  rationale: 'Extensibility: The strategy pattern allows users to add custom convex objectives and constraints
    without modifying the core optimizer; the boundary is that custom objectives must be convex for DCP
    compliance.'
  evidence: pypfopt/base/_base_optimizer.py:347(add_objective)
  stage: portfolio_optimization
  alternative_considered: Subclassing was considered but rejected as more complex for users
- id: BD-008
  type: B
  content: cvxpy for convex optimization
  rationale: Industry-standard library for disciplined convex optimization; handles DCP automatically,
    ensuring problems are correctly formulated before solving, providing reliability for users.
  evidence: pypfopt/base/_base_optimizer.py:169(BaseConvexOptimizer.__init__)
  stage: portfolio_optimization
  alternative_considered: Custom solvers were considered but rejected due to complexity
- id: BD-009
  type: B
  content: No re-solving after objectives added
  rationale: Prevents stale state issues where objectives could be added incrementally to an already-solved
    problem; forces users to create a new optimizer instance for new constraints, ensuring clean state.
  evidence: pypfopt/base/_base_optimizer.py:347(add_objective)
  stage: portfolio_optimization
  alternative_considered: Auto-re-solving was considered but rejected due to state management issues
- id: BD-010
  type: B
  content: Inverse-variance weighting within clusters
  rationale: Standard approach for achieving equal-risk contribution within cluster pairs in hierarchical
    risk parity; provides intuitive weighting based on variance within each cluster boundary.
  evidence: pypfopt/hierarchical_portfolio.py:85(_get_cluster_var)
  stage: hierarchical_optimization
  alternative_considered: Equal weighting within clusters was considered but rejected for lack of variance
    awareness
- id: BD-011
  type: B/BA
  content: Bi-section recursion for allocation
  rationale: Achieves O(n log n) time complexity versus O(n^2) for naive full optimization approaches;
    deterministic and fast, making it suitable for real-time allocation at scale with clear performance
    boundary.
  evidence: pypfopt/hierarchical_portfolio.py:125(_raw_hrp_allocation)
  stage: hierarchical_optimization
  alternative_considered: Full optimization was rejected due to O(n^2) complexity
- id: BD-012
  type: B
  content: No cvxpy dependency in CLA
  rationale: Pure numpy implementation provides faster performance for generating the full efficient frontier
    without cvxpy overhead; eliminates external dependency for CLA-specific use cases.
  evidence: pypfopt/cla.py:13(CLA)
  stage: cla_optimization
  alternative_considered: Using cvxpy throughout was rejected for performance reasons
- id: BD-013
  type: B/BA
  content: Golden section search for lambda
  rationale: Finds optimal Sharpe ratio without requiring gradient information; robust for non-differentiable
    cases with guaranteed convergence within tolerance boundary.
  evidence: pypfopt/cla.py:289(_golden_section)
  stage: cla_optimization
  alternative_considered: Newton's method was considered but rejected due to gradient requirements
- id: BD-014
  type: BA/DK
  content: tau=0.05 default weight-on-views
  rationale: Industry standard places 5% weight on investor views versus 95% on market equilibrium prior;
    represents moderate confidence in views while respecting market prices as the boundary condition.
  evidence: pypfopt/black_litterman.py:366(default_omega)
  stage: black_litterman
  alternative_considered: Other tau values were considered but 0.05 is the established industry standard
- id: BD-015
  type: BA/DK
  content: risk_aversion=1 default
  rationale: Moderate risk aversion parameter suitable as a starting point; the boundary is that users
    should calibrate to their specific utility function rather than relying on this generic default.
  evidence: pypfopt/black_litterman.py:141(BlackLittermanModel.__init__)
  stage: black_litterman
  alternative_considered: Estimating from historical data was considered but rejected for simplicity
- id: BD-016
  type: B
  content: Idzorek method for view uncertainty
  rationale: Converts percentage-based confidence levels into the BL omega matrix; intuitive for practitioners
    who think in terms of percentage confidence rather than variance, providing a user-friendly boundary.
  evidence: pypfopt/black_litterman.py:380(idzorek_method)
  stage: black_litterman
  alternative_considered: Direct variance specification was rejected as less intuitive for practitioners
- id: BD-017
  type: BA
  content: total_portfolio_value=10000 default
  rationale: Sensible default for demonstration and testing purposes; the boundary is that users should
    set this to their actual portfolio value for meaningful discrete allocation results.
  evidence: pypfopt/discrete_allocation.py:42(DiscreteAllocation)
  stage: discrete_allocation
  alternative_considered: Requiring the parameter was considered but rejected for API convenience
- id: BD-018
  type: B/BA
  content: 'Two allocation methods: greedy vs LP'
  rationale: 'Provides two distinct approaches: greedy is fast O(n^2) but approximate, while LP is optimal
    but slower. The boundary is that LP additionally supports short_ratio constraint for short positions.'
  evidence: pypfopt/discrete_allocation.py:158(greedy_portfolio)
  stage: discrete_allocation
  alternative_considered: Only greedy was considered but rejected for lack of optimality option
- id: BD-019
  type: B
  content: RMSE error calculation
  rationale: Measures tracking error from rounding to discrete share counts using root mean square error;
    helps users understand how much the discrete allocation deviates from the continuous optimum.
  evidence: pypfopt/discrete_allocation.py:119(_allocation_rmse_error)
  stage: discrete_allocation
  alternative_considered: Alternative error metrics were considered but RMSE is the standard approach
- id: BD-020
  type: M
  content: Lazy import of matplotlib/plotly
  rationale: Optional visualization libraries are imported on-demand to avoid import errors if not installed;
    users who don't need plotting can use the library without these dependencies as optional modules.
  evidence: pypfopt/plotting.py:20(_import_matplotlib)
  stage: visualization
  alternative_considered: Hard dependencies were rejected for modularity
- id: BD-021
  type: BA
  content: 'Efficient frontier range: linspace from GMV to max-0.0001'
  rationale: Subtracting 0.0001 from maximum return avoids numerical issues at the maximum return boundary
    of the efficient frontier; assumes a valid efficient frontier exists with computable returns.
  evidence: pypfopt/plotting.py:236(_ef_default_returns_range)
  stage: visualization
  alternative_considered: Exact maximum was considered but rejected due to numerical instability
- id: BD-022
  type: B/BA
  content: Weight bounds default to (0, 1) for long-only portfolios
  rationale: Defaulting to long-only portfolios (0-1 weight bounds) ensures conservative investment management
    suitable for most institutional mandates. The boundary is set at (0,1) to prevent short selling unless
    explicitly configured, protecting against unintended leverage while maintaining portfolio normalization.
    Users requiring shorts must deliberately override the default.
  evidence: pypfopt/base/_base_optimizer.py:173(module)
  stage: optimizer_initialization
  alternative_considered: Unbounded weights (-inf, inf) would allow pure long/short optimization but introduces
    margin and counterparty risk.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in pypfopt/base/_base_optimizer.py'
- id: BD-023
  type: B/BA
  content: Risk-free rate defaults to 0.0 across each optimization methods
  rationale: Setting risk-free rate to 0.0 provides sensible baseline behavior without requiring users
    to specify market conditions. The 0.0 boundary avoids implicit assumptions about interest rates that
    could distort Sharpe ratio calculations in low-rate environments. Explicit rate specification is recommended
    for production use.
  evidence: pypfopt/efficient_frontier/efficient_frontier.py:359(efficient_risk)
  stage: portfolio_optimization
  alternative_considered: Using current Treasury rates would be more accurate but requires external data
    fetching and introduces external dependency.
- id: BD-024
  type: B/BA
  content: Frequency defaults to 252 (trading days per year)
  rationale: 252 trading days represents the standard convention for US equity markets, balancing accuracy
    against weekend/holiday effects. The boundary of 252 is industry-standard for annualization. This
    ensures consistent scaling of daily returns and covariances to annual figures without requiring explicit
    configuration.
  evidence: pypfopt/expected_returns.py:129(mean_historical_return)
  stage: data_input
  alternative_considered: 365 calendar days would overstate annualization by ignoring market closures.
    Using country-specific trading days would require localization.
- id: BD-025
  type: B
  content: Weight cleanup cutoff is 1e-4 (weights below this become zero)
  rationale: Setting cutoff at 1e-4 eliminates numerical noise from floating-point optimization while
    maintaining precision to 0.01% allocation. This boundary prevents dust-weight positions that add transaction
    costs without meaningful exposure. Weights below 0.01% are unlikely to be economically significant.
  evidence: pypfopt/base/_base_optimizer.py:88(cutoff=1e-4)
  stage: post_processing
  alternative_considered: Higher cutoff (1e-3) would be more aggressive but might eliminate meaningful
    small-cap exposures.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: cutoff=1e-4 in pypfopt/base/_base_optimizer.py'
- id: BD-026
  type: B/BA
  content: Weight rounding defaults to 5 decimal places
  rationale: Rounding to 5 decimal places (0.00001 = 0.001%) provides sufficient precision for practical
    implementation while enabling clean representation. The boundary balances computational precision
    against human readability and reduces floating-point artifacts. Decimal rounding simplifies downstream
    reporting.
  evidence: pypfopt/base/_base_optimizer.py:88(rounding=5)
  stage: post_processing
  alternative_considered: Integer basis points would be too coarse for fractional shares; higher precision
    would retain floating-point noise.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: rounding=5 in pypfopt/base/_base_optimizer.py'
- id: BD-027
  type: B/BA
  content: Beta confidence level defaults to 0.95 for CVaR/CDaR
  rationale: 0.95 confidence (5% tail) aligns with standard risk management practice for measuring tail
    risk. The boundary captures the most severe realistic losses while excluding extreme outliers. This
    convention balances risk sensitivity against estimation noise in far tails.
  evidence: pypfopt/efficient_frontier/efficient_cvar.py:53(beta=0.95); pypfopt/efficient_frontier/efficient_cdar.py:52(beta=0.95)
  stage: risk_estimation
  alternative_considered: 99% confidence would capture rarer tail events but would have higher estimation
    variance requiring more data.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: beta=0.95); pypfopt/efficient_frontier/efficient_cdar.py:52(beta=0.95 in pypfopt/efficient_frontier/efficient_cvar.py'
- id: BD-028
  type: B/BA
  content: Tau (weight-on-views) defaults to 0.05 in Black-Litterman
  rationale: Tau=0.05 provides moderate uncertainty in the prior (market equilibrium) relative to views.
    The 5% scaling balances between pure market equilibrium and investor views. This prevents views from
    dominating when they may be poorly specified while still allowing meaningful deviation.
  evidence: pypfopt/black_litterman.py:150(tau=0.05)
  stage: bayesian_update
  alternative_considered: Higher tau (0.1) would weight views more heavily; lower tau (0.01) would trust
    market equilibrium more.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: tau=0.05 in pypfopt/black_litterman.py'
- id: BD-029
  type: B/BA
  content: Risk aversion defaults to 1.0 for quadratic utility
  rationale: Risk aversion of 1.0 represents moderate risk tolerance, commonly used as a baseline in mean-variance
    optimization. The boundary of 1.0 produces reasonable risk-return tradeoffs without extreme concentration
    or dispersion. Users can scale for their specific risk preferences.
  evidence: pypfopt/efficient_frontier/efficient_frontier.py:317(max_quadratic_utility)
  stage: portfolio_optimization
  alternative_considered: Risk aversion of 2.0 (typical market price of risk) would produce more conservative
    portfolios.
- id: BD-030
  type: B/BA
  content: Exponential covariance span defaults to 180 days
  rationale: 180-day span (~9 months) captures roughly one business cycle while being responsive to regime
    changes. The boundary balances historical stability against recency bias, weighting recent observations
    more heavily. This span is long enough to smooth noise but short enough to adapt to market changes.
  evidence: pypfopt/risk_models.py:267(span=180); pypfopt/risk_models.py:282(span=180)
  stage: risk_estimation
  alternative_considered: 60-day span would be more responsive but noisier; 252-day span would be more
    stable but slower to adapt.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: span=180); pypfopt/risk_models.py:282(span=180 in pypfopt/risk_models.py'
- id: BD-031
  type: B/BA
  content: Compounding (geometric mean) defaults to True for returns
  rationale: Geometric compounding is the mathematically correct method for calculating multi-period returns,
    accurately representing asset growth. Setting compounding=True ensures returns properly reflect the
    exponential nature of accumulation. Simple returns would systematically overstate multi-period performance.
  evidence: pypfopt/expected_returns.py:145(compounding=True)
  stage: return_estimation
  alternative_considered: Simple returns are easier to aggregate but fail the math for overlapping periods.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: compounding=True in pypfopt/expected_returns.py'
- id: BD-032
  type: B/BA
  content: Log returns default to False (simple returns used)
  rationale: Using simple returns by default makes the library accessible to users unfamiliar with log
    returns while maintaining numerical stability. The boundary of log_returns=False ensures compatibility
    with standard financial data feeds. Users can opt into log returns for mathematical convenience in
    continuous-time modeling.
  evidence: pypfopt/expected_returns.py:41(returns_from_prices)
  stage: return_estimation
  alternative_considered: Log returns are theoretically superior for continuous-time but less intuitive
    for practitioners.
- id: BD-033
  type: B/BA
  content: Weights sum to one constraint is True by default
  rationale: Enforcing weights_sum_to_one=True ensures full capital allocation, preventing cash drag and
    enabling meaningful portfolio comparison. This boundary guarantees normalized portfolios that fully
    invest available capital. Disabling requires explicit override for specialized strategies like portable
    beta.
  evidence: pypfopt/base/_base_optimizer.py:475(weights_sum_to_one=True)
  stage: portfolio_optimization
  alternative_considered: Allowing unconstrained weights would enable cash buffers but introduce leverage
    risk.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: weights_sum_to_one=True in pypfopt/base/_base_optimizer.py'
- id: BD-034
  type: B
  content: Short ratio auto-derived from input weights when not specified
  rationale: Auto-deriving short_ratio from negative weights ensures consistency between continuous and
    discrete allocation stages. The boundary computes sum of absolute negative weights, preserving the
    original portfolio's short exposure. This prevents manual specification errors when allocating long/short
    portfolios.
  evidence: pypfopt/discrete_allocation.py:103(module)
  stage: discrete_allocation
  alternative_considered: Fixed short_ratio would require users to manually track short exposure which
    is error-prone.
  _evidence_issues:
  - 'FN_NOT_FOUND: module in pypfopt/discrete_allocation.py'
- id: BD-035
  type: B/BA
  content: Total portfolio value defaults to $10,000 for discrete allocation
  rationale: $10,000 provides a reasonable scale for demonstration and testing without requiring user
    configuration. The boundary ensures the algorithm has sufficient granularity to allocate fractional
    shares meaningfully. This default enables immediate usage while being easily overridden for actual
    portfolio sizes.
  evidence: pypfopt/discrete_allocation.py:64(total_portfolio_value=10000)
  stage: discrete_allocation
  alternative_considered: Larger default would require more capital to test; smaller would reduce allocation
    granularity.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: total_portfolio_value=10000 in pypfopt/discrete_allocation.py'
- id: BD-036
  type: B/BA
  content: Semicovariance benchmark defaults to ~0.000079 (daily risk-free)
  rationale: Using daily risk-free rate as benchmark captures downside relative to the risk-free alternative,
    aligning with investor experience. The boundary of ~0.000079 (annual 2% / 252) represents opportunity
    cost of investment. This ensures semicovariance only penalizes returns below the risk-free rate.
  evidence: pypfopt/risk_models.py:209(benchmark=0.000079)
  stage: risk_estimation
  alternative_considered: Zero benchmark would measure pure volatility; mean benchmark would measure dispersion
    around average.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: benchmark=0.000079 in pypfopt/risk_models.py'
- id: BD-037
  type: B/BA
  content: Efficient frontier computed with 100 points by default
  rationale: 100 points provides smooth visualization while maintaining reasonable computation time for
    the Critical Line Algorithm. The boundary balances granularity of risk-return frontier against computational
    cost. This density is sufficient to identify optimal allocations along the efficient boundary.
  evidence: pypfopt/cla.py:443(points=100)
  stage: portfolio_optimization
  alternative_considered: 50 points would be faster but less smooth; 200 points would be smoother but
    slower.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: points=100 in pypfopt/cla.py'
- id: BD-038
  type: B/BA
  content: Golden section tolerance is 1e-9 for CLA solver
  rationale: 1e-9 tolerance ensures high-precision convergence for the Critical Line Algorithm while remaining
    computationally feasible. The boundary balances numerical precision against solver iteration count.
    This tolerance is tighter than typical financial precision needs, ensuring robustness to edge cases.
  evidence: pypfopt/cla.py:291(tol=1.0e-9)
  stage: portfolio_optimization
  alternative_considered: Looser tolerance (1e-6) would converge faster but might produce suboptimal portfolios
