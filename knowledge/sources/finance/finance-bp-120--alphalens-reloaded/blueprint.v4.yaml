    ensures IC calculations, quantile assignments, and return series are based on consistent observations.
    Rows with any missing data point are dropped to maintain analytical integrity.
  evidence: src/alphalens/utils.py:682(get_clean_factor_and_forward_returns)
  stage: data_preparation
  alternative_considered: Forward-fill or interpolation were rejected as they would introduce lookahead
