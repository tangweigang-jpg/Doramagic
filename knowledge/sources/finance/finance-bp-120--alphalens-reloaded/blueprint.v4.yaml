  stage: reporting
  alternative_considered: Manual close would require users to track figure lifecycle; persistent figures
    would leak memory
- id: BD-021
  type: B/BA
  content: Default quantile buckets = 5 for factor analysis
  rationale: Factor analysis groups securities into 5 quantiles by default to balance statistical significance
    and interpretability. Five buckets provide sufficient granularity to detect factor monotonicity while
    maintaining adequate sample sizes per bucket for reliable return statistics. Fewer buckets reduce
    power to detect factor effects; more buckets fragment the analysis.
  evidence: src/alphalens/utils.py:687(get_clean_factor_and_forward_returns)
  stage: data_preparation
  alternative_considered: 4-quintile or decile (10-bucket) alternatives were considered but rejected in
    favor of the quintuple as standard industry practice for balanced bucket sizes
- id: BD-022
  type: B/BA
  content: Default forward return periods = (1, 5, 10) days
  rationale: Forward returns computed at 1, 5, and 10-day horizons capture short-term alpha decay and
    medium-term factor persistence. The 1-day period measures immediate price reaction, 5-day captures
    weekly momentum/drift, and 10-day reveals sustained factor effectiveness. Together they span intrashift
    to biweekly horizons commonly used in factor research.
  evidence: src/alphalens/utils.py:230(compute_forward_returns), src/alphalens/utils.py:689(get_clean_factor_and_forward_returns)
  stage: data_preparation
  alternative_considered: Alternative periods like (1,2,3,5) or monthly (21-day) were considered but the
    (1,5,10) triplet covers the most common research horizons
  _evidence_issues:
  - 'INVALID_IDENTIFIER: compute_forward_returns), src/alphalens/utils.py:689(get_clean_factor_and_forward_returns
    in src/alphalens/utils.py'
- id: BD-023
  type: B/BA
  content: Default max_loss = 35% for data filtering threshold
  rationale: The 35% max_loss threshold limits cumulative return loss during factor-price alignment periods,
    protecting against survivorship bias and data artifacts. This boundary catches 99.5%+ of legitimate
    data gaps while rejecting extreme outliers from failed prices, corporate actions, or data errors.
    Lower thresholds risk excessive row removal; higher thresholds admit corrupted data.
  evidence: src/alphalens/utils.py:472(get_clean_factor), src/alphalens/utils.py:682(get_clean_factor_and_forward_returns)
  stage: data_preparation
  alternative_considered: Strict 20% and permissive 50% thresholds were considered but 35% balances empirical
