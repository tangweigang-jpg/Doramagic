- id: BD-028
  type: B/BA
  content: Default demeaned=True for long-short portfolio analysis
  rationale: Long-short portfolio returns are demeaned by default to remove market-wide drift and isolate
    factor-specific alpha. By subtracting cross-sectional mean returns from each period, the portfolio
    captures relative factor performance independent of market direction. This is essential for pure factor
    strategy evaluation where market timing is not the objective.
  evidence: src/alphalens/performance.py:131(factor_weights)
  stage: performance_analysis
  alternative_considered: Demeaning disabled by default was considered for absolute return contexts but
    the long-short focus justifies market-neutral default
- id: BD-029
  type: B/BA
  content: Event study defaults to long_short=False
  rationale: Event studies default to long-only (non-long-short) analysis to isolate security-specific
    event reactions without requiring hedge positions. This provides cleaner signal interpretation for
    fundamental events like earnings, dividends, or corporate actions. Long-short event studies introduce
    complexity around hedge ratio determination that obscures the primary event effect.
  evidence: src/alphalens/tears.py:614(create_event_study_tear_sheet)
  stage: performance_analysis
  alternative_considered: Long-short default was rejected as it requires additional assumptions about
    hedge universe and ratio determination
- id: BD-030
  type: B/DK
  content: Data cleaning uses dropna() after merge and binning
  rationale: Missing values are removed post-merge and post-binning to ensure complete factor-price alignment
