- id: BD-032
  type: B/DK
  content: Trading calendar inferred from factor and price data intersection
  rationale: Trading calendar is inferred from the intersection of factor and price index dates to ensure
    alignment with the actual trading universe. This handles different exchange holidays, early closes,
