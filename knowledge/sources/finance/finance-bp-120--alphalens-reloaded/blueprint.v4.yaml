- id: BD-027
  type: B
  content: Information Coefficient uses Spearman rank correlation
  rationale: Spearman rank correlation measures the monotonic relationship between factor predictions
    and realized returns, which is more robust to outliers and non-normal distributions than Pearson correlation.
    Rank correlation focuses on directional agreement rather than magnitude calibration, making it ideal
    for factor investing where relative rankings matter more than absolute predictions.
  evidence: src/alphalens/performance.py:57(spearmanr)
  stage: performance_analysis
  alternative_considered: Pearson correlation was rejected for sensitivity to outliers; Kendall tau was
    considered but Spearman offers better statistical power
  _evidence_issues:
