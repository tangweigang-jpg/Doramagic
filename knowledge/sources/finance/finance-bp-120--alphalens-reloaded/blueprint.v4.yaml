- id: BD-026
  type: B/BA
  content: Factor weights normalized by sum of absolute values (gross leverage=1)
  rationale: Factor weight normalization to gross leverage=1 ensures the portfolio maintains dollar-neutral
    exposure equal to the initial capital base. By dividing by the sum of absolute factor values, each
    unit of factor signal translates to one unit of capital commitment. This constraint prevents leverage
    drift and ensures P&L attribution reflects factor magnitude rather than accumulation effects.
  evidence: src/alphalens/performance.py:192(factor_weights to_weights)
  stage: performance_analysis
  alternative_considered: Net exposure normalization (positive weights sum to 1) was considered for long-only
    contexts but absolute-value normalization was chosen for full applicability
