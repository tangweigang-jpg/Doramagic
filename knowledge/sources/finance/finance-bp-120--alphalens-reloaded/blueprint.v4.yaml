- id: BD-033
  type: B
  content: Zero-aware quantile bucketing for centered signals
  rationale: Zero-aware quantile bucketing ensures factors centered around zero (like residuals or deviations)
    are split symmetrically around zero rather than by percentiles. This preserves the sign information
