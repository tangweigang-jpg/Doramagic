- id: BD-025
  type: B/BA
  content: Default cumulative_returns = True for forward returns
  rationale: Forward returns default to cumulative calculation to align with standard portfolio performance
    reporting. Cumulative returns measure total return including compounding, which is essential for realistic
    performance attribution. Single-period returns remain available via explicit parameter but compound
    returns are the industry standard for strategy evaluation.
  evidence: src/alphalens/utils.py:227(compute_forward_returns), src/alphalens/utils.py:682(get_clean_factor_and_forward_returns)
  stage: data_preparation
  alternative_considered: Non-cumulative default was considered for pure factor return decomposition but
    cumulative won as the more common use case
  _evidence_issues:
  - 'INVALID_IDENTIFIER: compute_forward_returns), src/alphalens/utils.py:682(get_clean_factor_and_forward_returns
