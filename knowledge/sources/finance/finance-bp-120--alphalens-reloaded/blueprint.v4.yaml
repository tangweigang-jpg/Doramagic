replaceable_slots:
- id: slot-001
  name: market_data_provider
  description: 'Choose based on: (1) Asset class (stocks vs crypto vs forex), (2) Budget constraints,
    (3) Data frequency needs (daily vs intraday vs real-time), (4) Reliability requirements'
  used_in_stages: []
  options:
  - name: yfinance + pandas_datareader
    traits:
    - free
    - no_auth_required
    - daily_data
    - intraday_data
    - us_stocks
    fit_for:
    - Quick prototyping, educational use, free projects without API key requirements
    not_fit_for:
    - Production trading systems requiring reliability guarantees, non-US markets, real-time data
  - name: Alpha Vantage
    traits:
    - api_key_required
    - free_tier
    - daily_data
    - intraday_data
    - forex
    - crypto
    fit_for:
    - Projects needing FX/crypto data, developers with Alpha Vantage keys
    not_fit_for:
    - High-frequency trading, large-scale US stock data (rate limits on free tier)
  - name: IEX Cloud
    traits:
    - api_key_required
    - free_tier
    - daily_data
    - intraday_data
    - us_stocks
    - forex
    - crypto
    fit_for:
    - Production applications needing reliable US stock data with fair pricing
    not_fit_for:
    - Free projects (free tier limited), non-US markets
  - name: Polygon.io
    traits:
    - api_key_required
    - free_tier
    - real-time
    - daily_data
    - us_stocks
    fit_for:
    - Applications requiring real-time or tick data, professional trading systems
    not_fit_for:
    - Free projects (no free tier for historical data)
  - name: CCXT
    traits:
    - free
    - crypto_only
    - real-time
    - daily_data
    - multiple_exchanges
    fit_for:
    - Cryptocurrency trading strategies, multi-exchange data aggregation
    not_fit_for:
    - Traditional equities, fiat currency trading
  - name: Zipline Reloaded + DataBundle
    traits:
    - bundled_data
    - backtesting_focused
    - requires_bundle_installation
    fit_for:
    - Users already using zipline for backtesting who want integrated factor analysis
    not_fit_for:
    - Users without existing zipline setup, real-time trading workflows
  default: yfinance + pandas_datareader
  _source: worker_resource
- id: slot-002
  name: portfolio_analysis_downstream
  description: 'Choose based on: (1) Need for standardized portfolio tear sheets, (2) Risk metric requirements,
    (3) Integration preferences with existing systems'
  used_in_stages: []
  options:
  - name: Pyfolio Reloaded
    traits:
    - risk_analysis
    - tearsheets
    - position_analysis
    - bayesian
    - returns_attribution
    fit_for:
    - Complete portfolio analysis including risk metrics, performance attribution, and professional tear
      sheets
    not_fit_for:
    - Lightweight analysis, users who only need factor IC/returns without portfolio-level metrics
  - name: QuantStats
    traits:
    - risk_analysis
    - visualizations
    - metrics
    fit_for:
    - Alternative to pyfolio with different visualization style and metric calculations
    not_fit_for:
    - Users preferring pyfolio's specific methodology or who need pyfolio-specific features
  - name: custom_analysis
    traits:
    - user_defined
    - flexible
    - no_extra_dependency
    fit_for:
    - Users with specific analysis requirements, production systems with custom reporting
    not_fit_for:
    - Quick exploratory analysis, users wanting standardized tear sheets
  default: pyfolio-reloaded (via create_pyfolio_input function)
  _source: worker_resource
- id: slot-003
  name: plotting_backend
  description: matplotlib is hard-coded in alphalens; for plotly integration, custom wrapper code would
    be needed
  used_in_stages: []
  options:
  - name: matplotlib (default)
    traits:
    - default
    - static_plots
    - jupyter_compatible
    fit_for:
    - Standard use cases, Jupyter notebooks, static reports
    not_fit_for:
    - Interactive web dashboards, real-time plotting
  - name: plotly
    traits:
    - interactive
    - web_export
    - html_export
    fit_for:
    - Interactive visualizations, web-based reports, zoom/pan capabilities
    not_fit_for:
    - Static reports, PDF generation, minimal dependencies
  default: matplotlib
  _source: worker_resource
