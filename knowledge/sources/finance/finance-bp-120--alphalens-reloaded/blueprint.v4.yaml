- id: BD-090
  type: B
  content: '@customize decorator pattern applies consistent seaborn styling to each plotting functions'
  rationale: The @customize decorator ensures uniform visual styling across each tear sheet plots without
    duplicating seaborn configuration code. This architectural pattern applies MFF-compliant aesthetics
    (font sizes, colors, grid styles) consistently, improving report readability and reducing maintenance
    burden. New plotting functions simply applying the decorator automatically inherit the standardized
    look.
  evidence: src/alphalens/plotting.py:34-50(customize)
  stage: pattern_choice
- id: BD-091
  type: B
  content: shift(-period) creates forward returns from backward price data - factor at T, price at T+period
  rationale: The negative shift is the core mechanism translating historical price data into forward returns.
    By shifting returns backward in time (negative direction), the factor value at time T is aligned with
    the price change from T to T+period. This is essential because factors are calculated from information
    available at time T, while returns are realized in the subsequent period. The reindex operation ensures
    alignment with the factor date index.
  evidence: src/alphalens/utils.py:312(module)
  stage: ordering_contract
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/alphalens/utils.py'
- id: BD-092
  type: T
  content: Prices MUST span factor period + max(periods) buffer for forward return calculation
  rationale: This invariant ensures sufficient price data coverage for forward return calculations. Since
    forward returns require prices at T+periods (potentially up to max_periods), the price time series
    must extend beyond the factor period by that buffer. Without this buffer, the final periods would
    have NaN forward returns, corrupting tail-period analysis and potentially causing division-by-zero
    errors in weighting calculations.
  evidence: src/alphalens/utils.py:682(get_clean_factor_and_forward_returns)
  stage: invariant
- id: BD-093
  type: BA/M
  content: quantiles=5 default creates 5-quintile analysis; higher quantile = more granular but sparse
    groups
  rationale: Quintiles (5 buckets) strike a balance between granularity and statistical power. With 5
    quantiles, each group contains 20% of securities by factor value, providing enough samples for reliable
    mean return estimates in most universes. Increasing quantile count (e.g., deciles) enables finer factor
    differentiation but reduces samples per group, increasing estimation noise. The default enables meaningful
    long-short comparisons without requiring large universes.
  evidence: src/alphalens/utils.py:477,687(quantiles=5)
  stage: default_value
  alternative_considered: quantiles=10 (deciles) would provide finer granularity but requires larger universe
    for statistical significance
  _evidence_issues:
  - 'INVALID_IDENTIFIER: quantiles=5 in src/alphalens/utils.py'
- id: BD-094
  type: B/BA
  content: GridFigure class manages subplot layout for tear sheets - row/cell iteration pattern
  rationale: GridFigure encapsulates subplot grid management using a row/cell iteration pattern, enabling
    tear sheet functions to add plots without manually tracking figure handles and subplot indices. This
    abstraction simplifies tear sheet composition - each plot function calls get_grid() to obtain axes
    in sequence, and the class handles figure creation and layout. This pattern reduces coupling between
    individual plot functions and figure management.
  evidence: src/alphalens/tears.py:26-58(GridFigure)
  stage: pattern_choice
- id: BD-095
  type: BA/M
  content: cumulative_returns=True default - multi-period returns are compounded, not single-period
  rationale: Compounding (cumulative=True) accurately models portfolio returns where profits are reinvested.
    A 2-period return of 5% and 3% compounds to (1.05 * 1.03 - 1) = 8.15%, reflecting real portfolio growth.
    Single-period returns would show 8% simple sum, which understates volatility drag. This default aligns
    with how live portfolios actually behave and provides more realistic forward projections.
  evidence: src/alphalens/utils.py:232,694(cumulative_returns=True)
  stage: default_value
  alternative_considered: cumulative_returns=False would show simple-sum returns which may be preferred
    for single-period analysis
  _evidence_issues:
  - 'INVALID_IDENTIFIER: cumulative_returns=True in src/alphalens/utils.py'
- id: BD-096
  type: T
  content: 'Portfolio weight normalization: weights.abs().sum() = 1.0 (gross leverage of 1) is invariant'
  rationale: Normalizing to gross leverage of 1.0 ensures dollar-neutral positioning between long and
    short portfolios. The absolute sum constraint guarantees that the sum of long weights equals the sum
    of short weights (each 0.5), providing equal capital exposure to both sides. This is essential for
    fair long-short performance attribution - if weights weren't normalized, larger-side positions would
    dominate returns. Violating this constraint distorts the long-short return spread.
  evidence: src/alphalens/performance.py:192,454(module)
  stage: invariant
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/alphalens/performance.py'
- id: BD-097
  type: RC
  content: 'INTERACTION: BD-023 (max_loss=0.35) × BD-030 (dropna() after merge) → Compound data loss risk
    in sparse market conditions'
  rationale: 'max_loss=0.35 permits up to 35% data loss during alignment, and dropna() then removes ALL
    remaining rows with any missing value. In sparse or illiquid markets, these two decisions compound:
    a universe with 25% missing data passes max_loss, but dropna() may remove additional rows, potentially
    creating 40%+ total data loss without triggering the max_loss guard. This cascade creates survivorship
    bias where only liquid, data-rich securities survive analysis.'
  evidence: BD-023,BD-030
  stage: global
  alternative_considered: Pairwise deletion instead of listwise dropna would preserve more observations
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-098
  type: RC
  content: 'INTERACTION: BD-009 (demeaned=True) × BD-010 (group_adjust) → Demean ordering dependency affects
    long-short spread calculation'
  rationale: When both demeaned=True and group_adjust=True are applied, the order of operations determines
    the long-short spread. If group_adjust is applied first (within-sector demean), then universe-wide
    demean is applied to already-demeaned values, the resulting mean is approximately zero, yielding minimal
    spread. If the order is reversed, group_adjust is computed on universe-demeaned values, producing
    a different result. The code does not guarantee operation ordering, creating silent dependency on
    implementation.
  evidence: BD-009,BD-010
  stage: global
  alternative_considered: Explicit operation ordering with documented precedence rules
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-099
  type: B
  content: 'INTERACTION: BD-007 (Spearman IC) × BD-035 (annualization 252) → Variance amplification for
    short-horizon IC'
  rationale: Spearman IC standard deviation compounds with annualization. For 1D forward returns, annualization
    multiplies by sqrt(252) ≈ 16, while 10D returns multiply by sqrt(25.2) ≈ 5. A factor with IC_mean=0.05
    and IC_std=0.03 on 1D returns has annualized IC_std ≈ 0.48, making the risk-adjusted IC (0.05/0.03=1.67
    daily vs 0.05/0.48=0.10 annualized) appear 94% worse after annualization. This creates misleading
    impressions about short-horizon vs long-horizon factor quality.
  evidence: BD-007,BD-035
  stage: global
  alternative_considered: Non-annualized IC comparison or variance-scaled normalization
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-100
  type: BA/M
  content: 'INTERACTION: BD-005 (zero-aware binning) × BD-021 (quantiles=5) → Reduced effective buckets
    for centered factors'
  rationale: Zero-aware quantile binning splits factors at zero first, then applies quintile bucketing
    to each sign group separately. For a factor with 60% positive and 40% negative values, the positive
    bucket gets 3 quintiles (1-3) and negative bucket gets 2 quintiles (4-5). The bottom quintile (Q1=lowest)
    now only contains 13% of data vs the expected 20%, reducing statistical power for negative-tail analysis.
    This undermines the quintile comparison design.
  evidence: BD-005,BD-021
  stage: global
  alternative_considered: Adaptive quantile count per sign group to maintain equal bucket sizes
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-101
  type: RC
  content: 'INTERACTION: BD-086 (filter_zscore=20 effectively disabled) × BD-023 (max_loss=0.35) → False
    security from absent outlier filtering'
  rationale: filter_zscore=20 means virtually no outliers are filtered (20σ threshold captures 99.9999%
    of normal distribution). Users may believe outlier handling is active, but corrupted data points (corporate
    actions, data errors, fat-tail events) pass through unchanged. These corrupted points then count toward
    max_loss calculation, potentially pushing a borderline dataset over the 35% threshold or causing corrupted
    securities to appear valid within the 65% retained data.
  evidence: BD-086,BD-023
  stage: global
  alternative_considered: More aggressive default filter_zscore (3.0) or explicit disabled flag
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-102
  type: BA/DK
  content: 'INTERACTION: BD-015 (BPS display) × BD-052 (BPS=10000) → Misleading unit conversion for correlation
    metrics'
  rationale: Information Coefficient (Spearman correlation) is a unitless quantity ranging from -1 to
    +1. Displaying IC in basis points (multiplying by 10000) produces values like '50 bps IC' which implies
    a return magnitude rather than correlation strength. This violates the semantic meaning of correlation
    and may mislead stakeholders into interpreting IC as a return percentage. The BPS convention is appropriate
    for returns (BD-015) but inappropriate for correlation coefficients.
  evidence: BD-015,BD-052
  stage: global
  alternative_considered: Display IC with 2-3 decimal places or as percentage without basis point terminology
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
  vague_rationale: true
- id: BD-103
  type: T
  content: 'RISK CASCADE: BD-042 (BDay fallback) → BD-032 (calendar inference) → BD-022 (forward periods)
    → Every date alignment calculations'
  rationale: When calendar inference fails for non-US or multi-market universes, BD-042 falls back to
    standard BDay() (Mon-Fri, no holidays). This incorrect calendar propagates through BD-032, causing
    misalignment in trading day detection. The misalignment then affects forward return period calculation
    (BD-022), where 5D forward returns on a holiday-adjusted calendar have different actual calendar days
    vs the fallback calendar. This cascades into incorrect IC calculations and corrupted time series alignment.
  evidence: BD-042,BD-032,BD-022
  stage: global
  alternative_considered: Explicit calendar parameter required for non-US markets
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-104
  type: T
  content: 'RISK CASCADE: BD-024 (filter_zscore=20) → BD-055 (mean-based outlier detection) → BD-063 (z-score
    return filtering) → Corrupted quantile statistics'
  rationale: Despite filter_zscore=20 being permissive (BD-024), the mean-based z-score calculation (BD-055)
    still executes, consuming computation cycles without filtering. Extreme outliers remain in factor
    data, contaminating mean and standard deviation estimates. When return z-score filtering runs (BD-063),
    the corrupted distribution statistics cause incorrect threshold application, allowing outliers through.
    This corrupts quantile mean returns, standard errors, and the top-minus-bottom spread calculation.
  evidence: BD-024,BD-055,BD-063
  stage: global
  alternative_considered: 'Conditional execution: skip filtering code when threshold is effectively disabled'
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-105
  type: T
  content: 'CONTRADICTION: BD-086 (filter_zscore=20 effectively disabled) contradicts stated purpose of
    ''outlier removal'' in BD-055 and BD-063'
  rationale: BD-055 and BD-063 implement mean-based z-score outlier detection with explicit purpose to
    'remove extreme statistical outliers' and 'prevent corporate actions, data errors, or fat-tail events
    from distorting quantile mean returns.' However, the default filter_zscore=20 makes this protection
    illusory since 20 standard deviations from the mean captures virtually each legitimate factor values.
    Users reading the documentation expect outlier protection but receive none by default, creating a
    contradiction between stated intent and actual behavior.
  evidence: BD-086,BD-055,BD-063
  stage: global
  alternative_considered: Change default to 3.0 or add explicit 'disabled' sentinel value with documentation
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-106
  type: BA/DK
  content: 'HIDDEN DEPENDENCY: BD-064 (mode of day differences for period detection) silently assumes
    regular trading intervals'
  rationale: BD-064 uses mode of day-differences to infer period length, which works for regular calendars
    but silently fails for irregular trading patterns (sparse illiquid markets, multi-exchange calendars,
    early closes). When mode captures only a single recurring pattern, the resulting period detection
    may be wrong but no error is raised. Downstream calculations (BD-022, BD-035) use this silently incorrect
    period, producing misleading annualization and forward return figures.
  evidence: BD-064,BD-022,BD-035
  stage: global
  alternative_considered: Explicit period parameter or confidence scoring on inference quality
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-107
  type: BA/M
  content: 'INTERACTION: BD-001 (MultiIndex date-asset structure) × BD-008 (L1 weight normalization) →
    Weight allocation asymmetry'
  rationale: MultiIndex structure groups data by (date, asset), and L1 normalization sums abs(weights)
    across each assets per date. When the number of assets varies across dates (due to missing data filtering),
    the per-date normalization denominator differs. A date with 1000 assets and a date with 500 assets
    have different effective weight granularity, potentially causing date-level allocation drift that
    compounds over time.
  evidence: BD-001,BD-008
  stage: global
  alternative_considered: Normalize by universe size or use per-date share count for weight calculation
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-108
  type: T
  content: 'RISK CASCADE: BD-053 (calendar inference) × BD-006 (shift(-period) alignment) × BD-060 (iloc[1:]
    offset) → Intraday data misalignment cascade'
  rationale: For intraday data, calendar inference (BD-053) may detect irregular trading intervals. The
    shift(-period) alignment (BD-006) then shifts by the inferred period count, but iloc[1:] offset (BD-060)
    uses a fixed single-row offset. For multi-row-per-day intraday data, this creates misalignment where
    the iloc[1:] assumes one row per period while the shift operates on actual period boundaries. The
    result is corrupted forward return alignment for intraday factors.
  evidence: BD-053,BD-006,BD-060
  stage: global
  alternative_considered: Period-based iloc offset instead of fixed [1:] offset
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
