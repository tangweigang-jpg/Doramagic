# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-120
name: Alphalens
sop_version: '3.6'
source:
  projects:
  - alphalens-reloaded
  commit_hash: f0a07c22d554e4b4036983cc80320b432714fe7e
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Quantitative factor performance analysis and risk evaluation
  description: Alphalens is a Python library for performance analysis of predictive stock factors, computing
    Information Coefficient, returns by quantile, turnover analysis, and generating comprehensive tear
    sheet reports for factor evaluation.
  prerequisites: Users need Python 3.9+, pandas, numpy, and matplotlib. Familiarity with factor investing
    concepts (alphas, quantiles, forward returns) and MultiIndex DataFrames is helpful. Zipline integration
    is optional.
  not_suitable_for: Real-time trading systems (Alphalens is analysis-only), non-tabular data (images,
    text), portfolio execution, transaction cost modeling, or multi-asset class analysis beyond equities.
stages:
- id: data_preparation
  name: Data Preparation & Alignment
  order: 1
  responsibility: Aligns factor data with price data, computes forward returns, infers trading calendar,
    and formats into MultiIndex DataFrames for downstream analysis. Ensures timezone consistency and data
    quality through max_loss checks.
  interface:
    inputs:
    - name: factor
      description: pd.Series with MultiIndex (date, asset) containing factor values
    - name: prices
      description: pd.DataFrame with index=dates, columns=assets containing price data
    - name: groupby
      description: Optional mapping of assets to groups for group-neutral analysis
    outputs:
    - name: factor_data
      description: 'pd.DataFrame with MultiIndex containing columns: factor, forward_returns (1D, 5D,
        etc.), factor_quantile, group'
  required_methods:
  - name: utils.get_clean_factor_and_forward_returns
    description: Main entry point that aligns factor and prices, computes forward returns, assigns quantiles,
      and returns cleaned DataFrame ready for analysis. Validates timezone matching and enforces max_loss
      threshold.
    evidence: src/alphalens/utils.py:480(get_clean_factor_and_forward_returns)
  - name: utils.compute_forward_returns
    description: Computes forward returns from prices using shift(-period) to avoid lookahead bias. Supports
      both cumulative and single-period returns with configurable periods.
    evidence: src/alphalens/utils.py:348(compute_forward_returns)
  - name: utils.quantize_factor
    description: Buckets factor values into quantiles (default 5) using zero-aware binning for factors
      centered at zero. Returns integer quantile labels 1-N.
    evidence: src/alphalens/utils.py:127(quantize_factor)
  - name: utils.demean_forward_returns
    description: Subtracts cross-sectional mean from forward returns for market-neutral portfolios, optionally
      within groups for group-neutral portfolios.
    evidence: src/alphalens/utils.py:397(demean_forward_returns)
  - name: utils.infer_trading_calendar
    description: Infers trading calendar from factor/prices index overlap, detecting weekdays and holidays
      automatically from data gaps.
    evidence: src/alphalens/utils.py:182(infer_trading_calendar)
  key_behaviors:
  - behavior: MultiIndex (date, asset) universal structure
    description: Every DataFrames use MultiIndex with levels ['date', 'asset'] in that specific order.
      This enables efficient groupby operations on both time and asset dimensions simultaneously.
    evidence: src/alphalens/utils.py:615(factor_copy.index.rename)
  - behavior: No lookahead bias in forward returns
    description: shift(-period) moves future returns backward to match current factor signal date. Factor
      at time T uses price at T+period for entry, ensuring no data snooping.
    evidence: src/alphalens/utils.py:312(compute_forward_returns)
  - behavior: Zero-aware quantile binning
    description: Factors centered at zero (mean-reversion) are bucketed symmetrically around origin, separating
      positive and negative signals rather than treating them as a single distribution.
    evidence: src/alphalens/utils.py:127(quantize_factor)
  - behavior: Timezone validation at runtime
    description: Factor and prices DatetimeIndex must have identical timezone or both be None. Mismatch
      raises NonMatchingTimezoneError immediately during compute_forward_returns.
    evidence: src/alphalens/utils.py:276(compute_forward_returns)
  - behavior: Data quality enforcement via max_loss
    description: Default 35% max_loss threshold silently drops data with NaN or misalignment. Users are
      notified via print statement when data loss exceeds threshold.
    evidence: src/alphalens/utils.py:480(get_clean_factor)
  replaceable_points:
  - name: forward_returns_computation
    description: How forward returns are calculated from prices
    options:
    - name: cumulative_returns=True (default)
      traits:
      - compounds multi-period returns
      - supports multiple periods
      - requires freq to be set
      fit_for:
      - long-horizon factors
      - strategy backtesting
      - cumulative performance analysis
      not_fit_for:
      - single-period analysis
      - high-frequency data without proper freq
    - name: cumulative_returns=False
      traits:
      - single-period returns only
      - no compounding
      - simpler calculation
      fit_for:
      - daily rebalancing
      - simpler factor validation
      - shorter horizons
      not_fit_for:
      - multi-period analysis
      - compound return visualization
    default: cumulative_returns=True
  - name: binning_strategy
    description: How to bucket factor values into quantiles
    options:
    - name: 'quantiles (default: 5)'
      traits:
      - equal record count per bin
      - robust to outliers
      - default in most analyses
      fit_for:
      - large universes
      - standard factor analysis
      - comparing across factors
      not_fit_for:
      - small universes (< 100 assets)
      - highly skewed distributions
    - name: bins (equal value width)
      traits:
      - equal range width
      - can create empty bins
      - sensitive to outliers
      fit_for:
      - uniformly distributed factors
      - regime analysis
      not_fit_for:
      - skewed factors
      - small universes
    - name: zero_aware
      traits:
      - separates pos/neg signals
      - symmetric around origin
      - maintains sign information
      fit_for:
      - mean-reversion factors
      - long-short symmetric analysis
      - factors centered at zero
      not_fit_for:
      - directional-only factors
      - factors with large negative values
    default: quantiles=5
  - name: zscore_filter
    description: Outlier filtering on forward returns using z-score threshold
    options:
    - name: filter_zscore=None (no filter)
      traits:
      - no outlier removal
      - preserves each data
      - fastest processing
      fit_for:
      - high-quality data
      - stress testing
      - when outliers are signal
      not_fit_for:
      - noisy data with clear errors
    - name: filter_zscore=20 (default)
      traits:
      - 20 standard deviations threshold
      - effectively no filtering
      - historical default
      fit_for:
      - research where no filtering desired
      - consistency with legacy code
      not_fit_for:
      - data with known outliers
      - production pipelines
    - name: filter_zscore=<any int/float>
      traits:
      - configurable threshold
      - removes extreme values
      - can distort return distribution
      fit_for:
      - production data cleaning
      - robustness testing
      not_fit_for:
      - factors where extreme returns are signal
    default: filter_zscore=None
  design_decisions:
  - MultiIndex (date, asset) is the universal data structure - enables efficient groupby operations on
    both time and asset dimensions; matches pandas groupby conventions for financial data (src/alphalens/utils.py:348)
  acceptance_hints:
  - factor_data has MultiIndex with levels ['date', 'asset']
  - Forward return columns match pd.Timedelta string format (1D, 5D, 3h15m)
  - factor_quantile values are integers 1-N
  - No NaN values where data should exist (max_loss respected)
  - Timezones of factor and prices match
  - Trading calendar freq is set on factor_data index
- id: performance_analysis
  name: Performance & Risk Metrics
  order: 2
  responsibility: Computes Information Coefficient (IC), factor returns, alpha/beta, quantile-level statistics,
    turnover analysis, and cumulative return projections. Uses Spearman rank correlation for IC to handle
    non-linear relationships.
  interface:
    inputs:
    - name: factor_data
      description: 'pd.DataFrame MultiIndex from data_preparation with columns: factor, forward_returns,
        factor_quantile, group'
    outputs:
    - name: IC_series
      description: pd.Series of Information Coefficient values over time
    - name: mean_returns_by_quantile
      description: pd.DataFrame of mean returns for each quantile over time
    - name: factor_returns
      description: pd.Series of factor portfolio returns
    - name: alpha_beta
      description: tuple of (alpha, beta) from OLS regression against benchmark
    - name: turnover_metrics
      description: pd.DataFrame of quantile turnover rates
  required_methods:
  - name: performance.factor_information_coefficient
    description: Computes rank correlation between factor values and forward returns. Uses Spearman by
      default for robustness to outliers and non-linear monotonic relationships.
    evidence: src/alphalens/performance.py:57(factor_information_coefficient)
  - name: performance.factor_weights
    description: Calculates portfolio weights as factor_value / sum(|factor|) ensuring gross leverage=1.
      Supports demeaned (long-short) and group-adjusted weighting.
    evidence: src/alphalens/performance.py:131(factor_weights)
  - name: performance.factor_returns
    description: Computes portfolio returns from factor weights and forward returns. Normalizes weights
      to gross=1 and optionally demeanes for long-short or adjusts within groups.
    evidence: src/alphalens/performance.py:253(factor_returns)
  - name: performance.factor_alpha_beta
    description: Runs OLS regression of factor returns against benchmark returns to extract alpha (intercept)
      and beta (market exposure), with annualized return adjustment.
    evidence: src/alphalens/performance.py:329(factor_alpha_beta)
  - name: performance.mean_return_by_quantile
    description: Computes mean forward returns aggregated by factor quantile over time. Supports grouping
      for within-group analysis.
    evidence: src/alphalens/performance.py:461(mean_return_by_quantile)
  - name: performance.factor_rank_autocorrelation
    description: Calculates rank autocorrelation of factor values over time. Uses rank (not value) autocorrelation
      to account for systematic factor shifts.
    evidence: src/alphalens/performance.py:620(factor_rank_autocorrelation)
  key_behaviors:
  - behavior: Spearman rank correlation for IC
    description: Uses rank correlation instead of Pearson linear correlation. Robust to outliers and detects
      non-linear monotonic relationships, which is standard in quant finance.
    evidence: src/alphalens/performance.py:57(factor_information_coefficient)
  - behavior: Portfolio weight normalization invariant
    description: weights.abs().sum() = 1.0 is enforced, ensuring gross leverage of exactly 1.0 across
      each weight calculations, regardless of factor distribution.
    evidence: src/alphalens/performance.py:192,454(tot_weights /= tot_weights.abs().sum())
  - behavior: Demeaned weights enable long-short portfolio
    description: Subtracting universe mean from weights creates market-neutral portfolio isolating factor
      alpha from market exposure.
    evidence: src/alphalens/performance.py:146(factor_weights)
  - behavior: Group adjustment within-group demeaning
    description: Each group contributes equally regardless of constituent count, enabling group-neutral
      portfolios where groups have equal weight.
    evidence: src/alphalens/utils.py:397(demean_forward_returns)
  - behavior: Rank autocorrelation for turnover
    description: Factor rank autocorrelation (not value autocorrelation) accounts for systematic factor
      shifts and market regime changes.
    evidence: src/alphalens/performance.py:620(factor_rank_autocorrelation)
  replaceable_points:
  - name: IC_computation
    description: Correlation metric between factor and forward returns
    options:
    - name: Spearman (rank)
      traits:
      - non-parametric
      - outlier robust
      - detects monotonic relationships
      fit_for:
      - most factor analysis
      - outlier-prone data
      - non-linear factors
      not_fit_for:
      - linear-only analysis
      - small sample sizes
    - name: Pearson (linear)
      traits:
      - parametric
      - sensitive to outliers
      - detects linear relationships
      fit_for:
      - normally distributed data
      - linear factor relationships
      not_fit_for:
      - heavy-tailed distributions
      - rank-based analysis
    default: Spearman
  - name: weighting_scheme
    description: How assets are weighted in portfolio construction
    options:
    - name: factor_value_weighted
      traits:
      - proportional to factor magnitude
      - gross=1 normalized
      - default
      fit_for:
      - value-weighted analysis
      - larger signals get larger positions
      not_fit_for:
      - equal-weight required
      - turnover-sensitive strategies
    - name: equal_weight=True
      traits:
      - uniform weights within quantile
      - simpler interpretation
      fit_for:
      - balanced analysis
      - turnover reduction
      - factor-only signal
      not_fit_for:
      - magnitude-aware weighting
      - capacity constraints
    default: factor_value_weighted
  - name: portfolio_type
    description: Portfolio construction approach
    options:
    - name: long_short (default)
      traits:
      - demedian weights
      - market neutral
      - isolates alpha
      fit_for:
      - alpha-focused analysis
      - long-short strategies
      - market-neutral funds
      not_fit_for:
      - long-only analysis
      - beta exposure desired
    - name: long_only
      traits:
      - no short positions
      - full market exposure
      - simpler
      fit_for:
      - long-only mandates
      - simpler execution
      - beta capture
      not_fit_for:
      - market-neutral analysis
      - alpha isolation
    - name: group_neutral
      traits:
      - within-group demeaning
      - equal group contribution
      fit_for:
      - sector-neutral analysis
      - factor across groups
      - equal group weight
      not_fit_for:
      - group exposure desired
      - sector rotation strategies
    default: long_short
  design_decisions:
  - Spearman rank correlation for IC (not Pearson) - rank correlation is robust to outliers and non-linear
    monotonic relationships; standard in quant finance for IC (src/alphalens/performance.py:57)
  acceptance_hints:
  - IC values are between -1 and 1
  - Factor returns sum to approximately zero for demeaned portfolios
  - Weights.abs().sum() equals 1.0 (gross leverage)
  - Alpha/beta come from OLS with t-statistics
  - Quantile returns show monotonic progression (Q5 > Q4 > Q3 > Q2 > Q1 for long factors)
- id: visualization
  name: Plotting & Visualization
  order: 3
  responsibility: Creates matplotlib/seaborn visualizations for IC, returns by quantile, cumulative returns,
    turnover, and event studies. Uses GridFigure helper for tear sheet layout management.
  interface:
    inputs:
    - name: IC_data
      description: IC Series from performance module
    - name: returns_data
      description: Quantile returns and factor returns from performance module
    - name: turnover_data
      description: Turnover metrics and factor rank autocorrelation
    outputs:
    - name: matplotlib_Axes
      description: matplotlib Axes objects rendered in Jupyter or saved to files
  required_methods:
  - name: plotting.plot_ic_ts
    description: Plots Information Coefficient time series with 22-period rolling mean. Shows IC volatility
      and trend over time.
    evidence: src/alphalens/plotting.py:241(plot_ic_ts)
  - name: plotting.plot_ic_hqq
    description: Plots histogram and quarterly mean IC heat map for IC distribution analysis.
    evidence: src/alphalens/plotting.py:290(plot_ic_hqq)
  - name: plotting.plot_quantile_returns_bar
    description: Bar chart of mean returns by factor quantile. Uses adaptive ylim_percentiles to prevent
      outlier compression.
    evidence: src/alphalens/plotting.py:397(plot_quantile_returns_bar)
  - name: plotting.plot_cumulative_returns
    description: Line chart of cumulative returns over time for factor portfolio and benchmark.
    evidence: src/alphalens/plotting.py:520(plot_cumulative_returns)
  - name: plotting.plot_turnover_table
    description: Heatmap of turnover rates by quantile over time.
    evidence: src/alphalens/plotting.py:350(plot_turnover_table)
  - name: plotting.plot_event_returns
    description: Line chart of average returns around event dates with before/after window.
    evidence: src/alphalens/plotting.py:720(plot_event_returns)
  key_behaviors:
  - behavior: '@customize decorator applies seaborn styling'
    description: Every plotting functions are wrapped with @customize decorator that sets seaborn context/style
      for consistent visual appearance. Can be disabled via set_context=False.
    evidence: src/alphalens/plotting.py:34(customize)
  - behavior: BPS conversion for returns display
    description: Returns multiplied by 10000 (DECIMAL_TO_BPS) make small values visible. Standard convention
      in fixed income and quant finance.
    evidence: src/alphalens/plotting.py:31(DECIMAL_TO_BPS)
  - behavior: Adaptive y-axis scaling
    description: ylim_percentiles parameter prevents outliers from compressing the main distribution.
      Defaults to full range, (1,99) for violin plots.
    evidence: src/alphalens/plotting.py:397(plot_quantile_returns_bar)
  - behavior: 22-period rolling mean for IC
    description: Hardcoded approximately 1 trading month smoothing. Balances noise reduction with signal
      preservation.
    evidence: src/alphalens/plotting.py:241(plot_ic_ts)
  replaceable_points:
  - name: plotting_style
    description: Visual style context for plots
    options:
    - name: darkgrid (default)
      traits:
      - dark background
      - good contrast
      - seaborn default
      fit_for:
      - Jupyter notebooks
      - general use
      - screen viewing
      not_fit_for:
      - print publication
      - light backgrounds
    - name: whitegrid
      traits:
      - light background
      - professional look
      fit_for:
      - print publication
      - reports
      - presentations
      not_fit_for:
      - dark screen viewing
    - name: none (raw matplotlib)
      traits:
      - no style applied
      - fastest rendering
      - matplotlib defaults
      fit_for:
      - custom styling
      - performance-critical rendering
      not_fit_for:
      - consistent appearance
      - quick analysis
    default: darkgrid
  - name: context
    description: Seaborn context for font scaling
    options:
    - name: notebook (default)
      traits:
      - inline scaling
      - default font sizes
      fit_for:
      - Jupyter notebooks
      - interactive analysis
      not_fit_for:
      - presentations
      - small screens
    - name: paper
      traits:
      - smaller fonts
      - optimized for print
      fit_for:
      - journal articles
      - print publication
      not_fit_for:
      - screen viewing
      - presentations
    - name: talk
      traits:
      - larger fonts
      - presentation optimized
      fit_for:
      - presentations
      - large screen
      not_fit_for:
      - print
      - compact layouts
    - name: poster
      traits:
      - largest fonts
      - very high contrast
      fit_for:
      - conference posters
      - large format display
      not_fit_for:
      - reports
      - notebooks
    default: notebook
  design_decisions:
  - '@customize decorator wraps each tear sheet functions - sets seaborn context/style for consistent
    visual appearance; can be disabled via set_context=False (src/alphalens/plotting.py:34)'
  acceptance_hints:
  - Plots render without errors in matplotlib
  - Seaborn styling is applied consistently
  - Y-axis scales appropriately with ylim_percentiles
  - GridFigure properly manages subplot layout
  - BPS values are displayed correctly
- id: reporting
  name: Tear Sheet Reporting
  order: 4
  responsibility: 'Combines performance metrics and visualizations into thematic reports: summary, returns,
    information, turnover, event studies. Orchestrates calls to performance and plotting modules.'
  interface:
    inputs:
    - name: factor_data
      description: MultiIndex DataFrame from data_preparation
    - name: returns
      description: 'For event studies only: pd.DataFrame (wide format, dates x assets) with daily price
        returns'
    outputs:
    - name: tear_sheet
      description: Combined plots and summary tables displayed via matplotlib/IPython display
  required_methods:
  - name: tears.create_full_tear_sheet
    description: Generates comprehensive analysis including returns, IC, turnover, and group analysis.
      Main entry point for complete factor evaluation.
    evidence: src/alphalens/tears.py:62(create_summary_tear_sheet)
  - name: tears.create_summary_tear_sheet
    description: 'Creates overview with key metrics: cumulative returns, IC summary, quantile returns,
      and turnover stats in condensed format.'
    evidence: src/alphalens/tears.py:62(create_summary_tear_sheet)
  - name: tears.create_returns_tear_sheet
    description: Detailed returns analysis including cumulative returns, quantile breakdowns, and factor
      vs benchmark performance.
    evidence: src/alphalens/tears.py:145(create_returns_tear_sheet)
  - name: tears.create_information_tear_sheet
    description: IC-focused analysis with time series, distribution, and group-level IC metrics.
    evidence: src/alphalens/tears.py:350(create_information_tear_sheet)
  - name: tears.create_turnover_tear_sheet
    description: Factor rank autocorrelation and turnover analysis for assessing factor stability and
      trading costs.
    evidence: src/alphalens/tears.py:460(create_turnover_tear_sheet)
  - name: tears.create_event_returns_tear_sheet
    description: Event study analysis requiring separate daily returns DataFrame. Shows returns before,
      during, and after event window.
    evidence: src/alphalens/tears.py:508(create_event_returns_tear_sheet)
  key_behaviors:
  - behavior: GridFigure manages subplot layout
    description: GridFigure class uses matplotlib.gridspec directly for tear sheet layout. Provides next_row/next_cell
      iteration and auto-closes figures on completion to prevent memory leaks.
    evidence: src/alphalens/tears.py:26-58(GridFigure)
  - behavior: Modular tear sheets enable targeted analysis
    description: Separate tear sheets allow users to focus on returns OR information OR turnover without
      full analysis, reducing computation for targeted use cases.
    evidence: src/alphalens/tears.py:62(create_summary_tear_sheet)
  - behavior: Event studies require separate returns DataFrame
    description: Event studies need daily price returns (not pre-computed forward returns) to analyze
      pre-event behavior. Data separation prevents misuse of forward returns for back-looking analysis.
    evidence: src/alphalens/tears.py:508(create_event_returns_tear_sheet)
  - behavior: Figure lifecycle management
    description: GridFigure.close() is called automatically on tear sheet completion, preventing memory
      leaks from unclosed matplotlib figures.
    evidence: src/alphalens/tears.py:56(GridFigure.close)
  replaceable_points:
  - name: tear_sheet_type
    description: Analysis scope and depth
    options:
    - name: summary
      traits:
      - condensed metrics
      - fast rendering
      - overview only
      fit_for:
      - quick checks
      - iteration
      - large universes
      not_fit_for:
      - detailed analysis
      - publication
      - final evaluation
    - name: returns
      traits:
      - full returns analysis
      - cumulative, quantile, factor
      fit_for:
      - returns-focused factors
      - strategy validation
      not_fit_for:
      - information analysis
      - turnover concerns
    - name: information
      traits:
      - IC analysis
      - rank correlation focus
      fit_for:
      - alpha signal validation
      - factor IC testing
      not_fit_for:
      - returns analysis
      - turnover analysis
    - name: turnover
      traits:
      - rank stability
      - autocorrelation analysis
      fit_for:
      - trading cost estimation
      - factor decay analysis
      not_fit_for:
      - returns validation
      - information analysis
    - name: event_study
      traits:
      - event window analysis
      - requires returns DataFrame
      fit_for:
      - earnings studies
      - news events
      - corporate actions
      not_fit_for:
      - continuous factors
      - without event dates
    - name: full (default)
      traits:
      - each analyses combined
      - most comprehensive
      fit_for:
      - final evaluation
      - publication
      - complete picture
      not_fit_for:
      - quick iteration
      - targeted analysis
      - large universes
    default: full
  design_decisions:
  - Separate tear sheets allow modular analysis - users can focus on returns OR information OR turnover
    without full analysis; reduces computation for targeted analysis (src/alphalens/tears.py:62)
  acceptance_hints:
  - Every plots render without errors
  - GridFigure layout is correct (no overlapping plots)
  - Figures are properly closed after rendering
  - Event studies work with separate returns DataFrame
  - IPython display renders correctly in notebooks
data_flow:
- from_stage: user_input
  to_stage: data_preparation
  data: 'factor: pd.Series (MultiIndex: date, asset), prices: pd.DataFrame (dates x assets), groupby:
    optional asset-to-group mapping'
- from_stage: data_preparation
  to_stage: performance_analysis
  data: 'factor_data: MultiIndex DataFrame with columns [factor, 1D, 5D, ..., factor_quantile, group]'
- from_stage: performance_analysis
  to_stage: visualization
  data: IC series, mean_returns_by_quantile, factor_returns, alpha_beta, turnover_metrics, factor_rank_autocorrelation
- from_stage: performance_analysis
  to_stage: reporting
  data: Every computed metrics as DataFrames/Series for tear sheet assembly
- from_stage: visualization
  to_stage: reporting
  data: matplotlib Axes objects arranged in GridFigure grids
- from_stage: user_input
  to_stage: reporting
  data: 'For event studies only: returns: pd.DataFrame (wide format, dates x assets) with daily price
    returns'
global_contracts:
- contract: Every DataFrames must use MultiIndex with levels ['date', 'asset'] in that order
  evidence: src/alphalens/utils.py:615(factor_copy.index.rename)
- contract: Forward returns columns must match pd.Timedelta string format regex ^((\d+([D|h|m|s|ms|us|ns]))+)+$
  evidence: src/alphalens/utils.py:932(get_forward_returns_columns)
- contract: Factor and prices DatetimeIndex must have identical timezone (or both None)
  evidence: src/alphalens/utils.py:276(compute_forward_returns)
- contract: factor_data.index.levels[0].freq must be set to trading calendar for cumulative returns
  evidence: src/alphalens/utils.py:358(df.index.levels[0].freq)
- contract: Every performance metrics assume factor_quantile is integer 1 to N where N is number of quantiles
  evidence: src/alphalens/utils.py:150(quantize_factor)
- contract: Group column must be categorical dtype when present
  evidence: src/alphalens/utils.py:643(merged_data['group'].astype)
- contract: Returns are expressed as decimals (0.01 = 1%), not percentages or basis points
  evidence: src/alphalens/performance.py:253(factor_returns)
- contract: Portfolio weights must normalize to gross leverage of 1.0 (weights.abs().sum() == 1.0)
  evidence: src/alphalens/performance.py:192,454(tot_weights /= tot_weights.abs().sum())
- contract: Factor timestamps must precede or equal price timestamps for forward return calculation
  evidence: src/alphalens/utils.py:276-289(compute_forward_returns)
business_decisions:
- id: BD-001
  type: B/BA
  content: MultiIndex (date, asset) is the universal data structure
  rationale: Enables efficient groupby operations on both time and asset dimensions; matches pandas groupby
    conventions for financial data. This structure supports time-series and cross-sectional analysis simultaneously,
    which is fundamental to factor research workflows where returns must be aligned with factor values
    across multiple securities.
  evidence: src/alphalens/utils.py:227(compute_forward_returns)
  stage: data_preparation
  alternative_considered: Separate date and asset columns would require manual alignment and reduce query
    efficiency
- id: BD-002
  type: B/BA
  content: Forward returns use pd.Timedelta string column names (1D, 5D, 3h15m)
  rationale: Human-readable period representation that supports both daily and intraday data; regex pattern
    validates column names across utils. This naming convention allows analysts to immediately understand
    return horizons while remaining machine-parseable for automated workflows.
  evidence: src/alphalens/utils.py:916(get_forward_returns_columns)
  stage: data_preparation
  alternative_considered: Integer day counts would lose temporal semantics; datetime objects add complexity
    without benefit
- id: BD-003
  type: BA
  content: Trading calendar inferred from factor/prices index overlap
  rationale: Avoids requiring users to specify calendar; infers weekdays and holidays automatically from
    data gaps. This reduces friction for new users and ensures calendar alignment between factor and price
    data without manual configuration.
  evidence: src/alphalens/utils.py:182(infer_trading_calendar)
  stage: data_preparation
  alternative_considered: Explicit calendar parameter would require users to know market conventions;
    default to NYSE ignores other exchanges
- id: BD-004
  type: BA
  content: max_loss=0.35 (35%) default threshold for data quality
  rationale: Balances data quality with allowing analysis even with imperfect data; 35% loss considered
    acceptable for research. This threshold prevents analysis on severely incomplete data while avoiding
    overly strict filtering that would exclude valuable research samples.
  evidence: src/alphalens/utils.py:472(get_clean_factor)
  stage: data_preparation
  alternative_considered: Lower threshold (e.g., 20%) would exclude many real-world factors; higher (50%)
    risks unreliable results
  vague_rationale: true
- id: BD-005
  type: BA
  content: Zero-aware quantile binning separates positive/negative signals
  rationale: Critical for factors centered at zero (e.g., mean-reversion) where signals should be symmetric
    around the origin. Standard quantile binning could merge positive and negative signals into same bucket,
    destroying directional information for zero-centered factors.
  evidence: src/alphalens/utils.py:91(quantize_factor)
  stage: data_preparation
  alternative_considered: Standard equal-quintile binning would lose sign information for factors crossing
    zero
- id: BD-006
  type: B
  content: Backshift returns to align with factor dates (shift(-period))
  rationale: shift(-period) moves future returns backward to match current factor signal; ensures no lookahead
    bias. This is fundamental to preventing information leakage in factor backtesting where only available
    data should drive portfolio construction.
  evidence: src/alphalens/utils.py:227(compute_forward_returns)
  stage: data_preparation
  alternative_considered: Forward-fill would introduce lookahead; any other alignment would either leak
    information or create misalignment
- id: BD-007
  type: B
  content: Spearman rank correlation for IC (not Pearson)
  rationale: Rank correlation is robust to outliers and non-linear monotonic relationships; standard in
    quant finance for IC. Pearson would be distorted by extreme factor values or returns, giving misleading
    signal about predictive power.
  evidence: src/alphalens/performance.py:28(factor_information_coefficient)
  stage: performance_analysis
  alternative_considered: Pearson correlation is sensitive to outliers and assumes linear relationships,
    inappropriate for factor returns
- id: BD-008
  type: B
  content: Factor weights = factor_value / sum(|factor|) for gross leverage=1
  rationale: Ensures weights sum to 1 in absolute value; positive values = long, negative = short; gross
    exposure controlled. This normalization is essential for comparing portfolios across different factor
    magnitudes and controlling leverage in backtesting.
  evidence: src/alphalens/performance.py:131(factor_weights)
  stage: performance_analysis
  alternative_considered: Raw factor values would create unbounded leverage; z-score normalization adds
    complexity without benefit here
- id: BD-009
  type: BA/DK
  content: demeaned=True by default enables long-short portfolio
  rationale: Subtracts universe mean from weights; creates market-neutral portfolio isolating factor alpha.
    This default aligns with quant fund practice of separating factor returns from market beta exposure.
  evidence: src/alphalens/performance.py:131(factor_weights)
  stage: performance_analysis
  alternative_considered: Non-demeaned would blend market beta with factor returns; harder to isolate
    pure alpha
- id: BD-010
  type: BA
  content: group_adjust performs within-group demeaning
  rationale: Enables group-neutral portfolio constraint; each group contributes equally regardless of
    constituent count. This prevents sectors with more stocks from dominating factor returns and ensures
    balanced sector exposure.
  evidence: src/alphalens/utils.py:397(demean_forward_returns)
  stage: performance_analysis
  alternative_considered: No grouping would allow sector size bias; industry convention requires within-sector
    factor analysis
- id: BD-011
  type: B/DK
  content: Factor rank autocorrelation (not value autocorrelation)
  rationale: Ranks account for systematic factor shifts; pure value autocorrelation would be biased by
    market regime changes. Rank-based measurement isolates true signal persistence from changing absolute
    factor magnitudes.
  evidence: src/alphalens/performance.py:620(factor_rank_autocorrelation)
  stage: performance_analysis
  alternative_considered: Value autocorrelation would conflate regime changes with factor signal persistence
- id: BD-012
  type: M
  content: OLS regression for alpha/beta with annualized adjustment
  rationale: statsmodels OLS provides t-stats for alpha significance; freq_adjust annualizes daily/weekly
    returns. This enables proper statistical testing of factor alpha and fair comparison across different
    return frequencies.
  evidence: src/alphalens/performance.py:265(factor_alpha_beta)
  stage: performance_analysis
  alternative_considered: Simple return ratio ignores sampling uncertainty; annualized adjustment is essential
    for multi-frequency comparison
- id: BD-013
  type: M/BA
  content: Rate-of-return conversion normalizes different period lengths
  rationale: Compounds returns to common period length for fair comparison across 1D, 5D, 10D forward
    returns. Without normalization, longer horizons would appear to have higher or lower returns purely
    due to compounding effects.
  evidence: src/alphalens/utils.py:864(rate_of_return)
  stage: performance_analysis
  alternative_considered: Arithmetic aggregation would overstate multi-period returns; geometric compounding
    is mathematically correct
- id: BD-014
  type: BA
  content: '@customize decorator wraps each tear sheet functions'
  rationale: Sets seaborn context/style for consistent visual appearance; can be disabled via set_context=False.
