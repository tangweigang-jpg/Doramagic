- id: BD-024
  type: B/BA
  content: Default filter_zscore = 20 standard deviations for outlier removal
  rationale: The 20-sigma filter_zscore threshold is extremely permissive, only removing extreme statistical
    outliers beyond 20 standard deviations from the mean. This virtually disables outlier removal by default,
    preserving each factor values for analysis. This design choice acknowledges that factor distributions
    vary dramatically across strategies and aggressive outlier removal could distort genuine factor effects.
  evidence: src/alphalens/utils.py:682(get_clean_factor_and_forward_returns)
  stage: data_preparation
  alternative_considered: More aggressive 3-sigma or 5-sigma defaults were considered but rejected as
