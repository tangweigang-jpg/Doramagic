- id: BD-031
  type: B
  content: Forward returns = pct_change(period) shifted by -period
  rationale: Forward returns use percentage change with negative shift to align current factor values
    with future realized returns without lookahead bias. The pct_change computes period-over-period returns
    while shift(-period) pulls future prices into the current observation row. This ensures the training
    signal uses only information available at portfolio formation time.
  evidence: src/alphalens/utils.py:308(pct_change)
  stage: data_preparation
  alternative_considered: Log returns were considered but rejected for pct_change simplicity; backward
