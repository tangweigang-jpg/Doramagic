      - Sample-limited
    default: DQN
  - name: Episode length
    description: Trading days per episode
    options:
    - name: 252 (1 year)
      traits:
      - Industry standard
      - Annual evaluation
      fit_for:
      - Annual strategies
      - Benchmark comparison
