- id: BD-113
  type: BA/DK
  content: 'RISK CASCADE: [BD-009] TA-Lib indicators × [BD-012] NaN/inf handling × [BD-065] Drop OHLCV
    columns → Feature pipeline silent failure on indicator errors'
  rationale: 'TA-Lib indicators (BD-009) generate inf/NaN values for edge cases (division by zero, insufficient
    lookback), BD-012 handles these via replace-then-dropna, and BD-065 drops raw OHLCV after indicator
    calculation. This creates a cascade where: (1) TA-Lib produces NaN/inf for certain price patterns,
    (2) dropna removes affected rows, (3) raw OHLCV data is gone. If NaN rows cluster around specific
    market regimes (e.g., low volatility periods), the agent systematically lacks training examples from
    thos'
