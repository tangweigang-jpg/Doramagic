- id: multiple_testing_correction
  name: Multiple Testing Correction
  order: 7
  responsibility: Adjust Sharpe ratio estimates for selection bias when testing many strategies. Published
    Sharpe ratios are biased upward by multiple testing; deflating accounts for data snooping and prevents
    overfitting.
  interface:
    inputs:
    - Historical Sharpe ratio
    - Number of trials tested
    - Expected Sharpe distribution parameters
    outputs:
    - Deflated Sharpe ratio (adjusted for multiple testing)
  required_methods:
  - name: get_analytical_max_sr
    description: Computes analytical expected maximum Sharpe using extreme value theory and Euler-Mascheroni
      constant
    evidence: 08_ml4t_workflow/01_multiple_testing/deflated_sharpe_ratio.py:10(function)
  - name: get_numerical_max_sr
    description: Monte Carlo validation of analytical solution; simulates many trials to estimate max
      Sharpe
    evidence: 08_ml4t_workflow/01_multiple_testing/deflated_sharpe_ratio.py:20(function)
  - name: simulate
    description: Computes both analytical and numerical DSR for comparison and validation
    evidence: 08_ml4t_workflow/01_multiple_testing/deflated_sharpe_ratio.py:30(function)
  key_behaviors:
  - behavior: Euler-Mascheroni constant in analytical max SR formula
    description: Derived from asymptotic distribution of maxima; standard constant in extreme value theory
    evidence: 08_ml4t_workflow/01_multiple_testing/deflated_sharpe_ratio.py:14(emc=0.5772)
  - behavior: Monte Carlo validation of analytical formula
    description: Numerical simulation provides confidence in theoretical derivation; catches implementation
      errors
    evidence: 08_ml4t_workflow/01_multiple_testing/deflated_sharpe_ratio.py:20(get_numerical_max_sr)
  - behavior: Num_trials × exp(1) in denominator
    description: np.e accounts for correlation structure in Sharpe estimates; Bailey-Lopez formula for
      deflated Sharpe
    evidence: 08_ml4t_workflow/01_multiple_testing/deflated_sharpe_ratio.py:16(1-1/(num_trials*np.e))
  replaceable_points:
  - name: DSR calculation method
    description: Method for computing maximum expected Sharpe ratio
    options:
    - name: Analytical (EVT)
      traits:
      - Fast
      - Theoretically grounded
      - Euler-Mascheroni
      fit_for:
      - Production use
      - Large trial counts
      not_fit_for:
      - Small samples
      - Non-standard distributions
    - name: Numerical (Monte Carlo)
      traits:
      - Simulation-based
      - Flexible
      - No closed form needed
      fit_for:
      - Validation
      - Complex distributions
      not_fit_for:
      - Real-time computation
      - Large trial counts
    default: Analytical
  design_decisions:
  - 'Euler-Mascheroni constant in analytical max SR formula (evidence: 08_ml4t_workflow/01_multiple_testing/deflated_sharpe_ratio.py:14(emc=0.5772))
    — Derived from asymptotic distribution of maxima; standard constant in EVT'
  - 'Monte Carlo validation of analytical formula (evidence: 08_ml4t_workflow/01_multiple_testing/deflated_sharpe_ratio.py:20(get_numerical_max_sr))
    — Numerical simulation provides confidence in theoretical derivation; catches implementation errors'
  - 'Num_trials × exp(1) in denominator (evidence: 08_ml4t_workflow/01_multiple_testing/deflated_sharpe_ratio.py:16(1-1/(num_trials*np.e)))
    — np.e accounts for correlation structure in Sharpe estimates; Bailey-Lopez formula'
  acceptance_hints:
  - Deflated Sharpe ratio is lower than raw Sharpe (accounting for multiple testing)
  - DSR decreases as number of trials increases
  - Analytical and numerical DSR values are comparable (within tolerance)
  - Euler-Mascheroni constant (0.5772) used in formula
data_flow:
- from_stage: alternative_data_collection
  to_stage: market_data_ingestion
  data: Web-scraped HTML parsed into structured CSV/HDF5 files for proprietary data sources
- from_stage: market_data_ingestion
  to_stage: feature_engineering
  data: Zipline bundle with OHLCV minute/daily bars converted to DataSource with technical indicators
- from_stage: feature_engineering
  to_stage: prediction_modeling
  data: Feature DataFrame with MultiIndex (ticker, date) containing technical indicators
- from_stage: prediction_modeling
  to_stage: backtesting
  data: ML predictions (predicted returns) joined with price data for strategy simulation
- from_stage: feature_engineering
  to_stage: reinforcement_learning_trading
  data: Technical features (returns, RSI, MACD, ATR, Stochastic) as RL agent observations
- from_stage: reinforcement_learning_trading
  to_stage: backtesting
  data: RL policy actions mapped to positions (-1, 0, 1) executed in TradingSimulator with P&L computation
- from_stage: backtesting
  to_stage: multiple_testing_correction
  data: In-sample Sharpe ratio from backtest results to deflated Sharpe for publication
- from_stage: prediction_modeling
  to_stage: multiple_testing_correction
  data: Best-of-N strategy Sharpe ratio with number of trials for DSR calculation
