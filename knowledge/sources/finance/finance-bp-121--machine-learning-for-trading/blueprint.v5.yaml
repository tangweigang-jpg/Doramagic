- id: BD-112
  type: BA
  content: 'INTERACTION: [BD-014] 126/21 split × [BD-061] Lookback-1 gap → Reduced effective training
    size without explicit awareness'
  rationale: The 126-day training window (BD-014) combined with the lookback-1 gap (BD-061) effectively
    reduces training data by at least 1 day per split. For walk-forward validation with multiple folds,
    the cumulative data loss compounds. While 1 day seems minor, across 7+ folds (using 126/21 splits),
    this represents ~7+ days of training data loss per fold transition. The interaction is not explicitly
    documented in either decision, so users may not realize effective training windows are smaller than
    stated.
  evidence: BD-014 (utils.py:23), BD-061 (utils.py:44-45)
  stage: global
  alternative_considered: Explicit documentation of effective training window size in CV class
