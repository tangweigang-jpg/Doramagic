- id: BD-106
  type: BA/M
  content: 'INTERACTION: [BD-013] TimeSeriesCV × [BD-081] KFold with shuffle → Training may use future
    data for non-time-series models'
  rationale: TimeSeriesCV is used for time-series prediction models respecting temporal order, but KFold
    with shuffle=5 is also used in the same codebase for other ML tasks. This creates inconsistent validation
    approaches where some models leak future information while others don't. The interaction causes inflated
    performance estimates for non-DRL models compared to DRL models, leading to misleading strategy comparisons
    across different modeling approaches.
  evidence: BD-013 (utils.py:37), BD-081 (06_machine_learning_process/04_cross_validation.py:17-23)
  stage: global
  alternative_considered: Consistent use of TimeSeriesSplit across each financial ML tasks
