# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-121
name: ML for Trading - 2nd Edition
sop_version: '3.6'
source:
  projects:
  - machine-learning-for-trading
  commit_hash: f652d79ab2f137d75d554af2cc437a5512b16069
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: algorithmic trading strategy development with machine learning
  description: Practical guide demonstrating how ML adds value to algorithmic trading strategies, covering
    data sourcing, feature engineering, model training, backtesting, and strategy evaluation across multiple
    asset classes.
  prerequisites: Python programming, basic finance/financial market concepts, familiarity with machine
    learning fundamentals
  not_suitable_for: High-frequency trading requiring ultra-low latency, pure fundamental analysis without
    ML components, production real-time trading systems, regulatory trading compliance
stages:
- id: alternative_data_collection
  name: Alternative Data Collection
  order: 1
  responsibility: Scrapes unstructured data from web sources including restaurant reservations (OpenTable)
    and earnings call transcripts (SeekingAlpha). Alternative data provides alpha signals not available
    from traditional market data feeds, enabling differentiation from competitors using conventional data
    sources.
  interface:
    inputs:
    - Target URLs and authentication credentials (environment variables)
    - Raw web page HTML content from JS-rendered pages
    outputs:
    - 'Structured CSV files: restaurant listings with ratings/availability'
    - Earnings transcripts with speaker identification and Q&A content
  required_methods:
  - name: OpenTableSpider.parse
    description: Extracts restaurant listing fields (name, location, ratings, availability) from Scrapy
      response objects
    evidence: 03_alternative_data/01_opentable/opentable/spiders/table_spider.py:10(Class)
  - name: parse_html
    description: Parses SeekingAlpha transcript HTML extracting metadata, participant names, and transcript
      content sections
    evidence: 03_alternative_data/02_earnings_calls/sa_selenium.py:29(function)
  - name: MonitorDownloadsExtension.periodic_task
    description: Logs active download count periodically using Twisted LoopingCall task scheduler
    evidence: 03_alternative_data/01_opentable/opentable/extensions.py:25(Class)
  key_behaviors:
  - behavior: JavaScript-rendered page scraping via SplashRequest
    description: Uses SplashRequest with endpoint='render.html' and wait=1 second for OpenTable pages
      that render content client-side
    evidence: 03_alternative_data/01_opentable/opentable/spiders/table_spider.py:14-20(SplashRequest)
  - behavior: User-agent rotation for anti-blocking
    description: RotateUserAgentMiddleware controls rotation via spider.rotate_user_agent attribute, not
      middleware setting directly
    evidence: 03_alternative_data/01_opentable/opentable/middlewares.py:127-131(process_request)
  - behavior: Robots.txt compliance with auto-throttling
    description: Settings enforce ROBOTSTXT_OBEY=True and CONCURRENT_REQUESTS=1 to limit server load and
      respect crawler ethics
    evidence: 03_alternative_data/01_opentable/opentable/settings.py:28(ROBOTSTXT_OBEY)
  - behavior: Selenium authentication for protected content
    description: WebDriver handles cookies and sessions for SeekingAlpha login-based transcript access
      where Scrapy is insufficient
    evidence: 03_alternative_data/02_earnings_calls/scrape_test.py:20(webdriver.Chrome)
  replaceable_points:
  - name: Spider implementation
    description: parse() method extracts specific fields from response; can subclass or replace entirely
    options:
    - name: OpenTableSpider
      traits:
      - Scrapy-based
      - SplashRequest integration
      - CSV output via pipeline
      fit_for:
      - Restaurant data, travel-related alternative data
      not_fit_for:
      - Login-protected sites requiring Selenium
    - name: CustomSpider
      traits:
      - User-defined
      - Any parse logic
      fit_for:
      - Novel data sources with unique HTML structures
      not_fit_for:
      - Quick prototyping without dedicated developer
    default: OpenTableSpider
  - name: Downloader middleware
    description: Request modification layer for blocking evasion
    options:
    - name: RotateUserAgentMiddleware
      traits:
      - UA rotation only
      - No proxy management
      fit_for:
      - Sites blocking on user-agent only
      not_fit_for:
      - IP-based blocking scenarios
    - name: ProxyMiddleware
      traits:
      - IP rotation
      - Geographic diversity
      fit_for:
      - Sites with strict IP-based rate limiting
      not_fit_for:
      - IP proxy costs, proxy maintenance overhead
    default: RotateUserAgentMiddleware
  - name: Item pipeline
    description: 'Post-scraping processing: validation, storage, transformation'
    options:
    - name: OpentablePipeline
      traits:
      - Identity passthrough
      - No modification
      fit_for:
      - Direct CSV output without validation
      not_fit_for:
      - Data quality requirements
    - name: MongoDBPipeline
      traits:
      - NoSQL storage
      - Flexible schema
      fit_for:
      - Unstructured or semi-structured scraped data
      not_fit_for:
      - Relational analysis, SQL-based BI tools
    - name: ValidationPipeline
      traits:
      - Schema enforcement
      - Quality checks
      fit_for:
      - Production data quality requirements
      not_fit_for:
      - Rapid prototyping with known-good sources
    default: OpentablePipeline
  design_decisions:
  - 'Scrapy framework chosen over raw requests for extensibility (evidence: 03_alternative_data/01_opentable/opentable/spiders/table_spider.py:10(Class))
    — Scrapy provides middleware pipeline, auto-throttle, and extension points - avoids reinventing crawl
    scheduling'
  - 'SplashRequest for JavaScript-rendered pages (evidence: 03_alternative_data/01_opentable/opentable/spiders/table_spider.py:16(SplashRequest))
    — OpenTable uses client-side rendering; Splash enables headless browser without separate process'
  - 'Selenium for SeekingAlpha login-based access (evidence: 03_alternative_data/02_earnings_calls/scrape_test.py:20(webdriver.Chrome))
    — Transcripts require authentication; Selenium handles cookies/sessions where Scrapy is insufficient'
  - 'Periodic stats/monitoring via LoopingCall extensions (evidence: 03_alternative_data/01_opentable/opentable/extensions.py:13(setup_looping_task))
    — Twisted task scheduling integrates cleanly with Scrapy event loop for periodic logging'
  acceptance_hints:
  - Spider successfully crawls target URLs and outputs structured CSV files
  - Concurrent requests limited to 1 and robots.txt respected
  - No IP blocks or 403 errors during scraping run
  - Splash renders JS content (wait=1s sufficient for target pages)
  - Monitoring extension logs active download counts periodically
- id: market_data_ingestion
  name: Market Data Ingestion
  order: 2
  responsibility: Ingest market data into Zipline backtesting framework via custom bundles. Proprietary
    data sources (Algoseek minute bars, Stooq Japan) require custom parsers to match Zipline's data model,
    enabling backtesting on high-quality intraday data.
  interface:
    inputs:
    - Raw CSV/SQLite files, HDF5 price data
    - Exchange metadata (tickers, splits, dividends)
    - Custom trading calendar definitions
    outputs:
    - Zipline-usable SQLite assets database
    - HDF5 minute/daily bars with OHLCV format
  required_methods:
  - name: algoseek_to_bundle
    description: Zipline ingest function returning generator of minute bar data from Algoseek source
    evidence: 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/algoseek_1min_trades.py:64(function)
  - name: stooq_jp_to_bundle
    description: Bundle ingest function for Japanese equities (XTKS exchange) with timezone handling
    evidence: 11_decision_trees_random_forests/00_custom_bundle/stooq_jp_stocks.py:65(function)
  - name: AlgoSeekCalendar
    description: Custom trading calendar with extended hours (4AM-19:59 US/Eastern) inheriting NYSE logic
    evidence: 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/extension.py:18(Class)
  - name: metadata_frame
    description: Creates empty DataFrame with required Zipline asset metadata schema (symbol, asset_type,
      start_date, end_date, exchange)
    evidence: 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/algoseek_1min_trades.py:52(function)
  key_behaviors:
  - behavior: Custom exchange calendar inheritance pattern
    description: AlgoSeekCalendar inherits from XNYSExchangeCalendar and overrides only open/close times
      while preserving holiday handling
    evidence: 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/extension.py:18(AlgoSeekCalendar)
  - behavior: Generator functions for lazy data loading
    description: data_generator yields per-symbol data on-demand rather than loading each symbols into
      memory
    evidence: 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/algoseek_1min_trades.py:36(data_generator)
  - behavior: 4-step bundle ingestion pipeline
    description: 'Consistent pattern: metadata → write_bars → write_equities → write_adjustments across
      each bundles'
    evidence: 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/algoseek_1min_trades.py:65-89(ingest)
  - behavior: 1600 minutes/day for extended hours trading
    description: Zipline requires fixed minutes_per_day; Algoseek uses 960 regular + 640 extended hours
      = 1600 total
    evidence: 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/extension.py:55(minutes_per_day)
  replaceable_points:
  - name: Bundle ingest function
    description: Ingest function signature follows Zipline protocol with 9 parameters
    options:
    - name: algoseek_to_bundle
      traits:
      - Minute bars
      - US equities
      - Extended hours
      fit_for:
      - High-frequency backtesting
      - US market analysis
      not_fit_for:
      - Daily-only backtesting
      - Non-US markets
    - name: stooq_jp_to_bundle
      traits:
      - Daily bars
      - Japanese equities
      - XTKS exchange
      fit_for:
      - Long-horizon Japanese equity strategies
      not_fit_for:
      - Intraday analysis
      - US markets
    - name: custom_bundle
      traits:
      - User-defined
      - Any data source
      fit_for:
      - Proprietary data sources
      - Custom asset classes
      not_fit_for:
      - Quick prototyping
      - Standard market data
    default: algoseek_to_bundle
  - name: Exchange calendar
    description: TradingCalendar subclass defining trading hours and holidays
    options:
    - name: XNYSExchangeCalendar
      traits:
      - Standard NYSE hours
      - NYSE holidays
      fit_for:
      - Standard US equity strategies
      not_fit_for:
      - Extended hours trading
      - Non-NYSE exchanges
    - name: AlgoSeekCalendar
      traits:
      - Extended 4AM-19:59
      - 1600 minutes/day
      fit_for:
      - Algoseek data
      - Pre/after-market analysis
      not_fit_for:
      - Standard NYSE strategies
      - Other data sources
    - name: XTKSExchangeCalendar
      traits:
      - Tokyo Stock Exchange hours
      - Japanese holidays
      fit_for:
      - Japanese equity strategies
      not_fit_for:
      - US markets
      - Extended hours
    default: XNYSExchangeCalendar
  - name: Adjustment data
    description: Splits and dividends from external sources for accurate backtesting
    options:
    - name: HDF5
      traits:
      - Fast binary format
      - Large datasets
      fit_for:
      - High-volume adjustment data
      - Minute bars
      not_fit_for:
      - Small datasets
      - Human readability needs
    - name: SQLite
      traits:
      - ACID compliant
      - SQL queries
      fit_for:
      - Complex adjustment queries
      - Relational integrity
      not_fit_for:
      - Large datasets
      - Speed-critical paths
    - name: CSV
      traits:
      - Human readable
      - Universal format
      fit_for:
      - Small datasets
      - Quick prototyping
      not_fit_for:
      - Large datasets
      - Production pipelines
    default: HDF5
  design_decisions:
  - 'Custom exchange calendars inherit from XNYSExchangeCalendar (evidence: 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/extension.py:18(AlgoSeekCalendar))
    — Reuse NYSE calendar logic while overriding only open/close times; avoids reimplementing holiday
    rules'
  - 'Generator functions for lazy data loading (evidence: 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/algoseek_1min_trades.py:36(data_generator))
    — Memory-efficient; loads per-symbol data on-demand rather than each symbols into memory'
  - 'Preprocessing separate from bundle registration (evidence: 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/algoseek_preprocessing.py:95(get_ohlcv_by_ticker))
    — Heavy preprocessing (SQLite joins, HDF5 writes) done once; bundle only handles final ingest'
  - '1600 minutes/day hardcoded for Algoseek (960 regular + extended hours) (evidence: 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/extension.py:55(minutes_per_day))
    — Zipline requires fixed minutes_per_day; extended hours require matching calendar definition'
  acceptance_hints:
  - Zipline bundle ingest function accepts correct 9-parameter signature
  - Equities database writes successfully with each required metadata columns
  - Calendar minutes_per_day matches extended hours definition (1600 for Algoseek)
  - 'Data pipeline dependencies respected: preprocessing must run before bundle ingest'
- id: feature_engineering
  name: Feature Engineering
  order: 3
  responsibility: Compute alpha factors and technical indicators from price/volume data. Raw OHLCV data
    must be transformed into predictive signals; TA-Lib provides battle-tested implementations that avoid
    implementing complex indicator math.
  interface:
    inputs:
    - OHLCV price DataFrame with MultiIndex (ticker, date)
    outputs:
    - Feature DataFrame with technical indicators (RSI, MACD, ATR, Stochastic, Bollinger Bands, etc.)
  required_methods:
  - name: DataSource.load_data
    description: Loads market data from Zipline bundle and prepares for feature computation
    evidence: 22_deep_reinforcement_learning/trading_env.py:43(Class)
  - name: preprocess_data
    description: Computes returns, RSI, MACD, ATR, Stochastic using TA-Lib and normalizes features with
      sklearn.scale
    evidence: 22_deep_reinforcement_learning/trading_env.py:84(function)
  - name: get_ohlcv_by_ticker
    description: Extracts OHLCV data for specific ticker from preprocessed HDF5 data
    evidence: 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/algoseek_preprocessing.py:95(function)
  key_behaviors:
  - behavior: TA-Lib for technical indicators
    description: Industry-standard TA-Lib used for RSI, MACD, ATR, Stochastic calculations; avoids complex
      indicator math
    evidence: 22_deep_reinforcement_learning/trading_env.py:92(talib.STOCHRSI)
  - behavior: Returns excluded from normalization
    description: Returns column preserved in original scale while each other features normalized with
      sklearn.scale
    evidence: 22_deep_reinforcement_learning/trading_env.py:110(self.data['returns']=r)
  - behavior: Inf/NaN handling via dropna after replace
    description: TA-Lib returns inf for some calculations (division by zero); dropna removes invalid rows
      after replace
    evidence: 22_deep_reinforcement_learning/trading_env.py:100(dropna)
  - behavior: MultiIndex maintained with (ticker, date) levels
    description: Every financial DataFrames use entity_id+timestamp MultiIndex for consistent label-based
      slicing
    evidence: 08_ml4t_workflow/00_data/data_prep.py:33(predictions.index.names=['ticker','date'])
  replaceable_points:
  - name: Feature set
    description: Technical indicators computed from OHLCV data
    options:
    - name: RSI/MACD/ATR/Stochastic
      traits:
      - Momentum oscillators
      - Volatility measures
      - Industry standard
      fit_for:
      - General-purpose alpha factors
      - Most asset classes
      not_fit_for:
      - Mean-reversion strategies
      - Regime detection
    - name: Bollinger Bands
      traits:
      - Volatility bands
      - Mean-reversion focus
      fit_for:
      - Range-bound strategies
      - Volatility breakout detection
      not_fit_for:
      - Trending markets
      - Low-volatility assets
    - name: Custom indicators
      traits:
      - User-defined
      - Domain-specific
      fit_for:
      - Proprietary alpha research
      - Novel market patterns
      not_fit_for:
      - Standard factor investing
      - Regulatory requirements
    default: RSI/MACD/ATR/Stochastic
  - name: Normalization
    description: Feature scaling method for ML model inputs
    options:
    - name: sklearn.scale (Z-score)
      traits:
      - Zero mean, unit variance
      - Outlier sensitive
      fit_for:
      - Neural networks
      - Linear models
      not_fit_for:
      - Robustness requirements
      - Non-normal distributions
    - name: MinMaxScaler
      traits:
      - '[0,1] range'
      - Preserves distribution shape
      fit_for:
      - Neural networks with sigmoid
      - Visualization
      not_fit_for:
      - Outliers
      - Algorithms sensitive to scale
    - name: RobustScaler
      traits:
      - Median/IQR based
      - Outlier resistant
      fit_for:
      - Data with outliers
      - Robust ML pipelines
      not_fit_for:
      - Pure performance focus
      - Interpretability needs
    default: sklearn.scale
  design_decisions:
  - 'TA-Lib for technical indicators (evidence: 22_deep_reinforcement_learning/trading_env.py:92(talib.STOCHRSI))
    — TA-Lib is industry-standard; avoids implementing complex indicator math (RSI/Stochastic calculations)'
  - 'sklearn.scale for feature normalization (evidence: 22_deep_reinforcement_learning/trading_env.py:106(scale))
    — Neural nets/RF need standardized inputs; scale preserves relative relationships while centering'
  - 'Returns excluded from normalization (evidence: 22_deep_reinforcement_learning/trading_env.py:110(self.data[''returns'']=r))
    — Returns are already in comparable scale; normalizing would lose information about magnitude'
  - 'Inf/NaN handling via dropna after replace (evidence: 22_deep_reinforcement_learning/trading_env.py:100(dropna))
    — TA-Lib returns inf for some calculations (division by zero); must clean before training'
  acceptance_hints:
  - Feature DataFrame maintains (ticker, date) MultiIndex structure
  - Every features normalized except returns column
  - No inf or NaN values in output features DataFrame
  - TA-Lib C library installed and importable
- id: prediction_modeling
  name: Prediction Modeling
  order: 4
  responsibility: Train ML models (linear regression, decision trees, random forests) to predict returns
    from alpha factors. Quant trading requires systematic edge; ML provides scalable pattern recognition
    across many securities and time periods.
  interface:
    inputs:
    - Feature matrix X (technical indicators, fundamental ratios)
    - Target y (future returns)
    outputs:
    - Trained model
    - Out-of-sample predictions
    - Cross-validation folds with performance metrics
  required_methods:
  - name: MultipleTimeSeriesCV.split
    description: Purged time-series cross-validation preventing information leakage across folds; training
      indices chronologically AFTER test indices
    evidence: utils.py:18(Class)
  - name: get_backtest_data
    description: Combines Quandl prices with ML predictions for backtesting; selects best alpha via Spearman
      correlation
    evidence: 08_ml4t_workflow/00_data/data_prep.py:18(function)
  - name: spearmanr
    description: Computes Spearman rank correlation for alpha selection; invariant to outliers and monotonic
      transforms
    evidence: 08_ml4t_workflow/00_data/data_prep.py:31(function)
  key_behaviors:
  - behavior: TimeSeriesCV over random K-fold for financial data
    description: Random splits leak future information into training; time-series CV respects temporal
      ordering
    evidence: utils.py:37(split)
  - behavior: Purged walking forward split (126 train / 21 test)
    description: 126 trading days = 6 months training; 21 = 1 month testing; purge gap prevents outcome
      contamination
    evidence: utils.py:23(__init__)
  - behavior: Lookahead gap for preventing data leakage
    description: lookahead parameter creates intentional gap between train end and test start
    evidence: utils.py:44(MultipleTimeSeriesCV.split)
  - behavior: Alpha selection via Spearman correlation
    description: Best model selected by highest Spearman, not MSE/RMSE; rank correlation invariant to
      outliers
    evidence: 08_ml4t_workflow/00_data/data_prep.py:31(spearmanr)
  replaceable_points:
  - name: Model type
    description: Prediction algorithm for forecasting returns
    options:
    - name: Linear regression
      traits:
      - Interpretable
      - Fast training
      - Linear relationships
      fit_for:
      - Baseline models
      - Feature importance analysis
      not_fit_for:
      - Non-linear patterns
      - High-dimensional data
    - name: Lasso/Ridge
      traits:
      - Regularization
      - Feature selection (Lasso)
      fit_for:
      - High-dimensional features
      - Overfitting prevention
      not_fit_for:
      - Correlated features
      - Interpretability (Ridge)
    - name: Decision Tree
      traits:
      - Non-linear
      - Interpretable
      - No scaling needed
      fit_for:
      - Feature interactions
      - Rule extraction
      not_fit_for:
      - Overfitting
      - Smooth decision boundaries
    - name: Random Forest
      traits:
      - Ensemble
      - Robust to overfitting
      - Parallel training
      fit_for:
      - General-purpose ML
      - Feature importance
      not_fit_for:
      - Real-time inference
      - Very large datasets
    - name: GBM
      traits:
      - Boosted ensemble
      - High accuracy
      - Sequential
      fit_for:
      - Kaggle competitions
      - Production models
      not_fit_for:
      - Interpretability
      - Small datasets
    default: Linear regression
  - name: CV strategy
    description: Cross-validation scheme for time-series data
    options:
    - name: MultipleTimeSeriesCV
      traits:
      - Purged
      - Walk-forward
      - Customizable gaps
      fit_for:
      - Financial data
      - Strategy evaluation
      not_fit_for:
      - IID data
      - Quick prototyping
    - name: sklearn.TimeSeriesSplit
      traits:
      - Built-in
      - Simple
      fit_for:
      - Quick experiments
      - Standard time-series
      not_fit_for:
      - Purged gaps
      - Complex validation needs
    - name: PurgedKFold
      traits:
      - Purged
      - Random splits within time constraints
      fit_for:
      - Large datasets
      - Balanced validation
      not_fit_for:
      - Small datasets
      - Pure walk-forward
    default: MultipleTimeSeriesCV
  - name: Alpha selection
    description: Method for selecting best regularization hyperparameter
    options:
    - name: Spearman correlation
      traits:
      - Rank-based
      - Outlier-invariant
      - Non-linear friendly
      fit_for:
      - Signal quality assessment
      - Robust selection
      not_fit_for:
      - When magnitude matters
      - Sharpness optimization
    - name: IC (Information Coefficient)
      traits:
      - Quant-focused
      - Correlation-based
      fit_for:
      - Factor investing
      - Portfolio construction
      not_fit_for:
      - General ML
      - Rank-based problems
    - name: Sharpe ratio
      traits:
      - Risk-adjusted
      - Business-relevant
      fit_for:
      - Strategy selection
      - Final model choice
      not_fit_for:
      - Feature selection
      - Early-stage prototyping
    default: Spearman correlation
  design_decisions:
  - 'TimeSeriesCV over random K-fold for financial data (evidence: utils.py:37(split)) — Random splits
    leak future information into training; time-series CV respects temporal ordering'
  - 'Purged walking forward split (126 train / 21 test) (evidence: utils.py:23(__init__)) — 126 trading
    days = 6 months; 21 = 1 month; purge gap prevents outcome contamination'
  - 'Alpha selection via Spearman correlation (evidence: 08_ml4t_workflow/00_data/data_prep.py:31(spearmanr))
    — Rank correlation invariant to outliers and monotonic transforms; better than Pearson for non-linear
    relationships'
  acceptance_hints:
  - Training indices chronologically AFTER test indices (reverse of typical ML)
  - Shuffle default is False to maintain temporal validity
  - Best alpha selected by Spearman correlation, not MSE/RMSE
  - Purged gaps prevent overlapping outcomes between train and test
- id: backtesting
  name: Backtesting
  order: 5
  responsibility: Simulate trading strategy on historical data to evaluate performance. Realistic friction
    modeling (costs, slippage) is essential before live deployment; multiple frameworks provide different
    fidelity tradeoffs.
  interface:
    inputs:
    - Price data (OHLCV)
    - Predicted signals from ML models
    - Strategy parameters (position sizing, rebalancing rules)
    outputs:
    - Equity curve
    - Performance metrics (Sharpe, max drawdown, win rate)
    - Trade-level returns log
  required_methods:
  - name: TradingSimulator.take_step
    description: Executes agent actions, computes rewards with trading costs, tracks NAVs and positions
    evidence: 22_deep_reinforcement_learning/trading_env.py:128(Class)
  - name: get_backtest_data
    description: Combines Quandl prices with ML predictions for vectorized backtesting
    evidence: 08_ml4t_workflow/00_data/data_prep.py:18(function)
  - name: TradingEnvironment.step
    description: Advances environment by one timestep, returns observation, reward, done flag
    evidence: 22_deep_reinforcement_learning/trading_env.py:205(Class)
  key_behaviors:
  - behavior: Position modeled as -1 (short), 0 (neutral), 1 (long)
    description: 3-discrete action space matches gym.Env convention; maps action {0,1,2} to position via
      action-1
    evidence: 22_deep_reinforcement_learning/trading_env.py:170(end_position=action-1)
  - behavior: Trading cost proportional to trade size (bps)
    description: Bps-based costs scale with trade value; realistic modeling of commissions/market impact
    evidence: 22_deep_reinforcement_learning/trading_env.py:176(trade_costs=abs(n_trades))
  - behavior: Time cost incurred when not trading
    description: Opportunity cost of capital; discourages holding idle positions indefinitely
    evidence: 22_deep_reinforcement_learning/trading_env.py:177(time_cost)
  - behavior: Delayed reward calculation
    description: Previous position earns returns on current market move, not current position; reward
      = position * market_return - costs
    evidence: 22_deep_reinforcement_learning/trading_env.py:179(take_step)
  - behavior: Cost timing with one-step delay
    description: Trading costs applied one step LATER than the trade via costs[max(0, step-1)]
    evidence: 22_deep_reinforcement_learning/trading_env.py:179(take_step)
  replaceable_points:
  - name: Backtesting framework
    description: Simulation engine with different fidelity and flexibility tradeoffs
    options:
    - name: Zipline
      traits:
      - Production-grade
      - Event-driven
      - Custom bundles
