replaceable_slots:
- id: slot-001
  name: backtesting_engine
  description: Use Zipline for production-quality backtesting with proper risk controls. Use Backtrader
    for flexibility and live trading. Use vectorized for quick prototyping.
  used_in_stages: []
  options:
  - name: Zipline-Reloaded
    traits:
    - event-driven
    - pipeline-api
    - point-in-time-data
    - bundles
    fit_for:
    - Production-quality backtesting with proper look-ahead bias prevention, portfolio optimization
    not_fit_for:
    - Simple quick prototypes, live trading, ultra-low-latency needs
  - name: Backtrader
    traits:
    - event-driven
    - flexible
    - cerebro-architecture
    - live-trading-ready
    fit_for:
    - Flexible local backtesting, prototyping, live trading with select brokers
    not_fit_for:
    - Complex portfolio optimization, multi-asset with cross-sectional data
  - name: Backtrader (custom vectorized)
    traits:
    - vectorized
    - simple
    - pandas-based
    fit_for:
    - Quick signal-return strategy testing, educational purposes
    not_fit_for:
    - Realistic execution simulation, transaction costs modeling
  default: Zipline-Reloaded
  _source: worker_resource
- id: slot-002
  name: market_data_provider
  description: Use Quandl for quality-adjusted US equity history. Use yfinance for quick access. Use AlgoSeek
    for intraday. Use IEX Cloud for balanced needs.
  used_in_stages: []
  options:
  - name: Quandl Wiki
    traits:
    - daily-ohlcv
    - 3000-us-stocks
    - adjustments
    - free-tier
    fit_for:
    - Long-term backtesting with dividends/splits adjustments
    not_fit_for:
    - Real-time data, intraday, international stocks
  - name: Yahoo Finance (yfinance)
    traits:
    - daily
    - free
    - no-auth
    - international
    fit_for:
    - Quick data access, international stocks, no API key needed
    not_fit_for:
    - High-frequency, professional-grade data quality
  - name: AlgoSeek
    traits:
    - minute-bars
    - nasdaq-100
    - quote-data
    - institutional-quality
    fit_for:
    - Intraday strategy research, ML-based intraday trading
    not_fit_for:
    - Daily strategies, broad universe coverage
  - name: STOOQ
    traits:
    - daily
    - international
    - japan
    - etfs
    fit_for:
    - Japanese stocks, international ETFs
    not_fit_for:
    - US stocks (now CAPTCHA), real-time
  - name: IEX Cloud
    traits:
    - real-time
    - historical
    - fundamentals
    - free-tier
    fit_for:
    - Balanced data needs with some real-time capability
    not_fit_for:
    - High-frequency data
  - name: Alpha Vantage
    traits:
    - daily
    - intraday
    - forex
    - crypto
    fit_for:
    - Free intraday data, forex, crypto
    not_fit_for:
    - High-volume historical backtesting
  default: Yahoo Finance (yfinance)
  _source: worker_resource
- id: slot-003
  name: nlp_framework
  description: Use spaCy for production NLP pipelines. Use Hugging Face for state-of-the-art transformer
    models. Use Flair for contextual embeddings.
  used_in_stages: []
  options:
  - name: spaCy
    traits:
    - rule-based
    - ner
    - parsing
    - word-vectors
    - production-ready
    fit_for:
    - NLP pipeline, NER, POS tagging, production systems
    not_fit_for:
    - Rapid prototyping, transformer models
  - name: NLTK
    traits:
    - corpora
    - educational
    - classic-nlp
    fit_for:
    - Educational purposes, text classification, corpus access
    not_fit_for:
    - Production NLP pipelines
  - name: Hugging Face Transformers
    traits:
    - transformers
    - bert
    - finetuning
    - state-of-the-art
    fit_for:
    - Advanced NLP with pre-trained language models
    not_fit_for:
    - Simple tasks, limited compute
