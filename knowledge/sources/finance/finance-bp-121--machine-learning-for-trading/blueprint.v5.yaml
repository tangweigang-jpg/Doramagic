  type: BA
  content: 'Data Source Random Offset Contract: `reset()` randomly picks starting index, but `take_step()`
    uses fixed step increment'
  rationale: 'Episode initialization introduces randomness via starting position selection, but step progression
    is deterministic with fixed increment. This creates exploration through episode variety while maintaining
    reproducible trajectories within an episode. Boundary: Random seed in reset() affects initial_idx
    selection only, not step size.'
  evidence: 22_deep_reinforcement_learning/trading_env.py:258(reset)
  stage: ordering_contract
  alternative_considered: Random step increments would make trajectory analysis impossible for reproducibility
- id: BD-097
  type: BA
  content: 'Episode End Conditions: NAV=0 (loss) or NAV=2.0 (win) trigger episode termination'
  rationale: 'Symmetric termination thresholds at 0% and 100% return define episode boundaries. Initial
    NAV of 1.0 drops below 0 or doubles above 2.0 to end episode. Boundaries: termination occurs when
    nav <= 0.0 OR nav >= 2.0, creating symmetric 100% loss/100% gain thresholds.'
  evidence: 22_deep_reinforcement_learning/trading_env.py:227(__init__)
  stage: ordering_contract
  alternative_considered: Fixed episode length would allow unlimited drawdown; percentage-based termination
    ensures bounded risk
- id: BD-098
  type: BA/M
  content: 'Best Alpha Selection via Spearman Correlation: Best model selected by highest Spearman, not
    MSE/RMSE'
  rationale: 'Rank correlation (Spearman) measures prediction quality because it captures monotonic relationship
    regardless of linear scaling. MSE/RMSE penalizes scale errors; Spearman only cares about ordering.
    Boundary: Selection uses rho from scipy.stats.spearmanr, maximizes correlation coefficient.'
  evidence: 08_ml4t_workflow/00_data/data_prep.py:18(get_backtest_data)
  stage: default_value
  alternative_considered: MSE would require perfectly calibrated probability outputs; rank correlation
    is robust to monotonic transforms
