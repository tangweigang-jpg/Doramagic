- id: BD-107
  type: BA/M
  content: 'INTERACTION: [BD-017] Trading costs in bps × [BD-055] Reward = position * return - costs →
    Cost parameter sensitivity amplification'
  rationale: 'Trading costs are modeled as basis points (BD-017) and directly subtracted from position-return
    products in the reward function (BD-055). This amplifies the impact of small cost changes because
    costs compound with every trade. If the bps value is calibrated incorrectly, strategies that appear
    profitable at 10bps may be unprofitable at 15bps, creating fragility in strategy evaluation. The multiplicative
    interaction between position size and cost rate means strategies optimizing for high turnover '
  evidence: BD-017 (trading_env.py:176), BD-055 (trading_env.py:179)
  stage: global
  alternative_considered: Separate cost sensitivity analysis across multiple bps scenarios
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-108
  type: BA
  content: 'INTERACTION: [BD-008] 1600 minutes/day hardcoded × [BD-047] Extended hours 4:01-7:59 PM →
    Silent data truncation on calendar mismatch'
  rationale: 'BD-008 hardcodes 1600 minutes/day for Zipline compatibility while BD-047 defines AlgoSeek
    calendar hours from 4:01 AM to 7:59 PM. If the calendar''s open/close times are ever modified without
    updating the minutes_per_day constant, Zipline will silently truncate or pad data arrays, corrupting
    backtest results without raising errors. This hidden dependency creates a silent data integrity failure
    mode where strategies appear to work but execute on incorrect data. The hardcoded nature of both values '
  evidence: BD-008 (extension.py:55), BD-047 (extension.py:38-44)
  stage: global
  alternative_considered: Dynamic calculation of minutes_per_day from calendar open/close times
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-109
  type: BA
  content: 'INTERACTION: [BD-090] Action offset contract (action-1) × [BD-069] Position mapping duplicate
    → Maintenance risk on boundary contract'
  rationale: The action-to-position mapping (action-1) appears in both BD-090 and BD-069 as separate business
    decisions. If a developer modifies one but not the other, positions will be inverted, causing strategies
    to take opposite positions than intended. This duplication creates a maintenance hazard where the
    same invariant appears twice in the BD list. Any future refactoring must update both entries or the
    system will have inconsistent position mapping between policy output and execution.
  evidence: BD-090 (trading_env.py:170), BD-069 (trading_env.py:170)
  stage: global
  alternative_considered: Single source of truth for action-position mapping with no duplication
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-110
  type: BA/DK
  content: 'INTERACTION: [BD-091] Delayed reward × [BD-092] Delayed costs → Temporal credit assignment
    dependency creates policy gradient bias'
  rationale: 'Both reward and cost timing use one-step delay conventions (BD-091: reward[t] = position[t-1]
    * returns[t], BD-092: costs[max(0, step-1)]). The agent receives credit/blame for actions taken in
    the previous step. If either timing contract is violated while the other is maintained, reward attribution
    becomes incorrect—costs and rewards would be computed from different time steps, creating systematic
    policy gradient bias. The agent would learn suboptimal policies that either over- or under-estimate'
  evidence: BD-091 (trading_env.py:179), BD-092 (trading_env.py:179)
  stage: global
  alternative_considered: Unified temporal contract with explicit timestamp tracking for each components
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
