business_decisions:
- id: BD-001
  type: B
  content: Scrapy framework chosen over raw requests for extensibility
  rationale: Scrapy provides middleware pipeline, auto-throttle, and extension points - avoids reinventing
    crawl scheduling. This framework choice enables maintainable, scalable data collection across multiple
    alternative data sources with built-in best practices for web scraping.
  evidence: 03_alternative_data/01_opentable/opentable/spiders/table_spider.py:14(start_requests)
  stage: alternative_data_collection
  alternative_considered: Raw requests/urllib would require manual implementation of retry logic, rate
    limiting, and concurrent request handling
- id: BD-002
  type: B
  content: SplashRequest for JavaScript-rendered pages
  rationale: OpenTable uses client-side rendering; Splash enables headless browser without separate process.
    This avoids the operational complexity of running a full Selenium/WebDriver stack while still capturing
    dynamically loaded content essential for restaurant availability data.
  evidence: 03_alternative_data/01_opentable/opentable/spiders/table_spider.py:16(SplashRequest)
  stage: alternative_data_collection
  alternative_considered: Selenium/ChromeDriver would provide equivalent functionality but requires separate
    browser process management
  _evidence_issues:
  - 'FN_NOT_FOUND: SplashRequest in 03_alternative_data/01_opentable/opentable/spiders/table_spider.py'
- id: BD-003
  type: BA
  content: Selenium for SeekingAlpha login-based access
  rationale: Transcripts require authentication; Selenium handles cookies/sessions where Scrapy is insufficient.
    This decision addresses the business requirement to access paywalled earnings call transcripts that
    cannot be scraped via stateless HTTP requests.
  evidence: 03_alternative_data/02_earnings_calls/scrape_test.py:20(webdriver.Chrome)
  stage: alternative_data_collection
  alternative_considered: Scrapy with FormRequest could handle basic auth but lacks JavaScript execution
    and cookie persistence for complex session management
  _evidence_issues:
  - 'FN_NOT_FOUND: webdriver.Chrome in 03_alternative_data/02_earnings_calls/scrape_test.py'
- id: BD-004
  type: BA
  content: Periodic stats/monitoring via LoopingCall extensions
  rationale: Twisted task scheduling integrates cleanly with Scrapy event loop for periodic logging. This
    design choice ensures monitoring tasks execute within the same async context as crawling, avoiding
    thread/process coordination overhead.
  evidence: 03_alternative_data/01_opentable/opentable/extensions.py:13(setup_looping_task)
  stage: alternative_data_collection
  alternative_considered: External cron jobs or threading would add complexity and potential race conditions
    with Scrapy's event loop
- id: BD-005
  type: B/BA
  content: Custom exchange calendars inherit from XNYSExchangeCalendar
  rationale: Reuse NYSE calendar logic while overriding only open/close times; avoids reimplementing holiday
    rules. This inheritance pattern reduces maintenance burden while ensuring regulatory holiday handling
    is consistent with established market conventions.
  evidence: 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/extension.py:18(AlgoSeekCalendar)
  stage: market_data_ingestion
  alternative_considered: Building calendar from scratch would require implementing complex holiday rule
    logic for each exchange
- id: BD-006
  type: BA
  content: Generator functions for lazy data loading
  rationale: Memory-efficient; loads per-symbol data on-demand rather than each symbols into memory. This
    lazy evaluation pattern is critical for handling large universes (thousands of tickers) that would
    exceed memory if loaded eagerly.
  evidence: 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/algoseek_1min_trades.py:36(data_generator)
  stage: market_data_ingestion
  alternative_considered: Eager loading each symbols into memory would fail for large datasets and extend
    load time unnecessarily
- id: BD-007
  type: BA
  content: Preprocessing separate from bundle registration
  rationale: Heavy preprocessing (SQLite joins, HDF5 writes) done once; bundle only handles final ingest.
    This separation of concerns allows preprocessing artifacts to be cached and reused across multiple
    zipline bundle registrations.
  evidence: 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/algoseek_preprocessing.py:95(get_ohlcv_by_ticker)
  stage: market_data_ingestion
  alternative_considered: Combining preprocessing with bundle registration would require full reprocessing
    on each zipline upgrade or data refresh
- id: BD-008
  type: BA/DK
  content: 1600 minutes/day hardcoded for Algoseek (960 regular + extended hours)
  rationale: Zipline requires fixed minutes_per_day; extended hours require matching calendar definition.
    This constant ensures the ingest pipeline aligns with the Algoseek data schema that includes pre-market
    and after-hours trading minutes.
  evidence: 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/extension.py:55(minutes_per_day)
  stage: market_data_ingestion
  alternative_considered: Dynamic minute calculation would be more flexible but Zipline's architecture
    requires fixed-length daily arrays
  _evidence_issues:
  - 'FN_NOT_FOUND: minutes_per_day in 08_ml4t_workflow/04_ml4t_workflow_with_zipline/01_custom_bundles/extension.py'
- id: BD-009
  type: B
  content: TA-Lib for technical indicators
  rationale: TA-Lib is industry-standard; avoids implementing complex indicator math (RSI/Stochastic calculations).
    Using a battle-tested library reduces bugs and ensures calculations match professional trading systems.
  evidence: 22_deep_reinforcement_learning/trading_env.py:92(talib.STOCHRSI)
  stage: feature_engineering
  alternative_considered: Custom implementations would require extensive testing and validation; pandas_ta
    or tulip may offer similar functionality
  _evidence_issues:
  - 'FN_NOT_FOUND: talib.STOCHRSI in 22_deep_reinforcement_learning/trading_env.py'
- id: BD-010
  type: BA/M
  content: sklearn.scale for feature normalization
  rationale: Neural nets/RF need standardized inputs; scale preserves relative relationships while centering.
    This normalization ensures gradient descent convergence and prevents features with larger magnitudes
    from dominating learning.
  evidence: 22_deep_reinforcement_learning/trading_env.py:106(scale)
  stage: feature_engineering
  alternative_considered: MinMax scaling would bound features to [0,1] but is sensitive to outliers;RobustScaler
    handles outliers better
  _evidence_issues:
  - 'FN_NOT_FOUND: scale in 22_deep_reinforcement_learning/trading_env.py'
- id: BD-011
  type: BA/M
  content: Returns excluded from normalization
  rationale: Returns are already in comparable scale; normalizing would lose information about magnitude.
    Percentage returns are naturally normalized by their definition, preserving the actual economic significance
    of gains/losses.
  evidence: 22_deep_reinforcement_learning/trading_env.py:84(preprocess_data)
  stage: feature_engineering
  alternative_considered: Normalizing returns would make 5% and 0.5% indistinguishable after scaling,
    destroying meaningful signal
- id: BD-012
  type: BA
  content: Inf/NaN handling via dropna after replace
  rationale: TA-Lib returns inf for some calculations (division by zero); must clean before training.
    This two-step approach (replace then drop) handles both infinite values and NaN in a single pass while
    preserving row alignment.
  evidence: 22_deep_reinforcement_learning/trading_env.py:100(dropna)
  stage: feature_engineering
  alternative_considered: Forward-fill or interpolation could mask underlying data issues; dropping is
    safer for quality assurance
  _evidence_issues:
  - 'FN_NOT_FOUND: dropna in 22_deep_reinforcement_learning/trading_env.py'
- id: BD-013
  type: B/BA
  content: TimeSeriesCV over random K-fold for financial data
  rationale: Random splits leak future information into training; time-series CV respects temporal ordering.
    This is a fundamental requirement in quantitative finance where data has clear temporal dependencies
    violating i.i.d. assumptions.
  evidence: utils.py:37(split)
  stage: prediction_modeling
  alternative_considered: Standard KFold from sklearn assumes i.i.d. samples and would produce optimistically
    biased CV estimates
- id: BD-014
  type: BA/DK
  content: Purged walking forward split (126 train / 21 test)
  rationale: 126 trading days = 6 months; 21 = 1 month; purge gap prevents outcome contamination. The
    purge buffer ensures no information from test period influences training through overlapping price
    data at boundaries.
  evidence: utils.py:23(__init__)
  stage: prediction_modeling
  alternative_considered: Shorter windows reduce statistical power; longer windows reduce number of test
    samples; fixed gap essential for avoiding leakage
- id: BD-015
  type: BA/M
  content: Alpha selection via Spearman correlation
  rationale: Rank correlation invariant to outliers and monotonic transforms; better than Pearson for
    non-linear relationships. Spearman captures predictive power regardless of the functional form between
    alpha factors and returns.
  evidence: 08_ml4t_workflow/00_data/data_prep.py:31(spearmanr)
  stage: prediction_modeling
  alternative_considered: Pearson correlation assumes linearity and is sensitive to outliers; mutual information
    is computationally expensive
  _evidence_issues:
  - 'FN_NOT_FOUND: spearmanr in 08_ml4t_workflow/00_data/data_prep.py'
- id: BD-016
  type: B/BA
  content: Position modeled as -1 (short), 0 (neutral), 1 (long)
  rationale: 3-discrete action space matches gym.Env convention; maps directly to agent output. This simplification
    reduces action space complexity while capturing the essential directional trading decisions.
  evidence: 22_deep_reinforcement_learning/trading_env.py:205(tradingenvironment)
  stage: backtesting
  alternative_considered: Continuous position sizing [-1,1] would increase action complexity; categorical
    approach provides interpretability
  _evidence_issues:
  - 'FN_NOT_FOUND: tradingenvironment in 22_deep_reinforcement_learning/trading_env.py'
- id: BD-017
