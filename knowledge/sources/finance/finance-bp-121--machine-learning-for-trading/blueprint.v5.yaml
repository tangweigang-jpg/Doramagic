- id: BD-090
  type: BA
  content: 'RL Action-to-Position Mapping Contract: Action 0=-1(SHORT), 1=0(NEUTRAL), 2=1(LONG) via `end_position
    = action - 1`'
  rationale: 'Maps discrete RL actions to continuous position space with offset of 1. The action space
    {0,1,2} directly maps to positions {-1,0,1} via subtraction. This design simplifies policy output
    (3 outputs) while maintaining symmetric long/short capability. Boundary: Agent learns to output index
    0-2, which directly becomes position delta after offset subtraction.'
  evidence: 22_deep_reinforcement_learning/trading_env.py:159(take_step)
  stage: ordering_contract
  alternative_considered: Direct action=position mapping (0=-1, 1=0, 2=1) would require negative indexing;
    current offset approach is more intuitive
- id: BD-091
  type: BA/DK
  content: 'Delayed Reward Contract: Previous position earns returns on current market move, not current
    position'
  rationale: 'Implements one-step delay between position-taking and reward-receiving. Position held during
    step N-1 generates P&L when market moves in step N. This aligns with real-world execution lag where
    orders fill after decision. Boundary: At step t, reward = returns[t] * position[t-1], not position[t].'
  evidence: 22_deep_reinforcement_learning/trading_env.py:159(take_step)
  stage: ordering_contract
  alternative_considered: Immediate reward (position[t] * returns[t]) would require perfect execution
    speed unrealistic in live trading
- id: BD-092
  type: BA
  content: 'Cost Timing Contract: Trading costs are applied one step LATER than the trade (`costs[max(0,
    step-1)]`)'
  rationale: 'Explicit one-step delay in cost recognition maintains consistency with delayed reward contract.
    When agent takes action at step t, cost appears in step t+1 calculation. This prevents double-counting
    in same-step reward/cost pairs. Boundary: Cost array is indexed by previous step, creating effective
    one-step lookahead for cost impact.'
  evidence: 22_deep_reinforcement_learning/trading_env.py:159(take_step)
  stage: ordering_contract
  alternative_considered: Same-step cost application would create immediate feedback loop causing overly
    conservative policies
- id: BD-093
  type: BA
  content: 'Time Series CV Train-After-Test Ordering: Training indices are chronologically AFTER test
    indices (reverse of typical ML)'
  rationale: 'Training data temporally follows test data in cross-validation splits. This is intentional
    for backtesting where we train on future data to predict past performance. Boundary: get_train_offset
    returns positive value shifting train window forward from test window.'
  evidence: utils.py:37(split)
  stage: invariant
  alternative_considered: Standard ML ordering (train before test) would cause data leakage in financial
    time series
- id: BD-094
  type: B/DK
  content: 'Lookahead Gap Invariant: `lookahead` parameter creates intentional gap between train end and
    test start to prevent data leakage'
  rationale: 'Creates temporal buffer between training window end and test window start equal to lookahead
    days. Features computed at train end use data through that point; test features start lookahead days
    later. Boundary: gap_size = lookahead, no overlap between train and test date ranges.'
  evidence: utils.py:37(split)
  stage: invariant
  alternative_considered: Zero-gap cross-validation would allow features at train end to incorporate information
    unavailable at that time
- id: BD-095
  type: BA/M
  content: 'Feature Scaling Exception: Returns column is EXCLUDED from sklearn.preprocessing.scale while
    each other features are normalized'
  rationale: 'Returns maintain their original scale (typically -1 to +1 or raw percentage) while each
    predictor features are standardized to zero-mean unit-variance. This preserves the direct economic
    interpretation of returns and avoids scale distortion in reward computation. Boundary: Only features
    in feature_cols list are scaled; returns column is explicitly omitted.'
  evidence: 22_deep_reinforcement_learning/trading_env.py:84(preprocess_data)
  stage: default_value
  alternative_considered: Scaling returns would break reward interpretation requiring separate inverse-transform
    logic
