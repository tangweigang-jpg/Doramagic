- id: reinforcement_learning_trading
  name: Reinforcement Learning Trading
  order: 6
  responsibility: Train RL agents to learn optimal trading policies from market data. Discretionary and
    manual strategies don't scale; RL can learn complex state-dependent policies that adapt to regime
    changes.
  interface:
    inputs:
    - Historical OHLCV data
    - Technical features (returns, RSI, MACD, ATR)
    - Trading cost parameters
    outputs:
    - Trained policy network
    - Episode results (NAV, trades, rewards)
    - State-action value estimates
  required_methods:
  - name: TradingEnvironment.step
    description: Advances environment by one trading day; takes action, computes reward, returns observation
    evidence: 22_deep_reinforcement_learning/trading_env.py:205(Class)
  - name: TradingEnvironment.reset
    description: Resets environment to random starting point within training data; returns initial observation
    evidence: 22_deep_reinforcement_learning/trading_env.py:114(reset)
  - name: TradingEnvironment.render
    description: Stubbed render method following gym.Env metadata convention
    evidence: 22_deep_reinforcement_learning/trading_env.py:225(metadata)
  - name: DataSource.get_observation
    description: Returns normalized observation (features) for current step
    evidence: 22_deep_reinforcement_learning/trading_env.py:43(Class)
  key_behaviors:
  - behavior: gym.Env interface for RL environment
    description: TradingEnvironment inherits from gym.Env implementing OpenAI RL interface; enables use
      with stable-baselines, RLlib
    evidence: 22_deep_reinforcement_learning/trading_env.py:205(TradingEnvironment(gym.Env))
  - behavior: 252 trading days per episode
    description: One trading year = 252 days; episodes align with typical holding period and performance
      evaluation
    evidence: 22_deep_reinforcement_learning/trading_env.py:229(trading_days=252)
  - behavior: Random episode start offset
    description: reset() randomly picks starting index to prevent overfitting to specific date ranges
    evidence: 22_deep_reinforcement_learning/trading_env.py:117(np.random.randint)
  - behavior: NAV termination triggers (0=loss, 2=win)
    description: Fixed targets provide clear success criteria; episode ends early if NAV hits thresholds
    evidence: 22_deep_reinforcement_learning/trading_env.py:219(NAV hits 2.0)
  - behavior: Multi-factor observation space
    description: Observation includes returns, RSI, MACD, ATR, Stochastic; rich state enables learning
      complex policies
    evidence: 22_deep_reinforcement_learning/trading_env.py:109(features)
  replaceable_points:
  - name: RL algorithm
    description: Policy optimization method for training the trading agent
    options:
    - name: DQN
      traits:
      - Value-based
      - Off-policy
      - Experience replay
      fit_for:
