  type: BA
  content: 'INTERACTION: [BD-063] adj_close for Quandl × [BD-037] adj_close for Algoseek × [BD-056] Dividend
    adjustments skipped → Incomplete return capture for dividend stocks'
  rationale: 'Both Quandl and Algoseek use adjusted close prices (BD-063, BD-037) assuming splits and
