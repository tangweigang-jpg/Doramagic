id: finance-bp-071
name: OpenSanctions
sop_version: '3.6'
source:
  projects:
  - opensanctions
  commit_hash: e058206518b6617b0c42a4ad6edfeedc413468be
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: sanctions and PEP data aggregation, deduplication, and multi-format export
  description: OpenSanctions aggregates sanctions lists, politically exposed persons
    databases, and related entity data from multiple external sources, transforms
    them into the FollowTheMoney schema, performs cross-dataset entity deduplication,
    and exports to multiple formats including FtM JSON, CSV, Senzing, and delta feeds.
  prerequisites: Python development experience, basic understanding of FollowTheMoney
    schema model, familiarity with sanctions/AML domain concepts helpful but not required
  not_suitable_for: Real-time sanctions screening or transaction monitoring (use yente
    API instead), single-entity lookup queries (use OpenSanctions API), processing
    unstructured or non-standard data sources without custom crawlers
  activation:
    triggers:
    - Creating a new dataset crawler in datasets/<country_code>/<dataset_name>/
    - Updating an existing crawler when source data format or URL changes
    - Adding new entity types or properties to an existing crawler
    emphasis:
    - Use ESPECIALLY when the source data is semi-structured government data with
      inconsistencies and manual data entry errors
    - Use ESPECIALLY when data cleaning decisions need to be documented and auditable
      (use lookups in YAML)
    - Use ESPECIALLY for sanctions lists where data quality has serious downstream
      consequences
    anti_skip:
    - Don't skip validation (zavod validate) because assertions catch silent regressions
      in entity counts
    - Don't skip type annotations because zavod code needs to be fully typed, unit
      tested, and thoroughly documented
    - Don't skip context.audit_data() because it surfaces new fields when the source
      changes, preventing silent data loss
stages:
- id: data_collection
  name: Data Collection
  order: 1
  responsibility: 'Fetch raw data from external sources (HTTP, files, APIs) and store
    it locally for processing. WHY: Decouples network I/O from entity extraction and
    provides reproducibility via caching.'
  interface:
    inputs: Dataset metadata (URLs, auth config, HTTP settings), External data sources
    outputs: Cached raw files in dataset_data_path, HTTP responses with caching fingerprints
  required_methods:
  - name: Context.fetch_text
    description: Fetches HTTP text resources with caching fingerprinting to avoid
      redundant downloads across runs
    evidence: zavod/zavod/context.py:244(fetch_text)
  - name: Context.fetch_json
    description: Fetches JSON HTTP resources with automatic decoding and caching
    evidence: zavod/zavod/context.py:280(fetch_json)
  - name: Context.get_resource_path
    description: Returns local filesystem path for dataset resource files, creating
      directories as needed
    evidence: zavod/zavod/context.py:310(get_resource_path)
  key_behaviors:
  - behavior: Entity-level isolation
    description: Context is dataset-scoped with single object lifecycle matching dataset
      run; prevents cross-contamination between datasets
    evidence: zavod/zavod/context.py:56(Context.__init__)
  - behavior: HTTP caching via request_hash fingerprinting
    description: URLs are cached using request_hash; same URL returns cached response
      on re-run within cache_days TTL
    evidence: zavod/zavod/runtime/http_.py:54(request_hash)
  - behavior: Backend abstraction for HTTP
    description: fetch_* methods return decoded content vs raw response; allows switching
      between requests.Session and ZyteAPI backends without changing crawler code
    evidence: zavod/zavod/context.py:244(fetch_text)
  replaceable_points:
  - name: HTTP session backend
    description: The make_session factory creates requests.Session with configured
      adapters for HTTP communication
    options:
    - name: requests.Session
      traits:
      - Standard Python HTTP client
      - Synchronous
      - Local SSL verification control
      fit_for:
      - Development
      - Most public data sources
      - Custom SSL requirements
      not_fit_for:
      - JavaScript-heavy sites
      - Complex bot detection
      - High-volume cloud scraping
    - name: ZyteAPI
      traits:
      - Cloud-based scraping service
      - Automatic JavaScript rendering
      - Bot mitigation
      fit_for:
      - Difficult-to-scrape sites
      - High-volume production crawling
      - Sites requiring browser automation
      not_fit_for:
      - Local development without API keys
      - Budget-constrained projects
      - Simple static sources
    default: requests.Session
  design_decisions:
  - 'HTTP caching via request_hash fingerprinting: zavod/zavod/runtime/http_.py:54(request_hash)
    - Avoid re-fetching same URLs across runs; cache_days param allows TTL control'
  - 'Context holds dataset-scoped resources (stats, issues, resources): zavod/zavod/context.py:56(Context.__init__)
    - Single object lifecycle matches dataset run; prevents cross-contamination between
    datasets'
  - 'Context.fetch_* methods return decoded content vs raw response: zavod/zavod/context.py:244(fetch_text)
    - Abstraction allows switching HTTP backends (requests, Zyte) without changing
    crawlers'
  acceptance_hints:
  - Raw files appear in dataset_data_path after successful crawl
  - Same URL returns cached response on re-run without network request
  - HTTP errors (404, 500, timeout) are logged to issues and don't crash the crawl
  - HTTP.verify=False applied for government data sources
- id: entity_extraction
  name: Entity Extraction
  order: 2
  responsibility: 'Parse raw source data and emit typed Entity objects with schema
    validation. WHY: Transforms unstructured/structured data into FollowTheMoney model
    with audit trail.'
  interface:
    inputs: Cached raw files, Dataset metadata, Lookup tables
    outputs: Entity objects with statements, Issues log entries, Resource metadata
  required_methods:
  - name: Context.make
    description: Factory method for creating new Entity objects with dataset prefix
      and validation
    evidence: zavod/zavod/context.py:418(make)
  - name: Context.emit
    description: Sends entity to store with external flag and origin tracking for
      statement persistence
    evidence: zavod/zavod/context.py:547(emit)
  - name: Entity.add_schema
    description: Progressive schema typing that tries to make entity more specific
      (e.g., Person can become Politician)
    evidence: zavod/zavod/entity.py:155(add_schema)
  key_behaviors:
  - behavior: Entity.make_id raises NotImplementedError
    description: Forces crawler implementations to define custom ID generation; prevents
      accidental use of FtM's generic make_id which would create non-dataset-scoped
      IDs
    evidence: zavod/zavod/entity.py:28(make_id)
  - behavior: Statements are primary storage format
    description: Entities are stored as individual property-value statements, not
      as assembled dicts; enables incremental updates, full auditing, and entity reconstruction
      from statements
    evidence: zavod/zavod/entity.py:75(unsafe_add)
  - behavior: Progressive schema typing
    description: Entity schema can be made more specific over time (e.g., UnknownPerson
      -> Person -> Politician -> PEP) allowing for gradual classification improvements
    evidence: zavod/zavod/entity.py:155(add_schema)
  replaceable_points:
  - name: Entity ID generation strategy
    description: Crawler implements make_id() or make_slug() to generate dataset-scoped
      entity identifiers
    options:
    - name: make_id (hash-based)
      traits:
      - Cryptographic hash of entity properties
      - Collision-resistant
      - Dataset-scoped prefix
      fit_for:
      - Most use cases
      - When ID stability across runs is required
      - Multi-dataset environments
      not_fit_for:
      - When human-readable IDs are needed
      - When external ID mapping is required
    - name: make_slug (deterministic)
      traits:
      - Human-readable slug from entity name
      - Predictable
      - URL-safe
      fit_for:
      - Datasets with stable naming conventions
      - When IDs should be interpretable
      not_fit_for:
      - Entities with similar names
      - Names with special characters
      - Large-scale datasets
    default: make_id
  design_decisions:
  - 'Entity.make_id raises NotImplementedError: zavod/zavod/entity.py:28(make_id)
    - Forces crawlers to implement ID generation; prevents accidental use of FtM''s
    generic make_id'
  - 'Statements are primary storage format, not entity dicts: zavod/zavod/entity.py:75(unsafe_add)
    - Enables incremental updates, auditing, and entity reconstruction from statements'
  - 'Entity.add_schema tries to make entity more specific: zavod/zavod/entity.py:155(add_schema)
    - PEP can become Person, then Politician; enables progressive typing'
  acceptance_hints:
  - Every emitted entities have valid dataset-scoped IDs matching pattern {dataset_prefix}:{hash}
  - Every entity properties conform to FollowTheMoney schema definitions
  - Malformed or invalid data results in logged issues without crashing the crawl
  - Person schema names REQUIRE spaces (require_space=True); single-token Person names
    are flagged
- id: statement_storage
  name: Statement Storage
  order: 3
  responsibility: 'Persist statements to LevelDB with entity assembly and resolver
    integration. WHY: Provides fast random-access to entities via statement reconstruction.'
  interface:
    inputs: Entity statements (prop-value pairs), Resolver/Linker for entity matching
    outputs: LevelDB store with assembled entities, Entity views scoped by dataset/external
  required_methods:
  - name: Store.sync
    description: Syncs external/input datasets to LevelDB, indexing each statements
      for cross-dataset lookups
    evidence: zavod/zavod/store.py:59(iter_dataset_statements)
  - name: Store.assemble
    description: Reconstructs entity object from stored statements, handling InvalidData
      exceptions gracefully
    evidence: zavod/zavod/store.py:37(assemble)
  - name: Store.view
    description: Returns scoped entity view filtering by dataset, external status,
      or custom criteria
    evidence: zavod/zavod/store.py:24(class Store)
  key_behaviors:
  - behavior: Store extends LevelDBStore from nomenklatura
    description: Leverages nomenklatura's resolver integration, entity view abstraction,
      and statement storage optimizations for write performance
    evidence: zavod/zavod/store.py:24(class Store)
  - behavior: Entity assembly on-demand from statements
    description: Entities are reconstructed from stored statements when accessed,
      not pre-assembled; enables incremental updates without full entity rebuild
    evidence: zavod/zavod/store.py:37(assemble)
  - behavior: Cross-dataset indexing via Store.sync
    description: Input datasets must be indexed to LevelDB before dependent datasets
      can reference entities; enables fast cross-dataset lookups during entity enrichment
    evidence: zavod/zavod/store.py:59(iter_dataset_statements)
  replaceable_points:
  - name: Linker/resolver backend
    description: Nomenklatura resolver for entity matching and deduplication across
      datasets
    options:
    - name: Resolver (nomenklatura)
      traits:
      - Full fuzzy matching with scoring
      - Cross-dataset entity resolution
      - Statement-level storage
      fit_for:
      - Production multi-dataset environments
      - When entities appear in multiple sources
      - Complex matching scenarios
      not_fit_for:
      - Single isolated datasets
      - Simple exact-match deduplication
      - When resolver overhead is too high
    - name: LocalEnricher
      traits:
      - Blocking-based matching
      - Local dataset enrichment
      - Lower overhead
      fit_for:
      - Enriching with local datasets
      - When full resolver is overkill
      - Testing scenarios
      not_fit_for:
      - Cross-dataset production matching
      - Complex fuzzy matching requirements
    default: Resolver
  design_decisions:
  - 'Store extends LevelDBStore from nomenklatura: zavod/zavod/store.py:24(class Store)
    - Leverages nomenklatura''s resolver integration and entity view abstraction'
  - 'Store.assemble wraps InvalidData exceptions: zavod/zavod/store.py:37(assemble)
    - Prevents single bad entity from crashing the export; logs debug info for forensics'
  - 'Store.sync indexes each external statements for cross-dataset lookups: zavod/zavod/store.py:59(iter_dataset_statements)
    - Inputs datasets must be indexed before derived datasets can reference them'
  acceptance_hints:
  - Entities reconstruct correctly from stored statements with each properties intact
  - Cross-dataset entity references resolve without errors
  - No data loss occurs during sync operation
  - Assemble errors are logged but don't crash the process
- id: validation
  name: Validation
  order: 4
  responsibility: 'Verify entity constraints, schema compliance, and cross-entity
    assertions. WHY: Ensures data quality before export and catches broken transformations
    early.'
  interface:
    inputs: Store view with assembled entities, Dataset assertions config
    outputs: Validation issues, Entity counts by schema
  required_methods:
  - name: Assertion.check
    description: Evaluates declarative constraint (metric + comparison + value) against
      entity statistics
    evidence: zavod/zavod/meta/assertion.py:43(Assertion)
  - name: DatasetIssues.write
    description: Appends issue to append-only JSON lines log without holding memory
    evidence: zavod/zavod/runtime/issues.py:59(write)
  - name: Statistics.count
    description: Counts entities by schema type for assertion validation
    evidence: zavod/zavod/exporters/statistics.py:16(Statistics)
  key_behaviors:
  - behavior: Issues use append-only JSON lines format
    description: Crash-resistant logging that can append during processing without
      holding data in memory; survives process crashes without data loss
    evidence: zavod/zavod/runtime/issues.py:59(write)
  - behavior: Assertions are declarative config, not code
    description: Non-programmers can define data quality constraints in dataset YAML;
      assertions live with dataset metadata rather than in crawler code
    evidence: zavod/zavod/meta/assertion.py:43(Assertion)
  - behavior: No issues backfill for collections
    description: Collections aggregate from source datasets; previous run issues would
      be misleading as they don't reflect collection state
    evidence: zavod/zavod/runtime/issues.py:81(all)
  replaceable_points:
  - name: Assertion types
    description: Metric (count, hasProperty, uniqueValue) compared to expected value
      for data quality checks
    options:
    - name: entityCount
      traits:
      - Counts entities matching criteria
      - Supports schema and property filters
      fit_for:
      - Basic quality checks
      - Entity volume validation
      - Schema distribution verification
      not_fit_for:
      - Property-level validation
      - Complex cross-entity assertions
    - name: hasProperty
      traits:
      - Verifies entity has specific property
      - Property and schema scoped
      fit_for:
      - Required field validation
      - Schema compliance checking
      not_fit_for:
      - Count-based assertions
      - Cross-entity relationships
    - name: uniqueValue
      traits:
      - Verifies property uniqueness across entities
      - Detects duplicate values
      fit_for:
      - ID uniqueness validation
      - External ID deduplication
      not_fit_for:
      - Non-unique properties
      - Complex uniqueness rules
    default: entityCount
  design_decisions:
  - 'Issues use append-only JSON lines format: zavod/zavod/runtime/issues.py:59(write)
    - Crash-resistant logging; can append during processing without holding memory'
  - 'Assertions are declarative config, not code: zavod/zavod/meta/assertion.py:43(Assertion)
    - Non-programmers can define constraints; assertions live in dataset YAML'
  - 'No issues backfill for collections: zavod/zavod/runtime/issues.py:81(all) - Collections
    aggregate from sources; previous run issues would be misleading'
  acceptance_hints:
  - Every configured assertions pass or failures are documented in issues
  - Entity counts match expected ranges defined in assertions
  - Schema violations result in logged issues with entity IDs
  - Issue counts are reasonable relative to entity volume
- id: consolidation
  name: Consolidation
  order: 5
  responsibility: 'Entity deduplication via resolver and edge merging. WHY: Multiple
    sources may describe the same real-world entity; consolidation creates unified
    records.'
  interface:
    inputs: Raw entities, Resolver state with merged IDs
    outputs: Consolidated entities with simplified properties, Edge groups for dedup
  required_methods:
  - name: consolidate_entity
    description: Simplifies entity names and applies resolver merges to create consolidated
      representation
    evidence: zavod/zavod/exporters/consolidate.py:93(consolidate_entity)
  - name: dedupe_edges
    description: Groups duplicate edges by source-target-schema-temporal key to merge
      equivalent relationships
    evidence: zavod/zavod/integration/edges.py:261(dedupe_edges)
  key_behaviors:
  - behavior: feed_unconsolidated called BEFORE consolidate_entity
    description: Consolidation mutates entity in place; must export raw data first
      to preserve forensics trail
    evidence: zavod/zavod/exporters/__init__.py:75-80(export_data)
  - behavior: Edge dedup merges temporal overlaps
    description: Same-source-target-schema edges with overlapping time periods are
      merged; sanctions/programs listing same relationship multiple times are deduplicated
      to reduce noise
    evidence: zavod/zavod/integration/edges.py:36(Key)
  - behavior: UNIQUE_DATASETS prevents cross-list merging
    description: Entities in OFAC/UK/EU sanctions lists are never merged across lists
      regardless of match score; prevents false positives in sanctions compliance
    evidence: zavod/zavod/integration/logic.py:11(UNIQUE_DATASETS)
  replaceable_points:
  - name: Entity matching algorithm
    description: Nomenklatura resolver uses fuzzy matching on names, identifiers,
      and other properties for entity deduplication
    options:
    - name: nomenklatura resolver
      traits:
      - Full fuzzy matching with confidence scoring
      - Handles names, DUNS, LEIs, etc.
      - Cross-dataset resolution
      fit_for:
      - Production multi-dataset environments
      - Complex matching scenarios
      - When precision is critical
      not_fit_for:
      - Local-only datasets
      - Exact-match requirements
      - High-performance single-dataset processing
    - name: LocalEnricher blocking
      traits:
      - Deterministic blocking keys
      - Lower computational overhead
      - Local dataset focus
      fit_for:
      - Enriching with another local dataset
      - When full resolver is overkill
      - Batch processing
      not_fit_for:
      - Cross-dataset matching
      - Fuzzy matching requirements
      - Production resolver workflows
    default: nomenklatura resolver
  design_decisions:
  - 'Consolidation happens after unconsolidated export feeds: zavod/zavod/exporters/__init__.py:78(feed_unconsolidated)
    - Preserves raw data for forensics while producing simplified output'
  - 'Edge dedup merges same-source-target-schema edges with temporal overlap: zavod/zavod/integration/edges.py:36(Key)
    - Sanctions/programs can list same relationship multiple times; dedup reduces
    noise'
  acceptance_hints:
  - Duplicate entities from multiple sources are correctly merged into single records
  - Edge groups contain semantically equivalent relationships without excessive duplicates
  - Entities in UNIQUE_DATASETS (OFAC, EU, UK sanctions) remain separate from each
    other
  - Consolidated entities have simplified, standardized properties
- id: export
  name: Export
  order: 6
  responsibility: 'Transform consolidated entities into multiple output formats. WHY:
    Different consumers need different formats (FtM for tools, CSV for analysis, Senzing
    for GRC).'
  interface:
    inputs: Consolidated entities via ViewFragment, Dataset metadata
    outputs: FtM JSON, CSV, Nested JSON, Senzing, Statements CSV, Delta (ADD/MOD/DEL)
  required_methods:
  - name: export_dataset
    description: Orchestrates exporter instantiation, entity iteration, and metadata
      writing for each configured export formats
    evidence: zavod/zavod/exporters/__init__.py:89(export_dataset)
  - name: DeltaExporter.feed
    description: Generates ADD/MOD/DEL delta based on entity hash comparison with
      previous version
    evidence: zavod/zavod/exporters/delta.py:10(DeltaExporter)
  - name: Exporter.feed
    description: Abstract method for feeding entities to format-specific output generation
    evidence: zavod/zavod/exporters/common.py:10(Exporter)
  key_behaviors:
  - behavior: Exporter registry maps string names to classes
    description: Dataset YAML specifies exports as string list (e.g., ['ftm', 'csv']);
      registry decouples config from code allowing new formats without YAML changes
    evidence: zavod/zavod/exporters/__init__.py:35(EXPORTERS)
  - behavior: Default exporters applied if dataset specifies no exports
    description: Sensible defaults (FtM JSON, nested JSON, CSV) applied automatically;
      dataset can opt-out or add extras via configuration
    evidence: zavod/zavod/exporters/__init__.py:54(DEFAULT_EXPORTERS)
  - behavior: Delta uses SHA1 hash for MOD detection
    description: Deterministic, version-independent entity fingerprint using canonical
      form; MOD detection is O(n) via LevelDB iterator over entity hashes
    evidence: zavod/zavod/runtime/delta.py:49(feed)
  replaceable_points:
  - name: Export format
    description: Plug in new Exporter subclass for custom output formats; each exporter
      defines FILE_NAME, MIME_TYPE, and format-specific output logic
    options:
    - name: FtMExporter
      traits:
      - FollowTheMoney JSON format
      - Full statement coverage
      - Tool-compatible
      fit_for:
      - OpenSanctions tools
      - Data pipelines
      - Statement-level queries
      not_fit_for:
      - Human inspection
      - Spreadsheet analysis
      - GRC systems
    - name: SimpleCSVExporter
      traits:
      - Flat CSV format
      - Human-readable
      - Spreadsheet-compatible
      fit_for:
      - Data analysis
      - Excel viewers
      - Quick inspection
      not_fit_for:
      - Complex entity relationships
      - Statement-level data
      - Large datasets
    - name: SenzingExporter
      traits:
      - Senzing GRC format
      - Entity resolution ready
      - Enterprise integration
      fit_for:
      - Senzing users
      - GRC compliance systems
      - Enterprise data platforms
      not_fit_for:
      - General-purpose export
      - Simple analysis
    - name: MaritimeExporter
      traits:
      - Maritime-specific format
      - IMO/flag properties
      - Vessel relationships
      fit_for:
      - Maritime compliance
      - Shipping industry
      - Vessel tracking
      not_fit_for:
      - General sanctions data
      - Non-maritime entities
    - name: SecuritiesExporter
      traits:
      - Securities-specific format
      - CUSIP/ISIN focus
      - Ownership structures
      fit_for:
      - Securities compliance
      - Investment firms
      - Regulatory reporting
      not_fit_for:
      - General sanctions data
      - Non-securities entities
    default: FtMExporter
  design_decisions:
  - 'Exporter registry maps string names to classes: zavod/zavod/exporters/__init__.py:35(EXPORTERS)
    - Dataset YAML can specify exports as string list; decouples config from code'
  - 'Default exporters applied if dataset specifies no exports: zavod/zavod/exporters/__init__.py:54(DEFAULT_EXPORTERS)
    - Sensible defaults (FtM, nested, CSV) but dataset can opt-out or add extras'
  - 'Delta uses SHA1 hash of entity canonical form: zavod/zavod/runtime/delta.py:49(feed)
    - Deterministic, version-independent entity fingerprint; MOD detection is O(n)
    via LevelDB iterator'
  - 'feed_unconsolidated called BEFORE consolidate_entity: zavod/zavod/exporters/__init__.py:75(feed_unconsolidated)
    - Consolidation mutates entity in place; must export raw first'
  acceptance_hints:
  - Every configured exporters produce valid output files in dataset_data_path
  - Delta correctly identifies ADD/MOD/DEL entities based on SHA1 hash comparison
  - Default exporters (ftm, nested, csv) produce output when no exports specified
  - Output files are complete and not truncated
- id: archival
  name: Archival & Publication
  order: 7
  responsibility: 'Publish dataset artifacts to cloud storage with versioning and
    metadata. WHY: Provides reproducible, timestamped datasets for downstream consumers.'
  interface:
    inputs: Exported files, Version ID, Dataset metadata
    outputs: GCS or filesystem artifacts at /datasets/{name}/{version}/*, Catalog
      index files
  required_methods:
  - name: publish_dataset
    description: Uploads each artifacts to cloud storage and writes catalog entry
      for version tracking
    evidence: zavod/zavod/publish.py:37(publish_dataset)
  - name: archive_failure
    description: Uploads error information even on failed crawl to enable monitoring
      without blocking other dataset publications
    evidence: zavod/zavod/publish.py:71(archive_failure)
  - name: ArchiveBackend.upload
    description: Backend-specific upload implementation for storing artifacts
    evidence: zavod/zavod/archive/backend.py:49(ArchiveBackend)
  key_behaviors:
  - behavior: ArchiveBackend is abstract
    description: Local development uses filesystem backend; production uses GCS with
      generations for version-preserving reads; swap via settings without code changes
    evidence: zavod/zavod/archive/backend.py:20(ArchiveObject)
  - behavior: publish_dataset uploads to both versioned and /latest paths
    description: Versioned paths (e.g., /datasets/ofac/2024-01-15T00-00-00Z/) provide
      reproducibility; /latest provides convenience for always-current access
    evidence: zavod/zavod/publish.py:37(publish_dataset)
  - behavior: archive_failure uploads error info even on failed crawl
    description: Failed crawls still produce error artifacts enabling monitoring and
      alerting; doesn't block publication of other successful datasets
    evidence: zavod/zavod/publish.py:71(archive_failure)
  replaceable_points:
  - name: Storage backend
    description: Backend selection via settings; determines where published artifacts
      are stored
    options:
    - name: GoogleCloudBackend
      traits:
      - GCS with object versioning
      - Generations for version-preserving reads
      - Cloud-native
      fit_for:
      - Production deployments
      - Multi-environment setups
      - Version reproducibility requirements
      not_fit_for:
      - Local development
      - Budget-constrained projects without GCS access
    - name: FileSystemBackend
      traits:
      - Local filesystem storage
      - No cloud dependencies
      - Simple deployment
      fit_for:
      - Local development
      - Testing
      - Single-machine deployments
      not_fit_for:
      - Production multi-user environments
      - High availability requirements
      - Cross-machine access
    default: GoogleCloudBackend
  design_decisions:
  - 'ArchiveBackend is abstract with FileSystemObject and GoogleCloudObject implementations:
    zavod/zavod/archive/backend.py:20(ArchiveObject) - Local dev uses filesystem;
    production uses GCS; swap via settings without code changes'
  - 'publish_dataset uploads to both versioned and /latest paths: zavod/zavod/publish.py:37(publish_dataset)
    - Versioned for reproducibility; /latest for convenience'
  - 'archive_failure uploads error info even on failed crawl: zavod/zavod/publish.py:71(archive_failure)
    - Enables monitoring of failures without blocking publication of other datasets'
  acceptance_hints:
  - Every artifacts appear at /datasets/{name}/{version}/* after successful publication
  - /latest path points to most recently published version
  - Failed crawls still produce error artifacts with failure details
  - Catalog index files are updated with new version entries
data_flow:
- from_stage: data_collection
  to_stage: entity_extraction
  data: Cached HTTP responses; raw files via Context.get_resource_path
- from_stage: entity_extraction
  to_stage: statement_storage
  data: Entity.emit() → PackStatementWriter → LevelDB statements
- from_stage: statement_storage
  to_stage: validation
  data: Store.view() yields assembled entities for assertion checking
- from_stage: validation
  to_stage: consolidation
  data: Validated entities passed to ViewFragment for export feeds
- from_stage: consolidation
  to_stage: export
  data: Consolidated Entity objects with resolver-applied merges
- from_stage: export
  to_stage: archival
  data: Exported files (FtM JSON, CSV, etc.) to dataset_data_path
- from_stage: archival
  to_stage: external
  data: GCS/Filesystem artifacts at /datasets/{name}/{version}/
global_contracts:
- contract: Every entities must have a dataset-scoped ID generated via make_id or
    make_slug
  evidence: zavod/zavod/entity.py:27(make_id)
- contract: Statements are the atomic unit of storage; entities are assembled from
    statements on read
  evidence: zavod/zavod/store.py:37(assemble)
- contract: Context lifecycle (begin/flush/close) must be properly followed for data
    persistence
  evidence: zavod/zavod/context.py:107(begin)
- contract: Issues are written as append-only JSON lines; no backfill for collections
  evidence: zavod/zavod/runtime/issues.py:32(write)
- contract: Version ID is ISO timestamp; used for reproducibility and delta generation
  evidence: zavod/zavod/runtime/versions.py:15(make_version)
- contract: Dataset inputs must be synced to store before dependent datasets can run
  evidence: zavod/zavod/store.py:59(iter_dataset_statements)
- contract: feed_unconsolidated MUST be called before consolidate_entity in export
    pipeline
  evidence: zavod/zavod/exporters/__init__.py:75-80(export_data)
- contract: Person schema names REQUIRE spaces (require_space=True default); single-token
    Person names are flagged as irregular
  evidence: zavod/zavod/meta/names.py:54-57(_DEFAULT_SCHEMA_RULES)
- contract: UNIQUE_DATASETS (OFAC, UK, EU sanctions) entities cannot be merged across
    lists regardless of match score
  evidence: zavod/zavod/integration/logic.py:11(UNIQUE_DATASETS)
- contract: NEVER_REMOVE_NAMES_DATASETS protects sanctioned entity names from simplification;
    sanctions names preserved verbatim
  evidence: zavod/zavod/exporters/consolidate.py:26-40(NEVER_REMOVE_NAMES_DATASETS)
business_decisions:
- id: BD-001
  type: B
  content: HTTP caching via request_hash fingerprinting
  rationale: Avoid re-fetching same URLs across runs by computing a fingerprint hash;
    the cache_days parameter provides explicit TTL control so operators can balance
    freshness against bandwidth costs. This boundary prevents unbounded cache growth
    while allowing configurable retention.
  evidence: zavod/zavod/runtime/http_.py:54(request_hash)
  stage: data_collection
  alternative_considered: No caching would increase API rate limit failures; unlimited
    caching would cause stale data issues. Request-hash fingerprinting with TTL strikes
    the balance.
- id: BD-002
  type: BA
  content: Context holds dataset-scoped resources (stats, issues, resources)
  rationale: Single object lifecycle matches dataset run scope, binding stats collection,
    issue logging, and resource acquisition to the same temporal boundary. This prevents
    cross-contamination between datasets when running multiple datasets in sequence
    or parallel, ensuring each dataset's run environment is isolated.
  evidence: zavod/zavod/context.py:42(context:)
  stage: data_collection
  alternative_considered: Global singletons were rejected because they prevent parallel
    dataset runs and complicate debugging; module-level state was rejected due to
    cross-contamination risk.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: context: in zavod/zavod/context.py'
- id: BD-003
  type: M
  content: Context.fetch_* methods return decoded content vs raw response
  rationale: Abstraction layer over HTTP backends allows seamless switching between
    requests (local dev), Zyte (production scraping), or custom implementations. The
    decoded-content boundary means crawlers never handle raw bytes or response objects,
    enabling backend swaps without modifying crawler code.
  evidence: zavod/zavod/context.py:244(fetch_text)
  stage: data_collection
  alternative_considered: Direct requests usage would hardcode one backend; wrapping
    at crawler level would require changes to every crawler when switching providers.
- id: BD-004
  type: BA
  content: Entity.make_id raises NotImplementedError
  rationale: Forces each crawler developers to explicitly implement ID generation
    logic for their entity types. This boundary prevents accidental use of Follow
    the Money's generic make_id which produces non-deterministic IDs in the zavod
    context, ensuring each dataset produces stable, dataset-namespaced identifiers.
  evidence: zavod/zavod/entity.py:28(make_id)
  stage: entity_extraction
  alternative_considered: Inheriting FtM's make_id would cause ID instability; documentation-only
    warnings were deemed insufficient given the critical nature of entity IDs.
- id: BD-005
  type: M
  content: Statements are primary storage format, not entity dicts
  rationale: Enables incremental updates where new statements can be added without
    full entity reconstruction; supports complete audit trails for provenance and
    data lineage. The statement-as-primary boundary means entities can always be reconstructed
    deterministically, supporting rollback and diff scenarios.
  evidence: zavod/zavod/entity.py:30(unsafe_add)
  stage: entity_extraction
  alternative_considered: Direct entity dict storage loses change history; separate
    audit log tables add complexity and can drift from actual data.
- id: BD-006
  type: M/DK
  content: Entity.add_schema tries to make entity more specific
  rationale: Progressive typing allows an entity to evolve from broad schema (PEP)
    to specific schema (Person to Politician) as more evidence is gathered. This boundary
    enables partial extraction where initial crawlers emit low-confidence types and
    later stages specialize them without losing existing properties.
  evidence: zavod/zavod/entity.py:155(add_schema)
  stage: entity_extraction
  alternative_considered: Strict schema at extraction time would require each properties
    known upfront; separate entity 'promotion' stages would add processing overhead.
- id: BD-007
  type: B
  content: Store extends LevelDBStore from nomenklatura
  rationale: Leverages nomenklatura's resolver integration for canonical entity identification
    and its entity view abstraction for standardized entity access patterns. The LevelDB
    foundation boundary provides ordered key iteration for delta detection while the
    resolver integration enables cross-dataset entity merging.
  evidence: zavod/zavod/store.py:24(class Store)
  stage: statement_storage
  alternative_considered: Custom storage layer would reinvent resolver logic; SQL
    databases provide query flexibility but lack LevelDB's efficient ordered iteration
    for delta processing.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: class Store in zavod/zavod/store.py'
- id: BD-008
  type: B
  content: Store.assemble wraps InvalidData exceptions
  rationale: Prevents a single malformed entity from terminating the entire export
    pipeline. The exception-wrapping boundary logs debug information including the
    entity ID and validation errors while continuing processing, enabling forensic
    analysis of bad entities without blocking publication of valid data.
  evidence: zavod/zavod/store.py:37(assemble)
  stage: statement_storage
  alternative_considered: Failing fast would leave operators with no dataset if any
    entity is invalid; silent dropping would hide data quality issues.
- id: BD-009
  type: M
  content: Store.sync indexes each external statements for cross-dataset lookups
  rationale: Inputs datasets must be indexed before derived datasets can reference
    them; this creates an explicit dependency boundary where upstream data availability
    is verified before downstream processing begins. The indexing step builds reverse-lookup
    structures enabling entity resolution against external datasets.
  evidence: zavod/zavod/store.py:59(iter_dataset_statements)
  stage: statement_storage
  alternative_considered: Lazy indexing would cause unpredictable lookup latency;
    in-memory resolution would limit dataset scale.
  _evidence_issues:
  - 'FN_NOT_FOUND: iter_dataset_statements in zavod/zavod/store.py'
- id: BD-010
  type: B
  content: Issues use append-only JSON lines format
  rationale: Crash-resistant logging format allows issues to be appended during processing
    without holding state in memory. The append-only boundary means process crashes
    lose no logged issues and the file can be inspected while processing continues,
    supporting long-running dataset builds.
  evidence: zavod/zavod/runtime/issues.py:32(write)
  stage: validation
  alternative_considered: In-memory lists lose issues on crash; SQLite logging adds
    transaction overhead; JSON array requires complete rewrite on each append.
- id: BD-011
  type: BA
  content: Assertions are declarative config, not code
  rationale: Non-programmers can define validation constraints without writing Python
    code; assertions live in dataset YAML files and are version-controlled alongside
    the dataset. This declarative boundary separates what must be true (data contracts)
    from how to enforce it (implementation), enabling domain experts to specify data
    quality requirements.
  evidence: zavod/zavod/meta/assertion.py:43(Assertion)
  stage: validation
  alternative_considered: Code-based assertions require engineering involvement for
    every rule change; GUI-based rules lack auditability and diff-friendliness.
- id: BD-012
  type: M
  content: No issues backfill for collections
  rationale: Collections aggregate entities from multiple source datasets; backfilling
    issues from previous runs would attribute old validation warnings to the collection
    run, which is misleading. The no-backfill boundary ensures collection issues reflect
    only the current aggregation state, preserving the causal relationship between
    data and warnings.
  evidence: zavod/zavod/runtime/issues.py:81(all)
  stage: validation
  alternative_considered: Backfilling would create confusion about when issues were
    introduced; showing no history loses valuable debugging information.
- id: BD-013
  type: M
  content: Consolidation happens after unconsolidated export feeds
  rationale: Processing order boundary ensures raw, unconsolidated data is exported
    first, preserving the complete audit trail. Consolidation then mutates entities
    in place for simplified output. This preserves forensic ability to trace entity
    origins while still producing streamlined consolidated results for end users.
  evidence: zavod/zavod/exporters/__init__.py:78(feed_unconsolidated)
  stage: consolidation
  alternative_considered: Consolidation-first would lose raw data; simultaneous export
    would complicate debugging entity provenance.
  _evidence_issues:
  - 'FN_NOT_FOUND: feed_unconsolidated in zavod/zavod/exporters/__init__.py'
- id: BD-014
  type: B
  content: Edge dedup merges same-source-target-schema edges with temporal overlap
  rationale: Sanctions lists and programs frequently list the same relationship multiple
    times across different dates. The deduplication boundary (same source, same target,
    same schema, temporal overlap) reduces noise while preserving meaningful duplicate
    edges that represent genuinely different relationship instances, such as sanctions
    from separate programs.
  evidence: zavod/zavod/integration/edges.py:36(Key)
  stage: consolidation
  alternative_considered: No dedup would inflate relationship counts; aggressive dedup
    would lose legitimate duplicate entries representing distinct sanctions.
- id: BD-015
  type: B
  content: Exporter registry maps string names to classes
  rationale: Dataset YAML configuration specifies exports as string lists, decoupling
    configuration from code. The registry boundary allows new exporters to be added
    without modifying YAML schemas, and operators can reference exporters by name
    without importing Python modules, enabling plugin-style extensibility.
  evidence: zavod/zavod/exporters/__init__.py:35(EXPORTERS)
  stage: export
  alternative_considered: Direct class references would require Python knowledge;
    dynamic loading without registry would create import ordering issues.
  _evidence_issues:
  - 'FN_NOT_FOUND: EXPORTERS in zavod/zavod/exporters/__init__.py'
- id: BD-016
  type: M/BA
  content: Default exporters applied if dataset specifies no exports
  rationale: Sensible defaults (Follow the Money, nested JSON, CSV) ensure new datasets
    produce usable output without explicit configuration. The default boundary allows
    datasets to opt-out or extend, providing 'convention over configuration' for the
    80% case while preserving full flexibility for custom export needs.
  evidence: zavod/zavod/exporters/__init__.py:54(DEFAULT_EXPORTERS)
  stage: export
  alternative_considered: No defaults would require explicit configuration for every
    dataset; mandatory defaults would prevent lean exports.
  _evidence_issues:
  - 'FN_NOT_FOUND: DEFAULT_EXPORTERS in zavod/zavod/exporters/__init__.py'
- id: BD-017
  type: B
  content: Delta uses SHA1 hash of entity canonical form
  rationale: Deterministic, version-independent entity fingerprint computed from canonical
    (sorted, stable) representation ensures identical entities produce identical hashes
    regardless of property ordering. The LevelDB iterator boundary enables O(n) modification-of-determination
    by scanning each entity hashes once per run.
  evidence: zavod/zavod/runtime/delta.py:49(feed)
  stage: export
  alternative_considered: Property-level diffing would be slower; timestamp-based
    delta would miss silent edits; full comparison would be O(n^2).
- id: BD-018
  type: B
  content: feed_unconsolidated called BEFORE consolidate_entity
  rationale: Consolidation mutates entity in place, merging properties from duplicate
    entities. This processing-order boundary ensures raw data is captured for forensic
    export before mutation occurs, preserving the ability to audit consolidation decisions
    and revert to unconsolidated state if needed.
  evidence: zavod/zavod/exporters/__init__.py:75(feed_unconsolidated)
  stage: export
  alternative_considered: Reversing order would lose raw data; parallel processing
    would complicate debugging; no consolidated export would reduce utility.
  _evidence_issues:
  - 'FN_NOT_FOUND: feed_unconsolidated in zavod/zavod/exporters/__init__.py'
- id: BD-019
  type: B
  content: ArchiveBackend is abstract with FileSystemObject and GoogleCloudObject
    implementations
  rationale: Local development uses filesystem storage while production uses Google
    Cloud Storage; swap via configuration without code changes. The abstraction boundary
    ensures archived objects (source files, screenshots) are accessible regardless
    of backend, enabling dev/prod parity and multi-cloud deployment flexibility.
  evidence: zavod/zavod/archive/backend.py:20(ArchiveObject)
  stage: archival
  alternative_considered: Single-backend storage would require code changes for environment
    switches; hardcoded paths would break portability.
- id: BD-020
  type: M/DK
  content: publish_dataset uploads to both versioned and /latest paths
  rationale: Versioned paths (with timestamp/commit hash) ensure reproducibility and
    auditability of specific dataset releases; /latest path provides convenience for
    consumers wanting current data without version tracking. This dual-path boundary
    satisfies both reproducibility requirements and ease-of-use needs.
  evidence: zavod/zavod/publish.py:37(publish_dataset)
  stage: archival
  alternative_considered: Versioned-only would require consumers to track versions;
    latest-only would prevent reproducibility; separate 'release' workflow would add
    complexity.
- id: BD-021
  type: M
  content: archive_failure uploads error info even on failed crawl
  rationale: Enables monitoring and alerting on crawl failures without blocking publication
    of other successfully processed datasets. The failure-archive boundary ensures
    error context (URL, error type, timestamp, partial content) is preserved for debugging
    even when the overall pipeline continues processing other datasets.
  evidence: zavod/zavod/publish.py:71(archive_failure)
  stage: archival
  alternative_considered: Failing hard on any dataset error would prevent partial
    results publication; silent failure logging would prevent proactive alerting.
- id: BD-022
  type: B
  content: Use hash-based entity IDs with prefix for consistent cross-run entity identification
  rationale: Entity IDs must remain stable across pipeline runs to ensure referential
    integrity. Using a hash-based approach with prefix ensures deterministic ID generation
    while prefix distinguishes entity types. This enables idempotent processing where
    the same source entity always produces the same canonical ID regardless of run
    order or timing.
  evidence: zavod/zavod/context.py:437(make_id)
  stage: entity_extraction
  alternative_considered: Sequential IDs would not be deterministic; UUIDs lack semantic
    meaning from entity content
- id: BD-023
  type: B
  content: Cache HTTP responses for configurable days using request fingerprint hashing
  rationale: HTTP caching reduces source server load and improves pipeline performance
    for repeated fetches. Using request fingerprint hashing ensures cache keys capture
    each relevant request parameters while remaining deterministic. Configurable TTL
    allows balancing freshness against performance for different dataset requirements.
  evidence: zavod/zavod/context.py:272(request_hash)
  stage: fetching
  alternative_considered: No caching would increase load significantly; indefinite
    caching risks stale data
  _evidence_issues:
  - 'FN_NOT_FOUND: request_hash in zavod/zavod/context.py'
- id: BD-024
  type: B/RC
  content: Disable SSL certificate verification for HTTP requests
  rationale: SSL verification must be disabled to access internal/Corporate data sources
    that use self-signed certificates or internal PKI. This is necessary for corporate
    network access patterns but creates security boundary requiring host whitelisting
    and proper network isolation. The verification=False setting is intentional for
    controlled internal environments only.
  evidence: zavod/zavod/runtime/http_.py:33(make_session)
  stage: fetching
  alternative_considered: Adding corporate CA certs to trust store requires system-level
    changes; may not be feasible in each deployment environments
- id: BD-025
  type: B/BA
  content: Use LevelDB for statement storage with batch writes every 500,000 statements
  rationale: LevelDB provides high-throughput key-value storage suitable for statement
    metadata with efficient batch operations. Batching writes every 500,000 statements
    balances memory usage against write performance for large dataset processing.
    This threshold prevents excessive memory consumption while amortizing write overhead.
  evidence: zavod/zavod/runtime/timestamps.py:14(TimeStampIndex)
  stage: statement_storage
  alternative_considered: Smaller batches increase flush frequency; larger batches
    consume more memory
- id: BD-026
  type: B
  content: Calculate delta exports using SHA1 hash of entity ID, schema, and sorted
    property values
  rationale: Delta calculation requires stable hash computation to detect actual changes
    between runs. Using sorted property values ensures order-independent comparison
    so entity property ordering differences don't trigger false deltas. SHA1 provides
    sufficient collision resistance for entity change detection while remaining computationally
    efficient.
  evidence: zavod/zavod/runtime/delta.py:49(digest.update)
  stage: export
  alternative_considered: Full comparison would be O(n²); MD5 less collision-resistant
    for this use case
  _evidence_issues:
  - 'FN_NOT_FOUND: digest.update in zavod/zavod/runtime/delta.py'
- id: BD-027
  type: B
  content: Use FollowTheMoney schema for each entity types with schema inheritance
  rationale: FollowTheMoney (FtM) provides a standardized, extensible ontology for
    integrity data that supports schema inheritance. This enables consistent entity
    modeling across each data sources while allowing domain-specific extensions. Schema
    inheritance reduces code duplication and ensures coherent type hierarchies for
    Persons, Companies, and related entities.
  evidence: zavod/zavod/entity.py:160(model.common_schema)
  stage: entity_extraction
  alternative_considered: Custom schemas would require more maintenance; no standard
    alternative provides equivalent coverage
  _evidence_issues:
  - 'FN_NOT_FOUND: model.common_schema in zavod/zavod/entity.py'
- id: BD-028
  type: B/RC
  content: Exclude OFAC SDN and other core sanctions lists from name simplification
  rationale: Core sanctions lists like OFAC SDN must be preserved exactly as published
    to maintain legal accuracy and regulatory compliance. Name simplification could
    alter sanctioned entity names and potentially cause false negatives in screening.
    This boundary ensures sanctions watchlist matching remains precise and legally
    defensible.
  evidence: zavod/zavod/exporters/consolidate.py:26(NEVER_REMOVE_NAMES_DATASETS)
  stage: consolidation
  alternative_considered: Applying simplification to sanctions lists risks compliance
    violations; no viable alternative exists
  _evidence_issues:
  - 'FN_NOT_FOUND: NEVER_REMOVE_NAMES_DATASETS in zavod/zavod/exporters/consolidate.py'
- id: BD-029
  type: B/BA
  content: Use 15 character threshold for weak alias detection on LegalEntity
  rationale: Short entity names under 15 characters are statistically more likely
    to be weak aliases or common words that create false matches during deduplication.
    This threshold was empirically determined to balance recall (not filtering valid
    short names) against precision (filtering noisy aliases). The boundary is specific
    to LegalEntity due to longer typical company name lengths.
  evidence: zavod/zavod/exporters/consolidate.py:43(simplify_names)
  stage: consolidation
  alternative_considered: Shorter threshold loses precision; longer threshold loses
    recall on valid short company names
- id: BD-030
  type: B/RC
  content: Apply 5-year after-office period for standard PEP positions
  rationale: Politically Exposed Persons (PEPs) pose elevated risk during their tenure
    and for a defined period after leaving office. The 5-year post-office window aligns
    with standard industry practice and FATF recommendations for enhanced due diligence.
    This boundary balances risk coverage against practical data retention and privacy
    considerations.
  evidence: zavod/zavod/stateful/positions.py:127(get_after_office)
  stage: pep_logic
  alternative_considered: Shorter periods may miss delayed risk; longer periods increase
    false positives and privacy concerns
  vague_rationale: true
- id: BD-031
  type: B/RC
  content: Use 20-year after-office period for heads of state and IGOs
  rationale: Heads of state and intergovernmental organization leaders represent higher
    corruption and PEP risk that persists longer than standard positions. The 20-year
    extended window reflects enhanced due diligence requirements for high-level political
    figures whose influence and corruption risk extend well beyond standard post-tenure
    periods. This exceeds FATF minimums for heightened-risk PEPs.
  evidence: zavod/zavod/stateful/positions.py:127(get_after_office)
  stage: pep_logic
  alternative_considered: Standard 5-year window inadequate for senior political roles;
    no shorter period acceptable for compliance
- id: BD-032
  type: B/BA
  content: 'Reject names with characters: ;\/()[]<>{}: for Person schema'
  rationale: Special characters in personal names are typically data entry errors,
    OCR artifacts, or non-name content. Rejecting names containing punctuation, brackets,
    and semicolons prevents malformed names from entering the entity database. This
    validation boundary ensures name data quality while allowing legitimate diacritics
    and international character sets.
  evidence: zavod/zavod/meta/names.py:55(reject_chars_baseline)
  stage: name_cleaning
  alternative_considered: Allowing punctuation risks noise in names; blocking each
    special chars would reject valid international names
  _evidence_issues:
  - 'FN_NOT_FOUND: reject_chars_baseline in zavod/zavod/meta/names.py'
- id: BD-033
  type: B
  content: Require space in Person names (except dense scripts like Han)
  rationale: Personal names require word boundaries (spaces) to enable proper parsing
    into first/last name components. This requirement enforces data quality while
    accounting for Han script and other dense writing systems where spaces are not
    used. The exception prevents false rejections of valid CJK names while maintaining
    parsing integrity for Latin and similar scripts.
  evidence: zavod/zavod/meta/names.py:56(require_space=True)
  stage: name_cleaning
  alternative_considered: No space requirement would complicate name parsing; blanket
    requirement would reject valid CJK names
  _evidence_issues:
  - 'INVALID_IDENTIFIER: require_space=True in zavod/zavod/meta/names.py'
- id: BD-034
  type: B
  content: Use GPT-5.4 model for LLM-based name cleaning with DSPy signatures
  rationale: GPT-5.4 provides sufficient reasoning capability for nuanced name cleaning
    tasks including language detection, script normalization, and alias generation.
    The DSPy framework enables structured LLM calls with typed signatures ensuring
    consistent behavior. This model choice balances capability against cost and latency
    for high-volume name processing.
  evidence: zavod/zavod/extract/names/clean.py:32(names)
  stage: name_cleaning
  alternative_considered: Smaller models lack nuanced reasoning; larger models increase
    cost without proportional accuracy gains
  _evidence_issues:
  - 'FN_NOT_FOUND: names in zavod/zavod/extract/names/clean.py'
- id: BD-035
  type: B/BA
  content: Export targets.nested.json with entity nesting depth of 1 by default
  rationale: Entity nesting depth of 1 provides immediate target relationships without
    exponential JSON growth. Deeper nesting increases file size, parsing complexity,
    and reduces downstream usability. This default balances data richness against
    practical file sizes for most integration use cases while remaining configurable
    for specialized needs.
  evidence: zavod/zavod/exporters/nested.py:16(if entity.target)
  stage: export
  alternative_considered: No nesting loses relationship context; deeper nesting exponentially
    increases size without proportional value
  _evidence_issues:
  - 'INVALID_IDENTIFIER: if entity.target in zavod/zavod/exporters/nested.py'
- id: BD-036
  type: B
  content: Write issues log in newline-delimited JSON (NDJSON) format
  rationale: NDJSON format enables streaming writes and efficient log processing without
    loading entire files into memory. Each issue record can be written immediately
    and parsed incrementally. This format supports standard line-based tools (grep,
    awk) while maintaining JSON structure for programmatic access.
  evidence: zavod/zavod/runtime/issues.py:59(orjson.OPT_APPEND_NEWLINE)
  stage: logging
  alternative_considered: JSON array requires full parse; plain text lacks structure
    for programmatic access
  _evidence_issues:
  - 'FN_NOT_FOUND: orjson.OPT_APPEND_NEWLINE in zavod/zavod/runtime/issues.py'
- id: BD-037
  type: B/RC
  content: Redact environment variables and URI credentials from each logs
  rationale: Sensitive credentials must be redacted from logs to prevent accidental
    exposure of secrets in log aggregation systems. Environment variables and URI
    parameters commonly contain API keys, passwords, and connection strings. This
    redaction boundary ensures security compliance and prevents credential leakage
    through log files.
  evidence: zavod/zavod/logs.py:119(configure_redactor)
  stage: logging
  alternative_considered: No redaction risks exposing secrets; selective redaction
    requires maintaining allowlists
- id: BD-038
  type: B/DK
  content: Use GCS cache control max-age for published blobs
  rationale: Setting cache control headers on GCS blobs enables efficient CDN caching
    for downstream consumers. The max-age directive instructs browsers and proxies
    to cache published data for the specified TTL. This reduces repeated downloads
    and improves access performance while allowing TTL configuration based on dataset
    update frequency.
  evidence: zavod/zavod/archive/backend.py:20(ArchiveObject)
  stage: archiving
  alternative_considered: No cache headers cause repeated fetches; immutable content
    should use longer TTLs
- id: BD-039
  type: B/BA
  content: Use 40MB chunk size for GCS blob operations
  rationale: The 40MB chunk size balances memory usage against GCS transfer efficiency
    for large blob operations. This threshold is below GCS's 5TB limit while remaining
    efficient for typical network MTUs and memory constraints. Larger chunks improve
    throughput but consume more memory; smaller chunks add overhead.
  evidence: zavod/zavod/archive/backend.py:68(blob)
  stage: archiving
  alternative_considered: Smaller chunks increase API overhead; larger chunks risk
    memory issues on constrained systems
- id: BD-040
  type: B/BA
  content: Skip position if start date older than 40 years (MAX_OFFICE)
  rationale: Positions starting over 40 years ago are likely data entry errors or
    irrelevant historical records. The MAX_OFFICE threshold prevents anomalous positions
    from distorting PEP calculations and occupancy timelines. This boundary ensures
    data quality while accepting historically relevant positions within reasonable
    timeframes.
  evidence: zavod/zavod/stateful/positions.py:32(positioncategorisation)
  stage: pep_logic
  alternative_considered: Shorter threshold loses legitimate historical context; longer
    threshold admits more noise
  _evidence_issues:
  - 'FN_NOT_FOUND: positioncategorisation in zavod/zavod/stateful/positions.py'
- id: BD-041
  type: B
  content: Return OccupancyStatus.UNKNOWN for future end dates if dataset coverage
    is past
  rationale: When a dataset's coverage ends before today, positions with future end
    dates cannot be reliably determined. A future end date within an ended dataset
    suggests incomplete data rather than a current position. This boundary prevents
    false CURRENT status while acknowledging uncertainty.
