- id: BD-GAP-012
  type: BA
  content: Wikidata updater session processes one entity at a time with full fetch-propose-resolve-publish
    cycle, trading throughput for safety and reviewability
  rationale: Single-entity processing prevents conflicts and enables human review;
    breaks if batch accuracy is acceptable and review overhead is prohibitive
  evidence: zavod/zavod/tools/wikidata/__init__.py:160(EditSession.__init__),:192(next)
  stage: integration_design
  alternative_considered: Batch API writes (faster but riskier), fully automated sync
    (no review)
  _evidence_issues:
  - 'INVALID_IDENTIFIER: EditSession.__init__),:192(next in zavod/zavod/tools/wikidata/__init__.py'
- id: BD-GAP-013
  type: BA
  content: Validation assertions distinguish fatal vs non-fatal failures, allowing
    partial data publication with warnings rather than complete halt
  rationale: Fatal/non-fatal separation enables graduated responses; breaks if non-fatal
    assertions accumulate to hidden data quality issues
  evidence: zavod/zavod/validators/assertions.py:23(is_assertion_fatal)
  stage: quality_control
  alternative_considered: Every failures halt publication (safer but rigid), each
    failures warn only (more flexible but riskier)
- id: BD-GAP-014
  type: B
  content: Company name cleaning extracts primary name and aliases in single pass,
    returning multiple names from one input string
  rationale: Single-pass extraction is efficient but may miss complex alias patterns;
    breaks if alias delimiters vary significantly across jurisdictions
  evidence: datasets/ba/companies/crawler.py:105(clean_name)
  stage: data_collection
  alternative_considered: Multi-pass extraction with pattern library, ML-based name
    segmentation
- id: BD-GAP-015
  type: BA/M
  content: BODS (Beneficial Ownership Data Standard) uses a statement-based format
    with separate person, entity, and relationship statements that must be joined
    for analysis
  rationale: Statement model enables incremental updates and provenance tracking;
    breaks if consumers need fully denormalized flat records
  evidence: zavod/zavod/shed/bods.py:55(parse_statement),:171(parse_bods_fh)
  stage: data_collection
  alternative_considered: Flat record format (simpler queries but less flexible updates)
  _evidence_issues:
  - 'INVALID_IDENTIFIER: parse_statement),:171(parse_bods_fh in zavod/zavod/shed/bods.py'
