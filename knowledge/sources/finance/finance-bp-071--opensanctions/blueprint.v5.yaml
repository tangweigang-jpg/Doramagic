replaceable_slots:
- id: slot-001
  name: web_scraping_backend
  description: Use standard requests for accessible sources; use Zyte for bot-blocked sites. Zyte configured
    via OPENSANCTIONS_ZYTE_API_KEY.
  used_in_stages: []
  options:
  - name: Zyte API
    traits:
    - anti-bot-circumvention
    - browser-rendering
    - javascript-support
    - geolocation-targeting
    fit_for:
    - Websites with bot protection, JavaScript-heavy pages, geo-restricted content
    not_fit_for:
    - Simple HTML pages without bot protection, rate-limited APIs
  - name: Standard HTTP requests
    traits:
    - simple
    - fast
    - no-added-latency
    fit_for:
    - Public APIs, simple HTML pages, rate-limited government downloads
    not_fit_for:
    - Bot-protected websites, JavaScript-rendered content
  default: Standard HTTP requests (with Zyte as fallback)
  _source: worker_resource
- id: slot-002
  name: llm_extraction
  description: Use OpenAI by default; Azure OpenAI for enterprise deployments via OPENSANCTIONS_AZURE_OPENAI_ENDPOINT.
  used_in_stages: []
  options:
  - name: OpenAI GPT-4o
    traits:
    - vision
    - structured-output
    - high-quality
    fit_for:
    - Image/PDF extraction, complex unstructured data parsing
    not_fit_for:
    - Simple structured data, high-volume batch processing
  - name: Azure OpenAI
    traits:
    - enterprise-compliance
    - vision
    - structured-output
    fit_for:
    - Enterprise environments requiring Azure compliance
    not_fit_for:
    - Non-Azure deployments
  default: OpenAI GPT-4o
  _source: worker_resource
- id: slot-003
  name: archive_backend
  description: Set ZAVOD_ARCHIVE_BACKEND=GoogleCloudBackend for production; use FileSystemBackend for
    local development.
  used_in_stages: []
  options:
  - name: Google Cloud Storage
    traits:
    - cloud-native
    - versioned
    - global-cdn
    fit_for:
    - Production deployments, multi-region access
    not_fit_for:
    - Local-only or air-gapped deployments
  - name: FileSystem
    traits:
    - simple
    - local-only
    - no-dependency
    fit_for:
    - Development, local processing, air-gapped environments
    not_fit_for:
    - Production multi-node deployments, global distribution
  default: FileSystemBackend
  _source: worker_resource
- id: slot-004
  name: database
  description: Use SQLite for simple crawls; PostgreSQL for production UI/review systems. Override with
    OPENSANCTIONS_DATABASE_URI.
  used_in_stages: []
  options:
  - name: SQLite
    traits:
    - embedded
    - zero-config
    - single-writer
    fit_for:
    - Single-node crawlers, development, small-scale deployments
    not_fit_for:
    - Multi-node crawlers, high concurrency, large datasets
  - name: PostgreSQL
    traits:
    - server-based
    - concurrent
    - scalable
    fit_for:
    - Production multi-node crawlers, UI backend, high concurrency
    not_fit_for:
    - Simple single-machine crawls
  default: SQLite (sqlite:///data/zavod.sqlite3)
  _source: worker_resource
- id: slot-005
  name: wikidata_integration
  description: Configure ZAVOD_WD_* tokens for write access. Set disabled if Wikidata integration not
    needed.
  used_in_stages: []
  options:
  - name: Wikimedia API (read/write)
    traits:
    - read-write
    - oauth-auth
    - structured-data
    fit_for:
    - PEP enrichment, Wikidata linking, contributing back changes
    not_fit_for:
    - Read-only deployments (can disable)
  default: Enabled with OAuth
  _source: worker_resource
- id: slot-006
  name: entity_matching
  description: Core data model - not replaceable without major rewrite.
  used_in_stages: []
  options:
  - name: followthemoney + nomenklatura
    traits:
    - entity-resolution
    - deduplication
    - enrichment
    fit_for:
    - Default entity matching and deduplication
    not_fit_for:
    - N/A (core requirement)
  default: followthemoney + nomenklatura
  _source: worker_resource
