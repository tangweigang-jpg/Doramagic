  evidence: datasets/gb/coh/disqualified.py:15(AbortCrawl)
  stage: crawl
  alternative_considered: Skipping bad records and continuing would preserve coverage but risk gaps
- id: BD-GAP-010
  type: T
  content: DB batch size of 5000 statements per insert when loading datasets for deduplication
  rationale: Balances memory usage against transaction overhead; 5000 is large enough to reduce round-trips
    but small enough to avoid huge rollback scenarios on failure; breaks on databases with low max_packet_size.
  evidence: zavod/zavod/cli/util.py:20(load_db)
  stage: etl
  alternative_considered: Smaller batches (500) would reduce memory pressure; larger (50000) would reduce
    round-trips
- id: BD-GAP-011
  type: B/BA
