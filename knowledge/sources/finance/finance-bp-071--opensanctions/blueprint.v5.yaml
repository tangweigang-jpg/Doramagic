  stage: crawl
  alternative_considered: Schema-agnostic parsing would be more flexible but less explicit
- id: BD-GAP-019
  type: B
  content: 'Validators run as a pipeline: dangling references → self-reference → empty dataset check'
  rationale: Each validator serves a distinct purpose; ordering dangling refs first catches the most critical
    issues; empty check last confirms the run produced output; breaks if a later validator's input depends
    on an earlier one not running.
  evidence: zavod/zavod/validators/__init__.py:73(validate_dataset)
  stage: validation
  alternative_considered: Parallel validators would be faster but lose ordering guarantees
- id: BD-GAP-020
  type: B
  content: Assertion validator distinguishes fatal vs non-fatal assertions to determine whether to abort
