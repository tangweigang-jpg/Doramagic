- id: BD-GAP-018
  type: B/BA
  content: UN Sanctions uses Regime enum to distinguish programs (OFAC, UN, EU, UK, DFAT) with per-regime
    parsing
  rationale: Different sanctioning bodies use different XML schemas and naming conventions; the enum drives
