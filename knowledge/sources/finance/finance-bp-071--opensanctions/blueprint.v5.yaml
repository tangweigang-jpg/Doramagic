  rationale: BD-069 explicitly mandates feed_unconsolidated() MUST be called before consolidate_entity()
    mutates the entity. BD-012 confirms that consolidate_entity mutates entity in-place after raw feed.
    If exporters receive consolidated (mutated) entities instead of raw ones, they lose unmerged statement
    provenance data. This is not a theoretical risk—the ordering contract in BD-069 exists precisely because
    the in-place mutation in BD-012 destroys original state. Violation of this ordering creates silent
    data corruption where exporters silently operate on incomplete entity data without raising errors.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Immutable entity copies would prevent corruption but double memory usage
- id: BD-091
  type: BA
  content: 'INTERACTION: [BD-073] × [BD-032] × [BD-079] → Stale cache causes incorrect PEP after-office
    period classification'
  rationale: BD-073 documents that PositionCategorisation LRU cache depends on volatile database state
    (is_pep flag, topics). BD-032 defines after-office periods (5yr default, 20yr for national/IGO, no
    expiration for head-of-state). BD-079 implements get_after_office returning different periods based
    on position type. When the LRU cache returns stale PEP classifications, the after-office calculation
    uses outdated position type data. A position promoted to national/IGO level (triggering 20yr period)
    but cached as regular position (5yr) will under-classify PEP exposure duration, potentially allowing
    entities to exit screening prematurely.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Cache invalidation on DB writes would add latency but ensure consistency
- id: BD-092
  type: B/BA
  content: 'INTERACTION: [BD-006] × [BD-014] × [BD-015] → LevelDB as shared infrastructure creates single
    point of failure'
  rationale: BD-006 stores statements in LevelDB for write throughput, BD-014 loads previous version hashes
    into LevelDB for delta comparison, and BD-015 uses LevelDB's sorted iterator for single-pass entity
    comparison. Every three decisions assume LevelDB reliability and consistent operation. LevelDB corruption
    (from crash during write, disk full, or bit rot) simultaneously destroys statement storage, delta
    computation history, and comparison functionality. No transactional backup or redundancy exists for
    the _state directory, making dataset reproducibility dependent on a single embedded database.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Separate storage engines for statements vs. delta would isolate failures but
    increase operational complexity
- id: BD-093
  type: BA
  content: 'INTERACTION: [BD-005] × [BD-087] → unsafe_add bypasses centralized validation creating security
    blind spot'
  rationale: BD-087 establishes value_clean as the central convergence point for lookups, format validation,
    XSS checks, and origin tracking. BD-005 allows unsafe_add() to bypass cleaning with cleaned=False
    parameter. When crawlers use unsafe_add for 'pre-cleaned' data, they bypass XSS sanitization, format
    validation, and origin tracking enforced at the central point. Malicious payloads in pre-cleaned data
    could reach exports unchanged. The assumption that callers are trusted is fragile—if any crawler using
    unsafe_add is compromised or misconfigured, the central validation is completely circumvented.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Removing unsafe_add would eliminate bypass but break legitimate pre-cleaned
    data workflows
- id: BD-094
  type: B/RC
  content: 'RISK CASCADE: [BD-003] → [BD-020] → [BD-013] → [BD-024] → [BD-025] → Undetectable entity identity
    corruption'
  rationale: 'Entity identity flows through multiple systems: BD-003/BD-020 create hash-based IDs for
    deduplication, BD-013 computes content hashes for delta detection, BD-024 excludes timestamps from
    delta hash, and BD-025 marks MERGE operations. If an upstream crawler normalizes or alters entity
    content before hashing, the entity receives a new ID. Subsequent crawls see it as a deleted entity
    (DEL operation) and a new entity (ADD operation) instead of recognizing it as the same entity with
    modifications. No mechanism exists to detect that these ADD/DEL pairs should have been a MOD operation,
    silently corrupting entity history and change tracking.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Content fingerprint separate from ID would preserve identity but add complexity
- id: BD-095
  type: BA
  content: 'RISK CASCADE: [BD-081] → [BD-078] → [BD-009] → [BD-012] → Sanctioned entity name preservation
    fails silently'
  rationale: NEVER_REMOVE_NAMES_DATASETS (BD-081) protects high-authority sanction list names from consolidation
    demotion, UNIQUE_DATASETS (BD-078) prevents consolidation of certain sanctioned datasets, feed_unconsolidated
    (BD-009) must be called before consolidation, and consolidate_entity (BD-012) mutates in-place. If
    feed_unconsolidated is called after consolidation due to ordering violation (BD-069 conflict with
    BD-012), exporters receive entities with names that were already demoted. The NEVER_REMOVE_NAMES protection
    is applied to the wrong entity state, causing authoritative names to be lost before downstream consumers
    can access them. Consumers receive incomplete screening data with no indication of missing authoritative
    names.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Immutable name preservation layer would prevent loss but increase storage
- id: BD-096
  type: BA/DK
  content: 'INTERACTION: [BD-070] × [BD-061] × [BD-029] → Dataset language encoding affects downstream
    name processing'
  rationale: BD-070 defaults context.lang from dataset.data.lang, encoding language assumptions at context
    creation. BD-061 specifies cp1252 encoding for French data to preserve accents (é, è, ç), and BD-029
    uses LLM with DSPy signatures for name cleaning. When context.lang incorrectly assumes UTF-8 for French
    data, cp1252-encoded characters may be misinterpreted during LLM name cleaning. The DSPy signature's
    behavior depends on language-accurate text input; garbled characters produce incorrect name normalizations,
    affecting entity matching for French entities. This interaction creates a French-specific data quality
    path where encoding assumptions at collection time propagate through to production accuracy.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Explicit encoding verification at context creation would catch mismatches early
- id: BD-097
  type: B
  content: 'INTERACTION: [BD-001] × [BD-021] → HTTP session isolation prevents cache poisoning between
    crawler threads'
  rationale: BD-001 ensures each crawler thread gets its own isolated HTTP session owned by context, preventing
    thread-safety issues. BD-021 caches HTTP responses with keys including URL, auth, method, and data.
    When sessions are isolated per thread, cached responses are also isolated—the same URL returning different
    content for different authenticated sessions won't cause cache poisoning. However, if context boundaries
    are violated (e.g., session sharing), authentication-state-dependent responses could be cached and
    served to wrong sessions. The isolation decision in BD-001 is what makes BD-021's caching strategy
    safe for multi-threaded crawling.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Authentication-aware cache keys would allow session sharing but add complexity
- id: BD-098
  type: BA
  content: 'INTERACTION: [BD-082] × [BD-083] × [BD-006] → Exception handling wraps entity loss in silent
    failure mode'
  rationale: BD-082 mandates context.begin() and context.close() for proper lifecycle management. BD-083
    shows Store.assemble wraps InvalidData exceptions, logs statements, and returns None instead of raising.
    BD-006 stores statements in LevelDB for fast sequential writes. When InvalidData exceptions occur
    in Store.assemble, the wrapped exception causes the entity to be silently dropped (return None), logged
    but not surfaced to callers, and never persisted to LevelDB. If context.close() is not properly called
    due to exception silencing, buffered entities may never be flushed. The combination creates a silent
    data loss scenario where entities disappear without pipeline failure or clear indication.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Strict exception propagation would fail loudly but halt batch processing
- id: BD-GAP-001
  type: T
  content: Period generation uses 6-month step intervals when crawling Bosnia-Herzegovina company registry
  rationale: Divides the full date range into manageable windows to avoid overwhelming the registry API;
    breaks if the registry imposes stricter rate limits or changes pagination semantics below 6 months.
  evidence: datasets/ba/companies/crawler.py:491(generate_periods)
  stage: crawl
  alternative_considered: 1-month step would increase freshness but double API calls; 12-month step would
    reduce calls but increase per-run data volume
- id: BD-GAP-002
  type: B
  content: 'City-first seeding strategy: crawl list of cities first, then crawl companies within each
    city sequentially'
  rationale: Registry requires city parameter to filter results; seeds cities independently to establish
    a known work queue; breaks if the registry adds hierarchical regions (e.g., cantons) that supersede
    cities.
  evidence: datasets/ba/companies/crawler.py:118(seed_city)
  stage: crawl
  alternative_considered: Direct company number range scan would bypass city enumeration but may hit rate
    limits
- id: BD-GAP-003
  type: B/RC
  content: Secret redirect param extracted by following full redirect chain before making data requests
  rationale: The registry issues a session token via redirect; must be captured before making query requests;
    breaks if the redirect chain length or parameter location changes.
  evidence: datasets/ba/companies/crawler.py:84(get_secret_param)
  stage: crawl
  alternative_considered: Hardcoding the token would be brittle; fetching fresh per batch adds latency
- id: BD-GAP-004
  type: B/BA
  content: 'Occupancy status priority: CURRENT > UNKNOWN > FORMER when merging multiple statuses from
    merged occupancies'
  rationale: PEP analysis wants to surface active influence over historical influence; treating CURRENT
    as best collapses nuance but simplifies downstream label generation; breaks when a person simultaneously
    holds a current and former position with different start dates.
  evidence: datasets/_analysis/ann_pep_positions/analyzer.py:39(get_best_influence_status)
  stage: analysis
  alternative_considered: Include each statuses as separate labels would increase entropy but improve
    precision
- id: BD-GAP-005
  type: BA
  content: 'Influence labels combine topic name with occupancy status using format ''{topic}: {status}'''
  rationale: Human-readable output for analyst review; breaks if topic names contain colons or if downstream
    consumers expect machine-readable keys instead of strings.
  evidence: datasets/_analysis/ann_pep_positions/analyzer.py:59(format_influence_label)
  stage: analysis
  alternative_considered: Structured tuple (topic, status) would be machine-readable but harder to eyeball
- id: BD-GAP-006
  type: B/DK
  content: GB PSC base data and PSC statements are parsed as separate data sources then combined in the
    crawl
  rationale: Companies House publishes these as separate CSV downloads with different schemas; combining
    requires matching on company number; breaks if either download changes format or has different publication
    cadence.
  evidence: datasets/gb/coh/psc_parse.py:91(parse_base_data)
  stage: crawl
  alternative_considered: Stream interleaving would reduce memory but complicate debugging
- id: BD-GAP-007
  type: BA
  content: Company number prefixed with 'gb.coh.' to form canonical entity ID
  rationale: Namespace prefix prevents collisions with other datasets; breaks if company numbers ever
    reuse or if the jurisdiction code 'gb' changes.
