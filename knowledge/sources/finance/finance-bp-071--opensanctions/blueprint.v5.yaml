  stage: crawl
  alternative_considered: UUID would avoid collisions but lose human readability
- id: BD-GAP-008
  type: T
  content: HTTP GET with configurable cache_days (None = no cache) for disqualified officers crawl
  rationale: Reduces redundant network calls for frequently-accessed pages; None disables cache entirely
    for always-fresh data; breaks if the source page changes between cache expiry and intended re-crawl.
  evidence: datasets/gb/coh/disqualified.py:26(http_get)
