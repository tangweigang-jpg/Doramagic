# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-071
name: OpenSanctions
sop_version: '3.6'
source:
  projects:
  - opensanctions
  commit_hash: e058206518b6617b0c42a4ad6edfeedc413468be
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Sanctions and PEP data aggregation, parsing, cleaning, deduplication, and multi-format export
  description: OpenSanctions aggregates sanctions data, politically exposed persons (PEP), and related
    entities from multiple sources into a unified FollowTheMoney-based database with change detection
    and multi-format export capabilities.
  prerequisites: Understanding of FollowTheMoney schema, Python development environment, Docker for containerized
    execution, basic knowledge of sanctions/PEP data concepts
  not_suitable_for: Real-time sanctions screening, individual entity lookup queries (use yente API instead),
    non-financial compliance use cases unrelated to sanctions/PEP
  activation:
    triggers:
    - Creating a new dataset crawler for government KYC/AML data
    - Onboarding a new sanctions list or PEP source
    - Adding entity types or properties to an existing crawler
    - Debugging data quality issues in crawler output
    emphasis:
    - Use ESPECIALLY when the source data is semi-structured government data with inconsistencies and
      manual data entry errors
    - Use when strict interpretation is required for compliance screening
    - Use when data cleaning decisions need to be declarative and auditable
    anti_skip:
    - Don't skip lookups because the source has 'clean enough' data - even minor inconsistencies should
      be documented
    - Don't skip assertions because they prevent silent regressions that erode data quality over time
    - Don't skip fail-fast behavior because 'close enough' data in sanctions lists can cause real harm
      in screening
stages:
- id: data_collection
  name: Data Collection
  order: 1
  responsibility: Fetch source data from HTTP endpoints, cache responses, and provide retrieval API. Separation
    of fetch logic allows caching, retries, and different backends (Zyte API vs standard requests) without
    affecting downstream processing.
  interface:
    inputs:
    - URL strings, HTTP configuration (auth, headers, retries)
    outputs:
    - Raw response content (text, JSON, HTML), cached file paths
  required_methods:
  - name: Context.fetch_response
    description: Fetches HTTP response with caching and retry logic based on configured backend
    evidence: zavod/zavod/context.py:60(self.http=make_session)
  - name: Context.http
    description: HTTP session property for making web requests with configured authentication and headers
    evidence: zavod/zavod/context.py:42(Context)
  - name: HTTP.configure
    description: Configures per-dataset HTTP settings including authentication, headers, and retry parameters
    evidence: zavod/zavod/meta/http.py:10
  key_behaviors:
  - behavior: Cache uses request fingerprint
    description: Cache key is computed from URL+method+body fingerprint to distinguish POST requests with
      same URL but different body content
    evidence: zavod/zavod/extract/zyte_api.py:195(get_cache_fingerprint)
  - behavior: Context owns HTTP session
    description: Each Context instance owns its HTTP session rather than sharing global session, avoiding
      threading issues and simplifying dependency injection
    evidence: zavod/zavod/context.py:60(self.http=make_session)
  - behavior: Backend-agnostic fetching
    description: fetch_response can use standard requests or Zyte API backend based on configuration,
      enabling both development and production scraping
    evidence: zavod/zavod/extract/zyte_api.py:155(ZyteAPIRequest)
  replaceable_points:
  - name: HTTP backend
    description: fetch_response method can use different HTTP backends depending on environment and requirements
    options:
    - name: requests.Session
      traits:
      - synchronous
      - simple
      - no external dependencies
      fit_for:
      - development
      - simple websites
      - non-javascript pages
      not_fit_for:
      - javascript-rendered pages
      - bot-protected sites
      - high-volume production
    - name: ZyteAPI
      traits:
      - cloud-based
      - handles javascript
      - bot protection bypass
      fit_for:
      - production scraping
      - complex websites
      - high reliability needs
      not_fit_for:
      - development
      - budget-constrained projects
      - simple static pages
    default: requests.Session
  design_decisions:
  - 'Context owns the HTTP session and cache rather than a separate service (evidence: zavod/zavod/context.py:60(self.http=make_session))
    — Avoids threading issues with shared sessions, simpler dependency injection for crawlers'
  - 'Cache uses request fingerprint (URL+method+body) as key (evidence: zavod/zavod/extract/zyte_api.py:195(get_cache_fingerprint))
    — POST requests with same URL but different body are distinct; fingerprint captures idempotency key'
  acceptance_hints:
  - HTTP requests complete successfully with proper caching on repeat calls
  - Fingerprint-based cache correctly distinguishes different POST bodies
  - Both requests.Session and ZyteAPI backends produce identical response content
- id: entity_construction
  name: Entity Construction
  order: 2
  responsibility: Parse raw data into Entity objects following FollowTheMoney schema with cleaning and
    validation. Ensures consistent entity structure across each datasets and enables downstream enrichment
    and deduplication.
  interface:
    inputs:
    - Raw data (dicts), Dataset metadata, Schema definitions
    outputs:
    - Entity objects with properties and statements
  required_methods:
  - name: Context.make
    description: Factory method that creates new Entity instances with dataset prefix and schema
    evidence: zavod/zavod/context.py:418
  - name: Entity.add_cast
    description: Adds property values with schema type casting, enabling incremental typing during crawling
      when full schema isn't known upfront
    evidence: zavod/zavod/entity.py:89(add_cast)
  - name: value_clean
    description: Applies cleaning rules to property values based on property type before storage
    evidence: zavod/zavod/runtime/cleaning.py:66
  key_behaviors:
  - behavior: Deterministic entity IDs
    description: Entity IDs are generated using prefix_hash_id from content, making IDs deterministic
      and enabling de-duplication across dataset versions
    evidence: zavod/zavod/context.py:437(make_id uses prefix_hash_id)
  - behavior: Schema evolution during crawling
    description: Entity.add_cast allows adding properties with schema type inference even when source
      data doesn't have complete schema upfront
    evidence: zavod/zavod/entity.py:89(add_cast)
  - behavior: Opt-in unsafe value storage
    description: unsafe_add() bypasses cleaning for pre-cleaned data to avoid double-cleaning, with explicit
      opt-in preventing accidental bypass
    evidence: zavod/zavod/entity.py:30(unsafe_add cleaned=False)
  replaceable_points:
  - name: Entity ID generation
    description: make_id() can use different ID generation strategies depending on requirements
    options:
    - name: prefixed_hash_id
      traits:
      - deterministic
      - collision-resistant
      - length-limited
      fit_for:
      - standard entities
      - cross-dataset uniqueness
      not_fit_for:
      - human-readable IDs needed
      - external system integration
    - name: join_slug
      traits:
      - human-readable
      - potentially non-deterministic
      fit_for:
      - legacy compatibility
      - debugging scenarios
      not_fit_for:
      - production deduplication
      - cross-version matching
    default: prefixed_hash_id
  - name: Value cleaning pipeline
    description: value_clean() applies different cleaning rules based on property type and schema
    options:
    - name: default cleaning
      traits:
      - format validation
      - XSS prevention
      fit_for:
      - standard properties
      not_fit_for:
      - pre-cleaned data
    - name: names
      traits:
      - space required
      - reject special chars
      fit_for:
      - Person name properties
      not_fit_for:
      - identifiers, addresses
    - name: identifiers
      traits:
      - minimal transformation
      fit_for:
      - ID numbers, codes
      not_fit_for:
      - names, addresses
    default: default cleaning
  design_decisions:
  - 'Entities use hash-based IDs via make_id() with prefix from dataset (evidence: zavod/zavod/context.py:437(make_id
    uses prefix_hash_id)) — Deterministic IDs from content allow de-duplication across versions; prefix
    prevents collisions between datasets'
  - 'Entity.add_cast() allows schema evolution during crawling (evidence: zavod/zavod/entity.py:89(add_cast))
    — Source data may not have complete schema upfront; cast enables incremental typing'
  - 'unsafe_add() bypasses cleaning for pre-cleaned data (evidence: zavod/zavod/entity.py:30(unsafe_add
    cleaned=False)) — Avoids double-cleaning when data already normalized; explicit opt-in prevents accidental
    bypass'
  acceptance_hints:
  - Entities created with same content produce identical IDs across runs
  - Schema types correctly inferred from property values
  - Cleaning rules applied based on property type (names, identifiers, etc.)
- id: statement_storage
  name: Statement Storage
  order: 3
  responsibility: Emit and persist entity statements to LevelDB with version tracking and timestamps.
    FollowTheMoney uses statement-based model where each property value is a separate statement, enabling
    granular change detection and data lineage.
  interface:
    inputs:
    - Entity objects with statements
    outputs:
    - Serialized statements to LevelDB, timestamp index
  required_methods:
  - name: Context.emit
    description: Writes entity statements to LevelDB storage via PackStatementWriter for persistence
    evidence: zavod/zavod/context.py:547
  - name: Store.assemble
    description: Assembles entities from stored statements for reading back from LevelDB
    evidence: zavod/zavod/store.py:37-48
  - name: TimeStampIndex.record
    description: Indexes first_seen timestamps per statement for incremental crawl change detection
    evidence: zavod/zavod/runtime/timestamps.py:36(key=f'{entity_id}:{stmt_id}')
  key_behaviors:
  - behavior: Statement-level atomic storage
    description: Statements (not entities) are the atomic storage unit, enabling granular versioning and
      change tracking per property value
    evidence: zavod/zavod/context.py:75(PackStatementWriter writes statements)
  - behavior: Timestamp tracking for delta detection
    description: TimeStampIndex tracks first_seen per entity+statement combination, enabling incremental
      crawls by detecting which statements existed in previous version
    evidence: zavod/zavod/runtime/timestamps.py:36(key=f'{entity_id}:{stmt_id}')
  - behavior: LevelDB for fast sequential writes
    description: LevelDB provides efficient ordered iteration for statement range queries and streaming
      writes without ORM overhead
    evidence: zavod/zavod/store.py:25(__init__ uses nomenklatura.store.level)
  replaceable_points:
  - name: Statement serialization format
    description: PackStatementWriter handles statement encoding to LevelDB
    options:
    - name: packed binary
      traits:
      - compact
      - fast serialization
      fit_for:
      - production storage
      - large datasets
      not_fit_for:
      - debugging
      - human inspection
    - name: json
      traits:
      - human-readable
      - debuggable
      fit_for:
      - development
      - small datasets
      not_fit_for:
      - production storage
      - large volumes
    default: packed binary
  design_decisions:
  - 'Statements stored in LevelDB (not relational) for fast sequential writes (evidence: zavod/zavod/context.py:66(_writer_path)
    uses PackStatementWriter) — Statement-per-row format enables streaming writes and efficient versioning
    without ORM overhead'
  - 'TimestampIndex tracks first_seen per entity+statement for delta detection (evidence: zavod/zavod/runtime/timestamps.py:36(key=f''{entity_id}:{stmt_id}''))
    — Enables incremental crawls by detecting which statements existed in previous version'
  - 'Store uses plyvel for embedded key-value storage (evidence: zavod/zavod/store.py:25(__init__ uses
    nomenklatura.store.level)) — LevelDB provides efficient ordered iteration, perfect for statement range
    queries'
  acceptance_hints:
  - Every entity statements successfully written to LevelDB
  - Timestamp index correctly tracks first_seen per statement
  - Store.assemble correctly reconstructs entities from statements
- id: exporting
  name: Data Exporting
  order: 4
  responsibility: Transform stored statements into various output formats (FtM, CSV, JSON, etc.) for downstream
    consumption. Pluggable exporters allow format flexibility without changing core logic, supporting
    both raw statement exports and consolidated entity views.
  interface:
    inputs:
    - Store View with consolidated entities
    outputs:
    - Files in various formats (FtM, CSV, nested JSON, etc.)
  required_methods:
  - name: export_data
    description: 'Orchestrates exporter pipeline: setup, feed loop, finish - main entry point for export
      process'
    evidence: zavod/zavod/exporters/__init__.py:51
  - name: Exporter.feed
    description: Template method receiving entities, implemented by specific exporters for format generation
    evidence: zavod/zavod/exporters/common.py:26(feed raises NotImplementedError)
  - name: consolidate_entity
    description: Merges duplicate entities based on linker resolution, mutating entity in-place after
      raw data export
    evidence: zavod/zavod/exporters/consolidate.py:93(consolidate_entity mutates)
  key_behaviors:
  - behavior: Consolidation ordering enforced
    description: feed_unconsolidated MUST be called before consolidate_entity mutates entity, ensuring
      raw statement access before linker resolution
    evidence: zavod/zavod/exporters/__init__.py:75-80(ordering enforced)
  - behavior: Exporter registry for config-driven selection
    description: Datasets specify exports in YAML config, registry enables dynamic instantiation of exporter
      classes
    evidence: zavod/zavod/exporters/__init__.py:35(EXPORTERS dict)
  - behavior: ViewFragment caching for multi-exporter access
    description: ViewFragment caches inverted index per entity for nested property lookups, avoiding repeated
      index scans
    evidence: zavod/zavod/exporters/fragment.py:33(get_inverted)
  replaceable_points:
  - name: Export format
    description: Dataset config specifies which exporters to run, supporting multiple formats simultaneously
    options:
    - name: FtMExporter
      traits:
      - native format
      - full fidelity
      fit_for:
      - nomenklatura integration
      - ' downstream processing'
      not_fit_for:
      - human inspection
      - simple CSV analysis
    - name: SimpleCSVExporter
      traits:
      - flattened
      - spreadsheet-compatible
      fit_for:
      - Excel analysis
      - simple queries
      not_fit_for:
      - hierarchical data
      - statements with provenance
    - name: NestedTargetsJSONExporter
      traits:
      - nested structure
      - relationship-aware
      fit_for:
      - API consumption
      - graph visualization
      not_fit_for:
      - flat data analysis
      - large-scale processing
    - name: StatementsCSVExporter
      traits:
      - raw statements
      - no consolidation
      fit_for:
      - audit trails
      - delta analysis
      not_fit_for:
      - entity-centric analysis
    - name: DeltaExporter
      traits:
      - change-focused
      - ADD/MOD/DEL
      fit_for:
      - incremental updates
      - sync pipelines
      not_fit_for:
      - full dataset replacement
    default: FtMExporter + NestedTargetsJSONExporter
  - name: Consolidation strategy
    description: Entity consolidation via nomenklatura resolver affects how duplicates are merged
    options:
    - name: linker consolidation
      traits:
      - semantic matching
      - cross-dataset merging
      fit_for:
      - production datasets
      - de-duplication needed
      not_fit_for:
      - raw output required
      - audit scenarios
    - name: no consolidation
      traits:
      - preserves original
      - no merges
      fit_for:
      - debugging
      - audit trails
      not_fit_for:
      - production deduplication
    default: linker consolidation
  design_decisions:
  - 'feed_unconsolidated called BEFORE consolidation for raw access (evidence: zavod/zavod/exporters/__init__.py:78(feed_unconsolidated
    before consolidate)) — Some exporters (StatementsCSVExporter) need unmerged original data before linker
    resolves duplicates'
  - 'Exporter registry maps string names to classes for config-driven selection (evidence: zavod/zavod/exporters/__init__.py:35(EXPORTERS
    dict)) — Datasets specify exports in YAML config, registry enables dynamic instantiation'
  - 'ViewFragment caches inverted index per entity for nested property lookups (evidence: zavod/zavod/exporters/fragment.py:33(get_inverted))
    — Multiple exporters accessing same entity''s inverse relationships avoids repeated index scans'
  - 'consolidate_entity mutates entity in-place after feed_unconsolidated (evidence: zavod/zavod/exporters/consolidate.py:93(consolidate_entity
    mutates)) — Avoids copying entities; calling order enforces correct data access pattern'
  acceptance_hints:
  - 'Export ordering: feed_unconsolidated completes before consolidate_entity begins'
  - Multiple exporters can run simultaneously without interference
  - Output files contain correct checksums computed from content
- id: delta_computation
  name: Delta Computation
  order: 5
  responsibility: Compute entity-level changes between dataset versions using content hashing. Downstream
    systems need to know what changed (ADD/MOD/DEL) without re-downloading full dataset.
  interface:
    inputs:
    - Current entities, Previous hash file
    outputs:
    - Delta file with ADD/MOD/DEL operations per entity
  required_methods:
  - name: HashDelta.compute
    description: Computes SHA1 hashes of entity content for comparison with previous version
    evidence: zavod/zavod/runtime/delta.py:17
  - name: HashDelta.backfill
    description: Loads previous version hashes into LevelDB for efficient in-memory comparison
    evidence: zavod/zavod/runtime/delta.py:28(backfill loads prev hashes)
  - name: DeltaExporter.write
    description: Exports delta operations (ADD/MOD/DEL) to delta.ndjson file
    evidence: zavod/zavod/exporters/delta.py:10
  key_behaviors:
  - behavior: Content-based hashing
    description: Hash includes entity ID + schema + sorted properties for deterministic content-based
      diff
    evidence: zavod/zavod/runtime/delta.py:49-55(digest updates entity.id, schema, sorted props)
  - behavior: Efficient backfill loading
    description: Single backfill load of previous hashes into LevelDB enables in-memory comparison avoiding
      repeated file I/O for large datasets
    evidence: zavod/zavod/runtime/delta.py:28(backfill loads prev hashes)
  - behavior: Sorted iteration pairing
    description: LevelDB ordered iteration enables efficient entity-grouped comparison of prev+curr hashes
      in single pass
    evidence: zavod/zavod/runtime/delta.py:65(_collect uses iterator)
  replaceable_points:
  - name: Hash algorithm
    description: SHA1 for entity content fingerprinting can be swapped for different hash requirements
    options:
    - name: SHA1
      traits:
      - 40-char hex
      - collision-resistant for content
      fit_for:
      - standard use
      - legacy compatibility
      not_fit_for:
      - cryptographic security
      - adversarial scenarios
    - name: MD5
      traits:
      - 32-char hex
      - fast
      fit_for:
      - non-critical checksums
      not_fit_for:
      - security-sensitive
      - long-term storage
    - name: XXH64
      traits:
      - 64-bit
      - very fast
      - non-standard
      fit_for:
      - performance-critical scenarios
      not_fit_for:
      - cross-system compatibility
      - legacy integration
    default: SHA1
  design_decisions:
  - 'Hash includes entity ID + schema + sorted properties for content-based diff (evidence: zavod/zavod/runtime/delta.py:49-55(digest
    updates entity.id, schema, sorted props)) — Any property change produces different hash; sorted properties
    ensures consistent hashing regardless of add order'
  - 'Backfill loads previous version hashes into LevelDB for efficient lookup (evidence: zavod/zavod/runtime/delta.py:28(backfill
    loads prev hashes)) — Single backfill load then in-memory compare avoids repeated file I/O for large
    datasets'
  - 'Uses sorted iterator to pair prev+curr hashes per entity in single pass (evidence: zavod/zavod/runtime/delta.py:65(_collect
    uses iterator)) — LevelDB ordered iteration enables efficient entity-grouped comparison vs random
    access'
  acceptance_hints:
  - Identical entities produce identical hashes across versions
  - Property order changes do not affect hash output
  - ADD/MOD/DEL correctly classified based on hash comparison
- id: archival_publishing
  name: Archival and Publishing
  order: 6
  responsibility: Publish dataset artifacts to archive (GCS or filesystem) for distribution and backfill.
    Separates transient working data from published immutable versions; enables reproducibility and incremental
    processing.
  interface:
    inputs:
    - Exported files, version metadata
    outputs:
    - Published artifacts in archive backend
  required_methods:
  - name: publish_dataset
    description: Main orchestration for publishing artifacts to configured archive backend
    evidence: zavod/zavod/publish.py:37
  - name: ArchiveBackend.upload
    description: Uploads files to archive storage with versioning support
    evidence: zavod/zavod/archive/backend.py:49(ArchiveBackend)
  - name: ArchiveBackend.backfill
    description: Downloads published artifact to local disk for processing in subsequent runs
    evidence: zavod/zavod/archive/backend.py:30(backfill)
  key_behaviors:
  - behavior: Backend strategy pattern
    description: Same API works locally and in cloud; get_archive_backend() detects environment for filesystem
      vs GCS
    evidence: zavod/zavod/archive/backend.py:49(ArchiveBackend) vs :184(FileSystemBackend)
  - behavior: Republish for unchanged artifacts
    description: republish() copies within archive to avoid re-upload of unchanged blobs; GCS copy is
      instant operation
    evidence: zavod/zavod/archive/backend.py:104(republish)
  - behavior: Multi-tier backfill fallback
    description: Backfill tries local path first, then remote archive, then legacy 'latest' fallback for
      resilient data retrieval
    evidence: zavod/zavod/archive/__init__.py:135-157
  replaceable_points:
  - name: Archive backend
    description: Storage backend selection depends on deployment environment and requirements
    options:
    - name: GoogleCloudBackend
      traits:
      - cloud-native
      - versioned
      - globally accessible
      fit_for:
      - production deployment
      - multi-user access
      not_fit_for:
      - local development
      - isolated environments
    - name: FileSystemBackend
      traits:
      - local
      - simple
      - no cloud setup
      fit_for:
      - development
      - single-machine deployment
      not_fit_for:
      - production
      - multi-user scenarios
    default: FileSystemBackend (dev)
  design_decisions:
  - 'Backend strategy pattern allows filesystem for dev, GCS for production (evidence: zavod/zavod/archive/backend.py:49(ArchiveBackend)
    vs :184(FileSystemBackend)) — Same API works locally and in cloud; get_archive_backend() detects environment'
  - 'republish() copies within archive to avoid re-upload of unchanged blobs (evidence: zavod/zavod/archive/backend.py:104(republish))
    — Large unchanged files don''t need re-upload; GCS copy is instant'
  - 'backfill() downloads published artifact to local disk for processing (evidence: zavod/zavod/archive/backend.py:30(backfill))
    — Processing code reads local files; backfill bridges archive and working directory'
  acceptance_hints:
  - Published artifacts include each required files with correct checksums
  - Unchanged files are republished via copy, not re-upload
  - Backfill successfully retrieves from correct tier (local, remote, or legacy)
data_flow:
- from_stage: data_collection
  to_stage: entity_construction
  data: Raw response content (text, HTML, JSON) + Dataset configuration
- from_stage: entity_construction
  to_stage: statement_storage
  data: Entity objects with properties containing statements
- from_stage: statement_storage
  to_stage: exporting
  data: Store View yielding consolidated entities from statements
- from_stage: statement_storage
  to_stage: delta_computation
  data: Current entity hashes written to hash file
- from_stage: exporting
  to_stage: archival_publishing
  data: Exported files (FtM, CSV, JSON) + metadata
- from_stage: delta_computation
  to_stage: archival_publishing
  data: Delta operations (ADD/MOD/DEL) per entity
global_contracts:
- contract: Every entities use FollowTheMoney schema model for type consistency (zavod/zavod/entity.py:16)
  evidence: ''
- contract: Entity IDs are deterministic from content using prefix-based hashing enabling cross-version
    de-duplication (zavod/zavod/context.py:437)
  evidence: ''
- contract: Statements are the atomic storage unit, not entities - each property value is a separate statement
    (zavod/zavod/context.py:75)
  evidence: ''
- contract: Dataset prefix must be unique across each datasets preventing ID collisions (zavod/zavod/meta/model.py:77)
  evidence: ''
- contract: Every exported files include SHA1 checksums computed from content for integrity verification
    (zavod/zavod/meta/dataset.py:116-125)
  evidence: ''
- contract: feed_unconsolidated must be called before consolidate_entity for each entity to ensure correct
    data access order (zavod/zavod/exporters/__init__.py:75-80)
  evidence: ''
- contract: Context.begin() must be called before entity emit; context.close() required for proper flush
    (zavod/zavod/context.py:107-142)
  evidence: ''
- contract: HashDelta generates entity hash from sorted (prop, values) pairs ensuring deterministic ordering
    (zavod/zavod/runtime/delta.py:46-63)
  evidence: ''
- contract: Archive backfill tries local path first, then remote archive, then legacy 'latest' fallback
    (zavod/zavod/archive/__init__.py:135-157)
  evidence: ''
business_decisions:
- id: BD-001
  type: B
  content: Context owns the HTTP session and cache rather than a separate service
  rationale: 'HTTP session lifecycle tied to crawler context prevents threading issues with shared sessions.
    Owning the cache within context enables simpler dependency injection for crawlers without requiring
    additional service instantiation or coordination. Boundary: each crawler thread gets its own isolated
    session and cache instance.'
  evidence: zavod/zavod/context.py:60(module)
  stage: data_collection
  alternative_considered: Shared session service with thread-safe locking would add complexity and potential
    bottlenecks
  _evidence_issues:
  - 'FN_NOT_FOUND: module in zavod/zavod/context.py'
- id: BD-002
  type: B
  content: Cache uses request fingerprint (URL+method+body) as key
  rationale: 'POST requests with same URL but different body are distinct cache entries; fingerprint captures
    idempotency key for correct cache behavior. Without body in key, different POST payloads would incorrectly
    return cached response. Boundary: only includes method, URL, and body; headers excluded to avoid over-specificity.'
  evidence: zavod/zavod/extract/zyte_api.py:195(get_cache_fingerprint)
  stage: data_collection
  alternative_considered: Using only URL would cause incorrect cache hits for POST requests with different
    payloads
- id: BD-003
  type: B
  content: Entities use hash-based IDs via make_id() with prefix from dataset
  rationale: 'Deterministic IDs derived from content enable de-duplication across dataset versions; identical
    content produces identical ID regardless of crawl timing. Prefix from dataset namespace prevents ID
    collisions when merging entities from different sources. Boundary: ID is content-hash, not surrogate
    key, so any property change creates new identity.'
  evidence: zavod/zavod/context.py:437(module)
  stage: entity_construction
  alternative_considered: Surrogate UUIDs would break deduplication since same entity crawled twice would
    have different IDs
  _evidence_issues:
