resources:
- id: res-slot-001
  type: replaceable_component
  name: web_scraping_backend
  path: null
  description: Use standard requests for accessible sources; use Zyte for bot-blocked
    sites. Zyte configured via OPENSANCTIONS_ZYTE_API_KEY.
  used_in_stages: []
  options:
  - name: Zyte API
    traits:
    - anti-bot-circumvention
    - browser-rendering
    - javascript-support
    - geolocation-targeting
    fit_for:
    - Websites with bot protection, JavaScript-heavy pages, geo-restricted content
    not_fit_for:
    - Simple HTML pages without bot protection, rate-limited APIs
  - name: Standard HTTP requests
    traits:
    - simple
    - fast
    - no-added-latency
    fit_for:
    - Public APIs, simple HTML pages, rate-limited government downloads
    not_fit_for:
    - Bot-protected websites, JavaScript-rendered content
  default: Standard HTTP requests (with Zyte as fallback)
  _source: worker_resource
- id: res-slot-002
  type: replaceable_component
  name: llm_extraction
  path: null
  description: Use OpenAI by default; Azure OpenAI for enterprise deployments via
    OPENSANCTIONS_AZURE_OPENAI_ENDPOINT.
  used_in_stages: []
  options:
  - name: OpenAI GPT-4o
    traits:
    - vision
    - structured-output
    - high-quality
    fit_for:
    - Image/PDF extraction, complex unstructured data parsing
    not_fit_for:
    - Simple structured data, high-volume batch processing
  - name: Azure OpenAI
    traits:
    - enterprise-compliance
    - vision
    - structured-output
    fit_for:
    - Enterprise environments requiring Azure compliance
    not_fit_for:
    - Non-Azure deployments
  default: OpenAI GPT-4o
  _source: worker_resource
- id: res-slot-003
  type: replaceable_component
  name: database
  path: null
  description: Use SQLite for simple crawls; PostgreSQL for production UI/review systems.
    Override with OPENSANCTIONS_DATABASE_URI.
  used_in_stages: []
  options:
  - name: SQLite
    traits:
    - embedded
    - zero-config
    - single-writer
    fit_for:
    - Single-node crawlers, development, small-scale deployments
    not_fit_for:
    - Multi-node crawlers, high concurrency, large datasets
  - name: PostgreSQL
    traits:
    - server-based
    - concurrent
    - scalable
    fit_for:
    - Production multi-node crawlers, UI backend, high concurrency
    not_fit_for:
    - Simple single-machine crawls
  default: SQLite (sqlite:///data/zavod.sqlite3)
  _source: worker_resource
- id: res-slot-004
  type: replaceable_component
  name: wikidata_integration
  path: null
  description: Configure ZAVOD_WD_* tokens for write access. Set disabled if Wikidata
    integration not needed.
  used_in_stages: []
  options:
  - name: Wikimedia API (read/write)
    traits:
    - read-write
    - oauth-auth
    - structured-data
    fit_for:
    - PEP enrichment, Wikidata linking, contributing back changes
    not_fit_for:
    - Read-only deployments (can disable)
  default: Enabled with OAuth
  _source: worker_resource
- id: res-slot-005
  type: replaceable_component
  name: entity_matching
  path: null
  description: Core data model - not replaceable without major rewrite.
  used_in_stages: []
  options:
  - name: followthemoney + nomenklatura
