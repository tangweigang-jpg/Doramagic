id: finance-bp-071
name: OpenSanctions/zavod
sop_version: '3.6'
source:
  projects:
  - opensanctions
  commit_hash: e058206518b6617b0c42a4ad6edfeedc413468be
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Sanctions list aggregation, PEP detection, entity extraction, and cross-dataset
    matching
  description: OpenSanctions aggregates sanctions lists, PEP data, and related entities
    from multiple external sources, extracts structured entities using FollowTheMoney
    schema, enriches them through cross-dataset matching, and exports them in multiple
    formats for downstream consumption.
  prerequisites: Users should understand FollowTheMoney entity schema, HTTP-based
    data fetching, and basic sanctions/PEP concepts. Dataset configurations require
    YAML knowledge.
  not_suitable_for: Real-time sanctions screening (use yente API instead), non-structured
    data sources without custom crawlers, real-time monitoring workflows
  activation:
    triggers:
    - New sanctions list or PEP data source needs to be ingested
    - Existing crawler needs updates due to source schema changes
    - New fields appear in source data (surfaced by audit_data warnings)
    emphasis:
    - Use zavod crawlers ESPECIALLY when ingesting government-published semi-structured
      data with inconsistencies and manual data entry errors
    - Apply the 'fail loudly' principle ESPECIALLY when encountering ambiguous data
      that could corrupt downstream KYC/AML screening
    - Use lookups to document data cleaning decisions in YAML CONFIG ESPECIALLY when
      source has known non-standard values
    anti_skip:
    - Don't skip assertions validation because crawler ran without errors — assertions
      catch silent regressions in entity counts
    - Don't skip audit_data because code 'looks correct' — audit_data surfaces source
      schema changes that would otherwise go unnoticed
    - Don't skip entity ID considerations because 'it's just internal' — IDs are stable
      keys for downstream enrichment and changing them breaks consumer links
stages:
- id: dataset_loading
  name: Dataset Configuration Loading
  order: 1
  responsibility: Load and validate dataset metadata from YAML configuration files,
    providing the dataset context for each subsequent stages. This stage ensures each
    datasets have proper naming conventions, publisher information, and export configurations
    before any processing begins.
  interface:
    inputs: Dataset YAML files, Catalog index
    outputs: Configured Dataset objects with metadata, lookups, and resources
  required_methods:
  - name: ArchiveBackedCatalog.get_dataset
    description: Retrieves a dataset configuration by name from the cached catalog
      of YAML-based dataset definitions
    evidence: zavod/zavod/meta/catalog.py:10
  - name: ZavodDatasetModel.validate
    description: Validates dataset model configuration including exports, prefix naming,
      and publisher metadata
    evidence: zavod/zavod/meta/model.py:36
  - name: get_catalog
    description: Returns the global dataset catalog with lazy loading to avoid upfront
      memory allocation
    evidence: zavod/zavod/meta/__init__.py:16
  key_behaviors:
  - behavior: Lazy catalog loading
    description: The catalog loads datasets on-demand rather than each at once, reducing
      memory footprint during single-dataset runs
    evidence: zavod/zavod/meta/__init__.py:16(get_catalog)
  - behavior: Reverse-DNS prefix validation
    description: Dataset names must follow reverse-DNS convention to prevent ID collisions
      across datasets in shared storage
    evidence: zavod/zavod/meta/model.py:77(check_prefix)
  replaceable_points:
  - name: catalog_backend
    description: Storage backend for dataset catalog
    options:
    - name: ArchiveBackedCatalog
      traits:
      - Persistent YAML caching
      - Lazy loading
      - Version-aware
      fit_for:
      - Production deployments
      - Multi-dataset processing
      not_fit_for:
      - Testing with dynamic configs
    - name: InMemoryCatalog
      traits:
      - In-memory only
      - Fast access
      - No persistence
      fit_for:
      - Unit testing
      - Single-run scripts
      not_fit_for:
      - Production runs requiring catalog persistence
    default: ArchiveBackedCatalog
  design_decisions:
  - YAML-based configuration enables declarative dataset definitions without code
    changes; separation of config from logic (zavod/zavod/meta/catalog.py:14)
  - Lazy catalog loading avoids loading each datasets upfront; reduces memory footprint
    during single-dataset runs (zavod/zavod/meta/__init__.py:16)
  - Prefix validation in model enforces naming conventions to avoid ID collisions
    across datasets (zavod/zavod/meta/model.py:77)
  acceptance_hints:
  - Catalog loads without errors for each configured datasets
  - Dataset names pass reverse-DNS validation
  - Publisher metadata is present and valid for each datasets
- id: data_fetching
  name: External Data Fetching
  order: 2
  responsibility: Retrieve raw data from external sources with caching, retry logic,
    and authentication support. This stage wraps HTTP operations with resilience patterns
    to handle unreliable external data sources common in sanctions intelligence gathering.
  interface:
    inputs: URL strings, HTTP parameters, Authentication credentials
    outputs: Raw text/JSON/HTML responses, Cached files in dataset data folder
  required_methods:
  - name: Context.fetch
    description: Fetches HTTP resource with fingerprint-based caching and configurable
      retry/backoff
    evidence: zavod/zavod/context.py:196
  - name: Context.fetch_json
    description: Fetches and parses JSON response with automatic caching
    evidence: zavod/zavod/context.py:256
  - name: make_session
    description: Creates HTTP session with retry configuration and connection pooling
    evidence: zavod/zavod/runtime/http_.py:42
  key_behaviors:
  - behavior: Fingerprint-based caching
    description: Cache key derived from URL+params+method allows cache hits across
      parameter variations, avoiding redundant fetches
    evidence: zavod/zavod/context.py:196(fetch_response)
  - behavior: Method-specific redirect handling
    description: GET/OPTIONS follow redirects; HEAD does not; POST/PUT/PATCH/DELETE
      have no redirect policy, affecting crawler behavior
    evidence: zavod/zavod/context.py:225-232
  replaceable_points:
  - name: http_client
    description: HTTP request handler implementation
    options:
    - name: requests.Session
      traits:
      - Synchronous
      - Well-tested
      - Wide adoption
      fit_for:
      - Most crawlers
      - Batch processing
      not_fit_for:
      - High-throughput scenarios needing async
    - name: httpx.AsyncClient
      traits:
      - Async support
      - Modern API
      - HTTP/2 capable
      fit_for:
      - High-volume crawlers
      - I/O-bound workloads
      not_fit_for:
      - Simple synchronous crawlers
      - Legacy code compatibility
    default: requests.Session
  design_decisions:
  - Fingerprint-based caching with cache key derived from URL+params+method allows
    cache hits across parameter variations (zavod/zavod/context.py:196)
  - SQLite-backed cache persists across runs; avoids re-fetching stable data (zavod/zavod/settings.py:64)
  - Configurable retry with exponential backoff handles transient network failures
    and prevents overwhelming servers (zavod/zavod/settings.py:57-61)
  acceptance_hints:
  - External sources are fetched only once per unique fingerprint within TTL
  - Transient failures are retried with exponential backoff
  - Cached responses are returned when available
- id: entity_extraction
  name: Entity Extraction from Crawlers
  order: 3
  responsibility: Parse raw source data and emit structured entities following the
    FollowTheMoney schema. This stage transforms unstructured or semi-structured crawled
    data into typed, property-rich entity objects with deterministic IDs for deduplication.
  interface:
    inputs: Raw response data (HTML, JSON, XML), Dataset context
    outputs: Entity objects with schema-conforming properties
  required_methods:
  - name: Context.make
    description: Factory method for creating new entities within dataset context,
      ensuring proper ID generation and schema initialization
    evidence: zavod/zavod/context.py:418
  - name: Context.emit
    description: Sends entity to statement store for persistence, validating schema
      compliance before storage
    evidence: zavod/zavod/context.py:547
  - name: Context.make_id
    description: Generates deterministic entity IDs from data components, enabling
      deduplication across runs
    evidence: zavod/zavod/context.py:437
  key_behaviors:
  - behavior: Statement-based entity storage
    description: Each property value stored as separate statement enables granular
      provenance and change tracking across versions
    evidence: zavod/zavod/entity.py:30(unsafe_add)
  - behavior: Hash-based entity IDs
    description: Deterministic IDs derived from dataset prefix and data components
      enable deduplication across runs
    evidence: zavod/zavod/context.py:437
  - behavior: Schema validation at emit time
    description: Schema hierarchy enforcement ensures data conforms to FollowTheMoney
      types before persistence
    evidence: zavod/zavod/entity.py:155(add_schema)
  replaceable_points:
  - name: entity_id_strategy
    description: Method for generating entity IDs
    options:
    - name: hash_based
      traits:
      - Deterministic
      - Deduplication-friendly
      - Opaque
      fit_for:
      - Most use cases
      - Cross-run consistency
      not_fit_for:
      - Human-readable ID requirements
    - name: slug_based
      traits:
      - Human-readable
      - Predictable
      fit_for:
      - User-facing identifiers
      not_fit_for:
      - Names with special characters
      - International names
    - name: external_id
      traits:
      - Preserves source ID
      - Traceable
      fit_for:
      - Regulatory compliance
      - Audit requirements
      not_fit_for:
      - Sources without stable IDs
    default: hash_based
  design_decisions:
  - Statement-based entity storage enables granular provenance and change tracking
    (zavod/zavod/entity.py:30)
  - Hash-based entity IDs with dataset prefix enable deduplication across runs (zavod/zavod/context.py:437)
  - Schema validation at emit time ensures FollowTheMoney type hierarchy compliance
    (zavod/zavod/entity.py:155)
  acceptance_hints:
  - Entities have valid FollowTheMoney schema types
  - Entity IDs are deterministic and prefixed with dataset name
  - Entities without properties are silently dropped (has_statements must be true)
  - Entity IDs must be non-null before emit is called
- id: name_cleaning
  name: Name Cleaning and Normalization
  order: 4
  responsibility: Clean, categorize, and normalize person/organization names using
    LLM-based extraction or rule-based methods. This stage improves data quality by
    handling complex naming patterns, language detection, and name categorization
    that raw crawlers cannot achieve.
  interface:
    inputs: Raw name strings, Entity schema information
    outputs: LangText objects with language-tagged clean names
  required_methods:
  - name: clean_names
    description: LLM-based name cleaning pipeline that extracts, categorizes, and
      normalizes names with language detection
    evidence: zavod/zavod/extract/names/clean.py:237
  - name: Names.extract
    description: Extracts structured name components (first, middle, last, prefix,
      suffix) from raw name strings
    evidence: zavod/zavod/extract/names/clean.py:32
  key_behaviors:
  - behavior: LLM-based name extraction
    description: Handles complex name patterns, language detection, and categorization
      that rule-based approaches cannot manage
    evidence: zavod/zavod/extract/names/clean.py:237
  - behavior: Language-tagged names
    description: LangText objects preserve language information for downstream processing
      and display
    evidence: zavod/zavod/extract/names/clean.py:18(LangText)
  - behavior: 100-day cache TTL for LLM extraction
    description: Extracted names are cached to reduce API costs, but stale data may
      result without cache invalidation
    evidence: zavod/zavod/extract/llm.py:99
  replaceable_points:
  - name: cleaning_method
    description: Name cleaning implementation approach
    options:
    - name: llm_based
      traits:
      - High accuracy
      - Handles complexity
      - Costly
      fit_for:
      - Multilingual data
      - Complex name patterns
      not_fit_for:
      - Cost-sensitive batch processing
      - Simple names
    - name: rule_based
      traits:
      - Fast
      - Cheap
      - Limited accuracy
      fit_for:
      - High-volume simple data
      - Cost-sensitive processing
      not_fit_for:
      - Complex international names
    - name: hybrid
      traits:
      - Balanced
      - Adaptive
      fit_for:
      - Mixed complexity data
      not_fit_for:
      - Pure simple or pure complex datasets
    default: llm_based
  design_decisions:
  - LLM-based name extraction handles complex name patterns and language detection
    (zavod/zavod/extract/names/clean.py:237)
  - Language-tagged names preserve language info for downstream processing (zavod/zavod/extract/names/clean.py:18)
  - DSPy signatures for prompts enable structured prompt definitions and versioning
    of extraction logic (zavod/zavod/extract/names/clean.py:204)
  acceptance_hints:
  - Names are extracted with proper language tags
  - Name categories (person vs organization) are correctly assigned
  - Cleaned names are cached and not re-extracted within TTL
- id: entity_enrichment
  name: Entity Enrichment and Matching
  order: 5
  responsibility: Match crawled entities against reference datasets using blocking
    and scoring algorithms. This stage enriches entity data with additional properties
    from authoritative sources and establishes cross-dataset relationships for comprehensive
    entity resolution.
  interface:
    inputs: Emitted entities from crawl, Reference dataset views
    outputs: Enriched entities with additional properties from matches
  required_methods:
  - name: enrich
    description: Main enrichment entry point invoked from crawl that orchestrates
      blocking, matching, and property merging
    evidence: zavod/zavod/runner/local_enricher.py:199
  - name: LocalEnricher.match_candidates
    description: Scores and ranks candidate matches from blocking index against query
      entity
    evidence: zavod/zavod/runner/local_enricher.py:96
  - name: save_match
    description: Records entity match relationships in the statement store with provenance
      tracking
    evidence: zavod/zavod/runner/local_enricher.py:173
  key_behaviors:
  - behavior: Blocking index for candidate selection
    description: Reduces comparison space from O(n^2) to O(n) for large datasets by
      indexing candidates before matching
    evidence: zavod/zavod/runner/local_enricher.py:93(candidates)
  - behavior: expand_wrapped for nested traversal
    description: Recursively expands related entities to enrich complete entity graphs
      rather than isolated entities
    evidence: zavod/zavod/runner/local_enricher.py:165
  - behavior: Topic-filtered enrichment
    description: Only entities with topics in ENRICH_TOPICS setting are processed;
      affects match coverage
    evidence: zavod/zavod/settings.py:30-39
  replaceable_points:
  - name: enricher_config
    description: Matching algorithm configuration
    options:
    - name: default_config
      traits:
      - Balanced precision/recall
      - Standard thresholds
      fit_for:
      - General purpose enrichment
      not_fit_for:
      - High-precision or high-recall requirements
    - name: strict_config
      traits:
      - High precision
      - Lower recall
      fit_for:
      - Compliance-critical matching
      not_fit_for:
      - Comprehensive coverage needs
    - name: permissive_config
      traits:
      - High recall
      - Lower precision
      fit_for:
      - Research applications
      not_fit_for:
      - Production compliance systems
    default: default_config
  design_decisions:
  - Blocking index for candidate selection reduces comparison space from O(n^2) to
    O(n) for large datasets (zavod/zavod/runner/local_enricher.py:93)
  - expand_wrapped recursively expands related entities to enrich complete entity
    graphs (zavod/zavod/runner/local_enricher.py:165)
  - nomenklatura resolver integration enables cross-dataset entity resolution (zavod/zavod/runner/local_enricher.py:96)
  acceptance_hints:
  - resolver.begin() is called before matching and rollback in finally block
  - Blocking index is built before matching begins
  - Entities without matching topics are skipped
- id: entity_storage
  name: Statement-Based Entity Storage
  order: 6
  responsibility: Persist entities as individual statements in LevelDB for efficient
    versioning and retrieval. This stage provides the durable storage layer that tracks
    entity provenance and enables delta computation between versions.
  interface:
    inputs: Entity objects, Statement metadata (first_seen, last_seen)
    outputs: Statement files (entities.ftm.json) in dataset data folder
  required_methods:
  - name: Context.emit
    description: Sends entity to statement store with timestamp tracking for persistence
    evidence: zavod/zavod/context.py:547
  - name: Store.sync
    description: Synchronizes store with emitted statements, checking dataset marker
      for re-indexing
    evidence: zavod/zavod/store.py:53
  - name: TimeStampIndex.index
    description: Indexes first_seen times for change detection between versions
    evidence: zavod/zavod/runtime/timestamps.py:26
  key_behaviors:
  - behavior: FollowTheMoney statement format
    description: Standardized format enables interoperability with nomenklatura ecosystem
      for cross-dataset operations
    evidence: zavod/zavod/entity.py:16(Entity)
  - behavior: LevelDB for statement storage
    description: Fast key-value store handles large statement volumes with append-only
      design supporting versioning
    evidence: zavod/zavod/store.py:25
  - behavior: Timestamp tracking per statement
    description: Each statement records first_seen and last_seen enabling delta computation
      and change detection
    evidence: zavod/zavod/context.py:93(timestamps)
  replaceable_points:
  - name: storage_backend
    description: Statement persistence layer
    options:
    - name: leveldb
      traits:
      - Fast key-value
      - Append-only
      - Versioning support
      fit_for:
      - Production workloads
      - Large datasets
      not_fit_for:
      - Distributed setups
      - Simple deployments
    - name: sqlite
      traits:
      - Portable
      - ACID compliant
      - Single-node
      fit_for:
      - Development
      - Small datasets
      not_fit_for:
      - High-throughput production
      - Large volumes
    - name: remote
      traits:
      - Centralized
      - Network accessible
      fit_for:
      - Distributed processing
      - Shared storage
      not_fit_for:
      - Local-only processing
      - Offline operation
    default: leveldb
  design_decisions:
  - FollowTheMoney statement format enables interoperability with nomenklatura ecosystem
    (zavod/zavod/entity.py:16)
  - LevelDB for statement storage provides fast key-value access with append-only
    versioning (zavod/zavod/store.py:25)
  - Timestamp tracking per statement enables delta computation and change detection
    between versions (zavod/zavod/context.py:93)
  acceptance_hints:
  - Every entity properties are stored as separate statements
  - Store.sync() checks dataset marker; subsequent syncs may skip re-indexing
  - Newly emitted statements require clear=True to appear in store view
- id: entity_consolidation
  name: Entity Consolidation and Deduplication
  order: 7
  responsibility: Simplify and normalize entity properties after loading from store,
    removing redundant data. This stage improves downstream quality by filtering weak
    aliases, normalizing name casing, and removing duplicate properties while respecting
    high-authority dataset requirements.
  interface:
    inputs: Raw Entity from store, Linker with cross-dataset references
    outputs: Consolidated Entity with simplified properties
  required_methods:
  - name: consolidate_entity
    description: Main consolidation pipeline combining date, name, and edge simplification
      operations
    evidence: zavod/zavod/exporters/consolidate.py:93
  - name: simplify_names
    description: Normalizes name case and removes weak aliases unless strong names
      do not exist
    evidence: zavod/zavod/exporters/consolidate.py:43
  - name: ViewFragment.get
    description: Returns cached view of entity context for efficient export iteration
      without re-consolidation
    evidence: zavod/zavod/exporters/fragment.py:15
  key_behaviors:
  - behavior: Dataset-specific name preservation
    description: High-authority datasets like OFAC SDN preserve names verbatim; customer
      expectations require no name modification
    evidence: zavod/zavod/exporters/consolidate.py:26
  - behavior: Weak alias filtering
    description: Short or unreliable names are removed unless no strong names exist,
      improving data quality
    evidence: zavod/zavod/exporters/consolidate.py:55
  - behavior: Fragment caching during export
    description: 1000-entity buffer cache avoids redundant consolidations when multiple
      exporters share entity context
    evidence: zavod/zavod/exporters/fragment.py:20
  replaceable_points:
  - name: consolidation_rules
    description: Property simplification rules
    options:
    - name: default
      traits:
      - Balanced simplification
      - Preserves high-authority names
      fit_for:
      - General exports
      not_fit_for:
      - Maximum deduplication
      - Maximum preservation
    - name: strict
      traits:
      - Aggressive deduplication
      - Minimal aliases
      fit_for:
      - Compact exports
      - Deduplication-focused
      not_fit_for:
      - Compliance contexts requiring each names
    - name: minimal
      traits:
      - Preserves most data
      - Minimal simplification
      fit_for:
      - Research datasets
      - Maximum information retention
      not_fit_for:
      - Compact outputs
    default: default
  design_decisions:
  - Dataset-specific name preservation for OFAC/UK/EU sanction lists due to customer
    expectations (zavod/zavod/exporters/consolidate.py:26)
  - Weak alias filtering removes short/unreliable names unless strong names do not
    exist (zavod/zavod/exporters/consolidate.py:55)
  - Fragment caching with 1000-entity buffer avoids redundant consolidations across
    exporters (zavod/zavod/exporters/fragment.py:20)
  acceptance_hints:
  - Names from NEVER_REMOVE_NAMES_DATASETS are preserved verbatim
  - Weak aliases are filtered when strong names exist
  - Consolidated entities are cached and reused efficiently
- id: export_rendering
  name: Multi-Format Export Rendering
  order: 8
  responsibility: Transform consolidated entities into various output formats for
    different consumers. This stage provides format flexibility by supporting multiple
    export schemas while ensuring the export pipeline order is maintained for exporters
    that need raw data before consolidation.
  interface:
    inputs: Consolidated Entity objects, ExportView with entity context
    outputs: Formatted files (JSON, CSV, FtM, nested JSON, etc.)
  required_methods:
  - name: export_data
    description: Orchestrates exporter instantiation and iteration over entities,
      calling lifecycle methods in correct order
    evidence: zavod/zavod/exporters/__init__.py:51
  - name: Exporter.feed
    description: Abstract base method for processing consolidated entities in format-specific
      implementations
    evidence: zavod/zavod/exporters/common.py:10
  - name: Exporter.finish
    description: Finalizes export, writing any buffered data and completing format-specific
      output
    evidence: zavod/zavod/exporters/common.py:10
  key_behaviors:
  - behavior: Plugin-based exporter architecture
    description: Registry pattern allows adding formats without modifying core; each
      exporter isolated in its own module
    evidence: zavod/zavod/exporters/__init__.py:35
  - behavior: feed_unconsolidated called before consolidation
    description: Some exporters (statements, statistics) need raw data before simplification,
      enforcing specific pipeline order
    evidence: zavod/zavod/exporters/__init__.py:75-80
  - behavior: Declarative exporter selection
    description: Dataset config specifies exports; enables format customization per
      dataset without code changes
    evidence: zavod/zavod/meta/model.py:13
  replaceable_points:
  - name: export_format
    description: Output format for entity data
    options:
    - name: ftm
      traits:
      - FollowTheMoney JSON Lines
      - nomenklatura compatible
      fit_for:
      - nomenklatura ecosystem
      - API feeds
      not_fit_for:
      - Human-readable output
    - name: nested
      traits:
      - Recursive relationships
      - Deep hierarchy
      fit_for:
      - Graph databases
      - Complex relationship exports
      not_fit_for:
      - Flat data requirements
    - name: csv
      traits:
      - Tabular format
      - Spreadsheet compatible
      fit_for:
      - Analysis in Excel
      - Legacy systems
      not_fit_for:
      - Nested data
      - Large volumes
    - name: senzing
      traits:
      - Entity resolution format
      - Senzing-compatible
      fit_for:
      - Senzing integrations
      not_fit_for:
      - General purpose exports
    - name: securities
      traits:
      - SEC/formatted
      - Regulatory format
      fit_for:
      - Regulatory filings
      not_fit_for:
      - General sanctions data
    default: ftm
  design_decisions:
  - Plugin-based exporter architecture with registry pattern allows adding formats
    without core modification (zavod/zavod/exporters/__init__.py:35)
  - feed_unconsolidated called before consolidation because some exporters need raw
    data before simplification (zavod/zavod/exporters/__init__.py:75-80)
  - Declarative exporter selection via dataset config enables format customization
    per dataset (zavod/zavod/meta/model.py:13)
  acceptance_hints:
  - 'Export pipeline follows correct order: setup → feed_unconsolidated → consolidate_entity
    → feed → finish'
  - Every declared export formats are generated
  - Exporter registry keys match FILE_NAME constants
- id: delta_computation
  name: Delta Generation Between Versions
  order: 9
  responsibility: Compute entity-level changes between current and previous dataset
    versions. This stage enables downstream consumers to efficiently track what changed
    without processing the entire dataset, supporting incremental sync and change
    notification workflows.
  interface:
    inputs: Current entities, Previous version statements
    outputs: Delta index and delta export files
  required_methods:
  - name: HashDelta.feed
    description: Computes entity-level diffs using hash comparison against previous
      state
    evidence: zavod/zavod/runtime/delta.py:46
  - name: HashDelta.backfill
    description: Loads previous version state before feeding current entities; must
      be called before any feed() calls
    evidence: zavod/zavod/runtime/delta.py:28
  - name: write_delta_index
    description: Generates delta index metadata with add/remove/modify operations
      for consumer tracking
    evidence: zavod/zavod/exporters/metadata.py:1
  key_behaviors:
  - behavior: Hash-based change detection
    description: Entity-level hashing enables fast diff without property-level comparison
      overhead
    evidence: zavod/zavod/runtime/delta.py:46
  - behavior: Separate delta index file
    description: Lightweight index enables consumers to fetch changes without downloading
      full dataset
    evidence: zavod/zavod/archive/__init__.py:1
  - behavior: backfill must precede feed
    description: Without backfill, delta generation has no previous hash state making
      each entities appear as ADD
    evidence: zavod/zavod/runtime/delta.py:28
  replaceable_points:
  - name: delta_granularity
    description: Level of change detection
    options:
    - name: entity_level
      traits:
      - Fast
      - Coarse-grained
      fit_for:
      - Most use cases
      - Performance-critical
      not_fit_for:
      - Property-level change tracking
    - name: property_level
      traits:
      - Detailed
      - Fine-grained
      fit_for:
      - Audit requirements
      - Property change tracking
      not_fit_for:
      - Performance-critical pipelines
    default: entity_level
  design_decisions:
  - Hash-based change detection uses entity-level hashing for fast diff without property-level
    comparison (zavod/zavod/runtime/delta.py:46)
  - Separate delta index file enables lightweight access to changes without full dataset
    download (zavod/zavod/archive/__init__.py:1)
  acceptance_hints:
  - backfill() is called before any feed() calls
  - Delta index correctly identifies adds, removes, and modifies
  - Without backfill, each entities incorrectly appear as ADD
- id: resource_management
  name: Resource and Metadata Management
  order: 10
  responsibility: Track exported files, write dataset index metadata, and manage artifact
    lifecycle. This stage ensures each produced artifacts are properly tracked and
    documented, enabling consumers to discover and validate dataset contents without
    scanning the filesystem.
  interface:
    inputs: Export files, Dataset configuration
    outputs: index.json, catalog.json, resources metadata
  required_methods:
  - name: write_dataset_index
    description: Generates index.json with resources, statistics, and metadata for
      dataset discovery
    evidence: zavod/zavod/exporters/metadata.py:100
  - name: DatasetResources.add
    description: Tracks exported resource files during export for lazy file listing
      without filesystem scan
    evidence: zavod/zavod/runtime/resources.py:14
  - name: DatasetIssues.log
    description: Aggregates errors and warnings during processing with structured
      TypedDict format
    evidence: zavod/zavod/runtime/issues.py:13
  key_behaviors:
  - behavior: Resource tracking for lazy file listing
    description: Avoids scanning filesystem twice; metadata written during export
      rather than after
    evidence: zavod/zavod/runtime/resources.py:14
  - behavior: Issue aggregation with TypedDict
    description: Structured issue format enables filtering, export, and reporting
      of processing problems
    evidence: zavod/zavod/runtime/issues.py:13
  replaceable_points:
  - name: metadata_format
    description: Index metadata format
    options:
    - name: json
      traits:
      - Machine readable
      - Wide tool support
      fit_for:
      - API consumers
      - Programmatic access
      not_fit_for:
      - Human editing
    - name: yaml
      traits:
      - Human readable
      - Editable
      fit_for:
      - Configuration files
      - Documentation
      not_fit_for:
      - API consumption
    default: json
  design_decisions:
  - Resource tracking for lazy file listing avoids scanning filesystem twice (zavod/zavod/runtime/resources.py:14)
  - Issue aggregation with TypedDict enables structured filtering and reporting (zavod/zavod/runtime/issues.py:13)
  acceptance_hints:
  - Every exported files are tracked in resources
  - index.json contains accurate statistics and resource list
  - Issues are properly categorized and aggregatable
- id: archival_publishing
  name: Archival and Publishing
  order: 11
  responsibility: Upload dataset outputs to long-term storage for distribution. This
    stage provides the final delivery mechanism that makes processed data available
    to consumers, supporting both production-scale cloud storage and local development
    workflows.
  interface:
    inputs: Exported files, Dataset version information
    outputs: Published resources in archive bucket with TTL
  required_methods:
  - name: publish_dataset
    description: Main publishing orchestrator that uploads resources and artifacts
      to configured backend
    evidence: zavod/zavod/publish.py:37
  - name: ArchiveBackend.upload
    description: Uploads file to archive storage with object versioning support
    evidence: zavod/zavod/archive/backend.py:49
  - name: ArchiveBackend.get_versions
    description: Retrieves version history for point-in-time recovery from GCS object
      generations
    evidence: zavod/zavod/archive/backend.py:62
  key_behaviors:
  - behavior: Dual backend support
    description: GCS for production scale; filesystem for local development and testing
    evidence: zavod/zavod/archive/backend.py:49
  - behavior: Version-based object naming
    description: GCS object generations enable point-in-time recovery for dataset
      rollback
    evidence: zavod/zavod/archive/backend.py:62
  - behavior: Artifact vs resource separation
    description: Internal artifacts excluded from public metadata; reduces client
      confusion about dataset contents
    evidence: zavod/zavod/publish.py:41
  replaceable_points:
  - name: archive_backend
    description: Storage backend for published data
    options:
    - name: GoogleCloudBackend
      traits:
      - Scalable
      - Versioned
      - Global access
      fit_for:
      - Production deployments
      - Large datasets
      not_fit_for:
      - Local development
      - Cost-sensitive small projects
    - name: FileSystemBackend
      traits:
      - Simple
      - Local
      - No cloud costs
      fit_for:
      - Local development
      - Testing
      - Small deployments
      not_fit_for:
      - Production scale
      - Global distribution
    default: FileSystemBackend
  design_decisions:
  - Dual backend support with GCS for production scale and filesystem for local development
    (zavod/zavod/archive/backend.py:49)
  - Version-based object naming with GCS object generations enables point-in-time
    recovery (zavod/zavod/archive/backend.py:62)
  - Artifact vs resource separation excludes internal artifacts from public metadata
    (zavod/zavod/publish.py:41)
  acceptance_hints:
  - Every resources are successfully uploaded to archive
  - Backend selection matches ARCHIVE_BACKEND setting
  - Published resources are accessible at expected paths
data_flow:
- from_stage: dataset_loading
  to_stage: data_fetching
  data: Dataset configuration with data URLs, HTTP settings, and crawler parameters
- from_stage: data_fetching
  to_stage: entity_extraction
  data: Raw HTTP responses and cached files containing sanctions list data
- from_stage: entity_extraction
  to_stage: name_cleaning
  data: Entity objects with raw, uncategorized name properties requiring normalization
- from_stage: name_cleaning
  to_stage: entity_extraction
  data: LangText objects with language-tagged, categorized clean name values
- from_stage: entity_extraction
  to_stage: entity_enrichment
  data: Emitted entities to statement store with schema-conforming properties
- from_stage: entity_enrichment
  to_stage: entity_storage
  data: Enriched entities with additional properties from cross-dataset matches
- from_stage: entity_storage
  to_stage: entity_consolidation
  data: Entity objects assembled from statements with full provenance
- from_stage: entity_consolidation
  to_stage: export_rendering
  data: Consolidated Entity with simplified properties, filtered aliases, and normalized
    values
- from_stage: export_rendering
  to_stage: delta_computation
  data: Export files and entity data for change detection against previous versions
- from_stage: delta_computation
  to_stage: resource_management
  data: Delta index with add/remove/modify operations and export file manifest
- from_stage: resource_management
  to_stage: archival_publishing
  data: Resources, index metadata, and artifacts ready for distribution
global_contracts:
- contract: Every entities use FollowTheMoney schema hierarchy with validated schema
    types (zavod/zavod/entity.py:16)
  evidence: ''
- contract: Entity IDs are prefixed with dataset name following reverse-DNS convention
    (zavod/zavod/context.py:437)
  evidence: ''
- contract: Every timestamps use ISO format with seconds precision via RUN_TIME_ISO
    (zavod/zavod/settings.py:27)
  evidence: ''
- contract: Statements track first_seen and last_seen for change detection between
    versions (zavod/zavod/runtime/timestamps.py:26)
  evidence: ''
- contract: Cache keys derived from request fingerprint enabling cache hits across
    parameter variations (zavod/zavod/context.py:395)
  evidence: ''
- contract: 'Context lifecycle: begin() must precede operations; flush() for periodic
    persistence; close() in finally block (zavod/zavod/context.py:107-130)'
  evidence: ''
- contract: 'Exporter pipeline order: setup() → feed_unconsolidated() → consolidate_entity()
    → feed() → finish() (zavod/zavod/exporters/__init__.py:68-86)'
  evidence: ''
- contract: Entity.emit() requires non-null entity.id and has_statements must be true
    (zavod/zavod/context.py:558-560)
  evidence: ''
- contract: HashDelta.backfill() must be called before any HashDelta.feed() calls
    (zavod/zavod/runtime/delta.py:28)
  evidence: ''
- contract: make_sanction() requires dataset.publisher.country and dataset.publisher.name
    to be set (zavod/zavod/helpers/sanctions.py:54-61)
  evidence: ''
- contract: Version timestamp set once at process start applies globally to each datasets
    in a run (zavod/zavod/settings.py:25-26)
  evidence: ''
business_decisions:
- id: BD-001
  type: B/BA
  content: YAML-based dataset configuration enables declarative definitions without
    code changes
  rationale: Separates configuration from code logic, allowing non-developers to define
    datasets. However, this assumes YAML parsing is stable and schema validation is
    comprehensive. Breaks if YAML structure changes or validation rules become too
    restrictive for edge cases.
  evidence: zavod/zavod/meta/catalog.py:14(load_yaml)
  stage: dataset_loading
  alternative_considered: JSON configuration was rejected in favor of YAML readability
    for non-technical users
- id: BD-002
  type: BA
  content: Lazy catalog loading defers dataset metadata until explicitly accessed
  rationale: Reduces memory footprint during single-dataset runs by loading only required
    metadata. However, this assumes catalog access patterns are sequential. Breaks
    under concurrent access or when full catalog scanning is needed for admin operations.
  evidence: zavod/zavod/meta/__init__.py:16(get_catalog)
  stage: dataset_loading
  alternative_considered: Eager loading was rejected due to memory overhead during
    single-dataset operations
- id: BD-003
  type: B/BA
  content: Dataset prefix validation enforces reverse-DNS naming to prevent ID collisions
  rationale: Naming convention ensures unique entity IDs across datasets sharing storage.
    Breaks if two datasets share the same prefix or if naming convention conflicts
    with upstream data provider conventions.
  evidence: zavod/zavod/meta/model.py:77(check_prefix)
  stage: dataset_loading
  alternative_considered: UUID-based IDs were rejected due to reduced human readability
    in debugging
- id: BD-004
  type: BA
  content: Fingerprint-based HTTP caching derives cache keys from URL, parameters,
    and method
  rationale: Enables cache hits across parameter variations without false positives.
    However, this assumes parameter order is consistent. Breaks if API providers change
    parameter semantics or ordering.
  evidence: zavod/zavod/context.py:196(fetch_response)
  stage: data_fetching
  alternative_considered: ETag-based caching was rejected due to inconsistent upstream
    support
- id: BD-005
  type: T
  content: SQLite-backed persistent HTTP cache survives process restarts
  rationale: Persistent cache avoids re-fetching stable reference data across runs.
    Changing to in-memory cache would reduce memory but lose persistence. No business
    logic depends on this storage choice.
  evidence: zavod/zavod/settings.py:64(DB_URL)
  stage: data_fetching
  alternative_considered: Redis was rejected due to operational complexity for this
    use case
  _evidence_issues:
  - 'FN_NOT_FOUND: DB_URL in zavod/zavod/settings.py'
- id: BD-006
  type: BA
  content: Exponential backoff retry logic handles transient network failures
  rationale: Prevents overwhelming servers while handling temporary failures gracefully.
    However, backoff parameters assume typical network conditions. Breaks under extremely
    slow connections or prolonged outages.
  evidence: zavod/zavod/settings.py:57(module)
  stage: data_fetching
  alternative_considered: Fixed retry intervals were rejected as they risk overwhelming
    servers
  _evidence_issues:
  - 'FN_NOT_FOUND: module in zavod/zavod/settings.py'
- id: BD-007
  type: B/DK
  content: Statement-based entity storage enables granular provenance tracking
  rationale: Each property stored separately allows precise change detection and attribution.
    However, this increases storage and processing overhead. Breaks if downstream
    consumers cannot handle the statement format.
  evidence: zavod/zavod/entity.py:30(unsafe_add)
  stage: entity_extraction
  alternative_considered: Flat entity storage was rejected due to loss of provenance
    information
- id: BD-008
  type: BA
  content: Hash-based deterministic entity IDs enable cross-run deduplication
  rationale: Same entity data generates same ID across runs, enabling automatic deduplication.
    However, hash collisions are theoretically possible and ID scheme is opaque. Breaks
    if upstream data format changes.
  evidence: zavod/zavod/context.py:437(make_id)
  stage: entity_extraction
  alternative_considered: Sequential IDs were rejected due to lack of determinism
    across environments
- id: BD-009
  type: M/BA
  content: LLM-based name extraction handles complex multilingual name patterns
  rationale: Named LLM approach extracts, categorizes, and detects language for names
    that rule-based systems cannot handle. However, this relies on specific model
    capabilities. Breaks if model behavior changes or API is unavailable.
  evidence: zavod/zavod/extract/names/clean.py:237(clean_names)
  stage: name_cleaning
  alternative_considered: Rule-based extraction was rejected due to poor multilingual
    support
- id: BD-010
  type: B/BA
  content: Language-tagged LangText format preserves language information for downstream
    processing
  rationale: Language metadata enables locale-appropriate display and matching. However,
    downstream exporters must handle language variants. Breaks if consumers expect
    single-language data.
  evidence: zavod/zavod/extract/names/clean.py:18(LangText)
  stage: name_cleaning
  alternative_considered: Plain string names were rejected due to loss of linguistic
    information
  vague_rationale: true
- id: BD-011
  type: BA
  content: DSPy signatures structure LLM prompts for reproducible extraction
  rationale: Versioned prompt definitions enable iteration and rollback of extraction
    logic. However, DSPy library coupling adds dependency. Breaks if DSPy API changes
    significantly.
  evidence: zavod/zavod/extract/names/clean.py:204(module)
  stage: name_cleaning
  alternative_considered: Inline prompts were rejected due to maintenance difficulties
  _evidence_issues:
  - 'FN_NOT_FOUND: module in zavod/zavod/extract/names/clean.py'
- id: BD-012
  type: BA
  content: Blocking index reduces entity matching complexity from O(n²) to O(n)
  rationale: Pre-indexing candidate entities dramatically reduces comparison space.
    However, blocking key selection affects match recall. Breaks if blocking keys
    are absent in many entities.
  evidence: zavod/zavod/runner/local_enricher.py:93(candidates)
  stage: entity_enrichment
  alternative_considered: Full comparison was rejected due to computational cost at
    scale
- id: BD-013
  type: B
  content: nomenklatura resolver integration enables cross-dataset entity resolution
  rationale: Shared resolver allows entities to be linked across datasets using common
    identifiers. However, this couples datasets together. Breaks if resolver schema
    differs between installations.
  evidence: zavod/zavod/runner/local_enricher.py:96(match_candidates)
  stage: entity_enrichment
  alternative_considered: Dataset-isolated matching was rejected due to fragmentation
    of entity identity
- id: BD-014
  type: B
  content: FollowTheMoney schema standardizes entity format for ecosystem interoperability
  rationale: Standardized format enables data sharing with nomenklatura and other
    FtM-compatible tools. However, schema flexibility is limited. Breaks if FtM schema
    doesn't support specific entity types.
  evidence: zavod/zavod/entity.py:16(Entity)
  stage: entity_storage
  alternative_considered: Custom schema was rejected due to loss of ecosystem compatibility
- id: BD-015
  type: T
  content: LevelDB append-only storage enables efficient statement versioning
  rationale: Fast key-value store handles large statement volumes with versioning
    support. Changing to SQL would alter query patterns but not business output. No
    precision or regulatory impact.
  evidence: zavod/zavod/store.py:25(__init__)
  stage: entity_storage
  alternative_considered: PostgreSQL was rejected due to overhead for this access
    pattern
- id: BD-016
  type: B/RC
  content: Timestamp tracking per statement enables delta computation and change detection
  rationale: first_seen and last_seen enable precise change tracking between versions.
    However, requires consistent clock across processes. Breaks if clock skew between
    crawl runs.
  evidence: zavod/zavod/context.py:93(timestamps)
  stage: entity_storage
  alternative_considered: Sequence numbers were rejected due to complexity of coordination
- id: BD-017
  type: BA
  content: NEVER_REMOVE_NAMES_DATASETS preserves verbatim names from high-authority
    sanction lists
  rationale: OFAC SDN, UK, EU sanction names preserved without simplification per
    customer expectations. However, governance rules are hardcoded. Breaks if new
    high-authority datasets need this treatment.
  evidence: zavod/zavod/exporters/consolidate.py:26(NEVER_REMOVE_NAMES_DATASETS)
  stage: entity_consolidation
  alternative_considered: Universal simplification was rejected due to customer requirements
    for authoritative lists
  _evidence_issues:
  - 'FN_NOT_FOUND: NEVER_REMOVE_NAMES_DATASETS in zavod/zavod/exporters/consolidate.py'
- id: BD-018
  type: BA
  content: Weak alias filtering removes unreliable names unless strong names exist
  rationale: Improves data quality by filtering short/unreliable names. However, thresholds
    are arbitrary. Breaks if legitimate short names (initials) are incorrectly filtered.
  evidence: zavod/zavod/exporters/consolidate.py:55(module)
  stage: entity_consolidation
  alternative_considered: No filtering was rejected due to quality concerns
  _evidence_issues:
  - 'FN_NOT_FOUND: module in zavod/zavod/exporters/consolidate.py'
- id: BD-019
  type: B
  content: Plugin-based exporter architecture enables format extensibility without
    core changes
  rationale: Registry pattern allows adding formats while isolating each exporter.
    However, registry must be manually updated. Breaks if exporters share state incorrectly.
  evidence: zavod/zavod/exporters/__init__.py:35(EXPORTERS)
  stage: export_rendering
  alternative_considered: Inheritance-only approach was rejected due to tight coupling
  _evidence_issues:
  - 'FN_NOT_FOUND: EXPORTERS in zavod/zavod/exporters/__init__.py'
- id: BD-020
  type: B/BA
  content: feed_unconsolidated called before consolidation in exporter pipeline
  rationale: Some exporters need raw data before simplification. Contract enforced
    through documentation. Breaks if new exporters assume consolidated data.
  evidence: zavod/zavod/exporters/__init__.py:75(module)
  stage: export_rendering
  alternative_considered: Two separate pipelines were rejected due to duplication
  _evidence_issues:
  - 'FN_NOT_FOUND: module in zavod/zavod/exporters/__init__.py'
- id: BD-021
  type: BA
  content: Declarative exporter selection in dataset configuration enables format
