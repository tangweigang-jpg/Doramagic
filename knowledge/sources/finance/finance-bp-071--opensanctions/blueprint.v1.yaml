  stage: position_categorization
  alternative_considered: only add to missing, skip empty mandates entirely
  _evidence_issues:
  - 'FN_NOT_FOUND: module in datasets/fr/senat/crawler.py'
- id: BD-090
  type: M/BA
  content: Parse dates using first token extraction (split maxsplit=1)
  rationale: Substring extraction assumes the first token is the date. This is a simple
    parsing heuristic that works when dates precede other information. Full date parsing
    or multiple format attempts would be more robust.
  evidence: datasets/fr/senat/crawler.py:123(module)
  stage: data_fetching
  alternative_considered: full date parsing, regex extraction, multiple format tries
  _evidence_issues:
  - 'FN_NOT_FOUND: module in datasets/fr/senat/crawler.py'
- id: BD-091
  type: T
  content: Filter CSV comment lines using first character check
  rationale: Prefix-based filtering assumes % indicates comments. Strip-and-check
    or regex would be equivalent but slower. This is a simple text parsing implementation
    that does not affect entity content.
  evidence: datasets/fr/senat/crawler.py:140(module)
  stage: data_fetching
  alternative_considered: strip and check, regex comment detection
  _evidence_issues:
  - 'FN_NOT_FOUND: module in datasets/fr/senat/crawler.py'
- id: BD-092
  type: M/BA
  content: Derive original_value via exact match or substring containment
  rationale: 'String containment matching assumes extracted names are substrings or
    exact copies of originals. The hidden assumption: name extraction preserves original
    text. Fuzzy matching would be more robust but slower.'
  evidence: zavod/zavod/helpers/names.py:434(module)
  stage: data_fetching
  alternative_considered: fuzzy matching, edit distance, Levenshtein
  _evidence_issues:
  - 'FN_NOT_FOUND: module in zavod/zavod/helpers/names.py'
- id: BD-093
  type: M/BA
  content: Use day_before(data_date) for expired ownership/directorship end dates
  rationale: 'Day-before offset is based on the assumption that ownership ends the
    day before the new record was seen. The mathematical insight: when record N+1
    appears, record N ended at N+1 minus one day. This affects directorship duration
    calculations.'
  evidence: contrib/egrul/generate.py:94(module)
  stage: data_fetching
  alternative_considered: use seen_date directly, use previous day of old date
  _evidence_issues:
  - 'FN_NOT_FOUND: module in contrib/egrul/generate.py'
- id: BD-094
  type: M/DK
  content: Reject names containing any character from reject_chars_consolidated
  rationale: Character set exclusion is based on the mathematical observation that
    certain characters indicate data quality issues (OCR errors, special characters
    that corrupt downstream systems). Whitelist approach would be safer but more restrictive.
  evidence: zavod/zavod/helpers/names.py:329(module)
  stage: name_cleaning
  alternative_considered: whitelist approach, Unicode category filtering
  _evidence_issues:
  - 'FN_NOT_FOUND: module in zavod/zavod/helpers/names.py'
- id: BD-095
  type: M/DK
  content: Check for nullwords unless explicitly allowed
  rationale: Nullword detection uses normalized comparison to filter non-name content.
    ML classification would be more accurate but require training data. This heuristic
    assumes nullwords indicate data quality issues.
  evidence: zavod/zavod/helpers/names.py:333(module)
  stage: name_cleaning
  alternative_considered: always allow, ML classification
  _evidence_issues:
  - 'FN_NOT_FOUND: module in zavod/zavod/helpers/names.py'
- id: BD-096
  type: B/DK
  content: Fail loudly on ambiguous data instead of silently emitting uncertain output
  rationale: This project imports sanctions lists and KYC/AML screening data used
    for compliance decisions. Silently emitting ambiguous data could lead to false
    positives/negatives in downstream screening. When a crawler encounters data it
    cannot interpret with confidence, it should crash or produce an error — this is
    preferable to polluting the dataset. Reconsider if use case shifts to exploratory
    data analysis where completeness trumps precision.
  evidence: datasets/CLAUDE.md:§Fail-loudly; CLAUDE.md:§Coding-hints
  stage: name_cleaning
  vague_rationale: true
- id: BD-097
  type: B
  content: Keep data cleaning decisions in YAML lookups rather than Python code
  rationale: Separating lookup tables from code makes data decisions auditable, reviewable,
    and modifiable without code changes. The strategy of 'start without lookups, note
    warnings, then add entries' documents why each override exists. This is especially
    important for sanctions data where decisions may have legal implications. Reconsider
    if the source has extremely high variance requiring complex programmatic cleaning
    beyond lookup capability.
  evidence: datasets/CLAUDE.md:§Lookups; datasets/CLAUDE.md:§Strategy
  stage: name_cleaning
  vague_rationale: true
- id: BD-098
  type: B
  content: Sanctions lists must not use LLM-based name cleaning; PEP lists may use
    it
  rationale: Sanctioned names are legal designations — any modification could change
    the meaning or applicability of sanctions. PEP names from government sources are
    often messy (inconsistent formatting, transcription errors) but not legally binding.
    Using human-reviewable methods (review_names system, explicit lookups) for sanctions
    maintains auditability. Reconsider if sanctioned name data quality degrades significantly
    and LLM cleaning becomes demonstrably more accurate than human review.
  evidence: datasets/CLAUDE.md:§Name-cleaning-strategy
  stage: entity_consolidation
  vague_rationale: true
- id: BD-099
  type: B/DK
  content: Entity IDs must be stable — never change existing crawler IDs without explicit
    agreement
  rationale: Entity IDs are the stable key used by downstream enrichment, deduplication,
    and API consumers. Changing IDs silently breaks those links, causing duplicate
    entities and lost relationships. If a source changes its own identifiers, migration
    requires explicit team agreement and documentation. Reconsider only if data privacy
    regulations require pseudonymization of existing IDs.
  evidence: datasets/CLAUDE.md:§Never-put-PII-into-make_slug; datasets/CLAUDE.md:§Do-not-change-entity-IDs
  stage: entity_consolidation
  vague_rationale: true
- id: BD-100
  type: B
  content: Sanctions and PEP use distinct entity patterns (Sanction vs Position/Occupancy)
  rationale: Sanctions lists designate specific persons/entities/vessels — each designation
    gets a Sanction entity linking to the sanctioned entity. PEP lists describe roles
    and who holds them — Position entities describe the role, Occupancy entities link
    Persons to Positions. This separation reflects the conceptual difference between
    a legal restriction (sanction) and a risk classification (PEP). Reconsider if
    datasets mix both concepts or if a new entity type better captures the data.
  evidence: datasets/CLAUDE.md:§Sanctions; datasets/CLAUDE.md:§Positions-and-Occupancies
  stage: sanction_or_pep_specific_handling
  vague_rationale: true
- id: BD-101
  type: B/RC
  content: PEP frequency is monthly (no schedule); sanctions frequency is daily with
    cron schedule
  rationale: PEP positions change less frequently than sanctions designations which
    can be updated daily by authorities. Monthly frequency for PEPs reduces unnecessary
    crawls while maintaining reasonable freshness. Daily sanctions with explicit cron
    schedules ensures timely updates for compliance use cases. Reconsider if a specific
    source has different update patterns documented by the publisher.
  evidence: datasets/CLAUDE.md:§The-YAML-metadata-file
  stage: resource_management
  vague_rationale: true
- id: BD-102
  type: B/BA
  content: Assertions bounds set to 80% (min) and 150% (max) of expected count initially
  rationale: Government data sources have natural variance — lists grow/shrink based
    on policy decisions, not just technical changes. Setting tight bounds initially
    would cause false assertion failures. Setting too loose bounds defeats the purpose
    of catching regressions. The 80%/150% ratio is a balance that catches significant
    data quality issues while allowing normal source variation. Reconsider per dataset
    based on actual variance observed after a few weeks of production runs.
  evidence: datasets/CLAUDE.md:§Assertions
  stage: resource_management
  vague_rationale: true
- id: BD-103
  type: B
  content: Use lxml exclusively for HTML/XML — never BeautifulSoup or stdlib xml
  rationale: lxml provides a sensibly-typed API with XPath support, consistent with
    zavod's HTML helpers. BeautifulSoup has unpredictable type handling. stdlib xml
    lacks namespace handling for government XML which often uses multiple namespaces.
    This standard ensures consistency across crawlers and compatibility with zavod.helpers.html.
    Reconsider only if a source uses a format lxml cannot parse and no alternative
    exists.
  evidence: CLAUDE.md:§Coding-hints; datasets/CLAUDE.md:§HTML/XML-parsing
  stage: data_fetching
  vague_rationale: true
- id: DW-001
  type: T
  content: Truncate text to 110 characters when uploading to data.world to ensure
    data fits within platform constraints
  rationale: The data.world platform likely has a field length limitation. By truncating
    at 110 characters, the uploader ensures each text fields can be successfully transmitted
    without data loss or upload failures.
  evidence: contrib/data.world/upload.py:19(truncate)
  stage: implementation
  alternative_considered: Could reject uploads with oversized fields instead of truncating
- id: DW-002
  type: BA
  content: Transfer datasets individually rather than in bulk to enable granular error
    handling per dataset
  rationale: Individual dataset transfer allows catching and handling errors per dataset
    rather than failing an entire batch. This design choice prioritizes partial success
    over complete failure.
  evidence: contrib/data.world/upload.py:27(transfer_dataset)
  stage: design
  alternative_considered: Bulk transfer with transaction rollback on any failure
- id: DD-001
  type: BA/M
  content: Normalize names by converting to lowercase and removing punctuation before
    deduplication matching
  rationale: Name variations due to case differences and punctuation (hyphens, periods)
    are common in real-world data. Normalization ensures equivalent names match during
    deduplication.
  evidence: contrib/dedupe/positions.py:19(norm_name)
  stage: implementation
  alternative_considered: Fuzzy matching with Levenshtein distance
- id: DD-002
  type: BA
  content: Cross-reference positions using external data sources to verify and enrich
    position information
  rationale: Relying solely on internal data may produce incomplete or incorrect position
    information. Cross-referencing with external sources (like crossref) improves
    data quality and coverage.
  evidence: contrib/dedupe/positions.py:32(crossref_positions)
  stage: design
  alternative_considered: Internal-only deduplication without external validation
- id: DD-003
  type: BA
  content: Use PEP (Politically Exposed Persons) name matching as primary deduplication
    strategy
  rationale: PEP entities are high-value targets requiring accurate identification.
    By prioritizing name-based matching for PEP entities, the system focuses resources
    on the most sensitive deduplication cases.
  evidence: contrib/dedupe/pep_by_name.py:22(cross_ref_dataset)
  stage: design
  alternative_considered: Equal treatment of each entity types in deduplication
- id: IA-001
  type: BA/DK
  content: Index job issues by extracting path information from issue names rather
    than using fixed identifiers
  rationale: Dynamic path extraction from issue names allows flexible indexing that
    adapts to varying issue naming conventions without code changes.
  evidence: contrib/issues_agent/tasks.py:18(get_path_from_name)
  stage: design
  alternative_considered: Fixed path structure derived from project configuration
- id: PP-001
  type: T
  content: Consolidate influence labels from multiple occupancy statuses by selecting
    the 'best' status per topic
  rationale: When multiple occupancy records exist for an entity, selecting the 'best'
    status provides a single authoritative label. This prevents confusion from multiple
    conflicting status indicators.
  evidence: datasets/_analysis/ann_pep_positions/analyzer.py:39(get_best_influence_status)
  stage: implementation
  alternative_considered: Preserve each statuses as a list rather than single value
- id: PP-002
  type: BA
  content: Handle merged occupancy entities by extracting the 'best' status from each
    component statuses
  rationale: Merged entities represent multiple original records combined. Choosing
    the most significant status ensures the merged entity reflects the most important
    relationship.
  evidence: datasets/_analysis/ann_pep_positions/analyzer.py:23(get_best_occupancy_status)
  stage: design
  alternative_considered: Flag merged entities rather than resolving status
- id: AN-001
  type: BA
  content: Categorize topics as 'graph' vs 'non-graph' based on whether they have
    entity relationship connections
  rationale: Graph-based topics require different analysis than non-graph topics.
    Separating them allows specialized processing appropriate to each category's characteristics.
  evidence: datasets/_analysis/ann_graph_topics/analyzer.py:11(non_graph_topics)
  stage: design
  alternative_considered: Uniform treatment of each topics regardless of graph nature
  vague_rationale: true
- id: AM-001
  type: BA/DK
  content: Emit entity links with explicit schema specification for Abuja MOU detention
    data
  rationale: Requiring schema specification ensures data consistency and enables proper
    entity type classification in the knowledge graph.
  evidence: datasets/_global/abuja_mou/detention/crawler.py:22(emit_linked_org)
  stage: design
  alternative_considered: Infer schema from data characteristics
- id: AM-002
  type: BA
  content: Allow nullable vessel IDs and names with fallback to emit 'Unknown' linked
    entities
  rationale: Real-world data often has missing fields. Creating 'Unknown' placeholders
    preserves relationships while indicating data quality issues.
  evidence: datasets/_global/abuja_mou/detention/crawler.py:22(emit_linked_org)
  stage: implementation
  alternative_considered: Skip entities with missing critical fields entirely
- id: AP-001
  type: T
  content: 'Crawl vessel data through a two-stage process: list page then individual
    vessel pages'
  rationale: Two-stage crawling balances efficiency with data completeness. The list
    provides vessel identifiers while detail pages provide full inspection data.
  evidence: datasets/_global/abuja_mou/psc/crawler.py:80(crawl_vessel_page)
  stage: design
  alternative_considered: Single-page scraping with each data on list view
- id: AP-002
  type: BA
  content: Track inspection dates separately and associate with vessel rows during
    crawling
  rationale: Inspection date may apply to multiple vessels on a single page. By passing
    it as a parameter, the system avoids redundant date parsing and ensures consistent
    association.
  evidence: datasets/_global/abuja_mou/psc/crawler.py:45(crawl_vessel_row)
  stage: implementation
  alternative_considered: Parse date from each row individually
- id: ADB-001
  type: BA
  content: Process ADB sanctions data row-by-row with direct entity emission rather
    than batching
  rationale: Row-by-row processing allows immediate emission and reduces memory footprint
    for potentially large sanction lists.
  evidence: datasets/_global/adb_sanctions/crawler.py:31(crawl_row)
  stage: implementation
  alternative_considered: Collect rows in memory then emit in batches
- id: QA-001
  type: T
  content: Validate target files against nested JSON structure allowing arbitrary
    depth
  rationale: Supporting arbitrary nesting in target JSON files provides maximum flexibility
    for data structure evolution without schema changes.
  evidence: contrib/qa/test_verification.py:70(test_targets_nested_json)
  stage: design
  alternative_considered: Fixed schema with explicit field definitions
- id: QA-002
  type: T
  content: Use separate test functions for each data format validation (JSON, CSV,
    TXT)
  rationale: Separate test functions per format allow isolated testing and easier
    maintenance. Format-specific logic stays contained rather than being mixed.
  evidence: contrib/qa/test_verification.py:20(test_entities_json)
  stage: design
  alternative_considered: Single parameterized test function for each formats
- id: BD-GAP-001
  content: 'Missing: 0'
  type: B
  rationale: 'Audit finding: missing: 0. Identified by audit checklist. This gap affects
    production reliability and should be addressed.'
  evidence: N/A:0(see_rationale)
  stage: dataset_loading
  status: missing
  severity: high
