    with missing account metadata in log-first architecture'
  rationale: BD-035 (controller upserts accounts after log created) interacts with BD-005 (log-first architecture
    as source of truth) to create a systemic risk. Log-first architecture means the log IS the authoritative
    record, but if account upsert fails post-log-commit, the ledger contains logs for accounts that don't
    have metadata. While the financial data is safe (logs are immutable), account-specific metadata (schemas,
    metadata, created_at timestamps) becomes orphaned. This violates the principle that each state changes
    should be traceable to logs.
