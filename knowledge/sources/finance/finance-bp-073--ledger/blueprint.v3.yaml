replaceable_slots:
- id: slot-001
  name: primary_storage
  description: Use default PostgreSQL for development/self-hosting; use RDS for production on AWS
  used_in_stages: []
  options:
  - name: PostgreSQL
    traits:
    - ACID
    - relational
    - transactional
    - mature
    fit_for:
    - General-purpose ledger storage with strong consistency requirements
    not_fit_for:
    - Massive analytical queries; consider ClickHouse exporter instead
  - name: AWS RDS PostgreSQL
    traits:
    - ACID
    - managed
    - HA-ready
    - IAM auth
    fit_for:
    - Production on AWS with managed database, IAM authentication
    not_fit_for:
    - Multi-cloud or on-prem deployments
  default: PostgreSQL
  _source: worker_resource
- id: slot-002
  name: exporter_destination
  description: Use ClickHouse for analytics, Elasticsearch for search, HTTP for integrations, stdout for
    debugging
  used_in_stages: []
  options:
  - name: ClickHouse
    traits:
    - OLAP
    - columnar
    - high-throughput
    - schema-on-write
    fit_for:
    - Analytical workloads, aggregations, time-series analysis of transactions
    not_fit_for:
    - Real-time point lookups; transactional workloads
  - name: Elasticsearch
    traits:
    - full-text-search
    - document-store
    - REST API
    fit_for:
    - Search-heavy use cases, log analysis, flexible querying
    not_fit_for:
    - Complex aggregations on financial data; use ClickHouse instead
  - name: HTTP Webhook
    traits:
    - simple
    - push-based
    - integration-friendly
    fit_for:
    - Integrating with external systems, custom ETL pipelines
    not_fit_for:
    - High-volume production analytics (no batching)
  - name: stdout
    traits:
    - debugging
    - log-file based
    fit_for:
    - Development, debugging, container log aggregation
    not_fit_for:
    - Production analytics or persistence
  - name: noop
    traits:
    - disabled
    - no-op
    fit_for:
    - Disabling exports entirely for testing or minimal deployments
    not_fit_for:
    - Any production use requiring data export
  default: noop (exports disabled by default unless EXPERIMENTAL_EXPORTERS=true)
  _source: worker_resource
- id: slot-003
  name: event_bus
  description: Use NATS for standard deployments; add Kafka for enterprise durability/replay requirements
  used_in_stages: []
  options:
  - name: NATS
    traits:
    - pub/sub
    - streaming
    - low-latency
    - at-least-once
    fit_for:
    - Microservices communication, event-driven architectures
    not_fit_for:
    - Durable message storage beyond retention window
  - name: Kafka (via Watermill)
    traits:
    - durable
    - high-throughput
    - exactly-once
    - replay
    fit_for:
    - Enterprise event streaming, audit trails, replay capability
    not_fit_for:
    - Simple pub/sub; lower throughput than Kafka needed
  default: NATS (configured via github.com/formancehq/go-libs/v4)
  _source: worker_resource
- id: slot-004
  name: observability_backend
  description: Use defaults for development; configure OTLP endpoint for production cloud backends
  used_in_stages: []
  options:
  - name: OTLP (OpenTelemetry Protocol)
    traits:
    - vendor-neutral
    - metrics + traces
    - standardized
    fit_for:
    - Any production environment; integrates with most backends
    not_fit_for:
    - Environments without OTEL collector
  - name: Prometheus + Jaeger
    traits:
    - metrics
    - traces
    - open-source
    fit_for:
    - Development, self-hosted observability stack
    not_fit_for:
    - Managed/cloud-native observability
  default: OTLP with Prometheus/Jaeger via docker-compose
  _source: worker_resource
