  - 'NOT_FOUND: BD-035: internal/controller/ledger/controller_default.go'
- id: BD-96
  type: B/BA
  content: 'INTERACTION: [BD-042] × [BD-033] × [BD-010] → Dual volume tracking with timestamp-based ordering
    causes effective volumes to retroactively change on backdated inserts, cascading to each historical
    balance queries'
  rationale: 'Three decisions interact to create a systemic risk cascade: (1) BD-042 introduces dual volume
    tracking (PostCommitVolumes + PostCommitEffectiveVolumes), (2) BD-033 computes effective volumes by
    timestamp not insertion order, (3) BD-010 computes PostCommitVolumes in-flight never persisted. When
    a backdated transaction is inserted, BD-033 recalculates effective volumes retroactively, which cascades
    to each queries that use effective volumes. Since BD-010 never persists these values, every balance
    query must recompute, and changing historical effective volumes means historical balance views become
    unstable over time.'
  evidence: 'BD-042: internal/transaction.go:48-51(PostCommitVolumes fields); BD-033: internal/machine/funding.go:150-156(timestamp
    ordering); BD-010: internal/transaction.go:48(PostCommitVolumes in-flight)'
