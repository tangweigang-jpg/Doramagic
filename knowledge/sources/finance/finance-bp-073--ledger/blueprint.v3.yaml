- id: BD-97
  type: B/BA
  content: 'INTERACTION: [BD-003] × [BD-067] → Funding FIFO ordering assumption breaks when concat merges
    same-account parts, potentially corrupting fund allocation semantics'
  rationale: BD-003 establishes FIFO allocation for partial credit/debit, assuming sources are consumed
    in order. BD-067 adds processing that merges consecutive same-account parts via Concat(). When parts
    from different sources arrive interleaved, the Concat operation may merge segments that were not originally
    adjacent, obscuring the intended FIFO ordering for specific accounts. This creates hidden semantic
    changes where fund allocation no longer follows the documented FIFO rule for complex multi-source
    scenarios.
  evidence: 'BD-003: internal/machine/vm/machine.go:127(Funding FIFO allocation); BD-067: internal/machine/funding.go:150-156(Concat
    same account)'
  stage: numscript_execution
  alternative_considered: Preserve original ordering independent of concatenation; mark merged parts with
    original indices
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
  - 'NOT_FOUND: BD-003: internal/machine/vm/machine.go'
- id: BD-98
  type: B/B
  content: 'INTERACTION: [BD-006] × [BD-049] → Idempotency hash depends on idempotency key''s uniqueness
    guarantee, creating circular dependency where hash collision detection requires hash to already exist'
  rationale: 'BD-006 enforces idempotency via IdempotencyKey + IdempotencyHash validation. BD-049 adds
    input hash to idempotency key. This creates a hidden dependency: if two different inputs produce the
    same hash (collision), one transaction will be rejected as a duplicate of the other, even though they
    have different parameters. The hash-based conflict detection provides security but relies on cryptographic
    hash properties (pre-image resistance) that aren''t explicitly guaranteed by the implementation.'
  evidence: 'BD-006: internal/controller/ledger/log_process.go:148(fetchLogWithIK); BD-049: internal/controller/ledger/log_process.go:233(ComputeIdempotencyHash)'
  stage: transaction_processing
  alternative_considered: Include input hash in log ID computation instead of idempotency key; use separate
    conflict detection mechanism
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
  - 'NOT_FOUND: BD-006: internal/controller/ledger/log_process.go'
- id: BD-99
  type: B/BA
  content: 'INTERACTION: [BD-018] × [BD-019] × [BD-007] → Advisory lock serialization combined with deadlock
    retry creates performance bottleneck under contention; high contention amplifies retry delays exponentially'
  rationale: 'Three decisions interact to create performance amplification: (1) BD-018 advisory lock on
    ledger ID serializes each writes, (2) BD-019 GetBalances returns locked balances preventing double-spend,
    (3) BD-007 deadlock retry uses exponential backoff. Under high contention, these decisions compound:
    the advisory lock creates queuing, deadlock errors trigger BD-007 retries with exponentially increasing
    delays, and each retry competes for the same lock. A small increase in contention can cause disproportionate
    increases in wait times, potentially timing out clients.'
  evidence: 'BD-018: internal/storage/ledger/store.go:158(LockLedger advisory lock); BD-019: internal/controller/ledger/store.go:35(GetBalances
    locked); BD-007: internal/controller/ledger/log_process.go:166-168(deadlock retry)'
  stage: controller_store
  alternative_considered: Optimistic locking with version vectors to reduce lock contention; separate
    deadlock handling from general retry logic
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
  - 'NOT_FOUND: BD-018: internal/storage/ledger/store.go'
