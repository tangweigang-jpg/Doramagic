- id: anomaly_detection
  name: Anomaly Detection
  order: 11
  responsibility: 'Detect anomalies by comparing actuals to model predictions. WHY: Time series anomaly
    detection requires both a prediction model and a scoring mechanism with separate scoring/detection
    concerns.'
  interface:
    inputs:
    - TimeSeries (actuals)
    - AnomalyModel (scorer + optional forecaster/filter)
    outputs:
    - Anomaly scores TimeSeries or binary anomaly labels
  required_methods:
  - name: AnomalyModel.fit
    description: Fit scorer on series or use forecaster to generate baseline predictions
    evidence: darts/ad/anomaly_model/anomaly_model.py:44
  - name: AnomalyModel.score
    description: Compute anomaly scores quantifying deviation from expected
    evidence: darts/ad/anomaly_model/anomaly_model.py:63
  - name: AnomalyModel.detect
    description: Apply detector threshold to produce binary anomaly labels
    evidence: darts/ad/anomaly_model/anomaly_model.py
  - name: Detector.fit_detect
    description: 'Convenience method calling fit() then detect() on same series (note: data leakage risk)'
    evidence: darts/ad/detectors/detectors.py:154
  key_behaviors:
  - behavior: Score vs detect separation
    description: AnomalyModel delegates to scorer for scoring and detector for thresholding. Scorers quantify
      deviation; detectors apply threshold.
    evidence: darts/ad/anomaly_model/anomaly_model.py:44
  - behavior: Multiple scorer support
    description: AnomalyModel uses scorers list supporting multiple AnomalyScorer. Scorer order affects
      output structure.
    evidence: darts/ad/anomaly_model/anomaly_model.py:34
  - behavior: Windowed scorer
    description: Windowed scorer trains per-component models for contextual anomalies. Windows capture
      local context patterns.
    evidence: darts/ad/scorers/scorers.py:752
  - behavior: _BoundedDetectorMixin shared
    description: Shared between ThresholdDetector and QuantileDetector. Detectors must define low_threshold/high_threshold
      properties.
    evidence: darts/ad/detectors/detectors.py:175
  replaceable_points:
  - name: Scorer
    description: Method for computing anomaly scores
    options:
    - name: DifferenceScorer
      traits:
      - point-wise
      - simple
      - baseline
      fit_for:
      - basic detection
      - large deviations
      not_fit_for:
      - contextual anomalies
      - subtle changes
    - name: NLLGaussianScorer
      traits:
      - probabilistic
      - density-based
      fit_for:
      - probabilistic models
      - Gaussian assumptions
      not_fit_for:
      - non-Gaussian data
      - deterministic baselines
    - name: KMeansScorer
      traits:
      - clustering
      - density estimation
      fit_for:
      - novelty detection
      - distribution shift
      not_fit_for:
      - sequential anomalies
    - name: WassersteinScorer
      traits:
      - distribution-based
      - earth mover
      fit_for:
      - distribution shifts
      - probabilistic series
      not_fit_for:
      - point predictions
    default: DifferenceScorer
  - name: Detector threshold
    description: Method for converting scores to binary decisions
    options:
    - name: ThresholdDetector
      traits:
      - fixed threshold
      - simple
      fit_for:
      - known thresholds
      - domain knowledge
      not_fit_for:
      - adaptive thresholds
      - varying baselines
    - name: QuantileDetector
      traits:
      - adaptive
      - percentile-based
      fit_for:
      - varying baselines
      - unknown thresholds
      not_fit_for:
      - fixed threshold requirement
    - name: IQRDetector
      traits:
      - robust
      - outlier detection
      fit_for:
      - normally distributed
      - robust to outliers
      not_fit_for:
      - skewed distributions
    default: ThresholdDetector
  - name: Aggregator
    description: Method for combining multivariate anomaly decisions
    options:
    - name: AndAggregator
      traits:
      - each components anomalous
      fit_for:
      - strict detection
      - false positive reduction
      not_fit_for:
      - partial anomalies
    - name: OrAggregator
      traits:
      - any component anomalous
      fit_for:
      - sensitive detection
      - any anomaly
      not_fit_for:
      - false positive concerns
    - name: EnsembleSklearnAggregator
      traits:
      - learned combination
      - flexible
      fit_for:
      - complex correlations
      - optimal weighting
      not_fit_for:
      - simple cases
      - interpretability
    default: AndAggregator
  design_decisions:
  - 'AnomalyModel delegates to scorer for scoring and detector for thresholding — evidence: darts/ad/anomaly_model/anomaly_model.py:44
    — rationale: Separation of scoring (how different) vs detection (is it anomalous).'
  - 'Windowed scorer trains per-component models for contextual anomalies — evidence: darts/ad/scorers/scorers.py:752
    — rationale: Windows capture local context patterns.'
  - 'Aggregator combines multivariate binary series with AND/OR logic — evidence: darts/ad/aggregators/and_aggregator.py:32
    — rationale: Anomaly can be defined as each or any components being anomalous.'
  - 'NLLScorer computes negative log-likelihood of observed values — evidence: darts/ad/scorers/scorers.py:983
    — rationale: Probabilistic scoring using fitted distribution parameters.'
  acceptance_hints:
  - AnomalyModel.score() returns scores; detect() applies detector threshold to produce binary labels
  - AnomalyScorer default window=1 for point-wise comparison
  - FittableAggregator.fit() requires anomalies and series matching length
  - fit_detect() has data leakage risk for train/test evaluation
