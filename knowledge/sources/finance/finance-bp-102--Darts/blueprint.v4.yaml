      - bounded outcomes
    - name: Poisson
      traits:
      - count
      - discrete
      - mean=var
      fit_for:
      - event counts
      - arrival processes
      not_fit_for:
      - continuous data
      - overdispersed counts
    - name: NegativeBinomial
      traits:
      - count
      - overdispersed
      - flexible variance
      fit_for:
      - overdispersed counts
      - hierarchical
      not_fit_for:
      - continuous data
      - simple counts
    - name: Bernoulli
      traits:
      - binary
      - classification
      fit_for:
      - binary outcomes
      - probability estimation
      not_fit_for:
      - multi-class
      - continuous
    - name: Beta
      traits:
      - bounded
      - continuous
      fit_for:
      - proportions
      - bounded outcomes
      not_fit_for:
      - unbounded data
      - counts
    - name: Dirichlet
      traits:
      - multivariate
      - simplex
      fit_for:
      - compositional data
      - multivariate proportions
      not_fit_for:
      - univariate
      - unbounded data
    - name: QuantileRegression
      traits:
      - non-parametric
      - any quantile
      fit_for:
      - arbitrary distributions
      - asymmetric
