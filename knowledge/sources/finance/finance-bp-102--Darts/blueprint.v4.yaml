# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-102
name: Darts
stages:
- id: data_representation
  name: TimeSeries Data Representation
  order: 1
  responsibility: 'Core data container for time series storage with support for deterministic/probabilistic,
    univariate/multivariate, static covariates, and hierarchy. WHY: Unified abstraction for diverse time
    series data enables consistent processing across each models.'
  interface:
    inputs:
    - times (TimeIndex|pd.Index)
    - values (np.ndarray)
    - static_covariates
    - hierarchy
    outputs:
    - 'TimeSeries with time_index, values (shape: time×component×sample), components, static_covariates,
      hierarchy'
  required_methods:
  - name: TimeSeries.from_csv
    description: Factory method to create TimeSeries from CSV file with automatic date inference
    evidence: darts/timeseries.py:506-595
  - name: TimeSeries.from_dataframe
    description: Factory method to create TimeSeries from pandas DataFrame
    evidence: darts/timeseries.py:506-595
  - name: TimeSeries.slice
    description: Extract a time range from the series
    evidence: darts/timeseries.py:110
  - name: TimeSeries.concatenate
    description: Combine multiple series along the time axis
    evidence: darts/timeseries.py:110
  key_behaviors:
  - behavior: 3D value storage
    description: TimeSeries stores 3D values (time×component×sample) for both deterministic and probabilistic
      series. Deterministic series use sample=1; 3D avoids branching in downstream operations.
    evidence: darts/timeseries.py:147-150
  - behavior: Strict time index enforcement
    description: TimeSeries guarantees strictly monotonically increasing time index without holes. Any
      operation creating holes requires fill_missing_dates=True.
    evidence: darts/timeseries.py:32
  - behavior: Static covariates per-component
    description: Static covariates support per-component or global application via DataFrame rows, allowing
      component-specific static features while maintaining simple global case.
    evidence: darts/timeseries.py:166-172
  replaceable_points:
  - name: Backend implementation
    description: TimeSeries supports multiple backends for data storage and manipulation
    options:
    - name: pandas
      traits:
      - default
      - most tested
      - widely compatible
      fit_for:
      - general use
      - most scenarios
      - maximum compatibility
      not_fit_for:
      - very large datasets
      - performance-critical paths
    - name: polars
      traits:
      - high performance
      - lazy evaluation
      - memory efficient
      fit_for:
      - large datasets
      - performance critical
      - memory constraints
      not_fit_for:
      - legacy code
      - custom pandas operations
    - name: narwhals
      traits:
      - unified API
      - backend agnostic
      - intermediate abstraction
      fit_for:
      - portable code
      - multiple backends
      not_fit_for:
      - specific backend features
      - advanced optimizations
    default: pandas
  design_decisions:
  - 'TimeSeries stores 3D values (time×component×sample) for both deterministic and probabilistic series
    — evidence: darts/timeseries.py:147-150 — rationale: Deterministic series use sample=1; 3D avoids
    branching in downstream operations.'
  - 'Static covariates support per-component or global application via DataFrame rows — evidence: darts/timeseries.py:166-172
    — rationale: Allows component-specific static features while maintaining simple global case.'
  - 'Hierarchy encoded as dict mapping child→parents for flexible aggregation — evidence: darts/timeseries.py:174-192
    — rationale: Dict format enables arbitrary tree structures beyond simple hierarchies.'
  - 'Factory methods (from_csv, from_dataframe, etc.) instead of public constructor — evidence: darts/timeseries.py:506-595
    — rationale: Handles multiple input formats and date inference in one place.'
  acceptance_hints:
  - TimeSeries.is_deterministic returns True for n_samples=1 series
  - TimeSeries values shape is (n_timesteps, n_components, n_samples)
  - Time index is strictly monotonically increasing without holes by default
- id: forecasting_base
  name: Forecasting Model Base
  order: 2
  responsibility: 'Abstract base classes defining the contract for each forecasting models. WHY: Enables
    polymorphic handling across statistical, ML, and deep learning models with consistent fit/predict
    interface.'
  interface:
    inputs:
    - 'series: TimeSeries'
    - past_covariates
    - future_covariates
    - static_covariates
    outputs:
    - TimeSeries forecasts for n future steps
  required_methods:
  - name: ForecastingModel.fit
    description: Train the forecasting model on provided series. Every models return self for method chaining.
    evidence: darts/models/forecasting/forecasting_model.py:173
  - name: ForecastingModel.predict
    description: Generate forecasts for n future steps with optional covariates
    evidence: darts/models/forecasting/forecasting_model.py
  - name: ForecastingModel.historical_forecasts
    description: Compute rolling forecasts over historical data for backtesting, supporting retrain callable
      for dynamic retraining
    evidence: darts/models/forecasting/forecasting_model.py:671
  key_behaviors:
  - behavior: ModelMeta parameter extraction
    description: Metaclass extracts __init__ parameters at creation time, enabling model cloning and save/load
      with original parameters.
    evidence: darts/models/forecasting/forecasting_model.py:104
  - behavior: Four covariate types
    description: 'Models classified by covariate timing: past, future, dual, mixed. Covariate timing constraints
      are fundamental model characteristics.'
    evidence: darts/models/forecasting/forecasting_model.py:3216-3625
  - behavior: _fit_called enforcement
    description: Every predict calls fail if fit() not called first. Must maintain _fit_called flag consistency
      across each fittable components.
    evidence: darts/models/forecasting/forecasting_model.py:155
  replaceable_points:
  - name: Encoder system
    description: SequentialEncoder generates covariate features from time index for training and inference
    options:
    - name: cyclic
      traits:
      - sin/cos encoding
      - continuous
      - periodic
      fit_for:
      - day of week
      - month patterns
      - hourly cycles
      not_fit_for:
      - non-cyclic features
      - integer codes
    - name: datetime_attribute
      traits:
      - extracts year/month/day
      - flexible attributes
      fit_for:
      - calendar features
      - seasonal patterns
      not_fit_for:
      - non-datetime indices
    - name: integer_index
      traits:
      - for RangeIndex series
      - positional encoding
      fit_for:
      - sequential data
      - position-based patterns
      not_fit_for:
      - datetime-based series
    - name: callable
      traits:
      - custom function
      - user-defined
      fit_for:
      - domain-specific features
      - complex transformations
      not_fit_for:
      - simple standard features
    default: None
  - name: Likelihood
    description: Probabilistic prediction distribution for uncertainty quantification
    options:
    - name: GaussianLikelihood
      traits:
      - continuous
      - symmetric
      - mean+variance
      fit_for:
      - normal distributions
      - regression with noise
      not_fit_for:
      - count data
      - bounded outcomes
    - name: PoissonLikelihood
      traits:
      - count data
      - discrete
      - mean=var
      fit_for:
      - event counts
      - arrival processes
      not_fit_for:
      - continuous data
      - overdispersed counts
    - name: QuantileRegression
      traits:
      - non-parametric
      - any quantile
      - no distribution assumption
      fit_for:
      - arbitrary distributions
      - asymmetric uncertainty
      not_fit_for:
      - parametric modeling
      - density estimation
    - name: None
      traits:
      - deterministic
      - point predictions
      fit_for:
      - baseline models
      - median forecasts
      not_fit_for:
      - uncertainty quantification
    default: None
  design_decisions:
  - 'ModelMeta metaclass extracts __init__ parameters at creation time — evidence: darts/models/forecasting/forecasting_model.py:104
    — rationale: Enables model cloning and save/load with original parameters.'
  - 'Four covariate types: past, future, dual, mixed for model classification — evidence: darts/models/forecasting/forecasting_model.py:3216-3625
    — rationale: Covariate timing constraints are fundamental model characteristics.'
  - 'Encoder initialization deferred to model creation with add_encoders parameter — evidence: darts/models/forecasting/forecasting_model.py:160-170
    — rationale: Encoders are optional and configurable at model creation time.'
  - 'historical_forecasts() supports retrain callable for dynamic retraining — evidence: darts/models/forecasting/forecasting_model.py:671
    — rationale: Enables rolling window evaluation with custom retrain logic.'
  acceptance_hints:
  - Every ForecastingModel subclasses implement fit() returning self for chaining
  - historical_forecasts() returns list of TimeSeries, one per start point
  - Models fail with clear error if predict() called before fit()
- id: torch_forecasting
  name: PyTorch Deep Learning Forecasting
  order: 3
  responsibility: 'PyTorch Lightning integration for deep learning forecasting models. WHY: Unified training
    loop, checkpointing, and hardware acceleration for neural models with lazy initialization.'
  interface:
    inputs:
    - TorchTrainingDataset
    - TorchInferenceDataset
    - train/val series
    outputs:
    - PLForecastingModule trained model, TimeSeries predictions
  required_methods:
  - name: TorchForecastingModel.fit
    description: Train PyTorch model with PL trainer, automatically creating model architecture after
      seeing first sample
    evidence: darts/models/forecasting/torch_forecasting_model.py:135
  - name: TorchForecastingModel.predict
    description: Generate forecasts using trained PL module with optional multi-sample prediction
    evidence: darts/models/forecasting/torch_forecasting_model.py
  - name: TorchForecastingModel.save
    description: Save model checkpoint with trainer state and module weights
    evidence: darts/models/forecasting/torch_forecasting_model.py
  - name: TorchForecastingModel.load
    description: Load model from checkpoint with automatic device handling
    evidence: darts/models/forecasting/torch_forecasting_model.py
  key_behaviors:
  - behavior: Two-level architecture
    description: TorchForecastingModel (orchestration) + PLForecastingModule (nn.Module). Separation enables
      custom nn.Module reuse while keeping Darts API clean.
    evidence: darts/models/forecasting/torch_forecasting_model.py:135-289
  - behavior: Lazy model creation
    description: Model dimensions unknown until training data is seen. _create_model called after first
      sample in _init_model.
    evidence: darts/models/forecasting/torch_forecasting_model.py:288-289
  - behavior: Random state management
    description: '@random_method decorator ensures reproducibility across PyTorch operations and data
      loading.'
    evidence: darts/models/forecasting/torch_forecasting_model.py:136
  - behavior: Five covariate support classes
    description: PastCovariatesTorchModel, DualCovariatesTorchModel, etc. Each class enforces different
      covariate availability constraints.
    evidence: darts/models/forecasting/torch_forecasting_model.py:2843-2981
  replaceable_points:
  - name: Loss function
    description: Training loss for PLForecastingModule optimization
    options:
    - name: nn.MSELoss
      traits:
      - regression
      - squared error
      - differentiable
      fit_for:
      - continuous targets
      - normal noise
      not_fit_for:
      - count data
      - bounded targets
    - name: QuantileLoss
      traits:
      - probabilistic
      - pinball loss
      - asymmetric
      fit_for:
      - uncertainty quantification
      - asymmetric costs
      not_fit_for:
      - symmetric error assumptions
    - name: Custom
      traits:
      - user-defined
      - flexible
      fit_for:
      - specialized objectives
      - domain-specific losses
      not_fit_for:
      - standard use cases
    default: nn.MSELoss
  - name: Optimizer
    description: PyTorch optimizer for gradient-based training
    options:
    - name: torch.optim.Adam
      traits:
      - adaptive lr
      - momentum
      - default choice
      fit_for:
      - most scenarios
      - default use
      not_fit_for:
      - SGD-specific architectures
    - name: torch.optim.SGD
      traits:
      - simple
      - momentum optional
      - linear convergence
      fit_for:
      - large-scale training
      - fine-tuning
      not_fit_for:
      - sparse features
    - name: Custom
      traits:
      - user-defined
      fit_for:
      - special optimizers
      - gradient clipping strategies
      not_fit_for:
      - standard use
    default: torch.optim.Adam
  - name: Training dataset
    description: Dataset implementation for PyTorch data loading
    options:
    - name: ShiftedTorchTrainingDataset
      traits:
      - sliding window
      - lagged features
      fit_for:
      - standard forecasting
      - default use
      not_fit_for:
      - non-standard windowing
    - name: Custom TorchDataset
      traits:
      - user-defined
      - flexible
      fit_for:
      - special data formats
      - custom preprocessing
      not_fit_for:
      - standard forecasting
    default: ShiftedTorchTrainingDataset
  design_decisions:
  - 'Two-level architecture: TorchForecastingModel (orchestration) + PLForecastingModule (nn.Module) —
    evidence: darts/models/forecasting/torch_forecasting_model.py:135-289 — rationale: Separation enables
    custom nn.Module reuse while keeping Darts API clean.'
  - 'Random state managed via random_method decorator at model level — evidence: darts/models/forecasting/torch_forecasting_model.py:136
    — rationale: Ensures reproducibility across PyTorch operations and data loading.'
  - 'Lazy model creation after seeing first training sample — evidence: darts/models/forecasting/torch_forecasting_model.py:288-289
    — rationale: Model dimensions unknown until training data is seen.'
  - 'Five covariate support classes map to model architecture requirements — evidence: darts/models/forecasting/torch_forecasting_model.py:2843-2981
    — rationale: Each class enforces different covariate availability constraints.'
  acceptance_hints:
  - nn.Module created lazily in _create_model after first sample
  - Training respects random_method decorator for reproducibility
  - Inference dataset uses stride parameter for historical forecast optimization
- id: statistical_forecasting
  name: Statistical & Classical Forecasting
  order: 4
  responsibility: 'Non-deep-learning forecasting models (ARIMA, exponential smoothing, FFT, etc.). WHY:
    Fast, interpretable models that don''t require GPU and work well on single univariate series.'
  interface:
    inputs:
    - Univariate TimeSeries
    - future_covariates (optional)
    outputs:
    - TimeSeries forecasts
  required_methods:
  - name: ARIMA.fit
    description: Fit ARIMA model with automatic order selection via AIC if specified
    evidence: darts/models/forecasting/arima.py:32
  - name: ARIMA.predict
    description: Generate ARIMA forecasts with confidence intervals
    evidence: darts/models/forecasting/arima.py
  - name: ExponentialSmoothing.fit
    description: Fit Holt-Winters exponential smoothing with trend and seasonality
    evidence: darts/models/forecasting/exponential_smoothing.py:30
  - name: NaiveSeasonal.predict
    description: Baseline model repeating value from K steps ago
    evidence: darts/models/forecasting/baselines.py:73
  key_behaviors:
  - behavior: statsmodels wrapping
    description: Every classical statistical models wrap statsmodels implementations for well-tested core
      algorithms.
    evidence: darts/models/forecasting/arima.py:6
  - behavior: ARIMA differencing
    description: ARIMA supports integer differencing (d) for non-stationary series. Differentiation is
      key for unit root series.
    evidence: darts/models/forecasting/arima.py:32
  - behavior: VARIMA local interface
    description: VARIMA implements local model interface (single multivariate series) but is multivariate
      internally.
    evidence: darts/models/forecasting/varima.py:272
  replaceable_points:
  - name: Underlying statsmodel
    description: Statistical model implementation for forecasting core
    options:
    - name: statsmodels.tsa.arima
      traits:
      - ARIMA family
      - exogenous variables
      - seasonal
      fit_for:
      - economic data
      - trend+seasonal series
      not_fit_for:
      - multivariate without exog
      - high-frequency data
    - name: statsmodels.tsa.holtwinters
      traits:
      - exponential smoothing
      - trend+seasonality
      fit_for:
      - short series
      - simple patterns
      not_fit_for:
      - complex dependencies
      - long series
    - name: statsmodels.tsa.stattools.fftpack
      traits:
      - frequency domain
      - FFT-based
      fit_for:
      - periodic signals
      - spectral analysis
      not_fit_for:
      - non-periodic data
      - noise
    default: varies by model
  design_decisions:
  - 'ARIMA supports integer differencing (d) for non-stationary series — evidence: darts/models/forecasting/arima.py:32
    — rationale: Standard ARIMA specification; differentiation is key for unit root series.'
  - 'VARIMA implements local model interface (single multivariate series) — evidence: darts/models/forecasting/varima.py:272
    — rationale: Multivariate model but local (not global) architecture.'
  - 'statsmodels wrapping pattern for each classical statistical models — evidence: darts/models/forecasting/arima.py:6
    — rationale: Leverages well-tested statsmodels implementations.'
  acceptance_hints:
  - ARIMA/ExponentialSmoothing work on univariate series only
  - statsmodels models are deterministic (no probabilistic output by default)
  - Naive baselines provide reference points for evaluation
- id: sklearn_forecasting
  name: Scikit-Learn Regression Forecasting
  order: 5
  responsibility: 'SKLearn-like regressor wrapping for tabular ML forecasting. WHY: Enables gradient boosting,
    random forests, and other sklearn models for time series with lagged features.'
  interface:
    inputs:
    - Lag features (target, past_covariates, future_covariates)
    - multioutput wrapper
    outputs:
    - TimeSeries forecasts with optional probabilistic output
  required_methods:
  - name: RegressionModel.fit
    description: Fit sklearn regressor with generated lag features from target and covariates
    evidence: darts/models/forecasting/sklearn_model.py:1946
  - name: RegressionModel.predict
    description: Generate forecasts using fitted sklearn model with optional multi-quantile output
    evidence: darts/models/forecasting/sklearn_model.py
  - name: SKLearnClassifierModel.fit
    description: Fit sklearn classifier with label encoding for categorical targets
    evidence: darts/models/forecasting/sklearn_model.py:2202
  key_behaviors:
  - behavior: Multioutput per-horizon estimators
    description: SKLearn multioutput API inconsistency; per-horizon (multi_models=True) is robust across
      sklearn versions.
    evidence: darts/models/forecasting/sklearn_model.py:634
  - behavior: Lagged feature generation
    description: Tabularization is fundamental to sklearn model compatibility. Features generated from
      target and covariates at fit time.
    evidence: darts/models/forecasting/sklearn_model.py:483
  - behavior: _ClassifierMixin label consistency
    description: Enforces consistent class labels across model chunks. Requires multi_models=True for
      classification with output_chunk_length > 1.
    evidence: darts/models/forecasting/sklearn_model.py:2144
  replaceable_points:
  - name: Regressor
    description: Underlying sklearn regressor for forecasting
    options:
    - name: LinearRegression
      traits:
      - fast
      - interpretable
      - linear
      fit_for:
      - baseline
      - linear relationships
      not_fit_for:
      - non-linear patterns
      - complex interactions
    - name: RandomForest
      traits:
      - ensemble
      - non-linear
      - robust
      fit_for:
      - medium datasets
      - mixed features
      not_fit_for:
      - very large datasets
      - high-dimensional
    - name: GradientBoosting
      traits:
      - boosting
      - sequential
      - high accuracy
      fit_for:
      - tabular data
      - structured features
      not_fit_for:
      - image/text
      - streaming
    - name: XGBoost
      traits:
      - scalable
      - regularized
      - popular
      fit_for:
      - production
      - large datasets
      not_fit_for:
      - small datasets
      - interpretability priority
    - name: LightGBM
      traits:
      - fast
      - leaf-wise
      - memory efficient
      fit_for:
      - very large datasets
      - high cardinality
      not_fit_for:
      - small datasets
      - high depth
    default: LinearRegression
  - name: Multi-output strategy
    description: How to handle multiple output chunks (forecast horizons)
    options:
    - name: multi_models (per-horizon)
      traits:
      - one estimator per horizon
      - independent
      - flexible
      fit_for:
      - sklearn version compatibility
      - different patterns per horizon
      not_fit_for:
      - joint prediction needed
      - memory constraints
    - name: multi_models=False (joint)
      traits:
      - single estimator
      - shared weights
      - efficient
      fit_for:
      - memory efficiency
      - correlated horizons
      not_fit_for:
      - sklearn version differences
      - horizon-specific patterns
    default: multi_models=True
  design_decisions:
  - 'Multioutput handled via per-horizon estimators when model lacks native support — evidence: darts/models/forecasting/sklearn_model.py:634
    — rationale: SKLearn multioutput API inconsistency; per-horizon is robust.'
  - 'Lagged features generated from target and covariates at fit time — evidence: darts/models/forecasting/sklearn_model.py:483
    — rationale: Tabularization is fundamental to sklearn model compatibility.'
  - 'Categorical features supported via SKLearnModelWithCategoricalFeatures mixin — evidence: darts/models/forecasting/sklearn_model.py:1624
    — rationale: Handles categorical encoding without modifying base model.'
  - 'Quantile models stored separately in _QuantileModelContainer — evidence: darts/models/forecasting/sklearn_model.py:1619
    — rationale: Organizes multiple quantile predictions cleanly.'
  acceptance_hints:
  - SKLearnModel requires multi_models=True for classification with output_chunk_length > 1
  - ShapExplainer requires multi_models=True and SKLearnModel only
  - Lagged features created from target and covariates at fit time
- id: ensemble_forecasting
  name: Ensemble Forecasting
  order: 6
  responsibility: 'Combining multiple models for improved robustness. WHY: Ensemble averaging reduces
    variance and model-specific biases across diverse forecasting approaches.'
  interface:
    inputs:
    - List of ForecastingModels
    - training series
    outputs:
    - Ensemble TimeSeries predictions
  required_methods:
  - name: EnsembleModel.fit
    description: Fit each base models in ensemble (does not retrain by default)
    evidence: darts/models/forecasting/ensemble_model.py:42
  - name: EnsembleModel.predict
    description: Generate ensemble predictions by combining base model outputs
    evidence: darts/models/forecasting/ensemble_model.py
  - name: RegressionEnsembleModel.fit
    description: Learn optimal ensemble weights using sklearn regression
    evidence: darts/models/forecasting/regression_ensemble_model.py:30
  key_behaviors:
  - behavior: No base model retraining
    description: Ensemble doesn't retrain base models by default. Uses pre-fitted models; train_forecasting_models=False
      is efficient.
    evidence: darts/models/forecasting/ensemble_model.py:77
  - behavior: Sample dimension reduction
    description: Handles probabilistic ensemble aggregation via mean or custom reduction function.
    evidence: darts/models/forecasting/ensemble_model.py:470
  - behavior: Likelihood parameter averaging
    description: Groups by parameter type before averaging (e.g., each mu values together) for probabilistic
      ensembles.
    evidence: darts/models/forecasting/baselines.py:422
  replaceable_points:
  - name: Ensemble method
    description: How to combine predictions from multiple models
    options:
    - name: naive (average)
      traits:
      - equal weights
      - simple
      - robust
      fit_for:
      - diverse models
      - baseline ensembles
      not_fit_for:
      - correlated models
      - optimal weighting
    - name: regression (learned weights)
      traits:
      - optimal weights
      - data-driven
      - flexible
      fit_for:
      - correlated base models
      - performance optimization
      not_fit_for:
      - small training data
      - too many models
    default: naive
  design_decisions:
  - 'Ensemble doesn''t retrain base models by default — evidence: darts/models/forecasting/ensemble_model.py:77
    — rationale: Uses pre-fitted models; train_forecasting_models=False is efficient.'
  - 'Sample dimension reduction via mean or custom function — evidence: darts/models/forecasting/ensemble_model.py:470
    — rationale: Handles probabilistic ensemble aggregation consistently.'
  - 'Likelihood parameter averaging for probabilistic ensembles — evidence: darts/models/forecasting/baselines.py:422
    — rationale: Groups by parameter type before averaging (e.g., each mu values together).'
  acceptance_hints:
  - Base models must be pre-fitted or train_forecasting_models=True
  - Probabilistic ensembles aggregate samples across models
  - NaiveEnsembleModel uses equal weighting across each models
- id: conformal_prediction
  name: Conformal Prediction
  order: 7
  responsibility: 'Calibrated uncertainty quantification via conformal prediction. WHY: Provides distribution-free
    coverage guarantees without assuming particular distribution forms for probabilistic forecasting.'
  interface:
    inputs:
    - Pre-trained GlobalForecastingModel
    - calibration series
    - quantiles list
    outputs:
    - Calibrated quantile prediction intervals
  required_methods:
  - name: ConformalModel.fit
    description: Calibrate conformal intervals using residuals between predictions and actuals. Wraps
      pre-trained model without retraining.
    evidence: darts/models/forecasting/conformal_models.py:189
  - name: ConformalModel.predict
    description: Generate calibrated quantile forecasts with coverage guarantees
    evidence: darts/models/forecasting/conformal_models.py
  - name: ConformalQRModel.fit
    description: Calibrate asymmetric intervals using quantile regression residuals
    evidence: darts/models/forecasting/conformal_models.py:1721
  key_behaviors:
  - behavior: Post-hoc calibration
    description: Wraps pre-trained model (doesn't retrain). Calibration adds no training cost; can be
      applied to any trained model.
    evidence: darts/models/forecasting/conformal_models.py:189
  - behavior: Residual-based calibration
    description: Calibration uses residuals between predictions and actuals. Standard conformal approach
      for interval estimation.
    evidence: darts/models/forecasting/conformal_models.py:1476
  - behavior: Two conformal variants
    description: Naive (symmetric intervals) and QR (asymmetric). QR handles heteroscedastic uncertainty
      better.
    evidence: darts/models/forecasting/conformal_models.py:1588-1827
  replaceable_points:
  - name: Conformal method
    description: Calibration approach for uncertainty intervals
    options:
    - name: naive (symmetric)
      traits:
      - symmetric intervals
      - homogeneous uncertainty
      fit_for:
      - homoscedastic errors
      - baseline calibration
      not_fit_for:
      - heteroscedastic data
      - asymmetric risks
    - name: quantile_regression (asymmetric)
      traits:
      - asymmetric intervals
      - variable width
      fit_for:
      - heteroscedastic uncertainty
      - different over/under prediction costs
      not_fit_for:
      - symmetric uncertainty assumption
    default: naive
  design_decisions:
  - 'Calibration uses residuals between predictions and actuals — evidence: darts/models/forecasting/conformal_models.py:1476
    — rationale: Residual-based calibration is standard conformal approach.'
  - 'Two conformal variants: naive (symmetric) and QR (asymmetric) — evidence: darts/models/forecasting/conformal_models.py:1588-1827
    — rationale: QR handles heteroscedastic uncertainty better.'
  - 'Wraps pre-trained model (doesn''t retrain) — evidence: darts/models/forecasting/conformal_models.py:189
    — rationale: Post-hoc calibration preserves original model.'
