    — rationale: Dict config is flexible; encoder_map tracks original config.'
  - 'Cyclic encoding returns two components (sin, cos) for periodicity — evidence: darts/dataprocessing/encoders/encoders.py:232
    — rationale: Sin/cos preserves continuity at period boundaries.'
  - 'IndexGenerator establishes lag boundaries for covariate alignment — evidence: darts/dataprocessing/encoders/encoder_base.py:196
