business_decisions:
- id: BD-001
  type: B/BA
  content: TimeSeries stores 3D values (time×component×sample) for both deterministic and probabilistic
    series
  rationale: The 3D representation (time×component×sample) unifies deterministic (sample=1) and probabilistic
    series in a single data structure, eliminating branching logic in downstream operations and simplifying
    the API boundary for each series types.
  evidence: darts/timeseries.py:111(__init__)
  stage: data_representation
  alternative_considered: Separate classes for deterministic/probabilistic were considered but rejected
    in favor of unified 3D structure
- id: BD-002
  type: B
  content: Static covariates support per-component or global application via DataFrame rows
  rationale: Per-component static covariates allow fine-grained feature association while global covariates
    use simple row-based structure, maintaining API consistency and reducing complexity at the boundary
    between data definition and model consumption.
  evidence: darts/timeseries.py:111(__init__)
  stage: data_representation
  alternative_considered: Separate attribute-based storage was rejected for DataFrame-based simplicity
- id: BD-003
  type: BA
  content: Hierarchy encoded as dict mapping child→parents for flexible aggregation
  rationale: Dict-based hierarchy representation supports arbitrary tree structures beyond simple hierarchical
    aggregation, decoupling the hierarchy definition from the aggregation logic and enabling complex organizational
    structures at the data boundary.
  evidence: darts/timeseries.py:111(__init__)
  stage: data_representation
  alternative_considered: Fixed-level hierarchy structures were rejected for flexibility of arbitrary
    DAGs
- id: BD-004
  type: M
  content: Factory methods (from_csv, from_dataframe, etc.) instead of public constructor
  rationale: Factory methods centralize input format handling and date inference logic, providing a clean
    public API boundary that hides internal construction complexity while supporting multiple input formats
    from a single entry point.
  evidence: darts/timeseries.py:506(module)
  stage: data_representation
  alternative_considered: Public constructor with multiple optional parameters was rejected for factory
    pattern clarity
  _evidence_issues:
  - 'FN_NOT_FOUND: module in darts/timeseries.py'
- id: BD-005
  type: B
  content: ModelMeta metaclass extracts __init__ parameters at creation time
  rationale: Metaclass-based parameter extraction enables model cloning and serialization with original
    parameters, decoupling model configuration from instantiation and providing a reliable boundary for
    model lifecycle management.
  evidence: darts/models/forecasting/forecasting_model.py:104(__call__)
  stage: forecasting_base
  alternative_considered: Manual parameter tracking was rejected for automatic metaclass extraction
- id: BD-006
  type: B
  content: 'Four covariate types: past, future, dual, mixed for model classification'
  rationale: Covariate timing constraints (past-only, future-only, both, or context-dependent) define
    fundamental model characteristics, establishing clear boundaries between model types and their data
    requirements at the forecasting interface.
  evidence: darts/models/forecasting/forecasting_model.py:3216(module)
  stage: forecasting_base
  alternative_considered: Untyped covariate handling was rejected for explicit type classification
  _evidence_issues:
  - 'FN_NOT_FOUND: module in darts/models/forecasting/forecasting_model.py'
- id: BD-007
  type: M/BA
  content: Encoder initialization deferred to model creation with add_encoders parameter
  rationale: Deferred encoder initialization allows optional covariate encoding to be configured at model
    creation, keeping the core model interface clean while enabling extensibility through a configurable
    parameter boundary.
  evidence: darts/models/forecasting/forecasting_model.py:2991(__init__)
  stage: forecasting_base
  alternative_considered: Eager encoder initialization was rejected for lazy configuration approach
- id: BD-008
  type: BA/M
  content: historical_forecasts() supports retrain callable for dynamic retraining
  rationale: Callable-based retrain logic in historical_forecasts enables rolling window evaluation with
    custom retrain strategies, establishing a flexible boundary for backtesting workflows that require
    model retraining between forecast windows.
  evidence: darts/models/forecasting/forecasting_model.py:671(historical_forecasts)
  stage: forecasting_base
  alternative_considered: Fixed retrain strategy was rejected for callable-based flexibility
- id: BD-009
  type: B
  content: 'Two-level architecture: TorchForecastingModel (orchestration) + PLForecastingModule (nn.Module)'
  rationale: Separation between orchestration (TorchForecastingModel) and neural network (PLForecastingModule)
    creates clear boundaries enabling custom nn.Module reuse while maintaining Darts-specific API patterns
    for forecasting workflows.
  evidence: darts/models/forecasting/torch_forecasting_model.py:135(module)
  stage: torch_forecasting
  alternative_considered: Monolithic model class was rejected for separation of PyTorch boilerplate from
    forecasting logic
  _evidence_issues:
  - 'FN_NOT_FOUND: module in darts/models/forecasting/torch_forecasting_model.py'
- id: BD-010
  type: M
  content: Random state managed via random_method decorator at model level
  rationale: Decorator-based random state management ensures reproducibility across PyTorch operations,
    data loading, and NumPy/SciPy calls within model methods, providing a consistent boundary for stochastic
    behavior control.
  evidence: darts/models/forecasting/torch_forecasting_model.py:136(module)
  stage: torch_forecasting
  alternative_considered: Manual random state management per operation was rejected for decorator simplicity
  _evidence_issues:
  - 'FN_NOT_FOUND: module in darts/models/forecasting/torch_forecasting_model.py'
- id: BD-011
  type: M/BA
  content: Lazy model creation after seeing first training sample
  rationale: Lazy model initialization defers nn.Module construction until training data dimensions are
    known, avoiding configuration errors and providing a practical boundary for dynamic input shape handling
    in PyTorch models.
  evidence: darts/models/forecasting/torch_forecasting_model.py:137(__init__)
  stage: torch_forecasting
  alternative_considered: Explicit dimension parameters at construction were rejected for data-driven
    initialization
- id: BD-012
  type: B
  content: Five covariate support classes map to model architecture requirements
  rationale: Covariate support classes (PastCovariates, FutureCovariates, DualCovariates, SharedCovariates,
    MixedCovariates) enforce different availability constraints, establishing clear architectural boundaries
    for which covariates each model type can consume.
  evidence: darts/models/forecasting/torch_forecasting_model.py:2843(module)
  stage: torch_forecasting
  alternative_considered: Runtime constraint checking was rejected for compile-time class-based enforcement
  _evidence_issues:
  - 'FN_NOT_FOUND: module in darts/models/forecasting/torch_forecasting_model.py'
- id: BD-013
  type: B
  content: ARIMA supports integer differencing (d) for non-stationary series
  rationale: Integer differencing parameter (d) aligns with standard ARIMA specification, enabling unit
    root handling for non-stationary series and providing a familiar boundary for statistical forecasting
    practitioners.
  evidence: darts/models/forecasting/arima.py:32(__init__)
  stage: statistical_forecasting
  alternative_considered: Automatic differencing order selection was rejected for explicit user control
- id: BD-014
  type: B
  content: VARIMA implements local model interface (single multivariate series)
  rationale: VARIMA's local (non-global) architecture treats multivariate series as a single entity, establishing
    clear boundary semantics distinguishing it from global models that consume multiple series independently
    for training.
  evidence: darts/models/forecasting/varima.py:272(supports_multivariate)
  stage: statistical_forecasting
  alternative_considered: Global VARIMA variant was considered but not implemented due to complexity
- id: BD-015
  type: M/DK
  content: statsmodels wrapping pattern for each classical statistical models
  rationale: statsmodels wrapping leverages well-tested statistical implementations while providing Darts-compatible
    interface, establishing a boundary between domain-specific forecasting logic and proven statistical
    estimation routines.
  evidence: darts/models/forecasting/arima.py:6(module)
  stage: statistical_forecasting
  alternative_considered: Custom implementations were rejected for statsmodels reliability
  _evidence_issues:
  - 'FN_NOT_FOUND: module in darts/models/forecasting/arima.py'
- id: BD-016
  type: B
  content: Multioutput handled via per-horizon estimators when model lacks native support
  rationale: Per-horizon estimator pattern handles SKLearn's inconsistent multioutput API, providing a
    robust boundary that normalizes behavior across different scikit-learn estimator types for multi-step
    forecasting.
  evidence: darts/models/forecasting/sklearn_model.py:634(get_estimator)
  stage: sklearn_forecasting
  alternative_considered: Wrapper-based multioutput handling was rejected for per-horizon robustness
- id: BD-017
  type: B
  content: Lagged features generated from target and covariates at fit time
  rationale: Tabularization via lagged feature generation is fundamental to sklearn model compatibility,
    establishing a boundary that transforms time series into tabular format suitable for regression-based
    forecasting approaches.
  evidence: darts/models/forecasting/sklearn_model.py:483(_get_lagged_features)
  stage: sklearn_forecasting
  alternative_considered: Static feature extraction was rejected for dynamic lag-based approach
- id: BD-018
  type: M
  content: Categorical features supported via SKLearnModelWithCategoricalFeatures mixin
  rationale: Mixin-based categorical feature handling encapsulates encoding logic without modifying base
    sklearn models, providing a clean boundary between categorical encoding concerns and core regression
    functionality.
  evidence: darts/models/forecasting/sklearn_model.py:2203(__init__)
  stage: sklearn_forecasting
  alternative_considered: Base class modification was rejected for mixin-based approach
- id: BD-019
  type: M
  content: Quantile models stored separately in _QuantileModelContainer
  rationale: Container-based organization cleanly manages multiple quantile predictions, establishing
    a clear boundary between individual quantile models and their collective management for probabilistic
    forecasting.
  evidence: darts/models/forecasting/sklearn_model.py:1619(_QuantileModelContainer)
  stage: sklearn_forecasting
  alternative_considered: Flat model storage was rejected for container-based organization
- id: BD-020
  type: M/BA
  content: Ensemble doesn't retrain base models by default
  rationale: Default non-retraining behavior (train_forecasting_models=False) assumes pre-fitted models,
    establishing an efficient boundary for ensemble composition that avoids redundant training while supporting
    retraining when needed.
  evidence: darts/models/forecasting/ensemble_model.py:77(__init__)
  stage: ensemble_forecasting
  alternative_considered: Eager retraining was rejected for efficiency with pre-fitted models
- id: BD-021
  type: BA
  content: Sample dimension reduction via mean or custom function
  rationale: Probabilistic ensemble aggregation via sample dimension reduction (mean or custom) provides
    consistent handling of multi-sample predictions, establishing a flexible boundary for probabilistic
    forecast combination.
  evidence: darts/models/forecasting/ensemble_model.py:470(_predictions_reduction)
  stage: ensemble_forecasting
  alternative_considered: Fixed mean reduction was rejected for custom function flexibility
- id: BD-022
  type: M/BA
  content: Likelihood parameter averaging for probabilistic ensembles
  rationale: Parameter-type grouping before averaging (e.g., each mu values together) ensures mathematically
    correct likelihood parameter aggregation, establishing a proper statistical boundary for probabilistic
    baseline ensembles.
  evidence: darts/models/forecasting/baselines.py:422(_params_average)
  stage: ensemble_forecasting
  alternative_considered: Flat parameter averaging was rejected for type-aware grouping approach
- id: BD-023
  type: B
  content: Calibration uses residuals between predictions and actuals
  rationale: Residual-based calibration is the standard conformal prediction approach for uncertainty
    quantification, establishing a principled boundary between point predictions and probabilistic coverage
    guarantees.
  evidence: darts/models/forecasting/conformal_models.py:1827(_calibrate_interval)
  stage: conformal_prediction
  alternative_considered: Bayesian uncertainty was rejected for distribution-free conformal approach
- id: BD-024
  type: B
  content: 'Two conformal variants: naive (symmetric) and QR (asymmetric)'
  rationale: Naive symmetric and quantile regression asymmetric conformal variants handle different uncertainty
    patterns, establishing a boundary for choosing appropriate uncertainty estimation based on heteroscedasticity
    requirements.
  evidence: darts/models/forecasting/conformal_models.py:1588(module)
  stage: conformal_prediction
  alternative_considered: Single conformal variant was rejected for heteroscedasticity handling flexibility
  _evidence_issues:
  - 'FN_NOT_FOUND: module in darts/models/forecasting/conformal_models.py'
  vague_rationale: true
- id: BD-025
  type: BA/M
  content: Wraps pre-trained model (doesn't retrain)
  rationale: Post-hoc calibration wraps existing models without retraining, preserving original predictions
    while adding uncertainty quantification, establishing a non-destructive boundary for uncertainty estimation.
  evidence: darts/models/forecasting/conformal_models.py:189(fit)
  stage: conformal_prediction
  alternative_considered: Joint training was rejected for post-hoc approach simplicity
- id: BD-026
  type: M
  content: ts_transform is static method for efficient multiprocessing
  rationale: Static transform method avoids copying transformer state across processes during multiprocessing,
    establishing an efficient boundary for parallel data transformation operations.
  evidence: darts/dataprocessing/transformers/base_data_transformer.py:61(__init__)
  stage: data_transformation
  alternative_considered: Instance method transform was rejected for static method efficiency
- id: BD-027
  type: M/BA
  content: Fixed params from __init__ attrs before super().__init__
  rationale: Parameter detection based on __init__ structure order enables automatic transformer configuration,
    establishing a pragmatic boundary for parameter introspection without explicit registration.
  evidence: darts/dataprocessing/transformers/base_data_transformer.py:61(__init__)
  stage: data_transformation
  alternative_considered: Explicit parameter registration was rejected for automatic introspection approach
- id: BD-028
  type: M
  content: Component masking via boolean array with auto-apply/unapply
  rationale: Boolean array masking selects which series components get transformed, with automatic application
    and restoration providing a convenient boundary for selective component-wise data transformation.
  evidence: darts/dataprocessing/transformers/base_data_transformer.py:467(_generate_component_mask)
  stage: data_transformation
  alternative_considered: Manual mask application was rejected for automatic approach convenience
- id: BD-029
  type: BA/DK
  content: global_fit flag controls whether to fit per-series or across each series
  rationale: Global fit pooling enables per-component statistics across multiple series, establishing
    a flexible boundary between series-specific and cross-series fitting strategies for transformer normalization.
  evidence: darts/dataprocessing/transformers/fittable_data_transformer.py:25(__init__)
  stage: data_transformation
  alternative_considered: Fixed per-series fitting was rejected for global pooling flexibility
- id: BD-030
  type: B/BA
  content: Separate encode_train vs encode_inference methods handle different index ranges
  rationale: Training (historical index) and inference (future index) encoding separation is fundamental
    to covariate availability constraints, establishing a clear boundary for temporal encoding based on
    forecast horizon.
  evidence: darts/dataprocessing/encoders/encoder_base.py:483(module)
  stage: encoding
  alternative_considered: Unified encoding method was rejected for explicit train/inference separation
  _evidence_issues:
  - 'FN_NOT_FOUND: module in darts/dataprocessing/encoders/encoder_base.py'
- id: BD-031
  type: M
  content: SequentialEncoder parses add_encoders dict to instantiate encoders
  rationale: Dict-based encoder configuration provides flexibility while encoder_map tracks original config
    for reproducibility, establishing a configurable boundary for covariate encoding setup.
  evidence: darts/dataprocessing/encoders/encoders.py:1338(_setup_encoders)
  stage: encoding
  alternative_considered: Hardcoded encoder setup was rejected for dict-based flexibility
- id: BD-032
  type: M
  content: Cyclic encoding returns two components (sin, cos) for periodicity
  rationale: Sin/cos encoding preserves continuity at period boundaries (e.g., hour 23 and hour 0 are
    adjacent), establishing a mathematically correct boundary for periodic feature representation.
  evidence: darts/dataprocessing/encoders/encoders.py:732(_encode)
  stage: encoding
  alternative_considered: Single value encoding was rejected for boundary continuity
- id: BD-033
  type: B
  content: IndexGenerator establishes lag boundaries for covariate alignment
  rationale: Covariate lag alignment is critical for temporal correctness; IndexGenerator establishes
    the boundary for which covariate values are available at each target time step.
  evidence: darts/dataprocessing/encoders/encoder_base.py:196(_verify_scenario)
  stage: encoding
  alternative_considered: Runtime lag checking was rejected for IndexGenerator-based validation
- id: BD-034
  type: B/BA
  content: S matrix encodes summation structure from hierarchy
  rationale: Summation matrix (S) maps bottom-level series to each aggregation levels for hierarchical
    consistency, establishing a fundamental boundary between base forecasts and reconciled hierarchical
    predictions.
  evidence: darts/dataprocessing/transformers/reconciliation.py:27(_get_summation_matrix)
  stage: hierarchical_reconciliation
  alternative_considered: Runtime aggregation was rejected for matrix-based approach
- id: BD-035
  type: B
  content: G matrix computed from fit data based on reconciliation method
  rationale: MinT-style optimization computes G matrix to minimize trace of reconciled covariance, establishing
    a data-driven boundary for optimal hierarchical reconciliation coefficients.
  evidence: darts/dataprocessing/transformers/reconciliation.py:232(get_matrices)
  stage: hierarchical_reconciliation
  alternative_considered: Fixed reconciliation coefficients were rejected for data-driven optimization
- id: BD-036
  type: B/BA
  content: AnomalyModel delegates to scorer for scoring and detector for thresholding
  rationale: Separation between scorer (quantifies deviation) and detector (applies threshold) provides
    flexible boundary for combining different anomaly scoring methods with detection strategies.
  evidence: darts/ad/anomaly_model/anomaly_model.py:44(fit)
  stage: anomaly_detection
  alternative_considered: Monolithic anomaly detection was rejected for scorer/detector separation
- id: BD-037
  type: M
  content: Windowed scorer trains per-component models for contextual anomalies
  rationale: Window-based per-component modeling captures local temporal context patterns for anomaly
    scoring, establishing a boundary for contextual anomaly detection that respects time-series locality.
  evidence: darts/ad/scorers/scorers.py:927(__init__)
  stage: anomaly_detection
  alternative_considered: Global anomaly scoring was rejected for window-based contextual approach
- id: BD-038
  type: B
  content: Aggregator combines multivariate binary series with AND/OR logic
  rationale: AND/OR aggregation logic defines different semantics for multivariate anomaly detection (each
    vs any components anomalous), establishing a clear boundary for combining component-level anomaly
    signals.
  evidence: darts/ad/aggregators/and_aggregator.py:32(_predict_core)
  stage: anomaly_detection
  alternative_considered: Weighted aggregation was rejected for simple AND/OR logic
- id: BD-039
  type: M/BA
  content: NLLScorer computes negative log-likelihood of observed values
  rationale: Probabilistic negative log-likelihood scoring uses fitted distribution parameters for anomaly
    scoring, establishing a principled boundary for statistical anomaly quantification.
  evidence: darts/ad/scorers/scorers.py:983(_score_core_nllikelihood)
  stage: anomaly_detection
  alternative_considered: Fixed threshold scoring was rejected for likelihood-based approach
- id: BD-040
  type: B
  content: Kalman filter uses N4SID for automatic system identification
  rationale: N4SID (Numerical Subspace State Space Identification) learns state-space model parameters
    from data automatically, establishing a boundary for black-box state-space modeling without manual
    parameter tuning.
  evidence: darts/models/filtering/kalman_filter.py:74(fit)
  stage: filtering
  alternative_considered: Manual state-space specification was rejected for automatic N4SID approach
- id: BD-041
  type: M
  content: FilteringAnomalyModel uses filter output as prediction baseline
  rationale: Filter output provides expected values with anomaly defined as deviation from filter, establishing
    a boundary between normal pattern extraction and anomaly detection.
  evidence: darts/ad/anomaly_model/filtering_am.py:64(fit)
  stage: filtering
  alternative_considered: Separate anomaly detection was rejected for filter-based approach integration
- id: BD-042
  type: M
  content: Metrics support component_reduction and series_reduction functions
  rationale: Flexible reduction functions enable customizable aggregation across components and series,
    establishing a boundary for metric computation that supports both fine-grained and aggregate evaluation.
  evidence: darts/metrics/metrics.py:312(mae)
  stage: metrics_evaluation
  alternative_considered: Fixed mean reduction was rejected for customizable aggregation functions
- id: BD-043
  type: B
  content: Probabilistic metrics extract deterministic series via quantile=0.5
  rationale: Median extraction (quantile=0.5) enables point metric computation on probabilistic series,
    establishing a clear boundary between stochastic and deterministic metric evaluation.
  evidence: darts/metrics/metrics.py:39(err)
  stage: metrics_evaluation
  alternative_considered: Mean extraction was rejected for median robustness to outliers
- id: BD-044
  type: M/BA
  content: Interval metrics take q_interval tuple for coverage calculation
  rationale: Interval tuple parameter enables coverage calculation by checking if actuals fall between
    specified quantiles, establishing a boundary for probabilistic forecast quality assessment.
  evidence: darts/metrics/metrics.py:3398(ic)
  stage: metrics_evaluation
  alternative_considered: Fixed 90% interval was rejected for configurable interval boundaries
- id: BD-045
  type: M
  content: SHAP explainer requires background series for expected value computation
  rationale: Background distribution defines expected prediction (base value) for SHAP value computation,
    establishing a necessary boundary for feature attribution in time series forecasting.
  evidence: darts/explainability/shap_explainer.py:562(__init__)
  stage: explainability
  alternative_considered: Training mean baseline was considered but rejected for explicit background specification
- id: BD-046
  type: M/DK
  content: Horizon-specific explanations computed per forecast step
  rationale: Per-horizon SHAP computation captures potentially varying feature importance across forecast
    steps, establishing a boundary that respects temporal dynamics in model explanations.
  evidence: darts/explainability/shap_explainer.py:197(explain)
  stage: explainability
  alternative_considered: Aggregate importance was rejected for per-horizon granularity
- id: BD-047
  type: B
  content: Likelihood computes NLL loss for training with optional priors
  rationale: Negative log-likelihood is the natural loss function for probabilistic models, providing
    a principled boundary between prediction and uncertainty estimation during training.
  evidence: darts/utils/likelihood_models/torch.py:1160(compute_loss)
  stage: likelihood
  alternative_considered: MSE-based uncertainty was rejected for proper probabilistic loss
- id: BD-048
  type: BA/M
  content: Prior parameters can be specified with prior_strength for regularization
  rationale: Prior-based regularization biases distribution parameters toward expected ranges, establishing
    a boundary for Bayesian-inspired probabilistic modeling with adjustable regularization strength.
  evidence: darts/utils/likelihood_models/torch.py:1044(__init__)
  stage: likelihood
  alternative_considered: Fixed priors without strength control was rejected for flexibility
- id: BD-049
  type: B/DK
  content: Sample method draws from fitted distribution for prediction
  rationale: Distribution sampling enables Monte Carlo uncertainty propagation for downstream predictions,
    establishing a boundary for generating multiple stochastic scenarios from probabilistic models.
  evidence: darts/utils/likelihood_models/torch.py:1092(sample)
  stage: likelihood
  alternative_considered: Analytical interval propagation was rejected for sampling flexibility
- id: BD-050
  type: M/BA
  content: QuantileRegression is not a true likelihood (uses pinball loss)
  rationale: Quantile regression's pinball loss avoids distribution form assumptions, establishing a boundary
    between parametric likelihoods and distribution-free quantile estimation methods.
  evidence: darts/utils/likelihood_models/torch.py:1160(compute_loss)
  stage: likelihood
  alternative_considered: Gaussian assumption was rejected for flexible quantile estimation
- id: BD-051
  type: M
  content: Dataset loaders inherit from DatasetLoaderCSV with on-demand download
