replaceable_slots:
- id: slot-001
  name: data_source
  description: Choose based on data source availability and integration requirements
  used_in_stages: []
  options:
  - name: Built-in Darts Datasets
    traits:
    - static
    - historical
    - validated
    - pre-processed
    fit_for:
    - Quick experimentation, benchmarking, tutorials
    not_fit_for:
    - Real-time data, custom domains, production pipelines
  - name: User CSV Files
    traits:
    - flexible
    - user-controlled
    - custom-format
    fit_for:
    - Custom data, production systems, proprietary datasets
    not_fit_for:
    - Beginners without data preparation skills
  - name: pandas DataFrame
    traits:
    - in-memory
    - dynamic
    - programmatic
    fit_for:
    - Integration with data analysis workflows
    not_fit_for:
    - Very large datasets (>10M rows)
  - name: polars DataFrame
    traits:
    - fast
    - lazy
    - memory-efficient
    fit_for:
    - Large datasets, performance-critical applications
    not_fit_for:
    - Simple use cases where pandas is sufficient
  - name: xarray DataArray
    traits:
    - labeled
    - multi-dimensional
    - metadata-rich
    fit_for:
    - Scientific computing, geospatial data, complex metadata
    not_fit_for:
    - Simple tabular time series
  default: Built-in Darts Datasets
  _source: worker_resource
- id: slot-002
  name: forecasting_backend
  description: Choose based on model complexity needs, available hardware, and whether GPU is available
  used_in_stages: []
  options:
  - name: Statistical Models
    traits:
    - fast
    - interpretable
    - no GPU
    - univariate
    fit_for:
    - Simple univariate forecasting, explainability requirements, CPU-only environments
    not_fit_for:
    - Complex multivariate patterns, very long series, transfer learning
  - name: PyTorch Deep Learning
    traits:
    - GPU-accelerated
    - multivariate
    - transfer learning
    - complex patterns
    fit_for:
    - Complex multivariate series, GPU environments, state-of-the-art performance
    not_fit_for:
    - CPU-only production, simple univariate forecasting
  - name: Gradient Boosting
    traits:
    - fast
    - interpretable
    - tabular-optimized
    - CPU
    fit_for:
    - Tabular covariate-based forecasting, CPU production
    not_fit_for:
    - Sequence-to-sequence tasks, long-range dependencies
  - name: Facebook Prophet
    traits:
    - trend+seasonality
    - holiday effects
    - interpretable
    fit_for:
    - Business forecasting with strong seasonality patterns
    not_fit_for:
    - Complex multivariate patterns, high-frequency data
  - name: StatsForecast
    traits:
    - fast
    - automated
    - many models
    fit_for:
    - Automated forecasting pipelines, model selection
    not_fit_for:
    - Custom model architectures
  - name: NeuralForecast
    traits:
    - advanced
    - multi-model
    - optimized
    fit_for:
    - Advanced users needing specialized neural forecasting models
    not_fit_for:
    - Standard forecasting needs covered by other options
  default: Statistical Models (statsmodels)
  _source: worker_resource
- id: slot-003
  name: foundation_model
  description: Choose based on model size preferences and specific model performance on your data
  used_in_stages: []
  options:
  - name: Amazon Chronos-2
    traits:
    - pretrained
    - zero-shot
    - multivariate
    - probabilistic
    fit_for:
    - Quick forecasting without training, foundation model research
    not_fit_for:
    - Custom architectures, fine-tuning without PyTorch
  - name: Google TimesFM 2.5
    traits:
    - pretrained
    - zero-shot
    - 200M params
    fit_for:
    - Quick forecasting without training, production-ready foundation
    not_fit_for:
    - Custom architectures
  default: Amazon Chronos-2 (amazon/chronos-2)
  _source: worker_resource
- id: slot-004
  name: visualization_backend
  description: Use plotly for interactivity, matplotlib for simplicity and static output
  used_in_stages: []
  options:
  - name: matplotlib
    traits:
    - static plots
    - wide support
    - publication-ready
    fit_for:
    - Standard plotting, publications, static reports
    not_fit_for:
    - Interactive exploration, web dashboards
  - name: plotly
    traits:
    - interactive
    - web-ready
    - zoom/pan
    fit_for:
    - Interactive exploration, dashboards, web applications
    not_fit_for:
    - Static publications, minimal dependencies
  default: matplotlib
  _source: worker_resource
- id: slot-005
  name: dataframe_backend
  description: Use polars for performance with large datasets, pandas for maximum compatibility
  used_in_stages: []
  options:
  - name: pandas
    traits:
    - default
    - widely supported
    - mature
    fit_for:
    - General use, maximum compatibility
    not_fit_for:
    - Very large datasets where performance matters
  - name: polars
    traits:
    - fast
    - lazy evaluation
    - memory-efficient
    fit_for:
    - Large datasets, performance-critical operations
    not_fit_for:
    - Simple operations, ecosystem with pandas-only packages
  default: pandas
  _source: worker_resource
- id: slot-006
  name: hyperparameter_optimization
  description: Use Optuna for intelligent search, Ray for distributed tuning, manual for simplicity
  used_in_stages: []
  options:
  - name: Optuna
    traits:
    - ' Bayesian optimization'
    - distributed
    - pruning
    fit_for:
    - Automated hyperparameter tuning, large search spaces
    not_fit_for:
    - Simple use cases without tuning needs
  - name: Ray Tune
    traits:
    - distributed
    - fault-tolerant
    - multi-node
    fit_for:
    - Large-scale distributed hyperparameter search
    not_fit_for:
    - Single-machine tuning, simple searches
  - name: Manual Grid/Random Search
    traits:
    - simple
    - no extra deps
    - sklearn-compatible
    fit_for:
    - Simple tuning, sklearn-based models
    not_fit_for:
    - Complex search spaces, PyTorch models
  default: Manual Grid/Random Search (sklearn)
  _source: worker_resource
