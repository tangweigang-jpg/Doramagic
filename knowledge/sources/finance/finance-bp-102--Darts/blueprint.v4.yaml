  - ConformalQRModel requires quantile-capable base model
- id: data_transformation
  name: Data Transformation Pipeline
  order: 8
  responsibility: 'Composable data transformations with fit/transform/inverse_transform. WHY: Standard
    ML preprocessing pipeline with series-aware handling and parallel processing support.'
  interface:
    inputs:
    - TimeSeries or Sequence[TimeSeries]
    - transformer parameters
    outputs:
    - Transformed TimeSeries with fitted parameters stored
  required_methods:
  - name: BaseDataTransformer.transform
