  - name: FittableDataTransformer.fit
    description: Learn transformation parameters from data with optional global_fit across series
    evidence: darts/dataprocessing/transformers/fittable_data_transformer.py:24
  - name: InvertibleDataTransformer.inverse_transform
    description: Reverse transformation using fitted parameters
    evidence: darts/dataprocessing/transformers/invertible_data_transformer.py:24
  - name: Pipeline.fit_transform
    description: Fit each transformers then transform series sequentially
    evidence: darts/dataprocessing/pipeline.py:21
  key_behaviors:
  - behavior: Static ts_transform for multiprocessing
    description: ts_transform is static method to avoid copying transformer state across processes.
    evidence: darts/dataprocessing/transformers/base_data_transformer.py:72-98
  - behavior: Automatic parameter detection
    description: Fixed params from __init__ attrs before super().__init__. Parameter detection is automatic
      based on __init__ structure.
    evidence: darts/dataprocessing/transformers/base_data_transformer.py:84-88
  - behavior: Component masking
    description: Boolean array with auto-apply/unapply. Masks select which components get transformed.
    evidence: darts/dataprocessing/transformers/base_data_transformer.py:467
  replaceable_points:
  - name: Scaler backend
    description: Underlying sklearn scaler for normalization
    options:
    - name: StandardScaler
      traits:
      - z-score normalization
      - mean+std
      fit_for:
      - normal distributions
      - most cases
      not_fit_for:
      - outliers
      - non-normal data
    - name: RobustScaler
      traits:
      - median+IQR
      - outlier resistant
      fit_for:
      - outlier presence
      - skewed distributions
      not_fit_for:
      - normal distributions
      - small datasets
    - name: MinMaxScaler
      traits:
      - 0-1 range
      - bounded
      fit_for:
      - neural networks
      - bounded targets
      not_fit_for:
      - outliers
      - unknown range
    default: StandardScaler
  - name: Parallelization
    description: Joblib parallel execution for fitting multiple transformers
    options:
    - name: '1'
      traits:
      - sequential
      - no overhead
      fit_for:
      - debugging
      - small datasets
      not_fit_for:
      - large datasets
      - many transformers
    - name: -1 (each cores)
      traits:
      - parallel
      - max utilization
      fit_for:
      - large datasets
      - production
      not_fit_for:
      - debugging
      - resource constraints
    - name: N
      traits:
      - N cores
      - configurable
      fit_for:
      - resource limits
      - tuning
      not_fit_for:
      - simple cases
    default: '1'
  design_decisions:
  - 'ts_transform is static method for efficient multiprocessing — evidence: darts/dataprocessing/transformers/base_data_transformer.py:72-98
    — rationale: Avoids copying transformer state across processes.'
  - 'Fixed params from __init__ attrs before super().__init__ — evidence: darts/dataprocessing/transformers/base_data_transformer.py:84-88
    — rationale: Parameter detection is automatic based on __init__ structure.'
  - 'Component masking via boolean array with auto-apply/unapply — evidence: darts/dataprocessing/transformers/base_data_transformer.py:467
    — rationale: Masks select which components get transformed.'
  - 'global_fit flag controls whether to fit per-series or across each series — evidence: darts/dataprocessing/transformers/fittable_data_transformer.py:25
    — rationale: Global fit useful for per-component statistics pooling.'
  acceptance_hints:
  - ts_transform is static to avoid pickling issues in multiprocessing
  - _fit_called flag must be set before transform() calls
  - Fixed parameters detected from __init__ attrs before super().__init__
