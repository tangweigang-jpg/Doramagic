applicability:
  domain: finance
  task_type: time series forecasting and anomaly detection
  description: Python library for user-friendly forecasting and anomaly detection on time series, supporting
    univariate/multivariate series, deterministic/probabilistic predictions, and external covariates.
  prerequisites: Users should understand time series concepts (train/test splits, lags, covariates), basic
    Python, and have numpy/pandas familiarity. Knowledge of ML/forecasting helpful but not required.
  not_suitable_for: Real-time streaming data processing, non-time-series ML tasks, deep customization
    of underlying model architectures, or scenarios requiring minimal dependencies.
