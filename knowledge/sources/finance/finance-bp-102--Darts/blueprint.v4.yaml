    (2) explainer initialized with model reference, (3) model retrained or refit with different parameters,
    (4) explainer state becomes stale but no invalidation occurs, (5) explanation'
  evidence: BD-145 (pattern across forecasting_model.py, detectors.py), BD-046 (darts/explainability/shap_explainer.py:197),
    BD-156 (explainability.py:78)
  stage: global
  alternative_considered: Explainer binding to specific model state was not implemented
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-173
  type: BA/M
  content: 'CONTRADICTION: BD-082 × BD-068 → Transformer Global Fit Default Conflicts with Forecasting
    Global Model Behavior'
  rationale: 'FittableDataTransformer defaults to global_fit=False (BD-082), fitting transformers per-series
    independently. But GlobalForecastingModel with single series mode fits one model per series (BD-068)
    maintaining per-series behavior. This creates an inconsistency: transformers normalize independently
    per series (per-series statistics) while global models may expect cross-series normalized statistics.
    Users applying global models across normalized series get different results than expected—cross-serie'
  evidence: BD-082 (darts/dataprocessing/transformers/fittable_data_transformer.py:33), BD-068 (forecasting_model.py:780)
  stage: global
  alternative_considered: Consistent global_fit semantics across each components was considered but backward
    compatibility prioritized
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
