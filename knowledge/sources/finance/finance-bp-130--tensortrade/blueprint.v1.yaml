id: finance-bp-130
name: TensorTrade
sop_version: '3.6'
source:
  projects:
  - tensortrade
  commit_hash: d58afba23deb1fded39793203b7997c3990bb032
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: reinforcement learning for algorithmic trading
  description: Open-source Python framework for building, training, and evaluating
    reinforcement learning agents for trading financial instruments. Provides composable
    components for environments, action schemes, reward functions, and data feeds.
  prerequisites: Python 3.12+, basic understanding of reinforcement learning and trading
    concepts, familiarity with Gymnasium-compatible RL interfaces
  not_suitable_for: Production trading systems with real capital, low-latency market
    making, high-frequency trading strategies, non-RL trading approaches
stages:
- id: data_collection
  name: Data Collection & Generation
  order: 1
  responsibility: 'Fetches historical market data from cryptocurrency exchanges and
    generates synthetic price data using stochastic processes. WHY: Trading strategies
    require both real historical data and simulated scenarios for robust training
    and testing across different market conditions.'
  interface:
    inputs:
    - exchange name
    - trading pair
    - timeframe
    outputs:
    - DataFrame with OHLCV data
  required_methods:
  - name: CryptoDataDownload.fetch
    description: Downloads OHLCV (Open, High, Low, Close, Volume) historical data
      from specified cryptocurrency exchange
    evidence: tensortrade/data/cdd.py:14(CryptoDataDownload)
  - name: gbm.generate
    description: Generates synthetic price paths using Geometric Brownian Motion stochastic
      process
    evidence: tensortrade/stochastic/processes/gbm.py:64(gbm)
  - name: ModelParameters.default
    description: Returns default parameters for stochastic models including drift
      (mu) and volatility (sigma) values
    evidence: tensortrade/stochastic/utils/parameters.py:10(ModelParameters)
  key_behaviors:
  - behavior: Decimal precision for financial calculations
    description: Every financial quantities use Decimal type to avoid floating-point
      rounding errors common in monetary calculations
    evidence: tensortrade/oms/instruments/quantity.py:18(Decimal)
  - behavior: Stochastic data generation
    description: Leverages established 'stochastic' package for mathematically rigorous
      GBM, Heston, and Ornstein-Uhlenbeck processes to generate realistic synthetic
      market data
    evidence: tensortrade/stochastic/processes/gbm.py:18(stochastic)
  - behavior: Default financial assumptions in stochastic models
    description: 'Default parameters encode financial assumptions: ~5.8% annual drift
      (mu=0.058) and 12.5% volatility (sigma=0.125) - users should override for market-specific
      backtesting'
    evidence: tensortrade/stochastic/utils/parameters.py:115-133(default)
  replaceable_points:
  - name: Data source
    description: Switch between real exchange data and synthetic generation for training/testing
      scenarios
    options:
    - name: gbm
      traits:
      - Geometric Brownian Motion
      - continuous-time
      - lognormal prices
      fit_for:
      - Quick prototyping
      - Controlled experiments
      - Baseline performance testing
      not_fit_for:
      - Realistic microstructure effects
      - Jump processes
      - Volatility clustering
    - name: heston
      traits:
      - Stochastic volatility
      - Heston model
      - Correlated price-volatility
      fit_for:
      - Volatility modeling
      - Options pricing validation
      - Regime-switching markets
      not_fit_for:
      - Simple baseline testing
      - Fast data generation
    - name: ornstein_uhlenbeck
      traits:
      - Mean-reverting
      - Ornstein-Uhlenbeck process
      - Stationary
      fit_for:
      - Mean-reverting assets
      - Interest rate modeling
      - Arbitrage detection
      not_fit_for:
      - Trending markets
      - Strong momentum scenarios
    - name: CryptoDataDownload
      traits:
      - Real exchange data
      - Historical OHLCV
      - Multi-exchange support
      fit_for:
      - Realistic backtesting
      - Trained model evaluation
      - Historical strategy analysis
      not_fit_for:
      - Controlled experiments
      - Missing historical data
      - Future price simulation
    default: gbm
  design_decisions:
  - 'Decision: Decimal for financial precision over float | Evidence: tensortrade/oms/instruments/quantity.py:18(Decimal)
    | Rationale: Floating point causes rounding errors in financial calculations;
    Decimal ensures exact representation of monetary values'
  - 'Decision: Stochastic process library for data generation | Evidence: tensortrade/stochastic/processes/gbm.py:18(stochastic)
    | Rationale: Leverages established ''stochastic'' package for mathematically rigorous
    GBM, Heston, OU processes'
  - 'Decision: Default stochastic parameters encode annual drift and volatility |
    Evidence: tensortrade/stochastic/utils/parameters.py:115-133 | Rationale: Sensible
    defaults enable quickstart; users must override for market-specific backtesting'
  acceptance_hints:
  - DataFrame output has correct OHLCV columns with proper datetime index
  - Synthetic data generates reproducible results with seeded stochastic processes
  - Real exchange data fetches without authentication errors for supported exchanges
  - Every financial quantities in generated data use Decimal precision
- id: feature_engineering
  name: Feature Engineering & Data Feed
  order: 2
  responsibility: 'Transforms raw price data into reactive stream objects for composable,
    declarative data transformations. WHY: Enables the declarative composition of
    data transformations without mutable state, supporting topological execution order
    and observable patterns.'
  interface:
    inputs:
    - raw price series
    - wallet states
    - exchange pairs
    outputs:
    - Dict of named stream values
  required_methods:
  - name: Stream.source
    description: Creates an iterable source stream from DataFrame or other iterables,
      converting rows to stream values
    evidence: tensortrade/feed/core/base.py:498(IterableStream)
  - name: DataFeed.next
    description: Advances each streams in the feed using topological execution order,
      returns dict of current values
    evidence: tensortrade/feed/core/feed.py:8(DataFeed)
  - name: Sensor.observe
    description: Creates a stream that observes external object attributes, triggering
      on attribute changes
    evidence: tensortrade/feed/core/base.py:582(Sensor)
  - name: Placeholder.set
    description: Injects runtime data into placeholder streams without recompiling
      the DAG
    evidence: tensortrade/feed/core/base.py:615(Placeholder)
  key_behaviors:
  - behavior: DAG execution with topological sort
    description: Streams form directed acyclic graphs; toposort algorithm ensures
      correct evaluation order without circular dependencies
    evidence: tensortrade/feed/core/base.py:386(toposort)
  - behavior: Mixin-based data type extensibility
    description: Stream instances dynamically extend with float/boolean operations
      at creation time based on dtype, enabling type-safe operations
    evidence: tensortrade/feed/core/base.py:135(__new__)
  - behavior: Observable pattern for stream notifications
    description: When a stream updates, each registered listeners receive the new
      value through observer pattern implementation
    evidence: tensortrade/feed/core/base.py:167(run)
  - behavior: Placeholder streams for live data injection
    description: PushFeed can inject data at runtime into placeholder streams without
      recompiling the DAG, enabling live trading scenarios
    evidence: tensortrade/feed/core/base.py:615(Placeholder)
  - behavior: Stream._mixins is class-level registry
    description: Mixin registration is global across each stream instantiations -
      no per-instance dtype handling differentiation
    evidence: tensortrade/feed/core/base.py:131(_mixins)
  replaceable_points:
  - name: Feed type
    description: Batch vs live data processing modes for different trading scenarios
    options:
    - name: DataFeed
      traits:
      - Batch processing
      - Pull-based
      - Iterable data source
      fit_for:
      - Historical backtesting
      - Walk-forward validation
      - Episode-based training
      not_fit_for:
      - Real-time trading
      - Live data streams
      - Asynchronous updates
    - name: PushFeed
      traits:
      - Live processing
      - Push-based
      - Runtime data injection
      fit_for:
      - Live trading
      - Real-time updates
      - Simulated market data
      not_fit_for:
      - Historical replay
      - Batch backtesting
      - Reproducible results
    default: DataFeed
  - name: Stream operations
    description: Extend stream capabilities per data type using mixin registration
    options:
    - name: '@Float.register'
      traits:
      - Arithmetic operations
      - Statistical functions
      - Comparison operators
      fit_for:
      - Price streams
      - Technical indicators
      - Numeric transformations
      not_fit_for:
      - Boolean signals
      - Categorical data
    - name: '@Boolean.register'
      traits:
      - Logical operations
      - AND/OR/NOT gates
      - Conditional streams
      fit_for:
      - Signal generation
      - Condition evaluation
      - Binary filters
      not_fit_for:
      - Numeric calculations
      - Price data directly
    default: '@Float.register'
  design_decisions:
  - 'Decision: DAG execution with topological sort | Evidence: tensortrade/feed/core/base.py:386(toposort)
    | Rationale: Streams form acyclic graphs; toposort ensures correct evaluation
    order without cycles'
  - 'Decision: Mixin-based data type extensibility | Evidence: tensortrade/feed/core/base.py:135(__new__)
    | Rationale: Dynamically extends Stream instances with float/boolean operations
    at creation time based on dtype'
  - 'Decision: Observable pattern for stream notifications | Evidence: tensortrade/feed/core/base.py:167(run)
    | Rationale: Enables reactive updates: when a stream updates, each listeners receive
    the new value'
  - 'Decision: Placeholder streams for live data | Evidence: tensortrade/feed/core/base.py:615(Placeholder)
    | Rationale: PushFeed can inject data at runtime without recompiling the DAG'
  acceptance_hints:
  - DataFeed.next() returns consistent dict structure across each steps
  - Stream names are unique within each NameSpace context
  - Topological execution order produces correct dependent stream values
  - Placeholder streams accept runtime data without DAG recompilation
  - Every stream outputs maintain proper dtype from registered mixins
- id: order_management
  name: Order Management System (OMS)
  order: 3
  responsibility: 'Manages wallets, portfolios, exchanges, orders, and trade execution.
    WHY: Separates concerns of money management from strategy logic, ensuring funds
    are correctly locked, transferred, and tracked throughout the trading lifecycle.'
  interface:
    inputs:
    - actions
    - price streams
    - portfolio state
    outputs:
    - executed trades
    - updated wallet balances
  required_methods:
  - name: Wallet.lock
    description: Locks specified quantity of funds when order is created, preventing
      double-spending
    evidence: tensortrade/oms/wallets/wallet.py:82(lock)
  - name: Wallet.transfer
    description: Transfers funds between wallets with conservation equation validation
    evidence: tensortrade/oms/wallets/wallet.py:344(transfer)
  - name: Portfolio.net_worth
    description: Calculates total portfolio value in base instrument currency
    evidence: tensortrade/oms/wallets/portfolio.py:32(Portfolio)
  - name: Exchange.execute_order
    description: Simulates order execution against current price feed
    evidence: tensortrade/oms/exchanges/exchange.py:57(Exchange)
  - name: Broker.submit
    description: Submits order to broker queue for execution processing
    evidence: tensortrade/oms/orders/broker.py:23(Broker)
  - name: Criteria.evaluate
    description: Evaluates order execution conditions using composable criteria pattern
    evidence: tensortrade/oms/orders/criteria.py:26(Criteria)
  key_behaviors:
  - behavior: Wallet locking prevents double-spending
    description: Orders lock funds immediately on creation, not on execution - funds
      become unavailable for other orders until cancel or fill
    evidence: tensortrade/oms/wallets/wallet.py:82(lock)
  - behavior: Path ID for linked order tracking
    description: Every related orders (entry, stop-loss, take-profit) share a path_id
      enabling unified unlock across each affected wallets
    evidence: tensortrade/oms/orders/order.py:109(path_id)
  - behavior: OrderSpec for order chain creation
    description: Stop-loss and take-profit orders attached to entry order via OrderSpec
      are auto-created when entry fills
    evidence: tensortrade/oms/orders/order_spec.py:12
  - behavior: Conservation equation validation in transfers
    description: Enforces (source_debit - commission) equals (target_credit) in each
      transfers, preventing accounting errors
    evidence: tensortrade/oms/wallets/wallet.py:344(transfer)
  - behavior: Wallet balances always non-negative
    description: InsufficientFunds exception raised if operation would result in negative
      balance
    evidence: tensortrade/oms/wallets/wallet.py:109(raise InsufficientFunds)
  - behavior: Class-level ledger shared across each wallets
    description: Wallet.ledger is a global singleton shared by each wallet instances
      - transaction history is not per-wallet
    evidence: tensortrade/oms/wallets/wallet.py:48(ledger = Ledger())
  - behavior: Default commission 0.3% per trade
    description: Realistic exchange fee assumption; users must explicitly override
      for paper trading or different exchanges
    evidence: tensortrade/oms/exchanges/exchange.py:43(commission=0.003)
  replaceable_points:
  - name: Execution service
    description: How orders are filled - simulated vs live exchange execution
    options:
    - name: execute_order (simulated)
      traits:
      - Simulated fills
      - No network latency
      - Deterministic
      fit_for:
      - Backtesting
      - Strategy development
      - Baseline comparisons
      not_fit_for:
      - Real trading
      - Slippage modeling
      - Latency-sensitive strategies
    - name: ccxt (live)
      traits:
      - Real exchange API
      - Live order execution
      - Actual fills
      fit_for:
      - Paper trading
      - Production deployment
      - Real market data
      not_fit_for:
      - Backtesting
      - Offline development
      - Strategy research
    default: execute_order
  - name: Slippage model
    description: Price impact simulation for more realistic order fills
    options:
    - name: RandomUniformSlippageModel
      traits:
      - Uniform random slippage
      - Configurable range
      fit_for:
      - Conservative slippage estimates
      - Monte Carlo testing
      not_fit_for:
      - Precise fill modeling
      - High-frequency scenarios
    - name: None (no slippage)
      traits:
      - Perfect fill price
      - No market impact
      fit_for:
      - Benchmark comparisons
      - Optimistic scenarios
      not_fit_for:
      - Realistic backtesting
      - Large order sizing
    default: None (no slippage)
  design_decisions:
  - 'Decision: Wallet locking prevents double-spending | Evidence: tensortrade/oms/wallets/wallet.py:82(lock)
    | Rationale: Orders lock funds when created, preventing reuse before fill; unlocks
    on cancel/complete'
  - 'Decision: Path ID for linked orders | Evidence: tensortrade/oms/orders/order.py:109(path_id)
    | Rationale: Every related orders (entry + stop-loss) share a path_id, allowing
    unified unlock across wallets'
  - 'Decision: OrderSpec for order chains | Evidence: tensortrade/oms/orders/order_spec.py:12
    | Rationale: Stop-loss/take-profit attached to entry order via OrderSpec; auto-created
    on fill'
  - 'Decision: Criteria pattern for order execution conditions | Evidence: tensortrade/oms/orders/criteria.py:26(Criteria)
    | Rationale: Composable criteria (Limit, Stop, Timed) with &, |, ^ operators for
    complex execution rules'
  - 'Decision: Conservation equation validation in transfer | Evidence: tensortrade/oms/wallets/wallet.py:344(transfer)
    | Rationale: Enforces that (source_debit - commission) = (target_credit), preventing
    accounting errors'
  - 'Decision: Default commission 0.3% | Evidence: tensortrade/oms/exchanges/exchange.py:43(commission=0.003)
    | Rationale: Realistic exchange fee; users must override for paper trading'
  acceptance_hints:
  - Wallet balances never go negative after any operation
  - Order creation immediately locks funds - concurrent orders cannot overdraw
  - Every related orders (entry, stop-loss, take-profit) share same path_id
  - 'Transfer operations maintain conservation equation: (debit - commission) = credit'
  - Order fill updates both source and destination wallet balances atomically
  - Simulated execution uses scale factor - market orders may fill at better-than-market
    prices
- id: trading_environment
  name: Trading Environment
  order: 4
  responsibility: 'Wraps the Order Management System in a Gymnasium-compatible interface
    for reinforcement learning training. WHY: Standardizes agent-environment interaction,
    enabling any RL algorithm (DQN, A2C, PPO, etc.) to interact with trading systems
    through the established Gym API.'
  interface:
    inputs:
    - actions from agent
    outputs:
    - observations
    - rewards
    - done signals
  required_methods:
  - name: TradingEnv.step
    description: 'Executes one environment step: processes action, updates OMS, computes
      reward, returns observation'
    evidence: tensortrade/env/generic/environment.py:35(TradingEnv)
  - name: TradingEnv.reset
    description: Resets environment to initial state, returns first observation
    evidence: tensortrade/env/generic/environment.py:35(TradingEnv)
  - name: TensorTradeObserver.get
    description: Creates observation dict from internal and external feeds using regex
      stream selection
    evidence: tensortrade/env/default/observers.py:155(TensorTradeObserver)
  - name: TensorTradeRewardScheme.get
    description: Computes reward signal from portfolio performance metrics
    evidence: tensortrade/env/default/rewards.py:12(TensorTradeRewardScheme)
  - name: TensorTradeActionScheme.perform
    description: Converts discrete actions to orders and submits to broker
    evidence: tensortrade/env/default/actions.py:24(TensorTradeActionScheme)
  key_behaviors:
  - behavior: Component composition over inheritance
    description: ActionScheme, RewardScheme, Observer are swappable components; different
      strategies can use the same environment with different configurations
    evidence: tensortrade/env/generic/environment.py:121(components)
  - behavior: Clock synchronization across components
    description: Every components share the same Clock instance; increment on step
      ensures consistent temporal state across OMS, observers, and criteria
    evidence: tensortrade/env/generic/environment.py:88(clock)
  - behavior: PBR reward calculation
    description: Reward equals (price_change) * position; position=-1 means short,
      reward inverts accordingly
    evidence: tensortrade/env/default/rewards.py:186(R_t)
  - behavior: Random start for walk-forward validation
    description: Episodes start at random points in data to prevent look-ahead bias
      in backtesting
    evidence: tensortrade/env/generic/environment.py:70(random_start_pct)
  - behavior: Clock increments after step completes
    description: Observation and reward computed at step N while clock.step equals
      N-1 until increment; timed criteria may be off by one step
    evidence: tensortrade/env/generic/environment.py:164(increment)
  - behavior: PBR position defaults to short on init
    description: Agent starts with implied short position (position=-1); first buy
      action flips to long
    evidence: tensortrade/env/default/rewards.py:256(position=-1)
  - behavior: min_order_pct defaults to 2% of net worth
    description: Prevents tiny orders that incur disproportionate fees; may miss opportunities
      in small accounts
    evidence: tensortrade/env/default/actions.py:206(min_order_pct=0.02)
  replaceable_points:
  - name: Action scheme
    description: How agent actions are interpreted into trading orders
    options:
    - name: BSH
      traits:
      - 3 discrete actions
      - Buy/Sell/Hold
      - Position flipping
      fit_for:
      - Simple strategies
      - Initial testing
      - Baseline comparison
      not_fit_for:
      - Multi-instrument portfolios
      - Complex order types
      - Position sizing
    - name: SimpleOrders
      traits:
      - Market orders
      - Direct instrument targeting
      fit_for:
      - Single-instrument trading
      - Market order execution
      not_fit_for:
      - Complex order types
      - Conditional execution
    - name: ManagedRiskOrders
      traits:
      - Risk management
      - Position sizing
      - Stop-loss integration
      fit_for:
      - Risk-sensitive strategies
      - Professional trading systems
      not_fit_for:
      - Simple baselines
      - Minimal order complexity
    default: BSH
  - name: Reward scheme
    description: How reward signal is computed from environment state
    options:
    - name: PBR
      traits:
      - Price-based reward
      - Position-aware
      - Net worth tracking
      fit_for:
      - General trading
      - Balanced long/short strategies
      not_fit_for:
      - Pure price prediction
      - Without position assumption
    - name: AdvancedPBR
      traits:
      - Extended PBR
      - Multiple position modes
      - Detailed metrics
      fit_for:
      - Advanced strategies
      - Detailed reward analysis
      not_fit_for:
      - Simple implementations
      - Minimal overhead
    - name: SimpleProfit
      traits:
      - Direct profit
      - Percentage returns
      fit_for:
      - Long-only strategies
      - Clear profit signal
      not_fit_for:
      - Short selling
      - Complex position management
    - name: RiskAdjustedReturns
      traits:
      - Sharpe/Sortino ratios
      - Risk-adjusted metrics
      fit_for:
      - Risk-conscious strategies
      - Institutional approaches
      not_fit_for:
      - Pure profit maximization
      - Simple baselines
    default: PBR
  - name: Observer
    description: How state observation is constructed from data feeds
    options:
    - name: TensorTradeObserver
      traits:
      - Stream-based
      - Regex selection
      - Flexible features
      fit_for:
      - General use
      - Custom feature engineering
      not_fit_for:
      - Fixed observation spaces
      - Minimal data
    - name: IntradayObserver
      traits:
      - Intraday focus
      - Time-aware features
      fit_for:
      - Day trading
      - Intraday strategies
      not_fit_for:
      - Daily data
      - Swing trading
    default: TensorTradeObserver
  design_decisions:
  - 'Decision: Component composition over inheritance | Evidence: tensortrade/env/generic/environment.py:121(components)
    | Rationale: ActionScheme, RewardScheme, Observer are swappable; different strategies
    can use same env'
  - 'Decision: Clock synchronization across components | Evidence: tensortrade/env/generic/environment.py:88(clock)
    | Rationale: Every components share Clock; increment on step ensures consistent
    temporal state'
  - 'Decision: Traded instrument as base for valuation | Evidence: tensortrade/oms/wallets/portfolio.py:38(base_instrument)
    | Rationale: Every wallet values converted to base (e.g., USD) for consistent
    net_worth calculation'
  - 'Decision: PBR reward: (price_change) * position | Evidence: tensortrade/env/default/rewards.py:186(R_t)
    | Rationale: Aligns reward with actual profit/loss; position=-1 means short, reward
    inverts'
  - 'Decision: Random start for walk-forward validation | Evidence: tensortrade/env/generic/environment.py:70(random_start_pct)
    | Rationale: Prevents look-ahead bias by starting episodes at random points in
    data'
  acceptance_hints:
  - Environment implements full Gymnasium.Env interface (reset, step, observation_space,
    action_space)
  - Observation is dict matching observer's stream selection pattern
  - Reward computed correctly with position considered (PBR mode)
  - Done signal triggers episode termination (max_steps, bankrupt, or custom criteria)
  - Clock increments consistently after each step across each components
  - Random start prevents look-ahead bias in episode initialization
  - 'GPU compatibility: observations returned as numpy arrays without device placement
    errors'
- id: agent_training
  name: Agent Training
  order: 5
  responsibility: 'Implements reinforcement learning algorithms (DQN, A2C, parallel
    DQN) for learning trading policies. WHY: Deprecated in favor of Ray RLlib for
    production training; builtin agents are kept for backwards compatibility and simple
    experimentation.'
  interface:
    inputs:
    - state observations
    - reward signals
    outputs:
    - action probabilities
    - updated policy network
  required_methods:
  - name: Agent.train
    description: Trains the agent on the environment for specified episodes or timesteps
    evidence: tensortrade/agents/agent.py:26(Agent)
  - name: Agent.restore
    description: Restores a previously saved agent checkpoint
    evidence: tensortrade/agents/agent.py:26(Agent)
  - name: DQNAgent.run
    description: Runs DQN agent with experience replay and target network updates
    evidence: tensortrade/agents/dqn_agent.py:29(DQNAgent)
  - name: ReplayMemory.append
    description: Stores experience tuples (state, action, reward, done) for replay
      sampling
    evidence: tensortrade/agents/replay_memory.py:12(ReplayMemory)
  key_behaviors:
  - behavior: Deprecated in favor of Ray RLlib
    description: Built-in agents are deprecated; Ray RLlib provides distributed training
      and better scalability for production use
    evidence: tensortrade/agents/agent.py:25(deprecated)
  - behavior: Target network for DQN stability
    description: Fixed Q-targets prevent moving target problem; target network updated
      every N steps to stabilize training
    evidence: tensortrade/agents/dqn_agent.py:48(target_network)
  - behavior: Epsilon-greedy exploration
    description: Balances exploration (random actions) vs exploitation (learned policy)
      with exponential epsilon decay
    evidence: tensortrade/agents/dqn_agent.py:322(eps_decay)
  - behavior: Conv1D + GRU architecture
    description: 1D convolutions extract local patterns from price sequences; GRU
      captures temporal dependencies in price data
    evidence: tensortrade/agents/dqn_agent.py:70(build_policy_network)
  replaceable_points:
  - name: Agent implementation
    description: RL algorithm choice for policy learning
    options:
    - name: Ray/RLlib (recommended)
      traits:
      - Distributed training
      - Multi-agent
      - Production-ready
      fit_for:
      - Production training
      - Large-scale experiments
      - Distributed computing
      not_fit_for:
      - Simple testing
      - Quick prototyping
      - Minimal dependencies
    - name: DQNAgent
      traits:
      - Value-based
      - Experience replay
      - Target network
      fit_for:
      - Discrete action spaces
      - Simple baselines
      - Backwards compatibility
      not_fit_for:
      - Continuous actions
      - Complex environments
      - Production use
    - name: A2CAgent
      traits:
      - Policy gradient
      - Advantage estimation
      - On-policy
      fit_for:
      - Continuous actions
      - Stable gradients
      not_fit_for:
      - Experience replay
      - Off-policy learning
    - name: ParallelDQNAgent
      traits:
      - Multi-process
      - Shared model
      - Parallel training
      fit_for:
      - Faster training
      - Multiple environments
      not_fit_for:
      - Single-threaded execution
      - Minimal resource usage
    default: Ray/RLlib
  design_decisions:
  - 'Decision: Deprecated agents in favor of Ray | Evidence: tensortrade/agents/agent.py:25(deprecated)
    | Rationale: Ray RLlib provides distributed training, better scalability; builtin
    agents have limitations'
  - 'Decision: Target network for DQN stability | Evidence: tensortrade/agents/dqn_agent.py:48(target_network)
    | Rationale: Fixed Q-targets prevent moving target problem; updated every N steps'
  - 'Decision: Epsilon-greedy exploration | Evidence: tensortrade/agents/dqn_agent.py:322(eps_decay)
    | Rationale: Balances exploration (random) vs exploitation (learned policy); exponential
    decay'
  - 'Decision: Conv1D + GRU architecture | Evidence: tensortrade/agents/dqn_agent.py:70(build_policy_network)
