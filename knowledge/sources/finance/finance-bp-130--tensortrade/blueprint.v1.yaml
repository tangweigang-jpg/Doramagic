  acceptance_hints:
  - Agent can be trained on TradingEnv for specified number of episodes
  - DQN agent uses target network updated periodically for stability
  - Epsilon decay schedule reduces exploration over training
  - Policy network architecture processes observation inputs correctly
  - For production use, Ray RLlib integration is recommended over builtin agents
data_flow:
- from_stage: data_collection
  to_stage: feature_engineering
  data: DataFrame with OHLCV columns and datetime index flows into Stream.source(iterable)
    to create iterable source stream
- from_stage: feature_engineering
  to_stage: trading_environment
  data: 'DataFeed.next() returns dict of {stream_name: value} pairs for current timestep
    as observation'
- from_stage: trading_environment
  to_stage: order_management
  data: ActionScheme.get_orders() converts agent action to List[Order] submitted to
    Broker
- from_stage: order_management
  to_stage: trading_environment
  data: Wallet/Portfolio state flows to Observer streams via Sensor for observation
    construction; portfolio.net_worth feeds to RewardScheme
- from_stage: order_management
  to_stage: agent_training
  data: RewardScheme.get_reward() receives portfolio.net_worth to compute reward signal
- from_stage: agent_training
  to_stage: trading_environment
  data: action (integer) from policy_network.forward(state) passed to TradingEnv.step()
global_contracts:
- contract: Every financial quantities use Decimal with precision defined per Instrument
  evidence: tensortrade/oms/instruments/instrument.py:11(precision)
- contract: Every components share a Clock; step increments on each env.step() AFTER
    observation/reward computation
  evidence: tensortrade/env/generic/environment.py:164(increment)
- contract: Wallet balances always remain non-negative after operations; InsufficientFunds
    raised on violation
  evidence: tensortrade/oms/wallets/wallet.py:109(raise InsufficientFunds)
- contract: Order path_id links each related orders (entry, stop-loss, take-profit)
    for unified unlock across wallets
  evidence: tensortrade/oms/orders/order.py:109(path_id)
- contract: Stream names are unique per NameSpace context to prevent naming conflicts
  evidence: tensortrade/feed/core/base.py:46(__init__)
- contract: Component.default() resolves context values over kwargs over hardcoded
    defaults (three-tier priority)
  evidence: tensortrade/core/component.py:109(default)
- contract: Exchange price streams use namespace format 'exchange_name:/base-quote'
    for consistent naming
  evidence: tensortrade/oms/exchanges/exchange.py:99(stream_name)
- contract: 'Conservation equation: (source_debit - commission) must equal (target_credit)
    in each wallet transfers'
  evidence: tensortrade/oms/wallets/wallet.py:344(transfer)
business_decisions:
- id: BD-001
  type: B
  content: Decimal for financial precision over float
  rationale: Floating-point arithmetic causes rounding errors in financial calculations
    due to binary representation limitations; using Decimal ensures exact representation
    of monetary values and prevents compounding precision loss in cumulative PnL calculations
    across multiple trades.
  evidence: tensortrade/oms/instruments/quantity.py:18(Decimal)
  stage: data_collection
  alternative_considered: Using string-based fixed-point representation was rejected
    due to performance overhead
  _evidence_issues:
  - 'FN_NOT_FOUND: Decimal in tensortrade/oms/instruments/quantity.py'
- id: BD-002
  type: M
  content: Stochastic process library for data generation
  rationale: The established 'stochastic' package provides mathematically rigorous
    implementations of Geometric Brownian Motion, Heston stochastic volatility, and
    Ornstein-Uhlenbeck processes, ensuring generated price paths follow theoretically
    correct dynamics rather than ad-hoc random walks.
  evidence: tensortrade/stochastic/processes/gbm.py:18(stochastic)
  stage: data_collection
  alternative_considered: Custom random walk implementations rejected due to lack
    of mathematical rigor
  _evidence_issues:
  - 'FN_NOT_FOUND: stochastic in tensortrade/stochastic/processes/gbm.py'
- id: BD-003
  type: B
  content: DAG execution with topological sort
  rationale: Streams form directed acyclic graphs where node evaluation order must
    respect dependencies; topological sorting ensures correct evaluation order regardless
    of definition order while detecting cycles at construction time rather than runtime.
  evidence: tensortrade/feed/core/base.py:386(toposort)
  stage: feature_engineering
  alternative_considered: Manual ordering rejected; topological sort handles arbitrary
    graph structures
- id: BD-004
  type: BA/DK
  content: Mixin-based data type extensibility
  rationale: Stream instances dynamically extend with float/boolean operations at
    creation time based on dtype, avoiding a rigid inheritance hierarchy while enabling
    type-specific optimizations; this pattern allows adding new numeric types without
    modifying core Stream classes.
  evidence: tensortrade/feed/core/base.py:135(__new__)
  stage: feature_engineering
  alternative_considered: Union types rejected due to runtime overhead; inheritance
    rejected due to rigidity
- id: BD-005
  type: BA/DK
  content: Observable pattern for stream notifications
  rationale: When a stream updates, each registered listeners receive the new value
    automatically, enabling reactive data flow without explicit polling; this decouples
    data producers from consumers and ensures downstream features always reflect current
    market state.
  evidence: tensortrade/feed/core/base.py:167(run)
  stage: feature_engineering
  alternative_considered: Pull-based evaluation rejected due to latency; polling rejected
    due to inefficiency
- id: BD-006
  type: M/DK
  content: Placeholder streams for live data
  rationale: Placeholder streams allow PushFeed to inject live market data at runtime
    without recompiling the feature DAG, enabling seamless transitions between backtesting
    and live trading; this decouples feature definitions from data sources.
  evidence: tensortrade/feed/core/base.py:615(Placeholder)
  stage: feature_engineering
  alternative_considered: Rebuilding DAG at runtime rejected due to latency; hardcoded
    sources rejected due to inflexibility
- id: BD-007
  type: B/BA
  content: Wallet locking prevents double-spending
  rationale: Orders lock funds when created, preventing the same capital from being
    used in multiple simultaneous orders; locks are released on cancel or fill completion,
    ensuring atomic transaction semantics across wallet balances.
  evidence: tensortrade/oms/wallets/wallet.py:82(lock)
  stage: order_management
  alternative_considered: Optimistic locking rejected due to race conditions; separate
    balance tracking rejected due to complexity
- id: BD-008
  type: B
  content: Path ID for linked orders
  rationale: Every related orders (entry order, stop-loss, take-profit) share a path_id
    enabling unified fund management across wallets; when any linked order executes
    or cancels, the path_id enables coordinated unlock of each associated locked funds.
  evidence: tensortrade/oms/orders/order.py:109(path_id)
  stage: order_management
  alternative_considered: Flat order list rejected; path-based grouping handles complex
    multi-leg strategies
  _evidence_issues:
  - 'FN_NOT_FOUND: path_id in tensortrade/oms/orders/order.py'
- id: BD-009
  type: M
  content: OrderSpec for order chains
  rationale: Stop-loss and take-profit orders are attached to entry orders via OrderSpec
    and auto-created when the entry order fills; this ensures conditional orders are
    always placed atomically without requiring separate order management by the trading
    agent.
  evidence: tensortrade/oms/orders/order_spec.py:12(module)
  stage: order_management
  alternative_considered: Post-fill order creation rejected due to timing gap; embedded
    orders rejected due to coupling
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tensortrade/oms/orders/order_spec.py'
- id: BD-010
  type: M
  content: Criteria pattern for order execution conditions
  rationale: Composable criteria (Limit, Stop, Timed) with &, |, ^ operators allow
    complex execution rules without subclassing; this enables users to construct sophisticated
    order conditions from primitive building blocks while maintaining single-responsibility
    classes.
  evidence: tensortrade/oms/orders/criteria.py:26(Criteria)
  stage: order_management
  alternative_considered: Hardcoded conditionals rejected; strategy pattern rejected
    due to inflexibility
- id: BD-011
  type: B
  content: Conservation equation validation in transfer
  rationale: Transfer function validates that (source_debit - commission) equals target_credit,
    enforcing conservation of value across wallet transfers; this invariant prevents
    accounting errors where debit and credit amounts diverge due to rounding or logic
    bugs.
  evidence: tensortrade/oms/wallets/wallet.py:278(transfer)
  stage: order_management
  alternative_considered: Silent acceptance rejected; throws exception on violation
    to catch bugs early
- id: BD-012
  type: BA/DK
