- id: res-slot-016
  name: database
  scope: domain
  description: Consider team expertise, required SQL features, and whether Doctrine ORM compatibility is critical
  used_by:
  - bp-066
  - bp-071
  - bp-072
  - bp-074
  - bp-082
  - bp-083
  - bp-085
  options:
  - name: MySQL
    traits:
    - relational
    - ACID
    - mature
    - Doctrine-native
    fit_for:
    - Standard LAMP stack, proven reliability, excellent Doctrine ORM support
    not_fit_for:
    - Extreme scale, horizontal sharding needs, JSON-heavy workloads
  - name: MariaDB
    traits:
    - relational
    - MySQL-compatible
    - open-source
    - performance
    fit_for:
    - Drop-in MySQL replacement with better performance and open-source governance
    not_fit_for:
    - Strict Oracle MySQL compatibility requirements
  - name: PostgreSQL
    traits:
    - relational
    - advanced-SQL
    - JSON
    - performance
    fit_for:
    - Advanced SQL features, JSONB for hybrid workloads, strong data integrity
    not_fit_for:
    - Teams familiar with MySQL only, simple CRUD applications
  - name: SQLite
    traits:
    - embedded
    - zero-config
    - single-writer
    fit_for:
    - Single-node crawlers, development, small-scale deployments
    not_fit_for:
    - Multi-node crawlers, high concurrency, large datasets
  - name: PostgreSQL (via Frappe)
    traits:
    - ACID compliant
    - Frappe experimental support
    - Advanced indexing
    fit_for:
    - Environments with existing PostgreSQL infrastructure
    not_fit_for:
    - Production use as Frappe primarily tests and supports MariaDB
  - name: MySQL/MariaDB
    traits:
    - web-scale
    - common
    fit_for:
    - Web applications, shared hosting
    not_fit_for:
    - Complex analytics, geospatial features
  - name: PostgreSQL 16
    traits:
    - relational
    - acid
    - production-ready
    fit_for:
    - Production deployment, data integrity requirements
    not_fit_for:
    - Simple deployments without Docker
  - name: DuckDB
    traits:
    - embedded
    - analytical
    - no_server
    - fast
    fit_for:
    - Embedded analytics, data caching, local processing
    not_fit_for:
    - Multi-user concurrent access, distributed queries, high write throughput
  default: MySQL 5.7+
- id: res-slot-017
  name: http_client
  scope: domain
  description: 当前实现已足够，大多数场景不需要替换
  used_by:
  - bp-068
  - bp-069
  - bp-070
  - bp-076
  - bp-110
  - bp-111
  - bp-128
  options:
  - name: requests
    traits:
    - synchronous
    - simple
    - standard
    fit_for:
    - 标准HTTP请求、大部分场景
    not_fit_for:
    - 高并发、异步需求
  - name: httpx
    traits:
    - async
    - modern
    - HTTP/2
    fit_for:
    - 异步数据获取、高并发场景
    not_fit_for:
    - 同步代码、简单场景
  - name: requests (synchronous HTTP)
    traits:
    - sync
    - blocking
    - connection-pooling
    fit_for:
    - Synchronous API calls (auth, broker config, calendar downloads)
    not_fit_for:
    - Async code paths that need non-blocking HTTP
  - name: aiohttp (asynchronous HTTP)
    traits:
    - async
    - non-blocking
    - websocket-server
    fit_for:
    - Async data queries (settlement, rankings, EDB), web GUI server
    not_fit_for:
    - Sync-only environments
  - name: httpx (default)
    traits:
    - async
    - sync
    - retry
    - caching
    fit_for:
    - Every use cases
    not_fit_for:
    - None
  - name: aiohttp (default async)
    traits:
    - Async
    - Session management
    - Connection pooling
    fit_for:
    - Async applications, concurrent HTTP requests
    not_fit_for:
    - Simple synchronous scripts
  - name: requests (sync)
    traits:
    - Synchronous
    - Simple API
    - Wide adoption
    fit_for:
    - Sync operations, simple scripts, backward compatibility
    not_fit_for:
    - Concurrent operations
  - name: aiohttp (async)
    traits:
    - asynchronous
    - non-blocking
    - connection-pooling
    - websocket
    fit_for:
    - Production trading systems, high-frequency applications
    not_fit_for:
    - Simple scripts without async/await
  - name: curl_cffi (Default)
    traits:
    - browser_impersonation
    - cloudflare_bypass
    - sync_async
    fit_for:
    - Yahoo Finance API access (required for Cloudflare/Javascript challenges)
    not_fit_for:
    - Simple HTTP requests without anti-bot challenges
  default: requests（内置重试机制）
