- id: res-slot-026
  name: backtesting_engine
  scope: domain
  description: pyfolio does not mandate a specific backtesting engine — any system that can produce returns/positions/transactions
    DataFrames in the expected format is compatible. Zipline-reloaded is the reference implementation.
  used_by:
  - bp-106
  - bp-116
  - bp-121
  options:
  - name: Zipline-reloaded
    traits:
    - event-driven
    - pipeline
    - USD
    - ' equities'
    - futures
    - daily/minute bars
    fit_for:
    - Reference backtesting engine for pyfolio. Provides each required data shapes (returns, positions, transactions) natively.
    not_fit_for:
    - Non-US equities, options, crypto, pairs trading without extension
  - name: Backtrader
    traits:
    - event-driven
    - multiple-assets
    - no-pipeline
    fit_for:
    - Strategy backtesting with multiple asset classes. User must write adapter to convert results to pyfolio format.
    not_fit_for:
    - Pipeline-based analysis workflows
  - name: vectorbt
    traits:
    - vectorized
    - GPU-accelerated
    - Jupyter-native
    fit_for:
    - High-performance backtesting on large universes, pandas/numba-based. Requires custom adapter for pyfolio input format.
    not_fit_for:
    - Complex event-driven strategies
  - name: Custom/user-supplied DataFrames
    traits:
    - no-engine-required
    - any-format
    fit_for:
    - Users who already have backtest results from any source. pyfolio works directly on pandas Series/DataFrames.
    not_fit_for:
    - Users who need to run backtests from scratch
  default: User-supplied pandas DataFrames (no engine required)
