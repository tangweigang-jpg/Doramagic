- id: res-slot-012
  name: database
  scope: domain
  description: Consider team expertise, required SQL features, and whether Doctrine ORM compatibility is critical
  used_by:
  - bp-066
  - bp-071
  - bp-072
  - bp-074
  - bp-082
  - bp-083
  - bp-085
  options:
  - name: MySQL
    traits:
    - relational
    - ACID
    - mature
    - Doctrine-native
    fit_for:
    - Standard LAMP stack, proven reliability, excellent Doctrine ORM support
    not_fit_for:
    - Extreme scale, horizontal sharding needs, JSON-heavy workloads
  - name: MariaDB
    traits:
    - relational
    - MySQL-compatible
