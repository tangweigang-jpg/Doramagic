slots:
- id: res-slot-013
  name: visualization
  scope: cross_domain
  description: Use matplotlib for standard plotting; add Plotly/Altair for interactive web dashboards
  used_by:
  - bp-064
  - bp-065
  - bp-067
  - bp-068
  - bp-083
  - bp-092
  - bp-101
  - bp-121
  - bp-122
  - bp-125
  - bp-130
  options:
  - name: matplotlib
    traits:
    - 2D-plotting
    - publication-quality
    - figure-customization
    fit_for:
    - Standard 2D plotting, time series visualization, publication figures
    not_fit_for:
    - Interactive web visualizations; 3D plotting
  - name: seaborn
    traits:
    - statistical-plots
    - heatmaps
    - matplotlib-wrapper
    fit_for:
    - Statistical visualizations, heatmaps (SSA w-correlation), aesthetic plots
    not_fit_for:
    - Non-statistical plots; highly customized visualizations
  - name: Plotly
    traits:
    - interactive
    - web-based
    - 3D-support
    fit_for:
    - Interactive web dashboards, financial analytics dashboards
    not_fit_for:
    - Static publication figures; offline-only environments
  - name: Altair
    traits:
    - declarative
    - Vega-Lite
    - interactive
    fit_for:
    - Statistical visualizations with JSON-based declarative syntax
    not_fit_for:
    - Complex custom graphics; non-web environments
  - name: matplotlib_plotting
    traits:
    - interactive
    - publication_quality
    fit_for:
    - Surviving curve plots, lx/qx charts (Examples 4_2, 4_6b)
    not_fit_for:
    - Headless/server environments, minimal-dependency deployments
  - name: none
    traits:
    - no_dep
    - text_only
    fit_for:
    - Batch processing, CLI output, headless servers
    not_fit_for:
    - Visual analysis of mortality patterns
  - name: plotly
    traits:
    - interactive
    - web-based
    - zoom/pan
    fit_for:
    - Interactive analysis, web deployment, user exploration
    not_fit_for:
    - Batch processing, PDF export, minimal dependencies
  - name: bokeh
    traits:
    - interactive
    - web-based
    - streaming
    fit_for:
    - Live dashboards, real-time streaming data visualization
    not_fit_for:
    - Simple static plots, minimal dependencies
  - name: altair
    traits:
    - declarative
    - Vega-Lite
    - interactive
    fit_for:
    - Statistical visualization, quick exploration scripts
    not_fit_for:
    - Complex custom graphics, large datasets
  - name: pyecharts
    traits:
    - interactive
    - web-based
    - China-friendly
    fit_for:
    - 交互式K线图、复杂图表、Jupyter Notebook
    not_fit_for:
    - 简单静态图、纯后端使用
  - name: Matplotlib
    traits:
    - static
    - publication_quality
    - flexible
    fit_for:
