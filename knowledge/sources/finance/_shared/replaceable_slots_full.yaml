  - name: none
    traits:
    - no_dep
    - text_only
    fit_for:
    - Batch processing, CLI output, headless servers
    not_fit_for:
    - Visual analysis of mortality patterns
  - name: plotly
    traits:
    - interactive
    - web-based
    - zoom/pan
    fit_for:
    - Interactive analysis, web deployment, user exploration
    not_fit_for:
