    not_fit_for:
    - Interactive web visualizations; 3D plotting
  - name: seaborn
    traits:
    - statistical-plots
    - heatmaps
    - matplotlib-wrapper
    fit_for:
    - Statistical visualizations, heatmaps (SSA w-correlation), aesthetic plots
    not_fit_for:
