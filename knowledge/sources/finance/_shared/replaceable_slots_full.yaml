- id: res-slot-047
  name: database
  scope: domain
  description: Consider team expertise, required SQL features, and whether Doctrine ORM compatibility is critical
  used_by:
  - bp-066
  - bp-071
  - bp-072
  - bp-074
  - bp-082
  - bp-083
  - bp-085
  options:
  - name: MySQL
    traits:
    - relational
    - ACID
    - mature
    - Doctrine-native
    fit_for:
    - Standard LAMP stack, proven reliability, excellent Doctrine ORM support
    not_fit_for:
    - Extreme scale, horizontal sharding needs, JSON-heavy workloads
  - name: MariaDB
    traits:
    - relational
    - MySQL-compatible
    - open-source
    - performance
    fit_for:
    - Drop-in MySQL replacement with better performance and open-source governance
    not_fit_for:
    - Strict Oracle MySQL compatibility requirements
  - name: PostgreSQL
    traits:
    - relational
    - advanced-SQL
    - JSON
    - performance
    fit_for:
    - Advanced SQL features, JSONB for hybrid workloads, strong data integrity
    not_fit_for:
    - Teams familiar with MySQL only, simple CRUD applications
  - name: SQLite
    traits:
    - embedded
    - zero-config
    - single-writer
    fit_for:
    - Single-node crawlers, development, small-scale deployments
    not_fit_for:
    - Multi-node crawlers, high concurrency, large datasets
  - name: PostgreSQL (via Frappe)
    traits:
    - ACID compliant
    - Frappe experimental support
    - Advanced indexing
    fit_for:
    - Environments with existing PostgreSQL infrastructure
    not_fit_for:
    - Production use as Frappe primarily tests and supports MariaDB
  - name: MySQL/MariaDB
    traits:
    - web-scale
    - common
    fit_for:
    - Web applications, shared hosting
    not_fit_for:
    - Complex analytics, geospatial features
  - name: PostgreSQL 16
    traits:
    - relational
    - acid
    - production-ready
    fit_for:
    - Production deployment, data integrity requirements
    not_fit_for:
    - Simple deployments without Docker
  - name: DuckDB
    traits:
    - embedded
    - analytical
    - no_server
    - fast
    fit_for:
    - Embedded analytics, data caching, local processing
    not_fit_for:
    - Multi-user concurrent access, distributed queries, high write throughput
  default: MySQL 5.7+
- id: res-slot-054
  name: http_client
  scope: domain
  description: 当前实现已足够，大多数场景不需要替换
  used_by:
  - bp-068
  - bp-069
  - bp-070
  - bp-076
