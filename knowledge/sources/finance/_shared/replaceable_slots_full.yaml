  - bp-128
  options:
  - name: requests
    traits:
    - synchronous
    - simple
    - standard
    fit_for:
    - 标准HTTP请求、大部分场景
    not_fit_for:
    - 高并发、异步需求
  - name: httpx
    traits:
    - async
    - modern
    - HTTP/2
    fit_for:
    - 异步数据获取、高并发场景
    not_fit_for:
    - 同步代码、简单场景
  - name: requests (synchronous HTTP)
    traits:
    - sync
    - blocking
    - connection-pooling
    fit_for:
    - Synchronous API calls (auth, broker config, calendar downloads)
    not_fit_for:
    - Async code paths that need non-blocking HTTP
  - name: aiohttp (asynchronous HTTP)
    traits:
    - async
    - non-blocking
    - websocket-server
    fit_for:
    - Async data queries (settlement, rankings, EDB), web GUI server
    not_fit_for:
    - Sync-only environments
  - name: httpx (default)
    traits:
    - async
    - sync
    - retry
    - caching
    fit_for:
    - Every use cases
    not_fit_for:
    - None
  - name: aiohttp (default async)
    traits:
    - Async
    - Session management
    - Connection pooling
    fit_for:
    - Async applications, concurrent HTTP requests
    not_fit_for:
    - Simple synchronous scripts
  - name: requests (sync)
    traits:
    - Synchronous
    - Simple API
    - Wide adoption
    fit_for:
    - Sync operations, simple scripts, backward compatibility
    not_fit_for:
    - Concurrent operations
  - name: aiohttp (async)
    traits:
    - asynchronous
    - non-blocking
    - connection-pooling
    - websocket
    fit_for:
    - Production trading systems, high-frequency applications
    not_fit_for:
    - Simple scripts without async/await
  - name: curl_cffi (Default)
