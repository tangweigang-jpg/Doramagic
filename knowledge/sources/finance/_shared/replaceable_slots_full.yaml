    - cloudflare_bypass
    - sync_async
    fit_for:
    - Yahoo Finance API access (required for Cloudflare/Javascript challenges)
    not_fit_for:
    - Simple HTTP requests without anti-bot challenges
  default: requests（内置重试机制）
