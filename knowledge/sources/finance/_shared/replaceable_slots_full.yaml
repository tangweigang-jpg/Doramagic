  - name: Altair
    traits:
    - declarative
    - Vega-Lite
    - interactive
    fit_for:
    - Statistical visualizations with JSON-based declarative syntax
    not_fit_for:
    - Complex custom graphics; non-web environments
  - name: matplotlib_plotting
    traits:
    - interactive
    - publication_quality
    fit_for:
