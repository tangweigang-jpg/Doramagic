    in py_vollib/black/greeks/analytical.py'
- id: BD-095
  type: DK
  content: BSM numerical greeks lambda computes dividend q from b via r-b, but bs_merton pricing expects
    q directly
  rationale: 'The numerical greeks lambda function for BSM computes dividend yield q by rearranging q
    = r - b (from the BSM cost-of-carry formula b = r - q). However, the BSM pricing function directly
    uses q as an input. This creates a parameter mapping that must remain consistent. Boundary: If b and
    q are not related by q = r - b, the numerical Greeks and analytical prices will be computed with inconsistent
