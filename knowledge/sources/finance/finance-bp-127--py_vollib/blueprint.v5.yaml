# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-127
name: py_vollib
sop_version: '3.6'
source:
  projects:
  - py_vollib
  commit_hash: 9fbc623dbc8d7241b935da440a722b49186b9bb1
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Options pricing and risk metrics calculation
  description: A Python library for calculating option prices, implied volatility, and Greeks using Black,
    Black-Scholes, and Black-Scholes-Merton models, with both analytical and numerical methods.
  prerequisites: Understanding of options pricing theory, Black-Scholes model assumptions, familiarity
    with option Greeks (delta, gamma, theta, vega, rho)
  not_suitable_for: American options pricing, exotic options, models requiring Monte Carlo simulation,
    discrete dividend handling, or early exercise features
stages:
- id: reference_implementations
  name: Reference Implementations
  order: 1
  responsibility: Provide pure Python reference implementations using scipy.stats.norm.cdf for verification
    and sanity checking against the optimized production core. Not for production use but enable numerical
    validation.
  interface:
    inputs:
    - 'Same as production: flag (''c''/''p''), S/F, K, t, r, sigma, q'
    outputs:
    - float values matching analytical formulas
  required_methods:
  - name: black.black
    description: Reference Black model using scipy.stats.norm for verification
    evidence: py_vollib/ref_python/black/__init__.py:187(black)
  - name: black_scholes.black_scholes
    description: Reference Black-Scholes using scipy.stats.norm for verification
    evidence: py_vollib/ref_python/black_scholes/__init__.py:108(black_scholes)
  - name: black_scholes_merton.black_scholes_merton
    description: Reference BSM with scipy.stats.norm for verification
    evidence: py_vollib/ref_python/black_scholes_merton/__init__.py:110(black_scholes_merton)
  - name: implied_volatility.implied_volatility
    description: Reference IV using scipy.optimize.newton for root finding
    evidence: py_vollib/ref_python/black_scholes/implied_volatility.py:36(implied_volatility)
  key_behaviors:
  - behavior: Drop-in replacement capability
    description: ref_python mirrors production API exactly with identical function signatures, enabling
      automated comparison testing
    evidence: py_vollib/ref_python/black_scholes/__init__.py:108(black_scholes)
  - behavior: Two-implementation cross-validation
    description: Fast implementation (py_lets_be_rational) vs reference (scipy) enables users to verify
      numerical equivalence
    evidence: py_vollib/black/__init__.py:46 uses py_lets_be_rational; py_vollib/ref_python/black/__init__.py:31
      uses scipy.stats.norm
  replaceable_points:
  - name: norm_cdf_source
    description: Cumulative normal distribution function source
    options:
    - name: scipy.stats.norm.cdf
      traits:
      - Pure Python
      - Well-tested
      - Standard scientific computing
      fit_for:
      - Verification
      - Testing
      - Cross-validation
      not_fit_for:
      - Production speed-critical paths
    - name: py_lets_be_rational.norm_cdf
      traits:
      - C implementation
      - Optimized
      - Fast
      fit_for:
      - Production
      - High-frequency calculations
      not_fit_for:
      - Environments without C extensions
    default: scipy.stats.norm.cdf
  design_decisions:
  - 'Decision: ref_python mirrors production API exactly. Evidence: py_vollib/ref_python/black_scholes/__init__.py:108(black_scholes).
    Rationale: Enables drop-in replacement for testing; identical signatures allow automated comparison.'
  - 'Decision: Implied volatility in ref_python uses scipy.optimize.newton (root finding) while production
    uses lets_be_rational (Newton-Raphson with rational bounds). Evidence: py_vollib/ref_python/black/implied_volatility.py:31.
    Rationale: Different algorithms expose implementation differences for verification.'
  acceptance_hints:
  - ref_python output matches production output within floating-point tolerance
  - scipy.optimize.newton converges for valid inputs in ref_python IV
  - Every ref_python functions have identical signatures to production counterparts
- id: pricing
  name: Option Pricing
  order: 2
  responsibility: Calculate option prices using Black, Black-Scholes, and Black-Scholes-Merton models.
    Delegates to py_lets_be_rational for performance while exposing a clean public API.
  interface:
    inputs:
    - flag ('c'/'p'), S/F (spot/futures), K (strike), t (time in years), r (rate), sigma (vol), q (dividend
      for BSM)
    outputs:
    - float option price
  required_methods:
  - name: black.black
    description: Discounted Black futures option price calculator
    evidence: py_vollib/black/__init__.py:57(black)
  - name: black_scholes.black_scholes
    description: Black-Scholes equity option price calculator
    evidence: py_vollib/black_scholes/__init__.py:54(black_scholes)
  - name: black_scholes_merton.black_scholes_merton
    description: BSM option price with continuous dividend yield
    evidence: py_vollib/black_scholes_merton/__init__.py:54(black_scholes_merton)
  key_behaviors:
  - behavior: Flag validation
    description: Every pricing functions accept flag in {'c','p'} (call/put), mapped to +1/-1 via binary_flag
      dict for lets_be_rational compatibility
    evidence: py_vollib/helpers/__init__.py:57(binary_flag)
  - behavior: Time convention enforcement
    description: Time t is expressed in years (not days), consistent across each pricing models
    evidence: py_vollib/black_scholes/__init__.py:64(t)
  - behavior: Dividend yield handling
    description: Dividend q is continuous yield (not discrete dividends), used in BSM model forward price
      calculation
    evidence: py_vollib/black_scholes_merton/__init__.py:67(q)
  replaceable_points:
  - name: pricing_backend
    description: The underlying pricing computation engine
    options:
    - name: py_lets_be_rational
      traits:
      - C implementation
      - Fast
      - High accuracy
      - Jaeckel algorithm
      fit_for:
      - Production
      - Real-time pricing
      - High-frequency applications
      not_fit_for:
      - Environments without C extensions
      - Debugging numerical issues
    - name: scipy.stats (ref_python)
      traits:
      - Pure Python
      - Pure scipy
      - Reference implementation
      fit_for:
      - Verification
      - Testing
      - Environments without C extensions
      not_fit_for:
      - Performance-critical production code
    default: py_lets_be_rational
  design_decisions:
  - 'Decision: BSM delegates to Black model via F=S*exp((r-q)*t). Evidence: py_vollib/black_scholes_merton/__init__.py:86(black_scholes_merton).
    Rationale: Reduces code duplication; Black is the canonical futures model that BSM reduces to when
    spot is converted to forward.'
  - 'Decision: Flag uses ''c''/''p'' strings mapped to +1/-1 via binary_flag dict. Evidence: py_vollib/helpers/__init__.py:57(binary_flag).
    Rationale: More readable API than numeric flags; maps to lets_be_rational''s expected input.'
  - 'Decision: undiscounted_black forwards to py_lets_be_rational.black. Evidence: py_vollib/black/__init__.py:116(undiscounted_black).
    Rationale: Core computation delegated to Jaeckel''s optimized C implementation for speed and accuracy.'
  - 'Decision: Forward price formula differs between models: BS uses F=S*exp(r*t), BSM uses F=S*exp((r-q)*t).
    Evidence: py_vollib/black_scholes/__init__.py:81; py_vollib/black_scholes_merton/__init__.py:86. Rationale:
    BSM adjusts for dividend yield in forward price.'
  acceptance_hints:
  - Black price matches known values for at-the-money options
  - BSM price equals BS price when q=0
  - In-the-money calls have higher prices than out-of-the-money calls
  - 'Put-call parity holds: C - P = S*exp(-q*t) - K*exp(-r*t) for BSM'
- id: greeks_analytical
  name: Analytical Greeks
  order: 3
  responsibility: Compute option Greeks (delta, theta, gamma, vega, rho) using closed-form Black-Scholes
    formulas. Each greek is scaled per industry convention for per-day theta and per-percent vega/rho.
  interface:
    inputs:
    - flag, S/F, K, t, r, sigma, q (BSM only)
    outputs:
    - float greek values (delta, theta, gamma, vega, rho)
  required_methods:
  - name: analytical.delta
    description: 'Option delta: N(d1) for calls, N(d1)-1 for puts; BSM includes exp(-q*t) dividend factor'
    evidence: py_vollib/black_scholes/greeks/analytical.py:56(delta)
  - name: analytical.theta
    description: Theta per day (divided by 365), returns negative values for option decay
    evidence: py_vollib/black_scholes/greeks/analytical.py:95(theta)
  - name: analytical.gamma
    description: Gamma as second derivative of price with respect to spot
    evidence: py_vollib/black_scholes/greeks/analytical.py:161(gamma)
  - name: analytical.vega
    description: Vega per 1% IV change (multiplied by 0.01)
    evidence: py_vollib/black_scholes/greeks/analytical.py:197(vega)
  - name: analytical.rho
    description: Rho per 1% rate change (multiplied by 0.01)
    evidence: py_vollib/black_scholes/greeks/analytical.py:236(rho)
  key_behaviors:
  - behavior: Per-day theta convention
    description: Theta is divided by 365 (per-day convention), so reported value is daily decay not annual
    evidence: py_vollib/black_scholes/greeks/analytical.py:153(theta)
  - behavior: Per-percent vega/rho convention
    description: Vega and rho are multiplied by 0.01 (per-percent convention), measuring sensitivity per
      1% change not absolute
    evidence: py_vollib/black_scholes/greeks/analytical.py:233(vega)
  - behavior: BSM dividend adjustment in delta
    description: BSM delta includes exp(-q*t) factor to account for reduced spot sensitivity due to dividend
      payments
    evidence: py_vollib/black_scholes_merton/greeks/analytical.py:93(delta)
  - behavior: Black delta discount factor
    description: Black delta has exp(-r*t) discount factor but Black-Scholes delta does not - these are
      mathematically different definitions
    evidence: py_vollib/black/greeks/analytical.py:89-92 applies exp(-r*t); py_vollib/black_scholes/greeks/analytical.py:89-92
      does not
  replaceable_points:
  - name: d1_d2_source
    description: Where d1/d2 formula inputs come from
    options:
    - name: ref_python.black_scholes.d1/d2
      traits:
      - Pure Python
      - Uses scipy.stats.norm.pdf
      fit_for:
      - Verification
      - Testing against reference
      not_fit_for:
      - High-frequency calculations
    - name: lets_be_rational.norm_cdf
      traits:
      - C implementation
      - Fast
      - High accuracy
      fit_for:
      - Production
      - Performance-critical paths
      not_fit_for:
      - Environments without C extensions
    default: ref_python.black_scholes.d1/d2
  design_decisions:
  - 'Decision: BSM delta includes exp(-q*t) factor for dividend yield. Evidence: py_vollib/black_scholes_merton/greeks/analytical.py:93(delta).
    Rationale: Accounts for reduced sensitivity to spot due to dividend payments.'
  - 'Decision: Theta divided by 365 (per-day convention). Evidence: py_vollib/black_scholes/greeks/analytical.py:153(theta).
    Rationale: Industry standard reports theta as daily decay, not annual.'
  - 'Decision: Vega/Rho multiplied by 0.01 (per-percent convention). Evidence: py_vollib/black_scholes/greeks/analytical.py:233(vega).
    Rationale: Industry standard measures sensitivity per 1% change, not absolute.'
  - 'Decision: Analytical greeks import d1/d2 from ref_python modules, creating hidden coupling. Evidence:
    py_vollib/black/greeks/analytical.py:51; py_vollib/black_scholes/greeks/analytical.py:50. Rationale:
    Reuses verified reference implementations for intermediate calculations.'
  acceptance_hints:
  - Call delta is between 0 and 1, put delta is between -1 and 0
  - Gamma is always positive for both calls and puts
  - Theta is negative (option value decays over time)
  - Vega is always positive (higher volatility increases option value)
  - Analytical greeks match numerical greeks within finite difference tolerance
- id: greeks_numerical
  name: Numerical Greeks
  order: 4
  responsibility: Compute option Greeks via finite difference approximation. Serves as verification of
    analytical formulas and fallback for non-standard models or exotic payoffs.
  interface:
    inputs:
    - flag, S/F, K, t, r, sigma, b (cost of carry), pricing_function
    outputs:
    - float greek values (delta, theta, gamma)
  required_methods:
  - name: numerical_greeks.delta
    description: 'Central difference: (f(S+dS) - f(S-dS)) / 2dS with dS=0.01'
    evidence: py_vollib/helpers/numerical_greeks.py:79(delta)
  - name: numerical_greeks.theta
    description: 'Time step: f(t-dt) - f(t), capped at 1/365 to avoid singularity at expiry'
    evidence: py_vollib/helpers/numerical_greeks.py:111(theta)
  - name: numerical_greeks.gamma
    description: 'Second derivative via centered finite difference: (f(S+dS) - 2f(S) + f(S-dS)) / dS^2'
    evidence: py_vollib/helpers/numerical_greeks.py:190(gamma)
  key_behaviors:
  - behavior: Strategy pattern for pricing functions
    description: Uses pricing_function parameter for generic computation, allowing any pricing model to
      have numerical Greeks computed
    evidence: py_vollib/helpers/numerical_greeks.py:79(delta)
  - behavior: Unified cost-of-carry treatment
    description: 'b parameter enables unified treatment: b=r (BS), b=r-q (BSM), b=0 (Black), allowing
      each three models to use same numerical Greeks infrastructure'
    evidence: py_vollib/helpers/numerical_greeks.py:34(b)
  - behavior: Minimum time step protection
    description: Uses 0.00001 as minimum time step when t < 1/365 to avoid negative time in theta calculation
    evidence: py_vollib/helpers/numerical_greeks.py:132-134
  - behavior: ATM gamma singularity at expiry
    description: At t=0 with S=K (ATM), gamma returns float('inf') which is mathematically correct as
      gamma approaches infinity at expiration
    evidence: py_vollib/helpers/numerical_greeks.py:211-212
  replaceable_points:
  - name: step_size
    description: Finite difference step size for bump-and-reprice
    options:
    - name: 0.01 (1%)
      traits:
      - Industry standard
      - Balanced accuracy
      fit_for:
      - Standard BSM-style options
      - Most use cases
      not_fit_for:
      - Deep ITM options
      - Very low volatility
    - name: user-defined
      traits:
      - Flexible
      - Customizable
      fit_for:
      - Testing
      - Specific model requirements
      not_fit_for:
      - Production without validation
    default: '0.01'
  design_decisions:
  - 'Decision: Uses pricing_function parameter for generic computation. Evidence: py_vollib/helpers/numerical_greeks.py:79(delta).
    Rationale: Strategy pattern allows any pricing model to have numerical Greeks computed.'
  - 'Decision: dS = 0.01 (1% bump) hardcoded as step size. Evidence: py_vollib/helpers/numerical_greeks.py:76(dS).
    Rationale: Industry-standard 1% bump for BSM-style options.'
  - 'Decision: Theta capped at 1/365 to avoid singularity at expiry. Evidence: py_vollib/helpers/numerical_greeks.py:132(theta).
    Rationale: Prevents division issues when t is very small.'
  - 'Decision: BSM numerical greeks lambda computes dividend q from b via r-b. Evidence: py_vollib/black_scholes_merton/greeks/numerical.py:62.
    Rationale: Maintains consistency with cost-of-carry parameterization.'
  acceptance_hints:
  - Numerical greeks match analytical greeks within finite difference approximation error (<0.0001)
  - 'Delta values are bounded: calls in [0,1], puts in [-1,0]'
  - Theta is negative for long options
  - Gamma is positive for each option positions
- id: implied_volatility
  name: Implied Volatility
  order: 5
  responsibility: Solve for the volatility that produces a given option price using Newton-Raphson via
    lets_be_rational. Raises exceptions for out-of-bounds prices that violate intrinsic value constraints.
  interface:
    inputs:
    - price, S/F, K, t, r, flag, q (BSM only)
    outputs:
    - float implied volatility or exception (PriceIsAboveMaximum, PriceIsBelowIntrinsic)
  required_methods:
  - name: black_scholes.implied_volatility
    description: BS implied volatility calculator using lets_be_rational
    evidence: py_vollib/black_scholes/implied_volatility.py:58(implied_volatility)
  - name: black.implied_volatility
    description: Black implied volatility calculator
    evidence: py_vollib/black/implied_volatility.py:112(implied_volatility)
  - name: black.normalised_implied_volatility
    description: Time-invariant volatility transform for put-call parity preservation
    evidence: py_vollib/black/implied_volatility.py:154(normalised_implied_volatility)
  key_behaviors:
  - behavior: Sentinel value exception mapping
    description: lets_be_rational returns FLOAT_MAX/MINUS_FLOAT_MAX for edge cases; py_vollib maps these
      to custom exceptions PriceIsAboveMaximum or PriceIsBelowIntrinsic
    evidence: py_vollib/helpers/constants.py:49(FLOAT_MAX); py_vollib/black/implied_volatility.py:105-108
  - behavior: IV bounds enforcement
    description: Implied volatility must satisfy intrinsic bounds; violations raise PriceIsAboveMaximum
      or PriceIsBelowIntrinsic
    evidence: py_vollib/helpers/exceptions.py:52(PriceIsAboveMaximum)
  - behavior: Computation order dependency
    description: BSM IV must compute F=S*exp((r-q)*t) before calling lets_be_rational; order reversal
      produces incorrect results
    evidence: py_vollib/black_scholes_merton/implied_volatility.py:98-104
  replaceable_points:
  - name: iv_algorithm
    description: IV solver algorithm for root finding
    options:
    - name: lets_be_rational (fast)
      traits:
      - C implementation
      - Fast convergence
      - High accuracy
      - Jaeckel algorithm
      fit_for:
      - Production
      - Real-time IV calculations
      - High-frequency applications
      not_fit_for:
      - Debugging
      - Understanding convergence behavior
    - name: scipy.optimize (ref_python)
      traits:
      - Pure Python
      - Pure scipy
      - Reference implementation
      fit_for:
      - Verification
      - Testing
      - Debugging convergence issues
      not_fit_for:
      - Performance-critical production code
    default: lets_be_rational
  design_decisions:
  - 'Decision: Uses FLOAT_MAX/MINUS_FLOAT_MAX as sentinel values. Evidence: py_vollib/helpers/constants.py:49(FLOAT_MAX).
    Rationale: lets_be_rational returns extreme values for edge cases instead of raising; py_vollib translates
    these to meaningful exceptions.'
  - 'Decision: Implied volatility requires price first: BSM IV computes F=S*exp((r-q)*t) before calling
    lets_be_rational. Evidence: py_vollib/black_scholes_merton/implied_volatility.py:98-104. Rationale:
    Forward price must be computed before IV search.'
  - 'Decision: Normalized forms enable time-invariant computations. Evidence: py_vollib/black/__init__.py:119(normalised_black).
    Rationale: Put-call parity preserved across moneyness transformations.'
  acceptance_hints:
  - IV returned is positive and within reasonable bounds (0 < IV < 10 for most markets)
  - PriceIsAboveMaximum raised when option price exceeds theoretical maximum
  - PriceIsBelowIntrinsic raised when option price is below intrinsic value
  - 'IV calculation is reversible: price(IV(price)) approximately equals original price'
data_flow:
- from_stage: reference_implementations
  to_stage: pricing
  data: d1(S,K,t,r,sigma), d2() formulas from ref_python used as intermediate calculations in analytical
    greeks; ref_python black_scholes provides d1/d2 to analytical greeks modules
- from_stage: pricing
  to_stage: greeks_analytical
  data: d1, d2 intermediate values computed from (S,F,K,t,r,sigma) are reused by analytical greeks formulas
- from_stage: pricing
  to_stage: greeks_numerical
  data: pricing_function passed as callable for finite difference bump-and-reprice calculations
- from_stage: pricing
  to_stage: implied_volatility
  data: Forward price F = S*exp((r-q)*t) for BSM, undiscounted option price used in IV root-finding
- from_stage: reference_implementations
  to_stage: greeks_analytical
  data: d1(S,K,t,r,sigma), d2() imported from ref_python.black_scholes for formula inputs in analytical
    greeks calculations
global_contracts:
- contract: Every pricing functions accept flag in {'c','p'} (call/put), mapped to +1/-1 via binary_flag
    dict
  evidence: py_vollib/helpers/__init__.py:57(binary_flag)
- contract: Binary flag mapping {'c':1, 'p':-1} must match py_lets_be_rational convention throughout;
    if values reversed, each pricing and IV calculations would be inverted
  evidence: py_vollib/helpers/__init__.py:57; py_vollib/black/__init__.py:110; py_vollib/black_scholes_merton/__init__.py:88
- contract: Time t is expressed in years (not days) across each pricing models
  evidence: py_vollib/black_scholes/__init__.py:64(t)
- contract: Dividend q is continuous yield (not discrete dividends) in BSM model
  evidence: py_vollib/black_scholes_merton/__init__.py:67(q)
- contract: Theta divided by 365 (per-day, annualized convention); if 365 divisor removed, theta would
    report annual change instead of daily
  evidence: py_vollib/black_scholes/greeks/analytical.py:153(theta)
- contract: Vega and rho scaled by 0.01 (per 1% change convention); if 0.01 removed, vega/rho would report
    change per 100% move
  evidence: py_vollib/black_scholes/greeks/analytical.py:233(vega)
- contract: Implied volatility must satisfy intrinsic bounds; violations raise PriceIsAboveMaximum or
    PriceIsBelowIntrinsic
  evidence: py_vollib/helpers/exceptions.py:52(PriceIsAboveMaximum)
- contract: FLOAT_MAX/MINUS_FLOAT_MAX sentinel values from lets_be_rational must map to custom exceptions;
    if mapping removed, callers cannot distinguish failure modes
  evidence: py_vollib/helpers/constants.py:49-50; py_vollib/black/implied_volatility.py:105-108
- contract: 'Cost-of-carry parameter b defaults encode model selection: b=0 (Black), b=r (BS), b=r-q (BSM);
    changing b defaults would collapse three pricing models'
  evidence: py_vollib/helpers/numerical_greeks.py:37-56; py_vollib/black/greeks/numerical.py:81
- contract: Black delta has discount factor exp(-r*t) but Black-Scholes delta does not; these are mathematically
    different definitions that should not be compared directly
  evidence: py_vollib/black/greeks/analytical.py:89-92 vs py_vollib/black_scholes/greeks/analytical.py:89-92
- contract: 'Forward price formula differs by model: BS forward = S*exp(r*t), BSM forward = S*exp((r-q)*t)
    due to dividend adjustment'
  evidence: py_vollib/black_scholes/__init__.py:81; py_vollib/black_scholes_merton/__init__.py:86
business_decisions:
- id: BD-001
  type: B
  content: BSM delegates to Black model via F=S*exp((r-q)*t)
  rationale: Avoids code duplication by leveraging the Black model as the canonical futures pricing formula;
    BSM reduces to Black when spot is converted to forward price F=S*exp((r-q)*t)
  evidence: py_vollib/black_scholes_merton/__init__.py:54(black_scholes_merton)
  stage: pricing
  alternative_considered: Maintaining separate implementations would introduce divergence risk and duplicate
    logic
- id: BD-002
  type: B/RC
  content: Flag uses 'c'/'p' strings mapped to +1/-1 via binary_flag dict
  rationale: Provides human-readable API surface ('c' for call, 'p' for put) while converting to numeric
    +1/-1 required by lets_be_rational library internals
  evidence: py_vollib/helpers/__init__.py:57(binary_flag)
  stage: pricing
  alternative_considered: Direct numeric flags (1/-1) were rejected for poor discoverability; boolean
    flags insufficient for other option types
  _evidence_issues:
  - 'FN_NOT_FOUND: binary_flag in py_vollib/helpers/__init__.py'
- id: BD-003
  type: B
  content: undiscounted_black forwards to py_lets_be_rational.black
  rationale: Delegates core Black76 computation to Jaeckel's highly-optimized C implementation for numerical
    accuracy and computational speed; py_lets_be_rational is the performance-critical engine
  evidence: py_vollib/black/__init__.py:87(undiscounted_black)
  stage: pricing
  alternative_considered: Pure Python reimplementation would be 100-1000x slower; validated C extension
    is essential
- id: BD-004
  type: B
  content: BSM delta includes exp(-q*t) factor for dividend yield
  rationale: Captures the reduced spot-price sensitivity caused by continuous dividend yield; without
    exp(-q*t), delta would overstate the probability of finishing in-the-money
  evidence: py_vollib/black_scholes_merton/greeks/analytical.py:57(delta)
  stage: greeks_analytical
  alternative_considered: Omitting the dividend factor would be appropriate only for forward options,
    not equity options
- id: BD-005
  type: B/BA
  content: Theta divided by 365 (per-day convention)
  rationale: Industry convention reports theta as daily price decay rather than annualized; dividing by
    365 converts from annual to daily, matching trader expectations and standard Greeks dashboards
  evidence: py_vollib/black_scholes/greeks/analytical.py:95(theta)
  stage: greeks_analytical
  alternative_considered: Annual theta (no division) exists in some academic contexts but is not used
    in practice
- id: BD-006
  type: B/BA
  content: Vega/Rho multiplied by 0.01 (per-percent convention)
  rationale: Standard market convention measures sensitivity per 1% (100 basis points) change in volatility/rate,
    not per unit; multiplying raw derivative by 0.01 converts to this convention
