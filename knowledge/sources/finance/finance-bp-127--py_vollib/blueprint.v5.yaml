- id: BD-096
  type: BA
  content: 'Numerical greeks edge case: t=0 returns finite values for delta/gamma but float(''inf'') for
    gamma at ATM'
  rationale: 'Numerical Greeks use finite-difference approximations. At t=0, delta/gamma approximations
    use a small time step that yields finite results, but gamma at-the-money (S=K) at t=0 mathematically
    approaches infinity, and the numerical approximation returns inf. Boundary: Code handling numerical
    Greeks at t=0 must check for inf results and handle ATM gamma separately (either returning a large
    finite value or raising an exception).'
  evidence: py_vollib/helpers/numerical_greeks.py:79(delta), py_vollib/helpers/numerical_greeks.py:190(gamma)
  stage: invariant
