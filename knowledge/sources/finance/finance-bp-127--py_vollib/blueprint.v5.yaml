  rationale: 'The library maintains dual implementations to enable verification: the primary py_lets_be_rational
    implementation uses rational-number arithmetic for speed and precision, while ref_python modules use
    scipy.stats.norm with Brent''s method for independent cross-validation. This architecture choice prioritizes
    production performance while maintaining testability. Boundary: Any change to the primary implementation
    must produce results matching the reference within numerical tolerance.'
  evidence: py_vollib/black/__init__.py:46(primary_implementation); py_vollib/ref_python/black/__init__.py:31(reference_implementation)
  stage: pattern_choice
  alternative_considered: Single implementation with formal proofs would eliminate dual-maintenance but
    requires more mathematical validation effort
