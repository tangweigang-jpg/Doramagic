replaceable_slots:
- id: slot-001
  name: implied_volatility_algorithm
  description: Use py_lets_be_rational by default. Switch to lets_be_rational C extension for lower latency.
    Use scipy.optimize if dependency constraints prevent py_lets_be_rational installation. Use QuantLib
    if broader derivatives coverage is needed.
  used_in_stages: []
  options:
  - name: py_lets_be_rational
    traits:
    - pure_python
    - fast
    - high_precision
    - transitively_uses_numba
    fit_for:
    - General use; the default for py_vollib. Excellent precision and speed for most inputs.
    not_fit_for:
    - Ultra-low-latency production trading systems where even Python overhead matters; embedded/constrained
      environments without numpy
  - name: lets_be_rational (C extension)
    traits:
    - c_extension
    - fastest
    - high_precision
    fit_for:
    - Production systems requiring maximum speed; latency-critical option pricing
    not_fit_for:
    - Environments without a C compiler; pure-Python-only deployments
  - name: scipy.optimize.newton (reference fallback)
    traits:
    - pure_python
    - slow
    - moderate_precision
    fit_for:
    - Prototyping; environments where py_lets_be_rational cannot be installed
    not_fit_for:
    - Production; requires manual initial guess and convergence handling
  - name: QuantLib (implied_volatility)
    traits:
    - c++_extension
    - industrial_grade
    - slow_init
    fit_for:
    - Enterprise environments already using QuantLib; broader financial instrument coverage
    not_fit_for:
    - Simple option use-cases; environments where adding QuantLib is disproportionate overhead
  default: py_lets_be_rational
  _source: worker_resource
- id: slot-002
  name: normal_cdf
  description: py_lets_be_rational.norm_cdf is fastest and already a required dependency. scipy.stats.norm.cdf
    is a fully compatible fallback if py_lets_be_rational is replaced. Use numpy-based vectorized CND
    for bulk operations.
  used_in_stages: []
  options:
  - name: py_lets_be_rational.norm_cdf
    traits:
    - pure_python
    - fast
    - high_precision
    fit_for:
    - Default for each analytical Greek calculations in py_vollib
    not_fit_for:
    - Environments where py_lets_be_rational is unavailable
  - name: scipy.stats.norm.cdf
    traits:
    - pure_python
    - moderate_speed
    - high_precision
    fit_for:
    - Used by ref_python reference implementation as an alternative to py_lets_be_rational
    not_fit_for:
    - Performance-critical paths (slightly slower than py_lets_be_rational.norm_cdf)
  - name: numpy.vectorized manual CND
    traits:
    - pure_python
    - vectorized
    - moderate_precision
    fit_for:
    - Environments where scipy is unavailable; vectorized batch processing of many inputs
    not_fit_for:
    - Scalar use-cases (no speed advantage over scipy); single-precision requirements
  - name: erfinv + math.erf
    traits:
    - stdlib
    - no_extra_dep
    fit_for:
    - Drop-in replacement with no extra package; CDF = 0.5 * (1 + erf(x/sqrt(2)))
    not_fit_for:
    - Bulk array processing (std lib math is scalar-only); slightly less precise than table-based methods
  default: py_lets_be_rational.norm_cdf
  _source: worker_resource
- id: slot-003
  name: json_parsing
  description: Replace simplejson with stdlib json by changing one import line. No functional difference
    for the flat numeric array structure in test_data.json.
  used_in_stages: []
  options:
  - name: simplejson
    traits:
    - pure_python
    - c_extension_fallback
    - fast
    fit_for:
    - Default; pip-installable, faster than stdlib json in many cases, compatible with Python 2.7
    not_fit_for:
    - Environments where an additional pip package is undesirable
  - name: stdlib json
    traits:
    - stdlib
    - pure_python
    - no_extra_dep
    fit_for:
    - Drop-in replacement in tests/test_utils.py; no pip install needed for tests
    not_fit_for:
    - Python 2.6 and earlier (where json is C-only); simplejson has some extra features
  - name: pandas.read_json
    traits:
    - already_dep
    - vectorized
    fit_for:
    - If pandas is already in scope for data processing pipelines
    not_fit_for:
    - Simple file read; adds pandas import overhead for a trivial read
  default: simplejson
  _source: worker_resource
- id: slot-004
  name: numerical_greeks_pricing_function
  description: 'Match the pricing model to the instrument type: Black for futures, Black-Scholes for non-dividend
    stocks, Black-Scholes-Merton for dividend-paying stocks. Use ref_python when py_lets_be_rational is
    unavailable.'
  used_in_stages: []
  options:
  - name: py_vollib.black.black
    traits:
    - fast
    - lets_be_rational_backend
    fit_for:
    - Default numerical Greek calculation for the Black model
    not_fit_for:
    - When the underlying is a stock (use black_scholes) or includes dividends (use black_scholes_merton)
  - name: py_vollib.black_scholes.black_scholes
    traits:
    - fast
    - lets_be_rational_backend
    fit_for:
    - Default numerical Greek calculation for the Black-Scholes stock model
    not_fit_for:
    - Futures options (use black); dividend-paying stocks (use black_scholes_merton)
  - name: py_vollib.black_scholes_merton.black_scholes_merton
    traits:
    - fast
    - lets_be_rational_backend
    - dividend_aware
    fit_for:
    - Numerical Greeks for dividend-paying stock options
    not_fit_for:
    - Futures options (use black); non-dividend stocks (black_scholes is simpler)
  - name: py_vollib.ref_python.* (any model)
    traits:
    - pure_python
    - scipy_backend
    - no_lets_be_rational
    fit_for:
    - Environments where py_lets_be_rational cannot be installed; academic/educational use
    not_fit_for:
    - Production; significantly slower for implied volatility (no Jäckel algorithm)
  default: py_vollib.black.black (for black), py_vollib.black_scholes.black_scholes (for black_scholes),
    py_vollib.black_scholes_merton.black_scholes_merton (for BSM)
  _source: worker_resource
- id: slot-005
  name: doctest_helper
  description: No change needed; the existing stdlib doctest approach is zero-dependency and sufficient.
    pytest is already in dev-requirements for CI.
  used_in_stages: []
  options:
  - name: doctest (stdlib)
    traits:
    - stdlib
    - zero_dep
    fit_for:
    - Every inline doctests in source files are already powered by stdlib doctest
    not_fit_for:
    - Jupyter notebook environments (where pytest --doctest-modules is preferred)
  - name: pytest --doctest-modules
    traits:
    - test_framework
    - CI_friendly
    fit_for:
    - Running each doctests across each modules in a single pytest invocation
    not_fit_for:
    - Simple module-level python -m doctest runs
  default: stdlib doctest (via __main__ guards in each module) + pytest in CI
  _source: worker_resource
