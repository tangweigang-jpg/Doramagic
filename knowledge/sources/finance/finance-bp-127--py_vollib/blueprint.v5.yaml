    in py_vollib/helpers/__init__.py'
- id: BD-090
  type: DK
  content: Theta divided by 365 for per-day convention (textbook raw value must be multiplied by 365)
  rationale: 'Theta represents time decay per calendar day, normalized by dividing raw (per-unit-time)
    values by 365. This is a market convention for quoting theta in daily terms rather than annual terms.
    Boundary: The 365 divisor assumes 365 calendar days per year (not 252 trading days). Users expecting
    theta per trading day must multiply by 365/252 ≈ 1.448.'
  evidence: py_vollib/black_scholes/greeks/analytical.py:95(theta)
  stage: default_value
  alternative_considered: Could use 252 trading days for theta but industry practice typically uses 365
    for calendar-day convention
- id: BD-091
  type: DK
  content: Vega and rho multiplied by 0.01 for per-percent convention (1% change, not 100% change)
  rationale: 'Vega and rho are quoted per 1% change in volatility/rate (not per 1 absolute unit change).
    This requires multiplying the mathematically derived Greeks by 0.01. Boundary: This convention means
    vega = ∂V/∂σ × 0.01, where ∂V/∂σ is the raw sensitivity. Users should not confuse this with vega per
    vol-point (which would be the undivided value).'
  evidence: py_vollib/black_scholes/greeks/analytical.py:197(vega)
  stage: default_value
  alternative_considered: Could quote in vol-points but industry standard is per-percent for intuitive
    interpretation
- id: BD-092
  type: BA/DK
  content: FLOAT_MAX/MINUS_FLOAT_MAX sentinel values from lets_be_rational must map to custom exceptions
  rationale: 'py_lets_be_rational uses FLOAT_MAX/MINUS_FLOAT_MAX as sentinels to indicate prices outside
    solvable bounds. These must be caught and converted to domain-specific exceptions (PriceIsAboveMaximum,
    PriceIsBelowIntrinsic) to provide meaningful error messages. Boundary: If sentinels pass through uncaught,
    callers receive nonsensical implied volatilities (near-zero or near-infinite) instead of clear error
    signals.'
  evidence: py_vollib/helpers/constants.py:49-50(sentinel_definitions); py_vollib/black/implied_volatility.py:105-108(sentinel_handling)
  stage: invariant
  alternative_considered: Could return None or raise generic ValueError but domain exceptions enable precise
    error handling
  _evidence_issues:
