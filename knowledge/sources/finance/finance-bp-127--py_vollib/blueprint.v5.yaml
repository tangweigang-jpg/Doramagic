- id: BD-094
  type: DK
  content: Black delta has discount factor exp(-r*t) but Black-Scholes delta does not - inconsistent delta
    definitions
  rationale: 'Black model delta includes the discount factor exp(-r×t) because it prices futures-style
    options where the underlying is the forward. Black-Scholes delta excludes this factor as it prices
    spot options. This difference is mathematically correct for each model''s assumptions but creates
    API inconsistency. Boundary: Developers switching between models must understand that Black delta
    represents delta with respect to the forward (dF), while Black-Scholes delta is with respect to spot
    (dS).'
  evidence: py_vollib/black/greeks/analytical.py:89-92(black_delta_with_discount); py_vollib/black_scholes/greeks/analytical.py:89-92(bs_delta_no_discount)
