    in py_vollib/helpers/constants.py'
- id: BD-093
  type: DK
  content: 'Implied volatility requires price first: BSM IV must compute F=S*exp((r-q)*t) before calling
    lets_be_rational'
  rationale: 'Implied volatility algorithms require an option price as input. For BSM, the forward price
    F must be computed from spot S using F=S×exp((r-q)×t) before the iv() function can solve for volatility.
    This is an ordering constraint, not an optional step. Boundary: Computing IV with incorrect F (e.g.,
    using S directly as some users might expect) produces systematically wrong implied volatilities that
    vary with time to expiry.'
  evidence: py_vollib/black_scholes_merton/implied_volatility.py:60(implied_volatility)
  stage: ordering_contract
