- id: BD-089
  type: B/BA
  content: 'Global binary_flag mapping: {''c'':1, ''p'':-1} must match py_lets_be_rational convention
    throughout'
  rationale: 'The binary_flag convention {''c'':1, ''p'':-1} is a hard constraint enforced across each
    model variants. This mapping is not mathematically derived but is a convention that must remain consistent
    when calling py_lets_be_rational, which expects this specific encoding. Boundary: Any deviation (e.g.,
    {c:1, p:1} or {c:0, p:1}) will cause incorrect option type detection and produce wrong prices/IV results.
    This invariant cannot be abstracted away without rewriting lets_be_rational integration.'
  evidence: py_vollib/helpers/__init__.py:57(binary_flag_mapping); py_vollib/black/__init__.py:110(convert_flag);
    py_vollib/black_scholes_merton/__init__.py:88(use_binary_flag)
  stage: invariant
