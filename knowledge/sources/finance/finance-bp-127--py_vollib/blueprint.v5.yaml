- id: BD-097
  type: DK
  content: Numerical theta uses 0.00001 as minimum time step when t < 1/365 to avoid negative time
  rationale: 'Numerical theta uses finite differences: θ ≈ (V(t) - V(t - dt)) / dt. When t < 1/365 (one
    day), using dt = t would produce negative time t - dt < 0. The minimum step 0.00001 (approximately
    5 minutes) prevents this. Boundary: This creates a discontinuity at t = 1/365 where theta calculation
    shifts from using fixed 0.00001 to using t - 1/365. Theta values near this boundary may show slight
    discontinuities.'
  evidence: py_vollib/helpers/numerical_greeks.py:111(theta)
  stage: default_value
  alternative_considered: Could use proportional dt (e.g., 0.01×t) but fixed minimum provides more predictable
    numerical behavior
- id: BD-098
  type: DK
  content: 'Forward price formula: F=S/exp(-r*t) in black_scholes; F=S*exp((r-q)*t) in BSM - different
    interpretations of ''F'''
  rationale: 'Black-Scholes computes forward as F = S / exp(-r×t) = S×exp(r×t), treating F as the forward
    price discounted from spot. BSM computes F = S×exp((r-q)×t), incorporating dividend yield. Both are
    mathematically correct for their respective models. Boundary: The ''F'' symbol carries different meanings
