business_decisions:
- id: BD-001
  type: B
  content: LoanApplication creates draft Loan, separate from disbursement lifecycle
  rationale: Separates approval from execution - allows credit evaluation before any financial commitment.
    The draft loan remains in pending state until disbursement is approved, ensuring no GL entries are
    created prematurely and credit decisions are finalized before financial obligations arise.
  evidence: lending/loan_management/doctype/loan_application/loan_application.py:273(create_loan)
  stage: loan_application
  alternative_considered: Single-document approach where application submission directly creates active
    loan was rejected to maintain audit trail and approval gates
- id: BD-002
  type: BA/DK
  content: LoanPartner enables co-lending with configurable payment/interest shares
  rationale: Supports multiple lenders on single loan with transparent P&L allocation. Each partner's
    share is validated at loan level and payments are allocated proportionally, enabling syndication arrangements
    common in Indian lending markets.
  evidence: lending/loan_management/doctype/loan_partner/loan_partner.py:92(validate_shareables)
  stage: loan_application
  alternative_considered: Separate loan per lender approach rejected due to complex tracking and accounting
    reconciliation challenges
- id: BD-003
  type: B
  content: Term loans create submitted LoanRepaymentSchedule on disbursement submit
  rationale: Schedules must exist before demands can be generated - ensures demand-to-schedule alignment.
    The repayment schedule is created and submitted atomically with disbursement, preventing any gap where
    demands could be generated without corresponding schedule rows.
  evidence: lending/loan_management/doctype/loan_disbursement/loan_disbursement.py:180(on_submit)
  stage: disbursement
  alternative_considered: Lazy schedule creation on first demand rejected due to risk of race conditions
    in batch processing scenarios
- id: BD-004
  type: B
  content: BPI (Broken Period Interest) calculated before schedule creation
  rationale: BPI covers gap between disbursement and first repayment - must be in first EMI or amortized.
    The broken period interest calculation happens before EMI calculation to ensure accurate total interest
    computation and proper income recognition timing.
  evidence: lending/loan_management/doctype/loan_repayment_schedule/loan_repayment_schedule.py:589(apply_broken_period_interest_method)
  stage: disbursement
  alternative_considered: Post-schedule BPI calculation rejected due to retroactive income recognition
    complexity
- id: BD-005
  type: B
  content: LOC loans skip schedule creation, use cyclic date instead
  rationale: Line of credit is demand-based, not schedule-based - different accounting treatment. LOC
    loans do not have fixed repayment schedules; instead they use a cyclic billing date for periodic interest
    accrual, reflecting the revolving credit nature.
  evidence: lending/loan_management/doctype/loan_disbursement/loan_disbursement.py:366(set_cyclic_date)
  stage: disbursement
  alternative_considered: Standard schedule-based approach rejected as it doesn't support flexible drawdown/paydown
    patterns of LOC products
- id: BD-006
  type: BA/DK
  content: Security deposit withholding creates linked LoanSecurityDeposit child records
  rationale: Deposit is loan-specific and refundable on closure - requires auditable linkage. Each withholding
    creates a child document that tracks deposit amount, reference, and refund status, ensuring traceability
    from withholding through loan closure.
  evidence: lending/loan_management/doctype/loan_disbursement/loan_disbursement.py:353(withheld_security_deposit)
  stage: disbursement
  alternative_considered: Simple amount field rejected due to lack of traceability and refund workflow
    support
- id: BD-007
  type: B
  content: Accrual creates GL entries but NOT LoanDemand - separate process
  rationale: Demands are payment-triggered, accruals are time-triggered - prevents double-counting. Interest
    accrual recognizes income via GL entries based on passage of time, while LoanDemand is created only
    when payment becomes due, ensuring income is not recognized twice for the same period.
  evidence: lending/loan_management/doctype/loan_interest_accrual/loan_interest_accrual.py:120(on_submit)
  stage: accrual
  alternative_considered: Combined accrual-demand rejected due to complexity in handling partial payments
    and reversals
- id: BD-008
  type: B/BA
  content: Interest calculated using per-day method with configurable day count convention
  rationale: India RBI compliance requires accurate daily interest calculation. The per-day method with
    configurable conventions (Actual/365, 30/360, etc.) ensures precise interest computation and supports
    regulatory audit requirements for daily accrual verification.
  evidence: lending/loan_management/doctype/loan_interest_accrual/loan_interest_accrual.py:994(get_per_day_interest)
  stage: accrual
  alternative_considered: Monthly approximation rejected due to RBI circular requirements for daily calculation
    methodology
- id: BD-009
  type: B/BA
  content: Penal interest processed separately after normal accrual
  rationale: Penal only applies after DPD threshold - different rate and income account. Penal interest
    calculation runs as a separate process post-normal accrual, using different rates and routing to separate
    GL accounts for compliance with RBI NPA income recognition norms.
  evidence: lending/loan_management/doctype/loan_interest_accrual/loan_interest_accrual.py:581(calculate_penal_interest_for_loans)
  stage: accrual
  alternative_considered: Combined calculation rejected due to separate accounting treatment and NPA staging
    requirements
- id: BD-010
  type: B/DK
  content: Demands are queryable by loan, disbursement, demand_type - enables precise allocation
  rationale: Enables per-disbursement accounting and LOC drawdown tracking. Multiple dimensions on demand
    records (loan, disbursement reference, type) allow precise allocation of payments and tracking of
    which disbursement triggered which demand obligation.
  evidence: lending/loan_management/doctype/loan_demand/loan_demand.py:492(create_loan_demand)
  stage: demand
  alternative_considered: Single-demand-per-loan approach rejected due to inability to track multi-disbursement
    loans properly
- id: BD-011
  type: B
  content: 'Term loans: demands created from repayment schedule rows in batch'
  rationale: Scheduled batch is deterministic - same date always generates same demands. The batch process
    reads schedule rows and creates corresponding demands, ensuring idempotency where rerunning the same
    date produces identical demands without duplication.
  evidence: lending/loan_management/doctype/loan_demand/loan_demand.py:258(process_term_loan_batch)
  stage: demand
  alternative_considered: Event-driven individual demand creation rejected due to risk of missed events
    and non-deterministic behavior
- id: BD-012
  type: B
  content: 'Demand loans: demands created from accruals with manual or auto triggers'
  rationale: Demand loans don't have fixed schedules - accrual-driven. The demand creation reads accumulated
    accruals and creates payment demands, supporting both automatic scheduled triggers and manual on-demand
    creation for demand loan products.
  evidence: lending/loan_management/doctype/loan_demand/loan_demand.py:416(make_loan_demand_for_demand_loan)
  stage: demand
  alternative_considered: Fixed schedule approach rejected as it contradicts demand loan product definition
- id: BD-013
  type: B/DK
  content: Payment allocation follows configurable offset sequence (IRAC-based)
  rationale: India RBI IRAC norms require proper classification-based allocation order. Payments are allocated
    in sequence (Fees -> Penal Interest -> Interest -> Principal) ensuring that for NPA accounts, amounts
    are applied to recover interest income before principal as per regulatory requirements.
  evidence: lending/loan_management/doctype/loan_repayment/loan_repayment.py:1885(apply_allocation_order)
  stage: repayment
  alternative_considered: Pro-rata allocation rejected as it doesn't align with IRAC recovery waterfall
    requirements
- id: BD-014
  type: B/DK
  content: value_date is posting_date for accruals but separate for actual payments
  rationale: Separates accounting date from business date for regulatory reporting. Accruals use posting
    date as value date (same day recognition), while repayments allow business date to differ from posting
    date for bank reconciliation flexibility and regulatory reporting requirements.
  evidence: lending/loan_management/doctype/loan_repayment/loan_repayment.py:583(set_repayment_account)
  stage: repayment
  alternative_considered: Single date approach rejected due to reconciliation complexity with multi-day
    bank processing
- id: BD-015
  type: BA
  content: LoanPartner share calculated during allocation, stored in repayment
  rationale: Enables accurate co-lender accounting even with partial payments. Each repayment document
    records the proportional share belonging to each LoanPartner, ensuring proper P&L allocation and GL
    posting across syndication arrangements even when full amount is not received.
  evidence: lending/loan_management/doctype/loan_repayment/loan_repayment.py:1788(set_partner_payment_ratio)
  stage: repayment
  alternative_considered: Post-repayment reconciliation approach rejected due to audit trail and real-time
    reporting requirements
- id: BD-016
  type: B
  content: Restructure creates new LoanRepayment entries for adjustments, not direct DB updates
  rationale: Maintains audit trail - every financial change has corresponding repayment document. Restructure
    adjustments (tenure changes, rate changes, principal adjustments) create new LoanRepayment documents
    rather than modifying existing records, preserving complete audit history.
  evidence: lending/loan_management/doctype/loan_restructure/loan_restructure.py:791(make_loan_repayment_for_adjustment)
  stage: restructure
  alternative_considered: Direct database updates rejected due to audit compliance and document-based
    workflow requirements
- id: BD-017
  type: BA
  content: BPI recalculated on restructure when tenure changes
  rationale: BPI treatment may change with new schedule - ensures accurate recovery. When restructure
    modifies loan tenure or disbursement timing, the broken period interest calculation is refreshed to
    reflect the new repayment structure and ensure correct income recognition.
  evidence: lending/loan_management/doctype/loan_restructure/loan_restructure.py:657(update_totals)
  stage: restructure
  alternative_considered: Static BPI preservation rejected as restructure may fundamentally alter loan
    cashflow timing
- id: BD-018
  type: BA
  content: Charges can be capitalized into principal on restructure
  rationale: Enables debt restructuring for distressed borrowers per RBI guidelines. Unpaid charges (processing
    fees, penalties) can be added to principal, reducing immediate payment burden and enabling recovery
    through extended tenure, as permitted under restructuring frameworks.
  evidence: lending/loan_management/doctype/loan_restructure/loan_restructure.py:765(make_waiver_and_capitalization_for_charges)
  stage: restructure
  alternative_considered: Forced immediate charge collection rejected as it would worsen borrower distress
    and reduce recovery probability
- id: BD-019
  type: B/DK
  content: DPD calculated from last payment date, not first missed payment
  rationale: RBI NPA norms define DPD from overdue date, not from first unpaid due. Days Past Due is computed
    from the date of last payment rather than first missed installment, aligning with regulatory definition
    where regular payments reset DPD to zero even if older dues remain outstanding.
  evidence: lending/loan_management/doctype/loan/loan.py:1321(repost_days_past_due_log)
  stage: classification
  alternative_considered: Cumulative missed payment tracking rejected as it contradicts RBI DPD reset
    rules
- id: BD-020
  type: B/DK
  content: NPA status propagates from loan to applicant (Customer/Member)
  rationale: Regulatory requirement - each loans of NPA customer should be marked NPA. When any loan for
    a customer becomes NPA, the customer's master record is updated, ensuring downstream systems (credit
    bureaus, lending decisions) see the complete NPA status across each exposures.
