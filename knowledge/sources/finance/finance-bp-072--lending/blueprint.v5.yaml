  rationale: 'HIDDEN DEPENDENCY: BD-091 enables co-lender schedule generation when loan_partner is set,
    but BD-059 specifies that co-lender schedule depends on partner repayment_schedule_type. If loan_partner
    is set (triggering co-lender logic) but repayment_schedule_type is null or invalid, the system may
    generate incomplete or incorrect schedules without validation error. This creates silent failure in
    multi-lender P&L allocation, causing partner payment mismatches that only surface during reconciliation.'
  evidence: N/A:0(see_rationale)
