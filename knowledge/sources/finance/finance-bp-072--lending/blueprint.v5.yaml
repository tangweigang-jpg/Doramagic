- id: BD-102
  type: B/BA
  content: 'INTERACTION: BD-024 × BD-078 → Haircut reduces security value before LTV calculation, amplifying
    margin call sensitivity and accelerating shortfall triggers'
  rationale: 'AMPLIFICATION: Haircut percentage (BD-024) reduces usable security value before LTV ratio
    calculation (BD-078). This creates compounding conservatism where market value fluctuations are amplified
    through haircut before LTV threshold comparison. The effective LTV is higher than nominal, triggering
    shortfall alerts earlier than expected from raw market values. For volatile securities, this causes
    frequent margin calls and potential over-reaction to normal market movements.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Using gross market value in LTV was rejected for insufficient protection against
    volatility
- id: BD-103
  type: B
  content: 'INTERACTION: BD-007 × BD-009 × BD-043 → NPA interest suspense creates reversal complexity
    when accrual posts to income GL before NPA classification'
  rationale: 'RISK CASCADE: BD-007 separates accrual from demand (creates GL but no demand), BD-009 processes
    penal interest separately (routing to different GL), and BD-043 routes NPA interest to suspense instead
    of income. When a loan transitions to NPA mid-accrual period, the accrual may have already posted
    normal and penal interest to income GL before the NPA status is recognized. BD-043 requires reversal
    of already-recognized income to suspense, but if the accrual GL entry was created before NPA classification,
    reversal logic may not capture the correct amounts or timing.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Real-time NPA status check before accrual was rejected for performance impact
