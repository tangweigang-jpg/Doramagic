  rationale: Both BD-013 (IRAC-based offset sequence) and BD-048 (asset-classification-based allocation
    sequence) define configurable payment allocation orderings, but neither explicitly defines precedence
    when both configurations exist. BD-013 references collection_offset_sequence fields while BD-048 references
    allocation order by asset classification. This CONTRADICTION means the system may apply payments in
    unintended sequence if both are configured differently, potentially violating IRAC norms or misclassifying
    principal recovery.
