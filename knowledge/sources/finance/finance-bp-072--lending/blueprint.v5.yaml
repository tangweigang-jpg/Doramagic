  content: 'INTERACTION: BD-086 × BD-007 → Silent failure mode where accrual creates GL entries without
    generating demand, causing repayment allocation to return zero'
  rationale: BD-086 enforces that Loan Demand must be generated before repayment allocation (explicit
    prerequisite), but BD-007 separates accrual (time-triggered GL entries) from demand generation (payment-triggered).
    This creates a HIDDEN DEPENDENCY where accruals post interest to GL without creating corresponding
    demands. If demand generation is skipped or delayed, repayments allocate zero amounts while GL still
    shows income recognition, creating accounting mismatch that violates IRAC compliance and income recognition
    accuracy.
