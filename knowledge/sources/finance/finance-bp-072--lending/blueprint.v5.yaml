# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-072
name: Frappe Lending
sop_version: '3.6'
source:
  projects:
  - lending
  commit_hash: e935f9052328c34848854432544c88e40feb16c3
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: loan management system
  description: Comprehensive loan lifecycle management system built on ERPNext and Frappe Framework, covering
    origination through closure with automated accounting, risk classification, and collateral management.
  prerequisites: Understanding of loan products, interest calculations, financial accounting concepts,
    and basic ERPNext/Frappe Framework familiarity
  not_suitable_for: Non-financial applications, real-time trading systems, cryptocurrency platforms, organizations
    without accounting infrastructure
stages:
- id: loan_application
  name: Loan Application Processing
  order: 1
  responsibility: Validates loan requests, calculates repayment schedules, checks security pledges and
    sanction limits. Acts as origination gate before loan booking.
  interface:
    inputs:
    - applicant details
    - loan product
    - requested amount
    - proposed securities
    outputs:
    - Loan Application document
    - repayment schedule preview
    - approved loan amount
  required_methods:
  - name: LoanApplication.validate
    description: Validates applicant eligibility, sanction limits, and security requirements before loan
      can proceed
    evidence: lending/loan_management/doctype/loan_application/loan_application.py:27(LoanApplication)
  - name: LoanApplication.before_save
    description: Auto-creates Customer/Contact/Address records when applicant type is Customer
    evidence: lending/loan_management/doctype/loan_application/loan_application.py:90(before_save)
  - name: LoanApplication.check_sanctioned_amount_limit
    description: Validates cumulative exposure against per-applicant sanctioned limits across each products
    evidence: lending/loan_management/doctype/loan_application/loan_application.py:182(check_sanctioned_amount_limit)
  key_behaviors:
  - behavior: Entity-level isolation
    description: Auto-creates linked Customer/Contact/Address entities on save, enabling self-service
      origination without pre-existing customer records
    evidence: lending/loan_management/doctype/loan_application/loan_application.py:90(before_save)
  - behavior: Cumulative exposure control
    description: Prevents over-exposure by enforcing per-customer lending caps across each loan products
    evidence: lending/loan_management/doctype/loan_application/loan_application.py:182(check_sanctioned_amount_limit)
  - behavior: Repayment preview generation
    description: Generates repayment schedule preview using PMT formula for standard loans or flat rate
      option for specific products
    evidence: lending/loan_management/doctype/loan_repayment_schedule/utils.py:14(get_monthly_repayment_amount)
  replaceable_points:
  - name: repayment_calculation
    description: Monthly repayment amount calculation method
    options:
    - name: PMT formula
      traits:
      - standard EMI calculation
      - correct interest allocation
      - widely used
      fit_for:
      - most loan products
      - standard amortization schedules
      not_fit_for:
      - simple interest products
      - balloon payment structures
    - name: Flat interest rate
      traits:
      - simpler calculation
      - constant interest portion
      fit_for:
      - specific legacy products
      - simple interest scenarios
      not_fit_for:
      - standard EMI products
      - regulatory-compliant interest allocation
    default: PMT formula
  - name: customer_creation
    description: Auto-customer creation logic on application save
    options:
    - name: enabled
      traits:
      - auto-creates Customer/Contact/Address
      - self-service friendly
      fit_for:
      - new customer onboarding
      - digital origination flows
      not_fit_for:
      - existing customer loans
      - employee loans with pre-created records
    - name: disabled
      traits:
      - requires pre-existing customer
      - manual setup required
      fit_for:
      - existing customer loans
      - bulk migration scenarios
      not_fit_for:
      - self-service portals
      - new customer acquisition flows
    default: enabled
  design_decisions:
  - 'LoanApplication creates Customer/Contact/Address on save for Customer type - enables self-service
    origination without pre-existing customer records; evidence: loan_application.py:90(before_save)'
  - 'Sanctioned amount limit checked against cumulative exposure per applicant - prevents over-exposure
    by enforcing per-customer lending caps; evidence: loan_application.py:182(check_sanctioned_amount_limit)'
  - 'Repayment schedule uses PMT formula for standard loans, flat rate option for specific products -
    standard EMI ensures correct interest allocation; evidence: loan_repayment_schedule/utils.py:14(get_monthly_repayment_amount)'
  acceptance_hints:
  - Loan Application document successfully validates with correct applicant type and loan product
  - Sanctioned amount check passes for eligible applicants within limits
  - Repayment schedule preview generates correctly for both PMT and flat rate products
  - Auto-created Customer/Contact/Address records are properly linked to application
- id: loan_booking
  name: Loan Booking
  order: 2
  responsibility: Creates the active loan record after application approval. Sets up accounts, validates
    product alignment, handles security linkage and migration for imported loans.
  interface:
    inputs:
    - Loan Application
    - security assignment
    outputs:
    - Loan document in Sanctioned/Disbursed status
  required_methods:
  - name: Loan.validate
    description: Validates loan configuration including product alignment and account setup requirements
    evidence: lending/loan_management/doctype/loan/loan.py:49(Loan)
  - name: LoanController.loan_accounting_enabled
    description: Feature flag check to determine whether GL entries should be generated for this loan
    evidence: lending/loan_management/controllers/loan_controller.py:11(loan_accounting_enabled)
  - name: Loan.get_migration_date_for_import
    description: Establishes accrual/demand starting point for imported historical loans
    evidence: lending/loan_management/doctype/loan/loan.py:248(get_migration_date_for_import)
  key_behaviors:
  - behavior: Accounting mode flexibility
    description: LoanController conditionally bypasses GL entries based on loan_accounting_enabled flag,
      enabling simplified mode without accounting
    evidence: lending/loan_management/controllers/loan_controller.py:11(loan_accounting_enabled)
  - behavior: Migration integrity preservation
    description: Imported loans skip GL entries but set is_imported flag to preserve historical data without
      re-executing accounting
    evidence: lending/loan_management/controllers/loan_controller.py:22(is_imported)
  - behavior: Account mandatory enforcement
    description: LoanProduct requires complete account setup before loan can be created, ensuring accounting
      integrity
    evidence: lending/loan_management/doctype/loan_product/loan_product.py:12(LoanProduct)
  replaceable_points:
  - name: accounting_mode
    description: Whether to generate GL entries for loan transactions
    options:
    - name: enabled
      traits:
      - full GL entry generation
      - complete accounting trail
      - auditable
      fit_for:
      - production environments
      - regulated institutions
      - full accounting requirements
      not_fit_for:
      - testing environments
      - initial rollout phases
      - simplified operations
    - name: disabled
      traits:
      - no GL entries
      - simplified processing
      - faster transactions
      fit_for:
      - smaller operations
      - initial rollout phases
      - non-accounting focused use
      not_fit_for:
      - regulated environments
      - auditing requirements
      - financial reporting
    default: enabled
  design_decisions:
  - 'LoanController conditionally bypasses GL entries based on loan_accounting_enabled flag - enables
    simplified mode without accounting for smaller operations; evidence: loan_controller.py:11(loan_accounting_enabled)'
  - 'Imported loans skip GL entries but set is_imported flag to preserve migration integrity - required
    for historical data without re-executing accounting; evidence: loan_controller.py:22(is_imported)'
  - 'Migration date required for imported loans to establish accrual/demand starting point - without migration
    date, accrual/demand cannot determine correct historical boundaries; evidence: loan.py:248(get_migration_date_for_import)'
  acceptance_hints:
  - Loan document created with correct status (Sanctioned/Disbursed) based on workflow
  - GL entries generated when loan_accounting_enabled is True for the company
  - Imported loans correctly set is_imported flag and skip GL entry generation
  - Migration date properly establishes accrual/demand boundaries for historical loans
- id: disbursement
  name: Loan Disbursement
  order: 3
  responsibility: Processes loan fund transfers. Creates repayment schedule, handles BPI (broken period
    interest), withholds security deposits, and updates utilized limits.
  interface:
    inputs:
    - Loan
    - disbursement amount
    - disbursement date
    outputs:
    - Loan Disbursement document
    - Loan Repayment Schedule (term loans)
    - GL entries
  required_methods:
  - name: LoanDisbursement.validate
    description: Validates disbursement eligibility and creates repayment schedule as draft
    evidence: lending/loan_management/doctype/loan_disbursement/loan_disbursement.py:48(LoanDisbursement)
  - name: LoanDisbursement.on_update
    description: Submits draft repayment schedule when disbursement is submitted
    evidence: lending/loan_management/doctype/loan_disbursement/loan_disbursement.py:119(on_update)
  - name: LoanDisbursement.set_cyclic_date
    description: Calculates BPI (broken period interest) when first repayment is not at month start
    evidence: lending/loan_management/doctype/loan_disbursement/loan_disbursement.py:366(set_cyclic_date)
  key_behaviors:
  - behavior: Two-phase schedule creation
    description: Repayment schedule created as draft on disbursement validation, submitted on disbursement
      submit - allows preview and adjustment
    evidence: lending/loan_management/doctype/loan_disbursement/loan_disbursement.py:119(on_update)
  - behavior: BPI handling
    description: Broken period interest calculated when disbursement date precedes first EMI date, ensuring
      accurate interest for irregular first periods
    evidence: lending/loan_management/doctype/loan_disbursement/loan_disbursement.py:366(set_cyclic_date)
  - behavior: LOC date-bounded limits
    description: Line of credit loans track limits via limit_applicable_start/end dates unlike term loans
    evidence: lending/loan_management/doctype/loan_disbursement/loan_disbursement.py:426(repayment_schedule_type)
  replaceable_points:
  - name: schedule_type
    description: Repayment schedule calculation type
    options:
    - name: Monthly as per repayment start date
      traits:
      - standard monthly installments
      - fixed cycle date from start
      fit_for:
      - most term loans
      - standard amortization
      not_fit_for:
      - calendar-aligned products
      - LOC facilities
    - name: Pro-rated calendar months
      traits:
      - calendar-aligned
      - pro-rated first/last periods
      fit_for:
      - calendar-year products
      - fiscal year alignment
      not_fit_for:
      - non-calendar products
      - irregular disbursements
    - name: Monthly as per cycle date
      traits:
      - configurable cycle day
      - flexible start alignment
      fit_for:
      - customer-aligned billing
      - multiple cycle options
      not_fit_for:
      - standard monthly products
    - name: Line of Credit
      traits:
      - date-bounded authorization
      - limit tracking
      - flexible draws
      fit_for:
      - credit lines
      - revolving facilities
      not_fit_for:
      - term loans
      - fixed tenure products
    - name: Flat Interest Rate
      traits:
      - simple interest
      - constant payment
      fit_for:
      - simple products
      - specific legacy products
      not_fit_for:
      - standard EMI products
      - complex amortization
    default: Monthly as per repayment start date
  design_decisions:
  - 'Repayment schedule created as draft on disbursement validation, submitted on disbursement submit
    - allows preview and adjustment before actual disbursement commits; evidence: loan_disbursement.py:119(on_update)'
  - 'BPI (broken period interest) calculated when first repayment is not at month start - accurate interest
    calculation for irregular first periods; evidence: loan_disbursement.py:366(set_cyclic_date)'
  - 'LOC loans track limits via limit_applicable_start/end dates - Line of credit requires date-bounded
    authorization periods unlike term loans; evidence: loan_disbursement.py:426(repayment_schedule_type)'
  acceptance_hints:
  - Loan Disbursement document created with correct amount and date
  - Repayment Schedule generated as draft, visible for preview before final disbursement
  - BPI correctly calculated when disbursement date precedes first EMI date
  - GL entries created for disbursement transaction when accounting enabled
  - Security deposit withheld correctly when specified
- id: accrual
  name: Interest Accrual
  order: 4
  responsibility: Calculates and records interest (normal and penal) accruals daily/weekly/monthly per
    company frequency setting. Prevents overlapping accruals.
  interface:
    inputs:
    - Loan
    - posting date
    - accrual frequency
    outputs:
    - Loan Interest Accrual documents
    - GL entries for accrual accounts
  required_methods:
  - name: LoanInterestAccrual.validate
    description: Validates accrual entry with overlap prevention for same loan/disbursement/interest_type
    evidence: lending/loan_management/doctype/loan_interest_accrual/loan_interest_accrual.py:29(LoanInterestAccrual)
  - name: ProcessLoanInterestAccrual.on_submit
    description: Batch processor triggered by scheduler for portfolio-wide accrual generation
    evidence: lending/loan_management/doctype/process_loan_interest_accrual/process_loan_interest_accrual.py:16(ProcessLoanInterestAccrual)
  - name: Loan.make_suspense_journal_entry
    description: Creates suspense journal entry for NPA loans on accrual submit per IFRS9 requirements
    evidence: lending/loan_management/doctype/loan/loan.py:133(make_suspense_journal_entry)
  key_behaviors:
  - behavior: Company-configurable frequency
    description: Accrual frequency (Daily/Weekly/Monthly) set per company controls batch timing for regulatory
      flexibility
    evidence: lending/loan_management/doctype/loan_interest_accrual/loan_interest_accrual.py:342(loan_accrual_frequency)
  - behavior: NPA income suspense
    description: NPA loans move accrued interest to suspense via journal entry on accrual submit - regulatory
      requirement
    evidence: lending/loan_management/doctype/loan/loan.py:133(make_suspense_journal_entry)
  - behavior: Accrual overlap prevention
    description: Accrual dates cannot overlap for same loan/disbursement/interest_type - prevents duplicate
      interest calculations
    evidence: lending/loan_management/doctype/loan_interest_accrual/loan_interest_accrual.py:88(validate_overlapping_accruals)
  replaceable_points:
  - name: accrual_frequency
    description: Interest accrual frequency
    options:
    - name: Daily
      traits:
      - daily accrual
      - real-time interest tracking
      - high precision
      fit_for:
      - high-value loans
      - regulatory requirements for daily accrual
      not_fit_for:
      - high-volume portfolios
      - performance-critical scenarios
    - name: Weekly
      traits:
      - weekly accrual
      - balance between precision and performance
      fit_for:
      - mid-sized portfolios
      - moderate regulatory requirements
      not_fit_for:
      - high-precision requirements
      - very large portfolios
    - name: Monthly
      traits:
      - month-end accrual
      - batch processing
      - performance optimized
      fit_for:
      - standard products
      - large portfolios
      - performance requirements
      not_fit_for:
      - daily accrual requirements
      - high-precision interest tracking
    default: Monthly
  design_decisions:
  - 'Accrual frequency set per company (Daily/Weekly/Monthly) controls batch timing - regulatory requirements
    may mandate specific frequencies; evidence: loan_interest_accrual.py:342(loan_accrual_frequency)'
  - 'NPA loans move accrued interest to suspense via journal entry on accrual submit - IFRS9/regulatory
    requirement; evidence: loan.py:133(make_suspense_journal_entry)'
  - 'Accrual dates cannot overlap for same loan/disbursement/interest_type - prevents duplicate interest
    calculations distorting balances; evidence: loan_interest_accrual.py:88(validate_overlapping_accruals)'
  acceptance_hints:
  - Loan Interest Accrual documents created with correct interest amounts for normal and penal interest
  - No overlapping accruals exist for any loan/disbursement/interest_type combination
  - NPA loans correctly route interest to suspense accounts instead of income
  - GL entries created for accrual accounts per company accounting configuration
- id: demand
  name: Loan Demand Generation
  order: 5
  responsibility: Creates enforceable payment demands from repayment schedule. Generates EMI demands for
    term loans, interest demands for demand loans. Triggers accrual post-processing.
  interface:
    inputs:
    - Loan Repayment Schedule
    - Loan Interest Accrual entries
    outputs:
    - Loan Demand documents
    - updated Repayment Schedule demand_generated flag
  required_methods:
  - name: LoanDemand.validate
    description: Validates demand entry and generates GL entries for receivables
    evidence: lending/loan_management/doctype/loan_demand/loan_demand.py:13(LoanDemand)
  - name: ProcessLoanDemand.on_submit
    description: Daily batch demand processor with 5000 loans per batch and per-loan commits
    evidence: lending/loan_management/doctype/loan_demand/loan_demand.py:242(BATCH_SIZE)
  key_behaviors:
  - behavior: Batch processing with recovery
    description: Demand generation batched at 5000 loans with per-loan commits - prevents transaction
      timeout and allows recovery
    evidence: lending/loan_management/doctype/loan_demand/loan_demand.py:242(BATCH_SIZE)
  - behavior: Idempotent demand generation
    description: Term loan demands generated from repayment_schedule rows where demand_generated=0 - safe
      reprocessing without duplicates
    evidence: lending/loan_management/doctype/loan_demand/loan_demand.py:306(demand_generated)
  - behavior: BPI demand recovery
    description: Demand created for BPI when disbursement date precedes first EMI date
    evidence: lending/loan_management/doctype/loan_demand/loan_demand.py:324(demand_type)
  replaceable_points:
  - name: batch_size
    description: Loans per batch in demand processing
    options:
    - name: '1000'
      traits:
      - smaller batches
      - faster recovery
      - more frequent commits
      fit_for:
      - large portfolios with timeout issues
      - high failure rate scenarios
      not_fit_for:
      - small portfolios
      - performance-critical environments
    - name: '5000'
      traits:
      - balanced batch size
      - moderate recovery time
      - standard processing
      fit_for:
      - typical portfolios
      - production environments
      not_fit_for:
      - very large portfolios
      - strict timeout requirements
    - name: '10000'
      traits:
      - large batches
      - fewer transactions
      - higher throughput
      fit_for:
      - small portfolios
      - performance-optimized environments
      not_fit_for:
      - large portfolios
      - timeout-sensitive systems
    default: '5000'
  design_decisions:
  - 'Demand generation batched at 5000 loans with per-loan commits - prevents transaction timeout and
    allows recovery from partial failures; evidence: loan_demand.py:242(BATCH_SIZE)'
  - 'Term loan demands generated from repayment_schedule rows where demand_generated=0 - idempotent design
    ensures safe reprocessing; evidence: loan_demand.py:306(demand_generated)'
  - 'Demand created for BPI when disbursement date precedes first EMI date - broken period interest must
    be recovered; evidence: loan_demand.py:324(demand_type)'
  acceptance_hints:
  - Loan Demand documents created for each overdue schedule installments
  - Repayment Schedule demand_generated flag correctly updated after demand creation
  - No duplicate demands generated for same installment
  - BPI demands created when applicable
  - GL entries for receivables created on demand submission
- id: repayment
  name: Loan Repayment Processing
  order: 6
  responsibility: Handles each payment receipts against loans. Allocates amounts to principal/interest/penalty/charges
    per allocation order, creates GL entries, triggers reschedule for excess payments.
  interface:
    inputs:
    - Loan
    - repayment amount
    - repayment type
    - allocation preferences
    outputs:
    - Loan Repayment document
    - updated Loan Demand allocations
    - GL entries
    - potential reschedule
  required_methods:
  - name: LoanRepayment.validate
    description: Validates repayment with allocation logic and collection offset sequence per asset classification
    evidence: lending/loan_management/doctype/loan_repayment/loan_repayment.py:31(LoanRepayment)
  - name: LoanRepayment.create_repost
    description: Triggers Loan Repayment Repost for accrual/demand recalculation when repayments are backdated
    evidence: lending/loan_management/doctype/loan_repayment/loan_repayment.py:391(create_repost)
  - name: LoanDemand.allocate
    description: Matches repayment amounts against outstanding demands by allocation order
    evidence: lending/loan_management/doctype/loan_demand/loan_demand.py:13(LoanDemand)
  key_behaviors:
  - behavior: Asset-class-aware allocation
    description: Allocation follows collection_offset_sequence per asset classification - regulatory requirement
      for collection order
    evidence: lending/loan_management/doctype/loan_product/loan_product.py:130(validate_demand_offset_sequences)
  - behavior: Backdated repayment handling
    description: Backdated repayments trigger Loan Repayment Repost for accrual/demand recalculation to
      maintain consistency
    evidence: lending/loan_management/doctype/loan_repayment/loan_repayment.py:391(create_repost)
  - behavior: Multi-type repayment support
    description: Repayment types include waivers, adjustments, write-off recovery with different GL treatments
    evidence: lending/loan_management/doctype/loan_repayment/loan_repayment.py:98(repayment_type)
  replaceable_points:
  - name: allocation_order
    description: Payment allocation sequence
    options:
    - name: Penalty→Interest→Principal→Charges
      traits:
      - penalty-focused
      - standard allocation
      fit_for:
      - default allocation
      - most loan products
      not_fit_for:
      - regulatory-specific sequences
      - custom product requirements
    - name: collection_offset_sequence config per asset class
      traits:
      - asset-class-aware
      - regulatory compliant
      - flexible configuration
      fit_for:
      - regulated products
      - IFRS9 compliance
      - multiple jurisdictions
      not_fit_for:
      - simple products
      - single jurisdiction
    default: Penalty→Interest→Principal→Charges
  design_decisions:
  - 'Allocation follows collection_offset_sequence per asset classification - regulatory规定了收款顺序(standard→sub-standard→written-off)必须从应收账户转出;
    evidence: loan_product.py:130(validate_demand_offset_sequences)'
  - 'Backdated repayments trigger Loan Repayment Repost for accrual/demand recalculation - maintains data
    consistency when correcting past periods; evidence: loan_repayment.py:391(create_repost)'
  - 'Repayment types include waivers, adjustments, write-off recovery with different GL treatments - different
    transaction types require distinct accounting entries; evidence: loan_repayment.py:98(repayment_type)'
  acceptance_hints:
  - Loan Repayment correctly allocates amounts per collection_offset_sequence for the asset classification
  - GL entries created with proper debit/credit to appropriate accounts
  - Backdated repayments trigger automatic repost for accrual/demand recalculation
  - Demands correctly marked as allocated after repayment processing
- id: restructure
  name: Loan Restructure
  order: 7
  responsibility: Modifies loan terms (rate, tenure, EMI) while loan is active. Handles principal adjustments,
    interest capitalization/waiver, and generates new repayment schedules.
  interface:
    inputs:
    - Loan
    - restructure type
    - new terms
    - security deposit allocation
    outputs:
    - Loan Restructure document
    - new Loan Repayment Schedule
    - adjusted Loan Demands
  required_methods:
  - name: LoanRestructure.validate
    description: Validates restructure operation and enforces single-restructure-at-a-time rule
    evidence: lending/loan_management/doctype/loan_restructure/loan_restructure.py:22(LoanRestructure)
  - name: LoanRestructure.allocate_security_deposit
    description: Applies security deposit to overdue amounts before new schedule calculation
    evidence: lending/loan_management/doctype/loan_restructure/loan_restructure.py:140(allocate_security_deposit)
  - name: LoanRestructure.treatment_of_normal_interest
    description: Handles interest capitalization or waiver per restructure type
    evidence: lending/loan_management/doctype/loan_restructure/loan_restructure.py:230(treatment_of_normal_interest)
  key_behaviors:
  - behavior: Multi-type restructure support
    description: 'Restructure types: Normal Restructure, Pre Payment, Advance Payment with different treatments
      per regulatory guidelines'
    evidence: lending/loan_management/doctype/loan_restructure/loan_restructure.py:79(restructure_type)
  - behavior: Security deposit pre-allocation
    description: Security deposit applied to overdue amounts before new schedule calculation - deposit
      reduces effective balance
    evidence: lending/loan_management/doctype/loan_restructure/loan_restructure.py:140(allocate_security_deposit)
  - behavior: Interest treatment options
    description: Interest can be capitalized (added to principal) or waived per restructure type - capitalization
      keeps loan active
    evidence: lending/loan_management/doctype/loan_restructure/loan_restructure.py:230(treatment_of_normal_interest)
  replaceable_points:
  - name: restructure_type
    description: Type of restructure operation
    options:
    - name: Normal Restructure
      traits:
      - rate/tenure change
      - new schedule generation
      - standard treatment
      fit_for:
      - general loan modifications
      - rate changes
      - tenure extensions
      not_fit_for:
      - full prepayment
      - advance payment scenarios
    - name: Pre Payment
      traits:
      - partial prepayment
      - moratorium may apply
      - schedule recalculation
      fit_for:
      - customer prepayment
      - partial closure
      - tenure reduction
      not_fit_for:
      - full prepayment
      - advance payments
    - name: Advance Payment
      traits:
      - advance installment payment
      - reschedule trigger
      - excess allocation
      fit_for:
      - advance EMIs
      - lump sum payments
      - early settlement attempts
      not_fit_for:
      - standard restructuring
      - normal modifications
    default: Normal Restructure
  design_decisions:
  - 'Restructure types: Normal Restructure, Pre Payment, Advance Payment with different treatments - different
    accounting treatments per regulatory guidelines; evidence: loan_restructure.py:79(restructure_type)'
  - 'Security deposit applied to overdue amounts before new schedule calculation - deposit reduces effective
    balance before recalculating EMI; evidence: loan_restructure.py:140(allocate_security_deposit)'
  - 'Interest can be capitalized (added to principal) or waived per restructure type - capitalization
    keeps loan active; waiver writes off income; evidence: loan_restructure.py:230(treatment_of_normal_interest)'
  acceptance_hints:
  - Only one restructure allowed at a time per loan (initiated status check)
  - New repayment schedule correctly generated with updated EMI and tenure
  - Security deposit applied correctly to overdue amounts before schedule calculation
  - Interest treatment (capitalization or waiver) correctly applied per restructure type
- id: classification
  name: Loan Classification & NPA Processing
  order: 8
  responsibility: Classifies loans based on Days Past Due (DPD), moves to NPA status, triggers suspense
    entries for unpaid interest, manages watch periods.
  interface:
    inputs:
    - Loan
    - DPD threshold
    - posting date
    outputs:
    - Loan NPALog
    - updated Loan.days_past_due
    - suspense journal entries
  required_methods:
  - name: ProcessLoanClassification.on_submit
    description: Batch classifier with DPD calculation from oldest unpaid demand date
    evidence: lending/loan_management/doctype/process_loan_classification/process_loan_classification.py:10(ProcessLoanClassification)
  - name: Loan.get_oldest_unpaid_demand_date
    description: Calculates DPD from oldest demand date not paid - requires demand to exist first
    evidence: lending/loan_management/doctype/loan/loan.py:462(get_oldest_unpaid_demand_date)
  - name: Loan.unmark_npa
    description: Prevents immediate unmark of NPA before watch period end date
    evidence: lending/loan_management/doctype/loan/loan.py:472(unmark_npa)
  key_behaviors:
  - behavior: Demand prerequisite enforcement
    description: DPD calculated from oldest demand date not paid - requires demand to exist first
    evidence: lending/loan_management/doctype/loan/loan.py:462(get_oldest_unpaid_demand_date)
  - behavior: Watch period enforcement
    description: Watch period prevents immediate unmark of NPA before specified end date - regulatory
      cooling-off period
    evidence: lending/loan_management/doctype/loan/loan.py:472(unmark_npa)
  - behavior: Manual override capability
    description: Manual NPA flag bypasses DPD calculation for immediate classification when automatic
      rules insufficient
    evidence: lending/loan_management/doctype/loan/loan.py:475(manual_npa)
  replaceable_points:
  - name: dpd_threshold
    description: Days Past Due threshold for NPA classification
    options:
    - name: '30'
      traits:
      - early NPA classification
      - conservative provisioning
      fit_for:
      - conservative risk management
      - early intervention policies
      not_fit_for:
      - standard regulatory requirements
      - most jurisdictions
    - name: '60'
      traits:
      - moderate classification
      - balanced approach
      fit_for:
      - mid-level risk appetite
      - some regulatory frameworks
      not_fit_for:
      - strict NPA requirements
      - conservative frameworks
    - name: '90'
      traits:
      - standard NPA threshold
      - widely accepted
      fit_for:
      - most regulatory frameworks
      - standard provisioning
      not_fit_for:
      - conservative policies
      - early NPA requirements
    - name: '180'
      traits:
      - lenient classification
      - extended grace period
      fit_for:
      - specific products
      - lenient policies
      not_fit_for:
      - standard requirements
      - most jurisdictions
    default: '90'
  design_decisions:
  - 'DPD calculated from oldest demand date not paid, requires demand to exist first - cannot calculate
    delinquency without a demand to reference; evidence: loan.py:462(get_oldest_unpaid_demand_date)'
  - 'Watch period prevents immediate unmark of NPA before specified end date - regulatory cooling-off
    period before accounts can exit NPA; evidence: loan.py:472(unmark_npa)'
  - 'Manual NPA flag bypasses DPD calculation for immediate classification - allows operational control
    when automatic rules insufficient; evidence: loan.py:475(manual_npa)'
  acceptance_hints:
  - Loans correctly classified as NPA when DPD exceeds threshold
  - NPA log entries created with proper timestamp and classification reason
  - Watch period enforced before NPA can be unmarked
  - Manual NPA override correctly bypasses DPD calculation
- id: write_off
  name: Loan Write-Off
  order: 9
  responsibility: Writes off unrecoverable loan portions. Creates waivers for pending interest/penalty/charges,
    posts suspense-to-income entries, optionally closes loan.
  interface:
    inputs:
    - Loan
    - write-off amount
    - settlement flag
    outputs:
    - Loan Write-Off document
    - waiver repayments
    - GL entries
    - updated loan status
  required_methods:
  - name: LoanWriteOff.validate
    description: Validates write-off amount and creates automatic waivers for pending interest/penalty/charges
    evidence: lending/loan_management/doctype/loan_write_off/loan_write_off.py:20(LoanWriteOff)
  - name: LoanWriteOff.make_loan_waivers
    description: Automatically creates Loan Repayment records for Interest/Penalty/Charges waivers
    evidence: lending/loan_management/doctype/loan_write_off/loan_write_off.py:287(make_loan_waivers)
  - name: LoanWriteOff.write_off_suspense_entries
    description: Transfers suspense entries to income/write-off accounts on write-off processing
    evidence: lending/loan_management/doctype/loan_write_off/loan_write_off.py:329(write_off_suspense_entries)
  key_behaviors:
  - behavior: Automatic waiver generation
    description: Write-off automatically creates Loan Repayment for Interest/Penalty/Charges waivers -
      waivers must be recorded as separate transactions
    evidence: lending/loan_management/doctype/loan_write_off/loan_write_off.py:287(make_loan_waivers)
  - behavior: NPA suspense realization
    description: Suspense entries transferred to income/write-off accounts on write-off processing - NPA
      suspense must be cleared
    evidence: lending/loan_management/doctype/loan_write_off/loan_write_off.py:329(write_off_suspense_entries)
  - behavior: Principal-only write-off
    description: Write-off amount must equal pending principal (not total outstanding) - write-off covers
      principal only
    evidence: lending/loan_management/doctype/loan_write_off/loan_write_off.py:92(validate_write_off_amount)
  replaceable_points:
  - name: closure_on_write_off
    description: Auto-close loan after write-off
    options:
    - name: 'yes'
      traits:
      - automatic closure
      - clean portfolio
      - simplified tracking
      fit_for:
      - full write-offs
      - complete settlements
      - clean accounting
      not_fit_for:
      - partial write-offs
      - recovery scenarios
      - ongoing monitoring
    - name: 'no'
      traits:
      - loan remains active
      - continued tracking
      - recovery possible
      fit_for:
      - partial write-offs
      - recovery attempts
      - ongoing legal action
      not_fit_for:
      - full write-offs
      - clean portfolio management
    default: 'yes'
  design_decisions:
  - 'Write-off automatically creates Loan Repayment for Interest/Penalty/Charges waivers - waivers must
    be recorded as separate transactions for proper accounting; evidence: loan_write_off.py:287(make_loan_waivers)'
  - 'Suspense entries transferred to income/write-off accounts on write-off processing - NPA suspense
    must be realized when loan is written off; evidence: loan_write_off.py:329(write_off_suspense_entries)'
  - 'Write-off amount must equal pending principal (not total outstanding) - write-off covers principal
    only; interest handled separately via waivers; evidence: loan_write_off.py:92(validate_write_off_amount)'
  acceptance_hints:
  - Write-off amount validated against pending principal only
  - Automatic waivers created for Interest, Penalty, and Charges
  - Suspense entries correctly transferred to income/write-off accounts
  - Loan status updated (Closed/WrittenOff) when closure_on_write_off is yes
- id: adjustment
  name: Balance Adjustments & Refunds
  order: 10
  responsibility: Handles credit/debit adjustments to loan ledger, processes excess refunds and security
    deposit returns.
  interface:
    inputs:
    - Loan
    - adjustment amount
    - adjustment type
    outputs:
    - Loan Balance Adjustment / Loan Refund documents
    - GL entries
  required_methods:
  - name: LoanBalanceAdjustment.validate
    description: Validates adjustment and blocks new adjustments during active restructure
    evidence: lending/loan_management/doctype/loan_balance_adjustment/loan_balance_adjustment.py:16(LoanBalanceAdjustment)
  - name: LoanRefund.validate
    description: Validates refund request with type-specific GL account selection
    evidence: lending/loan_management/doctype/loan_refund/loan_refund.py:15(LoanRefund)
  - name: LoanBalanceAdjustment.validate_if_restructure_in_process
    description: Blocks new balance adjustments when restructure is in progress to prevent double-modification
    evidence: lending/loan_management/doctype/loan_balance_adjustment/loan_balance_adjustment.py:73(validate_if_restructure_in_process)
  key_behaviors:
  - behavior: Restructure conflict prevention
    description: Restructure-in-progress blocks new balance adjustments - prevents double-modification
      during active restructure workflow
    evidence: lending/loan_management/doctype/loan_balance_adjustment/loan_balance_adjustment.py:73(validate_if_restructure_in_process)
  - behavior: Refund type differentiation
    description: 'Refund types: excess amount, security deposit, general with different GL accounts per
      accounting rules'
    evidence: lending/loan_management/doctype/loan_refund/loan_refund.py:71(is_excess_amount_refund)
  replaceable_points:
  - name: refund_type
    description: Type of refund processing
    options:
    - name: excess amount
      traits:
      - excess payment refund
      - customer credit return
      fit_for:
      - overpayment refunds
      - excess amount returns
      not_fit_for:
      - security deposits
      - general adjustments
    - name: security deposit
      traits:
      - collateral return
      - deposit refund
      fit_for:
      - security deposit releases
      - pledge cancellations
      not_fit_for:
      - excess payments
      - general refunds
    - name: general
      traits:
      - generic adjustment
      - miscellaneous refunds
      fit_for:
      - other refund scenarios
      - miscellaneous returns
      not_fit_for:
      - specific refund types
      - structured refunds
    default: excess amount
  design_decisions:
  - 'Restructure-in-progress blocks new balance adjustments - prevents double-modification during active
    restructure workflow; evidence: loan_balance_adjustment.py:73(validate_if_restructure_in_process)'
  - 'Refund types: excess amount, security deposit, general with different GL accounts - different refund
    reasons use different source/destination accounts; evidence: loan_refund.py:71(is_excess_amount_refund)'
  acceptance_hints:
  - Balance adjustments blocked when loan has active restructure in process
  - GL entries created with correct accounts per refund type
  - Loan.credit_adjustment_amount or debit_adjustment_amount correctly updated
  - Refund processed with appropriate GL accounts for the refund type
- id: security_management
  name: Loan Security Management
  order: 11
  responsibility: Tracks pledged securities, monitors shortfall, handles release requests, updates loan
    limits based on security values.
  interface:
    inputs:
    - Loan
    - pledged securities
    - current security prices
    outputs:
    - Loan Security Assignment
    - Loan Security Shortfall records
    - updated limits
  required_methods:
  - name: LoanSecurityAssignment.validate
    description: Validates security pledge and calculates LTV with haircut application
    evidence: lending/loan_management/doctype/loan_security_assignment/loan_security_assignment.py:18(LoanSecurityAssignment)
  - name: LoanSecurityAssignment.post_haircut_amount
    description: Applies haircut to security value for conservative LTV calculation
    evidence: lending/loan_management/doctype/loan_security_assignment/loan_security_assignment.py:127(post_haircut_amount)
  - name: LoanSecurityAssignment.update_loan_securities_values
    description: Updates security values on disbursement (increase utilization) and repayment (decrease)
    evidence: lending/loan_management/doctype/loan_security_assignment/loan_security_assignment.py:176(update_loan_securities_values)
  key_behaviors:
  - behavior: Haircut application
    description: Haircut applied to security value for LTV calculation - accounts for market volatility
      and liquidation costs
    evidence: lending/loan_management/doctype/loan_security_assignment/loan_security_assignment.py:127(post_haircut_amount)
  - behavior: Dynamic limit adjustment
    description: Security values updated on disbursement (increase utilization) and repayment (decrease)
      - LTV stays current
    evidence: lending/loan_management/doctype/loan_security_assignment/loan_security_assignment.py:176(update_loan_securities_values)
  - behavior: Shortfall monitoring
    description: Daily scheduler monitors LTV breaches and generates shortfall alerts
    evidence: lending/hooks.py:188(process_loan_security_shortfall)
  replaceable_points:
  - name: haircut_calculation
    description: Security haircut percentage calculation method
    options:
    - name: fixed per type
      traits:
      - static percentage
      - type-specific
      - simpler configuration
      fit_for:
      - standard products
      - stable securities
      - simple management
      not_fit_for:
      - volatile securities
      - market-sensitive products
    - name: dynamic market-based
      traits:
      - market-adjusted
      - real-time pricing
      - complex calculation
      fit_for:
      - volatile securities
      - market-linked products
      not_fit_for:
      - standard products
      - simple requirements
    default: fixed per type
  design_decisions:
  - 'Haircut applied to security value for LTV calculation - haircut accounts for market volatility and
    liquidation costs; evidence: loan_security_assignment.py:127(post_haircut_amount)'
  - 'Security values updated on disbursement (increase utilization) and repayment (decrease) - loan-to-value
    must stay current with principal changes; evidence: loan_security_assignment.py:176(update_loan_securities_values)'
  acceptance_hints:
  - Loan Security Assignment correctly linked to secured loans
  - Haircut correctly applied to security values for LTV calculation
  - Shortfall alerts generated when LTV exceeds threshold
  - Loan limits updated based on current security values
  - Security release correctly processes when loan is settled
data_flow:
- from_stage: loan_application
  to_stage: loan_booking
  data: Loan Application document → Loan document (via create_loan mapping)
- from_stage: loan_booking
  to_stage: disbursement
  data: Loan (Sanctioned) → Loan Disbursement + Loan Repayment Schedule
- from_stage: disbursement
  to_stage: accrual
  data: Loan Disbursement triggers process_loan_interest_accrual_for_loans on submit
- from_stage: accrual
  to_stage: demand
  data: Loan Interest Accrual entries feed into demand generation
- from_stage: demand
  to_stage: repayment
  data: Loan Demands allocated against incoming Loan Repayments
- from_stage: repayment
  to_stage: classification
  data: Repayment triggers process_loan_classification (on backdated or on settlement)
- from_stage: repayment
  to_stage: restructure
  data: Advance/Pre Payment repayments trigger reschedule via create_update_loan_reschedule
- from_stage: restructure
  to_stage: disbursement
  data: New Loan Repayment Schedule created replacing active schedule
- from_stage: loan_booking
  to_stage: security_management
  data: Loan Security Assignment linked via Loan.is_secured_loan
- from_stage: security_management
  to_stage: loan_booking
  data: Security values update loan.maximum_loan_amount and available_limit_amount
- from_stage: write_off
  to_stage: repayment
  data: LoanWriteOff creates Loan Repayment for waivers
- from_stage: adjustment
  to_stage: loan_booking
  data: Adjustments update Loan.credit_adjustment_amount or debit_adjustment_amount
