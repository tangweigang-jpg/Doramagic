replaceable_slots:
- id: slot-001
  name: database
  description: Use MariaDB for production; Frappe ecosystem has best tooling and testing for MariaDB.
    PostgreSQL available but requires additional configuration and may have edge case issues.
  used_in_stages: []
  options:
  - name: MariaDB
    traits:
    - ACID compliant
    - Frappe default
    - UTF8MB4 support
    fit_for:
    - Production deployments requiring strong consistency and Frappe compatibility
    not_fit_for:
    - Lightweight development without Docker
  - name: MySQL
    traits:
    - ACID compliant
    - Frappe compatible
    - Wide hosting support
    fit_for:
    - Existing MySQL infrastructure
    not_fit_for:
    - Environments requiring MariaDB-specific features
  - name: PostgreSQL (via Frappe)
    traits:
    - ACID compliant
    - Frappe experimental support
    - Advanced indexing
    fit_for:
    - Environments with existing PostgreSQL infrastructure
    not_fit_for:
    - Production use as Frappe primarily tests and supports MariaDB
  default: MariaDB
  _source: worker_resource
- id: slot-002
  name: cache
  description: Redis is the only supported cache backend for Frappe. It also provides the RQ (Redis Queue)
    for background job processing.
  used_in_stages: []
  options:
  - name: Redis
    traits:
    - In-memory
    - Frappe default
    - Supports RQ job queue
    fit_for:
    - All Frappe deployments; provides caching and background job processing
    not_fit_for:
    - Memory-constrained environments
  default: Redis
  _source: worker_resource
- id: slot-003
  name: pdf_generation
  description: wkhtmltopdf is the default and best-tested option for Frappe. Use WeasyPrint for simpler
    deployments or Chromium for complex layouts.
  used_in_stages: []
  options:
  - name: wkhtmltopdf
    traits:
    - Frappe default
    - Webkit-based
    - PDF generation
    fit_for:
    - Standard PDF report generation
    not_fit_for:
    - Environments requiring pure Python PDF solution
  - name: WeasyPrint
    traits:
    - Pure Python
    - CSS-based
    - Alternative rendering
    fit_for:
    - Environments where wkhtmltopdf installation is problematic
    not_fit_for:
    - Environments requiring exact wkhtmltopdf PDF output compatibility
  - name: Chromium/Puppeteer
    traits:
    - Modern browser rendering
    - JavaScript support
    fit_for:
    - Complex PDF layouts requiring full browser rendering
    not_fit_for:
    - Lightweight deployments
  default: wkhtmltopdf
  _source: worker_resource
- id: slot-004
  name: job_queue
  description: RQ is the Frappe default and integrates natively with the scheduler_events system. Use
    Celery only for complex distributed architectures.
  used_in_stages: []
  options:
  - name: Frappe RQ (Redis Queue)
    traits:
    - Redis-backed
    - Frappe default
    - Simple setup
    fit_for:
    - All standard deployments
    not_fit_for:
    - Environments without Redis
  - name: Celery with Redis
    traits:
    - Distributed task queue
    - Broader ecosystem
    fit_for:
    - Large-scale distributed deployments
    not_fit_for:
    - Standard single-server deployments
  default: Frappe RQ
  _source: worker_resource
- id: slot-005
  name: search_indexing
  description: MariaDB full-text search is sufficient for most loan management use cases. Elasticsearch
    can be added for large deployments with complex search requirements.
  used_in_stages: []
  options:
  - name: MariaDB Full-Text
    traits:
    - Built-in
    - Frappe default
    - Sufficient for most cases
    fit_for:
    - Standard deployments with moderate data volume
    not_fit_for:
    - Large-scale search requiring advanced features
  - name: Elasticsearch
    traits:
    - Advanced search
    - Scalable
    - Frappe optional integration
    fit_for:
    - Large deployments requiring fast full-text search
    not_fit_for:
    - Small deployments or when Frappe search is sufficient
  default: MariaDB Full-Text
  _source: worker_resource
- id: slot-006
  name: authentication
  description: Use Frappe's built-in authentication for standard deployments. OAuth can be configured
    via Frappe's social login module for enterprise SSO requirements.
  used_in_stages: []
  options:
  - name: Frappe Native Auth
    traits:
    - Built-in
    - Session-based
    - Role/Permission system
    fit_for:
    - Standard deployments
    not_fit_for:
    - Environments requiring SSO or OAuth
  - name: OAuth 2.0 (via Frappe)
    traits:
    - OAuth provider support
    - SSO capable
    fit_for:
    - Enterprise environments requiring SSO
    not_fit_for:
    - Simple deployments
  default: Frappe Native Auth
  _source: worker_resource
