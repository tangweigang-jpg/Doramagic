  rationale: 'RISK CASCADE: BD-083 triggers automatic write-off when DPD exceeds threshold, but BD-019
    calculates DPD from last payment date (resetting to zero on any payment). A borrower with multiple
    loans where one is NPA could make a partial payment on the NPA loan, resetting DPD to zero and triggering
    automatic closure before full recovery actions. BD-020 then propagates the ''recovered'' status to
    customer level, potentially clearing NPA flags that should persist across the portfolio.'
  evidence: N/A:0(see_rationale)
