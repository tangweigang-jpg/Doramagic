- id: BD-104
  type: B/BA
  content: 'INTERACTION: BD-035 × BD-054 → Write-off limit tolerance conflicts with write-off amount equality
    requirement, creating edge case where auto-close cannot complete'
  rationale: 'CONTRADICTION: BD-035 enables auto-close when pending amount is within write-off limit tolerance,
    but BD-054 requires write-off amount to exactly equal pending principal. If pending principal (after
    applying tolerance) is within write-off limit but includes rounding differences from accrued interest/penalties,
    the exact equality check (BD-054) would reject the write-off, preventing auto-close from completing.
    The tolerance mechanism cannot compensate for the strict equality requirement.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Allowing write-off within tolerance was considered but rejected for strict principal-only
    write-off policy
