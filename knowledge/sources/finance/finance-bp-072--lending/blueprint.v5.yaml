  type: B/BA
  content: 'INTERACTION: BD-093 × BD-036 → Minimum days default from Company settings creates implicit
    dependency that may conflict with explicit repayment start date validation'
  rationale: 'HIDDEN DEPENDENCY: BD-093 provides minimum days between disbursement and first repayment
    from Company settings (with fallback chain), but BD-036 validates that Repayment Start Date cannot
    be before Disbursement Date. The Company setting may configure minimum days that creates a logical
    constraint even when explicit Repayment Start Date is not set, but the validation (BD-036) only checks
    explicit field values. If the derived start date (from min_days calculation) conflicts with user-entered
