- id: BD-096
  type: BA
  content: 'INTERACTION: [BD-053] × [BD-057] × [BD-060] → RISK CASCADE: CDR default assumption drives
    recovery rate application, which is delayed by 2-month delinquency lag, creating non-linear loss timing'
  rationale: 'BD-053 sets CDR as the default assumption for performing assets, establishing the baseline
    default rate. BD-060 introduces a 2-month delinquency lag before conversion to default status. BD-057
    then applies recovery rate with 12-month lag after default recognition. The cascade emerges because:
    (1) assets default at CDR rate, (2) don''t convert to defaulted status for 2 months, (3) then don''t
    realize losses for another 12 months. This means today''s high CDR assumptions may not appear as losses
    for 14 months, creating a time bomb effect where deal performance appears healthy during the lag periods,
    then deteriorates suddenly as lagged losses materialize. Rating agencies and investors may be caught
    off-guard by this delayed loss recognition.'
  evidence: BD-053,BD-057,BD-060
  stage: global
  alternative_considered: Shorter lags could improve transparency but require servicer system upgrades
    and affect reported delinquency metrics
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-097
  type: B/BA
  content: 'INTERACTION: [BD-030] × [BD-084] → Hidden Dependency: Chinese deal format simplified keys
    (封包日, 起息日) must match waterfall status mapping keys (未违约, 循环, 加速清偿) for proper phase transitions'
  rationale: BD-030 establishes simplified Chinese keys for deal configuration including date fields.
    BD-084 maps Chinese waterfall phase names to English status for internal processing. The hidden dependency
    is that BD-030's configuration keys are distinct from BD-084's status mapping keys—they serve different
    purposes. If a Chinese deal configuration uses non-standard field names or misspelled phase names,
    the system silently accepts them during configuration but then fails during waterfall execution when
    BD-084 can't find the corresponding mapping. This creates silent configuration errors that only surface
    at runtime during waterfall execution, making debugging difficult.
