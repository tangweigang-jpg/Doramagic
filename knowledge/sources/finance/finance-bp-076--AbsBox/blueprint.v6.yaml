replaceable_slots:
- id: slot-001
  name: cashflow_engine_server
  description: Choose local for development/offline needs, custom for enterprise integration
  used_in_stages: []
  options:
  - name: AbsBox Official Cloud
    traits:
    - cloud-hosted
    - production-ready
    - version-controlled
    fit_for:
    - Production use, quick start, managed infrastructure
    not_fit_for:
    - Offline/air-gapped environments, custom engine modifications
  - name: Local Engine Server
    traits:
    - localhost
    - offline-capable
    - full-control
    fit_for:
    - Development, testing, air-gapped environments
    not_fit_for:
    - Multi-user access without additional setup
  - name: Custom Engine (via USE_ENV)
    traits:
    - custom-endpoint
    - extensible
    fit_for:
    - Enterprise deployments with custom backend
    not_fit_for:
    - Standard users, quick setup
  default: AbsBox Official Cloud
  _source: worker_resource
- id: slot-002
  name: deal_library_backend
  description: Only available if using Chinese deal library service
  used_in_stages: []
  options:
  - name: AbsBox Deal Library (China)
    traits:
    - cloud-hosted
    - bearer-token-auth
    fit_for:
    - Users of Chinese deal library service
    not_fit_for:
    - Non-Chinese users, offline needs
  - name: Custom Deal Library
    traits:
    - custom-endpoint
    - extensible
    fit_for:
    - Enterprise with proprietary deal database
    not_fit_for:
    - Standard users
  default: AbsBox Deal Library (China)
  _source: worker_resource
- id: slot-003
  name: data_visualization
  description: Use Plotly/Bokeh for interactive needs; current implementation uses graphviz/matplotlib
    for static output
  used_in_stages: []
  options:
  - name: matplotlib (via graphviz)
    traits:
    - 2d
    - static-images
    fit_for:
    - Standard cashflow visualization, waterfall charts
    not_fit_for:
    - Interactive dashboards, 3D visualization
  - name: Plotly
    traits:
    - interactive
    - web-ready
    fit_for:
    - Interactive financial charts, dashboards
    not_fit_for:
    - Simple static charts, PDF reports
  - name: Bokeh
    traits:
    - interactive
    - streaming
    fit_for:
    - Real-time monitoring dashboards
    not_fit_for:
    - Simple static output
  default: matplotlib (via graphviz)
  _source: worker_resource
- id: slot-004
  name: output_format
  description: HTML for web/viewing, Excel for analysis, CSV for data exchange, PDF for formal reports
  used_in_stages: []
  options:
  - name: HTML Report
    traits:
    - web-viewable
    - styled-tables
    - bookmarkable
    fit_for:
    - Web sharing, interactive navigation
    not_fit_for:
    - Print, Excel analysis
  - name: Excel Export
    traits:
    - analysis-ready
    - multi-sheet
    fit_for:
    - Financial analysis, Excel power users
    not_fit_for:
    - Web sharing, static reports
  - name: CSV Export
    traits:
    - universal
    - lightweight
    fit_for:
    - Data interchange, custom processing
    not_fit_for:
    - Formatted reports, multiple sheets
  - name: PDF Report
    traits:
    - print-ready
    - portable
    fit_for:
    - Formal reporting, regulatory submissions
    not_fit_for:
    - Interactive exploration
  default: HTML Report
  _source: worker_resource
- id: slot-005
  name: http_client
  description: Use httpx if async/await patterns are needed; requests is simpler for sync workflows
  used_in_stages: []
  options:
  - name: requests
    traits:
    - synchronous
    - simple-api
    fit_for:
    - Standard API calls, synchronous workflows
    not_fit_for:
    - High-concurrency, async workloads
  - name: httpx
    traits:
    - async-capable
    - modern
    fit_for:
    - Async workflows, modern Python async/await
    not_fit_for:
    - Simple sync workflows, legacy code
  default: requests
  _source: worker_resource
