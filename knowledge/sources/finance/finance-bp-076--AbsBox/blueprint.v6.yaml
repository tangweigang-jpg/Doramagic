- id: BD-092
  type: BA
  content: 'INTERACTION: [BD-003] → [BD-062] → [BD-057] → Cascade: Asset status mapping triggers 2-month
    delinquency lag, which feeds recovery assumptions with 12-month lag, creating 14-month loss recognition
    delay'
  rationale: BD-003 maps 'current'/'正常' to performing status, which feeds into BD-062 where delinquent
    loans with 2-month lag convert to default status. Once defaulted, BD-057 recovery assumptions with
    12-month lag apply. This creates a 14-month chain from when a loan first shows non-performing status
    to when actual loss is recognized. During this period, the loan may appear as performing in some reports
    while generating zero cash flows, creating misleading pool performance metrics and potential over-collateralization
    ratios that mask true credit risk exposure.
  evidence: BD-003,BD-062,BD-057
  stage: global
  alternative_considered: Shorter lag periods could improve transparency but would require servicer infrastructure
    changes
