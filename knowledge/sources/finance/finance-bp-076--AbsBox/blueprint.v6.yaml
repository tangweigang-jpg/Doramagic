# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-076
name: AbsBox
sop_version: '3.6'
source:
  projects:
  - AbsBox
  commit_hash: 879c75f324cfd7fdd28a6d8b4ccf7e076391e237
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Structured finance cashflow modeling and pricing for ABS/MBS deals
  description: Python wrapper around a structured finance cashflow engine that enables users to define
    ABS deal structures, set pool performance assumptions, run cashflow simulations, and parse results
    into DataFrames for analysis.
  prerequisites: Python syntax proficiency; familiarity with functional programming concepts (toolz/lenses)
    is helpful
  not_suitable_for: Real-time trading systems; non-cashflow based financial instruments; users requiring
    full transparency into closed-source engine internals
stages:
- id: deal_definition
  name: Deal Definition
  order: 1
  responsibility: Define ABS deal structures using dataclasses that represent assets, bonds, accounts,
    waterfall rules, and triggers in a domain-friendly way, enabling both Chinese and international market
    conventions
  interface:
    inputs:
    - Raw deal parameters (dates, assets, bonds, fees, waterfall, collection rules)
    outputs:
    - Generic or SPV dataclass instances with .json property for serialization
  required_methods:
  - name: Generic.__init__
    description: English-language deal container accepting dates, pool, accounts, bonds, fees, waterfall,
      triggers, and custom ledgers as named parameters
    evidence: absbox/local/generic.py:33(class Generic)
  - name: SPV.__init__
    description: Chinese-language deal container for China ABS market with localized field names
    evidence: absbox/local/china.py:31(class SPV)
  - name: mkDeal
    description: Factory function that constructs Generic deal from dictionary input, enabling programmatic
      deal creation
    evidence: absbox/deal.py:14(mkDeal)
  key_behaviors:
  - behavior: Entity-level isolation
    description: Generic and SPV are separate dataclass implementations sharing identical structure but
      different field naming conventions, preventing cross-contamination between Chinese and English deal
      definitions
    evidence: absbox/local/generic.py:32-50(class Generic), absbox/local/china.py:31-46(class SPV)
  - behavior: Status defaults by locale
    description: Generic.status defaults to 'Amortizing' while SPV.状态 defaults to '摊销', reflecting locale-appropriate
      defaults at the architectural level
    evidence: absbox/local/generic.py:46(status), absbox/local/china.py:44(状态)
  - behavior: Optional component defaults
    description: Named fields with None defaults for optional support components (liqFacility, rateSwap,
      currencySwap) to avoid null checks throughout the engine pipeline
    evidence: absbox/local/generic.py:42-44
  replaceable_points:
  - name: Deal Locale
    description: Language and field naming convention for deal definition
    options:
    - name: Generic (English)
      traits:
      - English field names
      - Amortizing status default
      - International market conventions
      fit_for:
      - Global ABS deals
      - Multi-tranche structures
      - US/European RMBS/CLO
      not_fit_for:
      - China ABS regulatory filings
    - name: SPV (Chinese)
      traits:
      - Chinese field names
      - 摊销 status default
      - China market conventions
      - 信贷ABS alias for legacy support
      fit_for:
      - China ABS market
      - Regulatory submissions
      - Domestic investor reporting
      not_fit_for:
      - International deal structures
    default: Generic (English)
  design_decisions:
  - Bilingual dataclasses (Generic/SPV) for China vs international markets — separate classes avoid conditional
    logic throughout codebase (absbox/local/generic.py:33, absbox/local/china.py:31)
  - Dataclass composition over inheritance for deal components — deal is composed of pools, bonds, accounts
    as tuples/dicts for flexibility (absbox/local/generic.py:33(__init__))
  - Named fields with defaults for optional components (liqFacility, rateSwap, currencySwap) defaulting
    to None — avoids null checks in engine (absbox/local/generic.py:42-44)
  acceptance_hints:
  - Generic.json produces valid tagged JSON matching engine schema
  - SPV.json and Generic.json produce structurally identical output with localized field names
  - Deal instantiation succeeds with minimal required fields (dates, pool, bonds)
  - Optional fields default to None and serialize correctly in JSON output
- id: component_transformation
  name: Component Transformation
  order: 2
  responsibility: Transform Python deal components into tagged JSON format accepted by the engine using
    Python match/case pattern matching, normalizing both Chinese and English inputs
  interface:
    inputs:
    - Raw deal components (dates, assets, bonds, fees, waterfall actions, triggers)
    outputs:
    - 'Tagged JSON dicts: {"tag": "TagName", "contents": ...} for engine consumption'
  required_methods:
  - name: mkDate
    description: Transform date configurations to GenericDates or CurrentDates tagged format
    evidence: absbox/local/component.py:97
  - name: mkAsset
    description: Transform assets (Mortgage, Loan, Lease, Installment, FixedAsset) to engine-tagged format
      based on asset type
    evidence: absbox/local/component.py:1636
  - name: mkBndComp
    description: Build bond component with rate type, balance structure, and payment characteristics
    evidence: absbox/local/component.py:770
  - name: mkAction
    description: Transform waterfall actions (transfer, pay, accrue) to engine format with ~60 pattern
      match cases
    evidence: absbox/local/component.py:1115
  - name: mkWaterfall
    description: Build waterfall structure with distribution day phases mapped from status keys
    evidence: absbox/local/component.py:1439
  key_behaviors:
  - behavior: Pattern matching dispatch
    description: Python match/case statements with ~60 cases per transformation function handle Chinese/English
      aliases and variant forms cleanly
    evidence: absbox/local/component.py:41(mkDatePattern), 269(mkDs), 1115(mkAction)
  - behavior: Tagged JSON envelope
    description: 'Every components wrapped in {"tag": name, "contents": value} format — engine dispatches
      on tag, contents carry typed data'
    evidence: absbox/local/interface.py:5(mkTag)
  - behavior: Formula memoization
    description: mkDs (formula/stats) decorated with @functools.lru_cache to avoid redundant pattern matching
      on repeated formula strings
    evidence: absbox/local/component.py:268(@functools.lru_cache)
  - behavior: Waterfall phase mapping
    description: 'Status keys mapped: 未违约/摊销→Amortizing, 循环→Revolving, 加速清偿→DealAccelerated, 违约→DealDefaulted'
    evidence: absbox/local/component.py:1441(mapping dict)
  replaceable_points:
  - name: Asset Type Builder
    description: How assets are transformed to tagged format based on asset classification
    options:
    - name: mkAsset
      traits:
      - Single asset type per pool
      - Type-based tag selection (MO/LO/IL/LS/FA/RE)
      fit_for:
      - Homogeneous pools
      - Standard RMBS/ABS structures
      not_fit_for:
      - Multi-asset pools
      - ResecDeal structures
    - name: mkAssetUnion
      traits:
      - Mixed asset types
      - Pool-specific tagging
      fit_for:
      - Mixed collateral pools
      - Multi-asset ABS deals
      not_fit_for:
      - Single asset type pools
    - name: mkRevolvingPool
      traits:
      - Dynamic asset composition
      - Buy/sell support
      fit_for:
      - Revolving credit facilities
      - Master trust structures
      not_fit_for:
      - Static amortizing pools
    default: mkAsset
  - name: Waterfall Phase Tag
    description: Distribution day phase mapping for waterfall execution
    options:
    - name: Amortizing
      traits:
      - Standard principal/interest collection
      - Regular bond payments
      fit_for:
      - Standard ABS amortization periods
      not_fit_for:
      - Revolving periods
      - Default/acceleration states
    - name: Revolving
      traits:
      - Asset reinvestment enabled
      - Buy/sell actions active
      fit_for:
      - Revolving credit facilities
      - Master trust reinvestment periods
      not_fit_for:
      - Amortizing periods
    - name: DealAccelerated
      traits:
      - Accelerated principal distribution
      - Senior bond priority
      fit_for:
      - Cleanup call scenarios
      - Early termination events
      not_fit_for:
      - Normal operations
    - name: DealDefaulted
      traits:
      - Recovery-focused distribution
      - Loss allocation
      fit_for:
      - Default state waterfall
      - Loss recovery scenarios
      not_fit_for:
      - Normal operations
    default: Amortizing
  design_decisions:
  - Python match/case pattern matching for component transformation — clean handling of Chinese/English
    aliases with ~60 match cases per function (absbox/local/component.py:41, 269, 1115)
  - 'Tagged JSON format: {"tag": name, "contents": value} for each components — engine dispatches on tag
    for uniform processing (absbox/local/interface.py:5)'
  - Bilingual field name mapping at input transformation layer — field constants defined for both locales,
    normalized to engine format internally (absbox/local/base.py:4-5)
  - '@functools.lru_cache on mkDs for formula memoization — cache avoids redundant pattern matching on
    repeated formula strings (absbox/local/component.py:268)'
  acceptance_hints:
  - 'Every transformation functions produce {"tag": name, "contents": value} structure'
  - mkWaterfall phase mapping correctly converts status keys to engine phases
  - Mixed asset pools trigger mkAssetUnion path (isMixedDeal check)
  - Formula strings are cached and return consistent results on repeated calls
- id: deal_execution
  name: Deal Execution (API)
  order: 3
  responsibility: Build execution requests and communicate with the remote engine server for running deals,
    pools, and scenarios, with version compatibility checking
  interface:
    inputs:
    - Deal json, pool assumptions, run assumptions, return fields specification
    outputs:
    - Raw engine response (JSON) or parsed DataFrames if read=True
  required_methods:
  - name: API.run
    description: Execute deal simulation with pool/run assumptions, returning parsed results or raw engine
      response
    evidence: absbox/client.py:135(class API)
  - name: API.connect
    description: Establish connection to engine server with version mismatch checking
    evidence: absbox/client.py:190
  key_behaviors:
  - behavior: Version compatibility enforcement
    description: Major version must match between client and engine on connect — forces users to upgrade
      client when engine changes significantly
    evidence: absbox/client.py:190(version[1] != engine_version[1])
  - behavior: Request type dispatch
    description: Single method handles Single/MultiScenarios/MultiStructs/RootFinder/FirstLoss by dispatching
      to different request builders via match/case
    evidence: absbox/client.py:215(case 'Single'|'MultiScenarios'...)
  - behavior: Multi-language response
    description: Server returns dates and fields in specified locale via lang parameter — Chinese users
      receive 日期 vs English users receive date
    evidence: 'absbox/client.py:144(lang: str = ''english'')'
  replaceable_points:
  - name: Run Mode
    description: Type of simulation or analysis to execute against the engine
    options:
    - name: Single
      traits:
      - Single deal simulation
      - Single assumption set
      - Standard cashflow projection
      fit_for:
      - Basic deal runs
      - Standard waterfall execution
      not_fit_for:
      - Sensitivity analysis
      - Multiple scenario comparison
    - name: MultiScenarios
      traits:
      - Multiple assumption sets
      - Scenario comparison
      - Parallel execution
      fit_for:
      - Sensitivity analysis
      - Stress testing
      - Deal comparison
      not_fit_for:
      - Single scenario runs
    - name: MultiStructs
      traits:
      - Multiple deal structures
      - Structural sensitivity
      fit_for:
      - Capital structure variations
      - Tranche sizing analysis
      not_fit_for:
      - Single structure analysis
    - name: RootFinder
      traits:
      - Binary search solver
      - Target condition optimization
      fit_for:
      - IRR targeting
      - Spread optimization
      - Break-even analysis
      not_fit_for:
      - Standard simulations
    - name: FirstLoss
      traits:
      - First loss analysis
      - Credit enhancement sizing
      fit_for:
      - Credit enhancement analysis
      - Equity tranche sizing
      not_fit_for:
      - Senior tranche analysis
    default: Single
  - name: Response Locale
    description: Language for dates and field names in engine response
    options:
    - name: english
      traits:
      - English field names
      - YYYY-MM-DD date format
      fit_for:
      - International markets
      - Standard pandas workflows
      not_fit_for:
      - China regulatory filings
    - name: chinese
      traits:
      - Chinese field names
      - Localized date labels
      fit_for:
      - China market reports
      - Domestic compliance
      not_fit_for:
      - International analysis
    default: english
  design_decisions:
  - Version mismatch check between client and engine on connect — major version must match, forcing users
    to upgrade client when engine changes significantly (absbox/client.py:190)
  - Request type dispatch via match/case in build_run_deal_req — single method handles each run types
    by dispatching to different builders (absbox/client.py:215)
  - Multi-language response support via lang parameter — server returns localized output enabling Chinese
    users to receive familiar field names (absbox/client.py:144)
  acceptance_hints:
  - API.connect succeeds with matching major version numbers
  - Version mismatch raises clear error message with upgrade guidance
  - Single run returns result dict with status, bonds, pool DataFrames
  - Multi-scenario run returns indexed results per scenario
- id: result_parsing
  name: Result Parsing
  order: 4
  responsibility: Parse engine JSON responses into pandas DataFrames with correct locale-specific column
    headers and MultiIndex structure for downstream analysis
  interface:
    inputs:
    - 'Raw engine response list: [deal_content, run_summary, pool_flows, pricing, pool_outstanding]'
    outputs:
    - 'Dict of DataFrames: bonds, pool, accounts, fees, triggers, ledgers, pricing, result'
  required_methods:
  - name: Generic.read
    description: Parse English-locale engine response to DataFrames with english_bondflow_fields and standard
      column headers
    evidence: absbox/local/generic.py:99
  - name: SPV.read
    description: Parse Chinese-locale engine response to DataFrames with china_bondflow_fields and localized
      headers
    evidence: absbox/local/china.py:91
  - name: readBondStmt
    description: Parse bond statements from Bond/BondGroup/MultiIntBond response structures
    evidence: absbox/local/generic.py:15
  key_behaviors:
  - behavior: Locale-specific column headers
    description: Fixed column headers per component type using matching header lists (english_bondflow_fields
      vs china_bondflow_fields) to construct DataFrames
    evidence: absbox/local/base.py:9-17(bondflow fields)
  - behavior: MultiPool and ResecDeal support
    description: Pool flow parsing handles MultiPool (multiple asset pools) and ResecDeal (underlying
      deals as pool source) tags with separate parsing paths
    evidence: absbox/local/generic.py:150(case 'MultiPool'|'ResecDeal')
  - behavior: Lens-based trigger reading
    description: Nested dict structure traversed and transformed using lens library Values().Values().modify
      pattern for trigger data
    evidence: absbox/local/generic.py:134(lens.Values().Values().modify)
  - behavior: Fee aggregation strategy
    description: 'Fee flow uses ''balance'': ''min'', ''payment'': ''sum'', ''due'': ''min'' aggregation
      — inconsistent aggregation strategy across fields'
    evidence: absbox/local/generic.py:126-127
  replaceable_points:
  - name: Response Locale
    description: Language of column headers in output DataFrames
    options:
    - name: english
      traits:
      - English column names
      - Date column labeled 'date'
      fit_for:
      - Standard analysis
      - International reporting
      not_fit_for:
      - China regulatory reports
    - name: chinese
      traits:
      - Chinese column names
      - Date column labeled '日期'
      fit_for:
      - China market reports
      - Local compliance
      not_fit_for:
      - International analysis
    default: english
  design_decisions:
  - Fixed column headers per component type (english_bondflow_fields vs china_bondflow_fields) — column
    names are locale-specific, parser uses matching header list (absbox/local/base.py:9-17)
  - Pool flow parsing supports MultiPool and ResecDeal tags — MultiPool has multiple asset pools, ResecDeal
    wraps underlying deals as pool source (absbox/local/generic.py:150)
  - Lens-based trigger reading with deep modification — nested dict structure requires lens to traverse
    and transform triggers (absbox/local/generic.py:134)
  acceptance_hints:
  - Generic.read produces DataFrames with english_*_fields column headers
  - SPV.read produces DataFrames with china_*_fields column headers
  - MultiPool deals produce separate pool DataFrames per sub-pool
  - Trigger data correctly extracted with proper nesting structure
- id: asset_types
  name: Asset Type System
  order: 5
  responsibility: Classify and handle different asset types (Mortgage, Loan, Lease, Installment, FixedAsset)
    with specific transformations and performance assumptions, enabling multi-asset deal support
  interface:
    inputs:
    - Asset definition tuple with type identifier and parameters
    outputs:
    - 'Tagged asset structure for engine: MO (Mortgage), LO (Loan), IL (Installment), LS (Lease), FA (FixedAsset),
      RE (Receivable)'
  required_methods:
  - name: mkAsset
    description: Match asset type and build appropriate tagged structure based on AssetType enum
    evidence: absbox/local/component.py:1636
  - name: mkAssumpType
    description: Build performance assumptions for assets with Pool/ByIndex/ByObligor/ByName strategies
    evidence: absbox/local/component.py:2061
  key_behaviors:
  - behavior: Asset type enum hierarchy
    description: 'Separate AssetType (broad category) and SubAssetType (variant) enums enable fine-grained
      classification: ARM vs fixed mortgage, personal vs corporate loan'
    evidence: absbox/local/base.py:200(AssetType), 210(SubAssetType)
  - behavior: Per-obligor assumption support
    description: ByObligor assumption strategy applies different default/prepay/recovery per borrower
      tag, supporting granular portfolio modeling
    evidence: absbox/local/component.py:2064(case 'Pool'|'ByIndex'|'ByObligor')
  - behavior: Lease-specific assumption structure
    description: Lease assets use gap/rent/endType assumption structure separate from loan prepayment
      assumptions — gap periods and step-up rent not applicable to loans
    evidence: absbox/local/component.py:1894(mkAssumpLeaseGap), 1904(mkAssumpLeaseRent)
  - behavior: Mixed deal asset factory dispatch
    description: isMixedDeal() forces mixedFlag=True when multiple pool keys exist, triggering mkAssetUnion
      instead of mkAsset for heterogeneous pools
    evidence: absbox/local/util.py:408(isMixedDeal), absbox/local/component.py:2132
  replaceable_points:
  - name: Asset Classification
    description: How to group assets for assumption assignment and reporting
    options:
    - name: Pool (same for all)
      traits:
      - Single assumption set for entire pool
      - Uniform defaults/prepay/recovery
      fit_for:
      - Simple structures
      - Bulk homogeneous assets
      not_fit_for:
      - Heterogeneous portfolios
      - Per-borrower analysis
    - name: ByIndex
      traits:
      - Index-based assumptions
      - Rate-sensitive modeling
      fit_for:
      - ARM pools
      - Index-linked assets
      not_fit_for:
      - Fixed-rate pools
    - name: ByObligor
      traits:
      - Per-borrower tags
      - Granular default/prepay modeling
      fit_for:
      - Corporate ABS
      - SME loans
      - Credit-sensitive portfolios
      not_fit_for:
      - Consumer pools without borrower IDs
    - name: ByName
      traits:
      - Pool name-based grouping
      - Sub-pool assumptions
      fit_for:
      - Multi-pool deals
      - Master trust structures
      not_fit_for:
      - Single pool deals
    default: Pool
  design_decisions:
  - Separate AssetType and SubAssetType enums for classification hierarchy — broad category vs variant
    capture (absbox/local/base.py:200, 210)
  - Performance assumptions support Pool-level, ByObligor, ByIndex strategies — ByObligor enables different
    defaults per borrower tag (absbox/local/component.py:2064)
  - Lease assets use gap/rent/endType assumption structure separate from loan prepay — gap periods and
    step-up rent not applicable to loans (absbox/local/component.py:1894, 1904)
  acceptance_hints:
  - Mortgage assets produce MO tagged structure with mortgage-specific fields
  - Lease assets produce LS tagged structure with gap/rent fields
  - Mixed asset pools trigger mkAssetUnion and handle multiple asset types
  - ByObligor assumptions correctly tag borrower groups in output
- id: validation
  name: Input Validation
  order: 6
  responsibility: Validate deal inputs using declarative schema library for type checking (dates, numbers,
    strings, lists) before transformation, ensuring data quality enters the pipeline
  interface:
    inputs:
    - Raw user inputs before transformation
    outputs:
    - Validated/coerced values or Schema validation error with descriptive message
  required_methods:
  - name: vDate
    description: Validate ISO date format (YYYY-MM-DD) using regex pattern with descriptive error
    evidence: absbox/validation.py:52(vDate)
  - name: isListOfDict
    description: Validate compound structures like asset lists and fee definitions
    evidence: absbox/validation.py:71(isListOfDict)
  key_behaviors:
  - behavior: Declarative validation schema
    description: Schema library used for type validation with regex patterns for dates, enabling declarative
      constraint definition separate from transformation logic
    evidence: absbox/validation.py:16(dateStr), 52(vDate)
  - behavior: ISO date format enforcement
    description: Regex ^\d{4}-\d{2}-\d{2}$ enforces ISO date format consistently across each date inputs
    evidence: absbox/validation.py:16(dateStr)
  replaceable_points: []
  design_decisions:
  - Schema library for declarative validation with regex for dates — enforces ISO date format consistently
    (absbox/validation.py:16, 52)
  - isListOfDict helper for compound validation — validates asset lists and fee definitions with reusable
    function (absbox/validation.py:71)
  acceptance_hints:
  - Invalid date formats raise Schema validation errors
  - Missing required fields detected before transformation
  - Type coercion applied for numeric fields where appropriate
- id: reporting
  name: Report Generation
  order: 7
  responsibility: Generate HTML reports from parsed run results with bond/pool/fees/account tables and
    waterfall summaries for visualization and sharing
  interface:
    inputs:
    - Parsed result dict from deal.read() with DataFrames
    outputs:
    - HTML markup string for visualization
  required_methods:
  - name: toHtml
    description: Main report generator building sections for bonds, pools, accounts, fees with OutputType
      styling
    evidence: absbox/report.py:68
  key_behaviors:
  - behavior: Rich console output
    description: Colored output via rich library helps users identify version mismatches and errors quickly
      in terminal
    evidence: absbox/client.py:175(console.print)
  - behavior: Output format variants
    description: OutputType enum supports Plain (table), Anchor (with bookmarks), and Tabbed (TBD) report
      formats
    evidence: absbox/report.py:10(OutputType)
  replaceable_points:
  - name: Report Format
    description: Output format for reports
    options:
    - name: HTML (toHtml)
      traits:
      - Web-viewable
      - Bookmark navigation
      - Styled tables
      fit_for:
      - Shareable reports
      - Dashboard embedding
      not_fit_for:
      - Terminal-only environments
    - name: DataFrame (default)
      traits:
      - Pandas-native
      - Exportable to Excel/CSV
      - Programmatic analysis
      fit_for:
      - Numerical analysis
      - Data export
      - Integration workflows
      not_fit_for:
      - Visual sharing
    default: DataFrame (default)
  design_decisions:
  - Rich console output for warnings and connection status — colored output helps users identify version
    mismatches and errors quickly (absbox/client.py:175)
  acceptance_hints:
  - toHtml produces valid HTML with each specified sections
  - Bond tables include each scheduled cashflows and balances
  - Pool tables include each collection and default events
- id: root_finding
  name: Root Finding
  order: 8
  responsibility: Find parameter values that satisfy target conditions using binary search, enabling spread
    optimization to achieve target IRR or identify break-even stress levels
  interface:
    inputs:
    - Deal, pool assumptions, tweak (parameter to vary), stop (target condition)
    outputs:
    - Parameter value satisfying stop condition within tolerance
  required_methods:
  - name: mkTweak
    description: 'Define what parameter to vary: stressDefault, stressPrepayment, maxSpread, splitBalance'
    evidence: absbox/rootFinder.py:5
  - name: mkStop
    description: 'Define stop condition: bondIncurLoss, bondMetTargetIrr, BalanceFormula'
    evidence: absbox/rootFinder.py:26
  key_behaviors:
  - behavior: Tweak/stop separation
    description: Binary search varies pool parameters (default stress, prepayment, spread) while checking
      bond condition for convergence
    evidence: absbox/rootFinder.py:5(mkTweak), 26(mkStop)
  replaceable_points:
  - name: Target Metric
    description: What condition to solve for
    options:
    - name: bondMetTargetIrr
      traits:
      - Target IRR as stop condition
      - Spread calculation
      fit_for:
      - Pricing analysis
      - IRR targeting
      - Spread optimization
      not_fit_for:
      - Loss analysis
      - Default scenarios
    - name: bondIncurLoss
      traits:
      - Loss occurrence threshold
      - Break-even analysis
      fit_for:
      - Credit stress testing
      - First loss analysis
      not_fit_for:
      - Senior tranche analysis
      - IRR targeting
    - name: BalanceFormula
      traits:
      - Custom balance condition
      - Flexible target definition
      fit_for:
      - Custom scenarios
      - Advanced analytics
      not_fit_for:
      - Standard IRR/spread analysis
    default: bondMetTargetIrr
  design_decisions:
  - Binary search with tweak/stop separation for root finding — tweak varies pool parameters, stop checks
    bond condition (absbox/rootFinder.py:5, 26)
  acceptance_hints:
  - mkTweak correctly identifies parameter to vary
  - mkStop correctly identifies convergence condition
  - Binary search converges within tolerance for monotonic conditions
data_flow:
- from_stage: deal_definition
  to_stage: component_transformation
  data: Generic/SPV dataclass → .json property triggers mkTag chains → tagged JSON structures
- from_stage: deal_definition
  to_stage: deal_execution
  data: deal.read method reference attached for automatic parsing after run completion
- from_stage: component_transformation
  to_stage: deal_execution
  data: Tagged JSON deal + mkAssumpType(pool assumptions) + mkNonPerfAssumps(run assumptions)
- from_stage: deal_execution
  to_stage: result_parsing
  data: 'Engine response list: [deal_content, run_summary, pool_flows, pricing_result, pool_outstanding]'
- from_stage: result_parsing
  to_stage: reporting
  data: 'Dict of DataFrames: bonds, pool, accounts, fees, triggers, ledgers, pricing, result[''status/logs/waterfall'']'
- from_stage: validation
  to_stage: deal_definition
  data: Validated/coerced user inputs before deal instantiation
- from_stage: asset_types
  to_stage: component_transformation
  data: Asset type classification drives mkAsset/mkAssetUnion selection and assumption strategy
- from_stage: root_finding
  to_stage: deal_execution
  data: Root finding triggers multiple deal executions with varying parameters until stop condition met
