business_decisions:
- id: BD-001
  type: B/BA
  content: Day Count Convention defaults to DC_ACT_365F (ACT/365 Fixed) for fixed rate bonds when not
    explicitly specified
  rationale: Default ACT/365 Fixed convention ensures consistent interest calculation across fixed rate
    bonds without requiring explicit specification. This convention treats each month as actual days divided
    by 365, providing predictable interest accrual and simplifying deal setup for standard fixed-rate
    bond structures.
  evidence: absbox/local/component.py:699(mkBondRate)
  stage: Interest Calculation
  alternative_considered: Could require explicit day count specification for each bonds, but adds setup
    complexity
- id: BD-002
  type: B/BA
  content: Amortization schedule type defaults to 'Level' (Equal Monthly Payment) when not specified
  rationale: Level amortization provides predictable equal monthly payments combining principal and interest,
    commonly used in standard mortgage and consumer loan ABS structures. Defaulting to Level simplifies
    asset pool setup when amortization type is omitted, ensuring consistent cash flow scheduling from
    the start of the deal.
  evidence: absbox/local/component.py:1497(mkAmortPlan)
  stage: asset_types
  alternative_considered: Other amortization types like bullet, interest-only, or custom schedules could
    be required
- id: BD-003
  type: B/BA
  content: Asset status 'current' or '正常' maps to 'Current' indicating performing loan
  rationale: Bilingual status mapping ensures both English and Chinese asset data can be processed correctly.
    'Current' status is critical for distinguishing performing loans that generate regular cash flows
    from delinquent or defaulted assets, directly impacting waterfall distributions and trigger evaluations.
  evidence: absbox/local/component.py:1532(mkAssetStatus)
  stage: asset_types
  alternative_considered: Could require standardized English-only status codes in each data feeds
- id: BD-004
  type: B/BA
  content: Bond type 'Sequential' (过手摊还) means bonds are paid sequentially by seniority with no pro-rata
    sharing
  rationale: Sequential pay structure ensures senior bonds receive full payment before junior bonds receive
    any distributions, creating clear waterfall priority. This is fundamental to ABS credit enhancement
    where junior tranches absorb losses first, protecting senior bondholders from default risk.
  evidence: absbox/local/component.py:670(mkBondType)
  stage: Bond Waterfall Priority
  alternative_considered: Pro-rata sharing could be used but provides less credit enhancement protection
- id: BD-005
  type: B
  content: Equity bonds (权益) receive residual cash flows after senior bond payments
  rationale: Equity holders receive last-priority distributions, capturing each excess cash after senior
    and mezzanine bonds are paid. This residual claim structure means equity absorbs first losses and
    receives highest returns in successful deals, aligning sponsor incentives with deal performance.
  evidence: absbox/local/component.py:670(mkBondType)
  stage: Bond Waterfall Priority
  alternative_considered: Equity could receive fixed distributions but loses upside participation
- id: BD-006
  type: B/BA
  content: Default trigger condition checks cumulative pool default rate against 5% threshold
  rationale: The 5% cumulative default rate threshold is a standard credit enhancement trigger protecting
    senior bondholders. When breached, the trigger activates accelerated payments or other protective
    measures, ensuring losses don't exceed designed credit enhancement levels before investors are impacted.
  evidence: absbox/examples/triggerCase.py:3-7(defautlRateTrigger)
  stage: Credit Enhancement Trigger
  alternative_considered: Other thresholds could be used but 5% is industry standard for most ABS structures
  _evidence_issues:
  - 'FN_NOT_FOUND: defautlRateTrigger in absbox/examples/triggerCase.py'
- id: BD-007
  type: B
  content: Trigger effects can change deal status to 'Accelerated' or execute waterfall actions
  rationale: Trigger activation fundamentally changes deal operations by either accelerating the waterfall
    or executing predefined protective actions. This automated response ensures consistent investor protection
    without manual intervention, critical for maintaining deal integrity during stress scenarios.
  evidence: absbox/examples/triggerCase.py:5-6(module)
  stage: Credit Enhancement Trigger
  alternative_considered: Manual intervention could be allowed but introduces operational risk and delays
  _evidence_issues:
  - 'FN_NOT_FOUND: module in absbox/examples/triggerCase.py'
- id: BD-008
  type: B/BA
  content: 'Pool collection splits by type: CollectedInterest, CollectedPrincipal, CollectedPrepayment,
    CollectedRecoveries'
  rationale: Separating collection types enables precise waterfall allocation where different cash sources
    are prioritized for different purposes. Interest typically pays fees and senior interest first, while
    principal and prepayment proceeds fund amortization, and recoveries cover losses. This segregation
    ensures regulatory compliance and proper cash flow sequencing.
  evidence: absbox/examples/baseCase.py:37-40(module)
  stage: Cash Flow Collection
  alternative_considered: Commingling each collections would simplify but reduce waterfall flexibility
  _evidence_issues:
  - 'FN_NOT_FOUND: module in absbox/examples/baseCase.py'
- id: BD-009
  type: B/BA
  content: Interest accrues at 8% (currentRate) while original rate was 4.5% - rate differential funds
    equity
  rationale: The excess spread mechanism where current accrual rate exceeds original rate creates equity
    cushion for investors. The 3.5% differential generates additional cash that builds reserve accounts
    or absorbs losses, providing credit enhancement without requiring external capital support.
  evidence: absbox/examples/baseCase.py:8-13(module)
  stage: Interest Rate Structure
  alternative_considered: External credit enhancement could replace excess spread but adds cost and complexity
  _evidence_issues:
  - 'FN_NOT_FOUND: module in absbox/examples/baseCase.py'
- id: BD-010
  type: B/DK
  content: Floating rate bonds reference SOFR3M with quarterly reset and 1% spread
  rationale: SOFR3M quarterly reset with 1% spread links bond payments to short-term money market rates,
    providing investors with rate exposure that moves with monetary policy. The spread compensates for
    credit risk and deal structure costs, ensuring competitive investor returns.
  evidence: absbox/examples/mixAssetType.py:20-22(module)
  stage: Interest Rate Structure
  alternative_considered: Fixed rate bonds could be used but lose rate linkage protection
  _evidence_issues:
  - 'FN_NOT_FOUND: module in absbox/examples/mixAssetType.py'
- id: BD-011
  type: B/BA
  content: Fee calculation uses annual percentage fee (annualPctFee) based on pool balance
  rationale: Annual percentage fee structure ties servicing costs directly to outstanding pool balance,
    ensuring fees scale with deal size throughout the lifecycle. This proportional approach provides fair
    compensation while maintaining consistent fee-to-asset ratios as the pool amortizes.
  evidence: absbox/examples/baseCase.py:122(module)
  stage: Fee Structure
  alternative_considered: Flat fees could be simpler but would overcharge early in deal when balance is
    high
  _evidence_issues:
  - 'FN_NOT_FOUND: module in absbox/examples/baseCase.py'
