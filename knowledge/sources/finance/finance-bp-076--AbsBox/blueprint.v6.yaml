- id: BD-091
  type: BA/M
  content: 'INTERACTION: [BD-006] × [BD-007] → Default trigger at 5% activates Accelerated status, multiplying
    default impact on waterfall distribution'
  rationale: The 5% cumulative default threshold (BD-006) and trigger effects that transition deal to
    Accelerated status (BD-007) create amplified impact when combined. When pool defaults breach 5%, the
    trigger activates Accelerated waterfall which accelerates principal payments and changes cash flow
    priority, potentially depleting subordinate tranches faster than expected. This amplification effect
    means a 5.1% default scenario produces materially different cash flows than a 4.9% scenario, creating
    non-linear risk exposure.
  evidence: BD-006,BD-007
  stage: global
