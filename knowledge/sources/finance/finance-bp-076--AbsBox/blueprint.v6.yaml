- id: BD-095
  type: BA
  content: 'INTERACTION: [BD-072] × [BD-075] → Hidden Dependency: MultiPool deal type homogeneity enforced
    by automatic mixedFlag routing, but BD-072 allows first-asset inference while BD-075 requires explicit
    multi-pool detection'
  rationale: BD-072 establishes that deal type is inferred from the first asset only, enforcing homogeneous
    pool classification. BD-075 implements automatic mixedFlag=True routing when multiple pool keys exist,
    triggering mkAssetUnion. The hidden dependency is that BD-072's first-asset inference silently overrides
    any pool diversity if assets are added sequentially. If a deal initially has a residential mortgage
    as pool 1, then consumer loans are added as pool 2, the entire deal is classified as mortgage ABS
    based on BD-072, bypassing BD-075's multi-pool detection. This silent type coercion affects downstream
    regulatory treatment and waterfall assumptions without any explicit warning.
  evidence: BD-072,BD-075
  stage: global
  alternative_considered: Per-pool type inference was rejected but could enable heterogeneous multi-pool
    deals with type-specific waterfall rules
