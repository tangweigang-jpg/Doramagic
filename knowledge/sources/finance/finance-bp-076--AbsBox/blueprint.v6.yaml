- id: BD-094
  type: B/BA
  content: 'INTERACTION: [BD-001] × [BD-051] × [BD-077] → AMPLIFICATION: Three day count convention defaults
    exist (ACT/365F for fixed, implicit ACT_ACT generic, floater ACT/365F) creating inconsistent interest
    calculation precision'
  rationale: BD-001 establishes DC_ACT_365F as default for fixed rate bonds, BD-051 confirms this same
    default, while BD-077 establishes implicit DC_ACT_ACT as generic default. Additionally, BD-065 confirms
    ACT_365F for floaters. This creates three different implicit/explicit defaults across the codebase.
    The amplification occurs because any calculation that mixes fixed and floating instruments, or uses
    generic components alongside specific bond definitions, will have subtle day count differences. Over
    long-dated deals, these small differences compound into materially different interest amounts, potentially
    causing waterfall shortfalls or overpayments that are difficult to trace to their root cause.
  evidence: BD-001,BD-051,BD-077
  stage: global
  alternative_considered: Single universal default was considered but rejected to maintain compatibility
    with different market conventions
