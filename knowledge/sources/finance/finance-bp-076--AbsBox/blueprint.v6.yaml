- id: BD-098
  type: B/BA
  content: 'INTERACTION: [BD-064] × [BD-056] → AMPLIFICATION: Three-state pool balances (Current/Delinquent/Defaulted)
    with separate liquidation discount factors multiply valuation complexity across asset states'
  rationale: BD-064 implements three-state pool balance tracking with Current/Delinquent/Defaulted states.
    BD-056 defines liquidation discount using BalanceFactor with separate CurrentFactor and DefaultFactor.
    The amplification occurs because each of the three pool states uses potentially different liquidation
    discount factors, meaning a liquidation event requires calculating recovery proceeds differently for
    each state. During stress scenarios, assets transitioning from Current to Delinquent to Defaulted
    will have different recovery values applied at different times, creating complex non-linear loss patterns.
    A pool with 10% delinquent and 5% defaulted assets will have materially different liquidation proceeds
    than a pool with identical total balance but different state distributions, even if overall asset
    quality appears similar.
  evidence: BD-064,BD-056
  stage: global
  alternative_considered: Single blended discount rate would simplify calculation but lose precision for
    different asset states
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-099
  type: B/BA
  content: 'INTERACTION: [BD-044] × [BD-063] → RISK CASCADE: First loss analysis uses stress pool default
    range to find maximum bond loss, but range bounds determine whether break-even points are discoverable'
  rationale: 'BD-044 implements first loss calculation to find the maximum bond loss before equity loss.
    BD-063 defines the stress pool default range as 1.0-500%. The cascade emerges when first loss analysis
    cannot converge: if actual required defaults exceed 500% of pool balance (which can happen with very
    thin subordination), the root finder will fail to find a solution within bounds. This creates a silent
    failure mode where deals with extreme subordination appear to have infinite first loss protection
    when in reality the analysis simply couldn''t find a solution. Investors relying on first loss analysis
    for credit assessment may make incorrect decisions based on truncated results.'
  evidence: BD-044,BD-063
  stage: global
  alternative_considered: Wider stress range or explicit non-convergence reporting could improve risk
    transparency
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-100
  type: BA
  content: 'INTERACTION: [BD-008] × [BD-078] → AMPLIFICATION: Collection split types and mandatory priority
    ordering create enforced waterfall segregation that amplifies impact of any single collection type
    shortfall'
  rationale: 'BD-008 establishes collection types: CollectedInterest, CollectedPrincipal, CollectedPrepayment,
    CollectedRecoveries. BD-078 mandates strict priority ordering of CollectedInterest before CollectedPrincipal
    before CollectedPrepayment before CollectedRecoveries. The amplification occurs because this segregation
    means a shortfall in any single collection type cascades immediately to that priority level. If CollectedInterest
    is insufficient, it triggers fee/interest waterfall actions (BD-073) before any principal can be distributed.
    A prepayment shortfall doesn''t just reduce principal return—it potentially triggers early amortization
    or reserve draws because the segregated waterfall treats each collection type as a separate funding
    source. This creates non-linear cash flow behavior where small collection variations in early periods
    compound into major structural changes.'
  evidence: BD-008,BD-078
  stage: global
  alternative_considered: Commingled collections would reduce amplification but violate ABS waterfall
    priority requirements
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
