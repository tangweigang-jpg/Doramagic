replaceable_slots:
- id: slot-001
  name: equity_price_data_bundle
  description: Use quandl_wiki for standard US equities; csvdir_custom for international or proprietary
    data; yfinance for quick exploration
  used_in_stages: []
  options:
  - name: quandl_wiki
    traits:
    - daily_ohlcv
    - dividends
    - splits
    - us_equities
    - free_api_key
    fit_for:
    - Standard US equity backtesting with fundamental data
    not_fit_for:
    - Non-US equities, minute data, real-time data
  - name: quantopian_quandl
    traits:
    - daily_ohlcv
    - pre_built_archive
    - historical
    fit_for:
    - Quick setup with historical Quantopian data
    not_fit_for:
    - Current data, custom data sources
  - name: csvdir_custom
    traits:
    - daily_or_minute
    - custom_symbols
    - user_provided
    fit_for:
    - Custom data, proprietary data sources, international equities
    not_fit_for:
    - Data that requires API fetching
  - name: yfinance
    traits:
    - daily_ohlcv
    - international
    - free
    - no_guarantee
    fit_for:
    - Current market data for popular tickers
    not_fit_for:
    - Historical dividend/split adjustment, production systems
  default: quandl_wiki
  _source: worker_resource
- id: slot-002
  name: fx_rate_storage
  description: Use HDF5 for production; in-memory for testing with known FX data; exploding for algorithms
    that should not use FX
  used_in_stages: []
  options:
  - name: hdf5_fx_rates
    traits:
    - persistent
    - chunked
    - compressed
    fit_for:
    - Production FX workflows with large currency datasets
    not_fit_for:
    - Small datasets, testing where speed is critical
  - name: in_memory_fx_rates
    traits:
    - fast
    - non_persistent
    - testing
    fit_for:
    - Testing, small FX datasets, quick prototyping
    not_fit_for:
    - Large datasets, production workloads
  - name: exploding_fx_rates
    traits:
    - error_on_use
    - testing
    fit_for:
    - Testing scenarios where FX is not expected
    not_fit_for:
    - Any actual FX conversion needs
  default: hdf5_fx_rates
  _source: worker_resource
- id: slot-003
  name: price_bar_storage
  description: Use bcolz for standard zipline workflows; HDF5 for interoperability; in-memory for testing
