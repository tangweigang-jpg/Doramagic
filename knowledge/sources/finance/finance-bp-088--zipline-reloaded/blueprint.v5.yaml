- id: BD-027
  type: B/BA
  content: NoTrade commission model exists for testing scenarios
  rationale: The NoTrade commission model provides zero-cost transactions for testing scenarios where
    commission effects should be isolated or ignored. This default establishes a boundary that enables
    clean testing of non-commission strategy components, though production use requires explicit commission
    configuration to reflect realistic costs.
