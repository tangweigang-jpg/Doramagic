    traits:
    - hdf5
    - persistent
    - daily
    fit_for:
    - Alternative to bcolz, standard HDF5 compatibility
    not_fit_for:
    - Minute bars, performance-critical paths
  - name: in_memory_daily_bars
    traits:
    - fast
    - non_persistent
    - testing
    fit_for:
    - Testing, small datasets
    not_fit_for:
