- id: BD-018
  type: B/BA
  content: RSI default window length is 15 days
  rationale: The 15-day RSI window provides a balanced oscillator period that captures medium-term momentum
    without excessive noise or lag. This default establishes a boundary for overbought/oversold detection
    that aligns with common trading literature while avoiding the extremes of very short (volatile) or
    very long (laggy) windows.
