data_flow:
- from_stage: data_ingestion
  to_stage: asset_management
  data: Asset metadata written to SQLite asset DB via AssetDBWriter; symbols, SIDs, lifetimes stored for
    lookup
- from_stage: data_ingestion
  to_stage: data_access
  data: bcolz/HDF5 daily/minute bars, SQLite adjustments written to disk for later retrieval
- from_stage: asset_management
  to_stage: data_access
  data: AssetFinder instance provided for SID resolution during bar queries; validates asset lifetimes
- from_stage: asset_management
  to_stage: pipeline_computation
  data: AssetFinder for lifetimes; BoundColumns (USEquityPricing) registered for pricing data access
- from_stage: pipeline_computation
  to_stage: trading_simulation
  data: Pipeline outputs (factors, filters, screens) available via TradingAlgorithm.pipeline_output()
- from_stage: data_access
  to_stage: trading_simulation
  data: DataPortal provides get_spot_value and get_history_window to AlgorithmSimulator for bar emission
- from_stage: trading_simulation
  to_stage: order_management
  data: Order objects created via blotter.order() call; execution styles passed with order details
- from_stage: order_management
  to_stage: portfolio_accounting
  data: Transaction objects with prices, commissions, and asset information for position updates
- from_stage: data_access
  to_stage: portfolio_accounting
  data: Dividend data for accrual calculations; price updates for position valuation via Ledger.update_positions
- from_stage: fx_conversion
  to_stage: data_access
  data: FXRateReader injected into DataPortal for currency conversion during spot value queries
- from_stage: portfolio_accounting
  to_stage: trading_simulation
  data: Performance messages (daily/minute perf dicts) yielded by AlgorithmSimulator for results aggregation
global_contracts:
- contract: Every portfolio/account metrics use MutableView for external immutability
  evidence: src/zipline/protocol.py:22(MutableView)
- contract: Pipeline term caching via memoized __new__ ensures term identity for graph operations
  evidence: src/zipline/pipeline/term.py:103(__new__)
- contract: Every asset lookups normalized to integer SIDs; symbol strings are lookup keys only
  evidence: src/zipline/assets/assets.py:454(retrieve_asset)
- contract: Bar readers must implement last_available_dt for data availability checks
  evidence: src/zipline/data/bar_reader.py:75(last_available_dt)
- contract: Pipeline dates are always trading sessions; non-session dates rejected
  evidence: src/zipline/pipeline/engine.py:459
- contract: 'Order amounts: positive=buy, negative=sell; enforced in SimulationBlotter.order()'
  evidence: src/zipline/finance/blotter/simulation_blotter.py:143(is_buy)
- contract: Corporate adjustments applied retroactively to historical prices; adjusted price ≤ raw price
    for splits
  evidence: src/zipline/data/adjustments.py:458(calc_dividend_ratios)
- contract: Portfolio value = cash + Σ(position_value × price_multiplier)
  evidence: src/zipline/protocol.py:163(current_portfolio_weights)
- contract: Equity price_multiplier=1, Future multiplier from contract specification
  evidence: src/zipline/assets/assets.py:1253(_make_sids)
- contract: Continuous futures use adjustment='mul' (default) for ratio-based roll transitions
  evidence: src/zipline/assets/assets.py:1219(create_continuous_future)
- contract: 'Pipeline dtype system enforces strict type contracts: Factor→float64, Filter→bool, Classifier→categorical/int64'
  evidence: src/zipline/pipeline/factors/factor.py:49(ALLOWED_DTYPES)
- contract: 'Order lifecycle has strict state transitions: CREATED→OPEN→FILLED/CANCELLED'
  evidence: src/zipline/finance/order.py:39(status)
- contract: 'Ledger cash flow uses exposure-based calculation: cash_flow = exposure * direction * multiplier'
  evidence: src/zipline/finance/ledger.py:281-283(process_transaction)
- contract: Position tracker uses position.amount (positive=long, negative=short) consistently; no separate
    is_short flag
  evidence: src/zipline/finance/position.py:47(__init__)
- contract: SlidingWindow amortizes adjustment computation across monotonically increasing end_dt requests
  evidence: src/zipline/data/history_loader.py:245(get)
business_decisions:
- id: BD-001
  type: B/BA
  content: Default capital base is 10 million (10e6) for backtests
  rationale: Capital base of 10 million (10e6) establishes a sufficient starting equity for backtests
    to allow meaningful position sizing and margin utilization while avoiding unrealistic fractional positions.
    This default enables users to run representative simulations immediately without manual configuration
    while maintaining boundary conditions that prevent overflow in standard financial calculations.
  evidence: src/zipline/__main__.py:154(capital_base=10e6)
  stage: order_management
  alternative_considered: Smaller defaults like 100k were considered but deemed too small for meaningful
    leverage calculations
  _evidence_issues:
  - 'INVALID_IDENTIFIER: capital_base=10e6 in src/zipline/__main__.py'
- id: BD-002
  type: B/BA
  content: Default data frequency is daily for backtests
  rationale: Daily frequency serves as the default data granularity because it reduces computational overhead
    and data storage requirements while providing sufficient resolution for most algorithmic trading strategies.
    This boundary ensures backtests complete in reasonable timeframes while accommodating both intraday
    and daily strategies through explicit frequency specification.
  evidence: src/zipline/__main__.py:147(default='daily')
  stage: order_management
  alternative_considered: Minute data as default was rejected due to higher storage costs and slower backtest
    speeds
  _evidence_issues:
  - 'INVALID_IDENTIFIER: default=''daily'' in src/zipline/__main__.py'
- id: BD-003
  type: B/BA
  content: Default bundle is 'quandl' for data ingestion
  rationale: The 'quandl' bundle serves as the default data source because it provides freely accessible
    end-of-day US equity data that was historically the primary data source for zipline users. This default
    establishes a working boundary for immediate data ingestion without requiring users to configure custom
    bundle paths, while still allowing substitution for alternative data sources.
  evidence: src/zipline/__main__.py:119(DEFAULT_BUNDLE='quandl')
  stage: data_ingestion
  alternative_considered: No default bundle was rejected as it would break beginner workflows requiring
    explicit configuration
  _evidence_issues:
  - 'INVALID_IDENTIFIER: DEFAULT_BUNDLE=''quandl'' in src/zipline/__main__.py'
- id: BD-004
  type: B/BA
  content: Default trading calendar is XNYS (NYSE) for backtests
  rationale: The NYSE (XNYS) calendar is the default trading calendar because it represents the most liquid
    and widely-traded US equity market, providing comprehensive market coverage. This default establishes
    market-hours boundaries that align with standard US equity trading while supporting substitution for
    futures calendars or international markets when needed.
  evidence: src/zipline/__main__.py:224(default='XNYS')
  stage: order_management
  alternative_considered: 24/7 continuous trading was rejected as it would misrepresent actual market
    microstructure
  _evidence_issues:
  - 'INVALID_IDENTIFIER: default=''XNYS'' in src/zipline/__main__.py'
- id: BD-005
  type: B/BA
  content: Default commission model is PerShare for equities at $0.001/share
  rationale: PerShare commission at $0.001 per share approximates typical US equity broker fees while
    providing realistic transaction cost modeling. This default establishes a boundary for commission
    calculations that affects portfolio optimization and strategy profitability estimates, ensuring backtests
    reflect realistic trading costs for standard brokerage arrangements.
  evidence: src/zipline/finance/commission.py:32(commissionmodel)
  stage: commission
  alternative_considered: Zero commission was rejected as it would create unrealistic backtest results
  _evidence_issues:
  - 'FN_NOT_FOUND: commissionmodel in src/zipline/finance/commission.py'
- id: BD-006
  type: B/BA
  content: Default slippage model is FixedBasisPointsSlippage for equities (10 bps)
  rationale: FixedBasisPointsSlippage at 10 basis points provides a simple, predictable market impact
    model for equity trading that balances realism with computational efficiency. This default establishes
    a boundary for slippage estimation that moderately affects execution price assumptions, particularly
    for larger orders where market impact becomes significant.
  evidence: src/zipline/finance/blotter/simulation_blotter.py:64(module)
  stage: slippage
  alternative_considered: Zero slippage was rejected; VolumeShareSlippage was considered but deemed more
    complex for defaults
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/zipline/finance/blotter/simulation_blotter.py'
- id: BD-007
  type: B/BA
  content: Default slippage model for futures is VolatilityVolumeShare
  rationale: VolatilityVolumeShare slippage for futures accounts for the higher volatility and contract-specific
    volume characteristics of futures markets. This default establishes a boundary that differentiates
    futures execution modeling from equities, recognizing that futures markets exhibit different liquidity
    profiles and price impact dynamics than equity markets.
  evidence: src/zipline/finance/blotter/simulation_blotter.py:65-68(module)
  stage: slippage
  alternative_considered: Fixed slippage was rejected as it doesn't capture futures-specific volatility
    scaling
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/zipline/finance/blotter/simulation_blotter.py'
- id: BD-008
  type: B/BA
  content: Max shares limit is 100 billion (1e11) per order
  rationale: The 100 billion share limit establishes a practical boundary that prevents numeric overflow
    in position tracking while accommodating extremely large institutional orders. This default ensures
    the system handles edge cases without crashing while clearly signaling that orders exceeding this
    threshold should not be submitted, protecting against data entry errors.
  evidence: src/zipline/finance/blotter/simulation_blotter.py:61(module)
  stage: order_management
  alternative_considered: Lower limits were considered but might restrict legitimate institutional order
    sizes
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/zipline/finance/blotter/simulation_blotter.py'
- id: BD-009
  type: B/BA
  content: Default volume limit for equity slippage is 2.5% of bar volume
  rationale: The 2.5% volume limit for equity slippage establishes a boundary that prevents order sizes
    from exceeding realistic market participation rates. This default recognizes that aggressive trading
    strategies should not assume they can execute more than 2.5% of average bar volume without significant
    market impact, affecting execution price realism.
  evidence: src/zipline/finance/slippage.py:118(volume_for_bar)
  stage: slippage
  alternative_considered: Higher limits like 5% were considered but deemed too aggressive for realistic
    market impact
- id: BD-010
  type: B/BA
  content: Default price impact coefficient is 0.1 for VolumeShareSlippage
  rationale: The 0.1 price impact coefficient provides a moderate market impact curve that scales order
    execution prices based on order size relative to volume. This default establishes a boundary for how
    aggressively orders affect their own execution prices, ensuring backtests reflect realistic execution
    degradation for large institutional orders.
  evidence: src/zipline/finance/slippage.py:270(price_impact=0.1)
  stage: slippage
  alternative_considered: Higher coefficients like 0.2 were rejected as too punitive; lower values underestimate
    market impact
  _evidence_issues:
  - 'INVALID_IDENTIFIER: price_impact=0.1 in src/zipline/finance/slippage.py'
- id: BD-011
  type: B/BA
  content: Default future volume limit is 5% of bar volume
  rationale: The 5% volume limit for futures slippage acknowledges higher market participation rates in
    futures markets compared to equities. This default establishes a boundary that allows larger relative
    order sizes in futures while still preventing unrealistic execution assumptions, reflecting the deeper
    liquidity typical of futures contracts.
  evidence: src/zipline/finance/slippage.py:41(DEFAULT_FUTURE_VOLUME_SLIPPAGE_BAR_LIMIT=0.05)
  stage: slippage
  alternative_considered: Equal to equity limit was rejected as futures markets have different liquidity
    structures
  _evidence_issues:
  - 'INVALID_IDENTIFIER: DEFAULT_FUTURE_VOLUME_SLIPPAGE_BAR_LIMIT=0.05 in src/zipline/finance/slippage.py'
- id: BD-012
  type: B/BA
  content: PerShare commission uses minimum trade cost of $1.00 in examples
  rationale: The $1.00 minimum trade cost ensures that small orders still incur realistic broker fees
    that exceed the percentage-based commission. This default establishes a floor boundary preventing
    unrealistic backtest results from tiny orders where percentage commissions would produce negligible
    costs, reflecting real-world minimum commission practices.
  evidence: src/zipline/examples/buyapple.py:30(cost=0.0075, min_trade_cost=1.0)
