    - columnar
    - compressed
    - persistent
    - daily
    fit_for:
    - Daily bar storage, efficient compression
    not_fit_for:
    - Minute bars, random access patterns
  - name: bcolz_minute_bars
    traits:
    - columnar
    - compressed
    - persistent
    - minute
    fit_for:
    - Minute bar storage, high-frequency backtesting
    not_fit_for:
    - Daily bars, simple use cases
