  type: B/BA
  content: Directory-based CSV ingestion with configurable directory path and flexible timeframe support
    for custom data bundles
  rationale: Enables user-defined data sources beyond official bundles; directory flexibility supports
    diverse data formats. Breaks when directory permissions are restrictive or when CSV files have inconsistent
    schemas.
  evidence: src/zipline/data/bundles/csvdir.py:22(csvdir_equities)
  stage: data_ingestion
  alternative_considered: Schema registry approach would enforce consistency but reduce flexibility
- id: BD-GAP-006
  type: T/BA
  content: AdjustedArray stores adjustments separately from baseline data rather than mutating raw prices
  rationale: Separation preserves data immutability and enables multiple adjustment views; O(1) as_int_array
    conversion reflects efficient internal representation. Breaks when memory-constrained since adjustments
    can exceed raw data size for highly volatile assets.
  evidence: src/zipline/lib/adjusted_array.py:189(AdjustedArray.__init__)
  stage: data_ingestion
  alternative_considered: In-place adjustment would save memory but lose audit trail and multi-view capability
- id: BD-GAP-007
  type: T/BA
  content: Window-based iteration over AdjustedArray with configurable perspective offsets, supporting
    multiple analytical views without data duplication
  rationale: Finance calculations need lookback windows at different points; offset parameters enable
    this without materializing copies. Breaks when window_length exceeds available history or when offsets
    create gaps in coverage.
  evidence: src/zipline/lib/adjusted_array.py:259(traverse)
  stage: data_ingestion
  alternative_considered: Materialized windows would be simpler but multiply memory usage
- id: BD-GAP-008
  type: T/BA
  content: Pipeline execution hooks use context managers for instrumentation at each computation stage,
    enabling composable monitoring
  rationale: Context managers ensure proper setup/teardown of instrumentation; composable design via delegation
    allows multiple observers. Breaks when hook implementations raise exceptions (no error handling visible)
    or when hooks have side effects that affect computation.
  evidence: src/zipline/pipeline/hooks/iface.py:39(running_pipeline)
  stage: order_management
  alternative_considered: Callback pattern would be simpler but lose context manager resource guarantees
- id: BD-GAP-009
  type: BA
  content: Progress hooks integrate with IPython/Jupyter for widget-based progress display, with testing
    support for non-interactive environments
  rationale: Interactive environments benefit from visual progress; testing publisher enables CI/CD without
    display dependencies. Breaks in terminal-only environments without IPython kernel.
  evidence: src/zipline/pipeline/hooks/progress.py:291(IPythonWidgetProgressPublisher)
  stage: order_management
  alternative_considered: Logging-based progress would work everywhere but be less visible
- id: BD-GAP-010
  type: T/BA
  content: LabelArray uses integer factorization internally with custom missing_value sentinel for efficient
    string array operations
  rationale: Factorization enables O(1) string equality checks and memory efficiency; custom missing value
    avoids NaN limitations for string data. Breaks when category count approaches int dtype limits or
    when string-to-code mapping becomes a bottleneck.
  evidence: src/zipline/lib/labelarray.py:157(LabelArray.__new__)
  stage: data_ingestion
  alternative_considered: Dictionary-based mapping would be simpler but slower for repeated lookups
- id: BD-GAP-011
  type: B/BA
  content: Benchmark returns pre-calculated at initialization rather than computed on-demand during simulation
  rationale: Pre-calculation avoids repeated lookups during tight simulation loops; trades memory for
    latency. Breaks when benchmark asset changes mid-simulation or when memory pressure is severe.
  evidence: src/zipline/sources/benchmark_source.py:187(_initialize_precalculated_series)
  stage: trading_simulation
  alternative_considered: On-demand computation would save memory but add per-bar latency
- id: BD-GAP-012
  type: B/BA
  content: Symbol uniqueness validation with NaN/0 return when symbol is ambiguous or not found
  rationale: Ambiguous symbols indicate data quality issues; returning failure indicators prevents silent
    misattribution. Breaks when symbol history spans multiple companies with legitimate name reuse (common
    in small-cap stocks).
  evidence: src/zipline/sources/requests_csv.py:258(_lookup_unconflicted_symbol)
  stage: data_ingestion
  alternative_considered: Return each matches would be less safe but preserve data access
- id: BD-GAP-013
  type: T/BA
  content: Daily timestamp normalization to midnight for consistent date alignment across data sources
  rationale: Eliminates timezone and time-of-day inconsistencies when merging heterogeneous data sources.
    Breaks when intraday date boundaries matter (e.g., overnight positions crossing exchange close).
  evidence: src/zipline/sources/requests_csv.py:21(roll_dts_to_midnight)
  stage: data_ingestion
  alternative_considered: Preserve original timestamps would be accurate but require timezone-aware merge
    logic
- id: BD-GAP-014
  type: B/RC
  content: Protocol validation functions assert datasource/trade/unframe event structures at runtime
  rationale: Runtime validation catches integration errors early with clear failure messages; defensive
    approach prevents subtle bugs. Breaks when protocol evolves without updating validators, creating
    false negatives.
  evidence: src/zipline/gens/utils.py:38(assert_datasource_protocol)
  stage: data_ingestion
  alternative_considered: Type annotations alone would be less intrusive but less enforced
- id: BD-GAP-015
  type: B/BA
  content: Expired asset cleanup at simulation day boundaries, clearing orders for delisted securities
  rationale: Prevents order execution for securities that no longer trade; boundary-based cleanup is efficient.
    Breaks when asset lifetimes are incorrectly tracked or when corporate actions create apparent 'new'
    tickers for same entity.
  evidence: src/zipline/gens/tradesimulation.py:258(_cleanup_expired_assets)
  stage: trading_simulation
  alternative_considered: Continuous cleanup would be safer but less efficient
