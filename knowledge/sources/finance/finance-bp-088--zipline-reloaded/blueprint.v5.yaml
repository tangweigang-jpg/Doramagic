# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-088
name: Zipline
sop_version: '3.6'
source:
  projects:
  - zipline-reloaded
  commit_hash: 943010b9da848e317fc520de87edade2b884d329
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: algorithmic trading backtesting and live-trading simulation
  description: Pythonic event-driven system for backtesting trading strategies with realistic slippage,
    transaction costs, and order delays. Supports cross-sectional factor computation, multi-currency portfolios,
    and futures continuous contracts.
  prerequisites: Python programming, basic understanding of financial markets and trading strategies,
    familiarity with pandas DataFrames
  not_suitable_for: real-time production trading (requires custom integration), options pricing, portfolio
    optimization, high-frequency trading strategies requiring tick-level modeling
  activation:
    triggers:
    - User asks about Zipline algorithmic trading library
    - Working with trading strategies or backtesting
    - Implementing custom data sources or factors
    - Modifying order execution or portfolio management logic
    - Running tests or building documentation
    emphasis:
    - Use ESPECIALLY when implementing data bundles or pipeline factors
    - Use ESPECIALLY when dealing with numpy/pandas API compatibility issues
    anti_skip:
    - Don't skip dependency versions as breaking changes occur in pandas >= 2.0 and numpy >= 2.0
    - Don't skip Cython considerations as performance-critical components require attention
stages:
- id: data_ingestion
  name: Data Ingestion/Bundles
  order: 1
  responsibility: Ingest external pricing data (Quandl, CSV, etc.) into proprietary formats and transform
    raw OHLCV data into bcolz/HDF5 for efficient reading. This stage exists because trading simulations
    require fast random access to historical pricing data across thousands of securities.
  interface:
    inputs:
    - Raw CSV/HDF5 files
    - Asset metadata (equities/futures)
    - Corporate action data (splits, dividends)
    outputs:
    - bcolz daily bars
    - bcolz minute bars
    - SQLite adjustments DB
    - Asset SQLite DB
  required_methods:
  - name: ingest
    description: Main entry point for ingesting data into a bundle; invokes the registered ingest function
      and writes data to bcolz/SQLite storage
    evidence: src/zipline/data/bundles/core.py:154(BundleData)
  key_behaviors:
  - behavior: Versioned bundle directories
    description: Allows multiple versions of the same bundle; enables backtesting against historical data
      states by storing each ingest with a timestamp
    evidence: src/zipline/data/bundles/core.py:91(to_bundle_ingest_dirname)
  - behavior: Asset/futures separation
    description: Equities and futures have different metadata schemas; separate tables enable efficient
      querying per asset type
    evidence: src/zipline/assets/asset_writer.py:688(write)
  replaceable_points:
  - name: bundle_ingest
    description: Ingestion function for new data sources
    options:
    - name: quandl
      traits:
      - Remote API
      - WIKI dataset
      - Requires API key
      fit_for:
      - Free US equity data
      - Historical backtests with quandl data
      not_fit_for:
      - Modern data sources
      - Non-US markets
      - Production use (API deprecated)
    - name: csvdir
      traits:
      - Local CSV files
      - No API required
      fit_for:
      - Custom datasets
      - Private data sources
      - Testing
      not_fit_for:
      - Large datasets
      - Remote team sharing
    - name: custom
      traits:
      - User-defined ingest function
      fit_for:
      - Proprietary data formats
      - Alternative data sources
      - Streaming data
      not_fit_for:
      - Quick prototyping
      - Beginners without Python experience
    default: quandl
  - name: bar_format
    description: Backend format for bar storage
    options:
    - name: bcolz
      traits:
      - Columnar
      - Chunked out-of-core
      - Fast column extraction
      fit_for:
      - Large equity datasets
      - Memory-constrained environments
      not_fit_for:
      - HPC clusters without bcolz support
    - name: hdf5
      traits:
      - Widely compatible
      - Hierarchical structure
      fit_for:
      - Interoperability with other tools
      not_fit_for:
      - Memory-constrained environments
    default: bcolz
  design_decisions:
  - 'bcolz for bar storage (evidence: src/zipline/data/bcolz_daily_bars.py:111(BcolzDailyBarWriter)) —
    bcolz provides chunked out-of-core storage ideal for large equity datasets; supports column-wise reading
    (only open/close needed without loading high/low)'
  - 'SQLite for adjustments (evidence: src/zipline/data/adjustments.py:82(SQLiteAdjustmentReader)) — Adjustments
    are append-only sparse events; SQLite''s single-file DB with indices handles range queries efficiently'
  acceptance_hints:
  - Bundle appears in `zipline bundles` command output
  - Ingested data covers expected date range for test assets
  - Asset lookup by symbol returns correct SID after ingestion
- id: asset_management
  name: Asset Management
  order: 2
  responsibility: Resolve symbols to assets, track asset lifetimes, manage futures continuous contracts
    and roll schedules. This stage exists because there is a need for authoritative mapping from ticker
    symbols to unique security identifiers across historical periods.
  interface:
    inputs:
    - Symbol strings
    - SID integers
    - Trading dates
    outputs:
    - Asset objects (Equity/Future)
    - ContinuousFuture specs
    - Asset lifetimes DataFrame
  required_methods:
  - name: AssetFinder.lookup_symbol
    description: Resolves a ticker symbol to an Asset object, handling fuzzy matching for delisted/reused
      tickers
    evidence: src/zipline/assets/assets.py:257(AssetFinder)
  - name: AssetFinder.retrieve_asset
    description: Retrieves asset by SID with caching for efficient repeated lookups
    evidence: src/zipline/assets/assets.py:454(retrieve_asset)
  - name: create_continuous_future
    description: Creates a synthetic continuous contract spanning multiple expirations for historical
      backtests
    evidence: src/zipline/assets/assets.py:1219(create_continuous_future)
  key_behaviors:
  - behavior: Fuzzy symbol matching
    description: Symbol delistings cause ticker reuse; fuzzy matching enables handling of stale references
      when exact symbol lookup fails
    evidence: src/zipline/assets/assets.py:357(_fuzzify_symbol_ownership_map)
  - behavior: Memoized ownership maps
    description: Asset lookups happen millions of times in backtests; caching ownership maps avoids repeated
      SQL queries
    evidence: src/zipline/assets/assets.py:327(symbol_ownership_map)
  - behavior: Continuous futures abstraction
    description: Historical backtests need synthetic price series spanning multiple contract expirations;
      continuous futures provide gap-adjusted price history
    evidence: src/zipline/assets/assets.py:1219(create_continuous_future)
  replaceable_points:
  - name: roll_strategy
    description: How to determine roll dates for futures continuous contracts
    options:
    - name: CalendarRollFinder
      traits:
      - Uses contract auto_close_date
      - Deterministic rolls
      fit_for:
      - Calendar-based trading
      - Standard futures strategies
      not_fit_for:
      - Volume-driven roll timing
    - name: VolumeRollFinder
      traits:
      - Based on volume transfer
      - Dynamic roll dates
      fit_for:
      - Liquidity-following strategies
      - Arbitrage detection
      not_fit_for:
      - Pre-trade planning
      - Deterministic backtests
    - name: custom
      traits:
      - User-defined roll logic
      fit_for:
      - Proprietary roll heuristics
      not_fit_for:
      - Standard backtests
    default: CalendarRollFinder
  design_decisions:
  - 'Fuzzy symbol matching (evidence: src/zipline/assets/assets.py:357(_fuzzify_symbol_ownership_map))
    — Symbol delistings cause ticker reuse; fuzzy matching enables handling of stale references'
  - 'Memoized ownership maps (evidence: src/zipline/assets/assets.py:327(symbol_ownership_map)) — Asset
    lookups happen millions of times in backtests; caching ownership maps avoids repeated SQL queries'
  - 'Continuous futures abstraction (evidence: src/zipline/assets/assets.py:1219(create_continuous_future))
    — Historical backtests need synthetic price series spanning multiple contract expirations'
  acceptance_hints:
  - Symbol lookup returns correct Asset with proper start/end dates
  - Continuous future price series is continuous (no NaN gaps except at rolls)
  - Asset lookup by SID returns same object for repeated calls (caching)
- id: pipeline_computation
  name: Pipeline Computation Engine
  order: 3
  responsibility: Execute declarative factor/filter/classifier graphs over asset-date matrices. This stage
    enables vectorized cross-sectional computations (rankings, z-scores) across thousands of securities
    efficiently.
  interface:
    inputs:
    - Pipeline object (terms + screen)
    - start_date, end_date
    - BoundColumn loaders
    outputs:
    - DataFrame with MultiIndex (date, asset)
    - Narrowed to screened assets
  required_methods:
  - name: SimplePipelineEngine.run_pipeline
    description: Topological execution of Pipeline term graph; computes each factors, filters, and classifiers
      with chunked processing for memory efficiency
    evidence: src/zipline/pipeline/engine.py:210(SimplePipelineEngine)
  - name: Pipeline藤
    description: Creates pipeline with factors, filters, classifiers and screens
    evidence: src/zipline/pipeline/pipeline.py
  - name: USEquityPricing.close
    description: BoundColumn for daily close prices; class attribute that becomes bound term when accessed
    evidence: src/zipline/pipeline/data/equity_pricing.py
  key_behaviors:
  - behavior: Memoized Term construction
    description: Pipeline literals (USEquityPricing.close) are class attributes; memoization ensures identical
      terms share the same object identity for graph equality checks
    evidence: src/zipline/pipeline/term.py:103(__new__)
  - behavior: Chunked execution
    description: Multi-year pipelines on thousands of assets exceed memory; chunking limits peak memory
      to one chunk at a time
    evidence: src/zipline/pipeline/engine.py:271(run_chunked_pipeline)
  - behavior: Sliding window with adjustments
    description: Windowed computations need pre-adjusted prices; sliding window amortizes adjustment computation
      across requests
    evidence: src/zipline/data/history_loader.py:225(SlidingWindow)
  - behavior: NumExpr for expressions
    description: Factor arithmetic (close / moving_average) compiles to NumExpr for ~10x speedup vs pure
      numpy
    evidence: src/zipline/pipeline/factors/factor.py:1350(NumExprFactor)
  replaceable_points:
  - name: pipeline_loader
    description: How to load external data into pipelines
    options:
    - name: EquityPricingLoader
      traits:
      - Pre-adjusted prices
      - bcolz backend
      fit_for:
      - Standard equity factors
      - Historical data
      not_fit_for:
      - Real-time data
      - Custom data sources
    - name: PrecomputedLoader
      traits:
      - User-provided arrays
      fit_for:
      - Alternative data
      - Pre-computed signals
      not_fit_for:
      - Standard OHLCV factors
    - name: custom
      traits:
      - Custom loader protocol
      fit_for:
      - Proprietary data formats
      not_fit_for:
      - Standard pipelines
    default: EquityPricingLoader
  - name: execution_engine
    description: Pipeline computation engine
    options:
    - name: SimplePipelineEngine
      traits:
      - Standard execution
      - Memory-managed
      fit_for:
      - Production backtests
      not_fit_for:
      - Debugging term execution
    - name: ExplodingPipelineEngine
      traits:
      - Every terms computed
      - No optimization
      fit_for:
      - Testing
      - Debugging
      not_fit_for:
      - Large pipelines
    default: SimplePipelineEngine
  design_decisions:
  - 'Memoized Term construction (evidence: src/zipline/pipeline/term.py:103(__new__)) — Pipeline literals
    (USEquityPricing.close) are class attributes; memoization ensures identical terms share the same object
    identity for graph equality checks'
  - 'Chunked execution (evidence: src/zipline/pipeline/engine.py:271(run_chunked_pipeline)) — Multi-year
    pipelines on thousands of assets exceed memory; chunking limits peak memory to one chunk at a time'
  - 'Universal mixin pattern (evidence: src/zipline/pipeline/mixins.py:287(UniversalMixin)) — Same mixin
    (Slice, Downsample) applies across Factor/Filter/Classifier; avoids triplicated code'
  - 'NumExpr for expressions (evidence: src/zipline/pipeline/factors/factor.py:1350(NumExprFactor)) —
    Factor arithmetic (close / moving_average) compiles to NumExpr for ~10x speedup vs numpy'
  - 'Domain abstraction (evidence: src/zipline/pipeline/domain.py:36(IDomain)) — US vs non-US calendars
    have different session definitions; Domain abstracts calendar choice for multi-market pipelines'
  acceptance_hints:
  - Pipeline computation completes without errors for multi-year date ranges
  - Output DataFrame has MultiIndex (date, asset) structure
  - Screened assets match filter conditions (no NaN rows from screen)
  - Windowed factors produce correct trailing window values
- id: trading_simulation
  name: Trading Simulation
  order: 4
  responsibility: 'Drive the event loop for backtesting: advance clock, emit bars, process orders. This
    stage exists because Zipline historically simulated minute-by-minute; maintains compatibility while
    supporting daily frequency.'
  interface:
    inputs:
    - TradingAlgorithm instance
    - DataPortal
    - SimulationClock
    - BenchmarkSource
    outputs:
    - Performance DataFrames
    - Capital change packets
    - Risk reports
  required_methods:
  - name: TradingAlgorithm.run
    description: Entry point for backtest execution; initializes algorithm, creates clock, and runs simulation
      loop
    evidence: src/zipline/algorithm.py:142(TradingAlgorithm)
  - name: TradingAlgorithm.order
    description: Place an order for a security with given amount; returns order_id for tracking
    evidence: src/zipline/algorithm.py
  - name: TradingAlgorithm.schedule_function
    description: Schedule a function to run at specific date/time rules (e.g., daily close, weekly)
    evidence: src/zipline/algorithm.py
  key_behaviors:
  - behavior: Generator-based simulation
    description: Generator allows yielding mid-loop for capital changes; enables incremental result streaming
      vs batch processing
    evidence: src/zipline/gens/tradesimulation.py:99(transform)
  - behavior: Dual emission rates
    description: Minute frequency tracks intraday metrics; daily frequency for end-of-day risk; emission_rate
      parameter controls output granularity
    evidence: src/zipline/gens/tradesimulation.py:305(_get_daily_message)
  - behavior: Clock abstraction
    description: Separate clock creation allows same algorithm to run minute or daily without code changes
    evidence: src/zipline/algorithm.py:481(_create_clock)
  - behavior: Auto-close expired assets
    description: Assets delist after end_date; auto-close prevents stale positions from affecting subsequent
      calculations
    evidence: src/zipline/gens/tradesimulation.py:258(_cleanup_expired_assets)
  replaceable_points:
  - name: simulation_clock
    description: Time progression mechanism
    options:
    - name: MinuteSimulationClock
      traits:
      - Minute-by-minute
      - Intraday metrics
      fit_for:
      - Intraday strategies
      - High-frequency analysis
      not_fit_for:
      - Daily strategies
      - Long backtests
    - name: DailySimulationClock
      traits:
      - Daily bars
      - Efficient execution
      fit_for:
      - Daily strategies
      - Long historical periods
      not_fit_for:
      - Intraday strategies
      - Minute-level analysis
    default: MinuteSimulationClock
  - name: blotter_class
    description: Order management backend
    options:
    - name: SimulationBlotter
      traits:
      - Standard order tracking
      - Built-in slippage
      fit_for:
      - Standard backtests
      not_fit_for:
      - Custom order handling
    - name: custom
      traits:
      - User-defined blotter
      fit_for:
      - Live trading integration
      - Custom fill models
      not_fit_for:
      - Standard backtests
    default: SimulationBlotter
  design_decisions:
  - 'Generator-based simulation (evidence: src/zipline/gens/tradesimulation.py:99(transform)) — Generator
    allows yielding mid-loop for capital changes; enables incremental result streaming vs batch processing'
  - 'Dual emission rates (evidence: src/zipline/gens/tradesimulation.py:305(_get_daily_message)) — Minute
    frequency tracks intraday metrics; daily frequency for end-of-day risk; emission_rate parameter controls
    output granularity'
  - 'Clock abstraction (evidence: src/zipline/algorithm.py:481(_create_clock)) — Separate clock creation
    allows same algorithm to run minute or daily without code changes'
  acceptance_hints:
  - Algorithm produces performance DataFrame with expected date range
  - handle_data or before_trading_start called at correct intervals
  - Order placement returns valid order_id
  - Performance metrics (returns, Sharpe) computed without errors
- id: order_management
  name: Order Management & Execution
  order: 5
  responsibility: Track open orders, apply slippage/commission models, generate transactions. This stage
    enables realistic backtesting by modeling market impact, fill uncertainty, and trading costs.
  interface:
    inputs:
    - Order requests from algorithm
    - Bar data (prices/volume)
    - Execution styles (market/limit/stop)
    outputs:
    - Transaction objects
    - Commission costs
    - Order status updates
  required_methods:
  - name: SimulationBlotter.order
    description: Place a new order; validates against trading controls, applies slippage model
    evidence: src/zipline/finance/blotter/simulation_blotter.py:41(SimulationBlotter)
  - name: Blotter.cancel
    description: Cancel an existing order by order_id
    evidence: src/zipline/finance/blotter/blotter.py:21(Blotter)
  - name: SlippageModel.calculate_fill
    description: Calculate actual fill price based on volume share and order size
    evidence: src/zipline/finance/slippage.py:81(SlippageModel)
  key_behaviors:
  - behavior: Per-asset slippage models
    description: Equities and futures have different liquidity characteristics; asset-type dispatch allows
      different models
    evidence: src/zipline/finance/blotter/simulation_blotter.py:63(slippage_models)
  - behavior: Asset-type commission dispatch
    description: Futures have per-contract pricing with exchange fees; equities have per-share pricing;
      dispatch ensures correct model selection
    evidence: src/zipline/finance/blotter/simulation_blotter.py:70(commission_models)
  - behavior: Cancel policy abstraction
    description: EODCancel vs NeverCancel affects intraday backtest results; policy abstraction lets users
      choose realism level
    evidence: src/zipline/finance/cancel_policy.py:22(CancelPolicy)
  replaceable_points:
  - name: slippage_model
    description: Fill price impact model
    options:
    - name: VolumeShareSlippage
      traits:
      - Quadratic price impact
      - Volume-based
      fit_for:
      - Large orders
      - Liquid markets
      not_fit_for:
      - Small orders
      - Illiquid markets
    - name: FixedBasisPointsSlippage
      traits:
      - Fixed spread
      - 5 bps default
      fit_for:
      - Simple backtests
      - Market orders
      not_fit_for:
      - Large orders
      - Volume-sensitive strategies
    - name: FixedSlippage
      traits:
      - Fixed dollar spread
      fit_for:
      - ETF strategies
      - Predictable spreads
      not_fit_for:
      - Percentage-based analysis
    - name: NoSlippage
      traits:
      - No market impact
      fit_for:
      - Academic benchmarks
      - Small order validation
      not_fit_for:
      - Realistic backtests
      - Large orders
    default: FixedBasisPointsSlippage
  - name: commission_model
    description: Trading cost model
    options:
    - name: PerShare
      traits:
      - $0.001/share default
      - Equity-focused
      fit_for:
      - US equity strategies
      not_fit_for:
      - Futures
      - Large-cap trades
    - name: PerDollar
      traits:
      - Percentage of value
      fit_for:
      - Percentage-based cost analysis
      not_fit_for:
      - Flat fee structures
    - name: PerTrade
      traits:
      - Flat fee per trade
      fit_for:
      - Brokerage-style modeling
      not_fit_for:
      - Volume-based analysis
    - name: PerContract
      traits:
      - Per futures contract
      fit_for:
      - Futures strategies
      not_fit_for:
      - Equity-only backtests
    default: PerShare
  - name: cancel_policy
    description: Order expiration policy
    options:
    - name: EODCancel
      traits:
      - Day orders only
      - End-of-day cancellation
      fit_for:
      - Realistic intraday simulation
      not_fit_for:
      - Multi-day positions
      - GTC orders
    - name: NeverCancel
      traits:
      - GTC orders
      - Persistent until filled
      fit_for:
      - Simple backtests
      - Limit orders
      not_fit_for:
      - Realistic live trading
    default: NeverCancel
  design_decisions:
  - 'Per-asset slippage models (evidence: src/zipline/finance/blotter/simulation_blotter.py:63(slippage_models))
    — Equities and futures have different liquidity characteristics; asset-type dispatch allows different
    models'
  - 'Default FixedBasisPointsSlippage (evidence: src/zipline/finance/blotter/simulation_blotter.py:64)
    — 5 basis points is reasonable market impact estimate; avoids requiring users to configure slippage
    for simple backtests'
  - 'Default PerShare commission (evidence: src/zipline/finance/blotter/simulation_blotter.py:71) — $0.001/share
    approximates US equity exchange fees; realistic cost modeling for performance attribution'
  - 'Asset-type commission dispatch (evidence: src/zipline/finance/blotter/simulation_blotter.py:70(commission_models))
    — Futures have per-contract pricing with exchange fees; equities have per-share pricing; dispatch
    ensures correct model selection'
  - 'Cancel policy abstraction (evidence: src/zipline/finance/cancel_policy.py:22(CancelPolicy)) — EODCancel
    vs NeverCancel affects intraday backtest results; policy abstraction lets users choose realism level'
  acceptance_hints:
  - Orders are filled with prices matching slippage model calculations
  - Commission costs are correctly applied per model specification
  - Cancel requests successfully remove orders from open_orders
  - Position amounts correctly reflect filled orders
- id: portfolio_accounting
  name: Portfolio Accounting & Metrics
  order: 6
  responsibility: Track positions, calculate portfolio value, compute P&L, update risk metrics. This stage
    enables accurate performance measurement by modeling cash flows, dividends, and position changes atomically.
  interface:
    inputs:
    - Transactions
    - Dividend events
    - Corporate actions
    - Price updates
    outputs:
    - Portfolio state
    - Account state
    - Performance DataFrames
  required_methods:
  - name: Ledger.process_transaction
    description: Atomic processing of transaction with cash flow calculation, position update, and P&L
      tracking
    evidence: src/zipline/finance/ledger.py:314(Ledger)
  - name: Ledger.earn_dividends
    description: Accrue dividend income on ex-date and process payment on pay_date
    evidence: src/zipline/finance/ledger.py:140(earn_dividends)
  - name: MetricsTracker.record
    description: Record daily/minute metrics including returns, positions, and cash
    evidence: src/zipline/finance/metrics/tracker.py:24(MetricsTracker)
  key_behaviors:
  - behavior: Ledger as central coordinator
    description: Single source of truth for cash/positions; avoids inconsistent state between separate
      cash and position trackers
    evidence: src/zipline/finance/ledger.py:314(Ledger)
  - behavior: Cost basis per position
    description: Average cost basis matches real-world tax/performance reporting conventions
    evidence: src/zipline/finance/position.py:47(__init__)
  - behavior: Immutability via MutableView
    description: Portfolio/Account exposed to user algorithms as read-only; MutableView allows internal
      mutation while maintaining external immutability contract
    evidence: src/zipline/protocol.py:22(MutableView)
  - behavior: Dividend accrual on ex-date
    description: 'Standard convention: dividend value captured on ex-date, payment on pay_date; models
      real-world cash flow timing'
    evidence: src/zipline/finance/ledger.py:140(earn_dividends)
  - behavior: MetricsTracker emission
    description: Daily vs minute emission affects perf DataFrame granularity; emission_rate drives handle_*_close
      callbacks
    evidence: src/zipline/finance/metrics/tracker.py:69(__init__)
  replaceable_points:
  - name: metrics_set
    description: Risk/performance calculation set
    options:
    - name: default
      traits:
      - Full risk metrics
      - Empyrical calculations
      fit_for:
      - Production backtests
      - Performance analysis
      not_fit_for:
      - Memory-constrained environments
    - name: simplified
      traits:
      - Basic metrics only
      fit_for:
      - Quick validation
      - Debugging
      not_fit_for:
      - Production reporting
    - name: custom
      traits:
      - User-defined metrics
      fit_for:
      - Custom KPI tracking
      not_fit_for:
      - Standard analysis
    default: default
  design_decisions:
  - 'Ledger as central coordinator (evidence: src/zipline/finance/ledger.py:314(Ledger)) — Single source
    of truth for cash/positions; avoids inconsistent state between separate cash and position trackers'
  - 'Cost basis per position (evidence: src/zipline/finance/position.py:47(__init__)) — Average cost basis
    matches real-world tax/performance reporting conventions'
  - 'Immutability via MutableView (evidence: src/zipline/protocol.py:22(MutableView)) — Portfolio/Account
    exposed to user algorithms as read-only; MutableView allows internal mutation while maintaining external
    immutability contract'
  - 'Dividend accrual on ex-date (evidence: src/zipline/finance/ledger.py:140(earn_dividends)) — Standard
    convention: dividend value captured on ex-date, payment on pay_date; models real-world cash flow timing'
  acceptance_hints:
  - Portfolio value matches cash + sum of position values
  - Dividends correctly accrue and pay on appropriate dates
  - P&L calculations match expected values for trades
  - Performance DataFrame contains expected columns (returns, positions, capital_used)
- id: data_access
  name: Data Access Layer
  order: 7
  responsibility: Serve historical and spot pricing data to algorithms and pipelines with adjustment support.
    This stage provides unified access to raw/adjusted prices across minute/daily frequencies for both
    live bars and historical windows.
  interface:
    inputs:
    - Asset, field, datetime
    - Assets, end_dt, bar_count
    - Adjustment reader
    outputs:
    - Scalar values
    - RawArrays (OHLCV)
    - Adjustment lists
  required_methods:
  - name: DataPortal.get_spot_value
    description: Retrieve single value for asset/field at specific datetime; applies adjustments if requested
    evidence: src/zipline/data/data_portal.py:89(DataPortal)
  - name: DataPortal.get_history_window
    description: Retrieve historical bars for multiple assets; applies adjustments and returns RawArrays
    evidence: src/zipline/data/data_portal.py
  - name: DataPortal.get_adjustments
    description: Retrieve corporate action adjustments (splits, dividends, mergers) for date range
