- id: BD-020
  type: B/BA
  content: Order direction uses positive for buy, negative for sell
  rationale: The sign convention mapping positive amounts to buys and negative to sells establishes a
    clear directional boundary in the trading system. This default ensures consistent order interpretation
    across the platform, preventing ambiguity in order direction and enabling straightforward portfolio
    position calculations through algebraic sign operations.
  evidence: src/zipline/finance/order.py:44(order:)
  stage: order_management
  alternative_considered: Inverse convention was rejected as positive values should represent long exposure
  _evidence_issues:
  - 'INVALID_IDENTIFIER: order: in src/zipline/finance/order.py'
- id: BD-021
  type: B/BA
  content: 'Limit price asymmetry: round down for buys, up for sells'
  rationale: The asymmetric rounding convention rounds limit prices against the trader (down for buys,
    up for sells) ensuring conservative execution assumptions. This default establishes a boundary that
    prevents optimistic backtest results by assuming the worst-case rounding direction for each order
    type.
  evidence: src/zipline/finance/execution.py:171(module)
  stage: order_management
  alternative_considered: Symmetric rounding was rejected as it doesn't reflect conservative execution
    assumptions
  _evidence_issues:
