- id: BD-016
  type: B/BA
  content: RSI momentum strategy uses top 3 longs and bottom 3 shorts
  rationale: The top/bottom 3 position count balances diversification benefits against concentration risk
    in the RSI momentum strategy. This default establishes a boundary for portfolio construction that
    allows meaningful long-short exposure while maintaining manageable position count, affecting both
    risk characteristics and transaction costs.
  evidence: src/zipline/examples/momentum_pipeline.py:23-24(module)
  stage: strategy
