- id: BD-015
  type: B/BA
  content: Dual moving average skips first 300 days for warmup
  rationale: The 300-day warmup period ensures the long moving average has valid data before generating
    signals, establishing a data quality boundary. This default prevents premature trading based on incomplete
    averages while clearly defining the minimum backtest period needed for valid signal generation.
  evidence: 'src/zipline/examples/dual_moving_average.py:44(if context.i < 300: return)'
  stage: strategy
  alternative_considered: Shorter warmup was rejected as it would generate signals from incomplete moving
    averages
  _evidence_issues:
