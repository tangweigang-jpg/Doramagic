- id: BD-023
  type: B/BA
  content: Default tick size is $0.01 for orders without asset-specific tick
  rationale: The $0.01 tick size provides a reasonable price granularity for assets without specified
    tick requirements, aligning with US equity minimum price increments. This default establishes a boundary
    that prevents infinite precision in price specification while accommodating the vast majority of financial
    instruments' minimum price movements.
  evidence: src/zipline/finance/execution.py:24(ExecutionStyle)
  stage: order_management
  alternative_considered: Smaller tick sizes were rejected as they would create unrealistic precision
