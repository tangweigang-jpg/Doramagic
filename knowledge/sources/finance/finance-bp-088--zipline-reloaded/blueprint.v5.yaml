- id: BD-013
  type: B/BA
  content: VolumeShareSlippage used in examples for historical accuracy
  rationale: VolumeShareSlippage in examples demonstrates realistic market impact modeling for educational
    purposes, showing users how order size affects execution quality. This default establishes that example
    strategies should reflect realistic execution constraints rather than frictionless trading assumptions,
    preparing users for production strategy development.
  evidence: src/zipline/examples/buyapple.py:31(module)
  stage: slippage
  alternative_considered: NoSlippage was rejected as it would teach unrealistic trading assumptions
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/zipline/examples/buyapple.py'
- id: BD-014
  type: B/BA
  content: Dual moving average uses 100-day short and 300-day long windows
  rationale: The 100/300 day window combination provides a balanced momentum strategy that captures medium-term
    trends while filtering noise. This default establishes a boundary for warmup requirements and strategy
    responsiveness, with the long window ensuring sufficient data history while the short window provides
    timely signals.
  evidence: src/zipline/examples/dual_moving_average.py:50-51(module)
  stage: strategy
  alternative_considered: Shorter windows like 20/50 were considered but deemed too noisy for demonstration
    purposes
  _evidence_issues:
