- id: BD-022
  type: B/BA
  content: Stop order prices rounded opposite to limit orders
  rationale: Stop orders round opposite to limit orders (up for buys, down for sells) ensuring the stop
    triggers at or beyond the intended price. This default establishes a boundary that prevents stop orders
    from inadvertently triggering at worse prices due to rounding, protecting traders from unexpected
    execution.
  evidence: src/zipline/finance/execution.py:123-128(module)
  stage: order_management
  alternative_considered: Same rounding as limits was rejected as it would create asymmetric execution
