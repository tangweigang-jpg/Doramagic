- id: BD-GAP-001
  type: B
  content: Volume features use On-Balance Volume (OBV) with cumulative signed volume logic rather than
    raw volume totals, enabling direction-aware momentum tracking
  rationale: OBV aggregates volume directionally so positive days add to running total while negative
    days subtract, creating a leading indicator for price movement; raw totals would lose directional
    information and fail to detect divergence between price and volume flows
  evidence: examples_to_use/volume_features_example.py:12(calculate_volume_features)
  stage: feature_aggregation
  alternative_considered: Chaikin Money Flow (uses close position within bar range) was rejected for complexity
  _evidence_issues:
  - 'FN_NOT_FOUND: calculate_volume_features in examples_to_use/volume_features_example.py'
- id: BD-GAP-002
  type: B/BA
  content: Rate of Change (ROC) uses percentage-based calculation with configurable period defaulting
    to 12 bars, enabling cross-asset comparability
  rationale: Percentage ROC normalizes across assets with different price scales (e.g., $50 vs $500 stock),
    making threshold values transferable; period of 12 bars (~2 weeks) captures short-term momentum while
    filtering noise; breaks if asset price approaches zero
  evidence: examples_to_use/roc.py:8(calculate_roc)
  stage: indicator_computation
  alternative_considered: Absolute value ROC was rejected because thresholds wouldn't be portable across
    price ranges
  _evidence_issues:
  - 'FN_NOT_FOUND: calculate_roc in examples_to_use/roc.py'
- id: BD-GAP-003
  type: B/BA
  content: Bollinger Bands use 20-period SMA with 2 standard deviation bands as the default configuration,
    representing the most widely-used technical analysis parameters
  rationale: 20-period captures roughly one trading month, 2 SD captures ~95% of price action under normal
    distribution assumptions; this combination is the de facto standard in trading platforms; breaks during
    extreme volatility events (VIX spikes) where bands require dynamic widening
  evidence: examples_to_use/bollinger_band_features_example.py:15(calculate_bollinger_bands)
  stage: parameter_standardization
  alternative_considered: Keltner Channels (ATR-based) were considered but rejected for lower community
    adoption
  _evidence_issues:
  - 'FN_NOT_FOUND: calculate_bollinger_bands in examples_to_use/bollinger_band_features_example.py'
- id: BD-GAP-004
  type: BA/M
  content: Feature aggregation combines volume, momentum, and volatility indicators into a single normalized
    output dictionary, allowing downstream consumers to select desired features without code changes
  rationale: Returning each features in one call reduces API round-trips and enables flexible consumption
    patterns; however, this prevents selective computation (paying cost for unused features) and may cause
    latency issues at scale when only 1-2 features are needed
  evidence: examples_to_use/all_features_example.py:28(extract_all_features)
  stage: functional_api
  alternative_considered: Individual endpoint per feature (rejected for verbosity), builder pattern with
    feature list (rejected for complexity)
  _evidence_issues:
  - 'LINE_OOB: examples_to_use/all_features_example.py:28 > 21'
- id: BD-GAP-005
  type: B/BA
  content: Volume moving average uses Simple Moving Average (SMA) with 20-period default rather than exponential
    weighting, prioritizing interpretability over recency sensitivity
  rationale: SMA treats each periods equally, making thresholds predictable and human-readable; exponential
    weighting would amplify recent volume spikes but introduce lag in signal interpretation; breaks when
    volume patterns have strong intraday seasonality
  evidence: examples_to_use/volume_features_example.py:18(calculate_volume_sma)
  stage: algorithm_selection
  alternative_considered: Exponential MA (rejected), Volume-Weighted Average Price (rejected for complexity)
  _evidence_issues:
  - 'LINE_OOB: examples_to_use/volume_features_example.py:18 > 17'
- id: BD-GAP-006
  type: B
  content: Bollinger Band feature extraction returns upper band, middle band, lower band, and bandwidth
    percentage, enabling both breakout and mean-reversion strategy support
  rationale: Including bandwidth (normalized band width) enables volatility regime detection independent
    of absolute price levels; returning each three bands supports both breakout traders (price outside
    bands) and mean-reversion traders (price returning to middle band); bandwidth calculation fails when
    middle band is zero
  evidence: examples_to_use/bollinger_band_features_example.py:22(extract_bollinger_features)
  stage: output_contract
  alternative_considered: Return only price position relative to bands (rejected for losing absolute reference)
  _evidence_issues:
  - 'FN_NOT_FOUND: extract_bollinger_features in examples_to_use/bollinger_band_features_example.py'
