replaceable_slots:
- id: slot-001
  name: data_input_format
  description: 'Choose based on data source: CSV for static files, pandas-datareader/yfinance for public
    market data, ccxt for crypto, SQL for enterprise data'
  used_in_stages: []
  options:
  - name: CSV file
    traits:
    - simple
    - static
    - no-streaming
    fit_for:
    - Batch processing historical data, static datasets
    not_fit_for:
    - Real-time streaming, large datasets that don't fit in memory
  - name: Database query (SQL)
    traits:
    - dynamic
    - queryable
    - scalable
    fit_for:
    - Large datasets, filtered queries, data warehouse integration
    not_fit_for:
    - Real-time streaming
  - name: pandas-datareader
    traits:
    - api-based
    - market-data-focused
    fit_for:
    - Yahoo Finance, FRED, World Bank data fetching
    not_fit_for:
    - Private data sources, proprietary exchanges
  - name: yfinance
    traits:
    - yahoo-finance
    - historical-data
    fit_for:
    - Yahoo Finance historical stock data
    not_fit_for:
    - Real-time data, other data sources
  - name: ccxt
    traits:
    - crypto-exchange
    - multi-exchange
    fit_for:
    - Cryptocurrency exchange data (Binance, Coinbase, etc.)
    not_fit_for:
    - Traditional stock/forex markets
  default: CSV file
  _source: worker_resource
- id: slot-002
  name: numeric_computation_acceleration
  description: Add numexpr or bottleneck for large dataset performance improvements with minimal code
    changes
  used_in_stages: []
  options:
  - name: Pure NumPy/Pandas (current)
    traits:
    - default
    - portable
    fit_for:
    - Standard use cases, development
    not_fit_for:
    - Very large datasets requiring acceleration
  - name: NumExpr
    traits:
    - accelerated
    - low-memory
    fit_for:
    - Large array operations, memory-constrained environments
    not_fit_for:
    - Already fast operations, small datasets
  - name: Bottleneck
    traits:
    - accelerated
    - Cython-based
    fit_for:
    - Speeding up common pandas operations like nanmean, nanstd
    not_fit_for:
    - Custom calculations not in bottleneck
  default: Pure NumPy/Pandas
  _source: worker_resource
- id: slot-003
  name: visualization
  description: Use Plotly/Altair for interactive web charts, Streamlit for dashboards, Matplotlib for
    publication-quality static figures
  used_in_stages: []
  options:
  - name: Matplotlib (current)
    traits:
    - static
    - publication-quality
    fit_for:
    - Static charts, research notebooks
    not_fit_for:
    - Interactive dashboards, web apps
  - name: Plotly
    traits:
    - interactive
    - web-ready
    fit_for:
    - Interactive charts, web dashboards
    not_fit_for:
    - Simple static plots, PDF reports
  - name: Altair
    traits:
    - declarative
    - Vega-Lite
    fit_for:
    - Statistical visualizations, web
    not_fit_for:
    - Real-time streaming data
  - name: Streamlit
    traits:
    - dashboard
    - interactive-app
    fit_for:
    - Building data apps, live dashboards
    not_fit_for:
    - Static reports
  default: Matplotlib
  _source: worker_resource
- id: slot-004
  name: ci_cd_platform
  description: GitHub Actions for tighter GitHub integration; CircleCI for cross-platform or advanced
    Docker workflows
  used_in_stages: []
  options:
  - name: CircleCI (current)
    traits:
    - container-based
    - yaml-config
    fit_for:
    - Python projects, Docker workflows
    not_fit_for:
    - GitHub-only workflows (prefer Actions)
  - name: GitHub Actions
    traits:
    - native-github
    - yaml-config
    fit_for:
    - GitHub-hosted repos, tight GitHub integration
    not_fit_for:
    - GitLab/Bitbucket repos
  - name: Travis CI
    traits:
    - mature
    - yml-config
    fit_for:
    - Open source projects
    not_fit_for:
    - Private repos (now paid), complex builds
  default: CircleCI
  _source: worker_resource
- id: slot-005
  name: documentation_generator
  description: Sphinx for Python library API docs with autodoc; MkDocs for simpler Markdown-based documentation
  used_in_stages: []
  options:
  - name: Sphinx (current)
    traits:
    - rst-source
    - mature
    - readthedocs-native
    fit_for:
    - Python libraries, technical docs
    not_fit_for:
    - Markdown-only teams
  - name: MkDocs
    traits:
    - yaml-config
    - markdown
    - simpler
    fit_for:
    - Simple documentation, Markdown teams
    not_fit_for:
    - API reference generation (needs plugins)
  - name: Docusaurus
    traits:
    - react-based
    - modern
    fit_for:
    - Developer portals, mixed content
    not_fit_for:
    - Pure Python API docs
  default: Sphinx
  _source: worker_resource
