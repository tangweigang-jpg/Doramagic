    is consistent across each indicators. The boundary is that any change to _true_range affects multiple
    indicator outputs simultaneously.
  evidence: ta/utils.py:38-46(_true_range)
  stage: pattern_choice
  alternative_considered: Separate implementations per indicator were rejected to ensure consistency;
    subclass override was considered but rejected for simplicity
- id: BD-096
  type: B/BA
  content: NegativeVolumeIndex initializes to 1000 and uses explicit loop, not cumulative sum
  rationale: NVI initializes to 1000 as a base index value rather than using raw price sums, and computes
    via explicit loop instead of vectorized cumulative operations. This creates a behavioral boundary
    where NVI values are relative indices, not absolute price-derived. The boundary is that NVI cannot
    be recomputed from price alone without the 1000 base.
  evidence: ta/volume.py:332-337(NegativeVolumeIndex)
  stage: pattern_choice
  alternative_considered: Starting at 0 or 100 was considered but rejected to maintain Posakoff's original
    NVI specification; vectorized implementation was considered but rejected for readability
  _evidence_issues:
  - 'FN_NOT_FOUND: NegativeVolumeIndex in ta/volume.py'
- id: BD-097
  type: BA/DK
  content: 'INTERACTION: [BD-001] × [BD-044] × [BD-046] → Canonical RSI Implementation (Wilder equivalence)'
  rationale: RSI window=14, alpha=1/window, and adjust=False combine to produce Wilder's exact exponential
    smoothing. This interaction AMPLIFIES the canonical specification—if any parameter deviates, RSI values
    differ from industry standard. The three decisions are individually documented but their combined
    effect creates the exact Wilder RSI formula.
  evidence: BD-001,BD-044,BD-046
  stage: global
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-098
  type: B/BA
  content: 'INTERACTION: [BD-082] × [BD-083] × [BD-033] → Coupled NaN propagation system with boundary
    conditions'
  rationale: 'Three decisions create a coupled NaN handling system: _fillna=False default (opt-in), min_periods
    tied to _fillna (0 vs window), and FillNA sequence (ffill→bfill). RISK CASCADE occurs where changing
    _fillna default affects when indicators produce valid output, potentially creating gaps in rolling
    calculations or spurious filled values at series boundaries.'
  evidence: BD-082,BD-083,BD-033
  stage: global
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-099
  type: BA
  content: 'INTERACTION: [BD-090] × [BD-070] × [BD-030] → Keltner Channel dependency on internal ATR with
    Wilder smoothing'
  rationale: 'KeltnerChannel (BD-090) internally instantiates ATR (BD-070) which uses Wilder smoothing,
    while Keltner multiplier=2 (BD-030) defines band width based on ATR values. HIDDEN DEPENDENCY: Users
    calling KeltnerChannel do not access the internal ATR instance, yet band calculations depend entirely
    on its smoothing method. If ATR changes, Keltner bands change silently.'
  evidence: BD-090,BD-070,BD-030
  stage: global
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-100
  type: B
  content: 'INTERACTION: [BD-034/BD-081] × [BD-070,BD-065,BD-067,BD-048] → True Range single point of
    failure cascades'
  rationale: 'True Range definition (BD-034/BD-081) is the foundational input for ATR, CCI, Vortex, and
    Ultimate Oscillator. RISK CASCADE: A bug or change to _true_range calculation silently propagates
    to four independent indicators, potentially creating systematic errors across volatility, trend, and
    momentum calculations without obvious single source.'
  evidence: BD-034,BD-081,BD-070,BD-065,BD-067,BD-048
  stage: global
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-101
  type: B
  content: 'INTERACTION: [BD-086] × [BD-009/BD-010] × [BD-051] → shift(1) hardcoded conflicts with multi-period
    return definitions'
  rationale: 'shift(1) hardcoded across 18+ locations (BD-086) creates tension with Daily Return (BD-009),
    Log Return (BD-010), and ROC (BD-051) which each compute period-over-period changes. CONTRADICTION:
    These return calculations are hardcoded to 1-period lookback, yet their rationales discuss longer/shorter
    period trade-offs. Users cannot compute 5-period ROC without manual pre-shifting, contradicting the
    documented flexibility.'
  evidence: BD-086,BD-009,BD-010,BD-051
  stage: global
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-102
  type: B/BA
  content: 'INTERACTION: [BD-003] × [BD-089] → Bollinger Bands ddof=0 conflicts with pandas default sample
    std'
  rationale: 'Bollinger Bands use population std ddof=0 (BD-003/BD-089) while pandas DataFrame.std() defaults
    to ddof=1 sample std. CONTRADICTION: Users comparing ta library Bollinger Bands with pandas-calculated
    bands see different band widths. The library rationale explicitly rejects ddof=1, but this creates
    confusion for users accustomed to pandas defaults and makes cross-library validation difficult.'
  evidence: BD-003,BD-089
  stage: global
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-103
  type: B/BA
  content: 'INTERACTION: [BD-087] × [BD-044] × [BD-058] → adjust=False creates pandas ewm incompatibility'
  rationale: 'adjust=False (BD-087/BD-044/BD-058) creates Wilder smoothing which differs from pandas DataFrame.ewm(adjust=True)
    default. AMPLIFICATION: This decision affects ALL 80+ EMA-using indicators, creating systematic incompatibility
    with standard pandas workflows. Users applying pandas ewm() to same data see different values than
    ta library indicators.'
  evidence: BD-087,BD-044,BD-058
  stage: global
  _evidence_issues:
