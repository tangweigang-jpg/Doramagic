# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-122
name: ta
sop_version: '3.6'
source:
  projects:
  - ta-python
  commit_hash: a890410710a6e483c9ba08da7f3dd5089e4b9dff
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Technical analysis feature engineering from OHLCV time series data
  description: A Python library that computes 43+ technical indicators (RSI, MACD, Bollinger Bands, MFI,
    etc.) from financial OHLCV DataFrames, useful for feature engineering in trading strategies and machine
    learning pipelines.
  prerequisites: Users need Python >= 3.6, pandas, numpy, and OHLCV (Open-High-Low-Close-Volume) DataFrames
    with standard column names
  not_suitable_for: Real-time trading systems, backtesting frameworks, non-OHLCV data analysis, streaming
    data processing, or non-financial time series analysis
stages:
- id: data_input
  name: Data Input
  order: 1
  responsibility: Accept raw OHLCV pandas DataFrames and validate column presence. Acts as entry point
    for each feature engineering pipelines, orchestrating the addition of technical indicator columns
    in-place to the input DataFrame.
  interface:
    inputs:
    - pandas.DataFrame with OHLCV columns (open, high, low, close, volume)
    - column name strings for mapping
    - optional colprefix for namespacing
    outputs:
    - pandas.DataFrame with appended indicator columns in-place
  required_methods:
  - name: add_all_ta_features
    description: Main entry point that orchestrates addition of each 76-94 TA features (volume, volatility,
      trend, momentum, others) to DataFrame
    evidence: ta/wrapper.py:543(function)
  - name: add_volume_ta
    description: Adds volume-based indicators (MFI, ADI, OBV, CMF, Force Index, EoM, VPT, ATR Volume)
      to DataFrame
    evidence: ta/wrapper.py:64(function)
  - name: add_trend_ta
    description: Adds trend-based indicators (SMA, EMA, MACD, ADX, Aroon, PSAR, KAMA, TSI) to DataFrame
    evidence: ta/wrapper.py:223(function)
  - name: add_momentum_ta
    description: Adds momentum-based indicators (RSI, Stoch, TSI, Ultimate Osc, Williams %R, ROC) to DataFrame
    evidence: ta/wrapper.py:398(function)
  - name: add_volatility_ta
    description: Adds volatility-based indicators (Bollinger Bands, Keltner Channel, Donchian Channel,
      UI) to DataFrame
    evidence: ta/wrapper.py:151(function)
  key_behaviors:
  - behavior: In-place DataFrame mutation
    description: Wrapper functions mutate DataFrame by assigning to df[colname] in-place, enabling fluent
      API chaining without returning new DataFrames
    evidence: ta/wrapper.py:66(df[f'{self.colprefix}volume_adi'] = ..)
  - behavior: Column namespacing via colprefix
    description: colprefix parameter allows adding multiple indicator sets to the same DataFrame without
      column name conflicts (e.g., 'volume_adi', 'momentum_rsi')
    evidence: 'ta/wrapper.py:71(colprefix: str = "")'
  - behavior: Fixed indicator computation order
    description: 'add_all_ta_features calls indicators in fixed sequence: volume→volatility→trend→momentum→others;
      computation order is hardcoded'
    evidence: ta/wrapper.py:570-609(add_all_ta_features)
  - behavior: vectorized mode toggle
    description: vectorized=True skips non-vectorized indicators (ADX, CCI, Aroon, PSAR, KAMA, MFI, NVI,
      ATR, UI) yielding ~18 fewer features for performance
    evidence: ta/wrapper.py:209(if not vectorized:)
  replaceable_points:
  - name: Column naming convention
    description: Users can change column name prefixes via colprefix parameter to avoid conflicts when
      adding multiple indicator sets
    options:
    - name: empty string
      traits:
      - Default naming
      - Shorter column names
      - No namespacing
      fit_for:
      - Single indicator set per DataFrame
      - Simple use cases
      not_fit_for:
      - Multiple indicator sets on same DataFrame
      - Comparing different parameter sets
    - name: custom prefix
      traits:
      - Namespaced columns
      - Longer column names
      - Explicit separation
      fit_for:
      - Multiple indicator sets on same DataFrame
      - Parameter comparison experiments
      not_fit_for:
      - Simple use cases
      - Exporting to systems with column name length limits
    default: empty string
  design_decisions:
  - 'Wrapper functions take column NAME strings, not Series objects (evidence: ta/wrapper.py:66(high:
    str)) — Allows DataFrame mutation in-place via df[colname] assignment, enabling fluent API chaining
    without returning new DataFrames'
  - 'colprefix parameter allows namespacing multiple indicator sets (evidence: ta/wrapper.py:71(colprefix:
    str = "")) — Enables adding multiple TA feature sets to same DataFrame without column name conflicts
    (e.g., ''volume_adi'', ''momentum_rsi'')'
  - 'vectorized=True skips non-vectorized indicators (ADX, CCI, Aroon, PSAR, KAMA, MFI, NVI, ATR, UI)
    (evidence: ta/wrapper.py:209(if not vectorized:)) — Complex iterative algorithms with Python loops
    are skipped for performance; ~18 fewer features when enabled'
  - 'add_all_ta_features processes indicators in fixed volume→volatility→trend→momentum→others order (evidence:
    ta/wrapper.py:570-609(add_all_ta_features)) — Deterministic order ensures reproducible column ordering;
    allows later categories to build on earlier computations if needed'
  acceptance_hints:
  - DataFrame returned has same index as input (no reindexing)
  - 'Indicator columns follow naming pattern: {colprefix}{category}_{indicator_name}'
  - vectorized=True produces exactly 76 features; vectorized=False produces exactly 94 features
  - Missing OHLCV columns raise KeyError with informative message
- id: indicator_computation
  name: Indicator Computation
  order: 2
  responsibility: Compute mathematical transformations of OHLCV data to produce technical indicators.
    Each indicator class encapsulates one TA formula with consistent __init__ → _run → <result> pattern
    across each 41 indicator classes.
  interface:
    inputs:
    - pandas.Series extracted from DataFrame columns (close, high, low, volume)
    - window parameters (periods, window sizes)
    - fillna flag and value
    outputs:
    - pandas.Series with computed indicator values, preserving input Series index
  required_methods:
  - name: RSIIndicator.rsi
    description: Relative Strength Index - overbought/oversold detection using Wilder smoothing
    evidence: ta/momentum.py:14(class), ta/momentum.py:67(method)
  - name: MACD.macd/macd_signal/macd_diff
    description: Moving Average Convergence Divergence - trend momentum with signal line and histogram
    evidence: ta/trend.py:84(class), ta/trend.py:122-128(methods)
  - name: BollingerBands.bollinger_mavg/hband/lband/wband/pband/hband_indicator/lband_indicator
    description: Price volatility channels using standard deviation with 7 output methods
    evidence: ta/volatility.py:67(class), ta/volatility.py:92-158(methods)
  - name: MFIIndicator.money_flow_index
    description: Money Flow Index - volume-weighted RSI for overbought/oversold detection
    evidence: ta/volume.py:400(class), ta/volume.py:430(method)
  - name: IndicatorMixin._check_fillna
    description: Base mixin utility for handling NaN values in indicator results
    evidence: ta/utils.py:17(_fillna = False), ta/utils.py:28(method)
  key_behaviors:
  - behavior: IndicatorMixin inheritance pattern
    description: Every 41 indicators inherit from IndicatorMixin, implementing consistent __init__ → _run
      → <result> pattern with shared utilities
    evidence: ta/utils.py:14(class IndicatorMixin)
  - behavior: Series index preservation
    description: Every indicator outputs preserve the input Series index (no reindexing occurs), ensuring
      alignment with original DataFrame
    evidence: ta/momentum.py:50(index=self._close.index)
  - behavior: shift(1) hardcoded lookback
    description: Every return/change calculations use shift(1) for 1-period lookback; no abstraction for
      multi-timeframe analysis
    evidence: ta/momentum.py:37(diff), ta/momentum.py:91(shift)
  - behavior: Lazy evaluation for simple indicators
    description: Classes without _run() (EMAIndicator, SMAIndicator) compute on-demand when getter is
      called
    evidence: ta/trend.py:158(class EMAIndicator)
  replaceable_points:
  - name: Fill strategy
    description: _check_fillna behavior when _fillna=True controls how NaN values at series start are
      handled
    options:
    - name: ffill().bfill()
      traits:
      - Propagates last known value
      - Neutral for most indicators
      fit_for:
      - Smoothing indicators
      - General use
      not_fit_for:
      - Oscillators with midpoint semantics
      - Indicators where start values matter
    - name: ffill().fillna(value)
      traits:
      - Fills forward then with constant
      - Indicator-specific default
      fit_for:
      - Known neutral values
      - ML feature engineering
      not_fit_for:
      - Short series with insufficient warmup
    default: ffill().bfill() for fillna with -1
  - name: Rolling window minimum periods
    description: min_periods calculation determines when rolling window starts producing values
    options:
    - name: 0 (return partial results)
      traits:
      - Eager computation
      - May produce noisy early values
      fit_for:
      - Full data utilization
      - Long series
      not_fit_for:
      - Short series
      - Precise alignment requirements
    - name: window (strict)
      traits:
      - Conservative
      - Only complete windows produce values
      fit_for:
      - Consistency across indicators
      - Short series
      not_fit_for:
      - Edge cases with sparse data
    default: window (strict) when fillna=False
  - name: EMA smoothing method
    description: The _ema utility function smoothing behavior affects each EMA-based indicators
    options:
    - name: adjust=False (Wilder)
      traits:
      - Traditional exponential smoothing
      - Used by most TA textbooks
      fit_for:
      - Standard technical analysis
      - MACD/PPO compatibility
      not_fit_for:
      - Modern exponential decay models
      - Non-standard smoothing
    - name: adjust=True (Yahoo finance)
      traits:
      - Weight-based smoothing
      - Different convergence behavior
      fit_for:
      - Alternative smoothing methods
      - Research applications
      not_fit_for:
      - Standard TA compatibility
      - Existing indicators
    default: adjust=False (Wilder)
  design_decisions:
  - 'Every indicators inherit from IndicatorMixin, implementing __init__ → _run → <result> pattern (evidence:
    ta/utils.py:14(class IndicatorMixin)) — Consistent API across 45+ indicators; _run() performs computation,
    result methods return formatted Series'
  - '_fillna class attribute defaults to False; True triggers ffill+bfill or fillna(value) (evidence:
    ta/utils.py:17(_fillna = False)) — Conservative default preserves data integrity; fillna can mask
    calculation errors from insufficient data'
  - 'Each indicator uses different fillna DEFAULT values encoding business assumptions (evidence: ta/volatility.py:107(value=-1),
    ta/momentum.py:59(value=50), ta/others.py:93(value=-1)) — Context-appropriate defaults: -1 for price-derived
    (can''t be price), 50 for oscillators (neutral mid), 0 for differences'
  - 'shift() uses fill_value=series.mean() as workaround for edge values (evidence: ta/trend.py:500(fill_value=self._close.mean()))
    — Newer pandas requires explicit fill_value; using mean() avoids NaN propagation at series start'
  - 'EMA uses adjust=False for traditional exponential smoothing (not Yahoo finance variant) (evidence:
    ta/utils.py:66(adjust=False)) — Standard TA textbooks use recursive EMA; adjust=True gives weight-based
    smoothing with different results'
  - 'BollingerBands uses ddof=0 (population std) while pandas defaults to ddof=1 (sample std) (evidence:
    ta/volatility.py:96(ddof=0)) — Matches original Bollinger specification; produces narrower bands than
    typical statistical expectation'
  - '_true_range static method shared across ATR, ADX, Vortex indicators (evidence: ta/utils.py:38(@staticmethod))
    — DRY principle: True Range formula is identical across multiple indicators; single point to change'
  acceptance_hints:
  - Output Series preserves input Series index (same object, not reindexed)
  - Output Series has name attribute set to indicator-specific string
  - fillna value of -1 indicates price-derived indicator (can't be negative)
  - fillna value of 50 indicates normalized oscillator (neutral midpoint)
  - fillna value of 0 indicates difference/ratio indicator
  - min_periods for rolling windows = 0 when fillna=True, else = window
  - Bollinger Bands produce narrower channels than sample std would give (ddof=0)
- id: feature_aggregation
  name: Feature Aggregation
  order: 3
  responsibility: Combine multiple related indicator outputs into single API calls. Each indicator may
    produce multiple derived outputs (e.g., MACD line, signal, histogram) from a single _run() computation
    to avoid recomputing rolling windows.
  interface:
    inputs:
    - Single indicator class instance with cached _run() results
    - window parameters
    outputs:
    - Multiple pandas.Series (e.g., macd, macd_signal, macd_diff) from separate getter methods
  required_methods:
  - name: BollingerBands.bollinger_mavg
    description: Middle band - n-period simple moving average of close price
    evidence: ta/volatility.py:92(method)
  - name: BollingerBands.bollinger_hband/bollinger_lband
    description: Upper/lower bands at mavg ± (k * stddev with ddof=0)
    evidence: ta/volatility.py:96-110(methods)
  - name: BollingerBands.bollinger_pband
    description: Percentage band - current position within bands (0-100%)
    evidence: ta/volatility.py:148(method)
  - name: MACD.macd
    description: MACD line - fast EMA minus slow EMA
    evidence: ta/trend.py:122(method)
  - name: MACD.macd_signal
    description: Signal line - EMA of MACD line
    evidence: ta/trend.py:125(method)
  - name: MACD.macd_diff
    description: Histogram - MACD line minus signal line
    evidence: ta/trend.py:128(method)
  - name: StochasticOscillator.stoch/stoch_signal
    description: Stochastic %K and %D values for overbought/oversold detection
    evidence: ta/momentum.py:320-330(methods)
  key_behaviors:
  - behavior: Single _run() computes each derived values
    description: Every derived values (_macd, _signal, _diff) computed once in _run(); getter methods
      return formatted copies
    evidence: ta/trend.py:115(def _run(self))
  - behavior: Percentage calculations use np.nan where division by zero
    description: When hband == lband (zero range), percentage is undefined; explicit NaN over 0 or inf
    evidence: ta/volatility.py:148(.where(self._hband != self._lband, np.nan))
  - behavior: Lazy cached computation
    description: Internal pandas.Series (_rsi, _macd, etc.) cached as instance attributes; computed once
      on first getter call
    evidence: ta/trend.py:115-128(_run assigns self._macd, self._signal, self._diff)
  replaceable_points:
  - name: Derived output selection
    description: Users call only needed getter methods; unused derived values are still computed but not
      accessed
    options:
    - name: any subset
      traits:
      - Minimal memory footprint
      - Selective feature extraction
      fit_for:
      - Feature engineering with specific indicators
      - Memory-constrained environments
      not_fit_for:
      - Batch processing each derived values
      - Performance-critical paths
    - name: all
      traits:
      - Complete feature set
      - Simpler code path
      fit_for:
      - Comprehensive feature engineering
      - ML training pipelines
      not_fit_for:
      - Memory-constrained environments
      - Selective indicator use
    default: each via wrapper
  design_decisions:
  - 'Single _run() computes each derived values; multiple getter methods return formatted results (evidence:
    ta/trend.py:115(def _run(self))) — Avoids recomputing rolling windows; efficiency matters for long
    time series'
  - 'Percentage band (pband) uses np.nan where division by zero occurs (evidence: ta/volatility.py:148(.where(self._hband
    != self._lband, np.nan))) — When hband == lband (zero range), percentage is undefined; explicit NaN
    over 0 or inf'
  acceptance_hints:
  - Every derived methods from same class use identical Series index
  - pband values are NaN when hband equals lband (flat channels)
  - macd_diff equals macd minus macd_signal at each point
  - No recomputation occurs when calling multiple getter methods
- id: functional_api
  name: Functional API Layer
  order: 4
  responsibility: Provide stateless function wrappers for each indicator, enabling both OOP and functional
    usage patterns. Functions instantiate classes internally and call single result methods, serving both
    OOP users needing multiple outputs and functional users wanting single calls.
  interface:
    inputs:
    - pandas.Series, window params, fillna flag
    outputs:
    - pandas.Series with computed indicator
  required_methods:
  - name: rsi
    description: Functional wrapper for RSIIndicator - computes Relative Strength Index in single call
    evidence: ta/momentum.py:1352(function), ta/momentum.py:1388(implementation)
  - name: macd
    description: Functional wrapper for MACD - computes MACD line only (not signal or histogram)
    evidence: ta/trend.py:1186(function), ta/trend.py:1216(implementation)
  - name: bollinger_mavg
    description: Functional wrapper for Bollinger middle band - n-period SMA of close
    evidence: ta/volatility.py:497(function), ta/volatility.py:515(implementation)
  - name: money_flow_index
    description: Functional wrapper for MFIIndicator - volume-weighted RSI
    evidence: ta/volume.py:486(function)
  - name: on_balance_volume
    description: Functional wrapper for OnBalanceVolumeIndicator - cumulative volume-based trend
    evidence: ta/volume.py:252(function)
  key_behaviors:
  - behavior: Dual API pattern
    description: Every indicator has both Class and Function wrapper APIs; functions instantiate classes
      internally
    evidence: ta/momentum.py:1388(return RSIIndicator(...).rsi())
  - behavior: Single-output functions
    description: Functional wrappers return only primary output (e.g., macd not macd_signal or macd_diff)
    evidence: ta/trend.py:1216(return RSIIndicator(close=close, ...).rsi())
  - behavior: Window value differences from classes
    description: Wrapper functions default window values may differ from class defaults to target common
      use cases
    evidence: ta/momentum.py:1237(window=12) vs RSIIndicator(window=14)
  replaceable_points:
  - name: API style
    description: User preference for OOP vs functional programming patterns
    options:
    - name: IndicatorMixin subclasses
      traits:
      - Stateful
      - Multiple outputs from single instance
      - Efficient for multiple getters
      fit_for:
      - OOP applications
      - Multiple derived outputs
      - Interactive exploration
      not_fit_for:
      - Functional pipelines
      - One-liners
      - Map/reduce patterns
    - name: standalone functions
      traits:
      - Stateless
      - Single output
      - Pipeline-friendly
      fit_for:
      - Functional pipelines
      - df.apply() patterns
      - Quick calculations
      not_fit_for:
      - Multiple outputs from same indicator
      - Interactive exploration
    default: Either works
  design_decisions:
  - 'Functional wrappers instantiate class and call single result method (evidence: ta/momentum.py:1388(return
    RSIIndicator(...).rsi())) — Dual API (class + function) serves both OOP users needing multiple outputs
    and functional users wanting single call'
  - 'Wrapper functions default window values may differ from class defaults (evidence: ta/momentum.py:1237(window=12)
    vs RSIIndicator(window=14)) — Wrapper targets common use case; class allows full customization'
  acceptance_hints:
  - rsi() returns same result as RSIIndicator(...).rsi() with same parameters
  - Functions are stateless - no instance retention between calls
  - Wrapper defaults (e.g., window=12 for RSI) differ from class defaults (window=14)
- id: data_cleanup
  name: Data Cleanup Utility
  order: 5
  responsibility: Remove rows with invalid numeric values (NaN, inf, zero) that would corrupt indicator
    calculations. Acts as data quality gate before and after indicator computation.
  interface:
    inputs:
    - pandas.DataFrame with numeric columns
    outputs:
    - pandas.DataFrame with invalid rows removed
  required_methods:
  - name: dropna
    description: Removes rows containing inf, -inf, or zero values in numeric columns to prevent division-by-zero
      errors in indicator calculations
    evidence: ta/utils.py:49(function)
  key_behaviors:
  - behavior: exp(709) threshold for inf detection
    description: Uses math.exp(709) as large number threshold instead of np.inf to avoid unexpected comparison
      behavior
    evidence: ta/utils.py:53(df[number_cols] < math.exp(709))
  - behavior: Zero value removal
    description: Removes zero values in addition to NaN/inf since zero prices (possible data errors) would
      create division-by-zero in returns/indicators
    evidence: ta/utils.py:54(df[number_cols] != 0.0)
  replaceable_points: []
  design_decisions:
  - 'Dropna uses exp(709) as large number threshold instead of np.inf (evidence: ta/utils.py:53(df[number_cols]
    < math.exp(709))) — Avoids comparison with np.inf which can behave unexpectedly; exp(709) approaches
    float64 max'
  - 'Removes zero values in addition to NaN/inf (evidence: ta/utils.py:54(df[number_cols] != 0.0)) — Zero
    prices (possible data errors) would create division-by-zero in returns/indicators'
  acceptance_hints:
  - Output DataFrame has no rows with inf, -inf, or zero in numeric columns
  - Non-numeric columns are not checked
  - Remaining rows retain original order
  - Shape reduction indicates number of invalid rows removed
data_flow:
- from_stage: data_input
  to_stage: indicator_computation
  data: pandas.Series extracted from DataFrame columns (close, high, low, volume) passed to indicator
    constructors
- from_stage: indicator_computation
  to_stage: feature_aggregation
  data: Internal pandas.Series (_rsi, _macd, _signal, _diff, etc.) cached as instance attributes from
    _run() computation
- from_stage: feature_aggregation
  to_stage: data_input
  data: Named pandas.Series assigned to df[colname] in-place via wrapper methods
- from_stage: data_input
  to_stage: data_cleanup
  data: pandas.DataFrame with potential NaN/inf/zero values from raw data or indicator computation
- from_stage: data_cleanup
  to_stage: data_input
  data: Cleaned pandas.DataFrame ready for indicator computation or final output
global_contracts:
- contract: Every indicator output Series preserve input Series index (no reindexing occurs)
  evidence: ta/momentum.py:50(index=self._close.index)
- contract: Every Series outputs have name attribute set to indicator-specific string (e.g., 'rsi', 'macd',
    'macd_signal')
  evidence: ta/momentum.py:60(name="rsi")
- contract: fillna value of -1 indicates price-derived indicator (can't be negative price or range)
  evidence: ta/volatility.py:107(value=-1), ta/others.py:93(value=-1)
- contract: fillna value of 50 indicates normalized oscillator (neutral midpoint of 0-100 range)
  evidence: ta/momentum.py:59(value=50)
- contract: fillna value of 0 indicates difference/ratio indicator (neutral at zero crossing)
  evidence: ta/trend.py:128(value=0)
- contract: vectorized=True produces exactly 76 features; vectorized=False produces exactly 94 features
  evidence: test/integration/wrapper.py:65(shape[1] == 94)
- contract: min_periods for rolling windows = 0 when fillna=True, else = window (strict)
  evidence: ta/utils.py:60(min_periods=0 if fillna else periods)
- contract: BollingerBands uses ddof=0 (population standard deviation) not pandas default ddof=1 (sample
    std)
  evidence: ta/volatility.py:96(ddof=0)
- contract: Every indicators use shift(1) for 1-period lookback; no abstraction for configurable lookback
    periods
  evidence: ta/momentum.py:37(diff), ta/momentum.py:91(shift)
- contract: EMA smoothing uses adjust=False (traditional Wilder smoothing) across each EMA-based indicators
  evidence: ta/utils.py:66(adjust=False)
business_decisions:
- id: BD-001
  type: B/BA
  content: RSI default window=14, EMA-based calculation using alpha=1/window
  rationale: 'Window of 14 periods is the industry standard established by Wilder in his 1978 book, providing
    balance between signal responsiveness and noise filtering. The alpha=1/window parameter ensures EMA
    smoothing scales proportionally with window size. BOUNDARY: Shorter windows (e.g., 7) increase sensitivity
    but generate more false signals; longer windows (e.g., 21) reduce sensitivity but delay trend changes.'
  evidence: ta/momentum.py:30(RSIIndicator.__init__)
  stage: indicator_computation
  alternative_considered: Alternative windows of 7 or 21 were considered but rejected in favor of the
    canonical 14-period standard
- id: BD-002
  type: B/BA
  content: 'MACD default windows: slow=26, fast=12, signal=9'
  rationale: 'These defaults derive from Gerald Appel''s original MACD specification using half-trading-month
    (12) and full-trading-month (26) periods. The signal line of 9 provides adequate smoothing to filter
    whipsaws while remaining responsive to trend changes. BOUNDARY: These values assume ~252 trading days/year;
    crypto or other markets with different trading patterns may require adjustment.'
  evidence: ta/trend.py:100-113(MACD.__init__)
  stage: indicator_computation
  alternative_considered: Alternative 8/17/9 or 5/35 configurations were considered for faster/slower
    response but rejected
- id: BD-003
  type: B/BA
  content: 'Bollinger Bands default: window=20, window_dev=2, ddof=0 (population std)'
  rationale: 'Window of 20 approximates one trading month; 2 standard deviations captures ~95% of price
    action under normal distribution assumptions. Using ddof=0 (population std) matches Bollinger''s original
    specification rather than sample std. BOUNDARY: In volatile markets, bands may be breached frequently;
    in trending markets, price can ride bands for extended periods without mean reversion.'
  evidence: ta/volatility.py:67(bollingerbands)
  stage: indicator_computation
  alternative_considered: Sample std (ddof=1) was rejected to match Bollinger's original specification
  _evidence_issues:
  - 'FN_NOT_FOUND: bollingerbands in ta/volatility.py'
- id: BD-004
  type: B/BA
  content: 'KAMA default: window=10, pow1=2, pow2=30 for efficiency ratio'
  rationale: 'Window of 10 provides sensitivity to short-term changes while pow1=2 and pow2=30 were determined
    empirically by Kaufman to balance responsiveness against noise. The squared power on efficiency ratio
    ensures non-linear smoothing adjustment. BOUNDARY: The original implementation uses these exact values;
    changing pow1/pow2 significantly alters the smoothing behavior.'
  evidence: ta/momentum.py:302-315(KAMAIndicator.__init__)
  stage: indicator_computation
  alternative_considered: Other power combinations were rejected based on Kaufman's original research
- id: BD-005
  type: B/BA
  content: CCI default constant=0.015 (0.015 = typical commodity constant)
  rationale: 'The 0.015 constant scales CCI values so approximately 70-80% of readings fall within -100
    to +100 under normal market conditions, matching the original commodity trading convention. This creates
    meaningful overbought/oversold thresholds. BOUNDARY: The percentage is market-dependent; highly volatile
    assets may have CCI readings outside ±100 frequently.'
  evidence: ta/trend.py:635-642(CCIIndicator.__init__)
  stage: indicator_computation
  alternative_considered: Different constants would alter the percentage of readings within ±100 range
- id: BD-006
  type: B/BA
