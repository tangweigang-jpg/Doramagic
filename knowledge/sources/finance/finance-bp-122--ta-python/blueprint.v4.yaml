- id: BD-104
  type: BA
  content: 'INTERACTION: [BD-091] × [BD-004] × [BD-050] → KAMA np.roll() boundary issue corrupts Efficiency
    Ratio calculation'
  rationale: 'KAMA uses np.roll() for Efficiency Ratio calculation (BD-091), which wraps array boundaries
    and creates spurious first-value calculations. RISK CASCADE: The Efficiency Ratio (BD-050) directly
    determines KAMA''s adaptive smoothing constant, so corrupted ER values produce incorrect KAMA outputs.
    The first N values may incorporate wrapped last-element data, affecting trend signals near series
    start.'
  evidence: BD-091,BD-004,BD-050
  stage: global
  _evidence_issues:
