  rationale: 'BD-005 schedules factor pre-computation at 6AM; BD-002/BD-093 configure TuShare rate limits
    at 90% utilization. If batch processing exhausts rate limits during 6AM window, factor computation
    fails silently, producing no factors. This cascades directly to BD-009/BD-010 (no quantitative outputs
    for LLM explanation), BD-011 (no stock recommendations), and BD-053 (no user-facing recommendations).
    Result: complete service failure during market open when users expect working system. Chain: rate
    limit hit → factors missing → recommendations empty → user-facing errors.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Staggered computation or larger rate limit margin would reduce cascade probability
