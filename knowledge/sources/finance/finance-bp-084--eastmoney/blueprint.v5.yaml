data_flow:
- from_stage: scheduling
  to_stage: data_collection
  data: Trigger signal at 6AM → DataSourceManager fetches latest OHLCV, NAV, money flow data from TuShare/AkShare
- from_stage: data_collection
  to_stage: factor_computation
  data: Raw market data (OHLCV, fund NAV, money flow) → stored in SQLite DB with WAL mode, retrieved by
    DailyFactorComputer
- from_stage: scheduling
  to_stage: factor_computation
  data: Trigger signal at 6AM → DailyFactorComputer.batch_compute processes 100 stocks/fund per batch
    with 4 threads
- from_stage: factor_computation
  to_stage: recommendation
  data: Computed factors (technical/risk/sentiment scores) from FactorCache with memory (5min) and DB
    (1day) TTL
- from_stage: recommendation
  to_stage: llm_services
  data: Factor scores (top 20 candidates max) → LLM generates explanations (max 2 batched calls of 10
    each)
- from_stage: scheduling
  to_stage: portfolio_management
  data: Trigger at 11PM → snapshot_portfolios records position values (skip if prices unavailable)
- from_stage: portfolio_management
  to_stage: llm_services
  data: Position signals (opportunity/risk/neutral) with strength 0-1 → LLM generates rebalancing suggestions
- from_stage: external
  to_stage: analysis_reporting
  data: Tavily web search results, market data feeds → PreMarketAnalyst/PostMarketAnalyst/GoldSilverAnalyst
- from_stage: analysis_reporting
  to_stage: llm_services
  data: Collected analysis data (money flow, sentiment, technical indicators) → LLM synthesis for report
    generation
