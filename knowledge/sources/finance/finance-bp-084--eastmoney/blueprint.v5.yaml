# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-084
name: VAlpha Terminal
sop_version: '3.6'
source:
  projects:
  - eastmoney
  commit_hash: e293bf7effad2898e996c724ad3c8faa8b3a4f9a
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: AI-powered financial intelligence platform for Chinese A-share market
  description: Intelligent financial analysis platform integrating portfolio management, fund analysis,
    stock monitoring, AI recommendation, news sentiment analysis with LLM-generated reports for Chinese
    A-share investors.
  prerequisites: Python 3.10+, Node.js 18+, understanding of Chinese financial market terminology, TuShare/AkShare
    API keys configured, LLM API keys (Gemini/OpenAI), Chinese trading calendar awareness
  not_suitable_for: Real-time trading execution, non-Chinese markets without significant adaptation, high-frequency
    trading strategies requiring sub-second data, institutional-grade portfolio management requiring multi-currency
    support
  activation:
    triggers:
    - Starting complex tasks with 3+ steps
    - Research tasks requiring source gathering
    - Building or creating something multi-phase
    - Tasks spanning multiple tool calls
    - Anything requiring organization and progress tracking
    - When user mentions planning, organizing work, tracking progress
    - When user wants structured output
    emphasis:
    - Use ESPECIALLY when task complexity exceeds single tool call
    - Use ESPECIALLY when context is growing and risk of losing goals increases
    - Use ESPECIALLY when errors may occur and tracking matters
    anti_skip:
    - Don't skip because task seems simple - even 3-step tasks benefit from tracking
    - Don't skip because context window feels sufficient - it degrades after ~50 tool calls
    - Don't skip error logging - it builds institutional knowledge for future tasks
stages:
- id: data_collection
  name: Data Collection
  order: 1
  responsibility: Fetches market data from multiple providers with caching, rate limiting, and circuit
    breaker patterns. Acts as the single entry point for external data, routing to TuShare (Chinese stocks/funds),
    yFinance (US markets), or AkShare (fallback).
  interface:
    inputs:
    - asset_code (6-digit stock/fund code)
    - date_range (start/end dates)
    - data_type (OHLCV, NAV, money_flow)
    outputs:
    - DataFrame with OHLCV data, fund NAV history, money flow data
  required_methods:
  - name: DataSourceManager.fetch_data
    description: Multi-source routing with automatic fallback from TuShare to AkShare on failure
    evidence: src/data_sources/data_source_manager.py:72(_call_with_fallback)
  - name: TuShareClient.get_daily_bars
    description: Primary Chinese market data API client for OHLCV retrieval
    evidence: src/data_sources/tushare_client.py:1(TuShareClient)
  - name: RateLimiter.acquire
    description: Tier-based API rate limiting based on TUSHARE_POINTS environment variable
    evidence: src/data_sources/rate_limiter.py:1(TuShareRateLimiter)
  - name: CircuitBreaker.call
    description: Prevents cascading API failures with 60-second recovery cooldown
    evidence: src/data_sources/circuit_breaker.py:1(CircuitBreaker)
  key_behaviors:
  - behavior: Multi-source fallback architecture
    description: When TuShare fails, automatically falls back to AkShare. Prevents single API failure
      from blocking each operations. The fallback chain ensures reliability for critical data fetches.
    evidence: src/data_sources/data_source_manager.py:72(_call_with_fallback)
  - behavior: Tier-based rate limiting
    description: Rate limits auto-configured from TUSHARE_POINTS env var (120/2000/5000/10000 points).
      No code changes needed when upgrading API tier. Prevents throttling while maximizing throughput.
    evidence: src/data_sources/rate_limiter.py:1(TuShareRateLimiter)
  - behavior: Circuit breaker with 60s recovery
    description: After detecting failures, circuit opens for 60 seconds before attempting recovery. Prevents
      hammering failing APIs and allows service recovery without user intervention.
    evidence: src/data_sources/circuit_breaker.py:1(CircuitBreaker)
  - behavior: WAL mode + 60s busy timeout for SQLite
    description: WAL (Write-Ahead Logging) enables concurrent reads during writes. 60-second busy timeout
      prevents lock errors on constrained servers (2H4G specification).
    evidence: src/storage/db.py:23(conn.execute)
  replaceable_points:
  - name: data_source_provider
    description: Primary data source provider selection for market data
    options:
    - name: tushare
      traits:
      - Primary Chinese market data
      - Higher rate limits with points
      - Rich fundamental data
      fit_for:
      - Chinese A-shares analysis
      - Fundamental analysis
      - Production deployment
      not_fit_for:
      - US markets
      - When TuShare API unavailable
    - name: akshare
      traits:
      - Free alternative
      - Broader asset coverage
      - Good for fallback
      fit_for:
      - Testing
      - When TuShare rate limited
      - Commodities data
      not_fit_for:
      - Production requiring high reliability
      - Complex fundamental queries
    - name: hybrid
      traits:
      - Automatic fallback
      - Highest reliability
      - Best of both worlds
      fit_for:
      - Production systems
      - Mission-critical analysis
      not_fit_for:
      - Maximum speed (fallback adds latency)
    default: hybrid
  design_decisions:
  - 'Multi-source fallback architecture: Prevents single API failure from blocking each operations. TuShare→AkShare
    chain ensures reliability. (src/data_sources/data_source_manager.py:72)'
  - 'Tier-based rate limiting from env var: TUSHARE_POINTS env var (120/2000/5000/10000) auto-configures
    limits without code changes. (src/data_sources/rate_limiter.py:1)'
  - 'Circuit breaker with 60s recovery: Prevents hammering failing APIs; 60s cooldown allows recovery
    without user intervention. (src/data_sources/circuit_breaker.py:1)'
  - 'WAL mode + 60s busy timeout for SQLite: WAL enables concurrent reads during writes; 60s timeout prevents
    lock errors on 2H4G server. (src/storage/db.py:23)'
  acceptance_hints:
  - DataCollection fetches OHLCV data successfully from at least one provider
  - RateLimiter correctly throttles requests when TUSHARE_POINTS threshold reached
  - CircuitBreaker opens after 5 consecutive failures and recovers after 60s
  - Stock codes normalized to 6 digits without exchange suffix in DB storage
  - Fund codes follow 6-digit convention with .OF for OTC, .SH/.SZ for ETFs
- id: factor_computation
  name: Factor Computation
  order: 2
  responsibility: Computes quantitative factors (technical, fundamental, risk, sentiment) for stocks and
    funds. Runs as scheduled task at 6:00 AM daily. Uses batch processing (100 stocks/batch, 4 threads)
    optimized for 2H4G server memory constraints.
  interface:
    inputs:
    - trade_date (YYYYMMDD)
    - stock/fund codes (optional, defaults to universe)
    outputs:
    - 'Factor dicts: {technical: {score, indicators}, fundamental: {}, risk: {}, sentiment: {}}'
  required_methods:
  - name: DailyFactorComputer.compute_all
    description: Batch factor computation orchestrator that processes stocks/funds in batches of 100
    evidence: src/analysis/recommendation/factor_store/daily_computer.py:40
  - name: TechnicalFactors.compute
    description: Consolidation/volume/MA convergence scoring for short-term signals
    evidence: src/analysis/recommendation/stock_engine/factors/technical.py:24
  - name: RiskFactors.compute
    description: Sharpe/Sortino/Calmar/MaxDrawdown computation for fund risk assessment
    evidence: src/analysis/recommendation/fund_engine/factors/risk.py:22
  - name: FactorCache.get
    description: 'Multi-level cache retrieval: memory cache (5min TTL) or DB cache (1day TTL)'
    evidence: src/analysis/recommendation/factor_store/cache.py:89
  key_behaviors:
  - behavior: Pre-computation at 6AM scheduling
    description: Factors must exist before user requests; TuShare API limits make on-demand computation
      impossible at scale. Scheduled execution ensures fresh factors available during market hours.
    evidence: src/scheduler/manager.py:144(add_factor_computation_job)
  - behavior: Batch processing with 100 stocks/batch
    description: Memory-constrained server (2H4G) requires batching to avoid OOM errors. Batch size of
      100 balances memory usage with throughput efficiency.
    evidence: src/analysis/recommendation/factor_store/daily_computer.py:51(BATCH_SIZE=100)
  - behavior: Multi-level cache hierarchy
    description: Hot data (in-request) served from memory (5min TTL); end-of-day data persisted to DB
      for next-day queries. Reduces API calls and improves response times.
    evidence: src/analysis/recommendation/factor_store/cache.py:98(MEMORY_TTL_HOT=300)
  - behavior: RISK_FREE_RATE = 0.02 hardcoded
    description: Chinese market assumption (2% annual risk-free rate) enables Sharpe/Sortino ratio computation
      without external rate API dependency. Affects each risk-adjusted return calculations.
    evidence: src/analysis/recommendation/fund_engine/factors/risk.py:30(RISK_FREE_RATE)
  replaceable_points:
  - name: factor_computation_schedule
    description: Daily computation timing for factor pre-computation
    options:
    - name: 06:00
      traits:
      - Default timing
      - Pre-market computation
      - Fresh factors before market open
      fit_for:
      - Standard trading days
      - Production deployment
      not_fit_for:
      - Late-starting data feeds
      - Weekend testing
    - name: 07:00
      traits:
      - Later timing
      - More data availability
      - Slightly fresher close prices
      fit_for:
      - When 6AM TuShare data incomplete
      - Delayed data scenarios
      not_fit_for:
      - Early morning traders
      - Real-time analysis needs
    - name: custom
      traits:
      - Flexible timing
      - Configurable per environment
      fit_for:
      - Testing scenarios
      - Different market hours
      not_fit_for:
      - Production with fixed schedules
    default: 06:00
  design_decisions:
  - 'Pre-computation at 6AM, not on-demand: Factors must exist before user requests; TuShare API limits
    make on-demand impossible at scale. (src/scheduler/manager.py:144)'
  - 'Batch processing with 100 stocks/batch: Memory-constrained server (2H4G) requires batching to avoid
    OOM; 100 is sweet spot for throughput. (src/analysis/recommendation/factor_store/daily_computer.py:51)'
  - 'Memory cache 5min + DB cache 1day: Hot data (in-request) served from memory; end-of-day data persisted
    to DB for next-day queries. (src/analysis/recommendation/factor_store/cache.py:98)'
  - 'RISK_FREE_RATE = 0.02 hardcoded: Chinese market assumption (2% annual); enables Sharpe/Sortino without
    external rate API dependency. (src/analysis/recommendation/fund_engine/factors/risk.py:30)'
  acceptance_hints:
  - DailyFactorComputer completes within 30 minutes for full universe
  - FactorCache returns cached results within 50ms for repeated queries
  - Every computed factors have short_term_score and long_term_score fields
  - NaN/Inf values sanitized before storage in factor cache
  - Factor store uses YYYY-MM-DD date format in database (converted from YYYYMMDD input)
- id: recommendation
  name: Recommendation Engine
  order: 3
  responsibility: Generates ranked stock/fund recommendations using pre-computed factors and strategy
    scoring. LLM used only for explanation, not selection. Supports short-term (7-30d) and long-term (6-12m)
    horizons with quality gates.
  interface:
    inputs:
    - trade_date
    - strategy (short/long)
    - top_n limit
    - sector preference (optional)
    outputs:
    - List of {code, name, score, confidence, factors, explanation}
  required_methods:
  - name: RecommendationEngine.get_recommendation
    description: Main orchestrator that combines stock and fund engines, applies sector preferences
    evidence: src/analysis/recommendation/engine.py:32
  - name: StockRecommendationEngine.generate
    description: Stock factor orchestration and scoring with quality gates
    evidence: src/analysis/recommendation/stock_engine/engine.py:30
  - name: FundRecommendationEngine.generate
    description: Fund factor orchestration and scoring
    evidence: src/analysis/recommendation/fund_engine/engine.py:27
  - name: ShortTermStrategy.compute_score
    description: Technical 40% + Accumulation 25% + Catalyst 20% + Risk 15% weighting
    evidence: src/analysis/recommendation/stock_engine/strategies/short_term.py:23
  - name: AlphaStrategy.compute_score
    description: Risk-adjusted 35% + Drawdown 25% + Manager 25% + Holdings 15% weighting
    evidence: src/analysis/recommendation/fund_engine/strategies/alpha.py:13
  key_behaviors:
  - behavior: Quantitative selects, LLM explains
    description: Factor-based selection avoids LLM hallucination in critical investment decisions. Factors
      are traceable and auditable. LLM only generates human-readable explanations for pre-selected candidates.
    evidence: src/analysis/recommendation/engine.py:9(Key principles)
  - behavior: Max 2 LLM calls per cycle, batch 10
    description: 'Token cost control strategy: 2 calls × 10 items = 20 explanations maximum per request
      cycle. Prevents runaway LLM costs while providing batch explanations.'
    evidence: src/analysis/recommendation/llm_synthesis/explainer.py:26(BATCH_SIZE=10)
  - behavior: Quality gate for long-term stocks
    description: Long-term recommendations require fundamental health checks (ROE/PEG gates). Short-term
      is purely technical. Quality gates prevent recommending fundamentally unhealthy stocks for long-term
      holding.
    evidence: src/analysis/recommendation/stock_engine/engine.py:169(passes_quality_gate)
  - behavior: Sell-first signal ordering
    description: Signal generation follows sell-first then buy ordering. Sell recommendations gate buy
      generation. Changing this ordering would fundamentally change portfolio behavior.
    evidence: src/analysis/recommendation/engine.py:178-183(gen_recommendation)
  - behavior: Score thresholds differ by asset type
    description: Stocks require MIN_SCORE=60 (more volatile), funds require MIN_SCORE=55 (less volatile).
      Different thresholds reduce false positives for each asset class.
    evidence: src/analysis/recommendation/stock_engine/engine.py:38(MIN_SCORE_SHORT=60)
  replaceable_points:
  - name: strategy_weights
    description: Factor weight allocation for recommendation scoring
    options:
    - name: default
      traits:
      - Balanced weights
      - Moderate risk
      - Well-tested
      fit_for:
      - General investors
      - Balanced portfolios
      not_fit_for:
      - Aggressive traders
      - Conservative investors
    - name: aggressive_technical
      traits:
      - Higher technical weight
      - Faster signals
      - More trades
      fit_for:
      - Active traders
      - Short-term focused
      not_fit_for:
      - Long-term investors
      - Risk-averse users
    - name: conservative_quality
      traits:
      - Higher fundamental weight
      - Quality focus
      - Fewer but higher conviction
      fit_for:
      - Long-term investors
      - Retirement accounts
      not_fit_for:
      - Short-term traders
      - Growth-focused portfolios
    default: default
  - name: min_score_threshold
    description: Minimum score cutoff for including recommendations
    options:
    - name: '60'
      traits:
      - High bar
      - Fewer but higher quality signals
      - Lower false positives
      fit_for:
      - Quality-focused investors
      - Long-term portfolios
      not_fit_for:
      - When universe is small
      - High-volatility markets
    - name: '55'
      traits:
      - Moderate bar
      - More signals
      - Balanced approach
      fit_for:
      - General use
      - Medium-sized universes
      not_fit_for:
      - Large universes
      - Conservative investors
    - name: '50'
      traits:
      - Lower bar
      - More signals
      - Higher recall
      fit_for:
      - Screening purposes
      - Large universes
      not_fit_for:
      - Quality-focused
      - Small universes
    default: '60'
  design_decisions:
  - 'Quantitative selects, LLM explains: Avoids LLM hallucination in selection; factors are traceable
    and auditable. (src/analysis/recommendation/engine.py:9)'
  - 'Max 2 LLM calls per cycle, batch 10: Token cost control; 2 calls × 10 = 20 explanations max per request
    cycle. (src/analysis/recommendation/llm_synthesis/explainer.py:26)'
  - 'Quality gate for long-term stocks: Long-term requires fundamental health (ROE/PEG gates); short-term
    is purely technical. (src/analysis/recommendation/stock_engine/engine.py:169)'
  - 'SECTOR_KEYWORDS dict for preference matching: Maps user-friendly sector names to DB industry keywords;
    enables flexible user preference filtering. (src/analysis/recommendation/engine.py:42)'
  - 'MIN_SCORE_SHORT=60 for stocks, 55 for funds: Stocks more volatile, require higher threshold (60)
    vs funds (55) to reduce false positives. (src/analysis/recommendation/stock_engine/engine.py:38)'
  acceptance_hints:
  - get_recommendation returns sorted list with scores in range 0-100
  - LLM explanations generated only for top 20 candidates (2 calls × 10 batch)
  - Long-term recommendations pass ROE/PEG quality gates
  - Sector preference filtering correctly maps to database industry codes
  - Factor scores normalized to 0-100 scale before final ranking
- id: analysis_reporting
  name: Analysis & Reporting
  order: 4
  responsibility: Generates pre/post-market analysis reports for funds and stocks using LLM synthesis.
    Supports multi-agent approach for commodities (gold/silver). Includes sentiment, money flow, and sector
    analysis with source tracking.
  interface:
    inputs:
    - fund/stock code
    - mode (pre/post)
    - collected data (OHLCV, news, money flow)
    outputs:
    - Markdown report with sources, recommendations, sentiment analysis
  required_methods:
  - name: PreMarketAnalyst.analyze
    description: Pre-market analysis collection including overnight news and futures data
    evidence: src/analysis/pre_market.py:1
  - name: PostMarketAnalyst.analyze
    description: Post-market analysis including daily performance and fund flow analysis
    evidence: src/analysis/post_market.py:1
  - name: GoldSilverAnalyst.analyze
    description: Multi-agent commodity analysis using Data→Macro→Quantitative→Research→Technical→LLM sequence
    evidence: src/analysis/commodities/gold_silver.py:30
  - name: BaseAnalyst._build_prompt
    description: Shared analyst scaffolding that constructs prompts from strategy compute_score methods
    evidence: src/analysis/base_analyst.py:23
  key_behaviors:
  - behavior: Source tracking with deduplication
    description: Each analyst tracks sources independently. _add_source prevents duplicates by title+URL
      combination. Ensures report citations are clean and verifiable.
    evidence: src/analysis/base_analyst.py:54(_reset_sources)
  - behavior: Strategy pattern for analysis modes
    description: Abstract methods enforce pre/post interface. Concrete strategies implement specific data
      collection. Strategy pattern enables easy addition of new analysis modes.
    evidence: src/analysis/strategies/base_strategy.py:44(collect_data)
  - behavior: Web search + LLM for real-time context
    description: Tavily WebSearch provides current events context beyond historical data. LLM synthesizes
      search results into coherent market narrative.
    evidence: src/analysis/base_analyst.py:29(__init__)
  - behavior: Gold/Silver analysis sequence enforcement
    description: Analysis mandates Data→Macro→Quantitative→Research→Technical→LLM Synthesis sequence.
      LLM prompt depends on each prior steps being populated. Skipping steps produces incomplete reports.
    evidence: src/analysis/commodities/gold_silver.py:319(analyze)
  - behavior: Separate fund/stock analysis paths
    description: Funds use NAV-based metrics; stocks use price-based indicators. Different data sources
      and technical indicators require separate analysis implementations.
    evidence: src/analysis/pre_market.py:1(PreMarketAnalyst)
  replaceable_points:
  - name: analysis_mode
    description: Report generation mode determining data sources and focus
    options:
    - name: pre
      traits:
      - Pre-market focus
      - Overnight news
      - Futures context
      fit_for:
      - Morning reports
      - Trading plan preparation
      not_fit_for:
      - End-of-day analysis
      - Historical review
    - name: post
      traits:
      - Post-market focus
      - Daily performance
      - Flow analysis
      fit_for:
      - Evening reports
      - Performance review
      not_fit_for:
      - Pre-market planning
      - Real-time decisions
    - name: full
      traits:
      - Comprehensive
      - Both pre and post
      - Complete picture
      fit_for:
      - Weekly reports
      - Deep analysis
      not_fit_for:
      - Daily quick scans
      - Time-sensitive needs
    default: post
  design_decisions:
  - 'Source tracking with deduplication: Each analyst tracks sources; _add_source prevents duplicates
    by title+URL. (src/analysis/base_analyst.py:54)'
  - 'Strategy pattern for analysis modes: Abstract methods enforce pre/post interface; concrete strategies
    implement data collection. (src/analysis/strategies/base_strategy.py:44)'
  - 'Web search + LLM for real-time context: WebSearch (Tavily) + LLM provides current events context
    beyond historical data. (src/analysis/base_analyst.py:29)'
  - 'Separate fund/stock analysis paths: Funds use NAV-based metrics; stocks use price-based; different
    data sources and indicators. (src/analysis/pre_market.py:1)'
  acceptance_hints:
  - Generated reports include each collected sources with proper deduplication
  - Report timestamps in ISO format for API responses
  - Gold/silver reports follow mandatory Data→Macro→Quantitative→Research→Technical→LLM sequence
  - BaseAnalyst._build_prompt correctly incorporates strategy compute_score results
  - Web search failures do not block report generation (graceful degradation)
- id: portfolio_management
  name: Portfolio Management
  order: 5
  responsibility: Manages user portfolios, positions, transactions, and generates signals. Includes risk
    metrics, correlation analysis, stress testing, and AI-powered rebalancing suggestions. Unified position
    model handles both stocks and funds.
  interface:
    inputs:
    - portfolio_id
    - positions list
    - current price data
    outputs:
    - Signals {type, strength, target}, risk metrics {beta, sharpe, var, max_drawdown}, rebalancing recommendations
  required_methods:
  - name: SignalGenerator.gen_signal
    description: Generates opportunity/risk/neutral signals with strength 0-1 scale
    evidence: src/analysis/portfolio/signals.py:63
  - name: RiskMetricsCalculator.calculate
    description: Computes Beta, Sharpe ratio, Value at Risk, maximum drawdown for portfolio
    evidence: src/analysis/portfolio/risk_metrics.py:1
  - name: CorrelationAnalyzer.analyze
    description: Cross-asset correlation matrix computation for diversification analysis
    evidence: src/analysis/portfolio/correlation.py:1
  - name: StressTestEngine.run
    description: Historical scenario simulation using predefined market shock scenarios
    evidence: src/analysis/portfolio/stress_test.py:1
  key_behaviors:
  - behavior: Signal strength 0-1 with thresholds
    description: Signal strength normalized to [0,1] range for consistent UI. Opportunity threshold at
      0.6 balances sensitivity. Strength enables ranking and filtering signals.
    evidence: src/analysis/portfolio/signals.py:68(opportunity_threshold=0.6)
  - behavior: Concentration threshold 20%
    description: Single position exceeding 20% of portfolio triggers concentration warning. Standard diversification
      rule prevents excessive single-asset risk.
    evidence: src/analysis/portfolio/signals.py:378(is_concentrated)
  - behavior: Correlation threshold 0.7
    description: Asset pairs with correlation > 0.7 flagged for diversification concern. High correlation
      indicates similar market behavior, reducing portfolio hedging benefits.
    evidence: src/analysis/portfolio/signals.py:388(corr > 0.7)
  - behavior: Unified position model for stocks+funds
    description: Single position table handles both asset types via asset_type field. Transaction types
      include buy, sell, dividend, split, transfer_in, transfer_out. Adding new types requires DB migration.
    evidence: app/models/portfolios.py:1(PositionCreate)
  - behavior: hard_sell_price sentinel behavior
    description: hard_sell_price=0 as default disables ALL sell recommendations. A single misconfiguration
      turns off selling for entire portfolio. Must be explicitly overridden with actual price.
    evidence: src/analysis/portfolio/signals.py:18(hard_sell_price)
  replaceable_points:
  - name: signal_thresholds
    description: Signal generation sensitivity and warning levels
    options:
    - name: strict
      traits:
      - Higher thresholds
      - Fewer signals
      - Higher conviction
      fit_for:
      - Conservative investors
      - Large portfolios
      not_fit_for:
      - Active traders
      - Small portfolios
    - name: moderate
      traits:
      - Balanced thresholds
      - Standard warnings
      - Default behavior
      fit_for:
      - General investors
      - Most portfolios
      not_fit_for:
      - Very conservative or aggressive
    - name: relaxed
      traits:
      - Lower thresholds
      - More signals
      - Higher sensitivity
      fit_for:
      - Active traders
      - Small portfolios
      not_fit_for:
      - Conservative investors
      - Large portfolios
    default: moderate
  design_decisions:
  - 'Signal strength 0-1 with thresholds: 0.6 threshold balances sensitivity; strength normalized to [0,1]
    for consistent UI. (src/analysis/portfolio/signals.py:68)'
  - 'Concentration threshold 20%: Single position >20% triggers warning; standard diversification rule.
    (src/analysis/portfolio/signals.py:378)'
  - 'Correlation threshold 0.7: High correlation pairs (>0.7) flagged for diversification concern. (src/analysis/portfolio/signals.py:388)'
  - 'Unified position model for stocks+funds: Single position table handles both asset types via asset_type
    field. (app/models/portfolios.py:1)'
  acceptance_hints:
  - SignalGenerator outputs signals with strength in [0, 1] range
  - RiskMetricsCalculator returns valid Sharpe ratios (requires RISK_FREE_RATE=0.02)
  - Correlation matrix computed without self-correlations (diagonal = 0)
  - StressTestEngine applies predefined scenarios with sector sensitivities
  - health_score returns 50 (grade C) on empty data - expected default behavior
- id: scheduling
  name: Scheduled Tasks
  order: 6
  responsibility: 'Orchestrates daily batch jobs: factor computation (6AM), portfolio snapshots (11PM),
    dashboard refresh (5min). Respects Chinese trading calendar (skips non-trading days). Singleton scheduler
    prevents duplicate job registration.'
  interface:
    inputs:
    - trading_calendar (cached daily)
    - job_config dictionary
    outputs:
    - Scheduled execution triggers to data_collection, factor_computation, portfolio_management
  required_methods:
  - name: SchedulerManager.add_factor_computation_job
    description: Registers daily 6AM factor computation job respecting trading calendar
    evidence: src/scheduler/manager.py:144
  - name: TradingCalendar.is_trading_day
    description: Cached trading date checker (singleton, refreshed daily from AkShare)
    evidence: src/scheduler/manager.py:21
  - name: SchedulerManager.snapshot_portfolios
    description: Daily 11PM portfolio value snapshot with price validation
    evidence: src/scheduler/manager.py:219
  key_behaviors:
  - behavior: Singleton pattern for scheduler+calendar
    description: Single scheduler instance prevents duplicate job registration across requests. Trading
      calendar singleton caches for the day. Prevents race conditions in job scheduling.
    evidence: src/scheduler/manager.py:70(_instance=None)
  - behavior: Trading calendar cached for day
    description: Refresh once per day from AkShare. Checking on every invocation would hit rate limits.
      Singleton ensures consistent calendar state throughout the day.
    evidence: src/scheduler/manager.py:32(refresh_calendar)
  - behavior: No avg_cost fallback for missing prices
    description: 'CRITICAL: Using avg_cost as price fallback would corrupt P&L data. Positions skipped
      entirely if current prices unavailable. Data quality preserved.'
    evidence: src/scheduler/manager.py:219(logger.warning)
  - behavior: Max 5 iterations for Agent Loop
