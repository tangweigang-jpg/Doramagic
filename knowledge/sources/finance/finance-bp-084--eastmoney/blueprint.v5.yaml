- id: BD-187
  type: B/RC
  content: 'INTERACTION: BD-006/BD-179 (BATCH_SIZE=100) × BD-004 (SQLite WAL 60s timeout) × BD-024 (skip
    on missing price) → Memory-IO cascade failure'
  rationale: 'BD-179 sets BATCH_SIZE=100 for memory-constrained 2H4G server; BD-006 confirms 100 stock
    batch size. BD-004 sets SQLite WAL mode with 60-second busy timeout. BD-024 skips positions when price
    unavailable. Under high memory pressure, SQLite write operations may exceed 60-second timeout, causing
    silent data loss or corruption. BD-024''s skip behavior then masks the underlying IO failure by simply
    omitting affected positions from P&L calculations. Result: users see incomplete portfolios with no
    indication that data was lost due to IO timeout, leading to incorrect performance attribution and
    potential compliance issues.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Monitoring timeout events or reducing batch size under memory pressure
- id: BD-188
  type: BA/DK
  content: 'INTERACTION: BD-001/BD-067/BD-068 (multi-tier fallback) × BD-062/BD-066 (cache TTLs) → Amplified
    staleness from layered caching'
  rationale: 'BD-001 implements multi-source fallback (TuShare→AkShare→cache); BD-067 falls back to cache
    on rate limit; BD-068 triggers fallback after 7 days staleness. BD-062 caches indefinitely when market
    closed; BD-066 caches top lists for 1 hour. Layered fallbacks compound staleness: market-closed indefinite
    cache (BD-062) combined with northbound flow cache fallback (BD-067) means data from Friday close
    could persist through weekend plus Monday morning. Combined with 7-day AkShare trigger (BD-068), system
    could serve 7+ day old data without user indication that fallback occurred. Users make decisions based
    on apparently fresh data that is actually stale.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Freshness indicators or tighter cache invalidation would reduce silent staleness
- id: BD-189
  type: B/BA
  content: 'INTERACTION: BD-164 (2% risk-free rate) × BD-030/BD-031 (Sharpe thresholds) → Risk cascade
    from rate sensitivity'
  rationale: BD-164 sets RISK_FREE_RATE=0.02 affecting each Sharpe/Sortino calculations; BD-030 defines
    thresholds (>=2 excellent, >=1 good, >=0.5 average). These thresholds were calibrated assuming 2%
    risk-free rate. If Chinese rates rise to 4.5% (10-year treasury level), fund Sharpe ratios would drop
    by ~0.25-0.5 units assuming typical fund returns, potentially reclassifying 'good' funds as 'average'
    or 'average' as 'below_average'. This cascades to BD-077 (momentum threshold), BD-082 (alpha threshold),
    BD-139 (fund minimum) causing systematic re-ranking of each fund recommendations without any parameter
    update. Users following 'good' rated funds could suddenly see them downgraded without understanding
    the cause.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Dynamic rate adjustment or rate-relative thresholds would amortize this risk
