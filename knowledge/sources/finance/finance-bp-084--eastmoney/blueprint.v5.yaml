  rationale: 'Four separate BDs hardcode RISK_FREE_RATE=0.02 (2%): BD-008 (Data Collection), BD-030 (risk_analysis),
    BD-119 (fund/diagnosis), BD-140 (fund_engine). If a developer changes BD-030 for reporting without
    updating BD-140 for scoring, fund rankings diverge from reports. This hidden coupling means changes
    to one location silently invalidate consistency in others, with users seeing different top funds depending
