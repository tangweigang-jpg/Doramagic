  rationale: 'BD-010 and BD-173 limit LLM explanations to 10 items per cycle (2 calls × batch size 10).
    BD-053 requests 8 stocks + 5 funds = 13 total recommendations. When 13 recommendations are generated,
    only the first 10 receive LLM explanations. Users see partial explanations for their recommendations
    with no indication that explanations were truncated. This silent degradation means users receive inconsistent
    information: some recommendations have detailed explanations while others have none, without any warning
    about incomplete coverage.'
  evidence: N/A:0(see_rationale)
