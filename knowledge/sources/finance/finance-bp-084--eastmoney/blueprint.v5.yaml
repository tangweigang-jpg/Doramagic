    dominance in short-term recommendations'
  rationale: 'BD-176 sets short-term threshold at 60/80; BD-013 sets stock minimum at 60 for short-term.
    BD-165 weights technical analysis at 40% while BD-011 applies ROE/PEG quality gates only to long-term
    recommendations. These decisions amplify each other: low technical threshold (60) combined with high
    technical weight (40%) means stocks passing short-term filters may have poor fundamentals. A stock
    with ROE=5% (below BD-040''s 10% threshold) and weak cash flow could still pass short-term screening
    due to favorable technicals, creating risky recommendations that the quality gate was designed to
