  rationale: BD-019, BD-056, and BD-134 each define concentration threshold at 20% per position, while
    BD-159 and BD-178 set the threshold at 5%. These contradictory definitions exist in portfolio signals
    (5%), fund portfolio analysis (5%), and portfolio management (20%). A user could receive concentration
    warnings from fund analysis that don't trigger in portfolio tracking, or vice versa. This inconsistency
    creates confusion and potentially exposes users to concentration risk the system should but doesn't
    detect uniformly.
  evidence: N/A:0(see_rationale)
  stage: global
