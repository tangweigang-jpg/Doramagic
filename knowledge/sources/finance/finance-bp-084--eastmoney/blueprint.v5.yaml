business_decisions:
- id: BD-001
  type: B/DK
  content: Multi-source fallback architecture for TuShare→AkShare chain
  rationale: Prevents single API failure from blocking each operations. The TuShare→AkShare fallback chain
    ensures reliability by automatically switching to backup data sources when primary source fails, maintaining
    uninterrupted data collection for downstream factor computation and recommendations.
  evidence: src/data_sources/data_source_manager.py:72(_call_with_fallback)
  stage: data_collection
  alternative_considered: Pure single-source approach would create single point of failure; considered
    retry-only approach but fallback provides faster recovery
- id: BD-002
  type: BA
  content: Tier-based rate limiting auto-configured from TUSHARE_POINTS env var (120/2000/5000/10000)
  rationale: TUSHARE_POINTS environment variable automatically configures rate limits (120/2000/5000/10000
    tiers) without code changes, enabling seamless scaling across different subscription levels. This
    supports multi-tenant usage patterns and prevents accidental quota exhaustion.
  evidence: src/data_sources/rate_limiter.py:32(RateLimiter.__init__)
  stage: data_collection
  alternative_considered: Hardcoded limits would require deployment for tier changes; per-request tokens
    would add latency
- id: BD-003
  type: BA
  content: Circuit breaker pattern with 60-second recovery cooldown
  rationale: Circuit breaker prevents hammering failing APIs; 60-second cooldown window allows services
    to recover without user intervention, avoiding cascading failures and unnecessary API quota consumption
    during transient outages.
  evidence: src/data_sources/circuit_breaker.py:29(CircuitBreaker)
  stage: data_collection
  alternative_considered: No circuit breaker would result in continuous failed requests; exponential backoff
    alone doesn't prevent queue buildup
- id: BD-004
  type: B/RC
  content: SQLite WAL mode with 60-second busy timeout
  rationale: WAL (Write-Ahead Logging) enables concurrent reads during writes without blocking; 60-second
    busy timeout prevents lock errors on constrained server (2H4G), ensuring data integrity while maximizing
    throughput under memory limitations.
  evidence: src/storage/db.py:23(conn.execute)
  stage: data_collection
  alternative_considered: DELETE mode would block readers during writes; PostgreSQL would exceed 2H4G
    resources; shorter timeout risks premature failures
  _evidence_issues:
  - 'FN_NOT_FOUND: conn.execute in src/storage/db.py'
- id: BD-005
  type: B/BA
  content: Pre-computation of factors at 6AM, not on-demand
  rationale: Factors must exist before user requests arrive; TuShare API rate limits make on-demand computation
    impossible at scale. Scheduled 6AM pre-computation ensures factors are ready when market opens, providing
    sub-second response times.
  evidence: src/scheduler/manager.py:144(add_factor_computation_job)
  stage: factor_computation
  alternative_considered: On-demand computation would hit rate limits during peak usage; caching alone
    doesn't solve initial computation latency
- id: BD-006
  type: BA
  content: Batch processing with 100 stocks per batch for factor computation
  rationale: Memory-constrained server (2H4G) requires batching to avoid OOM errors; 100 stocks per batch
    is the sweet spot balancing throughput efficiency with memory consumption, enabling complete daily
    computation within scheduled windows.
  evidence: src/analysis/recommendation/factor_store/daily_computer.py:51(BATCH_SIZE=100)
  stage: factor_computation
  alternative_considered: Smaller batches (50) would reduce memory but increase overhead; larger batches
    (200) risk OOM on current hardware
  _evidence_issues:
  - 'INVALID_IDENTIFIER: BATCH_SIZE=100 in src/analysis/recommendation/factor_store/daily_computer.py'
- id: BD-007
  type: B
  content: 'Two-tier cache: 5-minute memory cache + 1-day database cache'
  rationale: Hot data (in-request) served from 5-minute memory cache reduces DB load; end-of-day factor
    data persisted to database for next-day query reuse. This tiered approach balances latency (memory)
    with durability (database) for different data freshness requirements.
  evidence: src/analysis/recommendation/factor_store/cache.py:98(MEMORY_TTL_HOT=300)
  stage: factor_computation
  alternative_considered: Single-tier memory cache would risk data loss on restart; pure DB cache would
    increase query latency
  _evidence_issues:
  - 'INVALID_IDENTIFIER: MEMORY_TTL_HOT=300 in src/analysis/recommendation/factor_store/cache.py'
- id: BD-008
  type: BA/DK
  content: RISK_FREE_RATE hardcoded at 0.02 (2% annual) for Chinese market
  rationale: Chinese market risk-free rate assumption (2% annual) enables Sharpe/Sortino ratio calculations
    without external rate API dependency. This simplifies deployment and avoids external service failures
    impacting risk analytics.
  evidence: src/analysis/recommendation/fund_engine/factors/risk.py:30(RISK_FREE_RATE)
  stage: factor_computation
  alternative_considered: Dynamic rate API would add latency and failure points; zero rate would understate
    risk-adjusted returns
  _evidence_issues:
  - 'FN_NOT_FOUND: RISK_FREE_RATE in src/analysis/recommendation/fund_engine/factors/risk.py'
- id: BD-009
  type: B
  content: Quantitative models select stocks, LLM provides explanations only
  rationale: Separating quantitative selection from LLM explanation avoids hallucination risk in stock
    selection; factors are mathematically traceable and auditable. LLM role limited to natural language
    explanation of quantitative outputs.
  evidence: src/analysis/recommendation/engine.py:9(Key principles)
  stage: recommendation
  alternative_considered: Pure LLM selection would risk hallucinated recommendations; human-only selection
    would lack scalability
  _evidence_issues:
  - 'INVALID_IDENTIFIER: Key principles in src/analysis/recommendation/engine.py'
- id: BD-010
  type: BA
  content: Max 2 LLM calls per cycle with batch size of 10 explanations
  rationale: 'Token cost control through batch processing: 2 calls × 10 explanations per batch = 20 explanations
    max per request cycle. This bounds API costs while maintaining reasonable explanation coverage for
    user portfolios.'
  evidence: src/analysis/recommendation/llm_synthesis/explainer.py:26(BATCH_SIZE=10)
  stage: recommendation
  alternative_considered: Per-item LLM calls would multiply costs; smaller batches would increase API
    overhead
  _evidence_issues:
  - 'INVALID_IDENTIFIER: BATCH_SIZE=10 in src/analysis/recommendation/llm_synthesis/explainer.py'
- id: BD-011
  type: B/BA
  content: Quality gate applying ROE/PEG thresholds for long-term stock recommendations
  rationale: Long-term recommendations require fundamental health validation through ROE/PEG gates; short-term
    recommendations use purely technical indicators. This distinction prevents unsound long-term holdings
    while keeping short-term opportunities accessible.
  evidence: src/analysis/recommendation/stock_engine/engine.py:169(passes_quality_gate)
  stage: recommendation
  alternative_considered: Single gate for each horizons would over-restrict short-term; no gate would
    risk long-term losses
  _evidence_issues:
  - 'FN_NOT_FOUND: passes_quality_gate in src/analysis/recommendation/stock_engine/engine.py'
- id: BD-012
  type: BA
  content: SECTOR_KEYWORDS dictionary mapping user-friendly sector names to database industry keywords
  rationale: Maps user-friendly sector names to database industry keywords, enabling flexible user preference
    filtering without exposing internal database schema. Users can express preferences naturally while
    system translates to precise DB queries.
  evidence: src/analysis/recommendation/engine.py:42(SECTOR_KEYWORDS)
  stage: recommendation
  alternative_considered: Direct DB field exposure would confuse users; natural language parsing would
    add complexity
  _evidence_issues:
  - 'FN_NOT_FOUND: SECTOR_KEYWORDS in src/analysis/recommendation/engine.py'
- id: BD-013
  type: BA
  content: 'Differentiated minimum scores: 60 for stocks, 55 for funds in short-term recommendations'
  rationale: Stocks are more volatile than funds, requiring higher threshold (60) vs funds (55) to reduce
    false positive recommendations. This calibration accounts for inherent volatility differences between
    asset classes.
  evidence: src/analysis/recommendation/stock_engine/engine.py:38(MIN_SCORE_SHORT=60)
  stage: recommendation
  alternative_considered: Equal thresholds would increase fund false positives or over-restrict stock
    recommendations; dynamic thresholds add complexity
  _evidence_issues:
  - 'INVALID_IDENTIFIER: MIN_SCORE_SHORT=60 in src/analysis/recommendation/stock_engine/engine.py'
- id: BD-014
  type: B
  content: Source tracking with deduplication by title+URL per analyst
  rationale: Each analyst tracks sources independently; _add_source deduplicates by title+URL combination
    preventing duplicate citations within a single analysis. This ensures citation integrity and prevents
    misleading source count inflation.
  evidence: src/analysis/base_analyst.py:54(_reset_sources)
  stage: analysis_reporting
  alternative_considered: Global deduplication would prevent legitimate cross-analyst reuse; no deduplication
    would corrupt analysis quality
- id: BD-015
  type: B
  content: Strategy pattern with abstract base classes enforcing pre/post hooks for analysis modes
  rationale: Abstract methods enforce consistent pre/post processing interface across analysis strategies;
    concrete strategy implementations handle domain-specific data collection. This ensures uniform lifecycle
    management and enables extensible analysis modes.
  evidence: src/analysis/strategies/base_strategy.py:44(collect_data)
  stage: analysis_reporting
  alternative_considered: Monolithic analysis would hardcode logic; mixin approach would create dependency
    conflicts
- id: BD-016
  type: BA/DK
  content: Web search (Tavily) + LLM combination for real-time context in analysis
  rationale: WebSearch via Tavily provides current market events context; LLM synthesizes findings with
