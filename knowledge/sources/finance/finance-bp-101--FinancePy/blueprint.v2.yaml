replaceable_slots:
- id: slot-001
  name: data_format_handling
  description: Pandas is the default for its ecosystem maturity and widespread usage in financial Python
    applications. Choose polars for performance-critical data loading with larger datasets.
  used_in_stages: []
  options:
  - name: pandas (current)
    traits:
    - tabular_data
    - csv_parsing
    - time_series
    - dataframes
    fit_for:
    - Reading CSV files with market data, data manipulation, time series operations
    not_fit_for:
    - Real-time streaming data, extremely large datasets that don't fit in memory
  - name: polars
    traits:
    - tabular_data
    - csv_parsing
    - performance
    - lazy_evaluation
    fit_for:
    - High-performance data loading, larger-than-memory datasets, faster aggregations
    not_fit_for:
    - Ecosystems already using pandas, simpler scripts
  - name: pyarrow
    traits:
    - columnar_format
    - parquet
    - feather
    - interoperability
    fit_for:
    - Apache Arrow format data, Parquet files, integration with data lakes
    not_fit_for:
    - Simple CSV parsing, pandas-dependent workflows
  default: pandas
  _source: worker_resource
- id: slot-002
  name: numerical_optimization
  description: Scipy is the proven choice for financial model calibration. Consider JAX for research with
    GPU requirements, or cvxpy if adding convex portfolio optimization.
  used_in_stages: []
  options:
  - name: scipy.optimize (current)
    traits:
    - root_finding
    - minimization
    - robust
    - well-tested
    fit_for:
    - Calibration of model parameters (vol surfaces, curves), solving nonlinear equations
    not_fit_for:
    - GPU acceleration, extremely high-dimensional optimization
  - name: cvxpy
    traits:
    - convex_optimization
    - disciplined_convex
    - portfolio_optimization
    fit_for:
    - Portfolio optimization, mean-variance analysis, quadratic programming
    not_fit_for:
    - Non-convex problems, general root-finding
  - name: jax
    traits:
    - automatic_differentiation
    - gpu_support
    - jit_compilation
    - vectorization
    fit_for:
    - Monte Carlo with GPU acceleration, complex Greeks via autodiff, research prototyping
    not_fit_for:
    - Production deployment requiring Bloomberg-level reliability, simple use cases
  default: scipy.optimize
  _source: worker_resource
- id: slot-003
  name: array_computing
  description: Numpy is irreplaceable as the foundation. JAX could be added as an optional accelerator
    but would require significant refactoring.
  used_in_stages: []
  options:
  - name: numpy (current)
    traits:
    - array_operations
    - linear_algebra
    - broadcasting
    - standard
    fit_for:
    - Every numerical computing - this is the foundational array library for the entire scientific Python
      stack
    not_fit_for:
    - GPU computing, automatic differentiation
  - name: jax.numpy
    traits:
    - array_operations
    - gpu_support
    - autodiff
    - immutable
    fit_for:
    - GPU-accelerated arrays, automatic differentiation for Greeks
    not_fit_for:
    - Code already dependent on numpy mutability, simple CPU-only workloads
  default: numpy
  _source: worker_resource
- id: slot-004
  name: visualization
  description: Matplotlib is the standard for financial charting. Plotly is recommended if interactive
    web visualizations are needed.
  used_in_stages: []
  options:
  - name: matplotlib (current)
    traits:
    - 2d_plotting
    - publication_quality
    - customization
    - standard
    fit_for:
    - Standard financial charts - yield curves, volatility surfaces, option payoffs, histograms
    not_fit_for:
    - Interactive dashboards, web-based visualizations, 3D plots
  - name: plotly
    traits:
    - interactive
    - web_based
    - 3d_plots
    - dash_integration
    fit_for:
    - Interactive financial dashboards, web applications, 3D volatility surface visualization
    not_fit_for:
    - Static reports, publication-quality print figures
  - name: bokeh
    traits:
    - interactive
    - web_based
    - streaming_data
    fit_for:
    - Interactive web dashboards with streaming real-time data
    not_fit_for:
    - Simple static charts, publication figures
  default: matplotlib
  _source: worker_resource
- id: slot-005
  name: testing_framework
  description: Pytest is the Python standard for testing. Its fixture system and parametrize functionality
    are well-suited for the library's golden test approach.
  used_in_stages: []
  options:
  - name: pytest (current)
    traits:
    - unit_testing
    - fixtures
    - parametrization
    - plugins
    fit_for:
    - Every testing scenarios - unit tests, golden tests, benchmarking
    not_fit_for:
    - Very simple scripts without any testing needs
  - name: unittest
    traits:
    - stdlib
    - no_deps
    - oo_testing
    fit_for:
    - Minimal dependency environments, object-oriented test suites
    not_fit_for:
    - Projects needing fixtures, parametrized tests, rich plugin ecosystem
  default: pytest
  _source: worker_resource
