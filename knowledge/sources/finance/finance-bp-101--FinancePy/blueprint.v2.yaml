# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-101
name: FinancePy
sop_version: '3.6'
source:
  projects:
  - FinancePy
  commit_hash: 8440a415ed35e6f7a96ba9a7f229fe99466c11f5
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Derivatives pricing and risk management
  description: A one-stop library for pricing and risk-managing options, futures and other financial instruments
    including equity, FX, rates, credit, and bonds.
  prerequisites: Knowledge of quantitative finance, Python, financial derivatives concepts, and familiarity
    with Numba JIT compilation behavior
  not_suitable_for: Real-time trading systems requiring sub-millisecond latency, non-financial applications,
    or production risk systems without thorough validation. The library's compile-time warmup and bump-based
    Greeks are not optimized for ultra-low latency scenarios.
stages:
- id: utilities
  name: Utilities
  order: 1
  responsibility: 'Provide foundational types and helpers used by each other modules: Date arithmetic,
    day count conventions, calendar adjustments, solvers, and mathematical functions. Avoids duplication
    across modules and ensures consistency in date handling and numerical computations.'
  interface:
    inputs: Raw date strings, numeric values, enums for conventions
    outputs: Date objects, year fractions, interpolated values, root finding results
  required_methods:
  - name: Date.add_days
    description: Add a specified number of days to a Date object, accounting for business day conventions
    evidence: financepy/utils/date.py:147(Date.__init__)
  - name: Schedule.generate
    description: Generate payment schedule dates based on frequency and convention
    evidence: financepy/utils/schedule.py:1(Schedule)
  key_behaviors:
  - behavior: Custom Date class with Excel serial conversion
    description: The Date class uses __slots__ for memory efficiency and provides precise Excel serial
      conversion, finance-specific operations (add_tenor, next_cds_date)
    evidence: financepy/utils/date.py:141(Date.__slots__)
  - behavior: Numba jitted interpolation functions
    description: Interpolation functions use @njit decorator to achieve C++ speeds while keeping pure
      Python codebase, critical for Monte Carlo and curve bootstrapping performance
    evidence: financepy/market/curves/interpolator.py:68(_uinterpolate)
  - behavior: FLAT_FWD_RATES as default interpolation
    description: Ensures positive forward rates by construction; industry convention for bootstrapping
    evidence: financepy/market/curves/interpolator.py:18(InterpTypes.FLAT_FWD_RATES)
  replaceable_points:
  - name: interpolation_scheme
    description: How discount factors are interpolated between known points
    options:
    - name: FLAT_FWD_RATES
      traits:
      - Default
      - Positive by construction
      - Industry standard
      fit_for:
      - Curve bootstrapping
      - General purpose
      not_fit_for:
      - Cubic spline smoothness requirements
    - name: LINEAR_ZERO_RATES
      traits:
      - Simple
      - Continuous
      fit_for:
      - General interpolation
      not_fit_for:
      - Bootstrap algorithms requiring monotonicity
    - name: FINCUBIC_ZERO_RATES
      traits:
      - Cubic spline
      - Smooth second derivative
      fit_for:
      - Visualization
      - Smooth curves
      not_fit_for:
      - Bootstrap (not suitable_for_bootstrap)
    default: FLAT_FWD_RATES
  - name: day_count_convention
    description: How year fractions are calculated between dates
    options:
    - name: THIRTY_E_360
      traits:
      - 30E/360
      - European
      fit_for:
      - Eurozone bonds
      - General rates
      not_fit_for:
      - US Treasuries
    - name: ACT_ACT_ISDA
      traits:
      - Actual/Actual
      - Precise
      fit_for:
      - Government bonds
      - Accurate day counting
      not_fit_for:
      - Simpler calculations
    - name: ACT_360
      traits:
      - Actual/360
      - Money market
      fit_for:
      - Money market instruments
      - Short-term rates
      not_fit_for:
      - Bonds with long tenors
    default: THIRTY_E_360
  design_decisions:
  - Custom Date class instead of datetime enables precise Excel serial conversion, finance-specific operations
    (add_tenor, next_cds_date), and __slots__ for memory efficiency (financepy/utils/date.py:147)
  - Numba jitted interpolation functions achieve C++ speeds while keeping pure Python codebase; critical
    for Monte Carlo and curve bootstrapping performance (financepy/market/curves/interpolator.py:68)
  - FLAT_FWD_RATES as default interpolation ensures positive forward rates by construction; industry convention
    for bootstrapping (financepy/market/curves/interpolator.py:18)
  - Separate InterpTypes enum with 10+ methods allows product-specific interpolation needs; equity uses
    different conventions than rates (financepy/market/curves/interpolator.py:17)
  acceptance_hints:
  - Date arithmetic produces correct results across month boundaries and leap years
  - Interpolation between known discount factor points matches expected values
  - Year fraction calculations match industry conventions (verified against known instruments)
- id: market_curves
  name: Market Curves
  order: 2
  responsibility: Construct and store discount factor term structures from market instruments (deposits,
    FRAs, swaps). Enables present value calculations and bootstrapping of implied curves from observable
    market data.
  interface:
    inputs: Market instruments (deposits, FRAs, swaps), valuation date, existing discount curve for dual
      curve
    outputs: Discount factors, zero rates, forward rates at any date/time
  required_methods:
  - name: DiscountCurve.df
    description: Return discount factor for a given date using interpolated curve
    evidence: financepy/market/curves/discount_curve.py:23(DiscountCurve)
  - name: DiscountCurve.fwd
    description: Return continuously compounded forward rate between two dates
    evidence: financepy/market/curves/discount_curve.py:23(DiscountCurve)
  - name: IborSingleCurve.build
    description: Bootstrap curve from deposits, FRAs, and swaps using 1D solver
    evidence: financepy/products/rates/ibor_single_curve.py:383(_build_curve_using_1d_solver)
  - name: IborDualCurve.build
    description: Build separate discount and index curves from OIS and Ibor instruments
    evidence: financepy/products/rates/ibor_dual_curve.py:69(IborDualCurve.__init__)
  key_behaviors:
  - behavior: Inheritance hierarchy for curves
    description: Every curve classes inherit from DiscountCurve, sharing interpolation, bump, and accessor
      methods. Products depend on .df() interface; changing base breaks each derived curves.
    evidence: financepy/products/rates/ibor_dual_curve.py:69(IborDualCurve.__init__)
  - behavior: Separate discount/index curves (dual curve)
    description: 'Post-2007 crisis practice: OIS used for discounting, Ibor for forward rates. Single
      curve mode still available for legacy data.'
    evidence: financepy/products/rates/ibor_dual_curve.py:99(self.discount_curve)
  - behavior: IborDualCurve ordering contract
    description: Every swaps must share same start date AND coupon grid; deposits must precede FRAs which
      must precede swaps in bootstrap sequence
    evidence: financepy/products/rates/ibor_dual_curve.py:206-228(_validate_inputs)
  replaceable_points:
  - name: bootstrap_method
    description: How curve knots are solved
    options:
    - name: _build_curve_using_1d_solver
      traits:
      - Brentq root finding
      - Sequential
      - Default
      fit_for:
      - Simple sequential instruments
      - Production use
      not_fit_for:
      - Complex overlapping instruments
    - name: _build_curve_using_least_squares
      traits:
      - Optimization based
      - Flexible
      fit_for:
      - Overdetermined systems
      not_fit_for:
      - Simple bootstrap
    - name: _build_curve_linear_swap_rate_interpolation
      traits:
      - Linear interpolation
      - Fast
      fit_for:
      - Real-time applications
      not_fit_for:
      - Accurate curve building
    default: _build_curve_using_1d_solver
  - name: interpolator_type
    description: Interpolation method between knots
    options:
    - name: FLAT_FWD_RATES
      traits:
      - Forward rate flat
      - Monotonic
      - Bootstrap compatible
      fit_for:
      - Default
      - Standard rates
      not_fit_for:
      - Smooth curve requirements
    - name: LINEAR_ZERO_RATES
      traits:
      - Linear zero rates
      fit_for:
      - General purpose
      not_fit_for:
      - Bootstrap
    - name: FINCUBIC_ZERO_RATES
      traits:
      - Cubic spline
      fit_for:
      - Visualization
      not_fit_for:
      - Bootstrap
    default: FLAT_FWD_RATES
  design_decisions:
  - Inheritance hierarchy for curves shares interpolation, bump, and accessor methods across each curve
    types; avoids code duplication (financepy/products/rates/ibor_dual_curve.py:69)
  - 'Separate discount/index curves (dual curve) implements post-2007 crisis practice: OIS for discounting,
    Ibor for forward rates (financepy/products/rates/ibor_dual_curve.py:99)'
  - 1D solver bootstrap by default is simple and reliable for sequential instruments; scipy brentq for
    root finding (financepy/products/rates/ibor_single_curve.py:383)
  - Time stored as float years from anchor via (date - value_dt) / G_DAYS_IN_YEAR; G_DAYS_IN_YEAR=365.25
    standardizes annualization (financepy/market/curves/discount_curve.py:66)
  acceptance_hints:
  - Bootstrapped curve reproduces input instrument prices (within tolerance)
  - Discount factors are monotonically decreasing with maturity
  - Forward rates are positive for normal yield curves
- id: market_volatility
  name: Market Volatility
  order: 3
  responsibility: Calibrate and store volatility term structures from market option prices. Required for
    derivative pricing; captures smile/skew effects that materially impact option values.
  interface:
    inputs: ATM vols, delta strangles, risk reversals, spot rates, discount curves
    outputs: Interpolated volatility for any strike/expiry, implied distributions
  required_methods:
  - name: FXVolSurface.volatility
    description: Return interpolated volatility for given strike/expiry using Clark volatility function
    evidence: financepy/market/volatility/fx_vol_surface.py:612(volatility)
  - name: FXVolSurfacePlus.calibrate
    description: Calibrate vol surface parameters to market quotes using Nelder-Mead optimization
    evidence: financepy/market/volatility/fx_vol_surface_plus.py:1(FXVolSurfacePlus)
  - name: SwaptionVolSurface.value
    description: Value swaption using calibrated SABR vol surface
    evidence: financepy/market/volatility/swaption_vol_surface.py:394(vol_func_type=VolFuncTypes.SABR)
  key_behaviors:
  - behavior: Delta-based strike parametrization for FX
    description: Market quotes in delta space, not strike; enables consistent interpolation across expiries.
      Strike solving maps to inverse-cdf space via norminvcdf.
    evidence: financepy/market/volatility/fx_vol_surface.py:521(atm_vols, ms_25_delta_vols)
  - behavior: ATM forward delta neutral method
    description: Standard Bloomberg convention; ensures ATM vol corresponds to 50-delta
    evidence: financepy/market/volatility/fx_vol_surface.py:521(FinFXATMMethod.FWD_DELTA_NEUTRAL)
  - behavior: SABR model for swaption vol
    description: Industry standard for rates vol; handles smile via alpha, beta, rho, nu parameters. Hagan
      2002 expansion gives direct vol mapping for calibration.
    evidence: financepy/market/volatility/swaption_vol_surface.py:394(vol_func_type=VolFuncTypes.SABR)
  replaceable_points:
  - name: vol_function_type
    description: Parametric form for vol surface
    options:
    - name: CLARK
      traits:
      - Popular
      - Flexible
      - Smooth
      fit_for:
      - FX vol surfaces
      - General purpose
      not_fit_for:
      - Rates swaptions
    - name: BLOOMBERG
      traits:
      - Bloomberg compatible
      fit_for:
      - Integration with Bloomberg
      not_fit_for:
      - Standalone use
    - name: SVI
      traits:
      - Stochastic Vol Inspired
      - Arbitrage-free
      fit_for:
      - Equity vol surfaces
      - Arbitrage constraints
      not_fit_for:
      - FX surfaces
    - name: SABR
      traits:
      - Industry standard rates
      - 4 parameters
      fit_for:
      - Swaption vol surfaces
      - Rates products
      not_fit_for:
      - FX surfaces
    default: CLARK
  - name: atm_method
    description: ATM vol determination
    options:
    - name: FWD_DELTA_NEUTRAL
      traits:
      - Bloomberg standard
      - 50 delta
      fit_for:
      - Default
      - Standard quotes
      not_fit_for:
      - Non-standard definitions
    - name: SPOT_DELTA
      traits:
      - Spot delta based
      fit_for:
      - Some FX markets
      not_fit_for:
      - Forward-starting options
    - name: FWD_PREM_ADJ
      traits:
      - Forward premium adjusted
      fit_for:
      - High premium currencies
      not_fit_for:
      - Low premium currencies
    default: FWD_DELTA_NEUTRAL
  design_decisions:
  - Delta-based strike parametrization for FX uses market quotes in delta space, not strike; enables consistent
    interpolation across expiries (financepy/market/volatility/fx_vol_surface.py:521)
  - ATM forward delta neutral method is standard Bloomberg convention; ensures ATM vol corresponds to
    50-delta (financepy/market/volatility/fx_vol_surface.py:521)
  - Clark volatility function default balances flexibility with smoothness; popular in practice (financepy/market/volatility/fx_vol_surface.py:612)
  - SABR model for swaption vol is industry standard for rates vol; handles smile via alpha, beta, rho,
    nu parameters (financepy/market/volatility/swaption_vol_surface.py:394)
  acceptance_hints:
  - Calibrated surface reproduces input market quotes (within tolerance)
  - Vol surface is arbitrage-free (no calendar spread arbitrage)
  - ATM vol term structure matches observed rates
- id: models
  name: Pricing Models
  order: 4
  responsibility: Implement stochastic models for derivative valuation. Connect market data (volatility,
    rates) to product pricing; abstraction enables model selection per product.
  interface:
    inputs: Model parameters (vol, mean reversion, etc.), forward values, strikes, time
    outputs: Option prices, Greeks, implied vols
  required_methods:
  - name: Model.price
    description: Calculate option price given spot, strike, time to expiry, and volatility
    evidence: financepy/models/model.py:6(Model)
  - name: BlackScholes.price
    description: Log-normal equity/FX model with multiple implementations (analytic, MC, CRR tree, LSMC)
    evidence: financepy/models/black_scholes.py:47(BlackScholes)
  - name: SABR.black_vol
    description: Calculate implied Black vol from SABR parameters using Hagan 2002 expansion
    evidence: financepy/models/sabr.py:178(black_vol)
  - name: Heston.value_lewis
    description: Heston stochastic vol with closed-form Lewis formula for fast analytical solution
    evidence: financepy/models/heston.py:261(value_lewis)
  key_behaviors:
  - behavior: Model base class with duck typing
    description: Model base class has no abstract methods; duck typing allows any model-like object. Strategy
      pattern allows pluggable models; changing Model interface breaks each option products.
    evidence: financepy/models/model.py:6(class Model)
  - behavior: Multiple BS implementations selectable
    description: Enables testing (analytic vs numerical), American options (BAW, CRR tree, LSMC), MC variants.
      BlackScholesDefaults maps EUROPEAN→ANALYTICAL, AMERICAN→CRR_TREE.
    evidence: 'financepy/models/black_scholes.py:54(bs_type: BlackScholesTypes)'
  - behavior: Numba-accelerated tree models
    description: HW trinomial tree pricing competitive with C++; enables Bermudan swaptions. build_tree_fast
      uses @njit for performance.
    evidence: financepy/models/hw_tree.py:90(build_tree_fast)
  replaceable_points:
  - name: model_implementation
    description: How model is computed
    options:
    - name: ANALYTICAL
      traits:
      - Closed-form
      - Fastest
      - Limited to simple payoffs
      fit_for:
      - European options
      - Speed critical
      not_fit_for:
      - American options
      - Exotic payoffs
    - name: CRR_TREE
      traits:
      - Binomial tree
      - Versatile
      fit_for:
      - American options
      - Barrier options
      not_fit_for:
      - Path-dependent exotics
    - name: LSMC
      traits:
      - Least-squares Monte Carlo
      - Longstaff-Schwartz
      fit_for:
      - Bermudan options
      - Complex exercise
      not_fit_for:
      - Simple European pricing
    - name: FINITE_DIFF
      traits:
      - PDE numerical
      fit_for:
      - Continuous dividends
      - Early exercise
      not_fit_for:
      - High-dimensional problems
    - name: MONTE_CARLO
      traits:
      - Simulation
      - Flexible
      fit_for:
      - Exotic payoffs
      - Path-dependent
      not_fit_for:
      - Speed critical
      - Low variance
    default: ANALYTICAL
  - name: process_type
    description: Stochastic process for simulation
    options:
    - name: GBM
      traits:
      - Geometric Brownian Motion
      - Log-normal
      fit_for:
      - Equity
      - FX
      not_fit_for:
      - Interest rates
      - Stochastic vol
    - name: HESTON
      traits:
      - Stochastic volatility
      - Vol smile
      fit_for:
      - Equity vol modeling
      - FX
      not_fit_for:
      - Rates products
    - name: VASICEK
      traits:
      - Short rate model
      - Mean reversion
      fit_for:
      - Rates
      - Bonds
      not_fit_for:
      - Vol modeling
    - name: CIR
      traits:
      - Square-root process
      - Positive rates
      fit_for:
      - Rates
      - Short rate
      not_fit_for:
      - Vol modeling
    - name: LMM
      traits:
      - Libor Market Model
      - Forward rates
      fit_for:
      - Rates caps/swaptions
      - Complex rates
      not_fit_for:
      - Simple pricing
    default: GBM
  design_decisions:
  - Model base class with no abstract methods enables duck typing; explicit base documents intent without
    forcing implementation (financepy/models/model.py:6)
  - Multiple BS implementations selectable enables testing (analytic vs numerical), American options (BAW,
    CRR tree, LSMC), MC variants (financepy/models/black_scholes.py:54)
  - Heston closed-form via Lewis formula provides fast analytical solution; Monte Carlo as reference;
    handles both European and exotic payoffs (financepy/models/heston.py:261)
  - SABR closed-form implied vol uses Hagan 2002 expansion for direct vol mapping; used for swaption calibration
    (financepy/models/sabr.py:178)
  acceptance_hints:
  - Model prices match known benchmarks (e.g., Black-Scholes closed-form)
  - Implied vol calculation converges to correct values
  - Tree/pricing models pass convergence tests
- id: products_equity_fx
  name: Equity & FX Options
  order: 5
  responsibility: Price and risk-manage equity and FX derivative contracts. Core product family requiring
    model selection, vol surface lookup, and Greeks calculation.
  interface:
    inputs: Option parameters (expiry, strike), spot price, discount/div curves, model
    outputs: Option value, delta, gamma, vega, theta, rho, implied vol
  required_methods:
  - name: EquityVanillaOption.value
    description: Calculate European option value using Black-Scholes analytical or Monte Carlo method
    evidence: financepy/products/equity/equity_vanilla_option.py:74(EquityVanillaOption)
  - name: EquityVanillaOption.delta
    description: Calculate option delta using finite difference bumping (BUMP=1e-4)
    evidence: financepy/products/equity/equity_option.py:51(delta)
  - name: EquityAmericanOption.value
    description: Price American option via CRR tree with backward induction
    evidence: financepy/products/equity/equity_american_option.py:27(EquityAmericanOption)
  - name: FXVanillaOption.value
    description: Price FX option using domestic/foreign curves; foreign currency treated as asset with
      dividend yield
    evidence: financepy/products/fx/fx_vanilla_option.py:174(FXVanillaOption)
  key_behaviors:
  - behavior: Greeks via finite difference bumps
    description: Unified approach works for each products; BUMP=1e-4 balances accuracy vs noise. Vega
      bump = 1% (not 1bp) since volatility is percent.
    evidence: financepy/products/equity/equity_option.py:51(delta)
  - behavior: FX uses dual curve (domestic + foreign)
    description: CIP pricing requires separate currency curves; foreign currency as asset with dividend
      yield equivalent. FXVanillaOption requires FORDOM currency pair convention.
    evidence: financepy/products/fx/fx_vanilla_option.py:246(value)
  - behavior: Equity option requires dividend curve
    description: Continuous dividend yield equivalent affects early exercise and forward price. Equities
      treat dividend yield as DiscountCurve.
    evidence: financepy/products/equity/equity_vanilla_option.py:151(value)
  replaceable_points:
  - name: pricing_model
    description: Model used for valuation
    options:
    - name: BlackScholes
      traits:
      - Log-normal
      - Analytical
      - Fastest
      fit_for:
      - European options
      - Vanilla payoffs
      not_fit_for:
      - American options
      - Vol smile
    - name: Heston
      traits:
      - Stochastic vol
      - Vol smile
      fit_for:
      - Exotic options
      - Vol surface
      not_fit_for:
      - Simple pricing
    - name: CRR
      traits:
      - Binomial tree
      - American
      fit_for:
      - American options
      - Barriers
      not_fit_for:
      - Speed critical
    - name: LSMC
      traits:
      - Longstaff-Schwartz
      - Flexible
      fit_for:
      - Bermudan
      - Complex exercise
      not_fit_for:
      - European only
    default: BlackScholes
  - name: mc_method
    description: Monte Carlo implementation
    options:
    - name: NUMBA_NUMPY
      traits:
      - Numba+jitted
      - Fast
      - Default
      fit_for:
      - Production
      - Speed
      not_fit_for:
      - Debugging
    - name: NUMPY_ONLY
      traits:
      - Pure numpy
      - Compatible
      fit_for:
      - Debugging
      - Testing
      not_fit_for:
      - Speed
    - name: PARALLEL
      traits:
      - Multi-core
      - Highest speed
      fit_for:
      - Batch processing
      not_fit_for:
      - Single core
      - Overhead
    default: NUMBA_NUMPY
  design_decisions:
  - Greeks via finite difference bumps with BUMP=1e-4 balances accuracy vs noise; unified approach works
    for each products (financepy/products/equity/equity_option.py:51)
  - Vega bump = 1% not 1bp since volatility is percent; 1bp meaningless; standard practice (financepy/products/equity/equity_option.py:109)
  - FX uses dual curve (domestic + foreign) for CIP pricing; foreign currency as asset with dividend yield
    (financepy/products/fx/fx_vanilla_option.py:246)
  - Equity option requires dividend curve; continuous dividend yield equivalent affects early exercise
    and forward price (financepy/products/equity/equity_vanilla_option.py:151)
  acceptance_hints:
  - European option prices match Black-Scholes analytical formula
  - Put-call parity holds for European options
  - American option price >= European option price
- id: products_rates
  name: Interest Rate Products
  order: 6
  responsibility: Price and risk-manage rate derivatives including swaps, caps/floors, swaptions. Largest
    product class requiring curve building, model selection, and cash flow generation.
  interface:
    inputs: Swap/future parameters, discount curve, index curve, model
    outputs: Swap rate, present value, DV01, Greeks for options
  required_methods:
  - name: IborSwap.value
    description: Calculate swap present value using leg decomposition (fixed + float)
    evidence: financepy/products/rates/ibor_swap.py:156(value)
  - name: IborSwap.set_fixed_rate_to_atm
    description: Set fixed rate to ATM swap rate using par curve method for mark-to-market
    evidence: financepy/products/rates/ibor_swap.py:140(set_fixed_rate_to_atm)
  - name: IborSwaption.value
    description: Price European swaption via multiple models (Black, SABR, HW, BK)
    evidence: financepy/products/rates/ibor_swaption.py:103(value)
  - name: IborCapFloor.value
    description: Price cap/floor using Black model with implied vol
    evidence: financepy/products/rates/ibor_cap_floor.py:1(IborCapFloor)
  key_behaviors:
  - behavior: Leg decomposition (fixed + float)
    description: Enables basis swaps, asset swaps; separable risk attribution; code reuse. SwapFixedLeg
      and SwapFloatLeg separate concerns.
    evidence: financepy/products/rates/ibor_swap.py:156(value)
  - behavior: ATM swap rate setter
    description: Quotes quoted as ATM; par curve method; enables mark-to-market. Quotes are quoted as
      ATM rate matching current market.
    evidence: financepy/products/rates/ibor_swap.py:140(set_fixed_rate_to_atm)
  - behavior: Multiple models for swaptions
    description: Black for caps; SABR for vol surface; HW/BK for path-dependency; flexibility required
      for different use cases
    evidence: financepy/products/rates/ibor_swaption.py:103(value)
  replaceable_points:
  - name: swaption_model
    description: Model for swaption pricing
    options:
    - name: Black
      traits:
      - Analytical
      - Lognormal
      - Fastest
      fit_for:
      - Simple swaptions
      - Caps
      not_fit_for:
      - Vol surface calibration
    - name: SABR
      traits:
      - Stochastic vol
      - Vol smile
      fit_for:
      - Vol surface
      - Skew
      not_fit_for:
      - Path-dependent
    - name: BlackShifted
      traits:
      - Shifted lognormal
      - Positive rates
      fit_for:
      - Low rates
      - Negative rates
      not_fit_for:
      - Normal rate environment
    - name: HWTree
      traits:
      - Hull-White tree
      - Mean reversion
      fit_for:
      - Bermudan swaptions
      - Callable
      not_fit_for:
      - Simple European
    - name: BKTree
      traits:
      - Black-Karasinski tree
      fit_for:
      - Mean-reverting rates
      not_fit_for:
      - Simple pricing
    default: Black
  - name: swap_rate_interpolation
    description: How swap rates interpolated in bootstrap
    options:
    - name: 1D_SOLVER
      traits:
      - Root finding
      - Default
      fit_for:
      - Standard bootstrap
      not_fit_for:
      - Overlapping instruments
    - name: LEAST_SQUARES
      traits:
      - Optimization
      - Flexible
      fit_for:
      - Overdetermined systems
      not_fit_for:
      - Simple cases
    - name: LINEAR_SWAP_RATE
      traits:
      - Linear interpolation
      fit_for:
      - Speed
      not_fit_for:
      - Accuracy
    default: 1D_SOLVER
  design_decisions:
  - Leg decomposition (fixed + float) enables basis swaps, asset swaps; separable risk attribution; code
    reuse (financepy/products/rates/ibor_swap.py:156)
  - ATM swap rate setter uses par curve method for mark-to-market; quotes quoted as ATM (financepy/products/rates/ibor_swap.py:140)
  - Jamshidian decomposition for HW bonds reduces tree dimensions; critical for performance (financepy/models/hw_tree.py:981)
  - FRA added to bootstrap before swaps fills gap between deposits and swaps; sequential bootstrapping
    (financepy/products/rates/ibor_single_curve.py:204)
  acceptance_hints:
  - Swap PV = 0 at inception when fixed rate = market swap rate
  - DV01 calculation matches finite difference bump result
  - Swaption price converges with tree steps
- id: products_credit
  name: Credit Products
  order: 7
  responsibility: Price and risk-manage CDS, CDO tranches, and credit curves. Credit risk is distinct
    from rates requiring survival probability curves and recovery assumptions.
  interface:
    inputs: CDS contracts, Ibor curve, recovery rate, issuer curve
    outputs: CDS par spread, PV, risky PV01, protection/premium leg splits
  required_methods:
  - name: CDS.value
    description: Calculate CDS present value with protection and premium leg decomposition
    evidence: financepy/products/credit/cds.py:241(CDS)
  - name: CDS.par_spread
    description: Calculate CDS par spread (fair coupon) given market price
    evidence: financepy/products/credit/cds.py:241(CDS)
  - name: CDSCurve.build
    description: Bootstrap survival curve from CDS spreads; requires libor_curve.value_dt == value_dt
    evidence: financepy/products/credit/cds_curve.py:44(CDSCurve)
  - name: CDSTranche.value
    description: Price synthetic CDO tranche using Gaussian copula (Li model 2000)
    evidence: financepy/products/credit/cds_tranche.py:1(CDSTranche)
  key_behaviors:
  - behavior: Standard recovery rate = 40%
    description: Industry convention for senior unsecured; material for protection leg PV calculation.
      Recovery rate does not default to standard for CDS curves (v0.240+).
    evidence: financepy/products/credit/cds.py:32(STANDARD_RECOVERY_RATE)
  - behavior: Gaussian copula for tranche valuation
    description: Industry standard (Li model 2000); enables correlation sensitivity. CDSCurve uses survival_prob
      with df() analogy from Ibor curves.
    evidence: financepy/products/credit/cds_tranche.py:1(CDSTranche)
  - behavior: CDSCurve alignment invariant
    description: CDSCurve requires libor_curve.value_dt == value_dt; survival_prob uses df() analogy.
      Mismatched dates raise FinError.
    evidence: financepy/products/credit/cds_curve.py:65-66(__init__)
  replaceable_points:
  - name: pv01_method
    description: PV01 approximation method
    options:
    - name: EXACT
      traits:
      - Precise
      - Default
      fit_for:
      - Production
      - Risk
      not_fit_for:
      - Speed critical
    - name: APPROX
      traits:
      - Fast
      - Approximate
      fit_for:
      - Quick estimates
      not_fit_for:
      - Accurate risk
    default: EXACT
  - name: prot_method
    description: Protection leg calculation
    options:
    - name: PROT_EXACT
      traits:
      - Numerical integration
      - Precise
      fit_for:
      - Default
      - Production
      not_fit_for:
      - Speed critical
    - name: PROT_APPROX
      traits:
      - Analytical approximation
      fit_for:
      - Fast calculations
      not_fit_for:
      - Accurate pricing
    default: PROT_EXACT
  design_decisions:
  - Standard recovery rate = 40% is industry convention for senior unsecured; material for protection
    leg PV (financepy/products/credit/cds.py:32)
  - Gaussian copula for tranche valuation is industry standard (Li model 2000); enables correlation sensitivity
    (financepy/products/credit/cds_tranche.py:1)
  - Numba for protection leg Monte Carlo is critical path in tranche pricing; must match C++ performance
    (financepy/products/credit/cds.py:164)
  - Risky PV01 calculation methods with pv01_method parameter allow approximation vs exact; speed vs accuracy
    tradeoff (financepy/products/credit/cds.py:705)
  acceptance_hints:
  - CDS par spread matches market quote when pricing at market
  - Protection leg + Premium leg = Total PV
  - Survival probability is monotonically decreasing
- id: products_bonds
  name: Bond Products
  order: 8
  responsibility: Price and risk-manage bonds with various structures (fixed, floating, callable, convertible).
    Core fixed income product requiring yield calculations, duration, convexity, and OAS for embedded
    options.
  interface:
    inputs: Bond parameters, yield/curve, model for embedded options
    outputs: Dirty/clean price, yield, duration, convexity, OAS, asset swap spread
  required_methods:
  - name: Bond.dirty_price_from_discount_curve
    description: Calculate bond dirty price (clean + accrued interest) from discount curve
    evidence: financepy/products/bonds/bond.py:942(dirty_price_from_discount_curve)
  - name: Bond.yield_to_maturity
    description: Calculate YTM using convention (UK_DMO or US_TREASURY); OAS via root search finds spread
