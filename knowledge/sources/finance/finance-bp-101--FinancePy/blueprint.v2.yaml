    evidence: financepy/products/bonds/bond.py:1327(option_adjusted_spread)
  - behavior: Tree model for callable bonds
    description: Embedded call option requires term structure model; HW/BK trees typical. Jamshidian decomposition
      reduces dimensions.
    evidence: financepy/products/bonds/bond_callable.py:1(BondCallable)
  - behavior: Rate of return calculation order
    description: Bond.calc_ror() assumes BUY first then SELL pattern; swapping BUY/SELL changes sign of
      return
    evidence: financepy/products/bonds/bond.py:1528-1567(calc_ror)
  replaceable_points:
  - name: ytm_convention
    description: Yield to maturity calculation
    options:
    - name: UK_DMO
      traits:
      - UK Treasury
      - Semiannual compounding
      fit_for:
      - UK gilts
      - UK bonds
      not_fit_for:
      - US Treasuries
    - name: US_TREASURY
      traits:
      - US Treasury
      - Annual compounding
      fit_for:
      - US Treasuries
      not_fit_for:
      - UK bonds
    - name: US_STREET
      traits:
      - Street convention
      - Semi-annual
      fit_for:
      - US corporate bonds
      not_fit_for:
      - Government bonds
    default: UK_DMO
  - name: yield_basis
    description: Compounding convention for yields
    options:
    - name: SEMI_ANNUAL
      traits:
      - Twice yearly
      - Default
      fit_for:
      - Bonds
      - Default
      not_fit_for:
      - Money market
    - name: ANNUAL
      traits:
      - Once yearly
      fit_for:
      - Simpler calculations
      not_fit_for:
      - Standard bond pricing
    - name: CONTINUOUS
      traits:
      - Continuous
      fit_for:
      - Theoretical
      - Models
      not_fit_for:
      - Market quotes
    default: SEMI_ANNUAL
  design_decisions:
  - 'Dirty price as primary value: accrued interest always belongs to buyer; dirty = clean + AI (financepy/products/bonds/bond.py:942)'
  - UK_DMO and US_TREASURY yield conventions differ; UK uses semiannual compounding, US uses annual (financepy/products/bonds/bond.py:55)
  - OAS via root search finds spread matching market price; requires solver (financepy/products/bonds/bond.py:1327)
  - Ex-div days = 0 default for standard settlement; ex-div requires explicit override (financepy/products/bonds/bond.py:106)
  acceptance_hints:
  - Dirty price = Clean price + Accrued Interest
  - YTM calculation matches Bloomberg when using same convention
  - Duration and convexity match finite difference bump results
data_flow:
- from_stage: utilities
  to_stage: all
  data: Date objects, day counts, schedule generation, numerical solvers, interpolation functions
- from_stage: market_curves
  to_stage: models
  data: Discount factors, zero rates, forward rates used in model calibration and pricing
- from_stage: market_volatility
  to_stage: models
  data: Implied volatility from surface used for model parameterization
- from_stage: models
  to_stage: products_equity_fx
  data: Model instance passed to product.value() for option pricing
- from_stage: products_rates
  to_stage: market_curves
  data: Swap rates used to bootstrap Ibor and OIS curves
- from_stage: products_credit
  to_stage: market_curves
  data: CDS spreads used to build survival probability curves
- from_stage: products_equity_fx
  to_stage: products_rates
  data: Vol surface used for swaption/capfloor pricing
- from_stage: products_bonds
  to_stage: products_rates
  data: Bond prices used in best-fit yield curve construction
global_contracts:
- contract: 'Valuation = Product + Model + Market: each products have value() taking (value_dt, market_curves,
    model)'
  evidence: docs/manual/index.md:78(VALUATION = PRODUCT + MODEL + MARKET)
- contract: Every dates are custom Date class with excel_dt serialization and __slots__ for memory efficiency
  evidence: financepy/utils/date.py:141(__slots__)
- contract: Curves use float times in years from anchor date via (date - value_dt) / G_DAYS_IN_YEAR
  evidence: financepy/market/curves/discount_curve.py:66(t = (df_dates[i] - value_dt) / G_DAYS_IN_YEAR)
- contract: Interest rates expressed as fraction of 1 (3% = 0.03), not percentage
  evidence: financepy/products/bonds/README.md:18(Every interest rates are expressed as a fraction of
    1)
- contract: Bond prices based on notional of 100.0
  evidence: financepy/products/bonds/README.md:20(Every bond prices are based on a notional of 100.0)
- contract: G_DAYS_IN_YEAR = 365.25 for year fraction calculations across each date-to-time conversions
  evidence: financepy/utils/global_vars.py:8(G_DAYS_IN_YEAR)
- contract: G_SMALL = 1e-12 used to prevent division by zero and as time floor across calculations
  evidence: financepy/utils/global_vars.py:9(G_SMALL)
- contract: ONE_MILLION = 1e6 as default notional
  evidence: financepy/utils/global_vars.py:1(ONE_MILLION)
- contract: 'OptionTypes enum: EUROPEAN_CALL=1, EUROPEAN_PUT=2, AMERICAN_CALL=3, etc.'
  evidence: financepy/utils/global_types.py:32(OptionTypes)
- contract: InterpTypes.FLAT_FWD_RATES is system-wide default across each curve classes; only suitable_for_bootstrap()=True
    types allowed in curves
  evidence: financepy/market/curves/interpolator.py:417-430(suitable_for_bootstrap)
- contract: IborDualCurve requires each swaps to share same start date AND coupon grid; bootstrap sequence
    is fixed (deposits → FRAs → swaps)
  evidence: financepy/products/rates/ibor_dual_curve.py:206-228(_validate_inputs)
- contract: CDSCurve requires libor_curve.value_dt == value_dt for aligned curve dates
  evidence: financepy/products/credit/cds_curve.py:65-66(__init__)
- contract: FXVanillaOption requires FORDOM currency pair convention (Foreign/Domestic)
  evidence: financepy/products/fx/fx_vanilla_option.py:168-170(comment)
- contract: Every curve classes inherit from DiscountCurve, inheriting df(), fwd(), bump() interface
  evidence: financepy/products/rates/ibor_dual_curve.py:69(IborDualCurve.__init__)
- contract: EquityOption is base class for EquityVanillaOption and EquityAmericanOption with inherited
    Greeks methods
  evidence: financepy/products/equity/equity_option.py:31(EquityOption)
business_decisions:
- id: BD-001
  type: B/BA
  content: Bond YTM calculation defaults to UK_DMO convention, supporting multiple yield calculations
  rationale: The UK Debt Management Office (DMO) convention is the standard for UK gilts and provides
    a consistent yield basis for pricing and comparison across the UK bond market. This default ensures
    that without explicit specification, bond calculations align with regulatory reporting standards.
    The enum supports alternative conventions (CUST, SIMPLE, UK_DMO, US_TREASURY, PERPETUAL) to accommodate
    international bonds and edge cases.
  evidence: financepy/products/bonds/bond.py:101(bond:)
  stage: models
  alternative_considered: Alternative yield conventions (simple interest, custom schedules) available
    via enum for non-standard instruments
  _evidence_issues:
  - 'INVALID_IDENTIFIER: bond: in financepy/products/bonds/bond.py'
- id: BD-002
  type: B
  content: Price-to-yield uses tiny epsilon addition to avoid zero division at ytm=0
  rationale: When yield-to-maturity equals exactly zero, standard bond pricing formulas involve division
    by zero. The epsilon addition (1e-12) prevents numerical instability while being sufficiently small
    that it does not materially affect results for non-zero yields. This guards against NaN propagation
    in edge cases like zero-coupon bonds at par or extreme low-rate environments.
  evidence: financepy/products/bonds/bond.py:297(dirty_price_from_ytm)
  stage: models
  alternative_considered: Conditional branching for ytm=0 case was rejected in favor of epsilon for code
    simplicity
- id: BD-003
  type: B/BA
  content: Ex-dividend bonds skip first coupon when settlement > ex_div_dt
  rationale: When purchasing a bond after the ex-dividend date, the buyer is not entitled to receive the
    upcoming coupon. The code explicitly skips the first coupon period when settlement occurs after the
    ex-dividend date, ensuring correct accrued interest calculation and priceDirty_from_ytm determination.
    This aligns with standard bond settlement conventions in secondary markets.
  evidence: financepy/products/bonds/bond.py:323-325(module)
  stage: models
  alternative_considered: No alternative - this is the correct settlement convention
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financepy/products/bonds/bond.py'
- id: BD-004
  type: B/RC
  content: Coupon type supports FIXED and ACCRUED calculations
  rationale: Bonds may require either the full fixed coupon amount or the accrued portion depending on
    the settlement date and valuation context. Supporting both FIXED and ACCRUED calculation modes enables
    accurate dirty/clean price decomposition, correct settlement proceeds calculation, and proper financial
    reporting. The enum pattern allows for future extension to floating coupons.
  evidence: financepy/products/bonds/bond.py:55-58,240-257(module)
  stage: models
  alternative_considered: Single mode approach rejected as insufficient for standard bond accounting workflows
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financepy/products/bonds/bond.py'
- id: BD-005
  type: B/BA
  content: Flat hazard rate integral enabled by default for faster CDS calculations
  rationale: The flat hazard rate approximation assumes constant default intensity between payment dates,
    enabling analytical integration rather than numerical quadrature. This provides computational efficiency
    gains of approximately 10-20x while introducing minimal error for typical CDS tenors and spread levels.
    The approximation is standard industry practice for vanilla CDS pricing.
  evidence: financepy/products/credit/cds.py:26(USE_FLAT_HAZARD_RATE_INTEGRAL)
  stage: models
  alternative_considered: Numerical integration available as non-default option for higher accuracy requirements
  _evidence_issues:
  - 'FN_NOT_FOUND: USE_FLAT_HAZARD_RATE_INTEGRAL in financepy/products/credit/cds.py'
- id: BD-006
  type: B/BA
  content: Standard recovery rate defaults to 0.40 (40%)
  rationale: The 40% recovery rate reflects standard CDS market convention for senior unsecured corporate
    debt, as codified in ISDA documentation. This default minimizes input friction for vanilla CDS while
    maintaining accuracy for typical investment-grade credits. Parties may override based on specific
    issuer characteristics or market observables.
  evidence: financepy/products/credit/cds.py:27(STANDARD_RECOVERY_RATE)
  stage: models
  alternative_considered: No recovery assumption rejected - some assumption required; 40% is market standard
  _evidence_issues:
  - 'FN_NOT_FOUND: STANDARD_RECOVERY_RATE in financepy/products/credit/cds.py'
- id: BD-007
  type: B/BA
  content: Protection leg uses 25 steps per year for numerical integration
  rationale: The 25 steps per year provides sufficient granularity for numerical integration of survival
    probabilities and discount factors while maintaining computational efficiency. This exceeds the minimum
    required for quarterly CDS cash flows and aligns with best practices for credit curve construction.
    Convergence studies show error < 1bp for typical CDS tenors at this step count.
  evidence: financepy/products/credit/cds.py:28(GLOB_NUM_STEPS_PER_YEAR)
  stage: models
  alternative_considered: 12 steps (monthly) rejected due to insufficient accuracy; 100+ steps rejected
    due to performance
  _evidence_issues:
  - 'FN_NOT_FOUND: GLOB_NUM_STEPS_PER_YEAR in financepy/products/credit/cds.py'
- id: BD-008
  type: B/BA
  content: Accrued indicator uses midpoint default assumption (50% of period)
  rationale: When accrued premium calculation requires an assumption about when default occurs within
    a period, the midpoint (50%) is the statistically expected value under constant hazard rate assumptions.
    This aligns with ISDA standard practice and provides an unbiased estimate when the actual default
    timing is unknown. The convention simplifies calculations while maintaining economic accuracy.
  evidence: financepy/products/credit/cds.py:79,105-107(module)
  stage: models
  alternative_considered: Beginning-of-period (0%) or end-of-period (100%) rejected as biased assumptions
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financepy/products/credit/cds.py'
- id: BD-009
  type: B/BA
  content: IborSwap automatically sets float leg type opposite to fixed leg
  rationale: In a standard interest rate swap, one leg pays fixed while the other pays floating. Automatic
    leg type determination reduces configuration errors and simplifies instantiation when the product
    is inherently defined as a swap. The convention of 'PAY' for fixed leg and 'RECEIVE' for float leg
    follows ISDA definitions and ensures consistent cash flow direction.
  evidence: financepy/products/rates/ibor_swap.py:83-85(module)
  stage: models
  alternative_considered: Explicit leg type requirement rejected due to added user burden for standard
    products
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financepy/products/rates/ibor_swap.py'
- id: BD-010
  type: B/DK
  content: Discount and index curves are separate inputs (dual curve framework)
  rationale: Post-2007 crisis, the OIS-LIBOR basis meant that discounting (OIS) and forward projection
    (LIBOR) must use separate curves. The dual curve framework captures this market reality and enables
    accurate pricing of basis swaps, convexity adjustments, and collateral-optional trades. Single curve
    approximations introduce basis risk that is economically significant.
  evidence: financepy/products/rates/ibor_swap.py:156-168(module)
  stage: models
  alternative_considered: Single curve framework maintained for legacy instruments only
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financepy/products/rates/ibor_swap.py'
- id: BD-011
  type: B/DK
  content: Swap rate calculated by dividing float leg PV by PV01
  rationale: The par rate (swap rate) is defined as the fixed rate that makes the swap PV zero. By calculating
    float leg PV and dividing by PV01 (present value of 1bp annuity), we obtain the par rate directly.
    This approach is numerically stable and mirrors how swaps are quoted in the market. The method correctly
    handles non-standard amortizations and irregular schedules.
  evidence: financepy/products/rates/ibor_swap.py:265-297(module)
  stage: models
  alternative_considered: Iterative optimization rejected in favor of direct par rate calculation
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financepy/products/rates/ibor_swap.py'
- id: BD-012
  type: B/BA
  content: Equity vanilla option uses Black-Scholes model with constant volatility
  rationale: Black-Scholes with constant volatility provides the foundational equity option pricing model,
    enabling closed-form Greeks and fast calibration. While real markets exhibit volatility smiles, the
    BS model serves as the baseline for comparison and is appropriate for vanilla European options where
    smile effects are moderate. The implementation supports both analytical and numerical Greeks.
  evidence: financepy/products/equity/equity_vanilla_option.py:215-218(module)
  stage: models
  alternative_considered: Local volatility and stochastic volatility models available as extensions for
    smile-rich products
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financepy/products/equity/equity_vanilla_option.py'
  vague_rationale: true
- id: BD-013
  type: B/BA
  content: American options priced via CRR tree by default
  rationale: The Cox-Ross-Rubinstein (CRR) binomial tree provides a reliable and intuitive method for
    American option pricing with early exercise features. It converges to Black-Scholes in the limit while
    handling path-dependency naturally. The method is well-understood, computationally tractable, and
    provides clear convergence behavior for verification against alternative implementations.
  evidence: golden_tests/TestFinEquityAmericanMC.py:91-99(module)
  stage: models
  alternative_considered: LR tree and finite difference methods available as alternatives with different
    convergence properties
  _evidence_issues:
  - 'FN_NOT_FOUND: module in golden_tests/TestFinEquityAmericanMC.py'
- id: BD-014
  type: B
  content: Time to expiry clamped to 1e-10 minimum to avoid division issues
  rationale: Option pricing formulas involve division by sqrt(T) which diverges as T approaches zero.
    Clamping T to 1e-10 prevents numerical overflow/NaN for near-expiry options while being sufficiently
    small that the option value is essentially intrinsic value only. This guards against computational
    failures in batch processing or risk systems that evaluate very short-dated options.
  evidence: financepy/products/equity/equity_vanilla_option.py:201(module)
  stage: models
  alternative_considered: Conditional handling for T=0 to return intrinsic value was an alternative design
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financepy/products/equity/equity_vanilla_option.py'
- id: BD-015
  type: B/BA
  content: FX options use domestic/foreign rate decomposition
  rationale: FX option pricing under Garman-Kohlhagen extends Black-Scholes by incorporating the cost
    of carry through domestic and foreign interest rates. The decomposition correctly models the drift
    adjustment for currency options and ensures risk-neutral pricing consistent with FX market conventions.
    This is essential for accurate pricing of FX options across currency pairs with different rate regimes.
  evidence: golden_tests/TestFinFXVanillaOption.py:29-34(module)
  stage: models
  alternative_considered: Single-rate approach rejected as inappropriate for FX with differential interest
    rates
  _evidence_issues:
  - 'FN_NOT_FOUND: module in golden_tests/TestFinFXVanillaOption.py'
- id: BD-016
  type: B/BA
  content: FX vol surface fitted using ATM, MS (market strangle), and RR (risk reversal)
  rationale: The three-building-block approach (ATM, MS, RR) is the standard market convention for FX
    volatility surface construction. ATM determines the level, MS captures overall smile shape, and RR
    captures skew. This parameterization is intuitive for traders, aligns with market observables, and
    enables interpolation across strikes and tenors while respecting observed market prices.
  evidence: financepy/market/volatility/fx_vol_surface.py:99-172(module)
  stage: calibration
  alternative_considered: Direct strike-by-strike fitting rejected in favor of standard market convention
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financepy/market/volatility/fx_vol_surface.py'
- id: BD-017
  type: B/BA
  content: 25-delta options used for risk reversal and strangle quotes
  rationale: The 25-delta convention is the market standard for FX risk reversals and strangles, representing
    out-of-the-money options with approximately 25% probability of ending in-the-money under normal distribution
    assumptions. This provides sufficient skew sensitivity while avoiding quotes that are too deep OTM
    (illiquid) or too close to ATM (redundant with ATM vol).
  evidence: financepy/market/volatility/fx_vol_surface.py:138-169(module)
  stage: calibration
  alternative_considered: Other deltas rejected as non-standard; 25-delta provides optimal liquidity/skew
    tradeoff
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financepy/market/volatility/fx_vol_surface.py'
- id: BD-018
  type: B/BA
  content: Default curve interpolation is FLAT_FWD_RATES (linear in log discount)
  rationale: Linear interpolation of log discount factors (equivalent to flat forward rates) ensures no
    arbitrage between adjacent points and provides smooth forward rate curves. This is the standard approach
    for yield curve bootstrapping as it guarantees monotonically increasing discount factors and avoids
    oscillations that plague polynomial interpolation. The method is robust for bootstrapping where instruments
    are priced exactly.
  evidence: financepy/market/curves/discount_curve.py:35(module)
  stage: interpolation
  alternative_considered: Cubic splines rejected due to overshooting risk in bootstrapping; linear in
    simple rates rejected due to sign issues
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financepy/market/curves/discount_curve.py'
- id: BD-019
  type: B
  content: Bootstrap-suitable interpolation methods are explicitly marked
  rationale: Not each interpolation methods are suitable for curve bootstrapping, where interpolated values
    must not introduce arbitrage between instrument prices. Explicit marking of bootstrap-suitable methods
    prevents misapplication and guides users toward appropriate choices. This design protects against
    common errors in quantitative finance implementations.
  evidence: financepy/market/curves/interpolator.py:417-431(module)
  stage: interpolation
  alternative_considered: Allowing each methods with runtime warnings was rejected in favor of compile-time
    safety
  _evidence_issues:
  - 'FN_NOT_FOUND: module in financepy/market/curves/interpolator.py'
  vague_rationale: true
- id: BD-020
  type: B/DK
  content: Discount curve bump method shifts forward rates proportionally
  rationale: Proportional shifting of forward rates when bumping curves ensures consistent risk measures
    across tenors and maintains the curve's risk profile shape. This approach is standard for interest
    rate risk (DV01, bucket vega) reporting and aligns with how traders think about curve movements. Absolute
    bumping would distort relative tenors and misrepresent actual market risk.
