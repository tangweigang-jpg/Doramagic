# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-110
name: cryptofeed
sop_version: '3.6'
source:
  projects:
  - cryptofeed
  commit_hash: fe5993b017df8d57df64b2ad4d8f45f45884b231
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Real-time cryptocurrency market data feed aggregation and normalization
  description: A Python library that connects to multiple cryptocurrency exchanges via WebSocket and REST
    APIs, normalizes market data (trades, order books, tickers, candles), and delivers structured data
    to user callbacks or storage backends.
  prerequisites: Users should understand asyncio programming, cryptocurrency market data concepts (trades,
    order books, candles), and the difference between WebSocket streaming and REST polling.
  not_suitable_for: Historical data retrieval, order execution/trading, low-latency HFT systems requiring
    custom network optimization, non-cryptocurrency markets
stages:
- id: feed_orchestration
  name: Feed Handler Orchestration
  order: 1
  responsibility: 'Main entry point that coordinates multiple exchange feeds, manages their lifecycle
    (start/stop), and aggregates NBBO quotes across feeds. WHY: Provides a unified interface for subscribing
    to multiple exchanges and combining their data.'
  interface:
    inputs:
    - Exchange configuration
    - Callback mappings
    - Subscription requests
    outputs:
    - Normalized market data events
  required_methods:
  - name: FeedHandler.add_feed
    description: Registers an exchange feed with the handler, specifying the exchange ID, channels, symbols,
      and callbacks
    evidence: feedhandler.py:add_feed
  - name: FeedHandler.add_nbbo
    description: Creates a National Best Bid/Offer feed by combining data from multiple exchanges for
      specified symbols
    evidence: feedhandler.py:add_nbbo
  - name: FeedHandler.run
    description: Starts the asyncio event loop, initializes each feeds, and blocks until termination or
      exception
    evidence: feedhandler.py:run
  key_behaviors:
  - behavior: Feed lifecycle management
    description: Each feed is started in its own asyncio task, managed by the FeedHandler's event loop
    evidence: feedhandler.py:run
  - behavior: Subscription mutual exclusion
    description: Feed requires either subscription= parameter OR channels+symbols parameters - not both.
      Using both causes silent ignore of one set
    evidence: feed.py:92-93
  replaceable_points:
  - name: async_event_loop
    description: The asyncio event loop implementation used for feed management
    options:
    - name: uvloop
      traits:
      - High performance
      - Linux/macOS only
      - C-extension based
      fit_for:
      - Production deployments
      - High throughput requirements
      not_fit_for:
      - Windows environments
      - Simple scripts
    - name: standard asyncio
      traits:
      - Cross-platform
      - Standard library
      fit_for:
      - Development
      - Windows compatibility
      - Simple use cases
      not_fit_for:
      - Maximum throughput
      - Latency-critical applications
    default: uvloop on non-Windows
  design_decisions:
  - 'WebSocket-first architecture - uses WebSocket connections when exchanges support them, falling back
    to REST polling. Evidence: feed.py __init__ and connection.py'
  - 'asyncio-based concurrency - each I/O operations are non-blocking. Evidence: feedhandler.py uses asyncio.gather'
  acceptance_hints:
  - Multiple exchanges can be added and started simultaneously
  - FeedHandler.run() blocks until an exception or SIGINT/SIGTERM
  - start_loop=False allows user-managed event loops
- id: connection_management
  name: Connection Management
  order: 2
  responsibility: 'Manages low-level WebSocket and HTTP connections to exchanges, including heartbeat,
    reconnection, and message framing. WHY: Provides reliable, persistent connections with automatic reconnection
    and keeps connections alive.'
  interface:
    inputs:
    - WebSocket/HTTP endpoint URLs
    - Connection configuration
    outputs:
    - Raw message bytes/strings
  required_methods:
  - name: WebsocketEndpoint.connect
    description: Establishes a WebSocket connection with automatic ping/pong heartbeat
    evidence: connection.py:connect
  - name: WebsocketEndpoint.read
    description: Async iterator that yields incoming WebSocket messages
    evidence: connection.py:read
  - name: WebsocketEndpoint.write
    description: Sends data over the WebSocket connection
    evidence: connection.py:write
  key_behaviors:
  - behavior: Heartbeat mechanism
    description: WebSocket connections send ping frames every ping_interval seconds (default 10s) to detect
      dead connections
    evidence: connection.py:365
  - behavior: Automatic reconnection
    description: On connection failure, exponential backoff reconnection is attempted with configurable
      max retries
    evidence: connection.py
  - behavior: SSL/TLS support
    description: Every WebSocket connections support secure wss:// protocol
    evidence: connection.py:websocket_connect
  replaceable_points:
  - name: websocket_library
    description: The underlying WebSocket client library
    options:
    - name: websockets (official)
      traits:
      - Modern
      - Active maintenance
      - Full RFC6455
      fit_for:
      - New deployments
      - Standard use cases
      not_fit_for:
      - Legacy systems
    default: websockets>=14.1
  design_decisions:
  - 'ping_interval=10s is the default heartbeat - trades off between detection speed and network overhead.
    Evidence: connection.py:365'
  - Connection objects are feed-scoped, not shared between feeds
  acceptance_hints:
  - Connections survive network hiccups via reconnection
  - Ping/pong messages appear in logs at DEBUG level
  - Connection close is properly handled with status codes
- id: exchange_interface
  name: Exchange Interface Layer
  order: 3
  responsibility: 'Implements exchange-specific WebSocket subscription formats, message parsing, and REST
    API calls. WHY: Each exchange has unique message formats, authentication methods, and subscription
    protocols that must be normalized.'
  interface:
    inputs:
    - Normalized symbol/channel requests
    - Exchange-specific configs
    outputs:
    - Normalized data dictionaries
  required_methods:
  - name: Binance.subscribe
    description: Subscribes to WebSocket channels with Binance-specific message format
    evidence: binance.py:subscribe
  - name: Coinbase._connect
    description: Establishes Coinbase WebSocket connection with product batch subscription
    evidence: coinbase.py:_connect
  - name: Exchange.standardize_symbol
    description: Converts exchange-specific symbols to normalized format
    evidence: exchange.py:standardize_symbol
  key_behaviors:
  - behavior: Symbol normalization
    description: Exchange-specific symbols (BTC-USDT, BTC_USDT, XBT/USD) are normalized to unified format
    evidence: exchange.py:48-49, symbols.py
  - behavior: Message parsing
    description: JSON messages from exchanges are parsed and converted to internal data structures
    evidence: exchange.py:message_handler
  - behavior: Trade side normalization
    description: BUY='buy' and SELL='sell' constants must be enforced across ALL exchange mixins for data
      integrity
    evidence: defines.py:81-82
  replaceable_points:
  - name: symbol_mapping_backend
    description: How exchange symbols are mapped to normalized symbols
    options:
    - name: Symbols singleton
      traits:
      - Lazy loading
      - Cached
      - Singleton pattern
      fit_for:
      - Production with many symbols
      not_fit_for:
      - Dynamic symbol discovery
    default: Symbols singleton with populate() check
  - name: rest_rate_limit_handling
    description: How rate limit errors from REST APIs are handled
    options:
    - name: Exponential backoff retry
      traits:
      - Automatic
      - Configurable delay
      - Uniform across exchanges
      fit_for:
      - General use
      not_fit_for:
      - Real-time critical operations
    default: retry_delay=60 seconds
  design_decisions:
  - 'Symbol population via Symbols.populated() check - must call before symbol_mapping(). Prevents data
    corruption. Evidence: exchange.py:48-49'
  - 'Every REST mixins inherit retry_delay=60s default for uniform rate limit handling. Evidence: exchange.py:194,198,205,212,219,226,233,240'
  - 'BinanceFuturesRestMixin inherits from BinanceRestMixin, overriding only differences. Evidence: binance_rest.py:180-215'
  acceptance_hints:
  - Symbols are correctly normalized across each exchanges
  - Subscription messages match exchange specifications
  - REST endpoints retry on 429 rate limit errors
- id: data_normalization
  name: Data Normalization
  order: 4
  responsibility: 'Converts raw exchange messages into typed data objects with consistent field names
    and types. WHY: Ensures each downstream consumers receive data in the same format regardless of which
    exchange it came from.'
  interface:
    inputs:
    - Raw exchange message dictionaries
    outputs:
    - Typed data objects (Trade, Ticker, Book, etc.)
  required_methods:
  - name: Trade.__init__
    description: Creates an immutable Trade object with exchange, symbol, side, amount, price, timestamp
    evidence: types.pyx:Trade
  - name: Book.__init__
    description: Creates an immutable Book object representing order book state
    evidence: types.pyx:Book
  - name: Callback.__call__
    description: Processes normalized data and invokes user callback
    evidence: callback.py:__call__
  key_behaviors:
  - behavior: Type checking
    description: Data objects perform optional type validation on fields if configured at build time
    evidence: types.pyx (setup.py line 40)
  - behavior: Field immutability
    description: Data object fields are readonly to prevent accidental modification by clients
    evidence: types.pyx
  - behavior: Consistent field names
    description: 'Every exchanges use same field names: exchange, symbol, side, amount, price, timestamp'
    evidence: types.pyx Trade, Ticker definitions
  replaceable_points:
  - name: type_validation
    description: Whether field types are validated at runtime
    options:
    - name: strict_validation
      traits:
      - Runtime checks
      - Fail-fast
      - Slower
      fit_for:
      - Development
      - Data integrity critical
      not_fit_for:
      - Production performance
    - name: no_validation
      traits:
      - Fast
      - No overhead
      - Trust input
      fit_for:
      - Production
      - High throughput
      not_fit_for:
      - Debugging type issues
    default: Validation enabled (comment out line in setup.py to disable)
  design_decisions:
  - 'Custom data types via Cython types.pyx - ensures consistent interface and optional type checking.
    Evidence: docs/dtypes.md'
  acceptance_hints:
  - Every data objects have consistent field structure
  - Type errors raise exceptions when validation enabled
  - Fields cannot be modified after creation
- id: book_processing
  name: Order Book Processing
  order: 5
  responsibility: 'Maintains local order book state by applying deltas to snapshots, validates book integrity
    via checksums/sequence numbers. WHY: Exchanges send incremental updates that must be correctly merged
    to produce accurate book state.'
  interface:
    inputs:
    - Book delta/snapshot messages
    outputs:
    - Full book state snapshots
  required_methods:
  - name: Book.callback
    description: Receives book updates and manages book state
    evidence: backend.py:110-125
  - name: Book.update
    description: Applies delta updates to local book state
    evidence: backend.py
  key_behaviors:
  - behavior: Snapshot-then-delta processing
    description: snapshots_only check runs BEFORE delta processing - architectural ordering that ensures
      correct state
    evidence: backend.py:110-125
  - behavior: Sequence number validation
    description: Detects missing messages by tracking sequence numbers where supported
    evidence: docs/book_validation.md
  - behavior: Checksum validation (optional)
    description: Validates book integrity by comparing calculated vs exchange-provided checksums
    evidence: docs/book_validation.md
  replaceable_points:
  - name: book_depth
    description: How many price levels to maintain per side
    options:
    - name: full_depth
      traits:
      - Complete book
      - High memory
      - Accurate mid-price
      fit_for:
      - Analysis
      - Low-frequency trading
      not_fit_for:
      - Memory constrained
      - High-frequency
    - name: limited_depth
      traits:
      - Top N levels
      - Low memory
      - Fast processing
      fit_for:
      - Real-time dashboards
      - Memory constrained
      not_fit_for:
      - Deep book analysis
    default: Configurable depth per exchange
  design_decisions:
  - 'Sequence number checking enabled on each supporting exchanges - catches missing messages. Evidence:
    docs/book_validation.md'
  - Checksum validation optional (user-enabled) due to performance overhead (10-100μs per update)
  acceptance_hints:
  - Book deltas correctly update local state
  - Missing messages trigger book reset/reconnection
  - Checksum mismatches logged when validation enabled
- id: nbbo_aggregation
  name: NBBO Aggregation
  order: 6
  responsibility: 'Combines best bid/offer quotes from multiple exchanges to produce National Best Bid/Offer.
    WHY: Provides consolidated best prices across each connected exchanges for a given symbol.'
  interface:
    inputs:
    - Ticker updates from multiple exchanges
    outputs:
    - Consolidated NBBO quotes
  required_methods:
  - name: NBBO._update
    description: Extracts bid@0 and ask@0 from order book updates and recalculates NBBO
    evidence: nbbo.py:22-25
  key_behaviors:
  - behavior: Top-of-book extraction
    description: NBBO uses index(0) to extract best bid and best ask - order book index(0) is architectural
    evidence: nbbo.py:22-25
  - behavior: Real-time updates
    description: NBBO recalculated on every ticker/book update from any contributing exchange
    evidence: nbbo.py
  replaceable_points:
  - name: nbbo_source
    description: What data source to use for NBBO
    options:
    - name: ticker_feed
      traits:
      - Low latency
      - May not include book
      fit_for:
      - Speed critical
      not_fit_for:
      - Book depth analysis
    - name: order_book_feed
      traits:
      - Complete
      - Higher latency
      fit_for:
      - Accurate NBBO
      not_fit_for:
      - Minimum latency requirements
    default: ticker feed when available
  design_decisions:
  - 'Uses index(0) for best bid/ask extraction - changes to different levels would fundamentally alter
    NBBO calculation. Evidence: nbbo.py:22-25'
  acceptance_hints:
  - NBBO reflects true best bid across each exchanges
  - NBBO reflects true best ask across each exchanges
  - Updates delivered within milliseconds of source exchange message
- id: callback_dispatch
  name: Callback Dispatch
  order: 7
  responsibility: 'Routes normalized data to user-registered callback functions or backend handlers. WHY:
    Provides flexible data delivery to user code while supporting common storage patterns.'
  interface:
    inputs:
    - Typed data objects
    - Callback registrations
    outputs:
    - User callback invocations
  required_methods:
  - name: Callback.__call__
    description: Invokes user callback with normalized data
    evidence: callback.py:__call__
  - name: AggregateCallback.__init__
    description: Wraps handlers with aggregation capabilities, delegates lifecycle via hasattr introspection
    evidence: aggregate.py:14-18
  key_behaviors:
  - behavior: Handler lifecycle delegation
    description: AggregateCallback delegates start/stop lifecycle to wrapped handler via hasattr introspection
    evidence: aggregate.py:14-18
  - behavior: Backend serialization
    description: BackendCallback.to_dict() called with numeric_type and none_to - breaking this corrupts
      stored data
    evidence: backend.py:92-97
  replaceable_points:
  - name: callback_type
    description: How data is delivered to user code
    options:
    - name: raw_callback
      traits:
      - Direct data
      - User controls processing
      fit_for:
      - Custom processing
      - Real-time analysis
      not_fit_for:
      - Storage
      - Persistence
    - name: backend_callback
      traits:
      - Built-in storage
      - Standardized
      fit_for:
      - Data persistence
      - Analytics
      not_fit_for:
      - Custom processing needs
    default: raw_callback
  design_decisions:
  - 'BackendCallback.to_dict() serialization contract - implementations must accept numeric_type and none_to
    parameters. Evidence: backend.py:92-97'
  acceptance_hints:
  - User callbacks receive typed data objects
  - Backend callbacks serialize correctly to target storage
  - start()/stop() lifecycle properly propagated to backends
- id: backend_storage
  name: Backend Storage
  order: 8
  responsibility: 'Persists normalized market data to various storage backends (Redis, PostgreSQL, Kafka,
    etc.). WHY: Enables time-series storage of market data for backtesting, analytics, and replay.'
  interface:
    inputs:
    - Normalized data objects
    outputs:
    - Persisted storage records
  required_methods:
  - name: Backend.write
    description: Writes data to the storage backend
    evidence: backend.py:write
  - name: Backend.start
    description: Initializes backend resources (connections, tables)
    evidence: backend.py:start
  - name: BackendQueue.start
    description: Initializes IPC queue for backend communication, multiprocess=False default uses Queue
      vs Pipe
    evidence: backend.py:17-29
  key_behaviors:
  - behavior: Asynchronous writes
    description: BackendQueue uses asyncio.Queue for non-blocking data transfer from feed to backend
    evidence: backend.py:17-29
  - behavior: Multiprocess support
    description: BackendQueue multiprocess=False default determines Queue vs multiprocessing.Pipe IPC
      mechanism
    evidence: backend.py:17-29
  - behavior: OHLCV aggregation
    description: OHLCV window=300 seconds (5 min) is the architectural default aggregation period
    evidence: aggregate.py:48
  - behavior: Throttling
    description: Throttle window=60 seconds limits callback invocation rate
    evidence: aggregate.py:28
  replaceable_points:
  - name: storage_backend
    description: Target storage system for market data
    options:
    - name: Redis
      traits:
      - In-memory
      - Sub-ms latency
      - Pub/sub ready
      fit_for:
      - Real-time access
      - Caching
      - High throughput
      not_fit_for:
      - Analytical queries
      - Large datasets
    - name: PostgreSQL
      traits:
      - SQL queries
      - ACID
      - Mature
      fit_for:
      - Historical analysis
      - Complex queries
      not_fit_for:
      - Extremely high throughput
      - Time-series optimization
    - name: Kafka
      traits:
      - Distributed
      - Durable
      - Replayable
      fit_for:
      - Event streaming
      - Multiple consumers
      not_fit_for:
      - Simple use cases
      - Single consumer
    - name: InfluxDB
      traits:
      - Time-series optimized
      - Compression
      fit_for:
      - Time-series analysis
      - Metrics storage
      not_fit_for:
      - Relational queries
    default: User choice based on requirements
  - name: ipc_mechanism
    description: Inter-process communication between feeds and backends
    options:
    - name: asyncio_queue
      traits:
      - Single process
      - Low overhead
      - Fast
      fit_for:
      - Single process deployments
      - Low latency
      not_fit_for:
      - True parallelism
      - CPU-bound backends
    - name: multiprocessing_pipe
      traits:
      - Multi-process
      - True parallelism
      fit_for:
      - CPU-intensive backends
      - Isolation requirements
      not_fit_for:
      - Simple deployments
      - Low latency priority
    default: asyncio Queue (multiprocess=False)
  design_decisions:
  - 'BackendQueue multiprocess=False default uses Queue over multiprocessing.Pipe - changes entire IPC
    mechanism. Evidence: backend.py:17-29'
  - 'OHLCV window=300s and Throttle window=60s are architectural defaults affecting each users. Evidence:
    aggregate.py:48, aggregate.py:28'
  acceptance_hints:
  - Data successfully written to storage backend
  - No data loss during high-volume periods
  - Backend start/stop properly cleans up resources
data_flow:
- from_stage: external
  to_stage: connection_management
  data: Exchange WebSocket/HTTP connections
- from_stage: connection_management
  to_stage: exchange_interface
  data: Raw JSON message bytes
- from_stage: exchange_interface
  to_stage: symbol_normalization
  data: Exchange-specific symbol strings
- from_stage: symbol_normalization
  to_stage: data_normalization
  data: Normalized symbol references
- from_stage: data_normalization
  to_stage: book_processing
  data: Order book update messages (snapshots and deltas)
- from_stage: data_normalization
  to_stage: nbbo_aggregation
  data: Ticker and book updates for best bid/ask calculation
- from_stage: book_processing
  to_stage: callback_dispatch
  data: Full order book snapshots
- from_stage: nbbo_aggregation
  to_stage: callback_dispatch
  data: Consolidated NBBO quotes
- from_stage: data_normalization
  to_stage: callback_dispatch
  data: Trade, Ticker, Candle, and other typed data objects
- from_stage: callback_dispatch
  to_stage: backend_storage
  data: Normalized data for persistence
- from_stage: callback_dispatch
  to_stage: external
  data: User callback invocations with typed data
global_contracts:
- contract: Every DataFrames/data structures use normalized symbols in format like BTC-USD
  evidence: exchange.py:48-49, symbols.py
- contract: Trade side must be normalized to BUY='buy', SELL='sell' across each exchange mixins
  evidence: defines.py:81-82, binance_rest.py:107, coinbase_rest.py:141, bitmex_rest.py:57, kraken_rest.py:150
- contract: Symbols singleton requires Symbols.populated() check before symbol_mapping() calls
  evidence: exchange.py:48-49, symbols.py
- contract: Feed subscription requires either subscription= OR channels+symbols, not both
  evidence: feed.py:92-93
- contract: WebSocket ping_interval=10s default applies to each connections
  evidence: connection.py:365
- contract: BackendCallback.to_dict() must accept numeric_type and none_to parameters
  evidence: backend.py:92-97
- contract: Order book snapshots_only check must run BEFORE delta processing
  evidence: backend.py:110-125
- contract: timedelta_str_to_sec() mappings must be updated when new candle intervals are added
  evidence: util/time.py:10-45
- contract: NBBO extracts bid@0 and ask@0 using index(0) on order book
  evidence: nbbo.py:22-25
business_decisions:
- id: BD-001
  type: B/BA
  content: Throttle default window of 60 seconds - allows 1 update per window, drops each others
  rationale: 'Defensive throttling protects downstream systems from message floods by enforcing a 60-second
    cooldown window. This prevents infrastructure overload when exchange WebSocket streams emit high-frequency
    updates. Boundary: updates arriving within the same 60-second window are silently dropped rather than
    queued.'
  evidence: cryptofeed/backends/aggregate.py:28(Throttle.__init__)
  stage: nbbo_aggregation
  alternative_considered: Queue-based buffering was rejected in favor of drop behavior to prevent unbounded
    memory growth
- id: BD-002
  type: B/BA
  content: OHLCV default window of 300 seconds (5 minutes) for candle aggregation
  rationale: 'Five-minute OHLCV windows balance granularity against storage overhead for typical analytical
    workflows. This aligns with common charting conventions while keeping memory footprint manageable.
    Boundary: partial candles are discarded until the window completes.'
  evidence: cryptofeed/backends/aggregate.py:48(OHLCV.__init__)
  stage: nbbo_aggregation
  alternative_considered: Shorter 1-minute windows were rejected due to excessive storage; longer 15-minute
    windows lacked sufficient granularity
- id: BD-003
  type: B/BA
  content: RenkoFixed default brick_size of 10 points
  rationale: 'Fixed 10-point brick size provides consistent price-based filtering that abstracts minor
    fluctuations while highlighting significant trend changes. Boundary: price movements less than 10
    points produce no brick output.'
  evidence: cryptofeed/backends/aggregate.py:80(renkofixed)
  stage: nbbo_aggregation
  alternative_considered: Percentage-based brick sizing was rejected for being exchange-dependent
  _evidence_issues:
  - 'FN_NOT_FOUND: renkofixed in cryptofeed/backends/aggregate.py'
- id: BD-004
  type: B
  content: Snapshot interval of 1000 updates before writing a new snapshot for order books
  rationale: 'Snapshotting every 1000 updates balances Redis write performance against data durability
    requirements. This reduces I/O overhead compared to per-update snapshots while maintaining reasonable
    recovery points. Boundary: up to 999 updates may be lost on crash.'
  evidence: cryptofeed/backends/redis.py:115(BookRedis.__init__)
  stage: persistence
  alternative_considered: Time-based snapshots were rejected as they cause variable write patterns
- id: BD-005
  type: B/BA
  content: Snapshots only mode for order books - only writes complete snapshots, not deltas
  rationale: 'Snapshot-only mode simplifies state reconstruction at the cost of higher storage bandwidth.
    Eliminates delta sequencing complexity for use cases requiring full state restoration. Boundary: delta-based
    incremental updates are discarded in this mode.'
  evidence: cryptofeed/backends/redis.py:115(BookRedis.__init__)
  stage: persistence
  alternative_considered: Hybrid snapshot+delta mode was considered but adds reconstruction complexity
- id: BD-006
  type: B/BA
  content: Redis ZSet default score_key='timestamp' for time-series data ordering
  rationale: 'Timestamp-based scoring enables efficient time-range queries on historical data stored in
    Redis ZSets. This supports ordered retrieval by exchange receipt time. Boundary: ordering is lexicographic
    within identical timestamps; secondary ordering undefined.'
  evidence: cryptofeed/backends/redis.py:35(RedisZSetCallback.__init__)
  stage: persistence
  alternative_considered: Sequence-number scoring was rejected due to cross-feed ordering complexity
- id: BD-007
  type: B/BA
  content: Numeric type defaults to float for backend serialization
  rationale: 'Float serialization provides universal numeric compatibility across Redis clients and Python
    versions without requiring decimal precision overhead. Boundary: floating-point precision limits apply;
    large integers may lose sub-unit accuracy.'
  evidence: cryptofeed/backends/redis.py:16(RedisCallback.__init__)
  stage: persistence
  alternative_considered: Decimal serialization was rejected due to JSON interop complexity
- id: BD-008
  type: B
  content: None values converted to 'None' string for Redis storage
  rationale: 'Stringifying None prevents null serialization errors in Redis and maintains field presence
    information. However this creates semantic ambiguity requiring careful deserialization. Boundary:
    ''None'' string must be explicitly decoded back to None on read.'
  evidence: cryptofeed/backends/redis.py:16(RedisCallback.__init__)
  stage: persistence
  alternative_considered: Omitting None fields entirely was rejected as it loses presence semantics
- id: BD-009
  type: B
  content: AsyncIO queue for backend writes with configurable multiprocessing
  rationale: 'Asynchronous queue decouples data ingestion from persistence operations, preventing blocking
    I/O from impacting feed processing throughput. Boundary: queue depth must be monitored to prevent
    unbounded memory growth under backpressure.'
  evidence: cryptofeed/backends/backend.py:16(BackendQueue.start)
  stage: persistence
  alternative_considered: Synchronous writes were rejected due to throughput limitations
- id: BD-010
  type: B
  content: Daemon process for multiprocess backend workers
  rationale: 'Daemonized workers enable clean process lifecycle management without lingering background
    processes after main feed handler termination. Boundary: daemon processes cannot be directly managed
    via standard process groups on each platforms.'
  evidence: cryptofeed/backends/backend.py:17(BackendQueue.start)
  stage: persistence
  alternative_considered: Non-daemon workers were rejected for leaving orphan processes
- id: BD-011
  type: B/BA
  content: Candle interval default '1m' across exchanges
  rationale: 'One-minute candles provide baseline temporal resolution suitable for most real-time analysis
