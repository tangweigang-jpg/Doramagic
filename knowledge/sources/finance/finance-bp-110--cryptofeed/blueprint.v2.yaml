replaceable_slots:
- id: slot-001
  name: websocket_client
  description: Use default websockets for most cases; aiohttp when integrating with existing aiohttp infrastructure
  used_in_stages: []
  options:
  - name: websockets (default)
    traits:
    - async
    - standard library compatible
    - well-maintained
    fit_for:
    - General use cases, standard exchange connections
    not_fit_for:
    - Maximum performance scenarios requiring C-level optimization
  - name: aiohttp WebSocket
    traits:
    - async
    - integrated with aiohttp HTTP client
    - battle-tested
    fit_for:
    - When HTTP and WebSocket share connection pool
    not_fit_for:
    - Simple WebSocket-only use cases
  default: websockets
  _source: worker_resource
- id: slot-002
  name: event_loop
  description: Use uvloop for performance; asyncio for cross-platform compatibility or debugging
  used_in_stages: []
  options:
  - name: uvloop (default on Linux/macOS)
    traits:
    - C-level implementation
    - up to 4x faster than asyncio
    fit_for:
    - Production deployments, low-latency requirements
    not_fit_for:
    - Windows (not supported), simple scripts
  - name: standard asyncio
    traits:
    - cross-platform
    - sufficient for basic use
    fit_for:
    - Windows, development, debugging
    not_fit_for:
    - High-throughput production workloads
  default: uvloop (non-Windows)
  _source: worker_resource
- id: slot-003
  name: time_series_database
  description: Choose InfluxDB/QuestDB for pure time-series; Arctic for research/batch; QuasarDB for maximum
    performance
  used_in_stages: []
  options:
  - name: InfluxDB
    traits:
    - Time-series optimized
    - HTTP API
    - Cloud offering available
    fit_for:
    - Metrics, monitoring, financial time-series with retention policies
    not_fit_for:
    - Complex relational queries, transactional workloads
  - name: QuestDB
    traits:
    - High performance
    - SQL-like queries
    - InfluxDB protocol compatible
    fit_for:
    - High-frequency time-series, real-time analytics
    not_fit_for:
    - Distributed deployments (single-node only in OSS)
  - name: Arctic
    traits:
    - MongoDB backend
    - Versioned data
    - Pandas integration
    fit_for:
    - Batch data storage, research workflows, versioned datasets
    not_fit_for:
    - High-frequency real-time writes (README explicitly warns against this)
  - name: QuasarDB
    traits:
    - High-performance
    - Cluster support
    - Column-oriented
    fit_for:
    - Ultra-low latency requirements, clustered deployments
    not_fit_for:
    - Simple use cases, single-node only for free tier
  default: Redis (for streams/sets)
  _source: worker_resource
- id: slot-004
  name: message_queue
  description: Use Kafka for distributed pipelines; RabbitMQ for flexibility; GCP Pub/Sub for GCP workloads;
    Redis for simplicity
  used_in_stages: []
  options:
  - name: Kafka
    traits:
    - Distributed
    - Durable
    - Topic partitioning
    - Consumer groups
    fit_for:
    - Data pipelines, event streaming, microservice architectures
    not_fit_for:
    - Simple single-consumer use cases (overkill)
  - name: RabbitMQ
    traits:
    - Flexible routing
    - Multiple exchange types
    - Lightweight
    fit_for:
    - Traditional message queuing, complex routing requirements
    not_fit_for:
    - Very high throughput (Kafka better)
  - name: GCP Pub/Sub
    traits:
    - Managed service
    - Cloud-native
    - Global availability
    fit_for:
    - GCP infrastructure, serverless integration, managed services
    not_fit_for:
    - On-premise deployments, strict data residency requirements
  - name: Redis Streams
    traits:
    - In-memory
    - Low latency
    - Consumer groups
    fit_for:
    - Simple queuing, caching, low-latency requirements
    not_fit_for:
    - Durability-critical data (data loss on crash)
  default: Redis Streams
  _source: worker_resource
- id: slot-005
  name: document_store
  description: MongoDB is the only document store option in cryptofeed
  used_in_stages: []
  options:
  - name: MongoDB
    traits:
    - Document-oriented
    - Flexible schema
    - Async driver
    fit_for:
    - Flexible data structures, prototyping, varied market data formats
    not_fit_for:
    - Strict schema requirements, complex joins
  default: MongoDB (if document store selected)
  _source: worker_resource
- id: slot-006
  name: relational_database
  description: PostgreSQL is the only relational DB option in cryptofeed
  used_in_stages: []
  options:
  - name: PostgreSQL
    traits:
    - ACID compliance
    - JSONB support
    - Custom column mapping
    fit_for:
    - Structured market data, custom schemas, SQL analytics
    not_fit_for:
    - Simple key-value needs (overkill)
  default: PostgreSQL (if relational DB selected)
  _source: worker_resource
- id: slot-007
  name: json_parser
  description: Use yapic.json for production; stdlib json only if avoiding dependencies
  used_in_stages: []
  options:
  - name: yapic.json (default)
    traits:
    - C-accelerated
    - High performance
    - datetime support
    fit_for:
    - Production use with performance requirements
    not_fit_for:
    - Debugging (harder to inspect)
  - name: standard json
    traits:
    - Standard library
    - No dependencies
    fit_for:
    - Debugging, minimal dependencies, simple scripts
    not_fit_for:
    - High-throughput production (10x slower than yapic.json)
  default: yapic.json
  _source: worker_resource
- id: slot-008
  name: http_client
  description: aiohttp for async/concurrent needs; requests for simple sync operations
  used_in_stages: []
  options:
  - name: aiohttp (default async)
    traits:
    - Async
    - Session management
    - Connection pooling
    fit_for:
    - Async applications, concurrent HTTP requests
    not_fit_for:
    - Simple synchronous scripts
  - name: requests (sync)
    traits:
    - Synchronous
    - Simple API
    - Wide adoption
    fit_for:
    - Sync operations, simple scripts, backward compatibility
    not_fit_for:
    - Concurrent operations
  default: aiohttp for async, requests for sync
  _source: worker_resource
