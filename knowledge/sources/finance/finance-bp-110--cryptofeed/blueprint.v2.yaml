- id: BD-075
  type: BA
  content: 'INTERACTION: [BD-001] Throttle 60s × [BD-002] OHLCV 300s → Sparse candle data from aggressive
    throttling'
  rationale: Throttle's 60-second drop window means only ~5 updates reach OHLCV aggregation per 5-minute
    candle, potentially missing significant price movements within the window. This amplifies data loss
    risk during volatile periods when granularity matters most. The combined effect produces candles with
    incomplete representation of price action, degrading analytical value.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Separate throttle per aggregation type was rejected for complexity
- id: BD-076
  type: B/BA
  content: 'INTERACTION: [BD-011] 1m candle interval × [BD-012] candle_closed_only=True → Real-time blind
    spot'
  rationale: One-minute default interval combined with closed-only output creates systematic 60-second
    data latency for real-time monitoring. Users cannot observe in-progress candle formation, only the
    completed prior period. This contradiction forces either blind trading during the current minute or
    explicit override of candle_closed_only.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Returning partial candles with 'closed' flag was rejected for API simplicity
- id: BD-077
  type: B
  content: 'INTERACTION: [BD-004] Snapshot interval × [BD-005] snapshots_only mode → Configurable parameter
    has no effect'
  rationale: The snapshot_interval setting of 1000 updates only applies to snapshot+delta hybrid mode.
    In snapshots_only mode, every update triggers an immediate full snapshot write regardless of the interval
    setting. This hidden dependency means the configuration parameter becomes a no-op when snapshots_only=True,
    potentially causing confusion about actual persistence behavior.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Removing snapshot_interval when snapshots_only was rejected for configuration
    flexibility
- id: BD-078
  type: BA/DK
  content: 'INTERACTION: [BD-040] checksum_disabled × [BD-041] crossed_book_check_disabled → Layered integrity
    blind spots'
  rationale: Both integrity validation features are disabled by default, creating compound risk. Checksum
    disabled allows corrupted updates to propagate; crossed-book check disabled allows spread inversion
    data to pass undetected. These two decisions amplify data quality risk, particularly dangerous during
    high-frequency market events where corruption patterns may be subtle.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Enabling both by default was rejected for 15-20% throughput reduction
- id: BD-079
  type: BA
  content: 'INTERACTION: [BD-023] FeedHandler pauses during callback × [BD-009] AsyncIO queue backend
    → Queue overflow cascade'
  rationale: 'When FeedHandler pauses for slow callbacks, the AsyncIO queue continues accepting messages
    but backend workers cannot drain them. This creates a cascading risk: slow callback → queue buildup
    → memory growth → potential message loss under backpressure. The pause mechanism that provides backpressure
    actually amplifies queue pressure rather than relieving it.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Queue-based async was rejected for memory growth - ironic given this interaction
- id: BD-080
  type: B/BA
  content: 'INTERACTION: [BD-017] Binance 100ms depth × [BD-016] 10 retries → Message flood amplification
    on reconnect'
  rationale: 100ms depth interval generates 10x the message volume of default 1000ms. Combined with 10
    retry attempts, brief network interruptions create massive backlog. When connection restores, the
    10 retries worth of missed depth updates (potentially 100+ messages per stream) must be processed
    before fresh data, delaying recovery and risking queue overflow.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Lower retry count for high-frequency streams was considered but rejected for
    data completeness
- id: BD-081
  type: B/BA
  content: 'INTERACTION: [BD-008] None→''None'' string × [BD-031] Postgres silent UniqueViolation → Hidden
    data corruption'
  rationale: None values become literal 'None' strings during Redis storage. When these reach PostgreSQL
    with unique constraints, the silent ignore of UniqueViolationError masks the semantic corruption.
    The string 'None' is not equivalent to SQL NULL, creating subtle bugs where consumers expect null
    semantics but receive string data, and any uniqueness violations are silently swallowed.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Using SQL NULL instead of 'None' string was rejected to preserve field presence
    semantics
- id: BD-082
  type: BA/DK
  content: 'INTERACTION: [BD-049] Decimal precision × [BD-017] 100ms depth interval → Processing bottleneck
    risk'
  rationale: Decimal arithmetic for price/amount provides financial precision but adds computational overhead.
    At 100ms depth intervals with Binance's high message rate, Decimal operations become a bottleneck.
    The precision decision that protects financial accuracy amplifies performance pressure from the aggressive
    depth interval, potentially causing lag during high-volatility fast markets.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Float with tolerance was rejected for financial precision requirements
