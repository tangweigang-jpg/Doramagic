- id: BD-138
  type: BA
  content: 'RISK CASCADE: [BD-001] × [BD-039] × [BD-009] → Triple caching with invalidation complexity'
  rationale: Expression-level caching (BD-001), handler-level caching (BD-039), and disk-level caching
    (BD-009) create three caching layers with independent invalidation logic. In rolling backtests, when
    underlying data changes, only disk_cache=2 ensures cache invalidation at the disk level, but expression
    and handler caches may still return stale computed features. This cascade creates scenarios where
    features appear up-to-date (handler cache hit) but derive from incorrect underlying data (disk cache
    returning old values).
  evidence: BD-001,BD-039,BD-009
  stage: global
  alternative_considered: Hierarchical cache invalidation would ensure each levels update together but
    add complexity
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-139
  type: B
  content: 'RISK CASCADE: [BD-115] → [BD-004] → [BD-001] → memory exhaustion in expression evaluation'
  rationale: Ref(expression, 0) returning infinite back-rolling (BD-115) causes get_longest_back_rolling()
