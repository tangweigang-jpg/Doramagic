- id: BD-129
  type: B/BA
  content: 'INTERACTION: [BD-113] × [BD-097] → Spread model inconsistency causing cost underestimation'
  rationale: BD-113 sets buy_price == sell_price by default, implying zero bid-ask spread, while BD-097
    models 1/2 spread midpoint impact for execution. When BD-113's default is not overridden, BD-097's
    spread modeling cannot function correctly because both prices are identical. This interaction causes
    systematic underestimation of transaction costs by 0.05-0.5% per round-trip, inflating strategy returns
    and leading to disappointing live performance.
  evidence: BD-113,BD-097
  stage: global
  alternative_considered: Making spread modeling mandatory would prevent the inconsistency but require
    breaking existing configs
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-130
  type: B/BA
  content: 'INTERACTION: [BD-120] × [BD-041] → Asymmetric China market rules vs symmetric 9.5% limit threshold'
  rationale: BD-120 implements China market logic where limit_buy applies to positive price changes and
    limit_sell applies to negative changes, supporting asymmetric limits. However, BD-041 sets a single
    9.5% limit_threshold that applies symmetrically. For Chinese stocks with asymmetric limits (+10% up,
    -10% down), BD-041's symmetric threshold may incorrectly constrain trading in one direction. This
    creates a mismatch between the market rule implementation (BD-120) and the default configuration (BD-041).
  evidence: BD-120,BD-041
  stage: global
  alternative_considered: Using tuple limits (9.5, -9.5) would align with BD-120's asymmetric handling
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-131
  type: B
  content: 'INTERACTION: [BD-009] × [BD-111] → Cache staleness undermines future information truncation'
  rationale: BD-009 controls disk cache behavior (0=skip, 1=use, 2=replace), while BD-111 truncates training
    segments to prevent future information leakage at test start boundaries. When disk_cache mode 1 is
    used with stale cached data that predates the test boundary, BD-111's truncation operates on incorrect
    historical data that may already contain future information relative to the intended training period.
    The cache can undermine BD-111's data integrity guarantees.
  evidence: BD-009,BD-111
  stage: global
  alternative_considered: Invalidating cache when test_start changes would ensure truncation operates
    on fresh data
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-132
  type: B/BA
  content: 'INTERACTION: [BD-115] × [BD-004] → Infinite back-rolling bypasses window detection safeguards'
  rationale: BD-115 returns infinite rolling window for Ref(expression, 0), while BD-004's get_longest_back_rolling()
    method exists to identify maximum historical range for pre-fetching. When Ref with offset 0 is used
    in expressions, BD-004 returns inf and the data provider cannot determine finite history bounds. This
    causes the system to either fetch unlimited history (memory exhaustion) or use ad-hoc defaults that
    may miss required data for the expression.
  evidence: BD-115,BD-004
  stage: global
  alternative_considered: Warning when infinite rolling detected would alert users to potential memory
    issues
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
