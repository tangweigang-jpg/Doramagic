    exposure'
  rationale: BD-121 causes AttributeError at runtime when state_interpreter or action_interpreter is missing,
    rather than failing fast with validation. BD-122 implements critical future information masking for
    RL states. If BD-121's runtime failure occurs during RL training with an incomplete interpreter chain,
    BD-122's masking may not be applied correctly, potentially exposing future data to the RL agent during
    training. This silent failure mode undermines the safety guarantees of BD-122.
  evidence: BD-121,BD-122
  stage: global
  alternative_considered: Adding __post_init__ validation would fail fast with clear errors before any
