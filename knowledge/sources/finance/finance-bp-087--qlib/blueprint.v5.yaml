global_contracts:
- contract: Every timestamps in data use calendar index, not wall-clock
  evidence: qlib/data/base.py:182
- contract: Expression returns pd.Series with calendar index
  evidence: qlib/data/base.py:182
- contract: Order.direction is Order.BUY (1) or Order.SELL (0)
  evidence: qlib/backtest/decision.py:37
- contract: Order.deal_amount and Order.amount are in SHARE COUNT not value
  evidence: qlib/backtest/decision.py:37
- contract: Position stock amounts are adjusted by factor (share lots)
  evidence: qlib/backtest/exchange.py:516
- contract: TradeDecisionWO orders combine sell then buy for execution
  evidence: qlib/contrib/strategy/signal_strategy.py:295
- contract: SELL orders execute before BUY orders in TT_PARAL mode - sorted by direction (-1 SELL < 1
    BUY)
  evidence: qlib/backtest/executor.py:585(order_iterator)
- contract: 'Data processing follows strict 3-stage contract: DK_R (raw) -> DK_I (infer) -> DK_L (learn)'
  evidence: qlib/data/dataset/handler.py:422-435
- contract: Model attributes cannot start with '_' for pickle serialization
  evidence: qlib/model/base.py:31
- contract: Dataset segments must cover non-overlapping time ranges
  evidence: examples/benchmarks/LightGBM/workflow_config_lightgbm_Alpha158.yaml:54
- contract: Exchange.deal_order modifies Order in-place, returns (trade_val, trade_cost, trade_price)
  evidence: qlib/backtest/exchange.py:448
- contract: 'SoftTopkStrategy Phase 1: Deterministic Sell must complete before Phase 3: Proportional Buy'
  evidence: qlib/contrib/strategy/cost_control.py:74-115
- contract: NestedExecutor _init_sub_trading must be called before _update_trade_decision each loop
  evidence: qlib/backtest/executor.py:417-421
- contract: 'Exchange limit_threshold uses $change direction for China markets: limit_buy for positive
    change, limit_sell for negative'
  evidence: qlib/backtest/exchange.py:289-292
- contract: settle_type defaults to ST_NO (immediate cash settlement) - cash from sells available immediately
  evidence: qlib/backtest/position.py:23(ST_NO)
- contract: PFeature uses $$ prefix while Feature uses $ prefix for Point-in-Time data
  evidence: qlib/data/base.py:251
- contract: Ref(expression, 0) returns infinite back-rolling causing unbounded data loading
  evidence: qlib/data/ops.py:812-814
business_decisions:
- id: BD-001
  type: B
  content: Expression caching with hash key (str(self), instrument, start_index, end_index, *args)
  rationale: Cache prevents redundant expression evaluation for identical inputs across instruments. The
    hash key composition (str(self), instrument, start_index, end_index, *args) ensures cache hits only
    when each parameters match, enabling cross-instrument computation sharing while maintaining correctness.
  evidence: qlib/data/base.py:13(expression)
  stage: data_expression
  alternative_considered: Computing expressions on-demand without caching; rejected due to repeated computation
    costs for overlapping windows
  _evidence_issues:
  - 'FN_NOT_FOUND: expression in qlib/data/base.py'
- id: BD-002
  type: B
  content: Point-in-Time data distinguishes $ vs $$ prefix
  rationale: Single $ prefix indicates static (non-PIT) features while $$ prefix enables point-in-time
    lookups. This lexical distinction prevents accidental misuse of stale data in backtesting and ensures
    researchers visually recognize when PIT semantics apply.
  evidence: qlib/data/base.py:267(__str__)
  stage: data_expression
  alternative_considered: Separate classes for PIT vs static; rejected as it would require API changes
- id: BD-003
  type: BA
  content: Operator overloading delegates to ops module classes
  rationale: Arithmetic operators create expression trees rather than immediate computation, enabling
    lazy evaluation. This design allows the data system to optimize execution order, fuse operations,
    and defer computation until actual values are needed.
  evidence: qlib/data/base.py:32(__gt__)
  stage: data_expression
  alternative_considered: Immediate computation; rejected due to loss of optimization opportunities
- id: BD-004
  type: M
  content: get_longest_back_rolling() for window detection
  rationale: Expression trees can contain rolling windows with varying backward lookbacks. This method
    identifies the maximum historical range needed, allowing the data provider to pre-fetch sufficient
    history for each feature calculations in a single query.
  evidence: qlib/data/base.py:259(get_longest_back_rolling)
  stage: data_expression
  alternative_considered: Per-expression historical queries; rejected due to excessive database round-trips
- id: BD-005
  type: B
  content: Rolling inherits Ref for shift semantics
  rationale: The Ref base class captures time-shift semantics for both backward (N>0 for past) and forward
    (N<0 for future) data access. Rolling operations inherit this to properly handle temporal alignment
    during feature computation.
  evidence: qlib/data/ops.py:781(Ref)
  stage: data_operators
  alternative_considered: Separate shift handling per operator; rejected due to code duplication
- id: BD-006
  type: B
  content: series.shift(self.N) in Ref._load_internal
  rationale: Time-series shift is fundamental to financial feature engineering. Ref(close, 1) retrieves
    the previous close price, enabling returns, momentum, and countless other technical indicators that
    depend on temporal relationships.
  evidence: qlib/data/ops.py:800(Ref._load_internal)
  stage: data_operators
  alternative_considered: Manual indexing; rejected as it breaks expression tree abstraction
- id: BD-007
  type: BA/DK
  content: If operator for conditional features
  rationale: Conditional feature construction without Python branching enables vectorized execution. The
    If operator creates expression trees for both branches, allowing the backtest engine to select the
    appropriate result based on market conditions at runtime.
  evidence: qlib/data/ops.py:639(If)
  stage: data_operators
  alternative_considered: Python if/else; rejected due to incompatibility with batch processing
  vague_rationale: true
- id: BD-008
  type: B
  content: ProviderBackendMixin for storage abstraction
  rationale: 'Storage backends vary by deployment: local files for development, S3 for cloud, remote servers
    for shared datasets. This mixin allows providers to swap backends without rewriting business logic,
    supporting diverse infrastructure setups.'
  evidence: qlib/data/data.py:43(ProviderBackendMixin)
  stage: data_provider
  alternative_considered: Backend-specific providers; rejected due to code duplication
- id: BD-009
  type: B
  content: disk_cache parameter (0/1/2) controls cache behavior
  rationale: 'Cache management modes: 0=skip cache, 1=use cache if exists, 2=replace existing. Rolling
    backtests require cache invalidation (mode 2) when underlying data changes, while production uses
    cached results for speed.'
  evidence: qlib/data/data.py:1162(features)
  stage: data_provider
  alternative_considered: Always cache; rejected for rolling scenarios requiring fresh data
- id: BD-010
  type: BA/M
  content: inst_calculator processes one instrument at a time
  rationale: Instruments are independent in cross-sectional calculations, enabling embarrassingly parallel
    processing. Each instrument can be computed separately, allowing distribution across workers or cores
    without synchronization overhead.
  evidence: qlib/data/data.py:600(inst_calculator)
  stage: data_provider
  alternative_considered: Batch cross-sectional processing; rejected due to memory constraints
- id: BD-011
  type: B
  content: Separate infer_processors vs learn_processors
  rationale: Training requires transformations like label computation and normalization fitting, while
    inference only needs forward transforms. Separating these prevents data leakage (using future information
    during training) and unnecessary computation during prediction.
  evidence: qlib/data/dataset/handler.py:42(DataHandlerABC.__init__)
  stage: dataset
  alternative_considered: Unified processors; rejected due to leakage risk
- id: BD-012
  type: B
  content: DK_I vs DK_L data keys for inference vs learning
  rationale: DK_I (inference) and DK_L (learning) data keys allow handlers to skip label-aligned processing
    during inference. Labels are only needed for training; inference can omit this computation, reducing
    latency and memory usage.
  evidence: qlib/data/dataset/handler.py:400(Handler)
  stage: dataset
  alternative_considered: Always compute labels; rejected due to unnecessary overhead
  _evidence_issues:
  - 'FN_NOT_FOUND: Handler in qlib/data/dataset/handler.py'
- id: BD-013
  type: B/RC
  content: init_type (IT_FIT_SEQ) controls processor fitting order
  rationale: Sequential processor fitting (IT_FIT_SEQ) respects dependencies where later processors depend
    on earlier fitted parameters. For example, normalization must fit before computing cross-sectional
    ranks that use normalized values.
  evidence: qlib/data/dataset/handler.py:633(setup_data)
  stage: dataset
  alternative_considered: Parallel fitting; rejected due to dependency violations
- id: BD-014
  type: M/BA
  content: step_len parameter for time-series window size
  rationale: Recurrent models (RNN, LSTM, Transformer) require sequential input windows. step_len controls
    how many time steps constitute one sample, enabling proper sequence length configuration for different
    model architectures.
  evidence: qlib/data/dataset/__init__.py:20(Dataset.__init__)
  stage: dataset
  alternative_considered: Fixed window size; rejected as models require different sequence lengths
- id: BD-015
  type: B
  content: fit() and predict() are abstract methods
  rationale: Abstract fit() and predict() methods enforce a consistent interface across each model implementations.
    This enables polymorphic dataset handling where training and prediction code works uniformly regardless
    of the underlying algorithm.
  evidence: qlib/model/base.py:25(Model.fit)
  stage: model
  alternative_considered: Duck typing; rejected due to runtime error risk
- id: BD-016
  type: BA/M
  content: Model attribute names must NOT start with '_'
  rationale: Python's pickle serialization excludes attributes starting with underscore. Learned parameters
    like weights, biases, and fitted scalers must be non-private to survive serialization for model persistence
    and distribution.
  evidence: qlib/model/base.py:22(Model)
  stage: model
  alternative_considered: Custom serialization; rejected due to complexity
- id: BD-017
  type: M/DK
  content: Reweighter for sample weighting during fit
  rationale: Sample importance weighting via Reweighter addresses biased training data. Certain market
    conditions or assets may be overrepresented; reweighting corrects distribution to improve model generalization.
  evidence: qlib/model/base.py:25(fit)
  stage: model
  alternative_considered: Unweighted training; rejected due to bias concerns
- id: BD-018
  type: B/DK
  content: only_tradable flag checks suspension/limit
  rationale: Stocks can be suspended (halted trading) or at limit-up/down (no further trades at that price).
    The only_tradable flag prevents generating orders for these situations, avoiding rejected orders and
    unrealistic backtest results.
  evidence: qlib/contrib/strategy/signal_strategy.py:150(SignalStrategy)
  stage: strategy
  alternative_considered: Always generate orders; rejected due to order rejection risk
  _evidence_issues:
  - 'FN_NOT_FOUND: SignalStrategy in qlib/contrib/strategy/signal_strategy.py'
- id: BD-019
  type: BA
  content: forbid_all_trade_at_limit=True is conservative
  rationale: Limit-up stocks cannot be sold at higher prices; selling at the limit price means buying
    is impossible. This conservative default prevents unrealistic profit-taking scenarios where the strategy
    assumes execution at impossible prices.
  evidence: qlib/contrib/strategy/signal_strategy.py:117(SignalStrategy)
  stage: strategy
  alternative_considered: Permit trading at limit; rejected for overly optimistic results
  _evidence_issues:
  - 'FN_NOT_FOUND: SignalStrategy in qlib/contrib/strategy/signal_strategy.py'
- id: BD-020
  type: B/DK
  content: hold_thresh enforces minimum holding period
  rationale: Minimum holding period prevents excessive turnover from day-trading strategies. High turnover
    incurs transaction costs that may not be realistic for practical strategies; hold_thresh enforces
    a cooldown between sells and repurchases.
  evidence: qlib/contrib/strategy/signal_strategy.py:88(SignalStrategy)
  stage: strategy
  alternative_considered: No holding constraints; rejected due to unrealistic turnover
  _evidence_issues:
  - 'FN_NOT_FOUND: SignalStrategy in qlib/contrib/strategy/signal_strategy.py'
- id: BD-021
  type: BA
  content: generate_trade_decision can be generator
  rationale: Generator-based trade decisions yield at finer time granularity within each outer step. This
