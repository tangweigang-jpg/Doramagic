# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-087
name: Qlib
sop_version: '3.6'
source:
  projects:
  - qlib
  commit_hash: 3097dcc9953b55556cd4ea17686cb67945d70f46
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Quantitative investment with AI-driven model training, backtesting, and strategy execution
    for stock portfolio management
  description: Qlib is a Microsoft AI-powered quantitative investment platform that provides end-to-end
    workflow for data loading, feature expression, model training, backtesting, and trading strategy generation
    with support for both traditional ML and reinforcement learning approaches.
  prerequisites: Users need Python proficiency, familiarity with pandas DataFrames, basic understanding
    of machine learning concepts, and knowledge of financial market data structures (OHLCV, calendars,
    instruments).
  not_suitable_for: Real-time trading systems requiring sub-second execution, non-financial time-series
    prediction, high-frequency trading strategies, or users without Python programming experience.
stages:
- id: data_expression
  name: Data Expression Layer
  order: 1
  responsibility: Defines expression-based data abstractions for feature loading, calculation, and caching
    with support for Point-in-Time data. This layer enables users to build formulaic alphas without manual
    data fetching.
  interface:
    inputs: instrument code (str), calendar index range (start_index, end_index), frequency (freq), optional
      PIT cur_time, period
    outputs: pd.Series indexed by calendar
  required_methods:
  - name: Expression.load
    description: Loads expression data for given instrument and time range, using hash-based caching to
      avoid re-computation
    evidence: qlib/data/base.py:187(Expression.load)
  - name: Feature.compute
    description: Static expression that loads data from provider using $name format
    evidence: qlib/data/base.py:238(Feature)
  - name: PFeature.compute
    description: Point-in-Time feature using $$name format for as-reported accounting data
    evidence: qlib/data/base.py:266(PFeature)
  - name: Expression.get_longest_back_rolling
    description: Detects maximum historical window needed for rolling calculations, enabling pre-fetch
      optimization
    evidence: qlib/data/base.py:210(get_longest_back_rolling)
  key_behaviors:
  - behavior: Lazy evaluation with expression trees
    description: Operators create expression trees instead of computing immediately, deferring calculation
      until data is actually needed
    evidence: qlib/data/base.py:32(__gt__)
  - behavior: Calendar-indexed timestamps
    description: Every timestamps use calendar index rather than wall-clock, ensuring alignment with trading
      days
    evidence: qlib/data/base.py:182
  - behavior: Point-in-Time data distinction
    description: Features with $ prefix are static while $$ prefix indicates Point-in-Time data with clear
      visual distinction
    evidence: qlib/data/base.py:251(Feature.__str__)
  replaceable_points:
  - name: Feature Provider Backend
    description: Local vs remote data source for feature loading
    options:
    - name: LocalFeatureProvider
      traits:
      - On-disk storage
      - Low latency
      - Single machine
      fit_for:
      - Local development
      - Small datasets
      - Low latency requirements
      not_fit_for:
      - Distributed teams
      - Large datasets exceeding disk
      - Cloud deployment
    - name: ClientFeatureProvider
      traits:
      - Remote server
      - Centralized data
      - Higher latency
      fit_for:
      - Team environments
      - Managed infrastructure
      - Consistent data across clients
      not_fit_for:
      - Offline work
      - Maximum performance needs
      - Restricted network access
    default: LocalFeatureProvider
  design_decisions:
  - Expression caching with hash key (str(self), instrument, start_index, end_index, *args) avoids re-computing
    same expression and enables sharing across instruments (qlib/data/base.py:187)
  - Point-in-Time data uses $$ prefix while Feature uses $ prefix for clear visual distinction preventing
    misuse (qlib/data/base.py:251)
  - Operator overloading delegates to ops module classes enabling lazy evaluation through expression tree
    construction (qlib/data/base.py:32)
  - get_longest_back_rolling() enables data system to pre-fetch needed historical range for feature calculation
    (qlib/data/base.py:210)
  acceptance_hints:
  - Expression('$close').load('AAPL', 0, 100) returns pd.Series with calendar index
  - Expression cache hit rate > 80% for repeated expression evaluation
  - get_longest_back_rolling returns finite value for expressions like Ref($close, 5) but inf for Ref($close,
    0)
- id: data_operators
  name: Data Operators
  order: 2
  responsibility: Implements expression operators for feature calculation including rolling windows, pairwise
    operations, and conditional logic. These operators compose the expression trees built in the data_expression
    layer.
  interface:
    inputs: Expression operands, window size N, optional parameters
    outputs: Expression tree nodes composing operators
  required_methods:
  - name: ElemOperator._load_internal
    description: Single-operand operators like Abs, Log, Mask that transform one series
    evidence: qlib/data/ops.py:37(ElemOperator)
  - name: PairOperator._load_internal
    description: Two-operand operators like Add, Sub, Mul, Div for element-wise operations
    evidence: qlib/data/ops.py:231(PairOperator)
  - name: Rolling._load_internal
    description: Time-series rolling window operations with configurable aggregation
    evidence: qlib/data/ops.py:713(Rolling)
  - name: Ref._load_internal
    description: Time reference operator using series.shift(N) for look-back/look-forward
    evidence: qlib/data/ops.py:808(_load_internal)
  - name: If._load_internal
    description: Conditional expression operator for conditional feature construction without Python branching
    evidence: qlib/data/ops.py:639(If)
  key_behaviors:
  - behavior: Shift semantics via Ref
    description: Ref captures shift semantics for both past (N>0) and future (N<0) data access, with N=0
      returning infinite back-rolling
    evidence: qlib/data/ops.py:781(Ref)
  - behavior: Window aggregation
    description: Rolling operations apply aggregation functions over configurable windows for time-series
      analysis
    evidence: qlib/data/ops.py:713(Rolling)
  replaceable_points:
  - name: Rolling Functions
    description: Window aggregation functions applied during rolling operations
    options:
    - name: Mean
      traits:
      - Linear averaging
      - Smooth output
      - Low variance
      fit_for:
      - Trend following
      - Smoothing noisy data
      not_fit_for:
      - Volatility clustering
      - Outlier-heavy data
    - name: Std
      traits:
      - Volatility measurement
      - Dispersion tracking
      fit_for:
      - Risk models
      - Volatility strategies
      not_fit_for:
      - Mean-reversion
      - Low-sample windows
    - name: Rank
      traits:
      - Cross-sectional ranking
      - Percentile output
      fit_for:
      - Stock selection
      - Relative value
      not_fit_for:
      - Time-series forecasting
      - Prediction models
    - name: Corr
      traits:
      - Relationship measurement
      - Pairwise correlation
      fit_for:
      - Factor models
      - Pairs trading
      not_fit_for:
      - Single-asset features
      - Low-sample windows
    - name: EMA
      traits:
      - Exponential weighting
      - Recency emphasis
      fit_for:
      - Momentum
      - Adaptive features
      not_fit_for:
      - Long-term signals
      - Stationary data
    default: Mean
  design_decisions:
  - Rolling inherits Ref for shift semantics capturing time reference for both past and future data access
    (qlib/data/ops.py:781)
  - series.shift(self.N) in Ref._load_internal is fundamental to time-series operations (qlib/data/ops.py:808)
  - If operator enables conditional feature construction without Python branching for pure expression
    evaluation (qlib/data/ops.py:639)
  - Ref(expression, 0) returns infinite back-rolling which causes unbounded data loading (qlib/data/ops.py:812)
  acceptance_hints:
  - Ref($close, 1) gets previous close price shifted by one period
  - Rolling($close, 20, Mean) computes 20-period moving average
  - If($return > 0, 1, 0) creates binary indicator for positive returns
- id: data_provider
  name: Data Provider System
  order: 3
  responsibility: Provides access to calendars, instruments, features, and datasets from local storage
    or remote servers. Acts as the backend storage abstraction layer powering the expression system.
  interface:
    inputs: instruments query, fields/expressions, start/end time, frequency
    outputs: FeatureD feature data, Calendar list, Instrument lists
  required_methods:
  - name: CalendarProvider.calendar
    description: Returns trading calendar for specified frequency and date range
    evidence: qlib/data/data.py:65(CalendarProvider)
  - name: InstrumentProvider.instrument
    description: Returns instrument list with filtering by market segment and status
    evidence: qlib/data/data.py:199(InstrumentProvider)
  - name: FeatureProvider.features
    description: Retrieves feature data with disk_cache parameter (0/1/2) controlling cache behavior
    evidence: qlib/data/data.py:1162(features)
  - name: LocalProvider.inst_calculator
    description: Processes one instrument at a time for parallel computation
    evidence: qlib/data/data.py:600(inst_calculator)
  key_behaviors:
  - behavior: Storage abstraction via mixin
    description: ProviderBackendMixin allows mixing storage backends (file, S3, remote) without rewriting
      providers
    evidence: qlib/data/data.py:43(ProviderBackendMixin)
  - behavior: Per-instrument parallel processing
    description: inst_calculator processes one instrument at a time enabling parallel execution across
      instruments
    evidence: qlib/data/data.py:600
  - behavior: Cache management via disk_cache parameter
    description: disk_cache values 0/1/2 control skip/use/replace cache behavior for rolling scenarios
    evidence: qlib/data/data.py:1162
  replaceable_points:
  - name: Storage Backend
    description: Data storage implementation for feature and calendar retrieval
    options:
    - name: LocalProvider (filesystem)
      traits:
      - On-disk .bin files
      - Fast local I/O
      - Full control
      fit_for:
      - Development
      - Maximum control
      - Offline usage
      not_fit_for:
      - Team sharing
      - Large-scale distributed
    - name: ClientProvider (server)
      traits:
      - Remote RPC
      - Centralized data
      - Managed service
      fit_for:
      - Team environments
      - Managed deployment
      - Consistent data
      not_fit_for:
      - Offline work
      - Latency-sensitive
      - Cost-sensitive
    default: LocalProvider
  design_decisions:
  - ProviderBackendMixin for storage abstraction allowing mixing backends without rewriting providers
    (qlib/data/data.py:43)
  - disk_cache parameter (0/1/2) controls cache behavior enabling cache management for rolling scenarios
    (qlib/data/data.py:1162)
  - inst_calculator processes one instrument at a time enabling parallel processing per instrument (qlib/data/data.py:600)
  - 'Region-specific behavior: cn vs us changes default data paths and calendars (qlib/config.py:392)'
  acceptance_hints:
  - CalendarProvider returns list of trading dates aligned to specified frequency
  - FeatureProvider correctly handles expression trees and returns calendar-indexed Series
  - disk_cache=0 bypasses cache entirely for fresh computation
- id: dataset
  name: Dataset and Handler
  order: 4
  responsibility: Prepares training/test data with learnable processors for feature transformation and
    segment management. Bridges data loading to model training with proper train/valid/test splits.
  interface:
    inputs: DataHandler with instruments/time range, segment definitions (train/valid/test)
    outputs: pd.DataFrame or TSDataSampler for training/inference
  required_methods:
  - name: DatasetH.setup_data
    description: Initializes handler and fits processors with specified init_type controlling fitting
      order
    evidence: qlib/data/dataset/__init__.py:633(setup_data)
  - name: TSDataSampler.sample
    description: Time-series sampler for deep learning models returning sequential batches
    evidence: qlib/data/dataset/__init__.py:272(TSDataSampler)
  - name: DataHandlerLP.get_data
    description: Retrieves processed data with DK_I (inference) or DK_L (learning) keys
    evidence: qlib/data/dataset/handler.py:400
  - name: Alpha158.load
    description: 158-feature dataset handler as industry standard for Chinese A-share markets
    evidence: qlib/contrib/data/handler.py:17(Alpha158)
  key_behaviors:
  - behavior: 3-stage data processing contract
    description: Data follows strict DK_R (raw) -> DK_I (infer) -> DK_L (learn) pipeline; processor ordering
      is critical
    evidence: qlib/data/dataset/handler.py:422-435
  - behavior: Separate inference vs learning processors
    description: Different transformations for training vs inference (e.g., normalization) preventing
      data leakage
    evidence: qlib/data/dataset/handler.py:436
  - behavior: Sequential processor fitting
    description: init_type=IT_FIT_SEQ ensures proper preprocessing dependencies in order
    evidence: qlib/data/dataset/handler.py:633
  replaceable_points:
  - name: Processor Pipeline
    description: Feature transformation chain applied to raw data
    options:
    - name: list of Processors
      traits:
      - Sequential transformation
      - Composable
      fit_for:
      - Custom pipelines
      - Research experiments
      not_fit_for:
      - Quick prototyping
      - Standard workflows
    - name: CollistFeature
      traits:
      - Column selection
      - Feature subset
      fit_for:
      - Feature selection
      - Memory optimization
      not_fit_for:
      - Feature engineering
      - Complex transforms
    - name: RobustZScoreNorm
      traits:
      - Outlier-resistant
      - Z-score normalization
      fit_for:
      - Volatile data
      - Extreme values
      not_fit_for:
      - Rank-based models
      - Tree models
    default: '[]'
  - name: Data Sampler
    description: Sampling strategy for training batches
    options:
    - name: TSDataSampler
      traits:
      - Sequential windows
      - Time-ordered
      fit_for:
      - RNN/LSTM
      - Temporal patterns
      not_fit_for:
      - Tabular models
      - Random sampling
    - name: TSDataSamplerCollate
      traits:
      - Collate function
      - Dynamic batching
      fit_for:
      - Variable length
      - Padding scenarios
      not_fit_for:
      - Fixed length
      - Memory-constrained
    default: TSDataSampler
  design_decisions:
  - Separate infer_processors vs learn_processors for different transformations during training vs inference
    (qlib/data/dataset/handler.py:436)
  - DK_I vs DK_L data keys for inference vs learning enabling inference to skip label-aligned processing
    (qlib/data/dataset/handler.py:400)
  - init_type (IT_FIT_SEQ) controls processor fitting order ensuring proper preprocessing dependencies
    (qlib/data/dataset/handler.py:633)
  - step_len parameter for time-series window size controlling how many time steps per sample for RNN/Transformer
    models (qlib/data/dataset/__init__.py:343)
  - DataHandler.CS_ALL includes feature, label, weight columns which returns more data than typically
    needed (qlib/data/dataset/handler.py:25)
  acceptance_hints:
  - Dataset segments must cover non-overlapping time ranges with train before valid before test
  - Processors fitted in DK_L mode are only used during training not inference
  - TSDataSampler returns sequential batches respecting temporal ordering
- id: model
  name: Model Training
  order: 5
  responsibility: Train and predict with ML models including LightGBM, XGBoost, PyTorch models with workflow
    integration. Provides polymorphic interface for diverse ML algorithms.
  interface:
    inputs: Dataset with features/labels, optional reweighter for sample weighting
    outputs: Prediction pd.Series/DataFrame, Trained model artifacts
  required_methods:
  - name: Model.fit
    description: Abstract method each models must implement for training with optional reweighter
    evidence: qlib/model/base.py:25(fit)
  - name: Model.predict
    description: Abstract method for inference returning prediction series/dataframe
    evidence: qlib/model/base.py:25(predict)
  - name: LGBModel.fit
    description: LightGBM training wrapper implementing fit/predict interface
    evidence: qlib/contrib/model/gbdt.py:12(LGBModel)
  - name: TrainerR.train
    description: Recorder-based trainer for experiments with MLflow tracking
    evidence: qlib/model/trainer.py:209(TrainerR)
  key_behaviors:
  - behavior: Polymorphic Dataset handling
    description: fit() and predict() are abstract methods ensuring each models conform to interface
    evidence: qlib/model/base.py:25
  - behavior: Pickle-safe serialization
    description: Model attribute names must NOT start with '_' ensuring each learned parameters serialize
      correctly
    evidence: qlib/model/base.py:31
  - behavior: Sample reweighting support
    description: Optional reweighter for sample importance weighting during fit for biased training data
    evidence: qlib/model/base.py:25
  replaceable_points:
  - name: Model Backend
    description: ML algorithm implementation for training and prediction
    options:
    - name: LGBModel
      traits:
      - Gradient boosting
      - Fast training
      - Interpretable
      fit_for:
      - Tabular data
      - Production systems
      - Baseline models
      not_fit_for:
      - Sequential patterns
      - Deep feature learning
    - name: XGBModel
      traits:
      - Gradient boosting
      - Regularization
      - Handles sparse
      fit_for:
      - Imbalanced data
      - Feature importance
      not_fit_for:
      - Very deep trees
      - Memory-constrained
    - name: LSTMModel
      traits:
      - Sequential modeling
      - Long-term dependencies
      fit_for:
      - Time-series prediction
      - Pattern sequences
      not_fit_for:
      - Tabular data
      - Quick prototyping
    - name: TransformerModel
      traits:
      - Attention mechanism
      - Parallel training
      fit_for:
      - Long sequences
      - Complex patterns
      not_fit_for:
      - Short sequences
      - Small datasets
    default: LGBModel
  - name: Training Strategy
    description: How to train multiple tasks or parallelize training
    options:
    - name: TrainerR (linear)
      traits:
      - Sequential
      - Single experiment
      fit_for:
      - Single model
      - Debugging
      - Simple workflows
      not_fit_for:
      - Hyperparameter search
      - Ensemble training
    - name: TrainerRM (multiprocess)
      traits:
      - Parallel execution
      - Multiple workers
      fit_for:
      - Grid search
      - Large-scale training
      not_fit_for:
      - Debugging
      - Limited resources
    default: TrainerR
  design_decisions:
  - fit() and predict() are abstract methods enabling polymorphic Dataset handling (qlib/model/base.py:25)
  - Model attribute names must NOT start with '_' ensuring serialization with pickle includes each learned
    parameters (qlib/model/base.py:31)
  - Reweighter for sample weighting during fit enabling importance weighting for biased training data
    (qlib/model/base.py:25)
  - TrainerR saves models via Recorder requiring experiment_id and workflow/experiment context (qlib/model/trainer.py:209)
  acceptance_hints:
  - Model.predict returns same-length prediction as input features
  - Model can be pickled and unpickled without losing learned parameters
  - TrainerR logs metrics to configured MLflow tracking server
- id: strategy
  name: Trading Strategy
  order: 6
  responsibility: Generates trade decisions based on signals, positions, and market conditions with risk
    management. Converts model predictions into executable orders with position sizing.
  interface:
    inputs: Signal (model predictions), Current position, Trade calendar/exchange
    outputs: TradeDecisionWO with Order list, or generator for nested execution
  required_methods:
  - name: BaseStrategy.generate_trade_decision
    description: Abstract method generating trade decisions from signals and positions
    evidence: qlib/strategy/base.py:23(BaseStrategy)
  - name: TopkDropoutStrategy.generate_trade_decision
    description: Keeps top-k stocks, drops worst-n to buy new top picks based on signal ranking
    evidence: qlib/contrib/strategy/signal_strategy.py:75
  - name: WeightStrategyBase.generate_target_weight_position
    description: Generates weight-based positions with optimization for risk constraints
    evidence: qlib/contrib/strategy/signal_strategy.py:298
  - name: EnhancedIndexingStrategy.generate_trade_decision
    description: Portfolio optimization with risk model constraints using CVX
    evidence: qlib/contrib/strategy/signal_strategy.py:375
  key_behaviors:
  - behavior: Tradable stock filtering
    description: only_tradable flag checks suspension/limit-up/limit-down preventing orders for undeliverable
      stocks
    evidence: qlib/contrib/strategy/signal_strategy.py:150
  - behavior: Sell-first ordering within step
    description: TopkDropoutStrategy sells first (line 232-264) then buys (line 266-294) in same step
    evidence: qlib/contrib/strategy/signal_strategy.py:232-294
  - behavior: Minimum holding period enforcement
    description: hold_thresh parameter prevents excessive turnover from day-trading
    evidence: qlib/contrib/strategy/signal_strategy.py:88
  - behavior: Conservative limit-order defaults
    description: forbid_all_trade_at_limit=True prevents selling at limit-up (unrealistic profit taking)
    evidence: qlib/contrib/strategy/signal_strategy.py:117
  replaceable_points:
  - name: Decision Logic
    description: How to select stocks to trade based on signals
    options:
    - name: TopkDropoutStrategy
      traits:
      - Simple
      - Top-k selection
      - Dropout mechanism
      fit_for:
      - Rank-based signals
      - Liquid stocks
      - Baseline strategies
      not_fit_for:
      - Weight allocation
      - Risk-aware portfolios
    - name: WeightStrategyBase
      traits:
      - Weight-based
      - Risk-aware
      - Optimization
      fit_for:
      - Risk parity
      - Factor exposure
      - Portfolio optimization
      not_fit_for:
      - Simple ranking
      - Low-turnover requirements
    - name: TWAPStrategy
      traits:
      - Time-weighted
      - Execution smoothing
      fit_for:
      - Large orders
      - Market impact reduction
      not_fit_for:
      - Signal-driven
      - Opportunistic
    default: TopkDropoutStrategy
  - name: Risk Constraint
    description: Position sizing method controlling portfolio utilization
    options:
    - name: risk_degree (0-1)
      traits:
      - Single parameter
      - Portfolio utilization
      fit_for:
      - Simple strategies
      - Conservative allocation
      not_fit_for:
      - Complex constraints
      - Factor exposure targets
    - name: turn_limit
      traits:
      - Turnover control
      - Trading cost aware
      fit_for:
      - Cost-sensitive
      - Low-frequency rebalancing
      not_fit_for:
      - Momentum strategies
      - High-frequency
    - name: EnhancedIndexing (CVX)
      traits:
      - Convex optimization
      - Risk model integration
      fit_for:
      - Institutional portfolios
      - Factor exposure control
      not_fit_for:
      - Simple backtests
      - Fast execution
    default: risk_degree=0.95
  design_decisions:
  - only_tradable flag checks suspension/limit preventing orders for suspended or limit-up/down stocks
    (qlib/contrib/strategy/signal_strategy.py:150)
  - forbid_all_trade_at_limit=True is conservative default preventing selling at limit-up (qlib/contrib/strategy/signal_strategy.py:117)
  - hold_thresh enforces minimum holding period preventing excessive turnover from day-trading (qlib/contrib/strategy/signal_strategy.py:88)
  - generate_trade_decision can be generator enabling nested execution at finer granularity (qlib/strategy/base.py:136)
  - Method names encode sell/buy logic (method_sell='bottom', method_buy='top') for intuitive behavior
    (qlib/contrib/strategy/signal_strategy.py:86)
  - risk_degree defaults to 0.95 (95% portfolio utilization) across each strategies (qlib/contrib/strategy/signal_strategy.py:32)
  acceptance_hints:
  - Strategy generates orders only for stocks passing only_tradable checks
  - Orders respect hold_thresh minimum holding period
  - risk_degree of 0.95 means 95% capital deployed leaving 5% cash buffer
- id: backtest_execution
  name: Backtest Execution
  order: 7
  responsibility: Simulates market execution with order matching, cost modeling, position tracking, and
    performance metrics. Provides realistic backtesting with market microstructure modeling.
  interface:
    inputs: TradeDecision with Order list, Exchange with price/volume data, Account with position/cash
    outputs: Execution results, Updated position/account, Trade indicators
  required_methods:
  - name: Exchange.deal_order
    description: Processes single order matching against market, modifying Order in-place with deal_amount
    evidence: qlib/backtest/exchange.py:430(deal_order)
  - name: Exchange.get_quote
    description: Returns current market quote for price/volume limits and cost calculation
    evidence: qlib/backtest/exchange.py:28(Exchange)
  - name: Position.update
    description: Updates portfolio holdings with cash and stock amounts after trades
    evidence: qlib/backtest/position.py:231(Position)
  - name: Account.update
    description: Updates account state with metrics accumulation after each step
    evidence: qlib/backtest/account.py:71(Account)
  - name: SimulatorExecutor.execute
    description: Single-level trading simulation orchestrating exchange, position, and account
    evidence: qlib/backtest/executor.py:513(SimulatorExecutor)
  key_behaviors:
  - behavior: Asymmetric buy/sell price handling
    description: Markets have different prices for buying vs selling; TWAP/VWAP uses realistic spread
    evidence: qlib/backtest/exchange.py:160
  - behavior: In-place order modification
    description: deal_order modifies Order object in-place, carrying deal_amount for later reference
    evidence: qlib/backtest/exchange.py:430
  - behavior: Asymmetric limit thresholds
    description: limit_threshold uses tuple for different limit rules for buy vs sell, based on $change
      direction
    evidence: qlib/backtest/exchange.py:71
  - behavior: Share lot adjustment
    description: factor for adjusting share counts for Chinese stocks 100-share lots
    evidence: qlib/backtest/exchange.py:516(get_factor)
  replaceable_points:
  - name: Price Model
    description: How to get execution price for order matching
    options:
    - name: close
      traits:
      - End-of-day
      - Simple
      - No slippage
      fit_for:
      - Daily rebalancing
      - Simple backtests
      not_fit_for:
      - Intraday
      - High-frequency
    - name: $vwap
      traits:
      - Volume-weighted
      - Realistic
      - Execution cost aware
      fit_for:
      - Large orders
      - Market impact modeling
      not_fit_for:
      - Small orders
      - Thin markets
    - name: ($open, $close)
      traits:
      - OHLC-based
      - Intraday range
      fit_for:
      - High-frequency
      - Range-bound strategies
      not_fit_for:
      - Daily-only data
      - Simple backtests
    default: close
  - name: Position Type
    description: Position tracking implementation for portfolio simulation
    options:
    - name: Position (realistic)
      traits:
      - Cash tracking
      - Share lot adjustment
      - Full accounting
      fit_for:
      - Realistic backtests
      - Portfolio-level analysis
      not_fit_for:
      - Infinite capital假设
      - Unconstrained strategies
    - name: InfPosition (unlimited cash)
      traits:
      - No cash constraints
      - Simplified accounting
