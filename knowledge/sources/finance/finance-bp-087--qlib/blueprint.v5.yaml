- id: BD-137
  type: B/BA
  content: 'RISK CASCADE: [BD-113] → [BD-095] → [BD-096] → systematic transaction cost underestimation'
  rationale: BD-113's zero-spread default (buy_price == sell_price) cascades through BD-095's VWAP calculation
    and BD-096's compound fee computation. When spreads are ignored, VWAP calculations use midpoint prices
    rather than realistic bid/ask, and fee calculations on reduced spreads underestimate true market impact.
    High-turnover strategies accumulate small errors across hundreds of trades, resulting in significant
    overestimation of net returns that would evaporate in live trading with realistic execution costs.
  evidence: BD-113,BD-095,BD-096
  stage: global
  alternative_considered: Requiring explicit spread configuration would prevent zero-spread defaults but
    break backward compatibility
