replaceable_slots:
- id: slot-001
  name: data_source
  description: 'Choose based on: (1) Market coverage needed, (2) Data frequency requirements, (3) Budget
    constraints, (4) Historical vs. real-time needs'
  used_in_stages: []
  options:
  - name: Yahoo Finance (yahooquery)
    traits:
    - free
    - global_coverage
    - delayed_realtime
    - rate_limited
    fit_for:
    - Global stock data (US, CN, IN, BR), daily and intraday OHLCV
    not_fit_for:
    - High-frequency trading, China-blocked environments, premium data needs
  - name: Baostock
    traits:
    - free
    - china_focused
    - high_freq_available
    fit_for:
    - Chinese stock 5-minute data for HS300
    not_fit_for:
    - Global coverage, US stocks, non-HS300 Chinese stocks
  - name: CoinGecko
    traits:
    - free_tier
    - crypto_focused
    - rate_limited
    fit_for:
    - Cryptocurrency daily OHLCV data
    not_fit_for:
    - Intraday crypto data, institutional data quality needs
  - name: Tushare
    traits:
    - china_focused
    - comprehensive
    - requires_token
    fit_for:
    - Comprehensive Chinese market data, fundamentals, PIT data
    not_fit_for:
    - Non-Chinese markets, free usage
  - name: AKShare
    traits:
    - free
    - china_focused
    - comprehensive
    fit_for:
    - Free Chinese market data alternative to Tushare
    not_fit_for:
    - Production reliability, US/international markets
  - name: Pre-processed Qlib Datasets
    traits:
    - ready_to_use
    - historical_only
    - static
    fit_for:
    - Quick start, research reproducibility
    not_fit_for:
    - Latest data, custom instruments, different time periods
  default: Yahoo Finance (yahooquery)
  _source: worker_resource
- id: slot-002
  name: cache_backend
  description: Use Redis for any multi-node/distributed setup; disk cache for single-node production;
    skip cache for beginners
  used_in_stages: []
  options:
  - name: Redis
    traits:
    - distributed
    - persistent
    - locking_builtin
    fit_for:
    - Distributed training, multi-node caching, persistent cache needs
    not_fit_for:
    - Single-node simple setups, memory-only caching
  - name: DiskExpressionCache
    traits:
    - local_only
    - filesystem_based
    fit_for:
    - Single-node setups, simple deployments
    not_fit_for:
    - Distributed environments, shared cache needs
  - name: SimpleDatasetCache
    traits:
    - local_only
    - simple
    fit_for:
    - Basic dataset caching, development environments
    not_fit_for:
    - Production distributed systems
  default: Redis for distributed, None (skip) for client
  _source: worker_resource
- id: slot-003
  name: experiment_tracking
  description: MLflow for any serious research or team work; file backend for quick experiments
  used_in_stages: []
  options:
  - name: MLflow
    traits:
    - industry_standard
    - feature_rich
    - ui_included
    fit_for:
    - Production ML tracking, model registry needs, team collaboration
    not_fit_for:
    - Minimal setups, embedded environments
  - name: File-based tracking
    traits:
    - minimal
    - no_server
    fit_for:
    - Individual research, simple experiments
    not_fit_for:
    - Team collaboration, experiment comparison
  default: MLflow with file:// URI
  _source: worker_resource
- id: slot-004
  name: task_queue
  description: Use task queue only for distributed training or hyperparameter optimization; otherwise
    inline training is sufficient
  used_in_stages: []
  options:
  - name: MongoDB
    traits:
    - document_store
    - flexible_schema
    fit_for:
    - Distributed training, task scheduling, complex task graphs
    not_fit_for:
    - Simple single-model training
  - name: None (inline training)
    traits:
    - simple
    - no_queue
    fit_for:
    - Single model training, quick experiments
    not_fit_for:
    - Hyperparameter tuning, many experiments
  default: MongoDB for task management; None for simple use
  _source: worker_resource
- id: slot-005
  name: deep_learning_backend
  description: PyTorch is the only supported deep learning backend; choose only if deep learning is needed
  used_in_stages: []
  options:
  - name: PyTorch
    traits:
    - gpu_support
    - dynamic_graph
    - industry_standard
    fit_for:
    - Deep learning models (GRU, LSTM, Transformer), GPU training
    not_fit_for:
    - Simple gradient boosting models, CPU-only environments
  default: PyTorch
  _source: worker_resource
- id: slot-006
  name: data_storage_format
  description: Use QLib binary for performance; HDF5 for interoperability; CSV for debugging
  used_in_stages: []
  options:
  - name: QLib Binary (.bin)
    traits:
    - columnar
    - compressed
    - qlib_native
    fit_for:
    - Maximum performance, columnar access patterns
    not_fit_for:
    - Human readability, external tools
  - name: HDF5
    traits:
    - standard
    - portable
    fit_for:
    - Sharing with other tools, platform portability
    not_fit_for:
    - Maximum performance, distributed access
  - name: CSV
    traits:
    - human_readable
    - standard
    fit_for:
    - Data inspection, small datasets, external tools
    not_fit_for:
    - Large datasets, performance-critical workloads
  default: QLib Binary (.bin)
  _source: worker_resource
