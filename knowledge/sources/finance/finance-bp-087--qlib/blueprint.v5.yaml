- id: BD-128
  type: B/BA
  content: 'INTERACTION: [BD-112] × [BD-057] → Contradictory settlement semantics causing capital flow
    errors'
  rationale: 'BD-112 defaults to ST_NO (immediate settlement) allowing sell proceeds to fund immediate
    buys, while BD-057 enforces T+1 settlement where sold cash is unavailable until next trading day.
    These decisions directly contradict each other: BD-112 enables impossible capital flows that BD-057''s
    rationale explicitly prohibits for Chinese A-share markets. This contradiction can cause backtests
    to report unrealistic capital efficiency and position feasibility that would fail in live trading.'
  evidence: BD-112,BD-057
  stage: global
  alternative_considered: Defaulting to ST_T1 settlement would align with Chinese market rules but reduce
    capital efficiency estimates
