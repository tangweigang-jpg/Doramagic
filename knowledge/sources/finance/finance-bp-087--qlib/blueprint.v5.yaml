- id: BD-136
  type: B/BA
  content: 'RISK CASCADE: [BD-112] → [BD-057] → [BD-072] → systemic capital tracking failure'
  rationale: 'Starting with BD-112''s immediate settlement default, this cascades through BD-057''s T+1
    enforcement rationale, reaching BD-072''s cash settlement implementation. The contradiction causes
    the system to track capital flows incorrectly: backtests assume immediate cash availability while
    Chinese market rules require T+1 settlement. This cascade can cause strategies to appear feasible
    in backtesting that would fail margin calls or trigger forced liquidations in live trading due to
    timing mismatches between expected and actual cash availability.'
