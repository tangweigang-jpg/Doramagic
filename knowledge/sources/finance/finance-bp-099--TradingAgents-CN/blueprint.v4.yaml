replaceable_slots:
- id: slot-001
  name: china_stock_data_source
  description: 'Choose based on: budget constraints, data quality requirements, real-time needs, and SLA
    requirements'
  used_in_stages: []
  options:
  - name: AKShare
    traits:
    - free
    - open-source
    - no-auth-required
    - webscraping
    fit_for:
    - Quick setup, free tier, development/testing, A-share and HK stocks
    not_fit_for:
    - Production requiring stable SLA, high-frequency trading, professional financial analysis
  - name: Tushare
    traits:
    - professional
    - api-based
    - token-required
    - high-quality
    fit_for:
    - Professional A-share analysis, comprehensive data, financial research
    not_fit_for:
    - Free tier has rate limits; real-time data requires paid subscription
  - name: BaoStock
    traits:
    - free
    - no-auth-required
    - stable
    - historical-focus
    fit_for:
    - A-share historical data, backup data source, long-term analysis
    not_fit_for:
    - Real-time data needs, comprehensive coverage
  - name: Wind
    traits:
    - professional
    - commercial
    - comprehensive
    - institutional-grade
    fit_for:
    - Institutional trading, professional research, full market coverage
    not_fit_for:
    - Individual investors, budget-constrained users
  default: AKShare
  _source: worker_resource
- id: slot-002
  name: us_stock_data_source
  description: 'Choose based on: budget, real-time needs, coverage requirements'
  used_in_stages: []
  options:
  - name: yfinance
    traits:
    - free
    - open-source
    - no-auth-required
    - global-coverage
    fit_for:
    - Free tier users, development, global market coverage including US/HK
    not_fit_for:
    - High-frequency trading, real-time requirements, professional trading
  - name: Finnhub
    traits:
    - free-tier
    - api-based
    - real-time
    - news-included
    fit_for:
    - US stock real-time data, news integration, sentiment analysis
    not_fit_for:
    - High-volume trading (60 calls/min limit), comprehensive fundamentals
  - name: Alpha Vantage
    traits:
    - free-tier
    - technical-focus
    - fx-crypto
    fit_for:
    - Technical analysis, currency data, crypto data
    not_fit_for:
    - High-frequency needs (5 calls/min free tier), comprehensive news
  - name: IEX Cloud
    traits:
    - professional
    - real-time
    - high-quality
    fit_for:
    - Professional trading, real-time US data needs
    not_fit_for:
    - Budget-constrained users
  default: yfinance
  _source: worker_resource
- id: slot-003
  name: vector_memory
  description: ChromaDB is default for simplicity; switch to managed services for production scale
  used_in_stages: []
  options:
  - name: ChromaDB
    traits:
    - embedded
    - lightweight
    - langchain-compatible
    fit_for:
    - Development, single-instance deployments, embedded use
    not_fit_for:
    - Distributed deployments, high-scale production
  - name: Pinecone
    traits:
    - managed
    - scalable
    - cloud-native
    fit_for:
    - Production deployments requiring scalability
    not_fit_for:
    - Budget-constrained users, air-gapped environments
  - name: Weaviate
    traits:
    - open-source
    - hybrid-search
    - scalable
    fit_for:
    - Self-hosted production, hybrid search requirements
    not_fit_for:
    - Quick setup needs
  default: ChromaDB
  _source: worker_resource
- id: slot-004
  name: cache_backend
  description: integrated strategy auto-selects based on availability; configure based on infrastructure
  used_in_stages: []
  options:
  - name: MongoDB Cache
    traits:
    - persistent
    - structured
    - distributed
    fit_for:
    - Production with MongoDB already deployed
    not_fit_for:
    - Environments without MongoDB
  - name: Redis Cache
    traits:
    - fast
    - in-memory
    - distributed
    fit_for:
    - High-performance caching, session management
    not_fit_for:
    - Environments without Redis
  - name: File Cache
    traits:
    - simple
    - no-dependency
    - local-only
    fit_for:
    - Development, single-machine setups, environments without databases
    not_fit_for:
    - Distributed systems, high-performance needs
  default: integrated (MongoDB + Redis fallback to File)
  _source: worker_resource
