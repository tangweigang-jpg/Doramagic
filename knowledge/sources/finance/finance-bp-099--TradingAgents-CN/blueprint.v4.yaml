  evidence: ''
- contract: Every analysts must populate their report field in AgentState before advancing to next stage
    (tradingagents/graph/conditional_logic.py:51)
  evidence: ''
- contract: company_of_interest + trade_date are required in initial state for each analysis workflows
    (tradingagents/graph/propagation.py:32)
  evidence: ''
