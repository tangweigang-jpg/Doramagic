    adds latency and could produce different results if implementations diverge. The same logical concern
    is handled three times.
  evidence: BD-006,BD-015,BD-045
  stage: global
  alternative_considered: Single currency validation service would centralize logic but add dependency
    coupling
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-119
  type: B/DK
  content: 'INTERACTION: [BD-017] × [BD-009] × [BD-046] → Memory retrieval limit conflicts with reflection
    goal of learning from mistakes'
  rationale: Reflection (BD-009) aims to learn from historical mistakes, but memory retrieval (BD-017)
    limits to only 2 matches. If an analyst made repeated errors in a specific domain (e.g., misjudging
    A-share volatility), the 2-match limit may not surface enough historical context to recognize the
    pattern. The system claims learning capability but artificially caps the evidence available for pattern
    recognition.
  evidence: BD-017,BD-009,BD-046
  stage: global
  alternative_considered: Adaptive n_matches based on query similarity scores could fetch more matches
    when relevance is high
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-120
  type: T
  content: 'RISK CASCADE: [BD-004] → [BD-035] → [BD-036] → [BD-101] → Analysis quality degradation under
    complex scenarios'
  rationale: 'Tool call limits create a cascade: max_tool_calls=3 (BD-004/035) means complex analyses
    may not gather sufficient data before debate begins. The strict sequential order (BD-101) means if
    market analyst exhausts calls on tangential data, the subsequent bull/bear debate lacks foundational
    context. Fundamentals has only 1 call (BD-036) which fetches each data, but other analysts must budget
    3 calls across potentially multiple data sources. This creates systemic risk where edge cases produce
    incomplete analysis.'
  evidence: BD-004,BD-035,BD-036,BD-101
  stage: global
  alternative_considered: Dynamic tool call allocation based on query complexity would require real-time
    estimation
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-121
  type: T
  content: 'RISK CASCADE: [BD-028] → [BD-029] → [BD-066] → Real-time data availability paradox for investment
    decisions'
  rationale: 'Default settings create conflicting signals: online tools disabled (BD-028) but news enabled
    (BD-029), while quotes refresh every 6 minutes (BD-066). For momentum-driven strategies that rely
    on current news sentiment, the 6-minute quote lag plus disabled online tools means the system uses
    stale prices with fresh news. This mismatch can trigger contradictory signals where news suggests
    immediate action but price data doesn''t reflect recent moves.'
  evidence: BD-028,BD-029,BD-066
  stage: global
  alternative_considered: Synchronized data freshness settings would require co-configuration of tools
    and refresh intervals
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-122
  type: B/BA
  content: 'CONTRADICTION: [BD-014] default ''持有'' vs [BD-044] requires specific target_price → Conservative
    fail-safe conflicts with strict validation'
  rationale: BD-014 defaults to '持有' (hold) with confidence=0.5 on invalid input as a fail-safe to prevent
    erroneous actions. However, BD-044 strictly requires a specific target_price and rejects null values.
    When signal processing defaults to hold, the trader node then requires a price to proceed, creating
    an impossible state. The fail-safe creates a hold decision that cannot be executed because no price
    was specified. This contradiction means the safety mechanism doesn't work end-to-end.
  evidence: BD-014,BD-044
  stage: global
  alternative_considered: Default target_price calculation when hold is triggered would bridge the contradiction
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-123
  type: BA/DK
  content: 'AMPLIFICATION: [BD-100] × [BD-025] × [BD-021] → Cross-provider LLM routing enables multiplicative
    cost optimization but increases operational complexity'
  rationale: 'Dual-LLM architecture (BD-100) combined with cross-provider routing (BD-025) and hierarchical
    key priority (BD-021) creates multiplicative flexibility. A single analysis could route quick_think
    to local llama (free), deep_think to Claude ($15/1M tokens), and specific tools to OpenAI, each with
    different API keys. This flexibility can reduce costs by 70%+ but amplifies operational complexity:
    each provider has different rate limits, latency profiles, and failure modes.'
  evidence: BD-100,BD-025,BD-021
  stage: global
  alternative_considered: Single provider simplicity would reduce flexibility but improve reliability
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
