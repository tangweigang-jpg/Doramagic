# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-099
name: TradingAgents-CN
sop_version: '3.6'
source:
  projects:
  - TradingAgents-CN
  commit_hash: bd599607e83cd0d249482e57869216d52b1cb2aa
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Multi-agent AI stock analysis and investment research
  description: Multi-agent AI stock analysis learning platform supporting A-share, Hong Kong, and US markets
    with dual-LLM architecture for parallel market/social/news/fundamentals analysis, investment debate,
    and risk evaluation
  prerequisites: Understanding of AI/LLM concepts, basic stock market knowledge, Python programming experience
  not_suitable_for: Real-time trading, production deployment without proper configuration, users unfamiliar
    with AI limitations, non-Chinese market focus without adaptation
  activation:
    triggers:
    - 用户调用trading_graph.propagate(ticker, date)方法
    - 批量分析任务被Worker进程从Redis队列中取出执行
    - API调用触发分析任务
    emphasis:
    - Use ESPECIALLY when analyzing stocks across multiple markets (A股、港股、美股)
    - Use ESPECIALLY when needing comprehensive multi-dimensional analysis
    - Use ESPECIALLY when requiring explainable investment decisions
    anti_skip:
    - Don't skip analyst parallel execution even for time-critical requests - data quality depends on
      complete analysis
    - Don't skip risk debate phase - it provides essential risk control even if it slows execution
    - Don't skip signal processing - structured decisions are required for system integration
stages:
- id: data_collection
  name: Data Collection
  order: 1
  responsibility: Aggregate market data from multiple providers (Tushare, AKShare, BaoStock for China;
    yfinance, Finnhub for US/HK) with automatic fallback and caching to ensure uninterrupted data access
  interface:
    inputs:
    - stock_symbol (str)
    - date_range (start, end)
    outputs:
    - market_data (DataFrame)
    - stock_info (Dict)
    - fundamentals (Dict)
    - news (List)
  required_methods:
  - name: DataSourceManager.get_fundamentals_data
    description: 'Retrieves fundamental financial data with priority-based fallback chain: MongoDB cache
      → Tushare → AKShare → BaoStock'
    evidence: tradingagents/dataflows/data_source_manager.py:249
  - name: DataSourceManager.get_data_source_manager
    description: Factory method returning singleton DataSourceManager for unified China/US data routing
    evidence: tradingagents/dataflows/data_source_manager.py:2133
  - name: TushareProvider._get_token_from_database
    description: Retrieves API token from MongoDB with environment variable fallback, enabling runtime
      config changes
    evidence: tradingagents/dataflows/providers/china/tushare.py:40
  key_behaviors:
  - behavior: Priority-based fallback chain
    description: Data is first checked in MongoDB cache, then fetched from Tushare, AKShare, BaoStock
      in order until successful
    evidence: tradingagents/dataflows/data_source_manager.py:249(get_fundamentals_data)
  - behavior: Multi-market detection
    description: StockUtils.get_market_info() returns is_china/is_hk/is_us flags and currency info for
      correct data source selection
    evidence: tradingagents/utils/stock_utils.py:get_market_info
  - behavior: Graceful degradation
    description: System continues with reduced functionality if databases are unavailable
    evidence: tradingagents/config/database_manager.py:159(_detect_databases)
  replaceable_points:
  - name: data_source_provider
    description: Swap any data provider implementation for China/US stock data
    options:
    - name: TushareProvider
      traits:
      - Pro API
      - Requires token
      - High quality CN data
      fit_for:
      - China A-share analysis
      - Professional users with API access
      not_fit_for:
      - Free tier users
      - Non-Tushare markets
    - name: AKShareProvider
      traits:
      - Free
      - Open source
      - Broad market coverage
      fit_for:
      - Cost-sensitive users
      - Initial exploration
      not_fit_for:
      - High-frequency data needs
      - Real-time requirements
    - name: BaoStockProvider
      traits:
      - Free
      - Historical focus
      - China specific
      fit_for:
      - Historical backtesting
      - China stock research
      not_fit_for:
      - Real-time data
      - US/HK markets
    default: TushareProvider
  design_decisions:
  - 'Fallback chain: MongoDB → Tushare → AKShare → BaoStock prioritizes cached data for speed, degrades
    gracefully to free sources when APIs unavailable (tradingagents/dataflows/data_source_manager.py:249)'
  - Token stored in DB with env var fallback allows runtime config changes via Web UI without code deployment
    (tradingagents/dataflows/providers/china/tushare.py:40)
  - DataSourceManager as global singleton provides single point for source priority and caching logic
    across each data consumers (tradingagents/dataflows/data_source_manager.py:2133)
  acceptance_hints:
  - Successfully retrieves market data for each three markets (CN/HK/US) without manual intervention
  - Fallback mechanism triggers correctly when primary data source fails
  - Cached data returned within 100ms, fresh data within 30s
- id: multi_analyst_pipeline
  name: Multi-Analyst Pipeline
  order: 2
  responsibility: Run parallel analysts (market, social, news, fundamentals) using LangGraph ToolNode
    with bounded tool calls to prevent infinite loops while gathering comprehensive investment data
  interface:
    inputs:
    - company_of_interest (str)
    - trade_date (str)
    - AgentState (TypedDict)
    outputs:
    - market_report
    - sentiment_report
    - news_report
    - fundamentals_report (each str)
  required_methods:
  - name: MarketAnalyst.analyze
    description: Performs market trend and technical analysis for given stock symbol
    evidence: tradingagents/agents/analysts/market_analyst.py:95
  - name: FundamentalsAnalyst.analyze
    description: Analyzes financial metrics and valuation data
    evidence: tradingagents/agents/analysts/fundamentals_analyst.py:98
  - name: NewsAnalyst.analyze
    description: Extracts sentiment and key events from news sources
    evidence: tradingagents/agents/analysts/news_analyst.py:19
  - name: SocialMediaAnalyst.analyze
    description: Tracks social media sentiment for target stock
    evidence: tradingagents/agents/analysts/social_media_analyst.py:10
  - name: ConditionalLogic.should_continue_market
    description: Controls tool call loop prevention with max_tool_calls=3 limit
    evidence: tradingagents/graph/conditional_logic.py:28
  key_behaviors:
  - behavior: Sequential analyst execution with MsgClear nodes
    description: Each analyst runs in sequence with message clearing between them to ensure each builds
      on previous analysis context without memory overflow
    evidence: tradingagents/graph/setup.py:186(add_conditional_edges)
  - behavior: Tool call loop prevention
    description: max_tool_calls=3 per analyst prevents LLM from entering infinite tool-call loops while
      allowing sufficient data gathering
    evidence: tradingagents/graph/conditional_logic.py:28
  - behavior: Report field enforcement
    description: Every analysts must populate their report field in AgentState before graph advances to
      next stage
    evidence: tradingagents/graph/conditional_logic.py:51
  replaceable_points:
  - name: analyst_type
    description: Add, remove, or configure analyst types in the pipeline
    options:
    - name: market
      traits:
      - Technical analysis
      - Trend detection
      - Requires market data
      fit_for:
      - Trend-following strategies
      - Short-term analysis
      not_fit_for:
      - Long-term value investing
    - name: social
      traits:
      - Social sentiment
      - Reddit/Weibo
      - Real-time
      fit_for:
      - Momentum trading
      - Viral event detection
      not_fit_for:
      - Fundamental analysis
      - Low-volatility stocks
    - name: news
      traits:
      - News sentiment
      - Event-driven
      - Google News
      fit_for:
      - Event-driven strategies
      - Catalyst identification
      not_fit_for:
      - Quiet market periods
      - Long holding periods
    - name: fundamentals
      traits:
      - Financial metrics
      - Valuation
      - PE/PB/ROE
      fit_for:
      - Value investing
      - Long-term positioning
      not_fit_for:
      - Short-term trading
      - Technical traders
    default: '[''market'', ''social'', ''news'', ''fundamentals'']'
  design_decisions:
  - max_tool_calls=3 per analyst prevents infinite loops while allowing sufficient data gathering (tradingagents/graph/conditional_logic.py:28)
  - Analysts run in sequence with MsgClear nodes between them ensures each builds on previous context
    (tradingagents/graph/setup.py:186)
  - StockUtils.get_market_info() for multi-market detection handles China/US/HK detection with single
    utility (tradingagents/agents/analysts/market_analyst.py:29)
  acceptance_hints:
  - Every four analyst reports are generated without timeout errors
  - No agent enters infinite tool-call loops
  - Each report is non-empty and contains domain-specific analysis
- id: investment_debate
  name: Investment Debate
  order: 3
  responsibility: Bull and Bear researchers debate investment thesis using Long-Term Memory retrieval,
    then Research Manager synthesizes opposing viewpoints into coherent investment_plan
  interface:
    inputs:
    - market_report
    - sentiment_report
    - news_report
    - fundamentals_report (each str)
    outputs:
    - investment_plan (str)
    - investment_debate_state (InvestDebateState)
  required_methods:
  - name: BullResearcher.research
    description: Constructs bull case with supporting evidence from analyst reports
    evidence: tradingagents/agents/researchers/bull_researcher.py:10
  - name: BearResearcher.research
    description: Constructs bear case with opposing evidence and risk factors
    evidence: tradingagents/agents/researchers/bear_researcher.py:10
  - name: ResearchManager.judge
    description: Deep-thinking synthesis of bull/bear debate into investment decision
    evidence: tradingagents/agents/managers/research_manager.py:9
  - name: FinancialSituationMemory.get_memories
    description: Retrieves n most similar past investment situations from ChromaDB vector store
    evidence: tradingagents/agents/utils/memory.py:69
  key_behaviors:
  - behavior: Retrieval-augmented generation
    description: Researchers receive past_memory_str from reflection layer, enabling learning from analogous
      historical situations
    evidence: tradingagents/agents/researchers/bull_researcher.py:121
  - behavior: Single debate round by default
    description: max_debate_rounds=1 balances thoroughness with latency; single round sufficient for opposing
      viewpoint synthesis
    evidence: tradingagents/default_config.py:17
  - behavior: ChromaDB vector similarity search
    description: Semantic search enables finding analogous past situations for informed decision-making
    evidence: tradingagents/agents/utils/memory.py:69
  replaceable_points:
  - name: debate_memory
    description: Swap vector store backend for long-term memory persistence
    options:
    - name: ChromaDB
      traits:
      - Local embedding
      - Persistent
      - Easy setup
      fit_for:
      - Development
      - Single-node deployments
      - Privacy-sensitive
      not_fit_for:
      - Distributed systems
      - High-scale production
    - name: Pinecone
      traits:
      - Cloud-native
      - Managed
      - Scalable
      fit_for:
      - Production
      - Multi-instance
      - Enterprise scale
      not_fit_for:
      - Local development
      - Cost-sensitive projects
    - name: FAISS
      traits:
      - Facebook library
      - In-memory
      - Fast
      fit_for:
      - Batch processing
      - Research
      - Offline use
      not_fit_for:
      - Real-time updates
      - Distributed deployment
    default: ChromaDB
  design_decisions:
  - max_debate_rounds=1 default balances thoroughness with latency (tradingagents/default_config.py:17)
  - ChromaDB for vector similarity search enables semantic retrieval of analogous past situations (tradingagents/agents/utils/memory.py:69)
  - prompt includes past_memory_str from reflection enables learning from historical mistakes via RAG
    (tradingagents/agents/researchers/bull_researcher.py:121)
  acceptance_hints:
  - Bull and bear cases present genuinely opposing viewpoints
  - Research Manager synthesis incorporates both perspectives
  - Historical memory retrieval returns relevant past situations
- id: trading_decision
  name: Trading Decision
  order: 4
  responsibility: Trader agent converts research output into concrete investment plan with position sizing,
    entry/exit strategy, and actionable recommendations
  interface:
    inputs:
    - investment_plan (str)
    - investment_debate_state
    outputs:
    - trader_investment_plan (str)
  required_methods:
  - name: Trader.execute
    description: Generates actionable trading plan from bull/bear research and market conditions
    evidence: tradingagents/agents/trader/trader.py:10
  key_behaviors:
  - behavior: Quick-thinking LLM usage
    description: Trader uses quick_thinking_llm (faster, cheaper) as trading plan generation is template-driven
      and doesn't need deep reasoning
    evidence: tradingagents/graph/setup.py:149(trader_node)
  - behavior: Position sizing and entry/exit
    description: Outputs concrete position size, entry price range, stop-loss, and target exit price
    evidence: tradingagents/agents/trader/trader.py:10
  replaceable_points:
  - name: trader_llm
    description: LLM model for trading decision generation
    options:
    - name: quick_thinking_llm
      traits:
      - Fast
      - Cheap
      - Template-driven
      fit_for:
      - Standard analysis
      - High volume
      not_fit_for:
      - Complex strategies
      - Edge cases
    - name: deep_thinking_llm
      traits:
      - Slow
      - Expensive
      - Deep reasoning
      fit_for:
      - Complex situations
      - Large positions
      not_fit_for:
      - High-frequency analysis
      - Cost-sensitive
    default: quick_thinking_llm
  design_decisions:
  - Trader uses quick_thinking_llm (faster, cheaper) as trading plan generation is template-driven and
    doesn't need deep reasoning (tradingagents/graph/setup.py:149)
  acceptance_hints:
  - Trading plan includes specific entry/exit prices with reasoning
  - Position sizing considers risk parameters
  - Output is actionable without requiring human interpretation
- id: risk_debate
  name: Risk Debate
  order: 5
  responsibility: Three-way debate (Risky/Neutral/Safe debaters) evaluating risk/reward profile, culminating
    in Risk Manager synthesis into final_trade_decision with risk-adjusted recommendations
  interface:
    inputs:
    - trader_investment_plan (str)
    outputs:
    - final_trade_decision (str)
    - risk_debate_state (RiskDebateState)
  required_methods:
  - name: RiskyDebator.debate
    description: Argues for aggressive risk-taking and maximum position sizing
    evidence: tradingagents/agents/risk_mgmt/aggresive_debator.py:9
  - name: SafeDebator.debate
    description: Argues for conservative risk management and position limits
    evidence: tradingagents/agents/risk_mgmt/conservative_debator.py:10
  - name: NeutralDebator.debate
    description: Balances risk perspectives with moderate recommendations
    evidence: tradingagents/agents/risk_mgmt/neutral_debator.py:9
  - name: RiskManager.judge
    description: Deep-thinking synthesis of three-way debate into final risk-adjusted decision
    evidence: tradingagents/agents/managers/risk_manager.py:9
  key_behaviors:
  - behavior: Three-way risk spectrum
    description: Captures full risk spectrum (Risky/Neutral/Safe) rather than binary risk-on/risk-off
      for nuanced risk assessment
    evidence: tradingagents/agents/utils/agent_states.py:29(RiskDebateState)
  - behavior: Single risk debate round
    description: max_risk_discuss_rounds=1 as risk debate is supplementary to investment debate
    evidence: tradingagents/default_config.py:18
  - behavior: Risk score output
    description: Synthesizes debate into quantitative risk score (0-1) for downstream processing
    evidence: tradingagents/agents/managers/risk_manager.py:9
  replaceable_points:
  - name: risk_debater
    description: Add or modify risk debate participants
    options:
    - name: RiskyDebator
      traits:
      - Aggressive
      - High exposure
      - Growth-focused
      fit_for:
      - Bull markets
      - Risk-tolerant investors
      not_fit_for:
      - Bear markets
      - Conservative portfolios
    - name: NeutralDebator
      traits:
      - Balanced
      - Moderate exposure
      - Defensive
      fit_for:
      - Neutral markets
      - Balanced portfolios
      not_fit_for:
      - Extreme conditions
    - name: SafeDebator
      traits:
      - Conservative
      - Low exposure
      - Preservation-focused
      fit_for:
      - High volatility
      - Capital preservation
      not_fit_for:
      - Bull markets
      - Growth strategies
    default: each three
  design_decisions:
  - Three-way debate pattern (Risky/Neutral/Safe) captures full risk spectrum rather than binary risk-on/risk-off
    (tradingagents/agents/utils/agent_states.py:29)
  - max_risk_discuss_rounds=1 default as risk debate is supplementary to investment debate (tradingagents/default_config.py:18)
  acceptance_hints:
  - Every three debater perspectives are represented in final decision
  - Risk score is consistent with market conditions and stock volatility
  - Final decision incorporates risk-adjusted recommendations
- id: signal_processing
  name: Signal Processing
  order: 6
  responsibility: Convert unstructured final_trade_decision into structured JSON with action (买入/持有/卖出),
    target_price, confidence, and risk_score for downstream trading systems
  interface:
    inputs:
    - final_trade_decision (str)
    - stock_symbol (str)
    outputs:
      action: 买入/持有/卖出
      target_price: float
      confidence: 0-1
      risk_score: 0-1
      reasoning: str
  required_methods:
  - name: SignalProcessor.process
    description: Extracts structured signal from LLM output with regex fallback for price parsing
    evidence: tradingagents/graph/signal_processing.py:11
  - name: SignalProcessor._get_default_decision
    description: Returns fail-safe '持有' with confidence=0.5 on invalid or malformed input
    evidence: tradingagents/graph/signal_processing.py:34
  - name: SignalProcessor.get_market_info
    description: Currency-aware price extraction using market_info for CNY/USD/HKD handling
    evidence: tradingagents/graph/signal_processing.py:55
  key_behaviors:
  - behavior: LLM extraction with regex fallback
    description: Attempts structured LLM JSON extraction first, falls back to regex patterns for unstructured
      text
    evidence: tradingagents/graph/signal_processing.py:146
  - behavior: Fail-safe defaults
    description: Defaults to '持有' with confidence=0.5 on invalid input to prevent trading on malformed
      signals
    evidence: tradingagents/graph/signal_processing.py:34
  - behavior: Chinese action enforcement
    description: action_map enforces 中文 labels (买入/持有/卖出), any English output is converted silently
    evidence: tradingagents/graph/signal_processing.py:127
  replaceable_points:
  - name: signal_llm
    description: LLM for structured signal extraction
    options:
    - name: quick_thinking_llm
      traits:
      - Fast
      - Template extraction
      - Cost-effective
      fit_for:
      - Standard signals
      - High volume
      not_fit_for:
      - Complex edge cases
    - name: deep_thinking_llm
      traits:
      - Deep extraction
      - Complex reasoning
      fit_for:
      - Ambiguous decisions
      - Edge cases
      not_fit_for:
      - High-frequency needs
      - Cost-sensitive
    default: quick_thinking_llm
  design_decisions:
  - LLM extraction with regex fallback handles both structured LLM output and unstructured text (tradingagents/graph/signal_processing.py:146)
  - Default to '持有' with confidence=0.5 on invalid input prevents trading on malformed signals (tradingagents/graph/signal_processing.py:34)
  - Currency-aware price extraction using market_info handles CNY/USD/HKD symbols correctly (tradingagents/graph/signal_processing.py:55)
  acceptance_hints:
  - Output JSON contains each required fields (action, target_price, confidence, risk_score)
  - Action is always Chinese (买入/持有/卖出), never English
  - Invalid inputs result in '持有' default, never exceptions
- id: reflection_memory
  name: Reflection & Memory
  order: 7
  responsibility: After execution, reflect on returns/losses and update ChromaDB memory with insights
    for future analogous situations, enabling continuous learning from investment outcomes
  interface:
    inputs:
    - returns_losses (float)
    - final_state (AgentState)
    outputs:
    - Updated ChromaDB memory vectors
  required_methods:
  - name: Reflector.reflect_bull_researcher
    description: Generates reflection prompts for bull researcher based on actual outcomes
    evidence: tradingagents/graph/reflection.py:77
  - name: FinancialSituationMemory.add_memory
    description: Stores reflection insights into ChromaDB vector store with embeddings
    evidence: tradingagents/agents/utils/memory.py:99
  - name: FinancialSituationMemory.get_memories
    description: Retrieves 2 most similar past situations to current analysis context
    evidence: tradingagents/agents/researchers/bull_researcher.py:91
  key_behaviors:
  - behavior: Per-agent independent reflection
    description: Each agent (bull/bear/trader/judge/risk) learns independently from its domain-specific
      mistakes
    evidence: tradingagents/graph/reflection.py:77
  - behavior: ChromaDBManager singleton pattern
    description: Thread-safe singleton prevents concurrent collection creation conflicts across analyst
      nodes
    evidence: tradingagents/agents/utils/memory.py:16
  - behavior: Retrieval with n_matches=2
    description: Retrieves 2 most similar past situations for focused analogy learning
    evidence: tradingagents/agents/researchers/bull_researcher.py:91
  replaceable_points:
  - name: memory_backend
    description: Vector store for situation memory persistence and retrieval
    options:
    - name: ChromaDB
      traits:
      - Local persistence
      - Embedded vectors
      - Easy setup
      fit_for:
      - Development
      - Single-node
      - Privacy
      not_fit_for:
      - Distributed
      - Enterprise scale
    - name: FAISS
      traits:
      - In-memory
      - Fast similarity
      - No persistence
      fit_for:
      - Research
      - Batch
      - Offline
      not_fit_for:
      - Real-time updates
      - Persistence needs
    - name: Pinecone
      traits:
      - Cloud-managed
      - Scalable
      - Distributed
      fit_for:
      - Production
      - Enterprise
      - Multi-instance
      not_fit_for:
      - Local dev
      - Cost-sensitive
    default: ChromaDB
  design_decisions:
  - Reflection on every agent (bull/bear/trader/judge/risk) enables independent learning from domain-specific
    mistakes (tradingagents/graph/reflection.py:77)
  - get_memories called with n_matches=2 retrieves 2 most similar past situations to current analysis
    context (tradingagents/agents/researchers/bull_researcher.py:91)
  acceptance_hints:
  - Memory vectors are successfully stored after each analysis cycle
  - Retrieval returns semantically similar past situations
  - Reflection prompts generate meaningful learning insights
- id: web_api_service
  name: Web API Service
  order: 8
  responsibility: FastAPI layer exposing analysis endpoints with async task queuing, Redis progress tracking,
    MongoDB persistence, and real-time WebSocket updates for frontend integration
  interface:
    inputs:
    - SingleAnalysisRequest
    - BatchAnalysisRequest
    outputs:
    - task_id, status, result via WebSocket/REST
  required_methods:
  - name: AnalysisService.submit_single_analysis
    description: Orchestrates TradingAgentsGraph execution with progress tracking
    evidence: app/services/analysis_service.py:46
  - name: QueueService.enqueue
    description: Redis-based FIFO queue with concurrency limits for background task management
    evidence: app/services/queue_service.py:45
  - name: RedisProgressTracker.track
    description: Real-time progress updates via Redis pub/sub for WebSocket push
    evidence: app/services/redis_progress_tracker.py:10
  - name: SimpleAnalysisService.analyze
    description: Simplified analysis service with config lookup from MongoDB system_configs
    evidence: app/services/simple_analysis_service.py:1
  key_behaviors:
  - behavior: AsyncIO with BackgroundTasks
    description: HTTP requests return immediately while analysis runs in background thread/process
    evidence: app/routers/analysis.py:41
  - behavior: Config lookup priority
    description: 'API key priority: model_config > provider_config > env_var allows per-model API keys
      for multi-provider'
    evidence: app/services/simple_analysis_service.py:136
  - behavior: Middleware graceful degradation
    description: If Redis unavailable, rate limiting allows each requests through; removes single point
      of failure
    evidence: app/middleware/rate_limit.py:49
  replaceable_points:
  - name: task_queue
    description: Backend for background task queuing
    options:
    - name: Redis
      traits:
      - Fast
      - Pub/sub support
      - Progress tracking
      fit_for:
      - Real-time UI
      - WebSocket integration
      not_fit_for:
      - High durability needs
      - Complex workflows
    - name: RabbitMQ
      traits:
      - Enterprise
      - Reliable
      - Complex routing
      fit_for:
      - Production
      - Complex workflows
      not_fit_for:
      - Simple use cases
      - Development
    - name: database
      traits:
      - Simple
      - Persistent
      - No extra deps
      fit_for:
      - Simple deployments
      - Minimal infrastructure
      not_fit_for:
      - High throughput
      - Real-time needs
    default: Redis
  - name: progress_pubsub
    description: Real-time progress notification transport
    options:
    - name: WebSocket
      traits:
      - Bidirectional
      - Low latency
      - Real-time
      fit_for:
      - Live UI updates
      - Interactive apps
      not_fit_for:
      - Firewall-restricted
      - Simple polling
    - name: SSE
      traits:
      - Simple
      - HTTP-based
      - Unidirectional
      fit_for:
      - Server push
      - Simple clients
      not_fit_for:
      - Bidirectional needs
    - name: polling
      traits:
      - Simple
      - HTTP only
      - Cacheable
      fit_for:
      - Simple clients
      - Firewall-restricted
      not_fit_for:
      - Real-time needs
      - High frequency
    default: WebSocket
  design_decisions:
  - AsyncIO with BackgroundTasks for non-blocking analysis keeps HTTP responsive during long analysis
    (app/routers/analysis.py:41)
  - Redis progress tracker with WebSocket push enables real-time UI updates without polling overhead (app/services/redis_progress_tracker.py:10)
  - Config lookup from MongoDB system_configs enables LLM provider/model configurable via Web UI (app/services/simple_analysis_service.py:121)
  - 'API key priority: model_config > provider_config > env_var allows using multiple providers simultaneously
    (app/services/simple_analysis_service.py:136)'
  acceptance_hints:
  - Analysis requests return task_id immediately (< 1s response time)
  - WebSocket delivers progress updates within 1s of stage completion
  - System continues operating if Redis unavailable (degraded mode)
- id: llm_provider_abstraction
  name: LLM Provider Abstraction
  order: 9
  responsibility: Unified factory for creating LLM instances supporting multiple providers (OpenAI, DeepSeek,
    DashScope, Google, Anthropic, etc.) with token tracking and capability matching
  interface:
    inputs:
    - provider, model, api_key, base_url, temperature, max_tokens, timeout
    outputs:
    - ChatOpenAI-compatible LLM instance
  required_methods:
  - name: create_llm_by_provider
    description: Factory function routing to correct adapter based on provider string
    evidence: tradingagents/graph/trading_graph.py:41
  - name: OpenAICompatibleBase._generate
    description: Base LLM generation with token tracking via _track_token_usage()
    evidence: tradingagents/llm_adapters/openai_compatible_base.py:155
  - name: ChatDeepSeekOpenAI.invoke
    description: DeepSeek-specific adapter with rate limiting and retry logic
    evidence: tradingagents/llm_adapters/openai_compatible_base.py:197
  - name: ChatDashScopeOpenAIUnified.invoke
    description: Alibaba DashScope adapter with unified interface
    evidence: tradingagents/llm_adapters/openai_compatible_base.py:220
  key_behaviors:
  - behavior: OpenAI-compatible inheritance
    description: Every adapters inherit ChatOpenAI for drop-in LangChain compatibility
    evidence: tradingagents/llm_adapters/openai_compatible_base.py:32
  - behavior: Token usage tracking
    description: Unified token tracking across each providers for cost monitoring
    evidence: tradingagents/llm_adapters/openai_compatible_base.py:155
  - behavior: Dual-LLM role assignment
    description: quick/deep LLMs can come from different providers for cost optimization
    evidence: tradingagents/graph/trading_graph.py:242
  replaceable_points:
  - name: llm_provider
    description: LLM backend vendor for model hosting
    options:
    - name: openai
      traits:
      - GPT-4
      - GPT-3.5
      - Tool calling
      - Broad support
      fit_for:
      - General purpose
      - Tool use
      - Production
      not_fit_for:
      - Cost-sensitive
      - China access
    - name: deepseek
      traits:
      - Cost-effective
      - Strong reasoning
      - Chinese-optimized
      fit_for:
      - Budget-conscious
      - China users
      - Deep analysis
      not_fit_for:
      - Max quality
      - Non-Chinese tasks
    - name: dashscope
      traits:
      - Alibaba cloud
      - Qwen models
      - China-native
      fit_for:
      - China users
      - Qwen ecosystem
      not_fit_for:
      - International access
    - name: google
      traits:
      - Gemini
      - Long context
      - Multimodal
      fit_for:
      - Long documents
      - Multimodal
      - Google ecosystem
      not_fit_for:
      - Simple tasks
      - Cost-sensitive
    - name: anthropic
      traits:
      - Claude
      - Long context
      - Safety-focused
      fit_for:
      - High quality
      - Long documents
      not_fit_for:
      - Cost-sensitive
      - Tool calling heavy
    - name: ollama
      traits:
      - Local
      - Private
      - Open models
      fit_for:
      - Privacy
      - Offline
      - Development
      not_fit_for:
      - Production
      - API reliability
    default: openai
  design_decisions:
  - Factory function create_llm_by_provider() with provider routing provides single entry point for each
    LLM creation (tradingagents/graph/trading_graph.py:41)
  - OpenAICompatibleBase inherits ChatOpenAI for drop-in replacement maintaining LangChain compatibility
    (tradingagents/llm_adapters/openai_compatible_base.py:32)
  - Token tracking in _generate() with _track_token_usage() enables unified cost logging across each providers
    (tradingagents/llm_adapters/openai_compatible_base.py:155)
  - 'Mixed-mode: quick/deep LLMs can come from different providers allows cheap fast model for simple
    tasks and expensive deep model for synthesis (tradingagents/graph/trading_graph.py:242)'
  acceptance_hints:
  - Successfully creates LLM instances for at least 3 different providers
  - Token usage is tracked consistently across each providers
  - Quick and deep LLMs can be from different providers
data_flow:
- from_stage: data_collection
  to_stage: multi_analyst_pipeline
  data: market_data, stock_info, fundamentals, news (via LangGraph tool calls)
- from_stage: multi_analyst_pipeline
  to_stage: investment_debate
  data: market_report + sentiment_report + news_report + fundamentals_report concatenated
- from_stage: investment_debate
  to_stage: trading_decision
  data: investment_plan string + investment_debate_state
- from_stage: trading_decision
  to_stage: risk_debate
  data: trader_investment_plan string with position sizing and entry/exit
- from_stage: risk_debate
  to_stage: signal_processing
  data: final_trade_decision string + risk_debate_state
- from_stage: signal_processing
  to_stage: reflection_memory
  data: structured signal dict {action, target_price, confidence, risk_score, reasoning}
- from_stage: reflection_memory
  to_stage: investment_debate
  data: past_memory_str (retrieved via get_memories(n_matches=2))
