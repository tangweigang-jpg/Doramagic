  evidence: ''
business_decisions:
- id: BD-001
  type: BA
  content: 'Fallback chain: MongoDB → Tushare → AKShare → BaoStock'
  rationale: Prioritizes cached data from MongoDB for speed and cost efficiency, then degrades gracefully
    to increasingly accessible free sources (Tushare → AKShare → BaoStock) when paid APIs are unavailable
    or rate-limited. This cascade ensures continuous data availability even during service disruptions.
  evidence: tradingagents/dataflows/data_source_manager.py:249(get_fundamentals_data)
  stage: data_collection
  alternative_considered: Direct polling of single data source without fallback would cause analysis gaps
- id: BD-002
  type: BA
  content: Token stored in DB with env var fallback
  rationale: Runtime configuration via MongoDB allows updating API tokens through the Web UI without code
    deployment or service restarts. This enables quick recovery when API credentials expire or need rotation,
    reducing operational downtime and enabling stateless configuration management.
  evidence: tradingagents/dataflows/providers/china/tushare.py:40(_get_token_from_database)
  stage: data_collection
  alternative_considered: Hardcoded tokens would require deployment for every credential change
- id: BD-003
  type: B
  content: DataSourceManager as global singleton
  rationale: Centralized data source management through a singleton pattern eliminates redundant source
    priority calculations and ensures consistent caching behavior across each data consumers. This architectural
    constraint enforces single-source-of-truth for data acquisition logic throughout the system.
  evidence: tradingagents/dataflows/data_source_manager.py:2195(get_data_source_manager)
  stage: data_collection
  alternative_considered: Distributed source managers would risk priority conflicts and cache fragmentation
- id: BD-004
  type: B
  content: max_tool_calls=3 per analyst to prevent infinite loops
  rationale: The tool-call budget of 3 per analyst iteration prevents runaway LLM agent loops while preserving
    sufficient capacity for legitimate multi-step data gathering. This boundary ensures agents can fetch
    necessary context (stock data, fundamentals, news) without entering indefinite reasoning cycles.
  evidence: tradingagents/graph/conditional_logic.py:18(should_continue_market)
  stage: multi_analyst_pipeline
  alternative_considered: Unlimited calls risk infinite loops; zero calls prevent data gathering
- id: BD-005
  type: B
  content: Analysts run in sequence with MsgClear nodes between
  rationale: Sequential analyst execution ensures each agent builds on the accumulated context from previous
    analyses (bull research → bear research → trading decision), creating a coherent investment thesis
    rather than independent parallel opinions. MsgClear nodes prevent context pollution between analyst
    turns.
  evidence: tradingagents/graph/setup.py:186(add_conditional_edges)
  stage: multi_analyst_pipeline
  alternative_considered: Parallel execution would lose context dependency and synthesis value
  _evidence_issues:
  - 'FN_NOT_FOUND: add_conditional_edges in tradingagents/graph/setup.py'
- id: BD-006
  type: BA/DK
  content: StockUtils.get_market_info() for multi-market detection
  rationale: Unified market detection utility handles China/US/HK stock symbol variations, returning boolean
    flags (is_china/is_hk/is_us) to downstream logic. This centralization prevents inconsistent market
    classification and ensures correct data source routing and currency handling across the multi-market
    system.
  evidence: tradingagents/agents/analysts/market_analyst.py:17(_get_company_name)
  stage: multi_analyst_pipeline
  alternative_considered: Per-agent market detection would risk inconsistent classification
- id: BD-007
  type: B/BA
  content: max_debate_rounds=1 default (configurable)
  rationale: Single debate round provides sufficient adversarial analysis to surface key bull/bear arguments
    without excessive latency. Configurable default allows tuning the tradeoff between analysis thoroughness
    and response time based on market volatility or user urgency.
  evidence: tradingagents/default_config.py:17(module)
  stage: investment_debate
  alternative_considered: Multiple rounds increase thoroughness but multiply latency proportionally
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tradingagents/default_config.py'
- id: BD-008
  type: BA/DK
  content: ChromaDB for vector similarity search in memory
  rationale: Vector embedding storage enables semantic similarity search to retrieve analogous historical
    market situations, sector patterns, or trading outcomes. This RAG capability allows the system to
    learn from past decisions rather than treating each analysis as a blank slate.
  evidence: tradingagents/agents/utils/memory.py:69(get_or_create_collection)
  stage: investment_debate
  alternative_considered: Keyword search would miss semantically similar situations
- id: BD-009
  type: B
  content: prompt includes past_memory_str from reflection
  rationale: Retrieval-augmented generation with past reflection memories allows agents to learn from
    domain-specific historical mistakes. This feedback loop enables the bull researcher to incorporate
    prior analysis failures, improving future recommendation quality without requiring explicit rule updates.
  evidence: tradingagents/agents/researchers/bull_researcher.py:121(module)
  stage: investment_debate
  alternative_considered: Stateless analysis would repeat historical mistakes
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tradingagents/agents/researchers/bull_researcher.py'
- id: BD-010
  type: BA/M
  content: Trader uses quick_thinking_llm (faster, cheaper)
  rationale: Trading plan generation is structured and template-driven, not requiring deep reasoning capabilities.
    Using a faster, cheaper LLM for this task significantly reduces per-analysis cost while maintaining
    output quality, reserving expensive deep-thinking models for synthesis tasks.
  evidence: tradingagents/graph/setup.py:149(trader_node)
  stage: trading_decision
  alternative_considered: Deep reasoning model for trading would be overkill and expensive
  _evidence_issues:
  - 'FN_NOT_FOUND: trader_node in tradingagents/graph/setup.py'
- id: BD-011
  type: BA/DK
  content: Three-way debate pattern (Risky/Neutral/Safe)
  rationale: Risk posture spectrum (Risky/Neutral/Safe) captures full investment context beyond binary
    risk-on/risk-off decisions. This nuanced framing enables appropriate position sizing and hedging strategies
    that match investor risk tolerance, not just market direction.
  evidence: tradingagents/agents/utils/agent_states.py:29(RiskDebateState)
  stage: risk_debate
  alternative_considered: Binary risk classification would lose granularity needed for position sizing
  vague_rationale: true
- id: BD-012
  type: B/BA
  content: max_risk_discuss_rounds=1 default
  rationale: Risk debate supplements rather than drives the investment decision, so single-round discussion
    balances coverage with latency. Risk considerations are already partially addressed in the main investment
    debate; additional rounds would yield diminishing returns relative to their cost.
  evidence: tradingagents/default_config.py:18(module)
  stage: risk_debate
  alternative_considered: Extended risk debates would slow response without proportional insight gain
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tradingagents/default_config.py'
  vague_rationale: true
- id: BD-013
  type: BA/M
  content: LLM extraction with regex fallback for price parsing
  rationale: Hybrid extraction handles both structured LLM JSON output and unstructured text descriptions
    containing price information. Regex fallback ensures price extraction succeeds even when the LLM generates
    narrative responses, preventing analysis failures from output format variance.
  evidence: tradingagents/graph/signal_processing.py:146(price_patterns)
  stage: signal_processing
  alternative_considered: LLM-only extraction would fail on non-JSON outputs
  _evidence_issues:
  - 'FN_NOT_FOUND: price_patterns in tradingagents/graph/signal_processing.py'
- id: BD-014
  type: B/BA
  content: Default to '持有' with confidence=0.5 on invalid input
  rationale: Fail-safe default of 'hold' with neutral confidence prevents erroneous trading actions when
    signal parsing fails. This defensive boundary ensures malformed signals default to inaction rather
    than unintended position changes, protecting against downstream processing errors.
  evidence: tradingagents/graph/signal_processing.py:328(_get_default_decision)
  stage: signal_processing
  alternative_considered: No default would risk propagating errors to trading execution
- id: BD-015
  type: B/DK
  content: Currency-aware price extraction using market_info
  rationale: Market-aware price extraction applies correct currency context (CNY/USD/HKD) based on the
    stock's exchange, preventing cross-currency comparison errors and ensuring consistent position sizing
    across the multi-market portfolio analysis.
  evidence: tradingagents/graph/signal_processing.py:55(get_market_info)
  stage: signal_processing
  alternative_considered: Assuming single currency would cause wrong position sizing for cross-market
    stocks
  _evidence_issues:
  - 'FN_NOT_FOUND: get_market_info in tradingagents/graph/signal_processing.py'
- id: BD-016
  type: B
  content: Reflection on every agent (bull/bear/trader/judge/risk)
  rationale: Per-agent reflection loops enable domain-specific learning, where each agent extracts lessons
    from its own mistakes (research errors, trading oversights, risk miscalculations). This distributed
    learning approach preserves specialized knowledge rather than generalizing across domains.
  evidence: tradingagents/graph/reflection.py:77(reflect_bull_researcher)
  stage: reflection_memory
  alternative_considered: Global reflection would lose domain-specific learning granularity
- id: BD-017
  type: BA
  content: get_memories called with n_matches=2 in researchers
  rationale: Retrieving exactly 2 most similar past situations provides relevant context without overwhelming
    the prompt with historical noise. This boundary balances memory benefits against LLM context limits,
    ensuring each analysis incorporates relevant precedent without dilution.
  evidence: tradingagents/agents/researchers/bull_researcher.py:91(module)
  stage: reflection_memory
  alternative_considered: More matches would risk diluting relevance; fewer would miss valuable analogies
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tradingagents/agents/researchers/bull_researcher.py'
- id: BD-018
  type: T
  content: AsyncIO with BackgroundTasks for non-blocking analysis
  rationale: Asynchronous request handling ensures HTTP connections return immediately while analysis
    runs in the background, preventing WebSocket timeout and enabling real-time progress updates. This
    infrastructure choice supports the UX requirement for live analysis feedback.
  evidence: app/routers/analysis.py:41(submit_single_analysis)
  stage: web_api_service
  alternative_considered: Synchronous blocking would cause WebSocket timeouts on long analyses
- id: BD-019
  type: BA
  content: Redis progress tracker with WebSocket push
  rationale: Real-time progress updates via WebSocket eliminate client polling overhead and provide instant
    feedback during long-running analyses. Redis pub/sub ensures reliable message delivery to each connected
    WebSocket clients tracking the same analysis.
  evidence: app/services/redis_progress_tracker.py:10(module)
  stage: web_api_service
  alternative_considered: HTTP polling would waste bandwidth and add latency
  _evidence_issues:
  - 'FN_NOT_FOUND: module in app/services/redis_progress_tracker.py'
- id: BD-020
  type: BA/M
  content: Config lookup from MongoDB system_configs
  rationale: Dynamic configuration storage in MongoDB enables runtime LLM provider and model changes through
    the Web UI without code deployment. This supports A/B testing different models, cost optimization,
    and provider failover without service interruption.
  evidence: app/services/simple_analysis_service.py:121(module)
  stage: web_api_service
  alternative_considered: Static config files would require deployment for every model change
  _evidence_issues:
  - 'FN_NOT_FOUND: module in app/services/simple_analysis_service.py'
- id: BD-021
  type: B
  content: 'API key priority: model_config > provider_config > env_var'
  rationale: Hierarchical API key resolution (model → provider → environment) enables fine-grained multi-provider
    usage where different models can use different API keys. This supports cost optimization by mixing
    providers (e.g., cheap gpt-3.5 for research, claude-3 for synthesis) within a single analysis.
  evidence: app/services/simple_analysis_service.py:136(module)
  stage: web_api_service
  alternative_considered: Single key per provider would prevent optimal cost routing
  _evidence_issues:
  - 'FN_NOT_FOUND: module in app/services/simple_analysis_service.py'
- id: BD-022
  type: T
  content: Factory function create_llm_by_provider() with provider routing
  rationale: Centralized LLM factory function provides a single entry point for each LLM instantiation
    across the system, making provider addition straightforward and ensuring consistent initialization
    patterns. This architectural constraint prevents scattered LLM creation logic.
  evidence: tradingagents/graph/trading_graph.py:41(module)
  stage: llm_provider_abstraction
  alternative_considered: Distributed LLM creation would complicate provider management
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tradingagents/graph/trading_graph.py'
- id: BD-023
  type: T
  content: OpenAICompatibleBase inherits ChatOpenAI
  rationale: Inheriting from LangChain's ChatOpenAI ensures drop-in compatibility with existing LangChain
    tools, chains, and evaluation frameworks. This avoids re-implementing integration layers and enables
    use of the full LangChain ecosystem for any OpenAI-compatible API provider.
  evidence: tradingagents/llm_adapters/openai_compatible_base.py:32(module)
  stage: llm_provider_abstraction
  alternative_considered: Custom adapter would require reimplementing each LangChain integrations
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tradingagents/llm_adapters/openai_compatible_base.py'
- id: BD-024
  type: BA/M
  content: Token tracking in _generate() with _track_token_usage()
  rationale: Unified token usage logging across each LLM providers enables accurate cost tracking per
    analysis, per user, and per model. This visibility is essential for cost allocation, budget enforcement,
    and identifying opportunities for model downgrading without quality loss.
  evidence: tradingagents/llm_adapters/openai_compatible_base.py:155(module)
  stage: llm_provider_abstraction
  alternative_considered: No tracking would prevent cost optimization and budget enforcement
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tradingagents/llm_adapters/openai_compatible_base.py'
- id: BD-025
  type: BA/DK
  content: 'Mixed-mode: quick/deep LLMs can come from different providers'
  rationale: Cross-provider LLM routing enables cost optimization by using cheap fast models (e.g., local
    llama) for simple tasks like data extraction while reserving expensive deep models (e.g., claude-3)
    for complex synthesis and judgment tasks. This mixed-mode approach can reduce costs by 50-70%.
  evidence: tradingagents/graph/trading_graph.py:242(module)
  stage: llm_provider_abstraction
  alternative_considered: Single model for each tasks would either be expensive or insufficient
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tradingagents/graph/trading_graph.py'
- id: BD-026
  type: B/BA
  content: Default LLM provider is OpenAI with o4-mini (deep) and gpt-4o-mini (quick) models
  rationale: OpenAI selected as default provider due to superior performance on financial analysis tasks.
    Dual-model strategy (o4-mini deep for complex reasoning, gpt-4o-mini quick for fast responses) balances
    accuracy and latency. These models have proven reliability on financial domain tasks and consistent
    API availability.
  evidence: tradingagents/default_config.py:12-14(module)
  stage: Configuration
  alternative_considered: Anthropic Claude models were considered but rejected due to higher cost and
    less proven financial domain performance at time of selection
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tradingagents/default_config.py'
- id: BD-027
  type: B/BA
  content: Max debate rounds defaults to 1, max risk discuss rounds defaults to 1
  rationale: Single-round debate limits execution time while still enabling contrarian viewpoints. Multi-round
    deliberation significantly increases latency (each round adds LLM call overhead). Initial conservative
    defaults allow rapid prototyping; teams can increase rounds for high-stakes decisions where thorough
    debate justifies higher latency.
  evidence: tradingagents/default_config.py:17-18(module)
  stage: risk_debate
  alternative_considered: Multi-round (3-5) debate was rejected for default as it would increase analysis
    time by 3-5x with diminishing returns for routine analysis
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tradingagents/default_config.py'
- id: BD-028
  type: B/BA
  content: Online tools disabled by default (ONLINE_TOOLS_ENABLED defaults to false)
  rationale: Disabling online tools by default reduces external API dependencies and prevents rate limiting
    issues in production. This ensures deterministic behavior and faster execution for cached/local data
    scenarios. Teams must explicitly enable for real-time data fetching that may incur costs and latency.
  evidence: tradingagents/default_config.py:21(module)
  stage: data_collection
  alternative_considered: Enabling by default was rejected due to potential uncontrolled API costs and
    reliability issues with external data sources
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tradingagents/default_config.py'
- id: BD-029
  type: B/BA
  content: Online news enabled by default (ONLINE_NEWS_ENABLED defaults to true)
  rationale: News is critical for market sentiment analysis and time-sensitive trading decisions. News
    APIs typically have generous free tiers and reasonable rate limits compared to financial data APIs.
    Disabling news would significantly reduce analysis quality for momentum-driven strategies.
  evidence: tradingagents/default_config.py:22(module)
  stage: data_collection
  alternative_considered: Making news opt-in was considered but rejected because sentiment analysis without
    current news is significantly less actionable
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tradingagents/default_config.py'
- id: BD-030
  type: B/RC
  content: Quick analysis uses temperature 0.7, max_tokens 4000, timeout 180 seconds
  rationale: Temperature 0.7 provides balanced creativity without sacrificing coherence for quick analysis
    tasks. Max tokens 4000 allows detailed responses within reasonable cost bounds. 180-second timeout
    balances user experience against potential LLM latency spikes during high-demand periods.
  evidence: tradingagents/graph/trading_graph.py:41(create_llm_by_provider)
  stage: Model Configuration
  alternative_considered: Higher temperature (0.9) was rejected for quick mode as it increases unpredictability
    without commensurate benefit for rapid analysis
- id: BD-031
  type: B/BA
  content: 'Analysis focus types: comprehensive, technical, fundamental, risk, comparison'
  rationale: 'Five distinct analysis types cover the primary dimensions investors evaluate: technical
    indicators, fundamental financials, risk assessment, comparative analysis, and comprehensive multi-factor
    evaluation. This taxonomy aligns with institutional investment research frameworks and enables modular
    agent design.'
  evidence: examples/custom_analysis_demo.py:64-117(module)
  stage: Analysis Configuration
  alternative_considered: Simpler binary (bullish/bearish) classification was rejected as it loses nuance
    required for actionable investment decisions
  _evidence_issues:
  - 'FN_NOT_FOUND: module in examples/custom_analysis_demo.py'
- id: BD-032
  type: B
  content: Temperature 0.1 for stock analysis (low randomness for consistent results)
  rationale: Temperature 0.1 produces highly deterministic outputs essential for financial analysis consistency.
    Low temperature ensures the same input produces comparable recommendations, critical for backtesting
    and comparing analyst performance over time. High consistency reduces noise that could lead to erratic
    trading signals.
  evidence: examples/my_stock_analysis.py:47(module)
  stage: Model Configuration
  alternative_considered: Temperature 0 (greedy) was considered but rejected as it can produce repetitive
    patterns; 0.1 provides margin while maintaining consistency
  _evidence_issues:
  - 'FN_NOT_FOUND: module in examples/my_stock_analysis.py'
- id: BD-033
  type: B
  content: Max tokens 4000 for analysis reports (allows detailed analysis output)
  rationale: 4000 tokens provides sufficient space for comprehensive analysis covering multiple data points,
    reasoning steps, and nuanced recommendations. This limit balances verbosity against API costs (pricing
    is often per-token). Shorter limits would truncate analysis; longer limits increase costs without
    proportional quality improvement.
  evidence: examples/my_stock_analysis.py:48(module)
  stage: Model Configuration
  alternative_considered: 8000 tokens was rejected due to 2x cost increase; 2000 tokens was rejected as
    insufficient for comprehensive multi-factor analysis
  _evidence_issues:
  - 'FN_NOT_FOUND: module in examples/my_stock_analysis.py'
- id: BD-034
  type: B/BA
  content: 'Analysis requires 4 analyst types: market, social, news, fundamentals'
  rationale: 'Four-analyst architecture ensures comprehensive coverage of investment-relevant information
    dimensions: market data/technicals, social sentiment/trends, news events, and fundamental financials.
    Missing any dimension would create blind spots in analysis. This structure mirrors institutional research
    teams with specialized analysts.'
  evidence: tradingagents/default_config.py:198(module)
  stage: Agent Selection
  alternative_considered: Three-analyst model (combining social+news) was rejected as social sentiment
    and news require different data sources and processing approaches
  _evidence_issues:
  - 'LINE_OOB: tradingagents/default_config.py:198 > 27'
- id: BD-035
