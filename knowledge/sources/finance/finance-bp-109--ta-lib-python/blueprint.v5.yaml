# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-109
name: TA-Lib
sop_version: '3.6'
source:
  projects:
  - ta-lib-python
  commit_hash: 2384b722d61788b81c38f6110bae31602c16ced0
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Technical analysis of financial market data including indicators (ADX, MACD, RSI, Bollinger
    Bands) and candlestick pattern recognition
  description: Python wrapper for TA-Lib C library using Cython instead of SWIG, providing 150+ technical
    analysis functions with 2-4x performance improvement
  prerequisites: TA-Lib C library must be installed on system; numpy required for array operations; optional
    pandas/polars for DataFrame support
  not_suitable_for: Pure Python environments without C compilation capability; embedded systems without
    numpy; projects requiring only pandas-native rolling calculations (NaN behavior differs)
stages:
- id: c_wrapper
  name: C Library Binding Layer
  order: 1
  responsibility: 'Provides low-level Cython bindings to the underlying TA-Lib C library with function
    signatures auto-generated from ta_func.h header files. WHY: Avoids SWIG overhead for 2-4x performance
    improvement over original Python bindings.'
  interface:
    inputs:
    - numpy arrays (float64, contiguous)
    - C function handles from TA-Lib
    outputs:
    - numpy arrays (float64 or int32)
    - TA_RetCode error codes
  required_methods:
  - name: TA_RetCode enum access
    description: Enum for error code handling (0=SUCCESS) used to check function call success
    evidence: talib/_ta_lib.pxd:5(TA_RetCode)
  key_behaviors:
  - behavior: Array type validation at boundary
    description: Validates NPY_DOUBLE type and C-contiguity before passing to C; fails fast on invalid
      input
    evidence: talib/_func.pxi:20-27(check_array)
  - behavior: Integer default sentinel -2**31
    description: Maps to TA_INTEGER_DEFAULT; avoids optional parameter handling complexity in Cython
    evidence: talib/_func.pxi:144
  - behavior: Lookback period filled with NaN
    description: Output arrays pre-initialized with NaN values for lookback period before calculation
    evidence: talib/_func.pxi:127-128
  replaceable_points:
  - name: Array validation
    description: check_array function validates numpy dtype and contiguity before C call
    options:
    - name: default C-contiguous double
      traits:
      - Strict type enforcement
      - Fast rejection of invalid inputs
      fit_for:
      - Production use with known-good data
      - Performance-critical paths
      not_fit_for:
      - Flexible dtype conversion scenarios
    - name: accept other dtypes with conversion
      traits:
      - Automatic type coercion
      - More flexible input handling
      fit_for:
      - Mixed dtype workflows
      - Quick prototyping
      not_fit_for:
      - Performance-critical applications
      - Memory-constrained environments
    default: default C-contiguous double
  design_decisions:
  - Cython over SWIG for 2-4x performance improvement (docs/index.md:15-17)
  - Array validation at boundary fails fast on invalid input (talib/_func.pxi:20-27)
  - Integer default sentinel -2**31 maps to TA_INTEGER_DEFAULT (talib/_func.pxi:144)
  - Auto-generated from ta_func.h header via tools/generate_func.py (talib/_func.pxi:1)
  acceptance_hints:
  - Import of talib package succeeds without errors
  - Function calls return valid numpy arrays with correct dtype
  - Invalid array types raise appropriate exceptions before C call
- id: func_api
  name: Function API (Batch)
  order: 2
  responsibility: 'Provides stateless, direct function calls for batch processing entire indicator over
    input arrays. WHY: Simple API for一次性 computation without state management, suitable for backtesting
    and batch analysis.'
  interface:
    inputs:
    - numpy arrays for price series (open/high/low/close/volume)
    - optional integer parameters (timeperiod, nbdev)
    outputs:
    - numpy arrays with lookback period filled with NaN
  required_methods:
  - name: SMA.compute
    description: Simple Moving Average - calculates average over specified timeperiod
    evidence: talib/_func.pxi:142
  - name: BBANDS.compute
    description: Bollinger Bands - returns upper, middle, lower bands with multi-output
    evidence: talib/_func.pxi:1
  - name: ADX.compute
    description: Average Directional Movement Index with unstable period handling
    evidence: docs/func_groups/momentum_indicators.md
  key_behaviors:
  - behavior: Return NaN for lookback period
    description: Maintains output array same length as input; user can slice valid results
    evidence: talib/_func.pxi:121-129(make_double_array)
  - behavior: Index as last element
    description: TA-Lib expects endIdx=length-1; simplifies calling convention for users
    evidence: talib/_func.pxi:46
  - behavior: No input defaults
    description: Each function requires explicit price arrays; no implicit 'close' assumption
    evidence: talib/_func.pxi:144
  - behavior: Every price arrays must be same length
    description: Enforced before any calculation via check_length* functions
    evidence: talib/_func.pxi:29-35(check_length2)
  replaceable_points:
  - name: Lookback padding
    description: How to fill lookback period where insufficient data exists
    options:
    - name: NaN
      traits:
      - Preserves array length
      - Clear indication of insufficient data
      fit_for:
      - Pandas workflows
      - Statistical operations that skip NaN
      not_fit_for:
      - C code expecting valid values
      - Legacy systems
    - name: zero
      traits:
      - Known value
      - No null handling needed
      fit_for:
      - Simple arithmetic downstream
      - Fixed-width output formats
      not_fit_for:
      - Statistics requiring valid price data
      - Indicator chains
    - name: forward fill
      traits:
      - Continuous values
      - No gaps
      fit_for:
      - Visualization
      - Smooth indicator lines
      not_fit_for:
      - Mean/avg calculations
      - Single NaN contaminates each subsequent
    default: NaN
  design_decisions:
  - Return NaN for lookback period maintains output array same length as input (talib/_func.pxi:121-129)
  - Index as last element simplifies calling convention (talib/_func.pxi:46)
  - No input defaults requires explicit price arrays (talib/_func.pxi:144)
  - Array length equality enforced before calculation (talib/_func.pxi:29-35)
  acceptance_hints:
  - SMA(close, timeperiod=14) returns array of same length as input
  - BBANDS returns tuple of 3 arrays (upper, middle, lower)
  - Functions with unstable periods (ADX, CMO) require set_unstable_period before call
- id: stream_api
  name: Stream API (Incremental)
  order: 3
  responsibility: 'Provides streaming functions that return single scalar values for real-time/online
    computation. WHY: For live trading systems where data arrives incrementally and only latest indicator
    value matters.'
  interface:
    inputs:
    - numpy arrays (historical data for warmup)
    - parameters
    outputs:
    - single double value (current indicator)
  required_methods:
  - name: stream_MOM.execute
    description: Momentum streaming function - returns only last computed value
    evidence: talib/_stream.pxi:1
  - name: stream_CDL3BLACKCROWS.execute
    description: Pattern recognition streaming - returns single pattern indicator value
    evidence: talib/_stream.pxi:1
  - name: stream_SMA.execute
    description: Simple Moving Average streaming with prefix stream_ for disambiguation
    evidence: talib/_stream.pxi:11-24
  key_behaviors:
  - behavior: Single scalar output
    description: Returns only last computed value; efficient for online processing
    evidence: talib/_stream.pxi:42-48
  - behavior: Same function signatures as batch
    description: Easy to switch between batch and stream; same parameter names
    evidence: talib/_stream.pxi:11-24
  - behavior: Per-call stateless processing
    description: No state persistence between calls; each invocation independent
    evidence: talib/_stream.pxi:42-48
  replaceable_points:
  - name: Streaming state
    description: State persistence between calls for incremental computation
    options:
    - name: per-call (stateless)
      traits:
      - Simple implementation
      - Thread-safe
      - No memory growth
      fit_for:
      - Independent calculations
      - Batch processing
      - Parallel execution
      not_fit_for:
      - True incremental/live data
      - Memory-constrained incremental updates
    - name: stateful object
      traits:
      - Maintains internal state
      - Efficient incremental updates
      - Memory per instance
      fit_for:
      - Live trading with incremental bars
      - Real-time dashboards
      not_fit_for:
      - Parallel processing
      - Batch mode
    default: per-call
  design_decisions:
  - Single scalar output returns only last computed value (talib/_stream.pxi:42-48)
  - Same function signatures as batch for easy switching (talib/_stream.pxi:11-24)
  - stream_ prefix for disambiguation from batch functions
  acceptance_hints:
  - stream_SMA(data, timeperiod=14) returns single float value
  - Output is equivalent to last element of batch SMA result
  - Same parameters as batch function for consistency
- id: abstract_api
  name: Abstract API (Stateful)
  order: 4
  responsibility: 'Object-oriented wrapper providing stateful Function instances with unified interface
    for setting inputs, parameters, and retrieving results. WHY: Simplifies complex functions like STOCH
    with multiple inputs/outputs and enables reusable function instances with caching.'
  interface:
    inputs:
    - dict of arrays, pandas.DataFrame, or polars.DataFrame
    outputs:
    - numpy arrays, pandas.Series/DataFrame, or polars.Series/DataFrame matching input type
  required_methods:
  - name: Function.__call__
    description: Execute indicator calculation with current input/param state
    evidence: talib/_abstract.pxi:88
  - name: Function.set_input_arrays
    description: Set input data (dict/DataFrame) for function execution
    evidence: talib/_abstract.pxi:227-272
  - name: SMA.invoke
    description: Import and instantiate SMA function by name
    evidence: docs/abstract.md
  - name: BBANDS.invoke
    description: Multi-output function returning tuple of bands
    evidence: docs/abstract.md
  - name: STOCH.invoke
    description: Complex function with multiple inputs and outputs
    evidence: docs/abstract.md
  key_behaviors:
  - behavior: Thread-local storage per instance
    description: threading.local() enables safe concurrent use of same Function instance across threads
    evidence: talib/_abstract.pxi:124
  - behavior: Output caching via outputs_valid flag
    description: Skips recomputation if inputs/params unchanged; significant speedup for repeated calls
    evidence: talib/_abstract.pxi:141,375-376
  - behavior: Price series defaults via __INPUT_PRICE_SERIES_DEFAULTS
    description: Maps 'price'->'close', 'price0'->'high', 'price1'->'low' for convenience
    evidence: talib/_abstract.pxi:21-25
  - behavior: Parameter state restoration after __call__
    description: Ensures no permanent state change per invocation; stateless per-call behavior
    evidence: talib/_abstract.pxi:464-472
  - behavior: Polars and Pandas cannot be mixed
    description: Mutual exclusion enforced at runtime
    evidence: talib/__init__.py:56-57
  replaceable_points:
  - name: Input data type
    description: What data types Function accepts for processing
    options:
    - name: numpy arrays
      traits:
      - Default
      - Fastest
      - No overhead
      fit_for:
      - Performance-critical code
      - Pure numpy workflows
      not_fit_for:
      - Pandas-dependent pipelines
    - name: pandas.DataFrame
      traits:
      - Wide adoption
      - Rich ecosystem
      fit_for:
      - Data science workflows
      - Pandas-heavy codebases
      not_fit_for:
      - Polars users
      - Performance-critical paths
    - name: polars.DataFrame
      traits:
      - Modern
      - Multithreaded
      - Memory-efficient
      fit_for:
      - Large datasets
      - Polars-native pipelines
      not_fit_for:
      - Pandas users
      - Legacy code
    - name: custom subclass
      traits:
      - Extensible
      - User-defined conversion
      fit_for:
      - Custom data sources
      - Special formats
      not_fit_for:
      - Standard use cases
      - Production stability
    default: numpy arrays
  - name: Input price series
    description: Which price field to use per input parameter
    options:
    - name: close (default)
      traits:
      - Convention
      - Most common
      - Simple API
      fit_for:
      - Standard indicators
      - Quick prototyping
      not_fit_for:
      - Volume-weighted indicators
      - Open price analysis
    - name: open/high/low/volume
      traits:
      - Explicit
      - Flexible
      fit_for:
      - OHLC-specific calculations
      - Volume analysis
      not_fit_for:
      - Simple single-price indicators
    - name: custom
      traits:
      - User-defined mapping
      fit_for:
      - Alternative data sources
      - Derived prices
      not_fit_for:
      - Standard workflows
    default: close
  design_decisions:
  - Thread-local storage per instance enables safe concurrent use (talib/_abstract.pxi:124)
  - Output caching skips recomputation when inputs/params unchanged (talib/_abstract.pxi:141,375-376)
  - Price series defaults maps 'price'->'close' for convenience (talib/_abstract.pxi:21-25)
  - Subclassable set_input_arrays allows custom data types (talib/_abstract.pxi:227-272)
  - Parameter validation with type checking raises TypeError for invalid types (talib/_abstract.pxi:520-533)
  - Function name normalization to uppercase ('sma' and 'SMA' both work) (talib/_abstract.pxi:119)
  acceptance_hints:
  - SMA(inputs, timeperiod=25) calculates on close prices by default
  - SMA(inputs, timeperiod=25, price='open') uses open prices
  - 'Thread-safe: same Function instance used from multiple threads'
  - Output type matches input type (DataFrame→DataFrame)
- id: series_wrapper
  name: Series Support Layer
  order: 5
  responsibility: 'Wraps each public functions to accept pandas/polars Series and return matching types.
    WHY: Users prefer working with labeled Series/DataFrames for financial data; automatic conversion
    improves usability without sacrificing performance.'
  interface:
    inputs:
    - pandas.Series, polars.Series, or numpy arrays
    outputs:
    - pandas.Series, polars.Series, or numpy arrays matching input type
  required_methods:
  - name: _wrapper.decorate
    description: Decorator that converts Series to arrays before calling underlying function and converts
      result back to matching Series type
    evidence: talib/__init__.py:40
  key_behaviors:
  - behavior: Lazy pandas/polars detection
    description: Optional dependencies; module loads even if neither available
    evidence: talib/__init__.py:8-36
  - behavior: Cannot mix polars and pandas
    description: Raises exception if both types in single call; prevents ambiguity
    evidence: talib/__init__.py:56-57
  - behavior: Preserve pandas index
    description: Extracts index from first Series argument; applies to output
    evidence: talib/__init__.py:67-69
  - behavior: Identity wrapper when no pandas/polars
    description: No-op wrapper avoids isinstance checks in hot path
    evidence: talib/__init__.py:105-106
  replaceable_points:
  - name: Series type detection
    description: How to detect input type for appropriate conversion
    options:
    - name: instance checks
      traits:
      - Explicit type checking
      - Clear behavior
      fit_for:
      - Current implementation
      - Debugging
      not_fit_for:
      - Duck-typed objects
      - Protocol-based design
    - name: protocol-based duck typing
      traits:
      - Flexible
      - Extensible
      fit_for:
      - Custom Series-like objects
      - Future-proofing
      not_fit_for:
      - Type safety requirements
      - Explicit dependency tracking
    default: instance checks
  design_decisions:
  - Lazy pandas/polars detection allows module load without optional deps (talib/__init__.py:8-36)
  - Cannot mix polars and pandas prevents ambiguity (talib/__init__.py:56-57)
  - Preserve pandas index from input to output (talib/__init__.py:67-69)
  - Identity wrapper when no pandas/polars avoids isinstance checks (talib/__init__.py:105-106)
  acceptance_hints:
  - SMA(pandas_series) returns pandas.Series with same index
  - SMA(polars_series) returns polars.Series
  - SMA(numpy_array) returns numpy array
  - Mixing pandas and polars raises exception
- id: code_generation
  name: Code Generation
  order: 6
  responsibility: 'Generates Cython code for _func.pxi and _stream.pxi from ta_func.h header file. WHY:
    150+ functions; manual maintenance would be error-prone and tedious; ensures consistency with upstream
    TA-Lib changes.'
  interface:
    inputs:
    - ta-lib/ta_func.h header file
    outputs:
    - talib/_func.pxi, talib/_stream.pxi source files, talib/_ta_lib.pyi type stubs
  required_methods:
  - name: generate_func.execute
    description: Generates batch function wrappers from C header
    evidence: tools/generate_func.py:1
  - name: generate_stream.execute
    description: Generates stream function wrappers for scalar output
    evidence: tools/generate_stream.py:1
  - name: generate_abstract_stub.execute
    description: Generates type stub file using runtime introspection
    evidence: tools/generate_abstract_stub.py:1-86
  key_behaviors:
  - behavior: Parse C header at build time
    description: Extracts function signatures from TA-Lib source; no duplicate definitions
    evidence: tools/generate_func.py:40-55
  - behavior: Name cleanup rules
    description: inHigh->high, optInTimePeriod->timeperiod for pythonic naming
    evidence: tools/generate_func.py:209-215
  - behavior: Skip non-indicators
    description: Excludes TA_Set*, TA_Restore* functions; only public indicators
    evidence: tools/generate_func.py:57-62
  replaceable_points:
  - name: Name transformation rules
    description: How to map C names to Python names in generated code
    options:
    - name: cleanup() rules
      traits:
      - Current implementation
      - Standardized
      fit_for:
      - Consistent naming
      - Upstream compatibility
      not_fit_for:
      - Custom naming schemes
    - name: configurable mapping table
      traits:
      - Flexible
      - User-defined
      fit_for:
      - Alternative naming conventions
      - Custom prefixes
      not_fit_for:
      - Standard use
      - Upstream sync
    default: cleanup() rules
  design_decisions:
  - Parse C header at build time extracts signatures without duplication (tools/generate_func.py:40-55)
  - Name cleanup rules for pythonic naming (tools/generate_func.py:209-215)
  - Skip non-indicators keeps only public indicator functions (tools/generate_func.py:57-62)
  - Generated code from C headers ensures consistency with upstream
  acceptance_hints:
  - Regenerating after TA-Lib update produces consistent bindings
  - Every 150+ functions present in generated output
  - Type stubs generated correctly from runtime introspection
data_flow:
- from_stage: user_code
  to_stage: series_wrapper
  data: pandas/polars Series, DataFrame, or numpy arrays from financial data
- from_stage: series_wrapper
  to_stage: func_api
  data: numpy arrays (float64, C-contiguous) extracted from Series
- from_stage: series_wrapper
  to_stage: abstract_api
  data: dict/pandas.DataFrame/polars.DataFrame containing price series
- from_stage: abstract_api
  to_stage: func_api
  data: extracts numpy arrays from input dict/DataFrame, calls underlying func_object
- from_stage: func_api
  to_stage: c_wrapper
  data: numpy arrays + parameters passed to TA-Lib C functions
- from_stage: c_wrapper
  to_stage: func_api
  data: numpy arrays with NaN lookback padding, TA_RetCode error codes
- from_stage: func_api
  to_stage: series_wrapper
  data: numpy arrays with NaN for lookback period
- from_stage: abstract_api
  to_stage: series_wrapper
  data: Result arrays matching input type (numpy/pandas/polars)
- from_stage: series_wrapper
  to_stage: user_code
  data: pandas/polars Series matching input type, or numpy array
global_contracts:
- contract: Every price arrays must be same length - enforced via check_length* functions (talib/_func.pxi:29-35)
  evidence: ''
- contract: Array type must be float64 (NPY_DOUBLE) - validated at boundary (talib/_func.pxi:21-22)
  evidence: ''
- contract: Arrays must be C-contiguous - validated at boundary (talib/_func.pxi:25-26)
  evidence: ''
- contract: NaN values in input are skipped by finding first valid index (talib/_func.pxi:59-68)
  evidence: ''
- contract: Output length equals input length - NaN used for lookback period (talib/_func.pxi:121-129)
  evidence: ''
- contract: TA-Lib initialized before any function call via _ta_initialize at import (talib/__init__.py:144-145)
  evidence: ''
- contract: Lookback period filled with NaN to indicate insufficient data (talib/_func.pxi:127-128)
  evidence: ''
- contract: Integer default -2**31 maps to TA_INTEGER_DEFAULT in Cython (talib/_func.pxi:276)
  evidence: ''
- contract: Thread-local storage in Function class enables safe concurrent use (talib/_abstract.pxi:124)
  evidence: ''
- contract: 'Output type preserved: DataFrame→DataFrame, Series→Series, ndarray→ndarray (talib/_abstract.pxi:380-396)'
  evidence: ''
- contract: Polars and Pandas cannot be mixed in single function call (talib/__init__.py:56-57)
  evidence: ''
- contract: Parameter state restored after each __call__ ensuring stateless per-invocation behavior (talib/_abstract.pxi:464-472)
  evidence: ''
business_decisions:
- id: BD-001
  type: B
  content: Cython chosen over SWIG for Python bindings
  rationale: SWIG bindings present significant installation friction and deliver 2-4x worse performance
    compared to Cython; Cython provides tighter integration with NumPy arrays and simpler distribution
    via standard pip wheels
  evidence: docs/index.md:15-17
  stage: c_wrapper
  alternative_considered: SWIG - rejected due to installation complexity and inferior performance
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-002
  type: B
  content: Array type validation at API boundary
  rationale: Validates NPY_DOUBLE dtype and C-contiguous memory layout before calling into C library;
    fails fast on invalid input preventing crashes or undefined behavior in native code
  evidence: talib/_func.pxi:20-27(check_array)
  stage: c_wrapper
- id: BD-003
  type: B/BA
  content: Integer default sentinel maps to TA_INTEGER_DEFAULT (-2^31)
  rationale: Maps Python None/optional integers to C TA_INTEGER_DEFAULT constant; eliminates complex optional
    parameter handling in Cython while maintaining C library semantics
  evidence: talib/_func.pxi:144
  stage: c_wrapper
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-004
  type: BA
  content: Auto-generated Python bindings from ta_func.h header
  rationale: tools/generate_func.py parses C header at build time to emit 150+ function wrappers; guarantees
    consistency between Python API and underlying TA-Lib C implementation and eliminates manual maintenance
  evidence: talib/_func.pxi:144(ACCBANDS); tools/generate_func.py:40-55
  stage: c_wrapper
  alternative_considered: Manual function definitions - rejected due to maintenance burden and drift risk
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
  - 'NOT_FOUND: talib/_func.pxi:144(ACCBANDS); tools/generate_func.py'
- id: BD-005
  type: B
  content: NaN padding for lookback period in batch functions
  rationale: Outputs same-length array as input with NaN for lookback period; enables callers to slice
    valid results at known offset without tracking state or padding manually
  evidence: talib/_func.pxi:121-129(make_double_array)
  stage: func_api
  alternative_considered: Variable-length output - rejected due to user inconvenience
- id: BD-006
  type: B/BA
  content: 'Index convention: endIdx as length-1 (zero-based last element)'
  rationale: TA-Lib C library expects endIdx parameter to represent the last valid index (length-1) in
    inclusive range; simplifies calling convention by avoiding off-by-one complexity for Python callers
  evidence: talib/_func.pxi:46
  stage: func_api
  alternative_considered: Exclusive end index - rejected due to mismatch with TA-Lib
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-007
  type: B/BA
  content: No implicit input defaults - each price arrays required
  rationale: Each function requires explicit price arrays (open/high/low/close/volume); no implicit 'close-only'
    assumption prevents ambiguity and forces explicit intent in caller code
  evidence: N/A:0(see_rationale)
  stage: func_api
  alternative_considered: Implicit close-only defaults - rejected for clarity
- id: BD-008
  type: B
  content: Single scalar output for stream/incremental processing
  rationale: Returns only the most recently computed value for online/streaming use cases; minimizes memory
    footprint and latency for real-time indicator updates
  evidence: talib/_stream.pxi:42-48
  stage: stream_api
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-009
  type: BA
  content: Unified function signatures between batch and stream APIs
  rationale: Stream API mirrors batch API parameter names and structure; enables seamless migration between
    batch and real-time modes without rewiring caller code
  evidence: talib/_stream.pxi:11-24
  stage: stream_api
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-010
  type: B
  content: Thread-local storage per Function instance
  rationale: threading.local() isolates stateful computation buffers per thread; enables safe concurrent
    use of shared Function instances without data races or locking overhead
  evidence: talib/_abstract.pxi:124
  stage: abstract_api
  alternative_considered: Explicit thread locking - rejected due to performance cost
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-011
  type: B
  content: Output caching via outputs_valid dirty flag
  rationale: Skips full recomputation when inputs and parameters unchanged by tracking a validity flag;
    yields significant speedup for repeated calls with same state common in backtesting
  evidence: talib/_abstract.pxi:141,375-376
  stage: abstract_api
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-012
  type: B/BA
  content: Price series default mapping via __INPUT_PRICE_SERIES_DEFAULTS
  rationale: Maps abstract 'price' parameter to 'close', 'price0' to 'high', 'price1' to 'low' etc.; provides
