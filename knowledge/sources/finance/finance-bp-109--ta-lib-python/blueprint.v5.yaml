replaceable_slots:
- id: slot-001
  name: ta_lib_c_backend
  description: TA-Lib C is the only supported backend. Any replacement requires writing a new Cython wrapper
    layer and replacing all function bindings.
  used_in_stages: []
  options:
  - name: TA-Lib C library
    traits:
    - 150+ indicators
    - candlestick patterns
    - C API
    - actively maintained upstream
    fit_for:
    - Standard technical analysis use cases; the only supported option; comprehensive coverage of common
      TA indicators
    not_fit_for:
    - Environments where compiling C code is not possible; GPU-accelerated workloads; custom/fast alpha
      research where TALib's implementation is a bottleneck
  - name: Custom C/Go/Rust TA library
    traits:
    - any language with C FFI
    - potentially faster
    - custom indicators
    fit_for:
    - Performance-critical or proprietary indicator research; custom/fast alpha where TALib is a bottleneck
    not_fit_for:
    - Drop-in replacement; standard compatibility; most users
  default: TA-Lib C library
  _source: worker_resource
- id: slot-002
  name: dataframe_input_format
  description: Use pandas if already in a pandas ecosystem; use polars for large-scale data; use numpy
    for minimal dependencies or maximum performance. All three work seamlessly with the same talib function
    calls.
  used_in_stages: []
  options:
  - name: pandas
    traits:
    - Series
    - DataFrame
    - date-time index
    - wide adoption
    fit_for:
    - General Python data science workflows; backtesting frameworks (backtrader, backtesting.py); existing
      pandas-based pipelines
    not_fit_for:
    - Large datasets (polars is faster); streaming pipelines; polars-first codebases
  - name: polars
    traits:
    - Series
    - DataFrame
    - lazy evaluation
    - Arrow-backed
    - multi-threading
    fit_for:
    - Large dataset processing; high-performance pipelines; Arrow-based workflows; modern Python data
      stack
    not_fit_for:
    - Environments where pandas is already entrenched; very small datasets where pandas overhead is acceptable
  - name: numpy arrays (default, no wrapper needed)
    traits:
    - ndarray
    - minimal overhead
    - no pandas/polars dependency
    fit_for:
    - Embedded systems; low-dependency environments; streaming/low-latency pipelines; pure mathematical
      use
    not_fit_for:
    - Users who prefer named-column access or DataFrame operations
  default: numpy arrays
  _source: worker_resource
- id: slot-003
  name: python_package_index
  description: Use PyPI for standard pip environments; use Conda Forge for conda/mamba users. Both provide
    pre-built binaries (no compilation).
  used_in_stages: []
  options:
  - name: PyPI
    traits:
    - wheels available since 0.6.5
    - multi-platform
    - pip installable
    fit_for:
    - Standard end-user installation on any platform; CI/CD deployments
    not_fit_for:
    - Air-gapped environments; enterprise environments restricting PyPI
  - name: Conda Forge
    traits:
    - binary packages
    - no compilation needed
    - includes ta-lib and libta-lib
    fit_for:
    - Conda environment users; scientific Python stacks (Anaconda, Miniconda, Mamba)
    not_fit_for:
    - pip-only environments; non-conda users
  default: PyPI
  _source: worker_resource
- id: slot-004
  name: ci_cd_wheel_builder
  description: cibuildwheel is the de facto standard for PyPI wheel publishing and is already configured
    in the repo.
  used_in_stages: []
  options:
  - name: cibuildwheel
    traits:
    - pypa official
    - auditwheel/delocate integration
    - cross-compilation support
    - manylinux/musllinux
    fit_for:
    - Publishing to PyPI; any Python project needing platform-specific wheels
    not_fit_for:
    - Pure source distribution only
  default: cibuildwheel
  _source: worker_resource
