    who configure unstable periods before calling the indicator, then share Function instances across
    threads (using BD-010 thread-local storage), may have configuration reset or inconsistent across threads
    due to thread-local state isolation. The configuration state is not thread-isolated but the calculation
    state is, creating subtle bugs where some threads see different convergence behavior.'
  evidence: BD-081,BD-093,BD-029,BD-010
  stage: global
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-100
  type: B/BA
  content: 'INTERACTION: BD-087 (Array length validation) × BD-084 (Output type preservation) → Validation
    failure prevents type preservation'
  rationale: BD-087 validates input array lengths before any calculation, using check_length2/3/4 functions.
    BD-084 preserves input types through to output (DataFrame→DataFrame, Series→Series). When length validation
    fails, the entire wrapper returns early without calling the underlying C function. This means the
    type preservation mechanism never comes into play for validation errors—the caller gets a Python exception,
    not a gracefully typed error response. For pipeline integration where downstream code expects typed
    outputs even on error, this creates a gap.
  evidence: BD-087,BD-084
  stage: global
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-101
  type: B
  content: 'INTERACTION: BD-016 (Polars/pandas mutual exclusion) × BD-037 (Raise exception on mixing)
    → Confirmed redundant constraint with ambiguous scope'
  rationale: 'BD-016 and BD-037 are functionally identical: both enforce that polars and pandas cannot
    be mixed in a single function call, both raise exceptions on violation. BD-037 references talib/__init__.py:56-57
    as its evidence, which is the same evidence cited by BD-016. The redundancy creates maintenance risk:
    if the exception message or behavior changes, two separate BDs must be kept in sync. Additionally,
    the scope of ''single call'' is ambiguous—BD-016 says ''in single call'' while BD-083 (related) discusses
    ''once a session begins''—these may represent different enforcement levels.'
  evidence: BD-016,BD-037,BD-083
  stage: global
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-102
  type: BA/DK
  content: 'INTERACTION: BD-054 (Dynamic lookback computation) × BD-006 (endIdx as length-1 convention)
    → Risk cascade on index boundary calculations'
  rationale: 'BD-054 computes lookback dynamically based on parameters (e.g., SMA with timeperiod=200
    needs 199 prior bars). BD-006 establishes that endIdx represents length-1 (zero-based last element).
    When these interact incorrectly, off-by-one errors in lookback calculation can cause: (1) output arrays
    with wrong length, (2) lookback period with incorrect NaN count, (3) valid results starting at wrong
    index. For high-period indicators like SMA(200), even a single-index error propagates to significant
    data misalignment in backtesting results. The dynamic lookback depends on the endIdx convention being
    perfectly implemented in C code.'
  evidence: BD-054,BD-006
  stage: global
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
