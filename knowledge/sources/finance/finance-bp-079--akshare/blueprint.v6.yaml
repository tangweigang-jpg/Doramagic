  stage: global
  alternative_considered: Time-based cache expiration (TTL); cache invalidation at
    market open/close; cache versioning
- id: BD-118
  type: B/BA
  content: 'INTERACTION: BD-021 (graceful fallback to free API) × BD-001 (session-per-request)
    → Free tier rate limit exposure amplified by connection overhead'
  rationale: 'BD-021 transparently falls back to free public API when no token is
    provided, while BD-001 creates new sessions for each request. The AMPLIFICATION
    creates a critical exposure: users without tokens default to the free tier, which
    has stricter rate limits. Since each request incurs full connection establishment
    overhead (BD-001), these users exhaust their rate limits faster than optimized
    clients. The transparency of the fallback masks the rate limit risk - users don''t
    realize they''re on a restri'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Connection pooling enabled for free tier; explicit rate
    limit warnings; tier-based optimization
- id: BD-GAP-001
  type: B/DK
  content: Carbon trading data scraped from 8 regional exchanges (TanJiaoYi, BJETS,
    CERX, HBETS, CNEmission) rather than centralized national source - China's carbon
    market is regionally fragmented with pilot schemes in Hubei, Shanghai, Beijing,
    Guangdong, Tianjin, Shenzhen, Chongqing, and Fujian
  rationale: China's carbon trading market operates through fragmented regional pilots
    rather than unified national exchange; aggregating regional data requires connecting
    to each exchange's distinct API and data format. Breaks if China consolidates
    carbon markets or if regional exchanges change their data endpoints.
  evidence: akshare/energy/energy_carbon.py:33(energy_carbon_domestic)
  stage: data_collection
  alternative_considered: Direct scraping of each exchange website was rejected due
    to anti-scraping measures
- id: BD-GAP-002
  type: T
  content: Oil price detail API uses date string parameter ('YYYYMMDD' format) to
    query historical regional gasoline/diesel prices, with energy_oil_hist providing
    the list of valid adjustment dates
  rationale: China's oil price adjustment follows NDRC schedule (approximately every
    10 working days), not daily; requiring users to first call energy_oil_hist ensures
    only valid adjustment dates are queried. Breaks when NDRC changes adjustment frequency
    or creates new price tiers.
  evidence: akshare/energy/energy_oil_em.py:48(energy_oil_detail)
  stage: data_collection
  alternative_considered: Real-time regional prices rejected due to complexity
- id: BD-GAP-003
  type: B/RC
  content: Baidu Migration data provides top 100 origin/destination cities only -
    sample limit reflects Baidu's mobile user base coverage and API constraints, not
    statistical sampling methodology
  rationale: Baidu Migration infers population movement from mobile phone location
    data; limiting to top 100 cities balances data completeness with API response
    size. Breaks when smaller cities become significant migration sources or when
    Baidu's market share changes.
  evidence: akshare/event/migration.py:16(migration_area_baidu)
  stage: data_collection
  alternative_considered: Full list rejected due to API pagination complexity
- id: BD-GAP-004
  type: BA/M
  content: Migration scale indicator normalizes movement volume to index value for
    cross-city comparison - enables comparing migration magnitude between cities of
    different population sizes
  rationale: Raw migration counts favor larger cities; normalized index allows ranking
    cities by relative migration intensity. Breaks when methodology for normalization
    changes or when comparing across different time periods.
  evidence: akshare/event/migration.py:56(migration_scale_baidu)
  stage: data_transformation
  alternative_considered: Raw counts rejected as not comparable across cities
- id: BD-GAP-005
  type: B/DK
  content: Fortune 500 China rankings available from 1996 via static URL mapping (_fortune_rank_year_url_map)
    - historical rankings require separate URLs per year, not paginated API
  rationale: Fortune China publishes yearly static pages rather than maintaining historical
    database; year-to-URL mapping caches this relationship for efficient retrieval.
    Breaks when Fortune changes URL structure or starts maintaining historical archive
    differently.
  evidence: akshare/fortune/fortune_500.py:21(_fortune_rank_year_url_map)
  stage: data_collection
  alternative_considered: Manual data entry rejected as unsustainable
- id: BD-GAP-006
  type: T/RC
  content: ETF market identification uses code-to-market mapping (1 for SSE, 0 for
    SZSE) to route historical data queries to correct exchange-specific API endpoints
  rationale: Chinese ETFs trade on either Shanghai (6-digit codes starting 51/52)
    or Shenzhen (6-digit codes starting 15/16) exchanges; mapping determines which
    API to query. Breaks when exchanges add new market segments or when ETF codes
    are reused.
  evidence: akshare/fund/fund_etf_em.py:220(get_market_id)
  stage: data_collection
  alternative_considered: Single unified endpoint rejected as not available from Eastmoney
- id: BD-GAP-007
  type: B/DK
  content: 'Fund data split across 5 sources: Eastmoney (primary market data), Xueqiu
    (analysis), Sina (historical), CNInfo (regulatory filings), AMAC (regulatory status)
    - each optimized for different use case'
  rationale: No single Chinese financial data provider offers complete fund coverage;
    Eastmoney excels at real-time quotes, Xueqiu at user-generated analysis, CNInfo
    at official filings, AMAC at regulatory compliance. Breaks when any provider changes
    API or goes offline.
  evidence: akshare/fund/fund_em.py:99(fund_name_em)
  stage: data_collection
  alternative_considered: Single-source approach rejected due to data gaps
- id: BD-GAP-008
  type: B/BA
  content: Xueqiu fund API timeout defaults to None - no automatic timeout, relying
    on network-level timeout only
  rationale: Xueqiu API may be slow during market hours; explicit timeout=None lets
    requests hang until completion or network failure. Breaks under poor network conditions
    or Xueqiu DDoS protection triggers.
  evidence: akshare/fund/fund_xq.py:13(fund_individual_basic_info_xq)
  stage: error_handling
  alternative_considered: Hard timeout rejected as some queries legitimately take
    30+ seconds
- id: BD-GAP-009
  type: B/RC
  content: AMAC fund data pages through 2000 pages maximum (default) to retrieve complete
    private fund database - pagination required due to API returning 20 records per
    page
  rationale: AMAC API restricts response size; retrieving all ~40,000+ private fund
    managers requires pagination loop. Breaks when total managers exceed 40,000 or
    when page size changes.
  evidence: akshare/fund/fund_amac.py:415(amac_fund_info)
  stage: data_collection
  alternative_considered: Incremental query rejected as AMAC doesn't support date
    filters
- id: BD-GAP-010
  type: B/DK
  content: Futures contract info queries 6 separate exchange websites (SHFE, DCE,
    CZCE, CFFEX, INE, GFEX) with date-formatted parameters for trading-day-specific
    data
  rationale: Chinese futures market lacks centralized contract info API; each exchange
    maintains separate system with different formats. Date parameters ensure only
    current trading day data is retrieved. Breaks when exchanges update their contract
    parameters or add new contract types.
  evidence: akshare/futures_derivative/futures_contract_info_shfe.py:13(futures_contract_info_shfe)
  stage: data_collection
  alternative_considered: Aggregated data feed rejected as not available
- id: BD-GAP-011
  type: B/DK
  content: Hog futures data sourced from zhujia.zhuwang.com (pig farming analytics
    platform) rather than agricultural exchanges - reflects pig farming supply chain
    integration with futures markets
  rationale: Chinese hog futures (Dalian) settle against pig prices from specialized
    agricultural data providers, not commodity exchanges. zhujia.zhuwang.com provides
    upstream cost and supply data. Breaks when relationship between spot prices and
    futures settlement changes.
  evidence: akshare/futures_derivative/futures_hog.py:13(futures_hog_core)
  stage: data_collection
  alternative_considered: DCE direct settlement data rejected as not providing cost
    context
- id: BD-GAP-012
  type: B/RC
  content: Currency swap curve (C-Swap) sourced from China Foreign Exchange Trade
    System (chinamoney.com.cn) - official benchmark for RMB interest rate derivatives
  rationale: China Foreign Exchange Trade System is the official market infrastructure
    for RMB FX and interest rate benchmarks; C-Swap serves as reference for cross-currency
    swap pricing. Breaks when PBOC changes benchmark methodology or when market structure
    shifts away from C-Swap.
  evidence: akshare/fx/fx_c_swap_cm.py:25(fx_c_swap_cm)
  stage: data_collection
  alternative_considered: Bloomberg/reuters feeds rejected due to cost
- id: BD-GAP-013
  type: B/RC
  content: Box office data scraped from ENData (endata.cn) with custom client-side
    decryption - Chinese box office data is proprietary and encrypted to prevent unauthorized
    aggregation
  rationale: ENData encrypts API responses to protect commercial data relationships
    with theaters; decryption implemented in JS files distributed with package. Breaks
    when ENData changes encryption or if JS files are blocked by browser security
    policies.
  evidence: akshare/movie/movie_yien.py:63(decrypt)
  stage: data_collection
  alternative_considered: Official government data rejected as not real-time
- id: BD-GAP-014
  type: T
  content: Movie weekly/yearly box office requires complete week/month periods - cannot
    query partial periods, enforcing data completeness for comparative analysis
  rationale: Weekly and monthly box office comparisons require full period data to
    avoid incomplete weeks due to release timing; API enforces this constraint. Breaks
    when industry requests partial-period data for COVID-style disruptions.
  evidence: akshare/movie/movie_yien.py:168(movie_boxoffice_weekly)
  stage: data_collection
  alternative_considered: Partial period API rejected as breaking historical comparability
- id: BD-GAP-015
  type: B
  content: Baidu Finance news API requires cookie-based authentication obtained via
    headless browser - anti-scraping measures require maintaining session state
  rationale: Baidu Finance protects economic calendar and trading data behind authentication;
    cookie must be fetched fresh as it expires. Breaks when Baidu updates authentication
    mechanism or when IP is rate-limited.
  evidence: akshare/news/news_baidu.py:16(_get_baidu_cookie)
  stage: authentication
  alternative_considered: Official Baidu Finance API rejected as not publicly available
- id: BD-GAP-016
  type: B/RC
  content: News CCTV data available from 20160203 onwards only - reflects when CCTV
    began publishing text transcripts online in accessible format
  rationale: CCTV news联播 transcripts digitized and made publicly accessible from February
    2016; earlier content not available via scraping. Breaks when CCTV expands historical
    archive or removes older content.
  evidence: akshare/news/news_cctv.py:17(news_cctv)
  stage: data_collection
  alternative_considered: Video transcription rejected as too complex
- id: BD-GAP-017
  type: B/BA
  content: 'Car sales data uses CPCA (乘联会) for domestic China sales and Gasgoo for
    broader industry rankings - reflects different reporting methodologies (CPCA:
    production/wholesale/retail/exit vs Gasgoo: manufacturer rankings)'
  rationale: CPCA reports actual end-consumer retail sales with 4 metrics; Gasgoo
    focuses on manufacturer competition rankings. CPCA's narrow vs broad passenger
    vehicle distinction reflects Chinese vehicle classification standards. Breaks
    when CPCA changes classification methodology or when Gasgoo expands coverage.
  evidence: akshare/other/other_car_cpca.py:13(car_market_total_cpca)
  stage: data_collection
  alternative_considered: CAAM (行业协会) data rejected as not publicly accessible
- id: BD-GAP-018
  type: B/RC
  content: QHKC (奇货可查) commodity index data available only for period 2016-10-10 to
    2019-09-30 - historical data not retained by platform after platform redesign
  rationale: QHKC stopped updating or archiving index data after September 2019; API
    still returns data for that historical window only. Breaks when QHKC resumes publishing
    or when platform goes offline entirely.
  evidence: akshare/qhkc_web/qhkc_fund.py:23(get_qhkc_fund_bs)
  stage: data_collection
  alternative_considered: Alternative commodity indices rejected as not matching QHKC
    methodology
- id: BD-GAP-019
  type: T/RC
  content: Gold spot data uses standardized SGE contract symbols (Au99.99, Au(T+D),
    etc.) - reflects Shanghai Gold Exchange's multiple delivery standards and trading
    conventions
  rationale: SGE offers physical delivery (99.99%, 99.95%), mini contracts (mAu),
    and deferred trading (T+D); each has different liquidity and spread characteristics.
    Symbol selection determines data relevance for different use cases. Breaks when
    SGE introduces new contracts or retires existing ones.
  evidence: akshare/spot/spot_sge.py:50(spot_quotations_sge)
  stage: data_collection
  alternative_considered: Unified spot price rejected as SGE has multiple valid prices
- id: BD-GAP-020
  type: B
  content: 99qh.com spot price requires token authentication fetched from same page
    as data - anti-scraping measure requiring linked request for token before data
    query
  rationale: 99qh.com protects spot/futures price data behind token-based access;
    token must be fetched from landing page then passed to data API. Breaks when 99qh
    changes token mechanism or when token expires mid-session.
  evidence: akshare/spot/spot_price_qh.py:36(__get_token_of_spot_price_qh)
  stage: authentication
  alternative_considered: Token purchase rejected as not available
- id: BD-GAP-021
  type: B/RC
  content: Pig (hog) market data from Soozhu uses live pig price, lean-type pig, and
    three-way crossbred data - reflects Chinese hog breeding industry structure with
    specialized price indices for different pig genetics
  rationale: Chinese pig industry distinguishes between native breeds, imported lean
    breeds (for bacon), and three-way crosses (for commercial production); each has
    different market pricing. Soozhu's specialization in hog data provides upstream
    context for feed futures. Breaks when industry consolidates around single breed
    standard.
  evidence: akshare/spot/spot_hog_soozhu.py:14(spot_hog_soozhu)
  stage: data_collection
  alternative_considered: Government agriculture ministry data rejected as not real-time
