id: finance-bp-079
name: AKShare
sop_version: '3.6'
source:
  projects:
  - akshare
  commit_hash: e47f1ad65fd497258cbf4c6d0a722bbdb6519ab4
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: financial data acquisition from Chinese markets
  description: Python library for fetching financial and economic data from various
    Chinese data sources including Eastmoney, Sina, cninfo, and government statistics
    portals
  prerequisites: Python 3.9+, basic pandas/DataFrame knowledge, understanding of Chinese
    financial market data structures
  not_suitable_for: Real-time trading systems, non-Chinese market data, high-frequency
    trading requirements, institutional-grade latency guarantees
stages:
- id: data_collection
  name: Data Collection
  order: 1
  responsibility: Fetch raw data from external sources (Eastmoney, Sina, cninfo, etc.)
    via HTTP requests with retry logic and rate limiting protection
  interface:
    inputs:
    - URL, parameters, optional headers/proxies
    outputs:
    - requests.Response object or raw JSON/text
  required_methods:
  - name: TLSAdapter
    description: Custom HTTPAdapter for TLS 1.2 compatibility with legacy servers
      that don't support modern ciphers
    evidence: akshare/economic/macro_china.py:26(class TLSAdapter)
  - name: request_with_retry
    description: HTTP GET request with exponential backoff and random jitter for retry
      logic
    evidence: akshare/utils/request.py:15(function request_with_retry)
  - name: make_request_with_retry_json
    description: High-level JSON request wrapper with error classification and automatic
      retry
    evidence: akshare/request.py:10(function make_request_with_retry_json)
  key_behaviors:
  - behavior: Session-per-request pattern
    description: Each HTTP request creates a new session with adapter mounted, disabling
      connection pool reuse to avoid stale connections and rate limit issues from
      pooled reuse
    evidence: akshare/utils/request.py:46(session.mount)
  - behavior: Exponential backoff with jitter
    description: 'Retry delays follow exponential backoff formula: base_delay*(2**attempt)
      with random jitter in [0.5, 1.5]s range to distribute retry timing and avoid
      synchronized re-requests'
    evidence: akshare/utils/request.py:61(delay=base_delay*(2**attempt))
  - behavior: TLS compatibility workaround
    description: TLSAdapter lowers SSL security level to DEFAULT@SECLEVEL=1 to achieve
      compatibility with older Chinese data servers that don't support modern cipher
      suites
    evidence: akshare/economic/macro_china.py:30(ctx.set_ciphers)
  - behavior: Singleton proxy configuration
    description: AkshareConfig singleton stores proxies globally as single source
      of truth; thread-unsafe but sufficient for single-user scripts
    evidence: akshare/utils/context.py:4(__new__)
  - behavior: Direct pandas HTTP fetch
    description: For simple CSV downloads, uses pd.read_csv(url) directly to bypass
      manual HTTP handling; leverages pandas built-in HTTP support
    evidence: akshare/article/epu_index.py:54(pd.read_csv(url))
  replaceable_points:
  - name: HTTPAdapter subclass
    description: SSL/TLS configuration strategy for connection security
    options:
    - name: TLSAdapter
      traits:
      - TLS 1.2 only
      - lowered security level
      - legacy server compatible
      fit_for:
      - Old Chinese data servers with outdated SSL certificates
      not_fit_for:
      - Modern secure servers requiring TLS 1.3
      - High-security environments
    - name: LegacySSLAdapter
      traits:
      - SSL compatibility
      - specific server targeted
      fit_for:
      - China Money market data from chinamoney.org.cn
      not_fit_for:
      - General use
      - Modern TLS requirements
    - name: default HTTPAdapter
      traits:
      - System default TLS
      - Connection pooling enabled
      fit_for:
      - Modern servers with valid SSL certificates
      not_fit_for:
      - Legacy Chinese servers with old certificates
    default: TLSAdapter
  - name: Request utility
    description: HTTP request implementation for data fetching
    options:
    - name: request_with_retry
      traits:
      - Exponential backoff
      - 15s default timeout
      - JSON/text output
      fit_for:
      - Most data fetching use cases
      - Paginated APIs
      not_fit_for:
      - Fixed retry interval requirements
    - name: make_request_with_retry_json
      traits:
      - High-level wrapper
      - Error classification
      - JSON auto-parse
      fit_for:
      - JSON APIs with error handling needs
      not_fit_for:
      - HTML/XML responses
      - Binary data
    - name: pandas.read_csv (direct)
      traits:
      - No retry logic
      - Direct HTTP
      - CSV only
      fit_for:
      - Simple CSV endpoints
      - Article/EPU data
      not_fit_for:
      - Error-prone networks
      - Non-CSV formats
    default: request_with_retry
  design_decisions:
  - 'Session-per-request pattern disables connection pool reuse (evidence: akshare/utils/request.py:46(session.mount))
    — Avoids stale connections; prevents rate limit issues from pooled reuse'
  - 'Exponential backoff with random jitter [0.5, 1.5]s range (evidence: akshare/utils/request.py:61(delay=base_delay*(2**attempt)))
    — Distributes retry timing to avoid synchronized re-requests'
  - 'TLSAdapter lowers SSL security level to DEFAULT@SECLEVEL=1 (evidence: akshare/economic/macro_china.py:30(ctx.set_ciphers))
    — Compatibility with older servers that don''t support modern ciphers'
  - 'Singleton AkshareConfig stores proxies globally (evidence: akshare/utils/context.py:4(__new__))
    — Single source of truth for proxy config; thread-unsafe but sufficient for single-user
    scripts'
  - 'Direct pandas.read_csv from HTTP URL (no requests library) (evidence: akshare/article/epu_index.py:54(pd.read_csv(url)))
    — Bypasses manual HTTP handling for simple CSV downloads; leverages pandas HTTP
    support'
  acceptance_hints:
  - Data collection functions complete without timeout errors under normal network
    conditions
  - Retry logic activates appropriately for transient network failures
  - Proxy settings propagate correctly through each HTTP requests
  - TLSAdapter successfully connects to legacy Chinese data servers
  - Rate limiting is respected to avoid IP blocking from data sources
- id: data_parsing
  name: Data Parsing
  order: 2
  responsibility: Transform raw HTTP responses (JSON, text, HTML, XML) into structured
    pandas DataFrames with consistent column naming
  interface:
    inputs:
    - Raw response data (JSON/text/HTML/XML)
    outputs:
    - pandas.DataFrame with standardized columns
  required_methods:
  - name: fetch_paginated_data
    description: Handles paginated data fetching from Eastmoney with automatic total
      page calculation from first response and progress bar display
    evidence: akshare/utils/func.py:18(function fetch_paginated_data)
  - name: demjson.JSON.decode
    description: Lenient JSON parser that handles malformed JSON from legacy sources
      that stdlib json rejects
    evidence: akshare/utils/demjson.py:1159(class JSON)
  key_behaviors:
  - behavior: Pagination via first-response total calculation
    description: Since APIs don't return total count, first page is fetched and total
      pages calculated via math.ceil to determine pagination scope
    evidence: akshare/utils/func.py:38(total_page=math.ceil)
  - behavior: Position-based column assignment
    description: When APIs return unlabeled columns, column names are assigned by
      position from fixed-length array as API returns columns in consistent order
    evidence: akshare/stock_feature/stock_hist_em.py:37(columns=)
  - behavior: Lenient JSON parsing
    description: demjson handles malformed JSON from legacy sources that standard
      library json module rejects; 250KB bundled library
    evidence: akshare/utils/demjson.py:1(json module)
  - behavior: Jupyter-aware progress bars
    description: Progress bar factory detects Jupyter environment via __class__.__name__
      == 'ZMQInteractiveShell' to return appropriate tqdm widget type
    evidence: akshare/utils/tqdm.py:19(shell==ZMQInteractiveShell)
  - behavior: XML parsing with dedicated parser
    description: BeautifulSoup with 'xml' feature uses different parser than HTML
      to properly handle air quality XML feeds with structured pollutant data
    evidence: akshare/air/air_hebei.py:32(BeautifulSoup(features=xml))
  replaceable_points:
  - name: JSON parser
    description: JSON deserialization strategy for API responses
    options:
    - name: demjson (lenient)
      traits:
      - Handles malformed JSON
      - 250KB bundled
      - Lenient error handling
      fit_for:
      - Legacy APIs with non-standard JSON
      - Robust parsing requirements
      not_fit_for:
      - Strict JSON validation needs
      - Memory-constrained environments
    - name: json stdlib (strict)
      traits:
      - Standard library
      - Fast
      - Strict parsing
      fit_for:
      - Well-formed JSON APIs
      - Performance-critical code
      not_fit_for:
      - Malformed JSON from legacy sources
    - name: orjson (fast)
      traits:
      - Rust-based
      - Very fast
      - Strict parsing
      fit_for:
      - High-volume JSON parsing
      - Performance-critical applications
      not_fit_for:
      - Malformed JSON
      - Requires additional dependency
    default: demjson
  - name: Progress bar
    description: Progress display mechanism for long-running operations
    options:
    - name: tqdm.notebook
      traits:
      - Jupyter widget
      - Rich display
      fit_for:
      - Jupyter notebook environments
      not_fit_for:
      - Terminal environments
      - Script execution
    - name: tqdm (terminal)
      traits:
      - ASCII progress bar
      - Terminal compatible
      fit_for:
      - Terminal/script execution
      not_fit_for:
      - Jupyter notebooks
      - Log files
    - name: null iterator
      traits:
      - No output
      - Silent execution
      fit_for:
      - Batch processing
      - Quiet mode requirements
      not_fit_for:
      - User-facing progress feedback
    default: tqdm with Jupyter detection
  - name: HTML/XML parser
    description: Structured document parsing for regulatory and web data
    options:
    - name: BeautifulSoup
      traits:
      - Feature detection
      - Multiple backends
      - Flexible
      fit_for:
      - Most HTML/XML parsing needs
      - Regulatory tables
      not_fit_for:
      - Simple structured XML
    - name: pd.read_html
      traits:
      - Table auto-detection
      - Pandas native
      fit_for:
      - HTML tables in regulatory pages
      - Quick table extraction
      not_fit_for:
      - Complex nested structures
      - Non-table data
    - name: demjson
      traits:
      - Lenient JSON-like parsing
      fit_for:
      - Malformed JSON-like content
      not_fit_for:
      - Standard HTML/XML
    default: BeautifulSoup
  design_decisions:
  - 'demjson used instead of stdlib json for robustness (evidence: akshare/utils/demjson.py:1(json
    module)) — Handles malformed JSON from legacy sources that stdlib rejects'
  - 'Column names assigned by position from fixed-length array (evidence: akshare/stock_feature/stock_hist_em.py:37(columns=))
    — API returns unlabeled columns; position determines meaning'
  - 'Pagination calculates total pages from first response (evidence: akshare/utils/func.py:38(total_page=math.ceil))
    — No total count in API; requires first page to determine pagination scope'
  - 'BeautifulSoup with ''xml'' feature for structured XML parsing (evidence: akshare/air/air_hebei.py:32(BeautifulSoup(features=xml)))
    — XML feature uses different parser than HTML; handles air quality XML feeds'
  - 'pd.read_html for regulatory table extraction (evidence: akshare/bank/bank_cbirc_2020.py:131(pd.read_html))
    — HTML tables embedded in regulatory pages; pandas auto-detects table structure'
  - 'Dynamic column generation from nested XML structure (evidence: akshare/air/air_hebei.py:53(row[f''{poll_name}_Value'']))
    — Pollutant names vary; dynamically creates columns for each pollutant found'
  - 'Jupyter detection via __class__.__name__ == ''ZMQInteractiveShell'' (evidence:
    akshare/utils/tqdm.py:19(shell==ZMQInteractiveShell)) — Notebook cells need different
    tqdm widget than terminal'
  acceptance_hints:
  - Every parsed DataFrames have consistent column naming across similar data types
  - Empty input (no data) returns empty DataFrame with appropriate columns, not None
  - Paginated data merges correctly without duplicate index values
  - Malformed JSON from legacy sources parses without exceptions
  - Progress bars render correctly in both Jupyter and terminal environments
- id: data_transformation
  name: Data Transformation
  order: 3
  responsibility: Clean, normalize, and type-convert parsed data; handle missing values
    and standardize formats for downstream consumption
  interface:
    inputs:
    - Raw DataFrame with original column names and types
    outputs:
    - Clean DataFrame with standardized types and column names
  required_methods:
  - name: set_df_columns
    description: Handles empty DataFrame edge case by returning DataFrame with proper
      columns
    evidence: akshare/utils/func.py:63(function set_df_columns)
  - name: volatility_yz_rv
    description: Yang-Zhang realized volatility calculation requiring specific OHLC
      column format
    evidence: akshare/cal/rv.py:92(function volatility_yz_rv)
  key_behaviors:
  - behavior: Numeric coercion with silent NaN
    description: Every numeric conversion uses pd.to_numeric with errors='coerce'
      so non-numeric strings become NaN instead of raising exceptions; preserves data
      shape
    evidence: akshare/stock_feature/stock_hist_em.py:99(pd.to_numeric(errors='coerce'))
  - behavior: Financial missing value handling
    description: fillna(0) for missing financial metrics where absence of data implies
      zero value; avoids null arithmetic issues in calculations
    evidence: akshare/stock_fundamental/stock_profit_forecast_em.py:117(fillna(0))
  - behavior: Date continuity via forward fill
    description: fillna(method='ffill') for date continuity in grouped data spanning
      multiple rows; repeats last known value for missing periods
    evidence: akshare/stock_fundamental/stock_finance_sina.py:581(fillna(method='ffill'))
  - behavior: Index reset after concat
    description: Index reset with ignore_index=True after concat to prevent duplicate
      index values from merged paginated data
    evidence: akshare/utils/func.py:55(concat(ignore_index=True))
  - behavior: Explicit column renaming via dict mapping
    description: Column renaming via explicit dict mapping to preserve data semantics
      when mapping internal field names to user-facing labels
    evidence: akshare/air/air_hebei.py:64(column_names=)
  replaceable_points:
  - name: Missing value strategy
    description: How to handle NaN/missing values in financial data
    options:
    - name: keep as NaN
      traits:
      - Preserves data integrity
      - No implicit assumptions
      fit_for:
      - Raw data delivery
      - User-defined handling
      not_fit_for:
      - Calculations requiring complete data
    - name: fillna(0)
      traits:
      - Zero substitution
      - Assumes absence = zero
      fit_for:
      - Financial metrics where missing = 0
      not_fit_for:
      - Prices, ratios, or percentages
    - name: fillna(ffill)
      traits:
      - Forward fill
      - Last observation carried forward
      fit_for:
      - Time series continuity
      - Non-trading days
      not_fit_for:
      - Cross-sectional data
      - First period values
    - name: dropna
      traits:
      - Complete case analysis
      - Removes incomplete rows
      fit_for:
      - Data quality enforcement
      - Analysis requiring completeness
      not_fit_for:
      - Sparse data
      - Data preservation priority
    default: keep as NaN
  design_decisions:
  - 'Every numeric conversion uses pd.to_numeric with errors=''coerce'' (evidence:
    akshare/stock_feature/stock_hist_em.py:99(pd.to_numeric(errors=''coerce''))) —
    Non-numeric strings become NaN instead of raising; preserves data shape'
  - 'fillna(0) for missing financial metrics (evidence: akshare/stock_fundamental/stock_profit_forecast_em.py:117(fillna(0)))
    — Absence of data implies zero; avoids null arithmetic issues'
  - 'fillna(method=''ffill'') for date continuity (evidence: akshare/stock_fundamental/stock_finance_sina.py:581(fillna(method=''ffill'')))
    — Repeats last known value for grouped data spanning multiple rows'
  - 'Index reset with ignore_index=True after concat (evidence: akshare/utils/func.py:55(concat(ignore_index=True)))
    — Prevents duplicate index values from merged paginated data'
  - 'Column renaming via explicit dict mapping (evidence: akshare/air/air_hebei.py:64(column_names=))
    — Maps internal field names to Chinese labels; preserves data semantics'
  - 'Sorted pollutant columns after basic columns (evidence: akshare/air/air_hebei.py:101(sorted(pollutant_columns)))
    — Maintains consistent column ordering; pollutants always after metadata'
  acceptance_hints:
  - Date columns parse correctly with pd.to_datetime(errors='coerce') for invalid
    dates
  - Numeric columns contain numeric dtype after transformation, not object/string
  - Empty DataFrame edge case returns proper empty DataFrame with correct columns
  - Concatenated paginated data has unique sequential index values
  - Consistent column naming across similar data types from different sources
- id: data_access
  name: Data Access Layer
  order: 4
  responsibility: Provide unified API for free/pro tier access; handle authentication
    and token management for premium data sources
  interface:
    inputs:
    - API name, optional token, fields filter
    outputs:
    - pandas.DataFrame from API response
  required_methods:
  - name: DataApi
    description: Pro API client with token authentication supporting __getattr__ dynamic
      method generation for pro.variety_all() syntax
    evidence: akshare/pro/client.py:15(class DataApi)
  - name: pro_api
    description: Pro API factory function that creates DataApi instances with graceful
      fallback to free tier when no token provided
    evidence: akshare/pro/data_pro.py:12(function pro_api)
  - name: get_token
    description: Token retrieval from config file (~/tk.csv) for pro API authentication
    evidence: akshare/utils/token_process.py:10(function get_token)
  key_behaviors:
  - behavior: Dynamic method generation via __getattr__
    description: __getattr__ returns partial function for method chaining enabling
      pro.variety_all() syntax; any method call becomes pro.query(method_name)
    evidence: akshare/pro/client.py:69(__getattr__)
  - behavior: Token file-based credential storage
    description: Token stored in config file (~/tk.csv via pandas.to_csv/read_csv)
      rather than hardcoded; supports multiple users and separates credentials from
      code
    evidence: akshare/utils/token_process.py:1(module)
  - behavior: Graceful free tier fallback
    description: Free API accessible without configuration; when token is empty string,
      falls back to free tier seamlessly
    evidence: akshare/pro/data_pro.py:16(if token=='')
  - behavior: Per-call API keys for third-party services
    description: External API keys passed as function parameters (e.g., CurrencyScoop
      requires user-specific key); no global token storage for third-party APIs
    evidence: 'akshare/currency/currency.py:29(params={api_key: api_key})'
  replaceable_points:
  - name: API tier
    description: Data source tier selection based on subscription
    options:
    - name: free (no token)
      traits:
      - No authentication
      - Rate limited
      - Core data
      fit_for:
      - General use
      - Learning
      - Non-commercial
      not_fit_for:
      - High-volume usage
      - Premium data needs
    - name: pro (with token)
      traits:
      - Token authentication
      - Higher limits
      - Extended data
      fit_for:
      - Professional use
      - Extended historical data
      not_fit_for:
      - No token configured
      - Token file corruption
    default: free
  - name: Authentication
    description: Token storage mechanism for premium API access
    options:
    - name: config file
      traits:
      - Persistent storage
      - User-specific
      - pandas-based
      fit_for:
      - Standard pro API users
      not_fit_for:
      - Shared environments
      - Cloud deployments
    - name: env variable
      traits:
      - Cloud-native
      - 12-factor compatible
      fit_for:
      - Container deployments
      - CI/CD pipelines
      not_fit_for:
      - Local development
      - Multiple tokens
    - name: parameter
      traits:
      - Per-call specification
      - No persistence
      fit_for:
      - Third-party APIs
      - Shared credentials
      not_fit_for:
      - Repeated calls
      - Token rotation
    default: config file
  design_decisions:
  - '__getattr__ returns partial function for method chaining (evidence: akshare/pro/client.py:69(__getattr__))
    — Enables pro.variety_all() syntax; dynamic method generation'
  - 'Token stored in config file, not hardcoded (evidence: akshare/utils/token_process.py:1(module))
    — Separates credentials from code; supports multiple users'
  - 'Graceful fallback: free API when no token provided (evidence: akshare/pro/data_pro.py:16(if
    token=='''')) — Free tier remains accessible without configuration'
  - 'External API keys passed as function parameters (evidence: akshare/currency/currency.py:29(params={api_key:
    api_key})) — CurrencyScoop requires user-specific key; no global token storage
    for third-party APIs'
  acceptance_hints:
  - Pro API calls succeed with valid token from ~/tk.csv
  - Free tier accessible without any token configuration
  - Invalid/missing token raises appropriate exception, not silent failure
  - Dynamic method generation works for each pro API endpoints
  - Token file permission issues are handled gracefully
data_flow:
- from_stage: data_collection
  to_stage: data_parsing
  data: requests.Response object containing raw JSON/text data from HTTP request
- from_stage: data_parsing
  to_stage: data_transformation
  data: pandas.DataFrame with raw columns and mixed types (object/string for numeric)
- from_stage: data_transformation
  to_stage: data_access
  data: pandas.DataFrame with clean columns, proper numeric types, and standardized
    column names
- from_stage: data_collection
  to_stage: data_transformation
  data: rv_from_stock_zh_a_hist_min_em chains stock_zh_a_hist_min_em directly bypassing
    explicit parsing
- from_stage: external
  to_stage: data_parsing
  data: pandas.read_csv (direct HTTP for article/EPU data) bypasses data_collection
global_contracts:
- contract: Every public data functions return pandas.DataFrame
  evidence: akshare/stock_feature/stock_hist_em.py:15(stock_zh_a_spot_em()->pd.DataFrame)
- contract: Date columns use pd.to_datetime with errors='coerce'
  evidence: akshare/economic/macro_china.py:97(pd.to_datetime(errors='coerce'))
- contract: Numeric columns use pd.to_numeric with errors='coerce'
  evidence: akshare/stock_feature/stock_hist_em.py:99(pd.to_numeric(errors='coerce'))
- contract: Empty DataFrame case handled with empty columns list
  evidence: akshare/utils/func.py:74(return pd.DataFrame(data=[],columns=cols))
- contract: Progress bars support disable via get_tqdm(enable=False)
  evidence: akshare/utils/tqdm.py:11(if not enable)
- contract: Trading calendar (calendar.json) is cross-module invariant - each futures
    data depends on it
  evidence: akshare/futures/cons.py:577-587(get_calendar), used in cot.py:34, futures_daily_bar.py:21
- contract: Date format convention %Y%m%d enforced via DATE_PATTERN regex across futures
    modules
  evidence: akshare/futures/cons.py:360(DATE_PATTERN), strftime('%Y%m%d') in 50+ locations
- contract: Exception hierarchy distinguishes API vs Network vs Parsing failures
  evidence: akshare/exceptions.py:14(class APIError), inherits from AkshareException
- contract: 'Column standardization across exchanges: CFFEX_COLUMNS, CZCE_COLUMNS,
    SHFE_COLUMNS, DCE_COLUMNS'
  evidence: akshare/futures/cons.py:363-489
business_decisions:
- id: BD-001
  type: BA
  content: Session-per-request pattern disables connection pool reuse to avoid stale
    connections and prevent rate limit issues from pooled reuse
  rationale: Each request creates a dedicated session rather than reusing pooled connections,
    preventing stale connection issues and rate limit violations. This tradeoff sacrifices
    connection efficiency for reliability in the akshare data collection context where
    requests may be infrequent and connection freshness matters more than pooling
    overhead. The boundary is that this only applies to the custom request utility,
    not each HTTP operations in the codebase.
  evidence: akshare/utils/request.py:46(session.mount)
  stage: data_collection
  alternative_considered: Connection pooling with explicit freshness checks was considered
    but adds complexity for marginal benefit in single-user scripts
  _evidence_issues:
  - 'FN_NOT_FOUND: session.mount in akshare/utils/request.py'
- id: BD-002
  type: BA
  content: Exponential backoff with random jitter [0.5, 1.5]s range distributes retry
    timing to avoid synchronized re-requests
  rationale: When retrying failed requests, the delay follows exponential backoff
    (base_delay * 2^attempt) multiplied by a random jitter factor between 0.5 and
    1.5. This prevents thundering herd problems when multiple clients retry simultaneously
    after a server outage. The jitter range ensures randomness while keeping delays
    predictable. The boundary is this applies only to internal retry logic, not external
    API rate limits.
  evidence: akshare/utils/request.py:15(request_with_retry)
  stage: data_collection
  alternative_considered: Fixed delay retry was rejected as it would cause synchronized
    retries across clients
- id: BD-003
  type: B/BA
  content: TLSAdapter lowers SSL security level to DEFAULT@SECLEVEL=1 for compatibility
    with older servers that don't support modern ciphers
  rationale: The TLS configuration explicitly downgrades cipher security level to
    accommodate legacy government and financial servers that use outdated certificate
    chains. This is a deliberate security-for-compatibility tradeoff decision. The
    boundary is limited to specific endpoints requiring legacy TLS, not the entire
    library. Without this, SSL handshake failures would prevent data collection from
    older data sources.
  evidence: akshare/economic/macro_china.py:30(ctx.set_ciphers)
  stage: data_collection
  alternative_considered: Certificate pinning was considered but rejected due to maintenance
    burden; alternative was to skip TLS verification entirely which is less safe
  _evidence_issues:
  - 'FN_NOT_FOUND: ctx.set_ciphers in akshare/economic/macro_china.py'
- id: BD-004
  type: M
  content: Singleton AkshareConfig stores proxies globally with thread-unsafe single
    source of truth design
  rationale: The AkshareConfig class implements singleton pattern via __new__ to maintain
    a single global instance for proxy configuration. This ensures consistent proxy
    settings across each requests within a process. The boundary is thread-unsafety
    is acceptable because akshare is designed for single-user scripts rather than
    multi-threaded server applications. For threaded use, users should manage their
    own proxy configuration.
  evidence: akshare/utils/context.py:4(__new__)
  stage: data_collection
  alternative_considered: Thread-local storage was considered but adds complexity
    for the target use case of single-user scripts
