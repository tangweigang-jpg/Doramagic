id: finance-bp-079
name: AKShare
sop_version: '3.6'
source:
  projects:
  - akshare
  commit_hash: e47f1ad65fd497258cbf4c6d0a722bbdb6519ab4
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Financial data retrieval and preprocessing from Chinese financial websites
  description: AKShare is a Python library that simplifies the process of fetching
    financial data from Chinese sources including stocks, futures, options, forex,
    bonds, funds, and macro economic indicators.
  prerequisites: Python 3.9+; understanding of pandas DataFrames; awareness of Chinese
    financial market structure (Shanghai/Shenzhen exchanges, CFFEX/CZCE/SHFE/DCE exchanges)
  not_suitable_for: Real-time trading systems (no caching layer); non-Chinese market
    data; high-frequency data retrieval without rate-limit considerations
stages:
- id: http_request_layer
  name: HTTP Request Layer
  order: 1
  responsibility: Provides generic HTTP GET/POST with exponential backoff retry, proxy
    support, and connection pooling isolation per request. This layer exists to handle
    unreliable network conditions and rate-limited Chinese financial APIs while providing
    resilience through automatic retries.
  interface:
    inputs:
    - URL string, params dict, headers dict, proxies dict, timeout (default 15s)
    outputs:
    - requests.Response object or parsed JSON/text
  required_methods:
  - name: request_with_retry
    description: Makes HTTP requests with exponential backoff and jitter, creates
      new Session per request to avoid stale connection issues
    evidence: akshare/utils/request.py:46(request_with_retry)
  - name: AkshareConfig
    description: Singleton configuration for global proxy override across each requests
    evidence: akshare/utils/context.py:4(__new__)
  - name: ProxyContext
    description: Context manager for temporary proxy override within a code block
    evidence: akshare/utils/context.py:31(ProxyContext)
  key_behaviors:
  - behavior: Exponential backoff with jitter
    description: Retries use base_delay * 2^attempt + random jitter to prevent thundering
      herd on rate-limited sources while avoiding predictable patterns
    evidence: akshare/utils/request.py:61(request_with_retry)
  - behavior: Connection pool isolation
    description: New Session per request with pool_connections=1 avoids connection
      reuse that causes issues with Chinese sites that close connections quickly
    evidence: akshare/utils/request.py:46(request_with_retry)
  - behavior: Global proxy state
    description: Proxy configuration is global singleton state affecting entire library;
      not thread-safe by design
    evidence: akshare/utils/context.py:19(config)
  replaceable_points:
  - name: request_library
    description: HTTP client library for making requests
    options:
    - name: requests
      traits:
      - Synchronous
      - Blocking I/O
      - Mature ecosystem
      fit_for:
      - General purpose requests
      - Simple use cases
      not_fit_for:
      - High concurrency
      - Async applications
    - name: httpx
      traits:
      - Sync/Async support
      - Modern API
      - HTTP/2 capable
      fit_for:
      - Async applications
      - Modern Python codebases
      not_fit_for:
      - Legacy code requiring requests compatibility
    - name: aiohttp
      traits:
      - Full async
      - WebSocket support
      - Low-level control
      fit_for:
      - High-performance async crawlers
      - WebSocket connections
      not_fit_for:
      - Simple synchronous scripts
    default: requests
  design_decisions:
  - Exponential backoff with random jitter (base_delay * 2^attempt + random) prevents
    thundering herd on rate-limited sources - akshare/utils/request.py:61(request_with_retry)
  - New Session per request with pool_connections=1 avoids connection reuse that could
    cause stale connection issues with Chinese financial sites - akshare/utils/request.py:46(request_with_retry)
  - Singleton config pattern for proxies allows global proxy override without passing
    through every function call - akshare/utils/context.py:4(__new__)
  - HTTP timeout defaults to 15 seconds across request utilities - akshare/utils/request.py:18(timeout=15)
  acceptance_hints:
  - Requests succeed after transient network failures through automatic retries
  - Proxy changes in AkshareConfig affect each subsequent requests globally
  - No stale connection errors when fetching from sites that close connections quickly
- id: data_source_selection
  name: Data Source Selection
  order: 2
  responsibility: Routes data requests to appropriate source websites (Eastmoney,
    Sina, THS, CNInfo) based on asset class and data type. This stage exists because
    different Chinese financial websites provide different data sets with varying
    formats and availability.
  interface:
    inputs:
    - Symbol, date range, data type identifier, market/exchange code
    outputs:
    - Raw response from source website (HTTP response text/bytes)
  required_methods:
  - name: DataApi.query
    description: Premium API client with token authentication for Pro-tier data access
    evidence: akshare/pro/client.py:30(query)
  - name: TLSAdapter
    description: Custom SSL adapter for legacy connections that have certificate issues
    evidence: akshare/economic/macro_china.py:12(TLSAdapter)
  key_behaviors:
  - behavior: Flat module-by-source organization
    description: Each data source gets dedicated module (forex_em, stock_zh_a_sina)
      enabling source-specific parsing logic and easier maintenance
    evidence: akshare/forex/forex_em.py:16(forex_spot_em)
  - behavior: Stock market code routing
    description: Stock codes prefixed with '6' route to Shanghai exchange (market_code=1),
      each others to Shenzhen (market_code=0)
    evidence: akshare/stock/stock_info_em.py:27, akshare/stock_feature/stock_hist_em.py:978
  - behavior: Symbol-to-exchange mapping
    description: market_exchange_symbols is THE authoritative source for exchange-to-variety
      mapping; inconsistent symbol classification breaks COT rankings, roll yield,
      and receipt data
    evidence: akshare/futures/cons.py:178-272
  replaceable_points:
  - name: data_source
    description: Same financial data often available from multiple Chinese sources
    options:
    - name: eastmoney
      traits:
      - Most comprehensive A-share coverage
      - Free tier available
      - API-based
      fit_for:
      - General stock data
      - Futures/options data
      - Fund data
      not_fit_for:
      - Some specialized data types only on other sources
    - name: sina
      traits:
      - Real-time quotes
      - JavaScript-encrypted historical data
      fit_for:
      - Intraday data
      - Real-time streaming
      not_fit_for:
      - Historical daily data (requires JS engine dependency)
    - name: ths
      traits:
      - Technical analysis data
      - Thomson Reuters partnership
      fit_for:
      - Technical indicators
      - Analyst estimates
      not_fit_for:
      - Basic price data
    - name: cninfo
      traits:
      - Official exchange data
      - Regulatory filings
      fit_for:
      - SEC filings
      - Official announcements
      not_fit_for:
      - Real-time data
    default: eastmoney
  design_decisions:
  - Flat module-by-source organization (forex_em, stock_zh_a_sina) allows easier maintenance
    of source-specific parsing logic - akshare/forex/forex_em.py:16(forex_spot_em)
  - Pro API as separate client class handles token-based authentication differently
    from web scraping - akshare/pro/client.py:30(query)
  - 'Stock market code logic: prefix ''6'' maps to Shanghai (code=1), each others
    to Shenzhen (code=0) - akshare/stock/stock_info_em.py:27'
  acceptance_hints:
  - Functions correctly route requests to correct exchange based on symbol prefix
  - Pro API returns valid data when token is provided, appropriate error when missing
  - Symbol extraction via re.findall(r'\D', code) correctly strips digits and uppercases
    for variety identification
- id: response_parsing
  name: Response Parsing
  order: 3
  responsibility: Extracts structured data from HTML tables, JSON responses, or JavaScript-encrypted
    data. This stage exists because Chinese financial websites return data in various
    non-standard formats that require specialized parsing logic.
  interface:
    inputs:
    - Raw HTTP response (text/JSON/HTML)
    outputs:
    - Pandas DataFrame or list of DataFrames with raw column names
  required_methods:
  - name: JSON.decode
    description: Extended JSON parser from demjson with error recovery for malformed
      JSON from Chinese sites
    evidence: akshare/utils/demjson.py:500(JSON)
  - name: stock_zh_a_daily
    description: Decodes JavaScript-encrypted Sina stock historical data using py_mini_racer
    evidence: akshare/stock/stock_zh_a_sina.py:178(stock_zh_a_daily)
  key_behaviors:
  - behavior: Custom demjson for malformed JSON
    description: Many Chinese financial sites return non-standard JSON that Python's
      standard json module rejects; demjson provides error recovery
    evidence: akshare/utils/demjson.py:1(JSON)
  - behavior: JS decryption via py_mini_racer
    description: Sina encodes historical data in JavaScript that must be executed
      to decode; requires heavy py_mini_racer dependency
    evidence: akshare/stock/stock_zh_a_sina.py:178(py_mini_racer)
  - behavior: Exchange-specific column ordering
    description: Each futures exchange (CFFEX, CZCE, SHFE, DCE) has unique column
      order for daily bar data; position assumptions break parsing
    evidence: akshare/futures/cons.py:363-438
  replaceable_points:
  - name: html_parsing
    description: Library used for parsing HTML tables
    options:
    - name: pandas.read_html
      traits:
      - Convenient
      - Built on lxml/beautifulsoup
      fit_for:
      - Simple HTML tables
      - Quick data extraction
      not_fit_for:
      - Malformed HTML
      - Complex DOM structures
    - name: BeautifulSoup
      traits:
      - Flexible
      - Multiple parser backends
      fit_for:
      - Complex HTML structures
      - Partial table extraction
      not_fit_for:
      - Simple cases (overkill)
    - name: lxml
      traits:
      - Fast C-based
      - Low-level
      fit_for:
      - Performance-critical parsing
      - Large documents
      not_fit_for:
      - Simple use cases
    default: pandas.read_html
  design_decisions:
  - Custom demjson for malformed JSON from Chinese sites is necessary because standard
    Python json module rejects non-standard JSON - akshare/utils/demjson.py:1(JSON)
  - JS decryption via py_mini_racer for Sina stock data is required because Sina encodes
    historical data in JavaScript - akshare/stock/stock_zh_a_sina.py:178(stock_zh_a_daily)
  - Demjson bundled in utils vs Python stdlib json adds ~250KB but is necessary for
    Chinese site compatibility - akshare/utils/demjson.py:1(JSON)
  acceptance_hints:
  - Malformed JSON from Chinese sites is successfully parsed without raising JSONDecodeError
  - Sina JS-encrypted data is correctly decoded when py_mini_racer is available
  - Futures data from different exchanges parses correctly with exchange-specific
    column handling
- id: data_cleaning
  name: Data Cleaning
  order: 4
  responsibility: Standardizes column names, handles missing values, converts data
    types, and applies adjustment factors (qfq/hfq). This stage exists to transform
    raw parsed data into consistent schema format for downstream processing.
  interface:
    inputs:
    - Raw DataFrame from parsing with Chinese column names
    outputs:
    - Cleaned DataFrame with standardized English column names and proper data types
  required_methods:
  - name: cal.rv.rename
    description: Column standardization via Chinese-to-English mapping for consistent
      downstream processing
    evidence: akshare/cal/rv.py:45(rename)
  - name: stock_zh_a_sina._fq_factor
    description: Computes and applies forward/backward adjustment factors to OHLC
      data
    evidence: akshare/stock/stock_zh_a_sina.py:148(_fq_factor)
  key_behaviors:
  - behavior: Column standardization via Chinese-to-English mapping
    description: Each source uses Chinese column names; standardization enables consistent
      downstream processing across different data sources
    evidence: akshare/cal/rv.py:45(rename)
  - behavior: Adjustment factors (qfq/hfq) applied via multiplication
    description: Forward/backward adjustment requires pre-computed factor columns
      multiplied against price data
    evidence: akshare/stock/stock_zh_a_sina.py:148(_fq_factor)
  - behavior: Date pattern acceptance
    description: DATE_PATTERN accepts YYYYMMDD, YYYY-MM-DD, YYYY/MM/DD formats; other
      formats like '2023.01.01' silently return None
    evidence: akshare/futures/cons.py:360
  replaceable_points:
  - name: missing_value_handling
    description: Strategy for handling gaps in time series data
    options:
    - name: drop
      traits:
      - Removes incomplete rows
      - Preserves data integrity
      fit_for:
      - Sparse missing data
      - Downstream calculations that can't handle NaN
      not_fit_for:
      - High-frequency data with common gaps
    - name: ffill
      traits:
      - Forward fill last known value
      - Maintains continuity
      fit_for:
      - Price data
      - Non-trading days
      not_fit_for:
      - Volume/data that changes fundamentally
    - name: interpolate
      traits:
      - Statistical estimation
      - Smooth transitions
      fit_for:
      - Indicator calculations
      - Gap-sensitive analysis
      not_fit_for:
      - Non-continuous data
    default: varies by function
  design_decisions:
  - Column standardization via Chinese-to-English mapping enables consistent downstream
    processing - akshare/cal/rv.py:45(rename)
  - Adjustment factors (qfq/hfq) applied via multiplication requires pre-computed
    factor columns - akshare/stock/stock_zh_a_sina.py:148(_fq_factor)
  - OUTPUT_COLUMNS and OPTION_OUTPUT_COLUMNS define canonical output schemas; missing
    fields are silently dropped - akshare/futures/cons.py:457-489
  acceptance_hints:
  - Chinese column names are transformed to standardized English equivalents
  - Price adjustment factors are correctly applied to OHLC data
  - Date parameters in various formats are correctly parsed
- id: volatility_calculation
  name: Volatility Calculation
  order: 5
  responsibility: Computes Yang-Zhang realized volatility from OHLC minute data using
    the academic Rogers-Satchell-Eu-Lee-Theobald formula. This stage exists to provide
    scientifically rigorous volatility estimates for risk management and trading strategies.
  interface:
    inputs:
    - DataFrame with Open, High, Low, Close columns (minute-level OHLC)
    outputs:
    - DataFrame with daily rv (realized volatility) values
  required_methods:
  - name: volatility_yz_rv
    description: Yang-Zhang realized volatility calculation implementing the academic
      formula with separate variance components
    evidence: akshare/cal/rv.py:92(volatility_yz_rv)
  key_behaviors:
  - behavior: Separate variance components
    description: Decomposes volatility into overnight (Vo), close (Vc), and Rogers-Satchell
      (Vrs) variance components; Vo captures overnight gap risk
    evidence: akshare/cal/rv.py:137(ui)
  - behavior: Dynamic k weighting
    description: Weighting k=0.34/(1.34+(n+1)/(n-1)) adapts to sample size per academic
      paper formula
    evidence: akshare/cal/rv.py:148(k)
  - behavior: UI and UI2 weighting calculation
    description: Computes overnight and close-open volatility scaling factors based
      on the Yang-Zhang methodology
    evidence: akshare/cal/rv.py:137(ui)
  replaceable_points:
  - name: volatility_model
    description: Realized volatility formula used for calculation
    options:
    - name: yang_zhang
      traits:
      - Accounts for overnight gap
      - Optimal for markets with opens/closes
      - Academic standard
      fit_for:
      - Daily volatility estimation
      - Risk models
      - Most equity applications
      not_fit_for:
      - Intraday-only analysis
      - Markets without overnight gaps
    - name: parkinson
      traits:
      - High-low based
      - Uses full price range
      - Fast calculation
      fit_for:
      - Volatility estimation from limited data
      - Quick estimates
      not_fit_for:
      - Markets with jumps
      - Data with gaps
    - name: garman_klass
      traits:
      - Open-high-low-close
      - More efficient than close-to-close
      - Reduced noise
      fit_for:
      - Volatility estimation
      - Trading systems
      not_fit_for:
      - Markets with stale prices
      - Intraday analysis
    - name: rogers_satchell
      traits:
      - Open-close range measure
      - Handles drift
      - No overnight adjustment
      fit_for:
      - Futures markets
      - Continuous trading
      not_fit_for:
      - Markets with significant overnight moves
    default: yang_zhang
  design_decisions:
  - Separate overnight (Vo), close (Vc), Rogers-Satchell (Vrs) variance components
    per academic formula; Vo captures overnight gap risk - akshare/cal/rv.py:137(ui)
  - Dynamic k weighting based on sample size k=0.34/(1.34+(n+1)/(n-1)) adapts to sample
    size per paper - akshare/cal/rv.py:148(k)
  acceptance_hints:
  - Yang-Zhang RV values are within expected range for the asset class
  - Variance decomposition correctly separates overnight and intraday components
  - Scaling factor k correctly adapts based on sample size
- id: pagination_handling
  name: Pagination Handling
  order: 6
  responsibility: Iterates through paginated API responses, collecting and merging
    results across multiple pages. This stage exists because many Chinese financial
    APIs limit results per request and require sequential page fetches for complete
    datasets.
  interface:
    inputs:
    - URL, base params, page size info
    outputs:
    - Combined DataFrame from each pages
  required_methods:
  - name: fetch_paginated_data
    description: Paginated data fetching with progress bar supporting both notebook
      and CLI environments
    evidence: akshare/utils/func.py:18(fetch_paginated_data)
  key_behaviors:
  - behavior: Random delay between page requests
    description: Sleeps 0.5-1.5 seconds randomly between page requests to prevent
      triggering rate limits while being faster than fixed delays
    evidence: akshare/utils/func.py:49(time.sleep)
  - behavior: Progress bar via abstracted get_tqdm()
    description: Supports both notebook and CLI environments transparently through
      tqdm abstraction
    evidence: akshare/utils/func.py:44(get_tqdm)
  - behavior: Sequential page iteration
    description: Pages fetched sequentially; large date ranges make many API calls;
      Ctrl+C leaves partial data
    evidence: akshare/futures/futures_basis.py:66-72
  replaceable_points:
  - name: concurrency
    description: Strategy for fetching multiple pages
    options:
    - name: sequential
      traits:
      - Simple
      - Reliable
      - Rate-limit friendly
      fit_for:
      - Small datasets
      - Sites with strict rate limits
      - Debugging
      not_fit_for:
      - Large datasets
      - Time-critical fetching
    - name: threaded
      traits:
      - Parallel I/O
      - Moderate complexity
      fit_for:
      - Medium datasets
      - Sites with moderate rate limits
      not_fit_for:
      - Sites with strict per-IP rate limits
    - name: async
      traits:
      - Highest efficiency
      - Complex implementation
      fit_for:
      - Large-scale data collection
      - Multiple sources
      not_fit_for:
      - Simple scripts
      - Sites with rate limits
    default: sequential
  design_decisions:
  - Random delay (0.5-1.5s) between page requests prevents triggering rate limits
    while being faster than fixed delays - akshare/utils/func.py:49(time.sleep)
  - Progress bar via abstracted get_tqdm() supports both notebook and CLI environments
    transparently - akshare/utils/func.py:44(get_tqdm)
  - futures_spot_price_daily loops calling futures_spot_price; must iterate day-by-day
    for large date ranges - akshare/futures/futures_basis.py:66-72
  acceptance_hints:
  - Every pages are fetched and merged into single complete DataFrame
  - Progress bar displays correctly in both Jupyter notebook and CLI environments
  - Rate limits are not triggered during pagination
- id: user_api
  name: User API
  order: 7
  responsibility: Provides public-facing functions that users call to retrieve financial
    data. This is the entry point that orchestrates each previous stages to deliver
    cleaned data to users.
  interface:
    inputs:
    - User parameters (symbol, date_range, etc.)
    outputs:
    - Pandas DataFrame with standardized schema
  required_methods:
  - name: stock_zh_a_hist
    description: Historical stock price data with OHLC, volume, turnover; combines
      HTTP request, parsing, cleaning, and pagination
    evidence: akshare/stock_feature/stock_hist_em.py:952(stock_zh_a_hist)
  - name: futures_cot_daily
    description: Commitment of traders rankings and positioning data from CFTC-equivalent
      Chinese reports
    evidence: akshare/futures/cot.py:56(get_rank_sum_daily)
  key_behaviors:
  - behavior: Every public functions return pandas.DataFrame
    description: Consistent return type enables chaining with pandas operations and
      downstream analysis
    evidence: akshare/stock_feature/stock_hist_em.py:952(stock_zh_a_hist)
  - behavior: Trading calendar dependency
    description: Trading calendar must be loaded before date validation; 17:00 cutoff
      defines 'today' for date defaults
    evidence: akshare/futures/cons.py:617-632(get_latest_data_date)
  - behavior: No caching layer
    description: Every call hits source websites; high-frequency usage will be slow
      and may hit rate limits
    evidence: akshare/__init__.py:1(__init__)
  replaceable_points:
  - name: data_format
    description: Output format for returned data
    options:
    - name: pandas_dataframe
      traits:
      - Standard format
      - Rich API
      - Industry standard
      fit_for:
      - Analysis
      - Trading systems
      - Machine learning
      not_fit_for:
      - Memory-constrained environments
    - name: dictionary
      traits:
      - Lightweight
      - Nested structure support
      fit_for:
      - API wrappers
      - Web services
      not_fit_for:
      - Tabular analysis
    - name: parquet
      traits:
      - Columnar storage
      - Compressed
      - Fast reads
      fit_for:
      - Large datasets
      - Data lakes
      not_fit_for:
      - Simple queries
    default: pandas_dataframe
  design_decisions:
  - Every public functions return pandas.DataFrame for consistent interface and downstream
    compatibility - akshare/stock_feature/stock_hist_em.py:952(stock_zh_a_hist)
  - Date parameters accept YYYYMMDD, YYYY-MM-DD, or datetime objects for flexibility
    - akshare/futures/futures_daily_bar.py:637(get_futures_daily)
  - Exception hierarchy encodes business semantics (APIError, DataParsingError, RateLimitError)
    for distinct failure mode handling - akshare/exceptions.py:14(APIError)
  acceptance_hints:
  - Every public functions return valid pandas.DataFrame objects
  - Date parameters in various formats are correctly parsed
  - Appropriate exceptions are raised for different failure modes (network vs parsing
    vs rate limiting)
data_flow:
- from_stage: external
  to_stage: http_request_layer
  data: User-provided parameters (URL, headers, proxies, timeout)
- from_stage: http_request_layer
  to_stage: data_source_selection
  data: Constructed HTTP request with source-specific parameters
- from_stage: data_source_selection
  to_stage: response_parsing
  data: Raw HTTP response text/bytes from source website
- from_stage: response_parsing
  to_stage: data_cleaning
  data: Raw DataFrame with Chinese column names
- from_stage: data_cleaning
  to_stage: pagination_handling
  data: Cleaned DataFrame chunks ready for combination
- from_stage: pagination_handling
  to_stage: user_api
  data: Combined DataFrame with each pages
- from_stage: data_cleaning
  to_stage: volatility_calculation
  data: Standardized OHLC DataFrame with proper column names
- from_stage: volatility_calculation
  to_stage: user_api
  data: DataFrame with computed realized volatility values
