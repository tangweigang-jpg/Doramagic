  type: B/BA
  content: 除权除息复权方式与因子计算影响评估缺失
  rationale: 行业标准：国际机构通常使用交易所官方发布的统一复权因子(等比例调整)，但A股同时存在前复权/后复权/不复权三种实操方式，且不同数据源计算方法存在差异(等比vs等差复权)。边界条件：技术指标(均线/MACD/RSI)对复权方式敏感度最高，前复权可使历史均线值看起来很低(误导性)，后复权使当前均线值看起来很高；长期策略(如定投/股股轮动)若选错复权方式，收益曲线偏差可达5-20%。此问题本质是数据处理假设(B)与因子计算方法不匹配的叠加问题——需明确每类因子的适用复权方式，而非统一处理。替代方案：使用交易所官方复权因子，标注不复权原始价格用于特定场景。
  evidence: N/A:0(see_rationale)
  stage: data_source_selection
  status: missing
  known_gap: true
  severity: high
  impact: 长期回测偏差可能超过20%，因子IC计算误差导致无效策略被采纳
  alternative_considered: 使用交易所官方复权因子、标注不复权原始价格
- id: BD-042
  type: B/BA
  content: 流动性约束和冲击成本建模缺失
  rationale: 行业标准：机构量化系统普遍采用VWAP/TWAP执行算法，结合成交量百分比下单(如单笔不超过日均成交量的1-5%)；零售回测系统通常忽略冲击成本。边界条件：日均成交额<5000万的小盘股，100万资金量下单可能移动价格0.5-2%，实盘年化收益比回测低2-5%；大盘蓝筹(日均成交>10亿)冲击成本<0.1%可忽略。A股T+1和涨跌停叠加使流动性问题更严重——即使小量买入也可能因次日无法卖出而暴露额外风险。此问题本质是执行假设(BA)缺失：回测假设无流动性约束的理想执行，实盘需根据股票市值分级设定下单上限。替代方案：A股专用冲击成本模型(结合T+1和涨跌停)、成交量百分比下单限制。
  evidence: N/A:0(see_rationale)
  stage: backtest
  status: missing
  known_gap: true
  severity: high
  impact: 小盘股策略实盘收益系统性低于回测，换手率越高偏差越大
  alternative_considered: A股专用冲击成本模型(结合T+1和涨跌停)、成交量百分比下单限制
- id: BD-043
  type: B/DK
  content: 指数成分股调整和survivorship bias问题
  rationale: 行业标准：专业量化机构通过Wind/聚源/锐思等数据商订阅历史成分数据(Point-in-time constituents)来消除生存者偏差；学术论文常因数据成本忽略此问题。边界条件：生存者偏差对因子策略(规模/价值/质量因子)影响最大，因子IC回测可能虚高5-15%；对交易型策略(技术指标/情绪指标)影响较小，因技术指标在股票被剔除前往往已触发卖出信号。沪深300/中证500等宽基指数每半年调整(6月/12月)，数据源缺失完整历史成分是DK问题，回测引擎使用当前成分进行历史回测是B问题——两者需同时解决。替代方案：接入Wind/聚源历史成分数据、标注survivorship
    bias风险并报告调整后IC。
  evidence: N/A:0(see_rationale)
  stage: backtest
  status: missing
  known_gap: true
  severity: critical
  impact: 因子策略(规模/价值/质量)回测IC虚高，因子有效性存疑
  alternative_considered: 接入Wind/聚源历史成分数据、标注survivorship bias风险
- id: BD-044
  type: B/RC
  content: 过户费建模缺失
  rationale: 行业标准：全球多数市场将过户登记费用包含在极低的交易所结算费中(美股<0.01%)，单独列出过户费的成熟市场极少，A股沪市是特例。边界条件：过户费0.002%双向对单笔交易影响极小(<万分之一)，但对高频交易(年换手50-100倍)累计损耗可达0.2-0.4%/年；低频持仓策略(年换手<5倍)影响<0.02%可忽略。此缺陷与印花税缺陷叠加，导致交易成本模型系统性低估约50%(仅含佣金0.2%，遗漏印花税0.05%+过户费0.004%)。替代方案：添加沪市0.002%双向、深市0%参数，按交易所自动匹配。
