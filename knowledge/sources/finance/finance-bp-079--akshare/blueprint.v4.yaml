business_decisions:
- id: BD-001
  type: B/BA
  content: Exponential backoff with random jitter (base_delay * 2^attempt + random)
    for HTTP retries
  rationale: Prevents thundering herd on rate-limited Chinese financial sites while
    adding randomness to avoid predictable request patterns that could trigger anti-scraping
    mechanisms. The formula base_delay * 2^attempt + random ensures delays grow exponentially
    while jitter prevents synchronized retries. Breaks if Chinese sites change rate
    limit policies or implement stricter bot detection.
  evidence: akshare/utils/request.py:15(request_with_retry)
  stage: http_request_layer
  alternative_considered: Fixed delay, token bucket, or circuit breaker patterns
- id: BD-002
  type: T
  content: New Session per request with pool_connections=1 to avoid stale connection
    issues
  rationale: Chinese financial websites close connections quickly and often return
    stale connection errors. Creating a new session per request with minimal connection
    pooling prevents these issues. This is a pure infrastructure decision - swapping
    to persistent sessions would change connection behavior but not data semantics.
  evidence: akshare/utils/request.py:15(request_with_retry)
  stage: http_request_layer
  alternative_considered: Reusable session with connection health checks, aiohttp
    with connection pooling
- id: BD-003
  type: BA
  content: Singleton AkshareConfig for global proxy override without passing through
    every function
