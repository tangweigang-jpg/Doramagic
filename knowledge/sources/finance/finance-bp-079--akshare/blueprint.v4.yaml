  rationale: 行业标准：国际主流市场(美股T+2、港股T+2、部分市场T+0)均无T+1限制，A股为全球少数保留T+1的主要市场。此项目回测框架基于欧美市场设计，未内置T+1持仓状态机。边界条件：此缺陷对日内高频策略(5分钟-1小时级别)影响最大，可能导致回测显示100%胜率但实盘0%执行率；对隔夜持仓(1天以上)策略几乎无影响，因为持仓必然跨越结算日。替代方案：启用Backtrader内置T+1约束插件，或自行编写持仓状态机(记录每笔买入的解冻日期)。
  evidence: N/A:0(see_rationale)
