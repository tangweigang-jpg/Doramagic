id: finance-bp-079
name: AKShare
sop_version: '3.6'
source:
  projects:
  - akshare
  commit_hash: e47f1ad65fd497258cbf4c6d0a722bbdb6519ab4
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Financial data acquisition and normalization library for Chinese markets
  description: Python library that simplifies fetching financial data from Chinese
    sources (stocks, futures, forex, macroeconomics) by providing 400+ functions that
    scrape, parse, and normalize data into standardized pandas DataFrames.
  prerequisites: Python 3.9+ required; basic understanding of pandas DataFrames; knowledge
    of Chinese financial market data sources
  not_suitable_for: Real-time trading systems requiring sub-second latency; non-Chinese
    market data; high-frequency trading; production systems requiring cached data;
    projects needing type-safe interfaces
stages:
- id: http_request
  name: HTTP Request Layer
  order: 1
  responsibility: Handles each outbound HTTP requests with retry logic, exponential
    backoff, and proxy rotation to prevent IP blocking during data scraping operations.
  interface:
    inputs:
    - url (string)
    - params (dict)
    - headers (dict)
    - proxies (dict)
    outputs:
    - requests.Response object or parsed JSON/text
  required_methods:
  - name: AkshareConfig
    description: Singleton configuration class storing global proxy settings used
      across each 400+ scraping functions
    evidence: akshare/utils/context.py:1
  - name: ProxyContext
    description: Context manager for temporarily changing proxy settings within a
      scoped block
    evidence: akshare/utils/context.py:31
  key_behaviors:
  - behavior: Exponential backoff with random jitter
    description: Retry delays increase exponentially (base_delay * 2^attempt) with
      random uniform jitter added to prevent thundering herd on rate-limited APIs
    evidence: akshare/utils/request.py:61(base_delay*(2**attempt)+random.uniform)
  - behavior: Session-per-request with connection pool disabled
    description: Creates new session for each request with pool_connections=1 to avoid
      connection reuse causing stale state when sources use load balancers
    evidence: akshare/utils/request.py:46(session with pool_connections=1)
  replaceable_points:
  - name: HTTP client
    description: Could swap the underlying HTTP client library for alternatives
    options:
    - name: requests
      traits:
      - Synchronous
      - Mature ecosystem
      - Wide adoption
      fit_for:
      - Standard scraping
      - Compatibility
      not_fit_for:
      - Async operations
      - HTTP/2
    - name: httpx
      traits:
      - Sync/async
      - Modern API
      - HTTP/2 support
      fit_for:
      - Async workflows
      - Modern codebases
      not_fit_for:
      - Legacy Python 3.8 compatibility
    - name: aiohttp
      traits:
      - Full async
      - High performance
      - Client/Server
      fit_for:
      - High concurrency
      - Web scraping at scale
      not_fit_for:
      - Simple synchronous scripts
    default: requests
  design_decisions:
  - 'Singleton for global proxy config: Single source of truth for proxies across
    400+ scraping functions (akshare/utils/context.py:4 __new__)'
  acceptance_hints:
  - Requests succeed with proper response for valid URLs
  - Retries occur on connection failures with exponential delay
  - Proxy settings are respected across each scraping functions
- id: data_acquisition
  name: Source-Specific Data Acquisition
  order: 2
  responsibility: Module-per-source scraping functions that call external APIs and
    websites (Sina, Eastmoney, Jin10, THS) to fetch raw financial data.
  interface:
    inputs:
    - symbol/date parameters
    - time period filters
    - source selection
    outputs:
    - raw JSON/text/HTML responses from external sources
  required_methods:
  - name: TLSAdapter
    description: Custom SSL adapter for TLS connections to handle certificate verification
      for economic data sources
    evidence: akshare/economic/macro_china.py:26
  - name: DataApi
    description: Premium API client with token-based authentication for paid data
      access
    evidence: akshare/pro/client.py:15
  key_behaviors:
  - behavior: Module-per-category organization
    description: 400+ functions grouped by financial domain (stock, futures, forex)
      and data source, mirroring the Chinese financial market structure
    evidence: akshare/stock/, akshare/futures/, akshare/forex/
  - behavior: Source-specific URL/param constants
    description: Source URLs and API parameters hardcoded in cons.py files per module;
      requires code updates when external APIs change
    evidence: akshare/futures/requests_fun.py:16(requests_link)
  - behavior: Symbol-to-market code mapping
    description: Futures symbols mapped to Sina internal market codes required for
      API calls
    evidence: akshare/futures/futures_zh_sina.py:100(_futures_symbol_mark_df)
  replaceable_points:
  - name: Data source
    description: Could add alternative sources for the same asset class when primary
      source becomes unavailable
    options:
    - name: Sina
      traits:
      - Real-time quotes
      - Widely used
      - Good coverage
      fit_for:
      - Chinese stocks
      - Futures
      not_fit_for:
      - US markets
      - Historical bulk data
    - name: Eastmoney
      traits:
      - Comprehensive
      - Official data
      - Fund data
      fit_for:
      - Fund data
      - Market statistics
      not_fit_for:
      - Real-time intraday
    - name: Jin10
      traits:
      - Futures focused
      - Commodities
      - Quick updates
      fit_for:
      - Commodity futures
      - Quick quotes
      not_fit_for:
      - Stock data
      - Historical analysis
    - name: THS
      traits:
      - Stock data
      - Factor calculations
      fit_for:
      - Stock factors
      - Technical indicators
      not_fit_for:
      - Futures
      - Forex
    default: Sina/Eastmoney
  design_decisions:
  - Module-per-category organization mirrors financial domain structure; 400+ functions
    grouped by data source (akshare/stock/, akshare/futures/, akshare/forex/)
  acceptance_hints:
  - Scraping functions return raw responses from external sources
  - Symbol parameters are correctly mapped to source-specific formats
  - Source constants resolve to valid URLs
- id: html_table_extraction
  name: HTML Table Extraction
  order: 3
  responsibility: Parses HTML tables from web pages containing structured financial
    data into pandas DataFrames using pandas.read_html or BeautifulSoup.
  interface:
    inputs:
    - HTML text response from web scraping
    outputs:
    - List of DataFrames or single DataFrame containing table data
  required_methods:
  - name: N/A
    description: No user-facing methods identified by assembly
    evidence: N/A
  key_behaviors:
  - behavior: 20-retry loop with 5-second sleep
    description: Web scraping is unreliable; 20 retries ensures data retrieval even
      with transient failures from Chinese websites
    evidence: akshare/futures/requests_fun.py:33(while True)
  - behavior: Encoding auto-detection fallback
    description: Chinese websites use mixed encodings (utf-8, gbk, gb2312); automatic
      detection with fallback parameters
    evidence: akshare/futures/requests_fun.py:36(encoding parameter)
  replaceable_points:
  - name: HTML parser
    description: Could swap the HTML parsing engine for different performance/feature
      tradeoffs
    options:
    - name: pandas.read_html
      traits:
      - Built on lxml
      - Simple API
      - Returns DataFrames directly
      fit_for:
      - Simple tables
      - Quick prototyping
      not_fit_for:
      - Complex HTML
      - Dynamic content
    - name: beautifulsoup
      traits:
      - Flexible
      - Feature-rich
      - Multiple parsers
      fit_for:
      - Complex HTML
      - Custom extraction
      not_fit_for:
      - Simple tables
      - Performance critical
    - name: lxml
      traits:
      - Fast C-based
      - Low memory
      - XPath support
      fit_for:
      - Large scale
      - Performance
      not_fit_for:
      - Quick scripts
      - Complex navigation
    default: pandas.read_html
  design_decisions:
  - 20-retry loop with 5-second sleep ensures data retrieval reliability from unreliable
    web sources (akshare/futures/requests_fun.py:33)
  - Encoding auto-detection fallback handles mixed Chinese website encodings (akshare/futures/requests_fun.py:36)
  acceptance_hints:
  - HTML tables are correctly parsed into DataFrames
  - Encoding errors are handled gracefully
  - Failed parsing attempts trigger retries
- id: json_parsing
  name: JSON Response Parsing
  order: 4
  responsibility: Parses JSON API responses from HTTP requests into Python dicts/lists
    for downstream data processing.
  interface:
    inputs:
    - JSON string/bytes from HTTP response body
    outputs:
    - Python dict/list representing parsed JSON structure
  required_methods:
  - name: N/A
    description: No user-facing methods identified by assembly
    evidence: N/A
  key_behaviors:
  - behavior: Empty JSON raises DataParsingError
    description: Distinguishes empty responses from actual data failures to enable
      proper error handling
    evidence: akshare/request.py:34(raise DataParsingError)
  - behavior: Rate limit status code 429 triggers RateLimitError
    description: Enables callers to handle rate limits explicitly rather than treating
      as generic failure
    evidence: akshare/request.py:39(raise RateLimitError)
  replaceable_points: []
  design_decisions:
  - Empty JSON raises DataParsingError to distinguish empty responses from actual
    data failures (akshare/request.py:34)
  - Rate limit status code 429 triggers RateLimitError for explicit handling by callers
    (akshare/request.py:39)
  acceptance_hints:
  - Valid JSON responses are correctly parsed into Python objects
  - Empty responses raise DataParsingError
  - Rate-limited responses raise RateLimitError
- id: column_mapping
  name: Column Name Standardization
  order: 5
  responsibility: Maps raw source field names (f1, f2, f12) to meaningful Chinese
    column names (最新价, 涨跌幅) for consistent output across different data sources.
  interface:
    inputs:
    - Raw DataFrame with source-specific column names
    outputs:
    - DataFrame with standardized Chinese column names
  required_methods:
  - name: set_df_columns
    description: Applies column name mapping with fallback to return empty DataFrame
      with proper column names when input is empty
    evidence: akshare/utils/func.py:63
  key_behaviors:
  - behavior: Chinese column names as standard
    description: Output uses Chinese column names as standard since target users are
      Chinese-speaking and source APIs also use Chinese field names
    evidence: akshare/stock_feature/stock_hist_em.py:254(columns)
  - behavior: Empty dataframe returns named columns
    description: Prevents downstream errors when data unavailable; maintains schema
      consistency by returning DataFrame with column names but zero rows
    evidence: akshare/utils/func.py:73(if df.shape==(0,0))
  replaceable_points:
  - name: Column naming convention
    description: Could add English column aliases for international users
    options:
    - name: Chinese
      traits:
      - Default
      - Native speakers
      - Source-compatible
      fit_for:
      - Chinese users
      - Documentation consistency
      not_fit_for:
      - International users
      - English-only codebases
    - name: English
      traits:
      - International standard
      - Programming convention
      fit_for:
      - English speakers
      - Integration with English code
      not_fit_for:
      - Chinese documentation
      - Legacy data compatibility
    - name: Both
      traits:
      - Maximum compatibility
      - Bilingual support
      fit_for:
      - Mixed teams
      - Transitioning codebases
      not_fit_for:
      - Increased maintenance
      - Larger output
    default: Chinese
  design_decisions:
  - Chinese column names as standard targets Chinese-speaking users; source APIs also
    use Chinese field names (akshare/stock_feature/stock_hist_em.py:254)
  - Empty dataframe returns named columns to prevent downstream errors while maintaining
    schema consistency (akshare/utils/func.py:73)
  acceptance_hints:
  - Raw column names (f1, f12) are mapped to meaningful Chinese names (最新价, 涨跌幅)
  - Empty DataFrames have correct column schema
  - Unmapped columns are either preserved or handled consistently
- id: type_conversion
  name: Data Type Conversion
  order: 6
  responsibility: Converts string columns to numeric types (float/int) to enable numerical
    analysis on financial data that arrives as strings from web sources.
  interface:
    inputs:
    - DataFrame with string/object columns
    outputs:
    - DataFrame with numeric columns (float64, int64)
  required_methods:
  - name: N/A
    description: No user-facing methods identified by assembly
    evidence: N/A
  key_behaviors:
  - behavior: Coerce errors to NaN
    description: Handles missing or corrupted values gracefully using errors='coerce'
      without failing the entire parse operation
    evidence: akshare/stock_feature/stock_hist_em.py:315(pd.to_numeric(...,errors='coerce'))
  replaceable_points: []
  design_decisions:
  - Coerce errors to NaN handles missing/corrupted values gracefully without failing
    entire parse (akshare/stock_feature/stock_hist_em.py:315)
  acceptance_hints:
  - String numeric values (e.g., '123.45') are converted to float64
  - Invalid values become NaN rather than raising errors
  - Non-numeric columns remain unchanged
- id: pagination
  name: Paginated Data Fetching
  order: 7
  responsibility: Iterates through multiple pages of API/web results and combines
    them into a single DataFrame for bulk data downloads.
  interface:
    inputs:
    - url with base_params including page number
    outputs:
    - Combined DataFrame across each pages
  required_methods:
  - name: fetch_paginated_data
    description: Handles pagination with progress bar display for user feedback during
      large downloads
    evidence: akshare/utils/func.py:18
  key_behaviors:
  - behavior: Random delay between page requests
    description: Reduces server load and avoids triggering anti-scraping measures
      with 0.5-1.5 second random delays
    evidence: akshare/utils/func.py:49(time.sleep(random.uniform(0.5,1.5)))
  replaceable_points: []
  design_decisions:
  - Random delay between page requests reduces server load and avoids anti-scraping
    measures (akshare/utils/func.py:49)
  acceptance_hints:
  - Multi-page requests are combined into single DataFrame
  - Progress bar shows pagination progress
  - Random delays prevent rate limiting
- id: trading_calendar
  name: Trading Calendar Validation
  order: 8
  responsibility: Validates date parameters against exchange trading calendars to
    skip non-trading days and normalize date formats for Chinese markets.
  interface:
    inputs:
    - date string (YYYYMMDD/YYYY-MM-DD/date object)
    outputs:
    - Normalized date object or list of trading dates
  required_methods:
  - name: get_rank_sum_daily
    description: Iterates trading days with calendar check to ensure only valid trading
      dates are processed
    evidence: akshare/futures/cot.py:56
  key_behaviors:
  - behavior: Triple date format acceptance
    description: Users provide dates in various formats; normalized to single internal
      format to simplify downstream processing
    evidence: akshare/futures/cot.py:85(convert_date())
  - behavior: Warn on non-trading day, continue
    description: Non-trading day encounters are non-fatal warnings for bulk downloads;
      user can filter warnings to see issues
    evidence: akshare/futures/cot.py:104(warnings.warn)
  replaceable_points:
  - name: Calendar source
    description: Could integrate external exchange calendar library for more accurate
      trading day calculations
    options:
    - name: builtin
      traits:
      - No dependencies
      - Maintained with library
      fit_for:
      - Standard use
      - Basic coverage
      not_fit_for:
      - Holiday edge cases
      - International exchanges
    - name: exchange_calendar
      traits:
      - Comprehensive
      - Actively maintained
      - Multiple exchanges
      fit_for:
      - Accurate calendars
      - US markets
      not_fit_for:
      - Added dependency
      - Chinese-specific holidays
    - name: trading_calendars
      tasks:
      - Zipline-based
      - Institutional grade
      fit_for:
      - Quant workflows
      - Backtesting
      not_fit_for:
      - Simple scripts
      - Lightweight needs
    default: builtin
  design_decisions:
  - Triple date format acceptance normalizes YYYYMMDD/YYYY-MM-DD/datetime.date to
    internal format (akshare/futures/cot.py:85)
  - Warn on non-trading day but continue processing for bulk downloads (akshare/futures/cot.py:104)
  acceptance_hints:
  - Date parameters are correctly normalized to single format
  - Non-trading days are detected and warned
  - Trading date iteration respects calendar
- id: adjustment_processing
  name: Price Adjustment Processing
  order: 9
  responsibility: Handles forward/backward price adjustment factors for historical
    stock data to enable accurate return calculations across different adjustment
    methods.
  interface:
    inputs:
    - raw price data DataFrame
    - adjust parameter (qfq/hfq/'')
    outputs:
    - Adjusted price DataFrame based on adjustment mode
  required_methods:
  - name: stock_zh_a_daily
    description: Supports qfq (forward) and hfq (backward) adjustment modes for historical
      stock prices
    evidence: akshare/stock/stock_zh_a_sina.py:127
  key_behaviors:
  - behavior: Adjustment factor embedded in URL params
    description: Source API handles adjustment calculation; akshare passes the adjustment
      parameter through to the source
    evidence: akshare/stock_feature/stock_hist_em.py:952(adjust parameter)
  - behavior: Three adjustment modes
    description: qfq=forward adjustment, hfq=backward adjustment, ''=no adjustment;
      covers each common use cases for returns analysis
    evidence: 'akshare/stock_feature/stock_hist_em.py:952(adjust: str='''')'
  replaceable_points: []
  design_decisions:
  - Adjustment factor embedded in URL params lets source API handle calculation (akshare/stock_feature/stock_hist_em.py:952)
  - Three adjustment modes (qfq/hfq/none) cover each common use cases (akshare/stock_feature/stock_hist_em.py:952)
  acceptance_hints:
  - qfq mode returns forward-adjusted prices
  - hfq mode returns backward-adjusted prices
  - Empty adjust parameter returns unadjusted prices
- id: volatility_calculation
  name: Realized Volatility Calculation
  order: 10
  responsibility: Mathematical computation of Yang-Zhang realized volatility from
    minute-level high-frequency price data for risk management and strategy development.
  interface:
    inputs:
    - minute-level price DataFrame (open/high/low/close/volume)
    outputs:
    - Realized volatility series
  required_methods:
  - name: volatility_yz_rv
    description: Yang-Zhang realized volatility algorithm implementing open-close,
      overnight, and continuous volatility components
    evidence: akshare/cal/rv.py:92
  key_behaviors:
  - behavior: Yang-Zhang formula specifically
    description: Implements open-close volatility plus overnight plus continuous components;
      considered academic standard for realized volatility
    evidence: akshare/cal/rv.py:92(volatility_yz_rv)
  - behavior: Wraps data fetching internally
    description: Convenience wrapper rv_from_stock_zh_a_hist_min_em hides data acquisition
      complexity from calculation logic
    evidence: akshare/cal/rv.py:13(rv_from_stock_zh_a_hist_min_em)
  replaceable_points:
  - name: Volatility estimator
    description: Could add other volatility estimators for different characteristics
      and use cases
    options:
    - name: Yang-Zhang
      traits:
      - Open-close decomposition
      - Academic standard
      - Overnight adjustment
      fit_for:
      - Daily vol estimation
      - Risk models
      not_fit_for:
      - Ultra-high frequency
      - Jump detection
    - name: Realized Kernel
      traits:
      - Noise-robust
      - Smooth
      - ' microstructure aware'
      fit_for:
      - High-frequency data
      - Noise-rich data
      not_fit_for:
      - Daily data
      - Simple use cases
    - name: Bipower Variation
      traits:
      - Jump-robust
      - Leverage-robust
      - Efficient
      fit_for:
      - Jump detection
      - Crash analysis
      not_fit_for:
      - Low-frequency data
      - Smooth vol only
    default: Yang-Zhang
  design_decisions:
  - Yang-Zhang formula specifically implements open-close plus overnight plus continuous
    volatility components (akshare/cal/rv.py:92)
  - Wraps data fetching internally via convenience wrapper hides complexity from calculation
    (akshare/cal/rv.py:13)
  acceptance_hints:
  - Yang-Zhang volatility is correctly computed from minute data
  - Output volatility series has proper index alignment
  - Wrapper function correctly fetches and processes data
data_flow:
- from_stage: external
  to_stage: http_request
  data: User-provided URLs, parameters, headers, and proxy configuration
- from_stage: http_request
  to_stage: data_acquisition
  data: requests.Response object containing HTTP response from external source
- from_stage: data_acquisition
  to_stage: json_parsing
  data: Raw JSON string/bytes from API responses
- from_stage: data_acquisition
  to_stage: html_table_extraction
  data: HTML text from web page scraping
- from_stage: json_parsing
  to_stage: column_mapping
  data: Python dict/list representing parsed JSON structure
- from_stage: html_table_extraction
  to_stage: column_mapping
  data: List of DataFrames parsed from HTML tables
- from_stage: column_mapping
  to_stage: type_conversion
  data: DataFrame with standardized column names but string/object data types
- from_stage: type_conversion
  to_stage: pagination
  data: DataFrame with properly typed numeric columns
- from_stage: pagination
  to_stage: trading_calendar
  data: Paginated request parameters including date filters
- from_stage: trading_calendar
  to_stage: data_acquisition
  data: Validated trading dates for source queries
- from_stage: pagination
  to_stage: adjustment_processing
  data: Combined DataFrame with date-indexed price data
- from_stage: adjustment_processing
  to_stage: external
  data: Adjusted price DataFrame ready for analysis
- from_stage: data_acquisition
  to_stage: volatility_calculation
  data: Minute-level price DataFrame for volatility computation
- from_stage: volatility_calculation
  to_stage: external
  data: Realized volatility series for risk/strategy analysis
- from_stage: type_conversion
  to_stage: external
  data: Final typed DataFrame for simple data retrieval functions
global_contracts:
- 'Every functions return pandas.DataFrame as primary output (akshare/futures/cot.py:73
  :rtype: pandas.DataFrame)'
- Date parameters accept YYYYMMDD, YYYY-MM-DD, or datetime.date format for user convenience
  (akshare/futures/cot.py:67 format：YYYY-MM-DD 或 YYYYMMDD 或 datetime.date对象)
- Empty results return DataFrame with column names but zero rows to maintain schema
  consistency (akshare/utils/func.py:73 if df.shape==(0,0):return DataFrame(columns=cols))
- Proxy settings stored in global singleton config ensuring single source of truth
  across each functions (akshare/utils/context.py:19 config=AkshareConfig())
- Numeric columns use errors='coerce' for invalid values to handle missing/corrupted
  data gracefully (akshare/stock_feature/stock_hist_em.py:315 pd.to_numeric(...,errors='coerce'))
business_decisions:
- id: BD-001
  type: B/BA
  content: Exponential backoff with random jitter on HTTP retry delays
  rationale: 'Prevents thundering herd problem on rate-limited APIs while staying
    respectful. Random jitter specifically addresses the assumption that multiple
    clients might retry simultaneously if using deterministic backoff. Breaking condition:
    if API changes rate limit policy to per-IP sliding window.'
  evidence: akshare/utils/request.py:61(module)
  stage: http_request
  alternative_considered: Fixed delay retry, token bucket rate limiting
  _evidence_issues:
  - 'FN_NOT_FOUND: module in akshare/utils/request.py'
- id: BD-002
  type: B/BA
  content: 20-retry loop with 5-second sleep for HTML table extraction
  rationale: 'Web scraping reliability is inherently unreliable; 20 retries ensures
    data retrieval even with transient failures. The assumption is that transient
    network failures are recoverable. Breaking condition: source implements hard rate
    limit without retry-after header.'
  evidence: akshare/futures/requests_fun.py:33(while True)
  stage: html_table_extraction
  alternative_considered: Circuit breaker pattern, adaptive retry with exponential
    backoff
  _evidence_issues:
  - 'INVALID_IDENTIFIER: while True in akshare/futures/requests_fun.py'
- id: BD-003
  type: B/BA
  content: Random delay between paginated page requests
  rationale: 'Reduces server load and avoids triggering anti-scraping measures. Assumes
    sources monitor request frequency. Breaking condition: source implements client
    fingerprinting beyond request frequency.'
  evidence: akshare/utils/func.py:49(module)
  stage: pagination
  alternative_considered: Increasing delay, proxy rotation instead of fixed delays
  _evidence_issues:
  - 'FN_NOT_FOUND: module in akshare/utils/func.py'
- id: BD-004
  type: B/BA
  content: Module-per-category organization (stock/futures/forex)
  rationale: 'Mirrors financial domain structure; 400+ functions grouped by data source.
    Assumes users navigate by asset class. Breaking condition: user needs cross-asset
    unified interface.'
  evidence: N/A:0(see_rationale)
  stage: data_acquisition
  alternative_considered: Unified function registry with asset class tags
- id: BD-005
  type: B/BA
  content: Source-specific URL/param constants hardcoded in cons.py
  rationale: 'External API changes require code updates; no external config. Assumes
    API URLs change infrequently. Breaking condition: source restructures API or changes
    domains.'
  evidence: akshare/futures/requests_fun.py:16(requests_link)
  stage: data_acquisition
  alternative_considered: External YAML/JSON config, environment variable overrides
- id: BD-006
  type: DK/B
  content: Symbol-to-market code mapping for futures (Sina internal codes)
  rationale: 'Sina uses internal market codes; mapping required for API calls. Domain
    knowledge specific to Chinese futures exchanges. Breaking condition: Sina changes
    internal symbol encoding.'
  evidence: akshare/futures/futures_zh_sina.py:100(_futures_symbol_mark_df)
  stage: data_acquisition
  alternative_considered: Symbol normalization layer, symbol database lookup
  _evidence_issues:
  - 'FN_NOT_FOUND: _futures_symbol_mark_df in akshare/futures/futures_zh_sina.py'
- id: BD-007
  type: BA/B
  content: Chinese column names as standard output
  rationale: 'Targets Chinese-speaking users; source APIs also use Chinese field names.
    Assumes Chinese market users are primary audience. Breaking condition: non-Chinese
    user adoption increases.'
  evidence: akshare/stock_feature/stock_hist_em.py:254(columns)
  stage: column_mapping
  alternative_considered: Dual language column names, configurable column naming
