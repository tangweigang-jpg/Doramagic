    quality issues, (3) Sina symbol mapping (BD-006) must correctly map symbols to
    market codes for data retrieval. If Sina changes internal symbol encoding, BD-006
    breaks, BD-028 gets corrupted data, and BD-027 produces wrong volatility estimates.
    The hidden dependency is that users calling the high-level volatility function
    have no visibility into these dependencies. Wrong volatility feeds into position
    sizing (BD-038), risk limits, and VaR calculations (BD-040), creating cascading
    impact from a symbol mapping change.'
  evidence: akshare/cal/rv.py:92(volatility_yz_rv)
  stage: global
  alternative_considered: Separable data fetching from calculation, explicit data
    quality checks before calculation, volatility output with confidence intervals
    showing data quality impact
- id: BD-INT-007
  type: B/BA
  content: 'INTERACTION: BD-029 (Adjustment factor pass-through) × BD-012 (Three adjustment
    modes) × BD-044 (Forward-adjusted dividend method) × BD-007 (Chinese column names)
    → Risk cascade of adjustment convention ambiguity'
  rationale: 'Four decisions create adjustment convention confusion: (1) BD-029 passes
    adjustment parameter directly to source API without validation, (2) BD-012 provides
    qfq/hfq/none modes, (3) BD-044 documents forward-adjustment choice, (4) BD-007
    outputs Chinese column names. The cascade: different data sources may interpret
    ''qfq'' differently (some use forward, some backward), BD-029 doesn''t normalize,
    BD-044 claims forward but source may differ, and BD-007''s Chinese output makes
    it harder for international users to spot adjustment differences. A user comparing
    data from different calls with same adjustment mode might see 5% price differences
    due to source-level differences in ex-dividend date handling. This affects any
    strategy comparing historical returns across periods or sources.'
  evidence: akshare/stock_feature/stock_hist_em.py:952(module)
  stage: global
  alternative_considered: Self-contained adjustment calculation with explicit methodology
    documentation, data provenance tracking, adjustment method metadata in output
  _evidence_issues:
  - 'FN_NOT_FOUND: module in akshare/stock_feature/stock_hist_em.py'
- id: BD-INT-008
  type: B/RC
  content: 'INTERACTION: BD-037 (Signal at bar close, execute next bar open) × BD-048
    (Survivorship bias mitigation) × BD-046 (Provider priority: Eastmoney→Wind→Sina)
    → Risk cascade of data consistency across backtest and live'
  rationale: 'Three decisions affecting backtest-live consistency: (1) BD-037 prevents
    look-ahead bias by using close signal → next open execution, (2) BD-048 includes
    historical constituents to prevent survivorship bias, (3) BD-046 prioritizes providers
    with different data semantics. The cascade: a signal generated on day T using
    close price is executed on T+1 open using potentially different provider data.
    If provider changed between signal and execution (BD-046 fallback), the open price
    might be from a different source with different auction mechanisms. BD-048 helps
    with survivorship bias but doesn''t address that current constituents might be
    missing data due to provider priority. High-frequency strategies with same-day
    rebalancing signals are most affected.'
  evidence: backtest_engine.py:156(execute_signals)
  stage: global
  alternative_considered: Single-provider consistency mode, provider change detection
    and alerting, execution price provenance tracking
  _evidence_issues:
  - 'NOT_FOUND: backtest_engine.py'
- id: air-001
  type: T
  content: Embedded JavaScript File Extraction Pattern for Web Scraping
  rationale: The air_zhenqi.py module uses embedded JavaScript files (crypto.js) that
    are extracted from the module directory and executed to decode obfuscated data
    from the Zhenqi air quality website. This pattern allows the scraper to handle
    JavaScript-rendered content without a full browser automation stack, improving
    performance while maintaining data extraction capability for sites that use client-side
    encryption.
  evidence: akshare/air/air_zhenqi.py:23(_get_js_path)
  stage: data_acquisition
  alternative_considered: Selenium/Playwright automation was rejected due to higher
    resource consumption and slower scraping speed
- id: air-002
  type: BA
  content: Multiple Period Granularity Options for Air Quality Historical Data
  rationale: The air_quality_hist function supports three period options (hour, day,
    month) to serve different analytical needs. Hourly data provides fine-grained
    analysis but with higher data volume and slower download speeds. This design acknowledges
    the trade-off between temporal resolution and data retrieval performance, allowing
    users to choose appropriate granularity for their use case.
  evidence: akshare/air/air_zhenqi.py:142(air_quality_hist)
  stage: type_conversion
  alternative_considered: Fixed daily granularity only was rejected as it would not
    serve high-frequency trading or research use cases
  vague_rationale: true
- id: bond-001
  type: T
  content: Session Registration Pattern for ChinaMoney Access
  rationale: The bond_china_money.py module implements a session registration mechanism
    (__bond_register_service) that must be called before accessing ChinaMoney APIs.
    The registration grants 24-hour direct API access for the registering IP address.
    This is a deliberate security and access control pattern chosen by the data source
    to prevent unauthorized scraping while allowing legitimate programmatic access
    within time bounds.
  evidence: akshare/bond/bond_china_money.py:16(__bond_register_service)
  stage: data_acquisition
  alternative_considered: IP whitelisting was not implemented; session-based registration
    balances security with accessibility
- id: bond-002
  type: T
  content: Multi-Source Bond Data Integration Architecture
  rationale: 'The bond module integrates data from at least 7 distinct sources: Sina
    Finance (bond_zh_sina.py), Eastmoney, Jisilu, ChinaMoney/ChinaForex, CNInfo, ChinaBond
    (cbond), and THS. This multi-source strategy provides comprehensive market coverage
    since no single source provides complete bond market data, and different sources
    excel in different bond segments (government bonds, corporates, convertibles).'
  evidence: N/A:0(see_rationale)
  stage: architecture
  alternative_considered: Single-source approach was rejected due to incomplete market
    coverage and higher dependency risk on one provider
- id: bond-003
  type: BA/DK
  content: Pagination Strategy for Government Regulatory Data
  rationale: 'The bank_cbirc_2020.py module uses a multi-step pagination strategy:
    first get total page count, then iterate through pages to collect each penalty
    records. This design handles the CBIRC website''s pagination limitation where
    results are split across pages, requiring sequential fetching. The begin parameter
    allows resuming from a specific page in case of interruption.'
  evidence: akshare/bank/bank_cbirc_2020.py:22(bank_fjcf_total_num)
  stage: data_acquisition
  alternative_considered: Single-page single-request pattern was rejected as government
    sites often limit total results per query
- id: currency-001
  type: T
  content: External API Integration with Optional API Key Management
  rationale: The currency.py module integrates with CurrencyScoop API for exchange
    rate data, with API key as an optional parameter. This design allows users to
    use the free tier (limited requests) or provide their own API key for higher rate
    limits. The external API approach provides reliable, professionally maintained
    exchange rate data versus scraping potentially unstable exchange websites.
  evidence: akshare/currency/currency.py:14(currency_latest)
  stage: data_acquisition
  alternative_considered: Scraping Bank of China website was chosen as primary source
    (currency_china_bank_sina.py) while CurrencyScoop provides international coverage
- id: economic-001
  type: T
  content: Centralized Jin10 Data Source for International Economic Indicators
  rationale: Multiple economic modules (macro_usa.py, macro_china.py, macro_euro.py,
    macro_bank.py) use Jin10 datacenter as a primary data source for international
    economic indicators. This centralized approach provides consistent data format
    and timing across countries. Jin10 aggregates official government releases into
    a single accessible platform, reducing the complexity of maintaining multiple
    source-specific scrapers.
  evidence: akshare/economic/macro_usa.py:16(__macro_usa_base_func)
  stage: architecture
  alternative_considered: Direct scraping of each country's official statistics website
    was rejected due to inconsistent formats, languages, and access methods
- id: economic-002
  type: BA/DK
  content: Country-Specific Economic Indicator Modules
  rationale: The economic module is organized by country (macro_usa, macro_japan,
    macro_china, macro_uk, macro_germany, macro_australia, macro_canada, macro_swiss,
    macro_china_hk), with each module providing country-specific indicators. This
    design reflects the reality that different countries publish different economic
    indicators relevant to their economies (e.g., Halifax housing index for UK, SVME
    PMI for Switzerland).
  evidence: N/A:0(see_rationale)
  stage: architecture
  alternative_considered: Single flat module with country parameter was rejected due
    to varying indicator sets and parameter formats per country
- id: economic-003
  type: T
  content: Custom TLS Adapter for SSL Certificate Handling
  rationale: The macro_china.py module implements a custom TLSAdapter class inheriting
    from HTTPAdapter to override the default SSL handling. This suggests the module
    needs to handle specific SSL certificate scenarios, possibly for accessing government
    or financial websites with non-standard certificates or to work around SSL verification
    issues in certain environments.
  evidence: akshare/economic/macro_china.py:26(TLSAdapter)
  stage: infrastructure
  alternative_considered: Using requests library default SSL verification was insufficient
    for target government financial sites
- id: economic-004
  type: T
  content: Tree-Based Indicator Navigation for National Bureau of Statistics
  rationale: The macro_china_nbs.py module implements a hierarchical tree navigation
    system (_get_nbs_tree, _get_nbs_wds_tree) to discover and query indicators from
    China's National Bureau of Statistics. This design accommodates the NBS website's
    complex categorization of statistical indicators across different time frequencies
    (monthly, quarterly, annual) and geographic levels (national, provincial, city).
  evidence: akshare/economic/macro_china_nbs.py:25(_get_nbs_tree)
  stage: data_acquisition
  alternative_considered: Static mapping of indicator codes was rejected due to the
    large number of available indicators and frequent updates
- id: article-001
  type: BA
  content: Academic Research Dataset Integration for Quantitative Finance
  rationale: The article module integrates specialized academic datasets including
    Oxford-Man Institute Realized Library (OMAN RV) for realized volatility, FRED-MD/FRED-QD
    for macroeconomic factors, and Fama-French factors. These are essential datasets
    for academic and quantitative finance research, providing historical realized
    volatility calculations and factor returns that are not available from typical
    financial data providers.
  evidence: akshare/article/risk_rv.py:18(article_oman_rv)
  stage: type_conversion
  alternative_considered: Manual data collection from academic sources was rejected
    as impractical for regular research workflows
- id: energy-001
  type: BA/DK
  content: Multi-Exchange Carbon Trading Data Aggregation
  rationale: The energy_carbon.py module aggregates carbon trading data from 6 different
    Chinese carbon exchanges (湖北, 上海, 北京, 重庆, 广东, 天津, 深圳, 福建) plus international EU
    data. This reflects China's pilot carbon market system where different provinces/cities
    operate independent exchanges. The unified interface allows users to analyze carbon
    pricing across the fragmented Chinese carbon market landscape.
  evidence: akshare/energy/energy_carbon.py:33(energy_carbon_domestic)
  stage: type_conversion
  alternative_considered: Single exchange focus was rejected as it would not reflect
    the distributed nature of China's carbon market
- id: bond-004
  type: T
  content: Cookie-Based Authentication for Jisilu Convertible Bond Data
  rationale: The bond_cb_jsl function requires users to provide their browser cookie
    for Jisilu access. This is a business decision by Jisilu to gate their convertible
    bond data behind authentication while allowing programmatic access for registered
    users. The cookie-based approach avoids API key management complexity while still
    controlling access.
  evidence: akshare/bond/bond_convert.py:31(bond_cb_jsl)
  stage: access_control
  alternative_considered: Official API was not available; scraping without authentication
    was blocked by Jisilu
- id: crypto-001
  type: BA
  content: Jin10 Data Center as Primary Source for Cryptocurrency Data
  rationale: The crypto modules use Jin10 datacenter for Bitcoin-related data (CME
    trading reports, holdings reports). Jin10 aggregates institutional cryptocurrency
    data sources (CME, ETF providers) into a single accessible platform. This design
    decision leverages existing infrastructure rather than building direct integrations
    with each institutional data provider.
  evidence: akshare/crypto/crypto_bitcoin_cme.py:13(crypto_bitcoin_cme)
  stage: data_acquisition
  alternative_considered: Direct CME API integration was rejected due to higher cost
    and complexity for institutional-grade data
- id: event-001
  type: BA/DK
  content: Baidu Migration Data Integration for Population Movement Analysis
  rationale: The migration.py module integrates Baidu Migration data to provide insights
    into population movement patterns within China. This data is valuable for economic
    analysis, urban planning, and understanding consumer behavior. The indicator-based
    design (move_in vs move_out) supports different analytical perspectives on migration
    patterns.
  evidence: akshare/event/migration.py:16(migration_area_baidu)
  stage: type_conversion
  alternative_considered: Cell phone location data APIs were not integrated due to
    privacy and access restrictions
