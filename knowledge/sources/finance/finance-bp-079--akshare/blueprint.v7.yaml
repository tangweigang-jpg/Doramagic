  type: T
  content: 'Support multiple data frequencies: 1, 5, 15, 30, 60 minute bars'
  rationale: Supported data frequency granularity is a feature scope decision that affects which analyses are possible but does not change results for a given frequency. Whether the system supports 1-minute
