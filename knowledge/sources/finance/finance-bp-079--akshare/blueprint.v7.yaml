- id: BD-078
  type: M
  content: YoY and MoM growth rate calculations for economic indicators
  rationale: Year-over-Year (YoY) growth = (current - same_period_last_year) / same_period_last_year removes seasonal effects by comparing to the same period. Month-over-Month (MoM) = (current - previous_month)
    / previous_month captures short-term momentum. These mathematical formulas are standard economic analysis methods. YoY is more stable for trend analysis; MoM captures turning points faster but is noisier.
    The choice between YoY and MoM affects economic cycle identification and thus trading signal timing.
