- id: BD-066
  type: B/DK
  content: Use sortino ratio as secondary risk metric (penalizes downside only)
  rationale: Sortino ratio (return / downside deviation) focuses only on negative volatility, addressing the Sharpe ratio's treatment of upside volatility as risk. This secondary metric influences how strategies
    with asymmetric return distributions are evaluated. Strategies with high upside but also high downside will score differently on Sortino versus Sharpe, potentially changing strategy selection.
