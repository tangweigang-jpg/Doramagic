- id: BD-070
  type: B
  content: Calculate profit factor as gross profit / gross loss ratio
  rationale: Profit factor (gross profits / gross losses) measures strategy profitability independent of trade count. A profit factor of 2.0 means gross profits are twice gross losses. This metric affects
    strategy viability assessment—strategies with PF < 1 are unprofitable regardless of win rate. Using net profit ratio or win/loss ratio instead would produce different strategy rankings and potentially
    miss strategies with high gross profits but low net due to costs.
  evidence: docs/demo.md:232(profit_factor)
  stage: performance_metrics
  alternative_considered: Net profit ratio, win-loss ratio
- id: BD-071
  type: M/DK
  content: Yang-Zhang Realized Volatility combines overnight, close, and Rogers-Satchell volatility with adaptive weighting k=0.34/(1.34+(n+1)/(n-1))
  rationale: Yang-Zhang (2000) is a published volatility estimator with proven optimal properties for open-high-low-close data. The formula RV² = Vo + k*Vc + (1-k)*Vrs achieves theoretically minimum variance
    by optimally weighting overnight, close, and range-based variance components. The adaptive k formula ensures proper weighting that depends on sample size, converging to 0.34 for large samples. This
    choice provides superior volatility estimation compared to simpler estimators like close-to-close or Parkinson, with up to 8x efficiency gain under realistic market conditions with overnight gaps.
  evidence: akshare/cal/rv.py:92(volatility_yz_rv)
  stage: risk_metrics
  alternative_considered: Simple RV (sum of squared returns), Parkinson, Garman-Klass
- id: BD-072
  type: M
  content: Overnight variance uses sample variance formula with n-1 denominator for unbiased estimation
  rationale: Sample variance with Bessel's correction (n-1 denominator) provides unbiased variance estimation assuming independent observations. This is standard statistical practice from the mathematical
    derivation that ensures E[S²] = σ². Using population variance (n denominator) would underestimate true variance; using MLE (n-1) would also be biased. This choice affects the overnight volatility component
    of Yang-Zhang and thus overall realized variance estimation precision.
  evidence: akshare/cal/rv.py:101(overnight)
  stage: risk_metrics
  alternative_considered: Population variance (n), MLE variance (n-1)
  _evidence_issues:
  - 'FN_NOT_FOUND: overnight in akshare/cal/rv.py'
- id: BD-073
  type: M/BA
  content: Logarithmic returns for price ratios to ensure additivity under continuous compounding
  rationale: 'Log returns (ln(Pt/Pt-1)) satisfy time-additivity: log return over N periods equals sum of N individual log returns. Simple returns ((P/P-1) - 1) do not add across time periods. This mathematical
    property is essential for realized variance calculations where returns are squared and summed. Log returns also approximate normal distribution under continuous compounding assumptions, making them
    suitable for parametric statistical analysis.'
  evidence: akshare/cal/rv.py:137(module)
  stage: volatility_aggregation
  alternative_considered: Simple return, percentage return
  _evidence_issues:
  - 'FN_NOT_FOUND: module in akshare/cal/rv.py'
- id: BD-074
  type: M
  content: Rogers-Satchell volatility proxy uses log price ratios with formula RS = ui(ui-ci) + di(di-ci)
  rationale: 'Rogers-Satchell (1994) is a named volatility estimator that captures range-based volatility using open, high, low, close prices. The formula captures the directional movement information:
    ui = ln(High/Open), ci = ln(Close/Open), di = ln(Low/Open). This estimator has zero bias for geometric Brownian motion without opening jumps. It is a component of Yang-Zhang, contributing the intraday
    range volatility that cannot be captured by close-to-close alone.'
  evidence: akshare/cal/rv.py:107(RS)
  stage: volatility_aggregation
  alternative_considered: Parkinson (H-L), Garman-Klass (O-H-L-C)
  _evidence_issues:
