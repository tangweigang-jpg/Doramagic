  content: Use 20-period Simple Moving Average (SMA) as the default trading signal threshold
  rationale: SMA period length directly determines trading frequency and signal generation timing. A 20-period SMA (versus 5 or 50 periods) creates a medium-term trend-following strategy that produces different
    entry/exit points and thus different PnL outcomes. This is a strategy hyperparameter choice that materially affects backtest performance. If changed to 5-period, the strategy would generate more signals
