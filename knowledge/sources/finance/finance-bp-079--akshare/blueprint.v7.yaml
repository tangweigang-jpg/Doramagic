- id: BD-076
  type: M
  content: Adaptive weight coefficient k depends on sample size n via formula k = 0.34/(1.34+(n+1)/(n-1))
  rationale: Yang-Zhang's adaptive weighting scheme varies k based on sample size, giving more weight to close variance as sample size increases. For n→∞, k→0.34; for small samples, k is smaller. This adaptive
    approach optimizes the bias-variance tradeoff, reducing estimation error across different sample sizes. The formula derives from Yang-Zhang's theoretical optimization and provides superior small-sample
    performance compared to fixed k=0.34.
  evidence: akshare/cal/rv.py:148(k)
