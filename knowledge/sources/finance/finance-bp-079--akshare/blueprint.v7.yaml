- id: BD-068
  type: M/BA
  content: Use Kelly criterion as position sizing guidance in backtest metrics
  rationale: Kelly criterion is a named mathematical formula (f* = (bp - q) / b) for optimal long-term growth position sizing. It derives from maximizing expected logarithm of wealth based on win rate (p),
    win/loss ratio (b), and loss probability (q). The formula maximizes geometric growth rate under ideal conditions but assumes unlimited leverage and known edge. Using fixed fraction or optimal-f instead
    would change position sizes and long-term growth characteristics.
  evidence: docs/demo.md:239(kelly_criterion)
  stage: position_sizing
  alternative_considered: Fixed fraction, optimal f
