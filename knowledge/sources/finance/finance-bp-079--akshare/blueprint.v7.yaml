- id: BD-075
  type: M/BA
  content: Daily aggregation via pandas Grouper for intraday data with freq='1D'
  rationale: Temporal aggregation converts intraday realized variance (computed from minute bars) to daily realized variance. The pandas Grouper with '1D' frequency groups bars by calendar day. This assumes
    regular trading hours and calendar-day boundaries for aggregation. The mathematical operation of summing intraday squared log returns produces the daily realized variance if no overnight gaps exist
    within the day. Different aggregation frequencies (hourly, custom windows) would produce different volatility estimates due to Jensen's inequality effects.
