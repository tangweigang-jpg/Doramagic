  content: Calculate roll yield using logarithmic price ratio normalized by months to expiry
  rationale: Logarithmic roll yield normalized by time-to-expiry is the standard academic formulation for futures term structure analysis. The log ratio ln(F1/F2) ensures additivity across time periods,
    while dividing by months-to-expiry annualizes the yield for comparison. This approach differs from simple ratio (F1/F2 - 1) which is not additive and doesn't account for time horizon differences. The
    mathematical formulation is essential for comparing roll yields across contracts with different expirations.
