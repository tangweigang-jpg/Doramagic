- id: BD-085
  type: B/BA
  content: 'INTERACTION: BD-048 (Stop loss 10%) × BD-030 (A-share T+1 constraint) → Amplification effect in limit-down scenarios'
  rationale: The 10% stop loss assumes same-day execution, but T+1 settlement prevents selling shares bought the same day. In a limit-down scenario (stock falls 10%, then another 10% next day), the position
    holder cannot exit at the stop loss price because T+1 blocks same-day selling. This creates a compounding loss effect where the actual loss far exceeds the nominal 10% stop, as the position remains
    locked through subsequent trading sessions until the position is no longer 'new'.
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Enforce T+1 logic in backtest engine or warn users when stop loss conflicts with settlement rules
- id: BD-086
  type: BA/DK
  content: 'INTERACTION: BD-039 (0.2% commission) × Missing stamp tax (0.05% on sell only) → Risk cascade of incomplete cost model'
  rationale: 'The commission rate of 0.2% explicitly excludes stamp tax, which is a mandatory A-share trading cost of 0.05% applied only on the sell side. Backtesting uses only commission for cost calculation,
    systematically overestimating strategy returns. For a strategy with 100% turnover, the missing 0.05% stamp tax underestimates total costs by ~25%. For high-frequency strategies with multiple round trips,
    this gap compounds significantly. This is a cascade: incomplete cost model → overestimated returns → wrong strategy selection → live losses.'
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Add stamp_tax parameter to commission model with default 0.0005 for sell transactions
- id: BD-087
  type: BA/DK
  content: 'INTERACTION: BD-030 (T+1 constraint) × BD-051 (Close-to-close PnL) → Hidden dependency causing inconsistent PnL calculation'
  rationale: Close-to-close PnL calculation assumes today's close minus today's close represents the trading day's return. However, T+1 means shares bought today cannot be sold today. The close-to-close
    return for a newly bought position is conceptually undefined until the position is held overnight. Backtesting using close-to-close PnL on T+0 assumption violates the market microstructure, producing
    incorrect position-level returns. The system silently computes returns for positions that legally cannot exist under the stated market rules.
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Implement T+1 state machine tracking position age and computing PnL only for sellable positions
- id: BD-088
  type: B/BA
  content: 'INTERACTION: BD-038 (1M initial cash) × BD-048 (10% stop loss) × BD-056 (100-share lot) → Risk cascade affecting position feasibility'
  rationale: With 1,000,000 capital and 100-share lot minimum, maximum position count is ~166 stocks (assuming equal allocation). The 10% stop loss creates a risk management boundary. However, with small-cap
    stocks priced below 1000 (10 RMB), a single lot costs ~1000, leaving capital fragmented across many tiny positions. Conversely, for high-priced stocks (100+ RMB), one lot = 10,000, limiting diversification.
    The combination of fixed lot size, fixed capital, and percentage stop creates position sizing that may violate either diversification goals or capital efficiency objectives simultaneously.
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Variable lot size, fractional shares support, or minimum position size parameter
- id: BD-089
  type: B
  content: 'INTERACTION: BD-026 (No caching) × BD-008 (0.5-1.5s delays) × BD-013 (Dual retry systems) → Risk cascade causing rate limit exhaustion'
  rationale: 'Three decisions compound to create API exhaustion risk: (1) No caching means repeated data fetches always hit APIs, (2) Fixed 0.5-1.5s delays between requests provide limited protection against
    rate limits, (3) Dual retry systems with different strategies may cause overlapping retries that double request volume. When a batch job with multiple modules (futures, options, stock data) runs, each
    module independently retries failures, potentially generating 3-6x the normal request volume. Combined with no caching, sustained operation can trigger IP blocking from data providers.'
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Unified retry policy with circuit breaker, distributed cache, adaptive rate limiting
- id: BD-090
  type: M
  content: 'INTERACTION: BD-040 (Yang-Zhang RV) × BD-046 (Rogers-Satchell component) × BD-072 (Overnight variance n-1) → Amplification of variance estimation errors'
  rationale: Yang-Zhang realized variance (BD-040) combines three volatility estimators with adaptive weighting. An error in any component (overnight variance using n-1 denominator in BD-072, or Rogers-Satchell
    calculation in BD-046) propagates into the final composite estimate. Since k=0.34/(1.34+(n+1)/(n-1)) itself contains n-1 in denominator, small sample sizes amplify both component variances and weighting
    coefficient errors. A 5% bias in overnight variance becomes 0.05*(1-k)*Vrs contribution to final RV, multiplying through position sizing and risk calculations downstream.
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Independent volatility estimators with ensemble averaging
- id: BD-091
  type: B/BA
  content: 'INTERACTION: BD-032 (Calendar file) × BD-045 (Calendar validation) × BD-059 (Non-trading day filter) → Risk cascade from calendar data integrity'
  rationale: 'Trading calendar data (BD-032) determines valid trading days for futures and COT data. If calendar.json contains errors (outdated holidays, missing maintenance days), both validation (BD-045)
    and filtering (BD-059) will propagate incorrect assumptions downstream. Incorrect calendar data causes: (1) COT data fetching on non-reporting days returns empty results, (2) Strategy logic executes
    on invalid dates, (3) Historical backtests include non-trading days as if markets operated. The single point of failure in calendar.json creates systemic risk across each calendar-dependent modules.'
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: API-based calendar with integrity checks, automated holiday update mechanism
- id: BD-092
  type: T
  content: 'INTERACTION: BD-019 (200+ hardcoded URLs) × BD-004 (JSON config files) → Hidden dependency on configuration synchronization'
  rationale: Hardcoded URL templates in source code and JSON configuration files for calendar data represent two different configuration management approaches that can drift out of sync. When data providers
    change URLs (common in Chinese financial APIs), developers must update both hardcoded strings AND JSON config files to maintain consistency. The hidden dependency is that JSON calendar/config changes
    may be assumed to cover URL changes, but hardcoded URLs are not automatically updated. This creates silent failures where APIs return 404 or stale data because the URL changed but was only updated in
    one location.
  evidence: N/A:0(see_rationale)
  stage: cross_stage
  alternative_considered: Centralized URL registry service, configuration-driven URL management
