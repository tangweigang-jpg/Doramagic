id: finance-bp-079
name: AKShare
stages:
- id: http_request
  name: HTTP Request Layer
  order: 1
  responsibility: Handles all outbound HTTP requests with retry logic, exponential backoff, and proxy rotation to prevent IP blocking during data scraping operations.
  interface:
    inputs:
    - url (string)
    - params (dict)
    - headers (dict)
    - proxies (dict)
    outputs:
    - requests.Response object or parsed JSON/text
  required_methods:
  - name: AkshareConfig
    description: Singleton configuration class storing global proxy settings used across all 400+ scraping functions
    evidence: akshare/utils/context.py:1
  - name: ProxyContext
    description: Context manager for temporarily changing proxy settings within a scoped block
    evidence: akshare/utils/context.py:31
  key_behaviors:
  - behavior: Exponential backoff with random jitter
    description: Retry delays increase exponentially (base_delay * 2^attempt) with random uniform jitter added to prevent thundering herd on rate-limited APIs
    evidence: akshare/utils/request.py:61(base_delay*(2**attempt)+random.uniform)
  - behavior: Session-per-request with connection pool disabled
    description: Creates new session for each request with pool_connections=1 to avoid connection reuse causing stale state when sources use load balancers
    evidence: akshare/utils/request.py:46(session with pool_connections=1)
  replaceable_points:
  - name: HTTP client
    description: Could swap the underlying HTTP client library for alternatives
    options:
    - name: requests
      traits:
      - Synchronous
      - Mature ecosystem
      - Wide adoption
      fit_for:
      - Standard scraping
      - Compatibility
      not_fit_for:
      - Async operations
      - HTTP/2
    - name: httpx
      traits:
      - Sync/async
      - Modern API
      - HTTP/2 support
      fit_for:
      - Async workflows
      - Modern codebases
      not_fit_for:
      - Legacy Python 3.8 compatibility
    - name: aiohttp
      traits:
      - Full async
      - High performance
      - Client/Server
      fit_for:
      - High concurrency
      - Web scraping at scale
      not_fit_for:
      - Simple synchronous scripts
    default: requests
  design_decisions:
  - 'Singleton for global proxy config: Single source of truth for proxies across 400+ scraping functions (akshare/utils/context.py:4 __new__)'
  acceptance_hints:
  - Requests succeed with proper response for valid URLs
  - Retries occur on connection failures with exponential delay
  - Proxy settings are respected across all scraping functions
- id: data_acquisition
  name: Source-Specific Data Acquisition
  order: 2
  responsibility: Module-per-source scraping functions that call external APIs and websites (Sina, Eastmoney, Jin10, THS) to fetch raw financial data.
  interface:
    inputs:
    - symbol/date parameters
    - time period filters
    - source selection
    outputs:
    - raw JSON/text/HTML responses from external sources
  required_methods:
  - name: TLSAdapter
    description: Custom SSL adapter for TLS connections to handle certificate verification for economic data sources
    evidence: akshare/economic/macro_china.py:26
  - name: DataApi
    description: Premium API client with token-based authentication for paid data access
    evidence: akshare/pro/client.py:15
  key_behaviors:
  - behavior: Module-per-category organization
    description: 400+ functions grouped by financial domain (stock, futures, forex) and data source, mirroring the Chinese financial market structure
    evidence: akshare/stock/, akshare/futures/, akshare/forex/
  - behavior: Source-specific URL/param constants
    description: Source URLs and API parameters hardcoded in cons.py files per module; requires code updates when external APIs change
    evidence: akshare/futures/requests_fun.py:16(requests_link)
  - behavior: Symbol-to-market code mapping
    description: Futures symbols mapped to Sina internal market codes required for API calls
    evidence: akshare/futures/futures_zh_sina.py:100(_futures_symbol_mark_df)
  replaceable_points:
  - name: Data source
    description: Could add alternative sources for the same asset class when primary source becomes unavailable
    options:
    - name: Sina
      traits:
      - Real-time quotes
      - Widely used
      - Good coverage
      fit_for:
      - Chinese stocks
      - Futures
      not_fit_for:
      - US markets
      - Historical bulk data
    - name: Eastmoney
      traits:
      - Comprehensive
      - Official data
      - Fund data
      fit_for:
      - Fund data
      - Market statistics
      not_fit_for:
      - Real-time intraday
    - name: Jin10
      traits:
      - Futures focused
      - Commodities
      - Quick updates
      fit_for:
      - Commodity futures
      - Quick quotes
      not_fit_for:
      - Stock data
      - Historical analysis
    - name: THS
      traits:
      - Stock data
      - Factor calculations
      fit_for:
      - Stock factors
      - Technical indicators
      not_fit_for:
      - Futures
      - Forex
    default: Sina/Eastmoney
  design_decisions:
  - Module-per-category organization mirrors financial domain structure; 400+ functions grouped by data source (akshare/stock/, akshare/futures/, akshare/forex/)
  acceptance_hints:
  - Scraping functions return raw responses from external sources
  - Symbol parameters are correctly mapped to source-specific formats
  - Source constants resolve to valid URLs
- id: html_table_extraction
  name: HTML Table Extraction
  order: 3
  responsibility: Parses HTML tables from web pages containing structured financial data into pandas DataFrames using pandas.read_html or BeautifulSoup.
  interface:
    inputs:
    - HTML text response from web scraping
    outputs:
    - List of DataFrames or single DataFrame containing table data
  required_methods: []
  key_behaviors:
  - behavior: 20-retry loop with 5-second sleep
    description: Web scraping is unreliable; 20 retries ensures data retrieval even with transient failures from Chinese websites
    evidence: akshare/futures/requests_fun.py:33(while True)
  - behavior: Encoding auto-detection fallback
    description: Chinese websites use mixed encodings (utf-8, gbk, gb2312); automatic detection with fallback parameters
    evidence: akshare/futures/requests_fun.py:36(encoding parameter)
  replaceable_points:
  - name: HTML parser
    description: Could swap the HTML parsing engine for different performance/feature tradeoffs
    options:
    - name: pandas.read_html
      traits:
      - Built on lxml
      - Simple API
      - Returns DataFrames directly
      fit_for:
      - Simple tables
      - Quick prototyping
      not_fit_for:
      - Complex HTML
      - Dynamic content
    - name: beautifulsoup
      traits:
      - Flexible
      - Feature-rich
      - Multiple parsers
      fit_for:
      - Complex HTML
      - Custom extraction
      not_fit_for:
      - Simple tables
      - Performance critical
    - name: lxml
      traits:
      - Fast C-based
      - Low memory
      - XPath support
      fit_for:
      - Large scale
      - Performance
      not_fit_for:
      - Quick scripts
      - Complex navigation
    default: pandas.read_html
  design_decisions:
  - 20-retry loop with 5-second sleep ensures data retrieval reliability from unreliable web sources (akshare/futures/requests_fun.py:33)
  - Encoding auto-detection fallback handles mixed Chinese website encodings (akshare/futures/requests_fun.py:36)
  acceptance_hints:
  - HTML tables are correctly parsed into DataFrames
  - Encoding errors are handled gracefully
  - Failed parsing attempts trigger retries
- id: json_parsing
  name: JSON Response Parsing
  order: 3
  responsibility: Parses JSON API responses from HTTP requests into Python dicts/lists for downstream data processing.
  interface:
    inputs:
    - JSON string/bytes from HTTP response body
    outputs:
    - Python dict/list representing parsed JSON structure
  required_methods: []
  key_behaviors:
  - behavior: Empty JSON raises DataParsingError
    description: Distinguishes empty responses from actual data failures to enable proper error handling
    evidence: akshare/request.py:34(raise DataParsingError)
  - behavior: Rate limit status code 429 triggers RateLimitError
    description: Enables callers to handle rate limits explicitly rather than treating as generic failure
    evidence: akshare/request.py:39(raise RateLimitError)
  replaceable_points: []
  design_decisions:
  - Empty JSON raises DataParsingError to distinguish empty responses from actual data failures (akshare/request.py:34)
  - Rate limit status code 429 triggers RateLimitError for explicit handling by callers (akshare/request.py:39)
  acceptance_hints:
  - Valid JSON responses are correctly parsed into Python objects
  - Empty responses raise DataParsingError
  - Rate-limited responses raise RateLimitError
- id: column_mapping
  name: Column Name Standardization
  order: 4
  responsibility: Maps raw source field names (f1, f2, f12) to meaningful Chinese column names (最新价, 涨跌幅) for consistent output across different data sources.
  interface:
    inputs:
    - Raw DataFrame with source-specific column names
    outputs:
    - DataFrame with standardized Chinese column names
  required_methods:
  - name: set_df_columns
    description: Applies column name mapping with fallback to return empty DataFrame with proper column names when input is empty
    evidence: akshare/utils/func.py:63
  key_behaviors:
  - behavior: Chinese column names as standard
    description: Output uses Chinese column names as standard since target users are Chinese-speaking and source APIs also use Chinese field names
    evidence: akshare/stock_feature/stock_hist_em.py:254(columns)
  - behavior: Empty dataframe returns named columns
    description: Prevents downstream errors when data unavailable; maintains schema consistency by returning DataFrame with column names but zero rows
    evidence: akshare/utils/func.py:73(if df.shape==(0,0))
  replaceable_points:
  - name: Column naming convention
    description: Could add English column aliases for international users
    options:
    - name: Chinese
      traits:
      - Default
      - Native speakers
      - Source-compatible
      fit_for:
      - Chinese users
      - Documentation consistency
      not_fit_for:
      - International users
      - English-only codebases
    - name: English
      traits:
      - International standard
      - Programming convention
      fit_for:
      - English speakers
      - Integration with English code
      not_fit_for:
      - Chinese documentation
      - Legacy data compatibility
    - name: Both
      traits:
      - Maximum compatibility
      - Bilingual support
      fit_for:
      - Mixed teams
      - Transitioning codebases
      not_fit_for:
      - Increased maintenance
      - Larger output
    default: Chinese
  design_decisions:
  - Chinese column names as standard targets Chinese-speaking users; source APIs also use Chinese field names (akshare/stock_feature/stock_hist_em.py:254)
  - Empty dataframe returns named columns to prevent downstream errors while maintaining schema consistency (akshare/utils/func.py:73)
  acceptance_hints:
  - Raw column names (f1, f12) are mapped to meaningful Chinese names (最新价, 涨跌幅)
  - Empty DataFrames have correct column schema
  - Unmapped columns are either preserved or handled consistently
- id: type_conversion
  name: Data Type Conversion
  order: 5
  responsibility: Converts string columns to numeric types (float/int) to enable numerical analysis on financial data that arrives as strings from web sources.
  interface:
    inputs:
    - DataFrame with string/object columns
    outputs:
    - DataFrame with numeric columns (float64, int64)
  required_methods: []
  key_behaviors:
  - behavior: Coerce errors to NaN
    description: Handles missing or corrupted values gracefully using errors='coerce' without failing the entire parse operation
    evidence: akshare/stock_feature/stock_hist_em.py:315(pd.to_numeric(...,errors='coerce'))
  replaceable_points: []
  design_decisions:
  - Coerce errors to NaN handles missing/corrupted values gracefully without failing entire parse (akshare/stock_feature/stock_hist_em.py:315)
  acceptance_hints:
  - String numeric values (e.g., '123.45') are converted to float64
  - Invalid values become NaN rather than raising errors
  - Non-numeric columns remain unchanged
- id: pagination
  name: Paginated Data Fetching
  order: 6
  responsibility: Iterates through multiple pages of API/web results and combines them into a single DataFrame for bulk data downloads.
  interface:
    inputs:
    - url with base_params including page number
    outputs:
    - Combined DataFrame across all pages
  required_methods:
  - name: fetch_paginated_data
    description: Handles pagination with progress bar display for user feedback during large downloads
    evidence: akshare/utils/func.py:18
  key_behaviors:
  - behavior: Random delay between page requests
    description: Reduces server load and avoids triggering anti-scraping measures with 0.5-1.5 second random delays
    evidence: akshare/utils/func.py:49(time.sleep(random.uniform(0.5,1.5)))
  replaceable_points: []
  design_decisions:
  - Random delay between page requests reduces server load and avoids anti-scraping measures (akshare/utils/func.py:49)
  acceptance_hints:
  - Multi-page requests are combined into single DataFrame
  - Progress bar shows pagination progress
  - Random delays prevent rate limiting
- id: trading_calendar
  name: Trading Calendar Validation
  order: 7
  responsibility: Validates date parameters against exchange trading calendars to skip non-trading days and normalize date formats for Chinese markets.
  interface:
    inputs:
    - date string (YYYYMMDD/YYYY-MM-DD/date object)
    outputs:
    - Normalized date object or list of trading dates
  required_methods:
  - name: get_rank_sum_daily
    description: Iterates trading days with calendar check to ensure only valid trading dates are processed
    evidence: akshare/futures/cot.py:56
  key_behaviors:
  - behavior: Triple date format acceptance
    description: Users provide dates in various formats; normalized to single internal format to simplify downstream processing
    evidence: akshare/futures/cot.py:85(convert_date())
  - behavior: Warn on non-trading day, continue
    description: Non-trading day encounters are non-fatal warnings for bulk downloads; user can filter warnings to see issues
    evidence: akshare/futures/cot.py:104(warnings.warn)
  replaceable_points:
  - name: Calendar source
    description: Could integrate external exchange calendar library for more accurate trading day calculations
    options:
    - name: builtin
      traits:
      - No dependencies
      - Maintained with library
      fit_for:
      - Standard use
      - Basic coverage
      not_fit_for:
      - Holiday edge cases
      - International exchanges
    - name: exchange_calendar
      traits:
      - Comprehensive
      - Actively maintained
      - Multiple exchanges
      fit_for:
      - Accurate calendars
      - US markets
      not_fit_for:
      - Added dependency
      - Chinese-specific holidays
    - name: trading_calendars
      tasks:
      - Zipline-based
      - Institutional grade
      fit_for:
      - Quant workflows
      - Backtesting
      not_fit_for:
      - Simple scripts
      - Lightweight needs
    default: builtin
  design_decisions:
  - Triple date format acceptance normalizes YYYYMMDD/YYYY-MM-DD/datetime.date to internal format (akshare/futures/cot.py:85)
  - Warn on non-trading day but continue processing for bulk downloads (akshare/futures/cot.py:104)
  acceptance_hints:
  - Date parameters are correctly normalized to single format
  - Non-trading days are detected and warned
  - Trading date iteration respects calendar
- id: adjustment_processing
  name: Price Adjustment Processing
  order: 8
  responsibility: Handles forward/backward price adjustment factors for historical stock data to enable accurate return calculations across different adjustment methods.
  interface:
    inputs:
    - raw price data DataFrame
    - adjust parameter (qfq/hfq/'')
    outputs:
    - Adjusted price DataFrame based on adjustment mode
  required_methods:
  - name: stock_zh_a_daily
    description: Supports qfq (forward) and hfq (backward) adjustment modes for historical stock prices
    evidence: akshare/stock/stock_zh_a_sina.py:127
  key_behaviors:
  - behavior: Adjustment factor embedded in URL params
    description: Source API handles adjustment calculation; akshare passes the adjustment parameter through to the source
    evidence: akshare/stock_feature/stock_hist_em.py:952(adjust parameter)
  - behavior: Three adjustment modes
    description: qfq=forward adjustment, hfq=backward adjustment, ''=no adjustment; covers all common use cases for returns analysis
    evidence: 'akshare/stock_feature/stock_hist_em.py:952(adjust: str='''')'
  replaceable_points: []
  design_decisions:
  - Adjustment factor embedded in URL params lets source API handle calculation (akshare/stock_feature/stock_hist_em.py:952)
  - Three adjustment modes (qfq/hfq/none) cover all common use cases (akshare/stock_feature/stock_hist_em.py:952)
  acceptance_hints:
  - qfq mode returns forward-adjusted prices
  - hfq mode returns backward-adjusted prices
  - Empty adjust parameter returns unadjusted prices
- id: volatility_calculation
  name: Realized Volatility Calculation
  order: 9
  responsibility: Mathematical computation of Yang-Zhang realized volatility from minute-level high-frequency price data for risk management and strategy development.
  interface:
    inputs:
    - minute-level price DataFrame (open/high/low/close/volume)
    outputs:
    - Realized volatility series
  required_methods:
  - name: volatility_yz_rv
    description: Yang-Zhang realized volatility algorithm implementing open-close, overnight, and continuous volatility components
    evidence: akshare/cal/rv.py:92
  key_behaviors:
  - behavior: Yang-Zhang formula specifically
    description: Implements open-close volatility plus overnight plus continuous components; considered academic standard for realized volatility
    evidence: akshare/cal/rv.py:92(volatility_yz_rv)
  - behavior: Wraps data fetching internally
    description: Convenience wrapper rv_from_stock_zh_a_hist_min_em hides data acquisition complexity from calculation logic
    evidence: akshare/cal/rv.py:13(rv_from_stock_zh_a_hist_min_em)
  replaceable_points:
  - name: Volatility estimator
    description: Could add other volatility estimators for different characteristics and use cases
    options:
    - name: Yang-Zhang
      traits:
      - Open-close decomposition
      - Academic standard
      - Overnight adjustment
      fit_for:
      - Daily vol estimation
      - Risk models
      not_fit_for:
      - Ultra-high frequency
      - Jump detection
    - name: Realized Kernel
      traits:
      - Noise-robust
      - Smooth
      - ' microstructure aware'
      fit_for:
      - High-frequency data
      - Noise-rich data
      not_fit_for:
      - Daily data
      - Simple use cases
    - name: Bipower Variation
      traits:
      - Jump-robust
      - Leverage-robust
      - Efficient
      fit_for:
      - Jump detection
      - Crash analysis
      not_fit_for:
      - Low-frequency data
      - Smooth vol only
    default: Yang-Zhang
  design_decisions:
  - Yang-Zhang formula specifically implements open-close plus overnight plus continuous volatility components (akshare/cal/rv.py:92)
  - Wraps data fetching internally via convenience wrapper hides complexity from calculation (akshare/cal/rv.py:13)
  acceptance_hints:
  - Yang-Zhang volatility is correctly computed from minute data
  - Output volatility series has proper index alignment
  - Wrapper function correctly fetches and processes data
source:
  commit_hash: e47f1ad65fd497258cbf4c6d0a722bbdb6519ab4
  extraction_methods:
  - semi_auto
  projects:
  - akshare
sop_version: '3.6'
business_decisions:
- id: BD-001
  type: T
  content: Session-per-request pattern with pool_connections=1
  rationale: HTTP connection pool configuration is a pure infrastructure choice with no impact on data semantics. Swapping to persistent sessions or higher pool size does not change any analysis output.
  evidence: akshare/utils/request.py:48(HTTPAdapter)
  stage: http_request_layer
  alternative_considered: Connection pooling with pool_connections>1 could reduce latency
  _evidence_issues:
  - 'FN_NOT_FOUND: HTTPAdapter in akshare/utils/request.py'
- id: BD-002
  type: T
  content: demjson library used as fallback parser for malformed JSON
  rationale: Parser choice between demjson and standard json library is an implementation detail that does not change business output. Both produce equivalent DataFrames.
  evidence: akshare/stock/stock_zh_a_sina.py:61(module)
  stage: json_parsing
  alternative_considered: Standard json.loads with pre-processing regex could replace demjson
  _evidence_issues:
  - 'FN_NOT_FOUND: module in akshare/stock/stock_zh_a_sina.py'
- id: BD-003
  type: T
  content: Token file storage at ~/tk.csv with file-based token management
  rationale: Token storage location and file format are infrastructure choices. Any credential management system achieving the same authentication goal produces identical results.
  evidence: akshare/utils/token_process.py:18(module)
  stage: http_request_layer
  alternative_considered: Environment variables, keyring, or encrypted config file could replace plaintext file
  _evidence_issues:
  - 'FN_NOT_FOUND: module in akshare/utils/token_process.py'
- id: BD-004
  type: T
  content: JSON configuration files in file_fold directory for calendar data
  rationale: Configuration file format (JSON vs YAML vs database) is an infrastructure decision with no impact on trading analysis results.
  evidence: akshare/option/cons.py:84(module)
  stage: url_config_registry
  alternative_considered: Embedded data, database, or API-based calendar could replace file-based approach
  _evidence_issues:
  - 'FN_NOT_FOUND: module in akshare/option/cons.py'
- id: BD-005
  type: T
  content: AkshareConfig singleton pattern for proxy configuration
  rationale: Configuration management pattern is a code organization choice. Any pattern (singleton, dependency injection, global state) achieving the same configuration scope produces identical data outputs.
  evidence: akshare/utils/context.py:4(__new__)
  stage: http_request_layer
  alternative_considered: Dependency injection or context managers could replace singleton
- id: BD-006
  type: T
  content: Progress bar via tqdm library in bulk data operations
  rationale: UI/UX choice for data fetching progress indication. Disabling or replacing with different progress library does not affect data correctness.
  evidence: akshare/utils/func.py:44(get_tqdm)
  stage: data_pagination
  alternative_considered: Rich, click, or custom progress widgets could replace tqdm
  _evidence_issues:
  - 'FN_NOT_FOUND: get_tqdm in akshare/utils/func.py'
- id: BD-007
  type: B
  content: Exponential backoff with random jitter for API retry logic
  rationale: Retry policy directly affects success rate of data fetching and may cause timeout failures under different network conditions, changing the returned dataset.
  evidence: akshare/utils/request.py:15(request_with_retry)
  stage: http_request_layer
  alternative_considered: Fixed delay retry, linear backoff, or circuit breaker pattern
- id: BD-008
  type: B/RC
  content: Random 0.5-1.5 second delays between pagination requests
  rationale: Rate limiting directly affects whether APIs block requests and whether data retrieval succeeds, changing the complete dataset returned.
  evidence: akshare/utils/func.py:49(time.sleep)
  stage: data_pagination
  alternative_considered: Adaptive rate limiting based on response headers
  _evidence_issues:
  - 'FN_NOT_FOUND: time.sleep in akshare/utils/func.py'
- id: BD-009
  type: B/DK
  content: Triple adjustment modes (qfq forward / hfq backward / none) for price data
  rationale: Adjustment mode directly changes OHLCV prices, affecting any downstream analysis like returns, technical indicators, and strategy signals.
  evidence: akshare/stock/stock_zh_a_sina.py:142(adjust)
  stage: stock_market_data
  alternative_considered: Single default mode with parameter override
  _evidence_issues:
  - 'FN_NOT_FOUND: adjust in akshare/stock/stock_zh_a_sina.py'
- id: BD-010
  type: B/BA
  content: Symbol prefix convention (sh=Shanghai, sz=Shenzhen) for Chinese exchanges
  rationale: Symbol format determines which exchange is queried. Incorrect format returns wrong data or fails, changing system behavior.
  evidence: akshare/stock/stock_zh_a_sina.py:30(default)
  stage: stock_market_data
  alternative_considered: Numeric exchange codes, ISIN, or auto-detection
  _evidence_issues:
  - 'FN_NOT_FOUND: default in akshare/stock/stock_zh_a_sina.py'
- id: BD-011
  type: B
  content: Period code mapping (101=daily, 102=weekly, 103=monthly) across EastMoney APIs
  rationale: Period parameter directly controls data frequency returned, changing any time series analysis result.
  evidence: akshare/stock_feature/stock_hist_em.py:980(period_dict)
  stage: stock_market_data
  alternative_considered: String-based period names, enum types
  _evidence_issues:
  - 'FN_NOT_FOUND: period_dict in akshare/stock_feature/stock_hist_em.py'
- id: BD-012
  type: B/DK
  content: Market ID mapping (SH=1, SZ=0) for EastMoney ETF API
  rationale: Exchange identifier controls which market is queried. Wrong ID returns empty data or wrong securities.
  evidence: akshare/fund/fund_etf_em.py:220(get_market_id)
  stage: fund_data
  alternative_considered: Direct exchange name strings
- id: BD-013
  type: B
  content: Two parallel HTTP request systems with different retry strategies
  rationale: Inconsistent retry behavior across modules causes unpredictable API success rates, affecting data completeness.
  evidence: akshare/request.py:10(module)
  stage: http_request_layer
  alternative_considered: Single unified HTTP client with consistent retry
  _evidence_issues:
  - 'FN_NOT_FOUND: module in akshare/request.py'
- id: BD-014
  type: B/BA
  content: DataApi default timeout of 10 seconds
  rationale: Timeout directly affects whether slow network conditions cause failures, changing returned data under adverse conditions.
  evidence: akshare/pro/client.py:19(module)
  stage: http_request_layer
  alternative_considered: Adaptive timeout based on historical latency
  _evidence_issues:
  - 'FN_NOT_FOUND: module in akshare/pro/client.py'
- id: BD-015
  type: B
  content: Top-N ranking (5/10/15/20 members) fetched simultaneously in single request
  rationale: API design choice affects data granularity returned; reducing tiers reduces information available for analysis.
  evidence: akshare/futures/cot.py:56(get_rank_sum_daily)
  stage: futures_cot_analysis
  alternative_considered: Individual tier requests or configurable tier selection
- id: BD-016
  type: B
  content: Variety vs specific contract vs main contract distinction in futures symbols
  rationale: Symbol type determines which contract data is retrieved, affecting whether analysis uses continuous series or expiring contracts.
  evidence: akshare/futures/futures_zh_sina.py:28(symbol_mark)
  stage: futures_market_data
  alternative_considered: Unified symbol format with explicit parameters
  _evidence_issues:
  - 'FN_NOT_FOUND: symbol_mark in akshare/futures/futures_zh_sina.py'
- id: BD-017
  type: B/DK
  content: Different exchange data formats requiring separate parsing functions (CZCE text, DCE HTML, CFFEX JSON)
  rationale: Exchange-specific parsing is required for data correctness; adding new exchange requires new parser implementation.
