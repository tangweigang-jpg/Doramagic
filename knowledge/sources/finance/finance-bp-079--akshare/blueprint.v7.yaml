applicability:
  domain: finance
  task_type: Financial data acquisition and normalization library for Chinese markets
  description: Python library that simplifies fetching financial data from Chinese sources (stocks, futures, forex, macroeconomics) by providing 400+ functions that scrape, parse, and normalize data into
    standardized pandas DataFrames.
  prerequisites: Python 3.9+ required; basic understanding of pandas DataFrames; knowledge of Chinese financial market data sources
  not_suitable_for: Real-time trading systems requiring sub-second latency; non-Chinese market data; high-frequency trading; production systems requiring cached data; projects needing type-safe interfaces
global_contracts:
- 'All functions return pandas.DataFrame as primary output (akshare/futures/cot.py:73 :rtype: pandas.DataFrame)'
- Date parameters accept YYYYMMDD, YYYY-MM-DD, or datetime.date format for user convenience (akshare/futures/cot.py:67 format：YYYY-MM-DD 或 YYYYMMDD 或 datetime.date对象)
- Empty results return DataFrame with column names but zero rows to maintain schema consistency (akshare/utils/func.py:73 if df.shape==(0,0):return DataFrame(columns=cols))
- Proxy settings stored in global singleton config ensuring single source of truth across all functions (akshare/utils/context.py:19 config=AkshareConfig())
- Numeric columns use errors='coerce' for invalid values to handle missing/corrupted data gracefully (akshare/stock_feature/stock_hist_em.py:315 pd.to_numeric(...,errors='coerce'))
