  content: Set commission rate to 0.2% (0.002) for stock trades
  rationale: Commission rate directly reduces net strategy returns. The 0.2% rate represents a typical retail investor commission assumption for A-share trading. This rate assumption excludes stamp tax
    (0.05% on sell side only) which is a mandatory A-share cost. Changing commission to 0.1% or 0.3% would proportionally change net returns, making a marginally profitable strategy unprofitable or vice
    versa. The assumption that commission is the only trading cost underestimates actual costs.
  evidence: docs/demo.md:334(commission)
  stage: backtest_config
  alternative_considered: 0.1%, 0.3%
- id: BD-040
  type: M/DK
  content: 'Use Yang-Zhang formula for realized volatility calculation: RV² = Vo + k*Vc + (1-k)*Vrs'
  rationale: Yang-Zhang is a named volatility estimator with proven statistical properties (theoretically minimum variance among open-high-low-close estimators). The formula combines overnight variance,
    close variance, and Rogers-Satchell range-based variance with optimal weighting k. This choice provides up to 8x efficiency over close-to-close estimator under realistic market conditions. Changing
    to simpler estimators like Parkinson (uses only high-low range) would produce materially different volatility estimates, affecting any strategy that uses volatility for position sizing or risk management.
  evidence: akshare/cal/rv.py:92(volatility_yz_rv)
  stage: risk_metrics
  alternative_considered: Parkinson, Garman-Klass, Rogers-Satchell
