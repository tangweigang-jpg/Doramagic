id: finance-bp-079
name: AKShare
sop_version: '3.6'
source:
  projects:
  - akshare
  commit_hash: e47f1ad65fd497258cbf4c6d0a722bbdb6519ab4
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Financial data retrieval and web scraping API
  description: Python library that simplifies fetching financial and economic data
    from Chinese financial websites including stocks, futures, funds, forex, and macroeconomic
    indicators.
  prerequisites: Python 3.9+ (64-bit), basic understanding of pandas DataFrames, familiarity
    with Chinese financial markets
  not_suitable_for: Trading execution or order placement, real-time streaming market
    data, non-Chinese market data (though some US/HK support exists), production trading
    systems requiring guaranteed data reliability
stages:
- id: http_request
  name: HTTP Request Layer
  order: 1
  responsibility: Handles each outbound HTTP requests with retry logic, exponential
    backoff, and proxy support. Prevents connection pool reuse issues and handles
    transient failures gracefully.
  interface:
    inputs:
    - URL string
    - params dict
    - optional proxies
    outputs:
    - requests.Response object with raw server response
  required_methods:
  - name: request_with_retry
    description: Performs HTTP GET request with automatic retries using exponential
      backoff and random jitter to handle transient failures
    evidence: akshare/utils/request.py:48
  key_behaviors:
  - behavior: Connection pool isolation
    description: Uses session per request with pool_connections=1, pool_maxsize=1
      to prevent connection reuse that causes 400 errors on some financial sites
    evidence: akshare/utils/request.py:48
  - behavior: Exponential backoff with jitter
    description: Retries with exponential backoff and random jitter to respect server
      rate limits while avoiding thundering herd problems
    evidence: akshare/utils/request.py:61
  - behavior: Singleton proxy configuration
    description: Global proxy state accessible via AkshareConfig singleton without
      explicit passing across modules
    evidence: akshare/utils/context.py:4
  replaceable_points:
  - name: HTTPAdapter
    description: TLS/SSL adapter for legacy SSL cipher support on older financial
      sites
    options:
    - name: TLSAdapter
      traits:
      - Default
      - Standard SSL handling
      fit_for:
      - Most financial sites
      - Modern TLS versions
      not_fit_for:
      - Legacy sites with old SSL ciphers
    - name: LegacySSLAdapter
      traits:
      - Legacy renegotiation support
      - Extended cipher suite
      fit_for:
      - chinamoney.org.cn
      - Sites with outdated SSL
      not_fit_for:
      - Modern secure sites
    default: TLSAdapter
  design_decisions:
  - Session per request with pool_connections=1, pool_maxsize=1 prevents connection
    reuse issues that cause 400 errors on some financial sites (akshare/utils/request.py:48)
  - Exponential backoff + random jitter on retries respects server rate limits while
    randomizing to avoid thundering herd (akshare/utils/request.py:61)
  - Singleton AkshareConfig for proxy state enables global proxy without explicit
    passing (akshare/utils/context.py:4)
  acceptance_hints:
  - HTTP requests complete within 15 second timeout
  - Retries occur on 4xx/5xx responses
  - Proxy settings persist across function calls when set
- id: data_fetching
  name: Data Source Fetching
  order: 2
  responsibility: Implements source-specific fetch functions that construct URLs,
    headers, and params for each data provider. Each module targets a specific website
    (EastMoney, Sina, THS, etc.).
  interface:
    inputs:
    - symbol/string identifiers
    - date ranges
    - market indicators
    outputs:
    - Raw JSON/text from external API
  required_methods:
  - name: DataApi
    description: Pro API client with token authentication for premium data access
    evidence: akshare/pro/client.py:15
  key_behaviors:
  - behavior: Module-per-source architecture
    description: Each data source has independent code allowing per-source updates
      without affecting others
    evidence: akshare/stock_feature/stock_hist_em.py:1
  - behavior: Bot detection evasion
    description: Hardcoded Chrome User-Agent reduces probability of being blocked
      by financial sites
    evidence: akshare/utils/cons.py:7
  - behavior: SSL compatibility layer
    description: TLSAdapter extends HTTPAdapter to support legacy SSL ciphers used
      by some Chinese financial sites
    evidence: akshare/economic/macro_china.py:26
  replaceable_points:
  - name: Data source
    description: Which website to fetch financial data from
    options:
    - name: EastMoney (em)
      traits:
      - Primary source
      - Most comprehensive
      fit_for:
      - Stocks
      - Funds
      - Futures
      - Forex
      not_fit_for:
      - Sites not covered by EastMoney
    - name: Sina
      traits:
      - Alternative source
      fit_for:
      - Some real-time quotes
      not_fit_for:
      - Historical data
    - name: THS (10jqka)
      traits:
      - Technology-focused
      fit_for:
      - THS-specific data
      not_fit_for:
      - General financial data
    - name: JS (jinshi)
      traits:
      - Commodity focus
      fit_for:
      - Jin10 commodity data
      not_fit_for:
      - Stock data
    default: EastMoney
  design_decisions:
  - Module-per-source architecture allows per-source updates without affecting others
    (akshare/stock_feature/stock_hist_em.py:1)
  - Hardcoded User-Agent header reduces bot traffic detection (akshare/utils/cons.py:7)
  - TLSAdapter extends HTTPAdapter for legacy SSL cipher support (akshare/economic/macro_china.py:26)
  acceptance_hints:
  - URLs are correctly constructed with proper parameters
  - Headers are properly set for each source
  - Symbol formats match source requirements
- id: pagination
  name: Pagination Handling
  order: 3
  responsibility: Handles paginated API responses by iterating through pages and merging
    results. Uses randomized delays between requests to avoid rate limiting.
  interface:
    inputs:
    - URL
    - base_params dict
    - timeout
    outputs:
    - Combined pandas DataFrame with each pages
  required_methods:
  - name: fetch_paginated_data
    description: Fetches each pages by first determining total pages from initial
      response, then iterates through remaining pages with random delays
    evidence: akshare/utils/func.py:34
  key_behaviors:
  - behavior: Total page discovery
    description: Fetches first page to determine total page count from API response,
      avoiding extra metadata calls
    evidence: akshare/utils/func.py:34
  - behavior: Randomized request delays
    description: 0.5-1.5 second random delay between page requests reduces server
      load and rate limit triggers
    evidence: akshare/utils/func.py:49
  replaceable_points:
  - name: Page iteration strategy
    description: How to traverse paginated API responses
    options:
    - name: Increment page param
      traits:
      - Default
      - Simple offset logic
      fit_for:
      - Most APIs
      - Fixed page sizes
      not_fit_for:
      - Cursor-based APIs
    - name: Cursor-based
      traits:
      - Token-based navigation
      fit_for:
      - Infinite scroll APIs
      - Real-time data
      not_fit_for:
      - Simple page-number APIs
    - name: Offset-based
      traits:
      - Start/limit parameters
      fit_for:
      - Databases
      - SQL-like APIs
      not_fit_for:
      - Count-based pagination
    default: Increment page param
  design_decisions:
  - Fetch first page to determine total pages - most APIs return total count in first
    response (akshare/utils/func.py:34)
  - Random 0.5-1.5s delay between pages reduces server load and rate limit triggers
    (akshare/utils/func.py:49)
  acceptance_hints:
  - Every pages are fetched and merged correctly
  - No duplicate rows in combined DataFrame
  - Progress bar shows accurate page count
- id: data_parsing
  name: Data Parsing
  order: 4
  responsibility: Converts raw HTTP responses (JSON, text, pipe-delimited) into pandas
    DataFrames. Handles various data formats from different sources.
  interface:
    inputs:
    - Raw response text/JSON
    outputs:
    - pandas DataFrame with normalized structure
  required_methods:
  - name: set_df_columns
    description: Ensures empty DataFrames have proper column schema defined even when
      no data is returned
    evidence: akshare/utils/func.py:73
  key_behaviors:
  - behavior: Unified column normalization
    description: Each exchange uses different field names for similar data; normalization
      enables uniform downstream processing
    evidence: akshare/futures/futures_settle.py:59
  - behavior: Lenient JSON parsing
    description: demjson handles malformed JSON from legacy financial APIs that don't
      produce valid JSON
    evidence: akshare/utils/demjson.py:1
  - behavior: Consistent empty result handling
    description: Empty DataFrames maintain column schema to prevent downstream errors
    evidence: akshare/utils/func.py:73
  replaceable_points:
  - name: Parser
    description: JSON/text parsing engine for handling various response formats
    options:
    - name: demjson (lenient)
      traits:
      - Handles malformed JSON
      - More forgiving
      fit_for:
      - Legacy APIs
      - Malformed responses
      not_fit_for:
      - Strict JSON validation
    - name: json (strict)
      traits:
      - Standard library
      - Fast parsing
      fit_for:
      - Well-formed JSON
      - Performance critical
      not_fit_for:
      - Malformed responses
    - name: pandas read_html
      traits:
      - HTML table parsing
      fit_for:
      - Web scraping
      - HTML tables
      not_fit_for:
      - JSON responses
    default: json/demjson
  design_decisions:
  - Unified settlement column normalization - each exchange uses different field names
    (akshare/futures/futures_settle.py:59)
  - demjson for lenient JSON parsing handles malformed JSON from legacy APIs (akshare/utils/demjson.py:1)
  acceptance_hints:
  - DataFrames always have proper columns even when empty
  - Date values are parsed correctly across each formats
  - Numeric values are not accidentally parsed as strings
