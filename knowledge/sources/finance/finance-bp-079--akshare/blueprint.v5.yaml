business_decisions:
- id: BD-001
  type: T
  content: Session per request with pool_connections=1, pool_maxsize=1 to prevent
    connection reuse issues
  rationale: Connection pool configuration is a pure infrastructure choice; swapping
    to larger pool sizes would still fetch correct data albeit with potential 400
    errors from some servers. The pool size does not affect mathematical precision
    or business output semantics.
  evidence: akshare/utils/request.py:15(request_with_retry)
  stage: http_request
  alternative_considered: pool_maxsize=10 would be faster but causes 400 errors on
    some financial sites
- id: BD-002
  type: T
  content: Exponential backoff with random jitter on HTTP retries to respect rate
    limits
  rationale: Retry strategy is a standard HTTP resilience pattern; changing max_retries
    or backoff multiplier does not affect data semantics, only success probability
    under load.
  evidence: akshare/utils/request.py:15(request_with_retry)
  stage: http_request
  alternative_considered: Linear backoff was rejected due to thundering herd risk;
    constant delay rejected due to rate limit sensitivity
- id: BD-003
  type: T
  content: Singleton AkshareConfig for global proxy state management
  rationale: Singleton pattern is a code organization choice; swapping to dependency
    injection or module-level global would change behavior only for testability, not
    business output.
  evidence: akshare/utils/context.py:4(AkshareConfig.__new__)
  stage: http_request
  alternative_considered: Dependency injection rejected for verbosity; ProxyContext
    provides isolation when needed
- id: BD-004
  type: T
  content: Module-per-source architecture with one Python module per data provider
  rationale: Code organization choice; swapping module boundaries does not affect
    data semantics, only maintainability and update isolation.
  evidence: akshare/stock_feature/stock_hist_em.py:1(module)
  stage: data_fetching
  alternative_considered: Generic fetcher was rejected due to unique per-site quirks
    requiring custom logic
  _evidence_issues:
  - 'FN_NOT_FOUND: module in akshare/stock_feature/stock_hist_em.py'
- id: BD-005
  type: BA
  content: Hardcoded User-Agent header using Chrome browser identifier
  rationale: Assumes Chinese financial sites block non-browser traffic based on User-Agent
    detection; this assumption may become invalid as sites update bot detection.
  evidence: akshare/utils/cons.py:7(headers)
  stage: data_fetching
  alternative_considered: Using requests default User-Agent rejected due to higher
    blocking rate; rotating multiple UAs considered but adds complexity
  _evidence_issues:
  - 'FN_NOT_FOUND: headers in akshare/utils/cons.py'
- id: BD-006
  type: DK
  content: TLSAdapter extends HTTPAdapter to support legacy SSL ciphers for Chinese
    financial sites
  rationale: Chinese financial infrastructure includes legacy systems using outdated
    SSL/TLS configurations that modern Python rejects; this is market-specific knowledge
    about PRC financial infrastructure.
  evidence: akshare/economic/macro_china.py:26(TLSAdapter)
  stage: data_fetching
  alternative_considered: Using urllib3 default rejected as incompatible with legacy
    sites; skipping these sources rejected as data loss
- id: BD-007
  type: B
  content: Fetch first page to determine total pages before paginating
  rationale: Optimizes for the common case where APIs return total count in first
    response; reduces API calls by 1 per request but changes failure semantics if
    API doesn't follow this pattern.
  evidence: akshare/utils/func.py:18(fetch_paginated_data)
  stage: pagination
  alternative_considered: Fetching metadata endpoint first rejected due to additional
    API call; offset-based without total rejected as less common pattern
- id: BD-008
  type: B/RC
  content: Random 0.5-1.5 second delay between paginated requests
  rationale: Intentional delay to reduce server load and avoid rate limiting; changing
    delay affects success rate under load but not data semantics.
  evidence: akshare/utils/func.py:18(fetch_paginated_data)
  stage: pagination
  alternative_considered: No delay rejected due to rate limiting; longer delay (2-5s)
    rejected due to user experience impact
- id: BD-009
  type: B/DK
  content: Unified settlement column normalization across futures exchanges
  rationale: Each Chinese exchange uses different field names for settlement data;
    normalization enables uniform downstream processing but may lose exchange-specific
    nuances.
  evidence: akshare/futures/futures_settle.py:59(_normalize_settle_columns)
  stage: data_parsing
  alternative_considered: Returning raw exchange format rejected due to downstream
    complexity; maintaining separate parsers for each exchange rejected due to code
    duplication
- id: BD-010
  type: M/BA
  content: demjson library for lenient JSON parsing of malformed API responses
  rationale: demjson handles non-standard JSON extensions found in legacy Chinese
    financial APIs; using strict json would fail on these malformed responses, causing
    data loss.
  evidence: akshare/utils/demjson.py:3711(JSON)
  stage: data_parsing
  alternative_considered: strict json rejected as too many legacy APIs would fail;
    custom parser rejected as too complex
- id: BD-011
  type: T
  content: Every market data functions pre-loaded and exposed in __init__.py for instant
    access
  rationale: Import-time exposure is a usability optimization; lazy loading would
    have identical behavior with different import semantics.
  evidence: akshare/__init__.py:1(module)
  stage: stock_realtime
  alternative_considered: Lazy loading rejected as less Pythonic for this use case;
    explicit import rejected as less convenient
  _evidence_issues:
