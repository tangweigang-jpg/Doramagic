    functions fail silently or with cryptic errors, (4) BD-059''s aggregation depends on proper index.
    Users expecting ''just fetch and calculate'' must understand the data structure contract that isn''t
    enforced o'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Automatic datetime parsing and explicit column mapping with validation
- id: BD-GAP-001
  type: B
  content: Baidu Migration API returns only top100 results per area-indicator combination, with a fallback
    to return each results if fewer than 100 exist
  rationale: Baidu's public migration API caps responses at 100 records to limit data exposure; the code
    silently handles the <100 case by returning whatever exists rather than raising an error. This boundary
    means migration flow analysis for small regions may be incomplete.
  evidence: akshare/event/migration.py:16(migration_area_baidu)
  stage: data_acquisition
  alternative_considered: Could query multiple dates or use different indicator types to accumulate more
    data
- id: BD-GAP-002
  type: B/BA
  content: Area parameter requires full official names (e.g., '重庆市', '广州市') rather than abbreviations
    or codes
  rationale: Baidu API expects standardized Chinese administrative names; using abbreviations or English
    names causes silent failures. This constraint forces users to know the exact naming convention or
    results in empty datasets without error messages.
  evidence: akshare/event/migration.py:56(migration_scale_baidu)
  stage: data_acquisition
  alternative_considered: Could provide a name normalization layer or list valid area names
- id: BD-GAP-003
  type: B/DK
  content: Fortune 500 rankings start from 1996; earlier years are unavailable through the scraping interface
  rationale: Fortune China only archives rankings from 1996 onward on their website; attempting to query
    earlier years returns empty or error results. This historical boundary limits long-term trend analysis.
  evidence: akshare/fortune/fortune_500.py:40(fortune_rank)
  stage: data_acquisition
  alternative_considered: Could integrate with archived sources like Wayback Machine for pre-1996 data
- id: BD-GAP-004
  type: BA
  content: Hurun ranking supports 9 distinct indicator types with different result structures and year
    availability
  rationale: Each Hurun ranking type (百富榜, 全球富豪榜, 独角兽榜, etc.) has different publication years and data
    schemas. The function accepts any indicator string but returns whatever structure the source provides,
    creating inconsistent DataFrames across ranking types.
  evidence: akshare/fortune/fortune_hurun.py:16(hurun_rank)
  stage: data_acquisition
  alternative_considered: Could normalize outputs to a common schema with nullable columns
- id: BD-GAP-005
  type: B
  content: Bloomberg Billionaires Index historical data only available for select years (2018, 2019, 2021)
  rationale: The archived source (areppim.com) only maintains snapshots for specific years, not a continuous
    series. This gaps the data for 2020 and most of 2022+, making time-series analysis incomplete.
  evidence: akshare/fortune/fortune_bloomberg.py:14(index_bloomberg_billionaires_hist)
  stage: data_acquisition
  alternative_considered: Could scrape Bloomberg directly or use the present-day API
- id: BD-GAP-006
  type: BA/DK
  content: Each futures exchange has a dedicated module with identical function signatures but different
    date validation rules
  rationale: SHFE, DCE, CZCE, CFFEX, INE, and GFEX each require trade dates, but only some validate that
    the date is actually a trading day. CZCE and CFFEX require explicit YYYYMMDD dates while DCE works
    without dates. This inconsistency causes confusing failures when switching between exchanges.
  evidence: akshare/futures_derivative/futures_contract_info_shfe.py:13(futures_contract_info_shfe)
  stage: data_acquisition
  alternative_considered: Could create a unified interface with automatic trading day detection
- id: BD-GAP-007
  type: BA/DK
  content: 'HOG (hog futures) module uses symbol-based categorization: 三元/外三元/内三元 for pig type, separate
    functions for cost/supply dimensions'
  rationale: Pig market data is intentionally separated into Core (价格), Cost (成本), and Supply (供应) dimensions
    with different symbol vocabularies. This models the real agricultural commodity structure but creates
    3 separate function families that users must navigate.
  evidence: akshare/futures_derivative/futures_hog.py:13(futures_hog_core)
  stage: data_acquisition
  alternative_considered: Could provide a single function with dimension parameter
- id: BD-GAP-008
  type: BA/DK
  content: Sina futures main contract uses pseudo-symbol 'V0' for the default/latest contract, with actual
    symbols fetched from futures_display_main_sina
  rationale: V0 is a convention representing 'latest main contract' without a specific expiry. This requires
    a discovery step (futures_display_main_sina) before historical queries. The 22220101 end date default
    is an artificial far-future bound.
  evidence: akshare/futures_derivative/futures_index_sina.py:103(futures_main_sina)
  stage: data_acquisition
  alternative_considered: Could auto-resolve V0 on function entry
- id: BD-GAP-009
  type: B/BA
  content: LegacySSLAdapter implements custom pool manager initialization to handle outdated SSL configurations
    on chinamoney.com.cn
  rationale: The China Foreign Exchange Trade System website uses legacy SSL configurations incompatible
    with modern Python SSL defaults. The custom HTTPAdapter subclass patches this by overriding init_poolmanager
    to use legacy TLS settings. This is a known compatibility hack that may become a security liability.
  evidence: akshare/fx/fx_c_swap_cm.py:16(LegacySSLAdapter)
  stage: Infrastructure
  alternative_considered: Could use requests Session with configured SSL context or negotiate with source
    to update SSL
- id: BD-GAP-010
  type: B
  content: 'Movie box office date constraints enforce natural calendar boundaries: daily only previous
    day, weekly only complete weeks, monthly only complete months'
  rationale: ENData API enforces these constraints presumably for data consistency (finalized numbers).
    The code passes these constraints through directly rather than validating or explaining them. Users
    cannot easily query 'today's incomplete data'.
  evidence: akshare/movie/movie_yien.py:112(movie_boxoffice_daily)
  stage: data_acquisition
  alternative_considered: Could add a 'realtime' flag or proxy endpoint
- id: BD-GAP-011
  type: M
  content: JS decryption code is bundled within the module files (jm.js embedded) rather than fetched
    dynamically
  rationale: The decryption algorithm for ENData's encrypted responses is stored as a JavaScript file
    alongside the Python code. This creates a tight coupling where any API encryption changes require
    module updates. The file is read from disk at runtime.
  evidence: akshare/movie/movie_yien.py:33(_get_file_content)
  stage: data_acquisition
  alternative_considered: Could use Selenium/Playwright to execute JS in browser context, or maintain
    decryption separately
- id: BD-GAP-012
  type: T
  content: get_current_week calculates Monday of the week containing a given date, used to align weekly
    box office queries
  rationale: Week-based票房 queries require the Monday date to align with the API's week definition. The
    function converts any YYYYMMDD date to its week's Monday. This enforces a specific week-start convention
    (Monday) that may differ from user expectations.
  evidence: akshare/movie/movie_yien.py:48(get_current_week)
  stage: data_acquisition
  alternative_considered: Could accept week identifier or allow week-start customization
- id: BD-GAP-013
  type: B/RC
  content: Baidu Finance calendar requires secure cookie acquisition before each session, raising ConnectionError
    on failure
  rationale: Baidu Finance calendar data is behind authentication that requires valid cookies. The _get_baidu_cookie
    function fetches and validates cookies, raising ConnectionError if the network request fails. This
    means any network issue blocks each calendar data retrieval.
  evidence: akshare/news/news_baidu.py:16(_get_baidu_cookie)
  stage: data_acquisition
  alternative_considered: Could cache cookies with expiry or accept user-provided tokens
- id: BD-GAP-014
  type: B
  content: CCTV news data available from 20160203 onward; attempting earlier dates returns empty results
  rationale: The source (CCTV) only archives text content from February 3, 2016. No validation prevents
