    using pandas.read_html or BeautifulSoup.
  interface:
    inputs:
    - HTML text response from web scraping
    outputs:
    - List of DataFrames or single DataFrame containing table data
  required_methods:
  - name: N/A
    description: No user-facing methods identified by assembly
    evidence: N/A
  key_behaviors:
  - behavior: 20-retry loop with 5-second sleep
    description: Web scraping is unreliable; 20 retries ensures data retrieval even with transient failures
      from Chinese websites
    evidence: akshare/futures/requests_fun.py:33(while True)
  - behavior: Encoding auto-detection fallback
    description: Chinese websites use mixed encodings (utf-8, gbk, gb2312); automatic detection with fallback
      parameters
    evidence: akshare/futures/requests_fun.py:36(encoding parameter)
  replaceable_points:
  - name: HTML parser
    description: Could swap the HTML parsing engine for different performance/feature tradeoffs
    options:
    - name: pandas.read_html
      traits:
      - Built on lxml
      - Simple API
      - Returns DataFrames directly
      fit_for:
      - Simple tables
      - Quick prototyping
      not_fit_for:
      - Complex HTML
      - Dynamic content
    - name: beautifulsoup
      traits:
      - Flexible
      - Feature-rich
      - Multiple parsers
      fit_for:
      - Complex HTML
      - Custom extraction
      not_fit_for:
      - Simple tables
      - Performance critical
    - name: lxml
      traits:
      - Fast C-based
      - Low memory
      - XPath support
      fit_for:
      - Large scale
      - Performance
      not_fit_for:
      - Quick scripts
      - Complex navigation
    default: pandas.read_html
  design_decisions:
  - 20-retry loop with 5-second sleep ensures data retrieval reliability from unreliable web sources (akshare/futures/requests_fun.py:33)
  - Encoding auto-detection fallback handles mixed Chinese website encodings (akshare/futures/requests_fun.py:36)
  acceptance_hints:
  - HTML tables are correctly parsed into DataFrames
  - Encoding errors are handled gracefully
  - Failed parsing attempts trigger retries
