# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-079
name: AKShare
stages:
- id: http_request
  name: HTTP Request Layer
  order: 1
  responsibility: Handles each outbound HTTP requests with retry logic, exponential backoff, and proxy
    rotation to prevent IP blocking during data scraping operations.
  interface:
    inputs:
    - url (string)
    - params (dict)
    - headers (dict)
    - proxies (dict)
    outputs:
    - requests.Response object or parsed JSON/text
  required_methods:
  - name: AkshareConfig
    description: Singleton configuration class storing global proxy settings used across each 400+ scraping
      functions
    evidence: akshare/utils/context.py:1
  - name: ProxyContext
    description: Context manager for temporarily changing proxy settings within a scoped block
    evidence: akshare/utils/context.py:31
  key_behaviors:
  - behavior: Exponential backoff with random jitter
    description: Retry delays increase exponentially (base_delay * 2^attempt) with random uniform jitter
      added to prevent thundering herd on rate-limited APIs
    evidence: akshare/utils/request.py:61(base_delay*(2**attempt)+random.uniform)
  - behavior: Session-per-request with connection pool disabled
    description: Creates new session for each request with pool_connections=1 to avoid connection reuse
      causing stale state when sources use load balancers
    evidence: akshare/utils/request.py:46(session with pool_connections=1)
  replaceable_points:
  - name: HTTP client
    description: Could swap the underlying HTTP client library for alternatives
    options:
    - name: requests
      traits:
      - Synchronous
      - Mature ecosystem
      - Wide adoption
      fit_for:
      - Standard scraping
      - Compatibility
      not_fit_for:
      - Async operations
      - HTTP/2
    - name: httpx
      traits:
      - Sync/async
      - Modern API
      - HTTP/2 support
      fit_for:
      - Async workflows
      - Modern codebases
      not_fit_for:
      - Legacy Python 3.8 compatibility
    - name: aiohttp
      traits:
      - Full async
      - High performance
      - Client/Server
      fit_for:
      - High concurrency
      - Web scraping at scale
      not_fit_for:
      - Simple synchronous scripts
    default: requests
  design_decisions:
  - 'Singleton for global proxy config: Single source of truth for proxies across 400+ scraping functions
    (akshare/utils/context.py:4 __new__)'
  acceptance_hints:
  - Requests succeed with proper response for valid URLs
  - Retries occur on connection failures with exponential delay
  - Proxy settings are respected across each scraping functions
- id: data_acquisition
  name: Source-Specific Data Acquisition
  order: 2
  responsibility: Module-per-source scraping functions that call external APIs and websites (Sina, Eastmoney,
    Jin10, THS) to fetch raw financial data.
  interface:
    inputs:
    - symbol/date parameters
    - time period filters
    - source selection
    outputs:
    - raw JSON/text/HTML responses from external sources
  required_methods:
  - name: TLSAdapter
    description: Custom SSL adapter for TLS connections to handle certificate verification for economic
      data sources
    evidence: akshare/economic/macro_china.py:26
  - name: DataApi
    description: Premium API client with token-based authentication for paid data access
    evidence: akshare/pro/client.py:15
  key_behaviors:
  - behavior: Module-per-category organization
    description: 400+ functions grouped by financial domain (stock, futures, forex) and data source, mirroring
      the Chinese financial market structure
    evidence: akshare/stock/, akshare/futures/, akshare/forex/
  - behavior: Source-specific URL/param constants
    description: Source URLs and API parameters hardcoded in cons.py files per module; requires code updates
      when external APIs change
    evidence: akshare/futures/requests_fun.py:16(requests_link)
  - behavior: Symbol-to-market code mapping
    description: Futures symbols mapped to Sina internal market codes required for API calls
    evidence: akshare/futures/futures_zh_sina.py:100(_futures_symbol_mark_df)
  replaceable_points:
  - name: Data source
    description: Could add alternative sources for the same asset class when primary source becomes unavailable
    options:
    - name: Sina
      traits:
      - Real-time quotes
      - Widely used
      - Good coverage
      fit_for:
      - Chinese stocks
      - Futures
      not_fit_for:
      - US markets
      - Historical bulk data
    - name: Eastmoney
      traits:
      - Comprehensive
      - Official data
      - Fund data
      fit_for:
      - Fund data
      - Market statistics
      not_fit_for:
      - Real-time intraday
    - name: Jin10
      traits:
      - Futures focused
      - Commodities
      - Quick updates
      fit_for:
      - Commodity futures
      - Quick quotes
      not_fit_for:
      - Stock data
      - Historical analysis
    - name: THS
      traits:
      - Stock data
      - Factor calculations
      fit_for:
      - Stock factors
      - Technical indicators
      not_fit_for:
      - Futures
      - Forex
    default: Sina/Eastmoney
  design_decisions:
  - Module-per-category organization mirrors financial domain structure; 400+ functions grouped by data
    source (akshare/stock/, akshare/futures/, akshare/forex/)
  acceptance_hints:
  - Scraping functions return raw responses from external sources
  - Symbol parameters are correctly mapped to source-specific formats
