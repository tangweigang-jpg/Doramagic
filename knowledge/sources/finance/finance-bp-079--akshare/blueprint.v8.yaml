source:
  commit_hash: e47f1ad65fd497258cbf4c6d0a722bbdb6519ab4
  extraction_methods:
  - semi_auto
  projects:
  - akshare
sop_version: '3.6'
business_decisions:
- id: BD-001
  type: B
  content: Session created per request with pool_connections=1
  rationale: A new session is created for each HTTP request with pool_connections=1 to prevent connection
    pool reuse issues and avoid failures from servers that close idle connections. This avoids stale connection
    errors at the cost of not benefiting from TCP keep-alive optimization.
  evidence: akshare/utils/request.py:15(request_with_retry)
  stage: pagination
  alternative_considered: Connection pooling with periodic health checks and connection refresh
- id: BD-002
  type: B
  content: Exponential backoff with random jitter
  rationale: Exponential backoff with random jitter distributes retry load across clients and prevents
    thundering herd problems when a server recovers from outage. The jitter prevents synchronized retries
    from overwhelming the recovering server at exactly the same moment.
  evidence: akshare/utils/request.py:15(request_with_retry)
  stage: pagination
  alternative_considered: Fixed interval retry, linear backoff, or circuit breaker pattern
- id: BD-003
  type: BA
  content: TLSAdapter lowers SECLEVEL=1 for legacy server compatibility
  rationale: The TLSAdapter is configured to lower SSL SECLEVEL from default 2 to 1 to enable connections
    with legacy Chinese financial data servers that use deprecated ciphers. This compatibility trade-off
    weakens security guarantees by accepting weaker cipher suites including those vulnerable to POODLE
    and other attacks.
  evidence: akshare/economic/macro_china.py:26(tlsadapter)
  stage: pagination
  alternative_considered: Per-domain exception list, dedicated SSL context for known legacy servers only
  _evidence_issues:
  - 'FN_NOT_FOUND: tlsadapter in akshare/economic/macro_china.py'
- id: BD-004
  type: BA
  content: demjson used instead of json module for parsing
  rationale: demjson library is used instead of the standard json module because Sina and similar Chinese
    financial data sources return malformed JavaScript-style JSON that stdlib json rejects. demjson tolerates
    unquoted keys, single quotes, and trailing commas at the cost of slower parsing performance and maintenance
    burden of an additional dependency.
  evidence: akshare/utils/demjson.py:1(module)
  stage: pagination
  alternative_considered: Preprocessing string normalization, or using the faster ijson for streaming
  _evidence_issues:
  - 'FN_NOT_FOUND: module in akshare/utils/demjson.py'
- id: BD-005
  type: M/DK
  content: Column names in Chinese (e.g., 代码, 名称, 最新价)
  rationale: DataFrame columns use Chinese character names to match the target audience expectations and
    source data conventions. Chinese users find familiar naming like 代码 (code), 名称 (name), and 最新价 (latest
    price) more intuitive, and this approach avoids translation ambiguity in domain-specific financial
    terminology.
  evidence: akshare/stock/stock_zh_a_sina.py:45(stock_zh_a_spot)
  stage: data_acquisition
  alternative_considered: Dual-language column names or configurable column naming
- id: BD-006
  type: B
  content: pd.to_numeric with errors='coerce' for data cleaning
  rationale: pd.to_numeric with errors='coerce' is used to convert string values to numeric types, turning
    invalid values like empty strings or text into NaN instead of raising exceptions. This prevents crashes
    from malformed data and defers error handling to analysis time rather than collection time.
  evidence: akshare/fund/fund_em.py:32(fund_purchase_em)
  stage: data_acquisition
  alternative_considered: Strict validation with exception raising, or logging invalid entries
- id: BD-007
  type: BA
  content: demjson.decode handles non-standard JSON from Sina API
  rationale: demjson.decode is called in the stock data fetching function because Sina API returns JavaScript-like
    format with features that Python stdlib json cannot parse, such as trailing commas and unquoted property
    names. This tolerance allows successful data extraction from the non-compliant API response format.
  evidence: akshare/stock/stock_zh_a_sina.py:45(stock_zh_a_spot)
  stage: data_acquisition
  alternative_considered: String preprocessing to normalize JSON, or requesting proper JSON format from
    source
- id: BD-008
  type: M/BA
  content: One file per data source architecture
  rationale: Each financial data source (exchange) is implemented as a separate Python file following
    the principle of separation of concerns. This modular structure enables independent updates when source
    APIs change, easier testing, and clear ownership. It also facilitates parallel development and reduces
    merge conflicts.
  evidence: akshare/stock/stock_zh_a_sina.py:45(stock_zh_a_spot)
  stage: data_acquisition
  alternative_considered: Class-based source abstraction, or plugin architecture for adding new sources
- id: BD-009
  type: M
  content: URLs as module-level constants
  rationale: API endpoints and data source URLs are stored as module-level constants in a dedicated cons.py
    file, separating configuration from implementation logic. This design enables updating endpoints without
    modifying function code and provides a single location for URL maintenance across the entire data
    provider.
  evidence: akshare/stock/cons.py:10(zh_sina_kcb_stock_url)
  stage: data_acquisition
  alternative_considered: External configuration file, environment variables, or configuration management
    system
  _evidence_issues:
  - 'FN_NOT_FOUND: zh_sina_kcb_stock_url in akshare/stock/cons.py'
- id: BD-010
  type: B
  content: Date format conversion in each function accepts multiple formats
  rationale: Each data fetching function implements date format conversion to accept user inputs in various
    formats including YYYY-MM-DD strings, YYYYMMDD compact strings, and date objects. This flexibility
    reduces friction for users who may have dates in different formats from various data sources, but
    requires conversion logic duplication across functions.
  evidence: akshare/futures/cot.py:56(get_rank_sum_daily)
  stage: data_acquisition
  alternative_considered: Shared date utility function, or standardized date input validation
- id: BD-011
  type: M/DK
  content: Yang-Zhang volatility separates overnight and intraday components
  rationale: Yang-Zhang volatility estimator is used instead of simple close-to-close variance because
    it separately models overnight returns (close-to-open gaps) and intraday returns (open-to-close moves).
    This academic standard reduces bias from overnight price jumps common in Asian markets and provides
    more accurate realized volatility estimates for trading applications.
  evidence: akshare/cal/rv.py:92(volatility_yz_rv)
  stage: advanced_analytics
  alternative_considered: Simple close-to-close, Garman-Klass, or Parkinson volatility estimators
- id: BD-012
  type: M
  content: DateTime index required for time-aware calculations
  rationale: Realized volatility and similar time-series analytics functions require pandas DataFrames
    with DateTimeIndex for proper calculation. This explicit requirement ensures time-aware computations
    (gaps, intervals, rolling windows) work correctly. The requirement documents the data structure contract
    that calling code must satisfy.
  evidence: akshare/cal/rv.py:13(rv_from_stock_zh_a_hist_min_em)
  stage: advanced_analytics
  alternative_considered: Automatic datetime parsing from column data, or flexible index handling
- id: BD-013
  type: M
  content: __getattr__ enables dynamic method binding for Pro API
  rationale: DataApi class implements __getattr__ to enable dynamic method binding, allowing users to
    call pro.variety_all() and similar methods without explicit method definitions for each API endpoint.
