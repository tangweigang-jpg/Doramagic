  stage: ordering_contract
  alternative_considered: Post-optimization constraint projection
  _evidence_issues:
  - 'NOT_FOUND: backtestengine.py'
  vague_rationale: true
- id: BD-073
  type: BA/DK
  content: Transaction costs divided by 2 assumes symmetric round-trip costs (entry + exit)
  rationale: Transaction cost modeling divides total round-trip cost by 2 assuming equal entry and exit
    costs. This is standard market practice for backtesting. Asymmetry would require separate entry/exit
    cost parameters. The assumption is reasonable for liquid FX markets where bid-ask spreads are similar
    for both sides of the trade.
  evidence: src/finmarketpy/backtest/backtestrequest.py:439,446(module)
  stage: pattern_choice
  alternative_considered: Separate entry and exit cost parameters
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/finmarketpy/backtest/backtestrequest.py'
- id: BD-074
  type: BA/M
  content: Cumulative index default 'mult' vs 'add' changes P&L scaling fundamentally
  rationale: Multiplicative compounding ('mult') scales P&L geometrically, appropriate for percentage
    returns and continuous compounding. Additive ('add') treats returns as linear increments. The default
    'mult' is correct for financial returns which compound multiplicatively. Using 'add' would misrepresent
    drawdown severity and return distribution.
  evidence: backtestrequest.py:105(self.__cum_index='mult')
  stage: default_value
  alternative_considered: Additive compounding for discrete time periods
  _evidence_issues:
  - 'NOT_FOUND: backtestrequest.py'
  vague_rationale: true
- id: BD-075
  type: B
  content: Signal delay via signal_delay shift MUST occur BEFORE non-trading day masking
  rationale: Applying signal delay first ensures delayed signals are then masked for non-trading days,
    preserving the delay structure. Reversing this would incorrectly extend delays around weekends/holidays,
    effectively doubling delay for gaps. The correct order maintains delay as calendar-time based from
    actual trading days only.
  evidence: src/finmarketpy/backtest/backtestengine.py:170(module)
  stage: ordering_contract
  alternative_considered: Business day-based delay calculation
  _evidence_issues:
  - 'FN_NOT_FOUND: module in src/finmarketpy/backtest/backtestengine.py'
