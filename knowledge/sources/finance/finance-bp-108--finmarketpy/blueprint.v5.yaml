# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-108
name: finmarketpy
sop_version: '3.6'
source:
  projects:
  - finmarketpy
  commit_hash: afeaef28f5c8b78e613e649ecf18a9653dbf41fd
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: FX trading strategy backtesting and market data analysis
  description: Python library for backtesting FX trading strategies using technical indicators, volatility
    surface pricing, and portfolio-level risk management with volatility targeting.
  prerequisites: Python 3.10+, pandas/numpy proficiency, basic understanding of FX markets, technical
    analysis concepts, and options pricing fundamentals
  not_suitable_for: real-time trading execution, non-FX asset classes, live portfolio management, high-frequency
    trading strategies, or users requiring Bloomberg/Quandl/Yahoo API credentials
stages:
- id: data_collection
  name: Market Data Collection
  order: 1
  responsibility: Fetches market data from external vendors (Bloomberg, FRED, Quandl) via findatapy MarketDataRequest
    abstraction layer. Provides raw time series for downstream processing, abstracting vendor-specific
    ticker formats from strategy logic.
  interface:
    inputs:
    - MarketDataRequest containing tickers, fields, and vendor-specific mappings
    outputs:
    - pd.DataFrame with vendor fields mapped to standardized column names and DateTimeIndex
  required_methods:
  - name: MarketDataRequest.__init__
    description: Creates data request specification with ticker-to-vendor mapping, frequency settings,
      and field definitions
    evidence: finmarketpy_examples/tradingmodelfxtrend_example.py:124(MarketDataRequest)
  - name: Market.fetch_market_data
    description: Retrieves market data by category (fx, fx-forwards, base-depos) from configured vendor
    evidence: findatapy.market (external)
  - name: SpeedCache.generate_key
    description: Generates cache keys for curve objects to enable efficient data retrieval
    evidence: findatapy.market.ioengine (external)
  key_behaviors:
  - behavior: Vendor abstraction via MarketDataRequest
    description: Internal tickers are mapped to vendor-specific formats at request time, allowing strategies
      to use canonical ticker names regardless of data source
    evidence: finmarketpy_examples/tradingmodelfxtrend_example.py:124(MarketDataRequest)
  - behavior: Standardized 'close' field extraction
    description: Uses 'close' as default field across each data sources, ensuring consistent column naming
      for downstream processing
    evidence: src/finmarketpy/backtest/backtestrequest.py:47(__init__)
  replaceable_points:
  - name: data_source
    description: Vendor source for market data retrieval
    options:
    - name: bloomberg
      traits:
      - Proprietary
      - Real-time capable
      - Comprehensive FX coverage
      fit_for:
      - Professional trading desks
      - Intraday strategies
      - Comprehensive historical data
      not_fit_for:
      - Individual traders without Bloomberg terminal
      - Cost-sensitive projects
    - name: alfred
      traits:
      - Federal Reserve data
      - Free
      - Economic indicators focus
      fit_for:
      - Economic research
      - FRED-based strategies
      - Budget-constrained projects
      not_fit_for:
      - Real-time FX trading
      - High-frequency requirements
    - name: quandl
      traits:
      - Alternative data
      - Premium options
      - Easy API
      fit_for:
      - Research projects
      - Quant strategies requiring alternative data
      not_fit_for:
      - Real-time applications
      - Standard FX spot/forward data
    - name: yahoo
      traits:
      - Free
      - Limited FX coverage
      - Delayed data
      fit_for:
      - Educational purposes
      - Prototyping strategies
      - Historical backtesting with limited scope
      not_fit_for:
      - Production systems
      - Real-time trading
      - Professional backtesting
    default: bloomberg
  design_decisions:
  - 'Separate vendor tickers from internal tickers via MarketDataRequest (evidence: finmarketpy_examples/tradingmodelfxtrend_example.py:124(MarketDataRequest))
    — Allows flexibility to switch data vendors without changing strategy logic; promotes clean separation
    of concerns'
  - 'Use ''close'' as default field across each data sources (evidence: src/finmarketpy/backtest/backtestrequest.py:47(__init__))
    — Standardizes behavior across vendors; close prices are most reliable for end-of-day backtesting'
  acceptance_hints:
  - DataFrame returned has DateTimeIndex aligned to requested date range
  - Columns match standardized names regardless of vendor source
  - Missing data handling produces NaN rather than errors for non-trading days
- id: signal_generation
  name: Technical Indicator & Signal Generation
  order: 2
  responsibility: Computes technical indicators (SMA, EMA, RSI, Bollinger Bands) and converts them to
    discrete +1/-1 trading signals. Acts as the core alpha generation engine, transforming raw price data
    into actionable directional signals.
  interface:
    inputs:
    - Price DataFrames with DateTimeIndex, TechParams containing period/configuration settings
    outputs:
    - _techind containing indicator values, _signal with +1 (long), -1 (short), NaN (flat)
  required_methods:
  - name: TechIndicator.create_tech_ind
    description: Factory method that dispatches to appropriate indicator calculation based on TechParams.indicator_type
    evidence: src/finmarketpy/economics/techindicator.py:23(TechIndicator)
  - name: TechParams.__init__
    description: Initializes parameter container with fillna settings, period, and long/short filtering
      options
    evidence: src/finmarketpy/economics/techindicator.py:539(TechParams)
  - name: EventsFactory.create_event_signal
    description: Generates economic event-based signals from CSV input for event-driven strategies
    evidence: src/finmarketpy/economics/eventstudy.py:244(EventsFactory)
  key_behaviors:
  - behavior: Look-ahead bias prevention via shift(1)
    description: SMA calculation uses shift(1) to ensure signals only use historical data, creating inherent
      1-period delay
    evidence: src/finmarketpy/economics/techindicator.py:77-78(data_frame.shift(1).rolling(window=sma_period-1).sum())
  - behavior: Forward-fill on non-trading days (hold previous position)
    description: Signals are forward-filled after calculation, maintaining positions across asset holidays
      and weekends
    evidence: src/finmarketpy/backtest/backtestengine.py:190(ffill)
  - behavior: RSI buy/sell convention
    description: Buy signal generated on RSI exit from oversold territory; sell signal on exit from overbought
    evidence: src/finmarketpy/economics/techindicator.py:320-330(shift(-1) lookahead pattern)
  replaceable_points:
  - name: indicator_type
    description: Technical indicator algorithm for signal generation
    options:
    - name: SMA
      traits:
      - Simple
      - Lagging
      - Low noise
      fit_for:
      - Trend-following
      - Long-term strategies
      - Low-frequency trading
      not_fit_for:
      - Short-term trading
      - Volatile markets
      - Fast-moving strategies
    - name: EMA
      traits:
      - Exponential weighting
      - Faster response
      - More volatile signals
      fit_for:
      - Short-term trends
      - Active trading
      - Momentum strategies
      not_fit_for:
      - Noisy markets
      - Range-bound periods
    - name: ROC
      traits:
      - Rate of change
      - Momentum-focused
      - Leading indicator
      fit_for:
      - Momentum strategies
      - Breakout systems
      not_fit_for:
      - Choppy markets
      - Long-term investing
    - name: RSI
      traits:
      - Oscillator
      - Overbought/oversold
      - Reversal-focused
      fit_for:
      - Mean reversion
      - Range-bound markets
      - Contrarian strategies
      not_fit_for:
      - Strong trends
      - Momentum-following
    - name: BB
      traits:
      - Bollinger Bands
      - Volatility-adjusted
      - Mean reversion
      fit_for:
      - Volatility strategies
      - Mean reversion
      - Option-related signals
      not_fit_for:
      - Trending markets
      - Low-volatility environments
    default: SMA
  - name: signal_direction_filter
    description: Filter to restrict signal generation to longs or shorts only
    options:
    - name: both
      traits:
      - Long and short signals
      - Market neutral
      - Full participation
      fit_for:
      - Market neutral strategies
      - Full cycle trading
      not_fit_for:
      - Bull markets
      - Funds with long-only mandate
    - name: longs_only
      traits:
      - Positive signals only
      - Bearish filters applied
      - Reduced drawdown potential
      fit_for:
      - Long-only funds
      - Bull market conditions
      not_fit_for:
      - Bear markets
      - Short-biased strategies
    - name: shorts_only
      traits:
      - Negative signals only
      - Bullish filters applied
      fit_for:
      - Short-biased funds
      - Bear market conditions
      not_fit_for:
      - Bull markets
      - Long-only mandates
    default: both
  design_decisions:
  - 'Signal uses +1 for buy/above, -1 for sell/below (not 1/0) (evidence: src/finmarketpy/economics/techindicator.py:95(narray
    assignment)) — Allows symmetric long/short without zero-crossing issues; negative values carry direction
    information for portfolio aggregation'
  - 'fillna=True by default in TechParams (evidence: src/finmarketpy/economics/techindicator.py:544(__init__))
    — Ensures continuous signals through weekends/holidays; assumes prices don''t jump discontinuously'
  - 'Forward-fill signals on non-trading days (hold previous position) (evidence: src/finmarketpy/backtest/backtestengine.py:190(ffill))
    — Prevents unnecessary trading on thin market days; maintains position until next signal'
  acceptance_hints:
  - Signal values are exclusively +1, -1, or NaN
  - Signal has inherent 1-period lag vs current price due to shift(1)
  - Indicator values align temporally with price data without look-ahead bias
  - Signals are forwarded across non-trading days, maintaining position continuity
- id: curve_construction
  name: Total Return Index Construction
  order: 3
  responsibility: Builds continuous time series of total return indices for FX spot, forwards, and options
    by incorporating carry/roll costs and handling rolling around contract expiry dates. Provides the
    asset return stream for P&L calculation.
  interface:
    inputs:
    - Spot/deposit/forward data, fx_vol_surface for options, roll parameters, value_date
    outputs:
    - pd.DataFrame of cumulative total return indices per currency pair with DateTimeIndex
  required_methods:
  - name: FXSpotCurve.construct_total_returns_index
    description: Constructs FX spot total returns incorporating carry from interest rate differentials
      between currency pairs
    evidence: src/finmarketpy/curve/fxspotcurve.py:63(FXSpotCurve)
  - name: FXForwardsCurve.roll_contracts
    description: Manages rolling of forward contracts at month-end or expiry, maintaining continuous time
      series
    evidence: src/finmarketpy/curve/fxforwardscurve.py:35(FXForwardsCurve)
  - name: FXOptionsCurve.construct_tri
    description: Builds options-based total return index with premium tracking and roll management around
      expiry dates
    evidence: src/finmarketpy/curve/fxoptionscurve.py:36(FXOptionsCurve)
  - name: AbstractCurve.generate_key
    description: Generates cache keys for SpeedCache compatibility, enabling efficient data retrieval
    evidence: src/finmarketpy/curve/abstractcurve.py:27(generate_key)
  key_behaviors:
  - behavior: ON (overnight) tenor as default for spot curve
    description: Uses overnight deposit rate as the carry benchmark, which is most liquid and represents
      true overnight funding cost
    evidence: src/finmarketpy/util/marketconstants.py:54(spot_depo_tenor)
  - behavior: Multiplicative cum_index for compounding returns
    description: Returns compound multiplicatively rather than additively, producing more realistic growth
      curves and avoiding negative index issues
    evidence: src/finmarketpy/backtest/backtestrequest.py:105(cum_index)
  - behavior: FX options roll on 'expiry-date' not month-end
    description: Options roll at their specific expiry dates to avoid gamma exposure near expiration
    evidence: src/finmarketpy/util/marketconstants.py:106(fx_options_roll_event)
  replaceable_points:
  - name: roll_event
    description: Timing trigger for rolling forward/options contracts
    options:
    - name: expiry-date
      traits:
      - Precise timing
      - Avoids gamma exposure
      - Options-specific
      fit_for:
      - Options strategies
      - Exact expiry tracking
      not_fit_for:
      - Forward-only strategies
      - Quarterly rebalancing
    - name: month-end
      traits:
      - Calendar-aligned
      - Predictable
      - Easier reconciliation
      fit_for:
      - Monthly rebalancing
      - Reporting cycles
      not_fit_for:
      - Options with non-month-end expiry
      - Short-dated contracts
    - name: quarter-end
      traits:
      - Quarterly cadence
      - Reduced transaction costs
      fit_for:
      - Long-term strategies
      - Quarterly rebalancing
      not_fit_for:
      - Active trading
      - Short-dated forwards
    default: expiry-date
  - name: construct_via_currency
    description: Method for constructing cross exchange rates
    options:
    - name: 'no'
      traits:
      - Direct cross rates
      - No intermediate currency
      fit_for:
      - Liquid crosses
      - Directly quoted pairs
      not_fit_for:
      - Illiquid crosses requiring triangulation
    - name: USD
      traits:
      - USD triangulation
      - Standard method
      fit_for:
      - Non-USD crosses
      - USD-based return calculations
      not_fit_for:
      - USD-denominated strategies (no triangulation needed)
    - name: EUR
      traits:
      - EUR triangulation
      - Euro-based returns
      fit_for:
      - EUR-denominated portfolios
      - European-centric strategies
      not_fit_for:
      - USD-based portfolios
      - EUR crosses with direct quotes
    default: 'no'
  design_decisions:
  - 'Depos tenor ''ON'' (overnight) as default for spot curve (evidence: src/finmarketpy/util/marketconstants.py:54(spot_depo_tenor))
    — ON is most liquid and represents true overnight carry cost for FX positions held daily'
  - 'Multiplicative cum_index by default (''mult'' not ''add'') (evidence: src/finmarketpy/backtest/backtestrequest.py:105(cum_index))
    — Compounding returns is more realistic; avoids negative index issues and matches how real portfolios
    grow'
  - 'FX options roll on ''expiry-date'' not month-end (evidence: src/finmarketpy/util/marketconstants.py:106(fx_options_roll_event))
    — Options expire on specific dates; rolling at expiry avoids gamma exposure near expiration'
  - 'Construct crosses via ''no'' (direct) or via domestic currency (evidence: src/finmarketpy/curve/fxspotcurve.py:102(construct_via_currency))
    — Allows USD-denominated returns for non-USD strategies by normalizing through intermediate currency'
  acceptance_hints:
  - TRI values increase monotonically over time (no negative cumulative returns breaking the chain)
  - Index values remain positive even after large drawdowns
  - Roll events occur at correct dates without gaps or overlaps
  - DateTimeIndex properly aligned across each currency pairs
- id: volatility_pricing
  name: FX Volatility Surface & Pricing
  order: 4
  responsibility: Builds interpolated FX volatility surface from market quotes (ATM vol, 25d/10d risk
    reversals/strangles). Prices vanilla FX options using FinancePy. Computes realized volatility and
    volatility risk premium for vol-targeting adjustments.
  interface:
    inputs:
    - Market data with vol surface quotes, spot rates, deposits, value_date
    outputs:
    - FXVolSurface with interpolated strikes/deltas, option prices, vol statistics including realized
      vol and vol risk premium
  required_methods:
  - name: FXVolSurface.build_vol_surface
    description: Constructs interpolated vol surface from ATM, risk reversal, and strangle quotes using
      configured interpolation method
    evidence: src/finmarketpy/curve/volatility/fxvolsurface.py:51(FXVolSurface)
  - name: FXOptionsPricer.price_option
    description: Prices vanilla FX options using FinancePy BlackScholes or alternative engine
    evidence: src/finmarketpy/curve/volatility/fxoptionspricer.py:42(FXOptionsPricer)
  - name: FXForwardsPricer.price_odd_date
    description: Prices odd-date forwards via interpolation of quoted tenors for non-standard expiries
    evidence: src/finmarketpy/curve/rates/fxforwardspricer.py:159(FXForwardsPricer)
  - name: VolStats.calculate
    description: Computes realized volatility, volatility risk premium, and implied volatility addon adjustments
    evidence: src/finmarketpy/curve/volatility/volstats.py:26(VolStats)
  key_behaviors:
  - behavior: CLARK5 interpolation for vol surface
    description: Uses CLARK5 interpolation method which is smoother than BBG, providing better interpolation
      across strikes and tenors
    evidence: src/finmarketpy/util/marketconstants.py:117(fx_options_vol_function_type)
  - behavior: Fwd-delta-neutral-premium-adj ATM method
    description: Industry-standard ATM determination that accounts for premium difference between calls
      and puts
    evidence: src/finmarketpy/util/marketconstants.py:121(fx_options_atm_method)
  - behavior: Nelder-Mead-Numba solver for calibration
    description: Uses Numba-accelerated Nelder-Mead optimizer for faster calibration at cost of some accuracy
    evidence: src/finmarketpy/util/marketconstants.py:132(fx_options_solver)
  replaceable_points:
  - name: vol_function_type
    description: Volatility surface interpolation methodology
    options:
    - name: CLARK5
      traits:
      - Smooth interpolation
      - Industry standard
      - Good across strikes
      fit_for:
      - General use
      - Smooth vol surfaces
      - Standard strategies
      not_fit_for:
      - Unstable markets
      - Sparsely quoted surfaces
    - name: SABR
      traits:
      - Stochastic alpha beta rho
      - Arbitrage-free
      - Calibration-intensive
      fit_for:
      - Vol trading desks
      - Exotic products
      - Accurate smile fitting
      not_fit_for:
      - Fast backtesting
      - Simple strategies
    - name: BBG
      traits:
      - Bloomberg-style
      - Piecewise
      - Less smooth
      fit_for:
      - Bloomberg data consistency
      - Simple interpolation
      not_fit_for:
      - SABR-calibrated strategies
      - Smooth surface requirements
    default: CLARK5
  - name: pricing_engine
    description: Backend engine for option pricing calculations
    options:
    - name: financepy
      traits:
      - External library
      - Battle-tested
      - BlackScholes implementation
      fit_for:
      - Production pricing
      - Validation purposes
      - Standard options
      not_fit_for:
      - Systems without financepy installed
    - name: finmarketpy
      traits:
      - Internal implementation
      - No external dependencies
      fit_for:
      - Standalone operation
      - Testing environments
      not_fit_for:
      - Production pricing
      - Audit requirements
    default: financepy
  design_decisions:
  - 'CLARK5 interpolation for vol surface by default (evidence: src/finmarketpy/util/marketconstants.py:117(fx_options_vol_function_type))
    — CLARK5 is smoother than BBG; better for interpolation across strikes without arbitrage'
  - 'Fwd-delta-neutral-premium-adj ATM method (evidence: src/finmarketpy/util/marketconstants.py:121(fx_options_atm_method))
    — Industry standard; accounts for premium difference between calls/puts in FX markets'
  - 'Nelder-Mead-Numba solver (faster but less accurate) (evidence: src/finmarketpy/util/marketconstants.py:132(fx_options_solver))
    — Speed tradeoff for calibration; accuracy sufficient for strategy-level pricing'
  - 'Uses FinancePy externally for pricing engine (evidence: src/finmarketpy/curve/volatility/fxoptionspricer.py:29(financepy
    import)) — Avoids reinventing option pricing; FinancePy is battle-tested and maintained separately'
  acceptance_hints:
  - Vol surface is smooth with no arbitrage (butterfly spreads positive)
  - Option prices match market quotes within bid/ask spread
  - VolStats realized vol aligns with recent price history
  - Surface interpolates without jumps at quote tenors
- id: backtesting
  name: Strategy Backtesting Engine
  order: 5
  responsibility: Combines signals with asset returns to compute P&L. Applies volatility targeting, position
    limits, and transaction costs. Aggregates into portfolio returns with exposure tracking and leverage
    management. Core engine for strategy evaluation.
  interface:
    inputs:
    - BacktestRequest with parameters, asset returns DataFrame, signal DataFrame, contract values
    outputs:
    - P&L series, cumulative returns, trade counts, leverage, exposures per component and portfolio
  required_methods:
  - name: Backtest.calculate_trading_PnL
    description: Core P&L calculation engine combining signals with asset returns, applying costs and
      slippage
    evidence: src/finmarketpy/backtest/backtestengine.py:44(Backtest)
  - name: TradingModel.construct_strategy
    description: Abstract strategy wrapper orchestrating the full pipeline from data to signals to portfolio
      construction
    evidence: src/finmarketpy/backtest/backtestengine.py:954(TradingModel)
  - name: PortfolioWeightConstruction.optimize_portfolio_weights
    description: Applies volatility targeting and portfolio weighting optimization across strategies
    evidence: src/finmarketpy/backtest/backtestengine.py:2512(PortfolioWeightConstruction)
  - name: RiskEngine.calculate_leverage_factor
    description: Computes vol-adjusted leverage and position clip adjustments based on realized vol
    evidence: src/finmarketpy/backtest/backtestengine.py:2724(RiskEngine)
  key_behaviors:
  - behavior: Vol targeting pipeline sequence
    description: 'Vol adjustment follows strict order: signal_vol_adj → portfolio_vol_adj → position_clip
      → final trades'
    evidence: backtestengine.py:2754-2956(RiskEngine.calculate_leverage_factor)
  - behavior: 10% vol target with 5x max leverage
    description: Conservative institutional default; aligns with risk management standards and regulatory
      limits
    evidence: src/finmarketpy/backtest/backtestrequest.py:59,70(vol_target)
  - behavior: Position limits via element-wise clip
    description: Scales each positions proportionally to respect net/total exposure limits
    evidence: src/finmarketpy/backtest/backtestengine.py:2880(calculate_position_clip_adjustment)
  - behavior: Trades calculated via signal.diff()
    description: Trade counts derived from signal changes, not independently calculated
    evidence: backtestengine.py:320(self._portfolio_signal - self._portfolio_signal.shift(1))
  replaceable_points:
  - name: portfolio_combination
    description: Method for combining individual signal P&Ls into portfolio returns
    options:
    - name: mean
      traits:
      - Equal weighting
      - Normalized returns
      - N=1 returns unchanged
      fit_for:
      - Equal-weight portfolios
      - Single-strategy backtests
      - Benchmark comparisons
      not_fit_for:
      - Weighted mandates
      - Dollar-neutral strategies
    - name: sum
      traits:
      - Aggregated returns
      - Compounding across strategies
      fit_for:
      - Dollar-weighted strategies
      - Multi-strategy aggregation
      not_fit_for:
      - Equal-weight benchmarks
      - Single strategy backtests
    - name: weighted
      traits:
      - Custom weights
      - Risk-adjusted allocation
      fit_for:
      - Institutional mandates
      - Risk parity
      - Custom allocations
      not_fit_for:
      - Simple backtests
      - Equal-weight requirements
    default: mean
  - name: signal_delay
    description: Number of days to delay signal execution after generation
    options:
    - name: '0'
      traits:
      - Same-day execution
      - No delay
      - Aggressive
      fit_for:
      - Intraday strategies
      - Close-to-close signals
      not_fit_for:
      - End-of-day reporting
      - Overnight position strategies
    - name: '1'
      traits:
      - Next-day execution
      - Conservative
      - Realistic execution
      fit_for:
      - Daily rebalancing
      - Reporting-aligned strategies
      not_fit_for:
      - High-frequency
      - Same-day execution requirements
    default: '0'
  - name: portfolio_vol_adjust
    description: Apply portfolio-level volatility targeting in addition to signal-level
    options:
    - name: 'true'
      traits:
      - Dual vol targeting
      - More conservative
      - Institutional
      fit_for:
      - Risk-managed portfolios
      - Institutional mandates
      - Multi-strategy
      not_fit_for:
      - Simple backtests
      - Single strategy with signal vol target
    - name: 'false'
      traits:
      - Signal-level only
      - Simpler
      - More aggressive
      fit_for:
      - Single strategies
      - Prototype backtests
      - Signal-focused research
      not_fit_for:
      - Portfolio-level risk management
      - Institutional mandates
    default: 'false'
  design_decisions:
  - '10% vol target as default for both signal and portfolio (evidence: src/finmarketpy/backtest/backtestrequest.py:59,70(vol_target))
    — Conservative default; aligns with institutional risk management standards'
  - '252 annualization factor for daily data (evidence: src/finmarketpy/backtest/backtestrequest.py:97(ann_factor))
    — Standard trading days in a year; 365 would overstate annualization'
  - 'Max leverage capped at 5x for vol-targeted strategies (evidence: finmarketpy_examples/tradingmodelfxtrend_example.py:75(signal_vol_max_leverage))
    — Prevents runaway leverage in volatile periods; regulatory limit in many jurisdictions'
  - 'Signal delayed by 0 periods (trade same day as signal) (evidence: src/finmarketpy/backtest/backtestrequest.py:94(signal_delay))
    — Assumes same-day execution; set >0 for close-to-close strategies'
  - 'Position limits applied via element-wise clip adjustment (evidence: src/finmarketpy/backtest/backtestengine.py:2880(calculate_position_clip_adjustment))
    — Scales each positions proportionally to respect net/total exposure limits'
  - 'Transaction costs in basis points (bp) not decimals (evidence: src/finmarketpy/backtest/backtestengine.py:193(tc
    calculation)) — Industry convention for FX; 1bp = 0.01% is appropriate granularity'
  - 'Stop loss/take profit signals applied BEFORE portfolio weight optimization (evidence: backtestengine.py:210-225(stop_loss/take_profit
    applied to returns_df before optimize_portfolio_weights)) — Applying risk stops after portfolio optimization
    would produce incorrect signal cascades'
  acceptance_hints:
  - P&L series aligns temporally with signals and returns without look-ahead bias
  - Leverage stays within configured max limits (typically 5x)
  - Trade counts match signal changes (signal.diff() produces correct trade count)
  - Vol targeting produces NaN for first N periods (where N is rolling window)
  - Transaction costs reduce gross returns proportionally to trade frequency
- id: analysis_reporting
  name: Trade Analysis & Reporting
  order: 6
  responsibility: Post-backtest analysis including return statistics, sensitivity analysis to parameters
    and transaction costs, day-of-month effects, and comparison across multiple models. Transforms raw
    P&L into actionable insights.
  interface:
    inputs:
    - TradingModel instances, BacktestRequest parameter variations
    outputs:
    - Plots (matplotlib/plotly/bokeh), CSV exports, Sharpe ratios, drawdown analysis, performance attribution
  required_methods:
  - name: TradeAnalysis.analyse_strategy
    description: Performs TC shock sensitivity, day-of-month analysis, and arbitrary parameter sweeps
    evidence: src/finmarketpy/backtest/tradeanalysis.py:40(TradeAnalysis)
  - name: BacktestComparison.compare
    description: Compares multiple TradingModel instances with diff/delta charts and statistical tests
    evidence: src/finmarketpy/backtest/backtestcomparison.py:28(BacktestComparison)
  - name: Report.generate
    description: Creates single variable regression reports and plots for factor analysis
    evidence: src/finmarketpy/economics/report.py:26(Report)
