replaceable_slots:
- id: slot-001
  name: market_data_source
  description: Choose Bloomberg for professional/real-time needs; FRED for free economic data; Dukascopy
    for FX tick research; Yahoo Finance for simple equity work
  used_in_stages: []
  options:
  - name: Bloomberg
    traits:
    - professional-grade
    - real-time
    - comprehensive
    - expensive
    fit_for:
    - Institutional use, real-time trading, FX options pricing, historical backtesting with quality data
    not_fit_for:
    - Individual traders, budget-constrained projects, non-Windows for Desktop API
  - name: FRED/ALFRED
    traits:
    - free
    - economic data focus
    - FX rates available
    - reliable
    fit_for:
    - Academic research, free historical backtesting, economic indicators
    not_fit_for:
    - Real-time trading, intraday data, equities data
  - name: Dukascopy
    traits:
    - free
    - FX tick data
    - historical focus
    fit_for:
    - High-frequency FX research, realized volatility calculations
    not_fit_for:
    - Real-time data, recent tick data (past month not available)
  - name: Quandl/Nasdaq Data Link
    traits:
    - free tier available
    - varied data
    - API key required
    fit_for:
    - Alternative data sources, specific datasets
    not_fit_for:
    - Many free datasets have been discontinued
  - name: Yahoo Finance
    traits:
    - free
    - equities focus
    - unreliable
    - delayed
    fit_for:
    - Simple equity backtesting, educational purposes
    not_fit_for:
    - Professional trading, real-time data, FX data
  default: FRED/ALFRED (free option) or Bloomberg (professional option)
  _source: worker_resource
- id: slot-002
  name: charting_engine
  description: Use plotly for interactive Jupyter notebooks; matplotlib for static publications; bokeh
    for custom web dashboards
  used_in_stages: []
  options:
  - name: Matplotlib
    traits:
    - static plots
    - widely compatible
    - publication-quality
    fit_for:
    - Standard charts, publications, batch processing
    not_fit_for:
    - Interactive web dashboards, real-time updating
  - name: Plotly
    traits:
    - interactive
    - web-ready
    - zoom/pan
    - JavaScript-based
    fit_for:
    - Interactive analysis, Jupyter notebooks, web embedding
    not_fit_for:
    - Simple batch chart generation without HTML
  - name: Bokeh
    traits:
    - interactive
    - web-ready
    - streaming data capable
    fit_for:
    - Interactive dashboards, real-time data visualization
    not_fit_for:
    - Simple static charts
  default: plotly
  _source: worker_resource
- id: slot-003
  name: data_storage_backend
  description: Use MongoDB+Arctic for production with shared access; HDF5 for personal research; Redis
    for caching; ArcticDB for cloud-native deployments
  used_in_stages: []
  options:
  - name: MongoDB + Arctic
    traits:
    - persistent
    - queryable
    - compressed
    - server-based
    fit_for:
    - Production systems, shared data access, large datasets
    not_fit_for:
    - Single-user local setup, simple scripts
  - name: HDF5
    traits:
    - file-based
    - fast
    - compressed
    - single-user
    fit_for:
    - Local backtesting, personal research, portable storage
    not_fit_for:
    - Shared multi-user access, distributed systems
  - name: Redis Cache
    traits:
    - in-memory
    - fast
    - temporary
    - shared cache
    fit_for:
    - Reducing repeated API calls, session-level caching
    not_fit_for:
    - Persistent storage, large historical data
  - name: ArcticDB (newer)
    traits:
    - modern
    - S3/GCP/Azure compatible
    - time-series optimized
    fit_for:
    - Cloud-native deployments, large-scale data lakes
    not_fit_for:
    - Simple local use cases
  default: No persistent storage (memory-only) or HDF5 for local files
  _source: worker_resource
- id: slot-004
  name: parallel_processing
  description: Use multiprocess for most cases; multiprocessing_on_dill for better Windows support; avoid
    stdlib multiprocessing on Windows with complex objects
  used_in_stages: []
  options:
  - name: multiprocess
    traits:
    - cross-platform
    - pickle-based
    - recommended
    fit_for:
    - General parallel backtesting, cross-platform use
    not_fit_for:
    - Windows with complex objects
  - name: multiprocessing (stdlib)
    traits:
    - stdlib
    - no extra install
    - less robust serialization
    fit_for:
    - Simple parallel tasks, avoiding extra dependencies
    not_fit_for:
    - Complex objects, Windows
  - name: multiprocessing_on_dill
    traits:
    - better serialization
    - cross-platform
    fit_for:
    - Complex objects, Windows compatibility
    not_fit_for:
    - Simple use cases (overhead not justified)
  - name: pathos
    traits:
    - dill-based
    - flexible
    - less common
    fit_for:
    - Advanced parallelization needs
    not_fit_for:
    - Standard use cases
  default: multiprocess
  _source: worker_resource
- id: slot-005
  name: fx_options_pricing_engine
  description: Use finmarketpy native for basic needs; FinancePy for professional FX options with vol
    surface interpolation
  used_in_stages: []
  options:
  - name: FinancePy
    traits:
    - professional
    - multiple models
    - actively maintained
    fit_for:
    - Production FX options pricing, vol surface interpolation
    not_fit_for:
    - Simple use cases (heavy dependency)
  - name: Finmarketpy Native
    traits:
    - no extra dependency
    - basic pricing
    fit_for:
    - Simple option pricing without extra dependencies
    not_fit_for:
    - Advanced vol surface modeling
  default: finmarketpy native (with FinancePy as optional upgrade)
  _source: worker_resource
