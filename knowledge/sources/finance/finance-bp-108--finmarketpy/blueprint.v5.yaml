  rationale: 'Wraps PyFolio import in try/except to make portfolio analytics optional, ensuring the core
    backtesting engine remains functional even when PyFolio is unavailable due to complex dependencies
    or installation issues. This graceful degradation allows users to run backtests without PyFolio while
    enabling advanced analytics when available. Boundary: functionality requiring PyFolio (e.g., tear
