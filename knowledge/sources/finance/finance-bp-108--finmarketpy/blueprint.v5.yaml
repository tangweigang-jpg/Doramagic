data_flow:
- from_stage: data_collection
  to_stage: signal_generation
  data: Price DataFrames with DateTimeIndex containing OHLCV or close data for technical indicator calculation
- from_stage: data_collection
  to_stage: curve_construction
  data: Raw market data including spot rates, deposits, forwards, and volatility surface quotes as DataFrames
- from_stage: signal_generation
  to_stage: backtesting
  data: _signal (+1 long, -1 short, NaN flat) and _techind (indicator values) as aligned DataFrames
- from_stage: curve_construction
  to_stage: backtesting
  data: Total return indices as multiplicative cumulative asset returns per currency pair
- from_stage: volatility_pricing
  to_stage: curve_construction
  data: FXVolSurface for options TRI construction; FXForwardsPricer for odd-date forward pricing
- from_stage: backtesting
  to_stage: analysis_reporting
  data: P&L series, cumulative returns, leverage, exposures, and trade counts per strategy component
global_contracts:
- contract: Every time series use datetime index (DateTimeIndex) for alignment across stages
  evidence: src/finmarketpy/curve/fxspotcurve.py:205(construct_total_returns_index)
- contract: MarketConstants is a static class with no instance state, serving as global configuration
  evidence: src/finmarketpy/util/marketconstants.py:15(MarketConstants)
- contract: Vol surface assumes 365 day basis for AUD/CAD/GBP/NZD currencies, 360 for each others
  evidence: src/finmarketpy/util/marketconstants.py:56(currencies_with_365_basis)
- contract: 'FX tickers are 6-character strings: base currency (3 chars) + terms currency (3 chars), e.g.,
    EURUSD'
  evidence: src/finmarketpy/curve/fxspotcurve.py:103(ticker slicing)
- contract: 'Signal convention: +1 = long/buy signal, -1 = short/sell signal, NaN = flat/hold position'
  evidence: src/finmarketpy/economics/techindicator.py:95(narray where)
- contract: Returns are simple returns (not log returns) by default for backtest P&L calculation
  evidence: src/finmarketpy/backtest/backtestengine.py:206(calculate_returns)
- contract: Signal delay via shift MUST occur BEFORE non-trading day masking to preserve signal timing
  evidence: backtestengine.py:170(signal_df.shift(br.signal_delay)), backtestengine.py:188-190
- contract: FINAL_STRATEGY must be processed last in main thread (not parallel) to ensure correct aggregation
  evidence: backtestengine.py:1157-1191(FINAL_STRATEGY calculated separately in main process)
business_decisions:
- id: BD-001
  type: B/DK
  content: Separate vendor tickers from internal tickers via MarketDataRequest
  rationale: 'Decouples data sourcing from strategy logic by routing each market data requests through
    MarketDataRequest abstraction. This allows switching data vendors (e.g., from Bloomberg to Refinitiv)
    without modifying any strategy code, reducing operational risk and enabling parallel vendor testing.
    Boundary: only applies when multiple data vendors are configured; single-vendor deployments may bypass
    this pattern.'
  evidence: finmarketpy_examples/tradingmodelfxtrend_example.py:38(MarketDataRequest.__init__)
  stage: data_collection
  alternative_considered: Direct ticker mapping in strategy code; rejected due to tight coupling and vendor
    lock-in
- id: BD-002
  type: BA/DK
  content: Use 'close' as default field across each data sources
  rationale: 'Establishes ''close'' as the canonical price field for each market data sources, eliminating
    ambiguity in downstream calculations. Close prices are the most reliable for backtesting because they
    represent the last traded price with full session information, avoiding mid-price or quote-driven
    artifacts. Boundary: strategies requiring intraday OHLC processing must explicitly override the default;
    VWAP-based strategies are unaffected.'
  evidence: src/finmarketpy/backtest/backtestrequest.py:33(__init__)
  stage: data_collection
  alternative_considered: OHLC4 average as default; rejected due to increased signal noise compared to
    close price
- id: BD-003
  type: B/BA
  content: Signal uses +1 for buy/above, -1 for sell/below (not 1/0)
  rationale: 'Enforces bidirectional signal encoding where +1 indicates bullish/above-threshold and -1
    indicates bearish/below-threshold positions. This enables symmetric long/short strategies without
    zero-crossing ambiguity during transitions. The negative value carries directional information for
    short legs. Boundary: directional strategies (long-only or short-only) must apply masks; neutral signals
    require explicit zero assignment.'
  evidence: src/finmarketpy/economics/techindicator.py:533(get_signal)
  stage: signal_generation
  alternative_considered: Binary 1/0 encoding; rejected due to undefined behavior at signal boundaries
    and inability to represent short positions
- id: BD-004
  type: BA/DK
  content: fillna=True by default in TechParams
  rationale: 'Enables forward-fill of missing values in technical indicator calculations by default, ensuring
    continuous signal generation through weekends, holidays, and thin market periods. This assumes price
    continuity without adverse gaps between trading sessions. Boundary: strategies sensitive to stale
    data should set fillna=False or implement explicit gap-filling logic; high-frequency strategies typically
    disable this.'
  evidence: src/finmarketpy/economics/techindicator.py:544(__init__)
  stage: signal_generation
  alternative_considered: Backward-fill or interpolation; rejected due to lookahead bias risk
- id: BD-005
  type: BA/DK
  content: Forward-fill signals on non-trading days (hold previous position)
  rationale: 'Applies pandas ffill() to signal time series to maintain the previous position during non-trading
    days, preventing unnecessary trading activity on thin market days with reduced liquidity. The system
    holds the last valid signal until a new one is generated. Boundary: this assumes signal staleness
    is acceptable; momentum strategies that require periodic rebalancing may need explicit signal decay
    logic.'
  evidence: src/finmarketpy/backtest/backtestengine.py:190(ffill)
  stage: signal_generation
  alternative_considered: Reset to zero on non-trading days; rejected due to unnecessary portfolio turnover
    and liquidity mismatch
  _evidence_issues:
  - 'FN_NOT_FOUND: ffill in src/finmarketpy/backtest/backtestengine.py'
- id: BD-006
  type: B/BA
  content: Depos tenor 'ON' (overnight) as default for spot curve
  rationale: 'Sets the overnight (ON) deposit tenor as the default starting point for spot curve construction,
    reflecting that ON deposits are the most liquid tenor in FX markets and represent the true overnight
    carry cost for position funding. This ensures accurate carry calculations from day one of the curve.
    Boundary: emerging market currencies with illiquid ON markets may require alternative starting tenors;
    users should override for specific currency pairs.'
  evidence: src/finmarketpy/util/marketconstants.py:54(spot_depo_tenor)
  stage: curve_construction
  alternative_considered: 1W or 1M deposit as default; rejected due to less liquidity and added complexity
    in carry interpretation
  _evidence_issues:
  - 'FN_NOT_FOUND: spot_depo_tenor in src/finmarketpy/util/marketconstants.py'
- id: BD-007
  type: BA
  content: Multiplicative cum_index by default ('mult' not 'add')
  rationale: 'Implements compounding returns via multiplicative cumulative index construction as the default
    behavior, which more accurately represents real trading where profits and losses are reinvested proportionally.
    Additive cumulation risks producing negative index values and misstates portfolio growth. Boundary:
    long-only strategies with fixed capital allocation may use additive mode; the default ensures consistency
    with performance attribution standards.'
  evidence: src/finmarketpy/backtest/backtestrequest.py:534(cum_index)
  stage: curve_construction
  alternative_considered: Additive cumulation; rejected due to negative index issues and misrepresentation
    of compounding effects
- id: BD-008
  type: BA/DK
  content: FX options roll on 'expiry-date' not month-end
  rationale: 'Triggers FX options rolling at actual expiry dates rather than calendar month-end, ensuring
    roll timing aligns with market conventions and avoiding unintended gamma exposure near expiration.
    Options gamma peaks at expiry, making roll timing critical for variance-targeting strategies. Boundary:
    exotic options with non-standard expiry schedules require custom roll logic; vanilla FX options use
    standard expiry conventions.'
  evidence: src/finmarketpy/util/marketconstants.py:106(fx_options_roll_event)
  stage: curve_construction
  alternative_considered: Month-end rolling; rejected due to misalignment with actual option lifecycle
    and gamma risk mismanagement
  _evidence_issues:
  - 'FN_NOT_FOUND: fx_options_roll_event in src/finmarketpy/util/marketconstants.py'
- id: BD-009
  type: BA/DK
  content: Construct crosses via 'no' (direct) or via domestic currency
  rationale: 'Provides two modes for cross-currency pair construction: direct triangulation (''no'') or
    via domestic currency conversion. This enables USD-denominated return attribution for strategies trading
    non-USD pairs, ensuring consistent P&L reporting across currency exposures. Boundary: the ''no'' mode
    requires each required cross rates to be available; fallback to domestic currency conversion requires
    the domestic currency to have complete market data.'
  evidence: src/finmarketpy/curve/fxspotcurve.py:102(construct_via_currency)
  stage: curve_construction
  alternative_considered: USD intermediary only; rejected due to inefficiency and loss of direct market
    pricing
  _evidence_issues:
  - 'FN_NOT_FOUND: construct_via_currency in src/finmarketpy/curve/fxspotcurve.py'
- id: BD-010
  type: B/BA
  content: CLARK5 interpolation for vol surface by default
  rationale: 'Selects Clark5 interpolation algorithm as the default method for volatility surface construction,
    providing smoother interpolation across strikes compared to Bloomberg''s cubic spline (BBG) approach.
    Clark5 is specifically designed for vol surfaces and avoids oscillation artifacts at the wings. Boundary:
    exotic volatility surfaces with discontinuities may require alternative interpolation; users can override
    for custom surface shapes.'
  evidence: src/finmarketpy/util/marketconstants.py:117(fx_options_vol_function_type)
  stage: volatility_pricing
  alternative_considered: Bloomberg cubic spline; rejected due to wing oscillation artifacts and lack
    of financial domain optimization
  _evidence_issues:
  - 'FN_NOT_FOUND: fx_options_vol_function_type in src/finmarketpy/util/marketconstants.py'
- id: BD-011
  type: B/BA
  content: Fwd-delta-neutral-premium-adj ATM method
  rationale: 'Adopts forward delta-neutral with premium adjustment as the ATM (at-the-money) strike determination
    method, which is the industry standard for FX options. This method accounts for the premium difference
    between calls and puts, ensuring accurate delta hedging across the vol surface. Boundary: barrier
    options and exotic structures may require different ATM conventions; this default suits vanilla FX
    options.'
  evidence: src/finmarketpy/util/marketconstants.py:121(fx_options_atm_method)
  stage: volatility_pricing
  alternative_considered: Spot or forward ATM; rejected due to premium adjustment being critical for accurate
    delta hedging in FX markets
  _evidence_issues:
  - 'FN_NOT_FOUND: fx_options_atm_method in src/finmarketpy/util/marketconstants.py'
- id: BD-012
  type: M/BA
  content: Nelder-Mead-Numba solver (faster but less accurate)
  rationale: 'Selects Nelder-Mead optimization with Numba JIT compilation as the default solver for vol
    surface calibration, prioritizing execution speed over absolute accuracy. The speedup from Numba makes
    real-time calibration feasible; accuracy is sufficient for strategy-level pricing decisions. Boundary:
    pricing desks requiring highest precision should select alternative solvers; this default serves backtesting
    and signal generation use cases.'
  evidence: src/finmarketpy/util/marketconstants.py:132(fx_options_solver)
  stage: volatility_pricing
  alternative_considered: Levenberg-Marquardt solver; rejected due to slower convergence despite higher
    accuracy
  _evidence_issues:
  - 'FN_NOT_FOUND: fx_options_solver in src/finmarketpy/util/marketconstants.py'
- id: BD-013
  type: M
  content: Uses FinancePy externally for pricing engine
  rationale: 'Delegates option pricing calculations to FinancePy library as an external dependency rather
    than implementing pricing logic internally. FinancePy is battle-tested and covers a wide range of
    option models, reducing implementation risk and maintenance burden. Boundary: this creates an external
    dependency requiring FinancePy installation; environments without FinancePy access must implement
    fallback pricing or accept reduced functionality.'
  evidence: src/finmarketpy/curve/volatility/fxoptionspricer.py:29(financepy import)
  stage: volatility_pricing
  alternative_considered: Internal pricing implementation; rejected due to complexity, maintenance overhead,
    and risk of implementation errors
  _evidence_issues:
  - 'INVALID_IDENTIFIER: financepy import in src/finmarketpy/curve/volatility/fxoptionspricer.py'
- id: BD-014
  type: B/BA
  content: 10% vol target as default for both signal and portfolio
  rationale: 'Sets 10% annualized volatility as the target for both signal and portfolio-level volatility
    targeting, establishing a conservative default aligned with institutional risk management standards.
    This default is appropriate for moderate-risk strategies and provides a sensible starting point for
    most FX trend-following approaches. Boundary: higher-volatility strategies (e.g., short-vol, carry)
    must explicitly increase the target; the dual target ensures consistency between signal generation
    and port'
  evidence: src/finmarketpy/backtest/backtestrequest.py:59,70(vol_target)
  stage: backtesting
  alternative_considered: No default vol target; rejected due to unlimited leverage risk in volatile periods
  _evidence_issues:
  - 'FN_NOT_FOUND: vol_target in src/finmarketpy/backtest/backtestrequest.py'
  vague_rationale: true
- id: BD-015
  type: BA/DK
  content: 252 annualization factor for daily data
  rationale: 'Uses 252 trading days as the annualization factor for daily return data, reflecting standard
    market convention. Using 365 calendar days would overstate annualization by ~45% and misrepresent
    realized volatility. This aligns annualized metrics with institutional reporting standards. Boundary:
    strategies trading non-standard schedules (e.g., crypto) should adjust; the default serves standard
    equity/FX/commodity backtesting.'
  evidence: src/finmarketpy/backtest/backtestrequest.py:518(ann_factor)
  stage: backtesting
  alternative_considered: 365 calendar days; rejected due to significant overstatement of annualized metrics
- id: BD-016
  type: BA
  content: Max leverage capped at 5x for vol-targeted strategies
  rationale: 'Implements a 5x maximum leverage cap for volatility-targeted strategies, preventing runaway
    leverage during high-volatility periods when vol targeting would otherwise require extreme position
    sizing. This cap also reflects regulatory leverage limits common in many jurisdictions for retail
    and institutional accounts. Boundary: strategies requiring higher leverage must explicitly configure
    and document the rationale; the cap is a safety mechanism, not a constraint on legitimate high-volatility
    str'
  evidence: finmarketpy_examples/tradingmodelfxtrend_example.py:75(signal_vol_max_leverage)
  stage: backtesting
  alternative_considered: No leverage cap; rejected due to catastrophic loss potential and regulatory
    compliance issues
  _evidence_issues:
  - 'FN_NOT_FOUND: signal_vol_max_leverage in finmarketpy_examples/tradingmodelfxtrend_example.py'
- id: BD-017
  type: BA
  content: Signal delayed by 0 periods (trade same day as signal)
  rationale: 'Sets signal delay to zero periods by default, executing trades on the same day the signal
    is generated. This assumes intraday signal generation and same-day execution, which is appropriate
    for daily-bar strategies where the close-of-day signal triggers next-bar entry. Boundary: close-to-close
    strategies requiring end-of-day signal evaluation must set delay=1; high-frequency strategies may
    use sub-day delays.'
  evidence: src/finmarketpy/backtest/backtestrequest.py:510(signal_delay)
  stage: backtesting
  alternative_considered: Default delay of 1 bar; rejected due to unnecessary lag for end-of-day signal
    strategies
  vague_rationale: true
- id: BD-018
  type: B/BA
  content: Position limits applied via element-wise clip adjustment
  rationale: 'Enforces position limits through element-wise clipping that scales each positions proportionally
    to respect net and total exposure limits. This approach maintains relative positioning while ensuring
    aggregate constraints are satisfied, avoiding sudden strategy dislocations from hard cuts. Boundary:
    strategies requiring precise limit hitting rather than proportional scaling may need custom limit
    handlers; the clip method ensures no limit breach at the cost of minor position distortion.'
  evidence: src/finmarketpy/backtest/backtestengine.py:2880(calculate_position_clip_adjustment)
  stage: backtesting
  alternative_considered: Hard truncation of positions; rejected due to abrupt strategy changes and potential
    signal discontinuity
- id: BD-019
  type: BA/DK
  content: Transaction costs in basis points (bp) not decimals
  rationale: 'Expresses transaction costs in basis points as the industry convention for FX markets, where
    1bp = 0.01% provides appropriate granularity for typical FX spreads. This avoids precision issues
    with decimal representations and aligns with broker/market data conventions. Boundary: non-FX instruments
    (equities, bonds) may require decimal input; the framework should convert from bp to decimal internally
    for consistency.'
  evidence: src/finmarketpy/backtest/backtestengine.py:193(tc calculation)
  stage: backtesting
  alternative_considered: Decimal input; rejected due to mismatch with market conventions and potential
    precision loss in FX context
  _evidence_issues:
  - 'INVALID_IDENTIFIER: tc calculation in src/finmarketpy/backtest/backtestengine.py'
  vague_rationale: true
- id: BD-020
  type: BA
  content: Output path defaults to 'output_data/YYYYMMDD' with timestamp
  rationale: 'Organizes output files under date-stamped directories (output_data/YYYYMMDD) by default,
    ensuring runs from different dates do not overwrite each other. This is essential for iterative experimentation
    where multiple backtest runs need to be preserved for comparison. Boundary: production pipelines requiring
    consistent output paths should override the default; the timestamp suffix can be disabled for automated
    workflows.'
  evidence: src/finmarketpy/backtest/tradeanalysis.py:48(DUMP_PATH)
  stage: analysis_reporting
  alternative_considered: Single output directory with run ID; rejected due to overwrite risk in iterative
