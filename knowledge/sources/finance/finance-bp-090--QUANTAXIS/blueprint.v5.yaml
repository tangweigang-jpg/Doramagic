replaceable_slots:
- id: slot-001
  name: primary_database
  description: MongoDB for flexibility and async support; ClickHouse for analytical performance
  used_in_stages: []
  options:
  - name: MongoDB (default)
    traits:
    - document_store
    - time_series_friendly
    - schema_flexible
    - async_support
    fit_for:
    - General purpose storage, flexible schema, time-series data
    not_fit_for:
    - Complex analytical queries, very high write throughput
  - name: ClickHouse
    traits:
    - columnar_store
    - analytical_queries
    - high_compression
    - vectorized_execution
    fit_for:
    - Fast analytical queries, large-scale data analysis, reporting
    not_fit_for:
    - Real-time writes, complex transactions, flexible schema needs
  - name: PostgreSQL
    traits:
    - relational
    - ACID_compliant
    - mature_ecosystem
    - JSON_support
    fit_for:
    - Structured data with relationships, strict consistency requirements
    not_fit_for:
    - High-volume time-series without TimescaleDB extension
  default: MongoDB
  _source: worker_resource
- id: slot-002
  name: message_queue
  description: RabbitMQ for reliability and management features; Redis for speed
  used_in_stages: []
  options:
  - name: RabbitMQ (default)
    traits:
    - AMQP
    - reliable_delivery
    - management_ui
    - federation_support
    fit_for:
    - Task queues, pub/sub patterns, reliable message delivery
    not_fit_for:
    - Ultra-high throughput (>100k msg/s), streaming
  - name: Redis Streams
    traits:
    - in_memory
    - low_latency
    - pub_sub_compatible
    - consumer_groups
    fit_for:
    - Low-latency requirements, caching with persistence, simple queues
    not_fit_for:
    - Complex routing, enterprise features, durable storage
  - name: Apache Kafka
    traits:
    - distributed_log
    - high_throughput
    - durable
    - replay_capability
    fit_for:
    - Event streaming, real-time pipelines, high-volume data ingestion
    not_fit_for:
    - Simple request-response, low-latency requirements
  default: RabbitMQ
  _source: worker_resource
- id: slot-003
  name: chinese_stock_data_source
  description: PyTDX for real-time and comprehensive data; Tushare for fundamentals; BaoStock for free
    historical
  used_in_stages: []
  options:
  - name: PyTDX (default)
    traits:
    - real_time
    - free
    - broad_coverage
    - Windows_compatible
    fit_for:
    - Real-time quotes, minute data, historical data, multiple markets
    not_fit_for:
    - Linux-only production servers (connection stability), premium fundamentals
  - name: Tushare Pro
    traits:
    - comprehensive
    - fundamentals
    - macro_data
    - cloud_accessible
    fit_for:
    - Fundamental data, financial reports, macro indicators, cloud deployments
    not_fit_for:
    - Real-time trading (latency), free tier limitations
  - name: BaoStock
    traits:
    - free
    - simple_api
    - no_token_needed
    fit_for:
    - Free historical data, simple backtesting, quick prototyping
    not_fit_for:
    - Real-time data, minute-level data, comprehensive coverage
  - name: JoinQuant
    traits:
    - minute_data
    - fundamental_data
    - factor_data
    fit_for:
    - Minute-level historical data, factor data, research
    not_fit_for:
    - Real-time trading, free users
  - name: Gengmei (GM)
    traits:
    - minute_data
    - real_time
    - factor_data
    fit_for:
    - Minute-level data, real-time data, factor research
    not_fit_for:
    - Free access, simple setup
  default: PyTDX
  _source: worker_resource
- id: slot-004
  name: cryptocurrency_data_source
  description: Binance for liquidity and availability; Huobi for CN accessibility; CCXT for multi-exchange
  used_in_stages: []
  options:
  - name: Binance
    traits:
    - high_liquidity
    - broad_coverage
    - real_time
    - free_public
    fit_for:
    - Major crypto pairs, real-time data, historical data
    not_fit_for:
    - Privacy (requires VPN in China), niche coins
  - name: Huobi
    traits:
    - CN_friendly
    - broad_coverage
    - real_time
    fit_for:
    - Users in China, good Huobi liquidity
    not_fit_for:
    - International users
  - name: OKEx
    traits:
    - derivatives
    - broad_coverage
    - real_time
    fit_for:
    - Derivatives data, comprehensive coverage
    not_fit_for:
    - Simple spot trading data only
  - name: CCXT
    traits:
    - unified_api
    - multi_exchange
    - standardized_format
    fit_for:
    - Multi-exchange strategies, unified interface
    not_fit_for:
    - Simple single-exchange needs (overhead)
  default: Binance
  _source: worker_resource
- id: slot-005
  name: cache_layer
  description: Redis for comprehensive features and performance
  used_in_stages: []
  options:
  - name: Redis (default)
    traits:
    - in_memory
    - data_structures
    - persistence
    - pub_sub
    fit_for:
    - Caching, session management, pub/sub, complex data structures
    not_fit_for:
    - Disk-heavy workloads, simple key-value only
  - name: Memcached
    traits:
    - simple
    - memory_only
    - distributed
    fit_for:
    - Simple caching, high-throughput simple key-value
    not_fit_for:
    - Complex data, persistence needs, pub/sub
  - name: MongoDB (in-memory)
    traits:
    - schema_flexible
    - already_deployed
    - simple_setup
    fit_for:
    - Teams already using MongoDB, flexible cache needs
    not_fit_for:
    - Performance-critical caching
  default: Redis
  _source: worker_resource
- id: slot-006
  name: dataframe_engine
  description: Pandas for flexibility; Polars for speed on large datasets
  used_in_stages: []
  options:
  - name: Pandas (default)
    traits:
    - mature
    - wide_support
    - familiar_api
    - flexible
    fit_for:
    - General use, flexibility, ecosystem compatibility
    not_fit_for:
    - Large datasets (>10M rows), performance-critical code
  - name: Polars
    traits:
    - fast
    - lazy_evaluation
    - multi_threading
    - memory_efficient
    fit_for:
    - Large datasets, performance-critical analysis, parallel processing
    not_fit_for:
    - Small datasets, complex index operations
  - name: PySpark
    traits:
    - distributed
    - big_data
    - ML_integration
    fit_for:
    - Enterprise-scale data processing, distributed computing
    not_fit_for:
    - Single-machine use, simple operations
  default: Pandas
  _source: worker_resource
