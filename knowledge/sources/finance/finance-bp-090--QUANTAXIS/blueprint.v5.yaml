global_contracts:
- contract: Every DataStruct objects use MultiIndex (datetime, code) as primary key
  evidence: QUANTAXIS/QAData/base_datastruct.py:82(self.data=DataFrame.drop_duplicates().sort_index())
- contract: 'Order direction semantics: BUY=1, SELL=-1 for stocks; BUY_OPEN=2, SELL_CLOSE=-3 for futures'
  evidence: QUANTAXIS/QAUtil/QAParameter.py:44(ORDER_DIRECTION)
- contract: 'Order lifecycle state machine: NEW→QUEUED→SUCCESS_ALL/SUCCESS_PART/CANCEL_ALL→SETTLED'
  evidence: QUANTAXIS/QAUtil/QAParameter.py:124(ORDER_STATUS)
- contract: 'Market types encoded as integers: STOCK=0, FUTURE=2, CRYPTO=5'
  evidence: QUANTAXIS/QAUtil/QAParameter.py:219(MARKET_TYPE)
