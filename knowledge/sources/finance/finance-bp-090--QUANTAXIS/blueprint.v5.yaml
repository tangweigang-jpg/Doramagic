# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-090
name: QUANTAXIS
sop_version: '3.6'
source:
  projects:
  - QUANTAXIS
  commit_hash: a69e978a2e38d045a64c380cc3b5c9fa08fa4903
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Quantitative trading framework with multi-market support (stocks, futures, crypto, options)
  description: A comprehensive quantitative financial analysis framework with Python 3.9+ support and
    Rust core integration for 100x performance acceleration, supporting event-driven strategy execution
    for backtesting and live trading across multiple asset classes.
  prerequisites: Python 3.9-3.12, pandas 2.0+, MongoDB, basic understanding of financial markets and trading
    concepts, familiarity with OHLCV data structures
  not_suitable_for: Sub-millisecond latency HFT trading, users without programming experience seeking
    pre-built trading signals, single-asset-only workflows that don't need multi-market support
stages:
- id: data_collection
  name: Data Collection & Storage
  order: 1
  responsibility: Fetch market data from external sources (TDX, Tushare, exchanges) and persist to MongoDB/ClickHouse.
    Supports stocks, futures, crypto, options with parallel download. This stage exists because market
    data must be acquired from multiple providers before any analysis can occur.
  interface:
    inputs:
    - Security codes
    - Date ranges
    - Data source engine (tdx/tushare)
    outputs:
    - QA_DataStruct_* objects stored in MongoDB collections
  required_methods:
  - name: QA_SU_save_stock_day.save
    description: Main entry point for saving daily stock data to MongoDB collections with QA_DataStruct
      format
    evidence: QUANTAXIS/QASU/main.py:215(QA_SU_save_stock_day)
  - name: QA_Tdx_Executor.execute
    description: Concurrent TDX API executor using threading for parallel market data downloads
    evidence: QUANTAXIS/QAFetch/QATdx_adv.py:36(QA_Tdx_Executor)
  - name: QA_Fetcher.fetch
    description: Unified data fetch facade supporting multiple data sources with consistent API
    evidence: QUANTAXIS/QAFetch/Fetcher.py:61(QA_Fetcher)
  - name: Parallelism.run
    description: Base parallelism abstraction for parallel download operations
    evidence: QUANTAXIS/QAUtil/Parallelism.py:56(Parallelism)
  key_behaviors:
  - behavior: Multi-engine fetch abstraction
    description: Provides consistent API across different data sources (tdx, tushare, huobi, binance,
      bitmex) with automatic fallback when primary source fails
    evidence: QUANTAXIS/QAFetch/Fetcher.py:75(QA_quotation)
  - behavior: ProcessPoolExecutor parallelization
    description: Stock downloads use parallel execution via ProcessPoolExecutor for 10x speedup on I/O-bound
      operations
    evidence: QUANTAXIS/QASU/save_tdx_parallelism.py:43(__saving_work)
  - behavior: Dual storage strategy
    description: MongoDB stores operational data with schema-on-read flexibility; ClickHouse stores append-only
      factor data with ReplacingMergeTree dedup
    evidence: QUANTAXIS/QAFactor/feature.py:14(CREATE TABLE)
  replaceable_points:
  - name: fetch_engine
    description: Data source engine for market data acquisition
    options:
    - name: tdx
      traits:
      - Chinese market focus
      - Real-time support
      - Proprietary protocol
      fit_for:
      - A-shares day/minute data
      - Chinese futures
      - Quick setup for CN markets
      not_fit_for:
      - International markets
      - Free data access
    - name: tushare
      traits:
      - Comprehensive CN data
      - Financial data included
      - REST API
      fit_for:
      - Financial statement data
      - Extended CN market coverage
      not_fit_for:
      - Real-time trading
      - High-frequency requests
    - name: huobi
      traits:
      - Crypto-native
      - WebSocket support
      - 24/7 markets
      fit_for:
      - Cryptocurrency trading
      - DeFi analysis
      not_fit_for:
      - Traditional securities
      - Chinese regulatory compliance
    - name: binance
      traits:
      - Global crypto exchange
      - High frequency
      - Futures included
      fit_for:
      - Crypto algorithmic trading
      - Binance futures strategies
      not_fit_for:
      - Stock/futures markets
      - China A-shares
    - name: bitmex
      traits:
      - Perpetual contracts
      - Leverage tokens
      - Derivatives focus
      fit_for:
      - Crypto derivatives backtesting
      - Bitcoin perpetual strategies
      not_fit_for:
      - Spot trading
      - Traditional asset classes
    default: tdx
  - name: storage_backend
    description: Primary database for market data persistence
    options:
    - name: mongodb
      traits:
      - Schema-on-read
      - JSON documents
      - Flexible queries
      fit_for:
      - Schema-changing data
      - Operational data
      - Rapid prototyping
      not_fit_for:
      - Analytics-heavy workloads
      - Time-series aggregation
    - name: clickhouse
      traits:
      - Column-oriented
      - High write throughput
      - ReplacingMergeTree
      fit_for:
      - Factor storage
      - Time-series analytics
      - Large dataset queries
      not_fit_for:
      - Single-document flexibility
      - Real-time updates
    default: mongodb
  design_decisions:
  - MongoDB as primary storage for flexibility and JSON-like documents (QUANTAXIS/QASU/main.py:1) — QUANTAXIS
    predates ClickHouse adoption; MongoDB's schema-on-read handles schema changes in Chinese market data
  - ClickHouse for factor storage with ReplacingMergeTree (QUANTAXIS/QAFactor/feature.py:14) — Factor
    data is append-only time-series; ReplacingMergeTree dedupes updates efficiently
  - Multi-engine fetch abstraction (tdx/tushare/huobi) (QUANTAXIS/QAFetch/Fetcher.py:75) — Different sources
    have different coverage/costs; engine abstraction allows fallback
  - Parallel download via ProcessPoolExecutor (QUANTAXIS/QASU/save_tdx_parallelism.py:43) — Stock downloads
    are I/O bound; parallelization cuts download time 10x
  acceptance_hints:
  - Successfully downloads and stores at least 1000 bars of stock day data
  - Parallel download completes within 10% of sequential time for 100 securities
  - Data persists across MongoDB restarts with correct QA_DataStruct format
  - Fallback to secondary engine succeeds when primary fails
- id: data_processing
  name: Data Processing & Resampling
  order: 2
  responsibility: Transform raw OHLCV data through resampling (1min→5min→day), forward/backward adjustment
    (fq), market cap calculation, and tick-to-bar aggregation. This stage exists to normalize and prepare
    market data for consistent analysis.
  interface:
    inputs:
    - Raw OHLCV DataFrames
    - Target frequency
    - Adjustment type (qfq/hfq/bfq)
    outputs:
    - Resampled QA_DataStruct_* with MultiIndex (datetime, code)
  required_methods:
  - name: _quotation_base.resample
    description: Abstract base method for resampling OHLCV data to different frequencies
    evidence: QUANTAXIS/QAData/base_datastruct.py:50(_quotation_base)
  - name: QA_DataStruct_Stock_day.adjust
    description: Apply forward/backward price adjustment to stock daily data
    evidence: QUANTAXIS/QAData/QADataStruct.py:114(QA_DataStruct_Stock_day)
  - name: QA_DataStruct_Stock_min.resample
    description: Resample minute-level data to higher frequencies with proper OHLCV aggregation
    evidence: QUANTAXIS/QAData/QADataStruct.py:299(QA_DataStruct_Stock_min)
  - name: QA_data_min_resample.resample
    description: Core OHLCV resampling logic supporting multiple aggregation functions
    evidence: QUANTAXIS/QAData/data_resample.py:50(QA_data_min_resample)
  - name: QA_data_stock_to_fq.calculate
    description: Compute forward adjustment factors for stock price normalization
    evidence: QUANTAXIS/QAData/data_fq.py:20(QA_data_stock_to_fq)
  key_behaviors:
  - behavior: MultiIndex (datetime, code) as canonical identifier
    description: Every DataStruct objects use MultiIndex as primary key enabling efficient multi-security
      queries and pandas groupby semantics
    evidence: QUANTAXIS/QAData/base_datastruct.py:82(drop_duplicates.sort_index)
  - behavior: DataFrame.drop_duplicates() on initialization
    description: Prevents duplicate bars from causing incorrect indicator calculations by deduplicating
      on DataStruct creation
    evidence: QUANTAXIS/QAData/base_datastruct.py:82
  - behavior: Forward adjustment (qfq) as default if_fq='bfq'
    description: Backward adjustment preserves original price levels; qfq preferred by most Chinese quant
      practitioners for backtesting
    evidence: QUANTAXIS/QAData/base_datastruct.py:92(self.if_fq=if_fq)
  replaceable_points:
  - name: fq_method
    description: Stock price adjustment method for handling splits and dividends
    options:
    - name: qfq
      traits:
      - Forward adjustment
      - Current perspective
      - Analyst preference
      fit_for:
      - Factor research
      - Performance attribution
      - Cross-security comparison
      not_fit_for:
      - Historical P&L
      - Execution simulation
      - Original price analysis
    - name: hfq
      traits:
      - Historical perspective
      - Split-adjusted
      fit_for:
      - Historical returns
      - Technical analysis
      - Pattern recognition
      not_fit_for:
      - Current price comparison
      - Factor construction
    - name: bfq
      traits:
      - No adjustment
      - Original prices
      - No splits/dividends applied
      fit_for:
      - Live trading simulation
      - Original market conditions
      - Execution backtesting
      not_fit_for:
      - Long-term factor analysis
      - Cross-period comparison
    - name: none
      traits:
      - Raw data passthrough
      - No transformation
      fit_for:
      - Raw data preservation
      - Debugging
      - External validation
      not_fit_for:
      - Factor backtesting
      - Performance analysis
    default: bfq
  - name: resample_agg
    description: OHLCV aggregation function for resampling
    options:
    - name: last
      traits:
      - Close price preservation
      - Simple aggregation
      fit_for:
      - Simple bar aggregation
      - Volume summing
      - Standard resampling
      not_fit_for:
      - Open/high/low analysis
      - OHLC-specific strategies
    - name: ohlc
      traits:
      - Full OHLC preservation
      - Complete bar information
      fit_for:
      - Candlestick patterns
      - Intraday analysis
      - Technical indicators
      not_fit_for:
      - Simple aggregation
      - Memory-constrained environments
    - name: first
      traits:
      - Open price preservation
      - Gap analysis
      fit_for:
      - Gap analysis
      - Jump detection
      - Specific open strategies
      not_fit_for:
      - Standard resampling
      - Most indicator calculations
    default: last
  design_decisions:
  - MultiIndex (datetime, code) as canonical data identifier (QUANTAXIS/QAData/base_datastruct.py:82)
    — Enables efficient multi-security queries and aligns with pandas groupby semantics
  - Forward adjustment (qfq) as default if_fq='bfq' (QUANTAXIS/QAData/base_datastruct.py:92) — Backward
    adjustment preserves original price levels; qfq preferred by most Chinese quant practitioners
  - DataFrame.drop_duplicates() on init (QUANTAXIS/QAData/base_datastruct.py:82) — Prevents duplicate
    bars from causing incorrect indicator calculations
  - Resample methods on DataStruct instead of raw DataFrame (QUANTAXIS/QAData/QADataStruct.py:435) — Keeps
    resample context-aware (preserves dtype, fq settings)
  acceptance_hints:
  - Resampled 1min data to 5min produces correct OHLCV aggregation
  - MultiIndex (datetime, code) queryable by either dimension independently
  - Forward adjustment produces consistent factor values across different date ranges
  - drop_duplicates removes exactly 0 rows when input has no duplicates
- id: factor_computation
  name: Factor Computation & Analysis
  order: 3
  responsibility: Compute alpha factors (MA, MACD, custom), store in ClickHouse, analyze IC/IR, and generate
    forward returns for backtesting. This stage exists to transform raw price data into predictive signals.
  interface:
    inputs:
    - Stock day/min DataFrames
    - Factor parameters
    outputs:
    - Factor values in ClickHouse
    - IC/IR analysis reports
  required_methods:
  - name: QASingleFactor_DailyBase.calc
    description: Compute factor values and return DataFrame with date/code/factor columns for batch ClickHouse
      insertion
    evidence: QUANTAXIS/QAFactor/feature.py:104(calc)
  - name: QASingleFactor_DailyBase.register
    description: Register factor metadata enabling discovery and versioning across the factor library
    evidence: QUANTAXIS/QAFactor/feature.py:62(register)
  - name: QAFeatureAnalysis.analyze
    description: Analyze factor IC (Information Coefficient) and IR (Information Ratio) with neutralization
    evidence: QUANTAXIS/QAFactor/featureAnalysis.py:29(QAFeatureAnalysis)
  - name: QAFeatureBacktest.generate_signals
    description: Generate trading signals based on factor values for backtesting
    evidence: QUANTAXIS/QAFactor/featurebacktest.py:10(QAFeatureBacktest)
  - name: QA_indicator_MA.calculate
    description: Moving average indicator computation supporting multiple window sizes
    evidence: QUANTAXIS/QAIndicator/indicators.py:30(QA_indicator_MA)
  key_behaviors:
  - behavior: ClickHouse ReplacingMergeTree for factor storage
    description: Deduplication on merge handles factor recalculation; high write throughput for daily
      updates with efficient querying
    evidence: QUANTAXIS/QAFactor/feature.py:14(CREATE TABLE)
  - behavior: Factor calc() returns standard schema DataFrame
    description: Standard schema (date, code, factor columns) enables batch processing and easy ClickHouse
      insertion
    evidence: QUANTAXIS/QAFactor/feature.py:104(calc)
  - behavior: Factor base class with register/insert lifecycle
    description: Metadata tracking enables factor discovery, versioning, and portfolio-level factor management
    evidence: QUANTAXIS/QAFactor/feature.py:62(register)
  replaceable_points:
  - name: factor_type
    description: Factor computation class for different alpha strategies
    options:
    - name: MA10
      traits:
      - Simple moving average
      - Trend-following
      - Low complexity
      fit_for:
      - Momentum strategies
      - Trend confirmation
      - Baseline comparison
      not_fit_for:
      - Mean reversion
      - High-frequency signals
      - Multi-factor models
    - name: EMA
      traits:
      - Exponential weighting
      - Responsive
      - Noise filtering
      fit_for:
      - Short-term signals
      - Adaptive strategies
      - Recent data emphasis
      not_fit_for:
      - Long-term trends
      - Slow-moving markets
    - name: custom
      traits:
      - User-defined logic
      - Flexible computation
      - Full control
      fit_for:
      - Novel alpha research
      - Complex factors
      - Proprietary signals
      not_fit_for:
      - Standard benchmarks
      - Quick prototyping
    default: MA10
  - name: storage
    description: Factor storage backend for persistence and retrieval
    options:
    - name: clickhouse
      traits:
      - High throughput
      - Time-series optimized
      - ReplacingMergeTree
      fit_for:
      - Production factors
      - Large universes
      - Analytical queries
      not_fit_for:
      - Small datasets
      - Frequent updates
      - Schema flexibility
    - name: mongodb
      traits:
      - Flexible schema
      - Document storage
      - JSON-native
      fit_for:
      - Factor prototyping
      - Flexible factor formats
      - Quick iterations
      not_fit_for:
      - Large-scale production
      - Analytical workloads
    default: clickhouse
  design_decisions:
  - ClickHouse ReplacingMergeTree for factor storage (QUANTAXIS/QAFactor/feature.py:14) — Deduplication
    on merge handles factor recalculation; high write throughput for daily updates
  - Factor calc() returns DataFrame with date/code/factor columns (QUANTAXIS/QAFactor/feature.py:104)
    — Standard schema enables batch processing and easy ClickHouse insertion
  - Factor base class with register/insert lifecycle (QUANTAXIS/QAFactor/feature.py:62) — Metadata tracking
    enables factor discovery and versioning
  acceptance_hints:
  - Factor values successfully insert into ClickHouse without duplicate keys after merge
  - IC analysis returns correlation coefficient between factor and forward returns
  - Custom factor inheriting from base class registers and can be queried
  - Factor computation completes for 3000+ securities within 60 seconds
- id: strategy_execution
  name: Strategy Execution Engine
  order: 4
  responsibility: Run trading strategies on historical data (backtest) or live streams. Handle bar/tick
    callbacks, position tracking, and order generation. This stage is the core of the system that transforms
    signals into executable orders.
  interface:
    inputs:
    - Historical DataFrames or live tick/bar streams
    outputs:
    - Orders
    - Trade fills
    - Position updates
  required_methods:
  - name: QAStrategyCtaBase.on_bar
    description: Event callback for processing bar data and generating trading signals
    evidence: QUANTAXIS/QAStrategy/qactabase.py:27(QAStrategyCtaBase)
  - name: QAStrategyStockBase.send_order
    description: Send order with T+1 handling and stock-specific semantics
    evidence: QUANTAXIS/QAStrategy/qamultibase.py:25(QAStrategyStockBase)
  - name: QARSStrategy.run
    description: Rust-powered strategy execution for QARS backtester with 10-20x speedup
    evidence: QUANTAXIS/QARSBridge/qars_backtest.py:108(QARSStrategy)
  - name: QARSBacktest.execute
    description: High-performance Rust backtest runner for large dataset strategies
    evidence: QUANTAXIS/QARSBridge/qars_backtest.py:18(QARSBacktest)
  - name: QA_Engine.run
    description: Multi-kernel thread engine for parallel strategy job execution
    evidence: QUANTAXIS/QAEngine/QAThreadEngine.py:131(QA_Engine)
  key_behaviors:
  - behavior: Separate CTA base vs Stock base for market-specific rules
    description: Stock T+1 trading requires different position tracking than futures; separation avoids
      logic branching and market-specific conditionals
    evidence: QUANTAXIS/QAStrategy/qamultibase.py:25(QAStrategyStockBase)
  - behavior: Rust QARS engine for 10-20x backtest speedup
    description: Python backtests on large datasets are too slow; Rust provides near-C performance with
      full Python API compatibility
    evidence: QUANTAXIS/QARSBridge/qars_backtest.py:18(__init__)
  - behavior: Market type auto-detection from code regex
    description: Futures codes contain letters (e.g., rb2005); stocks are pure digits — no explicit parameter
      needed
    evidence: QUANTAXIS/QAStrategy/qactabase.py:85(re.search)
  - behavior: LIMIT order fills at CURRENT bar prices
    description: Backtest execution model fills orders at current bar; NEXT_OPEN recommended for realism
    evidence: QUANTAXIS/QAUtil/QAParameter.py:114-122(ORDER_MODEL)
  replaceable_points:
  - name: strategy_base
    description: Strategy base class defining execution paradigm
    options:
    - name: QAStrategyCtaBase
      traits:
      - CTA-style
      - Futures-oriented
      - Single标的
      fit_for:
      - Trend-following
      - Futures trading
      - Single-asset strategies
      not_fit_for:
      - Multi-asset portfolios
      - Stock T+1 trading
      - Mean reversion
    - name: QAStrategyStockBase
      traits:
      - Stock-oriented
      - T+1 support
      - Multi-asset
      fit_for:
      - Stock portfolios
      - Long-only strategies
      - Chinese A-shares
      not_fit_for:
      - Futures trading
      - Same-day trading
      - Short selling
    - name: QARSStrategy
      traits:
      - Rust-powered
      - High-performance
      - Batch processing
      fit_for:
      - Large backtests
      - Production strategies
      - Performance-critical
      not_fit_for:
      - Live trading
      - Strategy prototyping
      - Debug scenarios
    default: QAStrategyCtaBase
  - name: execution_mode
    description: Strategy execution mode for backtest vs live trading
    options:
    - name: backtest
      traits:
      - Historical data
      - Batch processing
      - No latency
      fit_for:
      - Strategy validation
      - Performance measurement
      - Parameter optimization
      not_fit_for:
      - Live trading
      - Real-time signals
    - name: sim
      traits:
      - Simulation mode
      - Paper trading
      - Live data
      fit_for:
      - Strategy testing
      - Signal validation
      - Live prototyping
      not_fit_for:
      - Production trading
      - High-frequency
    - name: py
      traits:
      - Python-native
      - Event-driven
      - Standard execution
      fit_for:
      - Standard strategies
      - Learning purposes
      - Custom logic
      not_fit_for:
      - High-performance
      - Large-scale backtests
    default: py
  - name: data_feed
    description: Data subscription model for live strategy updates
    options:
    - name: eventmq
      traits:
      - Message queue
      - Decoupled
      - Multi-subscriber
      fit_for:
      - Production systems
      - Multi-strategy
      - Distributed architectures
      not_fit_for:
      - Single strategy
      - Low latency requirements
    - name: direct
      traits:
      - Direct connection
      - Low overhead
      - Synchronous
      fit_for:
      - Simple strategies
      - Low-latency
      - Single strategy
      not_fit_for:
      - Multi-strategy
      - Distributed deployments
    default: eventmq
  design_decisions:
  - Separate CTA base vs Stock base for market-specific rules (QUANTAXIS/QAStrategy/qamultibase.py:25)
    — Stock T+1 trading requires different position tracking than futures; separation avoids logic branching
  - Rust QARS engine for 10-20x backtest speedup (QUANTAXIS/QARSBridge/qars_backtest.py:18) — Python backtests
    on large datasets are too slow; Rust provides near-C performance
  - init_cash=1000000 as default (QUANTAXIS/QAStrategy/qactabase.py:29) — 1M CNY is a common initial capital
    for retail-sized backtests
  - market_type auto-detection from code regex (QUANTAXIS/QAStrategy/qactabase.py:85) — Futures codes
    contain letters (e.g., rb2005); stocks are pure digits — no explicit parameter needed
  acceptance_hints:
  - Strategy executes on 1 year of daily data without memory errors
  - Rust backtest completes 10x faster than Python equivalent with identical results
  - Market type auto-detection correctly classifies stocks vs futures from code strings
  - 'T+1 trading restriction enforced: same-day sells rejected for stocks'
- id: order_management
  name: Order Management & Execution
  order: 5
  responsibility: Create, track, and settle orders. Support limit/market orders, order queuing, partial
    fills, cancellation, and commission calculation. This stage exists to manage the complete order lifecycle
    from creation to settlement.
  interface:
    inputs:
    - Order requests (price, volume, direction, offset)
    outputs:
    - Order status updates
    - Trade confirmations
    - Commission fees
  required_methods:
  - name: QA_Order.create
    description: Create single order representation with lifecycle state machine
    evidence: QUANTAXIS/QAMarket/QAOrder.py:68(QA_Order)
  - name: QA_OrderQueue.settle
    description: Daily order book management with settlement processing
    evidence: QUANTAXIS/QAMarket/QAOrder.py:694(QA_OrderQueue)
  - name: QA_Position.update
    description: Position tracking for long/short, today/his, and frozen margins
    evidence: QUANTAXIS/QAMarket/QAPosition.py:17(QA_Position)
  - name: QIFI_Account.sync
    description: Account with dynamic equity and multi-position support, compatible with DIFF protocol
    evidence: QUANTAXIS/QIFI/QifiAccount.py:35(QIFI_Account)
  - name: MARKET_PRESET.get_commission
    description: Market-specific commission/margin/tick tables lookup
    evidence: QUANTAXIS/QAMarket/market_preset.py:6(MARKET_PRESET)
  key_behaviors:
  - behavior: ORDER_DIRECTION encodes both action and market semantics
    description: BUY/SELL for stocks, BUY_OPEN/SELL_CLOSE for futures — single enum covers both without
      branching
    evidence: QUANTAXIS/QAUtil/QAParameter.py:44(ORDER_DIRECTION)
  - behavior: Order status state machine with 9 distinct states
    description: 'Explicit state machine prevents invalid transitions: NEW→QUEUED→SUCCESS_ALL/SUCCESS_PART/CANCEL_ALL→SETTLED'
    evidence: QUANTAXIS/QAUtil/QAParameter.py:124(ORDER_STATUS)
  - behavior: T+1 stock settlement with close_available tracking
    description: Chinese stocks cannot be sold same day; frozen volumes enforce trading restrictions
    evidence: QUANTAXIS/QAMarket/QAPosition.py:821(close_available)
  - behavior: SELL orders processed before BUY during settlement
    description: Critical ordering contract ensures cash preservation — buy orders may execute with insufficient
      funds if sell orders processed after
    evidence: QUANTAXIS/QIFI/QifiAccount.py:455-466(settle)
  replaceable_points:
  - name: order_model
    description: Order execution model determining fill price
    options:
    - name: LIMIT
      traits:
      - Price-specified
      - Fill guarantee uncertain
      - Common
      fit_for:
      - Standard backtesting
      - Execution simulation
      - Controlled entry/exit
      not_fit_for:
      - Urgent execution
      - Market orders
    - name: MARKET
      traits:
      - Immediate fill
      - Price uncertainty
      - Slippage
      fit_for:
      - Urgent execution
      - Liquidity simulation
      - HFT strategies
      not_fit_for:
      - Precise backtesting
      - Cost-sensitive strategies
    - name: CLOSE
      traits:
      - Close bar execution
      - End-of-day
      fit_for:
      - Daily rebalancing
      - End-of-day strategies
      not_fit_for:
      - Intraday execution
      - Timely entry
    - name: NEXT_OPEN
      traits:
      - Next bar open
      - Realistic simulation
      fit_for:
      - Realistic backtesting
      - Execution modeling
      not_fit_for:
      - Same-bar execution
      - Intraday precision
    default: LIMIT
  - name: commission_calc
    description: Commission calculation method for transaction costs
    options:
    - name: standard
      traits:
      - Market preset-based
      - Stock/future differentiated
      fit_for:
      - Production trading
      - Regulatory compliance
      - Chinese markets
      not_fit_for:
      - Custom fee structures
      - Discount brokers
    - name: custom
      traits:
      - User-defined rates
      - Flexible formulas
      fit_for:
      - Discount brokers
      - Proprietary fee structures
      not_fit_for:
      - Standard compliance
      - Regulatory reporting
    default: standard
  design_decisions:
  - ORDER_DIRECTION encodes both action and market semantics (QUANTAXIS/QAUtil/QAParameter.py:44) — BUY/SELL
    for stocks, BUY_OPEN/SELL_CLOSE for futures — single enum covers both without branching
  - Order status machine with state transitions 100→300→200/400→500 (QUANTAXIS/QAUtil/QAParameter.py:124)
    — Explicit state machine prevents invalid transitions (e.g., cancel before queued)
  - Commission computed in QA_Order.calc_commission (QUANTAXIS/QAMarket/QAOrder.py:304) — Order knows
    its market_type; delegates to MARKET_PRESET for correct formula
  - 'T+1 stock settlement: close_available tracks locked shares (QUANTAXIS/QAMarket/QAPosition.py:821)
    — Chinese stocks cannot be sold same day; frozen volumes enforce this'
  - Float profit computed on every price tick (QUANTAXIS/QAMarket/QAPosition.py:287) — Mark-to-market
    requires real-time P&L; called from on_price_change callback
  acceptance_hints:
  - Order lifecycle transitions correctly through each states without invalid jumps
  - T+1 restriction prevents same-day sell of purchased stock
  - Commission calculated matches MARKET_PRESET rates for stocks (0.025%) and futures
  - SELL before BUY settlement order preserves cash availability
