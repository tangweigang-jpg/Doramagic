business_decisions:
- id: BD-001
  type: B/DK
  content: MongoDB as primary storage for flexibility and JSON-like documents
  rationale: MongoDB was chosen over relational alternatives because QUANTAXIS predates ClickHouse adoption;
    its schema-on-read capability handles schema evolution gracefully as Chinese market data structures
    change over time without requiring costly migrations.
  evidence: QUANTAXIS/QASU/main.py:1(DATABASE)
  stage: data_collection
  alternative_considered: PostgreSQL with JSONB columns was considered but would require upfront schema
    design
  _evidence_issues:
  - 'FN_NOT_FOUND: DATABASE in QUANTAXIS/QASU/main.py'
- id: BD-002
  type: B
  content: ClickHouse ReplacingMergeTree engine for factor storage with deduplication on merge
  rationale: Factor data is append-only time-series where recalculations overwrite prior values; ReplacingMergeTree
    engine automatically deduplicates records with identical primary keys during background merges, eliminating
    the need for explicit DELETE operations and supporting high-throughput daily batch updates.
  evidence: QUANTAXIS/QAFactor/feature.py:14(CREATE TABLE)
  stage: data_collection
  alternative_considered: Standard MergeTree would require scheduled DELETE queries before re-insertion
  _evidence_issues:
  - 'INVALID_IDENTIFIER: CREATE TABLE in QUANTAXIS/QAFactor/feature.py'
- id: BD-003
  type: BA/DK
  content: Multi-engine fetch abstraction (tdx/tushare/huobi) for data source fallback
  rationale: Different data sources provide varying coverage across Chinese markets with different latency,
    cost, and availability profiles; engine abstraction allows transparent fallback when primary source
    fails or lacks coverage for specific instruments, ensuring continuous data supply.
  evidence: QUANTAXIS/QAFetch/Fetcher.py:316(QA_quotation)
  stage: data_collection
  alternative_considered: Hard-coded single source would cause gaps when source is unavailable
- id: BD-004
  type: M/DK
  content: Parallel download via ProcessPoolExecutor for I/O-bound stock downloads
  rationale: Stock market data downloads are primarily I/O-bound with network latency dominating execution
    time; using ProcessPoolExecutor enables concurrent downloads across multiple processes, achieving
    approximately 10x speedup compared to sequential fetching for large universe backfills.
  evidence: QUANTAXIS/QASU/save_tdx_parallelism.py:506(__saving_work)
  stage: data_collection
  alternative_considered: Sequential downloads; threading limited by GIL for CPU-bound tasks
- id: BD-005
  type: B/RC
  content: MultiIndex (datetime, code) as canonical data identifier for efficient multi-security queries
  rationale: Financial time-series data naturally requires dual indexing by timestamp and security code;
    MultiIndex enables efficient filtering by either dimension and aligns with pandas groupby semantics
    for cross-sectional analysis while maintaining proper temporal ordering within each security.
  evidence: QUANTAXIS/QAData/base_datastruct.py:50(_quotation_base)
  stage: data_processing
  alternative_considered: Single-level index would require separate data structures per security
- id: BD-006
  type: B/BA
  content: Forward adjustment (qfq) as default price adjustment when if_fq='bfq'
  rationale: Backward adjustment preserves original price levels which is important for historical accuracy,
    but forward adjustment (qfq) is the industry standard preferred by most Chinese quantitative practitioners
    as it normalizes each historical prices to current levels for easier ratio calculations and strategy
    development.
  evidence: QUANTAXIS/QAData/base_datastruct.py:92(self.if_fq=if_fq)
  stage: data_processing
  alternative_considered: No adjustment (none) would require manual handling in every strategy
  _evidence_issues:
  - 'INVALID_IDENTIFIER: self.if_fq=if_fq in QUANTAXIS/QAData/base_datastruct.py'
- id: BD-007
  type: M/BA
  content: DataFrame.drop_duplicates() on DataStruct initialization to prevent duplicate bars
  rationale: Duplicate bars in financial time-series data can cause incorrect indicator calculations such
    as double-counting volume or generating false technical patterns; calling drop_duplicates during initialization
    ensures data integrity from the point of entry and prevents propagation of corrupted state to indicators.
  evidence: QUANTAXIS/QAData/base_datastruct.py:62(__init__)
  stage: data_processing
  alternative_considered: Lazy deduplication would allow corrupted state to persist longer in pipeline
- id: BD-008
  type: BA/DK
  content: Resample methods on DataStruct class rather than raw DataFrame for context awareness
  rationale: Resampling on raw DataFrame loses domain-specific metadata such as adjustment flags and dtype
    information; implementing resample as a DataStruct method preserves fq (forward adjustment) settings
    and ensures consistent output type, maintaining data lineage and preventing subtle bugs from dtype
    coercion.
  evidence: QUANTAXIS/QAData/QADataStruct.py:1717(resample)
  stage: data_processing
  alternative_considered: Standalone resample functions would require passing metadata separately
- id: BD-009
  type: BA
  content: Factor calc() method returns DataFrame with standardized date/code/factor columns
  rationale: Standardized output schema (date, code, factor columns) enables uniform batch processing
    pipelines and simplifies ClickHouse insertion by matching table schema; this contract ensures any
    factor implementation is compatible with the storage and analysis downstream without per-factor adapter
    code.
  evidence: QUANTAXIS/QAFactor/feature.py:104(calc)
  stage: factor_computation
  alternative_considered: Custom return types per factor would require factor-specific handling downstream
- id: BD-010
  type: BA
  content: Factor base class with register/insert lifecycle for metadata tracking and versioning
  rationale: Factor discovery and reproducibility require tracking which factors exist and their computation
    parameters; the register method maintains a registry enabling lazy loading of factors while the insert
    lifecycle handles persistence, supporting factor lineage tracking and audit trails for compliance.
  evidence: QUANTAXIS/QAFactor/feature.py:62(register)
  stage: factor_computation
  alternative_considered: Manual factor registration would rely on developer discipline rather than enforced
    protocol
- id: BD-011
  type: B/DK
  content: Separate CTA strategy base vs Stock strategy base for market-specific trading rules
  rationale: Stock T+1 trading requires position tracking that locks shares until next trading day while
    futures allow same-day position reversal; separating base classes avoids conditional branching for
    incompatible rules and prevents bugs where stock position logic incorrectly applies to futures or
    vice versa.
  evidence: QUANTAXIS/QAStrategy/qamultibase.py:25(QAStrategyStockBase)
  stage: strategy_execution
  alternative_considered: Unified base with market_type flags would create complex if-else chains
- id: BD-012
  type: BA
  content: Rust QARS engine for 10-20x backtest speedup via cross-language bridge
  rationale: Python backtests on large historical datasets with millions of ticks are prohibitively slow
    for iterative strategy development; the Rust QARS engine provides near-C performance for simulation
    while Python handles strategy logic, achieving 10-20x speedup that makes overnight backtests complete
    in minutes.
  evidence: QUANTAXIS/QARSBridge/qars_backtest.py:135(__init__)
  stage: strategy_execution
  alternative_considered: Pure Python backtest would require sampling large datasets, reducing accuracy
- id: BD-013
  type: B/BA
  content: init_cash=1000000 CNY as default initial capital for retail-sized backtests
  rationale: One million CNY represents a common initial capital level for individual retail quant traders
    in China; using this as default provides realistic slippage and commission estimates for the primary
    target user segment without requiring explicit configuration for standard use cases.
  evidence: QUANTAXIS/QAStrategy/qactabase.py:29(init_cash=1000000)
  stage: strategy_execution
  alternative_considered: Smaller defaults would understate real-world slippage for larger accounts
  _evidence_issues:
  - 'INVALID_IDENTIFIER: init_cash=1000000 in QUANTAXIS/QAStrategy/qactabase.py'
- id: BD-014
  type: B/DK
  content: market_type auto-detection from security code regex patterns
  rationale: Futures contract codes contain alphanumeric characters (e.g., rb2005 for rebar) while stock
    codes are purely numeric (e.g., 600000); automatic detection via regex eliminates the need for users
    to explicitly specify market type and prevents errors from mismatched market configuration.
  evidence: QUANTAXIS/QAStrategy/qactabase.py:85(re.search)
  stage: strategy_execution
  alternative_considered: Manual market_type parameter would require user knowledge and be error-prone
  _evidence_issues:
  - 'FN_NOT_FOUND: re.search in QUANTAXIS/QAStrategy/qactabase.py'
- id: BD-015
  type: B/BA
  content: ORDER_DIRECTION enum encodes both action and market semantics for unified order handling
  rationale: Stock trading uses BUY/SELL semantics while futures require BUY_OPEN/SELL_CLOSE distinction;
    a single enum with market-aware values eliminates branching logic and ensures order routing correctly
    interprets intent without requiring separate order types for each market.
  evidence: QUANTAXIS/QAUtil/QAParameter.py:31(ORDER_DIRECTION)
  stage: order_management
  alternative_considered: Separate order types per market would double the enum size and routing complexity
- id: BD-016
  type: B
  content: 'Order status state machine with explicit transitions: 100→300→200/400→500'
  rationale: Order lifecycle involves queued (100), submitted (300), filled (200), partially-filled (400),
    and rejected/cancelled (500) states; explicit state machine prevents invalid transitions such as cancelling
    an order before it enters the queue or filling an already-cancelled order, ensuring data consistency.
  evidence: QUANTAXIS/QAUtil/QAParameter.py:124(ORDER_STATUS)
  stage: order_management
  alternative_considered: Free-form status updates could allow impossible state combinations
- id: BD-017
  type: B/DK
  content: Commission computed within QA_Order.calc_commission using market_type delegation
  rationale: Different markets have different commission structures (stocks vs futures vs options); computing
    commission inside the Order object delegates to MARKET_PRESET for the correct formula based on market_type,
    ensuring accurate cost calculation without coupling order creation to market-specific calculator objects.
  evidence: QUANTAXIS/QAMarket/QAOrder.py:304(calc_commission)
  stage: order_management
  alternative_considered: External commission calculators would require passing market context separately
- id: BD-018
  type: B/DK
  content: 'T+1 stock settlement: close_available tracks locked shares preventing same-day selling'
  rationale: Chinese stock market regulations prohibit selling shares acquired on the same trading day;
    close_available subtracts frozen volumes from total holdings to enforce this restriction, preventing
    orders that would violate settlement rules and protecting against regulatory penalties.
  evidence: QUANTAXIS/QAMarket/QAPosition.py:821(close_available)
  stage: order_management
  alternative_considered: Ignoring T+1 would cause rejected orders and potential compliance violations
- id: BD-019
  type: M/DK
  content: Float profit computed on every price tick via on_price_change callback
  rationale: Mark-to-market accounting requires real-time P&L valuation; computing float_profit on each
    price update enables live position tracking with current unrealized gains/losses, supporting real-time
    dashboard displays and risk monitoring without requiring explicit valuation calls.
  evidence: QUANTAXIS/QAMarket/QAPosition.py:287(float_profit_long)
  stage: order_management
  alternative_considered: Batch valuation would introduce lag in P&L reporting
- id: BD-020
  type: B/DK
  content: RabbitMQ as message broker for decoupled live data distribution
  rationale: Decoupling data producers from consumers via message broker enables multiple strategy instances
    to subscribe to live market data without direct connection management; RabbitMQ's pub/sub model supports
    multi-subscriber patterns where different strategies receive identical data simultaneously.
  evidence: QUANTAXIS/QAPubSub/base.py:3(pika)
  stage: messaging_infrastructure
  alternative_considered: Direct socket connections would require managing per-instance connections
  _evidence_issues:
  - 'FN_NOT_FOUND: pika in QUANTAXIS/QAPubSub/base.py'
- id: BD-021
  type: M
  content: Context manager (__enter__/__exit__) for RabbitMQ connections ensuring proper cleanup
  rationale: RabbitMQ connection leaks cause resource exhaustion and broker connection errors; context
    manager ensures channel closes before connection closes in reverse order of opening, preventing resource
    leaks that accumulated in v2.1.0 and earlier versions.
  evidence: QUANTAXIS/QAPubSub/base.py:83(__exit__)
  stage: messaging_infrastructure
  alternative_considered: Manual close calls would require developer discipline to always execute cleanup
- id: BD-022
  type: BA
  content: Routing key exchange pattern for per-strategy order filtering
  rationale: Using strategy_id as the RabbitMQ routing key enables per-strategy message filtering at the
    broker level; exchanges route orders to appropriate strategy queues without requiring in-process filtering,
    supporting multi-strategy deployments where different instances process different subsets of orders.
  evidence: QUANTAXIS/QAPubSub/producer.py:64(publisher_routing)
  stage: messaging_infrastructure
  alternative_considered: Fan-out exchange would duplicate each orders to each consumers
  vague_rationale: true
- id: BD-023
  type: BA
  content: Optional qadataswap import with graceful fallback to pure Python implementation
  rationale: The optional Rust library qadataswap may not be installed in each environments; try/except
    import pattern ensures core functionality works without the optional acceleration while falling back
    to Python implementation, enabling deployment in environments where Rust toolchain is unavailable.
  evidence: QUANTAXIS/QADataBridge/__init__.py:65(has_dataswap_support)
  stage: global
  alternative_considered: Hard dependency would prevent installation in environments without Rust
- id: BD-024
  type: B
  content: Arrow IPC as zero-copy interchange format between Python and Rust processes
  rationale: Arrow IPC enables direct memory sharing between processes without serialization/deserialization
    overhead; avoiding pickle or JSON encoding for large DataFrames significantly reduces cross-process
    communication latency and CPU usage during high-frequency data transfers between Python strategy logic
    and Rust backtest engine.
  evidence: QUANTAXIS/QADataBridge/__init__.py:46(has_arrow_support)
  stage: global
  alternative_considered: Pickle serialization would add 10-100ms overhead per large DataFrame transfer
  _evidence_issues:
  - 'FN_NOT_FOUND: has_arrow_support in QUANTAXIS/QADataBridge/__init__.py'
- id: BD-025
  type: B
  content: Butterworth filter order = 3, cutoff = 0.05
  rationale: 'Butterworth filter parameters: order 3 for rolloff, cutoff 0.05 (5% of Nyquist). The boundary
    is higher order = sharper cutoff but more oscillation; lower cutoff = more smoothing but lag. Affects
    signal denoising quality.'
  evidence: QUANTAXIS/QAAnalysis/QAAnalysis_signal.py:120(module)
  stage: data_processing
  alternative_considered: 2nd order was too gradual; 5th order had excessive ringing
  _evidence_issues:
  - 'FN_NOT_FOUND: module in QUANTAXIS/QAAnalysis/QAAnalysis_signal.py'
- id: BD-026
  type: B/DK
  content: Exponential Moving Average (EMA) smoothing parameter
  rationale: EMA smoothing parameter controls price sensitivity balance. Lower values react faster to
    price changes but increase noise; higher values smooth volatility but lag market turns. This boundary
    determines trade signal responsiveness vs. false signal frequency.
  evidence: QUANTAXIS/QAIndicator/base.py:40-41(EMA)
  stage: QUANTAXIS.QAIndicator
  alternative_considered: Simple Moving Average (less responsive), Weighted MA (more complex rebalancing)
- id: BD-027
  type: B/DK
  content: MACD indicator standard parameters (12,26,9)
  rationale: MACD parameters define fast/slow EMA periods and signal line smoothing. The 12/26/9 standard
    reflects historical market cycles. Changing these shifts the boundary between trend detection sensitivity
    and signal noise, directly impacting crossover timing.
  evidence: QUANTAXIS/QAIndicator/indicators.py:92-102(QA_indicator_MACD)
  stage: QUANTAXIS.QAIndicator
  alternative_considered: Alternative period combinations (8,17,9) for shorter cycles, (19,39,9) for longer
    horizons
- id: BD-028
  type: B/BA
  content: William's SMA iterative formula
  rationale: Simple Moving Average calculation method determines baseline trend direction. The iterative
