- id: BD-082
  type: B/BA
  content: 'INTERACTION: BD-062 (Default if_fq=''bfq'') × BD-006 (qfq industry standard) → Contradictory
    price adjustment defaults causing factor calculation ambiguity'
  rationale: BD-062 hardcodes 'bfq' (不复权/unadjusted) as default parameter, but BD-006 rationale claims
    qfq is the industry standard. This contradiction means price-based calculations (indicators, factors)
    may use inconsistent price series across modules, leading to subtle P&L discrepancies when strategies
    compare backtest results against live execution.
  evidence: BD-062,BD-006
  stage: global
  alternative_considered: Unified price adjustment flag enforced system-wide with explicit migration path
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-083
  type: B
  content: 'INTERACTION: BD-044 (Forward return shift offset) × BD-077 (factor shift -day-1) → Hidden
    look-ahead bias amplification with Arrow IPC caching'
  rationale: Factor analysis uses shift(-day-1) for forward returns while Arrow IPC transfers data between
    Python and Rust without preserving temporal metadata. The LRU cache (BD-067) amplifies this by serving
    stale factor data across multiple backtest iterations, causing look-ahead bias to compound rather
    than reset between experiments.
  evidence: BD-044,BD-077,BD-024,BD-067
  stage: global
  alternative_considered: Cache invalidation on parameter change, explicit timestamp watermarks on IPC
    transfers
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-084
  type: BA/DK
  content: 'INTERACTION: BD-018 (T+1 settlement) × BD-061 (SELL before BUY) × BD-069 (SELL_CLOSE→SELL
    auto-convert) → Risk cascade: position liquidation ordering creates regulatory violation under mixed
    market positions'
  rationale: When a portfolio holds both stocks (subject to T+1) and futures, BD-061 mandates SELL processing
    first. For stocks, BD-069 auto-converts SELL_CLOSE to SELL, but BD-018 prevents selling shares acquired
    same day via close_available check. If futures liquidation requires cross-margining and stock positions
    were recently acquired, the SELL-first rule can trigger T+1 violations or forced position retention
    beyond intended liquidation horizon.
  evidence: BD-018,BD-061,BD-069,BD-011
  stage: global
  alternative_considered: 'Market-aware settlement ordering: futures first when cross-margining exists,
    stock T+1 respected independently'
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-085
  type: B/BA
  content: 'INTERACTION: BD-050 (365-day Sharpe convention) × BD-067 (unbounded LRU cache) → Risk cascade:
    annualized performance metrics cached without day-count awareness causing systematic mis-ranking'
  rationale: Sharpe ratio uses 365-day annualization assuming uniform trading days, but Chinese A-shares
    have ~250 actual trading days. The unbounded LRU cache means Sharpe calculations for different strategies
    may serve stale results where one strategy's metrics reflect 365-day convention while another's reflect
    actual data span, leading to incorrect strategy ranking and capital allocation decisions.
  evidence: BD-050,BD-067,BD-012
  stage: global
  alternative_considered: Cache keys including day-count convention and actual trading days; rolling Sharpe
    recalculation on cache miss
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-086
  type: B/BA
  content: 'INTERACTION: BD-076 (0.0002 magic number rounding) × BD-073 (current bar fill prices) → Amplification:
    systematic price distortion compounds through stop-loss and position calculations'
  rationale: The 0.0002 magic constant adjusts limit prices for floating-point boundaries, but when combined
    with current-bar fill assumptions, this distortion affects both entry/exit prices and the stop-loss
    distances computed from them. ATR-based stops (BD-034) compound the error as the distorted base price
    propagates through volatility calculations, causing systematic over/under-stopping.
  evidence: BD-076,BD-073,BD-034,BD-051
  stage: global
  alternative_considered: Decimal-based price calculations with explicit tick rounding instead of magic
    constants
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-087
  type: BA/DK
  content: 'INTERACTION: BD-014 (regex market detection) × BD-069 (SELL_CLOSE auto-convert) → Hidden dependency:
    multi-market strategies silently depend on market type detection accuracy for order routing'
  rationale: Order routing for multi-market strategies depends on BD-014 correctly identifying market
    type from code patterns, then BD-069 applying correct order semantics. If a code contains mixed alphanumeric
    patterns or follows non-standard conventions, the regex detection fails silently, causing BD-069 to
    apply wrong conversion rules. Futures orders may be incorrectly converted to stock-style SELL, or
    vice versa, routing to wrong market.
  evidence: BD-014,BD-069,BD-011,BD-015
  stage: global
  alternative_considered: Explicit market_type parameter required; code-based detection as secondary validation
    only
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-088
  type: B/RC
  content: 'INTERACTION: BD-061 (SELL before BUY settlement) × BD-070 (FIFO matching) × BD-049 (commission
    minimum floor) → Risk cascade: settlement ordering with FIFO creates position underestimation for
    minimum-commission trades'
  rationale: When reducing positions across multiple lots, SELL-first settlement (BD-061) with FIFO matching
    (BD-070) means the oldest (potentially highest-cost) lots are sold first. For small position reductions
    where proceeds fall below commission minimum floor (BD-049), net proceeds become negative, but FIFO
    continues matching subsequent lots before BUY orders settle, causing apparent position over-reduction
    in account view.
  evidence: BD-061,BD-070,BD-049,BD-018
  stage: global
  alternative_considered: Commission minimum applied after net position change; batch settlement for small
    lots
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-089
  type: B/BA
  content: 'INTERACTION: BD-037 (ADX threshold 25) × BD-034 (SuperTrend multiplier) × BD-060 (rolling
    volatility window) → Amplification: regime transition timing compounds volatility mis-estimation during
    trend reversals'
  rationale: ADX crossing 25 triggers regime switch from mean-reversion to trend-following, typically
    increasing position sizes. However, the SuperTrend multiplier and rolling volatility window were calibrated
    for different market regimes. During regime transitions, volatility spikes while ADX hasn't fully
    confirmed, causing positions sized for trending markets to receive stops calibrated to range-bound
    assumptions, leading to premature stop-outs on false breakouts.
  evidence: BD-037,BD-034,BD-060,BD-051
  stage: global
  alternative_considered: Adaptive SuperTrend multiplier based on ADX gradient; position size reduction
    during ADX transition zone
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-GAP-001
  type: T
  content: Threading with Queue chosen over asyncio for task execution in QA_Thread, enabling producer-consumer
    pattern with thread-safe blocking operations
  rationale: Threading was selected to support blocking task execution with queue operations (put/get)
    and pause/resume controls that integrate naturally with Python threading primitives; breaks under
    CPU-bound workloads where GIL contention degrades throughput
  evidence: QUANTAXIS/QAEngine/QAThreadEngine.py:142(__init__)
  stage: architecture
  alternative_considered: asyncio with async queues was considered but rejected for simpler blocking API
- id: BD-GAP-002
  type: BA/M
  content: Kernel pool architecture uses dictionary mapping names to QA_Thread instances, allowing named
    kernel registration and isolated task queues per kernel
  rationale: Named kernel pool enables work distribution across multiple threads with explicit registration/stop/start
    controls; breaks when kernel name collisions occur or when each kernels are blocked waiting on full
    queues
  evidence: QUANTAXIS/QAEngine/QAThreadEngine.py:164(register_kernel)
  stage: architecture
  alternative_considered: Thread pool executor pattern was not used; each kernel maintains independent
    queue
- id: BD-GAP-003
  type: B
  content: SQLite database chosen for job cache persistence with separate tables for job metadata and
    run history, enabling crash recovery and state reconstruction
  rationale: SQLite provides embedded, zero-config persistence ideal for single-node scheduler state;
    breaks under distributed deployment where multiple processes need concurrent cache access
  evidence: QUANTAXIS/QASetting/cache.py:68(_create)
  stage: data_bridging
  alternative_considered: Redis or MongoDB were not used despite being available in the ecosystem
- id: BD-GAP-004
  type: B/DK
  content: 'Scheduler enforces hard limits: max 100 concurrent jobs (limit=100), max 10000 pending jobs
    (pending_limit=10000), and 0.1s close timeout'
  rationale: Fixed limits protect system resources from runaway job spawning; breaks when job volume exceeds
    10000 pending or when graceful shutdown needs longer than 0.1s
  evidence: QUANTAXIS/QAEngine/QAAsyncSchedule.py:135(create_QAAsyncScheduler)
  stage: configuration
  alternative_considered: Dynamic limits or queue-based backpressure were not implemented
- id: BD-GAP-005
  type: B/BA
  content: Web server binds to 0.0.0.0:8010 by default, enabling external access from any network interface
  rationale: 0.0.0.0 binding allows connections from each interfaces for distributed deployment; breaks
    in security-sensitive environments requiring localhost-only access
  evidence: QUANTAXIS/QAWebServer/server.py:95(start_server)
  stage: deployment
  alternative_considered: localhost binding was not the default for easier remote access
- id: BD-GAP-006
  type: BA/DK
  content: QA_Worker uses abstract base pattern requiring subclasses to implement run(event) method, enforced
    by documentation for extensible event handlers
  rationale: Abstract worker pattern enables plugin architecture where QA_Broker, QA_Account, QA_OrderHandler
    extend QA_Worker with domain-specific logic; breaks when subclasses don't properly implement run()
    causing silent failures
  evidence: QUANTAXIS/QAEngine/QAEvent.py:46(run)
  stage: architecture
  alternative_considered: Explicit interface protocol or abstract base class was not used
- id: BD-GAP-007
  type: B/DK
  content: Market data model supports only stock/future/index markets with 1min/1day frequencies, hardcoding
    supported asset classes
  rationale: Fixed market taxonomy matches common Chinese financial instruments; breaks when adding options,
    bonds, or crypto markets that require different data schemas
  evidence: config/data_init.py:26(__init__)
  stage: business
  alternative_considered: Dynamic market registry was not implemented
- id: BD-GAP-008
  type: B/BA
  content: execute() function uses optional shell parameter defaulting to None, choosing shell=False for
    security when command is a string
  rationale: Defaulting to shell=False prevents shell injection attacks; breaks when legitimate shell
    features (pipes, globbing) are needed in commands
  evidence: QUANTAXIS/QASetting/executor.py:33(execute)
  stage: security
  alternative_considered: Shell=True as default was rejected for security; parameterized command builder
    was not provided
- id: BD-GAP-009
  type: T
  content: QA_AsyncTask implements explicit lifecycle with wait(timeout) and close(timeout) methods rather
    than relying on asyncio.Task automatic cleanup
  rationale: Explicit lifecycle control enables graceful shutdown with configurable timeouts; breaks when
    coroutines never complete and timeout enforcement becomes too aggressive
  evidence: QUANTAXIS/QAEngine/QAAsyncTask.py:52(wait)
  stage: architecture
  alternative_considered: asyncio.wait() with shield was considered but custom implementation chosen for
    explicit control
- id: BD-GAP-010
  type: B/BA
  content: Daemon thread mode available in QA_Thread constructor (daemon=False by default), controlling
    whether thread blocks program exit
  rationale: Non-daemon threads by default ensure tasks complete before exit; breaks when long-running
    tasks prevent graceful shutdown
  evidence: QUANTAXIS/QAEngine/QAThreadEngine.py:142(__init__)
  stage: configuration
  alternative_considered: Automatic daemon conversion for background tasks was not implemented
- id: BD-GAP-011
  type: T
  content: Tornado framework chosen for web server with WebSocket support, enabling bidirectional communication
