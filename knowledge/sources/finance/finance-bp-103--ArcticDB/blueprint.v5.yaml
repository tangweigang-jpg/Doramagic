    message) and the usability posture of silent auto-discovery.
  evidence: BD-051,BD-066
  stage: global
  alternative_considered: Align auto-discovery with explicit opt-in requirement matching URI deprecation
    intent
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-GAP-001
  type: T
  content: Each storage fixture is backed by its own isolated database/container to enable deterministic
    cleanup without cross-test contamination
  rationale: Isolation per fixture ensures test parallelism safety and prevents cleanup failures in one
    test from affecting others; breaks when storage backends have hard limits on database/container count
  evidence: python/arcticdb/storage_fixtures/mongo.py:46(MongoDatabase.__init__)
  stage: test_infrastructure
  alternative_considered: Shared databases with namespacing would reduce isolation
- id: BD-GAP-002
  type: B/BA
  content: MongoDB fixture validates URI must start with 'mongodb://' and database name must not contain
    '?' to prevent connection string injection attacks
  rationale: Prevents malformed URIs from reaching the MongoDB driver with unexpected behavior; breaks
    if MongoDB adds new URI schemes
  evidence: python/arcticdb/storage_fixtures/mongo.py:49(MongoDatabase.__init__)
  stage: input_validation
  alternative_considered: Let driver validate would produce less clear errors
- id: BD-GAP-003
  type: T
  content: 'Storage fixture factory supports dual modes: externally managed servers (via URI) and self-managed
    servers started on ephemeral ports'
  rationale: Enables CI environments to provide pre-existing servers while still supporting local development
    without external dependencies; breaks when external servers are unavailable in CI
  evidence: python/arcticdb/storage_fixtures/mongo.py:103(ExternalMongoDBServer)
  stage: deployment
  alternative_considered: Require external servers always would complicate local dev
- id: BD-GAP-004
  type: B
  content: 'Auto-detection fallback chain: CI_MONGO_HOST env var → localhost → spawn dedicated instance
    on random port'
  rationale: Prioritizes CI-provided infrastructure before attempting local resources, minimizing test
    runtime; breaks when localhost MongoDB conflicts with existing installations
  evidence: python/arcticdb/storage_fixtures/mongo.py:165(auto_detect_server)
  stage: test_infrastructure
  alternative_considered: Skip localhost check would waste resources
- id: BD-GAP-005
  type: B/DK
  content: Graceful process termination uses CTRL_BREAK_EVENT on Windows to handle multiprocess servers
    (unlike SIGTERM which only kills the leader)
  rationale: Ensures MongoDB/Moto processes with multiple workers are fully terminated on Windows; breaks
    if subprocess doesn't use start() method or on non-Windows platforms
  evidence: python/arcticdb/storage_fixtures/utils.py:101(GracefulProcessUtils.terminate)
  stage: platform_support
  alternative_considered: Taskkill would be less portable
- id: BD-GAP-006
  type: B/BA
  content: Azurite mock defaults to SSL enabled (use_ssl=True) for production parity, with ssl_test_support
    flag to disable when certs unavailable
  rationale: Catches SSL configuration issues early rather than discovering them only in production; breaks
    when test environment lacks SSL support
  evidence: python/arcticdb/storage_fixtures/azure.py:182(AzuriteStorageFixtureFactory.__init__)
  stage: security
  alternative_considered: Disable SSL by default would miss SSL-specific bugs
- id: BD-GAP-007
  type: B
  content: GCP S3 implementation requires separate host dispatcher because GCP's S3-compatible API lacks
    batch delete operations
  rationale: Enables testing against GCP's actual S3-compatible API which has different semantics; breaks
    if GCP adds batch delete support making the distinction unnecessary
  evidence: python/arcticdb/storage_fixtures/s3.py:743(GcpHostDispatcherApplication)
  stage: cloud_compatibility
  alternative_considered: Emulate GCP quirks in mock would hide real behavior
- id: BD-GAP-008
  type: B/BA
  content: Service startup retries with configurable timeout (default 20s) and polling interval (default
    0.2s) to account for cold-start variance
  rationale: Avoids false test failures on slow CI runners while bounding worst-case startup wait; breaks
    on systems where services take longer than timeout
  evidence: python/arcticdb/storage_fixtures/utils.py:120(wait_for_server_to_come_up)
  stage: reliability
  alternative_considered: Infinite wait would hang tests indefinitely
- id: BD-GAP-009
  type: B/RC
  content: CA certificates for SSL are copied to system temp with chmod 666 (readable by each users) to
    support Azure tests in multi-user environments
  rationale: Ensures SSL tests work regardless of which user runs pytest while avoiding permission errors;
    breaks security policies requiring stricter cert permissions
  evidence: python/arcticdb/storage_fixtures/azure.py:281(copy_ca_certs)
  stage: security
  alternative_considered: Per-user certs would require more complex lifecycle management
- id: BD-GAP-010
  type: B/BA
  content: 'Storage fixture library name reuse contract: same lib_name returns same underlying storage
    to support library caching'
  rationale: Enables test efficiency by reusing expensive storage initialization; breaks if tests assume
    lib_name changes result in fresh storage
  evidence: python/arcticdb/storage_fixtures/api.py:77(StorageFixture.create_test_cfg)
  stage: test_infrastructure
  alternative_considered: Always fresh would be slower but safer
- id: BD-GAP-011
  type: B/RC
  content: Optional permission enforcement with context manager allows tests to verify permission behavior
    without making it mandatory for each fixtures
  rationale: Enables granular permission testing while supporting backends that don't implement permissions;
    breaks when backend claims support but implements incorrectly
  evidence: python/arcticdb/storage_fixtures/api.py:139(StorageFixture.set_permission)
  stage: test_infrastructure
  alternative_considered: Require uniform permissions would exclude simpler backends
- id: BD-GAP-012
  type: B/BA
  content: Mock S3 supports error simulation based on symbol names, distinct from general mock fixtures
    for storage failure injection testing
  rationale: Enables targeted storage failure testing without external fault injection infrastructure;
    breaks when error patterns don't match symbol naming conventions
  evidence: python/arcticdb/storage_fixtures/s3.py:661(mock_s3_with_error_simulation)
  stage: testing
  alternative_considered: Chaos engineering with real failures would be more comprehensive
- id: BD-GAP-013
  type: B
  content: Real cloud storage detection exclusively from environment variables, never from config files
    or interactive prompts in test context
  rationale: Ensures tests run deterministically based on CI configuration; breaks if credentials expire
    and no env refresh mechanism exists
  evidence: python/arcticdb/storage_fixtures/s3.py:373(real_s3_from_environment_variables)
  stage: security
  alternative_considered: Interactive prompts would block CI automation
- id: BD-GAP-014
  type: B/BA
  content: STS-based S3 authentication uses assumed roles with policy-controlled access for test isolation
    from production resources
  rationale: Minimizes blast radius of test errors by restricting what test code can access; breaks when
    IAM roles lack necessary permissions
  evidence: python/arcticdb/storage_fixtures/s3.py:440(real_s3_sts_from_environment_variables)
  stage: security
  alternative_considered: Dedicated test account would be simpler but require more infrastructure
- id: BD-GAP-015
  type: B
  content: Installation tests validate deduplicated batch writes, parallel writes with appends, and stage/finalize
    patterns with chunking
  rationale: These are core ArcticDB features that must work across each storage backends; breaks when
    concurrent access patterns expose storage-specific bugs
  evidence: python/installation_tests/test_installation.py:52(test_write_batch_dedup)
  stage: validation
  alternative_considered: Unit tests alone would miss cloud-specific behaviors
- id: BD-GAP-016
  type: B
  content: Log sanitization in GitHub CI context strips sensitive values from test output to prevent credential
    leakage in logs
  rationale: Prevents accidental credential exposure when tests fail and dump request/response data; breaks
    when sanitization regex doesn't cover each sensitive patterns
  evidence: python/installation_tests/logger.py:27(GitHubSanitizingHandler.sanitize_message)
  stage: security
  alternative_considered: Redact each logging would make debugging harder
- id: BD-GAP-017
  type: B/BA
  content: Lazy singleton pattern for boto3 bucket access in S3 fixtures with explicit thread-safety warning
  rationale: Reduces connection overhead for tests that don't need bucket operations; breaks if multiple
    threads access fixture concurrently before initialization completes
  evidence: python/arcticdb/storage_fixtures/s3.py:171(S3Bucket.get_boto_bucket)
  stage: performance
  alternative_considered: Eager initialization would be slower but safer
- id: BD-GAP-018
  type: B
  content: Client factory pattern in installation tests decouples storage creation from test code to support
    storage-type parameterized testing
  rationale: Enables same test code to run against multiple storage backends without modification; breaks
    when storage-specific features are inadvertently used
  evidence: python/installation_tests/client_utils.py:210(create_arctic_client)
  stage: test_infrastructure
  alternative_considered: Separate tests per backend would be more explicit but more code
- id: BD-GAP-019
  type: B
  content: Temporary path cleanup warns (not fails) on rmtree errors to distinguish test bugs from external
    interference
  rationale: Avoids masking real test failures when cleanup fails due to concurrent processes; breaks
    when cleanup failures indicate actual bugs
  evidence: python/arcticdb/storage_fixtures/utils.py:160(safer_rmtree)
  stage: reliability
  alternative_considered: Fail-fast would expose issues earlier but cause CI noise
- id: BD-GAP-020
  type: BA
  content: _safe_enter separates resource allocation that needs __exit__ cleanup from initialization that
    can safely fail, enabling cleaner error propagation
  rationale: Prevents partial initialization states where __exit__ runs on uninitialized resources; breaks
    when subclasses override incorrectly
  evidence: python/arcticdb/storage_fixtures/api.py:50(_SaferContextManager._safe_enter)
  stage: reliability
  alternative_considered: Single-phase init would be simpler but less safe
