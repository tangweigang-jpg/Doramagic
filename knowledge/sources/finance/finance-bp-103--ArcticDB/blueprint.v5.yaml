replaceable_slots:
- id: slot-001
  name: cloud_storage_backend
  description: Choose based on cloud provider, deployment model (cloud vs on-prem), latency requirements,
    and existing infrastructure
  used_in_stages: []
  options:
  - name: AWS S3
    traits:
    - S3-compatible
    - IAM roles
    - STS support
    - Multi-part upload
    fit_for:
    - Production cloud workloads, AWS-native deployments
    not_fit_for:
    - On-premises without S3 compatibility
  - name: Azure Blob Storage
    traits:
    - Azure-native
    - AD authentication
    - Hierarchical namespaces
    fit_for:
    - Azure-native deployments, enterprise Microsoft environments
    not_fit_for:
    - Multi-cloud or AWS-focused setups
  - name: Google Cloud Storage (XML API)
    traits:
    - S3-compatible API
    - GCS-native
    - Credential chain
    fit_for:
    - GCP deployments with S3-compatible access
    not_fit_for:
    - Native GCS APIs (not yet implemented)
  - name: Ceph RGW / MinIO
    traits:
    - S3-compatible
    - Self-hosted
    - On-premises
    fit_for:
    - On-premises deployments, private cloud
    not_fit_for:
    - Managed cloud services
  - name: MongoDB
    traits:
    - Document store
    - Sharding
    - Replica sets
    fit_for:
    - Document-centric workloads, MongoDB shops
    not_fit_for:
    - High-performance time-series (use S3/LMDB)
  - name: LMDB (Local Disk)
    traits:
    - Embedded
    - ACID
    - MMAP
    - Single-node
    fit_for:
    - Development, single-node deployments, low-latency local storage
    not_fit_for:
    - Distributed deployments, cloud storage
  default: AWS S3
  _source: worker_resource
- id: slot-002
  name: dataframe_format
  description: Choose based on existing codebase, performance requirements, and ecosystem integration
  used_in_stages: []
  options:
  - name: Pandas
    traits:
    - Default
    - NumPy-backed
    - Wide ecosystem
    fit_for:
    - General use, existing Python data science workflows
    not_fit_for:
    - Large datasets needing memory optimization
  - name: PyArrow Tables
    traits:
    - Columnar memory
    - Zero-copy
    - Interoperable
    fit_for:
    - Performance-critical, Arrow ecosystem integration
    not_fit_for:
    - Legacy Pandas-only workflows
  - name: Polars DataFrames
    traits:
    - Lazy evaluation
    - Multi-threaded
    - Arrow-native
    fit_for:
    - High-performance analytics, Polars-first workflows
    not_fit_for:
    - Pandas-dependent code
  default: Pandas
  _source: worker_resource
- id: slot-003
  name: metrics_monitoring
  description: Enable based on observability requirements; Prometheus recommended for production
  used_in_stages: []
  options:
  - name: Prometheus Push
    traits:
    - Push model
    - Short-lived processes
    - Gateway-based
    fit_for:
    - Batch jobs, short-lived processes
    not_fit_for:
    - Long-running services preferred by Pull
  - name: Prometheus Pull
    traits:
    - Pull model
    - Long-running services
    - Exposer endpoint
    fit_for:
    - Long-running services, containerized deployments
    not_fit_for:
    - Short-lived batch jobs
  - name: No Metrics
    traits:
    - Disabled by default
    - Zero overhead
    fit_for:
    - Development, minimal overhead requirements
    not_fit_for:
    - Production monitoring
  default: No Metrics
  _source: worker_resource
- id: slot-004
  name: authentication_method
  description: Prefer managed identities/IAM roles in production; explicit credentials for development/testing
  used_in_stages: []
  options:
  - name: Explicit Credentials
    traits:
    - Access key/secret in URI
    - Direct
    fit_for:
    - Simple deployments, testing
    not_fit_for:
    - Production (credential rotation)
  - name: AWS Default Credential Chain
    traits:
    - IAM roles
    - Environment vars
    - Config files
    - EC2 metadata
    fit_for:
    - AWS deployments, production
    not_fit_for:
    - Non-AWS or multi-cloud
  - name: AWS STS Profile Credentials
    traits:
    - Assume role
    - Temporary credentials
    - Cross-account
    fit_for:
    - Enterprise AWS, cross-account access
    not_fit_for:
    - Simple single-account setups
  - name: Azure Managed Identity
    traits:
    - Azure-native
    - No secrets in code
    fit_for:
    - Azure deployments, production
    not_fit_for:
    - Multi-cloud
  default: Explicit Credentials
  _source: worker_resource
- id: slot-005
  name: compression_codec
  description: zstd for balanced workloads; LZ4 for speed-critical; no compression for pre-compressed
    data
  used_in_stages: []
  options:
  - name: Zstandard (zstd)
    traits:
    - Default
    - High compression ratio
    - Fast decompression
    fit_for:
    - General use, balanced speed/ratio
    not_fit_for:
    - Maximum speed (use LZ4)
  - name: LZ4
    traits:
    - Fastest decompression
    - Lower compression ratio
    fit_for:
    - Write-heavy workloads, latency-sensitive
    not_fit_for:
    - Storage-constrained environments
  - name: No Compression
    traits:
    - Passthrough
    - Maximum speed
    - Maximum storage
    fit_for:
    - Already compressed data, in-memory storage
    not_fit_for:
    - General use
  default: Zstandard (zstd)
  _source: worker_resource
