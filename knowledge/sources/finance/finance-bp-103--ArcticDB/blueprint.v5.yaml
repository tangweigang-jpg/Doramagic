# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-103
name: ArcticDB
sop_version: '3.6'
source:
  projects:
  - ArcticDB
  commit_hash: d06cdd757a394a05c217c5279419af2ddde51142
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Time-series DataFrame database for high-performance storage and retrieval
  description: ArcticDB is a serverless DataFrame database that provides versioned storage for Pandas,
    PyArrow, and Polars data with time-series optimization, supporting multiple backends including S3,
    Azure, LMDB, and MongoDB.
  prerequisites: Python 3.9+, access to object storage (S3/Azure/LMDB), familiarity with Pandas DataFrames
  not_suitable_for: Non-Python environments, unstructured document storage, real-time streaming workloads
    requiring sub-millisecond latency, applications that cannot tolerate nanosecond timestamp precision
    requirements
  activation:
    triggers:
    - GitHub Actions workflow invocation with injected PR_NUMBER, REPO, EVENT_ACTION, BEFORE_SHA, AFTER_SHA
    - 'Local slash command invocation: /review-pr <PR_NUMBER>'
    - No arguments provided locally (auto-detect from current branch)
    emphasis:
    - Use especially for synchronize events where incremental review saves time
    - Use especially when PR description lacks detail about actual changes
    - Use especially for changes to on-disk format, storage backends, or Python-C++ boundary
    anti_skip:
    - Don't skip loading guidelines because PR looks simple — format/compatibility issues may not be obvious
    - Don't skip deduplication because you have new findings — human reviewer may have addressed the same
      concern
    - Don't skip the sticky summary because inline comments exist — summary provides high-level overview
stages:
- id: uri_parsing_and_adapter_selection
  name: URI Parsing and Storage Adapter Selection
  order: 1
  responsibility: Parses user-provided URIs and selects the appropriate storage adapter based on URI scheme,
    enabling connection to multiple backends (S3, Azure, LMDB, etc.)
  interface:
    inputs:
    - URI string (e.g., 's3://bucket', 'lmdb:///path')
    outputs:
    - ArcticLibraryAdapter instance, configured LibraryManager
  required_methods:
  - name: Arctic.__init__
    description: Top-level entry point that initializes storage connection and manages adapter selection
    evidence: python/arcticdb/arctic.py:39
  - name: ArcticLibraryAdapter.supports_uri
    description: Static method that determines if adapter can handle given URI scheme
    evidence: python/arcticdb/adapters/arctic_library_adapter.py:58
  key_behaviors:
  - behavior: Adapter registry pattern for storage backends
    description: Iterates through registered adapters until one claims URI support, allowing pluggable
      storage backends
    evidence: python/arcticdb/arctic.py:45(_LIBRARY_ADAPTERS)
  - behavior: Encoding version per-library configuration
    description: Encoding version is an instance-level setting passed to adapter constructor, allowing
      per-library versioning
    evidence: python/arcticdb/arctic.py:116(_library_adapter)
  replaceable_points:
  - name: Storage Backend
    description: New storage backends can be added by implementing ArcticLibraryAdapter
    options:
    - name: S3LibraryAdapter
      traits:
      - Cloud-native
      - S3-compatible
      - Highly scalable
      fit_for:
      - Production deployments
      - Large datasets
      - Distributed teams
      not_fit_for:
      - Local development
      - Low latency requirements
      - Air-gapped environments
    - name: AzureLibraryAdapter
      traits:
      - Azure-native
      - Enterprise integration
      fit_for:
      - Azure ecosystems
      - Microsoft enterprise
      not_fit_for:
      - Multi-cloud deployments
      - AWS environments
    - name: LMDBLibraryAdapter
      traits:
      - Local filesystem
      - Memory-mapped
      - Single-node
      fit_for:
      - Local development
      - Small datasets
      - Fast prototyping
      not_fit_for:
      - Distributed access
      - Cloud deployments
      - Large datasets
    - name: MongoLibraryAdapter
      traits:
      - Document store
      - Flexible schema
      fit_for:
      - Document-centric data
      - MongoDB users
      not_fit_for:
      - Columnar analytics
      - High-throughput writes
    - name: InMemoryLibraryAdapter
      traits:
      - Ephemeral
      - In-process
      - No persistence
      fit_for:
      - Testing
      - Caching
      - Temporary data
      not_fit_for:
      - Production
      - Data persistence requirements
    default: S3LibraryAdapter
  design_decisions:
  - 'Adapter registry pattern for storage backends: Allows pluggable storage backends by iterating through
    registered adapters until one claims URI support. New backends can be added by subclassing ArcticLibraryAdapter
    (python/arcticdb/arctic.py:45)'
  - 'Encoding version passed to adapter constructor: Encoding version is an instance-level setting, not
    adapter-level, allowing per-library versioning without adapter code changes (python/arcticdb/arctic.py:116)'
  acceptance_hints:
  - Arctic(uri) successfully instantiates correct adapter for given URI scheme
  - Unsupported URI raises clear error listing available adapters
  - Library created via get_library() uses correct storage backend
- id: library_configuration
  name: Library Configuration and Management
  order: 2
  responsibility: Creates, configures, and manages ArcticDB libraries with options for schema, deduplication,
    and encoding
  interface:
    inputs:
    - LibraryOptions, Library name, Storage configuration
    outputs:
    - Configured Library instance with NativeVersionStore
  required_methods:
  - name: Arctic.get_library
    description: Retrieves or creates a library with specified options and storage configuration
    evidence: python/arcticdb/arctic.py:157
  - name: LibraryOptions.__init__
    description: Configuration options for library behavior including dynamic schema, dedup, and encoding
    evidence: python/arcticdb/options.py:21
  key_behaviors:
  - behavior: LibraryOptions with sensible defaults
    description: 'Defaults chosen for broad compatibility: dynamic_schema=False for fixed schemas, dedup=False
      for simplicity, rows_per_segment=100k for balance'
    evidence: python/arcticdb/options.py:40
  - behavior: Dynamic schema toggle affects tiling strategy
    description: When False, data is tiled by rows AND columns enabling efficient column subsetting. When
      True, only row tiling for dynamic column backfill
    evidence: python/arcticdb/options.py:55
  - behavior: Encoding version configurable per-library
    description: V2 is faster but experimental, so V1 is default. Library-level override allows gradual
      migration
    evidence: python/arcticdb/options.py:127
  replaceable_points:
  - name: Library Options
    description: Behavior can be customized via LibraryOptions parameters
    options:
    - name: dynamic_schema=True
      traits:
      - Flexible columns
      - Schema evolution
      - Backfill support
      fit_for:
      - Dynamic data sources
      - Append-only workloads
      - Unknown schemas
      not_fit_for:
      - Predictable workloads
      - Fixed schemas
      - Columnar optimization
    - name: dynamic_schema=False
      traits:
      - Fixed columns
      - Column tiling
      - Efficient subsetting
      fit_for:
      - Known schemas
      - Analytical queries
      - Column projection
      not_fit_for:
      - Dynamic column structures
      - Schema changes
    - name: dedup=True
      traits:
      - Segment deduplication
      - Storage optimization
      fit_for:
      - Append-only workloads
      - Repeated data
      not_fit_for:
      - Unique data
      - Update-heavy workloads
    - name: rows_per_segment=100000
      traits:
      - Balanced segment size
      - Default tuning
      fit_for:
      - General workloads
      - Medium datasets
      not_fit_for:
      - Very large segments
      - Fine-grained streaming
    default: dynamic_schema=False, dedup=False, rows_per_segment=100000
  design_decisions:
  - 'LibraryOptions with sensible defaults: Defaults chosen for broad compatibility: dynamic_schema=False
    for fixed schemas, dedup=False for simplicity, rows_per_segment=100k for balance (python/arcticdb/options.py:40)'
  - 'Dynamic schema toggle affects tiling strategy: When False, data is tiled by rows AND columns enabling
    efficient column subsetting. When True, only row tiling for dynamic column backfill (python/arcticdb/options.py:55)'
  - 'Encoding version configurable per-library: V2 is faster but experimental, so V1 is default. Library-level
    override allows gradual migration (python/arcticdb/options.py:127)'
  acceptance_hints:
  - Library created with default options has dynamic_schema=False
  - Library with dynamic_schema=True allows column additions
  - Library encoding version persists across restarts
- id: data_normalization
  name: Data Normalization
  order: 3
  responsibility: Transforms user data (Pandas DataFrames, Series, Arrow Tables, numpy arrays) into ArcticDB's
    internal columnar format for storage
  interface:
    inputs:
    - Python objects (DataFrame, Series, Arrow Table, etc.)
    outputs:
    - Normalized FrameData with metadata for storage
  required_methods:
  - name: CompositeNormalizer.normalize
    description: Orchestrates multiple normalizers to handle different data types in chain
    evidence: python/arcticdb/version_store/_normalization.py:1557
  - name: DataFrameNormalizer.normalize
    description: Normalizes Pandas DataFrames to internal columnar format
    evidence: python/arcticdb/version_store/_normalization.py:1088
  key_behaviors:
  - behavior: Normalizer chain with fallback to MsgPack/Pickle
    description: Attempts normalization in order; if each fail, falls back to MsgPack then Pickle. Ensures
      data is never lost but prioritizes efficient formats
    evidence: python/arcticdb/version_store/_normalization.py:1578
  - behavior: Dynamic strings enabled by default in staging
    description: Staged writes use dynamic_strings=True to allow flexible string handling during incomplete
      data collection
    evidence: python/arcticdb/version_store/_store.py:729
  - behavior: Arrow normalization preserves pandas metadata
    description: Round-trip compatibility with Pandas requires preserving index names and MultiIndex structure
      in Arrow schema
    evidence: python/arcticdb/version_store/_normalization.py:648
  replaceable_points:
  - name: Data Format
    description: Normalizer chain handles different input formats
    options:
    - name: Pandas DataFrame
      traits:
      - Primary format
      - Full feature support
      fit_for:
      - Most Python data science workloads
      not_fit_for:
      - Memory-constrained environments
    - name: PyArrow Table
      traits:
      - Schema preservation
      - Interoperability
      fit_for:
      - Arrow ecosystem
      - Zero-copy reads
      not_fit_for:
      - Pandas-specific operations
    - name: numpy array
      traits:
      - Memory efficient
      - Homogeneous types
      fit_for:
      - Numerical data
      - ML features
      not_fit_for:
      - Mixed type data
      - Tabular data
    - name: MsgPack/Pickle fallback
      traits:
      - Universal fallback
      - Any Python object
      fit_for:
      - Unknown types
      - Custom classes
      not_fit_for:
      - Performance-critical paths
      - Large data
    default: Pandas DataFrame
  design_decisions:
  - 'Normalizer chain with fallback to MsgPack/Pickle: Attempts normalization in order; if each fail,
    falls back to MsgPack then Pickle. Ensures data is never lost but prioritizes efficient formats (python/arcticdb/version_store/_normalization.py:1578)'
  - 'Dynamic strings enabled by default in staging: Staged writes use dynamic_strings=True to allow flexible
    string handling during incomplete data collection (python/arcticdb/version_store/_store.py:729)'
  - 'Arrow normalization preserves pandas metadata: Round-trip compatibility with Pandas requires preserving
    index names and MultiIndex structure in Arrow schema (python/arcticdb/version_store/_normalization.py:648)'
  acceptance_hints:
  - Pandas DataFrame round-trips without data loss
  - PyArrow Table preserves schema on read
  - Unknown types fall back to Pickle serialization
  - MultiIndex structure preserved through normalization
- id: recursive_normalization
  name: Recursive Normalization (Nested Structures)
  order: 4
  responsibility: Handles deeply nested data structures (dicts of dicts, lists of DataFrames) by flattening
    them into separate symbols with a metastruct
  interface:
    inputs:
    - Nested Python objects with dict/list structures
    outputs:
    - Flattened symbols + meta_structure for reconstruction
  required_methods:
  - name: Flattener.flatten
    description: Converts nested structures into flat symbols with metastructure metadata
    evidence: python/arcticdb/flattener.py:31
  - name: Flattener.reconstruct
    description: Restores original nested structure from flattened symbols using metastructure
    evidence: python/arcticdb/flattener.py:327
  key_behaviors:
  - behavior: Metastructure versioning for backward compatibility
    description: V1 uses pickled types; V2 stores type module/name for class reconstruction. KeyError
      on '__version__' vs '__VER__' allows old releases to fail gracefully
    evidence: python/arcticdb/flattener.py:327
  - behavior: Separator-based key compaction
    description: Symbols >100 chars are compacted using last-3-chars of each segment + hash. Ensures LMDB
      key size limits are respected
    evidence: python/arcticdb/flattener.py:56
  - behavior: Recursive normalizers opt-in per library
    description: Disabled by default to maintain predictable behavior. Users must explicitly enable to
      write nested structures
    evidence: python/arcticdb/options.py:131
  replaceable_points:
  - name: Metastructure Version
    description: Format for storing nested structure metadata
    options:
    - name: V1 (pickled types)
      traits:
      - Legacy format
      - Python object serialization
      fit_for:
      - Existing data migration
      - Complex Python objects
      not_fit_for:
      - Cross-version compatibility
      - Security-sensitive environments
    - name: V2 (module+class names)
      traits:
      - Forward compatibility
      - Clean metadata
      fit_for:
      - New projects
      - Version-stable applications
      not_fit_for:
      - Old releases
      - Complex class hierarchies
    default: V2
  design_decisions:
  - 'Metastructure versioning for backward compatibility: V1 uses pickled types; V2 stores type module/name
    for class reconstruction. KeyError on ''__version__'' vs ''__VER__'' allows old releases to fail gracefully
    (python/arcticdb/flattener.py:327)'
  - 'Separator-based key compaction: Symbols >100 chars are compacted using last-3-chars of each segment
    + hash. Ensures LMDB key size limits are respected (python/arcticdb/flattener.py:56)'
  - 'Recursive normalizers opt-in per library: Disabled by default to maintain predictable behavior. Users
    must explicitly enable to write nested structures (python/arcticdb/options.py:131)'
  acceptance_hints:
  - Dict of DataFrames writes multiple symbols
  - Read reconstructs original nested structure
  - Symbol compaction prevents LMDB key length errors
  - V1 data remains readable after V2 default migration
- id: write_operations
  name: Write Operations
  order: 5
  responsibility: Handles write, append, update, and staged data operations with version management and
    deduplication
  interface:
    inputs:
    - Symbol name, normalized data, metadata, write options
    outputs:
    - VersionedItem with version number and metadata
  required_methods:
  - name: NativeVersionStore.write
    description: Primary write method that creates new version of symbol with data and optional metadata
    evidence: python/arcticdb/version_store/_store.py:751
  - name: NativeVersionStore.append
    description: Appends data along index dimension to existing symbol
    evidence: python/arcticdb/version_store/_store.py:937
  - name: NativeVersionStore.update
    description: Overwrites existing data within specified date ranges
    evidence: python/arcticdb/version_store/_store.py:1074
  - name: NativeVersionStore.stage
    description: Writes incomplete data segments for later compaction
    evidence: python/arcticdb/version_store/_store.py:711
  key_behaviors:
  - behavior: Write creates new version always
    description: New version created even if symbol exists; previous version remains accessible via 'as_of'.
      Enables full version history
    evidence: python/arcticdb/version_store/_store.py:763
  - behavior: Prune previous version default False
    description: Keeping each versions by default; users must explicitly prune to avoid storage growth.
      Snapshot protection prevents accidental deletion
    evidence: python/arcticdb/version_store/_store.py:849
  - behavior: Segment deduplication against previous version
    description: Content hash comparison allows skipping identical segments. Most effective for append-only
      workloads with data only at end
    evidence: python/arcticdb/options.py:75
  replaceable_points:
  - name: Write Mode
    description: How new data interacts with existing versions
    options:
    - name: write
      traits:
      - New version
      - Full history
      - Immutable past
      fit_for:
      - Audit requirements
      - Version history needs
      - Non-destructive updates
      not_fit_for:
      - Storage-constrained environments
      - Overwrite semantics
    - name: append
      traits:
      - Extend index
      - Incremental
      - Time-series
      fit_for:
      - Streaming data
      - Time-series ingestion
      - Log data
      not_fit_for:
      - Out-of-order data
      - Column updates
    - name: update
      traits:
      - Range overwrite
      - In-place modification
      fit_for:
      - Data corrections
      - Backfilling
      - Partial updates
      not_fit_for:
      - Immutable requirements
      - Audit trails
    - name: stage
      traits:
      - Incomplete segments
      - Deferred compaction
      fit_for:
      - Batched streaming
      - Incomplete data
      - Checkpointing
      not_fit_for:
      - Immediate reads
      - Small writes
    default: write
  design_decisions:
  - 'Write creates new version always: New version created even if symbol exists; previous version remains
    accessible via ''as_of''. Enables full version history (python/arcticdb/version_store/_store.py:763)'
  - 'Prune previous version default False: Keeping each versions by default; users must explicitly prune
    to avoid storage growth. Snapshot protection prevents accidental deletion (python/arcticdb/version_store/_store.py:849)'
  - 'Segment deduplication against previous version: Content hash comparison allows skipping identical
    segments. Most effective for append-only workloads with data only at end (python/arcticdb/options.py:75)'
  acceptance_hints:
  - Write to existing symbol creates new version, old version accessible via as_of
  - Append extends data along index dimension
  - Stage data readable after finalize operation
  - Prune does not delete snapshot-protected versions
- id: read_operations
  name: Read Operations
  order: 6
  responsibility: Retrieves data from storage with filtering by version, date range, columns, and row
    range. Supports multiple output formats.
  interface:
    inputs:
    - Symbol name, version query, date range, column filter, output format
    outputs:
    - Data in requested format (Pandas, PyArrow, Polars)
  required_methods:
  - name: NativeVersionStore.read
    description: Primary read method with each filtering options including version, date range, column
      selection, and format specification
    evidence: python/arcticdb/version_store/_store.py:2423
  - name: NativeVersionStore.batch_read
    description: Efficient multi-symbol reads reducing round-trips
    evidence: python/arcticdb/version_store/_store.py:1369
  key_behaviors:
  - behavior: Output format configurable at multiple levels
    description: Arctic instance → Library → Read operation precedence allows global defaults with per-operation
      overrides
    evidence: python/arcticdb/options.py:279
  - behavior: Lazy DataFrame for deferred execution
    description: Enables chaining of queries before execution, reducing round-trips. collect() triggers
      actual read
    evidence: python/arcticdb/version_store/library.py:441
  - behavior: Column and row range filtering in C++
    description: Storage layer does filtering to minimize data transfer from backend. Python layer handles
      format conversion
    evidence: python/arcticdb/version_store/_store.py:2189
  replaceable_points:
  - name: Output Format
    description: Format for returned data
    options:
    - name: PANDAS
      traits:
      - Primary format
      - Full feature set
      - Widely used
      fit_for:
      - Most Python workflows
      - Data analysis
      - Integration with pandas ecosystem
      not_fit_for:
      - Memory-constrained environments
      - Arrow-native pipelines
    - name: PYARROW
      traits:
      - Zero-copy
      - Columnar
      - Interop
      fit_for:
      - Arrow ecosystem
      - Memory efficiency
      - Streaming
      not_fit_for:
      - Pandas-specific operations
      - Legacy code
    - name: POLARS
      traits:
      - Fast
      - Lazy evaluation
      - Rust-based
      fit_for:
      - High-performance analytics
      - Large datasets
      - Modern pipelines
      not_fit_for:
      - Pandas-dependent code
      - Small datasets
    default: PANDAS
  design_decisions:
  - 'Output format configurable at multiple levels: Arctic instance → Library → Read operation precedence
    allows global defaults with per-operation overrides (python/arcticdb/options.py:279)'
  - 'Lazy DataFrame for deferred execution: Enables chaining of queries before execution, reducing round-trips.
    collect() triggers actual read (python/arcticdb/version_store/library.py:441)'
  - 'Column and row range filtering in C++: Storage layer does filtering to minimize data transfer from
    backend. Python layer handles format conversion (python/arcticdb/version_store/_store.py:2189)'
  acceptance_hints:
  - Read returns data in requested format (Pandas/Arrow/Polars)
  - Version query retrieves correct historical version
  - Column filtering reduces data transfer
  - LazyDataFrame.collect() triggers actual storage read
- id: query_processing
  name: Query Processing
  order: 7
  responsibility: Provides expression-based filtering, aggregation, and resampling operations on read
    data
  interface:
    inputs:
    - QueryBuilder with filter/expression clauses
    outputs:
    - Filtered/aggregated DataFrame
  required_methods:
  - name: QueryBuilder.__getitem__
    description: Filter expressions using bracket syntax with operator overloading
    evidence: python/arcticdb/version_store/processing.py:425
  - name: QueryBuilder.groupby
    description: Groups data by column for aggregation operations
    evidence: python/arcticdb/version_store/processing.py:563
  - name: QueryBuilder.resample
    description: Time-based resampling on datetime index with flexible origin alignment
    evidence: python/arcticdb/version_store/processing.py:694
  key_behaviors:
  - behavior: Operator overloading for expressions
    description: 'Enables natural syntax: q = q[q[''a''] < 5] similar to Pandas boolean indexing. Returns
      ExpressionNode for lazy evaluation'
    evidence: python/arcticdb/version_store/processing.py:117
  - behavior: Resample with flexible origin
    description: Origin parameter supports 'epoch', 'start', 'end', or specific timestamp for alignment
      flexibility
    evidence: python/arcticdb/version_store/processing.py:694
  - behavior: Memory vs speed optimization modes
    description: QueryBuilder can be optimized for speed (default) or memory based on data characteristics
    evidence: python/arcticdb/version_store/processing.py:1199
  replaceable_points:
  - name: Query Optimization
    description: Trade-off between memory usage and speed
    options:
    - name: optimise_for_speed
      traits:
      - Default
      - Parallel processing
      - Higher memory
      fit_for:
      - Large datasets
      - Batch processing
      - Production queries
      not_fit_for:
      - Memory-constrained environments
      - Small datasets
    - name: optimise_for_memory
      traits:
      - Sequential processing
      - Lower memory
      fit_for:
      - Memory-constrained environments
      - Streaming
      - Small datasets
      not_fit_for:
      - Large batch operations
      - Performance-critical paths
    default: optimise_for_speed
  design_decisions:
  - 'Operator overloading for expressions: Enables natural syntax: q = q[q[''a''] < 5] similar to Pandas
    boolean indexing. Returns ExpressionNode for lazy evaluation (python/arcticdb/version_store/processing.py:117)'
  - 'Resample with flexible origin: Origin parameter supports ''epoch'', ''start'', ''end'', or specific
    timestamp for alignment flexibility (python/arcticdb/version_store/processing.py:694)'
  - 'Memory vs speed optimization modes: QueryBuilder can be optimized for speed (default) or memory based
    on data characteristics (python/arcticdb/version_store/processing.py:1199)'
  acceptance_hints:
  - QueryBuilder filters produce correct results matching Pandas boolean indexing
  - Resample with different origins produces correctly aligned time buckets
  - Groupby aggregations return expected grouped results
  - Query optimization mode affects memory/speed trade-off
- id: version_and_snapshot_management
  name: Version and Snapshot Management
  order: 8
  responsibility: Manages version history, snapshots, and deletion of symbols with tombstone tracking
  interface:
    inputs:
    - Symbol name, version specifier, snapshot name
    outputs:
    - Version history, snapshot metadata, deletion confirmation
  required_methods:
  - name: NativeVersionStore.list_versions
    description: Lists versions with filtering options showing version history
    evidence: python/arcticdb/version_store/_store.py:2939
  - name: NativeVersionStore.snapshot
    description: Creates named snapshot of current library state
    evidence: python/arcticdb/version_store/_store.py:3094
  - name: NativeVersionStore.delete
    description: Deletes versions using tombstoning for safety
    evidence: python/arcticdb/version_store/_store.py:3196
  - name: NativeVersionStore.prune_previous_versions
    description: Removes non-snapshotted versions from storage
    evidence: python/arcticdb/version_store/_store.py:3322
  key_behaviors:
  - behavior: Tombstone-based deletion
    description: Deletion marks versions as deleted without immediate removal. Allows recovery and prevents
      dangling references
    evidence: docs/mkdocs/docs/technical/on_disk_storage.md:29
  - behavior: Snapshot protection
    description: Versions protected by snapshots cannot be deleted, ensuring consistency
    evidence: python/arcticdb/version_store/_store.py:3196
  - behavior: Symbol list caching with compaction
    description: ListSymbols uses cached add/delete markers. Compacts to single key when >500 entries
      to avoid unbounded growth
    evidence: docs/mkdocs/docs/technical/on_disk_storage.md:100
  replaceable_points:
  - name: Version Pruning
    description: When old versions are physically removed
    options:
    - name: Manual via prune_previous_versions
      traits:
      - Explicit control
      - Safe defaults
      fit_for:
      - Production environments
      - Audit requirements
      - Storage management
      not_fit_for:
      - Automated pipelines
      - Continuous deployment
    - name: Automatic via background deletion
      traits:
      - Hands-off
      - Potential data loss risk
      fit_for:
      - Development
      - Temporary data
      not_fit_for:
      - Production
      - Compliance requirements
    default: Manual
  design_decisions:
  - 'Tombstone-based deletion: Deletion marks versions as deleted without immediate removal. Allows recovery
    and prevents dangling references (docs/mkdocs/docs/technical/on_disk_storage.md:29)'
  - 'Snapshot protection: Versions protected by snapshots cannot be deleted, ensuring consistency (python/arcticdb/version_store/_store.py:3196)'
  - 'Symbol list caching with compaction: ListSymbols uses cached add/delete markers. Compacts to single
    key when >500 entries to avoid unbounded growth (docs/mkdocs/docs/technical/on_disk_storage.md:100)'
  acceptance_hints:
  - list_versions returns each versions for a symbol
  - Snapshot creation captures current state
  - Delete does not remove snapshot-protected versions
  - Prune physically removes non-protected versions
  - Symbol list cache compaction triggers at 500 entries
- id: storage_backend
  name: Storage Backend (C++ Layer)
  order: 9
  responsibility: Implements the actual key-value storage with columnar segment format, indexing, and
    compression. Tiles data by rows and columns for efficient reads.
  interface:
    inputs:
    - Normalized segments, index descriptors, storage configuration
    outputs:
    - Stored segments, retrieved data segments
  required_methods:
  - name: PythonVersionStore.write
    description: C++ implementation of write operation via pybind11
    evidence: python/arcticdb/version_store/_store.py:62
  - name: PythonVersionStore.read
    description: C++ implementation of read operation with filtering
    evidence: python/arcticdb/version_store/_store.py:62
  key_behaviors:
  - behavior: 4-layer storage hierarchy
    description: Reference Layer (mutable) → Version Layer (immutable linked list) → Index Layer (B-Tree)
      → Data Layer (columnar segments). Separates mutable pointers from immutable data
    evidence: docs/mkdocs/docs/technical/on_disk_storage.md:25
  - behavior: Segment tiling by rows and columns
    description: 100k rows × 127 columns default creates manageable segments. Enables date_range and column
      subsetting without full read
    evidence: python/arcticdb/options.py:95
  - behavior: Version linked list for history
    description: Each version points to previous version. Allows arbitrary historical reads but long version
      chains slow 'as_of' queries
    evidence: docs/mkdocs/docs/technical/on_disk_storage.md:35
  replaceable_points:
  - name: Key-Value Backend
    description: Storage engine implementation
    options:
    - name: S3
      traits:
      - Cloud-native
      - Durable
      - Scalable
      fit_for:
      - Production
      - Large scale
      - Distributed
      not_fit_for:
      - Low latency
      - Local development
    - name: LMDB
      traits:
      - Memory-mapped
      - Local
      - Transactional
      fit_for:
      - Local dev
      - Single-node
      - Fast access
      not_fit_for:
      - Distributed
      - Cloud-native
    - name: Azure Blob
      traits:
      - Cloud-native
      - Enterprise
      fit_for:
      - Azure deployments
      - Enterprise
      not_fit_for:
      - Multi-cloud
      - AWS-centric
    - name: MongoDB
      traits:
      - Document store
      - Flexible
      fit_for:
      - MongoDB users
      - Document data
      not_fit_for:
      - Analytical workloads
      - Columnar access
    - name: In-Memory
      traits:
      - Ephemeral
      - Fast
      - Testing
      fit_for:
      - Testing
      - Caching
      - Dev
      not_fit_for:
      - Persistence
      - Production
    default: S3
  design_decisions:
  - '4-layer storage hierarchy: Reference Layer (mutable) → Version Layer (immutable linked list) → Index
    Layer (B-Tree) → Data Layer (columnar segments). Separates mutable pointers from immutable data (docs/mkdocs/docs/technical/on_disk_storage.md:25)'
  - 'Segment tiling by rows and columns: 100k rows × 127 columns default creates manageable segments.
    Enables date_range and column subsetting without full read (python/arcticdb/options.py:95)'
  - 'Version linked list for history: Each version points to previous version. Allows arbitrary historical
    reads but long version chains slow ''as_of'' queries (docs/mkdocs/docs/technical/on_disk_storage.md:35)'
  acceptance_hints:
  - Data persists across library restarts
  - Column subsetting reads only required columns
  - Date range filtering avoids full scans
  - Reference keys are mutable, atom keys are immutable
  - Deep version history increases read latency for old versions
data_flow:
- from_stage: uri_parsing_and_adapter_selection
  to_stage: library_configuration
  data: URI parsed into components, storage adapter selected based on URI scheme, library config created
    with encoding version
- from_stage: library_configuration
  to_stage: data_normalization
  data: Configured library instance with normalizer chain, LibraryOptions affecting tiling and deduplication
    behavior
- from_stage: data_normalization
  to_stage: write_operations
  data: Normalized FrameData with columnar arrays, normalization metadata (norm_meta) for reconstruction
- from_stage: recursive_normalization
  to_stage: write_operations
  data: Flattened symbols with metastructure metadata for nested structure reconstruction
- from_stage: write_operations
  to_stage: storage_backend
  data: Segments with index descriptors, versioned keys (reference and atom), metadata
- from_stage: storage_backend
  to_stage: read_operations
  data: Raw columnar segments with index information retrieved from key-value store
- from_stage: read_operations
  to_stage: query_processing
  data: Denormalized data in requested output format (Pandas/PyArrow/Polars)
- from_stage: read_operations
  to_stage: data_normalization
  data: Denormalization metadata (norm_meta) required for reconstructing original data types from normalized
    form
- from_stage: external
  to_stage: uri_parsing_and_adapter_selection
  data: User-provided URI strings (s3://, azure://, lmdb://, memory://)
global_contracts:
- contract: Every symbols are versioned - writes always create new versions even if symbol exists, accessible
    via as_of parameter (python/arcticdb/version_store/_store.py:763)
  evidence: ''
- contract: TimeSeriesType is Union[pd.DataFrame, pd.Series] for each time-series operations (python/arcticdb/version_store/_store.py:103)
  evidence: ''
- contract: DateRangeInput is Tuple of optional Timestamps for range filtering (python/arcticdb/supported_types.py:18)
  evidence: ''
- contract: VersionQueryInput accepts int version number, string datetime, or None for latest version
    (python/arcticdb/version_store/_store.py:2160)
  evidence: ''
- contract: Dynamic schema defaults to False for predictable column ordering and efficient tiling (python/arcticdb/options.py:43)
  evidence: ''
- contract: Every internal timestamps use nanosecond precision datetime64[ns] (python/arcticdb/version_store/_common.py:29)
  evidence: ''
- contract: Reference Keys are mutable; Atom Keys are immutable - storage contract (docs/mkdocs/docs/technical/on_disk_storage.md:73)
  evidence: ''
- contract: TimeFrame index dtype hardcoded to datetime64[ns] resolution - Pandas 2.0+ non-nanosecond
    timestamps may lose precision (python/arcticdb/version_store/_common.py:38)
  evidence: ''
- contract: 'Normalizer chain order: CustomNormalizer → CompositeNormalizer → DataFrameNormalizer (python/arcticdb/version_store/_store.py:571-587)'
  evidence: ''
- contract: Symbol List Cache compaction triggers at 500 keys threshold (docs/mkdocs/docs/technical/on_disk_storage.md:134)
  evidence: ''
business_decisions:
- id: BD-001
  type: B/BA
  content: Adapter registry pattern for storage backends
  rationale: 'Allows pluggable storage backends by iterating through registered adapters until one claims
    URI support. New backends can be added by subclassing ArcticLibraryAdapter. Boundary: Only one adapter
    claims a given URI scheme, and the registry is populated at module initialization time.'
  evidence: python/arcticdb/arctic.py:45(_LIBRARY_ADAPTERS)
  stage: uri_parsing_and_adapter_selection
  alternative_considered: Single adapter per URI scheme or compile-time registration
  _evidence_issues:
  - 'FN_NOT_FOUND: _LIBRARY_ADAPTERS in python/arcticdb/arctic.py'
- id: BD-002
  type: BA
  content: Encoding version passed to adapter constructor as instance-level setting
  rationale: 'Encoding version is an instance-level setting, not adapter-level, allowing per-library versioning
    without adapter code changes. Boundary: Encoding version is determined at library creation and cannot
    be changed after the fact.'
  evidence: python/arcticdb/arctic.py:116(_library_adapter)
  stage: uri_parsing_and_adapter_selection
  alternative_considered: Adapter-level encoding version (would require adapter subclassing per version)
  _evidence_issues:
  - 'FN_NOT_FOUND: _library_adapter in python/arcticdb/arctic.py'
- id: BD-003
  type: B/BA
  content: LibraryOptions with sensible defaults for broad compatibility
  rationale: 'Defaults chosen for broad compatibility: dynamic_schema=False for fixed schemas, dedup=False
    for simplicity, rows_per_segment=100k for balance. Boundary: Defaults represent the safest options;
    advanced users can override specific settings.'
  evidence: python/arcticdb/options.py:313(__init__)
  stage: library_configuration
  alternative_considered: No defaults (each options required) or aggressive defaults (higher performance
    but lower safety)
- id: BD-004
  type: B
  content: Dynamic schema toggle affects tiling strategy
  rationale: 'When False, data is tiled by rows AND columns enabling efficient column subsetting. When
    True, only row tiling for dynamic column backfill. Boundary: Dynamic schema incurs overhead for column
    operations but allows schema evolution.'
  evidence: python/arcticdb/options.py:55(dynamic_schema)
  stage: library_configuration
  alternative_considered: Automatic detection (too complex) or fixed tiling strategy (either read-optimized
    or write-optimized)
  _evidence_issues:
  - 'FN_NOT_FOUND: dynamic_schema in python/arcticdb/options.py'
- id: BD-005
  type: B/BA
  content: Encoding version configurable per-library with V1 as default
  rationale: 'V2 is faster but experimental, so V1 is default. Library-level override allows gradual migration.
    Boundary: V1 and V2 are not interoperable; once a library uses V2, it cannot be downgraded.'
  evidence: python/arcticdb/options.py:127(encoding_version)
  stage: library_configuration
  alternative_considered: V2 default (risky for existing deployments) or no versioning (prevents format
    evolution)
  _evidence_issues:
  - 'FN_NOT_FOUND: encoding_version in python/arcticdb/options.py'
- id: BD-006
  type: B
  content: Normalizer chain with fallback to MsgPack/Pickle
  rationale: 'Attempts normalization in order; if each fail, falls back to MsgPack then Pickle. Ensures
    data is never lost but prioritizes efficient formats. Boundary: Fallback chain is fixed; users cannot
    customize the order.'
  evidence: python/arcticdb/version_store/_normalization.py:1578(_normalize)
  stage: data_normalization
  alternative_considered: Single fallback (may lose data) or no fallback (fails on complex objects)
- id: BD-007
  type: BA
  content: Dynamic strings enabled by default in staging operations
  rationale: 'Staged writes use dynamic_strings=True to allow flexible string handling during incomplete
    data collection. Boundary: Dynamic strings affect storage format and cannot be changed after data
    is written.'
  evidence: python/arcticdb/version_store/_store.py:729(dynamic_strings)
  stage: data_normalization
  alternative_considered: Static strings in staging (more restrictive) or user-specified (more complex
    API)
  _evidence_issues:
  - 'FN_NOT_FOUND: dynamic_strings in python/arcticdb/version_store/_store.py'
- id: BD-008
  type: B
  content: Arrow normalization preserves pandas metadata
  rationale: 'Round-trip compatibility with Pandas requires preserving index names and MultiIndex structure
    in Arrow schema. Boundary: Metadata is stored in Arrow schema; incompatible Pandas versions may not
    preserve each metadata.'
  evidence: python/arcticdb/version_store/_normalization.py:648(construct_pandas_metadata)
  stage: data_normalization
  alternative_considered: Pandas-native storage (breaks Arrow interoperability) or no metadata preservation
    (loses index information)
- id: BD-009
  type: B
  content: Metastructure versioning for backward compatibility with V1/V2
  rationale: 'V1 uses pickled types; V2 stores type module/name for class reconstruction. KeyError on
    ''__version__'' vs ''__VER__'' allows old releases to fail gracefully. Boundary: V1 libraries remain
    readable but V2 types require module availability.'
  evidence: python/arcticdb/flattener.py:327(create_original_obj_from_metastruct)
  stage: recursive_normalization
  alternative_considered: Single metastructure version (breaks old data) or complex migration system (too
    heavyweight)
- id: BD-010
  type: B
  content: Separator-based key compaction for long symbols
  rationale: 'Symbols >100 chars are compacted using last-3-chars of each segment + hash. Ensures LMDB
    key size limits are respected. Boundary: Compaction is deterministic but not reversible; original
    symbol cannot be recovered from key.'
  evidence: python/arcticdb/flattener.py:56(compact_v1)
  stage: recursive_normalization
  alternative_considered: Reject long symbols (user experience) or truncate keys (collision risk)
- id: BD-011
  type: B/BA
  content: Recursive normalizers opt-in per library
  rationale: 'Disabled by default to maintain predictable behavior. Users must explicitly enable to write
    nested structures. Boundary: Once enabled, nested structures are stored with flattened keys; disabling
    after write has no effect on existing data.'
  evidence: python/arcticdb/options.py:131(recursive_normalizers)
  stage: recursive_normalization
  alternative_considered: Enabled by default (confusing for simple use cases) or per-write option (API
    complexity)
  _evidence_issues:
  - 'FN_NOT_FOUND: recursive_normalizers in python/arcticdb/options.py'
- id: BD-012
  type: B
  content: Write operations always create new version
  rationale: 'New version created even if symbol exists; previous version remains accessible via ''as_of''.
    Enables full version history. Boundary: Version is created regardless of data content; identical writes
    create distinct versions.'
  evidence: python/arcticdb/version_store/_store.py:751(write)
  stage: write_operations
  alternative_considered: Update-in-place (loses history) or conditional versioning (complex semantics)
- id: BD-013
  type: B/BA
  content: Prune previous version default False for safety
  rationale: 'Keeping each versions by default; users must explicitly prune to avoid storage growth. Snapshot
    protection prevents accidental deletion. Boundary: Prune only affects non-snapshot-protected versions;
    explicit as_of is required to read specific versions.'
  evidence: python/arcticdb/version_store/_store.py:849(prune_previous_version)
  stage: write_operations
  alternative_considered: Default True (storage efficiency but risky) or manual-only pruning (too burdensome)
  _evidence_issues:
  - 'FN_NOT_FOUND: prune_previous_version in python/arcticdb/version_store/_store.py'
- id: BD-014
  type: B
  content: Segment deduplication against previous version using content hash
  rationale: 'Content hash comparison allows skipping identical segments. Most effective for append-only
    workloads with data only at end. Boundary: Deduplication only compares adjacent versions; non-adjacent
    duplicates are not detected.'
  evidence: python/arcticdb/options.py:75(dedup)
  stage: write_operations
  alternative_considered: No deduplication (simpler) or full-block deduplication (higher memory usage)
  _evidence_issues:
  - 'FN_NOT_FOUND: dedup in python/arcticdb/options.py'
- id: BD-015
  type: B/BA
  content: Output format configurable at multiple precedence levels
  rationale: 'Arctic instance → Library → Read operation precedence allows global defaults with per-operation
    overrides. Boundary: Operation-level settings override library-level; library-level overrides instance-level;
    precedence is left-to-right.'
  evidence: python/arcticdb/options.py:279(RuntimeOptions)
  stage: read_operations
  alternative_considered: Single configuration level (less flexible) or runtime-only configuration (loses
    persistence)
- id: BD-016
  type: B/RC
  content: Lazy DataFrame for deferred query execution
  rationale: 'Enables chaining of queries before execution, reducing round-trips. collect() triggers actual
    read. Boundary: Query is executed on first materialization; side effects (read timestamps) occur at
    collect time.'
  evidence: python/arcticdb/version_store/library.py:441(LazyDataFrame)
  stage: read_operations
  alternative_considered: Eager execution (simpler but less efficient) or separate query compilation (more
    complex API)
- id: BD-017
  type: B/DK
  content: Column and row range filtering in C++ storage layer
  rationale: 'Storage layer does filtering to minimize data transfer from backend. Python layer handles
    format conversion. Boundary: Filter pushdown is attempted but may not succeed for complex expressions;
    fallback to full read.'
  evidence: python/arcticdb/version_store/_store.py:2189(_get_read_query)
  stage: read_operations
  alternative_considered: Python-only filtering (higher transfer costs) or mandatory filter pushdown (complex
    optimizer)
- id: BD-018
  type: B/RC
  content: Operator overloading for expression building
  rationale: 'Enables natural syntax: q = q[q[''a''] < 5] similar to Pandas boolean indexing. Returns
    ExpressionNode for lazy evaluation. Boundary: Operators create expression trees; actual computation
    happens during query execution.'
  evidence: python/arcticdb/version_store/processing.py:117(__add__)
  stage: query_processing
  alternative_considered: Functional API only (steeper learning curve) or method chaining (different paradigm)
- id: BD-019
  type: B/RC
  content: Resample with flexible origin parameter
  rationale: 'Origin parameter supports ''epoch'', ''start'', ''end'', or specific timestamp for alignment
    flexibility. Boundary: Origin affects bucket boundaries which can significantly change results; users
    must understand implications.'
  evidence: python/arcticdb/version_store/processing.py:694(resample)
  stage: query_processing
  alternative_considered: Fixed origin (simpler but less flexible) or auto-detection (ambiguous for some
    data)
- id: BD-020
  type: B/BA
  content: Memory vs speed optimization modes for query builder
  rationale: 'QueryBuilder can be optimized for speed (default) or memory based on data characteristics.
    Boundary: Memory optimization may increase latency due to chunked processing; speed optimization may
    exceed available RAM on large datasets.'
  evidence: python/arcticdb/version_store/processing.py:1199(optimise_for_speed)
  stage: query_processing
  alternative_considered: Single optimization target (must choose) or automatic selection (hard to predict
    resource availability)
- id: BD-021
  type: B
  content: Tombstone-based deletion for soft version removal
  rationale: 'Deletion marks versions as deleted without immediate removal. Allows recovery and prevents
    dangling references. Boundary: Tombstones persist until compaction; soft-deleted data remains until
    garbage collection runs.'
  evidence: docs/mkdocs/docs/technical/on_disk_storage.md:29(Reference Layer)
  stage: version_and_snapshot_management
  alternative_considered: Hard delete (faster but irreversible) or versioning without tombstones (dangling
    references)
- id: BD-022
  type: B
  content: Snapshot protection prevents version deletion
  rationale: 'Versions protected by snapshots cannot be deleted, ensuring consistency. Boundary: Snapshot
    must be explicitly deleted to allow version pruning; snapshots are namespace-scoped.'
  evidence: python/arcticdb/version_store/_store.py:3196(delete)
  stage: version_and_snapshot_management
  alternative_considered: No protection (simpler but risky) or soft references (complex GC semantics)
- id: BD-023
  type: B/BA
  content: Symbol list caching with compaction at 500 entries threshold
  rationale: 'ListSymbols uses cached add/delete markers. Compacts to single key when >500 entries to
    avoid unbounded growth. Boundary: Compact operation incurs write overhead; threshold is fixed at 500
    entries.'
  evidence: docs/mkdocs/docs/technical/on_disk_storage.md:100(Symbol List Caching)
  stage: version_and_snapshot_management
  alternative_considered: No caching (slower reads) or unlimited cache (unbounded storage growth)
- id: BD-024
  type: B
  content: 4-layer storage hierarchy separating mutability concerns
  rationale: 'Reference Layer (mutable) → Version Layer (immutable linked list) → Index Layer (B-Tree)
    → Data Layer (columnar segments). Separates mutable pointers from immutable data. Boundary: Each layer
    has distinct consistency guarantees; cross-layer operations require careful ordering.'
  evidence: docs/mkdocs/docs/technical/on_disk_storage.md:25(Structural overview)
  stage: storage_backend
  alternative_considered: Flat storage (simpler but loses versioning) or more granular layers (complexity)
- id: BD-025
  type: B/BA
  content: Segment tiling by rows and columns with configurable defaults
  rationale: '100k rows × 127 columns default creates manageable segments. Enables date_range and column
    subsetting without full read. Boundary: Tile size affects both read performance (small = selective)
    and compression efficiency (large = better ratios).'
  evidence: python/arcticdb/options.py:95(rows_per_segment)
  stage: storage_backend
  alternative_considered: Single segment (simple but inefficient) or auto-tuning (requires profiling overhead)
  _evidence_issues:
  - 'FN_NOT_FOUND: rows_per_segment in python/arcticdb/options.py'
- id: BD-026
  type: B
  content: Version linked list for immutable version history
  rationale: 'Each version points to previous version. Allows arbitrary historical reads but long version
    chains slow ''as_of'' queries. Boundary: Version traversal is O(n) in chain length; no indexing of
    historical versions.'
  evidence: docs/mkdocs/docs/technical/on_disk_storage.md:35(Version Layer)
  stage: storage_backend
  alternative_considered: Version index (faster reads but more complex consistency) or no history (simplest)
- id: BD-027
  type: B/BA
  content: Default rows per segment is 100,000 for data storage segmentation
  rationale: The 100,000-row segment size default prevents excessive memory consumption while maintaining
    efficient I/O throughput during storage operations. This boundary ensures segments remain small enough
    to fit in memory but large enough to avoid excessive overhead from metadata and system calls. Values
    outside this range could cause OOM errors or performance degradation.
  evidence: python/arcticdb/util/append_and_defrag.py:54(_append_and_defrag_idempotent)
  stage: write_operations
  alternative_considered: Smaller segments (10K rows) for memory-constrained environments or larger segments
    (1M rows) for high-throughput batch writes were considered but rejected for general-purpose use.
- id: BD-028
  type: B/BA
  content: Prune previous versions defaults to False, preserving each historical versions
  rationale: Disabling version pruning by default protects against accidental data loss and enables full
    audit trails and time-travel queries. This boundary means users must explicitly opt into pruning to
    reduce storage costs, ensuring they understand the irreversible nature of version deletion before
    proceeding.
  evidence: python/arcticdb/version_store/_store.py:2060(_batch_append_to_versioned_items)
  stage: write_operations
  alternative_considered: Auto-pruning based on count or age was considered but rejected to avoid silent
    data loss in production systems.
- id: BD-029
  type: B/BA
  content: Dynamic schema defaults to False, requiring fixed column structure
  rationale: Fixed schema by default ensures predictable data layouts, efficient compression, and better
    query optimization. This boundary enforces data consistency for analytics workloads where schema evolution
    could break downstream processing. Users must explicitly enable dynamic schema when they need to handle
    variable column sets.
  evidence: python/arcticdb/version_store/_store.py:2286(_get_read_options_and_output_format)
  stage: read/write
  alternative_considered: Dynamic schema as default was considered for schema-on-write flexibility but
    rejected due to performance overhead and consistency guarantees required for time-series data.
- id: BD-030
  type: B/BA
  content: Output format defaults to PANDAS for read operations
  rationale: Pandas DataFrame as the default output format maximizes compatibility with existing Python
    data science ecosystems. This boundary ensures most users receive immediately-usable data structures
    while allowing Arrow or native formats for performance-sensitive or interop scenarios.
  evidence: python/arcticdb/version_store/_store.py:2286(_get_read_options_and_output_format)
  stage: read_operations
  alternative_considered: Arrow as default was considered for modern data stack compatibility but rejected
    due to pandas' wider adoption in existing codebases.
- id: BD-031
  type: B/BA
  content: Arrow string format defaults to LARGE_STRING for Arrow output
  rationale: LARGE_STRING encoding handles long string values without truncation while maintaining reasonable
    compression ratios. This boundary prevents data loss when reading Arrow output with string columns
    that may exceed standard 2GB limits, ensuring data fidelity across the wire.
  evidence: python/arcticdb/version_store/_store.py:2286(_get_read_options_and_output_format)
  stage: read_operations
  alternative_considered: SMALL_STRING encoding for memory efficiency was considered but rejected due
    to potential truncation risks for user data.
- id: BD-032
  type: B/BA
  content: Validate index defaults to False for append operations
  rationale: Disabling index validation by default optimizes append performance for high-throughput scenarios.
    This boundary trades validation overhead for speed, allowing users who trust their data's index integrity
    to achieve maximum write throughput while enabling validation when data quality is uncertain.
  evidence: python/arcticdb/version_store/_store.py:1989(batch_append)
  stage: append
  alternative_considered: Validation enabled by default was considered for data safety but rejected due
    to significant performance impact on append-heavy workloads.
- id: BD-033
  type: B/BA
  content: Write if missing defaults to True for batch append operations
  rationale: Defaulting to create missing symbols enables flexible pipelines where symbols may or may
    not already exist. This boundary simplifies initial data loading workflows while allowing users to
    set this to False when they expect symbols to pre-exist and want to catch configuration errors.
  evidence: python/arcticdb/version_store/_store.py:2060(_batch_append_to_versioned_items)
  stage: append
  alternative_considered: write_if_missing=False as default was considered for strict pipeline enforcement
    but rejected due to friction in exploration and initial data loading.
- id: BD-034
  type: B/BA
  content: Sparsify defaults to False for compact_incomplete operations
  rationale: Disabling sparsification preserves data locality and prevents potential query performance
    degradation from scattered sparse columns. This boundary ensures predictable query performance after
    compaction while allowing users to opt into sparsification for specific storage optimization scenarios.
  evidence: python/arcticdb/version_store/_store.py:2770(compact_incomplete)
  stage: compact
  alternative_considered: Sparsification enabled by default was considered for storage efficiency but
    rejected due to query performance trade-offs.
- id: BD-035
  type: B/BA
  content: Via iteration defaults to True for compact_incomplete
  rationale: Iterative compaction handles large symbols without memory exhaustion during the compaction
    process. This boundary ensures symbols of any size can be compacted by processing in chunks, trading
    some speed for guaranteed completion without OOM failures.
  evidence: python/arcticdb/version_store/_store.py:2775(compact_incomplete)
  stage: compact
  alternative_considered: Snapshot-based compaction as default was considered for speed but rejected due
    to memory constraints for large symbols.
- id: BD-036
  type: B/BA
  content: Delete staged data on failure defaults to False
  rationale: Preserving failed staging data enables debugging and manual recovery of interrupted compaction
    operations. This boundary prevents automatic deletion of potentially valuable intermediate state,
    allowing operators to inspect failures before cleanup.
  evidence: python/arcticdb/version_store/_store.py:2770(compact_incomplete)
  stage: compact
  alternative_considered: Auto-cleanup on failure was considered for storage management but rejected to
    preserve debugging evidence.
- id: BD-037
  type: B/BA
  content: Defragmentation threshold defaults to 0.9 (90% of target)
  rationale: A 90% threshold triggers defragmentation when segments are nearly full, balancing storage
    efficiency against defragmentation overhead. This boundary ensures segments are efficiently utilized
    before incurring defragmentation costs while preventing excessive fragmentation from under-filled
    segments.
  evidence: python/arcticdb/util/append_and_defrag.py:58(_append_and_defrag_idempotent)
  stage: defrag
  alternative_considered: Lower thresholds (70-80%) were considered for better space efficiency but rejected
    due to increased defragmentation frequency and CPU overhead.
- id: BD-038
  type: B
  content: Defragmentation factor must be greater than 1
  rationale: Requiring defragmentation factor > 1 ensures compaction actually reduces segment count and
    storage usage. This boundary prevents no-op defragmentation that would waste resources, enforcing
    that any defragmentation operation must produce tangible storage improvements.
  evidence: python/arcticdb/util/append_and_defrag.py:54(_append_and_defrag_idempotent)
  stage: defrag
  alternative_considered: Allowing factor=1 for identity operations was considered but rejected to prevent
    meaningless defragmentation calls.
- id: BD-039
