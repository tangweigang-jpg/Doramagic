id: finance-bp-111
name: CCXT – CryptoCurrency eXchange Trading Library
sop_version: '3.6'
source:
  projects:
  - ccxt
  commit_hash: 4a406043706767e7eefd43a4ceab56307c16b45e
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: cryptocurrency exchange trading API integration
  description: A unified API library for connecting to and trading with 100+ cryptocurrency
    exchanges worldwide, providing quick access to market data, order execution, and
    account management.
  prerequisites: Users need API credentials for exchanges they wish to trade on, programming
    skills in JavaScript/TypeScript/Python/C#/PHP/Go, and understanding of cryptocurrency
    market structures.
  not_suitable_for: Non-cryptocurrency trading, non-programmatic/manual trading workflows,
    users without technical development skills, real-time trading requiring sub-millisecond
    latency without additional infrastructure
  activation:
    triggers:
    - Working with cryptocurrency exchange APIs in any language
    - Building trading bots or algorithmic trading systems
    - Fetching market data for analysis or visualization
    - Monitoring real-time prices for arbitrage detection
    - Building portfolio management or tracking tools
    emphasis:
    - Use ESPECIALLY when building trading bots requiring real-time price feeds
    - Use ESPECIALLY when connecting to multiple exchanges with unified API
    - Use ESPECIALLY when needing both historical data (REST) and live updates (WebSocket)
    - Use ESPECIALLY when dealing with rate limiting and error recovery
    anti_skip:
    - Don't skip EnableRateLimit because rate limit violations cause cascading failures
    - Don't skip loadMarkets() because symbols won't resolve correctly without it
    - Don't skip close() on WebSocket connections because it causes memory leaks
    - Don't skip timezone configuration in PHP because it causes timestamp errors
stages:
- id: market_currency_loading
  name: Market and Currency Loading
  order: 1
  responsibility: Load and parse market/currency data from exchanges to enable unified
    trading operations across each supported exchanges
  interface:
    inputs: API credentials (optional), reload flag
    outputs: cached markets_by_id dict, markets dict by symbol, currencies dict
  required_methods:
  - name: Exchange.load_markets
    description: Loads and caches market data from the exchange, returning a dictionary
      mapping symbols to market structures
    evidence: python/ccxt/base/exchange.py:1804(load_markets)
  - name: binance.fetch_markets
    description: Exchange-specific implementation that fetches market data using Binance
      API format
    evidence: python/ccxt/binance.py:40(fetch_markets)
  key_behaviors:
  - behavior: Lazy market loading
    description: Markets are not loaded until first required, then cached in memory
      to avoid repeated API calls
    evidence: python/ccxt/base/exchange.py:1804(load_markets)
  - behavior: Spot market precedence
    description: When resolving marketId conflicts, spot markets are inserted first
      ensuring unified symbols resolve to spot by default
    evidence: python/ccxt/base/exchange.py:3946(set_markets)
  - behavior: Complete schema defaults
    description: safe_market_structure provides complete schema with None defaults
      ensuring each market properties exist regardless of exchange API completeness
    evidence: python/ccxt/base/exchange.py:3862(safe_market_structure)
  replaceable_points:
  - name: fetch_markets
    description: Exchange-specific market fetching logic that can be overridden for
      custom exchange implementations
    options:
    - name: override in subclass
      traits:
      - exchange-specific
      - custom parsing
      fit_for:
      - new exchanges
      - atypical API formats
      not_fit_for:
      - standard exchanges already supported
    - name: use generic base
      traits:
      - unified approach
      - minimal code
      fit_for:
      - exchanges with standard market formats
      not_fit_for:
      - exchanges with unique response formats
    default: override in subclass
  design_decisions:
  - 'Markets cached in memory on first load to avoid repeated API calls; evidence:
    python/ccxt/base/exchange.py:1804(load_markets); rationale: Avoids rate limit
    exhaustion and improves latency on repeated operations'
  - 'Spot markets inserted first when resolving marketId conflicts; evidence: python/ccxt/base/exchange.py:3946(set_markets);
    rationale: Ensures unified symbols resolve to spot markets by default'
  - 'safe_market_structure provides complete schema with None defaults; evidence:
    python/ccxt/base/exchange.py:3862(safe_market_structure); rationale: Ensures each
    market properties exist regardless of exchange API completeness'
  acceptance_hints:
  - load_markets() returns non-empty dict with symbol keys
  - Symbol format is uppercase BASE/QUOTE (e.g., BTC/USDT)
  - 'Market dict contains required fields: symbol, base, quote, precision, limits'
- id: request_construction
  name: API Request Construction
  order: 2
  responsibility: Build authenticated API requests with proper signatures and parameter
    encoding for each exchange
  interface:
    inputs: API endpoint path, HTTP method, params dict
    outputs: signed headers dict, request body (if POST), final URL
  required_methods:
  - name: Exchange.sign
    description: Constructs signed requests for API calls using exchange-specific
      authentication methods
    evidence: python/ccxt/base/exchange.py:167(sign)
  - name: Entry descriptor
    description: Maps camelCase API endpoints to snake_case Python method names using
      descriptor protocol
    evidence: python/ccxt/base/types.py:26(Entry)
  key_behaviors:
  - behavior: Descriptor-based endpoint binding
    description: Entry descriptor maps camelCase to snake_case method names, providing
      Pythonic API while mapping exchange-specific naming conventions
    evidence: python/ccxt/base/types.py:39(__get__)
  - behavior: Type-safe parameter substitution
    description: implode_params replaces {param} placeholders in paths for dynamic
      endpoint construction
    evidence: python/ccxt/base/exchange.py:1193(implode_params)
  - behavior: Multi-algorithm signature support
    description: HMAC signing supports sha256/sha512 and other algorithms with RSA
      fallback for different exchange requirements
    evidence: python/ccxt/base/exchange.py:1400(hmac)
  replaceable_points:
  - name: sign
    description: Request signing logic that can be customized for different authentication
      schemes
    options:
    - name: HMAC
      traits:
      - symmetric key
      - sha256/sha512
      fit_for:
      - Binance
      - Coinbase Pro
      - most exchanges
      not_fit_for:
      - exchanges requiring asymmetric keys
    - name: RSA
      traits:
      - asymmetric
      - private key file
      fit_for:
      - OKX
      - some institutional APIs
      not_fit_for:
      - exchanges without RSA support
    - name: ED25519
      traits:
      - modern elliptic curve
      - high security
      fit_for:
      - HyperLiquid
      - advanced exchanges
      not_fit_for:
      - legacy exchanges
    - name: custom
      traits:
      - user-defined algorithm
      fit_for:
      - non-standard exchanges
      - testing
      not_fit_for:
      - production standard exchanges
    default: HMAC
  design_decisions:
  - 'Entry descriptor maps camelCase to snake_case method names; evidence: python/ccxt/base/types.py:39(__get__);
    rationale: Provides Pythonic API while mapping exchange-specific naming'
  - 'implode_params replaces {param} placeholders in paths; evidence: python/ccxt/base/exchange.py:1193(implode_params);
    rationale: Type-safe parameter substitution for dynamic endpoints'
  - 'HMAC signing supports sha256/sha512/等多种算法 with RSA fallback; evidence: python/ccxt/base/exchange.py:1400(hmac);
    rationale: Different exchanges require different signature algorithms'
  acceptance_hints:
  - 'sign() returns 4-tuple: (url, method, headers, body)'
  - API calls require prior load_markets() for market-specific operations
  - Each exchange must define nonce() for request signing
- id: network_request
  name: Network Request Execution
  order: 3
  responsibility: Execute HTTP/WebSocket requests with rate limiting, proxy support,
    and retry logic
  interface:
    inputs: URL, method, headers, body
    outputs: HTTP response body, response headers
  required_methods:
  - name: Exchange.fetch
    description: Synchronous HTTP request execution with rate limiting and proxy support
    evidence: python/ccxt/base/exchange.py:596(fetch)
  - name: Throttler.wait
    description: Rate limit coordination using leaky bucket algorithm to prevent exchange
      API violations
    evidence: python/ccxt/async_support/base/throttler.py:6(Throttler)
  key_behaviors:
  - behavior: Leaky bucket rate limiting
    description: Rate limiting via leaky bucket algorithm by default prevents exchange
      API violations while maximizing throughput
    evidence: python/ccxt/base/exchange.py:200(rateLimiterAlgorithm)
  - behavior: Proxy flexibility
    description: Both HTTP proxy and SOCKS proxy support with environment variable
      detection for different network environments
    evidence: python/ccxt/async_support/base/exchange.py:163(fetch)
  - behavior: Conservative defaults
    description: Default rateLimit of 2000ms with exchange-specific overrides, ensuring
      conservative defaults that exchanges tune for their limits
    evidence: python/ccxt/base/exchange.py:2491(rateLimit)
  replaceable_points:
  - name: rateLimit
    description: Milliseconds between requests to respect exchange rate limits
    options:
    - name: per-exchange default
      traits:
      - automatic
      - exchange-optimized
      fit_for:
      - standard usage
      - production
      not_fit_for:
      - high-frequency trading
      - custom rate limits
    - name: user-specified
      traits:
      - customizable
      - manual tuning
      fit_for:
      - specific exchange requirements
      - testing
      not_fit_for:
      - users unfamiliar with exchange limits
    default: '2000'
  design_decisions:
  - 'Rate limiting via leaky bucket algorithm by default; evidence: python/ccxt/base/exchange.py:200(rateLimiterAlgorithm);
    rationale: Prevents exchange API violations while maximizing throughput'
  - 'Both HTTP proxy and SOCKS proxy support with env var detection; evidence: python/ccxt/async_support/base/exchange.py:163(fetch);
    rationale: Flexibility for users in different network environments'
  - 'Default rateLimit of 2000ms, exchange-specific overrides in describe(); evidence:
    python/ccxt/base/exchange.py:2491(rateLimit); rationale: Conservative defaults,
    exchanges tune for their limits'
  acceptance_hints:
  - Requests respect enableRateLimit=True by default
  - timeout=10000ms default kills long-running requests
  - proxy settings detected from HTTP_PROXY/HTTPS_PROXY environment variables
- id: response_parsing
  name: Response Parsing and Normalization
  order: 4
  responsibility: Parse exchange-specific JSON responses into unified CCXT TypedDict
    structures for cross-exchange compatibility
  interface:
    inputs: raw exchange JSON/dict response
    outputs: unified TypedDict structures (Order, Trade, Ticker, etc.)
  required_methods:
  - name: Exchange.safe_float
    description: Safely extracts float values from response dicts with None defaults
      for graceful degradation
    evidence: python/ccxt/base/exchange.py:767(safe_float)
  - name: Precise.string_mul
    description: Arbitrary precision decimal arithmetic using string representation
      to avoid floating-point errors
    evidence: python/ccxt/base/precise.py:197(string_mul)
  key_behaviors:
  - behavior: Graceful degradation
    description: safe_* methods use None defaults instead of raising exceptions when
      exchanges omit fields
    evidence: python/ccxt/base/exchange.py:767(safe_float)
  - behavior: String-based precision math
    description: Every internal math uses string representation with Precise class
      to avoid floating-point precision errors in financial calculations
    evidence: python/ccxt/base/precise.py:197(string_mul)
  - behavior: Balance derivation
    description: safe_balance derives missing free/used/total from available values
      since different exchanges return different field combinations
    evidence: python/ccxt/base/exchange.py:4070(safe_balance)
  - behavior: Contract cost calculation
    description: Contract cost = contracts * contractSize * price with inverse calculation
      (1/price) for both linear and inverse perpetual contracts
    evidence: python/ccxt/base/exchange.py:4428(safe_trade)
  replaceable_points:
  - name: parse_* methods
    description: Response parsing logic that can be overridden per-exchange for unique
      API formats
    options:
    - name: override per-exchange
      traits:
      - custom parsing
      - exchange-specific
      fit_for:
      - unique response formats
      - new exchanges
      not_fit_for:
      - standard exchanges
    - name: use unified base
      traits:
      - inherited
      - maintained centrally
      fit_for:
      - well-documented exchange formats
      not_fit_for:
      - exchanges with non-standard responses
    default: override per-exchange
  design_decisions:
  - 'safe_* methods use None defaults instead of raising exceptions; evidence: python/ccxt/base/exchange.py:767(safe_float);
    rationale: Graceful degradation when exchanges omit fields'
  - 'Every internal math uses string representation with Precise class; evidence:
    python/ccxt/base/precise.py:197(string_mul); rationale: Avoids floating-point
    precision errors in financial calculations'
  - 'safe_balance derives missing free/used/total from available values; evidence:
    python/ccxt/base/exchange.py:4070(safe_balance); rationale: Different exchanges
    return different balance field combinations'
  - 'Contract cost = contracts * contractSize * price (inverse = 1/price); evidence:
    python/ccxt/base/exchange.py:4428(safe_trade); rationale: Handles both linear
    and inverse perpetual contracts'
  acceptance_hints:
  - Every numeric values stored as strings internally
  - Decimal precision capped at Python's decimal precision minus 2
  - OHLCV arrays are [timestamp, open, high, low, close, volume]
- id: websocket_streaming
  name: WebSocket Real-time Streaming
  order: 5
  responsibility: Maintain persistent WebSocket connections for real-time market and
    order data streaming
  interface:
    inputs: subscription request (symbol, channel)
    outputs: real-time OrderBook, Trade, OHLCV, Order updates
  required_methods:
  - name: Client.connect
    description: WebSocket connection manager with future resolution for subscription-based
      data delivery
    evidence: python/ccxt/async_support/base/ws/client.py:21(Client)
  - name: Future.race
    description: Async future with resolve/reject and race() for concurrent message
      resolution
    evidence: python/ccxt/async_support/base/ws/future.py:6(Future)
  - name: binance.watch_trades
    description: Binance-specific WebSocket implementation for real-time trade streaming
    evidence: python/ccxt/pro/binance.py:19(binance)
  key_behaviors:
  - behavior: Future-based subscription resolution
    description: Message hash maps subscriptions to their resolving futures, decoupling
      subscription from result delivery
    evidence: python/ccxt/async_support/base/ws/client.py:81(future)
  - behavior: Efficient async racing
    description: Future.race() uses done-callbacks instead of create_task(wait) to
      avoid asyncio Task churn on high-frequency updates
    evidence: python/ccxt/async_support/base/ws/future.py:17(race)
  - behavior: OrderBook variant handling
    description: Three OrderBook variants handle different exchange delta formats
      (absolute volume, order counts, order IDs)
    evidence: python/ccxt/async_support/base/ws/order_book.py:8(OrderBook)
  - behavior: Connection resilience
    description: Connection backoff with exponential delay on reconnect handles exchange-initiated
      disconnections gracefully
    evidence: python/ccxt/async_support/base/ws/client.py:155(open)
  replaceable_points:
  - name: handle_* methods
    description: Message parsing per channel type that can be extended per-exchange
    options:
    - name: override per-exchange
      traits:
      - custom handlers
      - exchange-specific
      fit_for:
      - unique message formats
      - new exchanges
      not_fit_for:
      - standard exchange formats
    - name: extend base
      traits:
      - inherited logic
      - partial override
      fit_for:
      - exchanges with minor format differences
      not_fit_for:
      - exchanges with completely different formats
    default: override per-exchange
  design_decisions:
  - 'Message hash maps subscriptions to their resolving futures; evidence: python/ccxt/async_support/base/ws/client.py:81(future);
    rationale: Decouples subscription from result delivery'
  - 'Future.race() uses done-callbacks instead of create_task(wait); evidence: python/ccxt/async_support/base/ws/future.py:17(race);
    rationale: Avoids asyncio Task churn on high-frequency updates'
  - 'Three OrderBook variants for different exchange delta formats; evidence: python/ccxt/async_support/base/ws/order_book.py:8(OrderBook);
    rationale: Some exchanges send absolute volume, some send order counts, some send
    order IDs'
  - 'Connection backoff with exponential delay on reconnect; evidence: python/ccxt/async_support/base/ws/client.py:155(open);
    rationale: Handle exchange-initiated disconnections gracefully'
  acceptance_hints:
  - OHLCVLimit=1000 default for in-memory candle caching per symbol per timeframe
  - 'WS connection lifecycle: connect -> on_connected_callback -> subscriptions ->
    on_close_callback'
  - OrderBook dicts contain 'bids', 'asks', 'timestamp', 'nonce', 'symbol'
- id: trading_operations
  name: Trading Operations
  order: 6
  responsibility: Execute and manage orders, positions, and account operations through
    unified API
  interface:
    inputs: symbol, type, side, amount, price, params
    outputs: Order TypedDict, position updates, balance updates
  required_methods:
  - name: binance.create_order
    description: Full order lifecycle creation with validation, submission, and response
      parsing
    evidence: python/ccxt/binance.py:6192(create_order)
  - name: binance.create_orders
    description: Batch order creation using single API request for improved execution
      speed on multi-leg strategies
    evidence: python/ccxt/binance.py:6115(create_orders)
  - name: Exchange.check_order_arguments
    description: Pre-submission validation ensuring fail-fast with clear errors to
      avoid wasted API quota
    evidence: python/ccxt/base/exchange.py:1999(check_order_arguments)
  key_behaviors:
  - behavior: Fail-fast validation
    description: check_order_arguments validates before any API call to fail fast
      with clear errors, avoiding wasted API quota
    evidence: python/ccxt/base/exchange.py:1999(check_order_arguments)
  - behavior: Batch order efficiency
    description: create_orders sends batch requests vs individual create_order calls,
      reducing round trips and improving execution speed
    evidence: python/ccxt/binance.py:6115(create_orders)
  - behavior: Quote currency abstraction
    description: '''cost'' parameter for market orders abstracts amount vs quote quantity,
      allowing users to think in USD not BTC'
    evidence: python/ccxt/binance.py:6564(create_market_order_with_cost)
  replaceable_points:
  - name: margin modes
    description: Margin mode selection for leveraged trading
    options:
    - name: cross
      traits:
      - shared collateral
      - higher risk
      fit_for:
      - experienced traders
      - portfolio-level margin
      not_fit_for:
      - isolated position management
    - name: isolated
      traits:
      - per-position collateral
      - limited risk
      fit_for:
      - risk management
      - multiple positions
      not_fit_for:
      - portfolio-wide margin optimization
    default: exchange default
  - name: position mode
    description: Position mode for futures/derivatives trading
    options:
    - name: hedged
      traits:
      - long/short positions
      - reduced risk
      fit_for:
      - market neutral strategies
      - risk hedging
      not_fit_for:
      - one-directional strategies
    - name: one-way
      traits:
      - single direction
      - simpler management
      fit_for:
      - directional trading
      - simpler accounts
      not_fit_for:
      - hedging requirements
    default: exchange default
  design_decisions:
  - 'check_order_arguments validates before any API call; evidence: python/ccxt/base/exchange.py:1999(check_order_arguments);
    rationale: Fail fast with clear errors, avoid wasted API quota'
  - 'create_orders sends batch requests vs individual create_order calls; evidence:
    python/ccxt/binance.py:6115(create_orders); rationale: Reduces round trips and
    improves execution speed for multi-leg strategies'
  - '''cost'' parameter for market orders abstracts amount vs quote quantity; evidence:
    python/ccxt/binance.py:6564(create_market_order_with_cost); rationale: Users think
    in quote currency (USD), not base (BTC)'
  acceptance_hints:
  - load_markets() must be called before any market-specific order operation
  - Balance dicts always contain 'free', 'used', 'total' at top level
  - calculate_fee uses market['feeSide'] to determine fee currency
data_flow:
- from_stage: market_currency_loading
  to_stage: request_construction
  data: markets dict provides symbol->marketId mapping and precision/limits for authenticated
    requests
- from_stage: market_currency_loading
  to_stage: response_parsing
  data: market dict provides symbol context for parsing order/trade/balance responses
- from_stage: request_construction
  to_stage: network_request
  data: signed headers, URL, and body tuple for HTTP execution
- from_stage: network_request
  to_stage: response_parsing
  data: raw JSON response bytes from exchange API
- from_stage: response_parsing
  to_stage: trading_operations
  data: unified Order/Trade/Balance TypedDict structures for user-facing operations
- from_stage: network_request
  to_stage: websocket_streaming
  data: persistent WebSocket connection for streaming real-time market data
