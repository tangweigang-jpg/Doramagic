- id: BD-111
  type: B/BA
  content: 'INTERACTION: [BD-072] × [BD-073] → Conservative rate-limiting defaults
    compound to potentially excessive throttling on fast exchanges'
  rationale: enableRateLimit=True combined with 2000ms default creates redundant protection
    that may unnecessarily throttle Bybit (20ms) and Binance (50ms) exchanges. Users
    relying on defaults lose 40-100x throughput potential without realizing optimization
    opportunity. The interaction matters when users expect high-frequency trading
    performance but get conservative defaults. This compounds when users don't know
    to override rateLimit per exchange.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Could auto-detect rate limits at startup, but adds latency
- id: BD-112
  type: B
  content: 'INTERACTION: [BD-011] × [BD-052] → Precise string arithmetic amplifies
    debt calculation safety across margin balance parsing'
  rationale: 'Precise.string_add (BD-011) enables debt aggregation (BD-052) to maintain
    exact decimal representation. Without Precise class, accumulated interest plus
    borrowed principal would lose precision, causing margin assessment errors. This
    amplification effect is critical: BD-052''s debt calculation is only safe because
    BD-011 provides the underlying precision guarantee. The interaction matters during
    rapid interest accrual scenarios where floating-point truncation could compound
    into significant margin miscalculations.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Could use Decimal module directly in debt calculation, but
    Precise provides CCXT-wide consistency
- id: BD-113
  type: BA
  content: 'INTERACTION: [BD-055] × [BD-056] → Bitmex precision conversion multiplied
    by contract multiplier creates cascading position sizing errors'
  rationale: Bitmex lot-to-real conversion (BD-055) divides by precision, then multiplier=100
    (BD-056) scales for margin. Both decisions must be correct simultaneously; if
    precision conversion is wrong, the multiplier amplifies the error 100x. For example,
    a 0.01 BTC precision error becomes 1 BTC margin error. This cascade creates catastrophic
    position sizing risk where two individually reasonable decisions interact dangerously.
    The interaction matters during high-leverage trading where small errors become
    magnified losses.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Could combine into single conversion method with validation,
    but separates concerns
- id: BD-114
  type: BA/DK
  content: 'INTERACTION: [BD-081] × [BD-096] → loadMarkets prerequisite enables has{}
    capability detection to function correctly'
  rationale: has{} capability dictionary (BD-096) declares exchange features, but
    these capabilities are only accurately known after markets are loaded. The lazy-loading
    pattern (BD-081) means has{} may report stale or incomplete capabilities before
    loadMarkets() completes. This hidden dependency means code checking capabilities
    before market load gets wrong information. The interaction matters when trading
    bots initialize and check features before proper setup, potentially enabling methods
    that will fail or disabling methods that would work.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Could auto-load markets on first capability check, but breaks
    explicit control flow expectations
- id: BD-115
  type: BA
  content: 'INTERACTION: [BD-027] × [BD-047] → SSL verification enforcement balanced
    by OS certificate inclusion for corporate compatibility'
  rationale: 'SSL verification enabled (BD-027) provides MITM protection, but OS certificate
    inclusion (BD-047) is required to prevent verification failures in corporate environments
    with SSL inspection proxies. This creates tension: strict verification without
    OS certs fails legitimate proxies, while OS certs add attack surface. The balance
    point is explicit: verification is mandatory by default, but OS certs are included
    as a compatibility layer, not a security tradeoff. The interaction matters in
    enterprise deployments where failing SSL breaks each exchange communications.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Could disable verification in corporate environments, but
    exposes API keys to interception
- id: BD-116
  type: B/BA
  content: 'INTERACTION: [BD-002] × [BD-068] → Spot-first conflict resolution may
    contradict cross-margin mode detection'
  rationale: Spot markets inserted first when resolving conflicts (BD-002) assumes
    spot is the default, but market type determination from account category (BD-068)
    may indicate derivatives-only mode. In cross-margin portfolio margin accounts
    (BD-063), each markets including spot may be accessible, but spot-first priority
    could incorrectly route spot orders to derivatives account modes. The contradiction
    creates ambiguous behavior when both spot and derivatives markets share symbols.
    The interaction matters for Binance portfolio margin users trading spot on accounts
    with derivatives capabilities.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Could require explicit symbol qualification always, but
    breaks backward compatibility
- id: BD-117
  type: B
  content: 'INTERACTION: [BD-033] × [BD-034] → Inverse/linear average price calculation
    must align with contract size cost computation'
  rationale: 'Average price calculation differs for inverse vs linear contracts (BD-033),
    using 1/price for inverse. Contract cost calculation (BD-034) multiplies contracts
    * contractSize * price for each contracts. When these formulas interact, inverse
    contracts require consistent treatment: cost = contracts * contractSize / averagePrice
    (using 1/price from BD-033). Mismatch between BD-033 and BD-034 formulas for inverse
    contracts causes P&L calculation errors. The interaction matters during fill reconstruction
    for inverse perpetual swaps.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Could unify formulas with contract type parameter, but separate
    methods clarify intent
- id: BD-118
  type: BA/DK
  content: 'INTERACTION: [BD-071] × [BD-085] → deep_extend inheritance pattern requires
    single-inheritance chain to preserve configuration'
  rationale: 'deep_extend(super().describe()) (BD-071) merges configuration recursively,
    but this only works correctly with single inheritance (BD-085). Multiple inheritance
    would cause Method Resolution Order (MRO) issues where deep_extend may miss or
    duplicate configuration fields. The dependency is silent: code appears to work
    with multiple inheritance until specific edge cases surface configuration gaps.
    The interaction matters for any future exchange needing mixin support or when
    refactoring inheritance hierarchies.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Could validate inheritance chain at Exchange.__init_subclass__,
