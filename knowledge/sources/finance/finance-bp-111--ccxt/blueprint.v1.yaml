- id: BD-106
  type: B
  content: HMAC-SHA512 for BIP32 key derivation - QuickDigestHalves splits into IL
    (key) and IR (chain code)
  rationale: 'HMAC-SHA512 provides authenticated key derivation per BIP-32; splitting
    the 64-byte output into IL (first 32 bytes, used as child key) and IR (last 32
    bytes, chain code) enables hierarchical derivation. Boundary: IL=0 or IL>=n causes
    derivation failure; chain code determines child key''s child key derivation capability.'
  evidence: python/ccxt/static_dependencies/bip/utils/crypto/hmac.py:95(QuickDigestHalves)
  stage: pattern_choice
  alternative_considered: Could use HKDF, but BIP-32 specifies HMAC-SHA512
