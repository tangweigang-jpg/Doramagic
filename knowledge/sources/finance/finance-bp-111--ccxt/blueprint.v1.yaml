resources:
- id: res-slot-001
  type: replaceable_component
  name: http_client
  path: null
  description: Use aiohttp for production, requests for simple scripts
  used_in_stages: []
  options:
  - name: requests (sync)
    traits:
    - synchronous
    - blocking
    - connection-pooling
    - retry
    fit_for:
    - Simple scripts, synchronous trading bots
    not_fit_for:
    - High-frequency trading, multiple concurrent requests
  - name: aiohttp (async)
    traits:
    - asynchronous
    - non-blocking
    - connection-pooling
    - websocket
    fit_for:
    - Production trading systems, high-frequency applications
    not_fit_for:
    - Simple scripts without async/await
  - name: httpx
    traits:
    - synchronous
    - asynchronous
    - HTTP/2
    - modern
    fit_for:
    - Modern Python applications needing HTTP/2
    not_fit_for:
    - Legacy Python (<3.7)
  default: aiohttp (async)
  _source: worker_resource
- id: res-slot-002
  type: replaceable_component
  name: websocket_client
  path: null
  description: Use native WebSocket support in respective runtime
  used_in_stages: []
  options:
  - name: ws (Node.js)
    traits:
    - synchronous
    - async
    - browser-compatible
    fit_for:
    - Node.js applications, browser bundling
    not_fit_for:
    - Python (use aiohttp)
  - name: native aiohttp WebSocket
    traits:
    - asynchronous
    - built-in
    fit_for:
    - Python async applications
    not_fit_for:
    - Synchronous Python code
  default: ws (Node.js) / aiohttp (Python)
  _source: worker_resource
