- id: BD-GAP-006
  type: B
  content: Starknet ABI version separation (v0, v1, v2) with dedicated parsers and
    serializers for each
  rationale: Starknet evolved its ABI format across versions—v0 was simple, v1 added
    complex types, v2 added interfaces. Separate parser implementations allow handling
    old and new contracts. Breaks if v3 introduces incompatible changes not covered
    by current parsers.
  evidence: python/ccxt/static_dependencies/starknet/abi/v1/parser.py:43(AbiParser.__init__)
  stage: interoperability
  alternative_considered: Single unified parser would be simpler but require complex
    version branching logic
- id: BD-GAP-007
  type: B/DK
  content: ECDSA curve abstraction supporting NIST p192/p224/p256 and secp256k1 through
    a common interface
  rationale: Different cryptocurrencies use different curves—Bitcoin uses secp256k1,
    while traditional PKI uses NIST curves. Abstracting curve selection enables the
    same key interface across use cases. Breaks when adding new curves requires interface
    changes.
  evidence: python/ccxt/static_dependencies/ecdsa/curves.py:16(Curve.__init__)
  stage: architecture
  alternative_considered: Curve-specific classes would allow optimization but increase
    code size
- id: BD-GAP-008
  type: B/DK
  content: Lark grammar-based parser supporting Earley, CYK, and LALR algorithms for
    flexibility vs performance tradeoffs
  rationale: Different parsing algorithms have different strengths—Earley handles
    ambiguous grammars, LALR is fast for deterministic languages, CYK is simple. Embedding
    the parser library enables CCXT to define custom grammars for exchange-specific
    formats. Breaks if grammar complexity exceeds algorithm capabilities.
  evidence: python/ccxt/static_dependencies/lark/parser_frontends.py:157(create_lalr_parser)
  stage: architecture
  alternative_considered: Regex-based parsing would be faster but less maintainable
    for complex formats
- id: BD-GAP-009
  type: T
  content: Msgpack serialization for binary-efficient data exchange with both streaming
    and one-shot modes
  rationale: Msgpack is more compact than JSON for binary data (timestamps, orderbooks).
    Streaming mode enables partial reads from large messages. Breaks if data exceeds
    max_buffer_size (default 100MB).
  evidence: python/ccxt/static_dependencies/msgpack/fallback.py:231(Unpacker.__init__)
  stage: performance
  alternative_considered: JSON would be simpler but larger message sizes for market
    data
- id: BD-GAP-010
  type: BA
  content: Context-aware deserialization for Ethereum types using frame-based stream
    reading with offset tracking
  rationale: Ethereum ABI uses head-tail encoding where dynamic data is placed after
    fixed-size headers. Tracking contextual frames allows correct deserialization
    of nested tuples/arrays. Breaks if encoding violates ABI spec (malformed by malicious
    contract).
  evidence: python/ccxt/static_dependencies/ethereum/abi/decoding.py:87(ContextFramesBytesIO.push_frame)
  stage: implementation
  alternative_considered: Copy-on-write parsing would be safer but slower and use
    more memory
- id: BD-GAP-011
  type: B/DK
  content: CCXT example scripts use WebSocket subscriptions with nested exchange→method→symbol
