business_decisions:
- id: BD-001
  type: B/DK
  content: Markets cached in memory on first load to avoid repeated API calls
  rationale: 'Memory caching on first load prevents rate limit exhaustion and improves
    latency on repeated market operations. Boundary: cached markets persist for the
    exchange instance lifetime, requiring explicit reload to pick up exchange listing
    changes.'
  evidence: python/ccxt/base/exchange.py:1804(load_markets)
  stage: market_currency_loading
  alternative_considered: Could cache to disk but added complexity outweighed benefits
    for in-memory use case
- id: BD-002
  type: B/BA
  content: Spot markets inserted first when resolving marketId conflicts
  rationale: 'Spot markets take precedence when resolving unified symbols to ensure
    predictable default behavior. Boundary: applies only when duplicate marketIds
    exist between spot and derivatives; swap/future markets require explicit qualification.'
  evidence: python/ccxt/base/exchange.py:3946(set_markets)
  stage: market_currency_loading
  alternative_considered: Could raise error on conflict but would break existing user
    code relying on implicit spot resolution
- id: BD-003
  type: BA/DK
  content: safe_market_structure provides complete schema with None defaults
  rationale: 'Normalizes incomplete exchange API responses to a complete market schema
    with None defaults for missing fields. Boundary: None values indicate missing
    exchange data rather than zero or empty; consumers must handle None appropriately.'
  evidence: python/ccxt/base/exchange.py:3862(safe_market_structure)
  stage: market_currency_loading
  alternative_considered: Could require exchanges to declare each fields but many
    exchanges genuinely lack certain metadata
  vague_rationale: true
- id: BD-004
  type: BA/DK
  content: Entry descriptor maps camelCase to snake_case method names
  rationale: 'Provides Pythonic API interface while internally mapping to exchange-specific
    camelCase naming conventions. Boundary: transformation is one-way from user input
    to exchange format; exchange responses retain original naming.'
  evidence: python/ccxt/base/types.py:39(__get__)
  stage: request_construction
  alternative_considered: Could expose raw camelCase API but would violate Python
    conventions and reduce developer ergonomics
- id: BD-005
  type: B/RC
  content: implode_params replaces {param} placeholders in paths
  rationale: 'Type-safe parameter substitution for dynamic API endpoint paths using
    placeholder syntax. Boundary: only replaces {param} patterns; other path construction
    must use explicit concatenation or query parameters.'
  evidence: python/ccxt/base/exchange.py:1193(implode_params)
  stage: request_construction
  alternative_considered: Could use f-strings but placeholder approach is more explicit
    and auditable
- id: BD-006
  type: B/DK
  content: HMAC signing supports sha256/sha512/等多种算法 with RSA fallback
  rationale: 'Multi-algorithm signature support accommodates varying exchange security
    requirements across the crypto ecosystem. Boundary: algorithm selection is per-exchange
    configured; unsupported algorithms require custom exchange implementation.'
  evidence: python/ccxt/base/exchange.py:1400(hmac)
  stage: request_construction
  alternative_considered: Could hardcode single algorithm but would exclude exchanges
    requiring alternatives
- id: BD-007
  type: B/BA
  content: Rate limiting via leaky bucket algorithm by default
  rationale: 'Leaky bucket algorithm prevents exchange API violations while maximizing
    throughput within allowed limits. Boundary: default behavior; exchanges can override
    with token bucket or fixed delay if needed.'
  evidence: python/ccxt/base/exchange.py:200(rateLimiterAlgorithm)
  stage: network_request
  alternative_considered: Fixed delay simpler but less efficient; token bucket more
    complex without significant benefit for most exchanges
  _evidence_issues:
  - 'FN_NOT_FOUND: rateLimiterAlgorithm in python/ccxt/base/exchange.py'
- id: BD-008
  type: B/BA
  content: Both HTTP proxy and SOCKS proxy support with env var detection
  rationale: 'Proxy flexibility supports users in restricted network environments
