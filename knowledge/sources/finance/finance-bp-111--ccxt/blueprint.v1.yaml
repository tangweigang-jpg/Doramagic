- id: BD-GAP-001
  type: B/DK
  content: 'Multi-scheme BIP32 key derivation support: both SLIP-0010 and Khovratovich/Law
    algorithms are implemented to support different cryptocurrency standards'
  rationale: Different blockchains require different derivation algorithms—Bitcoin/ETH
    use SLIP-0010/secp256k1 while ADA/Solana use ed25519-kholaw. Implementing both
    ensures broad cryptocurrency coverage but increases maintenance burden. Breaks
    if a new blockchain requires a third incompatible algorithm.
  evidence: python/ccxt/static_dependencies/bip/bip32/slip10/bip32_slip10_secp256k1.py:34(Bip32Slip10Secp256k1)
  stage: architecture
  alternative_considered: Single algorithm would牺牲 ed25519 chains but reduce code
    duplication
- id: BD-GAP-002
  type: BA
  content: Predicate registry pattern for ABI type encoding/decoding, using predicate
    functions for dynamic type matching
  rationale: Ethereum ABI has many type variants (uint256, bytes32, tuple[], etc.)
    that must be matched at runtime. Predicate-based registry allows extensibility
    without modifying core codec. Breaks if multiple predicates could match same type
    string, raising MultipleEntriesFound error.
  evidence: python/ccxt/static_dependencies/ethereum/abi/registry.py:86(PredicateMapping.find)
  stage: architecture
  alternative_considered: Static dispatch table would be faster but require recompilation
    for new types
- id: BD-GAP-003
  type: T
  content: EIP-712 typed data signing implementation with domain separator hashing
    for Ethereum message authentication
  rationale: EIP-712 defines how to struct-hash typed data for wallet signing. Using
    domain separators prevents replay attacks across different dApps. The implementation
    encodes primary type, recursively hashes dependencies, and combines with domain
    hash. Breaks if EIP-712 domain parameters change (e.g., chainId format).
  evidence: python/ccxt/static_dependencies/ethereum/account/encode_typed_data/encoding_and_hashing.py:220(hash_domain)
  stage: security
  alternative_considered: Plain hex signing would be simpler but less secure against
    replay attacks
- id: BD-GAP-004
  type: B/BA
  content: Separate packed vs standard ABI encoding modes, with packed using concatenation
    without padding
  rationale: Standard ABI encoding uses 32-byte words with zero-padding; packed encoding
    concatenates tightly for efficiency. Different smart contracts expect different
    formats. Supporting both requires separate encoder classes. Breaks if a contract
    expects mixed encoding (not supported).
  evidence: python/ccxt/static_dependencies/ethereum/abi/encoding.py:243(PackedBooleanEncoder)
  stage: interoperability
  alternative_considered: Always standard encoding would be simpler but increase gas
    costs for users
- id: BD-GAP-005
  type: B
  content: BIP39 mnemonic wordlist validation with 2048-word English corpus for seed
    phrase handling
  rationale: BIP39 specifies 2048 words for mnemonic generation. The implementation
    validates words against this list to prevent typos. Breaks if non-English wordlists
    are needed—currently only English is supported.
  evidence: python/ccxt/static_dependencies/bip/coin_conf/coins_conf.py:56(CoinsConf)
  stage: security
  alternative_considered: Accept any word would be more flexible but introduce user
