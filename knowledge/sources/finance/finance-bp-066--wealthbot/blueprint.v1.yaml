id: finance-bp-066
name: wealthbot.io
sop_version: '3.6'
source:
  projects:
  - wealthbot
  commit_hash: 0f9738aa2c5b72b58777b65bc2fc1039cccae88e
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: portfolio rebalancing and tax-loss harvesting automation
  description: Open-source wealth management platform that automates portfolio rebalancing
    and tax-loss harvesting for registered investment advisors (RIAs) serving mass
    affluent clients through integration with custodians like Tradier.
  prerequisites: Users need to understand portfolio management concepts, Symfony framework,
    PHP development, and API integration with financial custodians. Knowledge of tax
    lot accounting (FIFO/LIFO) and IRS capital gains rules is helpful.
  not_suitable_for: High-frequency trading strategies, non-US markets, institutional
    trading desks, real-time market making, cryptocurrency portfolios, or users requiring
    custom brokerage integrations beyond Tradier/Alpaca/IB.
stages:
- id: price_collection
  name: Price Collection
  order: 1
  responsibility: Fetch current market prices from Tradier API for each securities
    in the system to enable price-based rebalancing decisions and maintain audit trail
  interface:
    inputs:
    - Security entities from repository
    outputs:
    - SecurityPrice records with current market prices
  required_methods:
  - name: Rebalancer.updateSecurities
    description: Entry point that orchestrates price updates by fetching and storing
      current market prices from Tradier API
    evidence: src/Api/Rebalancer.php:192
  - name: Requests.getQuotes
    description: HTTP client method for Tradier API calls to retrieve quote data for
      securities
    evidence: src/Api/Requests.php:53
  key_behaviors:
  - behavior: Entity-level isolation
    description: Tradier API credentials are loaded per RIA user from RiaCompanyInformation
      entity, ensuring multi-tenant isolation of API keys
    evidence: src/Api/BaseRebalancer.php:87-88
  - behavior: Environment-based routing
    description: Sandbox or production gateway determined by tradier_sandbox container
      parameter for testing vs production routing
    evidence: src/Api/Rebalancer.php:43
  replaceable_points:
  - name: broker_api
    description: Current Tradier integration via Requests trait HTTP client
    options:
    - name: Tradier
      traits:
      - RESTful API
      - US equities focus
      - Vision Access integration
      fit_for:
      - US equity portfolios
      - RIA-focused custodial services
      not_fit_for:
      - International markets
      - Crypto assets
      - Fixed income heavy portfolios
    - name: Alpaca
      traits:
      - Commission-free trading
      - Real-time data
      - Modern API
      fit_for:
      - Cost-sensitive portfolios
      - Algorithm trading
      not_fit_for:
      - Complex tax lot reporting
      - Multi-custodian setups
    - name: Interactive Brokers
      traits:
      - Global markets
      - Advanced order types
      - Professional grade
      fit_for:
      - Institutional clients
      - International diversification
      not_fit_for:
      - Simple retail-focused RIA setups
      - Quick implementation timelines
    default: Tradier
  design_decisions:
  - Fetch latest 2 prices per security to compute price diff - Price diff requires
    current vs previous price; 2 records give old+new in single query (src/Api/BaseRebalancer.php:107)
  - Store price as SecurityPrice entity with datetime, is_current, source fields -
    Audit trail + historical prices needed for compliance; source field enables multi-broker
    migration (src/Api/Rebalancer.php:203-209)
  acceptance_hints:
  - SecurityPrice records created with is_current=true for latest price
  - Previous price records marked with is_current=false
  - Every prices stored with 2 decimal precision
- id: price_analysis
  name: Price Analysis
  order: 2
  responsibility: Calculate price movement ratios to determine which securities need
    rebalancing by comparing current vs historical prices
  interface:
    inputs:
    - Array of {security_id, old_price, price} from processPrices()
    outputs:
    - Price diff ratios used in buyOrSell() decision logic
  required_methods:
  - name: BaseRebalancer.processPrices
    description: Fetches and normalizes price pairs for securities, ensuring data
      quality before ratio calculation
    evidence: src/Api/BaseRebalancer.php:103
  - name: BaseRebalancer.getPricesDiff
    description: Computes price/old_price ratio per security to determine price movement
      magnitude
    evidence: src/Api/BaseRebalancer.php:137
  key_behaviors:
  - behavior: Division error prevention
    description: Securities with $0 old_price are skipped to avoid division errors
      and NaN values in price diff calculations for initial purchases
    evidence: src/Api/BaseRebalancer.php:121-124
  - behavior: Ratio normalization
    description: Price diff computed as ratio (new_price / old_price) rather than
      absolute change to normalize across asset prices with different magnitudes
    evidence: src/Api/BaseRebalancer.php:141
  replaceable_points: []
  design_decisions:
  - Price diff = new_price / old_price (ratio, not absolute change) - Ratio normalizes
    across asset prices; enables consistent thresholds (0.85/1.15) (src/Api/BaseRebalancer.php:141)
  - Skip securities with $0 old_price to avoid division errors - Initial purchases
    have no history; prevents NaN in price diff calculations (src/Api/BaseRebalancer.php:121-124)
  acceptance_hints:
  - prices_diff computed for each security with non-zero old_price
  - NaN or infinity values handled appropriately
  - processPrices called before buyOrSell in rebalance workflow
- id: rebalance_decision
  name: Rebalance Decision
  order: 3
  responsibility: Determine buy/sell actions based on price movements and risk tolerance
    thresholds to maintain target portfolio allocations within tolerance bands
  interface:
    inputs:
    - '{prices_diff, percent, old_value} per model entity'
    outputs:
    - Individual buy/sell calls per security position
  required_methods:
  - name: Trade.buyOrSell
    description: Implements dual-threshold logic comparing prices_diff against buy/sell
      bands with risk tolerance adjustment
    evidence: src/Api/Trade.php:30
  - name: Trade.sell
    description: Creates sell transactions and RebalancerQueue entries for securities
      exceeding upper threshold
    evidence: src/Api/Trade.php:81
  - name: Trade.buy
    description: Creates buy transactions and RebalancerQueue entries for securities
      below lower threshold
    evidence: src/Api/Trade.php:161
  key_behaviors:
  - behavior: Dual-threshold comparison
    description: Buy/Sell thresholds at 0.85 (down 15%) and 1.15 (up 15%) reduce trading
      frequency; below bands triggers rebalance, inside bands means hold
    evidence: src/Api/Trade.php:48-67
  - behavior: Risk-adjusted thresholds
    description: Risk tolerance modifier computed from ClientQuestionnaireAnswer points
      adds 1-2% buffer to threshold bands, wider bands for higher risk tolerance
    evidence: src/Api/Trade.php:44
  replaceable_points:
  - name: threshold_logic
    description: Current dual-threshold (0.85/1.15) approach for determining buy/sell
      actions
    options:
    - name: Fixed 15% bands
      traits:
      - Simple to understand
      - Low trading frequency
      - Consistent across clients
      fit_for:
      - Long-term investors
      - Tax-efficient accounts
      - Hands-off management
      not_fit_for:
      - Active traders
      - Volatile sectors
      - Clients wanting aggressive rebalancing
    - name: Dynamic bands based on volatility
      traits:
      - Responsive to market conditions
      - Wider bands in volatile markets
      fit_for:
      - ETF portfolios with known volatility
      - Adaptive rebalancing
      not_fit_for:
      - Individual securities
      - Low-liquidity assets
    - name: Momentum-based
      traits:
      - Trend-following approach
      - Considers price direction
      fit_for:
      - Active management
      - Growth-oriented portfolios
      not_fit_for:
      - Buy-and-hold strategies
      - Tax-deferred accounts
    default: Fixed 15% bands
  design_decisions:
  - Buy/Sell thresholds at 0.85 (down 15%) and 1.15 (up 15%) - 15% bands reduce trading
    frequency; below bands = rebalance, inside = hold (src/Api/Trade.php:48-67)
  - 'Risk tolerance modifier: (point/100)+1 adds 1-2% buffer to threshold - Higher
    risk clients get wider bands; computed from ClientQuestionnaireAnswer points (src/Api/Trade.php:44)'
  - sell() creates Lot with costBasisKnown=true and washSale=false flags - Tracks
    tax lot metadata; enables TLH calculations in RebalancerQueueManager (src/Api/Trade.php:128-130)
  acceptance_hints:
  - RebalancerQueue entries created with STATUS_BUY or STATUS_SELL string constants
  - Thresholds applied consistently based on prices_diff
  - Risk tolerance modification factored into threshold calculation
- id: order_placement
  name: Order Placement
  order: 4
  responsibility: Submit market orders to Tradier brokerage for execution with day
    duration to ensure immediate fill within trading session
  interface:
    inputs:
    - '{account_id, symbol, side, quantity, price} from buy/sell'
    outputs:
    - Tradier API response confirming order submission
  required_methods:
  - name: Requests.placeOrder
    description: Sends POST request to /accounts/{id}/orders endpoint to submit trades
      to Tradier
    evidence: src/Api/Requests.php:103
  - name: Rebalancer.setApiKey
    description: Loads Tradier credentials from RiaCompanyInformation for authenticated
      API access
    evidence: src/Api/Rebalancer.php:44
  key_behaviors:
  - behavior: Custodian coupling
    description: Account ID prefixed with 'VA' for Vision Access custodian format,
      hardcoded prefix couples to Tradier's naming convention
    evidence: src/Api/Trade.php:89
  - behavior: Day order execution
    description: Every orders expire same day with no GTC orders supported; ensures
      trades execute within current trading session
    evidence: src/Api/Requests.php:105
  replaceable_points:
  - name: order_type
    description: Current market order implementation with day duration
    options:
    - name: Market
      traits:
      - Immediate execution
      - Guaranteed fill
      - No price guarantee
      fit_for:
      - Liquid securities
      - Time-sensitive trades
      - Stable markets
      not_fit_for:
      - Illiquid securities
      - Volatile markets
      - Price-sensitive orders
    - name: Limit
      traits:
      - Price guaranteed
      - May not fill
      - Price improvement possible
      fit_for:
      - Less liquid securities
      - Price-sensitive orders
      - Favorable market conditions
      not_fit_for:
      - Urgent execution
      - Thinly traded stocks
    - name: Stop-Limit
      traits:
      - Trigger price
      - Limit price
      - Risk management
      fit_for:
      - Stop-loss protection
      - Downside protection
      - Automated exits
      not_fit_for:
      - Fast-moving markets
      - GTC requirements
    default: Market
  design_decisions:
  - Market orders with day duration; price/stop set to current price - Day orders
    ensure execution today; market order for immediate fill (src/Api/Requests.php:105-106)
  - Account ID prefixed with 'VA' for Vision Access accounts - Tradier account naming
    convention; hardcoded prefix couples to custodian (src/Api/Trade.php:89)
  acceptance_hints:
  - Orders submitted to Tradier API successfully
  - Tradier order IDs captured and stored
  - Account ID properly formatted with VA prefix
- id: transaction_recording
  name: Transaction Recording
  order: 5
  responsibility: Persist buy/sell transactions with Lot, Position, and Transaction
    entities for complete audit trail and accurate tax lot tracking
  interface:
    inputs:
    - Trade execution details from buy()/sell() methods
    outputs:
    - Persisted Lot, Position, Transaction, TransactionType records
  required_methods:
  - name: Lot entity
    description: Tax lot entity tracking shares with cost basis, holding period, and
      wash sale status for IRS compliance
    evidence: src/Entity/Lot.php:1
  - name: Position entity
    description: Position entity grouping related lots under a security within an
      account
    evidence: src/Entity/Position.php:1
  - name: Transaction entity
    description: Individual transaction record linked to lot and security with strict
      status validation
    evidence: src/Entity/Transaction.php:1
  key_behaviors:
  - behavior: Lot persistence ordering
    description: Lot must be persisted before Position assignment; Position->addLot()
      requires Lot to have ID assigned by Doctrine
    evidence: src/Api/Trade.php:112-134
  - behavior: Default lot status
    description: New positions created via Trade.php are always open; closing requires
      explicit status change
    evidence: src/Entity/Position.php:66
  replaceable_points:
  - name: tax_lot_method
    description: Current per-purchase lot creation strategy
    options:
    - name: FIFO (implicit)
      traits:
      - First-in-first-out
      - Simple implementation
      - Common for mutual funds
      fit_for:
      - Standard taxable accounts
      - Long-term holdings
      not_fit_for:
      - Active trading
      - Clients wanting specific lot selection
    - name: LIFO
      traits:
      - Last-in-first-out
      - May reduce short-term gains in rising markets
      fit_for:
      - High-income taxpayers
      - Active trading
      not_fit_for:
      - Bear markets
      - Long-term investors
    - name: Highest Cost
      traits:
      - Minimizes gains
      - Tax-efficient
      fit_for:
      - Tax minimization priority
      - Multiple lots
      not_fit_for:
      - Simple implementation needs
    - name: Specific ID
      traits:
      - Manual selection
      - Maximum flexibility
      - Complex tracking
      fit_for:
      - Professional traders
      - Tax optimization strategies
      not_fit_for:
      - Automated rebalancing
      - RIA-scale operations
    default: FIFO (implicit)
  design_decisions:
  - New Lot+Position created per buy() regardless of existing holdings - Simplifies
    FIFO matching; each purchase = new lot for tax tracking (src/Api/Trade.php:191-210)
  - Lot.isShortTerm() uses 365-day threshold from initial purchase date - IRS short-term
    vs long-term capital gains threshold; date from initial lot (src/Entity/Lot.php:485-495)
  acceptance_hints:
  - Lot records created with cost basis and purchase date populated
  - Position.lots collection properly populated after Lot persistence
  - Transaction status set to valid constant (STATUS_IN_PROGRESS|STATUS_PLACED|STATUS_VERIFIED|STATUS_NOT_POSTED)
- id: portfolio_value_update
  name: Portfolio Value Update
  order: 6
  responsibility: Record new ClientPortfolioValue snapshot after rebalancing trades
    complete to track portfolio performance and drift from target model
  interface:
    inputs:
    - ClientPortfolio, total portfolio value after trades
    outputs:
    - New ClientPortfolioValue record with model_deviation=4
  required_methods:
  - name: Rebalancer.updatePortfolioValues
    description: Creates new ClientPortfolioValue snapshot after rebalancing trades
      complete
    evidence: src/Api/Rebalancer.php:165
  key_behaviors:
  - behavior: Post-rebalance snapshot
    description: Hardcoded model_deviation=4 after rebalance indicates portfolio within
      default tolerance band
    evidence: src/Api/Rebalancer.php:179
  replaceable_points: []
  design_decisions:
  - Hardcode model_deviation=4 after rebalance - Default tolerance band; indicates
    portfolio within acceptable drift range (src/Api/Rebalancer.php:179)
  acceptance_hints:
  - ClientPortfolioValue record created with timestamp
  - model_deviation field set to 4
  - Portfolio snapshot reflects post-trade values
- id: tlh_calculation
  name: Tax Loss Harvesting Calculation
  order: 7
  responsibility: Calculate realized gains/losses and estimate TLH savings for tax
    reporting and client statement generation
  interface:
    inputs:
    - RebalancerQueue items with associated Lot records
    outputs:
    - Summary with short_term_gains/losses, long_term_gains/losses, tlh_savings
  required_methods:
  - name: RebalancerQueueManager.prepareSummary
    description: Aggregates gains/losses from lots in rebalancer queue, categorizing
      by holding period and computing TLH savings estimate
    evidence: src/Manager/RebalancerQueueManager.php:40
  key_behaviors:
  - behavior: Soft delete preservation
    description: RebalancerQueue has is_deleted flag for soft delete preserving audit
      trail and allowing undeletion if trades are reversed
    evidence: src/Entity/RebalancerQueue.php:59
  - behavior: Gains classification
    description: Realized gains/losses classified as short-term (<=365 days) or long-term
      (>365 days) based on initial lot purchase date
    evidence: src/Entity/Lot.php:485-495
  replaceable_points: []
  design_decisions:
  - TLH savings formula commented out but referenced in code - Savings = (short_term_losses
    * tax_rate) + (long_term_losses * 0.15) - costs (src/Manager/RebalancerQueueManager.php:87)
  - RebalancerQueue has is_deleted flag for soft delete - Preserves audit trail; allows
    undeletion if trades reversed (src/Entity/RebalancerQueue.php:59)
  acceptance_hints:
  - Gains/losses properly categorized by holding period (short-term <=365 days, long-term
    >365 days)
  - TLH savings calculated based on tax rate formula
  - RebalancerQueue items properly linked to Lot records
- id: job_management
  name: Job Management
  order: 8
  responsibility: Track rebalancing jobs with type classification and completion status
    for workflow management, monitoring, and compliance auditing
  interface:
    inputs:
    - Job entity with rebalance_type (0-4)
    outputs:
    - Job.finished_at, Job.is_error flags for monitoring
  required_methods:
  - name: Job entity
    description: Job entity defining rebalance types (FULL, REQUIRED_CASH, FULL_AND_TLH,
      NO_ACTIONS, INITIAL) and status tracking
    evidence: src/Entity/Job.php:1
  - name: Rebalancer.rebalance
    description: Main method iterating over RebalancerActions and processing job queue
      with batch flush at end
    evidence: src/Api/Rebalancer.php:51
  key_behaviors:
  - behavior: Multi-tenant job ownership
    description: Job belongs to User (RIA) not Client; RIA controls when client portfolios
      rebalance in multi-tenant architecture
    evidence: src/Api/Rebalancer.php:72
  - behavior: Batch flush pattern
    description: Rebalancer processes each actions then flushes once at end; each
      trades committed together or none
    evidence: src/Api/Rebalancer.php:75
  replaceable_points: []
  design_decisions:
  - 'Five rebalance types: FULL(0), REQUIRED_CASH(1), FULL_AND_TLH(2), NO_ACTIONS(3),
    INITIAL(4) - Separates cash-only rebalances from full portfolio rebalances; INITIAL
    for new accounts (src/Entity/Job.php:56-60)'
  - Job belongs to User (RIA) not Client; RIA triggers rebalancing - RIA controls
    when client portfolios rebalance; multi-tenant architecture (src/Api/Rebalancer.php:72)
  acceptance_hints:
  - Job.finished_at timestamp set after rebalance completes
  - Job.is_error flag updated appropriately based on execution success
  - Rebalance type correctly determines trading strategy (investableCash vs totalValue)
data_flow:
- from_stage: price_collection
  to_stage: price_analysis
  data: SecurityPrice records with current/previous prices and timestamps
- from_stage: price_analysis
  to_stage: rebalance_decision
  data: Array of {security_id, old_price, price, prices_diff} per security
- from_stage: rebalance_decision
  to_stage: order_placement
  data: '{symbol, amount, side} trade instructions for each position change'
- from_stage: order_placement
  to_stage: transaction_recording
  data: Trade confirmation details triggering Lot/Position/Transaction entity creation
- from_stage: transaction_recording
  to_stage: portfolio_value_update
  data: Post-trade portfolio totals with updated position values
- from_stage: transaction_recording
  to_stage: tlh_calculation
  data: Lot records with cost basis, purchase dates, and wash sale flags for gain/loss
    calculation
global_contracts:
- contract: Every prices stored as float with 2 decimal precision via Tradier API
  evidence: src/Api/Rebalancer.php:208
- contract: RebalancerQueue status must be STATUS_BUY or STATUS_SELL string constants
  evidence: src/Entity/RebalancerQueue.php:61-62
- contract: Lot.isShortTerm() returns true if holding period <= 365 days (IRS short-term
    capital gains threshold)
  evidence: src/Entity/Lot.php:485-495
- contract: ClientPortfolioValue.model_deviation hardcoded to 4 after rebalance completes
  evidence: src/Api/Rebalancer.php:179
- contract: Transaction status must be one of STATUS_IN_PROGRESS|STATUS_PLACED|STATUS_VERIFIED|STATUS_NOT_POSTED
  evidence: src/Entity/Transaction.php:62-65,314
- contract: Rebalancer price diff thresholds at 0.85 (buy) and 1.15 (sell) with risk
    tolerance modifier
  evidence: src/Api/Trade.php:47-67
business_decisions:
- id: BD-001
  type: B/BA
  content: Price diff calculation uses new_price / old_price ratio (not absolute change)
    with 0.85/1.15 threshold bands
  rationale: Using ratio instead of absolute change normalizes behavior across $10
    and $1000 assets. This ensures consistent rebalancing triggers. Breaks if assets
    have different quoting conventions or if threshold should be absolute dollar amounts.
  evidence: N/A:0(see_rationale)
  stage: price_analysis
  alternative_considered: Absolute price change (rejected - inconsistent across price
    levels)
- id: BD-002
  type: B/BA
  content: Buy threshold at 0.85 (15% decline) and sell threshold at 1.15 (15% gain)
    with risk tolerance modifier
  rationale: Thresholds are business parameters affecting trading frequency and costs.
    Risk tolerance from ClientQuestionnaireAnswer points adds personalized buffer.
    Breaks if client risk profile changes or if trading cost assumptions change.
  evidence: N/A:0(see_rationale)
  stage: rebalance_decision
  alternative_considered: Dynamic bands based on volatility, momentum-based thresholds
- id: BD-003
  type: B/DK
  content: Market orders with day duration submitted at current price
  rationale: Day orders provide certainty of execution window while market orders
    guarantee fill. Breaks if after-hours trading is needed or if limit orders required
    for volatile securities.
  evidence: N/A:0(see_rationale)
  stage: order_placement
  alternative_considered: Limit orders, stop-limit orders
- id: BD-004
  type: BA/DK
  content: Account ID prefixed with 'VA' for Vision Access custodian format
  rationale: Hardcoded custodian-specific prefix enables direct Tradier integration.
    Breaks if new custodian has different naming format or if migrating to non-VA
    accounts.
  evidence: src/Api/Trade.php:89(setAccountNumber)
  stage: order_placement
  alternative_considered: Configurable account prefix per custodian
- id: BD-005
  type: B/BA
  content: 'Five rebalance types: FULL(0), REQUIRED_CASH(1), FULL_AND_TLH(2), NO_ACTIONS(3),
    INITIAL(4)'
  rationale: Rebalance type drives which portfolio value (investableCash vs totalValue)
    is used for trading. Breaks if new rebalance scenarios needed or if type semantics
    change.
  evidence: N/A:0(see_rationale)
  stage: job_management
- id: BD-006
  type: B
  content: Rebalancer.rebalance() processes each actions then flushes once at end
    (no per-order transaction)
  rationale: Single flush at end improves performance but creates inconsistent state
    risk on partial failure. Breaks if order 3 of 10 fails - orders 1-2 already committed.
  evidence: N/A:0(see_rationale)
  stage: rebalance_decision
  alternative_considered: Per-order transactions, batch with full rollback
- id: BD-007
  type: RC
  content: Lot.isShortTerm() returns true if holding period <= 365 days from initial
    purchase date
  rationale: 365-day threshold is mandated by IRS code for long-term capital gains
    qualification. Changing would cause incorrect tax treatment and potential penalties.
  evidence: N/A:0(see_rationale)
  stage: transaction_recording
- id: BD-008
  type: M/BA
  content: 'TLH savings formula: (short_term_losses * tax_rate) + (long_term_losses
    * 0.15) - costs'
  rationale: Formula combines short-term and long-term loss deductions at different
    rates. 15% long-term rate reflects pre-TCJA assumption. Breaks if tax rates change
    or if wash sale rules apply.
  evidence: src/Manager/RebalancerQueueManager.php:87(prepareSummary comment)
  stage: tlh_calculation
- id: BD-009
  type: BA/M
  content: Risk tolerance computed from ClientQuestionnaireAnswer points at 1% per
    point added to threshold
  rationale: 'Business rule encoded in calculation: each questionnaire point adds
    1% to threshold buffer. Breaks if questionnaire changes or if mapping formula
    modified.'
  evidence: N/A:0(see_rationale)
  stage: rebalance_decision
- id: BD-010
  type: BA
  content: RebalancerQueue has is_deleted flag for soft delete to preserve audit trail
  rationale: Soft delete pattern maintains history for compliance. Breaks if hard
    delete implemented or if is_deleted logic missing in queries.
  evidence: src/Entity/RebalancerQueue.php:59(is_deleted field)
  stage: tlh_calculation
  alternative_considered: Hard delete with separate history table
- id: BD-011
  type: BA/DK
  content: New Lot+Position created per buy() regardless of existing holdings
  rationale: Per-purchase lot creation enables precise tax lot tracking. Breaks if
    specific lot identification required or if FIFO not desired.
  evidence: N/A:0(see_rationale)
  stage: transaction_recording
  alternative_considered: Pooled lots, LIFO, Highest Cost
- id: BD-012
  type: BA
  content: Lot created with costBasisKnown=true and washSale=false flags in sell()
  rationale: Flags enable wash sale detection and cost basis tracking. Breaks if flags
    not set correctly or if wash sale rules triggered.
  evidence: N/A:0(see_rationale)
  stage: transaction_recording
- id: BD-013
  type: DK
  content: Wash sale default is false in Lot entity construction
  rationale: Default assumes clean lot; wash sale flag must be set when triggered
    by related security purchase. Breaks if flag not managed across 30-day windows.
  evidence: N/A:0(see_rationale)
  stage: transaction_recording
- id: BD-014
  type: BA
  content: SecurityPrice entity with datetime, is_current, source fields for price
    history
  rationale: Price history enables backtracking and audit. is_current flag ensures
    single current price. Breaks if source not recorded or if historical queries missing
    is_current filter.
  evidence: N/A:0(see_rationale)
  stage: price_collection
- id: BD-015
  type: B/BA
  content: Fetch latest 2 prices per security to compute price diff in single query
  rationale: Two-price fetch enables ratio calculation. Breaks if price history gaps
    exist or if initial purchase has no old price.
  evidence: src/Api/BaseRebalancer.php:107(getPricesDiff)
  stage: price_collection
  alternative_considered: Fetch each prices and sort, use closing price from prior
    day
- id: BD-016
  type: B
  content: Tradier API used for price fetching with credentials from RiaCompanyInformation
  rationale: Multi-broker requires credential migration per RIA. Breaks if Tradier
    changes API or if new broker lacks Tradier-compatible structure.
  evidence: N/A:0(see_rationale)
  stage: price_collection
  alternative_considered: Alpaca, Interactive Brokers
- id: BD-017
  type: BA/M
  content: Portfolio value snapshot (ClientPortfolioValue) with model_deviation=4
