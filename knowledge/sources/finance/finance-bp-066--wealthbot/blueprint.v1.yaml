- id: res-slot-001
  type: replaceable_component
  name: mailer_transport
  path: null
  description: Use SendGrid if volume > 500/day; stay with SwiftMailer/SMTP for low-volume
    setups
  used_in_stages: []
  options:
  - name: SwiftMailer (SMTP)
    traits:
    - smtp
    - legacy
    - database spool
    fit_for:
    - Direct SMTP relay; simple deployments
    not_fit_for:
    - High-volume transactional email; advanced analytics
  - name: SendGrid
    traits:
    - cloud
    - rest-api
    - high-deliverability
    - analytics
    fit_for:
    - High-volume transactional email, marketing
    not_fit_for:
    - Simple one-off deployments without third-party SDK
  - name: Amazon SES
    traits:
    - cloud
    - smtp-or-api
    - cost-effective
    fit_for:
    - AWS infrastructure, high volume
    not_fit_for:
    - Non-AWS deployments
