  alternative_considered: Only dollar variance, squared deviation (variance)
- id: BD-074
  type: M/BA
  content: Investment gain = ending value - beginning value - contributions + withdrawals
    (additive return decomposition)
  rationale: 'Named method: Additive Return Decomposition. return = ending - beginning
    - contributions + withdrawals. Assumes cash flows occur at period boundaries.
    Precision impact: timing of cash flows significantly affects returns.'
  evidence: N/A:0(see_rationale)
  stage: tlh_calculation
  alternative_considered: Simple end-to-end return, modified Dietz method
- id: BD-075
  type: T
  content: Minimum fee floor enforcement using max(billingSpec.getMinimalFee(), feeValue)
  rationale: Ceiling/Floor Clipping. Simple threshold check; not a named mathematical
    theory. Ensures fee is not below minimum viable amount. Does not affect precision
    of fee calculation itself.
  evidence: N/A:0(see_rationale)
  stage: tlh_calculation
  alternative_considered: No floor, maximum fee cap
- id: BD-076
  type: M/DK/BA
  content: 'Tax-Loss Harvesting Benefit Estimation: shortTermLosses * taxRate + (longTermLosses
    * 0.15 - costs) / beginningBalance'
  rationale: 'Named method: Tax-Loss Harvesting Benefit Estimation. Uses estimatedIncomeTax
    for short-term and 0.15 fixed rate for long-term. Assumes marginal tax rates apply
    and losses offset gains at same rates. Domain knowledge: US capital gains tax
    structure. Precision impact: rate assumptions significantly affect benefit projections.'
  evidence: N/A:0(see_rationale)
  stage: tlh_calculation
  alternative_considered: Full tax rate on each losses, marginal rate only
- id: BD-077
  type: T
  content: Security allocation aggregation by subclass using SUM and current price
    with is_current=1 filter
  rationale: Grouped Aggregation with Current Valuation. SQL SUM with GROUP BY subclass_id,
    join on security_prices.is_current = 1. Implementation choice; standard aggregation.
    Not a named mathematical theory.
  evidence: N/A:0(see_rationale)
  stage: tlh_calculation
  alternative_considered: Historical cost basis, FIFO valuation
- id: BD-078
  type: T
  content: Commission range extracted as min/max from model security assignments
  rationale: Range Statistics (Min/Max). Simple min/max extraction; not a named mathematical
    theory. Basic descriptive statistics.
  evidence: N/A:0(see_rationale)
  stage: Fee Cloning
  alternative_considered: Average commission, median, mode
- id: BD-079
  type: T
  content: Portfolio total value = latest ClientPortfolioValue or sum of ClientAccount
    values fallback chain
  rationale: 'Fallback Valuation Chain. Priority: cached snapshot, then live calculation.
    Implementation choice for performance vs accuracy tradeoff. Not a named mathematical
    theory.'
  evidence: N/A:0(see_rationale)
  stage: Valuation
  alternative_considered: Always use current holdings, always use stored snapshots
- id: BD-080
  type: T
  content: Risk rating adjustment when deleting model parent (child ratings decrement
    if above parent)
  rationale: 'Discrete Level Adjustment. If riskRating > parentRiskRating: child.riskRating
    - 1. Maintains rating hierarchy integrity. Implementation choice; not a named
    mathematical theory.'
  evidence: N/A:0(see_rationale)
  stage: job_management
  alternative_considered: Reclassify each children, no adjustment
- id: BD-081
  type: M/BA
  content: Billing sum calculation using average account values and day count (Time-Weighted
    Average Billing)
  rationale: 'Named method: Time-Weighted Average Billing (TWAB). Uses avg_value,
    count_values (days), dayInPeriod. Assumes account values recorded daily and linear
    fee accumulation. TWAB is a recognized performance measurement method adapted
    for billing.'
  evidence: N/A:0(see_rationale)
  stage: Billing
  alternative_considered: Ending value billing, high-water mark
- id: BD-082
  type: T
  content: Random color generation for allocation chart using mt_rand and hex conversion
  rationale: Pseudo-Random Color Mapping with mt_srand(0xFFFF) seed. Repeatable colors
    for same data (seeded). Pure presentation/UI concern; no business logic impact.
  evidence: N/A:0(see_rationale)
  stage: Presentation
  alternative_considered: Fixed color palette, deterministic hash-based colors
- id: BD-083
  type: T
  content: Account cash calculation as sum of free cash across each accounts before
    date
  rationale: 'Cumulative Cash Sum. foreach accounts: sum += getFreeCashBeforeDate.
    Simple aggregation; not a named mathematical theory. Assumes accounts are independent
    and cash is fungible.'
  evidence: N/A:0(see_rationale)
  stage: job_management
  alternative_considered: Per-account calculation only, weighted average
