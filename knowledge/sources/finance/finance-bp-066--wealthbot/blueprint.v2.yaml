resources:
- id: res-slot-001
  type: replaceable_component
  name: brokerage_api
  path: null
  description: Choose based on market coverage needs (US-only vs international), trading
    complexity, and API documentation quality
  used_in_stages: []
  options:
  - name: Tradier
    traits:
    - brokerage
    - broker-dealer
    - market-data
    - trading
    fit_for:
    - Full-service brokerage with built-in market data, order execution, and account
      management for US equities
    not_fit_for:
    - Non-US markets, crypto, options-heavy trading, institutional use cases
  - name: Alpaca
    traits:
    - brokerage
    - commission-free
    - market-data
    - trading
    fit_for:
    - Commission-free US equity trading with real-time market data, good for retail-focused
      applications
    not_fit_for:
    - International markets, complex options, managed accounts
  - name: Interactive Brokers
    traits:
    - brokerage
    - multi-market
    - professional-grade
    - trading
    fit_for:
    - Professional trading across stocks, options, futures, forex, and international
      markets
    not_fit_for:
    - Simple retail-focused applications, rapid prototyping
  default: Tradier
  _source: worker_resource
- id: res-slot-002
  type: replaceable_component
  name: electronic_signature
  path: null
  description: Consider pricing model (per-envelope vs subscription), compliance certifications
    needed, template management features, and API ease of use
  used_in_stages: []
  options:
  - name: DocuSign
    traits:
    - e-signature
    - enterprise
    - templates
    - audit-trails
    fit_for:
    - Enterprise document signing with template management, multi-party workflows,
      and compliance certifications
    not_fit_for:
    - Simple free-tier applications, non-US markets with strict data residency
  - name: HelloSign (Dropbox Sign)
    traits:
    - e-signature
    - developer-friendly
    - api
    fit_for:
    - Developer-friendly e-signature API with competitive pricing and good documentation
    not_fit_for:
    - Large enterprise with complex compliance needs
  - name: Adobe Sign
    traits:
    - e-signature
    - enterprise
    - pdf
    - integration
    fit_for:
    - Deep PDF integration and enterprise Adobe ecosystem integration
    not_fit_for:
    - Non-Adobe workflows, budget-conscious projects
  - name: SignNow
    traits:
    - e-signature
    - api
    - workflows
    fit_for:
    - API-first e-signature service with good workflow automation
    not_fit_for:
    - Large enterprise deployments requiring extensive audit trails
  default: DocuSign
  _source: worker_resource
- id: res-slot-003
  type: replaceable_component
  name: email_transport
  path: null
  description: Consider deliverability needs, analytics requirements, and whether
    async processing is needed
  used_in_stages: []
  options:
  - name: SwiftMailer (current)
    traits:
    - smtp
    - php-native
    - spool
    fit_for:
    - PHP-native mailer with flexible SMTP configuration and spooling options
    not_fit_for:
    - Modern cloud email services, async processing needs
  - name: Symfony Mailer
    traits:
    - smtp
    - php-native
    - modern
    - async
    fit_for:
    - Modern Symfony-native mailer with async support and cloud provider integrations
    not_fit_for:
    - Legacy PHP 7.3 support needs
  - name: SendGrid
    traits:
    - cloud-email
    - api
    - deliverability
    - analytics
    fit_for:
    - Cloud email API with high deliverability, analytics, and templates
    not_fit_for:
    - Self-hosted requirements, strict data residency
  - name: Mailgun
    traits:
    - cloud-email
    - api
    - webhooks
    - analytics
    fit_for:
    - Developer-focused email API with good webhooks and analytics
    not_fit_for:
    - Simple one-way notifications only
  default: SwiftMailer (null://localhost in development)
  _source: worker_resource
- id: res-slot-004
  type: replaceable_component
  name: pdf_generation
  path: null
  description: Consider PDF complexity (CSS3, JavaScript), memory constraints, and
    whether pure-PHP is preferred over binaries
  used_in_stages: []
  options:
  - name: wkhtmltopdf
    traits:
    - binary
    - headless-browser
    - html-to-pdf
    fit_for:
    - Mature HTML-to-PDF conversion using headless browser, good CSS support
    not_fit_for:
    - Complex JavaScript-rendered content, memory-constrained environments
  - name: Dompdf
    traits:
    - php-library
    - html-to-pdf
    - pure-php
    fit_for:
    - Pure PHP PDF generator, no external binaries needed
    not_fit_for:
    - Complex CSS3 layouts, heavy JavaScript content
  - name: Snappy/wkhtmltopdf
    traits:
    - symfony-bundle
    - html-to-pdf
    - wrapper
    fit_for:
    - Symfony bundle wrapper around wkhtmltopdf with easy configuration
    not_fit_for:
    - Non-Symfony projects, complex JavaScript needs
  - name: Chrome headless via HTTP client
    traits:
    - browser-rendering
    - html-to-pdf
    - modern
    fit_for:
    - Modern rendering with full CSS/JS support using headless Chrome
    not_fit_for:
    - Memory-constrained environments, simple static PDFs
  default: Snappy with wkhtmltopdf
  _source: worker_resource
- id: res-slot-005
  type: replaceable_component
  name: database
  path: null
  description: Consider team expertise, required SQL features, and whether Doctrine
    ORM compatibility is critical
  used_in_stages: []
  options:
  - name: MySQL
    traits:
    - relational
    - ACID
    - mature
    - Doctrine-native
    fit_for:
    - Standard LAMP stack, proven reliability, excellent Doctrine ORM support
    not_fit_for:
    - Extreme scale, horizontal sharding needs, JSON-heavy workloads
  - name: MariaDB
    traits:
    - relational
    - MySQL-compatible
    - open-source
    - performance
    fit_for:
    - Drop-in MySQL replacement with better performance and open-source governance
    not_fit_for:
    - Strict Oracle MySQL compatibility requirements
  - name: PostgreSQL
    traits:
    - relational
    - advanced-SQL
    - JSON
    - performance
    fit_for:
    - Advanced SQL features, JSONB for hybrid workloads, strong data integrity
    not_fit_for:
    - Teams familiar with MySQL only, simple CRUD applications
  default: MySQL 5.7+
  _source: worker_resource
- id: res-slot-006
  type: replaceable_component
  name: caching
  path: null
  description: Scale requirements (single vs multi-server), infrastructure complexity
    tolerance
  used_in_stages: []
  options:
  - name: Filesystem Cache
    traits:
    - default
    - no-dependency
    - simple
    fit_for:
    - Development, single-server production with moderate load
    not_fit_for:
    - Multi-server deployments, high-traffic production
  - name: Redis
    traits:
    - in-memory
    - distributed
    - persistent
    - Symfony-native
    fit_for:
    - Production multi-server deployments, session sharing, distributed caching
    not_fit_for:
    - Single-server deployments, minimal infrastructure
  - name: APCu
    traits:
    - in-memory
    - single-server
    - PHP-native
    fit_for:
    - Single-server production with high-performance needs, opcode cache combination
    not_fit_for:
    - Multi-server deployments, memory-constrained environments
  default: Filesystem Cache
  _source: worker_resource
