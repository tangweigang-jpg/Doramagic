- id: BD-082
  type: BA
  content: 'INTERACTION: BD-003 (fee structure: $250 fixed + 10%) × BD-002 (minimum
    trade sizes: $50-$150) → Minimum economically viable trade is $2,500 (breakeven
    point where 10% fee = $250)'
  rationale: The $250 fixed fee component creates an implicit minimum trade size of
    $2,500 for economic viability. Trades below this threshold lose money on fees
    alone. This interaction means the explicit $50 minimum trade size (BD-002) is
    economically meaningless for most scenarios. Small rebalancing adjustments within
    the 15% deviation band (BD-068) are likely to be unprofitable. The boundary is
    $2,500 breakeven; below this, the RIA pays to rebalance rather than earns. This
    creates a dead zone where drift exceeds tolerance but trade economics prevent
    correction.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Percentage-only fees would eliminate fixed-cost barrier
    but risk fee erosion on large trades
- id: BD-083
  type: B/BA
  content: 'INTERACTION: BD-057 (365-day short-term threshold) × BD-022 (wash sale
    lot-level tracking) × BD-040 (TLH buy-back flag) → Tax lot age determines both
    gain classification AND wash sale exposure simultaneously'
  rationale: 'The 365-day threshold serves dual purposes: it determines short-term
    vs long-term capital gains classification AND it triggers the 30-day wash sale
    look-forward window. A lot held 340 days has both short-term status AND creates
    wash sale exposure if repurchased. This interaction means TLH harvesting of recent
    lots creates wash sale risk that must be tracked across each lots within 30-day
    windows. The boundary compounds: positions approaching 365 days (335-365) are
    highest-value for long-term classification but still subject to wash sale rules.
    Harvesting at wrong time permanently disallows the loss.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Conservative 31-day waiting period before harvest was rejected
    for opportunity cost
- id: BD-084
  type: BA
  content: 'INTERACTION: BD-011 (tolerance bands 2-21% config) ≠ BD-068 (15% hardcoded
    thresholds) → Configurable drift bands don''t match actual rebalancing triggers,
    creating silent override'
  rationale: The RIA configures tolerance bands (2-21% range per asset class) in BD-011,
    but the actual rebalancing triggers use hardcoded 15% thresholds in BD-068. This
    means a subclass configured with 5% tolerance band will NOT trigger rebalancing
    until 15% drift occurs. The configuration is silently overridden. The boundary
    is 15% hardcoded override; configurable bands below 15% are ineffective. This
    creates client expectation mismatch where drift exceeds stated tolerance before
    action. The 15% boundary acts as a ceiling on each configured bands, making tighter
    bands meaningless.
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Dynamic thresholds based on volatility were considered but
    complexity outweighed benefits
- id: BD-085
  type: RC
  content: 'INTERACTION: BD-080 (hardcoded API key fallback) undermines BD-076 (BaseVoter
    authorization pattern) → Security bypass negates authorization contract for fallback
    scenarios'
  rationale: 'The BaseVoter pattern (BD-076) enforces OWNER/OPERATOR attributes for
    authorization decisions, creating a security contract. However, BD-080 provides
    a hardcoded fallback API key (raiden@wealthbot.io) that bypasses normal credential
    management. When the fallback activates, privileged operations execute under a
    known account regardless of actual authorization state. This creates a contradiction:
    authorization checks pass for the fallback account without proper role verification.
    The boundary is fallback activation bypassing voter checks; this occurs silently
    when API keys are misconfigured. Production use of fallback credentials creates
    regulatory exposure and audit trail gaps.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Mandatory proper API key configuration was rejected to prevent
    startup failures
- id: BD-086
  type: B/BA
  content: 'RISK CASCADE: BD-021 (TLH threshold) → BD-061 (TLH savings formula) →
    BD-059 (cash flow TWR) → BD-052 (annualized TWR) → BD-064 (portfolio value) →
    BD-048 (period-end billing) → BD-066 (billing sum) → BD-060 (min fee floor) →
    BD-019 (min billing fee)'
  rationale: 'Starting with TLH threshold configuration (BD-021), the estimated savings
    use differential tax rates (BD-061). These cash flow impacts flow into TWR calculation
    (BD-059), affecting annualized performance (BD-052). Portfolio value (BD-064)
    depends on cached or summed account values. Period-end valuation (BD-048) determines
    billing basis. Billing sums (BD-066) use averages and day counts. The minimum
    fee floor (BD-060) and minimum billing fee (BD-019) create a floor. This cascade
    means incorrect TLH savings estimates can cause: (1) overstatement of performance,
    (2) incorrect fee billing, (3) client dissatisfaction. The failure mode: TLH thresholds
    too low cause excessive trading with wash sale losses that aren''t captured in
    savings estimates.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Separate TLH tracking from billing was rejected for integration
    complexity
- id: BD-087
  type: BA
  content: 'RISK CASCADE: BD-068 (15% threshold) + BD-011 (2-21% bands) + BD-003 ($250
    fixed fee) + BD-002 ($50 min trades) → Dead zone where drift exceeds tolerance
    but trades are uneconomical'
  rationale: 'Drift exceeds configured tolerance band (BD-011) at 2-21% depending
    on configuration. Rebalancing triggers at 15% hardcoded threshold (BD-068). However,
    economically viable trades require $2,500 minimum (BD-003). Small accounts or
    minor rebalancing needs may not meet this threshold. The cascade: configuration
    allows drift → threshold allows drift → fee structure prevents correction → portfolio
    remains out of alignment. For small accounts, this creates permanent drift with
    no resolution path. The boundary is $2,500 trade minimum; accounts below ~$17,000
    (assuming 15% drift) cannot economically rebalance. Client sees persistent drift
    despite system detecting it.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Account-size-adjusted thresholds were considered but complexity
    outweighed benefits
- id: BD-088
  type: B/BA
  content: 'HIDDEN DEPENDENCY: BD-052 (annualized TWR) depends on BD-059 (investment
    gain) which depends on BD-064 (portfolio value) which has implicit settlement
    date dependency without explicit day count convention'
  rationale: 'The TWR calculation (BD-052) requires accurate investment gain (BD-059),
    which requires portfolio values (BD-064). Portfolio values depend on positions
    at specific dates, but the audit found no explicit settlement date convention
    (T+N) or day count convention (act/360, 30/360). Without these, the date arithmetic
    in the calculation chain may be inconsistent across custodians or time periods.
    The boundary is explicit date convention; without it, intervals may be calculated
    differently. This creates silent inconsistency in TWR for: (1) accounts with different
    settlement cycles, (2) months with different day counts, (3) years with leap days.
    TWR comparisons across periods may be comparing inconsistent calculations.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Forcing each calculations to calendar days was rejected
    for not matching industry conventions
- id: BD-089
  type: B/BA
  content: 'INTERACTION: BD-045 (qualified vs non-qualified segregation) × BD-025
    (municipal substitution) × BD-057 (365-day threshold) → Tax-aware model decisions
    require coordinated lot tracking across account types'
  rationale: 'Qualified accounts (401k, IRA) and non-qualified accounts require separate
    modeling (BD-045). Municipal bond substitution (BD-025) is only relevant for taxable
    accounts. The 365-day threshold (BD-057) determines long-term vs short-term gains
    differently based on account type (qualified accounts may have different tax treatment).
    These three decisions interact when determining which securities belong in which
    accounts. The boundary is account-type-dependent tax treatment; ignoring this
    causes: (1) municipal bonds in qualified accounts (suboptimal), (2) short-term
    trades in taxable accounts (higher tax), (3) lot selection without tax awareness
    across accounts. Coordinated lot tracking across account types is required for
    household-level tax optimization (BD-049).'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Automatic account classification was rejected for client
    preference override capability
- id: BD-090
  type: BA
  content: 'INTERACTION: BD-023 (managed level: household/account) × BD-049 (household
    rebalancing) × BD-031 (trade recon grouping by account/subclass/security) → Household
    aggregation creates reconciliation complexity that single-account grouping doesn''t
    capture'
  rationale: 'Household-level managed accounts (BD-023) aggregate across accounts
    for rebalancing (BD-049). Trade reconciliation groups by account, subclass, security
    (BD-031). When household rebalancing executes cross-account trades (selling in
    one account, buying in another), the reconciliation grouping creates mismatches:
    individual account positions may appear correct while household allocation is
    not. The boundary is cross-account reconciliation; the grouping by account alone
    doesn''t capture net household positions. This means household rebalancing can
    produce: (1) individual accounts appearing balanced while household is not, (2)
    cross-account trades requiring manual reconciliation, (3) tax lot optimization
    that spans accounts but recon doesn''t aggregate properly. The household-level
    view may show drift while account-level shows none.'
  evidence: N/A:0(see_rationale)
  stage: global
  alternative_considered: Household-level recon grouping was considered but would
    require significant recon system changes
