id: finance-bp-066
name: wealthbot.io
sop_version: '3.6'
source:
  projects:
  - wealthbot
  commit_hash: 0f9738aa2c5b72b58777b65bc2fc1039cccae88e
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Automated portfolio rebalancing and wealth management
  description: Open source wealth management platform that automates portfolio rebalancing,
    tax loss harvesting, and trade execution for registered investment advisors (RIAs)
    serving mass affluent clients
  prerequisites: Users need understanding of portfolio management, tax-advantaged
    investing, and brokerage API integration. Requires Tradier API credentials for
    live trading or sandbox environment for testing.
  not_suitable_for: High-frequency trading strategies, non-US markets without Tradier
    support, real-time streaming price feeds, direct integration with custodians other
    than Tradier
stages:
- id: price_collection
  name: Price Collection
  order: 1
  responsibility: Fetch and store current security prices from Tradier API; ensures
    each securities have latest market prices for portfolio valuation
  interface:
    inputs:
    - name: security_entities
      description: Every tradable securities from client portfolios
    outputs:
    - name: security_price_records
      description: SecurityPrice records with datetime, price, source='tradier', and
        is_current flag
  required_methods:
  - name: Rebalancer.updateSecurities
    description: Fetches current prices for each securities from Tradier API and updates
      local records
    evidence: src/Api/Rebalancer.php:19(implements updateSecurities)
  - name: BaseRebalancer.getPricesDiff
    description: Retrieves the 2 most recent prices for each security to calculate
      price change ratio
    evidence: src/Api/BaseRebalancer.php:107(getPricesDiff)
  - name: Rebalancer.setIsCurrent
    description: Marks only the most recent price record as current (is_current=true)
    evidence: src/Api/Rebalancer.php:207(setIsCurrent)
  key_behaviors:
  - behavior: Entity-level price isolation
    description: Each security maintains its own price history independently, enabling
      per-security price tracking
    evidence: src/Entity/SecurityPrice.php:9(SecurityPrice entity)
  - behavior: Current/Historical price separation
    description: Only the most recent price is marked as is_current=true; older records
      serve as historical reference for change calculations
    evidence: src/Api/Rebalancer.php:207(setIsCurrent)
  - behavior: Dual price retention
    description: Stores both current and previous prices by fetching 2 most recent
      records, enabling price/old_price ratio calculation
    evidence: src/Api/BaseRebalancer.php:107(getPricesDiff)
  replaceable_points:
  - name: price_source
    description: External price data provider for fetching security prices
    options:
    - name: tradier
      traits:
      - REST API
      - US equities focus
      - Real-time quotes
      fit_for:
      - US-based RIAs
      - Equity portfolios
      - Production trading
      not_fit_for:
      - International markets
      - Cryptocurrency
      - Fixed income heavy portfolios
    - name: alpaca
      traits:
      - REST API
      - Commission-free trading
      - US equities
      fit_for:
      - Cost-sensitive implementations
      - Simple equity portfolios
      not_fit_for:
      - Multi-custodian setups
      - Complex option strategies
    - name: custom
      traits:
      - User-implemented adapter
      - Full flexibility
      fit_for:
      - Proprietary data sources
      - Non-standard securities
      - Custom pricing models
      not_fit_for:
      - Standard implementations
      - Quick deployments
    default: tradier
  design_decisions:
  - 'Store both current and previous prices by fetching 2 most recent records (evidence:
    src/Api/BaseRebalancer.php:107(getPricesDiff)) — Enables price change calculation;
    compares price/old_price ratio to determine buy/sell actions'
  - 'Mark only most recent price as is_current=true (evidence: src/Api/Rebalancer.php:207(setIsCurrent))
    — Maintains single source of truth for latest price; older records serve as historical
    reference'
  acceptance_hints:
  - Security prices successfully fetched from Tradier API
  - prices_diff correctly calculated as current_price/old_price ratio
  - Only one SecurityPrice per security marked as is_current=true
  - API gateway correctly resolves to https://api.tradier.com/
- id: portfolio_analysis
  name: Portfolio Analysis
  order: 2
  responsibility: Calculate portfolio value, model deviation, and determine required
    rebalancing actions based on target allocations
  interface:
    inputs:
    - name: ce_model
      description: CeModel entity containing target allocation (modelEntities with
        percent, securityAssignment, taxLossHarvesting flags)
    - name: client_portfolio
      description: ClientPortfolio with current holdings
    - name: client_portfolio_value
      description: Current portfolio valuation data
    - name: security_prices
      description: SecurityPrice records from price collection stage
    outputs:
    - name: rebalancer_action_queue
      description: 'RebalancerAction queue with job tracking (type: REQUIRED_CASH,
        FULL_AND_TLH, NO_ACTIONS, INITIAL)'
  required_methods:
  - name: CeModel.getModelEntities
    description: Retrieves target allocation entities with percent, securityAssignment,
      and tax_loss_harvesting flags
    evidence: src/Entity/CeModel.php:16(CeModel class)
  - name: Rebalancer.updatePortfolioValues
    description: Calculates post-rebalance portfolio value and creates ClientPortfolioValue
      record
    evidence: src/Api/Rebalancer.php:165(updatePortfolioValues)
  - name: Job.getRebalanceType
    description: Returns rebalance type constant (FULL_AND_TLH, REQUIRED_CASH, etc.)
      to determine processing strategy
    evidence: src/Entity/Job.php:56(const REBALANCE_TYPE_*)
  key_behaviors:
  - behavior: Risk tolerance calculation from client questionnaire
    description: Risk tolerance (point) calculated as (sum of answers / 100) + 1,
      affecting threshold comparison and rebalancing aggressiveness
    evidence: src/Api/Rebalancer.php:39(point calculation)
  - behavior: Model deviation comparison against threshold
    description: Compares current allocation deviation against 4% threshold to determine
      if rebalancing is required
    evidence: src/Api/Rebalancer.php:179(setModelDeviation)
  - behavior: Rebalance type classification via integer constants
    description: Type-safe enum pattern using integer constants (REQUIRED_CASH=1,
      FULL_AND_TLH=2) allows switch statements without string comparisons
    evidence: src/Entity/Job.php:56-60(REBALANCE_TYPE_*)
  replaceable_points:
  - name: rebalance_type
    description: Rebalancing strategy determining which actions are taken
    options:
    - name: REQUIRED_CASH
      traits:
      - Minimal intervention
      - Cash-only flows
      fit_for:
      - Income distributions
      - Recurring withdrawals
      - Minimal trading
      not_fit_for:
      - Full rebalancing needed
      - Tax loss harvesting desired
    - name: FULL_AND_TLH
      traits:
      - Complete rebalance
      - Tax optimization
      fit_for:
      - Periodic rebalancing
      - Taxable accounts
      - Long-term investors
      not_fit_for:
      - Tax-advantaged accounts only
      - Minimal trading preference
    - name: NO_ACTIONS
      traits:
      - Read-only
      - Analysis only
      fit_for:
      - Portfolio review
      - Reporting periods
      - Simulation mode
      not_fit_for:
      - Active management
      - Trade execution required
    - name: INITIAL
      traits:
      - First-time allocation
      - Account setup
      fit_for:
      - New accounts
      - Model deployment
      - Initial funding
      not_fit_for:
      - Existing portfolios
      - Recurring rebalancing
    default: FULL_AND_TLH
  design_decisions:
  - 'Rebalance types encoded as integer constants in Job entity (evidence: src/Entity/Job.php:56(const
    REBALANCE_TYPE_REQUIRED_CASH)) — Type-safe enum pattern; allows switch on rebalance_type
    without string comparisons'
  - 'Risk tolerance calculated from client questionnaire answers (evidence: src/Api/Rebalancer.php:39(point
    calculation)) — Adjusts rebalancing aggressiveness: point = (sum answers / 100)
    + 1 affects threshold comparison'
  - 'Model deviation hardcoded to 4% (evidence: src/Api/Rebalancer.php:179(setModelDeviation))
    — TODO: Should be configurable per RIA; current hardcode limits flexibility for
    different client risk profiles'
  acceptance_hints:
  - Job records created with correct REBALANCE_TYPE constant values
  - CeModel properly referenced with modelEntities containing target percent allocations
  - Model deviation correctly calculated and compared against threshold
  - ClientPortfolioValue records created for each rebalance action
  - getClientAccounts()->first() succeeds without runtime error
- id: trade_decision
  name: Trade Decision Engine
  order: 3
  responsibility: Determine which securities to buy or sell based on price movements
    and risk tolerance thresholds
  interface:
    inputs:
    - name: price_movement_data
      description: Data array containing prices_diff (price change ratio), amounts,
        security_id, percent for each security
    outputs:
    - name: trade_decisions
      description: Buy/sell decisions with symbol, side, quantity, and price for execution
  required_methods:
  - name: Trade.buyOrSell
    description: Main decision logic that evaluates price movements against thresholds
      to determine buy or sell actions
    evidence: src/Api/Trade.php:30(buyOrSell)
  - name: TradeData.getTradeData
    description: Retrieves trade execution parameters including order type, quantity,
      and price
    evidence: src/Model/TradeData.php:7(TradeData class)
  key_behaviors:
  - behavior: Threshold-based trade triggers
    description: Trades triggered when point - prices_diff > 0.15 (15% deviation tolerance
      band); prevents excessive turnover
    evidence: src/Api/Trade.php:47(if point - $datum['prices_diff'] > 0.15)
  - behavior: Risk-adjusted threshold amplification
    description: Higher risk tolerance increases the point value, requiring larger
      deviations to trigger trades; looser thresholds for aggressive portfolios
    evidence: src/Api/Trade.php:44(point = ($point / 100) + 1)
  - behavior: Price movement filtering
    description: Only trades when prices change >15% (prices_diff > 1.15 for sell,
      < 0.85 for buy); no action when prices_diff between 0.85-1.15
    evidence: src/Api/Trade.php:48-55(prices_diff comparison)
  replaceable_points:
  - name: deviation_threshold
    description: Portfolio drift tolerance before triggering rebalancing actions
    options:
    - name: '0.10'
      traits:
      - Conservative
      - Frequent rebalancing
      fit_for:
      - Low risk tolerance
      - Small accounts
      - Tax-advantaged accounts
      not_fit_for:
      - Taxable accounts with frequent trading concerns
      - Large portfolios with transaction costs
    - name: '0.15'
      traits:
      - Moderate
      - Balanced rebalancing
      fit_for:
      - Standard portfolios
      - Most client profiles
      - Default setting
      not_fit_for:
      - Very conservative or aggressive clients
    - name: '0.20'
      traits:
      - Aggressive
      - Minimal rebalancing
      fit_for:
      - Tax-sensitive accounts
      - Large portfolios
      - Long-term holders
      not_fit_for:
      - Small accounts needing precise allocation
      - Active management
    default: '0.15'
  - name: price_threshold_buy
    description: Price drop threshold to trigger buy actions
    options:
    - name: '0.85'
      traits:
      - Moderate drop
      - 15% decline triggers buy
      fit_for:
      - Standard tax loss harvesting
      - Value investing
      not_fit_for:
      - Volatile securities
      - Small caps
    - name: '0.80'
      traits:
      - Larger drop
      - 20% decline triggers buy
      fit_for:
      - Defensive strategies
      - High volatility securities
      not_fit_for:
      - Active rebalancing
      - Low volatility portfolios
    - name: '0.75'
      traits:
      - Significant drop
      - 25% decline triggers buy
      fit_for:
      - Deep value
      - Contrarian strategies
      not_fit_for:
      - Most standard portfolios
      - Tax loss harvesting focus
    default: '0.85'
  - name: price_threshold_sell
    description: Price rise threshold to trigger sell actions
    options:
    - name: '1.15'
      traits:
      - Moderate rise
      - 15% gain triggers sell
      fit_for:
      - Standard rebalancing
      - Tax efficient
      not_fit_for:
      - Momentum strategies
      - Strong bull markets
    - name: '1.20'
      traits:
      - Larger rise
      - 20% gain triggers sell
      fit_for:
      - Growth portfolios
      - Lower turnover preference
      not_fit_for:
      - Rebalancing needs
      - Value strategies
    - name: '1.25'
      traits:
      - Significant rise
      - 25% gain triggers sell
      fit_for:
      - Long-term holding
      - Momentum strategies
      not_fit_for:
      - Active rebalancing
      - Risk management focus
    default: '1.15'
  design_decisions:
  - 'Hardcoded 15% deviation threshold: point - prices_diff > 0.15 triggers action
    (evidence: src/Api/Trade.php:47(if point - $datum[''prices_diff''] > 0.15)) —
    Determines if portfolio drift warrants rebalancing; 0.15 = 15% tolerance band'
  - 'Hardcoded 1.15/0.85 price thresholds for sell/buy triggers (evidence: src/Api/Trade.php:48(if
    $datum[''prices_diff''] > 1.15)) — Prices must change >15% to trigger trades;
    prevents excessive turnover in volatile markets'
  - 'Risk tolerance amplifies threshold: higher risk = looser threshold (evidence:
    src/Api/Trade.php:44(point = ($point / 100) + 1)) — Higher risk portfolios have
    larger point values, requiring larger deviations to trigger trades'
  - 'No-op when prices_diff between 0.85-1.15 (evidence: src/Api/Trade.php:55(do nothing,
    keep assets)) — Avoids transaction costs; only trades when meaningful price movement'
  acceptance_hints:
  - buyOrSell returns correct buy/sell decisions based on price movements
  - 'Deviation threshold correctly applied: point - prices_diff > 0.15 triggers action'
  - 'Price thresholds correctly applied: prices_diff > 1.15 for sell, < 0.85 for buy'
  - Risk tolerance point correctly calculated and applied to threshold
  - No unnecessary trades when prices within 0.85-1.15 band
- id: trade_execution
  name: Trade Execution
  order: 4
  responsibility: Place orders via Tradier API and record resulting transactions,
    lots, and positions
  interface:
    inputs:
    - name: trade_decisions
      description: Trade decisions with symbol, side, quantity, price from trade decision
        engine
    outputs:
    - name: transaction_records
      description: Transaction, Lot, Position records persisted to database with cost
        basis and wash sale tracking
  required_methods:
  - name: Requests.placeOrder
    description: POSTs order to Tradier API with symbol, side, quantity, order type,
      and duration
    evidence: src/Api/Requests.php:103(placeOrder)
  - name: Trade.buy
    description: Executes buy order and persists new Lot and Position records with
      cost basis
    evidence: src/Api/Trade.php:161(buy)
  - name: Trade.sell
    description: Executes sell order with wash sale tracking and updates existing
      Position records
    evidence: src/Api/Trade.php:81(sell)
  key_behaviors:
  - behavior: Market order with day duration
    description: Orders use type=market and duration=day; ensures orders fill at reasonable
      prices and expire if not filled same day
    evidence: src/Api/Requests.php:106(type=market&duration=day)
  - behavior: Tax lot accounting per purchase
    description: New Lot/Position created on each buy; maintains complete audit trail
      and enables tax lot accounting
    evidence: src/Api/Trade.php:191(new Lot/new Position)
  - behavior: Wash sale tracking
    description: Sell operations track wash sale eligibility flag; current implementation
      hardcodes wash_sale=false (incomplete)
    evidence: src/Api/Trade.php:130(setWashSale(false))
  - behavior: Position aggregation from lots
    description: Position entity aggregates multiple lots for same account+security+date,
      providing consolidated view
    evidence: 'src/Entity/Position.php:10(comment: aggregates from lots)'
  replaceable_points:
  - name: order_type
    description: Order type sent to broker for execution
    options:
    - name: market
      traits:
      - Immediate execution
      - Best effort pricing
      fit_for:
      - Liquid securities
      - Standard rebalancing
      - Time-sensitive orders
      not_fit_for:
      - Illiquid securities
      - Limit pricing needed
      - Stop-loss requirements
    - name: limit
      traits:
      - Price specified
      - May not execute
      fit_for:
      - Price-sensitive trades
      - Illiquid securities
      - Volatile markets
      not_fit_for:
      - Urgent execution
      - Time-sensitive rebalancing
    - name: stop
      traits:
      - Trigger-based
      - Conditional execution
      fit_for:
      - Risk management
      - Downside protection
      - Trailing stops
      not_fit_for:
      - Standard rebalancing
      - Predictable execution needed
    default: market
  - name: duration
    description: Order time-in-force determining how long order remains active
    options:
    - name: day
      traits:
      - Same-day only
      - Auto-cancel EOD
      fit_for:
      - Intraday rebalancing
      - Current market conditions
      - Simple orders
      not_fit_for:
      - Waiting for specific conditions
      - Extended timelines
    - name: gtc
      traits:
      - Good-til-canceled
      - Manual cancellation
      fit_for:
      - Limit orders
      - Waiting for price levels
      - Extended execution
      not_fit_for:
      - Quick rebalancing
      - Market timing sensitive
    - name: gtc60
      traits:
      - Good-til-canceled 60 days
      - Auto-expire
      fit_for:
      - Longer execution windows
      - Partial fills
      not_fit_for:
      - Short-term rebalancing
      - Rapid market changes
    default: day
  design_decisions:
  - 'Market orders with day duration and stop price set to current price (evidence:
    src/Api/Requests.php:106(type=market&duration=day)) — Simplifies execution; ensures
    orders fill at reasonable prices; expires if not filled same day'
  - 'New Lot/Position created on each buy (evidence: src/Api/Trade.php:191(new Lot/new
    Position)) — Maintains complete audit trail; enables tax lot accounting and wash
    sale tracking'
  - 'Cost basis recorded at purchase price (evidence: src/Api/Trade.php:208(setCostBasis))
    — Required for gain/loss calculations; wash sale flag set to false (enabled later)'
  - 'Hardcoded wash sale=false (evidence: src/Api/Trade.php:130(setWashSale(false)))
    — TODO: Should detect wash sale violations (buy/sell within 30 days); current
    implementation is incomplete'
  - 'TransactionType created dynamically per trade (evidence: src/Api/Trade.php:99(new
    TransactionType)) — Should use existing TransactionType records; creating duplicates
    wastes database rows'
  acceptance_hints:
  - Orders correctly POSTed to Tradier API endpoint
  - Lot records created with correct cost_basis on buys
  - Position aggregates multiple lots per account+security
  - Transaction records persisted with correct side and quantity
  - Account numbers correctly prefixed with 'VA' for broker integration
  - Security symbols used as primary identifier in API calls
- id: portfolio_value_update
  name: Portfolio Value Update
  order: 5
  responsibility: Record post-trade portfolio valuation for historical tracking and
    billing calculations
  interface:
    inputs:
    - name: client_portfolio
      description: ClientPortfolio entity for which value is being recorded
    - name: post_trade_value
      description: Post-trade total value and each cash component amounts
    outputs:
    - name: client_portfolio_value_record
      description: ClientPortfolioValue snapshot with total_value, sas_cash, cash_buffer,
        billing_cash, model_deviation
  required_methods:
  - name: Rebalancer.updatePortfolioValues
    description: Creates new ClientPortfolioValue record after trade execution with
      each cash components and model deviation
    evidence: src/Api/Rebalancer.php:165(updatePortfolioValues)
  key_behaviors:
  - behavior: Time-series recording per rebalance
    description: New ClientPortfolioValue created per rebalance action, maintaining
      historical record for analysis and billing
    evidence: src/Api/Rebalancer.php:169(new ClientPortfolioValue)
  - behavior: Cash component consolidation
    description: Every cash components (sas_cash, cash_buffer, billing_cash) set equal
      to total value assuming post-trade money market positioning
    evidence: src/Api/Rebalancer.php:171(setTotalCashInMoneyMarket)
  - behavior: Model deviation snapshot
    description: Model deviation recorded at time of value snapshot for historical
      comparison against target allocations
    evidence: src/Api/Rebalancer.php:179(setModelDeviation(4))
  replaceable_points: []
  design_decisions:
  - 'Every cash components set equal to total value (evidence: src/Api/Rebalancer.php:171(setTotalCashInMoneyMarket))
    — Simplified accounting: assumes each cash flows to money market after trades'
  - 'New ClientPortfolioValue created per rebalance (evidence: src/Api/Rebalancer.php:169(new
    ClientPortfolioValue)) — Time-series record for historical analysis and billing;
    enables reconciliation against custodian'
  acceptance_hints:
  - ClientPortfolioValue record created with total_value equal to sum of each cash
    components
  - Model deviation correctly recorded (4% hardcoded)
  - Historical time-series maintained for billing calculations
  - Job status updated with finished_at timestamp and is_error flag set appropriately
data_flow:
- from_stage: price_collection
  to_stage: portfolio_analysis
  data: SecurityPrice records with current/old prices, prices_diff ratios for each
    security
- from_stage: portfolio_analysis
  to_stage: trade_decision
  data: Data array containing prices_diff, amounts, security_id, percent for each
    security needing evaluation
- from_stage: trade_decision
  to_stage: trade_execution
  data: 'Trade decisions: symbol, side, quantity, price for each buy or sell action'
- from_stage: trade_execution
  to_stage: portfolio_value_update
  data: Executed trade confirmation with final amounts, Lot/Position/Transaction records
- from_stage: portfolio_analysis
  to_stage: portfolio_value_update
  data: ClientPortfolio reference and model deviation for value recording
global_contracts:
- contract: Every Rebalancer classes use Tradier API endpoint https://api.tradier.com/
  evidence: src/Api/BaseRebalancer.php:25(apiGateway=https://api.tradier.com/)
- contract: Account numbers prefixed with 'VA' for broker integration
  evidence: src/Api/Rebalancer.php:100(account_id = 'VA' . $accountNumber)
- contract: Security symbols used as primary identifier in external API calls
  evidence: src/Api/Rebalancer.php:102(getSymbol())
- contract: Job status tracked via started_at, finished_at, is_error flags for audit
    trail
  evidence: src/Entity/Job.php:27(started_at), :32(finished_at), :37(is_error)
- contract: Position entity aggregates multiple Lots for same account+security+date
    combination
  evidence: 'src/Entity/Position.php:10(comment: aggregates from lots)'
- contract: 'Rebalance type constants ordered: FULL(0)→REQUIRED_CASH(1)→FULL_AND_TLH(2)→NO_ACTIONS(3)→INITIAL(4)'
  evidence: src/Entity/Job.php:56-60(REBALANCE_TYPE_*)
- contract: 'Client workflow status progression: DEFAULT(0)→ENVELOPE_CREATED(1)→...→ACCOUNT_FUNDED(7)'
  evidence: src/Model/Workflow.php:131-148(CLIENT_STATUS_*)
- contract: Doctrine ORM used for each data access without repository pattern abstraction
  evidence: src/Api/Rebalancer.php:53(findAll())
- contract: Trait composition (Requests, Trade) used for code reuse across Rebalancer
    classes
  evidence: src/Api/Rebalancer.php:21-22(uses Requests, Trade)
business_decisions:
- id: BD-001
  type: B/RC
  content: Trade execution follows strict SELL before BUY ordering within each rebalancer
    action
  rationale: Sell-before-buy ordering prevents cash account overdrafts and ensures
    settlement integrity. The boundary is enforced within each atomic rebalancer action,
    not across separate actions, ensuring each repositioning completes in a logically
    consistent state. This prevents partial executions that could leave accounts in
    unintended positions.
  evidence: src/Entity/RebalancerQueue.php:61(STATUS_SELL)
  stage: trading
  alternative_considered: Allowing interleaved SELL/BUY was rejected due to settlement
    risk
- id: BD-002
  type: B/BA
  content: 'Default minimum trade sizes: $50 buy, $150 initial buy, $50 sell for equity
    securities'
  rationale: Minimum trade sizes prevent fee dilution on small transactions and reduce
    settlement noise. Initial buys require higher minimum ($150) to ensure meaningful
    portfolio establishment. The boundary prevents dust transactions while remaining
    accessible for typical investor contributions. These defaults apply to equity
    securities only.
  evidence: N/A:0(see_rationale)
  stage: trading
  alternative_considered: No minimum was rejected to prevent fee dilution; uniform
    $100 was rejected due to initial purchase barrier
- id: BD-003
  type: B/BA
  content: Security transaction fees include fixed ($250) and percentage (10%) components
  rationale: Dual-component fee structure (fixed + percentage) ensures transaction
    cost recovery on large trades while maintaining minimum fee thresholds. The boundary
    combines $250 fixed cost with 10% variable component to align with typical securities
    processing overhead and regulatory compliance costs.
  evidence: N/A:0(see_rationale)
  stage: trading
  alternative_considered: Percentage-only was rejected for large trade cost recovery
- id: BD-004
  type: B/BA
  content: Redemption penalties apply for 21-day holding period with 15 fixed + 5%
    fee
  rationale: 21-day holding period penalty discourages short-term redemption while
    maintaining reasonable liquidity. The $15 + 5% penalty structure creates meaningful
    friction without being punitive. Boundary is the 21-day threshold; penalties apply
    to redemptions within this window for equity securities.
  evidence: N/A:0(see_rationale)
  stage: trading
  alternative_considered: 30-day standard was rejected as too restrictive; no penalty
    rejected for investor protection
- id: BD-005
  type: RC
  content: Short-term capital gains threshold is 365 days per IRS regulations
  rationale: IRS regulations define short-term vs long-term capital gains classification
    based on holding period. The regulatory boundary is exactly 365 days; assets held
    less than 365 days are short-term gains taxed as ordinary income. This classification
    is mandated by federal tax code.
  evidence: N/A:0(see_rationale)
  stage: tax
  alternative_considered: Alternative holding periods would violate IRS regulations
- id: BD-006
  type: B/BA
  content: Capital gains classification implemented using 365-day threshold in Lot
    entity
  rationale: Implementation boundary applies 365-day threshold to calculate gain/loss
    classification. The system distinguishes short-term from long-term gains at lot
    level for tax lot accounting. Boundary is precisely 365 days to comply with IRS
    holding period requirements.
  evidence: src/Entity/Lot.php:427(getShortTermGain)
  stage: tax
  alternative_considered: FIFO/LIFO selection is separate concern handled by lot selection
    algorithm
- id: BD-007
  type: B/BA
  content: 'Lot status tracking: INITIAL=1, IS_OPEN=2, CLOSED=3, DIVIDED=4'
  rationale: Lot status state machine governs tax lot lifecycle from creation through
    closure. INITIAL represents newly purchased lots awaiting settlement. IS_OPEN
    indicates active holding. CLOSED indicates fully liquidated. DIVIDED enables partial
