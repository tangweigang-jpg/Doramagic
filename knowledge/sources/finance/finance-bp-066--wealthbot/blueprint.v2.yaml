  rationale: After calculating fees through the tiered structure, a minimum fee floor
    is enforced using a max() function that ensures the final fee is never less than
    the configured minimum. This guarantees minimum revenue per account regardless
    of low balances or unusual tier configurations. The floor is applied after tier
    calculation to preserve graduated rate structure while ensuring baseline compensation.
