- id: BD-061
  type: B/BA
  content: Tax Loss Harvesting savings calculation with differential tax rates
  rationale: 'Tax loss harvesting savings are estimated using differential tax rates:
    short-term losses are multiplied by the income tax rate (higher), while long-term
    losses use the 15% capital gains rate (lower). The net benefit is divided by beginning
    balance to express as a basis point improvement. This allows comparison of TLH
    benefits across portfolios of different sizes and supports harvest prioritization
    decisions.'
  evidence: N/A:0(see_rationale)
  stage: RebalancerQueueManager
  alternative_considered: Equal tax rates for both was rejected for inaccuracy given
    different treatment
- id: BD-062
  type: B/DK
  content: Security allocation aggregation by subclass using SUM and current price
  rationale: Positions are aggregated by asset subclass by summing position amounts
    and joining with current prices to compute total market value per subclass. This
    aggregation is fundamental to allocation analysis, drift detection, and rebalancing
    execution. Using current prices ensures market-value-weighted allocation percentages
    reflect real-time values rather than cost basis.
