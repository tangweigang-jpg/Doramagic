- id: BD-065
  type: B
  content: Risk rating adjustment when deleting model parent (child ratings decrement
    if above parent)
  rationale: When a parent model is deleted, child models that have risk ratings higher
    than the deleted parent have their ratings decremented by 1. This prevents orphaned
    child models from having risk ratings that exceed their new top-level ancestor,
    maintaining the hierarchical integrity of the risk rating system. Models with
    ratings at or below the deleted parent are unaffected.
