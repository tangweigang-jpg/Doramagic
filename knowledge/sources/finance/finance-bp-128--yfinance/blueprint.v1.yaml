- id: BD-042
  type: BA
  content: actions=False in download() but actions=True in Ticker.history() - inconsistent
    default across APIs
  rationale: 'download() defaults to actions=False while Ticker.history() defaults
    to actions=True, creating an API inconsistency that leads to unexpected behavior
    for users. This inconsistency means batch downloads omit dividends/splits by default
    while single-ticker access includes them. BOUNDARY: Users performing comparative
    analysis across the two APIs will receive different results for the same underlying
    data, potentially leading to incorrect portfolio analytics or backtesting results
    if the inconsisten'
