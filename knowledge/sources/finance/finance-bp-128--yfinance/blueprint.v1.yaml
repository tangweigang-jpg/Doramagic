- id: BD-041
  type: B/BA
  content: Capital gains double-counting detection - Yahoo pre-adds CG to dividends
    column, breaking Adj Close calculation
  rationale: 'Yahoo Finance pre-adds capital gains to the dividends column, which
    would cause double-counting in adjusted close calculation if not detected and
    corrected. This detection is a critical business rule to ensure adjusted close
    accuracy for tax-lot tracking and accurate historical performance calculations.
    BOUNDARY: Without this fix, capital gains distributions would be counted twice—once
    as part of dividends and again when computing price adjustments—resulting in inflated
    adjusted close values tha'
  evidence: yfinance/scrapers/history.py:1436(_repair_capital_gains)
