- id: BD-044
  type: B/BA
  content: 'INTERACTION: [BD-003] × [BD-005] → Silent data corruption amplified by
    default behavior'
  rationale: BD-003 (Chrome impersonation) enables reliable data retrieval, while
    BD-005 (repair=False default) disables data quality correction. Together they
    create a state where data is fetched successfully but contains uncorrected errors
    (unit mismatches, phantom dividends) with no user indication. The combination
    AMPLIFIES risk because fast retrieval + disabled corrections + no warnings = silent
    propagation of financial calculation errors through user analytics.
  evidence: N/A:0(see_rationale)
  stage: global
- id: BD-045
  type: BA
  content: 'INTERACTION: [BD-055] × [BD-057] → Contradiction: silent failures hide
    API inconsistency consequences'
  rationale: BD-055 (hide_exceptions=True) swallows errors silently, while BD-057
    reveals an inconsistency where download() defaults to actions=False but Ticker.history()
    defaults to actions=True. This CONTRADICTION means users of download() receive
    incomplete data (missing dividends/splits) with no error indication, while the
    same user on Ticker.history() would get different results. The silent failure
    mechanism prevents users from discovering this inconsistency until they notice
    discrepancies in their analytics.
  evidence: N/A:0(see_rationale)
  stage: global
- id: BD-046
  type: B/BA
  content: 'INTERACTION: [BD-053] → [BD-054] → Hidden dependency of multiday interval
    fallback on pipeline ordering'
  rationale: 'BD-053 mandates specific execution order for the price repair pipeline
    (standardize_currency → div_adjust → unit_mixups → stock_splits → capital_gains
    → auto_adjust). BD-054 relies on this order when it auto-fetches 1d data for multiday
    intervals and resamples. This is a HIDDEN DEPENDENCY: if the pipeline order changes,
    BD-054''s resampling fallback could produce incorrect results because each stage
    depends on prior transformations. The dependency is not explicitly documented
    in BD-054''s rationale.'
  evidence: N/A:0(see_rationale)
  stage: global
- id: BD-047
  type: BA
  content: 'INTERACTION: [BD-002] × [BD-055] × [BD-057] → Risk cascade: silent failures
    obscure multiple failure modes'
  rationale: 'Three decisions create a RISK CASCADE: BD-002 hides exceptions in config,
    BD-055 hides debug exceptions, and BD-057 creates API inconsistency. When combined,
    users of download() with actions=False (default) receive silent failures for missing
    dividends AND silent failures for debug-level issues AND no indication that Ticker.history()
    would provide different results. This cascade means multiple failure modes can
    occur simultaneously without any user notification, making debugging nearly impossible
    and allowing incorrect financial data to propagate unchecked.'
  evidence: N/A:0(see_rationale)
  stage: global
- id: BD-048
  type: B/BA
  content: 'INTERACTION: [BD-026] × [BD-027] × [BD-044] → Amplification: 100x unit
    error detection fails when rounding misaligns with multiplier'
  rationale: BD-026 uses median-based 100x detection, BD-027 rounds to nearest 20,
    and BD-044 applies 100x multiplier. When true ratio is 100, rounding to nearest
    20 gives 100 (correct). However, when ratio is 95 (within rounding to 100), BD-027
    rounds to 100, BD-026 detects it as 100x, but BD-044 applies 100x conversion expecting
    exact match. For ratios like 80 (rounded from 85), BD-026 may detect 80x but BD-044
    expects 100x—creating AMPLIFIED failure where three mechanisms should catch errors
    but can miss legitimate unit mismatches outside the 20-bucket alignment.
  evidence: N/A:0(see_rationale)
  stage: global
- id: BD-049
  type: M
  content: 'INTERACTION: [BD-006] × [BD-035] → Redundant depth limits creating potential
    inconsistent enforcement'
  rationale: BD-006 establishes max depth=2 for multi-interval reconstruction while
    BD-035 also establishes maximum 2-level reconstruction depth for price repair.
    These are functionally redundant but defined in different contexts (intervals
    vs repair). This creates a HIDDEN DEPENDENCY where changes to one limit should
    logically apply to the other, but nothing enforces consistency. If a developer
    modifies BD-006 to depth=3 for new interval combinations without updating BD-035,
    inconsistent repair behavior emerges for the same underlying data transformations.
  evidence: N/A:0(see_rationale)
  stage: global
- id: BD-050
  type: B/BA
  content: 'INTERACTION: [BD-046] × [BD-047] → Contradiction: linear ratio and backward
    adjustment produce different historical prices'
  rationale: BD-046 uses linear ratio adjustment in auto_adjust mode, while BD-047
    uses backward adjustment preserving historical price levels. Both claim to produce
    split/dividend-adjusted prices but mathematically produce different results. A
    user enabling auto_adjust expects linear ratio semantics while the backward adjustment
    preserves historical observability. This CONTRADICTION means the same underlying
    data transformed through different modes produces inconsistent adjusted series,
    confusing users about which adjustment is 'correct' for their analytical use case
    (backtesting vs performance attribution).
  evidence: N/A:0(see_rationale)
  stage: global
- id: BD-051
  type: B/BA
  content: 'INTERACTION: [BD-030] × [BD-032] × [BD-043] → Risk cascade: multiple dividend
    thresholds create conflicting flag conditions'
  rationale: BD-030 flags dividends >3.5% of stock price as suspiciously large, BD-032
    flags dividends >8% ratio as potentially phantom, and BD-043 flags implied annualized
    yield >10% as error. These thresholds create a RISK CASCADE where a legitimate
    high-yield security (e.g., REIT at 8% yield) could trigger BD-032 (phantom dividend
    flag) AND BD-043 (implied yield flag) even though the dividend is valid. The cascade
    from multiple flags could incorrectly classify valid data as erroneous, leading
    to incorrect repair or exclusion of legitimate dividends from adjusted price calculations.
  evidence: N/A:0(see_rationale)
  stage: global
