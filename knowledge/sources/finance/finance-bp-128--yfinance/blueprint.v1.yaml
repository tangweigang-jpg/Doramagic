    evidence: yfinance/domain/domain.py:187-195(_ensure_fetched)
  - behavior: Hardcoded sector-industry mapping
    description: SECTOR_INDUSTRY_MAPPING in const.py provides deterministic behavior
      regardless of Yahoo API changes
    evidence: yfinance/const.py:165(SECTOR_INDUSTY_MAPPING)
  replaceable_points:
  - name: data_source
    description: API endpoint for sector/industry data
    options:
    - name: Yahoo Finance
      traits:
      - Default
      - Official
      fit_for:
      - Most use cases
      not_fit_for:
      - Yahoo API downtime
    - name: custom API
      traits:
      - Alternative
      fit_for:
      - Testing
      - Private data
      not_fit_for:
      - Standard Yahoo data
    default: Yahoo Finance
  design_decisions:
  - Abstract base class pattern ensures consistent interface across Domain types (yfinance/domain/domain.py:11)
  - SECTOR_INDUSTRY_MAPPING hardcoded in const.py provides stability against Yahoo
    API changes (yfinance/const.py:165)
  acceptance_hints:
  - Sector data returns expected industries and ETFs
  - Industry data returns expected top companies
  - DataFrames have consistent column structure
- id: screener
  name: Stock Screener
  order: 7
  responsibility: Builds and executes stock screening queries based on financial criteria
    including PE ratio, market cap, and other metrics with composable operator pattern.
  interface:
    inputs:
    - EquityQuery/FundQuery/ETFQuery objects with filter criteria
    outputs:
    - List of matching ticker symbols
  required_methods:
  - name: EquityQuery.add_filter
    description: Adds filter criterion to equity screening query with validation
    evidence: yfinance/screener/query.py:141(class EquityQuery)
  - name: screen
    description: Executes screening query against Yahoo screener API and returns matching
      tickers
    evidence: yfinance/screener/screener.py:64(screen)
  - name: QueryBase.valid_fields
    description: Abstract property defining valid filter fields for query type
    evidence: yfinance/screener/query.py:41(@abstractmethod)
  key_behaviors:
  - behavior: Operator pattern for queries
    description: EQ, IS-IN, BTWN, GT, LT operators enable flexible filtering with
      composability
    evidence: yfinance/screener/query.py:16(__init__)
  - behavior: Abstract base class with validation
    description: Each query type has different valid fields; abstract enforcement
      via @abstractmethod catches errors early
    evidence: yfinance/screener/query.py:41(@abstractmethod)
  - behavior: Strict operand validation
    description: Query operands validated against expected types and ranges before
      API call
    evidence: yfinance/screener/query.py:41(valid_fields)
  replaceable_points:
  - name: query_validation
    description: How strictly query operands are validated
    options:
    - name: strict validation
      traits:
      - Type checking
      - Early errors
      fit_for:
      - Production
      - Catch bugs early
      not_fit_for:
      - Flexible queries
    - name: lenient
      traits:
      - Flexible
      - Permissive
      fit_for:
      - Exploratory analysis
      not_fit_for:
      - Production
    default: strict validation
  design_decisions:
  - Operator pattern for queries enables flexible filtering composability with EQ,
    IS-IN, BTWN, GT, LT operators (yfinance/screener/query.py:16)
  - Abstract base class with @abstractmethod enforces each query type to implement
    valid_fields and valid_values (yfinance/screener/query.py:41)
  acceptance_hints:
  - Screening query returns list of matching ticker symbols
  - Invalid filter fields raise validation errors
  - EquityQuery, FundQuery, ETFQuery have different valid fields
- id: live_streaming
  name: Live Streaming (WebSocket)
