    in yfinance/multi.py'
- id: BD-043
  type: B/BA
  content: FX ticker suffix =X triggers special handling - volume always 0 and different
    validation logic
  rationale: 'FX tickers (ending in =X) require special handling because they represent
    currency pairs traded in OTC markets with fundamentally different characteristics
    than equities—volume is always reported as 0 and standard equity validation rules
    do not apply. This is a domain-specific invariant that distinguishes FX data from
    equity data. BOUNDARY: Without this distinction, FX ticker requests would fail
    equity-specific validation checks (e.g., volume > 0 requirements, minimum price
    thresholds), preventi'
  evidence: yfinance/scrapers/history.py:1346(module)
  stage: invariant
  _evidence_issues:
