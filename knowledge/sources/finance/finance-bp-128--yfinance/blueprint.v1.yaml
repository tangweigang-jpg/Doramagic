  key_behaviors:
  - behavior: Abstract base class pattern
    description: Domain_ABC ensures consistent interface across Sector/Industry/Market
      and forces _fetch_and_parse implementation
    evidence: yfinance/domain/domain.py:11(Domain_ABC)
  - behavior: _ensure_fetched lazy loading
    description: Every properties auto-fetch on access using _ensure_fetched pattern;
