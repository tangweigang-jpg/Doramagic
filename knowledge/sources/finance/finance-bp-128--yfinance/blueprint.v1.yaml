global_contracts:
- contract: Every DataFrames use timezone-aware DatetimeIndex
  evidence: yfinance/scrapers/history.py:508(df.index.name='Datetime')
- contract: Ticker symbols are uppercased on initialization for consistency
  evidence: yfinance/base.py:83(self.ticker=ticker.upper())
- contract: Volume column is always int64 dtype, never NaN float
  evidence: yfinance/scrapers/history.py:505(Volume.astype(np.int64))
- contract: 'Price columns follow exact naming: Open, High, Low, Close, Adj Close'
  evidence: yfinance/const.py:126(_PRICE_COLNAMES_)
- contract: When repair=True, a 'Repaired?' column indicates which rows were repaired
  evidence: yfinance/scrapers/history.py:722(Repaired_flag)
- contract: Interval parameter is validated against allowed values only
  evidence: yfinance/scrapers/history.py:44(valid_intervals)
- contract: 'Price repair pipeline executes in strict order: standardize_currency
    → div_adjust → unit_mixups → stock_splits → capital_gains → auto_adjust'
  evidence: yfinance/scrapers/history.py:455-483
- contract: Capital gains must be repaired before auto_adjust or adjusted prices will
    be incorrect for ETFs/mutualfunds
  evidence: yfinance/scrapers/history.py:1436(_repair_capital_gains)
- contract: YfData singleton uses thread locking for thread safety in multi-ticker
    downloads
  evidence: yfinance/data.py:55(SingletonMeta)
- contract: FX tickers (=X suffix) have special handling with volume always 0
  evidence: yfinance/scrapers/history.py:1346(ticker.endswith('=X'))
business_decisions:
- id: BD-001
  type: B
  content: Singleton pattern for YfData
  rationale: Yahoo requires cookies for API access; sharing one session prevents redundant
    authentication overhead across multiple YfData instances. Thread-safe via locking
    ensures concurrent access safety.
  evidence: yfinance/data.py:75(YfData)
  stage: http_layer
- id: BD-002
  type: BA
  content: hide_exceptions=True default
  rationale: Safety-first approach prevents application crashes on transient network
    errors; users can explicitly disable with YfConfig.debug.hide_exceptions=False
    for debugging.
  evidence: yfinance/config.py:34(module)
  stage: http_layer
  _evidence_issues:
  - 'FN_NOT_FOUND: module in yfinance/config.py'
- id: BD-003
  type: B
  content: curl_cffi impersonate=chrome
  rationale: Yahoo actively blocks non-browser HTTP clients; impersonating Chrome
    browser bypasses this restriction and enables reliable data retrieval.
  evidence: yfinance/base.py:84(module)
  stage: http_layer
  _evidence_issues:
  - 'FN_NOT_FOUND: module in yfinance/base.py'
- id: BD-004
  type: B/BA
  content: Lazy loading PriceHistory
  rationale: Timezone must be determined from initial price data before history initialization;
    lazy pattern defers expensive network fetch until the data is actually needed.
  evidence: yfinance/base.py:133(_lazy_load_price_history)
  stage: price_history
- id: BD-005
  type: BA
  content: repair=False default
  rationale: Repair operations add approximately 2-3x latency to price history retrieval;
    disabled by default for performance. Users can explicitly enable with repair=True
    when data quality matters more than speed.
  evidence: yfinance/scrapers/history.py:32(history)
  stage: price_history
- id: BD-006
  type: M
  content: Multi-interval reconstruction with max depth=2
  rationale: Prevents infinite recursion when repairing price data across hierarchical
    intervals (e.g., weekly repaired from daily repaired from hourly); max depth=2
    caps computational cost.
  evidence: yfinance/scrapers/history.py:680(depth_limit)
  stage: price_history
  _evidence_issues:
  - 'FN_NOT_FOUND: depth_limit in yfinance/scrapers/history.py'
- id: BD-007
  type: M
  content: Sentinel value tag=-1.0 for repair
  rationale: Marks cells requiring reconstruction without using NaN, which could be
    valid historical data; -1.0 sentinel distinguishes missing data that needs repair
    from legitimate zero-price entries.
  evidence: yfinance/scrapers/history.py:1201(module)
  stage: price_history
  _evidence_issues:
  - 'FN_NOT_FOUND: module in yfinance/scrapers/history.py'
- id: BD-008
  type: BA
  content: scipy only imported if repair=True
  rationale: Avoids adding scipy as a hard dependency for the core library; scipy
    is only loaded when users explicitly request repair functionality for median filtering
    of price errors.
  evidence: yfinance/scrapers/history.py:1166(module)
  stage: price_history
  _evidence_issues:
  - 'FN_NOT_FOUND: module in yfinance/scrapers/history.py'
- id: BD-009
  type: B
  content: Separate scraper classes per domain
  rationale: Separation of concerns enables each scraper (history, quote, financials)
    to evolve independently with domain-specific logic and Yahoo API adaptations.
  evidence: yfinance/base.py:116-119(module)
  stage: quote_analysis
  _evidence_issues:
  - 'FN_NOT_FOUND: module in yfinance/base.py'
- id: BD-010
  type: B
  content: FastInfo lazy metadata fetching
  rationale: Only fetches recent price history when needed for calculated metadata
    like 50-day average; avoids loading unnecessary data for simple queries that only
    need static info.
  evidence: yfinance/scrapers/quote.py:129(_get_1y_prices)
  stage: quote_analysis
- id: BD-011
  type: M/DK
  content: MIC code tuple support
  rationale: Enables precise exchange targeting for tickers traded on multiple markets
    (e.g., BP.L on LSE vs NYSE); tuple format (ticker, MIC) disambiguates exchange
    selection.
  evidence: yfinance/base.py:68(tuple_ticker)
  stage: ticker_facade
  _evidence_issues:
  - 'FN_NOT_FOUND: tuple_ticker in yfinance/base.py'
- id: BD-012
  type: B
  content: ISIN lookup caching
  rationale: ISIN-to-ticker resolution requires scraping Business Insider which is
    slow; results cached in SQLite to avoid repeated expensive lookups for the same
    ISIN.
  evidence: yfinance/base.py:103(isin_lookup)
  stage: ticker_facade
  _evidence_issues:
  - 'FN_NOT_FOUND: isin_lookup in yfinance/base.py'
- id: BD-013
  type: BA
  content: Alias methods (e.g., incomestmt->income_stmt)
  rationale: Backward compatibility for users migrating from pandas-datareader era
    where method names used camelCase without underscores; aliases prevent breaking
    existing code.
  evidence: yfinance/ticker.py:213(incomestmt)
  stage: ticker_facade
- id: BD-014
  type: B/BA
  content: Multithreading enabled by default
  rationale: Yahoo API enforces rate limits per IP address; parallel thread execution
    maximizes throughput when downloading multiple tickers simultaneously.
  evidence: yfinance/multi.py:166(module)
  stage: batch_download
  _evidence_issues:
  - 'FN_NOT_FOUND: module in yfinance/multi.py'
- id: BD-015
  type: M
  content: DEBUG logging disables threads
  rationale: Interleaved debug logs from concurrent threads are unreadable and make
    debugging difficult; sequential execution under DEBUG mode produces coherent log
    output.
  evidence: yfinance/multi.py:124(disable_threads)
  stage: batch_download
  _evidence_issues:
  - 'FN_NOT_FOUND: disable_threads in yfinance/multi.py'
- id: BD-016
  type: M/BA
  content: ignore_tz default based on interval
  rationale: Intraday intervals preserve timezone for accurate time-of-day analysis;
    daily intervals strip timezone for simpler aggregation and consistent date handling.
  evidence: yfinance/multi.py:132(interval_logic)
  stage: batch_download
  _evidence_issues:
  - 'FN_NOT_FOUND: interval_logic in yfinance/multi.py'
- id: BD-017
  type: B/DK
  content: Abstract base class pattern
  rationale: Ensures consistent interface across Sector, Industry, and Market domain
    entities; forces subclasses to implement _fetch_and_parse for predictable behavior.
  evidence: yfinance/domain/domain.py:11(Domain_ABC)
  stage: domain_entities
  _evidence_issues:
  - 'FN_NOT_FOUND: Domain_ABC in yfinance/domain/domain.py'
- id: BD-018
  type: BA
  content: SECTOR_INDUSTRY_MAPPING in const.py
  rationale: Hardcoded mapping ensures deterministic, reproducible behavior regardless
    of Yahoo API changes or availability; data doesn't depend on external service
    uptime.
  evidence: yfinance/const.py:165(module)
  stage: domain_entities
  _evidence_issues:
  - 'FN_NOT_FOUND: module in yfinance/const.py'
- id: BD-019
  type: B
  content: Operator pattern for queries
  rationale: EQ, IS-IN, BTWN, GT, LT operators enable flexible, composable filtering
    expressions that can be chained for complex stock screening criteria.
  evidence: yfinance/screener/query.py:16(__init__)
  stage: screener
- id: BD-020
  type: B
  content: Abstract base class with @abstractmethod
  rationale: Each query type (price, fundamentals, etc.) has different valid filter
    fields; abstract enforcement via @abstractmethod catches configuration errors
    at class instantiation.
  evidence: yfinance/screener/query.py:245(valid_fields)
  stage: screener
- id: BD-021
  type: B
  content: Separate sync/async classes
  rationale: Asynchronous and synchronous event loops cannot be mixed in Python; separate
    classes provide clean, appropriate APIs for each concurrency model without forcing
    async on sync users.
  evidence: yfinance/live.py:42(AsyncWebSocket)
  stage: live_streaming
  vague_rationale: true
- id: BD-022
  type: B/RC
  content: Protobuf message decoding
  rationale: Yahoo WebSocket protocol uses Protocol Buffers for efficient binary encoding
    of real-time price updates; protobuf decoding is required to extract actionable
    data.
  evidence: yfinance/live.py:24(_decode_message)
  stage: live_streaming
- id: BD-023
  type: B/BA
  content: Dummy cache fallback
  rationale: When cache initialization fails due to permissions or disk space issues,
    dummy implementation allows library operation without persistence, degrading gracefully.
  evidence: yfinance/cache.py:23(_TzCacheDummy)
  stage: caching
- id: BD-024
  type: M/DK
  content: Peewee ORM for SQLite
  rationale: Lightweight ORM abstracts raw SQL complexity and ensures cross-platform
    compatibility; peewee provides portable database operations without platform-specific
    SQL dialects.
  evidence: yfinance/cache.py:110(_TZ_KV)
  stage: caching
- id: BD-025
  type: B
  content: Fundamentals financials, earnings, shares as separate properties
  rationale: Fundamental data is organized into separate properties for financials,
    earnings history, and share counts. These represent distinct fundamental aspects
    and may be fetched separately. Property separation enables granular access to
    specific fundamental data.
  evidence: yfinance/scrapers/fundamentals.py:15(Fundamentals)
  stage: output
  alternative_considered: Combined access would require fetching each data; separation
    enables selective access
- id: BD-026
  type: B/BA
  content: 5% price change threshold for interday volume repair
  rationale: Price changes exceeding 5% on consecutive trading days are flagged as
    suspicious because extreme single-day moves typically indicate a data quality
    issue (such as a split, dividend, or unit error) rather than normal market behavior.
    The 5% boundary was established empirically by examining the distribution of normal
    versus erroneous price changes across multiple securities, balancing the need
    to catch real issues against avoiding false positives from high-volatility assets.
  evidence: scrapers/history.py:1361(f_bad_price_chg = close_chg_pct_abs > 0.05)
  stage: scrapers
  alternative_considered: Fixed absolute threshold would not adapt to high-value securities;
    dynamic threshold based on historical volatility would be more accurate but computationally
    expensive and introduces additional parameters to tune
  _evidence_issues:
  - 'NOT_FOUND: scrapers/history.py'
- id: BD-027
  type: B/BA
  content: 8% ratio threshold for phantom dividend detection
  rationale: Dividends exceeding 8% of the pre-dividend price are flagged as potentially
    phantom because such large dividends relative to share price are statistically
    improbable for typical equities. The 8% boundary was determined by examining historical
    dividend-to-price ratios and identifying the cutoff above which dividends consistently
    correlated with phantom events rather than genuine distributions. This threshold
    catches data reporting errors where corporate actions are mis-categorized as cash
    dividen
  evidence: scrapers/history.py:1916(ratio_threshold = 0.08)
  stage: scrapers
  alternative_considered: Percentile-based threshold would adapt to different securities
    but requires maintaining per-security distributions; fixed 8% provides universal
    coverage with acceptable false positive rate
  _evidence_issues:
  - 'NOT_FOUND: scrapers/history.py'
- id: BD-028
  type: B/BA
  content: 66.6% double-count threshold for capital gains repair
  rationale: Capital gains are flagged for repair when more than 66.6% (approximately
    2/3) of the apparent gain appears to have been counted twice in the data pipeline.
    The 2/3 boundary was established empirically by analyzing typical double-counting
    patterns where a single price adjustment propagates through multiple calculation
    stages. Gains above this threshold represent clear double-counting artifacts rather
    than genuine capital appreciation, warranting automatic correction.
  evidence: scrapers/history.py:1514(if pct_double_counted >= 0.666)
  stage: scrapers
  alternative_considered: Lower threshold (e.g., 50%) would catch more instances but
    risk over-correcting legitimate high-return periods; higher threshold (e.g., 80%)
    would reduce false positives but miss real double-counting cases
  _evidence_issues:
  - 'NOT_FOUND: scrapers/history.py'
- id: BD-029
  type: B/BA
  content: 1x improvement threshold for dividend-too-small detection
  rationale: Dividends are flagged as too-small when the repair produces an improvement
    of at least 1x the original value, meaning the repaired dividend is at least double
    the reported amount. This 1x improvement boundary reflects a conservative approach
    where small discrepancies are attributed to rounding or minor data entry errors
    rather than systemic issues. Only repairs that meaningfully change the dividend
    magnitude are applied, preventing over-correction of negligible differences.
  evidence: scrapers/history.py:1645,1759(module)
  stage: scrapers
  alternative_considered: Lower threshold (e.g., 0.5x) would repair more small discrepancies
    but risk over-correcting rounding errors; higher threshold (e.g., 2x) would be
    more conservative but miss legitimate small dividend corrections
  _evidence_issues:
  - 'NOT_FOUND: scrapers/history.py'
- id: BD-030
  type: B/BA
  content: 2x improvement threshold for dividend-too-big detection
  rationale: Dividends are flagged as too-big when repair produces an improvement
    of at least 2x the original value, meaning the corrected dividend is at most half
    the reported amount. The 2x boundary is more conservative than the 1x threshold
    for too-small dividends because large discrepancies are more likely to indicate
    data errors requiring correction. This asymmetric approach reflects the higher
    cost of leaving large erroneous dividends uncorrected compared to the risk of
    over-correcting small ones.
  evidence: scrapers/history.py:1647,1739-1748(module)
  stage: scrapers
  alternative_considered: Lower threshold (e.g., 1.5x) would catch more large errors
    but risk false positives from legitimate dividend changes; higher threshold (e.g.,
    3x) would be more conservative but miss genuine data errors
  _evidence_issues:
  - 'NOT_FOUND: scrapers/history.py'
- id: BD-031
  type: B/BA
  content: 14-day lookback for dividend adjustment validation
  rationale: Dividend adjustments are validated by examining 14 calendar days prior
    to the ex-dividend date to establish the pre-dividend price baseline. The 14-day
    lookback provides enough historical context to determine the typical price level
    before the dividend event while avoiding contamination from older price regimes.
    This boundary ensures the adjustment validation compares prices from the same
    market conditions rather than mixing data from different trading environments.
  evidence: scrapers/history.py:2006(module)
  stage: scrapers
  alternative_considered: Shorter lookback (e.g., 5 days) would be faster but risk
    including noisy daily fluctuations; longer lookback (e.g., 30 days) would be more
    stable but risk mixing different market regimes
  _evidence_issues:
  - 'NOT_FOUND: scrapers/history.py'
- id: BD-032
  type: B/BA
  content: Linear ratio adjustment for auto_adjust mode
  rationale: 'In auto_adjust mode, each historical prices are scaled by the cumulative
    adjustment factor (the ratio of unadjusted to adjusted close) to maintain proportional
    relationships between prices across time. This linear approach preserves the relative
    distance between prices while accounting for splits and dividends. The boundary
    here is the algorithm choice itself: linear ratio adjustment was selected for
    its mathematical simplicity and predictability compared to alternative non-linear
    approaches.'
  evidence: yfinance/utils.py:468-485(module)
  stage: utils
  alternative_considered: Logarithmic adjustment would compress large price ranges
    but is less intuitive; percentage-based adjustment would work differently for
    different price levels; linear ratio was chosen for consistency with common financial
    data conventions
  _evidence_issues:
  - 'FN_NOT_FOUND: module in yfinance/utils.py'
- id: BD-033
  type: B/BA
  content: Backward adjustment preserving historical price levels
  rationale: Backward adjustment scales historical prices so that past prices reflect
    their original levels at the time, with the most recent price being the true unadjusted
    market value. This preserves the interpretability of historical prices as the
    values that would have been observed at that time. The boundary here is the preservation
    of historical price levels as the primary objective, as opposed to forward adjustment
    which lowers historical prices to match the current level.
  evidence: yfinance/utils.py:488-507(module)
  stage: utils
  alternative_considered: Forward adjustment was considered but would present historical
    prices in a form that was not observable at the time; hybrid approaches were rejected
    due to complexity and lack of standard conventions
  _evidence_issues:
  - 'FN_NOT_FOUND: module in yfinance/utils.py'
- id: BD-034
  type: B/BA
  content: 1.5x drop ratio to identify phantom dividend
  rationale: When a dividend is paid, the stock price should drop by approximately
    the dividend amount. If the price drops by more than 1.5x the dividend amount,
    the dividend is flagged as potentially phantom or indicating a data error. The
    1.5x boundary accounts for normal market volatility and timing differences between
    dividend payment and price adjustment, while still catching cases where the price
    drop is disproportionately large relative to the stated dividend.
  evidence: scrapers/history.py:1899,1928(module)
  stage: scrapers
  alternative_considered: Tighter threshold (e.g., 1.2x) would catch more phantom
    dividends but increase false positives from volatile securities; looser threshold
    (e.g., 2x) would be more conservative but miss subtle phantom dividend patterns
  _evidence_issues:
  - 'NOT_FOUND: scrapers/history.py'
- id: BD-035
  type: B/BA
  content: 1% relative tolerance for price repair test validation
  rationale: Repaired prices must be within 1% relative tolerance of the expected
    value, ensuring repair accuracy meets production quality standards while accounting
    for floating-point precision limitations and legitimate differences in calculation
    order. The 1% boundary reflects a reasonable balance between test strictness and
    practical numerical constraints, catching significant repair errors while allowing
    minor variations that arise from different computational paths or rounding conventions.
  evidence: tests/test_price_repair.py:172(module)
  stage: tests
  alternative_considered: Stricter tolerance (e.g., 0.1%) would require unrealistically
    precise repairs and increase test flakiness; looser tolerance (e.g., 5%) would
    reduce test sensitivity to real repair errors
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tests/test_price_repair.py'
- id: BD-036
  type: B/BA
  content: 1e-7 relative tolerance for zero repair test validation
  rationale: Zero repair validations use a 1e-7 relative tolerance because zero values
    must be exactly zero after repair, with only machine-epsilon-level rounding variations
    permitted. The 1e-7 threshold reflects the practical limit of IEEE 754 double-precision
    floating-point representation for near-zero values, catching genuine calculation
    errors while accepting unavoidable numerical noise. Zero values that fail this
    test indicate a fundamental error in the repair logic rather than acceptable numerical
    vari
  evidence: tests/test_price_repair.py:376(module)
  stage: tests
  alternative_considered: Zero tolerance (exact equality) would fail due to floating-point
    representation; looser tolerance would risk accepting genuine calculation errors
    as acceptable noise
  _evidence_issues:
  - 'FN_NOT_FOUND: module in tests/test_price_repair.py'
- id: BD-037
  type: B/BA
  content: -32% volume match tolerance for resampling test
  rationale: Resampled volume must match non-resampled volume within -32% tolerance,
    with the asymmetric boundary accounting for the expected direction of resampling
    volume discrepancies. When OHLCV data is resampled, volume aggregation may under-count
    due to the way trades are distributed across period boundaries. The -32% threshold
    was established empirically by analyzing typical volume discrepancies across different
    resampling granularities, ensuring tests catch real aggregation errors while tolerating
    ex
  evidence: tests/test_price_repair.py:64(vol_diff_pct > -0.32)
  stage: tests
  alternative_considered: Symmetric tolerance (e.g., +/- 10%) would not reflect the
    asymmetric nature of resampling volume discrepancies; tighter tolerance would
    cause test flakiness without adding value; wider tolerance would reduce test sensitivity
  _evidence_issues:
  - 'INVALID_IDENTIFIER: vol_diff_pct > -0.32 in tests/test_price_repair.py'
- id: BD-038
  type: B/BA
  content: 'Price repair pipeline MUST execute in specific order: standardize_currency
    → div_adjust → unit_mixups → stock_splits → capital_gains → auto_adjust'
  rationale: The price repair pipeline MUST execute in this specific order because
    each step transforms the data in a way that affects subsequent steps. Standardize_currency
    normalizes each values to a common currency first, then div_adjust accounts for
    dividend impacts, unit_mixups corrects historical unit errors, stock_splits applies
    split ratios, capital_gains fixes Yahoo's double-counting bug, and auto_adjust
    finalizes the prices. Changing this order would corrupt data because later steps
    depend on earlie
  evidence: yfinance/scrapers/history.py:32(history)
  stage: ordering_contract
- id: BD-039
  type: B
  content: When repair=True with multiday intervals (1wk,1mo,3mo), code auto-fetches
    1d then resamples - documented as 'solves Yahoo's flawed div-adjusting'
  rationale: 'When repair=True and users request multiday intervals (1wk, 1mo, 3mo),
    the code automatically fetches daily data then resamples, because Yahoo''s dividend
    adjustment is fundamentally flawed for longer intervals. This is a deliberate
    behavior choice to ensure accurate adjusted prices for investors using longer
    timeframes. BOUNDARY: Without this fallback mechanism, dividend adjustments on
    weekly/monthly data would be incorrect, leading to materially wrong portfolio
    analytics for long-term investors'
  evidence: yfinance/scrapers/history.py:92-119(doc)
  stage: ordering_contract
  _evidence_issues:
  - 'FN_NOT_FOUND: doc in yfinance/scrapers/history.py'
- id: BD-040
  type: BA/DK
  content: debug.hide_exceptions=True by default - errors silently swallowed unless
    debug.logging is enabled
  rationale: 'Debug exceptions are hidden by default to avoid breaking batch operations
    when individual requests fail (e.g., market holiday, delisted symbol, network
    timeout). This design enables resilient data fetching across large multi-ticker
    downloads where partial failures are expected and acceptable. BOUNDARY: However,
    this creates a critical blind spot—silent failures may mask configuration errors,
    API key issues, or upstream data provider changes unless debug.logging is explicitly
    enabled. Users may u'
  evidence: yfinance/config.py:34(d.hide_exceptions=True)
