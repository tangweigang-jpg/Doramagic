  - name: Sector.etfs
    description: Returns DataFrame of ETFs tracking this sector
    evidence: yfinance/domain/sector.py:12(class Sector)
  - name: Industry.top_companies
    description: Returns DataFrame of top companies in the industry
    evidence: yfinance/domain/industry.py:12(class Industry)
  - name: Domain._fetch_and_parse
    description: Abstract method that must be implemented by child classes to fetch
      and parse data
