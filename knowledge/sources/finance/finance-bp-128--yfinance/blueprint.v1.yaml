id: finance-bp-128
name: yfinance
sop_version: '3.6'
source:
  projects:
  - yfinance
  commit_hash: a17e8b19a6681c4d40cbb2100a3de0d589568a65
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Market data retrieval and streaming
  description: Python library for downloading market data including OHLCV prices,
    financial statements, analyst recommendations, sector/industry data, stock screening,
    and real-time streaming from Yahoo Finance API.
  prerequisites: Users should understand Python, pandas DataFrames, and financial
    market concepts. Must accept Yahoo Finance terms of use for data usage.
  not_suitable_for: Real-time trading systems requiring guaranteed data integrity,
    high-frequency trading applications, non-Yahoo data sources, and production trading
    systems where data accuracy is mission-critical
stages:
- id: http_layer
  name: HTTP & Session Management
  order: 1
  responsibility: Manages each HTTP requests, session handling, cookie authentication,
    and rate limiting. Singleton pattern ensures shared session/cookies across each
    Ticker instances for efficiency and proper Yahoo API access.
  interface:
    inputs:
    - URL requests
    - Session configuration
    - Proxy settings
    - Retry configuration
    outputs:
    - HTTP responses
    - JSON data
    - cookies
    - crumb tokens
  required_methods:
  - name: YfData.get_json
    description: Performs HTTP GET request and returns parsed JSON response
    evidence: yfinance/data.py:75(class YfData)
  - name: YfData.post
    description: Performs HTTP POST request with cookie authentication
    evidence: yfinance/data.py:75(class YfData)
  - name: ConfigMgr.get_config
    description: Retrieves global configuration settings for proxy, retries, debug
    evidence: yfinance/config.py:21(class ConfigMgr)
  key_behaviors:
  - behavior: Singleton HTTP client
    description: YfData uses SingletonMeta to ensure single shared instance across
      each Ticker objects, preventing redundant authentication and cookie fetching
    evidence: yfinance/data.py:55(SingletonMeta)
  - behavior: Cookie-based authentication
    description: Yahoo Finance requires cookies for API access; singleton shares cookies
      across requests to avoid repeated auth
    evidence: yfinance/data.py:75(YfData)
  - behavior: Browser impersonation
    description: Uses curl_cffi with Chrome impersonation to bypass Yahoo's non-browser
      client blocking
    evidence: yfinance/base.py:84(requests.Session)
  - behavior: Exception hiding by default
    description: hide_exceptions=True prevents crashes on network errors unless debug
      mode is explicitly enabled
    evidence: yfinance/config.py:34(hide_exceptions=True)
  replaceable_points:
  - name: session_backend
    description: Swap the underlying HTTP session implementation for custom behavior
    options:
    - name: curl_cffi
      traits:
      - Browser impersonation
      - Fast
      - Thread-safe
      fit_for:
      - Production use
      - Bypassing blocks
      not_fit_for:
      - Environments without curl_cffi
    - name: requests.Session
      traits:
      - Standard library
      - Well-documented
      fit_for:
      - Debugging
      - Simple integrations
      not_fit_for:
      - Yahoo Finance API (blocked)
    - name: httpx.Client
      traits:
      - Async support
      - Modern
      fit_for:
      - Async applications
      not_fit_for:
      - Sync-only codebases
    default: curl_cffi
  design_decisions:
  - Singleton pattern for YfData ensures shared cookies/session across each Ticker
    instances; prevents redundant authentication (yfinance/data.py:75)
  - hide_exceptions=True default provides safety-first behavior; users explicitly
    enable errors with YfConfig.debug.hide_exceptions=False (yfinance/config.py:34)
  - curl_cffi impersonate=chrome bypasses Yahoo's non-browser client blocking (yfinance/base.py:84)
  acceptance_hints:
  - HTTP requests return valid JSON responses
  - Cookies are properly maintained across requests
  - Rate limiting is handled gracefully
  - No 403 Forbidden errors from Yahoo
- id: price_history
  name: Price History Retrieval & Repair
  order: 2
  responsibility: Fetches OHLCV data from Yahoo Finance chart API, handles timezone
    detection, repairs common data errors including currency unit mixups, missing
    prices, bad dividend adjustments, and capital gains double-counting. Most complex
    module with 3000+ lines.
  interface:
    inputs:
    - ticker symbol
    - period/interval/start/end params
    - repair flag
    - auto_adjust flag
    outputs:
    - pandas DataFrame with OHLC, Volume, Dividends, Splits, Repaired? column if repair=True
  required_methods:
  - name: PriceHistory.fetch
    description: Main entry point that fetches price history, applies repairs, and
      resamples intervals
    evidence: yfinance/scrapers/history.py:455(history)
  - name: _reconstruct_intervals_batch
    description: Fetches finer-grained data to repair missing values in larger intervals
    evidence: yfinance/scrapers/history.py:641
  - name: _fix_unit_random_mixups
    description: Detects and repairs 100x price errors using scipy median filtering
    evidence: yfinance/scrapers/history.py:1133
  - name: _fix_bad_div_adjust
    description: Fixes Yahoo's incorrect dividend adjustments in historical data
    evidence: yfinance/scrapers/history.py:1550
  - name: _repair_capital_gains
    description: Prevents double-counting when Yahoo pre-adds capital gains to dividends
      column
    evidence: yfinance/scrapers/history.py:1436
  key_behaviors:
  - behavior: Repair pipeline execution order
    description: 'Must execute in specific order: standardize_currency → div_adjust
      → unit_mixups → stock_splits → capital_gains → auto_adjust. Changing order breaks
      dividend/split/100x fixes'
    evidence: yfinance/scrapers/history.py:455-483
  - behavior: Lazy timezone resolution
    description: Timezone must be known before PriceHistory instantiation; lazy pattern
      defers expensive fetch until needed
    evidence: yfinance/base.py:133(_lazy_load_price_history)
  - behavior: Multi-interval reconstruction with depth limit
    description: Prevents infinite recursion when repairing weekly data from daily
      from hourly; max depth=2
    evidence: yfinance/scrapers/history.py:680(depth_limit)
  - behavior: Sentinel value for repair
    description: Uses tag=-1.0 to mark cells needing reconstruction without using
      NaN (which can be valid data)
    evidence: yfinance/scrapers/history.py:1201(tag=-1.0)
  - behavior: FX special handling
    description: Ticker suffix =X triggers special FX handling with volume always
      0 and different validation logic
    evidence: yfinance/scrapers/history.py:1346(ticker.endswith('=X'))
  replaceable_points:
  - name: price_repair_strategy
    description: How to detect and fix erroneous prices in Yahoo data
    options:
    - name: built-in repair
      traits:
      - Comprehensive
      - Well-tested
      - scipy dependency
      fit_for:
      - US markets
      - ETF data
      - Data accuracy priority
      not_fit_for:
      - Performance-critical paths
      - Non-standard data
    - name: custom repair hook
      traits:
      - User-defined
      - Flexible
      fit_for:
      - Custom error detection
      - Alternative data sources
      not_fit_for:
      - Standard Yahoo data
    default: built-in repair
  - name: data_source
    description: API endpoint for fetching price data
    options:
    - name: Yahoo Finance chart API
      traits:
      - Default
      - Comprehensive
      fit_for:
      - Most use cases
      not_fit_for:
      - API downtime
    - name: custom endpoint
      traits:
      - Alternative source
      fit_for:
      - Testing
      - Alternative providers
      not_fit_for:
      - Production with Yahoo
    default: Yahoo Finance chart API
  design_decisions:
  - Lazy loading PriceHistory requires timezone before init; defers expensive fetch
    until needed (yfinance/base.py:133)
  - repair=False default avoids ~2-3x latency overhead; users explicitly enable with
    repair=True (yfinance/scrapers/history.py:32)
  - Multi-interval reconstruction with max depth=2 prevents infinite recursion (yfinance/scrapers/history.py:680)
  - Sentinel value tag=-1.0 marks cells needing reconstruction without using NaN (yfinance/scrapers/history.py:1201)
  - scipy only imported conditionally when repair=True to avoid hard dependency (yfinance/scrapers/history.py:1166)
  - auto_adjust=True replaces raw OHLC with adjusted prices using Close/dividends
    (yfinance/scrapers/history.py:34)
  acceptance_hints:
  - Returned DataFrame has timezone-aware DatetimeIndex
  - Volume column is int64 dtype (not float with NaN)
  - 'Price columns follow naming: Open, High, Low, Close, Adj Close'
  - When repair=True, Repaired? column indicates which rows were fixed
  - FX tickers (=X suffix) return zero volume
- id: quote_analysis
  name: Quote & Financial Analysis
  order: 3
  responsibility: Fetches quotes, analyst recommendations, earnings estimates, financial
    statements, sustainability data, and fast market info. Separate scraper classes
    per data domain ensure isolation and independent evolution.
  interface:
    inputs:
    - ticker symbol
    outputs:
    - info dict
    - DataFrames for recommendations/estimates/statements
  required_methods:
  - name: Quote.fetch_info
    description: Retrieves comprehensive ticker information including market data,
      company details, and statistics
    evidence: yfinance/scrapers/quote.py:484(class Quote)
  - name: Analysis.fetch_estimates
    description: Gets earnings estimates, EPS trends, and analyst price targets
    evidence: yfinance/scrapers/analysis.py:11(class Analysis)
  - name: Fundamentals.fetch_financials
    description: Retrieves income statements, balance sheets, and cash flow statements
    evidence: yfinance/scrapers/fundamentals.py:12(class Fundamentals)
  - name: FastInfo.price
    description: Lightweight cached access to current price, volume, market cap
    evidence: yfinance/scrapers/quote.py:27(class FastInfo)
  key_behaviors:
  - behavior: Separate scraper classes per domain
    description: Each data domain (quote, analysis, fundamentals) has dedicated scraper
      class for separation of concerns and independent evolution
    evidence: yfinance/base.py:116-119(scraper_inits)
  - behavior: FastInfo lazy metadata fetching
    description: Only fetches recent prices when needed for calculations like 50-day
      average
    evidence: yfinance/scrapers/quote.py:129(_get_1y_prices)
  replaceable_points:
  - name: info_data_source
    description: Where to fetch ticker info data from
    options:
    - name: Yahoo v7 API
      traits:
      - Default
      - Official
      fit_for:
      - Most use cases
      not_fit_for:
      - API changes breaking response
    - name: web scraping fallback
      traits:
      - Fallback
      - Flexible
      fit_for:
      - API failures
      not_fit_for:
      - Primary data source
    default: Yahoo v7 API
  design_decisions:
  - Separate scraper classes per domain enables independent evolution and clear separation
    of concerns (yfinance/base.py:116-119)
  - FastInfo lazy metadata fetching optimizes performance by only fetching prices
    when needed for calculations (yfinance/scrapers/quote.py:129)
  acceptance_hints:
  - info dict contains key fields like marketCap, trailingPE, dividendYield
  - 'recommendations DataFrame has expected columns: Period, Grade, Action'
  - Financial statement DataFrames follow consistent multi-index structure
- id: ticker_facade
  name: Ticker Facade
  order: 4
  responsibility: Main user-facing API combining each scrapers under single Ticker
    interface. Provides convenience methods, property accessors, and automatic lazy
    loading of components for seamless data access.
  interface:
    inputs:
    - ticker symbol or (symbol, MIC) tuple
    outputs:
    - Every financial data via property accessors
  required_methods:
  - name: Ticker.history
    description: Retrieves historical OHLCV price data with optional repair and adjustment
    evidence: yfinance/base.py:54(TickerBase)
  - name: Ticker.get_info
    description: Fetches comprehensive ticker information dictionary
    evidence: yfinance/ticker.py:33(class Ticker)
  - name: Ticker.income_stmt
    description: Returns income statement DataFrame with quarterly and annual data
    evidence: yfinance/ticker.py:213(incomestmt)
  - name: Ticker.balance_sheet
    description: Returns balance sheet DataFrame
    evidence: yfinance/base.py:54(TickerBase)
  - name: Ticker.cashflow
    description: Returns cash flow statement DataFrame
    evidence: yfinance/base.py:54(TickerBase)
  - name: Ticker.recommendations
    description: Returns analyst recommendations DataFrame
    evidence: yfinance/base.py:54(TickerBase)
  - name: Ticker.get
    description: Generic getter supporting dot-notation for any data attribute
    evidence: yfinance/base.py:54(TickerBase)
  key_behaviors:
  - behavior: Property-based data access
    description: Ticker adds ~50 property wrappers delegating to TickerBase methods;
      users access data via natural property syntax
    evidence: yfinance/ticker.py:109-327(properties)
  - behavior: MIC code tuple support
    description: Enables precise exchange targeting for tickers traded on multiple
      markets using (symbol, MIC) tuple
    evidence: yfinance/base.py:68(tuple_ticker)
  - behavior: ISIN lookup caching
    description: ISIN-to-ticker resolution is slow (scrapes Business Insider); cached
      in SQLite for performance
    evidence: yfinance/base.py:103(isin_lookup)
  - behavior: Ticker symbols uppercased
    description: Every ticker symbols are converted to uppercase on initialization
      for consistency
    evidence: yfinance/base.py:83(self.ticker=ticker.upper())
  replaceable_points:
  - name: session_injection
    description: HTTP session configuration per Ticker instance
    options:
    - name: shared session
      traits:
      - Efficient
      - Cookie sharing
      fit_for:
      - Standard use
      not_fit_for:
      - Isolated requests
    - name: per-ticker session
      traits:
      - Isolated
      - Custom cookies
      fit_for:
      - Testing
      - Multi-account
      not_fit_for:
      - Performance
    default: shared session
  design_decisions:
  - MIC code tuple support enables precise exchange targeting for multi-market tickers
    (yfinance/base.py:68)
  - ISIN lookup caching speeds up slow Business Insider scraping with SQLite persistence
    (yfinance/base.py:103)
  - Alias methods (incomestmt→income_stmt) provide backward compatibility from pandas-datareader
    era (yfinance/ticker.py:213)
  acceptance_hints:
  - Single ticker instance returns each data types via properties
  - Ticker symbols are normalized to uppercase
  - MIC tuple tickers resolve to correct exchange
  - ISIN lookups are cached after first resolution
- id: batch_download
  name: Batch Download Orchestration
  order: 5
  responsibility: Downloads data for multiple tickers with optional multithreading,
    progress tracking, and error aggregation. Returns MultiIndex DataFrame for efficient
    analysis.
  interface:
    inputs:
    - list of tickers
    - common parameters (period, interval, start, end)
    outputs:
    - MultiIndex DataFrame with each tickers as outer level
  required_methods:
  - name: download
    description: Main batch download function that orchestrates multithreaded retrieval
    evidence: yfinance/multi.py:40(download)
  - name: _download_one
    description: Single ticker download with error capture and aggregation
    evidence: yfinance/multi.py:284(_download_one)
  - name: ProgressBar
    description: Terminal progress display for batch operations
    evidence: yfinance/utils.py:400(ProgressBar)
  key_behaviors:
  - behavior: Multithreading by default
    description: Downloads run in parallel using multitasking library; Yahoo API is
      rate-limited per IP so parallel requests improve throughput
    evidence: yfinance/multi.py:166(threads=True)
  - behavior: DEBUG logging disables threads
    description: Interleaved debug logs are unreadable with threading; sequential
      execution used when debug logging is enabled
    evidence: yfinance/multi.py:124(disable_threads)
  - behavior: Timezone handling by interval
    description: Intraday intervals preserve timezone (crucial for time-of-day analysis),
      daily intervals strip timezone for simpler aggregation
    evidence: yfinance/multi.py:132(interval_logic)
  - behavior: Global lock for thread safety
    description: Shared._LOCK used around shared._DFS access to prevent race conditions
    evidence: yfinance/multi.py:95(shared._LOCK.acquire())
  - behavior: actions=False default inconsistency
    description: download() defaults to actions=False but Ticker.history() defaults
      to actions=True
    evidence: yfinance/multi.py:40(actions=False)
  replaceable_points:
  - name: threading_model
    description: How to parallelize downloads across multiple tickers
    options:
    - name: multitasking library
      traits:
      - Default
      - Event loop friendly
      fit_for:
      - Standard batch downloads
      not_fit_for:
      - Pure threading needs
    - name: concurrent.futures
      traits:
      - Standard library
      - ThreadPoolExecutor
      fit_for:
      - Custom parallelism
      not_fit_for:
      - Async integration
    - name: sequential
      traits:
      - Simple
      - Debuggable
      fit_for:
      - Testing
      - DEBUG mode
      not_fit_for:
      - Large batches
    default: multitasking library
  design_decisions:
  - Multithreading enabled by default improves throughput since Yahoo API is rate-limited
    per IP (yfinance/multi.py:166)
  - DEBUG logging disables threads for readability of interleaved log output (yfinance/multi.py:124)
  - ignore_tz default based on interval type preserves timezone for intraday but strips
    for daily data (yfinance/multi.py:132)
  acceptance_hints:
  - Multiple tickers downloaded in parallel when threads=True
  - MultiIndex DataFrame has ticker symbols as outer level
  - Progress bar displays during download
  - Errors are aggregated and accessible after completion
