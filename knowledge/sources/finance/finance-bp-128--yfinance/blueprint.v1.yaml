  responsibility: Real-time price streaming via Yahoo Finance WebSocket API with separate
    sync and async implementations for event loop compatibility.
  interface:
    inputs:
    - ticker symbols to subscribe
    outputs:
    - Real-time price updates via callback or async iteration
  required_methods:
  - name: WebSocket.connect
    description: Establishes WebSocket connection to Yahoo streamer
    evidence: yfinance/live.py:220(class WebSocket)
  - name: WebSocket.subscribe
    description: Subscribes to real-time updates for given ticker symbols
    evidence: yfinance/live.py:220(class WebSocket)
  - name: AsyncWebSocket.connect
    description: Async version of WebSocket connection for async/await compatibility
    evidence: yfinance/live.py:42(class AsyncWebSocket)
  key_behaviors:
  - behavior: Separate sync/async classes
    description: AsyncWebSocket and WebSocket are separate classes because async and
      sync event loops don't mix; provides clean API for each paradigm
    evidence: yfinance/live.py:42(AsyncWebSocket)
  - behavior: Protocol Buffers decoding
    description: Yahoo uses Protocol Buffers for efficient binary encoding of price
      updates; messages decoded using protobuf
    evidence: yfinance/live.py:24(_decode_message)
  - behavior: Common message decoding
    description: BaseWebSocket provides common message decoding logic shared by both
      sync and async implementations
    evidence: yfinance/live.py:15(class BaseWebSocket)
  replaceable_points:
  - name: websocket_url
    description: Endpoint URL for WebSocket streaming connection
    options:
    - name: wss://streamer.finance.yahoo.com
      traits:
      - Default
      - Official
      fit_for:
      - Standard streaming
      not_fit_for:
      - Alternative providers
    - name: custom endpoint
      traits:
      - Alternative
      fit_for:
      - Testing
      - Custom providers
      not_fit_for:
      - Production Yahoo streaming
    default: wss://streamer.finance.yahoo.com
  design_decisions:
  - Separate sync/async classes provide clean APIs for each event loop paradigm (yfinance/live.py:42)
  - Protocol Buffers message decoding enables efficient binary encoding of real-time
    price updates (yfinance/live.py:24)
  acceptance_hints:
  - WebSocket connection establishes successfully
  - Price updates received in real-time
  - Async and sync implementations work correctly in their respective event loops
- id: caching
  name: Caching Layer
  order: 9
  responsibility: SQLite-based caching for timezone data, cookies, and ISIN lookups
    to reduce API calls and improve performance across sessions.
  interface:
    inputs:
    - cache key (ticker symbol, ISIN, etc.)
    outputs:
    - cached value or None if not found
  required_methods:
  - name: _TzCache.get
    description: Retrieves cached timezone for ticker symbol
    evidence: yfinance/cache.py:119(class _TzCache)
  - name: _TzCache.set
    description: Stores timezone in cache with ticker key
    evidence: yfinance/cache.py:119(class _TzCache)
  - name: _ISINCache.lookup
    description: Looks up ticker symbol from ISIN with Business Insider scraping fallback
    evidence: yfinance/cache.py:521(class _ISINCache)
  - name: _CookieCache.get
    description: Retrieves cached session cookies
    evidence: yfinance/cache.py:325(class _CookieCache)
  key_behaviors:
  - behavior: Dummy cache fallback
    description: If SQLite cache initialization fails (permissions), _TzCacheDummy
      allows operation without persistence
    evidence: yfinance/cache.py:23(_TzCacheDummy)
  - behavior: Peewee ORM for SQLite
    description: Uses lightweight peewee ORM instead of raw SQL for cross-platform
      compatibility
    evidence: yfinance/cache.py:110(_TZ_KV)
  - behavior: ISIN lookup with fallback
    description: ISIN-to-ticker resolution scrapes Business Insider as fallback; cached
      after first success
    evidence: yfinance/base.py:557(businessinsider_url)
  replaceable_points:
  - name: cache_backend
    description: Storage mechanism for cached data
    options:
    - name: SQLite
      traits:
      - Persistent
      - Cross-platform
      - Peewee ORM
      fit_for:
      - Production
      - Multi-session
      not_fit_for:
      - Memory-only
      - Distributed
    - name: disabled
      traits:
      - No persistence
      - Memory only
      fit_for:
      - Testing
      - One-off scripts
      not_fit_for:
      - Repeated lookups
    default: SQLite
  design_decisions:
  - Dummy cache fallback ensures operation continues if cache initialization fails
    due to permissions (yfinance/cache.py:23)
  - Peewee ORM for SQLite provides lightweight cross-platform persistence without
    raw SQL (yfinance/cache.py:110)
  acceptance_hints:
  - Timezone lookups return cached values on repeat requests
  - ISIN lookups are cached after first Business Insider scrape
  - Cache initialization failure falls back gracefully to dummy cache
