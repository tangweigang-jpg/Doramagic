# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-080
name: FinDKG / KGTransformer
sop_version: '3.6'
source:
  projects:
  - FinDKG
  commit_hash: bd75205b7ca15681fb071b2f7ac3d1cdf2044118
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Temporal Knowledge Graph Completion and Link Prediction
  description: A dynamic knowledge graph library implementing KGTransformer for temporal knowledge graphs
    in the financial domain, enabling temporal link prediction and inter-event time forecasting over evolving
    entity relationships.
  prerequisites: Python 3.8+, PyTorch 1.8+, DGL 0.8+, CUDA 11.0+ for GPU training; familiarity with knowledge
    graphs, GNNs, and temporal modeling concepts
  not_suitable_for: Static knowledge graphs without temporal dimensions, real-time streaming predictions,
    non-graph-based time series forecasting, or applications requiring interpretable rule-based reasoning
stages:
- id: data_loading
  name: Data Loading & Temporal Graph Construction
  order: 1
  responsibility: Loads temporal knowledge graph data from files and constructs DGL graph with temporal
    edge masks for train/val/test splits. Temporal KGs require time-ordered processing to prevent data
    leakage from future events.
  interface:
    inputs:
    - graph_name (str) - dataset identifier, data_root (path) - directory containing TSV files
    outputs:
    - 'DGLGraph with edata: rel_type, time, train_mask, val_mask, test_mask; ndata: node_type; attributes:
      num_relations, num_all_nodes, time_interval'
  required_methods:
  - name: load_temporal_knowledge_graph
    description: Main loader function that reads TSV files and constructs a DGL graph with temporal edges,
      node types, and time-based train/val/test splits
    evidence: DKG/data.py:15(load_temporal_knowledge_graph)
  - name: load_data_table
    description: Loads tabular data from TSV files using pandas with column validation for head, rel,
      tail, time
    evidence: DKG/data.py:76(load_data_table)
  - name: get_edge_mask
    description: Creates binary masks for train/val/test splits based on chronological ordering of edge
      timestamps
    evidence: DKG/data.py:81(get_edge_mask)
  key_behaviors:
  - behavior: Time-based train/val/test split
    description: Edges are sorted by timestamp and split chronologically to ensure no future data leakage.
      This is critical for temporal KG evaluation where predicting past events from future information
      would be invalid.
    evidence: DKG/data.py:60-67(G.train_times)
  - behavior: Multi-entity type handling for FinDKG
    description: FinDKG dataset contains 12 different entity types (companies, events, metrics, etc.)
      requiring type-aware graph construction, while other datasets use single node type
    evidence: DKG/data.py:45-54(G.num_node_types)
  - behavior: Time interval normalization
    description: Stores time_interval as minimum difference between unique timestamps, used as normalization
      factor for temporal encoding in inter-event time calculations
    evidence: DKG/data.py:57-58(G.time_interval)
  replaceable_points:
  - name: data_format
    description: Input file format for knowledge graph edges
    options:
    - name: TSV
      traits:
      - tab-separated
      - human-readable
      - standard for knowledge graphs
      fit_for:
      - small to medium datasets
      - debugging and inspection
      not_fit_for:
      - large-scale production data
      - compressed storage needs
    - name: Parquet
      traits:
      - columnar format
      - compressed
      - fast read
      fit_for:
      - large datasets
      - cloud storage optimization
      not_fit_for:
      - quick manual inspection
      - legacy systems
    - name: Neo4j export
      traits:
      - graph database format
      - native graph structure
      fit_for:
      - database integration
      - graph querying before modeling
      not_fit_for:
      - Direct PyTorch/DGL pipeline integration
    default: TSV
  design_decisions:
  - Time-based train/val/test split using edge timestamps prevents data leakage from future events (DKG/data.py:60-67)
  acceptance_hints:
  - DGLGraph has num_relations, num_all_nodes, and time_interval attributes set correctly
  - Every edges are sorted by time with train_edges < val_edges < test_edges temporally
  - Edge masks are boolean tensors with correct shapes
  - Time values are float32 and node types are integer types
- id: collation
  name: Data Collocation
  order: 2
  responsibility: Creates prior/batch/cumulative graphs from time-sliced edges for temporal training.
    Temporal KG training requires processing edges in chronological order with proper context windows.
  interface:
    inputs:
    - batch_times (timestamps) - timestamps for edges in this batch, G (entire graph) - full DGLGraph
      with each temporal edges
    outputs:
    - prior_G (edges strictly before batch window), batch_G (edges in batch window), cumul_G (each edges
      up to batch end), batch_times
  required_methods:
  - name: collate_fn
    description: 'Creates subgraph views for each training batch: prior graph for context, batch graph
      for prediction targets, cumulative graph for evolving state'
    evidence: DKG/utils/model_utils.py:7(collate_fn)
  key_behaviors:
  - behavior: Triple subgraph architecture
    description: Prior graph provides historical context before the batch window; batch graph contains
      the target edges to predict; cumulative graph tracks evolving entity state throughout the sequence
    evidence: DKG/utils/model_utils.py:18-28(edge_subgraph)
  - behavior: Orphan node exclusion
    description: Batch graph excludes orphaned nodes (preserve_nodes=False) to reduce graph size for efficient
      batch processing while maintaining structural connectivity
    evidence: DKG/utils/model_utils.py:22(preserve_nodes=False)
  - behavior: Degree normalization pre-computation
    description: Pre-computes degree normalization for RGCN which is shared across each GNN layers, avoiding
      redundant computation during forward passes
    evidence: DKG/utils/model_utils.py:19(comp_deg_norm)
  replaceable_points:
  - name: batch_time_window
    description: How many timestamps are grouped per training batch
    options:
    - name: multiple_timestamps
      traits:
      - DataLoader-based batching
      - efficient GPU utilization
      fit_for:
      - Standard training scenarios
      - balanced batch sizes
      not_fit_for:
      - Single event prediction
      - fine-grained temporal modeling
    - name: single_timestamp
      traits:
      - Event-by-event processing
      - maximum temporal resolution
      fit_for:
      - Fine-grained temporal analysis
      - event sequence modeling
      not_fit_for:
      - Large graphs
      - computational efficiency
    default: multiple_timestamps via DataLoader
  design_decisions:
  - 'Strict temporal ordering: prior_G < batch_G <= cumul_G ensures correct temporal semantics for prediction
    (DKG/utils/model_utils.py:7-30)'
  acceptance_hints:
  - prior_G edges have strictly earlier timestamps than batch_G edges
  - cumul_G contains each edges from prior_G and batch_G
  - Graph attributes (num_relations, num_all_nodes, time_interval) are copied to each subgraph views
- id: embedding_updater
  name: Dynamic Embedding Updater
  order: 3
  responsibility: Updates entity and relation embeddings by processing batch graphs through structural
    and temporal GNN-RNN layers. Captures both graph structure evolution and temporal dynamics in separate
    embedding spaces.
  interface:
    inputs:
    - prior_G, batch_G, cumul_G (subgraphs), cumul_dynamic_emb (previous state), static_emb (frozen),
      dynamic_relation_emb, node_latest_event_time
    outputs:
    - MultiAspectEmbedding namedtuple with .structural and .temporal fields for entities and relations
  required_methods:
  - name: EmbeddingUpdater.forward
    description: Main orchestrator that coordinates structural and temporal GNN layers plus relation RNN
      to produce updated multi-aspect embeddings
    evidence: DKG/model/embedding.py:22(EmbeddingUpdater)
  - name: GraphStructuralRNNConv.forward
    description: GNN layer (RGCN or KGTransformer) followed by RNN for capturing structural dynamics over
      time
    evidence: DKG/model/embedding.py:176(GraphStructuralRNNConv)
  - name: GraphTemporalRNNConv.forward
    description: GNN layer with inter-event time encoding for temporal dynamics, tracking when events
      occur vs structural patterns of who connects
    evidence: DKG/model/embedding.py:258(GraphTemporalRNNConv)
  - name: RelationRNN.update
    description: Updates relation embeddings by aggregating entity embeddings per relation type using
      attention-weighted mean
    evidence: DKG/model/embedding.py:372(RelationRNN)
  - name: EventTimeHelper.compute_inter_event_times
    description: Computes inter-event times between consecutive events for each entity, maintaining node_latest_event_time
      tensor for temporal encoding
    evidence: DKG/model/embedding.py:424(EventTimeHelper)
  key_behaviors:
  - behavior: Dual embedding architecture
    description: Structural embeddings capture patterns of who connects to whom (static graph topology),
      while temporal embeddings capture when events occur (temporal dynamics). These evolve differently
      and require separate update mechanisms.
    evidence: DKG/model/embedding.py:71-96(graph_structural_conv vs graph_temporal_conv)
  - behavior: Bidirectional temporal tracking
    description: node_latest_event_time tensor has shape [num_nodes, num_nodes+1, 2] where [...,0] tracks
      events as recipient and [...,1] tracks events as sender. Entity dynamics differ based on whether
      they initiated or received an event.
    evidence: DKG/model/model.py:100-103(node_latest_event_time)
  - behavior: Log transform normalization
    description: Inter-event times are right-skewed; log transform makes distribution more Gaussian for
      better neural network learning. This is assumed throughout the temporal modeling pipeline.
    evidence: DKG/model/time_interval_transform.py:28-29(log_transform)
  - behavior: Dynamic embeddings on CPU
    description: Dynamic embeddings must stay on CPU except during batch forward passes. This is a memory
      optimization invariant - large temporal graphs with many nodes would cause OOM if embeddings were
      kept on GPU.
    evidence: DKG/model/embedding.py:120(assert emb.device == torch.device('cpu'))
  replaceable_points:
  - name: gnn_architecture
    description: Graph convolution layer type for message passing
    options:
    - name: KGTransformer
      traits:
      - Multi-head attention
      - typed projections
      - 100 basis for RGCN
      fit_for:
      - Typed knowledge graphs like FinDKG
      - complex relational patterns
      not_fit_for:
      - Simple homogeneous graphs
      - Memory-constrained environments
    - name: RGCN
      traits:
      - Basis decomposition
      - 50 bases for GDELT, 100 for others
      fit_for:
      - Standard knowledge graphs
      - resource-limited settings
      not_fit_for:
      - Multi-entity typed graphs
      - fine-grained relation modeling
    - name: None (identity)
      traits:
      - No transformation
      - passes through embeddings
      fit_for:
      - Ablation studies
      - testing structural vs temporal contributions
      not_fit_for:
      - Production use
      - any graph with structure
    default: KGTransformer
  - name: rnn_cell_type
    description: Recurrent cell type for temporal dynamics
    options:
    - name: RNN
      traits:
      - Simple recurrent
      - single gate
      fit_for:
      - Standard temporal modeling
      - faster training
      not_fit_for:
      - Long-term dependencies
      - complex temporal patterns
    - name: GRU
      traits:
      - Gated recurrent
      - better long-term memory
      fit_for:
      - Complex temporal dependencies
      - improved gradient flow
      not_fit_for:
      - Simple sequences
      - computational efficiency priority
    default: RNN
  - name: inter_event_time_mode
    description: How to compute inter-event times between consecutive entity events
    options:
    - name: node2node_inter_event_times
      traits:
      - Pair-wise times
      - sender-recipient specific
      fit_for:
      - Detailed temporal modeling
      - entity-pair specific predictions
      not_fit_for:
      - Coarse temporal granularity
      - simpler time modeling
    - name: min_inter_event_times
      traits:
      - Minimum time to any event
      - simpler aggregation
      fit_for:
      - Fast computation
      - coarse temporal patterns
      not_fit_for:
      - Fine-grained pair-specific predictions
    default: node2node_inter_event_times
  design_decisions:
  - Separate structural and temporal embeddings with different update mechanisms capture different aspects
    of knowledge graph evolution (DKG/model/embedding.py:71-96)
  - Bidirectional temporal encoding using [sender, recipient] pair structure is required by TPP model
    and RelationRNN (DKG/model/embedding.py:357-359)
  acceptance_hints:
  - MultiAspectEmbedding namedtuple contains both .structural and .temporal fields
  - Dynamic embeddings are on CPU after forward pass completion
  - node_latest_event_time tensor has shape [num_nodes, num_nodes+1, 2]
  - Log-transformed inter-event times are within expected numerical ranges
- id: gnn_convolution
  name: Graph Neural Network Convolution
  order: 4
  responsibility: Performs message passing on knowledge graphs with typed edges and nodes. Different relation
    types require different message functions and attention patterns to capture heterogeneous graph structure.
  interface:
    inputs:
    - DGLGraph, node_embeddings, node_types, edge_types, edge_norm (optional)
    outputs:
    - Updated node embeddings after graph convolution with type-aware transformations
  required_methods:
  - name: RGCN.forward
    description: Relational Graph Convolutional Network using basis decomposition to share parameters
      across relation types while maintaining type-specific transformations
    evidence: DKG/model/gnn/rgcn.py:7(RGCN)
  - name: KGTransformer.forward
    description: Multi-layer Knowledge Graph Transformer with typed attention where each relation type
      has separate key/query projections and priority scores
    evidence: DKG/model/gnn/kgt.py:24(KGTransformer)
  - name: GraphTransformer.layer
    description: Single transformer layer with TypedLinear projections for nodes and edges, implementing
      relation-aware attention with learnable skip weights
    evidence: DKG/model/gnn/kgt.py:95(GraphTransformer)
  key_behaviors:
  - behavior: Type-specific linear projections
    description: TypedLinear applies different linear transformations per node/edge type, allowing different
      entity types (e.g., company vs event) to have different semantic role representations
    evidence: DKG/model/gnn/kgt.py:171-173(TypedLinear)
  - behavior: Relation-aware attention
    description: Attention mechanism uses relation_pri (priority), separate K/Q projections per relation
      (relation_att), and relation-specific message functions (relation_msg) to modulate how much attention
      to pay to incoming messages
    evidence: DKG/model/gnn/kgt.py:181-195(relation_pri, relation_att, relation_msg)
  - behavior: Learnable skip connections
    description: Residual connections with learnable skip weight per node type allow the model to learn
      when to use transformed vs original features, adaptive to each entity type
    evidence: DKG/model/gnn/kgt.py:196,272-276(skip)
  - behavior: Time decay factor
    description: 'Edge normalization in temporal convolution applies time decay: longer time since last
      interaction means weaker influence on current embedding'
    evidence: DKG/model/embedding.py:319(edge_norm)
  replaceable_points:
  - name: gnn_layer
    description: Message passing mechanism for node feature aggregation
    options:
    - name: KGTransformer (TypedLinear attention)
      traits:
      - Multi-head typed attention
      - learnable skip weights
      - SiLU activation
      fit_for:
      - FinDKG and multi-entity graphs
      - complex relational patterns
      not_fit_for:
      - Homogeneous graphs
      - simple structure
    - name: RelGraphConv (RGCN)
      traits:
      - Basis decomposition
      - efficient for many relations
      fit_for:
      - Standard knowledge graphs
      - memory efficiency
      not_fit_for:
      - Typed entity graphs
      - fine-grained type differences
    default: KGTransformer
  design_decisions:
  - SiLU (Swish) activation instead of ReLU provides smooth gradients and often outperforms on transformer
    architectures (DKG/model/gnn/kgt.py:47)
  acceptance_hints:
  - Output embeddings maintain the same dimension as input (200 by default)
  - Type-specific projections are applied correctly for FinDKG's 12 node types
  - Attention weights sum to 1.0 across valid edges
  - Skip weights are in valid range [0, 1] after sigmoid
- id: embedding_combination
  name: Static-Dynamic Embedding Combination
  order: 5
  responsibility: Combines structural and temporal embeddings into unified representations for prediction.
    Both static patterns and temporal dynamics contribute to link prediction quality.
  interface:
    inputs:
    - static_emb (structural), dynamic_emb (temporal), DGLGraph (optional for second-pass convolution)
    outputs:
    - Combined embedding of dimension static_emb_dim + dynamic_emb_dim (or variants based on mode)
  required_methods:
  - name: Combiner.forward
    description: Orchestrates graph convolution and static-dynamic combination, optionally applying a
      second GNN pass after combination to refine representations
    evidence: DKG/model/model.py:244(Combiner)
  - name: StaticDynamicCombiner.combine
    description: 'Implements different combination modes: concatenation, static-only selection, or dynamic-only
      selection for different inference scenarios'
    evidence: DKG/model/model.py:293(StaticDynamicCombiner)
  - name: GraphReadout.readout
    description: Aggregates node embeddings into graph-level representation using weighted sum with learnable
      gating for soft node selection
    evidence: DKG/model/model.py:328(GraphReadout)
  key_behaviors:
  - behavior: Configurable combination modes
    description: Supports concat (both), static_only, and dynamic_only modes to balance between static
      structural patterns and dynamic temporal information based on dataset characteristics
    evidence: DKG/model/model.py:300-313(mode)
  - behavior: Optional second-pass convolution
    description: After initial combination, an optional graph convolution pass can refine representations
      using graph structure on the combined embeddings
    evidence: DKG/model/model.py:253-264(graph_conv)
  - behavior: Weighted sum with gating
    description: Graph readout uses learnable gating to softly select which nodes contribute most to the
      graph-level embedding, adaptive to the prediction task
    evidence: DKG/model/model.py:346-352(weighted_sum)
  replaceable_points:
  - name: combination_mode
    description: How to merge static and dynamic embeddings
    options:
    - name: concat
      traits:
      - Preserves both aspects
      - larger embedding dimension
      fit_for:
      - Standard use
      - maximum information retention
      not_fit_for:
      - Memory-constrained
      - fast inference
    - name: static_only
      traits:
      - Fixed embeddings
      - no temporal evolution
      fit_for:
      - Ablation studies
      - static graph comparison
      not_fit_for:
      - Temporal prediction tasks
    - name: dynamic_only
      traits:
      - Evolving embeddings
      - temporal context only
      fit_for:
      - Time-only evaluation
      - simpler model
      not_fit_for:
      - Link prediction with structural context
    default: concat
  - name: graph_readout_operation
    description: Aggregation function for combining node embeddings into graph-level representation
    options:
    - name: max
      traits:
      - Element-wise max
      - captures strongest signals
      fit_for:
      - Default readout
      - robust to outliers
      not_fit_for:
      - Need for average behavior
    - name: min
      traits:
      - Element-wise min
      - captures weakest signals
      fit_for:
      - Anomaly detection
      - rare pattern identification
      not_fit_for:
      - General purpose
    - name: mean
      traits:
      - Average pooling
      - balanced aggregation
      fit_for:
      - Uniform node contributions
      not_fit_for:
      - Weighted importance needed
    - name: weighted_sum
      traits:
      - Learnable weights
      - adaptive aggregation
      fit_for:
      - Task-specific optimization
      - complex node importance
      not_fit_for:
      - Simplicity priority
      - quick prototyping
    default: max
  design_decisions:
  - Multi-head attention uses 8 heads by default for parallel capture of different relation patterns (DKG/model/model.py:54)
  acceptance_hints:
  - Combined embedding dimension matches expected size based on combination mode
  - Weighted sum weights are normalized and sum to approximately 1.0
  - Second-pass convolution produces stable gradients
- id: link_prediction
  name: Temporal Link Prediction
  order: 6
  responsibility: Predicts links (head, relation, tail) in the knowledge graph using learned embeddings.
    Core task for knowledge graph completion over time, treating it as multi-class classification.
  interface:
    inputs:
    - DGLGraph, combined_emb, static_emb, dynamic_emb, dynamic_relation_emb, edge_ids
    outputs:
    - Log probabilities for head prediction (num_edges, num_nodes), relation prediction (num_edges, num_relations),
      tail prediction (num_edges, num_nodes)
  required_methods:
  - name: EdgeModel.forward
    description: Dynamic edge prediction using combined embeddings and relation embeddings to compute
      log probabilities for head, relation, and tail entities
    evidence: DKG/model/model.py:371(EdgeModel)
  - name: StaticEdgeModel.forward
    description: Static-only edge prediction baseline that ignores temporal dynamics for comparison
    evidence: DKG/model/model.py:468(StaticEdgeModel)
  key_behaviors:
  - behavior: Decomposed prediction
    description: 'Treats knowledge graph completion as three separate classification subtasks: log_prob_head,
      log_prob_rel, log_prob_tail. This enables analysis of which aspect of prediction fails and targeted
      improvement.'
    evidence: DKG/model/model.py:408-435
  - behavior: Weighted loss combination
    description: Tail prediction (weight=1.0) is most important as primary link completion target; relation
      prediction (weight=0.2) provides intermediate signal; head prediction (weight=0.1) is easiest due
      to symmetry so lower weight
    evidence: DKG/model/model.py:459(log_prob)
  - behavior: Graph-level context integration
    description: Graph-level embedding from readout is concatenated with edge embeddings to incorporate
      global context for disambiguating local patterns
    evidence: DKG/model/model.py:437-438(graph_emb)
  replaceable_points:
  - name: edge_model_type
    description: Whether to use dynamic or static edge prediction model
    options:
    - name: EdgeModel (dynamic)
      traits:
      - Uses combined embeddings
      - temporal context
      fit_for:
      - Standard temporal link prediction
      - FinDKG evaluation
      not_fit_for:
      - Static graph comparison baseline
    - name: StaticEdgeModel
      traits:
      - Static embeddings only
      - no temporal evolution
      fit_for:
      - Baseline comparison
      - non-temporal graphs
      not_fit_for:
      - Temporal knowledge graphs
    default: EdgeModel
  design_decisions:
  - Cross-entropy loss for multi-class entity/relation classification frames link prediction as classification
    over each possible entities/relations (DKG/model/model.py:406)
  acceptance_hints:
  - Log probabilities sum to valid values (log of probability mass)
  - Tail prediction has highest weight and dominates the loss
  - Graph context embedding is correctly sized and concatenated
  - Loss weights tail=1.0, rel=0.2, head=0.1 are applied as expected
- id: temporal_prediction
  name: Inter-Event Time Prediction (TPP)
  order: 7
  responsibility: Predicts when the next event will occur given current graph state. Temporal KGs need
    to model event timing for complete temporal reasoning beyond just what links form.
  interface:
    inputs:
    - DGLGraph, temporal_dynamic_emb, temporal_static_emb, relation_emb, node_latest_event_time
    outputs:
    - log_prob_density (for evaluation), log_prob_interval (for training), expected_event_time
  required_methods:
  - name: InterEventTimeModel.forward
    description: Wrapper that combines embeddings into context vector and delegates to TPP model for time
      prediction
    evidence: DKG/model/model.py:540(InterEventTimeModel)
  - name: LogNormMixTPP.forward
    description: Temporal Point Process using LogNormal mixture distribution to model inter-event time
      probability
    evidence: DKG/model/tpp/log_norm_mix_tpp.py:11(LogNormMixTPP)
  - name: LogNormalMixtureDistribution.sample/log_prob
    description: PyTorch distribution implementing mixture of log-normals with affine transforms for flexible
      temporal distribution modeling
    evidence: DKG/model/tpp/log_norm_mix_tpp.py:200(LogNormalMixtureDistribution)
  key_behaviors:
  - behavior: LogNormal mixture distribution
    description: Inter-event times are positive and right-skewed; log-normal distribution captures this
      well. Mixture of 128 components provides high capacity for modeling complex temporal patterns across
      different relation types.
    evidence: DKG/model/tpp/log_norm_mix_tpp.py:54-72
  - behavior: Pair-specific context
    description: Context vector for TPP is constructed from [sender_emb, recipient_emb, rel_emb, dyn_rel_emb],
      acknowledging that event timing depends on who interacts with whom and the nature of their relationship
    evidence: DKG/model/tpp/log_norm_mix_tpp.py:123-124(context)
  - behavior: Interval-based probability training
    description: Training uses CDF difference for interval probability (P(t < event <= t+dt)) which is
      more robust than point probability, accounting for discrete time intervals in the data
    evidence: DKG/model/tpp/log_norm_mix_tpp.py:160-166(prob_interval)
  - behavior: Separate density and interval methods
    description: log_prob_density used for time prediction evaluation (gradient-based); log_prob_interval
      used for training loss (more stable with discrete time bins)
    evidence: DKG/model/model.py:557-567
  replaceable_points:
  - name: tpp_distribution_family
    description: Probability distribution family for modeling inter-event times
    options:
    - name: LogNormMixTPP
      traits:
      - Log-normal mixture
      - 128 components
      - affine transforms
      fit_for:
      - Standard temporal prediction
      - right-skewed time distributions
      not_fit_for:
      - Multi-modal time distributions
      - non-positive times
    default: LogNormMixTPP
  - name: inter_event_time_mode
    description: How to aggregate sender/recipient times for context
    options:
    - name: node2node_inter_event_times
      traits:
      - Pair-specific times
      - fine-grained
      fit_for:
      - Entity-pair specific predictions
      - detailed temporal modeling
      not_fit_for:
      - GDELT dataset
      - computational efficiency
    - name: min_inter_event_times
      traits:
      - Minimum time aggregation
      - coarse
      fit_for:
      - Fast computation
      - simple temporal patterns
      not_fit_for:
      - Fine-grained predictions
    default: node2node_inter_event_times
  design_decisions:
  - LogNormal mixture with 128 components provides high capacity for modeling complex temporal patterns
    (DKG/model/model.py:51)
  acceptance_hints:
  - Inter-event times are positive and properly log-transformed
  - Mixture components sum to valid probability distributions
  - Expected event time is in valid time range
  - Separate methods produce consistent density and interval probabilities
- id: training_pipeline
  name: Training Pipeline
  order: 8
  responsibility: Orchestrates temporal sequential training with truncated BPTT, early stopping, and checkpointing.
    RNNs over long temporal sequences require truncated backpropagation to prevent vanishing gradients.
  interface:
    inputs:
    - args (hyperparameters), data_loaders (train/val/test)
    outputs:
    - Trained model checkpoint with best validation performance, updated model state
  required_methods:
  - name: main
    description: Main training loop that iterates over epochs, calls forward_graphs for training batches,
      evaluates on validation set, and implements early stopping
    evidence: DKG/train.py:29(main)
  - name: compute_loss
    description: Computes edge prediction loss and time prediction loss for a batch, following the predict-then-update
      contract
    evidence: DKG/train.py:368(compute_loss)
  - name: forward_graphs
    description: Forward-only pass for validation that updates embedding state without computing losses,
      used for pre-populating embeddings before evaluation
    evidence: DKG/train.py:302(forward_graphs)
  - name: EarlyStopping.check
    description: Tracks best checkpoint based on validation metric and implements patience-based early
      stopping
    evidence: DKG/utils/train_utils.py:10(EarlyStopping)
  key_behaviors:
  - behavior: Predict-then-update execution order
    description: compute_loss MUST be called BEFORE embedding_updater.forward for each batch. Reversing
      this order causes data leakage - the model would predict using embeddings that already incorporate
      batch information.
    evidence: DKG/train.py:184-221
  - behavior: Truncated BPTT
    description: Dynamic embeddings are detached (detach_()) every rnn_truncate_every batches to cut gradient
      flow between truncations, preventing vanishing gradients over long sequences while keeping memory
      manageable
    evidence: DKG/train.py:197-212(emb.detach_() at line 212)
  - behavior: Dual optimizer architecture
    description: edge_optimizer and time_optimizer track parameters separately with independent learning
      rates, allowing independent tuning of link prediction vs time prediction
    evidence: DKG/train.py:131-132(two AdamW optimizers)
  - behavior: Equal loss aggregation
    description: Total loss sums each loss components equally (sum(dict.values())), meaning edge and time
      losses have equal weight in total optimization objective
    evidence: DKG/train.py:191(batch_train_loss += sum(batch_train_loss_dict.values()))
  replaceable_points:
  - name: optimize_target
    description: Which loss components to optimize
    options:
    - name: both
      traits:
      - Edge and time loss
      - joint optimization
      fit_for:
      - Full model training
      - temporal link and time prediction
      not_fit_for:
      - Link prediction only
      - time prediction only
    - name: edge
      traits:
      - Link prediction only
      - faster training
      fit_for:
      - Link prediction ablation
      - non-temporal graphs
      not_fit_for:
      - Temporal prediction tasks
      - complete evaluation
    - name: time
      traits:
      - Time prediction only
      - isolated temporal modeling
      fit_for:
      - Temporal prediction ablation
      - time-only evaluation
      not_fit_for:
      - Link prediction tasks
      - complete evaluation
    default: both
  - name: early_stop_criterion
    description: Metric to track for early stopping decision
    options:
    - name: MRR
      traits:
      - Mean Reciprocal Rank
      - comprehensive ranking metric
      fit_for:
      - Standard link prediction
      - full model evaluation
      not_fit_for:
      - Time-only models
      - loss-focused training
    - name: loss
      traits:
      - Training loss
      - directly optimized
      fit_for:
      - Time-only models
      - quick convergence
      not_fit_for:
      - Ranking-based evaluation
      - link prediction focus
    - name: MAE
      traits:
      - Mean Absolute Error
      - regression metric
      fit_for:
      - Time prediction focus
      - regression evaluation
      not_fit_for:
      - Link prediction evaluation
      - classification focus
    default: MRR
  design_decisions:
  - Truncated BPTT every 100 batches prevents vanishing gradients while maintaining manageable memory
    (DKG/train.py:197)
  - AdamW optimizer with weight_decay=0.00001 provides light regularization to prevent overfitting on
    small temporal KG datasets (DKG/train.py:131)
  acceptance_hints:
  - Loss values decrease over training epochs
  - Early stopping triggers after patience epochs without improvement
  - Best checkpoint is saved with highest validation MRR
  - Truncated BPTT produces stable gradients without exploding values
- id: evaluation
  name: Evaluation & Metrics
  order: 9
  responsibility: Computes link prediction and time prediction metrics for validation/test. Requires proper
    temporal handling and memory management for full evaluation against each entities.
  interface:
    inputs:
    - model, data_loader, entire_graph, embeddings, args, phase (train/val/test)
    outputs:
    - eval_dict with MRR, REC@k, MAE, RMSE; updated embeddings for next batch
  required_methods:
  - name: evaluate
    description: Main evaluation function that orchestrates loss computation, link prediction evaluation,
      and time prediction evaluation phases
    evidence: DKG/eval.py:16(evaluate)
  - name: eval_link_prediction
    description: Computes edge rankings by scoring true tail against ALL possible entities, with optional
      time score combination for joint evaluation
    evidence: DKG/eval.py:155(eval_link_prediction)
  - name: EdgeEvaluator.evaluate_edges
    description: Batched edge evaluation with memory-aware chunking using MAX_EDGES limit to handle CPU/GPU
      memory constraints
    evidence: DKG/eval.py:442(EdgeEvaluator)
  - name: RankingMetric.compute
    description: Computes MRR (Mean Reciprocal Rank) and Recall@k (percentage of correct entities in top-k
      predictions)
    evidence: DKG/utils/eval_utils.py:1(RankingMetric)
  - name: RegressionMetric.compute
    description: Computes MAE (Mean Absolute Error) and RMSE (Root Mean Squared Error) for time prediction
      evaluation
    evidence: DKG/utils/eval_utils.py:1(RegressionMetric)
  key_behaviors:
  - behavior: Full link prediction evaluation
    description: Ranks true tail against ALL possible entities (entire_G.num_nodes()) rather than sampled
      negatives. This is the gold standard for knowledge graph completion evaluation.
    evidence: DKG/eval.py:191(entire_G.num_nodes())
  - behavior: Weighted score combination
    description: During joint evaluation, entity and time scores can be combined with learned weights
      to explore optimal trade-off between link and time prediction signals
    evidence: DKG/eval.py:254-256(pred)
  - behavior: Auto-discovered loss weights
    description: Optimal edge/time weight combination is found via grid search on validation set without
      manual tuning, adapting to dataset characteristics
    evidence: DKG/eval.py:131-136(loss_weights)
  - behavior: Memory-aware batching
    description: Full matrix computation is split into chunks using MAX_EDGES limit to respect CPU/GPU
      memory constraints during evaluation
    evidence: DKG/eval.py:454-458(MAX_EDGES)
  replaceable_points:
  - name: evaluation_mode
    description: What aspects to evaluate
    options:
    - name: both
      traits:
      - Link and time prediction
      - full evaluation
      fit_for:
      - Complete model evaluation
      - publication results
      not_fit_for:
      - Quick iteration
      - single-aspect debugging
    - name: edge
      traits:
      - Link prediction only
      - default mode
      fit_for:
      - Link prediction focus
      - fast evaluation
      not_fit_for:
      - Time prediction tasks
      - complete analysis
    - name: time
      traits:
      - Time prediction only
      - temporal focus
      fit_for:
      - Time prediction ablation
      - temporal analysis
      not_fit_for:
      - Link prediction evaluation
    default: edge
  design_decisions:
  - eval='edge' by default means only link prediction is evaluated; must set eval='both' to enable joint
    evaluation (DKG/model/model.py:38)
  acceptance_hints:
  - MRR and Recall@k are computed against full entity set (not sampled)
  - Time prediction MAE/RMSE are in expected time unit ranges
  - Memory usage stays within GPU/CPU limits during batched evaluation
  - Metrics are consistent across multiple evaluation runs
data_flow:
- from_stage: data_loading
  to_stage: collation
  data: DGLGraph with edges sorted by time, train/val/test masks, node types, time_interval attribute
- from_stage: collation
  to_stage: embedding_updater
  data: prior_G (historical context), batch_G (batch edges), cumul_G (cumulative state), batch_times,
    degree normalization
- from_stage: embedding_updater
  to_stage: embedding_combination
  data: MultiAspectEmbedding containing .structural and .temporal tensors for entities and relations
- from_stage: embedding_combination
  to_stage: link_prediction
  data: Combined embeddings, static embeddings, dynamic embeddings, dynamic_relation_emb, graph_emb
- from_stage: embedding_combination
  to_stage: temporal_prediction
  data: Temporally-combined embeddings (temporal_dynamic_emb, temporal_static_emb, relation_emb) for TPP
    context
- from_stage: link_prediction
  to_stage: training_pipeline
  data: Edge log-likelihood loss (sum of head, rel, tail losses with weights)
- from_stage: temporal_prediction
  to_stage: training_pipeline
  data: Inter-event time log-likelihood loss (log_prob_interval)
- from_stage: training_pipeline
  to_stage: evaluation
  data: Trained model state with optimized parameters and embeddings after training
- from_stage: evaluation
  to_stage: training_pipeline
  data: Validation metrics (MRR, loss, MAE) for early stopping decision and checkpoint selection
global_contracts:
- contract: Every DGLGraphs must have num_relations, num_all_nodes, and time_interval attributes set and
    preserved across subgraph operations
  evidence: DKG/utils/model_utils.py:14-16(copy_attr)
- contract: Dynamic embeddings must be on CPU except during batch forward passes - this is a memory optimization
    invariant for large temporal graphs
  evidence: DKG/model/embedding.py:120(assert emb.device == torch.device('cpu'))
- contract: node_latest_event_time tensor shape is [num_nodes, num_nodes+1, 2] where [...,0] tracks events
    as recipient, [...,1] tracks events as sender, and [...,-1] tracks global latest time
  evidence: DKG/model/model.py:100-103
- contract: 'MultiAspectEmbedding namedtuple has required fields: .structural and .temporal (both must
    be present)'
  evidence: DKG/model/model.py:22
- contract: Time values in edge data must be float32; edge masks must be boolean tensors
  evidence: DKG/data.py:56(G.edata['time']), DKG/data.py:86(mask dtype)
- contract: 'Temporal ordering: prior_G < batch_G <= cumul_G for each subgraph operations - evaluation
    relies on this for temporal correctness'
  evidence: DKG/utils/model_utils.py:7-30(collate_fn), DKG/eval.py:182-184
- contract: 'Predict-then-update: compute_loss must be called before embedding_updater.forward for each
    batch - reversing causes data leakage'
  evidence: DKG/train.py:184-221
- contract: Log-transformed inter-event times are assumed throughout temporal modeling - changing to linear
    would break expected_event_time reverse_transform
  evidence: DKG/model/time_interval_transform.py:28-29, DKG/model/tpp/log_norm_mix_tpp.py:140
- contract: Edge loss weights tail=1.0, rel=0.2, head=0.1 are hardcoded in EdgeModel.forward - changing
    requires code modification
  evidence: DKG/model/model.py:459(log_prob)
business_decisions:
- id: BD-001
  type: B/RC
  content: Time-based train/val/test split using edge timestamps
  rationale: Temporal knowledge graphs require chronological splitting to prevent data leakage from future
    events. Using edge timestamps ensures the model is evaluated on its ability to predict future interactions
    based solely on historical data, which is essential for realistic performance estimation in production
    deployment where only past information is available.
  evidence: DKG/data.py:60-67(G.train_times)
  stage: data_loading
  alternative_considered: Random splitting would cause data leakage as future edges would appear in training
    set
  _evidence_issues:
  - 'FN_NOT_FOUND: G.train_times in DKG/data.py'
- id: BD-002
  type: B
  content: Separate node_type handling for FinDKG (12 types) vs others (1 type)
  rationale: FinDKG is a multi-entity knowledge graph containing companies, events, metrics, and other
    distinct entity types that require type-aware modeling. The heterogeneous nature of financial knowledge
    graphs means different entity types carry different semantic roles and structural patterns that must
    be captured separately for accurate link prediction.
  evidence: DKG/data.py:45-54(G.num_node_types)
  stage: data_loading
  alternative_considered: Treating each nodes uniformly would lose type semantics and reduce prediction
    accuracy
  _evidence_issues:
  - 'FN_NOT_FOUND: G.num_node_types in DKG/data.py'
- id: BD-003
  type: BA/M
  content: Store time_interval as minimum diff between unique timestamps
  rationale: Time intervals are used as normalization factors for temporal encoding in inter-event time
    calculations. Computing the minimum difference between unique timestamps provides the fundamental
    time unit that scales temporal features to a consistent range, preventing numerical instability in
    neural network training and ensuring temporal features remain comparable across datasets with different
    time granularities.
  evidence: DKG/data.py:57-58(G.time_interval)
  stage: data_loading
  alternative_considered: Fixed time unit would not adapt to dataset-specific temporal granularity
  _evidence_issues:
  - 'FN_NOT_FOUND: G.time_interval in DKG/data.py'
- id: BD-004
  type: B
  content: Separate structural and temporal embeddings with different update mechanisms
  rationale: Structural patterns representing who connects to whom evolve fundamentally differently than
    temporal patterns representing when events occur. Structural relationships tend to be more persistent
    (company ownership, organizational hierarchies) while temporal patterns capture event dynamics (trading
    activity, news impacts). Separating these allows each embedding space to capture its unique dynamics
    without interference.
  evidence: DKG/model/embedding.py:176(GraphStructuralRNNConv), DKG/model/embedding.py:258(GraphTemporalRNNConv)
  stage: embedding_updater
  alternative_considered: Joint embeddings would force competing update dynamics and reduce representational
    capacity
  _evidence_issues:
  - 'INVALID_IDENTIFIER: GraphStructuralRNNConv), DKG/model/embedding.py:258(GraphTemporalRNNConv in DKG/model/embedding.py'
- id: BD-005
  type: BA
  content: Store node_latest_event_time as [num_nodes, num_nodes+1, 2] tensor for bidirectional tracking
  rationale: The bidirectional tensor structure tracks entity dynamics separately for events as recipient
    ([...,0]) versus events as sender ([...,1]). This asymmetry captures the fundamental difference between
    receiving information versus initiating actions. The extra column handles global latest time for entities
    without outgoing or incoming edges, ensuring each temporal features remain well-defined regardless
    of edge direction patterns.
  evidence: DKG/model/model.py:100-103(node_latest_event_time)
  stage: embedding_updater
  alternative_considered: Scalar per-node would lose sender/recipient asymmetry critical for financial
    event modeling
  _evidence_issues:
  - 'FN_NOT_FOUND: node_latest_event_time in DKG/model/model.py'
- id: BD-006
  type: B
  content: Bidirectional temporal encoding (sender/recipient dynamics)
  rationale: Entity dynamics differ based on whether the entity initiated or received an event. In financial
    KGs, a company receiving negative news experiences different temporal dynamics than one initiating
    a merger announcement. Bidirectional encoding captures these asymmetric causal patterns, allowing
    the model to learn that information flow direction significantly impacts subsequent entity behavior
    and link formation probability.
  evidence: DKG/model/embedding.py:357-368(updated_temporal_dynamic)
  stage: embedding_updater
  alternative_considered: Unidirectional encoding would conflate sender and recipient dynamics, losing
    critical causal information
  _evidence_issues:
  - 'FN_NOT_FOUND: updated_temporal_dynamic in DKG/model/embedding.py'
- id: BD-007
  type: B
  content: Log transform of time intervals for normalization
  rationale: Time intervals in event sequences are right-skewed with heavy tails (many short intervals
    and few very long ones). The log transform makes this distribution more Gaussian, which is crucial
    for neural network learning since gradients flow better through normalized distributions. Without
    this transform, the network would struggle with the wide range of interval values and the concentration
    of small values near zero.
  evidence: DKG/model/time_interval_transform.py:28-29(log_transform)
  stage: embedding_updater
  alternative_considered: Raw intervals would cause gradient issues; min-max scaling would fail on outlier
    intervals
  _evidence_issues:
  - 'FN_NOT_FOUND: log_transform in DKG/model/time_interval_transform.py'
- id: BD-008
  type: B
  content: TypedLinear for node/edge type-specific linear projections in KGTransformer
  rationale: Different entity types in FinDKG (companies, events, metrics, executives) have fundamentally
    different semantic roles and feature distributions that require type-specific linear transformations
    before aggregation. A company embedding and an event embedding operate in different conceptual spaces,
    so applying uniform transformations would blur type-specific semantics and reduce the model's ability
    to learn type-appropriate representations.
  evidence: DKG/model/gnn/kgt.py:171-173(TypedLinear)
  stage: gnn_convolution
  alternative_considered: Shared linear projections would conflate type-specific semantics and reduce
    representation quality
  _evidence_issues:
  - 'FN_NOT_FOUND: TypedLinear in DKG/model/gnn/kgt.py'
  vague_rationale: true
- id: BD-009
  type: B
  content: Relation-aware attention with priority and separate K/Q projections per relation
  rationale: Relations modulate how much attention to pay to incoming messages during graph convolution.
    In financial KGs, a 'acquires' relation carries different semantic weight than 'mentions', requiring
    relation-specific query/key projections to compute appropriate attention weights. This allows the
    model to learn that certain relation types should dominate message aggregation while others should
    be discounted.
  evidence: DKG/model/gnn/kgt.py:24(KGTransformer.__init__)
  stage: gnn_convolution
  alternative_considered: Relation-agnostic attention would treat each edges equivalently, losing critical
    relational semantics
  vague_rationale: true
- id: BD-010
  type: BA
  content: SiLU (Swish) activation instead of ReLU
  rationale: SiLU (Sigmoid Linear Unit, also known as Swish) has smooth gradients and self-gating properties
    that often outperform ReLU on transformer-style architectures. Unlike ReLU which has zero gradients
    for negative inputs, SiLU maintains gradient flow for each inputs, enabling better optimization dynamics.
    The non-monotonic nature of SiLU allows more complex input-dependent transformations beneficial for
    capturing intricate KG patterns.
  evidence: DKG/model/gnn/kgt.py:47(SiLU)
  stage: gnn_convolution
  alternative_considered: ReLU would cause dead neurons for negative inputs; tanh may saturate; GELU is
    computationally heavier
  _evidence_issues:
  - 'FN_NOT_FOUND: SiLU in DKG/model/gnn/kgt.py'
- id: BD-011
  type: BA/DK
  content: Residual connection with learnable skip weight per node type
  rationale: Learnable skip weights per node type allow the model to learn when to use transformed versus
    original features for each entity type. Some node types (like metrics) may benefit from heavy transformation
    while others (like events) may need to preserve more original information. This adaptive skipping
    prevents gradient degradation in deep networks while maintaining type-specific representational strategies.
  evidence: DKG/model/gnn/kgt.py:196,272-276(skip)
  stage: gnn_convolution
  alternative_considered: Fixed skip connections would not adapt to type-specific needs; no skip would
    risk gradient issues
  _evidence_issues:
  - 'FN_NOT_FOUND: skip in DKG/model/gnn/kgt.py'
- id: BD-012
  type: B
  content: Edge normalization (time decay factor) in temporal convolution
  rationale: Longer time since last interaction indicates weaker influence in temporal graph convolutions.
    Financial relationships exhibit temporal decay where recent events are more predictive than distant
    ones. The edge normalization time decay factor ensures that stale information contributes proportionally
    less to entity state updates, allowing the model to focus on recent temporal dynamics while still
    considering historical context.
  evidence: DKG/model/embedding.py:319(edge_norm)
  stage: gnn_convolution
  alternative_considered: Uniform edge weights would treat stale and recent interactions equally, reducing
    temporal sensitivity
  _evidence_issues:
  - 'FN_NOT_FOUND: edge_norm in DKG/model/embedding.py'
  vague_rationale: true
- id: BD-013
  type: M
  content: 'Configurable combination modes: concat, static_only, dynamic_only'
  rationale: Different datasets may benefit from different tradeoffs between static and dynamic information
    based on their temporal characteristics. Some datasets may have stable structural patterns requiring
    heavy static embedding usage while others may have rapidly evolving dynamics requiring emphasis on
    dynamic embeddings. The configurable modes enable optimal strategy selection without architectural
    changes and support ablation studies.
  evidence: DKG/model/model.py:300-313(mode)
  stage: embedding_combination
  alternative_considered: Fixed combination would not adapt to varying dataset characteristics
  _evidence_issues:
  - 'FN_NOT_FOUND: mode in DKG/model/model.py'
- id: BD-014
  type: BA
  content: Optional graph convolution on combined embeddings
  rationale: A second GNN pass after combining static and dynamic embeddings can refine entity representations
    by leveraging graph structure on the enriched representations. This post-combination convolution captures
    interactions between static structural patterns and dynamic temporal patterns that may not be fully
    expressed in either embedding space alone, improving representational quality at the cost of additional
    computation.
  evidence: DKG/model/model.py:253-264(graph_conv)
  stage: embedding_combination
  alternative_considered: Skipping post-combination convolution would miss structure-pattern interactions
  _evidence_issues:
  - 'FN_NOT_FOUND: graph_conv in DKG/model/model.py'
- id: BD-015
  type: BA/M
  content: Weighted sum readout with learnable gating
  rationale: Learnable gating for weighted sum readout allows soft selection of which nodes contribute
    most to graph-level embedding generation. Different prediction tasks may require different node importance
    distributions, and the gating mechanism enables the model to learn task-appropriate aggregation strategies
    without manual feature engineering.
  evidence: DKG/model/model.py:346-352(weighted_sum)
  stage: embedding_combination
  alternative_considered: Uniform weighting would treat each nodes equally; attention pooling adds complexity
  _evidence_issues:
  - 'FN_NOT_FOUND: weighted_sum in DKG/model/model.py'
  vague_rationale: true
- id: BD-016
  type: BA/M
  content: Multi-head (8 by default) attention in KGTransformer
  rationale: Multi-head attention captures different relation patterns in parallel, allowing each head
    to specialize in distinct aspects of entity interaction. With 8 heads, the model can simultaneously
    learn different types of relationships (temporal, semantic, structural) without interference, improving
    representation quality and providing interpretable attention patterns that reveal diverse interaction
    mechanisms.
  evidence: DKG/model/model.py:54(num_attn_heads=8)
  stage: embedding_combination
  alternative_considered: Single-head would force competing patterns; too many heads increases computation
    without benefit
  _evidence_issues:
  - 'INVALID_IDENTIFIER: num_attn_heads=8 in DKG/model/model.py'
- id: BD-017
  type: B
  content: 'Decomposed prediction: separate log_prob_head, log_prob_rel, log_prob_tail'
  rationale: Treating knowledge graph completion as three separate subtasks (head, relation, tail prediction)
    enables granular analysis of which aspect fails during prediction. This decomposition is essential
    for understanding model weaknesses, debugging prediction errors, and providing actionable insights
    for financial analysts who need to know which component of an interaction is most uncertain.
  evidence: DKG/model/model.py:408-435(module)
  stage: link_prediction
  alternative_considered: Joint prediction would hide which component fails; less actionable for analysts
  _evidence_issues:
  - 'FN_NOT_FOUND: module in DKG/model/model.py'
- id: BD-018
  type: B/RC
  content: 'Weighted combination of prediction losses: tail=1.0, rel=0.2, head=0.1'
  rationale: Tail prediction is most important for practical applications as it determines what entities
    will interact with given context. Head prediction is easiest due to symmetry (predicting who sent
    a message is similar to predicting recipients), so lower weight reduces noise from this simpler subtask.
    Relation prediction sits in between as a useful but secondary signal for understanding interaction
    types.
  evidence: DKG/model/model.py:459(log_prob)
  stage: link_prediction
  alternative_considered: Equal weights would overfit to easier tasks; uniform weighting would lose task
    priorities
  _evidence_issues:
  - 'FN_NOT_FOUND: log_prob in DKG/model/model.py'
- id: BD-019
  type: B/DK
  content: Graph-level context via readout for edge prediction
  rationale: Global graph context helps disambiguate local patterns that cannot be resolved by considering
    only the immediate neighborhood. In financial KGs, understanding whether a company is part of a declining
    sector requires global awareness beyond local edge patterns. The graph-level embedding provides this
    broader context, enabling predictions that consider macroeconomic trends and market-wide dynamics.
  evidence: DKG/model/model.py:437-438(graph_emb)
  stage: link_prediction
  alternative_considered: Local-only predictions would miss global context crucial for financial analysis
  vague_rationale: true
- id: BD-020
  type: BA/M
  content: Cross-entropy loss for multi-class entity/relation classification
  rationale: Link prediction is framed as classification over each possible entities or relations, making
    cross-entropy loss the natural choice. This formulation naturally handles the large output space of
    entity/relation prediction and provides well-calibrated probability estimates through the softmax
    formulation, enabling confidence-based decision-making for downstream applications.
  evidence: DKG/model/model.py:406(criterion)
  stage: link_prediction
  alternative_considered: Margin-based losses would not provide probability estimates; ranking losses
    are less calibrated
  _evidence_issues:
  - 'FN_NOT_FOUND: criterion in DKG/model/model.py'
- id: BD-021
  type: B/DK
  content: LogNormal mixture distribution for inter-event times
  rationale: Inter-event times in financial sequences are positive and right-skewed, with many short intervals
    and fewer long ones. The log-normal distribution naturally captures this pattern as it is the distribution
    of a random variable whose logarithm follows a normal distribution, exactly modeling the multiplicative
    nature of temporal processes in financial markets where small changes accumulate multiplicatively.
  evidence: DKG/model/tpp/log_norm_mix_tpp.py:54-72(module)
  stage: temporal_prediction
  alternative_considered: Gaussian would produce negative times; exponential lacks flexibility for multi-modal
    distributions
  _evidence_issues:
  - 'FN_NOT_FOUND: module in DKG/model/tpp/log_norm_mix_tpp.py'
- id: BD-022
  type: BA/DK
  content: 128 mixture components by default
  rationale: High mixture component capacity allows modeling complex temporal patterns across different
    relation types and entity categories. Financial events from different contexts (earnings announcements,
    regulatory filings, market movements) have distinct temporal patterns requiring separate mixture components.
    With 128 components, the model can capture diverse temporal dynamics without excessive computational
    overhead.
  evidence: DKG/model/model.py:51(num_mix_components=128)
  stage: temporal_prediction
  alternative_considered: Fewer components would merge distinct temporal patterns; too many increases
    computation without benefit
  _evidence_issues:
  - 'INVALID_IDENTIFIER: num_mix_components=128 in DKG/model/model.py'
- id: BD-023
  type: B
  content: Context = [sender_emb, recipient_emb, rel_emb, dyn_rel_emb]
  rationale: Event timing depends critically on who interacts with whom and the relationship between entities.
    The sender-recipient pair captures entity-specific temporal tendencies while the relation captures
    event-type-specific patterns. Including both static and dynamic relation embeddings acknowledges that
    relationship strength and nature evolve over time, requiring both historical and current relationship
    information for accurate time prediction.
  evidence: DKG/model/tpp/log_norm_mix_tpp.py:123-124(context)
  stage: temporal_prediction
  alternative_considered: Missing any component would lose critical temporal context signals
  _evidence_issues:
  - 'FN_NOT_FOUND: context in DKG/model/tpp/log_norm_mix_tpp.py'
- id: BD-024
  type: B/BA
  content: Interval-based probability for training (CDF difference)
  rationale: Interval-based probability using CDF differences is more robust than point probability because
    it accounts for discrete time intervals in the data. Financial event data typically has discretized
    timestamps, and using interval probabilities correctly handles this granularity rather than treating
    probability mass as concentrated at exact points. This also prevents numerical issues from evaluating
    probability density at discrete observation points.
