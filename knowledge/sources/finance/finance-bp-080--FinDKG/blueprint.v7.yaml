replaceable_slots:
- id: slot-001
  name: graph_learning_backend
  description: KGTransformer uses DGL's TypedLinear and custom edge-softmax over typed edges; switching
    would require reimplementing the attention mechanism. PyG is the main alternative but lacks native
    typed-attention; NetworkX is unsuitable for deep learning.
  used_in_stages: []
  options:
  - name: DGL (Deep Graph Library)
    traits:
    - heterogeneous-graphs
    - message-passing
    - sparse-ops
    - GNN-layers
    fit_for:
    - General graph neural network workloads, heterogeneous graphs with typed nodes/edges, production
      deployments
    not_fit_for:
    - Very large-scale distributed training beyond single-node multi-GPU
  - name: PyTorch Geometric
    traits:
    - heterogeneous-graphs
    - message-passing
    - sparse-ops
    - GNN-layers
    fit_for:
    - Research-focused GNN experiments, easy dataset loading, rich operator library
    not_fit_for:
    - Projects already committed to DGL API; custom typed-attention (KGTransformer) requires reimplementation
  - name: NetworkX (pure Python)
    traits:
    - static-graphs
    - basic-ops
    fit_for:
    - Simple static knowledge graph analysis without deep learning
    not_fit_for:
    - Dynamic KG modeling, temporal reasoning, GPU-accelerated training
  default: DGL (Deep Graph Library)
  _source: worker_resource
- id: slot-002
  name: graph_scatter_aggregation
  description: Only used in RelationRNN for aggregating entity embeddings by relation type. The default
    torch-scatter is the only GPU-compatible option. A manual index_add implementation is possible for
    CPU-only scenarios at performance cost.
  used_in_stages: []
  options:
  - name: torch-scatter
    traits:
    - GPU-accelerated
    - scatter-ops
    - sparse-reductions
    fit_for:
    - Efficient per-relation entity embedding aggregation required by RelationRNN
    not_fit_for:
    - CPU-only environments without compilation toolchain
  - name: torch-scatter (alternative build source)
    traits:
    - GPU-accelerated
    - scatter-ops
    fit_for:
    - Environments where default PyPI build fails (CUDA/PyTorch version mismatch)
    not_fit_for:
    - Users without access to pre-built wheels
  - name: Manual scatter via torch index_add
    traits:
    - no-extra-dep
    - CPU-only
    - slower
    fit_for:
    - CPU-only deployments avoiding compilation, minimal-dependency environments
    not_fit_for:
    - GPU training (performance); production workloads
  default: torch-scatter
  _source: worker_resource
- id: slot-003
  name: data_loading_format
  description: Every existing TKG benchmarks use TSV format. Switching to Parquet/HDF5 would require modifying
    DKG.data.load_data_table() and dataset conversion pipeline. Parquet is the most practical alternative
    for large-scale deployments.
  used_in_stages: []
  options:
  - name: Tab-separated text files
    traits:
    - human-readable
    - easy-to-edit
    - standard-TKG-format
    fit_for:
    - Every supported datasets; most researchers already use this format
    not_fit_for:
    - Very large datasets (hundreds of millions of triplets) where disk I/O is the bottleneck
  - name: Parquet binary format
    traits:
    - columnar
    - compressed
    - fast-read
    fit_for:
    - Large-scale datasets, cloud storage scenarios, memory-efficient column access
    not_fit_for:
    - Small datasets; requires format conversion pipeline
  - name: HDF5
    traits:
    - binary
    - chunked
    - random-access
    fit_for:
    - Very large graphs with random-access requirements
    not_fit_for:
    - Streaming/incremental graph updates
  default: Tab-separated text files
  _source: worker_resource
- id: slot-004
  name: checkpoint_serialization
  description: torch.save/load is used for model checkpoints (CPU/GPU-aware serialization). dill is used
    for graph cache objects where the full object graph (including DGL graph internals) may be more complex.
    Switching would not break the architecture but dill provides broader serialization coverage for cache.
  used_in_stages: []
  options:
  - name: PyTorch native (.pt)
    traits:
    - native
    - compressed
    - GPU-tensor-aware
    fit_for:
    - Every scenarios; default for PyTorch-based projects
    not_fit_for:
    - Interoperability with non-PyTorch frameworks
  - name: Dill-pickled Python objects
    traits:
    - generic-pickle
    - wider-type-support
    fit_for:
    - Complex Python objects (lambdas, local functions) that standard pickle cannot handle
    not_fit_for:
    - Performance-critical serialization; large tensor objects
  default: PyTorch native .pt for model checkpoints; dill for graph cache
  _source: worker_resource
- id: slot-005
  name: temporal_point_process_model
  description: LogNormal mixture is well-suited for financial event times (positively skewed, heavy-tailed).
    Exponential is too memoryless for financial dynamics. Neural TPP would be more flexible but requires
    significantly more engineering effort and data.
  used_in_stages: []
  options:
  - name: LogNormal Mixture TPP
    traits:
    - log-normal
    - mixture-model
    - temporal-reasoning
    fit_for:
    - Modeling inter-event times with heavy-tailed distributions typical in financial events
    not_fit_for:
    - High-frequency event streams; non-positive inter-event times
  - name: Exponential TPP
    traits:
    - exponential
    - poisson-process
    fit_for:
    - Simple memoryless temporal processes
    not_fit_for:
    - Financial event data (empirically exhibits heavy tails beyond exponential)
  - name: Neural TPP (RNN-based intensity)
    traits:
    - neural
    - flexible
    - continuous-time
    fit_for:
    - Complex nonparametric temporal patterns
    not_fit_for:
    - Small datasets where neural TPP overfits
  default: LogNormal Mixture TPP (LogNormMixTPP)
  _source: worker_resource
