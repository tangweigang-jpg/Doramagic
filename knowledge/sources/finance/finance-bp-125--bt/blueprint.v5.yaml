  _evidence_issues:
  - 'FN_NOT_FOUND: module in bt/algos.py'
- id: BD-010
  type: B/BA
  content: LimitDeltas default weight delta limit is 0.1 (10%)
  rationale: Ten percent weight changes per rebalance balance turnover costs against tracking error, preventing
    drastic portfolio shifts from signal noise. The boundary is at each rebalance execution, capping the
    maximum permissible weight change from current to target allocation, thus controlling transaction
    costs and market impact.
  evidence: bt/algos.py:1364(module)
  stage: risk_management
  alternative_considered: Could use 5% (more conservative) or 20% (less constrained), but 10% balances
