- id: BD-080
  type: M
  content: Node stale flag propagates to root; transactions mark root.stale=True
  rationale: When any node calls transact(), root.stale is set to True, marking the entire strategy tree
    as stale. The stale flag is checked in weight and value computation (lines 253-271) to ensure consistency.
    This propagates from leaf transactions up to root, invalidating cached values throughout. The boundary
    is that stale state triggers recalculation on next access, but if code bypasses the stale check, it
    may use outdated values.
  evidence: bt/core.py:200(_set_root)
  stage: inheritance
- id: BD-081
  type: BA
  content: 'INTERACTION: [BD-004] × [BD-017] × [BD-067] → Amplified cash drag from integer rounding combined
    with strict zero-tolerance'
  rationale: 'BD-004 defaults integer_positions=True which rounds each positions to whole shares. BD-017
    sets TOL=1e-16 as the zero-tolerance threshold. BD-067 documents the truncation behavior. When combined:
    fractional shares resulting from rounding are compared against TOL=1e-16; if below this threshold
    they are treated as zero. This means very small residual cash positions from rounding are silently
    discarded, accumulating cash drag over multiple rebalances. The effect amplifies with more frequent
    rebalancing and larger universes.'
  evidence: BD-004,BD-017,BD-067
  stage: global
  alternative_considered: Could use larger tolerance (1e-8) to absorb more rounding errors, or implement
    cash recycling to reinvest residual amounts
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-082
  type: BA
  content: 'INTERACTION: [BD-005] × [BD-022] → Contradiction: RunPeriod fires immediately on first date
    while RunAfterDays delays until countdown completes'
  rationale: 'BD-005 defaults run_on_first_date=True meaning RunPeriod algos execute on the first simulation
    date (t0). BD-022 implements RunAfterDays which decrements a counter and returns False until zero.
    When both are used in the same strategy: RunPeriod would trigger execution on t0, but RunAfterDays
    would block any processing for the specified number of periods. This creates a contradiction where
    the timing expectations conflict - one algos wants immediate execution while the other enforces delay.
    The result is user confusion about when strategies actually begin trading.'
  evidence: BD-005,BD-022
  stage: global
  alternative_considered: Could document the incompatibility explicitly, or have RunAfterDays override
    RunPeriod's first-date behavior
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-083
  type: BA
  content: 'INTERACTION: [BD-066] × [BD-069] × [BD-072] → Hidden dependency: silent Rebalance failure
    when pipeline algos return False'
  rationale: 'BD-066 establishes the temp dict pipeline (selected → stat → weights → Rebalance). BD-069
    implements AlgoStack short-circuit on first False. BD-072 documents that Rebalance silently passes
    when weights are missing. The hidden dependency: if any algo in the pipeline (Select, SetStat, Weigh)
    returns False for ANY reason (including data issues, convergence failures, or conditional logic),
    AlgoStack stops execution immediately. Rebalance never receives the weights it needs, and crucially
    returns True (not False), so the stack continues as if rebalancing succeeded. This is a silent failure
    mode where the backtest runs without any actual rebalancing occurring.'
  evidence: BD-066,BD-069,BD-072
  stage: global
  alternative_considered: Could add explicit logging when Rebalance finds no weights, or have Rebalance
    return False when weights missing to propagate failure
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-084
  type: RC
  content: 'INTERACTION: [BD-001] × [BD-006] × [BD-048] × [BD-049] × [BD-075] → Risk cascade: NaN handling
    chain from virtual row insertion to security allocation failure'
  rationale: 'BD-001 inserts a virtual row at t0-1day with NaN values to enable return calculation. BD-006
    SelectAll excludes securities with NaN prices. BD-048 SelectThese drops NaN prices. BD-049 StatTotalReturn
    returns False if lookback period not available. BD-075 raises exception if price is NaN at allocation
    time. The cascade: virtual row with NaN propagates through selection (filtered by SelectAll/SelectThese),
    prevents momentum calculation (returns False from StatTotalReturn), and if not caught would cause
    allocation failure. This creates a risk where newly-added securities or securities with data gaps
    trigger a chain of failures, potentially causing backtest to fail or produce incomplete results.'
  evidence: BD-001,BD-006,BD-048,BD-049,BD-075
  stage: global
  alternative_considered: Could implement graceful degradation where partial data still allows momentum
    calculation, or provide explicit warning when securities are excluded due to insufficient history
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-085
  type: RC
  content: 'INTERACTION: [BD-068] × [BD-030] × [BD-016] → Risk cascade: mixing fixed income and equity
    causes incorrect notional pricing across portfolio'
  rationale: 'BD-068 enforces that fixed income children must have fixed income parent (ValueError on
    violation). BD-030 implements notional weighting for fixed income (par value determines allocation).
    BD-016 sets PAR=100.0 as reference price for fixed income. The cascade risk: if the invariant in BD-068
    is somehow bypassed or violated, equity securities would receive notional (par-based) weighting instead
    of market-value weighting, and their prices would be calculated relative to PAR=100.0 instead of actual
    market prices. This would cause catastrophic mispricing - an equity trading at $150 would be treated
    as if it had $100 par value, distorting each downstream NAV calculations and position sizing.'
  evidence: BD-068,BD-030,BD-016
  stage: global
  alternative_considered: Could add additional runtime checks in weight calculation to verify each children
    match parent fixed_income flag before applying weighting method
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-086
  type: BA
  content: 'INTERACTION: [BD-079] × [BD-066] → Hidden dependency: backtest setup phase cannot access data,
    breaking algos that expect historical context'
  rationale: 'BD-079 documents the backtest execution order: setup → adjust → update(t0) → loop. BD-066
    establishes the temp dict pipeline where algos expect data to be available. The hidden dependency:
    setup() runs before ANY data is loaded (line 237), meaning algos in the strategy cannot access historical
    prices, returns, or other data during initialization. However, the algo pipeline (selected → stat
    → weights → Rebalance) is designed to operate on data. If a weighing algo requires historical context
    for initialization (e.g., to set up rolling windows), it will fail because data only becomes available
    after the first update(t0) call in the loop. This creates a subtle initialization order problem.'
  evidence: BD-079,BD-066
  stage: global
  alternative_considered: Could add a pre-setup data loading phase, or document that algos must defer
