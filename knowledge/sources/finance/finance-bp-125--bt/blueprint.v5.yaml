- id: BD-078
  type: BA
  content: Rebalance calculates delta using stale value as base before allocations (update=False pattern)
  rationale: When rebalancing with update=False (default), the Rebalance algo captures the current position
    value as 'base' before any de-allocation occurs. This base value is then used to calculate deltas
    for new allocations. The boundary is that if positions are modified externally between rebalances,
    the stale base causes incorrect delta calculations, leading to over or under allocation.
  evidence: bt/algos.py:1784-1792(saves base before de-allocation), bt/core.py:1002-1007(uses base from
    value/notional_value)
  stage: pattern_choice
