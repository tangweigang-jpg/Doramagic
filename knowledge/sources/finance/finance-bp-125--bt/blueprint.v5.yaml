  - name: weighting_logic
    description: Determines how to allocate capital across selected securities
    options:
    - name: WeighEqually
      traits:
      - Equal weights
      - No optimization
      - Simple
      fit_for:
      - Equal-weighted
      - Diversified
      - Low-complexity
      not_fit_for:
      - Optimization
      - Risk parity
      - Factor exposure
    - name: WeighSpecified
      traits:
      - User-defined weights
      - Fixed allocation
      - Explicit input
      fit_for:
      - Strategic allocation
      - Known weights
      - Target allocation
      not_fit_for:
      - Dynamic weights
      - Optimization
      - Signal-based
    - name: WeighInvVol
      traits:
      - Inverse volatility
      - Risk parity base
      - Volatility scaling
      fit_for:
      - Risk parity
      - Low-volatility
      - Equal risk contribution
      not_fit_for:
      - Equal weight
      - Mean-variance
      - Momentum
    - name: WeighERC
      traits:
      - Equal risk contribution
      - Iterative optimization
      - Correlation-aware
      fit_for:
      - Risk parity
      - Diversified
      - Correlation-aware
      not_fit_for:
      - Simple equal weight
      - No optimization
      - Fast execution
    - name: WeighMeanVar
      traits:
      - Mean-variance optimization
      - Covariance-based
      - Efficient frontier
      fit_for:
      - Optimal allocation
      - Risk-return tradeoff
      - Markowitz
      not_fit_for:
      - Robust optimization
      - Fast execution
      - No covariance data
    - name: WeighTarget
      traits:
      - Target weight
      - Drift monitoring
      - Tolerance band
      fit_for:
      - Target allocation
      - Band rebalancing
      - Strategic weighting
      not_fit_for:
      - Equal weight
      - Momentum
      - Dynamic signals
