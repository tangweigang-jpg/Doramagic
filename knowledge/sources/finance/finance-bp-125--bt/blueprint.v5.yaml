  design_decisions:
  - 'Algo.__call__ must return bool - False stops stack execution. Simple but powerful control flow mimicking
    grep pipeline philosophy. Each Algo does one thing well. Evidence: bt/core.py:2042(AlgoStack.__call__)'
  - 'run_always decorator bypasses normal stop-on-False behavior. Needed for algos like RebalanceOverTime
    that must run every period even if other algos fail. Evidence: bt/algos.py:18(run_always)'
  - 'temp dict cleared each run() call, perm dict persists across calls. temp is scratch space for algo-to-algo
    communication within a timestep; perm stores state across time. Evidence: bt/core.py:2098(Strategy.run)'
  - 'Algo subclasses use duck typing with NotImplementedError rather than ABC. Allows simple functions
    as algos too (no state needed). Evidence: bt/core.py:2016(Algo.__call__)'
  - 'RunPeriod defaults run_on_first_date=True - algos fire on first date by default. Unexpected first-date
    execution if developer assumes monthly/weekly basis only. Evidence: bt/algos.py:136(run_on_first_date=True)'
  acceptance_hints:
  - AlgoStack stops on first False unless run_always=True decorator present
  - temp dict cleared between run() calls but perm persists
  - Every Algos in stack called in order until False or completion
  - 'Algo temp pipeline: selected set first, then stat, then weights, then Rebalance'
- id: capital_allocation
  name: Capital Allocation & Rebalancing
  order: 4
  responsibility: Translates target weights into actual capital movements. Handles both market-value (equity)
    and notional-value (fixed income) weighting modes. Executes transactions with commission deduction
    and bid/offer spread modeling.
  interface:
    inputs:
    - target weights from temp['weights']
    - current portfolio value from _value
    - cash reserve from _cash
    outputs:
    - Security transactions via SecurityBase.transact
    - capital adjustments via parent.adjust()
    - position changes in _position
  required_methods:
  - name: StrategyBase.allocate
    description: Capital allocation to strategy/child, recursively proportionally to weights via _weight.
      Enables hierarchical allocation where parent percentage splits to children.
    evidence: bt/core.py:890(allocate)
  - name: StrategyBase.rebalance
    description: Rebalance child to target weight - calculates delta, calls allocate with update=False
      to lock original base value across children
    evidence: bt/core.py:971(rebalance)
  - name: SecurityBase.transact
    description: Execute buy/sell for given quantity, deduct commissions, mark root.stale=True for lazy
      recalculation
    evidence: bt/core.py:1636(transact)
  - name: SecurityBase.outlay
    description: Calculate total cash outlay including bid/offer spread. Uses abs(q) for symmetric spread,
      signed q for custom price direction.
    evidence: bt/core.py:1700(outlay)
  key_behaviors:
  - behavior: Proportional hierarchical allocation
    description: allocate() pushes down proportionally via _weight, enabling hierarchical allocation.
      A 10% allocation to parent becomes 5%/5% for two 50%-weighted children. Enables tree-based capital
      allocation.
    evidence: bt/core.py:931(allocate)
  - behavior: Base value locking for sequential rebalancing
    description: rebalance() uses base parameter to lock original value for delta calc across children.
      Without base, sequential rebalancing changes the base for each child causing incorrect allocations.
      Set base once before iteration.
    evidence: bt/core.py:989(rebalance)
  - behavior: Symmetric bid/offer handling
    description: outlay() uses abs(q) for symmetric bid/offer (spread paid on both buy and sell), but
      custom price uses signed q to track direction correctly.
    evidence: bt/core.py:1712(outlay)
  - behavior: Fixed income bankruptcy bypass
    description: fixed_income=True disables automatic bankruptcy detection and uses notional_value weighting
      instead of market value. Fixed income strategies have deterministic notional; bankruptcy is modeled
      via Algo (Margin).
    evidence: bt/core.py:749(update)
  - behavior: Paper trading shadow strategy
    description: Child strategies auto-paper-trade unless explicitly marked. Creates $1M fake _paper strategy
      to simulate fills without real capital impact. Price sourced from paper strategy.
    evidence: bt/core.py:580-590(setup creates _paper)
  replaceable_points:
  - name: weight_mode
    description: Determines whether allocation uses market value (equity) or notional value (fixed income)
      as the denominator for weight calculations
    options:
    - name: Strategy (market value)
      traits:
      - Market value weighting
      - Price-based
      - Value-at-risk
      fit_for:
      - Equity portfolios
      - ETF strategies
      - Market-cap weighting
      not_fit_for:
      - Fixed income
      - Bonds
      - Notional exposure
    - name: FixedIncomeStrategy (notional value)
      traits:
      - Notional value weighting
      - Position-based
      - PAR reference
      fit_for:
      - Fixed income portfolios
      - Bond strategies
      - Coupon-paying instruments
      not_fit_for:
      - Equity
      - Market-cap weighting
      - Value-based
    default: Strategy (market value)
  - name: commission_model
    description: Transaction cost model applied during SecurityBase.transact
    options:
    - name: zero (default)
      traits:
      - No transaction costs
      - Gross returns
      - Best-case scenario
      fit_for:
      - Gross performance
      - Benchmark comparison
      - Theoretical analysis
      not_fit_for:
      - Net returns
      - Realistic backtesting
      - Turnover-sensitive strategies
    - name: percentage
      traits:
      - Proportional to value
      - BPS-based
      - Percentage of trade
      fit_for:
      - Equity commissions
      - Ad valorem fees
      - Percent of notional
      not_fit_for:
      - Fixed costs
      - Per-share pricing
      - Tiered pricing
    - name: fixed + percentage
      traits:
      - Fixed fee plus percentage
      - Realistic modeling
      - Tiered structure
      fit_for:
      - Realistic commissions
      - Broker modeling
      - Slippage
      not_fit_for:
      - Simple analysis
      - Gross returns
      - Pure percentage
    default: zero (default)
  design_decisions:
  - 'allocate() pushes down proportionally via _weight enabling hierarchical allocation. A 10% allocation
    to parent becomes 5%/5% for two 50%-weighted children. Evidence: bt/core.py:931(allocate)'
  - 'rebalance() uses base parameter to lock original value for delta calc across children. Without base,
    sequential rebalancing changes the base for each child causing incorrect allocations. Evidence: bt/core.py:989(rebalance)'
  - 'outlay() uses abs(q) for symmetric bid/offer but custom price uses signed q. Regular trades: abs(q)
    since spread paid on both buy/sell. Custom price: signed q to track direction correctly. Evidence:
    bt/core.py:1712(outlay)'
  - 'fixed_income=True disables bankruptcy and uses notional weighting. Fixed income strategies have deterministic
    notional; bankruptcy is modeled via Algo (Margin), not automatic detection. Evidence: bt/core.py:749(update)'
  - 'Rebalance REQUIRES weights in temp dict or silently passes (returns True). Missing weights not an
    error - Rebalance does nothing. Hard to debug empty portfolios. Evidence: bt/algos.py:1777-1779(Rebalance
    checks ''weights'' not in target.temp)'
  acceptance_hints:
  - Capital allocations propagate correctly from parent to children proportionally
  - Sequential rebalancing produces same result as simultaneous rebalancing (base parameter working)
  - Commission deducted correctly on each transaction
  - Bid/offer spread applied symmetrically for buys and sells
  - Fixed income strategies use notional_value rather than market value for weights
- id: value_propagation
  name: Value Propagation & Stale Resolution
  order: 5
  responsibility: Propagates price/value changes up the tree on demand. Uses stale flag to defer expensive
    updates until data is actually accessed. Manages the cascading value calculations from leaf securities
    to root strategy.
  interface:
    inputs:
    - price changes at leaf SecurityBase nodes
    - stale flag indicating cache invalidation
    - Date/datetime for period tracking
    outputs:
    - updated _value and _price at each nodes
    - strategy prices Series indexed by DateTimeIndex
    - position values and weights
  required_methods:
  - name: StrategyBase.update
    description: Main update method - cascades to children, recalculates value/price/weight, detects bankruptcy
      via _value < 0
    evidence: bt/core.py:692(update)
  - name: SecurityBase.update
    description: Updates price from universe DataFrame, calculates value=position*price*multiplier, skips
      update if position unchanged since last date
    evidence: bt/core.py:1421(update)
  - name: StrategyBase._sync_data
    description: Syncs internal arrays (values, prices, weights) to data DataFrame for result storage
      and analysis
    evidence: bt/core.py:674(_sync_data)
  key_behaviors:
  - behavior: Lazy evaluation via stale flag
    description: Update deferred until data access. Backtest iterates dates without accessing values;
      update only triggered when user queries results. Avoids O(n*depth) on every step when only final
      results needed.
    evidence: bt/core.py:416(price property)
  - behavior: newpt flag for period tracking
    description: newpt flag tracks date changes - resets _net_flows, saves _last_value. Net flows only
      track between-period capital movements, not intra-day. Last-value needed for return calculation.
    evidence: bt/core.py:700(update)
  - behavior: Position-unchanged skip optimization
    description: SecurityBase skips update if position unchanged since last date. Position=0 securities
      with no trades don't need recalculation. Optimization for sparse trading.
    evidence: bt/core.py:1430(update)
  - behavior: PAR=100.0 as fixed income reference
    description: PAR=100.0 hardcodes fixed income reference price. Fixed income prices start at par. Returns
      are additive per period, scaled by PAR for indexing. Price = last_price + return*(value/notional)*PAR
      uses multiplicative PAR scaling.
    evidence: bt/core.py:12(PAR=100.0)
  - behavior: is_zero() floating point tolerance
