- id: BD-017
  type: B/BA
  content: Floating point tolerance TOL=1e-16 for is_zero comparison
  rationale: Machine epsilon-scale tolerance prevents floating point accumulation errors from causing
    incorrect zero-detection in financial calculations. The boundary is at zero-comparison operations,
