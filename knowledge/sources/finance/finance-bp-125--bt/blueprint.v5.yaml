  _evidence_issues:
  - 'FN_NOT_FOUND: module in bt/algos.py'
- id: BD-012
  type: B/BA
  content: TargetVol uses 252 as annualization factor (trading days/year)
  rationale: Using 252 trading days converts daily volatility to annualized terms using market-standard
    convention for US equities. The boundary is at volatility annualization, ensuring TargetVol produces
    consistent volatility targets regardless of the data frequency used in calculations.
  evidence: bt/algos.py:1468(module)
  stage: risk_management
  alternative_considered: Could use 365 (calendar days) or 250 (EU markets), but 252 is the industry standard
    for US equity backtesting
  _evidence_issues:
  - 'FN_NOT_FOUND: module in bt/algos.py'
- id: BD-013
  type: B/BA
  content: RebalanceOverTime spreads rebalancing over 10 periods by default
  rationale: Ten-period gradual rebalancing minimizes market impact for large institutional portfolios
    while achieving target weights within a reasonable timeframe. The boundary is at rebalance initiation,
