- id: BD-077
  type: T
  content: Root node parent points to itself (self.parent=self) - used for full_name and stale propagation
  rationale: The root node (top-level strategy) sets self.parent and self.root to itself as a sentinel
    value. This enables full_name property to work by traversing up the tree, where the root correctly
    terminates. It also provides the termination condition for stale propagation where root.stale is set
    after any child transaction. The boundary is that any code traversing parent pointers must handle
    self-referential termination or risk infinite loops.
  evidence: bt/core.py:24(node)
  stage: invariant
  _evidence_issues:
