# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-125
name: bt - Flexible Backtesting for Python
sop_version: '3.6'
source:
  projects:
  - bt
  commit_hash: 48353dfa929e44921ec7fe9cb117cc98e71cb2af
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: quantitative trading strategy backtesting
  description: A flexible Python framework for testing quantitative trading strategies using a tree-based
    hierarchical structure and modular AlgoStack components. Supports equity and fixed income securities
    with commission modeling and detailed performance analytics.
  prerequisites: Users need Python proficiency, pandas DataFrame knowledge, and understanding of financial
    backtesting concepts. Familiarity with ffn library is helpful.
  not_suitable_for: Real-time trading execution, production deployment, high-frequency trading requiring
    sub-second latency, non-financial simulation, or users requiring built-in risk management or compliance
    features.
stages:
- id: data_input
  name: Data Input & Preprocessing
  order: 1
  responsibility: Ingests price data and additional data (bidoffer, coupons) into the backtest. Adds virtual
    row at t0-1day to ensure clean starting point for day-0 trading evaluation and consistent indexing
    across each data structures.
  interface:
    inputs:
    - price DataFrame with datetime index
    - additional_data dict containing bidoffer, coupons, unit_risk
    outputs:
    - processed data with virtual t0-1day row prepended
    - dates DateTimeIndex aligned to data
  required_methods:
  - name: Backtest.run
    description: Main backtest execution method that orchestrates data processing and simulation loop
    evidence: bt/backtest.py:237(run)
  - name: Backtest._process_data
    description: Preprocesses input data, adds virtual row at t0-1day, and aligns additional_data DataFrames
    evidence: bt/backtest.py:183(_process_data)
  key_behaviors:
  - behavior: Virtual t0-1day row insertion
    description: Inserts a virtual row one day before the first data date to establish clean starting
      reference for price-based calculations, preventing day-0 commissions from affecting starting price
      reference which should remain at 100.
    evidence: bt/backtest.py:191(_process_data)
  - behavior: Additional DataFrame alignment
    description: Every additional data DataFrames (bidoffer, coupons) receive the same virtual row treatment
      to maintain consistent indexing with price data for lookback calculations.
    evidence: bt/backtest.py:205(_process_data)
  - behavior: Deep copy isolation
    description: Strategy is deep copied to enable reuse across multiple backtests without state leakage
    evidence: bt/backtest.py:165(__init__)
  replaceable_points:
  - name: data_source
    description: Source of price and additional data is pluggable - any datetime-indexed pandas structure
    options:
    - name: ffn.get()
      traits:
      - Remote data fetching
      - Caching enabled
      - Multiple source support
      fit_for:
      - Quick prototyping
      - Public market data
      - Yahoo/AlphaVantage integration
      not_fit_for:
      - Proprietary data
      - Custom data formats
      - Real-time streams
    - name: manual DataFrame
      traits:
      - Full control
      - In-memory only
      - Direct manipulation
      fit_for:
      - Synthetic data
      - Custom preprocessing
      - Debugging scenarios
      not_fit_for:
      - Large datasets
      - Remote data sources
      - Automated pipelines
    - name: CSV loader
      traits:
      - File-based
      - Batch processing
      - Persistent storage
      fit_for:
      - Historical data files
      - Audit trails
      - Offline processing
      not_fit_for:
      - Real-time data
      - Streaming scenarios
      - In-memory only workflows
    default: ffn.get()
  design_decisions:
  - 'Virtual t0-1day row added to prevent day-0 commissions from affecting starting price reference. Without
    this, big trades on day 0 would adjust Strategy.prices and hide total return issues. The series should
    start at 100 but might start at 90. Evidence: bt/backtest.py:191(_process_data)'
  - 'Additional DataFrames get same virtual row treatment to ensure bidoffer, coupons, etc. have consistent
    indexing with price data for lookback calculations. Evidence: bt/backtest.py:209(_process_data)'
  - 'Backtest deepcopies strategy to enable reuse across multiple runs while isolating state. Evidence:
    bt/backtest.py:165(__init__)'
  acceptance_hints:
  - strategy.prices index starts at t0-1day with NaN values for each securities
  - Every additional_data DataFrames have same index as price data including virtual row
  - Dates alignment is consistent across each DataFrames
  - Virtual row has NaN price values but valid datetime index
- id: tree_building
  name: Tree Structure Construction
  order: 2
  responsibility: Builds hierarchical Node tree (Strategy→Security) with lazy child creation, integer
    position tracking, and parent-child relationships. Establishes the foundation for modular strategy
    composition and capital allocation hierarchy.
  interface:
    inputs:
    - Strategy/Node definitions with children dict or list
    outputs:
    - Node tree with parent/root references
    - lazy_children mapping for string-named children
    - _childrenv list for ordered access
  required_methods:
  - name: Node.__init__
    description: Base tree node initialization with name, parent, children, stale flag, and integer_positions
      setting
    evidence: bt/core.py:94(__init__)
  - name: StrategyBase.__init__
    description: Capital allocation node with universe, cash, flows, and fixed_income mode
    evidence: bt/core.py:333(__init__)
  - name: SecurityBase.__init__
    description: Leaf node for tradable securities with position, multiplier, and notional_value
    evidence: bt/core.py:1150(__init__)
  - name: Node._add_children
    description: Handles dict/list children input, lazy creation of string-named children on first access
    evidence: bt/core.py:142(_add_children)
  key_behaviors:
  - behavior: Self-referential root detection
    description: Root node sets parent=self enabling cheap root detection via if node.parent == node.
      Avoids separate root flag while enabling full_name computation and stale propagation.
    evidence: bt/core.py:90(__init__)
  - behavior: Lazy child creation
    description: String children become lazy children, only created when accessed via __getattr__. Improves
      performance for sparse universes where securities are only materialized when actually traded.
    evidence: bt/core.py:81(_lazy_children)
  - behavior: Duplicate child name enforcement
    description: Duplicate child names within same parent raise ValueError to prevent silent bugs where
      one child overwrites another in the children dict.
    evidence: bt/core.py:168(_add_children)
  - behavior: Integer positions propagation
    description: integer_positions propagates from root to each children via use_integer_positions().
      Lazy children inherit setting when created. Default True causes fractional share rounding to zero
      for high-priced assets.
    evidence: bt/core.py:205(use_integer_positions)
  replaceable_points:
  - name: security_type
    description: Child creation is extensible - different security classes can be used for lazy creation
      based on tree structure
    options:
    - name: Security
      traits:
      - Standard equity
      - Position-based
      - Market value weighting
      fit_for:
      - Equity portfolios
      - ETF trading
      - Standard asset classes
      not_fit_for:
      - Fixed income
      - Derivatives
      - Multi-leg instruments
    - name: FixedIncomeSecurity
      traits:
      - Par-based pricing
      - Notional value
      - Additive returns
      fit_for:
      - Bonds
      - Fixed income ETFs
      - Coupon-paying instruments
      not_fit_for:
      - Equities
      - Options
      - Futures
    - name: CouponPayingSecurity
      traits:
      - Periodic coupons
      - Accrued interest
      - Yield tracking
      fit_for:
      - Coupon bonds
      - Preferred stock
      - Dividend strategies
      not_fit_for:
      - Zero-coupon bonds
      - Equity
      - Non-cash instruments
    default: Security
  - name: lazy_creation
    description: Children can be eagerly created at initialization or lazily on first access
    options:
    - name: eager (Node instances)
      traits:
      - Immediate instantiation
      - Memory allocated upfront
      - No lazy lookup overhead
      fit_for:
      - Small universes
      - Every securities known upfront
      - Performance-critical tight loops
      not_fit_for:
      - Large universes
      - Sparse trading
      - Dynamic universe selection
    - name: lazy (strings)
      traits:
      - On-demand creation
      - Memory efficient
      - Dynamic universe support
      fit_for:
      - Large universes
      - Sparse trading
      - Dynamic strategy construction
      not_fit_for:
      - Small universes
      - Performance-critical scenarios
      - Debugging (less predictable)
    default: lazy (strings)
  design_decisions:
  - 'Integer positions default to True for backward compatibility. Causes rounding issues with high prices
    relative to capital. Users must explicitly set integer_positions=False for robustness. Evidence: bt/core.py:94(__init__)'
  - 'Node uses parent=self when root enabling self-referential root detection. Allows cheap root detection:
    if node.parent == node, it''s the root. Avoids separate root flag. Evidence: bt/core.py:90(__init__)'
  - 'String children become lazy children created on first access. Improves performance for sparse universes
    - securities only materialized when actually traded. Evidence: bt/core.py:81(_lazy_children)'
  - 'Duplicate child names raise ValueError to prevent silent bugs. Silent duplicates would cause one
    child to overwrite another in dict. Evidence: bt/core.py:168(_add_children)'
  acceptance_hints:
  - 'Root node detection works: node.parent == node for root only'
  - Every descendants accessible via parent-child traversal
  - Lazy children created correctly on first attribute access
  - No duplicate child names within same parent (ValueError on duplicates)
  - integer_positions setting cascades to each children
- id: strategy_logic
  name: Strategy Logic Execution (AlgoStack)
  order: 3
  responsibility: Executes modular Algo components in sequence via AlgoStack. Each Algo operates on temp
    dict, stopping on False return unless run_always decorator used. Provides flexible, testable, reusable
    strategy logic blocks.
  interface:
    inputs:
    - temp dict (selected, weights, stat)
    - Strategy target
    - AlgoStack configuration
    outputs:
    - Modified temp dict with selections/weights/stats
    - bool success/failure per Algo
  required_methods:
  - name: Algo.__call__
    description: Base class call method receiving target Strategy, returns bool to control stack execution
    evidence: bt/core.py:2016(__call__)
  - name: AlgoStack.__call__
    description: Runs algos until one returns False (stop) or each complete. Checks run_always flag to
      bypass stop-on-False behavior.
    evidence: bt/core.py:2020(__call__)
  - name: Strategy.run
    description: Clears temp dict, runs AlgoStack, then runs child strategies. temp is scratch space;
      perm persists across calls.
    evidence: bt/core.py:2097(run)
  key_behaviors:
  - behavior: Short-circuit on False return
    description: AlgoStack stops execution on first False return from any Algo. Simple but powerful control
      flow mimicking grep pipeline philosophy where each Algo does one thing well.
    evidence: bt/core.py:2042(AlgoStack.__call__)
  - behavior: run_always decorator bypass
    description: run_always decorator marks algos to bypass normal stop-on-False behavior. Needed for
      algos like RebalanceOverTime that must run every period even if other algos fail.
    evidence: bt/algos.py:18(run_always)
  - behavior: temp/perm dictionary separation
    description: temp dict cleared each run() call for scratch space algo-to-algo communication within
      a timestep. perm dict persists across calls for state that needs to survive timesteps.
    evidence: bt/core.py:2098(Strategy.run)
  - behavior: Duck typing for Algos
    description: Uses duck typing with NotImplementedError rather than ABC. Allows simple functions as
      algos too (no state needed). Algo.__call__ signature must be respected.
    evidence: bt/core.py:2016(Algo.__call__)
  - behavior: Algo temp pipeline ordering
    description: 'Expected pipeline order: selected → stat → weights → Rebalance. Algos expecting ''selected''
      will fail if previous algo didn''t set it. Rebalance silently succeeds if ''weights'' missing.'
    evidence: bt/algos.py:482(SelectAll), bt/algos.py:906(SetStat), bt/algos.py:1007(WeighSpecified),
      bt/algos.py:1777(Rebalance)
  replaceable_points:
  - name: run_timing
    description: Controls when strategy logic executes - which dates trigger the AlgoStack
    options:
    - name: RunOnce
      traits:
      - Single execution
      - No rebalancing
      - Static allocation
      fit_for:
      - Buy and hold
      - Initial setup
      - One-time allocation
      not_fit_for:
      - Rebalancing
      - Dynamic strategies
      - Periodic adjustments
    - name: RunDaily
      traits:
      - Every business day
      - High frequency decisions
      - Daily rebalance capable
      fit_for:
      - Daily rebalancing
      - High-turnover strategies
      - Short-term signals
      not_fit_for:
      - Monthly strategies
      - Low-frequency signals
      - Long-only portfolios
    - name: RunMonthly
      traits:
      - First day of month
      - Low turnover
      - Strategic allocation
      fit_for:
      - Strategic asset allocation
      - Monthly rebalancing
      - Core-satellite approaches
      not_fit_for:
      - Daily rebalancing
      - High-frequency trading
      - Tactical allocation
    - name: RunAfterDate
      traits:
      - Conditional start
      - Warm-up period
      - Delayed start
      fit_for:
      - Lookback-dependent strategies
      - Initial warmup
      - Delayed strategy start
      not_fit_for:
      - Immediate execution
      - No warmup needed
      - Continuous strategies
    - name: RunEveryNPeriods
      traits:
      - Fixed interval
      - Flexible frequency
      - Configurable period
      fit_for:
      - Custom frequency
      - N-day rebalancing
      - Flexible scheduling
      not_fit_for:
      - Calendar-based
      - Fixed monthly
      - Daily-only
    default: RunMonthly
  - name: selection_logic
    description: Determines which securities from the universe to include in the current rebalance
    options:
    - name: SelectAll
      traits:
      - No filtering
      - Every securities
      - Equal universe
      fit_for:
      - Equal-weighted
      - Full universe
      - Index replication
      not_fit_for:
      - Screening
      - Momentum
      - Factor-based
    - name: SelectN
      traits:
      - Top N selection
      - Ranked filtering
      - Configurable sort
      fit_for:
      - Top-N momentum
      - Concentrated portfolios
      - Rank-based signals
      not_fit_for:
      - Screening
      - Threshold-based
      - No ranking
    - name: SelectMomentum
      traits:
      - Return-based ranking
      - Lookback period
      - Top performers
      fit_for:
      - Momentum strategies
      - Trend following
      - Relative strength
      not_fit_for:
      - Value strategies
      - Mean reversion
      - Fundamental screening
    - name: SelectWhere
      traits:
      - Conditional selection
      - Signal-based
      - Flexible conditions
      fit_for:
      - Signal-driven
      - Conditional filtering
      - Custom logic
      not_fit_for:
      - Simple ranking
      - Top-N selection
      - Momentum
    - name: SelectHasData
      traits:
      - Data availability check
      - Missing data handling
      - Survivorship bias prevention
      fit_for:
