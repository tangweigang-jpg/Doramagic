- id: BD-015
  type: B/BA
  content: Paper trading amount defaults to 1,000,000 for sub-strategies
  rationale: Matching paper trading capital to live trading capital ensures sub-strategies receive consistent
    allocation sizing between live and paper modes. The boundary is at paper trading initialization, ensuring
    sub-strategies scale positions proportionally regardless of whether running live or simulation, enabling
