  - 'FN_NOT_FOUND: module in bt/algos.py'
- id: BD-014
  type: B/DK
  content: CorporateActions models dividends on ex-date with cash adjustments
  rationale: Recording dividends on ex-date (not pay date) reflects actual market mechanics where stock
    price drops by the dividend amount on the ex-date. The boundary is at the ex-date, ensuring price
