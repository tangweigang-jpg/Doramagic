    are missing (not set by a prior weighing algo), Rebalance returns True without making any adjustments.
    This is a silent failure boundary - no exception is raised, no warning is logged. The caller may incorrectly
    assume trades were executed when none occurred.
  evidence: bt/algos.py:1754(rebalance)
  stage: ordering_contract
  _evidence_issues:
  - 'FN_NOT_FOUND: rebalance in bt/algos.py'
- id: BD-073
  type: M
  content: SecurityBase integer_positions propagates to parent and children via use_integer_positions()
  rationale: The use_integer_positions() method propagates integer position handling through the node
    hierarchy. When set on a SecurityBase, it cascades to parent and each child nodes. The boundary is
    that changing integer_positions at any node level affects the entire subtree, which may have unintended
    side effects if different securities in a portfolio require different rounding behaviors.
  evidence: bt/core.py:205(use_integer_positions)
  stage: inheritance
- id: BD-074
  type: BA/DK
  content: 'Pairs trading example: sell must be identified BEFORE buy (directional dependency)'
  rationale: The pairs trading example indexes pairs by ['sell', 'buy'] in that specific order, establishing
    a hard ordering contract where the sell side of the pair must be processed first. This determines
    directionality - the algorithm identifies which leg to short (sell) and which to long (buy) before
    executing. The boundary is that reversing this order or incorrectly identifying which security is
    the sell leg produces wrong position direction.
  evidence: examples/pairs_trading.py:9(pairssignal)
  stage: ordering_contract
