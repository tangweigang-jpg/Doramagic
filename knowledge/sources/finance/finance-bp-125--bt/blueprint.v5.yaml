      update chain.
    evidence: bt/core.py:17(is_zero)
  - behavior: Stale flag propagation to root
    description: Transactions mark root.stale=True. Stale state delays recalculation until next update.
      Stale flag propagates to root, deferred recalculation occurs when data is actually accessed.
    evidence: bt/core.py:968(root.stale=True in transact)
