    in bt/algos.py'
- id: BD-079
  type: T
  content: 'Backtest run order: setup → adjust(capital) → update(t0) → loop update→run→update'
  rationale: 'The backtest execution lifecycle follows a strict order: strategy.setup() initializes state,
    adjust() sets initial capital, first update(t0) seeds initial positions/prices, then the main loop
    calls update→run→update for each date. The boundary is that setup occurs before any data, so algos
    relying on historical data in setup will fail. Also, the double update (before and after run) ensures
    both pre and post-trade states are recorded.'
  evidence: bt/backtest.py:91(backtest)
  stage: ordering_contract
  _evidence_issues:
