replaceable_slots:
- id: slot-001
  name: progress_bar
  description: tqdm preferred for Jupyter, pyprind for minimal installs
  used_in_stages: []
  options:
  - name: pyprind
    traits:
    - simple
    - cross_platform
    fit_for:
    - Simple progress indication during backtest
    not_fit_for:
    - Jupyter notebook environments (progress bar can be verbose)
  - name: tqdm
    traits:
    - feature_rich
    - jupyter_ready
    - thread_safe
    fit_for:
    - Multi-backtest runs, Jupyter environments, detailed progress
    not_fit_for:
    - Minimal dependencies
  default: pyprind (for single backtest), tqdm (for multiple backtests via bt.run())
  _source: worker_resource
- id: slot-002
  name: covariance_estimation
  description: Use sklearn for most cases; pandas cov() for minimal dependencies or very large universes
  used_in_stages: []
  options:
  - name: sklearn Ledoit-Wolf
    traits:
    - shrinkage
    - regularized
    - robust
    fit_for:
    - Portfolio optimization with limited history, noisy covariance estimates
    not_fit_for:
    - Very large universes (O(n^2) complexity)
  - name: pandas built-in
    traits:
    - simple
    - no_shrinkage
    fit_for:
    - Large universes with sufficient history, no additional dependencies
    not_fit_for:
    - Noisy/limited data
  - name: statsmodels
    traits:
    - shrinkage
    - oracle_approximating
    fit_for:
    - When sklearn is not available, oracle approximating shrinkage (OAS)
    not_fit_for:
    - Ledoit-Wolf specific requirements
  default: sklearn Ledoit-Wolf (via sklearn.covariance)
  _source: worker_resource
- id: slot-003
  name: visualization
  description: matplotlib for standard use; plotly for interactive needs; none for headless environments
  used_in_stages: []
  options:
  - name: matplotlib
    traits:
    - standard
    - publication_quality
    - static_plots
    fit_for:
    - Standard plotting, publication-quality charts
    not_fit_for:
    - Interactive dashboards, web integration
  - name: plotly
    traits:
    - interactive
    - web_ready
    fit_for:
    - Interactive charts, web dashboards
    not_fit_for:
    - Static reports, minimal dependencies
  - name: No visualization
    traits:
    - minimal
    - scriptable
    fit_for:
    - Headless environments, purely quantitative analysis
    not_fit_for:
    - Exploratory analysis, presentations
  default: matplotlib
  _source: worker_resource
