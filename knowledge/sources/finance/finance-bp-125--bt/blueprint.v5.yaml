- id: BD-016
  type: B/BA
  content: PAR value of 100.0 used as reference price for fixed income
  rationale: PAR value of 100 represents standard fixed income convention where bonds are issued and trade
    relative to face value. The boundary is at fixed income price calculations, ensuring bond prices are
    quoted as percentage of par rather than absolute dollar amounts, aligning with market convention and
    enabling fair comparison across different bond sizes.
