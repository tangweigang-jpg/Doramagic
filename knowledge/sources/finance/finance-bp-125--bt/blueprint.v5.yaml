- id: BD-075
  type: BA/DK
  content: Security cannot be allocated if price is zero or NaN at allocation time
  rationale: Before allocating to a security, the framework validates that the security has a valid (non-zero,
    non-NaN) price. If price is invalid, an exception is raised. This prevents division by zero and ensures
    positions are sized correctly. The boundary is that this is a hard stop - no allocation occurs, and
    the exception propagates up, potentially halting a backtest if market data has gaps.
  evidence: bt/core.py:17(is_zero)
  stage: invariant
- id: BD-076
  type: B/BA
  content: RunPeriod defaults run_on_first_date=True - algos fire on first date by default
  rationale: RunPeriod algo defaults run_on_first_date=True, meaning algos execute on the first simulation
    date (typically t0) in addition to subsequent dates. This affects behavior because many statistical
    calculations on day 1 may be based on incomplete or NaN data. The boundary is that algo behavior differs
    between first and subsequent dates, which may cause look-ahead bias if initial state assumptions differ
    from ongoing state.
  evidence: bt/algos.py:135(__init__ signature), bt/algos.py:136(run_on_first_date=True default)
