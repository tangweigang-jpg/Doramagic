data_flow:
- from_stage: data_input
  to_stage: tree_building
  data: price DataFrame with datetime index and columns per security; dates DateTimeIndex; additional_data
    dict with bidoffer, coupons
- from_stage: tree_building
  to_stage: strategy_logic
  data: Strategy tree with universe attached via setup() method; parent-child relationships established
- from_stage: strategy_logic
  to_stage: capital_allocation
  data: temp['selected'] (list of security nodes to trade); temp['weights'] (dict mapping securities to
    target weights)
- from_stage: capital_allocation
  to_stage: value_propagation
  data: SecurityBase.transact() calls with quantity and price; parent.adjust() for capital flow adjustments;
    root.stale=True flag set
- from_stage: value_propagation
  to_stage: result_analysis
  data: strategy.prices (Series), strategy.positions (DataFrame), strategy.values (Series), get_transactions()
    output
- from_stage: external
  to_stage: data_input
  data: Raw price data from ffn.get(), CSV files, or manual DataFrame; additional data (bidoffer, coupons)
- from_stage: Backtest.run
  to_stage: strategy_logic
  data: self (target Strategy), iterates over dates DateTimeIndex, calls target.run() each date
- from_stage: Strategy.run
  to_stage: strategy_logic
  data: target (self reference), AlgoStack modifies target.temp dict in place with selected/weights/stat
- from_stage: AlgoStack.__call__
  to_stage: strategy_logic
  data: Individual Algo receives target (Strategy) reference, returns bool to control execution flow
global_contracts:
- contract: Every Node subclasses must implement update(date, data, inow) or raise NotImplementedError
  evidence: bt/core.py:285(update)
- contract: root.stale=True signals value cache invalidation; must call root.update() before value access
  evidence: bt/core.py:416(price property)
- contract: strategy.prices index starts at t0-1day (virtual row) with NaN values for each securities
  evidence: bt/backtest.py:191(_process_data)
- contract: Node name uniqueness enforced within parent - duplicate names raise ValueError
  evidence: bt/core.py:168(_add_children)
- contract: integer_positions propagates from root to each children via use_integer_positions() method
  evidence: bt/core.py:205(use_integer_positions)
- contract: Fixed income strategies cannot have non-fixed income children (guarded in setup)
  evidence: bt/core.py:575(setup raises ValueError)
- contract: AlgoStack stops execution on first False unless algo has run_always=True decorator
  evidence: bt/core.py:2042(AlgoStack.__call__)
- contract: Every price/value arrays indexed by DateTimeIndex matching input data dates
  evidence: bt/core.py:624(setup)
- contract: Root node parent points to itself (self.parent=self) enabling cheap root detection
  evidence: bt/core.py:90-92(self.parent=self, self.root=self)
- contract: Security cannot be allocated if price is zero or NaN at allocation time
  evidence: bt/core.py:1521-1522(raises Exception if price is zero or nan)
- contract: 'Backtest run order: setup → adjust(capital) → update(t0) → loop with update→run→update pattern'
  evidence: bt/backtest.py:237-263
business_decisions:
- id: BD-001
  type: B/BA
  content: Add virtual row at t0-1day with NaN values to preserve accurate total return calculation
  rationale: Without a virtual pre-period row, total return calculations would fail for the first actual
    data point since there would be no baseline price to compare against. The boundary is at the start
    of the backtest period (t0), ensuring each subsequent returns are computable by providing a NaN baseline
    that pandas can handle correctly in ratio calculations.
  evidence: bt/backtest.py:183(_process_data)
  stage: data_input
  alternative_considered: Could interpolate first price backward, but NaN preserves true 'no data' semantics
    and avoids fabricating prices outside the dataset
- id: BD-002
  type: B
  content: Deepcopy strategy when creating Backtest to enable strategy reuse
  rationale: Without deep copying, multiple backtests using the same strategy object would share state,
    causing results to leak between runs. The boundary is at Backtest instantiation, ensuring each backtest
    receives an independent copy that can be modified without affecting the original strategy or other
    concurrent backtests.
  evidence: bt/backtest.py:165(module)
  stage: backtest_setup
  alternative_considered: Could require users to manually copy strategies, but this creates user friction
    and error-prone workflows
  _evidence_issues:
  - 'FN_NOT_FOUND: module in bt/backtest.py'
- id: BD-003
  type: B/BA
  content: Default initial_capital is 1,000,000 units
  rationale: A default capital base of 1M provides a realistic institutional-scale baseline while avoiding
    fractional share issues in most scenarios. The boundary is at Backtest creation with no explicit capital
    specified, ensuring consistent default behavior across each backtests without requiring configuration
    for standard use cases.
  evidence: bt/backtest.py:153(module)
  stage: backtest_setup
  alternative_considered: Could use 100K (retail scale) or leave unset, but 1M balances institutional
    relevance with default usability
  _evidence_issues:
  - 'FN_NOT_FOUND: module in bt/backtest.py'
- id: BD-004
  type: B/BA
  content: Default integer_positions=True for securities
  rationale: Defaulting to integer positions reflects real-world constraints where most securities trade
    in whole shares. The boundary is at security creation when integer_positions is not specified, ensuring
    physical share constraints are respected by default while still allowing fractional shares for synthetic
    strategies or derivatives.
  evidence: bt/core.py:93(module)
  stage: backtest_setup
  alternative_considered: Could default to False for maximum flexibility, but this would produce unrealistic
    backtests for most equity strategies
  _evidence_issues:
  - 'FN_NOT_FOUND: module in bt/core.py'
- id: BD-005
  type: B/BA
  content: 'RunPeriod default: run_on_first_date=True, run_on_end_of_period=False'
  rationale: Starting execution on the first available date ensures strategies begin trading immediately
    rather than waiting for a full period to elapse. The boundary is at the first date in the data range,
    preventing artificial delays in strategy activation while ensuring end-of-period logic only triggers
    after complete periods.
  evidence: bt/algos.py:135(module)
  stage: trading_frequency
  alternative_considered: Could default to run_on_end_of_period only, but this would delay strategy activation
    and reduce sample data utilization
  _evidence_issues:
  - 'FN_NOT_FOUND: module in bt/algos.py'
- id: BD-006
  type: B/BA
  content: SelectAll excludes securities with no data (NaN) and negative/zero prices by default
  rationale: Excluding securities without valid price data prevents division-by-zero errors and ensures
    calculations only operate on tradeable assets. The boundary is at selection time, filtering out invalid
    securities before weight calculation or execution can reference them, thus avoiding runtime errors
    in downstream algos.
  evidence: bt/algos.py:477(module)
  stage: security_selection
  alternative_considered: Could pass NaN securities through and let downstream algos handle, but this
    scatters error handling across the codebase
  _evidence_issues:
  - 'FN_NOT_FOUND: module in bt/algos.py'
- id: BD-007
  type: B/BA
  content: SelectHasData default lookback period is 3 months
  rationale: Three months provides sufficient history to establish price continuity while excluding securities
    with too-short trading histories. The boundary is at 3 months prior to current date, ensuring only
    securities with adequate recent trading history are included, which prevents stale data from newly-listed
    securities from distorting signals.
  evidence: bt/algos.py:565(module)
  stage: security_selection
  alternative_considered: Could use 1 month (aggressive) or 12 months (conservative), but 3 months balances
    data sufficiency with universe size
  _evidence_issues:
  - 'FN_NOT_FOUND: module in bt/algos.py'
- id: BD-008
  type: B/BA
  content: StatTotalReturn default lookback is 3 months for momentum calculation
  rationale: Three-month momentum captures medium-term trend while filtering short-term noise and avoiding
    look-ahead bias from very recent data. The boundary is at 3 months ago from current date, ensuring
    momentum calculations use a consistent historical window that balances signal stability with responsiveness
    to regime changes.
  evidence: bt/algos.py:941(module)
  stage: signal_generation
  alternative_considered: Could use 1-month (more responsive) or 12-month (more stable), but 3 months
    is standard in momentum literature (Jegadeesh-Titman)
  _evidence_issues:
  - 'FN_NOT_FOUND: module in bt/algos.py'
- id: BD-009
  type: B/BA
  content: WeighInvVol/WeighERC/WeighMeanVar each default to 3-month lookback
  rationale: Consistent 3-month covariance lookback across risk-based weighting methods ensures uniform
    volatility estimation and avoids cherry-picking lookback periods. The boundary is at weight calculation
    time with a 3-month rolling window, ensuring risk estimates reflect recent market conditions while
    remaining stable enough for portfolio construction.
  evidence: bt/algos.py:1110,1178,1252(module)
  stage: weight_calculation
  alternative_considered: Could allow each algo to use its own default, but this creates inconsistent
