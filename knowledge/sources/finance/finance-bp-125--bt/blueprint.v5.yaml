  _evidence_issues:
  - 'FN_NOT_FOUND: module in bt/algos.py'
- id: BD-011
  type: B
  content: LimitWeights redistributes excess weight proportionally to other assets
  rationale: Proportional redistribution preserves relative weights among remaining assets while ensuring
    total weights sum to 100%. The boundary is at weight capping time, preventing individual positions
    from exceeding limits while maintaining the portfolio's risk characteristics by respecting the original
    weight hierarchy.
  evidence: bt/algos.py:1435(module)
  stage: risk_management
  alternative_considered: Could redistribute to equally-weighted assets, but this changes the portfolio's
