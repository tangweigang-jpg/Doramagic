- id: BD-087
  type: BA/DK
  content: 'INTERACTION: [BD-012] × [BD-029] → Amplification: 252-day annualization applied to daily margin
    rate calculation creates compounding inconsistency'
  rationale: 'BD-012 uses 252 trading days as annualization factor for volatility calculations. BD-029
    calculates daily margin rate as (1+annual_rate)^(1/365.25)-1 using calendar days including leap years.
    The amplification: TargetVol scaling uses 252-day annualization for volatility, but margin costs are
    calculated using 365.25-day compounding. This creates an inconsistency where volatility-targeted portfolios
    that also carry margin debt have misaligned risk metrics - volatility is expressed in 252-day terms
    while carry costs are in 365.25-day terms. For leveraged strategies using both TargetVol and margin,
    this mismatch can cause slight misestimation of true risk-adjusted returns.'
  evidence: BD-012,BD-029
  stage: global
  alternative_considered: Could use consistent day count across each annualization (either each 252 or
    each 365.25), or document the inconsistency explicitly for users
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-088
  type: BA/M
  content: 'INTERACTION: [BD-018] × [BD-039] → Amplification: turnover metric underestimates true transaction
    costs when spread is modeled'
  rationale: 'BD-018 calculates turnover as min(pos_outlay, neg_outlay) / NAV. BD-039 models bid/offer
    spread by deducting half-spread from execution prices. The amplification: turnover measures the capital
    movement but spread modeling affects execution prices. When spread is deducted, the actual cash outlay
    for buys increases (paying ask) and sell proceeds decrease (receiving bid). This means the true cost
    of a trade is higher than turnover alone suggests - turnover measures quantity but not price impact.
    For high-turnover strategies, the combination of turnover-based cost estimates and spread modeling
    can still understate true transaction costs because spread is a fixed percentage while turnover is
    volume-based.'
  evidence: BD-018,BD-039
  stage: global
  alternative_considered: Could integrate spread cost into turnover calculation directly, or add explicit
    total cost metric combining turnover and spread effects
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
- id: BD-089
  type: BA/M
  content: 'INTERACTION: [BD-051] × [BD-052] × [BD-053] × [BD-057] → Hidden dependency: each risk-based
    weighting algos require sklearn covariance estimation'
  rationale: 'BD-051 WeighInvVol, BD-052 WeighERC, and BD-053 WeighMeanVar each perform risk-based portfolio
    optimization. BD-057 documents Ledoit-Wolf shrinkage as the covariance estimator. The hidden dependency:
    each three weighting methods rely on the sklearn covariance module for matrix estimation. If sklearn
    is unavailable, upgraded to a breaking version, or the sklearn API changes, each risk-based weighting
    algos would fail simultaneously. This creates a single point of failure for risk parity, equal risk
    contribution, and mean-variance optimization strategies.'
  evidence: BD-051,BD-052,BD-053,BD-057
  stage: global
  alternative_considered: Could implement covariance estimation inline, or add sklearn version pins and
    fallback implementations for basic covariance calculation
  _evidence_issues:
  - 'BACKFILLED_FROM_MD: recovered from step2c_business_decisions.md'
