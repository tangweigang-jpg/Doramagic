data_flow:
- from_stage: data_import
  to_stage: curve_construction
  data: EIOPA parameter file path, curve file path, country name for curve selection
- from_stage: data_import
  to_stage: asset_cashflow_generation
  data: Equity and bond position data from CSV files (market price, units, coupon rates, maturity dates)
- from_stage: data_import
  to_stage: liability_cashflow_generation
  data: Liability cash flow dates and amounts from CSV input
- from_stage: curve_construction
  to_stage: pricing
  data: Calibrated Curves object containing alpha parameter, spot rates, forward rates, and discount factors
- from_stage: asset_cashflow_generation
  to_stage: pricing
  data: Cash flow dictionaries for each asset with date-amount pairs
- from_stage: asset_cashflow_generation
  to_stage: time_loop
  data: Unique cash flow dates list, dividend DataFrame, terminal cash flow DataFrame
- from_stage: liability_cashflow_generation
  to_stage: time_loop
  data: Liability DataFrame with cash flow dates and amounts
- from_stage: pricing
  to_stage: time_loop
  data: Equity price DataFrame (eq_price_df), bond price DataFrame (bd_price_df), z-spread DataFrame for
    bonds
- from_stage: time_loop
  to_stage: trading
  data: Current equity and bond units DataFrame, current prices, bank account balance, total market value
- from_stage: trading
  to_stage: time_loop
  data: Adjusted equity and bond units, updated bank account balance (zero or near-zero)
- from_stage: time_loop
  to_stage: export
  data: Summary DataFrame with each period results including cash, market values, returns, and cash flows
global_contracts:
- contract: Every time fractions use 365.25 days per year (actuarial convention with leap year adjustment)
  evidence: main.py:206, EquityClasses.py:238,243,454,516, BondClasses.py:226,231, MainLoop.py:206
- contract: DataFrame dates are columns, asset IDs are rows (consistent matrix orientation across each
    DataFrames)
  evidence: MainLoop.py:26(create_cashflow_dataframe)
- contract: modelling_date + n_proj_years = end_date (enforced in Settings.__post_init__)
  evidence: SettingsClasses.py:21(__post_init__)
- contract: Every monetary values are scalar floats per asset (not arrays), ensuring consistent per-unit
    calculations
  evidence: EquityClasses.py:59(dividend_amount)
- contract: Cash outflows (liabilities) stored as positive values in DataFrame, subtracted from bank account
    in time loop
  evidence: MainLoop.py:231(summary_df)
- contract: Bank account balance ≥ 0 is target after trade function executes (zero-cash policy)
  evidence: MainLoop.py:160(trade)
- contract: 'Curves initialization sequence: SetObservedTermStructure→CalcFwdRates→ProjectForwardRate→CalibrateProjected'
  evidence: main.py:76-85
- contract: 'Cash flow processing order in each period: dividends→coupons→terminal→notional→liabilities'
  evidence: main.py:209-232
- contract: Bond z-spread calibration (calibrate_bond_portfolio) must precede pricing (price_bond_portfolio)
    each period
  evidence: main.py:189,241
- contract: RetrieveRates proj_step parameter must be ≤ n_proj_years to avoid KeyError on calibration
    columns
  evidence: CurvesClass.py:163-171(RetrieveRates)
business_decisions:
- id: BD-001
  type: B
  content: INI file for configuration rather than env vars
  rationale: Configuration stored in INI files enables per-run customization without code changes; supports
    audit trails and version control of model inputs; standard practice in financial modeling for reproducibility
    and separation of concerns between configuration and execution environment
  evidence: ImportData.py:14(get_configuration)
  stage: data_import
  alternative_considered: Environment variables considered but lack auditability and file-based versioning
- id: BD-002
  type: BA/M
  content: end_date derived from modelling_date + n_proj_years
  rationale: End date computation ensures temporal consistency between the modelling horizon and risk-free
    curve projection length; guarantees that each liability cash flows fall within the modelled projection
    period; critical for EIOPA-compliant liability-driven investment where curve adequacy depends on matching
    projection tenor
  evidence: SettingsClasses.py:21(__post_init__)
  stage: data_import
  alternative_considered: Fixed end_date would require manual synchronization with projection parameters
- id: BD-003
  type: M
  content: Generator-based CSV loading for portfolios
  rationale: Generator pattern enables memory-efficient streaming of large portfolio CSV files; avoids
    loading entire dataset into memory; allows immediate processing as records are consumed rather than
    waiting for full file parse; critical for production portfolios with thousands of positions
  evidence: ImportData.py:165(get_EquityShare)
  stage: data_import
  alternative_considered: Pandas read_csv loads entire file; generator approach trades some code complexity
    for memory efficiency
- id: BD-004
  type: B/BA
  content: EIOPA Smith-Wilson implementation for regulatory compliance
  rationale: Solvency II regulation mandates EIOPA-specified Smith-Wilson extrapolation for insurance
    liability discount curves; EU regulatory framework requires compliance with EIOPA technical specifications
    paragraph 120+; failure to comply results in regulatory rejection of solvency capital calculations;
    non-negotiable requirement for EU insurance market access
  evidence: CurvesClass.py:182(SWHeart)
  stage: curve_construction
  alternative_considered: No alternative; EIOPA specification is mandatory for regulatory approval
- id: BD-005
  type: M/BA
  content: Bisection for alpha calibration instead of Newton-Raphson
  rationale: Bisection algorithm guarantees convergence for monotonic objective functions without requiring
    derivatives; avoids gradient computation complexity and Newton-Raphson sensitivity to initial guesses;
    provides robust convergence where gradient methods may diverge or oscillate; simpler implementation
    reduces bug risk in critical calibration routines
  evidence: CurvesClass.py:310(BisectionAlpha)
  stage: curve_construction
  alternative_considered: Newton-Raphson rejected due to convergence instability; Secant method rejected
    due to derivative estimation errors
- id: BD-006
  type: BA/DK
  content: Forward rates calculated from spot via bootstrapping
  rationale: Bootstrapping approach ensures consistency between spot and forward rate term structures;
    aligned with EIOPA formula paragraph 135 specification; standard actuarial methodology for yield curve
    construction; produces forward rates consistent with observable market instruments and regulatory
    requirements
  evidence: CurvesClass.py:45(CalcFwdRates)
  stage: curve_construction
  alternative_considered: Direct forward rate observation rejected; bootstrapping required for complete
    term structure
- id: BD-007
  type: BA/DK
  content: Convergence point = max(U+40, 60) years
  rationale: EIOPA specification paragraph 120 mandates 40-year extrapolation buffer beyond last liquid
    point or minimum 60-year convergence point; ensures stable long-term extrapolation for insurance liabilities
    with durations exceeding observable market data; prevents artificial volatility in very long-dated
    liability valuations; regulatory requirement for UFR determination
  evidence: CurvesClass.py:265(Galfa)
  stage: curve_construction
  alternative_considered: Fixed 60-year point rejected; max(U+40, 60) ensures adequate buffer for illiquid
    maturities
- id: BD-008
  type: M
  content: Generator-based coupon/dividend date generation
  rationale: Generator pattern yields only future dates relative to current modelling_date; avoids memory
    allocation for full date arrays spanning projection horizon; efficient for large portfolios with varying
    dividend schedules; lazy evaluation enables computing dates only when needed during cash flow generation
  evidence: EquityClasses.py:114(generate_dividend_dates)
  stage: asset_cashflow_generation
  alternative_considered: Pre-computed date arrays rejected due to memory overhead for long projections
- id: BD-009
  type: B/BA
  content: Terminal value = market price (no Gordon growth)
  rationale: Simplified terminal value assumes asset sale at modelling end_date at current market price;
    avoids terminal value estimation uncertainty inherent in growth models; Gordon growth model commented
    out and reserved for future sensitivity analysis; appropriate simplification for deterministic projection
    with known endpoint
  evidence: EquityClasses.py:63(terminal_amount)
  stage: asset_cashflow_generation
  alternative_considered: Gordon growth model rejected due to terminal growth rate uncertainty; perpetual
    yield rejected for finite horizon
  vague_rationale: true
- id: BD-010
  type: BA/DK
  content: Dividend amount = market_price × dividend_yield
  rationale: Dividend yield convention relates dividend income to current portfolio market value; aligns
    with insurer perspective where dividend income is a yield-based return component; consistent with
    total return approach and enables straightforward return attribution; standard insurance investment
    accounting practice
  evidence: EquityClasses.py:43(dividend_amount)
  stage: asset_cashflow_generation
  alternative_considered: Discrete dividend per share rejected; yield approach aligns better with insurer
    portfolio perspective
- id: BD-011
  type: BA
  content: Bond coupon = coupon_rate × notional (no accrual)
  rationale: Simplified coupon calculation assumes full coupon payment at each coupon date; no daily accrual
    accounting; aligns with annual reporting frequency and actuarial cash flow focus; avoids accrual computation
    complexity for minimal timing difference within annual period
  evidence: BondClasses.py:67(coupon_amount)
  stage: asset_cashflow_generation
  alternative_considered: Daily accrual rejected as unnecessary complexity for annual-step model
- id: BD-012
  type: B
  content: Frozen dataclass for CorpBond
  rationale: Immutability design pattern prevents accidental modification of bond contract terms after
    creation; ensures deterministic calculation behavior and thread-safe operations; guards against data
    corruption in portfolio valuation; standard defensive programming for financial data structures
  evidence: BondClasses.py:22(CorpBond)
  stage: asset_cashflow_generation
  alternative_considered: Mutable dataclass rejected due to modification risk in complex valuation pipelines
- id: BD-013
  type: B
  content: Simple date/value pairs for liabilities
  rationale: Flexible liability representation as arbitrary date-value pairs enables modelling of any
    cash flow schedule; not constrained to standard insurance product structures; accommodates bespoke
    liability arrangements, reinsurance flows, and non-standard payment schedules; essential flexibility
    for diverse liability portfolios
  evidence: LiabilityClasses.py:6(Liability.__init__)
  stage: liability_cashflow_generation
  alternative_considered: Structured product types rejected as too restrictive for diverse liability portfolios
  _evidence_issues:
  - 'FN_NOT_FOUND: Liability.__init__ in LiabilityClasses.py'
- id: BD-014
  type: BA/DK
  content: Liability subtracted from bank account (negative contribution)
  rationale: Sign convention treats liabilities as negative cash contributions; reduces bank account balance
    for liability payments; consistent with accounting treatment where outflows reduce cash; ensures liquidity
    impact is captured in cash flow sequencing before rebalancing decisions
  evidence: MainLoop.py:101(process_expired_cf)
  stage: liability_cashflow_generation
  alternative_considered: Separate liability tracking rejected; consolidated bank account simplifies rebalancing
    logic
- id: BD-015
  type: B/DK
  content: Z-spread over risk-free curve for corporate bonds
  rationale: Z-spread methodology measures credit risk premium over risk-free benchmark; standard credit
    spread measure in fixed income markets; enables separation of interest rate risk from credit risk
    for risk attribution; aligns with buy-and-hold insurance portfolio perspective focused on credit spread
    income
  evidence: BondClasses.py:193(price_bond)
  stage: pricing
  alternative_considered: I-spread rejected; Z-spread preferred for risk-free curve alignment in ALM context
- id: BD-016
  type: B/DK
  content: Combined spread = country + sector + stress
  rationale: Additive spread decomposition enables granular stress testing with adjustable stress component;
    country and sector components capture systematic risk factors; stress component enables scenario-based
    adjustments without rebuilding base spreads; facilitates regulatory stress test requirements and internal
    risk limits
  evidence: EquityClasses.py:250(EquityPricing)
  stage: pricing
  alternative_considered: Single blended spread rejected; decomposition enables more transparent stress
    testing
  _evidence_issues:
  - 'FN_NOT_FOUND: EquityPricing in EquityClasses.py'
- id: BD-017
  type: M/BA
  content: Bisection for z-spread calibration
  rationale: Bisection root-finding leverages monotonic price-spread relationship to guarantee convergence;
    robust to initial bracket estimation; avoids derivative computation required by Newton-Raphson; reliable
    convergence critical for calibration accuracy in credit valuation
  evidence: BondClasses.py:244(bisection_spread)
  stage: pricing
  alternative_considered: Newton-Raphson rejected due to derivative sensitivity; Brent's method rejected
    as overkill
- id: BD-018
  type: BA/DK
  content: Equity growth = market_value × (1+growth_rate)^t
  rationale: Exponential growth formula with continuous compounding ensures mathematical consistency with
    discounting in NPV calculations; aligns with actuarial exponential discounting convention; tracks
    market value appreciation proportional to growth rate; appropriate for deterministic projection without
    volatility
  evidence: EquityClasses.py:87(generate_market_value)
  stage: pricing
  alternative_considered: Discrete annual steps rejected; exponential form provides smoother continuous
    growth
  vague_rationale: true
- id: BD-019
  type: B/BA
  content: 365.5 day year for each time fractions
  rationale: Actuarial day count convention accounts for leap year distribution (365.25 average adjusted
    for half-day bias); produces accurate time fractions for interest accrual and discounting over multi-year
    horizons; standard practice in insurance and pension calculations; provides better long-term accuracy
    than simple 365-day convention
  evidence: main.py:206(TimeValue)
  stage: time_loop
  alternative_considered: 365-day rejected due to leap year inaccuracy; 365.25 rejected as over-correcting
  _evidence_issues:
  - 'FN_NOT_FOUND: TimeValue in main.py'
- id: BD-020
  type: BA
  content: Annual time steps (days_interval=365)
  rationale: Annual time stepping aligns with EIOPA reporting frequency under Solvency II; balances computational
    efficiency with regulatory requirements; monthly stepping documented as TODO for future enhancement;
    acceptable granularity for long-duration liability projection without intra-year complexity
  evidence: MainLoop.py:53(set_dates_of_interest)
  stage: time_loop
  alternative_considered: Monthly steps rejected as unnecessary complexity for annual reporting model;
    quarterly rejected as neither annual nor monthly
- id: BD-021
  type: BA
  content: Units DataFrame carries position across periods
  rationale: State persistence ensures portfolio units carry forward between projection periods; previous
    period ending units become starting units for new period; essential for tracking accumulation-style
    products where unit value grows over time; maintains audit trail of unit movements across each projection
    periods
  evidence: main.py:197(eq_units_df)
  stage: time_loop
  alternative_considered: Reset to zero each period rejected; would lose unit accumulation tracking
  _evidence_issues:
  - 'FN_NOT_FOUND: eq_units_df in main.py'
- id: BD-022
  type: BA/DK
  content: 'Equity price grows: price[t] = price[t-1] × (1+g)^time_frac'
  rationale: Periodic growth application with time fraction accounts for partial periods between time
    steps; continuous growth principle applied discretely ensures consistency with exponential discounting;
    tracks market value appreciation correctly regardless of time step frequency; essential for accurate
    asset-liability matching
  evidence: main.py:41(main)
  stage: time_loop
  alternative_considered: Discrete annual growth rejected; time_frac approach provides consistency across
    step frequencies
- id: BD-023
  type: BA/DK
  content: Bond price reset to previous (no mark-to-market in basic run)
  rationale: Placeholder bond pricing defers yield curve repricing between periods; TODO comment indicates
    future mark-to-market capability for interest rate sensitivity; basic run uses simplified constant-price
    assumption; acceptable for deterministic projection without interest rate scenarios
  evidence: main.py:239(BondPricing)
  stage: time_loop
  alternative_considered: Full mark-to-market rejected for basic deterministic run; placeholder enables
    future enhancement
  _evidence_issues:
  - 'FN_NOT_FOUND: BondPricing in main.py'
- id: BD-024
  type: BA
  content: Bank account accumulated with each cash flows before trading
  rationale: Cash flow sequencing aggregates each inflows (coupons, dividends, terminal proceeds) and
    outflows (liabilities) before rebalancing; ensures sufficient liquidity for rebalancing decisions;
    prevents over-trading when cash position is being accumulated; proper cash management essential for
    ALM with liability-driven investment
  evidence: MainLoop.py:160(trade)
  stage: time_loop
  alternative_considered: Concurrent processing rejected; sequential approach simplifies logic and matches
    actuarial cash flow focus
- id: BD-025
  type: B
  content: Proportional trading to zero cash
  rationale: Proportional rebalancing maintains constant asset allocation proportions; standard life insurance
    ALM practice for liability-driven investment; ensures risk profile remains consistent with strategic
    asset allocation; prevents allocation drift from differential asset performance over projection horizon
  evidence: MainLoop.py:193(percent_to_sell)
  stage: trading
  alternative_considered: Threshold-based rebalancing rejected; proportional approach aligns with liability-matching
    focus
  _evidence_issues:
  - 'FN_NOT_FOUND: percent_to_sell in MainLoop.py'
- id: BD-026
  type: BA/M
  content: Equal proportional split between equity and bonds
  rationale: Initial 50/50 allocation provides balanced starting point for demonstration; TODO comment
    indicates factor-based trading as future enhancement; arbitrary initial allocation; model designed
    for parameterization rather than fixed allocation
  evidence: MainLoop.py:194(eq_units)
  stage: trading
  alternative_considered: Single asset rejected; balanced approach demonstrates rebalancing across asset
    classes
  _evidence_issues:
  - 'FN_NOT_FOUND: eq_units in MainLoop.py'
- id: BD-027
  type: B
  content: Sell when bank_account < 0, Buy when > 0
  rationale: Zero-cash policy enforces full investment with no idle cash buffer; triggers rebalancing
    when cash surplus or deficit exists; maintains target asset allocation by trading to eliminate cash
    deviations; standard insurance investment practice for liability-driven mandates
  evidence: MainLoop.py:160(trade)
  stage: trading
  alternative_considered: Target cash buffer rejected; zero-cash aligns with full investment mandate
- id: BD-028
  type: BA
  content: min(1, abs(cash/mv)) cap on selling
  rationale: Position limit prevents selling more than 100% of available assets; ensures trades respect
    actual portfolio holdings; bounds sell ratio to [0, 1] range; critical constraint preventing impossible
    trades from cash/liquidity mismatches
  evidence: MainLoop.py:193(percent_to_sell)
  stage: trading
  alternative_considered: Uncapped selling rejected; constraint necessary for trade validity
  _evidence_issues:
  - 'FN_NOT_FOUND: percent_to_sell in MainLoop.py'
- id: BD-029
  type: BA/DK
  content: Single summary DataFrame with each metrics
  rationale: Unified output DataFrame consolidates key metrics (cash, market values, returns, cash flows)
    into single table; facilitates downstream reporting and analysis; aligns with actuarial output conventions;
    enables straightforward Excel export and stakeholder reporting
  evidence: main.py:162(ini_out)
  stage: export
  alternative_considered: Multiple output files rejected; consolidated output simplifies workflow
  _evidence_issues:
  - 'FN_NOT_FOUND: ini_out in main.py'
- id: BD-030
  type: B
  content: Output to configurable path
  rationale: Configurable output path enables redirecting results to arbitrary locations; supports multiple
    scenario runs without overwriting previous outputs; enables batch processing with organized directory
    structures; essential for production workflow automation and scenario comparison
  evidence: ImportData.py:14(get_configuration)
  stage: export
  alternative_considered: Hardcoded output path rejected; configurability essential for production batch
    processing
- id: BD-031
  type: B/BA
  content: Use 365.25 days per year for time fraction calculations (act/365 convention)
  rationale: Standardizes time fraction calculations using the act/365 day-count convention adopted for
    insurance liability projections under Solvency II. The boundary condition ensures each periods are
    normalized to annual equivalents for consistent discounting across multi-currency portfolios. Alternative
    365/360 or actual/actual conventions would produce materially different present values for long-dated
    liabilities.
  evidence: BondClasses.py:41(__post_init__)
  stage: time_loop
  alternative_considered: 365/360 convention rejected for insurance alignment; actual/actual rejected
    for computational complexity
- id: BD-032
  type: B/RC
  content: Smith-Wilson algorithm for yield curve interpolation and extrapolation per EIOPA specs
  rationale: Implements EIOPA-compliant Smith-Wilson algorithm for constructing risk-free yield curves,
    which is a regulatory requirement for Solvency II SCR calculations. The boundary condition requires
    convergence to the UFR at the extrapolation horizon. This decision binds the model to EIOPA's mandated
    methodology, ensuring regulatory acceptance but limiting flexibility for alternative curve construction
    approaches.
  evidence: CurvesClass.py:182(SWHeart); CurvesClass.py:208(SWCalibrate); CurvesClass.py:237(SWExtrapolate)
  stage: curve_construction
  alternative_considered: Cubic splines rejected as non-compliant with EIOPA specs for extrapolation regions
  _evidence_issues:
  - 'INVALID_IDENTIFIER: SWHeart); CurvesClass.py:208(SWCalibrate); CurvesClass.py:237(SWExtrapolate in
    CurvesClass.py'
- id: BD-033
