# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-077
name: OSEM
sop_version: '3.6'
source:
  projects:
  - Open_Source_Economic_Model
  commit_hash: 9a8453d354551d13079ff325e966a63dbf26fcfe
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Asset-Liability Management (ALM) simulation for life insurers and pension funds
  description: Agent-based Asset-Liability Model that simulates investment portfolio evolution, liability
    cash flows, and trading strategy performance over multi-year projection periods using EIOPA-compliant
    Smith-Wilson yield curve construction.
  prerequisites: Understanding of life insurance/pension fund operations, basic knowledge of yield curve
    construction (Smith-Wilson/EIOPA), familiarity with DCF pricing methods, Python proficiency with pandas
    and numpy
  not_suitable_for: Stochastic scenario generation or Monte Carlo simulation, real-time trading systems,
    regulatory stress testing requiring Solvency II stochastic capital calculations (SCR), mortality/lapse/new
    business modeling (marked as TODO)
stages:
- id: data_import
  name: Configuration and Data Import
  order: 1
  responsibility: Loads each configuration files, input data, and EIOPA curve parameters. Initializes
    settings that govern the entire model run. Provides the foundational data layer for each downstream
    calculations.
  interface:
    inputs:
    - ALM.ini configuration file with paths and run parameters
    - CSV input files containing equities, bonds, liabilities
    - EIOPA parameter and curve files for risk-free rate construction
    outputs:
    - Configuration object holding file paths and run parameters
    - Settings object with modelling dates and precision
    - Curves object for yield curve operations
    - Portfolio objects (equity, bond, cash, liability)
  required_methods:
  - name: ImportData.get_configuration
    description: Reads ALM.ini file and returns configuration object with file paths and run parameters
    evidence: ImportData.py:14(get_configuration)
  - name: Settings.__post_init__
    description: Initializes modelling parameters including modelling_date, end_date derived from n_proj_years,
      and decimal precision
    evidence: SettingsClasses.py:21(__post_init__)
  - name: ImportData.get_EquityShare
    description: Generator-based CSV loading for equity portfolio with memory-efficient processing
    evidence: ImportData.py:165(get_EquityShare)
  key_behaviors:
  - behavior: INI file-based configuration
    description: Every configuration is read from ALM.ini rather than environment variables or hardcoded
      values, allowing per-run customization without code changes
    evidence: ImportData.py:14(get_configuration)
  - behavior: Generator-based CSV loading
    description: Equity and bond portfolios are loaded using Python generators, enabling memory-efficient
      processing of large portfolios with immediate downstream processing
    evidence: ImportData.py:165(get_EquityShare)
  - behavior: End date derivation
    description: end_date is automatically derived from modelling_date + n_proj_years, ensuring consistency
      between modelling horizon and curve projection length
    evidence: SettingsClasses.py:21(__post_init__)
  replaceable_points:
  - name: input_format
    description: Data import format for equity and bond portfolios
    options:
    - name: CSV
      traits:
      - Text-based
      - Human readable
      - Version controllable
      fit_for:
      - Standard portfolios
      - Small to medium datasets
      - Audit trails
      not_fit_for:
      - Large portfolios (>100K rows)
      - Binary data
      - Real-time updates
    - name: JSON
      traits:
      - Structured
      - Nested data support
      fit_for:
      - Complex instrument structures
      - API integrations
      not_fit_for:
      - Large tabular data
      - High-frequency updates
    - name: Excel
      traits:
      - Spreadsheet interface
      - Formatting support
      fit_for:
      - Business user input
      - Ad-hoc analysis
      not_fit_for:
      - Automated pipelines
      - Large datasets
      - Version control
    - name: Database
      traits:
      - Concurrent access
      - Query capabilities
      fit_for:
      - Enterprise systems
      - Multiple scenarios
      - Data governance
      not_fit_for:
      - Simple deployments
      - Single-user scenarios
    default: CSV
  design_decisions:
  - INI file for configuration rather than env vars - Allows per-run configuration without code changes;
    standard for financial models (ImportData.py:14)
  acceptance_hints:
  - Configuration object loads without error
  - Settings.end_date equals modelling_date + n_proj_years
  - Every portfolio CSV files are parsed correctly
  - EIOPA parameter files are accessible and valid
- id: curve_construction
  name: Risk-Free Curve Construction
  order: 2
  responsibility: Implements EIOPA-compliant Smith-Wilson algorithm to construct and calibrate the risk-free
    yield curve from observed market rates. Provides the foundational discount factors for each asset
    and liability pricing.
  interface:
    inputs:
    - Observed maturities and yields from EIOPA files
    - UFR (Ultimate Forward Rate) and tau parameters
    - Precision threshold for calibration convergence
    outputs:
    - Calibrated alpha parameter controlling curve smoothness
    - Projected forward rates for each periods
    - Spot rates and discount factors for any maturity
  required_methods:
  - name: Curves.SetObservedTermStructure
    description: Loads observed market rates from EIOPA curve file and stores as term structure
    evidence: CurvesClass.py:22
  - name: Curves.CalcFwdRates
    description: Calculates forward rates from spot rates using bootstrapping consistent with EIOPA paragraph
      135
    evidence: CurvesClass.py:56(CalcFwdRates)
  - name: Curves.ProjectForwardRate
    description: Projects forward rates beyond last liquid point using UFR convergence
    evidence: CurvesClass.py:130
  - name: Curves.CalibrateProjected
    description: Calibrates the Smith-Wilson curve to match observed market prices
    evidence: CurvesClass.py:208(SWCalibrate)
  - name: BisectionAlpha.find_alpha
    description: Finds optimal alpha parameter using bisection to guarantee convergence
    evidence: CurvesClass.py:310(BisectionAlpha)
  key_behaviors:
  - behavior: EIOPA Smith-Wilson implementation
    description: Curve construction follows EIOPA technical specifications required by Solvency II for
      insurance liability matching. This is a regulatory requirement for EU insurance companies.
    evidence: CurvesClass.py:182(SWHeart)
  - behavior: Bisection for alpha calibration
    description: Uses bisection method instead of Newton-Raphson because it guarantees convergence if
      the pricing function is monotonic, making it more robust for production use
    evidence: CurvesClass.py:310(BisectionAlpha)
  - behavior: Convergence point at max(U+40, 60) years
    description: Forward rates converge to UFR at convergence point per EIOPA spec paragraph 120, using
      40-year extrapolation buffer or minimum 60 years
    evidence: CurvesClass.py:301(Galfa)
  - behavior: Sequential initialization required
    description: 'Curves class MUST be initialized in exact sequence: SetObservedTermStructure→CalcFwdRates→ProjectForwardRate→CalibrateProjected.
      Skipping steps leaves calibration vector b and alpha unpopulated.'
    evidence: main.py:76-85(Curves initialization)
  replaceable_points:
  - name: curve_algorithm
    description: Method for constructing risk-free yield curve
    options:
    - name: Smith-Wilson (EIOPA)
      traits:
      - Regulatory compliant
      - UFR convergence
      - Extrapolation support
      fit_for:
      - Solvency II reporting
      - Insurance ALM
      - EU regulatory submissions
      not_fit_for:
      - Non-EU jurisdictions
      - Real-time pricing
      - High-frequency applications
    - name: Cubic Spline
      traits:
      - Smooth curves
      - Local control
      fit_for:
      - General purpose
      - Visualization
      - Non-regulatory use
      not_fit_for:
      - Regulatory reporting
      - Long-dated extrapolation
    - name: Nelson-Siegel
      traits:
      - Parametric
      - Interpretable factors
      fit_for:
      - Fixed income attribution
      - Factor models
      not_fit_for:
      - Long maturities
      - Complex term structures
    default: Smith-Wilson (EIOPA)
  - name: calibration_method
    description: Root-finding algorithm for alpha calibration
    options:
    - name: Bisection
      traits:
      - Guaranteed convergence
      - Robust
      - Simple
      fit_for:
      - Production systems
      - Monotonic functions
      - No derivatives needed
      not_fit_for:
      - Fast convergence required
      - Non-monotonic functions
    - name: Newton-Raphson
      traits:
      - Fast convergence
      - Requires derivatives
      fit_for:
      - Well-behaved functions
      - Speed critical
      not_fit_for:
      - Flat regions
      - Derivative unavailable
    - name: Brent
      traits:
      - Combines bisection and secant
      - Robust and fast
      fit_for:
      - Production systems
      - Unknown function behavior
      not_fit_for:
      - Single bracketing interval
    default: Bisection
  design_decisions:
  - EIOPA Smith-Wilson implementation for regulatory compliance - Required by Solvency II for insurance
    liability matching; EU regulation mandates EIOPA spec (CurvesClass.py:182)
  - Bisection for alpha calibration instead of Newton-Raphson - Bisection guarantees convergence if function
    is monotonic; more robust than gradient methods (CurvesClass.py:310)
  - Forward rates calculated from spot via bootstrapping - Consistent with standard yield curve construction;
    EIOPA formula par 135 (CurvesClass.py:56)
  - 'Convergence point = max(U+40, 60) years - EIOPA spec paragraph 120: 40-year extrapolation buffer
    or minimum 60 years (CurvesClass.py:301)'
  acceptance_hints:
  - Alpha calibration converges within tolerance
  - Alpha value is positive and reasonable (<1.0)
  - Forward rates are monotonically increasing at long maturities
  - Discount factors decrease with maturity
  - Calibrated curve prices match observed instruments
- id: asset_cashflow_generation
  name: Asset Cash Flow Generation
  order: 3
  responsibility: Generates each future cash flows (dividends, coupons, maturities) for equity shares
    and corporate bonds based on their contractual terms and modelling assumptions. Creates the timeline
    of expected asset income.
  interface:
    inputs:
    - Equity and bond position data (market price, units, coupon rates, maturity)
    - modelling_date and end_date from Settings
    - growth_rate and terminal_rate assumptions
    outputs:
    - 'Dictionary of {date: amount} cash flows per asset'
    - Aggregated unique dates across portfolio for timeline construction
    - EquitySharePortfolio and CorpBondPortfolio DataFrames
  required_methods:
  - name: EquityShare.generate_dividend_dates
    description: Generator yielding future dividend payment dates relative to modelling_date
    evidence: EquityClasses.py:114(generate_dividend_dates)
  - name: EquityShare.terminal_amount
    description: Calculates terminal value at end_date (defaults to market_price, Gordon growth commented
      out)
    evidence: EquityClasses.py:84(terminal_amount)
  - name: CorpBond.coupon_amount
    description: Calculates coupon payment as coupon_rate × notional (no daily accrual)
    evidence: BondClasses.py:81(coupon_amount)
  - name: EquitySharePortfolio.unique_dates_profile
    description: Merges cash flow dates across each assets for unified timeline construction
    evidence: EquityClasses.py:534(unique_dates_profile)
  key_behaviors:
  - behavior: Generator-based date generation
    description: Dividend and coupon dates are generated using Python generators, yielding only future
      dates relative to modelling_date for memory efficiency
    evidence: EquityClasses.py:114(generate_dividend_dates)
  - behavior: Terminal value as market price
    description: Default terminal equity value is market_price at end_date, representing liquidation at
      modelling horizon. Gordon growth model is commented out for future use.
    evidence: EquityClasses.py:84(terminal_amount)
  - behavior: Dividend amount = market_price × dividend_yield
    description: Dividend yield convention applied from insurer perspective on dividend income from equity
      holdings
    evidence: EquityClasses.py:59(dividend_amount)
  - behavior: Bond coupon = coupon_rate × notional (no accrual)
    description: Assumes coupon paid in full at each coupon date with no daily accrual accounting
    evidence: BondClasses.py:81(coupon_amount)
  - behavior: Immutable bond data
    description: CorpBond uses frozen=True dataclass to prevent accidental modification of bond terms
      after creation, while EquityShare uses mutable dataclass
    evidence: BondClasses.py:22(@dataclass)
  replaceable_points:
  - name: terminal_value_model
    description: How terminal equity value is calculated at end_date
    options:
    - name: Market price at end_date
      traits:
      - Simple
      - Conservative
      - Liquidation value
      fit_for:
      - Short projection periods
      - Conservative estimates
      not_fit_for:
      - Long horizons
      - Growth scenarios
    - name: Gordon growth model
      traits:
      - Perpetuity-based
      - Growth assumption
      fit_for:
      - Long horizons
      - Stable dividend growth
      not_fit_for:
      - Non-dividend payers
      - High volatility
    - name: No terminal value
      traits:
      - Cash flow only
      - Simplest
      fit_for:
      - Stress testing
      - Short horizons
      not_fit_for:
      - Long-term valuation
    default: Market price at end_date
  - name: dividend_growth
    description: Dividend growth assumption over projection period
    options:
    - name: Fixed growth_rate
      traits:
      - Constant rate
      - Simple parameter
      fit_for:
      - Stable assumptions
      - Base case scenarios
      not_fit_for:
      - Time-varying dividends
      - Sector rotation
    - name: Varying by sector
      traits:
      - Differentiated
      - Realistic
      fit_for:
      - Multi-sector portfolios
      - Sector analysis
      not_fit_for:
      - Simple runs
      - Single sector
    - name: No growth
      traits:
      - Zero growth
      - Conservative
      fit_for:
      - Stress testing
      - Worst case
      not_fit_for:
      - Normal scenarios
    default: Fixed growth_rate
  design_decisions:
  - Generator-based coupon/dividend date generation - Memory efficient; only yields future dates relative
    to modelling_date (EquityClasses.py:114)
  - 'Terminal value = market price (no Gordon growth) - Simplification: terminal sale at end_date; Gordon
    model commented out for future use (EquityClasses.py:84)'
  - Dividend amount = market_price × dividend_yield - Dividend yield convention; aligns with insurer perspective
    on dividend income (EquityClasses.py:59)
  - Bond coupon = coupon_rate × notional (no accrual) - Assumes coupon paid in full at each date; no daily
    accrual (BondClasses.py:81)
  - Frozen dataclass for CorpBond - Prevents accidental modification of bond terms after creation (BondClasses.py:22)
  acceptance_hints:
  - Every dividend dates are after modelling_date
  - Every coupon dates are before or at maturity date
  - Terminal amounts are positive and reasonable
  - Unique dates list covers full projection period
  - Cash flow amounts are scalar floats (not arrays)
- id: liability_cashflow_generation
  name: Liability Cash Flow Generation
  order: 4
  responsibility: Loads and manages liability cash outflows (insurance payments, annuity streams) that
    the portfolio must match. Represents the obligations the asset portfolio is designed to fund.
  interface:
    inputs:
    - Liability CSV with cash_flow_dates and cash_flow_series columns
    outputs:
    - Liability DataFrame with dates as columns and liability ID as rows
    - Unique liability dates list for timeline alignment
  required_methods:
  - name: Liability.__init__
    description: Initializes single liability position with cash flow schedule from CSV input
    evidence: LiabilityClasses.py:6(__init__)
  - name: LiabilityClasses.unique_dates_profile
    description: Extracts and merges liability cash flow dates for unified timeline
    evidence: LiabilityClasses.py:11
  key_behaviors:
  - behavior: Simple date/value pair representation
    description: Liabilities are represented as simple date-value pairs providing flexibility for any
      cash flow schedule without constraint to standard insurance products
    evidence: LiabilityClasses.py:6(__init__)
  - behavior: Negative contribution to bank account
    description: Liability cash flows are subtracted from bank account balance in time loop, reducing
      liquidity as a cash outflow
    evidence: MainLoop.py:231
  - behavior: Code duplication with asset classes
    description: unique_dates_profile implementation is nearly identical in LiabilityClasses, EquityClasses,
      and BondClasses - could be extracted to shared utility
    evidence: LiabilityClasses.py:11, EquityClasses.py:534, BondClasses.py:414
  replaceable_points:
  - name: liability_model
    description: Liability representation and behavior
    options:
    - name: Fixed schedule
      traits:
      - Deterministic
      - Known payments
      fit_for:
      - Annuities
      - Fixed pensions
      - Known commitments
      not_fit_for:
      - Life contingent payments
      - Policyholder behavior
    - name: Stochastic mortality
      traits:
      - Life contingent
      - Probability-based
      fit_for:
      - Life insurance
      - Annuities with death benefits
      not_fit_for:
      - Non-life insurance
      - Deterministic liabilities
    - name: Policy-dependent
      traits:
      - Behavioral
      - Dynamic
      fit_for:
      - Surrender scenarios
      - Lapse sensitivity
      not_fit_for:
      - Fixed products
      - Simple models
    default: Fixed schedule
  design_decisions:
  - 'Simple date/value pairs for liabilities - Flexibility: any cash flow schedule; not constrained to
    standard products (LiabilityClasses.py:6)'
  - 'Liability subtracted from bank account (negative contribution) - Cash outflows reduce liquidity;
    sign convention: -cash (MainLoop.py:231)'
  acceptance_hints:
  - Liability DataFrame loads correctly from CSV
  - Every liability dates are within projection window
  - Liability amounts are positive (representing outflows)
  - Unique dates list merges correctly with asset dates
- id: pricing
  name: Asset Pricing and Valuation
  order: 5
  responsibility: Prices equity and bond portfolios using the calibrated yield curve and asset-specific
    spreads. Computes present values of each future cash flows for valuation and z-spread calibration.
  interface:
    inputs:
    - Cash flow DataFrames from asset_cashflow_generation
    - Curves object with calibrated alpha and spot rates
    - Asset spreads (z-spread for bonds, growth for equity)
    outputs:
    - Price DataFrame for each asset
    - Z-spread DataFrame for bond portfolio
    - Discount factors for any maturity via RetrieveRates
  required_methods:
  - name: price_share
    description: Prices equity position using discounted cash flows with growth rate
    evidence: EquityClasses.py:210(price_share)
  - name: price_bond
    description: Prices corporate bond with z-spread over risk-free curve
    evidence: BondClasses.py:193(price_bond)
  - name: calibrate_bond_portfolio
    description: Finds z-spread that matches observed market price using bisection
    evidence: BondClasses.py:537(calibrate_bond_portfolio)
  - name: Curves.RetrieveRates
    description: Extracts discount factors for any maturity using calibrated curve
    evidence: CurvesClass.py:163(RetrieveRates)
  key_behaviors:
  - behavior: Z-spread over risk-free curve
    description: Corporate bond pricing uses z-spread over the risk-free EIOPA curve, separating interest
      rate risk from credit risk as standard practice
    evidence: BondClasses.py:193(price_bond)
  - behavior: Combined spread = country + sector + stress
    description: Equity pricing combines multiple spread components allowing stress testing by adjusting
      spread_stress
    evidence: EquityClasses.py:250
  - behavior: Bisection for z-spread calibration
    description: Robust root-finding using bisection method with hardcoded bounds [-0.2, 0.2]. Monotonic
      price-spread relationship guarantees convergence.
    evidence: BondClasses.py:244(bisection_spread)
  - behavior: Equity growth = market_value × (1+growth_rate)^t
    description: Continuous compounding convention applied for equity value growth, aligned with exponential
      discounting in DCF
    evidence: EquityClasses.py:110(generate_market_value)
  - behavior: Calibration must precede pricing
    description: calibrate_bond_portfolio MUST be called before price_bond_portfolio each period; otherwise
      z-spread calibration is ignored
    evidence: main.py:189,241
  replaceable_points:
  - name: pricing_model
    description: Asset valuation methodology
    options:
    - name: DCF with curve
      traits:
      - Fundamental
      - Theory-based
      fit_for:
      - Standard valuation
      - Regulatory reporting
      not_fit_for:
      - Market prices needed
      - Illiquid assets
    - name: Market price
      traits:
      - Observable
      - Mark-to-market
      fit_for:
      - Liquid assets
      - Trading portfolios
      not_fit_for:
      - Illiquid assets
      - Model validation
    - name: Third-party pricing
      traits:
      - External source
      - Vendor data
      fit_for:
      - Complex derivatives
      - Benchmarking
      not_fit_for:
      - Simple assets
      - Cost-sensitive
    default: DCF with curve
  - name: spread_calibration
    description: Method to find market-implied spread for bond pricing
    options:
    - name: Bisection
      traits:
      - Guaranteed convergence
      - Robust
      fit_for:
      - Production
      - Monotonic price-spread
      not_fit_for:
      - Fast computation
    - name: Newton-Raphson
      traits:
      - Fast
      - Requires derivative
      fit_for:
      - Speed critical
      - Well-behaved
      not_fit_for:
      - Flat regions
    - name: Linear interpolation
      traits:
      - Fast
      - Approximate
      fit_for:
      - Real-time
      - Near market
      not_fit_for:
      - Calibration accuracy
    default: Bisection
  design_decisions:
  - Z-spread over risk-free curve for corporate bonds - Standard credit spread measure; separates rate
    risk from credit risk (BondClasses.py:193)
  - Combined spread = country + sector + stress - Allows stress testing by adjusting spread_stress component
    (EquityClasses.py:250)
  - Bisection for z-spread calibration - Robust root-finding; monotonic price-spread relationship guarantees
    convergence (BondClasses.py:244)
  - Equity growth = market_value × (1+growth_rate)^t - Continuous compounding convention; aligned with
    exponential discounting (EquityClasses.py:110)
  acceptance_hints:
  - Every assets are priced with positive values
  - Z-spreads are within [-0.2, 0.2] bounds
  - Calibration converges without 'Did not converge' error
  - Prices are consistent with cash flow schedule
  - RetrieveRates returns valid discount factors for proj_step ≤ n_proj_years
- id: time_loop
  name: Main Time-Stepping Loop
  order: 6
  responsibility: 'Orchestrates the annual time-stepping simulation: processes expired cash flows, revalues
    assets, executes trading, and tracks results. The central coordinator that advances the model through
    each projection period.'
  interface:
    inputs:
    - Every asset DataFrames (prices, units, cash flows)
    - Liability DataFrame with cash flow schedule
    - Bank account balance from previous period
    outputs:
    - Summary DataFrame with period-by-period results
    - Final portfolio positions (units, prices, values)
  required_methods:
  - name: set_dates_of_interest
    description: Generates annual modelling dates from modelling_date to end_date
    evidence: MainLoop.py:53(set_dates_of_interest)
  - name: process_expired_cf
    description: Extracts and aggregates cash flows expiring at current period date
    evidence: MainLoop.py:101(process_expired_cf)
  - name: create_cashflow_dataframe
    description: Converts cash flow dictionaries to matrix format with dates as columns
    evidence: MainLoop.py:8(create_cashflow_dataframe)
  key_behaviors:
  - behavior: 365.25 day year convention
    description: Every time fractions use 365.25 days per year (standard actuarial convention accounting
      for leap years). Hardcoded across EquityClasses, BondClasses, and MainLoop.
    evidence: main.py:206
  - behavior: Annual time steps
    description: Projection uses annual periods (days_interval=365). Monthly steps are commented as TODO,
      simplifying EIOPA-aligned annual reporting.
    evidence: MainLoop.py:77
  - behavior: Units DataFrame carries position across periods
    description: Previous period units become starting point for new period, tracking accumulated position
      over time
    evidence: main.py:197(eq_units_df)
  - behavior: Equity price grows continuously
    description: Equity price at t = price at t-1 × (1+g)^time_fraction, applying continuous growth each
      period
    evidence: main.py:235(eq_price_df)
  - behavior: Bond prices not mark-to-market
    description: Bond prices reset to previous period values. TODO comment indicates future yield curve
      repricing not yet implemented.
    evidence: main.py:239(bd_price_df)
  - behavior: Cash accumulated before trading
    description: Bank account accumulates from each coupons, dividends, and terminal cash flows, then
      reduces for liabilities, before trading rebalances to zero
    evidence: MainLoop.py:183(trade)
  - behavior: Strict processing order required
    description: 'process_expired_cf MUST follow exact order: dividends→coupons→terminal→notional→liabilities.
      Bank account must be updated after liability processing before trade function.'
    evidence: main.py:209-232
  replaceable_points:
  - name: time_step
    description: Frequency of modelling periods
    options:
    - name: Annual
      traits:
      - Simple
      - EIOPA aligned
      - Low computation
      fit_for:
      - Solvency II reporting
      - Long-term projections
      not_fit_for:
      - Short-term analysis
      - High-frequency rebalancing
    - name: Monthly
      traits:
      - More granular
      - Moderate complexity
      fit_for:
      - Quarterly reporting
      - Liquidity analysis
      not_fit_for:
      - Long projections
      - High computation
    - name: Daily
      traits:
      - High granularity
      - Complex
      fit_for:
      - Trading strategies
      - Intraday analysis
      not_fit_for:
      - Long-term ALM
      - Regulatory reporting
    default: Annual
  - name: equity_growth_model
    description: How equity market values evolve over time
    options:
    - name: Exponential growth
      traits:
      - Deterministic
      - Smooth
      fit_for:
      - Base case
      - ALM projections
      not_fit_for:
      - Market volatility
      - Regulatory stress
    - name: Stochastic paths
      traits:
      - Random
      - Distribution
      fit_for:
      - Risk analysis
      - Confidence intervals
      not_fit_for:
      - Single scenario
      - Deterministic runs
    - name: Market prices
      traits:
      - Observable
      - External
      fit_for:
      - Backtesting
      - Historical analysis
      not_fit_for:
      - Projections
      - Future scenarios
    default: Exponential growth
  design_decisions:
  - 365.5 day year for each time fractions - Standard actuarial convention; accounts for leap years (main.py:206)
  - 'Annual time steps (days_interval=365) - Simplification: EIOPA uses annual reporting; monthly steps
    commented as TODO (MainLoop.py:77)'
  - Units DataFrame carries position across periods - Previous period units become starting point for
    new period (main.py:197)
  - 'Equity price grows: price[t] = price[t-1] × (1+g)^time_frac - Continuous growth applied each period;
    aligns with market value appreciation (main.py:235)'
  - 'Bond price reset to previous (no mark-to-market) - Placeholder: TODO comment indicates future yield
    curve repricing (main.py:239)'
  - Bank account accumulated with each cash flows before trading - Cash accumulates from coupons/dividends/terminals,
    reduces for liabilities (MainLoop.py:183)
