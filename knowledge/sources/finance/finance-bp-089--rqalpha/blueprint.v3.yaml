# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-089
name: RQAlpha
sop_version: '3.6'
source:
  projects:
  - rqalpha
  commit_hash: ef978b874f887b8727911c6c1d21e9938fb2178e
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: Algorithmic trading backtesting and simulation engine
  description: A comprehensive programmatic trading solution providing data acquisition, algorithmic trading,
    backtesting engine, live simulation, and data analysis for quantitative strategies.
  prerequisites: Python programming knowledge, basic understanding of trading strategies and financial
    markets
  not_suitable_for: Commercial use without licensing (contact public@ricequant.com), non-programmatic
    discretionary trading, real-time production trading without proper infrastructure
  activation:
    triggers:
    - Writing or modifying strategy code
    - Debugging backtest issues
    - Running backtests with rqalpha run
    - Adding new functionality via mods
    - Running tests with pytest
    - Encountering import errors or data issues
    emphasis:
    - Use ESPECIALLY when starting new strategy development
    - Use ESPECIALLY when encountering unexpected backtest behavior
    - Use ESPECIALLY when adding new system components or mods
    - Use ESPECIALLY before committing code changes
    anti_skip:
    - Don't skip documentation consultation because API seems familiar - signatures may differ
    - Don't skip writing tests because the change seems simple - regressions are common
    - Don't skip bundle download because data might exist - version mismatches cause issues
    - Don't skip using logger.info() because print() works during backtest - logging is required for production
stages:
- id: data_layer
  name: Data Layer
  order: 1
  responsibility: Provides historical and real-time market data access, instrument lookup, trading calendar,
    dividends, and splits. Acts as the foundational layer that supplies each market information needed
    for trading decisions and simulation.
  interface:
    inputs:
    - instrument identifiers (order_book_id, symbol)
    - date ranges
    - frequency parameters (1d, 1m, tick)
    - adjustment types
    outputs:
    - Bar/Tick data streams
    - Instrument objects with type/market metadata
    - Trading calendars by market
    - Dividend/Split corporate action data
    - Exchange rates
  required_methods:
  - name: DataProxy.instrument
    description: Retrieves Instrument object by order_book_id or symbol with validation and historical
      tracking support
    evidence: rqalpha/data/instruments_mixin.py:141(instrument)
  - name: DataProxy.get_bars
    description: Fetches historical bar data with frequency and adjustment type support
    evidence: rqalpha/data/data_proxy.py:42(DataProxy)
  - name: DataProxy.get_trading_calendar
    description: Returns trading dates for a given date range and market
    evidence: rqalpha/data/trading_dates_mixin.py:34(TradingDatesMixin)
  - name: BarDictPriceBoard.get_last_price
    description: Provides real-time last price lookup for universe instruments during simulation
    evidence: rqalpha/data/bar_dict_price_board.py:32(get_last_price)
  key_behaviors:
  - behavior: Dynamic storage registration by instrument_type and market
    description: Allows plugging different storage backends per instrument type/market without code changes.
      Each instrument type (STOCK, FUTURE, OPTION) can register its own data store with market-specific
      configuration.
    evidence: rqalpha/data/base_data_source/data_source.py:148(register_day_bar_store)
  - behavior: ChainMap for unified id/symbol instrument lookup
    description: Single lookup dictionary handles both order_book_id and symbol without duplication, providing
      consistent access patterns regardless of identifier type used.
    evidence: rqalpha/data/base_data_source/data_source.py:121(_id_or_sym_instrument_map)
  - behavior: Last price cached in PriceBoard not DataSource
    description: PriceBoard updated per-bar reflects in-progress prices during simulation; DataSource
      provides historical and point-in-time data. This separation prevents historical data contamination
      during real-time updates.
    evidence: rqalpha/data/bar_dict_price_board.py:23(BarDictPriceBoard)
  replaceable_points:
  - name: DataSource backend
    description: Swap HDF5-backed storage for alternative data sources like CSV files or databases
    options:
    - name: BaseDataSource
      traits:
      - HDF5-backed
      - high-performance
      - batch-oriented
      fit_for:
      - Historical backtesting with bundled data
      - Large-scale data access
      not_fit_for:
      - Streaming data
      - Custom data formats without conversion
    - name: Custom AbstractDataSource implementation
      traits:
      - Custom storage backend
      - User-defined format support
      fit_for:
      - Database-backed historical data
      - Real-time data feeds
      - Custom proprietary data
      not_fit_for:
      - Standard RQAlpha bundle format users
    default: BaseDataSource
  - name: PriceBoard implementation
    description: Choose between real-time and delayed price access mechanisms
    options:
    - name: BarDictPriceBoard
      traits:
      - Bar-level granularity
      - In-memory price cache
      fit_for:
      - Standard backtesting simulation
      - Historical replay
      not_fit_for:
      - Tick-level precision
      - Live trading scenarios
    - name: Custom AbstractPriceBoard implementation
      traits:
      - Custom price retrieval
      - Delayed/live feed support
      fit_for:
      - Real-time trading integration
      - External data feed
      not_fit_for:
      - Standard backtesting workflows
    default: BarDictPriceBoard
  design_decisions:
  - DataProxy aggregates multiple mixins (TradingDatesMixin, InstrumentsMixin) providing unified API without
    polluting DataSource class (rqalpha/data/data_proxy.py:42)
  acceptance_hints:
  - Instruments retrieved by order_book_id match those retrieved by symbol
  - Trading calendar aligns with exchange holidays and weekends
  - Bar data correctly adjusted for splits and dividends based on adjustment type
  - get_last_price returns None for instruments not in current universe
- id: event_system
  name: Event System
  order: 2
  responsibility: Central publish-subscribe bus that drives the simulation and event loop. Separates strategy
    logic from market simulation timing and ensures consistent phase enforcement throughout execution.
  interface:
    inputs:
    - System lifecycle events (INIT, BEFORE_TRADING, BAR, AFTER_TRADING, SETTLEMENT)
    - Trading events (TRADE, ORDER_CREATION_PASS, ORDER_CREATION_REJECT)
    outputs:
    - Event dispatch to registered listeners
    - Phase enforcement via ExecutionContext
    - Pre/Post event hooks for extensibility
  required_methods:
  - name: EventBus.publish_event
    description: Dispatches events to registered listeners with system/user listener separation
    evidence: rqalpha/core/events.py:43(publish_event)
  - name: EventBus.prepend_listener
    description: Adds listener to front of execution queue for priority ordering
    evidence: rqalpha/portfolio/account.py:121(prepend_listener)
  - name: ExecutionContext.enforce_phase
    description: Context manager ensuring code executes only in designated phases
    evidence: rqalpha/core/execution_context.py:58(ExecutionContext)
  key_behaviors:
  - behavior: System vs User listener separation
    description: System listeners execute in separate queue and break on True return; user listeners always
      run to completion. This prevents accidental early termination of strategy code and ensures system
      components process events before strategy reactions.
    evidence: rqalpha/core/events.py:43(publish_event)
  - behavior: ExecutionContext as context stack not singleton
    description: Nested contexts are possible (e.g., scheduler running inside handle_bar). This enables
      complex workflows where scheduled functions run within the context of bar processing.
    evidence: rqalpha/core/execution_context.py:58(ExecutionContext)
  - behavior: Pre/Post event hooks around core events
    description: PRE_BAR and post_bar events allow mods to inject logic before and after strategy handle_bar
      execution, enabling cross-cutting concerns like performance tracking or order management.
    evidence: rqalpha/core/events.py:53(EVENT)
  - behavior: System listeners execute before user listeners in EventBus
    description: EVENT.ORDER_CREATION_PASS published by broker runs before strategy can react, ensuring
      validators and risk controls process orders first.
    evidence: rqalpha/core/events.py:44-50(publish_event order)
  replaceable_points:
  - name: EventSource
    description: Historical replay vs live data feed event generation
    options:
    - name: BarEventSource
      traits:
      - 1d/1m bar granularity
      - Historical data driven
      fit_for:
      - Standard backtesting
      - Daily/minute frequency strategies
      not_fit_for:
      - High-frequency tick trading
      - Live trading scenarios
    - name: TickEventSource
      traits:
      - Tick-level granularity
      - Higher data volume
      fit_for:
      - High-frequency strategies
      - Order book simulation
      not_fit_for:
      - Daily bar strategies
      - Low-frequency backtesting
    - name: Custom AbstractEventSource implementation
      traits:
      - Custom event generation
      - External feed support
      fit_for:
      - Live trading integration
      - Proprietary data sources
      not_fit_for:
      - Standard backtesting workflows
    default: BarEventSource
  design_decisions:
  - Pre/Post event hooks around core events allow mods to inject logic before/after strategy handle_bar
    (rqalpha/core/events.py:53)
  acceptance_hints:
  - 'Every lifecycle events fire in correct order: INIT → BEFORE_TRADING → BAR → AFTER_TRADING → SETTLEMENT'
  - PRE_BAR fires before strategy handle_bar, post_bar fires after
  - System listeners process events before user listeners
  - Nested ExecutionContexts correctly track and restore parent phase
- id: strategy_execution
  name: Strategy Execution
  order: 3
  responsibility: Loads and executes user strategy code with sandboxed API access. Manages strategy lifecycle
    including init, before_trading, handle_bar, and after_trading callbacks with proper phase enforcement.
  interface:
    inputs:
    - Strategy source code or user-defined functions
    - Execution context
    - Event dispatch from EventBus
    outputs:
    - Trading signals via submit_order
    - Portfolio state queries
    - Scheduled function executions
  required_methods:
  - name: Strategy.init
    description: Strategy initialization callback executed once at startup with fresh state
    evidence: rqalpha/core/strategy.py:41(Strategy)
  - name: Strategy.handle_bar
    description: Bar update callback triggered on each price update with phase enforcement
    evidence: rqalpha/core/strategy.py:114(wrap_user_event_handler)
  - name: StrategyContext.submit_order
    description: Strategy-facing API for placing orders through the execution pipeline
    evidence: rqalpha/core/strategy_context.py:139(StrategyContext)
  - name: StrategyContext.portfolio
    description: Provides access to portfolio state from strategy code
    evidence: rqalpha/core/strategy_context.py:139(StrategyContext)
  key_behaviors:
  - behavior: StrategyLoader abstraction for multiple code sources
    description: File/SourceCode/UserFunc loaders enable testing, notebooks, and live trading without
      strategy code changes. Each loader implements consistent interface for strategy discovery.
    evidence: rqalpha/interface.py:184(AbstractStrategyLoader)
  - behavior: Scope-based sandbox for strategy API
    description: Strategy code runs in controlled dictionary with explicit API exposure only. Prevents
      accidental access to internal state while providing controlled access to market data and trading
      functions.
    evidence: rqalpha/main.py:176(create_base_scope)
  - behavior: wrap_user_event_handler for phase enforcement
    description: Ensures user code only runs during designated execution phases, throwing errors if called
      during invalid phases like INIT or SETTLEMENT.
    evidence: rqalpha/core/strategy.py:114(wrap_user_event_handler)
  - behavior: Strategy init runs BEFORE persist restore
    description: init() executes with fresh state; any state set in init() will be overwritten by restore.
      Strategies cannot rely on persisted state during initialization.
    evidence: rqalpha/main.py:201(user_strategy.init) → main.py:207(persist_helper.restore)
  - behavior: Deprecated bar_dict parameter auto-wrapping
    description: Old strategies with (context, bar_dict) in before_trading still work but log deprecation
      warning. New strategy style uses only context parameter.
    evidence: rqalpha/core/strategy.py:51-55(co_argcount > 1 check)
  replaceable_points:
  - name: StrategyLoader
    description: Strategy code source and loading mechanism
    options:
    - name: FileStrategyLoader
      traits:
      - File-based loading
      - Hot reload capable
      fit_for:
      - Standard backtesting
      - Production deployments
      not_fit_for:
      - Interactive notebooks
      - Dynamic strategy generation
    - name: SourceCodeStrategyLoader
      traits:
      - String-based loading
      - Dynamic code generation
      fit_for:
      - Notebook environments
      - Generated strategies
      not_fit_for:
      - Production deployments
      - File-based workflows
    - name: UserFuncStrategyLoader
      traits:
      - Function-based loading
      - Direct function reference
      fit_for:
      - Testing scenarios
      - Modular strategy components
      not_fit_for:
      - Standard backtesting workflows
    default: FileStrategyLoader
  design_decisions:
  - StrategyLoader abstraction enables testing, notebooks, and live trading without strategy code changes
    (rqalpha/interface.py:184)
  acceptance_hints:
  - init() executes exactly once before first before_trading
  - handle_bar only called during BAR phase with valid bar_dict
  - before_trading called before any handle_bar on each trading day
  - get_open_orders returns empty list during BEFORE_TRADING phase
  - history_bars returns T-1 data during BEFORE_TRADING regardless of frequency
- id: risk_mods
  name: Risk & Scheduler Modules
  order: 4
  responsibility: Frontend validation of orders before submission, scheduled function execution, and system-level
    risk controls. Catches invalid orders cheaply before they reach the matching engine.
  interface:
    inputs:
    - Order submissions from strategy
    - Time/calendar signals
    - Account cash state
    outputs:
    - Validated or rejected orders with reason
    - Scheduled function calls at configured times
  required_methods:
  - name: CashValidator.validate
    description: Validates sufficient cash exists before order creation
    evidence: rqalpha/mod/rqalpha_mod_sys_risk/validators/cash_validator.py:42(CashValidator)
  - name: Scheduler.schedule
    description: Registers function for scheduled execution at specified times
    evidence: rqalpha/mod/rqalpha_mod_sys_scheduler/scheduler.py:64(Scheduler)
  - name: Environment.submit_order
    description: Entry point that validates and routes orders through the system
    evidence: rqalpha/environment.py:202(submit_order)
  key_behaviors:
  - behavior: FrontendValidator chain via Environment
    description: 'Validators run in sequence before broker, catching invalid orders cheaply. First validator
      returning a reason string causes rejection; later validators never run. Order: CashValidator → PriceValidator
      → IsTradingValidator → custom validators.'
    evidence: rqalpha/environment.py:125(add_frontend_validator)
  - behavior: Scheduler NEXT_BAR semantics for time rules
    description: market_open(9, 31) means next bar after 9:31, not 9:30. This matches China exchange convention
      where trading minutes are represented differently than clock time.
    evidence: rqalpha/mod/rqalpha_mod_sys_scheduler/scheduler.py:264(next_bar_)
  - behavior: Scheduler next_day_ runs on PRE_BEFORE_TRADING
    description: Scheduler date tracking is ready before user before_trading runs. Scheduler functions
      see correct _today value before strategy's before_trading callback.
    evidence: rqalpha/mod/rqalpha_mod_sys_scheduler/scheduler.py:79(add_listener PRE_BEFORE_TRADING)
  - behavior: Scheduler passes None as bar_dict in before_trading phase
    description: Scheduler functions called during before_trading receive None for bar_dict. Accessing
      bar data in scheduled functions during before_trading will raise AttributeError.
    evidence: rqalpha/mod/rqalpha_mod_sys_scheduler/scheduler.py:280(func(self.ucontext, None))
  - behavior: Risk validators execute BEFORE broker submission
    description: Every validators must pass before order reaches broker. Validator errors prevent broker
      processing entirely, ensuring invalid orders never reach the matching engine.
    evidence: rqalpha/environment.py:202(submit_order calls can_submit_order)
  replaceable_points:
  - name: FrontendValidator
    description: Pre-order risk checks and business rule validation
    options:
    - name: CashValidator
      traits:
      - Cash sufficiency check
      - Frozen cash consideration
      fit_for:
      - Every strategies
      - Margin requirement validation
      not_fit_for:
      - Strategies with external funding
    - name: PriceValidator
      traits:
      - Limit price validation
      - Price range checks
      fit_for:
      - Limit order strategies
      - Volatility-based risk controls
      not_fit_for:
      - Market order only strategies
    - name: IsTradingValidator
      traits:
      - Trading hours check
      - Suspension detection
      fit_for:
      - Every strategies
      - Chinese market hours
      not_fit_for:
      - 24-hour markets without configuration
    - name: Custom validators
      traits:
      - User-defined rules
      - Domain-specific checks
      fit_for:
      - Special requirements
      - Regulatory compliance
      not_fit_for:
      - Standard workflows
    default: Multiple validators (CashValidator, PriceValidator, IsTradingValidator)
  - name: Scheduler time rules
    description: Scheduling logic and time reference for scheduled functions
    options:
    - name: market_open
      traits:
      - Exchange open reference
      - Chinese market defaults
      fit_for:
      - Opening range strategies
      - Market-on-open orders
      not_fit_for:
      - Non-Chinese markets without custom configuration
    - name: market_close
      traits:
      - Exchange close reference
      - Closing auction support
      fit_for:
      - Closing range strategies
      - End-of-day rebalancing
      not_fit_for:
      - 24-hour trading venues
    - name: physical_time
      traits:
      - System clock reference
      - Real-time execution
      fit_for:
      - Real-time triggers
      - Event-based scheduling
      not_fit_for:
      - Backtesting (time may not match simulation time)
    default: market_open/market_close with Chinese stock trading minute defaults
  design_decisions:
  - Validators run before broker catching invalid orders cheaply (rqalpha/environment.py:125)
  acceptance_hints:
  - Orders rejected with clear reason when cash insufficient
  - Scheduled functions execute at correct times relative to market open/close
  - Custom validators added via add_frontend_validator are called in registration order
  - 'Validator short-circuit: first non-None reason rejects the order'
- id: order_execution
  name: Order & Execution
  order: 5
  responsibility: Order creation, validation, and matching. Converts trading signals into fills with transaction
    costs. Handles slippage, price limits, and market-specific matching rules.
  interface:
    inputs:
    - Validated order requests
    - Price data from BarDictPriceBoard
    - Account state
    outputs:
    - Trade objects with execution details
    - Order status updates
    - Position change notifications via TRADE events
  required_methods:
  - name: Order.submit
    description: Submits order to broker for matching with current market conditions
    evidence: rqalpha/mod/rqalpha_mod_sys_simulation/signal_broker.py:105(submit_order)
  - name: SignalBroker.fill
    description: Matches order against available liquidity and creates trade records
    evidence: rqalpha/mod/rqalpha_mod_sys_simulation/signal_broker.py:124(fill)
  - name: StockTransactionCostDecider.calc
    description: Calculates transaction costs including commission, tax, and slippage
    evidence: rqalpha/mod/rqalpha_mod_sys_transaction_cost/deciders.py:35(StockTransactionCostDecider)
  key_behaviors:
  - behavior: Order fill updates state synchronously via event
    description: Order.fill() followed by TRADE event ensures Account and Position remain consistent.
      No intermediate inconsistent states exist between fill and position update.
    evidence: rqalpha/mod/rqalpha_mod_sys_simulation/signal_broker.py:124(fill)
  - behavior: Slippage as separate decider injected into broker
    description: Pluggable slippage models (fixed, percentage) without broker code changes. SlippageDecider
      called during fill to modify execution price before trade creation.
    evidence: rqalpha/mod/rqalpha_mod_sys_simulation/signal_broker.py:38(SlippageDecider)
  - behavior: Price limit rejection in broker at match time
    description: Limit up/down check happens at match time, not submit time. This models real exchange
      behavior where limit orders may become executable if price moves within bounds.
    evidence: rqalpha/mod/rqalpha_mod_sys_simulation/signal_broker.py:92(price_limit)
  - behavior: A-share stamp tax applied on SELL only
    description: Side-aware cost calculation applies stamp tax only on sell transactions. Buy transactions
      incur commission but no stamp tax.
    evidence: rqalpha/mod/rqalpha_mod_sys_transaction_cost/deciders.py:87(_calc_tax)
  - behavior: Slippage applied on trade price, not frozen price
    description: Market orders get last_price plus slippage; limit orders get frozen_price plus slippage.
      This models realistic execution costs for different order types.
    evidence: rqalpha/mod/rqalpha_mod_sys_simulation/signal_broker.py:113(get_trade_price)
  replaceable_points:
  - name: Broker/Matching engine
    description: Order matching and fill simulation logic
    options:
    - name: SignalBroker
      traits:
      - Signal-based matching
      - 100% fill assumption
      fit_for:
      - Standard backtesting
      - Strategy development
      not_fit_for:
      - Order book simulation
      - Liquidity modeling
    - name: Custom AbstractBroker implementation
      traits:
      - Custom matching logic
      - Order book integration
      fit_for:
      - Realistic fill simulation
      - Volume constraints
      not_fit_for:
      - Simple signal-based backtesting
    default: SignalBroker
  - name: Transaction cost model
    description: Market-specific transaction cost calculations
    options:
    - name: StockTransactionCostDecider
      traits:
      - A-share costs
      - Stamp tax on sell
      - Commission tiers
      fit_for:
      - Chinese stock strategies
      - A-share backtesting
      not_fit_for:
      - US stocks
      - Forex
      - Crypto
    - name: FuturesTransactionCostDecider
      traits:
      - Futures costs
      - Per-contract fees
      - No stamp tax
      fit_for:
      - Futures strategies
      - Commodity trading
      not_fit_for:
      - Stock strategies
      - Multi-asset portfolios
    - name: Custom decider
      traits:
      - Custom cost structure
      - Market-specific rules
      fit_for:
      - Non-standard markets
      - Regulatory requirements
      not_fit_for:
      - Standard A-share/futures backtesting
    default: Built-in StockTransactionCostDecider and FuturesTransactionCostDecider
  design_decisions:
  - Order fill updates state synchronously via event ensuring Account and Position consistency (rqalpha/mod/rqalpha_mod_sys_simulation/signal_broker.py:124)
  - Transaction cost per INSTRUMENT_TYPE + MARKET tuple supports different cost rules (rqalpha/environment.py:187)
  acceptance_hints:
  - 'Order status transitions correctly: PENDING_NEW → ACTIVE → FILLED/CANCELLED/REJECTED'
  - Trade objects include correct price, quantity, and cost calculations
  - Stamp tax appears only on sell transactions, not buys
  - Slippage correctly adjusts execution price from reference price
  - Price limit violations cause order rejection at match time
- id: portfolio_accounting
  name: Portfolio & Accounting
  order: 6
  responsibility: Tracks positions, cash, margin, and PnL across accounts. Handles T+1 settlement, dividends,
    split adjustments, and provides portfolio metrics for analysis and risk management.
  interface:
    inputs:
    - Trade executions from order matching
    - Price updates via BarDictPriceBoard
    - Corporate actions (dividends, splits)
    - Settlement signals
    outputs:
    - Portfolio state with NAV
    - Account metrics (cash, margin, equity)
    - Position values with PnL attribution
  required_methods:
  - name: Portfolio.unit_net_value
    description: Returns current NAV per unit for performance tracking
    evidence: rqalpha/portfolio/__init__.py:43(Portfolio)
  - name: Account.cash
    description: Returns available cash (total - frozen - margin - cash_liabilities)
    evidence: rqalpha/portfolio/account.py:216(cash)
  - name: Position.position_pnl
    description: Calculates unrealized PnL as old_quantity * (last_price - prev_close) * direction_factor
    evidence: rqalpha/portfolio/position.py:152(position_pnl)
  - name: StockPosition.sellable
    description: Returns quantity available for sale respecting T+1 settlement rules
    evidence: rqalpha/mod/rqalpha_mod_sys_accounts/position_model.py:200(_market_tplus)
  key_behaviors:
  - behavior: PositionProxy for long/short separation in futures
    description: Futures require separate long/short positions with independent margin tracking. PositionProxy
      delegates to appropriate underlying position based on direction.
    evidence: rqalpha/portfolio/position.py:376(PositionProxy)
  - behavior: T+1 closable calculation for A-shares
    description: sellable = total - today_bought - frozen enforces China T+1 rule. Stocks bought today
      cannot be sold today regardless of settlement timing.
    evidence: rqalpha/mod/rqalpha_mod_sys_accounts/position_model.py:200(_market_tplus)
  - behavior: Dividend receivable queued until payable date
    description: Cash from dividends only transferred on ex-dividend payable date, not record date. This
      matches actual settlement practices and prevents premature cash recognition.
    evidence: rqalpha/mod/rqalpha_mod_sys_accounts/position_model.py:80(dividend_receivable)
  - behavior: AccountMeta optimizes stock-only portfolios
    description: 'cls.margin = property(lambda s: 0) replaces margin method with zero-cost property for
      stock-only accounts, avoiding margin calculation overhead. Adding futures breaks this optimization.'
    evidence: rqalpha/portfolio/account.py:41(margin)
  - behavior: Position factory via metaclass POSITION_TYPE_MAP
    description: Position.__new__ dispatches to StockPosition/FuturePosition based on instrument.type.
      This enables different position behaviors for different instrument types without explicit factory
      calls.
    evidence: rqalpha/portfolio/position.py:37(new_position_meta)
  - behavior: fast_forward for resume with trades replay
    description: 'On resume from persist, replay trades in order: opens first, then closes. This maintains
      position integrity during state restoration.'
    evidence: rqalpha/portfolio/account.py:151(fast_forward)
  - behavior: Account fast_forward processes OPEN before CLOSE trades
    description: If same trade ID appears as both OPEN and CLOSE, OPEN will always be processed first.
      This ensures positions are opened before matching closes.
    evidence: rqalpha/portfolio/account.py:158(OPEN check) → account.py:163(CLOSE processing)
  - behavior: Settlement happens AFTER after_trading but BEFORE next day's before_trading
    description: Position P&L finalizes after trading ends. Cash reflects previous day settlements at
      start of new trading day.
    evidence: rqalpha/core/events.py:117-125(EVENT.SETTLEMENT definition)
  replaceable_points:
  - name: Position model
    description: Position tracking logic and market-specific rules
    options:
    - name: StockPosition
      traits:
      - T+1 settlement
      - Dividend handling
      - Direction=LONG only
      fit_for:
      - A-share strategies
      - Stock-only portfolios
      not_fit_for:
      - Futures strategies
      - Short positions
    - name: FuturePosition
      traits:
      - Long/short support
      - Margin tracking
      - Close-today FIFO
      fit_for:
      - Futures strategies
      - Derivatives trading
      not_fit_for:
      - Stock-only portfolios
      - Options strategies
    - name: Custom Position subclass
      traits:
      - Custom PnL logic
      - Market-specific rules
      fit_for:
      - Options strategies
      - Multi-leg instruments
      not_fit_for:
      - Standard stock/futures backtesting
    default: Per-instrument-type defaults (StockPosition for stocks, FuturePosition for futures)
  - name: Account type
    description: Account configuration for different asset classes
    options:
    - name: STOCK
      traits:
      - No margin
      - Cash equity only
      - T+1 settlement
      fit_for:
      - Stock strategies
      - Equity portfolios
      not_fit_for:
      - Futures strategies
      - Leveraged trading
    - name: FUTURE
      traits:
      - Margin required
      - Long/short positions
      - Daily settlement
      fit_for:
      - Futures strategies
      - Commodity trading
      not_fit_for:
      - Stock-only strategies
      - Cash equity portfolios
    - name: Custom account types
      traits:
      - Custom margin rules
      - Asset-specific features
      fit_for:
      - Multi-asset portfolios
      - Custom margin models
      not_fit_for:
      - Standard single-asset backtesting
    default: DEFAULT_ACCOUNT_TYPE enum with STOCK and FUTURE
  design_decisions:
  - PositionProxy for long/short separation in futures (rqalpha/portfolio/position.py:376)
  acceptance_hints:
  - Account.cash = total_cash - frozen_cash - margin - cash_liabilities at each times
  - StockPosition.sellable excludes today_bought respecting T+1 rule
  - Dividend cash appears on payable_date, not record_date
  - Portfolio unit_net_value matches sum of position values plus cash
  - Position.direction_factor = 1 for LONG, -1 for SHORT consistently applied
  - fast_forward restores correct position state from persisted trades
data_flow:
- from_stage: data_layer
  to_stage: event_system
  data: BarDict with prices per order_book_id, updated each bar during simulation
- from_stage: event_system
  to_stage: strategy_execution
  data: BAR/TICK events that trigger handle_bar/handle_tick callbacks in user strategy
- from_stage: strategy_execution
  to_stage: risk_mods
  data: Order requests via submit_order API call
- from_stage: risk_mods
  to_stage: order_execution
  data: Validated orders that pass each frontend validators
- from_stage: order_execution
  to_stage: portfolio_accounting
  data: Trade objects with execution details and TRADE events for position updates
- from_stage: data_layer
  to_stage: portfolio_accounting
  data: Price updates via BarDictPriceBoard.get_last_price() for PnL calculation
- from_stage: portfolio_accounting
  to_stage: risk_mods
  data: Account.cash for CashValidator to check sufficient funds
- from_stage: event_system
  to_stage: risk_mods
  data: AFTER_TRADING events trigger analyser collection and SETTLEMENT triggers final daily processing
- from_stage: strategy_execution
  to_stage: portfolio_accounting
  data: Portfolio state queries via context.portfolio and context.account
global_contracts:
- contract: Every prices validated via is_valid_price() before use in calculations or order submission
  evidence: rqalpha/data/bar_dict_price_board.py:32(get_last_price)
- contract: PositionPnl = old_quantity * (last_price - prev_close) * direction_factor where direction_factor=1
    for LONG, -1 for SHORT
  evidence: rqalpha/portfolio/position.py:152(position_pnl)
- contract: TradingPnl = net_trade_quantity * last_price - trade_cost) * direction_factor for realized
    PnL
  evidence: rqalpha/portfolio/position.py:131(trading_pnl)
- contract: Account.cash = total_cash - frozen_cash - margin - cash_liabilities always holds
  evidence: rqalpha/portfolio/account.py:216(cash)
- contract: 'Order.status transitions follow strict state machine: PENDING_NEW → ACTIVE → FILLED/CANCELLED/REJECTED'
  evidence: rqalpha/model/order.py:247(status)
- contract: Every instrument lookup via data_proxy.instrument() returns Instrument object with .type attribute
    populated
  evidence: rqalpha/data/instruments_mixin.py:141(instrument)
- contract: Environment is singleton accessed via Environment.get_instance() ensuring single system state
  evidence: rqalpha/environment.py:83(get_instance)
- contract: Persistable classes use __subclasshook__ for duck-typing - any class with get_state/set_state
    qualifies for persistence
  evidence: rqalpha/interface.py:708-714(__subclasshook__)
- contract: get_open_orders excludes EXERCISE orders via hardcoded filter
  evidence: rqalpha/apis/api_base.py:133(position_effect != EXERCISE filter)
- contract: history_bars returns T-1 data in before_trading regardless of frequency due to force include_now=False
  evidence: rqalpha/apis/api_base.py:505-508(force include_now=False in BEFORE_TRADING)
business_decisions:
- id: BD-001
  type: BA
  content: Separate DataProxy from DataSource for forward proxy pattern
  rationale: DataProxy aggregates multiple mixins (TradingDatesMixin, InstrumentsMixin) providing unified
    API without polluting DataSource class. This separation allows DataSource to remain focused on data
    retrieval while DataProxy orchestrates cross-cutting concerns, enabling addition of new mixins without
    modifying core data access logic.
  evidence: rqalpha/data/data_proxy.py:42(DataProxy)
  stage: data_layer
  alternative_considered: Could have extended DataSource directly but would couple data retrieval with
    API aggregation logic
- id: BD-002
  type: B/DK
  content: Dynamic storage registration by instrument_type and market
  rationale: Allows plugging different storage backends per instrument type/market without code changes.
    This registry pattern enables runtime configuration of storage engines (e.g., CSV for historical,
    HDF5 for high-frequency) based on instrument characteristics, supporting varied data sources across
    different trading venues without hardcoding.
  evidence: rqalpha/data/base_data_source/data_source.py:148(register_day_bar_store)
  stage: data_layer
  alternative_considered: Static storage mapping would require code changes for each new instrument type/market
    combination
- id: BD-003
  type: B/DK
  content: CustomEnum metaclass with reverse lookup
  rationale: 'Enables both name and value-based enum lookup: ORDER_STATUS.MARKET == ''MARKET'' works both
    ways. The metaclass provides bidirectional mapping between enum members and their values, eliminating
    boilerplate comparison code and reducing errors in order status handling across the system.'
  evidence: rqalpha/const.py:21(CustomEnumMeta)
  stage: data_layer
  alternative_considered: Standard Python enum requires explicit value() method calls for reverse lookup
- id: BD-004
  type: B
  content: ChainMap for id/symbol instrument lookup
  rationale: Single lookup dict handles both order_book_id and symbol without duplication. Using ChainMap
    provides O(1) lookup performance while maintaining separate namespaces for id and symbol keys, avoiding
    the need to duplicate instrument objects in multiple dictionary structures.
  evidence: rqalpha/data/base_data_source/data_source.py:121(_id_or_sym_instrument_map)
  stage: data_layer
  alternative_considered: Separate id_map and symbol_map would double instrument object storage
  _evidence_issues:
  - 'FN_NOT_FOUND: _id_or_sym_instrument_map in rqalpha/data/base_data_source/data_source.py'
- id: BD-005
  type: BA
  content: Last price cached in PriceBoard not in DataSource
  rationale: PriceBoard updated per-bar reflects in-progress prices; DataSource is historical/point-in-time.
    This separation ensures strategies can access current tick/bar prices for real-time decisions while
    DataSource maintains accurate historical records, preventing contamination of historical data with
    live trading information.
  evidence: rqalpha/data/bar_dict_price_board.py:23(BarDictPriceBoard)
  stage: data_layer
  alternative_considered: Caching in DataSource would blur the line between historical and live price
    data
- id: BD-006
  type: BA
  content: Pre/Post event hooks around core events
  rationale: PRE_BAR/post_bar allows mods to inject logic before/after strategy handle_bar. This hook
    pattern enables extensibility without modifying core event dispatch, allowing risk checks, logging,
    and monitoring mods to wrap strategy execution for side effects that must run regardless of strategy
    logic.
  evidence: rqalpha/core/events.py:53(EVENT)
  stage: event_system
  alternative_considered: Direct modification of handle_bar would require changes per strategy
- id: BD-007
  type: B
  content: Separate user vs system listeners with different dispatch semantics
  rationale: System listeners break on True return; user listeners always run - prevents accidental early
    termination. This semantic distinction protects system-level handlers (risk checks, accounting) from
    being bypassed by user code that might return True, ensuring critical infrastructure runs to completion
    regardless of strategy behavior.
  evidence: rqalpha/core/events.py:43(publish_event)
  stage: event_system
  alternative_considered: Uniform True-break semantics would allow buggy user code to corrupt system state
- id: BD-008
  type: BA
  content: prepend_listener for account event hooks
  rationale: Account updates BAR/TICK before other listeners to ensure position state reflects latest
    prices. Prepending account listeners guarantees accounting runs first, so subsequent handlers (including
    strategy code) work with consistent position state, preventing stale price references in position-sensitive
    logic.
  evidence: rqalpha/portfolio/account.py:121(prepend_listener)
  stage: event_system
  alternative_considered: Append ordering could cause strategy to see stale positions before accounting
    updates
  _evidence_issues:
  - 'FN_NOT_FOUND: prepend_listener in rqalpha/portfolio/account.py'
- id: BD-009
  type: BA/M
  content: ExecutionContext as context stack, not singleton
  rationale: Nested contexts possible (e.g., scheduler running inside handle_bar). The stack model allows
    precise tracking of execution phases even when one execution context triggers another, such as a scheduled
    function executing within a bar handler, maintaining correct phase attribution for each operations.
  evidence: rqalpha/core/execution_context.py:58(ExecutionContext)
  stage: event_system
  alternative_considered: Singleton pattern would lose outer context when entering nested execution
- id: BD-010
  type: B
  content: Order fill updates state synchronously via event
  rationale: Order.fill() + TRADE event ensures Account and Position always consistent. Publishing the
    TRADE event immediately after state update guarantees each dependent systems (accounting, risk, analytics)
    receive notification synchronously, eliminating race conditions between order execution and portfolio
    state.
  evidence: rqalpha/mod/rqalpha_mod_sys_simulation/signal_broker.py:124(fill)
  stage: order_execution
  alternative_considered: Async state updates could cause position discrepancies during rapid trading
  _evidence_issues:
  - 'FN_NOT_FOUND: fill in rqalpha/mod/rqalpha_mod_sys_simulation/signal_broker.py'
- id: BD-011
  type: BA/DK
  content: Slippage as separate decider injected into broker
  rationale: Pluggable slippage models (fixed, percentage) without broker changes. Decider injection allows
    different slippage assumptions per asset class or market without modifying broker logic, enabling
    realistic simulation of execution costs across diverse trading scenarios.
  evidence: rqalpha/mod/rqalpha_mod_sys_simulation/signal_broker.py:38(SlippageDecider)
  stage: order_execution
  alternative_considered: Hardcoded slippage would require broker modifications for each cost model
  _evidence_issues:
  - 'FN_NOT_FOUND: SlippageDecider in rqalpha/mod/rqalpha_mod_sys_simulation/signal_broker.py'
- id: BD-012
  type: B
  content: AlgoOrder styles for TWAP/VWAP execution
  rationale: Execution algorithm decoupled from order routing. AlgoOrder styles (TWAP, VWAP) separate
    execution strategy from order lifecycle management, allowing the same routing infrastructure to support
    multiple algorithmic approaches without duplicating order handling logic.
  evidence: rqalpha/model/order.py:396(AlgoOrder)
  stage: order_execution
  alternative_considered: Tight coupling would require implementing TWAP/VWAP logic in each broker
- id: BD-013
  type: BA/DK
  content: Transaction cost per INSTRUMENT_TYPE + MARKET tuple
  rationale: Supports different cost rules for same instrument traded in different markets. This dual-key
    lookup (instrument type + market) accurately models varying commission rates, exchange fees, and regulatory
    charges across different venues where the same security might trade.
  evidence: rqalpha/environment.py:187(set_transaction_cost_decider)
  stage: order_execution
  alternative_considered: Single cost per instrument type would miscalculate costs for dual-listed securities
- id: BD-014
  type: BA/M
  content: Price limit rejection in broker, not order creation
  rationale: Limit up/down check happens at match time, not submit time - models real exchange behavior.
    This simulation of exchange rules ensures backtesting accurately reflects scenarios where limit orders
    are accepted but later rejected when price limits are hit, providing realistic fill rate modeling.
  evidence: rqalpha/mod/rqalpha_mod_sys_simulation/signal_broker.py:92(price_limit)
  stage: order_execution
  alternative_considered: Submit-time rejection would overstate order failures in limit-order-heavy strategies
  _evidence_issues:
  - 'FN_NOT_FOUND: price_limit in rqalpha/mod/rqalpha_mod_sys_simulation/signal_broker.py'
- id: BD-015
  type: B/BA
  content: PositionProxy for long/short separation in futures
  rationale: Futures need separate long/short positions with independent margin. PositionProxy allows
    a single instrument to have both directional positions tracked independently, essential for futures
    where margin calculations, settlement, and risk metrics differ between long and short holdings.
  evidence: rqalpha/portfolio/position.py:376(PositionProxy)
  stage: portfolio_accounting
  alternative_considered: Net position would incorrectly calculate margin for hedged futures strategies
- id: BD-016
  type: B/DK
  content: T+1 closable calculation for A-shares
  rationale: sellable = total - today_bought - frozen; enforces China T+1 rule. The formula correctly
    prevents selling shares purchased same day while accounting for previously bought but not yet settled
    shares, accurately modeling the China A-share settlement restriction.
  evidence: rqalpha/mod/rqalpha_mod_sys_accounts/position_model.py:200(_market_tplus)
  stage: portfolio_accounting
  alternative_considered: Ignoring T+1 would allow unrealistic same-day sell-after-buy strategies
- id: BD-017
  type: B/BA
  content: Dividend receivable queued until payable date
  rationale: Cash only transferred on ex-dividend payable date, not record date. Queuing dividend receivables
    until payable date accurately models the gap between record date (ownership determination) and actual
    cash receipt, preventing premature capital allocation in portfolio accounting.
  evidence: rqalpha/mod/rqalpha_mod_sys_accounts/position_model.py:80(dividend_receivable)
  stage: portfolio_accounting
  alternative_considered: Record-date recognition would misstate cash position timing
- id: BD-018
  type: M
  content: AccountMeta black magic for margin optimization
  rationale: 'cls.margin = property(lambda s: 0) replaces method with zero-cost property for stock-only
    accounts. This metaclass technique eliminates margin calculation overhead for equity-only accounts
    that never incur margin, using class-level property replacement to avoid instance-level computation.'
  evidence: rqalpha/portfolio/account.py:256(margin)
  stage: portfolio_accounting
  alternative_considered: Method with conditional check would add overhead to every margin access
- id: BD-019
  type: B
  content: Position factory via metaclass POSITION_TYPE_MAP
  rationale: Position.__new__ dispatches to StockPosition/FuturePosition based on instrument.type. The
    factory pattern via metaclass eliminates explicit conditional creation logic, allowing new instrument
    types to register their position class without modifying position creation code.
  evidence: rqalpha/portfolio/position.py:37(new_position_meta)
  stage: portfolio_accounting
  alternative_considered: if/else creation would require code changes per instrument type
- id: BD-020
  type: BA
  content: fast_forward for resume with trades replay
  rationale: 'On resume, replay trades in order: opens first, then closes - maintains position integrity.
    Replaying historical trades in sequence ensures position state is correctly reconstructed, with opening
    trades establishing positions before closing trades attempt to reduce them, preventing sell-before-buy
    errors.'
  evidence: rqalpha/portfolio/account.py:151(fast_forward)
  stage: portfolio_accounting
  alternative_considered: Random order replay could cause position calculation errors on resume
- id: BD-021
  type: B
  content: StrategyLoader abstraction for multiple code sources
  rationale: File/SourceCode/UserFunc loaders enable testing, notebooks, and live trading without strategy
    code changes. Abstract factory pattern for strategy loading decouples the framework from specific
    code storage mechanisms, allowing the same strategy to run from files, strings, or callable objects
    interchangeably.
  evidence: rqalpha/interface.py:184(AbstractStrategyLoader)
  stage: strategy_execution
  alternative_considered: Hardcoded file loading would prevent programmatic strategy creation and testing
- id: BD-022
  type: BA
  content: Scope-based sandbox for strategy API
  rationale: Strategy code runs in controlled dict with explicit API exposure only. Sandboxing via scope
    dict prevents accidental access to internal APIs while explicitly whitelisting allowed functions,
    protecting system integrity from buggy or malicious strategy code that might inadvertently access
    unintended capabilities.
  evidence: rqalpha/main.py:67(create_base_scope)
  stage: strategy_execution
  alternative_considered: Global namespace exposure risks corruption of system state by strategy code
- id: BD-023
  type: BA
  content: wrap_user_event_handler for phase enforcement
  rationale: Ensures user code only runs during designated execution phases. Wrapper enforcement prevents
    strategies from executing during forbidden phases (e.g., initialization, teardown), maintaining clean
    boundaries between framework operations and user-defined logic for predictable execution semantics.
  evidence: rqalpha/core/strategy.py:114(wrap_user_event_handler)
  stage: strategy_execution
  alternative_considered: No enforcement would allow strategies to access partially-initialized state
- id: BD-024
  type: B
  content: run_when_strategy_not_hold decorator
  rationale: Prevents event handling when strategy is paused by mod. Decorator-based gating allows mods
    to externally control strategy execution without modifying handler code, enabling pause/resume functionality
    and preventing event processing during invalid states.
  evidence: rqalpha/core/strategy.py:29(run_when_strategy_not_hold)
  stage: strategy_execution
  alternative_considered: Inline checks would require modification per event handler
- id: BD-025
  type: BA
  content: FrontendValidator chain via Environment
  rationale: Validators run before broker, catching invalid orders cheaply. Frontend validation catches
    obvious errors (insufficient capital, position limits) before reaching broker logic, avoiding expensive
    broker-side processing for orders destined to fail while providing clear rejection messages.
  evidence: rqalpha/environment.py:125(add_frontend_validator)
  stage: risk_mods
  alternative_considered: Every validation in broker would waste resources processing invalid orders
- id: BD-026
  type: B/BA
  content: Scheduler NEXT_BAR semantics for time rules
  rationale: market_open(9, 31) means next bar after 9:31, not 9:30 - matches China exchange convention.
    This interpretation aligns scheduler behavior with actual exchange bar boundaries, ensuring scheduled
    functions fire at times matching real market data bars rather than arbitrary clock times.
  evidence: rqalpha/mod/rqalpha_mod_sys_scheduler/scheduler.py:264(next_bar_)
  stage: risk_mods
  alternative_considered: Clock-time semantics would misalign scheduled functions with bar boundaries
- id: BD-027
  type: M
  content: Shift-based return calculation in analyser
  rationale: returns = nav/nav.shift(1).fillna(1) - 1; first bar gets fillna(1) to avoid NaN. Using pandas
    shift() for returns calculation leverages vectorized operations while handling the edge case of the
    first bar (no prior NAV) by treating it as 0% return, preventing NaN propagation in downstream analytics.
  evidence: rqalpha/mod/rqalpha_mod_sys_analyser/mod.py:403(shift)
  stage: risk_mods
  alternative_considered: Loop-based calculation would be significantly slower for long backtests
  _evidence_issues:
  - 'FN_NOT_FOUND: shift in rqalpha/mod/rqalpha_mod_sys_analyser/mod.py'
- id: BD-028
  type: B
  content: Order creation flow uses frontend validators before submission
  rationale: Frontend validation prevents invalid orders from reaching the matching engine, reducing error
    handling overhead and improving simulation integrity. The validation boundary is at order submission
    time, before any matching logic executes.
  evidence: rqalpha/mod/rqalpha_mod_sys_simulation/signal_broker.py:44(submit_order)
  stage: order_execution
  alternative_considered: Backend-only validation was considered but rejected to provide faster feedback
    and avoid wasted matching engine cycles.
- id: BD-029
  type: B/DK
  content: Market order unfilled portion cancelled when volume limit exceeded
  rationale: Market orders partially filled against available liquidity have the remainder cancelled rather
    than remaining active, preventing stale orders in a fast-moving market. This boundary ensures predictable
    order lifecycle behavior when volume constraints are hit.
  evidence: rqalpha/mod/rqalpha_mod_sys_simulation/matcher.py:506(match)
  stage: order_execution
  alternative_considered: Converting unfilled portion to limit order at current price was rejected to
    maintain strict market order semantics.
- id: BD-030
  type: B/BA
  content: Limit order remains active if price not reached; cancelled if price limit reached
  rationale: Price limit check enforces Chinese market circuit breaker rules where trading halts at limit-up/limit-down
    prices. Orders touching these limits are cancelled to prevent execution at halted prices, with the
    boundary at the limit price threshold.
  evidence: rqalpha/mod/rqalpha_mod_sys_simulation/matcher.py:150(_price_limit_check)
  stage: order_execution
  alternative_considered: Rejecting at submission time was considered but runtime check needed due to
    intraday limit updates.
  _evidence_issues:
  - 'FN_NOT_FOUND: _price_limit_check in rqalpha/mod/rqalpha_mod_sys_simulation/matcher.py'
- id: BD-031
  type: B/BA
  content: DefaultBarMatcher uses CURRENT_BAR_CLOSE for deal price when volume_limit enabled
  rationale: When volume_limit restricts execution, using the current bar's close price provides a realistic
    execution reference point aligned with bar-based simulation. The boundary is the volume limit trigger,
    after which deal price determination switches to close price.
  evidence: rqalpha/mod/rqalpha_mod_sys_simulation/matcher.py:76(_current_bar_close_decider)
  stage: order_execution
  alternative_considered: Using next bar open was rejected as it introduces lookahead bias in bar-based
    simulation.
- id: BD-032
  type: B/DK
  content: 'Slippage applied to deal price: BUY adds positive slippage, SELL subtracts'
  rationale: Market impact modeling requires BUY orders to execute at higher prices (adverse price movement)
    and SELL orders at lower prices. The slippage direction boundary is determined by order side, simulating
    realistic execution costs in liquid and illiquid markets.
  evidence: rqalpha/mod/rqalpha_mod_sys_simulation/slippage.py:113(get_trade_price)
  stage: order_execution
  alternative_considered: Symmetric slippage was rejected as it doesn't reflect directional market impact
    observed in real markets.
- id: BD-033
  type: B/DK
  content: Slippage constrained by price limits (limit_up, limit_down)
  rationale: Slippage cannot push execution prices beyond daily price limits, ensuring simulation stays
    within regulatory bounds. The boundary is the limit price, after which slippage application stops
    to prevent illegal price violations.
  evidence: rqalpha/mod/rqalpha_mod_sys_simulation/slippage.py:78(is_valid_price)
  stage: order_execution
  alternative_considered: Capping at limit was accepted as it mirrors real exchange behavior during limit-up/limit-down
    days.
  _evidence_issues:
  - 'FN_NOT_FOUND: is_valid_price in rqalpha/mod/rqalpha_mod_sys_simulation/slippage.py'
- id: BD-034
  type: B/RC
  content: Cash validation includes estimated transaction cost
  rationale: Pre-validating cash sufficiency requires accounting for transaction costs (commission, tax)
    to prevent over-trading that would leave insufficient cash for settlement. The boundary is the estimated
    total cost including each fees before order execution.
  evidence: rqalpha/mod/rqalpha_mod_sys_risk/validators/cash_validator.py:31(cost_money_calc)
  stage: order_execution
  alternative_considered: Post-trade cost deduction was rejected as it could cause margin calls mid-simulation.
  _evidence_issues:
  - 'FN_NOT_FOUND: cost_money_calc in rqalpha/mod/rqalpha_mod_sys_risk/validators/cash_validator.py'
- id: BD-035
  type: B/BA
  content: Available cash for buying excludes already-frozen cash
  rationale: Frozen cash from pending sell orders cannot be used for new purchases, preventing double-commitment
    of capital. The boundary is the pending order queue, where frozen cash is reserved until orders fill
    or cancel.
  evidence: rqalpha/mod/rqalpha_mod_sys_accounts/api/order_target_portfolio.py:75(order_target_portfolio:)
  stage: portfolio_accounting
  alternative_considered: Gross cash availability was rejected as it would allow over-trading beyond actual
    available capital.
  _evidence_issues:
  - 'INVALID_IDENTIFIER: order_target_portfolio: in rqalpha/mod/rqalpha_mod_sys_accounts/api/order_target_portfolio.py'
- id: BD-036
  type: B/RC
  content: Sell order quantity validated against position.closable
  rationale: Short selling is prevented by validating sell quantities against closable position size (considering
    T+1 settlement rules). The boundary is the closable quantity computed from historical trades and settlement
    status.
  evidence: rqalpha/mod/rqalpha_mod_sys_accounts/position_validator.py:33(validate_submission)
  stage: order_execution
  alternative_considered: Using total position was rejected as it would enable T+0 short selling in A-shares.
  vague_rationale: true
- id: BD-037
  type: B
  content: Close-today orders validated against position.today_closable
  rationale: Intraday trading (当日买卖) requires today's purchased shares to be explicitly marked as today_closable,
    separate from regular closable. The boundary is the intraday position tracking distinguishing today-bought
    vs historical shares.
  evidence: rqalpha/mod/rqalpha_mod_sys_accounts/position_validator.py:39(today_closable)
  stage: order_execution
  alternative_considered: Generic closable check was rejected as it wouldn't support intraday close-today
    functionality.
  _evidence_issues:
  - 'FN_NOT_FOUND: today_closable in rqalpha/mod/rqalpha_mod_sys_accounts/position_validator.py'
- id: BD-038
  type: B/DK
  content: Limit order price validated against price_board limits before submission
  rationale: Limit orders must respect daily price movement limits to be executable. The boundary is the
    price_board limit-up/limit-down computed from previous close, rejecting orders that would violate
    circuit breaker rules at submission.
  evidence: rqalpha/mod/rqalpha_mod_sys_risk/validators/price_validator.py:34(limit_up)
  stage: order_execution
  alternative_considered: Allowing submission and rejecting at matching was rejected to provide faster
    feedback to users.
  _evidence_issues:
  - 'FN_NOT_FOUND: limit_up in rqalpha/mod/rqalpha_mod_sys_risk/validators/price_validator.py'
- id: BD-039
  type: B
  content: Trade execution triggers POST_TRADE event for account update
  rationale: Event-driven architecture ensures account state updates after trade execution in proper sequence.
    The boundary is the POST_TRADE event, which signals to listeners (portfolio, risk modules) that trade
    execution is complete and state changes can be applied.
  evidence: rqalpha/mod/rqalpha_mod_sys_simulation/matcher.py:230(publish_event)
  stage: trade_application
  alternative_considered: Direct state mutation was rejected as it would bypass event-driven dependencies
    in other modules.
  _evidence_issues:
  - 'FN_NOT_FOUND: publish_event in rqalpha/mod/rqalpha_mod_sys_simulation/matcher.py'
- id: BD-040
  type: B
  content: Close orders processed before open orders in order_target_portfolio
  rationale: Closing existing positions before opening new ones prevents over-positioning and ensures
    proper cash utilization. The boundary is the close-then-open sequence, critical for order_target operations
    where position sizing depends on net exposure.
