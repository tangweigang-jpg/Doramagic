replaceable_slots:
- id: slot-001
  name: data_source
  description: 'Choose based on: (1) Data coverage needs (China-specific vs global), (2) Budget constraints,
    (3) Real-time vs historical only, (4) Development resources available'
  used_in_stages: []
  options:
  - name: RQData (bundled)
    traits:
    - proprietary
    - comprehensive_china_coverage
    - requires_license
    fit_for:
    - Full China market backtesting with complete fundamental data
    not_fit_for:
    - Free usage, non-China markets, users without RQData license
  - name: Pre-built monthly bundle
    traits:
    - no_auth_required
    - monthly_updates
    - historical_only
    fit_for:
    - Quick start, historical backtesting without data service subscription
    not_fit_for:
    - Real-time data, latest data after monthly cutoff
  - name: Tushare
    traits:
    - open_source
    - free_api
    - community_maintained
    fit_for:
    - Free China market data, users preferring Tushare
    not_fit_for:
    - Real-time data, non-China markets, production reliability needs
  - name: Custom AbstractDataSource
    traits:
    - fully_customizable
    - any_data_format
    - user_maintained
    fit_for:
    - Non-China markets, proprietary data sources, specific data formats
    not_fit_for:
    - Quick setup, users without development resources
  default: Pre-built monthly bundle (with RQData for extended APIs)
  _source: worker_resource
- id: slot-002
  name: persist_provider
  description: 'Choose based on: (1) Persistence requirements, (2) Deployment environment, (3) Recovery
    needs'
  used_in_stages: []
  options:
  - name: In-memory only
    traits:
    - no_persistence
    - simple
    fit_for:
    - Single-session backtests, development
    not_fit_for:
    - Production, long-running strategies requiring crash recovery
  - name: File-based persistence
    traits:
    - simple
    - local_only
    - user_maintained
    fit_for:
    - Single-user local backtesting
    not_fit_for:
    - Distributed systems, cloud deployments
  - name: Database persistence
    traits:
    - scalable
    - remote_access
    - user_maintained
    fit_for:
    - Production deployments, cloud-native strategies
    not_fit_for:
    - Simple local usage
  default: No default provider (must be set via env.set_persist_provider)
  _source: worker_resource
- id: slot-003
  name: broker
  description: 'Choose based on: (1) Live trading vs backtesting, (2) Broker integration requirements'
  used_in_stages: []
  options:
  - name: Simulation broker
    traits:
    - backtesting
    - paper_trading
    - built_in
    fit_for:
    - Backtesting, paper trading simulation
    not_fit_for:
    - Production live trading
  - name: Custom AbstractBroker
    traits:
    - fully_customizable
    - any_connection
    - user_maintained
    fit_for:
    - Connecting to real brokerage APIs, proprietary trading systems
    not_fit_for:
    - Standard backtesting use cases
  default: SimulationBroker (rqalpha_mod_sys_simulation)
  _source: worker_resource
- id: slot-004
  name: event_source
  description: 'Choose based on: (1) Backtesting vs live trading, (2) Event frequency requirements'
  used_in_stages: []
  options:
  - name: Historical simulation
    traits:
    - backtesting
    - historical_bars
    - built_in
    fit_for:
    - Historical backtesting
    not_fit_for:
    - Real-time execution
  - name: Custom AbstractEventSource
    traits:
    - real_time
    - streaming
    - user_maintained
    fit_for:
    - Real-time trading, streaming data sources
    not_fit_for:
    - Historical backtesting only
  default: SimulationEventSource (rqalpha_mod_sys_simulation)
  _source: worker_resource
- id: slot-005
  name: risk_calculator
  description: 'Choose based on: (1) License preferences, (2) Required risk metrics, (3) China-specific
    considerations'
  used_in_stages: []
  options:
  - name: rqrisk
    traits:
    - production_ready
    - china_focused
    - proprietary
    fit_for:
    - Standard risk metrics (Sharpe, max drawdown, etc.)
    not_fit_for:
    - Non-China markets, users needing open-source only
  - name: Custom implementation
    traits:
    - open_source
    - customizable
    - user_maintained
    fit_for:
    - Users preferring open-source, different risk models
    not_fit_for:
    - Quick setup, users without development resources
  default: rqrisk
  _source: worker_resource
