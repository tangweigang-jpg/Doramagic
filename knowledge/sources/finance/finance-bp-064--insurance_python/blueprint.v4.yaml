# Re-enriched by reenrich_blueprint.py (P0-A Bug B/C/D2 fix)
id: finance-bp-064
name: Actuarial models in Python
sop_version: '3.6'
source:
  projects:
  - insurance_python
  commit_hash: db27be755c757a5b4b676e9f04c2ccd3cd75f9ce
  extraction_methods:
  - semi_auto
applicability:
  domain: finance
  task_type: actuarial modeling - interest rate curve fitting, stochastic simulation, derivative pricing,
    and time series analysis
  description: Collection of actuarial models for interpolating interest rate curves using Smith-Wilson
    and Nelson-Siegel-Svensson algorithms, simulating interest rate paths with Vasicek/Hull-White/Dothan
    models, pricing swaptions and zero-coupon bonds via Monte Carlo, and decomposing time series with
    Singular Spectrum Analysis
  prerequisites: Knowledge of actuarial science fundamentals, interest rate models (Vasicek, Hull-White),
    option pricing theory, EIOPA Solvency II regulations, and Python programming
  not_suitable_for: Real-time trading systems, live market data integration, production risk management
    systems requiring SLAs, high-frequency trading strategies, non-financial time series analysis without
    modification
stages:
- id: yield_curve_fitting
  name: Yield Curve Fitting
  order: 1
  responsibility: Interpolate and extrapolate interest rate curves from observed market data using regulatory-grade
    algorithms (EIOPA-compliant). This stage provides the foundational zero-coupon rates needed by downstream
    pricing and simulation stages.
  interface:
    inputs:
    - Observed spot rates (r_Obs)
    - Maturities for observed rates (M_Obs)
    - Ultimate Forward Rate (ufr)
    - Convergence parameter (alpha)
    outputs:
    - Calibrated rates for targeted maturities
    - Calibration vector b for reuse
  required_methods:
  - name: NSSMinimize.compute
    description: Optimizer wrapper for Nelder-Mead NSS parameter calibration that minimizes the goodness-of-fit
      objective
    evidence: nelson_siegel_svansson/nelsonsiegelsvensson.py:46(class NSSMinimize)
  - name: NSSGoodFit.objective
    description: Objective function computing sum of squared errors between observed and fitted rates
      for NSS optimization
    evidence: nelson_siegel_svansson/nelsonsiegelsvensson.py:29(class NSSGoodFit)
  - name: SWCalibrate
    description: Calibrates Smith-Wilson calibration vector b using observed rates and maturities
    evidence: smith_wilson/SWCalibrate.py:22(from SWHeart import SWHeart)
  - name: SWExtrapolate
    description: Extrapolates calibrated curve to target maturities using the SWHeart matrix formulation
    evidence: smith_wilson/SWExtrapolate.py:22(from SWHeart import SWHeart)
  key_behaviors:
  - behavior: Local imports inside functions
    description: SWHeart is imported locally inside SWCalibrate and SWExtrapolate functions rather than
      at module level, encapsulating EIOPA paragraph references and avoiding circular dependencies in
      small modules
    evidence: smith_wilson/SWCalibrate.py:22(from SWHeart import SWHeart)
  - behavior: Matrix formulation using numpy
    description: EIOPA spec defines formulas in matrix form; vectorized operations match source documentation
      exactly, improving readability over explicit loops
    evidence: smith_wilson/SWHeart.py:23(numpy.tile)
  - behavior: Nelder-Mead simplex optimization
    description: Derivative-free optimization chosen for NSS parameter space which can have local minima;
      more robust than gradient methods
    evidence: nelson_siegel_svansson/nelsonsiegelsvensson.py:71(method='Nelder-Mead')
  replaceable_points:
  - name: root_finding_method
    description: Method for finding optimal alpha in Smith-Wilson calibration
    options:
    - name: bisection
      traits:
      - Guaranteed convergence if sign change exists
      - Simple implementation
      - Requires bracketing
      fit_for:
      - Smooth monotonic functions
      - Known bounds on solution
      not_fit_for:
      - Non-monotonic functions
      - Unbounded solution spaces
    - name: scipy.optimize.brentq
      traits:
      - Combines bisection reliability with faster convergence
      - Requires valid brackets
      fit_for:
      - Production code
      - Performance-critical applications
      not_fit_for:
      - Non-smooth functions
      - Derivative-available scenarios
    default: bisection
  design_decisions:
  - Local imports of SWHeart inside SWCalibrate/SWExtrapolate - Encapsulates EIOPA paragraph references;
    avoids circular deps in small modules (smith_wilson/SWCalibrate.py:22)
  acceptance_hints:
  - Calibration vector b is reusable across multiple extrapolation calls with same observed data
  - Extrapolated rates converge to ufr as maturity increases
  - Matrix operations preserve EIOPA paragraph 132 specification
  - Output rates are annual decimals (e.g., 0.042 = 4.2%)
- id: alpha_calibration
  name: Alpha Parameter Calibration
  order: 2
  responsibility: Find optimal convergence speed parameter alpha using bisection root-finding to satisfy
    EIOPA tolerance constraints for Solvency II regulatory compliance.
  interface:
    inputs:
    - Observed maturities and rates
    - ufr (Ultimate Forward Rate)
    - Allowed tolerance Tau
    outputs:
    - Optimal alpha value satisfying convergence constraints
  required_methods:
  - name: BisectionAlpha.find_alpha
    description: Bisection root-finding algorithm to determine alpha that satisfies EIOPA convergence
      tolerance constraints
    evidence: bisection_alpha/bisection_alpha.py:47(class BisectionAlpha)
  key_behaviors:
  - behavior: Bisection root-finding over Newton-Raphson
    description: Galfa function may not be smooth; bisection guarantees convergence if sign changes exist
      between bounds
    evidence: bisection_alpha/bisection_alpha.py:47(BisectionAlpha)
  - behavior: EIOPA convergence point formula
    description: Convergence point T = max(U+40, 60) mandated by EIOPA paragraph 120 for UFR extrapolation
      compliance
    evidence: bisection_alpha/bisection_alpha.py:39(T = max(U + 40, 60))
  - behavior: Initial bounds validation
    description: Method requires xStart < xEnd and opposite-sign function values; fails silently with
      invalid bounds
    evidence: bisection_alpha/bisection_alpha.py:84-89(validation of initial bounds)
  replaceable_points:
  - name: convergence_point_formula
    description: Formula for determining convergence point T used in alpha calibration
    options:
    - name: EIOPA_spec
      traits:
      - Regulatory compliant for Solvency II
      - T = max(U+40, 60)
      fit_for:
      - Regulatory reporting
      - EIOPA-compliant implementations
      not_fit_for:
      - Non-EIOPA jurisdictions
      - Custom convergence requirements
    - name: custom
      traits:
      - Flexible convergence point
      - Requires re-validation
      fit_for:
      - Research applications
      - Alternative regulatory frameworks
      not_fit_for:
      - Production Solvency II reporting
    default: EIOPA_spec
  design_decisions:
  - Bisection root-finding over Newton-Raphson - Galfa function may not be smooth; bisection guarantees
    convergence if sign changes exist (bisection_alpha/bisection_alpha.py:47)
  - Convergence point T = max(U+40, 60) from EIOPA spec - EIOPA paragraph 120 mandates this formula for
    UFR extrapolation convergence (bisection_alpha/bisection_alpha.py:39)
  acceptance_hints:
  - Alpha parameter from calibration matches alpha used in subsequent SWExtrapolate call
  - Convergence tolerance Tau is satisfied within specified bounds
  - bisection_alpha and smith_wilson modules should use consistent alpha values
- id: interest_rate_simulation
  name: Interest Rate Simulation
  order: 3
  responsibility: Simulate stochastic paths for interest rates using mean-reverting processes (Vasicek,
    Hull-White, Dothan) enabling Monte Carlo pricing and risk analysis.
  interface:
    inputs:
    - Initial rate r0
    - Speed of reversion a
    - Long-term mean b/lambda
    - Volatility sigma
    - Time horizon T
    - Time step dt
    outputs:
    - DataFrame with Time index containing simulated rate paths
  required_methods:
  - name: BrownianMotion.simulate
    description: Generates correlated Wiener processes for multi-factor interest rate models
    evidence: vasicek_two_factor/Vasicek.py:6(class BrownianMotion)
  - name: ssaBasic.decompose
    description: Time series decomposition and forecasting using Singular Spectrum Analysis
    evidence: singular_spectrum_analysis/ssaBasic.py:7(class ssaBasic)
  key_behaviors:
  - behavior: DataFrame output with Time as index
    description: Consistent interface across each simulation modules enabling direct plotting and time-series
      analysis
    evidence: vasicek_one_factor/Vasicek_one_factor.py:62(interest_rate_simulation.set_index)
  - behavior: Cholesky decomposition for correlated Brownian motion
    description: Standard approach for multivariate normal with given covariance; C = L @ L.T ensures
      positive semi-definite correlation matrix
    evidence: correlated_brownian_motion/CorBM.py:32(Cholesky)
  - behavior: Custom Cholesky implementation
    description: Explicit implementation matches academic source; allows understanding of algorithm internals
    evidence: correlated_brownian_motion/CorBM.py:32(def Cholesky)
  - behavior: L0 default to N/2 when not provided
    description: Standard SSA heuristic balancing bias-variance tradeoff for reconstruction
    evidence: singular_spectrum_analysis/ssaBasic.py:59(L0 = int(np.floor(self.N/2)))
  replaceable_points:
  - name: random_number_generator
    description: RNG source for stochastic simulation paths
    options:
    - name: numpy.random
      traits:
      - Simple API
      - Global state
      - Reproducible with seed
      fit_for:
      - Quick prototyping
      - Simple simulations
      not_fit_for:
      - Parallel simulations
      - Thread-safe applications
    - name: numpy.default_rng
      traits:
      - Modern API
      - Explicit state management
      - Thread-safe
      fit_for:
      - Production code
      - Parallel simulations
      not_fit_for:
      - Legacy code compatibility
    default: numpy.random
  - name: svd_implementation
    description: SVD algorithm used in SSA decomposition
    options:
    - name: numpy.linalg.svd
      traits:
      - Fast for moderate sizes
      - Memory efficient
      fit_for:
      - Standard SSA applications
      not_fit_for:
      - Very large matrices (use scipy)
    - name: scipy.linalg.svd
      traits:
      - More options
      - Better for large sparse matrices
      fit_for:
      - Large-scale decomposition
      - Memory-constrained scenarios
      not_fit_for:
      - Small matrices (numpy faster)
    default: numpy.linalg.svd
  design_decisions:
  - DataFrame output with Time as index - Consistent interface across each simulation modules; enables
    direct plotting and time-series analysis (vasicek_one_factor/Vasicek_one_factor.py:62)
  - Cholesky decomposition for correlated Brownian motion - Standard approach for multivariate normal
    with given covariance; C = L @ L.T ensures positive semi-definite correlation matrix (correlated_brownian_motion/CorBM.py:32)
  - Custom Cholesky over numpy.linalg.cholesky - Explicit implementation matches academic source; allows
    understanding of algorithm internals (correlated_brownian_motion/CorBM.py:32)
  - L0 default to N/2 when not provided - Standard SSA heuristic; N/2 balances bias-variance tradeoff
    for reconstruction (singular_spectrum_analysis/ssaBasic.py:59)
  acceptance_hints:
  - Output DataFrame always has 'Time' as index across each simulation models
  - Time step dt is expressed as fraction of year (0.1 = ~36 days)
  - Simulated paths preserve mean-reversion properties of underlying model
  - BrownianMotion x0 defaults to 0; non-zero starting points require explicit parameter
- id: option_pricing
  name: Option Pricing
  order: 4
  responsibility: Price financial derivatives (swaptions, zero-coupon bonds) under stochastic interest
    rate models using Monte Carlo simulation.
  interface:
    inputs:
    - Swaption/bond parameters
    - Rate model parameters
    - Number of Monte Carlo scenarios
    outputs:
    - Option price
    - Confidence intervals from simulation
  required_methods:
  - name: Swaption.price
    description: Swaption contract representation with payer/receiver logic and Monte Carlo pricing under
      two-factor Vasicek
    evidence: vasicek_two_factor/Pricing.py:7(class Swaption)
  - name: ZeroCouponBond.price_Vasicek_Two_Factor
    description: ZCB pricing under two-factor Vasicek model via Monte Carlo integration
    evidence: vasicek_two_factor/Pricing.py:29(class ZeroCouponBond)
  key_behaviors:
  - behavior: Monte Carlo integration for two-factor bond pricing
    description: No closed-form solution exists for two-factor model; trapezoidal integration approximates
      E[exp(-integral of rates)]
    evidence: vasicek_two_factor/Pricing.py:63(integrate.trapz)
  - behavior: Swaption payer/receiver derived from boolean
    description: Single source of truth for option direction using receiver = not payer; avoids inconsistent
      state
    evidence: vasicek_two_factor/Pricing.py:18(receiver = not payer)
  replaceable_points:
  - name: integration_method
    description: Numerical integration method for Monte Carlo pricing
    options:
    - name: trapz
      traits:
      - Fast
      - Simple
      - Adequate accuracy for MC
      fit_for:
      - Standard Monte Carlo pricing
      - Real-time applications
      not_fit_for:
      - High-precision requirements
    - name: simpson
      traits:
      - Higher accuracy
      - Requires even number of points
      fit_for:
      - Final pricing runs
      - Validation
      not_fit_for:
      - Quick prototyping
      - Odd number of points
    - name: quad
      traits:
      - Adaptive
      - High precision
      - Function-based
      fit_for:
      - Validation runs
      - Complex integrands
      not_fit_for:
      - Vectorized MC paths
    default: trapz
  design_decisions:
  - Monte Carlo integration for two-factor bond pricing - No closed-form solution for two-factor model;
    trapz approximates E[exp(-integral of rates)] (vasicek_two_factor/Pricing.py:63)
  - Swaption payer/receiver derived from boolean not payer - Single source of truth for option direction;
    avoids inconsistent state (vasicek_two_factor/Pricing.py:18)
  acceptance_hints:
  - Pricing requires rate paths from interest_rate_simulation stage
  - Confidence intervals narrow as number of Monte Carlo scenarios increases
  - Zero-coupon prices derived from yield_curve_fitting initialize pricing models
- id: time_series_analysis
  name: Time Series Analysis (SSA)
  order: 5
  responsibility: Non-parametric decomposition and forecasting of time series using Singular Spectrum
    Analysis, enabling signal extraction and uncertainty quantification.
  interface:
    inputs:
    - 1D time series array
    - Window length L0
    outputs:
    - Reconstructed components
    - Forecast with confidence intervals
    - Diagnostic plots
  required_methods:
  - name: ssaBasic.fit
    description: 'Full SSA pipeline: embedding, SVD, grouping, diagonal averaging; must complete before
      forecast/reconstruction'
    evidence: singular_spectrum_analysis/ssaBasic.py:7(class ssaBasic)
  - name: ssaBasic.forecast
    description: Recursive linear forecasting using SSA decomposition components
    evidence: singular_spectrum_analysis/ssaBasic.py:63-73(__init__ performs embedding+SVD)
  - name: ssaBasic.reconstruct
    description: Reconstruct time series from grouped SVD components via diagonal averaging
    evidence: singular_spectrum_analysis/ssaBasic.py:126(overlapping segments)
  key_behaviors:
  - behavior: Embedding dimension L0 default to N/2 with warning
    description: SSA requires L < N/2; auto-adjusting prevents crashes while alerting users to potential
      issues
    evidence: singular_spectrum_analysis/ssaBasic.py:105(L0>N2 warnings.warn)
  - behavior: Hankel matrix construction for embedding
    description: Hankel structure preserves time ordering; enables Toeplitz optimization in SVD decomposition
    evidence: singular_spectrum_analysis/ssaBasic.py:126(overlapping segments)
  - behavior: Weighted correlation for separability assessment
    description: Standard SSA uses Toeplitz weights; correctly measures component separability for grouping
      decisions
    evidence: singular_spectrum_analysis/ssaBasic.py:465(weighted correlation)
  - behavior: Bootstrap sampling for forecast uncertainty
    description: Residual bootstrap preserves autocorrelation structure in residuals for confidence intervals
    evidence: singular_spectrum_analysis/ssaBasic.py:262(random_indices)
  replaceable_points:
  - name: forecast_method
    description: Forecasting algorithm for SSA decomposition
    options:
    - name: linear_recursive
      traits:
      - Standard SSA
      - Fast
      - Uses singular vectors
      fit_for:
      - Most applications
      - Short to medium forecasts
      not_fit_for:
      - Long-range forecasts
    - name: CSSA
      traits:
      - Caterpillar SSA
      - Better for seasonality
      - Component-wise
      fit_for:
      - Seasonal data
      - Interpretable components
      not_fit_for:
      - Non-seasonal data
    default: linear_recursive
  design_decisions:
  - Embedding dimension L0 default to N/2 with warning - SSA requires L < N/2; auto-adjusting prevents
    crashes while alerting users (singular_spectrum_analysis/ssaBasic.py:105)
  - Hankel matrix construction for embedding - Hankel structure preserves time ordering; enables Toeplitz
    optimization in SVD (singular_spectrum_analysis/ssaBasic.py:126)
  - Weighted correlation for separability assessment - Standard SSA uses Toeplitz weights; correctly measures
    component separability (singular_spectrum_analysis/ssaBasic.py:465)
  - Bootstrap sampling for forecast uncertainty - Residual bootstrap is standard for SSA; preserves autocorrelation
    structure in residuals (singular_spectrum_analysis/ssaBasic.py:262)
  acceptance_hints:
  - L0 must be < N/2 by design; warning issued if violated
  - r0 must be < L+1 for recursive forecast to work correctly
  - ssaBasic uses OOP style while other modules use functional style
  - Minimum time series size is 9 elements for meaningful results
- id: resampling_bootstrap
  name: Stationary Bootstrap Resampling
  order: 6
  responsibility: Resample dependent time series while preserving stationarity using random block lengths,
    enabling statistical inference for autocorrelated data.
  interface:
    inputs:
    - Time series data
    - Block length m
    - Desired sample length
    outputs:
    - Resampled time series preserving temporal dependency
  required_methods:
  - name: N/A
    description: No user-facing methods identified by assembly
    evidence: N/A
  key_behaviors:
  - behavior: Automatic block length via Politis-White 2004
    description: Optimal block size minimizes MSE for dependent data using kn = max(5,sqrt(log10(n)))
      formula
    evidence: stationary_bootstrap/stationary_bootstrap_calibrate.py:44(kn = max(5,sqrt(log10(n))))
  - behavior: Trapezoidal spectral window for block size estimation
    description: Trapezoidal kernel balances bias-variance in spectral density estimation for block length
      calibration
    evidence: stationary_bootstrap/stationary_bootstrap_calibrate.py:215(trapezoidal mapping)
  replaceable_points:
  - name: block_length_algorithm
    description: Method for determining optimal block size in stationary bootstrap
    options:
    - name: Politis-White
      traits:
      - Adaptive
      - Data-driven
      - Minimum size 5
      fit_for:
      - Most applications
      - Unknown dependence structure
      not_fit_for:
      - Very short series (<20 points)
    - name: Politis-Romano fixed
      traits:
      - Simple
      - Fixed block size
      - No data snooping
      fit_for:
      - Known block size from theory
      - Conservative inference
      not_fit_for:
      - Unknown dependence structure
    default: Politis-White
  design_decisions:
  - Automatic block length via Politis-White 2004 - Optimal block size minimizes MSE for dependent data;
    literature standard approach (stationary_bootstrap/stationary_bootstrap_calibrate.py:44)
  acceptance_hints:
  - Bootstrap block length selection uses autocorrelation from SSA-reconstructed residuals
  - Code duplicated between stationary_bootstrap/ and stationary_bootstrap_calibration/ directories
  - Minimum time series size is 9 elements for meaningful bootstrap results
data_flow:
- from_stage: yield_curve_fitting
  to_stage: alpha_calibration
  data: Calibration vector b, observed rates, and maturities flow into alpha optimization to determine
    convergence speed parameter
- from_stage: alpha_calibration
  to_stage: yield_curve_fitting
  data: Optimal alpha flows back to recalibrate if tolerance not met (feedback loop for iterative convergence)
- from_stage: interest_rate_simulation
  to_stage: option_pricing
  data: Simulated rate paths from Vasicek/Hull-White/Dothan models feed into Monte Carlo pricing for swaptions
    and zero-coupon bonds
- from_stage: yield_curve_fitting
  to_stage: option_pricing
  data: Zero-coupon prices and rates from Smith-Wilson calibration used to initialize pricing models
- from_stage: time_series_analysis
  to_stage: resampling_bootstrap
  data: Bootstrap block length selection uses autocorrelation structure extracted from SSA-reconstructed
    residuals
global_contracts:
- contract: Every simulation outputs use DataFrame with Time as index - Consistent interface across each
    simulation modules (vasicek_one_factor/Vasicek_one_factor.py:62)
  evidence: ''
- contract: Maturity vectors are column vectors (n x 1) for matrix operations - EIOPA matrix formulation
    requires specific shapes (smith_wilson/main.py:27)
  evidence: ''
- contract: Rates are annual decimals (0.042 = 4.2%) - Standard actuarial representation (smith_wilson/main.py:29)
  evidence: ''
- contract: Time step dt is fraction of year (0.1 = ~36 days) - Enables continuous-time model discretization
    (vasicek_one_factor/Vasicek_one_factor.py:50)
  evidence: ''
- contract: EIOPA technical documentation paragraphs cited for algorithm correctness - Regulatory compliance
    documentation (smith_wilson/SWHeart.py:18)
  evidence: ''
- contract: SWCalibrate() MUST be called before SWExtrapolate() in Smith-Wilson pipeline - Alpha parameter
    must match between stages (smith_wilson/main.py:34-37)
  evidence: ''
- contract: SSA pipeline requires embedding/SVD before reconstruction/forecast - Cannot call forecast()
    without __init__ completing (singular_spectrum_analysis/ssaBasic.py:63-73)
  evidence: ''
business_decisions:
- id: BD-001
  type: B/DK
  content: Local imports of SWHeart inside SWCalibrate/SWExtrapolate
  rationale: Encapsulates EIOPA paragraph references within specific modules; avoids circular dependency
    issues when importing small, focused components. The local import pattern isolates regulatory-specific
    logic from the broader module namespace.
  evidence: smith_wilson/SWCalibrate.py:22(from SWHeart import SWHeart)
  stage: yield_curve_fitting
  alternative_considered: Package-level imports would expose SWHeart globally and risk circular import
    errors
  _evidence_issues:
  - 'INVALID_IDENTIFIER: from SWHeart import SWHeart in smith_wilson/SWCalibrate.py'
- id: BD-002
  type: B/BA
  content: Matrix formulation using numpy for readability over loops
  rationale: EIOPA specification defines Smith-Wilson formulas in matrix notation; vectorized numpy operations
    precisely match the mathematical representation in source documentation. This alignment ensures regulatory
    compliance and simplifies verification.
  evidence: smith_wilson/SWHeart.py:23(numpy.tile)
  stage: yield_curve_fitting
  alternative_considered: Explicit Python loops would obscure the mathematical relationship and require
    manual translation from spec
  _evidence_issues:
  - 'FN_NOT_FOUND: numpy.tile in smith_wilson/SWHeart.py'
- id: BD-003
  type: BA/DK
  content: Nelder-Mead simplex for NSS optimization over gradient methods
  rationale: Nelson-Siegel-Svensson parameter space exhibits local minima due to non-convex optimization
    landscape; derivative-free Nelder-Mead simplex provides robust convergence without requiring gradient
    computation or smooth objective function.
  evidence: nelson_siegel_svansson/nelsonsiegelsvensson.py:71(method='Nelder-Mead')
  stage: yield_curve_fitting
  alternative_considered: Gradient-based methods (BFGS, Newton) require analytical or numerical gradients
    and risk trapping in local minima
  _evidence_issues:
  - 'INVALID_IDENTIFIER: method=''Nelder-Mead'' in nelson_siegel_svansson/nelsonsiegelsvensson.py'
- id: BD-004
  type: BA
  content: Bisection root-finding over Newton-Raphson for alpha calibration
  rationale: Galfa objective function may exhibit non-smooth behavior or discontinuous derivatives; bisection
    algorithm guarantees convergence to root when sign changes exist across bracketed interval, providing
    robust monotonic convergence.
  evidence: bisection_alpha/bisection_alpha.py:47(BisectionAlpha)
  stage: alpha_calibration
  alternative_considered: Newton-Raphson requires derivative continuity and may diverge if function is
    not sufficiently smooth near root
- id: BD-005
  type: B/DK
  content: Convergence point T = max(U+40, 60) from EIOPA spec
  rationale: EIOPA paragraph 120 mandates this specific formula for ultimate forward rate extrapolation
    convergence point; parameter U represents a market-derived floor and the offset ensures sufficient
    maturity for curve stabilization.
  evidence: bisection_alpha/bisection_alpha.py:39(module)
  stage: alpha_calibration
  alternative_considered: Fixed convergence point would not adapt to UFR variations; ad-hoc values risk
    non-compliance with EIOPA guidelines
  _evidence_issues:
  - 'FN_NOT_FOUND: module in bisection_alpha/bisection_alpha.py'
- id: BD-006
  type: B/DK
  content: DataFrame output with Time as index
  rationale: Consistent output interface across each simulation modules enables downstream analysis pipelines;
    Time-indexed DataFrames support direct plotting, time-series operations, and seamless integration
    with statistical libraries without additional transformation.
  evidence: vasicek_one_factor/Vasicek_one_factor.py:62(set_index)
  stage: interest_rate_simulation
  alternative_considered: Array-based output would require manual index management and reformatting for
    each analysis use case
  _evidence_issues:
  - 'FN_NOT_FOUND: set_index in vasicek_one_factor/Vasicek_one_factor.py'
- id: BD-007
  type: BA/M
  content: Cholesky decomposition for correlated Brownian motion generation
  rationale: Standard approach for generating multivariate normal samples with specified correlation structure;
    Cholesky decomposition ensures C = L @ L.T decomposition with positive semi-definite matrix, maintaining
    correlation integrity.
  evidence: correlated_brownian_motion/CorBM.py:32(Cholesky)
  stage: interest_rate_simulation
  alternative_considered: Eigen decomposition alternative is computationally more expensive for this use
    case
- id: BD-008
  type: B
  content: Custom Cholesky implementation over numpy.linalg.cholesky
  rationale: Explicit algorithm implementation aligns with academic reference materials and enables step-by-step
    verification of computational process; enables future customization for pivoting or regularization
    requirements.
  evidence: correlated_brownian_motion/CorBM.py:32(def Cholesky)
  stage: interest_rate_simulation
  alternative_considered: Using numpy.linalg.cholesky would reduce code complexity but hide algorithmic
    details from inspection
  _evidence_issues:
  - 'INVALID_IDENTIFIER: def Cholesky in correlated_brownian_motion/CorBM.py'
- id: BD-009
  type: BA/M
  content: L0 embedding dimension defaults to N/2 when not provided
  rationale: Standard SSA heuristic provides optimal bias-variance tradeoff for time series reconstruction;
    N/2 window length balances between capturing sufficient oscillatory components and avoiding overfitting
    to noise in the series.
  evidence: singular_spectrum_analysis/ssaBasic.py:59(module)
  stage: interest_rate_simulation
