- id: BD-085
  type: B/BA
  content: BrownianMotion x0 defaults to 0 in Vasicek two-factor model
  rationale: 'The initial state x0=0 represents a zero-mean starting point for the short-rate process.
    This default assumes the Vasicek model starts from equilibrium and evolves from there. Users must
    explicitly set x0 if they need a different initial condition. Boundary: x0 defines the starting point
    of the stochastic process, affecting each subsequent path simulations.'
