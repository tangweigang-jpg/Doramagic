replaceable_slots:
- id: slot-001
  name: numerical_computing
  description: Choose CuPy/JAX for GPU acceleration needs; numpy for standard workstation deployment
  used_in_stages: []
  options:
  - name: numpy
    traits:
    - array-computation
    - linear-algebra
    - random-number-generation
    fit_for:
    - General numerical computing, matrix operations, all current modules
    not_fit_for:
    - GPU acceleration, automatic differentiation
  - name: CuPy
    traits:
    - GPU-computation
    - numpy-API-compatible
    - CUDA-support
    fit_for:
    - Large-scale numerical computing with GPU acceleration
    not_fit_for:
    - Environments without NVIDIA GPU; CPU-only deployment
  - name: JAX
    traits:
    - GPU-computation
    - automatic-differentiation
    - XLA-compilation
    fit_for:
    - High-performance computing with automatic differentiation (e.g., neural networks, advanced calibration)
    not_fit_for:
    - Simple array operations; environments without GPU support
  default: numpy
  _source: worker_resource
- id: slot-002
  name: optimization
  description: Use scipy for standard local optimization; add CVXPY for convex problems; add EMCEE for
    Bayesian inference
  used_in_stages: []
  options:
  - name: scipy.optimize.minimize
    traits:
    - local-optimization
    - gradient-free-methods
    - Nelder-Mead
    fit_for:
    - Parameter calibration in Nelson-Siegel-Svansson, Vasicek two-factor models
    not_fit_for:
    - Global optimization, constraint handling beyond simple bounds
  - name: scipy.optimize.differential_evolution
    traits:
    - global-optimization
    - boundary-constraints
    - evolutionary-algorithm
    fit_for:
    - Global optimization with bounded parameters (e.g., complex model calibration)
    not_fit_for:
    - Fast local optimization; unconstrained problems
  - name: CVXPY
    traits:
    - convex-optimization
    - constraints
    - disciplined-programming
    fit_for:
