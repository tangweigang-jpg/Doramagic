  type: B
  content: SWCalibrate() MUST be called before SWExtrapolate() in Smith-Wilson pipeline
  rationale: 'SWCalibrate computes the SWHeart matrix which SWExtrapolate requires as input. Calling SWExtrapolate
    before calibration produces undefined behavior because SWHeart is None. The ordering contract ensures
    the matrix is available and pre-computed, avoiding runtime exceptions and ensuring correct convergence
    behavior in the Smith-Wilson curve fitting algorithm. Boundary: SWHeart must exist before SWExtrapolate
    executes.'
