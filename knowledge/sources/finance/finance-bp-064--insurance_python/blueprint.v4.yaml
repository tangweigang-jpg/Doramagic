- id: BD-086
  type: BA/M
  content: Correlated Brownian motion uses Cholesky decomposition exclusively
  rationale: 'Cholesky decomposition is the standard method for generating correlated paths because it
    produces a lower-triangular matrix L where Σ = LL^T for positive-definite covariance matrices. This
    ensures the generated Brownian increments have exactly the target correlation structure. Other methods
    like eigenvalue decomposition exist but are computationally slower. Boundary: Covariance matrix must
    be positive-definite for Cholesky to succeed.'
