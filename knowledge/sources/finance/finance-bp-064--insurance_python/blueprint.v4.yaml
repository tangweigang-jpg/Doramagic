- id: BD-084
  type: B/BA
  content: EIOPA convergence point T defaults to max(U+40, 60) in bisection_alpha
  rationale: 'The convergence point T controls the terminal time for EIOPA curve extrapolation. Using
    max(U+40, 60) ensures the terminal point is at least 40 years beyond the last observable maturity
    U, with a floor of 60 years. This prevents convergence issues for short-dated curves and aligns with
    EIOPA regulation EIOPA-BoS-14/065. Boundary: T must be >= max(U+40, 60) for valid EIOPA compliance.'
