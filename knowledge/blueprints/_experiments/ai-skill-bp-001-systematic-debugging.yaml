# ============================================================

global_contracts:
  - contract: "NO FIXES WITHOUT ROOT CAUSE INVESTIGATION FIRST"
    evidence: "SKILL.md:§The-Iron-Law"
    note: "铁律。违反此流程的字面意义就是违反调试的精神。"
  - contract: "每个阶段必须完成后才能进入下一阶段"
    evidence: "SKILL.md:§The-Four-Phases"
    note: "强制顺序，不可跳过。"
  - contract: "多变量修改被禁止 — 一次只改一个变量"
    evidence: "SKILL.md:§Phase-3-Step-2"
  - contract: "3+ 次修复失败时必须停止并质疑架构"
    evidence: "SKILL.md:§Phase-4-Step-5"
    note: "硬性升级阈值，必须与人类讨论后才能继续。"
  - contract: "不完全理解问题时不假装知道，而是说'我不理解 X'"
    evidence: "SKILL.md:§Phase-3-Step-4"

