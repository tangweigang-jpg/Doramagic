# ============================================================
# Blueprint: 系统性调试框架（根因优先 + 四阶段调查）
# 来源: obra/superpowers 结构化萃取
# 提取流水线: 蓝图提取 PoC — 结构化萃取策略验证
# ============================================================

id: swe-bp-001
name: 系统性调试框架（根因优先 + 四阶段调查）
version: "1.0.0"

source:
  projects:
    - obra/superpowers
  commit_hash: main
  extraction_methods: [structural_extraction]
  extraction_date: "2026-04-14"
  confidence: 0.95
  evidence:
    skill_definition:
      kind: document_section
      path: "skills/systematic-debugging/SKILL.md"
      section_id: null
      evidence_role: normative
    creation_log:
      kind: document_section
      path: "skills/systematic-debugging/CREATION-LOG.md"
      section_id: null
      evidence_role: rationale
    project_guidelines:
      kind: document_section
      path: "CLAUDE.md"
      section_id: null
      evidence_role: normative

applicability:
  domain: software_engineering
  task_type: debugging_methodology
  description: >
    四阶段系统性调试方法论，强制根因调查优先于任何修复尝试。
    核心铁律：NO FIXES WITHOUT ROOT CAUSE INVESTIGATION FIRST。
    包含根因追踪、多层防御、条件等待三项子技术，
    以及测试污染定位脚本（find-polluter.sh）。
    设计上特别强化了对时间压力下合理化跳步的防御。
    源自 Jesse Vincent 从个人 CLAUDE.md 提取并经 RED-GREEN 方法验证的调试框架。
  prerequisites:
    - "AI agent 具备代码阅读和执行能力"
    - "AI agent 具备 git diff / git log 访问能力"
    - "AI agent 具备运行测试的能力"
  not_suitable_for:
    - "纯配置问题（不涉及代码逻辑）"
    - "已知根因、只需实施修复的场景"
    - "性能调优（非 bug 类问题）"

  activation:
    triggers:
      - "测试失败"
      - "生产 bug"
      - "意外行为"
      - "性能问题"
      - "构建失败"
      - "集成问题"
    emphasis:
      - "时间压力下（紧急情况让猜测变得诱人）"
      - "'就一个快速修复'看起来很明显"
      - "已经尝试过多次修复"
      - "上一次修复没有生效"
      - "不完全理解问题"
    anti_skip:
      - "问题看起来简单（简单 bug 也有根因）"
      - "时间紧迫（系统化比瞎试更快）"
      - "老板要求立刻修复（系统化比反复折腾更快）"

execution_paradigm:
  modes:
    - id: mandatory_sequential
      description: "四阶段强制顺序，每个阶段必须完成才能进入下一阶段，不可跳过或并行"

# ============================================================
# 资源（产品宪法 §1.3: 好的晶体 = 好的蓝图 + 好的资源 + 好的约束）
# ============================================================

resources:

  - id: root_cause_tracing
    type: technique_document
    name: 根因追踪技术
    path: "skills/systematic-debugging/root-cause-tracing.md"
    description: >
      从 bug 症状点反向追踪调用链，直到找到原始触发点。
      核心方法：观察症状 → 找直接原因 → 追问"谁调用了它" → 持续上溯 → 在源头修复。
      包含添加堆栈跟踪、使用 console.error 调试的具体技巧。
    used_in_stages: [root_cause_investigation]

  - id: defense_in_depth
    type: technique_document
    name: 多层防御验证
    path: "skills/systematic-debugging/defense-in-depth.md"
    description: >
      修复 bug 后，在数据流经过的每一层都加验证，使 bug 结构性不可能重现。
      四层模型：入口验证 → 业务逻辑验证 → 环境守卫 → 调试埋点。
      设计原则：单点验证 = "我们修了 bug"，多层验证 = "我们让 bug 不可能"。
    used_in_stages: [implementation]

  - id: condition_based_waiting
    type: technique_document
    name: 条件等待模式
    path: "skills/systematic-debugging/condition-based-waiting.md"
    description: >
      用条件轮询替代任意延迟（setTimeout/sleep），消除竞态条件导致的 flaky test。
      核心模式：waitFor(() => condition(), description, timeoutMs)。
      实测效果：15 个 flaky test 修复，通过率 60% → 100%，执行时间快 40%。
    used_in_stages: [implementation]

  - id: condition_waiting_impl
    type: code_example
    name: 条件等待实现示例
    path: "skills/systematic-debugging/condition-based-waiting-example.ts"
    description: "waitForEvent / waitForEventCount / waitForEventMatch 三个通用 TypeScript 函数"
    used_in_stages: [implementation]

  - id: find_polluter
    type: tool_script
    name: 测试污染定位脚本
    path: "skills/systematic-debugging/find-polluter.sh"
    description: >
      二分法逐个运行测试，找到第一个创建脏状态（如意外的 .git 目录）的测试文件。
      用法：./find-polluter.sh '.git' 'src/**/*.test.ts'
    used_in_stages: [root_cause_investigation]

# ============================================================
# 设计决策
# ============================================================

business_decisions:

  - decision: "强制四阶段顺序执行，不可跳过"
    type: process_design
    rationale: >
      每个阶段是下一阶段的前提。跳过根因调查直接修复是最常见的失败模式。
      强制顺序而非建议顺序，因为 LLM 在时间压力下倾向于跳步。
    stage: global
    evidence:
      kind: document_section
      path: "skills/systematic-debugging/SKILL.md"
      section_id: "§The-Four-Phases"
      evidence_role: normative

  - decision: "单假设规则 — 每次只测试一个变量"
    type: process_design
    rationale: "多变量同时修改无法隔离生效因素，导致新 bug。科学方法的基本原则。"
    stage: hypothesis_testing
    evidence:
      kind: document_section
      path: "skills/systematic-debugging/SKILL.md"
      section_id: "§Phase-3-Step-2"
      evidence_role: normative

  - decision: "3 次修复失败后强制质疑架构"
    type: escalation_threshold
    rationale: >
      3+ 次失败的 pattern 通常意味着架构问题而非实现问题。
      每次修复揭示新的共享状态/耦合/不同位置的问题 = 架构信号。
      阈值 3 是经验值——足够排除偶然因素，又不至于浪费太多时间。
      此时必须与人类讨论，不可自行继续。
    stage: implementation
    evidence:
      kind: document_section
      path: "skills/systematic-debugging/SKILL.md"
      section_id: "§Phase-4-Step-5"
      evidence_role: normative

  - decision: "修复前必须创建失败测试用例"
    type: quality_gate
    rationale: "没有测试的修复无法验证是否真正解决了问题，也无法防止回归"
    stage: implementation
    evidence:
      kind: document_section
      path: "skills/systematic-debugging/SKILL.md"
      section_id: "§Phase-4-Step-1"
      evidence_role: normative

  - decision: "多组件系统中先加诊断埋点再定位，不直接猜测"
    type: process_design
    rationale: "每个组件边界都可能是断裂点，盲猜效率极低。先收集一次证据再分析。"
    stage: root_cause_investigation
    evidence:
      kind: document_section
      path: "skills/systematic-debugging/SKILL.md"
      section_id: "§Phase-1-Step-4"
      evidence_role: normative

  - decision: "完整阅读参考实现，不允许略读改编"
    type: quality_gate
    rationale: "部分理解 = 保证有 bug。CREATION-LOG 中作者将此列为最重要的防弹措施之一。"
    stage: pattern_analysis
    evidence:
      kind: document_section
      path: "skills/systematic-debugging/SKILL.md"
      section_id: "§Phase-2-Step-2"
      evidence_role: normative

# ============================================================
# 业务用例
# ============================================================

known_use_cases:

  - name: "测试失败调试"
    source: "SKILL.md:§When-to-Use"
    type: technique
    problem_statement: "测试失败且原因不明，需要系统性定位根因"
    intent_keywords: ["test failure", "debug", "root cause", "failing test", "broken test"]
    negative_keywords: ["performance", "optimization", "refactor", "config"]
    disambiguation: "你是在调试一个具体的测试失败，还是在做性能优化或代码重构？"
    must_validate:
      - "已完成根因调查（Phase 1）后才提出修复"
      - "修复前有失败测试用例"
    not_suitable_for: ["已知根因的简单修复", "纯配置问题"]

  - name: "多组件系统故障排查"
    source: "SKILL.md:§Phase-1-Step-4"
    type: technique
    problem_statement: "跨组件边界的故障（CI → build → signing 等），不确定哪个层断裂"
    intent_keywords: ["multi-component", "integration", "CI failure", "build failure", "pipeline"]
    negative_keywords: ["single file", "simple bug", "typo"]
    disambiguation: "问题涉及多个组件/层之间的交互，还是单个文件内的 bug？"
    must_validate:
      - "每个组件边界都加了诊断日志"
      - "运行一次收集证据后再分析"

  - name: "反复修复失败的升级处理"
    source: "SKILL.md:§Phase-4-Step-5"
    type: technique
    problem_statement: "已尝试 3+ 次修复仍未解决，可能是架构层面的问题"
    intent_keywords: ["stuck", "multiple fixes failed", "architecture problem", "keeps breaking"]
    negative_keywords: ["first attempt", "simple fix"]
    disambiguation: "你已经尝试了几次修复？如果不到 3 次，建议先继续系统性调查。"
    must_validate:
      - "停止继续尝试修复"
      - "与人类讨论是否需要架构变更"

# ============================================================
# 阶段定义
# ============================================================

stages:

  - id: root_cause_investigation
    name: 根因调查（Root Cause Investigation）
    order: 1
    responsibility: >
      在尝试任何修复之前，通过系统性调查找到问题的根本原因。
      包括：仔细阅读错误信息、稳定复现、检查近期变更、
      多组件系统加诊断埋点、追踪数据流到源头。
    interface:
      inputs:
        - name: problem_report
          description: "问题的初始描述（错误信息、症状、复现条件）"
          constraints:
            - "必须有可观察的症状，不能基于猜测"
      outputs:
        - name: root_cause_analysis
          description: "根因分析结论（WHAT + WHY + 证据链）"
          constraints:
            - "必须能回答 WHAT 和 WHY"
            - "必须有证据支撑，不能是猜测"
      required_methods:
        - name: read_error_messages
          description: "完整阅读错误信息、堆栈跟踪、行号、文件路径、错误码"
          evidence: "SKILL.md:§Phase-1-Step-1"
        - name: reproduce_consistently
          description: "确认能可靠触发问题，记录精确步骤；不可复现则收集更多数据"
          evidence: "SKILL.md:§Phase-1-Step-2"
        - name: check_recent_changes
          description: "git diff, 最近提交, 新依赖, 配置变更, 环境差异"
          evidence: "SKILL.md:§Phase-1-Step-3"
        - name: gather_evidence_multi_component
          description: "在每个组件边界加诊断日志，运行一次收集证据，再分析断裂点"
          evidence: "SKILL.md:§Phase-1-Step-4"
        - name: trace_data_flow
          description: "从症状点反向追踪到数据源头（参见 root-cause-tracing 子技术）"
          evidence: "SKILL.md:§Phase-1-Step-5"
    replaceable_points: []
    design_decisions:
      - "Phase 1 是强制性的——不完成 Phase 1 不能进入 Phase 2"
      - "多组件系统必须先加诊断再分析，不允许直接猜测哪个组件有问题"
    acceptance_hints:
      - "能清晰陈述根因（不只是症状）"
      - "有证据链支撑根因结论"
      - "如果涉及多组件，已在每个边界收集了诊断数据"
    resource_refs: [root_cause_tracing, find_polluter]

  - id: pattern_analysis
    name: 模式分析（Pattern Analysis）
    order: 2
    responsibility: >
      在修复之前找到问题的模式。寻找同一代码库中的工作示例，
      与参考实现进行完整对比，识别所有差异（不假设任何差异"不重要"）。
    interface:
      inputs:
        - name: root_cause_analysis
          description: "Phase 1 的根因分析结论"
          constraints: ["必须已完成 Phase 1"]
      outputs:
        - name: difference_list
          description: "工作代码与问题代码之间的所有差异列表"
          constraints:
            - "不能假设'那个差异不重要'"
            - "必须列出每一个差异，无论多小"
      required_methods:
        - name: find_working_examples
          description: "在同一代码库中找到类似的工作代码"
          evidence: "SKILL.md:§Phase-2-Step-1"
        - name: compare_against_references
          description: "完整阅读参考实现——不要略读，每一行都读"
          evidence: "SKILL.md:§Phase-2-Step-2"
        - name: identify_differences
          description: "列出工作版本与问题版本的所有差异"
          evidence: "SKILL.md:§Phase-2-Step-3"
        - name: understand_dependencies
          description: "理解依赖、配置、环境假设"
          evidence: "SKILL.md:§Phase-2-Step-4"
    replaceable_points: []
    design_decisions:
      - "参考实现必须完整阅读，不允许略读改编——部分理解保证出 bug"
    acceptance_hints:
      - "已找到工作示例并完整对比"
      - "差异列表完整（不遗漏看起来不重要的差异）"

  - id: hypothesis_testing
    name: 假设与测试（Hypothesis and Testing）
    order: 3
    responsibility: >
      科学方法：形成单一假设，最小化测试，验证后再继续。
      一次只改一个变量。假设失败则形成新假设，不叠加修复。
    interface:
      inputs:
        - name: difference_list
          description: "Phase 2 的差异分析结果"
      outputs:
        - name: confirmed_hypothesis
          description: "经验证的根因假设（具体到 'X 是根因因为 Y'）"
          constraints:
            - "假设必须具体（'我认为 X 是根因因为 Y'），不能模糊"
      required_methods:
        - name: form_single_hypothesis
          description: "明确陈述单一假设并写下来，不允许模糊"
          evidence: "SKILL.md:§Phase-3-Step-1"
        - name: test_minimally
          description: "最小可能的变更测试假设——一次一个变量，不同时改多处"
          evidence: "SKILL.md:§Phase-3-Step-2"
        - name: verify_before_continuing
          description: "验证了→Phase 4；没验证→形成新假设（不叠加修复）"
          evidence: "SKILL.md:§Phase-3-Step-3"
    replaceable_points: []
    design_decisions:
      - "单假设规则：每次只测试一个变量，防止无法隔离生效因素"
      - "假设失败时形成新假设，不在失败修复上叠加更多修复"
    acceptance_hints:
      - "假设被明确写下来了"
      - "测试变更是最小化的（一次一个变量）"
      - "如果假设失败，形成了新假设而非叠加修复"

  - id: implementation
    name: 实施（Implementation）
    order: 4
    responsibility: >
      修复根因（不是症状）。先创建失败测试用例，实施单一修复，验证。
      不做"顺手改进"，不捆绑无关重构。
      如果连续 3 次修复失败，停下来质疑架构，与人类讨论。
    interface:
      inputs:
        - name: confirmed_hypothesis
          description: "Phase 3 验证通过的根因假设"
      outputs:
        - name: verified_fix
          description: "经测试验证的修复（含失败测试用例 + 修复代码 + 通过测试）"
          constraints:
            - "必须有对应的测试用例"
            - "不能捆绑无关改进或重构"
      required_methods:
        - name: create_failing_test
          description: "创建最简复现的失败测试用例（使用 TDD skill 或一次性脚本）"
          evidence: "SKILL.md:§Phase-4-Step-1"
        - name: implement_single_fix
          description: "只修复根因，一次一个变更，不做'顺手改进'"
          evidence: "SKILL.md:§Phase-4-Step-2"
        - name: verify_fix
          description: "测试通过？没有其他测试被破坏？问题真正解决了？"
          evidence: "SKILL.md:§Phase-4-Step-3"
        - name: escalate_if_3_failures
          description: "3+ 次修复失败→停止→质疑架构→与人类讨论。不尝试第 4 次修复。"
          evidence: "SKILL.md:§Phase-4-Step-5"
    replaceable_points:
      - name: test_methodology
        description: "创建失败测试的方法"
        options:
          - name: "superpowers:test-driven-development"
            traits: [full_tdd, red_green_refactor]
            fit_for: ["有测试框架的项目"]
            not_fit_for: ["无测试框架的快速验证"]
          - name: one_off_test_script
            traits: [lightweight, no_framework]
            fit_for: ["无测试框架的项目", "快速验证场景"]
            not_fit_for: ["需要回归测试的长期项目"]
        default: "superpowers:test-driven-development"
        selection_criteria: "有测试框架就用 TDD skill；没有就写一次性测试脚本"
    design_decisions:
      - "修复前必须有失败测试——没有测试的修复无法验证也无法防回归"
      - "不做顺手改进——单一修复保证可隔离和可回滚"
      - "3 次修复失败是硬性升级阈值——继续尝试几乎总是浪费时间"
    acceptance_hints:
      - "修复前有失败测试用例"
      - "修复是单一变更（不捆绑重构）"
      - "所有测试通过且无回归"
      - "如果 3+ 次修复失败，已停止并质疑架构"
    resource_refs: [defense_in_depth, condition_based_waiting, condition_waiting_impl]

# ============================================================
